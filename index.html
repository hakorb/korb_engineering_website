<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Korb.Engineering</title>
  <meta name="description" content="Korb.Engineering — AI tools archive.">

  <!-- Fonts: DSEG14 Classic for VFD display, JetBrains Mono fallback -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <style>
    /* DSEG14 Classic — VFD segmented display font */
    @font-face {
      font-family: 'DSEG14 Classic';
      font-style: normal;
      font-display: swap;
      font-weight: 400;
      src: url(https://cdn.jsdelivr.net/fontsource/fonts/dseg14-classic@latest/latin-400-normal.woff2) format('woff2'),
           url(https://cdn.jsdelivr.net/fontsource/fonts/dseg14-classic@latest/latin-400-normal.woff) format('woff');
    }
    @font-face {
      font-family: 'DSEG14 Classic';
      font-style: italic;
      font-display: swap;
      font-weight: 400;
      src: url(https://cdn.jsdelivr.net/fontsource/fonts/dseg14-classic@latest/latin-400-italic.woff2) format('woff2'),
           url(https://cdn.jsdelivr.net/fontsource/fonts/dseg14-classic@latest/latin-400-italic.woff) format('woff');
    }
    @font-face {
      font-family: 'DSEG14 Classic';
      font-style: normal;
      font-display: swap;
      font-weight: 700;
      src: url(https://cdn.jsdelivr.net/fontsource/fonts/dseg14-classic@latest/latin-700-normal.woff2) format('woff2'),
           url(https://cdn.jsdelivr.net/fontsource/fonts/dseg14-classic@latest/latin-700-normal.woff) format('woff');
    }
    /* DSEG7 Classic — 7-segment for numbers */
    @font-face {
      font-family: 'DSEG7 Classic';
      font-style: normal;
      font-display: swap;
      font-weight: 400;
      src: url(https://cdn.jsdelivr.net/fontsource/fonts/dseg7-classic@latest/latin-400-normal.woff2) format('woff2'),
           url(https://cdn.jsdelivr.net/fontsource/fonts/dseg7-classic@latest/latin-400-normal.woff) format('woff');
    }
  </style>

  <link rel="stylesheet" href="./base.css">
  <link rel="stylesheet" href="./style.css">
</head>
<body>
  <div class="crt-overlay" aria-hidden="true"></div>
  <div class="vfd-bloom" aria-hidden="true"></div>
  <div class="page" id="app">

    <!-- Header -->
    <header class="site-header">
      <div class="header-inner">
        <a href="#" class="logo-link" id="homeLink">
          <span class="logo-text">korb<span class="logo-dot">.</span>engineering</span>
        </a>
        <div class="header-status">
          <span class="status-dot"></span>
          <span class="vfd-label">Online</span>
        </div>
      </div>
    </header>

    <!-- Main Content Area (SPA) -->
    <main id="mainContent">
      <!-- Views are rendered by JS -->
    </main>

    <!-- Footer -->
    <footer class="site-footer">
      <a href="https://www.perplexity.ai/computer" target="_blank" rel="noopener noreferrer">Created with Perplexity Computer</a>
    </footer>

  </div>

  <script src="./app.js" defer></script>
</body>
</html>
