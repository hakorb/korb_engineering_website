<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>1980s Japanese Graphing Calc</title>
    <style>
        :root {
            --case-color: #c9c4b4;
            --case-edge: #888;
            --screen-bg: #8ba88d;
            --screen-ink: #2b3328;
            --key-dark: #333333;
            --key-light: #f0f0f0;
            --accent: #b22222;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            background-color: #1a1a1a;
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            font-family: "Segoe UI", Tahoma, sans-serif;
        }

        .calc-body {
            background-color: var(--case-color);
            width: 380px;
            padding: 20px 18px;
            border-radius: 8px;
            border-bottom: 8px solid var(--case-edge);
            border-right: 5px solid #aaa;
            box-shadow: 0 20px 50px rgba(0,0,0,0.5);
        }

        .logo-area {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 12px;
            color: #555;
            font-weight: bold;
            font-style: italic;
            font-size: 11px;
            border-bottom: 1px solid #aaa;
            padding-bottom: 5px;
        }

        /* === LCD Screen === */
        .screen-frame {
            background: #222;
            padding: 8px;
            border-radius: 4px;
            margin-bottom: 14px;
            box-shadow: inset 0 2px 5px rgba(0,0,0,0.8);
        }

        .lcd {
            background-color: var(--screen-bg);
            width: 100%;
            position: relative;
            overflow: hidden;
            background-image: linear-gradient(rgba(0,0,0,0.04) 1px, transparent 1px);
            background-size: 100% 3px;
        }

        .lcd canvas {
            display: block;
            image-rendering: pixelated;
            width: 100%;
            height: 240px;
        }

        /* Status bar at top of LCD */
        .lcd-status {
            display: flex;
            justify-content: space-between;
            padding: 2px 6px;
            font-family: 'Courier New', monospace;
            font-size: 9px;
            font-weight: bold;
            color: var(--screen-ink);
            opacity: 0.6;
            background: rgba(0,0,0,0.04);
        }

        /* Equation bar */
        .eq-bar {
            display: flex;
            align-items: center;
            padding: 4px 6px;
            border-top: 1px solid rgba(43,51,40,0.3);
            font-family: 'Courier New', monospace;
            font-weight: bold;
            color: var(--screen-ink);
            font-size: 13px;
            background: rgba(0,0,0,0.03);
        }
        .eq-bar label { flex-shrink: 0; font-size: 11px; }
        .eq-bar input {
            flex: 1;
            background: transparent;
            border: none;
            outline: none;
            font-family: inherit;
            font-weight: bold;
            color: inherit;
            font-size: 13px;
            margin-left: 2px;
        }
        .eq-color {
            width: 8px; height: 8px;
            border-radius: 50%;
            margin-right: 4px;
            flex-shrink: 0;
        }

        /* Trace readout */
        .trace-bar {
            display: none;
            padding: 3px 6px;
            border-top: 1px solid rgba(43,51,40,0.3);
            font-family: 'Courier New', monospace;
            font-weight: bold;
            color: var(--screen-ink);
            font-size: 11px;
            background: rgba(0,0,0,0.05);
        }
        .trace-bar.active { display: flex; gap: 12px; }

        /* === Mode Tabs === */
        .mode-tabs {
            display: flex;
            gap: 3px;
            margin-bottom: 10px;
        }
        .mode-tab {
            flex: 1;
            height: 24px;
            border: none;
            border-radius: 3px 3px 0 0;
            font-size: 9px;
            font-weight: bold;
            letter-spacing: 0.05em;
            cursor: pointer;
            background: #bbb5a5;
            color: #666;
            transition: background 0.1s;
        }
        .mode-tab.active {
            background: #444;
            color: #eee;
        }

        /* === Button Grid === */
        .grid {
            display: grid;
            grid-template-columns: repeat(5, 1fr);
            gap: 8px;
        }

        .grid button {
            height: 32px;
            border: none;
            border-radius: 3px;
            font-weight: bold;
            cursor: pointer;
            font-size: 10px;
            box-shadow: 0 3px 0 #777;
            transition: transform 0.05s, box-shadow 0.05s;
            letter-spacing: 0.02em;
        }
        .grid button:active {
            transform: translateY(2px);
            box-shadow: 0 1px 0 #777;
        }

        .btn-orange { background: #d35400; color: white; }
        .btn-blue   { background: #2980b9; color: white; }
        .btn-gray   { background: #444; color: white; }
        .btn-num    { background: #eee; color: #222; font-size: 13px; }
        .btn-green  { background: #27ae60; color: white; }
        .btn-red    { background: var(--accent); color: white; }
        .span2      { grid-column: span 2; }
        .span3      { grid-column: span 3; }

        /* === Table View === */
        .table-view {
            display: none;
            max-height: 240px;
            overflow-y: auto;
            background: var(--screen-bg);
            font-family: 'Courier New', monospace;
            font-size: 11px;
            color: var(--screen-ink);
        }
        .table-view table {
            width: 100%;
            border-collapse: collapse;
        }
        .table-view th, .table-view td {
            padding: 2px 6px;
            text-align: right;
            border-bottom: 1px solid rgba(43,51,40,0.15);
        }
        .table-view th {
            font-size: 10px;
            background: rgba(0,0,0,0.06);
            position: sticky;
            top: 0;
        }

        /* === Window Settings === */
        .window-panel {
            display: none;
            background: var(--screen-bg);
            padding: 10px;
            font-family: 'Courier New', monospace;
            font-size: 12px;
            color: var(--screen-ink);
        }
        .window-panel label {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 4px;
        }
        .window-panel input {
            width: 80px;
            background: rgba(0,0,0,0.08);
            border: 1px solid rgba(43,51,40,0.3);
            font-family: inherit;
            font-size: 12px;
            color: var(--screen-ink);
            padding: 2px 4px;
            text-align: right;
        }

        /* === Calc Mode === */
        .calc-display {
            display: none;
            background: var(--screen-bg);
            min-height: 240px;
            padding: 8px;
            font-family: 'Courier New', monospace;
            font-weight: bold;
            color: var(--screen-ink);
            font-size: 13px;
            flex-direction: column;
            justify-content: flex-end;
        }
        .calc-history {
            flex: 1;
            overflow-y: auto;
            font-size: 11px;
            opacity: 0.6;
            margin-bottom: 4px;
        }
        .calc-history div { text-align: right; margin-bottom: 2px; }
        .calc-expr {
            text-align: right;
            font-size: 16px;
            min-height: 22px;
            word-break: break-all;
        }
        .calc-result {
            text-align: right;
            font-size: 20px;
            min-height: 26px;
            border-top: 1px solid rgba(43,51,40,0.3);
            padding-top: 4px;
        }
    </style>
</head>
<body>

<div class="calc-body">
    <div class="logo-area">
        <span>GEN-80s JAPAN</span>
        <span style="color: var(--accent);">FX-GRAPH PRO</span>
    </div>

    <!-- Mode Tabs -->
    <div class="mode-tabs">
        <button class="mode-tab active" data-mode="graph">GRAPH</button>
        <button class="mode-tab" data-mode="table">TABLE</button>
        <button class="mode-tab" data-mode="window">WINDOW</button>
        <button class="mode-tab" data-mode="calc">CALC</button>
    </div>

    <!-- Screen Frame -->
    <div class="screen-frame">
        <div class="lcd">
            <div class="lcd-status">
                <span id="modeLabel">GRAPH</span>
                <span id="windowLabel">[-10,10]x[-6,6]</span>
            </div>

            <!-- Graph canvas -->
            <canvas id="graphCanvas"></canvas>

            <!-- Table view -->
            <div class="table-view" id="tableView"></div>

            <!-- Window settings -->
            <div class="window-panel" id="windowPanel">
                <label>Xmin <input type="number" id="xmin" value="-10" step="1"></label>
                <label>Xmax <input type="number" id="xmax" value="10" step="1"></label>
                <label>Ymin <input type="number" id="ymin" value="-6" step="1"></label>
                <label>Ymax <input type="number" id="ymax" value="6" step="1"></label>
                <label>Step <input type="number" id="tStep" value="0.5" step="0.1"></label>
            </div>

            <!-- Calc display -->
            <div class="calc-display" id="calcDisplay">
                <div class="calc-history" id="calcHistory"></div>
                <div class="calc-expr" id="calcExpr"></div>
                <div class="calc-result" id="calcResult">0</div>
            </div>

            <!-- Equation inputs -->
            <div class="eq-bar" id="eq1bar">
                <span class="eq-color" style="background:var(--screen-ink)"></span>
                <label>Y1=</label>
                <input type="text" id="eq1" value="sin(x)" spellcheck="false">
            </div>
            <div class="eq-bar" id="eq2bar">
                <span class="eq-color" style="background:#5a7a5c"></span>
                <label>Y2=</label>
                <input type="text" id="eq2" value="" placeholder="enter equation" spellcheck="false">
            </div>
            <div class="eq-bar" id="eq3bar">
                <span class="eq-color" style="background:#3a5a3c"></span>
                <label>Y3=</label>
                <input type="text" id="eq3" value="" placeholder="enter equation" spellcheck="false">
            </div>

            <!-- Trace readout -->
            <div class="trace-bar" id="traceBar">
                <span id="traceInfo">TRACE: move ◄ ►</span>
            </div>
        </div>
    </div>

    <!-- Button Grid -->
    <div class="grid" id="btnGrid">
        <!-- Row 1: Functions -->
        <button class="btn-gray" onclick="ins('sin(')">SIN</button>
        <button class="btn-gray" onclick="ins('cos(')">COS</button>
        <button class="btn-gray" onclick="ins('tan(')">TAN</button>
        <button class="btn-gray" onclick="ins('log(')">LOG</button>
        <button class="btn-gray" onclick="ins('ln(')">LN</button>

        <!-- Row 2: More functions -->
        <button class="btn-gray" onclick="ins('sqrt(')">√</button>
        <button class="btn-gray" onclick="ins('^')">x^y</button>
        <button class="btn-gray" onclick="ins('abs(')">ABS</button>
        <button class="btn-gray" onclick="ins('PI')">π</button>
        <button class="btn-gray" onclick="ins('E')">e</button>

        <!-- Row 3: Parens, x, plot -->
        <button class="btn-blue" onclick="ins('(')"> ( </button>
        <button class="btn-blue" onclick="ins(')')"> ) </button>
        <button class="btn-green" onclick="ins('x')">X</button>
        <button class="btn-orange span2" onclick="doPlot()">EXE/PLOT</button>

        <!-- Row 4: 7 8 9 ÷ DEL -->
        <button class="btn-num" onclick="ins('7')">7</button>
        <button class="btn-num" onclick="ins('8')">8</button>
        <button class="btn-num" onclick="ins('9')">9</button>
        <button class="btn-blue" onclick="ins('/')">÷</button>
        <button class="btn-red" onclick="del()">DEL</button>

        <!-- Row 5: 4 5 6 × AC -->
        <button class="btn-num" onclick="ins('4')">4</button>
        <button class="btn-num" onclick="ins('5')">5</button>
        <button class="btn-num" onclick="ins('6')">6</button>
        <button class="btn-blue" onclick="ins('*')">×</button>
        <button class="btn-orange" onclick="cls()">AC</button>

        <!-- Row 6: 1 2 3 - TRACE -->
        <button class="btn-num" onclick="ins('1')">1</button>
        <button class="btn-num" onclick="ins('2')">2</button>
        <button class="btn-num" onclick="ins('3')">3</button>
        <button class="btn-blue" onclick="ins('-')">−</button>
        <button class="btn-green" onclick="toggleTrace()">TRACE</button>

        <!-- Row 7: 0 . +/- + ZOOM -->
        <button class="btn-num" onclick="ins('0')">0</button>
        <button class="btn-num" onclick="ins('.')">.</button>
        <button class="btn-gray" onclick="negate()">+/−</button>
        <button class="btn-blue" onclick="ins('+')">+</button>
        <button class="btn-green" onclick="zoomFit()">ZOOM</button>
    </div>
</div>

<script>
/* ================================================
   FX-GRAPH PRO — Full Graphing Calculator Engine
   ================================================ */

const canvas = document.getElementById('graphCanvas');
const ctx = canvas.getContext('2d');

// Internal resolution
canvas.width = 340;
canvas.height = 240;

const INK = '#2b3328';
const COLORS = [INK, '#5a7a5c', '#3a5a3c'];
const DASH_PATTERNS = [[], [6,3], [3,3]];

// --- Window state ---
let win = { xmin: -10, xmax: 10, ymin: -6, ymax: 6 };
let tStep = 0.5;

// --- Mode state ---
let currentMode = 'graph';
let traceActive = false;
let traceX = 0;
let traceEq = 0;

// --- Calc mode state ---
let calcExpr = '';
let calcHistory = [];

// --- Helpers ---
function getEqs() {
    return [
        document.getElementById('eq1').value.trim(),
        document.getElementById('eq2').value.trim(),
        document.getElementById('eq3').value.trim()
    ];
}

function focusedInput() {
    const active = document.activeElement;
    if (active && active.tagName === 'INPUT' && active.type === 'text') return active;
    // Default to eq1 in graph mode
    if (currentMode === 'graph' || currentMode === 'table') return document.getElementById('eq1');
    return null;
}

function ins(v) {
    if (currentMode === 'calc') {
        calcExpr += v;
        document.getElementById('calcExpr').textContent = calcExpr;
        return;
    }
    const el = focusedInput();
    if (!el) return;
    const start = el.selectionStart;
    const end = el.selectionEnd;
    el.value = el.value.substring(0, start) + v + el.value.substring(end);
    el.selectionStart = el.selectionEnd = start + v.length;
    el.focus();
}

function del() {
    if (currentMode === 'calc') {
        calcExpr = calcExpr.slice(0, -1);
        document.getElementById('calcExpr').textContent = calcExpr;
        return;
    }
    const el = focusedInput();
    if (!el) return;
    const pos = el.selectionStart;
    if (pos > 0) {
        el.value = el.value.substring(0, pos - 1) + el.value.substring(pos);
        el.selectionStart = el.selectionEnd = pos - 1;
    }
    el.focus();
}

function cls() {
    if (currentMode === 'calc') {
        calcExpr = '';
        document.getElementById('calcExpr').textContent = '';
        document.getElementById('calcResult').textContent = '0';
        return;
    }
    const el = focusedInput();
    if (el) { el.value = ''; el.focus(); }
}

function negate() {
    if (currentMode === 'calc') {
        if (calcExpr.startsWith('-')) calcExpr = calcExpr.substring(1);
        else calcExpr = '-' + calcExpr;
        document.getElementById('calcExpr').textContent = calcExpr;
        return;
    }
    const el = focusedInput();
    if (!el) return;
    if (el.value.startsWith('-')) el.value = el.value.substring(1);
    else el.value = '-' + el.value;
}

// --- Safe math parser ---
function parseExpr(expr, x) {
    if (!expr) return NaN;
    let e = expr
        .replace(/\bsin\b/g,  'Math.sin')
        .replace(/\bcos\b/g,  'Math.cos')
        .replace(/\btan\b/g,  'Math.tan')
        .replace(/\basin\b/g, 'Math.asin')
        .replace(/\bacos\b/g, 'Math.acos')
        .replace(/\batan\b/g, 'Math.atan')
        .replace(/\bsqrt\b/g, 'Math.sqrt')
        .replace(/\babs\b/g,  'Math.abs')
        .replace(/\blog\b/g,  'Math.log10')
        .replace(/\bln\b/g,   'Math.log')
        .replace(/\bPI\b/g,   'Math.PI')
        .replace(/\bE\b/g,    'Math.E')
        .replace(/\^/g,       '**');
    try {
        return new Function('x', `"use strict"; return (${e});`)(x);
    } catch { return NaN; }
}

// --- Drawing ---
function drawGrid() {
    const W = canvas.width, H = canvas.height;
    const { xmin, xmax, ymin, ymax } = win;

    ctx.fillStyle = '#8ba88d';
    ctx.fillRect(0, 0, W, H);

    // Grid lines
    ctx.strokeStyle = 'rgba(43,51,40,0.15)';
    ctx.lineWidth = 1;

    // Choose nice grid spacing
    function niceStep(range) {
        const rough = range / 10;
        const pow = Math.pow(10, Math.floor(Math.log10(rough)));
        const norm = rough / pow;
        if (norm < 1.5) return pow;
        if (norm < 3.5) return 2 * pow;
        if (norm < 7.5) return 5 * pow;
        return 10 * pow;
    }

    const dx = niceStep(xmax - xmin);
    const dy = niceStep(ymax - ymin);

    function xToPx(x) { return (x - xmin) / (xmax - xmin) * W; }
    function yToPx(y) { return (1 - (y - ymin) / (ymax - ymin)) * H; }

    // Vertical grid
    let gx = Math.ceil(xmin / dx) * dx;
    for (; gx <= xmax; gx += dx) {
        const px = Math.round(xToPx(gx));
        ctx.beginPath(); ctx.moveTo(px, 0); ctx.lineTo(px, H); ctx.stroke();
    }
    // Horizontal grid
    let gy = Math.ceil(ymin / dy) * dy;
    for (; gy <= ymax; gy += dy) {
        const py = Math.round(yToPx(gy));
        ctx.beginPath(); ctx.moveTo(0, py); ctx.lineTo(W, py); ctx.stroke();
    }

    // Axes
    ctx.strokeStyle = 'rgba(43,51,40,0.6)';
    ctx.lineWidth = 1.5;
    // X-axis
    if (ymin <= 0 && ymax >= 0) {
        const y0 = Math.round(yToPx(0));
        ctx.beginPath(); ctx.moveTo(0, y0); ctx.lineTo(W, y0); ctx.stroke();
    }
    // Y-axis
    if (xmin <= 0 && xmax >= 0) {
        const x0 = Math.round(xToPx(0));
        ctx.beginPath(); ctx.moveTo(x0, 0); ctx.lineTo(x0, H); ctx.stroke();
    }

    // Tick labels
    ctx.fillStyle = 'rgba(43,51,40,0.5)';
    ctx.font = 'bold 8px Courier New';
    ctx.textAlign = 'center';
    ctx.textBaseline = 'top';
    const y0px = ymin <= 0 && ymax >= 0 ? yToPx(0) : H - 2;
    gx = Math.ceil(xmin / dx) * dx;
    for (; gx <= xmax; gx += dx) {
        if (Math.abs(gx) < dx * 0.01) continue;
        ctx.fillText(+gx.toFixed(6), xToPx(gx), Math.min(y0px + 2, H - 10));
    }
    ctx.textAlign = 'right';
    ctx.textBaseline = 'middle';
    const x0px = xmin <= 0 && xmax >= 0 ? xToPx(0) : 2;
    gy = Math.ceil(ymin / dy) * dy;
    for (; gy <= ymax; gy += dy) {
        if (Math.abs(gy) < dy * 0.01) continue;
        ctx.fillText(+gy.toFixed(6), Math.max(x0px - 3, 30), yToPx(gy));
    }
}

function plotCurves() {
    const W = canvas.width, H = canvas.height;
    const { xmin, xmax, ymin, ymax } = win;
    const eqs = getEqs();

    function xToPx(x) { return (x - xmin) / (xmax - xmin) * W; }
    function yToPx(y) { return (1 - (y - ymin) / (ymax - ymin)) * H; }

    eqs.forEach((eq, idx) => {
        if (!eq) return;
        ctx.strokeStyle = COLORS[idx];
        ctx.lineWidth = idx === 0 ? 2 : 1.5;
        ctx.setLineDash(DASH_PATTERNS[idx]);
        ctx.beginPath();

        let pen = false;
        const steps = W * 2;
        for (let i = 0; i <= steps; i++) {
            const x = xmin + (xmax - xmin) * i / steps;
            const y = parseExpr(eq, x);
            const px = xToPx(x);
            const py = yToPx(y);

            if (!isFinite(y) || py < -1000 || py > H + 1000) {
                pen = false;
                continue;
            }
            if (!pen) { ctx.moveTo(px, py); pen = true; }
            else ctx.lineTo(px, py);
        }
        ctx.stroke();
        ctx.setLineDash([]);
    });
}

function drawTrace() {
    if (!traceActive) return;
    const W = canvas.width, H = canvas.height;
    const { xmin, xmax, ymin, ymax } = win;
    const eqs = getEqs();
    const eq = eqs[traceEq];
    if (!eq) return;

    const y = parseExpr(eq, traceX);
    const px = (traceX - xmin) / (xmax - xmin) * W;
    const py = (1 - (y - ymin) / (ymax - ymin)) * H;

    // Crosshair
    ctx.strokeStyle = 'rgba(43,51,40,0.4)';
    ctx.lineWidth = 1;
    ctx.setLineDash([3, 3]);
    ctx.beginPath();
    ctx.moveTo(px, 0); ctx.lineTo(px, H);
    ctx.moveTo(0, py); ctx.lineTo(W, py);
    ctx.stroke();
    ctx.setLineDash([]);

    // Dot
    if (isFinite(y)) {
        ctx.fillStyle = INK;
        ctx.beginPath();
        ctx.arc(px, py, 4, 0, Math.PI * 2);
        ctx.fill();
    }

    // Update readout
    const info = document.getElementById('traceInfo');
    info.textContent = `Y${traceEq + 1}  X=${traceX.toFixed(4)}  Y=${isFinite(y) ? y.toFixed(4) : 'undef'}`;
}

function render() {
    drawGrid();
    plotCurves();
    drawTrace();
    updateWindowLabel();
}

function doPlot() {
    if (currentMode === 'calc') {
        evalCalc();
        return;
    }
    if (currentMode === 'window') {
        readWindowInputs();
        setMode('graph');
    }
    if (currentMode === 'table') {
        buildTable();
        return;
    }
    render();
}

// --- Window ---
function readWindowInputs() {
    win.xmin = parseFloat(document.getElementById('xmin').value) || -10;
    win.xmax = parseFloat(document.getElementById('xmax').value) || 10;
    win.ymin = parseFloat(document.getElementById('ymin').value) || -6;
    win.ymax = parseFloat(document.getElementById('ymax').value) || 6;
    tStep = parseFloat(document.getElementById('tStep').value) || 0.5;
    if (win.xmin >= win.xmax) { win.xmin = -10; win.xmax = 10; }
    if (win.ymin >= win.ymax) { win.ymin = -6; win.ymax = 6; }
}

function syncWindowInputs() {
    document.getElementById('xmin').value = +win.xmin.toFixed(4);
    document.getElementById('xmax').value = +win.xmax.toFixed(4);
    document.getElementById('ymin').value = +win.ymin.toFixed(4);
    document.getElementById('ymax').value = +win.ymax.toFixed(4);
}

function updateWindowLabel() {
    document.getElementById('windowLabel').textContent =
        `[${+win.xmin.toFixed(1)},${+win.xmax.toFixed(1)}]x[${+win.ymin.toFixed(1)},${+win.ymax.toFixed(1)}]`;
}

// --- Zoom ---
function zoomFit() {
    // Auto-fit Y to visible curves
    const eqs = getEqs();
    let ylo = Infinity, yhi = -Infinity;
    eqs.forEach(eq => {
        if (!eq) return;
        for (let i = 0; i <= 200; i++) {
            const x = win.xmin + (win.xmax - win.xmin) * i / 200;
            const y = parseExpr(eq, x);
            if (isFinite(y)) {
                if (y < ylo) ylo = y;
                if (y > yhi) yhi = y;
            }
        }
    });
    if (isFinite(ylo) && isFinite(yhi)) {
        const pad = (yhi - ylo) * 0.15 || 1;
        win.ymin = ylo - pad;
        win.ymax = yhi + pad;
        syncWindowInputs();
    }
    render();
}

// Pan and zoom with keyboard
document.addEventListener('keydown', (e) => {
    if (currentMode !== 'graph') return;
    if (document.activeElement.tagName === 'INPUT') return;

    const dx = (win.xmax - win.xmin) * 0.1;
    const dy = (win.ymax - win.ymin) * 0.1;

    if (traceActive) {
        const step = (win.xmax - win.xmin) / canvas.width * 2;
        if (e.key === 'ArrowLeft') { traceX -= step * 5; render(); e.preventDefault(); }
        if (e.key === 'ArrowRight') { traceX += step * 5; render(); e.preventDefault(); }
        if (e.key === 'ArrowUp') {
            traceEq = (traceEq + 1) % getEqs().filter(Boolean).length;
            render(); e.preventDefault();
        }
        if (e.key === 'ArrowDown') {
            traceEq = (traceEq - 1 + getEqs().filter(Boolean).length) % getEqs().filter(Boolean).length;
            render(); e.preventDefault();
        }
        if (e.key === 'Escape') { toggleTrace(); e.preventDefault(); }
        return;
    }

    if (e.key === 'ArrowLeft')  { win.xmin -= dx; win.xmax -= dx; syncWindowInputs(); render(); }
    if (e.key === 'ArrowRight') { win.xmin += dx; win.xmax += dx; syncWindowInputs(); render(); }
    if (e.key === 'ArrowUp')    { win.ymin += dy; win.ymax += dy; syncWindowInputs(); render(); }
    if (e.key === 'ArrowDown')  { win.ymin -= dy; win.ymax -= dy; syncWindowInputs(); render(); }
    if (e.key === '=' || e.key === '+') {
        // Zoom in
        win.xmin += dx; win.xmax -= dx;
        win.ymin += dy; win.ymax -= dy;
        syncWindowInputs(); render();
    }
    if (e.key === '-') {
        // Zoom out
        win.xmin -= dx; win.xmax += dx;
        win.ymin -= dy; win.ymax += dy;
        syncWindowInputs(); render();
    }
});

// Mouse wheel zoom on canvas
canvas.addEventListener('wheel', (e) => {
    e.preventDefault();
    const factor = e.deltaY > 0 ? 1.15 : 0.87;
    const cx = (win.xmin + win.xmax) / 2;
    const cy = (win.ymin + win.ymax) / 2;
    const hw = (win.xmax - win.xmin) / 2 * factor;
    const hh = (win.ymax - win.ymin) / 2 * factor;
    win.xmin = cx - hw; win.xmax = cx + hw;
    win.ymin = cy - hh; win.ymax = cy + hh;
    syncWindowInputs();
    render();
}, { passive: false });

// Click to set trace position
canvas.addEventListener('click', (e) => {
    if (!traceActive) return;
    const rect = canvas.getBoundingClientRect();
    const px = (e.clientX - rect.left) / rect.width;
    traceX = win.xmin + (win.xmax - win.xmin) * px;
    render();
});

// --- Trace ---
function toggleTrace() {
    traceActive = !traceActive;
    document.getElementById('traceBar').classList.toggle('active', traceActive);
    if (traceActive) traceX = (win.xmin + win.xmax) / 2;
    render();
}

// --- Table ---
function buildTable() {
    const eqs = getEqs();
    const activeEqs = eqs.map((e, i) => e ? i : -1).filter(i => i >= 0);
    if (!activeEqs.length) return;

    let html = '<table><tr><th>X</th>';
    activeEqs.forEach(i => html += `<th>Y${i + 1}</th>`);
    html += '</tr>';

    for (let x = win.xmin; x <= win.xmax + 0.0001; x += tStep) {
        html += `<tr><td>${(+x.toFixed(6))}</td>`;
        activeEqs.forEach(i => {
            const y = parseExpr(eqs[i], x);
            html += `<td>${isFinite(y) ? (+y.toFixed(6)) : '---'}</td>`;
        });
        html += '</tr>';
    }
    html += '</table>';
    document.getElementById('tableView').innerHTML = html;
}

// --- Calc mode ---
function evalCalc() {
    if (!calcExpr) return;
    try {
        const result = parseExpr(calcExpr, 0);
        const display = isFinite(result) ? (+result.toFixed(10)).toString() : 'ERROR';
        calcHistory.push(`${calcExpr} = ${display}`);
        if (calcHistory.length > 20) calcHistory.shift();

        document.getElementById('calcResult').textContent = display;
        document.getElementById('calcHistory').innerHTML =
            calcHistory.map(h => `<div>${h}</div>`).join('');

        calcExpr = '';
        document.getElementById('calcExpr').textContent = '';
    } catch {
        document.getElementById('calcResult').textContent = 'SYN ERROR';
    }
}

// --- Mode switching ---
function setMode(mode) {
    currentMode = mode;
    document.querySelectorAll('.mode-tab').forEach(t =>
        t.classList.toggle('active', t.dataset.mode === mode)
    );
    document.getElementById('modeLabel').textContent = mode.toUpperCase();

    // Show/hide panels
    canvas.style.display = (mode === 'graph') ? 'block' : 'none';
    document.getElementById('tableView').style.display = (mode === 'table') ? 'block' : 'none';
    document.getElementById('windowPanel').style.display = (mode === 'window') ? 'block' : 'none';
    document.getElementById('calcDisplay').style.display = (mode === 'calc') ? 'flex' : 'none';

    // Show/hide eq bars
    const showEq = (mode === 'graph' || mode === 'table');
    ['eq1bar', 'eq2bar', 'eq3bar'].forEach(id =>
        document.getElementById(id).style.display = showEq ? 'flex' : 'none'
    );

    // Trace bar only in graph
    if (mode !== 'graph' && traceActive) {
        traceActive = false;
        document.getElementById('traceBar').classList.remove('active');
    }

    if (mode === 'graph') render();
    if (mode === 'table') buildTable();
    if (mode === 'window') syncWindowInputs();
}

document.querySelectorAll('.mode-tab').forEach(tab => {
    tab.addEventListener('click', () => setMode(tab.dataset.mode));
});

// Re-plot on equation change
['eq1', 'eq2', 'eq3'].forEach(id => {
    document.getElementById(id).addEventListener('input', () => {
        if (currentMode === 'graph') render();
    });
});

// --- Init ---
render();
</script>

</body>
</html>
