<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Graphing Calculator — Korb Engineering</title>
    <style>
        :root {
            --case: #1a1a2e;
            --case-edge: #0d0d1a;
            --screen-bg: #c8d8c0;
            --screen-ink: #1a2318;
            --key-dark: #2a2a3a;
            --key-num: #3a3a4a;
            --key-op: #1a4a7a;
            --key-fn: #4a4a5a;
            --key-2nd: #0066cc;
            --key-enter: #1a5a2e;
            --key-neg: #6a3a2a;
            --text-key: #e0e0e0;
            --text-2nd: #aaccff;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            background: #0d0d0d;
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            font-family: 'Segoe UI', Tahoma, sans-serif;
        }

        .calc-body {
            background: var(--case);
            width: 680px;
            max-width: 100vw;
            padding: 32px 28px 40px;
            border-radius: 18px;
            border-bottom: 8px solid var(--case-edge);
            border-right: 4px solid #151528;
            box-shadow: 0 20px 60px rgba(0,0,0,0.7);
        }

        /* Logo */
        .logo-area {
            display: flex;
            justify-content: space-between;
            align-items: baseline;
            padding: 0 8px 16px;
        }
        .logo-brand { font-size: 18px; font-weight: 600; color: #5a6a7a; letter-spacing: 0.05em; }
        .logo-model { font-size: 22px; font-weight: 700; color: #8899aa; letter-spacing: 0.08em; }

        /* Screen */
        .screen-frame {
            background: #0a0a14;
            padding: 10px;
            border-radius: 10px;
            margin-bottom: 20px;
            box-shadow: inset 0 3px 8px rgba(0,0,0,0.8);
        }
        .lcd {
            background: var(--screen-bg);
            width: 100%;
            position: relative;
            overflow: hidden;
            border-radius: 2px;
            background-image: linear-gradient(rgba(0,0,0,0.03) 1px, transparent 1px);
            background-size: 100% 2px;
        }
        .lcd canvas {
            display: block;
            image-rendering: pixelated;
            width: 100%;
            height: 360px;
        }
        .lcd-status {
            display: flex;
            justify-content: space-between;
            padding: 2px 8px;
            font-family: 'Courier New', monospace;
            font-size: 14px;
            font-weight: bold;
            color: var(--screen-ink);
            opacity: 0.5;
            background: rgba(0,0,0,0.03);
        }
        .eq-bar {
            display: flex;
            align-items: center;
            padding: 6px 10px;
            border-top: 1px solid rgba(26,35,24,0.2);
            font-family: 'Courier New', monospace;
            font-weight: bold;
            color: var(--screen-ink);
            font-size: 20px;
            background: rgba(0,0,0,0.02);
        }
        .eq-bar label { flex-shrink: 0; font-size: 18px; }
        .eq-bar input {
            flex: 1; background: transparent; border: none; outline: none;
            font-family: inherit; font-weight: bold; color: inherit; font-size: 20px; margin-left: 4px;
        }
        .eq-color { width: 10px; height: 10px; border-radius: 50%; margin-right: 6px; flex-shrink: 0; }

        .trace-bar {
            display: none; padding: 4px 10px;
            border-top: 1px solid rgba(26,35,24,0.2);
            font-family: 'Courier New', monospace; font-weight: bold;
            color: var(--screen-ink); font-size: 18px; background: rgba(0,0,0,0.04);
        }
        .trace-bar.active { display: flex; gap: 16px; }

        /* Table */
        .table-view { display: none; max-height: 360px; overflow-y: auto; background: var(--screen-bg); font-family: 'Courier New', monospace; font-size: 18px; color: var(--screen-ink); }
        .table-view table { width: 100%; border-collapse: collapse; }
        .table-view th, .table-view td { padding: 3px 8px; text-align: right; border-bottom: 1px solid rgba(26,35,24,0.12); }
        .table-view th { font-size: 16px; background: rgba(0,0,0,0.05); position: sticky; top: 0; }

        /* Window panel */
        .window-panel { display: none; background: var(--screen-bg); padding: 14px; font-family: 'Courier New', monospace; font-size: 20px; color: var(--screen-ink); }
        .window-panel label { display: flex; justify-content: space-between; align-items: center; margin-bottom: 6px; }
        .window-panel input { width: 120px; background: rgba(0,0,0,0.06); border: 1px solid rgba(26,35,24,0.2); font-family: inherit; font-size: 20px; color: var(--screen-ink); padding: 4px 6px; text-align: right; }

        /* Calc display */
        .calc-display { display: none; background: var(--screen-bg); min-height: 360px; padding: 12px; font-family: 'Courier New', monospace; font-weight: bold; color: var(--screen-ink); font-size: 22px; flex-direction: column; justify-content: flex-end; }
        .calc-history { flex: 1; overflow-y: auto; font-size: 18px; opacity: 0.5; margin-bottom: 6px; }
        .calc-history div { text-align: right; margin-bottom: 2px; }
        .calc-expr { text-align: right; font-size: 26px; min-height: 32px; word-break: break-all; }
        .calc-result { text-align: right; font-size: 34px; min-height: 40px; border-top: 1px solid rgba(26,35,24,0.2); padding-top: 6px; }

        /* === TI-84 BUTTON LAYOUT === */

        /* Top menu row: Y= WINDOW ZOOM TRACE GRAPH */
        .menu-row {
            display: grid;
            grid-template-columns: repeat(5, 1fr);
            gap: 8px;
            margin-bottom: 14px;
        }
        .menu-row button {
            height: 48px; border: none; border-radius: 5px;
            font-size: 15px; font-weight: 700; letter-spacing: 0.06em;
            cursor: pointer; text-transform: uppercase;
            background: #3a3a4a; color: #aab;
            box-shadow: 0 3px 0 #1a1a2a;
            transition: transform 0.05s, box-shadow 0.05s;
        }
        .menu-row button:active { transform: translateY(2px); box-shadow: 0 1px 0 #1a1a2a; }
        .menu-row button.active { background: #1a4a7a; color: #cde; }

        /* Arrow pad area */
        .arrow-pad {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 20px;
            margin-bottom: 14px;
        }
        .dpad {
            display: grid;
            grid-template-areas:
                ". up ."
                "left center right"
                ". down .";
            grid-template-columns: 52px 52px 52px;
            grid-template-rows: 52px 52px 52px;
            gap: 4px;
        }
        .dpad button {
            border: none; border-radius: 50%; cursor: pointer;
            font-size: 22px; color: #bbc;
            background: #2a2a3a; box-shadow: 0 3px 0 #1a1a2a;
            transition: transform 0.05s;
        }
        .dpad button:active { transform: translateY(2px); }
        .d-up { grid-area: up; }
        .d-down { grid-area: down; }
        .d-left { grid-area: left; }
        .d-right { grid-area: right; }
        .d-center { grid-area: center; background: #3a3a5a !important; font-size: 15px; font-weight: 700; }

        .side-keys {
            display: flex;
            flex-direction: column;
            gap: 8px;
        }
        .side-keys button {
            height: 50px; width: 100px; border: none; border-radius: 5px;
            font-size: 15px; font-weight: 700; cursor: pointer;
            box-shadow: 0 3px 0 #1a1a2a;
            transition: transform 0.05s;
            letter-spacing: 0.04em;
        }
        .side-keys button:active { transform: translateY(1px); }
        .btn-2nd { background: var(--key-2nd); color: white; }
        .btn-mode { background: #3a3a4a; color: #aab; }
        .btn-del { background: #3a3a4a; color: #daa; }

        /* Main button grid: TI-84 style 5 columns */
        .grid {
            display: grid;
            grid-template-columns: repeat(5, 1fr);
            gap: 5px;
        }
        .grid button {
            height: 30px; border: none; border-radius: 3px;
            font-weight: 700; cursor: pointer; font-size: 9px;
            box-shadow: 0 2px 0 #1a1a2a;
            transition: transform 0.05s, box-shadow 0.05s;
            letter-spacing: 0.03em;
        }
        .grid button:active { transform: translateY(1px); box-shadow: 0 1px 0 #1a1a2a; }

        /* Color classes */
        .k-fn  { background: var(--key-fn); color: var(--text-key); }
        .k-num { background: var(--key-num); color: #fff; font-size: 13px; }
        .k-op  { background: var(--key-op); color: #cde; }
        .k-neg { background: var(--key-neg); color: #ecc; }
        .k-enter { background: var(--key-enter); color: #cfc; font-size: 10px; }
        .k-clear { background: #5a2a2a; color: #fcc; }
        .span2 { grid-column: span 2; }

        /* 2nd labels above keys */
        .grid button { position: relative; }
        .grid button .s2 {
            position: absolute; top: -9px; left: 50%; transform: translateX(-50%);
            font-size: 6px; color: var(--text-2nd); font-weight: 600; white-space: nowrap;
            pointer-events: none;
        }
    </style>
</head>
<body>

<div class="calc-body">
    <div class="logo-area">
        <span class="logo-brand">Korb Engineering</span>
        <span class="logo-model">KE-84 GRAPHING</span>
    </div>

    <div class="screen-frame">
        <div class="lcd">
            <div class="lcd-status">
                <span id="modeLabel">GRAPH</span>
                <span id="windowLabel">[-10,10]x[-6,6]</span>
            </div>
            <canvas id="graphCanvas"></canvas>
            <div class="table-view" id="tableView"></div>
            <div class="window-panel" id="windowPanel">
                <label>Xmin <input type="number" id="xmin" value="-10" step="1"></label>
                <label>Xmax <input type="number" id="xmax" value="10" step="1"></label>
                <label>Ymin <input type="number" id="ymin" value="-6" step="1"></label>
                <label>Ymax <input type="number" id="ymax" value="6" step="1"></label>
                <label>TblStep <input type="number" id="tStep" value="0.5" step="0.1"></label>
            </div>
            <div class="calc-display" id="calcDisplay">
                <div class="calc-history" id="calcHistory"></div>
                <div class="calc-expr" id="calcExpr"></div>
                <div class="calc-result" id="calcResult">0</div>
            </div>
            <div class="eq-bar" id="eq1bar">
                <span class="eq-color" style="background:var(--screen-ink)"></span>
                <label>Y1=</label>
                <input type="text" id="eq1" value="sin(x)" spellcheck="false">
            </div>
            <div class="eq-bar" id="eq2bar">
                <span class="eq-color" style="background:#5a7a5c"></span>
                <label>Y2=</label>
                <input type="text" id="eq2" value="" placeholder="enter equation" spellcheck="false">
            </div>
            <div class="eq-bar" id="eq3bar">
                <span class="eq-color" style="background:#3a5a3c"></span>
                <label>Y3=</label>
                <input type="text" id="eq3" value="" placeholder="enter equation" spellcheck="false">
            </div>
            <div class="trace-bar" id="traceBar">
                <span id="traceInfo">TRACE: use arrows</span>
            </div>
        </div>
    </div>

    <!-- TI-84 Menu Row -->
    <div class="menu-row">
        <button class="active" data-mode="graph">Y=</button>
        <button data-mode="window">Window</button>
        <button onclick="zoomFit()">Zoom</button>
        <button onclick="toggleTrace()">Trace</button>
        <button data-mode="graph" onclick="doPlot()">Graph</button>
    </div>

    <!-- Arrow Pad + Side Keys -->
    <div class="arrow-pad">
        <div class="side-keys">
            <button class="btn-2nd" onclick="toggle2nd()">2nd</button>
            <button class="btn-mode" data-mode="calc">Mode</button>
            <button class="btn-del" onclick="del()">DEL</button>
        </div>
        <div class="dpad">
            <button class="d-up" onclick="dpadPress('up')">&#9650;</button>
            <button class="d-left" onclick="dpadPress('left')">&#9664;</button>
            <button class="d-center" onclick="doPlot()">OK</button>
            <button class="d-right" onclick="dpadPress('right')">&#9654;</button>
            <button class="d-down" onclick="dpadPress('down')">&#9660;</button>
        </div>
        <div class="side-keys">
            <button class="btn-mode" onclick="ins('x')">X,T,θ</button>
            <button class="btn-mode" data-mode="table">Table</button>
            <button class="k-clear" onclick="cls()">Clear</button>
        </div>
    </div>

    <!-- Main TI-84 Key Grid -->
    <div class="grid" style="margin-top:12px">
        <!-- Row 1: Math / Trig -->
        <button class="k-fn" onclick="ins('sin(')"><span class="s2">ASIN</span>SIN</button>
        <button class="k-fn" onclick="ins('cos(')"><span class="s2">ACOS</span>COS</button>
        <button class="k-fn" onclick="ins('tan(')"><span class="s2">ATAN</span>TAN</button>
        <button class="k-fn" onclick="ins('^')"><span class="s2">√</span>^</button>
        <button class="k-fn" onclick="ins('sqrt(')"><span class="s2">x²</span>√(</button>

        <!-- Row 2: More functions -->
        <button class="k-fn" onclick="ins('log(')"><span class="s2">10^</span>LOG</button>
        <button class="k-fn" onclick="ins('ln(')"><span class="s2">e^</span>LN</button>
        <button class="k-fn" onclick="ins('abs(')">ABS</button>
        <button class="k-fn" onclick="ins('PI')"><span class="s2">e</span>π</button>
        <button class="k-fn" onclick="ins('(')"><span class="s2">)</span>(</button>

        <!-- Row 3: 7 8 9 × ÷ -->
        <button class="k-num" onclick="ins('7')">7</button>
        <button class="k-num" onclick="ins('8')">8</button>
        <button class="k-num" onclick="ins('9')">9</button>
        <button class="k-op" onclick="ins('*')">×</button>
        <button class="k-op" onclick="ins('/')">÷</button>

        <!-- Row 4: 4 5 6 + - -->
        <button class="k-num" onclick="ins('4')">4</button>
        <button class="k-num" onclick="ins('5')">5</button>
        <button class="k-num" onclick="ins('6')">6</button>
        <button class="k-op" onclick="ins('+')">+</button>
        <button class="k-op" onclick="ins('-')">−</button>

        <!-- Row 5: 1 2 3 , ENTER -->
        <button class="k-num" onclick="ins('1')">1</button>
        <button class="k-num" onclick="ins('2')">2</button>
        <button class="k-num" onclick="ins('3')">3</button>
        <button class="k-fn" onclick="ins(',')"><span class="s2">E</span>,</button>
        <button class="k-enter" onclick="doPlot()" style="grid-row: span 2">ENTER</button>

        <!-- Row 6: 0 . (-) STO -->
        <button class="k-num" onclick="ins('0')">0</button>
        <button class="k-num" onclick="ins('.')">.</button>
        <button class="k-neg" onclick="negate()">(−)</button>
        <button class="k-fn" onclick="ins(')')">)</button>
    </div>
</div>

<script>
/* ================================================
   KE-84 — Full Graphing Calculator Engine
   Korb Engineering
   ================================================ */

const canvas = document.getElementById('graphCanvas');
const ctx = canvas.getContext('2d');
canvas.width = 310;
canvas.height = 200;

const INK = '#1a2318';
const COLORS = [INK, '#5a7a5c', '#3a5a3c'];
const DASH_PATTERNS = [[], [6,3], [3,3]];

let win = { xmin: -10, xmax: 10, ymin: -6, ymax: 6 };
let tStep = 0.5;
let currentMode = 'calc';
let traceActive = false;
let traceX = 0;
let traceEq = 0;
let calcExpr = '';
let calcHistory = [];
let is2nd = false;

function getEqs() {
    return [
        document.getElementById('eq1').value.trim(),
        document.getElementById('eq2').value.trim(),
        document.getElementById('eq3').value.trim()
    ];
}

function focusedInput() {
    const active = document.activeElement;
    if (active && active.tagName === 'INPUT' && active.type === 'text') return active;
    if (currentMode === 'graph' || currentMode === 'table') return document.getElementById('eq1');
    return null;
}

function ins(v) {
    // Handle 2nd key mappings
    if (is2nd) {
        const map2nd = {
            'sin(': 'asin(', 'cos(': 'acos(', 'tan(': 'atan(',
            '^': 'sqrt(', 'sqrt(': '^2', 'log(': '10^(', 'ln(': 'E^(',
            'PI': 'E', '(': ')'
        };
        if (map2nd[v]) v = map2nd[v];
        is2nd = false;
        document.querySelector('.btn-2nd').style.boxShadow = '';
    }
    if (currentMode === 'calc') {
        calcExpr += v;
        document.getElementById('calcExpr').textContent = calcExpr;
        return;
    }
    const el = focusedInput();
    if (!el) return;
    const start = el.selectionStart;
    const end = el.selectionEnd;
    el.value = el.value.substring(0, start) + v + el.value.substring(end);
    el.selectionStart = el.selectionEnd = start + v.length;
    el.focus();
}

function del() {
    if (currentMode === 'calc') {
        calcExpr = calcExpr.slice(0, -1);
        document.getElementById('calcExpr').textContent = calcExpr;
        return;
    }
    const el = focusedInput();
    if (!el) return;
    const pos = el.selectionStart;
    if (pos > 0) {
        el.value = el.value.substring(0, pos - 1) + el.value.substring(pos);
        el.selectionStart = el.selectionEnd = pos - 1;
    }
    el.focus();
}

function cls() {
    if (currentMode === 'calc') {
        calcExpr = '';
        document.getElementById('calcExpr').textContent = '';
        document.getElementById('calcResult').textContent = '0';
        return;
    }
    const el = focusedInput();
    if (el) { el.value = ''; el.focus(); }
}

function negate() {
    if (currentMode === 'calc') {
        if (calcExpr.startsWith('-')) calcExpr = calcExpr.substring(1);
        else calcExpr = '-' + calcExpr;
        document.getElementById('calcExpr').textContent = calcExpr;
        return;
    }
    const el = focusedInput();
    if (!el) return;
    if (el.value.startsWith('-')) el.value = el.value.substring(1);
    else el.value = '-' + el.value;
}

function toggle2nd() {
    is2nd = !is2nd;
    document.querySelector('.btn-2nd').style.boxShadow = is2nd ? '0 0 8px #0088ff, inset 0 0 4px rgba(0,100,255,0.3)' : '';
}

// --- D-pad ---
function dpadPress(dir) {
    if (traceActive) {
        const step = (win.xmax - win.xmin) / canvas.width * 4;
        if (dir === 'left') { traceX -= step * 3; render(); }
        if (dir === 'right') { traceX += step * 3; render(); }
        if (dir === 'up') { traceEq = (traceEq + 1) % getEqs().filter(Boolean).length || 0; render(); }
        if (dir === 'down') { traceEq = Math.max(0, traceEq - 1); render(); }
        return;
    }
    const dx = (win.xmax - win.xmin) * 0.1;
    const dy = (win.ymax - win.ymin) * 0.1;
    if (dir === 'left')  { win.xmin -= dx; win.xmax -= dx; }
    if (dir === 'right') { win.xmin += dx; win.xmax += dx; }
    if (dir === 'up')    { win.ymin += dy; win.ymax += dy; }
    if (dir === 'down')  { win.ymin -= dy; win.ymax -= dy; }
    syncWindowInputs();
    render();
}

// --- Math Parser ---
function parseExpr(expr, x) {
    if (!expr) return NaN;
    let e = expr
        .replace(/\basin\b/g, 'Math.asin')
        .replace(/\bacos\b/g, 'Math.acos')
        .replace(/\batan\b/g, 'Math.atan')
        .replace(/\bsin\b/g,  'Math.sin')
        .replace(/\bcos\b/g,  'Math.cos')
        .replace(/\btan\b/g,  'Math.tan')
        .replace(/\bsqrt\b/g, 'Math.sqrt')
        .replace(/\babs\b/g,  'Math.abs')
        .replace(/\blog\b/g,  'Math.log10')
        .replace(/\bln\b/g,   'Math.log')
        .replace(/\bPI\b/g,   'Math.PI')
        .replace(/\bE\b/g,    'Math.E')
        .replace(/\^/g,       '**');
    try { return new Function('x', `"use strict"; return (${e});`)(x); }
    catch { return NaN; }
}

// --- Drawing ---
function drawGrid() {
    const W = canvas.width, H = canvas.height;
    const { xmin, xmax, ymin, ymax } = win;
    ctx.fillStyle = '#c8d8c0';
    ctx.fillRect(0, 0, W, H);

    function niceStep(range) {
        const rough = range / 10;
        const pow = Math.pow(10, Math.floor(Math.log10(rough)));
        const norm = rough / pow;
        if (norm < 1.5) return pow;
        if (norm < 3.5) return 2 * pow;
        if (norm < 7.5) return 5 * pow;
        return 10 * pow;
    }

    const dxg = niceStep(xmax - xmin);
    const dyg = niceStep(ymax - ymin);
    function xToPx(x) { return (x - xmin) / (xmax - xmin) * W; }
    function yToPx(y) { return (1 - (y - ymin) / (ymax - ymin)) * H; }

    ctx.strokeStyle = 'rgba(26,35,24,0.12)';
    ctx.lineWidth = 1;
    let gx = Math.ceil(xmin / dxg) * dxg;
    for (; gx <= xmax; gx += dxg) { const px = Math.round(xToPx(gx)); ctx.beginPath(); ctx.moveTo(px, 0); ctx.lineTo(px, H); ctx.stroke(); }
    let gy = Math.ceil(ymin / dyg) * dyg;
    for (; gy <= ymax; gy += dyg) { const py = Math.round(yToPx(gy)); ctx.beginPath(); ctx.moveTo(0, py); ctx.lineTo(W, py); ctx.stroke(); }

    ctx.strokeStyle = 'rgba(26,35,24,0.5)';
    ctx.lineWidth = 1.5;
    if (ymin <= 0 && ymax >= 0) { const y0 = Math.round(yToPx(0)); ctx.beginPath(); ctx.moveTo(0, y0); ctx.lineTo(W, y0); ctx.stroke(); }
    if (xmin <= 0 && xmax >= 0) { const x0 = Math.round(xToPx(0)); ctx.beginPath(); ctx.moveTo(x0, 0); ctx.lineTo(x0, H); ctx.stroke(); }

    ctx.fillStyle = 'rgba(26,35,24,0.4)';
    ctx.font = 'bold 7px Courier New';
    ctx.textAlign = 'center'; ctx.textBaseline = 'top';
    const y0px = ymin <= 0 && ymax >= 0 ? yToPx(0) : H - 2;
    gx = Math.ceil(xmin / dxg) * dxg;
    for (; gx <= xmax; gx += dxg) { if (Math.abs(gx) < dxg * 0.01) continue; ctx.fillText(+gx.toFixed(4), xToPx(gx), Math.min(y0px + 2, H - 9)); }
    ctx.textAlign = 'right'; ctx.textBaseline = 'middle';
    const x0px = xmin <= 0 && xmax >= 0 ? xToPx(0) : 2;
    gy = Math.ceil(ymin / dyg) * dyg;
    for (; gy <= ymax; gy += dyg) { if (Math.abs(gy) < dyg * 0.01) continue; ctx.fillText(+gy.toFixed(4), Math.max(x0px - 2, 28), yToPx(gy)); }
}

function plotCurves() {
    const W = canvas.width, H = canvas.height;
    const { xmin, xmax, ymin, ymax } = win;
    const eqs = getEqs();
    function xToPx(x) { return (x - xmin) / (xmax - xmin) * W; }
    function yToPx(y) { return (1 - (y - ymin) / (ymax - ymin)) * H; }

    eqs.forEach((eq, idx) => {
        if (!eq) return;
        ctx.strokeStyle = COLORS[idx];
        ctx.lineWidth = idx === 0 ? 2 : 1.5;
        ctx.setLineDash(DASH_PATTERNS[idx]);
        ctx.beginPath();
        let pen = false;
        const steps = W * 2;
        for (let i = 0; i <= steps; i++) {
            const x = xmin + (xmax - xmin) * i / steps;
            const y = parseExpr(eq, x);
            const px = xToPx(x);
            const py = yToPx(y);
            if (!isFinite(y) || py < -1000 || py > H + 1000) { pen = false; continue; }
            if (!pen) { ctx.moveTo(px, py); pen = true; }
            else ctx.lineTo(px, py);
        }
        ctx.stroke();
        ctx.setLineDash([]);
    });
}

function drawTrace() {
    if (!traceActive) return;
    const W = canvas.width, H = canvas.height;
    const { xmin, xmax, ymin, ymax } = win;
    const eqs = getEqs();
    const eq = eqs[traceEq];
    if (!eq) return;
    const y = parseExpr(eq, traceX);
    const px = (traceX - xmin) / (xmax - xmin) * W;
    const py = (1 - (y - ymin) / (ymax - ymin)) * H;

    ctx.strokeStyle = 'rgba(26,35,24,0.3)';
    ctx.lineWidth = 1; ctx.setLineDash([3, 3]);
    ctx.beginPath(); ctx.moveTo(px, 0); ctx.lineTo(px, H);
    ctx.moveTo(0, py); ctx.lineTo(W, py); ctx.stroke();
    ctx.setLineDash([]);

    if (isFinite(y)) {
        ctx.fillStyle = INK;
        ctx.beginPath(); ctx.arc(px, py, 3, 0, Math.PI * 2); ctx.fill();
    }
    document.getElementById('traceInfo').textContent =
        `Y${traceEq+1}  X=${traceX.toFixed(4)}  Y=${isFinite(y)?y.toFixed(4):'undef'}`;
}

function render() { drawGrid(); plotCurves(); drawTrace(); updateWindowLabel(); }

function doPlot() {
    if (currentMode === 'calc') { evalCalc(); return; }
    if (currentMode === 'window') { readWindowInputs(); setMode('graph'); }
    if (currentMode === 'table') { buildTable(); return; }
    render();
}

function readWindowInputs() {
    win.xmin = parseFloat(document.getElementById('xmin').value) || -10;
    win.xmax = parseFloat(document.getElementById('xmax').value) || 10;
    win.ymin = parseFloat(document.getElementById('ymin').value) || -6;
    win.ymax = parseFloat(document.getElementById('ymax').value) || 6;
    tStep = parseFloat(document.getElementById('tStep').value) || 0.5;
    if (win.xmin >= win.xmax) { win.xmin = -10; win.xmax = 10; }
    if (win.ymin >= win.ymax) { win.ymin = -6; win.ymax = 6; }
}
function syncWindowInputs() {
    document.getElementById('xmin').value = +win.xmin.toFixed(4);
    document.getElementById('xmax').value = +win.xmax.toFixed(4);
    document.getElementById('ymin').value = +win.ymin.toFixed(4);
    document.getElementById('ymax').value = +win.ymax.toFixed(4);
}
function updateWindowLabel() {
    document.getElementById('windowLabel').textContent =
        `[${+win.xmin.toFixed(1)},${+win.xmax.toFixed(1)}]x[${+win.ymin.toFixed(1)},${+win.ymax.toFixed(1)}]`;
}

function zoomFit() {
    const eqs = getEqs();
    let ylo = Infinity, yhi = -Infinity;
    eqs.forEach(eq => {
        if (!eq) return;
        for (let i = 0; i <= 200; i++) {
            const x = win.xmin + (win.xmax - win.xmin) * i / 200;
            const y = parseExpr(eq, x);
            if (isFinite(y)) { if (y < ylo) ylo = y; if (y > yhi) yhi = y; }
        }
    });
    if (isFinite(ylo) && isFinite(yhi)) {
        const pad = (yhi - ylo) * 0.15 || 1;
        win.ymin = ylo - pad; win.ymax = yhi + pad;
        syncWindowInputs();
    }
    render();
}

function toggleTrace() {
    traceActive = !traceActive;
    document.getElementById('traceBar').classList.toggle('active', traceActive);
    if (traceActive) traceX = (win.xmin + win.xmax) / 2;
    render();
}

function buildTable() {
    const eqs = getEqs();
    const activeEqs = eqs.map((e, i) => e ? i : -1).filter(i => i >= 0);
    if (!activeEqs.length) return;
    let html = '<table><tr><th>X</th>';
    activeEqs.forEach(i => html += `<th>Y${i+1}</th>`);
    html += '</tr>';
    for (let x = win.xmin; x <= win.xmax + 0.0001; x += tStep) {
        html += `<tr><td>${(+x.toFixed(6))}</td>`;
        activeEqs.forEach(i => {
            const y = parseExpr(eqs[i], x);
            html += `<td>${isFinite(y)?(+y.toFixed(6)):'---'}</td>`;
        });
        html += '</tr>';
    }
    html += '</table>';
    document.getElementById('tableView').innerHTML = html;
}

function evalCalc() {
    if (!calcExpr) return;
    try {
        const result = parseExpr(calcExpr, 0);
        const display = isFinite(result) ? (+result.toFixed(10)).toString() : 'ERROR';
        calcHistory.push(`${calcExpr} = ${display}`);
        if (calcHistory.length > 20) calcHistory.shift();
        document.getElementById('calcResult').textContent = display;
        document.getElementById('calcHistory').innerHTML = calcHistory.map(h => `<div>${h}</div>`).join('');
        calcExpr = '';
        document.getElementById('calcExpr').textContent = '';
    } catch { document.getElementById('calcResult').textContent = 'SYN ERROR'; }
}

// Mouse wheel zoom
canvas.addEventListener('wheel', (e) => {
    e.preventDefault();
    const factor = e.deltaY > 0 ? 1.15 : 0.87;
    const cx = (win.xmin + win.xmax) / 2, cy = (win.ymin + win.ymax) / 2;
    const hw = (win.xmax - win.xmin) / 2 * factor, hh = (win.ymax - win.ymin) / 2 * factor;
    win.xmin = cx - hw; win.xmax = cx + hw;
    win.ymin = cy - hh; win.ymax = cy + hh;
    syncWindowInputs(); render();
}, { passive: false });

// Click trace
canvas.addEventListener('click', (e) => {
    if (!traceActive) return;
    const rect = canvas.getBoundingClientRect();
    const px = (e.clientX - rect.left) / rect.width;
    traceX = win.xmin + (win.xmax - win.xmin) * px;
    render();
});

// --- Mode switching ---
function setMode(mode) {
    currentMode = mode;
    document.getElementById('modeLabel').textContent = mode.toUpperCase();
    canvas.style.display = (mode === 'graph') ? 'block' : 'none';
    document.getElementById('tableView').style.display = (mode === 'table') ? 'block' : 'none';
    document.getElementById('windowPanel').style.display = (mode === 'window') ? 'block' : 'none';
    document.getElementById('calcDisplay').style.display = (mode === 'calc') ? 'flex' : 'none';
    const showEq = (mode === 'graph' || mode === 'table');
    ['eq1bar', 'eq2bar', 'eq3bar'].forEach(id => document.getElementById(id).style.display = showEq ? 'flex' : 'none');
    if (mode !== 'graph' && traceActive) { traceActive = false; document.getElementById('traceBar').classList.remove('active'); }
    // Update menu row active state
    document.querySelectorAll('.menu-row button').forEach(b => b.classList.remove('active'));
    document.querySelectorAll(`.menu-row button[data-mode="${mode}"]`).forEach(b => b.classList.add('active'));
    if (mode === 'graph') render();
    if (mode === 'table') buildTable();
    if (mode === 'window') syncWindowInputs();
}

// Menu and mode buttons
document.querySelectorAll('[data-mode]').forEach(btn => {
    btn.addEventListener('click', () => setMode(btn.dataset.mode));
});

// Equation re-plot
['eq1', 'eq2', 'eq3'].forEach(id => {
    document.getElementById(id).addEventListener('input', () => { if (currentMode === 'graph') render(); });
});

// Keyboard shortcuts
document.addEventListener('keydown', (e) => {
    if (currentMode !== 'graph') return;
    if (document.activeElement.tagName === 'INPUT') return;
    if (e.key === 'ArrowLeft') dpadPress('left');
    if (e.key === 'ArrowRight') dpadPress('right');
    if (e.key === 'ArrowUp') dpadPress('up');
    if (e.key === 'ArrowDown') dpadPress('down');
    if (e.key === '=' || e.key === '+') {
        const dx = (win.xmax-win.xmin)*0.1, dy = (win.ymax-win.ymin)*0.1;
        win.xmin+=dx; win.xmax-=dx; win.ymin+=dy; win.ymax-=dy; syncWindowInputs(); render();
    }
    if (e.key === '-') {
        const dx = (win.xmax-win.xmin)*0.1, dy = (win.ymax-win.ymin)*0.1;
        win.xmin-=dx; win.xmax+=dx; win.ymin-=dy; win.ymax+=dy; syncWindowInputs(); render();
    }
});

setMode('calc');
</script>
</body>
</html>
