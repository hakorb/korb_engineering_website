<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>F-Zero Lite — Korb Engineering</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: #0a0a12;
      color: #ddd;
      font-family: 'Segoe UI', Tahoma, sans-serif;
      overflow: hidden;
      height: 100vh;
    }

    .game-shell {
      display: flex;
      height: 100vh;
    }

    /* Canvas area */
    .board-wrap {
      flex: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      position: relative;
      background: #000;
    }

    canvas {
      display: block;
      width: 100%;
      height: 100%;
    }

    /* Overlay */
    .overlay {
      position: absolute;
      inset: 0;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      background: rgba(0,0,0,0.75);
      z-index: 10;
    }
    .overlay.hidden { display: none; }
    .overlay h1 {
      font-size: 48px;
      color: #00d4ff;
      text-shadow: 0 0 20px rgba(0,212,255,0.6);
      margin-bottom: 12px;
    }
    .overlay p {
      font-size: 18px;
      color: #88aacc;
    }

    /* Side panel */
    .panel {
      width: 220px;
      background: #111118;
      border-left: 2px solid #1a1a2e;
      padding: 20px 16px;
      display: flex;
      flex-direction: column;
      gap: 12px;
      flex-shrink: 0;
    }

    .panel h1 {
      font-size: 20px;
      color: #00d4ff;
      text-shadow: 0 0 8px rgba(0,212,255,0.4);
      letter-spacing: 0.1em;
    }
    .panel h2 {
      font-size: 12px;
      text-transform: uppercase;
      letter-spacing: 0.1em;
      color: #556;
      margin-top: 8px;
    }

    .stat {
      display: flex;
      justify-content: space-between;
      font-size: 14px;
    }
    .stat span { color: #778; }
    .stat strong { color: #00d4ff; font-variant-numeric: tabular-nums; }

    .hud-bar {
      height: 6px;
      background: #1a1a2e;
      border-radius: 3px;
      overflow: hidden;
    }
    .hud-bar-fill {
      height: 100%;
      background: linear-gradient(90deg, #00d4ff, #00ff88);
      border-radius: 3px;
      transition: width 0.1s;
    }
    .hud-bar-fill.boost {
      background: linear-gradient(90deg, #ff8800, #ffcc00);
    }

    button {
      padding: 8px 12px;
      background: #1a1a2e;
      color: #88aacc;
      border: 1px solid #2a2a3e;
      border-radius: 4px;
      font-size: 12px;
      cursor: pointer;
      transition: background 0.15s;
    }
    button:hover { background: #2a2a3e; }

    .touch-controls {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 4px;
    }
    .touch-row { display: flex; gap: 4px; }
    .control {
      width: 56px;
      height: 40px;
      font-size: 11px;
      text-transform: uppercase;
    }

    ul {
      list-style: none;
      font-size: 11px;
      color: #556;
      line-height: 1.8;
    }

    @media (max-width: 640px) {
      .game-shell { flex-direction: column; }
      .panel {
        width: 100%;
        flex-direction: row;
        flex-wrap: wrap;
        align-items: center;
        padding: 8px 12px;
        gap: 8px;
        border-left: none;
        border-top: 2px solid #1a1a2e;
      }
      .panel h2, .panel ul { display: none; }
      .touch-controls { flex-direction: row; }
    }
  </style>
</head>
<body>
  <main class="game-shell">
    <section class="board-wrap">
      <canvas id="game" aria-label="F-Zero racing game"></canvas>
      <div id="overlay" class="overlay">
        <h1 id="overlay-title">F-Zero Lite</h1>
        <p id="overlay-text">Press ENTER or tap to start</p>
      </div>
    </section>

    <aside class="panel">
      <h1>F-Zero Lite</h1>
      <div class="stat"><span>Score</span><strong id="score">0</strong></div>
      <div class="stat"><span>Speed</span><strong id="speed">0</strong></div>
      <div class="stat"><span>Lap</span><strong id="lap">1</strong></div>

      <div>
        <h2>Energy</h2>
        <div class="hud-bar"><div class="hud-bar-fill" id="energyBar" style="width:100%"></div></div>
      </div>
      <div>
        <h2>Boost</h2>
        <div class="hud-bar"><div class="hud-bar-fill boost" id="boostBar" style="width:100%"></div></div>
      </div>

      <button id="restart" type="button">Restart (R)</button>
      <button id="pause" type="button">Pause (P)</button>

      <div class="touch-controls" aria-label="On-screen controls">
        <button id="up" type="button" class="control">Boost</button>
        <div class="touch-row">
          <button id="left" type="button" class="control">Left</button>
          <button id="down" type="button" class="control">Brake</button>
          <button id="right" type="button" class="control">Right</button>
        </div>
      </div>

      <h2>Controls</h2>
      <ul>
        <li>A / D or Arrow Keys: Steer</li>
        <li>W or Up: Boost</li>
        <li>S or Down: Brake</li>
        <li>P: Pause &nbsp; R: Restart</li>
      </ul>
    </aside>
  </main>

<script>
/* ================================================
   F-Zero Lite — Pseudo-3D Racing Game
   Korb Engineering
   ================================================ */

const canvas = document.getElementById('game');
const ctx = canvas.getContext('2d');

// --- Resize ---
function resize() {
  const wrap = canvas.parentElement;
  canvas.width = wrap.clientWidth;
  canvas.height = wrap.clientHeight;
}
resize();
window.addEventListener('resize', resize);

// --- Game State ---
let state = 'title'; // title, racing, paused, gameover
let score = 0;
let lapCount = 1;
let energy = 100;
let boostFuel = 100;
let playerX = 0;       // -1 to 1 (road position)
let playerSpeed = 0;   // current speed
let playerZ = 0;       // distance traveled
let smoothSteer = 0;   // smoothed steering for visuals
let steerInput = 0;
let accelInput = 0;
let brakeInput = 0;
let boostInput = 0;
let collisionCooldown = 0; // prevent rapid re-collisions

const MAX_SPEED = 300;
const ACCEL = 160;
const BRAKE_FORCE = 320;
const STEER_SPEED = 2.2;
const STEER_RETURN = 4.0;   // how fast steering centers when no input
const ROAD_WIDTH = 2200;
const SEG_LENGTH = 200;
const DRAW_DIST = 200;
const NUM_SEGMENTS = 1600;
const TRACK_LENGTH = NUM_SEGMENTS * SEG_LENGTH;
const CAM_HEIGHT = 1500;
const CAM_DEPTH = 150;      // camera focal length factor

// --- Track Generation ---
let segments = [];

function buildTrack() {
  segments = [];
  for (let i = 0; i < NUM_SEGMENTS; i++) {
    let curve = 0;
    let hill = 0;

    // Curves — gentle S-bends, balanced net zero drift
    if (i > 20 && i < 60) curve = 2.0;
    else if (i > 80 && i < 130) curve = -2.4;
    else if (i > 160 && i < 200) curve = 2.4;
    else if (i > 250 && i < 320) curve = -2.0;
    else if (i > 350 && i < 400) curve = 1.6;
    else if (i > 450 && i < 530) curve = -2.0;
    else if (i > 600 && i < 700) curve = 2.0;
    else if (i > 750 && i < 850) curve = -2.0;
    else if (i > 900 && i < 1000) curve = 2.4;
    else if (i > 1050 && i < 1150) curve = -2.4;
    else if (i > 1250 && i < 1350) curve = 1.6;
    else if (i > 1450 && i < 1550) curve = -1.6;

    // Hills
    if (i > 40 && i < 70) hill = 20;
    else if (i > 100 && i < 120) hill = -25;
    else if (i > 200 && i < 240) hill = 15;
    else if (i > 300 && i < 340) hill = -12;
    else if (i > 500 && i < 560) hill = 25;
    else if (i > 700 && i < 740) hill = -18;
    else if (i > 1000 && i < 1060) hill = 20;
    else if (i > 1200 && i < 1250) hill = -20;

    segments.push({
      curve,
      hill,
      z: i * SEG_LENGTH,
      obstacle: null,
    });
  }

  // Place obstacles (other racers)
  for (let i = 0; i < 60; i++) {
    const idx = 40 + Math.floor(Math.random() * (NUM_SEGMENTS - 80));
    if (!segments[idx].obstacle) {
      segments[idx].obstacle = {
        x: (Math.random() - 0.5) * 1.2,
        color: ['#c0392b', '#2980b9', '#27ae60', '#8e44ad', '#f39c12'][Math.floor(Math.random() * 5)],
        speed: 80 + Math.random() * 100,
      };
    }
  }
}
buildTrack();

// --- Input ---
const keys = {};
document.addEventListener('keydown', e => {
  keys[e.key.toLowerCase()] = true;
  if (e.key === 'Enter' && (state === 'title' || state === 'gameover')) startGame();
  if (e.key.toLowerCase() === 'r') restartGame();
  if (e.key.toLowerCase() === 'p') togglePause();
});
document.addEventListener('keyup', e => { keys[e.key.toLowerCase()] = false; });

// Touch controls
function bindTouch(id, action) {
  const el = document.getElementById(id);
  el.addEventListener('mousedown', () => action(true));
  el.addEventListener('mouseup', () => action(false));
  el.addEventListener('mouseleave', () => action(false));
  el.addEventListener('touchstart', e => { e.preventDefault(); action(true); });
  el.addEventListener('touchend', e => { e.preventDefault(); action(false); });
}
bindTouch('left', v => keys['arrowleft'] = v);
bindTouch('right', v => keys['arrowright'] = v);
bindTouch('up', v => keys['arrowup'] = v);
bindTouch('down', v => keys['arrowdown'] = v);

document.getElementById('restart').onclick = restartGame;
document.getElementById('pause').onclick = togglePause;

// Overlay click to start
document.getElementById('overlay').addEventListener('click', () => {
  if (state === 'title' || state === 'gameover') startGame();
});

function readInput() {
  steerInput = 0;
  accelInput = 0;
  brakeInput = 0;
  boostInput = 0;
  if (keys['a'] || keys['arrowleft']) steerInput = -1;
  if (keys['d'] || keys['arrowright']) steerInput = 1;
  if (keys['w'] || keys['arrowup']) boostInput = 1;
  if (keys['s'] || keys['arrowdown']) brakeInput = 1;
}

// --- Game Control ---
function startGame() {
  state = 'racing';
  score = 0;
  lapCount = 1;
  energy = 100;
  boostFuel = 100;
  playerX = 0;
  playerSpeed = 0;
  playerZ = 0;
  smoothSteer = 0;
  collisionCooldown = 0;
  buildTrack();
  hideOverlay();
}

function restartGame() {
  startGame();
}

function togglePause() {
  if (state === 'racing') {
    state = 'paused';
    showOverlay('Paused', 'Press P to resume');
  } else if (state === 'paused') {
    state = 'racing';
    hideOverlay();
  }
}

function gameOver() {
  state = 'gameover';
  showOverlay('Game Over', `Score: ${score} — Press ENTER or tap to retry`);
}

function showOverlay(title, text) {
  const ov = document.getElementById('overlay');
  document.getElementById('overlay-title').textContent = title;
  document.getElementById('overlay-text').textContent = text;
  ov.classList.remove('hidden');
}
function hideOverlay() {
  document.getElementById('overlay').classList.add('hidden');
}

// --- Projection ---
// Classic pseudo-3D: project world Z to screen coordinates
function project(worldZ, camZ, camY, screenW, screenH) {
  const d = worldZ - camZ;
  if (d <= 1) return null;  // behind camera
  const scale = CAM_DEPTH / d;
  return {
    scale,
    x: screenW / 2,
    y: screenH * 0.55 - scale * camY * SEG_LENGTH,
    w: scale * ROAD_WIDTH * SEG_LENGTH,
  };
}

// --- Render ---
function drawSky(w, h) {
  const grad = ctx.createLinearGradient(0, 0, 0, h * 0.55);
  grad.addColorStop(0, '#0a0020');
  grad.addColorStop(0.5, '#1a0040');
  grad.addColorStop(1, '#300060');
  ctx.fillStyle = grad;
  ctx.fillRect(0, 0, w, h * 0.55);

  // Stars
  const starSeed = 42;
  for (let i = 0; i < 60; i++) {
    const sx = ((starSeed * i * 7 + 13) % 1000) / 1000 * w;
    const sy = ((starSeed * i * 3 + 47) % 1000) / 1000 * h * 0.5;
    const sr = ((i * 13) % 3) * 0.4 + 0.5;
    ctx.fillStyle = `rgba(255,255,255,${0.3 + (i % 5) * 0.12})`;
    ctx.beginPath();
    ctx.arc(sx, sy, sr, 0, Math.PI * 2);
    ctx.fill();
  }
}

function drawGround(w, h) {
  ctx.fillStyle = '#1a1a0a';
  ctx.fillRect(0, h * 0.55, w, h * 0.45);
}

function drawSegment(x1, y1, w1, x2, y2, w2, segIndex, clip) {
  const W = canvas.width;

  // Alternate coloring based on world segment index for consistent stripe pattern
  const dark = segIndex % 2 === 0;

  // Rumble strip (drawn first, wider)
  ctx.fillStyle = dark ? '#cc0000' : '#ffffff';
  drawTrapezoid(x1, y1, w1 * 1.15, x2, y2, w2 * 1.15, clip);

  // Road surface
  ctx.fillStyle = dark ? '#333340' : '#3a3a4a';
  drawTrapezoid(x1, y1, w1, x2, y2, w2, clip);

  // Center line
  if (!dark) {
    ctx.fillStyle = 'rgba(255,255,255,0.35)';
    drawTrapezoid(x1, y1, w1 * 0.02, x2, y2, w2 * 0.02, clip);
  }

  // Lane markers
  ctx.fillStyle = dark ? 'rgba(255,255,255,0.08)' : 'rgba(255,255,255,0.15)';
  for (let lane = -1; lane <= 1; lane += 2) {
    const off = lane * 0.33;
    drawTrapezoid(x1 + w1 * off, y1, w1 * 0.008, x2 + w2 * off, y2, w2 * 0.008, clip);
  }

  // Grass
  ctx.fillStyle = dark ? '#0a3a0a' : '#0d4a0d';
  fillQuad(0, y2, x2 - w2 * 0.575, y2, x1 - w1 * 0.575, y1, 0, y1, clip);
  fillQuad(x2 + w2 * 0.575, y2, W, y2, W, y1, x1 + w1 * 0.575, y1, clip);
}

function drawTrapezoid(cx1, y1, w1, cx2, y2, w2, clip) {
  // clip: do not draw below this Y value
  const top = Math.min(y1, y2);
  if (top >= clip) return;

  ctx.beginPath();
  ctx.moveTo(cx1 - w1 / 2, y1);
  ctx.lineTo(cx1 + w1 / 2, y1);
  ctx.lineTo(cx2 + w2 / 2, y2);
  ctx.lineTo(cx2 - w2 / 2, y2);
  ctx.closePath();
  ctx.fill();
}

function fillQuad(x1, y1, x2, y2, x3, y3, x4, y4, clip) {
  ctx.beginPath();
  ctx.moveTo(x1, y1);
  ctx.lineTo(x2, y2);
  ctx.lineTo(x3, y3);
  ctx.lineTo(x4, y4);
  ctx.closePath();
  ctx.fill();
}

function drawPlayer(w, h) {
  // Smoothly interpolate visual steer for a nice tilt effect
  const cx = w / 2 + smoothSteer * 25;
  const baseY = h * 0.82;
  const pw = 50;
  const ph = 22;

  // Shadow
  ctx.fillStyle = 'rgba(0,0,0,0.4)';
  ctx.beginPath();
  ctx.ellipse(cx, baseY + 12, pw * 0.8, 6, 0, 0, Math.PI * 2);
  ctx.fill();

  // Body
  ctx.fillStyle = '#00aaff';
  ctx.beginPath();
  ctx.moveTo(cx - pw, baseY);
  ctx.lineTo(cx + pw, baseY);
  ctx.lineTo(cx + pw * 0.6, baseY - ph);
  ctx.lineTo(cx - pw * 0.6, baseY - ph);
  ctx.closePath();
  ctx.fill();

  // Canopy
  ctx.fillStyle = '#003366';
  ctx.beginPath();
  ctx.moveTo(cx - pw * 0.3, baseY - ph);
  ctx.lineTo(cx + pw * 0.3, baseY - ph);
  ctx.lineTo(cx + pw * 0.15, baseY - ph - 10);
  ctx.lineTo(cx - pw * 0.15, baseY - ph - 10);
  ctx.closePath();
  ctx.fill();

  // Nose
  ctx.fillStyle = '#0088dd';
  ctx.beginPath();
  ctx.moveTo(cx - pw * 0.15, baseY - ph - 10);
  ctx.lineTo(cx + pw * 0.15, baseY - ph - 10);
  ctx.lineTo(cx, baseY - ph - 18);
  ctx.closePath();
  ctx.fill();

  // Engine glow
  if (playerSpeed > 50) {
    const glow = boostInput && boostFuel > 0 ? 'rgba(255,150,0,0.8)' : 'rgba(0,180,255,0.5)';
    ctx.fillStyle = glow;
    ctx.beginPath();
    ctx.moveTo(cx - 12, baseY + 2);
    ctx.lineTo(cx + 12, baseY + 2);
    ctx.lineTo(cx, baseY + 8 + Math.random() * 6);
    ctx.closePath();
    ctx.fill();
  }

  // Side wings
  ctx.fillStyle = '#0077cc';
  ctx.beginPath();
  ctx.moveTo(cx - pw, baseY);
  ctx.lineTo(cx - pw - 15, baseY + 3);
  ctx.lineTo(cx - pw + 5, baseY - 5);
  ctx.closePath();
  ctx.fill();
  ctx.beginPath();
  ctx.moveTo(cx + pw, baseY);
  ctx.lineTo(cx + pw + 15, baseY + 3);
  ctx.lineTo(cx + pw - 5, baseY - 5);
  ctx.closePath();
  ctx.fill();
}

function drawObstacle(seg, p, worldIdx) {
  if (!seg.obstacle) return;
  const ob = seg.obstacle;
  const ox = p.x + p.w * ob.x * 0.5;
  const oy = p.y;
  const size = p.scale * 600 * SEG_LENGTH;
  if (size < 2 || size > 400) return;

  // Simple racer shape
  ctx.fillStyle = ob.color;
  ctx.beginPath();
  ctx.moveTo(ox - size / 2, oy);
  ctx.lineTo(ox + size / 2, oy);
  ctx.lineTo(ox + size / 3, oy - size * 0.5);
  ctx.lineTo(ox - size / 3, oy - size * 0.5);
  ctx.closePath();
  ctx.fill();

  ctx.fillStyle = 'rgba(0,0,0,0.3)';
  ctx.beginPath();
  ctx.moveTo(ox - size / 5, oy - size * 0.5);
  ctx.lineTo(ox + size / 5, oy - size * 0.5);
  ctx.lineTo(ox, oy - size * 0.7);
  ctx.closePath();
  ctx.fill();
}

// --- HUD ---
function updateHUD() {
  document.getElementById('score').textContent = score;
  document.getElementById('speed').textContent = Math.round(playerSpeed);
  document.getElementById('lap').textContent = lapCount;
  document.getElementById('energyBar').style.width = Math.max(0, energy) + '%';
  document.getElementById('boostBar').style.width = Math.max(0, boostFuel) + '%';
}

// --- Update ---
function update(dt) {
  if (state !== 'racing') return;
  readInput();

  const speedRatio = playerSpeed / MAX_SPEED;

  // --- Acceleration / Braking ---
  const onRoad = Math.abs(playerX) < 1.0;
  const offRoadDrag = onRoad ? 1 : 0.92; // multiplicative drag per frame when off-road

  if (brakeInput) {
    playerSpeed -= BRAKE_FORCE * dt;
  } else {
    // Auto accelerate with diminishing returns at high speed
    const accelCurve = 1 - speedRatio * 0.7;
    playerSpeed += ACCEL * accelCurve * dt;

    if (boostInput && boostFuel > 0) {
      playerSpeed += ACCEL * 1.2 * dt;
      boostFuel -= 20 * dt;
      if (boostFuel < 0) boostFuel = 0;
    }
  }

  // Boost recharge (slow)
  if (!boostInput && boostFuel < 100) {
    boostFuel += 4 * dt;
  }

  // Off-road friction
  if (!onRoad) {
    playerSpeed *= Math.pow(offRoadDrag, dt * 60);
  }

  playerSpeed = Math.max(0, Math.min(MAX_SPEED, playerSpeed));

  // --- Steering ---
  // Steering is less effective at very high speed (but still responsive)
  const steerEffectiveness = 1.0 - speedRatio * 0.35;
  playerX += steerInput * STEER_SPEED * dt * steerEffectiveness;

  // Smooth visual steer
  smoothSteer += (steerInput - smoothSteer) * Math.min(1, 12 * dt);

  // Track curve: centrifugal force pushes player outward, proportional to speed
  const segIdx = ((Math.floor(playerZ / SEG_LENGTH) % NUM_SEGMENTS) + NUM_SEGMENTS) % NUM_SEGMENTS;
  const seg = segments[segIdx];
  const centrifugal = seg.curve * speedRatio * speedRatio * 0.55 * dt;
  playerX += centrifugal;

  // --- Road edge collision ---
  if (Math.abs(playerX) > 1.3) {
    playerX = Math.sign(playerX) * 1.3;
    energy -= 15 * dt;
    playerSpeed *= 0.94;
  } else if (!onRoad) {
    energy -= 3 * dt;
  }

  // Soft return toward road when steering into it
  if (Math.abs(playerX) > 1.0 && steerInput === 0) {
    playerX *= (1 - 0.5 * dt);
  }

  // --- Move forward ---
  playerZ += playerSpeed * dt * SEG_LENGTH * 0.01;

  // --- Collision cooldown ---
  if (collisionCooldown > 0) collisionCooldown -= dt;

  // --- Collision with obstacles ---
  if (collisionCooldown <= 0) {
    for (let i = 0; i < 12; i++) {
      const ci = ((segIdx + i) % NUM_SEGMENTS + NUM_SEGMENTS) % NUM_SEGMENTS;
      const cseg = segments[ci];
      if (!cseg.obstacle) continue;
      // Compute distance accounting for track wrapping
      let dz = cseg.z - (playerZ % TRACK_LENGTH);
      if (dz < -TRACK_LENGTH / 2) dz += TRACK_LENGTH;
      if (dz > TRACK_LENGTH / 2) dz -= TRACK_LENGTH;
      if (dz > 0 && dz < SEG_LENGTH * 1.0) {
        const dx = Math.abs(playerX - cseg.obstacle.x);
        if (dx < 0.3) {
          energy -= 20;
          playerSpeed *= 0.6;
          collisionCooldown = 0.5;
          cseg.obstacle.x += (playerX < cseg.obstacle.x ? 0.4 : -0.4);
          break;
        }
      }
    }
  }

  // Move obstacles slightly (drift)
  // Only update nearby obstacles for performance
  for (let i = -20; i < DRAW_DIST; i++) {
    const oi = ((segIdx + i) % NUM_SEGMENTS + NUM_SEGMENTS) % NUM_SEGMENTS;
    const s = segments[oi];
    if (s.obstacle) {
      s.obstacle.x += Math.sin(playerZ * 0.0005 + s.z * 0.005) * 0.0003;
      s.obstacle.x = Math.max(-0.8, Math.min(0.8, s.obstacle.x));
    }
  }

  // --- Score & laps ---
  score = Math.floor(playerZ / SEG_LENGTH);
  const newLap = Math.floor(playerZ / TRACK_LENGTH) + 1;
  if (newLap > lapCount) {
    lapCount = newLap;
    energy = Math.min(100, energy + 30);
  }

  // Energy
  if (energy <= 0) {
    energy = 0;
    gameOver();
  }

  updateHUD();
}

// --- Render Frame ---
function renderFrame() {
  const W = canvas.width;
  const H = canvas.height;

  ctx.clearRect(0, 0, W, H);
  drawSky(W, H);
  drawGround(W, H);

  const camZ = playerZ;
  const baseIdx = ((Math.floor(camZ / SEG_LENGTH) % NUM_SEGMENTS) + NUM_SEGMENTS) % NUM_SEGMENTS;

  // --- Step 1: Project all segments from near to far, accumulating curve offset ---
  // This is the classic OutRun-style approach:
  // Walk from the nearest segment outward, accumulating a horizontal offset (x)
  // based on each segment's curve value. This makes curves appear natural.
  const projected = [];
  let curveX = 0;    // accumulated curve offset in screen space
  let curveDX = 0;   // rate of curve change

  for (let i = 1; i <= DRAW_DIST; i++) {
    const idx = ((baseIdx + i) % NUM_SEGMENTS + NUM_SEGMENTS) % NUM_SEGMENTS;
    const seg = segments[idx];

    // World Z of this segment, handling wrap-around
    let worldZ = seg.z;
    if (worldZ < camZ) worldZ += TRACK_LENGTH;

    // Hill: smooth vertical offset
    const hillY = seg.hill * 20;

    const p = project(worldZ, camZ, CAM_HEIGHT + hillY, W, H);
    if (!p) continue;

    // Apply accumulated curve offset and player position
    curveX += curveDX;
    p.x += curveX - playerX * p.w * 0.5;

    // Accumulate curve for next segment
    curveDX += seg.curve * p.scale * SEG_LENGTH * 0.8;

    projected.push({ seg, p, worldIdx: idx, drawOrder: i });
  }

  // --- Step 2: Draw from far to near (painter's algorithm) with Y clipping ---
  let maxY = H; // tracks the highest (smallest Y) drawn row, for back-face clipping

  for (let i = projected.length - 1; i > 0; i--) {
    const far = projected[i];
    const near = projected[i - 1];

    // Skip if completely below the clip line
    if (far.p.y >= maxY && near.p.y >= maxY) continue;

    // Draw road segment: near is bottom, far is top
    drawSegment(
      near.p.x, near.p.y, near.p.w,
      far.p.x, far.p.y, far.p.w,
      far.worldIdx, maxY
    );

    // Draw obstacle on far segment
    drawObstacle(far.seg, far.p, far.worldIdx);

    // Update clip line
    if (far.p.y < maxY) maxY = far.p.y;
  }

  // Speed lines effect
  if (playerSpeed > 150) {
    const alpha = (playerSpeed - 150) / (MAX_SPEED - 150) * 0.12;
    ctx.strokeStyle = `rgba(255,255,255,${alpha})`;
    ctx.lineWidth = 1;
    for (let i = 0; i < 6; i++) {
      const lx = W * 0.1 + Math.random() * W * 0.8;
      const ly = H * 0.5 + Math.random() * H * 0.3;
      ctx.beginPath();
      ctx.moveTo(lx, ly);
      ctx.lineTo(lx + (lx - W / 2) * 0.3, ly + 30 + Math.random() * 20);
      ctx.stroke();
    }
  }

  drawPlayer(W, H);

  // HUD on canvas
  ctx.fillStyle = 'rgba(0,212,255,0.8)';
  ctx.font = 'bold 28px monospace';
  ctx.textAlign = 'left';
  ctx.fillText(`${Math.round(playerSpeed)} km/h`, 16, 36);

  ctx.font = 'bold 14px monospace';
  ctx.fillStyle = 'rgba(255,255,255,0.4)';
  ctx.fillText(`LAP ${lapCount}`, 16, 56);
}

// --- Game Loop ---
let lastTime = 0;
function loop(time) {
  const dt = Math.min((time - lastTime) / 1000, 0.04); // cap at 25fps minimum
  lastTime = time;

  update(dt);
  renderFrame();
  requestAnimationFrame(loop);
}

requestAnimationFrame(time => {
  lastTime = time;
  loop(time);
});
</script>
</body>
</html>
