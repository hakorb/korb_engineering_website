<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>F-Zero Lite</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <main class="game-shell">
    <section class="board-wrap">
      <canvas id="game" width="480" height="480" aria-label="Racing track"></canvas>
      <div id="overlay" class="overlay hidden">
        <h1 id="overlay-title">Paused</h1>
        <p id="overlay-text">Press P to resume</p>
      </div>
    </section>

    <aside class="panel">
      <h1>F-Zero Lite</h1>
      <div class="stat"><span>Score</span><strong id="score">0</strong></div>
      <div class="stat"><span>Speed</span><strong id="length">0</strong></div>

      <button id="restart" type="button">Restart (R)</button>
      <button id="pause" type="button">Pause (P)</button>

      <div class="touch-controls" aria-label="On-screen controls">
        <button id="up" type="button" class="control">Boost</button>
        <div class="touch-row">
          <button id="left" type="button" class="control">Left</button>
          <button id="down" type="button" class="control">Brake</button>
          <button id="right" type="button" class="control">Right</button>
        </div>
      </div>

      <h2>Controls</h2>
      <ul>
        <li>A / D or Left / Right: Steer</li>
        <li>W / S or Up / Down: Boost / Brake</li>
        <li>P: Pause</li>
        <li>R: Restart</li>
      </ul>
    </aside>
  </main>

  <script src="script.js"></script>
</body>
</html>
