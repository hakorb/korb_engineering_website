// ============ AUDIO ENGINE ============
const AudioCtx=window.AudioContext||window.webkitAudioContext;
let actx=null;
function initAudio(){if(!actx)actx=new AudioCtx()}
function playTone(freq,dur,type,vol,detune){
  if(!actx)return;
  const o=actx.createOscillator(),g=actx.createGain();
  o.type=type||'square';o.frequency.value=freq;
  if(detune)o.detune.value=detune;
  g.gain.setValueAtTime((vol||0.1),actx.currentTime);
  g.gain.exponentialRampToValueAtTime(0.001,actx.currentTime+(dur||0.1));
  o.connect(g);g.connect(actx.destination);
  o.start();o.stop(actx.currentTime+(dur||0.1));
}
function playNoise(dur,vol){
  if(!actx)return;
  const buf=actx.createBuffer(1,actx.sampleRate*(dur||0.1),actx.sampleRate);
  const d=buf.getChannelData(0);
  for(let i=0;i<d.length;i++)d[i]=(Math.random()*2-1);
  const src=actx.createBufferSource(),g=actx.createGain();
  src.buffer=buf;g.gain.setValueAtTime(vol||0.05,actx.currentTime);
  g.gain.exponentialRampToValueAtTime(0.001,actx.currentTime+(dur||0.1));
  src.connect(g);g.connect(actx.destination);src.start();
}

// Dual-oscillator engine for richer sound
let engineOsc1=null,engineOsc2=null,engineGain=null,engineFilter=null;
function startEngine(){
  if(!actx||engineOsc1)return;
  engineGain=actx.createGain();
  engineFilter=actx.createBiquadFilter();
  engineFilter.type='lowpass';engineFilter.frequency.value=600;engineFilter.Q.value=2;
  engineOsc1=actx.createOscillator();engineOsc1.type='sawtooth';engineOsc1.frequency.value=80;
  engineOsc2=actx.createOscillator();engineOsc2.type='square';engineOsc2.frequency.value=40;engineOsc2.detune.value=7;
  const g1=actx.createGain();g1.gain.value=0.03;
  const g2=actx.createGain();g2.gain.value=0.015;
  engineOsc1.connect(g1);engineOsc2.connect(g2);
  g1.connect(engineFilter);g2.connect(engineFilter);
  engineFilter.connect(engineGain);engineGain.connect(actx.destination);
  engineGain.gain.value=0.04;
  engineOsc1.start();engineOsc2.start();
}
function updateEngine(speed,maxSpeed){
  if(!engineOsc1)return;
  const r=speed/maxSpeed;
  engineOsc1.frequency.value=55+r*220;
  engineOsc2.frequency.value=27+r*110;
  engineGain.gain.value=0.02+r*0.06;
  engineFilter.frequency.value=400+r*2000;
}
function stopEngine(){
  if(engineOsc1){engineOsc1.stop();engineOsc2.stop();engineOsc1=null;engineOsc2=null;engineGain=null;engineFilter=null}
}
function sfxBoost(){playTone(180,0.35,'sawtooth',0.09);playTone(360,0.2,'square',0.04);playNoise(0.18,0.07)}
function sfxCollision(){
  playNoise(0.25,0.14);playTone(70,0.2,'square',0.12);playTone(140,0.1,'sawtooth',0.06);
}
function sfxScrape(){playNoise(0.12,0.06);playTone(200,0.08,'sawtooth',0.03)}
function sfxTireScreech(){
  if(!actx)return;
  const buf=actx.createBuffer(1,actx.sampleRate*0.15,actx.sampleRate);
  const d=buf.getChannelData(0);
  for(let i=0;i<d.length;i++){d[i]=(Math.random()*2-1)*Math.exp(-i/(actx.sampleRate*0.08))}
  const src=actx.createBufferSource(),g=actx.createGain(),f=actx.createBiquadFilter();
  src.buffer=buf;f.type='bandpass';f.frequency.value=3000;f.Q.value=5;
  g.gain.value=0.04;src.connect(f);f.connect(g);g.connect(actx.destination);src.start();
}
function sfxLap(){playTone(880,0.1,'square',0.08);setTimeout(()=>playTone(1100,0.15,'square',0.08),120)}

}

// Background music
let musicPlaying=false,musicInterval=null;
function startMusic(){
  if(musicPlaying||!actx)return;musicPlaying=true;
  let beat=0;const bpm=150;const interval=60000/bpm/2;
  const bassline=[65,65,82,82,98,98,82,82,65,65,73,73,87,87,73,73];
  const melody=[523,0,659,0,784,784,659,0,523,0,784,0,659,523,0,0];
  musicInterval=setInterval(()=>{
    const b=bassline[beat%bassline.length];
    if(b)playTone(b,0.08,'square',0.025);
    const m=melody[beat%melody.length];
    if(m)playTone(m,0.06,'triangle',0.02);
    beat++;
  },interval);
}
function stopMusic(){if(musicInterval){clearInterval(musicInterval);musicInterval=null;musicPlaying=false}}

const keys={};
document.addEventListener('keydown',e=>{keys[e.code]=true;if(['ArrowUp','ArrowDown','ArrowLeft','ArrowRight','Space'].includes(e.code))e.preventDefault()});
document.addEventListener('keyup',e=>{keys[e.code]=false});
const touch={left:false,right:false,up:false,boost:false,brake:false};
function setupTouch(id,prop){
  const el=document.getElementById(id);if(!el)return;
  const on=()=>{touch[prop]=true;try{navigator.vibrate&&navigator.vibrate(10)}catch(e){}};
  const off=()=>{touch[prop]=false};
  el.addEventListener('touchstart',e=>{e.preventDefault();on()},{passive:false});
  el.addEventListener('touchend',e=>{e.preventDefault();off()},{passive:false});
  el.addEventListener('touchcancel',off);
  el.addEventListener('mousedown',on);el.addEventListener('mouseup',off);el.addEventListener('mouseleave',off);
}

setupTouch('btn-up','up');setupTouch('btn-boost','boost');setupTouch('btn-brake','brake');

function inputLeft(){return keys.ArrowLeft||keys.KeyA||touch.left}
function inputRight(){return keys.ArrowRight||keys.KeyD||touch.right}
function inputAccel(){return keys.ArrowUp||keys.KeyW||touch.up}
function inputBrake(){return keys.ArrowDown||keys.KeyS||touch.brake}
function inputBoost(){return keys.Space||keys.ShiftLeft||keys.ShiftRight||touch.boost}

  const t=[];

        oilSlick:s.oilSlick||false,narrow:s.narrow||false,chicane:s.chicane||false});
    }
  }
  return t;
}

// ============ GAME STATE ============
const STATES={TITLE:0,VEHICLE_SELECT:1,TRACK_SELECT:2,COUNTDOWN:3,RACING:4,RESULTS:5,PAUSE:6};
let state=STATES.TITLE;
let selectedVehicle=0,selectedTrack=0;

// Race state
let player,aiRacers,track,lapCount,totalLaps,raceTime,bestLapTime,lapStartTime;
let countdownTimer,countdownVal;
let shakeX=0,shakeY=0,shakeDur=0,shakeIntensity=0;
let finalPosition,finalTime;
let sparks=[]; // collision spark particles
let speedLines=[]; // persistent speed line particles
let screechTimer=0;

// High scores
let highScores=JSON.parse(localStorage.getItem('fzero_scores')||'{}');
function saveScore(trackName,time,pos){
  if(!highScores[trackName])highScores[trackName]=[];
  highScores[trackName].push({time,pos,date:Date.now()});
  highScores[trackName].sort((a,b)=>a.time-b.time);
  highScores[trackName]=highScores[trackName].slice(0,5);
  localStorage.setItem('fzero_scores',JSON.stringify(highScores));
}

// ============ PSEUDO-3D ROAD RENDERING ============
const ROAD_W=2000;
const SEG_LEN=200;
const DRAW_DIST=180;
const CAMERA_H=1500;
const BASE_FOV=80;
const CAMERA_DEPTH=1/(Math.tan((BASE_FOV/2)*Math.PI/180));

function project(point,camX,camY,camZ,screenW,screenH,fovMult){
  const tX=point.worldX-camX;
  const tY=point.worldY-camY;
  const tZ=point.worldZ-camZ;
  if(tZ<=0)return null;
  const depth=CAMERA_DEPTH/fovMult;
  const scale=depth/tZ*screenH;
  return{
    x:screenW/2+scale*tX,
    y:screenH/2-scale*tY,
    w:scale*ROAD_W,
    scale:scale
  };
}

// ============ AI RACER ============
function createAI(idx){
  const v=VEHICLES[idx%VEHICLES.length];
  return{
    vehicleIdx:idx%VEHICLES.length,
    color:v.color,color2:v.color2,name:v.name,
    position:SEG_LEN*(3+idx*4),
    x:(idx%3-1)*0.3,
    speed:0,maxSpeed:275+idx*6,
    baseMaxSpeed:275+idx*6,
    energy:100,lap:0,lapProgress:0,
    targetX:(idx%3-1)*0.4,
    wobbleT:Math.random()*100,
    aggressiveness:0.5+Math.random()*0.5,
    racingLine:0, // ideal line for current curve
    reactTime:0.3+Math.random()*0.4, // reaction delay
    lookAhead:5+Math.floor(Math.random()*10), // how far AI looks ahead
    overtakeTimer:0,
    draftBoost:0,
    boosting:false,
    boostTimer:0,
  };
}

// ============ INITIALIZE RACE ============
function initRace(){
  const v=VEHICLES[selectedVehicle];
  const t=TRACKS[selectedTrack];
  track=t;totalLaps=5;

  const speedMult=0.85+v.stats.speed*0.03;
  const boostMult=0.7+v.stats.boost*0.05;
  const gripMult=0.6+v.stats.grip*0.06;
  const bodyMult=0.5+v.stats.body*0.06;

  player={
    position:0,x:0,speed:0,
    maxSpeed:300*speedMult,
    accel:2200*speedMult*0.7,
    decel:1800,brakeForce:3500,
    grip:gripMult,
    boostPower:boostMult,
    bodyArmor:bodyMult,
    energy:100,
    lap:0,lapTimes:[],
    offroad:false,boosting:false,boostTimer:0,
    jumpTimer:0,jumpHeight:0,
    steer:0,steerSmooth:0,tilt:0,
    invuln:0,
    color:v.color,color2:v.color2,
    wallScrapeTimer:0,
    oilTimer:0, // sliding on oil
    rpm:0, // for tachometer
  };

  aiRacers=[];
  for(let i=0;i<5;i++)aiRacers.push(createAI(i));
  aiRacers.forEach((ai,i)=>{ai.position=SEG_LEN*(3+i*4)});

  lapCount=0;raceTime=0;bestLapTime=Infinity;lapStartTime=0;
  countdownVal=3;countdownTimer=0;
  shakeX=0;shakeY=0;shakeDur=0;shakeIntensity=0;
  sparks=[];speedLines=[];screechTimer=0;

  state=STATES.COUNTDOWN;
  initAudio();startEngine();startMusic();
}

// ============ SPARK PARTICLES ============
function spawnSparks(x,y,count,color){
  for(let i=0;i<count;i++){
    sparks.push({
      x,y,
      vx:(Math.random()-0.5)*300,
      vy:-Math.random()*200-50,
      life:0.3+Math.random()*0.4,
      maxLife:0.3+Math.random()*0.4,
      color:color||'#ffaa44',
      size:1+Math.random()*2
    });
  }
}

function updateSparks(dt){
  for(let i=sparks.length-1;i>=0;i--){
    const s=sparks[i];
    s.x+=s.vx*dt;s.y+=s.vy*dt;s.vy+=400*dt;s.life-=dt;
    if(s.life<=0)sparks.splice(i,1);
  }
}

function drawSparks(){
  sparks.forEach(s=>{
    X.globalAlpha=s.life/s.maxLife;
    X.fillStyle=s.color;
    X.fillRect(s.x-s.size/2,s.y-s.size/2,s.size,s.size);
  });
  X.globalAlpha=1;
}

// ============ UPDATE ============
let lastTime=0;
let warnTimer=0;

function update(dt){
  if(state===STATES.COUNTDOWN){
    countdownTimer+=dt;
    const newVal=3-Math.floor(countdownTimer);
    if(newVal!==countdownVal&&newVal>=0){countdownVal=newVal;sfxCountdown(newVal===0)}
    if(countdownTimer>=4.0){state=STATES.RACING;lapStartTime=0;raceTime=0}
    return;
  }
  if(state!==STATES.RACING)return;

  const tLen=track.segments.length*SEG_LEN;
  raceTime+=dt;
  if(lapStartTime===0)lapStartTime=raceTime;

  // Shake decay
  if(shakeDur>0){
    shakeDur-=dt;
    const f=shakeDur*shakeIntensity;
    shakeX=(Math.random()-0.5)*f*50;
    shakeY=(Math.random()-0.5)*f*25;
  }else{shakeX=0;shakeY=0}

  // Input
  const accelInput=inputAccel()?1:(inputBrake()?-1:0);
  const steerInput=(inputLeft()?-1:0)+(inputRight()?1:0);
  const boostInput=inputBoost();

  // Smooth steering (lerp toward target)
  const steerTarget=steerInput;
  const steerSpeed=player.oilTimer>0?2:8; // sluggish on oil
  player.steerSmooth+=(steerTarget-player.steerSmooth)*Math.min(1,dt*steerSpeed);

  // Acceleration
  if(accelInput>0){
    player.speed+=player.accel*dt;
  }else if(accelInput<0){
    player.speed-=player.brakeForce*dt;
  }else{
    player.speed-=player.decel*dt*0.4;
  }

  // Boost
  if(boostInput&&player.energy>1&&player.boostTimer<=0){
    player.boosting=true;
    player.speed+=800*player.boostPower*dt;
    player.energy-=30*dt;
    if(player.boostTimer<=0)player.boostTimer=0.05;
  }else{
    player.boosting=false;
  }
  if(player.boostTimer>0)player.boostTimer-=dt;

  // Speed clamp
  const maxSpd=player.offroad?player.maxSpeed*0.4:
    player.boosting?player.maxSpeed*1.35:player.maxSpeed;
  player.speed=Math.max(0,Math.min(player.speed,maxSpd));

  // RPM for tachometer (visual only)
  const targetRPM=player.speed/player.maxSpeed;
  player.rpm+=(targetRPM-player.rpm)*dt*6;

  // Current segment
  const segIdx=Math.floor(player.position/SEG_LEN)%track.segments.length;
  const seg=track.segments[segIdx];

  // Centrifugal force
  const speedRatio=player.speed/player.maxSpeed;
  const centrifugal=seg.curve*speedRatio*speedRatio*0.003;
  player.x+=centrifugal*dt*60;

  // Wind (Death Wind)
  if(track.wind){
    player.x+=Math.sin(raceTime*0.7)*0.006*dt*60;
  }

  // Oil slick
  if(player.oilTimer>0){
    player.oilTimer-=dt;
    // Reduce grip and add random drift
    player.x+=Math.sin(raceTime*8)*0.01*dt*60;
  }

  // Steering (uses smoothed value)
  const gripFactor=player.oilTimer>0?player.grip*0.3:player.grip;
  const steerForce=0.038*gripFactor;
  player.x+=player.steerSmooth*steerForce*dt*60;
  player.steer=player.steerSmooth;
  player.tilt+=(player.steerSmooth*0.4-player.tilt)*dt*10;

  // Tire screech on hard turns at speed
  if(Math.abs(player.steerSmooth)>0.7&&speedRatio>0.5){
    screechTimer-=dt;
    if(screechTimer<=0){sfxTireScreech();screechTimer=0.25}
  }

  // Offroad
  const trackWidth=seg.narrow?0.7:1.0;
  player.offroad=Math.abs(player.x)>trackWidth;
  if(player.offroad){
    player.speed*=(1-2.5*dt);
    player.energy-=8*dt;
  }

  // Wall bounce - more impactful
  const wallLimit=seg.narrow?1.0:1.4;
  if(Math.abs(player.x)>wallLimit){
    const side=Math.sign(player.x);
    player.x=side*wallLimit;
    const impactSpeed=player.speed;
    player.speed*=0.55; // harder bounce
    // Bounce the player off the wall
    player.steerSmooth=-side*0.6;
    if(player.invuln<=0){
      player.energy-=6/player.bodyArmor;
      shakeDur=0.4;shakeIntensity=1.2;
      sfxCollision();
      // Wall sparks
      const sparkY=H*0.78;
      const sparkX=side>0?W/2+40:W/2-40;
      spawnSparks(sparkX,sparkY,12,'#ffcc44');
    }
    player.wallScrapeTimer=0.2;
  }

  // Wall scraping
  if(player.wallScrapeTimer>0){
    player.wallScrapeTimer-=dt;
    if(Math.random()<0.3){
      const side=Math.sign(player.x);
      spawnSparks(W/2+side*35,H*0.78,2,'#ffaa22');
    }
  }

  // Oil slick segments
  if(seg.oilSlick&&Math.abs(player.x)<0.6){
    if(player.oilTimer<=0){sfxOilSlip()}
    player.oilTimer=0.8;
  }

  // Narrow section speed warning
  if(seg.narrow&&Math.abs(player.x)>0.5&&speedRatio>0.6){
    // Rubbing against narrow walls
    player.speed*=(1-1.5*dt);
  }

  // Boost pads
  if(seg.boostPad&&Math.abs(player.x)<0.6){
    player.speed=Math.min(player.speed+200*dt*60,player.maxSpeed*1.4);
    if(Math.random()<0.1)sfxBoost();
  }

  // Pit zones
  if(seg.pitZone&&Math.abs(player.x)<0.5){
    player.energy=Math.min(100,player.energy+40*dt);
  }

  // Jump
  if(seg.jump&&player.jumpTimer<=0&&player.speed>50){
    player.jumpTimer=0.8;
  }
  if(player.jumpTimer>0){
    player.jumpTimer-=dt;
    player.jumpHeight=Math.sin((0.8-player.jumpTimer)/0.8*Math.PI)*150;
    if(player.jumpTimer<=0)player.jumpHeight=0;
  }

  // Move player
  player.position+=player.speed*dt;
  if(player.invuln>0)player.invuln-=dt;

  // Lap tracking
  const newLap=Math.floor(player.position/tLen);
  if(newLap>player.lap){
    const lapTime=raceTime-lapStartTime;
    player.lapTimes.push(lapTime);
    if(lapTime<bestLapTime)bestLapTime=lapTime;
    player.lap=newLap;lapCount=player.lap;
    lapStartTime=raceTime;
    player.energy=Math.min(100,player.energy+20);
    sfxLap();
    if(player.lap>=totalLaps){
      finishRace();return;
    }
  }

  // Energy warning
  if(player.energy<25){
    warnTimer+=dt;
    if(warnTimer>0.5){warnTimer=0;sfxWarn()}
  }

  // Energy death
  if(player.energy<=0){
    player.energy=0;player.speed=0;
    sfxGameOver();stopMusic();stopEngine();
    finalPosition=6;finalTime=raceTime;
    state=STATES.RESULTS;return;
  }

  // Update AI racers (competitive behavior)
  updateAI(dt,tLen);

  // Update engine sound
  updateEngine(player.speed,player.maxSpeed);

  // Update sparks
  updateSparks(dt);
}

// ============ COMPETITIVE AI ============
function updateAI(dt,tLen){
  const playerProgress=player.lap*tLen+player.position%tLen;

  aiRacers.forEach((ai,idx)=>{
    const aiSeg=Math.floor(ai.position/SEG_LEN)%track.segments.length;
    const aSeg=track.segments[aiSeg];

    // Look ahead for curves to plan racing line
    let upcomingCurve=0;
    for(let la=1;la<=ai.lookAhead;la++){
      const laIdx=(aiSeg+la)%track.segments.length;
      upcomingCurve+=track.segments[laIdx].curve;
    }

    // Rubber banding - AI adjusts speed based on player position
    const aiProgress=ai.lap*tLen+ai.position%tLen;
    const progressDiff=aiProgress-playerProgress;
    let rubberBand=1.0;
    if(progressDiff>tLen*0.3){
      // AI is far ahead - slow down slightly
      rubberBand=0.88;
    }else if(progressDiff<-tLen*0.2){
      // AI is behind - speed up
      rubberBand=1.12;
    }else if(progressDiff<0){
      // Slightly behind - catch up gently
      rubberBand=1.0+(-progressDiff/(tLen*0.2))*0.08;
    }

    // Calculate ideal speed for current curve
    const curvePenalty=Math.abs(aSeg.curve)*0.035*ai.aggressiveness;
    const baseTarget=ai.baseMaxSpeed*(1-curvePenalty)*rubberBand;

    // Brake before sharp curves (look ahead)
    let brakeForCurve=false;
    for(let la=1;la<=5;la++){
      const laIdx=(aiSeg+la)%track.segments.length;
      if(Math.abs(track.segments[laIdx].curve)>5){brakeForCurve=true;break}
    }

    let targetSpeed=brakeForCurve?baseTarget*0.75:baseTarget;
    targetSpeed*=(0.92+ai.aggressiveness*0.12);

    // Speed adjustment (smoother acceleration/deceleration)
    const speedDiff=targetSpeed-ai.speed;
    if(speedDiff>0){
      ai.speed+=Math.min(speedDiff,1800*dt);
    }else{
      ai.speed+=Math.max(speedDiff,-1200*dt);
    }
    ai.speed=Math.max(60,Math.min(ai.speed,ai.baseMaxSpeed*1.3));

    // Drafting - speed boost when behind another racer
    ai.draftBoost=0;
    aiRacers.forEach((other,oi)=>{
      if(oi===idx)return;
      const posDiff=other.position-ai.position;
      if(posDiff>0&&posDiff<SEG_LEN*5&&Math.abs(other.x-ai.x)<0.3){
        ai.draftBoost=Math.max(ai.draftBoost,30*(1-posDiff/(SEG_LEN*5)));
      }
    });
    // Also draft off player
    const pDiff=player.position-ai.position;
    if(pDiff>0&&pDiff<SEG_LEN*5&&Math.abs(player.x-ai.x)<0.3){
      ai.draftBoost=Math.max(ai.draftBoost,30*(1-pDiff/(SEG_LEN*5)));
    }
    ai.speed+=ai.draftBoost*dt*10;

    // AI racing line: steer toward ideal line for upcoming curve
    const idealLine=-upcomingCurve*0.04*ai.aggressiveness;
    const clampedIdeal=Math.max(-0.7,Math.min(0.7,idealLine));

    // Overtaking behavior
    ai.overtakeTimer-=dt;
    if(ai.overtakeTimer<=0){
      // Check for other racers nearby and try to pass
      let blocked=false;
      aiRacers.forEach((other,oi)=>{
        if(oi===idx)return;
        const pd=other.position-ai.position;
        if(pd>0&&pd<SEG_LEN*3&&Math.abs(other.x-ai.x)<0.35){
          blocked=true;
          // Move to opposite side to overtake
          ai.targetX=other.x>0?-0.4:0.4;
          ai.speed+=50*dt; // push harder when overtaking
        }
      });
      // Also try to overtake player
      const ppd=player.position-ai.position;
      if(ppd>0&&ppd<SEG_LEN*4&&Math.abs(player.x-ai.x)<0.4){
        blocked=true;
        ai.targetX=player.x>0?-0.5:0.5;
        ai.speed+=60*dt;
      }
      if(!blocked){
        ai.targetX=clampedIdeal;
      }
      ai.overtakeTimer=0.5+Math.random()*0.5;
    }

    // Smooth steering toward target
    const steerRate=2.5+ai.aggressiveness*1.5;
    ai.x+=(ai.targetX-ai.x)*dt*steerRate;

    // Small wobble for realism
    ai.wobbleT+=dt;
    ai.x+=Math.sin(ai.wobbleT*1.5+idx*3)*0.002;

    // Avoid walls
    if(Math.abs(ai.x)>1.1){
      ai.x+=-Math.sign(ai.x)*dt*3;
      ai.speed*=0.95;
    }
    ai.x=Math.max(-1.3,Math.min(1.3,ai.x));

    // Boost pads for AI
    if(aSeg.boostPad&&Math.abs(ai.x)<0.6){
      ai.speed=Math.min(ai.speed+100*dt*60,ai.baseMaxSpeed*1.3);
    }

    // Oil slick effect on AI
    if(aSeg.oilSlick&&Math.abs(ai.x)<0.5){
      ai.x+=Math.sin(raceTime*6+idx)*0.005*dt*60;
      ai.speed*=(1-0.5*dt);
    }

    // Occasional AI boost (on straightaways)
    if(Math.abs(aSeg.curve)<1&&Math.random()<0.002&&ai.energy>20){
      ai.boosting=true;ai.boostTimer=0.5;
    }
    if(ai.boostTimer>0){
      ai.boostTimer-=dt;
      ai.speed=Math.min(ai.speed+200*dt,ai.baseMaxSpeed*1.3);
      if(ai.boostTimer<=0)ai.boosting=false;
    }

    ai.position+=ai.speed*dt;

    // AI lap tracking
    const aiNewLap=Math.floor(ai.position/tLen);
    if(aiNewLap>ai.lap)ai.lap=aiNewLap;

    // Collision with player - more impactful
    const posDiff=Math.abs(ai.position-player.position);
    const xDiff=Math.abs(ai.x-player.x);
    if(posDiff<SEG_LEN*1.5&&xDiff<0.3&&player.invuln<=0){
      const push=Math.sign(player.x-ai.x)*0.08;
      player.x+=push;ai.x-=push*0.6;
      player.speed*=0.88;ai.speed*=0.92;
      player.energy-=4/player.bodyArmor;
      shakeDur=0.25;shakeIntensity=0.8;
      sfxCollision();
      player.invuln=0.3;
      // Collision sparks
      const sparkX=W/2+push*200;
      spawnSparks(sparkX,H*0.78,8,ai.color);
    }

    // AI-AI collisions
    aiRacers.forEach((other,oi)=>{
      if(oi<=idx)return;
      const pd=Math.abs(other.position-ai.position);
      const xd=Math.abs(other.x-ai.x);
      if(pd<SEG_LEN&&xd<0.25){
        const push=Math.sign(ai.x-other.x)*0.03;
        ai.x+=push;other.x-=push;
        ai.speed*=0.96;other.speed*=0.96;
      }
    });
  });
}

function finishRace(){
  stopMusic();stopEngine();
  finalTime=raceTime;
  const tLen=track.segments.length*SEG_LEN;
  let pos=1;
  aiRacers.forEach(ai=>{
    if(ai.lap>player.lap||(ai.lap===player.lap&&ai.position%tLen>player.position%tLen))pos++;
  });
  finalPosition=pos;
  if(pos<=3)sfxVictory();else sfxGameOver();
  saveScore(track.name,finalTime,finalPosition);
  state=STATES.RESULTS;
}

function getPositions(){
  const tLen=track.segments.length*SEG_LEN;
  const all=[{name:'YOU',lap:player.lap,pos:player.position%tLen,total:player.position,isPlayer:true}];
  aiRacers.forEach(ai=>{
    all.push({name:ai.name,lap:ai.lap,pos:ai.position%tLen,total:ai.position,isPlayer:false,color:ai.color});
  });
  all.sort((a,b)=>b.total-a.total);
  return all;
}

// ============ RENDER ============
function formatTime(t){
  if(t===Infinity||t===undefined)return '--:--.---';
  const m=Math.floor(t/60);
  const s=t%60;
  return `${m}:${s<10?'0':''}${s.toFixed(3)}`;
}
function ordinal(n){
  const s=['th','st','nd','rd'];
  const v=n%100;
  return n+(s[(v-20)%10]||s[v]||s[0]);
}

function render(){
  X.clearRect(0,0,W,H);

  switch(state){
    case STATES.TITLE:renderTitle();break;
    case STATES.VEHICLE_SELECT:renderVehicleSelect();break;
    case STATES.TRACK_SELECT:renderTrackSelect();break;
    case STATES.COUNTDOWN:
    case STATES.RACING:renderRace();break;
    case STATES.RESULTS:renderResults();break;
    case STATES.PAUSE:renderRace();renderPause();break;
  }
}

function renderTitle(){
  const g=X.createLinearGradient(0,0,0,H);
  g.addColorStop(0,'#0a0020');g.addColorStop(1,'#0a0a12');
  X.fillStyle=g;X.fillRect(0,0,W,H);

  const t=performance.now()*0.001;
  X.fillStyle='#ffffff';
  for(let i=0;i<80;i++){
    const sx=(Math.sin(i*73.7+t*0.1)*0.5+0.5)*W;
    const sy=(Math.cos(i*91.3+t*0.05)*0.5+0.5)*H;
    const sz=1+Math.sin(i*17+t*2)*0.5;
    X.globalAlpha=0.3+Math.sin(i*31+t*3)*0.3;
    X.fillRect(sx,sy,sz,sz);
  }
  X.globalAlpha=1;

  // Dramatic speed lines converging to center
  for(let i=0;i<30;i++){
    const angle=(i/30)*Math.PI*2;
    const dist=200+Math.sin(t*2+i*0.5)*80;
    const len=80+Math.sin(t*3+i)*50;
    const sx=W/2+Math.cos(angle)*dist;
    const sy=H*0.33+Math.sin(angle)*dist*0.4;
    X.strokeStyle=`rgba(0,212,255,${0.04+Math.sin(t+i)*0.02})`;
    X.lineWidth=1.5;
    X.beginPath();
    X.moveTo(sx,sy);
    X.lineTo(sx+Math.cos(angle)*len,sy+Math.sin(angle)*len*0.4);
    X.stroke();
  }

  const glow=Math.sin(t*3)*0.3+0.7;
  X.save();
  X.textAlign='center';X.textBaseline='middle';

  X.shadowColor='#00d4ff';X.shadowBlur=40*glow;
  X.fillStyle='#00d4ff';
  X.font=`bold ${Math.min(W*0.1,80)}px "Segoe UI",sans-serif`;
  X.fillText('F-ZERO LITE',W/2,H*0.33);

  X.shadowBlur=0;
  X.fillStyle='#ff6600';
  X.font=`${Math.min(W*0.025,20)}px "Segoe UI",sans-serif`;
  X.letterSpacing='0.2em';
  X.fillText('KORB ENGINEERING',W/2,H*0.33+Math.min(W*0.08,60));

  X.globalAlpha=0.5+Math.sin(t*4)*0.5;
  X.fillStyle='#aaccee';
  X.font=`${Math.min(W*0.03,22)}px "Segoe UI",sans-serif`;
  X.fillText('PRESS ENTER OR TAP TO BEGIN',W/2,H*0.65);
  X.globalAlpha=1;

  X.fillStyle='#445566';
  X.font=`${Math.min(W*0.018,14)}px "Segoe UI",sans-serif`;
  X.fillText('ARROWS/WASD: Steer & Accelerate | SPACE/SHIFT: Boost | ESC: Pause',W/2,H*0.78);

  const hs=Object.keys(highScores);
  if(hs.length>0){
    X.fillStyle='#334455';
    X.font=`${Math.min(W*0.015,12)}px "Segoe UI",sans-serif`;
    let yy=H*0.85;
    X.fillText('--- BEST TIMES ---',W/2,yy);
    hs.forEach(k=>{
      yy+=18;
      const best=highScores[k][0];
      X.fillText(`${k}: ${formatTime(best.time)} (${ordinal(best.pos)})`,W/2,yy);
    });
  }

  X.restore();
}

function drawVehiclePreview(cx,cy,size,color,color2,selected,rotation){
  X.save();
  X.translate(cx,cy);
  if(rotation){
    X.rotate(Math.sin(rotation)*0.15);
  }
  const s=size;

  if(selected){
    // Pulsing glow ring
    const gt=performance.now()*0.003;
    X.shadowColor=color;X.shadowBlur=25+Math.sin(gt)*10;
    // Hover effect
    X.translate(0,Math.sin(gt)*3);
  }

  // Body
  X.fillStyle=color;
  X.beginPath();
  X.moveTo(0,-s*0.6);
  X.lineTo(s*0.4,-s*0.1);
  X.lineTo(s*0.5,s*0.2);
  X.lineTo(s*0.3,s*0.5);
  X.lineTo(-s*0.3,s*0.5);
  X.lineTo(-s*0.5,s*0.2);
  X.lineTo(-s*0.4,-s*0.1);
  X.closePath();
  X.fill();

  // Highlight strip
  X.fillStyle='rgba(255,255,255,0.15)';
  X.beginPath();
  X.moveTo(-s*0.1,-s*0.5);
  X.lineTo(s*0.1,-s*0.5);
  X.lineTo(s*0.15,s*0.1);
  X.lineTo(-s*0.15,s*0.1);
  X.closePath();X.fill();

  // Cockpit
  X.fillStyle=color2;
  X.beginPath();
  X.moveTo(0,-s*0.35);
  X.lineTo(s*0.15,s*0.05);
  X.lineTo(-s*0.15,s*0.05);
  X.closePath();
  X.fill();

  // Wings
  X.fillStyle=color2;
  X.beginPath();X.moveTo(-s*0.45,-s*0.05);X.lineTo(-s*0.7,s*0.1);X.lineTo(-s*0.5,s*0.2);X.closePath();X.fill();
  X.beginPath();X.moveTo(s*0.45,-s*0.05);X.lineTo(s*0.7,s*0.1);X.lineTo(s*0.5,s*0.2);X.closePath();X.fill();

  // Engines
  X.fillStyle='#ff6600';
  X.fillRect(-s*0.35,s*0.3,s*0.15,s*0.2);
  X.fillRect(s*0.2,s*0.3,s*0.15,s*0.2);

  // Engine glow
  const gt2=performance.now()*0.005;
  X.globalAlpha=0.5+Math.sin(gt2)*0.3;
  X.fillStyle='#ffaa44';
  X.fillRect(-s*0.32,s*0.45,s*0.09,s*0.12);
  X.fillRect(s*0.23,s*0.45,s*0.09,s*0.12);
  X.globalAlpha=1;

  X.shadowBlur=0;
  X.restore();
}

function renderVehicleSelect(){
  const g=X.createLinearGradient(0,0,0,H);
  g.addColorStop(0,'#0a0020');g.addColorStop(1,'#0a0a12');
  X.fillStyle=g;X.fillRect(0,0,W,H);

  X.save();X.textAlign='center';X.textBaseline='middle';
  X.fillStyle='#00d4ff';X.shadowColor='#00d4ff';X.shadowBlur=15;
  X.font=`bold ${Math.min(W*0.05,40)}px "Segoe UI",sans-serif`;
  X.fillText('SELECT VEHICLE',W/2,H*0.08);
  X.shadowBlur=0;

  const cols=Math.min(4,Math.floor(W/220));
  const cardW=Math.min(220,W/cols-20);
  const startX=W/2-(cols*cardW+(cols-1)*15)/2+cardW/2;
  const time=performance.now()*0.001;

  VEHICLES.forEach((v,i)=>{
    const col=i%cols;
    const row=Math.floor(i/cols);

    const sel=i===selectedVehicle;

    // Card bg with animated border for selected
    if(sel){
      X.fillStyle='rgba(0,212,255,0.12)';
      X.strokeStyle='#00d4ff';
      X.lineWidth=3;
      X.shadowColor='#00d4ff';X.shadowBlur=15;
    }else{
      X.fillStyle='rgba(255,255,255,0.03)';
      X.strokeStyle='#333';
      X.lineWidth=1;
      X.shadowBlur=0;
    }
    const cw=cardW;const ch=cardW*1.6;
    X.beginPath();
    X.roundRect(cx-cw/2,cy-ch*0.3,cw,ch,8);
    X.fill();X.stroke();
    X.shadowBlur=0;

    // Vehicle preview - larger and with subtle animation
    const previewSize=sel?cardW*0.38:cardW*0.3;
    drawVehiclePreview(cx,cy+ch*0.02,previewSize,v.color,v.color2,sel,sel?time:0);

    // Name
    X.fillStyle=sel?v.color:'#888';
    X.font=`bold ${Math.min(18,cardW*0.09)}px "Segoe UI",sans-serif`;
    X.fillText(v.name,cx,cy+ch*0.3);

    // Desc
    X.fillStyle=sel?'#aab':'#556';
    X.font=`${Math.min(13,cardW*0.07)}px "Segoe UI",sans-serif`;
    X.fillText(v.desc,cx,cy+ch*0.38);

    // Stats with labels
    const stats=['speed','boost','grip','body'];
    const labels=['SPD','BST','GRP','BDY'];
    stats.forEach((st,si)=>{
      const sy=cy+ch*0.46+si*20;
      X.fillStyle=sel?'#889':'#556';X.textAlign='left';
      X.font=`${Math.min(12,cardW*0.065)}px "Segoe UI",sans-serif`;
      X.fillText(labels[si],cx-cw*0.4,sy);
      // Bar bg
      const bx=cx-cw*0.15;const bw=cw*0.5;
      X.fillStyle='#1a1a2e';
      X.fillRect(bx,sy-6,bw,10);
      // Bar fill with gradient effect
      const val=v.stats[st]/10;
      const barColor=v.stats[st]>=8?'#00ff88':v.stats[st]>=5?'#00d4ff':'#ff6644';
      X.fillStyle=barColor;
      X.fillRect(bx,sy-6,bw*val,10);
      // Segment marks
      X.fillStyle='rgba(0,0,0,0.3)';
      for(let m=1;m<10;m++){
        X.fillRect(bx+bw*m/10-0.5,sy-6,1,10);
      }
      // Value number
      X.textAlign='right';
      X.fillStyle=sel?'#ccc':'#667';
      X.font=`bold ${Math.min(11,cardW*0.06)}px "Segoe UI",sans-serif`;
      X.fillText(v.stats[st],bx+bw+18,sy+1);
    });
    X.textAlign='center';
  });

  X.fillStyle='#889';
  X.font=`${Math.min(W*0.02,16)}px "Segoe UI",sans-serif`;
  X.fillText('LEFT/RIGHT to choose | ENTER to confirm',W/2,H*0.95);

  X.restore();
}

function renderTrackSelect(){
  const g=X.createLinearGradient(0,0,0,H);
  g.addColorStop(0,'#0a0020');g.addColorStop(1,'#0a0a12');
  X.fillStyle=g;X.fillRect(0,0,W,H);

  X.save();X.textAlign='center';X.textBaseline='middle';
  X.fillStyle='#00d4ff';X.shadowColor='#00d4ff';X.shadowBlur=15;
  X.font=`bold ${Math.min(W*0.05,40)}px "Segoe UI",sans-serif`;
  X.fillText('SELECT TRACK',W/2,H*0.08);
  X.shadowBlur=0;

  const itemH=Math.min(80,H*0.13);
  const listW=Math.min(650,W*0.85);

  TRACKS.forEach((t,i)=>{
    const cy=H*0.2+i*(itemH+10);
    const sel=i===selectedTrack;

    X.fillStyle=sel?'rgba(0,212,255,0.1)':'rgba(255,255,255,0.02)';
    X.strokeStyle=sel?'#00d4ff':'#222';
    X.lineWidth=sel?2:1;
    if(sel){X.shadowColor='#00d4ff';X.shadowBlur=10}
    X.beginPath();
    X.roundRect(W/2-listW/2,cy-itemH/2,listW,itemH,8);
    X.fill();X.stroke();
    X.shadowBlur=0;

    // Track color swatch with gradient
    const sg=X.createLinearGradient(W/2-listW/2+10,cy-15,W/2-listW/2+40,cy+15);
    sg.addColorStop(0,t.skyBot);sg.addColorStop(1,t.rumbleColor);
    X.fillStyle=sg;
    X.fillRect(W/2-listW/2+10,cy-18,35,36);
    // Mini track icon inside swatch
    X.strokeStyle='rgba(255,255,255,0.4)';X.lineWidth=1;
    X.beginPath();X.arc(W/2-listW/2+27,cy,10,0,Math.PI*2);X.stroke();

    // Name
    X.fillStyle=sel?'#fff':'#888';
    X.textAlign='left';
    X.font=`bold ${Math.min(22,itemH*0.35)}px "Segoe UI",sans-serif`;
    X.fillText(t.name,W/2-listW/2+58,cy-10);

    // Desc
    X.fillStyle=sel?'#aab':'#556';
    X.font=`${Math.min(14,itemH*0.22)}px "Segoe UI",sans-serif`;
    X.fillText(t.desc,W/2-listW/2+58,cy+12);

    // Difficulty indicator
    const difficulty=t.wind?'HARD':t.name==='Sand Ocean'||t.name==='Port Town'?'MEDIUM':'NORMAL';
    const diffColor=difficulty==='HARD'?'#ff4466':difficulty==='MEDIUM'?'#ffaa00':'#44dd66';
    X.textAlign='right';
    X.font=`bold ${Math.min(11,itemH*0.16)}px "Segoe UI",sans-serif`;
    X.fillStyle=diffColor;
    X.fillText(difficulty,W/2+listW/2-15,cy-14);

    // High score
    if(highScores[t.name]&&highScores[t.name].length>0){
      X.fillStyle='#ff6600';
      X.font=`${Math.min(14,itemH*0.22)}px "Segoe UI",sans-serif`;
      X.fillText(`Best: ${formatTime(highScores[t.name][0].time)}`,W/2+listW/2-15,cy+8);
    }

    X.textAlign='center';
  });

  X.fillStyle='#889';
  X.font=`${Math.min(W*0.02,16)}px "Segoe UI",sans-serif`;
  X.fillText('UP/DOWN to choose | ENTER to start race',W/2,H*0.95);

  X.restore();
}

function renderRace(){
  const t=track;
  const tLen=t.segments.length*SEG_LEN;
  const baseSegIdx=Math.floor(player.position/SEG_LEN);
  const speedRatio=player.speed/player.maxSpeed;

  X.save();
  X.translate(shakeX,shakeY);

  // Sky gradient
  const skyG=X.createLinearGradient(0,0,0,H/2);
  skyG.addColorStop(0,t.skyTop);skyG.addColorStop(1,t.skyBot);
  X.fillStyle=skyG;X.fillRect(0,0,W,H/2+20);

  // Ground
  X.fillStyle=t.grassColor;
  X.fillRect(0,H/2,W,H/2);

  // Stars/atmosphere
  const time=performance.now()*0.001;
  X.fillStyle='#fff';
  for(let i=0;i<40;i++){
    const sx=(((i*173.7+player.position*0.001)%1)*1.5-0.25)*W;
    const sy=i/40*H*0.45;
    X.globalAlpha=0.2+Math.sin(i*31+time*2)*0.15;
    X.fillRect(sx,sy,1.5,1.5);
  }
  X.globalAlpha=1;

  // Background scenery - parallax layers
  // Far mountains/buildings
  for(let i=0;i<15;i++){
    const bx=(((i*0.067+player.position*0.000015)%1)*1.4-0.2)*W;
    const bh=50+Math.sin(i*7.7)*35;
    X.fillStyle=t.sceneryColor;
    X.globalAlpha=0.04;
    X.fillRect(bx,H/2-bh,30+i%3*20,bh);
  }
  // Mid buildings
  for(let i=0;i<12;i++){
    const bx=(((i*0.083+player.position*0.00003)%1)*1.4-0.2)*W;
    const bh=40+Math.sin(i*5.3)*25;
    X.globalAlpha=0.07;
    X.fillRect(bx,H/2-bh,20+i%4*12,bh);
  }
  // Near buildings
  for(let i=0;i<8;i++){
    const bx=(((i*0.125+player.position*0.00006)%1)*1.4-0.2)*W;
    const bh=30+Math.sin(i*3.1)*20;
    X.globalAlpha=0.1;
    X.fillRect(bx,H/2-bh,15+i%3*10,bh);
  }
  X.globalAlpha=1;

  // Road segments - render back to front
  let camX=player.x*ROAD_W;
  let camY=CAMERA_H+player.jumpHeight;
  let camZ=player.position-SEG_LEN*4;

  // FOV widening at high speed (more dramatic)
  const fovMult=1+speedRatio*0.35;

  let segData=[];
  let cumX=0,cumY=0;
  for(let i=0;i<DRAW_DIST;i++){
    const idx=(baseSegIdx+i)%t.segments.length;
    const seg=t.segments[idx];

    const worldZ=(baseSegIdx+i)*SEG_LEN;
    cumX+=seg.curve*0.6;
    cumY+=(seg.hill||0)*10;

    const point={
      worldX:cumX*35-camX,
      worldY:cumY-camY+CAMERA_H,
      worldZ:worldZ-camZ
    };

    const p=project(point,0,0,0,W,H,fovMult);
    if(p&&p.y>-100){
      p.segIdx=idx;p.seg=seg;p.worldZ=worldZ;
      segData.push(p);
    }
  }

  // Draw road segments back to front
  for(let i=segData.length-1;i>0;i--){
    const p1=segData[i];
    const p0=segData[i-1];
    const seg=p0.seg;
    const idx=p0.segIdx;

    const isEvenSeg=idx%2===0;
    const isNarrow=seg.narrow;
    const roadScale=isNarrow?0.7:1.0;

    // Grass with depth shading
    const depthFade=Math.min(1,i/DRAW_DIST*1.5);
    X.fillStyle=isEvenSeg?t.grassColor:shadeColor(t.grassColor,12);
    X.beginPath();
    X.moveTo(0,p0.y);X.lineTo(W,p0.y);X.lineTo(W,p1.y);X.lineTo(0,p1.y);
    X.fill();

    // Guardrails / barriers
    const barrierW=1.25;
    const barrierInner=1.18;
    // Left guardrail
    X.fillStyle=isEvenSeg?'#555':'#777';
    drawQuad(X,
      p0.x-p0.w*barrierW,p0.y,p0.x-p0.w*barrierInner,p0.y,
      p1.x-p1.w*barrierInner,p1.y,p1.x-p1.w*barrierW,p1.y);
    // Right guardrail
    drawQuad(X,
      p0.x+p0.w*barrierInner,p0.y,p0.x+p0.w*barrierW,p0.y,
      p1.x+p1.w*barrierW,p1.y,p1.x+p1.w*barrierInner,p1.y);
    // Guardrail top highlight
    if(isEvenSeg){
      X.fillStyle=t.rumbleColor;
      X.globalAlpha=0.4;
      drawQuad(X,
        p0.x-p0.w*barrierW,p0.y-1,p0.x-p0.w*barrierInner,p0.y-1,
        p1.x-p1.w*barrierInner,p1.y-1,p1.x-p1.w*barrierW,p1.y-1);
      drawQuad(X,
        p0.x+p0.w*barrierInner,p0.y-1,p0.x+p0.w*barrierW,p0.y-1,
        p1.x+p1.w*barrierW,p1.y-1,p1.x+p1.w*barrierInner,p1.y-1);
      X.globalAlpha=1;
    }

    // Rumble strips (thicker, more detailed)
    const rumbleW=1.15*roadScale;
    const rumbleOuter=rumbleW+0.05;
    // Outer rumble
    X.fillStyle=isEvenSeg?t.rumbleColor:'#eee';
    drawQuad(X,p0.x-p0.w*rumbleOuter,p0.y,p0.x+p0.w*rumbleOuter,p0.y,
      p1.x+p1.w*rumbleOuter,p1.y,p1.x-p1.w*rumbleOuter,p1.y);
    // Inner rumble (creates striped effect)
    X.fillStyle=isEvenSeg?'#fff':t.rumbleColor;
    drawQuad(X,p0.x-p0.w*rumbleW,p0.y,p0.x+p0.w*rumbleW,p0.y,
      p1.x+p1.w*rumbleW,p1.y,p1.x-p1.w*rumbleW,p1.y);

    // Road surface
    let roadColor=t.roadColor;
    if(seg.boostPad&&Math.abs(idx%4)<2)roadColor='#ff660044';
    if(seg.pitZone)roadColor='#004422';
    if(seg.oilSlick)roadColor=isEvenSeg?'#2a2a1a':'#222210';
    X.fillStyle=roadColor;
    drawQuad(X,p0.x-p0.w*roadScale,p0.y,p0.x+p0.w*roadScale,p0.y,
      p1.x+p1.w*roadScale,p1.y,p1.x-p1.w*roadScale,p1.y);

    // Road surface depth shading (darker near horizon)
    if(i>DRAW_DIST*0.6){
      X.fillStyle=t.fogColor;
      X.globalAlpha=(i-DRAW_DIST*0.6)/(DRAW_DIST*0.4)*0.5;
      drawQuad(X,p0.x-p0.w*roadScale,p0.y,p0.x+p0.w*roadScale,p0.y,
        p1.x+p1.w*roadScale,p1.y,p1.x-p1.w*roadScale,p1.y);
      X.globalAlpha=1;
    }

    // Oil slick visual
    if(seg.oilSlick){
      X.fillStyle='rgba(60,50,20,0.5)';
      const ow=p0.w*0.4;
      const oOffset=Math.sin(idx*0.7)*p0.w*0.2;
      drawQuad(X,p0.x+oOffset-ow,p0.y,p0.x+oOffset+ow,p0.y,
        p1.x+oOffset+p1.w*0.4,p1.y,p1.x+oOffset-p1.w*0.4,p1.y);
      // Rainbow sheen
      X.globalAlpha=0.15+Math.sin(time*2+idx)*0.08;
      const rainbowG=X.createLinearGradient(p0.x-ow,p0.y,p0.x+ow,p0.y);
      rainbowG.addColorStop(0,'#ff0066');rainbowG.addColorStop(0.33,'#66ff00');
      rainbowG.addColorStop(0.66,'#0066ff');rainbowG.addColorStop(1,'#ff6600');
      X.fillStyle=rainbowG;
      drawQuad(X,p0.x+oOffset-ow,p0.y,p0.x+oOffset+ow,p0.y,
        p1.x+oOffset+p1.w*0.4,p1.y,p1.x+oOffset-p1.w*0.4,p1.y);
      X.globalAlpha=1;
    }

    // Narrow section warning markers
    if(seg.narrow&&isEvenSeg){
      X.fillStyle='#ff4400';X.globalAlpha=0.6;
      const mw=p0.w*0.05;
      drawQuad(X,p0.x-p0.w*0.72-mw,p0.y,p0.x-p0.w*0.72+mw,p0.y,
        p1.x-p1.w*0.72+mw,p1.y,p1.x-p1.w*0.72-mw,p1.y);
      drawQuad(X,p0.x+p0.w*0.72-mw,p0.y,p0.x+p0.w*0.72+mw,p0.y,
        p1.x+p1.w*0.72+mw,p1.y,p1.x+p1.w*0.72-mw,p1.y);
      X.globalAlpha=1;
    }

    // Chicane markings
    if(seg.chicane){
      X.fillStyle=isEvenSeg?'#ff6600':'#ffaa00';
      X.globalAlpha=0.5;
      const cw=p0.w*0.08;
      const cSide=seg.curve>0?1:-1;
      drawQuad(X,p0.x+p0.w*0.6*cSide-cw,p0.y,p0.x+p0.w*0.6*cSide+cw,p0.y,
        p1.x+p1.w*0.6*cSide+cw,p1.y,p1.x+p1.w*0.6*cSide-cw,p1.y);
      X.globalAlpha=1;
    }

    // Boost pad markings (arrows)
    if(seg.boostPad){
      X.fillStyle=idx%3===0?'#ff8800':'#ffaa00';
      X.globalAlpha=0.5+Math.sin(time*8)*0.3;
      const bw=p0.w*0.3;
      drawQuad(X,p0.x-bw,p0.y,p0.x+bw,p0.y,p1.x+p1.w*0.3,p1.y,p1.x-p1.w*0.3,p1.y);
      // Arrow chevrons
      if(idx%2===0){
        X.fillStyle='#fff';X.globalAlpha=0.3;
        const aw=p0.w*0.15;
        drawQuad(X,p0.x-aw,p0.y,p0.x+aw,p0.y,p1.x+p1.w*0.05,p1.y,p1.x-p1.w*0.05,p1.y);
      }
      X.globalAlpha=1;
    }

    // Pit zone markings
    if(seg.pitZone){
      X.fillStyle='#00ff66';
      X.globalAlpha=0.2+Math.sin(time*4)*0.1;
      const pw=p0.w*0.25;
      drawQuad(X,p0.x-pw,p0.y,p0.x+pw,p0.y,p1.x+p1.w*0.25,p1.y,p1.x-p1.w*0.25,p1.y);
      // Cross markers
      if(idx%3===0){
        X.fillStyle='#00ff66';X.globalAlpha=0.15;
        const cw=p0.w*0.02;
        drawQuad(X,p0.x-pw,p0.y,p0.x+pw,p0.y,p1.x+p1.w*0.25,p1.y,p1.x-p1.w*0.25,p1.y);
      }
      X.globalAlpha=1;
    }

    // Road center line
    if(isEvenSeg){
      X.fillStyle=t.lineColor;
      const lw=p0.w*0.02;
      drawQuad(X,p0.x-lw,p0.y,p0.x+lw,p0.y,p1.x+p1.w*0.02,p1.y,p1.x-p1.w*0.02,p1.y);
    }

    // Lane lines (dashed)
    if(idx%4<2){
      X.fillStyle=t.lineColor;
      const lanes=[-0.5,0.5];
      lanes.forEach(l=>{
        const lw=p0.w*0.01;
        const ox0=p0.w*l*roadScale;const ox1=p1.w*l*roadScale;
        drawQuad(X,p0.x+ox0-lw,p0.y,p0.x+ox0+lw,p0.y,
          p1.x+ox1+p1.w*0.01,p1.y,p1.x+ox1-p1.w*0.01,p1.y);
      });
    }

    // Jump ramp
    if(seg.jump){
      X.fillStyle='#ffcc00';
      X.globalAlpha=0.7;
      const jw=p0.w*0.6;
      drawQuad(X,p0.x-jw,p0.y-6,p0.x+jw,p0.y-6,p1.x+p1.w*0.6,p1.y,p1.x-p1.w*0.6,p1.y);
      // Chevron stripes on ramp
      X.fillStyle='#ff8800';X.globalAlpha=0.4;
      const sw=p0.w*0.3;
      drawQuad(X,p0.x-sw,p0.y-6,p0.x+sw,p0.y-6,p1.x+p1.w*0.3,p1.y,p1.x-p1.w*0.3,p1.y);
      X.globalAlpha=1;
    }

    // Start/finish line
    if(idx===0){
      X.fillStyle='#fff';
      const checkSize=p0.w*0.1;
      for(let cx2=-5;cx2<=5;cx2++){
        if((cx2+10)%2===0){
          X.fillRect(p0.x+cx2*checkSize,p0.y-5,checkSize,5);
        }
      }
      // Finish line banner
      X.fillStyle='rgba(255,255,255,0.1)';
      X.fillRect(p0.x-p0.w*0.8,p0.y-25,p0.w*1.6,20);
      X.fillStyle='#fff';X.globalAlpha=0.4;
      X.textAlign='center';X.textBaseline='middle';
      const fs=Math.max(3,Math.min(12,p0.w*0.01));
      X.font=`bold ${fs}px sans-serif`;
      X.fillText('START/FINISH',p0.x,p0.y-15);
      X.globalAlpha=1;
    }

    // Trackside scenery (lampposts/pillars)
    if(idx%6===0){
      const side=(idx%12===0)?1:-1;
      const sx=p0.x+p0.w*1.35*side;
      const sh=p0.scale*900;
      const sw=p0.scale*100;
      if(sh>3&&sh<350){
        X.fillStyle=t.sceneryColor;
        X.globalAlpha=0.25;
        X.fillRect(sx-sw/2,p0.y-sh,sw,sh);
        // Light on top (pulsing)
        X.fillStyle='#fff';
        X.globalAlpha=0.5+Math.sin(time*3+idx)*0.3;
        X.beginPath();X.arc(sx,p0.y-sh-2,sw*0.3+1,0,Math.PI*2);X.fill();
        X.globalAlpha=1;
      }
    }

    // Billboard signs
    if(idx%25===0&&idx>0){
      const side=(idx%50===0)?1:-1;
      const sx=p0.x+p0.w*1.4*side;
      const sh=p0.scale*500;
      const sw=p0.scale*400;
      if(sh>5&&sh<200){
        X.fillStyle='#111';X.globalAlpha=0.7;
        X.fillRect(sx-sw/2,p0.y-sh,sw,sh*0.6);
        X.strokeStyle=t.sceneryColor;X.lineWidth=1;
        X.globalAlpha=0.5;
        X.strokeRect(sx-sw/2,p0.y-sh,sw,sh*0.6);
        X.fillStyle=t.sceneryColor;X.globalAlpha=0.6;
        X.textAlign='center';X.textBaseline='middle';
        const fs=Math.max(4,Math.min(14,sw*0.08));
        X.font=`bold ${fs}px sans-serif`;
        X.fillText('KORB',sx,p0.y-sh+sh*0.3);
        X.globalAlpha=1;
      }
    }

    // Draw AI racers at this segment
    aiRacers.forEach(ai=>{
      const aiSeg=Math.floor(ai.position/SEG_LEN)%t.segments.length;
      if(aiSeg===p0.segIdx){
        const aiScreenX=p0.x+p0.w*ai.x;
        const aiSize=p0.scale*500;
        if(aiSize>2&&aiSize<200){
          drawShipAt(aiScreenX,p0.y,aiSize,ai.color,ai.color2,0,ai.boosting);
        }
      }
    });
  }

  // Speed lines - more dramatic, emanating from vanishing point
  if(speedRatio>0.3){
    const intensity=(speedRatio-0.3)/0.7;
    const numLines=Math.floor(intensity*30);
    X.lineWidth=1+intensity;
    for(let i=0;i<numLines;i++){
      const angle=(i/numLines)*Math.PI*2+time*2;
      const dist=H*0.2+Math.random()*H*0.3;
      const len=(40+intensity*180)*(0.5+Math.random()*0.5);
      const vx=W/2,vy=H*0.45; // vanishing point
      const dx=Math.cos(angle),dy=Math.sin(angle)*0.5;
      const sx=vx+dx*dist;
      const sy=vy+dy*dist+dist*0.3;
      X.strokeStyle=`rgba(255,255,255,${intensity*0.2*(0.3+Math.random()*0.7)})`;
      X.beginPath();X.moveTo(sx,sy);X.lineTo(sx+dx*len,sy+dy*len+len*0.15);X.stroke();
    }
  }

  // Player ship
  const shipY=H*0.78-player.jumpHeight*0.3;
  const shipSize=Math.min(W*0.08,60);

  // Boost flame effect - more dramatic
  if(player.boosting){
    X.save();
    X.translate(W/2,shipY);

    // Outer flame
    for(let f=0;f<3;f++){
      X.globalAlpha=0.3+Math.random()*0.2;
      const flameLen=40+Math.random()*35+f*15;
      const flameW=shipSize*(0.35-f*0.05);
      const flameG=X.createLinearGradient(0,0,0,flameLen);
      flameG.addColorStop(0,f===0?'#fff':'#ff8800');
      flameG.addColorStop(0.3,'#ff6600');
      flameG.addColorStop(0.7,'#ff3300');
      flameG.addColorStop(1,'transparent');
      X.fillStyle=flameG;
      X.beginPath();
      X.moveTo(-flameW,shipSize*0.3);
      X.lineTo(flameW,shipSize*0.3);
      X.lineTo((Math.random()-0.5)*15,shipSize*0.3+flameLen);
      X.closePath();X.fill();
    }

    // Boost particles
    for(let p2=0;p2<5;p2++){
      const px=(Math.random()-0.5)*shipSize*0.5;
      const py=shipSize*0.3+Math.random()*50;
      X.fillStyle=Math.random()>0.5?'#ffcc00':'#ff6600';
      X.globalAlpha=0.5+Math.random()*0.3;
      X.fillRect(px-1,py,2+Math.random()*2,2+Math.random()*3);
    }
    X.globalAlpha=1;
    X.restore();
  }

  // Normal engine exhaust
  if(!player.boosting&&player.speed>50){
    X.save();X.translate(W/2,shipY);
    const exhaustSize=3+speedRatio*8;
    X.globalAlpha=0.3+speedRatio*0.3;
    X.fillStyle='#ff6600';
    X.fillRect(-shipSize*0.27,shipSize*0.32,4,exhaustSize+Math.random()*3);
    X.fillRect(shipSize*0.23,shipSize*0.32,4,exhaustSize+Math.random()*3);
    X.globalAlpha=1;
    X.restore();
  }

  drawShipAt(W/2,shipY,shipSize,player.color,player.color2,player.tilt,player.boosting);

  // Invulnerability flash
  if(player.invuln>0&&Math.sin(player.invuln*30)>0){
    X.globalAlpha=0.3;
    X.fillStyle='#fff';
    X.beginPath();X.arc(W/2,shipY,shipSize*0.8,0,Math.PI*2);X.fill();
    X.globalAlpha=1;
  }

  // Jump shadow
  if(player.jumpHeight>0){
    X.globalAlpha=0.2;
    X.fillStyle='#000';
    X.beginPath();
    X.ellipse(W/2,H*0.78,shipSize*0.5,shipSize*0.15,0,0,Math.PI*2);
    X.fill();
    X.globalAlpha=1;
  }

  // Oil effect overlay
  if(player.oilTimer>0){
    X.fillStyle='rgba(80,70,20,0.1)';
    X.fillRect(0,0,W,H);
    // Skid marks text
    X.save();X.textAlign='center';X.textBaseline='middle';
    X.font=`bold ${Math.min(W*0.03,24)}px "Segoe UI",sans-serif`;
    X.fillStyle='#ffaa00';X.globalAlpha=0.6;
    X.fillText('OIL!',W/2,H*0.65);
    X.globalAlpha=1;X.restore();
  }

  // Draw sparks on top of everything
  drawSparks();

  X.restore(); // end shake transform

  // ---- HUD ----
  renderHUD();

  // Countdown overlay
  if(state===STATES.COUNTDOWN){
    renderCountdown();
  }

  // Boost flash overlay
  if(player&&player.boosting){
    X.fillStyle='rgba(255,102,0,0.06)';
    X.fillRect(0,0,W,H);
    // Vignette boost effect
    const vg=X.createRadialGradient(W/2,H/2,W*0.2,W/2,H/2,W*0.7);
    vg.addColorStop(0,'transparent');vg.addColorStop(1,'rgba(255,60,0,0.08)');
    X.fillStyle=vg;X.fillRect(0,0,W,H);
  }

  // Energy warning overlay
  if(player&&player.energy<25){
    const warnAlpha=0.05+Math.sin(time*8)*0.04;
    X.fillStyle=`rgba(255,0,0,${warnAlpha})`;
    X.fillRect(0,0,W,H);
  }

  // Final lap announcement
  if(player&&player.lap===totalLaps-1&&raceTime-lapStartTime<2.5){
    X.save();X.textAlign='center';X.textBaseline='middle';
    const scale=1+Math.sin((raceTime-lapStartTime)*4)*0.1;
    X.font=`bold ${Math.min(W*0.07,55)*scale}px "Segoe UI",sans-serif`;
    X.shadowColor='#ff0044';X.shadowBlur=30;X.fillStyle='#ff0044';
    const alpha=1-((raceTime-lapStartTime)/2.5);
    X.globalAlpha=alpha;
    X.fillText('FINAL LAP!',W/2,H*0.28);
    X.globalAlpha=1;X.shadowBlur=0;
    X.restore();
  }
}

// ============ DRAMATIC COUNTDOWN ============
function renderCountdown(){
  X.save();X.textAlign='center';X.textBaseline='middle';

  const progress=countdownTimer;
  const cv=Math.max(0,Math.ceil(3-progress));
  const label=cv>0?cv.toString():'GO!';
  const isGo=cv===0;

  // Darkened background with vignette
  const vg=X.createRadialGradient(W/2,H*0.4,0,W/2,H*0.4,W*0.7);
  vg.addColorStop(0,'rgba(0,0,0,0.3)');vg.addColorStop(1,'rgba(0,0,0,0.6)');
  X.fillStyle=vg;X.fillRect(0,0,W,H);

  // Countdown lights (F1-style)
  const lightY=H*0.25;
  const lightSpacing=Math.min(W*0.08,60);
  const lightR=Math.min(W*0.025,20);
  for(let li=0;li<3;li++){
    const lx=W/2+(li-1)*lightSpacing;
    // Light housing
    X.fillStyle='#222';
    X.beginPath();X.arc(lx,lightY,lightR+4,0,Math.PI*2);X.fill();
    // Light
    const lit=(3-cv)>li;
    X.fillStyle=lit?'#ff2200':'#331100';
    if(lit){X.shadowColor='#ff4400';X.shadowBlur=20}
    X.beginPath();X.arc(lx,lightY,lightR,0,Math.PI*2);X.fill();
    X.shadowBlur=0;
  }

  // GO light (green)
  if(isGo){
    for(let li=0;li<3;li++){
      const lx=W/2+(li-1)*lightSpacing;
      X.fillStyle='#00ff44';X.shadowColor='#00ff44';X.shadowBlur=25;
      X.beginPath();X.arc(lx,lightY,lightR,0,Math.PI*2);X.fill();
    }
    X.shadowBlur=0;
  }

  // Number / GO text with dramatic scaling
  const subProgress=progress%1;
  const scale=cv>0?(1.5-subProgress*0.5):(2-Math.min(1,progress-3)*1.5);
  const fontSize=Math.min(W*0.18,140)*scale;
  X.font=`bold ${fontSize}px "Segoe UI",sans-serif`;
  X.shadowColor=isGo?'#00ff44':'#ff6600';X.shadowBlur=40;
  X.fillStyle=isGo?'#00ff44':'#ff6600';
  X.globalAlpha=cv>0?1:Math.max(0,1-(progress-3)*2);
  X.fillText(label,W/2,H*0.45);

  // Ring burst effect
  if(subProgress<0.3&&cv>0){
    X.strokeStyle=`rgba(255,102,0,${0.5-subProgress*1.5})`;
    X.lineWidth=3;
    X.beginPath();X.arc(W/2,H*0.45,fontSize*0.6+subProgress*200,0,Math.PI*2);X.stroke();
  }
  if(isGo&&progress-3<0.5){
    const gp=progress-3;
    X.strokeStyle=`rgba(0,255,68,${0.6-gp*1.2})`;
    X.lineWidth=4;
    X.beginPath();X.arc(W/2,H*0.45,fontSize*0.5+gp*300,0,Math.PI*2);X.stroke();
  }

  X.shadowBlur=0;X.globalAlpha=1;
  X.restore();
}

function renderHUD(){
  const p=player;if(!p)return;
  const positions=getPositions();
  let playerPos=1;
  positions.forEach((r,i)=>{if(r.isPlayer)playerPos=i+1});
  const speedRatio=p.speed/p.maxSpeed;

  X.save();

  // ---- SPEEDOMETER / TACHOMETER (bottom left) ----
  const gaugeR=Math.min(W*0.08,65);
  const gaugeX=gaugeR+25;
  const gaugeY=H-gaugeR-50;

  // Gauge background
  X.fillStyle='rgba(0,0,0,0.5)';
  X.beginPath();X.arc(gaugeX,gaugeY,gaugeR+5,0,Math.PI*2);X.fill();
  X.strokeStyle='#333';X.lineWidth=2;
  X.beginPath();X.arc(gaugeX,gaugeY,gaugeR+5,0,Math.PI*2);X.stroke();

  // Tachometer arc
  const arcStart=Math.PI*0.75;
  const arcEnd=Math.PI*2.25;
  const arcRange=arcEnd-arcStart;

  // Gauge marks
  for(let m=0;m<=10;m++){
    const angle=arcStart+arcRange*(m/10);
    const inner=gaugeR*0.75;
    const outer=gaugeR*0.92;
    X.strokeStyle=m>=8?'#ff4444':'#555';
    X.lineWidth=m%5===0?2:1;
    X.beginPath();
    X.moveTo(gaugeX+Math.cos(angle)*inner,gaugeY+Math.sin(angle)*inner);
    X.lineTo(gaugeX+Math.cos(angle)*outer,gaugeY+Math.sin(angle)*outer);
    X.stroke();
  }

  // Colored arc sections
  for(let a=0;a<100;a++){
    const frac=a/100;
    const angle=arcStart+arcRange*frac;
    const nextAngle=arcStart+arcRange*(a+1)/100;
    const lit=frac<=p.rpm;
    if(!lit)continue;
    X.strokeStyle=frac>0.8?'#ff2222':frac>0.6?'#ffaa00':'#00d4ff';
    X.lineWidth=4;
    X.beginPath();X.arc(gaugeX,gaugeY,gaugeR*0.85,angle,nextAngle);X.stroke();
  }

  // Needle
  const needleAngle=arcStart+arcRange*Math.min(1,p.rpm);
  X.strokeStyle='#ff4444';X.lineWidth=2;
  X.beginPath();
  X.moveTo(gaugeX,gaugeY);
  X.lineTo(gaugeX+Math.cos(needleAngle)*gaugeR*0.8,gaugeY+Math.sin(needleAngle)*gaugeR*0.8);
  X.stroke();
  // Needle center
  X.fillStyle='#ff4444';
  X.beginPath();X.arc(gaugeX,gaugeY,3,0,Math.PI*2);X.fill();

  // Digital speed readout in center
  const spdDisplay=Math.floor(p.speed*1.5);
  X.textAlign='center';X.textBaseline='middle';
  X.font=`bold ${Math.min(gaugeR*0.45,30)}px "Segoe UI",sans-serif`;
  X.fillStyle='#fff';
  X.shadowColor='#00d4ff';X.shadowBlur=6;
  X.fillText(spdDisplay,gaugeX,gaugeY+gaugeR*0.3);
  X.shadowBlur=0;
  X.font=`${Math.min(gaugeR*0.2,12)}px "Segoe UI",sans-serif`;
  X.fillStyle='#00d4ff';
  X.fillText('KM/H',gaugeX,gaugeY+gaugeR*0.55);

  // ---- ENERGY BAR (below gauge) ----
  const ebX=15,ebY=H-35,ebW=gaugeR*2+20,ebH=18;
  X.fillStyle='#0a0a1e';
  X.strokeStyle='#333';X.lineWidth=1;
  X.beginPath();X.roundRect(ebX,ebY,ebW,ebH,4);X.fill();X.stroke();

  const eColor=p.energy>50?`hsl(120,80%,45%)`:
    p.energy>25?`hsl(${p.energy*2.4},80%,45%)`:'#ff2222';
  // Animated energy bar
  const eg=X.createLinearGradient(ebX,ebY,ebX+ebW*p.energy/100,ebY);
  eg.addColorStop(0,eColor);eg.addColorStop(1,shadeColor(eColor,-30));
  X.fillStyle=eg;
  X.beginPath();X.roundRect(ebX+1,ebY+1,Math.max(0,(ebW-2)*p.energy/100),ebH-2,3);X.fill();

  // Energy segments
  for(let es=1;es<10;es++){
    X.fillStyle='rgba(0,0,0,0.3)';
    X.fillRect(ebX+ebW*es/10,ebY,1,ebH);
  }

  // Energy warning flash
  if(p.energy<25){
    X.globalAlpha=0.5+Math.sin(performance.now()*0.01)*0.5;
    X.strokeStyle='#ff0000';X.lineWidth=2;
    X.beginPath();X.roundRect(ebX-1,ebY-1,ebW+2,ebH+2,5);X.stroke();
    X.globalAlpha=1;
  }
  X.fillStyle='#fff';X.textAlign='left';
  X.font=`bold ${Math.min(10,ebH-4)}px "Segoe UI",sans-serif`;
  X.textBaseline='middle';
  X.fillText('ENERGY',ebX+4,ebY+ebH/2);
  // Energy percentage
  X.textAlign='right';
  X.fillText(Math.ceil(p.energy)+'%',ebX+ebW-4,ebY+ebH/2);

  // ---- LAP / POSITION (top right) ----
  X.textAlign='right';X.textBaseline='top';

  // Position - large and prominent
  X.font=`bold ${Math.min(W*0.07,55)}px "Segoe UI",sans-serif`;
  X.fillStyle=playerPos===1?'#ffcc00':playerPos<=3?'#00d4ff':'#ff6644';
  X.shadowColor=X.fillStyle;X.shadowBlur=12;
  X.fillText(ordinal(playerPos).toUpperCase(),W-20,12);
  X.shadowBlur=0;

  // /6 total
  X.font=`${Math.min(W*0.02,16)}px "Segoe UI",sans-serif`;
  X.fillStyle='#667';
  X.fillText('/ 6',W-20,12+Math.min(W*0.07,55)+2);

  // Lap counter
  X.font=`bold ${Math.min(W*0.035,28)}px "Segoe UI",sans-serif`;
  X.fillStyle='#fff';
  const lapDisplay=Math.min(p.lap+1,totalLaps);
  const lapY=80;
  X.fillText(`LAP ${lapDisplay}/${totalLaps}`,W-20,lapY);

  // Timer
  X.font=`${Math.min(W*0.022,17)}px "Segoe UI",monospace`;
  X.fillStyle='#aabbcc';
  const currentLapTime=raceTime-lapStartTime;
  X.fillText(`TIME ${formatTime(raceTime)}`,W-20,lapY+32);
  X.fillText(`LAP  ${formatTime(currentLapTime)}`,W-20,lapY+54);
  if(bestLapTime<Infinity){
    X.fillStyle='#ff6600';
    X.fillText(`BEST ${formatTime(bestLapTime)}`,W-20,lapY+76);
  }

  // Track name header
  X.textAlign='center';X.textBaseline='top';
  X.font=`bold ${Math.min(W*0.018,15)}px "Segoe UI",sans-serif`;
  X.fillStyle='#00d4ff';X.globalAlpha=0.4;
  X.fillText(`${track.name} - KORB ENGINEERING`,W/2,6);
  X.globalAlpha=1;

  // Boost label
  if(p.boosting){
    X.textAlign='center';
    X.font=`bold ${Math.min(W*0.05,40)}px "Segoe UI",sans-serif`;
    X.fillStyle='#ff6600';X.shadowColor='#ff6600';X.shadowBlur=25;
    X.globalAlpha=0.6+Math.sin(performance.now()*0.02)*0.4;
    X.fillText('BOOST',W/2,H*0.14);
    X.globalAlpha=1;X.shadowBlur=0;
  }

  // ---- MINIMAP (bottom right, larger) ----
  const mmSize=Math.min(W*0.14,120);
  const mmX=W-mmSize-15;
  const mmY=H-mmSize-50;
  renderMinimap(mmX,mmY,mmSize);

  // ---- POSITION INDICATOR (nearby racers) ----
  renderPositionIndicator(playerPos,positions);

  X.restore();
}

function renderPositionIndicator(playerPos,positions){
  // Show position bars on the left side
  const barX=15;
  const barY=15;
  const barW=Math.min(W*0.15,130);
  const barH=Math.min(22,H*0.03);

  X.fillStyle='rgba(0,0,0,0.4)';
  X.beginPath();X.roundRect(barX-5,barY-5,barW+10,positions.length*(barH+3)+10,6);X.fill();

  X.textAlign='left';X.textBaseline='middle';
  positions.forEach((r,i)=>{
    const y=barY+i*(barH+3);
    const isPlayer=r.isPlayer;

    // Bar background
    X.fillStyle=isPlayer?'rgba(255,255,255,0.15)':'rgba(255,255,255,0.05)';
    X.beginPath();X.roundRect(barX,y,barW,barH,3);X.fill();

    if(isPlayer){
      X.strokeStyle='#00d4ff';X.lineWidth=1;
      X.beginPath();X.roundRect(barX,y,barW,barH,3);X.stroke();
    }

    // Position number
    X.fillStyle=isPlayer?'#fff':r.color||'#888';
    X.font=`bold ${Math.min(12,barH*0.6)}px "Segoe UI",sans-serif`;
    X.fillText(`${i+1}.`,barX+4,y+barH/2);

    // Name (truncated)
    X.font=`${Math.min(11,barH*0.5)}px "Segoe UI",sans-serif`;
    const name=r.name.length>10?r.name.slice(0,9)+'.':r.name;
    X.fillText(name,barX+22,y+barH/2);

    // Gap indicator
    if(i>0&&r.isPlayer){
      const gap=positions[i-1].total-r.total;
      const gapSec=gap/300; // rough gap in seconds
      X.textAlign='right';
      X.fillStyle='#ff6644';
      X.font=`${Math.min(10,barH*0.45)}px "Segoe UI",sans-serif`;
      X.fillText(`+${gapSec.toFixed(1)}s`,barX+barW-3,y+barH/2);
      X.textAlign='left';
    }else if(i<positions.length-1&&i>0&&!r.isPlayer){
      // Show if AI is close to player
    }
  });
}

function renderMinimap(mx,my,size){
  X.save();
  X.globalAlpha=0.7;
  X.fillStyle='rgba(0,0,0,0.5)';
  X.strokeStyle='#334';
  X.lineWidth=1;
  X.beginPath();X.arc(mx+size/2,my+size/2,size/2,0,Math.PI*2);
  X.fill();X.stroke();

  const segs=track.segments;
  const tLen=segs.length;
  const cx=mx+size/2,cy=my+size/2,r=size*0.38;

  // Draw track outline (thicker)
  X.strokeStyle='#556';X.lineWidth=3;
  X.beginPath();
  for(let i=0;i<tLen;i++){
    const angle=(i/tLen)*Math.PI*2-Math.PI/2;
    const cr=r+segs[i].curve*2;
    const px=cx+Math.cos(angle)*cr;
    const py=cy+Math.sin(angle)*cr;
    if(i===0)X.moveTo(px,py);else X.lineTo(px,py);
  }
  X.closePath();X.stroke();

  // Highlight special segments on minimap
  for(let i=0;i<tLen;i++){
    if(!segs[i].boostPad&&!segs[i].pitZone&&!segs[i].oilSlick)continue;
    const angle=(i/tLen)*Math.PI*2-Math.PI/2;
    const cr=r+segs[i].curve*2;
    const px=cx+Math.cos(angle)*cr;
    const py=cy+Math.sin(angle)*cr;
    X.fillStyle=segs[i].boostPad?'#ff8800':segs[i].pitZone?'#00ff66':'#aa8800';
    X.globalAlpha=0.5;
    X.beginPath();X.arc(px,py,2,0,Math.PI*2);X.fill();
    X.globalAlpha=0.7;
  }

  // AI dots (slightly larger)
  aiRacers.forEach(ai=>{
    const aiFrac=(ai.position%(tLen*SEG_LEN))/(tLen*SEG_LEN);
    const aa=aiFrac*Math.PI*2-Math.PI/2;
    const asi=Math.floor(aiFrac*tLen)%tLen;
    const acr=r+(segs[asi]?segs[asi].curve*2:0);
    X.fillStyle=ai.color;
    X.beginPath();X.arc(cx+Math.cos(aa)*acr,cy+Math.sin(aa)*acr,2.5,0,Math.PI*2);X.fill();
  });

  // Player dot (larger, with direction indicator)
  const playerFrac=(player.position%(tLen*SEG_LEN))/(tLen*SEG_LEN);
  const pa=playerFrac*Math.PI*2-Math.PI/2;
  const psi=Math.floor(playerFrac*tLen)%tLen;
  const pcr=r+(segs[psi]?segs[psi].curve*2:0);
  const ppx=cx+Math.cos(pa)*pcr,ppy=cy+Math.sin(pa)*pcr;

  // Player glow
  X.fillStyle='rgba(255,255,255,0.3)';
  X.beginPath();X.arc(ppx,ppy,6,0,Math.PI*2);X.fill();
  // Player dot
  X.fillStyle='#fff';
  X.beginPath();X.arc(ppx,ppy,3.5,0,Math.PI*2);X.fill();

  X.globalAlpha=1;
  X.restore();
}

function renderResults(){
  renderRace();

  X.save();
  const overlay=X.createRadialGradient(W/2,H/2,0,W/2,H/2,W*0.7);
  overlay.addColorStop(0,'rgba(0,0,0,0.65)');overlay.addColorStop(1,'rgba(0,0,0,0.85)');

  X.fillStyle=win?'#ffcc00':'#ff4444';
  X.shadowColor=X.fillStyle;X.shadowBlur=25+Math.sin(t*3)*10;

  X.fillText(ordinal(finalPosition).toUpperCase(),W/2,H*0.27);
  X.shadowBlur=0;

  // Stats panel
  const panelW=Math.min(500,W*0.7);

  X.fillStyle='rgba(0,20,40,0.6)';

  X.beginPath();X.roundRect(panelX,panelY,panelW,H*0.48,10);X.fill();X.stroke();

  // Stats rows
  X.font=`${Math.min(W*0.025,20)}px "Segoe UI",sans-serif`;
  const statY=panelY+30;
  const statLeft=panelX+20;
  const statRight=panelX+panelW-20;

  // Total time
  X.textAlign='left';X.fillStyle='#889';X.fillText('Total Time',statLeft,statY);
  X.textAlign='right';X.fillStyle='#fff';X.fillText(formatTime(finalTime),statRight,statY);

  // Best lap
  X.textAlign='left';X.fillStyle='#889';X.fillText('Best Lap',statLeft,statY+30);
  X.textAlign='right';X.fillStyle='#ff6600';X.fillText(formatTime(bestLapTime),statRight,statY+30);

  // Track
  X.textAlign='left';X.fillStyle='#889';X.fillText('Track',statLeft,statY+60);

  // Separator
  X.strokeStyle='#334';X.lineWidth=1;
  X.beginPath();X.moveTo(statLeft,statY+110);X.lineTo(statRight,statY+110);X.stroke();

  // Lap-by-lap breakdown
  X.textAlign='center';X.fillStyle='#667';
  X.font=`bold ${Math.min(W*0.018,14)}px "Segoe UI",sans-serif`;
  X.fillText('LAP BREAKDOWN',W/2,statY+125);

  if(player.lapTimes.length>0){
    X.font=`${Math.min(W*0.018,14)}px "Segoe UI",monospace`;
    const lapColW=panelW-40;
    player.lapTimes.forEach((lt,i)=>{
      const ly=statY+145+i*22;
      const isBest=lt===bestLapTime;

      // Highlight best lap row
      if(isBest){
        X.fillStyle='rgba(255,102,0,0.1)';
        X.beginPath();X.roundRect(statLeft,ly-10,lapColW,20,3);X.fill();
      }

      X.textAlign='left';
      X.fillStyle=isBest?'#ff6600':'#778';
      X.fillText(`Lap ${i+1}`,statLeft+5,ly);

      X.textAlign='right';
      X.fillStyle=isBest?'#ffaa44':'#aab';
      X.fillText(formatTime(lt),statRight-5,ly);

      if(isBest){
        X.fillStyle='#ff6600';
        X.textAlign='left';
        X.fillText(' BEST',statLeft+55,ly);

      // Delta from best
      if(!isBest&&bestLapTime<Infinity){
        X.textAlign='right';
        X.fillStyle='#556';
        const delta=lt-bestLapTime;
        X.fillText(`+${delta.toFixed(3)}`,statRight-100,ly);
      }
    });

  // Buttons
  const btnW=180,btnH=48;
  const btnY=H*0.92;

  // Retry
  X.fillStyle='rgba(0,212,255,0.15)';X.strokeStyle='#00d4ff';X.lineWidth=2;
  X.beginPath();X.roundRect(W/2-btnW-20,btnY-btnH/2,btnW,btnH,8);X.fill();X.stroke();
  X.fillStyle='#00d4ff';X.textAlign='center';X.font=`bold 16px "Segoe UI",sans-serif`;
  X.fillText('RETRY [R]',W/2-btnW/2-20,btnY);

  // New Race
  X.fillStyle='rgba(255,102,0,0.15)';X.strokeStyle='#ff6600';
  X.beginPath();X.roundRect(W/2+20,btnY-btnH/2,btnW,btnH,8);X.fill();X.stroke();
  X.fillStyle='#ff6600';
  X.fillText('NEW RACE [N]',W/2+btnW/2+20,btnY);

  X.restore();
}

function renderPause(){
  X.save();
  X.fillStyle='rgba(0,0,0,0.7)';X.fillRect(0,0,W,H);
  X.textAlign='center';X.textBaseline='middle';

  X.font=`bold ${Math.min(W*0.06,50)}px "Segoe UI",sans-serif`;
  X.fillStyle='#00d4ff';X.shadowColor='#00d4ff';X.shadowBlur=15;
  X.fillText('PAUSED',W/2,H*0.3);X.shadowBlur=0;

  X.font=`${Math.min(W*0.025,20)}px "Segoe UI",sans-serif`;
  X.fillStyle='#aabbcc';
  X.fillText('ENTER / ESC - Resume',W/2,H*0.5);
  X.fillText('R - Restart Race',W/2,H*0.56);
  X.fillText('Q - Quit to Menu',W/2,H*0.62);

  X.restore();
}

function drawShipAt(sx,sy,size,color,color2,tilt,isBoosting){
  X.save();
  X.translate(sx,sy);

  // Tilt transform
  X.transform(1,0,tilt*0.5,1,0,0);

  const s=size;

  // Shadow/glow underneath
  X.globalAlpha=0.3;
  X.fillStyle=color;
  X.beginPath();
  X.ellipse(0,s*0.15,s*0.5,s*0.1,0,0,Math.PI*2);
  X.fill();
  X.globalAlpha=1;

  // Main body
  X.fillStyle=color;
  X.beginPath();
  X.moveTo(0,-s*0.5);
  X.lineTo(s*0.45,-s*0.05);
  X.lineTo(s*0.5,s*0.15);
  X.lineTo(s*0.25,s*0.35);
  X.lineTo(-s*0.25,s*0.35);
  X.lineTo(-s*0.5,s*0.15);
  X.lineTo(-s*0.45,-s*0.05);
  X.closePath();
  X.fill();

  // Body highlight
  X.fillStyle='rgba(255,255,255,0.12)';
  X.beginPath();
  X.moveTo(-s*0.08,-s*0.45);X.lineTo(s*0.08,-s*0.45);
  X.lineTo(s*0.12,s*0.0);X.lineTo(-s*0.12,s*0.0);
  X.closePath();X.fill();

  // Wings
  X.fillStyle=color2;
  X.beginPath();
  X.moveTo(-s*0.45,-s*0.05);
  X.lineTo(-s*0.7,s*0.1);
  X.lineTo(-s*0.5,s*0.2);
  X.closePath();
  X.fill();
  X.beginPath();
  X.moveTo(s*0.45,-s*0.05);
  X.lineTo(s*0.7,s*0.1);
  X.lineTo(s*0.5,s*0.2);
  X.closePath();
  X.fill();

  // Cockpit
  X.fillStyle='rgba(0,0,0,0.4)';
  X.beginPath();
  X.moveTo(0,-s*0.3);
  X.lineTo(s*0.12,s*0.0);
  X.lineTo(-s*0.12,s*0.0);
  X.closePath();
  X.fill();
  // Cockpit highlight
  X.fillStyle='rgba(255,255,255,0.15)';
  X.beginPath();
  X.moveTo(0,-s*0.28);
  X.lineTo(s*0.06,-s*0.1);
  X.lineTo(-s*0.06,-s*0.1);
  X.closePath();
  X.fill();

  // Engine exhausts
  X.fillStyle='#ff6600';
  X.fillRect(-s*0.3,s*0.25,s*0.12,s*0.12);
  X.fillRect(s*0.18,s*0.25,s*0.12,s*0.12);

  // Exhaust glow (more intense when boosting)
  const gt=performance.now()*0.008;
  const glowIntensity=isBoosting?0.8:0.4;
  X.globalAlpha=glowIntensity+Math.sin(gt)*0.2;
  X.fillStyle=isBoosting?'#ff8844':'#ffcc44';
  const exhaustLen=isBoosting?s*0.15:s*0.06;
  X.fillRect(-s*0.27,s*0.35,s*0.06,exhaustLen+Math.random()*s*0.05);
  X.fillRect(s*0.21,s*0.35,s*0.06,exhaustLen+Math.random()*s*0.05);
  X.globalAlpha=1;

  X.restore();
}

function drawQuad(ctx,x1,y1,x2,y2,x3,y3,x4,y4){
  ctx.beginPath();ctx.moveTo(x1,y1);ctx.lineTo(x2,y2);
  ctx.lineTo(x3,y3);ctx.lineTo(x4,y4);ctx.closePath();ctx.fill();
}

function shadeColor(hex,amt){
  if(hex.startsWith('hsl')||hex.startsWith('rgb'))return hex;
  let r=parseInt(hex.slice(1,3),16)+amt;
  let g=parseInt(hex.slice(3,5),16)+amt;
  let b=parseInt(hex.slice(5,7),16)+amt;
  r=Math.max(0,Math.min(255,r));g=Math.max(0,Math.min(255,g));b=Math.max(0,Math.min(255,b));
  return `rgb(${r},${g},${b})`;
}

// ============ CLICK / TAP HANDLING ============
C.addEventListener('click',e=>{
  initAudio();
  const rect=C.getBoundingClientRect();
  const cx=e.clientX-rect.left;
  const cy=e.clientY-rect.top;

  if(state===STATES.TITLE){
    state=STATES.VEHICLE_SELECT;return;
  }
  if(state===STATES.VEHICLE_SELECT){
    const cols=Math.min(4,Math.floor(W/220));
    const cardW=Math.min(220,W/cols-20);
    const startX=W/2-(cols*cardW+(cols-1)*15)/2+cardW/2;
    let clicked=-1;
    VEHICLES.forEach((v,i)=>{
      const col=i%cols;const row=Math.floor(i/cols);
      const ccx=startX+col*(cardW+15);
      const ccy=H*0.25+row*(cardW*1.8);
      if(cx>ccx-cardW/2&&cx<ccx+cardW/2&&cy>ccy-cardW*0.5&&cy<ccy+cardW*1.1){
        clicked=i;
      }
    });
    if(clicked>=0){
      selectedVehicle=clicked;
      state=STATES.TRACK_SELECT;
    }
    return;
  }
  if(state===STATES.TRACK_SELECT){
    const itemH=Math.min(80,H*0.13);
    const listW=Math.min(650,W*0.85);
    TRACKS.forEach((t,i)=>{
      const tcy=H*0.2+i*(itemH+10);
      if(cx>W/2-listW/2&&cx<W/2+listW/2&&cy>tcy-itemH/2&&cy<tcy+itemH/2){
        selectedTrack=i;initRace();
      }
    });
    return;
  }
  if(state===STATES.RESULTS){
    const btnW=180,btnH=48,btnY=H*0.92;
    if(cx>W/2-btnW-20&&cx<W/2-20&&cy>btnY-btnH/2&&cy<btnY+btnH/2){
      initRace();
    }else if(cx>W/2+20&&cx<W/2+btnW+20&&cy>btnY-btnH/2&&cy<btnY+btnH/2){
      state=STATES.VEHICLE_SELECT;
    }
    return;
  }
});

// ============ KEYBOARD HANDLING (MENUS) ============
document.addEventListener('keydown',e=>{
  initAudio();

  if(state===STATES.TITLE){
    if(e.code==='Enter'||e.code==='Space'){state=STATES.VEHICLE_SELECT;e.preventDefault()}
    return;
  }
  if(state===STATES.VEHICLE_SELECT){
    if(e.code==='ArrowLeft')selectedVehicle=(selectedVehicle-1+VEHICLES.length)%VEHICLES.length;
    if(e.code==='ArrowRight')selectedVehicle=(selectedVehicle+1)%VEHICLES.length;
    if(e.code==='Enter'){state=STATES.TRACK_SELECT;e.preventDefault()}
    if(e.code==='Escape')state=STATES.TITLE;
    return;
  }
  if(state===STATES.TRACK_SELECT){
    if(e.code==='ArrowUp')selectedTrack=(selectedTrack-1+TRACKS.length)%TRACKS.length;
    if(e.code==='ArrowDown')selectedTrack=(selectedTrack+1)%TRACKS.length;
    if(e.code==='Enter'){initRace();e.preventDefault()}
    if(e.code==='Escape')state=STATES.VEHICLE_SELECT;
    return;
  }
  if(state===STATES.RACING||state===STATES.COUNTDOWN){
    if(e.code==='Escape'||e.code==='KeyP'){
      state=STATES.PAUSE;e.preventDefault();
    }
    return;
  }
  if(state===STATES.PAUSE){
    if(e.code==='Escape'||e.code==='Enter'||e.code==='KeyP'){
      state=STATES.RACING;e.preventDefault();
    }
    if(e.code==='KeyR'){initRace();e.preventDefault()}
    if(e.code==='KeyQ'){stopMusic();stopEngine();state=STATES.TITLE;e.preventDefault()}
    return;
  }
  if(state===STATES.RESULTS){
    if(e.code==='KeyR'){initRace();e.preventDefault()}
    if(e.code==='KeyN'||e.code==='Escape'){state=STATES.VEHICLE_SELECT;e.preventDefault()}
    return;
  }
});

// ============ GAME LOOP ============
function gameLoop(ts){
  const dt=Math.min((ts-lastTime)/1000,0.05);
  lastTime=ts;

  update(dt);
  render();

  requestAnimationFrame(gameLoop);
}

lastTime=performance.now();
requestAnimationFrame(gameLoop);
</script>
