<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Star Fox Lite - Korb Engineering</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
html,body{width:100%;height:100%;overflow:hidden;background:#000;font-family:'Courier New',monospace}
canvas{display:block}
#ui-overlay{position:absolute;top:0;left:0;width:100%;height:100%;pointer-events:none;z-index:10}
#start-screen,#game-over-screen{
  position:absolute;top:0;left:0;width:100%;height:100%;
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  z-index:20;pointer-events:all;background:rgba(0,0,0,0.88);
}
#start-screen h1,#game-over-screen h1{
  font-size:52px;color:#0ff;text-shadow:0 0 20px #0ff,0 0 50px #088;
  letter-spacing:8px;margin-bottom:6px;
}
#start-screen h2{
  font-size:14px;color:#0f8;letter-spacing:6px;margin-bottom:50px;
  text-shadow:0 0 10px #0f8;opacity:0.8;
}
#game-over-screen h2{font-size:22px;color:#f55;margin-bottom:10px;text-shadow:0 0 10px #f00}
#game-over-screen .score-display{font-size:30px;color:#0ff;margin-bottom:8px}
#game-over-screen .wave-display{font-size:16px;color:#0f8;margin-bottom:30px}
.btn{
  pointer-events:all;cursor:pointer;
  background:transparent;border:2px solid #0ff;color:#0ff;
  font-family:'Courier New',monospace;font-size:18px;
  padding:14px 44px;letter-spacing:4px;
  text-shadow:0 0 10px #0ff;transition:all 0.3s;
}
.btn:hover{background:#0ff;color:#000;box-shadow:0 0 30px #0ff}
.controls-info{margin-top:35px;color:#0a8;font-size:12px;text-align:center;line-height:2}
#touch-controls{
  display:none;position:absolute;bottom:0;left:0;width:100%;height:220px;
  z-index:15;pointer-events:all;
}
#joystick-zone{
  position:absolute;bottom:20px;left:20px;width:140px;height:140px;
  border:2px solid rgba(0,255,255,0.3);border-radius:50%;
  background:rgba(0,255,255,0.05);
}
#joystick-knob{
  position:absolute;width:50px;height:50px;border-radius:50%;
  background:rgba(0,255,255,0.3);border:2px solid rgba(0,255,255,0.6);
  top:70px;left:70px;transform:translate(-50%,-50%);pointer-events:none;
}
#fire-btn{
  position:absolute;bottom:40px;right:40px;width:80px;height:80px;
  border-radius:50%;border:3px solid rgba(0,255,255,0.6);
  background:rgba(0,255,255,0.15);color:#0ff;font-family:'Courier New',monospace;
  font-size:13px;font-weight:bold;display:flex;align-items:center;
  justify-content:center;cursor:pointer;letter-spacing:2px;
}
</style>
</head>
<body>
<canvas id="game"></canvas>

<div id="start-screen">
  <h1>STAR FOX LITE</h1>
  <h2>KORB ENGINEERING</h2>
  <button class="btn" id="start-btn">START MISSION</button>
  <div class="controls-info">
    ARROW KEYS / WASD to move &bull; SPACEBAR to fire<br>
    Touch: Virtual joystick + Fire button
  </div>
</div>

<div id="game-over-screen" style="display:none;">
  <h1>MISSION FAILED</h1>
  <h2>SHIP DESTROYED</h2>
  <div class="score-display" id="final-score">SCORE: 0</div>
  <div class="wave-display" id="final-wave">WAVE: 1</div>
  <button class="btn" id="restart-btn">RETRY MISSION</button>
</div>

<div id="touch-controls">
  <div id="joystick-zone"><div id="joystick-knob"></div></div>
  <div id="fire-btn">FIRE</div>
</div>

<script>
// ============================================================
// STAR FOX LITE - Korb Engineering
// Hexagonal Tunnel Shooter
// ============================================================

const canvas = document.getElementById('game');
const ctx = canvas.getContext('2d');
let W, H, CX, CY;

function resize() {
  W = canvas.width = window.innerWidth;
  H = canvas.height = window.innerHeight;
  CX = W / 2;
  CY = H / 2;
}
resize();
window.addEventListener('resize', resize);

// ---- AUDIO ENGINE ----
const AudioCtx = window.AudioContext || window.webkitAudioContext;
let audioCtx = null;
function ensureAudio() { if (!audioCtx) audioCtx = new AudioCtx(); }

function playSound(type) {
  ensureAudio();
  const now = audioCtx.currentTime;
  const g = audioCtx.createGain();
  g.connect(audioCtx.destination);
  const o = audioCtx.createOscillator();
  o.connect(g);

  switch(type) {
    case 'laser':
      o.type = 'square';
      o.frequency.setValueAtTime(880, now);
      o.frequency.exponentialRampToValueAtTime(220, now + 0.08);
      g.gain.setValueAtTime(0.12, now);
      g.gain.exponentialRampToValueAtTime(0.001, now + 0.08);
      o.start(now); o.stop(now + 0.08);
      break;
    case 'explosion':
      o.type = 'sawtooth';
      o.frequency.setValueAtTime(200, now);
      o.frequency.exponentialRampToValueAtTime(30, now + 0.3);
      g.gain.setValueAtTime(0.2, now);
      g.gain.exponentialRampToValueAtTime(0.001, now + 0.3);
      o.start(now); o.stop(now + 0.3);
      break;
    case 'damage':
      o.type = 'sawtooth';
      o.frequency.setValueAtTime(150, now);
      o.frequency.exponentialRampToValueAtTime(50, now + 0.4);
      g.gain.setValueAtTime(0.25, now);
      g.gain.exponentialRampToValueAtTime(0.001, now + 0.4);
      o.start(now); o.stop(now + 0.4);
      // add noise-like second osc
      const o2 = audioCtx.createOscillator();
      const g2 = audioCtx.createGain();
      o2.connect(g2); g2.connect(audioCtx.destination);
      o2.type = 'square';
      o2.frequency.setValueAtTime(90, now);
      g2.gain.setValueAtTime(0.15, now);
      g2.gain.exponentialRampToValueAtTime(0.001, now + 0.3);
      o2.start(now); o2.stop(now + 0.3);
      break;
    case 'powerup':
      o.type = 'sine';
      o.frequency.setValueAtTime(440, now);
      o.frequency.setValueAtTime(660, now + 0.08);
      o.frequency.setValueAtTime(880, now + 0.16);
      g.gain.setValueAtTime(0.15, now);
      g.gain.exponentialRampToValueAtTime(0.001, now + 0.3);
      o.start(now); o.stop(now + 0.3);
      break;
    case 'boss':
      o.type = 'square';
      o.frequency.setValueAtTime(80, now);
      o.frequency.setValueAtTime(100, now + 0.2);
      o.frequency.setValueAtTime(80, now + 0.4);
      o.frequency.setValueAtTime(100, now + 0.6);
      g.gain.setValueAtTime(0.2, now);
      g.gain.linearRampToValueAtTime(0.2, now + 0.6);
      g.gain.exponentialRampToValueAtTime(0.001, now + 0.8);
      o.start(now); o.stop(now + 0.8);
      break;
  }
}

// ---- INPUT ----
const keys = {};
window.addEventListener('keydown', e => { keys[e.code] = true; if(e.code === 'Space') e.preventDefault(); });
window.addEventListener('keyup', e => { keys[e.code] = false; });

let touchMoveX = 0, touchMoveY = 0, touchFiring = false;
const isTouchDevice = 'ontouchstart' in window;

if (isTouchDevice) {
  document.getElementById('touch-controls').style.display = 'block';
  const joyZone = document.getElementById('joystick-zone');
  const joyKnob = document.getElementById('joystick-knob');
  const fireBtn = document.getElementById('fire-btn');
  let joyActive = false, joyStartX, joyStartY;

  joyZone.addEventListener('touchstart', e => {
    e.preventDefault();
    joyActive = true;
    const t = e.touches[0];
    const r = joyZone.getBoundingClientRect();
    joyStartX = r.left + r.width/2;
    joyStartY = r.top + r.height/2;
  });
  window.addEventListener('touchmove', e => {
    if (!joyActive) return;
    const t = e.touches[0];
    let dx = t.clientX - joyStartX;
    let dy = t.clientY - joyStartY;
    const maxR = 60;
    const dist = Math.sqrt(dx*dx+dy*dy);
    if (dist > maxR) { dx = dx/dist*maxR; dy = dy/dist*maxR; }
    joyKnob.style.left = (70 + dx) + 'px';
    joyKnob.style.top = (70 + dy) + 'px';
    touchMoveX = dx / maxR;
    touchMoveY = dy / maxR;
  });
  window.addEventListener('touchend', e => {
    if (e.touches.length === 0 || joyActive) {
      joyActive = false;
      touchMoveX = 0; touchMoveY = 0;
      joyKnob.style.left = '70px';
      joyKnob.style.top = '70px';
    }
  });
  fireBtn.addEventListener('touchstart', e => { e.preventDefault(); touchFiring = true; });
  fireBtn.addEventListener('touchend', e => { touchFiring = false; });
}

// ---- GAME STATE ----
let gameState = 'menu'; // menu, playing, gameover
let score = 0;
let wave = 1;
let waveTimer = 0;
let waveEnemiesLeft = 0;
let bossActive = false;
let boss = null;
let bossWarningTimer = 0;
let lives = 3;
let shakeTimer = 0;
let shakeIntensity = 0;

// ---- OBJECT POOLS ----
const stars = [];
const tunnelRings = [];
const playerBullets = [];
const enemyBullets = [];
const enemies = [];
const particles = [];
const powerups = [];

// ---- PLAYER ----
const player = {
  x: 0, y: 0,
  vx: 0, vy: 0,
  shield: 100,
  maxShield: 100,
  fireCD: 0,
  fireCDMax: 7,
  invincible: 0,
  tilt: 0,
  engineGlow: 0,
};

// ---- INIT ----
function initStars() {
  stars.length = 0;
  for (let i = 0; i < 200; i++) {
    stars.push({
      x: Math.random() * W - CX,
      y: Math.random() * H - CY,
      z: Math.random() * 1000,
      brightness: Math.random()
    });
  }
}

function initTunnel() {
  tunnelRings.length = 0;
  for (let i = 0; i < 30; i++) {
    tunnelRings.push({
      z: i * 120,
      rotation: i * 5,
    });
  }
}

function initGame() {
  score = 0;
  wave = 1;
  waveTimer = 0;
  waveEnemiesLeft = 8;
  bossActive = false;
  boss = null;
  bossWarningTimer = 0;
  lives = 3;
  player.x = 0;
  player.y = H * 0.25;
  player.vx = 0;
  player.vy = 0;
  player.shield = 100;
  player.fireCD = 0;
  player.invincible = 0;
  player.tilt = 0;
  playerBullets.length = 0;
  enemyBullets.length = 0;
  enemies.length = 0;
  particles.length = 0;
  powerups.length = 0;
  initStars();
  initTunnel();
}

// ---- TUNNEL RENDERING ----
const TUNNEL_SPEED = 180;
const HEX_SIDES = 6;

function projectZ(z) {
  const fov = 600;
  const scale = fov / (z + fov);
  return scale;
}

function drawHexRing(cx, cy, radius, rotation, alpha, lineWidth) {
  ctx.save();
  ctx.translate(cx, cy);
  ctx.rotate(rotation);
  ctx.beginPath();
  for (let i = 0; i <= HEX_SIDES; i++) {
    const angle = (Math.PI * 2 / HEX_SIDES) * i - Math.PI / 2;
    const px = Math.cos(angle) * radius;
    const py = Math.sin(angle) * radius;
    if (i === 0) ctx.moveTo(px, py);
    else ctx.lineTo(px, py);
  }
  ctx.closePath();
  ctx.strokeStyle = `rgba(0,255,220,${alpha})`;
  ctx.lineWidth = lineWidth;
  ctx.stroke();

  // inner detail hex
  if (alpha > 0.15) {
    ctx.beginPath();
    const r2 = radius * 0.85;
    for (let i = 0; i <= HEX_SIDES; i++) {
      const angle = (Math.PI * 2 / HEX_SIDES) * i - Math.PI / 2 + Math.PI / 6;
      const px = Math.cos(angle) * r2;
      const py = Math.sin(angle) * r2;
      if (i === 0) ctx.moveTo(px, py);
      else ctx.lineTo(px, py);
    }
    ctx.closePath();
    ctx.strokeStyle = `rgba(0,200,180,${alpha * 0.3})`;
    ctx.lineWidth = lineWidth * 0.5;
    ctx.stroke();
  }
  ctx.restore();
}

function updateTunnel(dt) {
  const maxZ = 30 * 120;
  for (let i = tunnelRings.length - 1; i >= 0; i--) {
    const ring = tunnelRings[i];
    ring.z -= TUNNEL_SPEED * dt;
    ring.rotation += 0.3 * dt;
    if (ring.z < -100) {
      ring.z += maxZ;
      ring.rotation = Math.random() * Math.PI * 2;
    }
  }
}

function drawTunnel() {
  // sort rings far to near
  const sorted = tunnelRings.slice().sort((a, b) => b.z - a.z);
  for (const ring of sorted) {
    const scale = projectZ(ring.z);
    const radius = Math.max(W, H) * 0.6 * scale;
    const alpha = Math.max(0, Math.min(1, scale * 1.5));
    const lw = Math.max(0.5, 2.5 * scale);
    if (radius > 2) {
      drawHexRing(CX, CY, radius, ring.rotation, alpha * 0.6, lw);
    }
  }
}

// ---- STARS ----
function updateStars(dt) {
  for (const s of stars) {
    s.z -= 400 * dt;
    if (s.z < 1) {
      s.x = Math.random() * W - CX;
      s.y = Math.random() * H - CY;
      s.z = 800 + Math.random() * 200;
      s.brightness = Math.random();
    }
  }
}

function drawStars() {
  for (const s of stars) {
    const scale = projectZ(s.z);
    const sx = CX + s.x * scale;
    const sy = CY + s.y * scale;
    const size = Math.max(0.5, 2 * scale);
    const a = Math.min(1, scale * 2) * s.brightness;
    ctx.fillStyle = `rgba(180,220,255,${a})`;
    ctx.fillRect(sx - size/2, sy - size/2, size, size);
  }
}

// ---- PLAYER ----
function updatePlayer(dt) {
  const speed = 380;
  const friction = 0.88;
  let ix = 0, iy = 0;
  if (keys['ArrowLeft'] || keys['KeyA']) ix = -1;
  if (keys['ArrowRight'] || keys['KeyD']) ix = 1;
  if (keys['ArrowUp'] || keys['KeyW']) iy = -1;
  if (keys['ArrowDown'] || keys['KeyS']) iy = 1;
  if (isTouchDevice) { ix += touchMoveX; iy += touchMoveY; }

  player.vx += ix * speed * dt;
  player.vy += iy * speed * dt;
  player.vx *= friction;
  player.vy *= friction;
  player.x += player.vx * dt;
  player.y += player.vy * dt;

  // clamp
  const margin = 40;
  const halfW = W/2 - margin;
  const halfH = H/2 - margin;
  player.x = Math.max(-halfW, Math.min(halfW, player.x));
  player.y = Math.max(-halfH, Math.min(halfH, player.y));

  // tilt
  const targetTilt = -ix * 0.35;
  player.tilt += (targetTilt - player.tilt) * 5 * dt;

  // engine glow
  player.engineGlow = 0.5 + Math.sin(performance.now() * 0.01) * 0.3;

  // invincibility
  if (player.invincible > 0) player.invincible -= dt;

  // firing
  const firing = keys['Space'] || touchFiring;
  if (player.fireCD > 0) player.fireCD--;
  if (firing && player.fireCD <= 0) {
    player.fireCD = player.fireCDMax;
    spawnPlayerBullet();
    playSound('laser');
  }
}

function drawPlayer() {
  const px = CX + player.x;
  const py = CY + player.y;

  // blink when invincible
  if (player.invincible > 0 && Math.floor(player.invincible * 10) % 2 === 0) return;

  ctx.save();
  ctx.translate(px, py);
  ctx.rotate(player.tilt);

  // engine glow
  const glowA = player.engineGlow * 0.6;
  const grad = ctx.createRadialGradient(0, 22, 2, 0, 30, 25);
  grad.addColorStop(0, `rgba(0,255,200,${glowA})`);
  grad.addColorStop(0.5, `rgba(0,180,255,${glowA * 0.5})`);
  grad.addColorStop(1, 'rgba(0,100,200,0)');
  ctx.fillStyle = grad;
  ctx.fillRect(-25, 15, 50, 35);

  // engine trail particles
  const trailLen = 8 + Math.random() * 12;
  ctx.beginPath();
  ctx.moveTo(-6, 18);
  ctx.lineTo(0, 18 + trailLen);
  ctx.lineTo(6, 18);
  ctx.fillStyle = `rgba(0,255,220,${0.4 + Math.random() * 0.3})`;
  ctx.fill();

  // ship body (arwing triangle)
  ctx.beginPath();
  ctx.moveTo(0, -24);    // nose
  ctx.lineTo(-20, 18);   // left wing
  ctx.lineTo(-6, 14);    // left inner
  ctx.lineTo(0, 18);     // bottom center
  ctx.lineTo(6, 14);     // right inner
  ctx.lineTo(20, 18);    // right wing
  ctx.closePath();
  ctx.fillStyle = '#0a1a2a';
  ctx.fill();
  ctx.strokeStyle = '#0ff';
  ctx.lineWidth = 2;
  ctx.stroke();

  // cockpit
  ctx.beginPath();
  ctx.moveTo(0, -14);
  ctx.lineTo(-5, 2);
  ctx.lineTo(5, 2);
  ctx.closePath();
  ctx.fillStyle = 'rgba(0,255,200,0.3)';
  ctx.fill();
  ctx.strokeStyle = 'rgba(0,255,220,0.6)';
  ctx.lineWidth = 1;
  ctx.stroke();

  // wing tips glow
  ctx.fillStyle = 'rgba(0,255,255,0.8)';
  ctx.beginPath(); ctx.arc(-20, 18, 2, 0, Math.PI*2); ctx.fill();
  ctx.beginPath(); ctx.arc(20, 18, 2, 0, Math.PI*2); ctx.fill();

  ctx.restore();
}

// ---- PLAYER BULLETS ----
function spawnPlayerBullet() {
  playerBullets.push({
    x: player.x,
    y: player.y - 24,
    z: 0,
    speed: 1200,
    alive: true
  });
}

function updatePlayerBullets(dt) {
  for (let i = playerBullets.length - 1; i >= 0; i--) {
    const b = playerBullets[i];
    b.z += b.speed * dt;
    // shrink toward vanishing point
    if (b.z > 3000 || !b.alive) {
      playerBullets.splice(i, 1);
    }
  }
}

function drawPlayerBullets() {
  for (const b of playerBullets) {
    const scale = projectZ(b.z);
    const bx = CX + b.x * scale + (CX - CX) * (1 - scale);
    const by = CY + b.y * scale + (CY - CY) * (1 - scale);
    // lerp toward center as z increases
    const lerpFactor = b.z / 3000;
    const sx = CX + (b.x) * (1 - lerpFactor);
    const sy = CY + (b.y) * (1 - lerpFactor);
    const size = Math.max(2, 8 * (1 - lerpFactor));

    // glow
    ctx.shadowColor = '#0ff';
    ctx.shadowBlur = 10;
    ctx.fillStyle = '#0ff';
    ctx.fillRect(sx - 1.5, sy - size, 3, size * 2);
    ctx.shadowBlur = 0;
  }
}

// ---- ENEMIES ----
function spawnEnemy(type, x, y) {
  const e = {
    type: type || 'hex',
    x: x !== undefined ? x : (Math.random() - 0.5) * W * 0.6,
    y: y !== undefined ? y : (Math.random() - 0.5) * H * 0.4,
    z: 3000,
    speed: 200 + wave * 15,
    hp: type === 'cube' ? 3 : type === 'diamond' ? 1 : 2,
    alive: true,
    rotation: Math.random() * Math.PI * 2,
    rotSpeed: (Math.random() - 0.5) * 3,
    fireCD: 60 + Math.floor(Math.random() * 120),
    canShoot: type !== 'asteroid',
    wobblePhase: Math.random() * Math.PI * 2,
    wobbleAmp: type === 'diamond' ? 80 : 30,
  };
  enemies.push(e);
}

function spawnAsteroid() {
  enemies.push({
    type: 'asteroid',
    x: (Math.random() - 0.5) * W * 0.5,
    y: (Math.random() - 0.5) * H * 0.3,
    z: 3000,
    speed: 250 + wave * 10,
    hp: 2,
    alive: true,
    rotation: Math.random() * Math.PI * 2,
    rotSpeed: (Math.random() - 0.5) * 2,
    fireCD: 9999,
    canShoot: false,
    wobblePhase: Math.random() * Math.PI * 2,
    wobbleAmp: 20,
    vertices: generateAsteroidVerts(),
  });
}

function generateAsteroidVerts() {
  const verts = [];
  const n = 7 + Math.floor(Math.random() * 4);
  for (let i = 0; i < n; i++) {
    const angle = (Math.PI * 2 / n) * i;
    const r = 0.6 + Math.random() * 0.4;
    verts.push({ angle, r });
  }
  return verts;
}

function updateEnemies(dt) {
  for (let i = enemies.length - 1; i >= 0; i--) {
    const e = enemies[i];
    e.z -= e.speed * dt;
    e.rotation += e.rotSpeed * dt;
    e.wobblePhase += dt * 2;

    // shoot
    if (e.canShoot && e.z < 2000 && e.z > 200) {
      e.fireCD--;
      if (e.fireCD <= 0) {
        e.fireCD = 80 + Math.floor(Math.random() * 60) - wave * 3;
        if (e.fireCD < 30) e.fireCD = 30;
        spawnEnemyBullet(e);
      }
    }

    if (e.z < -100 || !e.alive) {
      if (e.alive && e.z < -100) {
        // passed by player
      }
      enemies.splice(i, 1);
    }
  }
}

function getEnemyScreenPos(e) {
  const lerpFactor = Math.max(0, Math.min(1, 1 - e.z / 3000));
  const wobble = Math.sin(e.wobblePhase) * e.wobbleAmp * (1 - lerpFactor);
  const sx = CX + (e.x + wobble) * lerpFactor;
  const sy = CY + e.y * lerpFactor;
  const size = Math.max(4, 35 * lerpFactor);
  return { sx, sy, size, lerpFactor };
}

function drawEnemies() {
  // sort far to near
  const sorted = enemies.slice().sort((a, b) => b.z - a.z);
  for (const e of sorted) {
    const { sx, sy, size, lerpFactor } = getEnemyScreenPos(e);
    if (size < 2) continue;
    const alpha = Math.min(1, lerpFactor * 2);

    ctx.save();
    ctx.translate(sx, sy);
    ctx.rotate(e.rotation);

    if (e.type === 'hex') {
      drawWireHex(0, 0, size, alpha, '#0f8');
    } else if (e.type === 'diamond') {
      drawWireDiamond(0, 0, size, alpha, '#ff0');
    } else if (e.type === 'cube') {
      drawWireCube(0, 0, size, alpha, '#f80');
    } else if (e.type === 'asteroid') {
      drawAsteroid(0, 0, size, alpha, e.vertices);
    }

    ctx.restore();
  }
}

function drawWireHex(x, y, r, a, color) {
  ctx.beginPath();
  for (let i = 0; i <= 6; i++) {
    const angle = (Math.PI * 2 / 6) * i - Math.PI / 2;
    const px = x + Math.cos(angle) * r;
    const py = y + Math.sin(angle) * r;
    if (i === 0) ctx.moveTo(px, py);
    else ctx.lineTo(px, py);
  }
  ctx.closePath();
  ctx.strokeStyle = color.replace(')', `,${a})`).replace('rgb', 'rgba');
  // simpler approach
  ctx.globalAlpha = a;
  ctx.strokeStyle = color;
  ctx.lineWidth = 2;
  ctx.stroke();
  ctx.fillStyle = color;
  ctx.globalAlpha = a * 0.15;
  ctx.fill();
  ctx.globalAlpha = 1;
}

function drawWireDiamond(x, y, r, a, color) {
  ctx.beginPath();
  ctx.moveTo(x, y - r * 1.3);
  ctx.lineTo(x + r, y);
  ctx.lineTo(x, y + r * 1.3);
  ctx.lineTo(x - r, y);
  ctx.closePath();
  ctx.globalAlpha = a;
  ctx.strokeStyle = color;
  ctx.lineWidth = 2;
  ctx.stroke();
  ctx.fillStyle = color;
  ctx.globalAlpha = a * 0.15;
  ctx.fill();
  ctx.globalAlpha = 1;
}

function drawWireCube(x, y, r, a, color) {
  ctx.globalAlpha = a;
  ctx.strokeStyle = color;
  ctx.lineWidth = 2;
  // front face
  ctx.strokeRect(x - r, y - r, r * 2, r * 2);
  // back face offset
  const off = r * 0.4;
  ctx.strokeRect(x - r + off, y - r - off, r * 2, r * 2);
  // connecting lines
  ctx.beginPath();
  ctx.moveTo(x - r, y - r); ctx.lineTo(x - r + off, y - r - off);
  ctx.moveTo(x + r, y - r); ctx.lineTo(x + r + off, y - r - off);
  ctx.moveTo(x + r, y + r); ctx.lineTo(x + r + off, y + r - off);
  ctx.moveTo(x - r, y + r); ctx.lineTo(x - r + off, y + r - off);
  ctx.stroke();
  ctx.fillStyle = color;
  ctx.globalAlpha = a * 0.1;
  ctx.fillRect(x - r, y - r, r * 2, r * 2);
  ctx.globalAlpha = 1;
}

function drawAsteroid(x, y, r, a, verts) {
  ctx.globalAlpha = a;
  ctx.beginPath();
  for (let i = 0; i <= verts.length; i++) {
    const v = verts[i % verts.length];
    const px = x + Math.cos(v.angle) * v.r * r;
    const py = y + Math.sin(v.angle) * v.r * r;
    if (i === 0) ctx.moveTo(px, py);
    else ctx.lineTo(px, py);
  }
  ctx.closePath();
  ctx.strokeStyle = '#888';
  ctx.lineWidth = 2;
  ctx.stroke();
  ctx.fillStyle = '#444';
  ctx.globalAlpha = a * 0.3;
  ctx.fill();
  ctx.globalAlpha = 1;
}

// ---- ENEMY BULLETS ----
function spawnEnemyBullet(e) {
  const { sx, sy } = getEnemyScreenPos(e);
  const px = CX + player.x;
  const py = CY + player.y;
  const dx = px - sx;
  const dy = py - sy;
  const dist = Math.sqrt(dx*dx + dy*dy) || 1;
  enemyBullets.push({
    x: sx, y: sy,
    vx: (dx / dist) * 300,
    vy: (dy / dist) * 300,
    alive: true,
    life: 3,
  });
}

function updateEnemyBullets(dt) {
  for (let i = enemyBullets.length - 1; i >= 0; i--) {
    const b = enemyBullets[i];
    b.x += b.vx * dt;
    b.y += b.vy * dt;
    b.life -= dt;
    if (b.life <= 0 || b.x < 0 || b.x > W || b.y < 0 || b.y > H || !b.alive) {
      enemyBullets.splice(i, 1);
    }
  }
}

function drawEnemyBullets() {
  for (const b of enemyBullets) {
    ctx.shadowColor = '#f44';
    ctx.shadowBlur = 8;
    ctx.fillStyle = '#f66';
    ctx.beginPath();
    ctx.arc(b.x, b.y, 4, 0, Math.PI * 2);
    ctx.fill();
    ctx.shadowBlur = 0;
  }
}

// ---- BOSS ----
function spawnBoss() {
  bossActive = true;
  bossWarningTimer = 2;
  playSound('boss');
  boss = {
    x: 0,
    y: -H * 0.2,
    z: 3000,
    targetZ: 800,
    hp: 30 + wave * 10,
    maxHp: 30 + wave * 10,
    alive: true,
    rotation: 0,
    phase: 0,
    fireCD: 0,
    pattern: 0,
    patternTimer: 0,
    entered: false,
  };
}

function updateBoss(dt) {
  if (!boss || !boss.alive) return;

  if (bossWarningTimer > 0) {
    bossWarningTimer -= dt;
    return;
  }

  // approach
  if (boss.z > boss.targetZ) {
    boss.z -= 300 * dt;
    if (boss.z <= boss.targetZ) boss.entered = true;
  }

  boss.rotation += 0.5 * dt;
  boss.phase += dt;

  // movement
  boss.x = Math.sin(boss.phase * 0.7) * W * 0.2;
  boss.y = -H * 0.15 + Math.sin(boss.phase * 0.5) * H * 0.08;

  // attacks
  if (boss.entered) {
    boss.fireCD -= dt;
    boss.patternTimer += dt;
    if (boss.patternTimer > 5) {
      boss.pattern = (boss.pattern + 1) % 3;
      boss.patternTimer = 0;
    }

    if (boss.fireCD <= 0) {
      if (boss.pattern === 0) {
        // aimed shot
        boss.fireCD = 0.5;
        const bx = CX + boss.x;
        const by = CY + boss.y;
        const px = CX + player.x;
        const py = CY + player.y;
        const dx = px - bx;
        const dy = py - by;
        const d = Math.sqrt(dx*dx+dy*dy) || 1;
        enemyBullets.push({ x: bx, y: by, vx: dx/d*350, vy: dy/d*350, alive: true, life: 4 });
      } else if (boss.pattern === 1) {
        // spread
        boss.fireCD = 0.8;
        const bx = CX + boss.x;
        const by = CY + boss.y;
        for (let a = -2; a <= 2; a++) {
          const angle = Math.PI/2 + a * 0.25;
          enemyBullets.push({ x: bx, y: by, vx: Math.cos(angle)*280, vy: Math.sin(angle)*280, alive: true, life: 4 });
        }
      } else {
        // spiral
        boss.fireCD = 0.15;
        const bx = CX + boss.x;
        const by = CY + boss.y;
        const angle = boss.phase * 5;
        enemyBullets.push({ x: bx, y: by, vx: Math.cos(angle)*320, vy: Math.sin(angle)*320, alive: true, life: 3 });
      }
    }
  }
}

function drawBoss() {
  if (!boss || !boss.alive) return;

  if (bossWarningTimer > 0) {
    // warning flash
    const flash = Math.sin(bossWarningTimer * 12) > 0;
    if (flash) {
      ctx.fillStyle = 'rgba(255,0,0,0.15)';
      ctx.fillRect(0, 0, W, H);
      ctx.fillStyle = '#f44';
      ctx.font = 'bold 36px "Courier New"';
      ctx.textAlign = 'center';
      ctx.fillText('WARNING', CX, CY - 20);
      ctx.font = '18px "Courier New"';
      ctx.fillText('BOSS APPROACHING', CX, CY + 15);
    }
    return;
  }

  const lerpFactor = Math.max(0, Math.min(1, 1 - boss.z / 3000));
  const sx = CX + boss.x * lerpFactor;
  const sy = CY + boss.y * lerpFactor;
  const size = Math.max(20, 80 * lerpFactor);

  ctx.save();
  ctx.translate(sx, sy);
  ctx.rotate(boss.rotation);

  // outer hex
  ctx.beginPath();
  for (let i = 0; i <= 6; i++) {
    const angle = (Math.PI * 2 / 6) * i;
    const px = Math.cos(angle) * size;
    const py = Math.sin(angle) * size;
    if (i === 0) ctx.moveTo(px, py);
    else ctx.lineTo(px, py);
  }
  ctx.closePath();
  ctx.strokeStyle = '#f44';
  ctx.lineWidth = 3;
  ctx.stroke();
  ctx.fillStyle = 'rgba(255,50,50,0.1)';
  ctx.fill();

  // inner hex
  ctx.beginPath();
  for (let i = 0; i <= 6; i++) {
    const angle = (Math.PI * 2 / 6) * i + Math.PI / 6;
    const px = Math.cos(angle) * size * 0.6;
    const py = Math.sin(angle) * size * 0.6;
    if (i === 0) ctx.moveTo(px, py);
    else ctx.lineTo(px, py);
  }
  ctx.closePath();
  ctx.strokeStyle = '#f88';
  ctx.lineWidth = 2;
  ctx.stroke();

  // core
  ctx.beginPath();
  ctx.arc(0, 0, size * 0.2, 0, Math.PI * 2);
  ctx.fillStyle = `rgba(255,100,100,${0.5 + Math.sin(performance.now() * 0.005) * 0.3})`;
  ctx.fill();

  // spokes
  for (let i = 0; i < 6; i++) {
    const angle = (Math.PI * 2 / 6) * i + boss.rotation * 0.5;
    ctx.beginPath();
    ctx.moveTo(Math.cos(angle) * size * 0.25, Math.sin(angle) * size * 0.25);
    ctx.lineTo(Math.cos(angle) * size * 0.55, Math.sin(angle) * size * 0.55);
    ctx.strokeStyle = 'rgba(255,150,100,0.5)';
    ctx.lineWidth = 2;
    ctx.stroke();
  }

  ctx.restore();

  // health bar
  if (boss.entered) {
    const barW = 200;
    const barH = 8;
    const barX = CX - barW / 2;
    const barY = 60;
    const hpPct = boss.hp / boss.maxHp;
    ctx.fillStyle = 'rgba(0,0,0,0.5)';
    ctx.fillRect(barX - 2, barY - 2, barW + 4, barH + 4);
    ctx.fillStyle = hpPct > 0.5 ? '#f44' : hpPct > 0.25 ? '#f80' : '#ff0';
    ctx.fillRect(barX, barY, barW * hpPct, barH);
    ctx.strokeStyle = '#f44';
    ctx.lineWidth = 1;
    ctx.strokeRect(barX, barY, barW, barH);
    ctx.fillStyle = '#f88';
    ctx.font = '11px "Courier New"';
    ctx.textAlign = 'center';
    ctx.fillText('BOSS', CX, barY - 5);
  }
}

// ---- POWERUPS ----
function spawnPowerup(x, y) {
  if (Math.random() > 0.25) return; // 25% chance
  powerups.push({
    x: x, y: y,
    life: 5,
    bobPhase: Math.random() * Math.PI * 2,
    type: Math.random() < 0.5 ? 'shield' : 'rapid',
  });
}

function updatePowerups(dt) {
  for (let i = powerups.length - 1; i >= 0; i--) {
    const p = powerups[i];
    p.life -= dt;
    p.bobPhase += dt * 3;
    if (p.life <= 0) { powerups.splice(i, 1); continue; }

    // collision with player
    const px = CX + player.x;
    const py = CY + player.y;
    const dx = p.x - px;
    const dy = p.y - py;
    if (Math.sqrt(dx*dx + dy*dy) < 25) {
      if (p.type === 'shield') {
        player.shield = Math.min(player.maxShield, player.shield + 30);
      } else {
        player.fireCDMax = Math.max(3, player.fireCDMax - 1);
        setTimeout(() => { player.fireCDMax = 7; }, 8000);
      }
      playSound('powerup');
      score += 50;
      powerups.splice(i, 1);
    }
  }
}

function drawPowerups() {
  for (const p of powerups) {
    const bob = Math.sin(p.bobPhase) * 5;
    const color = p.type === 'shield' ? '#0f0' : '#ff0';
    ctx.save();
    ctx.translate(p.x, p.y + bob);

    ctx.shadowColor = color;
    ctx.shadowBlur = 12;
    ctx.strokeStyle = color;
    ctx.lineWidth = 2;

    if (p.type === 'shield') {
      // plus sign
      ctx.beginPath();
      ctx.moveTo(-6, 0); ctx.lineTo(6, 0);
      ctx.moveTo(0, -6); ctx.lineTo(0, 6);
      ctx.stroke();
    } else {
      // lightning bolt
      ctx.beginPath();
      ctx.moveTo(2, -8); ctx.lineTo(-4, 1); ctx.lineTo(1, 1); ctx.lineTo(-2, 8); ctx.lineTo(4, -1); ctx.lineTo(-1, -1);
      ctx.closePath();
      ctx.stroke();
    }

    ctx.shadowBlur = 0;
    ctx.restore();
  }
}

// ---- PARTICLES ----
function spawnExplosion(x, y, count, color) {
  for (let i = 0; i < count; i++) {
    const angle = Math.random() * Math.PI * 2;
    const speed = 50 + Math.random() * 200;
    particles.push({
      x, y,
      vx: Math.cos(angle) * speed,
      vy: Math.sin(angle) * speed,
      life: 0.3 + Math.random() * 0.5,
      maxLife: 0.3 + Math.random() * 0.5,
      size: 1 + Math.random() * 3,
      color: color || '#0ff',
    });
  }
}

function updateParticles(dt) {
  for (let i = particles.length - 1; i >= 0; i--) {
    const p = particles[i];
    p.x += p.vx * dt;
    p.y += p.vy * dt;
    p.vx *= 0.97;
    p.vy *= 0.97;
    p.life -= dt;
    if (p.life <= 0) particles.splice(i, 1);
  }
}

function drawParticles() {
  for (const p of particles) {
    const a = p.life / p.maxLife;
    ctx.globalAlpha = a;
    ctx.fillStyle = p.color;
    ctx.fillRect(p.x - p.size/2, p.y - p.size/2, p.size, p.size);
  }
  ctx.globalAlpha = 1;
}

// ---- COLLISIONS ----
function checkCollisions() {
  const px = CX + player.x;
  const py = CY + player.y;

  // player bullets vs enemies
  for (const b of playerBullets) {
    if (!b.alive) continue;
    const lerpFactor = b.z / 3000;
    const bx = CX + b.x * (1 - lerpFactor);
    const by = CY + b.y * (1 - lerpFactor);
    const bSize = 15 * (1 - lerpFactor);

    for (const e of enemies) {
      if (!e.alive) continue;
      const { sx, sy, size } = getEnemyScreenPos(e);
      const dx = bx - sx;
      const dy = by - sy;
      // check z proximity too
      const zDiff = Math.abs(b.z - e.z);
      if (zDiff < 300 && Math.sqrt(dx*dx + dy*dy) < size + bSize) {
        b.alive = false;
        e.hp--;
        if (e.hp <= 0) {
          e.alive = false;
          const pts = e.type === 'cube' ? 150 : e.type === 'diamond' ? 75 : e.type === 'asteroid' ? 50 : 100;
          score += pts;
          spawnExplosion(sx, sy, 15, e.type === 'asteroid' ? '#888' : '#0ff');
          playSound('explosion');
          spawnPowerup(sx, sy);
          waveEnemiesLeft--;
        } else {
          spawnExplosion(sx, sy, 5, '#fff');
        }
        break;
      }
    }

    // player bullets vs boss
    if (boss && boss.alive && boss.entered) {
      const lf = Math.max(0, Math.min(1, 1 - boss.z / 3000));
      const bsx = CX + boss.x * lf;
      const bsy = CY + boss.y * lf;
      const bsz = 80 * lf;
      const dx = bx - bsx;
      const dy = by - bsy;
      const zDiff = Math.abs(b.z - boss.z);
      if (zDiff < 500 && Math.sqrt(dx*dx + dy*dy) < bsz + bSize) {
        b.alive = false;
        boss.hp--;
        spawnExplosion(bsx + (Math.random()-0.5)*40, bsy + (Math.random()-0.5)*40, 3, '#f88');
        if (boss.hp <= 0) {
          boss.alive = false;
          bossActive = false;
          spawnExplosion(bsx, bsy, 40, '#f44');
          spawnExplosion(bsx, bsy, 20, '#ff0');
          playSound('explosion');
          score += 500 + wave * 100;
          waveEnemiesLeft = 0;
        }
      }
    }
  }

  // enemy bullets vs player
  if (player.invincible <= 0) {
    for (const b of enemyBullets) {
      if (!b.alive) continue;
      const dx = b.x - px;
      const dy = b.y - py;
      if (Math.sqrt(dx*dx + dy*dy) < 18) {
        b.alive = false;
        damagePlayer(15);
      }
    }

    // enemies vs player (close range collision)
    for (const e of enemies) {
      if (!e.alive || e.z > 200) continue;
      const { sx, sy, size } = getEnemyScreenPos(e);
      const dx = sx - px;
      const dy = sy - py;
      if (Math.sqrt(dx*dx + dy*dy) < size + 15) {
        e.alive = false;
        e.hp = 0;
        spawnExplosion(sx, sy, 10, '#f80');
        playSound('explosion');
        damagePlayer(25);
        waveEnemiesLeft--;
      }
    }
  }
}

function damagePlayer(amount) {
  player.shield -= amount;
  player.invincible = 1.5;
  shakeTimer = 0.3;
  shakeIntensity = 8;
  playSound('damage');
  spawnExplosion(CX + player.x, CY + player.y, 8, '#f44');

  if (player.shield <= 0) {
    lives--;
    if (lives > 0) {
      player.shield = player.maxShield;
      player.invincible = 3;
    } else {
      gameState = 'gameover';
      document.getElementById('game-over-screen').style.display = 'flex';
      document.getElementById('final-score').textContent = 'SCORE: ' + score;
      document.getElementById('final-wave').textContent = 'WAVE: ' + wave;
    }
  }
}

// ---- WAVE MANAGEMENT ----
function updateWaves(dt) {
  if (bossActive) return;

  waveTimer += dt;

  // spawn enemies over time
  if (waveEnemiesLeft > 0 && enemies.length < 6 + wave) {
    if (Math.random() < dt * (1 + wave * 0.3)) {
      const types = ['hex', 'hex', 'diamond', 'cube', 'asteroid'];
      const type = types[Math.floor(Math.random() * types.length)];
      if (type === 'asteroid') spawnAsteroid();
      else spawnEnemy(type);
    }
  }

  // wave complete
  if (waveEnemiesLeft <= 0 && enemies.length === 0 && !bossActive) {
    wave++;
    waveTimer = 0;

    if (wave % 3 === 0) {
      // boss wave
      spawnBoss();
      waveEnemiesLeft = 0;
    } else {
      waveEnemiesLeft = 8 + wave * 3;
    }
  }
}

// ---- HUD ----
function drawHUD() {
  // Shield bar
  const barW = 160;
  const barH = 14;
  const barX = 15;
  const barY = 15;
  const pct = player.shield / player.maxShield;
  const shieldColor = pct > 0.6 ? '#0f0' : pct > 0.3 ? '#ff0' : '#f44';

  ctx.fillStyle = 'rgba(0,0,0,0.4)';
  ctx.fillRect(barX - 1, barY - 1, barW + 2, barH + 2);
  ctx.fillStyle = shieldColor;
  ctx.fillRect(barX, barY, barW * Math.max(0, pct), barH);
  ctx.strokeStyle = shieldColor;
  ctx.lineWidth = 1;
  ctx.strokeRect(barX, barY, barW, barH);
  ctx.fillStyle = '#fff';
  ctx.font = '10px "Courier New"';
  ctx.textAlign = 'left';
  ctx.fillText('SHIELD', barX, barY + barH + 14);

  // Lives
  for (let i = 0; i < lives; i++) {
    const lx = barX + barW + 20 + i * 22;
    ctx.beginPath();
    ctx.moveTo(lx, barY + 2);
    ctx.lineTo(lx - 7, barY + barH);
    ctx.lineTo(lx + 7, barY + barH);
    ctx.closePath();
    ctx.strokeStyle = '#0ff';
    ctx.lineWidth = 1.5;
    ctx.stroke();
  }

  // Score
  ctx.fillStyle = '#0ff';
  ctx.font = 'bold 20px "Courier New"';
  ctx.textAlign = 'right';
  ctx.fillText(score.toString().padStart(8, '0'), W - 15, 30);
  ctx.fillStyle = '#088';
  ctx.font = '10px "Courier New"';
  ctx.fillText('SCORE', W - 15, 44);

  // Wave
  ctx.fillStyle = '#0f8';
  ctx.font = '14px "Courier New"';
  ctx.textAlign = 'center';
  ctx.fillText('WAVE ' + wave, CX, 28);

  // title watermark
  ctx.fillStyle = 'rgba(0,255,220,0.08)';
  ctx.font = '10px "Courier New"';
  ctx.textAlign = 'left';
  ctx.fillText('STAR FOX LITE / KORB ENGINEERING', 15, H - 12);
}

// ---- SCREEN SHAKE ----
function applyShake() {
  if (shakeTimer > 0) {
    const sx = (Math.random() - 0.5) * shakeIntensity;
    const sy = (Math.random() - 0.5) * shakeIntensity;
    ctx.translate(sx, sy);
    return true;
  }
  return false;
}

// ---- BACKGROUND ----
function drawBackground() {
  // subtle radial gradient
  const grad = ctx.createRadialGradient(CX, CY, 0, CX, CY, Math.max(W, H) * 0.7);
  grad.addColorStop(0, '#050a12');
  grad.addColorStop(1, '#000');
  ctx.fillStyle = grad;
  ctx.fillRect(0, 0, W, H);
}

// ---- MAIN LOOP ----
let lastTime = 0;

function gameLoop(time) {
  requestAnimationFrame(gameLoop);
  const dt = Math.min(0.05, (time - lastTime) / 1000);
  lastTime = time;

  if (gameState !== 'playing') {
    // still draw background on menu/gameover
    drawBackground();
    drawStars();
    updateStars(dt);
    updateTunnel(dt);
    drawTunnel();
    return;
  }

  // update
  shakeTimer = Math.max(0, shakeTimer - dt);

  updateStars(dt);
  updateTunnel(dt);
  updatePlayer(dt);
  updatePlayerBullets(dt);
  updateEnemies(dt);
  updateEnemyBullets(dt);
  updateBoss(dt);
  updateParticles(dt);
  updatePowerups(dt);
  checkCollisions();
  updateWaves(dt);

  // draw
  ctx.save();
  drawBackground();
  applyShake();
  drawStars();
  drawTunnel();
  drawPlayerBullets();
  drawEnemies();
  drawBoss();
  drawEnemyBullets();
  drawPowerups();
  drawParticles();
  drawPlayer();
  ctx.restore();
  drawHUD();
}

// ---- START / RESTART ----
document.getElementById('start-btn').addEventListener('click', () => {
  ensureAudio();
  document.getElementById('start-screen').style.display = 'none';
  initGame();
  gameState = 'playing';
});

document.getElementById('restart-btn').addEventListener('click', () => {
  document.getElementById('game-over-screen').style.display = 'none';
  initGame();
  gameState = 'playing';
});

// init for menu background
initStars();
initTunnel();
requestAnimationFrame(gameLoop);
</script>
