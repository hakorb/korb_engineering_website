<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Star Fox Lite - Korb Engineering</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
html, body { width: 100%; height: 100%; overflow: hidden; background: #000; font-family: 'Courier New', monospace; }
canvas { display: block; }
#ui-overlay {
  position: absolute; top: 0; left: 0; width: 100%; height: 100%;
  pointer-events: none; z-index: 10;
}
#start-screen, #game-over-screen {
  position: absolute; top: 0; left: 0; width: 100%; height: 100%;
  display: flex; flex-direction: column; align-items: center; justify-content: center;
  z-index: 20; pointer-events: all; background: rgba(0,0,0,0.85);
}
#start-screen h1, #game-over-screen h1 {
  font-size: 48px; color: #0f0; text-shadow: 0 0 20px #0f0, 0 0 40px #0a0;
  letter-spacing: 6px; margin-bottom: 8px;
}
#start-screen h2 {
  font-size: 16px; color: #0cc; letter-spacing: 4px; margin-bottom: 40px;
  text-shadow: 0 0 10px #0cc;
}
#game-over-screen h2 { font-size: 20px; color: #f44; margin-bottom: 10px; }
#game-over-screen .score-display { font-size: 28px; color: #0f0; margin-bottom: 30px; }
.btn {
  pointer-events: all; cursor: pointer;
  background: transparent; border: 2px solid #0f0; color: #0f0;
  font-family: 'Courier New', monospace; font-size: 20px;
  padding: 12px 40px; letter-spacing: 3px;
  text-shadow: 0 0 10px #0f0; transition: all 0.2s;
}
.btn:hover { background: #0f0; color: #000; }
.controls-info {
  margin-top: 30px; color: #0aa; font-size: 13px; text-align: center; line-height: 1.8;
}
/* Touch controls */
#touch-controls {
  display: none; position: absolute; bottom: 0; left: 0; width: 100%; height: 200px;
  z-index: 15; pointer-events: all;
}
#joystick-zone {
  position: absolute; bottom: 20px; left: 20px; width: 150px; height: 150px;
  border: 2px solid rgba(0,255,0,0.3); border-radius: 50%;
  background: rgba(0,255,0,0.05);
}
#joystick-knob {
  position: absolute; width: 50px; height: 50px; border-radius: 50%;
  background: rgba(0,255,0,0.4); border: 2px solid rgba(0,255,0,0.6);
  top: 50px; left: 50px; transform: translate(-50%, -50%);
  pointer-events: none;
}
#fire-btn {
  position: absolute; bottom: 40px; right: 40px; width: 80px; height: 80px;
  border-radius: 50%; border: 3px solid rgba(255,50,50,0.7);
  background: rgba(255,50,50,0.2); color: #f55; font-family: 'Courier New', monospace;
  font-size: 14px; font-weight: bold; display: flex; align-items: center;
  justify-content: center; cursor: pointer;
}
</style>
</head>
<body>
<canvas id="game"></canvas>

<div id="start-screen">
  <h1>STAR FOX LITE</h1>
  <h2>KORB ENGINEERING</h2>
  <button class="btn" id="start-btn">START MISSION</button>
  <div class="controls-info">
    ARROW KEYS to move | SPACEBAR to fire<br>
    Touch: Virtual joystick + Fire button
  </div>
</div>

<div id="game-over-screen" style="display:none;">
  <h1>MISSION FAILED</h1>
  <h2>SHIP DESTROYED</h2>
  <div class="score-display" id="final-score">SCORE: 0</div>
  <button class="btn" id="restart-btn">RETRY MISSION</button>
</div>

<div id="touch-controls">
  <div id="joystick-zone">
    <div id="joystick-knob"></div>
  </div>
  <div id="fire-btn">FIRE</div>
</div>

<script>
// ============================================================
// STAR FOX LITE - Korb Engineering
// ============================================================

const canvas = document.getElementById('game');
const ctx = canvas.getContext('2d');

// --- Audio ---
const AudioCtx = window.AudioContext || window.webkitAudioContext;
let audioCtx = null;
function ensureAudio() { if (!audioCtx) audioCtx = new AudioCtx(); }

function playSound(freq, dur, type, vol) {
  if (!audioCtx) return;
  const g = audioCtx.createGain();
  const o = audioCtx.createOscillator();
  o.type = type || 'square';
  o.frequency.setValueAtTime(freq, audioCtx.currentTime);
  g.gain.setValueAtTime(vol || 0.15, audioCtx.currentTime);
  g.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + dur);
  o.connect(g); g.connect(audioCtx.destination);
  o.start(); o.stop(audioCtx.currentTime + dur);
}

function sfxLaser() { playSound(880, 0.1, 'square', 0.12); playSound(1200, 0.08, 'sawtooth', 0.08); }
function sfxHit() { playSound(200, 0.15, 'sawtooth', 0.2); playSound(120, 0.25, 'square', 0.15); }
function sfxExplosion() { playSound(80, 0.4, 'sawtooth', 0.25); playSound(50, 0.5, 'square', 0.2); }
function sfxPlayerHit() { playSound(150, 0.3, 'square', 0.3); playSound(100, 0.4, 'sawtooth', 0.2); }
function sfxPowerup() { playSound(600, 0.1, 'sine', 0.15); setTimeout(() => playSound(900, 0.15, 'sine', 0.15), 100); }
function sfxBossWarning() { playSound(200, 0.2, 'square', 0.2); setTimeout(() => playSound(200, 0.2, 'square', 0.2), 300); }

// --- Sizing ---
let W, H, CX, CY;
function resize() {
  W = canvas.width = window.innerWidth;
  H = canvas.height = window.innerHeight;
  CX = W / 2; CY = H / 2;
}
window.addEventListener('resize', resize);
resize();

// --- Detect touch ---
const isTouchDevice = 'ontouchstart' in window || navigator.maxTouchPoints > 0;
if (isTouchDevice) document.getElementById('touch-controls').style.display = 'block';

// --- Game State ---
let gameRunning = false;
let score = 0;
let lives = 3;
let shields = 100;
let wave = 1;
let waveTimer = 0;
let waveEnemyCount = 0;
let waveEnemiesSpawned = 0;
let bossActive = false;
let gameTime = 0;
let difficulty = 1;
let screenShake = 0;
let invincibleTimer = 0;
let comboCount = 0;
let comboTimer = 0;
let powerupTimer = 0;
let rapidFire = false;
let rapidFireTimer = 0;

// --- Player ---
const player = {
  x: 0, y: 0, // normalized -1 to 1
  vx: 0, vy: 0,
  bankAngle: 0,
  fireCD: 0,
  boostTrail: []
};

// --- Collections ---
let stars = [];
let groundLines = [];
let lasers = [];
let enemies = [];
let explosions = [];
let particles = [];
let powerups = [];
let enemyLasers = [];
let textPopups = [];

// --- Input ---
const keys = {};
let touchJoystick = { active: false, dx: 0, dy: 0 };
let touchFiring = false;

document.addEventListener('keydown', e => { keys[e.code] = true; if (e.code === 'Space') e.preventDefault(); });
document.addEventListener('keyup', e => { keys[e.code] = false; });

// Touch joystick
const jZone = document.getElementById('joystick-zone');
const jKnob = document.getElementById('joystick-knob');
const fireBtn = document.getElementById('fire-btn');

jZone.addEventListener('touchstart', e => {
  e.preventDefault(); touchJoystick.active = true;
  handleJoystickMove(e.touches[0]);
}, { passive: false });
jZone.addEventListener('touchmove', e => {
  e.preventDefault();
  if (touchJoystick.active) handleJoystickMove(e.touches[0]);
}, { passive: false });
jZone.addEventListener('touchend', e => {
  touchJoystick.active = false; touchJoystick.dx = 0; touchJoystick.dy = 0;
  jKnob.style.left = '50%'; jKnob.style.top = '50%';
  jKnob.style.transform = 'translate(-50%, -50%)';
});

function handleJoystickMove(touch) {
  const rect = jZone.getBoundingClientRect();
  const cx = rect.left + rect.width / 2;
  const cy = rect.top + rect.height / 2;
  let dx = (touch.clientX - cx) / (rect.width / 2);
  let dy = (touch.clientY - cy) / (rect.height / 2);
  const dist = Math.sqrt(dx * dx + dy * dy);
  if (dist > 1) { dx /= dist; dy /= dist; }
  touchJoystick.dx = dx; touchJoystick.dy = dy;
  jKnob.style.left = (50 + dx * 40) + '%';
  jKnob.style.top = (50 + dy * 40) + '%';
  jKnob.style.transform = 'translate(-50%, -50%)';
}

fireBtn.addEventListener('touchstart', e => { e.preventDefault(); touchFiring = true; }, { passive: false });
fireBtn.addEventListener('touchend', e => { touchFiring = false; });

// --- Init stars ---
function initStars() {
  stars = [];
  for (let i = 0; i < 200; i++) {
    stars.push({
      x: (Math.random() - 0.5) * 2,
      y: (Math.random() - 0.5) * 2,
      z: Math.random() * 3 + 0.5,
      speed: Math.random() * 0.5 + 0.3,
      brightness: Math.random()
    });
  }
}

function initGroundLines() {
  groundLines = [];
  for (let i = 0; i < 20; i++) {
    groundLines.push({ z: i * 2 });
  }
}

// --- Projection ---
function project(x3d, y3d, z3d) {
  const fov = 300;
  const scale = fov / (z3d + 1);
  return {
    x: CX + x3d * scale,
    y: CY + y3d * scale,
    scale: scale
  };
}

// --- Spawn enemy ---
function spawnEnemy(type) {
  const e = {
    type: type || 'fighter',
    x: (Math.random() - 0.5) * 3,
    y: (Math.random() - 0.5) * 1.5 - 0.5,
    z: 25 + Math.random() * 10,
    hp: 1,
    maxHp: 1,
    speed: 0.04 + difficulty * 0.005,
    pattern: Math.floor(Math.random() * 4),
    patternTimer: Math.random() * Math.PI * 2,
    patternAmp: 0.5 + Math.random() * 1.0,
    shootCD: 120 + Math.random() * 120,
    points: 100,
    color: '#0f0',
    size: 1
  };

  if (type === 'weaver') {
    e.patternAmp = 1.5; e.speed *= 0.8; e.color = '#ff0'; e.points = 150;
  } else if (type === 'tank') {
    e.hp = 3; e.maxHp = 3; e.speed *= 0.5; e.color = '#f80'; e.points = 300;
    e.size = 1.5; e.y = (Math.random() - 0.5) * 0.8;
  } else if (type === 'speeder') {
    e.speed *= 2; e.color = '#f0f'; e.points = 200;
    e.y = (Math.random() - 0.5) * 2;
  } else if (type === 'boss') {
    e.hp = 20 + wave * 5; e.maxHp = e.hp; e.speed = 0.015;
    e.size = 3; e.color = '#f00'; e.points = 2000;
    e.x = 0; e.y = -0.5; e.z = 30;
    e.shootCD = 40; e.pattern = 10;
  }

  enemies.push(e);
}

// --- Spawn powerup ---
function spawnPowerup(x, y, z) {
  if (Math.random() > 0.15) return; // 15% drop chance
  const types = ['health', 'shield', 'rapid'];
  powerups.push({
    type: types[Math.floor(Math.random() * types.length)],
    x: x, y: y, z: z, rot: 0
  });
}

// --- Explosions ---
function createExplosion(sx, sy, scale, color) {
  for (let i = 0; i < 12; i++) {
    const angle = (Math.PI * 2 / 12) * i + Math.random() * 0.5;
    const spd = (2 + Math.random() * 4) * scale;
    particles.push({
      x: sx, y: sy,
      vx: Math.cos(angle) * spd,
      vy: Math.sin(angle) * spd,
      life: 1, decay: 0.02 + Math.random() * 0.02,
      color: color || '#ff0', size: (2 + Math.random() * 3) * scale
    });
  }
  explosions.push({ x: sx, y: sy, radius: 5 * scale, maxRadius: 40 * scale, alpha: 1, color: color || '#ff0' });
}

function addTextPopup(text, x, y, color) {
  textPopups.push({ text, x, y, vy: -2, life: 1, color: color || '#ff0' });
}

// --- Start / Reset ---
function startGame() {
  ensureAudio();
  gameRunning = true;
  score = 0; lives = 3; shields = 100; wave = 1; waveTimer = 0;
  waveEnemyCount = 5; waveEnemiesSpawned = 0; bossActive = false;
  gameTime = 0; difficulty = 1; screenShake = 0; invincibleTimer = 0;
  comboCount = 0; comboTimer = 0; rapidFire = false; rapidFireTimer = 0;
  player.x = 0; player.y = 0.5; player.vx = 0; player.vy = 0;
  player.bankAngle = 0; player.fireCD = 0; player.boostTrail = [];
  lasers = []; enemies = []; explosions = []; particles = [];
  powerups = []; enemyLasers = []; textPopups = [];
  initStars(); initGroundLines();
  document.getElementById('start-screen').style.display = 'none';
  document.getElementById('game-over-screen').style.display = 'none';
}

function gameOver() {
  gameRunning = false;
  document.getElementById('final-score').textContent = 'SCORE: ' + score;
  document.getElementById('game-over-screen').style.display = 'flex';
}

document.getElementById('start-btn').addEventListener('click', startGame);
document.getElementById('restart-btn').addEventListener('click', startGame);

// --- Update ---
function update(dt) {
  if (!gameRunning) return;
  gameTime += dt;
  difficulty = 1 + Math.floor(gameTime / 1800) * 0.3; // ramps up over time

  // Combo timer
  if (comboTimer > 0) { comboTimer -= dt; if (comboTimer <= 0) comboCount = 0; }

  // Invincibility
  if (invincibleTimer > 0) invincibleTimer -= dt;

  // Rapid fire
  if (rapidFireTimer > 0) { rapidFireTimer -= dt; if (rapidFireTimer <= 0) rapidFire = false; }

  // Shake
  if (screenShake > 0) screenShake *= 0.9;
  if (screenShake < 0.5) screenShake = 0;

  // --- Input ---
  let ix = 0, iy = 0, firing = false;
  if (keys['ArrowLeft'] || keys['KeyA']) ix -= 1;
  if (keys['ArrowRight'] || keys['KeyD']) ix += 1;
  if (keys['ArrowUp'] || keys['KeyW']) iy -= 1;
  if (keys['ArrowDown'] || keys['KeyS']) iy += 1;
  if (keys['Space']) firing = true;

  if (touchJoystick.active) { ix += touchJoystick.dx; iy += touchJoystick.dy; }
  if (touchFiring) firing = true;

  // --- Player movement ---
  const accel = 0.06;
  const friction = 0.88;
  player.vx += ix * accel;
  player.vy += iy * accel;
  player.vx *= friction;
  player.vy *= friction;
  player.x += player.vx * dt * 0.06;
  player.y += player.vy * dt * 0.06;
  player.x = Math.max(-1.3, Math.min(1.3, player.x));
  player.y = Math.max(-0.9, Math.min(0.9, player.y));

  // Banking
  const targetBank = -player.vx * 25;
  player.bankAngle += (targetBank - player.bankAngle) * 0.15;

  // Boost trail
  const px = project(player.x, player.y, 0);
  player.boostTrail.push({ x: px.x, y: px.y + 20, life: 1 });
  if (player.boostTrail.length > 15) player.boostTrail.shift();
  player.boostTrail.forEach(t => t.life -= 0.07);

  // --- Firing ---
  if (player.fireCD > 0) player.fireCD -= dt;
  const fireRate = rapidFire ? 4 : 8;
  if (firing && player.fireCD <= 0) {
    player.fireCD = fireRate;
    sfxLaser();
    lasers.push({
      x: player.x - 0.08, y: player.y, z: 1, speed: 0.5
    });
    lasers.push({
      x: player.x + 0.08, y: player.y, z: 1, speed: 0.5
    });
  }

  // --- Update lasers ---
  for (let i = lasers.length - 1; i >= 0; i--) {
    const l = lasers[i];
    l.z += l.speed * dt * 0.1;
    if (l.z > 35) lasers.splice(i, 1);
  }

  // --- Update enemy lasers ---
  for (let i = enemyLasers.length - 1; i >= 0; i--) {
    const el = enemyLasers[i];
    el.z -= el.speed * dt * 0.1;
    if (el.z < -1) {
      // Check if hit player
      const dx = el.x - player.x;
      const dy = el.y - player.y;
      if (Math.abs(dx) < 0.25 && Math.abs(dy) < 0.25 && invincibleTimer <= 0) {
        shields -= 8;
        screenShake = 8;
        sfxPlayerHit();
        invincibleTimer = 30;
        if (shields <= 0) {
          shields = 0;
          lives--;
          if (lives <= 0) { gameOver(); return; }
          shields = 100;
          invincibleTimer = 120;
          sfxExplosion();
          screenShake = 20;
        }
      }
      enemyLasers.splice(i, 1);
    }
  }

  // --- Waves ---
  waveTimer += dt;
  if (!bossActive) {
    const spawnRate = Math.max(20, 60 - wave * 5);
    if (waveTimer >= spawnRate && waveEnemiesSpawned < waveEnemyCount) {
      waveTimer = 0; waveEnemiesSpawned++;
      const r = Math.random();
      if (r < 0.4) spawnEnemy('fighter');
      else if (r < 0.65) spawnEnemy('weaver');
      else if (r < 0.85) spawnEnemy('speeder');
      else spawnEnemy('tank');
    }
    // Wave complete
    if (waveEnemiesSpawned >= waveEnemyCount && enemies.length === 0) {
      wave++;
      waveEnemiesSpawned = 0;
      waveEnemyCount = 5 + wave * 2;
      waveTimer = -120; // Brief pause
      // Boss every 3 waves
      if (wave % 3 === 0) {
        bossActive = true;
        sfxBossWarning();
        setTimeout(() => { if (gameRunning) spawnEnemy('boss'); }, 1500);
        addTextPopup('WARNING: BOSS INCOMING!', CX, CY, '#f00');
      }
    }
  } else if (enemies.length === 0 && waveTimer > 60) {
    bossActive = false;
    waveEnemiesSpawned = 0;
  }

  // --- Update enemies ---
  for (let i = enemies.length - 1; i >= 0; i--) {
    const e = enemies[i];
    e.z -= e.speed * dt * 0.15;
    e.patternTimer += dt * 0.05;

    // Patterns
    if (e.pattern === 0) { /* straight */ }
    else if (e.pattern === 1) { e.x += Math.sin(e.patternTimer * 2) * 0.02; }
    else if (e.pattern === 2) { e.x += Math.sin(e.patternTimer * 3) * 0.03; e.y += Math.cos(e.patternTimer * 2) * 0.015; }
    else if (e.pattern === 3) { e.x += Math.cos(e.patternTimer) * 0.025; }
    else if (e.pattern === 10) {
      // Boss pattern
      e.x = Math.sin(e.patternTimer * 0.8) * 1.5;
      e.y = -0.3 + Math.sin(e.patternTimer * 0.5) * 0.3;
      if (e.z < 8) e.z = 8; // Boss stays at distance
    }

    // Enemy shooting
    e.shootCD -= dt;
    if (e.shootCD <= 0 && e.z < 20 && e.z > 2) {
      e.shootCD = e.type === 'boss' ? (40 + Math.random() * 30) : (100 + Math.random() * 100);
      enemyLasers.push({
        x: e.x, y: e.y, z: e.z, speed: 0.3 + difficulty * 0.05,
        color: e.type === 'boss' ? '#f00' : '#f80'
      });
      if (e.type === 'boss') {
        // Boss fires spread
        enemyLasers.push({ x: e.x - 0.3, y: e.y, z: e.z, speed: 0.25, color: '#f00' });
        enemyLasers.push({ x: e.x + 0.3, y: e.y, z: e.z, speed: 0.25, color: '#f00' });
      }
    }

    // Past player
    if (e.z < -2) {
      enemies.splice(i, 1);
      continue;
    }

    // Collision with player
    if (e.z < 2 && e.z > 0) {
      const dx = e.x - player.x;
      const dy = e.y - player.y;
      const dist = Math.sqrt(dx * dx + dy * dy);
      if (dist < 0.3 * e.size && invincibleTimer <= 0) {
        shields -= 20 * e.size;
        screenShake = 15;
        sfxPlayerHit();
        invincibleTimer = 60;
        const sp = project(e.x, e.y, e.z);
        createExplosion(sp.x, sp.y, 1.5, e.color);
        enemies.splice(i, 1);
        if (shields <= 0) {
          shields = 0; lives--;
          if (lives <= 0) { gameOver(); return; }
          shields = 100; invincibleTimer = 120;
          sfxExplosion(); screenShake = 25;
        }
        continue;
      }
    }

    // Laser hits
    for (let j = lasers.length - 1; j >= 0; j--) {
      const l = lasers[j];
      const dx = l.x - e.x;
      const dy = l.y - e.y;
      const dz = l.z - e.z;
      const hitRange = 0.4 * e.size;
      if (Math.abs(dx) < hitRange && Math.abs(dy) < hitRange && Math.abs(dz) < 1.5) {
        lasers.splice(j, 1);
        e.hp--;
        sfxHit();
        const sp = project(e.x, e.y, e.z);
        // Sparks
        for (let k = 0; k < 4; k++) {
          particles.push({
            x: sp.x, y: sp.y,
            vx: (Math.random() - 0.5) * 6,
            vy: (Math.random() - 0.5) * 6,
            life: 1, decay: 0.05, color: '#fff', size: 2
          });
        }
        if (e.hp <= 0) {
          sfxExplosion();
          createExplosion(sp.x, sp.y, e.size, e.color);
          comboCount++; comboTimer = 120;
          const multiplier = Math.min(comboCount, 8);
          const pts = e.points * multiplier;
          score += pts;
          addTextPopup('+' + pts + (multiplier > 1 ? ' x' + multiplier : ''), sp.x, sp.y - 20, '#0f0');
          spawnPowerup(e.x, e.y, e.z);
          enemies.splice(i, 1);
          if (e.type === 'boss') {
            bossActive = false;
            screenShake = 30;
            // Big explosion
            for (let b = 0; b < 5; b++) {
              setTimeout(() => {
                if (!gameRunning) return;
                createExplosion(
                  sp.x + (Math.random() - 0.5) * 80,
                  sp.y + (Math.random() - 0.5) * 60,
                  2, '#f80'
                );
                sfxExplosion();
              }, b * 150);
            }
          }
        }
        break;
      }
    }
  }

  // --- Update powerups ---
  for (let i = powerups.length - 1; i >= 0; i--) {
    const p = powerups[i];
    p.z -= 0.03 * dt * 0.15;
    p.rot += dt * 0.05;
    if (p.z < -1) { powerups.splice(i, 1); continue; }
    // Pickup
    if (p.z < 2 && p.z > 0) {
      const dx = p.x - player.x;
      const dy = p.y - player.y;
      if (Math.abs(dx) < 0.4 && Math.abs(dy) < 0.4) {
        sfxPowerup();
        if (p.type === 'health') {
          lives = Math.min(lives + 1, 5);
          addTextPopup('+1 LIFE', CX, CY - 50, '#0f0');
        } else if (p.type === 'shield') {
          shields = Math.min(shields + 30, 100);
          addTextPopup('+SHIELD', CX, CY - 50, '#0cc');
        } else if (p.type === 'rapid') {
          rapidFire = true; rapidFireTimer = 600;
          addTextPopup('RAPID FIRE!', CX, CY - 50, '#f0f');
        }
        powerups.splice(i, 1);
      }
    }
  }

  // --- Update particles ---
  for (let i = particles.length - 1; i >= 0; i--) {
    const p = particles[i];
    p.x += p.vx; p.y += p.vy;
    p.vx *= 0.96; p.vy *= 0.96;
    p.life -= p.decay;
    if (p.life <= 0) particles.splice(i, 1);
  }

  // --- Update explosions ---
  for (let i = explosions.length - 1; i >= 0; i--) {
    const e = explosions[i];
    e.radius += 3; e.alpha -= 0.04;
    if (e.alpha <= 0) explosions.splice(i, 1);
  }

  // --- Update text popups ---
  for (let i = textPopups.length - 1; i >= 0; i--) {
    const t = textPopups[i];
    t.y += t.vy; t.life -= 0.015;
    if (t.life <= 0) textPopups.splice(i, 1);
  }

  // --- Stars ---
  stars.forEach(s => {
    s.z -= s.speed * dt * 0.03;
    if (s.z < 0.1) { s.z = 3.5; s.x = (Math.random() - 0.5) * 2; s.y = (Math.random() - 0.5) * 2; }
  });

  // --- Ground ---
  groundLines.forEach(g => {
    g.z -= 0.06 * dt * 0.15;
    if (g.z < 0) g.z += 40;
  });
}

// --- Draw ---
function draw() {
  ctx.fillStyle = '#050510';
  ctx.fillRect(0, 0, W, H);

  // Screen shake
  if (screenShake > 0) {
    ctx.save();
    ctx.translate(
      (Math.random() - 0.5) * screenShake,
      (Math.random() - 0.5) * screenShake
    );
  }

  // --- Stars ---
  stars.forEach(s => {
    const sp = project(s.x, s.y, s.z);
    const brightness = Math.min(1, (1 / s.z) * 1.5) * s.brightness;
    const size = Math.max(1, 3 / s.z);
    ctx.globalAlpha = brightness;
    ctx.fillStyle = '#fff';
    ctx.fillRect(sp.x - size / 2, sp.y - size / 2, size, size);
  });
  ctx.globalAlpha = 1;

  // --- Ground plane (green grid) ---
  const groundY = 0.8;
  ctx.strokeStyle = 'rgba(0,180,80,0.25)';
  ctx.lineWidth = 1;

  // Horizontal ground lines
  groundLines.forEach(g => {
    if (g.z < 0.5) return;
    const left = project(-5, groundY, g.z);
    const right = project(5, groundY, g.z);
    const alpha = Math.max(0, 1 - g.z / 40);
    ctx.globalAlpha = alpha * 0.4;
    ctx.beginPath();
    ctx.moveTo(left.x, left.y);
    ctx.lineTo(right.x, right.y);
    ctx.stroke();
  });

  // Vertical ground lines
  ctx.globalAlpha = 0.15;
  for (let vx = -4; vx <= 4; vx += 0.8) {
    const near = project(vx, groundY, 1);
    const far = project(vx, groundY, 35);
    ctx.beginPath();
    ctx.moveTo(near.x, near.y);
    ctx.lineTo(far.x, far.y);
    ctx.stroke();
  }
  ctx.globalAlpha = 1;

  // --- Powerups ---
  powerups.forEach(p => {
    if (p.z < 0.5) return;
    const sp = project(p.x, p.y, p.z);
    const s = 15 / p.z;
    ctx.save();
    ctx.translate(sp.x, sp.y);
    ctx.rotate(p.rot);
    if (p.type === 'health') { ctx.fillStyle = '#0f0'; ctx.strokeStyle = '#0f0'; }
    else if (p.type === 'shield') { ctx.fillStyle = '#0cc'; ctx.strokeStyle = '#0cc'; }
    else { ctx.fillStyle = '#f0f'; ctx.strokeStyle = '#f0f'; }
    ctx.globalAlpha = 0.7 + Math.sin(gameTime * 0.1) * 0.3;
    ctx.lineWidth = 2;
    ctx.beginPath();
    for (let i = 0; i < 4; i++) {
      const a = (Math.PI / 2) * i;
      const method = i === 0 ? 'moveTo' : 'lineTo';
      ctx[method](Math.cos(a) * s, Math.sin(a) * s);
    }
    ctx.closePath(); ctx.stroke(); ctx.fill();
    ctx.globalAlpha = 1;
    ctx.restore();
  });

  // --- Enemy lasers ---
  enemyLasers.forEach(el => {
    if (el.z < 0) return;
    const sp = project(el.x, el.y, el.z);
    const s = 150 / (el.z + 1);
    ctx.strokeStyle = el.color || '#f80';
    ctx.lineWidth = Math.max(1, 3 / (el.z * 0.5 + 1));
    ctx.globalAlpha = 0.9;
    ctx.beginPath();
    ctx.moveTo(sp.x, sp.y - s * 0.3);
    ctx.lineTo(sp.x, sp.y + s * 0.3);
    ctx.stroke();
    // Glow
    ctx.globalAlpha = 0.3;
    ctx.lineWidth = ctx.lineWidth * 3;
    ctx.beginPath();
    ctx.moveTo(sp.x, sp.y - s * 0.2);
    ctx.lineTo(sp.x, sp.y + s * 0.2);
    ctx.stroke();
    ctx.globalAlpha = 1;
  });

  // --- Enemies ---
  // Sort by z (far first)
  const sortedEnemies = [...enemies].sort((a, b) => b.z - a.z);
  sortedEnemies.forEach(e => {
    if (e.z < 0.3) return;
    const sp = project(e.x, e.y, e.z);
    const s = (30 * e.size) / e.z;
    if (s < 1) return;

    ctx.save();
    ctx.translate(sp.x, sp.y);

    if (e.type === 'fighter' || e.type === 'speeder') {
      // Triangle ship
      ctx.strokeStyle = e.color;
      ctx.fillStyle = e.color + '30';
      ctx.lineWidth = Math.max(1, 2 / (e.z * 0.3));
      ctx.beginPath();
      ctx.moveTo(0, -s);
      ctx.lineTo(-s * 0.8, s * 0.6);
      ctx.lineTo(s * 0.8, s * 0.6);
      ctx.closePath();
      ctx.fill(); ctx.stroke();
      // Cockpit
      ctx.fillStyle = e.color;
      ctx.fillRect(-s * 0.15, -s * 0.2, s * 0.3, s * 0.3);
    } else if (e.type === 'weaver') {
      // Diamond
      ctx.strokeStyle = e.color;
      ctx.fillStyle = e.color + '25';
      ctx.lineWidth = Math.max(1, 2 / (e.z * 0.3));
      ctx.beginPath();
      ctx.moveTo(0, -s);
      ctx.lineTo(s * 0.7, 0);
      ctx.lineTo(0, s);
      ctx.lineTo(-s * 0.7, 0);
      ctx.closePath();
      ctx.fill(); ctx.stroke();
    } else if (e.type === 'tank') {
      // Hexagon
      ctx.strokeStyle = e.color;
      ctx.fillStyle = e.color + '30';
      ctx.lineWidth = Math.max(1, 2.5 / (e.z * 0.3));
      ctx.beginPath();
      for (let i = 0; i < 6; i++) {
        const a = (Math.PI / 3) * i - Math.PI / 2;
        const method = i === 0 ? 'moveTo' : 'lineTo';
        ctx[method](Math.cos(a) * s, Math.sin(a) * s);
      }
      ctx.closePath(); ctx.fill(); ctx.stroke();
      // HP bar
      if (e.hp < e.maxHp) {
        const barW = s * 2;
        ctx.fillStyle = '#400';
        ctx.fillRect(-barW / 2, -s - 8, barW, 4);
        ctx.fillStyle = '#f00';
        ctx.fillRect(-barW / 2, -s - 8, barW * (e.hp / e.maxHp), 4);
      }
    } else if (e.type === 'boss') {
      // Big boss ship
      const pulse = 1 + Math.sin(gameTime * 0.15) * 0.05;
      const bs = s * pulse;
      ctx.strokeStyle = e.color;
      ctx.fillStyle = 'rgba(255,0,0,0.15)';
      ctx.lineWidth = Math.max(2, 3 / (e.z * 0.2));
      // Main body
      ctx.beginPath();
      ctx.moveTo(0, -bs * 1.2);
      ctx.lineTo(-bs * 1.5, -bs * 0.3);
      ctx.lineTo(-bs * 1.8, bs * 0.8);
      ctx.lineTo(-bs * 0.5, bs * 0.5);
      ctx.lineTo(0, bs * 1.0);
      ctx.lineTo(bs * 0.5, bs * 0.5);
      ctx.lineTo(bs * 1.8, bs * 0.8);
      ctx.lineTo(bs * 1.5, -bs * 0.3);
      ctx.closePath();
      ctx.fill(); ctx.stroke();
      // Core
      ctx.fillStyle = 'rgba(255,50,50,0.4)';
      ctx.beginPath();
      ctx.arc(0, 0, bs * 0.4, 0, Math.PI * 2);
      ctx.fill();
      ctx.strokeStyle = '#f44';
      ctx.stroke();
      // Eye
      ctx.fillStyle = '#f00';
      ctx.beginPath();
      ctx.arc(0, -bs * 0.15, bs * 0.15, 0, Math.PI * 2);
      ctx.fill();
      // HP bar
      const barW = bs * 3;
      ctx.fillStyle = '#400';
      ctx.fillRect(-barW / 2, -bs * 1.5, barW, 6);
      ctx.fillStyle = '#f00';
      ctx.fillRect(-barW / 2, -bs * 1.5, barW * (e.hp / e.maxHp), 6);
      ctx.strokeStyle = '#f88';
      ctx.lineWidth = 1;
      ctx.strokeRect(-barW / 2, -bs * 1.5, barW, 6);
    }

    ctx.restore();
  });

  // --- Lasers ---
  lasers.forEach(l => {
    const sp = project(l.x, l.y, l.z);
    const len = 120 / (l.z + 1);
    const w = Math.max(1, 4 / (l.z * 0.5 + 1));
    // Glow
    ctx.strokeStyle = 'rgba(0,255,100,0.3)';
    ctx.lineWidth = w * 3;
    ctx.beginPath();
    ctx.moveTo(sp.x, sp.y);
    ctx.lineTo(sp.x, sp.y + len * 0.5);
    ctx.stroke();
    // Core
    ctx.strokeStyle = '#0f8';
    ctx.lineWidth = w;
    ctx.beginPath();
    ctx.moveTo(sp.x, sp.y);
    ctx.lineTo(sp.x, sp.y + len);
    ctx.stroke();
  });

  // --- Explosions ---
  explosions.forEach(e => {
    ctx.globalAlpha = e.alpha;
    const grad = ctx.createRadialGradient(e.x, e.y, 0, e.x, e.y, e.radius);
    grad.addColorStop(0, '#fff');
    grad.addColorStop(0.3, e.color);
    grad.addColorStop(1, 'transparent');
    ctx.fillStyle = grad;
    ctx.beginPath();
    ctx.arc(e.x, e.y, e.radius, 0, Math.PI * 2);
    ctx.fill();
  });
  ctx.globalAlpha = 1;

  // --- Particles ---
  particles.forEach(p => {
    ctx.globalAlpha = p.life;
    ctx.fillStyle = p.color;
    ctx.fillRect(p.x - p.size / 2, p.y - p.size / 2, p.size, p.size);
  });
  ctx.globalAlpha = 1;

  // --- Player ship ---
  if (gameRunning) {
    const pp = project(player.x, player.y, 0);
    const shipX = pp.x;
    const shipY = pp.y;

    // Engine trail
    player.boostTrail.forEach((t, idx) => {
      if (t.life <= 0) return;
      ctx.globalAlpha = t.life * 0.6;
      ctx.fillStyle = idx % 2 === 0 ? '#0af' : '#08f';
      const ts = 3 + (1 - t.life) * 8;
      ctx.fillRect(t.x - ts / 2, t.y, ts, ts * 0.6);
    });
    ctx.globalAlpha = 1;

    // Invincibility flash
    if (invincibleTimer > 0 && Math.floor(invincibleTimer / 4) % 2 === 0) {
      ctx.globalAlpha = 0.4;
    }

    ctx.save();
    ctx.translate(shipX, shipY);
    const bankRad = player.bankAngle * Math.PI / 180;
    ctx.rotate(bankRad);

    // Ship body (Arwing-style)
    const sw = 28, sh = 32;

    // Wings
    ctx.fillStyle = 'rgba(0,200,255,0.15)';
    ctx.strokeStyle = '#0cf';
    ctx.lineWidth = 2;

    // Left wing
    ctx.beginPath();
    ctx.moveTo(-5, -5);
    ctx.lineTo(-sw, sh * 0.3);
    ctx.lineTo(-sw * 0.7, sh * 0.5);
    ctx.lineTo(-3, sh * 0.2);
    ctx.closePath();
    ctx.fill(); ctx.stroke();

    // Right wing
    ctx.beginPath();
    ctx.moveTo(5, -5);
    ctx.lineTo(sw, sh * 0.3);
    ctx.lineTo(sw * 0.7, sh * 0.5);
    ctx.lineTo(3, sh * 0.2);
    ctx.closePath();
    ctx.fill(); ctx.stroke();

    // Fuselage
    ctx.fillStyle = 'rgba(0,150,255,0.25)';
    ctx.strokeStyle = '#0af';
    ctx.lineWidth = 2;
    ctx.beginPath();
    ctx.moveTo(0, -sh);
    ctx.lineTo(-8, sh * 0.3);
    ctx.lineTo(-4, sh * 0.45);
    ctx.lineTo(0, sh * 0.35);
    ctx.lineTo(4, sh * 0.45);
    ctx.lineTo(8, sh * 0.3);
    ctx.closePath();
    ctx.fill(); ctx.stroke();

    // Cockpit
    ctx.fillStyle = '#0cf';
    ctx.beginPath();
    ctx.ellipse(0, -sh * 0.3, 3, 5, 0, 0, Math.PI * 2);
    ctx.fill();

    // Engine glow
    ctx.fillStyle = '#0af';
    ctx.globalAlpha = 0.5 + Math.random() * 0.3;
    ctx.beginPath();
    ctx.ellipse(0, sh * 0.45, 4, 3 + Math.random() * 4, 0, 0, Math.PI * 2);
    ctx.fill();

    ctx.globalAlpha = 1;
    ctx.restore();

    // Rapid fire indicator
    if (rapidFire) {
      ctx.strokeStyle = '#f0f';
      ctx.lineWidth = 2;
      ctx.globalAlpha = 0.4 + Math.sin(gameTime * 0.2) * 0.3;
      ctx.beginPath();
      ctx.arc(shipX, shipY, 35, 0, Math.PI * 2);
      ctx.stroke();
      ctx.globalAlpha = 1;
    }
  }

  // --- Text popups ---
  textPopups.forEach(t => {
    ctx.globalAlpha = t.life;
    ctx.fillStyle = t.color;
    ctx.font = 'bold 18px "Courier New"';
    ctx.textAlign = 'center';
    ctx.fillText(t.text, t.x, t.y);
  });
  ctx.globalAlpha = 1;

  if (screenShake > 0) ctx.restore();

  // --- HUD ---
  drawHUD();
}

function drawHUD() {
  if (!gameRunning) return;

  // Score
  ctx.fillStyle = '#0f0';
  ctx.font = 'bold 22px "Courier New"';
  ctx.textAlign = 'left';
  ctx.fillText('SCORE: ' + score, 15, 35);

  // Wave
  ctx.fillStyle = '#0cc';
  ctx.font = '16px "Courier New"';
  ctx.fillText('WAVE ' + wave, 15, 58);

  // Combo
  if (comboCount > 1) {
    ctx.fillStyle = '#ff0';
    ctx.font = 'bold 14px "Courier New"';
    ctx.fillText('COMBO x' + comboCount, 15, 78);
  }

  // Rapid fire indicator
  if (rapidFire) {
    ctx.fillStyle = '#f0f';
    ctx.font = 'bold 14px "Courier New"';
    ctx.fillText('RAPID FIRE', 15, comboCount > 1 ? 96 : 78);
  }

  // Shield bar
  const barX = W - 220, barY = 18, barW = 200, barH = 20;
  ctx.fillStyle = '#111';
  ctx.fillRect(barX, barY, barW, barH);
  const shieldColor = shields > 60 ? '#0c0' : shields > 30 ? '#cc0' : '#c00';
  ctx.fillStyle = shieldColor;
  ctx.fillRect(barX, barY, barW * (shields / 100), barH);
  ctx.strokeStyle = '#0a0';
  ctx.lineWidth = 1;
  ctx.strokeRect(barX, barY, barW, barH);
  ctx.fillStyle = '#fff';
  ctx.font = '12px "Courier New"';
  ctx.textAlign = 'center';
  ctx.fillText('SHIELD', barX + barW / 2, barY + 15);

  // Lives
  ctx.textAlign = 'right';
  ctx.fillStyle = '#0cf';
  ctx.font = '16px "Courier New"';
  let livesStr = '';
  for (let i = 0; i < lives; i++) livesStr += '\u25C6 ';
  ctx.fillText(livesStr, W - 15, 60);

  // Title
  ctx.textAlign = 'center';
  ctx.fillStyle = 'rgba(0,255,0,0.15)';
  ctx.font = 'bold 14px "Courier New"';
  ctx.fillText('STAR FOX LITE', CX, 25);
  ctx.fillStyle = 'rgba(0,204,204,0.12)';
  ctx.font = '10px "Courier New"';
  ctx.fillText('KORB ENGINEERING', CX, 40);

  // Boss warning
  if (bossActive && enemies.some(e => e.type === 'boss')) {
    const bossFlash = Math.sin(gameTime * 0.15) > 0;
    if (bossFlash) {
      ctx.fillStyle = '#f00';
      ctx.font = 'bold 20px "Courier New"';
      ctx.textAlign = 'center';
      ctx.fillText('!! BOSS !!', CX, H - 30);
    }
  }
}

// --- Game loop ---
let lastTime = 0;
function gameLoop(ts) {
  const dt = Math.min((ts - lastTime) / 16.67, 3); // normalized to ~60fps, capped
  lastTime = ts;

  update(dt);
  draw();
  requestAnimationFrame(gameLoop);
}

// Draw initial screen background
initStars();
function drawBgLoop(ts) {
  if (gameRunning) return;
  const dt = Math.min((ts - lastTime) / 16.67, 3);
  lastTime = ts;
  stars.forEach(s => {
    s.z -= s.speed * dt * 0.015;
    if (s.z < 0.1) { s.z = 3.5; s.x = (Math.random() - 0.5) * 2; s.y = (Math.random() - 0.5) * 2; }
  });
  ctx.fillStyle = '#050510';
  ctx.fillRect(0, 0, W, H);
  stars.forEach(s => {
    const sp = project(s.x, s.y, s.z);
    const brightness = Math.min(1, (1 / s.z) * 1.5) * s.brightness;
    const size = Math.max(1, 3 / s.z);
    ctx.globalAlpha = brightness * 0.5;
    ctx.fillStyle = '#fff';
    ctx.fillRect(sp.x - size / 2, sp.y - size / 2, size, size);
  });
  ctx.globalAlpha = 1;
  requestAnimationFrame(drawBgLoop);
}

requestAnimationFrame(drawBgLoop);
requestAnimationFrame(gameLoop);
</script>
