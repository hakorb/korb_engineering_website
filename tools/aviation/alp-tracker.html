<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{--bg:#050a0f;--bg1:#0a1018;--bg2:#0f1620;--bg3:#141c28;--card:#0c1219;--border:#1a2535;--borderHi:#264060;--accent:#00d4ff;--accentDim:rgba(0,212,255,0.12);--green:#10b981;--red:#ef4444;--yellow:#f59e0b;--orange:#ff8c00;--purple:#a78bfa;--blue:#3b82f6;--text:#e2e8f0;--dim:rgba(226,232,240,0.45);--muted:rgba(226,232,240,0.2);--font:'JetBrains Mono',monospace}
body{background:var(--bg);color:var(--text);font-family:var(--font);font-size:13px;line-height:1.5;min-height:100vh}
a{color:var(--accent);text-decoration:none}a:hover{text-decoration:underline}
::selection{background:var(--accent);color:var(--bg)}
::-webkit-scrollbar{width:6px;height:6px}::-webkit-scrollbar-track{background:var(--bg)}::-webkit-scrollbar-thumb{background:var(--border);border-radius:3px}

/* Header */
.header{position:sticky;top:0;z-index:100;background:linear-gradient(180deg,var(--bg2),var(--bg1));border-bottom:1px solid var(--border);padding:0 20px;display:flex;align-items:center;height:56px;gap:16px}
.h-badge{width:38px;height:38px;border:1.5px solid var(--accent);display:flex;align-items:center;justify-content:center;flex-shrink:0}
.h-badge span{font-size:10px;font-weight:700;color:var(--accent);letter-spacing:0.04em}
.h-title{font-size:15px;font-weight:700;letter-spacing:0.1em;color:var(--accent);text-shadow:0 0 12px rgba(0,212,255,0.2)}
.h-sub{font-size:8px;color:var(--dim);letter-spacing:0.18em;text-transform:uppercase}
.h-right{margin-left:auto;display:flex;gap:8px;align-items:center}

/* Layout */
.app{max-width:1400px;margin:0 auto}
.tabs{display:flex;gap:0;padding:0 20px;border-bottom:1px solid var(--border);overflow-x:auto;background:var(--bg1)}
.tab{padding:10px 16px;background:transparent;border:1px solid var(--border);border-bottom:1px solid var(--border);color:var(--dim);font-family:var(--font);font-size:9px;cursor:pointer;letter-spacing:0.1em;text-transform:uppercase;border-radius:4px 4px 0 0;white-space:nowrap;transition:all 0.15s}
.tab.active{background:var(--bg2);border-color:var(--accent);border-bottom-color:transparent;color:var(--accent)}
.tab:hover:not(.active){color:var(--text)}
.content{padding:20px}

/* Cards & Panels */
.card{background:var(--card);border:1px solid var(--border);border-radius:6px;padding:20px;margin-bottom:14px}
.card-title{font-size:10px;color:var(--accent);letter-spacing:0.12em;text-transform:uppercase;margin-bottom:14px;font-weight:600}
.card-sub{font-size:9px;color:var(--dim);margin-top:-10px;margin-bottom:14px;line-height:1.6}
.grid-2{display:grid;grid-template-columns:1fr 1fr;gap:14px}
.grid-3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:14px}

/* Buttons & Inputs */
.btn{padding:6px 14px;border:1px solid var(--border);background:transparent;color:var(--dim);font-family:var(--font);font-size:10px;cursor:pointer;border-radius:4px;transition:all .2s;letter-spacing:0.06em;text-transform:uppercase}
.btn:hover{border-color:var(--accent);color:var(--accent)}
.btn-accent{background:var(--accentDim);border-color:var(--accent);color:var(--accent)}
.btn-green{border-color:var(--green);color:var(--green)}
.btn-fill{background:var(--accent);color:#000;border:none;font-weight:700}
input[type="text"],input[type="url"],select,textarea{background:var(--bg2);border:1px solid var(--border);color:var(--text);font-family:var(--font);font-size:12px;padding:6px 10px;border-radius:4px;outline:none;width:100%}
input:focus,select:focus,textarea:focus{border-color:var(--accent)}

/* Tables */
table{width:100%;border-collapse:collapse}
th{padding:6px 8px;border-bottom:2px solid var(--border);font-size:8px;color:var(--dim);text-transform:uppercase;letter-spacing:0.08em;text-align:left;white-space:nowrap}
td{padding:6px 8px;border-bottom:1px solid var(--border);font-size:11px}
.overflow-x{overflow-x:auto}

/* Badges */
.badge{display:inline-block;padding:2px 8px;border-radius:3px;font-size:10px;font-weight:500}
.badge-green{background:rgba(16,185,129,0.15);color:var(--green);border:1px solid rgba(16,185,129,0.3)}
.badge-yellow{background:rgba(245,158,11,0.15);color:var(--yellow);border:1px solid rgba(245,158,11,0.3)}
.badge-red{background:rgba(239,68,68,0.15);color:var(--red);border:1px solid rgba(239,68,68,0.3)}
.badge-cyan{background:var(--accentDim);color:var(--accent);border:1px solid rgba(0,212,255,0.3)}

/* Tips */
.tip-card{background:linear-gradient(135deg,rgba(0,212,255,0.05),rgba(0,255,136,0.03));border:1px solid var(--borderHi);border-radius:6px;padding:14px 16px;margin-bottom:10px}
.tip-icon{display:inline-block;width:18px;height:18px;background:var(--yellow);color:#000;font-size:10px;font-weight:900;line-height:18px;text-align:center;border-radius:3px;margin-right:8px;vertical-align:middle}
.tip-title{font-size:11px;font-weight:700;color:var(--yellow);display:inline;vertical-align:middle}
.tip-body{font-size:11px;color:var(--dim);line-height:1.7;margin-top:6px}

/* Links */
.link-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));gap:10px}
.link-card{background:var(--bg2);border:1px solid var(--border);border-radius:6px;padding:14px;transition:all 0.2s;cursor:pointer;display:block}
.link-card:hover{border-color:var(--accent);text-decoration:none;background:rgba(0,212,255,0.04)}
.link-card .lc-title{font-size:11px;font-weight:700;color:var(--accent);margin-bottom:4px}
.link-card .lc-desc{font-size:10px;color:var(--dim);line-height:1.5}
.link-card .lc-tag{display:inline-block;font-size:8px;padding:2px 6px;border-radius:10px;margin-top:6px;background:rgba(0,212,255,0.1);color:var(--accent)}

/* Info blocks */
.info-block{border:1px solid var(--border);border-radius:6px;padding:14px;background:var(--bg2);margin-bottom:10px}
.info-label{font-size:9px;color:var(--accent);text-transform:uppercase;letter-spacing:0.08em;margin-bottom:4px;font-weight:600}
.info-text{font-size:11px;color:var(--dim);line-height:1.7}

/* Search */
.search-wrap{display:flex;gap:10px;margin-bottom:16px;flex-wrap:wrap;align-items:center}
.search-input{flex:1;min-width:200px;background:var(--bg2);border:1px solid var(--border);color:var(--text);font-family:var(--font);font-size:13px;padding:10px 14px;border-radius:6px;outline:none}
.search-input:focus{border-color:var(--accent)}
.search-input::placeholder{color:var(--muted)}

/* Result cards */
.result-card{background:var(--bg1);border:1px solid var(--border);border-radius:6px;padding:16px;margin-bottom:10px;transition:all 0.2s}
.result-card:hover{border-color:var(--accent)}
.result-header{display:flex;align-items:center;gap:12px;margin-bottom:8px}
.result-code{font-size:18px;font-weight:700;color:var(--accent)}
.result-name{font-size:12px;color:var(--text)}
.result-meta{font-size:10px;color:var(--dim)}
.result-links{display:flex;gap:6px;flex-wrap:wrap;margin-top:10px}
.result-link{font-size:10px;padding:4px 10px;border:1px solid var(--border);border-radius:4px;color:var(--accent);cursor:pointer;transition:all 0.15s;text-decoration:none}
.result-link:hover{border-color:var(--accent);background:var(--accentDim);text-decoration:none}

/* Steps */
.step-row{display:flex;gap:14px;margin-bottom:16px;align-items:flex-start}
.step-num{width:32px;height:32px;background:var(--accent);color:#000;font-size:14px;font-weight:700;line-height:32px;text-align:center;border-radius:50%;flex-shrink:0}
.step-content{flex:1}
.step-title{font-size:12px;font-weight:700;color:var(--text);margin-bottom:4px}
.step-desc{font-size:11px;color:var(--dim);line-height:1.6}

/* Sheet diagram labels */
.sheet-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(200px,1fr));gap:10px}
.sheet-card{border:1px solid var(--border);border-radius:6px;padding:12px;background:var(--bg2);transition:all 0.2s}
.sheet-card:hover{border-color:var(--accent)}
.sheet-num{font-size:16px;font-weight:700;color:var(--accent)}
.sheet-name{font-size:11px;font-weight:600;color:var(--text);margin-top:2px}
.sheet-desc{font-size:10px;color:var(--dim);margin-top:4px;line-height:1.5}

/* Footer */
.footer{text-align:center;padding:30px 20px;border-top:1px solid var(--border);margin-top:20px}
.footer-brand{font-size:10px;color:var(--accent);opacity:0.4;letter-spacing:0.15em}

@media(max-width:768px){.grid-2,.grid-3{grid-template-columns:1fr}.search-wrap{flex-direction:column}.sheet-grid{grid-template-columns:1fr 1fr}}
@media(max-width:480px){.content{padding:14px 12px}.header{padding:0 12px}.sheet-grid{grid-template-columns:1fr}}
</style>
</head>

function renderTabs(){
  document.getElementById('tabs').innerHTML=TABS.map(t=>`<button class="tab ${currentTab===t?'active':''}" onclick="currentTab='${t}';render()">${TAB_LABELS[t]}</button>`).join('');
}

function render(){
  renderTabs();
  const c=document.getElementById('content');
  const renderers={
    'what-is-alp':renderWhatIsALP,

  };
  c.innerHTML=(renderers[currentTab]||renderWhatIsALP)();
}

// ========== WHAT IS AN ALP? ==========
function renderWhatIsALP(){
  return `
  <div class="card" style="border-color:var(--accent)">
    <div class="card-title" style="font-size:14px;margin-bottom:8px">What is an Airport Layout Plan (ALP)?</div>
    <div style="font-size:12px;color:var(--text);line-height:1.8;margin-bottom:16px">
      An Airport Layout Plan (ALP) is the <strong style="color:var(--accent)">FAA-approved blueprint</strong> for an airport's existing facilities and planned future development. It is a scaled drawing set that depicts the boundaries, facilities, runways, taxiways, buildings, NAVAIDs, and future development areas of an airport. For any airport that has accepted federal grant money through the Airport Improvement Program (AIP), maintaining a current ALP is not optional — it is a <strong style="color:var(--yellow)">federal grant assurance obligation</strong>.
    </div>
    <div style="font-size:12px;color:var(--dim);line-height:1.8">
      The ALP serves as the airport sponsor's official development plan filed with the FAA. Every capital project funded through AIP must be depicted on, or consistent with, the approved ALP. Without an approved, up-to-date ALP, an airport cannot receive FAA AIP funding.
    </div>
  </div>

  <div class="card">
    <div class="card-title">Why Does the ALP Matter?</div>
    <div class="grid-2">
      <div class="info-block" style="border-left:3px solid var(--green)">
        <div class="info-label" style="color:var(--green)">Federal Funding Eligibility</div>
        <div class="info-text">FAA Grant Assurance #29 requires airport sponsors to keep the ALP current. AIP-funded projects must be shown on an FAA-approved ALP. No current ALP = no federal dollars.</div>
      </div>
      <div class="info-block" style="border-left:3px solid var(--yellow)">
        <div class="info-label" style="color:var(--yellow)">Land Use Protection</div>
        <div class="info-text">The ALP defines runway protection zones (RPZs), building restriction lines (BRLs), and approach surfaces. This protects your airport from incompatible development on and around the airfield.</div>
      </div>
      <div class="info-block" style="border-left:3px solid var(--accent)">
        <div class="info-label">Capital Planning</div>
        <div class="info-text">The ALP is your 20-year development roadmap. It guides CIP programming, grant applications, and land acquisition priorities. It tells TxDOT and FAA what you plan to build and when.</div>
      </div>
      <div class="info-block" style="border-left:3px solid var(--red)">
        <div class="info-label" style="color:var(--red)">Compliance & Grant Assurances</div>
        <div class="info-text">Building anything not depicted on the ALP — or failing to maintain it — can trigger FAA compliance actions. This includes repayment of grant funds, suspension of future grants, or loss of NPIAS status.</div>
      </div>
      <div class="info-block" style="border-left:3px solid var(--purple)">
        <div class="info-label" style="color:var(--purple)">Airspace Protection</div>
        <div class="info-text">Part 77 imaginary surfaces defined on the ALP protect approach and departure paths. FAA Form 7460-1 (Notice of Proposed Construction) reviews are based on ALP-depicted surfaces.</div>
      </div>
      <div class="info-block" style="border-left:3px solid var(--orange)">
        <div class="info-label" style="color:var(--orange)">Lease & Revenue Strategy</div>
        <div class="info-text">The ALP identifies developable areas for hangars, FBOs, and commercial uses. Proper ALP designation supports lease negotiations and hangar development business cases.</div>
      </div>
    </div>
  </div>

  <div class="card">
    <div class="card-title">Key Regulatory References</div>
    <div class="overflow-x"><table><thead><tr><th>Reference</th><th>Title</th><th>Relevance</th></tr></thead><tbody>
      <tr><td style="color:var(--accent);font-weight:600">FAA AC 150/5300-13A</td><td style="color:var(--dim)">Airport Design</td><td style="color:var(--dim)">Runway/taxiway geometry, safety areas, ARC standards</td></tr>
      <tr><td style="color:var(--accent);font-weight:600">FAA AC 150/5070-6B</td><td style="color:var(--dim)">Airport Master Plans</td><td style="color:var(--dim)">Master plan and ALP development process and content</td></tr>
      <tr><td style="color:var(--accent);font-weight:600">FAA Order 5100.38D</td><td style="color:var(--dim)">AIP Handbook</td><td style="color:var(--dim)">ALP requirements for grant eligibility, eligible costs</td></tr>
      <tr><td style="color:var(--accent);font-weight:600">Grant Assurance #29</td><td style="color:var(--dim)">Airport Layout Plan</td><td style="color:var(--dim)">Sponsor must keep ALP current and develop per the plan</td></tr>
      <tr><td style="color:var(--accent);font-weight:600">49 USC 47107(a)(16)</td><td style="color:var(--dim)">Statutory Requirement</td><td style="color:var(--dim)">Federal law requiring ALP compliance for grant recipients</td></tr>
      <tr><td style="color:var(--accent);font-weight:600">14 CFR Part 77</td><td style="color:var(--dim)">Safe, Efficient Use of Airspace</td><td style="color:var(--dim)">Imaginary surfaces and obstruction evaluation</td></tr>
      <tr><td style="color:var(--accent);font-weight:600">14 CFR Part 139</td><td style="color:var(--dim)">Airport Certification</td><td style="color:var(--dim)">Certificated airports must comply with ALP standards</td></tr>
    </tbody></table></div>
  </div>

  <div class="tip-card">
    <span class="tip-icon">!</span>
    <span class="tip-title">Bottom Line for Airport Managers</span>
    <div class="tip-body">If your ALP is more than 10 years old, or if you've made any facility changes not shown on it, you are at risk. FAA will not approve AIP grants for projects inconsistent with your ALP. Start the update process now — it typically takes 12-18 months and can itself be funded through AIP (planning category). Talk to your ADO program manager before your next grant application.</div>
  </div>`;
}

// ========== ALP SHEET INDEX ==========
function renderSheets(){
  const sheets=[
    {num:'1',name:'Airport Layout Plan (Drawing)',desc:'The primary drawing showing the airport as it exists today plus planned development. Includes runway/taxiway geometry, building areas, NAVAIDs, RPZs, BRLs, safety areas, and all dimensional data. This is the most referenced sheet in the set.'},
    {num:'2',name:'Airport Airspace Drawing',desc:'Depicts 14 CFR Part 77 imaginary surfaces (horizontal, conical, transitional, approach, departure). Shows existing penetrations and objects requiring FAA aeronautical study. Critical for evaluating proposed construction on or near the airport.'},
    {num:'3',name:'Inner Portion of Approach Surface',desc:'Detailed plan and profile views of each runway approach zone. Shows obstructions, clearing requirements, and RPZ land use. Used for approach procedure design and obstacle analysis.'},
    {num:'4',name:'On-Airport Land Use Drawing',desc:'Identifies how each parcel of airport property is currently used and planned for future use: aeronautical, non-aeronautical, revenue-producing, and future development. Supports lease planning and revenue strategies.'},
    {num:'5',name:'Terminal Area Plan',desc:'Detailed layout of terminal/administration area showing buildings, vehicle parking, access roads, utilities, and aircraft parking positions. Used for terminal development planning and FBO layouts.'},
    {num:'6',name:'Airport Property Map',desc:'Legal boundary survey showing the airport property boundary, easements, right-of-way, fee simple and avigation easement parcels. Required for land acquisition grant requests.'},
    {num:'7',name:'Exhibit A (Property Map)',desc:'FAA-standard Exhibit A format showing property, RPZ easements, and navigational easements. Typically required as part of the AIP grant application for land or construction projects.'},
    {num:'8',name:'Runway Departure Surface',desc:'Plan and profile of departure surfaces for each runway end. Shows OFA/OFZ compliance and objects in the departure path. Important for IFR procedure design.'},
    {num:'9',name:'Airport Facilities Plan',desc:'Utility infrastructure: water, sewer, storm drainage, electrical, fuel distribution, communications. Shows existing and planned infrastructure to support development areas.'},
    {num:'10',name:'Airport Access Plan',desc:'On-airport roadway network, vehicle/pedestrian circulation, security fencing, and gate locations. Coordinates with the terminal area plan for ground-side access.'},
  ];

  return `
  <div class="card">
    <div class="card-title">Standard ALP Drawing Set</div>
    <div class="card-sub">A complete ALP set typically contains 7-12 sheets depending on airport complexity. Here are the standard sheets you should expect to find (or need to produce) for your airport.</div>
  </div>
  <div class="sheet-grid">
    ${sheets.map(s=>`<div class="sheet-card">
      <div class="sheet-num">Sheet ${s.num}</div>
      <div class="sheet-name">${s.name}</div>
      <div class="sheet-desc">${s.desc}</div>
    </div>`).join('')}
  </div>
  <div class="tip-card" style="margin-top:14px">
    <span class="tip-icon">!</span>
    <span class="tip-title">Not All Airports Need Every Sheet</span>
    <div class="tip-body">Small GA airports may only have Sheets 1-3 and the Property Map. The required set depends on your NPIAS classification, existing facilities, and planned development. Your FAA ADO and consultant will determine the appropriate scope. At minimum, you need the Airport Layout Drawing (Sheet 1) and the Airspace Drawing (Sheet 2) to maintain AIP eligibility.</div>
  </div>
  <div class="card">
    <div class="card-title">Common ALP Deficiencies at GA Airports</div>
    <div class="overflow-x"><table><thead><tr><th>Issue</th><th>Impact</th><th>Fix</th></tr></thead><tbody>
      <tr><td style="color:var(--red);font-weight:600">Outdated ALP (10+ years)</td><td style="color:var(--dim)">FAA may withhold AIP grants until updated</td><td style="color:var(--green)">Request ALP update through AIP planning grant</td></tr>
      <tr><td style="color:var(--red);font-weight:600">Unpermitted structures</td><td style="color:var(--dim)">Structures built outside ALP-designated areas</td><td style="color:var(--green)">Amend ALP to reflect as-built conditions</td></tr>
      <tr><td style="color:var(--yellow);font-weight:600">Missing RPZ depiction</td><td style="color:var(--dim)">Land use conflicts in runway protection zones</td><td style="color:var(--green)">Survey and depict RPZs, acquire easements</td></tr>
      <tr><td style="color:var(--yellow);font-weight:600">No property map</td><td style="color:var(--dim)">Cannot document airport boundary for grants</td><td style="color:var(--green)">Commission boundary survey and Exhibit A</td></tr>
      <tr><td style="color:var(--yellow);font-weight:600">Incorrect ARC</td><td style="color:var(--dim)">Design standards may not match actual traffic</td><td style="color:var(--green)">Update fleet mix analysis, recalculate ARC</td></tr>
      <tr><td style="color:var(--accent);font-weight:600">No future development</td><td style="color:var(--dim)">ALP only shows existing — no planned projects</td><td style="color:var(--green)">Add planned hangars, taxiways, apron to ALP</td></tr>
    </tbody></table></div>
  </div>`;
}

let searchResults = [];

function renderLookup(){
  return `
  <div class="card">
    <div class="card-title">Airport Lookup &mdash; TX / OK / NM</div>
    <div class="card-sub">Search ${GA_AIRPORTS.length} airports in Texas, Oklahoma, and New Mexico. Find details and links to ALP documents, FAA data, and external resources.</div>
    <div class="search-wrap">
      <input class="search-input" id="airportSearch" placeholder="Search by FAA code, name, city, or county..." oninput="doSearch(this.value)" value="">
      <button class="btn btn-accent" onclick="doSearch(document.getElementById('airportSearch').value)">Search</button>
    </div>
  </div>
  <div id="searchResults">${renderSearchResults()}</div>`;
}

function doSearch(q){
  const s=q.toLowerCase().trim();
  if(!s){searchResults=GA_AIRPORTS.slice(0,12)}
  else{searchResults=GA_AIRPORTS.filter(a=>(a.faa+' '+a.icao+' '+a.name+' '+a.city+' '+a.county+' '+a.state).toLowerCase().includes(s))}
  const el=document.getElementById('searchResults');
  if(el)el.innerHTML=renderSearchResults();
}

function renderSearchResults(){
  if(!searchResults.length) searchResults=GA_AIRPORTS.slice(0,12);
  return searchResults.map(a=>`<div class="result-card">
    <div class="result-header">
      <div class="result-code">${a.faa}</div>
      <div>
        <div class="result-name">${a.name}</div>
        <div class="result-meta">${a.city}, ${a.state} &mdash; ${a.county} County &mdash; ${a.class} &mdash; ${a.npias?'<span style="color:var(--green)">NPIAS</span>':'<span style="color:var(--red)">Non-NPIAS</span>'}</div>
      </div>
    </div>
    <div style="display:grid;grid-template-columns:repeat(auto-fit,minmax(120px,1fr));gap:8px;margin:8px 0">
      <div style="font-size:10px"><span style="color:var(--dim)">Based Aircraft:</span> <span style="color:var(--accent)">${a.based}</span></div>
      <div style="font-size:10px"><span style="color:var(--dim)">Annual Ops:</span> <span style="color:var(--accent)">${a.ops?a.ops.toLocaleString():'N/A'}</span></div>
      <div style="font-size:10px"><span style="color:var(--dim)">Runway:</span> <span style="color:var(--text)">${a.rwy}</span></div>
    </div>
    <div class="result-links">
      <a href="https://www.airnav.com/airport/${a.faa}" target="_blank" class="result-link">AirNav</a>
      <a href="https://www.faa.gov/airports/airport_safety/airportdata_5010/menu?faaCode=${a.faa}" target="_blank" class="result-link">FAA 5010</a>
      <a href="https://nfdc.faa.gov/nfdcApps/services/ajv5/airportDisplay.jsp?airportId=${a.faa}" target="_blank" class="result-link">FAA NASR</a>
      ${a.icao?`<a href="https://skyvector.com/airport/${a.icao}" target="_blank" class="result-link">SkyVector</a>`:''}
      <a href="https://www.google.com/search?q=${encodeURIComponent(a.name+' airport layout plan ALP PDF')}" target="_blank" class="result-link">Search ALP PDF</a>
      <a href="https://www.google.com/search?q=${encodeURIComponent(a.name+' master plan PDF')}" target="_blank" class="result-link">Search Master Plan</a>
      <button class="result-link" style="background:var(--accentDim)" onclick="addToMyAirports('${a.faa}')">+ Track</button>
    </div>
  </div>`).join('')+'<div style="text-align:center;color:var(--dim);font-size:10px;padding:16px">Showing '+searchResults.length+' of '+GA_AIRPORTS.length+' Texas airports</div>';
}

function addToMyAirports(faa){
  if(!data.myAirports.includes(faa)){data.myAirports.push(faa);save();alert(faa+' added to My Airports');}
  else{alert(faa+' is already in your list');}
}

    <div class="card-title" style="color:var(--yellow)">The ALP-to-Funding Pipeline</div>
    <div style="font-size:12px;color:var(--text);line-height:1.8;margin-bottom:16px">
      The ALP is not just a regulatory requirement — it is the <strong style="color:var(--yellow)">foundation of your entire funding strategy</strong>. Every dollar of FAA AIP money flows through the ALP. Understanding this pipeline is the difference between airports that thrive and airports that struggle.
    </div>
  </div>

  <div class="card">
    <div class="card-title">How the ALP Drives Funding</div>
    <div class="step-row"><div class="step-num">1</div><div class="step-content"><div class="step-title">ALP Depicts Future Development</div><div class="step-desc">Planned projects (new hangars, taxiway extensions, apron expansion, fuel system upgrades) must be shown on the ALP drawing as "future" or "planned" development before FAA will consider funding them.</div></div></div>
    <div class="step-row"><div class="step-num">2</div><div class="step-content"><div class="step-title">ACIP Submission</div><div class="step-desc">Your Airport Capital Improvement Plan (ACIP) — the formal project priority list submitted to your FAA ADO — must reference ALP-consistent projects. The ADO reviews your ACIP against your ALP annually.</div></div></div>
    <div class="step-row"><div class="step-num">3</div><div class="step-content"><div class="step-title">AIP Grant Application</div><div class="step-desc">When you apply for AIP entitlement or discretionary funds, FAA verifies the project is depicted on an approved ALP. Inconsistency = rejection or delay.</div></div></div>
    <div class="step-row"><div class="step-num">4</div><div class="step-content"><div class="step-title">TxDOT Uses the ALP Too</div><div class="step-desc">TxDOT Aviation Division references your ALP when evaluating state grant applications. An outdated ALP signals poor planning and weakens your application.</div></div></div>
    <div class="step-row"><div class="step-num">5</div><div class="step-content"><div class="step-title">ALP Update = AIP Eligible</div><div class="step-desc">The ALP update itself can be funded through AIP as a planning project (typically 90% federal / 10% local, or 90% federal / 10% TxDOT). Your first step is often getting a grant to update the ALP.</div></div></div>
  </div>

  <div class="grid-2">
    <div class="card">
      <div class="card-title" style="color:var(--green)">With a Current ALP</div>
      <div style="font-size:11px;line-height:1.8;color:var(--dim)">
        <div style="margin-bottom:6px">&#10003; Eligible for FAA AIP entitlement funds (~$150K/yr)</div>
        <div style="margin-bottom:6px">&#10003; Eligible for FAA AIP discretionary funds</div>
        <div style="margin-bottom:6px">&#10003; Eligible for BIL supplemental infrastructure funds</div>
        <div style="margin-bottom:6px">&#10003; TxDOT grant applications well-supported</div>
        <div style="margin-bottom:6px">&#10003; Land use around airport legally protected</div>
        <div style="margin-bottom:6px">&#10003; Clear 20-year development roadmap</div>
        <div>&#10003; Strong position for discretionary funding competition</div>
      </div>
    </div>
    <div class="card">
      <div class="card-title" style="color:var(--red)">Without a Current ALP</div>
      <div style="font-size:11px;line-height:1.8;color:var(--dim)">
        <div style="margin-bottom:6px">&#10007; AIP grants delayed or denied</div>
        <div style="margin-bottom:6px">&#10007; FAA compliance review / corrective action</div>
        <div style="margin-bottom:6px">&#10007; Potential grant assurance violation</div>
        <div style="margin-bottom:6px">&#10007; No protection against incompatible land use</div>
        <div style="margin-bottom:6px">&#10007; Weak position for TxDOT applications</div>
        <div style="margin-bottom:6px">&#10007; Risk of losing NPIAS classification</div>
        <div>&#10007; May need to repay previous grant funds</div>
      </div>
    </div>
  </div>

  <div class="tip-card">
    <span class="tip-icon">$</span>
    <span class="tip-title">Pro Tip: Fund the ALP Update with AIP Money</span>
    <div class="tip-body">ALP updates are eligible for AIP funding under the "planning" category. At a 90/10 federal/local split (and TxDOT often covers the 10%), your cost to update the ALP can be close to zero. A typical GA airport ALP update costs $150K-$400K — well within entitlement accumulation range. This is almost always the smartest first project to put in your ACIP.</div>
  </div>`;
}

// ========== UPDATE GUIDE ==========
function renderUpdateGuide(){
  return `
  <div class="card">
    <div class="card-title">When to Update Your ALP</div>
    <div class="overflow-x"><table><thead><tr><th>Trigger</th><th>Required Action</th><th>Urgency</th></tr></thead><tbody>
      <tr><td style="color:var(--text)">ALP is 10+ years old</td><td style="color:var(--dim)">Full ALP update recommended</td><td><span class="badge badge-red">High</span></td></tr>
      <tr><td style="color:var(--text)">New hangar or building constructed</td><td style="color:var(--dim)">ALP amendment (conditional or unconditional)</td><td><span class="badge badge-yellow">Medium</span></td></tr>
      <tr><td style="color:var(--text)">Runway or taxiway modification</td><td style="color:var(--dim)">ALP update with airspace review</td><td><span class="badge badge-red">High</span></td></tr>
      <tr><td style="color:var(--text)">Land acquisition or disposal</td><td style="color:var(--dim)">Property map update + ALP amendment</td><td><span class="badge badge-red">High</span></td></tr>
      <tr><td style="color:var(--text)">Change in airport classification/ARC</td><td style="color:var(--dim)">Full ALP update to new design standards</td><td><span class="badge badge-red">High</span></td></tr>
      <tr><td style="color:var(--text)">New approach procedure added</td><td style="color:var(--dim)">Airspace drawing update</td><td><span class="badge badge-yellow">Medium</span></td></tr>
      <tr><td style="color:var(--text)">Planned CIP project not on ALP</td><td style="color:var(--dim)">ALP amendment before grant application</td><td><span class="badge badge-yellow">Medium</span></td></tr>
      <tr><td style="color:var(--text)">Master plan study completed</td><td style="color:var(--dim)">ALP update to reflect new master plan</td><td><span class="badge badge-cyan">Routine</span></td></tr>
      <tr><td style="color:var(--text)">Solar farm or development near airport</td><td style="color:var(--dim)">Airspace/obstruction analysis vs. ALP surfaces</td><td><span class="badge badge-yellow">Medium</span></td></tr>
    </tbody></table></div>
  </div>

  <div class="card">
    <div class="card-title">ALP Update Process (Typical Timeline: 12-18 Months)</div>
    <div class="step-row"><div class="step-num">1</div><div class="step-content"><div class="step-title">Pre-Application Meeting with FAA ADO (Month 0)</div><div class="step-desc">Contact your FAA Airports District Office (Southwest Region for TX). Discuss the scope, timing, and funding. If using AIP, you'll submit through your ACIP.</div></div></div>
    <div class="step-row"><div class="step-num">2</div><div class="step-content"><div class="step-title">Consultant Selection (Month 1-2)</div><div class="step-desc">Issue RFQ for aviation planning/engineering consultant. Qualifications-based selection per the Brooks Act (required for AIP-funded work). Score proposals, negotiate fee.</div></div></div>
    <div class="step-row"><div class="step-num">3</div><div class="step-content"><div class="step-title">Data Collection & Survey (Month 3-5)</div><div class="step-desc">Topographic survey, boundary survey, obstruction survey, aerial photography. Collect 5010 data, fleet mix, ops counts, existing utility info.</div></div></div>
    <div class="step-row"><div class="step-num">4</div><div class="step-content"><div class="step-title">Forecast & Demand Analysis (Month 4-6)</div><div class="step-desc">Project future activity (based aircraft, ops, fleet mix) for 5, 10, and 20-year horizons. This drives facility requirements and ARC determination.</div></div></div>
    <div class="step-row"><div class="step-num">5</div><div class="step-content"><div class="step-title">Alternatives Analysis (Month 5-8)</div><div class="step-desc">Evaluate development alternatives for runways, taxiways, hangars, terminal, and support facilities. Assess each for compliance with FAA design standards.</div></div></div>
    <div class="step-row"><div class="step-num">6</div><div class="step-content"><div class="step-title">Draft ALP Preparation (Month 8-12)</div><div class="step-desc">Produce the drawing set: layout plan, airspace, approach surfaces, land use, property map, facilities plan. Submit to FAA ADO for review.</div></div></div>
    <div class="step-row"><div class="step-num">7</div><div class="step-content"><div class="step-title">FAA Review & Comments (Month 12-15)</div><div class="step-desc">FAA ADO reviews for compliance with AC 150/5300-13A, Part 77, and grant assurances. Expect 1-2 rounds of comments.</div></div></div>
    <div class="step-row"><div class="step-num">8</div><div class="step-content"><div class="step-title">ALP Approval (Month 15-18)</div><div class="step-desc">FAA approves the ALP (conditionally or unconditionally). Conditional approval means some items need resolution before construction. Approved ALP is filed.</div></div></div>
  </div>

  <div class="tip-card">
    <span class="tip-icon">!</span>
    <span class="tip-title">Don't Wait for a Full Update to Fix Critical Items</span>
    <div class="tip-body">If you have a specific project that needs to be on the ALP immediately, you can request a "conditional ALP approval" or ALP amendment for just that project. This is faster than a full update and can unblock a grant application. Discuss with your ADO.</div>
  </div>`;
}

// ========== FIND DOCUMENTS ==========
function renderDocuments(){
  return `
  <div class="card">
    <div class="card-title">Where to Find ALP Documents</div>

  </div>

  <div class="card">
    <div class="card-title">Primary Sources</div>
    <div style="display:grid;gap:10px">
      <div class="info-block" style="border-left:3px solid var(--accent)">
        <div class="info-label">Airport Sponsor / Manager's Office</div>
        <div class="info-text">The airport sponsor (city, county, or authority) should have the official copy of the ALP on file. This is the first place to check. Ask the airport manager or city engineer.</div>
      </div>
      <div class="info-block" style="border-left:3px solid var(--blue)">
        <div class="info-label">FAA Airports District Office (ADO)</div>
        <div class="info-text">The FAA Southwest Region ADO in Fort Worth maintains copies of all approved ALPs for Texas airports. Contact them to request a copy or verify approval status. Phone: (817) 222-5600.</div>
      </div>
      <div class="info-block" style="border-left:3px solid var(--yellow)">
        <div class="info-label">TxDOT Aviation Division</div>
        <div class="info-text">TxDOT maintains ALP records for airports in the Texas Airport System Plan (TASP). Contact the Aviation Division in Austin. They may have digital copies or know the consultant who prepared it.</div>
      </div>
      <div class="info-block" style="border-left:3px solid var(--green)">
        <div class="info-label">Engineering Consultant of Record</div>
        <div class="info-text">The firm that prepared the ALP retains copies. Check the title block on any existing airport drawings for the consultant name. Common TX firms: Garver, KSA Engineers, Parkhill, LJA, RS&H, HNTB, Kimley-Horn.</div>
      </div>
    </div>
  </div>

  <div class="card">
    <div class="card-title">Online Search Strategies</div>
    <div style="display:grid;gap:10px">
      <div class="info-block">
        <div class="info-label">Google Search (Best First Try)</div>
        <div class="info-text">Search: <span style="color:var(--accent)">"[Airport Name] airport layout plan PDF"</span> or <span style="color:var(--accent)">"[Airport Name] master plan"</span>. Many cities and counties publish these on their websites. Also try adding "TxDOT" or "FAA" to the search.</div>
      </div>
      <div class="info-block">
        <div class="info-label">City/County Government Websites</div>
        <div class="info-text">Check the airport's sponsor city or county website under "Airport," "Engineering," or "Public Works." Many publish master plan documents and ALP sheets as PDFs. Look for meeting minutes that reference ALP approvals.</div>
      </div>
      <div class="info-block">
        <div class="info-label">TxDOT Aviation Planning Documents</div>
        <div class="info-text">TxDOT publishes the Texas Airport System Plan and related planning documents. Check <a href="https://www.txdot.gov/about/divisions/aviation.html" target="_blank">txdot.gov/aviation</a> for system-wide data and individual airport reports.</div>
      </div>
      <div class="info-block">
        <div class="info-label">FAA NPIAS Report</div>
        <div class="info-text">The NPIAS report lists every federally-significant airport and planned development costs. Check <a href="https://www.faa.gov/airports/planning_capacity/npias" target="_blank">faa.gov NPIAS</a> — it references ALP-based project needs.</div>
      </div>
      <div class="info-block">
        <div class="info-label">FOIA Request (Last Resort)</div>
        <div class="info-text">If you cannot locate the ALP through other means, file a Freedom of Information Act request with the FAA. They are required to provide government records. This takes 2-6 weeks but guarantees access.</div>
      </div>
    </div>

  <div class="card">

    <div class="tip-body">If no one — not the airport manager, not the city, not the FAA — can locate a current ALP, that's a strong signal the airport needs an ALP update. This is itself an AIP-eligible project. Document the inability to locate the ALP and include it in your next ACIP pre-application discussion with your ADO.</div>
  </div>`;

function doDocSearch(q){
  const s=q.toLowerCase().trim();
  const el=document.getElementById('docResults');
  if(!el)return;
  if(!s){el.innerHTML='';return}
  const matches=GA_AIRPORTS.filter(a=>(a.faa+' '+a.name+' '+a.city+' '+a.county+' '+a.state).toLowerCase().includes(s)).slice(0,8);
  el.innerHTML=matches.map(a=>`<div class="result-card" style="padding:12px">
    <div style="display:flex;align-items:center;gap:8px;margin-bottom:8px">
      <span style="font-weight:700;color:var(--accent)">${a.faa}</span>
      <span style="color:var(--dim);font-size:11px">${a.name}</span>
    </div>
    <div class="result-links">
      <a href="https://www.google.com/search?q=${encodeURIComponent(a.name+' airport layout plan ALP PDF')}" target="_blank" class="result-link">Google: ALP PDF</a>
      <a href="https://www.google.com/search?q=${encodeURIComponent(a.name+' master plan PDF')}" target="_blank" class="result-link">Google: Master Plan</a>
      <a href="https://www.google.com/search?q=${encodeURIComponent(a.city+' TX airport '+(a.county?a.county+' county ':'')+'capital improvement plan')}" target="_blank" class="result-link">Google: CIP</a>
      <a href="https://www.faa.gov/airports/airport_safety/airportdata_5010/menu?faaCode=${a.faa}" target="_blank" class="result-link">FAA 5010 Data</a>
      <a href="https://nfdc.faa.gov/nfdcApps/services/ajv5/airportDisplay.jsp?airportId=${a.faa}" target="_blank" class="result-link">FAA NASR</a>
    </div>
  </div>`).join('');
}

  return `
  <div class="card">
    <div class="card-title">My Tracked Airports (${tracked.length})</div>
    <div class="card-sub">Add airports from the Lookup tab. Track ALP status and keep notes for each.</div>
  </div>
  ${tracked.length?tracked.map(a=>`<div class="card">
    <div style="display:flex;justify-content:space-between;align-items:flex-start;flex-wrap:wrap;gap:8px;margin-bottom:12px">
      <div>
        <div style="font-size:18px;font-weight:700;color:var(--accent)">${a.faa} <span style="font-size:12px;color:var(--dim);font-weight:400">${a.name}</span></div>
        <div style="font-size:10px;color:var(--dim);margin-top:2px">${a.city}, ${a.state} &mdash; ${a.county} County &mdash; ${a.class}</div>

      <div style="background:var(--bg2);padding:8px;border-radius:4px"><div style="font-size:8px;color:var(--dim);text-transform:uppercase">Annual Ops</div><div style="font-size:14px;color:var(--accent);font-weight:600">${a.ops?a.ops.toLocaleString():'N/A'}</div></div>
      <div style="background:var(--bg2);padding:8px;border-radius:4px"><div style="font-size:8px;color:var(--dim);text-transform:uppercase">NPIAS</div><div style="font-size:14px;color:${a.npias?'var(--green)':'var(--red)'};font-weight:600">${a.npias?'Yes':'No'}</div></div>
    </div>
    <div style="margin-bottom:8px">
      <div style="font-size:9px;color:var(--dim);text-transform:uppercase;margin-bottom:4px">ALP Status Notes</div>
      <textarea style="background:var(--bg2);border:1px solid var(--border);color:var(--text);font-family:var(--font);font-size:11px;padding:8px;border-radius:4px;width:100%;height:80px;resize:vertical;outline:none" placeholder="Track ALP status, update progress, grant applications..." oninput="updateNote('${a.faa}',this.value)">${data.notes[a.faa]||''}</textarea>
    </div>
    <div class="result-links">
      <a href="https://www.google.com/search?q=${encodeURIComponent(a.name+' airport layout plan ALP PDF')}" target="_blank" class="result-link">Search ALP</a>
      <a href="https://www.faa.gov/airports/airport_safety/airportdata_5010/menu?faaCode=${a.faa}" target="_blank" class="result-link">FAA 5010</a>
      <a href="https://www.airnav.com/airport/${a.faa}" target="_blank" class="result-link">AirNav</a>
    </div>
  </div>`).join(''):`
  <div class="card" style="text-align:center;padding:40px">
    <div style="color:var(--muted);font-size:12px;margin-bottom:12px">No airports tracked yet</div>
    <button class="btn btn-accent" onclick="currentTab='lookup';render()">Search & Add Airports</button>

function removeTracked(faa){data.myAirports=data.myAirports.filter(f=>f!==faa);delete data.notes[faa];save();render()}
function updateNote(faa,val){data.notes[faa]=val;save()}
