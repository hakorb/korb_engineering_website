<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>ALP Tracker | Korb Engineering</title>
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{--bg:#050a0f;--bg1:#0a1018;--bg2:#0f1620;--bg3:#141c28;--border:#1a2535;--accent:#00d4ff;--accentDim:rgba(0,212,255,0.15);--green:#10b981;--red:#ef4444;--yellow:#f59e0b;--text:#e2e8f0;--textDim:rgba(226,232,240,0.45);--font:'JetBrains Mono',monospace}
body{background:var(--bg);color:var(--text);font-family:var(--font);font-size:13px;line-height:1.5;min-height:100vh}
::selection{background:var(--accent);color:var(--bg)}
::-webkit-scrollbar{width:6px;height:6px}
::-webkit-scrollbar-track{background:var(--bg)}
::-webkit-scrollbar-thumb{background:var(--border);border-radius:3px}
::-webkit-scrollbar-thumb:hover{background:var(--accent)}

.app{max-width:1400px;margin:0 auto;padding:16px}
.header{display:flex;align-items:center;justify-content:space-between;padding:16px 0;border-bottom:1px solid var(--border);margin-bottom:16px;flex-wrap:wrap;gap:12px}
.header h1{font-size:18px;font-weight:600;color:var(--accent);letter-spacing:1px}
.header h1 span{color:var(--textDim);font-weight:300}

.tabs{display:flex;gap:4px;flex-wrap:wrap}
.tab{padding:6px 14px;border:1px solid var(--border);background:transparent;color:var(--textDim);font-family:var(--font);font-size:11px;cursor:pointer;border-radius:4px;transition:all .2s}
.tab:hover{border-color:var(--accent);color:var(--text)}
.tab.active{background:var(--accentDim);border-color:var(--accent);color:var(--accent)}

.grid{display:grid;grid-template-columns:280px 1fr;gap:16px;min-height:calc(100vh - 140px)}
@media(max-width:900px){.grid{grid-template-columns:1fr}}

.sidebar{display:flex;flex-direction:column;gap:8px}
.airport-card{padding:10px;border:1px solid var(--border);border-radius:6px;cursor:pointer;transition:all .2s;background:var(--bg1)}
.airport-card:hover{border-color:var(--accent);background:var(--bg2)}
.airport-card.active{border-color:var(--accent);background:var(--accentDim)}
.airport-card .code{font-size:16px;font-weight:700;color:var(--accent)}
.airport-card .name{font-size:10px;color:var(--textDim);margin-top:2px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}

.main{display:flex;flex-direction:column;gap:16px}
.panel{border:1px solid var(--border);border-radius:6px;background:var(--bg1);padding:16px;overflow:auto}
.panel h2{font-size:14px;font-weight:600;color:var(--accent);margin-bottom:12px;display:flex;align-items:center;gap:8px}
.panel h3{font-size:12px;font-weight:500;color:var(--text);margin:12px 0 6px}

table{width:100%;border-collapse:collapse;font-size:11px}
th{text-align:left;padding:6px 8px;border-bottom:1px solid var(--border);color:var(--accent);font-weight:500;font-size:10px;text-transform:uppercase;letter-spacing:0.5px}
td{padding:6px 8px;border-bottom:1px solid rgba(26,37,53,0.5);color:var(--text)}
tr:hover td{background:rgba(0,212,255,0.03)}

.stat-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(140px,1fr));gap:8px;margin-bottom:16px}
.stat{padding:10px;border:1px solid var(--border);border-radius:6px;background:var(--bg2)}
.stat .label{font-size:9px;color:var(--textDim);text-transform:uppercase;letter-spacing:0.5px}
.stat .value{font-size:16px;font-weight:600;color:var(--accent);margin-top:2px}

.badge{display:inline-block;padding:2px 8px;border-radius:3px;font-size:10px;font-weight:500}
.badge-green{background:rgba(16,185,129,0.15);color:var(--green);border:1px solid rgba(16,185,129,0.3)}
.badge-yellow{background:rgba(245,158,11,0.15);color:var(--yellow);border:1px solid rgba(245,158,11,0.3)}
.badge-red{background:rgba(239,68,68,0.15);color:var(--red);border:1px solid rgba(239,68,68,0.3)}
.badge-cyan{background:var(--accentDim);color:var(--accent);border:1px solid rgba(0,212,255,0.3)}

.tip{padding:8px 12px;border-left:3px solid var(--accent);background:var(--bg2);margin:4px 0;font-size:11px;border-radius:0 4px 4px 0}
.history{padding:12px;border:1px solid var(--border);border-radius:6px;background:var(--bg2);font-size:11px;color:var(--textDim);line-height:1.6}

.btn{padding:6px 14px;border:1px solid var(--border);background:transparent;color:var(--text);font-family:var(--font);font-size:11px;cursor:pointer;border-radius:4px;transition:all .2s}
.btn:hover{border-color:var(--accent);color:var(--accent)}
.btn-accent{background:var(--accentDim);border-color:var(--accent);color:var(--accent)}
.btn-accent:hover{background:rgba(0,212,255,0.25)}

.input{background:var(--bg);border:1px solid var(--border);color:var(--text);font-family:var(--font);font-size:12px;padding:6px 10px;border-radius:4px;outline:none;width:100%}
.input:focus{border-color:var(--accent)}
select.input{cursor:pointer}

.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,0.7);z-index:100;display:flex;align-items:center;justify-content:center;padding:16px}
.modal{background:var(--bg1);border:1px solid var(--border);border-radius:8px;padding:20px;max-width:600px;width:100%;max-height:90vh;overflow:auto}
.modal h2{margin-bottom:16px}
.form-row{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:8px}
@media(max-width:600px){.form-row{grid-template-columns:1fr}}
.form-group{display:flex;flex-direction:column;gap:3px}
.form-group label{font-size:10px;color:var(--textDim);text-transform:uppercase}

.search-box{display:flex;gap:8px;margin-bottom:8px}
.fleet-bar{display:flex;height:20px;border-radius:4px;overflow:hidden;margin:4px 0}
.fleet-seg{display:flex;align-items:center;justify-content:center;font-size:8px;font-weight:600;color:var(--bg);min-width:20px;transition:all .3s}

.korb-badge{position:fixed;bottom:10px;right:10px;font-size:10px;color:#00d4ff;opacity:0.5;font-family:'JetBrains Mono',monospace;pointer-events:none;z-index:9999}
</style>
</head>

function load(){try{const r=localStorage.getItem(LS_KEY);if(r){const d=JSON.parse(r);if(d.length)return d;}}catch(e){}return JSON.parse(JSON.stringify(DEFAULT_AIRPORTS));}
function persist(){localStorage.setItem(LS_KEY,JSON.stringify(airports));}

function init(){airports=load();render();}

function getSelected(){return airports.find(a=>a.id===selectedId)||airports[0];}

function render(){
const ap=getSelected();
const app=document.getElementById('app');
app.innerHTML=`
<div class="header">
  <h1>ALP TRACKER <span>// Airport Layout Plan</span></h1>
  <div style="display:flex;gap:8px;flex-wrap:wrap">
    <button class="btn btn-accent" onclick="showAdd()">+ Add Airport</button>
    <button class="btn" onclick="exportData()">Export JSON</button>
    <button class="btn" onclick="resetData()">Reset</button>
  </div>
</div>
<div class="grid">
  <div class="sidebar" id="sidebar">
    <div class="search-box"><input class="input" placeholder="Search airports..." oninput="filterSidebar(this.value)" id="searchInput"></div>
    ${airports.map(a=>`
    <div class="airport-card ${a.id===selectedId?'active':''}" onclick="selectAirport('${a.id}')">
      <div class="code">${a.faa} <span style="font-size:10px;color:var(--textDim);font-weight:400">${a.icao}</span></div>
      <div class="name">${a.name}</div>
      <div style="font-size:9px;color:var(--textDim);margin-top:2px">${a.city}, ${a.state} | ${a.elevation} ft MSL</div>
    </div>`).join('')}
  </div>
  <div class="main">
    <div class="tabs">
      ${['overview','runways','taxiways','pavement','airspace','fleet','notes'].map(t=>`
      <button class="tab ${activeTab===t?'active':''}" onclick="setTab('${t}')">${t.charAt(0).toUpperCase()+t.slice(1)}</button>`).join('')}
    </div>
    <div id="content">${renderTab(ap)}</div>
  </div>
</div>`;
}

function renderTab(ap){
switch(activeTab){
case 'overview': return renderOverview(ap);
case 'runways': return renderRunways(ap);
case 'taxiways': return renderTaxiways(ap);
case 'pavement': return renderPavement(ap);
case 'airspace': return renderAirspace(ap);
case 'fleet': return renderFleet(ap);
case 'notes': return renderNotes(ap);
default: return renderOverview(ap);
}}

function renderOverview(ap){
const totalRwyLen=ap.runways.reduce((s,r)=>s+r.length,0);
const longestRwy=Math.max(...ap.runways.map(r=>r.length));
const catIII=ap.runways.filter(r=>r.approach.includes('CAT III')).length;
return `<div class="panel">
<h2>Airport Overview</h2>
<div class="stat-grid">

  <div class="stat"><div class="label">Elevation</div><div class="value">${ap.elevation.toLocaleString()} ft</div></div>
  <div class="stat"><div class="label">Runways</div><div class="value">${ap.runways.length}</div></div>
  <div class="stat"><div class="label">Longest Runway</div><div class="value">${longestRwy.toLocaleString()} ft</div></div>
  <div class="stat"><div class="label">CAT III Approaches</div><div class="value">${catIII}</div></div>
  <div class="stat"><div class="label">ARC</div><div class="value">${ap.arc.category}-${ap.arc.group}</div></div>
  <div class="stat"><div class="label">Critical Aircraft</div><div class="value" style="font-size:11px">${ap.arc.critical}</div></div>
  <div class="stat"><div class="label">Taxiways</div><div class="value">${ap.taxiways.length}</div></div>
</div>
<h3>Engineering Tips</h3>
${ap.tips.map(t=>`<div class="tip">${t}</div>`).join('')}
<h3 style="margin-top:16px">History</h3>
<div class="history">${ap.history}</div>
</div>`;}

function renderRunways(ap){
return `<div class="panel">
<h2>Runway Data</h2>
<div style="overflow-x:auto">
<table>
<thead><tr><th>Designation</th><th>Length (ft)</th><th>Width (ft)</th><th>Surface</th><th>PCN</th><th>Approach</th><th>Lighting</th><th>Marking</th></tr></thead>
<tbody>
${ap.runways.map(r=>`<tr>
<td style="font-weight:600;color:var(--accent)">${r.designation}</td>
<td>${r.length.toLocaleString()}</td><td>${r.width}</td><td>${r.surface}</td>
<td><span class="badge badge-cyan">${r.pcn}</span></td>
<td>${r.approach.includes('CAT III')?'<span class="badge badge-green">'+r.approach+'</span>':r.approach.includes('CAT II')?'<span class="badge badge-yellow">'+r.approach+'</span>':'<span class="badge badge-cyan">'+r.approach+'</span>'}</td>
<td>${r.lighting}</td><td>${r.marking}</td></tr>`).join('')}
</tbody></table></div>
<div style="margin-top:16px">
<h3>Runway Length Comparison</h3>
<div style="margin-top:8px">
${ap.runways.map(r=>{const pct=(r.length/16000*100);return `
<div style="display:flex;align-items:center;gap:8px;margin:4px 0">
  <span style="width:60px;font-size:11px;font-weight:500;color:var(--accent)">${r.designation}</span>
  <div style="flex:1;height:16px;background:var(--bg);border-radius:3px;overflow:hidden">
    <div style="height:100%;width:${pct}%;background:linear-gradient(90deg,var(--accent),rgba(0,212,255,0.4));border-radius:3px;display:flex;align-items:center;justify-content:flex-end;padding-right:6px;font-size:9px;font-weight:600">${r.length.toLocaleString()}'</div>
  </div>
</div>`;}).join('')}
</div></div></div>`;}

function renderTaxiways(ap){
return `<div class="panel">
<h2>Taxiway Information</h2>
<table>
<thead><tr><th>Designation</th><th>Width (ft)</th><th>Surface</th><th>Description</th></tr></thead>
<tbody>
${ap.taxiways.map(t=>`<tr>
<td style="font-weight:600;color:var(--accent)">TWY ${t.designation}</td>
<td>${t.width}</td><td>${t.surface}</td><td>${t.connector}</td></tr>`).join('')}
</tbody></table></div>`;}

function renderPavement(ap){
return `<div class="panel">
<h2>Pavement Sections</h2>
<div style="display:grid;gap:12px;margin-top:8px">
  <div style="border:1px solid var(--border);border-radius:6px;padding:12px;background:var(--bg2)">
    <div style="font-size:10px;color:var(--accent);text-transform:uppercase;letter-spacing:0.5px;margin-bottom:4px">Runway Pavement</div>
    <div style="font-size:12px">${ap.pavement.runway}</div>
  </div>
  <div style="border:1px solid var(--border);border-radius:6px;padding:12px;background:var(--bg2)">
    <div style="font-size:10px;color:var(--accent);text-transform:uppercase;letter-spacing:0.5px;margin-bottom:4px">Taxiway Pavement</div>
    <div style="font-size:12px">${ap.pavement.taxiway}</div>
  </div>
  <div style="border:1px solid var(--border);border-radius:6px;padding:12px;background:var(--bg2)">
    <div style="font-size:10px;color:var(--accent);text-transform:uppercase;letter-spacing:0.5px;margin-bottom:4px">Apron Pavement</div>
    <div style="font-size:12px">${ap.pavement.apron}</div>
  </div>
</div></div>`;}

function renderAirspace(ap){
return `<div class="panel">
<h2>Airspace &amp; Obstructions</h2>
<div style="display:grid;gap:12px;margin-top:8px">
  <div style="border:1px solid var(--border);border-radius:6px;padding:12px;background:var(--bg2)">
    <div style="font-size:10px;color:var(--accent);text-transform:uppercase;margin-bottom:4px">Part 77 Surfaces</div>
    <div style="font-size:12px">${ap.airspace.part77}</div>
  </div>
  <div style="border:1px solid var(--border);border-radius:6px;padding:12px;background:var(--bg2)">
    <div style="font-size:10px;color:var(--accent);text-transform:uppercase;margin-bottom:4px">Approach Slope</div>
    <div style="font-size:12px">${ap.airspace.approachSlope}</div>
  </div>
  <div style="border:1px solid var(--border);border-radius:6px;padding:12px;background:var(--bg2)">
    <div style="font-size:10px;color:var(--accent);text-transform:uppercase;margin-bottom:4px">Airspace Classification</div>
    <div style="font-size:12px">${ap.airspace.class}</div>
  </div>
</div>
<h3 style="margin-top:16px">ARC Classification</h3>
<div style="border:1px solid var(--border);border-radius:6px;padding:12px;background:var(--bg2);margin-top:8px">
  <div style="display:grid;grid-template-columns:repeat(3,1fr);gap:12px">
    <div><div style="font-size:9px;color:var(--textDim)">CATEGORY</div><div style="font-size:20px;font-weight:700;color:var(--accent)">${ap.arc.category}</div></div>
    <div><div style="font-size:9px;color:var(--textDim)">GROUP</div><div style="font-size:20px;font-weight:700;color:var(--accent)">${ap.arc.group}</div></div>
    <div><div style="font-size:9px;color:var(--textDim)">CRITICAL AIRCRAFT</div><div style="font-size:12px;font-weight:500;color:var(--text);margin-top:4px">${ap.arc.critical}</div></div>
  </div>
</div></div>`;}

function renderFleet(ap){
return `<div class="panel">
<h2>Fleet Mix</h2>
<div class="fleet-bar" style="height:28px;margin:12px 0">
${ap.fleetMix.map((f,i)=>`<div class="fleet-seg" style="width:${f.pct}%;background:${FLEET_COLORS[i%FLEET_COLORS.length]}" title="${f.aircraft}: ${f.pct}%">${f.pct>6?f.pct+'%':''}</div>`).join('')}
</div>
<table>
<thead><tr><th>Aircraft</th><th>Percentage</th><th>Visual</th></tr></thead>
<tbody>
${ap.fleetMix.map((f,i)=>`<tr>
<td style="font-weight:500"><span style="display:inline-block;width:10px;height:10px;border-radius:2px;background:${FLEET_COLORS[i%FLEET_COLORS.length]};margin-right:6px;vertical-align:middle"></span>${f.aircraft}</td>
<td>${f.pct}%</td>
<td><div style="width:${f.pct*2}px;height:8px;background:${FLEET_COLORS[i%FLEET_COLORS.length]};border-radius:2px;opacity:0.7"></div></td></tr>`).join('')}
</tbody></table></div>`;}

function renderNotes(ap){
const notes=ap.customNotes||'';
return `<div class="panel">
<h2>Project Notes</h2>
<textarea class="input" style="height:200px;resize:vertical" placeholder="Enter project-specific notes for ${ap.faa}..." oninput="updateNotes(this.value)">${notes}</textarea>
<div style="margin-top:8px;font-size:10px;color:var(--textDim)">Notes are saved automatically to localStorage.</div>
</div>`;}

window.selectAirport=function(id){selectedId=id;render();};
window.setTab=function(t){activeTab=t;render();};
window.filterSidebar=function(v){
const cards=document.querySelectorAll('.airport-card');
const s=v.toLowerCase();
cards.forEach((c,i)=>{if(i>=airports.length)return;const a=airports[i];const match=(a.faa+a.icao+a.name+a.city+a.state).toLowerCase().includes(s);c.style.display=match?'':'none';});
};
window.updateNotes=function(v){const ap=getSelected();ap.customNotes=v;persist();};
window.exportData=function(){
const blob=new Blob([JSON.stringify(airports,null,2)],{type:'application/json'});
const a=document.createElement('a');a.href=URL.createObjectURL(blob);a.download='alp-data.json';a.click();
};
window.resetData=function(){if(confirm('Reset all airport data to defaults?')){localStorage.removeItem(LS_KEY);airports=JSON.parse(JSON.stringify(DEFAULT_AIRPORTS));selectedId='ATL';render();}};
window.showAdd=function(){
document.getElementById('app').insertAdjacentHTML('beforeend',`
<div class="modal-overlay" onclick="if(event.target===this)closeModal()">
<div class="modal">
<h2 style="color:var(--accent)">Add Custom Airport</h2>
<div class="form-row">
  <div class="form-group"><label>FAA Code</label><input class="input" id="addFaa" maxlength="4" placeholder="e.g. MCO"></div>
  <div class="form-group"><label>ICAO Code</label><input class="input" id="addIcao" maxlength="4" placeholder="e.g. KMCO"></div>
</div>
<div class="form-group" style="margin-bottom:8px"><label>Airport Name</label><input class="input" id="addName" placeholder="e.g. Orlando International Airport"></div>
<div class="form-row">
  <div class="form-group"><label>City</label><input class="input" id="addCity" placeholder="Orlando"></div>
  <div class="form-group"><label>State</label><input class="input" id="addState" maxlength="2" placeholder="FL"></div>
</div>
<div class="form-row">
  <div class="form-group"><label>Elevation (ft MSL)</label><input class="input" type="number" id="addElev" placeholder="96"></div>
  <div class="form-group"><label>ARC Category</label>
    <select class="input" id="addArcCat"><option>A</option><option>B</option><option>C</option><option selected>D</option><option>E</option></select>
  </div>
</div>
<div style="display:flex;gap:8px;justify-content:flex-end;margin-top:16px">
  <button class="btn" onclick="closeModal()">Cancel</button>
  <button class="btn btn-accent" onclick="addAirport()">Add Airport</button>
</div>
</div></div>`);};
window.closeModal=function(){const m=document.querySelector('.modal-overlay');if(m)m.remove();};
window.addAirport=function(){
const faa=document.getElementById('addFaa').value.toUpperCase();
const icao=document.getElementById('addIcao').value.toUpperCase();
const name=document.getElementById('addName').value;
if(!faa||!name){alert('FAA code and name are required.');return;}
airports.push({id:faa,faa,icao:icao||'K'+faa,name,city:document.getElementById('addCity').value||'',state:document.getElementById('addState').value.toUpperCase()||'',elevation:parseInt(document.getElementById('addElev').value)||0,
runways:[],taxiways:[],arc:{category:document.getElementById('addArcCat').value,group:'III',critical:'Custom'},
fleetMix:[{aircraft:'General Aviation',pct:100}],pavement:{runway:'Not specified',taxiway:'Not specified',apron:'Not specified'},
airspace:{part77:'To be determined',approachSlope:'To be determined',class:'To be determined'},tips:['Custom airport — add engineering tips here'],history:'Custom airport entry.',customNotes:''});
persist();selectedId=faa;closeModal();render();};

init();
})();
</script>
</body>
</html>
