<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>Critical Path Method Calculator | Korb Engineering</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{--bg:#050a0f;--surface:#0a1018;--surface2:#0e1520;--border:#1a2535;--text:#e2e8f0;--cyan:#00d4ff;--orange:#ff6600;--green:#10b981;--red:#ef4444;--font:'JetBrains Mono',monospace}
html{font-size:16px}
body{background:var(--bg);color:var(--text);font-family:var(--font);line-height:1.6;min-height:100vh}
header{background:var(--surface);border-bottom:1px solid var(--border);padding:16px 20px;display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:12px}
.brand{display:flex;align-items:center;gap:12px}
.brand-icon{width:36px;height:36px;border:2px solid var(--cyan);border-radius:6px;display:flex;align-items:center;justify-content:center;font-weight:700;color:var(--cyan);font-size:14px}
.brand h1{font-size:clamp(14px,2.5vw,18px);font-weight:600;color:var(--cyan)}
.brand-sub{font-size:12px;color:var(--text);opacity:.6;font-weight:300}
.header-actions{display:flex;gap:8px;flex-wrap:wrap;align-items:center}
.header-actions select{width:auto;min-width:140px;margin:0}
main{max-width:1400px;margin:0 auto;padding:16px}
.card{background:var(--surface);border:1px solid var(--border);border-radius:8px;padding:16px;margin-bottom:16px}
.card h2{font-size:14px;font-weight:600;color:var(--cyan);margin-bottom:12px;text-transform:uppercase;letter-spacing:1px}
label{display:block;font-size:12px;color:var(--text);opacity:.7;margin-bottom:4px}
input,select{width:100%;background:var(--surface2);border:1px solid var(--border);border-radius:4px;color:var(--text);font-family:var(--font);font-size:16px;padding:10px 12px;margin-bottom:8px;min-height:44px}
input:focus{outline:none;border-color:var(--cyan)}
button{font-family:var(--font);font-size:13px;font-weight:500;border:none;border-radius:4px;cursor:pointer;padding:10px 16px;min-height:44px;transition:opacity .2s}
button:active{opacity:.8}
.btn-cyan{background:var(--cyan);color:var(--bg)}
.btn-orange{background:var(--orange);color:#fff}
.btn-green{background:var(--green);color:#fff}
.btn-red{background:var(--red);color:#fff}
.btn-outline{background:transparent;border:1px solid var(--border);color:var(--text)}
.btn-outline:hover{border-color:var(--cyan)}
.btn-row{display:flex;gap:8px;flex-wrap:wrap;margin-top:8px}
.form-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(160px,1fr));gap:8px}
table{width:100%;border-collapse:collapse;font-size:12px;margin-top:8px;overflow-x:auto;display:block}
@media(min-width:800px){table{display:table}}
th,td{padding:8px 6px;text-align:left;border-bottom:1px solid var(--border);white-space:nowrap}
th{color:var(--cyan);font-weight:500;font-size:11px;text-transform:uppercase;letter-spacing:.5px}
.critical-row{background:rgba(239,68,68,.1)}
.critical-row td{color:var(--red);font-weight:600}
canvas{width:100%;border:1px solid var(--border);border-radius:4px;background:var(--surface2)}
.tab-bar{display:flex;gap:4px;margin-bottom:12px;flex-wrap:wrap}
.tab{padding:8px 14px;font-size:12px;border-radius:4px 4px 0 0;background:var(--surface2);color:var(--text);opacity:.6;cursor:pointer;border:1px solid var(--border);border-bottom:none;min-height:44px;display:flex;align-items:center}
.tab.active{opacity:1;background:var(--surface);color:var(--cyan);border-color:var(--cyan)}
.tab-content{display:none}
.tab-content.active{display:block}
.toast{position:fixed;bottom:20px;right:20px;background:var(--green);color:#fff;padding:12px 20px;border-radius:6px;font-size:13px;z-index:1000;opacity:0;transition:opacity .3s}
.toast.show{opacity:1}
.summary-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(180px,1fr));gap:12px;margin-bottom:16px}
.summary-card{background:var(--surface2);border:1px solid var(--border);border-radius:6px;padding:12px;text-align:center}
.summary-card .value{font-size:24px;font-weight:700;color:var(--cyan)}
.summary-card .label{font-size:11px;opacity:.6;margin-top:4px}
.summary-card.red .value{color:var(--red)}
.editable{cursor:pointer;border-bottom:1px dashed var(--cyan)}
.editable:hover{color:var(--cyan)}
</style>
</head>
<body>
<header>
  <div class="brand">
    <div class="brand-icon">KE</div>
    <div>
      <h1>Korb Engineering</h1>
      <div class="brand-sub">Critical Path Method (CPM) Calculator</div>
    </div>
  </div>
  <div class="header-actions">
    <select id="loadSelect"><option value="">-- Load Project --</option></select>
    <button class="btn-cyan" onclick="saveProject()">Save</button>
    <button class="btn-outline" onclick="loadProject()">Load</button>
    <button class="btn-red" onclick="deleteProject()">Del</button>
  </div>
</header>
<main>
  <!-- Summary -->
  <div class="summary-grid" id="summaryGrid" style="display:none">
    <div class="summary-card"><div class="value" id="sumDuration">-</div><div class="label">Project Duration (days)</div></div>
    <div class="summary-card red"><div class="value" id="sumCritCount">-</div><div class="label">Critical Activities</div></div>
    <div class="summary-card"><div class="value" id="sumTotal">-</div><div class="label">Total Activities</div></div>
    <div class="summary-card"><div class="value" id="sumCritPath">-</div><div class="label">Critical Path</div></div>
  </div>

  <!-- Input -->
  <div class="card">
    <h2>Add Activity</h2>
    <div class="form-grid">
      <div><label>Activity ID</label><input id="actId" placeholder="A"></div>
      <div><label>Name</label><input id="actName" placeholder="Foundation"></div>
      <div><label>Duration (days)</label><input id="actDur" type="number" min="0" value="5"></div>
      <div><label>Predecessors (comma-sep)</label><input id="actPred" placeholder="A,B"></div>
    </div>
    <div class="btn-row">
      <button class="btn-cyan" onclick="addActivity()">+ Add Activity</button>
      <button class="btn-orange" onclick="loadSample()">Load Sample Project</button>
      <button class="btn-green" onclick="exportResults()">Export to Clipboard</button>
    </div>
  </div>

  <!-- Results Table -->
  <div class="card">
    <h2>Activity Table <span style="font-size:11px;color:var(--text);opacity:.5;font-weight:300">(click duration to edit)</span></h2>
    <table id="actTable">
      <thead><tr><th>ID</th><th>Name</th><th>Dur</th><th>ES</th><th>EF</th><th>LS</th><th>LF</th><th>Total Float</th><th>Free Float</th><th>Critical</th><th></th></tr></thead>
      <tbody></tbody>
    </table>
  </div>

  <!-- Visualizations -->
  <div class="card">
    <h2>Visualization</h2>
    <div class="tab-bar">
      <div class="tab active" data-tab="network">Network Diagram</div>
      <div class="tab" data-tab="gantt">Gantt Chart</div>
    </div>
    <div id="tab-network" class="tab-content active">
      <canvas id="networkCanvas" height="400"></canvas>
    </div>
    <div id="tab-gantt" class="tab-content">
      <canvas id="ganttCanvas" height="400"></canvas>
    </div>
  </div>
</main>
<div class="toast" id="toast"></div>

<script>
let activities = [];
let computed = [];

// Tab switching
document.querySelectorAll('.tab').forEach(t=>{
  t.addEventListener('click',()=>{
    document.querySelectorAll('.tab').forEach(x=>x.classList.remove('active'));
    document.querySelectorAll('.tab-content').forEach(x=>x.classList.remove('active'));
    t.classList.add('active');
    document.getElementById('tab-'+t.dataset.tab).classList.add('active');
  });
});

function toast(msg){const t=document.getElementById('toast');t.textContent=msg;t.classList.add('show');setTimeout(()=>t.classList.remove('show'),2500)}

function addActivity(){
  const id=document.getElementById('actId').value.trim().toUpperCase();
  const name=document.getElementById('actName').value.trim();
  const dur=parseFloat(document.getElementById('actDur').value);
  const predStr=document.getElementById('actPred').value.trim().toUpperCase();
  if(!id||!name||isNaN(dur)||dur<0)return toast('Fill in all fields correctly');
  if(activities.find(a=>a.id===id))return toast('Duplicate ID: '+id);
  const preds=predStr?predStr.split(',').map(s=>s.trim()).filter(Boolean):[];
  activities.push({id,name,duration:dur,predecessors:preds});
  document.getElementById('actId').value='';
  document.getElementById('actName').value='';
  document.getElementById('actDur').value='5';
  document.getElementById('actPred').value='';
  recalculate();
}

function removeActivity(id){
  activities=activities.filter(a=>a.id!==id);
  // Remove from predecessors
  activities.forEach(a=>{a.predecessors=a.predecessors.filter(p=>p!==id)});
  recalculate();
}

function editDuration(id){
  const act=activities.find(a=>a.id===id);
  if(!act)return;
  const val=prompt('New duration for '+id+':',act.duration);
  if(val===null)return;
  const num=parseFloat(val);
  if(isNaN(num)||num<0)return toast('Invalid duration');
  act.duration=num;
  recalculate();
}

function recalculate(){
  if(activities.length===0){
    computed=[];
    renderTable();
    document.getElementById('summaryGrid').style.display='none';
    return;
  }
  // Build adjacency
  const acts=activities.map(a=>({...a,ES:0,EF:0,LS:0,LF:0,totalFloat:0,freeFloat:0,isCritical:false}));
  const map={};
  acts.forEach(a=>map[a.id]=a);

  // Topological sort
  const sorted=[];
  const visited=new Set();
  const visiting=new Set();
  function visit(id){
    if(visited.has(id))return;
    if(visiting.has(id))return; // cycle
    visiting.add(id);
    const a=map[id];
    if(a)(a.predecessors||[]).forEach(p=>visit(p));
    visiting.delete(id);
    visited.add(id);
    sorted.push(id);
  }
  acts.forEach(a=>visit(a.id));

  // Forward pass
  sorted.forEach(id=>{
    const a=map[id];
    if(!a)return;
    let maxEF=0;
    a.predecessors.forEach(pid=>{
      const p=map[pid];
      if(p&&p.EF>maxEF)maxEF=p.EF;
    });
    a.ES=maxEF;
    a.EF=a.ES+a.duration;
  });

  // Project duration
  const projDuration=Math.max(...acts.map(a=>a.EF));

  // Find terminal activities (no successors)
  const hasSuccessor=new Set();
  acts.forEach(a=>a.predecessors.forEach(p=>hasSuccessor.add(p)));

  // Backward pass
  const reverseSorted=[...sorted].reverse();
  // Initialize LF for terminal activities
  acts.forEach(a=>{
    if(!hasSuccessor.has(a.id)){
      a.LF=projDuration;
      a.LS=a.LF-a.duration;
    }else{
      a.LF=Infinity;
    }
  });

  reverseSorted.forEach(id=>{
    const a=map[id];
    if(!a)return;
    // Find successors
    acts.forEach(s=>{
      if(s.predecessors.includes(id)){
        if(s.LS<a.LF){
          a.LF=s.LS;
        }
      }
    });
    if(a.LF===Infinity)a.LF=projDuration;
    a.LS=a.LF-a.duration;
  });

  // Float calculations
  acts.forEach(a=>{
    a.totalFloat=a.LS-a.ES;
    // Free float = ES of earliest successor - EF of this activity
    let minSuccES=Infinity;
    acts.forEach(s=>{
      if(s.predecessors.includes(a.id)){
        if(s.ES<minSuccES)minSuccES=s.ES;
      }
    });
    a.freeFloat=minSuccES===Infinity?0:minSuccES-a.EF;
    a.isCritical=Math.abs(a.totalFloat)<0.001;
  });

  computed=acts;

  // Summary
  document.getElementById('summaryGrid').style.display='';
  document.getElementById('sumDuration').textContent=projDuration;
  const critActs=acts.filter(a=>a.isCritical);
  document.getElementById('sumCritCount').textContent=critActs.length;
  document.getElementById('sumTotal').textContent=acts.length;
  document.getElementById('sumCritPath').textContent=critActs.map(a=>a.id).join(' -> ')||'-';

  renderTable();
  drawNetwork();
  drawGantt();
}

function renderTable(){
  const tb=document.querySelector('#actTable tbody');
  tb.innerHTML=computed.map(a=>`<tr class="${a.isCritical?'critical-row':''}">
    <td>${a.id}</td><td>${a.name}</td>
    <td class="editable" onclick="editDuration('${a.id}')">${a.duration}</td>
    <td>${a.ES}</td><td>${a.EF}</td><td>${a.LS}</td><td>${a.LF}</td>
    <td>${a.totalFloat}</td><td>${a.freeFloat}</td>
    <td>${a.isCritical?'<span style="color:var(--red);font-weight:700">CRITICAL</span>':''}</td>
    <td><button class="btn-red" style="padding:4px 8px;min-height:32px;font-size:11px" onclick="removeActivity('${a.id}')">X</button></td>
  </tr>`).join('');
}

function drawNetwork(){
  const canvas=document.getElementById('networkCanvas');
  const ctx=canvas.getContext('2d');
  const dpr=window.devicePixelRatio||1;
  const rect=canvas.getBoundingClientRect();
  const W=rect.width;

  // Layout: assign levels based on topological order
  const acts=computed;
  if(acts.length===0){canvas.width=W*dpr;canvas.height=400*dpr;ctx.scale(dpr,dpr);ctx.clearRect(0,0,W,400);return}
  const map={};acts.forEach(a=>map[a.id]=a);

  // Determine level (longest path from start)
  const levels={};
  function getLevel(id){
    if(levels[id]!==undefined)return levels[id];
    const a=map[id];
    if(!a||a.predecessors.length===0){levels[id]=0;return 0}
    let maxL=0;
    a.predecessors.forEach(p=>{const l=getLevel(p);if(l+1>maxL)maxL=l+1});
    levels[id]=maxL;
    return maxL;
  }
  acts.forEach(a=>getLevel(a.id));

  const maxLevel=Math.max(...Object.values(levels));
  // Group by level
  const byLevel={};
  acts.forEach(a=>{const l=levels[a.id];if(!byLevel[l])byLevel[l]=[];byLevel[l].push(a)});

  const nodeW=100,nodeH=60;
  const maxPerLevel=Math.max(...Object.values(byLevel).map(arr=>arr.length));
  const H=Math.max(400,maxPerLevel*80+60);
  canvas.width=W*dpr;canvas.height=H*dpr;canvas.style.height=H+'px';
  ctx.scale(dpr,dpr);ctx.clearRect(0,0,W,H);

  const colW=W/(maxLevel+2);
  const positions={};

  // Position nodes
  for(let l=0;l<=maxLevel;l++){
    const group=byLevel[l]||[];
    const rowH=H/(group.length+1);
    group.forEach((a,i)=>{
      positions[a.id]={x:colW*(l+0.5),y:rowH*(i+1)};
    });
  }

  // Draw arrows
  acts.forEach(a=>{
    a.predecessors.forEach(pid=>{
      if(!positions[pid]||!positions[a.id])return;
      const from=positions[pid];
      const to=positions[a.id];
      const fx=from.x+nodeW/2,fy=from.y;
      const tx=to.x-nodeW/2,ty=to.y;
      const isCritEdge=map[pid]&&map[pid].isCritical&&a.isCritical;
      ctx.strokeStyle=isCritEdge?'#ef4444':'#1a2535';
      ctx.lineWidth=isCritEdge?2.5:1.5;
      ctx.beginPath();ctx.moveTo(fx,fy);ctx.lineTo(tx,ty);ctx.stroke();
      // Arrowhead
      const angle=Math.atan2(ty-fy,tx-fx);
      ctx.beginPath();ctx.moveTo(tx,ty);
      ctx.lineTo(tx-10*Math.cos(angle-0.3),ty-10*Math.sin(angle-0.3));
      ctx.lineTo(tx-10*Math.cos(angle+0.3),ty-10*Math.sin(angle+0.3));
      ctx.closePath();ctx.fillStyle=isCritEdge?'#ef4444':'#1a2535';ctx.fill();
    });
  });

  // Draw nodes
  acts.forEach(a=>{
    const pos=positions[a.id];if(!pos)return;
    const x=pos.x-nodeW/2,y=pos.y-nodeH/2;
    ctx.fillStyle=a.isCritical?'rgba(239,68,68,.15)':'var(--surface2)';
    ctx.strokeStyle=a.isCritical?'#ef4444':'#1a2535';
    ctx.lineWidth=a.isCritical?2:1;
    ctx.beginPath();ctx.roundRect(x,y,nodeW,nodeH,4);ctx.fill();ctx.stroke();

    // ID & name
    ctx.fillStyle=a.isCritical?'#ef4444':'#00d4ff';
    ctx.font='bold 12px JetBrains Mono';
    ctx.textAlign='center';
    ctx.fillText(a.id,pos.x,y+16);
    ctx.fillStyle='#e2e8f0';ctx.font='10px JetBrains Mono';
    ctx.fillText(a.name.substring(0,10),pos.x,y+30);
    // ES/EF, LS/LF
    ctx.font='9px JetBrains Mono';ctx.fillStyle='#10b981';
    ctx.fillText('ES:'+a.ES+' EF:'+a.EF,pos.x,y+43);
    ctx.fillStyle='#ff6600';
    ctx.fillText('LS:'+a.LS+' LF:'+a.LF,pos.x,y+54);
    ctx.textAlign='left';
  });
}

function drawGantt(){
  const canvas=document.getElementById('ganttCanvas');
  const ctx=canvas.getContext('2d');
  const dpr=window.devicePixelRatio||1;
  const rect=canvas.getBoundingClientRect();
  const W=rect.width;
  const acts=computed;
  if(acts.length===0)return;
  const rowH=30;
  const H=Math.max(400,acts.length*rowH+80);
  canvas.width=W*dpr;canvas.height=H*dpr;canvas.style.height=H+'px';
  ctx.scale(dpr,dpr);ctx.clearRect(0,0,W,H);

  const projDur=Math.max(...acts.map(a=>a.EF))||1;
  const margin={top:30,right:20,bottom:30,left:120};
  const plotW=W-margin.left-margin.right;

  // Grid
  ctx.strokeStyle='#1a2535';ctx.lineWidth=1;
  const step=Math.max(1,Math.ceil(projDur/20));
  for(let d=0;d<=projDur;d+=step){
    const x=margin.left+(d/projDur)*plotW;
    ctx.beginPath();ctx.moveTo(x,margin.top);ctx.lineTo(x,H-margin.bottom);ctx.stroke();
    ctx.fillStyle='#e2e8f0';ctx.font='9px JetBrains Mono';
    ctx.fillText(d,x-4,H-margin.bottom+14);
  }

  // Bars
  acts.forEach((a,i)=>{
    const y=margin.top+i*rowH;
    ctx.fillStyle='#e2e8f0';ctx.font='11px JetBrains Mono';
    ctx.fillText(a.id+' '+a.name.substring(0,10),4,y+20);

    // Float bar (ES to LF)
    if(a.totalFloat>0){
      const x1=margin.left+(a.ES/projDur)*plotW;
      const w=(a.LF-a.ES)/projDur*plotW;
      ctx.fillStyle='rgba(0,212,255,.1)';
      ctx.fillRect(x1,y+4,w,rowH-8);
    }

    // Activity bar
    const x=margin.left+(a.ES/projDur)*plotW;
    const w=Math.max(2,(a.duration/projDur)*plotW);
    ctx.fillStyle=a.isCritical?'#ef4444':'#00d4ff';
    ctx.globalAlpha=0.8;
    ctx.fillRect(x,y+6,w,rowH-12);
    ctx.globalAlpha=1;

    // Duration label
    ctx.fillStyle='#050a0f';ctx.font='bold 10px JetBrains Mono';
    if(w>25)ctx.fillText(a.duration+'d',x+4,y+20);
  });
}

function loadSample(){
  activities=[
    {id:'A',name:'Site Prep',duration:3,predecessors:[]},
    {id:'B',name:'Foundation',duration:5,predecessors:['A']},
    {id:'C',name:'Grading',duration:4,predecessors:['A']},
    {id:'D',name:'Utilities',duration:6,predecessors:['B']},
    {id:'E',name:'Framing',duration:8,predecessors:['B','C']},
    {id:'F',name:'Electrical',duration:4,predecessors:['D','E']},
    {id:'G',name:'Plumbing',duration:3,predecessors:['D']},
    {id:'H',name:'HVAC',duration:5,predecessors:['E']},
    {id:'I',name:'Finishes',duration:6,predecessors:['F','G','H']},
    {id:'J',name:'Inspection',duration:2,predecessors:['I']}
  ];
  recalculate();
  toast('Sample project loaded');
}

function exportResults(){
  if(computed.length===0)return toast('No data to export');
  let text='KORB ENGINEERING - Critical Path Method Analysis\n';
  text+='='.repeat(60)+'\n';
  const projDur=Math.max(...computed.map(a=>a.EF));
  text+='Project Duration: '+projDur+' days\n';
  const crit=computed.filter(a=>a.isCritical);
  text+='Critical Path: '+crit.map(a=>a.id).join(' -> ')+'\n\n';
  text+='ID\tName\tDur\tES\tEF\tLS\tLF\tTF\tFF\tCritical\n';
  text+='-'.repeat(80)+'\n';
  computed.forEach(a=>{
    text+=`${a.id}\t${a.name}\t${a.duration}\t${a.ES}\t${a.EF}\t${a.LS}\t${a.LF}\t${a.totalFloat}\t${a.freeFloat}\t${a.isCritical?'YES':'NO'}\n`;
  });
  navigator.clipboard.writeText(text).then(()=>toast('Copied to clipboard'));
}

function saveProject(){
  const name=prompt('Project name:');
  if(!name)return;
  const key='korb_cpm_'+name.replace(/\s+/g,'_');
  localStorage.setItem(key,JSON.stringify({activities}));
  refreshLoadSelect();
  toast('Saved: '+name);
}

function loadProject(){
  const sel=document.getElementById('loadSelect');
  if(!sel.value)return toast('Select a project');
  const data=JSON.parse(localStorage.getItem(sel.value));
  if(!data)return toast('Not found');
  activities=data.activities||[];
  recalculate();
  toast('Loaded');
}

function deleteProject(){
  const sel=document.getElementById('loadSelect');
  if(!sel.value)return toast('Select a project');
  if(!confirm('Delete?'))return;
  localStorage.removeItem(sel.value);
  refreshLoadSelect();
  toast('Deleted');
}

function refreshLoadSelect(){
  const sel=document.getElementById('loadSelect');
  sel.innerHTML='<option value="">-- Load Project --</option>';
  for(let i=0;i<localStorage.length;i++){
    const key=localStorage.key(i);
    if(key.startsWith('korb_cpm_')){
      const label=key.replace('korb_cpm_','').replace(/_/g,' ');
      sel.innerHTML+=`<option value="${key}">${label}</option>`;
    }
  }
}

refreshLoadSelect();
window.addEventListener('resize',()=>{if(computed.length>0)recalculate()});
</script>
</body>
</html>
