<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Fuel Burn Calculator - Korb Engineering</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{--bg:#050a0f;--surface:#0a1018;--surface2:#0e1520;--border:#1a2535;--text:#e2e8f0;--text-dim:#8892a2;--cyan:#00d4ff;--orange:#ff6600;--green:#10b981;--red:#ef4444;--font:'JetBrains Mono',monospace}
html{font-size:16px}
body{font-family:var(--font);background:var(--bg);color:var(--text);min-height:100vh;line-height:1.6}
header{background:var(--surface);border-bottom:1px solid var(--border);padding:16px 20px;display:flex;align-items:center;gap:12px;flex-wrap:wrap}
.logo{font-size:1.1rem;font-weight:700;color:var(--cyan);letter-spacing:1px}
.logo span{color:var(--orange)}
header h1{font-size:1rem;font-weight:400;color:var(--text-dim)}
main{max-width:960px;margin:0 auto;padding:20px}
.card{background:var(--surface);border:1px solid var(--border);border-radius:8px;padding:20px;margin-bottom:20px}
.card h2{font-size:.9rem;font-weight:600;color:var(--cyan);text-transform:uppercase;letter-spacing:1px;margin-bottom:16px;padding-bottom:8px;border-bottom:1px solid var(--border)}
.form-row{display:grid;grid-template-columns:1fr 1fr 1fr;gap:12px;margin-bottom:12px}
@media(max-width:600px){.form-row{grid-template-columns:1fr}}
label{display:block;font-size:.75rem;font-weight:500;color:var(--text-dim);text-transform:uppercase;letter-spacing:.5px;margin-bottom:4px}
input,select{width:100%;background:var(--surface2);border:1px solid var(--border);border-radius:6px;padding:12px;color:var(--text);font-family:var(--font);font-size:16px;min-height:44px;transition:border-color .2s}
input:focus,select:focus{outline:none;border-color:var(--cyan)}
input::placeholder{color:var(--text-dim)}
button{min-height:44px;padding:12px 24px;border:none;border-radius:6px;font-family:var(--font);font-size:.85rem;font-weight:600;cursor:pointer;transition:all .2s;text-transform:uppercase;letter-spacing:1px}
.btn-primary{background:var(--cyan);color:var(--bg)}
.btn-primary:hover{background:#33ddff}
.btn-secondary{background:var(--surface2);color:var(--text);border:1px solid var(--border)}
.btn-secondary:hover{border-color:var(--cyan)}
.btn-danger{background:transparent;color:var(--red);border:1px solid var(--red)}
.btn-danger:hover{background:var(--red);color:var(--bg)}
.btn-sm{min-height:36px;padding:8px 14px;font-size:.75rem}
.btn-row{display:flex;gap:10px;margin-top:16px;flex-wrap:wrap}
.leg{background:var(--surface2);border:1px solid var(--border);border-radius:6px;padding:16px;margin-bottom:12px;position:relative}
.leg-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:12px}
.leg-header h3{font-size:.8rem;color:var(--cyan);font-weight:600}
.remove-leg{background:none;border:none;color:var(--red);cursor:pointer;font-size:1.2rem;min-height:auto;padding:4px;font-family:var(--font)}
table{width:100%;border-collapse:collapse;margin-top:12px}
th,td{padding:10px 12px;text-align:left;border-bottom:1px solid var(--border);font-size:.8rem}
th{color:var(--text-dim);font-weight:500;text-transform:uppercase;letter-spacing:.5px;font-size:.7rem}
td{color:var(--text)}
.total-row{font-weight:700;color:var(--cyan)}
.total-row td{border-top:2px solid var(--cyan);border-bottom:none}
.summary-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(180px,1fr));gap:12px;margin-bottom:16px}
.summary-item{background:var(--surface2);border:1px solid var(--border);border-radius:6px;padding:16px;text-align:center}
.summary-item .value{font-size:1.4rem;font-weight:700;color:var(--cyan)}
.summary-item .label{font-size:.7rem;color:var(--text-dim);text-transform:uppercase;margin-top:4px}
.summary-item.warn .value{color:var(--orange)}
.hidden{display:none}
.fuel-type-info{font-size:.75rem;color:var(--text-dim);margin-top:4px}
footer{text-align:center;padding:20px;color:var(--text-dim);font-size:.7rem;border-top:1px solid var(--border);margin-top:40px}
</style>
</head>
<body>
<header>
<div class="logo">KORB<span>.</span>ENGINEERING</div>
<h1>/ Fuel Burn Calculator</h1>
</header>
<main>
<div class="card">
<h2>Fuel Configuration</h2>
<div class="form-row">
<div>
<label for="fuelType">Fuel Type</label>
<select id="fuelType" onchange="updateFuelWeight()">
<option value="6.7">Jet-A (6.7 lbs/gal)</option>
<option value="6.0">Avgas 100LL (6.0 lbs/gal)</option>
<option value="custom">Custom</option>
</select>
</div>
<div>
<label for="fuelWeight">Fuel Weight (lbs/gal)</label>
<input type="number" id="fuelWeight" value="6.7" min="1" max="10" step="0.1">
</div>
<div>
<label for="fuelUnit">Input Unit</label>
<select id="fuelUnit">
<option value="gph">Gallons/hr (GPH)</option>
<option value="pph">Pounds/hr (PPH)</option>
</select>
</div>
</div>
</div>

<div class="card">
<h2>Ground / Overhead Fuel</h2>
<div class="form-row">
<div>
<label for="taxiFuel">Taxi Fuel (gal)</label>
<input type="number" id="taxiFuel" min="0" step="0.1" placeholder="e.g. 1.5" value="1.5">
</div>
<div>
<label for="climbFuel">Climb Fuel (gal)</label>
<input type="number" id="climbFuel" min="0" step="0.1" placeholder="e.g. 3.0">
</div>
<div>
<label for="reserveMin">Reserve (minutes)</label>
<input type="number" id="reserveMin" min="0" step="1" placeholder="e.g. 45" value="45">
</div>
</div>
</div>

<div class="card">
<h2>Flight Legs</h2>
<div id="legs"></div>
<button class="btn-secondary btn-sm" onclick="addLeg()">+ Add Leg</button>
<div class="btn-row">
<button class="btn-primary" onclick="calculate()">Calculate</button>
<button class="btn-secondary" onclick="resetAll()">Reset</button>
</div>
</div>

<div id="results" class="hidden">
<div class="card">
<h2>Fuel Summary</h2>
<div class="summary-grid" id="summaryGrid"></div>
<div style="overflow-x:auto">
<table id="resultsTable">
<thead><tr>
<th>Phase</th><th>Time</th><th>Fuel (gal)</th><th>Fuel (lbs)</th>
</tr></thead>
<tbody id="resultsBody"></tbody>
</table>
</div>
<div class="btn-row" style="margin-top:16px">
<button class="btn-secondary btn-sm" onclick="copyToClipboard()">Copy to Clipboard</button>
</div>
</div>
</div>
</main>
<footer>&copy; Korb Engineering &mdash; Aviation Tools</footer>

<script>
let legCount=0;

function updateFuelWeight(){
  const sel=document.getElementById('fuelType');
  const inp=document.getElementById('fuelWeight');
  if(sel.value==='custom'){inp.removeAttribute('readonly');inp.focus();}
  else{inp.value=sel.value;inp.setAttribute('readonly','');}
}

function addLeg(){
  legCount++;
  const div=document.createElement('div');
  div.className='leg';
  div.id='leg-'+legCount;
  div.innerHTML=`
    <div class="leg-header">
      <h3>Leg ${legCount}</h3>
      <button class="remove-leg" onclick="removeLeg(${legCount})" title="Remove leg">&times;</button>
    </div>
    <div class="form-row">
      <div>
        <label>Leg Name (optional)</label>
        <input type="text" class="leg-name" placeholder="e.g. KJFK - KBOS">
      </div>
      <div>
        <label>Burn Rate</label>
        <input type="number" class="leg-burn" min="0" step="0.1" placeholder="e.g. 12.5">
      </div>
      <div>
        <label>Flight Time (min)</label>
        <input type="number" class="leg-time" min="0" step="1" placeholder="e.g. 90">
      </div>
    </div>`;
  document.getElementById('legs').appendChild(div);
}

function removeLeg(id){
  const el=document.getElementById('leg-'+id);
  if(el)el.remove();
  renumberLegs();
}

function renumberLegs(){
  const legs=document.querySelectorAll('#legs .leg');
  legs.forEach((l,i)=>{
    l.querySelector('h3').textContent='Leg '+(i+1);
  });
}

function getFuelWeightPerGal(){return parseFloat(document.getElementById('fuelWeight').value)||6.7;}

function calculate(){
  const fuelWt=getFuelWeightPerGal();
  const unit=document.getElementById('fuelUnit').value;
  const taxiGal=parseFloat(document.getElementById('taxiFuel').value)||0;
  const climbGal=parseFloat(document.getElementById('climbFuel').value)||0;
  const reserveMin=parseFloat(document.getElementById('reserveMin').value)||0;

  const legs=document.querySelectorAll('#legs .leg');
  if(legs.length===0){alert('Add at least one flight leg.');return;}

  let rows=[];
  let totalCruiseGal=0, totalCruiseMin=0;
  let avgBurnRate=0;

  // Taxi
  rows.push({phase:'Taxi',time:'--',gal:taxiGal,lbs:taxiGal*fuelWt});

  // Climb
  if(climbGal>0)rows.push({phase:'Climb',time:'--',gal:climbGal,lbs:climbGal*fuelWt});

  legs.forEach((leg,i)=>{
    const name=leg.querySelector('.leg-name').value||('Leg '+(i+1));
    let burnRate=parseFloat(leg.querySelector('.leg-burn').value)||0;
    const timeMin=parseFloat(leg.querySelector('.leg-time').value)||0;
    // Convert PPH to GPH if needed
    if(unit==='pph')burnRate=burnRate/fuelWt;
    const gal=burnRate*(timeMin/60);
    totalCruiseGal+=gal;
    totalCruiseMin+=timeMin;
    avgBurnRate+=burnRate;
    const hrs=Math.floor(timeMin/60);
    const min=Math.round(timeMin%60);
    rows.push({phase:name,time:`${hrs}h ${min}m`,gal:gal,lbs:gal*fuelWt});
  });

  if(legs.length>0)avgBurnRate/=legs.length;

  // Reserve
  const reserveGal=avgBurnRate*(reserveMin/60);
  const rHrs=Math.floor(reserveMin/60);
  const rMin=Math.round(reserveMin%60);
  rows.push({phase:'Reserve',time:`${rHrs}h ${rMin}m`,gal:reserveGal,lbs:reserveGal*fuelWt});

  // Totals
  const totalGal=taxiGal+climbGal+totalCruiseGal+reserveGal;
  const totalLbs=totalGal*fuelWt;
  const totalMin=totalCruiseMin+reserveMin;

  // Render summary
  document.getElementById('summaryGrid').innerHTML=`
    <div class="summary-item"><div class="value">${totalGal.toFixed(1)}</div><div class="label">Total Fuel (gal)</div></div>
    <div class="summary-item"><div class="value">${totalLbs.toFixed(1)}</div><div class="label">Total Fuel (lbs)</div></div>
    <div class="summary-item"><div class="value">${avgBurnRate.toFixed(1)}</div><div class="label">Avg Burn (GPH)</div></div>
    <div class="summary-item ${reserveMin<30?'warn':''}"><div class="value">${reserveMin}</div><div class="label">Reserve (min)</div></div>`;

  // Render table
  let tbody='';
  rows.forEach(r=>{
    tbody+=`<tr><td>${r.phase}</td><td>${r.time}</td><td>${r.gal.toFixed(1)}</td><td>${r.lbs.toFixed(1)}</td></tr>`;
  });
  tbody+=`<tr class="total-row"><td>TOTAL</td><td>${Math.floor(totalMin/60)}h ${Math.round(totalMin%60)}m</td><td>${totalGal.toFixed(1)}</td><td>${totalLbs.toFixed(1)}</td></tr>`;
  document.getElementById('resultsBody').innerHTML=tbody;
  document.getElementById('results').classList.remove('hidden');
}

function copyToClipboard(){
  const rows=document.querySelectorAll('#resultsTable tr');
  let text='KORB ENGINEERING - FUEL BURN CALCULATION\n';
  text+='==========================================\n';
  rows.forEach(r=>{
    const cells=r.querySelectorAll('th,td');
    text+=Array.from(cells).map(c=>c.textContent.padEnd(20)).join('')+'\n';
  });
  text+='\nFuel Weight: '+getFuelWeightPerGal()+' lbs/gal\n';
  navigator.clipboard.writeText(text).then(()=>{
    const btn=document.querySelector('[onclick="copyToClipboard()"]');
    btn.textContent='Copied!';
    setTimeout(()=>btn.textContent='Copy to Clipboard',2000);
  });
}

function resetAll(){
  document.getElementById('legs').innerHTML='';
  document.getElementById('results').classList.add('hidden');
  legCount=0;
  document.getElementById('taxiFuel').value='1.5';
  document.getElementById('climbFuel').value='';
  document.getElementById('reserveMin').value='45';
}

// Initialize with one leg
updateFuelWeight();
addLeg();
</script>
</body>
</html>
