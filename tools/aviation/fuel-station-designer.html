<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Fuel Station Designer | Korb Engineering</title>
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{--bg:#050a0f;--bg1:#0a1018;--bg2:#0f1620;--bg3:#141c28;--border:#1a2535;--accent:#00d4ff;--accentDim:rgba(0,212,255,0.15);--green:#10b981;--red:#ef4444;--yellow:#f59e0b;--text:#e2e8f0;--textDim:rgba(226,232,240,0.45);--font:'JetBrains Mono',monospace}
body{background:var(--bg);color:var(--text);font-family:var(--font);font-size:13px;line-height:1.5;min-height:100vh}
::selection{background:var(--accent);color:var(--bg)}
::-webkit-scrollbar{width:6px}::-webkit-scrollbar-track{background:var(--bg)}::-webkit-scrollbar-thumb{background:var(--border);border-radius:3px}

.app{max-width:1200px;margin:0 auto;padding:16px}
.header{display:flex;align-items:center;justify-content:space-between;padding:16px 0;border-bottom:1px solid var(--border);margin-bottom:20px;flex-wrap:wrap;gap:12px}
.header h1{font-size:18px;font-weight:600;color:var(--accent);letter-spacing:1px}
.header h1 span{color:var(--textDim);font-weight:300}

.tabs{display:flex;gap:4px;margin-bottom:16px;flex-wrap:wrap}
.tab{padding:6px 14px;border:1px solid var(--border);background:transparent;color:var(--textDim);font-family:var(--font);font-size:11px;cursor:pointer;border-radius:4px;transition:all .2s}
.tab:hover{border-color:var(--accent);color:var(--text)}
.tab.active{background:var(--accentDim);border-color:var(--accent);color:var(--accent)}

.panel{border:1px solid var(--border);border-radius:6px;background:var(--bg1);padding:20px;margin-bottom:16px}
.panel h2{font-size:14px;font-weight:600;color:var(--accent);margin-bottom:16px}
.panel h3{font-size:12px;font-weight:500;color:var(--text);margin:16px 0 8px}

.step-indicator{display:flex;gap:4px;margin-bottom:20px;flex-wrap:wrap}
.step-dot{width:32px;height:4px;border-radius:2px;background:var(--border);transition:all .3s}
.step-dot.done{background:var(--accent)}
.step-dot.current{background:var(--accent);box-shadow:0 0 8px rgba(0,212,255,0.5)}

.option-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(240px,1fr));gap:10px}
.option-card{padding:12px;border:1px solid var(--border);border-radius:6px;cursor:pointer;transition:all .2s;background:var(--bg2)}
.option-card:hover{border-color:var(--accent)}
.option-card.selected{border-color:var(--accent);background:var(--accentDim)}
.option-card .title{font-size:12px;font-weight:600;color:var(--text)}
.option-card .desc{font-size:10px;color:var(--textDim);margin-top:2px}

.form-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px}
@media(max-width:600px){.form-grid{grid-template-columns:1fr}}
.form-group{display:flex;flex-direction:column;gap:4px}
.form-group label{font-size:16px;color:var(--textDim);text-transform:uppercase;letter-spacing:0.5px}

.input{background:var(--bg);border:1px solid var(--border);color:var(--text);font-family:var(--font);font-size:16px;padding:8px 10px;border-radius:4px;outline:none;width:100%}
.input:focus{border-color:var(--accent)}
select.input{cursor:pointer}

.btn{padding:8px 16px;border:1px solid var(--border);background:transparent;color:var(--text);font-family:var(--font);font-size:11px;cursor:pointer;border-radius:4px;transition:all .2s}
.btn:hover{border-color:var(--accent);color:var(--accent)}
.btn-accent{background:var(--accentDim);border-color:var(--accent);color:var(--accent)}
.btn-accent:hover{background:rgba(0,212,255,0.25)}
.btn-sm{padding:4px 10px;font-size:10px}

.toggle{display:flex;align-items:center;gap:8px;cursor:pointer;padding:6px 0}
.toggle-track{width:36px;height:18px;border-radius:9px;background:var(--border);position:relative;transition:all .2s}
.toggle-track.on{background:var(--accent)}
.toggle-track::after{content:'';position:absolute;width:14px;height:14px;border-radius:50%;background:var(--text);top:2px;left:2px;transition:all .2s}
.toggle-track.on::after{left:20px}

.compliance-chip{display:inline-block;padding:4px 10px;margin:3px;border:1px solid var(--border);border-radius:4px;font-size:10px;cursor:pointer;transition:all .2s}
.compliance-chip:hover{border-color:var(--accent)}
.compliance-chip.active{background:var(--accentDim);border-color:var(--accent);color:var(--accent)}

.cost-row{display:flex;justify-content:space-between;padding:6px 0;border-bottom:1px solid rgba(26,37,53,0.5);font-size:11px}
.cost-row .label{color:var(--textDim)}
.cost-row .value{color:var(--accent);font-weight:500}
.cost-total{display:flex;justify-content:space-between;padding:10px 0;font-size:14px;font-weight:700;border-top:2px solid var(--accent);margin-top:8px}

.stat-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(160px,1fr));gap:8px;margin-bottom:16px}
.stat{padding:10px;border:1px solid var(--border);border-radius:6px;background:var(--bg2)}
.stat .label{font-size:9px;color:var(--textDim);text-transform:uppercase}
.stat .value{font-size:16px;font-weight:600;color:var(--accent);margin-top:2px}

.nav-row{display:flex;justify-content:space-between;margin-top:20px;gap:8px}

.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,0.7);z-index:100;display:flex;align-items:center;justify-content:center;padding:16px}
.modal{background:var(--bg1);border:1px solid var(--border);border-radius:8px;padding:20px;max-width:500px;width:100%;max-height:90vh;overflow:auto}

.korb-badge{position:fixed;bottom:10px;right:10px;font-size:10px;color:#00d4ff;opacity:0.5;font-family:'JetBrains Mono',monospace;pointer-events:none;z-index:9999}
</style>
</head>
<body>
<div class="app" id="app"></div>
<div class="korb-badge">Korb Engineering</div>
<script>
(function(){
const LS_KEY='korb_fuel_station';

const FACILITY_TYPES=[
{id:'self-service',label:'Self-Service Fueling',desc:'Credit card reader, unattended operation'},
{id:'full-service',label:'Full-Service',desc:'Attended, fueling by line crew'},
{id:'combined',label:'Combined Self/Full-Service',desc:'Dual-mode facility'},
{id:'emergency',label:'Emergency/Auxiliary Fuel Point',desc:'Backup or remote fueling station'}];

const FUEL_TYPES=[
{id:'jet-a',label:'Jet A',desc:'Turbine fuel (kerosene-type)'},
{id:'100ll',label:'100LL',desc:'Aviation gasoline, low-lead'},
{id:'dual',label:'Jet A + 100LL',desc:'Dual product facility'},
{id:'saf',label:'SAF Blend',desc:'ASTM D7566 compliant blend'}];

const TANK_CAPS=[1000,2000,5000,10000,15000,20000,50000];
const TANK_MATS=['Carbon Steel','Stainless Steel','Fiberglass'];
const FLOW_RATES=['15 GPM','25 GPM','50 GPM','100+ GPM'];
const HOSE_LENGTHS=['25 ft','50 ft','75 ft','100 ft'];
const PIPING_MATS=['Carbon Steel','Stainless Steel','Fiberglass'];
const CONTAIN_TYPES=['Concrete Dike','Steel Pan','Flexible Membrane'];
const FIRE_SUP=['Foam System','Dry Chemical','None (per local code)'];
const EXT_TYPES=['ABC Dry Chemical - 20 lb','ABC Dry Chemical - 10 lb','Purple K - 20 lb','CO2 - 15 lb'];

const STANDARDS=[
{id:'nfpa30',label:'NFPA 30',desc:'Flammable and Combustible Liquids Code'},
{id:'nfpa30a',label:'NFPA 30A',desc:'Motor Fuel Dispensing Facilities'},
{id:'nfpa407',label:'NFPA 407',desc:'Aircraft Fuel Servicing'},
{id:'api650',label:'API 650',desc:'Welded Tanks for Oil Storage'},
{id:'ul142',label:'UL 142',desc:'Steel Aboveground Tanks'},
{id:'ul2085',label:'UL 2085',desc:'Protected Aboveground Tanks'},
{id:'sti-sp001',label:'STI SP001',desc:'Inspection of Aboveground Storage Tanks'},
{id:'ei1540',label:'EI 1540',desc:'Aviation Fuelling Facilities'},
{id:'ei1581',label:'EI 1581',desc:'Aviation Fuel Filter Separators'},
{id:'ac150',label:'AC 150/5230-4C',desc:'Aircraft Fuel Storage (FAA)'},
{id:'40cfr280',label:'40 CFR 280',desc:'UST Standards (EPA)'}];

const COSTS={
tanks:{1000:[8000,14000],2000:[12000,20000],5000:[18000,30000],10000:[25000,40000],15000:[35000,55000],20000:[42000,65000],50000:[85000,130000]},
dispSelf:[15000,25000],dispFull:[25000,45000],dispEmerg:[8000,18000],
filter:[3000,8000],clay:[2000,5000],cardReader:[8000,15000],
pipingPerLF:[50,150],pipingLF:200,electrical:[20000,50000],siteWork:[30000,75000],
overfill:[2500,5000],tankGauge:[8000,15000],spillKit:[500,1500],
oilWaterSep:[5000,15000],monWells:[3000,8000],bollards:[2000,6000],
fencing:[8000,20000],cameras:[3000,10000],fireSup:[5000,15000],
lightning:[3000,8000],eStop:[800,1500]};

const DEFAULT_CFG={
facilityType:'',fuelType:'',tankType:'AST',tankCapacity:10000,tankCount:1,
doubleWall:true,tankMaterial:'Carbon Steel',dispenserType:'Cabinet',
flowRate:'25 GPM',hoseLength:'50 ft',nozzleType:'Overwing',
pipingMaterial:'Carbon Steel',containmentType:'Concrete Dike',
leakDetection:'Electronic',fireSuppression:'Foam System',
paymentSystem:'Credit Card',eStopCount:2,lightningProtection:true,
spillKit:true,oilWaterSeparator:true,monitoringWells:false,
spccRequired:true,fireExtType:'ABC Dry Chemical - 20 lb',fireExtQty:4,
bollardProtection:true,securityFencing:true,securityCameras:true,
securityCardAccess:true,complianceStandards:['nfpa30','nfpa407','ei1581','ac150']};

let cfg={...DEFAULT_CFG};
let step=1;
let activeTab='config';
let savedConfigs=[];
let showSave=false;
let showLoad=false;
let saveName='';
const TOTAL_STEPS=8;

function loadSaved(){try{const r=localStorage.getItem(LS_KEY);if(r)savedConfigs=JSON.parse(r);}catch(e){}}
function persistSaved(){localStorage.setItem(LS_KEY,JSON.stringify(savedConfigs));}

const fmt=n=>'$'+n.toLocaleString();
const fmtRange=([lo,hi])=>fmt(lo)+' - '+fmt(hi);
const mid=([lo,hi])=>(lo+hi)/2;

function getCosts(){
const items=[];
const tc=COSTS.tanks[cfg.tankCapacity]||[25000,40000];
items.push({label:`${cfg.tankCount}x ${cfg.tankCapacity.toLocaleString()} gal ${cfg.tankType} Tank(s)`,range:[tc[0]*cfg.tankCount,tc[1]*cfg.tankCount]});
if(cfg.facilityType==='self-service'||cfg.facilityType==='combined')items.push({label:'Self-Service Dispenser',range:COSTS.dispSelf});
if(cfg.facilityType==='full-service'||cfg.facilityType==='combined')items.push({label:'Full-Service Dispenser',range:COSTS.dispFull});
if(cfg.facilityType==='emergency')items.push({label:'Emergency Dispenser',range:COSTS.dispEmerg});
items.push({label:'Filter/Separator',range:COSTS.filter});
items.push({label:'Clay Treater',range:COSTS.clay});
items.push({label:'Overfill Protection',range:COSTS.overfill});
items.push({label:'Tank Gauging System',range:COSTS.tankGauge});
if(cfg.facilityType!=='emergency')items.push({label:'Payment System',range:COSTS.cardReader});
const piping=[COSTS.pipingPerLF[0]*COSTS.pipingLF,COSTS.pipingPerLF[1]*COSTS.pipingLF];
items.push({label:`Piping (~${COSTS.pipingLF} LF)`,range:piping});
items.push({label:'Electrical/Controls',range:COSTS.electrical});
items.push({label:'Site Work/Foundation',range:COSTS.siteWork});
if(cfg.spillKit)items.push({label:'Spill Response Kit',range:COSTS.spillKit});
if(cfg.oilWaterSeparator)items.push({label:'Oil/Water Separator',range:COSTS.oilWaterSep});
if(cfg.monitoringWells)items.push({label:'Monitoring Wells',range:COSTS.monWells});
if(cfg.bollardProtection)items.push({label:'Bollard Protection',range:COSTS.bollards});
if(cfg.securityFencing)items.push({label:'Security Fencing',range:COSTS.fencing});
if(cfg.securityCameras)items.push({label:'Security Cameras',range:COSTS.cameras});
if(cfg.fireSuppression!=='None (per local code)')items.push({label:'Fire Suppression',range:COSTS.fireSup});
if(cfg.lightningProtection)items.push({label:'Lightning Protection',range:COSTS.lightning});
items.push({label:`E-Stop Stations (${cfg.eStopCount})`,range:[COSTS.eStop[0]*cfg.eStopCount,COSTS.eStop[1]*cfg.eStopCount]});
const lo=items.reduce((s,i)=>s+i.range[0],0);
const hi=items.reduce((s,i)=>s+i.range[1],0);
return{items,total:[lo,hi]};
}

function render(){
const app=document.getElementById('app');
app.innerHTML=`
<div class="header">
  <h1>FUEL STATION DESIGNER <span>// Aviation Fueling</span></h1>
  <div style="display:flex;gap:8px;flex-wrap:wrap">
    <button class="btn" onclick="doSave()">Save Config</button>
    <button class="btn" onclick="doLoad()">Load Config</button>
    <button class="btn" onclick="doReset()">Reset</button>
  </div>
</div>
<div class="tabs">
  ${['config','summary','costs'].map(t=>`<button class="tab ${activeTab===t?'active':''}" onclick="setTab('${t}')">${t==='config'?'Configuration':t==='summary'?'Summary':'Cost Estimate'}</button>`).join('')}
</div>
<div id="content">${activeTab==='config'?renderConfig():activeTab==='summary'?renderSummary():renderCosts()}</div>
${showSave?renderSaveModal():''}${showLoad?renderLoadModal():''}`;
}

function renderConfig(){
return `<div class="panel">
<div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:12px">
  <h2>Step ${step} of ${TOTAL_STEPS}</h2>
  <span style="font-size:10px;color:var(--textDim)">${getStepName()}</span>
</div>
<div class="step-indicator">${Array.from({length:TOTAL_STEPS},(_,i)=>`<div class="step-dot ${i+1<step?'done':i+1===step?'current':''}"></div>`).join('')}</div>
${renderStep()}
<div class="nav-row">
  <button class="btn" ${step<=1?'disabled style="opacity:0.3"':''} onclick="prevStep()">Previous</button>
  ${step<TOTAL_STEPS?`<button class="btn btn-accent" onclick="nextStep()">Next Step</button>`:`<button class="btn btn-accent" onclick="setTab('summary')">View Summary</button>`}
</div>
</div>`;
}

function getStepName(){return['Facility Type','Fuel Type','Tank Configuration','Dispensing','Piping & Containment','Fire Safety','Environmental','Compliance'][step-1]||'';}

function renderStep(){
switch(step){
case 1:return `<h3>Select Facility Type</h3><div class="option-grid">${FACILITY_TYPES.map(f=>`
<div class="option-card ${cfg.facilityType===f.id?'selected':''}" onclick="set('facilityType','${f.id}')">
<div class="title">${f.label}</div><div class="desc">${f.desc}</div></div>`).join('')}</div>`;

case 2:return `<h3>Select Fuel Type</h3><div class="option-grid">${FUEL_TYPES.map(f=>`
<div class="option-card ${cfg.fuelType===f.id?'selected':''}" onclick="set('fuelType','${f.id}')">
<div class="title">${f.label}</div><div class="desc">${f.desc}</div></div>`).join('')}</div>`;

case 3:return `<h3>Tank Configuration</h3><div class="form-grid">
<div class="form-group"><label>Tank Type</label><div style="display:flex;gap:8px">
${['AST','UST'].map(t=>`<button class="btn btn-sm ${cfg.tankType===t?'btn-accent':''}" onclick="set('tankType','${t}')">${t}</button>`).join('')}</div></div>
<div class="form-group"><label>Capacity (gal)</label><select class="input" onchange="set('tankCapacity',+this.value)">
${TANK_CAPS.map(c=>`<option value="${c}" ${cfg.tankCapacity===c?'selected':''}>${c.toLocaleString()}</option>`).join('')}</select></div>
<div class="form-group"><label>Tank Count</label><input class="input" type="number" min="1" max="10" value="${cfg.tankCount}" onchange="set('tankCount',+this.value)"></div>
<div class="form-group"><label>Material</label><select class="input" onchange="set('tankMaterial',this.value)">
${TANK_MATS.map(m=>`<option ${cfg.tankMaterial===m?'selected':''}>${m}</option>`).join('')}</select></div>
<div class="form-group"><label>Double-Wall</label><div class="toggle" onclick="toggle('doubleWall')"><div class="toggle-track ${cfg.doubleWall?'on':''}"></div><span style="font-size:11px">${cfg.doubleWall?'Yes':'No'}</span></div></div>
</div>`;

case 4:return `<h3>Dispensing Configuration</h3><div class="form-grid">
<div class="form-group"><label>Flow Rate</label><select class="input" onchange="set('flowRate',this.value)">
${FLOW_RATES.map(f=>`<option ${cfg.flowRate===f?'selected':''}>${f}</option>`).join('')}</select></div>
<div class="form-group"><label>Hose Length</label><select class="input" onchange="set('hoseLength',this.value)">
${HOSE_LENGTHS.map(h=>`<option ${cfg.hoseLength===h?'selected':''}>${h}</option>`).join('')}</select></div>
<div class="form-group"><label>Nozzle Type</label><div style="display:flex;gap:8px">
${['Overwing','Underwing','Both'].map(t=>`<button class="btn btn-sm ${cfg.nozzleType===t?'btn-accent':''}" onclick="set('nozzleType','${t}')">${t}</button>`).join('')}</div></div>
<div class="form-group"><label>Payment System</label><div style="display:flex;gap:8px;flex-wrap:wrap">
${['Credit Card','Account','Both','None'].map(t=>`<button class="btn btn-sm ${cfg.paymentSystem===t?'btn-accent':''}" onclick="set('paymentSystem','${t}')">${t}</button>`).join('')}</div></div>
</div>`;

case 5:return `<h3>Piping &amp; Containment</h3><div class="form-grid">
<div class="form-group"><label>Piping Material</label><select class="input" onchange="set('pipingMaterial',this.value)">
${PIPING_MATS.map(m=>`<option ${cfg.pipingMaterial===m?'selected':''}>${m}</option>`).join('')}</select></div>
<div class="form-group"><label>Containment Type</label><select class="input" onchange="set('containmentType',this.value)">
${CONTAIN_TYPES.map(c=>`<option ${cfg.containmentType===c?'selected':''}>${c}</option>`).join('')}</select></div>
<div class="form-group"><label>Leak Detection</label><div style="display:flex;gap:8px">
${['Electronic','Manual','Both'].map(t=>`<button class="btn btn-sm ${cfg.leakDetection===t?'btn-accent':''}" onclick="set('leakDetection','${t}')">${t}</button>`).join('')}</div></div>
</div>`;

case 6:return `<h3>Fire Safety</h3><div class="form-grid">
<div class="form-group"><label>Fire Suppression</label><select class="input" onchange="set('fireSuppression',this.value)">
${FIRE_SUP.map(f=>`<option ${cfg.fireSuppression===f?'selected':''}>${f}</option>`).join('')}</select></div>
<div class="form-group"><label>Fire Extinguisher Type</label><select class="input" onchange="set('fireExtType',this.value)">
${EXT_TYPES.map(e=>`<option ${cfg.fireExtType===e?'selected':''}>${e}</option>`).join('')}</select></div>
<div class="form-group"><label>Extinguisher Qty</label><input class="input" type="number" min="1" max="20" value="${cfg.fireExtQty}" onchange="set('fireExtQty',+this.value)"></div>
<div class="form-group"><label>E-Stop Stations</label><input class="input" type="number" min="1" max="10" value="${cfg.eStopCount}" onchange="set('eStopCount',+this.value)"></div>
<div class="form-group"><label>Lightning Protection</label><div class="toggle" onclick="toggle('lightningProtection')"><div class="toggle-track ${cfg.lightningProtection?'on':''}"></div><span style="font-size:11px">${cfg.lightningProtection?'Yes':'No'}</span></div></div>
</div>`;

case 7:return `<h3>Environmental &amp; Security</h3><div class="form-grid">
<div class="form-group"><label>Spill Response Kit</label><div class="toggle" onclick="toggle('spillKit')"><div class="toggle-track ${cfg.spillKit?'on':''}"></div><span style="font-size:11px">${cfg.spillKit?'Yes':'No'}</span></div></div>
<div class="form-group"><label>Oil/Water Separator</label><div class="toggle" onclick="toggle('oilWaterSeparator')"><div class="toggle-track ${cfg.oilWaterSeparator?'on':''}"></div><span style="font-size:11px">${cfg.oilWaterSeparator?'Yes':'No'}</span></div></div>
<div class="form-group"><label>Monitoring Wells</label><div class="toggle" onclick="toggle('monitoringWells')"><div class="toggle-track ${cfg.monitoringWells?'on':''}"></div><span style="font-size:11px">${cfg.monitoringWells?'Yes':'No'}</span></div></div>
<div class="form-group"><label>SPCC Plan Required</label><div class="toggle" onclick="toggle('spccRequired')"><div class="toggle-track ${cfg.spccRequired?'on':''}"></div><span style="font-size:11px">${cfg.spccRequired?'Yes':'No'}</span></div></div>
<div class="form-group"><label>Bollard Protection</label><div class="toggle" onclick="toggle('bollardProtection')"><div class="toggle-track ${cfg.bollardProtection?'on':''}"></div><span style="font-size:11px">${cfg.bollardProtection?'Yes':'No'}</span></div></div>
<div class="form-group"><label>Security Fencing</label><div class="toggle" onclick="toggle('securityFencing')"><div class="toggle-track ${cfg.securityFencing?'on':''}"></div><span style="font-size:11px">${cfg.securityFencing?'Yes':'No'}</span></div></div>
<div class="form-group"><label>Security Cameras</label><div class="toggle" onclick="toggle('securityCameras')"><div class="toggle-track ${cfg.securityCameras?'on':''}"></div><span style="font-size:11px">${cfg.securityCameras?'Yes':'No'}</span></div></div>
<div class="form-group"><label>Card Access</label><div class="toggle" onclick="toggle('securityCardAccess')"><div class="toggle-track ${cfg.securityCardAccess?'on':''}"></div><span style="font-size:11px">${cfg.securityCardAccess?'Yes':'No'}</span></div></div>
</div>`;

case 8:return `<h3>Compliance Standards</h3><div style="margin-top:8px">${STANDARDS.map(s=>`
<div class="compliance-chip ${cfg.complianceStandards.includes(s.id)?'active':''}" onclick="toggleStd('${s.id}')">
<strong>${s.label}</strong> - ${s.desc}</div>`).join('')}
</div><div style="margin-top:12px;font-size:10px;color:var(--textDim)">${cfg.complianceStandards.length} standard(s) selected</div>`;
}
return '';
}

function renderSummary(){
const ft=FACILITY_TYPES.find(f=>f.id===cfg.facilityType);
const fu=FUEL_TYPES.find(f=>f.id===cfg.fuelType);
const totalGal=cfg.tankCapacity*cfg.tankCount;
return `<div class="panel">
<h2>Design Summary</h2>
<div class="stat-grid">
  <div class="stat"><div class="label">Facility Type</div><div class="value" style="font-size:12px">${ft?ft.label:'Not set'}</div></div>
  <div class="stat"><div class="label">Fuel Type</div><div class="value" style="font-size:12px">${fu?fu.label:'Not set'}</div></div>
  <div class="stat"><div class="label">Storage</div><div class="value">${totalGal.toLocaleString()} gal</div></div>
  <div class="stat"><div class="label">Tank Type</div><div class="value">${cfg.tankType}</div></div>
  <div class="stat"><div class="label">Flow Rate</div><div class="value" style="font-size:12px">${cfg.flowRate}</div></div>
  <div class="stat"><div class="label">Standards</div><div class="value">${cfg.complianceStandards.length}</div></div>
</div>
<h3>Tank Specifications</h3>
<div style="display:grid;grid-template-columns:1fr 1fr;gap:8px;font-size:11px;margin-top:8px">
  <div>Count: <strong>${cfg.tankCount}</strong></div>
  <div>Capacity: <strong>${cfg.tankCapacity.toLocaleString()} gal each</strong></div>
  <div>Material: <strong>${cfg.tankMaterial}</strong></div>
  <div>Double-Wall: <strong>${cfg.doubleWall?'Yes':'No'}</strong></div>
  <div>Type: <strong>${cfg.tankType}</strong></div>
  <div>Total: <strong>${totalGal.toLocaleString()} gal</strong></div>
</div>
<h3>Dispensing</h3>
<div style="display:grid;grid-template-columns:1fr 1fr;gap:8px;font-size:11px;margin-top:8px">
  <div>Flow Rate: <strong>${cfg.flowRate}</strong></div>
  <div>Hose: <strong>${cfg.hoseLength}</strong></div>
  <div>Nozzle: <strong>${cfg.nozzleType}</strong></div>
  <div>Payment: <strong>${cfg.paymentSystem}</strong></div>
</div>
<h3>Safety &amp; Environmental</h3>
<div style="display:grid;grid-template-columns:1fr 1fr;gap:8px;font-size:11px;margin-top:8px">
  <div>Fire Suppression: <strong>${cfg.fireSuppression}</strong></div>
  <div>Extinguishers: <strong>${cfg.fireExtQty}x ${cfg.fireExtType}</strong></div>
  <div>E-Stops: <strong>${cfg.eStopCount}</strong></div>
  <div>Containment: <strong>${cfg.containmentType}</strong></div>
  <div>Leak Detection: <strong>${cfg.leakDetection}</strong></div>
  <div>Lightning: <strong>${cfg.lightningProtection?'Yes':'No'}</strong></div>
  <div>Spill Kit: <strong>${cfg.spillKit?'Yes':'No'}</strong></div>
  <div>Oil/Water Sep: <strong>${cfg.oilWaterSeparator?'Yes':'No'}</strong></div>
  <div>SPCC Required: <strong>${cfg.spccRequired?'Yes':'No'}</strong></div>
</div>
<h3>Compliance Standards</h3>
<div style="margin-top:8px">${cfg.complianceStandards.map(id=>{const s=STANDARDS.find(x=>x.id===id);return s?`<span class="compliance-chip active">${s.label}</span>`:''}).join('')}</div>
</div>`;
}

function renderCosts(){
const c=getCosts();
return `<div class="panel">
<h2>Cost Estimate</h2>
<div style="font-size:10px;color:var(--textDim);margin-bottom:16px">Ranges based on typical 2024-2025 material and labor costs. Actual costs will vary by location, soil conditions, and local requirements.</div>
${c.items.map(i=>`<div class="cost-row"><span class="label">${i.label}</span><span class="value">${fmtRange(i.range)}</span></div>`).join('')}
<div class="cost-total"><span>ESTIMATED TOTAL</span><span style="color:var(--accent)">${fmtRange(c.total)}</span></div>
<div style="margin-top:16px;padding:12px;border:1px solid var(--border);border-radius:6px;background:var(--bg2)">
  <div style="font-size:10px;color:var(--textDim);margin-bottom:4px">MIDPOINT ESTIMATE</div>
  <div style="font-size:24px;font-weight:700;color:var(--accent)">${fmt(mid(c.total))}</div>
</div>
<div style="margin-top:12px;font-size:9px;color:var(--textDim)">Note: Does not include design/engineering fees, permitting, or contingency. Add 15-20% for engineering and 10-15% contingency.</div>
</div>`;
}

function renderSaveModal(){
return `<div class="modal-overlay" onclick="if(event.target===this){showSave=false;render()}">
<div class="modal"><h2 style="color:var(--accent)">Save Configuration</h2>
<div class="form-group" style="margin:12px 0"><label>Configuration Name</label><input class="input" id="saveNameInput" placeholder="e.g. BCT Self-Service Jet A" value="${saveName}"></div>
<div style="display:flex;gap:8px;justify-content:flex-end"><button class="btn" onclick="showSave=false;render()">Cancel</button><button class="btn btn-accent" onclick="saveConfig()">Save</button></div>
</div></div>`;
}

function renderLoadModal(){
return `<div class="modal-overlay" onclick="if(event.target===this){showLoad=false;render()}">
<div class="modal"><h2 style="color:var(--accent)">Load Configuration</h2>
${savedConfigs.length?savedConfigs.map((c,i)=>`
<div style="display:flex;justify-content:space-between;align-items:center;padding:8px;border:1px solid var(--border);border-radius:4px;margin:6px 0;background:var(--bg2)">
<div><div style="font-size:12px;font-weight:500">${c.name}</div><div style="font-size:9px;color:var(--textDim)">${new Date(c.date).toLocaleDateString()}</div></div>
<div style="display:flex;gap:6px"><button class="btn btn-sm btn-accent" onclick="loadCfg(${i})">Load</button><button class="btn btn-sm" onclick="deleteCfg(${i})">Delete</button></div>
</div>`).join(''):'<div style="color:var(--textDim);text-align:center;padding:20px">No saved configurations</div>'}
<div style="display:flex;justify-content:flex-end;margin-top:12px"><button class="btn" onclick="showLoad=false;render()">Close</button></div>
</div></div>`;
}

window.set=function(k,v){cfg[k]=v;render();};
window.toggle=function(k){cfg[k]=!cfg[k];render();};
window.toggleStd=function(id){const i=cfg.complianceStandards.indexOf(id);if(i>=0)cfg.complianceStandards.splice(i,1);else cfg.complianceStandards.push(id);render();};
window.nextStep=function(){if(step<TOTAL_STEPS)step++;render();};
window.prevStep=function(){if(step>1)step--;render();};
window.setTab=function(t){activeTab=t;render();};
window.doSave=function(){showSave=true;render();};
window.doLoad=function(){showLoad=true;render();};
window.saveConfig=function(){
const n=(document.getElementById('saveNameInput')||{}).value||'';
if(!n.trim())return;
savedConfigs=savedConfigs.filter(c=>c.name!==n.trim());
savedConfigs.push({name:n.trim(),config:{...cfg},date:new Date().toISOString()});
persistSaved();showSave=false;render();};
window.loadCfg=function(i){cfg={...DEFAULT_CFG,...savedConfigs[i].config};showLoad=false;render();};
window.deleteCfg=function(i){savedConfigs.splice(i,1);persistSaved();render();};
window.doReset=function(){if(confirm('Reset all configuration to defaults?')){cfg={...DEFAULT_CFG};step=1;render();}};

loadSaved();render();
})();
</script>
</body>
</html>
