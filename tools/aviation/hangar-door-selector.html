<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Hangar Door Selector — Korb Engineering</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;600;700&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
:root{
  --bg:#000;--bg2:#050a0f;--cyan:#00d4ff;--orange:#ff6600;
  --text:#e0e0e0;--muted:#888;--card:#0a1628;--border:#1a3a5c;
  --font-mono:'JetBrains Mono',monospace;--font-body:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;
}
html{font-size:16px;}
body{background:var(--bg);color:var(--text);font-family:var(--font-body);
  min-height:100vh;min-height:100dvh;display:flex;flex-direction:column;
  -webkit-tap-highlight-color:transparent;overflow-x:hidden;}
h1,h2,h3,h4,label,.mono{font-family:var(--font-mono);}

/* Header */
.header{text-align:center;padding:14px 12px 8px;border-bottom:1px solid var(--border);background:var(--bg2);}
.header h1{font-size:.7rem;letter-spacing:4px;color:var(--cyan);text-transform:uppercase;margin-bottom:2px;}
.header h2{font-size:.62rem;letter-spacing:2px;color:var(--muted);text-transform:uppercase;}

/* Main */
.main{flex:1;overflow-y:auto;overflow-x:hidden;padding:0 0 72px;-webkit-overflow-scrolling:touch;}
.tab-content{display:none;padding:12px;}
.tab-content.active{display:block;}

/* Bottom nav */
.bottom-nav{position:fixed;bottom:0;left:0;right:0;display:flex;background:#060e18;
  border-top:1px solid var(--border);z-index:100;}
.nav-btn{flex:1;min-height:56px;display:flex;flex-direction:column;align-items:center;
  justify-content:center;background:none;border:none;color:var(--muted);
  font-family:var(--font-mono);font-size:.55rem;letter-spacing:1px;cursor:pointer;
  padding:6px 2px;transition:color .2s,background .2s;-webkit-user-select:none;user-select:none;}
.nav-btn .icon{font-size:1.3rem;margin-bottom:2px;}
.nav-btn.active{color:var(--cyan);background:rgba(0,212,255,.06);}
.nav-btn:active{background:rgba(0,212,255,.12);}

/* Cards */
.card{background:var(--card);border:1px solid var(--border);border-radius:8px;padding:14px;margin-bottom:10px;}
.card:active{border-color:var(--cyan);}
.card h3{font-size:.78rem;color:var(--cyan);margin-bottom:6px;letter-spacing:1px;}
.card p,.card li{font-size:.85rem;line-height:1.5;color:var(--text);}
.card .sub{color:var(--muted);font-size:.75rem;}

/* Buttons */
.btn{display:inline-flex;align-items:center;justify-content:center;min-height:48px;
  min-width:48px;padding:10px 20px;border:1px solid var(--cyan);border-radius:6px;
  background:rgba(0,212,255,.08);color:var(--cyan);font-family:var(--font-mono);
  font-size:.8rem;letter-spacing:1px;cursor:pointer;transition:all .15s;-webkit-user-select:none;user-select:none;}
.btn:active{background:rgba(0,212,255,.25);transform:scale(.97);}
.btn.primary{background:var(--cyan);color:#000;font-weight:700;}
.btn.primary:active{background:#00b8dd;}
.btn.orange{border-color:var(--orange);background:rgba(255,102,0,.1);color:var(--orange);}
.btn.orange:active{background:rgba(255,102,0,.25);}
.btn:disabled{opacity:.35;pointer-events:none;}
.btn-row{display:flex;gap:8px;margin-top:12px;}
.btn-row .btn{flex:1;}

/* Inputs */
.field{margin-bottom:12px;}
.field label{display:block;font-size:.68rem;letter-spacing:1.5px;color:var(--cyan);
  text-transform:uppercase;margin-bottom:5px;font-family:var(--font-mono);}
.field input[type="number"],.field input[type="text"],.field select{
  width:100%;min-height:48px;padding:10px 12px;background:var(--bg);border:1px solid var(--border);
  border-radius:6px;color:var(--text);font-size:.95rem;font-family:var(--font-body);outline:none;}
.field input:focus,.field select:focus{border-color:var(--cyan);box-shadow:0 0 6px rgba(0,212,255,.25);}

/* Radio/Check cards */
.option-grid{display:grid;gap:8px;}
.option-card{display:flex;align-items:flex-start;gap:10px;padding:12px;
  background:var(--bg);border:1px solid var(--border);border-radius:8px;
  cursor:pointer;min-height:48px;transition:border-color .15s,background .15s;}
.option-card:active{background:rgba(0,212,255,.06);}
.option-card.selected{border-color:var(--cyan);background:rgba(0,212,255,.06);
  box-shadow:0 0 8px rgba(0,212,255,.15);}
.option-card .icon-col{font-size:1.4rem;flex-shrink:0;width:28px;text-align:center;}
.option-card .text-col{flex:1;}
.option-card .text-col .name{font-family:var(--font-mono);font-size:.8rem;color:var(--text);margin-bottom:2px;}
.option-card .text-col .desc{font-size:.75rem;color:var(--muted);line-height:1.4;}
.option-card input{display:none;}

/* Progress */
.progress-bar{display:flex;gap:4px;margin-bottom:16px;padding:0 2px;}
.progress-step{flex:1;height:4px;background:var(--border);border-radius:2px;transition:background .3s;}
.progress-step.done{background:var(--cyan);}
.progress-step.current{background:var(--orange);box-shadow:0 0 6px rgba(255,102,0,.5);}
.step-label{font-family:var(--font-mono);font-size:.65rem;color:var(--muted);
  letter-spacing:1px;text-transform:uppercase;margin-bottom:8px;}

/* Result card */
.result-card{background:var(--card);border:2px solid var(--cyan);border-radius:10px;padding:16px;margin-bottom:12px;
  box-shadow:0 0 20px rgba(0,212,255,.1);}
.result-card h3{font-size:.9rem;color:var(--cyan);margin-bottom:4px;}
.result-card .type-name{font-size:1.15rem;color:var(--orange);font-family:var(--font-mono);font-weight:700;margin-bottom:8px;}
.result-card .why{font-size:.82rem;color:var(--text);line-height:1.5;margin-bottom:10px;
  padding:8px;background:rgba(0,212,255,.04);border-radius:6px;border-left:3px solid var(--cyan);}
.tag{display:inline-block;padding:3px 8px;border-radius:4px;font-size:.7rem;font-family:var(--font-mono);
  margin:2px;border:1px solid var(--border);}
.tag.pro{border-color:#0a5;color:#0d8;}
.tag.con{border-color:#a50;color:#d80;}

/* Compare table */
.table-wrap{overflow-x:auto;-webkit-overflow-scrolling:touch;margin:0 -12px;padding:0 12px;}
.compare-table{border-collapse:collapse;font-size:.72rem;min-width:900px;width:100%;}
.compare-table th,.compare-table td{padding:8px 6px;border:1px solid var(--border);text-align:left;white-space:nowrap;}
.compare-table th{background:#0d1a2e;color:var(--cyan);font-family:var(--font-mono);
  font-size:.65rem;letter-spacing:1px;text-transform:uppercase;position:sticky;top:0;z-index:2;}
.compare-table td:first-child,.compare-table th:first-child{position:sticky;left:0;
  background:var(--card);z-index:1;min-width:110px;font-family:var(--font-mono);color:var(--orange);}
.compare-table th:first-child{z-index:3;background:#0d1a2e;}
.compare-table tr:nth-child(even) td{background:rgba(255,255,255,.02);}
.compare-table tr:nth-child(even) td:first-child{background:var(--card);}
.compare-table tr.highlight td{background:rgba(0,212,255,.08);}
.compare-table tr.highlight td:first-child{background:rgba(0,212,255,.12);}
.stars{color:var(--orange);}
.filter-row{display:flex;flex-wrap:wrap;gap:6px;margin-bottom:12px;}
.filter-btn{min-height:36px;padding:6px 12px;border:1px solid var(--border);border-radius:4px;
  background:var(--bg);color:var(--muted);font-family:var(--font-mono);font-size:.65rem;
  cursor:pointer;letter-spacing:.5px;}
.filter-btn.active{border-color:var(--cyan);color:var(--cyan);background:rgba(0,212,255,.08);}
.filter-btn:active{background:rgba(0,212,255,.12);}

/* Learn section */
.accordion{margin-bottom:8px;}
.accordion-header{display:flex;align-items:center;gap:8px;padding:14px;background:var(--card);
  border:1px solid var(--border);border-radius:8px;cursor:pointer;min-height:48px;
  font-family:var(--font-mono);font-size:.78rem;color:var(--text);transition:border-color .15s;}
.accordion-header:active{border-color:var(--cyan);}
.accordion-header .arrow{color:var(--cyan);transition:transform .2s;font-size:.7rem;}
.accordion-header.open{border-radius:8px 8px 0 0;border-color:var(--cyan);color:var(--cyan);}
.accordion-header.open .arrow{transform:rotate(90deg);}
.accordion-body{display:none;padding:14px;background:var(--card);border:1px solid var(--border);
  border-top:none;border-radius:0 0 8px 8px;font-size:.82rem;line-height:1.65;color:var(--text);}
.accordion-body.open{display:block;}
.accordion-body h4{color:var(--orange);font-size:.75rem;margin:12px 0 6px;letter-spacing:1px;text-transform:uppercase;}
.accordion-body h4:first-child{margin-top:0;}
.accordion-body ul{margin:6px 0 10px 18px;}
.accordion-body li{margin-bottom:4px;}

/* Spec preview */
.spec-preview{background:var(--bg);border:1px solid var(--border);border-radius:8px;
  padding:16px;font-family:var(--font-mono);font-size:.72rem;line-height:1.7;
  white-space:pre-wrap;word-break:break-word;color:var(--text);max-height:60vh;overflow-y:auto;}
.spec-preview .section-num{color:var(--cyan);}
.spec-preview .section-title{color:var(--orange);font-weight:700;}
.spec-preview .indent{padding-left:20px;}
.spec-preview .indent2{padding-left:40px;}

/* Validation msg */
.val-msg{font-size:.75rem;padding:6px 10px;border-radius:4px;margin-top:6px;}
.val-msg.warn{background:rgba(255,102,0,.1);border:1px solid rgba(255,102,0,.3);color:var(--orange);}
.val-msg.ok{background:rgba(0,212,255,.06);border:1px solid rgba(0,212,255,.2);color:var(--cyan);}
.val-msg.err{background:rgba(255,50,50,.1);border:1px solid rgba(255,50,50,.3);color:#f55;}

/* Responsive tweaks */
@media(min-width:600px){
  .option-grid.cols2{grid-template-columns:1fr 1fr;}
  .tab-content{padding:16px 24px;}
}
@media(min-width:900px){
  .tab-content{max-width:860px;margin:0 auto;padding:20px 32px;}
}
</style>
</head>

/* ===== STATE ===== */
let state = {step:1,hangarType:null,width:0,height:0,openings:1,aircraft:[],

  cycles:null,speed:null,power:null,security:null,budget:null,

function loadState(){
  try{const s=localStorage.getItem('hds_state');if(s){const p=JSON.parse(s);Object.assign(state,p);}}catch(e){}
}
function saveState(){try{localStorage.setItem('hds_state',JSON.stringify(state));}catch(e){}}

/* ===== TAB NAVIGATION ===== */
document.querySelectorAll('.nav-btn').forEach(btn=>{
  btn.addEventListener('click',()=>{
    document.querySelectorAll('.nav-btn').forEach(b=>b.classList.remove('active'));
    btn.classList.add('active');
    document.querySelectorAll('.tab-content').forEach(t=>t.classList.remove('active'));
    document.getElementById('tab-'+btn.dataset.tab).classList.add('active');
    if(btn.dataset.tab==='spec') renderSpec();
    if(btn.dataset.tab==='compare') renderCompare();
  });
});

/* ===== WIZARD RENDERING ===== */
function renderWizard(){
  const el=document.getElementById('tab-select');
  const totalSteps=6;
  let html='<div class="progress-bar">';
  for(let i=1;i<=totalSteps;i++){
    const cls=i<state.step?'done':i===state.step?'current':'';
    html+=`<div class="progress-step ${cls}"></div>`;
  }
  html+='</div>';

  if(state.step===1) html+=renderStep1();
  else if(state.step===2) html+=renderStep2();

  else if(state.step===7) html+=renderResults();

  el.innerHTML=html;
  attachWizardEvents();
}

/* ===== RECOMMENDATION ENGINE ===== */
function computeRecommendation(){
  const w=state.width, h=state.height, ht=state.hangarType;
  const scores={};
  DOOR_TYPES.forEach(d=>{scores[d.id]=0;});

  // Size-based scoring
  DOOR_TYPES.forEach(d=>{
    if(w<=d.maxW && h<=d.maxH) scores[d.id]+=10;
    else scores[d.id]-=50; // can't fit
  });

  // Hangar type affinity
  if(ht==='t-hangar'){
    scores['rolling']+=15;scores['sliding-bottom']+=12;scores['bifold-strap']+=3;
  } else if(ht==='corporate'){
    scores['bifold-strap']+=12;scores['bifold-hyd']+=10;scores['sliding-top']+=8;scores['vertical']+=8;
  } else if(ht==='mro'){
    scores['bifold-hyd']+=15;scores['telescoping']+=14;scores['bifold-strap']+=8;
  } else if(ht==='community'){
    scores['fabric']+=14;scores['sliding-bottom']+=10;scores['sliding-top']+=8;
  } else if(ht==='ag'){
    scores['rolling']+=12;scores['sliding-bottom']+=10;scores['fabric']+=8;
  }

  // Width ranges
  if(w<=60){scores['rolling']+=8;scores['sliding-bottom']+=6;}
  else if(w<=100){scores['bifold-strap']+=8;scores['sliding-top']+=6;scores['vertical']+=6;}
  else if(w<=150){scores['bifold-hyd']+=10;scores['bifold-strap']+=8;}
  else{scores['bifold-hyd']+=12;scores['telescoping']+=14;}

  // Wind
  if(state.wind==='high'||state.wind==='severe'){
    scores['bifold-hyd']+=12;scores['bifold-strap']+=8;scores['vertical']+=6;
    scores['fabric']-=15;scores['sliding-bottom']-=8;
  }

  // High cycle count
  if(state.cycles==='10-20'||state.cycles==='20+'){
    scores['bifold-hyd']+=5;scores['vertical']+=5;scores['rolling']+=3;
    scores['telescoping']-=3;
  }

  // Budget
  if(state.budget==='economy'){
    scores['rolling']+=10;scores['sliding-bottom']+=8;scores['fabric']+=8;
    scores['bifold-hyd']-=8;scores['telescoping']-=8;
  } else if(state.budget==='premium'){
    scores['bifold-hyd']+=8;scores['vertical']+=5;scores['telescoping']+=5;
  }

  // Cold climate + insulation
  if((state.climate==='cold'||state.snow==='heavy'||state.snow==='moderate')&&state.special.includes('insulated')){
    scores['vertical']+=10;scores['bifold-hyd']+=6;scores['bifold-strap']+=6;
    scores['fabric']-=12;
  }

  // Clear span
  if(state.special.includes('clear-span')){
    scores['bifold-hyd']+=10;scores['bifold-strap']+=10;scores['vertical']+=5;
    scores['sliding-bottom']-=5;scores['sliding-top']-=5;scores['telescoping']-=5;
  }

  // Speed
  if(state.speed==='fast'||state.speed==='emergency'){
    scores['fabric']+=6;scores['rolling']+=4;scores['bifold-hyd']+=4;
    scores['telescoping']-=4;
  }

  // Sort and pick
  const sorted=Object.entries(scores).sort((a,b)=>b[1]-a[1]);
  state.recommendation=DOOR_TYPES.find(d=>d.id===sorted[0][0]);
  state.runnerUp=DOOR_TYPES.find(d=>d.id===sorted[1][0]);
}

    </div>

  return h;
}

/* ===== WIZARD EVENTS ===== */
function attachWizardEvents(){
  const el=document.getElementById('tab-select');
  // Option cards
  el.querySelectorAll('[data-action="hangar"]').forEach(c=>c.addEventListener('click',()=>{
    state.hangarType=c.dataset.id;
    const ht=HANGAR_TYPES.find(t=>t.id===c.dataset.id);
    state.width=ht.w;state.height=ht.h;
    saveState();renderWizard();
  }));
  el.querySelectorAll('[data-action="aircraft"]').forEach(c=>c.addEventListener('click',()=>{
    const id=c.dataset.id;
    if(state.aircraft.includes(id)) state.aircraft=state.aircraft.filter(a=>a!==id);
    else state.aircraft.push(id);
    saveState();renderWizard();validateAircraft();
  }));
  ['wind','climate','seismic','snow','cycles','speed','power','security','budget'].forEach(act=>{
    el.querySelectorAll(`[data-action="${act}"]`).forEach(c=>c.addEventListener('click',()=>{
      state[act]=c.dataset.id;saveState();renderWizard();
    }));
  });
  el.querySelectorAll('[data-action="special"]').forEach(c=>c.addEventListener('click',()=>{
    const id=c.dataset.id;
    if(state.special.includes(id)) state.special=state.special.filter(s=>s!==id);
    else state.special.push(id);
    saveState();renderWizard();
  }));

  // Navigation
  const next1=el.querySelector('#next1');if(next1) next1.addEventListener('click',()=>{state.step=2;saveState();renderWizard();});
  const back2=el.querySelector('#back2');if(back2) back2.addEventListener('click',()=>{state.step=1;saveState();renderWizard();});
  const next2=el.querySelector('#next2');if(next2) next2.addEventListener('click',()=>{
    state.width=parseInt(el.querySelector('#inp-w').value)||50;
    state.height=parseInt(el.querySelector('#inp-h').value)||14;
    state.openings=parseInt(el.querySelector('#inp-n').value)||1;
    state.step=3;saveState();renderWizard();
  });
  const back3=el.querySelector('#back3');if(back3) back3.addEventListener('click',()=>{state.step=2;saveState();renderWizard();});
  const next3=el.querySelector('#next3');if(next3) next3.addEventListener('click',()=>{state.step=4;saveState();renderWizard();});
  const back4=el.querySelector('#back4');if(back4) back4.addEventListener('click',()=>{state.step=3;saveState();renderWizard();});
  const next4=el.querySelector('#next4');if(next4) next4.addEventListener('click',()=>{state.step=5;saveState();renderWizard();});
  const back5=el.querySelector('#back5');if(back5) back5.addEventListener('click',()=>{state.step=4;saveState();renderWizard();});
  const next5=el.querySelector('#next5');if(next5) next5.addEventListener('click',()=>{state.step=6;saveState();renderWizard();});
  const back6=el.querySelector('#back6');if(back6) back6.addEventListener('click',()=>{state.step=5;saveState();renderWizard();});
  const next6=el.querySelector('#next6');if(next6) next6.addEventListener('click',()=>{state.step=7;saveState();renderWizard();});
  const backR=el.querySelector('#back-results');if(backR) backR.addEventListener('click',()=>{state.step=6;saveState();renderWizard();});
  const goSpec=el.querySelector('#go-spec');if(goSpec) goSpec.addEventListener('click',()=>{
    document.querySelectorAll('.nav-btn').forEach(b=>b.classList.remove('active'));
    document.querySelectorAll('.nav-btn')[1].classList.add('active');
    document.querySelectorAll('.tab-content').forEach(t=>t.classList.remove('active'));
    document.getElementById('tab-spec').classList.add('active');
    renderSpec();
  });
  const resetBtn=el.querySelector('#reset-wizard');if(resetBtn) resetBtn.addEventListener('click',()=>{
    state={step:1,hangarType:null,width:0,height:0,openings:1,aircraft:[],
      wind:null,climate:null,seismic:null,snow:null,cycles:null,speed:null,
      power:null,security:null,budget:null,special:[],recommendation:null,runnerUp:null};
    saveState();renderWizard();
  });
}

function validateAircraft(){
  const valEl=document.getElementById('aircraft-val');
  if(!valEl) return;
  const selected=AIRCRAFT.filter(a=>state.aircraft.includes(a.id));
  if(!selected.length){valEl.innerHTML='';return;}
  const maxW=Math.max(...selected.map(a=>a.w))+6; // 3' clearance each side
  const maxH=Math.max(...selected.map(a=>a.h))+2; // 2' above tail
  let msgs=[];
  if(state.width<maxW) msgs.push(`Width ${state.width}' may be insufficient. Recommended minimum: ${maxW}' (includes 3' wingtip clearance each side).`);
  if(state.height<maxH) msgs.push(`Height ${state.height}' may be insufficient. Recommended minimum: ${maxH}' (includes 2' tail clearance).`);
  if(msgs.length) valEl.innerHTML=msgs.map(m=>`<div class="val-msg warn">\u26A0 ${m}</div>`).join('');
  else valEl.innerHTML=`<div class="val-msg ok">\u2713 Opening dimensions adequate for selected aircraft.</div>`;
}

function renderSpec(){

  const specText=getSpecText();
  let html='<div class="step-label">Performance Specification</div>';
  html+=`<div class="card"><p style="font-size:.8rem;">Based on your selections, the following CSI MasterFormat specification has been generated for your <strong style="color:var(--orange);">${state.recommendation.name}</strong> door system.</p></div>`;
  html+=`<div class="btn-row" style="margin-bottom:12px;"><button class="btn primary" id="download-pdf">Download PDF</button><button class="btn" id="copy-spec">Copy Text</button></div>`;
  html+=`<div class="spec-preview">${escapeHtml(specText)}</div>`;
  el.innerHTML=html;

  document.getElementById('download-pdf').addEventListener('click',generatePDF);
  document.getElementById('copy-spec').addEventListener('click',()=>{

function escapeHtml(t){return t.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');}

/* ===== PDF GENERATION ===== */
function generatePDF(){
  const {jsPDF}=window.jspdf;
  const doc=new jsPDF({unit:'pt',format:'letter'});
  const pw=612,ph=792,ml=54,mr=54,mt=72,mb=54;
  const usableW=pw-ml-mr;
  let y=mt;
  let pageNum=1;

  function addPage(){
    doc.addPage();pageNum++;y=mt;
    drawFooter();
  }
  function checkPage(need){
    if(y+need>ph-mb){addPage();return true;}
    return false;
  }
  function drawFooter(){
    doc.setFontSize(7);doc.setTextColor(136);
    doc.text('KORB ENGINEERING',ml,ph-30);
    doc.text('HANGAR DOOR SPECIFICATION',pw/2,ph-30,{align:'center'});
    doc.text('Page '+pageNum,pw-mr,ph-30,{align:'right'});
    doc.text('Generated: '+new Date().toLocaleDateString(),pw-mr,ph-22,{align:'right'});
  }

  // Header
  doc.setFontSize(14);doc.setFont('helvetica','bold');doc.setTextColor(0);
  doc.text('KORB ENGINEERING',ml,y);
  y+=16;
  doc.setFontSize(9);doc.setFont('helvetica','normal');doc.setTextColor(100);
  doc.text('Hangar Door Performance Specification',ml,y);
  y+=12;
  doc.setDrawColor(0,180,220);doc.setLineWidth(1.5);
  doc.line(ml,y,pw-mr,y);
  y+=20;
  drawFooter();

  // Spec content
  const specText=getSpecText();
  const lines=specText.split('\n');
  doc.setFontSize(8.5);

  lines.forEach(line=>{
    checkPage(12);
    const trimmed=line.trimStart();
    const indent=line.length-trimmed.length;
    const x=ml+(indent*4.5);

    if(/^SECTION\s/.test(trimmed)||/^PART\s\d/.test(trimmed)){
      doc.setFont('helvetica','bold');doc.setTextColor(0,100,140);doc.setFontSize(10);
      checkPage(18);y+=6;
      doc.text(trimmed,ml,y);y+=14;
      doc.setFontSize(8.5);
    } else if(/^\d+\.\d+\s/.test(trimmed)){
      doc.setFont('helvetica','bold');doc.setTextColor(0);
      checkPage(14);y+=4;
      doc.text(trimmed,ml,y);y+=12;
    } else if(/^END OF SECTION/.test(trimmed)){
      doc.setFont('helvetica','bold');doc.setTextColor(0);
      y+=8;doc.text(trimmed,ml,y);y+=12;
    } else if(trimmed===''){
      y+=4;
    } else {
      doc.setFont('helvetica','normal');doc.setTextColor(40);
      const wrapped=doc.splitTextToSize(trimmed,usableW-(indent*4.5));
      wrapped.forEach(wl=>{
        checkPage(11);
        doc.text(wl,x,y);y+=11;
      });
    }
  });

  doc.save('Hangar_Door_Spec_'+state.recommendation.id+'_'+new Date().toISOString().slice(0,10)+'.pdf');
}

    html+=`<td><span class="stars">${'\u2605'.repeat(d.insulR)+'\u2606'.repeat(5-d.insulR)}</span></td>`;
    html+=`<td><span class="stars">${'\u2605'.repeat(d.speedR)+'\u2606'.repeat(5-d.speedR)}</span></td>`;
    html+=`<td><span class="stars">${'\u2605'.repeat(d.maintR)+'\u2606'.repeat(5-d.maintR)}</span></td>`;

    html+=`<td>${d.bottomRail?'Yes':'No'}</td>`;

    html+=`<td>${d.lifespan}</td>`;

function renderLearn(){
  const sections=[
    {title:'Understanding Wind Loads',content:`<h4>How ASCE 7 Wind Loads Apply to Hangar Doors</h4>
<p>Hangar doors are among the largest moving components on any building. Wind loads on these doors must be calculated per ASCE 7 using the Components and Cladding (C&C) method for the door panels themselves, while the door's effect on the overall structure may trigger Main Wind Force Resisting System (MWFRS) considerations when the door is open.</p>

<h4>Component and Cladding vs MWFRS</h4>
<ul>
<li><strong>C&C:</strong> Used for individual door panels, hardware, and connections. Higher pressures apply to corner and edge zones.</li>
<li><strong>MWFRS:</strong> Used for the overall building frame. When a hangar door is open, the building interior becomes partially enclosed, dramatically increasing internal pressure coefficients.</li>
<li>Designers must check both conditions: door closed (C&C on door) and door open (MWFRS on building with increased GCpi).</li>
</ul>

<h4>Exposure Categories Explained</h4>
<ul>
<li><strong>Exposure B:</strong> Urban and suburban areas with numerous closely spaced obstructions. Lowest wind speeds at ground level.</li>
<li><strong>Exposure C:</strong> Open terrain with scattered obstructions. Most airports fall into this category due to clear zones around runways.</li>
<li><strong>Exposure D:</strong> Flat, unobstructed coastal areas. Highest wind speeds. Applies within 600 ft of shoreline in hurricane-prone regions.</li>
</ul>
<p>Most airport hangars are Exposure C or D due to the open nature of airfields.</p>

<h4>Risk Categories</h4>
<ul>
<li><strong>Risk Category II:</strong> Standard occupancy. Most general aviation hangars.</li>
<li><strong>Risk Category III:</strong> Hangars with high-value aircraft or essential operations (e.g., air ambulance, military). Higher importance factor.</li>
</ul>

<h4>Common Design Wind Speeds</h4>
<ul>
<li>Texas (inland): 115-120 mph</li>
<li>Texas (coast): 140-160 mph</li>
<li>Oklahoma: 115-120 mph</li>
<li>Florida (inland): 140-150 mph</li>
<li>Florida (coast): 170-180 mph</li>
<li>Gulf Coast: 150-170 mph</li>
<li>Midwest: 115 mph</li>
</ul>`},

    {title:'Door Drive Systems Explained',content:`<h4>Hydraulic Systems</h4>
<ul>
<li>Uses hydraulic cylinders powered by an electric pump to lift the door</li>
<li>Pros: Smooth, powerful, excellent for very large/heavy doors, precise speed control</li>
<li>Cons: Hydraulic fluid maintenance, potential for leaks, higher initial cost</li>
<li>Maintenance: Check fluid levels monthly, replace filters annually, inspect hoses and cylinders for leaks quarterly, full fluid change every 3-5 years</li>
</ul>

<h4>Electric Motor (Chain Drive)</h4>
<ul>
<li>Electric motor drives a chain or cable system connected to the door</li>
<li>Pros: Simple, reliable, easy to maintain, widely available parts</li>
<li>Cons: Limited to moderate door sizes, chain wear</li>
<li>Maintenance: Lubricate chain quarterly, inspect sprockets annually, check motor brushes/bearings per manufacturer schedule</li>
</ul>

<h4>Strap Lift Systems</h4>
<ul>
<li>Heavy-duty polyester straps connected to an electric motor wind/unwind to lift bi-fold doors</li>
<li>Pros: No hydraulic fluid needed, cost-effective, proven technology with millions of cycles</li>
<li>Cons: Straps require periodic inspection and eventual replacement (typically every 7-10 years)</li>
<li>Maintenance: Visual strap inspection monthly, detailed inspection semi-annually, keep straps clean and free of abrasion</li>
</ul>

<h4>Manual Operation</h4>
<ul>
<li>Hand crank, manual chain hoist, or simply sliding panels by hand</li>
<li>Appropriate for: Small T-hangar doors, low-cycle applications, backup systems</li>
<li>Pros: No power required, simplest mechanism, lowest cost</li>
<li>Cons: Labor intensive, slow, limited to smaller/lighter doors</li>
</ul>

<h4>Emergency Backup Systems</h4>
<ul>
<li>Manual pump (hydraulic doors): Hand-operated hydraulic pump to raise/lower door during power outage</li>
<li>Manual chain hoist (electric doors): Chain fall or hand crank mechanism</li>
<li>Battery backup: UPS system to power the operator for a limited number of cycles</li>
<li>Generator connection: Transfer switch for portable or standby generator</li>
</ul>`},

    {title:'Specification Writing Tips',content:`<h4>Why "Or Approved Equal" Matters</h4>
<ul>
<li>Public projects (airports) typically require competitive bidding</li>
<li>Specifying a single manufacturer without "or approved equal" can be challenged as sole-source</li>
<li>FAA-funded projects require open competition per AIP grant assurances</li>
<li>Always list 2-3 manufacturers with "or approved equal" language</li>
<li>Define clear performance criteria so "equal" can be objectively evaluated</li>
</ul>

<h4>Performance Spec vs Proprietary Spec</h4>
<ul>
<li><strong>Performance spec:</strong> Defines what the door must DO (wind load, cycle life, speed). Preferred for public projects. Allows innovation from manufacturers.</li>
<li><strong>Proprietary spec:</strong> Names a specific product and model. Used when only one product meets the need. Requires sole-source justification on public projects.</li>
<li>Best practice: Write a performance spec with named manufacturers as benchmarks.</li>
</ul>

<h4>What to Include in Submittals</h4>
<ul>
<li>Shop drawings with dimensions, connections, and structural details</li>
<li>Structural calculations sealed by a P.E. in the project state</li>
<li>Wind load test reports per ASTM E330</li>
<li>Motor/operator specifications and wiring diagrams</li>
<li>Finish/coating data sheets</li>
<li>O&M manuals with maintenance schedule</li>
<li>Warranty documentation</li>
</ul>

<h4>Common Mistakes in Hangar Door Specs</h4>
<ul>
<li>Not specifying wind load per current ASCE 7 edition</li>
<li>Forgetting to address the "door open" condition for building MWFRS</li>
<li>Inadequate header/structural support specification</li>
<li>Missing power requirements coordination with electrical engineer</li>
<li>Not requiring factory-trained installer</li>
<li>Omitting safety devices (photo-eyes, auto-reverse, alarms)</li>
<li>Forgetting pedestrian/wicket door requirements</li>
</ul>

<h4>Working with Door Manufacturers</h4>
<ul>
<li>Engage manufacturers early in design for sizing and structural loads</li>
<li>Request reaction loads for foundation and header design</li>
<li>Confirm power requirements with electrical engineer</li>

<li>Discuss maintenance access requirements</li>
</ul>`},

    {title:'Maintenance & Lifecycle',content:`<h4>Typical Maintenance Schedule by Door Type</h4>
<ul>
<li><strong>Bi-fold hydraulic:</strong> Monthly fluid check, quarterly hose/cylinder inspection, annual full service, 3-5 year fluid change</li>
<li><strong>Bi-fold strap:</strong> Monthly visual strap check, quarterly detailed inspection, annual lubrication and adjustment</li>
<li><strong>Sliding doors:</strong> Monthly rail cleaning, quarterly wheel/roller inspection, semi-annual track alignment check</li>
<li><strong>Vertical lift:</strong> Monthly cable/spring inspection, quarterly counterweight check, annual full service</li>
<li><strong>Rolling steel:</strong> Quarterly lubrication, semi-annual spring tension check, annual track/roller inspection</li>
<li><strong>Fabric/curtain:</strong> Monthly visual fabric check, quarterly tension adjustment, annual UV/wear assessment</li>
</ul>

<h4>Common Failure Modes and Prevention</h4>
<ul>
<li><strong>Track/rail damage:</strong> Keep rails clean, remove debris, check alignment. FOD on rails is the #1 cause of sliding door issues.</li>
<li><strong>Seal deterioration:</strong> UV and weather exposure degrades seals. Budget for replacement every 3-5 years.</li>
<li><strong>Motor/operator failure:</strong> Overheating from excessive cycling, electrical issues. Ensure proper sizing and ventilation.</li>
<li><strong>Hydraulic leaks:</strong> Age and vibration cause fitting failures. Regular inspection prevents catastrophic failure.</li>
<li><strong>Strap wear:</strong> Abrasion, UV, and chemical exposure. Follow manufacturer inspection protocol exactly.</li>
<li><strong>Structural fatigue:</strong> High-cycle doors develop fatigue cracks at connections. Periodic NDT inspection recommended.</li>
</ul>

<h4>When to Replace vs Repair</h4>
<ul>
<li>Replace when: repair cost exceeds 40-50% of replacement cost, parts are obsolete, safety systems cannot meet current codes, structural fatigue is widespread</li>
<li>Repair when: issue is isolated, parts are available, door is less than 60% through expected lifespan</li>
</ul>

<h4>Lifecycle Cost Comparison (30-year, per sq ft of opening)</h4>
<ul>
<li>Rolling steel: $45-80 (low initial, moderate maintenance)</li>
<li>Sliding: $60-110 (low-moderate initial, moderate maintenance)</li>
<li>Bi-fold strap: $85-140 (moderate initial, moderate maintenance)</li>
<li>Bi-fold hydraulic: $110-180 (high initial, lower long-term maintenance per cycle)</li>
<li>Vertical lift: $100-160 (high initial, moderate maintenance)</li>
<li>Fabric: $40-90 (lowest initial, highest replacement frequency)</li>

    {title:'Code & Compliance',content:`<h4>IBC Requirements for Aircraft Hangars</h4>

  const el=document.getElementById('tab-learn');

  sections.forEach((s,i)=>{
    html+=`<div class="accordion">
      <div class="accordion-header" data-idx="${i}"><span class="arrow">\u25B6</span> ${s.title}</div>
      <div class="accordion-body" data-idx="${i}">${s.content}</div>

  el.querySelectorAll('.accordion-header').forEach(hdr=>{
    hdr.addEventListener('click',()=>{
      const body=el.querySelector(`.accordion-body[data-idx="${hdr.dataset.idx}"]`);
      const isOpen=hdr.classList.contains('open');
      // Close all
      el.querySelectorAll('.accordion-header').forEach(h=>h.classList.remove('open'));
      el.querySelectorAll('.accordion-body').forEach(b=>b.classList.remove('open'));
      if(!isOpen){hdr.classList.add('open');body.classList.add('open');}
    });
  });
