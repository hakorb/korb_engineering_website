<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Holding Pattern Entry Calculator | Korb Engineering</title>
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{--bg:#050a0f;--surface:#0a1018;--surface2:#0e1520;--border:#1a2535;--text:#e2e8f0;--cyan:#00d4ff;--orange:#ff6600;--green:#10b981;--red:#ef4444;--dim:#64748b}
html{font-size:16px}
body{font-family:'JetBrains Mono',monospace;background:var(--bg);color:var(--text);min-height:100vh;line-height:1.6}
header{background:var(--surface);border-bottom:1px solid var(--border);padding:16px 20px;display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:8px}
.brand{display:flex;align-items:center;gap:12px}
.brand-icon{width:36px;height:36px;background:var(--cyan);border-radius:6px;display:flex;align-items:center;justify-content:center;font-weight:700;color:var(--bg);font-size:14px}
.brand-name{font-size:13px;color:var(--dim);font-weight:300}
.brand-title{font-size:18px;font-weight:600;color:var(--cyan)}
main{max-width:1200px;margin:0 auto;padding:20px}
.grid{display:grid;grid-template-columns:1fr;gap:20px}
@media(min-width:900px){.grid{grid-template-columns:380px 1fr}}
.card{background:var(--surface);border:1px solid var(--border);border-radius:10px;padding:20px}
.card h2{font-size:15px;font-weight:600;color:var(--cyan);margin-bottom:16px;border-bottom:1px solid var(--border);padding-bottom:8px}
label{display:block;font-size:13px;color:var(--dim);margin-bottom:4px;font-weight:400}
input,select,button{font-family:'JetBrains Mono',monospace;font-size:16px;border-radius:6px;border:1px solid var(--border);background:var(--surface2);color:var(--text);padding:10px 14px;width:100%;min-height:44px;outline:none;transition:border-color .2s}
input:focus,select:focus{border-color:var(--cyan)}
button{background:var(--cyan);color:var(--bg);font-weight:600;cursor:pointer;border:none;text-align:center}
button:hover{opacity:.9}
button.secondary{background:var(--surface2);color:var(--text);border:1px solid var(--border)}
.row{display:flex;gap:12px;margin-bottom:14px}
.row>div{flex:1}
.mb{margin-bottom:14px}
.toggle-row{display:flex;gap:8px;margin-bottom:14px}
.toggle-btn{flex:1;min-height:44px;border-radius:6px;cursor:pointer;font-weight:500;font-size:14px;transition:all .2s}
.toggle-btn.active{background:var(--cyan);color:var(--bg);border-color:var(--cyan)}
.toggle-btn:not(.active){background:var(--surface2);color:var(--dim);border:1px solid var(--border)}
.result-box{background:var(--surface2);border:1px solid var(--border);border-radius:8px;padding:16px;margin-top:12px}
.result-box h3{font-size:14px;font-weight:600;margin-bottom:8px}
.entry-direct{color:var(--green)}
.entry-teardrop{color:var(--orange)}
.entry-parallel{color:var(--cyan)}
.info-row{display:flex;justify-content:space-between;font-size:13px;padding:4px 0;border-bottom:1px solid var(--border)}
.info-row:last-child{border:none}
.info-label{color:var(--dim)}
canvas{width:100%;border-radius:8px;background:var(--surface2);display:block}
.efc-section{margin-top:16px}
.efc-display{font-size:28px;font-weight:700;color:var(--cyan);text-align:center;padding:12px;font-variant-numeric:tabular-nums}
.efc-buttons{display:flex;gap:8px;margin-top:8px}
.efc-buttons button{flex:1;font-size:13px}
.wind-section{margin-top:16px}
</style>
</head>
<body>
<header>
<div class="brand">
<div class="brand-icon">KE</div>
<div>
<div class="brand-title">Holding Pattern Entry Calculator</div>
<div class="brand-name">Korb Engineering</div>
</div>
</div>
</header>
<main>
<div class="grid">
<div>
<div class="card">
<h2>Holding Parameters</h2>
<div class="mb">
<label>Inbound Course to Fix (degrees)</label>
<input type="number" id="inboundCourse" min="1" max="360" step="1" value="270" placeholder="001-360">
</div>
<div class="mb">
<label>Aircraft Heading at Fix (degrees)</label>
<input type="number" id="aircraftHeading" min="1" max="360" step="1" value="90" placeholder="001-360">
</div>
<div class="mb">
<label>Holding Turn Direction</label>
<div class="toggle-row">
<button class="toggle-btn active" data-val="right" onclick="setTurnDir(this)">Standard (Right)</button>
<button class="toggle-btn" data-val="left" onclick="setTurnDir(this)">Non-Standard (Left)</button>
</div>
</div>
<div class="mb">
<label>Altitude (ft MSL)</label>
<input type="number" id="altitude" min="0" max="60000" step="100" value="6000">
</div>
<div class="row">
<div>
<label>Leg Type</label>
<select id="legType">
<option value="time">Time-based</option>
<option value="distance">DME Distance</option>
</select>
</div>
<div>
<label>Leg Distance (nm)</label>
<input type="number" id="legDistance" min="1" max="30" step="0.5" value="5" disabled>
</div>
</div>
<div class="mb">
<label>Airspeed (KIAS)</label>
<input type="number" id="airspeed" min="60" max="400" step="5" value="180">
</div>
<button onclick="calculate()" style="margin-bottom:12px">Calculate Entry</button>
<button class="secondary" onclick="resetAll()">Reset</button>
</div>

<div class="card wind-section">
<h2>Wind Correction</h2>
<div class="row">
<div>
<label>Wind Direction (from)</label>
<input type="number" id="windDir" min="0" max="360" step="5" value="0">
</div>
<div>
<label>Wind Speed (kts)</label>
<input type="number" id="windSpeed" min="0" max="100" step="1" value="0">
</div>
</div>
<div class="result-box" id="windResult" style="display:none"></div>
</div>

<div class="card efc-section">
<h2>EFC Timer</h2>
<div class="efc-display" id="efcDisplay">00:00</div>
<div class="mb" style="margin-top:12px">
<label>EFC Time (minutes)</label>
<input type="number" id="efcMinutes" min="1" max="120" step="1" value="10">
</div>
<div class="efc-buttons">
<button onclick="startEFC()">Start</button>
<button class="secondary" onclick="stopEFC()">Stop</button>
<button class="secondary" onclick="resetEFC()">Reset</button>
</div>
</div>
</div>

<div>
<div class="card">
<h2>Holding Pattern Diagram</h2>
<canvas id="holdCanvas" width="700" height="700"></canvas>
</div>
<div class="card" style="margin-top:20px">
<h2>Entry Determination</h2>
<div id="entryResult">
<p style="color:var(--dim)">Enter parameters and click Calculate.</p>
</div>
</div>
</div>
</div>
</main>

<script>
let turnDir='right';
let efcInterval=null;
let efcSeconds=0;
let efcRunning=false;

function setTurnDir(btn){
  document.querySelectorAll('.toggle-row .toggle-btn').forEach(b=>b.classList.remove('active'));
  btn.classList.add('active');
  turnDir=btn.dataset.val;
  calculate();
}

document.getElementById('legType').addEventListener('change',function(){
  document.getElementById('legDistance').disabled=this.value==='time';
});

['inboundCourse','aircraftHeading','altitude','airspeed','windDir','windSpeed'].forEach(id=>{
  document.getElementById(id).addEventListener('input',()=>calculate());
});

function normAngle(a){a=a%360;return a<0?a+360:a;}

function calculate(){
  const inbound=normAngle(parseFloat(document.getElementById('inboundCourse').value)||0);
  const heading=normAngle(parseFloat(document.getElementById('aircraftHeading').value)||0);
  const alt=parseFloat(document.getElementById('altitude').value)||0;
  const kias=parseFloat(document.getElementById('airspeed').value)||180;
  const isRight=turnDir==='right';

  // Outbound course is reciprocal of inbound
  const outbound=normAngle(inbound+180);

  // Determine entry sector
  // For standard (right turns): looking from the fix along the inbound course
  // The sector boundaries are at inbound-70 (teardrop/parallel boundary) on the non-holding side
  // Direct sector: from outbound heading, sweeping 110 degrees on the holding side
  // Teardrop: 70 degrees on the holding side of the inbound course reciprocal
  // Parallel: remaining sector

  let relBearing=normAngle(heading-inbound);

  let entryType,sectorAngle;

  if(isRight){
    // Right turns: holding pattern is to the right of inbound course
    // Sector boundaries relative to inbound course:
    // Parallel: heading is in sector from inbound+180 to inbound+180+110 (going left/CCW)
    // which is the same as: relBearing from 180 to 290 (mod 360) -> actually from 70 to 180 counting differently
    // Let me use standard method:
    // Relative bearing = heading - outbound course (normalized)
    let rel=normAngle(heading-outbound);
    // Direct: rel from 0 to 180+70=250... no wait, standard method:
    // Draw a line from fix along outbound. The holding side (right for standard) and non-holding side.
    // Boundary 1: 70 degrees from inbound toward non-holding side
    // The three sectors when approaching fix:
    // Think of it as: relative to the INBOUND course
    // For right turns:
    //   Direct: aircraft heading such that it arrives from the holding side (right of inbound)
    //   Range: heading within outbound -70 to outbound +180 (i.e., inbound+110 to inbound)
    //   Actually, the standard depiction:
    //   Sector 1 (Direct): 0 to 110 degrees right of outbound = outbound to outbound+110 (bearing FROM fix perspective)
    //   Hmm, let me reconsider from the pilot perspective.

    // Standard approach: relative bearing from fix
    // The aircraft is approaching the fix. Its heading relative to the inbound course determines sector.
    // relBearing = heading - inbound (normalized 0-360)
    // For RIGHT turns:
    //   Direct: relBearing from 0 (on course) to 110 going clockwise, AND from 360 back to ~290
    //   Wait no. Let me just use the angular test.

    // Let's define: theta = normAngle(heading - inbound)
    // For standard (right) holding:
    //   Direct entry: theta from 0 to 110  (heading within 110 right of inbound)
    //            AND: theta from 290 to 360 is ALSO direct? No...
    // Actually the correct boundaries:
    // Imagine you're at the fix. The inbound course comes from one direction.
    // The fix has a line along the inbound course and a line 70 degrees to the right of the reciprocal.
    // These two lines create three sectors.

    // Recip = outbound = inbound + 180
    // Boundary line at outbound + 70 (to the right for standard)
    // And the inbound course line itself.

    // The sectors (for right turns):
    //   Parallel: between inbound+180 and inbound+180+70 = between outbound and outbound+70 (going CW)
    //   Teardrop: between outbound+70 and inbound (going CW from outbound+70 through 360 back to inbound)
    //   Direct: between inbound and outbound (going CW)

    // But wait, that's the sector the aircraft approaches FROM. So we need to check the reciprocal of heading.
    // Actually no - we check where the aircraft's current heading falls relative to these sectors.
    // The heading IS what matters - it represents where you're going, and entry is based on your heading as you arrive.

    // Let me use the simplest correct formulation:
    // For standard RIGHT holding on inbound course C:
    // outbound O = C + 180
    // boundary B = O + 70 = C + 250
    // Sector check using aircraft heading H:
    // angle_from_outbound = normAngle(H - O)
    // If angle_from_outbound >= 0 and < 70: Parallel entry
    // If angle_from_outbound >= 70 and < 180+70=250: Teardrop... no that's too wide

    // OK let me just use the definitive method:
    // The fix splits into 3 sectors based on heading relative to inbound:
    // rel = normAngle(heading - inbound)
    // For RIGHT turns:
    //   Direct: rel in [0, 110)  -- heading is within 110 degrees RIGHT of inbound
    //   Parallel: rel in [110, 250) -- heading is 110 to 250 right of inbound (i.e., the back/left area)
    //   Teardrop: rel in [250, 360) -- heading is 250 to 360 right of inbound (i.e., slightly left of inbound)

    // Hmm, but that's not quite standard either. Let me think about this from first principles one more time.
    // Standard reference: The holding course is the INBOUND course.
    // At the fix, draw two lines:
    //   Line 1: Along the holding course (inbound) - both directions
    //   Line 2: 70 degrees from the holding course toward the HOLDING SIDE
    // For right turns, the holding side is to the right of the inbound course.
    // So Line 2 goes at inbound + 70 degrees.
    // These lines create 3 sectors. The sectors are determined by where the aircraft is COMING FROM (i.e., reciprocal of heading).
    // Aircraft coming from direction: normAngle(heading + 180)
    // relative_from = normAngle((heading+180) - inbound)

    let comingFrom = normAngle(heading + 180);
    let relFrom = normAngle(comingFrom - inbound);

    // For right turns:
    // Sector boundaries at 0 (along inbound, both ways = 0 and 180) and at 70 degrees right
    // Direct: aircraft coming from the right side = relFrom in (0, 180+70) but we need to exclude parallel/teardrop
    // Actually from the fix looking along the OUTBOUND course:
    // The 70-degree line from the inbound course on the holding side creates:

    // Let me just use the well-known rule:
    // theta = normAngle(heading - inbound)
    // Right turns:
    //   Direct: theta in [0, 130)  -- this doesn't feel right either

    // I'll use the AOPA/FAA standard determination:
    // For RIGHT (standard) holding on course C:
    //   Compute: theta = normAngle(aircraftHeading - C)
    //   if theta is in [0°, 70°) → PARALLEL
    //   Wait no...

    // DEFINITIVE answer from FAA AIM:
    // Let the inbound holding course be C.
    // The outbound course is C+180.
    // At the fix, a line 70° from the outbound on the holding side creates sectors.
    // For right turns, 70° right of outbound = C+180+70 = C+250
    //
    // The three sectors viewed at the fix:
    //   1. Direct sector: the sector on the holding side from C (the inbound) going around through C+250
    //      That means: if you're coming from the holding side
    //   2. Teardrop: from C+250 to C+180 (the 70-degree wedge)
    //   3. Parallel: from C+180 to C (the non-holding side)

    // Using heading (not where you come from):
    // Direct: you're flying generally toward the fix from the holding side
    // theta = normAngle(heading - outbound)
    // Direct: theta in [0, 110)  → includes outbound through outbound+110
    //   i.e., normAngle(heading - (C+180)) in [0, 110)
    //   i.e., heading from C+180 to C+180+110 = C+290
    // Teardrop: theta in [110, 180)
    //   i.e., heading from C+290 to C+360=C
    // Parallel: theta in [180, 360)
    //   i.e., heading from C to C+180

    // Hmm... Let me verify with a classic example:
    // Inbound course 270. Outbound 090.
    // Aircraft heading 270 (flying west, arriving at fix head-on on inbound course).
    // theta = normAngle(270 - 90) = 180. That gives Parallel.
    // But heading 270 on inbound 270 should be DIRECT entry (you're flying the inbound course!).
    // So that formula is wrong.

    // The issue: the heading represents where you're GOING, not coming from.
    // If heading=270 and inbound=270, you're flying along the inbound course toward the fix. That IS direct.

    // Let me reconsider. Using where you're COMING FROM:
    // comingFrom = heading + 180 = 090
    // relFrom = normAngle(090 - 090) = 0 (relative to outbound)
    // In sector [0, 110) → Direct. YES!

    // heading=180 (coming from north, flying south), inbound=270
    // comingFrom = 360/0. relFrom = normAngle(360-90) = 270. Sector [180,360) → Parallel.
    // Actually heading south, inbound west - you'd be coming from the north.
    // In right-turn holding on 270, holding pattern is to the right (north side).
    // Coming from the north (the holding side), heading south... you'd enter from the holding side.
    // That should be direct or parallel. Coming from directly on the holding side, heading 180...
    // The aircraft needs to turn right significantly. This would be parallel entry (fly outbound, parallel to inbound).
    // Hmm, parallel means the aircraft goes outbound on the non-holding side.
    // Actually I think 270 rel means it IS in the parallel sector. Let me re-examine.

    // heading=090 (flying east), inbound=270 (west).
    // comingFrom=270. relFrom=normAngle(270-90)=180.
    // Sector [180,360) → Parallel.
    // But heading 090, inbound 270... you're flying OUTBOUND, away from fix on the outbound course.
    // You'd do a direct entry (turn right into the hold). Actually no - if you arrive at the fix heading 090,
    // you're flying away from the holding pattern. This is actually a parallel entry scenario.
    // Wait - you ARRIVE at the fix heading 090. Inbound is 270 (FROM the east). So the fix is where you are,
    // and the inbound course approaches from the east. You're heading east (outbound direction).
    // To enter the hold (right turns), yes, parallel: overfly fix, fly heading ~090, then turn left back to fix.
    // Actually no, parallel entry is when you fly outbound on the holding side...
    // For heading=090 arriving at fix with inbound=270 right turns: you'd do Direct entry,
    // because you just overfly and turn right into the hold.

    // OK I think the issue is: heading=090, inbound=270 means you're already aligned with the outbound course.
    // Direct entry: overfly fix, turn right to outbound heading, fly outbound, turn right to inbound.
    // That IS direct.

    // I've been confusing myself. Let me use the SIMPLE method that pilots actually use:

    // 1. Picture the holding pattern fix
    // 2. Draw the inbound course through the fix
    // 3. At the fix, rotate 70° to the non-holding side from the inbound course
    //    (for right turns: 70° LEFT of inbound = inbound - 70)
    // 4. This creates three sectors

    // So for RIGHT turns, inbound C:
    //   Boundary line along: C (inbound/outbound extended)
    //   Boundary line along: C - 70 (= C + 290)
    //
    //   Sectors (based on aircraft heading as it arrives at fix):
    //   Starting from C and going clockwise (right/holding side):
    //     From C clockwise to C+290: DIRECT (going all the way around the right side, 290°)
    //     From C+290 clockwise to C+360=C: TEARDROP + PARALLEL split...

    // NO. Two lines make THREE sectors only if one line is split. The inbound/outbound line is one
    // straight line (180° each way) and the 70° line is another straight line. Two straight lines through
    // a point create 4 sectors, but we group them into 3.

    // Two lines through the fix:
    //   Line A: along C (inbound) and C+180 (outbound)
    //   Line B: along C+110 and C+290 (70° from outbound toward holding side for right turns:
    //           outbound is C+180, holding side is right, so C+180-70 = C+110 toward the fix,
    //           and C+180+110=C+290 away. Wait, the 70° line should go through the fix.)

    // I think the standard is simpler than I'm making it:
    // One line: the inbound course extended through the fix (inbound C going one way, outbound C+180 the other)
    // Second line: 70° offset from the inbound on the non-holding side
    // For right turns: non-holding side is LEFT, so the line is at C-70 = C+290
    // This second line also extends through the fix.

    // The two lines create 4 angular sectors, grouped into 3 entry types:
    // Heading of aircraft determines which sector:

    // For RIGHT holding on inbound C:
    //   Line 1: C / C+180
    //   Line 2: C+290 / C+110

    // Sectors (by heading):
    //   DIRECT: heading between C+290 and C (going CW, i.e., the 70° sector),
    //           PLUS heading between C and C+110 (the 110° sector on the right/holding side)
    //           = heading from C+290 to C+110 going CW through C = 180° total
    //   Wait, that's still confusing.

    // Let me just hard-code the well-known formula used in every E6B and aviation app:

    // Standard (right turns):
    // theta = normAngle(heading - (inbound + 180))  // relative to outbound
    // This gives the angle of the heading measured clockwise from the outbound course

    // Direct: theta from 0 to 130 (the heading is within 130° clockwise of outbound...
    //         hmm, but that's > 180° of arc)

    // You know what, let me just implement the most widely accepted algorithm:

    // diff = normAngle(heading - inbound)
    // For RIGHT holding:
    //   if diff >= 0 && diff < 110 → Parallel
    //   Wait no...

    // FINAL APPROACH - using the method from boldmethod.com and most flight training:
    //
    // Step 1: Find the reciprocal of the inbound course (outbound)
    // Step 2: Determine your heading relative to the outbound
    // Step 3: The 70° line on the non-holding side of the inbound creates:
    //
    // For RIGHT turns on inbound course C:
    //   Outbound O = C + 180
    //   On the FIX, looking outbound (along O):
    //     RIGHT side = holding side
    //     LEFT side = non-holding side
    //   The 70° boundary is at O - 70 = C + 110 (measuring from outbound toward non-holding/left side)
    //
    //   diff = normAngle(heading - O)
    //
    //   Direct:   diff in [0°, 180°)  → heading is anywhere on the holding (right) side of the outbound
    //             PLUS the 70° wedge: diff in [290°, 360°) → heading from O-70 to O
    //             Combined: diff in [0°, 180°) OR diff in [290°, 360°)
    //   Teardrop: diff in [180°, 290°) → heading is on non-holding side within 110° of outbound going left
    //             Actually teardrop should be the small 70° sector...
    //
    // OK I realize I keep going back and forth, so let me just verify with 3 known cases:
    //
    // Case 1: Inbound=360/north, right turns. Aircraft heading=360/north.
    //   You're flying north to the fix, inbound course is north. Direct entry. (Textbook direct.)
    //   O=180. diff=normAngle(360-180)=180. So 180 should map to Direct.
    //
    // Case 2: Inbound=360, right. Aircraft heading=180.
    //   Flying south toward fix, will overfly. Need to turn around. This is parallel entry.
    //   O=180. diff=normAngle(180-180)=0.
    //   So 0 should map to Parallel.
    //
    // Case 3: Inbound=360, right. Aircraft heading=250.
    //   Flying southwest. Teardrop entry.
    //   O=180. diff=normAngle(250-180)=70.
    //   So 70 should map to Teardrop.
    //
    // Case 4: Inbound=360, right. Aircraft heading=290.
    //   Flying west-northwest. Could be direct or teardrop boundary.
    //   O=180. diff=normAngle(290-180)=110.
    //   Heading 290 with inbound 360: you're coming from the SE heading NW.
    //   The holding side is the right (east) side of the northbound inbound course.
    //   Coming from the SE... this is the boundary between teardrop and direct.
    //   The 70° line is at inbound-70 = 290 (measuring from inbound toward left/west).
    //   Wait, the standard boundary: from the FIX, draw a line at 70° to the non-holding side of the inbound.
    //   Inbound=360. Non-holding side = left = west.
    //   70° west of inbound = 360-70 = 290.
    //   So heading 290 IS on the boundary. Let's say it's direct for >= boundary.
    //
    // So with diff = normAngle(heading - outbound):
    //   diff=0 → Parallel (case 2) ✓
    //   diff=70 → Teardrop (case 3) ✓
    //   diff=110 → Direct/Teardrop boundary (case 4)
    //   diff=180 → Direct (case 1) ✓
    //
    // Pattern:
    //   Parallel: diff in [0°, 70°)     → 70° sector (non-holding side near outbound... wait)
    //   Actually: diff=0 is heading=outbound. Flying outbound direction = parallel.
    //   diff=70 is teardrop.
    //   diff=110 is boundary.
    //   diff=180 is direct.
    //
    //   So: Parallel: [0, 110)  -- No, that would include teardrop at 70.

    // Hmm. Let me reconsider.
    // diff=0: heading aligned with outbound. You fly outbound past fix, parallel to inbound. = PARALLEL ✓
    // diff=70: heading 70° clockwise from outbound = 250 for inbound 360. That's SW.
    //   Teardrop: you'd fly to the fix, then turn to an outbound heading 30° off from outbound on holding side,
    //   fly for 1 min, then turn inbound. Heading 250 approaching fix... teardrop makes sense.
    // diff=110: heading 110° from outbound = 290. The boundary between teardrop and direct.
    // diff=180: heading opposite outbound = same as inbound = direct ✓
    // diff=250: heading 250° from outbound = 70 (for inbound 360).
    //   Heading 070, inbound 360: approaching from the W, heading NE. The holding side is east.
    //   This should be Direct.
    // diff=350: heading 350° from outbound = 170 (for inbound 360).
    //   Heading 170, approaching from N, heading S, slightly left of outbound = Parallel.
    //
    // So the sectors by diff (normAngle(heading - outbound)):
    //   [0, 110) = sectors near outbound, on non-holding side = mix of PARALLEL and TEARDROP
    //
    // OK final answer - the 70° boundary splits the non-holding side:
    //   PARALLEL: from outbound, going toward non-holding side by 70°
    //     diff in (360-70, 360] U [0, 0] → that doesn't work.
    //
    // Let me try yet another reference angle. Use: diff = normAngle(heading - inbound)
    //   Case 1: heading=360, inbound=360: diff=0 → Direct
    //   Case 2: heading=180, inbound=360: diff=180 → Parallel
    //   Case 3: heading=250, inbound=360: diff=250 → Teardrop
    //   Case 4: heading=290, inbound=360: diff=290 → boundary Direct/Teardrop
    //   Case 5: heading=070, inbound=360: diff=70 → Direct (from holding side)
    //   Case 6: heading=170, inbound=360: diff=170 → Parallel
    //
    // For RIGHT turns, diff = normAngle(heading - inbound):
    //   Direct: diff in [0, 110) → heading close to inbound, on holding (right) side
    //           PLUS diff in [290, 360) → heading slightly left of inbound (within 70° boundary)
    //   Parallel: diff in [110, 250) → heading going away/outbound direction, non-holding side
    //   Teardrop: diff in [250, 290) → 40° sector between parallel and direct on non-holding side
    //
    // Check: diff=0 → [0,110) → Direct ✓
    //   diff=180 → [110,250) → Parallel ✓
    //   diff=250 → [250,290) → Teardrop ✓
    //   diff=290 → [290,360) → Direct (boundary) ✓
    //   diff=70 → [0,110) → Direct ✓
    //   diff=170 → [110,250) → Parallel ✓
    //
    // That all checks out! And for LEFT turns, it should be mirrored.
    // For LEFT turns, diff = normAngle(heading - inbound):
    //   Direct: diff in (250, 360] and diff in (0, 70]... no, mirror of right means:
    //   Direct: diff in (0, 70] PLUS diff in (250, 360]... no.
    //   Mirror: swap the holding side. For left turns, holding side is LEFT of inbound.
    //   Direct: diff in (250, 360) and (0, 0) → heading on left (holding) side
    //           diff in (0, 70) → heading slightly right of inbound
    //
    //   Actually for left, just flip: 360-diff and use same rules.
    //   leftDiff = normAngle(inbound - heading) = normAngle(360 - diff)
    //   Then apply same right-turn rules to leftDiff.

    let diff, entry;
    if(isRight){
      diff=normAngle(heading-inbound);
      if((diff>=0&&diff<110)||(diff>=290&&diff<360)){
        entry='Direct';
      } else if(diff>=110&&diff<250){
        entry='Parallel';
      } else {
        entry='Teardrop';
      }
    } else {
      // Left turns: mirror
      diff=normAngle(inbound-heading);
      if((diff>=0&&diff<110)||(diff>=290&&diff<360)){
        entry='Direct';
      } else if(diff>=110&&diff<250){
        entry='Parallel';
      } else {
        entry='Teardrop';
      }
    }

    sectorAngle=diff;
    entryType=entry;
  }

  // Leg time
  const legTime=alt<=14000?1:1.5;
  const legType=document.getElementById('legType').value;
  const legDist=parseFloat(document.getElementById('legDistance').value)||5;

  // Wind correction
  const windDir=parseFloat(document.getElementById('windDir').value)||0;
  const windSpeed=parseFloat(document.getElementById('windSpeed').value)||0;
  let windCorrection=0;
  let windResultHtml='';
  if(windSpeed>0){
    const crosswindAngle=normAngle(windDir-inbound);
    const crosswind=windSpeed*Math.sin(crosswindAngle*Math.PI/180);
    const headwind=windSpeed*Math.cos(crosswindAngle*Math.PI/180);
    windCorrection=Math.round(Math.asin(Math.min(1,Math.abs(crosswind)/kias))*180/Math.PI);
    if(crosswind>0) windCorrection=-windCorrection; // correct into wind
    const tripleCorrection=windCorrection*3; // triple correction outbound
    windResultHtml=`
      <div class="info-row"><span class="info-label">Crosswind component</span><span>${Math.abs(Math.round(crosswind))} kts ${crosswind>0?'from right':'from left'}</span></div>
      <div class="info-row"><span class="info-label">Headwind component</span><span>${Math.round(headwind)} kts ${headwind>0?'headwind':'tailwind'}</span></div>
      <div class="info-row"><span class="info-label">Inbound correction</span><span>${windCorrection>0?'+':''}${windCorrection}°</span></div>
      <div class="info-row"><span class="info-label">Outbound correction (3x)</span><span>${tripleCorrection>0?'+':''}${tripleCorrection}°</span></div>
    `;
    const wr=document.getElementById('windResult');
    wr.innerHTML=windResultHtml;
    wr.style.display='block';
  } else {
    document.getElementById('windResult').style.display='none';
  }

  // Update result
  const colorClass=entryType==='Direct'?'entry-direct':entryType==='Teardrop'?'entry-teardrop':'entry-parallel';
  document.getElementById('entryResult').innerHTML=`
    <div class="result-box">
      <h3 class="${colorClass}" style="font-size:20px;margin-bottom:12px">${entryType} Entry</h3>
      <div class="info-row"><span class="info-label">Inbound course</span><span>${String(Math.round(inbound)).padStart(3,'0')}°</span></div>
      <div class="info-row"><span class="info-label">Outbound course</span><span>${String(Math.round(normAngle(inbound+180))).padStart(3,'0')}°</span></div>
      <div class="info-row"><span class="info-label">Aircraft heading</span><span>${String(Math.round(heading)).padStart(3,'0')}°</span></div>
      <div class="info-row"><span class="info-label">Turn direction</span><span>${isRight?'Standard (Right)':'Non-Standard (Left)'}</span></div>
      <div class="info-row"><span class="info-label">Leg time</span><span>${legType==='time'?legTime+' min':legDist+' nm'}</span></div>
      <div class="info-row"><span class="info-label">Altitude</span><span>${alt.toLocaleString()} ft MSL</span></div>
      ${entryType==='Direct'?'<p style="margin-top:12px;font-size:13px;color:var(--dim)">Fly to the fix, turn right (or left for non-standard) to fly the outbound leg, then turn to intercept the inbound course.</p>':''}
      ${entryType==='Teardrop'?'<p style="margin-top:12px;font-size:13px;color:var(--dim)">Fly to the fix, turn to a heading 30° offset from the outbound on the holding side, fly for the leg time/distance, then turn to intercept the inbound course.</p>':''}
      ${entryType==='Parallel'?'<p style="margin-top:12px;font-size:13px;color:var(--dim)">Fly to the fix, turn to fly outbound parallel to the inbound course (on the non-holding side), then turn back toward the fix and intercept the inbound course.</p>':''}
    </div>
  `;

  drawHoldingPattern(inbound,heading,isRight,entryType);
  saveSettings();
}

function drawHoldingPattern(inbound,heading,isRight,entryType){
  const canvas=document.getElementById('holdCanvas');
  const dpr=window.devicePixelRatio||1;
  const rect=canvas.getBoundingClientRect();
  canvas.width=rect.width*dpr;
  canvas.height=rect.width*dpr;
  canvas.style.height=rect.width+'px';
  const ctx=canvas.getContext('2d');
  ctx.scale(dpr,dpr);
  const W=rect.width;
  const H=W;
  const cx=W/2, cy=H/2;

  ctx.fillStyle='#0a1018';
  ctx.fillRect(0,0,W,H);

  const toRad=d=>d*Math.PI/180;
  // Draw compass rose
  ctx.strokeStyle='#1a2535';
  ctx.lineWidth=0.5;
  for(let i=0;i<360;i+=30){
    const r1=Math.min(W,H)*0.42;
    const r2=Math.min(W,H)*0.45;
    const a=toRad(i-90);
    ctx.beginPath();
    ctx.moveTo(cx+r1*Math.cos(a),cy+r1*Math.sin(a));
    ctx.lineTo(cx+r2*Math.cos(a),cy+r2*Math.sin(a));
    ctx.stroke();
    ctx.fillStyle='#64748b';
    ctx.font='11px JetBrains Mono';
    ctx.textAlign='center';
    ctx.textBaseline='middle';
    const rt=Math.min(W,H)*0.47;
    ctx.fillText(i===0?'N':i===90?'E':i===180?'S':i===270?'W':String(i),cx+rt*Math.cos(a),cy+rt*Math.sin(a));
  }

  // Draw sector shading
  const outbound=normAngle(inbound+180);
  const sectorRadius=Math.min(W,H)*0.38;

  // Draw the three sectors
  // For right turns: boundary1 = inbound (extended both ways), boundary2 = inbound+290 and inbound+110
  // Sector angles (in canvas coords where 0=east, measured CW):
  // Canvas angle = heading - 90 (since 0° heading = north = -90° canvas)
  function hdgToCanvas(h){return toRad(h-90);}

  // Sector fills
  const sectors=[
    {start:inbound,end:normAngle(inbound+110),color:'rgba(16,185,129,0.08)',label:'Direct'},
    {start:normAngle(inbound+110),end:normAngle(inbound+250),color:'rgba(0,212,255,0.08)',label:'Parallel'},
    {start:normAngle(inbound+250),end:normAngle(inbound+290),color:'rgba(255,102,0,0.08)',label:'Teardrop'},
    {start:normAngle(inbound+290),end:inbound===0?360:inbound,color:'rgba(16,185,129,0.08)',label:'Direct'}
  ];

  if(!isRight){
    // Mirror sectors for left turns
    sectors[0]={start:normAngle(inbound-110),end:inbound,color:'rgba(16,185,129,0.08)',label:'Direct'};
    sectors[1]={start:normAngle(inbound-250),end:normAngle(inbound-110),color:'rgba(0,212,255,0.08)',label:'Parallel'};
    sectors[2]={start:normAngle(inbound-290),end:normAngle(inbound-250),color:'rgba(255,102,0,0.08)',label:'Teardrop'};
    sectors[3]={start:inbound,end:normAngle(inbound-290+360),color:'rgba(16,185,129,0.08)',label:'Direct'};
  }

  sectors.forEach(s=>{
    ctx.fillStyle=s.color;
    ctx.beginPath();
    ctx.moveTo(cx,cy);
    let a1=hdgToCanvas(s.start);
    let a2=hdgToCanvas(s.end);
    if(a2<a1) a2+=Math.PI*2;
    ctx.arc(cx,cy,sectorRadius,a1,a2);
    ctx.closePath();
    ctx.fill();
  });

  // Draw boundary lines
  ctx.setLineDash([6,4]);
  ctx.lineWidth=1;
  // Inbound/outbound line
  ctx.strokeStyle='#e2e8f0';
  ctx.beginPath();
  ctx.moveTo(cx+sectorRadius*Math.cos(hdgToCanvas(inbound)),cy+sectorRadius*Math.sin(hdgToCanvas(inbound)));
  ctx.lineTo(cx+sectorRadius*Math.cos(hdgToCanvas(outbound)),cy+sectorRadius*Math.sin(hdgToCanvas(outbound)));
  ctx.stroke();

  // 70° boundary line
  ctx.strokeStyle='var(--orange)';
  const bAngle1=isRight?normAngle(inbound+290):normAngle(inbound-290+360);
  const bAngle2=isRight?normAngle(inbound+110):normAngle(inbound-110);
  ctx.beginPath();
  ctx.moveTo(cx+sectorRadius*Math.cos(hdgToCanvas(bAngle1)),cy+sectorRadius*Math.sin(hdgToCanvas(bAngle1)));
  ctx.lineTo(cx+sectorRadius*Math.cos(hdgToCanvas(bAngle2)),cy+sectorRadius*Math.sin(hdgToCanvas(bAngle2)));
  ctx.stroke();
  ctx.setLineDash([]);

  // 70° label
  ctx.fillStyle='#ff6600';
  ctx.font='11px JetBrains Mono';
  const labelAngle=isRight?normAngle(inbound+280):normAngle(inbound-280+360);
  ctx.fillText('70°',cx+(sectorRadius*0.55)*Math.cos(hdgToCanvas(labelAngle)),cy+(sectorRadius*0.55)*Math.sin(hdgToCanvas(labelAngle)));

  // Draw holding pattern (racetrack)
  const patLen=80;
  const patWidth=40;
  // The hold is along the inbound course, on the holding side
  const inbAngle=hdgToCanvas(inbound);
  const outbAngle=hdgToCanvas(outbound);
  const holdOffset=isRight?toRad(90):toRad(-90); // perpendicular offset toward holding side
  const perpAngle=inbAngle+(isRight?-Math.PI/2:Math.PI/2);

  // Fix position = center
  // Inbound leg: from (cx - patLen*cos, cy - patLen*sin) to (cx, cy)
  // Turn radius center for the fix-end turn
  const fixX=cx, fixY=cy;
  const ib_dx=Math.cos(inbAngle), ib_dy=Math.sin(inbAngle);
  const perp_dx=Math.cos(perpAngle), perp_dy=Math.sin(perpAngle);

  const turnR=patWidth/2;
  // Inbound leg start
  const ibStartX=fixX-patLen*ib_dx, ibStartY=fixY-patLen*ib_dy;

  // Turn centers
  const tc1x=fixX+turnR*perp_dx, tc1y=fixY+turnR*perp_dy; // fix end
  const tc2x=ibStartX+turnR*perp_dx, tc2y=ibStartY+turnR*perp_dy; // far end

  // Outbound leg (offset by patWidth in perp direction)
  const obStartX=fixX+patWidth*perp_dx, obStartY=fixY+patWidth*perp_dy;
  const obEndX=ibStartX+patWidth*perp_dx, obEndY=ibStartY+patWidth*perp_dy;

  ctx.strokeStyle='#00d4ff';
  ctx.lineWidth=2.5;

  // Draw racetrack
  // Inbound leg
  ctx.beginPath();
  ctx.moveTo(ibStartX,ibStartY);
  ctx.lineTo(fixX,fixY);
  ctx.stroke();

  // Outbound leg
  ctx.beginPath();
  ctx.moveTo(obStartX,obStartY);
  ctx.lineTo(obEndX,obEndY);
  ctx.stroke();

  // Turn at fix end
  const fixTurnStart=inbAngle+(isRight?0:0);
  const fixTurnEnd=inbAngle+(isRight?-Math.PI:Math.PI);
  ctx.beginPath();
  if(isRight){
    ctx.arc(tc1x,tc1y,turnR,inbAngle+Math.PI,inbAngle,true);
  } else {
    ctx.arc(tc1x,tc1y,turnR,inbAngle+Math.PI,inbAngle,false);
  }
  ctx.stroke();

  // Turn at far end
  ctx.beginPath();
  if(isRight){
    ctx.arc(tc2x,tc2y,turnR,inbAngle,inbAngle+Math.PI,true);
  } else {
    ctx.arc(tc2x,tc2y,turnR,inbAngle,inbAngle+Math.PI,false);
  }
  ctx.stroke();

  // Inbound arrow
  ctx.fillStyle='#00d4ff';
  const arrowX=fixX-30*ib_dx, arrowY=fixY-30*ib_dy;
  ctx.beginPath();
  ctx.moveTo(arrowX+10*ib_dx,arrowY+10*ib_dy);
  ctx.lineTo(arrowX+6*perp_dx,arrowY+6*perp_dy);
  ctx.lineTo(arrowX-6*perp_dx,arrowY-6*perp_dy);
  ctx.closePath();
  ctx.fill();

  // Labels
  ctx.fillStyle='#e2e8f0';
  ctx.font='bold 12px JetBrains Mono';
  ctx.textAlign='center';
  const midIbX=(ibStartX+fixX)/2-15*perp_dx;
  const midIbY=(ibStartY+fixY)/2-15*perp_dy;
  ctx.fillText('INBOUND',midIbX,midIbY);
  ctx.fillText(String(Math.round(inbound)).padStart(3,'0')+'°',midIbX,midIbY+14);

  const midObX=(obStartX+obEndX)/2+15*perp_dx;
  const midObY=(obStartY+obEndY)/2+15*perp_dy;
  ctx.fillText('OUTBOUND',midObX,midObY);

  // Draw fix
  ctx.fillStyle='#ff6600';
  ctx.beginPath();
  ctx.arc(fixX,fixY,6,0,Math.PI*2);
  ctx.fill();
  ctx.fillStyle='#e2e8f0';
  ctx.font='bold 12px JetBrains Mono';
  ctx.textAlign='left';
  ctx.fillText('FIX',fixX+10,fixY-10);

  // Draw aircraft
  const acDist=sectorRadius*0.7;
  const acAngle=hdgToCanvas(normAngle(heading+180)); // coming from opposite of heading
  const acX=fixX+acDist*Math.cos(acAngle);
  const acY=fixY+acDist*Math.sin(acAngle);
  const acHdgAngle=hdgToCanvas(heading);

  // Aircraft symbol
  ctx.save();
  ctx.translate(acX,acY);
  ctx.rotate(acHdgAngle+Math.PI/2);
  ctx.fillStyle='#e2e8f0';
  ctx.beginPath();
  ctx.moveTo(0,-14);
  ctx.lineTo(-5,8);
  ctx.lineTo(0,4);
  ctx.lineTo(5,8);
  ctx.closePath();
  ctx.fill();
  // Wings
  ctx.fillRect(-12,-2,24,3);
  // Tail
  ctx.fillRect(-6,5,12,2);
  ctx.restore();

  // Aircraft heading label
  ctx.fillStyle='#e2e8f0';
  ctx.font='11px JetBrains Mono';
  ctx.textAlign='center';
  ctx.fillText('HDG '+String(Math.round(heading)).padStart(3,'0')+'°',acX,acY+22);

  // Draw entry path
  ctx.setLineDash([4,4]);
  ctx.lineWidth=2;
  const entryColor=entryType==='Direct'?'#10b981':entryType==='Teardrop'?'#ff6600':'#00d4ff';
  ctx.strokeStyle=entryColor;
  ctx.beginPath();
  ctx.moveTo(acX,acY);
  ctx.lineTo(fixX,fixY);
  ctx.stroke();

  // Entry type arrow at fix
  if(entryType==='Direct'){
    // Arrow curving into the hold turn
    ctx.beginPath();
    ctx.moveTo(fixX,fixY);
    const directTarget=isRight?
      {x:fixX+30*Math.cos(perpAngle),y:fixY+30*Math.sin(perpAngle)}:
      {x:fixX+30*Math.cos(perpAngle),y:fixY+30*Math.sin(perpAngle)};
    ctx.quadraticCurveTo(fixX+15*Math.cos(outbAngle)+15*Math.cos(perpAngle),
                          fixY+15*Math.sin(outbAngle)+15*Math.sin(perpAngle),
                          obStartX,obStartY);
    ctx.stroke();
  } else if(entryType==='Teardrop'){
    const tearAngle=isRight?outbAngle-toRad(30):outbAngle+toRad(30);
    ctx.beginPath();
    ctx.moveTo(fixX,fixY);
    ctx.lineTo(fixX+60*Math.cos(tearAngle),fixY+60*Math.sin(tearAngle));
    ctx.stroke();
  } else {
    // Parallel
    ctx.beginPath();
    ctx.moveTo(fixX,fixY);
    ctx.lineTo(fixX+60*Math.cos(outbAngle),fixY+60*Math.sin(outbAngle));
    ctx.stroke();
    // Then turn back
    ctx.beginPath();
    const pEnd={x:fixX+60*Math.cos(outbAngle),y:fixY+60*Math.sin(outbAngle)};
    ctx.moveTo(pEnd.x,pEnd.y);
    ctx.quadraticCurveTo(pEnd.x+30*Math.cos(perpAngle),pEnd.y+30*Math.sin(perpAngle),fixX,fixY);
    ctx.stroke();
  }
  ctx.setLineDash([]);

  // Entry type label
  ctx.fillStyle=entryColor;
  ctx.font='bold 14px JetBrains Mono';
  ctx.textAlign='left';
  ctx.fillText(entryType.toUpperCase()+' ENTRY',12,H-12);

  // Sector labels
  ctx.font='11px JetBrains Mono';
  ctx.textAlign='center';
  const directMid=isRight?normAngle(inbound+55):normAngle(inbound-55);
  const parallelMid=isRight?normAngle(inbound+180):normAngle(inbound-180);
  const tearMid=isRight?normAngle(inbound+270):normAngle(inbound-270);
  const lr=sectorRadius*0.75;
  ctx.fillStyle='rgba(16,185,129,0.6)';
  ctx.fillText('DIRECT',cx+lr*Math.cos(hdgToCanvas(directMid)),cy+lr*Math.sin(hdgToCanvas(directMid)));
  ctx.fillStyle='rgba(0,212,255,0.6)';
  ctx.fillText('PARALLEL',cx+lr*Math.cos(hdgToCanvas(parallelMid)),cy+lr*Math.sin(hdgToCanvas(parallelMid)));
  ctx.fillStyle='rgba(255,102,0,0.6)';
  ctx.fillText('TEARDROP',cx+lr*Math.cos(hdgToCanvas(tearMid)),cy+lr*Math.sin(hdgToCanvas(tearMid)));
}

// EFC Timer
function startEFC(){
  if(efcRunning) return;
  const mins=parseInt(document.getElementById('efcMinutes').value)||10;
  if(efcSeconds===0) efcSeconds=mins*60;
  efcRunning=true;
  efcInterval=setInterval(()=>{
    efcSeconds--;
    if(efcSeconds<=0){
      efcSeconds=0;
      stopEFC();
      document.getElementById('efcDisplay').style.color='#ef4444';
      document.getElementById('efcDisplay').textContent='EFC EXPIRED';
      return;
    }
    updateEFCDisplay();
  },1000);
}

function stopEFC(){
  efcRunning=false;
  if(efcInterval) clearInterval(efcInterval);
  efcInterval=null;
}

function resetEFC(){
  stopEFC();
  efcSeconds=0;
  document.getElementById('efcDisplay').style.color='#00d4ff';
  updateEFCDisplay();
}

function updateEFCDisplay(){
  const m=Math.floor(efcSeconds/60);
  const s=efcSeconds%60;
  document.getElementById('efcDisplay').textContent=String(m).padStart(2,'0')+':'+String(s).padStart(2,'0');
  if(efcSeconds<=60&&efcSeconds>0){
    document.getElementById('efcDisplay').style.color='#ef4444';
  } else {
    document.getElementById('efcDisplay').style.color='#00d4ff';
  }
}

function saveSettings(){
  const data={
    inboundCourse:document.getElementById('inboundCourse').value,
    aircraftHeading:document.getElementById('aircraftHeading').value,
    turnDir,
    altitude:document.getElementById('altitude').value,
    legType:document.getElementById('legType').value,
    legDistance:document.getElementById('legDistance').value,
    airspeed:document.getElementById('airspeed').value,
    windDir:document.getElementById('windDir').value,
    windSpeed:document.getElementById('windSpeed').value,
    efcMinutes:document.getElementById('efcMinutes').value
  };
  localStorage.setItem('korb_hold_settings',JSON.stringify(data));
}

function loadSettings(){
  try{
    const data=JSON.parse(localStorage.getItem('korb_hold_settings'));
    if(!data) return;
    document.getElementById('inboundCourse').value=data.inboundCourse||270;
    document.getElementById('aircraftHeading').value=data.aircraftHeading||90;
    turnDir=data.turnDir||'right';
    document.querySelectorAll('.toggle-row .toggle-btn').forEach(b=>{
      b.classList.toggle('active',b.dataset.val===turnDir);
    });
    document.getElementById('altitude').value=data.altitude||6000;
    document.getElementById('legType').value=data.legType||'time';
    document.getElementById('legDistance').value=data.legDistance||5;
    document.getElementById('legDistance').disabled=data.legType==='time';
    document.getElementById('airspeed').value=data.airspeed||180;
    document.getElementById('windDir').value=data.windDir||0;
    document.getElementById('windSpeed').value=data.windSpeed||0;
    document.getElementById('efcMinutes').value=data.efcMinutes||10;
  }catch(e){}
}

function resetAll(){
  localStorage.removeItem('korb_hold_settings');
  document.getElementById('inboundCourse').value=270;
  document.getElementById('aircraftHeading').value=90;
  turnDir='right';
  document.querySelectorAll('.toggle-row .toggle-btn').forEach(b=>{
    b.classList.toggle('active',b.dataset.val==='right');
  });
  document.getElementById('altitude').value=6000;
  document.getElementById('legType').value='time';
  document.getElementById('legDistance').value=5;
  document.getElementById('legDistance').disabled=true;
  document.getElementById('airspeed').value=180;
  document.getElementById('windDir').value=0;
  document.getElementById('windSpeed').value=0;
  document.getElementById('efcMinutes').value=10;
  calculate();
}

window.addEventListener('load',()=>{
  loadSettings();
  calculate();
});

window.addEventListener('resize',()=>calculate());
</script>
