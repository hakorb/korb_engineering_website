<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1, viewport-fit=cover">
<meta name="description" content="Pre-Flight Checklist | Korb Engineering — a free, browser-based aviation engineering tool from Korb Engineering. No signup, no downloads, works on mobile.">
<title>Pre-Flight Checklist | Korb Engineering</title>
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{--bg:#050a0f;--bg1:#0a1018;--bg2:#0f1620;--bg3:#141c28;--border:#1a2535;--accent:#00d4ff;--accentDim:rgba(0,212,255,0.15);--green:#10b981;--red:#ef4444;--yellow:#f59e0b;--orange:#f97316;--text:#e2e8f0;--textDim:rgba(226,232,240,0.45);--font:'JetBrains Mono',monospace}
body{background:var(--bg);color:var(--text);font-family:var(--font);font-size:13px;line-height:1.5;min-height:100vh}
::selection{background:var(--accent);color:var(--bg)}
::-webkit-scrollbar{width:6px}::-webkit-scrollbar-track{background:var(--bg)}::-webkit-scrollbar-thumb{background:var(--border);border-radius:3px}

.app{max-width:1000px;margin:0 auto;padding:16px}
.header{display:flex;align-items:center;justify-content:space-between;padding:16px 0;border-bottom:1px solid var(--border);margin-bottom:16px;flex-wrap:wrap;gap:12px}
.header h1{font-size:18px;font-weight:600;color:var(--accent);letter-spacing:1px}
.header h1 span{color:var(--textDim);font-weight:300}

.tabs{display:flex;gap:4px;margin-bottom:16px;flex-wrap:wrap;overflow-x:auto;-webkit-overflow-scrolling:touch}
.tab{padding:6px 14px;border:1px solid var(--border);background:transparent;color:var(--textDim);font-family:var(--font);font-size:11px;cursor:pointer;border-radius:4px;transition:all .2s;white-space:nowrap}
.tab:hover{border-color:var(--accent);color:var(--text)}
.tab.active{background:var(--accentDim);border-color:var(--accent);color:var(--accent)}

.panel{border:1px solid var(--border);border-radius:6px;background:var(--bg1);padding:16px;margin-bottom:12px}
.panel h2{font-size:14px;font-weight:600;color:var(--accent);margin-bottom:12px}
.panel h3{font-size:12px;font-weight:600;color:var(--text);margin:12px 0 8px}

.stat-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(130px,1fr));gap:8px;margin-bottom:16px}
.stat{padding:10px;border:1px solid var(--border);border-radius:6px;background:var(--bg2);text-align:center}
.stat .label{font-size:9px;color:var(--textDim);text-transform:uppercase}
.stat .value{font-size:18px;font-weight:700;margin-top:2px}

.progress-bar{width:100%;height:8px;background:var(--bg);border-radius:4px;overflow:hidden;margin:8px 0}
.progress-fill{height:100%;border-radius:4px;transition:width .3s}

.checklist-item{display:flex;align-items:flex-start;gap:10px;padding:8px 10px;border:1px solid var(--border);border-radius:4px;margin:4px 0;background:var(--bg2);transition:all .2s}
.checklist-item:hover{border-color:rgba(0,212,255,0.3)}
.checklist-item.pass{border-left:3px solid var(--green);background:rgba(16,185,129,0.05)}
.checklist-item.fail{border-left:3px solid var(--red);background:rgba(239,68,68,0.05)}
.checklist-item.na{border-left:3px solid var(--textDim);opacity:0.6}

.item-text{flex:1;font-size:11px;line-height:1.5}
.item-buttons{display:flex;gap:4px;flex-shrink:0}
.status-btn{width:28px;height:28px;border:1px solid var(--border);background:transparent;color:var(--textDim);font-family:var(--font);font-size:10px;font-weight:700;cursor:pointer;border-radius:4px;display:flex;align-items:center;justify-content:center;transition:all .2s}
.status-btn:hover{border-color:var(--accent)}
.status-btn.active-pass{background:rgba(16,185,129,0.2);border-color:var(--green);color:var(--green)}
.status-btn.active-fail{background:rgba(239,68,68,0.2);border-color:var(--red);color:var(--red)}
.status-btn.active-na{background:rgba(226,232,240,0.1);border-color:var(--textDim);color:var(--textDim)}

.btn{padding:6px 14px;border:1px solid var(--border);background:transparent;color:var(--text);font-family:var(--font);font-size:16px;cursor:pointer;border-radius:4px;transition:all .2s;min-height:44px}
.btn:hover{border-color:var(--accent);color:var(--accent)}
.btn-accent{background:var(--accentDim);border-color:var(--accent);color:var(--accent)}
.btn-red{background:rgba(239,68,68,0.15);border-color:var(--red);color:var(--red)}
.btn-green{background:rgba(16,185,129,0.15);border-color:var(--green);color:var(--green)}
.btn-yellow{background:rgba(245,158,11,0.15);border-color:var(--yellow);color:var(--yellow)}
.btn-sm{padding:4px 10px;font-size:11px;min-height:32px}

.input{background:var(--bg);border:1px solid var(--border);color:var(--text);font-family:var(--font);font-size:16px;padding:6px 10px;border-radius:4px;outline:none;width:100%}
.input:focus{border-color:var(--accent)}
select.input{cursor:pointer}
textarea.input{resize:vertical;min-height:60px}

.form-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:12px}
@media(max-width:600px){.form-grid{grid-template-columns:1fr}.tabs{overflow-x:auto;flex-wrap:nowrap;padding-bottom:4px;-webkit-overflow-scrolling:touch}}

.new-session-form{border:1px solid var(--accent);border-radius:6px;background:var(--bg1);padding:20px;margin-bottom:16px;animation:fadeIn .2s ease}
@keyframes fadeIn{from{opacity:0;transform:translateY(-8px)}to{opacity:1;transform:translateY(0)}}
.new-session-form h2{font-size:14px;font-weight:600;color:var(--accent);margin-bottom:14px}
.new-session-form .form-actions{display:flex;gap:8px;justify-content:flex-end;margin-top:14px}
.form-group{display:flex;flex-direction:column;gap:3px}
.form-group label{font-size:16px;color:var(--textDim);text-transform:uppercase}

.phase-nav{display:flex;gap:4px;flex-wrap:wrap;margin-bottom:12px}
.phase-btn{padding:4px 10px;border:1px solid var(--border);background:transparent;color:var(--textDim);font-family:var(--font);font-size:9px;cursor:pointer;border-radius:3px;transition:all .2s;position:relative}
.phase-btn:hover{border-color:var(--accent);color:var(--text)}
.phase-btn.active{background:var(--accentDim);border-color:var(--accent);color:var(--accent)}
.phase-btn.complete{border-color:var(--green)}
.phase-btn .dot{position:absolute;top:-2px;right:-2px;width:6px;height:6px;border-radius:50%}

.session-card{padding:10px;border:1px solid var(--border);border-radius:6px;background:var(--bg2);margin:6px 0;cursor:pointer;transition:all .2s}
.session-card:hover{border-color:var(--accent)}

/* Emergency procedure cards */
.emergency-card{border:1px solid var(--red);border-radius:6px;background:rgba(239,68,68,0.05);padding:14px;margin:8px 0;cursor:pointer;transition:all .2s}
.emergency-card:hover{border-color:var(--red);background:rgba(239,68,68,0.1)}
.emergency-card h3{color:var(--red);font-size:13px;margin:0 0 4px}
.emergency-card .subtitle{color:var(--textDim);font-size:10px}
.emergency-steps{display:none;margin-top:10px;padding-top:10px;border-top:1px solid rgba(239,68,68,0.2)}
.emergency-card.open .emergency-steps{display:block}
.emergency-step{padding:6px 10px;border-left:2px solid var(--red);margin:4px 0;font-size:11px;background:rgba(239,68,68,0.03)}
.emergency-step.critical{background:rgba(239,68,68,0.12);font-weight:600;color:var(--red)}
.emergency-step.memory{background:rgba(245,158,11,0.1);border-left-color:var(--yellow);color:var(--yellow);font-weight:600}

/* IMSAFE cards */
.imsafe-item{display:flex;align-items:center;gap:12px;padding:12px;border:1px solid var(--border);border-radius:6px;background:var(--bg2);margin:6px 0;transition:all .2s}
.imsafe-item .letter{width:36px;height:36px;display:flex;align-items:center;justify-content:center;border-radius:6px;font-size:16px;font-weight:700;border:1px solid var(--border);flex-shrink:0}
.imsafe-item .info{flex:1}
.imsafe-item .info .title{font-size:12px;font-weight:600}
.imsafe-item .info .desc{font-size:10px;color:var(--textDim);margin-top:2px}
.imsafe-toggle{display:flex;gap:4px}
.imsafe-btn{padding:6px 12px;border:1px solid var(--border);background:transparent;color:var(--textDim);font-family:var(--font);font-size:11px;cursor:pointer;border-radius:4px;transition:all .2s;min-height:36px}
.imsafe-btn:hover{border-color:var(--accent)}
.imsafe-btn.go{background:rgba(16,185,129,0.2);border-color:var(--green);color:var(--green)}
.imsafe-btn.nogo{background:rgba(239,68,68,0.2);border-color:var(--red);color:var(--red)}

/* Squawk list */
.squawk-item{padding:10px;border:1px solid var(--border);border-radius:6px;background:var(--bg2);margin:6px 0}
.squawk-item.open-squawk{border-left:3px solid var(--red)}
.squawk-item.deferred{border-left:3px solid var(--yellow)}
.squawk-item.resolved{border-left:3px solid var(--green);opacity:0.7}
.squawk-header{display:flex;justify-content:space-between;align-items:flex-start;gap:8px;flex-wrap:wrap}
.squawk-badge{display:inline-block;padding:2px 6px;border-radius:3px;font-size:9px;font-weight:600;text-transform:uppercase}

/* Weather minimums */
.wx-result{padding:12px;border-radius:6px;margin:8px 0;font-size:12px}
.wx-go{background:rgba(16,185,129,0.1);border:1px solid var(--green);color:var(--green)}
.wx-caution{background:rgba(245,158,11,0.1);border:1px solid var(--yellow);color:var(--yellow)}
.wx-nogo{background:rgba(239,68,68,0.1);border:1px solid var(--red);color:var(--red)}

/* Inspection tracker */
.insp-item{display:flex;align-items:center;gap:12px;padding:12px;border:1px solid var(--border);border-radius:6px;background:var(--bg2);margin:6px 0;flex-wrap:wrap}
.insp-item .insp-name{font-size:12px;font-weight:600;min-width:140px}
.insp-item .insp-dates{flex:1;display:flex;gap:12px;flex-wrap:wrap;font-size:11px}
.insp-countdown{padding:4px 8px;border-radius:4px;font-size:11px;font-weight:600;white-space:nowrap}
.insp-ok{background:rgba(16,185,129,0.15);color:var(--green)}
.insp-warn{background:rgba(245,158,11,0.15);color:var(--yellow)}
.insp-overdue{background:rgba(239,68,68,0.15);color:var(--red)}

/* Photo documentation */
.photo-note{padding:10px;border:1px solid var(--border);border-radius:6px;background:var(--bg2);margin:6px 0}
.photo-note img{max-width:100%;border-radius:4px;margin-top:8px;border:1px solid var(--border)}
.photo-note .photo-meta{font-size:10px;color:var(--textDim);margin-top:4px}

.korb-badge{position:fixed;bottom:10px;right:10px;font-size:10px;color:#00d4ff;opacity:0.5;font-family:'JetBrains Mono',monospace;pointer-events:none;z-index:9999}

/* Print styles */
@media print{
  *{background:white!important;color:black!important;border-color:#ccc!important;box-shadow:none!important}
  body{font-size:10px;background:white!important}
  .app{max-width:100%;padding:0}
  .header h1{color:black!important;font-size:16px}
  .header h1 span{color:#666!important}
  .tabs,.korb-badge,.btn,.status-btn,.item-buttons,.phase-nav,.form-actions,.new-session-form{display:none!important}
  .panel{border:1px solid #ccc;page-break-inside:avoid;padding:8px;margin-bottom:8px}
  .panel h2{color:black!important;font-size:12px;border-bottom:1px solid #ccc;padding-bottom:4px}
  .checklist-item{border:none;border-bottom:1px dotted #ccc;padding:4px 0;margin:0;page-break-inside:avoid}
  .checklist-item::before{content:'[ ] ';font-weight:bold}
  .checklist-item.pass::before{content:'[X] '}
  .checklist-item.fail::before{content:'[!] '}
  .checklist-item.na::before{content:'[-] '}
  .checklist-item .item-text{font-size:9px}
  .stat-grid{display:flex;gap:12px;flex-wrap:wrap}
  .stat{border:1px solid #ccc;padding:6px;min-width:80px}
  .stat .value{font-size:14px}
  .progress-bar{height:4px;border:1px solid #ccc}
  .progress-fill{background:#333!important}
  .emergency-card{border:2px solid black;padding:8px}
  .emergency-card h3{color:black!important;font-size:11px}
  .emergency-steps{display:block!important}
  .emergency-step{border-left:2px solid black;padding:3px 8px;font-size:9px}
  .emergency-step.critical{font-weight:bold}
  .emergency-step.memory{font-style:italic}
  .squawk-item{page-break-inside:avoid}
  .insp-item{page-break-inside:avoid}
  .imsafe-item{page-break-inside:avoid}
  .photo-note img{max-width:200px}
  @page{margin:0.5in;size:letter}
  .print-header{display:block!important;text-align:center;margin-bottom:12px;border-bottom:2px solid black;padding-bottom:8px}
  .print-header h1{font-size:14px;margin:0}
  .print-header .print-meta{font-size:9px;margin-top:4px}
}
.print-header{display:none}
</style>
</head>

const uid=()=>Date.now().toString(36)+Math.random().toString(36).slice(2,7);

/* ===== AIRCRAFT-SPECIFIC CHECKLIST DATA ===== */

function getPhasesForAircraft(aircraft){
  const overrides=AIRCRAFT_OVERRIDES[aircraft]||{};
  return GENERIC_PHASES.map(function(phase){
    if(overrides[phase.id]){
      return{id:phase.id,name:phase.name,items:overrides[phase.id]};
    }
    return phase;
  });
}

function getActivePHASES(){
  if(currentSession){
    return getPhasesForAircraft(currentSession.aircraft);
  }
  return GENERIC_PHASES;
}

function getPhaseStatus(session,phaseIdx){
  const phases=getPhasesForAircraft(session.aircraft);
  const phase=phases[phaseIdx];
  if(!phase)return{total:0,pass:0,fail:0,na:0,checked:0,pct:0,complete:false,hasFails:false};
  const statuses=session.statuses[phase.id]||{};
  const total=phase.items.length;
  let pass=0,fail=0,na=0;
  for(let i=0;i<total;i++){const s=statuses[i];if(s==='pass')pass++;else if(s==='fail')fail++;else if(s==='na')na++;}
  const checked=pass+fail+na;
  return{total,pass,fail,na,checked,pct:total?Math.round(checked/total*100):0,complete:checked===total,hasFails:fail>0};
}

function getSessionStats(session){
  const phases=getPhasesForAircraft(session.aircraft);
  let totalItems=0,totalChecked=0,totalPass=0,totalFail=0,totalNA=0;
  phases.forEach(function(p,i){var s=getPhaseStatus(session,i);totalItems+=s.total;totalChecked+=s.checked;totalPass+=s.pass;totalFail+=s.fail;totalNA+=s.na;});
  return{totalItems,totalChecked,totalPass,totalFail,totalNA,pct:totalItems?Math.round(totalChecked/totalItems*100):0};
}

window.checkWeather=function(){
  var ceiling=parseFloat(document.getElementById('wx-ceiling').value);
  var vis=parseFloat(document.getElementById('wx-vis').value);
  var wind=parseFloat(document.getElementById('wx-wind').value);
  var gust=parseFloat(document.getElementById('wx-gust').value);
  var xwind=parseFloat(document.getElementById('wx-xwind').value);
  var results=document.getElementById('wx-results');
  if(!results)return;

  var checks=[];

  if(!isNaN(ceiling)&&!isNaN(vis)){
    // VFR check (Class C/D)
    if(ceiling>=1000&&vis>=3){
      checks.push({cls:'wx-go',text:'VFR: GO -- Ceiling '+ceiling+' AGL, Visibility '+vis+' SM meets Class C/D VFR minimums (1000/3)'});
    } else if(ceiling>=500&&vis>=1){
      checks.push({cls:'wx-caution',text:'VFR: NO-GO -- Below VFR minimums. SVFR possible (clear of clouds, 1 SM vis, ATC clearance required)'});
    } else {
      checks.push({cls:'wx-nogo',text:'VFR: NO-GO -- Below VFR and SVFR minimums'});
    }

    // IFR check
    if(!isNaN(ceiling)){
      if(ceiling>=200&&vis>=0.5){
        checks.push({cls:'wx-go',text:'IFR: Meets standard ILS minimums (200/0.5). Check specific approach minimums for your destination.'});
      } else if(ceiling>=100){
        checks.push({cls:'wx-caution',text:'IFR: Below standard ILS. CAT II/III approach may be available at major airports.'});
      } else {
        checks.push({cls:'wx-nogo',text:'IFR: Below CAT I minimums. Check for CAT II/III availability.'});
      }
    }

    // Personal minimums suggestion
    if(ceiling<2000||vis<5){
      checks.push({cls:'wx-caution',text:'Personal Mins: Consider raising personal minimums for safety margin. Suggested student/low-time: 3000/5, Private: 2000/3'});
    }
  }

  if(!isNaN(wind)){
    if(wind>25){
      checks.push({cls:'wx-nogo',text:'Wind: CAUTION -- '+wind+' kts is high for most GA aircraft. Exercise extreme caution.'});
    } else if(wind>20){
      checks.push({cls:'wx-caution',text:'Wind: CAUTION -- '+wind+' kts. Strong winds, verify personal comfort level.'});
    }
  }

  if(!isNaN(gust)&&!isNaN(wind)){
    var spread=gust-wind;
    if(spread>15){
      checks.push({cls:'wx-nogo',text:'Gusts: CAUTION -- '+spread+' kt gust spread. Significant turbulence likely.'});
    } else if(spread>10){
      checks.push({cls:'wx-caution',text:'Gusts: Advisory -- '+spread+' kt gust spread. Moderate turbulence possible.'});
    }
  }

  if(!isNaN(xwind)){
    var limits={'Cessna 172':15,'Cessna 182':15,'Piper Cherokee PA-28':17,'Piper Archer':17,'Beechcraft Bonanza':17,'Cirrus SR22':20,'Diamond DA40':20};
    var acName=currentSession?currentSession.aircraft:'';
    var limit=limits[acName]||15;
    if(xwind>limit){
      checks.push({cls:'wx-nogo',text:'Crosswind: EXCEEDS demonstrated crosswind limit of '+limit+' kts'+(acName?' for '+acName:'')+'. Current: '+xwind+' kts'});
    } else if(xwind>limit*0.7){
      checks.push({cls:'wx-caution',text:'Crosswind: '+xwind+' kts approaching demonstrated limit of '+limit+' kts'+(acName?' for '+acName:'')});
    } else if(xwind>0){
      checks.push({cls:'wx-go',text:'Crosswind: '+xwind+' kts within demonstrated limit of '+limit+' kts'});
    }
  }

  if(checks.length===0){
    results.innerHTML='<div style="color:var(--textDim);font-size:11px;margin-top:8px">Enter ceiling and visibility to check minimums.</div>';
  } else {
    results.innerHTML=checks.map(function(c){return '<div class="wx-result '+c.cls+'">'+c.text+'</div>';}).join('');
  }
};

function renderInspectionItems_inner(){

  return INSPECTION_TYPES.map(function(insp){
    var record=acInsp[insp.id]||{};
    var lastDate=record.lastDate||'';
    var lastHobbs=record.lastHobbs||'';
    var nextDate=record.nextDate||'';
    var notes=record.notes||'';

    var countdown='';
    var countdownCls='';
    if(nextDate){
      var next=new Date(nextDate+'T00:00:00');
      var diffMs=next.getTime()-today.getTime();
      var diffDays=Math.ceil(diffMs/(1000*60*60*24));
      if(diffDays<0){
        countdown='OVERDUE by '+Math.abs(diffDays)+' days';
        countdownCls='insp-overdue';
      } else if(diffDays<=30){
        countdown='Due in '+diffDays+' days';
        countdownCls='insp-warn';

        countdown='Due in '+diffDays+' days';
        countdownCls='insp-ok';

    '  <div style="flex:1;min-width:200px">'+
    '    <div class="insp-name">'+insp.name+'</div>'+
    '    <div style="font-size:9px;color:var(--textDim)">'+insp.desc+'</div>'+
    (countdown?'    <div class="insp-countdown '+countdownCls+'" style="display:inline-block;margin-top:4px">'+countdown+'</div>':'')+
    '  </div>'+
    '  <div class="insp-dates" style="gap:6px">'+
    '    <div class="form-group" style="min-width:120px"><label style="font-size:9px">Last Completed</label><input class="input" type="date" style="font-size:13px;padding:4px 6px" value="'+lastDate+'" onchange="updateInspection(\''+tail+'\',\''+insp.id+'\',\'lastDate\',this.value)"></div>'+
    (insp.id==='100hour'||insp.id==='oil_change'?'    <div class="form-group" style="min-width:100px"><label style="font-size:9px">At Hobbs</label><input class="input" type="number" step="0.1" style="font-size:13px;padding:4px 6px" placeholder="hrs" value="'+lastHobbs+'" onchange="updateInspection(\''+tail+'\',\''+insp.id+'\',\'lastHobbs\',this.value)"></div>':'')+
    '    <div class="form-group" style="min-width:120px"><label style="font-size:9px">Next Due</label><input class="input" type="date" style="font-size:13px;padding:4px 6px" value="'+nextDate+'" onchange="updateInspection(\''+tail+'\',\''+insp.id+'\',\'nextDate\',this.value)"></div>'+
    '  </div>'+
    '</div>';
  }).join('');
}

window.updateInspection=function(tail,inspId,field,value){
  if(!inspections[tail])inspections[tail]={};
  if(!inspections[tail][inspId])inspections[tail][inspId]={};
  inspections[tail][inspId][field]=value;

  // Auto-calculate next due if lastDate is set and interval exists
  if(field==='lastDate'&&value){
    var insp=INSPECTION_TYPES.find(function(i){return i.id===inspId;});
    if(insp&&insp.interval){
      var d=new Date(value+'T00:00:00');
      d.setDate(d.getDate()+insp.interval);
      inspections[tail][inspId].nextDate=d.toISOString().split('T')[0];
    }
  }

  saveInspections();
  var el=document.getElementById('insp-items');
  if(el)el.innerHTML=renderInspectionItems_inner();
};

function renderImsafeHistory(){
  var dates=Object.keys(imsafeData).sort().reverse().slice(0,10);
  if(!dates.length)return '<div style="color:var(--textDim);text-align:center;padding:12px">No history yet.</div>';
  return dates.map(function(date){
    var d=imsafeData[date];
    var items=IMSAFE_ITEMS.map(function(item){
      var st=d[item.letter]||'--';
      var c=st==='go'?'var(--green)':st==='nogo'?'var(--red)':'var(--textDim)';
      return '<span style="color:'+c+';margin-right:8px">'+item.letter+':'+st.toUpperCase()+'</span>';
    }).join('');
    var hasNogo=IMSAFE_ITEMS.some(function(item){return d[item.letter]==='nogo';});
    var allGo=IMSAFE_ITEMS.every(function(item){return d[item.letter]==='go';});
    var badge=hasNogo?'<span style="color:var(--red);font-weight:600">NO-GO</span>':allGo?'<span style="color:var(--green);font-weight:600">GO</span>':'<span style="color:var(--yellow)">INCOMPLETE</span>';
    return '<div style="padding:6px;border-bottom:1px solid var(--border);font-size:10px"><strong>'+date+'</strong> '+badge+' -- '+items+'</div>';
  }).join('');
}

window.setImsafe=function(letter,status){
  var today=new Date().toISOString().split('T')[0];
  if(!imsafeData[today])imsafeData[today]={};
  if(imsafeData[today][letter]===status){
    delete imsafeData[today][letter];
  } else {
    imsafeData[today][letter]=status;
  }
  saveImsafe();
  render();
};

window.clearImsafe=function(){
  var today=new Date().toISOString().split('T')[0];
  delete imsafeData[today];
  saveImsafe();
  render();
};

  '  <div class="form-group"><label>Category</label><select class="input" id="sq-category"><option value="airframe">Airframe</option><option value="engine">Engine</option><option value="avionics">Avionics</option><option value="instruments">Instruments</option><option value="electrical">Electrical</option><option value="landing_gear">Landing Gear</option><option value="propeller">Propeller</option><option value="other">Other</option></select></div>'+
  '</div>'+
  '<div class="form-group" style="margin-bottom:8px"><label>Description</label><textarea class="input" id="sq-desc" placeholder="Describe the discrepancy..." rows="2"></textarea></div>'+
  '<div class="form-grid">'+
  '  <div class="form-group"><label>Severity</label><select class="input" id="sq-severity"><option value="minor">Minor</option><option value="major">Major</option><option value="grounding">Grounding</option></select></div>'+
  '  <div class="form-group"><label>MEL Reference</label><input class="input" id="sq-mel" type="text" placeholder="Optional MEL item #"></div>'+
  '</div>'+
  '<div style="display:flex;justify-content:flex-end;margin-top:8px"><button class="btn btn-accent btn-sm" onclick="addSquawk()">Add Squawk</button></div>'+
  '</div>'+
  renderSquawkItems()+
  '</div>';
}

function renderSquawkItems(){
  if(!squawks.length)return '<div style="color:var(--textDim);text-align:center;padding:20px">No squawks logged.</div>';

  var sorted=squawks.slice().sort(function(a,b){
    var order={open:0,deferred:1,resolved:2};
    if(order[a.status]!==order[b.status])return order[a.status]-order[b.status];
    return new Date(b.date)-new Date(a.date);
  });

  return sorted.map(function(sq){
    var severityColor=sq.severity==='grounding'?'var(--red)':sq.severity==='major'?'var(--yellow)':'var(--textDim)';
    var statusColor=sq.status==='open'?'var(--red)':sq.status==='deferred'?'var(--yellow)':'var(--green)';
    var statusBg=sq.status==='open'?'rgba(239,68,68,0.2)':sq.status==='deferred'?'rgba(245,158,11,0.2)':'rgba(16,185,129,0.2)';

    return '<div class="squawk-item '+sq.status+'-squawk">'+
    '<div class="squawk-header">'+
    '  <div style="flex:1">'+
    '    <div style="font-weight:600;font-size:12px">'+esc(sq.tail||'N/A')+' -- '+esc(sq.category)+'</div>'+
    '    <div style="font-size:11px;margin-top:4px">'+esc(sq.description)+'</div>'+
    '    <div style="font-size:9px;color:var(--textDim);margin-top:4px">'+new Date(sq.date).toLocaleString()+
    (sq.mel?' | MEL: '+esc(sq.mel):'')+
    ' | <span style="color:'+severityColor+'">'+sq.severity.toUpperCase()+'</span></div>'+
    (sq.resolution?'<div style="font-size:10px;color:var(--green);margin-top:4px;border-top:1px solid var(--border);padding-top:4px">Resolution: '+esc(sq.resolution)+'</div>':'')+
    '  </div>'+
    '  <div style="display:flex;flex-direction:column;gap:4px;align-items:flex-end">'+
    '    <span class="squawk-badge" style="color:'+statusColor+';background:'+statusBg+'">'+sq.status+'</span>'+
    '    <div style="display:flex;gap:4px;margin-top:4px">'+
    (sq.status==='open'?'<button class="btn btn-sm btn-yellow" onclick="updateSquawkStatus(\''+sq.id+'\',\'deferred\')" style="font-size:10px;padding:2px 6px;min-height:24px">Defer</button>':'')+
    (sq.status!=='resolved'?'<button class="btn btn-sm btn-green" onclick="resolveSquawk(\''+sq.id+'\')" style="font-size:10px;padding:2px 6px;min-height:24px">Resolve</button>':'')+
    '<button class="btn btn-sm" onclick="deleteSquawk(\''+sq.id+'\')" style="font-size:10px;padding:2px 6px;min-height:24px;color:var(--red)">Del</button>'+
    '    </div>'+
    '  </div>'+
    '</div></div>';
  }).join('');
}

window.addSquawk=function(){
  var tail=(document.getElementById('sq-tail').value||'').trim().toUpperCase();
  var cat=document.getElementById('sq-category').value;
  var desc=document.getElementById('sq-desc').value.trim();
  var sev=document.getElementById('sq-severity').value;
  var mel=document.getElementById('sq-mel').value.trim();
  if(!desc){document.getElementById('sq-desc').focus();return;}
  squawks.push({id:uid(),tail:tail,category:cat,description:desc,severity:sev,mel:mel,status:'open',date:new Date().toISOString(),resolution:''});
  saveSquawks();
  document.getElementById('sq-desc').value='';
  document.getElementById('sq-mel').value='';
  render();
};

window.updateSquawkStatus=function(id,status){
  var sq=squawks.find(function(s){return s.id===id;});
  if(sq){sq.status=status;saveSquawks();render();}
};

window.resolveSquawk=function(id){
  var resolution=prompt('Enter resolution notes:');
  if(resolution===null)return;
  var sq=squawks.find(function(s){return s.id===id;});
  if(sq){sq.status='resolved';sq.resolution=resolution;sq.resolvedDate=new Date().toISOString();saveSquawks();render();}
};

window.deleteSquawk=function(id){
  if(!confirm('Delete this squawk?'))return;
  squawks=squawks.filter(function(s){return s.id!==id;});
  saveSquawks();
  render();
};

/* ===== PHOTO DOCUMENTATION TAB ===== */
function renderPhotos(){
  return '<div class="panel">'+
  '<h2>Photo Documentation</h2>'+
  '<div style="font-size:10px;color:var(--textDim);margin-bottom:12px">Attach photos and notes to inspection items. Photos are stored in your browser.</div>'+
  '<div class="form-grid">'+
  '  <div class="form-group"><label>Tail Number</label><input class="input" id="ph-tail" type="text" placeholder="N12345" value="'+(currentSession?esc(currentSession.tailNumber||''):'')+'" autocapitalize="characters"></div>'+
  '  <div class="form-group"><label>Category</label><select class="input" id="ph-category">'+
  '<option value="preflight">Preflight</option><option value="discrepancy">Discrepancy</option><option value="maintenance">Maintenance</option><option value="damage">Damage</option><option value="condition">General Condition</option></select></div>'+
  '</div>'+
  '<div class="form-group" style="margin-bottom:8px"><label>Description / Notes</label><textarea class="input" id="ph-desc" placeholder="Describe what the photo documents..." rows="2"></textarea></div>'+
  '<div class="form-group" style="margin-bottom:8px"><label>Photo</label><input type="file" id="ph-file" accept="image/*" capture="environment" class="input" style="padding:8px"></div>'+
  '<div style="display:flex;justify-content:flex-end"><button class="btn btn-accent btn-sm" onclick="addPhoto()">Add Photo Note</button></div>'+
  '</div>'+

function renderPhotoItems(){
  if(!photos.length)return '<div style="color:var(--textDim);text-align:center;padding:20px">No photos documented yet.</div>';
  return photos.slice().reverse().map(function(p){
    return '<div class="photo-note">'+
    '<div style="display:flex;justify-content:space-between;align-items:flex-start">'+
    '  <div>'+
    '    <div style="font-weight:600;font-size:12px">'+esc(p.tail||'N/A')+' -- '+esc(p.category)+'</div>'+
    '    <div style="font-size:11px;margin-top:4px">'+esc(p.description)+'</div>'+
    '    <div class="photo-meta">'+new Date(p.date).toLocaleString()+'</div>'+
    '  </div>'+
    '  <button class="btn btn-sm" onclick="deletePhoto(\''+p.id+'\')" style="font-size:10px;padding:2px 6px;min-height:24px;color:var(--red)">Del</button>'+
    '</div>'+
    (p.imageData?'<img src="'+p.imageData+'" alt="Inspection photo" loading="lazy">':'')+
    '</div>';
  }).join('');
}

window.addPhoto=function(){
  var tail=(document.getElementById('ph-tail').value||'').trim().toUpperCase();
  var cat=document.getElementById('ph-category').value;
  var desc=document.getElementById('ph-desc').value.trim();
  var fileInput=document.getElementById('ph-file');

  if(!desc&&!fileInput.files.length){
    document.getElementById('ph-desc').focus();
    return;
  }

  function savePhoto(imageData){
    photos.push({id:uid(),tail:tail,category:cat,description:desc,date:new Date().toISOString(),imageData:imageData||''});
    // Try to save -- if quota exceeded, warn user
    try{
      savePhotos();
    }catch(e){
      if(e.name==='QuotaExceededError'){
        photos.pop();
        alert('Storage quota exceeded. Try deleting old photos or using smaller images.');
        return;
      }
    }
    document.getElementById('ph-desc').value='';
    fileInput.value='';
    render();
  }

  if(fileInput.files.length){
    var reader=new FileReader();
    reader.onload=function(e){
      // Resize image to save localStorage space
      var img=new Image();
      img.onload=function(){
        var canvas=document.createElement('canvas');
        var maxW=800,maxH=600;
        var w=img.width,h=img.height;
        if(w>maxW){h=h*(maxW/w);w=maxW;}
        if(h>maxH){w=w*(maxH/h);h=maxH;}
        canvas.width=w;canvas.height=h;
        var ctx=canvas.getContext('2d');
        ctx.drawImage(img,0,0,w,h);
        savePhoto(canvas.toDataURL('image/jpeg',0.7));
      };
      img.src=e.target.result;
    };
    reader.readAsDataURL(fileInput.files[0]);
  } else {
    savePhoto('');
  }
};

window.deletePhoto=function(id){
  if(!confirm('Delete this photo note?'))return;
  photos=photos.filter(function(p){return p.id!==id;});
  savePhotos();
  render();
};

/* ===== SESSION MANAGEMENT ===== */
let showNewSessionForm=false;

window.newSession=function(){
  showNewSessionForm=true;
  currentSession=null;
  activeTab='checklist';
  render();
  setTimeout(function(){var el=document.getElementById('ns-aircraft');if(el)el.focus();},50);
};

window.cancelNewSession=function(){
  showNewSessionForm=false;
  render();
};

window.submitNewSession=function(){
  var acSelect=document.getElementById('ns-aircraft');
  var acCustom=document.getElementById('ns-aircraft-custom');
  var ac=acSelect.value==='custom'?acCustom.value.trim():acSelect.value;
  if(!ac){acSelect.focus();return;}
  var tail=document.getElementById('ns-tail').value.trim().toUpperCase();
  var pilot=document.getElementById('ns-pilot').value.trim();
  var phases=getPhasesForAircraft(ac);
  var session={id:uid(),aircraft:ac,tailNumber:tail,pilot:pilot,date:new Date().toISOString(),statuses:{}};
  phases.forEach(function(p){session.statuses[p.id]={};});
  data.sessions.push(session);
  save();
  showNewSessionForm=false;
  currentSession=session;
  currentPhase=0;
  activeTab='checklist';
  render();
};

window.onAircraftSelectChange=function(){
  var el=document.getElementById('ns-aircraft-custom-group');
  if(el)el.style.display=document.getElementById('ns-aircraft').value==='custom'?'flex':'none';
  // Show aircraft info
  var infoEl=document.getElementById('ns-aircraft-info');
  var acVal=document.getElementById('ns-aircraft').value;
  if(infoEl){
    if(AIRCRAFT_OVERRIDES[acVal]){
      infoEl.innerHTML='<span style="color:var(--green);font-size:10px">Aircraft-specific checklist available</span>';
    } else if(acVal==='Generic Single Engine'||acVal==='custom'){
      infoEl.innerHTML='<span style="color:var(--textDim);font-size:10px">Using generic checklist</span>';
    } else {
      infoEl.innerHTML='';
    }
  }
};

  return '<div class="new-session-form">'+
  '<h2>New Session</h2>'+
  '<div class="form-grid">'+
  '  <div class="form-group">'+
  '    <label for="ns-aircraft">Aircraft Type</label>'+
  '    <select class="input" id="ns-aircraft" onchange="onAircraftSelectChange()">'+
  '      <option value="" disabled selected>Select aircraft...</option>'+
  AIRCRAFT.map(function(a){return '<option value="'+a+'">'+a+'</option>';}).join('')+
  '      <option value="custom">Other (type below)</option>'+
  '    </select>'+
  '    <div id="ns-aircraft-info"></div>'+
  '  </div>'+
  '  <div class="form-group" id="ns-aircraft-custom-group" style="display:none">'+
  '    <label for="ns-aircraft-custom">Custom Aircraft</label>'+
  '    <input class="input" id="ns-aircraft-custom" type="text" placeholder="e.g. Piper Saratoga">'+
  '  </div>'+
  '  <div class="form-group">'+

}

window.loadSession=function(id){
  currentSession=data.sessions.find(function(s){return s.id===id;});
  currentPhase=0;
  activeTab='checklist';
  render();
};

window.deleteSession=function(id){
  if(!confirm('Delete this session?'))return;
  data.sessions=data.sessions.filter(function(s){return s.id!==id;});
  save();
  if(currentSession&&currentSession.id===id)currentSession=null;
  render();
};

window.setMainTab=function(t){
  activeTab=t;
  if(t!=='checklist')showNewSessionForm=false;
  render();
};

window.setPhase=function(i){
  var PHASES=getActivePHASES();
  if(i>=0&&i<PHASES.length){currentPhase=i;render();}
};

window.setStatus=function(phaseId,itemIdx,status){
  if(!currentSession.statuses[phaseId])currentSession.statuses[phaseId]={};
  var curr=currentSession.statuses[phaseId][itemIdx];
  if(curr===status)delete currentSession.statuses[phaseId][itemIdx];
  else currentSession.statuses[phaseId][itemIdx]=status;
  var si=data.sessions.findIndex(function(s){return s.id===currentSession.id;});
  if(si>=0)data.sessions[si]=currentSession;
  save();render();
};

window.markAllPass=function(){
  var PHASES=getActivePHASES();
  var phase=PHASES[currentPhase];
  if(!currentSession.statuses[phase.id])currentSession.statuses[phase.id]={};
  phase.items.forEach(function(_,i){currentSession.statuses[phase.id][i]='pass';});
  var si=data.sessions.findIndex(function(s){return s.id===currentSession.id;});
  if(si>=0)data.sessions[si]=currentSession;
  save();render();
};

window.clearPhase=function(){
  var PHASES=getActivePHASES();
  var phase=PHASES[currentPhase];
  currentSession.statuses[phase.id]={};
  var si=data.sessions.findIndex(function(s){return s.id===currentSession.id;});
  if(si>=0)data.sessions[si]=currentSession;
  save();render();
};

/* ===== UTILITY ===== */
function esc(s){
  if(!s)return '';
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;').replace(/'/g,'&#39;');
}
