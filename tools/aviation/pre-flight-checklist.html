<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Pre-Flight Checklist | Korb Engineering</title>
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{--bg:#050a0f;--bg1:#0a1018;--bg2:#0f1620;--bg3:#141c28;--border:#1a2535;--accent:#00d4ff;--accentDim:rgba(0,212,255,0.15);--green:#10b981;--red:#ef4444;--yellow:#f59e0b;--text:#e2e8f0;--textDim:rgba(226,232,240,0.45);--font:'JetBrains Mono',monospace}
body{background:var(--bg);color:var(--text);font-family:var(--font);font-size:13px;line-height:1.5;min-height:100vh}
::selection{background:var(--accent);color:var(--bg)}
::-webkit-scrollbar{width:6px}::-webkit-scrollbar-track{background:var(--bg)}::-webkit-scrollbar-thumb{background:var(--border);border-radius:3px}

.app{max-width:1000px;margin:0 auto;padding:16px}
.header{display:flex;align-items:center;justify-content:space-between;padding:16px 0;border-bottom:1px solid var(--border);margin-bottom:16px;flex-wrap:wrap;gap:12px}
.header h1{font-size:18px;font-weight:600;color:var(--accent);letter-spacing:1px}
.header h1 span{color:var(--textDim);font-weight:300}

.tabs{display:flex;gap:4px;margin-bottom:16px;flex-wrap:wrap;overflow-x:auto;-webkit-overflow-scrolling:touch}
.tab{padding:6px 14px;border:1px solid var(--border);background:transparent;color:var(--textDim);font-family:var(--font);font-size:11px;cursor:pointer;border-radius:4px;transition:all .2s;white-space:nowrap}
.tab:hover{border-color:var(--accent);color:var(--text)}
.tab.active{background:var(--accentDim);border-color:var(--accent);color:var(--accent)}

.panel{border:1px solid var(--border);border-radius:6px;background:var(--bg1);padding:16px;margin-bottom:12px}
.panel h2{font-size:14px;font-weight:600;color:var(--accent);margin-bottom:12px}

.stat-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(130px,1fr));gap:8px;margin-bottom:16px}
.stat{padding:10px;border:1px solid var(--border);border-radius:6px;background:var(--bg2);text-align:center}
.stat .label{font-size:9px;color:var(--textDim);text-transform:uppercase}
.stat .value{font-size:18px;font-weight:700;margin-top:2px}

.progress-bar{width:100%;height:8px;background:var(--bg);border-radius:4px;overflow:hidden;margin:8px 0}
.progress-fill{height:100%;border-radius:4px;transition:width .3s}

.checklist-item{display:flex;align-items:flex-start;gap:10px;padding:8px 10px;border:1px solid var(--border);border-radius:4px;margin:4px 0;background:var(--bg2);transition:all .2s}
.checklist-item:hover{border-color:rgba(0,212,255,0.3)}
.checklist-item.pass{border-left:3px solid var(--green);background:rgba(16,185,129,0.05)}
.checklist-item.fail{border-left:3px solid var(--red);background:rgba(239,68,68,0.05)}
.checklist-item.na{border-left:3px solid var(--textDim);opacity:0.6}

.item-text{flex:1;font-size:11px;line-height:1.5}
.item-buttons{display:flex;gap:4px;flex-shrink:0}
.status-btn{width:28px;height:28px;border:1px solid var(--border);background:transparent;color:var(--textDim);font-family:var(--font);font-size:10px;font-weight:700;cursor:pointer;border-radius:4px;display:flex;align-items:center;justify-content:center;transition:all .2s}
.status-btn:hover{border-color:var(--accent)}
.status-btn.active-pass{background:rgba(16,185,129,0.2);border-color:var(--green);color:var(--green)}
.status-btn.active-fail{background:rgba(239,68,68,0.2);border-color:var(--red);color:var(--red)}
.status-btn.active-na{background:rgba(226,232,240,0.1);border-color:var(--textDim);color:var(--textDim)}

.btn{padding:6px 14px;border:1px solid var(--border);background:transparent;color:var(--text);font-family:var(--font);font-size:16px;cursor:pointer;border-radius:4px;transition:all .2s;min-height:44px}
.btn:hover{border-color:var(--accent);color:var(--accent)}
.btn-accent{background:var(--accentDim);border-color:var(--accent);color:var(--accent)}
.btn-red{background:rgba(239,68,68,0.15);border-color:var(--red);color:var(--red)}

.input{background:var(--bg);border:1px solid var(--border);color:var(--text);font-family:var(--font);font-size:16px;padding:6px 10px;border-radius:4px;outline:none;width:100%}
.input:focus{border-color:var(--accent)}
select.input{cursor:pointer}

.form-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:12px}
@media(max-width:600px){.form-grid{grid-template-columns:1fr}.tabs{overflow-x:auto;flex-wrap:nowrap;padding-bottom:4px;-webkit-overflow-scrolling:touch}}

.new-session-form{border:1px solid var(--accent);border-radius:6px;background:var(--bg1);padding:20px;margin-bottom:16px;animation:fadeIn .2s ease}
@keyframes fadeIn{from{opacity:0;transform:translateY(-8px)}to{opacity:1;transform:translateY(0)}}
.new-session-form h2{font-size:14px;font-weight:600;color:var(--accent);margin-bottom:14px}
.new-session-form .form-actions{display:flex;gap:8px;justify-content:flex-end;margin-top:14px}
.form-group{display:flex;flex-direction:column;gap:3px}
.form-group label{font-size:16px;color:var(--textDim);text-transform:uppercase}

.phase-nav{display:flex;gap:4px;flex-wrap:wrap;margin-bottom:12px}
.phase-btn{padding:4px 10px;border:1px solid var(--border);background:transparent;color:var(--textDim);font-family:var(--font);font-size:9px;cursor:pointer;border-radius:3px;transition:all .2s;position:relative}
.phase-btn:hover{border-color:var(--accent);color:var(--text)}
.phase-btn.active{background:var(--accentDim);border-color:var(--accent);color:var(--accent)}
.phase-btn.complete{border-color:var(--green)}
.phase-btn .dot{position:absolute;top:-2px;right:-2px;width:6px;height:6px;border-radius:50%}

.session-card{padding:10px;border:1px solid var(--border);border-radius:6px;background:var(--bg2);margin:6px 0;cursor:pointer;transition:all .2s}
.session-card:hover{border-color:var(--accent)}

.korb-badge{position:fixed;bottom:10px;right:10px;font-size:10px;color:#00d4ff;opacity:0.5;font-family:'JetBrains Mono',monospace;pointer-events:none;z-index:9999}
</style>
</head>
<body>
<div class="app" id="app"></div>
<div class="korb-badge">Korb Engineering</div>
<script>
(function(){
const LS_KEY='korb_preflight';
const uid=()=>Date.now().toString(36)+Math.random().toString(36).slice(2,7);

const PHASES=[
{id:'preflight',name:'Preflight Inspection',items:[
'Fuel quantity -- check visually and compare to gauges','Fuel quality -- drain sumps, check for water/contaminants','Oil level -- check dipstick (min 5 qts, full 8 qts typical)',
'Control surfaces -- ailerons, elevators, rudder free and correct','Flaps -- check condition and operation','Tires -- check inflation, tread wear, no flat spots',
'Nose gear strut -- proper extension','Landing gear -- check for damage, alignment','Lights -- nav, strobe, beacon, landing light condition',
'Pitot tube -- clear, remove cover','Static ports -- clear and unobstructed','Antennas -- secure, no damage',
'Cowling -- secure, all fasteners in place','Propeller -- check for nicks, cracks, security','Spinner -- secure, no cracks',
'Fuel drains/sumps -- drain all sump points','Brake fluid -- check reservoir level','Exhaust -- no cracks or discoloration',
'Windshield -- clean, no cracks','Stall warning vane -- check freedom of movement','Fuel caps -- secure after checking','Oil filler cap/door -- secure','Baggage door -- secure']},
{id:'before_start',name:'Before Engine Start',items:[
'Preflight inspection -- COMPLETE','Seats, belts, harnesses -- ADJUST and LOCK','Fuel selector -- BOTH (or appropriate tank)',
'Avionics master switch -- OFF','Circuit breakers -- CHECK IN','Electrical equipment -- OFF','Brakes -- TEST and HOLD',
'Flight controls -- FREE and CORRECT','Instruments/radios -- SET','Mixture -- RICH (full forward)',
'Primer -- AS REQUIRED (2-6 strokes cold)','Carburetor heat -- COLD','Beacon -- ON','Master switch -- ON','Fuel gauges -- CHECK quantity']},
{id:'engine_start',name:'Engine Start',items:[
'Area -- CLEAR ("CLEAR PROP")','Throttle -- open 1/4 inch','Ignition -- START (release when engine fires)',
'Oil pressure -- CHECK (within 30 sec, green arc)','Throttle -- adjust to 1000 RPM','Ammeter/loadmeter -- CHECK positive',
'Avionics master -- ON','Radios -- SET (ATIS, Ground)','Flashing beacon -- VERIFY ON']},
{id:'before_taxi',name:'Before Taxi',items:[
'Flight instruments -- CHECK and SET','Altimeter -- SET to field elevation','Heading indicator -- ALIGN with compass',
'Attitude indicator -- ERECT and stable','Turn coordinator -- CHECK','Flaps -- SET for taxi (UP)',
'Trim -- SET for takeoff','Radios -- SET and checked','Transponder -- SET (standby)',
'GPS/NAV -- SET and verified','Taxi light -- ON','Brakes -- CHECK during initial taxi']},
{id:'runup',name:'Run-Up',items:[
'Parking brake -- SET','Flight controls -- FREE and CORRECT','Flight instruments -- CHECK',
'Fuel selector -- BOTH (reconfirm)','Mixture -- RICH','Throttle -- 1700 RPM',
'Magnetos -- CHECK (max 175 RPM drop, max 50 RPM differential)','Carburetor heat -- CHECK (RPM drop then rise)',
'Engine instruments -- GREEN','Suction gauge -- CHECK (4.8-5.2 inHg)','Ammeter -- CHECK positive charge',
'Throttle -- idle check (500-700 RPM), then 1000 RPM','Throttle friction lock -- ADJUST']},
{id:'before_takeoff',name:'Before Takeoff',items:[
'Flaps -- SET for takeoff','Trim -- SET for takeoff','Mixture -- SET (rich below 3000 ft DA)',
'Fuel selector -- BOTH','Primer -- IN and LOCKED','Landing light -- ON','Strobe lights -- ON',
'Pitot heat -- AS REQUIRED','Transponder -- ALT','Doors and windows -- CLOSED and LOCKED',
'Seats and seat belts -- SECURED','Departure briefing -- COMPLETE','Engine instruments -- GREEN','Time -- NOTE']},
{id:'climb',name:'Climb',items:[
'Airspeed -- Vy (best rate of climb)','Engine instruments -- MONITOR','Mixture -- ADJUST above 3000 ft DA',
'Flaps -- RETRACT','Landing light -- OFF above 2000 AGL','Fuel selector -- CHECK BOTH','Trim -- ADJUST']},
{id:'cruise',name:'Cruise',items:[
'Level off -- AT planned altitude','Power -- SET (2300-2500 RPM typical)','Mixture -- LEAN for cruise',
'Trim -- ADJUST for hands-off flight','Engine instruments -- CHECK (all green)','Fuel selector -- MONITOR / switch tanks',
'Heading/course -- VERIFY on track','Altimeter -- CHECK and adjust','Lights -- AS REQUIRED']},
{id:'descent',name:'Descent',items:[
'ATIS/AWOS -- OBTAIN weather','Altimeter -- SET to local setting','Mixture -- ENRICH (full rich below 3000 ft DA)',
'Carburetor heat -- ON if icing possible','Fuel selector -- BOTH','Engine instruments -- MONITOR (avoid shock cooling)',
'Landing light -- ON below 2000 AGL','Review approach -- runway, pattern entry, traffic']},
{id:'before_landing',name:'Before Landing',items:[
'Fuel selector -- BOTH','Mixture -- RICH','Carburetor heat -- ON','Seat belts -- CHECK tight',
'Landing light -- ON','Flaps -- AS REQUIRED','Airspeed -- MAINTAIN approach speed (1.3 x Vso)',
'Autopilot -- OFF','GUMPS check -- Gas, Undercarriage, Mixture, Prop, Seatbelts']},
{id:'after_landing',name:'After Landing',items:[
'Carburetor heat -- OFF','Flaps -- UP','Transponder -- STANDBY',
'Landing/taxi lights -- AS REQUIRED','Strobes -- OFF on ground','Trim -- SET for takeoff']},
{id:'shutdown',name:'Shutdown',items:[
'Parking brake -- SET','Throttle -- IDLE (1000 RPM cool-down)','Electrical equipment -- OFF',
'Avionics master -- OFF','Mixture -- CUTOFF','Ignition/magnetos -- OFF',
'Master switch -- OFF','Fuel selector -- OFF (or LEFT)','Control lock -- INSTALL','Hobbs/tach time -- RECORD']}
];

const AIRCRAFT=['Cessna 172','Cessna 182','Piper Cherokee PA-28','Piper Archer','Beechcraft Bonanza','Cirrus SR22','Diamond DA40','Generic Single Engine'];

let data={};
let activeTab='checklist';
let currentSession=null;
let currentPhase=0;

function load(){try{const r=localStorage.getItem(LS_KEY);if(r)return JSON.parse(r);}catch(e){}return{sessions:[]};}
function save(){localStorage.setItem(LS_KEY,JSON.stringify(data));}

function init(){data=load();if(!data.sessions)data.sessions=[];render();}

function getPhaseStatus(session,phaseIdx){
const phase=PHASES[phaseIdx];
const statuses=session.statuses[phase.id]||{};
const total=phase.items.length;
let pass=0,fail=0,na=0;
for(let i=0;i<total;i++){const s=statuses[i];if(s==='pass')pass++;else if(s==='fail')fail++;else if(s==='na')na++;}
const checked=pass+fail+na;
return{total,pass,fail,na,checked,pct:total?Math.round(checked/total*100):0,complete:checked===total,hasFails:fail>0};
}

function getSessionStats(session){
let totalItems=0,totalChecked=0,totalPass=0,totalFail=0,totalNA=0;
PHASES.forEach((p,i)=>{const s=getPhaseStatus(session,i);totalItems+=s.total;totalChecked+=s.checked;totalPass+=s.pass;totalFail+=s.fail;totalNA+=s.na;});
return{totalItems,totalChecked,totalPass,totalFail,totalNA,pct:totalItems?Math.round(totalChecked/totalItems*100):0};
}

function render(){
const app=document.getElementById('app');
app.innerHTML=`
<div class="header">
  <h1>PRE-FLIGHT <span>// Checklist</span></h1>
  <div style="display:flex;gap:8px;flex-wrap:wrap">
    <button class="btn btn-accent" onclick="newSession()">New Session</button>
    <button class="btn" onclick="setMainTab('history')">History (${data.sessions.length})</button>
  </div>
</div>
${showNewSessionForm?renderNewSessionForm():''}
${currentSession?renderSession():activeTab==='history'?renderHistory():(showNewSessionForm?'':renderWelcome())}`;
}

function renderWelcome(){
return `<div class="panel" style="text-align:center;padding:40px">
<div style="font-size:48px;margin-bottom:12px;opacity:0.3">&#9992;</div>
<h2 style="margin-bottom:8px">Aviation Pre-Flight Checklist</h2>
<div style="color:var(--textDim);margin-bottom:20px">Complete 12-phase inspection checklist with pass/fail/NA tracking</div>
<button class="btn btn-accent" onclick="newSession()" style="font-size:16px;padding:10px 24px">Start New Session</button>
${data.sessions.length?`<div style="margin-top:20px;font-size:10px;color:var(--textDim)">${data.sessions.length} previous session(s) saved</div>`:''}
</div>`;
}

function renderHistory(){
return `<div class="panel">
<h2>Session History</h2>
${data.sessions.length?data.sessions.slice().reverse().map(s=>{
const stats=getSessionStats(s);
return `<div class="session-card" onclick="loadSession('${s.id}')">
<div style="display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:8px">
  <div>
    <div style="font-weight:600;font-size:12px">${s.aircraft||'Unknown Aircraft'} - ${s.tailNumber||'N/A'}</div>
    <div style="font-size:10px;color:var(--textDim)">${new Date(s.date).toLocaleString()} | ${s.pilot||'Unknown'}</div>
  </div>
  <div style="display:flex;align-items:center;gap:12px">
    <div style="text-align:right">
      <div style="font-size:16px;font-weight:700;color:${stats.pct===100?(stats.totalFail?'var(--yellow)':'var(--green)'):'var(--accent)'}">${stats.pct}%</div>
      <div style="font-size:9px;color:var(--textDim)">${stats.totalPass} pass / ${stats.totalFail} fail / ${stats.totalNA} N/A</div>
    </div>
    <button class="btn btn-sm" onclick="event.stopPropagation();deleteSession('${s.id}')" style="padding:6px 10px;font-size:16px;min-height:44px;color:var(--red);border-color:var(--red)">DEL</button>
  </div>
</div>
<div class="progress-bar"><div class="progress-fill" style="width:${stats.pct}%;background:${stats.totalFail?'var(--yellow)':'var(--green)'}"></div></div>
</div>`;}).join(''):'<div style="color:var(--textDim);text-align:center;padding:20px">No sessions yet</div>'}
</div>`;
}

function renderSession(){
const s=currentSession;
const stats=getSessionStats(s);
const phase=PHASES[currentPhase];
const ps=getPhaseStatus(s,currentPhase);
const statuses=s.statuses[phase.id]||{};

return `
<div class="stat-grid">
  <div class="stat"><div class="label">Aircraft</div><div class="value" style="font-size:12px;color:var(--accent)">${s.aircraft}</div></div>
  <div class="stat"><div class="label">Tail #</div><div class="value" style="font-size:14px;color:var(--accent)">${s.tailNumber||'N/A'}</div></div>
  <div class="stat"><div class="label">Overall</div><div class="value" style="color:${stats.pct===100?(stats.totalFail?'var(--yellow)':'var(--green)'):'var(--accent)'}">${stats.pct}%</div></div>
  <div class="stat"><div class="label">Pass/Fail</div><div class="value" style="font-size:12px"><span style="color:var(--green)">${stats.totalPass}</span> / <span style="color:var(--red)">${stats.totalFail}</span></div></div>
</div>
<div class="progress-bar" style="height:6px;margin-bottom:12px"><div class="progress-fill" style="width:${stats.pct}%;background:linear-gradient(90deg,var(--accent),var(--green))"></div></div>
<div class="phase-nav">
${PHASES.map((p,i)=>{
const ps2=getPhaseStatus(s,i);
const dotColor=ps2.complete?(ps2.hasFails?'var(--yellow)':'var(--green)'):ps2.checked>0?'var(--accent)':'transparent';
return `<button class="phase-btn ${i===currentPhase?'active':''} ${ps2.complete?'complete':''}" onclick="setPhase(${i})">
${p.name.split(' ')[0]}${dotColor!=='transparent'?`<span class="dot" style="background:${dotColor}"></span>`:''}
</button>`;}).join('')}
</div>
<div class="panel">
<div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:12px;flex-wrap:wrap;gap:8px">
  <h2 style="margin:0">${phase.name}</h2>
  <div style="display:flex;gap:8px;align-items:center">
    <span style="font-size:10px;color:var(--textDim)">${ps.checked}/${ps.total}</span>
    <button class="btn" style="font-size:16px;padding:6px 12px;min-height:44px" onclick="markAllPass()">All Pass</button>
    <button class="btn" style="font-size:16px;padding:6px 12px;min-height:44px" onclick="clearPhase()">Clear</button>
  </div>
</div>
<div class="progress-bar" style="height:4px"><div class="progress-fill" style="width:${ps.pct}%;background:${ps.hasFails?'var(--yellow)':'var(--green)'}"></div></div>
<div style="margin-top:8px">
${phase.items.map((item,i)=>{
const st=statuses[i]||'';
return `<div class="checklist-item ${st}">
<div class="item-text">${item}</div>
<div class="item-buttons">
  <button class="status-btn ${st==='pass'?'active-pass':''}" onclick="setStatus('${phase.id}',${i},'pass')" title="Pass">P</button>
  <button class="status-btn ${st==='fail'?'active-fail':''}" onclick="setStatus('${phase.id}',${i},'fail')" title="Fail">F</button>
  <button class="status-btn ${st==='na'?'active-na':''}" onclick="setStatus('${phase.id}',${i},'na')" title="N/A">-</button>
</div></div>`;}).join('')}
</div>
</div>
<div style="display:flex;justify-content:space-between;margin-top:8px;gap:8px;flex-wrap:wrap">
  <div style="display:flex;gap:8px">
    <button class="btn" ${currentPhase<=0?'disabled style="opacity:0.3"':''} onclick="setPhase(${currentPhase-1})">Prev Phase</button>
    <button class="btn btn-accent" ${currentPhase>=PHASES.length-1?'disabled style="opacity:0.3"':''} onclick="setPhase(${currentPhase+1})">Next Phase</button>
  </div>
  <div style="display:flex;gap:8px">
    <button class="btn" onclick="currentSession=null;activeTab='checklist';render()">Close</button>
    <button class="btn btn-red" onclick="if(confirm('Delete this session?')){deleteSession('${s.id}');currentSession=null;render();}">Delete</button>
  </div>
</div>`;
}

let showNewSessionForm=false;

window.newSession=function(){
showNewSessionForm=true;
currentSession=null;
activeTab='checklist';
render();
setTimeout(function(){var el=document.getElementById('ns-aircraft');if(el)el.focus();},50);
};

window.cancelNewSession=function(){
showNewSessionForm=false;
render();
};

window.submitNewSession=function(){
var acSelect=document.getElementById('ns-aircraft');
var acCustom=document.getElementById('ns-aircraft-custom');
var ac=acSelect.value==='custom'?acCustom.value.trim():acSelect.value;
if(!ac){acSelect.focus();return;}
var tail=document.getElementById('ns-tail').value.trim();
var pilot=document.getElementById('ns-pilot').value.trim();
var session={id:uid(),aircraft:ac,tailNumber:tail,pilot:pilot,date:new Date().toISOString(),statuses:{}};
PHASES.forEach(function(p){session.statuses[p.id]={};});
data.sessions.push(session);
save();
showNewSessionForm=false;
currentSession=session;
currentPhase=0;
activeTab='checklist';
render();
};

window.onAircraftSelectChange=function(){
var el=document.getElementById('ns-aircraft-custom-group');
if(el)el.style.display=document.getElementById('ns-aircraft').value==='custom'?'flex':'none';
};

function renderNewSessionForm(){
return `<div class="new-session-form">
<h2>New Session</h2>
<div class="form-grid">
  <div class="form-group">
    <label for="ns-aircraft">Aircraft Type</label>
    <select class="input" id="ns-aircraft" onchange="onAircraftSelectChange()">
      <option value="" disabled selected>Select aircraft...</option>
      ${AIRCRAFT.map(function(a){return '<option value="'+a+'">'+a+'</option>';}).join('')}
      <option value="custom">Other (type below)</option>
    </select>
  </div>
  <div class="form-group" id="ns-aircraft-custom-group" style="display:none">
    <label for="ns-aircraft-custom">Custom Aircraft</label>
    <input class="input" id="ns-aircraft-custom" type="text" placeholder="e.g. Piper Saratoga">
  </div>
  <div class="form-group">
    <label for="ns-tail">Tail Number</label>
    <input class="input" id="ns-tail" type="text" placeholder="e.g. N12345" autocapitalize="characters">
  </div>
  <div class="form-group">
    <label for="ns-pilot">Pilot Name</label>
    <input class="input" id="ns-pilot" type="text" placeholder="e.g. John Smith">
  </div>
</div>
<div class="form-actions">
  <button class="btn" onclick="cancelNewSession()">Cancel</button>
  <button class="btn btn-accent" onclick="submitNewSession()">Start Checklist</button>
</div>
</div>`;
}

window.loadSession=function(id){
currentSession=data.sessions.find(s=>s.id===id);
currentPhase=0;
activeTab='checklist';
render();
};

window.deleteSession=function(id){
data.sessions=data.sessions.filter(s=>s.id!==id);
save();
if(currentSession&&currentSession.id===id)currentSession=null;
render();
};

window.setMainTab=function(t){activeTab=t;currentSession=null;render();};
window.setPhase=function(i){if(i>=0&&i<PHASES.length){currentPhase=i;render();}};

window.setStatus=function(phaseId,itemIdx,status){
if(!currentSession.statuses[phaseId])currentSession.statuses[phaseId]={};
const curr=currentSession.statuses[phaseId][itemIdx];
if(curr===status)delete currentSession.statuses[phaseId][itemIdx];
else currentSession.statuses[phaseId][itemIdx]=status;
const si=data.sessions.findIndex(s=>s.id===currentSession.id);
if(si>=0)data.sessions[si]=currentSession;
save();render();
};

window.markAllPass=function(){
const phase=PHASES[currentPhase];
if(!currentSession.statuses[phase.id])currentSession.statuses[phase.id]={};
phase.items.forEach((_,i)=>{currentSession.statuses[phase.id][i]='pass';});
const si=data.sessions.findIndex(s=>s.id===currentSession.id);
if(si>=0)data.sessions[si]=currentSession;
save();render();
};

window.clearPhase=function(){
const phase=PHASES[currentPhase];
currentSession.statuses[phase.id]={};
const si=data.sessions.findIndex(s=>s.id===currentSession.id);
if(si>=0)data.sessions[si]=currentSession;
save();render();
};

init();
})();
</script>
