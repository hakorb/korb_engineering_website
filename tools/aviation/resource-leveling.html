<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>Resource Leveling Tool | Korb Engineering</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{--bg:#050a0f;--surface:#0a1018;--surface2:#0e1520;--border:#1a2535;--text:#e2e8f0;--cyan:#00d4ff;--orange:#ff6600;--green:#10b981;--red:#ef4444;--font:'JetBrains Mono',monospace}
html{font-size:16px}
body{background:var(--bg);color:var(--text);font-family:var(--font);line-height:1.6;min-height:100vh}
header{background:var(--surface);border-bottom:1px solid var(--border);padding:16px 20px;display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:12px}
.brand{display:flex;align-items:center;gap:12px}
.brand-icon{width:36px;height:36px;border:2px solid var(--cyan);border-radius:6px;display:flex;align-items:center;justify-content:center;font-weight:700;color:var(--cyan);font-size:14px}
.brand h1{font-size:clamp(14px,2.5vw,18px);font-weight:600;color:var(--cyan)}
.brand-sub{font-size:12px;color:var(--text);opacity:.6;font-weight:300}
.header-actions{display:flex;gap:8px;flex-wrap:wrap}
main{max-width:1400px;margin:0 auto;padding:16px}
.grid{display:grid;grid-template-columns:1fr;gap:16px}
@media(min-width:900px){.grid{grid-template-columns:1fr 1fr}}
.card{background:var(--surface);border:1px solid var(--border);border-radius:8px;padding:16px}
.card h2{font-size:14px;font-weight:600;color:var(--cyan);margin-bottom:12px;text-transform:uppercase;letter-spacing:1px}
.card h3{font-size:13px;font-weight:500;color:var(--orange);margin:12px 0 8px}
label{display:block;font-size:12px;color:var(--text);opacity:.7;margin-bottom:4px;font-weight:400}
input,select{width:100%;background:var(--surface2);border:1px solid var(--border);border-radius:4px;color:var(--text);font-family:var(--font);font-size:16px;padding:10px 12px;margin-bottom:8px;min-height:44px}
input:focus,select:focus{outline:none;border-color:var(--cyan)}
button{font-family:var(--font);font-size:16px;font-weight:500;border:none;border-radius:4px;cursor:pointer;padding:10px 16px;min-height:44px;transition:opacity .2s}
button:active{opacity:.8}
.btn-cyan{background:var(--cyan);color:var(--bg)}
.btn-orange{background:var(--orange);color:#fff}
.btn-green{background:var(--green);color:#fff}
.btn-red{background:var(--red);color:#fff}
.btn-outline{background:transparent;border:1px solid var(--border);color:var(--text)}
.btn-outline:hover{border-color:var(--cyan)}
.btn-row{display:flex;gap:8px;flex-wrap:wrap;margin-top:8px}
.form-row{display:grid;grid-template-columns:1fr 1fr;gap:8px}
@media(max-width:500px){.form-row{grid-template-columns:1fr}}
table{width:100%;border-collapse:collapse;font-size:12px;margin-top:8px}
th,td{padding:8px 6px;text-align:left;border-bottom:1px solid var(--border)}
th{color:var(--cyan);font-weight:500;font-size:11px;text-transform:uppercase;letter-spacing:.5px}
td{color:var(--text)}
.critical{color:var(--red);font-weight:600}
.over{background:rgba(239,68,68,.15)}
canvas{width:100%;border:1px solid var(--border);border-radius:4px;background:var(--surface2)}
.tab-bar{display:flex;gap:4px;margin-bottom:12px;flex-wrap:wrap}
.tab{padding:8px 14px;font-size:12px;border-radius:4px 4px 0 0;background:var(--surface2);color:var(--text);opacity:.6;cursor:pointer;border:1px solid var(--border);border-bottom:none;min-height:44px;display:flex;align-items:center}
.tab.active{opacity:1;background:var(--surface);color:var(--cyan);border-color:var(--cyan)}
.tab-content{display:none}
.tab-content.active{display:block}
.toast{position:fixed;bottom:20px;right:20px;background:var(--green);color:#fff;padding:12px 20px;border-radius:6px;font-size:13px;z-index:1000;opacity:0;transition:opacity .3s}
.toast.show{opacity:1}
.badge{display:inline-block;padding:2px 8px;border-radius:3px;font-size:10px;font-weight:600}
.badge-red{background:rgba(239,68,68,.2);color:var(--red)}
.badge-green{background:rgba(16,185,129,.2);color:var(--green)}
.badge-cyan{background:rgba(0,212,255,.2);color:var(--cyan)}
.save-load{display:flex;gap:8px;align-items:center;flex-wrap:wrap}
.save-load select{width:auto;min-width:150px;margin:0}
.full-width{grid-column:1/-1}
.dep-list{font-size:11px;color:var(--text);opacity:.6}
</style>
</head>
<body>
<header>
  <div class="brand">
    <div class="brand-icon">KE</div>
    <div>
      <h1>Korb Engineering</h1>
      <div class="brand-sub">Resource Leveling Tool</div>
    </div>
  </div>
  <div class="save-load">
    <select id="loadSelect"><option value="">-- Load Project --</option></select>
    <button class="btn-cyan" onclick="saveProject()">Save</button>
    <button class="btn-outline" onclick="loadProject()">Load</button>
    <button class="btn-red" onclick="deleteProject()">Delete</button>
  </div>
</header>
<main>
<div class="grid">
  <!-- Resources Panel -->
  <div class="card">
    <h2>Resources</h2>
    <div class="form-row">
      <div><label>Resource Name</label><input id="resName" placeholder="e.g. Crew A"></div>
      <div><label>Max Capacity/Day</label><input id="resCap" type="number" min="1" value="4" placeholder="Units"></div>
    </div>
    <button class="btn-green" onclick="addResource()">+ Add Resource</button>
    <table id="resTable">
      <thead><tr><th>Name</th><th>Capacity</th><th></th></tr></thead>
      <tbody></tbody>
    </table>
  </div>

  <!-- Tasks Panel -->
  <div class="card">
    <h2>Tasks</h2>
    <div class="form-row">
      <div><label>Task Name</label><input id="taskName" placeholder="e.g. Earthwork"></div>
      <div><label>Duration (days)</label><input id="taskDur" type="number" min="1" value="5"></div>
    </div>
    <div class="form-row">
      <div><label>Start Date</label><input id="taskStart" type="date"></div>
      <div><label>Resource</label><select id="taskRes"></select></div>
    </div>
    <div class="form-row">
      <div><label>Resource Demand (units/day)</label><input id="taskDemand" type="number" min="1" value="2"></div>
      <div><label>Dependencies (task #s, comma-sep)</label><input id="taskDeps" placeholder="e.g. 1,3"></div>
    </div>
    <div class="form-row">
      <div>
        <label><input type="checkbox" id="taskCritical"> Critical (cannot be moved)</label>
      </div>
    </div>
    <button class="btn-cyan" onclick="addTask()">+ Add Task</button>
    <table id="taskTable">
      <thead><tr><th>#</th><th>Task</th><th>Dur</th><th>Start</th><th>Resource</th><th>Demand</th><th>Deps</th><th>Crit</th><th></th></tr></thead>
      <tbody></tbody>
    </table>
  </div>

  <!-- Visualization -->
  <div class="card full-width">
    <h2>Analysis</h2>
    <div class="tab-bar">
      <div class="tab active" data-tab="histogram">Histogram</div>
      <div class="tab" data-tab="gantt-before">Gantt (Before)</div>
      <div class="tab" data-tab="gantt-after">Gantt (After)</div>
      <div class="tab" data-tab="comparison">Comparison Table</div>
    </div>
    <div class="btn-row" style="margin-bottom:12px">
      <button class="btn-orange" onclick="runLeveling()">Auto-Level Resources</button>
      <button class="btn-green" onclick="exportSchedule()">Export to Clipboard</button>
    </div>

    <div id="tab-histogram" class="tab-content active">
      <canvas id="histogramCanvas" height="300"></canvas>
      <div id="overAllocWarnings" style="margin-top:8px;font-size:12px"></div>
    </div>
    <div id="tab-gantt-before" class="tab-content">
      <canvas id="ganttBeforeCanvas" height="350"></canvas>
    </div>
    <div id="tab-gantt-after" class="tab-content">
      <canvas id="ganttAfterCanvas" height="350"></canvas>
    </div>
    <div id="tab-comparison" class="tab-content">
      <table id="compTable">
        <thead><tr><th>#</th><th>Task</th><th>Original Start</th><th>Leveled Start</th><th>Shift (days)</th><th>Critical</th></tr></thead>
        <tbody></tbody>
      </table>
    </div>
  </div>
</div>
</main>
<div class="toast" id="toast"></div>

<script>
let resources = [];
let tasks = [];
let leveledTasks = [];

function today(){const d=new Date();return d.toISOString().split('T')[0]}
document.getElementById('taskStart').value = today();

// Tab switching
document.querySelectorAll('.tab').forEach(t=>{
  t.addEventListener('click',()=>{
    document.querySelectorAll('.tab').forEach(x=>x.classList.remove('active'));
    document.querySelectorAll('.tab-content').forEach(x=>x.classList.remove('active'));
    t.classList.add('active');
    document.getElementById('tab-'+t.dataset.tab).classList.add('active');
  });
});

function toast(msg){const t=document.getElementById('toast');t.textContent=msg;t.classList.add('show');setTimeout(()=>t.classList.remove('show'),2500)}

function addResource(){
  const name=document.getElementById('resName').value.trim();
  const cap=parseInt(document.getElementById('resCap').value);
  if(!name||!cap)return toast('Fill in resource fields');
  resources.push({name,capacity:cap});
  document.getElementById('resName').value='';
  renderResources();
  updateResourceSelect();
}

function removeResource(i){resources.splice(i,1);renderResources();updateResourceSelect()}

function renderResources(){
  const tb=document.querySelector('#resTable tbody');
  tb.innerHTML=resources.map((r,i)=>`<tr><td>${r.name}</td><td>${r.capacity}</td><td><button class="btn-red" style="padding:4px 8px;min-height:44px;font-size:16px" onclick="removeResource(${i})">X</button></td></tr>`).join('');
}

function updateResourceSelect(){
  const sel=document.getElementById('taskRes');
  sel.innerHTML=resources.map(r=>`<option value="${r.name}">${r.name} (cap: ${r.capacity})</option>`).join('');
}

function addTask(){
  const name=document.getElementById('taskName').value.trim();
  const dur=parseInt(document.getElementById('taskDur').value);
  const start=document.getElementById('taskStart').value;
  const res=document.getElementById('taskRes').value;
  const demand=parseInt(document.getElementById('taskDemand').value);
  const depsStr=document.getElementById('taskDeps').value.trim();
  const critical=document.getElementById('taskCritical').checked;
  if(!name||!dur||!start||!res||!demand)return toast('Fill in all task fields');
  const deps=depsStr?depsStr.split(',').map(d=>parseInt(d.trim())).filter(d=>!isNaN(d)):[];
  tasks.push({id:tasks.length+1,name,duration:dur,start,resource:res,demand,deps,critical});
  document.getElementById('taskName').value='';
  document.getElementById('taskDeps').value='';
  document.getElementById('taskCritical').checked=false;
  renderTasks();
  analyze();
}

function removeTask(i){tasks.splice(i,1);tasks.forEach((t,idx)=>t.id=idx+1);renderTasks();analyze()}

function renderTasks(){
  const tb=document.querySelector('#taskTable tbody');
  tb.innerHTML=tasks.map((t,i)=>`<tr>
    <td>${t.id}</td><td>${t.name}</td><td>${t.duration}</td><td>${t.start}</td>
    <td>${t.resource}</td><td>${t.demand}</td>
    <td class="dep-list">${t.deps.join(',')||'-'}</td>
    <td>${t.critical?'<span class="badge badge-red">YES</span>':''}</td>
    <td><button class="btn-red" style="padding:4px 8px;min-height:44px;font-size:16px" onclick="removeTask(${i})">X</button></td>
  </tr>`).join('');
}

function dateToDay(dateStr,baseDate){return Math.floor((new Date(dateStr)-baseDate)/(86400000))}
function dayToDate(day,baseDate){const d=new Date(baseDate);d.setDate(d.getDate()+day);return d.toISOString().split('T')[0]}

function getBaseDate(){
  if(tasks.length===0)return new Date();
  const dates=tasks.map(t=>new Date(t.start));
  return new Date(Math.min(...dates));
}

function buildSchedule(taskList){
  const base=getBaseDate();
  return taskList.map(t=>{
    const startDay=dateToDay(t.start,base);
    return{...t,startDay,endDay:startDay+t.duration};
  });
}

function getResourceUsage(schedule){
  if(schedule.length===0)return{};
  const maxDay=Math.max(...schedule.map(s=>s.endDay));
  const usage={};
  resources.forEach(r=>{usage[r.name]=new Array(maxDay).fill(0)});
  schedule.forEach(s=>{
    if(!usage[s.resource])return;
    for(let d=s.startDay;d<s.endDay;d++){
      if(d>=0&&d<usage[s.resource].length)usage[s.resource][d]+=s.demand;
    }
  });
  return usage;
}

function findOverAllocations(usage){
  const overs=[];
  resources.forEach(r=>{
    if(!usage[r.name])return;
    usage[r.name].forEach((u,d)=>{
      if(u>r.capacity)overs.push({resource:r.name,day:d,usage:u,capacity:r.capacity});
    });
  });
  return overs;
}

function autoLevel(){
  const base=getBaseDate();
  let leveled=tasks.map(t=>({...t}));
  // Sort: critical first, then by start date, then by demand desc
  const sortedIndices=leveled.map((_,i)=>i).sort((a,b)=>{
    if(leveled[a].critical&&!leveled[b].critical)return -1;
    if(!leveled[a].critical&&leveled[b].critical)return 1;
    const da=new Date(leveled[a].start),db=new Date(leveled[b].start);
    if(da-db!==0)return da-db;
    return leveled[b].demand-leveled[a].demand;
  });

  // Respect dependencies: find earliest possible start
  function earliestStart(task,scheduled){
    let earliest=dateToDay(task.start,base);
    task.deps.forEach(depId=>{
      const dep=scheduled.find(s=>s.id===depId);
      if(dep){
        const depEnd=dateToDay(dep.start,base)+dep.duration;
        if(depEnd>earliest)earliest=depEnd;
      }
    });
    return earliest;
  }

  // Iterative leveling
  for(let iter=0;iter<50;iter++){
    const schedule=buildSchedule(leveled);
    const usage=getResourceUsage(schedule);
    const overs=findOverAllocations(usage);
    if(overs.length===0)break;

    // Find first over-allocation
    const firstOver=overs.sort((a,b)=>a.day-b.day)[0];
    // Find non-critical tasks on that resource on that day
    const candidates=leveled.filter(t=>
      !t.critical&&t.resource===firstOver.resource&&
      dateToDay(t.start,base)<=firstOver.day&&
      dateToDay(t.start,base)+t.duration>firstOver.day
    ).sort((a,b)=>new Date(b.start)-new Date(a.start)); // shift latest-starting first

    if(candidates.length===0)break;
    const victim=candidates[0];
    const idx=leveled.findIndex(t=>t.id===victim.id);
    // Shift by 1 day
    const newStart=new Date(leveled[idx].start);
    newStart.setDate(newStart.getDate()+1);
    leveled[idx].start=newStart.toISOString().split('T')[0];
  }

  return leveled;
}

function analyze(){
  if(tasks.length===0||resources.length===0)return;
  const schedule=buildSchedule(tasks);
  const usage=getResourceUsage(schedule);
  const overs=findOverAllocations(usage);
  drawHistogram(usage,'histogramCanvas');
  drawGantt(schedule,'ganttBeforeCanvas');

  const warnDiv=document.getElementById('overAllocWarnings');
  if(overs.length>0){
    warnDiv.innerHTML='<span style="color:var(--red)">Over-allocations detected on '+overs.length+' resource-days. Run Auto-Level to resolve.</span>';
  }else{
    warnDiv.innerHTML='<span style="color:var(--green)">No over-allocations. Resources are balanced.</span>';
  }
}

function runLeveling(){
  if(tasks.length===0)return toast('Add tasks first');
  leveledTasks=autoLevel();
  const schedule=buildSchedule(leveledTasks);
  drawGantt(schedule,'ganttAfterCanvas');

  // Update comparison table
  const tb=document.querySelector('#compTable tbody');
  tb.innerHTML=tasks.map((t,i)=>{
    const lt=leveledTasks[i];
    const shift=dateToDay(lt.start,getBaseDate())-dateToDay(t.start,getBaseDate());
    return `<tr class="${shift>0?'over':''}">
      <td>${t.id}</td><td>${t.name}</td><td>${t.start}</td><td>${lt.start}</td>
      <td>${shift>0?'+'+shift:shift}</td>
      <td>${t.critical?'<span class="badge badge-red">YES</span>':'No'}</td>
    </tr>`;
  }).join('');

  // Redraw histogram with leveled data
  const usage=getResourceUsage(schedule);
  drawHistogram(usage,'histogramCanvas');
  const overs=findOverAllocations(usage);
  const warnDiv=document.getElementById('overAllocWarnings');
  if(overs.length>0){
    warnDiv.innerHTML='<span style="color:var(--orange)">'+overs.length+' over-allocations remain (critical task conflicts).</span>';
  }else{
    warnDiv.innerHTML='<span style="color:var(--green)">Leveling complete. No over-allocations.</span>';
  }
  toast('Leveling complete');
}

function drawHistogram(usage,canvasId){
  const canvas=document.getElementById(canvasId);
  const ctx=canvas.getContext('2d');
  const dpr=window.devicePixelRatio||1;
  const rect=canvas.getBoundingClientRect();
  canvas.width=rect.width*dpr;
  canvas.height=300*dpr;
  ctx.scale(dpr,dpr);
  const W=rect.width,H=300;
  ctx.clearRect(0,0,W,H);

  const resNames=Object.keys(usage);
  if(resNames.length===0)return;
  const maxDays=Math.max(...resNames.map(r=>usage[r].length));
  if(maxDays===0)return;
  const maxVal=Math.max(...resNames.flatMap(r=>usage[r]),1);
  const capMax=Math.max(...resources.map(r=>r.capacity),maxVal);
  const margin={top:30,right:20,bottom:40,left:50};
  const plotW=W-margin.left-margin.right;
  const plotH=H-margin.top-margin.bottom;
  const barW=Math.max(2,plotW/maxDays-1);
  const colors=['#00d4ff','#ff6600','#10b981','#a855f7','#f59e0b'];

  ctx.fillStyle='#e2e8f0';
  ctx.font='11px JetBrains Mono';
  ctx.fillText('Resource Histogram',margin.left,18);

  // Y axis
  ctx.strokeStyle='#1a2535';
  ctx.lineWidth=1;
  for(let i=0;i<=capMax;i++){
    const y=margin.top+plotH-(i/capMax)*plotH;
    ctx.beginPath();ctx.moveTo(margin.left,y);ctx.lineTo(W-margin.right,y);ctx.stroke();
    ctx.fillStyle='#e2e8f0';ctx.fillText(i,margin.left-25,y+4);
  }

  // Capacity lines
  resources.forEach((r,ri)=>{
    const y=margin.top+plotH-(r.capacity/capMax)*plotH;
    ctx.strokeStyle=colors[ri%colors.length];
    ctx.setLineDash([5,3]);ctx.lineWidth=1.5;
    ctx.beginPath();ctx.moveTo(margin.left,y);ctx.lineTo(W-margin.right,y);ctx.stroke();
    ctx.setLineDash([]);
  });

  // Bars per resource stacked
  resNames.forEach((rName,ri)=>{
    const data=usage[rName];
    const res=resources.find(r=>r.name===rName);
    data.forEach((val,d)=>{
      const x=margin.left+d*(plotW/maxDays);
      const h=(val/capMax)*plotH;
      const y=margin.top+plotH-h;
      const isOver=res&&val>res.capacity;
      ctx.fillStyle=isOver?'#ef4444':colors[ri%colors.length];
      ctx.globalAlpha=isOver?0.9:0.7;
      ctx.fillRect(x,y,barW,h);
      ctx.globalAlpha=1;
    });
  });

  // X axis labels
  ctx.fillStyle='#e2e8f0';ctx.font='10px JetBrains Mono';
  const step=Math.max(1,Math.floor(maxDays/15));
  for(let d=0;d<maxDays;d+=step){
    const x=margin.left+d*(plotW/maxDays);
    ctx.fillText('D'+d,x,H-margin.bottom+15);
  }

  // Legend
  let lx=margin.left;
  resNames.forEach((rName,ri)=>{
    ctx.fillStyle=colors[ri%colors.length];
    ctx.fillRect(lx,H-12,10,10);
    ctx.fillStyle='#e2e8f0';ctx.fillText(rName,lx+14,H-3);
    lx+=ctx.measureText(rName).width+30;
  });
}

function drawGantt(schedule,canvasId){
  const canvas=document.getElementById(canvasId);
  const ctx=canvas.getContext('2d');
  const dpr=window.devicePixelRatio||1;
  const rect=canvas.getBoundingClientRect();
  const rowH=28;
  const calcH=Math.max(350,schedule.length*rowH+100);
  canvas.width=rect.width*dpr;
  canvas.height=calcH*dpr;
  canvas.style.height=calcH+'px';
  ctx.scale(dpr,dpr);
  const W=rect.width,H=calcH;
  ctx.clearRect(0,0,W,H);

  if(schedule.length===0)return;
  const minDay=Math.min(...schedule.map(s=>s.startDay));
  const maxDay=Math.max(...schedule.map(s=>s.endDay));
  const totalDays=maxDay-minDay||1;
  const margin={top:30,right:20,bottom:30,left:140};
  const plotW=W-margin.left-margin.right;
  const colors=['#00d4ff','#ff6600','#10b981','#a855f7','#f59e0b'];
  const resColorMap={};
  resources.forEach((r,i)=>resColorMap[r.name]=colors[i%colors.length]);

  ctx.fillStyle='#e2e8f0';ctx.font='11px JetBrains Mono';
  ctx.fillText('Gantt Chart',margin.left,18);

  // Grid
  ctx.strokeStyle='#1a2535';ctx.lineWidth=1;
  const step=Math.max(1,Math.floor(totalDays/20));
  for(let d=minDay;d<=maxDay;d+=step){
    const x=margin.left+((d-minDay)/totalDays)*plotW;
    ctx.beginPath();ctx.moveTo(x,margin.top);ctx.lineTo(x,H-margin.bottom);ctx.stroke();
    ctx.fillStyle='#e2e8f0';ctx.font='9px JetBrains Mono';
    ctx.fillText('D'+d,x,H-margin.bottom+14);
  }

  // Bars
  schedule.forEach((s,i)=>{
    const y=margin.top+i*rowH;
    const x=margin.left+((s.startDay-minDay)/totalDays)*plotW;
    const w=Math.max(2,(s.duration/totalDays)*plotW);
    // Task name
    ctx.fillStyle='#e2e8f0';ctx.font='11px JetBrains Mono';
    ctx.fillText(s.name.substring(0,16),4,y+18);
    // Bar
    ctx.fillStyle=s.critical?'#ef4444':(resColorMap[s.resource]||'#00d4ff');
    ctx.globalAlpha=0.8;
    ctx.fillRect(x,y+4,w,rowH-8);
    ctx.globalAlpha=1;
    // Demand label
    ctx.fillStyle='#050a0f';ctx.font='bold 10px JetBrains Mono';
    ctx.fillText(s.demand+'u',x+4,y+18);
    // Resource label
    ctx.fillStyle='#e2e8f0';ctx.font='9px JetBrains Mono';
    ctx.fillText(s.resource,x+w+4,y+18);
  });

  // Draw dependency arrows
  schedule.forEach((s)=>{
    if(!s.deps)return;
    s.deps.forEach(depId=>{
      const depIdx=schedule.findIndex(x=>x.id===depId);
      if(depIdx<0)return;
      const dep=schedule[depIdx];
      const fromX=margin.left+((dep.endDay-minDay)/totalDays)*plotW;
      const fromY=margin.top+depIdx*rowH+rowH/2;
      const sIdx=schedule.indexOf(s);
      const toX=margin.left+((s.startDay-minDay)/totalDays)*plotW;
      const toY=margin.top+sIdx*rowH+rowH/2;
      ctx.strokeStyle='#ff6600';ctx.lineWidth=1.5;
      ctx.beginPath();ctx.moveTo(fromX,fromY);ctx.lineTo(toX,toY);ctx.stroke();
      // Arrowhead
      const angle=Math.atan2(toY-fromY,toX-fromX);
      ctx.beginPath();
      ctx.moveTo(toX,toY);
      ctx.lineTo(toX-8*Math.cos(angle-0.4),toY-8*Math.sin(angle-0.4));
      ctx.lineTo(toX-8*Math.cos(angle+0.4),toY-8*Math.sin(angle+0.4));
      ctx.closePath();ctx.fillStyle='#ff6600';ctx.fill();
    });
  });
}

function exportSchedule(){
  const src=leveledTasks.length>0?leveledTasks:tasks;
  if(src.length===0)return toast('No tasks to export');
  let text='KORB ENGINEERING - Resource Leveling Schedule\n';
  text+='='.repeat(60)+'\n';
  text+='#\tTask\tDuration\tStart\tResource\tDemand\tCritical\tDeps\n';
  src.forEach(t=>{
    text+=`${t.id}\t${t.name}\t${t.duration}d\t${t.start}\t${t.resource}\t${t.demand}\t${t.critical?'YES':'NO'}\t${t.deps.join(',')}\n`;
  });
  text+='\nResources:\n';
  resources.forEach(r=>text+=`${r.name}: capacity ${r.capacity}/day\n`);
  navigator.clipboard.writeText(text).then(()=>toast('Copied to clipboard'));
}

function saveProject(){
  const name=prompt('Project name:');
  if(!name)return;
  const key='korb_reslevel_'+name.replace(/\s+/g,'_');
  localStorage.setItem(key,JSON.stringify({resources,tasks}));
  refreshLoadSelect();
  toast('Saved: '+name);
}

function loadProject(){
  const sel=document.getElementById('loadSelect');
  if(!sel.value)return toast('Select a project');
  const data=JSON.parse(localStorage.getItem(sel.value));
  if(!data)return toast('Not found');
  resources=data.resources||[];
  tasks=data.tasks||[];
  tasks.forEach((t,i)=>t.id=i+1);
  leveledTasks=[];
  renderResources();updateResourceSelect();renderTasks();analyze();
  toast('Loaded');
}

function deleteProject(){
  const sel=document.getElementById('loadSelect');
  if(!sel.value)return toast('Select a project');
  if(!confirm('Delete this project?'))return;
  localStorage.removeItem(sel.value);
  refreshLoadSelect();
  toast('Deleted');
}

function refreshLoadSelect(){
  const sel=document.getElementById('loadSelect');
  sel.innerHTML='<option value="">-- Load Project --</option>';
  for(let i=0;i<localStorage.length;i++){
    const key=localStorage.key(i);
    if(key.startsWith('korb_reslevel_')){
      const label=key.replace('korb_reslevel_','').replace(/_/g,' ');
      sel.innerHTML+=`<option value="${key}">${label}</option>`;
    }
  }
}

refreshLoadSelect();

// Resize handler
window.addEventListener('resize',()=>{if(tasks.length>0)analyze()});
</script>
