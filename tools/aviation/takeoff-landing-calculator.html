<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="description" content="Takeoff &amp;amp; Landing Calculator — a free, browser-based aviation engineering tool from Korb Engineering. No signup, no downloads, works on mobile.">
<title>Takeoff &amp; Landing Calculator - Korb Engineering</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{--bg:#050a0f;--surface:#0a1018;--surface2:#0e1520;--border:#1a2535;--text:#e2e8f0;--cyan:#00d4ff;--orange:#ff6600;--green:#10b981;--red:#ef4444;--font:'JetBrains Mono',monospace}
html{font-size:16px}
body{background:var(--bg);color:var(--text);font-family:var(--font);min-height:100vh;line-height:1.5}
header{background:var(--surface);border-bottom:1px solid var(--border);padding:16px 20px;display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:8px}
.brand{display:flex;align-items:center;gap:10px}
.brand svg{width:28px;height:28px;flex-shrink:0}
.brand-text{font-weight:600;font-size:.85rem;color:var(--cyan);letter-spacing:.5px;text-transform:uppercase}
.tool-title{font-size:1.1rem;font-weight:700;color:var(--text)}
.container{max-width:1100px;margin:0 auto;padding:16px}
.card{background:var(--surface);border:1px solid var(--border);border-radius:8px;padding:16px;margin-bottom:16px}
.card h2{font-size:.95rem;color:var(--cyan);margin-bottom:12px;text-transform:uppercase;letter-spacing:.5px;font-weight:600}
label{display:block;font-size:.75rem;color:#8899aa;margin-bottom:4px;font-weight:500;text-transform:uppercase;letter-spacing:.3px}
input,select{width:100%;background:var(--surface2);border:1px solid var(--border);border-radius:6px;padding:10px 12px;color:var(--text);font-family:var(--font);font-size:16px;min-height:44px;transition:border-color .2s}
input:focus,select:focus{outline:none;border-color:var(--cyan)}
input[type=number]{-moz-appearance:textfield}
input::-webkit-outer-spin-button,input::-webkit-inner-spin-button{-webkit-appearance:none}
.btn{display:inline-flex;align-items:center;justify-content:center;min-height:44px;padding:10px 20px;border:none;border-radius:6px;font-family:var(--font);font-size:.8rem;font-weight:600;cursor:pointer;transition:opacity .2s,transform .1s;text-transform:uppercase;letter-spacing:.5px}
.btn:active{transform:scale(.97)}
.btn-cyan{background:var(--cyan);color:#050a0f}
.btn-orange{background:var(--orange);color:#fff}
.btn-green{background:var(--green);color:#fff}
.btn-ghost{background:transparent;border:1px solid var(--border);color:var(--text)}
.btn-sm{min-height:36px;padding:6px 14px;font-size:.7rem}
.row{display:grid;gap:12px}
.row-2{grid-template-columns:1fr 1fr}
.row-3{grid-template-columns:1fr 1fr 1fr}
.row-4{grid-template-columns:1fr 1fr 1fr 1fr}
@media(max-width:600px){.row-2,.row-3,.row-4{grid-template-columns:1fr}}
.flex-wrap{display:flex;flex-wrap:wrap;gap:8px}
.result-card{background:var(--surface2);border:1px solid var(--border);border-radius:8px;padding:16px;text-align:center}
.result-card .result-label{font-size:.7rem;color:#8899aa;text-transform:uppercase;letter-spacing:.5px;margin-bottom:4px}
.result-card .result-value{font-size:1.4rem;font-weight:700}
.result-card .result-sub{font-size:.7rem;color:#667788;margin-top:4px}
.go{color:var(--green);border-color:var(--green)}
.nogo{color:var(--red);border-color:var(--red)}
.bar-chart{margin:16px 0}
.bar-row{margin-bottom:12px}
.bar-label{font-size:.75rem;color:#8899aa;margin-bottom:4px}
.bar-track{background:var(--surface2);border-radius:4px;height:28px;position:relative;overflow:visible;border:1px solid var(--border)}
.bar-fill{height:100%;border-radius:4px 0 0 4px;display:flex;align-items:center;padding:0 8px;font-size:.7rem;font-weight:700;white-space:nowrap;min-width:fit-content;transition:width .4s ease}
.bar-avail{position:absolute;top:-2px;bottom:-2px;border-right:3px dashed var(--text);z-index:2}
.bar-avail-label{position:absolute;top:-18px;right:-4px;font-size:.6rem;color:var(--text);white-space:nowrap}
.status-badge{display:inline-flex;align-items:center;gap:6px;padding:8px 18px;border-radius:20px;font-size:.85rem;font-weight:700}
.status-go{background:rgba(16,185,129,.15);color:var(--green);border:1px solid var(--green)}
.status-nogo{background:rgba(239,68,68,.15);color:var(--red);border:1px solid var(--red)}
.corrections-list{font-size:.75rem;color:#8899aa;margin-top:8px}
.corrections-list div{padding:2px 0}
.corrections-list span{color:var(--orange);font-weight:600}
.hidden{display:none!important}
@media print{body{background:#fff;color:#000}header{background:#eee}.card{background:#fff;border-color:#ccc}.result-card{background:#f5f5f5;border-color:#ccc}.bar-track{background:#eee;border-color:#ccc}.btn{display:none!important}}
</style>
</head>
<body>
<header>
<div class="brand">
<svg viewBox="0 0 100 100" fill="none" xmlns="http://www.w3.org/2000/svg"><rect x="5" y="5" width="90" height="90" rx="12" stroke="#00d4ff" stroke-width="4"/><text x="50" y="62" text-anchor="middle" fill="#00d4ff" font-family="monospace" font-size="36" font-weight="700">KE</text></svg>
<div><div class="brand-text">Korb Engineering</div><div class="tool-title">Takeoff &amp; Landing Calculator</div></div>
</div>
<div class="flex-wrap">
<button class="btn btn-ghost btn-sm" onclick="exportResults()">Copy Report</button>
<button class="btn btn-ghost btn-sm" onclick="window.print()">Print</button>
</div>
</header>

<div class="container">
<!-- Aircraft Profile -->
<div class="card">
<h2>Aircraft Performance Profile</h2>
<div class="flex-wrap" style="margin-bottom:12px">
<select id="profileSelect" style="width:auto;min-width:220px" onchange="loadProfile()">
<option value="">-- Select Aircraft --</option>
<option value="c172s">Cessna 172S Skyhawk</option>
<option value="pa28">Piper PA-28-181 Archer</option>
<option value="a36">Beechcraft A36 Bonanza</option>
<option value="turboprop">Generic Turboprop</option>
</select>
<button class="btn btn-cyan btn-sm" onclick="saveCustomProfile()">Save Custom</button>
<button class="btn btn-ghost btn-sm" onclick="loadCustomProfile()">Load Custom</button>
<button class="btn btn-ghost btn-sm" onclick="deleteCustomProfile()">Delete Custom</button>
</div>
<div class="row row-3" style="margin-bottom:12px">
<div><label>Profile Name</label><input type="text" id="profName" placeholder="Aircraft name"></div>
<div><label>Base T/O Ground Roll (ft)</label><input type="number" id="baseTOroll" step="1"></div>
<div><label>Base T/O Over 50ft (ft)</label><input type="number" id="baseTO50" step="1"></div>
</div>
<div class="row row-3">
<div><label>Base LDG Ground Roll (ft)</label><input type="number" id="baseLDGroll" step="1"></div>
<div><label>Base LDG Over 50ft (ft)</label><input type="number" id="baseLDG50" step="1"></div>
<div><label>Max Gross Weight (lbs)</label><input type="number" id="profMaxGross" step="1"></div>
</div>
<p style="font-size:.65rem;color:#667788;margin-top:8px">Base distances are at sea level, standard day (15&deg;C), max gross, no wind, paved dry runway, zero slope.</p>
</div>

<!-- Conditions -->
<div class="card">
<h2>Current Conditions</h2>
<div class="row row-4" style="margin-bottom:12px">
<div><label>Aircraft Weight (lbs)</label><input type="number" id="acWeight" step="1"></div>
<div><label>Pressure Altitude (ft)</label><input type="number" id="pressAlt" step="1" value="0"></div>
<div><label>Temperature (&deg;C)</label><input type="number" id="tempC" step="0.1" value="15"></div>
<div><label>Headwind Component (kt)</label><input type="number" id="headwind" step="0.1" value="0" placeholder="+head / -tail"></div>
</div>
<div class="row row-4" style="margin-bottom:12px">
<div>
<label>Runway Surface</label>
<select id="surface">
<option value="paved_dry">Paved / Dry</option>
<option value="paved_wet">Paved / Wet</option>
<option value="grass">Grass (firm, dry)</option>
<option value="grass_wet">Grass (wet)</option>
<option value="gravel">Gravel</option>
</select>
</div>
<div><label>Runway Slope (%)</label><input type="number" id="slope" step="0.1" value="0" placeholder="+up / -down"></div>
<div>
<label>Safety Factor</label>
<select id="safetyFactor">
<option value="0">None (1.0x)</option>
<option value="15">+15% (1.15x)</option>
<option value="25" selected>+25% (1.25x)</option>
<option value="50">+50% (1.50x)</option>
</select>
</div>
<div><label>Available Runway (ft)</label><input type="number" id="rwyLength" step="1" placeholder="e.g. 5000"></div>
</div>
<button class="btn btn-cyan" onclick="calculate()" style="margin-top:4px">Calculate</button>
</div>

<!-- Results -->
<div id="resultsCard" class="card hidden">
<h2>Results</h2>
<div id="goNoGo" style="margin-bottom:16px;text-align:center"></div>
<div class="row row-4" id="resultCards"></div>
<div id="correctionDetails" style="margin-top:16px"></div>
</div>

<!-- Bar Chart -->
<div id="chartCard" class="card hidden">
<h2>Distance Comparison</h2>
<div id="barChart" class="bar-chart"></div>
</div>
</div>

<script>
const PROFILES = {
  c172s: {
    name: 'Cessna 172S Skyhawk',
    baseTOroll: 960, baseTO50: 1630,
    baseLDGroll: 575, baseLDG50: 1335,
    maxGross: 2550
  },
  pa28: {
    name: 'Piper PA-28-181 Archer III',
    baseTOroll: 870, baseTO50: 1600,
    baseLDGroll: 525, baseLDG50: 1340,
    maxGross: 2550
  },
  a36: {
    name: 'Beechcraft A36 Bonanza',
    baseTOroll: 1000, baseTO50: 1858,
    baseLDGroll: 640, baseLDG50: 1450,
    maxGross: 3650
  },
  turboprop: {
    name: 'Generic Single Turboprop',
    baseTOroll: 1200, baseTO50: 2100,
    baseLDGroll: 850, baseLDG50: 1800,
    maxGross: 5500
  }
};

function loadProfile() {
  const key = document.getElementById('profileSelect').value;
  if (!key) return;
  const p = PROFILES[key];
  document.getElementById('profName').value = p.name;
  document.getElementById('baseTOroll').value = p.baseTOroll;
  document.getElementById('baseTO50').value = p.baseTO50;
  document.getElementById('baseLDGroll').value = p.baseLDGroll;
  document.getElementById('baseLDG50').value = p.baseLDG50;
  document.getElementById('profMaxGross').value = p.maxGross;
  document.getElementById('acWeight').value = p.maxGross;
}

function saveCustomProfile() {
  const name = document.getElementById('profName').value.trim() || 'Custom';
  const prof = {
    name,
    baseTOroll: parseFloat(document.getElementById('baseTOroll').value) || 0,
    baseTO50: parseFloat(document.getElementById('baseTO50').value) || 0,
    baseLDGroll: parseFloat(document.getElementById('baseLDGroll').value) || 0,
    baseLDG50: parseFloat(document.getElementById('baseLDG50').value) || 0,
    maxGross: parseFloat(document.getElementById('profMaxGross').value) || 0
  };
  localStorage.setItem('korb_tol_' + name, JSON.stringify(prof));
  alert('Profile saved: ' + name);
}

function loadCustomProfile() {
  const keys = Object.keys(localStorage).filter(k => k.startsWith('korb_tol_'));
  if (!keys.length) { alert('No saved profiles.'); return; }
  const name = prompt('Saved profiles:\n' + keys.map(k => k.replace('korb_tol_', '')).join('\n') + '\n\nEnter name:');
  if (!name) return;
  const data = localStorage.getItem('korb_tol_' + name);
  if (!data) { alert('Not found.'); return; }
  const p = JSON.parse(data);
  document.getElementById('profName').value = p.name || '';
  document.getElementById('baseTOroll').value = p.baseTOroll || '';
  document.getElementById('baseTO50').value = p.baseTO50 || '';
  document.getElementById('baseLDGroll').value = p.baseLDGroll || '';
  document.getElementById('baseLDG50').value = p.baseLDG50 || '';
  document.getElementById('profMaxGross').value = p.maxGross || '';
  document.getElementById('acWeight').value = p.maxGross || '';
}

function deleteCustomProfile() {
  const keys = Object.keys(localStorage).filter(k => k.startsWith('korb_tol_'));
  if (!keys.length) { alert('No saved profiles.'); return; }
  const name = prompt('Profiles:\n' + keys.map(k => k.replace('korb_tol_', '')).join('\n') + '\n\nEnter name to delete:');
  if (!name) return;
  localStorage.removeItem('korb_tol_' + name);
  alert('Deleted.');
}

function calculate() {
  const baseTOroll = parseFloat(document.getElementById('baseTOroll').value);
  const baseTO50 = parseFloat(document.getElementById('baseTO50').value);
  const baseLDGroll = parseFloat(document.getElementById('baseLDGroll').value);
  const baseLDG50 = parseFloat(document.getElementById('baseLDG50').value);
  const maxGross = parseFloat(document.getElementById('profMaxGross').value);

  if (!baseTOroll || !baseTO50 || !baseLDGroll || !baseLDG50) {
    alert('Please select or enter an aircraft profile first.');
    return;
  }

  const weight = parseFloat(document.getElementById('acWeight').value) || maxGross;
  const pressAlt = parseFloat(document.getElementById('pressAlt').value) || 0;
  const tempC = parseFloat(document.getElementById('tempC').value) || 15;
  const headwind = parseFloat(document.getElementById('headwind').value) || 0;
  const surface = document.getElementById('surface').value;
  const slope = parseFloat(document.getElementById('slope').value) || 0;
  const safetyPct = parseFloat(document.getElementById('safetyFactor').value) || 0;
  const rwyLen = parseFloat(document.getElementById('rwyLength').value) || 0;

  // Standard temp at pressure altitude
  const stdTemp = 15 - (pressAlt / 1000) * 1.98;
  const tempDev = tempC - stdTemp;

  // Corrections
  const corrections = [];
  let toFactor = 1.0, ldgFactor = 1.0;

  // Altitude: +12% per 1000ft
  const altCorr = (pressAlt / 1000) * 0.12;
  if (altCorr !== 0) { toFactor += altCorr; ldgFactor += altCorr; corrections.push({ label: `Pressure altitude (${pressAlt} ft)`, pct: `+${(altCorr*100).toFixed(1)}%` }); }

  // Temperature: +10% per 10C above std
  if (tempDev > 0) {
    const tempCorr = (tempDev / 10) * 0.10;
    toFactor += tempCorr; ldgFactor += tempCorr;
    corrections.push({ label: `Temp above std (+${tempDev.toFixed(1)}°C)`, pct: `+${(tempCorr*100).toFixed(1)}%` });
  }

  // Weight correction (linear approximation)
  if (maxGross > 0 && weight < maxGross) {
    const wtRatio = weight / maxGross;
    const wtCorr = -(1 - wtRatio) * 0.5; // rough: lighter = shorter distance
    toFactor += wtCorr; ldgFactor += wtCorr;
    corrections.push({ label: `Weight (${weight} / ${maxGross} lbs)`, pct: `${(wtCorr*100).toFixed(1)}%` });
  } else if (weight > maxGross) {
    corrections.push({ label: `OVERWEIGHT (${weight} > ${maxGross} lbs)`, pct: 'WARNING' });
  }

  // Headwind/tailwind
  if (headwind > 0) {
    const hwCorr = -headwind * 0.015;
    toFactor += hwCorr; ldgFactor += hwCorr;
    corrections.push({ label: `Headwind (${headwind} kt)`, pct: `${(hwCorr*100).toFixed(1)}%` });
  } else if (headwind < 0) {
    const twCorr = Math.abs(headwind) * 0.10;
    toFactor += twCorr; ldgFactor += twCorr;
    corrections.push({ label: `Tailwind (${Math.abs(headwind)} kt)`, pct: `+${(twCorr*100).toFixed(1)}%` });
  }

  // Surface
  const surfaceFactors = {
    paved_dry: { to: 0, ldg: 0, label: 'Paved/Dry' },
    paved_wet: { to: 0, ldg: 0.15, label: 'Paved/Wet (+15% ldg)' },
    grass: { to: 0.20, ldg: 0.20, label: 'Grass (+20%)' },
    grass_wet: { to: 0.30, ldg: 0.35, label: 'Grass/Wet (+30% to, +35% ldg)' },
    gravel: { to: 0.20, ldg: 0.20, label: 'Gravel (+20%)' }
  };
  const sf = surfaceFactors[surface] || surfaceFactors.paved_dry;
  if (sf.to > 0 || sf.ldg > 0) {
    toFactor += sf.to; ldgFactor += sf.ldg;
    corrections.push({ label: `Surface: ${sf.label}`, pct: '' });
  }

  // Slope: +5% per 1% upslope for takeoff, -5% per 1% downslope for takeoff; reverse for landing
  if (slope !== 0) {
    const slopeToCorr = slope * 0.05;
    const slopeLdgCorr = -slope * 0.05;
    toFactor += slopeToCorr;
    ldgFactor += slopeLdgCorr;
    corrections.push({ label: `Slope (${slope > 0 ? '+' : ''}${slope}%)`, pct: `TO ${(slopeToCorr*100).toFixed(1)}% / LDG ${(slopeLdgCorr*100).toFixed(1)}%` });
  }

  // Ensure factors don't go below 0.3
  toFactor = Math.max(toFactor, 0.3);
  ldgFactor = Math.max(ldgFactor, 0.3);

  let toRoll = baseTOroll * toFactor;
  let to50 = baseTO50 * toFactor;
  let ldgRoll = baseLDGroll * ldgFactor;
  let ldg50 = baseLDG50 * ldgFactor;

  // Safety factor
  const sfMult = 1 + safetyPct / 100;
  toRoll *= sfMult; to50 *= sfMult; ldgRoll *= sfMult; ldg50 *= sfMult;
  if (safetyPct > 0) corrections.push({ label: `Safety factor`, pct: `+${safetyPct}%` });

  // Round
  toRoll = Math.round(toRoll); to50 = Math.round(to50); ldgRoll = Math.round(ldgRoll); ldg50 = Math.round(ldg50);

  // Go/No-Go
  const maxRequired = Math.max(to50, ldg50);
  const isGo = rwyLen > 0 ? rwyLen >= maxRequired : true;
  const goNoGoHtml = rwyLen > 0
    ? `<span class="status-badge ${isGo ? 'status-go' : 'status-nogo'}">${isGo ? 'GO - Runway Sufficient' : 'NO-GO - Runway Too Short'}</span><br><span style="font-size:.75rem;color:#8899aa;margin-top:4px;display:inline-block">Required: ${maxRequired.toLocaleString()} ft | Available: ${rwyLen.toLocaleString()} ft | Margin: ${(rwyLen - maxRequired).toLocaleString()} ft</span>`
    : '<span style="font-size:.8rem;color:#8899aa">Enter available runway length for GO/NO-GO check</span>';

  document.getElementById('goNoGo').innerHTML = goNoGoHtml;

  // Result cards
  const cards = [
    { label: 'Takeoff Ground Roll', value: toRoll, base: baseTOroll },
    { label: 'Takeoff Over 50ft', value: to50, base: baseTO50 },
    { label: 'Landing Ground Roll', value: ldgRoll, base: baseLDGroll },
    { label: 'Landing Over 50ft', value: ldg50, base: baseLDG50 }
  ];

  const isOk = (val) => rwyLen > 0 ? val <= rwyLen : true;
  document.getElementById('resultCards').innerHTML = cards.map(c => `
    <div class="result-card ${isOk(c.value) ? 'go' : 'nogo'}">
      <div class="result-label">${c.label}</div>
      <div class="result-value">${c.value.toLocaleString()} ft</div>
      <div class="result-sub">Base: ${c.base.toLocaleString()} ft</div>
    </div>
  `).join('');

  // Corrections
  let corrHtml = '<div class="corrections-list"><strong style="color:var(--cyan);font-size:.75rem">APPLIED CORRECTIONS:</strong>';
  corrections.forEach(c => { corrHtml += `<div>${c.label} <span>${c.pct}</span></div>`; });
  corrHtml += `<div style="margin-top:4px;color:var(--text)">Total T/O factor: <span>${toFactor.toFixed(3)}x</span> | Total LDG factor: <span>${ldgFactor.toFixed(3)}x</span>${safetyPct > 0 ? ` | Safety: <span>${sfMult}x</span>` : ''}</div>`;
  corrHtml += '</div>';
  document.getElementById('correctionDetails').innerHTML = corrHtml;

  document.getElementById('resultsCard').classList.remove('hidden');

  // Bar chart
  renderBars(cards, rwyLen);
  document.getElementById('chartCard').classList.remove('hidden');
}

function renderBars(cards, rwyLen) {
  const maxVal = Math.max(...cards.map(c => c.value), rwyLen || 0) * 1.1;
  let html = '';
  const colors = ['var(--cyan)', 'var(--cyan)', 'var(--orange)', 'var(--orange)'];

  cards.forEach((c, i) => {
    const pct = (c.value / maxVal) * 100;
    const ok = rwyLen > 0 ? c.value <= rwyLen : true;
    html += `<div class="bar-row">
      <div class="bar-label">${c.label}: ${c.value.toLocaleString()} ft</div>
      <div class="bar-track" style="position:relative">
        <div class="bar-fill" style="width:${pct}%;background:${ok ? colors[i] : 'var(--red)'};color:#050a0f">${c.value.toLocaleString()}</div>
        ${rwyLen > 0 ? `<div class="bar-avail" style="left:${(rwyLen/maxVal)*100}%"><span class="bar-avail-label">RWY ${rwyLen.toLocaleString()}'</span></div>` : ''}
      </div>
    </div>`;
  });

  document.getElementById('barChart').innerHTML = html;
}

function exportResults() {
  const name = document.getElementById('profName').value || 'Aircraft';
  const resultsEl = document.getElementById('resultsCard');
  if (resultsEl.classList.contains('hidden')) { alert('Calculate results first.'); return; }

  let text = `TAKEOFF & LANDING PERFORMANCE - ${name}\n`;
  text += `Date: ${new Date().toISOString().slice(0,10)}\n`;
  text += `Generated by Korb Engineering T/O & Landing Calculator\n\n`;
  text += `CONDITIONS:\n`;
  text += `  Weight: ${document.getElementById('acWeight').value} lbs\n`;
  text += `  Pressure Altitude: ${document.getElementById('pressAlt').value} ft\n`;
  text += `  Temperature: ${document.getElementById('tempC').value} C\n`;
  text += `  Headwind: ${document.getElementById('headwind').value} kt\n`;
  text += `  Surface: ${document.getElementById('surface').selectedOptions[0].text}\n`;
  text += `  Slope: ${document.getElementById('slope').value}%\n`;
  text += `  Safety Factor: ${document.getElementById('safetyFactor').selectedOptions[0].text}\n\n`;
  text += `RESULTS:\n`;
  resultsEl.querySelectorAll('.result-card').forEach(c => {
    const label = c.querySelector('.result-label').textContent;
    const value = c.querySelector('.result-value').textContent;
    text += `  ${label}: ${value}\n`;
  });
  const rwyLen = document.getElementById('rwyLength').value;
  if (rwyLen) text += `\n  Available Runway: ${rwyLen} ft\n`;
  const badge = resultsEl.querySelector('.status-badge');
  if (badge) text += `  Status: ${badge.textContent}\n`;

  navigator.clipboard.writeText(text).then(() => alert('Copied to clipboard!')).catch(() => {
    const ta = document.createElement('textarea');
    ta.value = text; document.body.appendChild(ta); ta.select(); document.execCommand('copy'); ta.remove();
    alert('Copied!');
  });
}
</script>
</body>
</html>
