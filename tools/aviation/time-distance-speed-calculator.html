<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="description" content="Time / Distance / Speed Calculator — a free, browser-based aviation engineering tool from Korb Engineering. No signup, no downloads, works on mobile.">
<title>Time / Distance / Speed Calculator - Korb Engineering</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{--bg:#050a0f;--surface:#0a1018;--surface2:#0e1520;--border:#1a2535;--text:#e2e8f0;--text-dim:#8892a2;--cyan:#00d4ff;--orange:#ff6600;--green:#10b981;--red:#ef4444;--font:'JetBrains Mono',monospace}
html{font-size:16px}
body{font-family:var(--font);background:var(--bg);color:var(--text);min-height:100vh;line-height:1.6}
header{background:var(--surface);border-bottom:1px solid var(--border);padding:16px 20px;display:flex;align-items:center;gap:12px;flex-wrap:wrap}
.logo{font-size:1.1rem;font-weight:700;color:var(--cyan);letter-spacing:1px}
.logo span{color:var(--orange)}
header h1{font-size:1rem;font-weight:400;color:var(--text-dim)}
main{max-width:960px;margin:0 auto;padding:20px}
.card{background:var(--surface);border:1px solid var(--border);border-radius:8px;padding:20px;margin-bottom:20px}
.card h2{font-size:.9rem;font-weight:600;color:var(--cyan);text-transform:uppercase;letter-spacing:1px;margin-bottom:16px;padding-bottom:8px;border-bottom:1px solid var(--border)}
.tabs{display:flex;gap:0;margin-bottom:20px;border-bottom:1px solid var(--border)}
.tab{padding:12px 20px;background:none;border:none;color:var(--text-dim);font-family:var(--font);font-size:.8rem;font-weight:500;cursor:pointer;border-bottom:2px solid transparent;min-height:44px;transition:all .2s}
.tab.active{color:var(--cyan);border-bottom-color:var(--cyan)}
.tab:hover{color:var(--text)}
.tab-content{display:none}
.tab-content.active{display:block}
.form-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px}
.form-grid-3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:12px}
@media(max-width:600px){.form-grid,.form-grid-3{grid-template-columns:1fr}}
label{display:block;font-size:.75rem;font-weight:500;color:var(--text-dim);text-transform:uppercase;letter-spacing:.5px;margin-bottom:4px}
input,select{width:100%;background:var(--surface2);border:1px solid var(--border);border-radius:6px;padding:12px;color:var(--text);font-family:var(--font);font-size:16px;min-height:44px;transition:border-color .2s}
input:focus,select:focus{outline:none;border-color:var(--cyan)}
input::placeholder{color:var(--text-dim)}
input[type="time"]{color-scheme:dark}
button{min-height:44px;padding:12px 24px;border:none;border-radius:6px;font-family:var(--font);font-size:.85rem;font-weight:600;cursor:pointer;transition:all .2s;text-transform:uppercase;letter-spacing:1px}
.btn-primary{background:var(--cyan);color:var(--bg)}
.btn-primary:hover{background:#33ddff}
.btn-secondary{background:var(--surface2);color:var(--text);border:1px solid var(--border)}
.btn-secondary:hover{border-color:var(--cyan)}
.btn-sm{min-height:36px;padding:8px 14px;font-size:.75rem}
.btn-row{display:flex;gap:10px;margin-top:16px;flex-wrap:wrap}
.result-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(180px,1fr));gap:12px;margin-top:16px}
.result-item{background:var(--surface2);border:1px solid var(--border);border-radius:6px;padding:16px;text-align:center}
.result-item .value{font-size:1.5rem;font-weight:700;color:var(--cyan)}
.result-item .label{font-size:.7rem;color:var(--text-dim);text-transform:uppercase;margin-top:4px}
.solve-for{display:flex;gap:8px;margin-bottom:16px;flex-wrap:wrap}
.solve-btn{padding:10px 18px;min-height:44px;border:1px solid var(--border);border-radius:6px;background:var(--surface2);color:var(--text);font-family:var(--font);font-size:.8rem;cursor:pointer;transition:all .2s}
.solve-btn.active{border-color:var(--cyan);color:var(--cyan);background:rgba(0,212,255,.08)}
.progress-bar{width:100%;height:8px;background:var(--surface2);border-radius:4px;overflow:hidden;margin-top:12px}
.progress-fill{height:100%;background:linear-gradient(90deg,var(--cyan),var(--green));border-radius:4px;transition:width .5s}
.leg-row{display:grid;grid-template-columns:2fr 1fr 1fr 1fr auto;gap:8px;align-items:end;margin-bottom:8px}
@media(max-width:700px){.leg-row{grid-template-columns:1fr 1fr;}.leg-row>:first-child{grid-column:1/-1}}
.hidden{display:none}
table{width:100%;border-collapse:collapse;margin-top:12px}
th,td{padding:10px 12px;text-align:left;border-bottom:1px solid var(--border);font-size:.8rem}
th{color:var(--text-dim);font-weight:500;text-transform:uppercase;letter-spacing:.5px;font-size:.7rem}
.total-row{font-weight:700;color:var(--cyan)}
.total-row td{border-top:2px solid var(--cyan);border-bottom:none}
footer{text-align:center;padding:20px;color:var(--text-dim);font-size:.7rem;border-top:1px solid var(--border);margin-top:40px}
</style>
</head>
<body>
<header>
<div class="logo">KORB<span>.</span>ENGINEERING</div>
<h1>/ Time &middot; Distance &middot; Speed Calculator</h1>
</header>
<main>
<div class="tabs">
<button class="tab active" onclick="switchTab('quick')">Quick Calc</button>
<button class="tab" onclick="switchTab('eta')">ETA Calculator</button>
<button class="tab" onclick="switchTab('multi')">Multi-Leg</button>
<button class="tab" onclick="switchTab('gs')">GS from Wind</button>
</div>

<!-- Quick Calc -->
<div id="tab-quick" class="tab-content active">
<div class="card">
<h2>Solve for Unknown</h2>
<p style="font-size:.8rem;color:var(--text-dim);margin-bottom:12px">Select what to solve for, enter the other two values.</p>
<div class="solve-for">
<button class="solve-btn active" onclick="setSolve('time')">Time</button>
<button class="solve-btn" onclick="setSolve('distance')">Distance</button>
<button class="solve-btn" onclick="setSolve('speed')">Speed</button>
</div>
<div class="form-grid-3">
<div id="grp-speed">
<label for="qSpeed">Speed</label>
<div style="display:flex;gap:6px">
<input type="number" id="qSpeed" min="0" step="0.1" placeholder="e.g. 120" style="flex:1">
<select id="qSpeedUnit" style="width:80px;flex:none">
<option value="kts">kts</option>
<option value="mph">mph</option>
<option value="kmh">km/h</option>
</select>
</div>
</div>
<div id="grp-distance">
<label for="qDist">Distance</label>
<div style="display:flex;gap:6px">
<input type="number" id="qDist" min="0" step="0.1" placeholder="e.g. 250" style="flex:1">
<select id="qDistUnit" style="width:80px;flex:none">
<option value="nm">NM</option>
<option value="sm">SM</option>
<option value="km">km</option>
</select>
</div>
</div>
<div id="grp-time">
<label for="qTime">Time</label>
<div style="display:flex;gap:6px">
<input type="number" id="qTime" min="0" step="0.1" placeholder="e.g. 90" style="flex:1">
<select id="qTimeUnit" style="width:70px;flex:none">
<option value="min">min</option>
<option value="hr">hrs</option>
<option value="sec">sec</option>
</select>
</div>
</div>
</div>
<div class="btn-row">
<button class="btn-primary" onclick="quickCalc()">Calculate</button>
</div>
<div id="quickResult" class="hidden">
<div class="result-grid" id="quickResultGrid"></div>
<div class="progress-bar"><div class="progress-fill" id="quickProgress" style="width:0%"></div></div>
</div>
</div>
</div>

<!-- ETA -->
<div id="tab-eta" class="tab-content">
<div class="card">
<h2>ETA Calculator</h2>
<div class="form-grid">
<div>
<label for="depTime">Departure Time</label>
<input type="time" id="depTime" value="08:00">
</div>
<div>
<label for="etaTimeZone">Time Zone</label>
<select id="etaTimeZone">
<option value="local">Local</option>
<option value="utc">UTC / Zulu</option>
</select>
</div>
<div>
<label for="flightHrs">Flight Time (hours)</label>
<input type="number" id="flightHrs" min="0" step="1" placeholder="0" value="0">
</div>
<div>
<label for="flightMins">Flight Time (minutes)</label>
<input type="number" id="flightMins" min="0" max="59" step="1" placeholder="0" value="0">
</div>
</div>
<div class="btn-row">
<button class="btn-primary" onclick="calcETA()">Calculate ETA</button>
</div>
<div id="etaResult" class="hidden">
<div class="result-grid" id="etaResultGrid"></div>
</div>
</div>
</div>

<!-- Multi-Leg -->
<div id="tab-multi" class="tab-content">
<div class="card">
<h2>Multi-Leg Planner</h2>
<div style="font-size:.75rem;color:var(--text-dim);margin-bottom:12px">
<label>Speed Unit</label>
<select id="multiSpeedUnit" style="width:100px">
<option value="kts">kts</option><option value="mph">mph</option><option value="kmh">km/h</option>
</select>
<label style="margin-left:12px">Distance Unit</label>
<select id="multiDistUnit" style="width:80px">
<option value="nm">NM</option><option value="sm">SM</option><option value="km">km</option>
</select>
</div>
<div id="multiLegs"></div>
<button class="btn-secondary btn-sm" onclick="addMultiLeg()">+ Add Leg</button>
<div class="btn-row">
<button class="btn-primary" onclick="calcMulti()">Calculate</button>
</div>
<div id="multiResult" class="hidden" style="overflow-x:auto">
<table>
<thead><tr><th>Leg</th><th>Distance</th><th>Speed</th><th>Time</th></tr></thead>
<tbody id="multiBody"></tbody>
</table>
</div>
</div>
</div>

<!-- GS from Wind -->
<div id="tab-gs" class="tab-content">
<div class="card">
<h2>Ground Speed from TAS + Wind</h2>
<div class="form-grid">
<div>
<label for="gsTAS">True Airspeed (kts)</label>
<input type="number" id="gsTAS" min="0" step="1" placeholder="e.g. 130">
</div>
<div>
<label for="gsCourse">True Course (deg)</label>
<input type="number" id="gsCourse" min="0" max="360" step="1" placeholder="0-360">
</div>
<div>
<label for="gsWindDir">Wind Direction (from)</label>
<input type="number" id="gsWindDir" min="0" max="360" step="1" placeholder="0-360">
</div>
<div>
<label for="gsWindSpd">Wind Speed (kts)</label>
<input type="number" id="gsWindSpd" min="0" step="1" placeholder="e.g. 20">
</div>
</div>
<div class="btn-row">
<button class="btn-primary" onclick="calcGS()">Calculate</button>
</div>
<div id="gsResult" class="hidden">
<div class="result-grid" id="gsResultGrid"></div>
</div>
</div>
</div>
</main>
<footer>&copy; Korb Engineering &mdash; Aviation Tools</footer>

<script>
let solveFor='time';
let multiLegCount=0;

function switchTab(name){
  document.querySelectorAll('.tab').forEach((t,i)=>{
    const tabs=['quick','eta','multi','gs'];
    t.classList.toggle('active',tabs[i]===name);
  });
  document.querySelectorAll('.tab-content').forEach(c=>c.classList.remove('active'));
  document.getElementById('tab-'+name).classList.add('active');
}

function setSolve(what){
  solveFor=what;
  document.querySelectorAll('.solve-btn').forEach(b=>b.classList.remove('active'));
  event.target.classList.add('active');
  // Disable the solved-for input
  ['speed','distance','time'].forEach(f=>{
    const inp=document.getElementById('q'+f.charAt(0).toUpperCase()+f.slice(1));
    if(f===what){inp.value='';inp.placeholder='(calculated)';inp.disabled=true;}
    else{inp.placeholder='';inp.disabled=false;}
  });
}

// Conversions
function toKts(val,unit){return unit==='mph'?val/1.15078:unit==='kmh'?val/1.852:val;}
function fromKts(val,unit){return unit==='mph'?val*1.15078:unit==='kmh'?val*1.852:val;}
function toNM(val,unit){return unit==='sm'?val/1.15078:unit==='km'?val/1.852:val;}
function fromNM(val,unit){return unit==='sm'?val*1.15078:unit==='km'?val*1.852:val;}
function toHrs(val,unit){return unit==='min'?val/60:unit==='sec'?val/3600:val;}
function fromHrs(val,unit){return unit==='min'?val*60:unit==='sec'?val*3600:val;}
function fmtTime(hrs){const h=Math.floor(hrs);const m=Math.round((hrs-h)*60);return`${h}h ${m}m`;}

function quickCalc(){
  const sU=document.getElementById('qSpeedUnit').value;
  const dU=document.getElementById('qDistUnit').value;
  const tU=document.getElementById('qTimeUnit').value;
  let s=parseFloat(document.getElementById('qSpeed').value);
  let d=parseFloat(document.getElementById('qDist').value);
  let t=parseFloat(document.getElementById('qTime').value);

  let result,label,value,unit;
  if(solveFor==='time'){
    if(!s||!d){alert('Enter speed and distance.');return;}
    const sKts=toKts(s,sU);const dNM=toNM(d,dU);
    const hrs=dNM/sKts;
    value=fromHrs(hrs,tU).toFixed(1);
    label='Time';unit=tU;
  }else if(solveFor==='distance'){
    if(!s||!t){alert('Enter speed and time.');return;}
    const sKts=toKts(s,sU);const hrs=toHrs(t,tU);
    const nm=sKts*hrs;
    value=fromNM(nm,dU).toFixed(1);
    label='Distance';unit=dU;
  }else{
    if(!d||!t){alert('Enter distance and time.');return;}
    const dNM=toNM(d,dU);const hrs=toHrs(t,tU);
    const kts=dNM/hrs;
    value=fromKts(kts,sU).toFixed(1);
    label='Speed';unit=sU;
  }

  document.getElementById('quickResultGrid').innerHTML=`
    <div class="result-item"><div class="value">${value}</div><div class="label">${label} (${unit})</div></div>`;
  document.getElementById('quickResult').classList.remove('hidden');
  // Animate progress
  const fill=document.getElementById('quickProgress');
  fill.style.width='0%';
  setTimeout(()=>fill.style.width='100%',50);
}

function calcETA(){
  const dep=document.getElementById('depTime').value;
  const hrs=parseInt(document.getElementById('flightHrs').value)||0;
  const mins=parseInt(document.getElementById('flightMins').value)||0;
  if(!dep){alert('Enter departure time.');return;}
  const[dh,dm]=dep.split(':').map(Number);
  let totalMin=dh*60+dm+hrs*60+mins;
  const etaH=Math.floor(totalMin/60)%24;
  const etaM=totalMin%60;
  const tz=document.getElementById('etaTimeZone').value;
  const suffix=tz==='utc'?'Z':'L';
  document.getElementById('etaResultGrid').innerHTML=`
    <div class="result-item"><div class="value">${String(etaH).padStart(2,'0')}:${String(etaM).padStart(2,'0')}${suffix}</div><div class="label">Estimated Time of Arrival</div></div>
    <div class="result-item"><div class="value">${hrs}h ${mins}m</div><div class="label">Total Flight Time</div></div>`;
  document.getElementById('etaResult').classList.remove('hidden');
}

function addMultiLeg(){
  multiLegCount++;
  const div=document.createElement('div');
  div.className='leg-row';
  div.id='mleg-'+multiLegCount;
  div.innerHTML=`
    <div><label>Waypoint</label><input type="text" class="ml-name" placeholder="e.g. KJFK"></div>
    <div><label>Distance</label><input type="number" class="ml-dist" min="0" step="0.1"></div>
    <div><label>Speed</label><input type="number" class="ml-spd" min="0" step="0.1"></div>
    <div><label>Time (min)</label><input type="number" class="ml-time" readonly tabindex="-1" style="color:var(--cyan)"></div>
    <div><button class="btn-danger btn-sm" onclick="this.closest('.leg-row').remove()" style="margin-bottom:2px">&times;</button></div>`;
  document.getElementById('multiLegs').appendChild(div);
}

function calcMulti(){
  const legs=document.querySelectorAll('#multiLegs .leg-row');
  if(legs.length===0){alert('Add at least one leg.');return;}
  const sU=document.getElementById('multiSpeedUnit').value;
  const dU=document.getElementById('multiDistUnit').value;
  let tbody='';let totalDist=0,totalMin=0;
  legs.forEach((leg,i)=>{
    const name=leg.querySelector('.ml-name').value||('Leg '+(i+1));
    const dist=parseFloat(leg.querySelector('.ml-dist').value)||0;
    const spd=parseFloat(leg.querySelector('.ml-spd').value)||0;
    const distNM=toNM(dist,dU);
    const spdKts=toKts(spd,sU);
    const hrs=spdKts>0?distNM/spdKts:0;
    const min=hrs*60;
    leg.querySelector('.ml-time').value=min.toFixed(1);
    totalDist+=dist;totalMin+=min;
    tbody+=`<tr><td>${name}</td><td>${dist.toFixed(1)} ${dU}</td><td>${spd.toFixed(1)} ${sU}</td><td>${fmtTime(hrs)}</td></tr>`;
  });
  tbody+=`<tr class="total-row"><td>TOTAL</td><td>${totalDist.toFixed(1)} ${dU}</td><td>--</td><td>${fmtTime(totalMin/60)}</td></tr>`;
  document.getElementById('multiBody').innerHTML=tbody;
  document.getElementById('multiResult').classList.remove('hidden');
}

function calcGS(){
  const tas=parseFloat(document.getElementById('gsTAS').value);
  const tc=parseFloat(document.getElementById('gsCourse').value);
  const wd=parseFloat(document.getElementById('gsWindDir').value);
  const ws=parseFloat(document.getElementById('gsWindSpd').value);
  if(!tas||isNaN(tc)||isNaN(wd)||isNaN(ws)){alert('Enter all values.');return;}
  const DEG=Math.PI/180,RAD=180/Math.PI;
  const sinWCA=ws*Math.sin((wd-tc)*DEG)/tas;
  const wca=Math.asin(Math.max(-1,Math.min(1,sinWCA)))*RAD;
  const th=((tc+wca)%360+360)%360;
  const gs=tas*Math.cos(wca*DEG)+ws*Math.cos((wd-tc)*DEG);
  document.getElementById('gsResultGrid').innerHTML=`
    <div class="result-item"><div class="value">${Math.max(0,gs).toFixed(1)}</div><div class="label">Ground Speed (kts)</div></div>
    <div class="result-item"><div class="value">${wca.toFixed(1)}°</div><div class="label">Wind Correction Angle</div></div>
    <div class="result-item"><div class="value">${th.toFixed(1)}°</div><div class="label">True Heading</div></div>`;
  document.getElementById('gsResult').classList.remove('hidden');
}

// Init
setSolve('time');
document.querySelectorAll('.solve-btn')[0].click();
addMultiLeg();
</script>
</body>
</html>
