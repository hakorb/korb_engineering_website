<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="description" content="Weight &amp;amp; Balance Calculator — a free, browser-based aviation engineering tool from Korb Engineering. No signup, no downloads, works on mobile.">
<title>Weight &amp; Balance Calculator - Korb Engineering</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{--bg:#050a0f;--surface:#0a1018;--surface2:#0e1520;--border:#1a2535;--text:#e2e8f0;--cyan:#00d4ff;--orange:#ff6600;--green:#10b981;--red:#ef4444;--font:'JetBrains Mono',monospace}
html{font-size:16px}
body{background:var(--bg);color:var(--text);font-family:var(--font);min-height:100vh;line-height:1.5}
a{color:var(--cyan);text-decoration:none}
header{background:var(--surface);border-bottom:1px solid var(--border);padding:16px 20px;display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:8px}
.brand{display:flex;align-items:center;gap:10px}
.brand svg{width:28px;height:28px;flex-shrink:0}
.brand-text{font-weight:600;font-size:.85rem;color:var(--cyan);letter-spacing:.5px;text-transform:uppercase}
.tool-title{font-size:1.1rem;font-weight:700;color:var(--text)}
.container{max-width:1200px;margin:0 auto;padding:16px}
.card{background:var(--surface);border:1px solid var(--border);border-radius:8px;padding:16px;margin-bottom:16px}
.card h2{font-size:.95rem;color:var(--cyan);margin-bottom:12px;text-transform:uppercase;letter-spacing:.5px;font-weight:600}
.card h3{font-size:.85rem;color:var(--orange);margin-bottom:8px;font-weight:600}
label{display:block;font-size:.75rem;color:#8899aa;margin-bottom:4px;font-weight:500;text-transform:uppercase;letter-spacing:.3px}
input,select,textarea{width:100%;background:var(--surface2);border:1px solid var(--border);border-radius:6px;padding:10px 12px;color:var(--text);font-family:var(--font);font-size:16px;min-height:44px;transition:border-color .2s}
input:focus,select:focus,textarea:focus{outline:none;border-color:var(--cyan)}
input[type=number]{-moz-appearance:textfield}
input::-webkit-outer-spin-button,input::-webkit-inner-spin-button{-webkit-appearance:none}
.btn{display:inline-flex;align-items:center;justify-content:center;min-height:44px;padding:10px 20px;border:none;border-radius:6px;font-family:var(--font);font-size:.8rem;font-weight:600;cursor:pointer;transition:opacity .2s,transform .1s;text-transform:uppercase;letter-spacing:.5px}
.btn:active{transform:scale(.97)}
.btn-cyan{background:var(--cyan);color:#050a0f}
.btn-orange{background:var(--orange);color:#fff}
.btn-green{background:var(--green);color:#fff}
.btn-red{background:var(--red);color:#fff}
.btn-ghost{background:transparent;border:1px solid var(--border);color:var(--text)}
.btn-sm{min-height:36px;padding:6px 14px;font-size:.7rem}
.row{display:grid;gap:12px}
.row-2{grid-template-columns:1fr 1fr}
.row-3{grid-template-columns:1fr 1fr 1fr}
.row-4{grid-template-columns:1fr 1fr 1fr 1fr}
@media(max-width:600px){.row-2,.row-3,.row-4{grid-template-columns:1fr}}
.flex-wrap{display:flex;flex-wrap:wrap;gap:8px}
.station-row{display:grid;grid-template-columns:2fr 1fr 1fr 1fr;gap:8px;align-items:end;padding:8px 0;border-bottom:1px solid var(--border)}
.station-row:last-child{border-bottom:none}
@media(max-width:700px){.station-row{grid-template-columns:1fr 1fr;}}
.station-label{font-size:.8rem;font-weight:600;color:var(--text);grid-column:1/-1}
@media(min-width:701px){.station-label{grid-column:auto}}
table{width:100%;border-collapse:collapse;font-size:.8rem}
th{text-align:left;color:var(--cyan);font-weight:600;padding:8px;border-bottom:1px solid var(--border);font-size:.7rem;text-transform:uppercase;letter-spacing:.3px}
td{padding:8px;border-bottom:1px solid var(--border)}
.total-row td{font-weight:700;color:var(--orange);border-top:2px solid var(--orange)}
.status-badge{display:inline-flex;align-items:center;gap:6px;padding:6px 14px;border-radius:20px;font-size:.8rem;font-weight:700}
.status-ok{background:rgba(16,185,129,.15);color:var(--green);border:1px solid var(--green)}
.status-warn{background:rgba(239,68,68,.15);color:var(--red);border:1px solid var(--red)}
canvas{width:100%;max-width:500px;display:block;margin:8px auto}
.scenario-tabs{display:flex;gap:4px;margin-bottom:12px}
.scenario-tab{padding:8px 16px;border:1px solid var(--border);background:var(--surface2);color:var(--text);border-radius:6px 6px 0 0;cursor:pointer;font-family:var(--font);font-size:.75rem;font-weight:600;min-height:44px;display:flex;align-items:center}
.scenario-tab.active{background:var(--surface);border-bottom-color:var(--surface);color:var(--cyan)}
.hidden{display:none!important}
.warnings{margin-top:8px}
.warning-item{background:rgba(239,68,68,.1);border:1px solid var(--red);border-radius:6px;padding:8px 12px;margin-bottom:6px;font-size:.8rem;color:var(--red)}
@media print{body{background:#fff;color:#000}header{background:#eee;border-color:#ccc}.brand-text{color:#0066aa}.card{border-color:#ccc;background:#fff}.btn,.scenario-tabs{display:none!important}th{color:#0066aa}td,.total-row td{color:#000;border-color:#ccc}canvas{max-width:400px}.status-ok{background:#e0ffe0;color:#006600;border-color:#006600}.status-warn{background:#ffe0e0;color:#660000;border-color:#660000}}
</style>
</head>
<body>
<header>
<div class="brand">
<svg viewBox="0 0 100 100" fill="none" xmlns="http://www.w3.org/2000/svg"><rect x="5" y="5" width="90" height="90" rx="12" stroke="#00d4ff" stroke-width="4"/><text x="50" y="62" text-anchor="middle" fill="#00d4ff" font-family="monospace" font-size="36" font-weight="700">KE</text></svg>
<div><div class="brand-text">Korb Engineering</div><div class="tool-title">Weight &amp; Balance Calculator</div></div>
</div>
<div class="flex-wrap">
<button class="btn btn-ghost btn-sm" onclick="exportToClipboard()">Copy Report</button>
<button class="btn btn-ghost btn-sm" onclick="window.print()">Print</button>
</div>
</header>

<div class="container">
<!-- Aircraft Profile -->
<div class="card">
<h2>Aircraft Profile</h2>
<div class="flex-wrap" style="margin-bottom:12px">
<select id="templateSelect" style="width:auto;min-width:200px" onchange="loadTemplate()">
<option value="">-- Select Template --</option>
<option value="c172">Cessna 172S</option>
<option value="cherokee">Piper Cherokee PA-28-180</option>
<option value="bonanza">Beechcraft Bonanza A36</option>
<option value="sr22">Cirrus SR22</option>
</select>
<button class="btn btn-cyan btn-sm" onclick="saveProfile()">Save Profile</button>
<button class="btn btn-ghost btn-sm" onclick="loadSavedProfile()">Load Saved</button>
<button class="btn btn-ghost btn-sm" onclick="deleteSavedProfile()">Delete Saved</button>
</div>
<div class="row row-4" style="margin-bottom:12px">
<div><label>Aircraft Name</label><input type="text" id="acName" placeholder="e.g. N12345"></div>
<div><label>Empty Weight (lbs)</label><input type="number" id="emptyWeight" step="0.1"></div>
<div><label>Empty Wt Arm (in)</label><input type="number" id="emptyArm" step="0.01"></div>
<div><label>Empty Wt Moment (in-lb)</label><input type="number" id="emptyMoment" step="0.1" readonly style="opacity:.7"></div>
</div>
<div class="row row-4">
<div><label>Max Gross Weight (lbs)</label><input type="number" id="maxGross" step="1"></div>
<div><label>Max Ramp Weight (lbs)</label><input type="number" id="maxRamp" step="1"></div>
<div><label>Max Zero Fuel Wt (lbs)</label><input type="number" id="maxZFW" step="1" placeholder="optional"></div>
<div><label>Fuel Burn (gal/hr)</label><input type="number" id="fuelBurn" step="0.1" value="8.5"></div>
</div>
</div>

<!-- CG Envelope Data -->
<div class="card">
<h2>CG Envelope Limits</h2>
<p style="font-size:.75rem;color:#8899aa;margin-bottom:8px">Define forward &amp; aft CG limits at various weights (loaded from template or enter manually).</p>
<div id="envelopeInputs"></div>
<button class="btn btn-ghost btn-sm" onclick="addEnvelopePoint()" style="margin-top:8px">+ Add Point</button>
</div>

<!-- Scenarios -->
<div class="card">
<h2>Loading Scenarios</h2>
<div class="scenario-tabs" id="scenarioTabs"></div>
<div id="scenarioContent"></div>
</div>

<!-- Summary -->
<div class="card" id="summaryCard">
<h2>Summary</h2>
<div id="summaryContent"></div>
  </div>

<!-- CG Chart -->
<div class="card">
<h2>CG Envelope Chart</h2>
<canvas id="cgCanvas" width="500" height="400"></canvas>
</div>
</div>

<script>
const AVGAS_LBS_PER_GAL = 6.0;

const TEMPLATES = {
  c172: {
    name: 'Cessna 172S', emptyWeight: 1680, emptyArm: 40.5, maxGross: 2550, maxRamp: 2558, maxZFW: 0,
    stations: [
      { name: 'Pilot & Front Pax', arm: 37.0, weight: 0, isFuel: false },
      { name: 'Rear Passengers', arm: 73.0, weight: 0, isFuel: false },
      { name: 'Baggage Area 1', arm: 95.0, weight: 0, isFuel: false, maxWt: 120 },
      { name: 'Baggage Area 2', arm: 123.0, weight: 0, isFuel: false, maxWt: 50 },
      { name: 'Fuel (gal)', arm: 48.0, weight: 0, isFuel: true }
    ],
    envelope: [
      { weight: 1500, fwdCG: 35.0, aftCG: 47.3 },
      { weight: 1950, fwdCG: 35.0, aftCG: 47.3 },
      { weight: 2550, fwdCG: 40.5, aftCG: 47.3 }
    ],
    fuelBurn: 8.5
  },
  cherokee: {
    name: 'Piper Cherokee PA-28-180', emptyWeight: 1301, emptyArm: 86.4, maxGross: 2400, maxRamp: 2407, maxZFW: 0,
    stations: [
      { name: 'Pilot & Front Pax', arm: 80.5, weight: 0, isFuel: false },
      { name: 'Rear Passengers', arm: 118.1, weight: 0, isFuel: false },
      { name: 'Baggage Area 1', arm: 142.8, weight: 0, isFuel: false, maxWt: 200 },
      { name: 'Baggage Area 2', arm: 178.0, weight: 0, isFuel: false, maxWt: 0 },
      { name: 'Fuel (gal)', arm: 95.0, weight: 0, isFuel: true }
    ],
    envelope: [
      { weight: 1500, fwdCG: 82.0, aftCG: 93.0 },
      { weight: 2400, fwdCG: 82.0, aftCG: 93.0 }
    ],
    fuelBurn: 9.0
  },
  bonanza: {
    name: 'Beechcraft Bonanza A36', emptyWeight: 2363, emptyArm: 82.0, maxGross: 3650, maxRamp: 3663, maxZFW: 0,
    stations: [
      { name: 'Pilot & Front Pax', arm: 82.0, weight: 0, isFuel: false },
      { name: 'Rear Passengers', arm: 121.0, weight: 0, isFuel: false },
      { name: 'Baggage Area 1', arm: 146.0, weight: 0, isFuel: false, maxWt: 270 },
      { name: 'Baggage Area 2', arm: 175.0, weight: 0, isFuel: false, maxWt: 100 },
      { name: 'Fuel (gal)', arm: 75.0, weight: 0, isFuel: true }
    ],
    envelope: [
      { weight: 2500, fwdCG: 77.0, aftCG: 86.7 },
      { weight: 3650, fwdCG: 82.0, aftCG: 86.7 }
    ],
    fuelBurn: 14.0
  },
  sr22: {
    name: 'Cirrus SR22', emptyWeight: 2270, emptyArm: 141.8, maxGross: 3400, maxRamp: 3417, maxZFW: 0,
    stations: [
      { name: 'Pilot & Front Pax', arm: 131.0, weight: 0, isFuel: false },
      { name: 'Rear Passengers', arm: 170.0, weight: 0, isFuel: false },
      { name: 'Baggage Area 1', arm: 204.0, weight: 0, isFuel: false, maxWt: 130 },
      { name: 'Baggage Area 2', arm: 222.0, weight: 0, isFuel: false, maxWt: 0 },
      { name: 'Fuel (gal)', arm: 151.0, weight: 0, isFuel: true }
    ],
    envelope: [
      { weight: 2100, fwdCG: 137.0, aftCG: 146.7 },
      { weight: 2700, fwdCG: 137.0, aftCG: 146.7 },
      { weight: 3400, fwdCG: 141.0, aftCG: 146.7 }
    ],
    fuelBurn: 17.0
  }
};

let scenarios = [
  { name: 'Scenario 1', stations: [] },
  { name: 'Scenario 2', stations: [] },
  { name: 'Scenario 3', stations: [] }
];
let activeScenario = 0;
let envelopeData = [];

function init() {
  buildScenarioTabs();
  loadTemplate();
  bindAutoCalc();
}

function bindAutoCalc() {
  document.querySelectorAll('#emptyWeight,#emptyArm').forEach(el => {
    el.addEventListener('input', () => {
      const w = parseFloat(document.getElementById('emptyWeight').value) || 0;
      const a = parseFloat(document.getElementById('emptyArm').value) || 0;
      document.getElementById('emptyMoment').value = (w * a).toFixed(1);
      recalculate();
    });
  });
}

function loadTemplate() {
  const key = document.getElementById('templateSelect').value;
  if (!key) return;
  const t = TEMPLATES[key];
  document.getElementById('acName').value = t.name;
  document.getElementById('emptyWeight').value = t.emptyWeight;
  document.getElementById('emptyArm').value = t.emptyArm;
  document.getElementById('emptyMoment').value = (t.emptyWeight * t.emptyArm).toFixed(1);
  document.getElementById('maxGross').value = t.maxGross;
  document.getElementById('maxRamp').value = t.maxRamp;
  document.getElementById('maxZFW').value = t.maxZFW || '';
  document.getElementById('fuelBurn').value = t.fuelBurn;
  envelopeData = JSON.parse(JSON.stringify(t.envelope));
  renderEnvelope();
  for (let i = 0; i < 3; i++) {
    scenarios[i].stations = JSON.parse(JSON.stringify(t.stations));
  }
  renderScenario();
}

function renderEnvelope() {
  const c = document.getElementById('envelopeInputs');
  c.innerHTML = '';
  envelopeData.forEach((p, i) => {
    const row = document.createElement('div');
    row.className = 'row row-3';
    row.style.marginBottom = '6px';
    row.innerHTML = `
      <div><label>Weight (lbs)</label><input type="number" value="${p.weight}" onchange="envelopeData[${i}].weight=parseFloat(this.value)||0;recalculate()"></div>
      <div><label>Fwd CG (in)</label><input type="number" step="0.1" value="${p.fwdCG}" onchange="envelopeData[${i}].fwdCG=parseFloat(this.value)||0;recalculate()"></div>
      <div><label>Aft CG (in)</label><input type="number" step="0.1" value="${p.aftCG}" onchange="envelopeData[${i}].aftCG=parseFloat(this.value)||0;recalculate()"></div>
    `;
    c.appendChild(row);
  });
}

function addEnvelopePoint() {
  envelopeData.push({ weight: 0, fwdCG: 0, aftCG: 0 });
  renderEnvelope();
}

function buildScenarioTabs() {
  const tabs = document.getElementById('scenarioTabs');
  tabs.innerHTML = '';
  scenarios.forEach((s, i) => {
    const tab = document.createElement('button');
    tab.className = 'scenario-tab' + (i === activeScenario ? ' active' : '');
    tab.textContent = s.name;
    tab.onclick = () => { activeScenario = i; buildScenarioTabs(); renderScenario(); };
    tabs.appendChild(tab);
  });
}

function renderScenario() {
  const c = document.getElementById('scenarioContent');
  const stations = scenarios[activeScenario].stations;
  if (!stations.length) {
    c.innerHTML = '<p style="color:#8899aa;font-size:.8rem">Select an aircraft template to load stations.</p>';
    return;
  }
  let html = '<div style="margin-bottom:8px">';
  html += '<div class="station-row" style="border-bottom:2px solid var(--border)">';
  html += '<span style="font-size:.7rem;color:var(--cyan);font-weight:700">STATION</span>';
  html += '<span style="font-size:.7rem;color:var(--cyan);font-weight:700">WEIGHT (lbs)</span>';
  html += '<span style="font-size:.7rem;color:var(--cyan);font-weight:700">ARM (in)</span>';
  html += '<span style="font-size:.7rem;color:var(--cyan);font-weight:700">MOMENT</span>';
  html += '</div>';
  stations.forEach((st, i) => {
    const moment = ((st.isFuel ? (parseFloat(st.weight) || 0) * AVGAS_LBS_PER_GAL : (parseFloat(st.weight) || 0)) * (parseFloat(st.arm) || 0)).toFixed(1);
    const wLabel = st.isFuel ? 'GAL' : 'LBS';
    html += `<div class="station-row">
      <span class="station-label">${st.name}${st.maxWt ? ' (max '+st.maxWt+' lbs)' : ''}</span>
      <div><input type="number" step="0.1" value="${st.weight||''}" placeholder="${wLabel}" data-idx="${i}" data-field="weight" onchange="updateStation(${i},'weight',this.value)"></div>
      <div><input type="number" step="0.01" value="${st.arm||''}" data-idx="${i}" data-field="arm" onchange="updateStation(${i},'arm',this.value)"></div>
      <div style="display:flex;align-items:center;font-size:.85rem;color:var(--orange);font-weight:600">${moment}</div>
    </div>`;
  });
  html += '</div>';
  html += `<div class="row row-2" style="margin-top:8px">
    <div><label>Flight Time (hrs, for fuel burn)</label><input type="number" id="flightTime" step="0.1" value="1.0" onchange="recalculate()"></div>
    <div style="display:flex;align-items:end"><button class="btn btn-cyan btn-sm" onclick="recalculate()">Calculate</button></div>
  </div>`;
  c.innerHTML = html;
  recalculate();
}

function updateStation(idx, field, val) {
  scenarios[activeScenario].stations[idx][field] = parseFloat(val) || 0;
  renderScenario();
}

function getStationWeightLbs(st) {
  return st.isFuel ? (parseFloat(st.weight) || 0) * AVGAS_LBS_PER_GAL : (parseFloat(st.weight) || 0);
}

function recalculate() {
  const emptyWt = parseFloat(document.getElementById('emptyWeight').value) || 0;
  const emptyArm = parseFloat(document.getElementById('emptyArm').value) || 0;
  const maxGross = parseFloat(document.getElementById('maxGross').value) || 99999;
  const maxRamp = parseFloat(document.getElementById('maxRamp').value) || 99999;
  const maxZFW = parseFloat(document.getElementById('maxZFW').value) || 0;
  const fuelBurnRate = parseFloat(document.getElementById('fuelBurn').value) || 0;
  const flightTimeEl = document.getElementById('flightTime');
  const flightTime = flightTimeEl ? parseFloat(flightTimeEl.value) || 0 : 0;

  const stations = scenarios[activeScenario].stations;
  let totalWeight = emptyWt;
  let totalMoment = emptyWt * emptyArm;
  let fuelWeightLbs = 0;
  let zfWeight = emptyWt;
  let zfMoment = emptyWt * emptyArm;
  let fuelArm = 0;

  const rows = [];
  rows.push({ name: 'Empty Weight', weight: emptyWt, arm: emptyArm, moment: emptyWt * emptyArm });

  stations.forEach(st => {
    const wLbs = getStationWeightLbs(st);
    const arm = parseFloat(st.arm) || 0;
    const mom = wLbs * arm;
    totalWeight += wLbs;
    totalMoment += mom;
    rows.push({ name: st.name + (st.isFuel ? ` (${st.weight} gal)` : ''), weight: wLbs, arm: arm, moment: mom });
    if (st.isFuel) { fuelWeightLbs = wLbs; fuelArm = arm; }
    else { zfWeight += wLbs; zfMoment += mom; }
  });

  const rampWeight = totalWeight;
  const takeoffCG = totalWeight > 0 ? totalMoment / totalWeight : 0;
  const zfCG = zfWeight > 0 ? zfMoment / zfWeight : 0;

  const fuelBurnLbs = fuelBurnRate * AVGAS_LBS_PER_GAL * flightTime;
  const landingWeight = totalWeight - fuelBurnLbs;
  const landingMoment = totalMoment - (fuelBurnLbs * fuelArm);
  const landingCG = landingWeight > 0 ? landingMoment / landingWeight : 0;

  // Warnings
  const warnings = [];
  if (rampWeight > maxRamp) warnings.push(`Ramp weight ${rampWeight.toFixed(1)} lbs exceeds max ramp ${maxRamp} lbs`);
  if (totalWeight > maxGross) warnings.push(`Takeoff weight ${totalWeight.toFixed(1)} lbs exceeds max gross ${maxGross} lbs`);
  if (maxZFW > 0 && zfWeight > maxZFW) warnings.push(`Zero fuel weight ${zfWeight.toFixed(1)} lbs exceeds max ZFW ${maxZFW} lbs`);
  if (fuelBurnLbs > fuelWeightLbs) warnings.push(`Fuel burn (${fuelBurnLbs.toFixed(1)} lbs) exceeds fuel on board (${fuelWeightLbs.toFixed(1)} lbs)`);

  // Check baggage limits
  stations.forEach(st => {
    if (st.maxWt && !st.isFuel) {
      const w = parseFloat(st.weight) || 0;
      if (w > st.maxWt) warnings.push(`${st.name}: ${w} lbs exceeds limit of ${st.maxWt} lbs`);
    }
  });

  // CG limits check
  const toInLimits = checkCGLimits(totalWeight, takeoffCG);
  const ldgInLimits = checkCGLimits(landingWeight, landingCG);
  if (!toInLimits) warnings.push('Takeoff CG is OUTSIDE the approved envelope');
  if (!ldgInLimits) warnings.push('Landing CG is OUTSIDE the approved envelope');

  const withinLimits = warnings.length === 0;

  // Render summary
  let html = '<table><thead><tr><th>Station</th><th>Weight (lbs)</th><th>Arm (in)</th><th>Moment (in-lb)</th></tr></thead><tbody>';
  rows.forEach(r => {
    html += `<tr><td>${r.name}</td><td>${r.weight.toFixed(1)}</td><td>${r.arm.toFixed(2)}</td><td>${r.moment.toFixed(1)}</td></tr>`;
  });
  html += `<tr class="total-row"><td>TAKEOFF TOTAL</td><td>${totalWeight.toFixed(1)}</td><td>${takeoffCG.toFixed(2)}</td><td>${totalMoment.toFixed(1)}</td></tr>`;
  html += `<tr><td>Landing (${flightTime}hr burn)</td><td>${landingWeight.toFixed(1)}</td><td>${landingCG.toFixed(2)}</td><td>${landingMoment.toFixed(1)}</td></tr>`;
  html += `<tr><td>Zero Fuel Weight</td><td>${zfWeight.toFixed(1)}</td><td>${zfCG.toFixed(2)}</td><td>${zfMoment.toFixed(1)}</td></tr>`;
  html += '</tbody></table>';

  html += '<div style="margin-top:12px;display:flex;flex-wrap:wrap;gap:8px">';
  html += `<span class="status-badge ${withinLimits ? 'status-ok' : 'status-warn'}">${withinLimits ? 'WITHIN LIMITS' : 'OUT OF LIMITS'}</span>`;
  html += `<span class="status-badge" style="background:rgba(0,212,255,.1);color:var(--cyan);border:1px solid var(--cyan)">Ramp: ${rampWeight.toFixed(0)} / ${maxRamp} lbs</span>`;
  html += '</div>';

  if (warnings.length) {
    html += '<div class="warnings">';
    warnings.forEach(w => html += `<div class="warning-item">${w}</div>`);
    html += '</div>';
  }

  document.getElementById('summaryContent').innerHTML = html;
  drawCGChart(totalWeight, takeoffCG, landingWeight, landingCG, toInLimits, ldgInLimits);
}

function checkCGLimits(weight, cg) {
  if (envelopeData.length < 2) return true;
  const sorted = [...envelopeData].sort((a, b) => a.weight - b.weight);
  if (weight < sorted[0].weight || weight > sorted[sorted.length - 1].weight) return false;
  let fwdLimit = 0, aftLimit = 0;
  for (let i = 0; i < sorted.length - 1; i++) {
    if (weight >= sorted[i].weight && weight <= sorted[i + 1].weight) {
      const frac = (weight - sorted[i].weight) / (sorted[i + 1].weight - sorted[i].weight);
      fwdLimit = sorted[i].fwdCG + frac * (sorted[i + 1].fwdCG - sorted[i].fwdCG);
      aftLimit = sorted[i].aftCG + frac * (sorted[i + 1].aftCG - sorted[i].aftCG);
      break;
    }
  }
  return cg >= fwdLimit && cg <= aftLimit;
}

function drawCGChart(toWt, toCG, ldWt, ldCG, toOk, ldOk) {
  const canvas = document.getElementById('cgCanvas');
  const ctx = canvas.getContext('2d');
  const W = canvas.width, H = canvas.height;
  ctx.clearRect(0, 0, W, H);

  if (envelopeData.length < 2) {
    ctx.fillStyle = '#8899aa';
    ctx.font = '14px JetBrains Mono';
    ctx.textAlign = 'center';
    ctx.fillText('Load a template to view CG envelope', W / 2, H / 2);
    return;
  }

  const sorted = [...envelopeData].sort((a, b) => a.weight - b.weight);
  const allCG = sorted.flatMap(p => [p.fwdCG, p.aftCG]).concat([toCG, ldCG]);
  const allWt = sorted.map(p => p.weight).concat([toWt, ldWt]);
  const cgMin = Math.min(...allCG) - 2, cgMax = Math.max(...allCG) + 2;
  const wtMin = Math.min(...allWt) - 100, wtMax = Math.max(...allWt) + 100;

  const pad = { top: 30, right: 30, bottom: 50, left: 70 };
  const pw = W - pad.left - pad.right, ph = H - pad.top - pad.bottom;

  function toX(cg) { return pad.left + ((cg - cgMin) / (cgMax - cgMin)) * pw; }
  function toY(wt) { return pad.top + ph - ((wt - wtMin) / (wtMax - wtMin)) * ph; }

  // Grid
  ctx.strokeStyle = '#1a2535';
  ctx.lineWidth = 0.5;
  for (let i = 0; i <= 5; i++) {
    const y = pad.top + (ph / 5) * i;
    ctx.beginPath(); ctx.moveTo(pad.left, y); ctx.lineTo(W - pad.right, y); ctx.stroke();
    const x = pad.left + (pw / 5) * i;
    ctx.beginPath(); ctx.moveTo(x, pad.top); ctx.lineTo(x, H - pad.bottom); ctx.stroke();
  }

  // Envelope polygon
  ctx.beginPath();
  ctx.fillStyle = 'rgba(0,212,255,.08)';
  ctx.strokeStyle = '#00d4ff';
  ctx.lineWidth = 2;
  sorted.forEach((p, i) => { const fn = i === 0 ? 'moveTo' : 'lineTo'; ctx[fn](toX(p.fwdCG), toY(p.weight)); });
  for (let i = sorted.length - 1; i >= 0; i--) ctx.lineTo(toX(sorted[i].aftCG), toY(sorted[i].weight));
  ctx.closePath();
  ctx.fill();
  ctx.stroke();

  // Plot takeoff point
  ctx.beginPath();
  ctx.arc(toX(toCG), toY(toWt), 7, 0, Math.PI * 2);
  ctx.fillStyle = toOk ? '#10b981' : '#ef4444';
  ctx.fill();
  ctx.strokeStyle = '#fff';
  ctx.lineWidth = 2;
  ctx.stroke();
  ctx.fillStyle = '#e2e8f0';
  ctx.font = '11px JetBrains Mono';
  ctx.textAlign = 'left';
  ctx.fillText('T/O', toX(toCG) + 10, toY(toWt) + 4);

  // Plot landing point
  ctx.beginPath();
  ctx.arc(toX(ldCG), toY(ldWt), 7, 0, Math.PI * 2);
  ctx.fillStyle = ldOk ? '#10b981' : '#ef4444';
  ctx.fill();
  ctx.strokeStyle = '#fff';
  ctx.lineWidth = 2;
  ctx.stroke();
  ctx.fillText('LDG', toX(ldCG) + 10, toY(ldWt) + 4);

  // Axes labels
  ctx.fillStyle = '#8899aa';
  ctx.font = '11px JetBrains Mono';
  ctx.textAlign = 'center';
  ctx.fillText('CG (inches aft of datum)', W / 2, H - 8);
  ctx.save();
  ctx.translate(14, H / 2);
  ctx.rotate(-Math.PI / 2);
  ctx.fillText('Weight (lbs)', 0, 0);
  ctx.restore();

  // Tick labels
  ctx.font = '10px JetBrains Mono';
  ctx.textAlign = 'center';
  for (let i = 0; i <= 5; i++) {
    const cg = cgMin + ((cgMax - cgMin) / 5) * i;
    ctx.fillText(cg.toFixed(1), toX(cg), H - pad.bottom + 16);
  }
  ctx.textAlign = 'right';
  for (let i = 0; i <= 5; i++) {
    const wt = wtMin + ((wtMax - wtMin) / 5) * i;
    ctx.fillText(wt.toFixed(0), pad.left - 8, toY(wt) + 4);
  }
}

function saveProfile() {
  const name = document.getElementById('acName').value.trim() || 'Unnamed';
  const profile = {
    name,
    emptyWeight: document.getElementById('emptyWeight').value,
    emptyArm: document.getElementById('emptyArm').value,
    maxGross: document.getElementById('maxGross').value,
    maxRamp: document.getElementById('maxRamp').value,
    maxZFW: document.getElementById('maxZFW').value,
    fuelBurn: document.getElementById('fuelBurn').value,
    envelope: envelopeData,
    stations: scenarios[activeScenario].stations
  };
  localStorage.setItem('korb_wb_' + name, JSON.stringify(profile));
  alert('Profile saved: ' + name);
}

function loadSavedProfile() {
  const keys = Object.keys(localStorage).filter(k => k.startsWith('korb_wb_'));
  if (!keys.length) { alert('No saved profiles found.'); return; }
  const name = prompt('Saved profiles:\n' + keys.map(k => k.replace('korb_wb_', '')).join('\n') + '\n\nEnter profile name:');
  if (!name) return;
  const data = localStorage.getItem('korb_wb_' + name);
  if (!data) { alert('Profile not found.'); return; }
  const p = JSON.parse(data);
  document.getElementById('acName').value = p.name || '';
  document.getElementById('emptyWeight').value = p.emptyWeight || '';
  document.getElementById('emptyArm').value = p.emptyArm || '';
  document.getElementById('emptyMoment').value = ((parseFloat(p.emptyWeight)||0)*(parseFloat(p.emptyArm)||0)).toFixed(1);
  document.getElementById('maxGross').value = p.maxGross || '';
  document.getElementById('maxRamp').value = p.maxRamp || '';
  document.getElementById('maxZFW').value = p.maxZFW || '';
  document.getElementById('fuelBurn').value = p.fuelBurn || '';
  envelopeData = p.envelope || [];
  renderEnvelope();
  if (p.stations) { for (let i = 0; i < 3; i++) scenarios[i].stations = JSON.parse(JSON.stringify(p.stations)); }
  renderScenario();
}

function deleteSavedProfile() {
  const keys = Object.keys(localStorage).filter(k => k.startsWith('korb_wb_'));
  if (!keys.length) { alert('No saved profiles.'); return; }
  const name = prompt('Profiles:\n' + keys.map(k => k.replace('korb_wb_', '')).join('\n') + '\n\nEnter name to delete:');
  if (!name) return;
  localStorage.removeItem('korb_wb_' + name);
  alert('Deleted: ' + name);
}

function exportToClipboard() {
  const el = document.getElementById('summaryCard');
  const name = document.getElementById('acName').value || 'Aircraft';
  let text = `WEIGHT & BALANCE - ${name}\nDate: ${new Date().toISOString().slice(0,10)}\nGenerated by Korb Engineering Weight & Balance Calculator\n\n`;
  const rows = el.querySelectorAll('tr');
  rows.forEach(r => {
    const cells = r.querySelectorAll('th,td');
    text += Array.from(cells).map(c => c.textContent.padEnd(22)).join('') + '\n';
  });
  const badge = el.querySelector('.status-badge');
  if (badge) text += '\nStatus: ' + badge.textContent + '\n';
  const warnings = el.querySelectorAll('.warning-item');
  if (warnings.length) {
    text += '\nWARNINGS:\n';
    warnings.forEach(w => text += '  ! ' + w.textContent + '\n');
  }
  navigator.clipboard.writeText(text).then(() => alert('Copied to clipboard!')).catch(() => {
    const ta = document.createElement('textarea');
    ta.value = text; document.body.appendChild(ta); ta.select(); document.execCommand('copy'); ta.remove();
    alert('Copied to clipboard!');
  });
}

init();
