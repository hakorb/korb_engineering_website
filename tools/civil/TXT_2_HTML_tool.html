<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Korb Engineering · Text to HTML Converter</title>
  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      font-family: system-ui, -apple-system, 'Segoe UI', Roboto, 'Helvetica Neue', sans-serif;
    }

    body {
      background-color: #000000;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      margin: 0;
      padding: 1.5rem;
    }

    .card {
      background: #111111;
      max-width: 720px;
      width: 100%;
      padding: 2.5rem 2rem;
      border-radius: 28px;
      border: 1px solid #1e2a3a;
      box-shadow: 0 20px 40px rgba(0, 123, 255, 0.08);
    }

    h1 {
      color: #007BFF;
      font-weight: 600;
      font-size: 2.2rem;
      letter-spacing: -0.02em;
      margin-bottom: 0.2rem;
      line-height: 1.2;
      display: flex;
      align-items: center;
      gap: 8px;
    }

    h1 span {
      background: #007BFF;
      width: 8px;
      height: 8px;
      border-radius: 50%;
      display: inline-block;
    }

    .subhead {
      color: #b0c4de;
      font-size: 1rem;
      margin-bottom: 2.2rem;
      border-left: 3px solid #007BFF;
      padding-left: 1rem;
      font-weight: 300;
    }

    .upload-area {
      background: #0a0c10;
      border: 2px dashed #1e3a5f;
      border-radius: 24px;
      padding: 2rem 1.8rem;
      transition: border-color 0.2s, background 0.2s;
      margin-bottom: 1.8rem;
    }

    .upload-area:hover {
      border-color: #007BFF;
      background: #0f1217;
    }

    .file-selector {
      display: flex;
      flex-wrap: wrap;
      align-items: center;
      gap: 1rem;
      margin-bottom: 0.8rem;
    }

    .blue-button {
      background: #007BFF;
      color: #000000;
      font-weight: 600;
      padding: 0.8rem 1.8rem;
      border-radius: 60px;
      font-size: 1rem;
      border: none;
      cursor: pointer;
      transition: background 0.15s, transform 0.1s;
      box-shadow: 0 4px 12px rgba(0, 123, 255, 0.3);
      display: inline-block;
      text-align: center;
      border: 1px solid #007BFF;
    }

    .blue-button:hover {
      background: #1a8cff;
      border-color: #1a8cff;
      transform: scale(1.02);
    }

    .blue-button:active {
      background: #0066cc;
      transform: scale(0.98);
    }

    #fileNameDisplay {
      color: #e0e0e0;
      background: #1a1f2a;
      padding: 0.6rem 1.2rem;
      border-radius: 40px;
      font-size: 0.95rem;
      border: 1px solid #2a3340;
      word-break: break-all;
      flex: 1;
      min-width: 180px;
    }

    .status-area {
      margin-top: 1.2rem;
      min-height: 3.5rem;
      font-size: 0.95rem;
    }

    .status-message {
      padding: 0.9rem 1.2rem;
      border-radius: 40px;
      background: #1a1f2a;
      border-left: 4px solid #007BFF;
      color: #cfddee;
      font-weight: 400;
      display: flex;
      align-items: center;
      gap: 8px;
      backdrop-filter: blur(4px);
    }

    .status-message.error {
      border-left-color: #ff4d4d;
      background: #2a1a1a;
      color: #ffb8b8;
    }

    .status-message.success {
      border-left-color: #00cc88;
      background: #11221a;
    }

    .spinner {
      width: 18px;
      height: 18px;
      border: 2px solid rgba(0, 123, 255, 0.3);
      border-top: 2px solid #007BFF;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
      display: inline-block;
    }

    @keyframes spin {
      0% { transform: rotate(0deg); }
      100% { transform: rotate(360deg); }
    }

    .footer-note {
      margin-top: 2rem;
      color: #3a4a60;
      font-size: 0.8rem;
      text-align: center;
      border-top: 1px solid #1e2a3a;
      padding-top: 1.5rem;
    }

    .footer-note strong {
      color: #4f7eb3;
      font-weight: 500;
    }

    /* hide the actual file input */
    #fileInput {
      display: none;
    }

    a {
      text-decoration: none;
    }
  </style>
</head>
<body>
  <div class="card">
    <h1>Korb Engineering <span></span></h1>
    <div class="subhead">text → HTML converter · instant download</div>

    <div class="upload-area">
      <div class="file-selector">
        <!-- custom label triggers hidden input -->
        <label for="fileInput" class="blue-button" id="customFileLabel">📁 choose .txt file</label>
        <span id="fileNameDisplay">no file selected</span>
      </div>
      <!-- hidden file input (accept only .txt) -->
      <input type="file" id="fileInput" accept=".txt" />

      <!-- status messages appear here -->
      <div class="status-area" id="statusContainer">
        <div class="status-message" id="statusMessage">
          ⚡ ready — pick a text file to convert
        </div>
      </div>
    </div>

    <div class="footer-note">
      <strong>⚙️ Korb Engineering</strong> · black & blue edition · .txt → .html · no data leaves your device
    </div>
  </div>

  <script>
    (function() {
      // DOM elements
      const fileInput = document.getElementById('fileInput');
      const fileNameSpan = document.getElementById('fileNameDisplay');
      const statusDiv = document.getElementById('statusMessage');

      // helper: update status (normal, error, success)
      function setStatus(text, type = 'info', showSpinner = false) {
        if (!statusDiv) return;
        // remove previous color classes
        statusDiv.classList.remove('error', 'success');
        let icon = '📄';
        if (type === 'error') {
          statusDiv.classList.add('error');
          icon = '❌';
        } else if (type === 'success') {
          statusDiv.classList.add('success');
          icon = '✅';
        } else if (type === 'info' && showSpinner) {
          icon = '<span class="spinner"></span>';
        } else {
          icon = '⚡';
        }

        if (showSpinner && type === 'info') {
          statusDiv.innerHTML = `<span class="spinner" style="margin-right:6px;"></span> ${text}`;
        } else {
          statusDiv.innerHTML = `${icon} ${text}`;
        }
      }

      // reset file input & display
      function resetFileInput() {
        fileInput.value = '';          // clear selected file
        fileNameSpan.textContent = 'no file selected';
      }

      // escape html special characters (for embedding into generated html)
      function escapeHtml(unsafe) {
        return unsafe.replace(/[&<>"']/g, function(m) {
          if (m === '&') return '&amp;';
          if (m === '<') return '&lt;';
          if (m === '>') return '&gt;';
          if (m === '"') return '&quot;';
          if (m === "'") return '&#039;';
          return m;
        });
      }

      // trigger file download from blob
      function downloadHtml(htmlString, filename) {
        const blob = new Blob([htmlString], { type: 'text/html' });
        const url = URL.createObjectURL(blob);
        const a = document.createElement('a');
        a.href = url;
        a.download = filename;
        document.body.appendChild(a);
        a.click();
        document.body.removeChild(a);
        // revoke object URL after a short delay (allows download to start)
        setTimeout(() => {
          URL.revokeObjectURL(url);
        }, 150);
      }

      // process the uploaded text file
      function processFile(file) {
        if (!file) {
          setStatus('no file selected', 'info');
          return;
        }

        // double-check extension (case-insensitive)
        const fileName = file.name || '';
        if (!fileName.toLowerCase().endsWith('.txt')) {
          setStatus('only .txt files are allowed', 'error');
          resetFileInput();
          return;
        }

        // update filename display
        fileNameSpan.textContent = fileName;

        // show processing with spinner
        setStatus('converting ...', 'info', true);

        const reader = new FileReader();

        reader.onload = (evt) => {
          try {
            const fileContent = evt.target.result;   // raw text
            // base name: remove .txt extension (case-insensitive)
            let baseName = fileName.replace(/\.txt$/i, '');
            if (!baseName) baseName = 'converted';    // fallback if filename is weird

            const htmlFileName = baseName + '.html';
            const pageTitle = baseName;

            // escape content to keep generated HTML safe & valid
            const escapedText = escapeHtml(fileContent);

            // build a clean HTML5 document with Korb Engineering header & style
            const generatedHTML = `<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>${escapeHtml(pageTitle)}</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: #111;
      color: #f0f4fa;
      font-family: system-ui, -apple-system, 'Segoe UI', Roboto, sans-serif;
      padding: 2.5rem 2rem;
      line-height: 1.6;
    }
    .korb-header {
      color: #007BFF;
      font-size: 1.8rem;
      font-weight: 600;
      letter-spacing: -0.02em;
      margin-bottom: 1.8rem;
      border-bottom: 2px solid #1e3a5f;
      padding-bottom: 0.5rem;
      display: inline-block;
    }
    .content-box {
      background: #1a1d24;
      padding: 2rem;
      border-radius: 24px;
      border-left: 6px solid #007BFF;
      box-shadow: 0 10px 20px rgba(0,0,0,0.8);
      white-space: pre-wrap;
      word-wrap: break-word;
      font-family: 'SF Mono', 'Fira Code', monospace;
      font-size: 1rem;
    }
  </style>
</head>
<body>
  <div class="korb-header">⚙️ Korb Engineering conversion</div>
  <div class="content-box">${escapedText}</div>
</body>
</html>`;

            // trigger automatic download
            downloadHtml(generatedHTML, htmlFileName);

            // show success
            setStatus(`success · ${htmlFileName} downloaded`, 'success');
          } catch (innerErr) {
            setStatus('conversion error: ' + innerErr.message, 'error');
            resetFileInput();
          }
        };

        reader.onerror = () => {
          setStatus('file reading failed — try again', 'error');
          resetFileInput();
        };

        reader.readAsText(file);
      }

      // event: file selected (automatic processing)
      fileInput.addEventListener('change', function(e) {
        const file = e.target.files[0];
        if (!file) {
          // user cancelled / empty
          fileNameSpan.textContent = 'no file selected';
          setStatus('ready', 'info');
          return;
        }
        processFile(file);
      });

      // (optional) if the user clicks the label but then cancels, the input stays empty.
      // we also need to reset when user picks a non-txt via direct selection (though accept restricts)
      // but accept can be bypassed by "all files" — so our extension check handles it.

      // if the file input is cleared programmatically, update display
      const originalReset = resetFileInput;
      window.resetFileInput = function() {
        fileInput.value = '';
        fileNameSpan.textContent = 'no file selected';
        setStatus('ready — pick a .txt file', 'info');
      };

      // handle the case where user selects same file again — change event still fires.
      // everything works.

      // if someone accidentally selects a folder or empty, reset gracefully
      fileInput.addEventListener('click', function() {
        // optional: clear old error status on new click
        if (statusDiv.classList.contains('error')) {
          setStatus('select a .txt file', 'info');
        }
      });
    })();
  </script>
</body>
</html>
