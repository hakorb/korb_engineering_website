<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AssetMax - Pavement Asset Management | Korb Engineering</title>
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{--bg:#050a0f;--bg1:#0a1018;--bg2:#0f1620;--card:#0c1219;--border:#1a2a3a;--accent:#00d4ff;--green:#00ff88;--red:#ff3344;--yellow:#ffcc00;--orange:#f97316;--text:#e2e8f0;--textDim:rgba(226,232,240,0.45);--textMuted:rgba(226,232,240,0.25);--font:'JetBrains Mono',monospace}
body{background:var(--bg);color:var(--text);font-family:var(--font);min-height:100vh;overflow-x:hidden}
input,select,button{font-family:var(--font)}
.header{position:sticky;top:0;z-index:100;height:52px;background:linear-gradient(180deg,var(--bg2),var(--bg1));border-bottom:1px solid var(--border);display:flex;align-items:center;padding:0 16px;gap:12px}
.header-title{font-size:14px;font-weight:700;letter-spacing:0.12em;color:var(--accent);text-shadow:0 0 10px rgba(0,212,255,0.3)}
.header-sub{font-size:9px;color:var(--textDim);letter-spacing:0.15em;text-transform:uppercase}
.kpi-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(140px,1fr));gap:10px;padding:14px 16px}
.kpi{background:var(--card);border:1px solid var(--border);border-radius:6px;padding:12px;text-align:center}
.kpi-label{font-size:8px;color:var(--textDim);text-transform:uppercase;letter-spacing:0.1em;margin-bottom:4px}
.kpi-value{font-size:18px;font-weight:700}
.tabs{display:flex;gap:0;padding:0 16px;border-bottom:1px solid var(--border);overflow-x:auto}
.tab{padding:8px 14px;background:transparent;border:1px solid var(--border);border-bottom:1px solid var(--border);color:var(--textDim);font-size:9px;cursor:pointer;letter-spacing:0.1em;text-transform:uppercase;border-radius:4px 4px 0 0;white-space:nowrap}
.tab.active{background:var(--bg2);border-color:var(--accent);border-bottom-color:transparent;color:var(--accent)}
.content{padding:16px;max-width:1400px;margin:0 auto}
.card{background:var(--card);border:1px solid var(--border);border-radius:6px;padding:16px;margin-bottom:12px}
.card-title{font-size:10px;color:var(--accent);letter-spacing:0.1em;text-transform:uppercase;margin-bottom:14px}
.btn{background:transparent;border:1px solid var(--border);color:var(--textDim);font-size:9px;padding:5px 12px;border-radius:3px;cursor:pointer;letter-spacing:0.05em;text-transform:uppercase;transition:all 0.15s}
.btn:hover{border-color:var(--accent);color:var(--accent)}
.btn-green{border-color:var(--green);color:var(--green)}
.btn-green:hover{background:rgba(0,255,136,0.1)}
.btn-red{border-color:var(--red);color:var(--red)}
.btn-red:hover{background:rgba(255,51,68,0.1)}
input[type="text"],input[type="number"],select{background:var(--bg2);border:1px solid var(--border);color:var(--text);font-size:11px;padding:4px 8px;border-radius:3px;width:100%;outline:none}
input[type="text"]:focus,input[type="number"]:focus,select:focus{border-color:var(--accent)}
table{width:100%;border-collapse:collapse}
th{padding:6px 8px;border-bottom:2px solid var(--border);font-size:8px;color:var(--textDim);text-transform:uppercase;letter-spacing:0.08em;text-align:left;white-space:nowrap}
td{padding:6px 8px;border-bottom:1px solid var(--border);font-size:11px;white-space:nowrap}
.overflow-x{overflow-x:auto}
.flex-between{display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:8px}
.filters{display:flex;gap:8px;align-items:center;flex-wrap:wrap}
.pci-bar{height:6px;border-radius:3px;background:var(--bg2);position:relative;overflow:hidden}
.pci-fill{height:100%;border-radius:3px;transition:width 0.3s}
.condition-chart{display:flex;gap:12px;flex-wrap:wrap;margin-top:10px}
.condition-item{display:flex;align-items:center;gap:6px}
.condition-dot{width:10px;height:10px;border-radius:2px}
.det-row{display:flex;align-items:center;gap:10px;padding:8px 0;border-bottom:1px solid var(--border)}
@media(max-width:768px){.kpi-grid{grid-template-columns:repeat(2,1fr)}.header-sub{display:none}.filters{flex-direction:column;align-items:stretch}}
</style>
</head>
<body>

<div class="header">
  <div class="header-title">ASSETMAX</div>
  <div class="header-sub">Pavement Asset Management</div>
  <div style="flex:1"></div>
  <button class="btn" onclick="exportCsv()">Export CSV</button>
</div>

<div class="kpi-grid" id="kpis"></div>

<div class="tabs" id="tabs"></div>

<div class="content" id="content"></div>

<div style="position:fixed;bottom:10px;right:10px;font-size:10px;color:#00d4ff;opacity:0.5;font-family:'JetBrains Mono',monospace;pointer-events:none;z-index:9999">Korb Engineering</div>

<script>
const LS_KEY='korb_assetmax';
const SURFACE_TYPES=['HMA','PCC','Gravel'];
const TABS=['inventory','condition','treatments','network','deterioration'];
let currentTab='inventory';
let assets=[];
let editingId=null;
let filterName='';
let filterSurface='all';
let sortBy='pci';
let sortDir=1;

function genId(){return Date.now().toString(36)+Math.random().toString(36).slice(2,7)}
function load(){try{const d=JSON.parse(localStorage.getItem(LS_KEY));if(d&&d.assets)assets=d.assets}catch{}}
function save(){localStorage.setItem(LS_KEY,JSON.stringify({assets}))}

function pciRating(pci){
  if(pci>=85)return{label:'Good',color:'#10b981'};
  if(pci>=70)return{label:'Satisfactory',color:'#22d3ee'};
  if(pci>=55)return{label:'Fair',color:'#f59e0b'};
  if(pci>=40)return{label:'Poor',color:'#f97316'};
  if(pci>=25)return{label:'Very Poor',color:'#ef4444'};
  if(pci>=10)return{label:'Serious',color:'#dc2626'};
  return{label:'Failed',color:'#991b1b'};
}

function treatmentRec(pci){
  if(pci>=85)return{treatment:'Routine Maintenance',cost:2,desc:'Crack sealing, patching, sweeping'};
  if(pci>=70)return{treatment:'Preventive Maintenance',cost:5,desc:'Fog seal, chip seal, slurry seal'};
  if(pci>=55)return{treatment:'Preventive Treatment',cost:12,desc:'Thin overlay, microsurfacing'};
  if(pci>=40)return{treatment:'Rehabilitation',cost:30,desc:'Structural overlay, mill & fill'};
  if(pci>=25)return{treatment:'Major Rehabilitation',cost:55,desc:'Full-depth reclamation, thick overlay'};
  return{treatment:'Reconstruction',cost:85,desc:'Complete removal and rebuild'};
}

function fmt$(v){
  if(Math.abs(v)>=1e6)return'$'+(v/1e6).toFixed(2)+'M';
  if(Math.abs(v)>=1e3)return'$'+(v/1e3).toFixed(1)+'K';
  return'$'+(v||0).toFixed(0);
}

function addAsset(){
  const a={id:genId(),segmentId:'SEG-'+String(assets.length+1).padStart(3,'0'),roadName:'',from:'',to:'',length:0,width:24,area:0,surfaceType:'HMA',yearBuilt:2010,lastRehab:'',pci:85,iri:0,ruttingDepth:0,crackingPct:0,lastInspection:new Date().toISOString().split('T')[0],history:[]};
  assets.push(a);editingId=a.id;save();render();
}

function updateAsset(id,field,value){
  const a=assets.find(x=>x.id===id);if(!a)return;
  a[field]=value;
  if(field==='length'||field==='width'){a.area=Math.round((parseFloat(a.length)||0)*5280*(parseFloat(a.width)||0))}
  save();render();
}

function deleteAsset(id){assets=assets.filter(a=>a.id!==id);save();render()}

function recordInspection(id){
  const a=assets.find(x=>x.id===id);if(!a)return;
  if(!a.history)a.history=[];
  a.history.push({date:a.lastInspection,pci:parseFloat(a.pci)||0});
  save();render();
}

function getFiltered(){
  return assets
    .filter(a=>!filterName||a.roadName.toLowerCase().includes(filterName.toLowerCase()))
    .filter(a=>filterSurface==='all'||a.surfaceType===filterSurface)
    .sort((a,b)=>{
      if(sortBy==='pci')return(a.pci-b.pci)*sortDir;
      if(sortBy==='name')return a.roadName.localeCompare(b.roadName)*sortDir;
      if(sortBy==='area')return(a.area-b.area)*sortDir;
      return 0;
    });
}

function renderKpis(){
  const totalMiles=assets.reduce((s,a)=>s+(parseFloat(a.length)||0),0);
  const avgPci=assets.length>0?assets.reduce((s,a)=>s+(parseFloat(a.pci)||0),0)/assets.length:0;
  const rating=assets.length>0?pciRating(avgPci):{label:'N/A',color:'var(--textDim)'};
  const backlog=assets.reduce((s,a)=>{const r=treatmentRec(a.pci);return s+(r.cost*(a.area||0)/9)},0);
  document.getElementById('kpis').innerHTML=[
    ['Centerline Miles',totalMiles.toFixed(1),'var(--green)'],
    ['Average PCI',avgPci.toFixed(1),avgPci>=70?'var(--green)':avgPci>=55?'var(--yellow)':'var(--red)'],
    ['Segments',String(assets.length),'var(--accent)'],
    ['Network Rating',rating.label,rating.color],
    ['Backlog Cost',fmt$(backlog),'var(--yellow)']
  ].map(([l,v,c])=>`<div class="kpi"><div class="kpi-label">${l}</div><div class="kpi-value" style="color:${c}">${v}</div></div>`).join('');
}

function renderTabs(){
  document.getElementById('tabs').innerHTML=TABS.map(t=>`<button class="tab ${currentTab===t?'active':''}" onclick="currentTab='${t}';render()">${t}</button>`).join('');
}

function renderInventory(){
  const f=getFiltered();
  return`<div class="card">
    <div class="flex-between" style="margin-bottom:14px">
      <div class="card-title">Asset Inventory (${f.length})</div>
      <div class="filters">
        <input type="text" placeholder="Filter road name..." value="${filterName}" oninput="filterName=this.value;render()" style="width:140px">
        <select onchange="filterSurface=this.value;render()" style="width:auto">
          <option value="all" ${filterSurface==='all'?'selected':''}>All Surfaces</option>
          ${SURFACE_TYPES.map(s=>`<option value="${s}" ${filterSurface===s?'selected':''}>${s}</option>`).join('')}
        </select>
        <select onchange="sortBy=this.value;render()" style="width:auto">
          <option value="pci" ${sortBy==='pci'?'selected':''}>Sort: PCI</option>
          <option value="name" ${sortBy==='name'?'selected':''}>Sort: Name</option>
          <option value="area" ${sortBy==='area'?'selected':''}>Sort: Area</option>
        </select>
        <button class="btn" onclick="sortDir*=-1;render()">${sortDir===1?'ASC':'DESC'}</button>
        <button class="btn btn-green" onclick="addAsset()">+ Segment</button>
      </div>
    </div>
    <div class="overflow-x"><table><thead><tr>
      ${['Seg ID','Road Name','From','To','Length (mi)','Width (ft)','Area (sqft)','Surface','Year Built','PCI','Condition',''].map(h=>`<th>${h}</th>`).join('')}
    </tr></thead><tbody>
      ${f.map(a=>{
        const r=pciRating(a.pci);const editing=editingId===a.id;
        return`<tr>
          <td style="color:var(--accent)">${a.segmentId}</td>
          <td>${editing?`<input type="text" value="${a.roadName}" onchange="updateAsset('${a.id}','roadName',this.value)" style="width:120px">`:`<span style="cursor:pointer" onclick="editingId='${a.id}';render()">${a.roadName||'(unnamed)'}</span>`}</td>
          <td>${editing?`<input type="text" value="${a.from}" onchange="updateAsset('${a.id}','from',this.value)" style="width:80px">`:a.from}</td>
          <td>${editing?`<input type="text" value="${a.to}" onchange="updateAsset('${a.id}','to',this.value)" style="width:80px">`:a.to}</td>
          <td>${editing?`<input type="number" value="${a.length}" onchange="updateAsset('${a.id}','length',parseFloat(this.value)||0)" style="width:70px">`:a.length}</td>
          <td>${editing?`<input type="number" value="${a.width}" onchange="updateAsset('${a.id}','width',parseFloat(this.value)||0)" style="width:60px">`:a.width}</td>
          <td style="color:var(--textDim)">${(a.area||0).toLocaleString()}</td>
          <td>${editing?`<select onchange="updateAsset('${a.id}','surfaceType',this.value)">${SURFACE_TYPES.map(s=>`<option ${a.surfaceType===s?'selected':''}>${s}</option>`).join('')}</select>`:a.surfaceType}</td>
          <td>${editing?`<input type="number" value="${a.yearBuilt}" onchange="updateAsset('${a.id}','yearBuilt',parseInt(this.value)||2010)" style="width:60px">`:a.yearBuilt}</td>
          <td>${editing?`<input type="number" value="${a.pci}" min="0" max="100" onchange="updateAsset('${a.id}','pci',Math.min(100,Math.max(0,parseFloat(this.value)||0)))" style="width:50px">`:`<span style="color:${r.color};font-weight:700">${a.pci}</span>`}</td>
          <td><span style="color:${r.color};font-size:10px">${r.label}</span></td>
          <td style="display:flex;gap:4px">
            ${editing?`<button class="btn btn-green" style="font-size:8px;padding:2px 8px" onclick="editingId=null;render()">Done</button>`:`<button class="btn" style="font-size:8px;padding:2px 8px" onclick="editingId='${a.id}';render()">Edit</button>`}
            <button class="btn btn-red" style="font-size:8px;padding:2px 8px" onclick="deleteAsset('${a.id}')">Del</button>
          </td>
        </tr>`;
      }).join('')}
      ${f.length===0?'<tr><td colspan="12" style="text-align:center;color:var(--textMuted);padding:30px">No assets in inventory. Click + Segment to add.</td></tr>':''}
    </tbody></table></div>
  </div>`;
}

function renderCondition(){
  const buckets={};const labels=['Good','Satisfactory','Fair','Poor','Very Poor','Serious','Failed'];
  labels.forEach(l=>buckets[l]=0);
  assets.forEach(a=>{const r=pciRating(a.pci);buckets[r.label]=(buckets[r.label]||0)+1});
  const maxBucket=Math.max(...Object.values(buckets),1);
  const colors={'Good':'#10b981','Satisfactory':'#22d3ee','Fair':'#f59e0b','Poor':'#f97316','Very Poor':'#ef4444','Serious':'#dc2626','Failed':'#991b1b'};
  return`<div class="card">
    <div class="card-title">Condition Distribution</div>
    ${labels.map(l=>`<div style="margin-bottom:10px">
      <div style="display:flex;justify-content:space-between;margin-bottom:3px">
        <span style="font-size:11px;color:${colors[l]}">${l}</span>
        <span style="font-size:11px;color:var(--textDim)">${buckets[l]} segment${buckets[l]!==1?'s':''}</span>
      </div>
      <div class="pci-bar"><div class="pci-fill" style="width:${(buckets[l]/maxBucket)*100}%;background:${colors[l]}"></div></div>
    </div>`).join('')}
  </div>
  <div class="card">
    <div class="card-title">PCI by Segment</div>
    <div class="overflow-x">
    ${assets.map(a=>{const r=pciRating(a.pci);return`<div style="display:flex;align-items:center;gap:10px;padding:6px 0;border-bottom:1px solid var(--border)">
      <span style="width:80px;font-size:10px;color:var(--accent)">${a.segmentId}</span>
      <span style="width:120px;font-size:10px;overflow:hidden;text-overflow:ellipsis">${a.roadName||'--'}</span>
      <div style="flex:1"><div class="pci-bar"><div class="pci-fill" style="width:${a.pci}%;background:${r.color}"></div></div></div>
      <span style="width:40px;text-align:right;font-size:12px;font-weight:700;color:${r.color}">${a.pci}</span>
      <span style="width:70px;font-size:9px;color:${r.color}">${r.label}</span>
    </div>`}).join('')}
    ${assets.length===0?'<div style="text-align:center;color:var(--textMuted);padding:20px">No assets</div>':''}
    </div>
  </div>`;
}

function renderTreatments(){
  const sorted=[...assets].sort((a,b)=>a.pci-b.pci);
  const totalCost=sorted.reduce((s,a)=>{const r=treatmentRec(a.pci);return s+(r.cost*(a.area||0)/9)},0);
  return`<div class="card">
    <div class="flex-between" style="margin-bottom:14px">
      <div class="card-title">Treatment Recommendations</div>
      <div style="font-size:12px;color:var(--yellow)">Total Est. Cost: ${fmt$(totalCost)}</div>
    </div>
    <div class="overflow-x"><table><thead><tr>
      ${['Priority','Segment','Road','PCI','Condition','Treatment','Unit Cost ($/sy)','Area (sy)','Est. Cost','Description'].map(h=>`<th>${h}</th>`).join('')}
    </tr></thead><tbody>
      ${sorted.map((a,i)=>{
        const r=pciRating(a.pci);const t=treatmentRec(a.pci);const areaSy=Math.round((a.area||0)/9);const cost=t.cost*areaSy;
        return`<tr>
          <td style="color:var(--accent)">#${i+1}</td>
          <td style="color:var(--accent)">${a.segmentId}</td>
          <td>${a.roadName||'--'}</td>
          <td style="color:${r.color};font-weight:700">${a.pci}</td>
          <td style="color:${r.color};font-size:10px">${r.label}</td>
          <td style="font-weight:600">${t.treatment}</td>
          <td style="text-align:right">$${t.cost}</td>
          <td style="text-align:right">${areaSy.toLocaleString()}</td>
          <td style="text-align:right;color:var(--yellow);font-weight:700">${fmt$(cost)}</td>
          <td style="font-size:10px;color:var(--textDim)">${t.desc}</td>
        </tr>`;
      }).join('')}
      ${sorted.length===0?'<tr><td colspan="10" style="text-align:center;color:var(--textMuted);padding:20px">No assets</td></tr>':''}
    </tbody></table></div>
  </div>`;
}

function renderNetwork(){
  const byType={};SURFACE_TYPES.forEach(s=>byType[s]={count:0,miles:0,area:0,avgPci:0,totalPci:0});
  assets.forEach(a=>{
    if(!byType[a.surfaceType])byType[a.surfaceType]={count:0,miles:0,area:0,avgPci:0,totalPci:0};
    byType[a.surfaceType].count++;byType[a.surfaceType].miles+=(parseFloat(a.length)||0);
    byType[a.surfaceType].area+=(a.area||0);byType[a.surfaceType].totalPci+=(parseFloat(a.pci)||0);
  });
  Object.keys(byType).forEach(k=>{byType[k].avgPci=byType[k].count>0?byType[k].totalPci/byType[k].count:0});
  const typeColors={'HMA':'#3b82f6','PCC':'#8b5cf6','Gravel':'#f59e0b'};
  return`<div class="card">
    <div class="card-title">Network Summary by Surface Type</div>
    <div class="overflow-x"><table><thead><tr>
      ${['Surface Type','Segments','Centerline Miles','Total Area (sqft)','Avg PCI','Network Rating'].map(h=>`<th>${h}</th>`).join('')}
    </tr></thead><tbody>
      ${Object.entries(byType).map(([type,d])=>{
        const r=d.count>0?pciRating(d.avgPci):{label:'--',color:'var(--textDim)'};
        return`<tr>
          <td><span style="display:inline-block;width:8px;height:8px;border-radius:2px;background:${typeColors[type]||'#888'};margin-right:6px"></span>${type}</td>
          <td>${d.count}</td><td>${d.miles.toFixed(1)}</td><td>${d.area.toLocaleString()}</td>
          <td style="color:${r.color};font-weight:700">${d.avgPci.toFixed(1)}</td>
          <td style="color:${r.color}">${r.label}</td>
        </tr>`;
      }).join('')}
    </tbody></table></div>
  </div>
  <div class="card">
    <div class="card-title">Age Distribution</div>
    ${renderAgeChart()}
  </div>`;
}

function renderAgeChart(){
  const now=new Date().getFullYear();
  const decades={};assets.forEach(a=>{const d=Math.floor((a.yearBuilt||2000)/10)*10;decades[d]=(decades[d]||0)+1});
  const keys=Object.keys(decades).sort();const maxVal=Math.max(...Object.values(decades),1);
  if(keys.length===0)return'<div style="text-align:center;color:var(--textMuted);padding:20px">No data</div>';
  return keys.map(k=>`<div style="margin-bottom:8px">
    <div style="display:flex;justify-content:space-between;margin-bottom:2px">
      <span style="font-size:10px">${k}s</span>
      <span style="font-size:10px;color:var(--textDim)">${decades[k]}</span>
    </div>
    <div class="pci-bar"><div class="pci-fill" style="width:${(decades[k]/maxVal)*100}%;background:var(--accent)"></div></div>
  </div>`).join('');
}

function renderDeterioration(){
  return`<div class="card">
    <div class="card-title">Deterioration Tracking</div>
    <p style="font-size:11px;color:var(--textDim);margin-bottom:14px">Record inspections to track PCI over time. Click "Record" to snapshot the current PCI for a segment.</p>
    <div class="overflow-x"><table><thead><tr>
      ${['Segment','Road','Current PCI','Condition','Last Inspection','History','Action'].map(h=>`<th>${h}</th>`).join('')}
    </tr></thead><tbody>
      ${assets.map(a=>{
        const r=pciRating(a.pci);const hist=a.history||[];
        return`<tr>
          <td style="color:var(--accent)">${a.segmentId}</td>
          <td>${a.roadName||'--'}</td>
          <td style="color:${r.color};font-weight:700">${a.pci}</td>
          <td style="color:${r.color};font-size:10px">${r.label}</td>
          <td style="font-size:10px">${a.lastInspection||'--'}</td>
          <td style="font-size:9px;color:var(--textDim)">${hist.length>0?hist.map(h=>`${h.date}: ${h.pci}`).join(' | '):'No records'}</td>
          <td><button class="btn" style="font-size:8px;padding:2px 8px" onclick="recordInspection('${a.id}')">Record</button></td>
        </tr>`;
      }).join('')}
      ${assets.length===0?'<tr><td colspan="7" style="text-align:center;color:var(--textMuted);padding:20px">No assets</td></tr>':''}
    </tbody></table></div>
  </div>
  <div class="card">
    <div class="card-title">Projected Deterioration (Network Average)</div>
    ${renderProjectionChart()}
  </div>`;
}

function renderProjectionChart(){
  const avgPci=assets.length>0?assets.reduce((s,a)=>s+(parseFloat(a.pci)||0),0)/assets.length:70;
  const years=[];for(let i=0;i<=20;i++){const pci=Math.max(0,avgPci-i*2.5+Math.sin(i*0.5)*3);years.push({year:new Date().getFullYear()+i,pci:Math.round(pci)})}
  const canvasId='det-canvas-'+Date.now();
  setTimeout(()=>{
    const c=document.getElementById(canvasId);if(!c)return;
    const ctx=c.getContext('2d');const w=c.width=c.parentElement.clientWidth;const h=c.height=200;
    ctx.clearRect(0,0,w,h);
    const pad={l:50,r:20,t:10,b:30};const pw=w-pad.l-pad.r;const ph=h-pad.t-pad.b;
    ctx.strokeStyle='#1a2a3a';ctx.lineWidth=1;
    for(let i=0;i<=4;i++){const y=pad.t+ph*(1-i/4);ctx.beginPath();ctx.moveTo(pad.l,y);ctx.lineTo(w-pad.r,y);ctx.stroke();
      ctx.fillStyle='rgba(226,232,240,0.3)';ctx.font='9px JetBrains Mono';ctx.textAlign='right';ctx.fillText(String(i*25),pad.l-5,y+3)}
    ctx.beginPath();ctx.strokeStyle='#00d4ff';ctx.lineWidth=2;
    years.forEach((d,i)=>{const x=pad.l+i/(years.length-1)*pw;const y=pad.t+ph*(1-d.pci/100);
      if(i===0)ctx.moveTo(x,y);else ctx.lineTo(x,y)});ctx.stroke();
    ctx.strokeStyle='rgba(255,204,0,0.5)';ctx.setLineDash([4,4]);ctx.lineWidth=1;
    const threshY=pad.t+ph*(1-55/100);ctx.beginPath();ctx.moveTo(pad.l,threshY);ctx.lineTo(w-pad.r,threshY);ctx.stroke();
    ctx.setLineDash([]);ctx.fillStyle='rgba(255,204,0,0.5)';ctx.font='9px JetBrains Mono';ctx.textAlign='left';ctx.fillText('Fair Threshold (55)',pad.l+5,threshY-5);
    years.forEach((d,i)=>{if(i%5===0){const x=pad.l+i/(years.length-1)*pw;ctx.fillStyle='rgba(226,232,240,0.3)';ctx.font='9px JetBrains Mono';ctx.textAlign='center';ctx.fillText(String(d.year),x,h-5)}});
  },50);
  return`<canvas id="${canvasId}" style="width:100%;height:200px"></canvas>`;
}

function exportCsv(){
  const headers=['segmentId','roadName','from','to','length','width','area','surfaceType','yearBuilt','lastRehab','pci','lastInspection'];
  const csv=[headers.join(','),...assets.map(a=>headers.map(h=>`"${a[h]||''}"`).join(','))].join('\n');
  const blob=new Blob([csv],{type:'text/csv'});const el=document.createElement('a');el.href=URL.createObjectURL(blob);el.download='korb_assetmax.csv';el.click();
}

function render(){
  renderKpis();renderTabs();
  const c=document.getElementById('content');
  if(currentTab==='inventory')c.innerHTML=renderInventory();
  else if(currentTab==='condition')c.innerHTML=renderCondition();
  else if(currentTab==='treatments')c.innerHTML=renderTreatments();
  else if(currentTab==='network')c.innerHTML=renderNetwork();
  else if(currentTab==='deterioration')c.innerHTML=renderDeterioration();
}

load();render();
</script>
