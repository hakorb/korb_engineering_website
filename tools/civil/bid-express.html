<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Bid Express - Korb Engineering</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{--bg:#050a0f;--bg1:#0a1018;--bg2:#0f1822;--border:#1a2a3a;--accent:#00d4ff;--gold:#f0a500;--green:#00ff88;--red:#ff3344;--yellow:#ffcc00;--orange:#d29922;--purple:#8b5cf6;--pink:#ec4899;--text:#e2e8f0;--textDim:rgba(226,232,240,0.45);--textMuted:rgba(226,232,240,0.25);--font:'JetBrains Mono',monospace}
body{background:var(--bg);color:var(--text);font-family:var(--font);min-height:100vh}
input,select,button,textarea{font-family:var(--font)}
.header{height:52px;background:linear-gradient(180deg,var(--bg2),var(--bg1));border-bottom:1px solid var(--border);display:flex;align-items:center;padding:0 20px;gap:16px;position:sticky;top:0;z-index:100}
.logo-box{width:36px;height:36px;border:1.5px solid var(--accent);display:flex;align-items:center;justify-content:center;box-shadow:0 0 10px rgba(0,212,255,0.25);flex-shrink:0}
.logo-box span{font-size:11px;font-weight:700;color:var(--accent);letter-spacing:0.05em}
.htitle{font-size:16px;font-weight:700;letter-spacing:0.12em;color:var(--accent)}
.hsub{font-size:10px;color:rgba(0,212,255,0.35);letter-spacing:0.15em;text-transform:uppercase}
.tabs{display:flex;gap:0;padding:16px 20px 0;border-bottom:1px solid var(--border);flex-wrap:wrap}
.tab{padding:8px 16px;background:transparent;border:1px solid var(--border);border-bottom:1px solid var(--border);color:var(--textDim);font-size:10px;cursor:pointer;letter-spacing:0.1em;text-transform:uppercase;border-radius:4px 4px 0 0;transition:all .15s}
.tab.active{background:var(--bg2);border-color:var(--accent);border-bottom:none;color:var(--accent)}
.container{padding:20px;max-width:1400px;margin:0 auto}
.card{background:var(--bg1);border:1px solid var(--border);border-radius:8px;padding:16px;margin-bottom:10px;cursor:pointer;transition:all .2s}
.card:hover{border-color:var(--accent);transform:translateY(-1px)}
.card.selected{border-color:var(--accent);box-shadow:0 0 15px rgba(0,212,255,0.1)}
.stat-card{background:var(--bg1);border:1px solid var(--border);border-radius:8px;padding:20px;flex:1 1 200px;min-width:180px}
.badge{display:inline-block;padding:2px 8px;border-radius:4px;font-size:10px;font-weight:600;letter-spacing:0.06em;text-transform:uppercase}
.label{display:block;font-size:11px;color:var(--textDim);margin-bottom:6px;letter-spacing:0.06em;text-transform:uppercase}
.input{background:var(--bg2);border:1px solid var(--border);border-radius:6px;color:var(--text);padding:8px 12px;font-size:13px;width:100%;outline:none}
.input:focus{border-color:var(--accent)}
.textarea{background:var(--bg2);border:1px solid var(--border);border-radius:6px;color:var(--text);padding:8px 12px;font-size:13px;width:100%;outline:none;resize:vertical;min-height:80px}
.select{background:var(--bg2);border:1px solid var(--border);border-radius:6px;color:var(--text);padding:8px 12px;font-size:13px;outline:none;cursor:pointer}
.btn{background:none;border:1px solid var(--border);border-radius:6px;color:var(--text);padding:8px 16px;font-size:12px;cursor:pointer;transition:all .2s;letter-spacing:0.03em}
.btn:hover{border-color:var(--accent);color:var(--accent)}
.btn-primary{background:var(--accent);color:#000;border-color:var(--accent);font-weight:600}
.btn-outline{background:none;border:1px solid var(--border);color:var(--text)}
.btn-sm{padding:4px 10px;font-size:10px}
.row{display:flex;gap:16px;margin-bottom:12px;flex-wrap:wrap}
.field{flex:1;min-width:180px}
.detail-panel{background:var(--bg1);border:1px solid var(--border);border-radius:8px;padding:24px}
.detail-section{margin-bottom:20px}
.detail-title{font-size:13px;font-weight:700;color:var(--accent);margin-bottom:8px;text-transform:uppercase;letter-spacing:0.5px}
.deadline-urgent{color:var(--red);font-weight:700}
.deadline-soon{color:var(--orange);font-weight:700}
.deadline-ok{color:var(--green)}
.bookmark-btn{background:none;border:none;cursor:pointer;font-size:16px;transition:all .15s;padding:4px}
.filter-bar{display:flex;gap:8px;margin-bottom:16px;flex-wrap:wrap;align-items:center}
.cal-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:2px}
.cal-cell{padding:6px;font-size:10px;text-align:center;border-radius:3px;min-height:40px}
.cal-header{color:var(--textDim);font-size:9px;font-weight:600;text-transform:uppercase}
.cal-day{cursor:pointer;transition:all .15s}
.cal-day:hover{background:var(--bg2)}
.cal-day.has-bid{background:rgba(0,212,255,0.08);border:1px solid rgba(0,212,255,0.2)}
.cal-day.today{border:1px solid var(--accent)}
@media(max-width:768px){
.header{flex-wrap:wrap;height:auto;padding:8px 12px}
.htitle{font-size:13px}.hsub{display:none}
.container{padding:12px}
.row{flex-direction:column;gap:8px}
.field{min-width:100%}
.filter-bar{flex-direction:column;align-items:stretch}
.filter-bar .select,.filter-bar .input{width:100%}
}
</style>
</head>
<body>
<div class="header">
  <div class="logo-box"><span>KE</span></div>
  <div class="htitle">KORB ENGINEERING</div>
  <div class="hsub">Bid Express</div>
  <div style="flex:1"></div>
  <button class="btn btn-sm" onclick="resetDemo()">Reset Demo</button>
</div>
<div class="tabs" id="tabs"></div>
<div class="container" id="app"></div>
<div style="position:fixed;bottom:10px;right:10px;font-size:10px;color:#00d4ff;opacity:0.5;font-family:'JetBrains Mono',monospace;pointer-events:none;z-index:9999">Korb Engineering</div>

<script>
const LS_KEY='korb_bids';
const LS_BM='korb_bids_bookmarks';
const CATEGORIES=['highway','bridge','airport','utility','transit','general'];
const CAT_COLORS={highway:'#f59e0b',bridge:'#8b5cf6',airport:'#06b6d4',utility:'#10b981',transit:'#ec4899',general:'#6b7280'};
const STATES=['AL','AK','AZ','AR','CA','CO','CT','DE','FL','GA','HI','ID','IL','IN','IA','KS','KY','LA','ME','MD','MA','MI','MN','MS','MO','MT','NE','NV','NH','NJ','NM','NY','NC','ND','OH','OK','OR','PA','RI','SC','SD','TN','TX','UT','VT','VA','WA','WV','WI','WY','DC','PR'];

const fmt$=v=>'$'+Number(v).toLocaleString('en-US',{maximumFractionDigits:0});
const fmtDate=d=>{if(!d)return'\u2014';return new Date(d).toLocaleDateString('en-US',{month:'short',day:'numeric',year:'numeric'})};
const daysUntil=d=>{if(!d)return Infinity;return Math.ceil((new Date(d)-new Date())/86400000)};

function generateDemoBids(){
  const now=new Date();
  const d=off=>{const dt=new Date(now);dt.setDate(dt.getDate()+off);return dt.toISOString().slice(0,10)};
  return[
    {id:'BID-001',name:'Runway 9R/27L Rehabilitation -- Orlando Executive Airport',agency:'Greater Orlando Aviation Authority (GOAA)',state:'FL',category:'airport',deadline:d(18),estimatedValue:14500000,scopeOfWork:'Complete mill and overlay of Runway 9R/27L (5,004 x 150 ft). Includes P-401 HMA surface course, P-209 crushed aggregate base repair, airfield lighting replacement (LED upgrade), NAVAIDS protection, and full pavement marking per FAA AC 150/5340-1M.',dbeRequirement:'14.2% DBE Goal',preBidMeeting:d(5),bondingRequirements:'100% Performance Bond, 100% Payment Bond, Bid Bond 5%',contactName:'Maria Vasquez, P.E.',contactEmail:'mvasquez@goaa.net',contactPhone:'(407) 825-2001',documents:['Plans & Specifications','Geotechnical Report','DBE Directory','Wage Rate Decision'],postedDate:d(-5),status:'active'},
    {id:'BID-002',name:'I-75 Widening -- SR 200 to SR 326 (Ocala Segment)',agency:'Florida Department of Transportation (FDOT)',state:'FL',category:'highway',deadline:d(25),estimatedValue:87000000,scopeOfWork:'Widening of I-75 from 4 lanes to 6 lanes (12.3 miles). Includes earthwork, drainage improvements, noise walls, bridge widening at 3 overpass structures, ITS installations, ramp modifications, and MOT.',dbeRequirement:'10.65% DBE Goal',preBidMeeting:d(8),bondingRequirements:'100% Performance Bond, 100% Payment Bond, Bid Bond 5%',contactName:'James Whitfield, P.E.',contactEmail:'james.whitfield@dot.state.fl.us',contactPhone:'(352) 955-6700',documents:['Contract Plans (630 sheets)','Specifications Book','Utility Relocation Schedule','Geotech Borings'],postedDate:d(-12),status:'active'},
    {id:'BID-003',name:'US 281 Bridge Replacement over Guadalupe River',agency:'Texas Department of Transportation (TxDOT)',state:'TX',category:'bridge',deadline:d(12),estimatedValue:23400000,scopeOfWork:'Demolition and replacement of existing 4-span prestressed concrete bridge (680 ft). New 5-span continuous steel plate girder bridge with drilled shaft foundations. Includes approach roadwork and retaining walls.',dbeRequirement:'11.4% DBE Goal',preBidMeeting:d(3),bondingRequirements:'100% Performance Bond, 100% Payment Bond, Bid Bond 5%',contactName:'Robert Chen, P.E.',contactEmail:'robert.chen@txdot.gov',contactPhone:'(512) 416-2496',documents:['Bridge Plans','Hydraulic Analysis','Foundation Report','Environmental Permit'],postedDate:d(-8),status:'active'},
    {id:'BID-004',name:'Taxiway A Reconstruction -- Hartsfield-Jackson Atlanta Intl',agency:'City of Atlanta -- Dept of Aviation',state:'GA',category:'airport',deadline:d(30),estimatedValue:42000000,scopeOfWork:'Full-depth reconstruction of Taxiway A (8,200 LF x 75 ft). P-501 PCC pavement, P-306 econocrete base, underdrain system, LED taxiway edge/centerline lighting, guidance signs, SMGCS integration. Night work.',dbeRequirement:'18.5% DBE Goal',preBidMeeting:d(10),bondingRequirements:'100% Performance Bond, 100% Payment Bond, Bid Bond 5%',contactName:'Denise Williams',contactEmail:'dwilliams@atl.com',contactPhone:'(404) 530-6600',documents:['Plans & Specs','DBE Utilization Plan','Safety Plan Requirements','Phasing Plans'],postedDate:d(-3),status:'active'},
    {id:'BID-005',name:'Water Main Replacement -- Downtown Corridor Phase III',agency:'Jacksonville Electric Authority (JEA)',state:'FL',category:'utility',deadline:d(8),estimatedValue:6800000,scopeOfWork:'Replacement of 4.2 miles of aging cast iron water main (12-inch and 16-inch DIP). 380 service reconnections, fire hydrant installations, valve replacements, bypass pumping, traffic control, roadway restoration.',dbeRequirement:'8% SBE Goal',preBidMeeting:d(2),bondingRequirements:'100% Performance Bond, 100% Payment Bond',contactName:'Patricia Gonzalez',contactEmail:'gonzalezp@jea.com',contactPhone:'(904) 665-4100',documents:['Construction Plans','Specifications','Utility Conflict Matrix'],postedDate:d(-15),status:'active'},
    {id:'BID-006',name:'MARTA Purple Line Extension -- Stations & Track',agency:'Metropolitan Atlanta Rapid Transit Authority',state:'GA',category:'transit',deadline:d(45),estimatedValue:340000000,scopeOfWork:'Design-build of 4.2-mile Purple Line extension with 3 new stations. Tunnel boring (0.8 mi), elevated guideway (1.6 mi), at-grade track (1.8 mi), station architecture, signals, fare collection, 18-month commissioning.',dbeRequirement:'22% DBE Goal',preBidMeeting:d(15),bondingRequirements:'100% Performance Bond, 100% Payment Bond, Bid Bond 10%',contactName:'Anthony Parker, P.E.',contactEmail:'aparker@itsmarta.com',contactPhone:'(404) 848-5000',documents:['RFP Document','Preliminary Engineering Plans','EIS','Ridership Projections','Federal Funding Agreement'],postedDate:d(-20),status:'active'},
    {id:'BID-007',name:'SR 400 Bridge Deck Replacement -- Gwinnett County',agency:'Georgia DOT (GDOT)',state:'GA',category:'bridge',deadline:d(15),estimatedValue:11200000,scopeOfWork:'Removal and replacement of bridge deck on SR 400 over I-85 interchange. Deck demolition, new reinforced concrete deck, expansion joints, bridge rail, approach slabs, 6-month MOT.',dbeRequirement:'13.0% DBE Goal',preBidMeeting:d(4),bondingRequirements:'100% Performance Bond, 100% Payment Bond, Bid Bond 5%',contactName:'Sarah Mitchell, P.E.',contactEmail:'smitchell@dot.ga.gov',contactPhone:'(770) 387-3600',documents:['Bridge Plans','Load Rating Report','MOT Plans','Addendum #1'],postedDate:d(-6),status:'active'},
    {id:'BID-008',name:'Runway 18L/36R Safety Area Improvements -- DFW Intl',agency:'Dallas/Fort Worth International Airport Board',state:'TX',category:'airport',deadline:d(22),estimatedValue:28500000,scopeOfWork:'Runway Safety Area grading for 18L/36R. EMAS installation (2 beds), RSA grading (48 acres), drainage modifications, NAVAIDS relocation, blast pad reconstruction, perimeter fencing.',dbeRequirement:'15.8% DBE Goal',preBidMeeting:d(7),bondingRequirements:'100% Performance Bond, 100% Payment Bond, Bid Bond 5%',contactName:'Michael Torres',contactEmail:'mtorres@dfwairport.com',contactPhone:'(972) 973-5200',documents:['Plans & Specifications','EMAS Requirements','Geotech Report','FAA Safety Analysis'],postedDate:d(-9),status:'active'},
    {id:'BID-009',name:'Sanitary Sewer Rehabilitation -- Basin 14 CIPP Lining',agency:'Miami-Dade Water and Sewer',state:'FL',category:'utility',deadline:d(10),estimatedValue:4200000,scopeOfWork:'CIPP lining of 28,000 LF of sanitary sewer (8" to 24"). Pre-rehab CCTV, point repairs, 42 manhole rehabilitations, service lateral reconnections, bypass pumping, post-lining CCTV.',dbeRequirement:'12% SBE/MBE Goal',preBidMeeting:d(3),bondingRequirements:'100% Performance Bond, 100% Payment Bond',contactName:'Luis Fernandez',contactEmail:'lfernandez@miamidade.gov',contactPhone:'(305) 665-7471',documents:['Contract Documents','CCTV Logs','Sewer Atlas Maps'],postedDate:d(-7),status:'active'},
    {id:'BID-010',name:'US 19 Corridor Improvements -- Pasco County',agency:'Florida DOT (FDOT)',state:'FL',category:'highway',deadline:d(35),estimatedValue:52000000,scopeOfWork:'Reconstruction of US 19 from SR 54 to SR 52 (6.8 miles). Median improvements, access management, 12 new traffic signals, ADA sidewalks, stormwater ponds, utility relocations, landscaping.',dbeRequirement:'10.65% DBE Goal',preBidMeeting:d(12),bondingRequirements:'100% Performance Bond, 100% Payment Bond, Bid Bond 5%',contactName:'Kevin Brooks, P.E.',contactEmail:'kevin.brooks@dot.state.fl.us',contactPhone:'(813) 975-6000',documents:['Plans (420 sheets)','Specifications','Drainage Report','Signal Plans'],postedDate:d(-14),status:'active'},
    {id:'BID-011',name:'I-285/SR 400 Interchange Reconstruction',agency:'Georgia DOT (GDOT)',state:'GA',category:'highway',deadline:d(50),estimatedValue:465000000,scopeOfWork:'Major interchange reconstruction: collector-distributor system, 8 new bridge structures, 42,000 SF retaining walls, drainage replacement, ITS, noise barriers. Design-build, 4-year construction.',dbeRequirement:'17% DBE Goal',preBidMeeting:d(20),bondingRequirements:'100% Performance Bond, 100% Payment Bond, Bid Bond 10%',contactName:'David Kim, P.E.',contactEmail:'dkim@dot.ga.gov',contactPhone:'(404) 631-1000',documents:['RFP Volume I','RFP Volume II','Preliminary Plans','Environmental Document','Geotech Data'],postedDate:d(-25),status:'active'},
    {id:'BID-012',name:'Stormwater Outfall Rehabilitation -- 5 Sites',agency:'City of Tampa -- Stormwater Engineering',state:'FL',category:'general',deadline:d(6),estimatedValue:2100000,scopeOfWork:'Rehabilitation of 5 stormwater outfall structures along Hillsborough Bay. Headwall reconstruction, riprap, outfall pipe relining (750 LF), sediment removal, erosion control.',dbeRequirement:'10% SBE Goal',preBidMeeting:d(1),bondingRequirements:'100% Performance Bond, 100% Payment Bond',contactName:'Rachel Nguyen, P.E.',contactEmail:'rachel.nguyen@tampagov.net',contactPhone:'(813) 274-8811',documents:['Plans & Specs','Environmental Permits','Site Access Agreements'],postedDate:d(-10),status:'active'},
  ];
}

let bids=[],bookmarks=[],selectedBid=null,searchTerm='',filterState='',filterCategory='',filterMinValue='',filterMaxValue='',filterDeadlineDays='',activeTab='active',calMonth=new Date().getMonth(),calYear=new Date().getFullYear(),newBid={name:'',agency:'',state:'',category:'general',deadline:'',estimatedValue:'',scopeOfWork:'',dbeRequirement:'',preBidMeeting:'',bondingRequirements:'',contactName:'',contactEmail:'',contactPhone:'',documents:''};

function loadData(){
  try{const s=localStorage.getItem(LS_KEY);if(s)bids=JSON.parse(s);else{bids=generateDemoBids();localStorage.setItem(LS_KEY,JSON.stringify(bids))}}catch(e){bids=generateDemoBids()}
  try{const b=localStorage.getItem(LS_BM);if(b)bookmarks=JSON.parse(b);else bookmarks=[]}catch(e){bookmarks=[]}
}
function saveBids(){localStorage.setItem(LS_KEY,JSON.stringify(bids))}
function saveBM(){localStorage.setItem(LS_BM,JSON.stringify(bookmarks))}
function resetDemo(){bids=generateDemoBids();bookmarks=[];selectedBid=null;saveBids();saveBM();render()}
function toggleBookmark(id,ev){if(ev)ev.stopPropagation();const i=bookmarks.indexOf(id);if(i>=0)bookmarks.splice(i,1);else bookmarks.push(id);saveBM();render()}

function getFilteredBids(){
  return bids.filter(b=>{
    if(b.status!=='active')return false;
    if(searchTerm){const q=searchTerm.toLowerCase();if(!`${b.name} ${b.agency} ${b.state} ${b.scopeOfWork} ${b.category}`.toLowerCase().includes(q))return false}
    if(filterState&&b.state!==filterState)return false;
    if(filterCategory&&b.category!==filterCategory)return false;
    if(filterMinValue&&b.estimatedValue<Number(filterMinValue))return false;
    if(filterMaxValue&&b.estimatedValue>Number(filterMaxValue))return false;
    if(filterDeadlineDays&&daysUntil(b.deadline)>Number(filterDeadlineDays))return false;
    return true;
  }).sort((a,b)=>new Date(a.deadline)-new Date(b.deadline));
}

function deadlineClass(d){const days=daysUntil(d);if(days<0)return'deadline-urgent';if(days<=7)return'deadline-urgent';if(days<=14)return'deadline-soon';return'deadline-ok'}
function deadlineText(d){const days=daysUntil(d);if(days<0)return'EXPIRED';if(days===0)return'TODAY';if(days===1)return'TOMORROW';return days+' days'}
function esc(s){return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;')}

function renderTabs(){
  const tabs=[{id:'active',label:'Active Bids'},{id:'my-bids',label:`My Bids (${bookmarks.length})`},{id:'calendar',label:'Calendar'},{id:'stats',label:'Statistics'},{id:'create',label:'+ New Bid'}];
  document.getElementById('tabs').innerHTML=tabs.map(t=>`<button class="tab ${activeTab===t.id?'active':''}" onclick="activeTab='${t.id}';selectedBid=null;render()">${t.label}</button>`).join('');
}

function renderBidCard(b){
  const days=daysUntil(b.deadline);
  const isBM=bookmarks.includes(b.id);
  return`<div class="card ${selectedBid===b.id?'selected':''}" onclick="selectedBid='${b.id}';render()">
    <div style="display:flex;justify-content:space-between;align-items:flex-start;gap:8px">
      <div style="flex:1">
        <div style="display:flex;gap:6px;align-items:center;margin-bottom:6px;flex-wrap:wrap">
          <span class="badge" style="background:${CAT_COLORS[b.category]}22;color:${CAT_COLORS[b.category]};border:1px solid ${CAT_COLORS[b.category]}44">${b.category}</span>
          <span style="font-size:10px;color:var(--textDim)">${b.state}</span>
          <span style="font-size:10px" class="${deadlineClass(b.deadline)}">${deadlineText(b.deadline)}</span>
        </div>
        <div style="font-size:13px;font-weight:600;margin-bottom:4px;color:var(--text)">${esc(b.name)}</div>
        <div style="font-size:11px;color:var(--textDim);margin-bottom:4px">${esc(b.agency)}</div>
        <div style="display:flex;gap:16px;font-size:11px;flex-wrap:wrap">
          <span style="color:var(--green)">${fmt$(b.estimatedValue)}</span>
          <span style="color:var(--textDim)">Due: ${fmtDate(b.deadline)}</span>
        </div>
      </div>
      <button class="bookmark-btn" onclick="toggleBookmark('${b.id}',event)" title="${isBM?'Remove bookmark':'Bookmark'}">${isBM?'\u2605':'\u2606'}</button>
    </div>
  </div>`;
}

function renderBidDetail(b){
  if(!b)return'';
  const isBM=bookmarks.includes(b.id);
  return`<div class="detail-panel">
    <div style="display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:16px;flex-wrap:wrap;gap:8px">
      <div>
        <div style="display:flex;gap:6px;align-items:center;margin-bottom:8px;flex-wrap:wrap">
          <span class="badge" style="background:${CAT_COLORS[b.category]}22;color:${CAT_COLORS[b.category]};border:1px solid ${CAT_COLORS[b.category]}44">${b.category}</span>
          <span style="font-size:10px;color:var(--textDim)">${b.state}</span>
          <span style="font-size:11px;font-weight:700" class="${deadlineClass(b.deadline)}">${deadlineText(b.deadline)} remaining</span>
        </div>
        <div style="font-size:16px;font-weight:700;color:var(--text);margin-bottom:4px">${esc(b.name)}</div>
        <div style="font-size:12px;color:var(--textDim)">${esc(b.agency)}</div>
      </div>
      <div style="display:flex;gap:6px">
        <button class="btn btn-sm" onclick="toggleBookmark('${b.id}')">${isBM?'\u2605 Bookmarked':'\u2606 Bookmark'}</button>
        <button class="btn btn-sm" style="color:var(--red);border-color:var(--red)" onclick="archiveBid('${b.id}')">Archive</button>
      </div>
    </div>
    <div style="display:flex;gap:16px;margin-bottom:20px;flex-wrap:wrap">
      <div class="stat-card" style="flex:1 1 150px;min-width:150px"><div style="font-size:9px;color:var(--textDim);text-transform:uppercase">Estimated Value</div><div style="font-size:20px;font-weight:700;color:var(--green)">${fmt$(b.estimatedValue)}</div></div>
      <div class="stat-card" style="flex:1 1 150px;min-width:150px"><div style="font-size:9px;color:var(--textDim);text-transform:uppercase">Deadline</div><div style="font-size:14px;font-weight:700;color:var(--text)">${fmtDate(b.deadline)}</div></div>
      <div class="stat-card" style="flex:1 1 150px;min-width:150px"><div style="font-size:9px;color:var(--textDim);text-transform:uppercase">Pre-Bid Meeting</div><div style="font-size:14px;font-weight:700;color:var(--text)">${fmtDate(b.preBidMeeting)}</div></div>
    </div>
    <div class="detail-section"><div class="detail-title">Scope of Work</div><div style="font-size:12px;line-height:1.6;color:var(--text)">${esc(b.scopeOfWork)}</div></div>
    <div class="detail-section"><div class="detail-title">Requirements</div>
      <div style="display:grid;grid-template-columns:1fr 1fr;gap:12px;font-size:11px">
        <div><span style="color:var(--textDim)">DBE Requirement:</span> <span style="color:var(--accent)">${esc(b.dbeRequirement)}</span></div>
        <div><span style="color:var(--textDim)">Bonding:</span> <span style="color:var(--text)">${esc(b.bondingRequirements)}</span></div>
      </div>
    </div>
    <div class="detail-section"><div class="detail-title">Contact</div>
      <div style="font-size:11px;line-height:1.8">
        <div>${esc(b.contactName)}</div>
        <div style="color:var(--accent)">${esc(b.contactEmail)}</div>
        <div style="color:var(--textDim)">${esc(b.contactPhone)}</div>
      </div>
    </div>
    <div class="detail-section"><div class="detail-title">Documents</div>
      <div style="display:flex;gap:6px;flex-wrap:wrap">${(b.documents||[]).map(d=>`<span style="background:var(--bg2);border:1px solid var(--border);padding:4px 10px;border-radius:4px;font-size:10px">${esc(d)}</span>`).join('')}</div>
    </div>
    <div style="font-size:9px;color:var(--textMuted);margin-top:12px">Posted: ${fmtDate(b.postedDate)} | ID: ${b.id}</div>
  </div>`;
}

function renderActiveBids(){
  const filtered=getFilteredBids();
  const sel=bids.find(b=>b.id===selectedBid);
  return`<div class="filter-bar">
    <input class="input" style="max-width:250px" placeholder="Search bids..." value="${esc(searchTerm)}" oninput="searchTerm=this.value;render()">
    <select class="select" onchange="filterState=this.value;render()"><option value="">All States</option>${STATES.map(s=>`<option value="${s}" ${filterState===s?'selected':''}>${s}</option>`).join('')}</select>
    <select class="select" onchange="filterCategory=this.value;render()"><option value="">All Categories</option>${CATEGORIES.map(c=>`<option value="${c}" ${filterCategory===c?'selected':''}>${c}</option>`).join('')}</select>
    <select class="select" onchange="filterDeadlineDays=this.value;render()"><option value="">Any Deadline</option><option value="7" ${filterDeadlineDays==='7'?'selected':''}>Next 7 days</option><option value="14" ${filterDeadlineDays==='14'?'selected':''}>Next 14 days</option><option value="30" ${filterDeadlineDays==='30'?'selected':''}>Next 30 days</option></select>
    <span style="font-size:10px;color:var(--textDim)">${filtered.length} results</span>
  </div>
  <div style="display:flex;gap:16px;align-items:flex-start;flex-wrap:wrap">
    <div style="flex:1;min-width:300px">${filtered.length?filtered.map(b=>renderBidCard(b)).join(''):'<div style="text-align:center;padding:40px;color:var(--textDim)">No bids match your filters</div>'}</div>
    ${sel?`<div style="flex:1;min-width:350px;position:sticky;top:68px">${renderBidDetail(sel)}</div>`:''}
  </div>`;
}

function renderMyBids(){
  const myBids=bids.filter(b=>bookmarks.includes(b.id));
  const sel=bids.find(b=>b.id===selectedBid);
  return`<div style="margin-bottom:16px;font-size:12px;color:var(--textDim)">Bookmarked bids for tracking (${myBids.length})</div>
  <div style="display:flex;gap:16px;align-items:flex-start;flex-wrap:wrap">
    <div style="flex:1;min-width:300px">${myBids.length?myBids.map(b=>renderBidCard(b)).join(''):'<div style="text-align:center;padding:40px;color:var(--textDim)">No bookmarked bids. Click the star icon on any bid to bookmark it.</div>'}</div>
    ${sel?`<div style="flex:1;min-width:350px;position:sticky;top:68px">${renderBidDetail(sel)}</div>`:''}
  </div>`;
}

function renderCalendar(){
  const first=new Date(calYear,calMonth,1);
  const startDay=first.getDay();
  const daysInMonth=new Date(calYear,calMonth+1,0).getDate();
  const today=new Date();
  const monthNames=['January','February','March','April','May','June','July','August','September','October','November','December'];
  const bidsByDay={};
  bids.filter(b=>b.status==='active').forEach(b=>{
    const dd=new Date(b.deadline);
    if(dd.getMonth()===calMonth&&dd.getFullYear()===calYear){
      const day=dd.getDate();
      if(!bidsByDay[day])bidsByDay[day]=[];
      bidsByDay[day].push(b);
    }
  });
  let cells='';
  ['Sun','Mon','Tue','Wed','Thu','Fri','Sat'].forEach(d=>{cells+=`<div class="cal-cell cal-header">${d}</div>`});
  for(let i=0;i<startDay;i++)cells+=`<div class="cal-cell"></div>`;
  for(let d=1;d<=daysInMonth;d++){
    const isToday=d===today.getDate()&&calMonth===today.getMonth()&&calYear===today.getFullYear();
    const hasBid=bidsByDay[d];
    cells+=`<div class="cal-cell cal-day ${isToday?'today':''} ${hasBid?'has-bid':''}" ${hasBid?`onclick="selectedBid='${hasBid[0].id}';render()"`:''}>
      <div style="font-weight:${isToday?'700':'400'};color:${isToday?'var(--accent)':'var(--text)'}">${d}</div>
      ${hasBid?hasBid.map(b=>`<div style="font-size:7px;color:${CAT_COLORS[b.category]};overflow:hidden;text-overflow:ellipsis;white-space:nowrap;margin-top:2px">${esc(b.name).slice(0,15)}</div>`).join(''):''}
    </div>`;
  }
  const sel=bids.find(b=>b.id===selectedBid);
  return`<div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:16px">
    <button class="btn btn-sm" onclick="calMonth--;if(calMonth<0){calMonth=11;calYear--};render()">&larr; Prev</button>
    <div style="font-size:16px;font-weight:700;color:var(--accent)">${monthNames[calMonth]} ${calYear}</div>
    <button class="btn btn-sm" onclick="calMonth++;if(calMonth>11){calMonth=0;calYear++};render()">Next &rarr;</button>
  </div>
  <div style="display:flex;gap:16px;flex-wrap:wrap">
    <div style="flex:2;min-width:300px"><div class="cal-grid">${cells}</div></div>
    ${sel?`<div style="flex:1;min-width:300px">${renderBidDetail(sel)}</div>`:''}
  </div>`;
}

function renderStats(){
  const active=bids.filter(b=>b.status==='active');
  const closingSoon=active.filter(b=>{const d=daysUntil(b.deadline);return d>=0&&d<=7}).length;
  const totalValue=active.reduce((s,b)=>s+(Number(b.estimatedValue)||0),0);
  const avgValue=active.length?totalValue/active.length:0;
  const byCat={};CATEGORIES.forEach(c=>{byCat[c]=active.filter(b=>b.category===c).length});
  const byState={};active.forEach(b=>{byState[b.state]=(byState[b.state]||0)+1});
  const topStates=Object.entries(byState).sort((a,b)=>b[1]-a[1]).slice(0,8);
  const maxCat=Math.max(...Object.values(byCat),1);
  return`<div style="display:flex;gap:12px;flex-wrap:wrap;margin-bottom:20px">
    <div class="stat-card"><div style="font-size:9px;color:var(--textDim);text-transform:uppercase">Active Bids</div><div style="font-size:28px;font-weight:700;color:var(--accent)">${active.length}</div></div>
    <div class="stat-card"><div style="font-size:9px;color:var(--textDim);text-transform:uppercase">Closing This Week</div><div style="font-size:28px;font-weight:700;color:var(--red)">${closingSoon}</div></div>
    <div class="stat-card"><div style="font-size:9px;color:var(--textDim);text-transform:uppercase">Total Pipeline Value</div><div style="font-size:28px;font-weight:700;color:var(--green)">${fmt$(totalValue)}</div></div>
    <div class="stat-card"><div style="font-size:9px;color:var(--textDim);text-transform:uppercase">Avg Bid Value</div><div style="font-size:28px;font-weight:700;color:var(--text)">${fmt$(avgValue)}</div></div>
    <div class="stat-card"><div style="font-size:9px;color:var(--textDim);text-transform:uppercase">Bookmarked</div><div style="font-size:28px;font-weight:700;color:var(--yellow)">${bookmarks.length}</div></div>
  </div>
  <div style="display:flex;gap:16px;flex-wrap:wrap">
    <div style="flex:1;min-width:300px;background:var(--bg1);border:1px solid var(--border);border-radius:8px;padding:20px">
      <div style="font-size:11px;color:var(--accent);text-transform:uppercase;letter-spacing:0.1em;margin-bottom:12px">Bids by Category</div>
      ${CATEGORIES.map(c=>`<div style="display:flex;align-items:center;gap:8px;margin-bottom:8px">
        <div style="width:70px;font-size:10px;text-transform:capitalize;color:${CAT_COLORS[c]}">${c}</div>
        <div style="flex:1;height:16px;background:var(--bg2);border-radius:3px;overflow:hidden"><div style="height:100%;width:${(byCat[c]/maxCat)*100}%;background:${CAT_COLORS[c]};border-radius:3px;transition:width .3s"></div></div>
        <div style="width:24px;text-align:right;font-size:11px;font-weight:700">${byCat[c]}</div>
      </div>`).join('')}
    </div>
    <div style="flex:1;min-width:300px;background:var(--bg1);border:1px solid var(--border);border-radius:8px;padding:20px">
      <div style="font-size:11px;color:var(--accent);text-transform:uppercase;letter-spacing:0.1em;margin-bottom:12px">Top States</div>
      ${topStates.map(([st,cnt])=>`<div style="display:flex;justify-content:space-between;padding:4px 0;border-bottom:1px solid var(--border);font-size:11px"><span>${st}</span><span style="font-weight:700">${cnt}</span></div>`).join('')}
    </div>
  </div>`;
}

function renderCreateBid(){
  return`<div style="background:var(--bg1);border:1px solid var(--border);border-radius:8px;padding:24px;max-width:800px">
    <div style="font-size:14px;font-weight:700;color:var(--accent);margin-bottom:16px;text-transform:uppercase;letter-spacing:1px">Create New Bid</div>
    <div class="row"><div class="field"><div class="label">Project Name *</div><input class="input" value="${esc(newBid.name)}" oninput="newBid.name=this.value"></div></div>
    <div class="row"><div class="field"><div class="label">Agency *</div><input class="input" value="${esc(newBid.agency)}" oninput="newBid.agency=this.value"></div></div>
    <div class="row">
      <div class="field"><div class="label">State</div><select class="select" style="width:100%" onchange="newBid.state=this.value"><option value="">Select</option>${STATES.map(s=>`<option value="${s}" ${newBid.state===s?'selected':''}>${s}</option>`).join('')}</select></div>
      <div class="field"><div class="label">Category</div><select class="select" style="width:100%" onchange="newBid.category=this.value">${CATEGORIES.map(c=>`<option value="${c}" ${newBid.category===c?'selected':''}>${c}</option>`).join('')}</select></div>
    </div>
    <div class="row">
      <div class="field"><div class="label">Deadline *</div><input class="input" type="date" value="${newBid.deadline}" onchange="newBid.deadline=this.value"></div>
      <div class="field"><div class="label">Estimated Value ($)</div><input class="input" type="number" value="${newBid.estimatedValue}" oninput="newBid.estimatedValue=this.value"></div>
    </div>
    <div class="row"><div class="field"><div class="label">Scope of Work</div><textarea class="textarea" oninput="newBid.scopeOfWork=this.value">${esc(newBid.scopeOfWork)}</textarea></div></div>
    <div class="row">
      <div class="field"><div class="label">DBE Requirement</div><input class="input" value="${esc(newBid.dbeRequirement)}" oninput="newBid.dbeRequirement=this.value"></div>
      <div class="field"><div class="label">Pre-Bid Meeting</div><input class="input" type="date" value="${newBid.preBidMeeting}" onchange="newBid.preBidMeeting=this.value"></div>
    </div>
    <div class="row"><div class="field"><div class="label">Bonding Requirements</div><input class="input" value="${esc(newBid.bondingRequirements)}" oninput="newBid.bondingRequirements=this.value"></div></div>
    <div class="row">
      <div class="field"><div class="label">Contact Name</div><input class="input" value="${esc(newBid.contactName)}" oninput="newBid.contactName=this.value"></div>
      <div class="field"><div class="label">Email</div><input class="input" value="${esc(newBid.contactEmail)}" oninput="newBid.contactEmail=this.value"></div>
      <div class="field"><div class="label">Phone</div><input class="input" value="${esc(newBid.contactPhone)}" oninput="newBid.contactPhone=this.value"></div>
    </div>
    <div class="row"><div class="field"><div class="label">Documents (comma-separated)</div><input class="input" value="${esc(newBid.documents)}" oninput="newBid.documents=this.value"></div></div>
    <div style="margin-top:16px;display:flex;gap:8px">
      <button class="btn btn-primary" onclick="createBid()">Create Bid</button>
      <button class="btn" onclick="newBid={name:'',agency:'',state:'',category:'general',deadline:'',estimatedValue:'',scopeOfWork:'',dbeRequirement:'',preBidMeeting:'',bondingRequirements:'',contactName:'',contactEmail:'',contactPhone:'',documents:''};render()">Clear</button>
    </div>
  </div>`;
}

function createBid(){
  if(!newBid.name||!newBid.agency||!newBid.deadline)return alert('Name, Agency, and Deadline are required.');
  const bid={...newBid,id:'BID-'+Date.now(),estimatedValue:Number(newBid.estimatedValue)||0,documents:newBid.documents?newBid.documents.split(',').map(d=>d.trim()).filter(Boolean):[],postedDate:new Date().toISOString().slice(0,10),status:'active'};
  bids.unshift(bid);saveBids();
  newBid={name:'',agency:'',state:'',category:'general',deadline:'',estimatedValue:'',scopeOfWork:'',dbeRequirement:'',preBidMeeting:'',bondingRequirements:'',contactName:'',contactEmail:'',contactPhone:'',documents:''};
  activeTab='active';render();
}
function archiveBid(id){const b=bids.find(b=>b.id===id);if(b){b.status='archived';selectedBid=null;saveBids();render()}}

function render(){
  renderTabs();
  const app=document.getElementById('app');
  switch(activeTab){
    case'active':app.innerHTML=renderActiveBids();break;
    case'my-bids':app.innerHTML=renderMyBids();break;
    case'calendar':app.innerHTML=renderCalendar();break;
    case'stats':app.innerHTML=renderStats();break;
    case'create':app.innerHTML=renderCreateBid();break;
  }
}
loadData();render();
</script>
</body>
</html>
