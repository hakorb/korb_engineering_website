<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{--bg:#050a0f;--bg1:#0a1018;--bg2:#0f1822;--border:#1a2a3a;--accent:#00d4ff;--gold:#f0a500;--green:#00ff88;--red:#ff3344;--yellow:#ffcc00;--orange:#d29922;--purple:#8b5cf6;--pink:#ec4899;--text:#e2e8f0;--textDim:rgba(226,232,240,0.45);--textMuted:rgba(226,232,240,0.25);--font:'JetBrains Mono',monospace}
body{background:var(--bg);color:var(--text);font-family:var(--font);min-height:100vh}
input,select,button,textarea{font-family:var(--font)}
.header{height:52px;background:linear-gradient(180deg,var(--bg2),var(--bg1));border-bottom:1px solid var(--border);display:flex;align-items:center;padding:0 20px;gap:16px;position:sticky;top:0;z-index:100}
.logo-box{width:36px;height:36px;border:1.5px solid var(--accent);display:flex;align-items:center;justify-content:center;box-shadow:0 0 10px rgba(0,212,255,0.25);flex-shrink:0}
.logo-box span{font-size:11px;font-weight:700;color:var(--accent);letter-spacing:0.05em}
.htitle{font-size:16px;font-weight:700;letter-spacing:0.12em;color:var(--accent)}
.hsub{font-size:10px;color:rgba(0,212,255,0.35);letter-spacing:0.15em;text-transform:uppercase}
.tabs{display:flex;gap:0;padding:16px 20px 0;border-bottom:1px solid var(--border);flex-wrap:wrap}
.tab{padding:8px 16px;background:transparent;border:1px solid var(--border);border-bottom:1px solid var(--border);color:var(--textDim);font-size:10px;cursor:pointer;letter-spacing:0.1em;text-transform:uppercase;border-radius:4px 4px 0 0;transition:all .15s}
.tab.active{background:var(--bg2);border-color:var(--accent);border-bottom:none;color:var(--accent)}
.container{padding:20px;max-width:1400px;margin:0 auto}
.card{background:var(--bg1);border:1px solid var(--border);border-radius:8px;padding:16px;margin-bottom:10px;cursor:pointer;transition:all .2s}
.card:hover{border-color:var(--accent);transform:translateY(-1px)}
.card.selected{border-color:var(--accent);box-shadow:0 0 15px rgba(0,212,255,0.1)}
.stat-card{background:var(--bg1);border:1px solid var(--border);border-radius:8px;padding:20px;flex:1 1 200px;min-width:180px}

.input{background:var(--bg2);border:1px solid var(--border);border-radius:6px;color:var(--text);padding:8px 12px;font-size:16px;width:100%;outline:none;min-height:44px}

.select{background:var(--bg2);border:1px solid var(--border);border-radius:6px;color:var(--text);padding:8px 12px;font-size:16px;outline:none;cursor:pointer;min-height:44px}
.btn{background:none;border:1px solid var(--border);border-radius:6px;color:var(--text);padding:8px 16px;font-size:12px;cursor:pointer;transition:all .2s;letter-spacing:0.03em;min-height:44px}
.btn:hover{border-color:var(--accent);color:var(--accent)}
.btn-primary{background:var(--accent);color:#000;border-color:var(--accent);font-weight:600}

.btn-danger{background:none;border:1px solid var(--red);color:var(--red)}

.btn-outline{background:none;border:1px solid var(--border);color:var(--text)}
.btn-sm{padding:4px 10px;font-size:10px}
.row{display:flex;gap:16px;margin-bottom:12px;flex-wrap:wrap}
.field{flex:1;min-width:180px}
.detail-panel{background:var(--bg1);border:1px solid var(--border);border-radius:8px;padding:24px}

.bookmark-btn{background:none;border:none;cursor:pointer;font-size:16px;transition:all .15s;padding:4px}
.filter-bar{display:flex;gap:8px;margin-bottom:16px;flex-wrap:wrap;align-items:center}

.file-item .file-name{color:var(--text);flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.file-item .file-size{color:var(--textDim);margin:0 12px;flex-shrink:0}
.file-item .file-remove{background:none;border:none;color:var(--red);cursor:pointer;font-size:14px;padding:0 4px}
.req-tag{display:inline-flex;align-items:center;gap:4px;padding:4px 10px;background:var(--bg2);border:1px solid var(--border);border-radius:4px;font-size:10px;margin:3px}

.project-card{background:var(--bg1);border:1px solid var(--border);border-radius:8px;padding:16px;margin-bottom:10px;transition:all .2s}
.project-card:hover{border-color:var(--accent);transform:translateY(-1px)}

// --- IndexedDB helpers ---
let dbInstance=null;
function openDB(){
  return new Promise((resolve,reject)=>{
    if(dbInstance){resolve(dbInstance);return}
    const req=indexedDB.open(IDB_NAME,IDB_VERSION);
    req.onupgradeneeded=e=>{const db=e.target.result;if(!db.objectStoreNames.contains(IDB_STORE)){db.createObjectStore(IDB_STORE,{keyPath:'id'})}};
    req.onsuccess=e=>{dbInstance=e.target.result;resolve(dbInstance)};
    req.onerror=e=>reject(e.target.error);
  });
}
function idbPut(doc){return openDB().then(db=>new Promise((res,rej)=>{const tx=db.transaction(IDB_STORE,'readwrite');tx.objectStore(IDB_STORE).put(doc);tx.oncomplete=()=>res();tx.onerror=e=>rej(e.target.error)}))}
function idbGet(id){return openDB().then(db=>new Promise((res,rej)=>{const tx=db.transaction(IDB_STORE,'readonly');const req=tx.objectStore(IDB_STORE).get(id);req.onsuccess=()=>res(req.result);req.onerror=e=>rej(e.target.error)}))}
function idbDelete(id){return openDB().then(db=>new Promise((res,rej)=>{const tx=db.transaction(IDB_STORE,'readwrite');tx.objectStore(IDB_STORE).delete(id);tx.oncomplete=()=>res();tx.onerror=e=>rej(e.target.error)}))}
function idbGetAllByProject(projectId){
  return openDB().then(db=>new Promise((res,rej)=>{
    const tx=db.transaction(IDB_STORE,'readonly');
    const store=tx.objectStore(IDB_STORE);
    const req=store.getAll();
    req.onsuccess=()=>res((req.result||[]).filter(d=>d.projectId===projectId));
    req.onerror=e=>rej(e.target.error);
  }));
}

function loadData(){

  try{const p=localStorage.getItem(LS_PROJECTS);if(p)projects=JSON.parse(p);else projects=[]}catch(e){projects=[]}
}
function saveBids(){localStorage.setItem(LS_KEY,JSON.stringify(bids))}
function saveBM(){localStorage.setItem(LS_BM,JSON.stringify(bookmarks))}

function resetDemo(){bids=generateDemoBids();bookmarks=[];selectedBid=null;saveBids();saveBM();render()}
function toggleBookmark(id,ev){if(ev)ev.stopPropagation();const i=bookmarks.indexOf(id);if(i>=0)bookmarks.splice(i,1);else bookmarks.push(id);saveBM();render()}

function getFilteredBids(){
  return bids.filter(b=>{
    if(b.status!=='active')return false;
    if(searchTerm){const q=searchTerm.toLowerCase();if(!`${b.name} ${b.agency} ${b.state} ${b.scopeOfWork} ${b.category}`.toLowerCase().includes(q))return false}
    if(filterState&&b.state!==filterState)return false;
    if(filterCategory&&b.category!==filterCategory)return false;
    if(filterMinValue&&b.estimatedValue<Number(filterMinValue))return false;
    if(filterMaxValue&&b.estimatedValue>Number(filterMaxValue))return false;
    if(filterDeadlineDays&&daysUntil(b.deadline)>Number(filterDeadlineDays))return false;
    return true;
  }).sort((a,b)=>new Date(a.deadline)-new Date(b.deadline));
}

function deadlineClass(d){const days=daysUntil(d);if(days<0)return'deadline-urgent';if(days<=7)return'deadline-urgent';if(days<=14)return'deadline-soon';return'deadline-ok'}
function deadlineText(d){const days=daysUntil(d);if(days<0)return'EXPIRED';if(days===0)return'TODAY';if(days===1)return'TOMORROW';return days+' days'}
function esc(s){return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;')}

// --- Calendar ---
function renderCalendar(){
  const first=new Date(calYear,calMonth,1);
  const startDay=first.getDay();
  const daysInMonth=new Date(calYear,calMonth+1,0).getDate();
  const today=new Date();
  const monthNames=['January','February','March','April','May','June','July','August','September','October','November','December'];
  const bidsByDay={};
  bids.filter(function(b){return b.status==='active'}).forEach(function(b){
    const dd=new Date(b.deadline);
    if(dd.getMonth()===calMonth&&dd.getFullYear()===calYear){
      const day=dd.getDate();
      if(!bidsByDay[day])bidsByDay[day]=[];
      bidsByDay[day].push(b);
    }
  });
  let cells='';
  ['Sun','Mon','Tue','Wed','Thu','Fri','Sat'].forEach(function(d){cells+='<div class="cal-cell cal-header">'+d+'</div>'});
  for(let i=0;i<startDay;i++)cells+='<div class="cal-cell"></div>';
  for(let d=1;d<=daysInMonth;d++){
    const isToday=d===today.getDate()&&calMonth===today.getMonth()&&calYear===today.getFullYear();
    const hasBid=bidsByDay[d];
    cells+='<div class="cal-cell cal-day '+(isToday?'today':'')+' '+(hasBid?'has-bid':'')+'" '+(hasBid?'onclick="selectedBid=\''+hasBid[0].id+'\';render()"':'')+'>'+
      '<div style="font-weight:'+(isToday?'700':'400')+';color:'+(isToday?'var(--accent)':'var(--text)')+'">'+d+'</div>'+
      (hasBid?hasBid.map(function(b){return'<div style="font-size:7px;color:'+CAT_COLORS[b.category]+';overflow:hidden;text-overflow:ellipsis;white-space:nowrap;margin-top:2px">'+esc(b.name).slice(0,15)+'</div>'}).join(''):'')+'</div>';
  }
  const sel=bids.find(function(b){return b.id===selectedBid});
  return'<div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:16px">'+
    '<button class="btn btn-sm" onclick="calMonth--;if(calMonth<0){calMonth=11;calYear--};render()">&larr; Prev</button>'+
    '<div style="font-size:16px;font-weight:700;color:var(--accent)">'+monthNames[calMonth]+' '+calYear+'</div>'+
    '<button class="btn btn-sm" onclick="calMonth++;if(calMonth>11){calMonth=0;calYear++};render()">Next &rarr;</button>'+
  '</div>'+
  '<div style="display:flex;gap:16px;flex-wrap:wrap">'+
    '<div style="flex:2;min-width:300px"><div class="cal-grid">'+cells+'</div></div>'+
    (sel?'<div style="flex:1;min-width:300px">'+renderBidDetail(sel)+'</div>':'')+
  '</div>';
}

// --- Stats ---
function renderStats(){
  const active=bids.filter(function(b){return b.status==='active'});
  const closingSoon=active.filter(function(b){const d=daysUntil(b.deadline);return d>=0&&d<=7}).length;
  const totalValue=active.reduce(function(s,b){return s+(Number(b.estimatedValue)||0)},0);
  const avgValue=active.length?totalValue/active.length:0;
  const byCat={};CATEGORIES.forEach(function(c){byCat[c]=active.filter(function(b){return b.category===c}).length});
  const byState={};active.forEach(function(b){byState[b.state]=(byState[b.state]||0)+1});
  const topStates=Object.entries(byState).sort(function(a,b){return b[1]-a[1]}).slice(0,8);
  const maxCat=Math.max.apply(null,Object.values(byCat).concat([1]));
  return'<div style="display:flex;gap:12px;flex-wrap:wrap;margin-bottom:20px">'+
    '<div class="stat-card"><div style="font-size:9px;color:var(--textDim);text-transform:uppercase">Active Bids</div><div style="font-size:28px;font-weight:700;color:var(--accent)">'+active.length+'</div></div>'+
    '<div class="stat-card"><div style="font-size:9px;color:var(--textDim);text-transform:uppercase">Closing This Week</div><div style="font-size:28px;font-weight:700;color:var(--red)">'+closingSoon+'</div></div>'+
    '<div class="stat-card"><div style="font-size:9px;color:var(--textDim);text-transform:uppercase">Total Pipeline Value</div><div style="font-size:28px;font-weight:700;color:var(--green)">'+fmt$(totalValue)+'</div></div>'+
    '<div class="stat-card"><div style="font-size:9px;color:var(--textDim);text-transform:uppercase">Avg Bid Value</div><div style="font-size:28px;font-weight:700;color:var(--text)">'+fmt$(avgValue)+'</div></div>'+
    '<div class="stat-card"><div style="font-size:9px;color:var(--textDim);text-transform:uppercase">Bookmarked</div><div style="font-size:28px;font-weight:700;color:var(--yellow)">'+bookmarks.length+'</div></div>'+
  '</div>'+
  '<div style="display:flex;gap:16px;flex-wrap:wrap">'+
    '<div style="flex:1;min-width:300px;background:var(--bg1);border:1px solid var(--border);border-radius:8px;padding:20px">'+
      '<div style="font-size:11px;color:var(--accent);text-transform:uppercase;letter-spacing:0.1em;margin-bottom:12px">Bids by Category</div>'+
      CATEGORIES.map(function(c){return'<div style="display:flex;align-items:center;gap:8px;margin-bottom:8px">'+
        '<div style="width:70px;font-size:10px;text-transform:capitalize;color:'+CAT_COLORS[c]+'">'+c+'</div>'+
        '<div style="flex:1;height:16px;background:var(--bg2);border-radius:3px;overflow:hidden"><div style="height:100%;width:'+(byCat[c]/maxCat)*100+'%;background:'+CAT_COLORS[c]+';border-radius:3px;transition:width .3s"></div></div>'+
        '<div style="width:24px;text-align:right;font-size:11px;font-weight:700">'+byCat[c]+'</div>'+
      '</div>'}).join('')+
    '</div>'+
    '<div style="flex:1;min-width:300px;background:var(--bg1);border:1px solid var(--border);border-radius:8px;padding:20px">'+
      '<div style="font-size:11px;color:var(--accent);text-transform:uppercase;letter-spacing:0.1em;margin-bottom:12px">Top States</div>'+
      topStates.map(function(entry){return'<div style="display:flex;justify-content:space-between;padding:4px 0;border-bottom:1px solid var(--border);font-size:11px"><span>'+entry[0]+'</span><span style="font-weight:700">'+entry[1]+'</span></div>'}).join('')+
    '</div>'+
  '</div>';
}

function createBid(){
  if(!newBid.name||!newBid.agency||!newBid.deadline)return window.alert('Name, Agency, and Deadline are required.');
  const bid={...newBid,id:'BID-'+Date.now(),estimatedValue:Number(newBid.estimatedValue)||0,documents:newBid.documents?newBid.documents.split(',').map(function(d){return d.trim()}).filter(Boolean):[],postedDate:new Date().toISOString().slice(0,10),status:'active'};
  bids.unshift(bid);saveBids();
  newBid={name:'',agency:'',state:'',category:'general',deadline:'',estimatedValue:'',scopeOfWork:'',dbeRequirement:'',preBidMeeting:'',bondingRequirements:'',contactName:'',contactEmail:'',contactPhone:'',documents:''};
  activeTab='active';render();
}
function archiveBid(id){const b=bids.find(function(b){return b.id===id});if(b){b.status='archived';selectedBid=null;saveBids();render()}}

function toggleRequirement(req){
  const idx=newProject.requirements.indexOf(req);
  if(idx>=0)newProject.requirements.splice(idx,1);
  else newProject.requirements.push(req);
  render();
}

function addCustomRequirement(){
  const val=newProject.customRequirement.trim();
  if(val&&!newProject.requirements.includes(val)){
    newProject.requirements.push(val);
    newProject.customRequirement='';
  }
  render();
}

function removeRequirement(req){
  const idx=newProject.requirements.indexOf(req);
  if(idx>=0)newProject.requirements.splice(idx,1);
  render();
}

function handleDocUpload(ev){
  const files=ev.target.files;
  for(let i=0;i<files.length;i++){
    pendingDocs.push(files[i]);
  }
  render();
}

function handlePhotoUpload(ev){
  const files=ev.target.files;
  for(let i=0;i<files.length;i++){
    pendingPhotos.push(files[i]);
  }
  render();
}

function removePendingDoc(idx){
  pendingDocs.splice(idx,1);
  render();
}

function removePendingPhoto(idx){
  pendingPhotos.splice(idx,1);
  render();
}

function handleDocDrop(ev){
  const files=ev.dataTransfer.files;
  for(let i=0;i<files.length;i++)pendingDocs.push(files[i]);
  render();
}

function handlePhotoDrop(ev){
  const files=ev.dataTransfer.files;
  for(let i=0;i<files.length;i++)pendingPhotos.push(files[i]);
  render();
}

function clearProjectForm(){
  newProject={name:'',description:'',state:'',category:'general',estimatedBudget:'',deadline:'',status:'draft',requirements:[],customRequirement:''};
  pendingDocs=[];
  pendingPhotos=[];
  render();
}

async function submitProject(){
  if(!newProject.name||!newProject.description||!newProject.state||!newProject.deadline){
    return window.alert('Project Name, Description, State, and Deadline are required.');
  }
  const projId='PROJ-'+Date.now();
  const project={
    id:projId,
    name:newProject.name,
    description:newProject.description,
    state:newProject.state,
    category:newProject.category,
    estimatedBudget:Number(newProject.estimatedBudget)||0,
    deadline:newProject.deadline,
    status:newProject.status,
    requirements:[...newProject.requirements],
    documentNames:[],
    photoNames:[],
    bidsReceived:[],
    createdDate:new Date().toISOString().slice(0,10),
    updatedDate:new Date().toISOString().slice(0,10)
  };

  // Store docs in IndexedDB
  for(let i=0;i<pendingDocs.length;i++){
    const f=pendingDocs[i];
    const buf=await f.arrayBuffer();
    const docId=projId+'_doc_'+i+'_'+Date.now();
    await idbPut({id:docId,projectId:projId,type:'document',name:f.name,size:f.size,mimeType:f.type,data:buf});
    project.documentNames.push({id:docId,name:f.name,size:f.size});
  }
  for(let i=0;i<pendingPhotos.length;i++){
    const f=pendingPhotos[i];
    const buf=await f.arrayBuffer();
    const photoId=projId+'_photo_'+i+'_'+Date.now();
    await idbPut({id:photoId,projectId:projId,type:'photo',name:f.name,size:f.size,mimeType:f.type,data:buf});
    project.photoNames.push({id:photoId,name:f.name,size:f.size});
  }

  projects.unshift(project);
  saveProjects();
  clearProjectForm();
  activeTab='my-projects';
  render();
}

// Load photo thumbnails after rendering
function loadPhotoThumbnails(projId){
  const proj=projects.find(function(p){return p.id===projId});
  if(!proj||!(proj.photoNames||[]).length)return;
  const gallery=document.getElementById('photo-gallery-'+projId);
  if(!gallery)return;
  (proj.photoNames||[]).forEach(function(ph){
    idbGet(ph.id).then(function(doc){
      if(doc&&doc.data){
        const blob=new Blob([doc.data],{type:doc.mimeType||'image/jpeg'});
        const url=URL.createObjectURL(blob);
        const img=document.createElement('img');
        img.src=url;
        img.style.cssText='width:80px;height:60px;object-fit:cover;border-radius:4px;border:1px solid var(--border);cursor:pointer';
        img.title=ph.name;
        img.onclick=function(){window.open(url,'_blank')};
        gallery.appendChild(img);
      }
    });
  });
}

async function downloadDoc(docId,fileName){
  const doc=await idbGet(docId);
  if(!doc||!doc.data){window.alert('Document not found in storage.');return}
  const blob=new Blob([doc.data],{type:doc.mimeType||'application/octet-stream'});
  const url=URL.createObjectURL(blob);
  const a=document.createElement('a');
  a.href=url;a.download=fileName;
  document.body.appendChild(a);a.click();document.body.removeChild(a);
  URL.revokeObjectURL(url);
}

async function removeProjectDoc(projId,docId){
  if(!confirm('Remove this document?'))return;
  const proj=projects.find(function(p){return p.id===projId});
  if(!proj)return;
  proj.documentNames=(proj.documentNames||[]).filter(function(d){return d.id!==docId});
  proj.updatedDate=new Date().toISOString().slice(0,10);
  saveProjects();
  await idbDelete(docId);
  render();
}

async function removeProjectPhoto(projId,photoId){
  if(!confirm('Remove this photo?'))return;
  const proj=projects.find(function(p){return p.id===projId});
  if(!proj)return;
  proj.photoNames=(proj.photoNames||[]).filter(function(d){return d.id!==photoId});
  proj.updatedDate=new Date().toISOString().slice(0,10);
  saveProjects();
  await idbDelete(photoId);
  render();
}

async function addDocsToProject(projId,ev){
  const proj=projects.find(function(p){return p.id===projId});
  if(!proj)return;
  const files=ev.target.files;
  for(let i=0;i<files.length;i++){
    const f=files[i];
    const buf=await f.arrayBuffer();
    const docId=projId+'_doc_'+Date.now()+'_'+i;
    await idbPut({id:docId,projectId:projId,type:'document',name:f.name,size:f.size,mimeType:f.type,data:buf});
    if(!proj.documentNames)proj.documentNames=[];
    proj.documentNames.push({id:docId,name:f.name,size:f.size});
  }
  proj.updatedDate=new Date().toISOString().slice(0,10);
  saveProjects();
  render();
}

async function addPhotosToProject(projId,ev){
  const proj=projects.find(function(p){return p.id===projId});
  if(!proj)return;
  const files=ev.target.files;
  for(let i=0;i<files.length;i++){
    const f=files[i];
    const buf=await f.arrayBuffer();
    const photoId=projId+'_photo_'+Date.now()+'_'+i;
    await idbPut({id:photoId,projectId:projId,type:'photo',name:f.name,size:f.size,mimeType:f.type,data:buf});
    if(!proj.photoNames)proj.photoNames=[];
    proj.photoNames.push({id:photoId,name:f.name,size:f.size});
  }
  proj.updatedDate=new Date().toISOString().slice(0,10);
  saveProjects();
  render();
}

function changeProjectStatus(projId,newStatus){
  const proj=projects.find(function(p){return p.id===projId});
  if(!proj)return;
  proj.status=newStatus;
  proj.updatedDate=new Date().toISOString().slice(0,10);
  saveProjects();
  render();
}

async function deleteProject(projId){
  if(!confirm('Delete this project and all associated documents? This cannot be undone.'))return;
  const proj=projects.find(function(p){return p.id===projId});
  if(proj){
    // Delete docs from IndexedDB
    const allDocs=(proj.documentNames||[]).concat(proj.photoNames||[]);
    for(let i=0;i<allDocs.length;i++){
      await idbDelete(allDocs[i].id);
    }
  }
  projects=projects.filter(function(p){return p.id!==projId});
  saveProjects();
  viewingProjectId=null;
  render();
}

}

function renderModal(){
  if(!editingProject){document.getElementById('modal-root').innerHTML='';return}
  const p=editingProject;
  document.getElementById('modal-root').innerHTML=
    '<div class="modal-overlay" onclick="if(event.target===this)closeModal()">'+
      '<div class="modal">'+
        '<div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:20px">'+
          '<div style="font-size:14px;font-weight:700;color:var(--accent);text-transform:uppercase;letter-spacing:1px">Edit Project</div>'+
          '<button class="btn btn-sm" onclick="closeModal()">&times; Close</button>'+
        '</div>'+
        '<div class="row"><div class="field"><div class="label">Project Name</div><input class="input" value="'+esc(p.name)+'" oninput="editingProject.name=this.value"></div></div>'+
        '<div class="row"><div class="field"><div class="label">Description</div><textarea class="textarea" oninput="editingProject.description=this.value">'+esc(p.description)+'</textarea></div></div>'+
        '<div class="row">'+
          '<div class="field"><div class="label">State</div><select class="select" style="width:100%" onchange="editingProject.state=this.value"><option value="">Select</option>'+STATES.map(function(s){return'<option value="'+s+'" '+(p.state===s?'selected':'')+'>'+s+'</option>'}).join('')+'</select></div>'+
          '<div class="field"><div class="label">Category</div><select class="select" style="width:100%" onchange="editingProject.category=this.value">'+CATEGORIES.map(function(c){return'<option value="'+c+'" '+(p.category===c?'selected':'')+'>'+c+'</option>'}).join('')+'</select></div>'+
        '</div>'+
        '<div class="row">'+
          '<div class="field"><div class="label">Estimated Budget ($)</div><input class="input" type="number" value="'+p.estimatedBudget+'" oninput="editingProject.estimatedBudget=this.value"></div>'+
          '<div class="field"><div class="label">Deadline</div><input class="input" type="date" value="'+p.deadline+'" onchange="editingProject.deadline=this.value"></div>'+
        '</div>'+
        '<div class="row"><div class="field"><div class="label">Status</div><select class="select" style="width:100%" onchange="editingProject.status=this.value">'+PROJECT_STATUSES.map(function(s){return'<option value="'+s+'" '+(p.status===s?'selected':'')+'>'+STATUS_LABELS[s]+'</option>'}).join('')+'</select></div></div>'+
        '<div style="margin-top:16px;display:flex;gap:8px">'+
          '<button class="btn btn-primary" onclick="saveEditProject()">Save Changes</button>'+
          '<button class="btn" onclick="closeModal()">Cancel</button>'+
        '</div>'+
      '</div>'+
    '</div>';
}

function saveEditProject(){
  if(!editingProject)return;
  const idx=projects.findIndex(function(p){return p.id===editingProject.id});
  if(idx<0)return;
  projects[idx].name=editingProject.name;
  projects[idx].description=editingProject.description;
  projects[idx].state=editingProject.state;
  projects[idx].category=editingProject.category;
  projects[idx].estimatedBudget=Number(editingProject.estimatedBudget)||0;
  projects[idx].deadline=editingProject.deadline;
  projects[idx].status=editingProject.status;
  projects[idx].updatedDate=new Date().toISOString().slice(0,10);
  saveProjects();
  closeModal();
  render();
}

// --- Add Bid Modal ---
let addBidTarget=null;
let addBidData={bidder:'',amount:'',date:'',notes:''};

function openAddBidModal(projId){
  addBidTarget=projId;
  addBidData={bidder:'',amount:'',date:new Date().toISOString().slice(0,10),notes:''};
  renderAddBidModal();
}

function closeAddBidModal(){
  addBidTarget=null;
  document.getElementById('modal-root').innerHTML='';
}

function renderAddBidModal(){
  if(!addBidTarget){document.getElementById('modal-root').innerHTML='';return}
  document.getElementById('modal-root').innerHTML=
    '<div class="modal-overlay" onclick="if(event.target===this)closeAddBidModal()">'+
      '<div class="modal" style="max-width:500px">'+
        '<div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:20px">'+
          '<div style="font-size:14px;font-weight:700;color:var(--accent);text-transform:uppercase;letter-spacing:1px">Record Bid Received</div>'+
          '<button class="btn btn-sm" onclick="closeAddBidModal()">&times; Close</button>'+
        '</div>'+
        '<div class="row"><div class="field"><div class="label">Bidder / Company *</div><input class="input" value="'+esc(addBidData.bidder)+'" oninput="addBidData.bidder=this.value"></div></div>'+
        '<div class="row">'+
          '<div class="field"><div class="label">Bid Amount ($) *</div><input class="input" type="number" value="'+addBidData.amount+'" oninput="addBidData.amount=this.value"></div>'+
          '<div class="field"><div class="label">Date</div><input class="input" type="date" value="'+addBidData.date+'" onchange="addBidData.date=this.value"></div>'+
        '</div>'+
        '<div class="row"><div class="field"><div class="label">Notes</div><textarea class="textarea" oninput="addBidData.notes=this.value">'+esc(addBidData.notes)+'</textarea></div></div>'+
        '<div style="margin-top:16px;display:flex;gap:8px">'+
          '<button class="btn btn-primary" onclick="saveReceivedBid()">Save Bid</button>'+
          '<button class="btn" onclick="closeAddBidModal()">Cancel</button>'+
        '</div>'+
      '</div>'+
    '</div>';
}

function saveReceivedBid(){
  if(!addBidData.bidder||!addBidData.amount){window.alert('Bidder and Amount are required.');return}
  const proj=projects.find(function(p){return p.id===addBidTarget});
  if(!proj)return;
  if(!proj.bidsReceived)proj.bidsReceived=[];
  proj.bidsReceived.push({
    id:'RBID-'+Date.now(),
    bidder:addBidData.bidder,
    amount:Number(addBidData.amount)||0,
    date:addBidData.date||new Date().toISOString().slice(0,10),
    notes:addBidData.notes
  });
  proj.updatedDate=new Date().toISOString().slice(0,10);
  saveProjects();
  closeAddBidModal();
  render();
}

// --- Main render ---
function render(){
  renderTabs();
  const app=document.getElementById('app');
  switch(activeTab){
    case'active':app.innerHTML=renderActiveBids();break;
    case'my-bids':app.innerHTML=renderMyBids();break;
    case'calendar':app.innerHTML=renderCalendar();break;
    case'stats':app.innerHTML=renderStats();break;
    case'create':app.innerHTML=renderCreateBid();break;
    case'upload':app.innerHTML=renderUploadProject();break;
    case'my-projects':app.innerHTML=renderMyProjects();break;
  }
  // Load photo thumbnails if viewing a project detail
  if(activeTab==='my-projects'&&viewingProjectId){
    loadPhotoThumbnails(viewingProjectId);
  }
}
loadData();render();
</script>
