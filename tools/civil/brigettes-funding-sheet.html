<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">

<title>Brigette's Funding Sheet | Korb Engineering</title>
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{
  --bg:#050a0f;--bg1:#0a1018;--bg2:#0f1620;--card:#0c1219;
  --border:#1a2a3a;--border2:#22364c;
  --accent:#00d4ff;--accent2:#66e6ff;
  --orange:#ff9900;--green:#10b981;--red:#ef4444;--yellow:#fbbf24;--purple:#a78bfa;--pink:#ec4899;
  --text:#e2e8f0;--textDim:rgba(226,232,240,0.55);--textMuted:rgba(226,232,240,0.30);
  --font:'IBM Plex Mono',ui-monospace,SFMono-Regular,Menlo,monospace;
}
html,body{height:100%}
body{background:var(--bg);color:var(--text);font-family:var(--font);min-height:100vh;font-size:13px;line-height:1.4}
body::before{content:'';position:fixed;inset:0;background:
  radial-gradient(ellipse 800px 400px at 10% -10%,rgba(0,212,255,0.05),transparent 70%),
  radial-gradient(ellipse 600px 300px at 110% 110%,rgba(255,153,0,0.04),transparent 70%);
  pointer-events:none;z-index:0}
input,select,button,textarea{font-family:var(--font);font-size:13px;color:var(--text)}
input[type="number"],input[type="text"],input[type="date"],select,textarea{
  background:var(--bg2);border:1px solid var(--border);color:var(--text);
  padding:6px 8px;border-radius:3px;width:100%;outline:none;font-size:16px;
  font-variant-numeric:tabular-nums;min-height:32px}
@media(min-width:900px){input[type="number"],input[type="text"],input[type="date"],select,textarea{font-size:13px;min-height:28px}}
input:focus,select:focus,textarea:focus{border-color:var(--accent);box-shadow:0 0 0 1px rgba(0,212,255,0.3)}
input:read-only,input[readonly]{background:transparent;color:var(--textDim);border-color:transparent}
.nav{position:sticky;top:0;z-index:100;background:linear-gradient(180deg,var(--bg1),var(--bg2));border-bottom:1px solid var(--border);
  padding:8px 14px;display:flex;align-items:center;gap:10px;flex-wrap:wrap;min-height:44px}
.nav a.back{color:var(--accent);text-decoration:none;font-size:11px;letter-spacing:0.1em;padding:6px 10px;border:1px solid var(--border);border-radius:3px;min-height:32px;display:inline-flex;align-items:center}
.nav a.back:hover{border-color:var(--accent);background:rgba(0,212,255,0.06)}
.nav .title{font-size:13px;font-weight:700;color:var(--accent);letter-spacing:0.12em;text-shadow:0 0 12px rgba(0,212,255,0.3);text-transform:uppercase}
.nav .sub{font-size:9px;color:var(--textDim);letter-spacing:0.18em;text-transform:uppercase}
.nav .spacer{flex:1 1 auto}
.btn{background:transparent;border:1px solid var(--border);color:var(--textDim);font-size:10px;
  padding:7px 12px;border-radius:3px;cursor:pointer;letter-spacing:0.1em;text-transform:uppercase;
  transition:all 0.15s;min-height:36px;white-space:nowrap}
.btn:hover{border-color:var(--accent);color:var(--accent);background:rgba(0,212,255,0.05)}
.btn-accent{background:var(--accent);color:#000;border-color:var(--accent);font-weight:700}
.btn-accent:hover{background:var(--accent2);color:#000}
.btn-green{border-color:var(--green);color:var(--green)}
.btn-green:hover{background:rgba(16,185,129,0.08)}
.btn-red{border-color:var(--red);color:var(--red)}
.btn-red:hover{background:rgba(239,68,68,0.08)}
.btn-orange{border-color:var(--orange);color:var(--orange)}
.btn-orange:hover{background:rgba(255,153,0,0.08)}
.btn-ghost{border-color:transparent;color:var(--textDim);padding:4px 8px;min-height:28px}
.btn-ghost:hover{color:var(--accent);border-color:var(--border)}
.btn-sm{font-size:9px;padding:4px 8px;min-height:26px;letter-spacing:0.06em}
.content{max-width:1500px;margin:0 auto;padding:12px;position:relative;z-index:1}
.tabs{display:flex;gap:0;padding:0 12px;border-bottom:1px solid var(--border);overflow-x:auto;-webkit-overflow-scrolling:touch;position:sticky;top:44px;background:var(--bg);z-index:90}
@media(min-width:900px){.tabs{top:53px}}
.tab{padding:9px 14px;background:transparent;border:1px solid var(--border);border-bottom:none;color:var(--textDim);
  font-size:10px;cursor:pointer;letter-spacing:0.1em;text-transform:uppercase;border-radius:4px 4px 0 0;
  white-space:nowrap;flex-shrink:0;margin-right:-1px;min-height:36px;display:flex;align-items:center;gap:6px}
.tab.active{background:var(--bg2);border-color:var(--accent);color:var(--accent)}
.tab:hover:not(.active){color:var(--text)}
.tab .badge{background:var(--bg);color:var(--accent);padding:1px 5px;border-radius:2px;font-size:9px}
.tab .badge.warn{color:var(--red);background:rgba(239,68,68,0.1)}
.card{background:var(--card);border:1px solid var(--border);border-radius:6px;padding:14px;margin-bottom:12px;position:relative}
.card-title{font-size:10px;color:var(--accent);letter-spacing:0.14em;text-transform:uppercase;margin-bottom:12px;
  display:flex;align-items:center;gap:8px;font-weight:600}
.card-title .line{flex:1;height:1px;background:linear-gradient(90deg,var(--border),transparent)}
.card-title .pill{background:var(--bg2);border:1px solid var(--border);padding:2px 6px;border-radius:2px;font-size:9px;color:var(--textDim)}
.card-sub{font-size:10px;color:var(--textDim);letter-spacing:0.1em;text-transform:uppercase;margin-bottom:10px}
.grid{display:grid;gap:10px}
.g2{grid-template-columns:repeat(auto-fit,minmax(200px,1fr))}
.g3{grid-template-columns:repeat(auto-fit,minmax(180px,1fr))}
.g4{grid-template-columns:repeat(auto-fit,minmax(150px,1fr))}
.fg{display:flex;flex-direction:column;gap:4px}
.fg label{font-size:10px;color:var(--textDim);text-transform:uppercase;letter-spacing:0.08em}
.fg .hint{font-size:9px;color:var(--textMuted);letter-spacing:0.05em}
.overflow-x{overflow-x:auto;-webkit-overflow-scrolling:touch;margin:0 -14px;padding:0 14px}
table{width:100%;border-collapse:collapse;font-variant-numeric:tabular-nums}
th{padding:8px 6px;border-bottom:2px solid var(--border2);font-size:9px;color:var(--textDim);
  text-transform:uppercase;letter-spacing:0.08em;text-align:left;white-space:nowrap;
  position:sticky;top:0;background:var(--card);z-index:5}
td{padding:4px 6px;border-bottom:1px solid var(--border);font-size:12px;vertical-align:middle}
tr:hover td{background:rgba(0,212,255,0.03)}
.tnum{text-align:right;font-variant-numeric:tabular-nums;white-space:nowrap}
.tnum input{text-align:right}
.td-tight input{padding:3px 6px;min-height:24px}
.section-row td{background:var(--bg1);font-weight:700;color:var(--accent);font-size:10px;text-transform:uppercase;letter-spacing:0.1em;padding:6px 8px}
.total-row td{background:rgba(0,212,255,0.04);border-top:2px solid var(--border2);font-weight:700}
.grand-row td{background:rgba(0,212,255,0.08);border-top:2px solid var(--accent);font-weight:700;font-size:13px;color:var(--accent)}
.chip{display:inline-block;padding:2px 6px;border-radius:2px;font-size:9px;letter-spacing:0.08em;text-transform:uppercase;font-weight:600}
.chip-green{background:rgba(16,185,129,0.12);color:var(--green);border:1px solid rgba(16,185,129,0.3)}
.chip-orange{background:rgba(255,153,0,0.12);color:var(--orange);border:1px solid rgba(255,153,0,0.3)}
.chip-cyan{background:rgba(0,212,255,0.12);color:var(--accent);border:1px solid rgba(0,212,255,0.3)}
.chip-red{background:rgba(239,68,68,0.12);color:var(--red);border:1px solid rgba(239,68,68,0.3)}
.chip-purple{background:rgba(167,139,250,0.12);color:var(--purple);border:1px solid rgba(167,139,250,0.3)}
.chip-yellow{background:rgba(251,191,36,0.12);color:var(--yellow);border:1px solid rgba(251,191,36,0.3)}
.chip-pink{background:rgba(236,72,153,0.12);color:var(--pink);border:1px solid rgba(236,72,153,0.3)}
.chip-gray{background:rgba(226,232,240,0.08);color:var(--textDim);border:1px solid var(--border)}
.flag-red{color:var(--red);font-weight:700}
.flag-green{color:var(--green);font-weight:600}
.flag-dim{color:var(--textMuted)}
.bar{height:6px;background:var(--bg2);border-radius:3px;overflow:hidden;display:flex}
.bar>span{height:100%;display:block}
.kpi-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(140px,1fr));gap:8px;margin-bottom:12px}
.kpi{background:var(--card);border:1px solid var(--border);border-radius:5px;padding:10px;position:relative;overflow:hidden}
.kpi-bar{position:absolute;top:0;left:0;right:0;height:2px;background:var(--accent)}
.kpi-label{font-size:9px;color:var(--textDim);letter-spacing:0.1em;text-transform:uppercase;margin-bottom:4px}
.kpi-value{font-size:18px;font-weight:700;color:var(--text);font-variant-numeric:tabular-nums}
.kpi-sub{font-size:9px;color:var(--textMuted);margin-top:3px;letter-spacing:0.05em}
.banner{padding:10px 14px;border-radius:4px;margin-bottom:12px;font-size:11px;display:flex;align-items:center;gap:10px;flex-wrap:wrap}
.banner.ok{background:rgba(16,185,129,0.08);border:1px solid rgba(16,185,129,0.3);color:var(--green)}
.banner.warn{background:rgba(239,68,68,0.08);border:1px solid rgba(239,68,68,0.3);color:var(--red)}
.banner.info{background:rgba(0,212,255,0.06);border:1px solid rgba(0,212,255,0.2);color:var(--accent)}
.banner .dot{width:8px;height:8px;border-radius:50%;display:inline-block;background:currentColor;flex-shrink:0}
.matrix-table th,.matrix-table td{padding:4px 3px;text-align:center;font-size:10px}
.matrix-table th:first-child,.matrix-table td:first-child{text-align:left}
.matrix-table td input[type="checkbox"]{width:16px;height:16px;accent-color:var(--accent);cursor:pointer}
.matrix-table td input[type="number"]{max-width:80px;text-align:right}
.src-pill{display:inline-flex;align-items:center;gap:6px;padding:3px 8px;border-radius:12px;font-size:10px;font-weight:600;letter-spacing:0.04em}
.src-dot{width:10px;height:10px;border-radius:50%;display:inline-block;flex-shrink:0}
.legend{display:flex;flex-wrap:wrap;gap:10px;margin:8px 0;font-size:10px}
.legend-item{display:flex;align-items:center;gap:6px}
.pie-wrap{display:grid;grid-template-columns:1fr 1fr;gap:14px;align-items:center}
@media(max-width:700px){.pie-wrap{grid-template-columns:1fr}}
.pie-legend{display:flex;flex-direction:column;gap:6px;font-size:11px}
.pie-legend-row{display:flex;justify-content:space-between;gap:8px;padding:4px 8px;background:var(--bg2);border-radius:3px;border-left:3px solid}
select option{background:var(--bg2);color:var(--text)}
.modal-bg{position:fixed;inset:0;background:rgba(0,0,0,0.75);backdrop-filter:blur(4px);display:none;align-items:center;justify-content:center;z-index:1000;padding:16px}
.modal-bg.active{display:flex}
.modal{background:var(--card);border:1px solid var(--accent);border-radius:8px;padding:18px;max-width:600px;width:100%;max-height:90vh;overflow:auto}
.modal-title{font-size:12px;color:var(--accent);letter-spacing:0.12em;text-transform:uppercase;margin-bottom:14px;font-weight:700}
.drop-zone{border:2px dashed var(--border);border-radius:5px;padding:20px;text-align:center;font-size:11px;color:var(--textDim);margin:10px 0;cursor:pointer}
.drop-zone:hover,.drop-zone.drag{border-color:var(--accent);color:var(--accent);background:rgba(0,212,255,0.03)}
.mini-tab{display:inline-flex;padding:2px;background:var(--bg2);border:1px solid var(--border);border-radius:3px;margin-bottom:8px}
.mini-tab button{background:transparent;border:none;color:var(--textDim);padding:4px 10px;font-size:10px;letter-spacing:0.06em;text-transform:uppercase;cursor:pointer;border-radius:2px}
.mini-tab button.active{background:var(--accent);color:#000;font-weight:700}
.help{font-size:10px;color:var(--textDim);line-height:1.5;margin-top:6px}
.help code{background:var(--bg2);padding:1px 4px;border-radius:2px;color:var(--orange);font-size:10px}
.delta-pos{color:var(--green)}
.delta-neg{color:var(--red)}
.row-err{background:rgba(239,68,68,0.06)!important}
.row-err td:first-child{border-left:3px solid var(--red)}
.row-warn{background:rgba(251,191,36,0.04)!important}
.pay-period-tabs{display:flex;gap:4px;padding:6px 0;flex-wrap:wrap}
.pp-tab{padding:5px 10px;background:var(--bg2);border:1px solid var(--border);font-size:10px;letter-spacing:0.08em;border-radius:3px;cursor:pointer;color:var(--textDim);min-height:32px;display:inline-flex;align-items:center;gap:5px}
.pp-tab:hover{color:var(--accent);border-color:var(--accent)}
.pp-tab.active{background:var(--accent);color:#000;font-weight:700;border-color:var(--accent)}
.pp-tab .x{opacity:0.5;cursor:pointer;padding:0 2px;margin-left:2px}
.pp-tab .x:hover{opacity:1;color:var(--red)}
.color-swatch{width:24px;height:24px;border-radius:4px;border:1px solid var(--border);cursor:pointer;display:inline-block;flex-shrink:0}
.color-picker-grid{display:grid;grid-template-columns:repeat(8,1fr);gap:4px;max-width:240px}
.color-option{width:24px;height:24px;border-radius:3px;cursor:pointer;border:2px solid transparent}
.color-option:hover{border-color:var(--text)}
.color-option.selected{border-color:#fff;box-shadow:0 0 0 2px var(--accent)}
.projects-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(260px,1fr));gap:10px}
.project-card{background:var(--bg2);border:1px solid var(--border);border-radius:5px;padding:12px;cursor:pointer;transition:all 0.15s}
.project-card:hover{border-color:var(--accent);background:var(--bg1)}
.project-card.active{border-color:var(--accent);background:rgba(0,212,255,0.04);box-shadow:inset 0 0 0 1px var(--accent)}
.project-card h4{font-size:12px;color:var(--text);margin-bottom:4px;font-weight:600}
.project-card .meta{font-size:10px;color:var(--textDim);display:flex;flex-direction:column;gap:2px}
.project-card .actions{display:flex;gap:4px;margin-top:8px}
.section-hd{background:linear-gradient(90deg,rgba(0,212,255,0.08),transparent);padding:6px 10px;border-left:3px solid var(--accent);margin:10px 0 6px;font-size:10px;letter-spacing:0.14em;text-transform:uppercase;color:var(--accent);font-weight:700}
.split-marker{font-size:9px;color:var(--orange);letter-spacing:0.05em;padding:1px 4px;background:rgba(255,153,0,0.1);border-radius:2px;margin-left:4px}
.tiny-badge{font-size:8px;background:var(--bg2);padding:1px 4px;border-radius:2px;color:var(--textDim);border:1px solid var(--border);margin-left:4px}
.print-wrap{display:none}
.qc-cell{font-size:10px;display:flex;align-items:center;gap:4px;justify-content:flex-end}
.qc-ok{color:var(--green)}
.qc-err{color:var(--red);font-weight:700}
.qc-warn{color:var(--yellow)}
.scroll-shadow{position:relative}
.scroll-shadow::after{content:'';position:absolute;top:0;right:0;bottom:0;width:20px;background:linear-gradient(90deg,transparent,var(--card));pointer-events:none;opacity:0.6}
.footer{text-align:center;padding:30px 12px 20px;color:var(--textMuted);font-size:10px;letter-spacing:0.15em;text-transform:uppercase}
.footer a{color:var(--textDim);text-decoration:none}
.sig{position:fixed;bottom:8px;right:10px;font-size:9px;color:var(--accent);opacity:0.4;pointer-events:none;z-index:9999;letter-spacing:0.1em}
@media(max-width:700px){
  .nav .sub,.nav .title-long{display:none}
  .card{padding:10px}
  th,td{padding:4px 4px;font-size:11px}
  .kpi-value{font-size:15px}
}
/* PRINT VIEW */
@media print{
  @page{size:letter landscape;margin:0.35in}
  body{background:#fff!important;color:#000!important}
  body::before{display:none!important}

  .content{max-width:none!important;padding:0!important;margin:0!important}

  table{font-size:9px!important}

  th{background:#eee!important;font-weight:700!important}
  .section-row td{background:#ddd!important;color:#000!important;font-weight:700!important}
  .total-row td,.grand-row td{background:#e0e0e0!important;color:#000!important;font-weight:700!important}
  .chip,.src-pill{color:#000!important;border:0.5px solid #888!important;background:#f4f4f4!important}

  .print-wrap{display:block!important}

}
.print-only{display:none}
</style>

<script>
/* ============================================================
   BRIGETTE'S FUNDING SHEET
   Named for a legendary civil PM who catches contractor
   rounding errors on the 5th decimal.
   ============================================================ */

const LS_KEY='korb_funding_active';
const LS_LIST='korb_funding_projects';
const VERSION='1.0.0';

/* Source color palette */
const SRC_COLORS=[
  {name:'FAA Cyan',hex:'#00d4ff'},
  {name:'TxDOT Orange',hex:'#ff9900'},
  {name:'ODAA Green',hex:'#10b981'},
  {name:'Local Purple',hex:'#a78bfa'},
  {name:'Federal Yellow',hex:'#fbbf24'},
  {name:'State Pink',hex:'#ec4899'},
  {name:'Grant Red',hex:'#ef4444'},
  {name:'Match Blue',hex:'#3b82f6'},
  {name:'Sponsor Teal',hex:'#14b8a6'},
  {name:'Mint',hex:'#22c55e'},
  {name:'Amber',hex:'#f59e0b'},
  {name:'Rose',hex:'#f43f5e'},
  {name:'Lime',hex:'#84cc16'},
  {name:'Sky',hex:'#0ea5e9'},
  {name:'Violet',hex:'#8b5cf6'},
  {name:'Slate',hex:'#64748b'}
];

/* ── Utilities ── */
const $=s=>document.querySelector(s);
const $$=s=>document.querySelectorAll(s);
const el=(t,a={},c=[])=>{const e=document.createElement(t);for(const k in a){if(k==='class')e.className=a[k];else if(k==='html')e.innerHTML=a[k];else if(k.startsWith('on'))e.addEventListener(k.slice(2),a[k]);else e.setAttribute(k,a[k])}for(const ch of [].concat(c)){if(ch==null)continue;e.appendChild(typeof ch==='string'?document.createTextNode(ch):ch)}return e};
function uid(){return Date.now().toString(36)+Math.random().toString(36).slice(2,8)}
function money(v,dec=2){if(v==null||isNaN(v))return'$0.00';const s=v<0?'-':'';const a=Math.abs(v);return s+'$'+a.toLocaleString('en-US',{minimumFractionDigits:dec,maximumFractionDigits:dec})}
function moneyShort(v){if(v==null||isNaN(v))return'$0';const s=v<0?'-':'';const a=Math.abs(v);if(a>=1e6)return s+'$'+(a/1e6).toFixed(2)+'M';if(a>=1e3)return s+'$'+(a/1e3).toFixed(1)+'K';return s+'$'+a.toFixed(0)}
function pct(v,d=1){if(v==null||isNaN(v))return'0.0%';return v.toFixed(d)+'%'}
function num(v,d=2){if(v==null||isNaN(v))return(0).toFixed(d);return v.toLocaleString('en-US',{minimumFractionDigits:d,maximumFractionDigits:d})}
function num0(v){return num(v,0)}
function round2(v){return Math.round((+v||0)*100)/100}
function round5(v){return Math.round((+v||0)*1e5)/1e5}
function clamp(v,a,b){return Math.max(a,Math.min(b,v))}
function escapeHtml(s){if(s==null)return'';return(''+s).replace(/[&<>"']/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]))}

/* ── Persistence ── */
function loadAll(){
  try{projects=JSON.parse(localStorage.getItem(LS_LIST))||[]}catch{projects=[]}
  let activeId=null;
  try{const a=JSON.parse(localStorage.getItem(LS_KEY));if(a&&a.id)activeId=a.id}catch{}
  if(activeId){project=projects.find(p=>p.id===activeId)||null}
  if(!project&&projects.length)project=projects[0];
  if(!project){project=blankProject();projects.push(project)}
  saveAll();
}
function saveAll(){
  if(project){project.modified=new Date().toISOString();
    const idx=projects.findIndex(p=>p.id===project.id);
    if(idx>=0)projects[idx]=project; else projects.push(project);
    localStorage.setItem(LS_KEY,JSON.stringify({id:project.id}));
  }
  localStorage.setItem(LS_LIST,JSON.stringify(projects));
}

/* ── Pay App helpers ── */
function currentPayApp(){
  if(!project||!project.payApps||!project.payApps.length)return null;
  let pp=project.payApps.find(p=>p.id===project.activePayApp);
  if(!pp){pp=project.payApps[project.payApps.length-1];project.activePayApp=pp.id}
  return pp;
}
function addPayApp(){
  const n=(project.payApps||[]).length+1;
  const pp={
    id:uid(),
    number:String(n),
    periodStart:todayISO(),
    periodEnding:todayISO(),
    submittedDate:'',
    notes:'',
    quantities:{} // {bidItemId: {qty, cost, override}}
  };
  project.payApps.push(pp);
  project.activePayApp=pp.id;
  return pp;
}
function payAppIndex(pp){return project.payApps.indexOf(pp)}
function earlierPayApps(pp){
  const idx=payAppIndex(pp);
  return project.payApps.slice(0,idx);
}

/* ── Calc helpers ── */
function bidItemTotal(bi){return round2((+bi.qty||0)*(+bi.unitPrice||0))}

function qtyThroughPayApp(bi,pp){
  // Sum this period and all earlier
  let total=0;
  const idx=payAppIndex(pp);
  for(let i=0;i<=idx;i++){
    const p=project.payApps[i];
    if(!p)continue;
    const q=p.quantities?.[bi.id]?.qty;
    total+=(+q||0);
  }
  return total;
}
function costThroughPayApp(bi,pp){
  let total=0;
  const idx=payAppIndex(pp);
  for(let i=0;i<=idx;i++){
    const p=project.payApps[i];
    if(!p)continue;
    const c=p.quantities?.[bi.id]?.cost;
    total+=(+c||0);
  }
  return total;
}
function qtyPrevious(bi,pp){
  let total=0;
  const idx=payAppIndex(pp);
  for(let i=0;i<idx;i++){
    const p=project.payApps[i];
    if(!p)continue;
    total+=(+(p.quantities?.[bi.id]?.qty)||0);
  }
  return total;
}
function costPrevious(bi,pp){
  let total=0;
  const idx=payAppIndex(pp);
  for(let i=0;i<idx;i++){
    const p=project.payApps[i];
    if(!p)continue;
    total+=(+(p.quantities?.[bi.id]?.cost)||0);
  }
  return total;
}
function qtyThisPeriod(bi,pp){
  return +(pp?.quantities?.[bi.id]?.qty)||0;
}
function costThisPeriod(bi,pp){
  // If override flag set, use entered cost; else compute qty * unit price
  const rec=pp?.quantities?.[bi.id];
  if(!rec)return 0;
  if(rec.override){return +rec.cost||0}
  // Allow stored cost (contractor-entered) and compute the canonical
  return +rec.cost||round2((+rec.qty||0)*(+bi.unitPrice||0));
}
function costThisPeriodCanonical(bi,pp){
  const q=qtyThisPeriod(bi,pp);
  return round2(q*(+bi.unitPrice||0));
}

/* QC delta: |entered cost - (qty × unit)| */
function qcDelta(bi,pp){
  const rec=pp?.quantities?.[bi.id];
  if(!rec)return 0;
  const entered=+rec.cost||0;
  const canonical=round2((+rec.qty||0)*(+bi.unitPrice||0));
  if(entered===0 && (+rec.qty||0)===0)return 0;
  return round5(entered-canonical);
}
function qcThreshold(){return 0.01} // flag anything >1 cent diff

/* Source applies to bid item? */
function sourceApplies(src,biId){
  return !!(src.appliesTo && src.appliesTo[biId]);
}

/* Allocate this-period cost to funding sources (proportional among applicable) */
function allocateToSources(bi,thisPeriodCost){
  const apps=project.sources.filter(s=>sourceApplies(s,bi.id));
  if(!apps.length)return [];
  // If fixed weights exist, use those. Else equal split.
  // Per-bid-item weighting is stored on the source (appliesTo[biId]=weight (0-1) OR true)
  let weights=apps.map(s=>{
    const v=s.appliesTo[bi.id];
    if(v===true)return 1;
    if(typeof v==='number')return v;
    return 1;
  });
  const wsum=weights.reduce((a,b)=>a+b,0)||1;
  weights=weights.map(w=>w/wsum);
  return apps.map((s,i)=>({source:s,amount:round2(thisPeriodCost*weights[i]),weight:weights[i]}));
}

/* ── Rendering ── */
function render(){
  renderTabs();
  renderContent();
  renderPrint();
  saveAll();
}

function renderTabs(){
  const tabs=[
    {id:'setup',label:'1. Setup',icon:'SET'},
    {id:'sources',label:'2. Funding Sources',icon:'SRC'},
    {id:'bid',label:'3. Bid Items',icon:'BID'},
    {id:'nonconstruction',label:'4. Non-Construction',icon:'NC'},
    {id:'payapps',label:'5. Pay Apps',icon:'PP'},
    {id:'dashboard',label:'6. Split Dashboard',icon:'DB'},
    {id:'qc',label:'7. QC Summary',icon:'QC'},
    {id:'projects',label:'Projects',icon:'P'}
  ];
  const t=$('#tabs');t.innerHTML='';
  const qcCount=countQcIssues();
  for(const tb of tabs){
    const c=el('div',{class:'tab'+(activeTab===tb.id?' active':''),onclick:()=>{activeTab=tb.id;render()}});
    c.textContent=tb.label;
    if(tb.id==='qc'&&qcCount>0){
      c.appendChild(el('span',{class:'badge warn'},String(qcCount)));
    }
    if(tb.id==='bid'&&project.bidItems.length){
      c.appendChild(el('span',{class:'badge'},String(project.bidItems.length)));
    }
    if(tb.id==='payapps'&&project.payApps.length){
      c.appendChild(el('span',{class:'badge'},String(project.payApps.length)));
    }
    t.appendChild(c);
  }
}

function countQcIssues(){
  if(!project)return 0;
  let n=0;
  for(const pp of project.payApps||[]){
    for(const bi of project.bidItems||[]){
      if(Math.abs(qcDelta(bi,pp))>qcThreshold())n++;
    }
  }
  return n;
}

  const c=$('#content');c.innerHTML='';
  const map={

    nonconstruction:renderNonConstruction, payapps:renderPayApps,

}

function fieldInput(label,type,val,onChange){
  const fg=el('div',{class:'fg'});

  const inp=el('input',{type,value:val==null?'':val});

  fg.appendChild(inp);
  return fg;
}
function fieldNumber(label,val,onChange,{step='0.01',placeholder='0.00'}={}){
  const fg=el('div',{class:'fg'});
  fg.appendChild(el('label',{},label));
  const inp=el('input',{type:'number',step,placeholder,value:val==null?'':val});
  inp.addEventListener('input',()=>onChange(inp.value===''?null:+inp.value));
  fg.appendChild(inp);
  return fg;

function buildBanner(){
  const qc=countQcIssues();
  const b=el('div',{class:'banner '+(qc?'warn':'info')});

  if(qc){

    b.appendChild(el('span',{},'Tip: Enter qty first, then paste contractor-reported cost. QC flags any mismatch > $0.01 — contractors sometimes round quantities to a 5th decimal and the cost skews by thousands.'));
  }
  return b;

function dupItem(bi){
  const i=project.bidItems.indexOf(bi);
  const copy=JSON.parse(JSON.stringify(bi));copy.id=uid();
  if(copy.itemNo)copy.itemNo=copy.itemNo+'-dup';
  project.bidItems.splice(i+1,0,copy);render();
}
function moveItem(bi,dir){
  const i=project.bidItems.indexOf(bi);const j=i+dir;
  if(j<0||j>=project.bidItems.length)return;
  [project.bidItems[i],project.bidItems[j]]=[project.bidItems[j],project.bidItems[i]];render();
}
function pasteBidCsv(){
  const m=$('#modal');m.innerHTML='';
  m.appendChild(el('div',{class:'modal-title'},'Paste Bid Items (CSV / TSV)'));
  m.appendChild(el('div',{class:'help'},'Expected columns: <code>ItemNo, Description, Qty, Unit, UnitPrice</code>. Comma, tab, or pipe delimited. First row may be a header. Lines with just a label become section headers.'));
  const ta=el('textarea',{rows:'14',placeholder:'1, MOBILIZATION, 1, LS, 100000\n2, LOW PROFILE FLAG AND FLASHER BARRICADES, 1, LS, 3500\n…'});
  m.appendChild(ta);
  m.appendChild(el('div',{style:'display:flex;gap:6px;margin-top:10px;justify-content:flex-end'},[
    el('button',{class:'btn btn-sm',onclick:closeModal},'Cancel'),
    el('button',{class:'btn btn-accent btn-sm',onclick:()=>{
      const lines=ta.value.split(/\r?\n/).map(l=>l.trim()).filter(Boolean);
      let added=0;
      for(let i=0;i<lines.length;i++){
        const ln=lines[i];
        const parts=ln.split(/\t|,|\|/).map(x=>x.trim());
        if(i===0&&/item|desc/i.test(ln))continue;
        if(parts.length<=1){
          project.bidItems.push({id:uid(),description:parts[0]||'',isSection:true});
          added++;continue;
        }
        const [itemNo,description,qty,unit,unitPrice]=parts;
        project.bidItems.push({
          id:uid(),itemNo:itemNo||'',description:description||'',
          qty:qty===''?null:+qty||0,unit:unit||'',
          unitPrice:unitPrice===''?null:+unitPrice||0,
          isSection:false
        });
        added++;
      }
      closeModal();render();
      alert(added+' rows imported.');
    }},'Import')
  ]));
  openModal();ta.focus();
}

function nonConstructionPrevious(n,pp){
  if(!pp)return 0;

  }
  return total;
}

  metaCard.appendChild(el('div',{class:'card-title'},[`PAY APP #${pp.number}`,el('div',{class:'line'}),el('span',{class:'pill'},'Meta')]));

  metaGrid.appendChild(fieldInput('Period Start','date',pp.periodStart,v=>{pp.periodStart=v;saveAll();render()}));
  metaGrid.appendChild(fieldInput('Period Ending','date',pp.periodEnding,v=>{pp.periodEnding=v;saveAll();render()}));
  metaGrid.appendChild(fieldInput('Submitted Date','date',pp.submittedDate,v=>{pp.submittedDate=v;saveAll();render()}));
  metaCard.appendChild(metaGrid);
  const noteFg=el('div',{class:'fg',style:'margin-top:8px'});

  const ta=el('textarea',{rows:'2',placeholder:'Change orders applied, observations, etc.'});

  ta.addEventListener('input',()=>{pp.notes=ta.value;saveAll()});
  noteFg.appendChild(ta);
  metaCard.appendChild(noteFg);
  c.appendChild(metaCard);

  // Bid item quantity entry
  const entryCard=el('div',{class:'card'});
  entryCard.appendChild(el('div',{class:'card-title'},['QUANTITY ENTRY',el('div',{class:'line'}),el('span',{class:'pill'},'Enter qty + cost. QC flags contractor rounding errors.')]));
  entryCard.appendChild(el('div',{class:'help'},`Enter the <b>quantity</b> from the contractor's payapp plus the <b>cost</b> they reported. The QC column recomputes <code>qty × unit price</code> and flags deltas > $0.01. The classic trap: a contractor types 0.5 where they meant 0.50001 — on a $500k LS it's a $25 diff, but in 5-decimal territory a tiny rounding can flip what grant gets billed. Check the ✓/✗ column.`));
  const wrap=el('div',{class:'overflow-x'});
  const tbl=el('table');
  const thead=el('thead');
  thead.appendChild(el('tr',{},[
    el('th',{style:'width:30px'},'#'),
    el('th',{style:'min-width:80px'},'Item'),
    el('th',{style:'min-width:180px'},'Description'),
    el('th',{class:'tnum',style:'width:90px'},'Unit Price'),
    el('th',{class:'tnum',style:'width:80px'},'Contract Qty'),
    el('th',{class:'tnum',style:'width:90px'},'Prev Qty'),
    el('th',{class:'tnum',style:'width:90px'},'This Qty'),
    el('th',{class:'tnum',style:'width:100px'},'Qty to Date'),
    el('th',{class:'tnum',style:'width:110px'},'This $'),
    el('th',{class:'tnum',style:'width:110px'},'Canon. (Qty·Unit)'),
    el('th',{class:'tnum',style:'width:90px'},'QC Δ'),
    el('th',{class:'tnum',style:'width:110px'},'$ to Date'),
    el('th',{class:'tnum',style:'width:110px'},'Remaining')
  ]));
  tbl.appendChild(thead);
  const tb=el('tbody');

  let tC_this=0,tC_prev=0,tC_tot=0,tC_budget=0,qcErrCount=0;
  let idx=0;
  for(const bi of project.bidItems){
    if(bi.isSection){
      const tr=el('tr',{class:'section-row'});
      tr.appendChild(el('td',{colspan:'13'},bi.description||'SECTION'));
      tb.appendChild(tr);continue;
    }
    idx++;
    const budget=bidItemTotal(bi);
    const prevQ=qtyPrevious(bi,pp);
    const prevC=costPrevious(bi,pp);
    const rec=pp.quantities?.[bi.id]||{};
    const thisQ=+rec.qty||0;
    const thisC=+rec.cost||0;
    const canonC=round2(thisQ*(+bi.unitPrice||0));
    const delta=round5(thisC-canonC);
    const totQ=prevQ+thisQ;
    const totC=prevC+thisC;
    const rem=budget-totC;
    const hasErr=Math.abs(delta)>qcThreshold();
    if(hasErr)qcErrCount++;
    const tr=el('tr',{class:'td-tight '+(hasErr?'row-err':'')});
    tr.appendChild(el('td',{style:'color:var(--textDim)'},String(idx)));
    tr.appendChild(el('td',{style:'font-weight:600'},bi.itemNo||''));
    tr.appendChild(el('td',{style:'color:var(--textDim);font-size:11px'},((bi.description||'')+'').slice(0,60)));

    const qInp=el('input',{type:'number',step:'0.00001',value:thisQ||'',style:'text-align:right'});

      pp.quantities=pp.quantities||{};
      const r=pp.quantities[bi.id]=pp.quantities[bi.id]||{};
      r.qty=qInp.value===''?0:+qInp.value;
      // Auto-compute cost if nothing entered yet, unless override
      if(!r.override && (!r.cost||r.cost===0)){
        r.cost=round2((+r.qty||0)*(+bi.unitPrice||0));
      }
      renderContent();
    });
    qTd.appendChild(qInp);tr.appendChild(qTd);
    tr.appendChild(el('td',{class:'tnum'},num(totQ,2)));
    // This cost
    const cTd=el('td',{class:'tnum'});
    const cInp=el('input',{type:'number',step:'0.01',value:thisC||'',style:'text-align:right',title:'Contractor-stated cost'});
    cInp.addEventListener('input',()=>{
      pp.quantities=pp.quantities||{};
      const r=pp.quantities[bi.id]=pp.quantities[bi.id]||{};
      r.cost=cInp.value===''?0:+cInp.value;
      renderContent();
    });
    cTd.appendChild(cInp);tr.appendChild(cTd);
    // Canonical (computed)
    tr.appendChild(el('td',{class:'tnum flag-dim'},money(canonC)));
    // QC delta
    const qcTd=el('td',{class:'tnum'});
    const qc=el('div',{class:'qc-cell'});
    if(Math.abs(delta)<=qcThreshold()){
      qc.classList.add('qc-ok');qc.textContent='✓ OK';
    }else{
      qc.classList.add('qc-err');
      qc.innerHTML='<span title="Delta between contractor cost and qty×unit">Δ '+money(delta)+'</span>';
    }
    qcTd.appendChild(qc);
    tr.appendChild(qcTd);
    tr.appendChild(el('td',{class:'tnum'},money(totC)));
    tr.appendChild(el('td',{class:'tnum',style:'color:'+(rem<-0.01?'var(--red)':'var(--textDim)')},money(rem)));
    tb.appendChild(tr);
    tC_this+=thisC;tC_prev+=prevC;tC_tot+=totC;tC_budget+=budget;
  }

  // Totals row
  const trT=el('tr',{class:'total-row'});
  trT.appendChild(el('td',{colspan:'6'},'TOTAL CONSTRUCTION'));
  trT.appendChild(el('td',{class:'tnum'},'—'));
  trT.appendChild(el('td',{class:'tnum'},money(tC_budget)));
  trT.appendChild(el('td',{class:'tnum'},money(tC_this)));
  trT.appendChild(el('td',{class:'tnum'},'—'));

  trT.appendChild(qcCell);

  tb.appendChild(trT);
  tbl.appendChild(tb);wrap.appendChild(tbl);

  // QC summary banner
  if(qcErrCount>0){
    const b=el('div',{class:'banner warn'});
    b.appendChild(el('span',{class:'dot'}));
    b.appendChild(el('span',{},`${qcErrCount} QC discrepancy(ies) on this pay app — contractor-stated cost doesn't equal qty × unit price. Total mismatch is ${money(tC_this - project.bidItems.filter(x=>!x.isSection).reduce((a,bi)=>a+costThisPeriodCanonical(bi,pp),0))}.`));
    c.appendChild(b);
  }

  // KPIs

  const nonConstrTotal=(project.nonConstruction||[]).reduce((a,b)=>a+(+b.budget||0),0);

function makePieSvg(items){
  const size=220,r=90,cx=110,cy=110;
  const total=items.reduce((a,b)=>a+Math.max(0,+b.value||0),0);
  const svg=document.createElementNS('http://www.w3.org/2000/svg','svg');
  svg.setAttribute('width','100%');
  svg.setAttribute('viewBox',`0 0 ${size} ${size}`);
  svg.setAttribute('style','max-width:260px;margin:0 auto;display:block');
  if(total<=0){
    const c=document.createElementNS('http://www.w3.org/2000/svg','circle');
    c.setAttribute('cx',cx);c.setAttribute('cy',cy);c.setAttribute('r',r);
    c.setAttribute('fill','none');c.setAttribute('stroke','#1a2a3a');c.setAttribute('stroke-width','4');
    svg.appendChild(c);
    const t=document.createElementNS('http://www.w3.org/2000/svg','text');
    t.setAttribute('x',cx);t.setAttribute('y',cy);t.setAttribute('fill','#55637a');
    t.setAttribute('text-anchor','middle');t.setAttribute('dominant-baseline','central');t.setAttribute('font-size','10');
    t.textContent='NO DATA';svg.appendChild(t);
    return svg;
  }
  let acc=-Math.PI/2;
  for(const it of items){
    const v=Math.max(0,+it.value||0);
    if(v<=0)continue;
    const frac=v/total;
    const end=acc+frac*Math.PI*2;
    const large=frac>0.5?1:0;
    const x1=cx+r*Math.cos(acc);
    const y1=cy+r*Math.sin(acc);
    const x2=cx+r*Math.cos(end);
    const y2=cy+r*Math.sin(end);
    const d=frac>=0.999
      ? `M ${cx} ${cy} m -${r} 0 a ${r} ${r} 0 1 1 ${r*2} 0 a ${r} ${r} 0 1 1 -${r*2} 0 Z`
      : `M ${cx} ${cy} L ${x1} ${y1} A ${r} ${r} 0 ${large} 1 ${x2} ${y2} Z`;
    const p=document.createElementNS('http://www.w3.org/2000/svg','path');
    p.setAttribute('d',d);p.setAttribute('fill',it.color);p.setAttribute('stroke','#050a0f');p.setAttribute('stroke-width','1');
    const tt=document.createElementNS('http://www.w3.org/2000/svg','title');
    tt.textContent=`${it.label}: ${money(v)} (${(frac*100).toFixed(1)}%)`;
    p.appendChild(tt);
    svg.appendChild(p);
    // label
    if(frac>0.06){
      const mid=(acc+end)/2;
      const lx=cx+(r*0.65)*Math.cos(mid);
      const ly=cy+(r*0.65)*Math.sin(mid);
      const tx=document.createElementNS('http://www.w3.org/2000/svg','text');
      tx.setAttribute('x',lx);tx.setAttribute('y',ly);tx.setAttribute('fill','#050a0f');
      tx.setAttribute('text-anchor','middle');tx.setAttribute('dominant-baseline','central');tx.setAttribute('font-size','10');tx.setAttribute('font-weight','700');
      tx.textContent=(frac*100).toFixed(0)+'%';svg.appendChild(tx);
    }
    acc=end;
  }
  // Center hole
  const hole=document.createElementNS('http://www.w3.org/2000/svg','circle');
  hole.setAttribute('cx',cx);hole.setAttribute('cy',cy);hole.setAttribute('r',r*0.45);
  hole.setAttribute('fill','#050a0f');svg.appendChild(hole);
  const ct=document.createElementNS('http://www.w3.org/2000/svg','text');
  ct.setAttribute('x',cx);ct.setAttribute('y',cy-4);ct.setAttribute('fill','#e2e8f0');
  ct.setAttribute('text-anchor','middle');ct.setAttribute('dominant-baseline','central');ct.setAttribute('font-size','11');ct.setAttribute('font-weight','700');
  ct.textContent=moneyShort(total);
  svg.appendChild(ct);
  const ct2=document.createElementNS('http://www.w3.org/2000/svg','text');
  ct2.setAttribute('x',cx);ct2.setAttribute('y',cy+10);ct2.setAttribute('fill','#55637a');
  ct2.setAttribute('text-anchor','middle');ct2.setAttribute('dominant-baseline','central');ct2.setAttribute('font-size','8');
  ct2.textContent='TOTAL';svg.appendChild(ct2);
  return svg;
}

/* ── TAB 7: QC SUMMARY ── */
function renderQc(c){
  const qcCount=countQcIssues();
  const banner=el('div',{class:'banner '+(qcCount?'warn':'ok')});
  banner.appendChild(el('span',{class:'dot'}));
  if(qcCount){
    banner.appendChild(el('span',{},`${qcCount} quantity/cost discrepancies detected across all pay apps. A delta > $0.01 between "This $" and "Qty × Unit Price" suggests contractor rounding error — verify before submitting for reimbursement.`));
  }else{
    banner.appendChild(el('span',{},'All entries pass QC — every line\'s stated cost matches qty × unit price within $0.01.'));
  }
  c.appendChild(banner);

  const card=el('div',{class:'card'});
  card.appendChild(el('div',{class:'card-title'},['QC AUDIT TRAIL',el('div',{class:'line'}),el('span',{class:'pill'},`Threshold: $${qcThreshold().toFixed(2)}`)]));
  card.appendChild(el('div',{class:'help'},`The classic trap: a contractor bills <code>0.5</code> LS where they meant <code>0.50001</code> — on a $500k item it's only $25, but on a nested percentage split across 3 grants the downstream error cascades. We flag anything > $0.01 discrepancy so you can go back to the contractor and ask: "Did you mean 0.5 or 0.500001? Because your cost is $X but $Y × $Z = $W."`));

  const wrap=el('div',{class:'overflow-x'});
  const tbl=el('table');
  const thead=el('thead');
  thead.appendChild(el('tr',{},[
    el('th',{},'PA #'),
    el('th',{},'Item'),
    el('th',{style:'min-width:180px'},'Description'),
    el('th',{class:'tnum'},'Unit Price'),
    el('th',{class:'tnum'},'Qty Stated'),
    el('th',{class:'tnum'},'Cost Stated'),
    el('th',{class:'tnum'},'Canon. (Qty·Unit)'),
    el('th',{class:'tnum'},'Δ'),
    el('th',{},'Severity'),
    el('th',{},'Action')
  ]));
  tbl.appendChild(thead);
  const tb=el('tbody');

  let any=false;
  for(const pp of project.payApps){
    for(const bi of project.bidItems){
      if(bi.isSection)continue;
      const delta=qcDelta(bi,pp);
      if(Math.abs(delta)<=qcThreshold())continue;
      any=true;
      const rec=pp.quantities?.[bi.id]||{};
      const canon=round2((+rec.qty||0)*(+bi.unitPrice||0));
      const tr=el('tr',{class:'row-err'});
      tr.appendChild(el('td',{style:'font-weight:700;color:var(--red)'},`#${pp.number}`));
      tr.appendChild(el('td',{style:'font-weight:600'},bi.itemNo||''));
      tr.appendChild(el('td',{style:'color:var(--textDim);font-size:11px'},((bi.description||'')+'').slice(0,60)));
      tr.appendChild(el('td',{class:'tnum'},money(+bi.unitPrice||0)));
      tr.appendChild(el('td',{class:'tnum'},num(+rec.qty||0,5)));
      tr.appendChild(el('td',{class:'tnum'},money(+rec.cost||0)));
      tr.appendChild(el('td',{class:'tnum flag-dim'},money(canon)));
      tr.appendChild(el('td',{class:'tnum flag-red'},money(delta)));
      // severity
      const mag=Math.abs(delta);
      let sev,cls;
      if(mag<1){sev='TRIVIAL';cls='chip-gray'}
      else if(mag<100){sev='MINOR';cls='chip-yellow'}
      else if(mag<1000){sev='REVIEW';cls='chip-orange'}
      else{sev='MAJOR';cls='chip-red'}
      tr.appendChild(el('td',{},el('span',{class:'chip '+cls},sev)));
      const aTd=el('td');
      aTd.appendChild(el('button',{class:'btn btn-sm btn-green',title:'Adopt canonical cost (qty × unit)',onclick:()=>{
        pp.quantities[bi.id].cost=canon;render();
      }},'Fix'));
      aTd.appendChild(el('button',{class:'btn btn-sm btn-ghost',title:'Jump to pay app',onclick:()=>{
        project.activePayApp=pp.id;activeTab='payapps';render();
      }},'Go'));
      tr.appendChild(aTd);
      tb.appendChild(tr);
    }
  }
  if(!any){
    const tr=el('tr');
    tr.appendChild(el('td',{colspan:'10',style:'text-align:center;padding:30px;color:var(--green)'},'✓ All entries match canonical (qty × unit price).'));
    tb.appendChild(tr);
  }
  tbl.appendChild(tb);wrap.appendChild(tbl);card.appendChild(wrap);

  c.appendChild(card);

  // Severity rollup
  const sev={trivial:0,minor:0,review:0,major:0,totalDelta:0,absDelta:0};
  for(const pp of project.payApps){
    for(const bi of project.bidItems){
      if(bi.isSection)continue;
      const d=qcDelta(bi,pp);
      if(Math.abs(d)<=qcThreshold())continue;
      sev.totalDelta+=d;sev.absDelta+=Math.abs(d);
      const m=Math.abs(d);
      if(m<1)sev.trivial++;
      else if(m<100)sev.minor++;
      else if(m<1000)sev.review++;
      else sev.major++;
    }
  }
  const kpi=el('div',{class:'kpi-grid'});
  const mk=(lab,val,color)=>{
    const k=el('div',{class:'kpi'});
    k.appendChild(el('div',{class:'kpi-bar',style:'background:'+color}));
    k.appendChild(el('div',{class:'kpi-label'},lab));
    k.appendChild(el('div',{class:'kpi-value'},val));
    return k;
  };
  kpi.appendChild(mk('Trivial (<$1)',String(sev.trivial),'var(--textDim)'));
  kpi.appendChild(mk('Minor (<$100)',String(sev.minor),'var(--yellow)'));
  kpi.appendChild(mk('Review (<$1k)',String(sev.review),'var(--orange)'));
  kpi.appendChild(mk('Major (≥$1k)',String(sev.major),'var(--red)'));
  kpi.appendChild(mk('Net Δ',money(sev.totalDelta),'var(--accent)'));
  kpi.appendChild(mk('Absolute Δ',money(sev.absDelta),'var(--accent)'));
  c.appendChild(kpi);
}

      acts.appendChild(el('button',{class:'btn btn-accent btn-sm',onclick:()=>{project=p;saveAll();activeTab='setup';render()}},'Open'));
    }else{
      acts.appendChild(el('span',{class:'chip chip-green'},'ACTIVE'));
    }
    acts.appendChild(el('button',{class:'btn btn-sm',onclick:()=>{
      const name=prompt('Copy name?',`${p.meta.projectName} (copy)`);
      if(!name)return;
      const copy=JSON.parse(JSON.stringify(p));
      copy.id=uid();copy.created=new Date().toISOString();copy.modified=copy.created;
      copy.meta=copy.meta||{};copy.meta.projectName=name;
      projects.push(copy);saveAll();render();
    }},'Duplicate'));
    acts.appendChild(el('button',{class:'btn btn-sm btn-red',onclick:()=>{
      if(!confirm(`Delete project "${p.meta?.projectName||'?'}"?`))return;
      projects=projects.filter(x=>x.id!==p.id);
      if(project && project.id===p.id){project=projects[0]||blankProject();if(!projects.length)projects.push(project)}
      saveAll();render();
    }},'Delete'));
    card.appendChild(acts);
    grid.appendChild(card);
  }
  card.appendChild(grid);
  card.appendChild(el('div',{style:'margin-top:14px;display:flex;gap:6px;flex-wrap:wrap'},[
    el('button',{class:'btn btn-accent btn-sm',onclick:()=>{
      const np=blankProject();projects.push(np);project=np;activeTab='setup';saveAll();render();
    }},'+ New Blank Project'),
    el('button',{class:'btn btn-sm',onclick:loadDemo},'Load Demo (Clinton Hangars)')
  ]));
  c.appendChild(card);
}

/* ── Import / Export ── */
function exportJson(){
  const data=JSON.stringify(project,null,2);
  const b=new Blob([data],{type:'application/json'});
  const a=document.createElement('a');
  const slug=(project.meta?.projectName||'funding-split').replace(/[^a-z0-9]+/gi,'_').toLowerCase();
  a.href=URL.createObjectURL(b);
  a.download=`funding-split_${slug}_${todayISO()}.json`;
  a.click();URL.revokeObjectURL(a.href);
}
function exportCsv(){
  // CSV export — bid items with pay app columns
  const pp=currentPayApp();
  const rows=[];
  const meta=project.meta;
  rows.push(['Funding Split No.',meta.fundingSplitNo||'']);
  rows.push(['Project',meta.projectName||'']);
  rows.push(['Client',meta.client||'']);
  rows.push(['Location',meta.location||'']);
  rows.push(['Period Ending',meta.periodEnding||'']);
  rows.push([]);
  rows.push(['Item No.','Description','Qty','Unit','Unit Price','Grant App','Previous Requests','This Request','Total','QC Δ','Sources']);
  for(const bi of project.bidItems){
    if(bi.isSection){
      rows.push([bi.description||'SECTION']);continue;
    }
    const budget=bidItemTotal(bi);
    const prev=costPrevious(bi,pp);
    const this_=costThisPeriod(bi,pp);
    const tot=prev+this_;
    const delta=qcDelta(bi,pp);
    const srcs=project.sources.filter(s=>sourceApplies(s,bi.id)).map(s=>s.short||s.name).join(' / ');
    rows.push([bi.itemNo,bi.description,bi.qty||'',bi.unit||'',bi.unitPrice||0,budget,prev,this_,tot,delta,srcs]);
  }
  rows.push([]);
  rows.push(['FUNDING SOURCE SPLIT']);
  rows.push(['Source','Share %','Cap','Grant App','Previous','This Request','Total']);
  const srcTotals={};
  for(const s of project.sources)srcTotals[s.id]={g:0,p:0,t:0,tot:0};
  for(const bi of project.bidItems){
    if(bi.isSection)continue;
    for(const a of allocateToSources(bi,bidItemTotal(bi)))srcTotals[a.source.id].g+=a.amount;
    if(pp){
      for(const a of allocateToSources(bi,costThisPeriod(bi,pp)))srcTotals[a.source.id].t+=a.amount;
      for(const a of allocateToSources(bi,costPrevious(bi,pp)))srcTotals[a.source.id].p+=a.amount;
    }
    if(pp)for(const a of allocateToSources(bi,costThroughPayApp(bi,pp)))srcTotals[a.source.id].tot+=a.amount;
  }
  for(const s of project.sources){
    const r=srcTotals[s.id];
    rows.push([s.name,s.sharePct||'',s.cap||'',r.g,r.p,r.t,r.tot]);
  }
  const csv=rows.map(r=>r.map(v=>{
    const t=(v==null?'':String(v));
    return /[,"\n]/.test(t)?`"${t.replace(/"/g,'""')}"`:t;
  }).join(',')).join('\n');
  const b=new Blob([csv],{type:'text/csv'});
  const a=document.createElement('a');
  const slug=(meta.projectName||'funding-split').replace(/[^a-z0-9]+/gi,'_').toLowerCase();
  a.href=URL.createObjectURL(b);
  a.download=`funding-split_${slug}_${todayISO()}.csv`;
  a.click();URL.revokeObjectURL(a.href);
}

function openImportModal(){
  const m=$('#modal');m.innerHTML='';
  m.appendChild(el('div',{class:'modal-title'},'Import Funding Split'));
  m.appendChild(el('div',{class:'help'},'Drop a JSON file exported from this tool, or a CSV/TSV of bid items.'));
  const drop=el('div',{class:'drop-zone'},'Click or drag a .json / .csv / .tsv file');
  const input=el('input',{type:'file',style:'display:none',accept:'.json,.csv,.tsv,.txt'});
  drop.appendChild(input);
  drop.addEventListener('click',()=>input.click());
  drop.addEventListener('dragover',e=>{e.preventDefault();drop.classList.add('drag')});
  drop.addEventListener('dragleave',()=>drop.classList.remove('drag'));
  drop.addEventListener('drop',e=>{e.preventDefault();drop.classList.remove('drag');if(e.dataTransfer.files.length)handleImport(e.dataTransfer.files[0])});
  input.addEventListener('change',()=>{if(input.files[0])handleImport(input.files[0])});
  m.appendChild(drop);
  m.appendChild(el('div',{style:'display:flex;gap:6px;margin-top:10px;justify-content:flex-end'},[
    el('button',{class:'btn btn-ghost',onclick:closeModal},'Cancel')
  ]));
  openModal();
}
function handleImport(file){
  const fr=new FileReader();
  fr.onload=()=>{
    const txt=fr.result;
    if(file.name.toLowerCase().endsWith('.json')){
      try{
        const data=JSON.parse(txt);
        if(data.bidItems && data.sources){
          data.id=data.id||uid();
          projects.push(data);project=data;
          saveAll();closeModal();render();
          alert('Project imported.');
        }else throw new Error('Not a funding-split JSON');
      }catch(e){alert('Import failed: '+e.message)}
    }else{
      // CSV/TSV bid items
      const lines=txt.split(/\r?\n/).filter(l=>l.trim());
      let added=0;
      for(let i=0;i<lines.length;i++){
        const ln=lines[i];
        if(i===0&&/item|desc/i.test(ln))continue;
        const parts=ln.split(/\t|,|\|/).map(x=>x.trim().replace(/^"|"$/g,''));
        if(parts.length<=1){
          project.bidItems.push({id:uid(),description:parts[0]||'SECTION',isSection:true});
          added++;continue;
        }
        const [itemNo,description,qty,unit,unitPrice]=parts;
        project.bidItems.push({
          id:uid(),itemNo:itemNo||'',description:description||'',
          qty:qty===''?null:+qty||0,unit:unit||'',
          unitPrice:unitPrice===''?null:+unitPrice||0,
          isSection:false
        });added++;
      }
      closeModal();render();
      alert(added+' bid item(s) imported.');
    }
  };
  fr.readAsText(file);
}

    const faaC=project.sources.filter(s=>/^FAA/i.test(s.name)||/^FAA/i.test(s.short||'')).reduce((a,s)=>{
      let acc={g:0,p:0,t:0,tot:0};
      for(const bi of project.bidItems){
        if(bi.isSection)continue;
        for(const alloc of allocateToSources(bi,bidItemTotal(bi))){if(alloc.source===s)acc.g+=alloc.amount}
        if(pp){
          for(const alloc of allocateToSources(bi,costPrevious(bi,pp))){if(alloc.source===s)acc.p+=alloc.amount}
          for(const alloc of allocateToSources(bi,costThisPeriod(bi,pp))){if(alloc.source===s)acc.t+=alloc.amount}
          for(const alloc of allocateToSources(bi,costThroughPayApp(bi,pp))){if(alloc.source===s)acc.tot+=alloc.amount}
        }
      }
      return {g:a.g+acc.g,p:a.p+acc.p,t:a.t+acc.t,tot:a.tot+acc.tot};
    },{g:0,p:0,t:0,tot:0});
    trCon.appendChild(el('td',{class:'tnum'},money(faaC.g)));
    trCon.appendChild(el('td',{class:'tnum'},money(faaC.p)));
    trCon.appendChild(el('td',{class:'tnum'},money(faaC.t)));
    trCon.appendChild(el('td',{class:'tnum'},money(faaC.tot)));
    gTb.appendChild(trCon);
    // Per-source rows: billed / construction / ineligible in the PDF
    for(const s of project.sources){
      let acc={g:0,p:0,t:0,tot:0};
      for(const bi of project.bidItems){
        if(bi.isSection)continue;
        for(const alloc of allocateToSources(bi,bidItemTotal(bi))){if(alloc.source===s)acc.g+=alloc.amount}
        if(pp){
          for(const alloc of allocateToSources(bi,costPrevious(bi,pp))){if(alloc.source===s)acc.p+=alloc.amount}
          for(const alloc of allocateToSources(bi,costThisPeriod(bi,pp))){if(alloc.source===s)acc.t+=alloc.amount}
          for(const alloc of allocateToSources(bi,costThroughPayApp(bi,pp))){if(alloc.source===s)acc.tot+=alloc.amount}
        }
      }
      const tr=el('tr');
      tr.appendChild(el('td',{style:`background:${s.color}20;font-weight:700;border-left:3px solid ${s.color}`,colspan:'2'},s.name||s.short));
      tr.appendChild(el('td',{class:'tnum'},money(acc.g)));
      tr.appendChild(el('td',{class:'tnum'},money(acc.p)));
      tr.appendChild(el('td',{class:'tnum'},money(acc.t)));
      tr.appendChild(el('td',{class:'tnum'},money(acc.tot)));
      gTb.appendChild(tr);
    }
    const gTh=el('thead');
    gTh.appendChild(el('tr',{},[
      el('th',{colspan:'2'},'Grant / Source'),
      el('th',{class:'tnum'},'Grant App'),
      el('th',{class:'tnum'},'Previous'),
      el('th',{class:'tnum'},'This Request'),
      el('th',{class:'tnum'},'Total')
    ]));
    gTbl.appendChild(gTh);
    gTbl.appendChild(gTb);
    gCard.appendChild(gTbl);
    pw.appendChild(gCard);
  }

  // Non-construction
  if((project.nonConstruction||[]).length){
    const ncCard=el('div',{class:'card'});
    const ncTbl=el('table');
    const ncTh=el('thead');
    ncTh.appendChild(el('tr',{},[
      el('th',{style:'min-width:220px'},'Non-Construction'),
      el('th',{class:'tnum'},'Budget'),
      el('th',{class:'tnum'},'Previous'),
      el('th',{class:'tnum'},'This Request'),
      el('th',{class:'tnum'},'Total')
    ]));
    ncTbl.appendChild(ncTh);
    const ncTb=el('tbody');
    let tBudget=0,tPrev=0,tThis=0,tTot=0;
    for(const n of project.nonConstruction){
      const prevVal=nonConstructionPrevious(n,pp);
      const thisVal=+(pp?.nonConstruction?.[n.id]||0);
      const tr=el('tr');
      tr.appendChild(el('td',{},n.description||''));
      tr.appendChild(el('td',{class:'tnum'},money(n.budget||0)));
      tr.appendChild(el('td',{class:'tnum'},money(prevVal)));
      tr.appendChild(el('td',{class:'tnum'},money(thisVal)));
      tr.appendChild(el('td',{class:'tnum'},money(prevVal+thisVal)));
      ncTb.appendChild(tr);
      tBudget+=(+n.budget||0);tPrev+=prevVal;tThis+=thisVal;tTot+=prevVal+thisVal;
    }
    const trT=el('tr',{class:'total-row'});
    trT.appendChild(el('td',{},'TOTAL NON-CONSTRUCTION'));
    trT.appendChild(el('td',{class:'tnum'},money(tBudget)));
    trT.appendChild(el('td',{class:'tnum'},money(tPrev)));
    trT.appendChild(el('td',{class:'tnum'},money(tThis)));
    trT.appendChild(el('td',{class:'tnum'},money(tTot)));
    ncTb.appendChild(trT);
    ncTbl.appendChild(ncTb);
    ncCard.appendChild(ncTbl);
    pw.appendChild(ncCard);
  }

  // Grand total + share breakout
  const grandCard=el('div',{class:'card'});
  const grandTbl=el('table');
  const gTh=el('thead');
  gTh.appendChild(el('tr',{},[
    el('th',{style:'min-width:200px'},''),
    el('th',{},''),
    el('th',{class:'tnum'},'Budget'),
    el('th',{class:'tnum'},'Previous'),
    el('th',{class:'tnum'},'This Request'),
    el('th',{class:'tnum'},'Total')
  ]));
  grandTbl.appendChild(gTh);
  const gTb=el('tbody');
  // Sums across construction + non-construction
  const ncBudget=(project.nonConstruction||[]).reduce((a,n)=>a+(+n.budget||0),0);
  const ncPrev=(project.nonConstruction||[]).reduce((a,n)=>a+nonConstructionPrevious(n,pp),0);
  const ncThis=Object.values(pp?.nonConstruction||{}).reduce((a,b)=>a+(+b||0),0);
  const ncTot=ncPrev+ncThis;
  const grandRow=el('tr',{class:'grand-row'});
  grandRow.appendChild(el('td',{colspan:'2'},'GRAND TOTAL'));
  grandRow.appendChild(el('td',{class:'tnum'},money(tConBudget+ncBudget)));
  grandRow.appendChild(el('td',{class:'tnum'},money(tConPrev+ncPrev)));
  grandRow.appendChild(el('td',{class:'tnum'},money(tConThis+ncThis)));
  grandRow.appendChild(el('td',{class:'tnum'},money(tConTot+ncTot)));
  gTb.appendChild(grandRow);

  // Per-source summary rows, matching the PDF's FAA Share / Sponsor Share / ODAA Share breakout
  for(const s of project.sources){
    let sB=0,sP=0,sT=0,sTot=0;
    for(const bi of project.bidItems){
      if(bi.isSection)continue;
      for(const alloc of allocateToSources(bi,bidItemTotal(bi))){if(alloc.source===s)sB+=alloc.amount}
      if(pp){
        for(const alloc of allocateToSources(bi,costPrevious(bi,pp))){if(alloc.source===s)sP+=alloc.amount}
        for(const alloc of allocateToSources(bi,costThisPeriod(bi,pp))){if(alloc.source===s)sT+=alloc.amount}
        for(const alloc of allocateToSources(bi,costThroughPayApp(bi,pp))){if(alloc.source===s)sTot+=alloc.amount}
      }
    }
    const tr=el('tr');
    tr.appendChild(el('td',{style:`border-left:3px solid ${s.color};font-weight:700`},s.name||s.short||'Source'));
    tr.appendChild(el('td',{class:'tnum flag-dim'},s.type==='residual'?'Remaining Balance':(s.sharePct!=null?pct(s.sharePct)+' of items':'—')));
    tr.appendChild(el('td',{class:'tnum'},money(sB)));
    tr.appendChild(el('td',{class:'tnum'},money(sP)));
    tr.appendChild(el('td',{class:'tnum'},money(sT)));
    tr.appendChild(el('td',{class:'tnum'},money(sTot)));
    gTb.appendChild(tr);
  }
  const gTotRow=el('tr',{class:'grand-row'});
  gTotRow.appendChild(el('td',{colspan:'2'},'Total Project Cost'));
  gTotRow.appendChild(el('td',{class:'tnum'},money(tConBudget+ncBudget)));
  gTotRow.appendChild(el('td',{class:'tnum'},money(tConPrev+ncPrev)));
  gTotRow.appendChild(el('td',{class:'tnum'},money(tConThis+ncThis)));
  gTotRow.appendChild(el('td',{class:'tnum'},money(tConTot+ncTot)));
  gTb.appendChild(gTotRow);
  grandTbl.appendChild(gTb);
  grandCard.appendChild(grandTbl);
  pw.appendChild(grandCard);
}

/* ── Nav buttons ── */
$('#btnDemo').addEventListener('click',loadDemo);
$('#btnNew').addEventListener('click',()=>{
  if(!confirm('Start a new blank project? (Current project stays saved.)'))return;
  const np=blankProject();projects.push(np);project=np;activeTab='setup';saveAll();render();
});
$('#btnImport').addEventListener('click',openImportModal);
$('#btnExport').addEventListener('click',openExportModal);
$('#btnPrint').addEventListener('click',()=>{
  renderPrint();window.print();
});

/* ── Boot ── */
loadAll();render();

/* Esc closes modal */
document.addEventListener('keydown',e=>{if(e.key==='Escape')closeModal()});
</script>
</body>
