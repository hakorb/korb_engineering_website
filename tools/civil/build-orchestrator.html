<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="description" content="Build Orchestrator — Primavera-style construction scheduling with CPM, resource leveling, earned value, and multi-project dashboards. A free tool from Korb Engineering.">
<title>Build Orchestrator // Korb Engineering</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{--bg:#050a0f;--bg1:#0a1018;--bg2:#0f1822;--border:#1a2a3a;--accent:#00d4ff;--orange:#ff9900;--green:#00ff88;--red:#ff3344;--yellow:#ffcc00;--text:#e2e8f0;--textDim:rgba(226,232,240,0.45);--textMuted:rgba(226,232,240,0.25);--font:'JetBrains Mono',monospace;--critical:#ff3344;--float-ok:#00ff88}
body{background:var(--bg);color:var(--text);font-family:var(--font);min-height:100vh;overflow-x:hidden}
input,select,button,textarea{font-family:var(--font);font-size:16px}
button{cursor:pointer}

/* Header */
.header{height:52px;background:linear-gradient(180deg,var(--bg2),var(--bg1));border-bottom:1px solid var(--border);display:flex;align-items:center;padding:0 20px;gap:16px;position:sticky;top:0;z-index:100}
.logo-box{width:36px;height:36px;border:1.5px solid var(--accent);display:flex;align-items:center;justify-content:center;box-shadow:0 0 10px rgba(0,212,255,0.25);flex-shrink:0}
.logo-box span{font-size:11px;font-weight:700;color:var(--accent);letter-spacing:0.05em}
.htitle{font-size:15px;font-weight:700;letter-spacing:0.12em;color:var(--accent)}
.hsub{font-size:9px;color:rgba(0,212,255,0.35);letter-spacing:0.15em;text-transform:uppercase}

/* Tabs */
.tabs{display:flex;gap:0;padding:12px 20px 0;border-bottom:1px solid var(--border);flex-wrap:wrap}
.tab{padding:10px 18px;min-height:44px;background:transparent;border:1px solid var(--border);border-bottom:1px solid var(--border);color:var(--textDim);font-size:11px;cursor:pointer;letter-spacing:0.1em;text-transform:uppercase;border-radius:4px 4px 0 0;transition:all .15s;display:flex;align-items:center}
.tab.active{background:var(--bg2);border-color:var(--accent);border-bottom-color:var(--bg2);color:var(--accent)}
.tab:hover:not(.active){color:var(--text);border-color:rgba(0,212,255,0.3)}

/* Container */
.container{padding:16px 20px;max-width:1600px;margin:0 auto}
.panel{display:none}
.panel.active{display:block}

/* Common */
.label{display:block;font-size:11px;color:var(--textDim);margin-bottom:6px;letter-spacing:0.06em;text-transform:uppercase}
.input{background:var(--bg2);border:1px solid var(--border);border-radius:6px;color:var(--text);padding:8px 12px;font-size:16px;width:100%;outline:none}
.input:focus{border-color:var(--accent)}
.select{background:var(--bg2);border:1px solid var(--border);border-radius:6px;color:var(--text);padding:8px 12px;font-size:16px;outline:none;cursor:pointer;width:100%}
.select:focus{border-color:var(--accent)}
.btn{background:none;border:1px solid var(--border);border-radius:6px;color:var(--text);padding:10px 18px;font-size:12px;cursor:pointer;transition:all .2s;letter-spacing:0.03em;min-height:44px;min-width:44px}
.btn:hover{border-color:var(--accent);color:var(--accent)}
.btn-primary{background:var(--accent);color:#000;border-color:var(--accent);font-weight:600}
.btn-primary:hover{background:#00b8d9}
.btn-danger{border-color:var(--red);color:var(--red)}
.btn-danger:hover{background:var(--red);color:#000}
.btn-orange{border-color:var(--orange);color:var(--orange)}
.btn-orange:hover{background:var(--orange);color:#000}
.btn-sm{padding:6px 12px;font-size:10px;min-height:36px}
.row{display:flex;gap:12px;margin-bottom:12px;flex-wrap:wrap}
.field{flex:1;min-width:140px}
.card{background:var(--bg1);border:1px solid var(--border);border-radius:8px;padding:16px;margin-bottom:12px}
.section-title{font-size:13px;font-weight:700;color:var(--accent);margin-bottom:12px;text-transform:uppercase;letter-spacing:0.08em;display:flex;align-items:center;gap:8px}

/* Toolbar */
.toolbar{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:16px;align-items:center}
.toolbar-sep{width:1px;height:28px;background:var(--border);margin:0 4px}

/* Table */
.tbl{width:100%;border-collapse:collapse;font-size:12px}
.tbl th{background:var(--bg2);color:var(--textDim);padding:8px 10px;text-align:left;font-size:10px;text-transform:uppercase;letter-spacing:0.06em;border-bottom:1px solid var(--border);position:sticky;top:0;white-space:nowrap}
.tbl td{padding:6px 10px;border-bottom:1px solid rgba(26,42,58,0.3);white-space:nowrap}
.tbl tr:hover{background:rgba(0,212,255,0.03)}
.tbl tr.critical{background:rgba(255,51,68,0.06)}
.tbl tr.critical td{color:var(--red)}
.tbl tr.selected{background:rgba(0,212,255,0.08)}
.tbl-wrap{overflow-x:auto;border:1px solid var(--border);border-radius:8px;max-height:55vh;overflow-y:auto}
.tbl td input,.tbl td select{background:var(--bg);border:1px solid transparent;border-radius:3px;color:var(--text);padding:4px 6px;font-size:16px;font-family:var(--font);outline:none;width:100%;min-width:60px}
.tbl td input:focus,.tbl td select:focus{border-color:var(--accent)}

/* Gantt */
.gantt-container{display:flex;border:1px solid var(--border);border-radius:8px;overflow:hidden;max-height:65vh}
.gantt-table{min-width:300px;max-width:350px;overflow-y:auto;border-right:1px solid var(--border);flex-shrink:0}
.gantt-chart{flex:1;overflow:auto;position:relative}
.gantt-header{height:50px;background:var(--bg2);border-bottom:1px solid var(--border);position:sticky;top:0;z-index:5}
.gantt-body{position:relative;min-height:200px}
.gantt-row{height:32px;border-bottom:1px solid rgba(26,42,58,0.2);position:relative}
.gantt-bar{position:absolute;height:20px;top:6px;border-radius:3px;min-width:4px;cursor:pointer}
.gantt-bar.normal{background:var(--accent);opacity:0.8}
.gantt-bar.critical{background:var(--red);opacity:0.9}
.gantt-bar.baseline{background:var(--orange);opacity:0.4;top:22px;height:6px;border-radius:2px}
.gantt-bar.milestone{width:14px!important;height:14px;top:9px;transform:rotate(45deg);border-radius:2px}
.gantt-dep-arrow{stroke:var(--textDim);fill:none;stroke-width:1.5}

/* Resource Histogram */
.histogram{border:1px solid var(--border);border-radius:8px;overflow:hidden}
.histogram canvas{width:100%;background:var(--bg1)}

/* EV S-Curve */
.scurve{border:1px solid var(--border);border-radius:8px;overflow:hidden}
.scurve canvas{width:100%;background:var(--bg1)}

/* Metrics */
.metric{background:var(--bg2);border:1px solid var(--border);border-radius:8px;padding:14px;text-align:center;min-width:120px;flex:1}
.metric .mv{font-size:20px;font-weight:700;color:var(--accent)}
.metric .ml{font-size:9px;color:var(--textDim);text-transform:uppercase;letter-spacing:0.1em;margin-top:4px}
.metric.warn .mv{color:var(--orange)}
.metric.bad .mv{color:var(--red)}
.metric.good .mv{color:var(--green)}

/* Modal */
.modal-overlay{display:none;position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,0.7);z-index:500;align-items:center;justify-content:center}
.modal-overlay.show{display:flex}
.modal{background:var(--bg1);border:1px solid var(--accent);border-radius:12px;padding:24px;max-width:600px;width:90%;max-height:80vh;overflow-y:auto}
.modal h3{color:var(--accent);font-size:14px;margin-bottom:16px;text-transform:uppercase;letter-spacing:0.08em}
.modal .close-btn{float:right;background:none;border:none;color:var(--textDim);font-size:18px;cursor:pointer;padding:4px}

/* Status badge */
.badge{display:inline-block;padding:2px 8px;border-radius:3px;font-size:9px;font-weight:600;text-transform:uppercase;letter-spacing:0.05em}
.badge-ns{background:rgba(226,232,240,0.1);color:var(--textDim)}
.badge-ip{background:rgba(0,212,255,0.15);color:var(--accent)}
.badge-done{background:rgba(0,255,136,0.15);color:var(--green)}
.badge-crit{background:rgba(255,51,68,0.15);color:var(--red)}

/* Float bar */
.float-bar{display:inline-block;height:6px;border-radius:3px;min-width:2px}

.ke-label{position:fixed;bottom:12px;right:16px;font-size:9px;color:var(--textDim);letter-spacing:0.15em;text-transform:uppercase;z-index:200}

/* Filter bar */
.filter-bar{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:12px;align-items:center;padding:8px 12px;background:var(--bg2);border:1px solid var(--border);border-radius:6px}
.filter-bar .select,.filter-bar .input{width:auto;min-width:120px;font-size:13px;padding:6px 10px}

/* Templates grid */
.templates-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(240px,1fr));gap:10px;margin-bottom:16px}
.template-btn{background:var(--bg2);border:1px solid var(--border);border-radius:6px;padding:12px 14px;cursor:pointer;transition:all .15s;text-align:left;min-height:44px}
.template-btn:hover{border-color:var(--accent)}
.template-btn .tpl-name{font-size:12px;font-weight:600;color:var(--accent);margin-bottom:4px}
.template-btn .tpl-desc{font-size:10px;color:var(--textDim)}

/* Saved projects */
.saved-item{display:flex;justify-content:space-between;align-items:center;padding:10px 14px;background:var(--bg2);border:1px solid var(--border);border-radius:6px;margin-bottom:6px;transition:all .15s;flex-wrap:wrap;gap:8px}
.saved-item:hover{border-color:var(--accent)}

/* Reports */
.report-block{background:var(--bg2);border:1px solid var(--border);border-radius:8px;padding:16px;margin-bottom:12px;font-size:12px;white-space:pre-wrap;line-height:1.6}

@media(max-width:768px){
  .htitle{font-size:12px}
  .tab{padding:8px 12px;font-size:10px}
  .gantt-table{min-width:200px;max-width:200px}
  .tbl td,.tbl th{padding:4px 6px;font-size:11px}
  .row{flex-direction:column}
  .field{min-width:100%}
  .metric{min-width:90px}
  .metric .mv{font-size:16px}
}
</style>
</head>
<body>

<div class="header">
  <div class="logo-box"><span>KE</span></div>
  <div>
    <div class="htitle">BUILD ORCHESTRATOR</div>
    <div class="hsub">Korb Engineering</div>
  </div>
</div>

<div class="tabs" id="mainTabs">
  <button class="tab active" data-tab="activities">Activities</button>
  <button class="tab" data-tab="gantt">Gantt</button>
  <button class="tab" data-tab="resources">Resources</button>
  <button class="tab" data-tab="ev">Earned Value</button>
  <button class="tab" data-tab="reports">Reports</button>
</div>

<!-- ===================== ACTIVITIES TAB ===================== -->
<div class="container">
<div class="panel active" id="panel-activities">

  <div class="toolbar">
    <button class="btn btn-primary btn-sm" onclick="addActivity()">+ Activity</button>
    <button class="btn btn-sm" onclick="addMilestone()">+ Milestone</button>
    <button class="btn btn-sm" onclick="runCPM()">Run CPM</button>
    <button class="btn btn-orange btn-sm" onclick="showBaselineModal()">Baselines</button>
    <div class="toolbar-sep"></div>
    <button class="btn btn-sm" onclick="showCalendarModal()">Calendars</button>
    <button class="btn btn-sm" onclick="showCodesModal()">Activity Codes</button>
    <div class="toolbar-sep"></div>
    <button class="btn btn-sm" onclick="importCSV()">Import CSV</button>
    <button class="btn btn-sm" onclick="exportCSV()">Export CSV</button>
    <div class="toolbar-sep"></div>
    <button class="btn btn-sm" onclick="showTemplates()">Templates</button>
    <button class="btn btn-sm" onclick="saveProject()">Save</button>
    <button class="btn btn-sm" onclick="showLoadModal()">Load</button>
  </div>

  <div class="filter-bar">
    <label class="label" style="margin:0;min-width:auto">Filter:</label>
    <select class="select" id="filterGroupBy" onchange="renderActivities()" style="width:130px">
      <option value="none">No Grouping</option>
      <option value="wbs">WBS</option>
      <option value="phase">Phase</option>
      <option value="responsibility">Responsibility</option>
      <option value="area">Area</option>
      <option value="priority">Priority</option>
    </select>
    <select class="select" id="filterStatus" onchange="renderActivities()" style="width:120px">
      <option value="all">All Status</option>
      <option value="not-started">Not Started</option>
      <option value="in-progress">In Progress</option>
      <option value="complete">Complete</option>
    </select>
    <select class="select" id="filterCritical" onchange="renderActivities()" style="width:120px">
      <option value="all">All Float</option>
      <option value="critical">Critical Only</option>
      <option value="near-critical">Near Critical (TF&lt;5)</option>
    </select>
  </div>

  <div class="tbl-wrap" id="activityTableWrap">
    <table class="tbl" id="activityTable">
      <thead>
        <tr>
          <th style="width:40px"></th>
          <th>ID</th>
          <th>WBS</th>
          <th>Activity Name</th>
          <th>Dur</th>
          <th>Rem</th>
          <th>%</th>
          <th>ES</th>
          <th>EF</th>
          <th>LS</th>
          <th>LF</th>
          <th>TF</th>
          <th>FF</th>
          <th>Pred</th>
          <th>Calendar</th>
          <th>Status</th>
          <th style="width:40px"></th>
        </tr>
      </thead>
      <tbody id="activityBody"></tbody>
    </table>
  </div>
</div>

<!-- ===================== GANTT TAB ===================== -->
<div class="panel" id="panel-gantt">
  <div class="toolbar">
    <button class="btn btn-sm" onclick="zoomGantt(-1)">Zoom -</button>
    <button class="btn btn-sm" onclick="zoomGantt(1)">Zoom +</button>
    <select class="select" id="ganttScale" onchange="renderGantt()" style="width:100px;font-size:12px">
      <option value="day">Day</option>
      <option value="week" selected>Week</option>
      <option value="month">Month</option>
    </select>
    <label style="font-size:11px;color:var(--textDim);display:flex;align-items:center;gap:4px">
      <input type="checkbox" id="showBaseline" onchange="renderGantt()"> Baseline
    </label>
    <label style="font-size:11px;color:var(--textDim);display:flex;align-items:center;gap:4px">
      <input type="checkbox" id="showCritical" checked onchange="renderGantt()"> Critical Path
    </label>
  </div>
  <div class="gantt-container" id="ganttContainer">
    <div class="gantt-table" id="ganttTableSide"></div>
    <div class="gantt-chart" id="ganttChart">
      <canvas id="ganttCanvas"></canvas>
    </div>
  </div>
</div>

<!-- ===================== RESOURCES TAB ===================== -->
<div class="panel" id="panel-resources">
  <div class="toolbar">
    <button class="btn btn-primary btn-sm" onclick="addResource()">+ Resource</button>
    <button class="btn btn-sm" onclick="showAssignModal()">Assign Resources</button>
    <button class="btn btn-orange btn-sm" onclick="levelResources()">Level Resources</button>
  </div>

  <div class="row">
    <div class="field" style="flex:1">
      <div class="section-title">Resource Pool</div>
      <div class="tbl-wrap" style="max-height:30vh">
        <table class="tbl" id="resourceTable">
          <thead><tr><th>Name</th><th>Type</th><th>Max Units</th><th>Cost/hr</th><th style="width:40px"></th></tr></thead>
          <tbody id="resourceBody"></tbody>
        </table>
      </div>
    </div>
    <div class="field" style="flex:1">
      <div class="section-title">Assignments</div>
      <div class="tbl-wrap" style="max-height:30vh">
        <table class="tbl" id="assignTable">
          <thead><tr><th>Activity</th><th>Resource</th><th>Units</th><th style="width:40px"></th></tr></thead>
          <tbody id="assignBody"></tbody>
        </table>
      </div>
    </div>
  </div>

  <div class="section-title" style="margin-top:16px">Resource Histogram</div>
  <div class="histogram">
    <canvas id="histogramCanvas" height="250"></canvas>
  </div>
</div>

<!-- ===================== EARNED VALUE TAB ===================== -->
<div class="panel" id="panel-ev">
  <div class="toolbar">
    <button class="btn btn-primary btn-sm" onclick="calcEV()">Calculate EV</button>
    <label class="label" style="margin:0;min-width:auto">Data Date:</label>
    <input type="date" class="input" id="evDataDate" style="width:160px" onchange="calcEV()">
  </div>

  <div class="row" id="evMetrics" style="gap:8px;flex-wrap:wrap"></div>

  <div class="row" style="margin-top:16px">
    <div class="field">
      <div class="section-title">S-Curve</div>
      <div class="scurve">
        <canvas id="scurveCanvas" height="300"></canvas>
      </div>
    </div>
  </div>

  <div class="section-title" style="margin-top:16px">Period Data</div>
  <div class="tbl-wrap" style="max-height:30vh">
    <table class="tbl" id="evTable">
      <thead><tr><th>Period</th><th>PV</th><th>EV</th><th>AC</th><th>SV</th><th>CV</th><th>SPI</th><th>CPI</th></tr></thead>
      <tbody id="evBody"></tbody>
    </table>
  </div>
</div>

<!-- ===================== REPORTS TAB ===================== -->
<div class="panel" id="panel-reports">
  <div class="toolbar">
    <button class="btn btn-sm" onclick="genReport('summary')">Schedule Summary</button>
    <button class="btn btn-sm" onclick="genReport('critical')">Critical Activities</button>
    <button class="btn btn-sm" onclick="genReport('resources')">Resource Usage</button>
    <button class="btn btn-sm" onclick="genReport('milestones')">Milestone Status</button>
  </div>
  <div class="report-block" id="reportOutput">Select a report to generate.</div>
</div>
</div>

<!-- Modals -->
<div class="modal-overlay" id="modalOverlay">
  <div class="modal" id="modalContent"></div>
</div>

<div class="ke-label">KORB ENGINEERING</div>

<script>
// ===== STATE =====
let STATE = {
  projectName: 'New Project',
  activities: [],
  resources: [],
  assignments: [],
  calendars: [
    { id: 'cal5', name: '5-Day Work Week', daysOff: [0, 6], holidays: [] },
    { id: 'cal6', name: '6-Day Work Week', daysOff: [0], holidays: [] },
    { id: 'cal7', name: '7-Day Calendar', daysOff: [], holidays: [] }
  ],
  activityCodes: { phase: [], responsibility: [], area: [], priority: ['High', 'Medium', 'Low'] },
  baselines: [null, null, null],
  nextId: 1,
  nextResId: 1,
  evData: []
};

const LS_PREFIX = 'korb_bo_';

// ===== TABS =====
document.querySelectorAll('.tab').forEach(t => {
  t.addEventListener('click', () => {
    document.querySelectorAll('.tab').forEach(x => x.classList.remove('active'));
    document.querySelectorAll('.panel').forEach(x => x.classList.remove('active'));
    t.classList.add('active');
    document.getElementById('panel-' + t.dataset.tab).classList.add('active');
    if (t.dataset.tab === 'gantt') setTimeout(() => renderGantt(), 50);
    if (t.dataset.tab === 'resources') renderHistogram();
    if (t.dataset.tab === 'ev') calcEV();
  });
});

// ===== ACTIVITY MANAGEMENT =====
function makeActivity(overrides = {}) {
  const id = STATE.nextId++;
  return {
    id: 'A' + String(id).padStart(4, '0'),
    wbs: '1',
    name: 'New Activity',
    duration: 5,
    remainingDuration: 5,
    pctComplete: 0,
    pctPhysical: 0,
    es: null, ef: null, ls: null, lf: null,
    totalFloat: null, freeFloat: null,
    predecessors: '',
    calendarId: 'cal5',
    isMilestone: false,
    status: 'not-started',
    codes: { phase: '', responsibility: '', area: '', priority: '' },
    budgetCost: 0,
    actualCost: 0,
    ...overrides
  };
}

function addActivity(overrides = {}) {
  STATE.activities.push(makeActivity(overrides));
  renderActivities();
}

function addMilestone() {
  addActivity({ name: 'Milestone', duration: 0, remainingDuration: 0, isMilestone: true });
}

function removeActivity(idx) {
  const removedId = STATE.activities[idx].id;
  STATE.activities.splice(idx, 1);
  STATE.assignments = STATE.assignments.filter(a => a.activityId !== removedId);
  renderActivities();
}

function renderActivities() {
  const tbody = document.getElementById('activityBody');
  const groupBy = document.getElementById('filterGroupBy').value;
  const filterStatus = document.getElementById('filterStatus').value;
  const filterCrit = document.getElementById('filterCritical').value;

  let filtered = STATE.activities.filter(a => {
    if (filterStatus !== 'all' && a.status !== filterStatus) return false;
    if (filterCrit === 'critical' && a.totalFloat !== 0) return false;
    if (filterCrit === 'near-critical' && (a.totalFloat === null || a.totalFloat >= 5)) return false;
    return true;
  });

  let groups = {};
  if (groupBy === 'none') {
    groups = { '': filtered };
  } else if (groupBy === 'wbs') {
    filtered.forEach(a => { const k = a.wbs || 'Unassigned'; (groups[k] = groups[k] || []).push(a); });
  } else {
    filtered.forEach(a => { const k = a.codes[groupBy] || 'Unassigned'; (groups[k] = groups[k] || []).push(a); });
  }

  let html = '';
  for (const [gName, acts] of Object.entries(groups)) {
    if (groupBy !== 'none') {
      html += `<tr><td colspan="17" style="background:var(--bg2);color:var(--accent);font-weight:700;font-size:11px;padding:8px 10px;letter-spacing:0.08em">${groupBy.toUpperCase()}: ${gName} (${acts.length})</td></tr>`;
    }
    acts.forEach(a => {
      const idx = STATE.activities.indexOf(a);
      const isCrit = a.totalFloat === 0;
      html += `<tr class="${isCrit ? 'critical' : ''}" onclick="selectRow(this,${idx})">
        <td>${a.isMilestone ? '<span style="color:var(--orange)">&#9670;</span>' : ''}</td>
        <td><span style="color:var(--accent);font-weight:600">${a.id}</span></td>
        <td><input value="${esc(a.wbs)}" onchange="ua(${idx},'wbs',this.value)" style="width:50px"></td>
        <td><input value="${esc(a.name)}" onchange="ua(${idx},'name',this.value)" style="min-width:150px"></td>
        <td><input type="number" value="${a.duration}" min="0" onchange="ua(${idx},'duration',+this.value)" style="width:50px"></td>
        <td><input type="number" value="${a.remainingDuration}" min="0" onchange="ua(${idx},'remainingDuration',+this.value)" style="width:50px"></td>
        <td><input type="number" value="${a.pctComplete}" min="0" max="100" onchange="ua(${idx},'pctComplete',+this.value)" style="width:50px"></td>
        <td style="font-size:11px;color:${isCrit ? 'var(--red)' : 'var(--textDim)'}">${fmtDate(a.es)}</td>
        <td style="font-size:11px;color:${isCrit ? 'var(--red)' : 'var(--textDim)'}">${fmtDate(a.ef)}</td>
        <td style="font-size:11px;color:var(--textDim)">${fmtDate(a.ls)}</td>
        <td style="font-size:11px;color:var(--textDim)">${fmtDate(a.lf)}</td>
        <td><span style="color:${a.totalFloat === 0 ? 'var(--red)' : a.totalFloat !== null && a.totalFloat < 5 ? 'var(--orange)' : 'var(--green)'};font-weight:600">${a.totalFloat !== null ? a.totalFloat : '-'}</span></td>
        <td style="color:var(--textDim)">${a.freeFloat !== null ? a.freeFloat : '-'}</td>
        <td><input value="${esc(a.predecessors)}" onchange="ua(${idx},'predecessors',this.value)" style="width:100px" placeholder="A0001FS+0" title="e.g. A0001FS+2,A0003SS-1"></td>
        <td><select onchange="ua(${idx},'calendarId',this.value)" style="width:80px;font-size:13px">${STATE.calendars.map(c => `<option value="${c.id}" ${c.id === a.calendarId ? 'selected' : ''}>${c.name.substring(0,6)}</option>`).join('')}</select></td>
        <td><select onchange="ua(${idx},'status',this.value)" style="width:80px;font-size:13px">
          <option value="not-started" ${a.status === 'not-started' ? 'selected' : ''}>Not Started</option>
          <option value="in-progress" ${a.status === 'in-progress' ? 'selected' : ''}>In Progress</option>
          <option value="complete" ${a.status === 'complete' ? 'selected' : ''}>Complete</option>
        </select></td>
        <td><button class="btn btn-danger btn-sm" onclick="event.stopPropagation();removeActivity(${idx})" style="padding:4px 8px;min-height:32px">&#x2715;</button></td>
      </tr>`;
    });
  }
  tbody.innerHTML = html;
}

function ua(idx, field, val) {
  STATE.activities[idx][field] = val;
  if (field === 'pctComplete') {
    STATE.activities[idx].remainingDuration = Math.round(STATE.activities[idx].duration * (1 - val / 100));
    if (val >= 100) STATE.activities[idx].status = 'complete';
    else if (val > 0) STATE.activities[idx].status = 'in-progress';
  }
  if (field === 'duration') {
    STATE.activities[idx].remainingDuration = val;
  }
}

function selectRow(tr, idx) {
  document.querySelectorAll('.tbl tr.selected').forEach(r => r.classList.remove('selected'));
  tr.classList.add('selected');
}

// ===== CPM ENGINE =====
function parsePredecessors(predStr) {
  if (!predStr || !predStr.trim()) return [];
  return predStr.split(',').map(p => {
    p = p.trim().toUpperCase();
    const m = p.match(/^(A\d+)\s*(FS|SS|FF|SF)?\s*([+-]\d+)?$/);
    if (!m) return null;
    return { id: m[1], type: m[2] || 'FS', lag: parseInt(m[3] || '0') };
  }).filter(Boolean);
}

function getCalendar(calId) {
  return STATE.calendars.find(c => c.id === calId) || STATE.calendars[0];
}

function addWorkDays(startDate, days, cal) {
  if (days <= 0) return new Date(startDate);
  let d = new Date(startDate);
  let added = 0;
  while (added < days) {
    d.setDate(d.getDate() + 1);
    if (!cal.daysOff.includes(d.getDay()) && !cal.holidays.includes(d.toISOString().slice(0, 10))) {
      added++;
    }
  }
  return d;
}

function subWorkDays(endDate, days, cal) {
  if (days <= 0) return new Date(endDate);
  let d = new Date(endDate);
  let sub = 0;
  while (sub < days) {
    d.setDate(d.getDate() - 1);
    if (!cal.daysOff.includes(d.getDay()) && !cal.holidays.includes(d.toISOString().slice(0, 10))) {
      sub++;
    }
  }
  return d;
}

function workDaysBetween(d1, d2, cal) {
  let count = 0;
  let d = new Date(d1);
  while (d < d2) {
    d.setDate(d.getDate() + 1);
    if (!cal.daysOff.includes(d.getDay()) && !cal.holidays.includes(d.toISOString().slice(0, 10))) {
      count++;
    }
  }
  return count;
}

function runCPM() {
  if (STATE.activities.length === 0) return;

  const acts = STATE.activities;
  const byId = {};
  acts.forEach(a => byId[a.id] = a);

  // Project start = today
  const projectStart = new Date();
  projectStart.setHours(0, 0, 0, 0);

  // Reset
  acts.forEach(a => { a.es = null; a.ef = null; a.ls = null; a.lf = null; a.totalFloat = null; a.freeFloat = null; });

  // Build dependency graph
  const preds = {};
  const succs = {};
  acts.forEach(a => {
    preds[a.id] = parsePredecessors(a.predecessors);
    if (!succs[a.id]) succs[a.id] = [];
    preds[a.id].forEach(p => {
      if (!succs[p.id]) succs[p.id] = [];
      succs[p.id].push({ id: a.id, type: p.type, lag: p.lag });
    });
  });

  // Topological sort
  const inDeg = {};
  acts.forEach(a => inDeg[a.id] = preds[a.id].length);
  const queue = acts.filter(a => inDeg[a.id] === 0).map(a => a.id);
  const order = [];
  while (queue.length) {
    const cur = queue.shift();
    order.push(cur);
    (succs[cur] || []).forEach(s => {
      inDeg[s.id]--;
      if (inDeg[s.id] === 0) queue.push(s.id);
    });
  }

  // Forward pass
  order.forEach(id => {
    const a = byId[id];
    if (!a) return;
    const cal = getCalendar(a.calendarId);
    let es = new Date(projectStart);

    preds[id].forEach(p => {
      const pred = byId[p.id];
      if (!pred) return;
      let refDate;
      switch (p.type) {
        case 'FS': refDate = pred.ef ? new Date(pred.ef) : new Date(projectStart); break;
        case 'SS': refDate = pred.es ? new Date(pred.es) : new Date(projectStart); break;
        case 'FF': refDate = pred.ef ? subWorkDays(new Date(pred.ef), a.duration - p.lag, cal) : new Date(projectStart); return;
        case 'SF': refDate = pred.es ? subWorkDays(new Date(pred.es), a.duration - p.lag, cal) : new Date(projectStart); return;
        default: refDate = pred.ef ? new Date(pred.ef) : new Date(projectStart);
      }
      if (p.lag) refDate = addWorkDays(refDate, p.lag, cal);
      if (refDate > es) es = refDate;
    });

    a.es = new Date(es);
    a.ef = a.duration > 0 ? addWorkDays(es, a.duration, cal) : new Date(es);
  });

  // Find project end
  let projectEnd = new Date(projectStart);
  acts.forEach(a => { if (a.ef && a.ef > projectEnd) projectEnd = new Date(a.ef); });

  // Backward pass
  const revOrder = [...order].reverse();
  revOrder.forEach(id => {
    const a = byId[id];
    if (!a) return;
    const cal = getCalendar(a.calendarId);

    if (!succs[id] || succs[id].length === 0) {
      a.lf = new Date(projectEnd);
    } else {
      let lf = new Date('2100-01-01');
      succs[id].forEach(s => {
        const succ = byId[s.id];
        if (!succ) return;
        let refDate;
        switch (s.type) {
          case 'FS': refDate = succ.ls ? new Date(succ.ls) : new Date(projectEnd); break;
          case 'SS': refDate = succ.ls ? addWorkDays(new Date(succ.ls), a.duration, cal) : new Date(projectEnd); break;
          case 'FF': refDate = succ.lf ? new Date(succ.lf) : new Date(projectEnd); break;
          case 'SF': refDate = succ.ls ? new Date(succ.ls) : new Date(projectEnd); break;
          default: refDate = succ.ls ? new Date(succ.ls) : new Date(projectEnd);
        }
        if (s.lag) refDate = subWorkDays(refDate, s.lag, cal);
        if (refDate < lf) lf = refDate;
      });
      a.lf = lf;
    }
    a.ls = a.duration > 0 ? subWorkDays(a.lf, a.duration, cal) : new Date(a.lf);
  });

  // Float calculation
  acts.forEach(a => {
    if (a.es && a.ls) {
      const cal = getCalendar(a.calendarId);
      a.totalFloat = workDaysBetween(a.es, a.ls, cal);
    }
  });

  // Free float
  acts.forEach(a => {
    if (!succs[a.id] || succs[a.id].length === 0) {
      a.freeFloat = a.totalFloat;
    } else {
      let minSuccES = new Date('2100-01-01');
      succs[a.id].forEach(s => {
        const succ = byId[s.id];
        if (succ && succ.es && succ.es < minSuccES) minSuccES = new Date(succ.es);
      });
      const cal = getCalendar(a.calendarId);
      a.freeFloat = Math.max(0, workDaysBetween(a.ef, minSuccES, cal));
    }
  });

  renderActivities();
  if (document.querySelector('.tab[data-tab="gantt"]').classList.contains('active')) renderGantt();
}

// ===== GANTT CHART =====
let ganttZoom = 1;

function zoomGantt(dir) {
  ganttZoom = Math.max(0.3, Math.min(3, ganttZoom + dir * 0.3));
  renderGantt();
}

function renderGantt() {
  const acts = STATE.activities;
  if (acts.length === 0) return;

  // Side table
  const side = document.getElementById('ganttTableSide');
  let sideHtml = '<table class="tbl"><thead><tr><th>ID</th><th>Activity</th><th>Dur</th></tr></thead><tbody>';
  acts.forEach(a => {
    const isCrit = a.totalFloat === 0;
    sideHtml += `<tr style="height:32px;${isCrit ? 'color:var(--red)' : ''}"><td style="font-size:10px">${a.id}</td><td style="font-size:11px;max-width:150px;overflow:hidden;text-overflow:ellipsis">${esc(a.name)}</td><td>${a.duration}d</td></tr>`;
  });
  sideHtml += '</tbody></table>';
  side.innerHTML = sideHtml;

  // Find date range
  let minDate = null, maxDate = null;
  acts.forEach(a => {
    if (a.es) { if (!minDate || a.es < minDate) minDate = new Date(a.es); }
    if (a.ef) { if (!maxDate || a.ef > maxDate) maxDate = new Date(a.ef); }
  });
  if (!minDate) minDate = new Date();
  if (!maxDate) maxDate = addWorkDays(minDate, 30, STATE.calendars[0]);

  // Add padding
  minDate = new Date(minDate);
  minDate.setDate(minDate.getDate() - 3);
  maxDate = new Date(maxDate);
  maxDate.setDate(maxDate.getDate() + 7);

  const scale = document.getElementById('ganttScale').value;
  const dayWidth = (scale === 'day' ? 30 : scale === 'week' ? 8 : 3) * ganttZoom;
  const totalDays = Math.ceil((maxDate - minDate) / (1000 * 60 * 60 * 24));
  const canvasW = Math.max(totalDays * dayWidth + 40, 600);
  const rowH = 32;
  const headerH = 50;
  const canvasH = headerH + acts.length * rowH + 20;

  const canvas = document.getElementById('ganttCanvas');
  canvas.width = canvasW * 2;
  canvas.height = canvasH * 2;
  canvas.style.width = canvasW + 'px';
  canvas.style.height = canvasH + 'px';
  const ctx = canvas.getContext('2d');
  ctx.scale(2, 2);

  // Background
  ctx.fillStyle = '#0a1018';
  ctx.fillRect(0, 0, canvasW, canvasH);

  // Header
  ctx.fillStyle = '#0f1822';
  ctx.fillRect(0, 0, canvasW, headerH);
  ctx.strokeStyle = '#1a2a3a';
  ctx.lineWidth = 1;

  // Grid lines & header labels
  ctx.font = '9px JetBrains Mono';
  ctx.fillStyle = 'rgba(226,232,240,0.3)';
  let d = new Date(minDate);
  let prevMonth = -1;
  for (let i = 0; i <= totalDays; i++) {
    const x = i * dayWidth;
    const day = d.getDay();
    const month = d.getMonth();

    // Weekend shading
    if (day === 0 || day === 6) {
      ctx.fillStyle = 'rgba(255,255,255,0.02)';
      ctx.fillRect(x, headerH, dayWidth, canvasH);
    }

    // Grid
    ctx.strokeStyle = 'rgba(26,42,58,0.3)';
    ctx.beginPath(); ctx.moveTo(x, headerH); ctx.lineTo(x, canvasH); ctx.stroke();

    // Labels
    if (scale === 'day') {
      ctx.fillStyle = 'rgba(226,232,240,0.3)';
      ctx.fillText(d.getDate(), x + 2, headerH - 6);
      if (month !== prevMonth) {
        ctx.fillStyle = 'rgba(0,212,255,0.6)';
        ctx.fillText(d.toLocaleString('default', { month: 'short', year: '2-digit' }), x + 2, 14);
        prevMonth = month;
      }
    } else if (scale === 'week' && day === 1) {
      ctx.fillStyle = 'rgba(226,232,240,0.3)';
      ctx.fillText(d.toLocaleDateString('en', { month: 'short', day: 'numeric' }), x + 2, headerH - 6);
      if (month !== prevMonth) {
        ctx.fillStyle = 'rgba(0,212,255,0.6)';
        ctx.fillText(d.toLocaleString('default', { month: 'short', year: 'numeric' }), x + 2, 14);
        prevMonth = month;
      }
    } else if (scale === 'month' && d.getDate() === 1) {
      ctx.fillStyle = 'rgba(0,212,255,0.6)';
      ctx.fillText(d.toLocaleString('default', { month: 'short', year: 'numeric' }), x + 2, headerH - 6);
    }

    d.setDate(d.getDate() + 1);
  }

  // Horizontal row lines
  for (let i = 0; i <= acts.length; i++) {
    const y = headerH + i * rowH;
    ctx.strokeStyle = 'rgba(26,42,58,0.2)';
    ctx.beginPath(); ctx.moveTo(0, y); ctx.lineTo(canvasW, y); ctx.stroke();
  }

  // Today line
  const today = new Date(); today.setHours(0, 0, 0, 0);
  const todayX = ((today - minDate) / (1000 * 60 * 60 * 24)) * dayWidth;
  if (todayX > 0 && todayX < canvasW) {
    ctx.strokeStyle = 'rgba(0,212,255,0.5)';
    ctx.setLineDash([4, 4]);
    ctx.beginPath(); ctx.moveTo(todayX, headerH); ctx.lineTo(todayX, canvasH); ctx.stroke();
    ctx.setLineDash([]);
    ctx.fillStyle = '#00d4ff';
    ctx.font = '8px JetBrains Mono';
    ctx.fillText('TODAY', todayX + 2, headerH + 12);
  }

  const showBaseline = document.getElementById('showBaseline').checked;
  const showCriticalPath = document.getElementById('showCritical').checked;

  // Draw baselines first
  if (showBaseline) {
    const bl = STATE.baselines.find(b => b !== null);
    if (bl) {
      bl.activities.forEach((ba, i) => {
        if (i >= acts.length) return;
        if (!ba.es || !ba.ef) return;
        const x1 = ((new Date(ba.es) - minDate) / (1000 * 60 * 60 * 24)) * dayWidth;
        const x2 = ((new Date(ba.ef) - minDate) / (1000 * 60 * 60 * 24)) * dayWidth;
        const y = headerH + i * rowH + 24;
        ctx.fillStyle = 'rgba(255,153,0,0.3)';
        ctx.fillRect(x1, y, Math.max(x2 - x1, 3), 5);
      });
    }
  }

  // Draw bars
  acts.forEach((a, i) => {
    if (!a.es || !a.ef) return;
    const x1 = ((a.es - minDate) / (1000 * 60 * 60 * 24)) * dayWidth;
    const x2 = ((a.ef - minDate) / (1000 * 60 * 60 * 24)) * dayWidth;
    const y = headerH + i * rowH;
    const isCrit = showCriticalPath && a.totalFloat === 0;

    if (a.isMilestone) {
      ctx.save();
      ctx.translate(x1, y + rowH / 2);
      ctx.rotate(Math.PI / 4);
      ctx.fillStyle = isCrit ? '#ff3344' : '#ff9900';
      ctx.fillRect(-5, -5, 10, 10);
      ctx.restore();
    } else {
      const barW = Math.max(x2 - x1, 4);
      ctx.fillStyle = isCrit ? 'rgba(255,51,68,0.8)' : 'rgba(0,212,255,0.7)';
      ctx.beginPath();
      ctx.roundRect(x1, y + 6, barW, 18, 3);
      ctx.fill();

      // Progress fill
      if (a.pctComplete > 0) {
        const pw = barW * (a.pctComplete / 100);
        ctx.fillStyle = isCrit ? 'rgba(255,51,68,1)' : 'rgba(0,212,255,1)';
        ctx.beginPath();
        ctx.roundRect(x1, y + 6, pw, 18, 3);
        ctx.fill();
      }

      // Label
      ctx.fillStyle = '#000';
      ctx.font = '9px JetBrains Mono';
      if (barW > 40) {
        ctx.fillText(a.pctComplete + '%', x1 + 4, y + 18);
      }
    }
  });

  // Draw dependency arrows
  ctx.strokeStyle = 'rgba(226,232,240,0.25)';
  ctx.lineWidth = 1.5;
  acts.forEach((a, i) => {
    const predsArr = parsePredecessors(a.predecessors);
    predsArr.forEach(p => {
      const predIdx = acts.findIndex(x => x.id === p.id);
      if (predIdx < 0) return;
      const pred = acts[predIdx];
      if (!pred.ef || !a.es) return;

      const fromX = ((pred.ef - minDate) / (1000 * 60 * 60 * 24)) * dayWidth;
      const fromY = headerH + predIdx * rowH + rowH / 2;
      const toX = ((a.es - minDate) / (1000 * 60 * 60 * 24)) * dayWidth;
      const toY = headerH + i * rowH + rowH / 2;

      ctx.beginPath();
      ctx.moveTo(fromX, fromY);
      ctx.lineTo(fromX + 6, fromY);
      ctx.lineTo(fromX + 6, toY);
      ctx.lineTo(toX, toY);
      ctx.stroke();

      // Arrowhead
      ctx.fillStyle = 'rgba(226,232,240,0.25)';
      ctx.beginPath();
      ctx.moveTo(toX, toY);
      ctx.lineTo(toX - 5, toY - 3);
      ctx.lineTo(toX - 5, toY + 3);
      ctx.fill();
    });
  });
}

// ===== RESOURCE MANAGEMENT =====
function addResource(overrides = {}) {
  const id = STATE.nextResId++;
  STATE.resources.push({
    id: 'R' + String(id).padStart(3, '0'),
    name: 'New Resource',
    type: 'labor',
    maxUnits: 1,
    costPerHour: 0,
    ...overrides
  });
  renderResources();
}

function removeResource(idx) {
  const rid = STATE.resources[idx].id;
  STATE.resources.splice(idx, 1);
  STATE.assignments = STATE.assignments.filter(a => a.resourceId !== rid);
  renderResources();
}

function renderResources() {
  const tbody = document.getElementById('resourceBody');
  let html = '';
  STATE.resources.forEach((r, i) => {
    html += `<tr>
      <td><input value="${esc(r.name)}" onchange="STATE.resources[${i}].name=this.value;renderAssignments()"></td>
      <td><select onchange="STATE.resources[${i}].type=this.value" style="width:90px;font-size:13px">
        <option value="labor" ${r.type === 'labor' ? 'selected' : ''}>Labor</option>
        <option value="equipment" ${r.type === 'equipment' ? 'selected' : ''}>Equipment</option>
        <option value="material" ${r.type === 'material' ? 'selected' : ''}>Material</option>
      </select></td>
      <td><input type="number" value="${r.maxUnits}" min="1" onchange="STATE.resources[${i}].maxUnits=+this.value" style="width:60px"></td>
      <td><input type="number" value="${r.costPerHour}" min="0" step="0.01" onchange="STATE.resources[${i}].costPerHour=+this.value" style="width:80px"></td>
      <td><button class="btn btn-danger btn-sm" onclick="removeResource(${i})" style="padding:4px 8px;min-height:32px">&#x2715;</button></td>
    </tr>`;
  });
  tbody.innerHTML = html;
  renderAssignments();
}

function renderAssignments() {
  const tbody = document.getElementById('assignBody');
  let html = '';
  STATE.assignments.forEach((a, i) => {
    const act = STATE.activities.find(x => x.id === a.activityId);
    const res = STATE.resources.find(x => x.id === a.resourceId);
    html += `<tr>
      <td style="font-size:11px">${act ? act.name : a.activityId}</td>
      <td style="font-size:11px">${res ? res.name : a.resourceId}</td>
      <td><input type="number" value="${a.units}" min="0.1" step="0.1" onchange="STATE.assignments[${i}].units=+this.value;renderHistogram()" style="width:60px"></td>
      <td><button class="btn btn-danger btn-sm" onclick="STATE.assignments.splice(${i},1);renderAssignments();renderHistogram()" style="padding:4px 8px;min-height:32px">&#x2715;</button></td>
    </tr>`;
  });
  tbody.innerHTML = html;
  renderHistogram();
}

function showAssignModal() {
  if (STATE.activities.length === 0 || STATE.resources.length === 0) {
    alert('Add activities and resources first.');
    return;
  }
  let html = `<button class="close-btn" onclick="closeModal()">&times;</button>
    <h3>Assign Resource to Activity</h3>
    <div class="row"><div class="field">
      <label class="label">Activity</label>
      <select class="select" id="assignAct">${STATE.activities.map(a => `<option value="${a.id}">${a.id} - ${esc(a.name)}</option>`).join('')}</select>
    </div><div class="field">
      <label class="label">Resource</label>
      <select class="select" id="assignRes">${STATE.resources.map(r => `<option value="${r.id}">${esc(r.name)} (${r.type})</option>`).join('')}</select>
    </div><div class="field">
      <label class="label">Units</label>
      <input type="number" class="input" id="assignUnits" value="1" min="0.1" step="0.1">
    </div></div>
    <button class="btn btn-primary" onclick="doAssign()">Assign</button>`;
  openModal(html);
}

function doAssign() {
  STATE.assignments.push({
    activityId: document.getElementById('assignAct').value,
    resourceId: document.getElementById('assignRes').value,
    units: +document.getElementById('assignUnits').value
  });
  closeModal();
  renderAssignments();
}

// ===== RESOURCE HISTOGRAM =====
function renderHistogram() {
  const canvas = document.getElementById('histogramCanvas');
  if (!canvas) return;
  const rect = canvas.parentElement.getBoundingClientRect();
  canvas.width = rect.width * 2;
  canvas.height = 250 * 2;
  canvas.style.width = rect.width + 'px';
  canvas.style.height = '250px';
  const ctx = canvas.getContext('2d');
  ctx.scale(2, 2);
  const W = rect.width, H = 250;

  ctx.fillStyle = '#0a1018';
  ctx.fillRect(0, 0, W, H);

  if (STATE.activities.length === 0 || STATE.resources.length === 0) {
    ctx.fillStyle = 'rgba(226,232,240,0.2)';
    ctx.font = '12px JetBrains Mono';
    ctx.fillText('Run CPM and assign resources to see histogram', 20, H / 2);
    return;
  }

  // Build daily usage
  let minDate = null, maxDate = null;
  STATE.activities.forEach(a => {
    if (a.es && (!minDate || a.es < minDate)) minDate = new Date(a.es);
    if (a.ef && (!maxDate || a.ef > maxDate)) maxDate = new Date(a.ef);
  });
  if (!minDate || !maxDate) return;

  const totalDays = Math.ceil((maxDate - minDate) / (1000 * 60 * 60 * 24)) + 1;
  const usage = new Array(totalDays).fill(0);
  let maxCap = 0;

  STATE.resources.forEach(r => maxCap += r.maxUnits);

  STATE.assignments.forEach(asgn => {
    const act = STATE.activities.find(a => a.id === asgn.activityId);
    if (!act || !act.es || !act.ef) return;
    const s = Math.floor((act.es - minDate) / (1000 * 60 * 60 * 24));
    const e = Math.floor((act.ef - minDate) / (1000 * 60 * 60 * 24));
    for (let i = s; i <= e && i < totalDays; i++) {
      usage[i] += asgn.units;
    }
  });

  const maxUsage = Math.max(...usage, maxCap, 1);
  const barW = Math.max((W - 60) / totalDays, 2);
  const chartH = H - 40;

  // Capacity line
  const capY = 30 + chartH * (1 - maxCap / maxUsage);
  ctx.strokeStyle = 'rgba(255,153,0,0.5)';
  ctx.setLineDash([4, 4]);
  ctx.beginPath(); ctx.moveTo(50, capY); ctx.lineTo(W - 10, capY); ctx.stroke();
  ctx.setLineDash([]);
  ctx.fillStyle = 'rgba(255,153,0,0.5)';
  ctx.font = '8px JetBrains Mono';
  ctx.fillText('CAP: ' + maxCap, 2, capY - 2);

  // Bars
  for (let i = 0; i < totalDays; i++) {
    const x = 50 + i * barW;
    const bh = (usage[i] / maxUsage) * chartH;
    const overAlloc = usage[i] > maxCap;
    ctx.fillStyle = overAlloc ? 'rgba(255,51,68,0.7)' : 'rgba(0,212,255,0.5)';
    ctx.fillRect(x, 30 + chartH - bh, barW - 1, bh);
  }

  // Y axis
  ctx.fillStyle = 'rgba(226,232,240,0.3)';
  ctx.font = '9px JetBrains Mono';
  for (let i = 0; i <= 4; i++) {
    const val = (maxUsage * i / 4).toFixed(1);
    const y = 30 + chartH * (1 - i / 4);
    ctx.fillText(val, 2, y + 3);
    ctx.strokeStyle = 'rgba(26,42,58,0.3)';
    ctx.beginPath(); ctx.moveTo(50, y); ctx.lineTo(W - 10, y); ctx.stroke();
  }
}

// ===== RESOURCE LEVELING =====
function levelResources() {
  if (STATE.activities.length === 0) { alert('Add activities first.'); return; }
  runCPM();

  // Simple leveling: delay non-critical activities that cause over-allocation
  const acts = STATE.activities;
  let minDate = null, maxDate = null;
  acts.forEach(a => {
    if (a.es && (!minDate || a.es < minDate)) minDate = new Date(a.es);
    if (a.ef && (!maxDate || a.ef > maxDate)) maxDate = new Date(a.ef);
  });
  if (!minDate || !maxDate) return;

  const totalDays = Math.ceil((maxDate - minDate) / (1000 * 60 * 60 * 24)) + 30;
  let iterations = 0;
  const maxIter = 50;

  while (iterations < maxIter) {
    iterations++;
    let overAllocDay = -1;

    // Check each day for over-allocation per resource
    for (let day = 0; day < totalDays; day++) {
      const date = new Date(minDate);
      date.setDate(date.getDate() + day);

      for (const res of STATE.resources) {
        let usage = 0;
        STATE.assignments.filter(a => a.resourceId === res.id).forEach(asgn => {
          const act = acts.find(a => a.id === asgn.activityId);
          if (!act || !act.es || !act.ef) return;
          if (date >= act.es && date <= act.ef) usage += asgn.units;
        });
        if (usage > res.maxUnits) {
          overAllocDay = day;
          break;
        }
      }
      if (overAllocDay >= 0) break;
    }

    if (overAllocDay < 0) break;

    // Find non-critical activities on this day and delay the one with most float
    const date = new Date(minDate);
    date.setDate(date.getDate() + overAllocDay);
    let bestAct = null, bestFloat = -1;

    acts.forEach(a => {
      if (!a.es || !a.ef || a.totalFloat === 0) return;
      if (date >= a.es && date <= a.ef && a.totalFloat > bestFloat) {
        bestFloat = a.totalFloat;
        bestAct = a;
      }
    });

    if (!bestAct) break;
    const cal = getCalendar(bestAct.calendarId);
    bestAct.es = addWorkDays(bestAct.es, 1, cal);
    bestAct.ef = addWorkDays(bestAct.es, bestAct.duration, cal);
  }

  runCPM();
  renderResources();
  alert('Resource leveling complete (' + iterations + ' iterations).');
}

// ===== EARNED VALUE =====
function calcEV() {
  const acts = STATE.activities;
  if (acts.length === 0) return;

  let minDate = null, maxDate = null;
  acts.forEach(a => {
    if (a.es && (!minDate || a.es < minDate)) minDate = new Date(a.es);
    if (a.ef && (!maxDate || a.ef > maxDate)) maxDate = new Date(a.ef);
  });
  if (!minDate || !maxDate) return;

  const dataDateStr = document.getElementById('evDataDate').value;
  const dataDate = dataDateStr ? new Date(dataDateStr) : new Date();

  const BAC = acts.reduce((s, a) => s + (a.budgetCost || a.duration * 1000), 0);
  let PV = 0, EV = 0, AC = 0;

  acts.forEach(a => {
    const budget = a.budgetCost || a.duration * 1000;
    if (a.ef && a.ef <= dataDate) PV += budget;
    else if (a.es && a.es <= dataDate && a.ef) {
      const totalDur = (a.ef - a.es) / (1000 * 60 * 60 * 24);
      const elapsed = (dataDate - a.es) / (1000 * 60 * 60 * 24);
      PV += budget * Math.min(elapsed / totalDur, 1);
    }
    EV += budget * (a.pctComplete / 100);
    AC += a.actualCost || budget * (a.pctComplete / 100) * (0.9 + Math.random() * 0.2);
  });

  const SV = EV - PV;
  const CV = EV - AC;
  const SPI = PV > 0 ? EV / PV : 1;
  const CPI = AC > 0 ? EV / AC : 1;
  const EAC = CPI > 0 ? BAC / CPI : BAC;
  const ETC = EAC - AC;
  const VAC = BAC - EAC;

  const metrics = [
    { label: 'BAC', value: '$' + fmt(BAC), cls: '' },
    { label: 'PV', value: '$' + fmt(PV), cls: '' },
    { label: 'EV', value: '$' + fmt(EV), cls: '' },
    { label: 'AC', value: '$' + fmt(AC), cls: '' },
    { label: 'SV', value: '$' + fmt(SV), cls: SV < 0 ? 'bad' : 'good' },
    { label: 'CV', value: '$' + fmt(CV), cls: CV < 0 ? 'bad' : 'good' },
    { label: 'SPI', value: SPI.toFixed(2), cls: SPI < 1 ? 'bad' : SPI > 1 ? 'good' : '' },
    { label: 'CPI', value: CPI.toFixed(2), cls: CPI < 1 ? 'bad' : CPI > 1 ? 'good' : '' },
    { label: 'EAC', value: '$' + fmt(EAC), cls: EAC > BAC ? 'warn' : 'good' },
    { label: 'ETC', value: '$' + fmt(ETC), cls: '' },
    { label: 'VAC', value: '$' + fmt(VAC), cls: VAC < 0 ? 'bad' : 'good' },
  ];

  document.getElementById('evMetrics').innerHTML = metrics.map(m => `<div class="metric ${m.cls}"><div class="mv">${m.value}</div><div class="ml">${m.label}</div></div>`).join('');

  // S-Curve
  renderSCurve(minDate, maxDate, BAC, acts, dataDate);

  // Period table
  const totalWeeks = Math.ceil((maxDate - minDate) / (7 * 24 * 60 * 60 * 1000));
  let html = '';
  for (let w = 0; w <= Math.min(totalWeeks, 52); w++) {
    const weekEnd = new Date(minDate);
    weekEnd.setDate(weekEnd.getDate() + w * 7);
    let wPV = 0, wEV = 0, wAC = 0;
    acts.forEach(a => {
      const budget = a.budgetCost || a.duration * 1000;
      if (a.ef && a.ef <= weekEnd) wPV += budget;
      else if (a.es && a.es <= weekEnd && a.ef) {
        const t = (a.ef - a.es) / (1000 * 60 * 60 * 24);
        const e = (weekEnd - a.es) / (1000 * 60 * 60 * 24);
        wPV += budget * Math.min(e / t, 1);
      }
      if (weekEnd <= dataDate) {
        wEV += budget * (a.pctComplete / 100) * Math.min(w / totalWeeks * 2, 1);
        wAC += (a.actualCost || budget * (a.pctComplete / 100)) * Math.min(w / totalWeeks * 2, 1);
      }
    });
    const wSV = wEV - wPV, wCV = wEV - wAC;
    const wSPI = wPV > 0 ? (wEV / wPV).toFixed(2) : '-';
    const wCPI = wAC > 0 ? (wEV / wAC).toFixed(2) : '-';
    html += `<tr><td>Wk ${w + 1}</td><td>$${fmt(wPV)}</td><td>$${fmt(wEV)}</td><td>$${fmt(wAC)}</td><td style="color:${wSV < 0 ? 'var(--red)' : 'var(--green)'}">$${fmt(wSV)}</td><td style="color:${wCV < 0 ? 'var(--red)' : 'var(--green)'}">$${fmt(wCV)}</td><td>${wSPI}</td><td>${wCPI}</td></tr>`;
  }
  document.getElementById('evBody').innerHTML = html;
}

function renderSCurve(minDate, maxDate, BAC, acts, dataDate) {
  const canvas = document.getElementById('scurveCanvas');
  const rect = canvas.parentElement.getBoundingClientRect();
  canvas.width = rect.width * 2;
  canvas.height = 300 * 2;
  canvas.style.width = rect.width + 'px';
  canvas.style.height = '300px';
  const ctx = canvas.getContext('2d');
  ctx.scale(2, 2);
  const W = rect.width, H = 300;

  ctx.fillStyle = '#0a1018';
  ctx.fillRect(0, 0, W, H);

  const pad = { t: 30, r: 20, b: 30, l: 60 };
  const cW = W - pad.l - pad.r;
  const cH = H - pad.t - pad.b;

  const totalDays = Math.ceil((maxDate - minDate) / (1000 * 60 * 60 * 24));
  if (totalDays <= 0) return;

  // Generate PV, EV, AC curves
  const pvPts = [], evPts = [], acPts = [];
  for (let d = 0; d <= totalDays; d += Math.max(1, Math.floor(totalDays / 50))) {
    const date = new Date(minDate);
    date.setDate(date.getDate() + d);
    let pv = 0, ev = 0, ac = 0;
    acts.forEach(a => {
      const budget = a.budgetCost || a.duration * 1000;
      if (a.ef && a.ef <= date) pv += budget;
      else if (a.es && a.es <= date && a.ef) {
        const t = (a.ef - a.es) / (1000 * 60 * 60 * 24);
        const e = (date - a.es) / (1000 * 60 * 60 * 24);
        pv += budget * Math.min(e / t, 1);
      }
      if (date <= dataDate) {
        const progress = a.pctComplete / 100;
        const timeFrac = Math.min(d / totalDays * 2, 1);
        ev += budget * progress * timeFrac;
        ac += (a.actualCost || budget * progress) * timeFrac;
      }
    });
    const x = pad.l + (d / totalDays) * cW;
    pvPts.push({ x, y: pad.t + cH * (1 - pv / BAC) });
    evPts.push({ x, y: pad.t + cH * (1 - ev / BAC) });
    acPts.push({ x, y: pad.t + cH * (1 - ac / BAC) });
  }

  function drawLine(pts, color) {
    if (pts.length < 2) return;
    ctx.strokeStyle = color;
    ctx.lineWidth = 2;
    ctx.beginPath();
    ctx.moveTo(pts[0].x, pts[0].y);
    pts.forEach(p => ctx.lineTo(p.x, p.y));
    ctx.stroke();
  }

  // Grid
  ctx.strokeStyle = 'rgba(26,42,58,0.3)';
  ctx.lineWidth = 0.5;
  for (let i = 0; i <= 4; i++) {
    const y = pad.t + cH * i / 4;
    ctx.beginPath(); ctx.moveTo(pad.l, y); ctx.lineTo(W - pad.r, y); ctx.stroke();
    ctx.fillStyle = 'rgba(226,232,240,0.3)';
    ctx.font = '9px JetBrains Mono';
    ctx.fillText('$' + fmt(BAC * (1 - i / 4)), 2, y + 3);
  }

  drawLine(pvPts, '#00d4ff');
  drawLine(evPts, '#00ff88');
  drawLine(acPts, '#ff9900');

  // Legend
  const legendY = 14;
  [['PV (Planned)', '#00d4ff'], ['EV (Earned)', '#00ff88'], ['AC (Actual)', '#ff9900']].forEach(([label, color], i) => {
    const x = pad.l + i * 140;
    ctx.fillStyle = color;
    ctx.fillRect(x, legendY - 6, 12, 3);
    ctx.font = '9px JetBrains Mono';
    ctx.fillText(label, x + 16, legendY);
  });
}

function importCSV() {
  const input = document.createElement('input');
  input.type = 'file';
  input.accept = '.csv';
  input.onchange = e => {
    const file = e.target.files[0];
    if (!file) return;
    const reader = new FileReader();
    reader.onload = ev => {
      const lines = ev.target.result.split('\n').filter(l => l.trim());
      if (lines.length < 2) return;
      const headers = lines[0].split(',').map(h => h.trim().toLowerCase());
      for (let i = 1; i < lines.length; i++) {
        const vals = lines[i].match(/(".*?"|[^,]*)/g).map(v => v.replace(/^"|"$/g, '').trim());
        const obj = {};
        headers.forEach((h, j) => obj[h] = vals[j] || '');
        addActivity({
          name: obj.name || 'Imported ' + i,
          wbs: obj.wbs || '1',
          duration: parseInt(obj.duration) || 5,
          remainingDuration: parseInt(obj.remainingdur) || parseInt(obj.duration) || 5,
          pctComplete: parseInt(obj.pctcomplete) || 0,
          predecessors: obj.predecessors || '',
          budgetCost: parseFloat(obj.budgetcost) || 0,
          actualCost: parseFloat(obj.actualcost) || 0
        });
      }
    };
    reader.readAsText(file);
  };
  input.click();
}

  }
  html += '</div>';
  openModal(html);

  window._templates = templates;
}

function loadTemplate(key) {
  const tpl = window._templates[key];
  if (!tpl) return;
  if (STATE.activities.length > 0 && !confirm('This will replace current activities. Continue?')) return;
  STATE.activities = [];
  STATE.nextId = 1;
  STATE.projectName = tpl.name;
  tpl.activities.forEach(a => {
    addActivity({
      name: a.name,
      wbs: a.wbs,
      duration: a.duration,
      remainingDuration: a.duration,
      predecessors: a.predecessors,
      isMilestone: a.isMilestone || false,
      budgetCost: a.duration * 2500
    });
  });
  closeModal();
  runCPM();
}

// ===== SAVE / LOAD =====
function saveProject() {
  const name = prompt('Project name:', STATE.projectName);
  if (!name) return;
  STATE.projectName = name;
  const key = LS_PREFIX + name.replace(/\s+/g, '_');
  const data = JSON.parse(JSON.stringify(STATE));
  // Convert dates to ISO strings
  data.activities.forEach(a => {
    ['es', 'ef', 'ls', 'lf'].forEach(f => {
      if (a[f]) a[f] = new Date(a[f]).toISOString();
    });
  });
  data.savedAt = new Date().toISOString();
  localStorage.setItem(key, JSON.stringify(data));
  alert('Project saved: ' + name);
}

function showLoadModal() {
  const keys = Object.keys(localStorage).filter(k => k.startsWith(LS_PREFIX));
  let html = `<button class="close-btn" onclick="closeModal()">&times;</button><h3>Load Project</h3>`;
  if (keys.length === 0) {
    html += '<p style="color:var(--textDim);font-size:12px">No saved projects found.</p>';
  } else {
    keys.forEach(k => {
      const data = JSON.parse(localStorage.getItem(k));
      const name = data.projectName || k.replace(LS_PREFIX, '');
      html += `<div class="saved-item">
        <div><div style="font-size:12px;font-weight:600">${esc(name)}</div><div style="font-size:10px;color:var(--textDim)">${data.savedAt ? new Date(data.savedAt).toLocaleString() : 'Unknown'} | ${(data.activities || []).length} activities</div></div>
        <div style="display:flex;gap:6px">
          <button class="btn btn-primary btn-sm" onclick="loadProject('${k}')">Load</button>
          <button class="btn btn-danger btn-sm" onclick="deleteProject('${k}')">Delete</button>
        </div>
      </div>`;
    });
  }
  openModal(html);
}

function loadProject(key) {
  const data = JSON.parse(localStorage.getItem(key));
  if (!data) return;
  // Restore dates
  data.activities.forEach(a => {
    ['es', 'ef', 'ls', 'lf'].forEach(f => {
      if (a[f]) a[f] = new Date(a[f]);
    });
  });
  if (data.baselines) {
    data.baselines.forEach(bl => {
      if (bl && bl.activities) {
        bl.activities.forEach(a => {
          ['es', 'ef', 'ls', 'lf'].forEach(f => {
            if (a[f]) a[f] = new Date(a[f]);
          });
        });
      }
    });
  }
  Object.assign(STATE, data);
  closeModal();
  renderActivities();
  renderResources();
}

function deleteProject(key) {
  if (!confirm('Delete this project?')) return;
  localStorage.removeItem(key);
  closeModal();
  showLoadModal();
}

// ===== MODAL =====
function openModal(html) {
  document.getElementById('modalContent').innerHTML = html;
  document.getElementById('modalOverlay').classList.add('show');
}

function closeModal() {
  document.getElementById('modalOverlay').classList.remove('show');
}

document.getElementById('modalOverlay').addEventListener('click', e => {
  if (e.target === document.getElementById('modalOverlay')) closeModal();
});

// ===== UTILS =====
function esc(s) { return String(s || '').replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;').replace(/"/g, '&quot;'); }
function fmtDate(d) { if (!d) return '-'; const dt = new Date(d); return dt.toLocaleDateString('en-US', { month: 'short', day: 'numeric', year: '2-digit' }); }
function fmt(n) { return Math.round(n).toLocaleString(); }

// ===== INIT =====
renderActivities();
renderResources();
</script>
