<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Bulk Image Timestamper</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;600&family=Barlow+Condensed:wght@400;600;700&display=swap');

  :root {
    --bg: #0f1117;
    --surface: #181c24;
    --border: #2a2f3e;
    --accent: #f5c842;
    --accent2: #e07b2a;
    --text: #d4d8e2;
    --muted: #5a6072;
    --success: #4caf82;
    --radius: 10px;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Barlow Condensed', sans-serif;
    min-height: 100vh;
    padding: 32px 20px 60px;
  }

  /* ── Header ── */
  header {
    max-width: 860px;
    margin: 0 auto 36px;
    display: flex;
    align-items: flex-end;
    justify-content: space-between;
    gap: 16px;
    flex-wrap: wrap;
  }
  .logo-group { display: flex; flex-direction: column; gap: 4px; }
  .eyebrow {
    font-family: 'IBM Plex Mono', monospace;
    font-size: 10px;
    letter-spacing: .18em;
    text-transform: uppercase;
    color: var(--accent);
  }
  h1 {
    font-size: clamp(26px, 4vw, 40px);
    font-weight: 700;
    letter-spacing: .02em;
    line-height: 1;
    color: #fff;
  }
  h1 span { color: var(--accent); }
  .status-badge {
    font-family: 'IBM Plex Mono', monospace;
    font-size: 11px;
    padding: 5px 12px;
    border-radius: 20px;
    border: 1px solid var(--border);
    color: var(--muted);
    white-space: nowrap;
  }
  .status-badge.active { border-color: var(--success); color: var(--success); }

  /* ── Main Card ── */
  .card {
    max-width: 860px;
    margin: 0 auto 20px;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 14px;
    padding: 28px;
  }

  /* ── Drop Zone ── */
  .drop-zone {
    border: 2px dashed var(--border);
    border-radius: var(--radius);
    padding: 48px 24px;
    text-align: center;
    cursor: pointer;
    transition: all .2s;
    position: relative;
    background: #0f1117;
  }
  .drop-zone:hover, .drop-zone.drag-over {
    border-color: var(--accent);
    background: rgba(245,200,66,.04);
  }
  .drop-zone input[type="file"] {
    position: absolute; inset: 0; opacity: 0; cursor: pointer; width: 100%; height: 100%;
  }
  .drop-icon {
    font-size: 36px;
    margin-bottom: 12px;
  }
  .drop-label {
    font-size: 18px;
    font-weight: 600;
    color: #fff;
    margin-bottom: 6px;
  }
  .drop-sub {
    font-family: 'IBM Plex Mono', monospace;
    font-size: 11px;
    color: var(--muted);
    letter-spacing: .06em;
  }

  /* ── Options Row ── */
  .options-row {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
    gap: 16px;
    margin-top: 22px;
  }
  .option-group label {
    display: block;
    font-family: 'IBM Plex Mono', monospace;
    font-size: 10px;
    letter-spacing: .1em;
    text-transform: uppercase;
    color: var(--muted);
    margin-bottom: 8px;
  }
  .option-group input[type="datetime-local"],
  .option-group select {
    width: 100%;
    background: #0f1117;
    border: 1.5px solid var(--border);
    border-radius: 8px;
    padding: 9px 12px;
    color: var(--text);
    font-family: 'IBM Plex Mono', monospace;
    font-size:16px;
    appearance: none;
    -webkit-appearance: none;
    transition: border-color .2s;
    cursor: pointer;
  }
  .option-group input:focus,
  .option-group select:focus { outline: none; border-color: var(--accent); }

  .toggle-row {
    display: flex;
    align-items: center;
    gap: 10px;
    margin-top: 16px;
    flex-wrap: wrap;
  }
  .toggle-btn {
    padding: 7px 16px;
    border-radius: 20px;
    border: 1.5px solid var(--border);
    background: transparent;
    color: var(--muted);
    font-family: 'IBM Plex Mono', monospace;
    font-size: 11px;
    cursor: pointer;
    transition: all .15s;
    letter-spacing: .04em;
  }
  .toggle-btn.active {
    border-color: var(--accent);
    background: var(--accent);
    color: #0f1117;
    font-weight: 600;
  }

  /* ── Action Button ── */
  .action-btn {
    margin-top: 24px;
    width: 100%;
    padding: 15px;
    border-radius: var(--radius);
    border: none;
    background: var(--accent);
    color: #0f1117;
    font-family: 'Barlow Condensed', sans-serif;
    font-size: 17px;
    font-weight: 700;
    letter-spacing: .06em;
    cursor: pointer;
    transition: background .2s;
    text-transform: uppercase;
  }
  .action-btn:hover { background: #f7d456; }
  .action-btn:disabled { opacity: .35; cursor: not-allowed; }

  /* ── Progress ── */
  .progress-wrap {
    margin-top: 20px;
    display: none;
  }
  .progress-wrap.visible { display: block; }
  .progress-bar-track {
    height: 4px;
    background: var(--border);
    border-radius: 4px;
    overflow: hidden;
    margin-bottom: 8px;
  }
  .progress-bar-fill {
    height: 100%;
    background: var(--accent);
    border-radius: 4px;
    transition: width .3s ease;
    width: 0%;
  }
  .progress-label {
    font-family: 'IBM Plex Mono', monospace;
    font-size: 11px;
    color: var(--muted);
    text-align: right;
  }

  /* ── Preview Grid ── */
  .preview-section {
    max-width: 860px;
    margin: 0 auto;
    display: none;
  }
  .preview-section.visible { display: block; }
  .section-title {
    font-family: 'IBM Plex Mono', monospace;
    font-size: 10px;
    letter-spacing: .15em;
    text-transform: uppercase;
    color: var(--accent);
    margin-bottom: 16px;
  }
  .preview-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(180px, 1fr));
    gap: 12px;
  }
  .preview-item {
    border: 1px solid var(--border);
    border-radius: 8px;
    overflow: hidden;
    background: #0f1117;
    position: relative;
  }
  .preview-item img {
    width: 100%;
    display: block;
    aspect-ratio: 4/3;
    object-fit: cover;
  }
  .preview-item .filename {
    font-family: 'IBM Plex Mono', monospace;
    font-size: 9px;
    color: var(--muted);
    padding: 6px 8px;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
    border-top: 1px solid var(--border);
  }
  .dl-btn {
    display: block;
    width: calc(100% - 16px);
    margin: 0 8px 8px;
    padding: 6px;
    background: rgba(245,200,66,.1);
    border: 1px solid var(--accent);
    border-radius: 6px;
    color: var(--accent);
    font-family: 'IBM Plex Mono', monospace;
    font-size: 10px;
    text-align: center;
    cursor: pointer;
    letter-spacing: .05em;
    transition: background .15s;
    text-decoration: none;
  }
  .dl-btn:hover { background: rgba(245,200,66,.2); }

  .dl-all-btn {
    margin-top: 20px;
    width: 100%;
    padding: 13px;
    border-radius: var(--radius);
    border: 1.5px solid var(--accent);
    background: transparent;
    color: var(--accent);
    font-family: 'Barlow Condensed', sans-serif;
    font-size: 16px;
    font-weight: 700;
    letter-spacing: .06em;
    cursor: pointer;
    text-transform: uppercase;
    transition: all .2s;
  }
  .dl-all-btn:hover { background: rgba(245,200,66,.08); }

  .info-row {
    display: flex;
    gap: 20px;
    margin-top: 16px;
    flex-wrap: wrap;
  }
  .info-chip {
    font-family: 'IBM Plex Mono', monospace;
    font-size: 11px;
    color: var(--muted);
    background: #0f1117;
    border: 1px solid var(--border);
    padding: 4px 10px;
    border-radius: 6px;
  }
  .info-chip strong { color: var(--text); }

  canvas { display: none; }
</style>
</head>
<body>

<header>
  <div class="logo-group">
    <div class="eyebrow">◆ Korb Engineering · Field Documentation Tool</div>
    <h1>Bulk Image <span>Timestamper</span></h1>
  </div>
  <div class="status-badge" id="statusBadge">No images loaded</div>
</header>

<!-- Controls Card -->
<div class="card">
  <!-- Drop Zone -->
  <div class="drop-zone" id="dropZone">
    <input type="file" id="fileInput" accept="image/*" multiple />
    <div class="drop-icon">📁</div>
    <div class="drop-label">Drop images here or click to browse</div>
    <div class="drop-sub">JPG · PNG · WEBP · GIF · BMP — unlimited files</div>
  </div>

  <!-- Options -->
  <div class="options-row">
    <div class="option-group">
      <label>Timestamp Mode</label>
      <select id="timestampMode">
        <option value="exif">Use each image's EXIF date (if available)</option>
        <option value="custom">Use a single custom date/time for all</option>
        <option value="now">Use current date/time for all</option>
      </select>
    </div>
    <div class="option-group" id="customDateGroup" style="display:none;">
      <label>Custom Date &amp; Time</label>
      <input type="datetime-local" id="customDate" />
    </div>
    <div class="option-group">
      <label>Font Size</label>
      <select id="fontSize">
        <option value="auto">Auto (scales with image)</option>
        <option value="24">Small — 24px</option>
        <option value="36">Medium — 36px</option>
        <option value="48">Large — 48px</option>
        <option value="64">X-Large — 64px</option>
      </select>
    </div>
  </div>

  <div class="options-row" style="margin-top:16px;">
    <div class="option-group">
      <label>Timezone</label>
      <select id="timezone">
        <option value="EST">Eastern (EST/EDT)</option>
        <option value="CST" selected>Central (CST/CDT)</option>
        <option value="MST">Mountain (MST/MDT)</option>
        <option value="PST">Pacific (PST/PDT)</option>
        <option value="AKST">Alaska (AKST/AKDT)</option>
        <option value="HST">Hawaii (HST)</option>
        <option value="UTC">UTC</option>
      </select>
    </div>
    <div class="option-group">
      <label>Output Format</label>
      <select id="outputFormat">
        <option value="image/jpeg">JPEG (smaller file)</option>
        <option value="image/png">PNG (lossless)</option>
      </select>
    </div>
    <div class="option-group">
      <label>JPEG Quality (if JPEG)</label>
      <select id="jpegQuality">
        <option value="0.95">95% — Near lossless</option>
        <option value="0.85" selected>85% — High quality</option>
        <option value="0.75">75% — Balanced</option>
        <option value="0.60">60% — Smaller file</option>
      </select>
    </div>
  </div>

  <!-- Generate Button -->
  <button class="action-btn" id="processBtn" disabled>
    Stamp Timestamps →
  </button>

  <!-- Progress -->
  <div class="progress-wrap" id="progressWrap">
    <div class="progress-bar-track">
      <div class="progress-bar-fill" id="progressFill"></div>
    </div>
    <div class="progress-label" id="progressLabel">0 / 0</div>
  </div>
</div>

<!-- Preview / Download Section -->
<div class="preview-section" id="previewSection">
  <div class="card">
    <div class="section-title">◆ Processed Images</div>
    <div class="info-row">
      <div class="info-chip"><strong id="countLabel">0</strong> images processed</div>
      <div class="info-chip">Timestamp: <strong>Arial · Yellow · Black Outline · Bottom-Left ⅛</strong></div>
    </div>
    <button class="dl-all-btn" id="dlAllBtn" style="display:none;">⬇ Download All as ZIP</button>
    <div class="preview-grid" id="previewGrid"></div>
  </div>
</div>

<canvas id="workCanvas"></canvas>

<!-- JSZip for bulk download -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>

<script>
// ── State ──────────────────────────────────────────────────────────────────
let files = [];
let processedBlobs = []; // {blob, filename}

// ── DOM Refs ───────────────────────────────────────────────────────────────
const fileInput      = document.getElementById('fileInput');
const dropZone       = document.getElementById('dropZone');
const processBtn     = document.getElementById('processBtn');
const progressWrap   = document.getElementById('progressWrap');
const progressFill   = document.getElementById('progressFill');
const progressLabel  = document.getElementById('progressLabel');
const previewSection = document.getElementById('previewSection');
const previewGrid    = document.getElementById('previewGrid');
const statusBadge    = document.getElementById('statusBadge');
const countLabel     = document.getElementById('countLabel');
const dlAllBtn       = document.getElementById('dlAllBtn');
const canvas         = document.getElementById('workCanvas');
const ctx            = canvas.getContext('2d');
const timestampMode  = document.getElementById('timestampMode');
const customDateGrp  = document.getElementById('customDateGroup');
const customDateInp  = document.getElementById('customDate');
const fontSizeSel    = document.getElementById('fontSize');
const timezoneSel    = document.getElementById('timezone');
const outputFormat   = document.getElementById('outputFormat');
const jpegQuality    = document.getElementById('jpegQuality');

// ── Drag & Drop ────────────────────────────────────────────────────────────
dropZone.addEventListener('dragover', e => { e.preventDefault(); dropZone.classList.add('drag-over'); });
dropZone.addEventListener('dragleave', () => dropZone.classList.remove('drag-over'));
dropZone.addEventListener('drop', e => {
  e.preventDefault();
  dropZone.classList.remove('drag-over');
  handleFiles([...e.dataTransfer.files].filter(f => f.type.startsWith('image/')));
});
fileInput.addEventListener('change', () => handleFiles([...fileInput.files]));

timestampMode.addEventListener('change', () => {
  customDateGrp.style.display = timestampMode.value === 'custom' ? 'block' : 'none';
});

// ── File Handling ──────────────────────────────────────────────────────────
function handleFiles(newFiles) {
  if (!newFiles.length) return;
  files = newFiles;
  processedBlobs = [];
  previewGrid.innerHTML = '';
  previewSection.classList.remove('visible');
  dlAllBtn.style.display = 'none';
  statusBadge.textContent = `${files.length} image${files.length > 1 ? 's' : ''} loaded`;
  statusBadge.className = 'status-badge active';
  processBtn.disabled = false;
}

// ── EXIF Date Extraction ────────────────────────────────────────────────────
// Minimal EXIF parser — reads DateTimeOriginal (tag 0x9003) or DateTime (0x0132)
async function readExifDate(file) {
  return new Promise(resolve => {
    const reader = new FileReader();
    reader.onload = e => {
      try {
        const buf = e.target.result;
        const view = new DataView(buf);
        // Check JPEG SOI
        if (view.getUint16(0) !== 0xFFD8) { resolve(null); return; }
        let offset = 2;
        while (offset < view.byteLength - 4) {
          const marker = view.getUint16(offset);
          if (marker === 0xFFE1) { // APP1 (EXIF)
            const exifOffset = offset + 4; // skip marker + length
            // Check 'Exif\0\0'
            if (view.getUint32(exifOffset) === 0x45786966 && view.getUint16(exifOffset + 4) === 0) {
              const tiffStart = exifOffset + 6;
              const le = view.getUint16(tiffStart) === 0x4949;
              const ifdOffset = tiffStart + view.getUint32(tiffStart + 4, le);
              const numEntries = view.getUint16(ifdOffset, le);
              for (let i = 0; i < numEntries; i++) {
                const entryOffset = ifdOffset + 2 + i * 12;
                const tag = view.getUint16(entryOffset, le);
                if (tag === 0x0132) { // DateTime
                  const valOffset = tiffStart + view.getUint32(entryOffset + 8, le);
                  let str = '';
                  for (let j = 0; j < 19; j++) str += String.fromCharCode(view.getUint8(valOffset + j));
                  resolve(parseExifDate(str)); return;
                }
              }
              // Try SubIFD for DateTimeOriginal
              const subIfd = findSubIFD(view, tiffStart, ifdOffset, le);
              if (subIfd) {
                const d = findTagInIFD(view, tiffStart, subIfd, 0x9003, le);
                resolve(d); return;
              }
            }
            resolve(null); return;
          }
          offset += 2 + view.getUint16(offset + 2);
        }
        resolve(null);
      } catch { resolve(null); }
    };
    reader.readAsArrayBuffer(file.slice(0, 131072)); // read first 128KB
  });
}

function findSubIFD(view, tiffStart, ifdOffset, le) {
  const n = view.getUint16(ifdOffset, le);
  for (let i = 0; i < n; i++) {
    const e = ifdOffset + 2 + i * 12;
    if (view.getUint16(e, le) === 0x8769) { // ExifIFD pointer
      return tiffStart + view.getUint32(e + 8, le);
    }
  }
  return null;
}

function findTagInIFD(view, tiffStart, ifdOffset, tag, le) {
  if (!ifdOffset) return null;
  try {
    const n = view.getUint16(ifdOffset, le);
    for (let i = 0; i < n; i++) {
      const e = ifdOffset + 2 + i * 12;
      if (view.getUint16(e, le) === tag) {
        const valOffset = tiffStart + view.getUint32(e + 8, le);
        let str = '';
        for (let j = 0; j < 19; j++) str += String.fromCharCode(view.getUint8(valOffset + j));
        return parseExifDate(str);
      }
    }
  } catch {}
  return null;
}

function parseExifDate(str) {
  // "YYYY:MM:DD HH:MM:SS"
  const m = str.match(/^(\d{4}):(\d{2}):(\d{2}) (\d{2}):(\d{2}):(\d{2})/);
  if (!m) return null;
  return new Date(+m[1], +m[2]-1, +m[3], +m[4], +m[5], +m[6]);
}

// ── Timezone Definitions ───────────────────────────────────────────────────
// stdOffset = UTC offset in hours during standard time (negative = west of UTC)
// dstOffset = UTC offset during daylight saving time (null if no DST)
// stdAbbr / dstAbbr = abbreviation strings for the timestamp
const TIMEZONE_DATA = {
  EST:  { stdOffset: -5, dstOffset: -4, stdAbbr: 'EST', dstAbbr: 'EDT', hasDST: true },
  CST:  { stdOffset: -6, dstOffset: -5, stdAbbr: 'CST', dstAbbr: 'CDT', hasDST: true },
  MST:  { stdOffset: -7, dstOffset: -6, stdAbbr: 'MST', dstAbbr: 'MDT', hasDST: true },
  PST:  { stdOffset: -8, dstOffset: -7, stdAbbr: 'PST', dstAbbr: 'PDT', hasDST: true },
  AKST: { stdOffset: -9, dstOffset: -8, stdAbbr: 'AKST', dstAbbr: 'AKDT', hasDST: true },
  HST:  { stdOffset: -10, dstOffset: null, stdAbbr: 'HST', dstAbbr: null, hasDST: false },
  UTC:  { stdOffset: 0, dstOffset: null, stdAbbr: 'UTC', dstAbbr: null, hasDST: false },
};

// US DST runs from 2nd Sunday in March at 2:00 AM to 1st Sunday in November at 2:00 AM (local std time)
function nthSundayOf(year, month, n) {
  let d = new Date(Date.UTC(year, month, 1));
  while (d.getUTCDay() !== 0) d.setUTCDate(d.getUTCDate() + 1);
  d.setUTCDate(d.getUTCDate() + (n - 1) * 7);
  return d;
}

function isDST(utcDate, tz) {
  if (!tz.hasDST) return false;
  const y = utcDate.getUTCFullYear();
  // 2nd Sunday in March at 2:00 AM local standard time → convert to UTC
  const marchSun = nthSundayOf(y, 2, 2);
  const dstStart = new Date(marchSun.getTime() + (2 - tz.stdOffset) * 3600000);
  // 1st Sunday in November at 2:00 AM local daylight time → convert to UTC
  const novSun = nthSundayOf(y, 10, 1);
  const dstEnd = new Date(novSun.getTime() + (2 - tz.dstOffset) * 3600000);
  return utcDate >= dstStart && utcDate < dstEnd;
}

function formatTimestamp(date) {
  const tzKey = timezoneSel.value;
  const tz = TIMEZONE_DATA[tzKey];
  const dst = isDST(date, tz);
  const offsetHrs = dst ? tz.dstOffset : tz.stdOffset;
  const offsetMs = offsetHrs * 3600000;
  const localMs = date.getTime() + (date.getTimezoneOffset() * 60000) + offsetMs;
  const d = new Date(localMs);

  const days   = ['Sunday','Monday','Tuesday','Wednesday','Thursday','Friday','Saturday'];
  const months = ['January','February','March','April','May','June',
                  'July','August','September','October','November','December'];

  const dayName = days[d.getDay()];
  const month   = months[d.getMonth()];
  const day     = d.getDate();
  const year    = d.getFullYear();

  let hours = d.getHours();
  const mins = String(d.getMinutes()).padStart(2, '0');
  const secs = String(d.getSeconds()).padStart(2, '0');
  const ampm = hours >= 12 ? 'PM' : 'AM';
  hours = hours % 12 || 12;
  const abbr = dst ? tz.dstAbbr : tz.stdAbbr;

  return `${dayName}, ${month} ${day}, ${year}  ${hours}:${mins}:${secs} ${ampm} ${abbr}`;
}

// ── Canvas Stamping ────────────────────────────────────────────────────────
function stampImage(imgEl, timestampStr) {
  canvas.width  = imgEl.naturalWidth;
  canvas.height = imgEl.naturalHeight;
  ctx.drawImage(imgEl, 0, 0);

  const W = canvas.width;
  const H = canvas.height;

  // Region = bottom-left 1/8 of image area
  // Width = W/2 (half width), Height = H/4 (quarter height) → 1/8 total area
  const regionW = W / 2;
  const regionH = H / 4;

  // Font size
  let fontSize;
  const fsSel = fontSizeSel.value;
  if (fsSel === 'auto') {
    // Scale: at 1920px wide → 42px; proportional
    fontSize = Math.max(16, Math.round(W * 0.022));
  } else {
    fontSize = parseInt(fsSel);
  }

  ctx.font = `bold ${fontSize}px Arial, Helvetica, sans-serif`;
  ctx.textBaseline = 'bottom';
  ctx.textAlign = 'left';

  // Outline width scales with font size
  const outlineW = Math.max(2, Math.round(fontSize * 0.12));

  // Padding from edge
  const padX = Math.round(W * 0.012);
  const padY = Math.round(H * 0.015);

  const textX = padX;
  const textY = H - padY; // bottom of canvas

  // Draw outline
  ctx.strokeStyle = 'rgba(0,0,0,0.95)';
  ctx.lineWidth = outlineW * 2;
  ctx.lineJoin = 'round';
  ctx.strokeText(timestampStr, textX, textY);

  // Draw yellow fill
  ctx.fillStyle = '#FFE600';
  ctx.fillText(timestampStr, textX, textY);

  return canvas;
}

// ── Process All ───────────────────────────────────────────────────────────
processBtn.addEventListener('click', async () => {
  if (!files.length) return;

  processBtn.disabled = true;
  processedBlobs = [];
  previewGrid.innerHTML = '';
  previewSection.classList.remove('visible');
  dlAllBtn.style.display = 'none';
  progressWrap.classList.add('visible');
  progressFill.style.width = '0%';

  const fmt     = outputFormat.value;
  const quality = parseFloat(jpegQuality.value);
  const ext     = fmt === 'image/jpeg' ? 'jpg' : 'png';
  const mode    = timestampMode.value;

  let customDate = null;
  if (mode === 'custom' && customDateInp.value) {
    customDate = new Date(customDateInp.value);
  }

  for (let i = 0; i < files.length; i++) {
    const file = files[i];
    progressLabel.textContent = `Processing ${i + 1} / ${files.length} — ${file.name}`;
    progressFill.style.width = ((i / files.length) * 100) + '%';

    // Load image
    const img = await loadImage(file);

    // Determine timestamp date
    let stampDate;
    if (mode === 'exif') {
      const exif = await readExifDate(file);
      stampDate = exif || new Date(file.lastModified) || new Date();
    } else if (mode === 'custom') {
      stampDate = customDate || new Date();
    } else {
      stampDate = new Date();
    }

    const tsStr = formatTimestamp(stampDate);
    stampImage(img, tsStr);

    // Export blob
    const blob = await canvasToBlob(fmt, quality);
    const baseName = file.name.replace(/\.[^.]+$/, '');
    const outName  = `${baseName}_stamped.${ext}`;

    processedBlobs.push({ blob, filename: outName });

    // Build preview card
    const url = URL.createObjectURL(blob);
    const card = document.createElement('div');
    card.className = 'preview-item';
    card.innerHTML = `
      <img src="${url}" alt="${outName}" loading="lazy" />
      <div class="filename">${outName}</div>
      <a class="dl-btn" href="${url}" download="${outName}">⬇ Download</a>
    `;
    previewGrid.appendChild(card);
  }

  progressFill.style.width = '100%';
  progressLabel.textContent = `✓ ${files.length} image${files.length > 1 ? 's' : ''} stamped`;

  countLabel.textContent = files.length;
  previewSection.classList.add('visible');
  if (files.length > 1) dlAllBtn.style.display = 'block';
  processBtn.disabled = false;
  previewSection.scrollIntoView({ behavior: 'smooth' });
});

// ── Download All as ZIP ────────────────────────────────────────────────────
dlAllBtn.addEventListener('click', async () => {
  if (!processedBlobs.length) return;
  dlAllBtn.textContent = '⏳ Building ZIP...';
  dlAllBtn.disabled = true;

  const zip = new JSZip();
  for (const { blob, filename } of processedBlobs) {
    zip.file(filename, blob);
  }
  const zipBlob = await zip.generateAsync({ type: 'blob', compression: 'DEFLATE', compressionOptions: { level: 6 } });
  const a = document.createElement('a');
  a.href = URL.createObjectURL(zipBlob);
  a.download = 'timestamped_images.zip';
  a.click();

  dlAllBtn.textContent = '⬇ Download All as ZIP';
  dlAllBtn.disabled = false;
});

// ── Helpers ────────────────────────────────────────────────────────────────
function loadImage(file) {
  return new Promise((resolve, reject) => {
    const img = new Image();
    img.onload = () => resolve(img);
    img.onerror = reject;
    img.src = URL.createObjectURL(file);
  });
}

function canvasToBlob(type, quality) {
  return new Promise(resolve => canvas.toBlob(resolve, type, quality));
}

// ── Set default datetime to now ────────────────────────────────────────────
(function setDefaultDate() {
  const now = new Date();
  const pad = n => String(n).padStart(2, '0');
  const local = `${now.getFullYear()}-${pad(now.getMonth()+1)}-${pad(now.getDate())}T${pad(now.getHours())}:${pad(now.getMinutes())}`;
  customDateInp.value = local;
})();
</script>
</body>
