<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>Capital Improvement Planner (CIP) | Korb Engineering</title>
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{
  --bg:#050a0f;--bg1:#0a1018;--bg2:#0f1620;--bg3:#121c28;
  --card:#0c1219;--border:#1a2a3a;--borderHi:#264060;
  --cyan:#00d4ff;--green:#00ff88;--red:#ff3344;--yellow:#ffcc00;--orange:#ff8c00;--purple:#a78bfa;--blue:#3b82f6;
  --text:#e2e8f0;--dim:rgba(226,232,240,0.45);--muted:rgba(226,232,240,0.2);
  --font:'JetBrains Mono',monospace
}
body{background:var(--bg);color:var(--text);font-family:var(--font);min-height:100vh;overflow-x:hidden}
input,select,button,textarea{font-family:var(--font)}
a{color:var(--cyan);text-decoration:none}
a:hover{text-decoration:underline}

/* Ticker */
.ticker-wrap{background:var(--bg2);border-bottom:1px solid var(--border);overflow:hidden;height:28px;position:relative}
.ticker{display:flex;animation:tickerScroll 90s linear infinite;white-space:nowrap;position:absolute;top:0;left:0;height:28px;align-items:center}
.ticker:hover{animation-play-state:paused}
.ticker-item{padding:0 32px;font-size:10px;color:var(--dim);letter-spacing:0.05em;flex-shrink:0}
.ticker-item .t-label{color:var(--yellow);margin-right:6px;font-weight:700}
.ticker-item .t-amount{color:var(--green)}
.ticker-item .t-deadline{color:var(--red)}
.ticker-item .t-new{color:var(--cyan);font-weight:700}
@keyframes tickerScroll{0%{transform:translateX(0)}100%{transform:translateX(-50%)}}

/* Header */
.header{position:sticky;top:0;z-index:100;background:linear-gradient(180deg,var(--bg2),var(--bg1));border-bottom:1px solid var(--border);padding:0 20px;display:flex;align-items:center;height:56px;gap:16px}
.h-left{display:flex;align-items:center;gap:12px}
.h-badge{width:38px;height:38px;border:1.5px solid var(--cyan);display:flex;align-items:center;justify-content:center;flex-shrink:0}
.h-badge span{font-size:11px;font-weight:700;color:var(--cyan);letter-spacing:0.05em}
.h-title{font-size:15px;font-weight:700;letter-spacing:0.1em;color:var(--cyan);text-shadow:0 0 12px rgba(0,212,255,0.25)}
.h-sub{font-size:8px;color:var(--dim);letter-spacing:0.18em;text-transform:uppercase}
.h-right{margin-left:auto;display:flex;gap:8px;align-items:center}

/* KPI Strip */
.kpi-strip{display:grid;grid-template-columns:repeat(auto-fit,minmax(155px,1fr));gap:10px;padding:14px 20px;background:var(--bg1);border-bottom:1px solid var(--border)}
.kpi{background:var(--card);border:1px solid var(--border);border-radius:6px;padding:12px 14px;position:relative;overflow:hidden}
.kpi::before{content:'';position:absolute;top:0;left:0;width:3px;height:100%}
.kpi-cyan::before{background:var(--cyan)}.kpi-green::before{background:var(--green)}.kpi-yellow::before{background:var(--yellow)}.kpi-red::before{background:var(--red)}.kpi-purple::before{background:var(--purple)}.kpi-orange::before{background:var(--orange)}
.kpi-label{font-size:8px;color:var(--dim);text-transform:uppercase;letter-spacing:0.12em;margin-bottom:4px}
.kpi-value{font-size:20px;font-weight:700}
.kpi-sub{font-size:9px;color:var(--dim);margin-top:2px}

/* Tabs */
.tabs{display:flex;gap:0;padding:0 20px;border-bottom:1px solid var(--border);overflow-x:auto;background:var(--bg1)}
.tab{padding:10px 16px;background:transparent;border:1px solid var(--border);border-bottom:1px solid var(--border);color:var(--dim);font-size:9px;cursor:pointer;letter-spacing:0.1em;text-transform:uppercase;border-radius:4px 4px 0 0;white-space:nowrap;transition:all 0.15s}
.tab.active{background:var(--bg2);border-color:var(--cyan);border-bottom-color:transparent;color:var(--cyan)}
.tab:hover:not(.active){color:var(--text)}

/* Content */
.content{padding:20px;max-width:1400px;margin:0 auto}
.card{background:var(--card);border:1px solid var(--border);border-radius:6px;padding:20px;margin-bottom:14px}
.card-title{font-size:10px;color:var(--cyan);letter-spacing:0.12em;text-transform:uppercase;margin-bottom:14px;font-weight:600}
.card-sub{font-size:9px;color:var(--dim);margin-top:-10px;margin-bottom:14px}
.grid-2{display:grid;grid-template-columns:1fr 1fr;gap:14px}
.grid-3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:14px}
.flex-between{display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:8px}

/* Buttons */
.btn{background:transparent;border:1px solid var(--border);color:var(--dim);font-size:9px;padding:5px 12px;border-radius:3px;cursor:pointer;letter-spacing:0.06em;text-transform:uppercase;transition:all 0.15s}
.btn:hover{border-color:var(--cyan);color:var(--cyan)}
.btn-green{border-color:var(--green);color:var(--green)}.btn-green:hover{background:rgba(0,255,136,0.08)}
.btn-red{border-color:var(--red);color:var(--red)}
.btn-fill{background:var(--cyan);color:#000;border:none;font-weight:700}.btn-fill:hover{opacity:0.85}

/* Inputs */
input[type="text"],input[type="number"],input[type="url"],select,textarea{background:var(--bg2);border:1px solid var(--border);color:var(--text);font-size:16px;padding:5px 8px;border-radius:3px;width:100%;outline:none;min-height:44px}
input:focus,select:focus,textarea:focus{border-color:var(--cyan)}
.label{font-size:8px;color:var(--dim);font-weight:700;text-transform:uppercase;letter-spacing:0.08em;margin-bottom:3px;display:block}
.field{margin-bottom:10px}

/* Tables */
table{width:100%;border-collapse:collapse}
th{padding:6px 8px;border-bottom:2px solid var(--border);font-size:8px;color:var(--dim);text-transform:uppercase;letter-spacing:0.08em;text-align:left;white-space:nowrap}
td{padding:6px 8px;border-bottom:1px solid var(--border);font-size:11px;white-space:nowrap}
.overflow-x{overflow-x:auto}

/* Bars */
.bar-track{height:14px;background:var(--bg2);border-radius:3px;overflow:hidden;position:relative}
.bar-fill{height:100%;border-radius:3px;transition:width 0.4s}

/* Map placeholder */
.map-frame{width:100%;height:420px;border:1px solid var(--border);border-radius:6px;background:var(--bg2);position:relative;overflow:hidden}
.map-frame iframe{width:100%;height:100%;border:none;border-radius:6px}

/* Tips */
.tip-card{background:linear-gradient(135deg,rgba(0,212,255,0.06),rgba(0,255,136,0.04));border:1px solid var(--borderHi);border-radius:6px;padding:14px 16px;margin-bottom:10px}
.tip-icon{display:inline-block;width:18px;height:18px;background:var(--yellow);color:#000;font-size:10px;font-weight:900;line-height:18px;text-align:center;border-radius:3px;margin-right:8px;vertical-align:middle}
.tip-title{font-size:11px;font-weight:700;color:var(--yellow);display:inline;vertical-align:middle}
.tip-body{font-size:11px;color:var(--dim);line-height:1.7;margin-top:6px}

/* Links grid */
.link-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));gap:10px}
.link-card{background:var(--bg2);border:1px solid var(--border);border-radius:6px;padding:14px;transition:all 0.2s;cursor:pointer;display:block}
.link-card:hover{border-color:var(--cyan);text-decoration:none;background:rgba(0,212,255,0.04)}
.link-card .lc-title{font-size:11px;font-weight:700;color:var(--cyan);margin-bottom:4px}
.link-card .lc-desc{font-size:10px;color:var(--dim);line-height:1.5}
.link-card .lc-tag{display:inline-block;font-size:8px;padding:2px 6px;border-radius:10px;margin-top:6px;background:rgba(0,212,255,0.1);color:var(--cyan)}

/* Gauge */
.gauge-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(110px,1fr));gap:16px}

/* Footer */
.footer{text-align:center;padding:30px 20px;border-top:1px solid var(--border);margin-top:30px}
.footer-brand{font-size:10px;color:var(--cyan);opacity:0.5;letter-spacing:0.15em}

@media(max-width:768px){
  .grid-2,.grid-3{grid-template-columns:1fr}
  .kpi-strip{grid-template-columns:repeat(2,1fr)}
  .h-sub{display:none}
  .map-frame{height:300px}
}
@media(max-width:480px){
  .kpi-strip{grid-template-columns:1fr}
  .header{padding:0 12px}
  .content{padding:14px 12px}
}
</style>
</head>
<body>

<!-- Grant Ticker -->
<div class="ticker-wrap">
  <div class="ticker" id="ticker"></div>
</div>

<!-- Header -->
<div class="header">
  <div class="h-left">
    <div class="h-badge"><span>CIP</span></div>
    <div>
      <div class="h-title">CAPITAL IMPROVEMENT PLANNER</div>
      <div class="h-sub">General Aviation Airports &mdash; Texas</div>
    </div>
  </div>
  <div class="h-right">
    <button class="btn" onclick="exportJSON()">Export</button>
    <button class="btn" onclick="importJSON()">Import</button>
    <button class="btn btn-fill" onclick="printReport()">Print Report</button>
  </div>
</div>

<!-- KPI Strip -->
<div class="kpi-strip" id="kpis"></div>

<!-- Tabs -->
<div class="tabs" id="tabs"></div>

<!-- Content -->
<div class="content" id="content"></div>

<!-- Footer -->
<div class="footer">
  <div class="footer-brand">KORB ENGINEERING</div>
</div>

<!-- Watermark -->
<div style="position:fixed;bottom:10px;right:10px;font-size:10px;color:var(--cyan);opacity:0.4;font-family:var(--font);pointer-events:none;z-index:9999">Korb Engineering</div>

<script>
// ========== CONFIG ==========
const LS_KEY = 'korb_cip_ga_texas';
const BASE_YEAR = new Date().getFullYear();
const YEARS = [0,1,2,3,4].map(i => BASE_YEAR + i);

const CATEGORIES = [
  {key:'runway',label:'Runway/Taxiway',color:'#3b82f6'},
  {key:'apron',label:'Apron/Ramp',color:'#06b6d4'},
  {key:'hangar',label:'Hangars',color:'#f59e0b'},
  {key:'fuel',label:'Fuel Systems',color:'#ef4444'},
  {key:'nav',label:'NAVAIDs/Lighting',color:'#a78bfa'},
  {key:'terminal',label:'Terminal/Admin',color:'#10b981'},
  {key:'land',label:'Land Acquisition',color:'#f97316'},
  {key:'environ',label:'Environmental',color:'#84cc16'},
  {key:'security',label:'Security/Fencing',color:'#ec4899'},
  {key:'other',label:'Other',color:'#6b7280'}
];

const FUNDING_SOURCES = ['FAA AIP','TxDOT','PFC','CFC','Local','Bonds','Other'];
const TABS = ['dashboard','budget','pipeline','revenue','grants','benchmarks','tips','resources'];

// ========== GRANT TICKER DATA ==========
const GRANT_ITEMS = [
  {label:'FAA AIP',text:'FY2026 Airport Improvement Program — NPIAS airports eligible for up to $150K/yr entitlement',amount:'$150K+',type:'active'},
  {label:'TxDOT Aviation',text:'Texas Airport Grant Program — 10% local match, 90% state funded for eligible projects',amount:'90/10 Split',type:'active'},
  {label:'BIL',text:'Bipartisan Infrastructure Law — $15B for airport infrastructure through FY2026',amount:'$15B Total',type:'active'},
  {label:'ATP',text:'FAA Airport Terminal Program — Terminal development and multimodal connections',amount:'Varies',type:'active'},
  {label:'AIG',text:'FAA Airport Infrastructure Grants — Zero local match for BIL-funded projects',amount:'100% Federal',type:'new'},
  {label:'EDA',text:'Economic Development Administration — Aviation-related economic development',amount:'Varies',type:'info'},
  {label:'USDA',text:'Rural Development Grants — Available for airports in rural Texas communities',amount:'Up to $500K',type:'info'},
  {label:'PFC',text:'Passenger Facility Charges — Collect $4.50/pax for approved capital projects',amount:'$4.50/pax',type:'active'},
  {label:'TxDOT Routine',text:'Routine Airport Maintenance Program (RAMP) — Pavement, markings, lighting',amount:'$50K-$250K',type:'active'},
  {label:'VALE',text:'Voluntary Airport Low Emission — Zero-emission vehicle/equipment grants',amount:'Up to $2M',type:'info'},
  {label:'DEADLINE',text:'FY2026 TxDOT TASP Application Window — Submit through TxDOT Aviation Division',deadline:'Check TxDOT',type:'deadline'},
  {label:'DEADLINE',text:'FAA AIP Pre-Application Conference — Contact your ADO regional office early',deadline:'Ongoing',type:'deadline'},
  {label:'TIP',text:'Stack FAA AIP entitlements across years for larger projects — 4-year accumulation = $600K+',type:'tip'},
  {label:'TIP',text:'NPE revenue directly affects AIP entitlement calculations — maximize based-aircraft count',type:'tip'},
];

// ========== STATE ==========
let currentTab = 'dashboard';
let data = {budgets:{}, projects:[], revenue:{}, settings:{}};
let editingId = null;

// ========== UTILS ==========
function genId(){return Date.now().toString(36)+Math.random().toString(36).slice(2,7)}
function fmt$(v){v=parseFloat(v)||0;if(Math.abs(v)>=1e9)return'$'+(v/1e9).toFixed(2)+'B';if(Math.abs(v)>=1e6)return'$'+(v/1e6).toFixed(2)+'M';if(Math.abs(v)>=1e3)return'$'+(v/1e3).toFixed(1)+'K';return'$'+v.toFixed(0)}
function pct(a,b){return b?((a/b)*100).toFixed(1)+'%':'0%'}
function esc(s){return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;')}

// ========== PERSISTENCE ==========
function load(){
  try{const d=JSON.parse(localStorage.getItem(LS_KEY));if(d){data=d}}catch{}
  if(!data.budgets)data.budgets={};
  if(!data.projects)data.projects=[];
  if(!data.revenue)data.revenue={};
  if(!data.settings)data.settings={};
  CATEGORIES.forEach(c=>{YEARS.forEach(y=>{const k=c.key+'_'+y;if(!data.budgets[k])data.budgets[k]={planned:0,committed:0}})});
  YEARS.forEach(y=>{
    if(!data.revenue[y])data.revenue[y]={fuelGallons:0,fuelMargin:0,hangarUnits:0,hangarRate:0,tiedownSpots:0,tiedownRate:0,landingFees:0,basedAircraft:0,ops:0,otherRev:0};
  });
}
function save(){localStorage.setItem(LS_KEY,JSON.stringify(data))}

// ========== TICKER ==========
function buildTicker(){
  const t=document.getElementById('ticker');
  const items=[...GRANT_ITEMS,...GRANT_ITEMS]; // duplicate for seamless loop
  t.innerHTML=items.map(g=>{
    let cls='';
    if(g.type==='deadline')cls=`<span class="t-label">${g.label}</span>${g.text} <span class="t-deadline">${g.deadline}</span>`;
    else if(g.type==='new')cls=`<span class="t-new">NEW</span> <span class="t-label">${g.label}</span>${g.text} <span class="t-amount">${g.amount}</span>`;
    else if(g.type==='tip')cls=`<span class="t-label">${g.label}</span>${g.text}`;
    else cls=`<span class="t-label">${g.label}</span>${g.text}${g.amount?' <span class="t-amount">'+g.amount+'</span>':''}`;
    return`<span class="ticker-item">${cls}</span>`;
  }).join('');
}

// ========== KPI ==========
function getStats(){
  const totalPlanned=Object.values(data.budgets).reduce((s,b)=>s+(b.planned||0),0);
  const totalCommitted=Object.values(data.budgets).reduce((s,b)=>s+(b.committed||0),0);
  const projectCount=data.projects.length;
  const totalProjectCost=data.projects.reduce((s,p)=>s+(parseFloat(p.estimatedCost)||0),0);
  const totalFunded=data.projects.reduce((s,p)=>s+FUNDING_SOURCES.reduce((fs,f)=>fs+(p.funding?.[f]||0),0),0);
  const gap=totalProjectCost-totalFunded;
  // NPE calc from current year
  const cy=data.revenue[BASE_YEAR]||{};
  const npe=calcNPE(cy);
  return{totalPlanned,totalCommitted,projectCount,totalProjectCost,totalFunded,gap,npe};
}

function calcNPE(rev){
  const fuelRev=(parseFloat(rev.fuelGallons)||0)*(parseFloat(rev.fuelMargin)||0);
  const hangarRev=(parseFloat(rev.hangarUnits)||0)*(parseFloat(rev.hangarRate)||0)*12;
  const tiedownRev=(parseFloat(rev.tiedownSpots)||0)*(parseFloat(rev.tiedownRate)||0)*12;
  const landingFees=parseFloat(rev.landingFees)||0;
  const otherRev=parseFloat(rev.otherRev)||0;
  return fuelRev+hangarRev+tiedownRev+landingFees+otherRev;
}

function renderKpis(){
  const s=getStats();
  document.getElementById('kpis').innerHTML=[
    {l:'5-Year CIP Total',v:fmt$(s.totalPlanned),c:'kpi-cyan',sub:'FY'+BASE_YEAR+'-'+(BASE_YEAR+4)},
    {l:'Committed',v:fmt$(s.totalCommitted),c:'kpi-green',sub:pct(s.totalCommitted,s.totalPlanned)+' of planned'},
    {l:'Projects',v:String(s.projectCount),c:'kpi-yellow',sub:fmt$(s.totalProjectCost)+' total cost'},
    {l:'Funded',v:fmt$(s.totalFunded),c:'kpi-purple',sub:pct(s.totalFunded,s.totalProjectCost)+' of project costs'},
    {l:'Funding Gap',v:fmt$(Math.max(0,s.gap)),c:s.gap>0?'kpi-red':'kpi-green',sub:s.gap<=0?'Fully funded':'Unfunded balance'},
    {l:'Est. NPE (CY)',v:fmt$(s.npe),c:'kpi-orange',sub:'Non-Primary Entitlement'}
  ].map(k=>`<div class="kpi ${k.c}"><div class="kpi-label">${k.l}</div><div class="kpi-value" style="color:var(--${k.c.replace('kpi-','')})">${k.v}</div><div class="kpi-sub">${k.sub}</div></div>`).join('');
}

// ========== TABS ==========
function renderTabs(){
  document.getElementById('tabs').innerHTML=TABS.map(t=>`<button class="tab ${currentTab===t?'active':''}" onclick="currentTab='${t}';render()">${t==='tips'?'Tips & Tricks':t==='benchmarks'?'Benchmarks':t}</button>`).join('');
}

// ========== DASHBOARD ==========
function renderDashboard(){
  const s=getStats();
  const catTotals=CATEGORIES.map(c=>{
    const planned=YEARS.reduce((s,y)=>s+(data.budgets[c.key+'_'+y]?.planned||0),0);
    const committed=YEARS.reduce((s,y)=>s+(data.budgets[c.key+'_'+y]?.committed||0),0);
    return{...c,planned,committed};
  }).filter(c=>c.planned>0);
  const maxPlan=Math.max(...catTotals.map(c=>c.planned),1);

  // Year-over-year
  const yearTotals=YEARS.map(y=>{
    const planned=CATEGORIES.reduce((s,c)=>s+(data.budgets[c.key+'_'+y]?.planned||0),0);
    const committed=CATEGORIES.reduce((s,c)=>s+(data.budgets[c.key+'_'+y]?.committed||0),0);
    const rev=calcNPE(data.revenue[y]||{});
    return{y,planned,committed,rev};
  });
  const maxYP=Math.max(...yearTotals.map(y=>y.planned),1);

  return`
  <div class="grid-2">
    <div class="card">
      <div class="card-title">CIP by Category</div>
      ${catTotals.length?catTotals.map(c=>`<div style="margin-bottom:10px">
        <div style="display:flex;justify-content:space-between;margin-bottom:3px">
          <span style="font-size:10px;color:${c.color}">${c.label}</span>
          <span style="font-size:10px;color:var(--green)">${fmt$(c.planned)}</span>
        </div>
        <div class="bar-track" style="position:relative">
          <div class="bar-fill" style="width:${(c.planned/maxPlan)*100}%;background:${c.color};opacity:0.3"></div>
          <div class="bar-fill" style="position:absolute;top:0;width:${(c.committed/maxPlan)*100}%;background:${c.color}"></div>
        </div>
      </div>`).join(''):'<div style="color:var(--muted);font-size:11px;padding:20px 0;text-align:center">Enter budget data in the Budget tab</div>'}
    </div>
    <div class="card">
      <div class="card-title">Annual CIP Spend</div>
      <div style="display:flex;align-items:flex-end;gap:6px;height:180px;padding-top:10px">
        ${yearTotals.map(y=>`<div style="flex:1;display:flex;flex-direction:column;align-items:center;justify-content:flex-end;height:100%">
          <div style="font-size:9px;color:var(--green);margin-bottom:4px">${fmt$(y.planned)}</div>
          <div style="width:100%;max-width:40px;background:var(--cyan);opacity:0.7;border-radius:3px 3px 0 0;height:${Math.max(2,(y.planned/maxYP)*140)}px;transition:height 0.3s"></div>
          <div style="font-size:9px;color:var(--dim);margin-top:4px">FY${String(y.y).slice(2)}</div>
        </div>`).join('')}
      </div>
    </div>
  </div>
  <div class="grid-2">
    <div class="card">
      <div class="card-title">Funding Mix</div>
      ${renderFundingMix()}
    </div>
    <div class="card">
      <div class="card-title">Revenue Forecast</div>
      ${yearTotals.map(y=>`<div style="display:flex;justify-content:space-between;padding:4px 0;border-bottom:1px solid var(--border)">
        <span style="font-size:11px">FY ${y.y}</span>
        <span style="font-size:11px;color:var(--orange)">${fmt$(y.rev)}</span>
      </div>`).join('')}
      <div style="font-size:9px;color:var(--dim);margin-top:8px">Based on Revenue Calculator inputs</div>
    </div>
  </div>
  <div class="card">
    <div class="card-title">Upcoming Grant Deadlines & Opportunities</div>
    <div class="overflow-x"><table><thead><tr><th>Program</th><th>Description</th><th>Amount</th><th>Status</th></tr></thead><tbody>
    ${GRANT_ITEMS.filter(g=>g.type!=='tip').map(g=>`<tr>
      <td style="color:var(--yellow);font-weight:600">${g.label}</td>
      <td style="color:var(--dim);white-space:normal;max-width:400px">${g.text}</td>
      <td style="color:var(--green)">${g.amount||g.deadline||''}</td>
      <td>${g.type==='new'?'<span style="color:var(--cyan);font-weight:700">NEW</span>':g.type==='deadline'?'<span style="color:var(--red)">DEADLINE</span>':'<span style="color:var(--green)">Active</span>'}</td>
    </tr>`).join('')}
    </tbody></table></div>
  </div>`;
}

function renderFundingMix(){
  const totals={};
  FUNDING_SOURCES.forEach(f=>totals[f]=0);
  data.projects.forEach(p=>{FUNDING_SOURCES.forEach(f=>{totals[f]+=(p.funding?.[f]||0)})});
  const grand=Object.values(totals).reduce((a,b)=>a+b,0);
  if(!grand)return'<div style="color:var(--muted);font-size:11px;text-align:center;padding:20px">Add projects with funding in Pipeline tab</div>';
  const colors=['#3b82f6','#10b981','#a78bfa','#f59e0b','#6b7280','#ef4444','#ec4899'];
  return FUNDING_SOURCES.map((f,i)=>{
    const pctVal=grand?(totals[f]/grand)*100:0;
    return`<div style="display:flex;align-items:center;gap:8px;margin-bottom:6px">
      <div style="width:60px;font-size:9px;color:var(--dim);text-align:right">${f}</div>
      <div class="bar-track" style="flex:1"><div class="bar-fill" style="width:${pctVal}%;background:${colors[i%colors.length]}"></div></div>
      <div style="width:50px;font-size:10px;color:${colors[i%colors.length]};text-align:right">${fmt$(totals[f])}</div>
    </div>`;
  }).join('');
}

// ========== BUDGET TAB ==========
function renderBudget(){
  const catTotals=CATEGORIES.map(c=>{
    const planned=YEARS.reduce((s,y)=>s+(data.budgets[c.key+'_'+y]?.planned||0),0);
    const committed=YEARS.reduce((s,y)=>s+(data.budgets[c.key+'_'+y]?.committed||0),0);
    return{...c,planned,committed,remaining:planned-committed};
  });
  const gt=catTotals.reduce((s,c)=>s+c.planned,0);
  const gc=catTotals.reduce((s,c)=>s+c.committed,0);

  return`<div class="card"><div class="card-title">5-Year Capital Budget</div>
  <div class="card-sub">Airport-specific categories for GA facilities</div>
  <div class="overflow-x"><table><thead>
    <tr><th>Category</th>
    ${YEARS.map(y=>`<th colspan="2" style="text-align:center;color:var(--cyan);border-left:1px solid var(--border)">FY ${y}</th>`).join('')}
    <th style="text-align:right;color:var(--yellow);border-left:1px solid var(--border)">Total</th>
    <th style="text-align:right">Remaining</th></tr>
    <tr><th></th>
    ${YEARS.map(()=>`<th style="text-align:center;border-left:1px solid var(--border)">Plan</th><th style="text-align:center">Commit</th>`).join('')}
    <th style="border-left:1px solid var(--border)"></th><th></th></tr>
  </thead><tbody>
    ${CATEGORIES.map(cat=>{
      const ct=catTotals.find(x=>x.key===cat.key);
      return`<tr>
        <td><span style="display:inline-block;width:8px;height:8px;border-radius:2px;background:${cat.color};margin-right:6px"></span>${cat.label}</td>
        ${YEARS.map(y=>{const k=cat.key+'_'+y;return`
          <td style="border-left:1px solid var(--border);text-align:center"><input type="number" value="${data.budgets[k]?.planned||0}" onchange="updateBudget('${cat.key}',${y},'planned',this.value)" style="width:80px;text-align:right"></td>
          <td style="text-align:center"><input type="number" value="${data.budgets[k]?.committed||0}" onchange="updateBudget('${cat.key}',${y},'committed',this.value)" style="width:80px;text-align:right"></td>
        `}).join('')}
        <td style="text-align:right;color:var(--green);border-left:1px solid var(--border)">${fmt$(ct.planned)}</td>
        <td style="text-align:right;color:${ct.remaining>=0?'var(--green)':'var(--red)'}">${fmt$(ct.remaining)}</td>
      </tr>`;
    }).join('')}
    <tr style="border-top:2px solid var(--yellow)">
      <td style="color:var(--yellow);font-weight:700">TOTAL</td>
      ${YEARS.map(y=>{
        const yp=CATEGORIES.reduce((s,c)=>s+(data.budgets[c.key+'_'+y]?.planned||0),0);
        const yc=CATEGORIES.reduce((s,c)=>s+(data.budgets[c.key+'_'+y]?.committed||0),0);
        return`<td style="text-align:center;color:var(--green);border-left:1px solid var(--border)">${fmt$(yp)}</td><td style="text-align:center;color:var(--cyan)">${fmt$(yc)}</td>`;
      }).join('')}
      <td style="text-align:right;color:var(--yellow);font-weight:700;border-left:1px solid var(--border)">${fmt$(gt)}</td>
      <td style="text-align:right;color:${gt-gc>=0?'var(--green)':'var(--red)'};font-weight:700">${fmt$(gt-gc)}</td>
    </tr>
  </tbody></table></div></div>`;
}

function updateBudget(cat,year,field,value){
  data.budgets[cat+'_'+year][field]=parseFloat(value)||0;save();render();
}

// ========== PIPELINE ==========
function renderPipeline(){
  return`<div class="card">
    <div class="flex-between" style="margin-bottom:14px">
      <div><div class="card-title" style="margin-bottom:0">Project Pipeline (${data.projects.length})</div></div>
      <button class="btn btn-green" onclick="addProject()">+ Add Project</button>
    </div>
    <div class="overflow-x"><table><thead><tr>
      ${['Project','Category','Est. Cost','FY',...FUNDING_SOURCES,'Funded','Gap',''].map(h=>`<th>${h}</th>`).join('')}
    </tr></thead><tbody>
      ${data.projects.map(p=>{
        const ft=FUNDING_SOURCES.reduce((s,f)=>s+(p.funding?.[f]||0),0);
        const gap=(parseFloat(p.estimatedCost)||0)-ft;
        const ed=editingId===p.id;
        return`<tr>
          <td>${ed?`<input type="text" value="${esc(p.name)}" onchange="updateProject('${p.id}','name',this.value)" style="width:180px">`:`<span style="cursor:pointer;color:var(--cyan)" onclick="editingId='${p.id}';render()">${p.name||'(unnamed)'}</span>`}</td>
          <td>${ed?`<select onchange="updateProject('${p.id}','category',this.value)">${CATEGORIES.map(c=>`<option value="${c.key}" ${p.category===c.key?'selected':''}>${c.label}</option>`).join('')}</select>`:`<span style="color:${CATEGORIES.find(c=>c.key===p.category)?.color||'var(--dim)'}">${CATEGORIES.find(c=>c.key===p.category)?.label||p.category}</span>`}</td>
          <td>${ed?`<input type="number" value="${p.estimatedCost}" onchange="updateProject('${p.id}','estimatedCost',this.value)" style="width:100px">`:`<span style="color:var(--green)">${fmt$(p.estimatedCost||0)}</span>`}</td>
          <td><select onchange="updateProject('${p.id}','assignedYear',this.value)" style="width:70px">${YEARS.map(y=>`<option ${String(p.assignedYear)===String(y)?'selected':''}>${y}</option>`).join('')}</select></td>
          ${FUNDING_SOURCES.map(f=>`<td>${ed?`<input type="number" value="${p.funding?.[f]||0}" onchange="updateProject('${p.id}','funding.${f}',this.value)" style="width:70px">`:`<span style="color:var(--dim)">${fmt$(p.funding?.[f]||0)}</span>`}</td>`).join('')}
          <td style="color:var(--cyan);font-weight:600">${fmt$(ft)}</td>
          <td style="color:${gap>0?'var(--red)':'var(--green)'};font-weight:600">${gap>0?fmt$(gap):'Funded'}</td>
          <td style="display:flex;gap:4px">
            ${ed?`<button class="btn btn-green" style="font-size:8px;padding:2px 8px" onclick="editingId=null;render()">Done</button>`
              :`<button class="btn" style="font-size:8px;padding:2px 8px" onclick="editingId='${p.id}';render()">Edit</button>`}
            <button class="btn btn-red" style="font-size:8px;padding:2px 8px" onclick="deleteProject('${p.id}')">Del</button>
          </td>
        </tr>`;
      }).join('')}
      ${!data.projects.length?`<tr><td colspan="${11+FUNDING_SOURCES.length}" style="text-align:center;color:var(--muted);padding:30px">No projects — click + Add Project to start building your CIP</td></tr>`:''}
    </tbody></table></div>
  </div>`;
}

function addProject(){
  const p={id:genId(),name:'',category:'runway',estimatedCost:0,assignedYear:BASE_YEAR,funding:{}};
  FUNDING_SOURCES.forEach(f=>p.funding[f]=0);
  data.projects.push(p);editingId=p.id;save();render();
}
function updateProject(id,field,value){
  const p=data.projects.find(x=>x.id===id);if(!p)return;
  if(field.startsWith('funding.')){p.funding[field.split('.')[1]]=parseFloat(value)||0}
  else if(field==='estimatedCost')p[field]=parseFloat(value)||0;
  else p[field]=value;
  save();render();
}
function deleteProject(id){data.projects=data.projects.filter(p=>p.id!==id);save();render()}

        <div class="field"><label class="label">Tiedown Revenue</label><div style="font-size:14px;color:var(--green);padding:5px 0">${fmt$(tiedownRev)}/yr</div></div>

    {title:'Keep Your 5010 Data Current',body:'FAA Form 5010 data (based aircraft, operations, facilities) directly influences your NPIAS classification and entitlement levels. Conduct an annual hangar-by-hangar aircraft count. If your ops counter is broken, get it fixed — every operation counts.',icon:'!'},
    {title:'Build Your ADO Relationship',body:'Your FAA Airports District Office (Southwest Region for TX) controls discretionary AIP funding. Schedule annual meetings. Invite them to your airport. A strong working relationship with your program manager can unlock discretionary funds beyond your entitlement.',icon:'*'},

    {title:'Revenue Diversification',body:'Don\'t rely solely on fuel sales. Hangar rent, land leases, agricultural leases, advertising, event hosting, and FBO fees all contribute to self-sufficiency. Higher revenue = stronger case for grant funding and better bond ratings.',icon:'!'},
    {title:'Fuel Price Strategy',body:'Check 100LL.com and AirNav weekly to see where you stand vs. nearby airports. Being $0.30/gal cheaper than the competitor 20nm away can dramatically increase your fuel volume. But don\'t race to the bottom — your margin matters more than your price.',icon:'*'},
    {title:'Hangar Waitlist = Money Signal',body:'If you have a hangar waitlist, you likely need to raise rates AND build more hangars. New hangar construction is AIP-eligible on federally obligated airports. A documented waitlist strengthens your grant application.',icon:'$'},
    {title:'RAMP Program for Quick Wins',body:'TxDOT\'s Routine Airport Maintenance Program (RAMP) is perfect for smaller projects: crack seal, re-marking, lighting repairs, mowing equipment. These 90/10 grants are easier to get and keep your airport looking sharp for inspections.',icon:'!'},
    {title:'Document Everything for Grant Apps',body:'Before-and-after photos, PCI scores, safety incident reports, demand letters, waitlists, economic impact data — all strengthen grant applications. Start documenting conditions NOW even if you won\'t apply for 2 years.',icon:'*'},
    {title:'Economic Impact Studies',body:'Commission or develop an economic impact study for your airport. Show the city council, county commissioners, and TxDOT how many jobs and how much revenue your airport generates. This is your #1 political tool for local match funding.',icon:'$'},
    {title:'Land Acquisition Timing',body:'If your ALP shows future development areas, start the land acquisition process early. FAA AIP covers land purchases for aeronautical purposes. Waiting until land is rezoned or developed nearby means paying 10x more.',icon:'!'},
    {title:'Minimum Standards as Revenue',body:'Well-crafted minimum standards ensure FBOs and commercial operators pay fair fees. Review your minimum standards every 2-3 years. Compare against similar-sized TX airports. Don\'t be afraid to require fuel flowage fees and percentage-of-revenue clauses.',icon:'*'},
  ];
  return`
  <div class="card">
    <div class="card-title">Tips & Tricks for GA Airport Managers in Texas</div>
    <div class="card-sub">Practical strategies to maximize funding and revenue</div>
  </div>

    <span class="tip-title">${t.title}</span>

  </div>`).join('')}
  <div class="card" style="border-color:var(--cyan)">
    <div class="card-title" style="color:var(--green)">Key Contacts</div>
    <div class="overflow-x"><table><thead><tr><th>Entity</th><th>Role</th><th>Contact</th></tr></thead><tbody>
      <tr><td style="color:var(--cyan)">FAA SW Region ADO</td><td style="color:var(--dim)">AIP grants, compliance, inspections</td><td><a href="https://www.faa.gov/airports/southwest" target="_blank">faa.gov/airports/southwest</a></td></tr>

}

// ========== EXPORT / IMPORT ==========
function exportJSON(){
  const blob=new Blob([JSON.stringify(data,null,2)],{type:'application/json'});
  const a=document.createElement('a');
  a.href=URL.createObjectURL(blob);
  a.download='korb-cip-export-'+new Date().toISOString().slice(0,10)+'.json';
  a.click();
}
function importJSON(){
  const inp=document.createElement('input');inp.type='file';inp.accept='.json';
  inp.onchange=e=>{
    const f=e.target.files[0];if(!f)return;
    const r=new FileReader();
    r.onload=ev=>{try{data=JSON.parse(ev.target.result);save();load();render();alert('Import successful')}catch{alert('Invalid file')}};
    r.readAsText(f);
  };inp.click();
}

// ========== PRINT ==========
function printReport(){
  const s=getStats();
  const catTotals=CATEGORIES.map(c=>{
    const planned=YEARS.reduce((s,y)=>s+(data.budgets[c.key+'_'+y]?.planned||0),0);
    return{label:c.label,planned};
  });
  const w=window.open('','','width=900,height=700');
  w.document.write(`<html><head><title>CIP Report</title><style>
    body{font-family:'JetBrains Mono',monospace;padding:40px;font-size:11px}
    table{width:100%;border-collapse:collapse;margin:16px 0}
    th,td{padding:6px;border-bottom:1px solid #ccc;text-align:left;font-size:11px}
    th{border-bottom:2px solid #000;font-size:9px;text-transform:uppercase}
    h1{font-size:18px}h2{font-size:14px;margin-top:24px}
    .sub{font-size:10px;color:#666}
  </style></head><body>
    <h1>CAPITAL IMPROVEMENT PROGRAM</h1>
    <p class="sub">Korb Engineering &mdash; General Aviation Airport CIP Report</p>
    <p>FY ${BASE_YEAR} - ${BASE_YEAR+4} | Total Planned: ${fmt$(s.totalPlanned)} | Projects: ${s.projectCount}</p>
    <h2>Budget Summary</h2><table><tr><th>Category</th>${YEARS.map(y=>'<th>FY '+y+'</th>').join('')}<th>Total</th></tr>
    ${catTotals.map(c=>'<tr><td>'+c.label+'</td>'+YEARS.map(y=>'<td>'+fmt$(data.budgets[CATEGORIES.find(x=>x.label===c.label).key+'_'+y]?.planned||0)+'</td>').join('')+'<td><b>'+fmt$(c.planned)+'</b></td></tr>').join('')}
    </table>
    <h2>Project Pipeline</h2><table><tr><th>Project</th><th>Category</th><th>Cost</th><th>FY</th><th>Funded</th><th>Gap</th></tr>
    ${data.projects.map(p=>{const ft=FUNDING_SOURCES.reduce((s,f)=>s+(p.funding?.[f]||0),0);const gap=(p.estimatedCost||0)-ft;
      return'<tr><td>'+esc(p.name)+'</td><td>'+(CATEGORIES.find(c=>c.key===p.category)?.label||p.category)+'</td><td>'+fmt$(p.estimatedCost||0)+'</td><td>'+p.assignedYear+'</td><td>'+fmt$(ft)+'</td><td style="color:'+(gap>0?'red':'green')+'">'+fmt$(gap)+'</td></tr>';
    }).join('')}
    </table>
    <p style="margin-top:40px;font-size:9px;color:#999">Generated by Korb Engineering Capital Improvement Planner</p>
  </body></html>`);
  w.document.close();w.print();
}

// ========== RENDER ==========
function render(){
  renderKpis();renderTabs();
  const c=document.getElementById('content');
  const renderers={
    dashboard:renderDashboard, budget:renderBudget, pipeline:renderPipeline,
    revenue:renderRevenue, grants:renderGrants, benchmarks:renderBenchmarks,
    tips:renderTips, resources:renderResources
  };
  c.innerHTML=(renderers[currentTab]||renderDashboard)();
}

load();
buildTicker();
