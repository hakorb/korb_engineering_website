<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="description" content="Dynamic CIP — a free, browser-based civil engineering tool from Korb Engineering. No signup, no downloads, works on mobile.">
<title>Dynamic CIP - Korb Engineering</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{--bg:#050a0f;--bg1:#0a1018;--bg2:#0f1822;--border:#1a2a3a;--accent:#00d4ff;--green:#00ff88;--red:#ff3344;--yellow:#ffcc00;--text:#e2e8f0;--textDim:rgba(226,232,240,0.45);--textMuted:rgba(226,232,240,0.25);--font:'JetBrains Mono',monospace}
body{background:var(--bg);color:var(--text);font-family:var(--font);min-height:100vh}
input,select,button,textarea{font-family:var(--font)}
.header{height:52px;background:linear-gradient(180deg,var(--bg2),var(--bg1));border-bottom:1px solid var(--border);display:flex;align-items:center;padding:0 20px;gap:16px;position:sticky;top:0;z-index:100}
.logo-box{width:36px;height:36px;border:1.5px solid var(--accent);display:flex;align-items:center;justify-content:center;box-shadow:0 0 10px rgba(0,212,255,0.25);flex-shrink:0}
.logo-box span{font-size:11px;font-weight:700;color:var(--accent);letter-spacing:0.05em}
.htitle{font-size:16px;font-weight:700;letter-spacing:0.12em;color:var(--accent)}
.hsub{font-size:10px;color:rgba(0,212,255,0.35);letter-spacing:0.15em;text-transform:uppercase}
.tabs{display:flex;gap:0;padding:16px 20px 0;border-bottom:1px solid var(--border);flex-wrap:wrap}
.tab{padding:8px 16px;background:transparent;border:1px solid var(--border);border-bottom:1px solid var(--border);color:var(--textDim);font-size:10px;cursor:pointer;letter-spacing:0.1em;text-transform:uppercase;border-radius:4px 4px 0 0;transition:all .15s}
.tab.active{background:var(--bg2);border-color:var(--accent);border-bottom:none;color:var(--accent)}
.container{padding:20px;max-width:1400px;margin:0 auto}
.card{background:var(--bg1);border:1px solid var(--border);border-radius:6px;padding:20px;margin-bottom:16px}
.card-title{font-size:11px;color:var(--accent);letter-spacing:0.1em;text-transform:uppercase;margin-bottom:12px;font-weight:600}
.label{font-size:9px;color:var(--textDim);font-weight:700;text-transform:uppercase;letter-spacing:.5px;margin-bottom:2px;display:block}
.input{width:100%;background:var(--bg2);border:1px solid var(--border);color:var(--text);font-size:16px;padding:4px 8px;border-radius:3px;outline:none;min-height:44px}
.input:focus{border-color:var(--accent)}
.select{background:var(--bg2);border:1px solid var(--border);color:var(--text);font-size:16px;padding:4px 8px;border-radius:3px;outline:none;cursor:pointer;width:100%;min-height:44px}
.btn{background:transparent;border:1px solid var(--border);color:var(--textDim);font-size:10px;padding:5px 12px;border-radius:3px;cursor:pointer;letter-spacing:0.05em;text-transform:uppercase;transition:all .15s;min-height:44px}
.btn:hover{border-color:var(--accent);color:var(--accent)}
.btn-green{border-color:var(--green);color:var(--green)}
.btn-red{border-color:var(--red);color:var(--red)}
table{width:100%;border-collapse:collapse}
th,td{padding:6px 10px;border-bottom:1px solid var(--border);font-size:11px;text-align:left}
th{color:var(--textDim);font-size:9px;text-transform:uppercase;letter-spacing:0.1em}
.cat-dot{width:10px;height:10px;border-radius:2px;display:inline-block;margin-right:6px}
.progress-bar{height:6px;background:var(--bg2);border-radius:3px;overflow:hidden}
.progress-fill{height:100%;border-radius:3px;transition:width .3s ease}
.score-cell{font-weight:700;font-size:14px}
.grid{display:grid;gap:12px}
.grid-2{grid-template-columns:1fr 1fr}
.grid-3{grid-template-columns:1fr 1fr 1fr}
.grid-5{grid-template-columns:repeat(5,1fr)}
.fy-card{background:var(--bg1);border:1px solid var(--border);border-radius:6px;padding:16px}
@media(max-width:768px){
.grid-2,.grid-3,.grid-5{grid-template-columns:1fr}
.header{flex-wrap:wrap;height:auto;padding:8px 12px}
.htitle{font-size:13px}.hsub{display:none}
.container{padding:12px}
.card{padding:14px}
.tabs{padding:8px 12px 0}
}
</style>
</head>
<body>
<div class="header">
  <div class="logo-box"><span>KE</span></div>
  <div class="htitle">KORB ENGINEERING</div>
  <div class="hsub">Capital Improvement Program</div>
  <div style="flex:1"></div>
  <button class="btn" onclick="exportCSV()">Export CSV</button>
</div>
<div class="tabs" id="tabs"></div>
<div class="container" id="app"></div>
<div style="position:fixed;bottom:10px;right:10px;font-size:10px;color:#00d4ff;opacity:0.5;font-family:'JetBrains Mono',monospace;pointer-events:none;z-index:9999">Korb Engineering</div>

<script>
const LS_KEY='korb_cip';
const CATEGORIES=['water','sewer','roads','drainage','parks','buildings'];
const STATUSES=['planned','funded','in-progress','complete'];
const CAT_COLORS={water:'#3b82f6',sewer:'#8b5cf6',roads:'#f59e0b',drainage:'#06b6d4',parks:'#10b981',buildings:'#ef4444'};
const STATUS_COLORS={planned:'rgba(226,232,240,0.45)',funded:'#00d4ff','in-progress':'#ffcc00',complete:'#00ff88'};
const genId=()=>Date.now().toString(36)+Math.random().toString(36).slice(2,7);
const baseYear=new Date().getFullYear();
const years=[0,1,2,3,4].map(i=>baseYear+i);

function fmt$(v){if(v>=1e6)return'$'+(v/1e6).toFixed(2)+'M';if(v>=1e3)return'$'+(v/1e3).toFixed(1)+'K';return'$'+(v||0).toFixed(0)}
function calcScore(m){const w={condition:25,safety:25,regulatory:20,demand:15,economic:15};return Math.round((m.condition||1)*w.condition/5+(m.safety||1)*w.safety/5+(m.regulatory||1)*w.regulatory/5+(m.demand||1)*w.demand/5+(m.economic||1)*w.economic/5)}
function emptyProject(){return{id:genId(),name:'',category:'roads',estimatedCost:0,startYear:baseYear+1,duration:1,status:'planned',matrix:{condition:3,safety:3,regulatory:3,demand:3,economic:3},priorityScore:60}}

let state={tab:'projects',projects:[],editingId:null,filterCat:'all',filterYear:'all',sortBy:'priorityScore',sortDir:-1};

function load(){try{const d=JSON.parse(localStorage.getItem(LS_KEY));if(d&&d.projects){state.projects=d.projects;if(d.tab)state.tab=d.tab}}catch(e){}}
function save(){localStorage.setItem(LS_KEY,JSON.stringify({projects:state.projects,tab:state.tab}))}

function renderTabs(){
  const tabs=['projects','scoring','multi-year','budget'];
  document.getElementById('tabs').innerHTML=tabs.map(t=>`<button class="tab ${state.tab===t?'active':''}" onclick="setTab('${t}')">${t}</button>`).join('');
}
function setTab(t){state.tab=t;save();render()}

function getFiltered(){
  return state.projects
    .filter(p=>state.filterCat==='all'||p.category===state.filterCat)
    .filter(p=>state.filterYear==='all'||p.startYear===parseInt(state.filterYear))
    .sort((a,b)=>{
      if(state.sortBy==='priorityScore')return(b.priorityScore-a.priorityScore)*state.sortDir;
      if(state.sortBy==='estimatedCost')return(b.estimatedCost-a.estimatedCost)*state.sortDir;
      if(state.sortBy==='name')return a.name.localeCompare(b.name)*state.sortDir;
      return 0;
    });
}

function renderProjects(){
  const filtered=getFiltered();
  return`<div class="card">
    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:16px;flex-wrap:wrap;gap:8px">
      <div class="card-title" style="margin-bottom:0">CIP Projects (${filtered.length})</div>
      <div style="display:flex;gap:8px;align-items:center;flex-wrap:wrap">
        <select class="select" style="width:auto" onchange="state.filterCat=this.value;render()"><option value="all">All Categories</option>${CATEGORIES.map(c=>`<option value="${c}" ${state.filterCat===c?'selected':''}>${c}</option>`).join('')}</select>
        <select class="select" style="width:auto" onchange="state.filterYear=this.value;render()"><option value="all">All Years</option>${years.map(y=>`<option value="${y}" ${state.filterYear==y?'selected':''}>${y}</option>`).join('')}</select>
        <select class="select" style="width:auto" onchange="state.sortBy=this.value;render()"><option value="priorityScore" ${state.sortBy==='priorityScore'?'selected':''}>Sort: Priority</option><option value="estimatedCost" ${state.sortBy==='estimatedCost'?'selected':''}>Sort: Cost</option><option value="name" ${state.sortBy==='name'?'selected':''}>Sort: Name</option></select>
        <button class="btn btn-green" onclick="addProject()">+ Add Project</button>
      </div>
    </div>
    <div style="overflow-x:auto"><table>
      <thead><tr>${['Name','Category','Est. Cost','Priority','Start Year','Duration','Status',''].map(h=>`<th>${h}</th>`).join('')}</tr></thead>
      <tbody>
      ${filtered.length?filtered.map(p=>{
        const editing=state.editingId===p.id;
        return`<tr>
          <td>${editing?`<input class="input" style="width:180px" value="${esc(p.name)}" onchange="updProj('${p.id}','name',this.value)" autofocus>`:`<span style="cursor:pointer" onclick="state.editingId='${p.id}';render()">${esc(p.name)||'(unnamed)'}</span>`}</td>
          <td>${editing?`<select class="select" onchange="updProj('${p.id}','category',this.value)">${CATEGORIES.map(c=>`<option value="${c}" ${p.category===c?'selected':''}>${c}</option>`).join('')}</select>`:`<span style="color:${CAT_COLORS[p.category]};text-transform:capitalize">${p.category}</span>`}</td>
          <td>${editing?`<input class="input" type="number" style="width:120px" value="${p.estimatedCost}" onchange="updProj('${p.id}','estimatedCost',parseFloat(this.value)||0)">`:`<span style="color:var(--green)">${fmt$(parseFloat(p.estimatedCost)||0)}</span>`}</td>
          <td><span class="score-cell" style="color:${p.priorityScore>=80?'var(--red)':p.priorityScore>=60?'var(--yellow)':'var(--textDim)'}">${p.priorityScore}</span></td>
          <td>${editing?`<input class="input" type="number" style="width:80px" value="${p.startYear}" onchange="updProj('${p.id}','startYear',parseInt(this.value)||baseYear)">`:p.startYear}</td>
          <td>${editing?`<input class="input" type="number" style="width:60px" value="${p.duration}" onchange="updProj('${p.id}','duration',parseInt(this.value)||1)">`:`${p.duration}yr`}</td>
          <td>${editing?`<select class="select" onchange="updProj('${p.id}','status',this.value)">${STATUSES.map(s=>`<option value="${s}" ${p.status===s?'selected':''}>${s}</option>`).join('')}</select>`:`<span style="color:${STATUS_COLORS[p.status]};text-transform:capitalize">${p.status}</span>`}</td>
          <td style="display:flex;gap:4px">${editing?`<button class="btn btn-green" style="font-size:9px;padding:2px 8px" onclick="state.editingId=null;render()">Done</button>`:`<button class="btn" style="font-size:9px;padding:2px 8px" onclick="state.editingId='${p.id}';render()">Edit</button>`}<button class="btn btn-red" style="font-size:9px;padding:2px 8px" onclick="delProj('${p.id}')">Del</button></td>
        </tr>`}).join(''):`<tr><td colspan="8" style="text-align:center;padding:30px;color:var(--textMuted)">No projects -- click + Add Project</td></tr>`}
      </tbody>
    </table></div>
  </div>`;
}

function renderScoring(){
  return`<div class="card">
    <div class="card-title">Priority Scoring Matrix</div>
    <div style="font-size:10px;color:var(--textDim);margin-bottom:16px">Weights: Condition 25% | Safety 25% | Regulatory 20% | Public Demand 15% | Economic Benefit 15%</div>
    <div style="overflow-x:auto"><table>
      <thead><tr>${['Project','Condition (1-5)','Safety (1-5)','Regulatory (1-5)','Demand (1-5)','Economic (1-5)','Score'].map(h=>`<th>${h}</th>`).join('')}</tr></thead>
      <tbody>
      ${state.projects.length?state.projects.map(p=>`<tr>
        <td style="color:var(--accent)">${esc(p.name)||'(unnamed)'}</td>
        ${['condition','safety','regulatory','demand','economic'].map(k=>`<td><select class="select" style="width:60px" onchange="updMatrix('${p.id}','${k}',this.value)">${[1,2,3,4,5].map(v=>`<option value="${v}" ${(p.matrix?.[k]||3)==v?'selected':''}>${v}</option>`).join('')}</select></td>`).join('')}
        <td class="score-cell" style="color:${p.priorityScore>=80?'var(--red)':p.priorityScore>=60?'var(--yellow)':'var(--accent)'}">${p.priorityScore}</td>
      </tr>`).join(''):`<tr><td colspan="7" style="text-align:center;padding:30px;color:var(--textMuted)">Add projects in the Projects tab first</td></tr>`}
      </tbody>
    </table></div>
  </div>`;
}

function renderMultiYear(){
  const yearSummary=years.map(y=>{
    const ps=state.projects.filter(p=>p.startYear<=y&&p.startYear+(p.duration||1)>y);
    const total=ps.reduce((s,p)=>s+(parseFloat(p.estimatedCost)||0)/(p.duration||1),0);
    return{year:y,projects:ps,total};
  });
  return`<div class="grid grid-5" style="margin-bottom:20px">
    ${yearSummary.map(ys=>`<div class="fy-card">
      <div style="font-size:18px;color:var(--accent);margin-bottom:4px">FY ${ys.year}</div>
      <div style="font-size:12px;color:var(--green);margin-bottom:8px">${fmt$(ys.total)}</div>
      <div style="font-size:10px;color:var(--textDim)">${ys.projects.length} projects</div>
    </div>`).join('')}
  </div>
  ${years.map(y=>{
    const ps=state.projects.filter(p=>p.startYear<=y&&p.startYear+(p.duration||1)>y);
    return`<div class="card" style="padding:16px;margin-bottom:12px">
      <div style="font-size:12px;color:var(--accent);letter-spacing:0.1em;margin-bottom:12px">FY ${y}</div>
      ${ps.length?ps.map(p=>`<div style="display:flex;align-items:center;gap:12px;padding:6px 0;border-bottom:1px solid var(--border)">
        <div class="cat-dot" style="background:${CAT_COLORS[p.category]}"></div>
        <div style="flex:1;font-size:11px">${esc(p.name)||'(unnamed)'}</div>
        <div style="font-size:11px;color:var(--green)">${fmt$(parseFloat(p.estimatedCost)||0)}</div>
        <div style="font-size:10px;color:${STATUS_COLORS[p.status]}">${p.status}</div>
      </div>`).join(''):`<div style="color:var(--textMuted);font-size:11px">No projects scheduled</div>`}
    </div>`}).join('')}`;
}

function renderBudget(){
  const catSummary=CATEGORIES.map(cat=>{
    const ps=state.projects.filter(p=>p.category===cat);
    const total=ps.reduce((s,p)=>s+(parseFloat(p.estimatedCost)||0),0);
    const complete=ps.filter(p=>p.status==='complete').reduce((s,p)=>s+(parseFloat(p.estimatedCost)||0),0);
    return{cat,count:ps.length,total,complete,pct:total>0?(complete/total*100):0};
  });
  const grandTotal=catSummary.reduce((s,c)=>s+c.total,0);
  return`<div class="card-title">Budget Summary by Category</div>
    <div class="grid" style="margin-bottom:20px">
    ${catSummary.map(cs=>`<div class="card" style="padding:16px">
      <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:8px">
        <div style="display:flex;align-items:center;gap:8px">
          <div class="cat-dot" style="background:${CAT_COLORS[cs.cat]}"></div>
          <span style="font-size:12px;text-transform:capitalize">${cs.cat}</span>
          <span style="font-size:10px;color:var(--textDim)">(${cs.count} projects)</span>
        </div>
        <div style="font-size:13px;color:var(--green)">${fmt$(cs.total)}</div>
      </div>
      <div class="progress-bar"><div class="progress-fill" style="width:${cs.pct}%;background:${CAT_COLORS[cs.cat]}"></div></div>
      <div style="display:flex;justify-content:space-between;margin-top:4px">
        <span style="font-size:9px;color:var(--textDim)">Complete: ${fmt$(cs.complete)}</span>
        <span style="font-size:9px;color:var(--textDim)">${cs.pct.toFixed(0)}%</span>
      </div>
    </div>`).join('')}
    </div>
    <div class="card" style="padding:16px">
      <div style="display:flex;justify-content:space-between;align-items:center">
        <span style="font-size:13px;color:var(--accent)">TOTAL PROGRAM</span>
        <span style="font-size:18px;color:var(--green)">${fmt$(grandTotal)}</span>
      </div>
      <div style="font-size:10px;color:var(--textDim);margin-top:4px">${state.projects.length} total projects across ${CATEGORIES.filter(c=>state.projects.some(p=>p.category===c)).length} categories</div>
    </div>`;
}

function addProject(){const p=emptyProject();state.projects.push(p);state.editingId=p.id;save();render()}
function delProj(id){state.projects=state.projects.filter(p=>p.id!==id);save();render()}
function updProj(id,field,value){const p=state.projects.find(p=>p.id===id);if(p){p[field]=value;save();render()}}
function updMatrix(id,key,value){const p=state.projects.find(p=>p.id===id);if(p){if(!p.matrix)p.matrix={condition:3,safety:3,regulatory:3,demand:3,economic:3};p.matrix[key]=parseInt(value)||1;p.priorityScore=calcScore(p.matrix);save();render()}}
function esc(s){return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;')}

function exportCSV(){
  const headers=['name','category','estimatedCost','priorityScore','startYear','duration','status'];
  const csv=[headers.join(','),...state.projects.map(p=>headers.map(h=>`"${p[h]||''}"`).join(','))].join('\n');
  const a=document.createElement('a');a.href=URL.createObjectURL(new Blob([csv],{type:'text/csv'}));a.download='korb_cip.csv';a.click();
}

function render(){
  renderTabs();
  const app=document.getElementById('app');
  switch(state.tab){
    case'projects':app.innerHTML=renderProjects();break;
    case'scoring':app.innerHTML=renderScoring();break;
    case'multi-year':app.innerHTML=renderMultiYear();break;
    case'budget':app.innerHTML=renderBudget();break;
  }
}
load();render();
</script>
</body>
</html>
