<script>
const LS_KEY='korb_evm';
const LS_PORT='korb_evm_portfolio';
const TABS=['portfolio','s-curve','wbs','variance','trends','forecasts','monte-carlo','earned-schedule','resources','setup'];
let currentTab='portfolio';
let project=null;
let portfolio=[];
let activeProjectId=null;

function genId(){return Date.now().toString(36)+Math.random().toString(36).slice(2,7)}
function fmt$(v){if(v==null||isNaN(v))return'$0';if(Math.abs(v)>=1e6)return'$'+(v/1e6).toFixed(2)+'M';if(Math.abs(v)>=1e3)return'$'+(v/1e3).toFixed(1)+'K';return'$'+(v||0).toFixed(0)}
function fmtPct(v){return(v||0).toFixed(1)+'%'}
function fmtNum(v,d=2){return(v||0).toFixed(d)}
function clamp(v,min,max){return Math.max(min,Math.min(max,v))}

/* ── Persistence ── */
function loadPortfolio(){try{portfolio=JSON.parse(localStorage.getItem(LS_PORT))||[]}catch{portfolio=[]}}
function savePortfolio(){localStorage.setItem(LS_PORT,JSON.stringify(portfolio))}
function load(){
  loadPortfolio();
  try{const d=JSON.parse(localStorage.getItem(LS_KEY));if(d&&d.id){project=d;activeProjectId=d.id}}catch{}
  if(!project&&portfolio.length>0){project=portfolio[0];activeProjectId=project.id}
}
function save(){
  if(!project)return;
  localStorage.setItem(LS_KEY,JSON.stringify(project));
  const idx=portfolio.findIndex(p=>p.id===project.id);
  if(idx>=0)portfolio[idx]=JSON.parse(JSON.stringify(project));
  else portfolio.push(JSON.parse(JSON.stringify(project)));
  savePortfolio();
}
function switchProject(id){
  const p=portfolio.find(x=>x.id===id);
  if(p){project=JSON.parse(JSON.stringify(p));activeProjectId=id;localStorage.setItem(LS_KEY,JSON.stringify(project));render()}
}
function deleteProject(id){
  if(!confirm('Delete this project from portfolio?'))return;
  portfolio=portfolio.filter(p=>p.id!==id);savePortfolio();
  if(activeProjectId===id){project=portfolio[0]||null;activeProjectId=project?project.id:null;if(project)localStorage.setItem(LS_KEY,JSON.stringify(project));else localStorage.removeItem(LS_KEY)}
  render();
}
function newProject(){
  project={id:genId(),name:'New Project',bac:0,duration:12,client:'',contract:'',startDate:'',wbs:[],resources:[],snapshots:[],mgmtEac:0};
  activeProjectId=project.id;save();render();
}

/* ── EVM Calculations ── */
function calcEVM(p){
  p=p||project;if(!p)return null;
  const bac=p.bac||0;const wbs=p.wbs||[];
  let pv=0,ev=0,ac=0;
  for(const item of wbs){
    pv+=(item.budget||0)*((item.plannedPct||0)/100);
    ev+=(item.budget||0)*((item.pctComplete||0)/100);
    ac+=(item.actualCost||0);
    if(item.children){for(const ch of item.children){
      pv+=(ch.budget||0)*((ch.plannedPct||0)/100);
      ev+=(ch.budget||0)*((ch.pctComplete||0)/100);
      ac+=(ch.actualCost||0);
    }}
  }
  const sv=ev-pv,cv=ev-ac;
  const spi=pv>0?ev/pv:1;const cpi=ac>0?ev/ac:1;
  const eac_cpi=cpi>0?bac/cpi:bac*2;
  const eac_composite=(cpi>0&&spi>0)?ac+(bac-ev)/(cpi*spi):bac;
  const eac_spi=spi>0?ac+(bac-ev)/spi:bac*2;
  const eac_new=ac+(bac-ev);
  const mgmtEac=p.mgmtEac||0;
  const etc=eac_cpi-ac;const vac=bac-eac_cpi;
  const tcpi=(bac-ev)>0&&(bac-ac)>0?(bac-ev)/(bac-ac):1;
  const tcpi_eac=(bac-ev)>0&&(eac_cpi-ac)>0?(bac-ev)/(eac_cpi-ac):1;
  return{bac,pv,ev,ac,sv,cv,spi,cpi,eac:eac_cpi,eac_composite,eac_spi,eac_new,mgmtEac,etc,vac,tcpi,tcpi_eac,
    pctComplete:bac>0?(ev/bac)*100:0,pctSpent:bac>0?(ac/bac)*100:0,pctPlanned:bac>0?(pv/bac)*100:0};
}

/* ── Earned Schedule ── */
function calcES(p){
  p=p||project;if(!p)return null;
  const dur=p.duration||12;const bac=p.bac||1;
  const evm=calcEVM(p);if(!evm)return null;
  // Build planned value curve (S-curve)
  const pvCurve=[];
  for(let i=0;i<=dur;i++){const t=i/dur;pvCurve.push({month:i,pv:bac/(1+Math.exp(-10*(t-0.5)))})}
  // ES = last month where PV <= EV + interpolation
  let es=0;
  for(let i=0;i<pvCurve.length-1;i++){
    if(pvCurve[i].pv<=evm.ev){es=i;if(pvCurve[i+1].pv>evm.ev){
      const frac=(evm.ev-pvCurve[i].pv)/(pvCurve[i+1].pv-pvCurve[i].pv);es=i+frac;break}}
  }
  // Elapsed time: approximate from planned percentage
  const at=dur*(evm.pctPlanned/100);
  const spit=at>0?es/at:1;
  const svt=es-at;
  const ieac_t=spit>0?dur/spit:dur*2;
  return{es:es,at:at,spiT:spit,svT:svt,ieacT:ieac_t,dur:dur};
}

/* ── Monte Carlo ── */
function runMonteCarlo(p,iterations=5000){
  p=p||project;if(!p)return null;
  const evm=calcEVM(p);if(!evm||evm.ev===0)return null;
  const cpi=evm.cpi;const spi=evm.spi;const bac=evm.bac;const ac=evm.ac;const ev=evm.ev;
  const remaining=bac-ev;
  // Triangular distribution parameters
  const cpiOpt=cpi*1.15;const cpiPess=cpi*0.85;const spiOpt=spi*1.15;const spiPess=spi*0.85;
  const results=[];
  for(let i=0;i<iterations;i++){
    const rCpi=triangularRandom(cpiPess,cpi,cpiOpt);
    const rSpi=triangularRandom(spiPess,spi,spiOpt);
    const composite=rCpi*rSpi;
    const eac=composite>0?ac+remaining/composite:bac*2;
    results.push(eac);
  }
  results.sort((a,b)=>a-b);
  const p10=results[Math.floor(iterations*0.1)];
  const p25=results[Math.floor(iterations*0.25)];
  const p50=results[Math.floor(iterations*0.5)];
  const p75=results[Math.floor(iterations*0.75)];
  const p90=results[Math.floor(iterations*0.9)];
  const mean=results.reduce((s,v)=>s+v,0)/iterations;
  const stdDev=Math.sqrt(results.reduce((s,v)=>s+(v-mean)**2,0)/iterations);
  // Histogram
  const buckets=30;const min=results[0];const max=results[results.length-1];const step=(max-min)/buckets||1;
  const hist=Array(buckets).fill(0);
  results.forEach(v=>{const b=Math.min(buckets-1,Math.floor((v-min)/step));hist[b]++});
  return{p10,p25,p50,p75,p90,mean,stdDev,min,max,hist,buckets,step,iterations,results};
}
function triangularRandom(a,c,b){
  const u=Math.random();const fc=(c-a)/(b-a);
  return u<fc?a+Math.sqrt(u*(b-a)*(c-a)):b-Math.sqrt((1-u)*(b-a)*(b-c));
}

/* ── Health ── */
function getHealth(evm){
  if(!evm)return{level:'nominal',label:'NO DATA',color:'var(--textDim)'};
  if(evm.spi<0.8||evm.cpi<0.8)return{level:'critical',label:'STALL WARNING',color:'var(--red)'};
  if(evm.spi<0.9||evm.cpi<0.9)return{level:'warning',label:'CAUTION',color:'var(--orange)'};
  if(evm.spi<0.95||evm.cpi<0.95)return{level:'watch',label:'WATCH',color:'var(--yellow)'};
  return{level:'nominal',label:'NOMINAL',color:'var(--green)'};
}
function kpiColor(val,good=0.95,warn=0.9){if(val>=good)return'var(--green)';if(val>=warn)return'var(--yellow)';return'var(--red)'}
function trendClass(arr,field){
  if(!arr||arr.length<2)return'trend-flat';
  const last=arr[arr.length-1][field];const prev=arr[arr.length-2][field];
  if(last>prev+0.005)return'trend-up';if(last<prev-0.005)return'trend-down';return'trend-flat';
}

/* ── Snapshot for Trends ── */
function takeSnapshot(){
  if(!project)return;
  const evm=calcEVM();if(!evm)return;
  if(!project.snapshots)project.snapshots=[];
  const today=new Date().toISOString().slice(0,10);
  // Prevent duplicate same-day snapshots
  if(project.snapshots.length>0&&project.snapshots[project.snapshots.length-1].date===today){
    project.snapshots[project.snapshots.length-1]={date:today,spi:evm.spi,cpi:evm.cpi,sv:evm.sv,cv:evm.cv,ev:evm.ev,ac:evm.ac,pv:evm.pv,pctComplete:evm.pctComplete};
  }else{
    project.snapshots.push({date:today,spi:evm.spi,cpi:evm.cpi,sv:evm.sv,cv:evm.cv,ev:evm.ev,ac:evm.ac,pv:evm.pv,pctComplete:evm.pctComplete});
  }
  save();render();
}

/* ── WBS Operations ── */
function addWbsItem(){if(!project)return;project.wbs.push({id:genId(),name:'New Item',budget:0,pctComplete:0,actualCost:0,plannedPct:0,children:[]});save();render()}
function addWbsChild(parentId){
  if(!project)return;const parent=project.wbs.find(w=>w.id===parentId);if(!parent)return;
  if(!parent.children)parent.children=[];
  parent.children.push({id:genId(),name:'Sub-item',budget:0,pctComplete:0,actualCost:0,plannedPct:0});save();render();
}
function updateWbs(id,field,val,parentId){
  if(!project)return;
  let item;
  if(parentId){const p=project.wbs.find(w=>w.id===parentId);if(p&&p.children)item=p.children.find(c=>c.id===id)}
  else{item=project.wbs.find(w=>w.id===id)}
  if(!item)return;
  item[field]=['budget','pctComplete','actualCost','plannedPct'].includes(field)?parseFloat(val)||0:val;
  // Roll up children to parent
  if(parentId){
    const p=project.wbs.find(w=>w.id===parentId);
    if(p&&p.children&&p.children.length>0){
      p.budget=p.children.reduce((s,c)=>s+(c.budget||0),0);
      p.actualCost=p.children.reduce((s,c)=>s+(c.actualCost||0),0);
      const totalBudget=p.budget||1;
      p.pctComplete=p.children.reduce((s,c)=>s+(c.budget||0)*(c.pctComplete||0)/100,0)/totalBudget*100;
      p.plannedPct=p.children.reduce((s,c)=>s+(c.budget||0)*(c.plannedPct||0)/100,0)/totalBudget*100;
    }
  }
  save();render();
}
function deleteWbs(id,parentId){
  if(!project)return;
  if(parentId){const p=project.wbs.find(w=>w.id===parentId);if(p&&p.children)p.children=p.children.filter(c=>c.id!==id)}
  else{project.wbs=project.wbs.filter(w=>w.id!==id)}
  save();render();
}
function updateProject(field,val){
  if(!project)return;
  project[field]=['bac','duration','mgmtEac'].includes(field)?parseFloat(val)||0:val;save();render();
}

/* ── Resources ── */
function addResource(){if(!project)return;if(!project.resources)project.resources=[];project.resources.push({id:genId(),name:'New Member',role:'',rate:0,budgetHrs:0,actualHrs:0});save();render()}
function updateResource(id,field,val){
  if(!project||!project.resources)return;
  const r=project.resources.find(x=>x.id===id);if(!r)return;
  r[field]=['rate','budgetHrs','actualHrs'].includes(field)?parseFloat(val)||0:val;save();render();
}
function deleteResource(id){if(!project)return;project.resources=(project.resources||[]).filter(r=>r.id!==id);save();render()}

/* ── KPIs ── */
function renderKpis(){
  const evm=calcEVM();const h=getHealth(evm);
  document.getElementById('health-badge').innerHTML=`<span class="health-badge" style="border:1px solid ${h.color};color:${h.color}">${h.label}</span>`;
  if(!evm){document.getElementById('kpis').innerHTML='<div class="kpi"><div class="kpi-label">Status</div><div class="kpi-value" style="color:var(--textDim);font-size:12px">No project loaded</div></div>';return}
  const es=calcES();
  document.getElementById('kpis').innerHTML=[
    ['BAC',fmt$(evm.bac),'var(--text)','Budget at Completion'],
    ['EV',fmt$(evm.ev),'var(--accent)','Earned Value'],
    ['PV',fmt$(evm.pv),'var(--yellow)','Planned Value'],

/* ── S-Curve ── */
function drawSCurve(){
  const evm=calcEVM();if(!evm||!project)return;
  setTimeout(()=>{
    const c=document.getElementById('scurve-canvas');if(!c)return;
    const ctx=c.getContext('2d');const dpr=window.devicePixelRatio||1;
    const cw=c.parentElement.clientWidth-2;const ch=350;
    c.width=cw*dpr;c.height=ch*dpr;c.style.width=cw+'px';c.style.height=ch+'px';
    ctx.scale(dpr,dpr);
    const w=cw,h=ch,pad={l:60,r:30,t:20,b:40},pw=w-pad.l-pad.r,ph=h-pad.t-pad.b;
    ctx.fillStyle='#060c12';ctx.fillRect(0,0,w,h);
    const dur=project.duration||12;const bac=project.bac||1;
    // Grid
    for(let i=0;i<=5;i++){const y=pad.t+ph*(1-i/5);ctx.strokeStyle='#1a2a3a';ctx.lineWidth=1;ctx.beginPath();ctx.moveTo(pad.l,y);ctx.lineTo(w-pad.r,y);ctx.stroke();
      ctx.fillStyle='rgba(226,232,240,0.3)';ctx.font='9px JetBrains Mono';ctx.textAlign='right';ctx.fillText(fmt$(bac*i/5),pad.l-5,y+3)}
    for(let i=0;i<=dur;i+=Math.ceil(dur/10)){const x=pad.l+i/dur*pw;ctx.fillStyle='rgba(226,232,240,0.3)';ctx.font='9px JetBrains Mono';ctx.textAlign='center';ctx.fillText('M'+i,x,h-10)}
    // PV curve (S-curve)
    ctx.beginPath();ctx.strokeStyle='#ffcc00';ctx.lineWidth=2;
    for(let i=0;i<=dur;i++){const t=i/dur;const pvPct=1/(1+Math.exp(-10*(t-0.5)));
      const x=pad.l+i/dur*pw;const y=pad.t+ph*(1-pvPct);if(i===0)ctx.moveTo(x,y);else ctx.lineTo(x,y)}
    ctx.stroke();
    // EV line
    const curPeriod=Math.round(dur*evm.pctPlanned/100);
    if(curPeriod>0){
      // EV with snapshot data if available
      const snaps=project.snapshots||[];
      if(snaps.length>1){
        ctx.beginPath();ctx.strokeStyle='#00d4ff';ctx.lineWidth=2.5;
        snaps.forEach((s,i)=>{
          const x=pad.l+(i/(snaps.length-1))*(curPeriod/dur)*pw;
          const y=pad.t+ph*(1-(s.ev||0)/bac);
          if(i===0)ctx.moveTo(x,y);else ctx.lineTo(x,y)});
        ctx.stroke();
        // AC line from snapshots
        ctx.beginPath();ctx.strokeStyle='#ff3344';ctx.lineWidth=2;ctx.setLineDash([6,3]);
        snaps.forEach((s,i)=>{
          const x=pad.l+(i/(snaps.length-1))*(curPeriod/dur)*pw;
          const y=pad.t+ph*(1-(s.ac||0)/bac);
          if(i===0)ctx.moveTo(x,y);else ctx.lineTo(x,y)});
        ctx.stroke();ctx.setLineDash([]);
      }else{
        ctx.beginPath();ctx.strokeStyle='#00d4ff';ctx.lineWidth=2.5;
        for(let i=0;i<=curPeriod;i++){const evPct=evm.pctComplete/100*(i/curPeriod);
          const x=pad.l+i/dur*pw;const y=pad.t+ph*(1-evPct);if(i===0)ctx.moveTo(x,y);else ctx.lineTo(x,y)}
        ctx.stroke();
        ctx.beginPath();ctx.strokeStyle='#ff3344';ctx.lineWidth=2;ctx.setLineDash([6,3]);
        for(let i=0;i<=curPeriod;i++){const acPct=evm.pctSpent/100*(i/curPeriod);
          const x=pad.l+i/dur*pw;const y=pad.t+ph*(1-acPct);if(i===0)ctx.moveTo(x,y);else ctx.lineTo(x,y)}
        ctx.stroke();ctx.setLineDash([]);
      }
    }
    // BAC line
    ctx.strokeStyle='rgba(226,232,240,0.15)';ctx.setLineDash([4,4]);ctx.beginPath();
    ctx.moveTo(pad.l,pad.t);ctx.lineTo(w-pad.r,pad.t);ctx.stroke();ctx.setLineDash([]);
    // EAC projection line
    if(evm.eac>0&&curPeriod>0){
      ctx.strokeStyle='rgba(255,51,68,0.3)';ctx.setLineDash([3,5]);ctx.beginPath();
      const eacY=pad.t+ph*(1-evm.eac/bac);
      ctx.moveTo(pad.l,Math.max(pad.t,eacY));ctx.lineTo(w-pad.r,Math.max(pad.t,eacY));ctx.stroke();ctx.setLineDash([]);
      ctx.fillStyle='rgba(255,51,68,0.5)';ctx.font='9px JetBrains Mono';ctx.textAlign='left';
      ctx.fillText('EAC '+fmt$(evm.eac),pad.l+5,Math.max(pad.t+12,eacY-4));
    }
    // Legend
    const leg=[['PV (Planned)','#ffcc00'],['EV (Earned)','#00d4ff'],['AC (Actual)','#ff3344']];
    leg.forEach(([label,color],i)=>{const lx=pad.l+10+i*130;const ly=pad.t+10;
      ctx.fillStyle=color;ctx.fillRect(lx,ly,12,3);ctx.fillStyle='rgba(226,232,240,0.5)';ctx.font='9px JetBrains Mono';ctx.textAlign='left';ctx.fillText(label,lx+16,ly+4)});
  },50);
}

/* ── WBS with drill-down ── */
function renderWbs(){
  if(!project)return'<div class="card"><div style="text-align:center;color:var(--textMuted);padding:20px">No project loaded</div></div>';
  const evm=calcEVM();
  function wbsRow(item,parentId){
    const ev=(item.budget||0)*(item.pctComplete||0)/100;const cv=ev-(item.actualCost||0);const cpi=(item.actualCost||0)>0?ev/(item.actualCost||0):1;
    const hasChildren=item.children&&item.children.length>0;
    const isParent=!parentId;
    return`<tr style="${isParent&&hasChildren?'background:rgba(0,212,255,0.02)':''}">
      <td class="${parentId?'wbs-child':''}">
        ${isParent&&hasChildren?'<span class="wbs-toggle">\u25BC </span>':''}
        ${parentId?'\u2514 ':''}
        <input type="text" value="${item.name}" onchange="updateWbs('${item.id}','name',this.value${parentId?`,'${parentId}'`:''})" style="width:${parentId?'130':'160'}px;display:inline-block">
      </td>
      <td><input type="number" value="${item.budget}" onchange="updateWbs('${item.id}','budget',this.value${parentId?`,'${parentId}'`:''})" style="width:90px" ${isParent&&hasChildren?'disabled title="Auto-calculated from children"':''}></td>
      <td><input type="number" value="${Math.round(item.plannedPct)}" min="0" max="100" onchange="updateWbs('${item.id}','plannedPct',this.value${parentId?`,'${parentId}'`:''})" style="width:55px" ${isParent&&hasChildren?'disabled':''}></td>
      <td><input type="number" value="${Math.round(item.pctComplete)}" min="0" max="100" onchange="updateWbs('${item.id}','pctComplete',this.value${parentId?`,'${parentId}'`:''})" style="width:55px" ${isParent&&hasChildren?'disabled':''}></td>
      <td><input type="number" value="${item.actualCost}" onchange="updateWbs('${item.id}','actualCost',this.value${parentId?`,'${parentId}'`:''})" style="width:90px" ${isParent&&hasChildren?'disabled':''}></td>
      <td style="color:var(--accent)">${fmt$(ev)}</td>
      <td style="color:${cv>=0?'var(--green)':'var(--red)'}">${fmt$(cv)}</td>
      <td style="color:${kpiColor(cpi)};font-weight:700">${fmtNum(cpi)}</td>
      <td style="white-space:nowrap">
        ${isParent?`<button class="btn" style="font-size:8px;padding:2px 6px;margin-right:2px" onclick="addWbsChild('${item.id}')" title="Add sub-item">+Sub</button>`:''}
        <button class="btn btn-red" style="font-size:8px;padding:2px 6px" onclick="deleteWbs('${item.id}'${parentId?`,'${parentId}'`:''})">Del</button>
      </td>
    </tr>`;
  }
  let rows='';
  (project.wbs||[]).forEach(item=>{
    rows+=wbsRow(item,null);
    if(item.children){item.children.forEach(ch=>{rows+=wbsRow(ch,item.id)})}
  });
  const totalBudget=(project.wbs||[]).reduce((s,w)=>s+(w.budget||0),0);
  const wbsBac=project.bac||0;
  const budgetDiff=wbsBac-totalBudget;
  return`<div class="card">
    <div class="flex-between" style="margin-bottom:14px">
      <div class="card-title">Work Breakdown Structure</div>
      <div style="display:flex;gap:8px;align-items:center">
        <span style="font-size:10px;color:${Math.abs(budgetDiff)<1?'var(--green)':'var(--yellow)'}">WBS Total: ${fmt$(totalBudget)} ${Math.abs(budgetDiff)>0?' ('+fmt$(budgetDiff)+' unallocated)':''}</span>
        <button class="btn btn-green" onclick="addWbsItem()">+ WBS Item</button>
      </div>
    </div>
    <div class="overflow-x"><table><thead><tr>
      ${['WBS Element','Budget','Plan%','Done%','Actual Cost','EV','CV','CPI',''].map(h=>`<th>${h}</th>`).join('')}
    </tr></thead><tbody>${rows}
    <tr style="border-top:2px solid var(--accent)">
      <td style="font-weight:700;color:var(--accent)">TOTALS</td>
      <td style="font-weight:700">${fmt$(totalBudget)}</td>
      <td style="font-weight:700">${evm?Math.round(evm.pctPlanned)+'%':'--'}</td>
      <td style="font-weight:700">${evm?Math.round(evm.pctComplete)+'%':'--'}</td>
      <td style="font-weight:700">${evm?fmt$(evm.ac):'--'}</td>
      <td style="font-weight:700;color:var(--accent)">${evm?fmt$(evm.ev):'--'}</td>
      <td style="font-weight:700;color:${evm&&evm.cv>=0?'var(--green)':'var(--red)'}">${evm?fmt$(evm.cv):'--'}</td>
      <td style="font-weight:700;color:${evm?kpiColor(evm.cpi):'var(--textDim)'}">${evm?fmtNum(evm.cpi):'--'}</td>
      <td></td>
    </tr>
    </tbody></table></div>
  </div>`;
}

/* ── Variance ── */

  return`<div class="variance-grid">

      <div class="card-title">Schedule Variance (SV)</div>

      <div style="font-size:11px;color:var(--textDim);margin-top:6px">SPI: <span style="color:${kpiColor(evm.spi)};font-weight:700">${fmtNum(evm.spi,3)}</span></div>
      <div style="font-size:10px;color:var(--textMuted);margin-top:4px">${evm.spi>=1?'Ahead of schedule':'Behind schedule by '+fmtPct((1-evm.spi)*100)}</div>

    <div class="card">
      <div class="card-title">Cost Variance (CV)</div>
      <div style="font-size:28px;font-weight:700;color:${evm.cv>=0?'var(--green)':'var(--red)'}">${fmt$(evm.cv)}</div>

      <div style="font-size:10px;color:var(--textMuted);margin-top:4px">${evm.cpi>=1?'Under budget':'Over budget by '+fmt$(Math.abs(evm.cv))}</div>

      <div style="font-size:10px;color:var(--textMuted);margin-top:4px">Required CPI for remaining work to meet BAC</div>
    </div>
  </div>
  <div class="card" style="margin-top:12px">
    <div class="card-title">WBS Element Variance</div>
    ${(project?.wbs||[]).map(item=>{
      const ev=(item.budget||0)*(item.pctComplete||0)/100;const cv=ev-(item.actualCost||0);const pct=item.budget>0?cv/item.budget*100:0;
      return`<div style="margin-bottom:10px">
        <div style="display:flex;justify-content:space-between;margin-bottom:3px">
          <span style="font-size:11px">${item.name}</span>
          <span style="font-size:11px;color:${cv>=0?'var(--green)':'var(--red)'}">${fmt$(cv)} (${fmtPct(pct)})</span>
        </div>
        <div class="progress-bar" style="height:8px"><div class="progress-fill" style="width:${Math.min(100,Math.abs(pct))}%;background:${cv>=0?'var(--green)':'var(--red)'}"></div></div>
      </div>`;
    }).join('')}
  </div>`;
}

        <div class="kpi-value ${trendClass(snaps,'cv')}" style="color:${snaps[snaps.length-1].cv>=0?'var(--green)':'var(--red)'}">${fmt$(snaps[snaps.length-1].cv)}</div>
      </div>
    </div>
    <div class="overflow-x"><table><thead><tr>
      <th>Date</th><th>SPI</th><th>CPI</th><th>SV</th><th>CV</th><th>EV</th><th>AC</th><th>% Done</th>
    </tr></thead><tbody>
      ${snaps.map((s,i)=>{
        const spiTrend=i>0?(s.spi>snaps[i-1].spi?'\u25B2':s.spi<snaps[i-1].spi?'\u25BC':'\u25C6'):'';
        const cpiTrend=i>0?(s.cpi>snaps[i-1].cpi?'\u25B2':s.cpi<snaps[i-1].cpi?'\u25BC':'\u25C6'):'';
        return`<tr>
          <td>${s.date}</td>
          <td style="color:${kpiColor(s.spi)}">${fmtNum(s.spi)} <span style="font-size:9px">${spiTrend}</span></td>
          <td style="color:${kpiColor(s.cpi)}">${fmtNum(s.cpi)} <span style="font-size:9px">${cpiTrend}</span></td>
          <td style="color:${s.sv>=0?'var(--green)':'var(--red)'}">${fmt$(s.sv)}</td>
          <td style="color:${s.cv>=0?'var(--green)':'var(--red)'}">${fmt$(s.cv)}</td>
          <td>${fmt$(s.ev)}</td>
          <td>${fmt$(s.ac)}</td>
          <td>${fmtPct(s.pctComplete)}</td>
        </tr>`}).join('')}
    </tbody></table></div>
    <div style="margin-top:16px"><canvas id="trend-canvas" style="width:100%;height:200px;border:1px solid var(--border);border-radius:6px"></canvas></div>
    `:''}
  </div>`;
}

function drawTrendChart(){
  const snaps=(project&&project.snapshots)||[];if(snaps.length<2)return;
  setTimeout(()=>{
    const c=document.getElementById('trend-canvas');if(!c)return;
    const ctx=c.getContext('2d');const dpr=window.devicePixelRatio||1;
    const cw=c.parentElement.clientWidth-2;const ch=200;
    c.width=cw*dpr;c.height=ch*dpr;c.style.width=cw+'px';c.style.height=ch+'px';
    ctx.scale(dpr,dpr);
    ctx.fillStyle='#060c12';ctx.fillRect(0,0,cw,ch);
    const pad={l:40,r:20,t:15,b:25},pw=cw-pad.l-pad.r,ph=ch-pad.t-pad.b;
    // Y range: 0.7 to 1.3 for SPI/CPI
    const yMin=0.7,yMax=1.3;
    // Grid
    ctx.strokeStyle='#1a2a3a';ctx.lineWidth=1;
    for(let v=0.8;v<=1.2;v+=0.1){
      const y=pad.t+ph*(1-(v-yMin)/(yMax-yMin));
      ctx.beginPath();ctx.moveTo(pad.l,y);ctx.lineTo(cw-pad.r,y);ctx.stroke();
      ctx.fillStyle='rgba(226,232,240,0.3)';ctx.font='9px JetBrains Mono';ctx.textAlign='right';ctx.fillText(v.toFixed(1),pad.l-4,y+3);
    }
    // 1.0 line
    const oneY=pad.t+ph*(1-(1-yMin)/(yMax-yMin));
    ctx.strokeStyle='rgba(226,232,240,0.25)';ctx.setLineDash([4,4]);ctx.beginPath();ctx.moveTo(pad.l,oneY);ctx.lineTo(cw-pad.r,oneY);ctx.stroke();ctx.setLineDash([]);
    // SPI line
    ctx.beginPath();ctx.strokeStyle='#ffcc00';ctx.lineWidth=2;
    snaps.forEach((s,i)=>{const x=pad.l+i/(snaps.length-1)*pw;const y=pad.t+ph*(1-(clamp(s.spi,yMin,yMax)-yMin)/(yMax-yMin));if(i===0)ctx.moveTo(x,y);else ctx.lineTo(x,y)});
    ctx.stroke();
    // CPI line
    ctx.beginPath();ctx.strokeStyle='#00d4ff';ctx.lineWidth=2;
    snaps.forEach((s,i)=>{const x=pad.l+i/(snaps.length-1)*pw;const y=pad.t+ph*(1-(clamp(s.cpi,yMin,yMax)-yMin)/(yMax-yMin));if(i===0)ctx.moveTo(x,y);else ctx.lineTo(x,y)});
    ctx.stroke();
    // Dots and labels
    snaps.forEach((s,i)=>{const x=pad.l+i/(snaps.length-1)*pw;
      [['spi','#ffcc00'],['cpi','#00d4ff']].forEach(([k,col])=>{
        const y=pad.t+ph*(1-(clamp(s[k],yMin,yMax)-yMin)/(yMax-yMin));
        ctx.fillStyle=col;ctx.beginPath();ctx.arc(x,y,3,0,Math.PI*2);ctx.fill()});
      ctx.fillStyle='rgba(226,232,240,0.3)';ctx.font='8px JetBrains Mono';ctx.textAlign='center';
      ctx.fillText(s.date.slice(5),x,ch-8)});
    // Legend
    ctx.fillStyle='#ffcc00';ctx.fillRect(pad.l+5,pad.t+2,10,3);ctx.fillStyle='rgba(226,232,240,0.5)';ctx.font='9px JetBrains Mono';ctx.textAlign='left';ctx.fillText('SPI',pad.l+20,pad.t+6);
    ctx.fillStyle='#00d4ff';ctx.fillRect(pad.l+55,pad.t+2,10,3);ctx.fillStyle='rgba(226,232,240,0.5)';ctx.fillText('CPI',pad.l+70,pad.t+6);
  },50);
}

/* ── Monte Carlo Tab ── */
function renderMonteCarlo(){
  if(!project)return'<div class="card"><div style="text-align:center;color:var(--textMuted);padding:20px">No project loaded</div></div>';
  const evm=calcEVM();
  if(!evm||evm.ev===0)return'<div class="card"><div style="text-align:center;color:var(--textMuted);padding:20px">Need earned value data (% complete > 0) to run simulation.</div></div>';
  const mc=runMonteCarlo();
  if(!mc)return'<div class="card"><div style="text-align:center;color:var(--textMuted);padding:20px">Insufficient data for simulation</div></div>';
  const maxHist=Math.max(...mc.hist);
  return`<div class="card">
    <div class="card-title">Monte Carlo Risk-Adjusted Forecast (${mc.iterations.toLocaleString()} iterations)</div>
    <div style="display:grid;grid-template-columns:repeat(auto-fit,minmax(130px,1fr));gap:8px;margin-bottom:16px">
      <div class="kpi"><div class="kpi-label">P10 (Optimistic)</div><div class="kpi-value" style="color:var(--green);font-size:14px">${fmt$(mc.p10)}</div></div>
      <div class="kpi"><div class="kpi-label">P25</div><div class="kpi-value" style="color:var(--green);font-size:14px">${fmt$(mc.p25)}</div></div>
      <div class="kpi"><div class="kpi-label">P50 (Most Likely)</div><div class="kpi-value" style="color:var(--accent);font-size:14px">${fmt$(mc.p50)}</div><div class="kpi-sub">Median</div></div>
      <div class="kpi"><div class="kpi-label">P75</div><div class="kpi-value" style="color:var(--yellow);font-size:14px">${fmt$(mc.p75)}</div></div>
      <div class="kpi"><div class="kpi-label">P90 (Pessimistic)</div><div class="kpi-value" style="color:var(--red);font-size:14px">${fmt$(mc.p90)}</div></div>
    </div>
    <div style="display:grid;grid-template-columns:1fr 1fr 1fr;gap:12px;margin-bottom:16px">
      <div class="kpi"><div class="kpi-label">Mean EAC</div><div class="kpi-value" style="font-size:14px">${fmt$(mc.mean)}</div></div>
      <div class="kpi"><div class="kpi-label">Std Deviation</div><div class="kpi-value" style="font-size:14px">${fmt$(mc.stdDev)}</div></div>
      <div class="kpi"><div class="kpi-label">Range</div><div class="kpi-value" style="font-size:12px">${fmt$(mc.min)} - ${fmt$(mc.max)}</div></div>
    </div>
    <div style="margin-bottom:8px;font-size:10px;color:var(--textDim);text-transform:uppercase;letter-spacing:0.1em">EAC Distribution Histogram</div>
    <div style="display:flex;align-items:flex-end;gap:1px;height:100px;padding:0 4px">
      ${mc.hist.map((count,i)=>{
        const pct=(count/maxHist)*100;
        const val=mc.min+i*mc.step+mc.step/2;
        const isP50=val>=mc.p50-mc.step&&val<=mc.p50+mc.step;
        const isBac=val>=evm.bac-mc.step&&val<=evm.bac+mc.step;
        const color=isP50?'var(--accent)':isBac?'var(--yellow)':'rgba(0,212,255,0.4)';
        return`<div style="flex:1;height:${pct}%;background:${color};border-radius:1px 1px 0 0;min-width:2px" title="${fmt$(val)}: ${count} samples"></div>`;
      }).join('')}
    </div>
    <div style="display:flex;justify-content:space-between;font-size:8px;color:var(--textMuted);margin-top:4px;padding:0 4px">
      <span>${fmt$(mc.min)}</span>
      <span style="color:var(--yellow)">BAC: ${fmt$(evm.bac)}</span>
      <span>${fmt$(mc.max)}</span>
    </div>
  </div>
  <div class="card">
    <div class="card-title">Scenario Summary</div>
    <div class="overflow-x"><table><thead><tr><th>Scenario</th><th>EAC</th><th>vs BAC</th><th>Probability</th><th>Assessment</th></tr></thead><tbody>
      <tr>
        <td style="color:var(--green);font-weight:600">Optimistic (P10)</td>
        <td>${fmt$(mc.p10)}</td>
        <td style="color:${mc.p10<=evm.bac?'var(--green)':'var(--red)'}">${mc.p10<=evm.bac?'':'+'} ${fmt$(mc.p10-evm.bac)}</td>
        <td>90% chance EAC exceeds this</td>
        <td style="font-size:9px;color:var(--textDim)">Best case with favorable conditions</td>
      </tr>
      <tr>
        <td style="color:var(--accent);font-weight:600">Most Likely (P50)</td>
        <td>${fmt$(mc.p50)}</td>
        <td style="color:${mc.p50<=evm.bac?'var(--green)':'var(--red)'}">${mc.p50<=evm.bac?'':'+'} ${fmt$(mc.p50-evm.bac)}</td>
        <td>50/50 probability</td>
        <td style="font-size:9px;color:var(--textDim)">Median outcome based on current performance</td>
      </tr>
      <tr>
        <td style="color:var(--red);font-weight:600">Pessimistic (P90)</td>
        <td>${fmt$(mc.p90)}</td>
        <td style="color:${mc.p90<=evm.bac?'var(--green)':'var(--red)'}">${mc.p90<=evm.bac?'':'+'} ${fmt$(mc.p90-evm.bac)}</td>
        <td>90% confidence EAC is below this</td>
        <td style="font-size:9px;color:var(--textDim)">Conservative estimate for risk mitigation</td>
      </tr>
    </tbody></table></div>
  </div>`;
}

/* ── Resources Tab ── */
function renderResources(){
  if(!project)return'<div class="card"><div style="text-align:center;color:var(--textMuted);padding:20px">No project loaded</div></div>';
  const resources=project.resources||[];
  const totalBudgetHrs=resources.reduce((s,r)=>s+(r.budgetHrs||0),0);
  const totalActualHrs=resources.reduce((s,r)=>s+(r.actualHrs||0),0);
  const totalBudgetCost=resources.reduce((s,r)=>s+(r.rate||0)*(r.budgetHrs||0),0);
  const totalActualCost=resources.reduce((s,r)=>s+(r.rate||0)*(r.actualHrs||0),0);
  const hrsPct=totalBudgetHrs>0?(totalActualHrs/totalBudgetHrs)*100:0;
  return`<div class="card">
    <div class="flex-between" style="margin-bottom:14px">
      <div class="card-title">Resource Tracking</div>
      <button class="btn btn-green" onclick="addResource()">+ Resource</button>

      <div class="kpi"><div class="kpi-label">Actual Hours</div><div class="kpi-value" style="font-size:14px;color:${hrsPct>100?'var(--red)':'var(--accent)'}">${totalActualHrs.toLocaleString()}</div></div>
      <div class="kpi"><div class="kpi-label">Hours Burned</div><div class="kpi-value" style="font-size:14px;color:${hrsPct>90?'var(--red)':hrsPct>75?'var(--yellow)':'var(--green)'}">${fmtPct(hrsPct)}</div></div>
      <div class="kpi"><div class="kpi-label">Budget Cost (Labor)</div><div class="kpi-value" style="font-size:14px">${fmt$(totalBudgetCost)}</div></div>

      <th>Name</th><th>Role</th><th>Rate ($/hr)</th><th>Budget Hrs</th><th>Actual Hrs</th><th>Remaining</th><th>Budget $</th><th>Actual $</th><th>Burndown</th><th></th>
    </tr></thead><tbody>
      ${resources.map(r=>{
        const remaining=Math.max(0,(r.budgetHrs||0)-(r.actualHrs||0));
        const burnPct=(r.budgetHrs||0)>0?((r.actualHrs||0)/(r.budgetHrs||0))*100:0;
        const budgetCost=(r.rate||0)*(r.budgetHrs||0);
        const actualCost=(r.rate||0)*(r.actualHrs||0);
        return`<tr>
          <td><input type="text" value="${r.name}" onchange="updateResource('${r.id}','name',this.value)" style="width:120px"></td>
          <td><input type="text" value="${r.role||''}" onchange="updateResource('${r.id}','role',this.value)" style="width:100px"></td>
          <td><input type="number" value="${r.rate||0}" onchange="updateResource('${r.id}','rate',this.value)" style="width:70px"></td>
          <td><input type="number" value="${r.budgetHrs||0}" onchange="updateResource('${r.id}','budgetHrs',this.value)" style="width:70px"></td>
          <td><input type="number" value="${r.actualHrs||0}" onchange="updateResource('${r.id}','actualHrs',this.value)" style="width:70px"></td>
          <td style="color:${remaining<=0?'var(--red)':'var(--textDim)'}">${remaining}</td>
          <td>${fmt$(budgetCost)}</td>
          <td style="color:${actualCost>budgetCost?'var(--red)':'var(--green)'}">${fmt$(actualCost)}</td>
          <td style="width:100px">
            <div class="progress-bar" style="height:8px"><div class="progress-fill" style="width:${Math.min(100,burnPct)}%;background:${burnPct>100?'var(--red)':burnPct>80?'var(--yellow)':'var(--green)'}"></div></div>
            <div style="font-size:8px;color:var(--textDim);margin-top:2px">${fmtPct(burnPct)}</div>
          </td>
          <td><button class="btn btn-red" style="font-size:8px;padding:2px 6px" onclick="deleteResource('${r.id}')">Del</button></td>
        </tr>`}).join('')}
    </tbody></table></div>
  </div>
  <div class="card">
    <div class="card-title">Resource Burndown</div>
    <div style="margin-top:8px">
      ${resources.filter(r=>r.budgetHrs>0).map(r=>{
        const burnPct=Math.min(100,((r.actualHrs||0)/(r.budgetHrs||0))*100);
        const remaining=Math.max(0,r.budgetHrs-r.actualHrs);
        return`<div style="margin-bottom:12px">
          <div style="display:flex;justify-content:space-between;margin-bottom:3px">
            <span style="font-size:11px">${r.name} <span style="color:var(--textDim)">(${r.role||''})</span></span>
            <span style="font-size:10px;color:${burnPct>=100?'var(--red)':'var(--textDim)'}">${r.actualHrs||0} / ${r.budgetHrs} hrs (${remaining} remaining)</span>
          </div>
          <div class="progress-bar" style="height:10px">
            <div class="progress-fill" style="width:${burnPct}%;background:${burnPct>=100?'var(--red)':burnPct>80?'var(--yellow)':'var(--accent)'}"></div>
          </div>
        </div>`}).join('')}
    </div>
  </div>`;
}

/* ── Setup Tab ── */

    <div class="card-title">Project Setup</div>
    <div class="form-row">
      <div class="form-group"><div class="form-label">Project Name</div><input type="text" value="${project.name||''}" onchange="updateProject('name',this.value)"></div>
      <div class="form-group"><div class="form-label">Client</div><input type="text" value="${project.client||''}" onchange="updateProject('client',this.value)"></div>
      <div class="form-group"><div class="form-label">Contract #</div><input type="text" value="${project.contract||''}" onchange="updateProject('contract',this.value)"></div>
    </div>
    <div class="form-row">
      <div class="form-group"><div class="form-label">Budget at Completion (BAC)</div><input type="number" value="${project.bac||0}" onchange="updateProject('bac',this.value)"></div>
      <div class="form-group"><div class="form-label">Duration (months)</div><input type="number" value="${project.duration||12}" onchange="updateProject('duration',this.value)"></div>
      <div class="form-group"><div class="form-label">Start Date</div><input type="date" value="${project.startDate||''}" onchange="updateProject('startDate',this.value)"></div>
    </div>
    <div class="form-row">
      <div class="form-group"><div class="form-label">Management EAC</div><input type="number" value="${project.mgmtEac||0}" onchange="updateProject('mgmtEac',this.value)"></div>
    </div>
    <div style="margin-top:12px;display:flex;gap:8px;flex-wrap:wrap">
      <button class="btn btn-accent" onclick="save();render()">Save Project</button>
      <button class="btn btn-green" onclick="takeSnapshot()">Take Snapshot</button>
      <button class="btn" onclick="exportJSON()">Export JSON</button>
      <button class="btn" onclick="document.getElementById('import-file').click()">Import JSON</button>
      <input type="file" id="import-file" accept=".json" style="display:none" onchange="importJSON(event)">
      <button class="btn btn-red" onclick="if(confirm('Reset this project?')){deleteProject(project.id);render()}">Delete Project</button>

  <div class="card">

      <div>Snapshots: <strong style="color:var(--accent)">${(project.snapshots||[]).length}</strong> recorded for this project</div>
      <div>WBS Items: <strong style="color:var(--accent)">${(project.wbs||[]).reduce((s,w)=>s+1+(w.children?w.children.length:0),0)}</strong> (including sub-items)</div>
      <div>Resources: <strong style="color:var(--accent)">${(project.resources||[]).length}</strong> tracked</div>
      <div style="margin-top:8px;color:var(--textMuted)">Data stored in localStorage with korb_ prefix. Export regularly for backup.</div>
    </div>
  </div>`;
}

/* ── Export ── */
function exportJSON(){
  if(!project)return;
  const blob=new Blob([JSON.stringify(project,null,2)],{type:'application/json'});
  const a=document.createElement('a');a.href=URL.createObjectURL(blob);
  a.download=(project.name||'evm-project').replace(/\s+/g,'_').toLowerCase()+'.json';a.click();
}
function importJSON(e){
  const file=e.target.files[0];if(!file)return;
  const reader=new FileReader();reader.onload=function(ev){
    try{const data=JSON.parse(ev.target.result);if(data.bac!==undefined){project=data;if(!project.id)project.id=genId();activeProjectId=project.id;save();render()}}catch{alert('Invalid JSON file')}
  };reader.readAsText(file);e.target.value='';
}

function exportReport(){
  if(!project)return;
  const evm=calcEVM();const es=calcES();const mc=runMonteCarlo();
  const h=getHealth(evm);
  const now=new Date().toLocaleString();
  const html=`<!DOCTYPE html><html><head><meta charset="UTF-8"><title>EVM Report - ${project.name}</title>

@media print{body{margin:0;padding:10px}}
</style></head><body>
<h1>Earned Value Management Report</h1>

${(project.wbs||[]).map(w=>{const ev=(w.budget||0)*(w.pctComplete||0)/100;const cv=ev-(w.actualCost||0);const cpi=(w.actualCost||0)>0?ev/(w.actualCost||0):1;
return`<tr><td><strong>${w.name}</strong></td><td>${fmt$(w.budget)}</td><td>${Math.round(w.plannedPct)}%</td><td>${Math.round(w.pctComplete)}%</td><td>${fmt$(w.actualCost)}</td><td>${fmt$(ev)}</td><td class="${cv>=0?'green':'red'}">${fmt$(cv)}</td><td>${fmtNum(cpi)}</td></tr>
${(w.children||[]).map(c=>{const cev=(c.budget||0)*(c.pctComplete||0)/100;const ccv=cev-(c.actualCost||0);const ccpi=(c.actualCost||0)>0?cev/(c.actualCost||0):1;

</tbody></table>`:''}

${mc?`<h2>Monte Carlo Analysis (${mc.iterations.toLocaleString()} iterations)</h2>

${(project.resources||[]).length>0?`<h2>Resources</h2>

${project.resources.map(r=>`<tr><td>${r.name}</td><td>${r.role||''}</td><td>$${r.rate||0}/hr</td><td>${r.budgetHrs||0}</td><td>${r.actualHrs||0}</td><td>${fmt$((r.rate||0)*(r.budgetHrs||0))}</td><td>${fmt$((r.rate||0)*(r.actualHrs||0))}</td></tr>`).join('')}
</tbody></table>`:''}

<div class="footer"><span>Korb Engineering -- Earned Value Management</span><span>${now}</span></div>
</body></html>`;
  const blob=new Blob([html],{type:'text/html'});
  const a=document.createElement('a');a.href=URL.createObjectURL(blob);
  a.download='evm-report_'+(project.name||'project').replace(/\s+/g,'_').toLowerCase()+'_'+new Date().toISOString().slice(0,10)+'.html';

/* ── Main Render ── */
function render(){
  renderKpis();renderTabs();
  const c=document.getElementById('content');
  switch(currentTab){
    case'portfolio':c.innerHTML=renderPortfolio();break;
    case's-curve':c.innerHTML=renderSCurve();drawSCurve();break;
    case'wbs':c.innerHTML=renderWbs();break;
    case'variance':c.innerHTML=renderVariance();break;
    case'trends':c.innerHTML=renderTrends();drawTrendChart();break;
    case'forecasts':c.innerHTML=renderForecasts();break;
    case'monte-carlo':c.innerHTML=renderMonteCarlo();break;
    case'earned-schedule':c.innerHTML=renderEarnedSchedule();break;
    case'resources':c.innerHTML=renderResources();break;
    case'setup':c.innerHTML=renderSetup();break;
  }
}

window.addEventListener('resize',()=>{if(currentTab==='s-curve')drawSCurve();if(currentTab==='trends')drawTrendChart()});
load();render();
</script>
