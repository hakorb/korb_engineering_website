<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>Eisenhower Priority Matrix | Korb Engineering</title>
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{--bg:#050a0f;--surface:#0a1018;--surface2:#0e1520;--border:#1a2535;--text:#e2e8f0;--cyan:#00d4ff;--orange:#ff6600;--green:#10b981;--red:#ef4444;--dim:#64748b}
html{font-size:16px}
body{font-family:'JetBrains Mono',monospace;background:var(--bg);color:var(--text);min-height:100vh;line-height:1.6}
header{background:var(--surface);border-bottom:1px solid var(--border);padding:16px 20px;display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:8px}
.brand{display:flex;align-items:center;gap:12px}
.brand-icon{width:36px;height:36px;background:var(--cyan);border-radius:6px;display:flex;align-items:center;justify-content:center;font-weight:700;color:var(--bg);font-size:14px}
.brand-title{font-size:18px;font-weight:600;color:var(--cyan)}
.brand-name{font-size:13px;color:var(--dim);font-weight:300}
.header-actions{display:flex;gap:8px;flex-wrap:wrap}
.header-actions button{width:auto;padding:8px 16px;font-size:13px}
main{max-width:1400px;margin:0 auto;padding:20px}
label{display:block;font-size:13px;color:var(--dim);margin-bottom:4px}
input,select,textarea,button{font-family:'JetBrains Mono',monospace;font-size:16px;border-radius:6px;border:1px solid var(--border);background:var(--surface2);color:var(--text);padding:10px 14px;width:100%;min-height:44px;outline:none;transition:border-color .2s}
input:focus,select:focus,textarea:focus{border-color:var(--cyan)}
textarea{resize:vertical;min-height:60px}
button{background:var(--cyan);color:var(--bg);font-weight:600;cursor:pointer;border:none;text-align:center}
button:hover{opacity:.9}
button.secondary{background:var(--surface2);color:var(--text);border:1px solid var(--border)}
button.danger{background:var(--red);color:#fff}
button.small{min-height:32px;padding:4px 10px;font-size:12px;width:auto}
.mb{margin-bottom:14px}
.row{display:flex;gap:12px;margin-bottom:14px}
.row>div{flex:1}

/* Stats bar */
.stats{display:flex;gap:12px;margin-bottom:20px;flex-wrap:wrap}
.stat{background:var(--surface);border:1px solid var(--border);border-radius:8px;padding:12px 16px;flex:1;min-width:120px;text-align:center}
.stat-val{font-size:22px;font-weight:700}
.stat-label{font-size:11px;color:var(--dim)}

/* Filter bar */
.filters{background:var(--surface);border:1px solid var(--border);border-radius:10px;padding:14px 20px;margin-bottom:20px;display:flex;gap:12px;flex-wrap:wrap;align-items:end}
.filters>div{flex:1;min-width:150px}
.filters button{width:auto;min-width:100px}

/* Matrix grid */
.matrix{display:grid;grid-template-columns:1fr 1fr;gap:16px;margin-bottom:20px}
@media(max-width:700px){.matrix{grid-template-columns:1fr}}
.quadrant{background:var(--surface);border:1px solid var(--border);border-radius:10px;padding:16px;min-height:250px;transition:background .2s}
.quadrant.drag-over{background:var(--surface2);border-color:var(--cyan)}
.q-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:12px;padding-bottom:8px;border-bottom:1px solid var(--border)}
.q-title{font-size:14px;font-weight:600}
.q-badge{font-size:12px;padding:2px 8px;border-radius:12px;font-weight:600}
.q1 .q-title,.q1 .q-badge{color:var(--red)}
.q1 .q-badge{background:rgba(239,68,68,.15)}
.q1{border-left:3px solid var(--red)}
.q2 .q-title,.q2 .q-badge{color:var(--cyan)}
.q2 .q-badge{background:rgba(0,212,255,.15)}
.q2{border-left:3px solid var(--cyan)}
.q3 .q-title,.q3 .q-badge{color:var(--orange)}
.q3 .q-badge{background:rgba(255,102,0,.15)}
.q3{border-left:3px solid var(--orange)}
.q4 .q-title,.q4 .q-badge{color:var(--dim)}
.q4 .q-badge{background:rgba(100,116,139,.15)}
.q4{border-left:3px solid var(--dim)}

.task-card{background:var(--surface2);border:1px solid var(--border);border-radius:8px;padding:12px;margin-bottom:8px;cursor:grab;transition:transform .1s,box-shadow .2s}
.task-card:active{cursor:grabbing;transform:scale(1.02);box-shadow:0 4px 20px rgba(0,0,0,.4)}
.task-card.dragging{opacity:.4}
.task-title{font-size:14px;font-weight:600;margin-bottom:4px}
.task-meta{font-size:11px;color:var(--dim);display:flex;gap:8px;flex-wrap:wrap;margin-bottom:6px}
.task-desc{font-size:12px;color:var(--dim);margin-bottom:8px;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden}
.task-actions{display:flex;gap:6px;justify-content:flex-end}
.task-overdue{border-left:3px solid var(--red)}
.task-done{opacity:.5;text-decoration:line-through}

/* Modal */
.modal-bg{position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,.7);display:none;align-items:center;justify-content:center;z-index:1000;padding:20px}
.modal-bg.active{display:flex}
.modal{background:var(--surface);border:1px solid var(--border);border-radius:12px;padding:24px;max-width:500px;width:100%;max-height:90vh;overflow-y:auto}
.modal h2{font-size:16px;color:var(--cyan);margin-bottom:16px}

/* Mobile quadrant selector */
.mobile-move{display:none}
@media(max-width:700px){.mobile-move{display:block}}
</style>
</head>
<body>
<header>
<div class="brand">
<div class="brand-icon">KE</div>
<div>
<div class="brand-title">Eisenhower Priority Matrix</div>
<div class="brand-name">Korb Engineering</div>
</div>
</div>
<div class="header-actions">
<button onclick="openAddModal()" style="background:var(--green)">+ Add Task</button>
<button class="secondary" onclick="exportTasks()">Export</button>
<button class="secondary" onclick="showArchive()">Archive</button>
</div>
</header>
<main>
<div class="stats">
<div class="stat"><div class="stat-val" id="statTotal">0</div><div class="stat-label">Total Tasks</div></div>
<div class="stat"><div class="stat-val" style="color:var(--red)" id="statQ1">0</div><div class="stat-label">Do First</div></div>
<div class="stat"><div class="stat-val" style="color:var(--cyan)" id="statQ2">0</div><div class="stat-label">Schedule</div></div>
<div class="stat"><div class="stat-val" style="color:var(--orange)" id="statQ3">0</div><div class="stat-label">Delegate</div></div>
<div class="stat"><div class="stat-val" style="color:var(--dim)" id="statQ4">0</div><div class="stat-label">Eliminate</div></div>
<div class="stat"><div class="stat-val" style="color:var(--red)" id="statOverdue">0</div><div class="stat-label">Overdue</div></div>
</div>

<div class="filters">
<div>
<label>Filter by Assignee</label>
<select id="filterAssignee" onchange="render()"><option value="">All</option></select>
</div>
<div>
<label>Due From</label>
<input type="date" id="filterFrom" onchange="render()">
</div>
<div>
<label>Due To</label>
<input type="date" id="filterTo" onchange="render()">
</div>
<button class="secondary" onclick="clearFilters()" style="min-height:44px;align-self:end">Clear</button>
</div>

<div class="matrix">
<div class="quadrant q1" id="quadrant-1" ondragover="onDragOver(event)" ondrop="onDrop(event,1)" ondragleave="onDragLeave(event)">
<div class="q-header"><span class="q-title">Q1: DO FIRST</span><span class="q-badge" id="badge-1">0</span></div>
<div class="q-subtitle" style="font-size:11px;color:var(--dim);margin-bottom:12px">Urgent + Important</div>
<div class="q-tasks" id="tasks-1"></div>
</div>
<div class="quadrant q2" id="quadrant-2" ondragover="onDragOver(event)" ondrop="onDrop(event,2)" ondragleave="onDragLeave(event)">
<div class="q-header"><span class="q-title">Q2: SCHEDULE</span><span class="q-badge" id="badge-2">0</span></div>
<div class="q-subtitle" style="font-size:11px;color:var(--dim);margin-bottom:12px">Not Urgent + Important</div>
<div class="q-tasks" id="tasks-2"></div>
</div>
<div class="quadrant q3" id="quadrant-3" ondragover="onDragOver(event)" ondrop="onDrop(event,3)" ondragleave="onDragLeave(event)">
<div class="q-header"><span class="q-title">Q3: DELEGATE</span><span class="q-badge" id="badge-3">0</span></div>
<div class="q-subtitle" style="font-size:11px;color:var(--dim);margin-bottom:12px">Urgent + Not Important</div>
<div class="q-tasks" id="tasks-3"></div>
</div>
<div class="quadrant q4" id="quadrant-4" ondragover="onDragOver(event)" ondrop="onDrop(event,4)" ondragleave="onDragLeave(event)">
<div class="q-header"><span class="q-title">Q4: ELIMINATE</span><span class="q-badge" id="badge-4">0</span></div>
<div class="q-subtitle" style="font-size:11px;color:var(--dim);margin-bottom:12px">Not Urgent + Not Important</div>
<div class="q-tasks" id="tasks-4"></div>
</div>
</div>
</main>

<!-- Add/Edit Modal -->
<div class="modal-bg" id="taskModal">
<div class="modal">
<h2 id="modalTitle">Add Task</h2>
<div class="mb">
<label>Title *</label>
<input type="text" id="taskTitle" placeholder="Task title">
</div>
<div class="mb">
<label>Description</label>
<textarea id="taskDesc" placeholder="Optional description"></textarea>
</div>
<div class="row">
<div>
<label>Due Date</label>
<input type="date" id="taskDue">
</div>
<div>
<label>Assigned To</label>
<input type="text" id="taskAssignee" placeholder="Name">
</div>
</div>
<div class="mb">
<label>Quadrant</label>
<select id="taskQuadrant">
<option value="1">Q1: Do First (Urgent + Important)</option>
<option value="2">Q2: Schedule (Not Urgent + Important)</option>
<option value="3">Q3: Delegate (Urgent + Not Important)</option>
<option value="4">Q4: Eliminate (Not Urgent + Not Important)</option>
</select>
</div>
<div style="display:flex;gap:8px;margin-top:16px">
<button onclick="saveTask()">Save</button>
<button class="secondary" onclick="closeModal()">Cancel</button>
</div>
</div>
</div>

<!-- Archive Modal -->
<div class="modal-bg" id="archiveModal">
<div class="modal">
<h2>Archived Tasks</h2>
<div id="archiveList" style="max-height:400px;overflow-y:auto"></div>
<div style="display:flex;gap:8px;margin-top:16px">
<button class="danger" onclick="clearArchive()">Clear Archive</button>
<button class="secondary" onclick="closeArchiveModal()">Close</button>
</div>
</div>
</div>

<script>
let tasks=[];
let archived=[];
let editingId=null;
let dragId=null;

function genId(){return 'task_'+Date.now()+'_'+Math.random().toString(36).substr(2,6);}

function today(){return new Date().toISOString().split('T')[0];}

function isOverdue(task){
  if(!task.due) return false;
  return task.due<today();
}

function openAddModal(){
  editingId=null;
  document.getElementById('modalTitle').textContent='Add Task';
  document.getElementById('taskTitle').value='';
  document.getElementById('taskDesc').value='';
  document.getElementById('taskDue').value='';
  document.getElementById('taskAssignee').value='';
  document.getElementById('taskQuadrant').value='1';
  document.getElementById('taskModal').classList.add('active');
}

function openEditModal(id){
  const task=tasks.find(t=>t.id===id);
  if(!task) return;
  editingId=id;
  document.getElementById('modalTitle').textContent='Edit Task';
  document.getElementById('taskTitle').value=task.title;
  document.getElementById('taskDesc').value=task.desc||'';
  document.getElementById('taskDue').value=task.due||'';
  document.getElementById('taskAssignee').value=task.assignee||'';
  document.getElementById('taskQuadrant').value=task.quadrant;
  document.getElementById('taskModal').classList.add('active');
}

function closeModal(){document.getElementById('taskModal').classList.remove('active');}

function saveTask(){
  const title=document.getElementById('taskTitle').value.trim();
  if(!title){alert('Title is required.');return;}
  const data={
    title,
    desc:document.getElementById('taskDesc').value.trim(),
    due:document.getElementById('taskDue').value,
    assignee:document.getElementById('taskAssignee').value.trim(),
    quadrant:parseInt(document.getElementById('taskQuadrant').value)
  };
  if(editingId){
    const task=tasks.find(t=>t.id===editingId);
    if(task) Object.assign(task,data);
  } else {
    tasks.push({id:genId(),created:today(),...data});
  }
  closeModal();
  saveState();
  render();
}

function deleteTask(id){
  if(!confirm('Delete this task?')) return;
  tasks=tasks.filter(t=>t.id!==id);
  saveState();
  render();
}

function archiveTask(id){
  const idx=tasks.findIndex(t=>t.id===id);
  if(idx===-1) return;
  archived.push({...tasks[idx],archivedDate:today()});
  tasks.splice(idx,1);
  saveState();
  render();
}

function showArchive(){
  const list=document.getElementById('archiveList');
  if(archived.length===0){
    list.innerHTML='<p style="color:var(--dim)">No archived tasks.</p>';
  } else {
    list.innerHTML=archived.map(t=>`
      <div style="padding:8px;border-bottom:1px solid var(--border);font-size:13px">
        <strong>${t.title}</strong> <span style="color:var(--dim)">(Q${t.quadrant})</span>
        <br><span style="color:var(--dim)">Archived: ${t.archivedDate}</span>
      </div>
    `).join('');
  }
  document.getElementById('archiveModal').classList.add('active');
}

function closeArchiveModal(){document.getElementById('archiveModal').classList.remove('active');}

function clearArchive(){
  if(!confirm('Clear all archived tasks?')) return;
  archived=[];
  saveState();
  closeArchiveModal();
}

// Drag and drop
function onDragStart(e,id){
  dragId=id;
  e.dataTransfer.effectAllowed='move';
  setTimeout(()=>{
    const el=document.querySelector(`[data-task-id="${id}"]`);
    if(el) el.classList.add('dragging');
  },0);
}

function onDragEnd(e,id){
  dragId=null;
  const el=document.querySelector(`[data-task-id="${id}"]`);
  if(el) el.classList.remove('dragging');
  document.querySelectorAll('.quadrant').forEach(q=>q.classList.remove('drag-over'));
}

function onDragOver(e){
  e.preventDefault();
  e.currentTarget.classList.add('drag-over');
}

function onDragLeave(e){
  e.currentTarget.classList.remove('drag-over');
}

function onDrop(e,quadrant){
  e.preventDefault();
  e.currentTarget.classList.remove('drag-over');
  if(!dragId) return;
  const task=tasks.find(t=>t.id===dragId);
  if(task){
    task.quadrant=quadrant;
    saveState();
    render();
  }
  dragId=null;
}

function moveTask(id,quadrant){
  const task=tasks.find(t=>t.id===id);
  if(task){
    task.quadrant=quadrant;
    saveState();
    render();
  }
}

function getFilteredTasks(){
  let filtered=[...tasks];
  const assignee=document.getElementById('filterAssignee').value;
  const from=document.getElementById('filterFrom').value;
  const to=document.getElementById('filterTo').value;
  if(assignee) filtered=filtered.filter(t=>t.assignee===assignee);
  if(from) filtered=filtered.filter(t=>t.due&&t.due>=from);
  if(to) filtered=filtered.filter(t=>t.due&&t.due<=to);
  return filtered;
}

function clearFilters(){
  document.getElementById('filterAssignee').value='';
  document.getElementById('filterFrom').value='';
  document.getElementById('filterTo').value='';
  render();
}

function render(){
  const filtered=getFilteredTasks();
  // Update assignee filter options
  const assignees=[...new Set(tasks.map(t=>t.assignee).filter(Boolean))];
  const sel=document.getElementById('filterAssignee');
  const curVal=sel.value;
  sel.innerHTML='<option value="">All</option>'+assignees.map(a=>`<option value="${a}" ${a===curVal?'selected':''}>${a}</option>`).join('');

  // Stats
  const allTasks=tasks;
  document.getElementById('statTotal').textContent=allTasks.length;
  [1,2,3,4].forEach(q=>{
    const count=allTasks.filter(t=>t.quadrant===q).length;
    document.getElementById('statQ'+q).textContent=count;
    document.getElementById('badge-'+q).textContent=count;
  });
  document.getElementById('statOverdue').textContent=allTasks.filter(isOverdue).length;

  // Render quadrants
  [1,2,3,4].forEach(q=>{
    const container=document.getElementById('tasks-'+q);
    const qTasks=filtered.filter(t=>t.quadrant===q);
    container.innerHTML=qTasks.map(t=>{
      const overdue=isOverdue(t);
      return `
        <div class="task-card ${overdue?'task-overdue':''}" draggable="true" data-task-id="${t.id}"
             ondragstart="onDragStart(event,'${t.id}')" ondragend="onDragEnd(event,'${t.id}')">
          <div class="task-title">${escHtml(t.title)}</div>
          ${t.desc?`<div class="task-desc">${escHtml(t.desc)}</div>`:''}
          <div class="task-meta">
            ${t.due?`<span${overdue?' style="color:var(--red)"':''}>Due: ${t.due}</span>`:''}
            ${t.assignee?`<span>@${escHtml(t.assignee)}</span>`:''}
          </div>
          <div class="mobile-move">
            <select onchange="moveTask('${t.id}',parseInt(this.value))" style="min-height:38px;font-size:16px;padding:4px 8px">
              <option value="1" ${q===1?'selected':''}>Q1: Do First</option>
              <option value="2" ${q===2?'selected':''}>Q2: Schedule</option>
              <option value="3" ${q===3?'selected':''}>Q3: Delegate</option>
              <option value="4" ${q===4?'selected':''}>Q4: Eliminate</option>
            </select>
          </div>
          <div class="task-actions">
            <button class="small secondary" onclick="openEditModal('${t.id}')">Edit</button>
            <button class="small secondary" onclick="archiveTask('${t.id}')" style="color:var(--green)">Done</button>
            <button class="small danger" onclick="deleteTask('${t.id}')">Del</button>
          </div>
        </div>
      `;
    }).join('');
    if(qTasks.length===0){
      container.innerHTML='<p style="color:var(--dim);font-size:12px;text-align:center;padding:20px">No tasks</p>';
    }
  });
}

function escHtml(s){
  const d=document.createElement('div');
  d.textContent=s;
  return d.innerHTML;
}

function exportTasks(){
  let text='KORB ENGINEERING - EISENHOWER PRIORITY MATRIX\n';
  text+='='.repeat(50)+'\n';
  text+=`Date: ${new Date().toLocaleDateString()}\n\n`;
  const names={1:'Q1: DO FIRST (Urgent+Important)',2:'Q2: SCHEDULE (Not Urgent+Important)',3:'Q3: DELEGATE (Urgent+Not Important)',4:'Q4: ELIMINATE (Not Urgent+Not Important)'};
  [1,2,3,4].forEach(q=>{
    const qTasks=tasks.filter(t=>t.quadrant===q);
    text+=names[q]+'\n'+'-'.repeat(40)+'\n';
    if(qTasks.length===0) text+='  (none)\n';
    qTasks.forEach(t=>{
      text+=`  - ${t.title}`;
      if(t.due) text+=` [Due: ${t.due}]`;
      if(t.assignee) text+=` [@${t.assignee}]`;
      text+='\n';
      if(t.desc) text+=`    ${t.desc}\n`;
    });
    text+='\n';
  });
  navigator.clipboard.writeText(text).then(()=>alert('Task list copied to clipboard.'));
}

function saveState(){
  localStorage.setItem('korb_eisenhower_tasks',JSON.stringify(tasks));
  localStorage.setItem('korb_eisenhower_archived',JSON.stringify(archived));
}

function loadState(){
  try{
    const t=JSON.parse(localStorage.getItem('korb_eisenhower_tasks'));
    if(t) tasks=t;
    const a=JSON.parse(localStorage.getItem('korb_eisenhower_archived'));
    if(a) archived=a;
  }catch(e){}
}

window.addEventListener('load',()=>{
  loadState();
  render();
});
</script>
</body>
</html>
