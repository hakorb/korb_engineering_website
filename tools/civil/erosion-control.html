<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>Erosion Control - RUSLE Modeler | Korb Engineering</title>
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{--bg:#050a0f;--bg1:#0a1018;--bg2:#0f1620;--card:#0c1219;--border:#1a2a3a;--accent:#00d4ff;--green:#00ff88;--red:#ff3344;--yellow:#ffcc00;--orange:#f97316;--brown:#a16207;--text:#e2e8f0;--textDim:rgba(226,232,240,0.45);--textMuted:rgba(226,232,240,0.25);--font:'JetBrains Mono',monospace}
body{background:var(--bg);color:var(--text);font-family:var(--font);min-height:100vh;overflow-x:hidden}
input,select,button{font-family:var(--font)}
.header{position:sticky;top:0;z-index:100;height:52px;background:linear-gradient(180deg,var(--bg2),var(--bg1));border-bottom:1px solid var(--border);display:flex;align-items:center;padding:0 16px;gap:12px}
.header-title{font-size:14px;font-weight:700;letter-spacing:0.12em;color:var(--accent);text-shadow:0 0 10px rgba(0,212,255,0.3)}
.header-sub{font-size:9px;color:var(--textDim);letter-spacing:0.15em;text-transform:uppercase}
.tabs{display:flex;gap:4px;padding:8px 16px;border-bottom:1px solid var(--border);overflow-x:auto;background:var(--bg1)}
.tab{padding:7px 14px;border:1px solid var(--border);background:var(--bg2);color:var(--textDim);font-size:10px;cursor:pointer;border-radius:6px;white-space:nowrap;transition:all 0.15s}
.tab.active{border-color:var(--accent);color:var(--accent);font-weight:700}
.content{padding:16px;max-width:1400px;margin:0 auto}
.card{background:var(--card);border:1px solid var(--border);border-radius:8px;padding:16px;margin-bottom:12px}
.card-title{font-size:10px;color:var(--accent);letter-spacing:0.1em;text-transform:uppercase;margin-bottom:14px}
.btn{background:transparent;border:1px solid var(--border);color:var(--textDim);font-size:9px;padding:5px 12px;border-radius:3px;cursor:pointer;letter-spacing:0.05em;text-transform:uppercase;transition:all 0.15s;min-height:44px}
.btn:hover{border-color:var(--accent);color:var(--accent)}
.btn-green{border-color:var(--green);color:var(--green)}
.btn-red{border-color:var(--red);color:var(--red)}
input[type="text"],input[type="number"],select{background:var(--bg2);border:1px solid var(--border);color:var(--text);font-size:16px;padding:6px 10px;border-radius:6px;width:100%;outline:none;box-sizing:border-box;min-height:44px}
input:focus,select:focus{border-color:var(--accent)}
table{width:100%;border-collapse:collapse}
th{padding:6px 8px;border-bottom:2px solid var(--border);font-size:8px;color:var(--textDim);text-transform:uppercase;letter-spacing:0.08em;text-align:left;white-space:nowrap}
td{padding:6px 8px;border-bottom:1px solid var(--border);font-size:11px;white-space:nowrap}
.overflow-x{overflow-x:auto}
.flex-between{display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:8px}
.form-row{display:grid;grid-template-columns:repeat(auto-fill,minmax(200px,1fr));gap:12px;margin-bottom:14px}
.form-group{display:flex;flex-direction:column;gap:4px}
.form-label{font-size:16px;color:var(--textDim);text-transform:uppercase;letter-spacing:1px;margin-bottom:2px}
.kpi-row{display:grid;grid-template-columns:repeat(auto-fit,minmax(130px,1fr));gap:10px;margin-bottom:14px}
.kpi{background:var(--bg2);border:1px solid var(--border);border-radius:6px;padding:12px;text-align:center}
.kpi-label{font-size:8px;color:var(--textDim);text-transform:uppercase;letter-spacing:0.1em;margin-bottom:3px}
.kpi-value{font-size:18px;font-weight:700}
.kpi-sub{font-size:9px;color:var(--textMuted);margin-top:2px}
.rusle-eq{background:var(--bg2);border:1px solid var(--border);border-radius:8px;padding:16px;text-align:center;margin-bottom:14px}
.rusle-eq .label{font-size:9px;color:var(--textDim);text-transform:uppercase;letter-spacing:0.1em}
.rusle-eq .value{font-size:20px;font-weight:700;margin-top:4px}
.bmp-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(180px,1fr));gap:10px}
.bmp-card{background:var(--bg2);border:1px solid var(--border);border-radius:8px;padding:12px;cursor:pointer;transition:all 0.15s}
.bmp-card:hover{border-color:var(--accent)}
.checklist-item{display:flex;align-items:center;gap:10px;padding:8px 0;border-bottom:1px solid var(--border)}
.checklist-item input[type="checkbox"]{width:16px;height:16px;accent-color:var(--accent)}
@media(max-width:768px){.header-sub{display:none}.form-row{grid-template-columns:1fr}.bmp-grid{grid-template-columns:1fr 1fr}}
</style>
</head>
<body>

<div class="header">
  <div class="header-title">EROSION CONTROL</div>
  <div class="header-sub">RUSLE Modeler & SWPPP</div>
  <div style="flex:1"></div>
  <button class="btn" onclick="exportReport()">Export Report</button>
</div>

<div class="tabs" id="tabs"></div>
<div class="content" id="content"></div>

<div style="position:fixed;bottom:10px;right:10px;font-size:10px;color:#00d4ff;opacity:0.5;font-family:'JetBrains Mono',monospace;pointer-events:none;z-index:9999">Korb Engineering</div>

<script>
const LS_KEY='korb_erosion_ctrl';
const TABS=['Site Config','RUSLE Analysis','BMP Placement','Flow Simulation','SWPPP Compliance','Cost Analysis','Scenarios'];
let currentTab=0;

const SOIL_TYPES={'Sand':{K:0.05,infiltration:8.0},'Loamy Sand':{K:0.12,infiltration:4.0},'Sandy Loam':{K:0.27,infiltration:2.5},'Loam':{K:0.35,infiltration:1.3},'Silt Loam':{K:0.42,infiltration:0.8},'Clay Loam':{K:0.35,infiltration:0.25},'Clay':{K:0.28,infiltration:0.05}};
const LAND_COVERS={'Bare Soil':{C:1.0},'Construction Site':{C:0.8},'Sparse Vegetation':{C:0.45},'Grass (established)':{C:0.01},'Forest':{C:0.003}};
const PRACTICE_FACTORS={'None':1.0,'Contour Farming':0.6,'Strip Cropping':0.35,'Terracing':0.18,'Silt Fence Line':0.5};
const R_FACTORS={'Southeast US (FL, GA, AL)':500,'Gulf Coast (TX, LA, MS)':450,'Mid-Atlantic (VA, MD, NC)':300,'Northeast (NY, PA, NJ)':200,'Midwest (OH, IN, IL)':175,'Great Plains (KS, NE, OK)':150,'Mountain West (CO, MT, WY)':50,'Pacific Northwest (WA, OR)':100,'Southwest (AZ, NM)':30,'California':80,'Custom':0};
const BMP_CATALOG=[
  {id:'silt_fence',name:'Silt Fence',icon:'|||',cost:3.5,unit:'LF',sedCapture:0.75,color:'#8B4513'},
  {id:'straw_wattle',name:'Straw Wattle',icon:'~~~',cost:5.0,unit:'LF',sedCapture:0.65,color:'#D2B48C'},
  {id:'ecb',name:'Erosion Control Blanket',icon:'===',cost:1.5,unit:'SY',sedCapture:0.9,color:'#556B2F',cReduction:0.7},
  {id:'sediment_basin',name:'Sediment Basin',icon:'U',cost:8000,unit:'EA',sedCapture:0.85,color:'#4682B4'},
  {id:'check_dam',name:'Check Dam',icon:'#',cost:500,unit:'EA',sedCapture:0.5,color:'#808080'},
  {id:'hydroseeding',name:'Hydroseeding',icon:'*',cost:0.15,unit:'SF',sedCapture:0.6,color:'#228B22',cReduction:0.85},
  {id:'riprap',name:'Riprap',icon:'ooo',cost:65,unit:'TN',sedCapture:0.3,color:'#696969'},
  {id:'inlet_protection',name:'Inlet Protection',icon:'V',cost:150,unit:'EA',sedCapture:0.7,color:'#FF8C00'},
  {id:'compost_sock',name:'Compost Filter Sock',icon:'()',cost:8,unit:'LF',sedCapture:0.7,color:'#6B4226'}
];

let cfg={name:'',location:'',npdes:'',disturbedArea:5,soilType:'Sandy Loam',slopeLength:200,slopeGradient:8,landCover:'Construction Site',practice:'None',rRegion:'Southeast US (FL, GA, AL)',rCustom:500};
let bmps=[];
let scenarios=[];
let swpppChecklist={siteDesc:false,responsible:false,activity:false,sequence:false,erosionControls:false,stabilization:false,inspectionSchedule:false};

function load(){
  try{const d=JSON.parse(localStorage.getItem(LS_KEY));
    if(d){if(d.cfg)cfg=d.cfg;if(d.bmps)bmps=d.bmps;if(d.scenarios)scenarios=d.scenarios;if(d.swpppChecklist)swpppChecklist=d.swpppChecklist}
  }catch{}
}
function save(){localStorage.setItem(LS_KEY,JSON.stringify({cfg,bmps,scenarios,swpppChecklist}))}

function calcLS(length,gradient){
  const s=gradient/100;const lambda=length*0.3048;
  const m=s<0.01?0.2:s<0.03?0.3:s<0.05?0.4:0.5;
  const L=Math.pow(lambda/22.13,m);
  const S=s<0.09?10.8*s+0.03:16.8*s-0.50;
  return Math.max(L*S,0.1);
}

function classifySoilLoss(a){
  if(a<5)return{label:'Tolerable',color:'var(--green)'};
  if(a<15)return{label:'Moderate',color:'var(--yellow)'};
  if(a<50)return{label:'Severe',color:'var(--orange)'};
  return{label:'Critical',color:'var(--red)'};
}

function getRusle(){
  const soil=SOIL_TYPES[cfg.soilType]||SOIL_TYPES['Loam'];
  const cover=LAND_COVERS[cfg.landCover]||LAND_COVERS['Bare Soil'];
  const R=cfg.rRegion==='Custom'?(cfg.rCustom||100):(R_FACTORS[cfg.rRegion]||200);
  const K=soil.K;const LS=calcLS(cfg.slopeLength||100,cfg.slopeGradient||2);
  const C=cover.C;const P=PRACTICE_FACTORS[cfg.practice]||1.0;
  const soilLoss=R*K*LS*C*P;
  const bmpSedReduction=bmps.length>0?1-bmps.reduce((acc,b)=>acc*(1-(BMP_CATALOG.find(c=>c.id===b.type)?.sedCapture||0)),1):0;
  const soilLossWithBmps=soilLoss*(1-bmpSedReduction);
  const totalBmpCost=bmps.reduce((s,b)=>{const cat=BMP_CATALOG.find(c=>c.id===b.type);return s+(cat?cat.cost*(b.qty||1):0)},0);
  return{R,K,LS,C,P,soilLoss,soilLossClass:classifySoilLoss(soilLoss),soilLossWithBmps,soilLossWithBmpsClass:classifySoilLoss(soilLossWithBmps),bmpSedReduction,totalBmpCost};
}

function updateCfg(k,v){cfg[k]=v;save();render()}

function renderTabs(){
  document.getElementById('tabs').innerHTML=TABS.map((t,i)=>`<button class="tab ${currentTab===i?'active':''}" onclick="currentTab=${i};render()">${t}</button>`).join('');
}

function renderSiteConfig(){
  const r=getRusle();
  return`<div class="card">
    <div class="card-title">Project Information</div>
    <div class="form-row">
      <div class="form-group"><div class="form-label">Project Name</div><input type="text" value="${cfg.name}" onchange="updateCfg('name',this.value)"></div>
      <div class="form-group"><div class="form-label">Location</div><input type="text" value="${cfg.location}" onchange="updateCfg('location',this.value)"></div>
      <div class="form-group"><div class="form-label">NPDES Permit #</div><input type="text" value="${cfg.npdes}" onchange="updateCfg('npdes',this.value)"></div>
      <div class="form-group"><div class="form-label">Disturbed Area (acres)</div><input type="number" value="${cfg.disturbedArea}" onchange="updateCfg('disturbedArea',parseFloat(this.value)||0)"></div>
    </div>
  </div>
  <div class="card">
    <div class="card-title">RUSLE Parameters</div>
    <div class="form-row">
      <div class="form-group"><div class="form-label">R-Factor Region</div>
        <select onchange="updateCfg('rRegion',this.value)">${Object.keys(R_FACTORS).map(k=>`<option ${cfg.rRegion===k?'selected':''}>${k}</option>`).join('')}</select></div>
      ${cfg.rRegion==='Custom'?`<div class="form-group"><div class="form-label">Custom R-Factor</div><input type="number" value="${cfg.rCustom}" onchange="updateCfg('rCustom',parseFloat(this.value)||0)"></div>`:''}
      <div class="form-group"><div class="form-label">Soil Type (K-Factor)</div>
        <select onchange="updateCfg('soilType',this.value)">${Object.keys(SOIL_TYPES).map(k=>`<option ${cfg.soilType===k?'selected':''}>${k} (K=${SOIL_TYPES[k].K})</option>`).join('')}</select></div>
      <div class="form-group"><div class="form-label">Slope Length (ft)</div><input type="number" value="${cfg.slopeLength}" onchange="updateCfg('slopeLength',parseFloat(this.value)||0)"></div>
      <div class="form-group"><div class="form-label">Slope Gradient (%)</div><input type="number" value="${cfg.slopeGradient}" onchange="updateCfg('slopeGradient',parseFloat(this.value)||0)"></div>
      <div class="form-group"><div class="form-label">Land Cover (C-Factor)</div>
        <select onchange="updateCfg('landCover',this.value)">${Object.keys(LAND_COVERS).map(k=>`<option ${cfg.landCover===k?'selected':''}>${k} (C=${LAND_COVERS[k].C})</option>`).join('')}</select></div>
      <div class="form-group"><div class="form-label">Support Practice (P-Factor)</div>
        <select onchange="updateCfg('practice',this.value)">${Object.keys(PRACTICE_FACTORS).map(k=>`<option ${cfg.practice===k?'selected':''}>${k} (P=${PRACTICE_FACTORS[k]})</option>`).join('')}</select></div>
    </div>
  </div>
  <div class="rusle-eq">
    <div class="label">RUSLE Equation: A = R x K x LS x C x P</div>
    <div class="value" style="color:var(--accent)">A = ${r.R} x ${r.K} x ${r.LS.toFixed(2)} x ${r.C} x ${r.P}</div>
    <div style="margin-top:8px;font-size:24px;font-weight:700;color:${r.soilLossClass.color}">${r.soilLoss.toFixed(1)} tons/acre/year</div>
    <div style="font-size:12px;color:${r.soilLossClass.color};margin-top:4px">${r.soilLossClass.label}</div>
  </div>`;
}

function renderRusleAnalysis(){
  const r=getRusle();
  return`<div class="kpi-row">
    ${[['R (Rainfall)',r.R.toFixed(0),'var(--blue,#3b82f6)'],['K (Soil)',r.K.toFixed(2),'var(--brown)'],['LS (Topography)',r.LS.toFixed(2),'var(--green)'],['C (Cover)',r.C.toFixed(3),'var(--yellow)'],['P (Practice)',r.P.toFixed(2),'var(--accent)'],['A (Soil Loss)',r.soilLoss.toFixed(1)+' t/ac/yr',r.soilLossClass.color]].map(([l,v,c])=>`<div class="kpi"><div class="kpi-label">${l}</div><div class="kpi-value" style="color:${c}">${v}</div></div>`).join('')}
  </div>
  <div style="display:grid;grid-template-columns:1fr 1fr;gap:12px">
    <div class="card">
      <div class="card-title">Without BMPs</div>
      <div style="font-size:28px;font-weight:700;color:${r.soilLossClass.color}">${r.soilLoss.toFixed(1)} t/ac/yr</div>
      <div style="font-size:12px;color:${r.soilLossClass.color}">${r.soilLossClass.label}</div>
      <div style="font-size:10px;color:var(--textDim);margin-top:6px">Total annual loss: ${(r.soilLoss*(cfg.disturbedArea||1)).toFixed(0)} tons</div>
    </div>
    <div class="card">
      <div class="card-title">With BMPs</div>
      <div style="font-size:28px;font-weight:700;color:${r.soilLossWithBmpsClass.color}">${r.soilLossWithBmps.toFixed(1)} t/ac/yr</div>
      <div style="font-size:12px;color:${r.soilLossWithBmpsClass.color}">${r.soilLossWithBmpsClass.label}</div>
      <div style="font-size:10px;color:var(--textDim);margin-top:6px">Reduction: ${(r.bmpSedReduction*100).toFixed(0)}% | Total: ${(r.soilLossWithBmps*(cfg.disturbedArea||1)).toFixed(0)} tons</div>
    </div>
  </div>
  <div class="card">
    <div class="card-title">Factor Sensitivity</div>
    ${[['R-Factor (Rainfall Erosivity)',r.R,500,'Depends on regional climate'],['K-Factor (Soil Erodibility)',r.K,0.5,'Based on soil texture & organic matter'],['LS-Factor (Slope)',r.LS,5,'Longer & steeper slopes = more erosion'],['C-Factor (Cover)',r.C,1,'Vegetation dramatically reduces erosion'],['P-Factor (Practice)',r.P,1,'Conservation practices reduce erosion']].map(([name,val,max,desc])=>`<div style="margin-bottom:10px">
      <div style="display:flex;justify-content:space-between;margin-bottom:3px">
        <span style="font-size:11px">${name}</span>
        <span style="font-size:11px;font-weight:700;color:var(--accent)">${typeof val==='number'?val.toFixed(2):val}</span>
      </div>
      <div style="height:8px;background:var(--bg2);border-radius:4px;overflow:hidden"><div style="height:100%;width:${Math.min(100,val/max*100)}%;background:var(--accent);border-radius:4px"></div></div>
      <div style="font-size:9px;color:var(--textMuted);margin-top:2px">${desc}</div>
    </div>`).join('')}
  </div>`;
}

function renderBmpPlacement(){
  const r=getRusle();
  return`<div class="card">
    <div class="flex-between" style="margin-bottom:14px">
      <div class="card-title">BMP Catalog</div>
      <div style="font-size:11px;color:var(--textDim)">Click a BMP to add it to the project</div>
    </div>
    <div class="bmp-grid">
      ${BMP_CATALOG.map(b=>`<div class="bmp-card" onclick="addBmp('${b.id}')" style="border-left:3px solid ${b.color}">
        <div style="font-size:16px;margin-bottom:4px">${b.icon}</div>
        <div style="font-size:11px;font-weight:700">${b.name}</div>
        <div style="font-size:9px;color:var(--textDim);margin-top:4px">$${b.cost}/${b.unit} | ${(b.sedCapture*100).toFixed(0)}% sed. capture</div>
      </div>`).join('')}
    </div>
  </div>
  <div class="card">
    <div class="flex-between" style="margin-bottom:14px">
      <div class="card-title">Installed BMPs (${bmps.length})</div>
      <div style="display:flex;gap:12px;font-size:11px">
        <span style="color:var(--accent)">Total Cost: $${r.totalBmpCost.toLocaleString()}</span>
        <span style="color:var(--green)">Reduction: ${(r.bmpSedReduction*100).toFixed(0)}%</span>
      </div>
    </div>
    ${bmps.length===0?'<div style="text-align:center;color:var(--textMuted);padding:20px">No BMPs placed. Click a BMP above to add.</div>':''}
    <div class="overflow-x"><table style="${bmps.length===0?'display:none':''}"><thead><tr>
      ${['BMP Type','Location','Quantity','Unit','Unit Cost','Total Cost','Sed. Capture',''].map(h=>`<th>${h}</th>`).join('')}
    </tr></thead><tbody>
      ${bmps.map((b,i)=>{const cat=BMP_CATALOG.find(c=>c.id===b.type);if(!cat)return'';
        return`<tr>
          <td style="color:${cat.color};font-weight:600">${cat.icon} ${cat.name}</td>
          <td><input type="text" value="${b.location||''}" onchange="bmps[${i}].location=this.value;save();render()" style="width:120px"></td>
          <td><input type="number" value="${b.qty}" onchange="bmps[${i}].qty=parseFloat(this.value)||1;save();render()" style="width:70px"></td>
          <td>${cat.unit}</td>
          <td>$${cat.cost}</td>
          <td style="color:var(--yellow)">${'$'+(cat.cost*(b.qty||1)).toLocaleString()}</td>
          <td style="color:var(--green)">${(cat.sedCapture*100).toFixed(0)}%</td>
          <td><button class="btn btn-red" style="font-size:8px;padding:2px 8px" onclick="bmps.splice(${i},1);save();render()">Del</button></td>
        </tr>`}).join('')}
    </tbody></table></div>
  </div>`;
}

function addBmp(typeId){bmps.push({type:typeId,qty:1,location:''});save();render()}

function renderFlowSim(){
  const r=getRusle();const soil=SOIL_TYPES[cfg.soilType]||SOIL_TYPES['Loam'];
  const peakRunoff=(cfg.disturbedArea||1)*(1-soil.infiltration/10)*2.5;
  const canvasId='flow-canvas-'+Date.now();
  setTimeout(()=>{
    const c=document.getElementById(canvasId);if(!c)return;
    const ctx=c.getContext('2d');c.width=c.parentElement.clientWidth-2;c.height=250;
    const w=c.width,h=c.height,pad={l:50,r:20,t:20,b:30},pw=w-pad.l-pad.r,ph=h-pad.t-pad.b;
    ctx.fillStyle='#060c12';ctx.fillRect(0,0,w,h);
    // Grid
    for(let i=0;i<=5;i++){const y=pad.t+ph*(1-i/5);ctx.strokeStyle='#1a2a3a';ctx.lineWidth=1;ctx.beginPath();ctx.moveTo(pad.l,y);ctx.lineTo(w-pad.r,y);ctx.stroke();
      ctx.fillStyle='rgba(226,232,240,0.3)';ctx.font='9px JetBrains Mono';ctx.textAlign='right';ctx.fillText((peakRunoff*i/5).toFixed(1)+' cfs',pad.l-5,y+3)}
    // Hydrograph
    ctx.beginPath();ctx.strokeStyle='#00d4ff';ctx.lineWidth=2;
    for(let i=0;i<=48;i++){const t=i/48;const q=peakRunoff*4*t*Math.exp(1-4*t);
      const x=pad.l+t*pw;const y=pad.t+ph*(1-q/peakRunoff);if(i===0)ctx.moveTo(x,y);else ctx.lineTo(x,y)}
    ctx.stroke();
    // BMP reduced
    if(bmps.length>0){ctx.beginPath();ctx.strokeStyle='#00ff88';ctx.lineWidth=2;ctx.setLineDash([4,4]);
      for(let i=0;i<=48;i++){const t=i/48;const q=peakRunoff*(1-r.bmpSedReduction*0.5)*4*t*Math.exp(1-4*t);
        const x=pad.l+t*pw;const y=pad.t+ph*(1-q/peakRunoff);if(i===0)ctx.moveTo(x,y);else ctx.lineTo(x,y)}
      ctx.stroke();ctx.setLineDash([])}
    for(let i=0;i<=6;i++){const x=pad.l+i/6*pw;ctx.fillStyle='rgba(226,232,240,0.3)';ctx.font='9px JetBrains Mono';ctx.textAlign='center';ctx.fillText((i*8)+'h',x,h-5)}
  },50);
  return`<div class="card">
    <div class="card-title">Runoff Hydrograph</div>
    <div class="kpi-row" style="margin-bottom:14px">
      ${[['Peak Runoff',peakRunoff.toFixed(1)+' cfs','var(--accent)'],['Soil Infiltration',soil.infiltration+' in/hr','var(--green)'],['Disturbed Area',(cfg.disturbedArea||0)+' ac','var(--yellow)'],['Runoff Coefficient',((1-soil.infiltration/10)).toFixed(2),'var(--orange)']].map(([l,v,c])=>`<div class="kpi"><div class="kpi-label">${l}</div><div class="kpi-value" style="color:${c};font-size:14px">${v}</div></div>`).join('')}
    </div>
    <canvas id="${canvasId}" style="width:100%;height:250px;border:1px solid var(--border);border-radius:6px"></canvas>
    <div style="display:flex;gap:16px;margin-top:8px;font-size:9px;color:var(--textDim)">
      <span style="color:#00d4ff">--- Pre-BMP</span>
      ${bmps.length>0?'<span style="color:#00ff88">- - Post-BMP</span>':''}
    </div>
  </div>`;
}

function renderSwppp(){
  const items=[
    ['siteDesc','Site Description & Map'],['responsible','Responsible Personnel Identified'],
    ['activity','Construction Activity Description'],['sequence','Construction Sequence/Phasing'],
    ['erosionControls','Erosion & Sediment Controls Specified'],['stabilization','Stabilization Practices Defined'],
    ['inspectionSchedule','Inspection Schedule (min. weekly + post-storm)']
  ];
  const completed=Object.values(swpppChecklist).filter(Boolean).length;
  const total=items.length;
  return`<div class="card">
    <div class="card-title">SWPPP Compliance Checklist</div>
    <div style="margin-bottom:14px;display:flex;gap:12px;align-items:center">
      <div style="font-size:14px;font-weight:700;color:${completed===total?'var(--green)':'var(--yellow)'}">${completed}/${total} Complete</div>
      <div style="flex:1;height:8px;background:var(--bg2);border-radius:4px;overflow:hidden"><div style="height:100%;width:${completed/total*100}%;background:${completed===total?'var(--green)':'var(--yellow)'};border-radius:4px"></div></div>
    </div>
    ${items.map(([key,label])=>`<div class="checklist-item">
      <input type="checkbox" ${swpppChecklist[key]?'checked':''} onchange="swpppChecklist['${key}']=this.checked;save();render()">
      <span style="font-size:12px;color:${swpppChecklist[key]?'var(--green)':'var(--text)'}">${label}</span>
    </div>`).join('')}
  </div>
  <div class="card">
    <div class="card-title">Regulatory Requirements</div>
    <div style="font-size:11px;color:var(--textDim);line-height:1.8">
      <div><span style="color:var(--accent);font-weight:700">NPDES Permit:</span> ${cfg.npdes||'Not specified'}</div>
      <div><span style="color:var(--accent);font-weight:700">Disturbed Area:</span> ${cfg.disturbedArea} acres ${cfg.disturbedArea>=1?'(NPDES permit required for >= 1 acre)':''}</div>
      <div><span style="color:var(--accent);font-weight:700">Inspection Frequency:</span> Weekly + within 24 hours of 0.5" rainfall event</div>
      <div><span style="color:var(--accent);font-weight:700">Stabilization:</span> Exposed soils must be stabilized within 14 days of final grading</div>
      <div><span style="color:var(--accent);font-weight:700">Record Keeping:</span> Maintain inspection logs for 3 years after NOT filed</div>
    </div>
  </div>`;
}

function renderCostAnalysis(){
  const r=getRusle();
  const bmpCosts=bmps.map(b=>{const cat=BMP_CATALOG.find(c=>c.id===b.type);return{name:cat?.name||'Unknown',cost:cat?(cat.cost*(b.qty||1)):0,qty:b.qty||1,unit:cat?.unit||''}});
  const totalCost=bmpCosts.reduce((s,b)=>s+b.cost,0);
  const sedSaved=(r.soilLoss-r.soilLossWithBmps)*(cfg.disturbedArea||1);
  const costPerTon=sedSaved>0?totalCost/sedSaved:0;
  return`<div class="kpi-row">
    ${[['Total BMP Cost','$'+totalCost.toLocaleString(),'var(--yellow)'],['Sediment Reduction',sedSaved.toFixed(1)+' tons/yr','var(--green)'],['Cost per Ton Removed','$'+costPerTon.toFixed(0),'var(--accent)'],['Soil Loss Reduction',(r.bmpSedReduction*100).toFixed(0)+'%','var(--green)']].map(([l,v,c])=>`<div class="kpi"><div class="kpi-label">${l}</div><div class="kpi-value" style="color:${c};font-size:14px">${v}</div></div>`).join('')}
  </div>
  <div class="card">
    <div class="card-title">BMP Cost Breakdown</div>
    ${bmpCosts.length===0?'<div style="text-align:center;color:var(--textMuted);padding:20px">No BMPs installed</div>':''}
    <div class="overflow-x"><table style="${bmpCosts.length===0?'display:none':''}"><thead><tr><th>BMP</th><th>Quantity</th><th>Unit</th><th>Cost</th><th>% of Total</th></tr></thead><tbody>
      ${bmpCosts.map(b=>`<tr><td>${b.name}</td><td>${b.qty}</td><td>${b.unit}</td><td style="color:var(--yellow)">$${b.cost.toLocaleString()}</td><td>${totalCost>0?(b.cost/totalCost*100).toFixed(1)+'%':'--'}</td></tr>`).join('')}
      <tr style="border-top:2px solid var(--accent)"><td colspan="3" style="font-weight:700;color:var(--accent)">TOTAL</td><td style="color:var(--yellow);font-weight:700">$${totalCost.toLocaleString()}</td><td>100%</td></tr>
    </tbody></table></div>
  </div>`;
}

function renderScenarios(){
  return`<div class="card">
    <div class="flex-between" style="margin-bottom:14px">
      <div class="card-title">Scenario Comparison</div>
      <button class="btn btn-green" onclick="saveScenario()">Save Current as Scenario</button>
    </div>
    ${scenarios.length===0?'<div style="text-align:center;color:var(--textMuted);padding:20px">No scenarios saved yet. Configure BMPs and save scenarios to compare.</div>':''}
    <div class="overflow-x"><table style="${scenarios.length===0?'display:none':''}"><thead><tr>
      ${['Scenario','Soil Loss (t/ac/yr)','With BMPs','Reduction','BMP Count','Total Cost',''].map(h=>`<th>${h}</th>`).join('')}
    </tr></thead><tbody>
      ${scenarios.map((s,i)=>`<tr>
        <td style="color:var(--accent);font-weight:600">${s.name}</td>
        <td style="color:${s.soilLossClass.color}">${s.soilLoss.toFixed(1)}</td>
        <td style="color:${s.soilLossWithBmpsClass.color}">${s.soilLossWithBmps.toFixed(1)}</td>
        <td style="color:var(--green)">${(s.bmpReduction*100).toFixed(0)}%</td>
        <td>${s.bmpCount}</td>
        <td style="color:var(--yellow)">$${s.totalCost.toLocaleString()}</td>
        <td><button class="btn btn-red" style="font-size:8px;padding:2px 8px" onclick="scenarios.splice(${i},1);save();render()">Del</button></td>
      </tr>`).join('')}
    </tbody></table></div>
  </div>`;
}

function saveScenario(){
  const r=getRusle();const name=prompt('Scenario name:','Scenario '+(scenarios.length+1));if(!name)return;
  scenarios.push({name,soilLoss:r.soilLoss,soilLossClass:r.soilLossClass,soilLossWithBmps:r.soilLossWithBmps,soilLossWithBmpsClass:r.soilLossWithBmpsClass,bmpReduction:r.bmpSedReduction,bmpCount:bmps.length,totalCost:r.totalBmpCost});
  save();render();
}

function exportReport(){
  const r=getRusle();
  const w=window.open('','','width=900,height=700');
  w.document.write(`<html><head><title>Erosion Control Report</title><style>body{font-family:'JetBrains Mono',monospace;padding:40px}table{width:100%;border-collapse:collapse;margin:16px 0}th,td{padding:6px;border-bottom:1px solid #ccc;text-align:left;font-size:11px}th{border-bottom:2px solid #000;font-size:9px;text-transform:uppercase}h1{font-size:18px}h2{font-size:14px;margin-top:20px}</style></head><body>
    <h1>KORB ENGINEERING - Erosion & Sediment Control Report</h1>
    <p>${cfg.name||'Unnamed Project'} | ${cfg.location||''} | NPDES: ${cfg.npdes||'N/A'}</p>
    <h2>RUSLE Analysis</h2>
    <p>A = R(${r.R}) x K(${r.K}) x LS(${r.LS.toFixed(2)}) x C(${r.C}) x P(${r.P}) = <b>${r.soilLoss.toFixed(1)} tons/acre/year</b></p>
    <p>With BMPs: ${r.soilLossWithBmps.toFixed(1)} t/ac/yr (${(r.bmpSedReduction*100).toFixed(0)}% reduction)</p>
    <h2>BMPs Installed</h2><table><tr><th>BMP</th><th>Qty</th><th>Cost</th></tr>
    ${bmps.map(b=>{const cat=BMP_CATALOG.find(c=>c.id===b.type);return'<tr><td>'+(cat?.name||'')+'</td><td>'+(b.qty||1)+'</td><td>$'+(cat?(cat.cost*(b.qty||1)):0).toLocaleString()+'</td></tr>'}).join('')}
    <tr><td colspan="2"><b>Total</b></td><td><b>$${r.totalBmpCost.toLocaleString()}</b></td></tr></table>
  </body></html>`);w.document.close();w.print();
}

function render(){
  renderTabs();
  const c=document.getElementById('content');
  if(currentTab===0)c.innerHTML=renderSiteConfig();
  else if(currentTab===1)c.innerHTML=renderRusleAnalysis();
  else if(currentTab===2)c.innerHTML=renderBmpPlacement();
  else if(currentTab===3)c.innerHTML=renderFlowSim();
  else if(currentTab===4)c.innerHTML=renderSwppp();
  else if(currentTab===5)c.innerHTML=renderCostAnalysis();
  else if(currentTab===6)c.innerHTML=renderScenarios();
}

load();render();
</script>
</body>
</html>
