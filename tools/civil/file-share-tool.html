<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>KORB FILE MANAGER | Korb Engineering</title>
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/jszip@3.10.1/dist/jszip.min.js"></script>
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --bg: #050a0f;
  --surface: #0a1018;
  --surface2: #0e1520;
  --border: #1a2535;
  --cyan: #00d4ff;
  --cyan-dim: #006680;
  --cyan-glow: rgba(0, 212, 255, 0.15);
  --cyan-glow-strong: rgba(0, 212, 255, 0.35);
  --orange: #ff6600;
  --orange-glow: rgba(255, 102, 0, 0.15);
  --green: #10b981;
  --green-glow: rgba(16, 185, 129, 0.15);
  --red: #ef4444;
  --red-glow: rgba(239, 68, 68, 0.15);
  --yellow: #eab308;
  --text: #e2e8f0;
  --text-dim: #64748b;
  --text-dimmer: #475569;
  --font: 'JetBrains Mono', monospace;
}

html, body { height: 100%; overflow: hidden; }

body {
  background: var(--bg);
  color: var(--text);
  font-family: var(--font);
  font-size: 13px;
  display: flex;
  flex-direction: column;
}

input, select, textarea, button { font-family: var(--font); font-size: 13px; }
input[type="text"], input[type="search"], input[type="date"], input[type="password"], textarea, select {
  font-size: 16px;
  background: var(--bg);
  border: 1px solid var(--border);
  color: var(--text);
  padding: 8px 12px;
  border-radius: 4px;
  outline: none;
  min-height: 44px;
}
input:focus, select:focus, textarea:focus { border-color: var(--cyan); box-shadow: 0 0 8px var(--cyan-glow); }

::-webkit-scrollbar { width: 8px; height: 8px; }
::-webkit-scrollbar-track { background: var(--bg); }
::-webkit-scrollbar-thumb { background: var(--border); border-radius: 4px; }
::-webkit-scrollbar-thumb:hover { background: var(--text-dim); }

::selection { background: var(--cyan); color: var(--bg); }

/* ============ TOP BAR ============ */
.topbar {
  background: var(--surface);
  border-bottom: 1px solid var(--border);
  display: flex;
  align-items: center;
  padding: 0 16px;
  height: 52px;
  gap: 12px;
  flex-shrink: 0;
  z-index: 100;
}

.topbar-brand {
  font-size: 14px;
  font-weight: 700;
  color: var(--cyan);
  letter-spacing: 2px;
  text-transform: uppercase;
  white-space: nowrap;
  text-shadow: 0 0 10px var(--cyan-glow-strong);
  cursor: default;
}

.topbar-brand span { color: var(--orange); text-shadow: 0 0 10px var(--orange-glow); }

.search-box {
  flex: 1;
  max-width: 500px;
  position: relative;
}
.search-box input {
  width: 100%;
  padding-left: 36px;
  font-size: 16px;
}
.search-box .search-icon {
  position: absolute;
  left: 10px;
  top: 50%;
  transform: translateY(-50%);
  color: var(--text-dim);
  pointer-events: none;
}

.topbar-actions {
  display: flex;
  gap: 6px;
  margin-left: auto;
  align-items: center;
}

/* ============ COMMAND BAR ============ */
.command-bar {
  background: var(--surface2);
  border-bottom: 1px solid var(--border);
  display: flex;
  align-items: center;
  padding: 6px 16px;
  gap: 4px;
  flex-shrink: 0;
  flex-wrap: wrap;
}

.cmd-btn {
  background: transparent;
  border: 1px solid transparent;
  color: var(--text);
  padding: 6px 14px;
  border-radius: 4px;
  cursor: pointer;
  display: flex;
  align-items: center;
  gap: 6px;
  white-space: nowrap;
  min-height: 44px;
  font-size: 12px;
  font-weight: 500;
  letter-spacing: 0.5px;
  text-transform: uppercase;
  transition: all 0.15s;
}
.cmd-btn:hover { background: var(--cyan-glow); border-color: var(--border); color: var(--cyan); }
.cmd-btn.active { background: var(--cyan-glow); color: var(--cyan); border-color: var(--cyan-dim); }
.cmd-btn svg { width: 16px; height: 16px; flex-shrink: 0; }
.cmd-sep { width: 1px; height: 28px; background: var(--border); margin: 0 6px; flex-shrink: 0; }

.cmd-btn.danger:hover { background: var(--red-glow); color: var(--red); border-color: rgba(239,68,68,0.3); }

/* ============ BREADCRUMB ============ */
.breadcrumb-bar {
  background: var(--surface);
  border-bottom: 1px solid var(--border);
  padding: 8px 16px;
  display: flex;
  align-items: center;
  gap: 4px;
  flex-shrink: 0;
  overflow-x: auto;
  min-height: 40px;
}
.breadcrumb-item {
  color: var(--cyan);
  cursor: pointer;
  white-space: nowrap;
  font-size: 12px;
  padding: 4px 8px;
  border-radius: 3px;
  transition: background 0.15s;
}
.breadcrumb-item:hover { background: var(--cyan-glow); }
.breadcrumb-item.current { color: var(--text); cursor: default; }
.breadcrumb-item.current:hover { background: transparent; }
.breadcrumb-sep { color: var(--text-dimmer); font-size: 11px; }

/* ============ MAIN LAYOUT ============ */
.main-layout {
  display: flex;
  flex: 1;
  overflow: hidden;
}

/* ============ LEFT SIDEBAR ============ */
.sidebar {
  width: 260px;
  min-width: 260px;
  background: var(--surface);
  border-right: 1px solid var(--border);
  display: flex;
  flex-direction: column;
  overflow: hidden;
  flex-shrink: 0;
}

.sidebar-section {
  padding: 12px 0;
  border-bottom: 1px solid var(--border);
}
.sidebar-section-title {
  font-size: 10px;
  font-weight: 600;
  letter-spacing: 2px;
  text-transform: uppercase;
  color: var(--text-dim);
  padding: 0 16px 8px;
}

.sidebar-item {
  display: flex;
  align-items: center;
  gap: 10px;
  padding: 8px 16px;
  cursor: pointer;
  color: var(--text);
  transition: all 0.15s;
  min-height: 44px;
  font-size: 13px;
}
.sidebar-item:hover { background: var(--cyan-glow); color: var(--cyan); }
.sidebar-item.active { background: var(--cyan-glow); color: var(--cyan); border-right: 2px solid var(--cyan); }
.sidebar-item svg { width: 18px; height: 18px; flex-shrink: 0; opacity: 0.7; }
.sidebar-item.active svg { opacity: 1; }
.sidebar-item .badge {
  margin-left: auto;
  background: var(--orange);
  color: var(--bg);
  font-size: 10px;
  font-weight: 700;
  padding: 2px 7px;
  border-radius: 10px;
}

.folder-tree {
  flex: 1;
  overflow-y: auto;
  padding: 8px 0;
}

.tree-node {
  user-select: none;
}
.tree-node-row {
  display: flex;
  align-items: center;
  gap: 4px;
  padding: 5px 8px 5px;
  cursor: pointer;
  color: var(--text);
  transition: background 0.1s;
  min-height: 34px;
  font-size: 12px;
  border-radius: 3px;
  margin: 0 8px;
}
.tree-node-row:hover { background: var(--cyan-glow); }
.tree-node-row.active { background: var(--cyan-glow); color: var(--cyan); }
.tree-node-row.drop-target { background: rgba(16, 185, 129, 0.15); outline: 1px dashed var(--green); }
.tree-toggle {
  width: 18px;
  height: 18px;
  display: flex;
  align-items: center;
  justify-content: center;
  color: var(--text-dim);
  font-size: 10px;
  flex-shrink: 0;
  transition: transform 0.15s;
}
.tree-toggle.expanded { transform: rotate(90deg); }
.tree-icon { width: 16px; height: 16px; flex-shrink: 0; }
.tree-label { flex: 1; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
.tree-children { padding-left: 16px; }
.tree-children.collapsed { display: none; }

/* ============ CONTENT AREA ============ */
.content-area {
  flex: 1;
  display: flex;
  flex-direction: column;
  overflow: hidden;
  background: var(--bg);
}

.file-content {
  flex: 1;
  overflow-y: auto;
  padding: 16px;
}

/* Drop zone overlay */
.drop-overlay {
  display: none;
  position: fixed;
  top: 0; left: 0; right: 0; bottom: 0;
  background: rgba(0, 212, 255, 0.08);
  border: 3px dashed var(--cyan);
  z-index: 9999;
  align-items: center;
  justify-content: center;
  flex-direction: column;
  gap: 16px;
}
.drop-overlay.visible { display: flex; }
.drop-overlay-text {
  font-size: 24px;
  font-weight: 700;
  color: var(--cyan);
  text-shadow: 0 0 20px var(--cyan-glow-strong);
  letter-spacing: 4px;
}
.drop-overlay-sub { color: var(--text-dim); font-size: 14px; }

/* Upload drop zone inside content */
.upload-zone {
  border: 2px dashed var(--border);
  border-radius: 8px;
  padding: 60px 30px;
  text-align: center;
  cursor: pointer;
  transition: all 0.2s;
  background: rgba(0, 212, 255, 0.02);
  margin-bottom: 16px;
}
.upload-zone:hover { border-color: var(--cyan-dim); background: var(--cyan-glow); }
.upload-zone h3 { color: var(--cyan); font-size: 16px; margin-bottom: 8px; letter-spacing: 2px; }
.upload-zone p { color: var(--text-dim); font-size: 12px; }
.upload-zone svg { width: 48px; height: 48px; color: var(--cyan-dim); margin-bottom: 16px; }

/* ============ GRID VIEW ============ */
.file-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(160px, 1fr));
  gap: 12px;
}

.grid-item {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 6px;
  padding: 16px 12px 12px;
  cursor: pointer;
  transition: all 0.15s;
  text-align: center;
  position: relative;
  user-select: none;
}
.grid-item:hover { border-color: var(--cyan-dim); background: var(--surface2); transform: translateY(-1px); }
.grid-item.selected { border-color: var(--cyan); background: var(--cyan-glow); }
.grid-item.dragging { opacity: 0.4; }
.grid-item .item-check {
  position: absolute;
  top: 8px;
  left: 8px;
  width: 20px;
  height: 20px;
  border: 1px solid var(--border);
  border-radius: 3px;
  display: none;
  align-items: center;
  justify-content: center;
  background: var(--bg);
  cursor: pointer;
  z-index: 2;
}
.grid-item:hover .item-check, .grid-item.selected .item-check { display: flex; }
.grid-item.selected .item-check { background: var(--cyan); border-color: var(--cyan); color: var(--bg); }
.grid-item .item-star {
  position: absolute;
  top: 8px;
  right: 8px;
  width: 20px;
  height: 20px;
  cursor: pointer;
  color: var(--text-dimmer);
  display: none;
  z-index: 2;
}
.grid-item:hover .item-star { display: block; }
.grid-item .item-star.starred { display: block; color: var(--orange); }
.grid-item .item-icon {
  width: 64px;
  height: 64px;
  margin: 0 auto 12px;
  display: flex;
  align-items: center;
  justify-content: center;
}
.grid-item .item-icon svg { width: 48px; height: 48px; }
.grid-item .item-icon img {
  max-width: 64px;
  max-height: 64px;
  border-radius: 4px;
  object-fit: cover;
}
.grid-item .item-name {
  font-size: 12px;
  font-weight: 500;
  overflow: hidden;
  text-overflow: ellipsis;
  white-space: nowrap;
  color: var(--text);
}
.grid-item .item-meta {
  font-size: 10px;
  color: var(--text-dim);
  margin-top: 4px;
}
.grid-item .share-indicator {
  position: absolute;
  bottom: 8px;
  right: 8px;
  color: var(--green);
  width: 14px;
  height: 14px;
}
.grid-item.folder-item .item-icon svg { color: var(--orange); }

/* ============ LIST VIEW ============ */
.file-list-table {
  width: 100%;
  border-collapse: collapse;
}
.file-list-table th {
  text-align: left;
  padding: 10px 12px;
  font-size: 11px;
  font-weight: 600;
  letter-spacing: 1px;
  text-transform: uppercase;
  color: var(--text-dim);
  border-bottom: 1px solid var(--border);
  cursor: pointer;
  white-space: nowrap;
  user-select: none;
  position: sticky;
  top: 0;
  background: var(--bg);
  z-index: 5;
}
.file-list-table th:hover { color: var(--cyan); }
.file-list-table th .sort-arrow { margin-left: 4px; font-size: 10px; }
.file-list-table td {
  padding: 8px 12px;
  border-bottom: 1px solid rgba(26, 37, 53, 0.5);
  white-space: nowrap;
  font-size: 12px;
}
.file-list-table tr { cursor: pointer; transition: background 0.1s; }
.file-list-table tbody tr:hover { background: var(--surface); }
.file-list-table tbody tr.selected { background: var(--cyan-glow); }
.file-list-table tbody tr.dragging { opacity: 0.4; }
.file-list-table .col-check { width: 36px; }
.file-list-table .col-icon { width: 36px; }
.file-list-table .col-name { min-width: 200px; }
.file-list-table .col-name .name-cell { display: flex; align-items: center; gap: 8px; }
.file-list-table .col-name .name-cell svg { width: 20px; height: 20px; flex-shrink: 0; }
.file-list-table .col-name .name-cell .file-name-text { overflow: hidden; text-overflow: ellipsis; }
.file-list-table .col-name .folder-icon { color: var(--orange); }
.list-check {
  width: 18px;
  height: 18px;
  border: 1px solid var(--border);
  border-radius: 3px;
  display: flex;
  align-items: center;
  justify-content: center;
  background: var(--bg);
  cursor: pointer;
}
.list-check.checked { background: var(--cyan); border-color: var(--cyan); color: var(--bg); }
.list-star { cursor: pointer; color: var(--text-dimmer); width: 16px; height: 16px; }
.list-star.starred { color: var(--orange); }

/* ============ RIGHT PANEL ============ */
.detail-panel {
  width: 340px;
  min-width: 340px;
  background: var(--surface);
  border-left: 1px solid var(--border);
  display: none;
  flex-direction: column;
  overflow: hidden;
  flex-shrink: 0;
}
.detail-panel.open { display: flex; }
.detail-header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 12px 16px;
  border-bottom: 1px solid var(--border);
}
.detail-header h3 { font-size: 13px; font-weight: 600; color: var(--cyan); letter-spacing: 1px; }
.detail-close {
  width: 32px;
  height: 32px;
  display: flex;
  align-items: center;
  justify-content: center;
  cursor: pointer;
  border-radius: 4px;
  color: var(--text-dim);
  border: none;
  background: transparent;
}
.detail-close:hover { background: var(--border); color: var(--text); }
.detail-body { flex: 1; overflow-y: auto; padding: 16px; }
.detail-preview {
  width: 100%;
  aspect-ratio: 1;
  background: var(--bg);
  border: 1px solid var(--border);
  border-radius: 6px;
  display: flex;
  align-items: center;
  justify-content: center;
  overflow: hidden;
  margin-bottom: 16px;
  position: relative;
}
.detail-preview img { max-width: 100%; max-height: 100%; object-fit: contain; }
.detail-preview video, .detail-preview audio { max-width: 100%; }
.detail-preview pre {
  width: 100%;
  height: 100%;
  padding: 12px;
  overflow: auto;
  font-size: 11px;
  color: var(--text);
  white-space: pre-wrap;
  word-break: break-all;
}
.detail-preview iframe { width: 100%; height: 100%; border: none; }
.detail-preview .preview-icon { width: 80px; height: 80px; color: var(--text-dim); }
.detail-field { margin-bottom: 14px; }
.detail-field label {
  display: block;
  font-size: 10px;
  font-weight: 600;
  letter-spacing: 1px;
  text-transform: uppercase;
  color: var(--text-dim);
  margin-bottom: 4px;
}
.detail-field .value { font-size: 13px; color: var(--text); word-break: break-all; }
.detail-tags { display: flex; flex-wrap: wrap; gap: 6px; margin-top: 4px; }
.tag {
  background: var(--surface2);
  border: 1px solid var(--border);
  color: var(--text);
  padding: 3px 10px;
  border-radius: 12px;
  font-size: 11px;
  display: flex;
  align-items: center;
  gap: 4px;
}
.tag .tag-remove { cursor: pointer; color: var(--text-dim); font-size: 14px; line-height: 1; }
.tag .tag-remove:hover { color: var(--red); }
.tag-add {
  background: transparent;
  border: 1px dashed var(--border);
  color: var(--text-dim);
  padding: 3px 10px;
  border-radius: 12px;
  font-size: 11px;
  cursor: pointer;
}
.tag-add:hover { border-color: var(--cyan); color: var(--cyan); }

.detail-notes textarea {
  width: 100%;
  min-height: 80px;
  resize: vertical;
  font-size: 16px;
}

.detail-actions { display: flex; flex-direction: column; gap: 6px; margin-top: 16px; }
.detail-btn {
  display: flex;
  align-items: center;
  gap: 8px;
  padding: 10px 14px;
  border: 1px solid var(--border);
  background: transparent;
  color: var(--text);
  border-radius: 4px;
  cursor: pointer;
  min-height: 44px;
  font-size: 12px;
  font-weight: 500;
  letter-spacing: 0.5px;
  text-transform: uppercase;
  transition: all 0.15s;
}
.detail-btn:hover { background: var(--cyan-glow); border-color: var(--cyan-dim); color: var(--cyan); }
.detail-btn.danger:hover { background: var(--red-glow); border-color: rgba(239,68,68,0.3); color: var(--red); }
.detail-btn svg { width: 16px; height: 16px; flex-shrink: 0; }

.version-list { margin-top: 8px; }
.version-item {
  padding: 6px 0;
  border-bottom: 1px solid rgba(26,37,53,0.5);
  font-size: 11px;
  display: flex;
  justify-content: space-between;
  align-items: center;
}
.version-item .ver-date { color: var(--text-dim); }
.version-item .ver-size { color: var(--text-dim); }
.version-item .ver-restore {
  color: var(--cyan);
  cursor: pointer;
  font-size: 10px;
  text-transform: uppercase;
  letter-spacing: 0.5px;
}
.version-item .ver-restore:hover { text-decoration: underline; }

/* ============ STATUS BAR ============ */
.status-bar {
  background: var(--surface);
  border-top: 1px solid var(--border);
  display: flex;
  align-items: center;
  padding: 4px 16px;
  font-size: 11px;
  color: var(--text-dim);
  gap: 20px;
  height: 30px;
  flex-shrink: 0;
}
.status-bar .storage-meter {
  display: flex;
  align-items: center;
  gap: 8px;
}
.storage-bar-bg {
  width: 100px;
  height: 6px;
  background: var(--border);
  border-radius: 3px;
  overflow: hidden;
}
.storage-bar-fill {
  height: 100%;
  background: var(--cyan);
  border-radius: 3px;
  transition: width 0.3s;
}
.storage-bar-fill.warning { background: var(--orange); }
.storage-bar-fill.critical { background: var(--red); }

/* ============ CONTEXT MENU ============ */
.context-menu {
  display: none;
  position: fixed;
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 6px;
  padding: 6px 0;
  min-width: 220px;
  box-shadow: 0 8px 30px rgba(0,0,0,0.6);
  z-index: 10000;
}
.context-menu.visible { display: block; }
.ctx-item {
  display: flex;
  align-items: center;
  gap: 10px;
  padding: 8px 16px;
  cursor: pointer;
  color: var(--text);
  font-size: 12px;
  transition: background 0.1s;
  min-height: 36px;
}
.ctx-item:hover { background: var(--cyan-glow); color: var(--cyan); }
.ctx-item.danger:hover { background: var(--red-glow); color: var(--red); }
.ctx-item svg { width: 16px; height: 16px; flex-shrink: 0; opacity: 0.7; }
.ctx-item .shortcut { margin-left: auto; color: var(--text-dimmer); font-size: 11px; }
.ctx-separator { height: 1px; background: var(--border); margin: 4px 0; }

/* ============ MODAL ============ */
.modal-overlay {
  display: none;
  position: fixed;
  top: 0; left: 0; right: 0; bottom: 0;
  background: rgba(0,0,0,0.7);
  z-index: 10001;
  align-items: center;
  justify-content: center;
}
.modal-overlay.visible { display: flex; }
.modal {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 8px;
  padding: 24px;
  min-width: 380px;
  max-width: 90vw;
  max-height: 90vh;
  overflow-y: auto;
  box-shadow: 0 10px 40px rgba(0,0,0,0.5);
}
.modal h2 {
  font-size: 16px;
  font-weight: 600;
  color: var(--cyan);
  margin-bottom: 16px;
  letter-spacing: 1px;
}
.modal-field { margin-bottom: 14px; }
.modal-field label {
  display: block;
  font-size: 11px;
  font-weight: 600;
  letter-spacing: 1px;
  text-transform: uppercase;
  color: var(--text-dim);
  margin-bottom: 6px;
}
.modal-field input, .modal-field select, .modal-field textarea { width: 100%; }
.modal-actions { display: flex; gap: 8px; justify-content: flex-end; margin-top: 20px; }

.btn {
  font-family: var(--font);
  font-size: 12px;
  font-weight: 600;
  letter-spacing: 0.5px;
  text-transform: uppercase;
  border: 1px solid var(--cyan-dim);
  background: transparent;
  color: var(--cyan);
  padding: 10px 20px;
  border-radius: 4px;
  cursor: pointer;
  transition: all 0.15s;
  min-height: 44px;
  display: inline-flex;
  align-items: center;
  gap: 6px;
}
.btn:hover { background: var(--cyan-glow); border-color: var(--cyan); box-shadow: 0 0 12px var(--cyan-glow); }
.btn-primary { background: var(--cyan); color: var(--bg); border-color: var(--cyan); font-weight: 700; }
.btn-primary:hover { background: #33ddff; box-shadow: 0 0 20px var(--cyan-glow-strong); }
.btn-ghost { border-color: var(--border); color: var(--text-dim); }
.btn-ghost:hover { border-color: var(--text-dim); color: var(--text); background: var(--surface2); box-shadow: none; }
.btn-danger { border-color: rgba(239,68,68,0.4); color: var(--red); }
.btn-danger:hover { background: var(--red-glow); border-color: var(--red); box-shadow: 0 0 12px var(--red-glow); }
.btn-success { border-color: rgba(16,185,129,0.4); color: var(--green); }
.btn-success:hover { background: var(--green-glow); border-color: var(--green); }

.upload-item {

  border: 1px solid var(--border);

  padding: 10px 14px;
  margin-bottom: 6px;
  display: flex;
  align-items: center;
  gap: 12px;
}
.upload-item .upload-name { flex: 1; font-size: 12px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
.upload-item .upload-size { color: var(--text-dim); font-size: 11px; white-space: nowrap; }
.upload-progress-bar {
  width: 100px;
  height: 4px;
  background: var(--border);
  border-radius: 2px;
  overflow: hidden;
  flex-shrink: 0;
}
.upload-progress-fill { height: 100%; background: var(--cyan); border-radius: 2px; transition: width 0.3s; }
.upload-status { font-size: 11px; color: var(--green); white-space: nowrap; }
.upload-status.error { color: var(--red); }

/* Filter bar */
.filter-bar {
  display: flex;
  gap: 8px;
  padding: 12px 0;
  flex-wrap: wrap;
  align-items: center;
}
.filter-chip {
  background: var(--surface);

  right: 20px;

.toast.error { border-color: rgba(239,68,68,0.4); }

@keyframes toast-in { from { opacity: 0; transform: translateX(40px); } to { opacity: 1; transform: translateX(0); } }
@keyframes toast-out { from { opacity: 1; } to { opacity: 0; transform: translateY(-10px); } }

<script>
(function() {
'use strict';

// ====================
// DATABASE LAYER
// ====================
const DB_NAME = 'KorbFileManager';
const DB_VERSION = 2;
const FILE_STORE = 'files';
const META_PREFIX = 'korb_fileshare_';

let db = null;

function openDB() {
  return new Promise((resolve, reject) => {
    const req = indexedDB.open(DB_NAME, DB_VERSION);
    req.onupgradeneeded = (e) => {
      const d = e.target.result;
      if (!d.objectStoreNames.contains(FILE_STORE)) {
        const store = d.createObjectStore(FILE_STORE, { keyPath: 'id' });
        store.createIndex('folderId', 'folderId', { unique: false });
        store.createIndex('name', 'name', { unique: false });
      }
    };
    req.onsuccess = (e) => { db = e.target.result; resolve(db); };
    req.onerror = (e) => reject(e.target.error);
  });
}

function dbPut(record) {
  return new Promise((resolve, reject) => {
    const tx = db.transaction(FILE_STORE, 'readwrite');
    tx.objectStore(FILE_STORE).put(record);
    tx.oncomplete = () => resolve();
    tx.onerror = (e) => reject(e.target.error);
  });
}

function dbDelete(id) {
  return new Promise((resolve, reject) => {
    const tx = db.transaction(FILE_STORE, 'readwrite');
    tx.objectStore(FILE_STORE).delete(id);
    tx.oncomplete = () => resolve();
    tx.onerror = (e) => reject(e.target.error);
  });
}

function dbGetAll() {
  return new Promise((resolve, reject) => {
    const tx = db.transaction(FILE_STORE, 'readonly');
    const req = tx.objectStore(FILE_STORE).getAll();
    req.onsuccess = () => resolve(req.result || []);
    req.onerror = (e) => reject(e.target.error);
  });
}

function dbGet(id) {
  return new Promise((resolve, reject) => {
    const tx = db.transaction(FILE_STORE, 'readonly');
    const req = tx.objectStore(FILE_STORE).get(id);
    req.onsuccess = () => resolve(req.result);
    req.onerror = (e) => reject(e.target.error);
  });
}

// ====================
// STATE
// ====================
let state = {
  currentNav: 'my-files',
  currentFolder: 'root',
  viewMode: 'grid', // 'grid' or 'list'
  detailOpen: false,
  selectedFiles: new Set(),
  focusedFile: null,
  sortField: 'name',
  sortAsc: true,
  searchQuery: '',
  filterType: 'all',
  clipboard: null, // { action: 'copy'|'cut', ids: [...] }
  folders: {},
  shares: {},
  recentAccess: [],
};

function loadState() {
  try {
    const saved = localStorage.getItem(META_PREFIX + 'state');
    if (saved) {
      const parsed = JSON.parse(saved);
      state.viewMode = parsed.viewMode || 'grid';
      state.detailOpen = parsed.detailOpen || false;
      state.sortField = parsed.sortField || 'name';
      state.sortAsc = parsed.sortAsc !== undefined ? parsed.sortAsc : true;
      state.currentNav = parsed.currentNav || 'my-files';
      state.currentFolder = parsed.currentFolder || 'root';
    }
  } catch(e) {}

  try {
    const f = localStorage.getItem(META_PREFIX + 'folders');
    if (f) state.folders = JSON.parse(f);
  } catch(e) {}

  if (!state.folders.root) {
    state.folders.root = { id: 'root', name: 'My Files', parentId: null, children: [], created: Date.now() };
  }

  try {
    const s = localStorage.getItem(META_PREFIX + 'shares');
    if (s) state.shares = JSON.parse(s);
  } catch(e) {}

  try {
    const r = localStorage.getItem(META_PREFIX + 'recent');
    if (r) state.recentAccess = JSON.parse(r);
  } catch(e) {}
}

function saveState() {
  localStorage.setItem(META_PREFIX + 'state', JSON.stringify({
    viewMode: state.viewMode,
    detailOpen: state.detailOpen,
    sortField: state.sortField,
    sortAsc: state.sortAsc,
    currentNav: state.currentNav,
    currentFolder: state.currentFolder,
  }));
}

function saveFolders() {
  localStorage.setItem(META_PREFIX + 'folders', JSON.stringify(state.folders));
}

function saveShares() {
  localStorage.setItem(META_PREFIX + 'shares', JSON.stringify(state.shares));
}

function saveRecent() {
  localStorage.setItem(META_PREFIX + 'recent', JSON.stringify(state.recentAccess.slice(0, 50)));
}

// ====================
// UTILITIES
// ====================
function uid() { return Date.now().toString(36) + Math.random().toString(36).slice(2, 8); }

function formatBytes(bytes) {
  if (!bytes || bytes === 0) return '0 B';
  const k = 1024;
  const sizes = ['B', 'KB', 'MB', 'GB'];
  const i = Math.floor(Math.log(bytes) / Math.log(k));
  return parseFloat((bytes / Math.pow(k, i)).toFixed(1)) + ' ' + sizes[i];
}

function formatDate(ts) {
  if (!ts) return '--';
  const d = new Date(ts);
  return d.toLocaleDateString('en-US', { month: 'short', day: 'numeric', year: 'numeric' }) +
    ' ' + d.toLocaleTimeString('en-US', { hour: '2-digit', minute: '2-digit' });
}

function formatDateShort(ts) {
  if (!ts) return '--';
  const d = new Date(ts);
  return d.toLocaleDateString('en-US', { month: 'short', day: 'numeric', year: 'numeric' });
}

function escapeHtml(str) {
  const d = document.createElement('div');
  d.textContent = str;
  return d.innerHTML;
}

function getFileExtension(name) {
  const i = name.lastIndexOf('.');
  return i > 0 ? name.slice(i + 1).toLowerCase() : '';
}

function getFileCategory(name) {
  const ext = getFileExtension(name);
  const cats = {
    image: ['jpg','jpeg','png','gif','svg','webp','bmp','ico','tiff'],
    document: ['pdf','doc','docx','txt','rtf','odt','xls','xlsx','ppt','pptx','csv'],
    code: ['js','ts','jsx','tsx','py','rb','go','rs','java','c','cpp','h','hpp','css','html','xml','json','yaml','yml','toml','sh','bash','sql','md','vue','svelte','php'],
    audio: ['mp3','wav','ogg','flac','aac','m4a','wma'],
    video: ['mp4','webm','avi','mov','mkv','flv','wmv','m4v'],
    archive: ['zip','rar','7z','tar','gz','bz2','xz'],
  };
  for (const [cat, exts] of Object.entries(cats)) {
    if (exts.includes(ext)) return cat;
  }
  return 'other';
}

function getFileColor(name) {
  const cat = getFileCategory(name);
  const colors = {
    image: '#10b981',
    document: '#3b82f6',
    code: '#eab308',
    audio: '#a855f7',
    video: '#ec4899',
    archive: '#f97316',
    other: '#64748b',
  };
  return colors[cat] || colors.other;
}

function getFileIconSvg(name, isFolder) {
  if (isFolder) {
    return '<svg viewBox="0 0 24 24" fill="var(--orange)" stroke="none"><path d="M2 6a2 2 0 012-2h4l2 2h10a2 2 0 012 2v10a2 2 0 01-2 2H4a2 2 0 01-2-2V6z"/></svg>';
  }
  const cat = getFileCategory(name);
  const ext = getFileExtension(name);
  const color = getFileColor(name);
  const extLabel = ext.toUpperCase().slice(0, 4);

  if (cat === 'image') {
    return `<svg viewBox="0 0 24 24" fill="none" stroke="${color}" stroke-width="1.5"><rect x="3" y="3" width="18" height="18" rx="2"/><circle cx="8.5" cy="8.5" r="1.5"/><path d="M21 15l-5-5L5 21"/></svg>`;
  }
  if (cat === 'audio') {
    return `<svg viewBox="0 0 24 24" fill="none" stroke="${color}" stroke-width="1.5"><path d="M9 18V5l12-2v13"/><circle cx="6" cy="18" r="3"/><circle cx="18" cy="16" r="3"/></svg>`;
  }
  if (cat === 'video') {
    return `<svg viewBox="0 0 24 24" fill="none" stroke="${color}" stroke-width="1.5"><rect x="2" y="2" width="20" height="20" rx="2.18"/><path d="M10 8l6 4-6 4V8z" fill="${color}" opacity="0.3"/></svg>`;
  }
  if (cat === 'archive') {
    return `<svg viewBox="0 0 24 24" fill="none" stroke="${color}" stroke-width="1.5"><path d="M21 8v13H3V8"/><path d="M1 3h22v5H1z"/><path d="M10 12h4"/></svg>`;
  }
  if (cat === 'code') {
    return `<svg viewBox="0 0 24 24" fill="none" stroke="${color}" stroke-width="1.5"><polyline points="16 18 22 12 16 6"/><polyline points="8 6 2 12 8 18"/></svg>`;
  }
  // Generic document
  return `<svg viewBox="0 0 24 24" fill="none" stroke="${color}" stroke-width="1.5"><path d="M14 2H6a2 2 0 00-2 2v16a2 2 0 002 2h12a2 2 0 002-2V8z"/><polyline points="14 2 14 8 20 8"/><text x="12" y="17" text-anchor="middle" fill="${color}" stroke="none" font-size="5" font-family="JetBrains Mono">${extLabel}</text></svg>`;
}

function createFolder(name, parentId) {
  const id = 'folder_' + uid();
  state.folders[id] = {
    id,
    name,
    parentId: parentId || state.currentFolder,
    children: [],
    created: Date.now(),
  };
  if (state.folders[parentId || state.currentFolder]) {
    state.folders[parentId || state.currentFolder].children.push(id);
  }
  saveFolders();
  return id;
}

function deleteFolder(folderId) {
  const folder = state.folders[folderId];
  if (!folder || folderId === 'root') return;

  // Recursively collect all subfolder IDs
  function collectIds(id) {
    const f = state.folders[id];
    if (!f) return [id];
    let ids = [id];
    for (const childId of (f.children || [])) {
      ids = ids.concat(collectIds(childId));
    }
    return ids;
  }

  const allIds = collectIds(folderId);

  // Remove from parent
  const parent = state.folders[folder.parentId];
  if (parent) {
    parent.children = parent.children.filter(c => c !== folderId);
  }

  // Delete all subfolders
  allIds.forEach(id => delete state.folders[id]);
  saveFolders();

  return allIds;
}

function getFolderPath(folderId) {
  const path = [];
  let current = folderId;
  while (current && state.folders[current]) {
    path.unshift(state.folders[current]);
    current = state.folders[current].parentId;
  }
  return path;
}

function getAllSubfolderIds(folderId) {
  const ids = [];
  function collect(id) {
    const f = state.folders[id];
    if (!f) return;
    for (const childId of (f.children || [])) {
      ids.push(childId);
      collect(childId);
    }
  }
  collect(folderId);
  return ids;
}

// ====================
// FILE OPERATIONS
// ====================
async function uploadFiles(fileList, targetFolder) {
  const folderId = targetFolder || state.currentFolder;
  const queue = document.getElementById('uploadQueue');
  let addedQueue = false;

  if (!queue) {
    // Create queue container if needed
  }

  for (const file of fileList) {
    if (file.size > 500 * 1024 * 1024) {
      toast('File too large: ' + file.name + ' (max 500 MB)', 'error');
      continue;
    }

    // Check for duplicates
    const allFiles = await dbGetAll();
    const existing = allFiles.find(f => f.name === file.name && f.folderId === folderId && !f.trashed);

    try {
      const buffer = await file.arrayBuffer();
      const id = uid();

      const record = {
        id,
        name: file.name,
        size: file.size,
        type: file.type || 'application/octet-stream',
        data: buffer,
        folderId: folderId,
        uploadedAt: Date.now(),
        modifiedAt: Date.now(),
        tags: [],
        notes: '',
        starred: false,
        trashed: false,
        trashedAt: null,
        versions: [],
      };

      if (existing) {
        // Add as new version
        existing.versions.push({
          id: uid(),
          size: existing.size,
          date: existing.modifiedAt,
          dataId: existing.id + '_v' + existing.versions.length,
        });
        // Store old data as version
        const versionRecord = {
          id: existing.id + '_v' + (existing.versions.length - 1),
          name: existing.name + ' (v' + existing.versions.length + ')',
          size: existing.size,
          type: existing.type,
          data: existing.data,
          folderId: '__versions__',
          uploadedAt: existing.uploadedAt,
          modifiedAt: existing.modifiedAt,
          tags: [],
          notes: '',
          starred: false,
          trashed: false,
          versions: [],
        };
        await dbPut(versionRecord);

        existing.data = buffer;
        existing.size = file.size;
        existing.type = file.type || existing.type;
        existing.modifiedAt = Date.now();
        await dbPut(existing);
        toast('Updated: ' + file.name + ' (v' + (existing.versions.length + 1) + ')', 'info');
      } else {
        await dbPut(record);
        toast('Uploaded: ' + file.name, 'success');
      }

      // Add to recent
      trackRecent(existing ? existing.id : id);

    } catch (err) {
      toast('Upload failed: ' + file.name, 'error');
      console.error(err);
    }
  }
  render();
}

function trackRecent(fileId) {
  state.recentAccess = state.recentAccess.filter(r => r.id !== fileId);
  state.recentAccess.unshift({ id: fileId, at: Date.now() });
  state.recentAccess = state.recentAccess.slice(0, 50);
  saveRecent();
}

async function downloadFile(fileId) {
  const record = await dbGet(fileId);
  if (!record || !record.data) { toast('File not found', 'error'); return; }
  const blob = new Blob([record.data], { type: record.type });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  a.download = record.name;
  document.body.appendChild(a);
  a.click();
  a.remove();
  setTimeout(() => URL.revokeObjectURL(url), 10000);
}

async function trashFiles(ids) {
  for (const id of ids) {
    const record = await dbGet(id);
    if (record) {
      record.trashed = true;
      record.trashedAt = Date.now();
      record.originalFolder = record.folderId;
      record.folderId = '__trash__';
      await dbPut(record);
    }
  }
  state.selectedFiles.clear();
  state.focusedFile = null;
  toast(ids.length + ' item(s) moved to trash', 'info');
  render();
}

async function restoreFromTrash(ids) {
  for (const id of ids) {
    const record = await dbGet(id);
    if (record) {
      record.trashed = false;
      record.folderId = record.originalFolder || 'root';
      record.trashedAt = null;
      delete record.originalFolder;
      await dbPut(record);
    }
  }
  state.selectedFiles.clear();
  toast(ids.length + ' item(s) restored', 'success');
  render();
}

async function permanentDelete(ids) {
  for (const id of ids) {
    await dbDelete(id);
  }
  state.selectedFiles.clear();
  state.focusedFile = null;
  toast(ids.length + ' item(s) permanently deleted', 'info');
  render();
}

async function emptyTrash() {
  const all = await dbGetAll();
  const trashed = all.filter(f => f.trashed);
  for (const f of trashed) {
    await dbDelete(f.id);
  }
  state.selectedFiles.clear();
  toast('Trash emptied', 'info');
  render();
}

async function moveFiles(ids, targetFolderId) {
  for (const id of ids) {
    const record = await dbGet(id);
    if (record) {
      record.folderId = targetFolderId;
      record.modifiedAt = Date.now();
      await dbPut(record);
    }
  }
  state.selectedFiles.clear();
  toast(ids.length + ' item(s) moved', 'success');
  render();
}

async function copyFiles(ids, targetFolderId) {
  for (const id of ids) {
    const record = await dbGet(id);
    if (record) {
      const newRecord = { ...record, id: uid(), folderId: targetFolderId, name: record.name, uploadedAt: Date.now(), modifiedAt: Date.now(), versions: [], tags: [...(record.tags || [])], data: record.data.slice(0) };
      await dbPut(newRecord);
    }
  }
  toast(ids.length + ' item(s) copied', 'success');
  render();
}

async function renameFile(id, newName) {
  const record = await dbGet(id);
  if (record) {
    record.name = newName;
    record.modifiedAt = Date.now();
    await dbPut(record);
    render();
  }
}

async function toggleStar(id) {
  const record = await dbGet(id);
  if (record) {
    record.starred = !record.starred;
    await dbPut(record);
    render();
  }
}

async function updateFileMeta(id, updates) {
  const record = await dbGet(id);
  if (record) {
    Object.assign(record, updates);
    record.modifiedAt = Date.now();
    await dbPut(record);
  }
}

// ====================
// RENDERING
// ====================
async function render() {
  renderSidebar();
  renderBreadcrumb();
  await renderContent();
  renderStatusBar();
  updateDetailPanel();
  saveState();
}

function renderSidebar() {
  // Highlight active nav
  document.querySelectorAll('.sidebar-item').forEach(el => {
    el.classList.toggle('active', el.dataset.nav === state.currentNav);
  });

  // Render folder tree
  const tree = document.getElementById('folderTree');
  tree.innerHTML = renderFolderNode('root', 0);

  // Update trash badge
  updateTrashBadge();
}

function renderFolderNode(folderId, depth) {
  const folder = state.folders[folderId];
  if (!folder) return '';

  const children = (folder.children || []).filter(cid => state.folders[cid]);
  const hasChildren = children.length > 0;
  const isExpanded = localStorage.getItem(META_PREFIX + 'expanded_' + folderId) !== 'false';
  const isActive = state.currentNav === 'my-files' && state.currentFolder === folderId;

  let html = `<div class="tree-node">`;
  html += `<div class="tree-node-row${isActive ? ' active' : ''}" data-folder="${folderId}" style="padding-left:${8 + depth * 16}px" draggable="false">`;
  html += `<span class="tree-toggle${hasChildren ? (isExpanded ? ' expanded' : '') : ''}" data-toggle="${folderId}" style="${hasChildren ? '' : 'visibility:hidden'}">\u25B6</span>`;
  html += `<svg class="tree-icon" viewBox="0 0 24 24" fill="${isActive ? 'var(--cyan)' : 'var(--orange)'}" stroke="none"><path d="M2 6a2 2 0 012-2h4l2 2h10a2 2 0 012 2v10a2 2 0 01-2 2H4a2 2 0 01-2-2V6z"/></svg>`;
  html += `<span class="tree-label">${escapeHtml(folder.name)}</span>`;
  html += `</div>`;

  if (hasChildren) {
    html += `<div class="tree-children${isExpanded ? '' : ' collapsed'}">`;
    for (const childId of children) {
      html += renderFolderNode(childId, depth + 1);
    }
    html += `</div>`;
  }
  html += `</div>`;
  return html;
}

function renderBreadcrumb() {
  const bar = document.getElementById('breadcrumbBar');

  if (state.currentNav !== 'my-files') {
    const labels = { 'shared-with-me': 'Shared With Me', 'recent': 'Recent', 'favorites': 'Favorites', 'trash': 'Trash' };
    bar.innerHTML = `<span class="breadcrumb-item current">${labels[state.currentNav] || ''}</span>`;
    return;
  }

  const path = getFolderPath(state.currentFolder);
  bar.innerHTML = path.map((f, i) => {
    const isLast = i === path.length - 1;
    return (i > 0 ? '<span class="breadcrumb-sep">/</span>' : '') +
      `<span class="breadcrumb-item${isLast ? ' current' : ''}" data-breadcrumb="${f.id}">${escapeHtml(f.name)}</span>`;
  }).join('');
}

async function renderContent() {
  const content = document.getElementById('fileContent');
  const allFiles = await dbGetAll();

  let items = [];
  let folders = [];
  let showUploadZone = false;
  let isTrash = false;

  if (state.currentNav === 'my-files') {
    // Show subfolders of current folder
    const currentFolder = state.folders[state.currentFolder];
    if (currentFolder) {
      folders = (currentFolder.children || [])
        .filter(cid => state.folders[cid])
        .map(cid => state.folders[cid]);
    }
    items = allFiles.filter(f => f.folderId === state.currentFolder && !f.trashed);
    showUploadZone = true;
  } else if (state.currentNav === 'shared-with-me') {
    const sharedFileIds = new Set();
    Object.values(state.shares).forEach(s => { if (s.active) sharedFileIds.add(s.fileId); });
    items = allFiles.filter(f => sharedFileIds.has(f.id) && !f.trashed);
  } else if (state.currentNav === 'recent') {
    const recentIds = state.recentAccess.map(r => r.id);
    items = allFiles.filter(f => recentIds.includes(f.id) && !f.trashed);
    items.sort((a, b) => {
      return recentIds.indexOf(a.id) - recentIds.indexOf(b.id);
    });
  } else if (state.currentNav === 'favorites') {
    items = allFiles.filter(f => f.starred && !f.trashed);
  } else if (state.currentNav === 'trash') {
    items = allFiles.filter(f => f.trashed);
    isTrash = true;
  }

  // Apply search
  if (state.searchQuery) {
    const q = state.searchQuery.toLowerCase();
    items = items.filter(f =>
      f.name.toLowerCase().includes(q) ||
      (f.tags && f.tags.some(t => t.toLowerCase().includes(q))) ||
      (f.notes && f.notes.toLowerCase().includes(q))
    );
    folders = folders.filter(f => f.name.toLowerCase().includes(q));
  }

  // Apply type filter
  if (state.filterType !== 'all') {
    items = items.filter(f => getFileCategory(f.name) === state.filterType);
  }

  // Sort (folders first, then files)
  const sf = state.sortField;
  const asc = state.sortAsc ? 1 : -1;
  items.sort((a, b) => {
    if (sf === 'name') return a.name.localeCompare(b.name) * asc;
    if (sf === 'size') return (a.size - b.size) * asc;
    if (sf === 'date') return (a.modifiedAt - b.modifiedAt) * asc;
    if (sf === 'type') return getFileExtension(a.name).localeCompare(getFileExtension(b.name)) * asc;
    return 0;
  });

  folders.sort((a, b) => a.name.localeCompare(b.name) * asc);

  // Build HTML
  let html = '';

  // Filter chips
  html += `<div class="filter-bar">`;
  const types = ['all', 'document', 'image', 'code', 'audio', 'video', 'archive', 'other'];
  types.forEach(t => {
    const label = t === 'all' ? 'All' : t.charAt(0).toUpperCase() + t.slice(1) + 's';
    html += `<span class="filter-chip${state.filterType === t ? ' active' : ''}" data-filter="${t}">${label}</span>`;
  });
  html += `</div>`;

  // Trash actions
  if (isTrash && items.length > 0) {
    html += `<div style="margin-bottom:12px; display:flex; gap:8px;">`;
    html += `<button class="btn btn-danger" onclick="app.emptyTrash()">Empty Trash</button>`;
    html += `</div>`;
  }

  const totalItems = folders.length + items.length;

  if (totalItems === 0 && !showUploadZone) {
    html += `<div class="empty-state">`;
    html += `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M22 19a2 2 0 01-2 2H4a2 2 0 01-2-2V5a2 2 0 012-2h5l2 3h9a2 2 0 012 2z"/></svg>`;
    html += `<h3>No files here</h3>`;
    html += `<p>${isTrash ? 'Trash is empty' : 'Upload files or create folders to get started'}</p>`;
    html += `</div>`;
  } else if (state.viewMode === 'grid') {
    // Upload zone
    if (showUploadZone) {
      html += `<div class="upload-zone" id="uploadZone">`;
      html += `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M21 15v4a2 2 0 01-2 2H5a2 2 0 01-2-2v-4"/><polyline points="17 8 12 3 7 8"/><line x1="12" y1="3" x2="12" y2="15"/></svg>`;
      html += `<h3>DROP FILES HERE</h3>`;
      html += `<p>or click to browse &mdash; up to 500 MB per file</p>`;
      html += `</div>`;
    }

    html += `<div class="file-grid">`;

    // Folders
    folders.forEach(f => {
      html += `<div class="grid-item folder-item" data-folder-id="${f.id}" data-type="folder" draggable="true">`;
      html += `<div class="item-icon">${getFileIconSvg('', true)}</div>`;
      html += `<div class="item-name">${escapeHtml(f.name)}</div>`;
      html += `<div class="item-meta">${(f.children || []).length} items</div>`;
      html += `</div>`;
    });

    // Files
    items.forEach(f => {
      const selected = state.selectedFiles.has(f.id);
      const isShared = Object.values(state.shares).some(s => s.fileId === f.id && s.active);
      html += `<div class="grid-item${selected ? ' selected' : ''}" data-file-id="${f.id}" data-type="file" draggable="true">`;
      html += `<div class="item-check" data-check="${f.id}">${selected ? '\u2713' : ''}</div>`;
      html += `<div class="item-star${f.starred ? ' starred' : ''}" data-star="${f.id}">\u2605</div>`;
      html += `<div class="item-icon">`;
      if (getFileCategory(f.name) === 'image' && f.data) {
        const blob = new Blob([f.data], { type: f.type });
        const url = URL.createObjectURL(blob);
        html += `<img src="${url}" alt="${escapeHtml(f.name)}" loading="lazy">`;
      } else {
        html += getFileIconSvg(f.name, false);
      }
      html += `</div>`;
      html += `<div class="item-name" title="${escapeHtml(f.name)}">${escapeHtml(f.name)}</div>`;
      html += `<div class="item-meta">${formatBytes(f.size)}</div>`;
      if (isShared) html += `<svg class="share-indicator" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="18" cy="5" r="3"/><circle cx="6" cy="12" r="3"/><circle cx="18" cy="19" r="3"/><line x1="8.59" y1="13.51" x2="15.42" y2="17.49"/><line x1="15.41" y1="6.51" x2="8.59" y2="10.49"/></svg>`;
      html += `</div>`;
    });

    html += `</div>`;
  } else {
    // List view
    if (showUploadZone) {
      html += `<div class="upload-zone" id="uploadZone" style="padding:30px;margin-bottom:12px;">`;
      html += `<h3>DROP FILES HERE OR CLICK TO UPLOAD</h3>`;
      html += `</div>`;
    }

    html += `<table class="file-list-table"><thead><tr>`;
    html += `<th class="col-check" style="width:36px"><div class="list-check" id="selectAllCheck">${state.selectedFiles.size > 0 ? '\u2713' : ''}</div></th>`;
    const cols = [
      { key: 'name', label: 'Name', cls: 'col-name' },
      { key: 'type', label: 'Type' },
      { key: 'size', label: 'Size' },
      { key: 'date', label: 'Modified' },
    ];
    cols.forEach(col => {
      const arrow = state.sortField === col.key ? (state.sortAsc ? '\u25B2' : '\u25BC') : '';
      html += `<th class="${col.cls || ''}" data-sort="${col.key}">${col.label}<span class="sort-arrow">${arrow}</span></th>`;
    });
    html += `<th style="width:40px"></th>`;
    html += `</tr></thead><tbody>`;

    // Folder rows
    folders.forEach(f => {
      html += `<tr data-folder-id="${f.id}" data-type="folder">`;
      html += `<td></td>`;
      html += `<td class="col-name"><div class="name-cell"><svg class="folder-icon" viewBox="0 0 24 24" fill="var(--orange)" width="20" height="20"><path d="M2 6a2 2 0 012-2h4l2 2h10a2 2 0 012 2v10a2 2 0 01-2 2H4a2 2 0 01-2-2V6z"/></svg><span class="file-name-text">${escapeHtml(f.name)}</span></div></td>`;
      html += `<td>Folder</td>`;
      html += `<td>--</td>`;
      html += `<td>${formatDateShort(f.created)}</td>`;
      html += `<td></td>`;
      html += `</tr>`;
    });

    // File rows
    items.forEach(f => {
      const selected = state.selectedFiles.has(f.id);
      html += `<tr class="${selected ? 'selected' : ''}" data-file-id="${f.id}" data-type="file" draggable="true">`;
      html += `<td><div class="list-check${selected ? ' checked' : ''}" data-check="${f.id}">${selected ? '\u2713' : ''}</div></td>`;
      html += `<td class="col-name"><div class="name-cell">${getFileIconSvg(f.name, false)}<span class="file-name-text">${escapeHtml(f.name)}</span></div></td>`;
      html += `<td style="color:var(--text-dim)">${getFileExtension(f.name).toUpperCase() || '--'}</td>`;
      html += `<td style="color:var(--text-dim)">${formatBytes(f.size)}</td>`;
      html += `<td style="color:var(--text-dim)">${formatDateShort(f.modifiedAt)}</td>`;
      html += `<td><span class="list-star${f.starred ? ' starred' : ''}" data-star="${f.id}">\u2605</span></td>`;
      html += `</tr>`;
    });

    html += `</tbody></table>`;
  }

  content.innerHTML = html;

  // Bind upload zone
  const uz = document.getElementById('uploadZone');
  if (uz) {
    uz.addEventListener('click', () => document.getElementById('fileInput').click());
  }
}

async function renderStatusBar() {
  const allFiles = await dbGetAll();
  const activeFiles = allFiles.filter(f => !f.trashed && f.folderId !== '__versions__');
  const totalSize = activeFiles.reduce((sum, f) => sum + (f.size || 0), 0);

  document.getElementById('statusFileCount').textContent = activeFiles.length + ' items';

  const selCount = state.selectedFiles.size;
  const selEl = document.getElementById('statusSelection');
  if (selCount > 0) {
    selEl.style.display = '';
    selEl.textContent = selCount + ' selected';
  } else {
    selEl.style.display = 'none';
  }

  document.getElementById('storageText').textContent = formatBytes(totalSize) + ' used';

  // Estimate quota - approximate 100MB for visualization
  const estimatedMax = 100 * 1024 * 1024;
  const pct = Math.min(100, (totalSize / estimatedMax) * 100);
  const bar = document.getElementById('storageBarFill');
  bar.style.width = pct + '%';
  bar.className = 'storage-bar-fill' + (pct > 80 ? ' critical' : pct > 60 ? ' warning' : '');

  // Update trash badge
  updateTrashBadge();
}

async function updateTrashBadge() {
  const allFiles = await dbGetAll();
  const trashCount = allFiles.filter(f => f.trashed).length;
  const badge = document.getElementById('trashBadge');
  if (trashCount > 0) {
    badge.style.display = '';
    badge.textContent = trashCount;
  } else {
    badge.style.display = 'none';
  }
}

// ====================
// DETAIL PANEL
// ====================
async function updateDetailPanel() {
  const body = document.getElementById('detailBody');
  if (!state.focusedFile) {
    body.innerHTML = '<div class="empty-state" style="padding:40px 10px;"><p>Select a file to view details</p></div>';
    return;
  }

  const file = await dbGet(state.focusedFile);
  if (!file) {
    body.innerHTML = '<div class="empty-state" style="padding:40px 10px;"><p>File not found</p></div>';
    return;
  }

  let previewHtml = '';
  const cat = getFileCategory(file.name);

  if (cat === 'image' && file.data) {
    const blob = new Blob([file.data], { type: file.type });
    const url = URL.createObjectURL(blob);
    previewHtml = `<img src="${url}" alt="${escapeHtml(file.name)}" style="cursor:zoom-in" onclick="app.viewImage('${file.id}')">`;
  } else if (cat === 'audio' && file.data) {
    const blob = new Blob([file.data], { type: file.type });
    const url = URL.createObjectURL(blob);
    previewHtml = `<audio controls src="${url}" style="width:100%"></audio>`;
  } else if (cat === 'video' && file.data) {
    const blob = new Blob([file.data], { type: file.type });
    const url = URL.createObjectURL(blob);
    previewHtml = `<video controls src="${url}" style="max-width:100%;max-height:100%"></video>`;
  } else if ((cat === 'code' || cat === 'document') && file.data && file.size < 500000) {
    const ext = getFileExtension(file.name);
    if (['txt','csv','json','xml','html','css','js','ts','py','md','yaml','yml','toml','sh','sql','rb','go','java','c','cpp','h','hpp','jsx','tsx','vue','svelte','php','rs'].includes(ext)) {
      try {
        const text = new TextDecoder().decode(file.data);
        previewHtml = `<pre>${escapeHtml(text)}</pre>`;
      } catch(e) {
        previewHtml = `<div class="preview-icon">${getFileIconSvg(file.name, false)}</div>`;
      }
    } else if (ext === 'pdf' && file.data) {
      const blob = new Blob([file.data], { type: 'application/pdf' });
      const url = URL.createObjectURL(blob);
      previewHtml = `<iframe src="${url}"></iframe>`;
    } else {
      previewHtml = `<div class="preview-icon">${getFileIconSvg(file.name, false)}</div>`;
    }
  } else if (getFileExtension(file.name) === 'pdf' && file.data) {
    const blob = new Blob([file.data], { type: 'application/pdf' });
    const url = URL.createObjectURL(blob);
    previewHtml = `<iframe src="${url}"></iframe>`;
  } else {
    previewHtml = `<div class="preview-icon">${getFileIconSvg(file.name, false)}</div>`;
  }

  const tags = file.tags || [];
  const isShared = Object.values(state.shares).some(s => s.fileId === file.id && s.active);
  const versions = file.versions || [];

  let html = '';
  html += `<div class="detail-preview">${previewHtml}</div>`;

  html += `<div class="detail-field"><label>Name</label><div class="value">${escapeHtml(file.name)}</div></div>`;
  html += `<div class="detail-field"><label>Type</label><div class="value" style="color:${getFileColor(file.name)}">${getFileCategory(file.name).toUpperCase()} &mdash; ${getFileExtension(file.name).toUpperCase() || 'Unknown'}</div></div>`;
  html += `<div class="detail-field"><label>Size</label><div class="value">${formatBytes(file.size)}</div></div>`;
  html += `<div class="detail-field"><label>Uploaded</label><div class="value">${formatDate(file.uploadedAt)}</div></div>`;
  html += `<div class="detail-field"><label>Modified</label><div class="value">${formatDate(file.modifiedAt)}</div></div>`;

  if (isShared) {
    html += `<div class="detail-field"><label>Sharing</label><div class="value" style="color:var(--green)">Shared</div></div>`;
  }

  // Tags
  html += `<div class="detail-field"><label>Tags</label><div class="detail-tags">`;
  tags.forEach(t => {
    html += `<span class="tag">${escapeHtml(t)}<span class="tag-remove" data-remove-tag="${t}" data-file-id="${file.id}">&times;</span></span>`;
  });
  html += `<span class="tag-add" data-add-tag="${file.id}">+ Add</span>`;
  html += `</div></div>`;

  // Notes
  html += `<div class="detail-field detail-notes"><label>Notes</label>`;
  html += `<textarea placeholder="Add notes..." data-notes-file="${file.id}">${escapeHtml(file.notes || '')}</textarea>`;
  html += `</div>`;

  // Star
  html += `<div class="detail-field"><label>Favorite</label>`;
  html += `<span style="cursor:pointer;font-size:20px;color:${file.starred ? 'var(--orange)' : 'var(--text-dimmer)'}" data-toggle-star="${file.id}">${file.starred ? '\u2605 Starred' : '\u2606 Not starred'}</span>`;
  html += `</div>`;

  // Versions
  if (versions.length > 0) {
    html += `<div class="detail-field"><label>Version History (${versions.length + 1} versions)</label>`;
    html += `<div class="version-list">`;
    html += `<div class="version-item"><span>Current</span><span class="ver-size">${formatBytes(file.size)}</span><span class="ver-date">${formatDateShort(file.modifiedAt)}</span></div>`;
    versions.slice().reverse().forEach((v, i) => {
      html += `<div class="version-item"><span>v${versions.length - i}</span><span class="ver-size">${formatBytes(v.size)}</span><span class="ver-date">${formatDateShort(v.date)}</span><span class="ver-restore" data-restore-version="${v.dataId}" data-file-id="${file.id}">Restore</span></div>`;
    });
    html += `</div></div>`;
  }

  // Actions
  html += `<div class="detail-actions">`;
  html += `<button class="detail-btn" onclick="app.download('${file.id}')"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 15v4a2 2 0 01-2 2H5a2 2 0 01-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>Download</button>`;
  html += `<button class="detail-btn" onclick="app.showShareModal('${file.id}')"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="18" cy="5" r="3"/><circle cx="6" cy="12" r="3"/><circle cx="18" cy="19" r="3"/><line x1="8.59" y1="13.51" x2="15.42" y2="17.49"/><line x1="15.41" y1="6.51" x2="8.59" y2="10.49"/></svg>Share</button>`;
  html += `<button class="detail-btn" onclick="app.showRenameModal('${file.id}')"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M11 4H4a2 2 0 00-2 2v14a2 2 0 002 2h14a2 2 0 002-2v-7"/><path d="M18.5 2.5a2.121 2.121 0 013 3L12 15l-4 1 1-4 9.5-9.5z"/></svg>Rename</button>`;
  if (file.trashed) {
    html += `<button class="detail-btn" onclick="app.restore(['${file.id}'])"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="1 4 1 10 7 10"/><path d="M3.51 15a9 9 0 102.13-9.36L1 10"/></svg>Restore</button>`;
    html += `<button class="detail-btn danger" onclick="app.permDelete(['${file.id}'])"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="3 6 5 6 21 6"/><path d="M19 6v14a2 2 0 01-2 2H7a2 2 0 01-2-2V6m3 0V4a2 2 0 012-2h4a2 2 0 012 2v2"/><line x1="10" y1="11" x2="10" y2="17"/><line x1="14" y1="11" x2="14" y2="17"/></svg>Delete Permanently</button>`;
  } else {
    html += `<button class="detail-btn danger" onclick="app.trash(['${file.id}'])"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="3 6 5 6 21 6"/><path d="M19 6v14a2 2 0 01-2 2H7a2 2 0 01-2-2V6m3 0V4a2 2 0 012-2h4a2 2 0 012 2v2"/></svg>Move to Trash</button>`;
  }
  html += `</div>`;

  body.innerHTML = html;

  // Bind notes save
  const notesArea = body.querySelector(`textarea[data-notes-file="${file.id}"]`);
  if (notesArea) {
    let debounce;
    notesArea.addEventListener('input', () => {
      clearTimeout(debounce);
      debounce = setTimeout(() => {
        updateFileMeta(file.id, { notes: notesArea.value });
      }, 500);
    });
  }
}

function showContextMenu(x, y, items) {
  const menu = document.getElementById('contextMenu');
  let html = '';
  items.forEach(item => {
    if (item.separator) {
      html += '<div class="ctx-separator"></div>';
    } else {
      html += `<div class="ctx-item${item.danger ? ' danger' : ''}" data-action="${item.action}">`;
      if (item.icon) html += item.icon;
      html += `<span>${item.label}</span>`;
      if (item.shortcut) html += `<span class="shortcut">${item.shortcut}</span>`;
      html += `</div>`;
    }
  });
  menu.innerHTML = html;
  menu.style.left = Math.min(x, window.innerWidth - 240) + 'px';
  menu.style.top = Math.min(y, window.innerHeight - items.length * 40) + 'px';
  menu.classList.add('visible');
}

function hideContextMenu() {
  document.getElementById('contextMenu').classList.remove('visible');
}

function showNewFolderModal() {

      <label>Folder Name</label>
      <input type="text" id="newFolderName" placeholder="Untitled Folder" autofocus>

      <button class="btn btn-ghost" onclick="app.closeModal()">Cancel</button>
      <button class="btn btn-primary" id="createFolderBtn">Create</button>
    </div>
  `);
  setTimeout(() => {
    const input = document.getElementById('newFolderName');
    input.focus();
    input.addEventListener('keydown', (e) => {

    });

function showRenameModal(fileId) {

    showModal(`

function showMoveModal(ids) {
  function buildFolderOptions(folderId, depth) {
    const folder = state.folders[folderId];
    if (!folder) return '';
    let html = `<option value="${folderId}">${'\u00A0\u00A0'.repeat(depth)}${folder.name}</option>`;
    (folder.children || []).forEach(cid => { html += buildFolderOptions(cid, depth + 1); });
    return html;
  }

  showModal(`
    <h2>Move ${ids.length} Item(s)</h2>
    <div class="modal-field">
      <label>Destination Folder</label>
      <select id="moveDestination">${buildFolderOptions('root', 0)}</select>
    </div>
    <div class="modal-actions">
      <button class="btn btn-ghost" onclick="app.closeModal()">Cancel</button>
      <button class="btn btn-primary" id="moveBtn">Move</button>
    </div>
  `);
  setTimeout(() => {
    document.getElementById('moveBtn').addEventListener('click', () => {
      const dest = document.getElementById('moveDestination').value;
      moveFiles(ids, dest);
      closeModal();
    });
  }, 50);
}

function showShareModal(fileId) {
  dbGet(fileId).then(file => {
    if (!file) return;

    let existingShare = Object.values(state.shares).find(s => s.fileId === fileId && s.active);
    if (!existingShare) {
      const sid = shareFile(fileId);
      existingShare = state.shares[sid];
    }

    const shareLink = window.location.origin + '/shared/' + existingShare.id;

    showModal(`
      <h2>Share: ${escapeHtml(file.name)}</h2>
      <div class="share-link-box">
        <span class="link-text">${shareLink}</span>
        <button class="copy-btn" id="copyShareLink">Copy</button>
      </div>
      <div class="share-options">
        <div class="share-option">
          <label>Allow download</label>
          <div class="toggle-switch${existingShare.permissions !== 'view' ? ' on' : ''}" id="toggleDownload"></div>
        </div>
        <div class="share-option">
          <label>Password protect</label>
          <div class="toggle-switch${existingShare.password ? ' on' : ''}" id="togglePassword"></div>
        </div>
        <div id="passwordField" style="${existingShare.password ? '' : 'display:none'}">
          <div class="modal-field" style="margin-top:8px;">
            <label>Password</label>
            <input type="password" id="sharePassword" value="${existingShare.password || ''}" placeholder="Enter password">
          </div>
        </div>
        <div class="share-option">
          <label>Set expiration</label>
          <div class="toggle-switch${existingShare.expiresAt ? ' on' : ''}" id="toggleExpiry"></div>
        </div>
        <div id="expiryField" style="${existingShare.expiresAt ? '' : 'display:none'}">
          <div class="modal-field" style="margin-top:8px;">
            <label>Expiration Date</label>
            <input type="date" id="shareExpiry" value="${existingShare.expiresAt ? new Date(existingShare.expiresAt).toISOString().split('T')[0] : ''}">
          </div>
        </div>
      </div>
      <div class="modal-field">
        <label>Access Log</label>
        <div style="font-size:11px; color:var(--text-dim);">${existingShare.accessLog.length === 0 ? 'No access yet' : existingShare.accessLog.map(a => formatDate(a.at) + ' - ' + a.action).join('<br>')}</div>
      </div>
      <div class="modal-actions">
        <button class="btn btn-danger" id="revokeShare">Revoke Share</button>
        <button class="btn btn-ghost" onclick="app.closeModal()">Done</button>
      </div>
    `);

    setTimeout(() => {
      document.getElementById('copyShareLink').addEventListener('click', () => {
        navigator.clipboard.writeText(shareLink).then(() => toast('Link copied!', 'success')).catch(() => toast('Copy failed', 'error'));
      });

      document.getElementById('toggleDownload').addEventListener('click', function() {
        this.classList.toggle('on');
        existingShare.permissions = this.classList.contains('on') ? 'download' : 'view';
        saveShares();
      });

      document.getElementById('togglePassword').addEventListener('click', function() {
        this.classList.toggle('on');
        document.getElementById('passwordField').style.display = this.classList.contains('on') ? '' : 'none';
        if (!this.classList.contains('on')) {
          existingShare.password = null;
          saveShares();
        }
      });

      const pwInput = document.getElementById('sharePassword');
      if (pwInput) {
        pwInput.addEventListener('change', () => {
          existingShare.password = pwInput.value || null;
          saveShares();
        });
      }

      document.getElementById('toggleExpiry').addEventListener('click', function() {
        this.classList.toggle('on');
        document.getElementById('expiryField').style.display = this.classList.contains('on') ? '' : 'none';
        if (!this.classList.contains('on')) {
          existingShare.expiresAt = null;
          saveShares();
        }
      });

      const expiryInput = document.getElementById('shareExpiry');
      if (expiryInput) {
        expiryInput.addEventListener('change', () => {
          existingShare.expiresAt = expiryInput.value ? new Date(expiryInput.value).getTime() : null;
          saveShares();
        });
      }

      document.getElementById('revokeShare').addEventListener('click', () => {
        existingShare.active = false;
        saveShares();
        closeModal();
        toast('Share revoked', 'info');
        render();
      });
    }, 50);
  });
}

function showStorageModal() {
  dbGetAll().then(allFiles => {
    const active = allFiles.filter(f => !f.trashed && f.folderId !== '__versions__');
    const trashed = allFiles.filter(f => f.trashed);
    const versions = allFiles.filter(f => f.folderId === '__versions__');

    const categories = {};
    active.forEach(f => {
      const cat = getFileCategory(f.name);
      if (!categories[cat]) categories[cat] = { count: 0, size: 0 };
      categories[cat].count++;
      categories[cat].size += f.size || 0;
    });

    const totalSize = active.reduce((s, f) => s + (f.size || 0), 0);
    const trashSize = trashed.reduce((s, f) => s + (f.size || 0), 0);
    const versionSize = versions.reduce((s, f) => s + (f.size || 0), 0);

    const catColors = { image: '#10b981', document: '#3b82f6', code: '#eab308', audio: '#a855f7', video: '#ec4899', archive: '#f97316', other: '#64748b' };

    // Build SVG pie chart
    let chartSvg = '';
    if (totalSize > 0) {
      let startAngle = 0;
      const entries = Object.entries(categories).sort((a, b) => b[1].size - a[1].size);
      entries.forEach(([cat, data]) => {
        const pct = data.size / totalSize;
        const angle = pct * 360;
        const endAngle = startAngle + angle;
        const largeArc = angle > 180 ? 1 : 0;
        const r = 50;
        const cx = 60, cy = 60;
        const x1 = cx + r * Math.cos((startAngle - 90) * Math.PI / 180);
        const y1 = cy + r * Math.sin((startAngle - 90) * Math.PI / 180);
        const x2 = cx + r * Math.cos((endAngle - 90) * Math.PI / 180);
        const y2 = cy + r * Math.sin((endAngle - 90) * Math.PI / 180);
        if (angle > 0.5) {
          chartSvg += `<path d="M ${cx} ${cy} L ${x1} ${y1} A ${r} ${r} 0 ${largeArc} 1 ${x2} ${y2} Z" fill="${catColors[cat] || '#64748b'}" opacity="0.8"/>`;
        }
        startAngle = endAngle;
      });
    } else {
      chartSvg = `<circle cx="60" cy="60" r="50" fill="var(--border)" opacity="0.5"/>`;
    }

    let legendHtml = '';
    Object.entries(categories).sort((a, b) => b[1].size - a[1].size).forEach(([cat, data]) => {
      legendHtml += `<div class="legend-item"><div class="legend-dot" style="background:${catColors[cat] || '#64748b'}"></div>${cat.charAt(0).toUpperCase() + cat.slice(1)}: ${data.count} files (${formatBytes(data.size)})</div>`;
    });

    showModal(`
      <h2>Storage Overview</h2>
      <div class="storage-chart-container">
        <div class="storage-chart">
          <svg viewBox="0 0 120 120" width="120" height="120">${chartSvg}</svg>
        </div>
        <div class="storage-legend">
          ${legendHtml || '<div style="color:var(--text-dim)">No files stored</div>'}
        </div>
      </div>
      <div style="border-top:1px solid var(--border); padding-top:12px; margin-top:8px;">
        <div class="detail-field"><label>Active Files</label><div class="value">${active.length} files &mdash; ${formatBytes(totalSize)}</div></div>
        <div class="detail-field"><label>Trash</label><div class="value">${trashed.length} files &mdash; ${formatBytes(trashSize)}</div></div>
        <div class="detail-field"><label>Version History</label><div class="value">${versions.length} versions &mdash; ${formatBytes(versionSize)}</div></div>
        <div class="detail-field"><label>Total Storage</label><div class="value" style="color:var(--cyan); font-weight:600;">${formatBytes(totalSize + trashSize + versionSize)}</div></div>
      </div>
      ${trashSize > 1024 * 1024 ? '<div style="margin-top:12px; padding:10px; border:1px solid rgba(255,102,0,0.3); border-radius:4px; font-size:11px; color:var(--orange);">Tip: Empty trash to free up ' + formatBytes(trashSize) + '</div>' : ''}
      <div class="modal-actions">
        <button class="btn btn-ghost" onclick="app.closeModal()">Close</button>
      </div>
    `);
  });
}

function showAddTagModal(fileId) {
  showModal(`
    <h2>Add Tag</h2>
    <div class="modal-field">
      <label>Tag Name</label>
      <input type="text" id="tagInput" placeholder="e.g. important, review, draft" autofocus>
    </div>
    <div class="modal-actions">
      <button class="btn btn-ghost" onclick="app.closeModal()">Cancel</button>
      <button class="btn btn-primary" id="addTagBtn">Add</button>
    </div>
  `);
  setTimeout(() => {
    const input = document.getElementById('tagInput');
    input.focus();
    input.addEventListener('keydown', (e) => {
      if (e.key === 'Enter') document.getElementById('addTagBtn').click();
    });
    document.getElementById('addTagBtn').addEventListener('click', async () => {
      const tag = input.value.trim();
      if (tag) {
        const file = await dbGet(fileId);
        if (file) {
          if (!file.tags) file.tags = [];
          if (!file.tags.includes(tag)) {
            file.tags.push(tag);
            await dbPut(file);
          }
        }
        closeModal();
        render();
      }
    });
  }, 50);
}

// ====================
// EXPORT/IMPORT
// ====================
async function exportAsZip() {
  if (typeof JSZip === 'undefined') {
    toast('JSZip library not loaded', 'error');
    return;
  }

  toast('Preparing export...', 'info');
  const zip = new JSZip();
  const allFiles = await dbGetAll();
  const active = allFiles.filter(f => !f.trashed && f.folderId !== '__versions__');

  // Build folder paths
  function getFolderPathString(folderId) {
    const path = [];
    let current = folderId;
    while (current && state.folders[current]) {
      if (current === 'root') break;
      path.unshift(state.folders[current].name);
      current = state.folders[current].parentId;
    }
    return path.join('/');
  }

  active.forEach(f => {
    const folderPath = getFolderPathString(f.folderId);
    const filePath = folderPath ? folderPath + '/' + f.name : f.name;
    zip.file(filePath, f.data);
  });

  // Add metadata
  const meta = {
    folders: state.folders,
    shares: state.shares,
    files: active.map(f => ({ id: f.id, name: f.name, folderId: f.folderId, tags: f.tags, notes: f.notes, starred: f.starred, uploadedAt: f.uploadedAt, modifiedAt: f.modifiedAt, size: f.size, type: f.type })),
    exported: Date.now(),
  };
  zip.file('__korb_metadata.json', JSON.stringify(meta, null, 2));

  try {
    const blob = await zip.generateAsync({ type: 'blob' });
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.href = url;
    a.download = 'korb-files-export-' + new Date().toISOString().split('T')[0] + '.zip';
    document.body.appendChild(a);
    a.click();
    a.remove();
    setTimeout(() => URL.revokeObjectURL(url), 10000);
    toast('Export complete!', 'success');
  } catch (err) {
    toast('Export failed: ' + err.message, 'error');
  }
}

async function importFromZip(file) {
  if (typeof JSZip === 'undefined') {
    toast('JSZip library not loaded', 'error');
    return;
  }

  toast('Importing...', 'info');
  try {
    const zip = await JSZip.loadAsync(file);

    // Check for metadata
    const metaFile = zip.file('__korb_metadata.json');
    let meta = null;
    if (metaFile) {
      const metaText = await metaFile.async('text');
      meta = JSON.parse(metaText);
    }

    // Import folders from metadata
    if (meta && meta.folders) {
      Object.entries(meta.folders).forEach(([id, folder]) => {
        if (!state.folders[id]) {
          state.folders[id] = folder;
        }
      });
      saveFolders();
    }

    // Import files
    const entries = [];
    zip.forEach((path, entry) => {
      if (!entry.dir && path !== '__korb_metadata.json') {
        entries.push({ path, entry });
      }
    });

    for (const { path, entry } of entries) {
      const data = await entry.async('arraybuffer');
      const name = path.split('/').pop();
      const ext = getFileExtension(name);
      const mimeMap = { jpg: 'image/jpeg', jpeg: 'image/jpeg', png: 'image/png', gif: 'image/gif', svg: 'image/svg+xml', pdf: 'application/pdf', json: 'application/json', txt: 'text/plain', csv: 'text/csv', html: 'text/html', css: 'text/css', js: 'application/javascript' };

      // Find metadata for this file
      let fileMeta = null;
      if (meta && meta.files) {
        fileMeta = meta.files.find(f => f.name === name);
      }

      const record = {
        id: fileMeta ? fileMeta.id : uid(),
        name,
        size: data.byteLength,
        type: mimeMap[ext] || 'application/octet-stream',
        data,
        folderId: fileMeta ? fileMeta.folderId : 'root',
        uploadedAt: fileMeta ? fileMeta.uploadedAt : Date.now(),
        modifiedAt: Date.now(),
        tags: fileMeta ? (fileMeta.tags || []) : [],
        notes: fileMeta ? (fileMeta.notes || '') : '',
        starred: fileMeta ? (fileMeta.starred || false) : false,
        trashed: false,
        versions: [],
      };
      await dbPut(record);
    }

    toast('Imported ' + entries.length + ' files', 'success');
    render();
  } catch (err) {
    toast('Import failed: ' + err.message, 'error');
    console.error(err);
  }
}

function setupEvents() {

      state.focusedFile = null;

    });

      ];
      if (fid !== 'root') {
