<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>KORB FILE SHARE | Korb Engineering</title>
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@300;400;500;600&display=swap" rel="stylesheet">
<link href="https://cdn.jsdelivr.net/npm/dseg@0.46.0/css/dseg.css" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #050a0f;
    --bg-card: #0a1018;
    --bg-card-hover: #0d1520;
    --cyan: #00d4ff;
    --cyan-dim: #006680;
    --cyan-glow: rgba(0, 212, 255, 0.15);
    --cyan-glow-strong: rgba(0, 212, 255, 0.35);
    --red: #ff3355;
    --green: #00ff88;
    --amber: #ffaa00;
    --text: #c0dce8;
    --text-dim: #5a7a8a;
    --border: #0e2030;
    --font-vfd: 'DSEG14 Classic', 'IBM Plex Mono', monospace;
    --font-mono: 'IBM Plex Mono', 'Courier New', monospace;
  }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: var(--font-mono);
    min-height: 100vh;
    position: relative;
    overflow-x: hidden;
  }

  /* Scanline overlay */
  body::after {
    content: '';
    position: fixed;
    top: 0; left: 0; right: 0; bottom: 0;
    background: repeating-linear-gradient(
      0deg,
      transparent,
      transparent 2px,
      rgba(0, 0, 0, 0.08) 2px,
      rgba(0, 0, 0, 0.08) 4px
    );
    pointer-events: none;
    z-index: 9999;
  }

  /* Subtle vignette */
  body::before {
    content: '';
    position: fixed;
    top: 0; left: 0; right: 0; bottom: 0;
    background: radial-gradient(ellipse at center, transparent 50%, rgba(0,0,0,0.6) 100%);
    pointer-events: none;
    z-index: 9998;
  }

  .container {
    max-width: 900px;
    margin: 0 auto;
    padding: 30px 20px 60px;
    position: relative;
    z-index: 1;
  }

  /* Header */
  .header {
    text-align: center;
    margin-bottom: 10px;
    padding-bottom: 20px;
    border-bottom: 1px solid var(--border);
  }

  .header-brand {
    font-family: var(--font-mono);
    font-size: 11px;
    font-weight: 300;
    letter-spacing: 6px;
    text-transform: uppercase;
    color: var(--cyan-dim);
    margin-bottom: 8px;
  }

  .header h1 {
    font-family: var(--font-vfd);
    font-size: 36px;
    font-weight: 400;
    color: var(--cyan);
    text-shadow:
      0 0 10px var(--cyan-glow-strong),
      0 0 30px var(--cyan-glow),
      0 0 60px rgba(0, 212, 255, 0.08);
    letter-spacing: 4px;
    margin-bottom: 10px;
  }

  .header .subheader {
    font-size: 12px;
    font-weight: 300;
    color: var(--text-dim);
    letter-spacing: 2px;
    text-transform: uppercase;
  }

  .header .subheader span {
    color: var(--amber);
    text-shadow: 0 0 6px rgba(255, 170, 0, 0.3);
  }

  /* Drop zone */
  .dropzone {
    border: 2px dashed var(--cyan-dim);
    border-radius: 8px;
    padding: 50px 30px;
    text-align: center;
    margin: 30px 0;
    cursor: pointer;
    transition: all 0.3s ease;
    background: rgba(0, 212, 255, 0.02);
    position: relative;
  }

  .dropzone:hover,
  .dropzone.drag-over {
    border-color: var(--cyan);
    background: var(--cyan-glow);
    box-shadow: 0 0 30px var(--cyan-glow), inset 0 0 30px rgba(0, 212, 255, 0.05);
  }

  .dropzone-icon {
    font-size: 48px;
    margin-bottom: 16px;
    opacity: 0.7;
  }

  .dropzone h2 {
    font-family: var(--font-vfd);
    font-size: 18px;
    color: var(--cyan);
    text-shadow: 0 0 8px var(--cyan-glow);
    margin-bottom: 8px;
    letter-spacing: 2px;
  }

  .dropzone p {
    font-size: 12px;
    color: var(--text-dim);
    margin-bottom: 16px;
  }

  .dropzone input[type="file"] {
    display: none;
  }

  .btn {
    font-family: var(--font-mono);
    font-size: 12px;
    font-weight: 500;
    letter-spacing: 1px;
    text-transform: uppercase;
    border: 1px solid var(--cyan-dim);
    background: transparent;
    color: var(--cyan);
    padding: 10px 24px;
    border-radius: 4px;
    cursor: pointer;
    transition: all 0.2s ease;
  }

  .btn:hover {
    background: var(--cyan-glow);
    border-color: var(--cyan);
    box-shadow: 0 0 15px var(--cyan-glow);
  }

  .btn-small {
    padding: 6px 14px;
    font-size: 10px;
  }

  .btn-red {
    border-color: rgba(255, 51, 85, 0.4);
    color: var(--red);
  }
  .btn-red:hover {
    background: rgba(255, 51, 85, 0.1);
    border-color: var(--red);
    box-shadow: 0 0 15px rgba(255, 51, 85, 0.2);
  }

  .btn-green {
    border-color: rgba(0, 255, 136, 0.4);
    color: var(--green);
  }
  .btn-green:hover {
    background: rgba(0, 255, 136, 0.1);
    border-color: var(--green);
    box-shadow: 0 0 15px rgba(0, 255, 136, 0.2);
  }

  /* File list */
  .file-list-header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 16px;
  }

  .file-list-header h3 {
    font-family: var(--font-vfd);
    font-size: 14px;
    color: var(--cyan);
    text-shadow: 0 0 6px var(--cyan-glow);
    letter-spacing: 2px;
  }

  .file-count {
    font-size: 11px;
    color: var(--text-dim);
  }

  .file-list-empty {
    text-align: center;
    padding: 40px;
    color: var(--text-dim);
    font-size: 13px;
    border: 1px solid var(--border);
    border-radius: 6px;
    background: var(--bg-card);
  }

  .file-card {
    background: var(--bg-card);
    border: 1px solid var(--border);
    border-radius: 6px;
    padding: 16px 20px;
    margin-bottom: 10px;
    transition: all 0.2s ease;
  }

  .file-card:hover {
    background: var(--bg-card-hover);
    border-color: rgba(0, 212, 255, 0.15);
  }

  .file-card-top {
    display: flex;
    justify-content: space-between;
    align-items: flex-start;
    margin-bottom: 10px;
    gap: 12px;
  }

  .file-info {
    flex: 1;
    min-width: 0;
  }

  .file-name {
    font-size: 14px;
    font-weight: 500;
    color: var(--text);
    word-break: break-all;
    margin-bottom: 4px;
  }

  .file-meta {
    font-size: 11px;
    color: var(--text-dim);
    display: flex;
    gap: 16px;
    flex-wrap: wrap;
  }

  .file-actions {
    display: flex;
    gap: 6px;
    flex-shrink: 0;
  }

  /* Countdown bar */
  .countdown-container {
    margin-top: 4px;
  }

  .countdown-bar-bg {
    height: 4px;
    background: var(--border);
    border-radius: 2px;
    overflow: hidden;
  }

  .countdown-bar {
    height: 100%;
    background: var(--cyan);
    border-radius: 2px;
    transition: width 1s linear;
    box-shadow: 0 0 6px var(--cyan-glow);
  }

  .countdown-bar.warning {
    background: var(--amber);
    box-shadow: 0 0 6px rgba(255, 170, 0, 0.3);
  }

  .countdown-bar.critical {
    background: var(--red);
    box-shadow: 0 0 6px rgba(255, 51, 85, 0.3);
  }

  .countdown-label {
    font-family: var(--font-vfd);
    font-size: 12px;
    color: var(--cyan);
    text-shadow: 0 0 4px var(--cyan-glow);
    margin-bottom: 4px;
    text-align: right;
  }

  .countdown-label.warning { color: var(--amber); text-shadow: 0 0 4px rgba(255, 170, 0, 0.3); }
  .countdown-label.critical { color: var(--red); text-shadow: 0 0 4px rgba(255, 51, 85, 0.3); }

  /* Footer */
  .footer {
    margin-top: 40px;
    padding-top: 20px;
    border-top: 1px solid var(--border);
    display: flex;
    justify-content: space-between;
    align-items: center;
    flex-wrap: wrap;
    gap: 12px;
  }

  .storage-info {
    font-size: 12px;
    color: var(--text-dim);
  }

  .storage-info span {
    color: var(--cyan);
    font-weight: 500;
  }

  .footer-brand {
    font-size: 10px;
    color: var(--text-dim);
    letter-spacing: 2px;
    text-transform: uppercase;
  }

  /* Toast notifications */
  .toast-container {
    position: fixed;
    top: 20px;
    right: 20px;
    z-index: 10000;
    display: flex;
    flex-direction: column;
    gap: 8px;
  }

  .toast {
    font-family: var(--font-mono);
    font-size: 12px;
    padding: 12px 20px;
    border-radius: 4px;
    background: var(--bg-card);
    border: 1px solid var(--border);
    color: var(--text);
    box-shadow: 0 4px 20px rgba(0, 0, 0, 0.5);
    animation: toast-in 0.3s ease;
    max-width: 360px;
  }

  .toast.success {
    border-color: rgba(0, 255, 136, 0.4);
    color: var(--green);
  }
  .toast.error {
    border-color: rgba(255, 51, 85, 0.4);
    color: var(--red);
  }
  .toast.info {
    border-color: rgba(0, 212, 255, 0.4);
    color: var(--cyan);
  }
  .toast.warning {
    border-color: rgba(255, 170, 0, 0.4);
    color: var(--amber);
  }

  .toast-exit {
    animation: toast-out 0.3s ease forwards;
  }

  @keyframes toast-in {
    from { opacity: 0; transform: translateX(40px); }
    to { opacity: 1; transform: translateX(0); }
  }
  @keyframes toast-out {
    from { opacity: 1; transform: translateX(0); }
    to { opacity: 0; transform: translateX(40px); }
  }

  /* Responsive */
  @media (max-width: 600px) {
    .header h1 { font-size: 22px; }
    .dropzone { padding: 30px 16px; }
    .file-card-top { flex-direction: column; }
    .file-actions { align-self: flex-end; }
  }
</style>
</head>
<body>

<div class="container">
  <header class="header">
    <div class="header-brand">Korb Engineering</div>
    <h1>KORB FILE SHARE</h1>
    <p class="subheader">Files auto-delete after <span>60 minutes</span></p>
    <p class="subheader" style="margin-top:6px; font-size:11px; color:var(--amber); letter-spacing:1px;">Files are stored locally on this device only</p>
  </header>

  <div class="dropzone" id="dropzone">
    <div class="dropzone-icon">&#x1F4C1;</div>
    <h2>DROP FILES HERE</h2>
    <p>or click to browse &mdash; max 100 MB per file</p>
    <button class="btn" id="browseBtn">SELECT FILES</button>
    <input type="file" id="fileInput" multiple>
  </div>

  <div id="fileListSection" style="display:none;">
    <div class="file-list-header">
      <h3>ACTIVE FILES</h3>
      <span class="file-count" id="fileCount"></span>
    </div>
    <div id="fileList"></div>
  </div>

  <footer class="footer">
    <div class="storage-info">
      Storage used: <span id="storageUsed">0 B</span>
    </div>
    <div class="footer-brand">&copy; Korb Engineering 2026</div>
  </footer>
</div>

<div class="toast-container" id="toastContainer"></div>

<script>
(function() {
  'use strict';

  const DB_NAME = 'KorbFileShare';
  const DB_VERSION = 1;
  const STORE_NAME = 'files';
  const MAX_FILE_SIZE = 100 * 1024 * 1024; // 100 MB
  const EXPIRY_MS = 60 * 60 * 1000; // 1 hour
  const CLEANUP_INTERVAL = 30 * 1000; // 30 seconds

  let db = null;

  // ---- IndexedDB ----
  function openDB() {
    return new Promise((resolve, reject) => {
      const req = indexedDB.open(DB_NAME, DB_VERSION);
      req.onupgradeneeded = (e) => {
        const d = e.target.result;
        if (!d.objectStoreNames.contains(STORE_NAME)) {
          d.createObjectStore(STORE_NAME, { keyPath: 'id' });
        }
      };
      req.onsuccess = (e) => { db = e.target.result; resolve(db); };
      req.onerror = (e) => reject(e.target.error);
    });
  }

  function dbPut(record) {
    return new Promise((resolve, reject) => {
      const tx = db.transaction(STORE_NAME, 'readwrite');
      const store = tx.objectStore(STORE_NAME);
      const req = store.put(record);
      req.onsuccess = () => resolve();
      req.onerror = (e) => reject(e.target.error);
    });
  }

  function dbDelete(id) {
    return new Promise((resolve, reject) => {
      const tx = db.transaction(STORE_NAME, 'readwrite');
      const store = tx.objectStore(STORE_NAME);
      const req = store.delete(id);
      req.onsuccess = () => resolve();
      req.onerror = (e) => reject(e.target.error);
    });
  }

  function dbGetAll() {
    return new Promise((resolve, reject) => {
      const tx = db.transaction(STORE_NAME, 'readonly');
      const store = tx.objectStore(STORE_NAME);
      const req = store.getAll();
      req.onsuccess = () => resolve(req.result || []);
      req.onerror = (e) => reject(e.target.error);
    });
  }

  function dbGet(id) {
    return new Promise((resolve, reject) => {
      const tx = db.transaction(STORE_NAME, 'readonly');
      const store = tx.objectStore(STORE_NAME);
      const req = store.get(id);
      req.onsuccess = () => resolve(req.result);
      req.onerror = (e) => reject(e.target.error);
    });
  }

  // ---- Utils ----
  function generateId() {
    return Date.now().toString(36) + Math.random().toString(36).slice(2, 8);
  }

  function formatBytes(bytes) {
    if (bytes === 0) return '0 B';
    const k = 1024;
    const sizes = ['B', 'KB', 'MB', 'GB'];
    const i = Math.floor(Math.log(bytes) / Math.log(k));
    return parseFloat((bytes / Math.pow(k, i)).toFixed(1)) + ' ' + sizes[i];
  }

  function formatTime(ms) {
    if (ms <= 0) return '00:00';
    const totalSec = Math.ceil(ms / 1000);
    const m = Math.floor(totalSec / 60);
    const s = totalSec % 60;
    return String(m).padStart(2, '0') + ':' + String(s).padStart(2, '0');
  }

  // ---- Toasts ----
  function showToast(message, type = 'info', duration = 4000) {
    const container = document.getElementById('toastContainer');
    const toast = document.createElement('div');
    toast.className = 'toast ' + type;
    toast.textContent = message;
    container.appendChild(toast);
    setTimeout(() => {
      toast.classList.add('toast-exit');
      setTimeout(() => toast.remove(), 300);
    }, duration);
  }

  // ---- File Upload ----
  async function handleFiles(fileList) {
    for (const file of fileList) {
      if (file.size > MAX_FILE_SIZE) {
        showToast('File too large: ' + file.name + ' (' + formatBytes(file.size) + '). Max 100 MB.', 'error');
        continue;
      }
      try {
        const buffer = await file.arrayBuffer();
        const record = {
          id: generateId(),
          name: file.name,
          size: file.size,
          type: file.type || 'application/octet-stream',
          data: buffer,
          uploadedAt: Date.now(),
          expiresAt: Date.now() + EXPIRY_MS,
        };
        await dbPut(record);
        showToast('Uploaded: ' + file.name, 'success');
      } catch (err) {
        showToast('Upload failed: ' + file.name, 'error');
        console.error(err);
      }
    }
    renderFileList();
  }

  // ---- Download / Share ----
  function downloadFile(record) {
    const blob = new Blob([record.data], { type: record.type });
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.href = url;
    a.download = record.name;
    document.body.appendChild(a);
    a.click();
    document.body.removeChild(a);
    setTimeout(() => URL.revokeObjectURL(url), 5000);
  }

  async function shareOrCopyLink(record) {
    const blob = new Blob([record.data], { type: record.type });
    const file = new File([blob], record.name, { type: record.type });

    // For small files, try the Web Share API (real sharing on mobile: AirDrop, Messages, email, etc.)
    const SHARE_SIZE_LIMIT = 5 * 1024 * 1024; // 5 MB
    if (record.size <= SHARE_SIZE_LIMIT && navigator.canShare && navigator.canShare({ files: [file] })) {
      try {
        await navigator.share({ files: [file], title: record.name });
        showToast('File shared successfully', 'success');
        return;
      } catch (err) {
        if (err.name === 'AbortError') return; // user cancelled
        // Fall through to clipboard copy
      }
    }

    // Fallback: copy a blob URL to clipboard (local session only)
    const url = URL.createObjectURL(blob);
    navigator.clipboard.writeText(url).then(() => {
      showToast('Local link copied (valid this browser session only)', 'warning');
    }).catch(() => {
      showToast('Failed to copy link', 'error');
    });
  }

  // ---- Render ----
  async function renderFileList() {
    const files = await dbGetAll();
    const section = document.getElementById('fileListSection');
    const list = document.getElementById('fileList');
    const countEl = document.getElementById('fileCount');
    const storageEl = document.getElementById('storageUsed');

    // Filter out expired (they'll be cleaned up)
    const now = Date.now();
    const active = files.filter(f => f.expiresAt > now);

    let totalSize = 0;
    active.forEach(f => totalSize += f.size);
    storageEl.textContent = formatBytes(totalSize);

    if (active.length === 0) {
      section.style.display = 'none';
      list.innerHTML = '';
      countEl.textContent = '';
      return;
    }

    section.style.display = 'block';
    countEl.textContent = active.length + ' file' + (active.length !== 1 ? 's' : '');

    // Sort newest first
    active.sort((a, b) => b.uploadedAt - a.uploadedAt);

    list.innerHTML = active.map(f => {
      const remaining = f.expiresAt - now;
      const pct = Math.max(0, (remaining / EXPIRY_MS) * 100);
      let cls = '';
      if (pct < 15) cls = 'critical';
      else if (pct < 40) cls = 'warning';
      return `
        <div class="file-card" data-id="${f.id}">
          <div class="file-card-top">
            <div class="file-info">
              <div class="file-name">${escapeHtml(f.name)}</div>
              <div class="file-meta">
                <span>${formatBytes(f.size)}</span>
                <span>${f.type}</span>
              </div>
            </div>
            <div class="file-actions">
              <button class="btn btn-small btn-green" onclick="app.share('${f.id}')" title="Share file or copy local link">COPY LINK</button>
              <button class="btn btn-small" onclick="app.download('${f.id}')" title="Download file">DOWNLOAD</button>
              <button class="btn btn-small btn-red" onclick="app.remove('${f.id}')" title="Delete file">DELETE</button>
            </div>
          </div>
          <div class="countdown-container">
            <div class="countdown-label ${cls}">${formatTime(remaining)}</div>
            <div class="countdown-bar-bg">
              <div class="countdown-bar ${cls}" style="width:${pct}%"></div>
            </div>
          </div>
        </div>
      `;
    }).join('');
  }

  function escapeHtml(str) {
    const d = document.createElement('div');
    d.textContent = str;
    return d.innerHTML;
  }

  // ---- Cleanup ----
  async function cleanup() {
    const files = await dbGetAll();
    const now = Date.now();
    let removed = 0;
    for (const f of files) {
      if (f.expiresAt <= now) {
        await dbDelete(f.id);
        removed++;
      }
    }
    if (removed > 0) {
      showToast(removed + ' expired file' + (removed > 1 ? 's' : '') + ' removed', 'info');
    }
    renderFileList();
  }

  // ---- Event Binding ----
  function init() {
    const dropzone = document.getElementById('dropzone');
    const fileInput = document.getElementById('fileInput');
    const browseBtn = document.getElementById('browseBtn');

    browseBtn.addEventListener('click', (e) => {
      e.stopPropagation();
      fileInput.click();
    });

    dropzone.addEventListener('click', () => fileInput.click());

    fileInput.addEventListener('change', (e) => {
      if (e.target.files.length) handleFiles(e.target.files);
      e.target.value = '';
    });

    dropzone.addEventListener('dragover', (e) => {
      e.preventDefault();
      dropzone.classList.add('drag-over');
    });

    dropzone.addEventListener('dragleave', (e) => {
      e.preventDefault();
      dropzone.classList.remove('drag-over');
    });

    dropzone.addEventListener('drop', (e) => {
      e.preventDefault();
      dropzone.classList.remove('drag-over');
      if (e.dataTransfer.files.length) handleFiles(e.dataTransfer.files);
    });

    // Refresh countdown timers every 15 seconds (files re-render on upload/delete already)
    setInterval(renderFileList, 15000);

    // Cleanup every 30 seconds
    setInterval(cleanup, CLEANUP_INTERVAL);

    renderFileList();
  }

  // ---- Public API for inline handlers ----
  window.app = {
    download: async function(id) {
      const record = await dbGet(id);
      if (record) downloadFile(record);
      else showToast('File not found', 'error');
    },
    share: async function(id) {
      const record = await dbGet(id);
      if (record) shareOrCopyLink(record);
      else showToast('File not found', 'error');
    },
    remove: async function(id) {
      await dbDelete(id);
      showToast('File deleted', 'info');
      renderFileList();
    }
  };

  // Boot
  openDB().then(init).catch(err => {
    console.error('IndexedDB failed:', err);
    showToast('Storage unavailable. Check browser settings.', 'error');
  });

})();
</script>

</body>
</html>
