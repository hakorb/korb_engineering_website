        items.push({ label: 'Delete Folder', action: 'delete-folder', danger: true, icon: '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="3 6 5 6 21 6"/><path d="M19 6v14a2 2 0 01-2 2H7a2 2 0 01-2-2V6m3 0V4a2 2 0 012-2h4a2 2 0 012 2v2"/></svg>' });
      }
      contextTarget = { type: 'folder', id: fid };
      showContextMenu(e.clientX, e.clientY, items);
    }
  });

  // Breadcrumb clicks
  document.getElementById('breadcrumbBar').addEventListener('click', (e) => {
    const bc = e.target.closest('[data-breadcrumb]');
    if (bc && !bc.classList.contains('current')) {
      state.currentFolder = bc.dataset.breadcrumb;
      state.currentNav = 'my-files';
      state.selectedFiles.clear();
      state.focusedFile = null;
      render();
    }
  });

  // File content clicks (delegated)
  document.getElementById('fileContent').addEventListener('click', (e) => {
    // Filter chips
    const chip = e.target.closest('[data-filter]');
    if (chip) {
      state.filterType = chip.dataset.filter;
      render();
      return;
    }

    // Checkboxes
    const check = e.target.closest('[data-check]');
    if (check) {
      e.stopPropagation();
      const id = check.dataset.check;
      if (state.selectedFiles.has(id)) {
        state.selectedFiles.delete(id);
      } else {
        state.selectedFiles.add(id);
      }
      render();
      return;
    }

    // Stars
    const star = e.target.closest('[data-star]');
    if (star) {
      e.stopPropagation();
      toggleStar(star.dataset.star);
      return;
    }

    // Sort columns
    const sortTh = e.target.closest('[data-sort]');
    if (sortTh) {
      const field = sortTh.dataset.sort;
      if (state.sortField === field) {
        state.sortAsc = !state.sortAsc;
      } else {
        state.sortField = field;
        state.sortAsc = true;
      }
      render();
      return;
    }

    // Select all
    const selectAll = e.target.closest('#selectAllCheck');
    if (selectAll) {
      // Toggle all
      if (state.selectedFiles.size > 0) {
        state.selectedFiles.clear();
      } else {
        document.querySelectorAll('[data-file-id]').forEach(el => {
          state.selectedFiles.add(el.dataset.fileId);
        });
      }
      render();
      return;
    }

    // Folder click
    const folderItem = e.target.closest('[data-folder-id]');
    if (folderItem && !e.target.closest('[data-check]')) {
      state.currentFolder = folderItem.dataset.folderId;
      state.currentNav = 'my-files';
      state.selectedFiles.clear();
      state.focusedFile = null;
      render();
      return;
    }

    // File click
    const fileItem = e.target.closest('[data-file-id]');
    if (fileItem && !e.target.closest('[data-check]') && !e.target.closest('[data-star]')) {
      const fileId = fileItem.dataset.fileId;
      state.focusedFile = fileId;
      trackRecent(fileId);
      if (!state.detailOpen) {
        state.detailOpen = true;
        document.getElementById('detailPanel').classList.add('open');
      }
      updateDetailPanel();

      // Update selection visual
      document.querySelectorAll('[data-file-id]').forEach(el => el.classList.remove('selected'));
      fileItem.classList.add('selected');
      return;
    }
  });

  // Double click for file preview / folder open
  document.getElementById('fileContent').addEventListener('dblclick', (e) => {
    const folderItem = e.target.closest('[data-folder-id]');
    if (folderItem) return; // Already handled by click

    const fileItem = e.target.closest('[data-file-id]');
    if (fileItem) {
      const fileId = fileItem.dataset.fileId;
      dbGet(fileId).then(file => {
        if (!file) return;
        const cat = getFileCategory(file.name);
        if (cat === 'image') {
          viewImage(fileId);
        } else {
          downloadFile(fileId);
        }
      });
    }
  });

  // Right-click context menu on files
  document.getElementById('fileContent').addEventListener('contextmenu', (e) => {
    const fileItem = e.target.closest('[data-file-id]');
    const folderItem = e.target.closest('[data-folder-id]');

    if (fileItem) {
      e.preventDefault();
      const fileId = fileItem.dataset.fileId;
      state.focusedFile = fileId;

      dbGet(fileId).then(file => {
        if (!file) return;
        let items = [];
        if (file.trashed) {
          items = [
            { label: 'Restore', action: 'restore' },
            { separator: true },
            { label: 'Delete Permanently', action: 'perm-delete', danger: true },
          ];
        } else {
          items = [
            { label: 'Open / Preview', action: 'preview', shortcut: 'Enter' },
            { label: 'Download', action: 'download' },
            { separator: true },
            { label: 'Share', action: 'share' },
            { label: 'Rename', action: 'rename', shortcut: 'F2' },
            { label: 'Move to...', action: 'move' },
            { label: 'Copy to...', action: 'copy-to' },
            { separator: true },
            { label: file.starred ? 'Remove from Favorites' : 'Add to Favorites', action: 'toggle-star' },
            { separator: true },
            { label: 'Move to Trash', action: 'trash', danger: true, shortcut: 'Del' },
          ];
        }
        contextTarget = { type: 'file', id: fileId };
        showContextMenu(e.clientX, e.clientY, items);
      });
    } else if (folderItem) {
      e.preventDefault();
      const fid = folderItem.dataset.folderId;
      const items = [
        { label: 'Open', action: 'open-folder' },
        { label: 'Rename Folder', action: 'rename-folder' },
        { separator: true },
        { label: 'Delete Folder', action: 'delete-folder', danger: true },
      ];
      contextTarget = { type: 'folder', id: fid };
      showContextMenu(e.clientX, e.clientY, items);
    }
  });

  // Context menu action handler
  let contextTarget = null;
  document.getElementById('contextMenu').addEventListener('click', async (e) => {
    const item = e.target.closest('[data-action]');
    if (!item || !contextTarget) return;
    const action = item.dataset.action;
    hideContextMenu();

    if (contextTarget.type === 'file') {
      const fid = contextTarget.id;
      switch (action) {
        case 'preview':
          const f = await dbGet(fid);
          if (f && getFileCategory(f.name) === 'image') viewImage(fid);
          else downloadFile(fid);
          break;
        case 'download': downloadFile(fid); break;
        case 'share': showShareModal(fid); break;
        case 'rename': showRenameModal(fid); break;
        case 'move': showMoveModal([fid]); break;
        case 'copy-to': showMoveModal([fid]); break; // reuse modal, but copy
        case 'toggle-star': toggleStar(fid); break;
        case 'trash': trashFiles([fid]); break;
        case 'restore': restoreFromTrash([fid]); break;
        case 'perm-delete': permanentDelete([fid]); break;
      }
    } else if (contextTarget.type === 'folder') {
      const fid = contextTarget.id;
      switch (action) {
        case 'open-folder':
          state.currentFolder = fid;
          state.currentNav = 'my-files';
          state.selectedFiles.clear();
          render();
          break;
        case 'new-subfolder':
          state.currentFolder = fid;
          showNewFolderModal();
          break;
        case 'rename-folder':
          showRenameFolderModal(fid);
          break;
        case 'delete-folder':
          if (confirm('Delete this folder and all contents?')) {
            const deletedIds = deleteFolder(fid);
            // Trash all files in deleted folders
            if (deletedIds) {
              const allFiles = await dbGetAll();
              const toTrash = allFiles.filter(f => deletedIds.includes(f.folderId));
              for (const f of toTrash) {
                f.trashed = true;
                f.trashedAt = Date.now();
                f.originalFolder = f.folderId;
                f.folderId = '__trash__';
                await dbPut(f);
              }
            }
            if (state.currentFolder === fid || (deletedIds && deletedIds.includes(state.currentFolder))) {
              state.currentFolder = 'root';
            }
            toast('Folder deleted', 'info');
            render();
          }
          break;
      }
    }
    contextTarget = null;
  });

  // Hide context menu on click elsewhere
  document.addEventListener('click', () => hideContextMenu());
  document.addEventListener('keydown', (e) => { if (e.key === 'Escape') { hideContextMenu(); closeModal(); closeImageViewer(); } });

  // Command bar buttons
  document.getElementById('cmdNewFolder').addEventListener('click', showNewFolderModal);
  document.getElementById('cmdUpload').addEventListener('click', () => document.getElementById('fileInput').click());
  document.getElementById('cmdDownload').addEventListener('click', () => {
    state.selectedFiles.forEach(id => downloadFile(id));
  });
  document.getElementById('cmdShare').addEventListener('click', () => {
    if (state.selectedFiles.size === 1) {
      showShareModal([...state.selectedFiles][0]);
    } else if (state.focusedFile) {
      showShareModal(state.focusedFile);
    } else {
      toast('Select a file to share', 'info');
    }
  });
  document.getElementById('cmdMove').addEventListener('click', () => {
    const ids = state.selectedFiles.size > 0 ? [...state.selectedFiles] : (state.focusedFile ? [state.focusedFile] : []);
    if (ids.length === 0) { toast('Select files to move', 'info'); return; }
    showMoveModal(ids);
  });
  document.getElementById('cmdCopy').addEventListener('click', () => {
    const ids = state.selectedFiles.size > 0 ? [...state.selectedFiles] : (state.focusedFile ? [state.focusedFile] : []);
    if (ids.length === 0) { toast('Select files to copy', 'info'); return; }
    state.clipboard = { action: 'copy', ids };
    toast(ids.length + ' file(s) copied to clipboard', 'info');
  });
  document.getElementById('cmdDelete').addEventListener('click', () => {
    const ids = state.selectedFiles.size > 0 ? [...state.selectedFiles] : (state.focusedFile ? [state.focusedFile] : []);
    if (ids.length === 0) { toast('Select files to delete', 'info'); return; }
    if (state.currentNav === 'trash') {
      permanentDelete(ids);
    } else {
      trashFiles(ids);
    }
  });
  document.getElementById('cmdExport').addEventListener('click', exportAsZip);
  document.getElementById('cmdImport').addEventListener('click', () => document.getElementById('zipInput').click());

  // View toggle
  document.getElementById('btnToggleView').addEventListener('click', () => {
    state.viewMode = state.viewMode === 'grid' ? 'list' : 'grid';
    render();
  });

  // Detail panel toggle
  document.getElementById('btnToggleDetail').addEventListener('click', () => {
    state.detailOpen = !state.detailOpen;
    document.getElementById('detailPanel').classList.toggle('open', state.detailOpen);
    saveState();
  });
  document.getElementById('detailClose').addEventListener('click', () => {
    state.detailOpen = false;
    document.getElementById('detailPanel').classList.remove('open');
    saveState();
  });

  // Storage modal
  document.getElementById('btnStorage').addEventListener('click', showStorageModal);

  // File input
  document.getElementById('fileInput').addEventListener('change', (e) => {
    if (e.target.files.length) uploadFiles(e.target.files);
    e.target.value = '';
  });

  // ZIP import
  document.getElementById('zipInput').addEventListener('change', (e) => {
    if (e.target.files.length) importFromZip(e.target.files[0]);
    e.target.value = '';
  });

  // Search
  let searchDebounce;
  document.getElementById('searchInput').addEventListener('input', (e) => {
    clearTimeout(searchDebounce);
    searchDebounce = setTimeout(() => {
      state.searchQuery = e.target.value.trim();
      render();
    }, 250);
  });

  // Global drag and drop
  let dragCounter = 0;
  document.addEventListener('dragenter', (e) => {
    e.preventDefault();
    dragCounter++;
    if (e.dataTransfer.types.includes('Files')) {
      document.getElementById('dropOverlay').classList.add('visible');
    }
  });
  document.addEventListener('dragover', (e) => e.preventDefault());
  document.addEventListener('dragleave', (e) => {
    e.preventDefault();
    dragCounter--;
    if (dragCounter <= 0) {
      dragCounter = 0;
      document.getElementById('dropOverlay').classList.remove('visible');
    }
  });
  document.addEventListener('drop', (e) => {
    e.preventDefault();
    dragCounter = 0;
    document.getElementById('dropOverlay').classList.remove('visible');
    if (e.dataTransfer.files.length) {
      uploadFiles(e.dataTransfer.files);
    }
  });

  // Internal drag and drop (file to folder in tree)
  document.getElementById('folderTree').addEventListener('dragover', (e) => {
    const row = e.target.closest('[data-folder]');
    if (row) {
      e.preventDefault();
      row.classList.add('drop-target');
    }
  });
  document.getElementById('folderTree').addEventListener('dragleave', (e) => {
    const row = e.target.closest('[data-folder]');
    if (row) row.classList.remove('drop-target');
  });
  document.getElementById('folderTree').addEventListener('drop', (e) => {
    e.preventDefault();
    e.stopPropagation();
    const row = e.target.closest('[data-folder]');
    if (row) {
      row.classList.remove('drop-target');
      const targetFolder = row.dataset.folder;
      // Check if dragging external files
      if (e.dataTransfer.files.length) {
        uploadFiles(e.dataTransfer.files, targetFolder);
        return;
      }
      // Internal file move
      const draggedId = e.dataTransfer.getData('text/plain');
      if (draggedId) {
        const ids = state.selectedFiles.size > 0 && state.selectedFiles.has(draggedId)
          ? [...state.selectedFiles]
          : [draggedId];
        moveFiles(ids, targetFolder);
      }
    }
    dragCounter = 0;
    document.getElementById('dropOverlay').classList.remove('visible');
  });

  // Drag start on file items (delegated)
  document.getElementById('fileContent').addEventListener('dragstart', (e) => {
    const fileItem = e.target.closest('[data-file-id]');
    if (fileItem) {
      const fileId = fileItem.dataset.fileId;
      e.dataTransfer.setData('text/plain', fileId);
      e.dataTransfer.effectAllowed = 'move';
      fileItem.classList.add('dragging');
      setTimeout(() => fileItem.classList.remove('dragging'), 0);
    }
  });

  // Detail panel delegated events
  document.getElementById('detailBody').addEventListener('click', (e) => {
    // Remove tag
    const removeTag = e.target.closest('[data-remove-tag]');
    if (removeTag) {
      const tag = removeTag.dataset.removeTag;
      const fileId = removeTag.dataset.fileId;
      dbGet(fileId).then(file => {
        if (file) {
          file.tags = (file.tags || []).filter(t => t !== tag);
          dbPut(file).then(() => render());
        }
      });
      return;
    }

    // Add tag
    const addTag = e.target.closest('[data-add-tag]');
    if (addTag) {
      showAddTagModal(addTag.dataset.addTag);
      return;
    }

    // Toggle star
    const toggleStarEl = e.target.closest('[data-toggle-star]');
    if (toggleStarEl) {
      toggleStar(toggleStarEl.dataset.toggleStar);
      return;
    }

    // Restore version
    const restoreVer = e.target.closest('[data-restore-version]');
    if (restoreVer) {
      const versionDataId = restoreVer.dataset.restoreVersion;
      const fileId = restoreVer.dataset.fileId;
      dbGet(versionDataId).then(versionRecord => {
        if (versionRecord) {
          dbGet(fileId).then(async file => {
            if (file) {
              file.data = versionRecord.data;
              file.size = versionRecord.size;
              file.modifiedAt = Date.now();
              await dbPut(file);
              toast('Version restored', 'success');
              render();
            }
          });
        }
      });
      return;
    }
  });

  // Keyboard shortcuts
  document.addEventListener('keydown', (e) => {
    // Don't trigger shortcuts when typing in inputs
    if (e.target.tagName === 'INPUT' || e.target.tagName === 'TEXTAREA' || e.target.tagName === 'SELECT') return;

    const ctrl = e.ctrlKey || e.metaKey;

    if (ctrl && e.key === 'n') {
      e.preventDefault();
      showNewFolderModal();
    }
    if (ctrl && e.key === 'u') {
      e.preventDefault();
      document.getElementById('fileInput').click();
    }
    if (e.key === 'Delete' || e.key === 'Backspace') {
      if (e.key === 'Backspace' && !ctrl) {
        // Go up one folder
        const current = state.folders[state.currentFolder];
        if (current && current.parentId) {
          state.currentFolder = current.parentId;
          state.selectedFiles.clear();
          render();
        }
        return;
      }
      const ids = state.selectedFiles.size > 0 ? [...state.selectedFiles] : (state.focusedFile ? [state.focusedFile] : []);
      if (ids.length > 0) {
        e.preventDefault();
        if (state.currentNav === 'trash') permanentDelete(ids);
        else trashFiles(ids);
      }
    }
    if (ctrl && e.key === 'a') {
      e.preventDefault();
      document.querySelectorAll('[data-file-id]').forEach(el => {
        state.selectedFiles.add(el.dataset.fileId);
      });
      render();
    }
    if (ctrl && e.key === 'c') {
      const ids = state.selectedFiles.size > 0 ? [...state.selectedFiles] : (state.focusedFile ? [state.focusedFile] : []);
      if (ids.length > 0) {
        e.preventDefault();
        state.clipboard = { action: 'copy', ids };
        toast(ids.length + ' file(s) copied', 'info');
      }
    }
    if (ctrl && e.key === 'x') {
      const ids = state.selectedFiles.size > 0 ? [...state.selectedFiles] : (state.focusedFile ? [state.focusedFile] : []);
      if (ids.length > 0) {
        e.preventDefault();
        state.clipboard = { action: 'cut', ids };
        toast(ids.length + ' file(s) cut', 'info');
      }
    }
    if (ctrl && e.key === 'v') {
      if (state.clipboard) {
        e.preventDefault();
        if (state.clipboard.action === 'copy') {
          copyFiles(state.clipboard.ids, state.currentFolder);
        } else {
          moveFiles(state.clipboard.ids, state.currentFolder);
          state.clipboard = null;
        }
      }
    }
    if (e.key === 'F2') {
      if (state.focusedFile) {
        e.preventDefault();
        showRenameModal(state.focusedFile);
      }
    }
    if (e.key === 'Enter') {
      if (state.focusedFile) {
        e.preventDefault();
        dbGet(state.focusedFile).then(f => {
          if (f && getFileCategory(f.name) === 'image') viewImage(state.focusedFile);
          else if (f) downloadFile(state.focusedFile);
        });
      }
    }
  });

  // Image viewer
  document.getElementById('imageViewer').addEventListener('click', closeImageViewer);
  document.getElementById('closeViewer').addEventListener('click', (e) => {
    e.stopPropagation();
    closeImageViewer();
  });
}

// ====================
// IMAGE VIEWER
// ====================
async function viewImage(fileId) {
  const file = await dbGet(fileId);
  if (!file || !file.data) return;
  const blob = new Blob([file.data], { type: file.type });
  const url = URL.createObjectURL(blob);
  document.getElementById('viewerImg').src = url;
  document.getElementById('imageViewer').classList.add('visible');
}

function closeImageViewer() {
  const viewer = document.getElementById('imageViewer');
  viewer.classList.remove('visible');
  document.getElementById('viewerImg').src = '';
}

// ====================
// PUBLIC API
// ====================
window.app = {
  download: downloadFile,
  trash: trashFiles,
  restore: restoreFromTrash,
  permDelete: permanentDelete,
  emptyTrash,
  showShareModal,
  showRenameModal,
  closeModal,
  viewImage,
  toggleStar,
};

// ====================
// INIT
// ====================
async function init() {
  loadState();
  setupEvents();

  if (state.detailOpen) {
    document.getElementById('detailPanel').classList.add('open');
  }

  await render();
}

openDB().then(init).catch(err => {
  console.error('IndexedDB error:', err);
  toast('Storage unavailable - check browser settings', 'error');
});

})();
</script>
