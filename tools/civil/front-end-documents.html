<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Front End Documents | Korb Engineering</title>
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{--bg:#050a0f;--bg1:#0a1018;--bg2:#0f1620;--card:#111a24;--border:#1a2a3a;--accent:#00d4ff;--gold:#f0a500;--green:#00ff88;--red:#ff3344;--text:#e2e8f0;--dim:rgba(226,232,240,0.45);--muted:rgba(226,232,240,0.25);--font:'JetBrains Mono',monospace}
body{background:var(--bg);color:var(--text);font-family:var(--font);min-height:100vh;font-size:13px}
input,select,textarea{background:var(--bg2);border:1px solid var(--border);color:var(--text);font-family:var(--font);font-size:16px;padding:7px 10px;border-radius:4px;width:100%;outline:none;min-height:44px}
input:focus,select:focus,textarea:focus{border-color:var(--accent)}
textarea{resize:vertical;min-height:60px}
select{cursor:pointer}
button{font-family:var(--font);cursor:pointer;font-size:11px;letter-spacing:0.05em;min-height:44px}
label{display:block;font-size:10px;color:var(--dim);text-transform:uppercase;letter-spacing:0.1em;margin-bottom:4px}
.header{height:52px;background:linear-gradient(180deg,var(--bg2),var(--bg1));border-bottom:1px solid var(--border);display:flex;align-items:center;padding:0 20px;gap:14;position:sticky;top:0;z-index:100}
.header-title{font-size:15px;font-weight:700;color:var(--accent);letter-spacing:0.12em}
.header-sub{font-size:10px;color:var(--dim);letter-spacing:0.15em;text-transform:uppercase;margin-left:8px}
.tabs{display:flex;gap:0;padding:0 20px;border-bottom:1px solid var(--border);overflow-x:auto;background:var(--bg1)}
.tab{padding:10px 18px;background:transparent;border:none;border-bottom:2px solid transparent;color:var(--dim);font-size:10px;letter-spacing:0.1em;text-transform:uppercase;white-space:nowrap;transition:all .2s}
.tab.active{color:var(--accent);border-bottom-color:var(--accent);background:var(--bg2)}
.tab:hover{color:var(--text)}
.body{padding:20px;max-width:1200px;margin:0 auto}
.card{background:var(--card);border:1px solid var(--border);border-radius:6px;padding:20px;margin-bottom:16px}
.card-title{font-size:11px;color:var(--accent);letter-spacing:0.1em;text-transform:uppercase;margin-bottom:14px}
.grid2{display:grid;grid-template-columns:1fr 1fr;gap:12px}
.grid3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:12px}
.grid4{display:grid;grid-template-columns:1fr 1fr 1fr 1fr;gap:12px}
.field{margin-bottom:10px}
.btn{padding:6px 16px;border:1px solid var(--border);border-radius:4px;background:transparent;color:var(--dim);text-transform:uppercase;transition:all .2s}
.btn:hover{border-color:var(--accent);color:var(--accent)}
.btn-primary{border-color:var(--accent);color:var(--accent)}
.btn-gold{border-color:var(--gold);color:var(--gold)}
.btn-green{border-color:var(--green);color:var(--green)}
.btn-red{border-color:var(--red);color:var(--red)}
.check-row{display:flex;align-items:center;gap:8px;margin-bottom:8px}
.check-row input[type=checkbox]{width:auto;accent-color:var(--accent)}
.doc-list{display:grid;grid-template-columns:1fr 1fr;gap:8px}
.doc-item{background:var(--bg2);border:1px solid var(--border);border-radius:4px;padding:10px 14px;cursor:pointer;transition:all .2s;display:flex;justify-content:space-between;align-items:center}
.doc-item:hover{border-color:var(--accent)}
.doc-item.selected{border-color:var(--gold);background:rgba(240,165,0,0.08)}
.doc-division{font-size:10px;color:var(--gold);letter-spacing:0.05em}
.doc-title{font-size:11px;color:var(--text);margin-top:2px}
.preview{background:#fff;color:#000;padding:40px;border-radius:4px;font-family:'Times New Roman',serif;font-size:13px;line-height:1.7;max-height:70vh;overflow-y:auto}
.preview h2{text-align:center;font-size:18px;margin-bottom:4px}
.preview h3{text-align:center;font-size:15px;margin-bottom:4px;font-weight:400}
.preview h4{font-size:14px;margin:16px 0 8px;text-transform:uppercase}
.preview p{margin-bottom:8px}
.preview ol,.preview ul{margin:8px 0 8px 24px}
.preview li{margin-bottom:4px}
.preview table{width:100%;border-collapse:collapse;margin:12px 0}
.preview table th,.preview table td{padding:6px 10px;border-bottom:1px solid #ccc;text-align:left;font-size:12px}
.saved-list{max-height:300px;overflow-y:auto}
.saved-item{display:flex;justify-content:space-between;align-items:center;padding:8px 12px;border:1px solid var(--border);border-radius:4px;margin-bottom:6px;background:var(--bg2)}
.saved-item:hover{border-color:var(--accent)}
@media(max-width:768px){
  .grid2,.grid3,.grid4{grid-template-columns:1fr}
  .doc-list{grid-template-columns:1fr}
  .body{padding:12px}
  .header{padding:0 12px}
  .header-title{font-size:12px}
}
</style>
</head>
<body>

<div class="header">
  <div class="header-title">FRONT END DOCUMENTS</div>
  <div class="header-sub">Contract Document Compiler</div>
</div>

<div class="tabs" id="tabs"></div>
<div class="body" id="app"></div>

<div style="position:fixed;bottom:10px;right:10px;font-size:10px;color:#00d4ff;opacity:0.5;font-family:'JetBrains Mono',monospace;pointer-events:none;z-index:9999">Korb Engineering</div>

<script>
const LS_KEY='korb_frontdocs';
const TABS=['project','documents','preview','saved'];
let tab='project';
let project=load()||defaultProject();
let selectedDoc='advertisement';
let savedDocs=loadSaved();

const DOC_TEMPLATES=[
  {id:'advertisement',title:'Advertisement for Bids',division:'00 11 13'},
  {id:'instructions',title:'Instructions to Bidders',division:'00 21 13'},
  {id:'bidForm',title:'Bid Form / Proposal Form',division:'00 41 13'},
  {id:'bidBond',title:'Bid Bond Form',division:'00 43 13'},
  {id:'agreement',title:'Agreement Between Owner and Contractor',division:'00 52 13'},
  {id:'generalConditions',title:'General Conditions',division:'00 72 13'},
  {id:'supplementary',title:'Supplementary Conditions',division:'00 73 13'},
  {id:'noticeOfAward',title:'Notice of Award',division:'00 51 00'},
  {id:'noticeToProceed',title:'Notice to Proceed',division:'00 55 00'},
  {id:'performanceBond',title:'Performance Bond Form',division:'00 61 13'},
  {id:'paymentBond',title:'Payment Bond Form',division:'00 61 16'},
  {id:'applicationForPayment',title:'Application for Payment',division:'00 62 16'},
  {id:'changeOrder',title:'Change Order Form',division:'00 63 13'},
  {id:'substantialCompletion',title:'Certificate of Substantial Completion',division:'00 65 16'},
  {id:'finalAffidavit',title:'Final Payment Affidavit / Lien Waiver',division:'00 65 19'},
  {id:'releaseOfLiens',title:"Contractor's Release of Liens",division:'00 65 36'},
  {id:'suretyConsent',title:'Consent of Surety to Final Payment',division:'00 65 40'},
];

function defaultProject(){return{
  projectName:'',projectNumber:'',projectAddress:'',projectCity:'',projectCounty:'',projectState:'',
  ownerName:'',ownerAddress:'',ownerContact:'',ownerTitle:'',ownerPhone:'',ownerEmail:'',
  engineerName:'',engineerFirm:'',engineerPE:'',engineerContact:'',engineerPhone:'',engineerEmail:'',
  contractorName:'',contractorAddress:'',contractorContact:'',contractorPhone:'',contractorEmail:'',
  estimatedCost:'',projectDuration:'',liquidatedDamages:'',
  bidDate:'',bidTime:'',bidLocation:'',
  dbeGoal:'',mbeGoal:'',wbeGoal:'',
  prevailingWage:false,federalFunding:false,fundingSource:'',
  performanceBond:'100',paymentBond:'100',
  glInsurance:'1000000',autoInsurance:'1000000',workersComp:'Statutory',profLiability:'1000000',
  retainage:'10',warrantyPeriod:'12',
}}

function save(){localStorage.setItem(LS_KEY,JSON.stringify(project))}
function load(){try{return JSON.parse(localStorage.getItem(LS_KEY))}catch{return null}}
function saveSavedDocs(){localStorage.setItem(LS_KEY+'_saved',JSON.stringify(savedDocs))}
function loadSaved(){try{return JSON.parse(localStorage.getItem(LS_KEY+'_saved'))||[]}catch{return[]}}

function fmt(v){return v||'_______________'}
function fmtCurrency(v){if(!v)return'$_______________';const n=parseFloat(v);return isNaN(n)?'$_______________':'$'+n.toLocaleString('en-US',{minimumFractionDigits:2,maximumFractionDigits:2})}
function fmtDate(v){if(!v)return'_______________';const d=new Date(v+'T00:00:00');return d.toLocaleDateString('en-US',{year:'numeric',month:'long',day:'numeric'})}

function renderTabs(){
  document.getElementById('tabs').innerHTML=TABS.map(t=>`<button class="tab ${tab===t?'active':''}" onclick="tab='${t}';render()">${t}</button>`).join('');
}

function field(key,label2,type='text',placeholder=''){
  const v=project[key]||'';
  if(type==='checkbox')return`<div class="check-row"><input type="checkbox" ${v?'checked':''} onchange="project['${key}']=this.checked;save()"><span style="font-size:11px;color:var(--text)">${label2}</span></div>`;
  if(type==='date')return`<div class="field"><label>${label2}</label><input type="date" value="${v}" onchange="project['${key}']=this.value;save()"></div>`;
  if(type==='textarea')return`<div class="field"><label>${label2}</label><textarea placeholder="${placeholder}" onchange="project['${key}']=this.value;save()">${v}</textarea></div>`;
  return`<div class="field"><label>${label2}</label><input type="${type}" value="${v}" placeholder="${placeholder}" oninput="project['${key}']=this.value;save()"></div>`;
}

function render(){
  renderTabs();
  const app=document.getElementById('app');
  if(tab==='project')renderProject(app);
  else if(tab==='documents')renderDocuments(app);
  else if(tab==='preview')renderPreview(app);
  else if(tab==='saved')renderSavedDocs(app);
}

function renderProject(app){
  app.innerHTML=`
    <div class="card"><div class="card-title">Project Information</div>
      <div class="grid3">${field('projectName','Project Name','text','Turkey Creek Drainage Improvements')}${field('projectNumber','Project No.','text','2024-CE-001')}${field('projectAddress','Address')}</div>
      <div class="grid4">${field('projectCity','City')}${field('projectCounty','County')}${field('projectState','State')}${field('estimatedCost','Estimated Cost','text','500000')}</div>
      <div class="grid3">${field('projectDuration','Duration (days)','text','180')}${field('liquidatedDamages','Liquidated Damages/Day','text','500')}${field('fundingSource','Funding Source')}</div>
    </div>
    <div class="card"><div class="card-title">Owner Information</div>
      <div class="grid3">${field('ownerName','Owner Name')}${field('ownerAddress','Address')}${field('ownerContact','Contact Person')}</div>
      <div class="grid3">${field('ownerTitle','Title')}${field('ownerPhone','Phone')}${field('ownerEmail','Email','email')}</div>
    </div>
    <div class="card"><div class="card-title">Engineer Information</div>
      <div class="grid3">${field('engineerName','Engineer Name')}${field('engineerFirm','Firm')}${field('engineerPE','PE Number')}</div>
      <div class="grid3">${field('engineerContact','Contact')}${field('engineerPhone','Phone')}${field('engineerEmail','Email','email')}</div>
    </div>
    <div class="card"><div class="card-title">Contractor Information</div>
      <div class="grid3">${field('contractorName','Contractor Name')}${field('contractorAddress','Address')}${field('contractorContact','Contact')}</div>
      <div class="grid2">${field('contractorPhone','Phone')}${field('contractorEmail','Email','email')}</div>
    </div>
    <div class="card"><div class="card-title">Bid Information</div>
      <div class="grid3">${field('bidDate','Bid Date','date')}${field('bidTime','Bid Time','text','2:00 PM')}${field('bidLocation','Bid Location')}</div>
      <div class="grid3">${field('dbeGoal','DBE Goal %')}${field('mbeGoal','MBE Goal %')}${field('wbeGoal','WBE Goal %')}</div>
      ${field('prevailingWage','Prevailing Wage (Davis-Bacon) Required','checkbox')}
      ${field('federalFunding','Federal Funding','checkbox')}
    </div>
    <div class="card"><div class="card-title">Bonds & Insurance</div>
      <div class="grid4">${field('performanceBond','Performance Bond %')}${field('paymentBond','Payment Bond %')}${field('retainage','Retainage %')}${field('warrantyPeriod','Warranty (months)')}</div>
      <div class="grid4">${field('glInsurance','GL Insurance')}${field('autoInsurance','Auto Insurance')}${field('workersComp','Workers Comp')}${field('profLiability','Prof Liability')}</div>
    </div>
    <div style="display:flex;gap:8px;margin-top:12px">
      <button class="btn btn-green" onclick="save();alert('Project data saved!')">Save Project</button>
      <button class="btn btn-red" onclick="if(confirm('Reset all project data?')){project=defaultProject();save();render()}">Reset</button>
    </div>`;
}

function renderDocuments(app){
  app.innerHTML=`<div class="card"><div class="card-title">Select Document Template</div>
    <div class="doc-list">${DOC_TEMPLATES.map(d=>`
      <div class="doc-item ${selectedDoc===d.id?'selected':''}" onclick="selectedDoc='${d.id}';render()">
        <div><div class="doc-division">Division ${d.division}</div><div class="doc-title">${d.title}</div></div>
        <div style="font-size:10px;color:var(--accent)">${selectedDoc===d.id?'SELECTED':''}</div>
      </div>`).join('')}
    </div>
    <div style="margin-top:16px;display:flex;gap:8px">
      <button class="btn btn-primary" onclick="tab='preview';render()">Preview Selected</button>
      <button class="btn btn-gold" onclick="generateAndSave()">Save to Library</button>
    </div>
  </div>`;
}

function renderPreview(app){
  const html=generateDocument(selectedDoc,project);
  const tmpl=DOC_TEMPLATES.find(d=>d.id===selectedDoc);
  app.innerHTML=`<div class="card">
    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:16px">
      <div class="card-title">${tmpl?tmpl.title:'Document Preview'}</div>
      <div style="display:flex;gap:8px">
        <button class="btn btn-gold" onclick="generateAndSave()">Save</button>
        <button class="btn btn-primary" onclick="printDoc()">Print / PDF</button>
      </div>
    </div>
    <div class="preview" id="docPreview">${html}</div>
  </div>`;
}

function renderSavedDocs(app){
  app.innerHTML=`<div class="card"><div class="card-title">Saved Documents (${savedDocs.length})</div>
    ${savedDocs.length===0?'<div style="color:var(--muted);text-align:center;padding:30px">No saved documents yet</div>':
    `<div class="saved-list">${savedDocs.map((d,i)=>`
      <div class="saved-item">
        <div><div style="font-size:11px;color:var(--gold)">${d.title}</div><div style="font-size:10px;color:var(--dim)">${d.project} - ${new Date(d.date).toLocaleDateString()}</div></div>
        <div style="display:flex;gap:6px">
          <button class="btn btn-primary" style="padding:3px 10px;font-size:9px" onclick="viewSaved(${i})">View</button>
          <button class="btn btn-red" style="padding:3px 10px;font-size:9px" onclick="deleteSaved(${i})">Del</button>
        </div>
      </div>`).join('')}</div>`}
    <div style="margin-top:12px;display:flex;gap:8px">
      <button class="btn" onclick="exportAllSaved()">Export All</button>
      <button class="btn btn-red" onclick="if(confirm('Delete all saved documents?')){savedDocs=[];saveSavedDocs();render()}">Clear All</button>
    </div>
  </div>`;
}

function generateAndSave(){
  const tmpl=DOC_TEMPLATES.find(d=>d.id===selectedDoc);
  const html=generateDocument(selectedDoc,project);
  savedDocs.push({id:Date.now(),title:tmpl.title,division:tmpl.division,docId:selectedDoc,project:project.projectName||'Untitled',date:new Date().toISOString(),html:html});
  saveSavedDocs();
  alert('Document saved to library!');
}

function viewSaved(i){
  const d=savedDocs[i];
  const w=window.open('','_blank');
  w.document.write(`<!DOCTYPE html><html><head><title>${d.title}</title><style>body{font-family:'Times New Roman',serif;padding:40px;max-width:900px;margin:0 auto;line-height:1.7;font-size:13px}h2{text-align:center}h3{text-align:center;font-weight:400}h4{text-transform:uppercase;margin-top:16px}table{width:100%;border-collapse:collapse}th,td{padding:6px 10px;border-bottom:1px solid #ccc;text-align:left}</style></head><body>${d.html}</body></html>`);
  w.document.close();
}

function deleteSaved(i){if(confirm('Delete this document?')){savedDocs.splice(i,1);saveSavedDocs();render()}}

function exportAllSaved(){
  const blob=new Blob([JSON.stringify(savedDocs,null,2)],{type:'application/json'});
  const a=document.createElement('a');a.href=URL.createObjectURL(blob);a.download='korb_front_end_documents.json';a.click();
}

function printDoc(){
  const html=generateDocument(selectedDoc,project);
  const tmpl=DOC_TEMPLATES.find(d=>d.id===selectedDoc);
  const w=window.open('','_blank');
  w.document.write(`<!DOCTYPE html><html><head><title>${tmpl.title}</title><style>body{font-family:'Times New Roman',serif;padding:40px;max-width:900px;margin:0 auto;line-height:1.7;font-size:13px}h2{text-align:center}h3{text-align:center;font-weight:400}h4{text-transform:uppercase;margin-top:16px}table{width:100%;border-collapse:collapse}th,td{padding:6px 10px;border-bottom:1px solid #ccc;text-align:left}@media print{body{padding:20px}}</style></head><body>${html}<script>setTimeout(()=>window.print(),500)<\/script></body></html>`);
  w.document.close();
}

function generateDocument(id,p){
  const gen={
    advertisement:()=>`<h2>ADVERTISEMENT FOR BIDS</h2><h3>${fmt(p.projectName)}</h3><h4>Project No. ${fmt(p.projectNumber)}</h4>
<p><strong>${fmt(p.ownerName)}</strong> will receive sealed bids for the construction of <strong>${fmt(p.projectName)}</strong>, Project No. ${fmt(p.projectNumber)}, located at ${fmt(p.projectAddress)}, ${fmt(p.projectCity)}, ${fmt(p.projectCounty)} County, ${fmt(p.projectState)}, until <strong>${fmt(p.bidTime)}</strong> local time on <strong>${fmtDate(p.bidDate)}</strong>, at:</p>
<p style="margin-left:2em">${fmt(p.bidLocation)}</p>
<p>At which time and place all bids will be publicly opened and read aloud.</p>
<h4>SCOPE OF WORK</h4><p>The Work generally consists of construction services for ${fmt(p.projectName)} as described in the Contract Documents. The estimated construction cost is ${fmtCurrency(p.estimatedCost)}. The Contract Time is ${fmt(p.projectDuration)} calendar days from the Notice to Proceed.</p>
<h4>OBTAINING BID DOCUMENTS</h4><p>Complete sets of Bidding Documents may be obtained from <strong>${fmt(p.engineerFirm)}</strong>, Attention: ${fmt(p.engineerContact)}.</p>
<h4>BID SECURITY</h4><p>Each bid must be accompanied by a Bid Bond or certified check not less than 5% of the total bid amount, payable to ${fmt(p.ownerName)}.</p>
<h4>BONDS</h4><p>The successful Bidder will furnish a Performance Bond (${fmt(p.performanceBond)}%) and Payment Bond (${fmt(p.paymentBond)}%) of the Contract Price.</p>
${p.prevailingWage?'<h4>PREVAILING WAGES</h4><p>This project is subject to the Davis-Bacon Act (40 U.S.C. 3141 et seq.).</p>':''}
${p.federalFunding?`<h4>FEDERAL REQUIREMENTS</h4><p>This project is funded by ${fmt(p.fundingSource)}. Federal requirements apply.</p>`:''}
<h4>OWNER\'S RIGHTS</h4><p>The Owner reserves the right to reject any or all bids and to waive informalities.</p>
<p style="margin-top:2em">By Order of: <strong>${fmt(p.ownerName)}</strong><br>${fmt(p.ownerContact)}, ${fmt(p.ownerTitle)}</p>`,

    instructions:()=>`<h2>INSTRUCTIONS TO BIDDERS</h2><h3>${fmt(p.projectName)} &mdash; Project No. ${fmt(p.projectNumber)}</h3>
<h4>ARTICLE 1 &mdash; DEFINITIONS</h4><p><strong>1.1</strong> "Bidder" &mdash; Any individual, firm, or corporation submitting a Bid.</p><p><strong>1.2</strong> "Issuing Office" &mdash; ${fmt(p.engineerFirm)}.</p>
<h4>ARTICLE 2 &mdash; COPIES OF BIDDING DOCUMENTS</h4><p>Complete sets may be obtained from the Issuing Office as stated in the Advertisement.</p>
<h4>ARTICLE 3 &mdash; QUALIFICATIONS</h4><p>Each Bidder must be properly licensed in the State of ${fmt(p.projectState)}.</p>
<h4>ARTICLE 4 &mdash; EXAMINATION OF DOCUMENTS AND SITE</h4><p>Before submitting a Bid, each Bidder must examine all documents and visit the site.</p>
<h4>ARTICLE 5 &mdash; PREPARATION OF BID</h4><p>All blanks shall be completed in ink or by typewriter. Unit prices govern over extended amounts.</p>
<h4>ARTICLE 6 &mdash; SUBMISSION</h4><p>Bids shall be submitted before ${fmt(p.bidTime)} on ${fmtDate(p.bidDate)} at ${fmt(p.bidLocation)}.</p>
<h4>ARTICLE 7 &mdash; BID SECURITY</h4><p>Each Bid shall include Bid Security of not less than 5% of the total bid.</p>
<h4>ARTICLE 8 &mdash; WITHDRAWAL</h4><p>No Bid may be withdrawn within 60 days after opening.</p>
<h4>ARTICLE 9 &mdash; EVALUATION AND AWARD</h4><p>The Owner will award to the lowest responsible and responsive Bidder.</p>
<h4>ARTICLE 10 &mdash; BONDS AND INSURANCE</h4><p>Performance Bond: ${fmt(p.performanceBond)}%. Payment Bond: ${fmt(p.paymentBond)}%. GL: ${fmtCurrency(p.glInsurance)}. Auto: ${fmtCurrency(p.autoInsurance)}. Workers Comp: ${fmt(p.workersComp)}.</p>`,

    bidForm:()=>`<h2>BID FORM / PROPOSAL</h2><h3>${fmt(p.projectName)} &mdash; Project No. ${fmt(p.projectNumber)}</h3>
<p>TO: <strong>${fmt(p.ownerName)}</strong><br>${fmt(p.ownerAddress)}</p>
<p>FROM: _______________________________________________<br>(Bidder Name and Address)</p>
<p>The undersigned, having examined the Bidding Documents and the site, proposes to furnish all labor, materials, equipment for ${fmt(p.projectName)} for the following sum:</p>
<h4>BASE BID</h4>
<table><tr><th>Item</th><th>Description</th><th>Qty</th><th>Unit</th><th>Unit Price</th><th>Amount</th></tr>
<tr><td colspan="6" style="color:#999"><em>[Per Bid Schedule]</em></td></tr></table>
<p><strong>TOTAL BASE BID:</strong> $_________________</p>
<h4>ACKNOWLEDGMENTS</h4><ol><li>This Bid is genuine and not collusive.</li><li>Contract Time: ${fmt(p.projectDuration)} calendar days.</li><li>Liquidated damages: ${fmtCurrency(p.liquidatedDamages)} per day.</li><li>Bid valid for 60 days.</li></ol>
<p style="margin-top:2em"><strong>Signature:</strong> _______________<br><strong>Date:</strong> _______________</p>`,

    bidBond:()=>`<h2>BID BOND</h2><h3>${fmt(p.projectName)} &mdash; Project No. ${fmt(p.projectNumber)}</h3>
<p>KNOW ALL PERSONS BY THESE PRESENTS, that we, _______________ as Principal, and _______________ as Surety, are bound unto <strong>${fmt(p.ownerName)}</strong> as Obligee in a penal sum not less than 5% of the total Bid.</p>
<p>WHEREAS, the Principal has submitted a Bid for ${fmt(p.projectName)}.</p>
<p>CONDITIONS: If the Principal does not withdraw the Bid within 60 days and, if awarded, executes the Agreement and furnishes bonds within 15 days, this obligation is void; otherwise it remains in full force.</p>
<table style="margin-top:2em"><tr><td style="width:50%"><strong>PRINCIPAL</strong><br><br>By: _______________<br>Title: _______________</td><td><strong>SURETY</strong><br><br>By: _______________<br>Attorney-in-Fact: _______________</td></tr></table>`,

    agreement:()=>`<h2>AGREEMENT BETWEEN OWNER AND CONTRACTOR</h2><h3>${fmt(p.projectName)} &mdash; Project No. ${fmt(p.projectNumber)}</h3>
<p>THIS AGREEMENT made the _____ day of _______________, 20___, between:</p>
<p><strong>OWNER:</strong> ${fmt(p.ownerName)}, ${fmt(p.ownerAddress)}</p>
<p><strong>CONTRACTOR:</strong> ${fmt(p.contractorName)}, ${fmt(p.contractorAddress)}</p>
<p><strong>ENGINEER:</strong> ${fmt(p.engineerName)}, P.E. ${fmt(p.engineerPE)}, ${fmt(p.engineerFirm)}</p>
<h4>ARTICLE 1 &mdash; THE WORK</h4><p>Contractor shall complete all Work per the Contract Documents for ${fmt(p.projectName)}.</p>
<h4>ARTICLE 2 &mdash; CONTRACT PRICE</h4><p>Owner shall pay ${fmtCurrency(p.estimatedCost)}, subject to Change Orders.</p>
<h4>ARTICLE 3 &mdash; CONTRACT TIME</h4><p>Substantially complete within <strong>${fmt(p.projectDuration)} calendar days</strong>. Liquidated damages: ${fmtCurrency(p.liquidatedDamages)} per day.</p>
<h4>ARTICLE 4 &mdash; PAYMENT</h4><p>Progress payments less ${fmt(p.retainage)}% retainage. Final payment upon completion and release of liens.</p>
<h4>ARTICLE 5 &mdash; GOVERNING LAW</h4><p>Governed by the laws of ${fmt(p.projectState)}.</p>
<table style="margin-top:2em"><tr><td style="width:50%"><strong>OWNER: ${fmt(p.ownerName)}</strong><br>By: _______________<br>${fmt(p.ownerContact)}, ${fmt(p.ownerTitle)}</td><td><strong>CONTRACTOR:</strong><br>By: _______________<br>Title: _______________</td></tr></table>`,

    generalConditions:()=>`<h2>GENERAL CONDITIONS</h2><h3>${fmt(p.projectName)} &mdash; Project No. ${fmt(p.projectNumber)}</h3>
<h4>ARTICLE 1 &mdash; DEFINITIONS</h4><p>"Owner": ${fmt(p.ownerName)}. "Engineer": ${fmt(p.engineerFirm)}. "Contractor": The entity performing the Work.</p>
<h4>ARTICLE 2 &mdash; OWNER'S RESPONSIBILITIES</h4><p>Owner shall furnish data, provide access to the site, and make payments as provided.</p>
<h4>ARTICLE 3 &mdash; CONTRACTOR'S RESPONSIBILITIES</h4><p>Contractor shall supervise, direct, and perform the Work with qualified personnel. Contractor shall maintain insurance per Supplementary Conditions.</p>
<h4>ARTICLE 4 &mdash; ENGINEER'S ROLE</h4><p>The Engineer shall be the Owner's representative during construction. The Engineer shall review Applications for Payment and issue certificates.</p>
<h4>ARTICLE 5 &mdash; SUBCONTRACTORS</h4><p>Contractor shall not subcontract Work without Owner's written consent.</p>
<h4>ARTICLE 6 &mdash; CHANGES</h4><p>Changes in the Work shall be authorized only by written Change Order signed by Owner and Contractor.</p>
<h4>ARTICLE 7 &mdash; TIME</h4><p>Time is of the essence. Contract Time: ${fmt(p.projectDuration)} days.</p>
<h4>ARTICLE 8 &mdash; PAYMENTS</h4><p>Monthly Applications for Payment. Retainage: ${fmt(p.retainage)}%.</p>
<h4>ARTICLE 9 &mdash; WARRANTY</h4><p>Contractor warrants the Work for ${fmt(p.warrantyPeriod)} months after Substantial Completion.</p>
<h4>ARTICLE 10 &mdash; TERMINATION</h4><p>Owner may terminate for cause upon 7 days written notice, or for convenience upon 14 days notice.</p>`,

    supplementary:()=>`<h2>SUPPLEMENTARY CONDITIONS</h2><h3>${fmt(p.projectName)} &mdash; Project No. ${fmt(p.projectNumber)}</h3>
<p>These Supplementary Conditions amend or supplement the General Conditions. Where conflict exists, these Supplementary Conditions govern.</p>
<h4>SC-1 INSURANCE REQUIREMENTS</h4>
<p>Commercial General Liability: ${fmtCurrency(p.glInsurance)} per occurrence.</p>
<p>Automobile Liability: ${fmtCurrency(p.autoInsurance)} combined single limit.</p>
<p>Workers' Compensation: ${fmt(p.workersComp)}.</p>
<p>Professional Liability: ${fmtCurrency(p.profLiability)}.</p>
<h4>SC-2 BONDS</h4><p>Performance Bond: ${fmt(p.performanceBond)}%. Payment Bond: ${fmt(p.paymentBond)}%.</p>
<h4>SC-3 LIQUIDATED DAMAGES</h4><p>${fmtCurrency(p.liquidatedDamages)} per calendar day of delay.</p>
<h4>SC-4 WARRANTY</h4><p>${fmt(p.warrantyPeriod)} months from Substantial Completion.</p>
${p.prevailingWage?'<h4>SC-5 PREVAILING WAGES</h4><p>Davis-Bacon Act applies. Current wage determinations are included.</p>':''}
${p.federalFunding?`<h4>SC-6 FEDERAL REQUIREMENTS</h4><p>Funded by ${fmt(p.fundingSource)}. All federal EEO, Title VI, and ADA requirements apply.</p>`:''}`,

    noticeOfAward:()=>`<h2>NOTICE OF AWARD</h2><h3>${fmt(p.projectName)} &mdash; Project No. ${fmt(p.projectNumber)}</h3>
<p>TO: ${fmt(p.contractorName)}<br>${fmt(p.contractorAddress)}</p>
<p>You are notified that your Bid dated _______________ for ${fmt(p.projectName)} has been considered. You are the apparent Successful Bidder and have been awarded a Contract for ${fmtCurrency(p.estimatedCost)}.</p>
<p>Three copies of the Agreement and Contract Documents accompany this Notice. Please execute and return with required bonds and insurance within 15 days.</p>
<p style="margin-top:2em">${fmt(p.ownerName)}<br>By: _______________<br>${fmt(p.ownerContact)}, ${fmt(p.ownerTitle)}<br>Date: _______________</p>`,

    noticeToProceed:()=>`<h2>NOTICE TO PROCEED</h2><h3>${fmt(p.projectName)} &mdash; Project No. ${fmt(p.projectNumber)}</h3>
<p>TO: ${fmt(p.contractorName)}</p>
<p>You are notified that the Contract Time under the Agreement dated _______________ will commence on _______________. You are authorized to commence Work.</p>
<p>The date of Substantial Completion is ${fmt(p.projectDuration)} calendar days from the above date.</p>
<p style="margin-top:2em">${fmt(p.ownerName)}<br>By: _______________<br>Date: _______________</p>
<p>ACCEPTANCE: The undersigned Contractor accepts this Notice to Proceed.<br>By: _______________<br>Date: _______________</p>`,

    performanceBond:()=>`<h2>PERFORMANCE BOND</h2><h3>${fmt(p.projectName)} &mdash; Project No. ${fmt(p.projectNumber)}</h3>
<p>KNOW ALL PERSONS that _______________ as Principal and _______________ as Surety are bound unto <strong>${fmt(p.ownerName)}</strong> in the amount of ${fmt(p.performanceBond)}% of the Contract Price for faithful performance of the Contract.</p>
<p>CONDITIONS: If the Contractor performs all obligations under the Contract Documents, this obligation is void; otherwise it remains in full force.</p>
<table style="margin-top:2em"><tr><td style="width:50%"><strong>CONTRACTOR</strong><br>By: _______________</td><td><strong>SURETY</strong><br>By: _______________</td></tr></table>`,

    paymentBond:()=>`<h2>PAYMENT BOND</h2><h3>${fmt(p.projectName)} &mdash; Project No. ${fmt(p.projectNumber)}</h3>
<p>KNOW ALL PERSONS that _______________ as Principal and _______________ as Surety are bound unto <strong>${fmt(p.ownerName)}</strong> in the amount of ${fmt(p.paymentBond)}% of the Contract Price for payment of all persons supplying labor and materials.</p>
<p>CONDITIONS: If the Contractor promptly pays all persons having claims, this obligation is void.</p>
<table style="margin-top:2em"><tr><td style="width:50%"><strong>CONTRACTOR</strong><br>By: _______________</td><td><strong>SURETY</strong><br>By: _______________</td></tr></table>`,

    applicationForPayment:()=>`<h2>APPLICATION FOR PAYMENT</h2><h3>${fmt(p.projectName)} &mdash; Project No. ${fmt(p.projectNumber)}</h3>
<p>Application No.: _____ &nbsp; Period: _______________ to _______________</p>
<table><tr><th>Item</th><th>Description</th><th>Scheduled Value</th><th>Previous</th><th>This Period</th><th>Total Complete</th><th>% Complete</th><th>Balance</th></tr>
<tr><td colspan="8" style="color:#999"><em>[Line items per Schedule of Values]</em></td></tr></table>
<p><strong>Total Earned to Date:</strong> $_______________<br><strong>Less Retainage (${fmt(p.retainage)}%):</strong> $_______________<br><strong>Less Previous Payments:</strong> $_______________<br><strong>Current Payment Due:</strong> $_______________</p>
<p>Contractor: _______________ Date: _______________<br>Engineer Approval: _______________ Date: _______________</p>`,

    changeOrder:()=>`<h2>CHANGE ORDER</h2><h3>${fmt(p.projectName)} &mdash; Project No. ${fmt(p.projectNumber)}</h3>
<p>Change Order No.: _____ &nbsp; Date: _______________</p>
<p>Owner: ${fmt(p.ownerName)}<br>Contractor: ${fmt(p.contractorName)}<br>Engineer: ${fmt(p.engineerFirm)}</p>
<h4>DESCRIPTION OF CHANGE</h4><p>_______________________________________________________________</p>
<h4>REASON FOR CHANGE</h4><p>_______________________________________________________________</p>
<p><strong>Change in Contract Price:</strong> $_______________<br><strong>New Contract Price:</strong> $_______________<br><strong>Change in Contract Time:</strong> _______________ days<br><strong>New Completion Date:</strong> _______________</p>
<table style="margin-top:2em"><tr><td style="width:33%">Owner: _______________<br>Date: ___</td><td style="width:33%">Contractor: _______________<br>Date: ___</td><td>Engineer: _______________<br>Date: ___</td></tr></table>`,

    substantialCompletion:()=>`<h2>CERTIFICATE OF SUBSTANTIAL COMPLETION</h2><h3>${fmt(p.projectName)} &mdash; Project No. ${fmt(p.projectNumber)}</h3>
<p>The Work under this Contract has been inspected and is hereby declared Substantially Complete as of _______________.</p>
<p><strong>Contract Price:</strong> ${fmtCurrency(p.estimatedCost)}<br><strong>Approved Change Orders:</strong> $_______________<br><strong>Adjusted Contract Price:</strong> $_______________</p>
<h4>PUNCH LIST</h4><p>Items to be completed or corrected are listed on the attached schedule. Warranty period of ${fmt(p.warrantyPeriod)} months commences on the date of Substantial Completion.</p>
<p>Engineer: _______________ Date: _______________<br>Owner: _______________ Date: _______________<br>Contractor: _______________ Date: _______________</p>`,

    finalAffidavit:()=>`<h2>FINAL PAYMENT AFFIDAVIT / LIEN WAIVER</h2><h3>${fmt(p.projectName)} &mdash; Project No. ${fmt(p.projectNumber)}</h3>
<p>State of ${fmt(p.projectState)}, County of ${fmt(p.projectCounty)}</p>
<p>The undersigned, being duly sworn, deposes and says that all payrolls, bills for materials, and other indebtedness connected with the Work have been paid or satisfied.</p>
<p>Contractor: _______________ Date: _______________<br>Subscribed and sworn before me this _____ day of _______________, 20___.<br>Notary Public: _______________</p>`,

    releaseOfLiens:()=>`<h2>CONTRACTOR'S AFFIDAVIT OF RELEASE OF LIENS</h2><h3>${fmt(p.projectName)} &mdash; Project No. ${fmt(p.projectNumber)}</h3>
<p>The undersigned Contractor certifies that all obligations for materials, labor, equipment, and services used in the Work have been fully paid and satisfied, and that there are no outstanding liens, claims, or encumbrances.</p>
<p>Contractor: _______________ Date: _______________<br>Notary: _______________</p>`,

    suretyConsent:()=>`<h2>CONSENT OF SURETY TO FINAL PAYMENT</h2><h3>${fmt(p.projectName)} &mdash; Project No. ${fmt(p.projectNumber)}</h3>
<p>In accordance with the provisions of the Contract, _______________ as Surety on the Performance Bond and Payment Bond, hereby consents to Final Payment to ${fmt(p.contractorName)} and agrees that Final Payment shall not relieve the Surety of any obligations under the bonds.</p>
<p>Surety: _______________<br>By: _______________<br>Date: _______________</p>`,
  };
  return(gen[id]||gen.advertisement)();
}

render();
</script>
