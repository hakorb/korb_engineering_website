<style>

body{background:var(--bg);color:var(--text);font-family:var(--font);min-height:100vh;font-size:13px}
input,select,textarea{background:var(--bg2);border:1px solid var(--border);color:var(--text);font-family:var(--font);font-size:16px;padding:7px 10px;border-radius:4px;width:100%;outline:none;min-height:44px}
input:focus,select:focus,textarea:focus{border-color:var(--accent)}
textarea{resize:vertical;min-height:60px}
button{font-family:var(--font);cursor:pointer;font-size:11px;letter-spacing:0.05em}
label{display:block;font-size:10px;color:var(--dim);text-transform:uppercase;letter-spacing:0.1em;margin-bottom:4px}
.header{height:52px;background:linear-gradient(180deg,var(--bg2),var(--bg1));border-bottom:1px solid var(--border);display:flex;align-items:center;padding:0 20px;gap:14px;position:sticky;top:0;z-index:100}
.header-title{font-size:15px;font-weight:700;color:var(--accent);letter-spacing:0.12em}

.tab.active{color:var(--accent);border-bottom-color:var(--accent);background:var(--bg2)}
.tab:hover{color:var(--text)}
.body{padding:20px;max-width:1200px;margin:0 auto}
.card{background:var(--card);border:1px solid var(--border);border-radius:6px;padding:20px;margin-bottom:16px}
.card-title{font-size:11px;color:var(--accent);letter-spacing:0.1em;text-transform:uppercase;margin-bottom:14px}
.grid2{display:grid;grid-template-columns:1fr 1fr;gap:16px}
.grid3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:12px}
.grid4{display:grid;grid-template-columns:1fr 1fr 1fr 1fr;gap:12px}
.field{margin-bottom:10px}
.btn{padding:6px 16px;border:1px solid var(--border);border-radius:4px;background:transparent;color:var(--dim);text-transform:uppercase;transition:all .2s;font-size:11px;letter-spacing:0.05em;cursor:pointer;font-family:var(--font);min-height:36px}
.btn:hover{border-color:var(--accent);color:var(--accent)}
.btn-primary{border-color:var(--accent);color:var(--accent)}
.btn-gold{border-color:var(--gold);color:var(--gold)}
.btn-green{border-color:var(--green);color:var(--green)}
.btn-red{border-color:var(--red);color:var(--red)}
.btn-sm{padding:3px 10px;font-size:9px;min-height:28px}
.result-box{background:var(--bg2);padding:10px;border-radius:4px;border:1px solid var(--border);margin-top:8px}
.result-label{font-size:9px;color:var(--dim);text-transform:uppercase;letter-spacing:0.1em}

.results-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-top:12px}
.results-grid-3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px;margin-top:12px}
table{width:100%;border-collapse:collapse}
th,td{padding:6px 10px;border-bottom:1px solid var(--border);font-size:11px;text-align:left}
th{color:var(--dim);font-size:9px;text-transform:uppercase;letter-spacing:0.1em}
.tag{display:inline-block;background:var(--bg2);border:1px solid var(--border);border-radius:3px;padding:1px 6px;font-size:9px;margin-right:4px;color:var(--gold)}
.copy-btn{background:transparent;border:1px solid var(--border);color:var(--dim);padding:2px 8px;border-radius:3px;font-size:9px;cursor:pointer;font-family:var(--font);vertical-align:middle;margin-left:6px}
.copy-btn:hover{border-color:var(--accent);color:var(--accent)}
.section-divider{border:none;border-top:1px solid var(--border);margin:16px 0}
.warning{color:var(--yellow);font-size:10px;margin-top:6px}

@media(max-width:768px){
  .grid2,.grid3,.grid4{grid-template-columns:1fr}

<body>

<div class="header">
  <div class="header-title">GEOSPATIAL TOOLS</div>
  <div class="header-sub">Coordinate & Survey Toolkit</div>
</div>
<div class="tabs" id="tabs"></div>
<div class="body" id="app"></div>
<div style="position:fixed;bottom:10px;right:10px;font-size:10px;color:#00d4ff;opacity:0.5;font-family:'JetBrains Mono',monospace;pointer-events:none;z-index:9999">Korb Engineering</div>

<script>
const LS='korb_geospatial';
const TABS=['converter','gps-formats','projections','slope','bearing','curves','area','earthwork','station','units','distance','traverse','sites','survey','datums'];
let tab='converter';
let state=loadState();

function loadState(){try{return JSON.parse(localStorage.getItem(LS))||defaultState()}catch{return defaultState()}}
function defaultState(){return{sites:[],points:[],traverse:[],areaVertices:[{x:'',y:''},{x:'',y:''},{x:'',y:''}]}}
function saveState(){localStorage.setItem(LS,JSON.stringify(state))}
function genId(){return Date.now().toString(36)+Math.random().toString(36).slice(2,7)}

/* ─── Math helpers ─── */
const DEG=Math.PI/180, RAD=180/Math.PI;

function ddToDms(dd){const a=Math.abs(dd),d=Math.floor(a),mF=(a-d)*60,m=Math.floor(mF),s=((mF-m)*60);return{d,m,s:parseFloat(s.toFixed(4)),sign:dd>=0?1:-1}}
function dmsToDd(d,m,s,sign){return sign*(Math.abs(d)+m/60+s/3600)}
function dmsStr(dms,latLng){
  const dir=latLng==='lat'?(dms.sign>=0?'N':'S'):(dms.sign>=0?'E':'W');
  return `${dms.d}\u00b0 ${dms.m}' ${dms.s.toFixed(4)}" ${dir}`;
}
function ddToDdm(dd){const a=Math.abs(dd),d=Math.floor(a),m=(a-d)*60;return{d,m:parseFloat(m.toFixed(6)),sign:dd>=0?1:-1}}

function ddToUtm(lat,lng){
  const a=6378137,f=1/298.257223563,e=Math.sqrt(2*f-f*f),e2=e*e/(1-e*e),k0=0.9996;
  const zone=Math.floor((lng+180)/6)+1,lngO=(zone-1)*6-180+3;
  const lr=lat*DEG,lnr=(lng-lngO)*DEG;
  const N=a/Math.sqrt(1-e*e*Math.sin(lr)**2),T2=Math.tan(lr)**2,C=e2*Math.cos(lr)**2,A=Math.cos(lr)*lnr;
  const M=a*((1-e*e/4-3*e**4/64-5*e**6/256)*lr-(3*e*e/8+3*e**4/32+45*e**6/1024)*Math.sin(2*lr)+(15*e**4/256+45*e**6/1024)*Math.sin(4*lr)-(35*e**6/3072)*Math.sin(6*lr));
  const east=k0*N*(A+(1-T2+C)*A**3/6+(5-18*T2+T2*T2+72*C-58*e2)*A**5/120)+500000;
  let north=k0*(M+N*Math.tan(lr)*(A*A/2+(5-T2+9*C+4*C*C)*A**4/24+(61-58*T2+T2*T2+600*C-330*e2)*A**6/720));
  if(lat<0)north+=10000000;
  return{zone,band:lat>=0?'N':'S',easting:east.toFixed(2),northing:north.toFixed(2)}
}

function utmToLatLng(zone,band,easting,northing){
  const a=6378137,f=1/298.257223563,e=Math.sqrt(2*f-f*f),e1=(1-Math.sqrt(1-e*e))/(1+Math.sqrt(1-e*e)),k0=0.9996;
  const x=easting-500000, y=band==='S'?northing-10000000:northing;
  const M=y/k0, mu=M/(a*(1-e*e/4-3*e**4/64-5*e**6/256));
  const phi1=mu+(3*e1/2-27*e1**3/32)*Math.sin(2*mu)+(21*e1*e1/16-55*e1**4/32)*Math.sin(4*mu)+(151*e1**3/96)*Math.sin(6*mu);
  const N1=a/Math.sqrt(1-e*e*Math.sin(phi1)**2), T1=Math.tan(phi1)**2, C1=(e*e/(1-e*e))*Math.cos(phi1)**2, R1=a*(1-e*e)/Math.pow(1-e*e*Math.sin(phi1)**2,1.5), D=x/(N1*k0);
  const lat=phi1-(N1*Math.tan(phi1)/R1)*(D*D/2-(5+3*T1+10*C1-4*C1*C1-9*(e*e/(1-e*e)))*D**4/24+(61+90*T1+298*C1+45*T1*T1-252*(e*e/(1-e*e))-3*C1*C1)*D**6/720);
  const lng=((zone-1)*6-180+3)*DEG+(D-(1+2*T1+C1)*D**3/6+(5-2*C1+28*T1-3*C1*C1+8*(e*e/(1-e*e))+24*T1*T1)*D**5/120)/Math.cos(phi1);
  return{lat:lat*RAD,lng:lng*RAD};
}

function haversine(lat1,lon1,lat2,lon2){
  const R=6371000,dLat=(lat2-lat1)*DEG,dLon=(lon2-lon1)*DEG;
  const a=Math.sin(dLat/2)**2+Math.cos(lat1*DEG)*Math.cos(lat2*DEG)*Math.sin(dLon/2)**2;
  return R*2*Math.atan2(Math.sqrt(a),Math.sqrt(1-a))
}

function polygonArea(coords){
  if(coords.length<3)return 0;let area=0;
  for(let i=0;i<coords.length;i++){const j=(i+1)%coords.length;
    const xi=coords[i].lng*DEG*6371000*Math.cos(coords[i].lat*DEG);
    const yi=coords[i].lat*DEG*6371000;
    const xj=coords[j].lng*DEG*6371000*Math.cos(coords[j].lat*DEG);
    const yj=coords[j].lat*DEG*6371000;
    area+=xi*yj-xj*yi}
  return Math.abs(area)/2
}

/* Shoelace for local coords */
function shoelaceArea(pts){
  if(pts.length<3)return 0;let a=0;
  for(let i=0;i<pts.length;i++){const j=(i+1)%pts.length;a+=pts[i].x*pts[j].y-pts[j].x*pts[i].y;}
  return Math.abs(a)/2;
}

const datumShifts={NAD83:{dx:0,dy:0,dz:0,desc:'GRS80 ellipsoid, North American Datum 1983'},WGS84:{dx:0,dy:0,dz:0,desc:'WGS84 ellipsoid, GPS global datum'},NAD27:{dx:-8,dy:160,dz:176,desc:'Clarke 1866 ellipsoid, North American Datum 1927'}};

/* ─── State Plane zones (simplified Transverse Mercator params for common US zones) ─── */
const SP_ZONES={
  'TX-NC':{name:'Texas North Central 4202',cm:-98.5,lat0:31.6667,k0:0.9999,fe:600000,fn:2000000,units:'ft'},
  'TX-C':{name:'Texas Central 4203',cm:-100.3333,lat0:29.6667,k0:0.9999,fe:700000,fn:3000000,units:'ft'},
  'TX-SC':{name:'Texas South Central 4204',cm:-99.0,lat0:27.8333,k0:0.9999,fe:600000,fn:4000000,units:'ft'},
  'TX-S':{name:'Texas South 4205',cm:-98.5,lat0:25.6667,k0:0.9999,fe:300000,fn:5000000,units:'ft'},
  'FL-E':{name:'Florida East 0901',cm:-81.0,lat0:24.3333,k0:0.999941,fe:200000,fn:0,units:'ft'},
  'FL-W':{name:'Florida West 0902',cm:-82.0,lat0:24.3333,k0:0.999941,fe:200000,fn:0,units:'ft'},
  'CA-V':{name:'California Zone V 0405',cm:-118.0,lat0:33.5,k0:0.9999,fe:2000000,fn:500000,units:'ft'},
  'NY-LI':{name:'New York Long Island 3104',cm:-74.0,lat0:40.1667,k0:0.999967,fe:300000,fn:0,units:'ft'},
  'GA-E':{name:'Georgia East 1001',cm:-82.1667,lat0:30.0,k0:0.9999,fe:200000,fn:0,units:'ft'},
  'GA-W':{name:'Georgia West 1002',cm:-84.1667,lat0:30.0,k0:0.9999,fe:700000,fn:0,units:'ft'},
};

/* ─── Bearing/Azimuth helpers ─── */
function azimuthToBearing(az){
  az=((az%360)+360)%360;
  let q,a;
  if(az>=0&&az<90){q='NE';a=az;}
  else if(az>=90&&az<180){q='SE';a=180-az;}
  else if(az>=180&&az<270){q='SW';a=az-180;}
  else{q='NW';a=360-az;}
  const d=Math.floor(a),mf=(a-d)*60,m=Math.floor(mf),s=(mf-m)*60;
  return{quadrant:q,degrees:d,minutes:m,seconds:parseFloat(s.toFixed(2)),
    str:`${q[0]}${d}\u00b0${String(m).padStart(2,'0')}'${s.toFixed(2)}"${q[1]}`};
}

function bearingToAzimuth(dir1,deg,min,sec,dir2){
  const angle=deg+min/60+sec/3600;
  if(dir1==='N'&&dir2==='E')return angle;
  if(dir1==='S'&&dir2==='E')return 180-angle;
  if(dir1==='S'&&dir2==='W')return 180+angle;
  if(dir1==='N'&&dir2==='W')return 360-angle;
  return angle;
}

/* ─── Clipboard helper ─── */
function copyText(text,btnEl){
  navigator.clipboard.writeText(text).then(()=>{
    if(btnEl){const orig=btnEl.textContent;btnEl.textContent='COPIED';btnEl.style.color='var(--green)';setTimeout(()=>{btnEl.textContent=orig;btnEl.style.color='';},1200);}
  });
}

/* ─── Result box helper ─── */
function rb(label,value,color){
  return `<div class="result-box"><div class="result-label">${label}</div><div class="result-value" style="${color?'color:'+color:''}">${value}</div></div>`;
}

/* ─── Rendering ─── */
function renderTabs(){
  document.getElementById('tabs').innerHTML=TABS.map(t=>`<button class="tab ${tab===t?'active':''}" onclick="tab='${t}';render()">${t.replace(/-/g,' ')}</button>`).join('');
}

function render(){
  renderTabs();
  const a=document.getElementById('app');
  const map={converter:renderConverter,distance:renderDistance,area:renderArea,sites:renderSites,survey:renderSurvey,datums:renderDatums,'gps-formats':renderGpsFormats,projections:renderProjections,slope:renderSlope,bearing:renderBearing,curves:renderCurves,earthwork:renderEarthwork,station:renderStation,units:renderUnits,traverse:renderTraverse};
  (map[tab]||renderConverter)(a);
}

/* ═══════════════════════════════════════════════
   TAB 1: CONVERTER (original, preserved)
   ═══════════════════════════════════════════════ */
function renderConverter(el){
  el.innerHTML=`<div class="grid2">
    <div class="card"><div class="card-title">Decimal Degrees Input</div>
      <div class="grid2">
        <div class="field"><label>Latitude</label><input id="cLat" placeholder="e.g. 30.2672"></div>
        <div class="field"><label>Longitude</label><input id="cLng" placeholder="e.g. -97.7431"></div>
      </div>
      <div style="margin-top:4px"><label>Input Format</label>
        <div style="display:flex;gap:6px;margin-top:4px">
          <button class="btn btn-primary" onclick="convertDD()">DD</button>
          <button class="btn" onclick="convertDMS()">DMS</button>
        </div>
      </div>
      <div style="margin-top:12px;border-top:1px solid var(--border);padding-top:12px">
        <div class="card-title">DMS Input</div>
        <div style="display:flex;gap:6px;align-items:end;flex-wrap:wrap">
          <div class="field" style="width:50px"><label>Lat D</label><input id="dmsLatD" placeholder="30"></div>
          <div class="field" style="width:50px"><label>M</label><input id="dmsLatM" placeholder="16"></div>
          <div class="field" style="width:60px"><label>S</label><input id="dmsLatS" placeholder="1.92"></div>
          <div class="field" style="width:40px"><label>Dir</label><select id="dmsLatDir"><option>N</option><option>S</option></select></div>
        </div>
        <div style="display:flex;gap:6px;align-items:end;flex-wrap:wrap;margin-top:4px">
          <div class="field" style="width:50px"><label>Lng D</label><input id="dmsLngD" placeholder="97"></div>
          <div class="field" style="width:50px"><label>M</label><input id="dmsLngM" placeholder="44"></div>
          <div class="field" style="width:60px"><label>S</label><input id="dmsLngS" placeholder="35.16"></div>
          <div class="field" style="width:40px"><label>Dir</label><select id="dmsLngDir"><option>W</option><option>E</option></select></div>
        </div>
      </div>
    </div>
    <div class="card"><div class="card-title" style="color:var(--green)">Results</div><div id="convResults" style="color:var(--muted)">Enter coordinates and click DD or DMS</div></div>
  </div>`;
}

function convertDD(){
  const lat=parseFloat(document.getElementById('cLat').value);
  const lng=parseFloat(document.getElementById('cLng').value);
  if(isNaN(lat)||isNaN(lng))return;
  showConvResults(lat,lng);
}

function convertDMS(){
  const ld=parseFloat(document.getElementById('dmsLatD').value)||0;
  const lm=parseFloat(document.getElementById('dmsLatM').value)||0;
  const ls=parseFloat(document.getElementById('dmsLatS').value)||0;
  const ldir=document.getElementById('dmsLatDir').value==='S'?-1:1;
  const gd=parseFloat(document.getElementById('dmsLngD').value)||0;
  const gm=parseFloat(document.getElementById('dmsLngM').value)||0;
  const gs=parseFloat(document.getElementById('dmsLngS').value)||0;
  const gdir=document.getElementById('dmsLngDir').value==='W'?-1:1;
  const lat=dmsToDd(ld,lm,ls,ldir);
  const lng=dmsToDd(gd,gm,gs,gdir);
  showConvResults(lat,lng);
}

function showConvResults(lat,lng){
  const dmsLat=ddToDms(lat),dmsLng=ddToDms(lng);
  const utm=ddToUtm(lat,lng);
  const ddmLat=ddToDdm(lat),ddmLng=ddToDdm(lng);
  document.getElementById('convResults').innerHTML=`
    <div class="result-box"><div class="result-label">Decimal Degrees</div><div class="result-value">${lat.toFixed(6)}, ${lng.toFixed(6)}<button class="copy-btn" onclick="copyText('${lat.toFixed(6)}, ${lng.toFixed(6)}',this)">COPY</button></div></div>
    <div class="result-box" style="margin-top:8px"><div class="result-label">DMS</div>
      <div class="result-value">Lat: ${dmsLat.d}&deg; ${dmsLat.m}' ${dmsLat.s}" ${dmsLat.sign>=0?'N':'S'}</div>
      <div class="result-value">Lng: ${dmsLng.d}&deg; ${dmsLng.m}' ${dmsLng.s}" ${dmsLng.sign>=0?'E':'W'}</div>
    </div>
    <div class="result-box" style="margin-top:8px"><div class="result-label">Degrees Decimal Minutes</div>
      <div class="result-value">Lat: ${ddmLat.d}&deg; ${ddmLat.m.toFixed(4)}' ${ddmLat.sign>=0?'N':'S'}</div>
      <div class="result-value">Lng: ${ddmLng.d}&deg; ${ddmLng.m.toFixed(4)}' ${ddmLng.sign>=0?'E':'W'}</div>
    </div>
    <div class="result-box" style="margin-top:8px"><div class="result-label">UTM</div>
      <div class="result-value">Zone ${utm.zone}${utm.band} &nbsp; E ${utm.easting} &nbsp; N ${utm.northing}<button class="copy-btn" onclick="copyText('${utm.zone}${utm.band} ${utm.easting}E ${utm.northing}N',this)">COPY</button></div>
    </div>`;
}

/* ═══════════════════════════════════════════════
   TAB 2: GPS FORMATS
   ═══════════════════════════════════════════════ */
function renderGpsFormats(el){
  el.innerHTML=`<div class="card"><div class="card-title">GPS Coordinate Format Converter</div>
    <p style="color:var(--dim);font-size:11px;margin-bottom:14px">Convert between Decimal Degrees (DD), Degrees Minutes Seconds (DMS), and Degrees Decimal Minutes (DDM)</p>
    <div class="grid2">
      <div class="field"><label>Latitude (DD)</label><input id="gpsLat" placeholder="32.7767"></div>
      <div class="field"><label>Longitude (DD)</label><input id="gpsLng" placeholder="-96.7970"></div>
    </div>
    <button class="btn btn-primary" style="margin-top:8px" onclick="calcGpsFormats()">Convert All Formats</button>
    <hr class="section-divider">
    <div class="card-title">Or Paste Any Format</div>
    <div class="field"><label>Paste coordinate string</label><input id="gpsPaste" placeholder="32&deg;46'36.12&quot;N 96&deg;47'49.20&quot;W  or  32 46 36.12 N 96 47 49.20 W"></div>
    <button class="btn" style="margin-top:4px" onclick="parseGpsString()">Parse & Convert</button>
    <div id="gpsResults" style="margin-top:12px"></div>
  </div>`;
}

function calcGpsFormats(){
  const lat=parseFloat(document.getElementById('gpsLat').value);
  const lng=parseFloat(document.getElementById('gpsLng').value);
  if(isNaN(lat)||isNaN(lng))return;
  showGpsResults(lat,lng);
}

function parseGpsString(){
  const s=document.getElementById('gpsPaste').value.trim();
  // Try to extract numbers
  const nums=s.replace(/[^\d.\-NSEW nsew]/g,' ').split(/\s+/).filter(x=>x);
  // Simple DD
  if(nums.length===2&&!isNaN(parseFloat(nums[0]))&&!isNaN(parseFloat(nums[1]))){
    showGpsResults(parseFloat(nums[0]),parseFloat(nums[1]));return;
  }
  // DMS: d m s dir d m s dir
  const dmsRe=/(\d+)\s*[°d]?\s*(\d+)\s*[''m]?\s*([\d.]+)\s*["s]?\s*([NSns])\s*[,;]?\s*(\d+)\s*[°d]?\s*(\d+)\s*[''m]?\s*([\d.]+)\s*["s]?\s*([EWew])/;
  const dm=s.match(dmsRe);
  if(dm){
    const lat=dmsToDd(+dm[1],+dm[2],+dm[3],dm[4].toUpperCase()==='S'?-1:1);
    const lng=dmsToDd(+dm[5],+dm[6],+dm[7],dm[8].toUpperCase()==='W'?-1:1);
    showGpsResults(lat,lng);return;
  }
  document.getElementById('gpsResults').innerHTML='<p class="error-text">Could not parse. Try DD format: 32.7767, -96.7970</p>';
}

function showGpsResults(lat,lng){

  const dmsLngStr=`${dmsLng.d}\u00b0${String(dmsLng.m).padStart(2,'0')}'${dmsLng.s.toFixed(4)}"${lngDir}`;
  const dmsStr2=`${dmsLatStr} ${dmsLngStr}`;
  const ddmLatStr=`${ddmLat.d}\u00b0${ddmLat.m.toFixed(6)}'${latDir}`;
  const ddmLngStr=`${ddmLng.d}\u00b0${ddmLng.m.toFixed(6)}'${lngDir}`;

function calcGeoToSP(){
  const zk=document.getElementById('spZone').value;
  const z=SP_ZONES[zk];if(!z)return;
  const lat=parseFloat(document.getElementById('spLat').value),lng=parseFloat(document.getElementById('spLng').value);
  if(isNaN(lat)||isNaN(lng))return;
  // Simplified TM projection
  const a=6378137,f=1/298.257223563,e=Math.sqrt(2*f-f*f),e2=e*e/(1-e*e);
  const lr=lat*DEG,lr0=z.lat0*DEG,dlng=(lng-(-Math.abs(z.cm)))*DEG;
  const N=a/Math.sqrt(1-e*e*Math.sin(lr)**2),T=Math.tan(lr)**2,C=e2*Math.cos(lr)**2,A=Math.cos(lr)*dlng;
  const M=a*((1-e*e/4-3*e**4/64)*lr-(3*e*e/8+3*e**4/32)*Math.sin(2*lr)+(15*e**4/256)*Math.sin(4*lr));
  const M0=a*((1-e*e/4-3*e**4/64)*lr0-(3*e*e/8+3*e**4/32)*Math.sin(2*lr0)+(15*e**4/256)*Math.sin(4*lr0));
  let x=z.k0*N*(A+(1-T+C)*A**3/6+(5-18*T+T*T)*A**5/120);
  let y=z.k0*(M-M0+N*Math.tan(lr)*(A*A/2+(5-T+9*C+4*C*C)*A**4/24));
  const ftFactor=z.units==='ft'?3.28083333333:1;
  const easting=x*ftFactor+z.fe;
  const northing=y*ftFactor+z.fn;
  const unitLabel=z.units==='ft'?'US Survey Feet':'Meters';
  document.getElementById('spResult').innerHTML=`<div class="results-grid">
    ${rb('Easting',easting.toFixed(3)+' '+unitLabel,'var(--accent)')}
    ${rb('Northing',northing.toFixed(3)+' '+unitLabel,'var(--accent)')}
    ${rb('Zone',z.name)}
    ${rb('Scale Factor',z.k0)}
  </div>`;
}

function calcSlope(){
  const e1=parseFloat(document.getElementById('slElev1').value);
  const e2=parseFloat(document.getElementById('slElev2').value);
  const d=parseFloat(document.getElementById('slDist').value);
  if([e1,e2,d].some(isNaN)||d===0)return;
  const rise=e2-e1;
  const slope=(rise/d)*100;
  const angle=Math.atan(rise/d)*RAD;
  const slopeDist=Math.sqrt(rise*rise+d*d);
  const ratio=d!==0?`1:${Math.abs(d/rise).toFixed(2)}`:'--';
  document.getElementById('slopeResults').innerHTML=`<div class="results-grid">
    ${rb('Rise',rise.toFixed(3)+' ft')}
    ${rb('Run',d.toFixed(3)+' ft')}
    ${rb('Slope %',slope.toFixed(4)+'%',slope>0?'var(--green)':'var(--red)')}
    ${rb('Grade',slope.toFixed(4)+'%')}
    ${rb('Angle',angle.toFixed(4)+'\u00b0')}
    ${rb('Slope Distance',slopeDist.toFixed(3)+' ft')}
    ${rb('Rise:Run Ratio',ratio)}
    ${rb('Run:Rise Ratio',rise!==0?`${Math.abs(d/rise).toFixed(2)}:1`:'--')}
  </div>`;
}

function calcSlopeReverse(){
  const elev=parseFloat(document.getElementById('slKnownElev').value);
  const slope=parseFloat(document.getElementById('slKnownSlope').value);
  const val=parseFloat(document.getElementById('slKnownVal').value);
  const mode=document.getElementById('slSolve').value;
  if([elev,slope,val].some(isNaN))return;
  let html='';
  if(mode==='elev'){
    const rise=val*(slope/100);
    const newElev=elev+rise;
    html=`<div class="results-grid">
      ${rb('Rise over distance',rise.toFixed(3)+' ft')}
      ${rb('Elevation at '+val.toFixed(1)+"'",newElev.toFixed(3)+' ft','var(--accent)')}
    </div>`;
  }else{
    const rise=val-elev;
    const dist=slope!==0?rise/(slope/100):0;
    html=`<div class="results-grid">
      ${rb('Required rise',rise.toFixed(3)+' ft')}
      ${rb('Horizontal distance',Math.abs(dist).toFixed(3)+' ft','var(--accent)')}
    </div>`;
  }
  document.getElementById('slopeRevResults').innerHTML=html;
}

function calcHCurve(){
  let R=parseFloat(document.getElementById('hcR').value);
  let D=parseFloat(document.getElementById('hcD').value);
  let T=parseFloat(document.getElementById('hcT').value);
  let L=parseFloat(document.getElementById('hcL').value);
  let C=parseFloat(document.getElementById('hcC').value);
  let DC=parseFloat(document.getElementById('hcDC').value);

  // Solve from whatever two are given
  if(!isNaN(DC)&&isNaN(R))R=5729.578/DC;
  if(!isNaN(R)&&!isNaN(D)){/* have both */}
  else if(!isNaN(R)&&!isNaN(T)){D=2*Math.atan(T/R)*RAD;}
  else if(!isNaN(R)&&!isNaN(L)){D=(L/R)*RAD;}
  else if(!isNaN(R)&&!isNaN(C)){D=2*Math.asin(C/(2*R))*RAD;}
  else if(!isNaN(D)&&!isNaN(T)){R=T/Math.tan(D/2*DEG);}
  else if(!isNaN(D)&&!isNaN(L)){R=L/(D*DEG);}
  else if(!isNaN(D)&&!isNaN(C)){R=C/(2*Math.sin(D/2*DEG));}
  else if(!isNaN(T)&&!isNaN(L)){
    // iterative
    let r=1000;for(let i=0;i<100;i++){const d=L/r;const t=r*Math.tan(d/2);r+=0.5*(T-t);if(Math.abs(T-t)<0.0001)break;}
    R=r;D=(L/R)*RAD;
  }
  else{document.getElementById('hcResults').innerHTML='<p class="warning">Enter at least two values (R, Delta, T, L, C, or Degree of Curve)</p>';return;}

  if(isNaN(R)||isNaN(D))return;
  const Drad=D*DEG;
  T=R*Math.tan(Drad/2);
  L=R*Drad;
  C=2*R*Math.sin(Drad/2);
  const E=R*(1/Math.cos(Drad/2)-1);
  const M=R*(1-Math.cos(Drad/2));
  DC=5729.578/R;

  document.getElementById('hcResults').innerHTML=`<div class="results-grid">
    ${rb('Radius (R)',R.toFixed(3)+' ft','var(--accent)')}
    ${rb('Delta (\u0394)',D.toFixed(6)+'\u00b0')}
    ${rb('Tangent (T)',T.toFixed(3)+' ft')}
    ${rb('Arc Length (L)',L.toFixed(3)+' ft')}
    ${rb('Chord (C)',C.toFixed(3)+' ft')}
    ${rb('External (E)',E.toFixed(3)+' ft')}
    ${rb('Mid-Ordinate (M)',M.toFixed(3)+' ft')}
    ${rb('Degree of Curve',DC.toFixed(6)+'\u00b0')}
  </div>`;
}

function calcVCurve(){
  const g1=parseFloat(document.getElementById('vcG1').value);
  const g2=parseFloat(document.getElementById('vcG2').value);
  const pviStr=document.getElementById('vcPVI').value;
  const pviElev=parseFloat(document.getElementById('vcElev').value);
  const L=parseFloat(document.getElementById('vcL').value);
  if([g1,g2,pviElev,L].some(isNaN))return;

  const pviSta=parseStation(pviStr);
  const A=g2-g1;
  const K=L/Math.abs(A);
  const bvcSta=pviSta-L/2;
  const evcSta=pviSta+L/2;
  const bvcElev=pviElev-(g1/100)*(L/2);
  const evcElev=pviElev+(g2/100)*(L/2);
  const type=A<0?'Crest':'Sag';

  // High/low point
  let hlSta=null,hlElev=null;
  if((g1>0&&g2<0)||(g1<0&&g2>0)){
    const x=(-g1/100)*L/(A/100);
    if(x>0&&x<L){
      hlSta=bvcSta+x;
      hlElev=bvcElev+(g1/100)*x+(A/100)/(2*L)*x*x;
    }
  }

  document.getElementById('vcResults').innerHTML=`<div class="results-grid">
    ${rb('Curve Type',type,type==='Crest'?'var(--gold)':'var(--accent)')}
    ${rb('A (algebraic diff)',A.toFixed(4)+'%')}
    ${rb('K-Value',K.toFixed(2)+' ft/%')}
    ${rb('BVC Station',formatStation(bvcSta))}
    ${rb('BVC Elevation',bvcElev.toFixed(3)+' ft')}
    ${rb('EVC Station',formatStation(evcSta))}
    ${rb('EVC Elevation',evcElev.toFixed(3)+' ft')}
    ${hlSta!==null?rb(type==='Crest'?'High Point Station':'Low Point Station',formatStation(hlSta)):''}
    ${hlElev!==null?rb(type==='Crest'?'High Point Elevation':'Low Point Elevation',hlElev.toFixed(3)+' ft','var(--green)'):''}
  </div>`;
}

function parseStation(s){
  if(!s)return 0;
  const m=s.toString().match(/(\d+)\+(\d+\.?\d*)/);
  if(m)return parseFloat(m[1])*100+parseFloat(m[2]);
  return parseFloat(s)||0;
}
function formatStation(v){
  if(isNaN(v))return '--';
  const sta=Math.floor(v/100);
  const off=v-sta*100;
  return `${sta}+${off.toFixed(2).padStart(5,'0')}`;
}

function calcArea(){
  const coords=areaPts.map(p=>({lat:parseFloat(p.lat),lng:parseFloat(p.lng)})).filter(p=>!isNaN(p.lat)&&!isNaN(p.lng));
  if(coords.length<3)return;
  const sqm=polygonArea(coords);
  showAreaResults(sqm*10.7639,document.getElementById('areaResults'));
}

function calcAreaLocal(){
  const pts=areaLocalPts.map(p=>({x:parseFloat(p.x),y:parseFloat(p.y)})).filter(p=>!isNaN(p.x)&&!isNaN(p.y));
  if(pts.length<3)return;
  const sqft=shoelaceArea(pts);
  showAreaResults(sqft,document.getElementById('areaResults'));
}

function calcAreaTraverse(){
  // Convert bearing/dist to coordinates
  let x=0,y=0;
  const pts=[{x:0,y:0}];
  const courses=[];
  for(const t of areaTraverse){
    const deg=parseFloat(t.deg)||0,min=parseFloat(t.min)||0,sec=parseFloat(t.sec)||0,dist=parseFloat(t.dist);
    if(isNaN(dist))continue;
    const az=bearingToAzimuth(t.dir1,deg,min,sec,t.dir2);
    const dx=dist*Math.sin(az*DEG);
    const dy=dist*Math.cos(az*DEG);
    x+=dx;y+=dy;
    pts.push({x,y});
    courses.push({az,dist,dx,dy});
  }
  if(pts.length<4){document.getElementById('areaResults').innerHTML='<p class="warning">Need at least 3 courses</p>';return;}

  const closureN=y,closureE=x;
  const closureDist=Math.sqrt(closureN*closureN+closureE*closureE);
  const perimeter=courses.reduce((s,c)=>s+c.dist,0);
  const closureRatio=perimeter>0?Math.round(perimeter/closureDist):Infinity;

  const sqft=shoelaceArea(pts.slice(0,-1)); // exclude closure point
  const el=document.getElementById('areaResults');
  showAreaResults(sqft,el);
  el.innerHTML+=`<hr class="section-divider"><div class="results-grid">
    ${rb('Closure Error (N)',closureN.toFixed(4)+' ft')}
    ${rb('Closure Error (E)',closureE.toFixed(4)+' ft')}
    ${rb('Linear Closure',closureDist.toFixed(4)+' ft')}
    ${rb('Precision Ratio','1:'+closureRatio,closureRatio>10000?'var(--green)':closureRatio>5000?'var(--yellow)':'var(--red)')}
  </div>`;
}

function showAreaResults(sqft,el){
  const sqm=sqft/10.7639;
  el.innerHTML=`<div class="results-grid">
    ${rb('Square Feet',sqft.toFixed(1)+' SF')}
    ${rb('Acres',(sqft/43560).toFixed(6)+' ac','var(--accent)')}
    ${rb('Square Meters',sqm.toFixed(1)+' SM')}
    ${rb('Hectares',(sqm/10000).toFixed(6)+' ha')}
    ${rb('Square Yards',(sqft/9).toFixed(1)+' SY')}
    ${rb('Square Kilometers',(sqm/1e6).toFixed(8)+' km\u00b2')}
  </div>`;
}

function calcAvgEndArea(){
  let totalCut=0,totalFill=0;
  const rows=[];
  for(let i=0;i<ewSections.length-1;i++){
    const s1=ewSections[i],s2=ewSections[i+1];
    const sta1=parseStation(s1.sta),sta2=parseStation(s2.sta);
    const d=sta2-sta1;if(d<=0)continue;
    const a1c=parseFloat(s1.areaCut)||0,a2c=parseFloat(s2.areaCut)||0;
    const a1f=parseFloat(s1.areaFill)||0,a2f=parseFloat(s2.areaFill)||0;
    const cutVol=(a1c+a2c)/2*d/27;
    const fillVol=(a1f+a2f)/2*d/27;
    totalCut+=cutVol;totalFill+=fillVol;
    rows.push({from:s1.sta||formatStation(sta1),to:s2.sta||formatStation(sta2),dist:d,cutVol,fillVol});
  }
  let tbl=`<div style="overflow-x:auto;margin-top:12px"><table>
    <thead><tr><th>From</th><th>To</th><th>Dist (ft)</th><th>Cut (CY)</th><th>Fill (CY)</th></tr></thead>
    <tbody>${rows.map(r=>`<tr><td>${r.from}</td><td>${r.to}</td><td>${r.dist.toFixed(1)}</td><td style="color:var(--red)">${r.cutVol.toFixed(1)}</td><td style="color:var(--green)">${r.fillVol.toFixed(1)}</td></tr>`).join('')}</tbody>
  </table></div>`;
  document.getElementById('ewResults').innerHTML=tbl+`<div class="results-grid">
    ${rb('Total Cut',totalCut.toFixed(1)+' CY','var(--red)')}
    ${rb('Total Fill',totalFill.toFixed(1)+' CY','var(--green)')}
    ${rb('Net',((totalCut-totalFill)>0?'Cut ':'Fill ')+Math.abs(totalCut-totalFill).toFixed(1)+' CY','var(--accent)')}
    ${rb('Cut/Fill Ratio',totalFill>0?(totalCut/totalFill).toFixed(2):'--')}
  </div>`;
}

function calcGridVolume(){
  ewSpacing=parseFloat(document.getElementById('ewSpace').value)||50;
  const cellArea=ewSpacing*ewSpacing;
  let totalCut=0,totalFill=0;
  for(let r=0;r<ewGridRows;r++){
    for(let c=0;c<ewGridCols;c++){
      const ex=parseFloat(ewExist[r][c]),pr=parseFloat(ewProp[r][c]);
      if(isNaN(ex)||isNaN(pr))continue;
      const diff=pr-ex;
      // Corner=1/4, edge=1/2, interior=1
      let weight=1;
      const isCorner=(r===0||r===ewGridRows-1)&&(c===0||c===ewGridCols-1);
      const isEdge=(r===0||r===ewGridRows-1||c===0||c===ewGridCols-1);
      if(isCorner)weight=0.25;else if(isEdge)weight=0.5;
      const vol=diff*cellArea*weight/27; // CY
      if(vol>0)totalFill+=vol;else totalCut+=Math.abs(vol);
    }
  }
  document.getElementById('ewResults').innerHTML=`<div class="results-grid">
    ${rb('Grid Spacing',ewSpacing+' ft')}
    ${rb('Cell Area',cellArea.toFixed(0)+' SF')}
    ${rb('Total Cut',totalCut.toFixed(1)+' CY','var(--red)')}
    ${rb('Total Fill',totalFill.toFixed(1)+' CY','var(--green)')}
    ${rb('Net',((totalCut-totalFill)>0?'Cut ':'Fill ')+Math.abs(totalCut-totalFill).toFixed(1)+' CY','var(--accent)')}
    ${rb('Cut/Fill Ratio',totalFill>0?(totalCut/totalFill).toFixed(2):'--')}
  </div>`;
}

    </div>

      <div class="field"><label>Target X (Easting)</label><input id="soX" placeholder="1050.00"></div>
      <div class="field"><label>Target Y (Northing)</label><input id="soY" placeholder="520.00"></div>
    </div>
    <button class="btn btn-primary" style="margin-top:8px" onclick="calcStationOffset()">Compute Station & Offset</button>
    <div id="soResults"></div>
  </div>`;

function calcStationOffset(){
  const tx=parseFloat(document.getElementById('soX').value);
  const ty=parseFloat(document.getElementById('soY').value);
  if(isNaN(tx)||isNaN(ty))return;

  // Build alignment segments
  const pts=alignPts.map(p=>({sta:parseStation(p.sta),x:parseFloat(p.x),y:parseFloat(p.y)})).filter(p=>!isNaN(p.x)&&!isNaN(p.y));
  if(pts.length<2){document.getElementById('soResults').innerHTML='<p class="warning">Need at least 2 alignment points</p>';return;}

  let bestDist=Infinity,bestSta=0,bestOffset=0,bestSide='';
  for(let i=0;i<pts.length-1;i++){
    const p1=pts[i],p2=pts[i+1];
    const dx=p2.x-p1.x,dy=p2.y-p1.y;
    const segLen=Math.sqrt(dx*dx+dy*dy);
    if(segLen===0)continue;
    // Project target onto segment
    let t=((tx-p1.x)*dx+(ty-p1.y)*dy)/(segLen*segLen);
    t=Math.max(0,Math.min(1,t));
    const px=p1.x+t*dx,py=p1.y+t*dy;
    const dist=Math.sqrt((tx-px)**2+(ty-py)**2);
    if(dist<bestDist){
      bestDist=dist;
      const segSta=p1.sta+t*(p2.sta-p1.sta);
      bestSta=segSta;
      bestOffset=dist;
      // Determine side (left/right relative to alignment direction)
      const cross=(dx*(ty-p1.y)-dy*(tx-p1.x));
      bestSide=cross>0?'Left':'Right';
    }
  }

  document.getElementById('soResults').innerHTML=`<div class="results-grid">
    ${rb('Station',formatStation(bestSta),'var(--accent)')}
    ${rb('Offset',bestOffset.toFixed(3)+' ft '+bestSide,'var(--accent)')}
    ${rb('Side',bestSide)}
    ${rb('Perpendicular Distance',bestDist.toFixed(3)+' ft')}
  </div>`;
}

function calcDist(){
  const p=[{lat:parseFloat(document.getElementById('d1Lat').value),lng:parseFloat(document.getElementById('d1Lng').value)},{lat:parseFloat(document.getElementById('d2Lat').value),lng:parseFloat(document.getElementById('d2Lng').value)}];
  if(p.some(x=>isNaN(x.lat)||isNaN(x.lng)))return;
  const m=haversine(p[0].lat,p[0].lng,p[1].lat,p[1].lng);
  const bearing=Math.atan2(Math.sin((p[1].lng-p[0].lng)*DEG)*Math.cos(p[1].lat*DEG),Math.cos(p[0].lat*DEG)*Math.sin(p[1].lat*DEG)-Math.sin(p[0].lat*DEG)*Math.cos(p[1].lat*DEG)*Math.cos((p[1].lng-p[0].lng)*DEG))*RAD;
  document.getElementById('distResults').innerHTML=`<div class="results-grid">
    ${[['Feet',(m*3.28084).toFixed(2)],['Miles',(m/1609.344).toFixed(4)],['Meters',m.toFixed(2)],['Kilometers',(m/1000).toFixed(4)]].map(([l,v])=>`<div class="result-box"><div class="result-label">${l}</div><div class="result-value">${v}</div></div>`).join('')}
  </div>
  <div class="result-box" style="margin-top:8px"><div class="result-label">Bearing</div><div class="result-value">${((bearing+360)%360).toFixed(2)}&deg;</div></div>`;
}

/* ═══════════════════════════════════════════════
   TAB 12: TRAVERSE (Survey Data Table)
   ═══════════════════════════════════════════════ */
let travData=[];
let travStartN=0,travStartE=0;

function renderTraverse(el){
  if(travData.length===0)travData=[
    {id:genId(),occ:'A',fs:'B',dir1:'N',deg:'',min:'',sec:'',dir2:'E',dist:''},
    {id:genId(),occ:'B',fs:'C',dir1:'S',deg:'',min:'',sec:'',dir2:'E',dist:''},
    {id:genId(),occ:'C',fs:'A',dir1:'S',deg:'',min:'',sec:'',dir2:'W',dist:''}
  ];
  el.innerHTML=`<div class="card"><div class="card-title">Traverse Data Table</div>
    <p style="font-size:10px;color:var(--dim);margin-bottom:10px">Enter traverse courses. Running coordinates and closure computed automatically.</p>
    <div class="grid2" style="margin-bottom:12px">
      <div class="field"><label>Starting Northing</label><input id="travN" value="${travStartN}" oninput="travStartN=parseFloat(this.value)||0"></div>
      <div class="field"><label>Starting Easting</label><input id="travE" value="${travStartE}" oninput="travStartE=parseFloat(this.value)||0"></div>
    </div>
    <div style="overflow-x:auto"><table>
      <thead><tr><th>Occ</th><th>FS</th><th>Dir</th><th>Deg</th><th>Min</th><th>Sec</th><th>Dir</th><th>Distance</th><th></th></tr></thead>
      <tbody>
        ${travData.map((t,i)=>`<tr>
          <td><input style="width:40px" value="${t.occ}" oninput="travData[${i}].occ=this.value"></td>
          <td><input style="width:40px" value="${t.fs}" oninput="travData[${i}].fs=this.value"></td>
          <td><select style="width:36px" onchange="travData[${i}].dir1=this.value"><option ${t.dir1==='N'?'selected':''}>N</option><option ${t.dir1==='S'?'selected':''}>S</option></select></td>
          <td><input style="width:50px" value="${t.deg}" oninput="travData[${i}].deg=this.value"></td>
          <td><input style="width:40px" value="${t.min}" oninput="travData[${i}].min=this.value"></td>
          <td><input style="width:50px" value="${t.sec}" oninput="travData[${i}].sec=this.value"></td>
          <td><select style="width:36px" onchange="travData[${i}].dir2=this.value"><option ${t.dir2==='E'?'selected':''}>E</option><option ${t.dir2==='W'?'selected':''}>W</option></select></td>
          <td><input style="width:80px" value="${t.dist}" oninput="travData[${i}].dist=this.value"></td>
          <td><button class="btn btn-red btn-sm" onclick="travData.splice(${i},1);render()">X</button></td>
        </tr>`).join('')}
      </tbody>
    </table></div>
    <div style="display:flex;gap:8px;margin-top:8px">
      <button class="btn" onclick="travData.push({id:genId(),occ:'',fs:'',dir1:'N',deg:'',min:'',sec:'',dir2:'E',dist:''});render()">+ Course</button>
      <button class="btn btn-primary" onclick="calcTraverse()">Compute Traverse</button>
      <button class="btn btn-gold" onclick="exportTraverseCsv()">Export CSV</button>
    </div>
    <div id="travResults"></div>
  </div>`;
}

function calcTraverse(){
  let n=travStartN,e=travStartE;
  const results=[];
  let totalDist=0;
  for(const t of travData){
    const deg=parseFloat(t.deg)||0,min=parseFloat(t.min)||0,sec=parseFloat(t.sec)||0,dist=parseFloat(t.dist);
    if(isNaN(dist))continue;
    const az=bearingToAzimuth(t.dir1,deg,min,sec,t.dir2);
    const dN=dist*Math.cos(az*DEG);
    const dE=dist*Math.sin(az*DEG);
    n+=dN;e+=dE;
    totalDist+=dist;
    results.push({occ:t.occ,fs:t.fs,az:az.toFixed(4),dist:dist.toFixed(3),dN:dN.toFixed(4),dE:dE.toFixed(4),northing:n.toFixed(4),easting:e.toFixed(4)});
  }

  const closureN=n-travStartN,closureE=e-travStartE;
  const closureDist=Math.sqrt(closureN*closureN+closureE*closureE);
  const ratio=totalDist>0?Math.round(totalDist/closureDist):Infinity;

  let html=`<div style="overflow-x:auto;margin-top:12px"><table>
    <thead><tr><th>Occ</th><th>FS</th><th>Azimuth</th><th>Distance</th><th>\u0394N</th><th>\u0394E</th><th>Northing</th><th>Easting</th></tr></thead>
    <tbody>
      <tr><td colspan="6" style="color:var(--dim)">Start</td><td>${travStartN.toFixed(4)}</td><td>${travStartE.toFixed(4)}</td></tr>
      ${results.map(r=>`<tr><td>${r.occ}</td><td>${r.fs}</td><td>${r.az}\u00b0</td><td>${r.dist}</td><td>${r.dN}</td><td>${r.dE}</td><td style="color:var(--accent)">${r.northing}</td><td style="color:var(--accent)">${r.easting}</td></tr>`).join('')}
    </tbody>
  </table></div>
  <div class="results-grid">
    ${rb('Total Distance',totalDist.toFixed(3)+' ft')}
    ${rb('Closure Error (N)',closureN.toFixed(4)+' ft')}
    ${rb('Closure Error (E)',closureE.toFixed(4)+' ft')}
    ${rb('Linear Closure',closureDist.toFixed(4)+' ft')}
    ${rb('Precision Ratio','1:'+(isFinite(ratio)?ratio:'\u221e'),ratio>10000?'var(--green)':ratio>5000?'var(--yellow)':'var(--red)')}
    ${rb('Number of Courses',results.length)}
  </div>`;
  document.getElementById('travResults').innerHTML=html;
}

function exportTraverseCsv(){
  // Quick compute for export
  let n=travStartN,e=travStartE;
  const rows=[['Occ','FS','Bearing','Azimuth','Distance','dN','dE','Northing','Easting']];
  for(const t of travData){
    const deg=parseFloat(t.deg)||0,min=parseFloat(t.min)||0,sec=parseFloat(t.sec)||0,dist=parseFloat(t.dist);
    if(isNaN(dist))continue;
    const az=bearingToAzimuth(t.dir1,deg,min,sec,t.dir2);
    const b=azimuthToBearing(az);
    const dN=dist*Math.cos(az*DEG),dE=dist*Math.sin(az*DEG);
    n+=dN;e+=dE;
    rows.push([t.occ,t.fs,b.str,az.toFixed(4),dist.toFixed(3),dN.toFixed(4),dE.toFixed(4),n.toFixed(4),e.toFixed(4)]);
  }
  const csv=rows.map(r=>r.join(',')).join('\n');
  const a=document.createElement('a');a.href=URL.createObjectURL(new Blob([csv],{type:'text/csv'}));a.download='korb_traverse.csv';a.click();
}

/* ═══════════════════════════════════════════════
   TAB 13: SITES (original, preserved)

      <div class="card-title" style="margin-bottom:0">Project Site Registry (${s.length})</div>

    </div>
    <div style="display:flex;gap:8px;flex-wrap:wrap;margin-bottom:12px;align-items:end">

      <div class="field" style="flex:1;min-width:80px"><label>Latitude</label><input id="sLat" placeholder="30.2672"></div>
      <div class="field" style="flex:1;min-width:80px"><label>Longitude</label><input id="sLng" placeholder="-97.7431"></div>
      <div class="field" style="flex:1;min-width:80px"><label>Datum</label><select id="sDatum"><option>NAD83</option><option>WGS84</option><option>NAD27</option></select></div>
      <div class="field" style="flex:2;min-width:120px"><label>Description</label><input id="sDesc"></div>
      <div class="field" style="flex:1;min-width:80px"><label>Tags</label><input id="sTags" placeholder="comma,sep"></div>
      <button class="btn btn-green" style="margin-bottom:10px" onclick="addSite()">+ Add</button>
    </div>
    <div style="overflow-x:auto"><table>

      <tbody>${s.length===0?'<tr><td colspan="7" style="text-align:center;padding:30px;color:var(--muted)">No sites registered</td></tr>':
        s.map(si=>`<tr>
          <td>${si.name}</td><td>${si.lat}</td><td>${si.lng}</td>
          <td style="color:var(--accent)">${si.datum}</td>
          <td style="color:var(--dim)">${si.description||''}</td>
          <td>${(si.tags||'').split(',').filter(t=>t.trim()).map(t=>'<span class="tag">'+t.trim()+'</span>').join('')}</td>
          <td><button class="btn btn-red" style="padding:2px 8px;font-size:9px" onclick="delSite('${si.id}')">DEL</button></td>
        </tr>`).join('')}
      </tbody>
    </table></div>
  </div>`;
}

function addSite(){
  const n=document.getElementById('sName').value;if(!n)return;
  state.sites.push({id:genId(),name:n,lat:document.getElementById('sLat').value,lng:document.getElementById('sLng').value,datum:document.getElementById('sDatum').value,description:document.getElementById('sDesc').value,tags:document.getElementById('sTags').value,created:new Date().toISOString()});
  saveState();render();
}
function delSite(id){state.sites=state.sites.filter(s=>s.id!==id);saveState();render()}

/* ═══════════════════════════════════════════════
   TAB 14: SURVEY (original, preserved)
   ═══════════════════════════════════════════════ */
function renderSurvey(el){
  const p=state.points||[];
  el.innerHTML=`<div class="card">
    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:16px;flex-wrap:wrap;gap:8px">
      <div class="card-title" style="margin-bottom:0">Survey Point Log (${p.length})</div>
      <div style="display:flex;gap:6px">
        <button class="btn btn-gold" onclick="exportCsv(state.points,'korb_survey_points.csv',['pointId','northing','easting','elevation','description'])">Export CSV</button>
        <button class="btn" onclick="importCsv()">Import CSV</button>
      </div>
    </div>
    <div style="display:flex;gap:8px;flex-wrap:wrap;margin-bottom:12px;align-items:end">
      <div class="field" style="flex:1;min-width:80px"><label>Point ID</label><input id="pId" placeholder="CP-001"></div>
      <div class="field" style="flex:1;min-width:80px"><label>Northing</label><input id="pN"></div>
      <div class="field" style="flex:1;min-width:80px"><label>Easting</label><input id="pE"></div>
      <div class="field" style="flex:1;min-width:80px"><label>Elevation</label><input id="pEl"></div>
      <div class="field" style="flex:2;min-width:120px"><label>Description</label><input id="pDesc"></div>
      <button class="btn btn-green" style="margin-bottom:10px" onclick="addPoint()">+ Add</button>
    </div>
    <div style="overflow-x:auto"><table>
      <thead><tr>${['Point ID','Northing','Easting','Elevation','Description','Date',''].map(h=>'<th>'+h+'</th>').join('')}</tr></thead>
      <tbody>${p.length===0?'<tr><td colspan="7" style="text-align:center;padding:30px;color:var(--muted)">No survey points logged</td></tr>':
        p.map(pt=>`<tr>
          <td style="color:var(--gold)">${pt.pointId}</td><td>${pt.northing}</td><td>${pt.easting}</td><td>${pt.elevation}</td>
          <td style="color:var(--dim)">${pt.description||''}</td>
          <td style="font-size:10px;color:var(--dim)">${pt.created?new Date(pt.created).toLocaleDateString():''}</td>
          <td><button class="btn btn-red" style="padding:2px 8px;font-size:9px" onclick="delPoint('${pt.id}')">DEL</button></td>
        </tr>`).join('')}
      </tbody>
    </table></div>
  </div>`;
}

function addPoint(){
  const pid=document.getElementById('pId').value;if(!pid)return;
  state.points.push({id:genId(),pointId:pid,northing:document.getElementById('pN').value,easting:document.getElementById('pE').value,elevation:document.getElementById('pEl').value,description:document.getElementById('pDesc').value,created:new Date().toISOString()});
  saveState();render();
}
function delPoint(id){state.points=state.points.filter(p=>p.id!==id);saveState();render()}

function exportCsv(data,filename,headers){
  const csv=[headers.join(','),...data.map(r=>headers.map(h=>`"${(r[h]||'').toString().replace(/"/g,'""')}"`).join(','))].join('\n');
  const a=document.createElement('a');a.href=URL.createObjectURL(new Blob([csv],{type:'text/csv'}));a.download=filename;a.click();
}

function importCsv(){
  const input=document.createElement('input');input.type='file';input.accept='.csv';
  input.onchange=e=>{const file=e.target.files[0];if(!file)return;
    const reader=new FileReader();reader.onload=ev=>{
      const lines=ev.target.result.split('\n').filter(l=>l.trim());
      if(lines.length<2)return;
      const headers=lines[0].split(',').map(h=>h.trim().replace(/"/g,''));
      for(let i=1;i<lines.length;i++){
        const vals=lines[i].split(',').map(v=>v.trim().replace(/"/g,''));
        const obj={id:genId(),created:new Date().toISOString()};
        headers.forEach((h,j)=>{obj[h]=vals[j]||''});
        if(obj.pointId)state.points.push(obj);
      }
      saveState();render();
    };reader.readAsText(file);
  };input.click();
}

    </div>`).join('')}</div>`;
}
