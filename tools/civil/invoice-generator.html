<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Invoice Generator | Korb Engineering</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{--bg:#050a0f;--surface:#0a1018;--surface2:#0e1520;--border:#1a2535;--text:#e2e8f0;--cyan:#00d4ff;--orange:#ff6600;--green:#10b981;--red:#ef4444;--font:'JetBrains Mono',monospace}
html{font-size:16px}
body{background:var(--bg);color:var(--text);font-family:var(--font);min-height:100vh;line-height:1.5}
input,select,textarea,button{font-family:var(--font);font-size:16px;color:var(--text)}
input,select,textarea{background:var(--surface);border:1px solid var(--border);border-radius:6px;padding:10px 12px;width:100%;min-height:44px}
input:focus,select:focus,textarea:focus{outline:none;border-color:var(--cyan);box-shadow:0 0 0 2px rgba(0,212,255,.15)}
button{cursor:pointer;border:none;border-radius:6px;padding:10px 16px;min-height:44px;min-width:44px;font-weight:500;transition:all .2s}
.btn-primary{background:var(--cyan);color:#050a0f}
.btn-primary:hover{opacity:.85}
.btn-orange{background:var(--orange);color:#fff}
.btn-orange:hover{opacity:.85}
.btn-green{background:var(--green);color:#fff}
.btn-green:hover{opacity:.85}
.btn-red{background:var(--red);color:#fff}
.btn-red:hover{opacity:.85}
.btn-ghost{background:transparent;border:1px solid var(--border);color:var(--text)}
.btn-ghost:hover{border-color:var(--cyan);color:var(--cyan)}
.btn-sm{padding:6px 10px;font-size:13px;min-height:36px}
header{background:var(--surface);border-bottom:1px solid var(--border);padding:16px 20px;display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:12px}
header h1{font-size:1.1rem;font-weight:600;color:var(--cyan)}
header h1 span{color:var(--orange)}
header .subtitle{font-size:.8rem;color:#64748b;font-weight:300}
.container{max-width:1400px;margin:0 auto;padding:16px}
.tabs{display:flex;gap:4px;margin-bottom:16px;flex-wrap:wrap}
.tab{padding:10px 16px;border-radius:6px 6px 0 0;background:var(--surface);border:1px solid var(--border);border-bottom:none;cursor:pointer;font-size:.85rem;min-height:44px;display:flex;align-items:center}
.tab.active{background:var(--surface2);border-color:var(--cyan);color:var(--cyan)}
.panel{background:var(--surface2);border:1px solid var(--border);border-radius:0 6px 6px 6px;padding:16px;display:none}
.panel.active{display:block}
.form-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(200px,1fr));gap:12px;margin-bottom:16px}
.form-group{display:flex;flex-direction:column;gap:4px}
.form-group label{font-size:.75rem;color:#64748b;text-transform:uppercase;letter-spacing:.5px}
.section-title{font-size:.9rem;font-weight:600;color:var(--cyan);margin:20px 0 12px;padding-bottom:6px;border-bottom:1px solid var(--border)}
.section-title:first-child{margin-top:0}
.line-items-table{width:100%;border-collapse:collapse;font-size:.85rem}
.line-items-table th{background:var(--surface);border:1px solid var(--border);padding:8px;text-align:left;color:var(--cyan);font-weight:600;font-size:.75rem;text-transform:uppercase}
.line-items-table td{border:1px solid var(--border);padding:4px}
.line-items-table td input,.line-items-table td select{border:none;border-radius:0;min-height:40px;font-size:.85rem}
.line-items-table .amount-cell{text-align:right;padding:10px 12px;font-weight:600;color:var(--green)}
.table-wrap{overflow-x:auto}
.totals-section{display:flex;justify-content:flex-end;margin-top:16px}
.totals-table{min-width:280px}
.totals-table .row{display:flex;justify-content:space-between;padding:6px 12px;font-size:.85rem}
.totals-table .row.total{border-top:2px solid var(--cyan);font-weight:700;font-size:1rem;color:var(--cyan);margin-top:4px;padding-top:10px}
.stats-bar{display:grid;grid-template-columns:repeat(auto-fit,minmax(160px,1fr));gap:12px;margin-bottom:16px}
.stat-card{background:var(--surface);border:1px solid var(--border);border-radius:8px;padding:12px;text-align:center}
.stat-card .label{font-size:.75rem;color:#64748b;text-transform:uppercase;letter-spacing:.5px}
.stat-card .value{font-size:1.3rem;font-weight:700;margin-top:4px}
.invoice-preview{background:#fff;color:#1a1a1a;border-radius:8px;padding:40px;max-width:800px;margin:0 auto;font-family:var(--font);font-size:13px;line-height:1.6}
.invoice-preview .inv-header{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:30px;flex-wrap:wrap;gap:20px}
.invoice-preview .company-name{font-size:1.4rem;font-weight:700;color:#0a1018}
.invoice-preview .inv-title{font-size:1.8rem;font-weight:700;color:#00d4ff;text-align:right}
.invoice-preview .inv-meta{text-align:right}
.invoice-preview .inv-meta div{margin-bottom:2px}
.invoice-preview .inv-addresses{display:grid;grid-template-columns:1fr 1fr;gap:20px;margin-bottom:30px}
.invoice-preview .inv-addresses .label{font-size:.7rem;text-transform:uppercase;color:#999;margin-bottom:4px;letter-spacing:1px}
.invoice-preview table{width:100%;border-collapse:collapse;margin-bottom:20px}
.invoice-preview table th{background:#f0f4f8;padding:10px;text-align:left;font-size:.7rem;text-transform:uppercase;letter-spacing:.5px;color:#555;border-bottom:2px solid #e0e0e0}
.invoice-preview table td{padding:10px;border-bottom:1px solid #eee}
.invoice-preview table td:last-child,.invoice-preview table th:last-child{text-align:right}
.invoice-preview .inv-totals{display:flex;justify-content:flex-end}
.invoice-preview .inv-totals-table{min-width:250px}
.invoice-preview .inv-totals-table .row{display:flex;justify-content:space-between;padding:4px 0;font-size:.85rem}
.invoice-preview .inv-totals-table .row.total{border-top:2px solid #1a1a1a;font-weight:700;font-size:1.1rem;padding-top:8px;margin-top:4px}
.invoice-preview .inv-notes{margin-top:30px;padding-top:20px;border-top:1px solid #eee;font-size:.8rem;color:#666}
.invoice-preview .inv-footer{margin-top:30px;text-align:center;font-size:.75rem;color:#999;border-top:1px solid #eee;padding-top:16px}
.history-item{background:var(--surface);border:1px solid var(--border);border-radius:8px;padding:14px;margin-bottom:8px;display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:8px}
.history-item .hi-info{flex:1;min-width:200px}
.history-item .hi-num{font-weight:600;color:var(--cyan)}
.history-item .hi-client{font-size:.85rem;color:#94a3b8}
.history-item .hi-amount{font-weight:700;color:var(--green);font-size:1.1rem}
.history-item .hi-actions{display:flex;gap:4px;flex-wrap:wrap}
.paid-badge{font-size:.7rem;padding:2px 8px;border-radius:10px;background:rgba(16,185,129,.15);color:var(--green)}
.unpaid-badge{font-size:.7rem;padding:2px 8px;border-radius:10px;background:rgba(255,102,0,.15);color:var(--orange)}
.hidden{display:none!important}
.logo-preview{max-width:200px;max-height:80px;margin-top:8px;border-radius:4px}
@media(max-width:640px){
.form-grid{grid-template-columns:1fr}
.stats-bar{grid-template-columns:repeat(2,1fr)}
header h1{font-size:.95rem}
.invoice-preview{padding:20px;font-size:11px}
.invoice-preview .inv-header{flex-direction:column}
.invoice-preview .inv-addresses{grid-template-columns:1fr}
}
@media print{
body{background:#fff!important}
header,.tabs,.toolbar,.panel:not(#panel-preview),.stats-bar,.btn-primary,.btn-ghost{display:none!important}
#panel-preview{display:block!important;border:none;background:transparent;padding:0}
.invoice-preview{box-shadow:none;padding:0}
}
</style>
</head>
<body>
<header>
<div>
<h1>Korb Engineering <span>| Invoice Generator</span></h1>
<div class="subtitle">Professional Invoice Builder</div>
</div>
<div style="display:flex;gap:8px;flex-wrap:wrap">
<button class="btn-ghost btn-sm" onclick="newInvoice()">New Invoice</button>
<button class="btn-ghost btn-sm" onclick="window.print()">Print</button>
</div>
</header>
<div class="container">
<div class="stats-bar" id="statsBar"></div>
<div class="tabs">
<div class="tab active" data-tab="editor" onclick="switchTab('editor')">Editor</div>
<div class="tab" data-tab="preview" onclick="switchTab('preview')">Preview</div>
<div class="tab" data-tab="history" onclick="switchTab('history')">History</div>
</div>

<div class="panel active" id="panel-editor">
<div class="section-title">Company Information</div>
<div class="form-grid">
<div class="form-group"><label>Company Name</label><input id="compName" value="Korb Engineering" oninput="autoSave()"></div>
<div class="form-group"><label>Address</label><input id="compAddress" placeholder="123 Main St, City, ST 00000" oninput="autoSave()"></div>
<div class="form-group"><label>Phone</label><input id="compPhone" type="tel" placeholder="(555) 000-0000" oninput="autoSave()"></div>
<div class="form-group"><label>Email</label><input id="compEmail" type="email" placeholder="billing@korbengineering.com" oninput="autoSave()"></div>
<div class="form-group"><label>Logo</label><input type="file" id="logoUpload" accept="image/*" onchange="handleLogo(event)" style="padding:8px"></div>
</div>
<img id="logoPreview" class="logo-preview hidden" alt="Logo">

<div class="section-title">Client Information</div>
<div class="form-grid">
<div class="form-group"><label>Client Name</label><input id="clientName" placeholder="Client name" oninput="autoSave()"></div>
<div class="form-group"><label>Client Company</label><input id="clientCompany" placeholder="Company name" oninput="autoSave()"></div>
<div class="form-group"><label>Client Address</label><input id="clientAddress" placeholder="Address" oninput="autoSave()"></div>
<div class="form-group"><label>Client Email</label><input id="clientEmail" type="email" placeholder="client@example.com" oninput="autoSave()"></div>
</div>

<div class="section-title">Invoice Details</div>
<div class="form-grid">
<div class="form-group"><label>Invoice Number</label><input id="invNumber" oninput="autoSave()"></div>
<div class="form-group"><label>Invoice Date</label><input id="invDate" type="date" oninput="autoSave()"></div>
<div class="form-group"><label>Due Date</label><input id="invDueDate" type="date" oninput="autoSave()"></div>
<div class="form-group"><label>Payment Terms</label>
<select id="invTerms" onchange="updateDueDate();autoSave()"><option value="15">Net 15</option><option value="30" selected>Net 30</option><option value="45">Net 45</option><option value="60">Net 60</option></select>
</div>
<div class="form-group"><label>PO Number</label><input id="invPO" placeholder="Optional" oninput="autoSave()"></div>
<div class="form-group"><label>Project Name</label><input id="invProject" placeholder="Optional" oninput="autoSave()"></div>
</div>

<div class="section-title">Line Items</div>
<div class="table-wrap">
<table class="line-items-table" id="lineItemsTable">
<thead><tr><th style="width:40px">#</th><th>Description</th><th style="width:70px">Qty</th><th style="width:90px">Unit</th><th style="width:100px">Rate</th><th style="width:100px">Amount</th><th style="width:80px"></th></tr></thead>
<tbody id="lineItemsBody"></tbody>
</table>
</div>
<div style="margin-top:8px">
<button class="btn-primary btn-sm" onclick="addLineItem()">+ Add Line Item</button>
</div>

<div class="totals-section">
<div class="totals-table">
<div class="row"><span>Subtotal</span><span id="subtotalDisplay">$0.00</span></div>
<div class="row" style="display:flex;gap:8px;align-items:center">
<span>Discount</span>
<input id="invDiscount" type="number" min="0" step="0.01" value="0" style="width:80px;min-height:36px;font-size:.85rem;text-align:right" oninput="recalc();autoSave()">
</div>
<div class="row" style="display:flex;gap:8px;align-items:center">
<span>Tax Rate (%)</span>
<input id="invTaxRate" type="number" min="0" step="0.01" value="0" style="width:80px;min-height:36px;font-size:.85rem;text-align:right" oninput="recalc();autoSave()">
</div>
<div class="row"><span>Tax Amount</span><span id="taxDisplay">$0.00</span></div>
<div class="row" style="display:flex;gap:8px;align-items:center">
<span>Retainage (%)</span>
<input id="invRetainage" type="number" min="0" max="100" step="0.5" value="0" style="width:80px;min-height:36px;font-size:.85rem;text-align:right" oninput="recalc();autoSave()">
</div>
<div class="row"><span>Retainage</span><span id="retainageDisplay">$0.00</span></div>
<div class="row total"><span>Total Due</span><span id="totalDisplay">$0.00</span></div>
</div>
</div>

<div class="section-title">Notes / Terms</div>
<textarea id="invNotes" rows="3" placeholder="Payment terms, notes, thank you message..." oninput="autoSave()"></textarea>

<div style="margin-top:16px;display:flex;gap:8px;flex-wrap:wrap">
<button class="btn-primary" onclick="saveInvoice()">Save Invoice</button>
<button class="btn-orange" onclick="switchTab('preview')">Preview</button>
<button class="btn-green btn-sm" onclick="downloadPNG()">Download PNG</button>
<button class="btn-ghost btn-sm" onclick="copyText()">Copy as Text</button>
</div>
</div>

<div class="panel" id="panel-preview">
<div class="invoice-preview" id="invoicePreview"></div>
</div>

<div class="panel" id="panel-history">
<div id="historyList"></div>
</div>
</div>

<script>
const STORAGE_PREFIX='korb_invoice_';
let lineItems=[];
let invoiceHistory=[];
let currentInvoiceId=null;
let logoDataUrl=null;
let nextInvoiceNum=1001;

function genId(){return'inv_'+Date.now()+'_'+Math.random().toString(36).slice(2,8)}

function fmt$(n){return'$'+parseFloat(n||0).toLocaleString(undefined,{minimumFractionDigits:2,maximumFractionDigits:2})}

function escH(s){return s?s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'):''}

function addLineItem(desc='',qty=1,unit='hours',rate=0){
lineItems.push({id:genId(),description:desc,quantity:qty,unit:unit,rate:rate});
renderLineItems();
}

function removeLineItem(id){
lineItems=lineItems.filter(li=>li.id!==id);
renderLineItems();
}

function moveLineItem(id,dir){
let idx=lineItems.findIndex(li=>li.id===id);
let ni=idx+dir;
if(ni<0||ni>=lineItems.length)return;
[lineItems[idx],lineItems[ni]]=[lineItems[ni],lineItems[idx]];
renderLineItems();
}

function renderLineItems(){
let tbody=document.getElementById('lineItemsBody');
let html='';
lineItems.forEach((li,i)=>{
let amt=(parseFloat(li.quantity)||0)*(parseFloat(li.rate)||0);
html+=`<tr>
<td style="text-align:center;color:#64748b">${i+1}</td>
<td><input value="${escH(li.description)}" placeholder="Description" onchange="updateLI('${li.id}','description',this.value)"></td>
<td><input type="number" value="${li.quantity}" min="0" step="0.01" onchange="updateLI('${li.id}','quantity',this.value)" style="text-align:right"></td>
<td><select onchange="updateLI('${li.id}','unit',this.value)">
<option value="hours"${li.unit==='hours'?' selected':''}>Hours</option>
<option value="each"${li.unit==='each'?' selected':''}>Each</option>
<option value="LS"${li.unit==='LS'?' selected':''}>LS</option>
<option value="day"${li.unit==='day'?' selected':''}>Day</option>
</select></td>
<td><input type="number" value="${li.rate}" min="0" step="0.01" onchange="updateLI('${li.id}','rate',this.value)" style="text-align:right"></td>
<td class="amount-cell">${fmt$(amt)}</td>
<td style="display:flex;gap:2px;padding:6px">
<button class="btn-ghost btn-sm" onclick="moveLineItem('${li.id}',-1)" title="Up">&uarr;</button>
<button class="btn-ghost btn-sm" onclick="moveLineItem('${li.id}',1)" title="Down">&darr;</button>
<button class="btn-red btn-sm" onclick="removeLineItem('${li.id}')" title="Remove">&times;</button>
</td></tr>`;
});
tbody.innerHTML=html;
recalc();
}

function updateLI(id,field,val){
let li=lineItems.find(l=>l.id===id);
if(li){li[field]=val;renderLineItems();autoSave()}
}

function recalc(){
let subtotal=0;
lineItems.forEach(li=>{subtotal+=(parseFloat(li.quantity)||0)*(parseFloat(li.rate)||0)});
let discount=parseFloat(document.getElementById('invDiscount').value)||0;
let afterDiscount=subtotal-discount;
let taxRate=parseFloat(document.getElementById('invTaxRate').value)||0;
let tax=afterDiscount*(taxRate/100);
let retainagePct=parseFloat(document.getElementById('invRetainage').value)||0;
let retainage=(afterDiscount+tax)*(retainagePct/100);
let total=afterDiscount+tax-retainage;

document.getElementById('subtotalDisplay').textContent=fmt$(subtotal);
document.getElementById('taxDisplay').textContent=fmt$(tax);
document.getElementById('retainageDisplay').textContent=fmt$(retainage);
document.getElementById('totalDisplay').textContent=fmt$(total);
}

function updateDueDate(){
let dateVal=document.getElementById('invDate').value;
if(!dateVal)return;
let d=new Date(dateVal);
let terms=parseInt(document.getElementById('invTerms').value)||30;
d.setDate(d.getDate()+terms);
document.getElementById('invDueDate').value=d.toISOString().split('T')[0];
}

function handleLogo(e){
let file=e.target.files[0];if(!file)return;
let reader=new FileReader();
reader.onload=function(ev){
logoDataUrl=ev.target.result;
let img=document.getElementById('logoPreview');
img.src=logoDataUrl;img.classList.remove('hidden');
autoSave();
};
reader.readAsDataURL(file);
}

function getInvoiceData(){
let subtotal=0;
lineItems.forEach(li=>{subtotal+=(parseFloat(li.quantity)||0)*(parseFloat(li.rate)||0)});
let discount=parseFloat(document.getElementById('invDiscount').value)||0;
let taxRate=parseFloat(document.getElementById('invTaxRate').value)||0;
let tax=(subtotal-discount)*(taxRate/100);
let retainagePct=parseFloat(document.getElementById('invRetainage').value)||0;
let retainage=(subtotal-discount+tax)*(retainagePct/100);
return{
company:{name:document.getElementById('compName').value,address:document.getElementById('compAddress').value,phone:document.getElementById('compPhone').value,email:document.getElementById('compEmail').value,logo:logoDataUrl},
client:{name:document.getElementById('clientName').value,company:document.getElementById('clientCompany').value,address:document.getElementById('clientAddress').value,email:document.getElementById('clientEmail').value},
invoice:{number:document.getElementById('invNumber').value,date:document.getElementById('invDate').value,dueDate:document.getElementById('invDueDate').value,terms:document.getElementById('invTerms').value,po:document.getElementById('invPO').value,project:document.getElementById('invProject').value},
lineItems:JSON.parse(JSON.stringify(lineItems)),
discount,taxRate,retainagePct,
subtotal,tax,retainage,
total:subtotal-discount+tax-retainage,
notes:document.getElementById('invNotes').value,
paid:false
};
}

function renderPreview(){
let d=getInvoiceData();
let dateStr=d.invoice.date?new Date(d.invoice.date+'T12:00:00').toLocaleDateString('en-US',{year:'numeric',month:'long',day:'numeric'}):'';
let dueDateStr=d.invoice.dueDate?new Date(d.invoice.dueDate+'T12:00:00').toLocaleDateString('en-US',{year:'numeric',month:'long',day:'numeric'}):'';

let html=`<div class="inv-header"><div>`;
if(d.company.logo)html+=`<img src="${d.company.logo}" style="max-width:180px;max-height:60px;margin-bottom:8px;display:block">`;
html+=`<div class="company-name">${escH(d.company.name)}</div>`;
if(d.company.address)html+=`<div style="color:#666;font-size:.8rem">${escH(d.company.address)}</div>`;
if(d.company.phone)html+=`<div style="color:#666;font-size:.8rem">${escH(d.company.phone)}</div>`;
if(d.company.email)html+=`<div style="color:#666;font-size:.8rem">${escH(d.company.email)}</div>`;
html+=`</div><div class="inv-meta"><div class="inv-title">INVOICE</div>`;
html+=`<div><strong>#${escH(d.invoice.number)}</strong></div>`;
html+=`<div>Date: ${dateStr}</div>`;
html+=`<div>Due: ${dueDateStr}</div>`;
if(d.invoice.terms)html+=`<div>Terms: Net ${d.invoice.terms}</div>`;
if(d.invoice.po)html+=`<div>PO: ${escH(d.invoice.po)}</div>`;
if(d.invoice.project)html+=`<div>Project: ${escH(d.invoice.project)}</div>`;
html+=`</div></div>`;

html+=`<div class="inv-addresses"><div><div class="label">Bill To</div>`;
html+=`<strong>${escH(d.client.name)}</strong>`;
if(d.client.company)html+=`<div>${escH(d.client.company)}</div>`;
if(d.client.address)html+=`<div>${escH(d.client.address)}</div>`;
if(d.client.email)html+=`<div>${escH(d.client.email)}</div>`;
html+=`</div><div><div class="label">From</div>`;
html+=`<strong>${escH(d.company.name)}</strong>`;
if(d.company.address)html+=`<div>${escH(d.company.address)}</div>`;
html+=`</div></div>`;

html+=`<table><thead><tr><th>#</th><th>Description</th><th>Qty</th><th>Unit</th><th>Rate</th><th>Amount</th></tr></thead><tbody>`;
d.lineItems.forEach((li,i)=>{
let amt=(parseFloat(li.quantity)||0)*(parseFloat(li.rate)||0);
html+=`<tr><td>${i+1}</td><td>${escH(li.description)}</td><td>${li.quantity}</td><td>${li.unit}</td><td>${fmt$(li.rate)}</td><td>${fmt$(amt)}</td></tr>`;
});
html+=`</tbody></table>`;

html+=`<div class="inv-totals"><div class="inv-totals-table">`;
html+=`<div class="row"><span>Subtotal</span><span>${fmt$(d.subtotal)}</span></div>`;
if(d.discount>0)html+=`<div class="row"><span>Discount</span><span>-${fmt$(d.discount)}</span></div>`;
if(d.taxRate>0)html+=`<div class="row"><span>Tax (${d.taxRate}%)</span><span>${fmt$(d.tax)}</span></div>`;
if(d.retainagePct>0)html+=`<div class="row"><span>Retainage (${d.retainagePct}%)</span><span>-${fmt$(d.retainage)}</span></div>`;
html+=`<div class="row total"><span>Total Due</span><span>${fmt$(d.total)}</span></div>`;
html+=`</div></div>`;

if(d.notes)html+=`<div class="inv-notes"><strong>Notes:</strong><br>${escH(d.notes).replace(/\n/g,'<br>')}</div>`;
html+=`<div class="inv-footer">Thank you for your business. | ${escH(d.company.name)}</div>`;

document.getElementById('invoicePreview').innerHTML=html;
}

function saveInvoice(){
let data=getInvoiceData();
let id=currentInvoiceId||genId();
data.id=id;data.savedAt=new Date().toISOString();
let existing=invoiceHistory.findIndex(h=>h.id===id);
if(existing>=0){
data.paid=invoiceHistory[existing].paid;
invoiceHistory[existing]=data;
}else{
invoiceHistory.unshift(data);
}
currentInvoiceId=id;
saveAll();renderStats();
alert('Invoice saved!');
}

function loadInvoiceData(data){
currentInvoiceId=data.id||null;
document.getElementById('compName').value=data.company.name||'Korb Engineering';
document.getElementById('compAddress').value=data.company.address||'';
document.getElementById('compPhone').value=data.company.phone||'';
document.getElementById('compEmail').value=data.company.email||'';
logoDataUrl=data.company.logo||null;
let lp=document.getElementById('logoPreview');
if(logoDataUrl){lp.src=logoDataUrl;lp.classList.remove('hidden')}else{lp.classList.add('hidden')}
document.getElementById('clientName').value=data.client.name||'';
document.getElementById('clientCompany').value=data.client.company||'';
document.getElementById('clientAddress').value=data.client.address||'';
document.getElementById('clientEmail').value=data.client.email||'';
document.getElementById('invNumber').value=data.invoice.number||'';
document.getElementById('invDate').value=data.invoice.date||'';
document.getElementById('invDueDate').value=data.invoice.dueDate||'';
document.getElementById('invTerms').value=data.invoice.terms||'30';
document.getElementById('invPO').value=data.invoice.po||'';
document.getElementById('invProject').value=data.invoice.project||'';
lineItems=data.lineItems||[];
document.getElementById('invDiscount').value=data.discount||0;
document.getElementById('invTaxRate').value=data.taxRate||0;
document.getElementById('invRetainage').value=data.retainagePct||0;
document.getElementById('invNotes').value=data.notes||'';
renderLineItems();
}

function newInvoice(){
currentInvoiceId=null;
let compName=document.getElementById('compName').value;
let compAddr=document.getElementById('compAddress').value;
let compPhone=document.getElementById('compPhone').value;
let compEmail=document.getElementById('compEmail').value;
lineItems=[];
document.getElementById('clientName').value='';
document.getElementById('clientCompany').value='';
document.getElementById('clientAddress').value='';
document.getElementById('clientEmail').value='';
nextInvoiceNum++;
document.getElementById('invNumber').value='INV-'+nextInvoiceNum;
let today=new Date().toISOString().split('T')[0];
document.getElementById('invDate').value=today;
document.getElementById('invTerms').value='30';
updateDueDate();
document.getElementById('invPO').value='';
document.getElementById('invProject').value='';
document.getElementById('invDiscount').value=0;
document.getElementById('invTaxRate').value=0;
document.getElementById('invRetainage').value=0;
document.getElementById('invNotes').value='';
renderLineItems();
switchTab('editor');
}

function renderHistory(){
let el=document.getElementById('historyList');
if(!invoiceHistory.length){el.innerHTML='<p style="color:#64748b;padding:20px">No saved invoices.</p>';return}
let html='';
invoiceHistory.forEach(inv=>{
let badge=inv.paid?'<span class="paid-badge">PAID</span>':'<span class="unpaid-badge">UNPAID</span>';
let dateStr=inv.invoice.date?new Date(inv.invoice.date+'T12:00:00').toLocaleDateString():'';
html+=`<div class="history-item">
<div class="hi-info">
<div class="hi-num">#${escH(inv.invoice.number)} ${badge}</div>
<div class="hi-client">${escH(inv.client.name||'No client')} | ${dateStr}</div>
${inv.invoice.project?'<div class="hi-client">Project: '+escH(inv.invoice.project)+'</div>':''}
</div>
<div class="hi-amount">${fmt$(inv.total)}</div>
<div class="hi-actions">
<button class="btn-ghost btn-sm" onclick="loadSavedInvoice('${inv.id}')">Edit</button>
<button class="btn-ghost btn-sm" onclick="duplicateInvoice('${inv.id}')">Duplicate</button>
<button class="btn-sm ${inv.paid?'btn-orange':'btn-green'}" onclick="togglePaid('${inv.id}')">${inv.paid?'Mark Unpaid':'Mark Paid'}</button>
<button class="btn-red btn-sm" onclick="deleteInvoice('${inv.id}')">&times;</button>
</div></div>`;
});
el.innerHTML=html;
}

function loadSavedInvoice(id){
let inv=invoiceHistory.find(h=>h.id===id);if(!inv)return;
loadInvoiceData(inv);switchTab('editor');
}

function duplicateInvoice(id){
let inv=invoiceHistory.find(h=>h.id===id);if(!inv)return;
let dup=JSON.parse(JSON.stringify(inv));
dup.id=null;
nextInvoiceNum++;
dup.invoice.number='INV-'+nextInvoiceNum;
dup.invoice.date=new Date().toISOString().split('T')[0];
dup.paid=false;
loadInvoiceData(dup);
currentInvoiceId=null;
switchTab('editor');
}

function togglePaid(id){
let inv=invoiceHistory.find(h=>h.id===id);
if(inv){inv.paid=!inv.paid;saveAll();renderHistory();renderStats()}
}

function deleteInvoice(id){
if(!confirm('Delete this invoice?'))return;
invoiceHistory=invoiceHistory.filter(h=>h.id!==id);
if(currentInvoiceId===id)currentInvoiceId=null;
saveAll();renderHistory();renderStats();
}

function renderStats(){
let totalInvoiced=0,totalPaid=0,outstanding=0;
invoiceHistory.forEach(inv=>{
totalInvoiced+=inv.total||0;
if(inv.paid)totalPaid+=inv.total||0;
else outstanding+=inv.total||0;
});
document.getElementById('statsBar').innerHTML=`
<div class="stat-card"><div class="label">Total Invoiced</div><div class="value" style="color:var(--cyan)">${fmt$(totalInvoiced)}</div></div>
<div class="stat-card"><div class="label">Total Paid</div><div class="value" style="color:var(--green)">${fmt$(totalPaid)}</div></div>
<div class="stat-card"><div class="label">Outstanding</div><div class="value" style="color:var(--orange)">${fmt$(outstanding)}</div></div>
<div class="stat-card"><div class="label">Invoices</div><div class="value">${invoiceHistory.length}</div></div>`;
}

function switchTab(tab){
document.querySelectorAll('.tab').forEach(t=>t.classList.toggle('active',t.dataset.tab===tab));
document.querySelectorAll('.panel').forEach(p=>p.classList.toggle('active',p.id==='panel-'+tab));
if(tab==='preview')renderPreview();
if(tab==='history')renderHistory();
}

function downloadPNG(){
renderPreview();
switchTab('preview');
setTimeout(()=>{
let el=document.getElementById('invoicePreview');
// Use canvas rendering
let canvas=document.createElement('canvas');
let scale=2;
canvas.width=el.offsetWidth*scale;
canvas.height=el.offsetHeight*scale;
let ctx=canvas.getContext('2d');
ctx.scale(scale,scale);
ctx.fillStyle='#ffffff';
ctx.fillRect(0,0,el.offsetWidth,el.offsetHeight);

// Convert to image via SVG foreignObject
let data=`<svg xmlns="http://www.w3.org/2000/svg" width="${el.offsetWidth}" height="${el.offsetHeight}">
<foreignObject width="100%" height="100%">
<div xmlns="http://www.w3.org/1999/xhtml" style="font-family:monospace;font-size:13px">${el.innerHTML}</div>
</foreignObject></svg>`;
let img=new Image();
let svgBlob=new Blob([data],{type:'image/svg+xml;charset=utf-8'});
let url=URL.createObjectURL(svgBlob);
img.onload=function(){
ctx.drawImage(img,0,0);
URL.revokeObjectURL(url);
canvas.toBlob(function(blob){
if(!blob){alert('PNG export requires a compatible browser. Try Print instead.');return}
let a=document.createElement('a');
a.href=URL.createObjectURL(blob);
a.download='invoice-'+document.getElementById('invNumber').value+'.png';
a.click();URL.revokeObjectURL(a.href);
},'image/png');
};
img.onerror=function(){
alert('PNG generation encountered an issue. Please use Print (Ctrl+P) to save as PDF instead.');
};
img.src=url;
},200);
}

function copyText(){
let d=getInvoiceData();
let text=`INVOICE #${d.invoice.number}\n`;
text+=`${d.company.name}\n`;
if(d.company.address)text+=d.company.address+'\n';
text+=`\nDate: ${d.invoice.date}\nDue: ${d.invoice.dueDate}\n`;
if(d.invoice.po)text+=`PO: ${d.invoice.po}\n`;
if(d.invoice.project)text+=`Project: ${d.invoice.project}\n`;
text+=`\nBill To: ${d.client.name}\n`;
if(d.client.company)text+=d.client.company+'\n';
if(d.client.address)text+=d.client.address+'\n';
text+=`\n${'Description'.padEnd(30)} ${'Qty'.padStart(6)} ${'Unit'.padEnd(6)} ${'Rate'.padStart(10)} ${'Amount'.padStart(12)}\n`;
text+='-'.repeat(70)+'\n';
d.lineItems.forEach(li=>{
let amt=(parseFloat(li.quantity)||0)*(parseFloat(li.rate)||0);
text+=`${(li.description||'').padEnd(30).slice(0,30)} ${String(li.quantity).padStart(6)} ${li.unit.padEnd(6)} ${fmt$(li.rate).padStart(10)} ${fmt$(amt).padStart(12)}\n`;
});
text+='-'.repeat(70)+'\n';
text+=`${'Subtotal:'.padStart(58)} ${fmt$(d.subtotal).padStart(12)}\n`;
if(d.discount>0)text+=`${'Discount:'.padStart(58)} -${fmt$(d.discount).padStart(11)}\n`;
if(d.taxRate>0)text+=`${('Tax ('+d.taxRate+'%):').padStart(58)} ${fmt$(d.tax).padStart(12)}\n`;
if(d.retainagePct>0)text+=`${('Retainage ('+d.retainagePct+'%):').padStart(58)} -${fmt$(d.retainage).padStart(11)}\n`;
text+=`${'TOTAL DUE:'.padStart(58)} ${fmt$(d.total).padStart(12)}\n`;
if(d.notes)text+=`\nNotes: ${d.notes}\n`;

navigator.clipboard.writeText(text).then(()=>alert('Invoice text copied!')).catch(()=>{
let ta=document.createElement('textarea');ta.value=text;document.body.appendChild(ta);ta.select();document.execCommand('copy');ta.remove();alert('Copied!');
});
}

let autoSaveTimer=null;
function autoSave(){clearTimeout(autoSaveTimer);autoSaveTimer=setTimeout(saveAll,1000)}

function saveAll(){
try{
localStorage.setItem(STORAGE_PREFIX+'history',JSON.stringify(invoiceHistory));
localStorage.setItem(STORAGE_PREFIX+'nextNum',nextInvoiceNum);
// Save current working draft
let draft=getInvoiceData();
draft.id=currentInvoiceId;
localStorage.setItem(STORAGE_PREFIX+'draft',JSON.stringify(draft));
}catch(e){}
}

function loadAll(){
try{
let h=localStorage.getItem(STORAGE_PREFIX+'history');
if(h)invoiceHistory=JSON.parse(h);
let n=localStorage.getItem(STORAGE_PREFIX+'nextNum');
if(n)nextInvoiceNum=parseInt(n);
let d=localStorage.getItem(STORAGE_PREFIX+'draft');
if(d){
let draft=JSON.parse(d);
loadInvoiceData(draft);
return;
}
}catch(e){}
// Default setup
document.getElementById('invNumber').value='INV-'+nextInvoiceNum;
let today=new Date().toISOString().split('T')[0];
document.getElementById('invDate').value=today;
updateDueDate();
addLineItem();
}

loadAll();
renderStats();
</script>
