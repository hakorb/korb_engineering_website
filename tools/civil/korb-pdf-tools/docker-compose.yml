version: '3.8'

services:
  korb-pdf:
    image: frooodle/s-pdf:latest
    container_name: korb-pdf-tools
    ports:
      - "8080:8080"
    volumes:
      - ./configs:/configs
      - ./custom-files:/customFiles
      - ./logs:/logs
      - ./pipeline:/pipeline
    environment:
      - DOCKER_ENABLE_SECURITY=false
      - INSTALL_BOOK_AND_ADVANCED_HTML_OPS=false
      - LANGS=en_GB
      - APP_LOCALE=en_GB
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:8080/ || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s
