// ============================================================================
// IndexedDB for photo storage
// ============================================================================
const DB_NAME='korb_pci_photos';
const DB_VERSION=1;
const DB_STORE='photos';
let photoDB=null;

function openPhotoDB(){
  return new Promise((resolve,reject)=>{
    if(photoDB){resolve(photoDB);return}
    const req=indexedDB.open(DB_NAME,DB_VERSION);
    req.onupgradeneeded=e=>{
      const db=e.target.result;
      if(!db.objectStoreNames.contains(DB_STORE)){
        db.createObjectStore(DB_STORE,{keyPath:'id'});
      }
    };
    req.onsuccess=e=>{photoDB=e.target.result;resolve(photoDB)};
    req.onerror=e=>reject(e.target.error);
  });
}

async function savePhoto(id,dataUrl){
  const db=await openPhotoDB();
  return new Promise((resolve,reject)=>{
    const tx=db.transaction(DB_STORE,'readwrite');
    tx.objectStore(DB_STORE).put({id,data:dataUrl,timestamp:Date.now()});
    tx.oncomplete=()=>resolve();
    tx.onerror=e=>reject(e.target.error);
  });
}

async function getPhoto(id){
  const db=await openPhotoDB();
  return new Promise((resolve,reject)=>{
    const tx=db.transaction(DB_STORE,'readonly');
    const req=tx.objectStore(DB_STORE).get(id);
    req.onsuccess=()=>resolve(req.result?req.result.data:null);
    req.onerror=e=>reject(e.target.error);
  });
}

async function deletePhoto(id){
  const db=await openPhotoDB();
  return new Promise((resolve,reject)=>{
    const tx=db.transaction(DB_STORE,'readwrite');
    tx.objectStore(DB_STORE).delete(id);
    tx.oncomplete=()=>resolve();
    tx.onerror=e=>reject(e.target.error);
  });
}

function compressImage(file,maxWidth=800,quality=0.7){
  return new Promise((resolve,reject)=>{
    const reader=new FileReader();
    reader.onload=e=>{
      const img=new Image();
      img.onload=()=>{
        const canvas=document.createElement('canvas');
        let w=img.width,h=img.height;
        if(w>maxWidth){h=h*(maxWidth/w);w=maxWidth}
        canvas.width=w;canvas.height=h;
        const ctx=canvas.getContext('2d');
        ctx.drawImage(img,0,0,w,h);
        resolve(canvas.toDataURL('image/jpeg',quality));
      };
      img.onerror=reject;
      img.src=e.target.result;
    };
    reader.onerror=reject;
    reader.readAsDataURL(file);
  });
}

// Combined deduct curves
const DEDUCT_CURVES={...AC_DEDUCT_CURVES,...PCC_DEDUCT_CURVES};

// ============================================================================
// Criteria mode definitions
// ============================================================================
const CRITERIA_MODES={
  d6433:{label:'Standard (ASTM D6433 Roads)',short:'D6433',badge:'badge-d6433',desc:'Standard PCI for roads and parking lots per ASTM D6433-23'},
  d5340:{label:'Airfield (ASTM D5340)',short:'D5340',badge:'badge-d5340',desc:'PCI for airfield pavements per ASTM D5340-20'},
  usace:{label:'USACE / Military',short:'USACE',badge:'badge-usace',desc:'US Army Corps of Engineers MicroPAVER methodology per TM 5-623 / UFC 3-270-06'},
};

// ============================================================================
// Core functions
// ============================================================================
function loadState(){try{return JSON.parse(localStorage.getItem(LS))||{inspections:[]}}catch{return{inspections:[]}}}
function saveState(){localStorage.setItem(LS,JSON.stringify(state))}
function genId(){return Date.now().toString(36)+Math.random().toString(36).slice(2,7)}

function getDistressTypes(surfaceType){
  if(!surfaceType)return AC_DISTRESS_TYPES;
  const s=surfaceType.toLowerCase();
  if(s.includes('pcc')||s.includes('concrete')||s.includes('jointed')||s.includes('continuously'))return PCC_DISTRESS_TYPES;
  return AC_DISTRESS_TYPES;
}

function isPCC(surfaceType){
  if(!surfaceType)return false;
  const s=surfaceType.toLowerCase();
  return s.includes('pcc')||s.includes('portland')||s.includes('jointed')||s.includes('continuously');
}

function getDeductValue(distressId,severity,density){
  const curve=DEDUCT_CURVES[distressId];
  if(!curve)return 0;
  const vals=curve[severity]||curve.L;
  const idx=density/12.5;
  const lo=Math.floor(idx);const hi=Math.min(lo+1,vals.length-1);
  const frac=idx-lo;
  return vals[lo]+(vals[hi]-vals[lo])*frac;
}

function computePCI(distresses,sampleArea){
  if(!distresses.length||!sampleArea)return{pci:100,rating:'Good',maxCDV:0,deducts:[],tdv:0,q:0};
  const deducts=distresses.map(d=>{
    const density=(d.quantity/sampleArea)*100;
    return{...d,density,deductValue:getDeductValue(d.distressId,d.severity,Math.min(density,100))};
  });
  const dvs=deducts.map(d=>d.deductValue).filter(d=>d>0).sort((a,b)=>b-a);
  if(dvs.length===0)return{pci:100,rating:'Good',maxCDV:0,deducts,tdv:0,q:0};
  let maxCDV=0;let bestQ=1;let bestTDV=0;
  const m=1+(9/98)*(100-Math.max(...dvs));
  const q=Math.min(dvs.length,Math.floor(m));
  for(let i=q;i>=1;i--){
    const tdv=dvs.slice(0,i).reduce((a,b)=>a+b,0);
    const cdv=Math.max(0,tdv*(1-0.004*(i-1)*tdv/100));
    if(cdv>maxCDV){maxCDV=cdv;bestQ=i;bestTDV=tdv}
  }
  const pci=Math.max(0,Math.min(100,100-maxCDV));
  let rating;
  if(pci>=86)rating='Good';
  else if(pci>=71)rating='Satisfactory';
  else if(pci>=56)rating='Fair';
  else if(pci>=41)rating='Poor';
  else if(pci>=26)rating='Very Poor';
  else if(pci>=11)rating='Serious';
  else rating='Failed';
  return{pci,rating,maxCDV,deducts,tdv:bestTDV,q:bestQ};
}

const RATING_COLORS={Good:'#10b981',Satisfactory:'#22d3ee',Fair:'#f59e0b',Poor:'#f97316','Very Poor':'#ef4444',Serious:'#dc2626',Failed:'#991b1b'};

function renderTabs(){
  document.getElementById('tabs').innerHTML=TABS.map(t=>`<button class="tab ${tab===t?'active':''}" onclick="tab='${t}';render()">${t}</button>`).join('');
}

function updateHeaderSub(){
  const mode=CRITERIA_MODES[criteriaMode];
  document.getElementById('headerSub').textContent=mode?mode.desc:'ASTM D6433 Pavement Condition Index';
}

function render(){
  renderTabs();
  updateHeaderSub();
  const a=document.getElementById('app');
  ({inspections:renderInspections,assess:renderAssess,results:renderResultsTab,reference:renderReference,report:renderReport})[tab](a);
}

function deleteInsp(i){
  if(confirm('Delete this inspection?')){
    const ins=state.inspections[i];
    // Clean up photos
    if(ins&&ins.distresses){
      ins.distresses.forEach(d=>{if(d.photoId)deletePhoto(d.photoId).catch(()=>{})});
    }
    state.inspections.splice(i,1);
    if(activeInsp>=state.inspections.length)activeInsp=null;
    saveState();render();
  }
}

let pendingPhotoData=null;

function selectDistress(id,name,unit){
  document.getElementById('dfType').value=name;
  document.getElementById('dfId').value=id;
  document.getElementById('dfUnit').value=unit;
  document.getElementById('dfUnitDisp').value=unit;
  showSeverityCriteria();
}

function showSeverityCriteria(){
  const id=parseInt(document.getElementById('dfId').value);
  const sev=document.getElementById('dfSev').value;
  const box=document.getElementById('sevCriteriaBox');
  if(!id||!box)return;
  const allTypes=[...AC_DISTRESS_TYPES,...PCC_DISTRESS_TYPES];
  const dt=allTypes.find(d=>d.id===id);
  if(dt&&dt.sevCriteria){
    box.style.display='block';
    box.innerHTML=`<strong style="color:${SEV_COLORS[sev]}">${SEV_LABELS[sev]} Severity:</strong> ${dt.sevCriteria[sev]}`;
  } else {
    box.style.display='none';
  }
}

function previewDistressPhoto(input){
  if(!input.files||!input.files[0])return;
  compressImage(input.files[0]).then(data=>{
    pendingPhotoData=data;
    const preview=document.getElementById('dfPhotoPreview');
    if(preview){
      preview.innerHTML=`<img src="${data}" style="width:60px;height:60px;object-fit:cover;border-radius:4px;border:1px solid var(--border)">
        <button class="btn btn-red" style="padding:2px 6px;font-size:9px;min-height:28px" onclick="clearPendingPhoto()">X</button>`;
    }
  }).catch(err=>console.error('Photo compress error:',err));
}

function clearPendingPhoto(){
  pendingPhotoData=null;
  const preview=document.getElementById('dfPhotoPreview');
  if(preview)preview.innerHTML='';
  const input=document.getElementById('dfPhoto');
  if(input)input.value='';
}

async function addDistress(){
  if(activeInsp===null)return;
  const id=parseInt(document.getElementById('dfId').value);
  const name=document.getElementById('dfType').value;
  const unit=document.getElementById('dfUnit').value;
  const sev=document.getElementById('dfSev').value;
  const qty=parseFloat(document.getElementById('dfQty').value);
  const locNote=(document.getElementById('dfLocNote')||{}).value||'';
  if(!id||!qty)return;
  if(!state.inspections[activeInsp].distresses)state.inspections[activeInsp].distresses=[];

  let photoId=null;
  if(pendingPhotoData){
    photoId='photo_'+genId();
    try{await savePhoto(photoId,pendingPhotoData)}catch(e){console.error('Photo save error:',e)}
    pendingPhotoData=null;
  }

  state.inspections[activeInsp].distresses.push({distressId:id,name,unit,severity:sev,quantity:qty,photoId,locNote});
  saveState();render();
}

function removeDistress(i){
  if(activeInsp===null)return;
  const d=state.inspections[activeInsp].distresses[i];
  if(d&&d.photoId)deletePhoto(d.photoId).catch(()=>{});
  state.inspections[activeInsp].distresses.splice(i,1);
  saveState();render();
}

function viewPhoto(photoId){
  getPhoto(photoId).then(data=>{
    if(!data)return;
    const w=window.open('','_blank','width=800,height=600');
    w.document.write(`<html><head><title>Distress Photo</title><style>body{margin:0;background:#000;display:flex;align-items:center;justify-content:center;min-height:100vh}img{max-width:100%;max-height:100vh}</style></head><body><img src="${data}"></body></html>`);
  }).catch(()=>{});
}

function getRecommendation(pci){
  if(pci>=86)return'Routine maintenance. Crack sealing, fog sealing, or preventive surface treatments recommended on a scheduled cycle.';
  if(pci>=71)return'Preventive maintenance. Chip seal, slurry seal, thin overlay, or joint resealing within 2-5 years.';
  if(pci>=56)return'Minor rehabilitation. Mill and overlay, partial depth repair, or diamond grinding. Address base drainage if needed.';
  if(pci>=41)return'Major rehabilitation required. Structural overlay, full-depth repair, or major joint/slab repair needed.';
  if(pci>=26)return'Structural overlay or reconstruction. Consider full pavement design analysis. Geotechnical investigation recommended.';
  if(pci>=11)return'Reconstruction required. Complete removal and replacement with new pavement structure. Full design study needed.';
  return'Immediate reconstruction required. Pavement has failed structurally. Emergency repairs for safety until reconstruction.';
}

function drawDVChart(deducts){
  const c=document.getElementById('dvChart');if(!c||!deducts.length)return;
  const ctx=c.getContext('2d'),W=c.width,H=c.height;
  ctx.clearRect(0,0,W,H);ctx.fillStyle='#0f1620';ctx.fillRect(0,0,W,H);
  const mx=60,my=20,pW=W-mx-20,pH=H-my-40;
  const maxDV=Math.max(...deducts.map(d=>d.deductValue||0),10);
  ctx.strokeStyle='#1a2535';ctx.lineWidth=1;ctx.beginPath();ctx.moveTo(mx,my);ctx.lineTo(mx,my+pH);ctx.lineTo(mx+pW,my+pH);ctx.stroke();
  ctx.fillStyle='rgba(226,232,240,0.45)';ctx.font='10px JetBrains Mono';ctx.textAlign='right';
  for(let i=0;i<=4;i++){const v=(maxDV*(4-i)/4).toFixed(0),y=my+(pH*i/4);ctx.fillText(v,mx-5,y+3)}
  const barW=Math.min(40,pW/deducts.length-4);
  deducts.forEach((d,i)=>{
    const x=mx+10+i*(barW+4);const bH=(d.deductValue/maxDV)*pH;const y=my+pH-bH;
    ctx.fillStyle=SEV_COLORS[d.severity]||'#00d4ff';ctx.fillRect(x,y,barW,bH);
    ctx.save();ctx.translate(x+barW/2,my+pH+6);ctx.rotate(Math.PI/4);
    ctx.fillStyle='rgba(226,232,240,0.45)';ctx.font='8px JetBrains Mono';ctx.textAlign='left';
    ctx.fillText(d.name.substring(0,15),0,0);ctx.restore();
  });
}

        <div style="display:flex;font-size:8px;color:var(--dim);margin-top:4px">
          <div style="flex:10;text-align:center">Failed</div>
          <div style="flex:15;text-align:center">Serious</div>
          <div style="flex:15;text-align:center">V.Poor</div>
          <div style="flex:15;text-align:center">Poor</div>
          <div style="flex:15;text-align:center">Fair</div>
          <div style="flex:15;text-align:center">Satisfactory</div>
          <div style="flex:15;text-align:center">Good</div>
        </div>
      </div>
    </div>

    <!-- Distress Details -->
    <div class="card report-section">
      <div class="card-title">Distress Survey Details</div>
      ${sorted.length===0?'<div style="color:var(--muted);text-align:center;padding:20px">No distresses recorded</div>':
      `<div style="overflow-x:auto"><table>
        <thead><tr><th>#</th><th>Distress Type</th><th>Severity</th><th>Quantity</th><th>Density %</th><th>Deduct Value</th><th>Location</th></tr></thead>
        <tbody>${sorted.map((d,i)=>`<tr>
          <td>${i+1}</td>
          <td>${d.name}</td>
          <td class="severity-${d.severity}">${SEV_LABELS[d.severity]}</td>
          <td>${d.quantity} ${d.unit}</td>
          <td>${(d.density||0).toFixed(1)}%</td>
          <td style="color:var(--gold);font-weight:700">${(d.deductValue||0).toFixed(1)}</td>
          <td style="color:var(--dim);font-size:10px">${d.locNote||'--'}</td>
        </tr>`).join('')}</tbody>
      </table></div>`}
    </div>

    <!-- PCI Calculation Breakdown -->
    <div class="card report-section">
      <div class="card-title">PCI Calculation Breakdown</div>
      <div style="font-size:11px;color:var(--dim);line-height:1.8">
        <p><strong style="color:var(--text)">Step 1: Deduct Values</strong></p>
        <p>Individual deduct values determined from ${pType} distress density-severity curves per ${(ins.criteria||'d6433').toUpperCase()}.</p>
        <p>Sorted deduct values (descending): ${sorted.map(d=>(d.deductValue||0).toFixed(1)).join(', ')||'None'}</p>
        <p style="margin-top:8px"><strong style="color:var(--text)">Step 2: Corrected Deduct Value (CDV)</strong></p>
        <p>Maximum allowable deducts (m) = 1 + (9/98) x (100 - HDV)</p>
        <p>Total Deduct Value (TDV) = ${r.tdv.toFixed(1)}</p>
        <p>Number of deducts at q = ${r.q}</p>
        <p>Maximum Corrected Deduct Value = ${r.maxCDV.toFixed(1)}</p>
        <p style="margin-top:8px"><strong style="color:var(--text)">Step 3: PCI</strong></p>
        <p>PCI = 100 - max(CDV) = 100 - ${r.maxCDV.toFixed(1)} = <strong style="color:${RATING_COLORS[r.rating]}">${r.pci.toFixed(1)}</strong></p>
      </div>
    </div>

    <!-- Distress Photos -->
    ${(ins.distresses||[]).some(d=>d.photoId)?`
    <div class="card report-section">
      <div class="card-title">Distress Photographs</div>
      <div style="display:grid;grid-template-columns:repeat(auto-fill,minmax(250px,1fr));gap:16px">
        ${(ins.distresses||[]).filter(d=>d.photoId).map((d,i)=>`
          <div style="border:1px solid var(--border);border-radius:4px;overflow:hidden">
            <img id="rptPhoto_${d.photoId}" src="" style="width:100%;height:180px;object-fit:cover;display:block">
            <div style="padding:8px;font-size:10px">
              <div style="color:var(--gold)">${d.name}</div>
              <div style="color:var(--dim)">Severity: <span class="severity-${d.severity}">${SEV_LABELS[d.severity]}</span> | Qty: ${d.quantity} ${d.unit}</div>
              ${d.locNote?`<div style="color:var(--dim)">${d.locNote}</div>`:''}
            </div>
          </div>
        `).join('')}
      </div>
    </div>`:''}

    <!-- Recommendations -->
    <div class="card report-section">
      <div class="card-title">Recommendations</div>
      <div style="padding:16px;background:var(--bg2);border-radius:4px;border-left:3px solid ${RATING_COLORS[r.rating]}">
        <div style="font-size:12px;color:var(--text);line-height:1.8">${getRecommendation(r.pci)}</div>
      </div>
      <div style="margin-top:16px;font-size:11px;color:var(--dim);line-height:1.8">
        ${r.pci>=71?`<p><strong>Preventive Maintenance Options:</strong></p>
        <ul style="padding-left:20px"><li>Crack sealing and filling</li><li>Fog seal or rejuvenator application</li><li>Chip seal or microsurfacing</li><li>Thin hot-mix overlay (< 2")</li>${isPCC(ins.surfaceType)?'<li>Joint resealing</li><li>Diamond grinding for smoothness</li>':''}</ul>`:''}
        ${r.pci>=41&&r.pci<71?`<p><strong>Rehabilitation Options:</strong></p>
        <ul style="padding-left:20px"><li>Mill and overlay (2-4")</li><li>Full-depth patching of distressed areas</li>${isPCC(ins.surfaceType)?'<li>Full-depth slab repair</li><li>Dowel bar retrofit</li><li>Slab stabilization</li>':'<li>Base repair where needed</li>'}<li>Drainage improvements</li></ul>`:''}
        ${r.pci<41?`<p><strong>Reconstruction Considerations:</strong></p>
        <ul style="padding-left:20px"><li>Full pavement design analysis required</li><li>Geotechnical investigation of subgrade</li><li>Traffic analysis and projected loading</li><li>Consider alternative pavement types</li><li>Drainage system evaluation and redesign</li><li>Budget planning for phased reconstruction if needed</li></ul>`:''}
      </div>
    </div>

    <!-- Footer -->
    <div class="card" style="text-align:center;padding:20px">
      <div style="font-size:10px;color:var(--dim);letter-spacing:0.15em;text-transform:uppercase">Korb Engineering - PCI Inspection Report</div>
      <div style="font-size:9px;color:var(--muted);margin-top:4px">Generated ${new Date().toLocaleDateString('en-US',{year:'numeric',month:'long',day:'numeric'})} | ${(ins.criteria||'d6433').toUpperCase()} Criteria</div>
    </div>`;
}

function buildSummaryReport(){
  const insps=state.inspections||[];
  if(insps.length===0)return'<div class="card"><div style="color:var(--muted);text-align:center;padding:40px">No inspections to summarize</div></div>';

  const summaries=insps.map(ins=>{
    const r=computePCI(ins.distresses||[],ins.sampleArea);
    return{...ins,...r};
  });

  const avgPCI=summaries.reduce((a,s)=>a+s.pci,0)/summaries.length;
  let avgRating;
  if(avgPCI>=86)avgRating='Good';
  else if(avgPCI>=71)avgRating='Satisfactory';
  else if(avgPCI>=56)avgRating='Fair';
  else if(avgPCI>=41)avgRating='Poor';
  else if(avgPCI>=26)avgRating='Very Poor';
  else if(avgPCI>=11)avgRating='Serious';
  else avgRating='Failed';

  return`
    <div class="card report-cover" style="text-align:center;padding:60px 40px">
      <div style="font-size:10px;color:var(--dim);letter-spacing:0.2em;text-transform:uppercase;margin-bottom:20px">Korb Engineering</div>
      <div style="font-size:24px;font-weight:700;color:var(--accent);margin-bottom:8px">PAVEMENT CONDITION INDEX</div>
      <div style="font-size:16px;font-weight:600;color:var(--text);margin-bottom:4px">SUMMARY REPORT</div>
      <div style="width:80px;height:2px;background:var(--accent);margin:20px auto"></div>
      <div style="font-size:13px;color:var(--dim)">Total Sections: ${insps.length} | Date: ${new Date().toLocaleDateString('en-US',{year:'numeric',month:'long',day:'numeric'})}</div>
    </div>

    <div class="card report-section">
      <div class="card-title">Network Summary</div>
      <div style="display:flex;align-items:center;gap:30px;flex-wrap:wrap;justify-content:center;margin-bottom:20px">
        <div style="text-align:center">
          <div style="font-size:48px;font-weight:700;color:${RATING_COLORS[avgRating]}">${Math.round(avgPCI)}</div>
          <div style="font-size:12px;color:${RATING_COLORS[avgRating]};text-transform:uppercase">Average PCI</div>
        </div>
        <div class="stat-grid" style="grid-template-columns:1fr 1fr 1fr">
          <div class="result-box"><div class="result-label">Sections</div><div class="result-value">${insps.length}</div></div>
          <div class="result-box"><div class="result-label">Best PCI</div><div class="result-value" style="color:var(--green)">${Math.round(Math.max(...summaries.map(s=>s.pci)))}</div></div>
          <div class="result-box"><div class="result-label">Worst PCI</div><div class="result-value" style="color:var(--red)">${Math.round(Math.min(...summaries.map(s=>s.pci)))}</div></div>
        </div>
      </div>

      <!-- Rating Scale Bar -->
      <div style="margin:16px 0">
        <div style="display:flex;height:28px;border-radius:4px;overflow:hidden;position:relative">
          <div style="flex:10;background:#991b1b"></div>
          <div style="flex:15;background:#dc2626"></div>
          <div style="flex:15;background:#ef4444"></div>
          <div style="flex:15;background:#f97316"></div>
          <div style="flex:15;background:#f59e0b"></div>
          <div style="flex:15;background:#22d3ee"></div>
          <div style="flex:15;background:#10b981"></div>
          <div style="position:absolute;top:0;bottom:0;left:${avgPCI}%;width:3px;background:#fff;box-shadow:0 0 6px rgba(255,255,255,0.8)"></div>
        </div>
        <div style="display:flex;font-size:8px;color:var(--dim);margin-top:4px">
          <div style="flex:10;text-align:center">Failed</div>
          <div style="flex:15;text-align:center">Serious</div>
          <div style="flex:15;text-align:center">V.Poor</div>
          <div style="flex:15;text-align:center">Poor</div>
          <div style="flex:15;text-align:center">Fair</div>
          <div style="flex:15;text-align:center">Satisfactory</div>
          <div style="flex:15;text-align:center">Good</div>
        </div>
      </div>
    </div>

    <div class="card report-section">
      <div class="card-title">Section Summary Table</div>
      <div style="overflow-x:auto"><table>
        <thead><tr><th>Section</th><th>Street</th><th>Type</th><th>PCI</th><th>Rating</th><th>Distresses</th><th>Date</th><th>Inspector</th></tr></thead>
        <tbody>${summaries.map(s=>`<tr>
          <td style="color:var(--gold)">${s.sectionId}</td>
          <td>${s.street||'--'}</td>
          <td>${s.surfaceType}</td>
          <td style="color:${RATING_COLORS[s.rating]};font-weight:700">${Math.round(s.pci)}</td>
          <td style="color:${RATING_COLORS[s.rating]}">${s.rating}</td>
          <td>${(s.distresses||[]).length}</td>
          <td style="color:var(--dim)">${new Date(s.date).toLocaleDateString()}</td>
          <td style="color:var(--dim)">${s.inspector||'--'}</td>
        </tr>`).join('')}</tbody>
      </table></div>
    </div>

    <div class="card" style="text-align:center;padding:20px">
      <div style="font-size:10px;color:var(--dim);letter-spacing:0.15em;text-transform:uppercase">Korb Engineering - PCI Summary Report</div>
      <div style="font-size:9px;color:var(--muted);margin-top:4px">Generated ${new Date().toLocaleDateString('en-US',{year:'numeric',month:'long',day:'numeric'})}</div>
    </div>`;
}

async function loadReportPhotos(ins){
  for(const d of (ins.distresses||[])){
    if(d.photoId){
      try{
        const data=await getPhoto(d.photoId);
        const el=document.getElementById('rptPhoto_'+d.photoId);
        if(el&&data)el.src=data;
      }catch(e){}
    }
  }
}

function generateSummaryReport(){
  activeInsp=null;
  tab='report';
  render();
}

function exportReportText(){
  let text='';
  text+='================================================================\n';
  text+='  KORB ENGINEERING - PAVEMENT CONDITION INDEX REPORT\n';
  text+='================================================================\n\n';

  if(activeInsp!==null&&state.inspections[activeInsp]){
    const ins=state.inspections[activeInsp];
    const r=computePCI(ins.distresses||[],ins.sampleArea);
    const sorted=(r.deducts||[]).slice().sort((a,b)=>(b.deductValue||0)-(a.deductValue||0));

    text+=`Section ID:    ${ins.sectionId}\n`;
    text+=`Street/Road:   ${ins.street||'--'}\n`;
    text+=`Surface Type:  ${ins.surfaceType}\n`;
    text+=`Criteria:      ${(ins.criteria||'d6433').toUpperCase()}\n`;
    text+=`Sample Area:   ${ins.sampleArea} sq ft\n`;
    text+=`Inspector:     ${ins.inspector||'--'}\n`;
    text+=`Date:          ${new Date(ins.date).toLocaleDateString()}\n`;
    text+=`Weather:       ${ins.weather||'--'}\n`;
    text+=`Notes:         ${ins.notes||'--'}\n\n`;

    text+='--- PCI RESULTS ---\n';
    text+=`PCI Score:     ${r.pci.toFixed(1)}\n`;
    text+=`Rating:        ${r.rating}\n`;
    text+=`Max CDV:       ${r.maxCDV.toFixed(1)}\n`;
    text+=`Total DV:      ${r.tdv.toFixed(1)}\n`;
    text+=`q Value:       ${r.q}\n\n`;

    text+='--- DISTRESS DETAILS ---\n';
    text+=`${'Distress'.padEnd(30)} ${'Sev'.padEnd(6)} ${'Qty'.padEnd(12)} ${'Dens%'.padEnd(8)} ${'DV'.padEnd(8)}\n`;
    text+='-'.repeat(64)+'\n';
    sorted.forEach(d=>{
      text+=`${d.name.padEnd(30)} ${SEV_LABELS[d.severity].padEnd(6)} ${(d.quantity+' '+d.unit).padEnd(12)} ${((d.density||0).toFixed(1)+'%').padEnd(8)} ${(d.deductValue||0).toFixed(1).padEnd(8)}\n`;
    });
    text+='\n--- RECOMMENDATION ---\n';
    text+=getRecommendation(r.pci)+'\n';
  } else {
    text+='SUMMARY OF ALL INSPECTIONS\n';
    text+='-'.repeat(40)+'\n\n';
    state.inspections.forEach(ins=>{
      const r=computePCI(ins.distresses||[],ins.sampleArea);
      text+=`${ins.sectionId.padEnd(12)} ${(ins.street||'--').padEnd(20)} PCI: ${Math.round(r.pci).toString().padEnd(4)} ${r.rating.padEnd(14)} ${(ins.distresses||[]).length} distresses\n`;
    });
  }

  text+='\n================================================================\n';
  text+=`Generated: ${new Date().toLocaleDateString()} | Korb Engineering\n`;
  text+='================================================================\n';

  const a=document.createElement('a');
  a.href=URL.createObjectURL(new Blob([text],{type:'text/plain'}));
  a.download=`korb_pci_report_${activeInsp!==null?state.inspections[activeInsp].sectionId:'summary'}.txt`;
  a.click();
}

// ============================================================================
// Export
// ============================================================================
function exportInspections(){
  let csv='Section ID,Street,Surface,Area (sqft),Date,Inspector,Weather,Criteria,PCI,Rating,Distress Count,Notes\n';
  state.inspections.forEach(ins=>{
    const r=computePCI(ins.distresses||[],ins.sampleArea);
    csv+=`"${ins.sectionId}","${ins.street||''}","${ins.surfaceType}",${ins.sampleArea},"${new Date(ins.date).toLocaleDateString()}","${ins.inspector||''}","${ins.weather||''}","${ins.criteria||'d6433'}",${r.pci.toFixed(1)},"${r.rating}",${(ins.distresses||[]).length},"${ins.notes||''}"\n`;
  });
  const a=document.createElement('a');a.href=URL.createObjectURL(new Blob([csv],{type:'text/csv'}));a.download='korb_pci_inspections.csv';a.click();
}

// ============================================================================
// Initialize
// ============================================================================
openPhotoDB().then(()=>{
  render();
}).catch(()=>{
  render();
});
</script>
</body>
</html>
