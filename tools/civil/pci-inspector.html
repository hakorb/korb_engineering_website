<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PCI Inspector | Korb Engineering</title>
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{--bg:#050a0f;--bg1:#0a1018;--bg2:#0f1620;--card:#111a24;--border:#1a2a3a;--accent:#00d4ff;--gold:#f0a500;--green:#00ff88;--red:#ff3344;--yellow:#ffcc00;--text:#e2e8f0;--dim:rgba(226,232,240,0.45);--muted:rgba(226,232,240,0.25);--font:'JetBrains Mono',monospace}
body{background:var(--bg);color:var(--text);font-family:var(--font);min-height:100vh;font-size:13px}
input,select,textarea{background:var(--bg2);border:1px solid var(--border);color:var(--text);font-family:var(--font);font-size:12px;padding:7px 10px;border-radius:4px;width:100%;outline:none}
input:focus,select:focus{border-color:var(--accent)}
button{font-family:var(--font);cursor:pointer;font-size:11px;letter-spacing:0.05em}
label{display:block;font-size:10px;color:var(--dim);text-transform:uppercase;letter-spacing:0.1em;margin-bottom:4px}
.header{height:52px;background:linear-gradient(180deg,var(--bg2),var(--bg1));border-bottom:1px solid var(--border);display:flex;align-items:center;padding:0 20px;gap:14;position:sticky;top:0;z-index:100}
.header-title{font-size:15px;font-weight:700;color:var(--accent);letter-spacing:0.12em}
.header-sub{font-size:10px;color:var(--dim);letter-spacing:0.15em;text-transform:uppercase;margin-left:8px}
.tabs{display:flex;gap:0;padding:0 20px;border-bottom:1px solid var(--border);overflow-x:auto;background:var(--bg1)}
.tab{padding:10px 18px;background:transparent;border:none;border-bottom:2px solid transparent;color:var(--dim);font-size:10px;letter-spacing:0.1em;text-transform:uppercase;white-space:nowrap;transition:all .2s}
.tab.active{color:var(--accent);border-bottom-color:var(--accent);background:var(--bg2)}
.tab:hover{color:var(--text)}
.body{padding:20px;max-width:1200px;margin:0 auto}
.card{background:var(--card);border:1px solid var(--border);border-radius:6px;padding:20px;margin-bottom:16px}
.card-title{font-size:11px;color:var(--accent);letter-spacing:0.1em;text-transform:uppercase;margin-bottom:14px}
.grid2{display:grid;grid-template-columns:1fr 1fr;gap:16px}
.grid3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:12px}
.grid4{display:grid;grid-template-columns:1fr 1fr 1fr 1fr;gap:12px}
.field{margin-bottom:10px}
.btn{padding:6px 16px;border:1px solid var(--border);border-radius:4px;background:transparent;color:var(--dim);text-transform:uppercase;transition:all .2s}
.btn:hover{border-color:var(--accent);color:var(--accent)}
.btn-primary{border-color:var(--accent);color:var(--accent)}
.btn-gold{border-color:var(--gold);color:var(--gold)}
.btn-green{border-color:var(--green);color:var(--green)}
.btn-red{border-color:var(--red);color:var(--red)}
.result-box{background:var(--bg2);padding:10px;border-radius:4px;border:1px solid var(--border)}
.result-label{font-size:9px;color:var(--dim);text-transform:uppercase;letter-spacing:0.1em}
.result-value{font-size:14px;margin-top:2px}
.stat-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(140px,1fr));gap:8px}
table{width:100%;border-collapse:collapse}
th,td{padding:6px 10px;border-bottom:1px solid var(--border);font-size:11px;text-align:left}
th{color:var(--dim);font-size:9px;text-transform:uppercase;letter-spacing:0.1em}
.severity-L{color:#3b82f6}.severity-M{color:#f59e0b}.severity-H{color:#ef4444}
.rating-Good{color:#10b981}.rating-Satisfactory{color:#22d3ee}.rating-Fair{color:#f59e0b}.rating-Poor{color:#f97316}.rating-VeryPoor{color:#ef4444}.rating-Serious{color:#dc2626}.rating-Failed{color:#991b1b}
.gauge-wrap{display:flex;justify-content:center;align-items:center;padding:20px}
.distress-btn{padding:8px 12px;background:var(--bg2);border:1px solid var(--border);border-radius:4px;color:var(--text);font-size:11px;cursor:pointer;transition:all .2s;text-align:left}
.distress-btn:hover{border-color:var(--accent)}
.distress-btn.selected{border-color:var(--gold);background:rgba(240,165,0,0.1)}
.insp-item{padding:12px;border:1px solid var(--border);border-radius:4px;margin-bottom:8px;background:var(--bg2);cursor:pointer;transition:all .2s}
.insp-item:hover{border-color:var(--accent)}
.insp-item.active{border-color:var(--gold)}
@media(max-width:768px){.grid2,.grid3,.grid4{grid-template-columns:1fr}.body{padding:12px}}
</style>
</head>
<body>

<div class="header">
  <div class="header-title">PCI INSPECTOR</div>
  <div class="header-sub">ASTM D6433-23 Pavement Condition Index</div>
</div>
<div class="tabs" id="tabs"></div>
<div class="body" id="app"></div>
<div style="position:fixed;bottom:10px;right:10px;font-size:10px;color:#00d4ff;opacity:0.5;font-family:'JetBrains Mono',monospace;pointer-events:none;z-index:9999">Korb Engineering</div>

<script>
const LS='korb_pci';
const TABS=['inspections','assess','results','reference'];
let tab='inspections';
let state=loadState();
let activeInsp=null;

// ASTM D6433-23 distress types for asphalt concrete
const DISTRESS_TYPES=[
  {id:1,name:'Alligator Cracking',unit:'sq ft',desc:'Interconnected cracks forming small polygons'},
  {id:2,name:'Bleeding',unit:'sq ft',desc:'Film of bituminous material on surface'},
  {id:3,name:'Block Cracking',unit:'sq ft',desc:'Interconnected cracks dividing pavement into rectangular pieces'},
  {id:4,name:'Bumps and Sags',unit:'lin ft',desc:'Small, localized upward or downward displacements'},
  {id:5,name:'Corrugation',unit:'sq ft',desc:'Ripples across the pavement surface'},
  {id:6,name:'Depression',unit:'sq ft',desc:'Localized low areas of limited size'},
  {id:7,name:'Edge Cracking',unit:'lin ft',desc:'Cracking within 1-2 ft of pavement edge'},
  {id:8,name:'Joint Reflection Cracking',unit:'lin ft',desc:'Cracks over joints in underlying concrete'},
  {id:9,name:'Lane/Shoulder Drop-off',unit:'lin ft',desc:'Elevation difference between pavement edge and shoulder'},
  {id:10,name:'Longitudinal/Transverse Cracking',unit:'lin ft',desc:'Cracks parallel or perpendicular to centerline'},
  {id:11,name:'Patching',unit:'sq ft',desc:'Areas where original pavement has been replaced'},
  {id:12,name:'Polished Aggregate',unit:'sq ft',desc:'Surface aggregates worn smooth by traffic'},
  {id:13,name:'Potholes',unit:'count',desc:'Bowl-shaped holes of various sizes'},
  {id:14,name:'Railroad Crossing',unit:'sq ft',desc:'Depression or bumps around railroad tracks'},
  {id:15,name:'Rutting',unit:'sq ft',desc:'Surface depression in wheel paths'},
  {id:16,name:'Shoving',unit:'sq ft',desc:'Permanent longitudinal surface displacement'},
  {id:17,name:'Slippage Cracking',unit:'sq ft',desc:'Crescent-shaped cracks from braking/turning'},
  {id:18,name:'Swell',unit:'sq ft',desc:'Upward bulge in pavement surface'},
  {id:19,name:'Weathering/Raveling',unit:'sq ft',desc:'Wearing away of surface by loss of binder/aggregate'},
];

const SEVERITY=['L','M','H'];
const SEV_LABELS={L:'Low',M:'Medium',H:'High'};
const SEV_COLORS={L:'#3b82f6',M:'#f59e0b',H:'#ef4444'};

// Deduct value curves (simplified ASTM D6433 approximations)
const DEDUCT_CURVES={
  1:{L:[0,5,10,16,22,28,33,38,42],M:[0,10,20,30,38,45,52,58,63],H:[0,18,33,46,56,64,71,76,80]},
  2:{L:[0,1,2,3,5,6,7,8,9],M:[0,2,5,7,9,11,13,14,16],H:[0,4,8,12,15,18,21,23,25]},
  3:{L:[0,2,5,8,11,14,17,19,22],M:[0,4,9,14,18,22,26,29,33],H:[0,7,14,21,27,32,37,41,45]},
  4:{L:[0,3,7,12,17,22,26,30,34],M:[0,6,14,22,29,35,40,44,48],H:[0,10,22,33,42,50,56,61,65]},
  5:{L:[0,2,4,6,8,10,12,14,16],M:[0,4,8,12,16,20,24,27,30],H:[0,6,12,18,24,30,35,39,43]},
  6:{L:[0,2,5,8,11,14,17,20,23],M:[0,5,10,16,21,26,31,35,39],H:[0,8,17,25,33,40,46,51,55]},
  7:{L:[0,2,4,7,10,13,16,18,21],M:[0,4,9,14,19,24,28,32,36],H:[0,7,14,22,29,36,42,47,52]},
  8:{L:[0,2,5,8,12,15,18,21,24],M:[0,5,10,16,22,27,32,37,41],H:[0,8,17,26,34,41,47,52,56]},
  9:{L:[0,1,3,5,7,9,11,13,15],M:[0,3,6,10,14,17,20,23,26],H:[0,5,10,16,22,27,32,36,40]},
  10:{L:[0,1,3,5,7,10,12,14,16],M:[0,3,7,11,15,19,23,27,30],H:[0,5,11,17,23,29,35,40,44]},
  11:{L:[0,1,3,5,7,9,11,13,15],M:[0,3,6,10,14,17,20,23,26],H:[0,5,10,16,22,27,32,36,40]},
  12:{L:[0,1,2,3,4,5,6,7,8],M:[0,1,2,3,4,5,6,7,8],H:[0,1,2,3,4,5,6,7,8]},
  13:{L:[0,5,12,20,28,35,41,46,50],M:[0,10,22,33,43,51,57,62,66],H:[0,18,35,48,58,65,71,76,80]},
  14:{L:[0,2,5,8,12,16,20,24,28],M:[0,5,10,16,22,28,34,39,44],H:[0,8,17,26,35,43,50,56,61]},
  15:{L:[0,3,7,12,17,22,27,31,35],M:[0,7,15,23,30,37,43,48,53],H:[0,12,24,35,44,52,58,63,67]},
  16:{L:[0,2,5,8,12,16,19,22,25],M:[0,5,10,16,22,28,33,38,42],H:[0,8,17,26,34,41,47,52,56]},
  17:{L:[0,3,7,12,17,22,26,30,34],M:[0,6,14,22,29,35,40,44,48],H:[0,10,22,33,42,50,56,61,65]},
  18:{L:[0,2,5,8,12,16,20,24,28],M:[0,5,10,16,22,28,34,39,44],H:[0,8,17,26,35,43,50,56,61]},
  19:{L:[0,2,5,8,11,14,17,20,23],M:[0,5,10,16,21,26,31,35,39],H:[0,8,17,25,33,40,46,51,55]},
};

function loadState(){try{return JSON.parse(localStorage.getItem(LS))||{inspections:[]}}catch{return{inspections:[]}}}
function saveState(){localStorage.setItem(LS,JSON.stringify(state))}
function genId(){return Date.now().toString(36)+Math.random().toString(36).slice(2,7)}

function getDeductValue(distressId,severity,density){
  const curve=DEDUCT_CURVES[distressId];
  if(!curve)return 0;
  const vals=curve[severity]||curve.L;
  // density 0-100%, interpolate across 9 points (0,12.5,25,...100)
  const idx=density/12.5;
  const lo=Math.floor(idx);const hi=Math.min(lo+1,vals.length-1);
  const frac=idx-lo;
  return vals[lo]+(vals[hi]-vals[lo])*frac;
}

function computePCI(distresses,sampleArea){
  if(!distresses.length||!sampleArea)return{pci:100,rating:'Good',maxCDV:0,deducts:[]};
  const deducts=distresses.map(d=>{
    const density=(d.quantity/sampleArea)*100;
    return{...d,density,deductValue:getDeductValue(d.distressId,d.severity,Math.min(density,100))};
  });
  const dvs=deducts.map(d=>d.deductValue).filter(d=>d>0).sort((a,b)=>b-a);
  if(dvs.length===0)return{pci:100,rating:'Good',maxCDV:0,deducts};
  // Corrected deduct value using iterative method
  let maxCDV=0;
  const m=1+(9/98)*(100-Math.max(...dvs));
  const q=Math.min(dvs.length,Math.floor(m));
  for(let i=q;i>=1;i--){
    const tdv=dvs.slice(0,i).reduce((a,b)=>a+b,0);
    // CDV approximation: CDV = a*TDV^2 + b*TDV for q value
    const cdv=Math.max(0,tdv*(1-0.004*(i-1)*tdv/100));
    maxCDV=Math.max(maxCDV,cdv);
  }
  const pci=Math.max(0,Math.min(100,100-maxCDV));
  let rating;
  if(pci>=86)rating='Good';
  else if(pci>=71)rating='Satisfactory';
  else if(pci>=56)rating='Fair';
  else if(pci>=41)rating='Poor';
  else if(pci>=26)rating='Very Poor';
  else if(pci>=11)rating='Serious';
  else rating='Failed';
  return{pci,rating,maxCDV,deducts};
}

const RATING_COLORS={Good:'#10b981',Satisfactory:'#22d3ee',Fair:'#f59e0b',Poor:'#f97316','Very Poor':'#ef4444',Serious:'#dc2626',Failed:'#991b1b'};

function renderTabs(){document.getElementById('tabs').innerHTML=TABS.map(t=>`<button class="tab ${tab===t?'active':''}" onclick="tab='${t}';render()">${t}</button>`).join('')}
function render(){renderTabs();const a=document.getElementById('app');({inspections:renderInspections,assess:renderAssess,results:renderResultsTab,reference:renderReference})[tab](a)}

function renderInspections(el){
  const insps=state.inspections||[];
  el.innerHTML=`
    <div class="card"><div class="card-title">New Inspection</div>
      <div class="grid3">
        <div class="field"><label>Section ID</label><input id="nSec" placeholder="SEC-001"></div>
        <div class="field"><label>Street / Road</label><input id="nStreet" placeholder="Main Street"></div>
        <div class="field"><label>Surface Type</label><select id="nSurface"><option>Asphalt Concrete</option><option>PCC (Jointed)</option><option>PCC (Continuously Reinforced)</option></select></div>
      </div>
      <div class="grid4">
        <div class="field"><label>Sample Area (sq ft)</label><input id="nArea" type="number" value="2500" placeholder="2500"></div>
        <div class="field"><label>Length (ft)</label><input id="nLen" type="number" placeholder="100"></div>
        <div class="field"><label>Width (ft)</label><input id="nWid" type="number" placeholder="25"></div>
        <div class="field"><label>Inspector</label><input id="nInsp" placeholder="Name"></div>
      </div>
      <div class="field"><label>Notes</label><input id="nNotes" placeholder="Weather, traffic, conditions..."></div>
      <button class="btn btn-green" onclick="createInspection()">Create Inspection</button>
    </div>
    <div class="card"><div class="card-title">Inspection History (${insps.length})</div>
      ${insps.length===0?'<div style="color:var(--muted);text-align:center;padding:30px">No inspections yet</div>':
      insps.map((ins,i)=>{
        const r=computePCI(ins.distresses||[],ins.sampleArea);
        return`<div class="insp-item ${activeInsp===i?'active':''}" onclick="activeInsp=${i};tab='assess';render()">
          <div style="display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:8px">
            <div>
              <span style="color:var(--gold)">${ins.sectionId}</span>
              <span style="color:var(--dim);margin-left:8px">${ins.street||''}</span>
              <span style="color:var(--muted);margin-left:8px;font-size:10px">${new Date(ins.date).toLocaleDateString()}</span>
            </div>
            <div style="display:flex;align-items:center;gap:12px">
              <span style="font-size:20px;font-weight:700;color:${RATING_COLORS[r.rating]||'#fff'}">${Math.round(r.pci)}</span>
              <span style="font-size:10px;color:${RATING_COLORS[r.rating]||'#fff'};text-transform:uppercase">${r.rating}</span>
              <span style="font-size:10px;color:var(--dim)">${(ins.distresses||[]).length} distresses</span>
              <button class="btn btn-red" style="padding:2px 8px;font-size:9px" onclick="event.stopPropagation();deleteInsp(${i})">DEL</button>
            </div>
          </div>
        </div>`}).join('')}
      <div style="margin-top:12px;display:flex;gap:8px">
        <button class="btn btn-gold" onclick="exportInspections()">Export All CSV</button>
      </div>
    </div>`;
}

function createInspection(){
  const sec=document.getElementById('nSec').value;if(!sec)return;
  state.inspections.push({
    id:genId(),sectionId:sec,street:document.getElementById('nStreet').value,
    surfaceType:document.getElementById('nSurface').value,
    sampleArea:parseFloat(document.getElementById('nArea').value)||2500,
    length:parseFloat(document.getElementById('nLen').value)||0,
    width:parseFloat(document.getElementById('nWid').value)||0,
    inspector:document.getElementById('nInsp').value,notes:document.getElementById('nNotes').value,
    date:new Date().toISOString(),distresses:[]
  });
  activeInsp=state.inspections.length-1;saveState();tab='assess';render();
}

function deleteInsp(i){if(confirm('Delete this inspection?')){state.inspections.splice(i,1);if(activeInsp>=state.inspections.length)activeInsp=null;saveState();render()}}

function renderAssess(el){
  if(activeInsp===null||!state.inspections[activeInsp]){el.innerHTML='<div class="card"><div style="color:var(--muted);text-align:center;padding:40px">Select or create an inspection first</div></div>';return;}
  const ins=state.inspections[activeInsp];
  const r=computePCI(ins.distresses||[],ins.sampleArea);
  el.innerHTML=`
    <div class="grid2">
      <div>
        <div class="card"><div class="card-title">${ins.sectionId} - ${ins.street||'Assessment'}</div>
          <div style="font-size:10px;color:var(--dim);margin-bottom:12px">${ins.surfaceType} | Area: ${ins.sampleArea} sq ft | ${new Date(ins.date).toLocaleDateString()}</div>
          <div class="card-title" style="margin-top:12px">Select Distress Type</div>
          <div style="display:grid;grid-template-columns:1fr 1fr;gap:6px;max-height:400px;overflow-y:auto">
            ${DISTRESS_TYPES.map(d=>`<button class="distress-btn" onclick="selectDistress(${d.id},'${d.name}','${d.unit}')">${d.id}. ${d.name}<br><span style="font-size:9px;color:var(--dim)">${d.unit}</span></button>`).join('')}
          </div>
        </div>
      </div>
      <div>
        <div class="card"><div class="card-title">Add Distress</div>
          <div id="distressForm">
            <div class="field"><label>Distress Type</label><input id="dfType" readonly placeholder="Click a distress type"></div>
            <input type="hidden" id="dfId"><input type="hidden" id="dfUnit">
            <div class="grid3">
              <div class="field"><label>Severity</label><select id="dfSev"><option value="L">Low</option><option value="M">Medium</option><option value="H">High</option></select></div>
              <div class="field"><label>Quantity</label><input id="dfQty" type="number" step="0.1" placeholder="0"></div>
              <div class="field"><label>Unit</label><input id="dfUnitDisp" readonly></div>
            </div>
            <button class="btn btn-green" onclick="addDistress()">Add Distress</button>
          </div>
        </div>
        <div class="card">
          <div style="display:flex;justify-content:space-between;align-items:center">
            <div class="card-title" style="margin-bottom:0">PCI Score</div>
            <div style="font-size:10px;color:var(--dim)">${(ins.distresses||[]).length} distresses recorded</div>
          </div>
          <div class="gauge-wrap"><svg width="160" height="160">
            <circle cx="80" cy="80" r="68" fill="none" stroke="rgba(255,255,255,0.06)" stroke-width="8"/>
            <circle cx="80" cy="80" r="68" fill="none" stroke="${RATING_COLORS[r.rating]||'#fff'}" stroke-width="8" stroke-linecap="round"
              stroke-dasharray="${2*Math.PI*68}" stroke-dashoffset="${2*Math.PI*68-(r.pci/100)*2*Math.PI*68}"
              transform="rotate(-90 80 80)" style="transition:stroke-dashoffset 0.8s ease"/>
            <text x="80" y="74" text-anchor="middle" fill="${RATING_COLORS[r.rating]||'#fff'}" style="font-size:40px;font-family:var(--font);font-weight:700">${Math.round(r.pci)}</text>
            <text x="80" y="96" text-anchor="middle" fill="var(--dim)" style="font-size:10px;font-family:var(--font);letter-spacing:0.1em;text-transform:uppercase">${r.rating}</text>
          </svg></div>
        </div>
        <div class="card"><div class="card-title">Recorded Distresses</div>
          ${(ins.distresses||[]).length===0?'<div style="color:var(--muted);text-align:center;padding:20px">No distresses recorded</div>':
          `<div style="overflow-x:auto"><table>
            <thead><tr><th>Type</th><th>Severity</th><th>Qty</th><th>Density %</th><th>Deduct</th><th></th></tr></thead>
            <tbody>${(ins.distresses||[]).map((d,i)=>{
              const dens=(d.quantity/ins.sampleArea)*100;
              const dv=getDeductValue(d.distressId,d.severity,Math.min(dens,100));
              return`<tr>
                <td>${d.name}</td>
                <td class="severity-${d.severity}">${SEV_LABELS[d.severity]}</td>
                <td>${d.quantity} ${d.unit}</td>
                <td>${dens.toFixed(1)}%</td>
                <td style="color:var(--gold)">${dv.toFixed(1)}</td>
                <td><button class="btn btn-red" style="padding:2px 8px;font-size:9px" onclick="removeDistress(${i})">DEL</button></td>
              </tr>`}).join('')}</tbody>
          </table></div>`}
        </div>
      </div>
    </div>`;
}

function selectDistress(id,name,unit){
  document.getElementById('dfType').value=name;
  document.getElementById('dfId').value=id;
  document.getElementById('dfUnit').value=unit;
  document.getElementById('dfUnitDisp').value=unit;
}

function addDistress(){
  if(activeInsp===null)return;
  const id=parseInt(document.getElementById('dfId').value);
  const name=document.getElementById('dfType').value;
  const unit=document.getElementById('dfUnit').value;
  const sev=document.getElementById('dfSev').value;
  const qty=parseFloat(document.getElementById('dfQty').value);
  if(!id||!qty)return;
  if(!state.inspections[activeInsp].distresses)state.inspections[activeInsp].distresses=[];
  state.inspections[activeInsp].distresses.push({distressId:id,name,unit,severity:sev,quantity:qty});
  saveState();render();
}

function removeDistress(i){
  if(activeInsp===null)return;
  state.inspections[activeInsp].distresses.splice(i,1);
  saveState();render();
}

function renderResultsTab(el){
  if(activeInsp===null||!state.inspections[activeInsp]){el.innerHTML='<div class="card"><div style="color:var(--muted);text-align:center;padding:40px">Select an inspection first</div></div>';return;}
  const ins=state.inspections[activeInsp];
  const r=computePCI(ins.distresses||[],ins.sampleArea);
  const sorted=(r.deducts||[]).slice().sort((a,b)=>(b.deductValue||0)-(a.deductValue||0));
  el.innerHTML=`
    <div class="card">
      <div class="card-title">PCI Results - ${ins.sectionId}</div>
      <div class="grid2">
        <div>
          <div class="gauge-wrap"><svg width="200" height="200">
            <circle cx="100" cy="100" r="86" fill="none" stroke="rgba(255,255,255,0.06)" stroke-width="10"/>
            <circle cx="100" cy="100" r="86" fill="none" stroke="${RATING_COLORS[r.rating]||'#fff'}" stroke-width="10" stroke-linecap="round"
              stroke-dasharray="${2*Math.PI*86}" stroke-dashoffset="${2*Math.PI*86-(r.pci/100)*2*Math.PI*86}"
              transform="rotate(-90 100 100)" style="transition:stroke-dashoffset 0.8s ease"/>
            <text x="100" y="94" text-anchor="middle" fill="${RATING_COLORS[r.rating]||'#fff'}" style="font-size:50px;font-family:var(--font);font-weight:700">${Math.round(r.pci)}</text>
            <text x="100" y="118" text-anchor="middle" fill="var(--dim)" style="font-size:12px;font-family:var(--font);letter-spacing:0.1em;text-transform:uppercase">${r.rating}</text>
          </svg></div>
        </div>
        <div>
          <div class="stat-grid">
            <div class="result-box"><div class="result-label">PCI Score</div><div class="result-value" style="color:${RATING_COLORS[r.rating]}">${r.pci.toFixed(1)}</div></div>
            <div class="result-box"><div class="result-label">Rating</div><div class="result-value" style="color:${RATING_COLORS[r.rating]}">${r.rating}</div></div>
            <div class="result-box"><div class="result-label">Max CDV</div><div class="result-value" style="color:var(--gold)">${r.maxCDV.toFixed(1)}</div></div>
            <div class="result-box"><div class="result-label">Distresses</div><div class="result-value">${(ins.distresses||[]).length}</div></div>
            <div class="result-box"><div class="result-label">Sample Area</div><div class="result-value">${ins.sampleArea} sq ft</div></div>
            <div class="result-box"><div class="result-label">Section</div><div class="result-value" style="font-size:12px">${ins.sectionId}</div></div>
          </div>
          <div style="margin-top:12px;padding:12px;background:var(--bg2);border-radius:4px;border:1px solid var(--border)">
            <div style="font-size:10px;color:var(--dim);margin-bottom:6px">RECOMMENDED ACTION</div>
            <div style="font-size:12px;color:var(--text)">${r.pci>=71?'Routine maintenance and preventive treatments':r.pci>=41?'Major rehabilitation or structural overlay required':'Reconstruction recommended'}</div>
          </div>
        </div>
      </div>
    </div>
    <div class="card"><div class="card-title">Deduct Value Summary</div>
      ${sorted.length===0?'<div style="color:var(--muted);text-align:center;padding:20px">No deduct values</div>':
      `<div style="overflow-x:auto"><table>
        <thead><tr><th>Distress</th><th>Severity</th><th>Quantity</th><th>Density %</th><th>Deduct Value</th></tr></thead>
        <tbody>${sorted.map(d=>`<tr>
          <td>${d.name}</td>
          <td class="severity-${d.severity}">${SEV_LABELS[d.severity]}</td>
          <td>${d.quantity} ${d.unit}</td>
          <td>${(d.density||0).toFixed(1)}%</td>
          <td style="color:var(--gold);font-weight:700">${(d.deductValue||0).toFixed(1)}</td>
        </tr>`).join('')}</tbody>
      </table></div>`}
    </div>
    <div class="card"><div class="card-title">Deduct Value Chart</div>
      <canvas id="dvChart" width="800" height="300"></canvas>
    </div>`;
  drawDVChart(sorted);
}

function drawDVChart(deducts){
  const c=document.getElementById('dvChart');if(!c||!deducts.length)return;
  const ctx=c.getContext('2d'),W=c.width,H=c.height;
  ctx.clearRect(0,0,W,H);ctx.fillStyle='#0f1620';ctx.fillRect(0,0,W,H);
  const mx=60,my=20,pW=W-mx-20,pH=H-my-40;
  const maxDV=Math.max(...deducts.map(d=>d.deductValue||0),10);
  ctx.strokeStyle='#1a2a3a';ctx.lineWidth=1;ctx.beginPath();ctx.moveTo(mx,my);ctx.lineTo(mx,my+pH);ctx.lineTo(mx+pW,my+pH);ctx.stroke();
  ctx.fillStyle='rgba(226,232,240,0.45)';ctx.font='10px JetBrains Mono';ctx.textAlign='right';
  for(let i=0;i<=4;i++){const v=(maxDV*(4-i)/4).toFixed(0),y=my+(pH*i/4);ctx.fillText(v,mx-5,y+3)}
  const barW=Math.min(40,pW/deducts.length-4);
  deducts.forEach((d,i)=>{
    const x=mx+10+i*(barW+4);const bH=(d.deductValue/maxDV)*pH;const y=my+pH-bH;
    ctx.fillStyle=SEV_COLORS[d.severity]||'#00d4ff';ctx.fillRect(x,y,barW,bH);
    ctx.save();ctx.translate(x+barW/2,my+pH+6);ctx.rotate(Math.PI/4);
    ctx.fillStyle='rgba(226,232,240,0.45)';ctx.font='8px JetBrains Mono';ctx.textAlign='left';
    ctx.fillText(d.name.substring(0,15),0,0);ctx.restore();
  });
}

function renderReference(el){
  el.innerHTML=`
    <div class="card"><div class="card-title">ASTM D6433-23 - PCI Rating Scale</div>
      <div style="overflow-x:auto"><table>
        <thead><tr><th>PCI Range</th><th>Rating</th><th>Condition</th><th>Action</th></tr></thead>
        <tbody>
          <tr><td>86-100</td><td style="color:#10b981">Good</td><td>Little or no distress</td><td>Routine maintenance</td></tr>
          <tr><td>71-85</td><td style="color:#22d3ee">Satisfactory</td><td>Low-severity distress</td><td>Preventive maintenance</td></tr>
          <tr><td>56-70</td><td style="color:#f59e0b">Fair</td><td>Medium-severity distress</td><td>Minor rehabilitation</td></tr>
          <tr><td>41-55</td><td style="color:#f97316">Poor</td><td>Moderate to high distress</td><td>Major rehabilitation</td></tr>
          <tr><td>26-40</td><td style="color:#ef4444">Very Poor</td><td>High-severity distress</td><td>Structural overlay or reconstruction</td></tr>
          <tr><td>11-25</td><td style="color:#dc2626">Serious</td><td>Extensive high-severity</td><td>Reconstruction</td></tr>
          <tr><td>0-10</td><td style="color:#991b1b">Failed</td><td>Pavement failure</td><td>Immediate reconstruction</td></tr>
        </tbody>
      </table></div>
    </div>
    <div class="card"><div class="card-title">Asphalt Concrete Distress Types (ASTM D6433-23)</div>
      <div style="overflow-x:auto"><table>
        <thead><tr><th>#</th><th>Distress Type</th><th>Unit</th><th>Description</th></tr></thead>
        <tbody>${DISTRESS_TYPES.map(d=>`<tr>
          <td style="color:var(--gold)">${d.id}</td><td>${d.name}</td><td style="color:var(--accent)">${d.unit}</td><td style="color:var(--dim)">${d.desc}</td>
        </tr>`).join('')}</tbody>
      </table></div>
    </div>
    <div class="card"><div class="card-title">Severity Level Definitions</div>
      <div class="grid3">
        <div class="result-box"><div class="result-label" style="color:#3b82f6">Low (L)</div><div style="font-size:11px;color:var(--dim);margin-top:4px">Distress causes minor deterioration. No significant impact on ride quality. Little or no maintenance required.</div></div>
        <div class="result-box"><div class="result-label" style="color:#f59e0b">Medium (M)</div><div style="font-size:11px;color:var(--dim);margin-top:4px">Distress causes moderate deterioration. Noticeable effect on ride quality. Some maintenance needed.</div></div>
        <div class="result-box"><div class="result-label" style="color:#ef4444">High (H)</div><div style="font-size:11px;color:var(--dim);margin-top:4px">Distress causes severe deterioration. Significant impact on ride quality. Major repair or rehabilitation required.</div></div>
      </div>
    </div>
    <div class="card"><div class="card-title">Inspection Procedure</div>
      <ol style="padding-left:20px;line-height:2;color:var(--dim);font-size:11px">
        <li>Divide pavement into sections with uniform characteristics</li>
        <li>Select sample units (typically 2,500 sq ft for AC pavement)</li>
        <li>Inspect each sample unit and record distress type, severity, and quantity</li>
        <li>Calculate distress density for each distress type/severity combination</li>
        <li>Determine deduct values from the ASTM D6433-23 curves</li>
        <li>Compute corrected deduct value (CDV) using iterative procedure</li>
        <li>Calculate PCI = 100 - max(CDV)</li>
        <li>Determine condition rating from PCI scale</li>
      </ol>
    </div>`;
}

function exportInspections(){
  let csv='Section ID,Street,Surface,Area (sqft),Date,Inspector,PCI,Rating,Distress Count,Notes\n';
  state.inspections.forEach(ins=>{
    const r=computePCI(ins.distresses||[],ins.sampleArea);
    csv+=`"${ins.sectionId}","${ins.street||''}","${ins.surfaceType}",${ins.sampleArea},"${new Date(ins.date).toLocaleDateString()}","${ins.inspector||''}",${r.pci.toFixed(1)},"${r.rating}",${(ins.distresses||[]).length},"${ins.notes||''}"\n`;
  });
  const a=document.createElement('a');a.href=URL.createObjectURL(new Blob([csv],{type:'text/csv'}));a.download='korb_pci_inspections.csv';a.click();
}

render();
</script>
</body>
</html>
