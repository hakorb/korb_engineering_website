<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>PDF Editor - Korb Engineering</title>
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<script src="../../vendor/pdf-3.11.174.min.js"></script>
<script src="../../vendor/pdf.worker-3.11.174.min.js"></script>
<script src="../../vendor/pdf-lib-1.17.1.min.js"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#050a0f;--surface:#0a1018;--surface2:#0f1620;--surface3:#141e2a;
  --border:#1a2535;--border-light:#243345;
  --primary:#00d4ff;--accent:#ff6600;--green:#10b981;--red:#ef4444;
  --text:#e2e8f0;--dim:rgba(226,232,240,0.4);
  --glow-primary:0 0 12px rgba(0,212,255,0.3);
  --glow-accent:0 0 12px rgba(255,102,0,0.3);
  --toolbar-h:52px;--sidebar-w:200px;--status-h:28px;
  --radius:6px;
}
html,body{height:100%;overflow:hidden;background:var(--bg);color:var(--text);font-family:'JetBrains Mono',monospace;font-size:13px;user-select:none;-webkit-user-select:none}
::-webkit-scrollbar{width:6px;height:6px}
::-webkit-scrollbar-track{background:var(--surface)}
::-webkit-scrollbar-thumb{background:var(--border-light);border-radius:3px}
::-webkit-scrollbar-thumb:hover{background:var(--primary)}
input,select,textarea,button{font-family:'JetBrains Mono',monospace}
input[type="text"],input[type="number"],select,textarea{font-size:16px;background:var(--surface2);border:1px solid var(--border);color:var(--text);border-radius:var(--radius);padding:8px 10px}
input:focus,select:focus,textarea:focus{outline:none;border-color:var(--primary);box-shadow:var(--glow-primary)}

/* TOOLBAR */
#toolbar{
  position:fixed;top:0;left:0;right:0;height:var(--toolbar-h);
  background:var(--surface);border-bottom:1px solid var(--border);
  display:flex;align-items:center;gap:4px;padding:0 10px;z-index:100;
  overflow-x:auto;overflow-y:hidden;-webkit-overflow-scrolling:touch;
}
.brand{
  font-weight:700;font-size:11px;color:var(--primary);letter-spacing:.1em;
  text-transform:uppercase;display:flex;align-items:center;gap:6px;flex-shrink:0;
  margin-right:8px;
}
.brand-dot{width:8px;height:8px;border-radius:50%;background:var(--primary);box-shadow:var(--glow-primary)}
.sep{width:1px;height:28px;background:var(--border);margin:0 4px;flex-shrink:0}

.tb-btn{
  min-width:44px;height:44px;border:1px solid transparent;background:transparent;
  border-radius:var(--radius);color:var(--dim);cursor:pointer;
  display:flex;align-items:center;justify-content:center;font-size:16px;
  transition:all .15s;position:relative;flex-shrink:0;
}
.tb-btn svg{width:18px;height:18px;stroke:currentColor;fill:none;stroke-width:1.8}
.tb-btn:hover{background:var(--surface2);border-color:var(--border);color:var(--text)}
.tb-btn.active{background:rgba(0,212,255,0.15);color:var(--primary);border-color:rgba(0,212,255,0.4);box-shadow:var(--glow-primary)}
.tb-btn.active svg{stroke:var(--primary)}
.tb-btn[data-tip]:hover::after{
  content:attr(data-tip);position:absolute;top:48px;left:50%;transform:translateX(-50%);
  background:var(--surface3);border:1px solid var(--border);color:var(--text);
  font-size:10px;white-space:nowrap;padding:4px 8px;border-radius:4px;
  pointer-events:none;z-index:999;
}

.tb-group{display:flex;align-items:center;gap:2px}
.tb-nav{display:flex;align-items:center;gap:4px;padding:0 6px}
.tb-nav input{width:44px;height:32px;text-align:center;font-size:16px;padding:4px}
.pg-total{font-size:11px;color:var(--dim)}

.tb-right{margin-left:auto;display:flex;align-items:center;gap:4px;flex-shrink:0}

.file-btn{
  min-height:44px;padding:8px 14px;border-radius:var(--radius);background:var(--surface2);
  border:1px solid var(--border);color:var(--text);cursor:pointer;
  font-size:11px;font-weight:600;transition:all .15s;white-space:nowrap;
  letter-spacing:.04em;text-transform:uppercase;
}
.file-btn:hover{background:var(--surface3);border-color:var(--primary);color:var(--primary)}
.file-btn.primary{background:rgba(0,212,255,0.15);color:var(--primary);border-color:rgba(0,212,255,0.4)}
.file-btn.primary:hover{background:rgba(0,212,255,0.25);box-shadow:var(--glow-primary)}
.file-btn.accent{background:rgba(255,102,0,0.15);color:var(--accent);border-color:rgba(255,102,0,0.4)}
.file-btn.accent:hover{background:rgba(255,102,0,0.25);box-shadow:var(--glow-accent)}
.file-btn.danger{background:rgba(239,68,68,0.1);border-color:rgba(239,68,68,0.3);color:var(--red)}
.file-btn.danger:hover{background:rgba(239,68,68,0.2)}

/* LAYOUT */
#main{position:fixed;top:var(--toolbar-h);left:0;right:0;bottom:var(--status-h);display:flex}

/* SIDEBAR */
#sidebar{
  width:var(--sidebar-w);min-width:var(--sidebar-w);background:var(--surface);
  border-right:1px solid var(--border);display:flex;flex-direction:column;
  overflow:hidden;transition:width .2s,min-width .2s;
}
#sidebar.collapsed{width:0;min-width:0;overflow:hidden}
.sidebar-header{
  padding:10px;border-bottom:1px solid var(--border);display:flex;gap:2px;flex-shrink:0;
  background:var(--surface);
}
.sidebar-tab{
  flex:1;padding:8px 4px;text-align:center;cursor:pointer;font-size:9px;font-weight:700;
  color:var(--dim);border:1px solid transparent;border-radius:var(--radius);
  transition:all .15s;letter-spacing:.06em;text-transform:uppercase;min-height:44px;
  display:flex;align-items:center;justify-content:center;
}
.sidebar-tab.active{color:var(--primary);background:rgba(0,212,255,0.1);border-color:rgba(0,212,255,0.3)}
.sidebar-content{flex:1;overflow-y:auto;overflow-x:hidden}
.sidebar-pane{display:none;padding:0}
.sidebar-pane.active{display:block}

.thumb-item{
  padding:8px;cursor:pointer;border-bottom:1px solid var(--border);
  display:flex;flex-direction:column;align-items:center;gap:4px;transition:background .15s;
}
.thumb-item:hover{background:var(--surface2)}
.thumb-item.active{background:rgba(0,212,255,0.08);border-left:3px solid var(--primary)}
.thumb-canvas{width:100%;border:1px solid var(--border);display:block;background:#fff}
.thumb-label{font-size:9px;color:var(--dim);letter-spacing:.06em}
.thumb-actions{display:flex;gap:3px;width:100%;margin-top:2px}
.thumb-act-btn{
  flex:1;min-height:32px;font-size:8px;font-weight:700;text-transform:uppercase;
  letter-spacing:.04em;background:var(--surface2);border:1px solid var(--border);
  color:var(--dim);border-radius:4px;cursor:pointer;transition:all .12s;text-align:center;
}
.thumb-act-btn:hover{border-color:var(--primary);color:var(--primary)}
.thumb-act-btn.danger:hover{border-color:var(--red);color:var(--red)}

/* VIEWER */
#viewer{
  flex:1;overflow:auto;background:var(--bg);
  display:flex;flex-direction:column;align-items:center;padding:24px;gap:24px;
}
#drop-zone{
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  width:100%;height:100%;border:2px dashed var(--border);border-radius:12px;
  color:var(--dim);gap:16px;cursor:pointer;transition:all .25s;
}
#drop-zone:hover,#drop-zone.drag-over{border-color:var(--primary);color:var(--primary);box-shadow:inset 0 0 60px rgba(0,212,255,0.05)}
.dz-icon{font-size:56px;line-height:1}
.dz-text{font-size:15px;font-weight:600;letter-spacing:.06em}
.dz-sub{font-size:11px;color:var(--dim)}

.page-wrapper{position:relative;box-shadow:0 8px 40px rgba(0,0,0,.7);flex-shrink:0;background:#fff;border-radius:2px}
.page-wrapper canvas{display:block}
.page-wrapper .annotation-layer{position:absolute;top:0;left:0;width:100%;height:100%;pointer-events:none}
.page-wrapper .annotation-layer.active{pointer-events:auto}
.page-wrapper .annotation-canvas{position:absolute;top:0;left:0;width:100%;height:100%}

/* PROPS PANEL */
#props-panel{
  width:220px;min-width:220px;background:var(--surface);border-left:1px solid var(--border);
  overflow-y:auto;overflow-x:hidden;transition:width .2s,min-width .2s;
}
#props-panel.collapsed{width:0;min-width:0;overflow:hidden}
.ph{
  padding:10px 14px;font-size:10px;font-weight:700;color:var(--primary);
  letter-spacing:.1em;text-transform:uppercase;border-bottom:1px solid var(--border);
  position:sticky;top:0;background:var(--surface);z-index:1;
}
.ps{padding:12px 14px;border-bottom:1px solid var(--border)}
.pl{font-size:9px;color:var(--dim);margin-bottom:4px;display:block;text-transform:uppercase;letter-spacing:.06em}
.pr{margin-bottom:10px}
.pr:last-child{margin-bottom:0}
.p-color{width:100%;height:36px;border-radius:var(--radius);border:1px solid var(--border);cursor:pointer;background:var(--surface2);min-height:44px}
.p-slider{width:100%;accent-color:var(--primary);cursor:pointer;height:20px}
.p-input{width:100%;min-height:44px}
.p-select{width:100%;min-height:44px}
.p-textarea{width:100%;min-height:80px;resize:vertical;line-height:1.4}
.del-btn{
  width:100%;padding:10px;min-height:44px;background:rgba(239,68,68,0.1);
  border:1px solid rgba(239,68,68,0.3);color:var(--red);border-radius:var(--radius);
  cursor:pointer;font-size:11px;font-weight:600;transition:all .15s;
}
.del-btn:hover{background:rgba(239,68,68,0.2)}
.no-sel{padding:16px;font-size:11px;color:var(--dim);text-align:center;line-height:1.8}

/* STAMPS BAR */
.stamp-grid{display:grid;grid-template-columns:1fr 1fr;gap:6px;padding:10px}
.stamp-btn{
  min-height:44px;padding:8px 6px;font-size:9px;font-weight:700;
  text-transform:uppercase;letter-spacing:.06em;
  background:var(--surface2);border:1px solid var(--border);
  color:var(--dim);border-radius:var(--radius);cursor:pointer;
  transition:all .15s;text-align:center;
}
.stamp-btn:hover{border-color:var(--primary);color:var(--primary)}
.stamp-btn.stamp-approved{color:var(--green);border-color:rgba(16,185,129,0.3)}
.stamp-btn.stamp-rejected{color:var(--red);border-color:rgba(239,68,68,0.3)}
.stamp-btn.stamp-draft{color:var(--accent);border-color:rgba(255,102,0,0.3)}
.stamp-btn.stamp-reviewed{color:var(--primary);border-color:rgba(0,212,255,0.3)}
.stamp-btn.stamp-confidential{color:#a855f7;border-color:rgba(168,85,247,0.3)}

/* STATUS BAR */
#statusbar{
  position:fixed;bottom:0;left:0;right:0;height:var(--status-h);
  background:var(--surface);border-top:1px solid var(--border);
  display:flex;align-items:center;padding:0 14px;gap:20px;
  font-size:10px;color:var(--dim);z-index:100;
}
#statusbar .sv{color:var(--text)}

/* MODAL */
#modal-overlay{
  display:none;position:fixed;inset:0;background:rgba(5,10,15,0.85);
  z-index:1000;align-items:center;justify-content:center;
}
#modal-overlay.show{display:flex}
#modal{
  background:var(--surface);border:1px solid var(--border);
  border-top:2px solid var(--primary);border-radius:8px;
  padding:24px;min-width:320px;max-width:460px;width:90%;
  display:flex;flex-direction:column;gap:14px;
  box-shadow:0 20px 60px rgba(0,0,0,.6);
}
#modal h3{color:var(--primary);font-size:12px;text-transform:uppercase;letter-spacing:.1em}
#modal input,#modal select{min-height:44px}
#modal label{font-size:11px;color:var(--dim)}
.modal-btns{display:flex;gap:8px;justify-content:flex-end}
.modal-btns button{
  min-height:44px;padding:8px 18px;border-radius:var(--radius);cursor:pointer;
  font-size:12px;font-weight:600;border:1px solid var(--border);
  background:var(--surface2);color:var(--text);transition:all .15s;
}
.modal-btns button:hover{background:var(--surface3)}
.modal-btns .ok-btn{background:rgba(0,212,255,0.15);color:var(--primary);border-color:rgba(0,212,255,0.4)}
.modal-btns .ok-btn:hover{background:rgba(0,212,255,0.25);box-shadow:var(--glow-primary)}

/* SIGNATURE PAD */
#sig-canvas{
  width:100%;height:150px;background:#fff;border:1px solid var(--border);
  border-radius:var(--radius);cursor:crosshair;touch-action:none;
}

/* PROGRESS */
.progress-wrap{background:var(--surface2);border-radius:4px;height:6px;overflow:hidden;margin-top:6px}
.progress-bar{height:100%;background:var(--primary);transition:width .2s;border-radius:4px;width:0%}

/* MOBILE */
@media(max-width:768px){
  :root{--sidebar-w:0px;--toolbar-h:56px;--status-h:32px}
  #sidebar{display:none}
  #props-panel{display:none}
  #toolbar{gap:2px;padding:0 6px}
  .brand{display:none}
  .sep{margin:0 2px}
  #viewer{padding:12px}
}
</style>
</head>
<body>

<!-- TOOLBAR -->
<div id="toolbar">
  <div class="brand"><div class="brand-dot"></div>KORB PDF</div>
  <div class="sep"></div>

  <button class="tb-btn" data-tip="Open PDF" id="btn-open" onclick="openFile()">
    <svg viewBox="0 0 24 24"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/></svg>
  </button>
  <button class="tb-btn" data-tip="Export PDF" id="btn-export-pdf" onclick="exportPDF()">
    <svg viewBox="0 0 24 24"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>
  </button>
  <button class="tb-btn" data-tip="Export PNG" id="btn-export-png" onclick="exportPNG()">
    <svg viewBox="0 0 24 24"><rect x="3" y="3" width="18" height="18" rx="2"/><circle cx="8.5" cy="8.5" r="1.5"/><polyline points="21 15 16 10 5 21"/></svg>
  </button>
  <div class="sep"></div>

  <button class="tb-btn" data-tip="Undo (Ctrl+Z)" id="btn-undo" onclick="undo()">
    <svg viewBox="0 0 24 24"><polyline points="1 4 1 10 7 10"/><path d="M3.51 15a9 9 0 1 0 2.13-9.36L1 10"/></svg>
  </button>
  <button class="tb-btn" data-tip="Redo (Ctrl+Y)" id="btn-redo" onclick="redo()">
    <svg viewBox="0 0 24 24"><polyline points="23 4 23 10 17 10"/><path d="M20.49 15a9 9 0 1 1-2.13-9.36L23 10"/></svg>
  </button>
  <div class="sep"></div>

  <div class="tb-group">
    <button class="tb-btn" data-tip="Select" data-tool="select" onclick="setTool('select')">
      <svg viewBox="0 0 24 24"><path d="M3 3l7.07 16.97 2.51-7.39 7.39-2.51L3 3z"/></svg>
    </button>
    <button class="tb-btn" data-tip="Text" data-tool="text" onclick="setTool('text')">
      <svg viewBox="0 0 24 24"><polyline points="4 7 4 4 20 4 20 7"/><line x1="9.5" y1="20" x2="14.5" y2="20"/><line x1="12" y1="4" x2="12" y2="20"/></svg>
    </button>
    <button class="tb-btn" data-tip="Draw" data-tool="draw" onclick="setTool('draw')">
      <svg viewBox="0 0 24 24"><path d="M12 19l7-7 3 3-7 7-3-3z"/><path d="M18 13l-1.5-7.5L2 2l3.5 14.5L13 18l5-5z"/><path d="M2 2l7.586 7.586"/></svg>
    </button>
    <button class="tb-btn" data-tip="Line" data-tool="line" onclick="setTool('line')">
      <svg viewBox="0 0 24 24"><line x1="5" y1="19" x2="19" y2="5"/></svg>
    </button>
    <button class="tb-btn" data-tip="Arrow" data-tool="arrow" onclick="setTool('arrow')">
      <svg viewBox="0 0 24 24"><line x1="5" y1="19" x2="19" y2="5"/><polyline points="12 5 19 5 19 12"/></svg>
    </button>
    <button class="tb-btn" data-tip="Rectangle" data-tool="rect" onclick="setTool('rect')">
      <svg viewBox="0 0 24 24"><rect x="3" y="3" width="18" height="18" rx="2"/></svg>
    </button>
    <button class="tb-btn" data-tip="Circle" data-tool="circle" onclick="setTool('circle')">
      <svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="10"/></svg>
    </button>
    <button class="tb-btn" data-tip="Highlight" data-tool="highlight" onclick="setTool('highlight')">
      <svg viewBox="0 0 24 24"><path d="M9 11l-6 6v3h9l3-3"/><path d="M22 12l-4.6 4.6a2 2 0 0 1-2.8 0l-5.2-5.2a2 2 0 0 1 0-2.8L14 4"/></svg>
    </button>
    <button class="tb-btn" data-tip="Redact" data-tool="redact" onclick="setTool('redact')">
      <svg viewBox="0 0 24 24"><rect x="3" y="8" width="18" height="8" fill="currentColor" stroke="none"/></svg>
    </button>
  </div>
  <div class="sep"></div>

  <button class="tb-btn" data-tip="Stamp" id="btn-stamp" onclick="showStampMenu()">
    <svg viewBox="0 0 24 24"><path d="M5 21h14"/><path d="M12 17V13"/><path d="M7 13h10a1 1 0 0 0 1-1V7a5 5 0 0 0-10 0v5a1 1 0 0 0 1 1z"/></svg>
  </button>
  <button class="tb-btn" data-tip="Signature" id="btn-sig" onclick="showSignatureModal()">
    <svg viewBox="0 0 24 24"><path d="M20 19.5c-1 .5-2 .5-3-.5-1.5-1.5-3-3.5-4.5-2-1 1-1.5 4.5-3 4.5S6 18 5 16.5"/><path d="M4 14V4a2 2 0 0 1 2-2h8l6 6v6"/></svg>
  </button>
  <button class="tb-btn" data-tip="Insert Image" id="btn-img" onclick="insertImage()">
    <svg viewBox="0 0 24 24"><rect x="3" y="3" width="18" height="18" rx="2"/><circle cx="8.5" cy="8.5" r="1.5"/><polyline points="21 15 16 10 5 21"/></svg>
  </button>
  <div class="sep"></div>

  <div class="tb-nav">
    <button class="tb-btn" data-tip="Prev Page" onclick="goPage(-1)">
      <svg viewBox="0 0 24 24"><polyline points="15 18 9 12 15 6"/></svg>
    </button>
    <input type="number" id="page-input" value="1" min="1" onchange="goToPage(this.value)">
    <span class="pg-total">/ <span id="page-total">0</span></span>
    <button class="tb-btn" data-tip="Next Page" onclick="goPage(1)">
      <svg viewBox="0 0 24 24"><polyline points="9 18 15 12 9 6"/></svg>
    </button>
  </div>

  <div class="tb-right">
    <button class="tb-btn" data-tip="Toggle Sidebar" onclick="toggleSidebar()">
      <svg viewBox="0 0 24 24"><rect x="3" y="3" width="18" height="18" rx="2"/><line x1="9" y1="3" x2="9" y2="21"/></svg>
    </button>
    <button class="tb-btn" data-tip="Toggle Properties" onclick="toggleProps()">
      <svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83-2.83l.06-.06A1.65 1.65 0 0 0 4.68 15a1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 2.83-2.83l.06.06A1.65 1.65 0 0 0 9 4.68a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 2.83l-.06.06A1.65 1.65 0 0 0 19.4 9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"/></svg>
    </button>
  </div>
</div>

<!-- MAIN LAYOUT -->
<div id="main">
  <!-- SIDEBAR -->
  <div id="sidebar">
    <div class="sidebar-header">
      <div class="sidebar-tab active" data-pane="pages" onclick="switchSidebarTab(this)">Pages</div>
      <div class="sidebar-tab" data-pane="annotations" onclick="switchSidebarTab(this)">Marks</div>
    </div>
    <div class="sidebar-content">
      <div class="sidebar-pane active" id="pane-pages">
        <div id="thumb-list"></div>
      </div>
      <div class="sidebar-pane" id="pane-annotations">
        <div id="annot-list"></div>
      </div>
    </div>
  </div>

  <!-- VIEWER -->
  <div id="viewer">
    <div id="drop-zone" ondragover="dzOver(event)" ondragleave="dzLeave(event)" ondrop="dzDrop(event)" onclick="openFile()">
      <div class="dz-icon">
        <svg width="56" height="56" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.2"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/><line x1="12" y1="18" x2="12" y2="12"/><polyline points="9 15 12 12 15 15"/></svg>
      </div>
      <div class="dz-text">Drop PDF here or click to open</div>
      <div class="dz-sub">Supports any PDF file</div>
    </div>
    <div id="pages-container" style="display:none"></div>
  </div>

  <!-- PROPERTIES PANEL -->
  <div id="props-panel">
    <div class="ph">Properties</div>
    <div id="props-content">
      <div class="no-sel">Select an annotation to edit its properties</div>
    </div>

<input type="file" id="file-input" accept=".pdf" style="display:none" onchange="handleFileInput(event)">
<input type="file" id="img-input" accept="image/*" style="display:none" onchange="handleImageInput(event)">

<script>
// ══════════════════════════════════════════════
// STATE
// ══════════════════════════════════════════════
const DPR = window.devicePixelRatio || 2;
const RENDER_SCALE = 2;

let pdfDoc = null;
let pdfBytes = null;
let currentPage = 1;
let totalPages = 0;
let currentTool = 'select';
let annotations = []; // {id,page,type,data}
let selectedAnnot = null;
let undoStack = [];
let redoStack = [];
let isDrawing = false;
let drawStart = null;
let currentPath = [];
let pageCanvases = {}; // page -> {canvas, ctx, width, height, viewport}
let annotCanvases = {}; // page -> {canvas, ctx}
let signatureDataURL = null;
let insertImageDataURL = null;
let fileName = '';
let formFields = [];

let annotIdCounter = 0;
function nextId(){ return ++annotIdCounter; }

// ══════════════════════════════════════════════
// PDF LOADING
// ══════════════════════════════════════════════
pdfjsLib.GlobalWorkerOptions.workerSrc = '../../vendor/pdf.worker-3.11.174.min.js';

function openFile(){
  document.getElementById('file-input').click();
}

function handleFileInput(e){
  const file = e.target.files[0];
  if(!file) return;
  fileName = file.name;
  const reader = new FileReader();
  reader.onload = function(ev){
    pdfBytes = new Uint8Array(ev.target.result);
    loadPDF(pdfBytes);
  };
  reader.readAsArrayBuffer(file);
  e.target.value = '';
}

function dzOver(e){ e.preventDefault(); e.currentTarget.classList.add('drag-over'); }
function dzLeave(e){ e.currentTarget.classList.remove('drag-over'); }
function dzDrop(e){
  e.preventDefault();
  e.currentTarget.classList.remove('drag-over');
  const file = e.dataTransfer.files[0];
  if(!file || !file.name.toLowerCase().endsWith('.pdf')) return;
  fileName = file.name;
  const reader = new FileReader();
  reader.onload = function(ev){
    pdfBytes = new Uint8Array(ev.target.result);
    loadPDF(pdfBytes);
  };
  reader.readAsArrayBuffer(file);
}

async function loadPDF(data){
  try {
    pdfDoc = await pdfjsLib.getDocument({data: data.slice(0)}).promise;
    totalPages = pdfDoc.numPages;
    currentPage = 1;
    annotations = [];
    undoStack = [];
    redoStack = [];
    selectedAnnot = null;
    pageCanvases = {};
    annotCanvases = {};
    formFields = [];

    document.getElementById('drop-zone').style.display = 'none';
    document.getElementById('pages-container').style.display = '';
    document.getElementById('page-total').textContent = totalPages;
    document.getElementById('page-input').max = totalPages;

    await renderAllPages();
    buildThumbnails();
    detectFormFields();
    updateStatus();
    goToPage(1);
  } catch(err) {
    alert('Error loading PDF: ' + err.message);
  }
}

async function renderAllPages(){
  const container = document.getElementById('pages-container');
  container.innerHTML = '';

  for(let i = 1; i <= totalPages; i++){
    const page = await pdfDoc.getPage(i);
    const vp = page.getViewport({scale: RENDER_SCALE});

    const wrapper = document.createElement('div');
    wrapper.className = 'page-wrapper';
    wrapper.id = 'page-wrap-' + i;
    wrapper.dataset.page = i;
    wrapper.style.width = (vp.width / RENDER_SCALE) + 'px';
    wrapper.style.height = (vp.height / RENDER_SCALE) + 'px';

    // PDF canvas
    const canvas = document.createElement('canvas');
    canvas.width = vp.width;
    canvas.height = vp.height;
    canvas.style.width = (vp.width / RENDER_SCALE) + 'px';
    canvas.style.height = (vp.height / RENDER_SCALE) + 'px';
    const ctx = canvas.getContext('2d');
    wrapper.appendChild(canvas);

    pageCanvases[i] = {canvas, ctx, width: vp.width, height: vp.height, viewport: vp, cssW: vp.width/RENDER_SCALE, cssH: vp.height/RENDER_SCALE};

    await page.render({canvasContext: ctx, viewport: vp}).promise;

    // Annotation overlay canvas
    const aCanvas = document.createElement('canvas');
    aCanvas.className = 'annotation-canvas';
    aCanvas.width = vp.width;
    aCanvas.height = vp.height;
    aCanvas.style.width = (vp.width / RENDER_SCALE) + 'px';
    aCanvas.style.height = (vp.height / RENDER_SCALE) + 'px';
    const aCtx = aCanvas.getContext('2d');
    wrapper.appendChild(aCanvas);
    annotCanvases[i] = {canvas: aCanvas, ctx: aCtx};

    // Event listeners on annotation canvas
    aCanvas.addEventListener('pointerdown', e => onPointerDown(e, i));
    aCanvas.addEventListener('pointermove', e => onPointerMove(e, i));
    aCanvas.addEventListener('pointerup', e => onPointerUp(e, i));

    container.appendChild(wrapper);
  }
}

// ══════════════════════════════════════════════
// THUMBNAILS
// ══════════════════════════════════════════════
async function buildThumbnails(){
  const list = document.getElementById('thumb-list');
  list.innerHTML = '';
  for(let i = 1; i <= totalPages; i++){
    const page = await pdfDoc.getPage(i);
    const vp = page.getViewport({scale: 0.3});
    const item = document.createElement('div');
    item.className = 'thumb-item' + (i === currentPage ? ' active' : '');
    item.dataset.page = i;
    item.onclick = () => goToPage(i);

    const c = document.createElement('canvas');
    c.className = 'thumb-canvas';
    c.width = vp.width;
    c.height = vp.height;
    c.style.width = '100%';
    c.style.height = 'auto';
    await page.render({canvasContext: c.getContext('2d'), viewport: vp}).promise;
    item.appendChild(c);

    const label = document.createElement('div');
    label.className = 'thumb-label';
    label.textContent = 'Page ' + i;
    item.appendChild(label);

    const actions = document.createElement('div');
    actions.className = 'thumb-actions';

    const rotBtn = document.createElement('button');
    rotBtn.className = 'thumb-act-btn';
    rotBtn.textContent = 'Rotate';
    rotBtn.onclick = (e) => { e.stopPropagation(); rotatePage(i); };
    actions.appendChild(rotBtn);

    if(totalPages > 1){
      const delBtn = document.createElement('button');
      delBtn.className = 'thumb-act-btn danger';
      delBtn.textContent = 'Delete';
      delBtn.onclick = (e) => { e.stopPropagation(); deletePage(i); };
      actions.appendChild(delBtn);
    }

    if(i > 1){
      const upBtn = document.createElement('button');
      upBtn.className = 'thumb-act-btn';
      upBtn.textContent = '\u2191';
      upBtn.onclick = (e) => { e.stopPropagation(); movePage(i, i-1); };
      actions.appendChild(upBtn);
    }
    if(i < totalPages){
      const dnBtn = document.createElement('button');
      dnBtn.className = 'thumb-act-btn';
      dnBtn.textContent = '\u2193';
      dnBtn.onclick = (e) => { e.stopPropagation(); movePage(i, i+1); };
      actions.appendChild(dnBtn);
    }

    item.appendChild(actions);
    list.appendChild(item);
  }
}

// ══════════════════════════════════════════════
// NAVIGATION
// ══════════════════════════════════════════════
function goPage(delta){
  goToPage(currentPage + delta);
}

function goToPage(n){
  n = parseInt(n);
  if(!pdfDoc || isNaN(n)) return;
  n = Math.max(1, Math.min(n, totalPages));
  currentPage = n;
  document.getElementById('page-input').value = n;

  // Scroll to page
  const wrap = document.getElementById('page-wrap-' + n);
  if(wrap) wrap.scrollIntoView({behavior:'smooth', block:'start'});

  // Update thumbnails
  document.querySelectorAll('.thumb-item').forEach(el => {
    el.classList.toggle('active', parseInt(el.dataset.page) === n);
  });
  updateStatus();
}

// ══════════════════════════════════════════════
// TOOLS
// ══════════════════════════════════════════════
function setTool(tool){
  currentTool = tool;
  document.querySelectorAll('.tb-btn[data-tool]').forEach(b => {
    b.classList.toggle('active', b.dataset.tool === tool);
  });
  // Update cursor
  document.querySelectorAll('.annotation-canvas').forEach(c => {
    if(tool === 'select') c.style.cursor = 'default';
    else if(tool === 'text') c.style.cursor = 'text';
    else if(tool === 'draw') c.style.cursor = 'crosshair';
    else c.style.cursor = 'crosshair';
  });
  updateStatus();
}

// ══════════════════════════════════════════════
// POINTER EVENTS (ANNOTATIONS)
// ══════════════════════════════════════════════
function getCanvasPos(e, pageNum){
  const ac = annotCanvases[pageNum];
  if(!ac) return null;
  const rect = ac.canvas.getBoundingClientRect();
  const scaleX = ac.canvas.width / rect.width;
  const scaleY = ac.canvas.height / rect.height;
  return {
    x: (e.clientX - rect.left) * scaleX,
    y: (e.clientY - rect.top) * scaleY
  };
}

function onPointerDown(e, pageNum){
  if(!pdfDoc) return;
  const pos = getCanvasPos(e, pageNum);
  if(!pos) return;

  if(currentTool === 'select'){
    // Try to find annotation under cursor
    const hit = hitTestAnnotation(pos, pageNum);
    selectAnnotation(hit);
    if(hit){
      isDrawing = true;
      drawStart = {x: pos.x, y: pos.y, origX: hit.data.x, origY: hit.data.y};
    }
    return;
  }

  if(currentTool === 'text'){
    pushUndo();
    const annot = {
      id: nextId(), page: pageNum, type: 'text',
      data: {x: pos.x, y: pos.y, text: 'Text', fontSize: 28, color: '#000000', fontFamily: 'Helvetica'}
    };
    annotations.push(annot);
    selectAnnotation(annot);
    redrawAnnotations(pageNum);
    updateAnnotList();
    showTextEditModal(annot);
    return;
  }

  isDrawing = true;
  drawStart = {x: pos.x, y: pos.y, page: pageNum};
  if(currentTool === 'draw'){
    currentPath = [{x: pos.x, y: pos.y}];
  }
  e.target.setPointerCapture(e.pointerId);
}

function onPointerMove(e, pageNum){
  if(!isDrawing || !drawStart) return;
  const pos = getCanvasPos(e, pageNum);
  if(!pos) return;

  if(currentTool === 'select' && selectedAnnot){
    // Move annotation
    const dx = pos.x - drawStart.x;
    const dy = pos.y - drawStart.y;
    selectedAnnot.data.x = drawStart.origX + dx;
    selectedAnnot.data.y = drawStart.origY + dy;
    redrawAnnotations(pageNum);
    return;
  }

  if(currentTool === 'draw'){
    currentPath.push({x: pos.x, y: pos.y});
    redrawAnnotations(pageNum, {type:'draw', path: currentPath});
    return;
  }

  // Preview shapes
  if(['line','arrow','rect','circle','highlight','redact'].includes(currentTool)){
    redrawAnnotations(pageNum, {
      type: currentTool, x: drawStart.x, y: drawStart.y,
      x2: pos.x, y2: pos.y
    });
  }
}

function onPointerUp(e, pageNum){
  if(!isDrawing) return;
  const pos = getCanvasPos(e, pageNum);
  isDrawing = false;

  if(currentTool === 'select'){
    if(selectedAnnot){
      pushUndo();
    }
    drawStart = null;
    return;
  }

  if(!pos || !drawStart) { drawStart = null; currentPath = []; return; }

  pushUndo();
  let annot = null;
  const s = RENDER_SCALE;

  if(currentTool === 'draw' && currentPath.length > 1){
    annot = {
      id: nextId(), page: pageNum, type: 'draw',
      data: {path: [...currentPath], color: '#ff6600', width: 4}
    };
  } else if(currentTool === 'line'){
    annot = {
      id: nextId(), page: pageNum, type: 'line',
      data: {x: drawStart.x, y: drawStart.y, x2: pos.x, y2: pos.y, color: '#ff6600', width: 3}
    };
  } else if(currentTool === 'arrow'){
    annot = {
      id: nextId(), page: pageNum, type: 'arrow',
      data: {x: drawStart.x, y: drawStart.y, x2: pos.x, y2: pos.y, color: '#ff6600', width: 3}
    };
  } else if(currentTool === 'rect'){
    annot = {
      id: nextId(), page: pageNum, type: 'rect',
      data: {x: Math.min(drawStart.x,pos.x), y: Math.min(drawStart.y,pos.y),
             w: Math.abs(pos.x-drawStart.x), h: Math.abs(pos.y-drawStart.y),
             color: '#ff6600', width: 3, fill: 'none'}
    };
  } else if(currentTool === 'circle'){
    const cx = (drawStart.x+pos.x)/2, cy = (drawStart.y+pos.y)/2;
    const rx = Math.abs(pos.x-drawStart.x)/2, ry = Math.abs(pos.y-drawStart.y)/2;
    annot = {
      id: nextId(), page: pageNum, type: 'circle',
      data: {cx, cy, rx, ry, color: '#ff6600', width: 3, fill: 'none'}
    };
  } else if(currentTool === 'highlight'){
    annot = {
      id: nextId(), page: pageNum, type: 'highlight',
      data: {x: Math.min(drawStart.x,pos.x), y: Math.min(drawStart.y,pos.y),
             w: Math.abs(pos.x-drawStart.x), h: Math.abs(pos.y-drawStart.y),
             color: 'rgba(255,255,0,0.35)'}
    };
  } else if(currentTool === 'redact'){
    annot = {
      id: nextId(), page: pageNum, type: 'redact',
      data: {x: Math.min(drawStart.x,pos.x), y: Math.min(drawStart.y,pos.y),
             w: Math.abs(pos.x-drawStart.x), h: Math.abs(pos.y-drawStart.y)}
    };
  }

  if(annot){
    annotations.push(annot);
    selectAnnotation(annot);
    updateAnnotList();
  }
  drawStart = null;
  currentPath = [];
  redrawAnnotations(pageNum);
}

// ══════════════════════════════════════════════
// HIT TEST
// ══════════════════════════════════════════════
function hitTestAnnotation(pos, pageNum){
  const margin = 20;
  // Reverse order so topmost is hit first
  for(let i = annotations.length - 1; i >= 0; i--){
    const a = annotations[i];
    if(a.page !== pageNum) continue;
    const d = a.data;
    switch(a.type){
      case 'text':
      case 'stamp':
      case 'signature':
      case 'image':
        if(pos.x >= (d.x||0)-margin && pos.x <= (d.x||0)+(d.w||200)+margin &&
           pos.y >= (d.y||0)-(d.h||40)-margin && pos.y <= (d.y||0)+margin)
          return a;
        break;
      case 'rect':
      case 'highlight':
      case 'redact':
        if(pos.x >= d.x-margin && pos.x <= d.x+d.w+margin &&
           pos.y >= d.y-margin && pos.y <= d.y+d.h+margin)
          return a;
        break;
      case 'circle':
        const dx = (pos.x - d.cx)/(d.rx+margin);
        const dy = (pos.y - d.cy)/(d.ry+margin);
        if(dx*dx + dy*dy <= 1) return a;
        break;
      case 'line':
      case 'arrow':
        if(distToSegment(pos, {x:d.x,y:d.y}, {x:d.x2,y:d.y2}) < 20) return a;
        break;
      case 'draw':
        for(let j=1;j<d.path.length;j++){
          if(distToSegment(pos, d.path[j-1], d.path[j]) < 20) return a;
        }
        break;
    }
  }
  return null;
}

function distToSegment(p, a, b){
  const dx = b.x-a.x, dy = b.y-a.y;
  const lenSq = dx*dx + dy*dy;
  if(lenSq === 0) return Math.hypot(p.x-a.x, p.y-a.y);
  let t = ((p.x-a.x)*dx + (p.y-a.y)*dy) / lenSq;
  t = Math.max(0, Math.min(1, t));
  return Math.hypot(p.x - (a.x + t*dx), p.y - (a.y + t*dy));
}

// ══════════════════════════════════════════════
// RENDER ANNOTATIONS
// ══════════════════════════════════════════════
function redrawAnnotations(pageNum, preview){
  const ac = annotCanvases[pageNum];
  if(!ac) return;
  const ctx = ac.ctx;
  ctx.clearRect(0, 0, ac.canvas.width, ac.canvas.height);

  const pageAnnots = annotations.filter(a => a.page === pageNum);
  for(const a of pageAnnots){
    drawAnnotation(ctx, a, a === selectedAnnot);
  }
  if(preview){
    drawPreview(ctx, preview);
  }
}

function drawAnnotation(ctx, a, selected){
  const d = a.data;
  ctx.save();

  switch(a.type){
    case 'text':
      ctx.font = (d.fontSize || 28) + 'px ' + (d.fontFamily || 'Helvetica');
      ctx.fillStyle = d.color || '#000';
      ctx.textBaseline = 'top';
      const lines = (d.text||'').split('\n');
      lines.forEach((line, i) => {
        ctx.fillText(line, d.x, d.y + i * (d.fontSize||28) * 1.2);
      });
      if(selected){
        const metrics = ctx.measureText(d.text||'Text');
        d.w = metrics.width;
        d.h = (d.fontSize||28) * lines.length * 1.2;
        ctx.strokeStyle = '#00d4ff';
        ctx.lineWidth = 2;
        ctx.setLineDash([6,4]);
        ctx.strokeRect(d.x-4, d.y-4, d.w+8, d.h+8);
      }
      break;

    case 'draw':
      if(d.path.length < 2) break;
      ctx.strokeStyle = d.color || '#ff6600';
      ctx.lineWidth = d.width || 4;
      ctx.lineCap = 'round';
      ctx.lineJoin = 'round';
      ctx.beginPath();
      ctx.moveTo(d.path[0].x, d.path[0].y);
      for(let i=1;i<d.path.length;i++) ctx.lineTo(d.path[i].x, d.path[i].y);
      ctx.stroke();
      break;

    case 'line':
      ctx.strokeStyle = d.color || '#ff6600';
      ctx.lineWidth = d.width || 3;
      ctx.beginPath();
      ctx.moveTo(d.x, d.y);
      ctx.lineTo(d.x2, d.y2);
      ctx.stroke();
      break;

    case 'arrow':
      ctx.strokeStyle = d.color || '#ff6600';
      ctx.fillStyle = d.color || '#ff6600';
      ctx.lineWidth = d.width || 3;
      ctx.beginPath();
      ctx.moveTo(d.x, d.y);
      ctx.lineTo(d.x2, d.y2);
      ctx.stroke();
      // Arrowhead
      const angle = Math.atan2(d.y2-d.y, d.x2-d.x);
      const headLen = 20;
      ctx.beginPath();
      ctx.moveTo(d.x2, d.y2);
      ctx.lineTo(d.x2 - headLen*Math.cos(angle-0.4), d.y2 - headLen*Math.sin(angle-0.4));
      ctx.lineTo(d.x2 - headLen*Math.cos(angle+0.4), d.y2 - headLen*Math.sin(angle+0.4));
      ctx.closePath();
      ctx.fill();
      break;

    case 'rect':
      ctx.strokeStyle = d.color || '#ff6600';
      ctx.lineWidth = d.width || 3;
      if(d.fill && d.fill !== 'none'){
        ctx.fillStyle = d.fill;
        ctx.fillRect(d.x, d.y, d.w, d.h);
      }
      ctx.strokeRect(d.x, d.y, d.w, d.h);
      if(selected){
        ctx.strokeStyle = '#00d4ff';
        ctx.lineWidth = 2;
        ctx.setLineDash([6,4]);
        ctx.strokeRect(d.x-4, d.y-4, d.w+8, d.h+8);
      }
      break;

    case 'circle':
      ctx.strokeStyle = d.color || '#ff6600';
      ctx.lineWidth = d.width || 3;
      ctx.beginPath();
      ctx.ellipse(d.cx, d.cy, d.rx, d.ry, 0, 0, Math.PI*2);
      if(d.fill && d.fill !== 'none'){
        ctx.fillStyle = d.fill;
        ctx.fill();
      }
      ctx.stroke();
      if(selected){
        ctx.strokeStyle = '#00d4ff';
        ctx.lineWidth = 2;
        ctx.setLineDash([6,4]);
        ctx.strokeRect(d.cx-d.rx-4, d.cy-d.ry-4, d.rx*2+8, d.ry*2+8);
      }
      break;

    case 'highlight':
      ctx.fillStyle = d.color || 'rgba(255,255,0,0.35)';
      ctx.fillRect(d.x, d.y, d.w, d.h);
      if(selected){
        ctx.strokeStyle = '#00d4ff';
        ctx.lineWidth = 2;
        ctx.setLineDash([6,4]);
        ctx.strokeRect(d.x-2, d.y-2, d.w+4, d.h+4);
      }
      break;

    case 'redact':
      ctx.fillStyle = '#000000';
      ctx.fillRect(d.x, d.y, d.w, d.h);
      if(selected){
        ctx.strokeStyle = '#ef4444';
        ctx.lineWidth = 2;
        ctx.setLineDash([6,4]);
        ctx.strokeRect(d.x-2, d.y-2, d.w+4, d.h+4);
      }
      break;

    case 'stamp':
      const stampColors = {
        'APPROVED': '#10b981', 'REJECTED': '#ef4444', 'DRAFT': '#ff6600',
        'REVIEWED': '#00d4ff', 'CONFIDENTIAL': '#a855f7', 'DATE': '#e2e8f0'
      };
      const sColor = stampColors[d.stampType] || '#ff6600';
      ctx.save();
      ctx.translate(d.x, d.y);
      if(d.rotation) ctx.rotate(d.rotation * Math.PI/180);
      // Box
      const sText = d.stampType === 'DATE' ? d.dateText : d.stampType;
      ctx.font = 'bold ' + (d.fontSize||48) + 'px JetBrains Mono';
      const sm = ctx.measureText(sText);
      const sw = sm.width + 40;
      const sh = (d.fontSize||48) + 24;
      d.w = sw; d.h = sh;
      ctx.strokeStyle = sColor;
      ctx.lineWidth = 4;
      ctx.globalAlpha = 0.85;
      ctx.strokeRect(-10, -(d.fontSize||48)-4, sw, sh);
      ctx.fillStyle = sColor;
      ctx.textBaseline = 'top';
      ctx.fillText(sText, 10, -(d.fontSize||48)+8);
      ctx.globalAlpha = 1;
      ctx.restore();
      if(selected){
        ctx.strokeStyle = '#00d4ff';
        ctx.lineWidth = 2;
        ctx.setLineDash([6,4]);
        ctx.strokeRect(d.x-14, d.y-(d.fontSize||48)-8, (d.w||200)+8, (d.h||60)+8);
      }
      break;

    case 'signature':
      if(d.imgEl){
        ctx.drawImage(d.imgEl, d.x, d.y, d.w||200, d.h||80);
      }
      if(selected){
        ctx.strokeStyle = '#00d4ff';
        ctx.lineWidth = 2;
        ctx.setLineDash([6,4]);
        ctx.strokeRect(d.x-4, d.y-4, (d.w||200)+8, (d.h||80)+8);
      }
      break;

    case 'image':
      if(d.imgEl){
        ctx.drawImage(d.imgEl, d.x, d.y, d.w||200, d.h||200);
      }
      if(selected){
        ctx.strokeStyle = '#00d4ff';
        ctx.lineWidth = 2;
        ctx.setLineDash([6,4]);
        ctx.strokeRect(d.x-4, d.y-4, (d.w||200)+8, (d.h||200)+8);
      }
      break;
  }
  ctx.restore();
}

function drawPreview(ctx, p){
  ctx.save();
  ctx.strokeStyle = '#00d4ff';
  ctx.fillStyle = 'rgba(0,212,255,0.15)';
  ctx.lineWidth = 3;
  ctx.setLineDash([8,6]);

  switch(p.type){
    case 'draw':
      if(p.path && p.path.length > 1){
        ctx.strokeStyle = '#ff6600';
        ctx.setLineDash([]);
        ctx.lineCap = 'round';
        ctx.beginPath();
        ctx.moveTo(p.path[0].x, p.path[0].y);
        for(let i=1;i<p.path.length;i++) ctx.lineTo(p.path[i].x, p.path[i].y);
        ctx.stroke();
      }
      break;
    case 'line':
      ctx.beginPath(); ctx.moveTo(p.x, p.y); ctx.lineTo(p.x2, p.y2); ctx.stroke();
      break;
    case 'arrow':
      ctx.beginPath(); ctx.moveTo(p.x, p.y); ctx.lineTo(p.x2, p.y2); ctx.stroke();
      const angle = Math.atan2(p.y2-p.y, p.x2-p.x);
      ctx.setLineDash([]);
      ctx.beginPath();
      ctx.moveTo(p.x2, p.y2);
      ctx.lineTo(p.x2-18*Math.cos(angle-0.4), p.y2-18*Math.sin(angle-0.4));
      ctx.lineTo(p.x2-18*Math.cos(angle+0.4), p.y2-18*Math.sin(angle+0.4));
      ctx.closePath(); ctx.fill();
      break;
    case 'rect':
      const rx=Math.min(p.x,p.x2), ry=Math.min(p.y,p.y2), rw=Math.abs(p.x2-p.x), rh=Math.abs(p.y2-p.y);
      ctx.strokeRect(rx,ry,rw,rh);
      break;
    case 'circle':
      const ccx=(p.x+p.x2)/2, ccy=(p.y+p.y2)/2;
      ctx.beginPath();
      ctx.ellipse(ccx, ccy, Math.abs(p.x2-p.x)/2, Math.abs(p.y2-p.y)/2, 0, 0, Math.PI*2);
      ctx.stroke();
      break;
    case 'highlight':
      ctx.setLineDash([]);
      ctx.fillStyle = 'rgba(255,255,0,0.3)';
      ctx.fillRect(Math.min(p.x,p.x2), Math.min(p.y,p.y2), Math.abs(p.x2-p.x), Math.abs(p.y2-p.y));
      break;
    case 'redact':
      ctx.setLineDash([]);
      ctx.fillStyle = 'rgba(0,0,0,0.6)';
      ctx.fillRect(Math.min(p.x,p.x2), Math.min(p.y,p.y2), Math.abs(p.x2-p.x), Math.abs(p.y2-p.y));
      break;
  }
  ctx.restore();
}

// ══════════════════════════════════════════════
// SELECTION & PROPERTIES
// ══════════════════════════════════════════════
function selectAnnotation(annot){
  selectedAnnot = annot;
  // Redraw all pages to show/remove selection indicators
  for(let i = 1; i <= totalPages; i++) redrawAnnotations(i);
  updatePropsPanel();
  updateAnnotList();
}

function updatePropsPanel(){
  const container = document.getElementById('props-content');
  if(!selectedAnnot){
    container.innerHTML = '<div class="no-sel">Select an annotation to edit its properties</div>';
    return;
  }
  const a = selectedAnnot;
  const d = a.data;
  let html = '<div class="ps">';
  html += '<div class="pr"><span class="pl">Type</span><div style="color:var(--primary);font-weight:600;text-transform:uppercase">' + a.type + '</div></div>';

  if(a.type === 'text'){
    html += '<div class="pr"><span class="pl">Text</span><textarea class="p-textarea" onchange="propChange(\'text\',this.value)">' + (d.text||'') + '</textarea></div>';
    html += '<div class="pr"><span class="pl">Font Size</span><input type="number" class="p-input" value="'+(d.fontSize||28)+'" onchange="propChange(\'fontSize\',+this.value)"></div>';
    html += '<div class="pr"><span class="pl">Color</span><input type="color" class="p-color" value="'+(d.color||'#000000')+'" onchange="propChange(\'color\',this.value)"></div>';
  }

  if(['draw','line','arrow','rect','circle'].includes(a.type)){
    html += '<div class="pr"><span class="pl">Color</span><input type="color" class="p-color" value="'+(d.color||'#ff6600')+'" onchange="propChange(\'color\',this.value)"></div>';
    html += '<div class="pr"><span class="pl">Width</span><input type="range" class="p-slider" min="1" max="20" value="'+(d.width||3)+'" onchange="propChange(\'width\',+this.value)"></div>';
  }

  if(['rect','circle'].includes(a.type)){
    html += '<div class="pr"><span class="pl">Fill</span><input type="color" class="p-color" value="'+(d.fill && d.fill!=='none' ? d.fill : '#ffffff')+'" onchange="propChange(\'fill\',this.value)"></div>';
    html += '<div class="pr"><label style="display:flex;align-items:center;gap:6px;cursor:pointer;color:var(--text)"><input type="checkbox" '+(d.fill && d.fill!=='none'?'checked':'')+' onchange="propChange(\'fill\',this.checked?\'#ffffff\':\'none\')"> Fill</label></div>';
  }

  if(a.type === 'stamp'){
    html += '<div class="pr"><span class="pl">Font Size</span><input type="number" class="p-input" value="'+(d.fontSize||48)+'" onchange="propChange(\'fontSize\',+this.value)"></div>';
    html += '<div class="pr"><span class="pl">Rotation</span><input type="range" class="p-slider" min="-45" max="45" value="'+(d.rotation||0)+'" onchange="propChange(\'rotation\',+this.value)"></div>';
  }

  if(['signature','image'].includes(a.type)){
    html += '<div class="pr"><span class="pl">Width</span><input type="number" class="p-input" value="'+(d.w||200)+'" onchange="propChange(\'w\',+this.value)"></div>';
    html += '<div class="pr"><span class="pl">Height</span><input type="number" class="p-input" value="'+(d.h||80)+'" onchange="propChange(\'h\',+this.value)"></div>';
  }

  html += '</div>';
  html += '<div class="ps"><button class="del-btn" onclick="deleteAnnotation()">Delete Annotation</button></div>';
  container.innerHTML = html;
}

function propChange(key, val){
  if(!selectedAnnot) return;
  pushUndo();
  selectedAnnot.data[key] = val;
  redrawAnnotations(selectedAnnot.page);
  updatePropsPanel();
}

function deleteAnnotation(){
  if(!selectedAnnot) return;
  pushUndo();
  const pg = selectedAnnot.page;
  annotations = annotations.filter(a => a !== selectedAnnot);
  selectedAnnot = null;
  redrawAnnotations(pg);
  updatePropsPanel();
  updateAnnotList();
  updateStatus();
}

// ══════════════════════════════════════════════
// ANNOTATIONS LIST
// ══════════════════════════════════════════════
function updateAnnotList(){
  const list = document.getElementById('annot-list');
  if(!list) return;
  list.innerHTML = '';
  if(annotations.length === 0){
    list.innerHTML = '<div class="no-sel">No annotations yet</div>';
    return;
  }
  annotations.forEach(a => {
    const item = document.createElement('div');
    item.className = 'thumb-item' + (a === selectedAnnot ? ' active' : '');
    item.style.cursor = 'pointer';
    item.innerHTML = '<div style="font-size:10px;font-weight:700;color:var(--primary);text-transform:uppercase;letter-spacing:.06em">' + a.type + '</div>' +
      '<div style="font-size:9px;color:var(--dim)">Page ' + a.page + '</div>';
    item.onclick = () => {
      selectAnnotation(a);
      goToPage(a.page);
    };
    list.appendChild(item);
  });
}

// ══════════════════════════════════════════════
function showSignatureModal(){
  const body = document.getElementById('modal-body');
  body.innerHTML = `
    <h3>Draw Signature</h3>
    <canvas id="sig-canvas" width="500" height="200"></canvas>
    <div class="modal-btns">
      <button onclick="clearSigCanvas()">Clear</button>
      <button onclick="closeModal()">Cancel</button>
      <button class="ok-btn" onclick="placeSignature()">Place</button>
    </div>
  `;
  document.getElementById('modal-overlay').classList.add('show');

  const sigCanvas = document.getElementById('sig-canvas');
  const sigCtx = sigCanvas.getContext('2d');
  sigCtx.fillStyle = '#ffffff';
  sigCtx.fillRect(0,0,500,200);

  let drawing = false;
  sigCanvas.onpointerdown = e => {
    drawing = true;
    const r = sigCanvas.getBoundingClientRect();
    sigCtx.beginPath();
    sigCtx.moveTo((e.clientX-r.left)*500/r.width, (e.clientY-r.top)*200/r.height);
  };
  sigCanvas.onpointermove = e => {
    if(!drawing) return;
    const r = sigCanvas.getBoundingClientRect();
    sigCtx.strokeStyle = '#000';
    sigCtx.lineWidth = 3;
    sigCtx.lineCap = 'round';
    sigCtx.lineTo((e.clientX-r.left)*500/r.width, (e.clientY-r.top)*200/r.height);
    sigCtx.stroke();
  };
  sigCanvas.onpointerup = () => drawing = false;
}

function clearSigCanvas(){
  const c = document.getElementById('sig-canvas');
  if(!c) return;
  const ctx = c.getContext('2d');
  ctx.fillStyle = '#ffffff';
  ctx.fillRect(0,0,500,200);
}

function placeSignature(){
  const sigCanvas = document.getElementById('sig-canvas');
  if(!sigCanvas || !pdfDoc) return;
  const dataURL = sigCanvas.toDataURL('image/png');
  closeModal();
  pushUndo();

  const img = new Image();
  img.onload = () => {
    const pc = pageCanvases[currentPage];
    const annot = {
      id: nextId(), page: currentPage, type: 'signature',
      data: {x: pc.width*0.3, y: pc.height*0.7, w: 300, h: 120, imgEl: img, dataURL}
    };
    annotations.push(annot);
    selectAnnotation(annot);
    redrawAnnotations(currentPage);
    updateAnnotList();
    setTool('select');
  };
  img.src = dataURL;
}

function insertImage(){
  document.getElementById('img-input').click();
}

function handleImageInput(e){
  const file = e.target.files[0];
  if(!file || !pdfDoc) return;
  const reader = new FileReader();
  reader.onload = ev => {
    const img = new Image();
    img.onload = () => {
      pushUndo();
      const pc = pageCanvases[currentPage];
      const scale = Math.min(pc.width*0.4 / img.width, pc.height*0.4 / img.height, 1);
      const annot = {
        id: nextId(), page: currentPage, type: 'image',
        data: {x: pc.width*0.25, y: pc.height*0.25, w: img.width*scale, h: img.height*scale,
               imgEl: img, dataURL: ev.target.result}
      };
      annotations.push(annot);
      selectAnnotation(annot);
      redrawAnnotations(currentPage);
      updateAnnotList();
      setTool('select');
    };
    img.src = ev.target.result;
  };
  reader.readAsDataURL(file);
  e.target.value = '';
}

// ══════════════════════════════════════════════
// PAGE OPERATIONS
// ══════════════════════════════════════════════
async function rotatePage(pageNum){
  if(!pdfBytes) return;
  try {
    const lib = PDFLib;
    const doc = await lib.PDFDocument.load(pdfBytes);
    const pages = doc.getPages();
    if(pageNum < 1 || pageNum > pages.length) return;
    const page = pages[pageNum-1];
    const curRot = page.getRotation().angle;
    page.setRotation(lib.degrees(curRot + 90));
    pdfBytes = await doc.save();
    await loadPDF(pdfBytes);
  } catch(err){
    alert('Rotate error: ' + err.message);
  }
}

async function deletePage(pageNum){
  if(!pdfBytes || totalPages <= 1) return;
  if(!confirm('Delete page ' + pageNum + '?')) return;
  try {
    const lib = PDFLib;
    const doc = await lib.PDFDocument.load(pdfBytes);
    doc.removePage(pageNum - 1);
    // Remove annotations for that page and adjust page numbers
    annotations = annotations.filter(a => a.page !== pageNum).map(a => {
      if(a.page > pageNum) a.page--;
      return a;
    });
    pdfBytes = await doc.save();
    if(currentPage > totalPages - 1) currentPage = totalPages - 1;
    await loadPDF(pdfBytes);
  } catch(err){
    alert('Delete error: ' + err.message);
  }
}

async function movePage(from, to){
  if(!pdfBytes || from === to || from < 1 || to < 1 || from > totalPages || to > totalPages) return;
  try {
    const lib = PDFLib;
    // Create a new document and insert pages in new order
    const srcDoc = await lib.PDFDocument.load(pdfBytes);
    const newDoc = await lib.PDFDocument.create();
    const order = [];
    for(let i = 0; i < totalPages; i++) order.push(i);
    // Swap
    const fi = from - 1, ti = to - 1;
    order.splice(fi, 1);
    order.splice(ti, 0, fi);

    const copied = await newDoc.copyPages(srcDoc, order);
    copied.forEach(p => newDoc.addPage(p));

    // Update annotation page numbers
    annotations.forEach(a => {
      if(a.page === from) a.page = to;
      else if(from < to && a.page > from && a.page <= to) a.page--;
      else if(from > to && a.page >= to && a.page < from) a.page++;
    });

    pdfBytes = await newDoc.save();
    await loadPDF(pdfBytes);
    goToPage(to);
  } catch(err){
    alert('Move error: ' + err.message);
  }
}

async function detectFormFields(){

  try {
    const lib = PDFLib;
    const doc = await lib.PDFDocument.load(pdfBytes);
    const form = doc.getForm();
    const fields = form.getFields();

      });

  }
}

}

// ══════════════════════════════════════════════
// UNDO / REDO
// ══════════════════════════════════════════════
function pushUndo(){
  undoStack.push(JSON.parse(JSON.stringify(annotations.map(a => ({
    ...a,
    data: {...a.data, imgEl: undefined, dataURL: a.data.dataURL}
  })))));
  redoStack = [];
  if(undoStack.length > 100) undoStack.shift();
}

function undo(){
  if(undoStack.length === 0) return;
  redoStack.push(JSON.parse(JSON.stringify(annotations.map(a => ({
    ...a,
    data: {...a.data, imgEl: undefined, dataURL: a.data.dataURL}
  })))));
  const state = undoStack.pop();
  restoreState(state);
}

function redo(){
  if(redoStack.length === 0) return;
  undoStack.push(JSON.parse(JSON.stringify(annotations.map(a => ({
    ...a,
    data: {...a.data, imgEl: undefined, dataURL: a.data.dataURL}
  })))));
  const state = redoStack.pop();
  restoreState(state);
}

function restoreState(state){
  selectedAnnot = null;
  // Restore and rebuild image elements
  let pending = 0;
  annotations = state.map(a => {
    const restored = {...a, data: {...a.data}};
    if(a.data.dataURL && (a.type === 'signature' || a.type === 'image')){
      pending++;
      const img = new Image();
      img.onload = () => {
        restored.data.imgEl = img;
        pending--;
        if(pending === 0) refreshAll();
      };
      img.src = a.data.dataURL;
    }
    return restored;
  });
  if(pending === 0) refreshAll();
}

function refreshAll(){
  for(let i = 1; i <= totalPages; i++) redrawAnnotations(i);
  updatePropsPanel();
  updateAnnotList();
  updateStatus();
}

// ══════════════════════════════════════════════
// EXPORT PDF
// ══════════════════════════════════════════════
async function exportPDF(){
  if(!pdfBytes) return;
  const body = document.getElementById('modal-body');
  body.innerHTML = '<h3>Exporting PDF...</h3><div class="progress-wrap"><div class="progress-bar" id="export-progress"></div></div>';
  document.getElementById('modal-overlay').classList.add('show');

  try {
    const lib = PDFLib;
    const doc = await lib.PDFDocument.load(pdfBytes);
    const pages = doc.getPages();
    const prog = document.getElementById('export-progress');

    for(let i = 0; i < pages.length; i++){
      const pageNum = i + 1;
      const page = pages[i];
      const {width, height} = page.getSize();
      const pageAnnots = annotations.filter(a => a.page === pageNum);

      // Scale factor from our render coords to PDF coords
      const pc = pageCanvases[pageNum];
      if(!pc) continue;
      const sx = width / pc.width;
      const sy = height / pc.height;

      for(const a of pageAnnots){
        const d = a.data;
        switch(a.type){
          case 'text': {
            const lines = (d.text||'').split('\n');
            const fs = (d.fontSize||28) * sx;
            lines.forEach((line, li) => {
              page.drawText(line, {
                x: d.x * sx,
                y: height - (d.y + li * (d.fontSize||28) * 1.2) * sy - fs,
                size: fs,
                color: hexToRgb(d.color || '#000000'),
              });
            });
            break;
          }
          case 'rect': {
            page.drawRectangle({
              x: d.x * sx, y: height - (d.y + d.h) * sy,
              width: d.w * sx, height: d.h * sy,
              borderColor: hexToRgb(d.color || '#ff6600'),
              borderWidth: (d.width||3) * sx,
              color: d.fill && d.fill !== 'none' ? hexToRgb(d.fill) : undefined,
              opacity: d.fill && d.fill !== 'none' ? 1 : 0,
            });
            break;
          }
          case 'circle': {
            page.drawEllipse({
              x: d.cx * sx, y: height - d.cy * sy,
              xScale: d.rx * sx, yScale: d.ry * sy,
              borderColor: hexToRgb(d.color || '#ff6600'),
              borderWidth: (d.width||3) * sx,
              color: d.fill && d.fill !== 'none' ? hexToRgb(d.fill) : undefined,
              opacity: d.fill && d.fill !== 'none' ? 1 : 0,
            });
            break;
          }
          case 'line':
          case 'arrow': {
            page.drawLine({
              start: {x: d.x * sx, y: height - d.y * sy},
              end: {x: d.x2 * sx, y: height - d.y2 * sy},
              color: hexToRgb(d.color || '#ff6600'),
              thickness: (d.width||3) * sx,
            });
            if(a.type === 'arrow'){
              // Draw arrowhead as a small triangle
              const angle = Math.atan2((d.y2-d.y)*sy, (d.x2-d.x)*sx);
              const hl = 15 * sx;
              const tx = d.x2 * sx, ty = height - d.y2 * sy;
              // Use line segments for arrowhead
              page.drawLine({
                start: {x: tx, y: ty},
                end: {x: tx - hl*Math.cos(angle-0.4), y: ty + hl*Math.sin(angle-0.4)},
                color: hexToRgb(d.color || '#ff6600'),
                thickness: (d.width||3) * sx,
              });
              page.drawLine({
                start: {x: tx, y: ty},
                end: {x: tx - hl*Math.cos(angle+0.4), y: ty + hl*Math.sin(angle+0.4)},
                color: hexToRgb(d.color || '#ff6600'),
                thickness: (d.width||3) * sx,
              });
            }
            break;
          }
          case 'draw': {
            if(d.path && d.path.length > 1){
              for(let j = 1; j < d.path.length; j++){
                page.drawLine({
                  start: {x: d.path[j-1].x * sx, y: height - d.path[j-1].y * sy},
                  end: {x: d.path[j].x * sx, y: height - d.path[j].y * sy},
                  color: hexToRgb(d.color || '#ff6600'),
                  thickness: (d.width||4) * sx,
                });
              }
            }
            break;
          }
          case 'highlight': {
            page.drawRectangle({
              x: d.x * sx, y: height - (d.y + d.h) * sy,
              width: d.w * sx, height: d.h * sy,
              color: lib.rgb(1, 1, 0),
              opacity: 0.35,
            });
            break;
          }
          case 'redact': {
            page.drawRectangle({
              x: d.x * sx, y: height - (d.y + d.h) * sy,
              width: d.w * sx, height: d.h * sy,
              color: lib.rgb(0, 0, 0),
            });
            break;
          }
          case 'stamp': {
            const stampColors = {
              'APPROVED': '#10b981', 'REJECTED': '#ef4444', 'DRAFT': '#ff6600',
              'REVIEWED': '#00d4ff', 'CONFIDENTIAL': '#a855f7', 'DATE': '#e2e8f0'
            };
            const sColor = stampColors[d.stampType] || '#ff6600';
            const sText = d.stampType === 'DATE' ? d.dateText : d.stampType;
            const fs = (d.fontSize||48) * sx;
            // Draw stamp border
            page.drawRectangle({
              x: (d.x - 10) * sx,
              y: height - d.y * sy - 4*sy,
              width: (d.w || 300) * sx,
              height: (d.h || 72) * sy,
              borderColor: hexToRgb(sColor),
              borderWidth: 4 * sx,
              opacity: 0,
            });
            page.drawText(sText, {
              x: (d.x + 10) * sx,
              y: height - d.y * sy + 8 * sy - fs * 0.2,
              size: fs * 0.8,
              color: hexToRgb(sColor),
              rotate: lib.degrees(d.rotation || 0),
            });
            break;
          }
          case 'signature':
          case 'image': {
            if(d.dataURL){
              try {
                let embedded;
                if(d.dataURL.includes('image/png')){
                  const imgBytes = dataURLtoBytes(d.dataURL);
                  embedded = await doc.embedPng(imgBytes);
                } else {
                  const imgBytes = dataURLtoBytes(d.dataURL);
                  try { embedded = await doc.embedJpg(imgBytes); }
                  catch { embedded = await doc.embedPng(imgBytes); }
                }
                page.drawImage(embedded, {
                  x: d.x * sx,
                  y: height - (d.y + (d.h||80)) * sy,
                  width: (d.w||200) * sx,
                  height: (d.h||80) * sy,
                });
              } catch(imgErr){
                console.warn('Could not embed image:', imgErr);
              }
            }
            break;
          }
        }
      }
      if(prog) prog.style.width = ((i+1)/pages.length*100) + '%';
    }

    const outBytes = await doc.save();
    downloadBlob(new Blob([outBytes], {type:'application/pdf'}), (fileName||'document').replace(/\.pdf$/i,'') + '_edited.pdf');
    closeModal();
  } catch(err){
    closeModal();
    alert('Export error: ' + err.message);
  }
}

function hexToRgb(hex){
  const r = parseInt(hex.slice(1,3),16)/255;
  const g = parseInt(hex.slice(3,5),16)/255;
  const b = parseInt(hex.slice(5,7),16)/255;
  return PDFLib.rgb(r, g, b);
}

function dataURLtoBytes(dataURL){
  const base64 = dataURL.split(',')[1];
  const binary = atob(base64);
  const bytes = new Uint8Array(binary.length);
  for(let i = 0; i < binary.length; i++) bytes[i] = binary.charCodeAt(i);
  return bytes;
}

// ══════════════════════════════════════════════
// EXPORT PNG
// ══════════════════════════════════════════════
async function exportPNG(){
  if(!pdfDoc) return;
  const body = document.getElementById('modal-body');
  body.innerHTML = `
    <h3>Export PNG</h3>
    <label>Page</label>
    <input type="number" id="png-page" value="${currentPage}" min="1" max="${totalPages}" style="min-height:44px">
    <label>DPI (300 recommended for print)</label>
    <input type="number" id="png-dpi" value="300" min="72" max="600" style="min-height:44px">
    <div class="modal-btns">
      <button onclick="closeModal()">Cancel</button>
      <button class="ok-btn" onclick="doExportPNG()">Export</button>
    </div>
  `;
  document.getElementById('modal-overlay').classList.add('show');
}

async function doExportPNG(){
  const pageNum = parseInt(document.getElementById('png-page').value) || currentPage;
  const dpi = parseInt(document.getElementById('png-dpi').value) || 300;
  closeModal();

  if(pageNum < 1 || pageNum > totalPages) return;

  try {
    const page = await pdfDoc.getPage(pageNum);
    const scaleFactor = dpi / 72;
    const vp = page.getViewport({scale: scaleFactor});

    // Render PDF page at high res
    const tempCanvas = document.createElement('canvas');
    tempCanvas.width = vp.width;
    tempCanvas.height = vp.height;
    const tempCtx = tempCanvas.getContext('2d');
    await page.render({canvasContext: tempCtx, viewport: vp}).promise;

    // Draw annotations at the same scale
    const pc = pageCanvases[pageNum];
    if(pc){
      const asx = vp.width / pc.width;
      const asy = vp.height / pc.height;
      tempCtx.save();
      tempCtx.scale(asx, asy);
      const pageAnnots = annotations.filter(a => a.page === pageNum);
      for(const a of pageAnnots){
        drawAnnotation(tempCtx, a, false);
      }
      tempCtx.restore();
    }

    tempCanvas.toBlob(blob => {
      if(blob) downloadBlob(blob, (fileName||'document').replace(/\.pdf$/i,'') + '_p' + pageNum + '_' + dpi + 'dpi.png');
    }, 'image/png');
  } catch(err){
    alert('PNG export error: ' + err.message);
  }
}

// ══════════════════════════════════════════════
// UTILITIES
// ══════════════════════════════════════════════
function downloadBlob(blob, name){
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  a.download = name;
  document.body.appendChild(a);
  a.click();
  document.body.removeChild(a);
  URL.revokeObjectURL(url);
}

function closeModal(){
  document.getElementById('modal-overlay').classList.remove('show');
}

function toggleSidebar(){
  document.getElementById('sidebar').classList.toggle('collapsed');
}

function toggleProps(){
  document.getElementById('props-panel').classList.toggle('collapsed');
}

function switchSidebarTab(el){
  document.querySelectorAll('.sidebar-tab').forEach(t => t.classList.remove('active'));
  el.classList.add('active');
  const pane = el.dataset.pane;
  document.querySelectorAll('.sidebar-pane').forEach(p => p.classList.remove('active'));
  document.getElementById('pane-' + pane).classList.add('active');
}

function updateStatus(){
  document.getElementById('status-tool').textContent = currentTool.toUpperCase();
  document.getElementById('status-page').textContent = pdfDoc ? 'Page: ' + currentPage + '/' + totalPages : 'Page: -';
  document.getElementById('status-annots').textContent = 'Annotations: ' + annotations.length;
}

// Close stamp menu on outside click
document.addEventListener('click', e => {
  const menu = document.getElementById('stamp-menu');
  const btn = document.getElementById('btn-stamp');
  if(!menu.contains(e.target) && e.target !== btn && !btn.contains(e.target)){
    menu.style.display = 'none';
  }
});

// Keyboard shortcuts
document.addEventListener('keydown', e => {
  if(e.target.tagName === 'INPUT' || e.target.tagName === 'TEXTAREA' || e.target.contentEditable === 'true') return;

  if((e.ctrlKey || e.metaKey) && e.key === 'z' && !e.shiftKey){ e.preventDefault(); undo(); }
  if((e.ctrlKey || e.metaKey) && (e.key === 'y' || (e.key === 'z' && e.shiftKey))){ e.preventDefault(); redo(); }
  if(e.key === 'Delete' || e.key === 'Backspace'){ if(selectedAnnot){ e.preventDefault(); deleteAnnotation(); }}
  if(e.key === 'Escape'){ setTool('select'); selectedAnnot = null; updatePropsPanel(); refreshAll(); }

  // Tool shortcuts
  if(e.key === 'v') setTool('select');
  if(e.key === 't') setTool('text');
  if(e.key === 'd') setTool('draw');
  if(e.key === 'l') setTool('line');
  if(e.key === 'a') setTool('arrow');
  if(e.key === 'r') setTool('rect');
  if(e.key === 'c') setTool('circle');
  if(e.key === 'h') setTool('highlight');

  // Page navigation
  if(e.key === 'ArrowLeft' || e.key === 'PageUp'){ e.preventDefault(); goPage(-1); }
  if(e.key === 'ArrowRight' || e.key === 'PageDown'){ e.preventDefault(); goPage(1); }
});

// Scroll-based current page tracking
document.getElementById('viewer').addEventListener('scroll', function(){
  if(!pdfDoc) return;
  const viewer = this;
  const scrollTop = viewer.scrollTop;
  let closest = 1;
  let minDist = Infinity;
  for(let i = 1; i <= totalPages; i++){
    const wrap = document.getElementById('page-wrap-' + i);
    if(!wrap) continue;
    const dist = Math.abs(wrap.offsetTop - scrollTop - 24);
    if(dist < minDist){ minDist = dist; closest = i; }
  }
  if(closest !== currentPage){
    currentPage = closest;
    document.getElementById('page-input').value = closest;
    document.querySelectorAll('.thumb-item').forEach(el => {
      el.classList.toggle('active', parseInt(el.dataset.page) === closest);
    });
    updateStatus();
  }
});

// Initialize
setTool('select');
updateStatus();
</script>
