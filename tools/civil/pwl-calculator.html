<html lang="en">

<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{--bg:#050a0f;--bg1:#0a1018;--bg2:#0f1822;--bg3:#162030;--border:#1a2a3a;--accent:#00d4ff;--green:#00ff88;--red:#ff3344;--yellow:#ffcc00;--orange:#ff8c00;--text:#e2e8f0;--textDim:rgba(226,232,240,0.45);--textMuted:rgba(226,232,240,0.25);--font:'JetBrains Mono',monospace}

.header{height:52px;background:linear-gradient(180deg,var(--bg2),var(--bg1));border-bottom:1px solid var(--border);display:flex;align-items:center;padding:0 20px;gap:16px;position:sticky;top:0;z-index:100}
.logo-box{width:36px;height:36px;border:1.5px solid var(--accent);display:flex;align-items:center;justify-content:center;box-shadow:0 0 10px rgba(0,212,255,0.25);flex-shrink:0}

.header-title{font-size:16px;font-weight:700;letter-spacing:0.12em;color:var(--accent);text-shadow:0 0 10px rgba(0,212,255,0.25)}
.header-sub{font-size:10px;color:rgba(0,212,255,0.35);letter-spacing:0.15em;text-transform:uppercase}
.tabs{display:flex;gap:0;padding:16px 20px 0;border-bottom:1px solid var(--border);flex-wrap:wrap}
.tab{padding:8px 16px;background:transparent;border:1px solid var(--border);border-bottom:1px solid var(--border);color:var(--textDim);font-size:10px;cursor:pointer;letter-spacing:0.1em;text-transform:uppercase;border-radius:4px 4px 0 0;transition:all 0.15s}
.tab.active{background:var(--bg2);border-color:var(--accent);border-bottom:none;color:var(--accent)}
.container{padding:20px;max-width:1200px;margin:0 auto}
.section{background:var(--bg1);border:1px solid var(--border);border-radius:6px;padding:20px;margin-bottom:16px}
.section-title{font-size:13px;font-weight:700;color:var(--text);margin-bottom:14px;display:flex;align-items:center;gap:8px;letter-spacing:0.3px}
.section-title .icon{color:var(--accent)}
.label{font-size:10px;color:var(--textDim);font-weight:700;text-transform:uppercase;letter-spacing:0.5px;margin-bottom:4px;display:block}
.input{width:100%;background:var(--bg2);border:1px solid var(--border);color:var(--text);font-size:16px;padding:7px 10px;border-radius:6px;outline:none;text-align:center;min-height:44px}
.input:focus{border-color:var(--accent);box-shadow:0 0 5px rgba(0,212,255,0.15)}
.select{background:var(--bg2);border:1px solid var(--border);color:var(--text);font-size:16px;padding:7px 10px;border-radius:6px;outline:none;cursor:pointer;width:100%;min-height:44px}
.grid{display:grid;gap:12px}
.grid-2{grid-template-columns:1fr 1fr}
.grid-3{grid-template-columns:1fr 1fr 1fr}
.grid-4{grid-template-columns:1fr 1fr 1fr 1fr}
.result-box{border-radius:6px;padding:14px 16px;text-align:center}
.result-box.bonus{background:#0d2818;border:1px solid #1a5c30}
.result-box.bonus .value{color:var(--green)}
.result-box.full{background:#0d2818;border:1px solid #1a5c30}
.result-box.full .value{color:var(--green)}
.result-box.reduced{background:#2a2000;border:1px solid #5c4a00}
.result-box.reduced .value{color:var(--yellow)}
.result-box.penalty{background:#2a1000;border:1px solid #5c2000}
.result-box.penalty .value{color:var(--orange)}
.result-box.reject{background:#2a0a0a;border:1px solid #5c1010}
.result-box.reject .value{color:var(--red)}
.result-box.none{background:var(--bg2);border:1px solid var(--border)}
.result-box.none .value{color:var(--textDim)}
.result-box .rlabel{font-size:9px;color:var(--textDim);text-transform:uppercase;letter-spacing:0.5px;margin-bottom:4px}
.result-box .value{font-size:22px;font-weight:700}
.result-box .sub{font-size:10px;color:var(--textDim);margin-top:4px}
.outlier-warn{background:rgba(255,51,68,0.1);border:1px solid rgba(255,51,68,0.3);border-radius:4px;padding:8px 12px;font-size:11px;color:var(--red);margin-top:8px}
.btn{background:transparent;border:1px solid var(--border);color:var(--textDim);font-size:10px;padding:6px 14px;border-radius:4px;cursor:pointer;letter-spacing:0.08em;text-transform:uppercase;transition:all 0.15s}
.btn:hover{border-color:var(--accent);color:var(--accent)}
.btn-accent{border-color:var(--accent);color:var(--accent)}
.btn-green{border-color:var(--green);color:var(--green)}
.btn-red{border-color:var(--red);color:var(--red)}
table{width:100%;border-collapse:collapse}
th,td{padding:6px 10px;border-bottom:1px solid var(--border);font-size:11px;text-align:left}
th{color:var(--textDim);font-size:9px;text-transform:uppercase;letter-spacing:0.1em}
.history-item{background:var(--bg2);border:1px solid var(--border);border-radius:4px;padding:12px;margin-bottom:8px;display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:8px}
@media(max-width:768px){
.grid-2,.grid-3,.grid-4{grid-template-columns:1fr}
.header{padding:0 12px;gap:8px;flex-wrap:wrap;height:auto;padding:8px 12px}
.header-title{font-size:13px}
.header-sub{display:none}
.container{padding:12px}
.section{padding:14px}
.tabs{padding:8px 12px 0}
.tab{padding:6px 10px;font-size:9px}
}
</style>
</head>

function lookupPWL(ql,n){
  if(isNaN(ql)||!isFinite(ql))return null;
  const ci=n-2;
  if(ci<1||ci>8)return null;
  for(let i=0;i<PWL_TABLE.length-1;i++){
    const qh=PWL_TABLE[i][ci],qlw=PWL_TABLE[i+1][ci],ph=PWL_TABLE[i][0],pl=PWL_TABLE[i+1][0];

    if(ql>=qlw&&ql<qh){return pl+(ql-qlw)/(qh-qlw)*(ph-pl)}

  if(ql<=last[ci])return last[0];
  return 0;

  const avPF=payFactor(avPWL),mtPF=payFactor(mtPWL),jtPF=payFactor(jtPWL);
  let combinedPF=null;
  if(avPF!==null&&mtPF!==null&&jtPF!==null)combinedPF=avPF*0.35+mtPF*0.40+jtPF*0.25;
  let totalPay=null;
  const tons=parseFloat(state.lotTonnage),price=parseFloat(state.pricePerTon);
  if(combinedPF!==null&&!isNaN(tons)&&!isNaN(price))totalPay=tons*price*(combinedPF/100);
  return{airVoids:{mean:avM,sd:avS,pwl:avPWL,pf:avPF,outlier:avV.length>=4?grubbsTest(av):null},matDensity:{mean:mtM,sd:mtS,pwl:mtPWL,pf:mtPF,outlier:mtV.length>=4?grubbsTest(mt):null},jointDensity:{mean:jtM,sd:jtS,pwl:jtPWL,pf:jtPF,outlier:jtV.length>=4?grubbsTest(jt):null},combinedPF,totalPay}
}

function fmt(v,d=2){return(v===null||v===undefined||isNaN(v))?'\u2014':Number(v).toFixed(d)}
function fmt$(v){return v===null||isNaN(v)?'\u2014':'$'+Number(v).toLocaleString('en-US',{minimumFractionDigits:2,maximumFractionDigits:2})}

function renderTabs(){
  const tabs=['calculator','results','history','reference'];
  document.getElementById('tabs').innerHTML=tabs.map(t=>`<button class="tab ${state.activeTab===t?'active':''}" onclick="setTab('${t}')">${t}</button>`).join('');
}
function setTab(t){state.activeTab=t;saveState();render()}

function renderInputRow(label,key,count){
  let html=`<div class="label">${label}</div><div class="grid grid-4" style="margin-bottom:12px">`;
  for(let i=0;i<count;i++){
    html+=`<div><div style="font-size:9px;color:var(--textMuted);margin-bottom:2px">Sublot ${i+1}</div><input class="input" type="number" step="0.01" value="${state[key][i]}" onchange="updateArr('${key}',${i},this.value)"></div>`;
  }
  html+='</div>';
  return html;
}

function updateArr(key,idx,val){state[key][idx]=val;saveState();render()}
function updateField(key,val){state[key]=val;saveState();render()}

function renderCalculator(){
  const r=calculate();
  const n=state.numSublots;
  return`
  <div class="section">
    <div class="section-title"><span class="icon">&#9670;</span> Lot Information</div>
    <div class="grid grid-4">
      <div><div class="label">Lot Number</div><input class="input" value="${state.lotNumber}" onchange="updateField('lotNumber',this.value)"></div>
      <div><div class="label">Sublots (3-8)</div><select class="select" onchange="updateField('numSublots',parseInt(this.value))">${[3,4,5,6,7,8].map(v=>`<option value="${v}" ${state.numSublots===v?'selected':''}>${v}</option>`).join('')}</select></div>
      <div><div class="label">Lot Tonnage</div><input class="input" type="number" value="${state.lotTonnage}" onchange="updateField('lotTonnage',this.value)"></div>
      <div><div class="label">Price/Ton ($)</div><input class="input" type="number" step="0.01" value="${state.pricePerTon}" onchange="updateField('pricePerTon',this.value)"></div>
    </div>
  </div>
  <div class="section">
    <div class="section-title"><span class="icon">&#9670;</span> Air Voids (%) &mdash; Spec: 2.0% - 5.0% (Two-Sided)</div>
    ${renderInputRow('Air Void Test Values','airVoidValues',n)}
    ${r.airVoids.outlier&&r.airVoids.outlier.hasOutlier?`<div class="outlier-warn">OUTLIER DETECTED: Sublot ${r.airVoids.outlier.outlierIndex+1} (G=${r.airVoids.outlier.gValue.toFixed(3)} > critical ${r.airVoids.outlier.critical})</div>`:''}
  </div>
  <div class="section">
    <div class="section-title"><span class="icon">&#9670;</span> Mat Density (% TMD) &mdash; Spec: &ge; 92.8% (One-Sided Lower)</div>
    ${renderInputRow('Mat Density Core Values','matDensity',n)}
    ${r.matDensity.outlier&&r.matDensity.outlier.hasOutlier?`<div class="outlier-warn">OUTLIER DETECTED: Core ${r.matDensity.outlier.outlierIndex+1} (G=${r.matDensity.outlier.gValue.toFixed(3)} > critical ${r.matDensity.outlier.critical})</div>`:''}
  </div>
  <div class="section">
    <div class="section-title"><span class="icon">&#9670;</span> Joint Density (% TMD) &mdash; Spec: &ge; 90.5% (One-Sided Lower)</div>
    ${renderInputRow('Joint Density Core Values','jointDensity',n)}
    ${r.jointDensity.outlier&&r.jointDensity.outlier.hasOutlier?`<div class="outlier-warn">OUTLIER DETECTED: Core ${r.jointDensity.outlier.outlierIndex+1} (G=${r.jointDensity.outlier.gValue.toFixed(3)} > critical ${r.jointDensity.outlier.critical})</div>`:''}
  </div>
  <div class="section">
    <div class="section-title"><span class="icon">&#9670;</span> Results Summary</div>
    <div class="grid grid-3" style="margin-bottom:16px">
      <div class="result-box ${payFactorTier(r.airVoids.pwl)}"><div class="rlabel">Air Voids PWL</div><div class="value">${fmt(r.airVoids.pwl,1)}</div><div class="sub">Mean: ${fmt(r.airVoids.mean)} | SD: ${fmt(r.airVoids.sd,3)} | PF: ${payFactorLabel(r.airVoids.pwl)}</div></div>
      <div class="result-box ${payFactorTier(r.matDensity.pwl)}"><div class="rlabel">Mat Density PWL</div><div class="value">${fmt(r.matDensity.pwl,1)}</div><div class="sub">Mean: ${fmt(r.matDensity.mean)} | SD: ${fmt(r.matDensity.sd,3)} | PF: ${payFactorLabel(r.matDensity.pwl)}</div></div>
      <div class="result-box ${payFactorTier(r.jointDensity.pwl)}"><div class="rlabel">Joint Density PWL</div><div class="value">${fmt(r.jointDensity.pwl,1)}</div><div class="sub">Mean: ${fmt(r.jointDensity.mean)} | SD: ${fmt(r.jointDensity.sd,3)} | PF: ${payFactorLabel(r.jointDensity.pwl)}</div></div>
    </div>
    <div class="grid grid-2">
      <div class="result-box ${r.combinedPF!==null?(r.combinedPF>=100?'bonus':r.combinedPF>=95?'full':r.combinedPF>=85?'reduced':'penalty'):'none'}"><div class="rlabel">Combined Pay Factor</div><div class="value">${r.combinedPF!==null?r.combinedPF.toFixed(2)+'%':'\u2014'}</div><div class="sub">Air Voids 35% | Mat Density 40% | Joint Density 25%</div></div>
      <div class="result-box ${r.totalPay!==null?(r.combinedPF>=100?'bonus':'reduced'):'none'}"><div class="rlabel">Adjusted Payment</div><div class="value">${fmt$(r.totalPay)}</div><div class="sub">${state.lotTonnage?state.lotTonnage+' tons':'--'} @ ${state.pricePerTon?'$'+state.pricePerTon+'/ton':'--'}</div></div>
    </div>
    <div style="margin-top:16px;display:flex;gap:8px;flex-wrap:wrap">
      <button class="btn btn-green" onclick="saveLot()">Save to History</button>
      <button class="btn btn-accent" onclick="clearCalculator()">Clear All</button>
    </div>
  </div>`;
}

function renderResults(){
  const r=calculate();
  return`<div class="section">
    <div class="section-title"><span class="icon">&#9670;</span> Detailed Statistical Analysis</div>
    <table>
      <tr><th>Property</th><th>N</th><th>Mean</th><th>Std Dev</th><th>PWL</th><th>Pay Factor</th><th>Tier</th></tr>
      <tr><td style="color:var(--accent)">Air Voids</td><td>${state.airVoidValues.slice(0,state.numSublots).filter(x=>x!==''&&!isNaN(x)).length}</td><td>${fmt(r.airVoids.mean)}</td><td>${fmt(r.airVoids.sd,3)}</td><td style="font-weight:700">${fmt(r.airVoids.pwl,1)}</td><td>${payFactorLabel(r.airVoids.pwl)}</td><td style="color:var(--${payFactorTier(r.airVoids.pwl)==='bonus'||payFactorTier(r.airVoids.pwl)==='full'?'green':payFactorTier(r.airVoids.pwl)==='reduced'?'yellow':'red'})">${payFactorTier(r.airVoids.pwl).toUpperCase()}</td></tr>
      <tr><td style="color:var(--accent)">Mat Density</td><td>${state.matDensity.slice(0,state.numSublots).filter(x=>x!==''&&!isNaN(x)).length}</td><td>${fmt(r.matDensity.mean)}</td><td>${fmt(r.matDensity.sd,3)}</td><td style="font-weight:700">${fmt(r.matDensity.pwl,1)}</td><td>${payFactorLabel(r.matDensity.pwl)}</td><td style="color:var(--${payFactorTier(r.matDensity.pwl)==='bonus'||payFactorTier(r.matDensity.pwl)==='full'?'green':payFactorTier(r.matDensity.pwl)==='reduced'?'yellow':'red'})">${payFactorTier(r.matDensity.pwl).toUpperCase()}</td></tr>
      <tr><td style="color:var(--accent)">Joint Density</td><td>${state.jointDensity.slice(0,state.numSublots).filter(x=>x!==''&&!isNaN(x)).length}</td><td>${fmt(r.jointDensity.mean)}</td><td>${fmt(r.jointDensity.sd,3)}</td><td style="font-weight:700">${fmt(r.jointDensity.pwl,1)}</td><td>${payFactorLabel(r.jointDensity.pwl)}</td><td style="color:var(--${payFactorTier(r.jointDensity.pwl)==='bonus'||payFactorTier(r.jointDensity.pwl)==='full'?'green':payFactorTier(r.jointDensity.pwl)==='reduced'?'yellow':'red'})">${payFactorTier(r.jointDensity.pwl).toUpperCase()}</td></tr>
    </table>
  </div>
  <div class="section">
    <div class="section-title"><span class="icon">&#9670;</span> Pay Factor Scale Reference</div>
    <table>
      <tr><th>PWL Range</th><th>Pay Factor Formula</th><th>Description</th></tr>
      <tr><td style="color:var(--green)">PWL > 96</td><td>106%</td><td>Maximum Bonus</td></tr>
      <tr><td style="color:var(--green)">90 &le; PWL &le; 96</td><td>PWL + 10</td><td>Full Pay + Bonus</td></tr>
      <tr><td style="color:var(--yellow)">75 < PWL < 90</td><td>0.5 &times; PWL + 55</td><td>Reduced Pay</td></tr>
      <tr><td style="color:var(--orange)">55 < PWL &le; 75</td><td>1.4 &times; PWL - 12</td><td>Penalty</td></tr>
      <tr><td style="color:var(--red)">PWL &le; 55</td><td>N/A</td><td>REJECT LOT</td></tr>
    </table>
  </div>`;
}

function renderHistory(){
  if(!state.history.length)return`<div class="section"><div style="text-align:center;padding:40px;color:var(--textDim)">No saved lots yet. Calculate and save from the Calculator tab.</div></div>`;
  return state.history.map((h,i)=>`<div class="history-item">
    <div><div style="color:var(--accent);font-weight:700;font-size:13px">Lot ${h.lotNumber||'#'+(i+1)}</div><div style="font-size:10px;color:var(--textDim)">${h.date} | ${h.numSublots} sublots</div></div>
    <div style="display:flex;gap:16px;align-items:center;flex-wrap:wrap">
      <div style="text-align:center"><div style="font-size:9px;color:var(--textDim)">AIR PWL</div><div style="font-weight:700;color:var(--accent)">${fmt(h.airVoidsPWL,1)}</div></div>
      <div style="text-align:center"><div style="font-size:9px;color:var(--textDim)">MAT PWL</div><div style="font-weight:700;color:var(--accent)">${fmt(h.matDensityPWL,1)}</div></div>
      <div style="text-align:center"><div style="font-size:9px;color:var(--textDim)">JOINT PWL</div><div style="font-weight:700;color:var(--accent)">${fmt(h.jointDensityPWL,1)}</div></div>
      <div style="text-align:center"><div style="font-size:9px;color:var(--textDim)">COMBINED PF</div><div style="font-weight:700;color:var(--green)">${h.combinedPF?h.combinedPF.toFixed(2)+'%':'\u2014'}</div></div>
      <button class="btn btn-red" style="font-size:9px;padding:3px 8px" onclick="deleteHistory(${i})">Del</button>
    </div>
  </div>`).join('');
}

function renderReference(){
  return`<div class="section">
    <div class="section-title"><span class="icon">&#9670;</span> QL Lookup Table (N=3 through N=10)</div>
    <div style="overflow-x:auto"><table>
      <tr><th>PWL</th><th>N=3</th><th>N=4</th><th>N=5</th><th>N=6</th><th>N=7</th><th>N=8</th><th>N=9</th><th>N=10</th></tr>
      ${PWL_TABLE.filter((_,i)=>i%5===0).map(r=>`<tr><td style="color:var(--accent);font-weight:700">${r[0]}</td>${r.slice(1).map(v=>`<td>${v}</td>`).join('')}</tr>`).join('')}
    </table></div>
    <div style="font-size:10px;color:var(--textDim);margin-top:8px">Table shows every 5th PWL value. Full table used for interpolation in calculations.</div>
  </div>
  <div class="section">
    <div class="section-title"><span class="icon">&#9670;</span> Grubbs Outlier Critical Values (95% Significance)</div>
    <table><tr><th>N</th><th>Critical G Value</th></tr>
    ${Object.entries(OUTLIER_CRITICAL).map(([k,v])=>`<tr><td>${k}</td><td>${v}</td></tr>`).join('')}</table>
  </div>
  <div class="section">
    <div class="section-title"><span class="icon">&#9670;</span> FAA P-401 Spec Limits</div>
    <table><tr><th>Property</th><th>Lower Limit</th><th>Upper Limit</th><th>Type</th></tr>
    <tr><td>Air Voids</td><td>2.0%</td><td>5.0%</td><td>Two-Sided</td></tr>
    <tr><td>Mat Density</td><td>92.8% TMD</td><td>--</td><td>One-Sided Lower</td></tr>
    <tr><td>Joint Density</td><td>90.5% TMD</td><td>--</td><td>One-Sided Lower</td></tr></table>
  </div>`;
}

function saveLot(){
  const r=calculate();
  state.history.unshift({lotNumber:state.lotNumber,date:new Date().toISOString().slice(0,10),numSublots:state.numSublots,airVoidsPWL:r.airVoids.pwl,matDensityPWL:r.matDensity.pwl,jointDensityPWL:r.jointDensity.pwl,combinedPF:r.combinedPF,totalPay:r.totalPay,airVoidValues:[...state.airVoidValues],matDensity:[...state.matDensity],jointDensity:[...state.jointDensity]});
  saveState();render();
}
function deleteHistory(i){state.history.splice(i,1);saveState();render()}
function clearCalculator(){state.lotNumber='';state.lotTonnage='';state.pricePerTon='';state.airVoidValues=['','','','','','','',''];state.matDensity=['','','','','','','',''];state.jointDensity=['','','','','','','',''];saveState();render()}

function exportCSV(){
  const r=calculate();
  let csv='Property,N,Mean,StdDev,PWL,PayFactor\n';
  csv+=`Air Voids,${state.numSublots},${fmt(r.airVoids.mean)},${fmt(r.airVoids.sd,3)},${fmt(r.airVoids.pwl,1)},${payFactorLabel(r.airVoids.pwl)}\n`;
  csv+=`Mat Density,${state.numSublots},${fmt(r.matDensity.mean)},${fmt(r.matDensity.sd,3)},${fmt(r.matDensity.pwl,1)},${payFactorLabel(r.matDensity.pwl)}\n`;
  csv+=`Joint Density,${state.numSublots},${fmt(r.jointDensity.mean)},${fmt(r.jointDensity.sd,3)},${fmt(r.jointDensity.pwl,1)},${payFactorLabel(r.jointDensity.pwl)}\n`;
  csv+=`\nCombined PF,${r.combinedPF?r.combinedPF.toFixed(2)+'%':''}\nTotal Payment,${r.totalPay?'$'+r.totalPay.toFixed(2):''}\n`;
  const a=document.createElement('a');a.href=URL.createObjectURL(new Blob([csv],{type:'text/csv'}));a.download='korb_pwl_lot_'+state.lotNumber+'.csv';a.click();
}

function render(){
  renderTabs();
  const app=document.getElementById('app');
  switch(state.activeTab){
    case'calculator':app.innerHTML=renderCalculator();break;
    case'results':app.innerHTML=renderResults();break;
    case'history':app.innerHTML=renderHistory();break;
    case'reference':app.innerHTML=renderReference();break;
  }
}
loadState();render();
</script>
</body>
</html>
