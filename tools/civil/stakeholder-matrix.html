<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="description" content="Stakeholder Matrix | Korb Engineering — a free, browser-based civil engineering tool from Korb Engineering. No signup, no downloads, works on mobile.">
<title>Stakeholder Matrix | Korb Engineering</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{--bg:#050a0f;--surface:#0a1018;--surface2:#0e1520;--border:#1a2535;--text:#e2e8f0;--cyan:#00d4ff;--orange:#ff6600;--green:#10b981;--red:#ef4444;--font:'JetBrains Mono',monospace}
html{font-size:16px}
body{background:var(--bg);color:var(--text);font-family:var(--font);min-height:100vh;line-height:1.5}
input,select,textarea,button{font-family:var(--font);font-size:16px;color:var(--text)}
input,select,textarea{background:var(--surface);border:1px solid var(--border);border-radius:6px;padding:10px 12px;width:100%;min-height:44px}
input:focus,select:focus,textarea:focus{outline:none;border-color:var(--cyan);box-shadow:0 0 0 2px rgba(0,212,255,.15)}
button{cursor:pointer;border:none;border-radius:6px;padding:10px 16px;min-height:44px;min-width:44px;font-weight:500;transition:all .2s}
.btn-primary{background:var(--cyan);color:#050a0f}
.btn-primary:hover{opacity:.85}
.btn-orange{background:var(--orange);color:#fff}
.btn-orange:hover{opacity:.85}
.btn-green{background:var(--green);color:#fff}
.btn-green:hover{opacity:.85}
.btn-red{background:var(--red);color:#fff}
.btn-red:hover{opacity:.85}
.btn-ghost{background:transparent;border:1px solid var(--border);color:var(--text)}
.btn-ghost:hover{border-color:var(--cyan);color:var(--cyan)}
.btn-sm{padding:6px 10px;font-size:13px;min-height:36px}
header{background:var(--surface);border-bottom:1px solid var(--border);padding:16px 20px;display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:12px}
header h1{font-size:1.1rem;font-weight:600;color:var(--cyan)}
header h1 span{color:var(--orange)}
header .subtitle{font-size:.8rem;color:#64748b;font-weight:300}
.container{max-width:1400px;margin:0 auto;padding:16px}
.tabs{display:flex;gap:4px;margin-bottom:16px;flex-wrap:wrap}
.tab{padding:10px 16px;border-radius:6px 6px 0 0;background:var(--surface);border:1px solid var(--border);border-bottom:none;cursor:pointer;font-size:.85rem;min-height:44px;display:flex;align-items:center}
.tab.active{background:var(--surface2);border-color:var(--cyan);color:var(--cyan)}
.panel{background:var(--surface2);border:1px solid var(--border);border-radius:0 6px 6px 6px;padding:16px;display:none}
.panel.active{display:block}
.form-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(200px,1fr));gap:12px;margin-bottom:16px}
.form-group{display:flex;flex-direction:column;gap:4px}
.form-group label{font-size:.75rem;color:#64748b;text-transform:uppercase;letter-spacing:.5px}
.toolbar{display:flex;gap:8px;margin-bottom:16px;flex-wrap:wrap;align-items:center}
.card{background:var(--surface);border:1px solid var(--border);border-radius:8px;padding:16px;margin-bottom:12px}
.card h3{font-size:.9rem;color:var(--cyan);margin-bottom:8px}
.stakeholder-list{display:grid;gap:12px}
.sh-card{background:var(--surface);border:1px solid var(--border);border-radius:8px;padding:14px;transition:border-color .2s;cursor:pointer}
.sh-card:hover{border-color:var(--cyan)}
.sh-card .sh-header{display:flex;justify-content:space-between;align-items:flex-start;gap:8px;flex-wrap:wrap}
.sh-card .sh-name{font-weight:600;font-size:.95rem}
.sh-card .sh-org{font-size:.8rem;color:#64748b}
.sh-card .sh-quadrant{font-size:.7rem;padding:2px 8px;border-radius:10px;white-space:nowrap}
.q-manage{background:rgba(239,68,68,.15);color:var(--red)}
.q-satisfy{background:rgba(255,102,0,.15);color:var(--orange)}
.q-inform{background:rgba(0,212,255,.15);color:var(--cyan)}
.q-monitor{background:rgba(16,185,129,.15);color:var(--green)}
.sh-meta{display:flex;gap:12px;margin-top:8px;font-size:.8rem;color:#94a3b8;flex-wrap:wrap}
canvas{border:1px solid var(--border);border-radius:8px;width:100%;background:var(--surface)}
.table-wrap{overflow-x:auto}
.raci-table{width:100%;border-collapse:collapse;font-size:.8rem}
.raci-table th,.raci-table td{border:1px solid var(--border);padding:8px;text-align:center;min-width:80px}
.raci-table th{background:var(--surface);color:var(--cyan);font-weight:600;position:sticky;top:0}
.raci-table td{background:var(--surface2)}
.raci-table td:first-child,.raci-table th:first-child{text-align:left;min-width:150px}
.raci-cell{cursor:pointer;min-height:44px;display:flex;align-items:center;justify-content:center}
.raci-R{color:var(--red);font-weight:700}
.raci-A{color:var(--orange);font-weight:700}
.raci-C{color:var(--cyan);font-weight:700}
.raci-I{color:var(--green);font-weight:700}
.modal-overlay{position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(5,10,15,.85);display:flex;align-items:center;justify-content:center;z-index:1000;padding:16px}
.modal{background:var(--surface2);border:1px solid var(--border);border-radius:12px;padding:24px;width:100%;max-width:700px;max-height:90vh;overflow-y:auto}
.modal h2{font-size:1rem;margin-bottom:16px;color:var(--cyan)}
.hidden{display:none!important}
.summary-section{margin-bottom:20px}
.summary-section h3{color:var(--cyan);font-size:.9rem;margin-bottom:8px;padding-bottom:4px;border-bottom:1px solid var(--border)}
.range-display{display:flex;align-items:center;gap:8px}
.range-display input[type=range]{flex:1;min-height:44px;padding:0;background:transparent;border:none}
.range-display .range-val{min-width:30px;text-align:center;font-weight:600;color:var(--cyan)}
@media(max-width:640px){
.form-grid{grid-template-columns:1fr}
header h1{font-size:.95rem}
}
@media print{
body{background:#fff;color:#000}
header,.toolbar,.tabs,.btn-primary,.btn-ghost,.node-actions{display:none!important}
.panel{display:block!important;border:none;background:#fff}
.sh-card{border-color:#ccc}
}
</style>
</head>
<body>
<header>
<div>
<h1>Korb Engineering <span>| Stakeholder Matrix</span></h1>
<div class="subtitle">Stakeholder Analysis & Engagement Planning</div>
</div>
<div style="display:flex;gap:8px;flex-wrap:wrap">
<button class="btn-ghost btn-sm" onclick="exportClipboard()">Copy Report</button>
<button class="btn-ghost btn-sm" onclick="window.print()">Print</button>
</div>
</header>
<div class="container">
<div class="tabs">
<div class="tab active" data-tab="list" onclick="switchTab('list')">Stakeholders</div>
<div class="tab" data-tab="grid" onclick="switchTab('grid')">Power/Interest Grid</div>
<div class="tab" data-tab="raci" onclick="switchTab('raci')">RACI Matrix</div>
<div class="tab" data-tab="summary" onclick="switchTab('summary')">Summary Report</div>
</div>

<div class="panel active" id="panel-list">
<div class="toolbar">
<button class="btn-primary btn-sm" onclick="openAddModal()">+ Add Stakeholder</button>
<span style="font-size:.8rem;color:#64748b" id="shCount"></span>
</div>
<div class="stakeholder-list" id="stakeholderList"></div>
</div>

<div class="panel" id="panel-grid">
<canvas id="gridCanvas" height="500"></canvas>
</div>

<div class="panel" id="panel-raci">
<div class="toolbar">
<button class="btn-primary btn-sm" onclick="addActivity()">+ Add Activity</button>
</div>
<div class="table-wrap" id="raciTableWrap"></div>
</div>

<div class="panel" id="panel-summary">
<div id="summaryContent"></div>
</div>
</div>

<div class="modal-overlay hidden" id="shModal">
<div class="modal">
<h2 id="modalTitle">Add Stakeholder</h2>
<div class="form-grid">
<div class="form-group"><label>Name *</label><input id="shName" placeholder="Full name"></div>
<div class="form-group"><label>Organization</label><input id="shOrg" placeholder="Company/agency"></div>
<div class="form-group"><label>Role</label><input id="shRole" placeholder="Project role"></div>
<div class="form-group"><label>Email</label><input id="shEmail" type="email" placeholder="email@example.com"></div>
<div class="form-group"><label>Phone</label><input id="shPhone" type="tel" placeholder="(555) 123-4567"></div>
</div>
<div class="form-grid" style="margin-top:8px">
<div class="form-group">
<label>Power / Influence (1-10)</label>
<div class="range-display"><input type="range" id="shPower" min="1" max="10" value="5" oninput="document.getElementById('shPowerVal').textContent=this.value"><span class="range-val" id="shPowerVal">5</span></div>
</div>
<div class="form-group">
<label>Interest / Concern (1-10)</label>
<div class="range-display"><input type="range" id="shInterest" min="1" max="10" value="5" oninput="document.getElementById('shInterestVal').textContent=this.value"><span class="range-val" id="shInterestVal">5</span></div>
</div>
</div>
<div class="form-grid" style="margin-top:8px">
<div class="form-group"><label>Current Engagement</label>
<select id="shCurrentEng"><option>Unaware</option><option>Resistant</option><option selected>Neutral</option><option>Supportive</option><option>Leading</option></select>
</div>
<div class="form-group"><label>Desired Engagement</label>
<select id="shDesiredEng"><option>Unaware</option><option>Resistant</option><option>Neutral</option><option selected>Supportive</option><option>Leading</option></select>
</div>
</div>
<div class="form-group" style="margin-top:8px"><label>Key Concerns / Interests</label><textarea id="shConcerns" rows="2" placeholder="What matters to this stakeholder"></textarea></div>
<div class="form-grid" style="margin-top:8px">
<div class="form-group"><label>Comm. Frequency</label>
<select id="shCommFreq"><option>Weekly</option><option>Bi-weekly</option><option selected>Monthly</option><option>Quarterly</option><option>As needed</option></select>
</div>
<div class="form-group"><label>Comm. Method</label>
<select id="shCommMethod"><option>Email</option><option selected>Meeting</option><option>Phone</option><option>Report</option><option>Newsletter</option></select>
</div>
<div class="form-group"><label>Comm. Responsible</label><input id="shCommResp" placeholder="Who communicates"></div>
</div>
<div style="display:flex;gap:8px;justify-content:flex-end;flex-wrap:wrap;margin-top:16px">
<button class="btn-ghost" onclick="closeModal()">Cancel</button>
<button class="btn-red hidden" id="deleteShBtn" onclick="deleteStakeholder()">Delete</button>
<button class="btn-primary" onclick="saveStakeholder()">Save</button>
</div>
</div>
</div>

<script>
const STORAGE_PREFIX='korb_stakeholder_';
let stakeholders=[];
let activities=[];
let raciData={};
let editingId=null;

function genId(){return's_'+Date.now()+'_'+Math.random().toString(36).slice(2,8)}

function getQuadrant(power,interest){
let hp=power>5,hi=interest>5;
if(hp&&hi)return{name:'Manage Closely',cls:'q-manage',strategy:'Engage actively, involve in decisions. Provide detailed information and seek input on key project decisions.'};
if(hp&&!hi)return{name:'Keep Satisfied',cls:'q-satisfy',strategy:'Keep informed of major developments. Do not overwhelm with detail but ensure their needs are met.'};
if(!hp&&hi)return{name:'Keep Informed',cls:'q-inform',strategy:'Provide regular updates. Good candidates for advisory roles. Address their concerns proactively.'};
return{name:'Monitor',cls:'q-monitor',strategy:'Monitor with minimal effort. Provide general communications. Watch for changes in power or interest.'};
}

function escH(s){return s?s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'):''}

function renderList(){
let el=document.getElementById('stakeholderList');
document.getElementById('shCount').textContent=stakeholders.length+' stakeholder'+(stakeholders.length!==1?'s':'');
if(!stakeholders.length){el.innerHTML='<p style="color:#64748b;padding:20px">No stakeholders added yet.</p>';return}
let html='';
stakeholders.forEach(sh=>{
let q=getQuadrant(sh.power,sh.interest);
html+=`<div class="sh-card" onclick="editStakeholder('${sh.id}')">
<div class="sh-header">
<div><div class="sh-name">${escH(sh.name)}</div><div class="sh-org">${escH(sh.organization||'')}${sh.role?' - '+escH(sh.role):''}</div></div>
<span class="sh-quadrant ${q.cls}">${q.name}</span>
</div>
<div class="sh-meta">
<span>Power: ${sh.power}/10</span>
<span>Interest: ${sh.interest}/10</span>
<span>Current: ${sh.currentEngagement}</span>
<span>Desired: ${sh.desiredEngagement}</span>
</div></div>`;
});
el.innerHTML=html;
}

function openAddModal(){
editingId=null;
document.getElementById('modalTitle').textContent='Add Stakeholder';
document.getElementById('shName').value='';
document.getElementById('shOrg').value='';
document.getElementById('shRole').value='';
document.getElementById('shEmail').value='';
document.getElementById('shPhone').value='';
document.getElementById('shPower').value=5;document.getElementById('shPowerVal').textContent='5';
document.getElementById('shInterest').value=5;document.getElementById('shInterestVal').textContent='5';
document.getElementById('shCurrentEng').value='Neutral';
document.getElementById('shDesiredEng').value='Supportive';
document.getElementById('shConcerns').value='';
document.getElementById('shCommFreq').value='Monthly';
document.getElementById('shCommMethod').value='Meeting';
document.getElementById('shCommResp').value='';
document.getElementById('deleteShBtn').classList.add('hidden');
document.getElementById('shModal').classList.remove('hidden');
document.getElementById('shName').focus();
}

function editStakeholder(id){
let sh=stakeholders.find(s=>s.id===id);if(!sh)return;
editingId=id;
document.getElementById('modalTitle').textContent='Edit: '+sh.name;
document.getElementById('shName').value=sh.name;
document.getElementById('shOrg').value=sh.organization||'';
document.getElementById('shRole').value=sh.role||'';
document.getElementById('shEmail').value=sh.email||'';
document.getElementById('shPhone').value=sh.phone||'';
document.getElementById('shPower').value=sh.power;document.getElementById('shPowerVal').textContent=sh.power;
document.getElementById('shInterest').value=sh.interest;document.getElementById('shInterestVal').textContent=sh.interest;
document.getElementById('shCurrentEng').value=sh.currentEngagement||'Neutral';
document.getElementById('shDesiredEng').value=sh.desiredEngagement||'Supportive';
document.getElementById('shConcerns').value=sh.concerns||'';
document.getElementById('shCommFreq').value=sh.commFrequency||'Monthly';
document.getElementById('shCommMethod').value=sh.commMethod||'Meeting';
document.getElementById('shCommResp').value=sh.commResponsible||'';
document.getElementById('deleteShBtn').classList.remove('hidden');
document.getElementById('shModal').classList.remove('hidden');
}

function saveStakeholder(){
let name=document.getElementById('shName').value.trim();
if(!name){alert('Name is required');return}
let data={
name,
organization:document.getElementById('shOrg').value.trim(),
role:document.getElementById('shRole').value.trim(),
email:document.getElementById('shEmail').value.trim(),
phone:document.getElementById('shPhone').value.trim(),
power:parseInt(document.getElementById('shPower').value),
interest:parseInt(document.getElementById('shInterest').value),
currentEngagement:document.getElementById('shCurrentEng').value,
desiredEngagement:document.getElementById('shDesiredEng').value,
concerns:document.getElementById('shConcerns').value.trim(),
commFrequency:document.getElementById('shCommFreq').value,
commMethod:document.getElementById('shCommMethod').value,
commResponsible:document.getElementById('shCommResp').value.trim()
};
if(editingId){
let idx=stakeholders.findIndex(s=>s.id===editingId);
if(idx>=0)stakeholders[idx]={...stakeholders[idx],...data};
}else{
stakeholders.push({id:genId(),...data});
}
closeModal();renderAll();
}

function deleteStakeholder(){
if(!editingId||!confirm('Delete this stakeholder?'))return;
stakeholders=stakeholders.filter(s=>s.id!==editingId);
// clean raci
Object.keys(raciData).forEach(act=>{delete raciData[act][editingId]});
closeModal();renderAll();
}

function closeModal(){document.getElementById('shModal').classList.add('hidden')}

function switchTab(tab){
document.querySelectorAll('.tab').forEach(t=>t.classList.toggle('active',t.dataset.tab===tab));
document.querySelectorAll('.panel').forEach(p=>p.classList.toggle('active',p.id==='panel-'+tab));
if(tab==='grid')renderGrid();
if(tab==='raci')renderRaci();
if(tab==='summary')renderSummary();
}

function renderGrid(){
let canvas=document.getElementById('gridCanvas');
let ctx=canvas.getContext('2d');
let dpr=window.devicePixelRatio||1;
let w=canvas.clientWidth;
let h=Math.max(500,w*0.7);
canvas.width=w*dpr;canvas.height=h*dpr;
canvas.style.height=h+'px';
ctx.scale(dpr,dpr);

let pad=60,gw=w-pad*2,gh=h-pad*2;

// background
ctx.fillStyle='#050a0f';ctx.fillRect(0,0,w,h);

// quadrant fills
let cx=pad+gw/2,cy=pad+gh/2;
ctx.globalAlpha=0.08;
ctx.fillStyle='#ef4444';ctx.fillRect(pad,pad,gw/2,gh/2);
ctx.fillStyle='#ff6600';ctx.fillRect(pad,cy,gw/2,gh/2);
ctx.fillStyle='#00d4ff';ctx.fillRect(cx,pad,gw/2,gh/2);
ctx.fillStyle='#10b981';ctx.fillRect(cx,cy,gw/2,gh/2);
ctx.globalAlpha=1;

// grid lines
ctx.strokeStyle='#1a2535';ctx.lineWidth=1;
for(let i=0;i<=10;i++){
let x=pad+i*(gw/10),y=pad+i*(gh/10);
ctx.beginPath();ctx.moveTo(x,pad);ctx.lineTo(x,pad+gh);ctx.stroke();
ctx.beginPath();ctx.moveTo(pad,y);ctx.lineTo(pad+gw,y);ctx.stroke();
}

// center lines
ctx.strokeStyle='#2a3545';ctx.lineWidth=2;
ctx.beginPath();ctx.moveTo(cx,pad);ctx.lineTo(cx,pad+gh);ctx.stroke();
ctx.beginPath();ctx.moveTo(pad,cy);ctx.lineTo(pad+gw,cy);ctx.stroke();

// labels
ctx.fillStyle='#64748b';ctx.font='11px JetBrains Mono';ctx.textAlign='center';
ctx.fillText('Interest / Concern',w/2,h-10);
ctx.save();ctx.translate(15,h/2);ctx.rotate(-Math.PI/2);ctx.fillText('Power / Influence',0,0);ctx.restore();

// axis numbers
ctx.font='10px JetBrains Mono';ctx.fillStyle='#475569';
for(let i=1;i<=10;i++){
let x=pad+(i-0.5)*(gw/10);
ctx.fillText(i,x,pad+gh+16);
let y=pad+gh-(i-0.5)*(gh/10);
ctx.textAlign='right';ctx.fillText(i,pad-8,y+4);ctx.textAlign='center';
}

// quadrant labels
ctx.font='bold 12px JetBrains Mono';ctx.globalAlpha=0.4;
ctx.fillStyle='#ef4444';ctx.fillText('MANAGE CLOSELY',pad+gw*0.25,pad+20);
ctx.fillStyle='#00d4ff';ctx.fillText('KEEP INFORMED',pad+gw*0.75,pad+20);
ctx.fillStyle='#ff6600';ctx.fillText('KEEP SATISFIED',pad+gw*0.25,pad+gh-10);
ctx.fillStyle='#10b981';ctx.fillText('MONITOR',pad+gw*0.75,pad+gh-10);
ctx.globalAlpha=1;

// plot stakeholders
stakeholders.forEach(sh=>{
let x=pad+(sh.interest-0.5)*(gw/10);
let y=pad+gh-(sh.power-0.5)*(gh/10);
let q=getQuadrant(sh.power,sh.interest);
let colors={'q-manage':'#ef4444','q-satisfy':'#ff6600','q-inform':'#00d4ff','q-monitor':'#10b981'};
let col=colors[q.cls];

ctx.beginPath();ctx.arc(x,y,8,0,Math.PI*2);
ctx.fillStyle=col;ctx.globalAlpha=0.8;ctx.fill();
ctx.globalAlpha=1;ctx.strokeStyle=col;ctx.lineWidth=2;ctx.stroke();

ctx.fillStyle='#e2e8f0';ctx.font='10px JetBrains Mono';ctx.textAlign='center';
ctx.fillText(sh.name.length>15?sh.name.slice(0,13)+'..':sh.name,x,y-14);
});
}

function addActivity(){
let name=prompt('Activity name:');
if(!name||!name.trim())return;
activities.push(name.trim());
renderRaci();saveData();
}

function renderRaci(){
if(!stakeholders.length||!activities.length){
document.getElementById('raciTableWrap').innerHTML='<p style="color:#64748b;padding:20px">Add stakeholders and activities to build the RACI matrix.</p>';
return;
}
let html='<table class="raci-table"><thead><tr><th>Activity</th>';
stakeholders.forEach(sh=>{
html+=`<th title="${escH(sh.name)}">${escH(sh.name.length>12?sh.name.slice(0,10)+'..':sh.name)}</th>`;
});
html+='<th style="min-width:40px"></th></tr></thead><tbody>';
activities.forEach((act,ai)=>{
html+=`<tr><td>${escH(act)}</td>`;
stakeholders.forEach(sh=>{
let val=(raciData[act]&&raciData[act][sh.id])||'';
let cls=val?'raci-'+val:'';
html+=`<td><div class="raci-cell ${cls}" onclick="cycleRaci('${escH(act).replace(/'/g,"\\'")}','${sh.id}',this)">${val}</div></td>`;
});
html+=`<td><button class="btn-red btn-sm" onclick="removeActivity(${ai})" title="Remove">&times;</button></td>`;
html+='</tr>';
});
html+='</tbody></table>';
html+='<p style="font-size:.75rem;color:#64748b;margin-top:8px">Click cells to cycle: R (Responsible) -> A (Accountable) -> C (Consulted) -> I (Informed) -> clear</p>';
document.getElementById('raciTableWrap').innerHTML=html;
}

function cycleRaci(act,shId,el){
let cycle=['','R','A','C','I'];
if(!raciData[act])raciData[act]={};
let cur=raciData[act][shId]||'';
let idx=cycle.indexOf(cur);
let next=cycle[(idx+1)%cycle.length];
raciData[act][shId]=next;
el.textContent=next;
el.className='raci-cell'+(next?' raci-'+next:'');
saveData();
}

function removeActivity(idx){
if(!confirm('Remove this activity?'))return;
let act=activities[idx];
delete raciData[act];
activities.splice(idx,1);
renderRaci();saveData();
}

function renderSummary(){
let groups={'Manage Closely':[],'Keep Satisfied':[],'Keep Informed':[],'Monitor':[]};
stakeholders.forEach(sh=>{
let q=getQuadrant(sh.power,sh.interest);
groups[q.name].push(sh);
});
let html='';
let strategies={
'Manage Closely':'Engage actively, involve in decisions, and maintain close communication.',
'Keep Satisfied':'Provide high-level updates, address concerns promptly, minimize information overload.',
'Keep Informed':'Regular updates via standard channels, good advisory candidates.',
'Monitor':'Minimal effort, general communications, watch for changes.'
};
let clsMap={'Manage Closely':'q-manage','Keep Satisfied':'q-satisfy','Keep Informed':'q-inform','Monitor':'q-monitor'};

Object.keys(groups).forEach(gname=>{
let list=groups[gname];
html+=`<div class="summary-section"><h3><span class="sh-quadrant ${clsMap[gname]}" style="margin-right:8px">${gname}</span> (${list.length})</h3>`;
html+=`<p style="font-size:.8rem;color:#94a3b8;margin-bottom:8px">${strategies[gname]}</p>`;
if(list.length){
list.forEach(sh=>{
html+=`<div class="card"><strong>${escH(sh.name)}</strong> - ${escH(sh.organization||'N/A')}`;
html+=`<div style="font-size:.8rem;color:#94a3b8;margin-top:4px">`;
html+=`Power: ${sh.power}/10 | Interest: ${sh.interest}/10<br>`;
html+=`Current: ${sh.currentEngagement} | Desired: ${sh.desiredEngagement}<br>`;
if(sh.concerns)html+=`Concerns: ${escH(sh.concerns)}<br>`;
html+=`Comm: ${sh.commFrequency} via ${sh.commMethod}`;
if(sh.commResponsible)html+=` (${escH(sh.commResponsible)})`;
html+=`</div></div>`;
});
}else{
html+=`<p style="font-size:.8rem;color:#475569">No stakeholders in this quadrant.</p>`;
}
html+=`</div>`;
});
document.getElementById('summaryContent').innerHTML=html;
}

function exportClipboard(){
let text='STAKEHOLDER ANALYSIS REPORT\nGenerated by Korb Engineering\n'+new Date().toLocaleDateString()+'\n\n';
let groups={'Manage Closely':[],'Keep Satisfied':[],'Keep Informed':[],'Monitor':[]};
stakeholders.forEach(sh=>{groups[getQuadrant(sh.power,sh.interest).name].push(sh)});
Object.keys(groups).forEach(g=>{
text+=`== ${g.toUpperCase()} ==\n`;
groups[g].forEach(sh=>{
text+=`  ${sh.name} (${sh.organization||'N/A'}) - Power:${sh.power} Interest:${sh.interest}\n`;
text+=`    Current: ${sh.currentEngagement}, Desired: ${sh.desiredEngagement}\n`;
if(sh.concerns)text+=`    Concerns: ${sh.concerns}\n`;
text+=`    Comm: ${sh.commFrequency} via ${sh.commMethod}\n`;
});
text+='\n';
});
if(activities.length){
text+='== RACI MATRIX ==\n';
activities.forEach(act=>{
text+=`  ${act}: `;
let parts=[];
stakeholders.forEach(sh=>{
let val=raciData[act]&&raciData[act][sh.id];
if(val)parts.push(sh.name+'='+val);
});
text+=parts.join(', ')+'\n';
});
}
navigator.clipboard.writeText(text).then(()=>alert('Report copied to clipboard!')).catch(()=>{
let ta=document.createElement('textarea');ta.value=text;document.body.appendChild(ta);ta.select();document.execCommand('copy');ta.remove();alert('Report copied!');
});
}

function renderAll(){renderList();saveData()}

function saveData(){
try{localStorage.setItem(STORAGE_PREFIX+'data',JSON.stringify({stakeholders,activities,raciData}))}catch(e){}
}

function loadData(){
try{
let d=localStorage.getItem(STORAGE_PREFIX+'data');
if(d){let p=JSON.parse(d);stakeholders=p.stakeholders||[];activities=p.activities||[];raciData=p.raciData||{}}
}catch(e){}
}

document.addEventListener('keydown',e=>{if(e.key==='Escape')closeModal()});

loadData();
renderAll();
</script>
</body>
</html>
