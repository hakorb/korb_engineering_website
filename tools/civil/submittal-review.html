<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Submittal Review - Korb Engineering</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{--bg:#050a0f;--bg1:#0a1018;--bg2:#0f1822;--border:#1a2a3a;--accent:#00d4ff;--green:#00ff88;--red:#ff3344;--yellow:#ffcc00;--text:#e2e8f0;--textDim:rgba(226,232,240,0.45);--textMuted:rgba(226,232,240,0.25);--font:'JetBrains Mono',monospace}
body{background:var(--bg);color:var(--text);font-family:var(--font);min-height:100vh}
input,select,button,textarea{font-family:var(--font)}
.header{height:52px;background:linear-gradient(180deg,var(--bg2),var(--bg1));border-bottom:1px solid var(--border);display:flex;align-items:center;padding:0 20px;gap:16px;position:sticky;top:0;z-index:100}
.logo-box{width:36px;height:36px;border:1.5px solid var(--accent);display:flex;align-items:center;justify-content:center;box-shadow:0 0 10px rgba(0,212,255,0.25);flex-shrink:0}
.logo-box span{font-size:11px;font-weight:700;color:var(--accent);letter-spacing:0.05em}
.htitle{font-size:16px;font-weight:700;letter-spacing:0.12em;color:var(--accent)}
.hsub{font-size:10px;color:rgba(0,212,255,0.35);letter-spacing:0.15em;text-transform:uppercase}
.tabs{display:flex;gap:0;padding:16px 20px 0;border-bottom:1px solid var(--border);flex-wrap:wrap}
.tab{padding:8px 16px;background:transparent;border:1px solid var(--border);border-bottom:1px solid var(--border);color:var(--textDim);font-size:10px;cursor:pointer;letter-spacing:0.1em;text-transform:uppercase;border-radius:4px 4px 0 0;transition:all .15s}
.tab.active{background:var(--bg2);border-color:var(--accent);border-bottom:none;color:var(--accent)}
.container{padding:20px;max-width:1400px;margin:0 auto}
.card{background:var(--bg1);border:1px solid var(--border);border-radius:6px;padding:20px;margin-bottom:16px}
.card-title{font-size:13px;font-weight:700;color:var(--accent);margin-bottom:14px;text-transform:uppercase;letter-spacing:1px}
.label{font-size:10px;color:var(--textDim);font-weight:700;text-transform:uppercase;letter-spacing:.5px;margin-bottom:4px;display:block}
.input{width:100%;background:var(--bg2);border:1px solid var(--border);color:var(--text);font-size:12px;padding:8px 12px;border-radius:4px;outline:none}
.input:focus{border-color:var(--accent)}
.textarea{width:100%;background:var(--bg2);border:1px solid var(--border);color:var(--text);font-size:12px;padding:8px 12px;border-radius:4px;outline:none;resize:vertical;min-height:60px}
.select{background:var(--bg2);border:1px solid var(--border);color:var(--text);font-size:12px;padding:8px 12px;border-radius:4px;outline:none;cursor:pointer}
.row{display:flex;gap:16px;margin-bottom:12px;flex-wrap:wrap}
.field{flex:1;min-width:180px}
.btn{background:transparent;border:1px solid var(--border);color:var(--textDim);font-size:10px;padding:6px 14px;border-radius:4px;cursor:pointer;letter-spacing:.08em;text-transform:uppercase;transition:all .15s}
.btn:hover{border-color:var(--accent);color:var(--accent)}
.btn-green{border-color:var(--green);color:var(--green)}
.btn-red{border-color:var(--red);color:var(--red)}
.btn-fill{background:var(--accent);border-color:var(--accent);color:#000;font-weight:600}
.badge{display:inline-block;padding:3px 10px;border-radius:3px;font-size:10px;font-weight:700;letter-spacing:.5px}
.badge-conforms{color:var(--green);background:rgba(0,255,136,0.1);border:1px solid rgba(0,255,136,0.3)}
.badge-dnc{color:var(--red);background:rgba(255,51,68,0.1);border:1px solid rgba(255,51,68,0.3)}
.badge-review{color:var(--yellow);background:rgba(255,204,0,0.1);border:1px solid rgba(255,204,0,0.3)}
.badge-na{color:var(--textDim);background:rgba(226,232,240,0.06);border:1px solid var(--border)}
.req-item{border:1px solid var(--border);border-radius:4px;padding:14px;margin-bottom:10px;background:var(--bg2)}
.req-item.editing{border-color:var(--accent)}
.comment-box{background:var(--bg);border:1px solid var(--border);border-radius:4px;padding:10px;margin-top:8px}
.comment{padding:6px 0;border-bottom:1px solid var(--border);font-size:11px}
.comment:last-child{border-bottom:none}
.summary-bar{display:flex;gap:4px;height:8px;border-radius:4px;overflow:hidden;margin:8px 0}
.rec-btn{padding:8px 16px;border:2px solid var(--border);border-radius:4px;cursor:pointer;font-size:11px;font-weight:600;text-transform:uppercase;letter-spacing:.5px;background:transparent;transition:all .15s}
.rec-btn.selected{border-width:2px}
table{width:100%;border-collapse:collapse}
th,td{padding:6px 10px;border-bottom:1px solid var(--border);font-size:11px;text-align:left}
th{color:var(--textDim);font-size:9px;text-transform:uppercase;letter-spacing:.1em}
@media(max-width:768px){
.row{flex-direction:column;gap:8px}
.field{min-width:100%}
.header{flex-wrap:wrap;height:auto;padding:8px 12px}
.htitle{font-size:13px}.hsub{display:none}
.container{padding:12px}
}
</style>
</head>
<body>
<div class="header">
  <div class="logo-box"><span>KE</span></div>
  <div class="htitle">KORB ENGINEERING</div>
  <div class="hsub">Submittal Review</div>
  <div style="flex:1"></div>
  <button class="btn" onclick="loadDemo()">Load Demo</button>
  <button class="btn" onclick="exportReport()">Export</button>
</div>
<div class="tabs" id="tabs"></div>
<div class="container" id="app"></div>
<div style="position:fixed;bottom:10px;right:10px;font-size:10px;color:#00d4ff;opacity:0.5;font-family:'JetBrains Mono',monospace;pointer-events:none;z-index:9999">Korb Engineering</div>

<script>
const LS_KEY='korb_submittals';
const CATEGORIES=['Material','Performance','Testing','Certification','Compliance'];
const RECOMMENDATIONS=['APPROVED','APPROVED AS NOTED','REVISE AND RESUBMIT','REJECTED'];
const STATUS_MAP={CONFORMS:{label:'CONFORMS',cls:'badge-conforms'},DOES_NOT_CONFORM:{label:'DOES NOT CONFORM',cls:'badge-dnc'},REVIEW_REQUIRED:{label:'REVIEW REQUIRED',cls:'badge-review'},NOT_ADDRESSED:{label:'NOT ADDRESSED',cls:'badge-na'}};
let uid=0;
const genId=()=>'uid-'+Date.now()+'-'+(++uid);

let state={
  activeTab:'project',
  project:{projectName:'',projectNumber:'',contractor:'',submittalNumber:'',revision:'0',date:new Date().toISOString().slice(0,10),specSection:'',dueDate:''},
  requirements:[],
  submittals:[],
  assessments:{},
  comments:{},
  recommendation:'',
  reviewerName:'',
  reviewDate:new Date().toISOString().slice(0,10),
  editingReqId:null,
  editingSubId:null,
  savedReviews:[]
};

function load(){try{const s=localStorage.getItem(LS_KEY);if(s)Object.assign(state,JSON.parse(s))}catch(e){}}
function save(){localStorage.setItem(LS_KEY,JSON.stringify(state))}

function autoAssess(req,sub){
  if(!sub)return'NOT_ADDRESSED';
  const rt=`${req.description} ${req.standards} ${req.manufacturers}`.toLowerCase();
  const st=`${sub.properties} ${sub.testResults} ${sub.certifications} ${sub.product} ${sub.manufacturer} ${sub.notes}`.toLowerCase();
  if(req.minVal||req.maxVal){
    const nums=st.match(/[\d]+\.?\d*/g);
    if(nums){
      const mn=req.minVal?parseFloat(req.minVal):-Infinity;
      const mx=req.maxVal?parseFloat(req.maxVal):Infinity;
      for(const n of nums){
        const v=parseFloat(n);if(v===0||isNaN(v))continue;
        const ref=req.targetVal?parseFloat(req.targetVal):(isFinite(mn)&&isFinite(mx))?(mn+mx)/2:isFinite(mn)?mn:mx;
        if(isFinite(ref)&&ref>0&&v>ref*0.1&&v<ref*10){
          if(v>=mn&&v<=mx){
            const stds=req.standards?req.standards.split(',').map(s=>s.trim().toLowerCase()).filter(Boolean):[];
            return(!stds.length||stds.some(s=>st.includes(s)))?'CONFORMS':'REVIEW_REQUIRED';
          }
          return'DOES_NOT_CONFORM';
        }
      }
    }
  }
  if(req.standards){
    const stds=req.standards.split(',').map(s=>s.trim().toLowerCase()).filter(Boolean);
    const matched=stds.filter(s=>st.includes(s));
    if(matched.length===stds.length){
      if(req.targetVal)return st.includes(req.targetVal.toLowerCase())?'CONFORMS':'REVIEW_REQUIRED';
      return'CONFORMS';
    }
    if(matched.length>0)return'REVIEW_REQUIRED';
  }
  if(req.targetVal&&st.includes(req.targetVal.toLowerCase()))return'CONFORMS';
  if(st.trim().length>10)return'REVIEW_REQUIRED';
  return'NOT_ADDRESSED';
}

function runAutoAssess(){
  state.requirements.forEach(req=>{
    const sub=state.submittals.find(s=>s.reqId===req.reqId);
    if(!state.assessments[req.id]||state.assessments[req.id]==='NOT_ADDRESSED'){
      state.assessments[req.id]=autoAssess(req,sub);
    }
  });
  save();render();
}

function emptyReq(){return{id:genId(),reqId:'',category:'Material',description:'',mandatory:true,standards:'',manufacturers:'',minVal:'',maxVal:'',targetVal:'',units:''}}
function emptySub(){return{id:genId(),reqId:'',manufacturer:'',product:'',properties:'',testResults:'',certifications:'',notes:''}}

const DEMO_REQS=[
  {id:'d1',reqId:'2.01.A',category:'Material',description:'Asphalt binder shall be PG 67-22 per AASHTO M 320',mandatory:true,standards:'AASHTO M 320',manufacturers:'',minVal:'',maxVal:'',targetVal:'PG 67-22',units:''},
  {id:'d2',reqId:'2.01.B',category:'Material',description:'Aggregate gradation for 12.5mm NMAS Superpave mix. Passing #200 sieve: 2.0-10.0%',mandatory:true,standards:'AASHTO T 27, AASHTO T 11',manufacturers:'',minVal:'2.0',maxVal:'10.0',targetVal:'',units:'% passing #200'},
  {id:'d3',reqId:'2.02.A',category:'Performance',description:'Mix design shall be Superpave volumetric method per AASHTO R 35',mandatory:true,standards:'AASHTO R 35',manufacturers:'',minVal:'',maxVal:'',targetVal:'Superpave',units:''},
  {id:'d4',reqId:'2.02.B',category:'Performance',description:'Design air voids shall be 4.0%, acceptable range 3.5-4.5%',mandatory:true,standards:'AASHTO R 35',manufacturers:'',minVal:'3.5',maxVal:'4.5',targetVal:'4.0',units:'%'},
  {id:'d5',reqId:'2.02.C',category:'Performance',description:'VMA shall not be less than 14.0% for 12.5mm NMAS',mandatory:true,standards:'AASHTO M 323',manufacturers:'',minVal:'14.0',maxVal:'',targetVal:'',units:'%'},
  {id:'d6',reqId:'3.01.A',category:'Compliance',description:'HMA placement temperature shall be minimum 275 deg F and maximum 325 deg F',mandatory:true,standards:'',manufacturers:'',minVal:'275',maxVal:'325',targetVal:'300',units:'deg F'},
];
const DEMO_SUBS=[
  {id:'s1',reqId:'2.01.A',manufacturer:'Ergon Asphalt',product:'PG 67-22 Binder',properties:'Performance Grade PG 67-22, tested per AASHTO M 320.',testResults:'Continuous grade: PG 70.2-25.8. All parameters within requirements.',certifications:'AASHTO M 320 Certification',notes:''},
  {id:'s2',reqId:'2.01.B',manufacturer:'Martin Marietta',product:'Crushed Granite Blend',properties:'Gradation: #200 passing: 5.2%',testResults:'Tested per AASHTO T 27 and T 11. Percent passing #200: 5.2%.',certifications:'Source approval on file.',notes:''},
  {id:'s3',reqId:'2.02.A',manufacturer:'Superior Asphalt Inc.',product:'SP-12.5 Superpave Mix Design',properties:'Superpave volumetric mix design per AASHTO R 35. Ndesign = 75 gyrations.',testResults:'Mix design verified at 75 gyrations.',certifications:'Mix design approval pending.',notes:''},
  {id:'s4',reqId:'2.02.B',manufacturer:'Superior Asphalt Inc.',product:'SP-12.5 Air Voids',properties:'Design air voids at Ndesign: 4.1%',testResults:'Air voids = 4.1%, Gmb = 2.378, Gmm = 2.480',certifications:'',notes:''},
  {id:'s5',reqId:'2.02.C',manufacturer:'Superior Asphalt Inc.',product:'SP-12.5 VMA',properties:'VMA at Ndesign: 15.8%',testResults:'VMA calculated per AASHTO R 35: 15.8%',certifications:'',notes:''},
];

function loadDemo(){
  state.project={projectName:'Orlando Executive Airport Runway 7-25 Rehabilitation',projectNumber:'ORL-2026-0147',contractor:'Superior Asphalt Inc.',submittalNumber:'SUB-032',revision:'0',date:'2026-03-28',specSection:'Section 32 12 16 - Hot-Mix Asphalt Paving',dueDate:'2026-04-11'};
  state.requirements=DEMO_REQS.map(r=>({...r,id:genId()}));
  state.submittals=DEMO_SUBS.map(s=>({...s,id:genId()}));
  state.assessments={};state.comments={};state.recommendation='';
  runAutoAssess();
}

function renderTabs(){
  const tabs=['project','requirements','submittals','review','summary'];
  document.getElementById('tabs').innerHTML=tabs.map(t=>`<button class="tab ${state.activeTab===t?'active':''}" onclick="setTab('${t}')">${t}</button>`).join('');
}
function setTab(t){state.activeTab=t;save();render()}
function upd(path,val){
  const parts=path.split('.');
  let obj=state;
  for(let i=0;i<parts.length-1;i++)obj=obj[parts[i]];
  obj[parts[parts.length-1]]=val;
  save();render();
}

function renderProject(){
  const p=state.project;
  return`<div class="card">
    <div class="card-title">Project Information</div>
    <div class="row"><div class="field"><div class="label">Project Name</div><input class="input" value="${esc(p.projectName)}" onchange="upd('project.projectName',this.value)"></div></div>
    <div class="row">
      <div class="field"><div class="label">Project Number</div><input class="input" value="${esc(p.projectNumber)}" onchange="upd('project.projectNumber',this.value)"></div>
      <div class="field"><div class="label">Contractor</div><input class="input" value="${esc(p.contractor)}" onchange="upd('project.contractor',this.value)"></div>
    </div>
    <div class="row">
      <div class="field"><div class="label">Submittal Number</div><input class="input" value="${esc(p.submittalNumber)}" onchange="upd('project.submittalNumber',this.value)"></div>
      <div class="field"><div class="label">Revision</div><input class="input" value="${esc(p.revision)}" onchange="upd('project.revision',this.value)"></div>
      <div class="field"><div class="label">Date</div><input class="input" type="date" value="${p.date}" onchange="upd('project.date',this.value)"></div>
    </div>
    <div class="row">
      <div class="field"><div class="label">Spec Section</div><input class="input" value="${esc(p.specSection)}" onchange="upd('project.specSection',this.value)"></div>
      <div class="field"><div class="label">Due Date</div><input class="input" type="date" value="${p.dueDate}" onchange="upd('project.dueDate',this.value)"></div>
    </div>
  </div>
  <div class="card">
    <div class="card-title">Saved Reviews (${state.savedReviews.length})</div>
    ${state.savedReviews.length?state.savedReviews.map((r,i)=>`<div style="display:flex;justify-content:space-between;align-items:center;padding:8px 0;border-bottom:1px solid var(--border)">
      <div><span style="color:var(--accent)">${esc(r.project.projectName||'Untitled')}</span> <span style="color:var(--textDim);font-size:10px">${r.project.submittalNumber} | ${r.project.date}</span></div>
      <div style="display:flex;gap:6px"><button class="btn" style="font-size:9px;padding:3px 8px" onclick="loadReview(${i})">Load</button><button class="btn btn-red" style="font-size:9px;padding:3px 8px" onclick="deleteReview(${i})">Del</button></div>
    </div>`).join(''):'<div style="color:var(--textDim);padding:20px;text-align:center">No saved reviews</div>'}
  </div>`;
}

function renderRequirements(){
  return`<div class="card">
    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:16px;flex-wrap:wrap;gap:8px">
      <div class="card-title" style="margin-bottom:0">Spec Requirements (${state.requirements.length})</div>
      <button class="btn btn-green" onclick="addReq()">+ Add Requirement</button>
    </div>
    ${state.requirements.length?state.requirements.map((r,i)=>`<div class="req-item ${state.editingReqId===r.id?'editing':''}">
      <div style="display:flex;justify-content:space-between;align-items:flex-start;gap:8px;flex-wrap:wrap">
        <div style="flex:1;min-width:200px">
          <div style="display:flex;gap:8px;align-items:center;margin-bottom:6px">
            <span style="color:var(--accent);font-weight:700;font-size:12px">${esc(r.reqId)||'--'}</span>
            <span style="font-size:10px;color:var(--textDim);background:var(--bg);padding:2px 6px;border-radius:3px">${r.category}</span>
            ${r.mandatory?'<span style="font-size:9px;color:var(--red)">MANDATORY</span>':''}
          </div>
          ${state.editingReqId===r.id?`
            <div class="row"><div class="field"><div class="label">Req ID</div><input class="input" value="${esc(r.reqId)}" onchange="updReq(${i},'reqId',this.value)"></div>
            <div class="field"><div class="label">Category</div><select class="select" style="width:100%" onchange="updReq(${i},'category',this.value)">${CATEGORIES.map(c=>`<option ${r.category===c?'selected':''}>${c}</option>`).join('')}</select></div></div>
            <div class="row"><div class="field"><div class="label">Description</div><textarea class="textarea" onchange="updReq(${i},'description',this.value)">${esc(r.description)}</textarea></div></div>
            <div class="row"><div class="field"><div class="label">Standards</div><input class="input" value="${esc(r.standards)}" onchange="updReq(${i},'standards',this.value)"></div>
            <div class="field"><div class="label">Manufacturers</div><input class="input" value="${esc(r.manufacturers)}" onchange="updReq(${i},'manufacturers',this.value)"></div></div>
            <div class="row"><div class="field"><div class="label">Min Value</div><input class="input" value="${esc(r.minVal)}" onchange="updReq(${i},'minVal',this.value)"></div>
            <div class="field"><div class="label">Max Value</div><input class="input" value="${esc(r.maxVal)}" onchange="updReq(${i},'maxVal',this.value)"></div>
            <div class="field"><div class="label">Target</div><input class="input" value="${esc(r.targetVal)}" onchange="updReq(${i},'targetVal',this.value)"></div>
            <div class="field"><div class="label">Units</div><input class="input" value="${esc(r.units)}" onchange="updReq(${i},'units',this.value)"></div></div>
            <label style="display:flex;align-items:center;gap:6px;font-size:11px;cursor:pointer"><input type="checkbox" ${r.mandatory?'checked':''} onchange="updReq(${i},'mandatory',this.checked)"> Mandatory</label>
          `:`<div style="font-size:12px;color:var(--text);line-height:1.5">${esc(r.description)}</div>
            ${r.standards?`<div style="font-size:10px;color:var(--textDim);margin-top:4px">Standards: ${esc(r.standards)}</div>`:''}
            ${r.minVal||r.maxVal?`<div style="font-size:10px;color:var(--yellow);margin-top:2px">Range: ${r.minVal||'--'} to ${r.maxVal||'--'} ${r.units||''}</div>`:''}`}
        </div>
        <div style="display:flex;gap:4px">
          <button class="btn" style="font-size:9px;padding:3px 8px" onclick="toggleEditReq('${r.id}')">${state.editingReqId===r.id?'Done':'Edit'}</button>
          <button class="btn btn-red" style="font-size:9px;padding:3px 8px" onclick="delReq(${i})">Del</button>
        </div>
      </div>
    </div>`).join(''):'<div style="color:var(--textDim);padding:30px;text-align:center">No requirements added. Click + Add Requirement or Load Demo.</div>'}
  </div>`;
}

function renderSubmittals(){
  return`<div class="card">
    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:16px;flex-wrap:wrap;gap:8px">
      <div class="card-title" style="margin-bottom:0">Submittal Data (${state.submittals.length})</div>
      <button class="btn btn-green" onclick="addSub()">+ Add Submittal Item</button>
    </div>
    ${state.submittals.length?state.submittals.map((s,i)=>`<div class="req-item ${state.editingSubId===s.id?'editing':''}">
      <div style="display:flex;justify-content:space-between;align-items:flex-start;gap:8px;flex-wrap:wrap">
        <div style="flex:1;min-width:200px">
          <div style="display:flex;gap:8px;align-items:center;margin-bottom:6px">
            <span style="color:var(--accent);font-weight:700;font-size:12px">Req ${esc(s.reqId)||'--'}</span>
            <span style="font-size:11px;color:var(--text)">${esc(s.product)||'(no product)'}</span>
          </div>
          ${state.editingSubId===s.id?`
            <div class="row"><div class="field"><div class="label">Linked Req ID</div><select class="select" style="width:100%" onchange="updSub(${i},'reqId',this.value)"><option value="">-- Select --</option>${state.requirements.map(r=>`<option value="${r.reqId}" ${s.reqId===r.reqId?'selected':''}>${r.reqId} - ${r.description.slice(0,50)}</option>`).join('')}</select></div></div>
            <div class="row"><div class="field"><div class="label">Manufacturer</div><input class="input" value="${esc(s.manufacturer)}" onchange="updSub(${i},'manufacturer',this.value)"></div>
            <div class="field"><div class="label">Product</div><input class="input" value="${esc(s.product)}" onchange="updSub(${i},'product',this.value)"></div></div>
            <div class="row"><div class="field"><div class="label">Properties</div><textarea class="textarea" onchange="updSub(${i},'properties',this.value)">${esc(s.properties)}</textarea></div></div>
            <div class="row"><div class="field"><div class="label">Test Results</div><textarea class="textarea" onchange="updSub(${i},'testResults',this.value)">${esc(s.testResults)}</textarea></div></div>
            <div class="row"><div class="field"><div class="label">Certifications</div><input class="input" value="${esc(s.certifications)}" onchange="updSub(${i},'certifications',this.value)"></div></div>
            <div class="row"><div class="field"><div class="label">Notes</div><textarea class="textarea" onchange="updSub(${i},'notes',this.value)">${esc(s.notes)}</textarea></div></div>
          `:`<div style="font-size:11px;color:var(--textDim)">${esc(s.manufacturer)} | ${esc(s.properties).slice(0,120)}${s.properties.length>120?'...':''}</div>
            ${s.testResults?`<div style="font-size:10px;color:var(--yellow);margin-top:4px">${esc(s.testResults).slice(0,100)}</div>`:''}`}
        </div>
        <div style="display:flex;gap:4px">
          <button class="btn" style="font-size:9px;padding:3px 8px" onclick="toggleEditSub('${s.id}')">${state.editingSubId===s.id?'Done':'Edit'}</button>
          <button class="btn btn-red" style="font-size:9px;padding:3px 8px" onclick="delSub(${i})">Del</button>
        </div>
      </div>
    </div>`).join(''):'<div style="color:var(--textDim);padding:30px;text-align:center">No submittal items. Click + Add Submittal Item or Load Demo.</div>'}
  </div>`;
}

function renderReview(){
  return`<div class="card">
    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:16px;flex-wrap:wrap;gap:8px">
      <div class="card-title" style="margin-bottom:0">Conformance Assessment</div>
      <button class="btn" onclick="runAutoAssess()">Auto-Assess All</button>
    </div>
    ${state.requirements.length?state.requirements.map((r,i)=>{
      const sub=state.submittals.find(s=>s.reqId===r.reqId);
      const status=state.assessments[r.id]||'NOT_ADDRESSED';
      const sm=STATUS_MAP[status]||STATUS_MAP.NOT_ADDRESSED;
      const cmts=state.comments[r.id]||[];
      return`<div class="req-item">
        <div style="display:flex;justify-content:space-between;align-items:flex-start;gap:12px;flex-wrap:wrap">
          <div style="flex:1;min-width:200px">
            <div style="display:flex;gap:8px;align-items:center;margin-bottom:6px">
              <span style="color:var(--accent);font-weight:700">${esc(r.reqId)}</span>
              <span class="badge ${sm.cls}">${sm.label}</span>
            </div>
            <div style="font-size:11px;margin-bottom:4px">${esc(r.description)}</div>
            ${sub?`<div style="font-size:10px;color:var(--green);margin-top:4px">Submittal: ${esc(sub.product)} by ${esc(sub.manufacturer)}</div>`:`<div style="font-size:10px;color:var(--red);margin-top:4px">No submittal data linked</div>`}
          </div>
          <div><select class="select" style="font-size:10px" onchange="setAssessment('${r.id}',this.value)">
            <option value="NOT_ADDRESSED" ${status==='NOT_ADDRESSED'?'selected':''}>Not Addressed</option>
            <option value="CONFORMS" ${status==='CONFORMS'?'selected':''}>Conforms</option>
            <option value="REVIEW_REQUIRED" ${status==='REVIEW_REQUIRED'?'selected':''}>Review Required</option>
            <option value="DOES_NOT_CONFORM" ${status==='DOES_NOT_CONFORM'?'selected':''}>Does Not Conform</option>
          </select></div>
        </div>
        <div class="comment-box">
          <div style="font-size:9px;color:var(--textDim);margin-bottom:4px;text-transform:uppercase">Comments (${cmts.length})</div>
          ${cmts.map((c,ci)=>`<div class="comment"><span style="color:var(--accent)">${esc(c.author||'Reviewer')}</span> <span style="color:var(--textMuted);font-size:9px">${c.date}</span><br>${esc(c.text)} <button style="background:none;border:none;color:var(--red);cursor:pointer;font-size:9px" onclick="delComment('${r.id}',${ci})">x</button></div>`).join('')}
          <div style="display:flex;gap:4px;margin-top:4px"><input class="input" style="font-size:10px;padding:4px 8px" id="cmt-${r.id}" placeholder="Add comment..."><button class="btn" style="font-size:9px;padding:3px 8px;white-space:nowrap" onclick="addComment('${r.id}')">Add</button></div>
        </div>
      </div>`}).join(''):'<div style="color:var(--textDim);padding:30px;text-align:center">Add requirements first</div>'}
  </div>`;
}

function renderSummary(){
  const counts={CONFORMS:0,DOES_NOT_CONFORM:0,REVIEW_REQUIRED:0,NOT_ADDRESSED:0};
  state.requirements.forEach(r=>{const s=state.assessments[r.id]||'NOT_ADDRESSED';counts[s]++});
  const total=state.requirements.length||1;
  return`<div class="card">
    <div class="card-title">Review Summary</div>
    <div class="summary-bar">
      <div style="flex:${counts.CONFORMS};background:var(--green)"></div>
      <div style="flex:${counts.REVIEW_REQUIRED};background:var(--yellow)"></div>
      <div style="flex:${counts.DOES_NOT_CONFORM};background:var(--red)"></div>
      <div style="flex:${counts.NOT_ADDRESSED};background:var(--border)"></div>
    </div>
    <div style="display:flex;gap:16px;flex-wrap:wrap;margin:12px 0">
      <div style="text-align:center"><div style="font-size:24px;font-weight:700;color:var(--green)">${counts.CONFORMS}</div><div style="font-size:9px;color:var(--textDim)">CONFORMS</div></div>
      <div style="text-align:center"><div style="font-size:24px;font-weight:700;color:var(--yellow)">${counts.REVIEW_REQUIRED}</div><div style="font-size:9px;color:var(--textDim)">REVIEW REQ</div></div>
      <div style="text-align:center"><div style="font-size:24px;font-weight:700;color:var(--red)">${counts.DOES_NOT_CONFORM}</div><div style="font-size:9px;color:var(--textDim)">NON-CONFORM</div></div>
      <div style="text-align:center"><div style="font-size:24px;font-weight:700;color:var(--textDim)">${counts.NOT_ADDRESSED}</div><div style="font-size:9px;color:var(--textDim)">NOT ADDRESSED</div></div>
    </div>
  </div>
  <div class="card">
    <div class="card-title">Recommendation</div>
    <div style="display:flex;gap:8px;flex-wrap:wrap;margin-bottom:16px">
      ${RECOMMENDATIONS.map(r=>{
        const colors={APPROVED:'var(--green)','APPROVED AS NOTED':'var(--accent)','REVISE AND RESUBMIT':'var(--yellow)',REJECTED:'var(--red)'};
        return`<button class="rec-btn ${state.recommendation===r?'selected':''}" style="color:${colors[r]};border-color:${state.recommendation===r?colors[r]:'var(--border)'};${state.recommendation===r?'background:'+colors[r]+'15':''}" onclick="setRec('${r}')">${r}</button>`}).join('')}
    </div>
    <div class="row">
      <div class="field"><div class="label">Reviewer Name</div><input class="input" value="${esc(state.reviewerName)}" onchange="state.reviewerName=this.value;save()"></div>
      <div class="field"><div class="label">Review Date</div><input class="input" type="date" value="${state.reviewDate}" onchange="state.reviewDate=this.value;save()"></div>
    </div>
    <div style="display:flex;gap:8px;margin-top:12px">
      <button class="btn btn-green" onclick="saveReview()">Save Review</button>
      <button class="btn" onclick="exportReport()">Export Report</button>
    </div>
  </div>
  <div class="card">
    <div class="card-title">Requirement Detail</div>
    <table><tr><th>Req ID</th><th>Category</th><th>Description</th><th>Status</th></tr>
    ${state.requirements.map(r=>{const s=state.assessments[r.id]||'NOT_ADDRESSED';const sm=STATUS_MAP[s];
      return`<tr><td style="color:var(--accent)">${esc(r.reqId)}</td><td>${r.category}</td><td style="max-width:400px">${esc(r.description).slice(0,80)}</td><td><span class="badge ${sm.cls}">${sm.label}</span></td></tr>`}).join('')}
    </table>
  </div>`;
}

function addReq(){state.requirements.push(emptyReq());state.editingReqId=state.requirements[state.requirements.length-1].id;save();render()}
function delReq(i){state.requirements.splice(i,1);save();render()}
function updReq(i,k,v){state.requirements[i][k]=v;save();render()}
function toggleEditReq(id){state.editingReqId=state.editingReqId===id?null:id;render()}
function addSub(){state.submittals.push(emptySub());state.editingSubId=state.submittals[state.submittals.length-1].id;save();render()}
function delSub(i){state.submittals.splice(i,1);save();render()}
function updSub(i,k,v){state.submittals[i][k]=v;save();render()}
function toggleEditSub(id){state.editingSubId=state.editingSubId===id?null:id;render()}
function setAssessment(id,v){state.assessments[id]=v;save();render()}
function setRec(r){state.recommendation=r;save();render()}
function addComment(reqId){const el=document.getElementById('cmt-'+reqId);if(!el||!el.value.trim())return;if(!state.comments[reqId])state.comments[reqId]=[];state.comments[reqId].push({text:el.value.trim(),author:state.reviewerName||'Reviewer',date:new Date().toISOString().slice(0,10)});save();render()}
function delComment(reqId,ci){state.comments[reqId].splice(ci,1);save();render()}
function saveReview(){state.savedReviews.push({project:{...state.project},requirements:[...state.requirements],submittals:[...state.submittals],assessments:{...state.assessments},recommendation:state.recommendation,date:new Date().toISOString()});save();setTab('project')}
function loadReview(i){const r=state.savedReviews[i];state.project={...r.project};state.requirements=[...r.requirements];state.submittals=[...r.submittals];state.assessments={...r.assessments};state.recommendation=r.recommendation;save();setTab('summary')}
function deleteReview(i){state.savedReviews.splice(i,1);save();render()}
function esc(s){return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;')}

function exportReport(){
  let txt=`SUBMITTAL REVIEW REPORT\n${'='.repeat(60)}\nProject: ${state.project.projectName}\nNumber: ${state.project.projectNumber}\nContractor: ${state.project.contractor}\nSubmittal: ${state.project.submittalNumber} Rev ${state.project.revision}\nDate: ${state.project.date}\nSpec Section: ${state.project.specSection}\n\nRECOMMENDATION: ${state.recommendation||'PENDING'}\nReviewer: ${state.reviewerName}\nReview Date: ${state.reviewDate}\n\n${'='.repeat(60)}\nREQUIREMENTS ASSESSMENT\n${'='.repeat(60)}\n`;
  state.requirements.forEach(r=>{
    const s=state.assessments[r.id]||'NOT_ADDRESSED';
    txt+=`\n${r.reqId} [${STATUS_MAP[s].label}]\n${r.description}\n`;
    const cmts=state.comments[r.id]||[];
    cmts.forEach(c=>{txt+=`  Comment (${c.author}, ${c.date}): ${c.text}\n`});
  });
  const a=document.createElement('a');a.href=URL.createObjectURL(new Blob([txt],{type:'text/plain'}));a.download=`submittal_review_${state.project.submittalNumber||'report'}.txt`;a.click();
}

function render(){
  renderTabs();
  const app=document.getElementById('app');
  switch(state.activeTab){
    case'project':app.innerHTML=renderProject();break;
    case'requirements':app.innerHTML=renderRequirements();break;
    case'submittals':app.innerHTML=renderSubmittals();break;
    case'review':app.innerHTML=renderReview();break;
    case'summary':app.innerHTML=renderSummary();break;
  }
}
load();render();
</script>
</body>
</html>
