<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="description" content="WBS Builder | Korb Engineering — a free, browser-based civil engineering tool from Korb Engineering. No signup, no downloads, works on mobile.">
<title>WBS Builder | Korb Engineering</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{--bg:#050a0f;--surface:#0a1018;--surface2:#0e1520;--border:#1a2535;--text:#e2e8f0;--cyan:#00d4ff;--orange:#ff6600;--green:#10b981;--red:#ef4444;--font:'JetBrains Mono',monospace}
html{font-size:16px}
body{background:var(--bg);color:var(--text);font-family:var(--font);min-height:100vh;line-height:1.5}
input,select,textarea,button{font-family:var(--font);font-size:16px;color:var(--text)}
input,select,textarea{background:var(--surface);border:1px solid var(--border);border-radius:6px;padding:10px 12px;width:100%;min-height:44px}
input:focus,select:focus,textarea:focus{outline:none;border-color:var(--cyan);box-shadow:0 0 0 2px rgba(0,212,255,.15)}
button{cursor:pointer;border:none;border-radius:6px;padding:10px 16px;min-height:44px;min-width:44px;font-weight:500;transition:all .2s}
.btn-primary{background:var(--cyan);color:#050a0f}
.btn-primary:hover{opacity:.85}
.btn-orange{background:var(--orange);color:#fff}
.btn-orange:hover{opacity:.85}
.btn-green{background:var(--green);color:#fff}
.btn-green:hover{opacity:.85}
.btn-red{background:var(--red);color:#fff}
.btn-red:hover{opacity:.85}
.btn-ghost{background:transparent;border:1px solid var(--border);color:var(--text)}
.btn-ghost:hover{border-color:var(--cyan);color:var(--cyan)}
.btn-sm{padding:6px 10px;font-size:13px;min-height:36px}
header{background:var(--surface);border-bottom:1px solid var(--border);padding:16px 20px;display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:12px}
header h1{font-size:1.1rem;font-weight:600;color:var(--cyan)}
header h1 span{color:var(--orange)}
header .subtitle{font-size:.8rem;color:#64748b;font-weight:300}
.container{max-width:1400px;margin:0 auto;padding:16px}
.tabs{display:flex;gap:4px;margin-bottom:16px;flex-wrap:wrap}
.tab{padding:10px 16px;border-radius:6px 6px 0 0;background:var(--surface);border:1px solid var(--border);border-bottom:none;cursor:pointer;font-size:.85rem;min-height:44px;display:flex;align-items:center}
.tab.active{background:var(--surface2);border-color:var(--cyan);color:var(--cyan)}
.panel{background:var(--surface2);border:1px solid var(--border);border-radius:0 6px 6px 6px;padding:16px;display:none}
.panel.active{display:block}
.toolbar{display:flex;gap:8px;margin-bottom:16px;flex-wrap:wrap;align-items:center}
.stats-bar{display:grid;grid-template-columns:repeat(auto-fit,minmax(160px,1fr));gap:12px;margin-bottom:16px}
.stat-card{background:var(--surface);border:1px solid var(--border);border-radius:8px;padding:12px;text-align:center}
.stat-card .label{font-size:.75rem;color:#64748b;text-transform:uppercase;letter-spacing:.5px}
.stat-card .value{font-size:1.3rem;font-weight:700;margin-top:4px}
.tree-view{font-size:.85rem}
.tree-node{border-left:2px solid var(--border);margin-left:12px;padding-left:12px;margin-top:4px}
.tree-node.level-0{border-left:none;margin-left:0;padding-left:0}
.node-row{display:flex;align-items:center;gap:6px;padding:6px 8px;border-radius:4px;cursor:pointer;min-height:44px;flex-wrap:wrap}
.node-row:hover{background:rgba(0,212,255,.05)}
.node-row.selected{background:rgba(0,212,255,.1);border:1px solid var(--cyan)}
.node-toggle{width:20px;height:20px;display:flex;align-items:center;justify-content:center;font-size:.7rem;cursor:pointer;flex-shrink:0}
.node-code{color:var(--cyan);font-weight:600;font-size:.8rem;white-space:nowrap}
.node-name{flex:1;min-width:100px}
.node-status{font-size:.7rem;padding:2px 8px;border-radius:10px;white-space:nowrap}
.status-not-started{background:rgba(0,212,255,.15);color:var(--cyan)}
.status-in-progress{background:rgba(255,102,0,.15);color:var(--orange)}
.status-complete{background:rgba(16,185,129,.15);color:var(--green)}
.node-actions{display:flex;gap:2px}
.node-actions button{padding:4px 6px;font-size:.7rem;min-height:32px;min-width:32px}
.form-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(200px,1fr));gap:12px;margin-bottom:16px}
.form-group{display:flex;flex-direction:column;gap:4px}
.form-group label{font-size:.75rem;color:#64748b;text-transform:uppercase;letter-spacing:.5px}
.modal-overlay{position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(5,10,15,.85);display:flex;align-items:center;justify-content:center;z-index:1000;padding:16px}
.modal{background:var(--surface2);border:1px solid var(--border);border-radius:12px;padding:24px;width:100%;max-width:600px;max-height:90vh;overflow-y:auto}
.modal h2{font-size:1rem;margin-bottom:16px;color:var(--cyan)}
canvas{border:1px solid var(--border);border-radius:8px;width:100%;background:var(--surface)}
.dict-table{width:100%;border-collapse:collapse;font-size:.8rem}
.dict-table th,.dict-table td{border:1px solid var(--border);padding:8px;text-align:left}
.dict-table th{background:var(--surface);color:var(--cyan);font-weight:600;position:sticky;top:0}
.dict-table td{background:var(--surface2)}
.table-wrap{overflow-x:auto;max-height:500px;overflow-y:auto}
.hidden{display:none!important}
@media print{
body{background:#fff;color:#000}
header,.toolbar,.tabs,.node-actions,.btn-primary,.btn-orange{display:none!important}
.panel{display:block!important;border:none;background:#fff}
.tree-node{border-left-color:#ccc}
.node-code{color:#0066cc}
.stat-card{border-color:#ccc;background:#f5f5f5}
}
@media(max-width:640px){
.form-grid{grid-template-columns:1fr}
.stats-bar{grid-template-columns:repeat(2,1fr)}
header h1{font-size:.95rem}
}
</style>
</head>
<body>
<header>
<div>
<h1>Korb Engineering <span>| WBS Builder</span></h1>
<div class="subtitle">Work Breakdown Structure</div>
</div>
<div style="display:flex;gap:8px;flex-wrap:wrap">
<button class="btn-ghost btn-sm" onclick="importJSON()">Import JSON</button>
<button class="btn-ghost btn-sm" onclick="exportJSON()">Export JSON</button>
<button class="btn-ghost btn-sm" onclick="window.print()">Print</button>
<select id="templateSelect" style="min-width:160px;font-size:.8rem" onchange="loadTemplate(this.value)">
<option value="">Load Template...</option>
<option value="construction">Construction Project</option>
<option value="software">Software Project</option>
<option value="airport">Airport Improvement</option>
<option value="study">Engineering Study</option>
</select>
</div>
</header>
<div class="container">
<div class="stats-bar" id="statsBar"></div>
<div class="tabs">
<div class="tab active" data-tab="tree" onclick="switchTab('tree')">Tree View</div>
<div class="tab" data-tab="diagram" onclick="switchTab('diagram')">Diagram</div>
<div class="tab" data-tab="dictionary" onclick="switchTab('dictionary')">WBS Dictionary</div>
</div>
<div class="panel active" id="panel-tree">
<div class="toolbar">
<button class="btn-primary btn-sm" onclick="addNode(null)">+ Add Root Phase</button>
<button class="btn-ghost btn-sm" onclick="expandAll()">Expand All</button>
<button class="btn-ghost btn-sm" onclick="collapseAll()">Collapse All</button>
</div>
<div class="tree-view" id="treeView"></div>
</div>
<div class="panel" id="panel-diagram">
<canvas id="diagramCanvas" height="600"></canvas>
</div>
<div class="panel" id="panel-dictionary">
<div class="table-wrap" id="dictTableWrap"></div>
</div>
</div>
<div class="modal-overlay hidden" id="nodeModal">
<div class="modal">
<h2 id="modalTitle">Add Node</h2>
<div class="form-grid">
<div class="form-group"><label>Name *</label><input id="nodeName" placeholder="Node name"></div>
<div class="form-group"><label>Responsible Party</label><input id="nodeResponsible" placeholder="Person/team"></div>
<div class="form-group"><label>Estimated Hours</label><input id="nodeHours" type="number" min="0" step="0.5" placeholder="0"></div>
<div class="form-group"><label>Estimated Cost ($)</label><input id="nodeCost" type="number" min="0" step="0.01" placeholder="0.00"></div>
<div class="form-group"><label>Status</label>
<select id="nodeStatus"><option value="not-started">Not Started</option><option value="in-progress">In Progress</option><option value="complete">Complete</option></select>
</div>
</div>
<div class="form-group" style="margin-bottom:16px"><label>Description</label><textarea id="nodeDesc" rows="3" placeholder="Description of this work element"></textarea></div>
<div style="display:flex;gap:8px;justify-content:flex-end;flex-wrap:wrap">
<button class="btn-ghost" onclick="closeModal()">Cancel</button>
<button class="btn-red hidden" id="deleteNodeBtn" onclick="deleteCurrentNode()">Delete</button>
<button class="btn-primary" id="saveNodeBtn" onclick="saveNode()">Save</button>
</div>
</div>
</div>
<input type="file" id="fileInput" accept=".json" style="display:none" onchange="handleFileImport(event)">
<script>/* korb alert shim: replace window.alert with non-blocking VFD toast */
(function(){if(window.__korbAlertShim)return;window.__korbAlertShim=true;window.alert=function(msg){try{var d=document.createElement("div");d.textContent=String(msg==null?"":msg);d.setAttribute("role","status");d.setAttribute("aria-live","polite");d.style.cssText="position:fixed;left:50%;bottom:24px;transform:translateX(-50%);"+"background:#0e1520;color:#e2e8f0;border:1px solid #1a2535;padding:12px 16px;"+"border-radius:8px;font:14px/1.4 'JetBrains Mono',monospace;z-index:2147483647;"+"max-width:90vw;box-shadow:0 10px 30px rgba(0,0,0,0.5);pointer-events:none;"+"white-space:pre-wrap;text-align:center";document.body.appendChild(d);setTimeout(function(){d.style.transition="opacity .3s";d.style.opacity="0";setTimeout(function(){d.remove();},320);},2800);}catch(e){}};})();</script>
<script>
let project={id:generateId(),name:'New Project',children:[],expanded:true};
let selectedNodeId=null;
let editingNodeId=null;
let editingParentId=null;
const STORAGE_PREFIX='korb_wbs_';

function generateId(){return'n_'+Date.now()+'_'+Math.random().toString(36).slice(2,8)}

function findNode(id,node=project){
if(node.id===id)return node;
if(node.children){for(let c of node.children){let r=findNode(id,c);if(r)return r}}
return null;
}

function findParent(id,node=project,parent=null){
if(node.id===id)return parent;
if(node.children){for(let c of node.children){let r=findParent(id,c,node);if(r)return r}}
return null;
}

function getLevel(id,node=project,level=0){
if(node.id===id)return level;
if(node.children){for(let c of node.children){let r=getLevel(id,c,level+1);if(r>=0)return r}}
return-1;
}

function generateWBSCode(node=project,prefix=''){
if(node===project){
node.wbs='1.0';
node.children.forEach((c,i)=>{
c.wbs=(i+1)+'.0';
generateChildCodes(c,(i+1));
});
}
}

function generateChildCodes(node,prefix){
if(!node.children)node.children=[];
node.children.forEach((c,i)=>{
c.wbs=prefix+'.'+(i+1);
generateChildCodes(c,c.wbs);
});
}

function calcStats(){
let totalHours=0,totalCost=0,completedCount=0,totalCount=0;
let phaseStats={};
function walk(node,phase=''){
if(node!==project){
let h=parseFloat(node.hours)||0;
let c=parseFloat(node.cost)||0;
totalHours+=h;totalCost+=c;totalCount++;
if(node.status==='complete')completedCount++;
let phaseName=phase||node.name;
if(!phaseStats[phaseName])phaseStats[phaseName]={hours:0,cost:0};
phaseStats[phaseName].hours+=h;
phaseStats[phaseName].cost+=c;
if(node.children)node.children.forEach(ch=>walk(ch,phaseName));
}else{
if(node.children)node.children.forEach(ch=>walk(ch,''));
}
}
walk(project);
let pct=totalCount?Math.round(completedCount/totalCount*100):0;
return{totalHours,totalCost,pct,totalCount,completedCount,phaseStats};
}

function renderStats(){
let s=calcStats();
let html=`
<div class="stat-card"><div class="label">Total Hours</div><div class="value" style="color:var(--cyan)">${s.totalHours.toLocaleString()}</div></div>
<div class="stat-card"><div class="label">Total Cost</div><div class="value" style="color:var(--orange)">$${s.totalCost.toLocaleString(undefined,{minimumFractionDigits:2})}</div></div>
<div class="stat-card"><div class="label">% Complete</div><div class="value" style="color:var(--green)">${s.pct}%</div></div>
<div class="stat-card"><div class="label">Work Elements</div><div class="value">${s.totalCount}</div></div>`;
document.getElementById('statsBar').innerHTML=html;
}

function renderTree(){
generateWBSCode();
let html='';
function renderNode(node,level){
if(node===project){
if(node.children)node.children.forEach(c=>renderNode(c,0));
return;
}
let hasKids=node.children&&node.children.length>0;
let expanded=node.expanded!==false;
let statusClass='status-'+node.status;
let sel=node.id===selectedNodeId?'selected':'';
html+=`<div class="tree-node level-${level}">`;
html+=`<div class="node-row ${sel}" data-id="${node.id}">`;
html+=`<div class="node-toggle" onclick="toggleExpand('${node.id}')">${hasKids?(expanded?'&#9660;':'&#9654;'):'&bull;'}</div>`;
html+=`<span class="node-code">${node.wbs||''}</span>`;
html+=`<span class="node-name" onclick="selectNode('${node.id}')">${escH(node.name)}</span>`;
html+=`<span class="node-status ${statusClass}">${node.status==='not-started'?'Not Started':node.status==='in-progress'?'In Progress':'Complete'}</span>`;
html+=`<div class="node-actions">`;
html+=`<button class="btn-ghost btn-sm" onclick="addNode('${node.id}')" title="Add child">+</button>`;
html+=`<button class="btn-ghost btn-sm" onclick="editNode('${node.id}')" title="Edit">&#9998;</button>`;
html+=`<button class="btn-ghost btn-sm" onclick="moveNode('${node.id}',-1)" title="Move up">&uarr;</button>`;
html+=`<button class="btn-ghost btn-sm" onclick="moveNode('${node.id}',1)" title="Move down">&darr;</button>`;
html+=`</div></div>`;
if(hasKids&&expanded){node.children.forEach(c=>renderNode(c,level+1))}
html+=`</div>`;
}
renderNode(project,0);
document.getElementById('treeView').innerHTML=html||'<p style="color:#64748b;padding:20px">No work elements yet. Click "+ Add Root Phase" to begin.</p>';
renderStats();
saveToStorage();
}

function escH(s){return s?s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'):''}

function toggleExpand(id){let n=findNode(id);if(n){n.expanded=!n.expanded;renderTree()}}
function expandAll(){function walk(n){n.expanded=true;if(n.children)n.children.forEach(walk)}walk(project);renderTree()}
function collapseAll(){function walk(n){n.expanded=false;if(n.children)n.children.forEach(walk)}walk(project);renderTree()}

function selectNode(id){selectedNodeId=id;renderTree()}

function addNode(parentId){
editingNodeId=null;
editingParentId=parentId;
document.getElementById('modalTitle').textContent='Add Work Element';
document.getElementById('nodeName').value='';
document.getElementById('nodeDesc').value='';
document.getElementById('nodeHours').value='';
document.getElementById('nodeCost').value='';
document.getElementById('nodeResponsible').value='';
document.getElementById('nodeStatus').value='not-started';
document.getElementById('deleteNodeBtn').classList.add('hidden');
document.getElementById('nodeModal').classList.remove('hidden');
document.getElementById('nodeName').focus();
}

function editNode(id){
let n=findNode(id);if(!n)return;
editingNodeId=id;editingParentId=null;
document.getElementById('modalTitle').textContent='Edit: '+n.name;
document.getElementById('nodeName').value=n.name||'';
document.getElementById('nodeDesc').value=n.description||'';
document.getElementById('nodeHours').value=n.hours||'';
document.getElementById('nodeCost').value=n.cost||'';
document.getElementById('nodeResponsible').value=n.responsible||'';
document.getElementById('nodeStatus').value=n.status||'not-started';
document.getElementById('deleteNodeBtn').classList.remove('hidden');
document.getElementById('nodeModal').classList.remove('hidden');
document.getElementById('nodeName').focus();
}

function saveNode(){
let name=document.getElementById('nodeName').value.trim();
if(!name){window.alert('Name is required');return}
let data={
name,
description:document.getElementById('nodeDesc').value.trim(),
hours:document.getElementById('nodeHours').value,
cost:document.getElementById('nodeCost').value,
responsible:document.getElementById('nodeResponsible').value.trim(),
status:document.getElementById('nodeStatus').value
};
if(editingNodeId){
let n=findNode(editingNodeId);
Object.assign(n,data);
}else{
let newNode={id:generateId(),children:[],expanded:true,...data};
if(editingParentId){
let p=findNode(editingParentId);
if(p){if(!p.children)p.children=[];p.children.push(newNode);p.expanded=true}
}else{
project.children.push(newNode);
}
}
closeModal();renderTree();
}

function deleteCurrentNode(){
if(!editingNodeId)return;
if(!confirm('Delete this node and all its children?'))return;
let parent=findParent(editingNodeId);
if(parent){parent.children=parent.children.filter(c=>c.id!==editingNodeId)}
closeModal();renderTree();
}

function moveNode(id,dir){
let parent=findParent(id);
if(!parent||!parent.children)return;
let idx=parent.children.findIndex(c=>c.id===id);
let newIdx=idx+dir;
if(newIdx<0||newIdx>=parent.children.length)return;
[parent.children[idx],parent.children[newIdx]]=[parent.children[newIdx],parent.children[idx]];
renderTree();
}

function closeModal(){document.getElementById('nodeModal').classList.add('hidden')}

function switchTab(tab){
document.querySelectorAll('.tab').forEach(t=>t.classList.toggle('active',t.dataset.tab===tab));
document.querySelectorAll('.panel').forEach(p=>p.classList.toggle('active',p.id==='panel-'+tab));
if(tab==='diagram')renderDiagram();
if(tab==='dictionary')renderDictionary();
}

function renderDiagram(){
let canvas=document.getElementById('diagramCanvas');
let ctx=canvas.getContext('2d');
let nodes=[];
function collectNodes(node,level,index){
if(node===project){
node.children.forEach((c,i)=>collectNodes(c,0,i));
return;
}
nodes.push({node,level,index});
if(node.expanded!==false&&node.children){
node.children.forEach((c,i)=>collectNodes(c,level+1,i));
}
}
collectNodes(project,0,0);

let levelCounts={};let levelPos={};
nodes.forEach(n=>{
if(!levelCounts[n.level])levelCounts[n.level]=0;
n.posInLevel=levelCounts[n.level]++;
});

let boxW=160,boxH=50,gapX=30,gapY=70;
let maxLevel=Math.max(0,...Object.keys(levelCounts).map(Number));
let maxCount=Math.max(1,...Object.values(levelCounts));

canvas.width=Math.max(800,maxCount*(boxW+gapX)+100);
canvas.height=Math.max(400,(maxLevel+1)*(boxH+gapY)+100);

ctx.fillStyle='#050a0f';
ctx.fillRect(0,0,canvas.width,canvas.height);

let positions={};
nodes.forEach(n=>{
let count=levelCounts[n.level];
let totalW=count*(boxW+gapX)-gapX;
let startX=(canvas.width-totalW)/2;
let x=startX+n.posInLevel*(boxW+gapX);
let y=40+n.level*(boxH+gapY);
positions[n.node.id]={x:x+boxW/2,y:y+boxH/2,left:x,top:y};

let colors={'not-started':'#00d4ff','in-progress':'#ff6600','complete':'#10b981'};
let col=colors[n.node.status]||'#00d4ff';
ctx.strokeStyle=col;ctx.lineWidth=2;
ctx.beginPath();ctx.roundRect(x,y,boxW,boxH,6);ctx.stroke();
ctx.fillStyle='rgba(10,16,24,.9)';ctx.fill();
ctx.fillStyle=col;ctx.font='bold 10px JetBrains Mono';
ctx.textAlign='center';
ctx.fillText(n.node.wbs||'',x+boxW/2,y+18);
ctx.fillStyle='#e2e8f0';ctx.font='11px JetBrains Mono';
let txt=n.node.name.length>18?n.node.name.slice(0,16)+'...':n.node.name;
ctx.fillText(txt,x+boxW/2,y+35);
});

nodes.forEach(n=>{
let parent=findParent(n.node.id);
if(parent&&parent!==project&&positions[parent.id]&&positions[n.node.id]){
let pp=positions[parent.id];let cp=positions[n.node.id];
ctx.strokeStyle='#1a2535';ctx.lineWidth=1.5;
ctx.beginPath();
ctx.moveTo(pp.x,pp.y+boxH/2);
ctx.lineTo(pp.x,cp.top-10);
ctx.lineTo(cp.x,cp.top-10);
ctx.lineTo(cp.x,cp.top);
ctx.stroke();
}
});
}

function renderDictionary(){
let rows=[];
function walk(node){
if(node!==project){
rows.push(node);
}
if(node.children)node.children.forEach(walk);
}
walk(project);
let html='<table class="dict-table"><thead><tr><th>WBS</th><th>Name</th><th>Description</th><th>Hours</th><th>Cost</th><th>Responsible</th><th>Status</th></tr></thead><tbody>';
rows.forEach(r=>{
let statusLabel=r.status==='not-started'?'Not Started':r.status==='in-progress'?'In Progress':'Complete';
html+=`<tr><td>${escH(r.wbs)}</td><td>${escH(r.name)}</td><td>${escH(r.description||'')}</td><td>${r.hours||0}</td><td>$${parseFloat(r.cost||0).toFixed(2)}</td><td>${escH(r.responsible||'')}</td><td>${statusLabel}</td></tr>`;
});
html+='</tbody></table>';
document.getElementById('dictTableWrap').innerHTML=html||'<p style="color:#64748b">No data.</p>';
}

function exportJSON(){
generateWBSCode();
let data=JSON.stringify(project,null,2);
let blob=new Blob([data],{type:'application/json'});
let a=document.createElement('a');a.href=URL.createObjectURL(blob);
a.download='wbs-'+Date.now()+'.json';a.click();URL.revokeObjectURL(a.href);
}

function importJSON(){document.getElementById('fileInput').click()}

function handleFileImport(e){
let file=e.target.files[0];if(!file)return;
let reader=new FileReader();
reader.onload=function(ev){
try{
let data=JSON.parse(ev.target.result);
if(data.name&&data.children!==undefined){
project=data;project.expanded=true;
renderTree();
}else{window.alert('Invalid WBS JSON format')}
}catch(err){window.alert('Error parsing JSON: '+err.message)}
};
reader.readAsText(file);e.target.value='';
}

function saveToStorage(){
try{localStorage.setItem(STORAGE_PREFIX+'current',JSON.stringify(project))}catch(e){}
}

function loadFromStorage(){
