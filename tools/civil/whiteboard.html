<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
<meta name="description" content="Whiteboard | Korb Engineering — a free, browser-based productivity tool from Korb Engineering. No signup, no downloads, works on mobile.">
<title>Whiteboard | Korb Engineering</title>
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box;}
:root{
--bg:#050a0f;--surface:#0a1018;--border:#1a2535;
--cyan:#00d4ff;--orange:#ff6600;--green:#10b981;
--text:#e2e8f0;--text-dim:#64748b;
--sticky1:#fef3c7;--sticky2:#fce7f3;--sticky3:#dbeafe;
--sticky4:#d1fae5;--sticky5:#ede9fe;--sticky6:#ffedd5;
}
html,body{height:100%;overflow:hidden;background:var(--bg);color:var(--text);font-family:'JetBrains Mono',monospace;user-select:none;}

/* TOOLBAR */
#toolbar{
position:fixed;top:0;left:0;right:0;height:48px;
background:var(--surface);border-bottom:1px solid var(--border);
display:flex;align-items:center;padding:0 12px;gap:6px;z-index:100;
}
#toolbar .brand{
font-size:13px;font-weight:600;color:var(--cyan);margin-right:12px;
letter-spacing:1px;white-space:nowrap;
}
#toolbar .sep{width:1px;height:28px;background:var(--border);margin:0 6px;}
.tb-btn{
background:none;border:1px solid transparent;color:var(--text-dim);
padding:6px 10px;border-radius:4px;cursor:pointer;font-family:inherit;
font-size:11px;display:flex;align-items:center;gap:4px;transition:all .15s;
}
.tb-btn:hover{color:var(--text);border-color:var(--border);}
.tb-btn.active{color:var(--cyan);border-color:var(--cyan);background:rgba(0,212,255,.08);}
.tb-btn svg{width:16px;height:16px;stroke:currentColor;fill:none;stroke-width:2;stroke-linecap:round;stroke-linejoin:round;}
.tb-group{display:flex;gap:2px;}
#toolbar .right{margin-left:auto;display:flex;align-items:center;gap:6px;}

/* SIDE PANEL */
#sidepanel{
position:fixed;top:48px;left:0;width:200px;bottom:0;
background:var(--surface);border-right:1px solid var(--border);
padding:12px;z-index:90;overflow-y:auto;display:flex;flex-direction:column;gap:12px;
}
#sidepanel label{font-size:10px;color:var(--text-dim);text-transform:uppercase;letter-spacing:1px;}
.color-presets{display:flex;flex-wrap:wrap;gap:4px;margin-top:4px;}
.color-swatch{
width:22px;height:22px;border-radius:3px;cursor:pointer;
border:2px solid transparent;transition:border-color .15s;
}
.color-swatch:hover,.color-swatch.active{border-color:var(--cyan);}
#customColor{
width:100%;height:28px;background:var(--bg);border:1px solid var(--border);
border-radius:3px;color:var(--text);font-family:inherit;font-size:11px;
padding:0 6px;margin-top:4px;
}
.slider-row{display:flex;align-items:center;gap:6px;margin-top:4px;}
.slider-row input[type=range]{flex:1;accent-color:var(--cyan);}
.slider-row span{font-size:11px;min-width:24px;text-align:right;}
.panel-btn{
width:100%;padding:6px;background:var(--bg);border:1px solid var(--border);
color:var(--text);font-family:inherit;font-size:11px;border-radius:3px;
cursor:pointer;transition:all .15s;
}
.panel-btn:hover{border-color:var(--cyan);color:var(--cyan);}
.panel-btn.danger:hover{border-color:#ef4444;color:#ef4444;}
select.panel-select{
width:100%;padding:4px 6px;background:var(--bg);border:1px solid var(--border);
color:var(--text);font-family:inherit;font-size:16px;border-radius:3px;
}
.chk-row{display:flex;align-items:center;gap:6px;margin-top:4px;font-size:11px;}
.chk-row input{accent-color:var(--cyan);}

/* CANVAS */
#canvasWrap{
position:fixed;top:48px;left:200px;right:0;bottom:0;
overflow:hidden;cursor:crosshair;background:#ffffff;
}
#mainCanvas{position:absolute;top:0;left:0;touch-action:none;}

/* MINIMAP */
#minimap{
position:fixed;bottom:12px;right:12px;width:160px;height:100px;
background:var(--surface);border:1px solid var(--border);border-radius:4px;
z-index:90;overflow:hidden;
}
#minimapCanvas{width:100%;height:100%;}

/* TEXT INPUT OVERLAY */
.text-input-overlay{
position:absolute;z-index:200;
background:transparent;border:1px dashed var(--cyan);
color:#1a1a1a;font-family:'JetBrains Mono',monospace;
outline:none;resize:none;min-width:60px;min-height:20px;padding:2px 4px;
}

/* MOBILE PANEL TOGGLE */
#panelToggle{
display:none;background:var(--surface);border:1px solid var(--border);
color:var(--cyan);width:36px;height:36px;border-radius:4px;
font-size:18px;cursor:pointer;align-items:center;justify-content:center;
z-index:95;position:fixed;top:56px;left:8px;font-family:inherit;
}

/* RESPONSIVE MOBILE */
@media(max-width:768px){
#sidepanel{
transform:translateX(-100%);transition:transform .25s ease;
width:220px;
}
#sidepanel.open{transform:translateX(0);}
#canvasWrap{left:0 !important;}
#panelToggle{display:flex;}
#toolbar{overflow-x:auto;-webkit-overflow-scrolling:touch;gap:3px;padding:0 8px;}
#toolbar .brand{font-size:11px;margin-right:6px;}
.tb-btn{padding:10px 12px;min-width:44px;min-height:44px;justify-content:center;}
.tb-btn svg{width:20px;height:20px;}
#minimap{width:100px;height:62px;bottom:8px;right:8px;}
.modal{min-width:auto;width:90vw;max-width:340px;}
}

/* STICKY EDIT */
.sticky-edit{
position:absolute;z-index:200;border:none;outline:none;
font-family:'JetBrains Mono',monospace;font-size:12px;
color:#1a1a1a;resize:both;overflow:auto;padding:8px;border-radius:4px;
min-width:100px;min-height:60px;
}

/* MODAL */
.modal-bg{
position:fixed;inset:0;background:rgba(0,0,0,.6);z-index:500;
display:flex;align-items:center;justify-content:center;
}
.modal{
background:var(--surface);border:1px solid var(--border);border-radius:6px;
padding:20px;min-width:300px;max-width:400px;
}
.modal h3{font-size:14px;color:var(--cyan);margin-bottom:12px;}
.modal input{
width:100%;padding:6px 8px;background:var(--bg);border:1px solid var(--border);
color:var(--text);font-family:inherit;font-size:16px;border-radius:3px;margin-bottom:8px;
}
.modal-actions{display:flex;gap:8px;justify-content:flex-end;margin-top:12px;}
.modal-actions button{
padding:6px 16px;border-radius:3px;cursor:pointer;font-family:inherit;font-size:11px;
border:1px solid var(--border);background:var(--bg);color:var(--text);
}
.modal-actions button.primary{border-color:var(--cyan);color:var(--cyan);}
.modal-actions button:hover{opacity:.8;}

/* BOARD TABS */
#boardTabs{
display:flex;gap:2px;align-items:center;
}
#boardTabs .tab{
padding:4px 10px;font-size:10px;border-radius:3px 3px 0 0;
cursor:pointer;background:var(--bg);color:var(--text-dim);
border:1px solid var(--border);border-bottom:none;
}
#boardTabs .tab.active{color:var(--cyan);border-color:var(--cyan);}
#boardTabs .tab-add{
padding:4px 8px;font-size:12px;cursor:pointer;color:var(--text-dim);
background:none;border:none;font-family:inherit;
}
#boardTabs .tab-add:hover{color:var(--cyan);}

/* Sticky note colors */
.sticky-color-row{display:flex;gap:4px;margin-top:4px;}
.sticky-cswatch{
width:20px;height:20px;border-radius:3px;cursor:pointer;
border:2px solid transparent;
}
.sticky-cswatch:hover,.sticky-cswatch.active{border-color:var(--cyan);}

/* Brush size picker */
.brush-row{display:flex;gap:4px;margin-top:4px;align-items:center;}
.brush-swatch{
width:28px;height:28px;border-radius:50%;border:1px solid var(--border);
display:flex;align-items:center;justify-content:center;cursor:pointer;background:var(--bg);
transition:all .12s;
}
.brush-swatch:hover{border-color:var(--cyan);}
.brush-swatch.active{border-color:var(--cyan);background:rgba(0,212,255,.12);}
.brush-swatch .dot{background:var(--cyan);border-radius:50%;display:block;}

/* Empty state hint */
#emptyHint{
position:fixed;top:50%;left:50%;transform:translate(-50%,-50%);
z-index:80;color:#94a3b8;font-size:13px;pointer-events:none;
text-align:center;font-family:'JetBrains Mono',monospace;
opacity:0.65;line-height:1.7;letter-spacing:0.05em;
transition:opacity .3s;
}
#emptyHint .big{font-size:14px;color:#334155;font-weight:500;letter-spacing:.15em;text-transform:uppercase;}
#emptyHint .kbd{display:inline-block;padding:2px 7px;border:1px solid #cbd5e1;border-radius:3px;font-size:11px;background:#f1f5f9;color:#475569;margin:0 2px;}
#emptyHint.hidden{opacity:0;}

/* Mobile quick-pen */
#mobilePen{
display:none;position:fixed;bottom:20px;left:50%;transform:translateX(-50%);
z-index:95;background:var(--cyan);color:#0a1018;border:none;border-radius:30px;
padding:14px 22px;font-family:inherit;font-weight:600;font-size:13px;letter-spacing:.1em;
box-shadow:0 6px 18px rgba(0,0,0,.3);cursor:pointer;text-transform:uppercase;
}
@media(max-width:768px){
/* keep floating pen available on mobile */
}

/* Scrollbar */
::-webkit-scrollbar{width:6px;}
::-webkit-scrollbar-track{background:var(--bg);}
::-webkit-scrollbar-thumb{background:var(--border);border-radius:3px;}
</style>
</head>
<body>

<!-- TOOLBAR -->
<div id="toolbar">
<span class="brand">KORB ENGINEERING</span>
<div class="sep"></div>
<div id="boardTabs"></div>
<div class="sep"></div>
<div class="tb-group">
<button class="tb-btn" data-tool="select" title="Select (V)"><svg><path d="M3 3l7 18 3-7 7-3z"/></svg></button>
<button class="tb-btn active" data-tool="draw" title="Draw / Pen (D)"><svg><path d="M3 17l4-4 4 4M12 3l-1 14"/></svg></button>

<button class="tb-btn" data-tool="sticky" title="Sticky Note (S)"><svg><rect x="2" y="2" width="12" height="12" rx="1" fill="#fef3c7" stroke="#f59e0b"/></svg></button>
<button class="tb-btn" data-tool="eraser" title="Eraser (X)"><svg><path d="M14 3L3 14l4 0 7-7"/><line x1="3" y1="14" x2="7" y2="14"/></svg></button>
</div>
<div class="sep"></div>
<button class="tb-btn" id="undoBtn" title="Undo (Ctrl+Z)"><svg><polyline points="3 8 1 6 3 4"/><path d="M1 6h9a4 4 0 0 1 0 8H9"/></svg></button>
<button class="tb-btn" id="redoBtn" title="Redo (Ctrl+Y)"><svg><polyline points="13 8 15 6 13 4"/><path d="M15 6H6a4 4 0 0 0 0 8h1"/></svg></button>
<div class="right">
<button class="tb-btn" id="exportBtn">Export PNG</button>
<button class="tb-btn" id="saveBtn" style="color:var(--green)">Save</button>
</div>
</div>

<!-- SIDE PANEL -->
<div id="sidepanel">
<div>
<label>Stroke Color</label>
<div class="color-presets" id="colorPresets"></div>
<input type="text" id="customColor" placeholder="#hex" maxlength="7">
</div>
<div>
<label>Fill Color (shapes)</label>
<div class="color-presets" id="fillPresets"></div>
<input type="text" id="customFill" placeholder="#hex or 'none'" maxlength="7">
</div>
<div>
<label>Brush Size</label>
<div class="brush-row" id="brushPresets"></div>
<div class="slider-row">
<input type="range" id="strokeWidth" min="1" max="40" value="3">
<span id="strokeVal">3</span>
</div>
</div>
<div>
<label><input type="checkbox" id="pressureToggle" checked style="vertical-align:middle;"> Pen pressure</label>
<label style="margin-top:6px;"><input type="checkbox" id="smoothToggle" checked style="vertical-align:middle;"> Smooth strokes</label>
</div>
<div>
<label>Font Size (text)</label>
<div class="slider-row">
<input type="range" id="fontSize" min="10" max="72" value="16">
<span id="fontSizeVal">16</span>
</div>
</div>
<div>
<label>Sticky Note Color</label>
<div class="sticky-color-row" id="stickyColors"></div>
</div>
<div>
<label>Options</label>
<div class="chk-row"><input type="checkbox" id="snapGrid"><span>Snap to grid</span></div>
<div class="slider-row" style="margin-top:6px;">
<span style="font-size:10px;">Grid</span>
<input type="range" id="gridSize" min="10" max="50" value="20">
<span id="gridVal">20</span>
</div>
</div>
<div style="margin-top:auto;">
<button class="panel-btn" id="loadBtn">Load Board</button>
<button class="panel-btn danger" id="clearBtn" style="margin-top:6px;">Clear Board</button>
</div>
</div>

<!-- PANEL TOGGLE (mobile) -->
<button id="panelToggle" title="Toggle panel">☰</button>

<!-- CANVAS -->
<div id="canvasWrap">
<canvas id="mainCanvas"></canvas>
<div id="emptyHint">
<div class="big">draw anywhere</div>
<div>click &amp; drag to sketch · <span class="kbd">D</span> pen · <span class="kbd">R</span> rectangle · <span class="kbd">T</span> text</div>
<div>hold <span class="kbd">Shift</span> to constrain · <span class="kbd">Space</span> + drag to pan · scroll to zoom</div>
</div>
</div>

<!-- MINIMAP -->
<div id="minimap">
<canvas id="minimapCanvas"></canvas>
</div>

(function(){if(window.__korbAlertShim)return;window.__korbAlertShim=true;window.alert=function(msg){try{var d=document.createElement("div");d.textContent=String(msg==null?"":msg);d.setAttribute("role","status");d.setAttribute("aria-live","polite");d.style.cssText="position:fixed;left:50%;bottom:24px;transform:translateX(-50%);"+"background:#0e1520;color:#e2e8f0;border:1px solid #1a2535;padding:12px 16px;"+"border-radius:8px;font:14px/1.4 'JetBrains Mono',monospace;z-index:2147483647;"+"max-width:90vw;box-shadow:0 10px 30px rgba(0,0,0,0.5);pointer-events:none;"+"white-space:pre-wrap;text-align:center";document.body.appendChild(d);setTimeout(function(){d.style.transition="opacity .3s";d.style.opacity="0";setTimeout(function(){d.remove();},320);},2800);}catch(e){}};})();</script>
<script>/* korb_ storage migration (additive, runs once per load) */
(function(){try{var M=[["ke_whiteboard_boards","korb_ke_whiteboard_boards"],["ke_whiteboard_active","korb_ke_whiteboard_active"]];for(var i=0;i<M.length;i++){var o=M[i][0],n=M[i][1];try{var ks=Object.keys(localStorage);for(var j=0;j<ks.length;j++){var k=ks[j];if(k.indexOf(o)===0&&k.indexOf("korb_")!==0){var nk=n+k.slice(o.length);if(localStorage.getItem(nk)===null){localStorage.setItem(nk,localStorage.getItem(k));}localStorage.removeItem(k);}}}catch(e){}}}catch(e){}})();</script>
<script>
(function(){
"use strict";

// ---- CONSTANTS ----
const PRESET_COLORS = ['#1a1a1a','#1e40af','#dc2626','#059669','#ea580c','#7c3aed','#db2777','#64748b','#ca8a04','#0891b2'];
const BRUSH_SIZES = [1, 3, 6, 12, 20];
const STICKY_COLORS = ['#fef3c7','#fce7f3','#dbeafe','#d1fae5','#ede9fe','#ffedd5'];
const MAX_UNDO = 30;
const GRID_COLOR = 'rgba(200,210,220,0.5)';

// ---- STATE ----
let boards = [];
let activeBoardIdx = 0;
let tool = 'draw';
let strokeColor = '#1e40af';
let fillColor = 'none';
let strokeWidth = 3;
let fontSize = 16;
let stickyColor = STICKY_COLORS[0];
let snapGrid = false;
let gridSize = 20;
let panX = 0, panY = 0, zoom = 1;
let isPanning = false, panStartX = 0, panStartY = 0, panStartPX = 0, panStartPY = 0;
let isDrawing = false, drawPoints = [];
let shapeStart = null;
let selectedItems = [];
let selectionRect = null;
let dragOffset = null;
let isDragging = false;
let spaceHeld = false;
let shiftHeld = false;
let undoStack = [], redoStack = [];
let pressureSupported = false;

// ---- DOM ----
const wrap = document.getElementById('canvasWrap');
const canvas = document.getElementById('mainCanvas');
const ctx = canvas.getContext('2d');
const mmCanvas = document.getElementById('minimapCanvas');
const mmCtx = mmCanvas.getContext('2d');

// ---- INIT ----
function init(){
resizeCanvas();
initColorPresets();
initStickyColors();
initBrushPresets();
loadFromStorage();
if(boards.length === 0) boards.push({name:'Board 1', items:[]});
activeBoardIdx = 0;
pushUndo();
renderBoardTabs();
updateEmptyHint();
render();
setTool('draw');
}

function resizeCanvas(){
canvas.width = wrap.clientWidth;
canvas.height = wrap.clientHeight;
mmCanvas.width = 160;
mmCanvas.height = 100;
render();
}
window.addEventListener('resize', resizeCanvas);

function initColorPresets(){
const cp = document.getElementById('colorPresets');
const fp = document.getElementById('fillPresets');
PRESET_COLORS.forEach(c => {
cp.appendChild(makeSwatch(c, 'stroke'));
fp.appendChild(makeSwatch(c, 'fill'));
});
// add 'none' swatch for fill
const ns = document.createElement('div');
ns.className = 'color-swatch' + (fillColor==='none'?' active':'');
ns.style.background = 'repeating-conic-gradient(#333 0% 25%, #555 0% 50%) 50%/8px 8px';
ns.dataset.color = 'none';
ns.dataset.type = 'fill';
ns.title = 'No fill';
ns.onclick = () => { fillColor='none'; updateSwatchActive('fill'); };
fp.appendChild(ns);
}
function makeSwatch(c, type){
const d = document.createElement('div');
d.className = 'color-swatch' + ((type==='stroke'?strokeColor:fillColor)===c?' active':'');
d.style.background = c;
d.dataset.color = c;
d.dataset.type = type;
d.onclick = () => {
if(type==='stroke') strokeColor=c;
else fillColor=c;
updateSwatchActive(type);
};
return d;
}
function updateSwatchActive(type){
const id = type==='stroke'?'colorPresets':'fillPresets';
document.querySelectorAll('#'+id+' .color-swatch').forEach(s => {
s.classList.toggle('active', s.dataset.color === (type==='stroke'?strokeColor:fillColor));
});
}

function initBrushPresets(){
const row = document.getElementById('brushPresets');
if(!row) return;
row.innerHTML = '';
BRUSH_SIZES.forEach(s => {
const d = document.createElement('div');
d.className = 'brush-swatch' + (strokeWidth===s?' active':'');
d.title = s + 'px';
d.dataset.size = s;
const dot = document.createElement('span');
dot.className = 'dot';
const px = Math.max(4, Math.min(18, s));
dot.style.width = px + 'px';
dot.style.height = px + 'px';
d.appendChild(dot);
d.onclick = () => {
strokeWidth = s;
document.getElementById('strokeWidth').value = s;
document.getElementById('strokeVal').textContent = s;
updateBrushActive();
};
row.appendChild(d);
});
}
function updateBrushActive(){
document.querySelectorAll('.brush-swatch').forEach(s => {
s.classList.toggle('active', parseInt(s.dataset.size) === strokeWidth);
});
}

function updateEmptyHint(){
const hint = document.getElementById('emptyHint');
if(!hint) return;
const hasContent = boards.some(b => b.items && b.items.length > 0);
hint.classList.toggle('hidden', hasContent);
}

function initStickyColors(){
const row = document.getElementById('stickyColors');
STICKY_COLORS.forEach(c => {
const d = document.createElement('div');
d.className = 'sticky-cswatch' + (stickyColor===c?' active':'');
d.style.background = c;
d.onclick = () => { stickyColor=c; document.querySelectorAll('.sticky-cswatch').forEach(s=>s.classList.toggle('active',s.style.background===c)); };
row.appendChild(d);
});
}

// ---- BOARDS ----
function currentBoard(){ return boards[activeBoardIdx]; }
function renderBoardTabs(){
const container = document.getElementById('boardTabs');
container.innerHTML = '';
boards.forEach((b,i) => {
const t = document.createElement('span');
t.className = 'tab' + (i===activeBoardIdx?' active':'');
t.textContent = b.name;
t.onclick = () => { activeBoardIdx=i; panX=0;panY=0;zoom=1; undoStack=[];redoStack=[]; pushUndo(); renderBoardTabs(); render(); };
t.ondblclick = () => {
const n = prompt('Rename board:', b.name);
if(n) { b.name=n; renderBoardTabs(); }
};
container.appendChild(t);
});
const add = document.createElement('span');
add.className = 'tab-add';
add.textContent = '+';
add.title = 'New board';
add.onclick = () => {
boards.push({name:'Board '+(boards.length+1), items:[]});
activeBoardIdx = boards.length-1;
panX=0;panY=0;zoom=1;undoStack=[];redoStack=[];pushUndo();
renderBoardTabs();render();
};
container.appendChild(add);
}

// ---- UNDO/REDO ----
function pushUndo(){
undoStack.push(JSON.stringify(currentBoard().items));
if(undoStack.length > MAX_UNDO) undoStack.shift();
redoStack = [];
}
function undo(){
if(undoStack.length < 2) return;
redoStack.push(undoStack.pop());
currentBoard().items = JSON.parse(undoStack[undoStack.length-1]);
selectedItems=[];render();
}
function redo(){
if(redoStack.length === 0) return;
const s = redoStack.pop();
undoStack.push(s);
currentBoard().items = JSON.parse(s);
selectedItems=[];render();
}

// ---- SAVE/LOAD ----
function saveToStorage(){
localStorage.setItem('korb_ke_whiteboard_boards', JSON.stringify(boards));
localStorage.setItem('korb_ke_whiteboard_active', activeBoardIdx);
}
function loadFromStorage(){
try{
const d = localStorage.getItem('korb_ke_whiteboard_boards');
if(d){ boards = JSON.parse(d); activeBoardIdx = parseInt(localStorage.getItem('korb_ke_whiteboard_active')||'0'); }
}catch(e){}
}

// ---- COORDINATE HELPERS ----
function screenToWorld(sx, sy){
const r = wrap.getBoundingClientRect();
return { x: (sx - r.left - panX) / zoom, y: (sy - r.top - panY) / zoom };
}
function worldToScreen(wx, wy){
return { x: wx*zoom + panX, y: wy*zoom + panY };
}
function snap(v){ return snapGrid ? Math.round(v/gridSize)*gridSize : v; }

// ---- RENDERING ----
function render(){
ctx.clearRect(0, 0, canvas.width, canvas.height);
ctx.save();
ctx.translate(panX, panY);
ctx.scale(zoom, zoom);
drawGrid();
const items = currentBoard().items;
items.forEach((item, idx) => {
drawItem(ctx, item, selectedItems.includes(idx));
});
// selection rect
if(selectionRect){
ctx.strokeStyle = 'rgba(0,212,255,0.5)';
ctx.lineWidth = 1/zoom;
ctx.setLineDash([4/zoom,4/zoom]);
ctx.strokeRect(selectionRect.x, selectionRect.y, selectionRect.w, selectionRect.h);
ctx.setLineDash([]);
}
ctx.restore();
// preview current drawing
if(isDrawing && tool==='draw' && drawPoints.length > 1){
ctx.save();ctx.translate(panX,panY);ctx.scale(zoom,zoom);
ctx.strokeStyle=strokeColor;ctx.lineCap='round';ctx.lineJoin='round';
const useSmooth = document.getElementById('smoothToggle')?.checked;
const usePressure = document.getElementById('pressureToggle')?.checked;
if(usePressure && drawPoints.some(p => p.p != null && p.p !== 0.5)){
for(let i=1;i<drawPoints.length;i++){
const p0=drawPoints[i-1], p1=drawPoints[i];
const pr = p0.p != null ? p0.p : 0.5;
ctx.lineWidth = strokeWidth * (0.35 + pr * 1.1);
ctx.beginPath();ctx.moveTo(p0.x,p0.y);ctx.lineTo(p1.x,p1.y);ctx.stroke();
}
} else if(useSmooth && drawPoints.length > 2){
ctx.lineWidth=strokeWidth;
ctx.beginPath();
ctx.moveTo(drawPoints[0].x,drawPoints[0].y);
for(let i=1;i<drawPoints.length-1;i++){
const xc=(drawPoints[i].x+drawPoints[i+1].x)/2;
const yc=(drawPoints[i].y+drawPoints[i+1].y)/2;
ctx.quadraticCurveTo(drawPoints[i].x,drawPoints[i].y,xc,yc);
}
ctx.lineTo(drawPoints[drawPoints.length-1].x,drawPoints[drawPoints.length-1].y);
ctx.stroke();
} else {
ctx.lineWidth=strokeWidth;
ctx.beginPath();ctx.moveTo(drawPoints[0].x,drawPoints[0].y);
for(let i=1;i<drawPoints.length;i++) ctx.lineTo(drawPoints[i].x,drawPoints[i].y);
ctx.stroke();
}
ctx.restore();
}
if(isDrawing && shapeStart && (tool==='line'||tool==='arrow'||tool==='rect'||tool==='ellipse')){
ctx.save();ctx.translate(panX,panY);ctx.scale(zoom,zoom);
drawShapePreview(ctx);
ctx.restore();
}
renderMinimap();
}

function drawGrid(){
if(!snapGrid) return;
const vl = -panX/zoom, vt = -panY/zoom;
const vr = vl + canvas.width/zoom, vb = vt + canvas.height/zoom;
ctx.strokeStyle = GRID_COLOR;
ctx.lineWidth = 0.5;
const sx = Math.floor(vl/gridSize)*gridSize;
const sy = Math.floor(vt/gridSize)*gridSize;
ctx.beginPath();
for(let x=sx;x<=vr;x+=gridSize){ctx.moveTo(x,vt);ctx.lineTo(x,vb);}
for(let y=sy;y<=vb;y+=gridSize){ctx.moveTo(vl,y);ctx.lineTo(vr,y);}
ctx.stroke();
}

function drawItem(c, item, selected){
c.save();
if(item.type==='draw'){
c.strokeStyle=item.color;c.lineCap='round';c.lineJoin='round';
const pts = item.points;
if(pts.length > 0){
if(item.pressure && pts.length > 1){
// variable-width stroke: draw small segments between points with pressure-modulated width
for(let i=1;i<pts.length;i++){
const p0 = pts[i-1], p1 = pts[i];
const pr = (p0.p != null ? p0.p : 0.5);
c.lineWidth = item.width * (0.35 + pr * 1.1);
c.beginPath();c.moveTo(p0.x,p0.y);c.lineTo(p1.x,p1.y);c.stroke();
}
} else if(item.smooth && pts.length > 2){
c.lineWidth = item.width;
c.beginPath();
c.moveTo(pts[0].x, pts[0].y);
for(let i=1;i<pts.length-1;i++){
const xc = (pts[i].x + pts[i+1].x)/2;
const yc = (pts[i].y + pts[i+1].y)/2;
c.quadraticCurveTo(pts[i].x, pts[i].y, xc, yc);
}
c.lineTo(pts[pts.length-1].x, pts[pts.length-1].y);
c.stroke();
} else {
c.lineWidth = item.width;
c.beginPath();
c.moveTo(pts[0].x,pts[0].y);
for(let i=1;i<pts.length;i++) c.lineTo(pts[i].x,pts[i].y);
c.stroke();
}
}
} else if(item.type==='line'){
c.strokeStyle=item.color;c.lineWidth=item.width;
c.beginPath();c.moveTo(item.x1,item.y1);c.lineTo(item.x2,item.y2);c.stroke();
} else if(item.type==='arrow'){
c.strokeStyle=item.color;c.lineWidth=item.width;
c.beginPath();c.moveTo(item.x1,item.y1);c.lineTo(item.x2,item.y2);c.stroke();
drawArrowhead(c,item.x1,item.y1,item.x2,item.y2,item.width,item.color);
} else if(item.type==='rect'){
if(item.fill && item.fill!=='none'){c.fillStyle=item.fill;c.fillRect(item.x,item.y,item.w,item.h);}
c.strokeStyle=item.color;c.lineWidth=item.width;c.strokeRect(item.x,item.y,item.w,item.h);
} else if(item.type==='ellipse'){
if(item.fill && item.fill!=='none'){c.fillStyle=item.fill;}
c.strokeStyle=item.color;c.lineWidth=item.width;
c.beginPath();c.ellipse(item.cx,item.cy,Math.abs(item.rx),Math.abs(item.ry),0,0,Math.PI*2);
if(item.fill && item.fill!=='none') c.fill();
c.stroke();
} else if(item.type==='text'){
c.fillStyle=item.color;c.font=item.fontSize+'px JetBrains Mono, monospace';
c.textBaseline='top';
item.text.split('\n').forEach((line,li)=>{
c.fillText(line, item.x, item.y + li*item.fontSize*1.2);
});
} else if(item.type==='sticky'){
c.fillStyle=item.bg;
roundRect(c,item.x,item.y,item.w,item.h,4);c.fill();
c.strokeStyle='rgba(0,0,0,0.15)';c.lineWidth=1;
roundRect(c,item.x,item.y,item.w,item.h,4);c.stroke();
// shadow
c.shadowColor='rgba(0,0,0,0.2)';c.shadowBlur=8;c.shadowOffsetY=2;
roundRect(c,item.x,item.y,item.w,item.h,4);c.fill();
c.shadowColor='transparent';
// text
c.fillStyle='#1a1a1a';c.font='12px JetBrains Mono, monospace';c.textBaseline='top';
wrapText(c,item.text||'',item.x+8,item.y+8,item.w-16,14);
}
if(selected){
const bb = getBounds(item);
c.strokeStyle='var(--cyan)';c.strokeStyle='#00d4ff';c.lineWidth=1.5/zoom;
c.setLineDash([4/zoom,3/zoom]);
c.strokeRect(bb.x-4,bb.y-4,bb.w+8,bb.h+8);
c.setLineDash([]);
}
c.restore();
}

function drawArrowhead(c,x1,y1,x2,y2,w,color){
const angle = Math.atan2(y2-y1,x2-x1);
const len = Math.max(10, w*3);
c.fillStyle=color;
c.beginPath();
c.moveTo(x2,y2);
c.lineTo(x2-len*Math.cos(angle-0.4), y2-len*Math.sin(angle-0.4));
c.lineTo(x2-len*Math.cos(angle+0.4), y2-len*Math.sin(angle+0.4));
c.closePath();c.fill();
}

function drawShapePreview(c){
const p = shapeStart;
const e = shapeStart._end;
if(!e) return;
c.strokeStyle=strokeColor;c.lineWidth=strokeWidth;
if(fillColor!=='none'){c.fillStyle=fillColor;}
if(tool==='line'){
c.beginPath();c.moveTo(p.x,p.y);c.lineTo(e.x,e.y);c.stroke();
} else if(tool==='arrow'){
c.beginPath();c.moveTo(p.x,p.y);c.lineTo(e.x,e.y);c.stroke();
drawArrowhead(c,p.x,p.y,e.x,e.y,strokeWidth,strokeColor);
} else if(tool==='rect'){
const x=Math.min(p.x,e.x),y=Math.min(p.y,e.y),w=Math.abs(e.x-p.x),h=Math.abs(e.y-p.y);
if(fillColor!=='none') c.fillRect(x,y,w,h);
c.strokeRect(x,y,w,h);
} else if(tool==='ellipse'){
const cx=(p.x+e.x)/2, cy=(p.y+e.y)/2, rx=Math.abs(e.x-p.x)/2, ry=Math.abs(e.y-p.y)/2;
c.beginPath();c.ellipse(cx,cy,rx,ry,0,0,Math.PI*2);
if(fillColor!=='none') c.fill();
c.stroke();
}
}

function roundRect(c,x,y,w,h,r){
c.beginPath();c.moveTo(x+r,y);c.lineTo(x+w-r,y);c.quadraticCurveTo(x+w,y,x+w,y+r);
c.lineTo(x+w,y+h-r);c.quadraticCurveTo(x+w,y+h,x+w-r,y+h);c.lineTo(x+r,y+h);
c.quadraticCurveTo(x,y+h,x,y+h-r);c.lineTo(x,y+r);c.quadraticCurveTo(x,y,x+r,y);c.closePath();
}

function wrapText(c,text,x,y,maxW,lineH){
const lines = text.split('\n');
let ly=y;
lines.forEach(line=>{
const words=line.split(' ');let cur='';
words.forEach(w=>{
const test=cur?cur+' '+w:w;
if(c.measureText(test).width>maxW && cur){
c.fillText(cur,x,ly);ly+=lineH;cur=w;
} else cur=test;
});
if(cur){c.fillText(cur,x,ly);ly+=lineH;}
});
}

function getBounds(item){
if(item.type==='draw'){
let mx=Infinity,my=Infinity,Mx=-Infinity,My=-Infinity;
item.points.forEach(p=>{mx=Math.min(mx,p.x);my=Math.min(my,p.y);Mx=Math.max(Mx,p.x);My=Math.max(My,p.y);});
return{x:mx,y:my,w:Mx-mx||10,h:My-my||10};
}
if(item.type==='line'||item.type==='arrow'){
return{x:Math.min(item.x1,item.x2),y:Math.min(item.y1,item.y2),w:Math.abs(item.x2-item.x1)||10,h:Math.abs(item.y2-item.y1)||10};
}
if(item.type==='rect') return{x:item.x,y:item.y,w:item.w,h:item.h};
if(item.type==='ellipse') return{x:item.cx-Math.abs(item.rx),y:item.cy-Math.abs(item.ry),w:Math.abs(item.rx)*2,h:Math.abs(item.ry)*2};
if(item.type==='text'){
ctx.font=item.fontSize+'px JetBrains Mono, monospace';
const lines=item.text.split('\n');
let maxW=0;lines.forEach(l=>{maxW=Math.max(maxW,ctx.measureText(l).width);});
return{x:item.x,y:item.y,w:maxW||20,h:lines.length*item.fontSize*1.2||20};
}
if(item.type==='sticky') return{x:item.x,y:item.y,w:item.w,h:item.h};
return{x:0,y:0,w:0,h:0};
}

function hitTest(wx, wy){
const items = currentBoard().items;
for(let i=items.length-1;i>=0;i--){
const bb = getBounds(items[i]);
if(wx>=bb.x-4 && wx<=bb.x+bb.w+4 && wy>=bb.y-4 && wy<=bb.y+bb.h+4) return i;
}
return -1;
}

// ---- MINIMAP ----
function renderMinimap(){
mmCtx.fillStyle='#0a1018';
mmCtx.fillRect(0,0,160,100);
const items = currentBoard().items;
if(items.length===0) return;
let mx=Infinity,my=Infinity,Mx=-Infinity,My=-Infinity;
items.forEach(it=>{const bb=getBounds(it);mx=Math.min(mx,bb.x);my=Math.min(my,bb.y);Mx=Math.max(Mx,bb.x+bb.w);My=Math.max(My,bb.y+bb.h);});
const pad=50;mx-=pad;my-=pad;Mx+=pad;My+=pad;
const rw=Mx-mx,rh=My-my;
const sc=Math.min(160/rw,100/rh);
mmCtx.save();mmCtx.scale(sc,sc);mmCtx.translate(-mx,-my);
items.forEach(it=>{
const bb=getBounds(it);
mmCtx.fillStyle=it.color||it.bg||'#00d4ff';
mmCtx.globalAlpha=0.6;
mmCtx.fillRect(bb.x,bb.y,Math.max(bb.w,2/sc),Math.max(bb.h,2/sc));
});
mmCtx.globalAlpha=1;
// viewport indicator
const vl=-panX/zoom, vt=-panY/zoom, vw=canvas.width/zoom, vh=canvas.height/zoom;
mmCtx.strokeStyle='#ff6600';mmCtx.lineWidth=2/sc;
mmCtx.strokeRect(vl,vt,vw,vh);
mmCtx.restore();
}

// ---- MOUSE EVENTS ----
let lastTouch = null;
let touchDist = 0;

canvas.addEventListener('pointerdown', onPointerDown);
canvas.addEventListener('pointermove', onPointerMove);
canvas.addEventListener('pointerup', onPointerUp);
canvas.addEventListener('wheel', onWheel, {passive:false});
canvas.addEventListener('contextmenu', e=>e.preventDefault());

function onPointerDown(e){
const w = screenToWorld(e.clientX, e.clientY);

// Middle mouse or space+click = pan
if(e.button === 1 || spaceHeld){
isPanning=true; panStartX=e.clientX; panStartY=e.clientY;
panStartPX=panX; panStartPY=panY;
canvas.style.cursor='grabbing'; return;
}

if(e.button !== 0) return;

if(tool==='select'){
const hit = hitTest(w.x, w.y);
if(hit >= 0){
if(!selectedItems.includes(hit)){
selectedItems = [hit];
}
isDragging=true;
dragOffset={x:w.x,y:w.y};
render();
} else {
selectedItems=[];
selectionRect={x:w.x,y:w.y,w:0,h:0,sx:w.x,sy:w.y};
render();
}
} else if(tool==='draw'){
isDrawing=true;
const pr = (e.pointerType === 'pen' && e.pressure > 0) ? e.pressure : 0.5;
if(e.pointerType === 'pen') pressureSupported = true;
drawPoints=[{x:snap(w.x),y:snap(w.y),p:pr}];
} else if(tool==='line'||tool==='arrow'||tool==='rect'||tool==='ellipse'){
isDrawing=true;
shapeStart={x:snap(w.x),y:snap(w.y),_end:null};
} else if(tool==='text'){
createTextInput(w.x, w.y);
} else if(tool==='sticky'){
pushUndo();
currentBoard().items.push({
type:'sticky',x:snap(w.x)-60,y:snap(w.y)-40,w:120,h:80,
bg:stickyColor,text:''
});
updateEmptyHint();render();
// open edit
editSticky(currentBoard().items.length-1);
} else if(tool==='eraser'){
const hit = hitTest(w.x, w.y);
if(hit>=0){
pushUndo();
currentBoard().items.splice(hit,1);
selectedItems=[];render();
}
}
}

function onPointerMove(e){
const w = screenToWorld(e.clientX, e.clientY);

if(isPanning){
panX = panStartPX + (e.clientX - panStartX);
panY = panStartPY + (e.clientY - panStartY);
render(); return;
}

if(tool==='select' && selectionRect){
selectionRect.w = w.x - selectionRect.sx;
selectionRect.h = w.y - selectionRect.sy;
selectionRect.x = Math.min(selectionRect.sx, w.x);
selectionRect.y = Math.min(selectionRect.sy, w.y);
selectionRect.w = Math.abs(selectionRect.w);
selectionRect.h = Math.abs(selectionRect.h);
render();
} else if(tool==='select' && isDragging && dragOffset){
const dx = w.x - dragOffset.x;
const dy = w.y - dragOffset.y;
selectedItems.forEach(idx=>{
const it = currentBoard().items[idx];
moveItem(it, dx, dy);
});
dragOffset = {x:w.x,y:w.y};
render();
} else if(tool==='draw' && isDrawing){
const pr = (e.pointerType === 'pen' && e.pressure > 0) ? e.pressure : (e.pressure || 0.5);
drawPoints.push({x:snap(w.x),y:snap(w.y),p:pr});
render();
} else if(isDrawing && shapeStart){
let ex = snap(w.x), ey = snap(w.y);
if(shiftHeld){
const dx = ex - shapeStart.x, dy = ey - shapeStart.y;
if(tool==='line' || tool==='arrow'){
// constrain to 0 / 45 / 90
const ang = Math.atan2(dy, dx);
const snapAng = Math.round(ang / (Math.PI/4)) * (Math.PI/4);
const len = Math.hypot(dx, dy);
ex = shapeStart.x + len * Math.cos(snapAng);
ey = shapeStart.y + len * Math.sin(snapAng);
} else if(tool==='rect' || tool==='ellipse'){
const s = Math.max(Math.abs(dx), Math.abs(dy));
ex = shapeStart.x + (dx<0?-s:s);
ey = shapeStart.y + (dy<0?-s:s);
}
}
shapeStart._end = {x:ex, y:ey};
render();
} else if(tool==='eraser' && e.buttons===1){
const hit = hitTest(w.x, w.y);
if(hit>=0){
pushUndo();
currentBoard().items.splice(hit,1);
selectedItems=[];render();
}
}
}

function onPointerUp(e){
if(isPanning){isPanning=false;canvas.style.cursor='crosshair';return;}

const w = screenToWorld(e.clientX, e.clientY);

if(tool==='select' && selectionRect){
// select items in rect
const r = selectionRect;
selectedItems=[];
currentBoard().items.forEach((it,i)=>{
const bb=getBounds(it);
if(bb.x<r.x+r.w && bb.x+bb.w>r.x && bb.y<r.y+r.h && bb.y+bb.h>r.y) selectedItems.push(i);
});
selectionRect=null;
render();
} else if(tool==='select' && isDragging){
if(dragOffset){
const w2=screenToWorld(e.clientX,e.clientY);
const totalDx=Math.abs(w2.x-(dragOffset?dragOffset.x:0));
if(totalDx>0.5) pushUndo();
}
isDragging=false;dragOffset=null;
// double click sticky to edit
} else if(tool==='draw' && isDrawing){
if(drawPoints.length>1){
pushUndo();
const usePressure = document.getElementById('pressureToggle')?.checked;
const useSmooth = document.getElementById('smoothToggle')?.checked;
currentBoard().items.push({
type:'draw',
points:[...drawPoints],
color:strokeColor,
width:strokeWidth,
pressure: !!usePressure && drawPoints.some(p => p.p != null && p.p !== 0.5),
smooth: !!useSmooth
});
updateEmptyHint();
}
isDrawing=false;drawPoints=[];render();
} else if(isDrawing && shapeStart && shapeStart._end){
pushUndo();
const p=shapeStart, e2=shapeStart._end;
if(tool==='line'){
currentBoard().items.push({type:'line',x1:p.x,y1:p.y,x2:e2.x,y2:e2.y,color:strokeColor,width:strokeWidth});
} else if(tool==='arrow'){
currentBoard().items.push({type:'arrow',x1:p.x,y1:p.y,x2:e2.x,y2:e2.y,color:strokeColor,width:strokeWidth});
} else if(tool==='rect'){
currentBoard().items.push({type:'rect',x:Math.min(p.x,e2.x),y:Math.min(p.y,e2.y),w:Math.abs(e2.x-p.x),h:Math.abs(e2.y-p.y),color:strokeColor,width:strokeWidth,fill:fillColor});
} else if(tool==='ellipse'){
currentBoard().items.push({type:'ellipse',cx:(p.x+e2.x)/2,cy:(p.y+e2.y)/2,rx:Math.abs(e2.x-p.x)/2,ry:Math.abs(e2.y-p.y)/2,color:strokeColor,width:strokeWidth,fill:fillColor});
}
updateEmptyHint();
isDrawing=false;shapeStart=null;render();
} else {
isDrawing=false;shapeStart=null;
}
}

function moveItem(it, dx, dy){
if(it.type==='draw') it.points.forEach(p=>{p.x+=dx;p.y+=dy;});
else if(it.type==='line'||it.type==='arrow'){it.x1+=dx;it.y1+=dy;it.x2+=dx;it.y2+=dy;}
else if(it.type==='rect'||it.type==='sticky'||it.type==='text'){it.x+=dx;it.y+=dy;}
else if(it.type==='ellipse'){it.cx+=dx;it.cy+=dy;}
}

function onWheel(e){
e.preventDefault();
const r = wrap.getBoundingClientRect();
const mx = e.clientX - r.left;
const my = e.clientY - r.top;
const d = e.deltaY > 0 ? 0.9 : 1.1;
const nz = Math.max(0.1, Math.min(10, zoom*d));
panX = mx - (mx-panX)*(nz/zoom);
panY = my - (my-panY)*(nz/zoom);
zoom = nz;
render();
}

// ---- TEXT INPUT ----
function createTextInput(wx, wy){
const ta = document.createElement('textarea');
ta.className='text-input-overlay';
const sp = worldToScreen(wx,wy);
const r = wrap.getBoundingClientRect();
ta.style.left=(sp.x)+'px';
ta.style.top=(sp.y)+'px';
ta.style.fontSize=(fontSize*zoom)+'px';
ta.style.color=strokeColor;
wrap.appendChild(ta);
ta.focus();
ta.addEventListener('blur', ()=>{
if(ta.value.trim()){
pushUndo();
currentBoard().items.push({type:'text',x:wx,y:wy,text:ta.value,color:strokeColor,fontSize:fontSize});
updateEmptyHint();render();
}
ta.remove();
});
ta.addEventListener('keydown', e=>{
if(e.key==='Escape') ta.blur();
e.stopPropagation();
});
}

// ---- STICKY EDIT ----
function editSticky(idx){
const item = currentBoard().items[idx];
const sp = worldToScreen(item.x, item.y);
const ta = document.createElement('textarea');
ta.className='sticky-edit';
ta.style.left=sp.x+'px';
ta.style.top=sp.y+'px';
ta.style.width=(item.w*zoom)+'px';
ta.style.height=(item.h*zoom)+'px';
ta.style.background=item.bg;
ta.value=item.text||'';
wrap.appendChild(ta);
ta.focus();
ta.addEventListener('blur',()=>{
pushUndo();
item.text=ta.value;
// capture resize
item.w=ta.offsetWidth/zoom;
item.h=ta.offsetHeight/zoom;
ta.remove();render();
});
ta.addEventListener('keydown',e=>e.stopPropagation());
}

canvas.addEventListener('dblclick', e=>{
const w = screenToWorld(e.clientX, e.clientY);
const hit = hitTest(w.x, w.y);
if(hit>=0 && currentBoard().items[hit].type==='sticky'){
editSticky(hit);
} else if(hit>=0 && currentBoard().items[hit].type==='text'){
const item = currentBoard().items[hit];
const sp = worldToScreen(item.x, item.y);
const ta = document.createElement('textarea');
ta.className='text-input-overlay';
ta.style.left=sp.x+'px';
ta.style.top=sp.y+'px';
ta.style.fontSize=(item.fontSize*zoom)+'px';
ta.style.color=item.color;
ta.value=item.text;
wrap.appendChild(ta);
ta.focus();
ta.addEventListener('blur',()=>{
if(ta.value.trim()){pushUndo();item.text=ta.value;render();}
ta.remove();
});
ta.addEventListener('keydown',e2=>{if(e2.key==='Escape')ta.blur();e2.stopPropagation();});
}
});

// ---- TOUCH/PINCH ----
let touches = {};
canvas.addEventListener('touchstart', e=>{
if(e.touches.length===2){
isPanning=true;
const t0=e.touches[0],t1=e.touches[1];
touchDist=Math.hypot(t1.clientX-t0.clientX,t1.clientY-t0.clientY);
panStartX=(t0.clientX+t1.clientX)/2;
panStartY=(t0.clientY+t1.clientY)/2;
panStartPX=panX;panStartPY=panY;
}
},{passive:true});
canvas.addEventListener('touchmove', e=>{
if(e.touches.length===2 && isPanning){
e.preventDefault();
const t0=e.touches[0],t1=e.touches[1];
const nd=Math.hypot(t1.clientX-t0.clientX,t1.clientY-t0.clientY);
const scale=nd/touchDist;
const cx=(t0.clientX+t1.clientX)/2, cy=(t0.clientY+t1.clientY)/2;
const nz=Math.max(0.1,Math.min(10,zoom*scale));
const r=wrap.getBoundingClientRect();
const mx=cx-r.left,my=cy-r.top;
panX=mx-(mx-panX)*(nz/zoom);
panY=my-(my-panY)*(nz/zoom);
// also pan
panX+=cx-panStartX-(cx-panStartX)*0; // simplified
zoom=nz;
touchDist=nd;
panStartX=cx;panStartY=cy;
render();
}
},{passive:false});
canvas.addEventListener('touchend', e=>{
if(e.touches.length<2) isPanning=false;
},{passive:true});

// ---- KEYBOARD ----
document.addEventListener('keydown', e=>{
if(e.target.tagName==='TEXTAREA'||e.target.tagName==='INPUT') return;
if(e.key==='Shift'){shiftHeld=true;}
if(e.key===' '){spaceHeld=true;canvas.style.cursor='grab';e.preventDefault();}
if(e.key==='Delete'||e.key==='Backspace'){
if(selectedItems.length>0){
pushUndo();
selectedItems.sort((a,b)=>b-a).forEach(i=>currentBoard().items.splice(i,1));
selectedItems=[];updateEmptyHint();render();
}
}
if(e.ctrlKey||e.metaKey){
if(e.key==='z'){e.preventDefault();undo();}
if(e.key==='y'||e.key==='Z'){e.preventDefault();redo();}
if(e.key==='a'){
e.preventDefault();
selectedItems=currentBoard().items.map((_,i)=>i);
render();
}
}
// tool shortcuts
const shortcuts={v:'select',d:'draw',l:'line',a:'arrow',r:'rect',e:'ellipse',t:'text',s:'sticky',x:'eraser'};
if(shortcuts[e.key] && !e.ctrlKey && !e.metaKey){
setTool(shortcuts[e.key]);
}
});
document.addEventListener('keyup', e=>{
if(e.key==='Shift'){shiftHeld=false;}
if(e.key===' '){spaceHeld=false;canvas.style.cursor='crosshair';}
});

// ---- TOOL SELECTION ----
function setTool(t){
tool=t;
document.querySelectorAll('.tb-btn[data-tool]').forEach(b=>{
b.classList.toggle('active', b.dataset.tool===t);
});
selectedItems=[];
canvas.style.cursor = t==='select'?'default':t==='eraser'?'cell':'crosshair';
}
document.querySelectorAll('.tb-btn[data-tool]').forEach(b=>{
b.addEventListener('click',()=>setTool(b.dataset.tool));
});

// ---- PANEL CONTROLS ----
document.getElementById('strokeWidth').addEventListener('input', e=>{
strokeWidth=parseInt(e.target.value);
document.getElementById('strokeVal').textContent=strokeWidth;
updateBrushActive();
});
document.getElementById('fontSize').addEventListener('input', e=>{
fontSize=parseInt(e.target.value);
document.getElementById('fontSizeVal').textContent=fontSize;
});
document.getElementById('gridSize').addEventListener('input', e=>{
gridSize=parseInt(e.target.value);
document.getElementById('gridVal').textContent=gridSize;
render();
});
document.getElementById('snapGrid').addEventListener('change', e=>{
snapGrid=e.target.checked;render();
});
document.getElementById('customColor').addEventListener('change', e=>{
if(/^#[0-9a-fA-F]{3,6}$/.test(e.target.value)){strokeColor=e.target.value;updateSwatchActive('stroke');}
});
document.getElementById('customFill').addEventListener('change', e=>{
const v=e.target.value.trim();
if(v==='none'||/^#[0-9a-fA-F]{3,6}$/.test(v)){fillColor=v;updateSwatchActive('fill');}
});

// ---- BUTTONS ----
document.getElementById('undoBtn').onclick=undo;
document.getElementById('redoBtn').onclick=redo;

document.getElementById('saveBtn').onclick=()=>{
saveToStorage();
const btn=document.getElementById('saveBtn');
btn.textContent='Saved!';
setTimeout(()=>btn.textContent='Save',1500);
};

document.getElementById('loadBtn').onclick=()=>{
loadFromStorage();
if(boards.length===0) boards.push({name:'Board 1',items:[]});
activeBoardIdx=Math.min(activeBoardIdx,boards.length-1);
undoStack=[];redoStack=[];pushUndo();
renderBoardTabs();render();
};

document.getElementById('clearBtn').onclick=()=>{
if(confirm('Clear the entire board? This cannot be undone.')){
pushUndo();
currentBoard().items=[];
selectedItems=[];updateEmptyHint();render();
}
};

document.getElementById('exportBtn').onclick=()=>{
const items=currentBoard().items;
if(items.length===0){window.alert('Nothing to export.');return;}
// find bounds
let mx=Infinity,my=Infinity,Mx=-Infinity,My=-Infinity;
items.forEach(it=>{const bb=getBounds(it);mx=Math.min(mx,bb.x);my=Math.min(my,bb.y);Mx=Math.max(Mx,bb.x+bb.w);My=Math.max(My,bb.y+bb.h);});
const pad=40;mx-=pad;my-=pad;Mx+=pad;My+=pad;
const ew=Mx-mx, eh=My-my;
const ec=document.createElement('canvas');ec.width=ew;ec.height=eh;
const ectx=ec.getContext('2d');
ectx.fillStyle='#ffffff';ectx.fillRect(0,0,ew,eh);
ectx.translate(-mx,-my);
items.forEach(it=>drawItem(ectx,it,false));
// watermark
ectx.translate(mx,my);
ectx.fillStyle='rgba(0,160,200,0.35)';
ectx.font='11px JetBrains Mono, monospace';
ectx.fillText('Korb Engineering',ew-140,eh-12);
const link=document.createElement('a');
link.download='whiteboard-export.png';
link.href=ec.toDataURL('image/png');
link.click();
};

// ---- MOBILE PANEL TOGGLE ----
const panelToggle = document.getElementById('panelToggle');
const sidepanel = document.getElementById('sidepanel');
panelToggle.addEventListener('click', ()=>{
sidepanel.classList.toggle('open');
});
// Close panel when tapping canvas on mobile
wrap.addEventListener('pointerdown', ()=>{
if(window.innerWidth<=768) sidepanel.classList.remove('open');
},{capture:true});

// ---- INIT ----
init();
})();
</script>
</body>
</html>
