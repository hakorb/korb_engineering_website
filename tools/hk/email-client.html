<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Email Client | Korb Engineering</title>
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{--bg:#050a0f;--surface:#0a1018;--border:#1a2535;--cyan:#00d4ff;--orange:#ff6600;--green:#10b981;--red:#ef4444;--text:#e2e8f0;--dim:#64748b}
html{font-size:16px}
body{font-family:'JetBrains Mono',monospace;background:var(--bg);color:var(--text);min-height:100vh;touch-action:manipulation;-webkit-tap-highlight-color:transparent;overflow-x:hidden}
input,textarea,select,button{font-family:inherit;font-size:inherit}

header{background:var(--surface);border-bottom:1px solid var(--cyan);padding:12px 16px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:100}
.logo{font-size:.65rem;color:var(--cyan);letter-spacing:2px;text-transform:uppercase;opacity:.7}
header h1{font-size:1rem;font-weight:600;color:var(--text);text-align:center}
.header-actions{display:flex;gap:8px}

.tabs{display:flex;background:var(--surface);border-bottom:1px solid var(--border);overflow-x:auto;position:sticky;top:49px;z-index:99}
.tab{flex:1;min-width:0;padding:14px 8px;text-align:center;font-size:.65rem;font-weight:500;color:var(--dim);border:none;background:none;cursor:pointer;letter-spacing:1px;text-transform:uppercase;min-height:44px;display:flex;align-items:center;justify-content:center;touch-action:manipulation;position:relative;white-space:nowrap}
.tab:active{background:rgba(0,212,255,.1)}
.tab.active{color:var(--cyan)}
.tab.active::after{content:'';position:absolute;bottom:0;left:0;right:0;height:2px;background:var(--cyan)}
.tab .badge{background:var(--orange);color:#000;font-size:.55rem;font-weight:700;border-radius:50%;width:18px;height:18px;display:inline-flex;align-items:center;justify-content:center;margin-left:4px}

.panel{display:none;padding:16px;max-width:800px;margin:0 auto;padding-bottom:80px}
.panel.active{display:block}

label{display:block;font-size:.7rem;color:var(--cyan);letter-spacing:1px;text-transform:uppercase;margin-bottom:6px;margin-top:16px}
label:first-child{margin-top:0}
input[type="text"],input[type="email"],textarea,select{width:100%;background:var(--surface);border:1px solid var(--border);color:var(--text);padding:12px;border-radius:4px;font-size:16px;min-height:44px}
textarea{min-height:120px;resize:vertical;line-height:1.5}
input:focus,textarea:focus,select:focus{outline:none;border-color:var(--cyan);box-shadow:0 0 0 1px var(--cyan)}

.btn{display:inline-flex;align-items:center;justify-content:center;gap:8px;padding:14px 20px;border:none;border-radius:4px;font-size:.8rem;font-weight:600;cursor:pointer;min-height:44px;letter-spacing:1px;text-transform:uppercase;touch-action:manipulation;transition:all .15s}
.btn:active{transform:scale(.97);filter:brightness(.85)}
.btn-primary{background:var(--cyan);color:#000}
.btn-orange{background:var(--orange);color:#000}
.btn-green{background:var(--green);color:#000}
.btn-red{background:var(--red);color:#fff}
.btn-ghost{background:transparent;border:1px solid var(--border);color:var(--text)}
.btn-ghost:hover{border-color:var(--cyan);color:var(--cyan)}
.btn-full{width:100%;margin-top:16px}
.btn-sm{padding:8px 14px;font-size:.7rem;min-height:36px}

.btn-row{display:flex;gap:8px;margin-top:16px;flex-wrap:wrap}
.btn-row .btn{flex:1;min-width:120px}

.card{background:var(--surface);border:1px solid var(--border);border-radius:6px;padding:14px;margin-top:12px}
.card-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:8px}
.card-title{font-size:.8rem;font-weight:600;color:var(--text)}
.card-meta{font-size:.65rem;color:var(--dim)}
.card-body{font-size:.75rem;color:var(--dim);line-height:1.5}
.card-actions{display:flex;gap:6px;margin-top:10px}

.empty-state{text-align:center;padding:40px 20px;color:var(--dim);font-size:.8rem}
.empty-state svg{width:48px;height:48px;stroke:var(--border);margin-bottom:12px}

.sig-preview{background:var(--surface);border:1px solid var(--border);border-radius:6px;padding:16px;margin-top:12px;font-size:.75rem;line-height:1.6}
.sig-name{font-weight:700;color:var(--cyan);font-size:.85rem}
.sig-title{color:var(--orange)}
.sig-divider{border:none;border-top:1px solid var(--border);margin:8px 0}
.sig-link{color:var(--cyan);text-decoration:none}

.template-grid{display:grid;gap:10px;margin-top:12px}
.template-card{background:var(--surface);border:1px solid var(--border);border-radius:6px;padding:14px;cursor:pointer;touch-action:manipulation;transition:all .15s}
.template-card:active{transform:scale(.98)}
.template-card:hover{border-color:var(--cyan)}
.template-card h3{font-size:.75rem;font-weight:600;color:var(--cyan);margin-bottom:6px}
.template-card p{font-size:.65rem;color:var(--dim);line-height:1.4;white-space:pre-line;max-height:60px;overflow:hidden}

.contact-row{display:flex;align-items:center;gap:12px;padding:12px;background:var(--surface);border:1px solid var(--border);border-radius:6px;margin-top:8px;min-height:44px}
.contact-row .name{font-size:.8rem;font-weight:600;color:var(--text);flex:1}
.contact-row .email{font-size:.7rem;color:var(--cyan);flex:1}
.contact-row .actions{display:flex;gap:6px}
.contact-avatar{width:32px;height:32px;border-radius:50%;background:var(--border);display:flex;align-items:center;justify-content:center;font-size:.65rem;font-weight:700;color:var(--cyan);flex-shrink:0}

.cc-toggle{display:flex;gap:8px;margin-top:8px}
.cc-toggle button{font-size:.65rem;color:var(--dim);background:none;border:none;cursor:pointer;text-decoration:underline;padding:4px}
.cc-toggle button:hover{color:var(--cyan)}

.cc-fields{display:none}
.cc-fields.show{display:block}

.toast{position:fixed;bottom:20px;left:50%;transform:translateX(-50%);background:var(--green);color:#000;padding:12px 24px;border-radius:6px;font-size:.75rem;font-weight:600;z-index:200;opacity:0;transition:opacity .3s;pointer-events:none}
.toast.show{opacity:1}
.toast.error{background:var(--red);color:#fff}

@media(min-width:600px){
  .template-grid{grid-template-columns:1fr 1fr}
  .contact-row .email{display:block}
}
@media(max-width:599px){
  .contact-row{flex-wrap:wrap}
  .contact-row .email{font-size:.6rem;width:100%;order:3}
}
</style>
</head>
<body>

<header>
  <span class="logo">Korb Eng</span>
  <h1>Email Client</h1>
  <span class="logo" style="opacity:0">pad</span>
</header>

<div class="tabs">
  <button class="tab active" data-tab="compose">Compose</button>
  <button class="tab" data-tab="drafts">Drafts <span class="badge" id="drafts-badge" style="display:none">0</span></button>
  <button class="tab" data-tab="templates">Templates</button>
  <button class="tab" data-tab="contacts">Contacts</button>
  <button class="tab" data-tab="signature">Signature</button>
</div>

<!-- COMPOSE -->
<div class="panel active" id="panel-compose">
  <label>From</label>
  <input type="text" id="from-field" value="harrison@korb.engineering" readonly style="color:var(--cyan);opacity:.7">

  <label>To</label>
  <div style="position:relative">
    <input type="email" id="to-field" placeholder="recipient@example.com" autocomplete="off">
    <div id="to-suggestions" style="display:none;position:absolute;top:100%;left:0;right:0;background:var(--surface);border:1px solid var(--border);border-top:none;border-radius:0 0 4px 4px;z-index:50;max-height:200px;overflow-y:auto"></div>
  </div>

  <div class="cc-toggle">
    <button onclick="toggleCC()">+ CC</button>
    <button onclick="toggleBCC()">+ BCC</button>
  </div>

  <div class="cc-fields" id="cc-section">
    <label>CC</label>
    <input type="email" id="cc-field" placeholder="cc@example.com">
  </div>

  <div class="cc-fields" id="bcc-section">
    <label>BCC</label>
    <input type="email" id="bcc-field" placeholder="bcc@example.com">
  </div>

  <label>Subject</label>
  <input type="text" id="subject-field" placeholder="Subject line">

  <label>Body</label>
  <textarea id="body-field" placeholder="Write your message..." rows="8"></textarea>

  <div class="sig-preview" id="compose-sig">
    <div class="sig-name">Harrison Korb</div>
    <div class="sig-title">Korb Engineering</div>
    <hr class="sig-divider">
    <div style="color:var(--dim)">harrison@korb.engineering</div>
  </div>

  <div class="btn-row">
    <button class="btn btn-primary" onclick="sendEmail()">Send</button>
    <button class="btn btn-orange" onclick="saveDraft()">Save Draft</button>
    <button class="btn btn-ghost" onclick="clearCompose()">Clear</button>
  </div>
</div>

<!-- DRAFTS -->
<div class="panel" id="panel-drafts">
  <div id="drafts-list"></div>
</div>

<!-- TEMPLATES -->
<div class="panel" id="panel-templates">
  <p style="font-size:.7rem;color:var(--dim);margin-bottom:4px">Tap a template to load it into the compose form.</p>
  <div class="template-grid" id="template-grid"></div>

  <h2 style="font-size:.8rem;color:var(--cyan);margin-top:32px;letter-spacing:1px;text-transform:uppercase">Custom Templates</h2>
  <div class="template-grid" id="custom-template-grid"></div>

  <button class="btn btn-ghost btn-full" onclick="showAddTemplate()">+ Add Custom Template</button>

  <div id="add-template-form" style="display:none">
    <label>Template Name</label>
    <input type="text" id="tpl-name" placeholder="e.g. Site Visit Follow-Up">
    <label>Subject</label>
    <input type="text" id="tpl-subject" placeholder="Subject line">
    <label>Body</label>
    <textarea id="tpl-body" placeholder="Template body text..." rows="5"></textarea>
    <div class="btn-row">
      <button class="btn btn-green btn-sm" onclick="saveCustomTemplate()">Save Template</button>
      <button class="btn btn-ghost btn-sm" onclick="hideAddTemplate()">Cancel</button>
    </div>
  </div>
</div>

<!-- CONTACTS -->
<div class="panel" id="panel-contacts">
  <div id="contacts-list"></div>

  <button class="btn btn-ghost btn-full" onclick="showAddContact()">+ Add Contact</button>

  <div id="add-contact-form" style="display:none;margin-top:16px">
    <label>Name</label>
    <input type="text" id="contact-name" placeholder="Full name">
    <label>Email</label>
    <input type="email" id="contact-email" placeholder="email@example.com">
    <label>Company / Notes</label>
    <input type="text" id="contact-company" placeholder="Company or notes (optional)">
    <div class="btn-row">
      <button class="btn btn-green btn-sm" onclick="saveContact()">Save Contact</button>
      <button class="btn btn-ghost btn-sm" onclick="hideAddContact()">Cancel</button>
    </div>
  </div>
</div>

<!-- SIGNATURE -->
<div class="panel" id="panel-signature">
  <p style="font-size:.7rem;color:var(--dim);margin-bottom:8px">Customize your email signature preview. Changes are saved automatically.</p>

  <label>Full Name</label>
  <input type="text" id="sig-name" value="Harrison Korb">
  <label>Title / Role</label>
  <input type="text" id="sig-title" value="Korb Engineering">
  <label>Email</label>
  <input type="email" id="sig-email" value="harrison@korb.engineering">
  <label>Phone</label>
  <input type="text" id="sig-phone" placeholder="+1 (555) 000-0000">
  <label>Website</label>
  <input type="text" id="sig-website" value="korb.engineering">

  <h2 style="font-size:.8rem;color:var(--cyan);margin-top:24px;letter-spacing:1px;text-transform:uppercase">Preview</h2>
  <div class="sig-preview" id="sig-preview-box"></div>

  <button class="btn btn-green btn-full" onclick="copySignature()">Copy Signature Text</button>
</div>

<div class="toast" id="toast"></div>

<script>
// ── State ──
const LS_DRAFTS = 'hk_email_drafts';
const LS_CONTACTS = 'hk_email_contacts';
const LS_TEMPLATES = 'hk_email_custom_templates';
const LS_SIGNATURE = 'hk_email_signature';

function loadJSON(key, fallback) {
  try { return JSON.parse(localStorage.getItem(key)) || fallback; }
  catch { return fallback; }
}
function saveJSON(key, val) { localStorage.setItem(key, JSON.stringify(val)); }

let drafts = loadJSON(LS_DRAFTS, []);
let contacts = loadJSON(LS_CONTACTS, [
  { name: 'Monte Alan Korb', email: 'alan@korb.engineering', company: 'Korb Engineering FL' },
  { name: 'Andy Korb', email: 'andy@korb.engineering', company: 'Korb Engineering FL Inc.' }
]);
let customTemplates = loadJSON(LS_TEMPLATES, []);
let signature = loadJSON(LS_SIGNATURE, {
  name: 'Harrison Korb',
  title: 'Korb Engineering',
  email: 'harrison@korb.engineering',
  phone: '',
  website: 'korb.engineering'
});

// ── Built-in templates ──
const builtinTemplates = [
  {
    name: 'Acknowledgment',
    subject: 'RE: {{subject}}',
    body: 'Thank you for your email. I have received the information and will review it shortly.\n\nI will follow up with any questions or comments by end of business.\n\nBest regards,\nHarrison'
  },
  {
    name: 'Meeting Follow-Up',
    subject: 'Follow-Up: {{meeting topic}}',
    body: 'Thank you for taking the time to meet today. Below is a summary of the key items discussed:\n\n1. \n2. \n3. \n\nAction items:\n- \n\nPlease let me know if I missed anything or if you have additional comments.\n\nBest regards,\nHarrison'
  },
  {
    name: 'Document Transmittal',
    subject: 'Document Transmittal: {{project}}',
    body: 'Please find the following documents attached for your review:\n\n- Document: \n- Revision: \n- Date: \n\nPlease review and provide comments by {{date}}. If no comments are received by that date, we will proceed accordingly.\n\nBest regards,\nHarrison'
  },
  {
    name: 'RFI Response',
    subject: 'RE: RFI #{{number}} - {{project}}',
    body: 'In response to your RFI, please see the following:\n\nQuestion:\n{{original question}}\n\nResponse:\n\n\nPlease let me know if you need any additional clarification.\n\nBest regards,\nHarrison'
  },
  {
    name: 'Scheduling Request',
    subject: 'Meeting Request: {{topic}}',
    body: 'I would like to schedule a meeting to discuss {{topic}}.\n\nI am available at the following times:\n- \n- \n- \n\nPlease let me know which time works best, or suggest an alternative.\n\nBest regards,\nHarrison'
  },
  {
    name: 'Site Visit Summary',
    subject: 'Site Visit Summary - {{project}} - {{date}}',
    body: 'Below is a summary of today\'s site visit:\n\nProject: {{project}}\nDate: {{date}}\nWeather: \nPersonnel Present:\n- \n\nObservations:\n1. \n2. \n3. \n\nAction Items:\n- \n\nPhotos are attached for reference.\n\nBest regards,\nHarrison'
  }
];

// ── Tab Navigation ──
document.querySelectorAll('.tab').forEach(t => {
  t.addEventListener('click', () => {
    document.querySelectorAll('.tab').forEach(x => x.classList.remove('active'));
    document.querySelectorAll('.panel').forEach(x => x.classList.remove('active'));
    t.classList.add('active');
    document.getElementById('panel-' + t.dataset.tab).classList.add('active');
  });
});

// ── Toast ──
function toast(msg, isError) {
  const el = document.getElementById('toast');
  el.textContent = msg;
  el.className = 'toast show' + (isError ? ' error' : '');
  setTimeout(() => el.className = 'toast', 2500);
}

// ── Compose ──
function toggleCC() {
  document.getElementById('cc-section').classList.toggle('show');
}
function toggleBCC() {
  document.getElementById('bcc-section').classList.toggle('show');
}

function sendEmail() {
  const to = document.getElementById('to-field').value.trim();
  const cc = document.getElementById('cc-field').value.trim();
  const bcc = document.getElementById('bcc-field').value.trim();
  const subject = document.getElementById('subject-field').value.trim();
  const body = document.getElementById('body-field').value.trim();

  if (!to) { toast('Please enter a recipient', true); return; }

  const sigText = buildSignatureText();
  const fullBody = body + '\n\n--\n' + sigText;

  let mailto = 'mailto:' + encodeURIComponent(to) + '?';
  const params = [];
  if (cc) params.push('cc=' + encodeURIComponent(cc));
  if (bcc) params.push('bcc=' + encodeURIComponent(bcc));
  if (subject) params.push('subject=' + encodeURIComponent(subject));
  params.push('body=' + encodeURIComponent(fullBody));
  mailto += params.join('&');

  window.location.href = mailto;
  toast('Opening email client...');
}

function clearCompose() {
  document.getElementById('to-field').value = '';
  document.getElementById('cc-field').value = '';
  document.getElementById('bcc-field').value = '';
  document.getElementById('subject-field').value = '';
  document.getElementById('body-field').value = '';
  document.getElementById('cc-section').classList.remove('show');
  document.getElementById('bcc-section').classList.remove('show');
  toast('Form cleared');
}

function loadToCompose(data) {
  if (data.to) document.getElementById('to-field').value = data.to;
  if (data.cc) {
    document.getElementById('cc-field').value = data.cc;
    document.getElementById('cc-section').classList.add('show');
  }
  if (data.subject) document.getElementById('subject-field').value = data.subject;
  if (data.body) document.getElementById('body-field').value = data.body;

  // Switch to compose tab
  document.querySelectorAll('.tab').forEach(x => x.classList.remove('active'));
  document.querySelectorAll('.panel').forEach(x => x.classList.remove('active'));
  document.querySelector('[data-tab="compose"]').classList.add('active');
  document.getElementById('panel-compose').classList.add('active');
}

// ── Drafts ──
function saveDraft() {
  const draft = {
    id: Date.now(),
    to: document.getElementById('to-field').value.trim(),
    cc: document.getElementById('cc-field').value.trim(),
    bcc: document.getElementById('bcc-field').value.trim(),
    subject: document.getElementById('subject-field').value.trim(),
    body: document.getElementById('body-field').value.trim(),
    date: new Date().toISOString()
  };
  if (!draft.subject && !draft.body && !draft.to) {
    toast('Nothing to save', true);
    return;
  }
  drafts.unshift(draft);
  saveJSON(LS_DRAFTS, drafts);
  renderDrafts();
  toast('Draft saved');
}

function deleteDraft(id) {
  drafts = drafts.filter(d => d.id !== id);
  saveJSON(LS_DRAFTS, drafts);
  renderDrafts();
  toast('Draft deleted');
}

function loadDraft(id) {
  const d = drafts.find(x => x.id === id);
  if (!d) return;
  loadToCompose(d);
  toast('Draft loaded');
}

function renderDrafts() {
  const el = document.getElementById('drafts-list');
  const badge = document.getElementById('drafts-badge');

  if (drafts.length === 0) {
    el.innerHTML = '<div class="empty-state"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M21 8V21H3V8"/><path d="M23 3H1v5h22V3z"/><path d="M10 12h4"/></svg><div>No drafts saved</div></div>';
    badge.style.display = 'none';
    return;
  }

  badge.textContent = drafts.length;
  badge.style.display = 'inline-flex';

  el.innerHTML = drafts.map(d => {
    const date = new Date(d.date).toLocaleDateString('en-US', { month:'short', day:'numeric', hour:'2-digit', minute:'2-digit' });
    const subj = d.subject || '(no subject)';
    const preview = (d.body || '').substring(0, 80) + ((d.body||'').length > 80 ? '...' : '');
    return `<div class="card">
      <div class="card-header">
        <span class="card-title">${esc(subj)}</span>
        <span class="card-meta">${date}</span>
      </div>
      ${d.to ? `<div class="card-meta">To: ${esc(d.to)}</div>` : ''}
      <div class="card-body" style="margin-top:6px">${esc(preview)}</div>
      <div class="card-actions">
        <button class="btn btn-sm btn-primary" onclick="loadDraft(${d.id})">Edit</button>
        <button class="btn btn-sm btn-red" onclick="deleteDraft(${d.id})">Delete</button>
      </div>
    </div>`;
  }).join('');
}

// ── Templates ──
function renderTemplates() {
  const grid = document.getElementById('template-grid');
  grid.innerHTML = builtinTemplates.map((t, i) => `
    <div class="template-card" onclick="applyTemplate('builtin',${i})">
      <h3>${esc(t.name)}</h3>
      <p>${esc(t.body)}</p>
    </div>
  `).join('');

  const customGrid = document.getElementById('custom-template-grid');
  if (customTemplates.length === 0) {
    customGrid.innerHTML = '<div class="empty-state" style="padding:16px">No custom templates yet</div>';
    return;
  }
  customGrid.innerHTML = customTemplates.map((t, i) => `
    <div class="template-card" onclick="applyTemplate('custom',${i})">
      <h3>${esc(t.name)}</h3>
      <p>${esc(t.body)}</p>
      <div class="card-actions" style="margin-top:8px">
        <button class="btn btn-sm btn-red" onclick="event.stopPropagation();deleteCustomTemplate(${i})">Delete</button>
      </div>
    </div>
  `).join('');
}

function applyTemplate(type, idx) {
  const t = type === 'builtin' ? builtinTemplates[idx] : customTemplates[idx];
  loadToCompose({ subject: t.subject, body: t.body });
  toast('Template loaded');
}

function showAddTemplate() { document.getElementById('add-template-form').style.display = 'block'; }
function hideAddTemplate() { document.getElementById('add-template-form').style.display = 'none'; }

function saveCustomTemplate() {
  const name = document.getElementById('tpl-name').value.trim();
  const subject = document.getElementById('tpl-subject').value.trim();
  const body = document.getElementById('tpl-body').value.trim();
  if (!name) { toast('Template name required', true); return; }
  customTemplates.push({ name, subject, body });
  saveJSON(LS_TEMPLATES, customTemplates);
  document.getElementById('tpl-name').value = '';
  document.getElementById('tpl-subject').value = '';
  document.getElementById('tpl-body').value = '';
  hideAddTemplate();
  renderTemplates();
  toast('Template saved');
}

function deleteCustomTemplate(idx) {
  customTemplates.splice(idx, 1);
  saveJSON(LS_TEMPLATES, customTemplates);
  renderTemplates();
  toast('Template deleted');
}

// ── Contacts ──
function renderContacts() {
  const el = document.getElementById('contacts-list');
  if (contacts.length === 0) {
    el.innerHTML = '<div class="empty-state"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><circle cx="12" cy="8" r="4"/><path d="M5 21v-2a7 7 0 0114 0v2"/></svg><div>No contacts saved</div></div>';
    return;
  }
  el.innerHTML = contacts.map((c, i) => {
    const initials = c.name.split(' ').map(w => w[0]).join('').substring(0, 2).toUpperCase();
    return `<div class="contact-row">
      <div class="contact-avatar">${initials}</div>
      <div class="name">${esc(c.name)}${c.company ? '<br><span style="font-size:.6rem;color:var(--dim)">' + esc(c.company) + '</span>' : ''}</div>
      <div class="email">${esc(c.email)}</div>
      <div class="actions">
        <button class="btn btn-sm btn-primary" onclick="useContact(${i})">Use</button>
        <button class="btn btn-sm btn-red" onclick="deleteContact(${i})">X</button>
      </div>
    </div>`;
  }).join('');
}

function useContact(idx) {
  const c = contacts[idx];
  loadToCompose({ to: c.email });
  toast('Contact loaded to To field');
}

function deleteContact(idx) {
  contacts.splice(idx, 1);
  saveJSON(LS_CONTACTS, contacts);
  renderContacts();
  toast('Contact deleted');
}

function showAddContact() { document.getElementById('add-contact-form').style.display = 'block'; }
function hideAddContact() { document.getElementById('add-contact-form').style.display = 'none'; }

function saveContact() {
  const name = document.getElementById('contact-name').value.trim();
  const email = document.getElementById('contact-email').value.trim();
  const company = document.getElementById('contact-company').value.trim();
  if (!name || !email) { toast('Name and email required', true); return; }
  contacts.push({ name, email, company });
  saveJSON(LS_CONTACTS, contacts);
  document.getElementById('contact-name').value = '';
  document.getElementById('contact-email').value = '';
  document.getElementById('contact-company').value = '';
  hideAddContact();
  renderContacts();
  toast('Contact saved');
}

// ── Contact autocomplete on To field ──
const toField = document.getElementById('to-field');
const toSuggestions = document.getElementById('to-suggestions');

toField.addEventListener('input', () => {
  const val = toField.value.trim().toLowerCase();
  if (val.length < 1) { toSuggestions.style.display = 'none'; return; }
  const matches = contacts.filter(c =>
    c.name.toLowerCase().includes(val) || c.email.toLowerCase().includes(val)
  );
  if (matches.length === 0) { toSuggestions.style.display = 'none'; return; }
  toSuggestions.style.display = 'block';
  toSuggestions.innerHTML = matches.map(c =>
    `<div style="padding:10px 12px;cursor:pointer;font-size:.75rem;border-bottom:1px solid var(--border);min-height:44px;display:flex;align-items:center;gap:8px" onclick="pickContact('${esc(c.email)}')">
      <span style="color:var(--text)">${esc(c.name)}</span>
      <span style="color:var(--dim)">&lt;${esc(c.email)}&gt;</span>
    </div>`
  ).join('');
});

toField.addEventListener('blur', () => {
  setTimeout(() => toSuggestions.style.display = 'none', 200);
});

function pickContact(email) {
  toField.value = email;
  toSuggestions.style.display = 'none';
}

// ── Signature ──
function buildSignatureText() {
  const s = signature;
  let text = s.name;
  if (s.title) text += '\n' + s.title;
  text += '\n';
  if (s.email) text += '\n' + s.email;
  if (s.phone) text += '\n' + s.phone;
  if (s.website) text += '\n' + s.website;
  return text;
}

function renderSignaturePreview() {
  const s = signature;
  const el = document.getElementById('sig-preview-box');
  el.innerHTML = `
    <div class="sig-name">${esc(s.name)}</div>
    ${s.title ? '<div class="sig-title">' + esc(s.title) + '</div>' : ''}
    <hr class="sig-divider">
    ${s.email ? '<div><a class="sig-link" href="mailto:' + esc(s.email) + '">' + esc(s.email) + '</a></div>' : ''}
    ${s.phone ? '<div style="color:var(--dim)">' + esc(s.phone) + '</div>' : ''}
    ${s.website ? '<div><a class="sig-link" href="https://' + esc(s.website) + '" target="_blank">' + esc(s.website) + '</a></div>' : ''}
  `;

  // Update compose sig too
  const composeSig = document.getElementById('compose-sig');
  composeSig.innerHTML = el.innerHTML;
}

function updateSignatureFromFields() {
  signature.name = document.getElementById('sig-name').value.trim();
  signature.title = document.getElementById('sig-title').value.trim();
  signature.email = document.getElementById('sig-email').value.trim();
  signature.phone = document.getElementById('sig-phone').value.trim();
  signature.website = document.getElementById('sig-website').value.trim();
  saveJSON(LS_SIGNATURE, signature);
  renderSignaturePreview();
}

// Auto-save signature on input
['sig-name','sig-title','sig-email','sig-phone','sig-website'].forEach(id => {
  const el = document.getElementById(id);
  el.value = signature[id.replace('sig-','')] || el.value;
  el.addEventListener('input', updateSignatureFromFields);
});

function copySignature() {
  const text = buildSignatureText();
  navigator.clipboard.writeText(text).then(() => toast('Signature copied')).catch(() => toast('Copy failed', true));
}

// ── Utility ──
function esc(s) {
  const d = document.createElement('div');
  d.textContent = s || '';
  return d.innerHTML;
}

// ── Init ──
renderDrafts();
renderTemplates();
renderContacts();
renderSignaturePreview();
</script>
</body>
</html>
