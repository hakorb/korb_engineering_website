<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="description" content="Family Coordination | Korb Engineering — a free, browser-based Korb family tool from Korb Engineering. No signup, no downloads, works on mobile.">
<title>Family Coordination | Korb Engineering</title>
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{--bg:#050a0f;--bg2:#0a1520;--bg3:#0f1f2e;--bg4:#142838;--cyan:#00d4ff;--orange:#ff6600;--red:#ff3355;--green:#00ff88;--yellow:#ffcc00;--text:#c8d8e8;--text-dim:#6a7a8a;--border:#1a2a3a;--font:'JetBrains Mono',monospace}
html{font-size:14px}
body{background:var(--bg);color:var(--text);font-family:var(--font);min-height:100vh;overflow-x:hidden}
::selection{background:var(--cyan);color:var(--bg)}
::-webkit-scrollbar{width:6px;height:6px}
::-webkit-scrollbar-track{background:var(--bg2)}
::-webkit-scrollbar-thumb{background:var(--border);border-radius:3px}
::-webkit-scrollbar-thumb:hover{background:var(--cyan)}

/* Header */
.header{background:var(--bg2);border-bottom:1px solid var(--border);padding:12px 20px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:100}
.header h1{font-size:1.1rem;font-weight:600;color:var(--cyan);letter-spacing:1px}
.header h1 span{color:var(--orange)}
.header-right{display:flex;gap:8px;align-items:center}
.clock{color:var(--text-dim);font-size:0.75rem}

/* Navigation */
.nav{display:flex;gap:2px;background:var(--bg2);padding:6px 12px;border-bottom:1px solid var(--border);overflow-x:auto;flex-wrap:nowrap}
.nav-btn{background:none;border:1px solid transparent;color:var(--text-dim);font-family:var(--font);font-size:0.72rem;padding:8px 14px;cursor:pointer;border-radius:4px;white-space:nowrap;transition:all .2s}
.nav-btn:hover{color:var(--cyan);border-color:var(--border)}
.nav-btn.active{color:var(--cyan);background:var(--bg3);border-color:var(--cyan)}
.nav-btn .nav-icon{margin-right:4px}

/* Main content */
.main{padding:16px;max-width:1400px;margin:0 auto}
.section{display:none}
.section.active{display:block}
.section-title{font-size:1rem;color:var(--cyan);margin-bottom:16px;display:flex;align-items:center;justify-content:space-between}

/* Cards */
.card{background:var(--bg2);border:1px solid var(--border);border-radius:6px;padding:16px;margin-bottom:12px}
.card-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:10px}
.card-title{font-size:0.85rem;font-weight:600;color:var(--text)}

/* Buttons */
.btn{font-family:var(--font);font-size:0.72rem;padding:6px 14px;border:1px solid var(--border);border-radius:4px;cursor:pointer;transition:all .2s;background:var(--bg3);color:var(--text)}
.btn:hover{border-color:var(--cyan);color:var(--cyan)}
.btn-primary{background:rgba(0,212,255,.1);border-color:var(--cyan);color:var(--cyan)}
.btn-primary:hover{background:rgba(0,212,255,.2)}
.btn-danger{border-color:var(--red);color:var(--red)}
.btn-danger:hover{background:rgba(255,51,85,.1)}
.btn-sm{padding:4px 8px;font-size:0.68rem}
.btn-icon{background:none;border:none;color:var(--text-dim);cursor:pointer;font-size:1rem;padding:2px 6px}
.btn-icon:hover{color:var(--cyan)}

/* Forms */
input,select,textarea{font-family:var(--font);font-size:0.78rem;padding:8px 10px;background:var(--bg);border:1px solid var(--border);border-radius:4px;color:var(--text);width:100%;transition:border-color .2s}
input:focus,select:focus,textarea:focus{outline:none;border-color:var(--cyan)}
textarea{resize:vertical;min-height:60px}
label{font-size:0.72rem;color:var(--text-dim);display:block;margin-bottom:4px}
.form-group{margin-bottom:12px}
.form-row{display:grid;gap:12px}
.form-row-2{grid-template-columns:1fr 1fr}
.form-row-3{grid-template-columns:1fr 1fr 1fr}

/* Modal */
.modal-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.7);z-index:200;align-items:center;justify-content:center;padding:20px}
.modal-overlay.show{display:flex}
.modal{background:var(--bg2);border:1px solid var(--border);border-radius:8px;padding:20px;width:100%;max-width:500px;max-height:85vh;overflow-y:auto}
.modal-title{font-size:0.9rem;color:var(--cyan);margin-bottom:16px;display:flex;justify-content:space-between;align-items:center}
.modal-actions{display:flex;gap:8px;justify-content:flex-end;margin-top:16px}

/* Tags/badges */
.badge{display:inline-block;padding:2px 8px;border-radius:10px;font-size:0.65rem;font-weight:500}
.priority-high{background:rgba(255,51,85,.15);color:var(--red);border:1px solid rgba(255,51,85,.3)}
.priority-medium{background:rgba(255,204,0,.15);color:var(--yellow);border:1px solid rgba(255,204,0,.3)}
.priority-low{background:rgba(0,255,136,.15);color:var(--green);border:1px solid rgba(0,255,136,.3)}
.member-badge{padding:2px 8px;border-radius:10px;font-size:0.65rem;font-weight:500}

/* Grid layouts */
.grid-2{display:grid;grid-template-columns:repeat(auto-fill,minmax(300px,1fr));gap:12px}
.grid-3{display:grid;grid-template-columns:repeat(auto-fill,minmax(250px,1fr));gap:12px}

/* Calendar */
.cal-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:12px}
.cal-nav{display:flex;gap:8px;align-items:center}
.cal-month{font-size:0.9rem;color:var(--cyan);min-width:180px;text-align:center}
.cal-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:2px}
.cal-day-label{text-align:center;font-size:0.65rem;color:var(--text-dim);padding:6px 2px}
.cal-day{background:var(--bg2);border:1px solid var(--border);border-radius:4px;min-height:80px;padding:4px;cursor:pointer;transition:border-color .2s}
.cal-day:hover{border-color:var(--cyan)}
.cal-day.today{border-color:var(--cyan);box-shadow:0 0 6px rgba(0,212,255,.2)}
.cal-day.other-month{opacity:.35}
.cal-day-num{font-size:0.7rem;color:var(--text-dim);margin-bottom:2px}
.cal-event{font-size:0.58rem;padding:1px 4px;margin:1px 0;border-radius:2px;overflow:hidden;white-space:nowrap;text-overflow:ellipsis;cursor:pointer}

/* Task list */
.task-item{display:flex;align-items:center;gap:10px;padding:10px;background:var(--bg2);border:1px solid var(--border);border-radius:4px;margin-bottom:6px}
.task-check{width:18px;height:18px;appearance:none;border:2px solid var(--border);border-radius:3px;cursor:pointer;position:relative;flex-shrink:0;background:var(--bg)}
.task-check:checked{border-color:var(--green);background:rgba(0,255,136,.15)}
.task-check:checked::after{content:'\\2713';position:absolute;top:-2px;left:2px;color:var(--green);font-size:0.75rem}
.task-content{flex:1;min-width:0}
.task-title{font-size:0.78rem}
.task-meta{font-size:0.65rem;color:var(--text-dim);margin-top:2px;display:flex;gap:8px;flex-wrap:wrap}
.task-done .task-title{text-decoration:line-through;color:var(--text-dim)}

/* Shopping list */
.shop-category{margin-bottom:16px}
.shop-category-title{font-size:0.78rem;color:var(--orange);margin-bottom:6px;text-transform:uppercase;letter-spacing:1px}
.shop-item{display:flex;align-items:center;gap:8px;padding:6px 10px;border-bottom:1px solid rgba(26,42,58,.5)}
.shop-item:last-child{border-bottom:none}
.shop-item.checked span{text-decoration:line-through;color:var(--text-dim)}

/* Meal planner */
.meal-grid{display:grid;grid-template-columns:auto repeat(7,1fr);gap:2px;overflow-x:auto}
.meal-label{background:var(--bg3);padding:8px;font-size:0.7rem;color:var(--orange);display:flex;align-items:center;justify-content:center;text-align:center;border-radius:3px}
.meal-day-header{background:var(--bg3);padding:8px;font-size:0.7rem;color:var(--cyan);text-align:center;border-radius:3px}
.meal-cell{background:var(--bg2);border:1px solid var(--border);border-radius:3px;padding:6px;min-height:50px;cursor:pointer;font-size:0.68rem;color:var(--text);transition:border-color .2s}
.meal-cell:hover{border-color:var(--cyan)}
.meal-cell:empty::before{content:'+ Add';color:var(--text-dim);font-size:0.6rem}

/* Notes */
.note-card{background:var(--bg2);border:1px solid var(--border);border-radius:6px;padding:14px;margin-bottom:10px}
.note-card.pinned{border-color:var(--orange)}
.note-pin{color:var(--orange);font-size:0.7rem}
.note-content{font-size:0.78rem;line-height:1.5;margin:8px 0}
.note-meta{font-size:0.65rem;color:var(--text-dim)}

/* Emergency contacts */
.emergency-card{background:var(--bg2);border:1px solid var(--border);border-radius:6px;padding:14px}
.emergency-type{font-size:0.65rem;color:var(--orange);text-transform:uppercase;letter-spacing:1px;margin-bottom:4px}
.emergency-name{font-size:0.85rem;font-weight:600;color:var(--text)}
.emergency-phone{font-size:0.82rem;color:var(--cyan);margin-top:4px}
.emergency-phone a{color:var(--cyan);text-decoration:none}
.emergency-note{font-size:0.7rem;color:var(--text-dim);margin-top:4px}

/* Important dates */
.date-item{display:flex;align-items:center;gap:12px;padding:10px;background:var(--bg2);border:1px solid var(--border);border-radius:4px;margin-bottom:6px}
.date-countdown{min-width:60px;text-align:center}
.date-countdown .days{font-size:1.2rem;font-weight:700;color:var(--cyan)}
.date-countdown .label{font-size:0.6rem;color:var(--text-dim)}
.date-info{flex:1}
.date-info .name{font-size:0.8rem;font-weight:500}
.date-info .detail{font-size:0.68rem;color:var(--text-dim)}

/* Empty state */
.empty-state{text-align:center;padding:40px 20px;color:var(--text-dim)}
.empty-state-icon{font-size:2rem;margin-bottom:10px;opacity:.5}
.empty-state-text{font-size:0.8rem}

/* Korb badge */
.korb-badge{position:fixed;bottom:10px;right:10px;font-size:10px;color:#00d4ff;opacity:0.5;font-family:'JetBrains Mono',monospace;pointer-events:none;z-index:9999}

/* Member colors */
.mc-0{background:rgba(0,212,255,.15);color:#00d4ff;border:1px solid rgba(0,212,255,.3)}
.mc-1{background:rgba(255,102,0,.15);color:#ff6600;border:1px solid rgba(255,102,0,.3)}
.mc-2{background:rgba(0,255,136,.15);color:#00ff88;border:1px solid rgba(0,255,136,.3)}
.mc-3{background:rgba(255,51,85,.15);color:#ff3355;border:1px solid rgba(255,51,85,.3)}
.mc-4{background:rgba(255,204,0,.15);color:#ffcc00;border:1px solid rgba(255,204,0,.3)}
.mc-5{background:rgba(180,100,255,.15);color:#b464ff;border:1px solid rgba(180,100,255,.3)}
.mc-6{background:rgba(255,150,200,.15);color:#ff96c8;border:1px solid rgba(255,150,200,.3)}
.mc-7{background:rgba(100,220,180,.15);color:#64dcb4;border:1px solid rgba(100,220,180,.3)}
.mcolor-0{color:#00d4ff}.mcolor-1{color:#ff6600}.mcolor-2{color:#00ff88}.mcolor-3{color:#ff3355}.mcolor-4{color:#ffcc00}.mcolor-5{color:#b464ff}.mcolor-6{color:#ff96c8}.mcolor-7{color:#64dcb4}
.mbg-0{background:#00d4ff}.mbg-1{background:#ff6600}.mbg-2{background:#00ff88}.mbg-3{background:#ff3355}.mbg-4{background:#ffcc00}.mbg-5{background:#b464ff}.mbg-6{background:#ff96c8}.mbg-7{background:#64dcb4}

/* Filter bar */
.filter-bar{display:flex;gap:8px;margin-bottom:12px;flex-wrap:wrap;align-items:center}
.filter-bar select,.filter-bar input{width:auto;max-width:200px}
.search-input{max-width:250px!important}

/* Responsive */
@media(max-width:768px){
  html{font-size:13px}
  .nav{padding:4px 8px;gap:1px}
  .nav-btn{padding:6px 8px;font-size:0.68rem}
  .nav-btn .nav-icon{display:none}
  .main{padding:10px}
  .form-row-2,.form-row-3{grid-template-columns:1fr}
  .grid-2,.grid-3{grid-template-columns:1fr}
  .cal-day{min-height:50px}
  .cal-event{font-size:0.5rem}
  .meal-grid{font-size:0.65rem}
  .modal{margin:10px;padding:14px}
  .header h1{font-size:0.9rem}
  .task-meta{flex-direction:column;gap:2px}
}
@media(max-width:480px){
  .cal-day{min-height:36px;padding:2px}
  .cal-day-num{font-size:0.6rem}
  .cal-event{display:none}
  .cal-day.has-events::after{content:'';display:block;width:4px;height:4px;border-radius:50%;background:var(--cyan);margin:2px auto}
}
</style>
</head>
<body>

<div class="header">
  <h1>FAMILY <span>COORDINATION</span></h1>
  <div class="header-right">
    <div class="clock" id="clock"></div>
  </div>
</div>

<nav class="nav" id="nav">
  <button class="nav-btn active" data-tab="members"><span class="nav-icon">&#9823;</span>Members</button>
  <button class="nav-btn" data-tab="calendar"><span class="nav-icon">&#9744;</span>Calendar</button>
  <button class="nav-btn" data-tab="tasks"><span class="nav-icon">&#9745;</span>Tasks</button>
  <button class="nav-btn" data-tab="shopping"><span class="nav-icon">&#9749;</span>Shopping</button>
  <button class="nav-btn" data-tab="dates"><span class="nav-icon">&#9733;</span>Dates</button>
  <button class="nav-btn" data-tab="emergency"><span class="nav-icon">&#9888;</span>Emergency</button>
  <button class="nav-btn" data-tab="notes"><span class="nav-icon">&#9998;</span>Notes</button>
  <button class="nav-btn" data-tab="meals"><span class="nav-icon">&#9832;</span>Meals</button>
</nav>

<div class="main">

  <!-- MEMBERS -->
  <div class="section active" id="sec-members">
    <div class="section-title">
      <span>Family Members</span>
      <button class="btn btn-primary" onclick="openMemberModal()">+ Add Member</button>
    </div>
    <div class="grid-2" id="members-list"></div>
  </div>

  <!-- CALENDAR -->
  <div class="section" id="sec-calendar">
    <div class="section-title">
      <span>Shared Calendar</span>
      <button class="btn btn-primary" onclick="openEventModal()">+ Add Event</button>
    </div>
    <div class="cal-header">
      <div class="cal-nav">
        <button class="btn btn-sm" onclick="changeMonth(-1)">&larr;</button>
        <span class="cal-month" id="cal-month-label"></span>
        <button class="btn btn-sm" onclick="changeMonth(1)">&rarr;</button>
      </div>
      <button class="btn btn-sm" onclick="goToday()">Today</button>
    </div>
    <div class="cal-grid" id="cal-grid"></div>
  </div>

  <!-- TASKS -->
  <div class="section" id="sec-tasks">
    <div class="section-title">
      <span>Task List</span>
      <button class="btn btn-primary" onclick="openTaskModal()">+ Add Task</button>
    </div>
    <div class="filter-bar">
      <select id="task-filter-member" onchange="renderTasks()"><option value="">All Members</option></select>
      <select id="task-filter-priority" onchange="renderTasks()">
        <option value="">All Priorities</option>
        <option value="high">High</option>
        <option value="medium">Medium</option>
        <option value="low">Low</option>
      </select>
      <label style="display:flex;align-items:center;gap:4px;margin:0"><input type="checkbox" id="task-show-done" onchange="renderTasks()"> <span style="font-size:.7rem">Show Done</span></label>
    </div>
    <div id="tasks-list"></div>
  </div>

  <!-- SHOPPING -->
  <div class="section" id="sec-shopping">
    <div class="section-title">
      <span>Shopping List</span>
      <button class="btn btn-primary" onclick="openShopModal()">+ Add Item</button>
    </div>
    <div class="filter-bar">
      <button class="btn btn-sm" onclick="clearCheckedShop()">Clear Checked</button>
    </div>
    <div id="shopping-list"></div>
  </div>

  <!-- IMPORTANT DATES -->
  <div class="section" id="sec-dates">
    <div class="section-title">
      <span>Important Dates</span>
    </div>
    <div id="dates-list"></div>
  </div>

  <!-- EMERGENCY -->
  <div class="section" id="sec-emergency">
    <div class="section-title">
      <span>Emergency Contacts</span>
      <button class="btn btn-primary" onclick="openEmergencyModal()">+ Add Contact</button>
    </div>
    <div class="grid-3" id="emergency-list"></div>
  </div>

  <!-- NOTES -->
  <div class="section" id="sec-notes">
    <div class="section-title">
      <span>Family Bulletin Board</span>
      <button class="btn btn-primary" onclick="openNoteModal()">+ Add Note</button>
    </div>
    <div id="notes-list"></div>
  </div>

  <!-- MEALS -->
  <div class="section" id="sec-meals">
    <div class="section-title">
      <span>Weekly Meal Planner</span>
      <div style="display:flex;gap:8px;align-items:center">
        <button class="btn btn-sm" onclick="changeMealWeek(-1)">&larr;</button>
        <span id="meal-week-label" style="font-size:.78rem;color:var(--text-dim);min-width:160px;text-align:center"></span>
        <button class="btn btn-sm" onclick="changeMealWeek(1)">&rarr;</button>
      </div>
    </div>
    <div class="meal-grid" id="meal-grid"></div>
  </div>
</div>

<!-- MODALS -->
<div class="modal-overlay" id="modal-member">
  <div class="modal">
    <div class="modal-title"><span id="member-modal-title">Add Family Member</span><button class="btn-icon" onclick="closeModal('modal-member')">&times;</button></div>
    <input type="hidden" id="member-edit-id">
    <div class="form-group"><label>Name *</label><input id="m-name" placeholder="Full name"></div>
    <div class="form-row form-row-2">
      <div class="form-group"><label>Role / Relationship</label><input id="m-role" placeholder="e.g. Father, Daughter"></div>
      <div class="form-group"><label>Birthday</label><input type="date" id="m-birthday"></div>
    </div>
    <div class="form-row form-row-2">
      <div class="form-group"><label>Phone</label><input id="m-phone" placeholder="Phone number"></div>
      <div class="form-group"><label>Email</label><input id="m-email" type="email" placeholder="Email address"></div>
    </div>
    <div class="form-group"><label>Notes</label><textarea id="m-notes" placeholder="Additional notes"></textarea></div>
    <div class="modal-actions">
      <button class="btn" onclick="closeModal('modal-member')">Cancel</button>
      <button class="btn btn-primary" onclick="saveMember()">Save</button>
    </div>
  </div>
</div>

<div class="modal-overlay" id="modal-event">
  <div class="modal">
    <div class="modal-title"><span id="event-modal-title">Add Event</span><button class="btn-icon" onclick="closeModal('modal-event')">&times;</button></div>
    <input type="hidden" id="event-edit-id">
    <div class="form-group"><label>Title *</label><input id="e-title" placeholder="Event name"></div>
    <div class="form-row form-row-2">
      <div class="form-group"><label>Date *</label><input type="date" id="e-date"></div>
      <div class="form-group"><label>Time</label><input type="time" id="e-time"></div>
    </div>
    <div class="form-row form-row-2">
      <div class="form-group"><label>End Date</label><input type="date" id="e-enddate"></div>
      <div class="form-group"><label>Member</label><select id="e-member"><option value="">Unassigned</option></select></div>
    </div>
    <div class="form-group"><label>Description</label><textarea id="e-desc" placeholder="Details"></textarea></div>
    <div class="modal-actions">
      <button class="btn btn-danger" id="event-del-btn" style="display:none;margin-right:auto" onclick="deleteEvent()">Delete</button>
      <button class="btn" onclick="closeModal('modal-event')">Cancel</button>
      <button class="btn btn-primary" onclick="saveEvent()">Save</button>
    </div>
  </div>
</div>

<div class="modal-overlay" id="modal-task">
  <div class="modal">
    <div class="modal-title"><span id="task-modal-title">Add Task</span><button class="btn-icon" onclick="closeModal('modal-task')">&times;</button></div>
    <input type="hidden" id="task-edit-id">
    <div class="form-group"><label>Task *</label><input id="t-title" placeholder="Task description"></div>
    <div class="form-row form-row-3">
      <div class="form-group"><label>Assigned To</label><select id="t-member"><option value="">Unassigned</option></select></div>
      <div class="form-group"><label>Due Date</label><input type="date" id="t-due"></div>
      <div class="form-group"><label>Priority</label><select id="t-priority"><option value="low">Low</option><option value="medium" selected>Medium</option><option value="high">High</option></select></div>
    </div>
    <div class="form-group"><label>Notes</label><textarea id="t-notes" placeholder="Additional details"></textarea></div>
    <div class="modal-actions">
      <button class="btn btn-danger" id="task-del-btn" style="display:none;margin-right:auto" onclick="deleteTask()">Delete</button>
      <button class="btn" onclick="closeModal('modal-task')">Cancel</button>
      <button class="btn btn-primary" onclick="saveTask()">Save</button>
    </div>
  </div>
</div>

<div class="modal-overlay" id="modal-shop">
  <div class="modal">
    <div class="modal-title"><span>Add Shopping Item</span><button class="btn-icon" onclick="closeModal('modal-shop')">&times;</button></div>
    <div class="form-group"><label>Item *</label><input id="s-item" placeholder="Item name"></div>
    <div class="form-row form-row-2">
      <div class="form-group"><label>Category</label><select id="s-category">
        <option>Produce</option><option>Dairy</option><option>Meat & Seafood</option><option>Bakery</option>
        <option>Frozen</option><option>Pantry</option><option>Beverages</option><option>Snacks</option>
        <option>Household</option><option>Health & Beauty</option><option>Pet</option><option>Other</option>
      </select></div>
      <div class="form-group"><label>Quantity</label><input id="s-qty" placeholder="e.g. 2 lbs, 1 dozen"></div>
    </div>
    <div class="modal-actions">
      <button class="btn" onclick="closeModal('modal-shop')">Cancel</button>
      <button class="btn btn-primary" onclick="saveShopItem()">Add</button>
    </div>
  </div>

<script>
// ===== DATA LAYER =====
const KEYS = {
  members: 'fc_members',
  events: 'fc_events',
  tasks: 'fc_tasks',
  shopping: 'fc_shopping',
  emergency: 'fc_emergency',
  notes: 'fc_notes',
  meals: 'fc_meals'
};
function load(key) { try { return JSON.parse(localStorage.getItem(key)) || []; } catch { return []; } }
function save(key, data) { localStorage.setItem(key, JSON.stringify(data)); }
function loadObj(key) { try { return JSON.parse(localStorage.getItem(key)) || {}; } catch { return {}; } }
function saveObj(key, data) { localStorage.setItem(key, JSON.stringify(data)); }
function uid() { return Date.now().toString(36) + Math.random().toString(36).slice(2, 8); }

const MEMBER_COLORS = ['#00d4ff','#ff6600','#00ff88','#ff3355','#ffcc00','#b464ff','#ff96c8','#64dcb4'];
function getMemberColor(idx) { return MEMBER_COLORS[idx % MEMBER_COLORS.length]; }
function getMemberIdx(id) { const ms = load(KEYS.members); return ms.findIndex(m => m.id === id); }

// ===== CLOCK =====
function updateClock() {
  const d = new Date();
  document.getElementById('clock').textContent = d.toLocaleDateString('en-US',{weekday:'short',month:'short',day:'numeric'}) + ' ' + d.toLocaleTimeString('en-US',{hour:'2-digit',minute:'2-digit'});
}
setInterval(updateClock, 30000); updateClock();

// ===== NAVIGATION =====
document.querySelectorAll('.nav-btn').forEach(btn => {
  btn.addEventListener('click', () => {
    document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
    document.querySelectorAll('.section').forEach(s => s.classList.remove('active'));
    btn.classList.add('active');
    document.getElementById('sec-' + btn.dataset.tab).classList.add('active');
    if (btn.dataset.tab === 'calendar') renderCalendar();
    if (btn.dataset.tab === 'dates') renderDates();
    if (btn.dataset.tab === 'meals') renderMeals();
  });
});

// ===== MODAL HELPERS =====
function closeModal(id) { document.getElementById(id).classList.remove('show'); }
function openModal(id) { document.getElementById(id).classList.add('show'); }

// close on overlay click
document.querySelectorAll('.modal-overlay').forEach(ov => {
  ov.addEventListener('click', e => { if (e.target === ov) ov.classList.remove('show'); });
});

// ===== MEMBERS =====
function populateMemberSelects() {
  const ms = load(KEYS.members);
  ['e-member','t-member','n-author','task-filter-member'].forEach(id => {
    const sel = document.getElementById(id);
    if (!sel) return;
    const val = sel.value;
    const first = sel.options[0].outerHTML;
    sel.innerHTML = first;
    ms.forEach((m,i) => {
      const opt = document.createElement('option');
      opt.value = m.id;
      opt.textContent = m.name;
      sel.appendChild(opt);
    });
    sel.value = val;
  });
}

function renderMembers() {
  const ms = load(KEYS.members);
  const el = document.getElementById('members-list');
  if (!ms.length) { el.innerHTML = '<div class="empty-state"><div class="empty-state-icon">&#9823;</div><div class="empty-state-text">No family members yet. Add your first member to get started.</div></div>'; return; }
  el.innerHTML = ms.map((m, i) => {
    const c = getMemberColor(i);
    return `<div class="card">
      <div class="card-header">
        <div style="display:flex;align-items:center;gap:8px">
          <div style="width:32px;height:32px;border-radius:50%;background:${c}20;border:2px solid ${c};display:flex;align-items:center;justify-content:center;font-size:.75rem;color:${c};font-weight:700">${m.name.charAt(0).toUpperCase()}</div>
          <div><div class="card-title">${esc(m.name)}</div><div style="font-size:.68rem;color:var(--text-dim)">${esc(m.role||'')}</div></div>
        </div>
        <div style="display:flex;gap:4px">
          <button class="btn-icon" onclick="editMember('${m.id}')" title="Edit">&#9998;</button>
          <button class="btn-icon" onclick="deleteMember('${m.id}')" title="Delete" style="color:var(--red)">&#10005;</button>
        </div>
      </div>
      ${m.phone?`<div style="font-size:.72rem;color:var(--text-dim)">&#9743; ${esc(m.phone)}</div>`:''}
      ${m.email?`<div style="font-size:.72rem;color:var(--text-dim)">&#9993; ${esc(m.email)}</div>`:''}
      ${m.birthday?`<div style="font-size:.72rem;color:var(--text-dim)">&#9733; ${formatDate(m.birthday)}</div>`:''}
      ${m.notes?`<div style="font-size:.7rem;color:var(--text-dim);margin-top:6px;border-top:1px solid var(--border);padding-top:6px">${esc(m.notes)}</div>`:''}
    </div>`;
  }).join('');
  populateMemberSelects();
}

function openMemberModal(id) {
  document.getElementById('member-edit-id').value = '';
  document.getElementById('member-modal-title').textContent = 'Add Family Member';
  ['m-name','m-role','m-phone','m-email','m-notes'].forEach(x => document.getElementById(x).value = '');
  document.getElementById('m-birthday').value = '';
  if (id) {
    const m = load(KEYS.members).find(x => x.id === id);
    if (m) {
      document.getElementById('member-edit-id').value = m.id;
      document.getElementById('member-modal-title').textContent = 'Edit Member';
      document.getElementById('m-name').value = m.name;
      document.getElementById('m-role').value = m.role || '';
      document.getElementById('m-phone').value = m.phone || '';
      document.getElementById('m-email').value = m.email || '';
      document.getElementById('m-birthday').value = m.birthday || '';
      document.getElementById('m-notes').value = m.notes || '';
    }
  }
  openModal('modal-member');
  document.getElementById('m-name').focus();
}
function editMember(id) { openMemberModal(id); }

function saveMember() {
  const name = document.getElementById('m-name').value.trim();
  if (!name) return alert('Name is required.');
  const ms = load(KEYS.members);
  const editId = document.getElementById('member-edit-id').value;
  const data = {
    name, role: document.getElementById('m-role').value.trim(),
    phone: document.getElementById('m-phone').value.trim(),
    email: document.getElementById('m-email').value.trim(),
    birthday: document.getElementById('m-birthday').value,
    notes: document.getElementById('m-notes').value.trim()
  };
  if (editId) {
    const idx = ms.findIndex(m => m.id === editId);
    if (idx >= 0) ms[idx] = { ...ms[idx], ...data };
  } else {
    ms.push({ id: uid(), ...data });
  }
  save(KEYS.members, ms);
  closeModal('modal-member');
  renderMembers();
}

function deleteMember(id) {
  if (!confirm('Remove this family member?')) return;
  save(KEYS.members, load(KEYS.members).filter(m => m.id !== id));
  renderMembers();
}

// ===== CALENDAR =====
let calYear, calMonth;
(function initCal() { const d = new Date(); calYear = d.getFullYear(); calMonth = d.getMonth(); })();

function changeMonth(d) { calMonth += d; if (calMonth < 0) { calMonth = 11; calYear--; } if (calMonth > 11) { calMonth = 0; calYear++; } renderCalendar(); }
function goToday() { const d = new Date(); calYear = d.getFullYear(); calMonth = d.getMonth(); renderCalendar(); }

function renderCalendar() {
  const label = new Date(calYear, calMonth).toLocaleDateString('en-US', { month: 'long', year: 'numeric' });
  document.getElementById('cal-month-label').textContent = label;
  const grid = document.getElementById('cal-grid');
  const days = ['Sun','Mon','Tue','Wed','Thu','Fri','Sat'];
  let html = days.map(d => `<div class="cal-day-label">${d}</div>`).join('');

  const firstDay = new Date(calYear, calMonth, 1).getDay();
  const daysInMonth = new Date(calYear, calMonth + 1, 0).getDate();
  const prevDays = new Date(calYear, calMonth, 0).getDate();
  const today = new Date();
  const todayStr = today.getFullYear() + '-' + String(today.getMonth()+1).padStart(2,'0') + '-' + String(today.getDate()).padStart(2,'0');
  const events = load(KEYS.events);
  const members = load(KEYS.members);

  // prev month padding
  for (let i = firstDay - 1; i >= 0; i--) {
    const d = prevDays - i;
    html += `<div class="cal-day other-month"><div class="cal-day-num">${d}</div></div>`;
  }
  // current month
  for (let d = 1; d <= daysInMonth; d++) {
    const dateStr = calYear + '-' + String(calMonth+1).padStart(2,'0') + '-' + String(d).padStart(2,'0');
    const isToday = dateStr === todayStr;
    const dayEvents = events.filter(e => e.date === dateStr);
    const hasEvents = dayEvents.length > 0;
    html += `<div class="cal-day${isToday?' today':''}${hasEvents?' has-events':''}" onclick="calDayClick('${dateStr}')">
      <div class="cal-day-num">${d}</div>
      ${dayEvents.slice(0,3).map(ev => {
        const mi = getMemberIdx(ev.member);
        const ci = mi >= 0 ? mi % 8 : 0;
        return `<div class="cal-event mc-${ci}" onclick="event.stopPropagation();editEvent('${ev.id}')">${esc(ev.title)}</div>`;
      }).join('')}
      ${dayEvents.length > 3 ? `<div style="font-size:.55rem;color:var(--text-dim)">+${dayEvents.length-3} more</div>` : ''}
    </div>`;
  }
  // next month padding
  const totalCells = firstDay + daysInMonth;
  const remaining = (7 - totalCells % 7) % 7;
  for (let i = 1; i <= remaining; i++) {
    html += `<div class="cal-day other-month"><div class="cal-day-num">${i}</div></div>`;
  }
  grid.innerHTML = html;
}

function calDayClick(dateStr) {
  document.getElementById('e-date').value = dateStr;
  openEventModal();
}

function openEventModal(id) {
  document.getElementById('event-edit-id').value = '';
  document.getElementById('event-modal-title').textContent = 'Add Event';
  document.getElementById('event-del-btn').style.display = 'none';
  ['e-title','e-desc'].forEach(x => document.getElementById(x).value = '');
  if (!document.getElementById('e-date').value) document.getElementById('e-date').value = '';
  document.getElementById('e-time').value = '';
  document.getElementById('e-enddate').value = '';
  document.getElementById('e-member').value = '';
  populateMemberSelects();
  if (id) {
    const ev = load(KEYS.events).find(x => x.id === id);
    if (ev) {
      document.getElementById('event-edit-id').value = ev.id;
      document.getElementById('event-modal-title').textContent = 'Edit Event';
      document.getElementById('event-del-btn').style.display = '';
      document.getElementById('e-title').value = ev.title;
      document.getElementById('e-date').value = ev.date;
      document.getElementById('e-time').value = ev.time || '';
      document.getElementById('e-enddate').value = ev.enddate || '';
      document.getElementById('e-member').value = ev.member || '';
      document.getElementById('e-desc').value = ev.desc || '';
    }
  }
  openModal('modal-event');
  document.getElementById('e-title').focus();
}
function editEvent(id) { openEventModal(id); }

function saveEvent() {
  const title = document.getElementById('e-title').value.trim();
  const date = document.getElementById('e-date').value;
  if (!title || !date) return alert('Title and date are required.');
  const evs = load(KEYS.events);
  const editId = document.getElementById('event-edit-id').value;
  const data = { title, date, time: document.getElementById('e-time').value, enddate: document.getElementById('e-enddate').value, member: document.getElementById('e-member').value, desc: document.getElementById('e-desc').value.trim() };
  if (editId) {
    const idx = evs.findIndex(e => e.id === editId);
    if (idx >= 0) evs[idx] = { ...evs[idx], ...data };
  } else {
    evs.push({ id: uid(), ...data });
  }
  save(KEYS.events, evs);
  closeModal('modal-event');
  document.getElementById('e-date').value = '';
  renderCalendar();
}

function deleteEvent() {
  const id = document.getElementById('event-edit-id').value;
  if (!id || !confirm('Delete this event?')) return;
  save(KEYS.events, load(KEYS.events).filter(e => e.id !== id));
  closeModal('modal-event');
  renderCalendar();
}

// ===== TASKS =====
function renderTasks() {
  let ts = load(KEYS.tasks);
  const filterMember = document.getElementById('task-filter-member').value;
  const filterPriority = document.getElementById('task-filter-priority').value;
  const showDone = document.getElementById('task-show-done').checked;
  if (filterMember) ts = ts.filter(t => t.member === filterMember);
  if (filterPriority) ts = ts.filter(t => t.priority === filterPriority);
  if (!showDone) ts = ts.filter(t => !t.done);
  // sort: undone first, then by priority, then by due date
  const prio = { high: 0, medium: 1, low: 2 };
  ts.sort((a, b) => {
    if (a.done !== b.done) return a.done ? 1 : -1;
    if (prio[a.priority] !== prio[b.priority]) return prio[a.priority] - prio[b.priority];
    if (a.due && b.due) return a.due.localeCompare(b.due);
    return a.due ? -1 : 1;
  });
  const members = load(KEYS.members);
  const el = document.getElementById('tasks-list');
  if (!ts.length) { el.innerHTML = '<div class="empty-state"><div class="empty-state-icon">&#9745;</div><div class="empty-state-text">No tasks. Add one to get started.</div></div>'; return; }
  el.innerHTML = ts.map(t => {
    const m = members.find(x => x.id === t.member);
    const mi = m ? getMemberIdx(t.member) : -1;
    const overdue = t.due && !t.done && t.due < new Date().toISOString().slice(0,10);
    return `<div class="task-item${t.done?' task-done':''}">
      <input type="checkbox" class="task-check" ${t.done?'checked':''} onchange="toggleTask('${t.id}')">
      <div class="task-content" onclick="editTask('${t.id}')" style="cursor:pointer">
        <div class="task-title">${esc(t.title)}</div>
        <div class="task-meta">
          <span class="badge priority-${t.priority}">${t.priority}</span>
          ${m ? `<span class="badge mc-${mi%8}">${esc(m.name)}</span>` : ''}
          ${t.due ? `<span style="color:${overdue?'var(--red)':'var(--text-dim)'}">${overdue?'OVERDUE: ':''}${formatDate(t.due)}</span>` : ''}
        </div>
      </div>
    </div>`;
  }).join('');
}

function toggleTask(id) {
  const ts = load(KEYS.tasks);
  const t = ts.find(x => x.id === id);
  if (t) t.done = !t.done;
  save(KEYS.tasks, ts);
  renderTasks();
}

function openTaskModal(id) {
  document.getElementById('task-edit-id').value = '';
  document.getElementById('task-modal-title').textContent = 'Add Task';
  document.getElementById('task-del-btn').style.display = 'none';
  ['t-title','t-notes'].forEach(x => document.getElementById(x).value = '');
  document.getElementById('t-due').value = '';
  document.getElementById('t-member').value = '';
  document.getElementById('t-priority').value = 'medium';
  populateMemberSelects();
  if (id) {
    const t = load(KEYS.tasks).find(x => x.id === id);
    if (t) {
      document.getElementById('task-edit-id').value = t.id;
      document.getElementById('task-modal-title').textContent = 'Edit Task';
      document.getElementById('task-del-btn').style.display = '';
      document.getElementById('t-title').value = t.title;
      document.getElementById('t-member').value = t.member || '';
      document.getElementById('t-due').value = t.due || '';
      document.getElementById('t-priority').value = t.priority;
      document.getElementById('t-notes').value = t.notes || '';
    }
  }
  openModal('modal-task');
  document.getElementById('t-title').focus();
}
function editTask(id) { openTaskModal(id); }

function saveTask() {
  const title = document.getElementById('t-title').value.trim();
  if (!title) return alert('Task description is required.');
  const ts = load(KEYS.tasks);
  const editId = document.getElementById('task-edit-id').value;
  const data = { title, member: document.getElementById('t-member').value, due: document.getElementById('t-due').value, priority: document.getElementById('t-priority').value, notes: document.getElementById('t-notes').value.trim() };
  if (editId) {
    const idx = ts.findIndex(t => t.id === editId);
    if (idx >= 0) ts[idx] = { ...ts[idx], ...data };
  } else {
    ts.push({ id: uid(), done: false, ...data });
  }
  save(KEYS.tasks, ts);
  closeModal('modal-task');
  renderTasks();
}

function deleteTask() {
  const id = document.getElementById('task-edit-id').value;
  if (!id || !confirm('Delete this task?')) return;
  save(KEYS.tasks, load(KEYS.tasks).filter(t => t.id !== id));
  closeModal('modal-task');
  renderTasks();
}

// ===== SHOPPING =====
function renderShopping() {
  const items = load(KEYS.shopping);
  const el = document.getElementById('shopping-list');
  if (!items.length) { el.innerHTML = '<div class="empty-state"><div class="empty-state-icon">&#9749;</div><div class="empty-state-text">Shopping list is empty.</div></div>'; return; }
  const cats = {};
  items.forEach(item => {
    if (!cats[item.category]) cats[item.category] = [];
    cats[item.category].push(item);
  });
  // sort categories, unchecked items first within each
  el.innerHTML = Object.keys(cats).sort().map(cat => {
    const sorted = cats[cat].sort((a,b) => (a.checked?1:0)-(b.checked?1:0));
    return `<div class="shop-category"><div class="shop-category-title">${esc(cat)}</div>
      ${sorted.map(item => `<div class="shop-item${item.checked?' checked':''}">
        <input type="checkbox" ${item.checked?'checked':''} onchange="toggleShop('${item.id}')" style="width:auto;flex-shrink:0">
        <span style="flex:1;font-size:.78rem">${esc(item.name)}${item.qty?` <span style="color:var(--text-dim);font-size:.68rem">(${esc(item.qty)})</span>`:''}</span>
        <button class="btn-icon" onclick="deleteShopItem('${item.id}')" style="color:var(--red);font-size:.8rem">&#10005;</button>
      </div>`).join('')}
    </div>`;
  }).join('');
}

function openShopModal() {
  document.getElementById('s-item').value = '';
  document.getElementById('s-qty').value = '';
  document.getElementById('s-category').value = 'Produce';
  openModal('modal-shop');
  document.getElementById('s-item').focus();
}

function saveShopItem() {
  const name = document.getElementById('s-item').value.trim();
  if (!name) return alert('Item name is required.');
  const items = load(KEYS.shopping);
  items.push({ id: uid(), name, category: document.getElementById('s-category').value, qty: document.getElementById('s-qty').value.trim(), checked: false });
  save(KEYS.shopping, items);
  closeModal('modal-shop');
  renderShopping();
}

function toggleShop(id) {
  const items = load(KEYS.shopping);
  const item = items.find(x => x.id === id);
  if (item) item.checked = !item.checked;
  save(KEYS.shopping, items);
  renderShopping();
}

function deleteShopItem(id) {
  save(KEYS.shopping, load(KEYS.shopping).filter(x => x.id !== id));
  renderShopping();
}

function clearCheckedShop() {
  const items = load(KEYS.shopping).filter(x => !x.checked);
  save(KEYS.shopping, items);
  renderShopping();
}

// ===== IMPORTANT DATES =====
function renderDates() {
  const members = load(KEYS.members);
  const events = load(KEYS.events);
  const today = new Date(); today.setHours(0,0,0,0);
  let dates = [];

  // Birthdays from members
  members.forEach((m, i) => {
    if (m.birthday) {
      const parts = m.birthday.split('-');
      let next = new Date(today.getFullYear(), parseInt(parts[1])-1, parseInt(parts[2]));
      if (next < today) next.setFullYear(next.getFullYear() + 1);
      const diff = Math.ceil((next - today) / 86400000);
      dates.push({ name: m.name + "'s Birthday", detail: formatDate(m.birthday), days: diff, type: 'birthday', color: getMemberColor(i) });
    }
  });

  // Upcoming events (next 90 days)
  events.forEach(ev => {
    const evDate = new Date(ev.date + 'T00:00:00');
    const diff = Math.ceil((evDate - today) / 86400000);
    if (diff >= 0 && diff <= 90) {
      const mi = getMemberIdx(ev.member);
      dates.push({ name: ev.title, detail: formatDate(ev.date) + (ev.time ? ' at ' + ev.time : ''), days: diff, type: 'event', color: mi >= 0 ? getMemberColor(mi) : 'var(--cyan)' });
    }
  });

  dates.sort((a, b) => a.days - b.days);
  const el = document.getElementById('dates-list');
  if (!dates.length) { el.innerHTML = '<div class="empty-state"><div class="empty-state-icon">&#9733;</div><div class="empty-state-text">No upcoming dates. Add family members with birthdays or calendar events.</div></div>'; return; }
  el.innerHTML = dates.map(d => `<div class="date-item">
    <div class="date-countdown">
      <div class="days" style="color:${d.days===0?'var(--green)':d.days<=7?'var(--orange)':'var(--cyan)'}">${d.days===0?'TODAY':d.days}</div>
      <div class="label">${d.days===0?'':d.days===1?'day':'days'}</div>
    </div>
    <div class="date-info">
      <div class="name" style="color:${d.color}">${esc(d.name)}</div>
      <div class="detail">${d.detail} &middot; ${d.type}</div>
    </div>
  </div>`).join('');
}

// ===== EMERGENCY CONTACTS =====
function renderEmergency() {
  const contacts = load(KEYS.emergency);
  const el = document.getElementById('emergency-list');
  if (!contacts.length) { el.innerHTML = '<div class="empty-state"><div class="empty-state-icon">&#9888;</div><div class="empty-state-text">No emergency contacts yet.</div></div>'; return; }
  el.innerHTML = contacts.map(c => `<div class="emergency-card" onclick="editEmergency('${c.id}')" style="cursor:pointer">
    <div class="emergency-type">${esc(c.type)}</div>
    <div class="emergency-name">${esc(c.name)}</div>
    <div class="emergency-phone"><a href="tel:${esc(c.phone)}" onclick="event.stopPropagation()">${esc(c.phone)}</a></div>
    ${c.address?`<div class="emergency-note">${esc(c.address)}</div>`:''}
    ${c.notes?`<div class="emergency-note">${esc(c.notes)}</div>`:''}
  </div>`).join('');
}

function openEmergencyModal(id) {
  document.getElementById('ec-edit-id').value = '';
  document.getElementById('emergency-modal-title').textContent = 'Add Emergency Contact';
  document.getElementById('ec-del-btn').style.display = 'none';
  ['ec-name','ec-phone','ec-address','ec-notes'].forEach(x => document.getElementById(x).value = '');
  document.getElementById('ec-type').value = 'Doctor';
  if (id) {
    const c = load(KEYS.emergency).find(x => x.id === id);
    if (c) {
      document.getElementById('ec-edit-id').value = c.id;
      document.getElementById('emergency-modal-title').textContent = 'Edit Emergency Contact';
      document.getElementById('ec-del-btn').style.display = '';
      document.getElementById('ec-type').value = c.type;
      document.getElementById('ec-name').value = c.name;
      document.getElementById('ec-phone').value = c.phone;
      document.getElementById('ec-address').value = c.address || '';
      document.getElementById('ec-notes').value = c.notes || '';
    }
  }
  openModal('modal-emergency');
  document.getElementById('ec-name').focus();
}
function editEmergency(id) { openEmergencyModal(id); }

function saveEmergency() {
  const name = document.getElementById('ec-name').value.trim();
  const phone = document.getElementById('ec-phone').value.trim();
  if (!name || !phone) return alert('Name and phone are required.');
  const cs = load(KEYS.emergency);
  const editId = document.getElementById('ec-edit-id').value;
  const data = { type: document.getElementById('ec-type').value, name, phone, address: document.getElementById('ec-address').value.trim(), notes: document.getElementById('ec-notes').value.trim() };
  if (editId) {
    const idx = cs.findIndex(c => c.id === editId);
    if (idx >= 0) cs[idx] = { ...cs[idx], ...data };
  } else {
    cs.push({ id: uid(), ...data });
  }
  save(KEYS.emergency, cs);
  closeModal('modal-emergency');
  renderEmergency();
}

function deleteEmergency() {
  const id = document.getElementById('ec-edit-id').value;
  if (!id || !confirm('Delete this contact?')) return;
  save(KEYS.emergency, load(KEYS.emergency).filter(c => c.id !== id));
  closeModal('modal-emergency');
  renderEmergency();
}

// ===== NOTES =====
function renderNotes() {
  const notes = load(KEYS.notes);
  const members = load(KEYS.members);
  const el = document.getElementById('notes-list');
  if (!notes.length) { el.innerHTML = '<div class="empty-state"><div class="empty-state-icon">&#9998;</div><div class="empty-state-text">No notes yet. Post a message to the family bulletin board.</div></div>'; return; }
  const sorted = [...notes].sort((a,b) => {
    if (a.pinned !== b.pinned) return a.pinned ? -1 : 1;
    return (b.created || 0) - (a.created || 0);
  });
  el.innerHTML = sorted.map(n => {
    const m = members.find(x => x.id === n.author);
    const mi = m ? getMemberIdx(n.author) : -1;
    return `<div class="note-card${n.pinned?' pinned':''}" onclick="editNote('${n.id}')" style="cursor:pointer">
      <div style="display:flex;justify-content:space-between;align-items:center">
        <div style="font-size:.82rem;font-weight:600;color:var(--text)">${n.title ? esc(n.title) : 'Untitled'}</div>
        ${n.pinned?'<span class="note-pin">&#128204; Pinned</span>':''}
      </div>
      <div class="note-content">${esc(n.content)}</div>
      <div class="note-meta">
        ${m ? `<span style="color:${getMemberColor(mi)}">${esc(m.name)}</span> &middot; ` : ''}
        ${n.created ? new Date(n.created).toLocaleDateString('en-US',{month:'short',day:'numeric',hour:'2-digit',minute:'2-digit'}) : ''}
      </div>
    </div>`;
  }).join('');
}

function openNoteModal(id) {
  document.getElementById('n-edit-id').value = '';
  document.getElementById('note-modal-title').textContent = 'Add Note';
  document.getElementById('note-del-btn').style.display = 'none';
  ['n-title','n-content'].forEach(x => document.getElementById(x).value = '');
  document.getElementById('n-author').value = '';
  document.getElementById('n-pinned').checked = false;
  populateMemberSelects();
  if (id) {
    const n = load(KEYS.notes).find(x => x.id === id);
    if (n) {
      document.getElementById('n-edit-id').value = n.id;
      document.getElementById('note-modal-title').textContent = 'Edit Note';
      document.getElementById('note-del-btn').style.display = '';
      document.getElementById('n-title').value = n.title || '';
      document.getElementById('n-content').value = n.content;
      document.getElementById('n-author').value = n.author || '';
      document.getElementById('n-pinned').checked = n.pinned || false;
    }
  }
  openModal('modal-note');
  document.getElementById('n-title').focus();
}
function editNote(id) { openNoteModal(id); }

function saveNote() {
  const content = document.getElementById('n-content').value.trim();
  if (!content) return alert('Message is required.');
  const ns = load(KEYS.notes);
  const editId = document.getElementById('n-edit-id').value;
  const data = { title: document.getElementById('n-title').value.trim(), content, author: document.getElementById('n-author').value, pinned: document.getElementById('n-pinned').checked };
  if (editId) {
    const idx = ns.findIndex(n => n.id === editId);
    if (idx >= 0) ns[idx] = { ...ns[idx], ...data };
  } else {
    ns.push({ id: uid(), created: Date.now(), ...data });
  }
  save(KEYS.notes, ns);
  closeModal('modal-note');
  renderNotes();
}

function deleteNote() {
  const id = document.getElementById('n-edit-id').value;
  if (!id || !confirm('Delete this note?')) return;
  save(KEYS.notes, load(KEYS.notes).filter(n => n.id !== id));
  closeModal('modal-note');
  renderNotes();
}

// ===== MEAL PLANNER =====
let mealWeekOffset = 0;
function getMealWeekStart() {
  const d = new Date();
  d.setDate(d.getDate() - d.getDay() + mealWeekOffset * 7);
  d.setHours(0,0,0,0);
  return d;
}

function changeMealWeek(dir) { mealWeekOffset += dir; renderMeals(); }

function renderMeals() {
  const start = getMealWeekStart();
  const end = new Date(start); end.setDate(end.getDate() + 6);
  document.getElementById('meal-week-label').textContent =
    start.toLocaleDateString('en-US',{month:'short',day:'numeric'}) + ' - ' + end.toLocaleDateString('en-US',{month:'short',day:'numeric',year:'numeric'});
  const meals = loadObj(KEYS.meals);
  const dayNames = ['Sun','Mon','Tue','Wed','Thu','Fri','Sat'];
  const mealTypes = ['Breakfast','Lunch','Dinner'];
  const grid = document.getElementById('meal-grid');
  let html = '<div class="meal-label"></div>';
  for (let i = 0; i < 7; i++) {
    const d = new Date(start); d.setDate(d.getDate() + i);
    const isToday = d.toDateString() === new Date().toDateString();
    html += `<div class="meal-day-header" style="${isToday?'color:var(--green);font-weight:700':''}">${dayNames[i]}<br><span style="font-size:.6rem;color:var(--text-dim)">${d.getMonth()+1}/${d.getDate()}</span></div>`;
  }
  mealTypes.forEach(type => {
    html += `<div class="meal-label">${type}</div>`;
    for (let i = 0; i < 7; i++) {
      const d = new Date(start); d.setDate(d.getDate() + i);
      const key = d.toISOString().slice(0,10) + '_' + type.toLowerCase();
      const val = meals[key] || '';
      html += `<div class="meal-cell" onclick="openMealModal('${d.toISOString().slice(0,10)}','${type.toLowerCase()}')">${esc(val)}</div>`;
    }
  });
  grid.innerHTML = html;
}

function openMealModal(day, type) {
  document.getElementById('meal-day').value = day;
  document.getElementById('meal-type').value = type;
  const meals = loadObj(KEYS.meals);
  const key = day + '_' + type;
  document.getElementById('meal-content').value = meals[key] || '';
  document.getElementById('meal-label').textContent = type.charAt(0).toUpperCase() + type.slice(1) + ' - ' + formatDate(day);
  openModal('modal-meal');
  document.getElementById('meal-content').focus();
}

function saveMeal() {
  const day = document.getElementById('meal-day').value;
  const type = document.getElementById('meal-type').value;
  const content = document.getElementById('meal-content').value.trim();
  const meals = loadObj(KEYS.meals);
  const key = day + '_' + type;
  if (content) meals[key] = content; else delete meals[key];
  saveObj(KEYS.meals, meals);
  closeModal('modal-meal');
  renderMeals();
}

function clearMeal() {
  document.getElementById('meal-content').value = '';
  saveMeal();
}

// ===== UTILITIES =====
function esc(s) { if (!s) return ''; const d = document.createElement('div'); d.textContent = s; return d.innerHTML; }
function formatDate(str) {
  if (!str) return '';
  const parts = str.split('-');
  const d = new Date(parseInt(parts[0]), parseInt(parts[1])-1, parseInt(parts[2]));
  return d.toLocaleDateString('en-US', { month: 'short', day: 'numeric', year: 'numeric' });
}

renderMembers();
renderTasks();
renderShopping();
renderEmergency();
renderNotes();
renderCalendar();
renderDates();
renderMeals();
populateMemberSelects();
</script>
