<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="description" content="Korb Dossier | Korb Engineering — a free, browser-based Korb family tool from Korb Engineering. No signup, no downloads, works on mobile.">
<title>Korb Dossier | Korb Engineering</title>
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{--bg:#050a0f;--bg2:#0a1520;--bg3:#0f1f2e;--bg4:#142838;--cyan:#00d4ff;--orange:#ff6600;--red:#ff3355;--green:#00ff88;--yellow:#ffcc00;--text:#e2e8f0;--text-dim:#6a7a8a;--border:#1a2a3a;--font:'JetBrains Mono',monospace}
html{font-size:14px}
body{background:var(--bg);color:var(--text);font-family:var(--font);min-height:100vh;overflow-x:hidden}
::selection{background:var(--cyan);color:var(--bg)}
::-webkit-scrollbar{width:6px;height:6px}
::-webkit-scrollbar-track{background:var(--bg2)}
::-webkit-scrollbar-thumb{background:var(--border);border-radius:3px}
::-webkit-scrollbar-thumb:hover{background:var(--cyan)}

.app{display:flex;flex-direction:column;height:100vh}

/* Header */
.header{background:var(--bg2);border-bottom:1px solid var(--border);padding:12px 20px;display:flex;align-items:center;justify-content:space-between;flex-shrink:0;z-index:100}
.header-left{display:flex;align-items:center;gap:12px}
.ke-logo{width:32px;height:32px;border:1px solid var(--cyan);border-radius:4px;display:flex;align-items:center;justify-content:center;font-size:0.7rem;font-weight:700;color:var(--cyan);flex-shrink:0}
.header h1{font-size:1.1rem;font-weight:600;color:var(--cyan);letter-spacing:2px}
.header h1 span{color:var(--orange)}
.header-right{display:flex;gap:8px;align-items:center}
.hamburger{display:none;background:none;border:1px solid var(--border);color:var(--text);font-size:1.2rem;padding:4px 8px;cursor:pointer;border-radius:4px;font-family:var(--font)}
.hamburger:hover{border-color:var(--cyan);color:var(--cyan)}

/* Layout */
.layout{display:flex;flex:1;overflow:hidden}

/* Sidebar */
.sidebar{width:320px;min-width:320px;background:var(--bg2);border-right:1px solid var(--border);display:flex;flex-direction:column;overflow:hidden;transition:transform .3s}
.sidebar-header{padding:12px;border-bottom:1px solid var(--border);flex-shrink:0}
.search-box{position:relative}
.search-box input{padding-left:28px;font-size:0.75rem}
.search-box::before{content:"\u25B7";position:absolute;left:10px;top:50%;transform:translateY(-50%);color:var(--text-dim);font-size:0.7rem}
.sidebar-filters{display:flex;gap:4px;margin-top:8px;flex-wrap:wrap}
.filter-btn{font-family:var(--font);font-size:0.62rem;padding:3px 8px;border:1px solid var(--border);border-radius:10px;background:none;color:var(--text-dim);cursor:pointer;transition:all .2s}
.filter-btn:hover,.filter-btn.active{border-color:var(--cyan);color:var(--cyan);background:rgba(0,212,255,.08)}
.sidebar-sort{display:flex;gap:4px;margin-top:8px;align-items:center}
.sidebar-sort label{font-size:0.62rem;color:var(--text-dim);margin:0;white-space:nowrap}
.sidebar-sort select{width:auto;font-size:0.65rem;padding:3px 6px;background:var(--bg);border:1px solid var(--border);color:var(--text);border-radius:4px}
.sidebar-actions{display:flex;gap:4px;margin-top:8px}

.contact-list{flex:1;overflow-y:auto;padding:4px}
.contact-item{display:flex;align-items:center;gap:10px;padding:10px;border-radius:4px;cursor:pointer;transition:all .15s;border:1px solid transparent;margin-bottom:2px}
.contact-item:hover{background:var(--bg3);border-color:var(--border)}
.contact-item.active{background:var(--bg3);border-color:var(--cyan)}
.contact-avatar{width:36px;height:36px;border-radius:50%;border:1px solid var(--border);display:flex;align-items:center;justify-content:center;font-size:0.65rem;font-weight:600;color:var(--cyan);background:var(--bg);flex-shrink:0;overflow:hidden}
.contact-avatar img{width:100%;height:100%;object-fit:cover}
.contact-info{flex:1;overflow:hidden}
.contact-name{font-size:0.78rem;font-weight:500;color:var(--text);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.contact-role{font-size:0.62rem;color:var(--text-dim);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.contact-status{width:8px;height:8px;border-radius:50%;flex-shrink:0}
.status-active{background:var(--green)}
.status-on-leave{background:var(--yellow)}
.status-remote{background:var(--cyan)}
.status-inactive{background:var(--red)}
.status-travel{background:var(--orange)}

/* Main content */
.main-content{flex:1;overflow-y:auto;padding:0}
.empty-state{display:flex;flex-direction:column;align-items:center;justify-content:center;height:100%;color:var(--text-dim);font-size:0.85rem;gap:8px}
.empty-state .empty-icon{font-size:2rem;opacity:0.3}

/* Dossier view */
.dossier{padding:20px;max-width:1000px;margin:0 auto}
.dossier-header{display:flex;gap:20px;align-items:flex-start;margin-bottom:20px;flex-wrap:wrap}
.dossier-photo{width:100px;height:100px;border-radius:8px;border:2px solid var(--border);display:flex;align-items:center;justify-content:center;font-size:1.8rem;color:var(--cyan);background:var(--bg2);overflow:hidden;flex-shrink:0;position:relative;cursor:pointer}
.dossier-photo img{width:100%;height:100%;object-fit:cover}
.dossier-photo:hover::after{content:"CHANGE";position:absolute;inset:0;background:rgba(0,0,0,.7);display:flex;align-items:center;justify-content:center;font-size:0.6rem;color:var(--cyan);letter-spacing:1px}
.dossier-headline{flex:1;min-width:200px}
.dossier-headline h2{font-size:1.3rem;color:var(--text);margin-bottom:2px}
.dossier-headline .nickname{font-size:0.75rem;color:var(--text-dim);margin-bottom:6px}
.dossier-headline .title-dept{font-size:0.8rem;color:var(--cyan)}
.dossier-headline .tenure{font-size:0.68rem;color:var(--text-dim);margin-top:4px}
.dossier-headline .contact-links{display:flex;gap:10px;margin-top:8px;flex-wrap:wrap}
.dossier-headline .contact-links a,.dossier-headline .contact-links span{font-size:0.68rem;color:var(--text-dim);text-decoration:none;transition:color .2s}
.dossier-headline .contact-links a:hover{color:var(--cyan)}
.dossier-actions{display:flex;gap:6px;flex-wrap:wrap}

/* Sections */
.dossier-section{background:var(--bg2);border:1px solid var(--border);border-radius:6px;margin-bottom:12px;overflow:hidden}
.section-toggle{width:100%;background:none;border:none;padding:12px 16px;display:flex;align-items:center;justify-content:space-between;cursor:pointer;color:var(--cyan);font-family:var(--font);font-size:0.8rem;font-weight:600;letter-spacing:0.5px;text-align:left}
.section-toggle:hover{background:var(--bg3)}
.section-toggle .chevron{transition:transform .2s;font-size:0.7rem}
.section-toggle .chevron.open{transform:rotate(90deg)}
.section-body{padding:0 16px 16px;display:none}
.section-body.open{display:block}

/* Detail grid */
.detail-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(200px,1fr));gap:10px}
.detail-item{padding:8px;background:var(--bg);border-radius:4px;border:1px solid var(--border)}
.detail-label{font-size:0.6rem;color:var(--text-dim);text-transform:uppercase;letter-spacing:0.5px;margin-bottom:3px}
.detail-value{font-size:0.78rem;color:var(--text);word-break:break-word}
.detail-value.highlight{color:var(--cyan)}
.detail-value.salary{color:var(--green)}
.detail-value.warn{color:var(--yellow)}
.detail-value.danger{color:var(--red)}

/* Tags */
.tags{display:flex;flex-wrap:wrap;gap:4px;margin-top:4px}
.tag{display:inline-block;padding:2px 8px;border-radius:10px;font-size:0.62rem;background:rgba(0,212,255,.1);color:var(--cyan);border:1px solid rgba(0,212,255,.2)}
.tag.weakness{background:rgba(255,102,0,.1);color:var(--orange);border-color:rgba(255,102,0,.2)}
.tag.project{background:rgba(0,255,136,.1);color:var(--green);border-color:rgba(0,255,136,.2)}

/* Risk indicators */
.risk-low{color:var(--green)}
.risk-medium{color:var(--yellow)}
.risk-high{color:var(--red)}
.risk-critical{color:#ff0044;font-weight:700}
.risk-badge{padding:3px 10px;border-radius:4px;font-size:0.7rem;font-weight:600;display:inline-block}
.risk-badge.low{background:rgba(0,255,136,.12);color:var(--green);border:1px solid rgba(0,255,136,.3)}
.risk-badge.medium{background:rgba(255,204,0,.12);color:var(--yellow);border:1px solid rgba(255,204,0,.3)}
.risk-badge.high{background:rgba(255,51,85,.12);color:var(--red);border:1px solid rgba(255,51,85,.3)}
.risk-badge.critical{background:rgba(255,0,68,.15);color:#ff0044;border:1px solid rgba(255,0,68,.4)}

/* Performance rating */
.perf-stars{display:flex;gap:2px;align-items:center}
.perf-star{width:16px;height:16px;display:flex;align-items:center;justify-content:center;font-size:0.7rem}
.perf-star.filled{color:var(--orange)}
.perf-star.empty{color:var(--border)}
.perf-label{font-size:0.62rem;color:var(--text-dim);margin-left:6px}

/* Meeting history */
.meeting-log{border:1px solid var(--border);border-radius:4px;margin-bottom:8px;overflow:hidden}
.meeting-log-header{padding:8px 12px;background:var(--bg3);display:flex;justify-content:space-between;align-items:center;cursor:pointer}
.meeting-log-header:hover{background:var(--bg4)}
.meeting-log-date{font-size:0.7rem;color:var(--cyan)}
.meeting-log-topic{font-size:0.72rem;color:var(--text);flex:1;margin-left:10px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.meeting-log-body{padding:10px 12px;background:var(--bg);display:none;font-size:0.72rem;line-height:1.6}
.meeting-log-body.open{display:block}
.meeting-log-body .action-items{margin-top:6px;padding-left:14px;color:var(--text-dim)}

/* Buttons */
.btn{font-family:var(--font);font-size:0.72rem;padding:6px 14px;border:1px solid var(--border);border-radius:4px;cursor:pointer;transition:all .2s;background:var(--bg3);color:var(--text);white-space:nowrap}
.btn:hover{border-color:var(--cyan);color:var(--cyan)}
.btn-primary{background:rgba(0,212,255,.1);border-color:var(--cyan);color:var(--cyan)}
.btn-primary:hover{background:rgba(0,212,255,.2)}
.btn-danger{border-color:var(--red);color:var(--red)}
.btn-danger:hover{background:rgba(255,51,85,.1)}
.btn-orange{border-color:var(--orange);color:var(--orange)}
.btn-orange:hover{background:rgba(255,102,0,.1)}
.btn-sm{padding:4px 8px;font-size:0.68rem}

/* Forms */
input,select,textarea{font-family:var(--font);font-size:0.75rem;padding:8px 10px;background:var(--bg);border:1px solid var(--border);border-radius:4px;color:var(--text);width:100%;transition:border-color .2s}
input:focus,select:focus,textarea:focus{outline:none;border-color:var(--cyan)}
textarea{resize:vertical;min-height:60px}
label{font-size:0.68rem;color:var(--text-dim);display:block;margin-bottom:4px}
.form-group{margin-bottom:12px}
.form-row{display:grid;gap:12px}
.form-row-2{grid-template-columns:1fr 1fr}
.form-row-3{grid-template-columns:1fr 1fr 1fr}
.form-row-4{grid-template-columns:1fr 1fr 1fr 1fr}

/* Modal */
.modal-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.75);z-index:200;align-items:flex-start;justify-content:center;padding:20px;overflow-y:auto}
.modal-overlay.show{display:flex}
.modal{background:var(--bg2);border:1px solid var(--border);border-radius:8px;padding:20px;width:100%;max-width:700px;margin:20px auto}
.modal-title{font-size:0.9rem;color:var(--cyan);margin-bottom:16px;display:flex;justify-content:space-between;align-items:center}
.modal-actions{display:flex;gap:8px;justify-content:flex-end;margin-top:16px}

/* Collapsible form sections */
.form-section{border:1px solid var(--border);border-radius:4px;margin-bottom:10px}
.form-section-title{padding:10px 14px;background:var(--bg3);cursor:pointer;font-size:0.75rem;color:var(--cyan);font-weight:600;display:flex;justify-content:space-between;align-items:center;user-select:none}
.form-section-title:hover{background:var(--bg4)}
.form-section-body{padding:14px;display:none}
.form-section-body.open{display:block}

/* Tag input */
.tag-input-wrap{display:flex;flex-wrap:wrap;gap:4px;padding:4px;background:var(--bg);border:1px solid var(--border);border-radius:4px;min-height:36px;align-items:center;cursor:text}
.tag-input-wrap:focus-within{border-color:var(--cyan)}
.tag-input-wrap input{border:none;background:none;padding:2px 4px;flex:1;min-width:80px;font-size:0.7rem}
.tag-input-wrap input:focus{outline:none;border:none}
.tag-input-wrap .tag{cursor:pointer}
.tag-input-wrap .tag:hover{opacity:0.7}

/* Prep mode */
.prep-mode{padding:24px;max-width:800px;margin:0 auto}
.prep-header{display:flex;gap:20px;align-items:center;margin-bottom:24px;padding-bottom:16px;border-bottom:2px solid var(--cyan)}
.prep-photo{width:80px;height:80px;border-radius:8px;border:2px solid var(--cyan);overflow:hidden;display:flex;align-items:center;justify-content:center;font-size:1.5rem;color:var(--cyan);background:var(--bg2);flex-shrink:0}
.prep-photo img{width:100%;height:100%;object-fit:cover}
.prep-name{font-size:1.4rem;font-weight:700;color:var(--text)}
.prep-title{font-size:0.85rem;color:var(--cyan)}
.prep-section{margin-bottom:16px}
.prep-section-title{font-size:0.72rem;color:var(--orange);text-transform:uppercase;letter-spacing:1px;margin-bottom:8px;padding-bottom:4px;border-bottom:1px solid var(--border)}
.prep-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(160px,1fr));gap:8px}
.prep-stat{background:var(--bg2);border:1px solid var(--border);border-radius:4px;padding:8px 10px}
.prep-stat .stat-label{font-size:0.58rem;color:var(--text-dim);text-transform:uppercase;letter-spacing:0.5px}
.prep-stat .stat-value{font-size:0.8rem;color:var(--text);margin-top:2px}
.prep-notes{background:var(--bg2);border:1px solid var(--border);border-radius:4px;padding:10px;font-size:0.75rem;line-height:1.6;color:var(--text-dim)}
.prep-tags{display:flex;flex-wrap:wrap;gap:4px}

/* Confirm dialog */
.confirm-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.8);z-index:300;align-items:center;justify-content:center}
.confirm-overlay.show{display:flex}
.confirm-box{background:var(--bg2);border:1px solid var(--red);border-radius:8px;padding:24px;max-width:400px;text-align:center}
.confirm-box p{margin-bottom:16px;font-size:0.85rem}
.confirm-box .confirm-actions{display:flex;gap:8px;justify-content:center}

/* Watermark */
.watermark{position:fixed;bottom:8px;right:12px;font-size:10px;color:var(--cyan);opacity:0.5;font-family:var(--font);pointer-events:none;z-index:50}

/* Print styles */
@media print{
  .sidebar,.header,.dossier-actions,.watermark,.hamburger{display:none!important}
  .main-content{overflow:visible!important}
  .layout{display:block!important}
  body{background:#fff;color:#000}
  .dossier-section{border-color:#ccc;break-inside:avoid}
  .section-body{display:block!important}
  .detail-item{border-color:#ddd}
  .prep-mode{padding:10px}
  .prep-stat{border-color:#ccc}
}

/* Mobile */
@media(max-width:768px){
  .hamburger{display:block}
  .sidebar{position:fixed;left:0;top:0;bottom:0;z-index:150;transform:translateX(-100%)}
  .sidebar.open{transform:translateX(0)}
  .sidebar-backdrop{display:none;position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:140}
  .sidebar-backdrop.show{display:block}
  .form-row-2,.form-row-3,.form-row-4{grid-template-columns:1fr}
  .dossier-header{flex-direction:column;align-items:center;text-align:center}
  .dossier-actions{justify-content:center}
  .detail-grid{grid-template-columns:1fr}
  .prep-header{flex-direction:column;text-align:center}
  .prep-grid{grid-template-columns:1fr 1fr}
}
</style>
</head>
<body>
<div class="app">
  <!-- Header -->
  <div class="header">
    <div class="header-left">
      <button class="hamburger" onclick="toggleSidebar()" title="Menu">|||</button>
      <div class="ke-logo">KE</div>
      <h1>KORB <span>DOSSIER</span></h1>
    </div>
    <div class="header-right">
      <button class="btn btn-sm btn-primary" onclick="openAddModal()">+ ADD PERSON</button>
      <button class="btn btn-sm" onclick="exportData()">EXPORT</button>
      <button class="btn btn-sm" onclick="document.getElementById('importFile').click()">IMPORT</button>
      <input type="file" id="importFile" accept=".json" style="display:none" onchange="importData(event)">
    </div>
  </div>

  <div class="layout">
    <!-- Sidebar backdrop (mobile) -->
    <div class="sidebar-backdrop" id="sidebarBackdrop" onclick="toggleSidebar()"></div>

    <!-- Sidebar -->
    <div class="sidebar" id="sidebar">
      <div class="sidebar-header">
        <div class="search-box">
          <input type="text" id="searchInput" placeholder="Search contacts..." oninput="renderList()">
        </div>
        <div class="sidebar-filters" id="statusFilters">
          <button class="filter-btn active" data-filter="all" onclick="setFilter('all',this)">All</button>
          <button class="filter-btn" data-filter="active" onclick="setFilter('active',this)">Active</button>
          <button class="filter-btn" data-filter="remote" onclick="setFilter('remote',this)">Remote</button>
          <button class="filter-btn" data-filter="on-leave" onclick="setFilter('on-leave',this)">Leave</button>
          <button class="filter-btn" data-filter="travel" onclick="setFilter('travel',this)">Travel</button>
        </div>
        <div class="sidebar-sort">
          <label>Sort:</label>
          <select id="sortSelect" onchange="renderList()">
            <option value="name">Name</option>
            <option value="department">Department</option>
            <option value="hireDate">Hire Date</option>
          </select>
        </div>
      </div>
      <div class="contact-list" id="contactList"></div>
    </div>

    <!-- Main -->
    <div class="main-content" id="mainContent">
      <div class="empty-state" id="emptyState">
        <div class="empty-icon">[D]</div>
        <div>Select a contact or add a new person</div>
        <div style="font-size:0.68rem;color:var(--text-dim)">Your colleague dossier for meeting prep</div>
      </div>
      <div id="dossierView" style="display:none"></div>
      <div id="prepView" style="display:none"></div>
    </div>
  </div>
</div>

<!-- Add/Edit Modal -->
<div class="modal-overlay" id="personModal">
  <div class="modal" style="max-width:750px">
    <div class="modal-title">
      <span id="modalTitle">Add Person</span>
      <button class="btn btn-sm" onclick="closeModal()">&times; Close</button>
    </div>
    <form id="personForm" onsubmit="savePerson(event)">
      <input type="hidden" id="f_id">

      <!-- Personal Details -->
      <div class="form-section">
        <div class="form-section-title" onclick="toggleFormSection(this)">
          <span>PERSONAL DETAILS</span><span class="chevron open">&#9655;</span>
        </div>
        <div class="form-section-body open">
          <div class="form-row form-row-3">
            <div class="form-group"><label>First Name *</label><input id="f_firstName" required></div>
            <div class="form-group"><label>Last Name *</label><input id="f_lastName" required></div>
            <div class="form-group"><label>Preferred Name / Nickname</label><input id="f_nickname"></div>
          </div>
          <div class="form-group">
            <label>Photo</label>
            <input type="file" id="f_photo" accept="image/*" onchange="handlePhotoSelect(event)" style="font-size:0.68rem">
          </div>
          <div class="form-row form-row-3">
            <div class="form-group"><label>Phone</label><input id="f_phone" type="tel"></div>
            <div class="form-group"><label>Email</label><input id="f_email" type="email"></div>
            <div class="form-group"><label>LinkedIn URL</label><input id="f_linkedin" type="url"></div>
          </div>
          <div class="form-row form-row-3">
            <div class="form-group"><label>Birthday</label><input id="f_birthday" type="date"></div>
            <div class="form-group"><label>Spouse / Partner</label><input id="f_spouse"></div>
            <div class="form-group"><label>Children (names/ages)</label><input id="f_children"></div>
          </div>
          <div class="form-group"><label>Hobbies / Interests</label><input id="f_hobbies" placeholder="Comma separated"></div>
          <div class="form-group"><label>Personal Notes</label><textarea id="f_personalNotes" rows="2"></textarea></div>
        </div>
      </div>

      <!-- Work Details -->
      <div class="form-section">
        <div class="form-section-title" onclick="toggleFormSection(this)">
          <span>WORK DETAILS</span><span class="chevron">&#9655;</span>
        </div>
        <div class="form-section-body">
          <div class="form-row form-row-3">
            <div class="form-group"><label>Title / Role *</label><input id="f_title" required></div>
            <div class="form-group"><label>Department</label><input id="f_department"></div>
            <div class="form-group">
              <label>Status</label>
              <select id="f_status">
                <option value="active">Active</option>
                <option value="remote">Remote</option>
                <option value="on-leave">On Leave</option>
                <option value="travel">Travel</option>
                <option value="inactive">Inactive</option>
              </select>
            </div>
          </div>
          <div class="form-row form-row-3">
            <div class="form-group"><label>Hire Date</label><input id="f_hireDate" type="date"></div>
            <div class="form-group">
              <label>Employment Type</label>
              <select id="f_employmentType">
                <option value="full-time">Full-Time</option>
                <option value="part-time">Part-Time</option>
                <option value="contractor">Contractor</option>
                <option value="intern">Intern</option>
              </select>
            </div>

<script>
// ---- Data Layer ----
const STORAGE_KEY = 'korb_dossier_contacts';
const DB_NAME = 'korb_dossier';
const DB_STORE = 'photos';
let contacts = [];
let selectedId = null;
let currentFilter = 'all';
let pendingPhotoData = null;
let confirmCallback = null;
let db = null;

function loadContacts() {
  try { contacts = JSON.parse(localStorage.getItem(STORAGE_KEY)) || []; } catch(e) { contacts = []; }
}
function saveContacts() {
  localStorage.setItem(STORAGE_KEY, JSON.stringify(contacts));
}

// IndexedDB for photos
function initDB() {
  return new Promise((resolve, reject) => {
    const req = indexedDB.open(DB_NAME, 1);
    req.onupgradeneeded = e => { e.target.result.createObjectStore(DB_STORE); };
    req.onsuccess = e => { db = e.target.result; resolve(db); };
    req.onerror = e => reject(e);
  });
}
function savePhoto(id, data) {
  return new Promise((resolve, reject) => {
    const tx = db.transaction(DB_STORE, 'readwrite');
    tx.objectStore(DB_STORE).put(data, id);
    tx.oncomplete = () => resolve();
    tx.onerror = e => reject(e);
  });
}
function getPhoto(id) {
  return new Promise((resolve, reject) => {
    const tx = db.transaction(DB_STORE, 'readonly');
    const req = tx.objectStore(DB_STORE).get(id);
    req.onsuccess = () => resolve(req.result || null);
    req.onerror = e => reject(e);
  });
}
function deletePhoto(id) {
  return new Promise((resolve, reject) => {
    const tx = db.transaction(DB_STORE, 'readwrite');
    tx.objectStore(DB_STORE).delete(id);
    tx.oncomplete = () => resolve();
    tx.onerror = e => reject(e);
  });
}

// ---- Utilities ----
function genId() { return 'c_' + Date.now() + '_' + Math.random().toString(36).slice(2,8); }
function getInitials(c) { return ((c.firstName||'')[0]||'') + ((c.lastName||'')[0]||''); }
function formatDate(d) { if(!d) return ''; const dt = new Date(d+'T00:00:00'); return dt.toLocaleDateString('en-US',{month:'short',day:'numeric',year:'numeric'}); }
function calcYears(d) { if(!d) return ''; const start = new Date(d+'T00:00:00'); const diff = Date.now() - start.getTime(); const y = diff / (365.25*24*60*60*1000); return y < 1 ? '<1 yr' : Math.floor(y) + ' yr' + (Math.floor(y)!==1?'s':''); }
function parseTags(s) { return (s||'').split(',').map(t=>t.trim()).filter(Boolean); }
const perfLabels = {1:'Needs Improvement',2:'Below Expectations',3:'Meets Expectations',4:'Exceeds Expectations',5:'Outstanding'};
const statusLabels = {active:'Active',remote:'Remote','on-leave':'On Leave',travel:'Travel',inactive:'Inactive'};

// ---- Sidebar ----
function toggleSidebar() {
  document.getElementById('sidebar').classList.toggle('open');
  document.getElementById('sidebarBackdrop').classList.toggle('show');
}

function setFilter(f, btn) {
  currentFilter = f;
  document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  renderList();
}

function renderList() {
  const q = document.getElementById('searchInput').value.toLowerCase();
  const sort = document.getElementById('sortSelect').value;
  let list = contacts.filter(c => {
    if(currentFilter !== 'all' && c.status !== currentFilter) return false;
    if(q) {
      const haystack = [c.firstName,c.lastName,c.nickname,c.department,c.title].join(' ').toLowerCase();
      if(!haystack.includes(q)) return false;
    }
    return true;
  });
  list.sort((a,b) => {
    if(sort === 'name') return (a.lastName+a.firstName).localeCompare(b.lastName+b.firstName);
    if(sort === 'department') return (a.department||'').localeCompare(b.department||'');
    if(sort === 'hireDate') return (a.hireDate||'9999').localeCompare(b.hireDate||'9999');
    return 0;
  });
  const el = document.getElementById('contactList');
  if(!list.length) {
    el.innerHTML = '<div style="padding:20px;text-align:center;color:var(--text-dim);font-size:0.72rem;">No contacts found</div>';
    return;
  }
  el.innerHTML = list.map(c => `
    <div class="contact-item ${c.id===selectedId?'active':''}" onclick="selectContact('${c.id}')">
      <div class="contact-avatar" id="avatar_${c.id}">${getInitials(c)}</div>
      <div class="contact-info">
        <div class="contact-name">${esc(c.firstName)} ${esc(c.lastName)}${c.nickname?' ('+esc(c.nickname)+')':''}</div>
        <div class="contact-role">${esc(c.title||'')}${c.department?' / '+esc(c.department):''}</div>
      </div>
      <div class="contact-status status-${c.status||'active'}" title="${statusLabels[c.status]||'Active'}"></div>
    </div>
  `).join('');
  // Load avatars
  list.forEach(c => loadAvatar(c.id, 'avatar_'+c.id));
}

async function loadAvatar(contactId, elemId) {
  try {
    const photo = await getPhoto(contactId);
    if(photo) {
      const el = document.getElementById(elemId);
      if(el) el.innerHTML = `<img src="${photo}" alt="">`;
    }
  } catch(e) {}
}

function selectContact(id) {
  selectedId = id;
  renderList();
  showDossier(id);
  // Close sidebar on mobile
  if(window.innerWidth <= 768) {
    document.getElementById('sidebar').classList.remove('open');
    document.getElementById('sidebarBackdrop').classList.remove('show');
  }
}

// ---- Dossier View ----
async function showDossier(id) {
  const c = contacts.find(x => x.id === id);
  if(!c) return;
  document.getElementById('emptyState').style.display = 'none';
  document.getElementById('prepView').style.display = 'none';
  const dv = document.getElementById('dossierView');
  dv.style.display = 'block';

  const photo = await getPhoto(id).catch(()=>null);
  const photoHtml = photo ? `<img src="${photo}" alt="">` : getInitials(c);

  const strengths = parseTags(c.strengths);
  const weaknesses = parseTags(c.weaknesses);
  const projects = parseTags(c.projects);
  const hobbies = parseTags(c.hobbies);
  const meetings = (c.meetings || []).sort((a,b) => (b.date||'').localeCompare(a.date||''));

  function perfStars(r) {
    if(!r) return '<span style="color:var(--text-dim)">Not rated</span>';
    let s = '<div class="perf-stars">';
    for(let i=1;i<=5;i++) s += `<span class="perf-star ${i<=r?'filled':'empty'}">${i<=r?'\u2605':'\u2606'}</span>`;
    s += `<span class="perf-label">${perfLabels[r]||''}</span></div>`;
    return s;
  }

  function riskBadge(val, type) {
    if(!val) return '<span style="color:var(--text-dim)">--</span>';
    return `<span class="risk-badge ${val}">${val.charAt(0).toUpperCase()+val.slice(1)}</span>`;
  }

  dv.innerHTML = `
    <div class="dossier">
      <div class="dossier-header">
        <div class="dossier-photo" id="dossierPhoto" onclick="uploadPhotoFor('${c.id}')">${photoHtml}</div>
        <div class="dossier-headline">
          <h2>${esc(c.firstName)} ${esc(c.lastName)}</h2>
          ${c.nickname?`<div class="nickname">Goes by "${esc(c.nickname)}"</div>`:''}
          <div class="title-dept">${esc(c.title||'No title')}${c.department?' \u2014 '+esc(c.department):''}</div>
          <div class="tenure">${c.hireDate?'Hired '+formatDate(c.hireDate)+' ('+calcYears(c.hireDate)+')':''}${c.employmentType?' \u2022 '+esc(c.employmentType.replace('-',' ')):''}${c.officeLocation?' \u2022 '+esc(c.officeLocation):''}</div>
          <div class="contact-links">
            ${c.phone?`<span>\u260E ${esc(c.phone)}</span>`:''}
            ${c.email?`<a href="mailto:${esc(c.email)}">\u2709 ${esc(c.email)}</a>`:''}
            ${c.linkedin?`<a href="${esc(c.linkedin)}" target="_blank">LinkedIn \u2197</a>`:''}
          </div>
        </div>
        <div class="dossier-actions">
          <button class="btn btn-primary btn-sm" onclick="openPrepMode('${c.id}')">PREP MODE</button>
          <button class="btn btn-sm" onclick="openEditModal('${c.id}')">EDIT</button>
          <button class="btn btn-danger btn-sm" onclick="deletePerson('${c.id}')">DELETE</button>
        </div>
      </div>

      <!-- Personal -->
      <div class="dossier-section">
        <button class="section-toggle" onclick="toggleSection(this)"><span>PERSONAL DETAILS</span><span class="chevron open">&#9655;</span></button>
        <div class="section-body open">
          <div class="detail-grid">
            ${detailCell('Birthday',c.birthday?formatDate(c.birthday):'')}
            ${detailCell('Spouse / Partner',c.spouse)}
            ${detailCell('Children',c.children)}
            ${detailCell('Hobbies',hobbies.length?hobbies.map(h=>`<span class="tag">${esc(h)}</span>`).join(' '):'')}
          </div>
          ${c.personalNotes?`<div style="margin-top:10px"><div class="detail-label">Notes</div><div style="font-size:0.75rem;line-height:1.6;color:var(--text-dim);white-space:pre-wrap">${esc(c.personalNotes)}</div></div>`:''}
        </div>
      </div>

      <!-- Work -->
      <div class="dossier-section">
        <button class="section-toggle" onclick="toggleSection(this)"><span>WORK DETAILS</span><span class="chevron open">&#9655;</span></button>
        <div class="section-body open">
          <div class="detail-grid">
            ${detailCell('Manager',c.manager)}
            ${detailCell('Direct Reports',c.directReports)}
            ${detailCell('Status','<span class="contact-status status-'+(c.status||'active')+'" style="display:inline-block;vertical-align:middle;margin-right:6px"></span>'+esc(statusLabels[c.status]||'Active'))}
            ${detailCell('Salary',c.salary,'salary')}
            ${detailCell('Bonus',c.bonus)}
            ${detailCell('Last Raise',c.lastRaiseDate?formatDate(c.lastRaiseDate)+(c.lastRaiseAmount?' ('+esc(c.lastRaiseAmount)+')':''):'')}
            ${detailCell('Performance',perfStars(c.perfRating))}
          </div>
        </div>
      </div>

      <!-- Meeting Prep -->
      <div class="dossier-section">
        <button class="section-toggle" onclick="toggleSection(this)"><span>MEETING PREP</span><span class="chevron open">&#9655;</span></button>
        <div class="section-body open">
          <div style="margin-bottom:10px">
            <div class="detail-label">Strengths</div>
            <div class="tags">${strengths.length?strengths.map(t=>`<span class="tag">${esc(t)}</span>`).join(''):'<span style="color:var(--text-dim);font-size:0.7rem">--</span>'}</div>
          </div>
          <div style="margin-bottom:10px">
            <div class="detail-label">Weaknesses / Areas for Improvement</div>
            <div class="tags">${weaknesses.length?weaknesses.map(t=>`<span class="tag weakness">${esc(t)}</span>`).join(''):'<span style="color:var(--text-dim);font-size:0.7rem">--</span>'}</div>
          </div>
          <div style="margin-bottom:10px">
            <div class="detail-label">Key Projects</div>
            <div class="tags">${projects.length?projects.map(t=>`<span class="tag project">${esc(t)}</span>`).join(''):'<span style="color:var(--text-dim);font-size:0.7rem">--</span>'}</div>
          </div>
          <div class="detail-grid" style="margin-top:10px">
            ${detailCell('Communication Style',c.commStyle)}
            ${detailCell('Recent Accomplishments',c.accomplishments)}
            ${detailCell('Concerns / Issues',c.concerns,'',c.concerns?'warn':'')}
            ${detailCell('Last 1-on-1',c.lastOneOnOne?formatDate(c.lastOneOnOne):'')}
            ${detailCell('Last Vacation',c.lastVacation?formatDate(c.lastVacation)+(c.vacationDuration?' ('+esc(c.vacationDuration)+')':''):'')}
            ${detailCell('Upcoming PTO',c.upcomingPTO)}
          </div>
        </div>
      </div>

      <!-- Assessment -->
      <div class="dossier-section">
        <button class="section-toggle" onclick="toggleSection(this)"><span>ASSESSMENT</span><span class="chevron">&#9655;</span></button>
        <div class="section-body">
          <div class="detail-grid">
            <div class="detail-item"><div class="detail-label">Flight Risk / Poach Potential</div><div class="detail-value">${riskBadge(c.flightRisk)}</div></div>
            <div class="detail-item"><div class="detail-label">Retention Priority</div><div class="detail-value">${riskBadge(c.retentionPriority)}</div></div>
            ${detailCell('Career Goals',c.careerGoals)}
          </div>
          ${c.successionNotes?`<div style="margin-top:10px"><div class="detail-label">Succession Planning</div><div style="font-size:0.75rem;line-height:1.6;color:var(--text-dim);white-space:pre-wrap">${esc(c.successionNotes)}</div></div>`:''}
          ${c.trainingNeeds?`<div style="margin-top:10px"><div class="detail-label">Training Needs</div><div style="font-size:0.75rem;line-height:1.6;color:var(--text-dim);white-space:pre-wrap">${esc(c.trainingNeeds)}</div></div>`:''}
        </div>
      </div>

      <!-- Meeting History -->
      <div class="dossier-section">
        <button class="section-toggle" onclick="toggleSection(this)"><span>MEETING HISTORY (${meetings.length})</span><span class="chevron">&#9655;</span></button>
        <div class="section-body">
          <button class="btn btn-sm btn-primary" style="margin-bottom:10px" onclick="openMeetingModal('${c.id}')">+ Add Meeting Log</button>
          ${meetings.length ? meetings.map((m,i) => `
            <div class="meeting-log">
              <div class="meeting-log-header" onclick="this.nextElementSibling.classList.toggle('open')">
                <span class="meeting-log-date">${formatDate(m.date)}</span>
                <span class="meeting-log-topic">${esc(m.topic)}</span>
                <button class="btn btn-sm btn-danger" onclick="event.stopPropagation();deleteMeeting('${c.id}',${i})" title="Delete">&times;</button>
              </div>
              <div class="meeting-log-body">
                ${m.notes?`<div>${esc(m.notes)}</div>`:''}
                ${m.actions?`<div class="action-items"><strong>Action Items:</strong><br>${esc(m.actions)}</div>`:''}
              </div>
            </div>
          `).join('') : '<div style="color:var(--text-dim);font-size:0.72rem">No meeting logs yet</div>'}
        </div>
      </div>
    </div>
  `;
}

function detailCell(label, val, cls, extraCls) {
  const display = val || '<span style="color:var(--text-dim)">--</span>';
  return `<div class="detail-item"><div class="detail-label">${label}</div><div class="detail-value ${cls||''} ${extraCls||''}">${typeof val === 'string' && val ? esc(val) : display}</div></div>`;
}

function esc(s) { if(!s) return ''; const d=document.createElement('div'); d.textContent=s; return d.innerHTML; }

function toggleSection(btn) {
  const body = btn.nextElementSibling;
  const chev = btn.querySelector('.chevron');
  body.classList.toggle('open');
  chev.classList.toggle('open');
}

function toggleFormSection(el) {
  const body = el.nextElementSibling;
  const chev = el.querySelector('.chevron');
  body.classList.toggle('open');
  chev.classList.toggle('open');
}

// ---- Prep Mode ----
async function openPrepMode(id) {
  const c = contacts.find(x => x.id === id);
  if(!c) return;
  document.getElementById('emptyState').style.display = 'none';
  document.getElementById('dossierView').style.display = 'none';
  const pv = document.getElementById('prepView');
  pv.style.display = 'block';

  const photo = await getPhoto(id).catch(()=>null);
  const photoHtml = photo ? `<img src="${photo}" alt="">` : getInitials(c);
  const strengths = parseTags(c.strengths);
  const weaknesses = parseTags(c.weaknesses);
  const projects = parseTags(c.projects);
  const lastMeeting = (c.meetings||[]).sort((a,b)=>(b.date||'').localeCompare(a.date||''))[0];

  function perfStarsSmall(r) {
    if(!r) return '--';
    let s='';for(let i=1;i<=5;i++) s += i<=r?'\u2605':'\u2606';
    return `<span style="color:var(--orange)">${s}</span> ${perfLabels[r]||''}`;
  }

  pv.innerHTML = `
    <div class="prep-mode">
      <div style="margin-bottom:12px"><button class="btn btn-sm" onclick="showDossier('${c.id}');document.getElementById('prepView').style.display='none';document.getElementById('dossierView').style.display='block'">&larr; Back to Dossier</button> <button class="btn btn-sm" onclick="window.print()">Print</button></div>
      <div class="prep-header">
        <div class="prep-photo">${photoHtml}</div>
        <div>
          <div class="prep-name">${esc(c.firstName)} ${esc(c.lastName)}${c.nickname?' ("'+esc(c.nickname)+'")':''}</div>
          <div class="prep-title">${esc(c.title||'')}${c.department?' \u2014 '+esc(c.department):''}</div>
        </div>
      </div>

      <div class="prep-section">
        <div class="prep-section-title">KEY STATS</div>
        <div class="prep-grid">
          <div class="prep-stat"><div class="stat-label">Tenure</div><div class="stat-value">${c.hireDate?calcYears(c.hireDate):'--'}</div></div>
          <div class="prep-stat"><div class="stat-label">Salary</div><div class="stat-value" style="color:var(--green)">${esc(c.salary||'--')}</div></div>
          <div class="prep-stat"><div class="stat-label">Last Raise</div><div class="stat-value">${c.lastRaiseDate?formatDate(c.lastRaiseDate):'--'}${c.lastRaiseAmount?' ('+esc(c.lastRaiseAmount)+')':''}</div></div>
          <div class="prep-stat"><div class="stat-label">Performance</div><div class="stat-value">${perfStarsSmall(c.perfRating)}</div></div>
          <div class="prep-stat"><div class="stat-label">Last 1-on-1</div><div class="stat-value">${c.lastOneOnOne?formatDate(c.lastOneOnOne):'--'}</div></div>
          <div class="prep-stat"><div class="stat-label">Upcoming PTO</div><div class="stat-value">${esc(c.upcomingPTO||'None')}</div></div>
        </div>
      </div>

      <div class="prep-section">
        <div class="prep-section-title">STRENGTHS</div>
        <div class="prep-tags">${strengths.length?strengths.map(t=>`<span class="tag">${esc(t)}</span>`).join(''):'<span style="color:var(--text-dim);font-size:0.72rem">None listed</span>'}</div>
      </div>

      <div class="prep-section">
        <div class="prep-section-title">WEAKNESSES / AREAS FOR IMPROVEMENT</div>
        <div class="prep-tags">${weaknesses.length?weaknesses.map(t=>`<span class="tag weakness">${esc(t)}</span>`).join(''):'<span style="color:var(--text-dim);font-size:0.72rem">None listed</span>'}</div>
      </div>

      <div class="prep-section">
        <div class="prep-section-title">CURRENT PROJECTS</div>
        <div class="prep-tags">${projects.length?projects.map(t=>`<span class="tag project">${esc(t)}</span>`).join(''):'<span style="color:var(--text-dim);font-size:0.72rem">None listed</span>'}</div>
      </div>

      ${c.accomplishments?`<div class="prep-section"><div class="prep-section-title">RECENT ACCOMPLISHMENTS</div><div class="prep-notes">${esc(c.accomplishments)}</div></div>`:''}

      ${c.concerns?`<div class="prep-section"><div class="prep-section-title" style="color:var(--red)">CONCERNS / ISSUES TO ADDRESS</div><div class="prep-notes" style="border-color:rgba(255,51,85,.3)">${esc(c.concerns)}</div></div>`:''}

      <div class="prep-section">
        <div class="prep-section-title">RISK ASSESSMENT</div>
        <div class="prep-grid">
          <div class="prep-stat"><div class="stat-label">Flight Risk</div><div class="stat-value">${c.flightRisk?`<span class="risk-badge ${c.flightRisk}">${c.flightRisk.charAt(0).toUpperCase()+c.flightRisk.slice(1)}</span>`:'--'}</div></div>
          <div class="prep-stat"><div class="stat-label">Retention Priority</div><div class="stat-value">${c.retentionPriority?`<span class="risk-badge ${c.retentionPriority}">${c.retentionPriority.charAt(0).toUpperCase()+c.retentionPriority.slice(1)}</span>`:'--'}</div></div>
        </div>
      </div>

      ${c.commStyle?`<div class="prep-section"><div class="prep-section-title">COMMUNICATION STYLE</div><div class="prep-notes">${esc(c.commStyle)}</div></div>`:''}

      ${lastMeeting?`
        <div class="prep-section">
          <div class="prep-section-title">LAST MEETING</div>
          <div class="prep-notes">
            <strong>${formatDate(lastMeeting.date)} - ${esc(lastMeeting.topic)}</strong><br><br>
            ${lastMeeting.notes?esc(lastMeeting.notes)+'<br><br>':''}
            ${lastMeeting.actions?'<strong>Action Items:</strong><br>'+esc(lastMeeting.actions):''}
          </div>
        </div>
      `:''}
    </div>
  `;
}

// ---- Add/Edit Modal ----
const formFields = ['firstName','lastName','nickname','phone','email','linkedin','birthday','spouse','children','hobbies','personalNotes','title','department','status','hireDate','employmentType','officeLocation','manager','directReports','salary','bonus','lastRaiseDate','lastRaiseAmount','perfRating','workNotes','strengths','weaknesses','commStyle','projects','accomplishments','concerns','lastOneOnOne','lastVacation','vacationDuration','upcomingPTO','flightRisk','retentionPriority','careerGoals','successionNotes','trainingNeeds'];

function openAddModal() {
  document.getElementById('modalTitle').textContent = 'Add Person';
  document.getElementById('f_id').value = '';
  formFields.forEach(f => {
    const el = document.getElementById('f_'+f);
    if(el) el.value = '';
  });
  document.getElementById('f_status').value = 'active';
  document.getElementById('f_employmentType').value = 'full-time';
  document.getElementById('f_photo').value = '';
  pendingPhotoData = null;
  document.getElementById('personModal').classList.add('show');
}

function openEditModal(id) {
  const c = contacts.find(x => x.id === id);
  if(!c) return;
  document.getElementById('modalTitle').textContent = 'Edit Person';
  document.getElementById('f_id').value = c.id;
  formFields.forEach(f => {
    const el = document.getElementById('f_'+f);
    if(el) el.value = c[f] || '';
  });
  document.getElementById('f_photo').value = '';
  pendingPhotoData = null;
  document.getElementById('personModal').classList.add('show');
}

function closeModal() {
  document.getElementById('personModal').classList.remove('show');
}

function handlePhotoSelect(e) {
  const file = e.target.files[0];
  if(!file) return;
  const reader = new FileReader();
  reader.onload = ev => { pendingPhotoData = ev.target.result; };
  reader.readAsDataURL(file);
}

async function savePerson(e) {
  e.preventDefault();
  const id = document.getElementById('f_id').value || genId();
  const isNew = !document.getElementById('f_id').value;
  const data = { id };
  formFields.forEach(f => {
    const el = document.getElementById('f_'+f);
    data[f] = el ? el.value.trim() : '';
  });
  if(data.perfRating) data.perfRating = parseInt(data.perfRating);

  if(isNew) {
    data.meetings = [];
    contacts.push(data);
  } else {
    const idx = contacts.findIndex(x => x.id === id);
    if(idx >= 0) {
      data.meetings = contacts[idx].meetings || [];
      contacts[idx] = data;
    }
  }

  if(pendingPhotoData) {
    await savePhoto(id, pendingPhotoData);
    pendingPhotoData = null;
  }

  saveContacts();
  renderList();
  closeModal();
  selectContact(id);
}

// ---- Photo upload from dossier ----
function uploadPhotoFor(id) {
  const input = document.createElement('input');
  input.type = 'file';
  input.accept = 'image/*';
  input.onchange = async e => {
    const file = e.target.files[0];
    if(!file) return;
    const reader = new FileReader();
    reader.onload = async ev => {
      await savePhoto(id, ev.target.result);
      showDossier(id);
      renderList();
    };
    reader.readAsDataURL(file);
  };
  input.click();
}

// ---- Meeting Log ----
function openMeetingModal(contactId) {
  document.getElementById('m_contactId').value = contactId;
  document.getElementById('m_date').value = new Date().toISOString().slice(0,10);
  document.getElementById('m_topic').value = '';
  document.getElementById('m_notes').value = '';
  document.getElementById('m_actions').value = '';
  document.getElementById('meetingModal').classList.add('show');
}
function closeMeetingModal() {
  document.getElementById('meetingModal').classList.remove('show');
}
function saveMeetingLog(e) {
  e.preventDefault();
  const cid = document.getElementById('m_contactId').value;
  const c = contacts.find(x => x.id === cid);
  if(!c) return;
  if(!c.meetings) c.meetings = [];
  c.meetings.push({
    date: document.getElementById('m_date').value,
    topic: document.getElementById('m_topic').value.trim(),
    notes: document.getElementById('m_notes').value.trim(),
    actions: document.getElementById('m_actions').value.trim()
  });
  saveContacts();
  closeMeetingModal();
  showDossier(cid);
}
function deleteMeeting(contactId, idx) {
  showConfirm('Delete this meeting log?', () => {
    const c = contacts.find(x => x.id === contactId);
    if(c && c.meetings) {
      c.meetings.splice(idx, 1);
      saveContacts();
      showDossier(contactId);
    }
  });
}

// ---- Delete Person ----
function deletePerson(id) {
  const c = contacts.find(x => x.id === id);
  if(!c) return;
  showConfirm(`Delete ${c.firstName} ${c.lastName}? This cannot be undone.`, async () => {
    contacts = contacts.filter(x => x.id !== id);
    saveContacts();
    await deletePhoto(id).catch(()=>{});
    selectedId = null;
    document.getElementById('dossierView').style.display = 'none';
    document.getElementById('prepView').style.display = 'none';
    document.getElementById('emptyState').style.display = 'flex';
    renderList();
  });
}

// ---- Confirm Dialog ----
function showConfirm(msg, cb) {
  document.getElementById('confirmMsg').textContent = msg;
  confirmCallback = cb;
  document.getElementById('confirmOverlay').classList.add('show');
}
function closeConfirm() {
  document.getElementById('confirmOverlay').classList.remove('show');
  confirmCallback = null;
}
function confirmAction() {
  if(confirmCallback) confirmCallback();
  closeConfirm();
}

// ---- Import / Export ----
function exportData() {
  const blob = new Blob([JSON.stringify(contacts, null, 2)], {type:'application/json'});
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = 'korb_dossier_export_' + new Date().toISOString().slice(0,10) + '.json';
  a.click();
  URL.revokeObjectURL(a.href);
}

function importData(e) {
  const file = e.target.files[0];
  if(!file) return;
  const reader = new FileReader();
  reader.onload = ev => {
    try {
      const data = JSON.parse(ev.target.result);
      if(!Array.isArray(data)) throw new Error('Invalid format');
      showConfirm(`Import ${data.length} contacts? This will merge with existing data.`, () => {
        data.forEach(imported => {
          if(!imported.id) imported.id = genId();
          const existing = contacts.findIndex(x => x.id === imported.id);
          if(existing >= 0) {
            contacts[existing] = imported;
          } else {
            contacts.push(imported);
          }
        });
        saveContacts();
        renderList();
      });
    } catch(err) {
      alert('Invalid JSON file: ' + err.message);
    }
  };
  reader.readAsText(file);
  e.target.value = '';
}

// ---- Init ----
async function init() {
  await initDB();
  loadContacts();
  renderList();
}
init();
</script>
