<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>KORB TRAVEL // Itinerary System</title>
<link href="https://fonts.googleapis.com/css2?family=DSEG14+Classic:wght@400;700&family=IBM+Plex+Mono:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#050a0f;--bg2:#0a1018;--bg3:#0f1620;--bg4:#141e2a;
  --cyan:#00d4ff;--orange:#ff6600;--purple:#a855f7;--green:#22c55e;--yellow:#eab308;--red:#ef4444;
  --text:#c8d6e5;--text-dim:#5a6a7a;--border:#1a2a3a;
  --glow-cyan:0 0 8px rgba(0,212,255,.4),0 0 20px rgba(0,212,255,.15);
  --glow-orange:0 0 8px rgba(255,102,0,.4),0 0 20px rgba(255,102,0,.15);
}
html{font-size:14px}
body{background:var(--bg);color:var(--text);font-family:'IBM Plex Mono',monospace;min-height:100vh;overflow-x:hidden}
body::after{content:'';position:fixed;top:0;left:0;width:100%;height:100%;pointer-events:none;z-index:9999;
  background:repeating-linear-gradient(0deg,transparent,transparent 2px,rgba(0,0,0,.04) 2px,rgba(0,0,0,.04) 4px)}

/* SCROLLBAR */
::-webkit-scrollbar{width:6px}
::-webkit-scrollbar-track{background:var(--bg2)}
::-webkit-scrollbar-thumb{background:var(--border);border-radius:3px}
::-webkit-scrollbar-thumb:hover{background:var(--cyan)}

/* HEADER */
.header{background:var(--bg2);border-bottom:1px solid var(--border);padding:12px 24px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:100}
.header-left{display:flex;align-items:center;gap:16px}
.logo{font-family:'DSEG14 Classic',monospace;font-size:1.6rem;color:var(--cyan);text-shadow:var(--glow-cyan);letter-spacing:2px}
.logo-sub{font-size:.7rem;color:var(--text-dim);letter-spacing:4px;text-transform:uppercase}
.header-right{display:flex;align-items:center;gap:16px}
.user-email{color:var(--orange);font-size:.8rem;text-shadow:var(--glow-orange)}
.header-time{color:var(--text-dim);font-size:.75rem;font-family:'DSEG14 Classic',monospace}

/* LAYOUT */
.app{display:flex;min-height:calc(100vh - 60px)}
.sidebar{width:260px;background:var(--bg2);border-right:1px solid var(--border);padding:16px 0;flex-shrink:0;overflow-y:auto}
.main{flex:1;padding:24px;overflow-y:auto;max-height:calc(100vh - 60px)}

/* SIDEBAR NAV */
.nav-section{padding:8px 16px;margin-bottom:4px}
.nav-section-title{font-size:.65rem;color:var(--text-dim);text-transform:uppercase;letter-spacing:3px;margin-bottom:8px}
.nav-btn{display:flex;align-items:center;gap:10px;width:100%;padding:10px 16px;background:none;border:none;color:var(--text);font-family:inherit;font-size:.85rem;cursor:pointer;text-align:left;transition:all .15s;border-left:2px solid transparent}
.nav-btn:hover{background:rgba(0,212,255,.05);color:var(--cyan)}
.nav-btn.active{background:rgba(0,212,255,.08);color:var(--cyan);border-left-color:var(--cyan)}
.nav-btn .icon{font-size:1rem;width:20px;text-align:center}
.nav-divider{height:1px;background:var(--border);margin:12px 16px}
.trip-list-item{display:flex;align-items:center;gap:10px;width:100%;padding:8px 16px 8px 24px;background:none;border:none;color:var(--text);font-family:inherit;font-size:.8rem;cursor:pointer;text-align:left;transition:all .15s;border-left:2px solid transparent}
.trip-list-item:hover{background:rgba(0,212,255,.05);color:var(--cyan)}
.trip-list-item.active{background:rgba(0,212,255,.08);color:var(--cyan);border-left-color:var(--cyan)}
.trip-list-item .trip-dates{font-size:.65rem;color:var(--text-dim)}

/* BUTTONS */
.btn{padding:8px 16px;border:1px solid var(--border);background:var(--bg3);color:var(--text);font-family:inherit;font-size:.8rem;cursor:pointer;transition:all .15s;border-radius:2px}
.btn:hover{border-color:var(--cyan);color:var(--cyan)}
.btn-primary{border-color:var(--cyan);color:var(--cyan);background:rgba(0,212,255,.08)}
.btn-primary:hover{background:rgba(0,212,255,.15);box-shadow:var(--glow-cyan)}
.btn-danger{border-color:var(--red);color:var(--red);background:rgba(239,68,68,.05)}
.btn-danger:hover{background:rgba(239,68,68,.15)}
.btn-sm{padding:4px 10px;font-size:.75rem}
.btn-icon{padding:4px 8px;font-size:1rem;line-height:1;background:none;border:1px solid transparent}
.btn-icon:hover{border-color:var(--cyan)}

/* FORMS */
.form-group{margin-bottom:14px}
.form-group label{display:block;font-size:.7rem;color:var(--text-dim);text-transform:uppercase;letter-spacing:2px;margin-bottom:4px}
.form-row{display:flex;gap:12px}
.form-row .form-group{flex:1}
input,select,textarea{width:100%;padding:8px 10px;background:var(--bg);border:1px solid var(--border);color:var(--text);font-family:inherit;font-size:.85rem;border-radius:2px;transition:border-color .15s}
input:focus,select:focus,textarea:focus{outline:none;border-color:var(--cyan);box-shadow:0 0 6px rgba(0,212,255,.2)}
textarea{resize:vertical;min-height:60px}
select{cursor:pointer}
select option{background:var(--bg2);color:var(--text)}

/* PANELS */
.panel{background:var(--bg2);border:1px solid var(--border);border-radius:3px;margin-bottom:20px}
.panel-header{padding:12px 16px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between}
.panel-title{font-family:'DSEG14 Classic',monospace;font-size:.95rem;color:var(--cyan);text-shadow:var(--glow-cyan)}
.panel-body{padding:16px}

/* TRIP DASHBOARD */
.dashboard-stats{display:grid;grid-template-columns:repeat(auto-fit,minmax(180px,1fr));gap:16px;margin-bottom:24px}
.stat-card{background:var(--bg2);border:1px solid var(--border);border-radius:3px;padding:16px;text-align:center}
.stat-value{font-family:'DSEG14 Classic',monospace;font-size:1.8rem;color:var(--cyan);text-shadow:var(--glow-cyan)}
.stat-label{font-size:.7rem;color:var(--text-dim);text-transform:uppercase;letter-spacing:2px;margin-top:4px}
.trip-card{background:var(--bg2);border:1px solid var(--border);border-radius:3px;padding:16px;margin-bottom:12px;cursor:pointer;transition:all .15s}
.trip-card:hover{border-color:var(--cyan);box-shadow:0 0 12px rgba(0,212,255,.1)}
.trip-card-header{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:8px}
.trip-card-name{font-family:'DSEG14 Classic',monospace;font-size:1rem;color:var(--cyan)}
.trip-card-dest{color:var(--orange);font-size:.85rem}
.trip-card-dates{font-size:.75rem;color:var(--text-dim);margin-top:4px}
.trip-card-segments{display:flex;gap:8px;margin-top:8px;flex-wrap:wrap}
.segment-badge{font-size:.65rem;padding:2px 8px;border-radius:10px;border:1px solid}
.segment-badge.flight{color:var(--cyan);border-color:var(--cyan);background:rgba(0,212,255,.08)}
.segment-badge.hotel{color:var(--purple);border-color:var(--purple);background:rgba(168,85,247,.08)}
.segment-badge.car{color:var(--orange);border-color:var(--orange);background:rgba(255,102,0,.08)}
.segment-badge.activity{color:var(--green);border-color:var(--green);background:rgba(34,197,94,.08)}
.segment-badge.restaurant{color:var(--yellow);border-color:var(--yellow);background:rgba(234,179,8,.08)}

/* TIMELINE */
.timeline{position:relative;padding-left:32px}
.timeline::before{content:'';position:absolute;left:11px;top:0;bottom:0;width:1px;background:var(--border)}
.timeline-item{position:relative;margin-bottom:16px}
.timeline-dot{position:absolute;left:-32px;top:12px;width:11px;height:11px;border-radius:50%;border:2px solid;background:var(--bg)}
.timeline-dot.flight{border-color:var(--cyan)}
.timeline-dot.hotel{border-color:var(--purple)}
.timeline-dot.car{border-color:var(--orange)}
.timeline-dot.activity{border-color:var(--green)}
.timeline-dot.restaurant{border-color:var(--yellow)}
.segment-card{background:var(--bg3);border:1px solid var(--border);border-radius:3px;padding:12px 16px;transition:all .15s}
.segment-card:hover{border-color:rgba(0,212,255,.3)}
.segment-card-header{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:6px}
.segment-type{font-size:.6rem;text-transform:uppercase;letter-spacing:2px;padding:2px 8px;border-radius:2px;border:1px solid}
.segment-type.flight{color:var(--cyan);border-color:var(--cyan)}
.segment-type.hotel{color:var(--purple);border-color:var(--purple)}
.segment-type.car{color:var(--orange);border-color:var(--orange)}
.segment-type.activity{color:var(--green);border-color:var(--green)}
.segment-type.restaurant{color:var(--yellow);border-color:var(--yellow)}
.segment-title{font-size:.95rem;color:#fff;margin-bottom:4px}
.segment-detail{font-size:.8rem;color:var(--text-dim);display:flex;align-items:center;gap:6px;margin-top:3px}
.segment-detail .icon{font-size:.85rem}
.segment-actions{display:flex;gap:4px}
.segment-datetime{font-family:'DSEG14 Classic',monospace;font-size:.75rem;color:var(--text-dim);margin-bottom:2px}
.confirmation{font-size:.7rem;color:var(--orange);font-family:'DSEG14 Classic',monospace;letter-spacing:1px}

/* MODAL */
.modal-overlay{position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,.7);z-index:200;display:flex;align-items:center;justify-content:center;opacity:0;pointer-events:none;transition:opacity .2s}
.modal-overlay.show{opacity:1;pointer-events:all}
.modal{background:var(--bg2);border:1px solid var(--border);border-radius:4px;width:90%;max-width:560px;max-height:85vh;overflow-y:auto}
.modal-header{padding:14px 18px;border-bottom:1px solid var(--border);display:flex;justify-content:space-between;align-items:center}
.modal-title{font-family:'DSEG14 Classic',monospace;color:var(--cyan);font-size:.9rem}
.modal-body{padding:18px}
.modal-footer{padding:12px 18px;border-top:1px solid var(--border);display:flex;justify-content:flex-end;gap:8px}

/* EMPTY STATE */
.empty-state{text-align:center;padding:60px 20px;color:var(--text-dim)}
.empty-state .icon{font-size:3rem;margin-bottom:16px;opacity:.4}
.empty-state p{font-size:.85rem;margin-bottom:16px}

/* RESPONSIVE */
@media(max-width:768px){
  .app{flex-direction:column}
  .sidebar{width:100%;border-right:none;border-bottom:1px solid var(--border);padding:8px 0;max-height:200px}
  .main{max-height:none;padding:16px}
  .form-row{flex-direction:column;gap:0}
  .dashboard-stats{grid-template-columns:repeat(2,1fr)}
  .header{padding:10px 16px;flex-wrap:wrap;gap:8px}
}

/* ANIMATIONS */
@keyframes fadeIn{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
.fade-in{animation:fadeIn .25s ease}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.5}}
.pulse{animation:pulse 2s ease infinite}
</style>
</head>
<body>

<div class="header">
  <div class="header-left">
    <div>
      <div class="logo">KORB TRAVEL</div>
      <div class="logo-sub">Itinerary Management System</div>
    </div>
  </div>
  <div class="header-right">
    <span class="user-email">&#9654; hakorb@gmail.com</span>
    <span class="header-time" id="headerTime"></span>
  </div>
</div>

<div class="app">
  <div class="sidebar">
    <div class="nav-section">
      <div class="nav-section-title">Navigation</div>
      <button class="nav-btn active" onclick="showView('dashboard')" id="navDashboard">
        <span class="icon">&#9632;</span> Dashboard
      </button>
      <button class="nav-btn" onclick="showView('create')" id="navCreate">
        <span class="icon">+</span> New Trip
      </button>
    </div>
    <div class="nav-divider"></div>
    <div class="nav-section">
      <div class="nav-section-title">Upcoming</div>
      <div id="upcomingList"></div>
    </div>
    <div class="nav-divider"></div>
    <div class="nav-section">
      <div class="nav-section-title">Past</div>
      <div id="pastList"></div>
    </div>
  </div>

  <div class="main" id="mainContent">
    <!-- Dynamic content injected here -->
  </div>
</div>

<!-- SEGMENT MODAL -->
<div class="modal-overlay" id="segmentModal">
  <div class="modal">
    <div class="modal-header">
      <span class="modal-title" id="segmentModalTitle">Add Segment</span>
      <button class="btn-icon" onclick="closeSegmentModal()">&times;</button>
    </div>
    <div class="modal-body" id="segmentModalBody"></div>
    <div class="modal-footer">
      <button class="btn" onclick="closeSegmentModal()">Cancel</button>
      <button class="btn btn-primary" onclick="saveSegment()" id="segmentSaveBtn">Save</button>
    </div>
  </div>
</div>

<!-- CONFIRM MODAL -->
<div class="modal-overlay" id="confirmModal">
  <div class="modal" style="max-width:380px">
    <div class="modal-header">
      <span class="modal-title">Confirm</span>
      <button class="btn-icon" onclick="closeConfirm()">&times;</button>
    </div>
    <div class="modal-body" id="confirmBody"></div>
    <div class="modal-footer">
      <button class="btn" onclick="closeConfirm()">Cancel</button>
      <button class="btn btn-danger" onclick="confirmAction()" id="confirmBtn">Delete</button>
    </div>
  </div>
</div>

<script>
// ---- DATA LAYER ----
const STORAGE_KEY = 'korb_travel_data';
let data = { trips: [] };
let currentView = 'dashboard';
let currentTripId = null;
let editingSegmentId = null;
let pendingConfirm = null;

function load() {
  try { const d = localStorage.getItem(STORAGE_KEY); if (d) data = JSON.parse(d); } catch(e) { data = { trips: [] }; }
}
function save() { localStorage.setItem(STORAGE_KEY, JSON.stringify(data)); }
function uid() { return Date.now().toString(36) + Math.random().toString(36).slice(2, 8); }
function getTrip(id) { return data.trips.find(t => t.id === id); }

// ---- TIME ----
function updateClock() {
  const now = new Date();
  document.getElementById('headerTime').textContent = now.toISOString().slice(0,16).replace('T',' ');
}
setInterval(updateClock, 10000); updateClock();

// ---- DATE HELPERS ----
function fmtDate(d) { if (!d) return '--'; const dt = new Date(d+'T00:00:00'); return dt.toLocaleDateString('en-US',{month:'short',day:'numeric',year:'numeric'}); }
function fmtDateTime(d,t) { if (!d) return '--'; let s = fmtDate(d); if (t) s += ' ' + t; return s; }
function sortKey(seg) {
  let d = seg.date || seg.startDate || seg.checkIn || seg.pickupDate || '';
  let t = seg.time || seg.departureTime || seg.reservationTime || seg.pickupTime || '00:00';
  return d + 'T' + t;
}
function isUpcoming(trip) { return trip.endDate >= new Date().toISOString().slice(0,10); }

// ---- NAVIGATION ----
function showView(view, tripId) {
  currentView = view;
  currentTripId = tripId || null;
  document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
  document.querySelectorAll('.trip-list-item').forEach(b => b.classList.remove('active'));
  if (view === 'dashboard') document.getElementById('navDashboard').classList.add('active');
  else if (view === 'create') document.getElementById('navCreate').classList.add('active');
  else if (view === 'trip' && tripId) {
    const el = document.querySelector(`[data-trip="${tripId}"]`);
    if (el) el.classList.add('active');
  }
  render();
}

function refreshSidebar() {
  const now = new Date().toISOString().slice(0,10);
  const upcoming = data.trips.filter(t => t.endDate >= now).sort((a,b) => a.startDate.localeCompare(b.startDate));
  const past = data.trips.filter(t => t.endDate < now).sort((a,b) => b.startDate.localeCompare(a.startDate));
  document.getElementById('upcomingList').innerHTML = upcoming.length ? upcoming.map(t =>
    `<button class="trip-list-item ${currentTripId===t.id?'active':''}" data-trip="${t.id}" onclick="showView('trip','${t.id}')">
      <div><div>${esc(t.name)}</div><div class="trip-dates">${fmtDate(t.startDate)}</div></div>
    </button>`
  ).join('') : '<div style="padding:4px 24px;font-size:.75rem;color:var(--text-dim)">No upcoming trips</div>';
  document.getElementById('pastList').innerHTML = past.length ? past.slice(0,10).map(t =>
    `<button class="trip-list-item ${currentTripId===t.id?'active':''}" data-trip="${t.id}" onclick="showView('trip','${t.id}')">
      <div><div>${esc(t.name)}</div><div class="trip-dates">${fmtDate(t.startDate)}</div></div>
    </button>`
  ).join('') : '<div style="padding:4px 24px;font-size:.75rem;color:var(--text-dim)">No past trips</div>';
}

// ---- RENDER ----
function render() {
  refreshSidebar();
  const mc = document.getElementById('mainContent');
  if (currentView === 'dashboard') mc.innerHTML = renderDashboard();
  else if (currentView === 'create') mc.innerHTML = renderCreateTrip();
  else if (currentView === 'edit') mc.innerHTML = renderCreateTrip(currentTripId);
  else if (currentView === 'trip') mc.innerHTML = renderTripDetail(currentTripId);
}

function esc(s) { if (!s) return ''; const d = document.createElement('div'); d.textContent = s; return d.innerHTML; }

// ---- DASHBOARD ----
function renderDashboard() {
  const now = new Date().toISOString().slice(0,10);
  const upcoming = data.trips.filter(t => t.endDate >= now).sort((a,b) => a.startDate.localeCompare(b.startDate));
  const past = data.trips.filter(t => t.endDate < now);
  const totalSegs = data.trips.reduce((a,t) => a + (t.segments||[]).length, 0);
  let h = `<div class="fade-in">
    <div class="dashboard-stats">
      <div class="stat-card"><div class="stat-value">${data.trips.length}</div><div class="stat-label">Total Trips</div></div>
      <div class="stat-card"><div class="stat-value">${upcoming.length}</div><div class="stat-label">Upcoming</div></div>
      <div class="stat-card"><div class="stat-value">${past.length}</div><div class="stat-label">Past</div></div>
      <div class="stat-card"><div class="stat-value">${totalSegs}</div><div class="stat-label">Segments</div></div>
    </div>`;
  if (upcoming.length) {
    h += `<div class="panel"><div class="panel-header"><span class="panel-title">UPCOMING TRIPS</span></div><div class="panel-body">`;
    upcoming.forEach(t => { h += renderTripCard(t); });
    h += `</div></div>`;
  }
  if (past.length) {
    h += `<div class="panel"><div class="panel-header"><span class="panel-title">PAST TRIPS</span></div><div class="panel-body">`;
    past.sort((a,b)=>b.startDate.localeCompare(a.startDate)).forEach(t => { h += renderTripCard(t); });
    h += `</div></div>`;
  }
  if (!data.trips.length) {
    h += `<div class="empty-state"><div class="icon">&#9992;</div><p>No trips yet. Create your first trip to get started.</p>
      <button class="btn btn-primary" onclick="showView('create')">+ New Trip</button></div>`;
  }
  h += `</div>`;
  return h;
}

function renderTripCard(t) {
  const segs = t.segments || [];
  const counts = {};
  segs.forEach(s => { counts[s.type] = (counts[s.type]||0)+1; });
  return `<div class="trip-card" onclick="showView('trip','${t.id}')">
    <div class="trip-card-header">
      <div>
        <div class="trip-card-name">${esc(t.name)}</div>
        <div class="trip-card-dest">${esc(t.destination)}</div>
        <div class="trip-card-dates">${fmtDate(t.startDate)} &mdash; ${fmtDate(t.endDate)}</div>
      </div>
    </div>
    <div class="trip-card-segments">
      ${Object.entries(counts).map(([type,n]) => `<span class="segment-badge ${type}">${n} ${type}${n>1?'s':''}</span>`).join('')}
    </div>
  </div>`;
}

// ---- CREATE / EDIT TRIP ----
function renderCreateTrip(editId) {
  const t = editId ? getTrip(editId) : null;
  return `<div class="fade-in"><div class="panel">
    <div class="panel-header"><span class="panel-title">${t ? 'EDIT TRIP' : 'NEW TRIP'}</span></div>
    <div class="panel-body">
      <div class="form-group"><label>Trip Name</label><input id="tripName" value="${t?esc(t.name):''}" placeholder="e.g. ASCE Conference 2026"></div>
      <div class="form-group"><label>Destination</label><input id="tripDest" value="${t?esc(t.destination):''}" placeholder="e.g. Orlando, FL"></div>
      <div class="form-row">
        <div class="form-group"><label>Start Date</label><input type="date" id="tripStart" value="${t?t.startDate:''}"></div>
        <div class="form-group"><label>End Date</label><input type="date" id="tripEnd" value="${t?t.endDate:''}"></div>
      </div>
      <div class="form-group"><label>Notes</label><textarea id="tripNotes" rows="3" placeholder="Optional notes...">${t?esc(t.notes):''}</textarea></div>
      <div style="display:flex;gap:8px">
        <button class="btn btn-primary" onclick="saveTrip('${editId||''}')">${t?'Update Trip':'Create Trip'}</button>
        <button class="btn" onclick="showView('dashboard')">Cancel</button>
      </div>
    </div>
  </div></div>`;
}

function saveTrip(editId) {
  const name = document.getElementById('tripName').value.trim();
  const dest = document.getElementById('tripDest').value.trim();
  const start = document.getElementById('tripStart').value;
  const end = document.getElementById('tripEnd').value;
  const notes = document.getElementById('tripNotes').value.trim();
  if (!name || !dest || !start || !end) { alert('Please fill in name, destination, and dates.'); return; }
  if (end < start) { alert('End date must be after start date.'); return; }
  if (editId) {
    const t = getTrip(editId);
    if (t) { t.name=name; t.destination=dest; t.startDate=start; t.endDate=end; t.notes=notes; }
  } else {
    data.trips.push({ id:uid(), name, destination:dest, startDate:start, endDate:end, notes, segments:[] });
  }
  save();
  showView('dashboard');
}

// ---- TRIP DETAIL ----
function renderTripDetail(tripId) {
  const t = getTrip(tripId);
  if (!t) return '<div class="empty-state"><p>Trip not found.</p></div>';
  const segs = (t.segments||[]).slice().sort((a,b) => sortKey(a).localeCompare(sortKey(b)));
  let h = `<div class="fade-in">
    <div class="panel">
      <div class="panel-header">
        <div>
          <span class="panel-title">${esc(t.name)}</span>
          <div style="font-size:.8rem;color:var(--orange);margin-top:2px">${esc(t.destination)}</div>
        </div>
        <div style="display:flex;gap:6px;align-items:center">
          <button class="btn btn-sm" onclick="exportTrip('${t.id}')">Export</button>
          <button class="btn btn-sm" onclick="currentView='edit';currentTripId='${t.id}';render()">Edit</button>
          <button class="btn btn-sm btn-danger" onclick="deleteTrip('${t.id}')">Delete</button>
        </div>
      </div>
      <div class="panel-body">
        <div style="display:flex;gap:24px;flex-wrap:wrap;margin-bottom:8px">
          <div><span style="color:var(--text-dim);font-size:.7rem;text-transform:uppercase;letter-spacing:1px">Dates</span><br>
            <span style="font-family:'DSEG14 Classic',monospace;font-size:.8rem;color:var(--cyan)">${fmtDate(t.startDate)} &mdash; ${fmtDate(t.endDate)}</span></div>
          <div><span style="color:var(--text-dim);font-size:.7rem;text-transform:uppercase;letter-spacing:1px">Segments</span><br>
            <span style="font-family:'DSEG14 Classic',monospace;font-size:.8rem;color:var(--cyan)">${segs.length}</span></div>
        </div>
        ${t.notes ? `<div style="font-size:.8rem;color:var(--text-dim);margin-top:8px;padding:8px;background:var(--bg);border-radius:2px">${esc(t.notes)}</div>` : ''}
      </div>
    </div>

    <div class="panel">
      <div class="panel-header">
        <span class="panel-title">SEGMENTS</span>
        <div style="display:flex;gap:6px;flex-wrap:wrap">
          <button class="btn btn-sm btn-primary" onclick="openSegmentModal('flight','${t.id}')">+ Flight</button>
          <button class="btn btn-sm" style="border-color:var(--purple);color:var(--purple)" onclick="openSegmentModal('hotel','${t.id}')">+ Hotel</button>
          <button class="btn btn-sm" style="border-color:var(--orange);color:var(--orange)" onclick="openSegmentModal('car','${t.id}')">+ Car</button>
          <button class="btn btn-sm" style="border-color:var(--green);color:var(--green)" onclick="openSegmentModal('activity','${t.id}')">+ Activity</button>
          <button class="btn btn-sm" style="border-color:var(--yellow);color:var(--yellow)" onclick="openSegmentModal('restaurant','${t.id}')">+ Restaurant</button>
        </div>
      </div>
      <div class="panel-body">`;
  if (!segs.length) {
    h += `<div class="empty-state" style="padding:30px"><div class="icon">&#128203;</div><p>No segments yet. Add flights, hotels, cars, activities, or restaurants above.</p></div>`;
  } else {
    h += `<div class="timeline">`;
    segs.forEach(s => { h += renderSegment(s, t.id); });
    h += `</div>`;
  }
  h += `</div></div></div>`;
  return h;
}

function renderSegment(s, tripId) {
  let details = '';
  if (s.type === 'flight') {
    details = `
      <div class="segment-title">${esc(s.airline)} ${esc(s.flightNumber)}</div>
      <div class="segment-datetime">${fmtDateTime(s.date, s.departureTime)} &rarr; ${s.arrivalTime||'--'}</div>
      <div class="segment-detail"><span class="icon">&#9992;</span> ${esc(s.departureAirport)} &rarr; ${esc(s.arrivalAirport)}</div>
      ${s.confirmation ? `<div class="confirmation">CONF# ${esc(s.confirmation)}</div>` : ''}`;
  } else if (s.type === 'hotel') {
    details = `
      <div class="segment-title">${esc(s.hotelName)}</div>
      <div class="segment-datetime">${fmtDate(s.checkIn)} &mdash; ${fmtDate(s.checkOut)}</div>
      ${s.address ? `<div class="segment-detail"><span class="icon">&#9873;</span> ${esc(s.address)}</div>` : ''}
      ${s.confirmation ? `<div class="confirmation">CONF# ${esc(s.confirmation)}</div>` : ''}`;
  } else if (s.type === 'car') {
    details = `
      <div class="segment-title">${esc(s.company)}</div>
      <div class="segment-datetime">${fmtDateTime(s.pickupDate, s.pickupTime)} &mdash; ${fmtDateTime(s.dropoffDate, s.dropoffTime)}</div>
      <div class="segment-detail"><span class="icon">&#9654;</span> Pickup: ${esc(s.pickupLocation)}</div>
      ${s.dropoffLocation ? `<div class="segment-detail"><span class="icon">&#9632;</span> Dropoff: ${esc(s.dropoffLocation)}</div>` : ''}
      ${s.confirmation ? `<div class="confirmation">CONF# ${esc(s.confirmation)}</div>` : ''}`;
  } else if (s.type === 'activity') {
    details = `
      <div class="segment-title">${esc(s.activityName)}</div>
      <div class="segment-datetime">${fmtDateTime(s.date, s.time)}</div>
      ${s.location ? `<div class="segment-detail"><span class="icon">&#9873;</span> ${esc(s.location)}</div>` : ''}
      ${s.notes ? `<div class="segment-detail" style="color:var(--text-dim);font-size:.75rem">${esc(s.notes)}</div>` : ''}`;
  } else if (s.type === 'restaurant') {
    details = `
      <div class="segment-title">${esc(s.restaurantName)}</div>
      <div class="segment-datetime">${fmtDateTime(s.date, s.reservationTime)}</div>
      ${s.address ? `<div class="segment-detail"><span class="icon">&#9873;</span> ${esc(s.address)}</div>` : ''}
      ${s.partySize ? `<div class="segment-detail"><span class="icon">&#9823;</span> Party of ${esc(s.partySize)}</div>` : ''}`;
  }
  return `<div class="timeline-item">
    <div class="timeline-dot ${s.type}"></div>
    <div class="segment-card">
      <div class="segment-card-header">
        <span class="segment-type ${s.type}">${s.type}</span>
        <div class="segment-actions">
          <button class="btn-icon" title="Edit" onclick="openSegmentModal('${s.type}','${tripId}','${s.id}')">&#9998;</button>
          <button class="btn-icon" style="color:var(--red)" title="Delete" onclick="deleteSegment('${tripId}','${s.id}')">&#10005;</button>
        </div>
      </div>
      ${details}
    </div>
  </div>`;
}

// ---- SEGMENT MODAL ----
function openSegmentModal(type, tripId, segId) {
  editingSegmentId = segId || null;
  const trip = getTrip(tripId);
  const seg = segId ? (trip.segments||[]).find(s => s.id === segId) : null;
  const modal = document.getElementById('segmentModal');
  document.getElementById('segmentModalTitle').textContent = (seg ? 'Edit ' : 'Add ') + type.charAt(0).toUpperCase() + type.slice(1);
  modal.dataset.type = type;
  modal.dataset.tripId = tripId;
  let h = '';
  if (type === 'flight') {
    h = `
      <div class="form-row"><div class="form-group"><label>Airline</label><input id="segAirline" value="${seg?esc(seg.airline):''}"></div>
      <div class="form-group"><label>Flight #</label><input id="segFlightNum" value="${seg?esc(seg.flightNumber):''}"></div></div>
      <div class="form-row"><div class="form-group"><label>Departure Airport</label><input id="segDepAirport" value="${seg?esc(seg.departureAirport):''}" placeholder="e.g. MCO"></div>
      <div class="form-group"><label>Arrival Airport</label><input id="segArrAirport" value="${seg?esc(seg.arrivalAirport):''}" placeholder="e.g. JFK"></div></div>
      <div class="form-group"><label>Date</label><input type="date" id="segDate" value="${seg?seg.date:''}"></div>
      <div class="form-row"><div class="form-group"><label>Departure Time</label><input type="time" id="segDepTime" value="${seg?seg.departureTime||'':''}"></div>
      <div class="form-group"><label>Arrival Time</label><input type="time" id="segArrTime" value="${seg?seg.arrivalTime||'':''}"></div></div>
      <div class="form-group"><label>Confirmation #</label><input id="segConf" value="${seg?esc(seg.confirmation):''}"></div>`;
  } else if (type === 'hotel') {
    h = `
      <div class="form-group"><label>Hotel Name</label><input id="segHotelName" value="${seg?esc(seg.hotelName):''}"></div>
      <div class="form-group"><label>Address</label><input id="segAddress" value="${seg?esc(seg.address):''}"></div>
      <div class="form-row"><div class="form-group"><label>Check-In</label><input type="date" id="segCheckIn" value="${seg?seg.checkIn:''}"></div>
      <div class="form-group"><label>Check-Out</label><input type="date" id="segCheckOut" value="${seg?seg.checkOut:''}"></div></div>
      <div class="form-group"><label>Confirmation #</label><input id="segConf" value="${seg?esc(seg.confirmation):''}"></div>`;
  } else if (type === 'car') {
    h = `
      <div class="form-group"><label>Company</label><input id="segCompany" value="${seg?esc(seg.company):''}"></div>
      <div class="form-row"><div class="form-group"><label>Pickup Location</label><input id="segPickupLoc" value="${seg?esc(seg.pickupLocation):''}"></div>
      <div class="form-group"><label>Dropoff Location</label><input id="segDropoffLoc" value="${seg?esc(seg.dropoffLocation):''}"></div></div>
      <div class="form-row"><div class="form-group"><label>Pickup Date</label><input type="date" id="segPickupDate" value="${seg?seg.pickupDate:''}"></div>
      <div class="form-group"><label>Pickup Time</label><input type="time" id="segPickupTime" value="${seg?seg.pickupTime||'':''}"></div></div>
      <div class="form-row"><div class="form-group"><label>Dropoff Date</label><input type="date" id="segDropoffDate" value="${seg?seg.dropoffDate:''}"></div>
      <div class="form-group"><label>Dropoff Time</label><input type="time" id="segDropoffTime" value="${seg?seg.dropoffTime||'':''}"></div></div>
      <div class="form-group"><label>Confirmation #</label><input id="segConf" value="${seg?esc(seg.confirmation):''}"></div>`;
  } else if (type === 'activity') {
    h = `
      <div class="form-group"><label>Activity Name</label><input id="segActivityName" value="${seg?esc(seg.activityName):''}"></div>
      <div class="form-group"><label>Location</label><input id="segLocation" value="${seg?esc(seg.location):''}"></div>
      <div class="form-row"><div class="form-group"><label>Date</label><input type="date" id="segDate" value="${seg?seg.date:''}"></div>
      <div class="form-group"><label>Time</label><input type="time" id="segTime" value="${seg?seg.time||'':''}"></div></div>
      <div class="form-group"><label>Notes</label><textarea id="segNotes" rows="2">${seg?esc(seg.notes):''}</textarea></div>`;
  } else if (type === 'restaurant') {
    h = `
      <div class="form-group"><label>Restaurant Name</label><input id="segRestName" value="${seg?esc(seg.restaurantName):''}"></div>
      <div class="form-group"><label>Address</label><input id="segAddress" value="${seg?esc(seg.address):''}"></div>
      <div class="form-row"><div class="form-group"><label>Date</label><input type="date" id="segDate" value="${seg?seg.date:''}"></div>
      <div class="form-group"><label>Reservation Time</label><input type="time" id="segResTime" value="${seg?seg.reservationTime||'':''}"></div></div>
      <div class="form-group"><label>Party Size</label><input type="number" id="segPartySize" value="${seg?seg.partySize||'':''}" min="1"></div>`;
  }
  document.getElementById('segmentModalBody').innerHTML = h;
  modal.classList.add('show');
}

function closeSegmentModal() { document.getElementById('segmentModal').classList.remove('show'); editingSegmentId = null; }

function saveSegment() {
  const modal = document.getElementById('segmentModal');
  const type = modal.dataset.type;
  const tripId = modal.dataset.tripId;
  const trip = getTrip(tripId);
  if (!trip) return;
  if (!trip.segments) trip.segments = [];
  let seg = {};
  if (type === 'flight') {
    const airline = document.getElementById('segAirline').value.trim();
    const flightNumber = document.getElementById('segFlightNum').value.trim();
    const departureAirport = document.getElementById('segDepAirport').value.trim();
    const arrivalAirport = document.getElementById('segArrAirport').value.trim();
    const date = document.getElementById('segDate').value;
    if (!airline || !date) { alert('Airline and date are required.'); return; }
    seg = { type:'flight', airline, flightNumber, departureAirport, arrivalAirport, date,
      departureTime: document.getElementById('segDepTime').value,
      arrivalTime: document.getElementById('segArrTime').value,
      confirmation: document.getElementById('segConf').value.trim() };
  } else if (type === 'hotel') {
    const hotelName = document.getElementById('segHotelName').value.trim();
    const checkIn = document.getElementById('segCheckIn').value;
    if (!hotelName || !checkIn) { alert('Hotel name and check-in date are required.'); return; }
    seg = { type:'hotel', hotelName, address: document.getElementById('segAddress').value.trim(),
      checkIn, checkOut: document.getElementById('segCheckOut').value,
      confirmation: document.getElementById('segConf').value.trim() };
  } else if (type === 'car') {
    const company = document.getElementById('segCompany').value.trim();
    const pickupDate = document.getElementById('segPickupDate').value;
    if (!company || !pickupDate) { alert('Company and pickup date are required.'); return; }
    seg = { type:'car', company, pickupLocation: document.getElementById('segPickupLoc').value.trim(),
      dropoffLocation: document.getElementById('segDropoffLoc').value.trim(),
      pickupDate, pickupTime: document.getElementById('segPickupTime').value,
      dropoffDate: document.getElementById('segDropoffDate').value,
      dropoffTime: document.getElementById('segDropoffTime').value,
      confirmation: document.getElementById('segConf').value.trim() };
  } else if (type === 'activity') {
    const activityName = document.getElementById('segActivityName').value.trim();
    const date = document.getElementById('segDate').value;
    if (!activityName || !date) { alert('Name and date are required.'); return; }
    seg = { type:'activity', activityName, location: document.getElementById('segLocation').value.trim(),
      date, time: document.getElementById('segTime').value,
      notes: document.getElementById('segNotes').value.trim() };
  } else if (type === 'restaurant') {
    const restaurantName = document.getElementById('segRestName').value.trim();
    const date = document.getElementById('segDate').value;
    if (!restaurantName || !date) { alert('Name and date are required.'); return; }
    seg = { type:'restaurant', restaurantName, address: document.getElementById('segAddress').value.trim(),
      date, reservationTime: document.getElementById('segResTime').value,
      partySize: document.getElementById('segPartySize').value };
  }
  if (editingSegmentId) {
    const idx = trip.segments.findIndex(s => s.id === editingSegmentId);
    if (idx >= 0) { seg.id = editingSegmentId; trip.segments[idx] = seg; }
  } else {
    seg.id = uid();
    trip.segments.push(seg);
  }
  save();
  closeSegmentModal();
  showView('trip', tripId);
}

// ---- DELETE ----
function deleteTrip(tripId) {
  pendingConfirm = () => {
    data.trips = data.trips.filter(t => t.id !== tripId);
    save(); showView('dashboard');
  };
  document.getElementById('confirmBody').innerHTML = '<p>Are you sure you want to delete this trip and all its segments?</p>';
  document.getElementById('confirmModal').classList.add('show');
}
function deleteSegment(tripId, segId) {
  pendingConfirm = () => {
    const t = getTrip(tripId);
    if (t) { t.segments = (t.segments||[]).filter(s => s.id !== segId); save(); showView('trip', tripId); }
  };
  document.getElementById('confirmBody').innerHTML = '<p>Delete this segment?</p>';
  document.getElementById('confirmModal').classList.add('show');
}
function confirmAction() { if (pendingConfirm) pendingConfirm(); pendingConfirm = null; closeConfirm(); }
function closeConfirm() { document.getElementById('confirmModal').classList.remove('show'); pendingConfirm = null; }

// ---- EXPORT ----
function exportTrip(tripId) {
  const t = getTrip(tripId);
  if (!t) return;
  const segs = (t.segments||[]).slice().sort((a,b) => sortKey(a).localeCompare(sortKey(b)));
  let txt = `========================================\n`;
  txt += `  KORB TRAVEL - TRIP ITINERARY\n`;
  txt += `========================================\n\n`;
  txt += `Trip: ${t.name}\nDestination: ${t.destination}\nDates: ${fmtDate(t.startDate)} - ${fmtDate(t.endDate)}\n`;
  if (t.notes) txt += `Notes: ${t.notes}\n`;
  txt += `\n----------------------------------------\n`;
  txt += `  SEGMENTS (${segs.length})\n`;
  txt += `----------------------------------------\n\n`;
  segs.forEach(s => {
    txt += `[${s.type.toUpperCase()}]\n`;
    if (s.type === 'flight') {
      txt += `  ${s.airline} ${s.flightNumber}\n  ${s.departureAirport} -> ${s.arrivalAirport}\n  Date: ${fmtDate(s.date)} ${s.departureTime||''} - ${s.arrivalTime||''}\n`;
      if (s.confirmation) txt += `  Confirmation: ${s.confirmation}\n`;
    } else if (s.type === 'hotel') {
      txt += `  ${s.hotelName}\n  ${s.address||''}\n  Check-in: ${fmtDate(s.checkIn)} / Check-out: ${fmtDate(s.checkOut)}\n`;
      if (s.confirmation) txt += `  Confirmation: ${s.confirmation}\n`;
    } else if (s.type === 'car') {
      txt += `  ${s.company}\n  Pickup: ${s.pickupLocation||''} on ${fmtDate(s.pickupDate)} ${s.pickupTime||''}\n  Dropoff: ${s.dropoffLocation||''} on ${fmtDate(s.dropoffDate)} ${s.dropoffTime||''}\n`;
      if (s.confirmation) txt += `  Confirmation: ${s.confirmation}\n`;
    } else if (s.type === 'activity') {
      txt += `  ${s.activityName}\n  Location: ${s.location||''}\n  Date: ${fmtDate(s.date)} ${s.time||''}\n`;
      if (s.notes) txt += `  Notes: ${s.notes}\n`;
    } else if (s.type === 'restaurant') {
      txt += `  ${s.restaurantName}\n  ${s.address||''}\n  Date: ${fmtDate(s.date)} ${s.reservationTime||''}\n  Party: ${s.partySize||'--'}\n`;
    }
    txt += `\n`;
  });
  txt += `========================================\n`;
  txt += `  Generated by KORB TRAVEL // ${new Date().toISOString().slice(0,16)}\n`;
  txt += `========================================\n`;
  const blob = new Blob([txt], { type: 'text/plain' });
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = t.name.replace(/[^a-zA-Z0-9]/g,'_').toLowerCase() + '_itinerary.txt';
  a.click();
  URL.revokeObjectURL(a.href);
}

// ---- INIT ----
load();
render();

// Close modals on overlay click
document.getElementById('segmentModal').addEventListener('click', function(e) { if (e.target === this) closeSegmentModal(); });
document.getElementById('confirmModal').addEventListener('click', function(e) { if (e.target === this) closeConfirm(); });

// Keyboard shortcuts
document.addEventListener('keydown', function(e) {
  if (e.key === 'Escape') { closeSegmentModal(); closeConfirm(); }
});
</script>
</body>
</html>
