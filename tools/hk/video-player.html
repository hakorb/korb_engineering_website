<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Video Library | HK Tools</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
--bg:#050a0f;--surface:#0a1018;--surface2:#0e1520;--border:#1a2535;
--cyan:#00d4ff;--orange:#ff6600;--green:#10b981;--red:#ef4444;
--text:#e2e8f0;--text-dim:#64748b;--text-muted:#475569;
--radius:8px;--radius-lg:12px;
}
html{font-size:16px;-webkit-text-size-adjust:100%}
body{font-family:'JetBrains Mono',monospace;background:var(--bg);color:var(--text);min-height:100vh;overflow-x:hidden;line-height:1.5}
input,button,select,textarea{font-family:inherit;font-size:16px;color:var(--text);border:none;outline:none;background:none}
button{cursor:pointer;-webkit-tap-highlight-color:transparent}
::-webkit-scrollbar{width:6px;height:6px}
::-webkit-scrollbar-track{background:var(--surface)}
::-webkit-scrollbar-thumb{background:var(--border);border-radius:3px}
::-webkit-scrollbar-thumb:hover{background:var(--text-muted)}
::selection{background:var(--cyan);color:var(--bg)}

/* TOP BAR */
#topbar{position:sticky;top:0;z-index:100;display:flex;align-items:center;gap:8px;padding:8px 12px;background:var(--surface);border-bottom:1px solid var(--border);flex-wrap:wrap}
#topbar .logo{font-weight:700;color:var(--cyan);font-size:14px;white-space:nowrap;letter-spacing:1px;margin-right:4px}
#topbar .logo span{color:var(--orange)}
#searchBox{flex:1;min-width:120px;max-width:400px;background:var(--surface2);border:1px solid var(--border);border-radius:var(--radius);padding:10px 14px;font-size:14px;color:var(--text);transition:border-color .2s}
#searchBox:focus{border-color:var(--cyan)}
#searchBox::placeholder{color:var(--text-muted)}
.tb-btn{min-width:44px;min-height:44px;display:inline-flex;align-items:center;justify-content:center;gap:6px;padding:8px 14px;border-radius:var(--radius);font-size:13px;font-weight:500;background:var(--surface2);border:1px solid var(--border);color:var(--text-dim);transition:all .2s;white-space:nowrap}
.tb-btn:hover{border-color:var(--cyan);color:var(--cyan)}
.tb-btn.active{background:rgba(0,212,255,.1);border-color:var(--cyan);color:var(--cyan)}
.tb-btn.primary{background:var(--cyan);color:var(--bg);border-color:var(--cyan);font-weight:600}
.tb-btn.primary:hover{background:#33ddff;box-shadow:0 0 20px rgba(0,212,255,.3)}
.tb-btn.danger{color:var(--red);border-color:transparent}
.tb-btn.danger:hover{border-color:var(--red);background:rgba(239,68,68,.1)}
#sortSelect{min-height:44px;background:var(--surface2);border:1px solid var(--border);border-radius:var(--radius);padding:8px 12px;font-size:13px;color:var(--text-dim);cursor:pointer}
#sortSelect:focus{border-color:var(--cyan)}
#storageIndicator{font-size:11px;color:var(--text-muted);white-space:nowrap;padding:0 4px}

/* LAYOUT */
#appWrap{display:flex;height:calc(100vh - 60px)}
#sidebar{width:240px;min-width:200px;background:var(--surface);border-right:1px solid var(--border);overflow-y:auto;flex-shrink:0;transition:margin-left .3s}
#sidebar.collapsed{margin-left:-240px}
#mainArea{flex:1;overflow-y:auto;padding:16px;position:relative}

/* SIDEBAR */
.sb-section{padding:12px}
.sb-title{font-size:11px;font-weight:600;color:var(--text-muted);text-transform:uppercase;letter-spacing:1.5px;margin-bottom:8px}
.sb-item{display:flex;align-items:center;gap:8px;padding:10px 12px;border-radius:var(--radius);font-size:13px;color:var(--text-dim);cursor:pointer;transition:all .15s;min-height:44px}
.sb-item:hover{background:var(--surface2);color:var(--text)}
.sb-item.active{background:rgba(0,212,255,.08);color:var(--cyan)}
.sb-item .icon{font-size:16px;width:20px;text-align:center;flex-shrink:0}
.sb-item .count{margin-left:auto;font-size:11px;color:var(--text-muted);background:var(--surface2);padding:2px 8px;border-radius:10px}
.sb-divider{height:1px;background:var(--border);margin:8px 12px}
.sb-add{color:var(--cyan);font-size:12px;cursor:pointer;padding:6px 12px;display:flex;align-items:center;gap:6px;min-height:44px}
.sb-add:hover{text-decoration:underline}

/* DROP ZONE */
#dropOverlay{display:none;position:fixed;inset:0;z-index:500;background:rgba(5,10,15,.92);align-items:center;justify-content:center;flex-direction:column;gap:16px}
#dropOverlay.visible{display:flex}
#dropOverlay .ring{width:200px;height:200px;border:3px dashed var(--cyan);border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:48px;animation:pulse 1.5s ease-in-out infinite}
@keyframes pulse{0%,100%{opacity:.6;transform:scale(1)}50%{opacity:1;transform:scale(1.05)}}
#dropOverlay p{font-size:16px;color:var(--cyan);font-weight:500}
#dropOverlay .sub{font-size:12px;color:var(--text-muted)}

/* UPLOAD ZONE (in-page) */
#uploadZone{border:2px dashed var(--border);border-radius:var(--radius-lg);padding:48px 24px;text-align:center;cursor:pointer;transition:all .3s;margin-bottom:20px;background:var(--surface)}
#uploadZone:hover,#uploadZone.dragover{border-color:var(--cyan);background:rgba(0,212,255,.03)}
#uploadZone .uz-icon{font-size:48px;margin-bottom:12px;opacity:.5}
#uploadZone .uz-title{font-size:16px;font-weight:600;margin-bottom:4px}
#uploadZone .uz-sub{font-size:12px;color:var(--text-muted)}
#uploadZone input{display:none}

/* UPLOAD PROGRESS */
#uploadProgress{display:none;background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:16px;margin-bottom:16px}
#uploadProgress.visible{display:block}
.up-filename{font-size:13px;font-weight:500;margin-bottom:4px}
.up-info{font-size:11px;color:var(--text-muted);margin-bottom:8px}
.up-bar-track{height:6px;background:var(--surface2);border-radius:3px;overflow:hidden}
.up-bar-fill{height:100%;background:var(--cyan);border-radius:3px;width:0%;transition:width .2s}
.up-pct{font-size:11px;color:var(--cyan);margin-top:4px;text-align:right}

/* VIDEO GRID */
#videoGrid{display:grid;grid-template-columns:repeat(auto-fill,minmax(240px,1fr));gap:16px}
#videoGrid.list-view{grid-template-columns:1fr;gap:8px}
.video-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius-lg);overflow:hidden;cursor:pointer;transition:all .2s;position:relative}
.video-card:hover{border-color:var(--cyan);transform:translateY(-2px);box-shadow:0 8px 24px rgba(0,0,0,.4)}
.video-card.selected{border-color:var(--orange);box-shadow:0 0 0 2px rgba(255,102,0,.3)}
.video-card .thumb-wrap{position:relative;aspect-ratio:16/9;background:var(--bg);overflow:hidden}
.video-card .thumb-wrap img{width:100%;height:100%;object-fit:cover}
.video-card .thumb-wrap .duration-badge{position:absolute;bottom:6px;right:6px;background:rgba(0,0,0,.8);padding:2px 6px;border-radius:4px;font-size:11px;font-weight:500}
.video-card .thumb-wrap .fav-badge{position:absolute;top:6px;right:6px;font-size:16px;filter:drop-shadow(0 1px 2px rgba(0,0,0,.5))}
.video-card .thumb-wrap .select-check{position:absolute;top:6px;left:6px;width:24px;height:24px;border-radius:50%;border:2px solid rgba(255,255,255,.5);display:none;align-items:center;justify-content:center;background:rgba(0,0,0,.5);font-size:14px}
.video-card.selected .select-check,.multi-select-mode .select-check{display:flex}
.video-card.selected .select-check{background:var(--orange);border-color:var(--orange)}
.video-card .card-info{padding:10px 12px}
.video-card .card-title{font-size:13px;font-weight:500;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;margin-bottom:4px}
.video-card .card-meta{font-size:11px;color:var(--text-muted);display:flex;gap:8px;flex-wrap:wrap}
.video-card .card-tags{display:flex;gap:4px;flex-wrap:wrap;margin-top:6px}
.video-card .card-tags span{font-size:10px;background:rgba(0,212,255,.1);color:var(--cyan);padding:2px 6px;border-radius:4px}

/* LIST VIEW CARD */
.list-view .video-card{display:flex;flex-direction:row}
.list-view .video-card .thumb-wrap{width:180px;min-width:180px;aspect-ratio:16/9}
.list-view .video-card .card-info{flex:1;display:flex;flex-direction:column;justify-content:center}

/* PLAYER VIEW */
#playerView{display:none}
#playerView.visible{display:block}
#libraryView.hidden{display:none}
.player-back{display:inline-flex;align-items:center;gap:6px;font-size:13px;color:var(--text-dim);cursor:pointer;margin-bottom:12px;min-height:44px;padding:8px 0}
.player-back:hover{color:var(--cyan)}
.player-container{background:#000;border-radius:var(--radius-lg);overflow:hidden;position:relative;max-width:1200px;margin:0 auto}
.player-container video{width:100%;display:block;cursor:pointer}

/* CUSTOM CONTROLS */
.custom-controls{position:absolute;bottom:0;left:0;right:0;background:linear-gradient(transparent,rgba(0,0,0,.85));padding:8px 12px 12px;opacity:0;transition:opacity .3s;display:flex;flex-direction:column;gap:6px}
.player-container:hover .custom-controls,.custom-controls.force-show{opacity:1}
.progress-wrap{position:relative;height:20px;display:flex;align-items:center;cursor:pointer}
.progress-track{width:100%;height:4px;background:rgba(255,255,255,.15);border-radius:2px;position:relative;transition:height .15s}
.progress-wrap:hover .progress-track{height:6px}
.progress-buffer{position:absolute;height:100%;background:rgba(255,255,255,.2);border-radius:2px;left:0;top:0}
.progress-fill{position:absolute;height:100%;background:var(--cyan);border-radius:2px;left:0;top:0}
.progress-thumb{position:absolute;width:14px;height:14px;border-radius:50%;background:var(--cyan);top:50%;transform:translate(-50%,-50%);box-shadow:0 0 6px rgba(0,212,255,.5);opacity:0;transition:opacity .15s}
.progress-wrap:hover .progress-thumb{opacity:1}
.controls-row{display:flex;align-items:center;gap:4px}
.ctrl-btn{min-width:40px;min-height:40px;display:inline-flex;align-items:center;justify-content:center;color:#fff;font-size:18px;border-radius:var(--radius);transition:all .15s;padding:0;background:transparent}
.ctrl-btn:hover{background:rgba(255,255,255,.1)}
.ctrl-btn.sm{font-size:14px;min-width:36px;min-height:36px}
.ctrl-time{font-size:12px;color:rgba(255,255,255,.8);margin:0 8px;white-space:nowrap;font-variant-numeric:tabular-nums}
.ctrl-spacer{flex:1}
.vol-wrap{display:flex;align-items:center;gap:4px;width:120px}
.vol-slider{flex:1;-webkit-appearance:none;appearance:none;height:4px;background:rgba(255,255,255,.2);border-radius:2px;cursor:pointer}
.vol-slider::-webkit-slider-thumb{-webkit-appearance:none;width:14px;height:14px;border-radius:50%;background:var(--cyan);cursor:pointer}
.speed-btn{font-size:12px;min-width:48px;font-weight:600;color:var(--cyan)}

/* PLAYER INFO */
.player-info{max-width:1200px;margin:16px auto 0;display:grid;grid-template-columns:1fr 300px;gap:16px}
.pi-main{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius-lg);padding:16px}
.pi-title{font-size:18px;font-weight:600;margin-bottom:4px}
.pi-meta{font-size:12px;color:var(--text-muted);margin-bottom:12px;display:flex;gap:12px;flex-wrap:wrap}
.pi-actions{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:12px}
.pi-desc-label{font-size:11px;color:var(--text-muted);text-transform:uppercase;letter-spacing:1px;margin-bottom:4px}
.pi-desc{background:var(--surface2);border:1px solid var(--border);border-radius:var(--radius);padding:10px;font-size:13px;min-height:60px;width:100%;resize:vertical;color:var(--text);line-height:1.5}
.pi-tags-input{background:var(--surface2);border:1px solid var(--border);border-radius:var(--radius);padding:10px;font-size:13px;width:100%;color:var(--text);margin-top:8px}
.pi-sidebar{display:flex;flex-direction:column;gap:12px}
.pi-sidebar .next-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius-lg);overflow:hidden;cursor:pointer}
.pi-sidebar .next-card:hover{border-color:var(--cyan)}
.pi-sidebar .next-label{font-size:11px;color:var(--text-muted);padding:8px 12px 0;text-transform:uppercase;letter-spacing:1px}
.pi-sidebar .next-title{font-size:13px;padding:4px 12px 8px}

/* THEATER MODE */
#theaterOverlay{display:none;position:fixed;inset:0;z-index:200;background:rgba(0,0,0,.95);align-items:center;justify-content:center;flex-direction:column;padding:20px}
#theaterOverlay.visible{display:flex}
#theaterOverlay .player-container{width:100%;max-width:1400px}

/* MINI PLAYER */
#miniPlayer{display:none;position:fixed;bottom:16px;right:16px;z-index:150;width:320px;background:#000;border:1px solid var(--border);border-radius:var(--radius-lg);overflow:hidden;box-shadow:0 8px 32px rgba(0,0,0,.6);cursor:pointer;transition:transform .3s}
#miniPlayer:hover{transform:scale(1.02)}
#miniPlayer video{width:100%;display:block}
#miniPlayer .mini-close{position:absolute;top:4px;right:4px;width:28px;height:28px;border-radius:50%;background:rgba(0,0,0,.7);color:#fff;display:flex;align-items:center;justify-content:center;font-size:14px;cursor:pointer}
#miniPlayer .mini-title{position:absolute;bottom:0;left:0;right:0;background:linear-gradient(transparent,rgba(0,0,0,.8));padding:8px;font-size:11px;color:#fff;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}

/* MODAL */
.modal-overlay{display:none;position:fixed;inset:0;z-index:300;background:rgba(5,10,15,.85);align-items:center;justify-content:center;padding:20px}
.modal-overlay.visible{display:flex}
.modal-box{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius-lg);padding:24px;width:100%;max-width:480px;max-height:80vh;overflow-y:auto}
.modal-title{font-size:16px;font-weight:600;margin-bottom:16px}
.modal-field{margin-bottom:12px}
.modal-field label{display:block;font-size:11px;color:var(--text-muted);text-transform:uppercase;letter-spacing:1px;margin-bottom:4px}
.modal-field input,.modal-field textarea{width:100%;background:var(--surface2);border:1px solid var(--border);border-radius:var(--radius);padding:10px;font-size:14px;color:var(--text)}
.modal-field input:focus,.modal-field textarea:focus{border-color:var(--cyan)}
.modal-actions{display:flex;gap:8px;justify-content:flex-end;margin-top:16px}

/* CONTEXT MENU */
#contextMenu{display:none;position:fixed;z-index:400;background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:4px;min-width:180px;box-shadow:0 8px 24px rgba(0,0,0,.5)}
#contextMenu.visible{display:block}
.ctx-item{padding:10px 14px;font-size:13px;border-radius:4px;cursor:pointer;display:flex;align-items:center;gap:8px;min-height:40px}
.ctx-item:hover{background:var(--surface2)}
.ctx-item.danger{color:var(--red)}

/* TOAST */
#toastContainer{position:fixed;bottom:20px;left:50%;transform:translateX(-50%);z-index:600;display:flex;flex-direction:column;gap:8px;align-items:center}
.toast{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:10px 20px;font-size:13px;box-shadow:0 4px 16px rgba(0,0,0,.4);animation:toastIn .3s ease;white-space:nowrap}
.toast.success{border-color:var(--green);color:var(--green)}
.toast.error{border-color:var(--red);color:var(--red)}
@keyframes toastIn{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}

/* EMPTY STATE */
.empty-state{text-align:center;padding:60px 20px;color:var(--text-muted)}
.empty-state .es-icon{font-size:48px;margin-bottom:12px;opacity:.4}
.empty-state .es-title{font-size:16px;font-weight:500;color:var(--text-dim);margin-bottom:4px}
.empty-state .es-sub{font-size:13px}

/* MOBILE */
@media(max-width:768px){
  #sidebar{position:fixed;left:0;top:60px;bottom:0;z-index:50;width:260px;margin-left:-260px}
  #sidebar.open{margin-left:0}
  .player-info{grid-template-columns:1fr}
  #videoGrid{grid-template-columns:repeat(auto-fill,minmax(160px,1fr))}
  .list-view .video-card .thumb-wrap{width:120px;min-width:120px}
  .vol-wrap{width:80px}
  #miniPlayer{width:220px;bottom:8px;right:8px}
}
@media(max-width:480px){
  #videoGrid{grid-template-columns:1fr 1fr;gap:8px}
  .video-card .card-info{padding:8px}
  .video-card .card-title{font-size:12px}
}
</style>
</head>
<body>

<!-- TOP BAR -->
<div id="topbar">
  <button class="tb-btn" id="sidebarToggle" title="Toggle sidebar">&#9776;</button>
  <div class="logo">KORB<span>VIDEO</span></div>
  <input type="search" id="searchBox" placeholder="Search videos...">
  <select id="sortSelect">
    <option value="dateDesc">Newest</option>
    <option value="dateAsc">Oldest</option>
    <option value="nameAsc">Name A-Z</option>
    <option value="nameDesc">Name Z-A</option>
    <option value="sizeDesc">Largest</option>
    <option value="sizeAsc">Smallest</option>
    <option value="watched">Recently Watched</option>
  </select>
  <button class="tb-btn" id="viewToggle" title="Toggle view">&#9638;</button>
  <button class="tb-btn" id="multiSelectBtn" title="Multi-select">&#9745;</button>
  <button class="tb-btn primary" id="uploadBtn">&#8679; Upload</button>
  <span id="storageIndicator"></span>
</div>

<!-- SIDEBAR -->
<div id="appWrap">
<div id="sidebar">
  <div class="sb-section">
    <div class="sb-title">Library</div>
    <div class="sb-item active" data-filter="all"><span class="icon">&#9658;</span>All Videos<span class="count" id="countAll">0</span></div>
    <div class="sb-item" data-filter="favorites"><span class="icon">&#9733;</span>Favorites<span class="count" id="countFav">0</span></div>
    <div class="sb-item" data-filter="recent"><span class="icon">&#9203;</span>Recently Watched<span class="count" id="countRecent">0</span></div>
  </div>
  <div class="sb-divider"></div>
  <div class="sb-section">
    <div class="sb-title">Folders</div>
    <div id="folderList"></div>
    <div class="sb-add" id="addFolderBtn">+ New Folder</div>
  </div>
  <div class="sb-divider"></div>
  <div class="sb-section">
    <div class="sb-title">Playlists</div>
    <div id="playlistList"></div>
    <div class="sb-add" id="addPlaylistBtn">+ New Playlist</div>
  </div>
</div>

<!-- MAIN AREA -->
<div id="mainArea">

<!-- LIBRARY VIEW -->
<div id="libraryView">
  <div id="uploadZone">
    <div class="uz-icon">&#128249;</div>
    <div class="uz-title">Drop videos here or click to upload</div>
    <div class="uz-sub">.mp4, .webm, .mov, .m4v supported</div>
    <input type="file" id="fileInput" accept=".mp4,.webm,.mov,.m4v,video/mp4,video/webm,video/quicktime" multiple>
  </div>
  <div id="uploadProgress">
    <div class="up-filename"></div>
    <div class="up-info"></div>
    <div class="up-bar-track"><div class="up-bar-fill"></div></div>
    <div class="up-pct">0%</div>
  </div>
  <div id="batchActions" style="display:none;margin-bottom:12px;display:none;gap:8px;flex-wrap:wrap">
    <button class="tb-btn" id="batchFav">&#9733; Favorite</button>
    <button class="tb-btn" id="batchPlaylist">+ Playlist</button>
    <button class="tb-btn" id="batchFolder">Move to Folder</button>
    <button class="tb-btn danger" id="batchDelete">&#10005; Delete Selected</button>
    <span id="batchCount" style="font-size:12px;color:var(--text-muted);align-self:center"></span>
  </div>
  <div id="videoGrid"></div>
</div>

<!-- PLAYER VIEW -->
<div id="playerView">
  <div class="player-back" id="backToLibrary">&#8592; Back to Library</div>
  <div class="player-container" id="playerContainer">
    <video id="mainVideo" playsinline></video>
    <div class="custom-controls" id="customControls">
      <div class="progress-wrap" id="progressWrap">
        <div class="progress-track">
          <div class="progress-buffer" id="progressBuffer"></div>
          <div class="progress-fill" id="progressFill"></div>
        </div>
        <div class="progress-thumb" id="progressThumb"></div>
      </div>
      <div class="controls-row">
        <button class="ctrl-btn" id="btnSkipBack" title="Back 10s">&#9194;</button>
        <button class="ctrl-btn" id="btnPlayPause" title="Play/Pause" style="font-size:24px">&#9654;</button>
        <button class="ctrl-btn" id="btnSkipFwd" title="Forward 10s">&#9193;</button>
        <span class="ctrl-time"><span id="timeCurrent">0:00</span> / <span id="timeTotal">0:00</span></span>
        <div class="ctrl-spacer"></div>
        <div class="vol-wrap">
          <button class="ctrl-btn sm" id="btnMute" title="Mute">&#128266;</button>
          <input type="range" class="vol-slider" id="volSlider" min="0" max="1" step="0.01" value="1">
        </div>
        <button class="ctrl-btn sm speed-btn" id="btnSpeed" title="Speed">1x</button>
        <button class="ctrl-btn sm" id="btnPip" title="Picture in Picture">&#9638;</button>
        <button class="ctrl-btn sm" id="btnTheater" title="Theater mode">&#9635;</button>
        <button class="ctrl-btn sm" id="btnFullscreen" title="Fullscreen">&#9974;</button>
      </div>
    </div>
  </div>
  <div class="player-info" id="playerInfo">
    <div class="pi-main">
      <div class="pi-title" id="piTitle"></div>
      <div class="pi-meta" id="piMeta"></div>
      <div class="pi-actions">
        <button class="tb-btn" id="piFav">&#9734; Favorite</button>
        <button class="tb-btn" id="piDownload">&#8681; Download</button>
        <button class="tb-btn" id="piPlaylist">+ Playlist</button>
        <button class="tb-btn danger" id="piDelete">&#10005; Delete</button>

<div id="contextMenu"></div>

  <div class="modal-box" id="modalBox"></div>
</div>

<!-- TOAST -->
<div id="toastContainer"></div>

<script>
(function(){
'use strict';

// ---- DB SETUP ----
const DB_NAME='korb_video_library';
const DB_VERSION=1;
let db=null;

function openDB(){
  return new Promise((resolve,reject)=>{
    const req=indexedDB.open(DB_NAME,DB_VERSION);
    req.onupgradeneeded=e=>{
      const d=e.target.result;
      if(!d.objectStoreNames.contains('videos')){
        const vs=d.createObjectStore('videos',{keyPath:'id'});
        vs.createIndex('folderId','folderId',{unique:false});
        vs.createIndex('dateAdded','dateAdded',{unique:false});
        vs.createIndex('dateLastWatched','dateLastWatched',{unique:false});
      }
      if(!d.objectStoreNames.contains('playlists')) d.createObjectStore('playlists',{keyPath:'id'});
      if(!d.objectStoreNames.contains('settings')) d.createObjectStore('settings',{keyPath:'key'});
      if(!d.objectStoreNames.contains('folders')) d.createObjectStore('folders',{keyPath:'id'});
    };
    req.onsuccess=e=>{db=e.target.result;resolve(db)};
    req.onerror=e=>reject(e.target.error);
  });
}

function tx(store,mode='readonly'){
  const t=db.transaction(store,mode);
  return {store:t.objectStore(store),tx:t};
}
function dbPut(storeName,data){
  return new Promise((resolve,reject)=>{
    const {store}=tx(storeName,'readwrite');
    const r=store.put(data);r.onsuccess=()=>resolve(r.result);r.onerror=e=>reject(e);
  });
}
function dbGet(storeName,key){
  return new Promise((resolve,reject)=>{
    const {store}=tx(storeName,'readonly');
    const r=store.get(key);r.onsuccess=()=>resolve(r.result);r.onerror=e=>reject(e);
  });
}
function dbGetAll(storeName){
  return new Promise((resolve,reject)=>{
    const {store}=tx(storeName,'readonly');
    const r=store.getAll();r.onsuccess=()=>resolve(r.result||[]);r.onerror=e=>reject(e);
  });
}
function dbDelete(storeName,key){
  return new Promise((resolve,reject)=>{
    const {store}=tx(storeName,'readwrite');
    const r=store.delete(key);r.onsuccess=()=>resolve();r.onerror=e=>reject(e);
  });
}

// ---- UTILS ----
function uuid(){return crypto.randomUUID?crypto.randomUUID():'xxxx-xxxx-xxxx'.replace(/x/g,()=>((Math.random()*16)|0).toString(16))}
function fmtSize(b){if(b<1024)return b+'B';if(b<1048576)return(b/1024).toFixed(1)+'KB';if(b<1073741824)return(b/1048576).toFixed(1)+'MB';return(b/1073741824).toFixed(2)+'GB'}
function fmtDur(s){if(!s||isNaN(s))return'0:00';const h=Math.floor(s/3600),m=Math.floor((s%3600)/60),sec=Math.floor(s%60);return h>0?`${h}:${String(m).padStart(2,'0')}:${String(sec).padStart(2,'0')}`:`${m}:${String(sec).padStart(2,'0')}`}
function fmtDate(d){if(!d)return'';const dt=new Date(d);return dt.toLocaleDateString('en-US',{month:'short',day:'numeric',year:'numeric'})}
function toast(msg,type=''){const el=document.createElement('div');el.className='toast '+(type||'');el.textContent=msg;document.getElementById('toastContainer').appendChild(el);setTimeout(()=>el.remove(),3000)}

// ---- STATE ----
let allVideos=[];
let allFolders=[];
let allPlaylists=[];
let currentFilter='all';
let currentFolderId=null;
let currentPlaylistId=null;
let currentVideoId=null;
let isListView=false;
let multiSelectMode=false;
let selectedIds=new Set();
let playbackSpeeds=[0.25,0.5,0.75,1,1.25,1.5,2];
let currentSpeedIdx=3;
let isTheater=false;
let miniPlayerActive=false;
let autoPlayNext=true;
let loopPlaylist=false;
let shufflePlaylist=false;
let playlistQueue=[];
let playlistQueueIdx=-1;

// ---- ELEMENTS ----
const $=id=>document.getElementById(id);
const searchBox=$('searchBox'),sortSelect=$('sortSelect'),videoGrid=$('videoGrid');
const uploadZone=$('uploadZone'),fileInput=$('fileInput');
const uploadProgress=$('uploadProgress');
const libraryView=$('libraryView'),playerView=$('playerView');
const mainVideo=$('mainVideo'),playerContainer=$('playerContainer');
const progressFill=$('progressFill'),progressBuffer=$('progressBuffer'),progressThumb=$('progressThumb');
const sidebar=$('sidebar'),modalOverlay=$('modalOverlay'),modalBox=$('modalBox');

// ---- GENERATE THUMBNAIL ----
function genThumbnail(blob){
  return new Promise(resolve=>{
    const url=URL.createObjectURL(blob);
    const v=document.createElement('video');
    v.preload='metadata';v.muted=true;v.playsInline=true;
    v.onloadeddata=()=>{
      v.currentTime=Math.min(1,v.duration*0.1);
    };
    v.onseeked=()=>{
      const c=document.createElement('canvas');
      c.width=320;c.height=Math.round(320/(v.videoWidth/v.videoHeight)||180);
      const ctx=c.getContext('2d');
      ctx.drawImage(v,0,0,c.width,c.height);
      c.toBlob(tb=>{URL.revokeObjectURL(url);resolve({thumb:tb,duration:v.duration});},'image/jpeg',0.7);
    };
    v.onerror=()=>{URL.revokeObjectURL(url);resolve({thumb:null,duration:0})};
    v.src=url;
  });
}

// ---- UPLOAD ----
async function uploadFiles(files){
  const validExts=['.mp4','.webm','.mov','.m4v'];
  for(const file of files){
    const ext='.'+file.name.split('.').pop().toLowerCase();
    if(!validExts.includes(ext)){toast(`Skipped ${file.name}: unsupported format`,'error');continue;}
    // duplicate check
    const existing=allVideos.find(v=>v.filename===file.name);
    if(existing){
      if(!confirm(`"${file.name}" already exists. Upload anyway?`))continue;
    }
    // check quota
    try{
      if(navigator.storage&&navigator.storage.estimate){
        const est=await navigator.storage.estimate();
        if(est.quota&&est.usage&&(est.quota-est.usage)<file.size*1.5){
          toast('Storage nearly full! Upload may fail.','error');
        }
      }
    }catch(e){}

    // show progress
    uploadProgress.classList.add('visible');
    uploadProgress.querySelector('.up-filename').textContent=file.name;
    uploadProgress.querySelector('.up-info').textContent=fmtSize(file.size);
    const fillBar=uploadProgress.querySelector('.up-bar-fill');
    const pctEl=uploadProgress.querySelector('.up-pct');

    // simulate progress while generating thumbnail (actual read is fast for IndexedDB put)
    fillBar.style.width='10%';pctEl.textContent='10%';

    const blob=file;
    fillBar.style.width='30%';pctEl.textContent='30%';
    const {thumb,duration}=await genThumbnail(blob);
    fillBar.style.width='60%';pctEl.textContent='60%';

    const vid={
      id:uuid(),
      filename:file.name,
      title:file.name.replace(/\.[^.]+$/,''),
      description:'',
      tags:[],
      dateAdded:Date.now(),
      dateLastWatched:null,
      duration:duration||0,
      fileSize:file.size,
      thumbnailBlob:thumb,
      blob:blob,
      playbackPosition:0,
      favorite:false,
      folderId:currentFolderId,
      watchCount:0
    };

    await dbPut('videos',vid);
    fillBar.style.width='100%';pctEl.textContent='100%';
    allVideos.push(vid);
    toast(`Uploaded "${vid.title}"`,'success');
    await new Promise(r=>setTimeout(r,300));
  }
  uploadProgress.classList.remove('visible');
  renderLibrary();
  updateCounts();
  updateStorage();
}

// file input
fileInput.addEventListener('change',e=>{if(e.target.files.length)uploadFiles(Array.from(e.target.files));e.target.value='';});
uploadZone.addEventListener('click',()=>fileInput.click());
uploadZone.addEventListener('dragover',e=>{e.preventDefault();uploadZone.classList.add('dragover')});
uploadZone.addEventListener('dragleave',()=>uploadZone.classList.remove('dragover'));
uploadZone.addEventListener('drop',e=>{e.preventDefault();uploadZone.classList.remove('dragover');if(e.dataTransfer.files.length)uploadFiles(Array.from(e.dataTransfer.files))});
$('uploadBtn').addEventListener('click',()=>fileInput.click());

// global drag
document.addEventListener('dragover',e=>{e.preventDefault();$('dropOverlay').classList.add('visible')});
document.addEventListener('dragleave',e=>{if(e.relatedTarget===null)$('dropOverlay').classList.remove('visible')});
$('dropOverlay').addEventListener('dragover',e=>e.preventDefault());
$('dropOverlay').addEventListener('drop',e=>{e.preventDefault();$('dropOverlay').classList.remove('visible');if(e.dataTransfer.files.length)uploadFiles(Array.from(e.dataTransfer.files))});

// ---- RENDER LIBRARY ----
function getFilteredVideos(){
  let vids=[...allVideos];
  const q=searchBox.value.trim().toLowerCase();
  if(q) vids=vids.filter(v=>v.title.toLowerCase().includes(q)||v.tags.some(t=>t.toLowerCase().includes(q)));
  if(currentFilter==='favorites') vids=vids.filter(v=>v.favorite);
  else if(currentFilter==='recent') vids=vids.filter(v=>v.dateLastWatched).sort((a,b)=>(b.dateLastWatched||0)-(a.dateLastWatched||0));
  else if(currentFilter==='folder'&&currentFolderId) vids=vids.filter(v=>v.folderId===currentFolderId);
  else if(currentFilter==='playlist'&&currentPlaylistId){
    const pl=allPlaylists.find(p=>p.id===currentPlaylistId);
    if(pl) vids=pl.videoIds.map(id=>allVideos.find(v=>v.id===id)).filter(Boolean);
  }
  // sort
  const s=sortSelect.value;
  if(s==='dateDesc') vids.sort((a,b)=>b.dateAdded-a.dateAdded);
  else if(s==='dateAsc') vids.sort((a,b)=>a.dateAdded-b.dateAdded);
  else if(s==='nameAsc') vids.sort((a,b)=>a.title.localeCompare(b.title));
  else if(s==='nameDesc') vids.sort((a,b)=>b.title.localeCompare(a.title));
  else if(s==='sizeDesc') vids.sort((a,b)=>b.fileSize-a.fileSize);
  else if(s==='sizeAsc') vids.sort((a,b)=>a.fileSize-b.fileSize);
  else if(s==='watched') vids.sort((a,b)=>(b.dateLastWatched||0)-(a.dateLastWatched||0));
  return vids;
}

function renderLibrary(){
  const vids=getFilteredVideos();
  videoGrid.className=isListView?'list-view':'';
  if(!vids.length){
    videoGrid.innerHTML=`<div class="empty-state"><div class="es-icon">&#128249;</div><div class="es-title">${allVideos.length?'No matching videos':'No videos yet'}</div><div class="es-sub">${allVideos.length?'Try a different search or filter':'Upload your first video to get started'}</div></div>`;
    return;
  }
  videoGrid.innerHTML=vids.map(v=>{
    const thumbUrl=v.thumbnailBlob?URL.createObjectURL(v.thumbnailBlob):'';
    const sel=selectedIds.has(v.id);
    return `<div class="video-card${sel?' selected':''}" data-id="${v.id}" oncontextmenu="app.ctxMenu(event,'${v.id}')">
      <div class="thumb-wrap">
        ${thumbUrl?`<img src="${thumbUrl}" alt="" loading="lazy">`:`<div style="display:flex;align-items:center;justify-content:center;height:100%;color:var(--text-muted);font-size:24px">&#127916;</div>`}
        <div class="duration-badge">${fmtDur(v.duration)}</div>
        ${v.favorite?'<div class="fav-badge">&#9733;</div>':''}
        <div class="select-check">${sel?'&#10003;':''}</div>
      </div>
      <div class="card-info">
        <div class="card-title">${escHtml(v.title)}</div>
        <div class="card-meta"><span>${fmtSize(v.fileSize)}</span><span>${fmtDate(v.dateAdded)}</span></div>
        ${v.tags.length?`<div class="card-tags">${v.tags.slice(0,3).map(t=>`<span>${escHtml(t)}</span>`).join('')}</div>`:''}
      </div>
    </div>`;
  }).join('');

  videoGrid.querySelectorAll('.video-card').forEach(card=>{
    card.addEventListener('click',e=>{
      const id=card.dataset.id;
      if(multiSelectMode){
        e.preventDefault();
        if(selectedIds.has(id))selectedIds.delete(id);else selectedIds.add(id);
        renderLibrary();updateBatchActions();
        return;
      }
      openPlayer(id);
    });
  });
}

function escHtml(s){return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;')}

// ---- SIDEBAR NAV ----
function renderSidebar(){
  // folders
  const fl=$('folderList');
  fl.innerHTML=allFolders.map(f=>{
    const cnt=allVideos.filter(v=>v.folderId===f.id).length;
    return `<div class="sb-item${currentFilter==='folder'&&currentFolderId===f.id?' active':''}" data-type="folder" data-id="${f.id}"><span class="icon">&#128193;</span>${escHtml(f.name)}<span class="count">${cnt}</span></div>`;
  }).join('');

  // playlists
  const pl=$('playlistList');
  pl.innerHTML=allPlaylists.map(p=>{
    return `<div class="sb-item${currentFilter==='playlist'&&currentPlaylistId===p.id?' active':''}" data-type="playlist" data-id="${p.id}"><span class="icon">&#9776;</span>${escHtml(p.name)}<span class="count">${p.videoIds.length}</span></div>`;
  }).join('');

  // bind
  document.querySelectorAll('.sb-item[data-filter]').forEach(el=>{
    el.onclick=()=>{
      document.querySelectorAll('.sb-item').forEach(x=>x.classList.remove('active'));
      el.classList.add('active');
      currentFilter=el.dataset.filter;currentFolderId=null;currentPlaylistId=null;
      renderLibrary();
    };
  });
  fl.querySelectorAll('.sb-item').forEach(el=>{
    el.onclick=()=>{
      document.querySelectorAll('.sb-item').forEach(x=>x.classList.remove('active'));
      el.classList.add('active');
      currentFilter='folder';currentFolderId=el.dataset.id;currentPlaylistId=null;
      renderLibrary();
    };
    el.oncontextmenu=e=>{e.preventDefault();showCtxMenu(e.clientX,e.clientY,[
      {label:'Rename',action:()=>renameFolder(el.dataset.id)},
      {label:'Delete Folder',cls:'danger',action:()=>deleteFolder(el.dataset.id)}
    ])};
  });
  pl.querySelectorAll('.sb-item').forEach(el=>{
    el.onclick=()=>{
      document.querySelectorAll('.sb-item').forEach(x=>x.classList.remove('active'));
      el.classList.add('active');
      currentFilter='playlist';currentPlaylistId=el.dataset.id;currentFolderId=null;
      renderLibrary();
    };
    el.oncontextmenu=e=>{e.preventDefault();showCtxMenu(e.clientX,e.clientY,[
      {label:'Rename',action:()=>renamePlaylist(el.dataset.id)},
      {label:'Delete Playlist',cls:'danger',action:()=>deletePlaylist(el.dataset.id)}
    ])};
  });
}

function updateCounts(){
  $('countAll').textContent=allVideos.length;
  $('countFav').textContent=allVideos.filter(v=>v.favorite).length;
  $('countRecent').textContent=allVideos.filter(v=>v.dateLastWatched).length;
}

async function updateStorage(){
  try{
    if(navigator.storage&&navigator.storage.estimate){
      const est=await navigator.storage.estimate();
      const used=est.usage||0;
      $('storageIndicator').textContent=`Storage: ${fmtSize(used)}`;
    }
  }catch(e){$('storageIndicator').textContent=''}
}

// ---- PLAYER ----
let controlsTimeout;
function openPlayer(id){
  const vid=allVideos.find(v=>v.id===id);
  if(!vid)return;
  currentVideoId=id;
  closeMiniPlayer();

  // update watched
  vid.dateLastWatched=Date.now();
  vid.watchCount=(vid.watchCount||0)+1;
  saveVideoMeta(vid);
  updateCounts();

  libraryView.classList.add('hidden');
  playerView.classList.add('visible');

  // load video
  const url=URL.createObjectURL(vid.blob);
  mainVideo.src=url;
  mainVideo.currentTime=vid.playbackPosition||0;

  // info
  $('piTitle').textContent=vid.title;
  $('piMeta').innerHTML=`<span>${fmtSize(vid.fileSize)}</span><span>${fmtDur(vid.duration)}</span><span>${fmtDate(vid.dateAdded)}</span><span>Watched ${vid.watchCount}x</span>`;
  $('piDesc').value=vid.description||'';
  $('piTags').value=(vid.tags||[]).join(', ');
  $('piFav').innerHTML=(vid.favorite?'&#9733;':'&#9734;')+' Favorite';
  $('piFav').classList.toggle('active',vid.favorite);

  // sidebar - next videos
  renderUpNext();

  mainVideo.play().catch(()=>{});
  $('btnPlayPause').innerHTML='&#9646;&#9646;';

  // auto-hide controls
  playerContainer.addEventListener('mousemove',showControlsBrief);
  playerContainer.addEventListener('mouseleave',()=>{clearTimeout(controlsTimeout);});
}

function showControlsBrief(){
  $('customControls').classList.add('force-show');
  clearTimeout(controlsTimeout);
  controlsTimeout=setTimeout(()=>{if(!mainVideo.paused)$('customControls').classList.remove('force-show')},3000);
}

function renderUpNext(){
  const piSidebar=$('piSidebar');
  const filtered=getFilteredVideos().filter(v=>v.id!==currentVideoId);
  piSidebar.innerHTML=filtered.slice(0,6).map(v=>{
    const thumbUrl=v.thumbnailBlob?URL.createObjectURL(v.thumbnailBlob):'';
    return `<div class="next-card" onclick="app.openPlayer('${v.id}')">
      <div class="next-label">Up Next</div>
      <div style="display:flex;gap:8px;padding:0 12px 8px">
        <div style="width:100px;min-width:100px;aspect-ratio:16/9;background:var(--bg);border-radius:4px;overflow:hidden">
          ${thumbUrl?`<img src="${thumbUrl}" style="width:100%;height:100%;object-fit:cover">`:''}
        </div>
        <div>
          <div class="next-title" style="padding:0">${escHtml(v.title)}</div>
          <div style="font-size:11px;color:var(--text-muted)">${fmtDur(v.duration)} &middot; ${fmtSize(v.fileSize)}</div>
        </div>
      </div>
    </div>`;
  }).join('');
}

function closePlayer(){
  saveCurrentPosition();
  mainVideo.pause();
  mainVideo.removeAttribute('src');mainVideo.load();
  playerView.classList.remove('visible');
  libraryView.classList.remove('hidden');
  currentVideoId=null;
  if(isTheater)toggleTheater();
  renderLibrary();
}

function saveCurrentPosition(){
  if(!currentVideoId)return;
  const vid=allVideos.find(v=>v.id===currentVideoId);
  if(vid&&mainVideo.currentTime){
    vid.playbackPosition=mainVideo.currentTime;
    saveVideoMeta(vid);
  }
}

async function saveVideoMeta(vid){
  // save without re-reading blob (it's already in vid object)
  await dbPut('videos',vid);
}

$('backToLibrary').addEventListener('click',closePlayer);

// ---- VIDEO CONTROLS ----
$('btnPlayPause').addEventListener('click',togglePlay);
function togglePlay(){
  if(mainVideo.paused){mainVideo.play();$('btnPlayPause').innerHTML='&#9646;&#9646;'}
  else{mainVideo.pause();$('btnPlayPause').innerHTML='&#9654;'}
}
mainVideo.addEventListener('click',togglePlay);
mainVideo.addEventListener('dblclick',toggleFullscreen);

mainVideo.addEventListener('timeupdate',()=>{
  if(!mainVideo.duration)return;
  const pct=(mainVideo.currentTime/mainVideo.duration)*100;
  progressFill.style.width=pct+'%';
  progressThumb.style.left=pct+'%';
  $('timeCurrent').textContent=fmtDur(mainVideo.currentTime);
  $('timeTotal').textContent=fmtDur(mainVideo.duration);
  // save position periodically
  if(Math.floor(mainVideo.currentTime)%10===0)saveCurrentPosition();
});

mainVideo.addEventListener('progress',()=>{
  if(mainVideo.buffered.length&&mainVideo.duration){
    const end=mainVideo.buffered.end(mainVideo.buffered.length-1);
    progressBuffer.style.width=(end/mainVideo.duration)*100+'%';
  }
});

mainVideo.addEventListener('ended',()=>{
  $('btnPlayPause').innerHTML='&#9654;';
  // auto-play next
  if(autoPlayNext){
    const filtered=getFilteredVideos();
    const idx=filtered.findIndex(v=>v.id===currentVideoId);
    if(idx>=0&&idx<filtered.length-1){
      openPlayer(filtered[idx+1].id);
    } else if(loopPlaylist&&filtered.length){
      openPlayer(filtered[0].id);
    }
  }
});

mainVideo.addEventListener('play',()=>{$('btnPlayPause').innerHTML='&#9646;&#9646;'});
mainVideo.addEventListener('pause',()=>{$('btnPlayPause').innerHTML='&#9654;'});

// progress seek
$('progressWrap').addEventListener('click',e=>{
  const rect=$('progressWrap').getBoundingClientRect();
  const pct=(e.clientX-rect.left)/rect.width;
  mainVideo.currentTime=pct*mainVideo.duration;
});

// skip
$('btnSkipBack').addEventListener('click',()=>{mainVideo.currentTime=Math.max(0,mainVideo.currentTime-10)});
$('btnSkipFwd').addEventListener('click',()=>{mainVideo.currentTime=Math.min(mainVideo.duration,mainVideo.currentTime+10)});

// volume
const volSlider=$('volSlider');
volSlider.addEventListener('input',()=>{mainVideo.volume=volSlider.value;mainVideo.muted=false;updateMuteBtn()});
$('btnMute').addEventListener('click',()=>{mainVideo.muted=!mainVideo.muted;updateMuteBtn()});
function updateMuteBtn(){
  if(mainVideo.muted||mainVideo.volume===0)$('btnMute').innerHTML='&#128263;';
  else if(mainVideo.volume<0.5)$('btnMute').innerHTML='&#128265;';
  else $('btnMute').innerHTML='&#128266;';
  volSlider.value=mainVideo.muted?0:mainVideo.volume;
}

// speed
$('btnSpeed').addEventListener('click',()=>{
  currentSpeedIdx=(currentSpeedIdx+1)%playbackSpeeds.length;
  mainVideo.playbackRate=playbackSpeeds[currentSpeedIdx];
  $('btnSpeed').textContent=playbackSpeeds[currentSpeedIdx]+'x';
});

// pip
$('btnPip').addEventListener('click',async()=>{
  try{
    if(document.pictureInPictureElement)await document.exitPictureInPicture();
    else await mainVideo.requestPictureInPicture();
  }catch(e){toast('PiP not supported','error')}
});

// fullscreen
$('btnFullscreen').addEventListener('click',toggleFullscreen);
function toggleFullscreen(){
  if(document.fullscreenElement)document.exitFullscreen();
  else playerContainer.requestFullscreen().catch(()=>{});
}

// theater
$('btnTheater').addEventListener('click',toggleTheater);
function toggleTheater(){
  const overlay=$('theaterOverlay');
  if(!isTheater){
    overlay.classList.add('visible');
    overlay.appendChild(playerContainer);
    isTheater=true;
  }else{
    overlay.classList.remove('visible');
    playerView.insertBefore(playerContainer,$('playerInfo'));
    isTheater=false;
  }
}

// keyboard
document.addEventListener('keydown',e=>{
  if(e.target.tagName==='INPUT'||e.target.tagName==='TEXTAREA'||e.target.tagName==='SELECT')return;
  if(!playerView.classList.contains('visible'))return;
  switch(e.key){
    case ' ':e.preventDefault();togglePlay();break;
    case 'ArrowLeft':mainVideo.currentTime=Math.max(0,mainVideo.currentTime-10);break;
    case 'ArrowRight':mainVideo.currentTime=Math.min(mainVideo.duration||0,mainVideo.currentTime+10);break;
    case 'ArrowUp':e.preventDefault();mainVideo.volume=Math.min(1,mainVideo.volume+0.1);volSlider.value=mainVideo.volume;updateMuteBtn();break;
    case 'ArrowDown':e.preventDefault();mainVideo.volume=Math.max(0,mainVideo.volume-0.1);volSlider.value=mainVideo.volume;updateMuteBtn();break;
    case 'f':case 'F':toggleFullscreen();break;
    case 'm':case 'M':mainVideo.muted=!mainVideo.muted;updateMuteBtn();break;
    case '<':case ',':currentSpeedIdx=Math.max(0,currentSpeedIdx-1);mainVideo.playbackRate=playbackSpeeds[currentSpeedIdx];$('btnSpeed').textContent=playbackSpeeds[currentSpeedIdx]+'x';break;
    case '>':case '.':currentSpeedIdx=Math.min(playbackSpeeds.length-1,currentSpeedIdx+1);mainVideo.playbackRate=playbackSpeeds[currentSpeedIdx];$('btnSpeed').textContent=playbackSpeeds[currentSpeedIdx]+'x';break;
  }
});

// ---- PLAYER INFO ACTIONS ----
$('piFav').addEventListener('click',()=>{
  const vid=allVideos.find(v=>v.id===currentVideoId);
  if(!vid)return;
  vid.favorite=!vid.favorite;
  $('piFav').innerHTML=(vid.favorite?'&#9733;':'&#9734;')+' Favorite';
  saveVideoMeta(vid);updateCounts();renderSidebar();
});
$('piDelete').addEventListener('click',()=>{if(currentVideoId)confirmDeleteVideo(currentVideoId)});
$('piDownload').addEventListener('click',()=>{
  const vid=allVideos.find(v=>v.id===currentVideoId);
  if(!vid)return;
  const a=document.createElement('a');a.href=URL.createObjectURL(vid.blob);a.download=vid.filename;document.body.appendChild(a);a.click();a.remove();
});
$('piPlaylist').addEventListener('click',()=>{if(currentVideoId)showAddToPlaylistModal([currentVideoId])});
$('piDesc').addEventListener('change',()=>{
  const vid=allVideos.find(v=>v.id===currentVideoId);
  if(vid){vid.description=$('piDesc').value;saveVideoMeta(vid)}
});
$('piTags').addEventListener('change',()=>{
  const vid=allVideos.find(v=>v.id===currentVideoId);
  if(vid){vid.tags=$('piTags').value.split(',').map(t=>t.trim()).filter(Boolean);saveVideoMeta(vid)}
});

// ---- MINI PLAYER ----
function activateMiniPlayer(){
  if(!currentVideoId||!mainVideo.src)return;
  const vid=allVideos.find(v=>v.id===currentVideoId);
  if(!vid)return;
  const mini=$('miniPlayer');
  const mv=$('miniVideo');
  mv.src=mainVideo.src;
  mv.currentTime=mainVideo.currentTime;
  mv.volume=mainVideo.volume;
  if(!mainVideo.paused)mv.play();
  $('miniTitle').textContent=vid.title;
  mini.style.display='block';
  miniPlayerActive=true;
  mini.onclick=e=>{
    if(e.target.id==='miniClose')return;
    closeMiniPlayer();
    openPlayer(vid.id);
  };
}
function closeMiniPlayer(){
  const mini=$('miniPlayer');
  const mv=$('miniVideo');
  mv.pause();mv.removeAttribute('src');mv.load();
  mini.style.display='none';
  miniPlayerActive=false;
}
$('miniClose').addEventListener('click',e=>{e.stopPropagation();closeMiniPlayer()});

// ---- CONTEXT MENU ----
const ctxMenu=$('contextMenu');
function showCtxMenu(x,y,items){
  ctxMenu.innerHTML=items.map(i=>`<div class="ctx-item${i.cls?' '+i.cls:''}">${i.label}</div>`).join('');
  ctxMenu.style.left=Math.min(x,window.innerWidth-200)+'px';
  ctxMenu.style.top=Math.min(y,window.innerHeight-items.length*44)+'px';
  ctxMenu.classList.add('visible');
  ctxMenu.querySelectorAll('.ctx-item').forEach((el,idx)=>{
    el.onclick=()=>{ctxMenu.classList.remove('visible');items[idx].action()};
  });
}
document.addEventListener('click',()=>ctxMenu.classList.remove('visible'));
window.app={
  ctxMenu(e,id){
    e.preventDefault();
    const vid=allVideos.find(v=>v.id===id);
    if(!vid)return;
    showCtxMenu(e.clientX,e.clientY,[
      {label:'&#9654; Play',action:()=>openPlayer(id)},
      {label:(vid.favorite?'&#9733; Unfavorite':'&#9734; Favorite'),action:()=>{vid.favorite=!vid.favorite;saveVideoMeta(vid);renderLibrary();updateCounts();renderSidebar()}},
      {label:'&#9998; Rename',action:()=>renameVideo(id)},
      {label:'&#9776; Add to Playlist',action:()=>showAddToPlaylistModal([id])},
      {label:'&#128193; Move to Folder',action:()=>showMoveToFolderModal([id])},
      {label:'&#8681; Download',action:()=>{const a=document.createElement('a');a.href=URL.createObjectURL(vid.blob);a.download=vid.filename;document.body.appendChild(a);a.click();a.remove()}},
      {label:'&#10005; Delete',cls:'danger',action:()=>confirmDeleteVideo(id)}
    ]);
  },
  openPlayer
};

// ---- MODALS ----
function showModal(html){
  modalBox.innerHTML=html;
  modalOverlay.classList.add('visible');
}
function hideModal(){modalOverlay.classList.remove('visible')}
modalOverlay.addEventListener('click',e=>{if(e.target===modalOverlay)hideModal()});

function renameVideo(id){
  const vid=allVideos.find(v=>v.id===id);
  if(!vid)return;
  showModal(`<div class="modal-title">Rename Video</div>
    <div class="modal-field"><label>Title</label><input id="renameInput" value="${escHtml(vid.title)}"></div>
    <div class="modal-actions"><button class="tb-btn" onclick="app.hideModal()">Cancel</button><button class="tb-btn primary" id="renameConfirm">Save</button></div>`);
  const inp=document.getElementById('renameInput');inp.focus();inp.select();
  document.getElementById('renameConfirm').onclick=()=>{
    vid.title=inp.value.trim()||vid.title;
    saveVideoMeta(vid);hideModal();renderLibrary();
    if(currentVideoId===id)$('piTitle').textContent=vid.title;
  };
  inp.onkeydown=e=>{if(e.key==='Enter')document.getElementById('renameConfirm').click()};
}

function confirmDeleteVideo(id){
  const vid=allVideos.find(v=>v.id===id);
  if(!vid)return;
  showModal(`<div class="modal-title">Delete Video</div>
    <p style="font-size:14px;margin-bottom:16px">Permanently delete "<strong>${escHtml(vid.title)}</strong>"? This cannot be undone.</p>
    <div class="modal-actions"><button class="tb-btn" onclick="app.hideModal()">Cancel</button><button class="tb-btn danger" id="delConfirm">Delete</button></div>`);
  document.getElementById('delConfirm').onclick=async()=>{
    await dbDelete('videos',id);
    allVideos=allVideos.filter(v=>v.id!==id);
    // remove from playlists
    for(const pl of allPlaylists){
      pl.videoIds=pl.videoIds.filter(vid=>vid!==id);
      await dbPut('playlists',pl);
    }
    hideModal();
    if(currentVideoId===id)closePlayer();
    renderLibrary();updateCounts();renderSidebar();updateStorage();
    toast('Video deleted','success');
  };
}

function showAddToPlaylistModal(ids){
  const opts=allPlaylists.map(p=>`<div class="sb-item" data-plid="${p.id}" style="cursor:pointer"><span class="icon">&#9776;</span>${escHtml(p.name)}</div>`).join('');
  showModal(`<div class="modal-title">Add to Playlist</div>
    ${opts||'<p style="font-size:13px;color:var(--text-muted)">No playlists yet.</p>'}
    <div style="margin-top:12px"><div class="sb-add" id="modalNewPl">+ Create New Playlist</div></div>
    <div class="modal-actions"><button class="tb-btn" onclick="app.hideModal()">Close</button></div>`);
  modalBox.querySelectorAll('[data-plid]').forEach(el=>{
    el.onclick=async()=>{
      const pl=allPlaylists.find(p=>p.id===el.dataset.plid);
      if(pl){
        for(const id of ids){if(!pl.videoIds.includes(id))pl.videoIds.push(id)}
        await dbPut('playlists',pl);
        renderSidebar();toast(`Added to "${pl.name}"`,'success');
      }
      hideModal();
    };
  });
  document.getElementById('modalNewPl').onclick=()=>{hideModal();createPlaylist()};
}

function showMoveToFolderModal(ids){
  const opts=allFolders.map(f=>`<div class="sb-item" data-fid="${f.id}" style="cursor:pointer"><span class="icon">&#128193;</span>${escHtml(f.name)}</div>`).join('');
  showModal(`<div class="modal-title">Move to Folder</div>
    <div class="sb-item" data-fid="" style="cursor:pointer"><span class="icon">&#128193;</span>No Folder (root)</div>
    ${opts}
    <div style="margin-top:12px"><div class="sb-add" id="modalNewFld">+ Create New Folder</div></div>
    <div class="modal-actions"><button class="tb-btn" onclick="app.hideModal()">Close</button></div>`);
  modalBox.querySelectorAll('[data-fid]').forEach(el=>{
    el.onclick=async()=>{
      const fid=el.dataset.fid||null;
      for(const id of ids){
        const vid=allVideos.find(v=>v.id===id);
        if(vid){vid.folderId=fid;await saveVideoMeta(vid)}
      }
      hideModal();renderLibrary();renderSidebar();toast('Moved','success');
    };
  });
  document.getElementById('modalNewFld').onclick=()=>{hideModal();createFolder()};
}

window.app.hideModal=hideModal;

// ---- FOLDERS ----
async function createFolder(){
  showModal(`<div class="modal-title">New Folder</div>
    <div class="modal-field"><label>Name</label><input id="folderNameInput" placeholder="Folder name"></div>
    <div class="modal-actions"><button class="tb-btn" onclick="app.hideModal()">Cancel</button><button class="tb-btn primary" id="folderCreate">Create</button></div>`);
  const inp=document.getElementById('folderNameInput');inp.focus();
  document.getElementById('folderCreate').onclick=async()=>{
    const name=inp.value.trim();if(!name)return;
    const f={id:uuid(),name};
    await dbPut('folders',f);allFolders.push(f);
    hideModal();renderSidebar();toast('Folder created','success');
  };
  inp.onkeydown=e=>{if(e.key==='Enter')document.getElementById('folderCreate').click()};
}
async function renameFolder(id){
  const f=allFolders.find(x=>x.id===id);if(!f)return;
  showModal(`<div class="modal-title">Rename Folder</div>
    <div class="modal-field"><label>Name</label><input id="fldRename" value="${escHtml(f.name)}"></div>
    <div class="modal-actions"><button class="tb-btn" onclick="app.hideModal()">Cancel</button><button class="tb-btn primary" id="fldRenameOk">Save</button></div>`);
  const inp=document.getElementById('fldRename');inp.focus();inp.select();
  document.getElementById('fldRenameOk').onclick=async()=>{
    f.name=inp.value.trim()||f.name;await dbPut('folders',f);hideModal();renderSidebar()};
  inp.onkeydown=e=>{if(e.key==='Enter')document.getElementById('fldRenameOk').click()};
}
async function deleteFolder(id){
  if(!confirm('Delete this folder? Videos will be moved to root.'))return;
  allVideos.filter(v=>v.folderId===id).forEach(v=>{v.folderId=null;saveVideoMeta(v)});
  await dbDelete('folders',id);allFolders=allFolders.filter(f=>f.id!==id);
  if(currentFolderId===id){currentFilter='all';currentFolderId=null}
  renderSidebar();renderLibrary();
}
$('addFolderBtn').addEventListener('click',createFolder);

// ---- PLAYLISTS ----
async function createPlaylist(){
  showModal(`<div class="modal-title">New Playlist</div>
    <div class="modal-field"><label>Name</label><input id="plNameInput" placeholder="Playlist name"></div>
    <div class="modal-actions"><button class="tb-btn" onclick="app.hideModal()">Cancel</button><button class="tb-btn primary" id="plCreate">Create</button></div>`);
  const inp=document.getElementById('plNameInput');inp.focus();
  document.getElementById('plCreate').onclick=async()=>{
    const name=inp.value.trim();if(!name)return;
    const p={id:uuid(),name,videoIds:[]};
    await dbPut('playlists',p);allPlaylists.push(p);
    hideModal();renderSidebar();toast('Playlist created','success');
  };
  inp.onkeydown=e=>{if(e.key==='Enter')document.getElementById('plCreate').click()};
}
async function renamePlaylist(id){
  const p=allPlaylists.find(x=>x.id===id);if(!p)return;
  showModal(`<div class="modal-title">Rename Playlist</div>
    <div class="modal-field"><label>Name</label><input id="plRename" value="${escHtml(p.name)}"></div>
    <div class="modal-actions"><button class="tb-btn" onclick="app.hideModal()">Cancel</button><button class="tb-btn primary" id="plRenameOk">Save</button></div>`);
  const inp=document.getElementById('plRename');inp.focus();inp.select();
  document.getElementById('plRenameOk').onclick=async()=>{
    p.name=inp.value.trim()||p.name;await dbPut('playlists',p);hideModal();renderSidebar()};
  inp.onkeydown=e=>{if(e.key==='Enter')document.getElementById('plRenameOk').click()};
}
async function deletePlaylist(id){
  if(!confirm('Delete this playlist?'))return;
  await dbDelete('playlists',id);allPlaylists=allPlaylists.filter(p=>p.id!==id);
  if(currentPlaylistId===id){currentFilter='all';currentPlaylistId=null}
  renderSidebar();renderLibrary();
}
$('addPlaylistBtn').addEventListener('click',createPlaylist);

// ---- VIEW/SORT/SEARCH ----
$('viewToggle').addEventListener('click',()=>{
  isListView=!isListView;
  $('viewToggle').innerHTML=isListView?'&#9638;':'&#9776;';
  $('viewToggle').classList.toggle('active',isListView);
  renderLibrary();
});
sortSelect.addEventListener('change',renderLibrary);
searchBox.addEventListener('input',renderLibrary);

// ---- MULTI SELECT ----
$('multiSelectBtn').addEventListener('click',()=>{
  multiSelectMode=!multiSelectMode;
  $('multiSelectBtn').classList.toggle('active',multiSelectMode);
  if(!multiSelectMode){selectedIds.clear();updateBatchActions()}
  videoGrid.classList.toggle('multi-select-mode',multiSelectMode);
  renderLibrary();
});
function updateBatchActions(){
  const ba=$('batchActions');
  if(selectedIds.size>0){
    ba.style.display='flex';
    $('batchCount').textContent=selectedIds.size+' selected';
  }else{
    ba.style.display='none';
  }
}
$('batchDelete').addEventListener('click',async()=>{
  if(!confirm(`Delete ${selectedIds.size} videos?`))return;
  for(const id of selectedIds){
    await dbDelete('videos',id);
    allVideos=allVideos.filter(v=>v.id!==id);
    for(const pl of allPlaylists){pl.videoIds=pl.videoIds.filter(v=>v!==id);await dbPut('playlists',pl)}
  }
  selectedIds.clear();updateBatchActions();renderLibrary();updateCounts();renderSidebar();updateStorage();toast('Deleted','success');
});
$('batchFav').addEventListener('click',async()=>{
  for(const id of selectedIds){const v=allVideos.find(x=>x.id===id);if(v){v.favorite=true;await saveVideoMeta(v)}}
  renderLibrary();updateCounts();renderSidebar();toast('Favorited','success');
});
$('batchPlaylist').addEventListener('click',()=>{showAddToPlaylistModal([...selectedIds])});
$('batchFolder').addEventListener('click',()=>{showMoveToFolderModal([...selectedIds])});

// ---- SIDEBAR TOGGLE ----
$('sidebarToggle').addEventListener('click',()=>{
  sidebar.classList.toggle('open');
  sidebar.classList.toggle('collapsed');
});

// ---- INIT ----
async function init(){
  try{
    await openDB();
    allVideos=await dbGetAll('videos');
    allFolders=await dbGetAll('folders');
    allPlaylists=await dbGetAll('playlists');
    // restore settings
    const settings=await dbGet('settings','prefs');
    if(settings){
      if(settings.isListView!==undefined)isListView=settings.isListView;
      if(settings.sortBy)sortSelect.value=settings.sortBy;
    }
    renderLibrary();
    renderSidebar();
    updateCounts();
    updateStorage();
    if(isListView){$('viewToggle').innerHTML='&#9776;';$('viewToggle').classList.add('active')}
    // save settings on change
    sortSelect.addEventListener('change',saveSettings);
  }catch(e){
    console.error('DB init failed:',e);
    toast('Failed to open database','error');
  }
}

async function saveSettings(){
  await dbPut('settings',{key:'prefs',isListView,sortBy:sortSelect.value});
}

// persist storage if possible
if(navigator.storage&&navigator.storage.persist){navigator.storage.persist().catch(()=>{})}

init();
})();
</script>
