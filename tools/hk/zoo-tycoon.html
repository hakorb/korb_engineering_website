<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<meta name="description" content="Korb Zoo Tycoon — a free, browser-based Korb family tool from Korb Engineering. No signup, no downloads, works on mobile.">
<title>Korb Zoo Tycoon</title>
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#050a0f; --s1:#0a1018; --s2:#0e1520; --brd:#1a2535;
  --cy:#00d4ff; --or:#ff6600; --gr:#10b981; --rd:#ef4444; --gd:#fbbf24;
  --tx:#e2e8f0; --mut:#64748b;
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
html,body{height:100%;overflow:hidden;background:var(--bg);color:var(--tx);font-family:'JetBrains Mono',monospace;font-size:12px;user-select:none;-webkit-user-select:none;touch-action:none}
button{font-family:inherit;color:inherit;background:var(--s2);border:1px solid var(--brd);padding:6px 10px;cursor:pointer;font-size:11px}
button:hover{border-color:var(--cy);color:var(--cy)}
button.active{background:var(--cy);color:#000;border-color:var(--cy)}
button:disabled{opacity:0.4;cursor:not-allowed}
#game{position:fixed;inset:0;display:flex;flex-direction:column}
#topbar{background:var(--s1);border-bottom:1px solid var(--brd);padding:6px 10px;display:flex;gap:10px;align-items:center;flex-wrap:wrap;font-size:11px;z-index:10}
#topbar .stat{display:flex;gap:4px;align-items:center}
#topbar .lbl{color:var(--mut);font-size:9px;text-transform:uppercase}
#topbar .val{font-weight:700}
.cash{color:var(--gd)}
.rating{color:var(--cy)}
.date{color:var(--or)}
#main{flex:1;display:flex;position:relative;overflow:hidden}
#canvasWrap{flex:1;position:relative;background:#0b1a0b;overflow:hidden}
#gameCanvas{position:absolute;inset:0;width:100%;height:100%;display:block;cursor:crosshair}
#sidebar{width:220px;background:var(--s1);border-left:1px solid var(--brd);display:flex;flex-direction:column;overflow:hidden}
.tabs{display:flex;flex-wrap:wrap;border-bottom:1px solid var(--brd);background:var(--s2)}
.tabs button{flex:1 1 33%;border:none;border-bottom:1px solid var(--brd);border-right:1px solid var(--brd);padding:8px 4px;font-size:9px;background:var(--s1)}
.tabs button.active{background:var(--cy);color:#000}
.tab-content{flex:1;overflow-y:auto;padding:6px}
.tab-content::-webkit-scrollbar{width:6px}
.tab-content::-webkit-scrollbar-thumb{background:var(--brd)}
.item-btn{width:100%;display:flex;justify-content:space-between;padding:6px;margin-bottom:3px;font-size:10px;text-align:left}
.item-btn .cost{color:var(--gd)}
.item-btn.unaffordable{opacity:0.5}
#minimap{position:absolute;top:8px;right:8px;width:140px;height:100px;background:var(--s1);border:1px solid var(--brd);pointer-events:none}
#minimap canvas{width:100%;height:100%;display:block}
#infoPanel{position:absolute;top:8px;left:8px;background:var(--s1);border:1px solid var(--brd);padding:8px;font-size:10px;max-width:220px;display:none}
#infoPanel.show{display:block}
#infoPanel h3{color:var(--cy);font-size:11px;margin-bottom:4px}
#infoPanel .row{display:flex;justify-content:space-between;margin-bottom:2px}
#infoPanel .bar{height:4px;background:var(--s2);margin:2px 0 4px}
#infoPanel .bar-f{height:100%;background:var(--gr);transition:width 0.3s}
#notifs{position:absolute;bottom:8px;left:8px;max-width:280px;font-size:10px;pointer-events:none;z-index:5}
.notif{background:var(--s1);border-left:3px solid var(--cy);padding:4px 8px;margin-top:3px;opacity:0;animation:slideIn 0.3s forwards}
.notif.warn{border-left-color:var(--or)}
.notif.bad{border-left-color:var(--rd)}
.notif.good{border-left-color:var(--gr)}
@keyframes slideIn{from{transform:translateX(-100%);opacity:0}to{transform:translateX(0);opacity:1}}
#menu{position:fixed;inset:0;background:rgba(5,10,15,0.95);display:none;align-items:center;justify-content:center;z-index:100}
#menu.show{display:flex}
.menu-box{background:var(--s1);border:1px solid var(--cy);padding:20px;min-width:320px;max-width:90%;max-height:90%;overflow-y:auto}
.menu-box h2{color:var(--cy);margin-bottom:12px;font-size:16px}
.menu-box h3{color:var(--or);margin:10px 0 6px;font-size:12px}
.menu-box button{width:100%;margin-bottom:6px;padding:10px}
.menu-box .save-slot{display:flex;gap:6px;margin-bottom:4px}
.menu-box .save-slot button{flex:1;margin-bottom:0}
.menu-box input[type=text]{background:var(--s2);border:1px solid var(--brd);color:var(--tx);padding:6px;font-family:inherit;width:100%;margin-bottom:6px}
#tool-ind{position:absolute;bottom:8px;right:8px;background:var(--s1);border:1px solid var(--cy);padding:6px 10px;font-size:10px;color:var(--cy)}
@media(max-width:720px){
  #sidebar{width:170px}
  #minimap{width:90px;height:66px}
  #topbar{font-size:10px;padding:4px 6px;gap:6px}
  .tabs button{font-size:8px;padding:6px 2px}
}
@media(max-width:520px){
  #main{flex-direction:column-reverse}
  #sidebar{width:100%;height:180px;border-left:none;border-top:1px solid var(--brd)}
  .tabs{flex-wrap:nowrap;overflow-x:auto}
  .tabs button{flex:0 0 auto;min-width:50px}
  #minimap{width:70px;height:52px}
}
.fin-chart{background:var(--s2);border:1px solid var(--brd);margin-top:6px;width:100%;height:60px}
#speed{display:flex;gap:2px}
#speed button{padding:4px 6px;font-size:10px}
.achv{color:var(--gd);font-size:9px}
.research-item{border:1px solid var(--brd);padding:4px;margin-bottom:3px;font-size:9px}
.research-item.done{border-color:var(--gr);color:var(--gr)}
.research-item button{padding:3px 6px;font-size:9px;margin-top:2px}
</style>
</head>
<body>
<div id="game">
  <div id="topbar">
    <div class="stat"><span class="lbl">$</span><span class="val cash" id="cash">50000</span></div>
    <div class="stat"><span class="lbl">DATE</span><span class="val date" id="date">Y1 Spring D1</span></div>
    <div class="stat"><span class="lbl">RATING</span><span class="val rating" id="rating">0.0★</span></div>

    <div class="stat"><span class="lbl">ANI</span><span class="val" id="aniCount">0</span></div>
    <div id="speed">
      <button id="sp0">❚❚</button>
      <button id="sp1" class="active">1x</button>

  </div>
  <div id="main">

</div>
<div id="menu"><div class="menu-box" id="menuBox"></div></div>

<script>

// --- Buildings ---

  {id:'entrance',n:'Entrance',c:2000,w:2,h:2,col:'#8a4a20',req:true,inc:0},
  {id:'burger',n:'Burger Stand',c:1500,w:2,h:2,col:'#d08040',sells:'food'},

// --- Research tree ---

  {id:'r1',n:'Exotic Species I',c:3000,pts:30,desc:'Unlock Panda, Red Panda',unlocks:['Panda','RedPanda']},
  {id:'r2',n:'Arctic Habitat',c:4000,pts:40,desc:'Unlock Polar Bear',unlocks:['PolarBear']},
  {id:'r3',n:'Big Cats Program',c:5000,pts:50,desc:'Unlock Cheetah',unlocks:['Cheetah']},
  {id:'r4',n:'Northern Fauna',c:3500,pts:35,desc:'Unlock Moose',unlocks:['Moose']},
  {id:'r5',n:'Primate Research',c:4500,pts:45,desc:'Unlock Gorilla',unlocks:['Gorilla']},
  {id:'r6',n:'Staff Training',c:2500,pts:25,desc:'+20% staff efficiency',bonus:'staff'},
  {id:'r7',n:'Veterinary Tech',c:3000,pts:30,desc:'+50% heal rate',bonus:'vet'},
  {id:'r8',n:'Breeding Program',c:3500,pts:35,desc:'+30% reproduction rate',bonus:'breed'},
  {id:'r9',n:'Conservation Grant',c:5000,pts:60,desc:'$500/month grant',bonus:'grant'},
  {id:'r10',n:'Marketing Campaign',c:2000,pts:20,desc:'+25% visitors',bonus:'mkt'},

// --- Staff types ---
const STAFF_TYPES = [
  {id:'keeper',n:'Zookeeper',c:500,w:200,col:'#00d4ff',desc:'Feeds animals'},
  {id:'maint',n:'Maintenance',c:400,w:150,col:'#fbbf24',desc:'Repairs & cleans'},
  {id:'guard',n:'Security',c:600,w:250,col:'#ef4444',desc:'Handles escapes'},

//=============================================================
// GAME STATE

const G = {

  decos: [],
  animals: [],
  staff: [],
  visitors: [],

  const r = Math.random();
  if(r<0.02) G.terrain[i]=T.ROCK;
  else if(r<0.04) G.terrain[i]=T.DIRT;
}
// add a water feature and sand patch
for(let y=5;y<9;y++) for(let x=35;x<42;x++) G.terrain[y*W+x]=T.WATER;
for(let y=25;y<30;y++) for(let x=10;x<18;x++) G.terrain[y*W+x]=T.SAND;
for(let y=8;y<13;y++) for(let x=48;x<55;x++) G.terrain[y*W+x]=T.SNOW;

//=============================================================

const inBounds = (x,y) => x>=0 && y>=0 && x<W && y<H;
const ti = (x,y) => y*W+x;
const money = n => '$'+Math.round(n).toLocaleString();
const clamp = (v,a,b) => v<a?a:v>b?b:v;
function rand(a,b){return a+Math.random()*(b-a)}
function irand(a,b){return Math.floor(rand(a,b+1))}
function dist(a,b){const dx=a.x-b.x,dy=a.y-b.y;return Math.sqrt(dx*dx+dy*dy)}
function notify(msg,kind='info'){
  G.notifs.push({msg,kind,t:Date.now()});
  if(G.notifs.length>5) G.notifs.shift();
  renderNotifs();
  if(kind==='good') audio.play('chime');
  if(kind==='bad') audio.play('alert');
}
function renderNotifs(){
  const el=$('notifs');
  el.innerHTML='';
  G.notifs.forEach(n=>{
    const d=document.createElement('div');
    d.className='notif '+n.kind;
    d.textContent=n.msg;
    el.appendChild(d);
  });
}
function canPay(n){return G.cash>=n}
function pay(n,reason){
  G.cash-=n; G.monthExpense+=n;
  spawnParticle(rand(100,300),60,-(n),'#ef4444');
}
function earn(n,reason){
  G.cash+=n; G.monthIncome+=n;
}
function spawnParticle(x,y,v,color){
  G.particles.push({x,y,vy:-1,life:60,text:(v>=0?'+':'')+money(v),color});
}

//=============================================================
// AUDIO (Web Audio synth)
//=============================================================
const audio = (()=>{
  let ctx=null, muted=false;
  function ensure(){ if(!ctx){ try{ctx=new (window.AudioContext||window.webkitAudioContext)()}catch(e){} } return ctx; }
  function tone(f,d,type='sine',vol=0.1){
    const c=ensure(); if(!c||muted) return;
    const o=c.createOscillator(),g=c.createGain();
    o.type=type; o.frequency.value=f;
    g.gain.setValueAtTime(vol,c.currentTime);
    g.gain.exponentialRampToValueAtTime(0.001,c.currentTime+d);
    o.connect(g); g.connect(c.destination);
    o.start(); o.stop(c.currentTime+d);
  }
  function play(kind){
    switch(kind){
      case 'click': tone(600,0.05,'square',0.05); break;
      case 'build': tone(400,0.1,'square',0.08); setTimeout(()=>tone(600,0.08,'square',0.08),60); break;
      case 'cash': tone(880,0.08,'triangle',0.1); setTimeout(()=>tone(1320,0.1,'triangle',0.1),80); break;
      case 'chime': tone(660,0.1,'sine',0.1); setTimeout(()=>tone(990,0.15,'sine',0.1),100); break;
      case 'alert': tone(200,0.2,'sawtooth',0.1); break;
      case 'fanfare':
        [523,659,784,1047].forEach((f,i)=>setTimeout(()=>tone(f,0.2,'triangle',0.12),i*120));
        break;
      case 'error': tone(150,0.15,'square',0.08); break;
    }
  }
  return {play,toggle:()=>muted=!muted,isMuted:()=>muted};
})();

//=============================================================
// CANVAS & CAMERA
//=============================================================
const canvas = $('gameCanvas');
const ctx = canvas.getContext('2d');
const mmCanvas = $('mmCanvas');
const mmCtx = mmCanvas.getContext('2d');
let DPR = window.devicePixelRatio||1;
function resize(){
  const r = canvas.getBoundingClientRect();
  canvas.width = r.width*DPR;
  canvas.height = r.height*DPR;
  ctx.setTransform(DPR,0,0,DPR,0,0);
}
window.addEventListener('resize',resize);

function worldToScreen(wx,wy){
  const r=canvas.getBoundingClientRect();
  return {
    x:(wx-G.camera.x)*G.camera.zoom + r.width/2,
    y:(wy-G.camera.y)*G.camera.zoom + r.height/2
  };
}
function screenToWorld(sx,sy){
  const r=canvas.getBoundingClientRect();
  return {
    x:(sx-r.width/2)/G.camera.zoom + G.camera.x,
    y:(sy-r.height/2)/G.camera.zoom + G.camera.y
  };
}
function screenToTile(sx,sy){
  const w=screenToWorld(sx,sy);
  return {x:Math.floor(w.x/TS),y:Math.floor(w.y/TS)};
}
// Set initial camera center
G.camera.x = (W*TS)/2;
G.camera.y = (H*TS)/2;

//=============================================================
// INPUT
//=============================================================
let mouse={x:0,y:0,down:false,moved:false,tile:{x:0,y:0}};
let touch={pinchDist:0,pinching:false};
let panMode=false;

function getEvtPos(e){
  const r=canvas.getBoundingClientRect();
  if(e.touches && e.touches[0]) return {x:e.touches[0].clientX-r.left,y:e.touches[0].clientY-r.top};
  return {x:e.clientX-r.left,y:e.clientY-r.top};
}

canvas.addEventListener('mousedown',e=>{
  const p=getEvtPos(e);
  mouse.down=true; mouse.moved=false;
  mouse.sx=p.x; mouse.sy=p.y;
  mouse.startCam={x:G.camera.x,y:G.camera.y};
  G.dragStart=screenToTile(p.x,p.y);
  if(e.button===2||e.shiftKey||!G.selectedTool) panMode=true;
});
canvas.addEventListener('contextmenu',e=>e.preventDefault());
canvas.addEventListener('mousemove',e=>{
  const p=getEvtPos(e);
  mouse.x=p.x; mouse.y=p.y;
  mouse.tile=screenToTile(p.x,p.y);
  if(mouse.down){
    if(panMode){
      G.camera.x = mouse.startCam.x - (p.x-mouse.sx)/G.camera.zoom;
      G.camera.y = mouse.startCam.y - (p.y-mouse.sy)/G.camera.zoom;
    }
    mouse.moved=true;
  }
});
canvas.addEventListener('mouseup',e=>{
  const p=getEvtPos(e);
  if(!mouse.moved || !panMode) handleClick(p.x,p.y);
  mouse.down=false; panMode=false; G.dragStart=null;
});
canvas.addEventListener('wheel',e=>{
  e.preventDefault();
  const f = e.deltaY<0?1.1:0.9;
  G.camera.zoom = clamp(G.camera.zoom*f,0.4,3);
},{passive:false});

// Touch
canvas.addEventListener('touchstart',e=>{
  e.preventDefault();
  if(e.touches.length===2){
    const dx=e.touches[0].clientX-e.touches[1].clientX;
    const dy=e.touches[0].clientY-e.touches[1].clientY;
    touch.pinchDist=Math.sqrt(dx*dx+dy*dy);
    touch.pinching=true;
    touch.startZoom=G.camera.zoom;
  } else {
    const p=getEvtPos(e);
    mouse.down=true; mouse.moved=false;
    mouse.sx=p.x; mouse.sy=p.y; mouse.x=p.x; mouse.y=p.y;
    mouse.startCam={x:G.camera.x,y:G.camera.y};
    G.dragStart=screenToTile(p.x,p.y);
    mouse.tile=screenToTile(p.x,p.y);
    if(!G.selectedTool) panMode=true;
  }
},{passive:false});
canvas.addEventListener('touchmove',e=>{
  e.preventDefault();
  if(touch.pinching && e.touches.length===2){
    const dx=e.touches[0].clientX-e.touches[1].clientX;
    const dy=e.touches[0].clientY-e.touches[1].clientY;
    const d=Math.sqrt(dx*dx+dy*dy);
    G.camera.zoom=clamp(touch.startZoom*(d/touch.pinchDist),0.4,3);
  } else {
    const p=getEvtPos(e);
    mouse.x=p.x; mouse.y=p.y;
    mouse.tile=screenToTile(p.x,p.y);
    if(mouse.down){
      const mv=Math.abs(p.x-mouse.sx)+Math.abs(p.y-mouse.sy);
      if(mv>6) mouse.moved=true;
      if(panMode){
        G.camera.x = mouse.startCam.x - (p.x-mouse.sx)/G.camera.zoom;
        G.camera.y = mouse.startCam.y - (p.y-mouse.sy)/G.camera.zoom;
      }
    }
  }
},{passive:false});
canvas.addEventListener('touchend',e=>{
  e.preventDefault();
  if(touch.pinching){ touch.pinching=false; return; }
  if(!mouse.moved || !panMode) handleClick(mouse.x,mouse.y);
  mouse.down=false; panMode=false; G.dragStart=null;
},{passive:false});

//=============================================================
// CLICK HANDLING
//=============================================================
function handleClick(sx,sy){
  const t=screenToTile(sx,sy);
  if(!inBounds(t.x,t.y)) return;
  audio.play('click');
  const tool=G.selectedTool;
  if(!tool){
    // Selection - check animals, staff, buildings at this tile
    const wp={x:t.x*TS+TS/2, y:t.y*TS+TS/2};
    const a=G.animals.find(a=>dist(a,wp)<TS*0.8);
    if(a){G.selected={kind:'animal',ref:a};showInfo();return;}
    const s=G.staff.find(s=>dist(s,wp)<TS*0.8);
    if(s){G.selected={kind:'staff',ref:s};showInfo();return;}
    const b=G.buildings.find(b=>t.x>=b.x&&t.x<b.x+b.w&&t.y>=b.y&&t.y<b.y+b.h);
    if(b){G.selected={kind:'building',ref:b};showInfo();return;}
    G.selected=null; hideInfo();
    return;
  }
  // Apply tool
  if(tool.kind==='terrain'){
    if(canPay(TERRAIN_COST[tool.data])){
      if(G.terrain[ti(t.x,t.y)]!==tool.data){
        pay(TERRAIN_COST[tool.data]);
        G.terrain[ti(t.x,t.y)]=tool.data;
        audio.play('build');
      }
    } else notify('Not enough cash','bad');
  } else if(tool.kind==='fence'){
    if(canPay(25)){
      if(!G.fences[ti(t.x,t.y)]){
        pay(25); G.fences[ti(t.x,t.y)]=1;
        audio.play('build');
        recomputeEnclosures();
      }
    }
  } else if(tool.kind==='animal'){
    placeAnimal(t.x,t.y,tool.data);
  } else if(tool.kind==='build'){
    placeBuilding(t.x,t.y,tool.data);
  } else if(tool.kind==='staff'){
    placeStaff(t.x,t.y,tool.data);
  } else if(tool.kind==='deco'){
    placeDeco(t.x,t.y,tool.data);
  } else if(tool.kind==='erase'){
    eraseAt(t.x,t.y);
  }
  updateHUD();
}

function eraseAt(x,y){
  // remove fence / deco / building on tile
  const idx=ti(x,y);
  if(G.fences[idx]){G.fences[idx]=0; recomputeEnclosures(); return;}
  const di=G.decos.findIndex(d=>d.x===x&&d.y===y);
  if(di>=0){G.decos.splice(di,1); return;}
  const bi=G.buildings.findIndex(b=>x>=b.x&&x<b.x+b.w&&y>=b.y&&y<b.y+b.h);
  if(bi>=0){
    if(G.buildings[bi].id==='entrance') G.entranceSet=false;
    G.buildings.splice(bi,1); return;
  }
}

//=============================================================
function placeAnimal(x,y,species){
  const encId=G.enclosures[ti(x,y)];
  if(encId<=0){notify('Need enclosure (fenced area)','bad');return}
  if(!canPay(species.p)){notify('Not enough cash','bad');return}
  // check if locked
  if(LOCKED_SPECIES.includes(species.n)){
    const unlocked = Object.keys(G.researched).some(r => {
      const res = RESEARCH.find(x=>x.id===r);
      return res && res.unlocks && res.unlocks.includes(species.n);
    });
    if(!unlocked){notify(species.n+' locked - research first','bad');return}
  }
  pay(species.p);
  G.animals.push(createAnimal(species,x*TS+TS/2,y*TS+TS/2,encId));
  notify('Added '+species.n,'good');
  audio.play('cash');
}
function createAnimal(sp,x,y,encId){
  return {
    kind:'animal', species:sp.n, sp,
    x,y, tx:x,ty:y,
    happy:70, food:80, health:100, age:irand(1,5),
    sex: Math.random()<0.5?'M':'F',
    enc: encId,
    sick:false, escaped:false,
    moveT: 0,
    id: Math.random().toString(36).slice(2,8)
  };
}
function placeBuilding(x,y,b){
  if(!canPay(b.c)){notify('Not enough cash','bad');return}
  // check fit
  for(let dy=0;dy<b.h;dy++) for(let dx=0;dx<b.w;dx++){
    const tx=x+dx,ty=y+dy;
    if(!inBounds(tx,ty)){notify('Out of bounds','bad');return}
    if(G.fences[ti(tx,ty)]){notify('Blocked','bad');return}
    if(G.buildings.some(bb=>tx>=bb.x&&tx<bb.x+bb.w&&ty>=bb.y&&ty<bb.y+bb.h)){notify('Overlap','bad');return}
  }
  if(b.req && G.entranceSet){notify('Already have entrance','bad');return}
  pay(b.c);
  G.buildings.push({...b,x,y});
  if(b.id==='entrance') G.entranceSet=true;
  notify('Built '+b.n,'good');
  audio.play('cash');
}
function placeStaff(x,y,st){
  if(!canPay(st.c)){notify('Not enough cash','bad');return}
  pay(st.c);
  G.staff.push({
    kind:'staff',type:st.id,name:st.n,col:st.col,wage:st.w,
    x:x*TS+TS/2,y:y*TS+TS/2, tx:x*TS+TS/2,ty:y*TS+TS/2,
    skill:1, target:null, workT:0
  });
  notify('Hired '+st.n,'good');
  audio.play('cash');
}
function placeDeco(x,y,d){
  if(!canPay(d.c)){notify('Not enough cash','bad');return}
  pay(d.c);
  G.decos.push({...d,x,y});
  audio.play('build');
}

//=============================================================
// ENCLOSURE DETECTION (flood fill from each tile)
//=============================================================
function recomputeEnclosures(){
  G.enclosures.fill(-1);
  let id=1;
  const visited = new Uint8Array(W*H);
  for(let y=0;y<H;y++) for(let x=0;x<W;x++){
    const idx=ti(x,y);
    if(visited[idx]||G.fences[idx]) continue;
    // flood fill
    const stack=[[x,y]];
    const cells=[];
    let touchesEdge=false;
    while(stack.length){
      const [cx,cy]=stack.pop();
      if(!inBounds(cx,cy)){touchesEdge=true;continue}
      const ci=ti(cx,cy);
      if(visited[ci]||G.fences[ci]) continue;
      visited[ci]=1;
      cells.push(ci);
      stack.push([cx+1,cy],[cx-1,cy],[cx,cy+1],[cx,cy-1]);
    }
    if(!touchesEdge && cells.length>=4 && cells.length<800){
      // closed enclosure
      for(const c of cells) G.enclosures[c]=id;
      id++;
    }
  }
  G.nextEnclosureId=id;
  // Update animals - if their enclosure broken, mark escaped
  G.animals.forEach(a=>{
    const tx=Math.floor(a.x/TS), ty=Math.floor(a.y/TS);
    const e=G.enclosures[ti(tx,ty)];
    if(e<=0) { a.escaped=true; a.enc=-1; }
    else { a.escaped=false; a.enc=e; }
  });
}

//=============================================================
// PATHFINDING (BFS, cached)
//=============================================================
function bfsPath(sx,sy,tx,ty,allowFences=false){
  if(!inBounds(sx,sy)||!inBounds(tx,ty)) return null;
  const visited=new Uint8Array(W*H);
  const prev=new Int32Array(W*H); prev.fill(-1);
  const q=[sy*W+sx]; visited[sy*W+sx]=1;
  let found=false;
  while(q.length){
    const cur=q.shift();
    if(cur===ty*W+tx){found=true;break}
    const cx=cur%W, cy=(cur/W)|0;
    const dirs=[[1,0],[-1,0],[0,1],[0,-1]];
    for(const [dx,dy] of dirs){
      const nx=cx+dx, ny=cy+dy;
      if(!inBounds(nx,ny)) continue;
      const ni=ny*W+nx;
      if(visited[ni]) continue;
      const terr=G.terrain[ni];
      if(!allowFences && G.fences[ni]) continue;
      if(terr===T.WATER && !allowFences) continue;
      visited[ni]=1;
      prev[ni]=cur;
      q.push(ni);
    }
  }
  if(!found) return null;
  const path=[];
  let cur=ty*W+tx;
  while(cur!==-1){
    path.push({x:cur%W,y:(cur/W)|0});
    cur=prev[cur];
  }
  return path.reverse();
}

//=============================================================
// GAME LOGIC TICK
//=============================================================
let tickAcc=0;
function update(dt){
  if(G.gameOver||G.speed===0) return;
  tickAcc += dt*G.speed;
  // real tick every 50ms of game time
  while(tickAcc>=50){
    tickAcc-=50;
    gameTick();
  }
}

let dayTickCounter=0;
function gameTick(){
  G.tick++;
  dayTickCounter++;

  // Move animals (wander in enclosure)
  for(const a of G.animals){
    a.moveT--;
    if(a.moveT<=0){
      // Pick random spot in enclosure
      const tries=5;
      for(let i=0;i<tries;i++){
        const dx=irand(-3,3)*TS, dy=irand(-3,3)*TS;
        const nx=a.x+dx, ny=a.y+dy;
        const tx=Math.floor(nx/TS), ty=Math.floor(ny/TS);
        if(inBounds(tx,ty)&&G.enclosures[ti(tx,ty)]===a.enc&&!G.fences[ti(tx,ty)]){
          a.tx=nx; a.ty=ny; break;
        }
      }
      a.moveT=irand(40,120);
    }
    const dx=a.tx-a.x, dy=a.ty-a.y;
    const d=Math.sqrt(dx*dx+dy*dy);
    if(d>1){ a.x+=dx/d*0.6; a.y+=dy/d*0.6; }

    // Needs degrade
    if(G.tick%20===0){
      a.food = Math.max(0, a.food - 1);
      if(a.food<30) a.happy = Math.max(0, a.happy-1);
      if(a.sick) a.health = Math.max(0, a.health-2);
      // happiness based on habitat match
      if(G.tick%100===0){
        updateAnimalHappiness(a);
      }
    }
    // Death
    if(a.health<=0 || a.food<=0){
      a.dead=true;
    }
  }
  G.animals = G.animals.filter(a=>!a.dead);

  // Move staff
  for(const s of G.staff){
    updateStaff(s);
  }

  // Visitors
  spawnVisitors();
  for(const v of G.visitors){
    updateVisitor(v);
  }
  G.visitors = G.visitors.filter(v=>!v.gone);

  // Particles
  for(const p of G.particles){
    p.y += p.vy; p.life--;
  }
  G.particles = G.particles.filter(p=>p.life>0);

  // Day progression (1 day = 100 ticks at 1x)
  if(dayTickCounter>=100){
    dayTickCounter=0;
    endDay();
  }

  // Weather
  G.weatherT--;
  if(G.weatherT<=0){
    const roll=Math.random();
    if(roll<0.7) G.weather='clear';
    else if(roll<0.85) G.weather='rain';
    else G.weather='snow';
    G.weatherT=irand(600,1800);
  }

  // Events (rare)
  if(Math.random()<0.0005) randomEvent();
}

function updateAnimalHappiness(a){
  const tx=Math.floor(a.x/TS), ty=Math.floor(a.y/TS);
  const encId=a.enc;
  let h=50;
  // Count enclosure size and habitat match
  let size=0, matchTiles=0, waterTiles=0;
  const pref=a.sp.h;
  for(let i=0;i<W*H;i++){
    if(G.enclosures[i]===encId){
      size++;
      const terr=G.terrain[i];
      if(pref==='grass'&&terr===T.GRASS) matchTiles++;
      else if(pref==='water'&&(terr===T.WATER||terr===T.GRASS)) matchTiles++;
      else if(pref==='snow'&&terr===T.SNOW) matchTiles++;
      else if(pref==='sand'&&terr===T.SAND) matchTiles++;
      else if(pref==='rock'&&terr===T.ROCK) matchTiles++;
      if(terr===T.WATER) waterTiles++;
    }
  }
  const minSize = a.sp.sz==='L'?20:a.sp.sz==='M'?12:6;
  if(size>=minSize) h+=15; else h-=15;
  if(size>0){
    const matchPct = matchTiles/size;
    h += Math.round(matchPct*25);
  }
  // Social
  const sameSpecies = G.animals.filter(o=>o.enc===encId&&o.species===a.species).length;
  if(a.sp.soc && sameSpecies>=2) h+=10;
  else if(!a.sp.soc && sameSpecies>1) h-=10;
  // Food
  if(a.food>60) h+=5; else if(a.food<30) h-=15;
  // Check nearby deco
  let deco=0;
  for(const d of G.decos){
    const dd=Math.hypot(d.x*TS-a.x,d.y*TS-a.y);
    if(dd<8*TS) deco++;
  }
  h += Math.min(10, deco*2);
  a.happy = clamp(Math.round((a.happy*0.7+h*0.3)),0,100);
  // Reproduction
  if(a.happy>70 && a.food>60 && Math.random()<0.005*(G.bonuses.breed?1.3:1)){
    const mate=G.animals.find(o=>o!==a&&o.species===a.species&&o.sex!==a.sex&&o.enc===a.enc&&o.happy>60);
    if(mate){
      G.animals.push(createAnimal(a.sp,a.x+irand(-10,10),a.y+irand(-10,10),a.enc));
      notify('New baby '+a.species+'!','good');
      G.researchPts+=5;
    }
  }
}

function updateStaff(s){
  const dx=s.tx-s.x, dy=s.ty-s.y;
  const d=Math.sqrt(dx*dx+dy*dy);
  if(d>1){ s.x+=dx/d*1.0; s.y+=dy/d*1.0; return; }
  // Arrived - find target
  s.workT--;
  if(s.workT>0) return;
  if(s.type==='keeper'){
    // Find hungry animal
    const hungry = G.animals.filter(a=>a.food<60).sort((a,b)=>a.food-b.food)[0];
    if(hungry){
      s.tx=hungry.x; s.ty=hungry.y; s.target=hungry.id;
      if(Math.hypot(hungry.x-s.x,hungry.y-s.y)<TS){
        hungry.food=Math.min(100,hungry.food+40);
        pay(20);
        s.workT=30;
      }
    } else s.workT=50;
  } else if(s.type==='vet'){
    const sick=G.animals.filter(a=>a.sick||a.health<80).sort((a,b)=>a.health-b.health)[0];
    if(sick){
      s.tx=sick.x; s.ty=sick.y;
      if(Math.hypot(sick.x-s.x,sick.y-s.y)<TS){
        sick.health=Math.min(100,sick.health+50*(G.bonuses.vet?1.5:1));
        sick.sick=false; pay(30); s.workT=40;
      }
    } else s.workT=60;
  } else if(s.type==='guide'){
    // Wander near visitors
    const v=G.visitors[irand(0,G.visitors.length-1)];
    if(v){ s.tx=v.x; s.ty=v.y; }
    else { s.tx=s.x+irand(-50,50); s.ty=s.y+irand(-50,50); }
    // boost nearby
    for(const vi of G.visitors){
      if(Math.hypot(vi.x-s.x,vi.y-s.y)<4*TS) vi.happy=Math.min(100,vi.happy+1);
    }
    s.workT=40;
  } else if(s.type==='maint'){
    // Wander paths
    s.tx=s.x+irand(-60,60); s.ty=s.y+irand(-60,60); s.workT=50;
  } else if(s.type==='guard'){
    // Escaped animals
    const esc=G.animals.find(a=>a.escaped);
    if(esc){
      s.tx=esc.x; s.ty=esc.y;
      if(Math.hypot(esc.x-s.x,esc.y-s.y)<TS*2){
        esc.escaped=false; notify('Captured escaped '+esc.species,'good'); s.workT=30;
      }
    } else s.workT=60;
  }
}

function spawnVisitors(){
  if(!G.entranceSet) return;
  // Spawn rate depends on rating, time, etc.
  const baseRate = 0.01 + G.rating*0.01*(G.bonuses.mkt?1.25:1);
  if(Math.random()<baseRate && G.visitors.length<150){
    const ent = G.buildings.find(b=>b.id==='entrance');
    if(ent){
      G.visitors.push({
        kind:'visitor',
        x:(ent.x+ent.w/2)*TS, y:(ent.y+ent.h/2)*TS,
        tx:(ent.x+ent.w/2)*TS, ty:(ent.y+ent.h/2)*TS,
        hunger:50, thirst:50, rest:100, fun:30, happy:60,
        money:irand(20,80), stay:irand(600,1500), gone:false,
        col:`hsl(${irand(0,360)},60%,60%)`
      });
      earn(15 + G.rating*2);
      G.visitorsToday++; G.totalVisitors++;
    }
  }
}

function updateVisitor(v){
  v.stay--;
  if(v.stay<=0){ v.gone=true; return; }
  // Needs
  v.hunger=Math.max(0,v.hunger-0.1);
  v.thirst=Math.max(0,v.thirst-0.15);
  v.rest=Math.max(0,v.rest-0.08);
  // Pick target - go to nearest animal enclosure or amenity they need
  if(Math.random()<0.03){
    let target=null;
    if(v.hunger<40){
      const food = G.buildings.filter(b=>b.sells==='food');
      target = food[irand(0,food.length-1)];
    } else if(v.thirst<40){
      const drink = G.buildings.filter(b=>b.sells==='drink');
      target = drink[irand(0,drink.length-1)];
    } else if(v.rest<30){
      const rest = G.buildings.filter(b=>b.sells==='rest');
      target = rest[irand(0,rest.length-1)];
    } else {
      // Visit animals
      const a = G.animals[irand(0,G.animals.length-1)];
      if(a){ v.tx=a.x+irand(-2,2)*TS; v.ty=a.y+irand(-2,2)*TS; v.fun=Math.min(100,v.fun+5); }
    }
    if(target){
      v.tx=(target.x+target.w/2)*TS; v.ty=(target.y+target.h/2)*TS;
      // on near arrival, buy
      if(Math.hypot(v.x-v.tx,v.y-v.ty)<TS*2){
        const spend = irand(5,15);
        if(v.money>=spend){
          v.money-=spend; earn(spend);
          if(target.sells==='food'){v.hunger=100}
          else if(target.sells==='drink'){v.thirst=100}
          else if(target.sells==='rest'){v.rest=100}
          spawnParticle(v.x,v.y,spend,'#10b981');
        }
      }
    }
  }
  const dx=v.tx-v.x, dy=v.ty-v.y;
  const d=Math.sqrt(dx*dx+dy*dy);
  if(d>1){ v.x+=dx/d*0.8; v.y+=dy/d*0.8; }
  // Update happiness
  v.happy = clamp((v.hunger+v.thirst+v.rest+v.fun)/4,0,100);
}

function endDay(){
  G.day++;
  if(G.day>30){
    G.day=1;
    G.season=(G.season+1)%4;
    if(G.season===0) G.year++;
    endMonth();
  }
  updateRating();
  G.visitorsToday=0;
  // Auto save every 2 min real time — handled elsewhere
  updateHUD();
}

function endMonth(){
  // Pay wages
  let wages=0;
  for(const s of G.staff){ wages+=s.wage*(G.bonuses.staff?0.85:1) }
  pay(wages);
  if(G.bonuses.grant) earn(500);
  // Loan interest
  if(G.loaned>0){
    const interest = G.loaned*0.05;
    pay(interest);
  }
  const net = G.monthIncome-G.monthExpense;
  G.lastMonthNet=net;
  G.financeHistory.push({y:G.year,s:G.season,income:G.monthIncome,expense:G.monthExpense,cash:G.cash});
  if(G.financeHistory.length>48) G.financeHistory.shift();
  G.monthIncome=0; G.monthExpense=0;
  notify(`Month end: wages ${money(wages)}, net ${money(net)}`,net>=0?'good':'warn');
  // Bankruptcy
  if(G.cash < -5000){
    G.gameOver=true;
    notify('BANKRUPTCY! Game Over','bad');
    showGameOver(false);
  }
  // Auto save
  saveGame('autosave',true);
}

function updateRating(){
  let r=0;
  // diversity
  const species = new Set(G.animals.map(a=>a.species));
  r += Math.min(1.5, species.size*0.08);
  // happiness
  if(G.animals.length){
    const avg = G.animals.reduce((s,a)=>s+a.happy,0)/G.animals.length;
    r += avg/100*1.5;
  }
  // facilities
  const amenTypes = new Set(G.buildings.map(b=>b.sells).filter(Boolean));
  r += Math.min(1, amenTypes.size*0.2);
  // financial health
  if(G.cash>10000) r+=0.5;
  if(G.lastMonthNet>0) r+=0.5;
  G.rating = clamp(r,0,5);
  // Research points generated
  G.researchPts += Math.round(G.rating);
  // Win condition
  if(G.rating>=5 && !G.won){
    G.won=true; G.gameOver=true;
    notify('5-STAR ZOO! You won!','good');
    audio.play('fanfare');
    showGameOver(true);
  }
  if(G.year>=10 && !G.won){
    G.won=true; G.gameOver=true;
    notify('Year 10 reached — Victory!','good');
    showGameOver(true);
  }
}

function randomEvent(){
  const events=[
    ()=>{notify('Heat wave! Animals stressed','warn'); G.animals.forEach(a=>a.happy=Math.max(0,a.happy-15))},
    ()=>{notify('Donation from benefactor! +$2000','good'); earn(2000)},
    ()=>{notify('Celebrity visit! +20 visitors','good'); for(let i=0;i<20;i++) spawnVisitors()},
    ()=>{notify('Disease outbreak!','bad'); G.animals.forEach(a=>{if(Math.random()<0.3)a.sick=true})},
    ()=>{notify('Media review - positive!','good'); G.rating=Math.min(5,G.rating+0.3)},
    ()=>{notify('Grant awarded: +$3000','good'); earn(3000)},
  ];
  events[irand(0,events.length-1)]();
}

function draw(){
  const r=canvas.getBoundingClientRect();
  ctx.fillStyle='#050a0f';
  ctx.fillRect(0,0,r.width,r.height);

  // Apply camera
  ctx.save();
  ctx.translate(r.width/2,r.height/2);
  ctx.scale(G.camera.zoom,G.camera.zoom);
  ctx.translate(-G.camera.x,-G.camera.y);

  // Draw terrain (only visible tiles)
  const tl=screenToTile(0,0), br=screenToTile(r.width,r.height);
  const x0=clamp(tl.x-1,0,W-1), y0=clamp(tl.y-1,0,H-1);
  const x1=clamp(br.x+1,0,W-1), y1=clamp(br.y+1,0,H-1);
  for(let y=y0;y<=y1;y++){
    for(let x=x0;x<=x1;x++){
      const terr=G.terrain[ti(x,y)];
      ctx.fillStyle=TERRAIN_COLORS[terr];
      ctx.fillRect(x*TS,y*TS,TS,TS);
      // subtle texture
      if(terr===T.GRASS && (x+y)%3===0){
        ctx.fillStyle='rgba(40,80,30,0.3)';
        ctx.fillRect(x*TS+3,y*TS+3,2,2);
      }
    }
  }

  // Grid (subtle)
  if(G.camera.zoom>0.7){
    ctx.strokeStyle='rgba(255,255,255,0.04)';
    ctx.lineWidth=1/G.camera.zoom;
    for(let y=y0;y<=y1+1;y++){
      ctx.beginPath();ctx.moveTo(x0*TS,y*TS);ctx.lineTo((x1+1)*TS,y*TS);ctx.stroke();
    }
    for(let x=x0;x<=x1+1;x++){
      ctx.beginPath();ctx.moveTo(x*TS,y0*TS);ctx.lineTo(x*TS,(y1+1)*TS);ctx.stroke();
    }
  }

  // Enclosure tint
  for(let y=y0;y<=y1;y++){
    for(let x=x0;x<=x1;x++){
      const e=G.enclosures[ti(x,y)];
      if(e>0){
        ctx.fillStyle='rgba(0,212,255,0.06)';
        ctx.fillRect(x*TS,y*TS,TS,TS);
      }
    }
  }

  // Fences
  ctx.fillStyle='#6a4520';
  ctx.strokeStyle='#3a2510';
  ctx.lineWidth=1;
  for(let y=y0;y<=y1;y++){
    for(let x=x0;x<=x1;x++){
      if(G.fences[ti(x,y)]){
        ctx.fillStyle='#6a4520';
        ctx.fillRect(x*TS+2,y*TS+2,TS-4,TS-4);
        ctx.strokeStyle='#3a2510';
        ctx.strokeRect(x*TS+2,y*TS+2,TS-4,TS-4);
      }
    }
  }

  // Decorations
  for(const d of G.decos){
    if(d.x<x0-2||d.x>x1+2||d.y<y0-2||d.y>y1+2) continue;
    drawDeco(d);
  }

  // Buildings
  for(const b of G.buildings){
    if(b.x+b.w<x0||b.x>x1+1||b.y+b.h<y0||b.y>y1+1) continue;
    ctx.fillStyle=b.col;
    ctx.fillRect(b.x*TS+2,b.y*TS+2,b.w*TS-4,b.h*TS-4);
    ctx.strokeStyle='#0a1018';
    ctx.lineWidth=2;
    ctx.strokeRect(b.x*TS+2,b.y*TS+2,b.w*TS-4,b.h*TS-4);
    ctx.fillStyle='#0a1018';
    ctx.font='bold 8px JetBrains Mono';
    ctx.textAlign='center';
    ctx.fillText(b.n.slice(0,10), (b.x+b.w/2)*TS, (b.y+b.h/2)*TS+3);
  }

  // Animals
  for(const a of G.animals){
    drawAnimal(a);
  }

  // Visitors
  for(const v of G.visitors){
    ctx.fillStyle=v.col;
    ctx.beginPath();
    ctx.arc(v.x,v.y,4,0,Math.PI*2);
    ctx.fill();
  }

  // Staff
  for(const s of G.staff){
    ctx.fillStyle=s.col;
    ctx.beginPath();
    ctx.arc(s.x,s.y,6,0,Math.PI*2);
    ctx.fill();
    ctx.strokeStyle='#000'; ctx.lineWidth=1;
    ctx.stroke();
    ctx.fillStyle='#fff';
    ctx.font='bold 7px JetBrains Mono';
    ctx.textAlign='center';
    ctx.fillText(s.type[0].toUpperCase(),s.x,s.y+2);
  }

  // Particles
  for(const p of G.particles){
    ctx.fillStyle=p.color;
    ctx.globalAlpha=p.life/60;
    ctx.font='bold 10px JetBrains Mono';
    ctx.textAlign='center';
    ctx.fillText(p.text,p.x,p.y);
    ctx.globalAlpha=1;
  }

  // Tool ghost preview
  if(G.selectedTool && inBounds(mouse.tile.x,mouse.tile.y)){
    ctx.globalAlpha=0.5;
    const t=G.selectedTool;
    if(t.kind==='terrain'){
      ctx.fillStyle=TERRAIN_COLORS[t.data];
      ctx.fillRect(mouse.tile.x*TS,mouse.tile.y*TS,TS,TS);
    } else if(t.kind==='fence'){
      ctx.fillStyle='#6a4520';
      ctx.fillRect(mouse.tile.x*TS+2,mouse.tile.y*TS+2,TS-4,TS-4);
    } else if(t.kind==='build'){
      ctx.fillStyle=t.data.col;
      ctx.fillRect(mouse.tile.x*TS,mouse.tile.y*TS,t.data.w*TS,t.data.h*TS);
    } else if(t.kind==='deco'){
      ctx.fillStyle=t.data.col;
      ctx.beginPath();ctx.arc(mouse.tile.x*TS+TS/2,mouse.tile.y*TS+TS/2,TS/3,0,Math.PI*2);ctx.fill();
    } else if(t.kind==='animal'){
      ctx.fillStyle=t.data.col;
      ctx.beginPath();ctx.arc(mouse.tile.x*TS+TS/2,mouse.tile.y*TS+TS/2,TS/2.5,0,Math.PI*2);ctx.fill();
    } else if(t.kind==='staff'){
      ctx.fillStyle=t.data.col;
      ctx.beginPath();ctx.arc(mouse.tile.x*TS+TS/2,mouse.tile.y*TS+TS/2,6,0,Math.PI*2);ctx.fill();
    } else if(t.kind==='erase'){
      ctx.strokeStyle='#ef4444'; ctx.lineWidth=2;
      ctx.strokeRect(mouse.tile.x*TS,mouse.tile.y*TS,TS,TS);
    }
    ctx.globalAlpha=1;
    ctx.strokeStyle='#00d4ff'; ctx.lineWidth=1.5/G.camera.zoom;
    ctx.strokeRect(mouse.tile.x*TS,mouse.tile.y*TS,TS,TS);
  }

  ctx.restore();

  // Weather overlay
  if(G.weather==='rain'){
    ctx.fillStyle='rgba(100,140,200,0.1)';
    ctx.fillRect(0,0,r.width,r.height);
    ctx.strokeStyle='rgba(180,220,255,0.3)';
    ctx.lineWidth=1;
    for(let i=0;i<30;i++){
      const x=(i*73+G.tick*3)%r.width;
      const y=(i*41+G.tick*8)%r.height;
      ctx.beginPath();ctx.moveTo(x,y);ctx.lineTo(x-3,y+10);ctx.stroke();
    }
  } else if(G.weather==='snow'){
    ctx.fillStyle='rgba(200,220,255,0.08)';
    ctx.fillRect(0,0,r.width,r.height);
    ctx.fillStyle='rgba(255,255,255,0.7)';
    for(let i=0;i<25;i++){
      const x=(i*83+G.tick*2)%r.width;
      const y=(i*47+G.tick*3)%r.height;
      ctx.beginPath();ctx.arc(x,y,2,0,Math.PI*2);ctx.fill();
    }
  }

  // Night tint
  const hour = (dayTickCounter/100)*24;
  if(hour<6||hour>20){
    ctx.fillStyle='rgba(5,10,30,0.35)';
    ctx.fillRect(0,0,r.width,r.height);
  } else if(hour<8||hour>18){
    ctx.fillStyle='rgba(255,120,30,0.1)';
    ctx.fillRect(0,0,r.width,r.height);
  }

  drawMinimap();
}

function drawAnimal(a){
  const sp=a.sp;
  ctx.save();
  ctx.translate(a.x,a.y);
  const sz = sp.sz==='L'?10:sp.sz==='M'?8:6;
  // body
  ctx.fillStyle=sp.col;
  ctx.beginPath();
  ctx.ellipse(0,0,sz,sz*0.75,0,0,Math.PI*2);
  ctx.fill();
  ctx.strokeStyle='#000';
  ctx.lineWidth=0.5;
  ctx.stroke();
  // accent decoration
  if(sp.acc==='stripe'){
    ctx.strokeStyle='rgba(0,0,0,0.6)'; ctx.lineWidth=1;
    for(let i=-2;i<=2;i++){
      ctx.beginPath();ctx.moveTo(i*3,-sz*0.7);ctx.lineTo(i*3,sz*0.7);ctx.stroke();
    }
  } else if(sp.acc==='spot'){
    ctx.fillStyle='rgba(0,0,0,0.5)';
    for(let i=0;i<4;i++){
      ctx.beginPath();ctx.arc((i%2-0.5)*4,(i<2?-1:1)*3,1.3,0,Math.PI*2);ctx.fill();
    }
  } else if(sp.acc==='mane'){
    ctx.fillStyle='rgba(60,30,0,0.7)';
    ctx.beginPath();ctx.arc(-sz*0.6,0,sz*0.5,0,Math.PI*2);ctx.fill();
  } else if(sp.acc==='tusk'){
    ctx.strokeStyle='#f8f0d8'; ctx.lineWidth=1.5;
    ctx.beginPath();ctx.moveTo(-sz,-2);ctx.lineTo(-sz-4,-1);ctx.stroke();
    ctx.beginPath();ctx.moveTo(-sz,2);ctx.lineTo(-sz-4,3);ctx.stroke();
  } else if(sp.acc==='horn'){
    ctx.strokeStyle='#d0c0a0'; ctx.lineWidth=2;
    ctx.beginPath();ctx.moveTo(-sz,0);ctx.lineTo(-sz-5,-3);ctx.stroke();
  } else if(sp.acc==='antler'){
    ctx.strokeStyle='#8a6a30'; ctx.lineWidth=1;
    ctx.beginPath();ctx.moveTo(-sz*0.5,-sz*0.5);ctx.lineTo(-sz-2,-sz-2);ctx.moveTo(-sz*0.5,-sz*0.5);ctx.lineTo(-sz+1,-sz-3);ctx.stroke();
    ctx.beginPath();ctx.moveTo(sz*0.5,-sz*0.5);ctx.lineTo(sz+2,-sz-2);ctx.stroke();
  } else if(sp.acc==='fan'){
    ctx.strokeStyle='#4090b0'; ctx.lineWidth=1;
    for(let i=-2;i<=2;i++){
      ctx.beginPath();ctx.moveTo(0,0);ctx.lineTo(sz*2*Math.cos(i*0.3+Math.PI),sz*2*Math.sin(i*0.3+Math.PI));ctx.stroke();
    }
  } else if(sp.acc==='hump'){
    ctx.fillStyle='rgba(100,80,40,0.6)';
    ctx.beginPath();ctx.arc(0,-sz*0.5,sz*0.4,0,Math.PI*2);ctx.fill();
  } else if(sp.acc==='tail'){
    ctx.fillStyle='rgba(255,255,255,0.8)';
    ctx.beginPath();ctx.arc(-sz,sz*0.3,2,0,Math.PI*2);ctx.fill();
  } else if(sp.acc==='belly'){
    ctx.fillStyle='#f8f8f8';
    ctx.beginPath();ctx.ellipse(0,sz*0.2,sz*0.5,sz*0.4,0,0,Math.PI*2);ctx.fill();
  } else if(sp.acc==='eyepatch'){
    ctx.fillStyle='#000';
    ctx.beginPath();ctx.arc(sz*0.3,-sz*0.3,2,0,Math.PI*2);ctx.fill();
    ctx.beginPath();ctx.arc(sz*0.3,sz*0.2,2,0,Math.PI*2);ctx.fill();
  }
  // Happy indicator
  if(a.happy<30){
    ctx.fillStyle='#ef4444';
    ctx.font='bold 10px JetBrains Mono';
    ctx.textAlign='center';
    ctx.fillText('!',0,-sz-4);
  }
  if(a.escaped){
    ctx.strokeStyle='#ef4444'; ctx.lineWidth=2;
    ctx.beginPath();ctx.arc(0,0,sz+4,0,Math.PI*2);ctx.stroke();
  }
  ctx.restore();
}

function drawDeco(d){
  const cx=d.x*TS+TS/2, cy=d.y*TS+TS/2;
  if(d.id==='tree'){
    ctx.fillStyle='#4a3020';
    ctx.fillRect(cx-1,cy,2,6);
    ctx.fillStyle='#2a6020';
    ctx.beginPath();ctx.arc(cx,cy-2,7,0,Math.PI*2);ctx.fill();
    ctx.fillStyle='#3a8030';
    ctx.beginPath();ctx.arc(cx-2,cy-4,4,0,Math.PI*2);ctx.fill();
  } else if(d.id==='bush'){
    ctx.fillStyle='#3a7030';
    ctx.beginPath();ctx.arc(cx,cy,5,0,Math.PI*2);ctx.fill();
    ctx.beginPath();ctx.arc(cx-3,cy+1,4,0,Math.PI*2);ctx.fill();
    ctx.beginPath();ctx.arc(cx+3,cy+1,4,0,Math.PI*2);ctx.fill();
  } else if(d.id==='flower'){
    ctx.fillStyle='#2a6020';
    ctx.fillRect(cx-1,cy-1,2,4);
    ctx.fillStyle=d.col;
    for(let i=0;i<5;i++){
      const a=i/5*Math.PI*2;
      ctx.beginPath();ctx.arc(cx+Math.cos(a)*2,cy-3+Math.sin(a)*2,1.5,0,Math.PI*2);ctx.fill();
    }
  } else if(d.id==='rock'){
    ctx.fillStyle='#606068';
    ctx.beginPath();ctx.arc(cx,cy,5,0,Math.PI*2);ctx.fill();
    ctx.fillStyle='#80808a';
    ctx.beginPath();ctx.arc(cx-2,cy-2,2,0,Math.PI*2);ctx.fill();
  } else if(d.id==='statue'){
    ctx.fillStyle='#b0b0b8';
    ctx.fillRect(cx-4,cy-6,8,12);
    ctx.fillStyle='#909098';
    ctx.fillRect(cx-5,cy+5,10,3);
    ctx.fillStyle='#c0c0c8';
    ctx.beginPath();ctx.arc(cx,cy-8,3,0,Math.PI*2);ctx.fill();
  } else if(d.id==='fountain'){
    ctx.fillStyle='#606068';
    ctx.beginPath();ctx.arc(cx,cy,10,0,Math.PI*2);ctx.fill();
    ctx.fillStyle='#60a0d0';
    ctx.beginPath();ctx.arc(cx,cy,7,0,Math.PI*2);ctx.fill();
    ctx.fillStyle='#a0c0f0';
    ctx.beginPath();ctx.arc(cx,cy-3,2,0,Math.PI*2);ctx.fill();
  }
}

function drawMinimap(){
  mmCtx.fillStyle='#0a1018';
  mmCtx.fillRect(0,0,140,100);
  const sx=140/W, sy=100/H;
  for(let y=0;y<H;y++) for(let x=0;x<W;x++){
    const t=G.terrain[ti(x,y)];
    mmCtx.fillStyle=TERRAIN_COLORS[t];
    mmCtx.fillRect(x*sx,y*sy,sx+0.5,sy+0.5);
  }
  for(let y=0;y<H;y++) for(let x=0;x<W;x++){
    if(G.fences[ti(x,y)]){
      mmCtx.fillStyle='#6a4520';
      mmCtx.fillRect(x*sx,y*sy,sx,sy);
    }
  }
  for(const b of G.buildings){
    mmCtx.fillStyle=b.col;
    mmCtx.fillRect(b.x*sx,b.y*sy,b.w*sx,b.h*sy);
  }
  for(const a of G.animals){
    mmCtx.fillStyle='#fff';
    mmCtx.fillRect((a.x/TS)*sx-0.5,(a.y/TS)*sy-0.5,1.5,1.5);
  }
  // Viewport rect
  const r=canvas.getBoundingClientRect();
  const tl=screenToTile(0,0), br=screenToTile(r.width,r.height);
  mmCtx.strokeStyle='#00d4ff';
  mmCtx.lineWidth=1;
  mmCtx.strokeRect(tl.x*sx,tl.y*sy,(br.x-tl.x)*sx,(br.y-tl.y)*sy);
}

function updateHUD(){

  $('cash').style.color = G.cash<0?'#ef4444':'#fbbf24';
  const seasons=['Spring','Summer','Fall','Winter'];
  $('date').textContent = `Y${G.year} ${seasons[G.season]} D${G.day}`;

}

function showInfo(){
  const p=$('infoPanel'); p.classList.add('show');
  const s=G.selected;
  if(!s){hideInfo();return}
  if(s.kind==='animal'){
    const a=s.ref;
    p.innerHTML=`<h3>${a.species} (${a.sex})</h3>
      <div class="row"><span>Age:</span><span>${a.age}y</span></div>
      <div class="row"><span>Happy:</span><span>${a.happy}%</span></div>
      <div class="bar"><div class="bar-f" style="width:${a.happy}%"></div></div>
      <div class="row"><span>Food:</span><span>${Math.round(a.food)}%</span></div>
      <div class="bar"><div class="bar-f" style="width:${a.food}%;background:#fbbf24"></div></div>
      <div class="row"><span>Health:</span><span>${Math.round(a.health)}%</span></div>
      <div class="bar"><div class="bar-f" style="width:${a.health}%;background:#ef4444"></div></div>
      <div class="row"><span>Habitat:</span><span>${a.sp.h}</span></div>
      <div class="row"><span>Diet:</span><span>${a.sp.d}</span></div>
      <button id="sellBtn">Sell ($${Math.round(a.sp.p/2)})</button>`;
    document.getElementById('sellBtn').onclick=()=>{
      earn(a.sp.p/2); a.dead=true; hideInfo(); notify('Sold '+a.species);
    };
  } else if(s.kind==='staff'){
    const st=s.ref;
    p.innerHTML=`<h3>${st.name}</h3>
      <div class="row"><span>Type:</span><span>${st.type}</span></div>
      <div class="row"><span>Wage:</span><span>$${st.wage}/mo</span></div>
      <div class="row"><span>Skill:</span><span>${st.skill}</span></div>
      <button id="fireBtn">Fire</button>`;
    document.getElementById('fireBtn').onclick=()=>{
      G.staff=G.staff.filter(x=>x!==st); hideInfo(); notify('Fired '+st.name);
    };
  } else if(s.kind==='building'){
    const b=s.ref;
    p.innerHTML=`<h3>${b.n}</h3>
      <div class="row"><span>Type:</span><span>${b.sells||'entrance'}</span></div>
      <div class="row"><span>Value:</span><span>${money(b.c)}</span></div>
      <button id="demoBtn">Demolish (refund $${Math.round(b.c/2)})</button>`;
    document.getElementById('demoBtn').onclick=()=>{
      earn(b.c/2);
      if(b.id==='entrance') G.entranceSet=false;
      G.buildings=G.buildings.filter(x=>x!==b); hideInfo();
    };
  }
}
function hideInfo(){$('infoPanel').classList.remove('show');G.selected=null}

// Tab system
let currentTab='terrain';
function renderTab(){
  const c=$('tabContent'); c.innerHTML='';
  // Erase button available in all tabs
  const eraseBtn=document.createElement('button');
  eraseBtn.textContent='✕ ERASE MODE';
  eraseBtn.className='item-btn';
  eraseBtn.style.borderColor='#ef4444';
  eraseBtn.onclick=()=>{G.selectedTool={kind:'erase',data:null};updateToolInd()};
  c.appendChild(eraseBtn);
  const clrBtn=document.createElement('button');
  clrBtn.textContent='NO TOOL (pan)';
  clrBtn.className='item-btn';
  clrBtn.onclick=()=>{G.selectedTool=null;updateToolInd()};
  c.appendChild(clrBtn);

  if(currentTab==='terrain'){
    TERRAIN_NAMES.forEach((n,i)=>{
      const b=document.createElement('button');
      b.className='item-btn';
      b.innerHTML=`<span>${n}</span><span class="cost">$${TERRAIN_COST[i]}</span>`;
      b.onclick=()=>{G.selectedTool={kind:'terrain',data:i};updateToolInd()};
      c.appendChild(b);
    });
  } else if(currentTab==='fence'){
    const b=document.createElement('button');
    b.className='item-btn';
    b.innerHTML=`<span>Wooden Fence</span><span class="cost">$25</span>`;
    b.onclick=()=>{G.selectedTool={kind:'fence'};updateToolInd()};
    c.appendChild(b);
    const info=document.createElement('div');
    info.style.cssText='font-size:9px;color:#64748b;padding:6px';
    info.textContent='Enclose an area to create an exhibit. Closed enclosures highlight cyan.';
    c.appendChild(info);
  } else if(currentTab==='animal'){
    SPECIES.forEach(sp=>{
      const locked = LOCKED_SPECIES.includes(sp.n) && !Object.keys(G.researched).some(r=>{
        const res=RESEARCH.find(x=>x.id===r);
        return res&&res.unlocks&&res.unlocks.includes(sp.n);
      });
      const b=document.createElement('button');
      b.className='item-btn'+(G.cash<sp.p?' unaffordable':'');
      b.innerHTML=`<span>${locked?'🔒 ':''}${sp.n} <em style="color:#64748b">${sp.r}</em></span><span class="cost">$${sp.p}</span>`;
      b.onclick=()=>{if(locked){notify(sp.n+' locked','bad');return}G.selectedTool={kind:'animal',data:sp};updateToolInd()};
      c.appendChild(b);
    });
  } else if(currentTab==='build'){
    BUILDINGS.forEach(bd=>{
      const b=document.createElement('button');
      b.className='item-btn'+(G.cash<bd.c?' unaffordable':'');
      b.innerHTML=`<span>${bd.n} (${bd.w}x${bd.h})</span><span class="cost">$${bd.c}</span>`;
      b.onclick=()=>{G.selectedTool={kind:'build',data:bd};updateToolInd()};
      c.appendChild(b);
    });
  } else if(currentTab==='staff'){
    STAFF_TYPES.forEach(st=>{
      const b=document.createElement('button');
      b.className='item-btn'+(G.cash<st.c?' unaffordable':'');
      b.innerHTML=`<span>${st.n}<br><em style="color:#64748b;font-size:8px">${st.desc} $${st.w}/mo</em></span><span class="cost">$${st.c}</span>`;
      b.onclick=()=>{G.selectedTool={kind:'staff',data:st};updateToolInd()};
      c.appendChild(b);
    });
  } else if(currentTab==='deco'){
    DECOS.forEach(d=>{
      const b=document.createElement('button');
      b.className='item-btn'+(G.cash<d.c?' unaffordable':'');
      b.innerHTML=`<span>${d.n}</span><span class="cost">$${d.c}</span>`;
      b.onclick=()=>{G.selectedTool={kind:'deco',data:d};updateToolInd()};
      c.appendChild(b);
    });
  } else if(currentTab==='research'){
    const header=document.createElement('div');
    header.style.cssText='font-size:10px;padding:4px;color:#00d4ff';
    header.textContent='Research Points: '+G.researchPts;
    c.appendChild(header);
    RESEARCH.forEach(r=>{
      const div=document.createElement('div');
      div.className='research-item'+(G.researched[r.id]?' done':'');
      div.innerHTML=`<strong>${r.n}</strong><br>${r.desc}<br>Cost: ${money(r.c)} + ${r.pts}pts`;
      if(!G.researched[r.id]){
        const b=document.createElement('button');
        b.textContent='Research';
        b.onclick=()=>{
          if(G.cash>=r.c && G.researchPts>=r.pts){
            pay(r.c); G.researchPts-=r.pts;
            G.researched[r.id]=true;
            if(r.bonus) G.bonuses[r.bonus]=true;
            notify('Researched: '+r.n,'good');
            renderTab();
            audio.play('fanfare');
          } else notify('Need more $ or research points','bad');
        };
        div.appendChild(b);
      }
      c.appendChild(div);
    });
  } else if(currentTab==='finance'){
    const div=document.createElement('div');
    div.style.cssText='font-size:10px;padding:4px';
    div.innerHTML=`
      <div class="row"><span>Cash:</span><strong>${money(G.cash)}</strong></div>
      <div class="row"><span>This Month Inc:</span><span style="color:#10b981">${money(G.monthIncome)}</span></div>
      <div class="row"><span>This Month Exp:</span><span style="color:#ef4444">${money(G.monthExpense)}</span></div>
      <div class="row"><span>Last Month Net:</span><span>${money(G.lastMonthNet)}</span></div>
      <div class="row"><span>Total Visitors:</span><span>${G.totalVisitors}</span></div>
      <div class="row"><span>Loaned:</span><span>${money(G.loaned)}</span></div>
      <canvas class="fin-chart" id="finChart" width="200" height="60"></canvas>
      <button id="loanBtn">Take $5000 Loan</button>
      <button id="repayBtn">Repay Loan</button>
    `;
    c.appendChild(div);
    setTimeout(drawFinChart,0);
    setTimeout(()=>{
      document.getElementById('loanBtn').onclick=()=>{G.cash+=5000;G.loaned+=5000;notify('Loan taken','warn')};
      document.getElementById('repayBtn').onclick=()=>{
        const r=Math.min(G.loaned,G.cash);
        if(r>0){G.cash-=r;G.loaned-=r;notify('Repaid '+money(r),'good')}
      };
    },0);
  }
}
function drawFinChart(){
  const c=document.getElementById('finChart'); if(!c) return;
  const cx=c.getContext('2d');
  cx.fillStyle='#0e1520'; cx.fillRect(0,0,200,60);
  if(G.financeHistory.length<2) return;
  const data=G.financeHistory.slice(-24);
  const max=Math.max(...data.map(d=>d.cash),1);
  const min=Math.min(...data.map(d=>d.cash),0);
  const range=max-min||1;
  cx.strokeStyle='#00d4ff'; cx.lineWidth=1.5;
  cx.beginPath();
  data.forEach((d,i)=>{
    const x=(i/(data.length-1))*196+2;
    const y=58-((d.cash-min)/range)*54;
    if(i===0) cx.moveTo(x,y); else cx.lineTo(x,y);
  });
  cx.stroke();
  cx.strokeStyle='#1a2535';
  cx.strokeRect(0,0,200,60);
}

function updateToolInd(){
  const t=G.selectedTool;
  let txt='None (pan)';
  if(t){
    if(t.kind==='terrain') txt='Terrain: '+TERRAIN_NAMES[t.data];
    else if(t.kind==='fence') txt='Fence';
    else if(t.kind==='animal') txt='Animal: '+t.data.n;
    else if(t.kind==='build') txt='Build: '+t.data.n;
    else if(t.kind==='staff') txt='Hire: '+t.data.n;
    else if(t.kind==='deco') txt='Deco: '+t.data.n;
    else if(t.kind==='erase') txt='Erase';
  }
  $('tool-ind').textContent='TOOL: '+txt;
}

//=============================================================
// SAVE / LOAD (IndexedDB)
//=============================================================
let DB=null;
function openDB(){
  return new Promise((res,rej)=>{
    const req=indexedDB.open('korb_zoo_tycoon_db',1);
    req.onupgradeneeded=e=>{
      const db=e.target.result;
      if(!db.objectStoreNames.contains('saves')) db.createObjectStore('saves',{keyPath:'name'});
    };
    req.onsuccess=e=>{DB=e.target.result;res()};
    req.onerror=e=>rej(e);
  });
}
function saveGame(name,silent){
  if(!DB) return;
  const data={
    name, date:Date.now(),
    state: {
      ...G,
      terrain: Array.from(G.terrain),
      fences: Array.from(G.fences),
      enclosures: Array.from(G.enclosures),
    }
  };
  const tx=DB.transaction('saves','readwrite');
  tx.objectStore('saves').put(data);
  tx.oncomplete=()=>{if(!silent)notify('Saved: '+name,'good')};
}
function loadGame(name){
  if(!DB) return;
  const tx=DB.transaction('saves','readonly');
  const req=tx.objectStore('saves').get(name);
  req.onsuccess=e=>{
    const r=e.target.result;
    if(!r){notify('No save found','bad');return}
    const s=r.state;
    Object.keys(s).forEach(k=>{ if(k in G) G[k]=s[k] });
    G.terrain = new Uint8Array(s.terrain);
    G.fences = new Uint8Array(s.fences);
    G.enclosures = new Int16Array(s.enclosures);
    notify('Loaded: '+name,'good');
    closeMenu();
    updateHUD();
  };
}
function listSaves(cb){
  if(!DB){cb([]);return}
  const tx=DB.transaction('saves','readonly');
  const req=tx.objectStore('saves').getAll();
  req.onsuccess=e=>cb(e.target.result||[]);
}
function deleteSave(name){
  if(!DB) return;
  const tx=DB.transaction('saves','readwrite');
  tx.objectStore('saves').delete(name);
}
function exportSave(){
  const data={terrain:Array.from(G.terrain),fences:Array.from(G.fences),enclosures:Array.from(G.enclosures),G:{...G,terrain:null,fences:null,enclosures:null}};
  const blob=new Blob([JSON.stringify(data)],{type:'application/json'});
  const url=URL.createObjectURL(blob);
  const a=document.createElement('a');
  a.href=url; a.download='korb_zoo_save.json'; a.click();
  URL.revokeObjectURL(url);
}

  };

function refreshSaveList(){
  listSaves(saves=>{
    const list=document.getElementById('saveList');
    if(!list) return;
    list.innerHTML='';
    if(!saves.length){list.innerHTML='<div style="color:#64748b;font-size:10px">No saves</div>';return}
    saves.forEach(s=>{
      const d=document.createElement('div');
      d.className='save-slot';
      d.innerHTML=`<button data-n="${s.name}">Load ${s.name}</button><button data-n="${s.name}" class="del">✕</button>`;
      list.appendChild(d);
      d.querySelector('button:not(.del)').onclick=()=>loadGame(s.name);
      d.querySelector('.del').onclick=()=>{deleteSave(s.name);refreshSaveList()};
    });
  });
}
function closeMenu(){ $('menu').classList.remove('show'); setSpeed(1); }

  const mb=$('menuBox');
  mb.innerHTML=`<h2 style="color:${won?'#10b981':'#ef4444'}">${won?'VICTORY!':'GAME OVER'}</h2>
    <div style="font-size:11px;margin:10px 0">

    Year: ${G.year}<br>
    Rating: ${G.rating.toFixed(1)}★<br>

    Species: ${new Set(G.animals.map(a=>a.species)).size}<br>
    Animals: ${G.animals.length}
    </div>
    <button id="ngBtn">New Game</button>`;
  document.getElementById('ngBtn').onclick=()=>location.reload();
}

//=============================================================
// MAIN LOOP
//=============================================================
let lastT=performance.now();
function loop(t){
  const dt=t-lastT; lastT=t;
  update(dt);
  draw();
  updateHUD();
  requestAnimationFrame(loop);
}

// Auto-save every 2 min
setInterval(()=>{ if(!G.gameOver) saveGame('autosave',true); },120000);

// Init
(async function(){
  await openDB().catch(()=>{});
  resize();
  recomputeEnclosures();
  renderTab();
  updateHUD();
  maybeShowTutorial();
  requestAnimationFrame(loop);
  notify('Welcome! Build an entrance to start','good');
})();

// Keyboard shortcuts
window.addEventListener('keydown',e=>{
  if(e.key==='Escape'){ G.selectedTool=null; updateToolInd(); hideInfo(); }
  else if(e.key==='1') setSpeed(1);
  else if(e.key==='2') setSpeed(2);
  else if(e.key==='4') setSpeed(4);
  else if(e.key===' '){ setSpeed(G.speed===0?1:0); e.preventDefault(); }
  else if(e.key==='m'||e.key==='M') openMenu();
});
</script>
