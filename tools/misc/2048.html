<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>2048 | Korb Engineering</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;700;800&display=swap');

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: #050a0f;
    font-family: 'JetBrains Mono', monospace;
    color: #c0d0e0;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    min-height: 100vh;
    overflow: hidden;
    touch-action: none;
    -webkit-user-select: none;
    user-select: none;
  }

  .header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    width: min(90vw, 420px);
    margin-bottom: 12px;
  }

  .brand {
    font-size: 11px;
    letter-spacing: 2px;
    text-transform: uppercase;
    color: #3a5a7a;
  }

  .title {
    font-size: 32px;
    font-weight: 800;
    color: #00d4ff;
    text-shadow: 0 0 20px rgba(0,212,255,0.3);
  }

  .score-bar {
    display: flex;
    gap: 12px;
    width: min(90vw, 420px);
    margin-bottom: 12px;
  }

  .score-box {
    flex: 1;
    background: #0a1018;
    border: 1px solid #1a2a3a;
    border-radius: 8px;
    padding: 8px 12px;
    text-align: center;
  }

  .score-box .label {
    font-size: 10px;
    letter-spacing: 1px;
    text-transform: uppercase;
    color: #3a5a7a;
  }

  .score-box .value {
    font-size: 20px;
    font-weight: 700;
    color: #00d4ff;
  }

  .score-box .value.added {
    animation: scoreAdd 0.4s ease-out;
  }

  @keyframes scoreAdd {
    0% { transform: scale(1.3); color: #ffd700; }
    100% { transform: scale(1); color: #00d4ff; }
  }

  .controls {
    display: flex;
    gap: 8px;
    width: min(90vw, 420px);
    margin-bottom: 12px;
  }

  .btn {
    flex: 1;
    background: #0a1a2a;
    border: 1px solid #1a3a5a;
    border-radius: 6px;
    color: #5a8aaa;
    font-family: 'JetBrains Mono', monospace;
    font-size: 12px;
    font-weight: 700;
    padding: 8px;
    cursor: pointer;
    transition: all 0.2s;
    text-transform: uppercase;
    letter-spacing: 1px;
  }

  .btn:hover {
    background: #0f2535;
    border-color: #00d4ff;
    color: #00d4ff;
  }

  .btn:active {
    transform: scale(0.97);
  }

  .grid-container {
    position: relative;
    width: min(90vw, 420px);
    height: min(90vw, 420px);
    background: #0a1018;
    border-radius: 12px;
    border: 1px solid #1a2a3a;
    padding: 8px;
  }

  .grid-bg {
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    grid-template-rows: repeat(4, 1fr);
    gap: 8px;
    width: 100%;
    height: 100%;
  }

  .cell {
    background: #0d1520;
    border-radius: 8px;
  }

  .tile-layer {
    position: absolute;
    top: 8px;
    left: 8px;
    right: 8px;
    bottom: 8px;
  }

  .tile {
    position: absolute;
    display: flex;
    align-items: center;
    justify-content: center;
    border-radius: 8px;
    font-weight: 800;
    transition: top 0.12s ease, left 0.12s ease;
    z-index: 1;
  }

  .tile.merged {
    animation: tileMerge 0.2s ease;
    z-index: 2;
  }

  .tile.new {
    animation: tileSpawn 0.2s ease;
  }

  @keyframes tileMerge {
    0% { transform: scale(1); }
    50% { transform: scale(1.15); }
    100% { transform: scale(1); }
  }

  @keyframes tileSpawn {
    0% { transform: scale(0); opacity: 0; }
    50% { transform: scale(1.1); opacity: 1; }
    100% { transform: scale(1); }
  }

  .overlay {
    position: absolute;
    top: 0; left: 0; right: 0; bottom: 0;
    background: rgba(5,10,15,0.85);
    border-radius: 12px;
    display: none;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    z-index: 100;
  }

  .overlay.active { display: flex; }

  .overlay-title {
    font-size: 36px;
    font-weight: 800;
    margin-bottom: 12px;
  }

  .overlay-title.win { color: #ffd700; text-shadow: 0 0 30px rgba(255,215,0,0.5); }
  .overlay-title.lose { color: #ff4444; }

  .overlay .btn {
    flex: none;
    width: 180px;
    margin-top: 8px;
    padding: 12px;
    font-size: 14px;
  }

  .footer {
    margin-top: 16px;
    font-size: 10px;
    color: #2a3a4a;
    letter-spacing: 1px;
  }
</style>
</head>
<body>

<div class="header">
  <span class="brand">Korb Engineering</span>
  <span class="title">2048</span>
</div>

<div class="score-bar">
  <div class="score-box">
    <div class="label">Score</div>
    <div class="value" id="score">0</div>
  </div>
  <div class="score-box">
    <div class="label">Best</div>
    <div class="value" id="best">0</div>
  </div>
</div>

<div class="controls">
  <button class="btn" id="btn-new">New Game</button>
  <button class="btn" id="btn-undo">Undo</button>
</div>

<div class="grid-container" id="grid-container">
  <div class="grid-bg">
    <div class="cell"></div><div class="cell"></div><div class="cell"></div><div class="cell"></div>
    <div class="cell"></div><div class="cell"></div><div class="cell"></div><div class="cell"></div>
    <div class="cell"></div><div class="cell"></div><div class="cell"></div><div class="cell"></div>
    <div class="cell"></div><div class="cell"></div><div class="cell"></div><div class="cell"></div>
  </div>
  <div class="tile-layer" id="tile-layer"></div>
  <div class="overlay" id="overlay">
    <div class="overlay-title" id="overlay-title"></div>
    <button class="btn" id="overlay-btn"></button>
    <button class="btn" id="overlay-continue" style="display:none">Keep Playing</button>
  </div>
</div>

<div class="footer">Arrow keys / WASD / Swipe to play</div>

<script>
(function() {
  const TILE_COLORS = {
    2:    { bg: '#0a1a2a', fg: '#5a8aaa' },
    4:    { bg: '#0f2535', fg: '#6a9aba' },
    8:    { bg: '#00697f', fg: '#e0f0ff' },
    16:   { bg: '#008fa5', fg: '#ffffff' },
    32:   { bg: '#00a5c5', fg: '#ffffff' },
    64:   { bg: '#00bfe0', fg: '#ffffff' },
    128:  { bg: '#00d4ff', fg: '#050a0f' },
    256:  { bg: '#ff6600', fg: '#ffffff' },
    512:  { bg: '#ff8030', fg: '#ffffff' },
    1024: { bg: '#ffaa60', fg: '#050a0f' },
    2048: { bg: '#ffd700', fg: '#050a0f' },
  };

  const tileLayer = document.getElementById('tile-layer');
  const scoreEl = document.getElementById('score');
  const bestEl = document.getElementById('best');
  const overlay = document.getElementById('overlay');
  const overlayTitle = document.getElementById('overlay-title');
  const overlayBtn = document.getElementById('overlay-btn');
  const overlayContinue = document.getElementById('overlay-continue');
  const gridContainer = document.getElementById('grid-container');

  let grid, score, bestScore, prevState, won, animating, keepPlaying;

  function init() {
    bestScore = parseInt(localStorage.getItem('2048_best') || '0');
    bestEl.textContent = bestScore;
    newGame();
  }

  function newGame() {
    grid = Array.from({length: 4}, () => Array(4).fill(0));
    score = 0;
    won = false;
    keepPlaying = false;
    animating = false;
    prevState = null;
    overlay.classList.remove('active');
    scoreEl.textContent = '0';
    addRandomTile();
    addRandomTile();
    render();
  }

  function savePrev() {
    prevState = {
      grid: grid.map(r => [...r]),
      score: score
    };
  }

  function undo() {
    if (!prevState) return;
    grid = prevState.grid;
    score = prevState.score;
    scoreEl.textContent = score;
    prevState = null;
    overlay.classList.remove('active');
    render();
  }

  function addRandomTile() {
    const empty = [];
    for (let r = 0; r < 4; r++)
      for (let c = 0; c < 4; c++)
        if (grid[r][c] === 0) empty.push([r, c]);
    if (empty.length === 0) return null;
    const [r, c] = empty[Math.floor(Math.random() * empty.length)];
    grid[r][c] = Math.random() < 0.9 ? 2 : 4;
    return [r, c];
  }

  function getCellSize() {
    const containerW = tileLayer.offsetWidth;
    const gap = 8;
    return (containerW - gap * 3) / 4;
  }

  function getTilePos(r, c) {
    const gap = 8;
    const size = getCellSize();
    return {
      top: r * (size + gap),
      left: c * (size + gap),
      size: size
    };
  }

  function getFontSize(val, size) {
    if (val < 100) return size * 0.45;
    if (val < 1000) return size * 0.35;
    if (val < 10000) return size * 0.28;
    return size * 0.22;
  }

  function getTileStyle(val) {
    if (TILE_COLORS[val]) return TILE_COLORS[val];
    return { bg: '#ffd700', fg: '#050a0f' };
  }

  function render(newTilePos, mergedPositions) {
    tileLayer.innerHTML = '';
    for (let r = 0; r < 4; r++) {
      for (let c = 0; c < 4; c++) {
        const val = grid[r][c];
        if (val === 0) continue;
        const pos = getTilePos(r, c);
        const style = getTileStyle(val);
        const tile = document.createElement('div');
        tile.className = 'tile';
        const isNew = newTilePos && newTilePos[0] === r && newTilePos[1] === c;
        const isMerged = mergedPositions && mergedPositions.some(p => p[0] === r && p[1] === c);
        if (isNew) tile.classList.add('new');
        if (isMerged) tile.classList.add('merged');
        const fs = getFontSize(val, pos.size);
        tile.style.cssText = `
          top:${pos.top}px; left:${pos.left}px;
          width:${pos.size}px; height:${pos.size}px;
          background:${style.bg}; color:${style.fg};
          font-size:${fs}px;
          ${val === 2048 ? 'box-shadow:0 0 30px rgba(255,215,0,0.6);' : ''}
        `;
        tile.textContent = val;
        tileLayer.appendChild(tile);
      }
    }
  }

  function slide(row) {
    let arr = row.filter(v => v !== 0);
    const merged = [];
    for (let i = 0; i < arr.length - 1; i++) {
      if (arr[i] === arr[i + 1]) {
        arr[i] *= 2;
        score += arr[i];
        merged.push(arr[i]);
        arr.splice(i + 1, 1);
      }
    }
    while (arr.length < 4) arr.push(0);
    return { result: arr, merged };
  }

  function move(dir) {
    if (animating) return;
    savePrev();
    let moved = false;
    const mergedPositions = [];

    if (dir === 'left' || dir === 'right') {
      for (let r = 0; r < 4; r++) {
        let row = [...grid[r]];
        if (dir === 'right') row.reverse();
        const { result } = slide(row);
        if (dir === 'right') result.reverse();
        for (let c = 0; c < 4; c++) {
          if (grid[r][c] !== result[c]) moved = true;
          grid[r][c] = result[c];
        }
      }
    } else {
      for (let c = 0; c < 4; c++) {
        let col = [grid[0][c], grid[1][c], grid[2][c], grid[3][c]];
        if (dir === 'down') col.reverse();
        const { result } = slide(col);
        if (dir === 'down') result.reverse();
        for (let r = 0; r < 4; r++) {
          if (grid[r][c] !== result[r]) moved = true;
          grid[r][c] = result[r];
        }
      }
    }

    if (!moved) {
      prevState = null;
      return;
    }

    // Find merged positions
    for (let r = 0; r < 4; r++)
      for (let c = 0; c < 4; c++)
        if (prevState && grid[r][c] !== 0 && grid[r][c] !== prevState.grid[r][c] && prevState.grid[r][c] !== 0)
          mergedPositions.push([r, c]);

    scoreEl.textContent = score;
    if (score > bestScore) {
      bestScore = score;
      bestEl.textContent = bestScore;
      localStorage.setItem('2048_best', bestScore);
    }

    const newTile = addRandomTile();

    animating = true;
    render(newTile, mergedPositions);
    setTimeout(() => { animating = false; }, 150);

    // Check win
    if (!won && !keepPlaying) {
      for (let r = 0; r < 4; r++)
        for (let c = 0; c < 4; c++)
          if (grid[r][c] === 2048) { showWin(); won = true; return; }
    }

    // Check game over
    if (isGameOver()) {
      setTimeout(() => showLose(), 300);
    }
  }

  function isGameOver() {
    for (let r = 0; r < 4; r++)
      for (let c = 0; c < 4; c++) {
        if (grid[r][c] === 0) return false;
        if (c < 3 && grid[r][c] === grid[r][c + 1]) return false;
        if (r < 3 && grid[r][c] === grid[r + 1][c]) return false;
      }
    return true;
  }

  function showWin() {
    overlayTitle.textContent = 'You Win!';
    overlayTitle.className = 'overlay-title win';
    overlayBtn.textContent = 'New Game';
    overlayBtn.onclick = newGame;
    overlayContinue.style.display = 'block';
    overlayContinue.textContent = 'Keep Playing';
    overlayContinue.onclick = () => {
      keepPlaying = true;
      overlay.classList.remove('active');
    };
    overlay.classList.add('active');
  }

  function showLose() {
    overlayTitle.textContent = 'Game Over';
    overlayTitle.className = 'overlay-title lose';
    overlayBtn.textContent = 'Try Again';
    overlayBtn.onclick = newGame;
    overlayContinue.style.display = 'none';
    overlay.classList.add('active');
  }

  // Keyboard
  document.addEventListener('keydown', (e) => {
    const map = {
      ArrowUp: 'up', ArrowDown: 'down', ArrowLeft: 'left', ArrowRight: 'right',
      w: 'up', W: 'up', s: 'down', S: 'down', a: 'left', A: 'left', d: 'right', D: 'right'
    };
    if (map[e.key]) {
      e.preventDefault();
      move(map[e.key]);
    }
  });

  // Touch/swipe
  let touchStartX, touchStartY;
  gridContainer.addEventListener('touchstart', (e) => {
    touchStartX = e.touches[0].clientX;
    touchStartY = e.touches[0].clientY;
  }, { passive: true });

  gridContainer.addEventListener('touchend', (e) => {
    if (touchStartX == null) return;
    const dx = e.changedTouches[0].clientX - touchStartX;
    const dy = e.changedTouches[0].clientY - touchStartY;
    const absDx = Math.abs(dx);
    const absDy = Math.abs(dy);
    if (Math.max(absDx, absDy) < 30) return;
    if (absDx > absDy) {
      move(dx > 0 ? 'right' : 'left');
    } else {
      move(dy > 0 ? 'down' : 'up');
    }
    touchStartX = null;
  }, { passive: true });

  // Buttons
  document.getElementById('btn-new').addEventListener('click', newGame);
  document.getElementById('btn-undo').addEventListener('click', undo);

  // Resize handler
  window.addEventListener('resize', () => render());

  init();
})();
</script>
</body>
</html>
