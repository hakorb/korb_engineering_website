<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>3D Print Library | Korb Engineering</title>
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<script src="../../vendor/jspdf-2.5.1.umd.min.js"></script>
<script type="importmap">
{
  "imports": {
    "three": "https://unpkg.com/three@0.158.0/build/three.module.js",
    "three/addons/": "https://unpkg.com/three@0.158.0/examples/jsm/"
  }
}
</script>
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{
  --bg:#050a0f;--bg1:#0a1018;--bg2:#0f1620;--bg3:#141e2b;
  --border:#1a2535;--cyan:#00d4ff;--orange:#ff6600;
  --green:#10b981;--red:#ef4444;--amber:#f0a500;--purple:#a78bfa;
  --text:#e2e8f0;--dim:rgba(226,232,240,0.4);
  --font:'JetBrains Mono',monospace;
}
body{background:var(--bg);color:var(--text);font-family:var(--font);min-height:100vh;display:flex;flex-direction:column}
@keyframes fadeIn{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.5}}
::selection{background:rgba(0,212,255,0.3)}
::-webkit-scrollbar{width:6px;height:6px}
::-webkit-scrollbar-track{background:var(--bg)}
::-webkit-scrollbar-thumb{background:var(--border);border-radius:3px}
::-webkit-scrollbar-thumb:hover{background:var(--cyan)}

/* HEADER */
.header{background:var(--bg1);border-bottom:1px solid var(--border);padding:14px 20px;display:flex;align-items:center;gap:14px;flex-wrap:wrap;flex-shrink:0}
.brand{color:var(--cyan);font-weight:700;font-size:11px;letter-spacing:2px;text-transform:uppercase}
.title{color:var(--text);font-size:18px;font-weight:600}
.nav-tab{background:transparent;color:var(--dim);border:none;border-radius:6px;padding:8px 16px;cursor:pointer;font-size:12px;font-family:var(--font);transition:all .15s;min-height:48px;display:flex;align-items:center}
.nav-tab.active{background:rgba(0,212,255,0.12);color:var(--cyan);font-weight:600}
.nav-tab:hover{color:var(--cyan)}
.header-spacer{flex:1}

/* TOOLBAR */
.toolbar{display:flex;gap:8px;align-items:center;flex-wrap:wrap;padding:16px 20px;background:var(--bg1);border-bottom:1px solid var(--border)}
.btn{background:var(--bg2);border:1px solid var(--border);color:var(--text);border-radius:6px;padding:8px 16px;cursor:pointer;font-size:12px;font-family:var(--font);transition:all .15s;user-select:none;min-height:48px;display:inline-flex;align-items:center;gap:6px}
.btn:hover{border-color:var(--cyan);color:var(--cyan)}
.btn-primary{background:var(--cyan);color:#050a0f;border:none;font-weight:600}
.btn-primary:hover{opacity:.9;color:#050a0f}
.btn-orange{background:var(--orange);color:#fff;border:none;font-weight:600}
.btn-orange:hover{opacity:.9;color:#fff}
.btn-danger{background:var(--red);color:#fff;border:none}
.btn-danger:hover{opacity:.9;color:#fff}
.btn-sm{padding:4px 10px;font-size:11px;min-height:32px}

.input{background:var(--bg2);border:1px solid var(--border);border-radius:6px;padding:8px 12px;color:var(--text);font-size:16px;font-family:var(--font);outline:none;width:100%;min-height:48px}
.input:focus{border-color:var(--cyan)}
.select{background:var(--bg2);border:1px solid var(--border);border-radius:6px;padding:8px 12px;color:var(--text);font-size:16px;font-family:var(--font);cursor:pointer;outline:none;min-height:48px}
.select:focus{border-color:var(--cyan)}
.textarea{background:var(--bg2);border:1px solid var(--border);border-radius:6px;padding:8px 12px;color:var(--text);font-size:16px;font-family:var(--font);outline:none;width:100%;resize:vertical;min-height:80px}
.textarea:focus{border-color:var(--cyan)}
.label{display:block;font-size:10px;color:var(--dim);margin-bottom:3px;text-transform:uppercase;letter-spacing:.5px}
.toolbar-spacer{flex:1}
.search-input{max-width:260px}

/* BODY */
.body-wrap{flex:1;overflow:auto;padding:20px}

/* DROP ZONE */
.drop-zone{border:2px dashed var(--border);border-radius:10px;padding:40px 20px;text-align:center;background:var(--bg2);cursor:pointer;transition:all .2s;margin-bottom:20px}
.drop-zone.active{border-color:var(--cyan);background:rgba(0,212,255,0.05)}
.drop-zone:hover{border-color:var(--cyan)}
.drop-zone h3{color:var(--text);margin-bottom:8px;font-size:14px}
.drop-zone p{color:var(--dim);font-size:11px}
.drop-icon{font-size:32px;margin-bottom:10px;color:var(--cyan)}

/* GRID VIEW */
.grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(240px,1fr));gap:16px}
@media(max-width:600px){.grid{grid-template-columns:1fr}}
@media(min-width:601px) and (max-width:960px){.grid{grid-template-columns:repeat(2,1fr)}}
@media(min-width:1400px){.grid{grid-template-columns:repeat(4,1fr)}}

.card{background:var(--bg1);border:1px solid var(--border);border-radius:10px;overflow:hidden;cursor:pointer;transition:border-color .15s,transform .15s;animation:fadeIn .3s ease}
.card:hover{border-color:var(--cyan);transform:translateY(-2px)}
.card-thumb{width:100%;height:180px;background:var(--bg2);display:flex;align-items:center;justify-content:center;overflow:hidden;position:relative}
.card-thumb img{width:100%;height:100%;object-fit:cover}
.card-thumb .no-preview{color:var(--dim);font-size:11px}
.card-status-badge{position:absolute;top:8px;right:8px;padding:2px 8px;border-radius:4px;font-size:10px;font-weight:600}
.card-body{padding:12px}
.card-name{font-size:13px;font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;margin-bottom:4px}
.card-meta{font-size:11px;color:var(--dim);display:flex;gap:8px;flex-wrap:wrap;align-items:center}
.card-rating{color:var(--amber)}
.card-category{color:var(--cyan);font-size:10px}

/* LIST VIEW */
.list-view{display:flex;flex-direction:column;gap:6px}
.list-header,.list-row{display:grid;grid-template-columns:40px 2fr 1fr 1fr 1fr 80px 60px;gap:12px;align-items:center;padding:10px 16px;border-radius:8px;font-size:12px}
.list-header{background:var(--bg2);color:var(--dim);font-size:10px;text-transform:uppercase;letter-spacing:.5px;cursor:pointer;position:sticky;top:0;z-index:5}
.list-header span:hover{color:var(--cyan)}
.list-row{background:var(--bg1);border:1px solid var(--border);cursor:pointer;transition:border-color .15s}
.list-row:hover{border-color:var(--cyan)}
.list-thumb{width:36px;height:36px;border-radius:4px;background:var(--bg2);overflow:hidden}
.list-thumb img{width:100%;height:100%;object-fit:cover}

/* TAGS */
.tag{background:rgba(0,212,255,0.12);color:var(--cyan);border-radius:12px;padding:2px 10px;font-size:10px;font-weight:500;display:inline-block;margin:2px}
.tag-orange{background:rgba(255,102,0,0.15);color:var(--orange)}

/* STATUS COLORS */
.status-not-printed{color:var(--dim)}
.status-queued{color:var(--amber)}
.status-printing{color:var(--purple);animation:pulse 2s infinite}
.status-completed{color:var(--green)}
.status-failed{color:var(--red)}
.badge-not-printed{background:rgba(226,232,240,0.1);color:var(--dim)}
.badge-queued{background:rgba(240,165,0,0.2);color:var(--amber)}
.badge-printing{background:rgba(167,139,250,0.2);color:var(--purple)}
.badge-completed{background:rgba(16,185,129,0.2);color:var(--green)}
.badge-failed{background:rgba(239,68,68,0.2);color:var(--red)}

/* STAR RATING */
.stars{display:inline-flex;gap:2px;cursor:pointer}
.stars .star{font-size:18px;color:var(--border);transition:color .1s;user-select:none}
.stars .star.filled{color:var(--amber)}
.stars .star:hover{color:var(--amber)}
.stars-display .star{cursor:default;font-size:12px}

/* DETAIL VIEW */
.detail-container{display:flex;flex-direction:column;gap:20px;animation:fadeIn .3s ease}
.detail-top{display:grid;grid-template-columns:1fr 1fr;gap:20px}
@media(max-width:800px){.detail-top{grid-template-columns:1fr}}
.preview-container{background:var(--bg1);border:1px solid var(--border);border-radius:10px;overflow:hidden;position:relative;min-height:400px}
.preview-container canvas{width:100%!important;height:100%!important;display:block}
.detail-panel{background:var(--bg1);border:1px solid var(--border);border-radius:10px;padding:20px;display:flex;flex-direction:column;gap:14px;overflow-y:auto;max-height:600px}
.detail-section{border-top:1px solid var(--border);padding-top:14px}
.detail-section:first-child{border-top:none;padding-top:0}
.detail-section h3{font-size:12px;color:var(--cyan);text-transform:uppercase;letter-spacing:1px;margin-bottom:10px}
.form-row{display:grid;grid-template-columns:1fr 1fr;gap:10px}
@media(max-width:600px){.form-row{grid-template-columns:1fr}}
.form-group{margin-bottom:10px}

/* STATS */
.stats-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(200px,1fr));gap:16px;margin-bottom:24px}
.stat-card{background:var(--bg1);border:1px solid var(--border);border-radius:10px;padding:20px;text-align:center}
.stat-value{font-size:28px;font-weight:700;color:var(--cyan)}
.stat-label{font-size:11px;color:var(--dim);margin-top:4px;text-transform:uppercase;letter-spacing:1px}
.chart-section{background:var(--bg1);border:1px solid var(--border);border-radius:10px;padding:20px;margin-bottom:16px}
.chart-section h3{font-size:12px;color:var(--cyan);text-transform:uppercase;letter-spacing:1px;margin-bottom:14px}
.bar-chart{display:flex;flex-direction:column;gap:8px}
.bar-row{display:flex;align-items:center;gap:10px}
.bar-label{width:100px;font-size:11px;color:var(--dim);text-align:right;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.bar-track{flex:1;height:20px;background:var(--bg2);border-radius:4px;overflow:hidden;position:relative}
.bar-fill{height:100%;border-radius:4px;transition:width .5s ease;display:flex;align-items:center;padding-left:8px;font-size:10px;font-weight:600;color:#fff;min-width:fit-content}
.bar-count{font-size:11px;color:var(--dim);width:30px;text-align:right}

/* MODAL */
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.7);display:flex;align-items:center;justify-content:center;z-index:200;padding:20px;animation:fadeIn .15s ease}
.modal{background:var(--bg1);border:1px solid var(--border);border-radius:10px;padding:24px;max-width:500px;width:100%;max-height:90vh;overflow:auto}
.modal h2{font-size:16px;margin-bottom:16px;color:var(--text)}

/* TOAST */
.toast-container{position:fixed;bottom:20px;right:20px;z-index:300;display:flex;flex-direction:column;gap:8px}
.toast{background:var(--bg1);border:1px solid var(--border);border-radius:8px;padding:12px 20px;font-size:12px;animation:fadeIn .2s ease;display:flex;align-items:center;gap:8px}
.toast-success{border-color:var(--green);color:var(--green)}
.toast-error{border-color:var(--red);color:var(--red)}
.toast-info{border-color:var(--cyan);color:var(--cyan)}

/* EMPTY STATE */
.empty-state{text-align:center;padding:60px 20px;color:var(--dim)}
.empty-state h3{font-size:16px;color:var(--text);margin-bottom:8px}
.empty-state p{font-size:12px;margin-bottom:20px}
.empty-icon{font-size:48px;margin-bottom:16px;color:var(--border)}

/* VIEW TOGGLE */
.view-toggle{display:flex;border:1px solid var(--border);border-radius:6px;overflow:hidden}
.view-toggle button{background:var(--bg2);border:none;color:var(--dim);padding:8px 12px;cursor:pointer;font-size:14px;font-family:var(--font);min-height:48px;min-width:48px;transition:all .15s}
.view-toggle button.active{background:rgba(0,212,255,0.12);color:var(--cyan)}
.view-toggle button:hover{color:var(--cyan)}

/* RESPONSIVE */
@media(max-width:600px){
  .header{padding:10px 14px}
  .toolbar{padding:12px 14px}
  .body-wrap{padding:14px}
  .list-header,.list-row{grid-template-columns:40px 2fr 1fr 80px;font-size:11px}
  .list-header span:nth-child(3),.list-header span:nth-child(4),.list-row>:nth-child(3),.list-row>:nth-child(4){display:none}
}
</style>
</head>
<body>

<!-- HEADER -->
<div class="header">
  <span class="brand">KORB ENGINEERING</span>
  <span class="title">3D Print Library</span>
  <div class="header-spacer"></div>
  <button class="nav-tab active" data-tab="library" onclick="switchTab('library')">Library</button>
  <button class="nav-tab" data-tab="stats" onclick="switchTab('stats')">Stats</button>
</div>

<!-- TOOLBAR (Library) -->
<div class="toolbar" id="toolbar-library">
  <button class="btn btn-primary" onclick="document.getElementById('file-input').click()">&#x2795; Upload</button>
  <input type="file" id="file-input" accept=".stl,.3mf" multiple hidden>
  <input class="input search-input" type="text" id="search-input" placeholder="Search name or tags..." oninput="applyFilters()">
  <select class="select" id="filter-category" onchange="applyFilters()">
    <option value="">All Categories</option>
    <option>Functional</option><option>Decorative</option><option>Mechanical</option>
    <option>Enclosures</option><option>Toys</option><option>Tools</option>
    <option>Organizers</option><option>Custom/Other</option>
  </select>
  <select class="select" id="filter-status" onchange="applyFilters()">
    <option value="">All Status</option>
    <option>Not Printed</option><option>Queued</option><option>Printing</option>
    <option>Completed</option><option>Failed</option>
  </select>
  <select class="select" id="filter-material" onchange="applyFilters()">
    <option value="">All Materials</option>
    <option>PLA</option><option>PETG</option><option>ABS</option>
    <option>TPU</option><option>ASA</option><option>Nylon</option>
  </select>
  <select class="select" id="sort-select" onchange="applyFilters()">
    <option value="dateAdded-desc">Newest First</option>
    <option value="dateAdded-asc">Oldest First</option>
    <option value="name-asc">Name A-Z</option>
    <option value="name-desc">Name Z-A</option>
    <option value="rating-desc">Highest Rated</option>
    <option value="fileSize-desc">Largest File</option>
    <option value="fileSize-asc">Smallest File</option>
  </select>
  <div class="toolbar-spacer"></div>
  <div class="view-toggle">
    <button id="view-grid-btn" class="active" onclick="setView('grid')" title="Grid View">&#9638;</button>
    <button id="view-list-btn" onclick="setView('list')" title="List View">&#9776;</button>
  </div>
  <button class="btn" onclick="exportPDF()" title="Export PDF Catalog">&#128196; PDF</button>
</div>

<!-- MAIN CONTENT -->
<div class="body-wrap" id="main-content">
  <!-- Library View -->
  <div id="library-view">
    <div class="drop-zone" id="drop-zone"
         ondragover="event.preventDefault();this.classList.add('active')"
         ondragleave="this.classList.remove('active')"
         ondrop="handleDrop(event)">
      <div class="drop-icon">&#128230;</div>
      <h3>Drop STL or 3MF files here</h3>
      <p>or click the Upload button above</p>
    </div>
    <div id="models-container"></div>
  </div>

  <!-- Detail View -->
  <div id="detail-view" style="display:none"></div>

  <!-- Stats View -->
  <div id="stats-view" style="display:none"></div>
</div>

<!-- Toast Container -->
<div class="toast-container" id="toast-container"></div>

<script type="module">
import * as THREE from 'three';
import { STLLoader } from 'three/addons/loaders/STLLoader.js';
import { OrbitControls } from 'three/addons/controls/OrbitControls.js';

// ========== STATE ==========
const DB_NAME = '3dPrintLibraryDB';
const DB_VERSION = 1;
const STORE_NAME = 'models';
const META_KEY = '3dPrintLibrary_meta';

let db = null;
let allModels = [];
let filteredModels = [];
let currentView = 'grid';
let currentTab = 'library';
let detailRenderer = null;
let detailControls = null;
let detailScene = null;
let detailCamera = null;
let detailAnimId = null;

const CATEGORIES = ['Functional','Decorative','Mechanical','Enclosures','Toys','Tools','Organizers','Custom/Other'];
const MATERIALS = ['PLA','PETG','ABS','TPU','ASA','Nylon'];
const STATUSES = ['Not Printed','Queued','Printing','Completed','Failed'];

// ========== INDEXED DB ==========
function openDB() {
  return new Promise((resolve, reject) => {
    const req = indexedDB.open(DB_NAME, DB_VERSION);
    req.onupgradeneeded = e => {
      const d = e.target.result;
      if (!d.objectStoreNames.contains(STORE_NAME)) {
        d.createObjectStore(STORE_NAME, { keyPath: 'id' });
      }
    };
    req.onsuccess = e => { db = e.target.result; resolve(db); };
    req.onerror = e => reject(e.target.error);
  });
}

function dbPut(data) {
  return new Promise((resolve, reject) => {
    const tx = db.transaction(STORE_NAME, 'readwrite');
    tx.objectStore(STORE_NAME).put(data);
    tx.oncomplete = () => resolve();
    tx.onerror = e => reject(e.target.error);
  });
}

function dbGet(id) {
  return new Promise((resolve, reject) => {
    const tx = db.transaction(STORE_NAME, 'readonly');
    const req = tx.objectStore(STORE_NAME).get(id);
    req.onsuccess = () => resolve(req.result);
    req.onerror = e => reject(e.target.error);
  });
}

function dbDelete(id) {
  return new Promise((resolve, reject) => {
    const tx = db.transaction(STORE_NAME, 'readwrite');
    tx.objectStore(STORE_NAME).delete(id);
    tx.oncomplete = () => resolve();
    tx.onerror = e => reject(e.target.error);
  });
}

function dbGetAllKeys() {
  return new Promise((resolve, reject) => {
    const tx = db.transaction(STORE_NAME, 'readonly');
    const req = tx.objectStore(STORE_NAME).getAllKeys();
    req.onsuccess = () => resolve(req.result);
    req.onerror = e => reject(e.target.error);
  });
}

// ========== METADATA (localStorage) ==========
function loadMeta() {
  try {
    return JSON.parse(localStorage.getItem(META_KEY)) || [];
  } catch { return []; }
}

function saveMeta(models) {
  localStorage.setItem(META_KEY, JSON.stringify(models));
}

function getModelMeta(id) {
  return allModels.find(m => m.id === id);
}

// ========== FILE HANDLING ==========
function genId() {
  return Date.now().toString(36) + Math.random().toString(36).substr(2, 9);
}

function formatBytes(bytes) {
  if (bytes === 0) return '0 B';
  const k = 1024;
  const sizes = ['B','KB','MB','GB'];
  const i = Math.floor(Math.log(bytes) / Math.log(k));
  return parseFloat((bytes / Math.pow(k, i)).toFixed(1)) + ' ' + sizes[i];
}

function formatTime(mins) {
  if (!mins) return '--';
  const h = Math.floor(mins / 60);
  const m = mins % 60;
  return h > 0 ? `${h}h ${m}m` : `${m}m`;
}

async function handleFiles(files) {
  const validFiles = Array.from(files).filter(f => {
    const ext = f.name.split('.').pop().toLowerCase();
    return ext === 'stl' || ext === '3mf';
  });
  if (validFiles.length === 0) {
    showToast('No valid STL or 3MF files found', 'error');
    return;
  }
  for (const file of validFiles) {
    await processFile(file);
  }
  showToast(`${validFiles.length} model(s) added`, 'success');
  renderLibrary();
}

async function processFile(file) {
  const id = genId();
  const ext = file.name.split('.').pop().toLowerCase();
  const arrayBuffer = await file.arrayBuffer();

  // Store file data in IndexedDB
  await dbPut({ id, data: arrayBuffer, fileName: file.name });

  // Generate thumbnail for STL files
  let thumbnail = null;
  if (ext === 'stl') {
    try {
      thumbnail = await generateThumbnail(arrayBuffer);
    } catch (e) {
      console.warn('Thumbnail generation failed:', e);
    }
  }

  const meta = {
    id,
    name: file.name.replace(/\.(stl|3mf)$/i, ''),
    fileName: file.name,
    fileSize: file.size,
    fileType: ext,
    description: '',
    category: 'Custom/Other',
    tags: [],
    material: 'PLA',
    infill: 20,
    layerHeight: 0.2,
    supportsNeeded: false,
    estimatedTime: 0,
    actualTime: 0,
    printStatus: 'Not Printed',
    rating: 0,
    notes: '',
    sourceUrl: '',
    thumbnail,
    dateAdded: new Date().toISOString(),
    lastPrinted: null,
  };

  allModels.push(meta);
  saveMeta(allModels);
}

// ========== THREE.JS THUMBNAIL ==========
function generateThumbnail(arrayBuffer) {
  return new Promise((resolve, reject) => {
    try {
      const scene = new THREE.Scene();
      scene.background = new THREE.Color(0x0a1018);

      const camera = new THREE.PerspectiveCamera(45, 1, 0.1, 10000);
      const renderer = new THREE.WebGLRenderer({ antialias: true, preserveDrawingBuffer: true });
      renderer.setSize(300, 300);
      renderer.setPixelRatio(1);

      const ambient = new THREE.AmbientLight(0xffffff, 0.5);
      scene.add(ambient);
      const dirLight = new THREE.DirectionalLight(0xffffff, 1);
      dirLight.position.set(1, 2, 3);
      scene.add(dirLight);
      const dirLight2 = new THREE.DirectionalLight(0xffffff, 0.3);
      dirLight2.position.set(-2, -1, -1);
      scene.add(dirLight2);

      const loader = new STLLoader();
      const geometry = loader.parse(arrayBuffer);
      geometry.computeBoundingBox();
      geometry.center();

      const material = new THREE.MeshPhongMaterial({
        color: 0x00d4ff,
        specular: 0x222222,
        shininess: 60,
      });
      const mesh = new THREE.Mesh(geometry, material);
      scene.add(mesh);

      const bbox = geometry.boundingBox;
      const size = new THREE.Vector3();
      bbox.getSize(size);
      const maxDim = Math.max(size.x, size.y, size.z);
      const scale = 2 / maxDim;
      mesh.scale.set(scale, scale, scale);

      camera.position.set(2, 2, 3);
      camera.lookAt(0, 0, 0);

      renderer.render(scene, camera);
      const dataUrl = renderer.domElement.toDataURL('image/png');
      renderer.dispose();
      geometry.dispose();
      material.dispose();
      resolve(dataUrl);
    } catch (e) {
      reject(e);
    }
  });
}

// ========== RENDERING ==========
function renderLibrary() {
  applyFilters();
}

window.applyFilters = function() {
  const search = document.getElementById('search-input').value.toLowerCase();
  const cat = document.getElementById('filter-category').value;
  const status = document.getElementById('filter-status').value;
  const mat = document.getElementById('filter-material').value;
  const [sortKey, sortDir] = document.getElementById('sort-select').value.split('-');

  filteredModels = allModels.filter(m => {
    if (search && !m.name.toLowerCase().includes(search) && !m.tags.some(t => t.toLowerCase().includes(search))) return false;
    if (cat && m.category !== cat) return false;
    if (status && m.printStatus !== status) return false;
    if (mat && m.material !== mat) return false;
    return true;
  });

  filteredModels.sort((a, b) => {
    let va, vb;
    if (sortKey === 'name') { va = a.name.toLowerCase(); vb = b.name.toLowerCase(); }
    else if (sortKey === 'dateAdded') { va = a.dateAdded; vb = b.dateAdded; }
    else if (sortKey === 'rating') { va = a.rating; vb = b.rating; }
    else if (sortKey === 'fileSize') { va = a.fileSize; vb = b.fileSize; }
    else { va = a.dateAdded; vb = b.dateAdded; }
    if (va < vb) return sortDir === 'asc' ? -1 : 1;
    if (va > vb) return sortDir === 'asc' ? 1 : -1;
    return 0;
  });

  const container = document.getElementById('models-container');
  if (filteredModels.length === 0) {
    container.innerHTML = `
      <div class="empty-state">
        <div class="empty-icon">&#128270;</div>
        <h3>${allModels.length === 0 ? 'No models yet' : 'No matching models'}</h3>
        <p>${allModels.length === 0 ? 'Upload STL or 3MF files to get started' : 'Try adjusting your search or filters'}</p>
      </div>`;
    return;
  }

  if (currentView === 'grid') {
    container.innerHTML = `<div class="grid">${filteredModels.map(m => gridCard(m)).join('')}</div>`;
  } else {
    container.innerHTML = `
      <div class="list-view">
        <div class="list-header">
          <span></span>
          <span>Name</span>
          <span>Category</span>
          <span>Material</span>
          <span>Status</span>
          <span>Size</span>
          <span>Rating</span>
        </div>
        ${filteredModels.map(m => listRow(m)).join('')}
      </div>`;
  }
};

function statusClass(s) {
  return 'status-' + s.toLowerCase().replace(' ','-');
}
function badgeClass(s) {
  return 'badge-' + s.toLowerCase().replace(' ','-');
}

function starsHTML(rating, size) {
  let html = '';
  for (let i = 1; i <= 5; i++) {
    html += `<span class="star ${i <= rating ? 'filled' : ''}" style="font-size:${size || 12}px">${i <= rating ? '&#9733;' : '&#9734;'}</span>`;
  }
  return html;
}

function gridCard(m) {
  return `
    <div class="card" onclick="openDetail('${m.id}')">
      <div class="card-thumb">
        ${m.thumbnail ? `<img src="${m.thumbnail}" alt="${m.name}">` : `<span class="no-preview">${m.fileType === '3mf' ? '3MF File' : 'No Preview'}</span>`}
        <span class="card-status-badge ${badgeClass(m.printStatus)}">${m.printStatus}</span>
      </div>
      <div class="card-body">
        <div class="card-name">${esc(m.name)}</div>
        <div class="card-meta">
          <span class="card-category">${m.category}</span>
          <span>${m.material}</span>
          <span>${formatBytes(m.fileSize)}</span>
        </div>
        <div class="card-meta" style="margin-top:4px">
          <span class="card-rating stars-display">${starsHTML(m.rating)}</span>
          ${m.estimatedTime ? `<span>${formatTime(m.estimatedTime)}</span>` : ''}
        </div>
      </div>
    </div>`;
}

function listRow(m) {
  return `
    <div class="list-row" onclick="openDetail('${m.id}')">
      <div class="list-thumb">
        ${m.thumbnail ? `<img src="${m.thumbnail}" alt="">` : ''}
      </div>
      <span style="overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${esc(m.name)}</span>
      <span style="color:var(--cyan);font-size:11px">${m.category}</span>
      <span style="font-size:11px">${m.material}</span>
      <span class="${statusClass(m.printStatus)}" style="font-size:11px">${m.printStatus}</span>
      <span style="font-size:11px;color:var(--dim)">${formatBytes(m.fileSize)}</span>
      <span class="stars-display">${starsHTML(m.rating, 10)}</span>
    </div>`;
}

function esc(str) {
  const d = document.createElement('div');
  d.textContent = str;
  return d.innerHTML;
}

function setup3DPreview(arrayBuffer) {
  cleanup3D();
  const container = document.getElementById('preview-3d');
  if (!container) return;
  const w = container.clientWidth;
  const h = Math.max(container.clientHeight, 400);

  detailScene = new THREE.Scene();
  // Gradient background
  const canvas2 = document.createElement('canvas');
  canvas2.width = 2; canvas2.height = 256;
  const ctx = canvas2.getContext('2d');
  const grad = ctx.createLinearGradient(0, 0, 0, 256);
  grad.addColorStop(0, '#0a1628');
  grad.addColorStop(1, '#050a0f');
  ctx.fillStyle = grad;
  ctx.fillRect(0, 0, 2, 256);
  const bgTex = new THREE.CanvasTexture(canvas2);
  detailScene.background = bgTex;

  detailCamera = new THREE.PerspectiveCamera(45, w / h, 0.1, 10000);
  detailRenderer = new THREE.WebGLRenderer({ antialias: true });
  detailRenderer.setSize(w, h);
  detailRenderer.setPixelRatio(window.devicePixelRatio);
  container.appendChild(detailRenderer.domElement);

  const ambient = new THREE.AmbientLight(0xffffff, 0.4);
  detailScene.add(ambient);
  const dir1 = new THREE.DirectionalLight(0xffffff, 1);
  dir1.position.set(3, 5, 4);
  detailScene.add(dir1);
  const dir2 = new THREE.DirectionalLight(0x4488ff, 0.4);
  dir2.position.set(-3, -2, -2);
  detailScene.add(dir2);

  // Grid
  const grid = new THREE.GridHelper(10, 20, 0x1a2535, 0x0f1620);
  detailScene.add(grid);

  const loader = new STLLoader();
  const geometry = loader.parse(arrayBuffer);
  geometry.computeBoundingBox();
  geometry.center();

  const material = new THREE.MeshPhongMaterial({
    color: 0x00d4ff,
    specular: 0x333333,
    shininess: 80,
    flatShading: false,
  });
  geometry.computeVertexNormals();
  const mesh = new THREE.Mesh(geometry, material);

  const bbox = geometry.boundingBox;
  const size = new THREE.Vector3();
  bbox.getSize(size);
  const maxDim = Math.max(size.x, size.y, size.z);
  const scaleFactor = 4 / maxDim;
  mesh.scale.set(scaleFactor, scaleFactor, scaleFactor);
  mesh.position.y = (size.y * scaleFactor) / 2;
  detailScene.add(mesh);

  detailCamera.position.set(5, 4, 6);
  detailCamera.lookAt(0, (size.y * scaleFactor) / 2, 0);

  detailControls = new OrbitControls(detailCamera, detailRenderer.domElement);
  detailControls.target.set(0, (size.y * scaleFactor) / 2, 0);
  detailControls.enableDamping = true;
  detailControls.dampingFactor = 0.1;
  detailControls.update();

  function animate() {
    detailAnimId = requestAnimationFrame(animate);
    detailControls.update();
    detailRenderer.render(detailScene, detailCamera);
  }
  animate();

  // Handle resize
  const resizeObs = new ResizeObserver(() => {
    if (!detailRenderer) return;
    const nw = container.clientWidth;
    const nh = Math.max(container.clientHeight, 400);
    detailCamera.aspect = nw / nh;
    detailCamera.updateProjectionMatrix();
    detailRenderer.setSize(nw, nh);
  });
  resizeObs.observe(container);
}

function cleanup3D() {
  if (detailAnimId) cancelAnimationFrame(detailAnimId);
  if (detailRenderer) {
    detailRenderer.dispose();
    detailRenderer = null;
  }
  detailControls = null;
  detailScene = null;
  detailCamera = null;
  detailAnimId = null;
}

window.closeDetail = function() {
  cleanup3D();
  document.getElementById('detail-view').style.display = 'none';
  document.getElementById('library-view').style.display = 'block';
  document.getElementById('toolbar-library').style.display = 'flex';
  renderLibrary();
};

window.updateMeta = function(id, key, value) {
  const m = getModelMeta(id);
  if (!m) return;
  m[key] = value;
  if (key === 'printStatus' && value === 'Completed') {
    m.lastPrinted = new Date().toISOString();
  }
  if (key === 'name') {
    const titleEl = document.getElementById('detail-title');
    if (titleEl) titleEl.textContent = value;
  }
  saveMeta(allModels);
};

window.updateStatusBadge = function(val) {};

window.setRating = function(id, val) {
  const m = getModelMeta(id);
  if (!m) return;
  m.rating = val;
  saveMeta(allModels);
  const starsEl = document.getElementById('detail-stars');
  if (starsEl) {
    starsEl.querySelectorAll('.star').forEach(s => {
      const v = parseInt(s.getAttribute('data-val'));
      s.classList.toggle('filled', v <= val);
    });
  }
};

window.deleteModel = async function(id) {
  if (!confirm('Delete this model permanently?')) return;
  await dbDelete(id);
  allModels = allModels.filter(m => m.id !== id);
  saveMeta(allModels);
  closeDetail();
  showToast('Model deleted', 'info');
};

// ========== PDF EXPORT ==========
window.exportPDF = async function() {
  if (allModels.length === 0) {
    showToast('No models to export', 'error');
    return;
  }
  showToast('Generating PDF...', 'info');

  try {
    const { jsPDF } = window.jspdf;
    const doc = new jsPDF();
    const pageW = doc.internal.pageSize.getWidth();

    // Title page
    doc.setFont('helvetica', 'bold');
    doc.setFontSize(24);
    doc.setTextColor(0, 212, 255);
    doc.text('3D Print Library', pageW / 2, 40, { align: 'center' });
    doc.setFontSize(12);
    doc.setTextColor(150, 150, 150);
    doc.text('Korb Engineering', pageW / 2, 52, { align: 'center' });
    doc.text(`${allModels.length} models | Generated ${new Date().toLocaleDateString()}`, pageW / 2, 62, { align: 'center' });

    let y = 80;
    for (let i = 0; i < allModels.length; i++) {
      const m = allModels[i];
      if (y > 250) {
        doc.addPage();
        y = 20;
      }

      // Thumbnail
      if (m.thumbnail) {
        try {
          doc.addImage(m.thumbnail, 'PNG', 14, y, 30, 30);
        } catch {}
      }

      const tx = m.thumbnail ? 50 : 14;
      doc.setFont('helvetica', 'bold');
      doc.setFontSize(12);
      doc.setTextColor(30, 30, 30);
      doc.text(m.name, tx, y + 8);

      doc.setFont('helvetica', 'normal');
      doc.setFontSize(9);
      doc.setTextColor(100, 100, 100);
      doc.text(`Category: ${m.category} | Material: ${m.material} | Status: ${m.printStatus}`, tx, y + 16);
      doc.text(`Size: ${formatBytes(m.fileSize)} | Rating: ${'*'.repeat(m.rating)}${'_'.repeat(5-m.rating)} | Infill: ${m.infill}%`, tx, y + 22);
      if (m.description) {
        const desc = m.description.substring(0, 80) + (m.description.length > 80 ? '...' : '');
        doc.text(desc, tx, y + 28);
        y += 38;
      } else {
        y += 32;
      }

      // Separator
      doc.setDrawColor(220, 220, 220);
      doc.line(14, y, pageW - 14, y);
      y += 6;
    }

    doc.save('3d-print-library-catalog.pdf');
    showToast('PDF exported successfully', 'success');
  } catch (e) {
    console.error('PDF export error:', e);
    showToast('PDF export failed: ' + e.message, 'error');
  }
};

// ========== TOAST ==========
function showToast(msg, type = 'info') {
  const tc = document.getElementById('toast-container');
  const toast = document.createElement('div');
  toast.className = `toast toast-${type}`;
  toast.textContent = msg;
  tc.appendChild(toast);
  setTimeout(() => { toast.style.opacity = '0'; toast.style.transition = 'opacity .3s'; setTimeout(() => toast.remove(), 300); }, 3000);
}

// ========== FILE INPUT ==========
document.getElementById('file-input').addEventListener('change', e => {
  if (e.target.files.length) handleFiles(e.target.files);
  e.target.value = '';
});

// ========== INIT ==========
async function init() {
  await openDB();
  allModels = loadMeta();

  // Verify IndexedDB has the files, remove orphaned metadata
  const keys = await dbGetAllKeys();
  const keySet = new Set(keys);
  const before = allModels.length;
  allModels = allModels.filter(m => keySet.has(m.id));
  if (allModels.length !== before) saveMeta(allModels);

  renderLibrary();
}

init();
</script>
