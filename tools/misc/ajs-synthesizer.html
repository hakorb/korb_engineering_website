<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>AJ's Synthesizer</title>
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #050a0f;
  --surface: #0a1018;
  --surface2: #0e1520;
  --border: #1a2535;
  --text: #e2e8f0;
  --cyan: #00d4ff;
  --orange: #ff6600;
  --green: #10b981;
  --red: #ef4444;
  --purple: #a855f7;
  --pink: #ec4899;
  --yellow: #eab308;
  --font: 'JetBrains Mono', monospace;
  --pad-size: 100px;
  --pad-gap: 10px;
}
* { margin:0; padding:0; box-sizing:border-box; }
html, body { height:100%; overflow:hidden; }
body {
  background:var(--bg); color:var(--text); font-family:var(--font);
  touch-action:manipulation; -webkit-user-select:none; user-select:none;
  -webkit-touch-callout:none; -webkit-tap-highlight-color:transparent;
  font-size:16px;
}

/* ========== APP LAYOUT ========== */
.app-wrap { display:flex; flex-direction:column; height:100vh; height:100dvh; }

/* ========== COMPACT HEADER ========== */
.header {
  display:flex; align-items:center; gap:6px; padding:4px 8px;
  background:var(--surface); border-bottom:1px solid var(--border);
  min-height:36px; flex-shrink:0;
}
.header h1 { font-size:13px; color:var(--cyan); white-space:nowrap; font-weight:600; }
.header h1 span { color:var(--orange); }
.header-controls { display:flex; align-items:center; gap:4px; margin-left:auto; }
.hdr-btn {
  min-width:44px; min-height:36px; border:1px solid var(--border); border-radius:6px;
  background:var(--surface2); color:var(--text); cursor:pointer; font-family:var(--font);
  font-size:12px; display:flex; align-items:center; justify-content:center; gap:3px;
  padding:0 8px; transition:all .15s;
}
.hdr-btn:active, .hdr-btn.active { background:var(--cyan); color:var(--bg); border-color:var(--cyan); }
.hdr-btn.settings-btn { background:var(--surface2); }
.hdr-btn.settings-btn:active, .hdr-btn.settings-btn.active { background:var(--orange); border-color:var(--orange); }
.oct-display { font-size:14px; color:var(--orange); font-weight:700; min-width:28px; text-align:center; }

/* ========== INSTRUMENT SELECTOR (scrollable row) ========== */
.instrument-scroll {
  display:flex; gap:3px; overflow-x:auto; padding:3px 8px;
  background:var(--surface); border-bottom:1px solid var(--border);
  scrollbar-width:none; flex-shrink:0; min-height:30px;
}
.instrument-scroll::-webkit-scrollbar { display:none; }
.inst-chip {
  padding:2px 8px; font-size:10px; font-family:var(--font); border:1px solid var(--border);
  border-radius:12px; background:transparent; color:var(--text); cursor:pointer;
  white-space:nowrap; transition:all .15s; flex-shrink:0;
  min-height:24px; display:flex; align-items:center;
}
.inst-chip:active { opacity:0.7; }
.inst-chip.active { font-weight:600; color:var(--bg); }

/* ========== MODE TABS ========== */
.mode-tabs {
  display:flex; gap:0; border-bottom:1px solid var(--border);
  background:var(--surface2); flex-shrink:0;
}
.mode-tab {
  flex:1; padding:8px 4px; font-family:var(--font); font-size:11px;
  background:transparent; border:none; border-bottom:2px solid transparent;
  color:var(--text); cursor:pointer; opacity:0.5; transition:all .15s; text-align:center;
  min-height:44px; display:flex; align-items:center; justify-content:center;
}
.mode-tab:active { opacity:0.8; }
.mode-tab.active { opacity:1; border-bottom-color:var(--cyan); color:var(--cyan); }

/* ========== PLAYING SURFACE (maximized) ========== */
.play-surface { flex:1; display:flex; flex-direction:column; overflow:hidden; position:relative; }
.surface-area { flex:1; overflow:hidden; position:relative; touch-action:none; }

/* ========== COLLAPSIBLE SETTINGS PANEL ========== */
.settings-overlay {
  position:fixed; top:0; left:0; right:0; bottom:0; z-index:100;
  background:rgba(0,0,0,0.7); display:none; backdrop-filter:blur(4px);
}
.settings-overlay.open { display:flex; }
.settings-panel {
  position:absolute; right:0; top:0; bottom:0; width:min(320px, 85vw);
  background:var(--surface); overflow-y:auto; border-left:1px solid var(--border);
  padding:12px; animation:slideIn .2s ease;
}
@keyframes slideIn { from { transform:translateX(100%); } to { transform:translateX(0); } }
.settings-close {
  width:44px; height:44px; border:1px solid var(--border); border-radius:8px;
  background:var(--surface2); color:var(--red); cursor:pointer; font-size:20px;
  display:flex; align-items:center; justify-content:center; margin-bottom:12px;
  font-family:var(--font);
}
.settings-section { margin-bottom:16px; }
.settings-section h3 { font-size:11px; color:var(--cyan); margin-bottom:8px; font-weight:600; text-transform:uppercase; letter-spacing:1px; }
.fx-row { display:flex; align-items:center; gap:8px; margin-bottom:6px; }
.fx-row label { font-size:11px; color:var(--text); opacity:0.7; min-width:55px; }
.fx-row input[type="range"] { flex:1; accent-color:var(--cyan); height:6px; }
.fx-row select {
  font-family:var(--font); font-size:16px; background:var(--surface2);
  color:var(--text); border:1px solid var(--border); border-radius:6px; padding:6px 8px;
  min-height:44px;
}
.fx-row .val { font-size:11px; color:var(--orange); min-width:44px; text-align:right; }
.vol-slider { width:60px; accent-color:var(--cyan); height:6px; }

/* ========== PIANO KEYBOARD ========== */
.keyboard-container { position:relative; width:100%; height:100%; overflow:hidden; touch-action:none; }
.white-key {
  display:inline-block; position:relative; height:100%;
  background:linear-gradient(180deg, #e8e8e8 0%, #fff 10%, #f5f5f5 85%, #ddd 100%);
  border:1px solid #888; border-top:none; border-radius:0 0 8px 8px;
  cursor:pointer; vertical-align:top; z-index:1; transition:all .08s;
}
.white-key.pressed {
  background:linear-gradient(180deg, #bbb 0%, #d0d0d0 50%, #c5c5c5 100%);
  transform:scaleY(0.98); transform-origin:top;
}
.black-key {
  position:absolute; top:0; height:58%;
  background:linear-gradient(180deg, #333 0%, #1a1a1a 70%, #111 100%);
  border:1px solid #000; border-top:none; border-radius:0 0 6px 6px;
  z-index:2; cursor:pointer; transition:all .08s;
}
.black-key.pressed {
  background:linear-gradient(180deg, #555 0%, #333 70%, #222 100%);
  transform:scaleY(0.97); transform-origin:top;
}
.key-glow {
  position:absolute; bottom:0; left:0; right:0; height:0; border-radius:0 0 8px 8px;
  pointer-events:none; transition:height .1s, opacity .1s; opacity:0;
}
.white-key.pressed .key-glow, .black-key.pressed .key-glow {
  height:40%; opacity:0.5;
}
.note-label {
  position:absolute; bottom:8px; left:50%; transform:translateX(-50%);
  font-size:10px; color:#666; pointer-events:none; font-family:var(--font); font-weight:500;
}
.black-key .note-label { color:#888; bottom:6px; font-size:9px; }

/* ========== CIRCLE PAD ========== */
.circle-pad-area { width:100%; height:100%; display:flex; align-items:center; justify-content:center; touch-action:none; }
.circle-pad-svg { width:100%; height:100%; }
.circle-note { cursor:pointer; transition:all .1s; }
.circle-note.pressed circle { filter:brightness(1.8); }
.circle-note.pressed text { fill:var(--bg); font-weight:700; }
.circle-note text { pointer-events:none; font-family:var(--font); fill:var(--text); text-anchor:middle; dominant-baseline:central; }

/* ========== HEX GRID ========== */
.hex-grid-area { width:100%; height:100%; display:flex; align-items:center; justify-content:center; touch-action:none; overflow:hidden; }
.hex-grid-svg { width:100%; height:100%; }
.hex-cell { cursor:pointer; transition:all .1s; }
.hex-cell.pressed polygon { filter:brightness(1.8); }
.hex-cell.pressed text { fill:var(--bg); font-weight:700; }
.hex-cell text { pointer-events:none; font-family:var(--font); fill:var(--text); text-anchor:middle; dominant-baseline:central; }

/* ========== DRUM PADS ========== */
.drum-pad-area {
  width:100%; height:100%; display:grid;
  grid-template-columns:repeat(4, 1fr); grid-template-rows:repeat(2, 1fr);
  gap:var(--pad-gap); padding:var(--pad-gap); touch-action:none;
}
.drum-pad {
  border-radius:50%; display:flex; flex-direction:column; align-items:center;
  justify-content:center; cursor:pointer; transition:all .08s; position:relative;
  border:2px solid; min-width:60px; min-height:60px; aspect-ratio:1;
  margin:auto; width:min(100%, 140px); font-family:var(--font);
}
.drum-pad .pad-label { font-size:11px; font-weight:600; pointer-events:none; }
.drum-pad .pad-key { font-size:9px; opacity:0.5; pointer-events:none; margin-top:2px; }
.drum-pad.pressed { transform:scale(0.92); }
.drum-pad-glow {
  position:absolute; inset:-4px; border-radius:50%; opacity:0; transition:opacity .1s;
  pointer-events:none;
}
.drum-pad.pressed .drum-pad-glow { opacity:0.6; }

/* ========== THEREMIN ========== */
.theremin-wrap { display:flex; flex-direction:column; width:100%; height:100%; }
.theremin-info-bar {
  display:flex; align-items:center; justify-content:space-between;
  padding:4px 12px; background:var(--surface); border-bottom:1px solid var(--border);
  font-size:12px; min-height:28px;
}
.theremin-info-bar .freq { color:var(--cyan); }
.theremin-info-bar .note-name { color:var(--orange); font-weight:600; }
.theremin-info-bar .vol-info { color:var(--green); }
.theremin-pad {
  flex:1; position:relative; background:radial-gradient(ellipse at center, var(--surface2) 0%, var(--bg) 100%);
  cursor:crosshair; touch-action:none; overflow:hidden;
}
.theremin-pad canvas { position:absolute; top:0; left:0; width:100%; height:100%; pointer-events:none; }
.theremin-crosshair { position:absolute; pointer-events:none; z-index:2; }
.theremin-crosshair .h-line, .theremin-crosshair .v-line { position:absolute; background:var(--cyan); opacity:0.3; }
.theremin-crosshair .h-line { width:100vw; height:1px; left:-50vw; }
.theremin-crosshair .v-line { width:1px; height:100vh; top:-50vh; }
.theremin-crosshair .dot {
  width:16px; height:16px; border-radius:50%; background:var(--cyan);
  box-shadow:0 0 24px var(--cyan), 0 0 48px rgba(0,212,255,0.3);
  position:absolute; left:-8px; top:-8px;
}
.antenna-left, .antenna-right { position:absolute; bottom:0; z-index:1; opacity:0.3; }
.antenna-left { left:16px; width:3px; height:90%; background:linear-gradient(to top, var(--orange), transparent); }
.antenna-right { right:16px; width:16px; height:60%; background:linear-gradient(to top, var(--green), transparent); }

/* ========== DRUM SEQUENCER ========== */
.seq-panel { display:flex; flex-direction:column; width:100%; height:100%; overflow:hidden; }
.seq-controls {
  display:flex; align-items:center; gap:4px; padding:6px 8px; flex-wrap:wrap;
  border-bottom:1px solid var(--border); background:var(--surface); flex-shrink:0;
}
.seq-btn {
  min-width:44px; min-height:36px; padding:0 10px; font-family:var(--font); font-size:11px;
  border:1px solid var(--border); border-radius:6px; background:var(--surface2);
  color:var(--text); cursor:pointer; display:flex; align-items:center; justify-content:center;
}
.seq-btn:active { border-color:var(--cyan); }
.seq-btn.active { background:var(--red); border-color:var(--red); color:#fff; }
.seq-btn.preset { font-size:9px; padding:0 6px; }
.seq-grid-wrap { flex:1; overflow:auto; }
.seq-grid { display:grid; grid-template-columns:50px repeat(16, 1fr); gap:2px; padding:6px 8px; }
.seq-label {
  font-size:10px; display:flex; align-items:center; color:var(--orange);
  cursor:pointer; white-space:nowrap; padding-right:4px; min-height:32px;
}
.seq-label:active { color:var(--cyan); }
.seq-cell {
  aspect-ratio:1; border:1px solid var(--border); border-radius:4px;
  background:var(--surface); cursor:pointer; transition:all .1s; min-width:16px; min-height:24px;
}
.seq-cell:active { border-color:var(--cyan); }
.seq-cell.on { background:var(--cyan); border-color:var(--cyan); }
.seq-cell.current { box-shadow:inset 0 0 0 2px var(--orange); }

/* ========== RECORDING ========== */
.rec-panel { display:flex; flex-direction:column; width:100%; height:100%; overflow-y:auto; }
.rec-controls-bar {
  display:flex; align-items:center; gap:8px; padding:10px 12px;
  border-bottom:1px solid var(--border); flex-shrink:0;
}
.rec-btn {
  width:48px; height:48px; border-radius:50%; border:2px solid var(--red);
  background:transparent; color:var(--red); font-size:22px; cursor:pointer;
  display:flex; align-items:center; justify-content:center; transition:all .2s;
}
.rec-btn.recording { background:var(--red); color:#fff; animation:recPulse 1s infinite; }
@keyframes recPulse { 0%,100%{box-shadow:0 0 0 0 rgba(239,68,68,0.4)} 50%{box-shadow:0 0 0 10px rgba(239,68,68,0)} }
.rec-timer { font-size:16px; color:var(--text); font-variant-numeric:tabular-nums; }
.rec-dl-btn {
  padding:8px 16px; border:1px solid var(--border); border-radius:6px;
  background:var(--surface2); color:var(--text); cursor:pointer;
  font-family:var(--font); font-size:12px; min-height:44px;
  display:flex; align-items:center;
}
#rec-canvas { width:100%; height:50px; display:block; background:var(--surface); flex-shrink:0; }
.rec-library { padding:8px 12px; }
.rec-item {
  display:flex; align-items:center; gap:6px; padding:6px 0;
  border-bottom:1px solid var(--border); font-size:12px;
}
.rec-item button {
  padding:4px 10px; font-family:var(--font); font-size:11px;
  border:1px solid var(--border); border-radius:4px; background:var(--surface2);
  color:var(--text); cursor:pointer; min-height:36px;
}
.rec-name { flex:1; color:var(--text); }
.rec-dur { color:var(--cyan); min-width:40px; }

/* ========== BOTTOM VISUALIZER ========== */
.viz-bar {
  display:flex; height:36px; border-top:1px solid var(--border);
  background:var(--surface); flex-shrink:0;
}
.viz-canvas { flex:1; display:block; }
.vu-meter { width:20px; background:var(--bg); border-left:1px solid var(--border); position:relative; }
.vu-fill {
  position:absolute; bottom:0; left:2px; right:2px;
  background:linear-gradient(to top, var(--green), var(--yellow), var(--red));
  transition:height .05s; border-radius:1px;
}

/* ========== ARPEGGIATOR (in settings) ========== */
.arp-controls { display:flex; flex-direction:column; gap:6px; }
.arp-row { display:flex; align-items:center; gap:8px; flex-wrap:wrap; }
.arp-row label { font-size:11px; color:var(--orange); font-weight:500; }
.arp-row select, .arp-row input {
  font-family:var(--font); font-size:16px; background:var(--surface2);
  color:var(--text); border:1px solid var(--border); border-radius:6px;
  padding:6px 8px; min-height:44px;
}

/* ========== SCROLLBAR ========== */
::-webkit-scrollbar { width:4px; height:4px; }
::-webkit-scrollbar-track { background:var(--bg); }
::-webkit-scrollbar-thumb { background:var(--border); border-radius:2px; }

/* ========== MOBILE ========== */
@media(max-width:600px) {
  .header h1 { font-size:11px; }
  .inst-chip { font-size:9px; padding:2px 6px; }
  .mode-tab { font-size:10px; }
  .drum-pad-area { gap:6px; padding:6px; }
  .drum-pad { width:min(100%, 100px); }
  .drum-pad .pad-label { font-size:10px; }
  :root { --pad-gap: 6px; }
}

/* ========== LANDSCAPE ========== */
@media(orientation:landscape) and (max-height:500px) {
  .header { padding:2px 8px; min-height:28px; }
  .header h1 { font-size:11px; }
  .instrument-scroll { padding:2px 8px; min-height:24px; }
  .inst-chip { padding:1px 6px; font-size:9px; min-height:20px; }
  .mode-tabs { display:none; }
  .viz-bar { height:24px; }
  .theremin-info-bar { min-height:20px; padding:2px 8px; font-size:10px; }
}
</style>
</head>
<body>
<div class="app-wrap">

  <!-- Compact Header -->
  <div class="header">
    <h1>AJ's <span>Synth</span></h1>
    <div class="header-controls">
      <button class="hdr-btn" id="oct-down" aria-label="Octave down">-</button>
      <span class="oct-display" id="octave-display">C4</span>
      <button class="hdr-btn" id="oct-up" aria-label="Octave up">+</button>
      <button class="hdr-btn" id="sustain-btn" title="Sustain">S</button>
      <input type="range" class="vol-slider" id="master-vol" min="0" max="100" value="75" title="Volume">
      <button class="hdr-btn" id="label-toggle" title="Labels">L</button>
      <button class="hdr-btn settings-btn" id="settings-toggle" title="Settings">&#9881;</button>
    </div>
  </div>

  <!-- Instrument Selector -->
  <div class="instrument-scroll" id="instrument-scroll"></div>

  <!-- Mode Tabs -->
  <div class="mode-tabs" id="mode-tabs">
    <button class="mode-tab active" data-mode="piano">Piano</button>
    <button class="mode-tab" data-mode="circle">Circle</button>
    <button class="mode-tab" data-mode="hex">Hex</button>
    <button class="mode-tab" data-mode="drumpads">Pads</button>
    <button class="mode-tab" data-mode="theremin">Theremin</button>
    <button class="mode-tab" data-mode="sequencer">Seq</button>
    <button class="mode-tab" data-mode="record">Rec</button>
  </div>

  <!-- Playing Surface -->
  <div class="play-surface">
    <div class="surface-area" id="surface-area">
      <!-- Modes rendered here -->
    </div>
    <!-- Bottom Visualizer -->
    <div class="viz-bar">
      <canvas class="viz-canvas" id="visualizer-canvas"></canvas>
      <div class="vu-meter"><div class="vu-fill" id="vu-fill"></div></div>
    </div>
  </div>

</div>

<!-- Settings Overlay -->
<div class="settings-overlay" id="settings-overlay">
  <div class="settings-panel" id="settings-panel">
    <button class="settings-close" id="settings-close">&times;</button>

    <div class="settings-section">
      <h3>Arpeggiator</h3>
      <div class="arp-controls">
        <div class="arp-row">
          <label>Mode</label>
          <select id="arp-mode">
            <option value="off">Off</option>
            <option value="up">Up</option>
            <option value="down">Down</option>
            <option value="updown">Up/Down</option>
            <option value="random">Random</option>
          </select>
        </div>
        <div class="arp-row">
          <label>BPM</label>
          <input type="number" id="arp-bpm" value="140" min="60" max="300" style="width:70px">
        </div>
        <div class="arp-row">
          <label>Steps</label>
          <select id="arp-steps">
            <option value="1">1 Oct</option>
            <option value="2">2 Oct</option>
            <option value="3">3 Oct</option>
          </select>
        </div>
      </div>
    </div>

    <div class="settings-section">
      <h3>Theremin</h3>
      <div class="fx-row">
        <label>Wave</label>
        <select id="theremin-wave">
          <option value="sine">Sine</option>
          <option value="triangle">Triangle</option>
          <option value="sawtooth">Sawtooth</option>
          <option value="square">Square</option>
        </select>
      </div>
      <div class="fx-row">
        <label>Range</label>
        <select id="theremin-range">
          <option value="2">2 Oct</option>
          <option value="3" selected>3 Oct</option>
          <option value="4">4 Oct</option>
          <option value="5">5 Oct</option>
        </select>
      </div>
      <div class="fx-row">
        <label>Vibrato</label>
        <input type="range" id="theremin-vibrato" min="0" max="100" value="20">
      </div>
      <div class="fx-row">
        <label>Glide</label>
        <input type="range" id="theremin-glide" min="0" max="100" value="50">
      </div>
    </div>

    <div class="settings-section">
      <h3>Reverb</h3>
      <div class="fx-row">
        <label>Size</label>
        <input type="range" min="0" max="100" value="30" id="fx-reverb-size">
        <span class="val" id="fx-reverb-val">30%</span>
      </div>
    </div>

    <div class="settings-section">
      <h3>Delay</h3>
      <div class="fx-row">
        <label>Time</label>
        <input type="range" min="50" max="1000" value="300" id="fx-delay-time">
        <span class="val" id="fx-delay-time-val">300ms</span>
      </div>
      <div class="fx-row">
        <label>Feedback</label>
        <input type="range" min="0" max="90" value="30" id="fx-delay-fb">
        <span class="val" id="fx-delay-fb-val">30%</span>
      </div>
      <div class="fx-row">
        <label>Mix</label>
        <input type="range" min="0" max="100" value="0" id="fx-delay-mix">
        <span class="val" id="fx-delay-mix-val">0%</span>
      </div>
    </div>

    <div class="settings-section">
      <h3>Chorus</h3>
      <div class="fx-row">
        <label>Depth</label>
        <input type="range" min="0" max="100" value="0" id="fx-chorus-depth">
        <span class="val" id="fx-chorus-val">0%</span>
      </div>
      <div class="fx-row">
        <label>Rate</label>
        <input type="range" min="1" max="50" value="7" id="fx-chorus-rate">
        <span class="val" id="fx-chorus-rate-val">0.7Hz</span>
      </div>
    </div>

    <div class="settings-section">
      <h3>Tremolo</h3>
      <div class="fx-row">
        <label>Depth</label>
        <input type="range" min="0" max="100" value="0" id="fx-trem-depth">
        <span class="val" id="fx-trem-val">0%</span>
      </div>
      <div class="fx-row">
        <label>Rate</label>
        <input type="range" min="1" max="20" value="4" id="fx-trem-rate">
        <span class="val" id="fx-trem-rate-val">4Hz</span>
      </div>
    </div>

    <div class="settings-section">
      <h3>Filter</h3>
      <div class="fx-row">
        <label>Type</label>
        <select id="fx-filter-type">
          <option value="lowpass">Low-pass</option>
          <option value="highpass">High-pass</option>
          <option value="bandpass">Bandpass</option>
        </select>
      </div>
      <div class="fx-row">
        <label>Cutoff</label>
        <input type="range" min="20" max="20000" value="20000" id="fx-filter-cutoff">
        <span class="val" id="fx-filter-cutoff-val">20kHz</span>
      </div>
      <div class="fx-row">
        <label>Resonance</label>
        <input type="range" min="0" max="30" value="1" step="0.5" id="fx-filter-q">
        <span class="val" id="fx-filter-q-val">1.0</span>
      </div>
    </div>

    <div class="settings-section">
      <h3>Distortion</h3>
      <div class="fx-row">
        <label>Type</label>
        <select id="fx-dist-type">
          <option value="off">Off</option>
          <option value="soft">Soft Clip</option>
          <option value="hard">Hard Clip</option>
        </select>
      </div>
      <div class="fx-row">
        <label>Amount</label>
        <input type="range" min="0" max="100" value="50" id="fx-dist-amount">
        <span class="val" id="fx-dist-val">50</span>
      </div>
    </div>

    <div class="settings-section">
      <h3>Compressor</h3>
      <div class="fx-row">
        <label>Threshold</label>
        <input type="range" min="-60" max="0" value="-24" id="fx-comp-thresh">
        <span class="val" id="fx-comp-thresh-val">-24dB</span>
      </div>
      <div class="fx-row">
        <label>Ratio</label>
        <input type="range" min="1" max="20" value="4" id="fx-comp-ratio">
        <span class="val" id="fx-comp-ratio-val">4:1</span>
      </div>
    </div>

  </div>
</div>

<script>
// ========== AUDIO ENGINE ==========
let audioCtx, masterGain, compressor, filterNode, distortionNode;
let delayNode, delayFeedback, delayMix, delayDry;
let reverbNode, chorusNode, tremoloNode;
let analyser, mediaStreamDest;
let audioInitialized = false;

function initAudio() {
  if (audioInitialized) return;
  audioInitialized = true;
  audioCtx = new (window.AudioContext || window.webkitAudioContext)();

  masterGain = audioCtx.createGain();
  masterGain.gain.value = 0.75;

  compressor = audioCtx.createDynamicsCompressor();
  compressor.threshold.value = -24;
  compressor.knee.value = 12;
  compressor.ratio.value = 4;
  compressor.attack.value = 0.003;
  compressor.release.value = 0.15;

  analyser = audioCtx.createAnalyser();
  analyser.fftSize = 2048;
  analyser.smoothingTimeConstant = 0.85;

  filterNode = audioCtx.createBiquadFilter();
  filterNode.type = 'lowpass';
  filterNode.frequency.value = 20000;
  filterNode.Q.value = 1;

  distortionNode = audioCtx.createWaveShaper();
  distortionNode.oversample = '4x';

  // Chorus
  chorusNode = {
    delay1: audioCtx.createDelay(0.05),
    delay2: audioCtx.createDelay(0.05),
    lfo1: audioCtx.createOscillator(),
    lfo2: audioCtx.createOscillator(),
    lfoGain1: audioCtx.createGain(),
    lfoGain2: audioCtx.createGain(),
    mix: audioCtx.createGain(),
    dry: audioCtx.createGain(),
    input: audioCtx.createGain(),
    output: audioCtx.createGain()
  };
  chorusNode.delay1.delayTime.value = 0.015;
  chorusNode.delay2.delayTime.value = 0.017;
  chorusNode.lfo1.type = 'sine';
  chorusNode.lfo1.frequency.value = 0.7;
  chorusNode.lfo2.type = 'sine';
  chorusNode.lfo2.frequency.value = 0.9;
  chorusNode.lfoGain1.gain.value = 0;
  chorusNode.lfoGain2.gain.value = 0;
  chorusNode.mix.gain.value = 0;
  chorusNode.dry.gain.value = 1;
  chorusNode.lfo1.connect(chorusNode.lfoGain1);
  chorusNode.lfoGain1.connect(chorusNode.delay1.delayTime);
  chorusNode.lfo2.connect(chorusNode.lfoGain2);
  chorusNode.lfoGain2.connect(chorusNode.delay2.delayTime);
  chorusNode.input.connect(chorusNode.dry);
  chorusNode.input.connect(chorusNode.delay1);
  chorusNode.input.connect(chorusNode.delay2);
  chorusNode.delay1.connect(chorusNode.mix);
  chorusNode.delay2.connect(chorusNode.mix);
  chorusNode.dry.connect(chorusNode.output);
  chorusNode.mix.connect(chorusNode.output);
  chorusNode.lfo1.start();
  chorusNode.lfo2.start();

  delayNode = audioCtx.createDelay(2.0);
  delayNode.delayTime.value = 0.3;
  delayFeedback = audioCtx.createGain();
  delayFeedback.gain.value = 0.3;
  delayMix = audioCtx.createGain();
  delayMix.gain.value = 0;
  delayDry = audioCtx.createGain();
  delayDry.gain.value = 1;

  reverbNode = createReverb();

  tremoloNode = {
    lfo: audioCtx.createOscillator(),
    depth: audioCtx.createGain(),
    gain: audioCtx.createGain()
  };
  tremoloNode.lfo.type = 'sine';
  tremoloNode.lfo.frequency.value = 4;
  tremoloNode.depth.gain.value = 0;
  tremoloNode.gain.gain.value = 1;
  tremoloNode.lfo.connect(tremoloNode.depth);
  tremoloNode.depth.connect(tremoloNode.gain.gain);
  tremoloNode.lfo.start();

  // Signal chain
  filterNode.connect(distortionNode);
  distortionNode.connect(chorusNode.input);
  chorusNode.output.connect(delayDry);
  chorusNode.output.connect(delayNode);
  delayNode.connect(delayFeedback);
  delayFeedback.connect(delayNode);
  delayNode.connect(delayMix);
  delayDry.connect(tremoloNode.gain);
  delayMix.connect(tremoloNode.gain);
  tremoloNode.gain.connect(reverbNode.input);
  reverbNode.output.connect(compressor);
  compressor.connect(masterGain);
  masterGain.connect(analyser);
  analyser.connect(audioCtx.destination);

  mediaStreamDest = audioCtx.createMediaStreamDestination();
  masterGain.connect(mediaStreamDest);
}

function createReverb() {
  const input = audioCtx.createGain();
  const output = audioCtx.createGain();
  const wet = audioCtx.createGain();
  wet.gain.value = 0.3;
  const dry = audioCtx.createGain();
  dry.gain.value = 0.7;

  const duration = 2.5;
  const sampleRate = audioCtx.sampleRate;
  const length = sampleRate * duration;
  const impulse = audioCtx.createBuffer(2, length, sampleRate);
  for (let ch = 0; ch < 2; ch++) {
    const data = impulse.getChannelData(ch);
    for (let i = 0; i < length; i++) {
      data[i] = (Math.random() * 2 - 1) * Math.pow(1 - i / length, 2.5);
    }
  }
  const convolver = audioCtx.createConvolver();
  convolver.buffer = impulse;

  input.connect(dry);
  input.connect(convolver);
  convolver.connect(wet);
  dry.connect(output);
  wet.connect(output);

  return {
    input, output, wet, dry, convolver,
    setSize(val) {
      wet.gain.setTargetAtTime(val * 0.8, audioCtx.currentTime, 0.02);
      dry.gain.setTargetAtTime(1 - val * 0.3, audioCtx.currentTime, 0.02);
    }
  };
}

// ========== NOTE HELPERS ==========
const NOTE_FREQS = {};
const ALL_NOTES = ['C','C#','D','D#','E','F','F#','G','G#','A','A#','B'];
for (let oct = 0; oct <= 8; oct++) {
  ALL_NOTES.forEach((n, i) => {
    const midi = (oct + 1) * 12 + i;
    NOTE_FREQS[n + oct] = 440 * Math.pow(2, (midi - 69) / 12);
  });
}

function freqToNoteName(freq) {
  if (freq <= 0) return '--';
  const midi = 12 * Math.log2(freq / 440) + 69;
  const noteIdx = Math.round(midi) % 12;
  const oct = Math.floor(Math.round(midi) / 12) - 1;
  return ALL_NOTES[noteIdx < 0 ? noteIdx + 12 : noteIdx] + oct;
}

// ========== INSTRUMENTS ==========
const INSTRUMENTS = [
  { name: 'Grand Piano', short: 'Piano', color: '#00d4ff' },
  { name: 'Electric Piano', short: 'E.Piano', color: '#06b6d4' },
  { name: 'Hammond Organ', short: 'Organ', color: '#10b981' },
  { name: 'String Ensemble', short: 'Strings', color: '#8b5cf6' },
  { name: 'Brass Section', short: 'Brass', color: '#f59e0b' },
  { name: 'Woodwinds', short: 'Winds', color: '#84cc16' },
  { name: 'Synth Lead', short: 'SynLead', color: '#ec4899' },
  { name: 'Synth Pad', short: 'SynPad', color: '#a855f7' },
  { name: 'Bass', short: 'Bass', color: '#ef4444' },
  { name: 'Acoustic Guitar', short: 'Guitar', color: '#d97706' },
  { name: 'Marimba', short: 'Marimba', color: '#14b8a6' },
  { name: 'Harmonica', short: 'Hrmnica', color: '#6366f1' },
  { name: 'Choir', short: 'Choir', color: '#f472b6' },
  { name: 'Pluck Synth', short: 'Pluck', color: '#22d3ee' },
  { name: 'Drums', short: 'Drums', color: '#ff6600' },
];

let currentInstrument = 0;
let currentOctave = 4;
let sustainOn = false;
let showLabels = true;
let currentMode = 'piano';
const activeNotes = new Map();
const sustainedNotes = new Map();

// ========== VELOCITY DETECTION ==========
const touchStartTimes = new Map();

function getVelocity(touchId) {
  const startTime = touchStartTimes.get(touchId);
  if (!startTime) return 1.0;
  const elapsed = performance.now() - startTime;
  // Faster tap = higher velocity (inverse relationship, clamped)
  const vel = Math.min(1.0, Math.max(0.3, 1.0 - (elapsed / 200)));
  return vel;
}

// ========== PLAY / RELEASE ==========
function playNote(note, octave, velocity) {
  initAudio();
  if (audioCtx.state === 'suspended') audioCtx.resume();
  const noteId = note + octave;
  if (activeNotes.has(noteId)) return;
  const freq = NOTE_FREQS[noteId];
  if (!freq) return;
  const vol = (parseFloat(document.getElementById('master-vol').value) / 100) * (velocity || 1.0);
  const nodes = createInstrumentSound(currentInstrument, freq, vol);
  if (nodes) {
    activeNotes.set(noteId, nodes);
    handleArpNote(note, octave);
  }
}

function releaseNote(note, octave) {
  const noteId = note + octave;
  const nodes = activeNotes.get(noteId);
  if (!nodes) return;
  if (sustainOn) {
    sustainedNotes.set(noteId, nodes);
    activeNotes.delete(noteId);
    return;
  }
  doRelease(noteId);
}

function doRelease(noteId) {
  const nodes = activeNotes.get(noteId) || sustainedNotes.get(noteId);
  if (!nodes) return;
  const t = audioCtx.currentTime;
  const rt = nodes.releaseTime || 0.3;
  try {
    if (nodes.gainNode) {
      nodes.gainNode.gain.cancelScheduledValues(t);
      nodes.gainNode.gain.setValueAtTime(nodes.gainNode.gain.value, t);
      // Smooth release: linear ramp to near-zero then silence (no click)
      nodes.gainNode.gain.linearRampToValueAtTime(0.0001, t + rt);
    }
    setTimeout(() => {
      try {
        if (nodes.oscillators) nodes.oscillators.forEach(o => { try { o.stop(); } catch(e){} });
        if (nodes.noiseSource) { try { nodes.noiseSource.stop(); } catch(e){} }
        if (nodes.gainNode) nodes.gainNode.disconnect();
      } catch(e){}
    }, rt * 1000 + 80);
  } catch(e){}
  activeNotes.delete(noteId);
  sustainedNotes.delete(noteId);
}

function stopNoteImmediate(noteId) {
  const nodes = activeNotes.get(noteId) || sustainedNotes.get(noteId);
  if (!nodes) return;
  try {
    if (nodes.gainNode) {
      // Short fade to prevent click
      const t = audioCtx.currentTime;
      nodes.gainNode.gain.setValueAtTime(nodes.gainNode.gain.value, t);
      nodes.gainNode.gain.linearRampToValueAtTime(0, t + 0.01);
      setTimeout(() => { try { nodes.gainNode.disconnect(); } catch(e){} }, 20);
    }
    if (nodes.oscillators) nodes.oscillators.forEach(o => { try { o.stop(audioCtx.currentTime + 0.015); } catch(e){} });
    if (nodes.noiseSource) { try { nodes.noiseSource.stop(audioCtx.currentTime + 0.015); } catch(e){} }
  } catch(e){}
  activeNotes.delete(noteId);
  sustainedNotes.delete(noteId);
}

function releaseSustainedNotes() {
  for (const [noteId] of sustainedNotes) doRelease(noteId);
}

// ========== INSTRUMENT SYNTHESIS ==========
function createInstrumentSound(inst, freq, vol) {
  const t = audioCtx.currentTime;
  const g = audioCtx.createGain();
  g.gain.setValueAtTime(0, t);
  g.connect(filterNode);
  const oscillators = [];

  switch(inst) {
    case 0: { // Grand Piano
      const harmonics = [1, 2, 3, 4, 5, 6, 7, 8, 10, 12];
      const amps = [1, 0.55, 0.35, 0.25, 0.15, 0.1, 0.07, 0.04, 0.02, 0.01];
      const inharm = 1 + 0.0005 * (freq / 440);
      harmonics.forEach((h, i) => {
        const osc = audioCtx.createOscillator();
        osc.type = 'sine';
        osc.frequency.value = freq * h * Math.pow(inharm, h - 1) + (Math.random() - 0.5) * 0.8;
        const hg = audioCtx.createGain();
        hg.gain.value = amps[i] * vol;
        osc.connect(hg); hg.connect(g);
        osc.start(t); oscillators.push(osc);
      });
      const bufSz = audioCtx.sampleRate * 0.008;
      const nBuf = audioCtx.createBuffer(1, bufSz, audioCtx.sampleRate);
      const nD = nBuf.getChannelData(0);
      for (let i = 0; i < bufSz; i++) nD[i] = (Math.random() * 2 - 1) * 0.3;
      const nSrc = audioCtx.createBufferSource();
      nSrc.buffer = nBuf;
      const nG = audioCtx.createGain();
      nG.gain.setValueAtTime(vol * 0.4, t);
      nG.gain.exponentialRampToValueAtTime(0.001, t + 0.015);
      const nF = audioCtx.createBiquadFilter();
      nF.type = 'bandpass'; nF.frequency.value = freq * 3; nF.Q.value = 1;
      nSrc.connect(nF); nF.connect(nG); nG.connect(g);
      nSrc.start(t); nSrc.stop(t + 0.02);
      g.gain.linearRampToValueAtTime(vol, t + 0.003);
      g.gain.exponentialRampToValueAtTime(vol * 0.55, t + 0.25);
      g.gain.setTargetAtTime(vol * 0.25, t + 0.25, 1.8);
      return { gainNode: g, oscillators, releaseTime: 0.8 };
    }
    case 1: { // Electric Piano
      const c1 = audioCtx.createOscillator(); c1.type = 'sine'; c1.frequency.value = freq;
      const m1 = audioCtx.createOscillator(); m1.type = 'sine'; m1.frequency.value = freq * 3.5;
      const mG1 = audioCtx.createGain();
      mG1.gain.setValueAtTime(freq * 2.5, t);
      mG1.gain.exponentialRampToValueAtTime(freq * 0.2, t + 0.8);
      m1.connect(mG1); mG1.connect(c1.frequency);
      const c2 = audioCtx.createOscillator(); c2.type = 'sine'; c2.frequency.value = freq * 2;
      const m2 = audioCtx.createOscillator(); m2.type = 'sine'; m2.frequency.value = freq * 7;
      const mG2 = audioCtx.createGain();
      mG2.gain.setValueAtTime(freq * 0.5, t);
      mG2.gain.exponentialRampToValueAtTime(freq * 0.01, t + 0.3);
      m2.connect(mG2); mG2.connect(c2.frequency);
      const cG2 = audioCtx.createGain(); cG2.gain.value = 0.3;
      c1.connect(g); c2.connect(cG2); cG2.connect(g);
      c1.start(t); m1.start(t); c2.start(t); m2.start(t);
      g.gain.linearRampToValueAtTime(vol * 0.8, t + 0.002);
      g.gain.setTargetAtTime(vol * 0.4, t + 0.04, 0.4);
      return { gainNode: g, oscillators: [c1, m1, c2, m2], releaseTime: 0.4 };
    }
    case 2: { // Hammond Organ
      const drawbars = [0.5, 1, 1.5, 2, 3, 4, 5, 6, 8];
      const levels = [0.6, 0.8, 0.5, 0.7, 0.5, 0.35, 0.25, 0.2, 0.15];
      drawbars.forEach((h, i) => {
        const osc = audioCtx.createOscillator(); osc.type = 'sine';
        osc.frequency.value = freq * h;
        const hg = audioCtx.createGain();
        hg.gain.value = levels[i] * vol * 0.2;
        const trem = audioCtx.createOscillator(); trem.type = 'sine';
        trem.frequency.value = 5.8 + i * 0.2;
        const tremG = audioCtx.createGain();
        tremG.gain.value = levels[i] * vol * 0.035;
        trem.connect(tremG); tremG.connect(hg.gain);
        trem.start(t);
        osc.connect(hg); hg.connect(g);
        osc.start(t); oscillators.push(osc, trem);
      });
      const click = audioCtx.createOscillator(); click.type = 'square';
      click.frequency.value = freq * 4;
      const clickG = audioCtx.createGain();
      clickG.gain.setValueAtTime(vol * 0.15, t);
      clickG.gain.exponentialRampToValueAtTime(0.001, t + 0.008);
      click.connect(clickG); clickG.connect(g);
      click.start(t); click.stop(t + 0.01); oscillators.push(click);
      g.gain.linearRampToValueAtTime(vol * 0.45, t + 0.008);
      return { gainNode: g, oscillators, releaseTime: 0.06 };
    }
    case 3: { // String Ensemble
      for (let i = 0; i < 6; i++) {
        const osc = audioCtx.createOscillator(); osc.type = 'sawtooth';
        osc.frequency.value = freq + (i - 2.5) * 1.2 + Math.random() * 0.5;
        const lpf = audioCtx.createBiquadFilter(); lpf.type = 'lowpass';
        lpf.frequency.value = Math.min(freq * 3.5, 7000); lpf.Q.value = 0.4;
        const vib = audioCtx.createOscillator(); vib.type = 'sine';
        vib.frequency.value = 4.2 + Math.random() * 1.2;
        const vibG = audioCtx.createGain(); vibG.gain.value = freq * 0.004;
        vib.connect(vibG); vibG.connect(osc.frequency); vib.start(t);
        osc.connect(lpf); lpf.connect(g);
        osc.start(t); oscillators.push(osc, vib);
      }
      g.gain.linearRampToValueAtTime(vol * 0.3, t + 0.35);
      g.gain.setTargetAtTime(vol * 0.25, t + 0.4, 2.5);
      return { gainNode: g, oscillators, releaseTime: 0.7 };
    }
    case 4: { // Brass Section
      const o1 = audioCtx.createOscillator(); o1.type = 'sawtooth'; o1.frequency.value = freq;
      const o2 = audioCtx.createOscillator(); o2.type = 'sawtooth'; o2.frequency.value = freq * 1.003;
      const o3 = audioCtx.createOscillator(); o3.type = 'sawtooth'; o3.frequency.value = freq * 0.997;
      const bp = audioCtx.createBiquadFilter(); bp.type = 'lowpass';
      bp.frequency.setValueAtTime(freq * 1.5, t);
      bp.frequency.linearRampToValueAtTime(freq * 6, t + 0.12);
      bp.frequency.setTargetAtTime(freq * 3, t + 0.15, 0.6);
      bp.Q.value = 2;
      o1.connect(bp); o2.connect(bp); o3.connect(bp); bp.connect(g);
      o1.start(t); o2.start(t); o3.start(t);
      g.gain.linearRampToValueAtTime(vol * 0.4, t + 0.06);
      g.gain.setTargetAtTime(vol * 0.35, t + 0.12, 0.8);
      return { gainNode: g, oscillators: [o1, o2, o3], releaseTime: 0.18 };
    }
    case 5: { // Woodwinds
      const osc = audioCtx.createOscillator(); osc.type = 'triangle'; osc.frequency.value = freq;
      const o2 = audioCtx.createOscillator(); o2.type = 'sine'; o2.frequency.value = freq * 3;
      const o2g = audioCtx.createGain(); o2g.gain.value = vol * 0.08;
      o2.connect(o2g); o2g.connect(g);
      const vib = audioCtx.createOscillator(); vib.type = 'sine'; vib.frequency.value = 5.2;
      const vibG = audioCtx.createGain(); vibG.gain.value = freq * 0.006;
      vib.connect(vibG); vibG.connect(osc.frequency); vib.start(t);
      const bufSz = audioCtx.sampleRate; const nBuf = audioCtx.createBuffer(1, bufSz, audioCtx.sampleRate);
      const nD = nBuf.getChannelData(0);
      for (let i = 0; i < bufSz; i++) nD[i] = (Math.random() * 2 - 1) * 0.12;
      const noise = audioCtx.createBufferSource(); noise.buffer = nBuf; noise.loop = true;
      const nBP = audioCtx.createBiquadFilter(); nBP.type = 'bandpass'; nBP.frequency.value = freq * 2.5; nBP.Q.value = 4;
      const nG = audioCtx.createGain(); nG.gain.value = vol * 0.12;
      noise.connect(nBP); nBP.connect(nG); nG.connect(g); noise.start(t);
      osc.connect(g); osc.start(t); o2.start(t);
      g.gain.linearRampToValueAtTime(vol * 0.3, t + 0.06);
      g.gain.setTargetAtTime(vol * 0.25, t + 0.08, 1.2);
      return { gainNode: g, oscillators: [osc, o2, vib], noiseSource: noise, releaseTime: 0.12 };
    }
    case 6: { // Synth Lead
      const o1 = audioCtx.createOscillator(); o1.type = 'sawtooth'; o1.frequency.value = freq;
      const o2 = audioCtx.createOscillator(); o2.type = 'square'; o2.frequency.value = freq * 1.005;
      const o3 = audioCtx.createOscillator(); o3.type = 'sawtooth'; o3.frequency.value = freq * 0.995;
      const lpf = audioCtx.createBiquadFilter(); lpf.type = 'lowpass';
      lpf.frequency.setValueAtTime(freq * 1.2, t);
      lpf.frequency.linearRampToValueAtTime(freq * 10, t + 0.08);
      lpf.frequency.setTargetAtTime(freq * 3, t + 0.12, 0.25);
      lpf.Q.value = 5;
      o1.connect(lpf); o2.connect(lpf); o3.connect(lpf); lpf.connect(g);
      o1.start(t); o2.start(t); o3.start(t);
      g.gain.linearRampToValueAtTime(vol * 0.35, t + 0.008);
      return { gainNode: g, oscillators: [o1, o2, o3], releaseTime: 0.12 };
    }
    case 7: { // Synth Pad
      for (let i = 0; i < 7; i++) {
        const osc = audioCtx.createOscillator(); osc.type = 'sawtooth';
        osc.frequency.value = freq + (i - 3) * 2.2 + Math.random() * 0.5;
        const lpf = audioCtx.createBiquadFilter(); lpf.type = 'lowpass';
        lpf.frequency.value = Math.min(freq * 2.5, 5000);
        osc.connect(lpf); lpf.connect(g);
        osc.start(t); oscillators.push(osc);
      }
      g.gain.linearRampToValueAtTime(vol * 0.2, t + 0.5);
      g.gain.setTargetAtTime(vol * 0.18, t + 0.6, 3);
      return { gainNode: g, oscillators, releaseTime: 1.5 };
    }
    case 8: { // Bass
      const o1 = audioCtx.createOscillator(); o1.type = 'sawtooth'; o1.frequency.value = freq;
      const sub = audioCtx.createOscillator(); sub.type = 'sine'; sub.frequency.value = freq / 2;
      const subG = audioCtx.createGain(); subG.gain.value = 0.8;
      const lpf = audioCtx.createBiquadFilter(); lpf.type = 'lowpass';
      lpf.frequency.setValueAtTime(freq * 8, t);
      lpf.frequency.setTargetAtTime(freq * 1.5, t + 0.04, 0.12);
      lpf.Q.value = 4;
      o1.connect(lpf); sub.connect(subG); subG.connect(g); lpf.connect(g);
      o1.start(t); sub.start(t);
      g.gain.linearRampToValueAtTime(vol * 0.55, t + 0.004);
      g.gain.setTargetAtTime(vol * 0.35, t + 0.04, 0.25);
      return { gainNode: g, oscillators: [o1, sub], releaseTime: 0.12 };
    }
    case 9: { // Acoustic Guitar
      const exciteBuf = audioCtx.createBuffer(1, audioCtx.sampleRate * 0.04, audioCtx.sampleRate);
      const ed = exciteBuf.getChannelData(0);
      for (let i = 0; i < ed.length; i++) {
        ed[i] = (Math.random() * 2 - 1) * (1 - i / ed.length) * 0.8;
      }
      const excite = audioCtx.createBufferSource(); excite.buffer = exciteBuf;
      const body = audioCtx.createBiquadFilter(); body.type = 'peaking';
      body.frequency.value = 120; body.Q.value = 2; body.gain.value = 6;
      const body2 = audioCtx.createBiquadFilter(); body2.type = 'peaking';
      body2.frequency.value = 350; body2.Q.value = 1.5; body2.gain.value = 4;
      const lpf = audioCtx.createBiquadFilter(); lpf.type = 'lowpass';
      lpf.frequency.setValueAtTime(freq * 6, t);
      lpf.frequency.setTargetAtTime(freq * 2, t + 0.05, 0.15);
      const osc = audioCtx.createOscillator(); osc.type = 'triangle'; osc.frequency.value = freq;
      const oscG = audioCtx.createGain();
      oscG.gain.setValueAtTime(0, t);
      oscG.gain.linearRampToValueAtTime(vol * 0.15, t + 0.002);
      oscG.gain.setTargetAtTime(vol * 0.05, t + 0.05, 0.3);
      osc.connect(oscG); oscG.connect(g); osc.start(t);
      excite.connect(body); body.connect(body2); body2.connect(lpf); lpf.connect(g);
      excite.start(t); excite.stop(t + 0.04);
      g.gain.linearRampToValueAtTime(vol * 0.5, t + 0.002);
      g.gain.setTargetAtTime(vol * 0.15, t + 0.02, 0.4);
      g.gain.setTargetAtTime(0.001, t + 1.5, 0.5);
      return { gainNode: g, oscillators: [osc], releaseTime: 0.2 };
    }
    case 10: { // Marimba
      const o1 = audioCtx.createOscillator(); o1.type = 'sine'; o1.frequency.value = freq;
      const o2 = audioCtx.createOscillator(); o2.type = 'sine'; o2.frequency.value = freq * 4;
      const o2g = audioCtx.createGain();
      o2g.gain.setValueAtTime(vol * 0.35, t);
      o2g.gain.exponentialRampToValueAtTime(0.001, t + 0.15);
      const o3 = audioCtx.createOscillator(); o3.type = 'sine'; o3.frequency.value = freq * 2.76;
      const o3g = audioCtx.createGain();
      o3g.gain.setValueAtTime(vol * 0.15, t);
      o3g.gain.exponentialRampToValueAtTime(0.001, t + 0.08);
      o1.connect(g); o2.connect(o2g); o2g.connect(g); o3.connect(o3g); o3g.connect(g);
      o1.start(t); o2.start(t); o3.start(t);
      g.gain.linearRampToValueAtTime(vol * 0.6, t + 0.001);
      g.gain.setTargetAtTime(vol * 0.2, t + 0.01, 0.2);
      g.gain.setTargetAtTime(0.001, t + 0.8, 0.4);
      return { gainNode: g, oscillators: [o1, o2, o3], releaseTime: 0.15 };
    }
    case 11: { // Harmonica
      const o1 = audioCtx.createOscillator(); o1.type = 'square'; o1.frequency.value = freq;
      const o2 = audioCtx.createOscillator(); o2.type = 'sawtooth'; o2.frequency.value = freq * 1.001;
      const o2g = audioCtx.createGain(); o2g.gain.value = 0.3;
      const vib = audioCtx.createOscillator(); vib.type = 'sine'; vib.frequency.value = 5.5;
      const vibG = audioCtx.createGain(); vibG.gain.value = freq * 0.008;
      vib.connect(vibG); vibG.connect(o1.frequency); vibG.connect(o2.frequency); vib.start(t);
      const lpf = audioCtx.createBiquadFilter(); lpf.type = 'lowpass';
      lpf.frequency.value = Math.min(freq * 5, 4000); lpf.Q.value = 1;
      o1.connect(lpf); o2.connect(o2g); o2g.connect(lpf); lpf.connect(g);
      const bufSz = audioCtx.sampleRate; const nBuf = audioCtx.createBuffer(1, bufSz, audioCtx.sampleRate);
      const nD = nBuf.getChannelData(0);
      for (let i = 0; i < bufSz; i++) nD[i] = (Math.random() * 2 - 1) * 0.08;
      const noise = audioCtx.createBufferSource(); noise.buffer = nBuf; noise.loop = true;
      const nBP = audioCtx.createBiquadFilter(); nBP.type = 'bandpass'; nBP.frequency.value = freq * 3; nBP.Q.value = 2;
      const nG = audioCtx.createGain(); nG.gain.value = vol * 0.1;
      noise.connect(nBP); nBP.connect(nG); nG.connect(g); noise.start(t);
      o1.start(t); o2.start(t);
      g.gain.linearRampToValueAtTime(vol * 0.25, t + 0.04);
      g.gain.setTargetAtTime(vol * 0.2, t + 0.06, 1.5);
      return { gainNode: g, oscillators: [o1, o2, vib], noiseSource: noise, releaseTime: 0.08 };
    }
    case 12: { // Choir
      const vowels = { a: [800, 1150, 2900], e: [400, 1600, 2700], o: [450, 800, 2830] };
      const vowel = ['a','e','o'][Math.floor(Math.random()*3)];
      const formants = vowels[vowel];
      for (let i = 0; i < 4; i++) {
        const osc = audioCtx.createOscillator(); osc.type = 'sawtooth';
        osc.frequency.value = freq + (i - 1.5) * 1.5 + Math.random() * 0.5;
        const vib = audioCtx.createOscillator(); vib.type = 'sine';
        vib.frequency.value = 4 + Math.random() * 2;
        const vibG = audioCtx.createGain(); vibG.gain.value = freq * 0.005;
        vib.connect(vibG); vibG.connect(osc.frequency); vib.start(t);
        osc.connect(g); osc.start(t); oscillators.push(osc, vib);
      }
      formants.forEach((f, i) => {
        const bp = audioCtx.createBiquadFilter(); bp.type = 'peaking';
        bp.frequency.value = f; bp.Q.value = 5 + i * 3; bp.gain.value = 8 - i * 2;
        g.connect(bp); bp.connect(filterNode);
      });
      g.gain.linearRampToValueAtTime(vol * 0.2, t + 0.3);
      g.gain.setTargetAtTime(vol * 0.18, t + 0.4, 2);
      return { gainNode: g, oscillators, releaseTime: 0.5 };
    }
    case 13: { // Pluck Synth
      const o1 = audioCtx.createOscillator(); o1.type = 'sawtooth'; o1.frequency.value = freq;
      const o2 = audioCtx.createOscillator(); o2.type = 'square'; o2.frequency.value = freq * 2;
      const o2g = audioCtx.createGain(); o2g.gain.value = 0.2;
      const lpf = audioCtx.createBiquadFilter(); lpf.type = 'lowpass';
      lpf.frequency.setValueAtTime(freq * 15, t);
      lpf.frequency.exponentialRampToValueAtTime(freq * 1.5, t + 0.15);
      lpf.Q.value = 3;
      o1.connect(lpf); o2.connect(o2g); o2g.connect(lpf); lpf.connect(g);
      o1.start(t); o2.start(t);
      g.gain.linearRampToValueAtTime(vol * 0.5, t + 0.002);
      g.gain.setTargetAtTime(vol * 0.1, t + 0.01, 0.2);
      g.gain.setTargetAtTime(0.001, t + 1, 0.3);
      return { gainNode: g, oscillators: [o1, o2], releaseTime: 0.1 };
    }
    case 14: { // Drums
      return playDrumSound('kick', vol);
    }
  }
  return { gainNode: g, oscillators, releaseTime: 0.3 };
}

// ========== DRUM SOUNDS ==========
function playDrumSound(type, vol = 0.8) {
  initAudio();
  if (audioCtx.state === 'suspended') audioCtx.resume();
  const t = audioCtx.currentTime;
  const g = audioCtx.createGain(); g.connect(filterNode);
  const oscillators = [];

  switch(type) {
    case 'kick': {
      const osc = audioCtx.createOscillator(); osc.type = 'sine';
      osc.frequency.setValueAtTime(160, t);
      osc.frequency.exponentialRampToValueAtTime(35, t + 0.12);
      const sub = audioCtx.createOscillator(); sub.type = 'sine';
      sub.frequency.value = 50;
      const subG = audioCtx.createGain();
      subG.gain.setValueAtTime(vol * 0.6, t);
      subG.gain.exponentialRampToValueAtTime(0.01, t + 0.15);
      sub.connect(subG); subG.connect(g);
      osc.connect(g); osc.start(t); osc.stop(t + 0.3); sub.start(t); sub.stop(t + 0.2);
      g.gain.setValueAtTime(vol, t);
      g.gain.exponentialRampToValueAtTime(0.01, t + 0.3);
      oscillators.push(osc, sub); break;
    }
    case 'snare': {
      const osc = audioCtx.createOscillator(); osc.type = 'sine'; osc.frequency.value = 200;
      osc.connect(g); osc.start(t); osc.stop(t + 0.15);
      const bufSz = audioCtx.sampleRate * 0.2;
      const buf = audioCtx.createBuffer(1, bufSz, audioCtx.sampleRate);
      const data = buf.getChannelData(0);
      for (let i = 0; i < bufSz; i++) data[i] = Math.random() * 2 - 1;
      const noise = audioCtx.createBufferSource(); noise.buffer = buf;
      const ng = audioCtx.createGain();
      ng.gain.setValueAtTime(vol * 0.7, t);
      ng.gain.exponentialRampToValueAtTime(0.01, t + 0.2);
      const hp = audioCtx.createBiquadFilter(); hp.type = 'highpass'; hp.frequency.value = 1000;
      noise.connect(hp); hp.connect(ng); ng.connect(filterNode);
      noise.start(t); noise.stop(t + 0.2);
      g.gain.setValueAtTime(vol * 0.5, t);
      g.gain.exponentialRampToValueAtTime(0.01, t + 0.15);
      oscillators.push(osc); break;
    }
    case 'hihat': {
      const bufSz = audioCtx.sampleRate * 0.08;
      const buf = audioCtx.createBuffer(1, bufSz, audioCtx.sampleRate);
      const data = buf.getChannelData(0);
      for (let i = 0; i < bufSz; i++) data[i] = Math.random() * 2 - 1;
      const noise = audioCtx.createBufferSource(); noise.buffer = buf;
      const hp = audioCtx.createBiquadFilter(); hp.type = 'highpass'; hp.frequency.value = 7000;
      noise.connect(hp); hp.connect(g);
      noise.start(t); noise.stop(t + 0.08);
      g.gain.setValueAtTime(vol * 0.4, t);
      g.gain.exponentialRampToValueAtTime(0.01, t + 0.06);
      break;
    }
    case 'openhat': {
      const bufSz = audioCtx.sampleRate * 0.3;
      const buf = audioCtx.createBuffer(1, bufSz, audioCtx.sampleRate);
      const data = buf.getChannelData(0);
      for (let i = 0; i < bufSz; i++) data[i] = Math.random() * 2 - 1;
      const noise = audioCtx.createBufferSource(); noise.buffer = buf;
      const hp = audioCtx.createBiquadFilter(); hp.type = 'highpass'; hp.frequency.value = 6000;
      noise.connect(hp); hp.connect(g);
      noise.start(t); noise.stop(t + 0.3);
      g.gain.setValueAtTime(vol * 0.35, t);
      g.gain.exponentialRampToValueAtTime(0.01, t + 0.25);
      break;
    }
    case 'tom': {
      const osc = audioCtx.createOscillator(); osc.type = 'sine';
      osc.frequency.setValueAtTime(200, t);
      osc.frequency.exponentialRampToValueAtTime(80, t + 0.2);
      osc.connect(g); osc.start(t); osc.stop(t + 0.3);
      g.gain.setValueAtTime(vol * 0.7, t);
      g.gain.exponentialRampToValueAtTime(0.01, t + 0.25);
      oscillators.push(osc); break;
    }
    case 'crash': {
      const bufSz = audioCtx.sampleRate * 1.5;
      const buf = audioCtx.createBuffer(1, bufSz, audioCtx.sampleRate);
      const data = buf.getChannelData(0);
      for (let i = 0; i < bufSz; i++) data[i] = Math.random() * 2 - 1;
      const noise = audioCtx.createBufferSource(); noise.buffer = buf;
      const bp = audioCtx.createBiquadFilter(); bp.type = 'bandpass'; bp.frequency.value = 5000; bp.Q.value = 0.5;
      noise.connect(bp); bp.connect(g);
      noise.start(t); noise.stop(t + 1.5);
      g.gain.setValueAtTime(vol * 0.5, t);
      g.gain.exponentialRampToValueAtTime(0.01, t + 1.2);
      break;
    }
    case 'clap': {
      for (let i = 0; i < 3; i++) {
        const bufSz = audioCtx.sampleRate * 0.02;
        const buf = audioCtx.createBuffer(1, bufSz, audioCtx.sampleRate);
        const data = buf.getChannelData(0);
        for (let j = 0; j < bufSz; j++) data[j] = Math.random() * 2 - 1;
        const noise = audioCtx.createBufferSource(); noise.buffer = buf;
        const bp = audioCtx.createBiquadFilter(); bp.type = 'bandpass'; bp.frequency.value = 2500; bp.Q.value = 2;
        const cg = audioCtx.createGain();
        cg.gain.setValueAtTime(vol * 0.5, t + i * 0.015);
        cg.gain.exponentialRampToValueAtTime(0.01, t + i * 0.015 + 0.03);
        noise.connect(bp); bp.connect(cg); cg.connect(filterNode);
        noise.start(t + i * 0.015); noise.stop(t + i * 0.015 + 0.05);
      }
      const bufSz = audioCtx.sampleRate * 0.15;
      const buf = audioCtx.createBuffer(1, bufSz, audioCtx.sampleRate);
      const data = buf.getChannelData(0);
      for (let j = 0; j < bufSz; j++) data[j] = Math.random() * 2 - 1;
      const tail = audioCtx.createBufferSource(); tail.buffer = buf;
      const bp2 = audioCtx.createBiquadFilter(); bp2.type = 'bandpass'; bp2.frequency.value = 2500;
      tail.connect(bp2); bp2.connect(g);
      tail.start(t + 0.04); tail.stop(t + 0.2);
      g.gain.setValueAtTime(vol * 0.4, t + 0.04);
      g.gain.exponentialRampToValueAtTime(0.01, t + 0.18);
      break;
    }
    case 'rim': {
      const osc = audioCtx.createOscillator(); osc.type = 'sine';
      osc.frequency.setValueAtTime(800, t);
      osc.frequency.exponentialRampToValueAtTime(400, t + 0.02);
      osc.connect(g); osc.start(t); osc.stop(t + 0.05);
      g.gain.setValueAtTime(vol * 0.6, t);
      g.gain.exponentialRampToValueAtTime(0.01, t + 0.04);
      oscillators.push(osc); break;
    }
  }
  return { gainNode: g, oscillators, releaseTime: 0 };
}

// ========== MODE RENDERING ==========
const WHITE_NOTES = ['C','D','E','F','G','A','B'];
const ALL_NOTES_IN_OCTAVE = ['C','C#','D','D#','E','F','F#','G','G#','A','A#','B'];
const BLACK_NOTE_SET = new Set(['C#','D#','F#','G#','A#']);

function switchMode(mode) {
  currentMode = mode;
  document.querySelectorAll('.mode-tab').forEach(b => b.classList.toggle('active', b.dataset.mode === mode));
  const area = document.getElementById('surface-area');
  area.innerHTML = '';

  switch(mode) {
    case 'piano': buildPianoMode(area); break;
    case 'circle': buildCircleMode(area); break;
    case 'hex': buildHexMode(area); break;
    case 'drumpads': buildDrumPadMode(area); break;
    case 'theremin': buildThereminMode(area); break;
    case 'sequencer': buildSequencerMode(area); break;
    case 'record': buildRecordMode(area); break;
  }
}

// ========== PIANO MODE ==========
function buildPianoMode(area) {
  const container = document.createElement('div');
  container.className = 'keyboard-container';
  area.appendChild(container);

  const startOct = currentOctave;
  const endOct = currentOctave + 1;
  const whiteKeys = [];
  for (let oct = startOct; oct <= endOct; oct++) {
    WHITE_NOTES.forEach(n => whiteKeys.push({ note: n, octave: oct }));
  }
  whiteKeys.push({ note: 'C', octave: endOct + 1 });

  const instColor = INSTRUMENTS[currentInstrument].color;

  whiteKeys.forEach(k => {
    const div = document.createElement('div');
    div.className = 'white-key';
    div.dataset.note = k.note;
    div.dataset.octave = k.octave;
    div.style.width = (100 / whiteKeys.length) + '%';
    const glow = document.createElement('div');
    glow.className = 'key-glow';
    glow.style.background = `linear-gradient(to top, ${instColor}88, transparent)`;
    div.appendChild(glow);
    if (showLabels) {
      const label = document.createElement('span');
      label.className = 'note-label';
      label.textContent = k.note + k.octave;
      div.appendChild(label);
    }
    container.appendChild(div);
  });

  const totalWhite = whiteKeys.length;
  const keyWidth = 100 / totalWhite;
  let whiteIdx = 0;
  for (let oct = startOct; oct <= endOct; oct++) {
    for (let wn = 0; wn < WHITE_NOTES.length; wn++) {
      const sharpNote = WHITE_NOTES[wn] + '#';
      if (BLACK_NOTE_SET.has(sharpNote)) {
        const div = document.createElement('div');
        div.className = 'black-key';
        div.dataset.note = sharpNote;
        div.dataset.octave = oct;
        div.style.left = (whiteIdx + 0.65) * keyWidth + '%';
        div.style.width = keyWidth * 0.7 + '%';
        const glow = document.createElement('div');
        glow.className = 'key-glow';
        glow.style.background = `linear-gradient(to top, ${instColor}88, transparent)`;
        div.appendChild(glow);
        if (showLabels) {
          const label = document.createElement('span');
          label.className = 'note-label';
          label.textContent = sharpNote;
          div.appendChild(label);
        }
        container.appendChild(div);
      }
      whiteIdx++;
    }
  }
  setupKeyboardTouch(container);
}

function setupKeyboardTouch(container) {
  let activeTouches = new Map();
  const instColor = INSTRUMENTS[currentInstrument].color;

  function getKeyFromPoint(x, y) {
    const blacks = container.querySelectorAll('.black-key');
    for (const k of blacks) {
      const r = k.getBoundingClientRect();
      if (x >= r.left && x <= r.right && y >= r.top && y <= r.bottom) return k;
    }
    const whites = container.querySelectorAll('.white-key');
    for (const k of whites) {
      const r = k.getBoundingClientRect();
      if (x >= r.left && x <= r.right && y >= r.top && y <= r.bottom) return k;
    }
    return null;
  }

  function pressKey(el, velocity) {
    if (!el) return;
    el.classList.add('pressed');
    el.style.boxShadow = `0 0 20px ${instColor}`;
    const note = el.dataset.note;
    const oct = parseInt(el.dataset.octave);
    if (currentInstrument === 14) {
      const drumMap = { C:'kick', D:'snare', E:'hihat', F:'tom', G:'crash', A:'clap', B:'rim' };
      playDrumSound(drumMap[note.replace('#','')] || 'kick', velocity);
    } else {
      playNote(note, oct, velocity);
    }
  }

  function releaseKey(el) {
    if (!el) return;
    el.classList.remove('pressed');
    el.style.boxShadow = '';
    const note = el.dataset.note;
    const oct = parseInt(el.dataset.octave);
    if (currentInstrument !== 14) releaseNote(note, oct);
  }

  container.addEventListener('touchstart', e => {
    e.preventDefault(); initAudio();
    for (const touch of e.changedTouches) {
      touchStartTimes.set(touch.identifier, performance.now());
      const el = getKeyFromPoint(touch.clientX, touch.clientY);
      if (el) {
        activeTouches.set(touch.identifier, el);
        const vel = getVelocity(touch.identifier);
        pressKey(el, vel);
      }
    }
  }, { passive: false });

  container.addEventListener('touchmove', e => {
    e.preventDefault();
    for (const touch of e.changedTouches) {
      const el = getKeyFromPoint(touch.clientX, touch.clientY);
      const prev = activeTouches.get(touch.identifier);
      if (el !== prev) {
        if (prev) releaseKey(prev);
        if (el) { activeTouches.set(touch.identifier, el); pressKey(el, 0.8); }
        else activeTouches.delete(touch.identifier);
      }
    }
  }, { passive: false });

  container.addEventListener('touchend', e => {
    e.preventDefault();
    for (const touch of e.changedTouches) {
      const el = activeTouches.get(touch.identifier);
      if (el) releaseKey(el);
      activeTouches.delete(touch.identifier);
      touchStartTimes.delete(touch.identifier);
    }
  }, { passive: false });

  container.addEventListener('touchcancel', e => {
    for (const touch of e.changedTouches) {
      const el = activeTouches.get(touch.identifier);
      if (el) releaseKey(el);
      activeTouches.delete(touch.identifier);
      touchStartTimes.delete(touch.identifier);
    }
  });

  let mouseDown = false, mouseKey = null;
  container.addEventListener('mousedown', e => {
    e.preventDefault(); initAudio();
    mouseDown = true;
    const el = getKeyFromPoint(e.clientX, e.clientY);
    if (el) { mouseKey = el; pressKey(el, 1.0); }
  });
  container.addEventListener('mousemove', e => {
    if (!mouseDown) return;
    const el = getKeyFromPoint(e.clientX, e.clientY);
    if (el !== mouseKey) {
      if (mouseKey) releaseKey(mouseKey);
      if (el) pressKey(el, 0.8);
      mouseKey = el;
    }
  });
  document.addEventListener('mouseup', () => {
    if (mouseKey) releaseKey(mouseKey);
    mouseDown = false; mouseKey = null;
  });
}

// ========== CIRCLE PAD MODE ==========
function buildCircleMode(area) {
  const wrap = document.createElement('div');
  wrap.className = 'circle-pad-area';
  area.appendChild(wrap);

  const svg = document.createElementNS('http://www.w3.org/2000/svg', 'svg');
  svg.classList.add('circle-pad-svg');

  // Dynamically size based on container
  const rect = area.getBoundingClientRect();
  const size = Math.min(rect.width, rect.height) || 400;
  const cx = size / 2, cy = size / 2;
  svg.setAttribute('viewBox', `0 0 ${size} ${size}`);

  const notes = ALL_NOTES_IN_OCTAVE;
  // Circle radius scaled to container; pads sized large
  const padR = Math.max(size * 0.06, 22); // at least 22, scales up
  const rings = [
    { r: size * 0.22, oct: currentOctave, padR: padR },
    { r: size * 0.40, oct: currentOctave + 1, padR: padR * 1.1 }
  ];

  const instColor = INSTRUMENTS[currentInstrument].color;

  rings.forEach(ring => {
    notes.forEach((note, i) => {
      const angle = (i / 12) * Math.PI * 2 - Math.PI / 2;
      const px = cx + Math.cos(angle) * ring.r;
      const py = cy + Math.sin(angle) * ring.r;
      const isBlack = note.includes('#');

      const g = document.createElementNS('http://www.w3.org/2000/svg', 'g');
      g.classList.add('circle-note');
      g.dataset.note = note;
      g.dataset.octave = ring.oct;

      const circle = document.createElementNS('http://www.w3.org/2000/svg', 'circle');
      circle.setAttribute('cx', px);
      circle.setAttribute('cy', py);
      circle.setAttribute('r', ring.padR);
      circle.setAttribute('fill', isBlack ? '#1a1a2e' : '#1e293b');
      circle.setAttribute('stroke', isBlack ? '#4a4a6a' : '#334155');
      circle.setAttribute('stroke-width', '2');
      g.appendChild(circle);

      if (showLabels) {
        const text = document.createElementNS('http://www.w3.org/2000/svg', 'text');
        text.setAttribute('x', px);
        text.setAttribute('y', py);
        text.setAttribute('font-size', Math.max(ring.padR * 0.55, 10));
        text.textContent = note + ring.oct;
        g.appendChild(text);
      }
      svg.appendChild(g);
    });
  });

  // Center label
  const ct = document.createElementNS('http://www.w3.org/2000/svg', 'text');
  ct.setAttribute('x', cx); ct.setAttribute('y', cy);
  ct.setAttribute('text-anchor', 'middle'); ct.setAttribute('dominant-baseline', 'central');
  ct.setAttribute('fill', instColor); ct.setAttribute('font-size', Math.max(size * 0.035, 12));
  ct.setAttribute('font-family', 'var(--font)'); ct.setAttribute('font-weight', '600');
  ct.textContent = INSTRUMENTS[currentInstrument].short;
  svg.appendChild(ct);

  wrap.appendChild(svg);
  setupSVGPadEvents(svg, '.circle-note', 'circle', instColor);
}

// ========== HEX GRID MODE ==========
function buildHexMode(area) {
  const wrap = document.createElement('div');
  wrap.className = 'hex-grid-area';
  area.appendChild(wrap);

  const svg = document.createElementNS('http://www.w3.org/2000/svg', 'svg');
  svg.classList.add('hex-grid-svg');

  const rect = area.getBoundingClientRect();
  const w = rect.width || 600;
  const h = rect.height || 400;

  // Calculate hex size to fill the area well
  const cols = 10;
  const rows = 5;
  const hexR = Math.min(w / (cols * 1.85 + 1), h / (rows * 1.6 + 1));
  const clampedR = Math.max(hexR, 18); // minimum 18px radius
  const hexW = clampedR * Math.sqrt(3);
  const hexH = clampedR * 2;

  const totalW = cols * hexW + hexW / 2 + clampedR * 2;
  const totalH = rows * (hexH * 0.75) + hexH * 0.25 + clampedR;
  svg.setAttribute('viewBox', `0 0 ${totalW} ${totalH}`);

  const instColor = INSTRUMENTS[currentInstrument].color;

  for (let row = 0; row < rows; row++) {
    for (let col = 0; col < cols; col++) {
      const x = clampedR + col * hexW + (row % 2 ? hexW / 2 : 0);
      const y = totalH - clampedR - row * (hexH * 0.75);
      const semitones = (rows - 1 - row) * 5 + col;
      const noteIdx = semitones % 12;
      const oct = currentOctave + Math.floor(semitones / 12);
      if (oct > 8) continue;
      const note = ALL_NOTES_IN_OCTAVE[noteIdx];
      const isBlack = note.includes('#');

      const g = document.createElementNS('http://www.w3.org/2000/svg', 'g');
      g.classList.add('hex-cell');
      g.dataset.note = note;
      g.dataset.octave = oct;

      let points = '';
      for (let i = 0; i < 6; i++) {
        const angle = Math.PI / 6 + (Math.PI / 3) * i;
        const px = x + clampedR * Math.cos(angle);
        const py = y + clampedR * Math.sin(angle);
        points += `${px},${py} `;
      }
      const polygon = document.createElementNS('http://www.w3.org/2000/svg', 'polygon');
      polygon.setAttribute('points', points.trim());
      polygon.setAttribute('fill', isBlack ? '#1a1a2e' : '#1e293b');
      polygon.setAttribute('stroke', '#334155');
      polygon.setAttribute('stroke-width', '1.5');
      g.appendChild(polygon);

      if (showLabels) {
        const text = document.createElementNS('http://www.w3.org/2000/svg', 'text');
        text.setAttribute('x', x); text.setAttribute('y', y);
        text.setAttribute('font-size', Math.max(clampedR * 0.5, 9));
        text.textContent = note.replace('#', '#');
        g.appendChild(text);
      }
      svg.appendChild(g);
    }
  }

  wrap.appendChild(svg);
  setupSVGPadEvents(svg, '.hex-cell', 'polygon', instColor);
}

// ========== SHARED SVG PAD EVENTS ==========
function setupSVGPadEvents(svg, selector, shapeTag, instColor) {
  const noteEls = svg.querySelectorAll(selector);
  let activeTouches = new Map();

  function pressEl(el, velocity) {
    if (!el) return;
    el.classList.add('pressed');
    // Glow the shape
    const shape = el.querySelector(shapeTag);
    if (shape) {
      shape.setAttribute('fill', instColor);
      shape.setAttribute('stroke', instColor);
    }
    const note = el.dataset.note, oct = parseInt(el.dataset.octave);
    if (currentInstrument === 14) {
      const drumMap = { C:'kick', D:'snare', E:'hihat', F:'tom', G:'crash', A:'clap', B:'rim' };
      playDrumSound(drumMap[note.replace('#','')] || 'kick', velocity);
    } else playNote(note, oct, velocity);
  }

  function releaseEl(el) {
    if (!el) return;
    el.classList.remove('pressed');
    const note = el.dataset.note;
    const isBlack = note.includes('#');
    const shape = el.querySelector(shapeTag);
    if (shape) {
      shape.setAttribute('fill', isBlack ? '#1a1a2e' : '#1e293b');
      shape.setAttribute('stroke', isBlack ? '#4a4a6a' : '#334155');
    }
    const oct = parseInt(el.dataset.octave);
    if (currentInstrument !== 14) releaseNote(note, oct);
  }

  function getElFromPoint(x, y) {
    const pt = svg.createSVGPoint();
    pt.x = x; pt.y = y;
    let svgPt;
    try { svgPt = pt.matrixTransform(svg.getScreenCTM().inverse()); } catch(e) { return null; }
    let closest = null, closestDist = Infinity;
    noteEls.forEach(el => {
      const shape = el.querySelector(shapeTag);
      if (!shape) return;
      let cx, cy, hitR;
      if (shapeTag === 'circle') {
        cx = parseFloat(shape.getAttribute('cx'));
        cy = parseFloat(shape.getAttribute('cy'));
        hitR = parseFloat(shape.getAttribute('r')) * 1.15; // slightly expanded hit area
      } else {
        // polygon center
        const pts = shape.getAttribute('points').split(' ').filter(Boolean);
        cx = 0; cy = 0;
        pts.forEach(p => { const [px, py] = p.split(',').map(Number); cx += px; cy += py; });
        cx /= pts.length; cy /= pts.length;
        hitR = 30; // approximate
      }
      const dist = Math.hypot(svgPt.x - cx, svgPt.y - cy);
      if (dist < hitR && dist < closestDist) { closest = el; closestDist = dist; }
    });
    return closest;
  }

  svg.addEventListener('touchstart', e => {
    e.preventDefault(); initAudio();
    for (const touch of e.changedTouches) {
      touchStartTimes.set(touch.identifier, performance.now());
      const el = getElFromPoint(touch.clientX, touch.clientY);
      if (el) { activeTouches.set(touch.identifier, el); pressEl(el, getVelocity(touch.identifier)); }
    }
  }, { passive: false });

  svg.addEventListener('touchmove', e => {
    e.preventDefault();
    for (const touch of e.changedTouches) {
      const el = getElFromPoint(touch.clientX, touch.clientY);
      const prev = activeTouches.get(touch.identifier);
      if (el !== prev) {
        if (prev) releaseEl(prev);
        if (el) { activeTouches.set(touch.identifier, el); pressEl(el, 0.8); }
        else activeTouches.delete(touch.identifier);
      }
    }
  }, { passive: false });

  svg.addEventListener('touchend', e => {
    e.preventDefault();
    for (const touch of e.changedTouches) {
      const el = activeTouches.get(touch.identifier);
      if (el) releaseEl(el);
      activeTouches.delete(touch.identifier);
      touchStartTimes.delete(touch.identifier);
    }
  }, { passive: false });

  svg.addEventListener('touchcancel', e => {
    for (const touch of e.changedTouches) {
      const el = activeTouches.get(touch.identifier);
      if (el) releaseEl(el);
      activeTouches.delete(touch.identifier);
    }
  });

  let mouseDown = false, mouseEl = null;
  svg.addEventListener('mousedown', e => {
    e.preventDefault(); initAudio();
    mouseDown = true;
    const el = getElFromPoint(e.clientX, e.clientY);
    if (el) { mouseEl = el; pressEl(el, 1.0); }
  });
  svg.addEventListener('mousemove', e => {
    if (!mouseDown) return;
    const el = getElFromPoint(e.clientX, e.clientY);
    if (el !== mouseEl) {
      if (mouseEl) releaseEl(mouseEl);
      if (el) pressEl(el, 0.8);
      mouseEl = el;
    }
  });
  document.addEventListener('mouseup', () => {
    if (mouseEl) releaseEl(mouseEl);
    mouseDown = false; mouseEl = null;
  });
}

function buildDrumPadMode(area) {

  DRUM_PAD_CONFIG.forEach(cfg => {
    const pad = document.createElement('div');

    pad.style.borderColor = cfg.color;
    pad.style.background = `radial-gradient(circle at 40% 40%, ${cfg.color}22, ${cfg.color}08)`;
