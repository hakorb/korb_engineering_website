function setupDrumPadEvents(grid) {
  const pads = grid.querySelectorAll('.drum-pad');
  let activeTouches = new Map();

  function getPadFromPoint(x, y) {
    for (const pad of pads) {
      const r = pad.getBoundingClientRect();
      if (x >= r.left && x <= r.right && y >= r.top && y <= r.bottom) return pad;
    }
    return null;
  }

  function pressPad(el, velocity) {
    if (!el) return;
    el.classList.add('pressed');
    playDrumSound(el.dataset.drum, velocity || 0.8);
    // Auto-release visual after 150ms
    setTimeout(() => el.classList.remove('pressed'), 150);
  }

  grid.addEventListener('touchstart', e => {
    e.preventDefault(); initAudio();
    for (const touch of e.changedTouches) {
      touchStartTimes.set(touch.identifier, performance.now());
      const el = getPadFromPoint(touch.clientX, touch.clientY);
      if (el) {
        activeTouches.set(touch.identifier, el);
        pressPad(el, getVelocity(touch.identifier));
      }
    }
  }, { passive: false });

  grid.addEventListener('touchmove', e => {
    e.preventDefault();
    for (const touch of e.changedTouches) {
      const el = getPadFromPoint(touch.clientX, touch.clientY);
      const prev = activeTouches.get(touch.identifier);
      if (el && el !== prev) {
        activeTouches.set(touch.identifier, el);
        pressPad(el, 0.7);
      }
    }
  }, { passive: false });

  grid.addEventListener('touchend', e => {
    e.preventDefault();
    for (const touch of e.changedTouches) {
      activeTouches.delete(touch.identifier);
      touchStartTimes.delete(touch.identifier);
    }
  }, { passive: false });

  let mouseDown = false;
  grid.addEventListener('mousedown', e => {
    e.preventDefault(); initAudio(); mouseDown = true;
    const el = getPadFromPoint(e.clientX, e.clientY);
    if (el) pressPad(el, 1.0);
  });
  grid.addEventListener('mousemove', e => {
    // No drag-play for drum pads
  });
  document.addEventListener('mouseup', () => { mouseDown = false; });
}

// ========== THEREMIN MODE ==========
let thereminOsc = null, thereminGain = null, thereminVibLfo = null, thereminVibGain = null;
let thereminActive = false;
let thereminTrail = [];

function buildThereminMode(area) {
  const wrap = document.createElement('div');
  wrap.className = 'theremin-wrap';
  wrap.innerHTML = `
    <div class="theremin-info-bar">
      <span class="freq" id="theremin-freq">-- Hz</span>
      <span class="note-name" id="theremin-note">--</span>
      <span class="vol-info" id="theremin-vol">--</span>
    </div>
    <div class="theremin-pad" id="theremin-pad">
      <div class="antenna-left"></div>
      <div class="antenna-right"></div>
      <canvas id="theremin-canvas"></canvas>
      <div class="theremin-crosshair" id="theremin-crosshair" style="display:none">
        <div class="h-line"></div>
        <div class="v-line"></div>
        <div class="dot"></div>
      </div>
    </div>
  `;
  area.appendChild(wrap);
  setupTheremin();
}

function initTheremin() {
  initAudio();
  if (thereminOsc) return;
  thereminOsc = audioCtx.createOscillator();
  thereminOsc.type = document.getElementById('theremin-wave').value;
  thereminOsc.frequency.value = 440;

  const sub = audioCtx.createOscillator();
  sub.type = 'sine';
  sub.frequency.value = 220;

  thereminGain = audioCtx.createGain();
  thereminGain.gain.value = 0;
  thereminGain.connect(filterNode);

  const subGain = audioCtx.createGain();
  subGain.gain.value = 0.15;
  sub.connect(subGain);
  subGain.connect(thereminGain);

  thereminVibLfo = audioCtx.createOscillator();
  thereminVibLfo.type = 'sine';
  thereminVibLfo.frequency.value = 5.5;
  thereminVibGain = audioCtx.createGain();
  thereminVibGain.gain.value = 0;
  thereminVibLfo.connect(thereminVibGain);
  thereminVibGain.connect(thereminOsc.frequency);
  thereminVibGain.connect(sub.frequency);

  thereminOsc.connect(thereminGain);
  thereminOsc.start();
  sub.start();
  thereminVibLfo.start();

  thereminOsc._sub = sub;
  thereminOsc._subGain = subGain;
}

function updateTheremin(x, y, padRect) {
  if (!thereminOsc || !thereminGain) return;
  const normX = Math.max(0, Math.min(1, (x - padRect.left) / padRect.width));
  const normY = Math.max(0, Math.min(1, 1 - (y - padRect.top) / padRect.height));

  const rangeOct = parseInt(document.getElementById('theremin-range').value);
  const baseFreq = NOTE_FREQS['C' + currentOctave] || 261.63;
  const freq = baseFreq * Math.pow(2, normX * rangeOct);

  const glide = parseInt(document.getElementById('theremin-glide').value) / 100;
  const glideTime = glide * 0.15;
  const vol = normY * parseFloat(document.getElementById('master-vol').value) / 100;

  thereminOsc.frequency.setTargetAtTime(freq, audioCtx.currentTime, Math.max(0.001, glideTime));
  if (thereminOsc._sub) {
    thereminOsc._sub.frequency.setTargetAtTime(freq / 2, audioCtx.currentTime, Math.max(0.001, glideTime));
  }
  thereminGain.gain.setTargetAtTime(vol * 0.4, audioCtx.currentTime, 0.02);

  const vibAmount = parseInt(document.getElementById('theremin-vibrato').value) / 100;
  thereminVibGain.gain.setTargetAtTime(freq * vibAmount * 0.02, audioCtx.currentTime, 0.02);

  const freqEl = document.getElementById('theremin-freq');
  const noteEl = document.getElementById('theremin-note');
  const volEl = document.getElementById('theremin-vol');
  if (freqEl) freqEl.textContent = Math.round(freq) + ' Hz';
  if (noteEl) noteEl.textContent = freqToNoteName(freq);
  if (volEl) volEl.textContent = Math.round(normY * 100) + '%';

  const ch = document.getElementById('theremin-crosshair');
  if (ch) {
    ch.style.display = 'block';
    ch.style.left = (x - padRect.left) + 'px';
    ch.style.top = (y - padRect.top) + 'px';
  }

  thereminTrail.push({ x: normX, y: normY, t: Date.now() });
  if (thereminTrail.length > 200) thereminTrail.shift();
}

function stopTheremin() {
  if (thereminGain) {
    thereminGain.gain.setTargetAtTime(0, audioCtx.currentTime, 0.05);
  }
  thereminActive = false;
  const ch = document.getElementById('theremin-crosshair');
  if (ch) ch.style.display = 'none';
  const freqEl = document.getElementById('theremin-freq');
  const noteEl = document.getElementById('theremin-note');
  const volEl = document.getElementById('theremin-vol');
  if (freqEl) freqEl.textContent = '-- Hz';
  if (noteEl) noteEl.textContent = '--';
  if (volEl) volEl.textContent = '--';
}

function setupTheremin() {
  const pad = document.getElementById('theremin-pad');
  if (!pad) return;

  pad.addEventListener('mousedown', e => {
    e.preventDefault();
    initTheremin();
    thereminActive = true;
    thereminOsc.type = document.getElementById('theremin-wave').value;
    updateTheremin(e.clientX, e.clientY, pad.getBoundingClientRect());
  });
  document.addEventListener('mousemove', e => {
    if (!thereminActive) return;
    const pad = document.getElementById('theremin-pad');
    if (pad) updateTheremin(e.clientX, e.clientY, pad.getBoundingClientRect());
  });
  document.addEventListener('mouseup', () => {
    if (thereminActive) stopTheremin();
  });

  pad.addEventListener('touchstart', e => {
    e.preventDefault();
    initTheremin();
    thereminActive = true;
    thereminOsc.type = document.getElementById('theremin-wave').value;
    const touch = e.touches[0];
    updateTheremin(touch.clientX, touch.clientY, pad.getBoundingClientRect());
  }, { passive: false });
  pad.addEventListener('touchmove', e => {
    e.preventDefault();
    if (!thereminActive) return;
    const touch = e.touches[0];
    const pad = document.getElementById('theremin-pad');
    if (pad) updateTheremin(touch.clientX, touch.clientY, pad.getBoundingClientRect());
  }, { passive: false });
  pad.addEventListener('touchend', e => {
    e.preventDefault();
    if (thereminActive) stopTheremin();
  }, { passive: false });

  document.getElementById('theremin-wave').addEventListener('change', function() {
    if (thereminOsc) thereminOsc.type = this.value;
  });

  drawThereminCanvas();
}

function drawThereminCanvas() {
  const canvas = document.getElementById('theremin-canvas');
  if (!canvas) return;
  const ctx = canvas.getContext('2d');
  const dpr = window.devicePixelRatio || 1;

  function draw() {
    if (!document.getElementById('theremin-canvas')) return; // stop if mode changed
    requestAnimationFrame(draw);
    canvas.width = canvas.clientWidth * dpr;
    canvas.height = canvas.clientHeight * dpr;
    ctx.scale(dpr, dpr);
    const w = canvas.clientWidth, h = canvas.clientHeight;
    ctx.clearRect(0, 0, w, h);

    ctx.strokeStyle = 'rgba(0,212,255,0.05)';
    ctx.lineWidth = 0.5;
    for (let i = 0; i < 12; i++) {
      const x = (i / 12) * w;
      ctx.beginPath(); ctx.moveTo(x, 0); ctx.lineTo(x, h); ctx.stroke();
    }
    for (let i = 0; i < 5; i++) {
      const y = (i / 5) * h;
      ctx.beginPath(); ctx.moveTo(0, y); ctx.lineTo(w, y); ctx.stroke();
    }

    const now = Date.now();
    thereminTrail = thereminTrail.filter(p => now - p.t < 3000);
    if (thereminTrail.length > 1) {
      ctx.lineWidth = 2;
      ctx.lineCap = 'round';
      for (let i = 1; i < thereminTrail.length; i++) {
        const p = thereminTrail[i];
        const pp = thereminTrail[i - 1];
        const age = (now - p.t) / 3000;
        const alpha = (1 - age) * 0.6;
        ctx.strokeStyle = `rgba(255,102,0,${alpha})`;
        ctx.beginPath();
        ctx.moveTo(pp.x * w, (1 - pp.y) * h);
        ctx.lineTo(p.x * w, (1 - p.y) * h);
        ctx.stroke();
      }
    }

    if (thereminActive && thereminTrail.length > 0) {
      const last = thereminTrail[thereminTrail.length - 1];
      const grd = ctx.createRadialGradient(last.x * w, (1 - last.y) * h, 0, last.x * w, (1 - last.y) * h, 60);
      grd.addColorStop(0, 'rgba(0,212,255,0.15)');
      grd.addColorStop(1, 'rgba(0,212,255,0)');
      ctx.fillStyle = grd;
      ctx.fillRect(0, 0, w, h);
    }
  }
  draw();
}

function buildSequencerMode(area) {
  const panel = document.createElement('div');
  panel.className = 'seq-panel';
  panel.innerHTML = `
    <div class="seq-controls">
      <button class="seq-btn" id="seq-play">&#9654; Play</button>
      <button class="seq-btn" id="seq-stop">&#9632; Stop</button>
      <button class="seq-btn" id="seq-clear">Clear</button>
      <label style="font-size:11px;color:var(--text);margin-left:4px;">BPM:</label>
      <input type="number" id="bpm-input" value="${drumBPM}" min="60" max="240" style="width:60px;font-family:var(--font);font-size:16px;background:var(--surface2);color:var(--text);border:1px solid var(--border);border-radius:6px;padding:4px 6px;min-height:36px;">
      <div style="display:flex;gap:3px;margin-left:auto;">
        ${Object.keys(DRUM_PRESETS).map(p => `<button class="seq-btn preset" data-preset="${p}">${p}</button>`).join('')}
      </div>
    </div>
    <div class="seq-grid-wrap">
      <div class="seq-grid" id="seq-grid"></div>
    </div>
  `;
  area.appendChild(panel);

  const grid = document.getElementById('seq-grid');
  DRUM_TYPES.forEach((type, row) => {
    const label = document.createElement('div');
    label.className = 'seq-label';
    label.textContent = DRUM_LABELS[row];
    label.addEventListener('click', () => playDrumSound(type));
    grid.appendChild(label);
    for (let col = 0; col < 16; col++) {
      const cell = document.createElement('div');
      cell.className = 'seq-cell' + (drumPattern[row][col] ? ' on' : '');
      cell.dataset.row = row; cell.dataset.col = col;
      cell.addEventListener('click', () => {
        drumPattern[row][col] = !drumPattern[row][col];
        cell.classList.toggle('on');
      });
      grid.appendChild(cell);
    }
  });

  document.getElementById('seq-play').addEventListener('click', startDrumSequencer);
  document.getElementById('seq-stop').addEventListener('click', stopDrumSequencer);
  document.getElementById('seq-clear').addEventListener('click', () => {
    drumPattern = Array.from({ length: 8 }, () => new Array(16).fill(false));
    document.querySelectorAll('.seq-cell').forEach(c => c.classList.remove('on'));
  });
  document.getElementById('bpm-input').addEventListener('change', function() {
    drumBPM = Math.max(60, Math.min(240, parseInt(this.value) || 120));
    this.value = drumBPM;
    if (drumPlaying) { stopDrumSequencer(); startDrumSequencer(); }
  });
  document.querySelectorAll('.seq-btn.preset').forEach(btn => {
    btn.addEventListener('click', function() {
      const preset = DRUM_PRESETS[this.dataset.preset];
      if (!preset) return;
      drumPattern = preset.map(r => [...r.map(v => !!v)]);
      document.querySelectorAll('.seq-cell').forEach(cell => {
        const r = parseInt(cell.dataset.row), c = parseInt(cell.dataset.col);
        cell.classList.toggle('on', drumPattern[r] && drumPattern[r][c]);
      });
    });
  });
}

function startDrumSequencer() {
  initAudio();
  if (drumPlaying) return;
  drumPlaying = true;
  drumStep = 0;
  const playBtn = document.getElementById('seq-play');
  if (playBtn) playBtn.classList.add('active');
  function tick() {
    document.querySelectorAll('.seq-cell.current').forEach(c => c.classList.remove('current'));
    document.querySelectorAll(`.seq-cell[data-col="${drumStep}"]`).forEach(c => c.classList.add('current'));
    DRUM_TYPES.forEach((type, row) => {
      if (drumPattern[row] && drumPattern[row][drumStep]) playDrumSound(type);
    });
    drumStep = (drumStep + 1) % 16;
    if (drumPlaying) drumTimer = setTimeout(tick, (60 / drumBPM) * 1000 / 4);
  }
  tick();
}

function stopDrumSequencer() {
  drumPlaying = false;
  if (drumTimer) clearTimeout(drumTimer);
  const playBtn = document.getElementById('seq-play');
  if (playBtn) playBtn.classList.remove('active');
  document.querySelectorAll('.seq-cell.current').forEach(c => c.classList.remove('current'));
}

// ========== RECORD MODE ==========
let mediaRecorder = null;
let recordedChunks = [];
let isRecording = false;
let recStartTime = 0;
let recTimerInterval = null;

function buildRecordMode(area) {
  const panel = document.createElement('div');
  panel.className = 'rec-panel';
  panel.innerHTML = `
    <div class="rec-controls-bar">
      <button class="rec-btn" id="rec-toggle">&#9679;</button>
      <span class="rec-timer" id="rec-timer">00:00</span>
      <button class="rec-dl-btn" id="rec-download" disabled>Download</button>
    </div>
    <canvas id="rec-canvas"></canvas>
    <h3 style="font-size:12px;color:var(--cyan);margin:8px 12px 4px;font-weight:500;">Recordings</h3>
    <div class="rec-library" id="rec-library"></div>
  `;
  area.appendChild(panel);
  document.getElementById('rec-toggle').addEventListener('click', toggleRecording);
  document.getElementById('rec-download').addEventListener('click', downloadLastRecording);
  loadRecordings();
}

function toggleRecording() {
  initAudio();
  const btn = document.getElementById('rec-toggle');
  if (!isRecording) {
    recordedChunks = [];
    try { mediaRecorder = new MediaRecorder(mediaStreamDest.stream, { mimeType: 'audio/webm;codecs=opus' }); }
    catch(e) { mediaRecorder = new MediaRecorder(mediaStreamDest.stream); }
    mediaRecorder.ondataavailable = e => { if (e.data.size > 0) recordedChunks.push(e.data); };
    mediaRecorder.onstop = () => {
      const blob = new Blob(recordedChunks, { type: mediaRecorder.mimeType || 'audio/webm' });
      saveRecording(blob);
      const dlBtn = document.getElementById('rec-download');
      if (dlBtn) dlBtn.disabled = false;
    };
    mediaRecorder.start(100);
    isRecording = true;
    recStartTime = Date.now();
    btn.classList.add('recording');
    recTimerInterval = setInterval(updateRecTimer, 100);
    drawRecWaveform();
  } else {
    mediaRecorder.stop();
    isRecording = false;
    btn.classList.remove('recording');
    clearInterval(recTimerInterval);
  }
}

function updateRecTimer() {
  const elapsed = Math.floor((Date.now() - recStartTime) / 1000);
  const mins = String(Math.floor(elapsed / 60)).padStart(2, '0');
  const secs = String(elapsed % 60).padStart(2, '0');
  const el = document.getElementById('rec-timer');
  if (el) el.textContent = mins + ':' + secs;
  if (elapsed >= 600 && isRecording) toggleRecording();
}

function drawRecWaveform() {
  if (!isRecording) return;
  const canvas = document.getElementById('rec-canvas');
  if (!canvas) return;
  const ctx = canvas.getContext('2d');
  const dpr = window.devicePixelRatio || 1;
  canvas.width = canvas.clientWidth * dpr;
  canvas.height = canvas.clientHeight * dpr;
  ctx.scale(dpr, dpr);
  const w = canvas.clientWidth, h = canvas.clientHeight;
  if (!analyser) { requestAnimationFrame(drawRecWaveform); return; }
  const bufLen = analyser.fftSize;
  const data = new Uint8Array(bufLen);
  analyser.getByteTimeDomainData(data);
  ctx.fillStyle = '#0a1018';
  ctx.fillRect(0, 0, w, h);
  ctx.lineWidth = 1.5;
  ctx.strokeStyle = '#00d4ff';
  ctx.beginPath();
  const sliceW = w / bufLen;
  let x = 0;
  for (let i = 0; i < bufLen; i++) {
    const v = data[i] / 128;
    const y = (v * h) / 2;
    if (i === 0) ctx.moveTo(x, y); else ctx.lineTo(x, y);
    x += sliceW;
  }
  ctx.stroke();
  requestAnimationFrame(drawRecWaveform);
}

async function saveRecording(blob) {
  const name = 'Recording ' + new Date().toLocaleTimeString();
  const dur = Math.floor((Date.now() - recStartTime) / 1000);
  try {
    const db = await openDB();
    const tx = db.transaction('recordings', 'readwrite');
    const store = tx.objectStore('recordings');
    const countReq = store.count();
    countReq.onsuccess = () => {
      if (countReq.result >= 10) {
        const cursor = store.openCursor();
        cursor.onsuccess = e => { if (e.target.result) e.target.result.delete(); };
      }
    };
    store.add({ name, duration: dur, date: Date.now(), blob });
    tx.oncomplete = () => loadRecordings();
  } catch(e) { console.error('IndexedDB save error:', e); }
}

function openDB() {
  return new Promise((resolve, reject) => {
    const req = indexedDB.open('AJSynthRecordings', 1);
    req.onupgradeneeded = e => {
      const db = e.target.result;
      if (!db.objectStoreNames.contains('recordings')) {
        db.createObjectStore('recordings', { keyPath: 'date' });
      }
    };
    req.onsuccess = e => resolve(e.target.result);
    req.onerror = e => reject(e.target.error);
  });
}

async function loadRecordings() {
  const lib = document.getElementById('rec-library');
  if (!lib) return;
  lib.innerHTML = '';
  try {
    const db = await openDB();
    const tx = db.transaction('recordings', 'readonly');
    const req = tx.objectStore('recordings').getAll();
    req.onsuccess = () => {
      const recs = req.result.sort((a, b) => b.date - a.date);
      if (recs.length === 0) {
        lib.innerHTML = '<div style="font-size:12px;color:var(--text);opacity:0.5;padding:4px;">No recordings yet</div>';
        return;
      }
      recs.forEach(rec => {
        const div = document.createElement('div');
        div.className = 'rec-item';
        const mins = String(Math.floor(rec.duration / 60)).padStart(2, '0');
        const secs = String(rec.duration % 60).padStart(2, '0');
        div.innerHTML = `
          <span class="rec-name">${rec.name}</span>
          <span class="rec-dur">${mins}:${secs}</span>
          <button data-action="play" data-date="${rec.date}">Play</button>
          <button data-action="dl" data-date="${rec.date}">DL</button>
          <button data-action="del" data-date="${rec.date}" style="color:var(--red);">X</button>
        `;
        div.addEventListener('click', e => {
          const btn = e.target.closest('button');
          if (!btn) return;
          const date = parseInt(btn.dataset.date);
          if (btn.dataset.action === 'play') playRecording(date);
          else if (btn.dataset.action === 'dl') downloadRecording(date);
          else if (btn.dataset.action === 'del') deleteRecording(date);
        });
        lib.appendChild(div);
      });
    };
  } catch(e) {}
}

let playbackAudio = null;
async function playRecording(date) {
  if (playbackAudio) { playbackAudio.pause(); playbackAudio = null; }
  const db = await openDB();
  const tx = db.transaction('recordings', 'readonly');
  const req = tx.objectStore('recordings').get(date);
  req.onsuccess = () => {
    if (!req.result) return;
    const url = URL.createObjectURL(req.result.blob);
    playbackAudio = new Audio(url);
    playbackAudio.play();
  };
}

async function downloadRecording(date) {
  const db = await openDB();
  const tx = db.transaction('recordings', 'readonly');
  const req = tx.objectStore('recordings').get(date);
  req.onsuccess = () => {
    if (!req.result) return;
    const url = URL.createObjectURL(req.result.blob);
    const a = document.createElement('a');
    a.href = url; a.download = req.result.name.replace(/[^a-zA-Z0-9]/g, '_') + '.webm';
    a.click();
  };
}

function downloadLastRecording() {
  if (recordedChunks.length === 0) return;
  const blob = new Blob(recordedChunks, { type: 'audio/webm' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url; a.download = 'ajs_synth_recording.webm'; a.click();
}

async function deleteRecording(date) {
  const db = await openDB();
  const tx = db.transaction('recordings', 'readwrite');
  tx.objectStore('recordings').delete(date);
  tx.oncomplete = () => loadRecordings();
}

// ========== ARPEGGIATOR ==========
let arpTimer = null;
let arpNotes = [];
let arpIndex = 0;
let arpDirection = 1;
let arpCurrentNote = null;

function handleArpNote(note, octave) {
  const mode = document.getElementById('arp-mode').value;
  if (mode === 'off') return;
}

function startArpeggiator() {
  stopArpeggiator();
  const mode = document.getElementById('arp-mode').value;
  if (mode === 'off') return;

  const bpm = parseInt(document.getElementById('arp-bpm').value) || 140;
  const steps = parseInt(document.getElementById('arp-steps').value) || 1;

  const intervals = [0, 2, 4, 5, 7, 9, 11];
  const scaleNotes = [];
  for (let s = 0; s < steps; s++) {
    intervals.forEach(int => {
      const noteIdx = (int) % 12;
      scaleNotes.push({ note: ALL_NOTES_IN_OCTAVE[noteIdx], octave: currentOctave + s });
    });
  }

  arpNotes = scaleNotes;
  arpIndex = 0;
  arpDirection = 1;

  function tick() {
    if (arpNotes.length === 0) return;
    if (arpCurrentNote) {
      releaseNote(arpCurrentNote.note, arpCurrentNote.octave);
      arpCurrentNote = null;
    }

    const n = arpNotes[arpIndex];
    playNote(n.note, n.octave);
    arpCurrentNote = n;

    if (mode === 'up') {
      arpIndex = (arpIndex + 1) % arpNotes.length;
    } else if (mode === 'down') {
      arpIndex = arpIndex <= 0 ? arpNotes.length - 1 : arpIndex - 1;
    } else if (mode === 'updown') {
      arpIndex += arpDirection;
      if (arpIndex >= arpNotes.length - 1) arpDirection = -1;
      if (arpIndex <= 0) arpDirection = 1;
    } else if (mode === 'random') {
      arpIndex = Math.floor(Math.random() * arpNotes.length);
    }

    const beatMs = 60000 / bpm / 2;
    setTimeout(() => {
      if (arpCurrentNote === n) {
        releaseNote(n.note, n.octave);
        arpCurrentNote = null;
      }
    }, beatMs * 0.8);
  }

  const interval = 60000 / bpm / 2;
  tick();
  arpTimer = setInterval(tick, interval);
}

function stopArpeggiator() {
  if (arpTimer) clearInterval(arpTimer);
  arpTimer = null;
  if (arpCurrentNote) {
    releaseNote(arpCurrentNote.note, arpCurrentNote.octave);
    arpCurrentNote = null;
  }
}

// ========== VISUALIZER ==========
function startVisualizer() {
  const canvas = document.getElementById('visualizer-canvas');
  const ctx = canvas.getContext('2d');
  function draw() {
    requestAnimationFrame(draw);
    if (!analyser) return;
    const dpr = window.devicePixelRatio || 1;
    canvas.width = canvas.clientWidth * dpr;
    canvas.height = canvas.clientHeight * dpr;
    ctx.scale(dpr, dpr);
    const w = canvas.clientWidth, h = canvas.clientHeight;
    const bufLen = analyser.frequencyBinCount;
    const data = new Uint8Array(bufLen);
    analyser.getByteFrequencyData(data);
    ctx.clearRect(0, 0, w, h);
    const barCount = 64;
    const barW = w / barCount;
    const step = Math.floor(bufLen / barCount);
    for (let i = 0; i < barCount; i++) {
      const val = data[i * step] / 255;
      const barH = val * h;
      const hue = 190 + val * 30;
      ctx.fillStyle = `hsla(${hue}, 100%, 50%, ${0.3 + val * 0.7})`;
      ctx.fillRect(i * barW, h - barH, barW - 1, barH);
    }
    let sum = 0;
    for (let i = 0; i < bufLen; i++) sum += data[i];
    const avg = sum / bufLen / 255 * 100;
    const vuFill = document.getElementById('vu-fill');
    if (vuFill) vuFill.style.height = avg + '%';
  }
  draw();
}

// ========== EFFECTS BINDINGS ==========
function setupEffects() {
  const bind = (id, valId, fmt, cb) => {
    const el = document.getElementById(id);
    if (!el) return;
    el.addEventListener('input', () => {
      if (valId) { const v = document.getElementById(valId); if (v) v.textContent = fmt(el.value); }
      cb(el.value);
    });
  };

  bind('fx-reverb-size', 'fx-reverb-val', v => v + '%', v => {
    initAudio(); reverbNode.setSize(v / 100);
  });
  bind('fx-delay-time', 'fx-delay-time-val', v => v + 'ms', v => {
    initAudio(); delayNode.delayTime.setTargetAtTime(v / 1000, audioCtx.currentTime, 0.02);
  });
  bind('fx-delay-fb', 'fx-delay-fb-val', v => v + '%', v => {
    initAudio(); delayFeedback.gain.setTargetAtTime(v / 100, audioCtx.currentTime, 0.02);
  });
  bind('fx-delay-mix', 'fx-delay-mix-val', v => v + '%', v => {
    initAudio();
    delayMix.gain.setTargetAtTime(v / 100, audioCtx.currentTime, 0.02);
    delayDry.gain.setTargetAtTime(1 - v / 200, audioCtx.currentTime, 0.02);
  });
  bind('fx-chorus-depth', 'fx-chorus-val', v => v + '%', v => {
    initAudio();
    const d = v / 100;
    chorusNode.lfoGain1.gain.setTargetAtTime(d * 0.003, audioCtx.currentTime, 0.02);
    chorusNode.lfoGain2.gain.setTargetAtTime(d * 0.003, audioCtx.currentTime, 0.02);
    chorusNode.mix.gain.setTargetAtTime(d * 0.5, audioCtx.currentTime, 0.02);
  });
  bind('fx-chorus-rate', 'fx-chorus-rate-val', v => (v/10).toFixed(1) + 'Hz', v => {
    initAudio();
    chorusNode.lfo1.frequency.setTargetAtTime(v / 10, audioCtx.currentTime, 0.02);
    chorusNode.lfo2.frequency.setTargetAtTime(v / 10 * 1.3, audioCtx.currentTime, 0.02);
  });
  bind('fx-trem-depth', 'fx-trem-val', v => v + '%', v => {
    initAudio();
    tremoloNode.depth.gain.setTargetAtTime(v / 100 * 0.5, audioCtx.currentTime, 0.02);
  });
  bind('fx-trem-rate', 'fx-trem-rate-val', v => v + 'Hz', v => {
    initAudio();
    tremoloNode.lfo.frequency.setTargetAtTime(parseFloat(v), audioCtx.currentTime, 0.02);
  });
  document.getElementById('fx-filter-type').addEventListener('change', function() {
    initAudio(); filterNode.type = this.value;
  });
  bind('fx-filter-cutoff', 'fx-filter-cutoff-val', v => {
    return v >= 1000 ? (v/1000).toFixed(1) + 'kHz' : v + 'Hz';
  }, v => { initAudio(); filterNode.frequency.setTargetAtTime(parseFloat(v), audioCtx.currentTime, 0.02); });
  bind('fx-filter-q', 'fx-filter-q-val', v => parseFloat(v).toFixed(1), v => {
    initAudio(); filterNode.Q.setTargetAtTime(parseFloat(v), audioCtx.currentTime, 0.02);
  });
  document.getElementById('fx-dist-type').addEventListener('change', updateDistortion);
  document.getElementById('fx-dist-amount').addEventListener('input', function() {
    document.getElementById('fx-dist-val').textContent = this.value;
    updateDistortion();
  });
  bind('fx-comp-thresh', 'fx-comp-thresh-val', v => v + 'dB', v => {
    initAudio(); compressor.threshold.setTargetAtTime(parseFloat(v), audioCtx.currentTime, 0.02);
  });
  bind('fx-comp-ratio', 'fx-comp-ratio-val', v => v + ':1', v => {
    initAudio(); compressor.ratio.setTargetAtTime(parseFloat(v), audioCtx.currentTime, 0.02);
  });
}

function updateDistortion() {
  initAudio();
  const type = document.getElementById('fx-dist-type').value;
  const amount = parseInt(document.getElementById('fx-dist-amount').value);
  if (type === 'off') { distortionNode.curve = null; return; }
  const samples = 44100;
  const curve = new Float32Array(samples);
  for (let i = 0; i < samples; i++) {
    const x = (i * 2) / samples - 1;
    if (type === 'soft') {
      const k = amount;
      curve[i] = ((3 + k) * x * 20 * (Math.PI / 180)) / (Math.PI + k * Math.abs(x));
    } else {
      curve[i] = Math.max(-1, Math.min(1, x * (amount / 10)));
    }
  }
  distortionNode.curve = curve;
}

// ========== CONTROLS ==========
document.getElementById('oct-down').addEventListener('click', () => {
  if (currentOctave > 1) { currentOctave--; updateOctaveDisplay(); switchMode(currentMode); }
});
document.getElementById('oct-up').addEventListener('click', () => {
  if (currentOctave < 6) { currentOctave++; updateOctaveDisplay(); switchMode(currentMode); }
});
function updateOctaveDisplay() {
  document.getElementById('octave-display').textContent = 'C' + currentOctave;
}

document.getElementById('sustain-btn').addEventListener('click', function() {
  sustainOn = !sustainOn;
  this.classList.toggle('active', sustainOn);
  if (!sustainOn) releaseSustainedNotes();
});

document.getElementById('label-toggle').addEventListener('click', function() {
  showLabels = !showLabels;
  this.classList.toggle('active', showLabels);
  switchMode(currentMode);
});

document.getElementById('master-vol').addEventListener('input', function() {
  const val = this.value / 100;
  if (masterGain) masterGain.gain.setTargetAtTime(val, audioCtx.currentTime, 0.02);
});

// ========== MODE TABS ==========
document.querySelectorAll('.mode-tab').forEach(btn => {
  btn.addEventListener('click', function() {
    switchMode(this.dataset.mode);
  });
});

// ========== SETTINGS PANEL ==========
document.getElementById('settings-toggle').addEventListener('click', () => {
  document.getElementById('settings-overlay').classList.add('open');
});
document.getElementById('settings-close').addEventListener('click', () => {
  document.getElementById('settings-overlay').classList.remove('open');
});
document.getElementById('settings-overlay').addEventListener('click', e => {
  if (e.target === e.currentTarget) {
    document.getElementById('settings-overlay').classList.remove('open');
  }
});

document.getElementById('arp-mode').addEventListener('change', function() {
  if (this.value === 'off') stopArpeggiator();
  else startArpeggiator();
});
document.getElementById('arp-bpm').addEventListener('change', () => {
  if (document.getElementById('arp-mode').value !== 'off') startArpeggiator();
});
document.getElementById('arp-steps').addEventListener('change', () => {
  if (document.getElementById('arp-mode').value !== 'off') startArpeggiator();
});

// ========== KEYBOARD SHORTCUTS ==========
const KEY_MAP = {
  'a': 'C', 'w': 'C#', 's': 'D', 'e': 'D#', 'd': 'E', 'f': 'F', 't': 'F#',
  'g': 'G', 'y': 'G#', 'h': 'A', 'u': 'A#', 'j': 'B',
  'k': 'C+', 'o': 'C#+', 'l': 'D+', 'p': 'D#+', ';': 'E+'
};
// Drum pad keyboard shortcuts
const DRUM_KEY_MAP = { '1':'kick', '2':'snare', '3':'hihat', '4':'openhat', '5':'tom', '6':'crash', '7':'clap', '8':'rim' };

const pressedKeys = new Set();
document.addEventListener('keydown', e => {
  if (e.repeat || e.target.tagName === 'INPUT' || e.target.tagName === 'SELECT' || e.target.tagName === 'TEXTAREA') return;
  const k = e.key.toLowerCase();

  // Drum pad shortcuts (number keys)
  if (currentMode === 'drumpads' && DRUM_KEY_MAP[k]) {
    if (!pressedKeys.has(k)) {
      pressedKeys.add(k);
      initAudio();
      playDrumSound(DRUM_KEY_MAP[k]);
      const pad = document.querySelector(`.drum-pad[data-drum="${DRUM_KEY_MAP[k]}"]`);
      if (pad) { pad.classList.add('pressed'); setTimeout(() => pad.classList.remove('pressed'), 150); }
    }
    return;
  }

  if (KEY_MAP[k] && !pressedKeys.has(k)) {
    pressedKeys.add(k);
    let note = KEY_MAP[k];
    let oct = currentOctave;
    if (note.endsWith('+')) { note = note.slice(0, -1); oct = currentOctave + 1; }
    initAudio();
    playNote(note, oct);
    // Visual feedback for piano keys
    const el = document.querySelector(`.keyboard-container [data-note="${note}"][data-octave="${oct}"]`);
    if (el) {
      el.classList.add('pressed');
      el.style.boxShadow = `0 0 20px ${INSTRUMENTS[currentInstrument].color}`;
    }
  }
});
document.addEventListener('keyup', e => {
  const k = e.key.toLowerCase();
  if (DRUM_KEY_MAP[k]) { pressedKeys.delete(k); return; }
  if (KEY_MAP[k]) {
    pressedKeys.delete(k);
    let note = KEY_MAP[k];
    let oct = currentOctave;
    if (note.endsWith('+')) { note = note.slice(0, -1); oct = currentOctave + 1; }
    releaseNote(note, oct);
    const el = document.querySelector(`.keyboard-container [data-note="${note}"][data-octave="${oct}"]`);
    if (el) { el.classList.remove('pressed'); el.style.boxShadow = ''; }
  }
});

// ========== PREVENT SCROLL WHILE PLAYING ==========
document.getElementById('surface-area').addEventListener('touchmove', e => {
  e.preventDefault();
}, { passive: false });

// ========== INIT ==========
buildInstrumentTabs();
setupEffects();
switchMode('piano');
startVisualizer();
updateOctaveDisplay();
</script>
