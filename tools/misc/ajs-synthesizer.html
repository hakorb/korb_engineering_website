<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>AJ's Synthesizer</title>
<style>
:root {
  --bg: #050a0f;
  --surface: #0a1018;
  --surface2: #0e1520;
  --border: #1a2535;
  --text: #e2e8f0;
  --cyan: #00d4ff;
  --orange: #ff6600;
  --green: #10b981;
  --red: #ef4444;
  --purple: #a855f7;
  --pink: #ec4899;
  --yellow: #eab308;
  --font: 'JetBrains Mono', monospace;
}
* { margin:0; padding:0; box-sizing:border-box; }
body { background:var(--bg); color:var(--text); font-family:var(--font); overflow-x:hidden; touch-action:manipulation; -webkit-user-select:none; user-select:none; }

/* ========== TOP BAR ========== */
.top-bar { display:flex; align-items:center; gap:8px; padding:8px 12px; background:var(--surface); border-bottom:1px solid var(--border); flex-wrap:wrap; }
.top-bar h1 { font-size:14px; color:var(--cyan); white-space:nowrap; font-weight:600; }
.top-bar h1 span { color:var(--orange); }
.instrument-tabs { display:flex; gap:3px; flex-wrap:wrap; flex:1; min-width:0; }
.instrument-tab { padding:3px 7px; font-size:10px; font-family:var(--font); border:1px solid var(--border); border-radius:4px; background:transparent; color:var(--text); cursor:pointer; white-space:nowrap; transition:all .15s; }
.instrument-tab:hover { border-color:var(--cyan); }
.instrument-tab.active { color:var(--bg); font-weight:600; }

/* ========== CONTROLS ROW ========== */
.controls-row { display:flex; align-items:center; gap:10px; padding:6px 12px; background:var(--surface2); border-bottom:1px solid var(--border); flex-wrap:wrap; }
.ctrl-group { display:flex; align-items:center; gap:4px; }
.ctrl-group label { font-size:10px; color:var(--cyan); opacity:0.8; }
.ctrl-btn { width:28px; height:28px; border:1px solid var(--border); border-radius:4px; background:var(--surface); color:var(--text); cursor:pointer; font-family:var(--font); font-size:13px; display:flex; align-items:center; justify-content:center; }
.ctrl-btn:hover { border-color:var(--cyan); }
.ctrl-btn.active { background:var(--cyan); color:var(--bg); border-color:var(--cyan); }
.oct-display { font-size:12px; color:var(--orange); min-width:24px; text-align:center; font-weight:600; }
.vol-slider { width:80px; accent-color:var(--cyan); height:4px; }
.vol-label { font-size:10px; color:var(--text); min-width:30px; }

/* ========== TAB BAR ========== */
.tab-bar { display:flex; border-bottom:1px solid var(--border); background:var(--surface); }
.tab-btn { flex:1; padding:8px 4px; font-family:var(--font); font-size:11px; background:transparent; border:none; border-bottom:2px solid transparent; color:var(--text); cursor:pointer; opacity:0.6; transition:all .15s; text-align:center; }
.tab-btn:hover { opacity:0.8; }
.tab-btn.active { opacity:1; border-bottom-color:var(--cyan); color:var(--cyan); }

/* ========== PANELS ========== */
.panel { display:none; flex:1; overflow:auto; position:relative; }
.panel.active { display:flex; flex-direction:column; }

/* ========== INTERFACE MODE TABS ========== */
.mode-bar { display:flex; gap:0; border-bottom:1px solid var(--border); background:var(--surface2); }
.mode-btn { flex:1; padding:6px; font-family:var(--font); font-size:10px; background:transparent; border:none; border-bottom:2px solid transparent; color:var(--text); cursor:pointer; opacity:0.5; transition:all .15s; }
.mode-btn:hover { opacity:0.7; }
.mode-btn.active { opacity:1; border-bottom-color:var(--orange); color:var(--orange); }

/* ========== KEYBOARD ========== */
.keyboard-wrap { flex:1; display:flex; flex-direction:column; }
.keyboard-container { position:relative; flex:1; min-height:180px; overflow:hidden; touch-action:none; }
.white-key { display:inline-block; position:relative; width:calc(100%/15); height:100%; background:linear-gradient(180deg, #e8e8e8 0%, #fff 10%, #f5f5f5 90%, #ddd 100%); border:1px solid #999; border-radius:0 0 5px 5px; cursor:pointer; vertical-align:top; z-index:1; transition:background .05s; }
.white-key:active, .white-key.pressed { background:linear-gradient(180deg, #ccc 0%, #e0e0e0 50%, #d5d5d5 100%); }
.black-key { position:absolute; top:0; height:60%; background:linear-gradient(180deg, #333 0%, #1a1a1a 70%, #111 100%); border:1px solid #000; border-radius:0 0 4px 4px; z-index:2; cursor:pointer; transition:background .05s; }
.black-key:active, .black-key.pressed { background:linear-gradient(180deg, #555 0%, #333 70%, #222 100%); }
.note-label { position:absolute; bottom:6px; left:50%; transform:translateX(-50%); font-size:8px; color:#666; pointer-events:none; }
.black-key .note-label { color:#888; bottom:4px; }

/* ========== CIRCLE PAD ========== */
.circle-pad { flex:1; display:flex; align-items:center; justify-content:center; min-height:300px; position:relative; }
.circle-pad-svg { width:100%; height:100%; max-width:500px; max-height:500px; }
.circle-note { cursor:pointer; transition:all .1s; }
.circle-note:hover { filter:brightness(1.3); }
.circle-note.pressed { filter:brightness(1.6) drop-shadow(0 0 8px currentColor); }
.circle-note text { pointer-events:none; font-family:var(--font); font-size:10px; fill:var(--text); text-anchor:middle; dominant-baseline:central; }

/* ========== HEX GRID ========== */
.hex-grid { flex:1; display:flex; align-items:center; justify-content:center; min-height:300px; padding:10px; overflow:auto; }
.hex-grid-svg { width:100%; height:100%; max-width:600px; max-height:400px; }
.hex-cell { cursor:pointer; transition:all .1s; }
.hex-cell:hover polygon { filter:brightness(1.3); }
.hex-cell.pressed polygon { filter:brightness(1.6); stroke:var(--cyan); stroke-width:2; }
.hex-cell text { pointer-events:none; font-family:var(--font); font-size:8px; fill:var(--text); text-anchor:middle; dominant-baseline:central; }

/* ========== THEREMIN ========== */
.theremin-wrap { flex:1; display:flex; flex-direction:column; min-height:300px; }
.theremin-header { display:flex; align-items:center; justify-content:space-between; padding:8px 12px; border-bottom:1px solid var(--border); }
.theremin-header h2 { font-size:14px; color:var(--orange); font-weight:600; }
.theremin-header h2 span { color:var(--cyan); font-weight:400; }
.theremin-info { display:flex; gap:16px; font-size:11px; }
.theremin-info .freq { color:var(--cyan); }
.theremin-info .vol { color:var(--green); }
.theremin-info .note-name { color:var(--orange); font-weight:600; }
.theremin-pad { flex:1; position:relative; background:radial-gradient(ellipse at center, var(--surface2) 0%, var(--bg) 100%); cursor:crosshair; touch-action:none; overflow:hidden; }
.theremin-pad canvas { position:absolute; top:0; left:0; width:100%; height:100%; pointer-events:none; }
.theremin-crosshair { position:absolute; pointer-events:none; z-index:2; }
.theremin-crosshair .h-line, .theremin-crosshair .v-line { position:absolute; background:var(--cyan); opacity:0.3; }
.theremin-crosshair .h-line { width:100vw; height:1px; left:-50vw; }
.theremin-crosshair .v-line { width:1px; height:100vh; top:-50vh; }
.theremin-crosshair .dot { width:12px; height:12px; border-radius:50%; background:var(--cyan); box-shadow:0 0 20px var(--cyan), 0 0 40px rgba(0,212,255,0.3); position:absolute; left:-6px; top:-6px; }
.theremin-controls { display:flex; gap:8px; padding:8px 12px; border-top:1px solid var(--border); background:var(--surface); flex-wrap:wrap; }
.theremin-controls label { font-size:10px; color:var(--text); opacity:0.7; }
.theremin-controls select, .theremin-controls input[type="range"] { font-family:var(--font); font-size:10px; background:var(--surface2); color:var(--text); border:1px solid var(--border); border-radius:3px; padding:2px 4px; }
.theremin-controls input[type="range"] { width:60px; accent-color:var(--orange); }
.antenna-left, .antenna-right { position:absolute; bottom:0; width:3px; background:linear-gradient(to top, var(--orange), transparent); z-index:1; opacity:0.4; }
.antenna-left { left:20px; height:90%; }
.antenna-right { right:20px; height:60%; width:20px; border-radius:0 0 0 0; background:linear-gradient(to top, var(--green), transparent); }

/* ========== ARPEGGIATOR ========== */
.arp-section { padding:8px 12px; border-top:1px solid var(--border); background:var(--surface2); }
.arp-row { display:flex; align-items:center; gap:8px; flex-wrap:wrap; }
.arp-row label { font-size:10px; color:var(--orange); font-weight:500; }
.arp-row select, .arp-row input { font-family:var(--font); font-size:10px; background:var(--surface); color:var(--text); border:1px solid var(--border); border-radius:3px; padding:3px 6px; }

/* ========== VISUALIZER / VU ========== */
.viz-row { display:flex; height:50px; border-top:1px solid var(--border); background:var(--surface); }
.viz-canvas { flex:1; display:block; }
.vu-meter { width:24px; background:var(--bg); border-left:1px solid var(--border); position:relative; }
.vu-fill { position:absolute; bottom:0; left:2px; right:2px; background:linear-gradient(to top, var(--green), var(--yellow), var(--red)); transition:height .05s; border-radius:1px; }

/* ========== EFFECTS PANEL ========== */
.fx-section { padding:8px 12px; border-bottom:1px solid var(--border); }
.fx-section h3 { font-size:11px; color:var(--cyan); margin-bottom:6px; font-weight:500; }
.fx-row { display:flex; align-items:center; gap:8px; margin-bottom:4px; }
.fx-row label { font-size:10px; color:var(--text); opacity:0.7; min-width:55px; }
.fx-row input[type="range"] { flex:1; accent-color:var(--cyan); height:3px; }
.fx-row select { font-family:var(--font); font-size:10px; background:var(--surface); color:var(--text); border:1px solid var(--border); border-radius:3px; padding:2px 4px; }
.fx-row .val { font-size:10px; color:var(--orange); min-width:40px; text-align:right; }

/* ========== DRUM MACHINE ========== */
.drum-controls { display:flex; align-items:center; gap:6px; padding:8px 12px; flex-wrap:wrap; border-bottom:1px solid var(--border); }
.drum-controls button { padding:5px 10px; font-family:var(--font); font-size:10px; border:1px solid var(--border); border-radius:4px; background:var(--surface); color:var(--text); cursor:pointer; }
.drum-controls button:hover { border-color:var(--cyan); }
.drum-controls button.active { background:var(--red); border-color:var(--red); color:#fff; }
.preset-btns { display:flex; gap:3px; margin-left:auto; }
.preset-btn { padding:3px 8px !important; font-size:9px !important; }
.drum-grid { display:grid; grid-template-columns:60px repeat(16, 1fr); gap:2px; padding:8px 12px; overflow-x:auto; }
.drum-label { font-size:10px; display:flex; align-items:center; color:var(--orange); cursor:pointer; white-space:nowrap; padding-right:4px; }
.drum-label:hover { color:var(--cyan); }
.drum-cell { aspect-ratio:1; border:1px solid var(--border); border-radius:3px; background:var(--surface); cursor:pointer; transition:all .1s; min-width:16px; }
.drum-cell:hover { border-color:var(--cyan); }
.drum-cell.on { background:var(--cyan); border-color:var(--cyan); }
.drum-cell.current { box-shadow:inset 0 0 0 2px var(--orange); }

/* ========== RECORDING ========== */
.rec-controls { display:flex; align-items:center; gap:8px; padding:8px 12px; border-bottom:1px solid var(--border); }
.rec-btn { width:32px; height:32px; border-radius:50%; border:2px solid var(--red); background:transparent; color:var(--red); font-size:18px; cursor:pointer; display:flex; align-items:center; justify-content:center; transition:all .2s; }
.rec-btn.recording { background:var(--red); color:#fff; animation:recPulse 1s infinite; }
@keyframes recPulse { 0%,100%{box-shadow:0 0 0 0 rgba(239,68,68,0.4)} 50%{box-shadow:0 0 0 8px rgba(239,68,68,0)} }
.rec-timer { font-size:14px; color:var(--text); font-variant-numeric:tabular-nums; }
#rec-canvas { width:100%; height:40px; display:block; background:var(--surface); }
.rec-library { padding:8px 12px; }
.rec-item { display:flex; align-items:center; gap:6px; padding:4px 0; border-bottom:1px solid var(--border); font-size:11px; }
.rec-item button { padding:2px 8px; font-family:var(--font); font-size:10px; border:1px solid var(--border); border-radius:3px; background:var(--surface); color:var(--text); cursor:pointer; }
.rec-name { flex:1; color:var(--text); }
.rec-dur { color:var(--cyan); min-width:40px; }

/* ========== LAYOUT ========== */
.app-wrap { display:flex; flex-direction:column; height:100vh; height:100dvh; }
.main-area { flex:1; display:flex; flex-direction:column; overflow:hidden; }

/* ========== SCROLLBAR ========== */
::-webkit-scrollbar { width:6px; height:6px; }
::-webkit-scrollbar-track { background:var(--bg); }
::-webkit-scrollbar-thumb { background:var(--border); border-radius:3px; }

/* ========== MOBILE ========== */
@media(max-width:600px) {
  .top-bar { padding:6px 8px; }
  .top-bar h1 { font-size:12px; }
  .instrument-tab { padding:2px 5px; font-size:9px; }
  .controls-row { padding:4px 8px; gap:6px; }
  .tab-btn { font-size:10px; padding:6px 2px; }
  .mode-btn { font-size:9px; padding:5px; }
  .keyboard-container { min-height:150px; }
  .drum-grid { grid-template-columns:45px repeat(16,1fr); gap:1px; padding:6px 8px; }
  .drum-label { font-size:9px; }
  .fx-section { padding:6px 8px; }
  input[type="range"] { height:8px; }
}
</style>
</head>
<body>
<div class="app-wrap">

  <!-- Top Bar -->
  <div class="top-bar">
    <h1>AJ's <span>Synthesizer</span></h1>
    <div class="instrument-tabs" id="instrument-tabs"></div>
  </div>

  <!-- Controls Row -->
  <div class="controls-row">
    <div class="ctrl-group">
      <label>OCT</label>
      <button class="ctrl-btn" id="oct-down">-</button>
      <span class="oct-display" id="octave-display">C4</span>
      <button class="ctrl-btn" id="oct-up">+</button>
    </div>
    <div class="ctrl-group">
      <button class="ctrl-btn" id="sustain-btn" title="Sustain">S</button>
    </div>
    <div class="ctrl-group">
      <label>VOL</label>
      <input type="range" class="vol-slider" id="master-vol" min="0" max="100" value="75">
      <span class="vol-label" id="vol-label">75%</span>
    </div>
    <div class="ctrl-group">
      <button class="ctrl-btn" id="label-toggle" title="Toggle Labels">L</button>
    </div>
  </div>

  <!-- Main Tab Bar -->
  <div class="tab-bar">
    <button class="tab-btn active" data-tab="play">Play</button>
    <button class="tab-btn" data-tab="drums">Drums</button>
    <button class="tab-btn" data-tab="effects">Effects</button>
    <button class="tab-btn" data-tab="record">Record</button>
  </div>

  <!-- Main Area -->
  <div class="main-area">

    <!-- PLAY PANEL -->
    <div class="panel active" data-panel="play">
      <!-- Interface Mode Tabs -->
      <div class="mode-bar">
        <button class="mode-btn active" data-mode="piano">Piano Keys</button>
        <button class="mode-btn" data-mode="circle">Circle Pad</button>
        <button class="mode-btn" data-mode="hex">Hex Grid</button>
        <button class="mode-btn" data-mode="theremin">AJ's Theremin</button>
      </div>

      <!-- Piano Keyboard -->
      <div class="keyboard-wrap" id="mode-piano">
        <div class="keyboard-container" id="keyboard-container"></div>
      </div>

      <!-- Circle Pad -->
      <div class="keyboard-wrap" id="mode-circle" style="display:none">
        <div class="circle-pad" id="circle-pad-area"></div>
      </div>

      <!-- Hex Grid -->
      <div class="keyboard-wrap" id="mode-hex" style="display:none">
        <div class="hex-grid" id="hex-grid-area"></div>
      </div>

      <!-- AJ's Theremin -->
      <div class="keyboard-wrap" id="mode-theremin" style="display:none">
        <div class="theremin-wrap">
          <div class="theremin-header">
            <h2>AJ's <span>Theremin</span></h2>
            <div class="theremin-info">
              <span class="freq" id="theremin-freq">-- Hz</span>
              <span class="note-name" id="theremin-note">--</span>
              <span class="vol" id="theremin-vol">--</span>
            </div>
          </div>
          <div class="theremin-pad" id="theremin-pad">
            <div class="antenna-left"></div>
            <div class="antenna-right"></div>
            <canvas id="theremin-canvas"></canvas>
            <div class="theremin-crosshair" id="theremin-crosshair" style="display:none">
              <div class="h-line"></div>
              <div class="v-line"></div>
              <div class="dot"></div>
            </div>
          </div>
          <div class="theremin-controls">
            <div class="ctrl-group">
              <label>Wave</label>
              <select id="theremin-wave">
                <option value="sine">Sine</option>
                <option value="triangle">Triangle</option>
                <option value="sawtooth">Sawtooth</option>
                <option value="square">Square</option>
              </select>
            </div>
            <div class="ctrl-group">
              <label>Range</label>
              <select id="theremin-range">
                <option value="2">2 Oct</option>
                <option value="3" selected>3 Oct</option>
                <option value="4">4 Oct</option>
                <option value="5">5 Oct</option>
              </select>
            </div>
            <div class="ctrl-group">
              <label>Vibrato</label>
              <input type="range" id="theremin-vibrato" min="0" max="100" value="20">
            </div>
            <div class="ctrl-group">
              <label>Glide</label>
              <input type="range" id="theremin-glide" min="0" max="100" value="50">
            </div>
          </div>
        </div>
      </div>

      <!-- Arpeggiator -->
      <div class="arp-section">
        <div class="arp-row">
          <label>ARP</label>
          <select id="arp-mode">
            <option value="off">Off</option>
            <option value="up">Up</option>
            <option value="down">Down</option>
            <option value="updown">Up/Down</option>
            <option value="random">Random</option>
          </select>
          <label>BPM</label>
          <input type="number" id="arp-bpm" value="140" min="60" max="300" style="width:50px">
          <label>Steps</label>
          <select id="arp-steps">
            <option value="1">1 Oct</option>
            <option value="2">2 Oct</option>
            <option value="3">3 Oct</option>
          </select>
        </div>
      </div>

      <!-- Visualizer -->
      <div class="viz-row">
        <canvas class="viz-canvas" id="visualizer-canvas"></canvas>
        <div class="vu-meter"><div class="vu-fill" id="vu-fill"></div></div>
      </div>
    </div>

    <!-- DRUMS PANEL -->
    <div class="panel" data-panel="drums" id="drum-panel-wrap"></div>

    <!-- EFFECTS PANEL -->
    <div class="panel" data-panel="effects" id="effects-panel" style="overflow-y:auto;display:none;flex-direction:column;"></div>

    <!-- RECORD PANEL -->
    <div class="panel" data-panel="record" id="rec-panel-wrap"></div>

  </div>
</div>

<script>
// ========== AUDIO ENGINE ==========
let audioCtx, masterGain, compressor, filterNode, distortionNode;
let delayNode, delayFeedback, delayMix, delayDry;
let reverbNode, chorusNode, tremoloNode;
let analyser, mediaStreamDest;
let audioInitialized = false;

function initAudio() {
  if (audioInitialized) return;
  audioInitialized = true;
  audioCtx = new (window.AudioContext || window.webkitAudioContext)();

  // Master chain: filter -> distortion -> chorus -> delay/dry split -> reverb -> compressor -> master -> analyser -> dest
  masterGain = audioCtx.createGain();
  masterGain.gain.value = 0.75;

  // Compressor for better dynamics
  compressor = audioCtx.createDynamicsCompressor();
  compressor.threshold.value = -24;
  compressor.knee.value = 12;
  compressor.ratio.value = 4;
  compressor.attack.value = 0.003;
  compressor.release.value = 0.15;

  analyser = audioCtx.createAnalyser();
  analyser.fftSize = 2048;
  analyser.smoothingTimeConstant = 0.85;

  // Filter
  filterNode = audioCtx.createBiquadFilter();
  filterNode.type = 'lowpass';
  filterNode.frequency.value = 20000;
  filterNode.Q.value = 1;

  // Distortion
  distortionNode = audioCtx.createWaveShaper();
  distortionNode.oversample = '4x';

  // Chorus (delay-based)
  chorusNode = {
    delay1: audioCtx.createDelay(0.05),
    delay2: audioCtx.createDelay(0.05),
    lfo1: audioCtx.createOscillator(),
    lfo2: audioCtx.createOscillator(),
    lfoGain1: audioCtx.createGain(),
    lfoGain2: audioCtx.createGain(),
    mix: audioCtx.createGain(),
    dry: audioCtx.createGain(),
    input: audioCtx.createGain(),
    output: audioCtx.createGain()
  };
  chorusNode.delay1.delayTime.value = 0.015;
  chorusNode.delay2.delayTime.value = 0.017;
  chorusNode.lfo1.type = 'sine';
  chorusNode.lfo1.frequency.value = 0.7;
  chorusNode.lfo2.type = 'sine';
  chorusNode.lfo2.frequency.value = 0.9;
  chorusNode.lfoGain1.gain.value = 0;
  chorusNode.lfoGain2.gain.value = 0;
  chorusNode.mix.gain.value = 0;
  chorusNode.dry.gain.value = 1;
  chorusNode.lfo1.connect(chorusNode.lfoGain1);
  chorusNode.lfoGain1.connect(chorusNode.delay1.delayTime);
  chorusNode.lfo2.connect(chorusNode.lfoGain2);
  chorusNode.lfoGain2.connect(chorusNode.delay2.delayTime);
  chorusNode.input.connect(chorusNode.dry);
  chorusNode.input.connect(chorusNode.delay1);
  chorusNode.input.connect(chorusNode.delay2);
  chorusNode.delay1.connect(chorusNode.mix);
  chorusNode.delay2.connect(chorusNode.mix);
  chorusNode.dry.connect(chorusNode.output);
  chorusNode.mix.connect(chorusNode.output);
  chorusNode.lfo1.start();
  chorusNode.lfo2.start();

  // Delay
  delayNode = audioCtx.createDelay(2.0);
  delayNode.delayTime.value = 0.3;
  delayFeedback = audioCtx.createGain();
  delayFeedback.gain.value = 0.3;
  delayMix = audioCtx.createGain();
  delayMix.gain.value = 0;
  delayDry = audioCtx.createGain();
  delayDry.gain.value = 1;

  // Reverb (convolution-style using delay network)
  reverbNode = createReverb();

  // Tremolo
  tremoloNode = {
    lfo: audioCtx.createOscillator(),
    depth: audioCtx.createGain(),
    gain: audioCtx.createGain()
  };
  tremoloNode.lfo.type = 'sine';
  tremoloNode.lfo.frequency.value = 4;
  tremoloNode.depth.gain.value = 0;
  tremoloNode.gain.gain.value = 1;
  tremoloNode.lfo.connect(tremoloNode.depth);
  tremoloNode.depth.connect(tremoloNode.gain.gain);
  tremoloNode.lfo.start();

  // Signal chain
  filterNode.connect(distortionNode);
  distortionNode.connect(chorusNode.input);
  chorusNode.output.connect(delayDry);
  chorusNode.output.connect(delayNode);
  delayNode.connect(delayFeedback);
  delayFeedback.connect(delayNode);
  delayNode.connect(delayMix);
  delayDry.connect(tremoloNode.gain);
  delayMix.connect(tremoloNode.gain);
  tremoloNode.gain.connect(reverbNode.input);
  reverbNode.output.connect(compressor);
  compressor.connect(masterGain);
  masterGain.connect(analyser);
  analyser.connect(audioCtx.destination);

  // MediaStream for recording
  mediaStreamDest = audioCtx.createMediaStreamDestination();
  masterGain.connect(mediaStreamDest);
}

function createReverb() {
  const input = audioCtx.createGain();
  const output = audioCtx.createGain();
  const wet = audioCtx.createGain();
  wet.gain.value = 0.3;
  const dry = audioCtx.createGain();
  dry.gain.value = 0.7;

  // Create impulse response
  const duration = 2.5;
  const sampleRate = audioCtx.sampleRate;
  const length = sampleRate * duration;
  const impulse = audioCtx.createBuffer(2, length, sampleRate);
  for (let ch = 0; ch < 2; ch++) {
    const data = impulse.getChannelData(ch);
    for (let i = 0; i < length; i++) {
      data[i] = (Math.random() * 2 - 1) * Math.pow(1 - i / length, 2.5);
    }
  }
  const convolver = audioCtx.createConvolver();
  convolver.buffer = impulse;

  input.connect(dry);
  input.connect(convolver);
  convolver.connect(wet);
  dry.connect(output);
  wet.connect(output);

  return {
    input, output, wet, dry, convolver,
    setSize(val) {
      wet.gain.setTargetAtTime(val * 0.8, audioCtx.currentTime, 0.02);
      dry.gain.setTargetAtTime(1 - val * 0.3, audioCtx.currentTime, 0.02);
    }
  };
}

// ========== NOTE HELPERS ==========
const NOTE_FREQS = {};
const ALL_NOTES = ['C','C#','D','D#','E','F','F#','G','G#','A','A#','B'];
for (let oct = 0; oct <= 8; oct++) {
  ALL_NOTES.forEach((n, i) => {
    const midi = (oct + 1) * 12 + i;
    NOTE_FREQS[n + oct] = 440 * Math.pow(2, (midi - 69) / 12);
  });
}

function freqToNoteName(freq) {
  if (freq <= 0) return '--';
  const midi = 12 * Math.log2(freq / 440) + 69;
  const noteIdx = Math.round(midi) % 12;
  const oct = Math.floor(Math.round(midi) / 12) - 1;
  return ALL_NOTES[noteIdx < 0 ? noteIdx + 12 : noteIdx] + oct;
}

// ========== PLAY / RELEASE ==========
function playNote(note, octave) {
  initAudio();
  if (audioCtx.state === 'suspended') audioCtx.resume();
  const noteId = note + octave;
  if (activeNotes.has(noteId)) return;
  const freq = NOTE_FREQS[noteId];
  if (!freq) return;
  const vol = parseFloat(document.getElementById('master-vol').value) / 100;
  const nodes = createInstrumentSound(currentInstrument, freq, vol);
  if (nodes) {
    activeNotes.set(noteId, nodes);
    // Arpeggiator
    handleArpNote(note, octave);
  }
}

function releaseNote(note, octave) {
  const noteId = note + octave;
  const nodes = activeNotes.get(noteId);
  if (!nodes) return;
  if (sustainOn) {
    sustainedNotes.set(noteId, nodes);
    activeNotes.delete(noteId);
    return;
  }
  doRelease(noteId);
}

function doRelease(noteId) {
  const nodes = activeNotes.get(noteId) || sustainedNotes.get(noteId);
  if (!nodes) return;
  const t = audioCtx.currentTime;
  const rt = nodes.releaseTime || 0.3;
  try {
    if (nodes.gainNode) {
      nodes.gainNode.gain.cancelScheduledValues(t);
      nodes.gainNode.gain.setValueAtTime(nodes.gainNode.gain.value, t);
      nodes.gainNode.gain.exponentialRampToValueAtTime(0.0001, t + rt);
    }
    setTimeout(() => {
      try {
        if (nodes.oscillators) nodes.oscillators.forEach(o => { try { o.stop(); } catch(e){} });
        if (nodes.noiseSource) { try { nodes.noiseSource.stop(); } catch(e){} }
        if (nodes.gainNode) nodes.gainNode.disconnect();
      } catch(e){}
    }, rt * 1000 + 50);
  } catch(e){}
  activeNotes.delete(noteId);
  sustainedNotes.delete(noteId);
}

function stopNoteImmediate(noteId) {
  const nodes = activeNotes.get(noteId) || sustainedNotes.get(noteId);
  if (!nodes) return;
  try {
    if (nodes.gainNode) { nodes.gainNode.gain.setValueAtTime(0, audioCtx.currentTime); nodes.gainNode.disconnect(); }
    if (nodes.oscillators) nodes.oscillators.forEach(o => { try { o.stop(); } catch(e){} });
    if (nodes.noiseSource) { try { nodes.noiseSource.stop(); } catch(e){} }
  } catch(e){}
  activeNotes.delete(noteId);
  sustainedNotes.delete(noteId);
}

function releaseSustainedNotes() {
  for (const [noteId] of sustainedNotes) doRelease(noteId);
}

// ========== INSTRUMENT SYNTHESIS ==========
function createInstrumentSound(inst, freq, vol) {
  const t = audioCtx.currentTime;
  const g = audioCtx.createGain();
  g.gain.setValueAtTime(0, t);
  g.connect(filterNode);
  const oscillators = [];

  switch(inst) {
    case 0: { // Grand Piano — improved additive with inharmonicity
      const harmonics = [1, 2, 3, 4, 5, 6, 7, 8, 10, 12];
      const amps = [1, 0.55, 0.35, 0.25, 0.15, 0.1, 0.07, 0.04, 0.02, 0.01];
      const inharm = 1 + 0.0005 * (freq / 440); // piano string inharmonicity
      harmonics.forEach((h, i) => {
        const osc = audioCtx.createOscillator();
        osc.type = 'sine';
        osc.frequency.value = freq * h * Math.pow(inharm, h - 1) + (Math.random() - 0.5) * 0.8;
        const hg = audioCtx.createGain();
        hg.gain.value = amps[i] * vol;
        osc.connect(hg); hg.connect(g);
        osc.start(t); oscillators.push(osc);
      });
      // Hammer noise burst
      const bufSz = audioCtx.sampleRate * 0.008;
      const nBuf = audioCtx.createBuffer(1, bufSz, audioCtx.sampleRate);
      const nD = nBuf.getChannelData(0);
      for (let i = 0; i < bufSz; i++) nD[i] = (Math.random() * 2 - 1) * 0.3;
      const nSrc = audioCtx.createBufferSource();
      nSrc.buffer = nBuf;
      const nG = audioCtx.createGain();
      nG.gain.setValueAtTime(vol * 0.4, t);
      nG.gain.exponentialRampToValueAtTime(0.001, t + 0.015);
      const nF = audioCtx.createBiquadFilter();
      nF.type = 'bandpass'; nF.frequency.value = freq * 3; nF.Q.value = 1;
      nSrc.connect(nF); nF.connect(nG); nG.connect(g);
      nSrc.start(t); nSrc.stop(t + 0.02);
      g.gain.linearRampToValueAtTime(vol, t + 0.003);
      g.gain.exponentialRampToValueAtTime(vol * 0.55, t + 0.25);
      g.gain.setTargetAtTime(vol * 0.25, t + 0.25, 1.8);
      return { gainNode: g, oscillators, releaseTime: 0.8 };
    }
    case 1: { // Electric Piano — FM with 2 operator pairs
      const c1 = audioCtx.createOscillator(); c1.type = 'sine'; c1.frequency.value = freq;
      const m1 = audioCtx.createOscillator(); m1.type = 'sine'; m1.frequency.value = freq * 3.5;
      const mG1 = audioCtx.createGain();
      mG1.gain.setValueAtTime(freq * 2.5, t);
      mG1.gain.exponentialRampToValueAtTime(freq * 0.2, t + 0.8);
      m1.connect(mG1); mG1.connect(c1.frequency);
      const c2 = audioCtx.createOscillator(); c2.type = 'sine'; c2.frequency.value = freq * 2;
      const m2 = audioCtx.createOscillator(); m2.type = 'sine'; m2.frequency.value = freq * 7;
      const mG2 = audioCtx.createGain();
      mG2.gain.setValueAtTime(freq * 0.5, t);
      mG2.gain.exponentialRampToValueAtTime(freq * 0.01, t + 0.3);
      m2.connect(mG2); mG2.connect(c2.frequency);
      const cG2 = audioCtx.createGain(); cG2.gain.value = 0.3;
      c1.connect(g); c2.connect(cG2); cG2.connect(g);
      c1.start(t); m1.start(t); c2.start(t); m2.start(t);
      g.gain.linearRampToValueAtTime(vol * 0.8, t + 0.002);
      g.gain.setTargetAtTime(vol * 0.4, t + 0.04, 0.4);
      return { gainNode: g, oscillators: [c1, m1, c2, m2], releaseTime: 0.4 };
    }
    case 2: { // Hammond Organ — drawbar additive + Leslie
      const drawbars = [0.5, 1, 1.5, 2, 3, 4, 5, 6, 8];
      const levels = [0.6, 0.8, 0.5, 0.7, 0.5, 0.35, 0.25, 0.2, 0.15];
      drawbars.forEach((h, i) => {
        const osc = audioCtx.createOscillator(); osc.type = 'sine';
        osc.frequency.value = freq * h;
        const hg = audioCtx.createGain();
        hg.gain.value = levels[i] * vol * 0.2;
        const trem = audioCtx.createOscillator(); trem.type = 'sine';
        trem.frequency.value = 5.8 + i * 0.2;
        const tremG = audioCtx.createGain();
        tremG.gain.value = levels[i] * vol * 0.035;
        trem.connect(tremG); tremG.connect(hg.gain);
        trem.start(t);
        osc.connect(hg); hg.connect(g);
        osc.start(t); oscillators.push(osc, trem);
      });
      // Key click
      const click = audioCtx.createOscillator(); click.type = 'square';
      click.frequency.value = freq * 4;
      const clickG = audioCtx.createGain();
      clickG.gain.setValueAtTime(vol * 0.15, t);
      clickG.gain.exponentialRampToValueAtTime(0.001, t + 0.008);
      click.connect(clickG); clickG.connect(g);
      click.start(t); click.stop(t + 0.01); oscillators.push(click);
      g.gain.linearRampToValueAtTime(vol * 0.45, t + 0.008);
      return { gainNode: g, oscillators, releaseTime: 0.06 };
    }
    case 3: { // String Ensemble — detuned saws + vibrato
      for (let i = 0; i < 6; i++) {
        const osc = audioCtx.createOscillator(); osc.type = 'sawtooth';
        osc.frequency.value = freq + (i - 2.5) * 1.2 + Math.random() * 0.5;
        const lpf = audioCtx.createBiquadFilter(); lpf.type = 'lowpass';
        lpf.frequency.value = Math.min(freq * 3.5, 7000); lpf.Q.value = 0.4;
        const vib = audioCtx.createOscillator(); vib.type = 'sine';
        vib.frequency.value = 4.2 + Math.random() * 1.2;
        const vibG = audioCtx.createGain(); vibG.gain.value = freq * 0.004;
        vib.connect(vibG); vibG.connect(osc.frequency); vib.start(t);
        osc.connect(lpf); lpf.connect(g);
        osc.start(t); oscillators.push(osc, vib);
      }
      g.gain.linearRampToValueAtTime(vol * 0.3, t + 0.35);
      g.gain.setTargetAtTime(vol * 0.25, t + 0.4, 2.5);
      return { gainNode: g, oscillators, releaseTime: 0.7 };
    }
    case 4: { // Brass Section — saws + formant filter sweep
      const o1 = audioCtx.createOscillator(); o1.type = 'sawtooth'; o1.frequency.value = freq;
      const o2 = audioCtx.createOscillator(); o2.type = 'sawtooth'; o2.frequency.value = freq * 1.003;
      const o3 = audioCtx.createOscillator(); o3.type = 'sawtooth'; o3.frequency.value = freq * 0.997;
      const bp = audioCtx.createBiquadFilter(); bp.type = 'lowpass';
      bp.frequency.setValueAtTime(freq * 1.5, t);
      bp.frequency.linearRampToValueAtTime(freq * 6, t + 0.12);
      bp.frequency.setTargetAtTime(freq * 3, t + 0.15, 0.6);
      bp.Q.value = 2;
      o1.connect(bp); o2.connect(bp); o3.connect(bp); bp.connect(g);
      o1.start(t); o2.start(t); o3.start(t);
      g.gain.linearRampToValueAtTime(vol * 0.4, t + 0.06);
      g.gain.setTargetAtTime(vol * 0.35, t + 0.12, 0.8);
      return { gainNode: g, oscillators: [o1, o2, o3], releaseTime: 0.18 };
    }
    case 5: { // Woodwinds — triangle + breath noise + overtones
      const osc = audioCtx.createOscillator(); osc.type = 'triangle'; osc.frequency.value = freq;
      const o2 = audioCtx.createOscillator(); o2.type = 'sine'; o2.frequency.value = freq * 3;
      const o2g = audioCtx.createGain(); o2g.gain.value = vol * 0.08;
      o2.connect(o2g); o2g.connect(g);
      const vib = audioCtx.createOscillator(); vib.type = 'sine'; vib.frequency.value = 5.2;
      const vibG = audioCtx.createGain(); vibG.gain.value = freq * 0.006;
      vib.connect(vibG); vibG.connect(osc.frequency); vib.start(t);
      const bufSz = audioCtx.sampleRate; const nBuf = audioCtx.createBuffer(1, bufSz, audioCtx.sampleRate);
      const nD = nBuf.getChannelData(0);
      for (let i = 0; i < bufSz; i++) nD[i] = (Math.random() * 2 - 1) * 0.12;
      const noise = audioCtx.createBufferSource(); noise.buffer = nBuf; noise.loop = true;
      const nBP = audioCtx.createBiquadFilter(); nBP.type = 'bandpass'; nBP.frequency.value = freq * 2.5; nBP.Q.value = 4;
      const nG = audioCtx.createGain(); nG.gain.value = vol * 0.12;
      noise.connect(nBP); nBP.connect(nG); nG.connect(g); noise.start(t);
      osc.connect(g); osc.start(t); o2.start(t);
      g.gain.linearRampToValueAtTime(vol * 0.3, t + 0.06);
      g.gain.setTargetAtTime(vol * 0.25, t + 0.08, 1.2);
      return { gainNode: g, oscillators: [osc, o2, vib], noiseSource: noise, releaseTime: 0.12 };
    }
    case 6: { // Synth Lead — saw + pulse + filter sweep
      const o1 = audioCtx.createOscillator(); o1.type = 'sawtooth'; o1.frequency.value = freq;
      const o2 = audioCtx.createOscillator(); o2.type = 'square'; o2.frequency.value = freq * 1.005;
      const o3 = audioCtx.createOscillator(); o3.type = 'sawtooth'; o3.frequency.value = freq * 0.995;
      const lpf = audioCtx.createBiquadFilter(); lpf.type = 'lowpass';
      lpf.frequency.setValueAtTime(freq * 1.2, t);
      lpf.frequency.linearRampToValueAtTime(freq * 10, t + 0.08);
      lpf.frequency.setTargetAtTime(freq * 3, t + 0.12, 0.25);
      lpf.Q.value = 5;
      o1.connect(lpf); o2.connect(lpf); o3.connect(lpf); lpf.connect(g);
      o1.start(t); o2.start(t); o3.start(t);
      g.gain.linearRampToValueAtTime(vol * 0.35, t + 0.008);
      return { gainNode: g, oscillators: [o1, o2, o3], releaseTime: 0.12 };
    }
    case 7: { // Synth Pad — supersaw + slow attack
      for (let i = 0; i < 7; i++) {
        const osc = audioCtx.createOscillator(); osc.type = 'sawtooth';
        osc.frequency.value = freq + (i - 3) * 2.2 + Math.random() * 0.5;
        const lpf = audioCtx.createBiquadFilter(); lpf.type = 'lowpass';
        lpf.frequency.value = Math.min(freq * 2.5, 5000);
        osc.connect(lpf); lpf.connect(g);
        osc.start(t); oscillators.push(osc);
      }
      g.gain.linearRampToValueAtTime(vol * 0.2, t + 0.5);
      g.gain.setTargetAtTime(vol * 0.18, t + 0.6, 3);
      return { gainNode: g, oscillators, releaseTime: 1.5 };
    }
    case 8: { // Bass — saw + sub + filter pluck
      const o1 = audioCtx.createOscillator(); o1.type = 'sawtooth'; o1.frequency.value = freq;
      const sub = audioCtx.createOscillator(); sub.type = 'sine'; sub.frequency.value = freq / 2;
      const subG = audioCtx.createGain(); subG.gain.value = 0.8;
      const lpf = audioCtx.createBiquadFilter(); lpf.type = 'lowpass';
      lpf.frequency.setValueAtTime(freq * 8, t);
      lpf.frequency.setTargetAtTime(freq * 1.5, t + 0.04, 0.12);
      lpf.Q.value = 4;
      o1.connect(lpf); sub.connect(subG); subG.connect(g); lpf.connect(g);
      o1.start(t); sub.start(t);
      g.gain.linearRampToValueAtTime(vol * 0.55, t + 0.004);
      g.gain.setTargetAtTime(vol * 0.35, t + 0.04, 0.25);
      return { gainNode: g, oscillators: [o1, sub], releaseTime: 0.12 };
    }
    case 9: { // Acoustic Guitar — Karplus-Strong-inspired pluck
      const bufSz = Math.round(audioCtx.sampleRate / freq);
      const exciteBuf = audioCtx.createBuffer(1, audioCtx.sampleRate * 0.04, audioCtx.sampleRate);
      const ed = exciteBuf.getChannelData(0);
      for (let i = 0; i < ed.length; i++) {
        ed[i] = (Math.random() * 2 - 1) * (1 - i / ed.length) * 0.8;
      }
      const excite = audioCtx.createBufferSource(); excite.buffer = exciteBuf;
      // Body resonance
      const body = audioCtx.createBiquadFilter(); body.type = 'peaking';
      body.frequency.value = 120; body.Q.value = 2; body.gain.value = 6;
      const body2 = audioCtx.createBiquadFilter(); body2.type = 'peaking';
      body2.frequency.value = 350; body2.Q.value = 1.5; body2.gain.value = 4;
      const lpf = audioCtx.createBiquadFilter(); lpf.type = 'lowpass';
      lpf.frequency.setValueAtTime(freq * 6, t);
      lpf.frequency.setTargetAtTime(freq * 2, t + 0.05, 0.15);
      // Add fundamental oscillator for sustain
      const osc = audioCtx.createOscillator(); osc.type = 'triangle'; osc.frequency.value = freq;
      const oscG = audioCtx.createGain();
      oscG.gain.setValueAtTime(0, t);
      oscG.gain.linearRampToValueAtTime(vol * 0.15, t + 0.002);
      oscG.gain.setTargetAtTime(vol * 0.05, t + 0.05, 0.3);
      osc.connect(oscG); oscG.connect(g); osc.start(t);
      excite.connect(body); body.connect(body2); body2.connect(lpf); lpf.connect(g);
      excite.start(t); excite.stop(t + 0.04);
      g.gain.linearRampToValueAtTime(vol * 0.5, t + 0.002);
      g.gain.setTargetAtTime(vol * 0.15, t + 0.02, 0.4);
      g.gain.setTargetAtTime(0.001, t + 1.5, 0.5);
      return { gainNode: g, oscillators: [osc], releaseTime: 0.2 };
    }
    case 10: { // Marimba — sine + octave + fast decay
      const o1 = audioCtx.createOscillator(); o1.type = 'sine'; o1.frequency.value = freq;
      const o2 = audioCtx.createOscillator(); o2.type = 'sine'; o2.frequency.value = freq * 4;
      const o2g = audioCtx.createGain();
      o2g.gain.setValueAtTime(vol * 0.35, t);
      o2g.gain.exponentialRampToValueAtTime(0.001, t + 0.15);
      const o3 = audioCtx.createOscillator(); o3.type = 'sine'; o3.frequency.value = freq * 2.76; // non-harmonic
      const o3g = audioCtx.createGain();
      o3g.gain.setValueAtTime(vol * 0.15, t);
      o3g.gain.exponentialRampToValueAtTime(0.001, t + 0.08);
      o1.connect(g); o2.connect(o2g); o2g.connect(g); o3.connect(o3g); o3g.connect(g);
      o1.start(t); o2.start(t); o3.start(t);
      g.gain.linearRampToValueAtTime(vol * 0.6, t + 0.001);
      g.gain.setTargetAtTime(vol * 0.2, t + 0.01, 0.2);
      g.gain.setTargetAtTime(0.001, t + 0.8, 0.4);
      return { gainNode: g, oscillators: [o1, o2, o3], releaseTime: 0.15 };
    }
    case 11: { // Harmonica — square + sawtooth + vibrato + breath
      const o1 = audioCtx.createOscillator(); o1.type = 'square'; o1.frequency.value = freq;
      const o2 = audioCtx.createOscillator(); o2.type = 'sawtooth'; o2.frequency.value = freq * 1.001;
      const o2g = audioCtx.createGain(); o2g.gain.value = 0.3;
      const vib = audioCtx.createOscillator(); vib.type = 'sine'; vib.frequency.value = 5.5;
      const vibG = audioCtx.createGain(); vibG.gain.value = freq * 0.008;
      vib.connect(vibG); vibG.connect(o1.frequency); vibG.connect(o2.frequency); vib.start(t);
      const lpf = audioCtx.createBiquadFilter(); lpf.type = 'lowpass';
      lpf.frequency.value = Math.min(freq * 5, 4000); lpf.Q.value = 1;
      o1.connect(lpf); o2.connect(o2g); o2g.connect(lpf); lpf.connect(g);
      // Breath noise
      const bufSz = audioCtx.sampleRate; const nBuf = audioCtx.createBuffer(1, bufSz, audioCtx.sampleRate);
      const nD = nBuf.getChannelData(0);
      for (let i = 0; i < bufSz; i++) nD[i] = (Math.random() * 2 - 1) * 0.08;
      const noise = audioCtx.createBufferSource(); noise.buffer = nBuf; noise.loop = true;
      const nBP = audioCtx.createBiquadFilter(); nBP.type = 'bandpass'; nBP.frequency.value = freq * 3; nBP.Q.value = 2;
      const nG = audioCtx.createGain(); nG.gain.value = vol * 0.1;
      noise.connect(nBP); nBP.connect(nG); nG.connect(g); noise.start(t);
      o1.start(t); o2.start(t);
      g.gain.linearRampToValueAtTime(vol * 0.25, t + 0.04);
      g.gain.setTargetAtTime(vol * 0.2, t + 0.06, 1.5);
      return { gainNode: g, oscillators: [o1, o2, vib], noiseSource: noise, releaseTime: 0.08 };
    }
    case 12: { // Choir — formant synthesis
      const vowels = { a: [800, 1150, 2900], e: [400, 1600, 2700], o: [450, 800, 2830] };
      const vowel = ['a','e','o'][Math.floor(Math.random()*3)];
      const formants = vowels[vowel];
      for (let i = 0; i < 4; i++) {
        const osc = audioCtx.createOscillator(); osc.type = 'sawtooth';
        osc.frequency.value = freq + (i - 1.5) * 1.5 + Math.random() * 0.5;
        const vib = audioCtx.createOscillator(); vib.type = 'sine';
        vib.frequency.value = 4 + Math.random() * 2;
        const vibG = audioCtx.createGain(); vibG.gain.value = freq * 0.005;
        vib.connect(vibG); vibG.connect(osc.frequency); vib.start(t);
        osc.connect(g); osc.start(t); oscillators.push(osc, vib);
      }
      formants.forEach((f, i) => {
        const bp = audioCtx.createBiquadFilter(); bp.type = 'peaking';
        bp.frequency.value = f; bp.Q.value = 5 + i * 3; bp.gain.value = 8 - i * 2;
        g.connect(bp); bp.connect(filterNode);
      });
      g.gain.linearRampToValueAtTime(vol * 0.2, t + 0.3);
      g.gain.setTargetAtTime(vol * 0.18, t + 0.4, 2);
      return { gainNode: g, oscillators, releaseTime: 0.5 };
    }
    case 13: { // Pluck Synth — short filter sweep
      const o1 = audioCtx.createOscillator(); o1.type = 'sawtooth'; o1.frequency.value = freq;
      const o2 = audioCtx.createOscillator(); o2.type = 'square'; o2.frequency.value = freq * 2;
      const o2g = audioCtx.createGain(); o2g.gain.value = 0.2;
      const lpf = audioCtx.createBiquadFilter(); lpf.type = 'lowpass';
      lpf.frequency.setValueAtTime(freq * 15, t);
      lpf.frequency.exponentialRampToValueAtTime(freq * 1.5, t + 0.15);
      lpf.Q.value = 3;
      o1.connect(lpf); o2.connect(o2g); o2g.connect(lpf); lpf.connect(g);
      o1.start(t); o2.start(t);
      g.gain.linearRampToValueAtTime(vol * 0.5, t + 0.002);
      g.gain.setTargetAtTime(vol * 0.1, t + 0.01, 0.2);
      g.gain.setTargetAtTime(0.001, t + 1, 0.3);
      return { gainNode: g, oscillators: [o1, o2], releaseTime: 0.1 };
    }
    case 14: { // Drums
      return playDrumSound('kick', vol);
    }
  }
  return { gainNode: g, oscillators, releaseTime: 0.3 };
}

// ========== DRUM SOUNDS ==========
function playDrumSound(type, vol = 0.8) {
  initAudio();
  if (audioCtx.state === 'suspended') audioCtx.resume();
  const t = audioCtx.currentTime;
  const g = audioCtx.createGain(); g.connect(filterNode);
  const oscillators = [];

  switch(type) {
    case 'kick': {
      const osc = audioCtx.createOscillator(); osc.type = 'sine';
      osc.frequency.setValueAtTime(160, t);
      osc.frequency.exponentialRampToValueAtTime(35, t + 0.12);
      // Sub thump
      const sub = audioCtx.createOscillator(); sub.type = 'sine';
      sub.frequency.value = 50;
      const subG = audioCtx.createGain();
      subG.gain.setValueAtTime(vol * 0.6, t);
      subG.gain.exponentialRampToValueAtTime(0.01, t + 0.15);
      sub.connect(subG); subG.connect(g);
      osc.connect(g); osc.start(t); osc.stop(t + 0.3); sub.start(t); sub.stop(t + 0.2);
      g.gain.setValueAtTime(vol, t);
      g.gain.exponentialRampToValueAtTime(0.01, t + 0.3);
      oscillators.push(osc, sub); break;
    }
    case 'snare': {
      const osc = audioCtx.createOscillator(); osc.type = 'sine'; osc.frequency.value = 200;
      osc.connect(g); osc.start(t); osc.stop(t + 0.15);
      const bufSz = audioCtx.sampleRate * 0.2;
      const buf = audioCtx.createBuffer(1, bufSz, audioCtx.sampleRate);
      const data = buf.getChannelData(0);
      for (let i = 0; i < bufSz; i++) data[i] = Math.random() * 2 - 1;
      const noise = audioCtx.createBufferSource(); noise.buffer = buf;
      const ng = audioCtx.createGain();
      ng.gain.setValueAtTime(vol * 0.7, t);
      ng.gain.exponentialRampToValueAtTime(0.01, t + 0.2);
      const hp = audioCtx.createBiquadFilter(); hp.type = 'highpass'; hp.frequency.value = 1000;
      noise.connect(hp); hp.connect(ng); ng.connect(filterNode);
      noise.start(t); noise.stop(t + 0.2);
      g.gain.setValueAtTime(vol * 0.5, t);
      g.gain.exponentialRampToValueAtTime(0.01, t + 0.15);
      oscillators.push(osc); break;
    }
    case 'hihat': {
      const bufSz = audioCtx.sampleRate * 0.08;
      const buf = audioCtx.createBuffer(1, bufSz, audioCtx.sampleRate);
      const data = buf.getChannelData(0);
      for (let i = 0; i < bufSz; i++) data[i] = Math.random() * 2 - 1;
      const noise = audioCtx.createBufferSource(); noise.buffer = buf;
      const hp = audioCtx.createBiquadFilter(); hp.type = 'highpass'; hp.frequency.value = 7000;
      noise.connect(hp); hp.connect(g);
      noise.start(t); noise.stop(t + 0.08);
      g.gain.setValueAtTime(vol * 0.4, t);
      g.gain.exponentialRampToValueAtTime(0.01, t + 0.06);
      break;
    }
    case 'openhat': {
      const bufSz = audioCtx.sampleRate * 0.3;
      const buf = audioCtx.createBuffer(1, bufSz, audioCtx.sampleRate);
      const data = buf.getChannelData(0);
      for (let i = 0; i < bufSz; i++) data[i] = Math.random() * 2 - 1;
      const noise = audioCtx.createBufferSource(); noise.buffer = buf;
      const hp = audioCtx.createBiquadFilter(); hp.type = 'highpass'; hp.frequency.value = 6000;
      noise.connect(hp); hp.connect(g);
      noise.start(t); noise.stop(t + 0.3);
      g.gain.setValueAtTime(vol * 0.35, t);
      g.gain.exponentialRampToValueAtTime(0.01, t + 0.25);
      break;
    }
    case 'tom': {
      const osc = audioCtx.createOscillator(); osc.type = 'sine';
      osc.frequency.setValueAtTime(200, t);
      osc.frequency.exponentialRampToValueAtTime(80, t + 0.2);
      osc.connect(g); osc.start(t); osc.stop(t + 0.3);
      g.gain.setValueAtTime(vol * 0.7, t);
      g.gain.exponentialRampToValueAtTime(0.01, t + 0.25);
      oscillators.push(osc); break;
    }
    case 'crash': {
      const bufSz = audioCtx.sampleRate * 1.5;
      const buf = audioCtx.createBuffer(1, bufSz, audioCtx.sampleRate);
      const data = buf.getChannelData(0);
      for (let i = 0; i < bufSz; i++) data[i] = Math.random() * 2 - 1;
      const noise = audioCtx.createBufferSource(); noise.buffer = buf;
      const bp = audioCtx.createBiquadFilter(); bp.type = 'bandpass'; bp.frequency.value = 5000; bp.Q.value = 0.5;
      noise.connect(bp); bp.connect(g);
      noise.start(t); noise.stop(t + 1.5);
      g.gain.setValueAtTime(vol * 0.5, t);
      g.gain.exponentialRampToValueAtTime(0.01, t + 1.2);
      break;
    }
    case 'clap': {
      for (let i = 0; i < 3; i++) {
        const bufSz = audioCtx.sampleRate * 0.02;
        const buf = audioCtx.createBuffer(1, bufSz, audioCtx.sampleRate);
        const data = buf.getChannelData(0);
        for (let j = 0; j < bufSz; j++) data[j] = Math.random() * 2 - 1;
        const noise = audioCtx.createBufferSource(); noise.buffer = buf;
        const bp = audioCtx.createBiquadFilter(); bp.type = 'bandpass'; bp.frequency.value = 2500; bp.Q.value = 2;
        const cg = audioCtx.createGain();
        cg.gain.setValueAtTime(vol * 0.5, t + i * 0.015);
        cg.gain.exponentialRampToValueAtTime(0.01, t + i * 0.015 + 0.03);
        noise.connect(bp); bp.connect(cg); cg.connect(filterNode);
        noise.start(t + i * 0.015); noise.stop(t + i * 0.015 + 0.05);
      }
      const bufSz = audioCtx.sampleRate * 0.15;
      const buf = audioCtx.createBuffer(1, bufSz, audioCtx.sampleRate);
      const data = buf.getChannelData(0);
      for (let j = 0; j < bufSz; j++) data[j] = Math.random() * 2 - 1;
      const tail = audioCtx.createBufferSource(); tail.buffer = buf;
      const bp2 = audioCtx.createBiquadFilter(); bp2.type = 'bandpass'; bp2.frequency.value = 2500;
      tail.connect(bp2); bp2.connect(g);
      tail.start(t + 0.04); tail.stop(t + 0.2);
      g.gain.setValueAtTime(vol * 0.4, t + 0.04);
      g.gain.exponentialRampToValueAtTime(0.01, t + 0.18);
      break;
    }
    case 'rim': {
      const osc = audioCtx.createOscillator(); osc.type = 'sine';
      osc.frequency.setValueAtTime(800, t);
      osc.frequency.exponentialRampToValueAtTime(400, t + 0.02);
      osc.connect(g); osc.start(t); osc.stop(t + 0.05);
      g.gain.setValueAtTime(vol * 0.6, t);
      g.gain.exponentialRampToValueAtTime(0.01, t + 0.04);
      oscillators.push(osc); break;
    }
  }
  return { gainNode: g, oscillators, releaseTime: 0 };
}

// ========== KEYBOARD UI ==========
const WHITE_NOTES = ['C','D','E','F','G','A','B'];
const ALL_NOTES_IN_OCTAVE = ['C','C#','D','D#','E','F','F#','G','G#','A','A#','B'];
const BLACK_NOTE_SET = new Set(['C#','D#','F#','G#','A#']);

function buildKeyboard() {
  const container = document.getElementById('keyboard-container');
  container.innerHTML = '';
  const startOct = currentOctave;
  const endOct = currentOctave + 1;
  const whiteKeys = [];
  for (let oct = startOct; oct <= endOct; oct++) {
    WHITE_NOTES.forEach(n => whiteKeys.push({ note: n, octave: oct }));
  }
  whiteKeys.push({ note: 'C', octave: endOct + 1 });

  whiteKeys.forEach(k => {
    const div = document.createElement('div');
    div.className = 'white-key';
    div.dataset.note = k.note;
    div.dataset.octave = k.octave;
    const label = document.createElement('span');
    label.className = 'note-label';
    label.textContent = showLabels ? k.note + k.octave : '';
    div.appendChild(label);
    container.appendChild(div);
  });

  const totalWhite = whiteKeys.length;
  const keyWidth = 100 / totalWhite;
  let whiteIdx = 0;
  for (let oct = startOct; oct <= endOct; oct++) {
    for (let wn = 0; wn < WHITE_NOTES.length; wn++) {
      const sharpNote = WHITE_NOTES[wn] + '#';
      if (BLACK_NOTE_SET.has(sharpNote)) {
        const div = document.createElement('div');
        div.className = 'black-key';
        div.dataset.note = sharpNote;
        div.dataset.octave = oct;
        div.style.left = (whiteIdx + 0.65) * keyWidth + '%';
        div.style.width = keyWidth * 0.7 + '%';
        const label = document.createElement('span');
        label.className = 'note-label';
        label.textContent = showLabels ? sharpNote : '';
        div.appendChild(label);
        container.appendChild(div);
      }
      whiteIdx++;
    }
  }
  setupKeyboardEvents();
}

function setupKeyboardEvents() {
  const container = document.getElementById('keyboard-container');
  let activeTouches = new Map();

  function getKeyFromPoint(x, y) {
    const blacks = container.querySelectorAll('.black-key');
    for (const k of blacks) {
      const r = k.getBoundingClientRect();
      if (x >= r.left && x <= r.right && y >= r.top && y <= r.bottom) return k;
    }
    const whites = container.querySelectorAll('.white-key');
    for (const k of whites) {
      const r = k.getBoundingClientRect();
      if (x >= r.left && x <= r.right && y >= r.top && y <= r.bottom) return k;
    }
    return null;
  }

  function pressKey(el) {
    if (!el) return;
    el.classList.add('pressed');
    el.style.boxShadow = `0 0 15px ${INSTRUMENTS[currentInstrument].color}`;
    const note = el.dataset.note;
    const oct = parseInt(el.dataset.octave);
    if (currentInstrument === 14) {
      const drumMap = { C:'kick', D:'snare', E:'hihat', F:'tom', G:'crash', A:'clap', B:'rim' };
      playDrumSound(drumMap[note.replace('#','')] || 'kick');
    } else {
      playNote(note, oct);
    }
  }

  function releaseKey(el) {
    if (!el) return;
    el.classList.remove('pressed');
    el.style.boxShadow = '';
    const note = el.dataset.note;
    const oct = parseInt(el.dataset.octave);
    if (currentInstrument !== 14) releaseNote(note, oct);
  }

  container.addEventListener('touchstart', e => {
    e.preventDefault(); initAudio();
    for (const touch of e.changedTouches) {
      const el = getKeyFromPoint(touch.clientX, touch.clientY);
      if (el) { activeTouches.set(touch.identifier, el); pressKey(el); }
    }
  }, { passive: false });

  container.addEventListener('touchmove', e => {
    e.preventDefault();
    for (const touch of e.changedTouches) {
      const el = getKeyFromPoint(touch.clientX, touch.clientY);
      const prev = activeTouches.get(touch.identifier);
      if (el !== prev) {
        if (prev) releaseKey(prev);
        if (el) { activeTouches.set(touch.identifier, el); pressKey(el); }
        else activeTouches.delete(touch.identifier);
      }
    }
  }, { passive: false });

  container.addEventListener('touchend', e => {
    e.preventDefault();
    for (const touch of e.changedTouches) {
      const el = activeTouches.get(touch.identifier);
      if (el) releaseKey(el);
      activeTouches.delete(touch.identifier);
    }
  }, { passive: false });

  container.addEventListener('touchcancel', e => {
    for (const touch of e.changedTouches) {
      const el = activeTouches.get(touch.identifier);
      if (el) releaseKey(el);
      activeTouches.delete(touch.identifier);
    }
  });

  let mouseDown = false, mouseKey = null;
  container.addEventListener('mousedown', e => {
    e.preventDefault(); initAudio();
    mouseDown = true;
    const el = getKeyFromPoint(e.clientX, e.clientY);
    if (el) { mouseKey = el; pressKey(el); }
  });
  container.addEventListener('mousemove', e => {
    if (!mouseDown) return;
    const el = getKeyFromPoint(e.clientX, e.clientY);
    if (el !== mouseKey) {
      if (mouseKey) releaseKey(mouseKey);
      if (el) pressKey(el);
      mouseKey = el;
    }
  });
  document.addEventListener('mouseup', () => {
    if (mouseKey) releaseKey(mouseKey);
    mouseDown = false; mouseKey = null;
  });
}

// ========== CIRCLE PAD ==========
function buildCirclePad() {
  const area = document.getElementById('circle-pad-area');
  const notes = ALL_NOTES_IN_OCTAVE;
  const svg = document.createElementNS('http://www.w3.org/2000/svg', 'svg');
  svg.setAttribute('viewBox', '0 0 400 400');
  svg.classList.add('circle-pad-svg');

  // Two rings: inner (octave) and outer (octave+1)
  const rings = [
    { r: 80, oct: currentOctave, size: 28 },
    { r: 150, oct: currentOctave + 1, size: 32 }
  ];

  rings.forEach(ring => {
    notes.forEach((note, i) => {
      const angle = (i / 12) * Math.PI * 2 - Math.PI / 2;
      const cx = 200 + Math.cos(angle) * ring.r;
      const cy = 200 + Math.sin(angle) * ring.r;
      const isBlack = note.includes('#');

      const g = document.createElementNS('http://www.w3.org/2000/svg', 'g');
      g.classList.add('circle-note');
      g.dataset.note = note;
      g.dataset.octave = ring.oct;

      const circle = document.createElementNS('http://www.w3.org/2000/svg', 'circle');
      circle.setAttribute('cx', cx);
      circle.setAttribute('cy', cy);
      circle.setAttribute('r', ring.size / 2);
      circle.setAttribute('fill', isBlack ? '#1a1a2e' : '#1e293b');
      circle.setAttribute('stroke', isBlack ? '#4a4a6a' : '#334155');
      circle.setAttribute('stroke-width', '1.5');
      g.appendChild(circle);

      if (showLabels) {
        const text = document.createElementNS('http://www.w3.org/2000/svg', 'text');
        text.setAttribute('x', cx);
        text.setAttribute('y', cy);
        text.textContent = note + ring.oct;
        g.appendChild(text);
      }
      svg.appendChild(g);
    });
  });

  // Center label
  const ct = document.createElementNS('http://www.w3.org/2000/svg', 'text');
  ct.setAttribute('x', 200); ct.setAttribute('y', 200);
  ct.setAttribute('text-anchor', 'middle'); ct.setAttribute('dominant-baseline', 'central');
  ct.setAttribute('fill', 'var(--cyan)'); ct.setAttribute('font-size', '12');
  ct.setAttribute('font-family', 'var(--font)');
  ct.textContent = INSTRUMENTS[currentInstrument].short;
  svg.appendChild(ct);

  area.innerHTML = '';
  area.appendChild(svg);
  setupCirclePadEvents(svg);
}

function setupCirclePadEvents(svg) {
  const noteEls = svg.querySelectorAll('.circle-note');
  let activeCircleTouches = new Map();

  function pressCircle(el) {
    if (!el) return;
    el.classList.add('pressed');
    const note = el.dataset.note, oct = parseInt(el.dataset.octave);

  function getCircleFromPoint(x, y) {

    return null;
  }

  svg.addEventListener('touchstart', e => {
    e.preventDefault(); initAudio();
    for (const touch of e.changedTouches) {

  svg.addEventListener('touchmove', e => {
    e.preventDefault();
    for (const touch of e.changedTouches) {
      const el = getCircleFromPoint(touch.clientX, touch.clientY);
      const prev = activeCircleTouches.get(touch.identifier);
      if (el !== prev) {
        if (prev) releaseCircle(prev);
        if (el) { activeCircleTouches.set(touch.identifier, el); pressCircle(el); }
        else activeCircleTouches.delete(touch.identifier);
      }
    }
  }, { passive: false });

  svg.addEventListener('touchend', e => {
    e.preventDefault();
    for (const touch of e.changedTouches) {
      const el = activeCircleTouches.get(touch.identifier);
      if (el) releaseCircle(el);
      activeCircleTouches.delete(touch.identifier);
    }
  }, { passive: false });

  let mouseDown = false, mouseEl = null;
  svg.addEventListener('mousedown', e => {
    e.preventDefault(); initAudio();
    mouseDown = true;
    const el = getCircleFromPoint(e.clientX, e.clientY);
    if (el) { mouseEl = el; pressCircle(el); }
  });
  svg.addEventListener('mousemove', e => {
    if (!mouseDown) return;
    const el = getCircleFromPoint(e.clientX, e.clientY);
    if (el !== mouseEl) {
      if (mouseEl) releaseCircle(mouseEl);
      if (el) pressCircle(el);
      mouseEl = el;
    }
  });
  document.addEventListener('mouseup', () => {
    if (mouseEl) releaseCircle(mouseEl);
    mouseDown = false; mouseEl = null;
  });
}

// ========== HEX GRID ==========
function buildHexGrid() {
  const area = document.getElementById('hex-grid-area');
  const svg = document.createElementNS('http://www.w3.org/2000/svg', 'svg');
  svg.setAttribute('viewBox', '0 0 560 340');
  svg.classList.add('hex-grid-svg');

  // Hex isomorphic layout: rows shift by a musical interval
  // Each row up = +5 semitones (like a guitar string offset), each column right = +1 semitone
  const hexR = 22;
  const hexW = hexR * Math.sqrt(3);
  const hexH = hexR * 2;
  const cols = 12;
  const rows = 5;

  for (let row = 0; row < rows; row++) {
    for (let col = 0; col < cols; col++) {
      const x = 40 + col * hexW + (row % 2 ? hexW / 2 : 0);
      const y = 280 - row * (hexH * 0.75);
      const semitones = (rows - 1 - row) * 5 + col;
      const noteIdx = semitones % 12;
      const oct = currentOctave + Math.floor(semitones / 12);
      if (oct > 8) continue;
      const note = ALL_NOTES_IN_OCTAVE[noteIdx];
      const isBlack = note.includes('#');

      const g = document.createElementNS('http://www.w3.org/2000/svg', 'g');
      g.classList.add('hex-cell');
      g.dataset.note = note;
      g.dataset.octave = oct;

      // Hexagon points
      let points = '';
      for (let i = 0; i < 6; i++) {
        const angle = Math.PI / 6 + (Math.PI / 3) * i;
        const px = x + hexR * Math.cos(angle);
        const py = y + hexR * Math.sin(angle);
        points += `${px},${py} `;
      }
      const polygon = document.createElementNS('http://www.w3.org/2000/svg', 'polygon');
      polygon.setAttribute('points', points.trim());
      polygon.setAttribute('fill', isBlack ? '#1a1a2e' : '#1e293b');
      polygon.setAttribute('stroke', '#334155');
      polygon.setAttribute('stroke-width', '1');
      g.appendChild(polygon);

      if (showLabels) {
        const text = document.createElementNS('http://www.w3.org/2000/svg', 'text');
        text.setAttribute('x', x); text.setAttribute('y', y);
        text.textContent = note.replace('#', '#');
        g.appendChild(text);
      }
      svg.appendChild(g);
    }
  }

  area.innerHTML = '';
  area.appendChild(svg);
  setupHexEvents(svg);
}

  let activeTouches = new Map();

    const pt = svg.createSVGPoint();
    pt.x = x; pt.y = y;
    const svgPt = pt.matrixTransform(svg.getScreenCTM().inverse());
    let closest = null, closestDist = Infinity;
    cells.forEach(cell => {
      const poly = cell.querySelector('polygon');
      const pts = poly.getAttribute('points').split(' ');
      let cx = 0, cy = 0;
      pts.forEach(p => { const [px, py] = p.split(',').map(Number); cx += px; cy += py; });
      cx /= pts.length; cy /= pts.length;
      const dist = Math.hypot(svgPt.x - cx, svgPt.y - cy);
      if (dist < 22 && dist < closestDist) { closest = cell; closestDist = dist; }
    });
    return closest;
  }

  svg.addEventListener('touchstart', e => {
    e.preventDefault(); initAudio();
    for (const touch of e.changedTouches) {
      const el = getHexFromPoint(touch.clientX, touch.clientY);
      if (el) { activeTouches.set(touch.identifier, el); pressHex(el); }
    }
  }, { passive: false });

  svg.addEventListener('touchmove', e => {
    e.preventDefault();
    for (const touch of e.changedTouches) {
      const el = getHexFromPoint(touch.clientX, touch.clientY);
      const prev = activeTouches.get(touch.identifier);
      if (el !== prev) {
        if (prev) releaseHex(prev);
        if (el) { activeTouches.set(touch.identifier, el); pressHex(el); }
        else activeTouches.delete(touch.identifier);
      }
    }
  }, { passive: false });

  svg.addEventListener('touchend', e => {
    e.preventDefault();
    for (const touch of e.changedTouches) {
      const el = activeTouches.get(touch.identifier);
      if (el) releaseHex(el);
      activeTouches.delete(touch.identifier);
    }
  }, { passive: false });

  let mouseDown = false, mouseEl = null;
  svg.addEventListener('mousedown', e => {
    e.preventDefault(); initAudio();
    mouseDown = true;
    const el = getHexFromPoint(e.clientX, e.clientY);
    if (el) { mouseEl = el; pressHex(el); }
  });
  svg.addEventListener('mousemove', e => {
    if (!mouseDown) return;
    const el = getHexFromPoint(e.clientX, e.clientY);
    if (el !== mouseEl) {
      if (mouseEl) releaseHex(mouseEl);
      if (el) pressHex(el);
      mouseEl = el;
    }
  });
  document.addEventListener('mouseup', () => {
    if (mouseEl) releaseHex(mouseEl);
    mouseDown = false; mouseEl = null;
  });
}

// ========== AJ'S THEREMIN ==========
let thereminOsc = null, thereminGain = null, thereminVibLfo = null, thereminVibGain = null;
let thereminActive = false;
let thereminTrail = [];

function initTheremin() {
  initAudio();
  if (thereminOsc) return;
  thereminOsc = audioCtx.createOscillator();
  thereminOsc.type = document.getElementById('theremin-wave').value;
  thereminOsc.frequency.value = 440;

  // Sub oscillator
  const sub = audioCtx.createOscillator();
  sub.type = 'sine';
  sub.frequency.value = 220;

  thereminGain = audioCtx.createGain();
  thereminGain.gain.value = 0;
  thereminGain.connect(filterNode);

  const subGain = audioCtx.createGain();
  subGain.gain.value = 0.15;
  sub.connect(subGain);
  subGain.connect(thereminGain);

  thereminVibLfo = audioCtx.createOscillator();
  thereminVibLfo.type = 'sine';
  thereminVibLfo.frequency.value = 5.5;
  thereminVibGain = audioCtx.createGain();
  thereminVibGain.gain.value = 0;
  thereminVibLfo.connect(thereminVibGain);
  thereminVibGain.connect(thereminOsc.frequency);
  thereminVibGain.connect(sub.frequency);

  thereminOsc.connect(thereminGain);
  thereminOsc.start();
  sub.start();
  thereminVibLfo.start();

  // Store sub reference
  thereminOsc._sub = sub;
  thereminOsc._subGain = subGain;
}

function updateTheremin(x, y, padRect) {
  if (!thereminOsc || !thereminGain) return;
  const normX = Math.max(0, Math.min(1, (x - padRect.left) / padRect.width));
  const normY = Math.max(0, Math.min(1, 1 - (y - padRect.top) / padRect.height));

  const rangeOct = parseInt(document.getElementById('theremin-range').value);
  const baseFreq = NOTE_FREQS['C' + currentOctave] || 261.63;
  const freq = baseFreq * Math.pow(2, normX * rangeOct);

  const glide = parseInt(document.getElementById('theremin-glide').value) / 100;
  const glideTime = glide * 0.15;
  const vol = normY * parseFloat(document.getElementById('master-vol').value) / 100;

  thereminOsc.frequency.setTargetAtTime(freq, audioCtx.currentTime, Math.max(0.001, glideTime));
  if (thereminOsc._sub) {
    thereminOsc._sub.frequency.setTargetAtTime(freq / 2, audioCtx.currentTime, Math.max(0.001, glideTime));
  }
  thereminGain.gain.setTargetAtTime(vol * 0.4, audioCtx.currentTime, 0.02);

  const vibAmount = parseInt(document.getElementById('theremin-vibrato').value) / 100;
  thereminVibGain.gain.setTargetAtTime(freq * vibAmount * 0.02, audioCtx.currentTime, 0.02);

  // Update display
  document.getElementById('theremin-freq').textContent = Math.round(freq) + ' Hz';
  document.getElementById('theremin-note').textContent = freqToNoteName(freq);
  document.getElementById('theremin-vol').textContent = Math.round(normY * 100) + '%';

  // Update crosshair
  const ch = document.getElementById('theremin-crosshair');
  ch.style.display = 'block';
  ch.style.left = (x - padRect.left) + 'px';
  ch.style.top = (y - padRect.top) + 'px';

  // Trail for canvas
  thereminTrail.push({ x: normX, y: normY, t: Date.now() });
  if (thereminTrail.length > 200) thereminTrail.shift();
}

function stopTheremin() {
  if (thereminGain) {
    thereminGain.gain.setTargetAtTime(0, audioCtx.currentTime, 0.05);
  }
  thereminActive = false;
  document.getElementById('theremin-crosshair').style.display = 'none';
  document.getElementById('theremin-freq').textContent = '-- Hz';
  document.getElementById('theremin-note').textContent = '--';
  document.getElementById('theremin-vol').textContent = '--';
}

function setupTheremin() {
  const pad = document.getElementById('theremin-pad');

  pad.addEventListener('mousedown', e => {
    e.preventDefault();
    initTheremin();
    thereminActive = true;
    thereminOsc.type = document.getElementById('theremin-wave').value;
    updateTheremin(e.clientX, e.clientY, pad.getBoundingClientRect());
  });
  document.addEventListener('mousemove', e => {
    if (!thereminActive) return;
    updateTheremin(e.clientX, e.clientY, pad.getBoundingClientRect());
  });
  document.addEventListener('mouseup', () => {
    if (thereminActive) stopTheremin();
  });

  pad.addEventListener('touchstart', e => {
    e.preventDefault();
    initTheremin();
    thereminActive = true;
    thereminOsc.type = document.getElementById('theremin-wave').value;
    const touch = e.touches[0];
    updateTheremin(touch.clientX, touch.clientY, pad.getBoundingClientRect());
  }, { passive: false });
  pad.addEventListener('touchmove', e => {
    e.preventDefault();
    if (!thereminActive) return;
    const touch = e.touches[0];
    updateTheremin(touch.clientX, touch.clientY, pad.getBoundingClientRect());
  }, { passive: false });
  pad.addEventListener('touchend', e => {
    e.preventDefault();
    if (thereminActive) stopTheremin();
  }, { passive: false });

  document.getElementById('theremin-wave').addEventListener('change', function() {
    if (thereminOsc) thereminOsc.type = this.value;
  });

  // Draw theremin visuals
  drawThereminCanvas();
}

function drawThereminCanvas() {
  const canvas = document.getElementById('theremin-canvas');
  if (!canvas) return;
  const ctx = canvas.getContext('2d');
  const dpr = window.devicePixelRatio || 1;

  function draw() {
    requestAnimationFrame(draw);
    canvas.width = canvas.clientWidth * dpr;
    canvas.height = canvas.clientHeight * dpr;
    ctx.scale(dpr, dpr);
    const w = canvas.clientWidth, h = canvas.clientHeight;
    ctx.clearRect(0, 0, w, h);

    // Grid lines
    ctx.strokeStyle = 'rgba(0,212,255,0.05)';
    ctx.lineWidth = 0.5;
    for (let i = 0; i < 12; i++) {
      const x = (i / 12) * w;
      ctx.beginPath(); ctx.moveTo(x, 0); ctx.lineTo(x, h); ctx.stroke();
    }
    for (let i = 0; i < 5; i++) {
      const y = (i / 5) * h;
      ctx.beginPath(); ctx.moveTo(0, y); ctx.lineTo(w, y); ctx.stroke();
    }

    // Trail
    const now = Date.now();
    thereminTrail = thereminTrail.filter(p => now - p.t < 3000);
    if (thereminTrail.length > 1) {
      ctx.lineWidth = 2;
      ctx.lineCap = 'round';
      for (let i = 1; i < thereminTrail.length; i++) {
        const p = thereminTrail[i];
        const pp = thereminTrail[i - 1];
        const age = (now - p.t) / 3000;
        const alpha = (1 - age) * 0.6;
        ctx.strokeStyle = `rgba(255,102,0,${alpha})`;
        ctx.beginPath();
        ctx.moveTo(pp.x * w, (1 - pp.y) * h);
        ctx.lineTo(p.x * w, (1 - p.y) * h);
        ctx.stroke();
      }
    }

    // Antenna glow when active
    if (thereminActive && thereminTrail.length > 0) {
      const last = thereminTrail[thereminTrail.length - 1];
      const grd = ctx.createRadialGradient(last.x * w, (1 - last.y) * h, 0, last.x * w, (1 - last.y) * h, 60);
      grd.addColorStop(0, 'rgba(0,212,255,0.15)');
      grd.addColorStop(1, 'rgba(0,212,255,0)');
      ctx.fillStyle = grd;
      ctx.fillRect(0, 0, w, h);
    }
  }
  draw();
}

// ========== ARPEGGIATOR ==========
let arpTimer = null;
let arpNotes = [];
let arpIndex = 0;
let arpDirection = 1;
let arpCurrentNote = null;

function handleArpNote(note, octave) {
  const mode = document.getElementById('arp-mode').value;
  if (mode === 'off') return;
}

function startArpeggiator() {
  stopArpeggiator();
  const mode = document.getElementById('arp-mode').value;
  if (mode === 'off') return;

  const bpm = parseInt(document.getElementById('arp-bpm').value) || 140;
  const steps = parseInt(document.getElementById('arp-steps').value) || 1;

  // Build note sequence from current scale position
  const base = ALL_NOTES_IN_OCTAVE;
  const scaleNotes = [];
  // Major scale intervals: 0,2,4,5,7,9,11
  const intervals = [0, 2, 4, 5, 7, 9, 11];
  const rootIdx = ALL_NOTES_IN_OCTAVE.indexOf(ALL_NOTES_IN_OCTAVE[0]); // C

  for (let s = 0; s < steps; s++) {
    intervals.forEach(int => {
      const noteIdx = (int) % 12;
      scaleNotes.push({ note: ALL_NOTES_IN_OCTAVE[noteIdx], octave: currentOctave + s });
    });
  }

  arpNotes = scaleNotes;
  arpIndex = 0;
  arpDirection = 1;

  function tick() {
    if (arpNotes.length === 0) return;
    // Release previous
    if (arpCurrentNote) {
      releaseNote(arpCurrentNote.note, arpCurrentNote.octave);
      arpCurrentNote = null;
    }

    const n = arpNotes[arpIndex];
    playNote(n.note, n.octave);
    arpCurrentNote = n;

    // Advance
    if (mode === 'up') {
      arpIndex = (arpIndex + 1) % arpNotes.length;
    } else if (mode === 'down') {
      arpIndex = arpIndex <= 0 ? arpNotes.length - 1 : arpIndex - 1;
    } else if (mode === 'updown') {
      arpIndex += arpDirection;
      if (arpIndex >= arpNotes.length - 1) arpDirection = -1;
      if (arpIndex <= 0) arpDirection = 1;
    } else if (mode === 'random') {
      arpIndex = Math.floor(Math.random() * arpNotes.length);
    }

    // Auto-release after 80% of beat
    const beatMs = 60000 / bpm / 2;
    setTimeout(() => {
      if (arpCurrentNote === n) {
        releaseNote(n.note, n.octave);
        arpCurrentNote = null;
      }
    }, beatMs * 0.8);
  }

  const interval = 60000 / bpm / 2;
  tick();
  arpTimer = setInterval(tick, interval);
}

function stopArpeggiator() {
  if (arpTimer) clearInterval(arpTimer);
  arpTimer = null;
  if (arpCurrentNote) {
    releaseNote(arpCurrentNote.note, arpCurrentNote.octave);
    arpCurrentNote = null;
  }
}

document.getElementById('arp-mode').addEventListener('change', function() {
  if (this.value === 'off') stopArpeggiator();
  else startArpeggiator();
});
document.getElementById('arp-bpm').addEventListener('change', () => {
  if (document.getElementById('arp-mode').value !== 'off') startArpeggiator();
});
document.getElementById('arp-steps').addEventListener('change', () => {
  if (document.getElementById('arp-mode').value !== 'off') startArpeggiator();
});

// ========== VISUALIZER ==========
function startVisualizer() {
  const canvas = document.getElementById('visualizer-canvas');
  const ctx = canvas.getContext('2d');
  function draw() {
    requestAnimationFrame(draw);
    if (!analyser) return;
    const dpr = window.devicePixelRatio || 1;
    canvas.width = canvas.clientWidth * dpr;
    canvas.height = canvas.clientHeight * dpr;
    ctx.scale(dpr, dpr);
    const w = canvas.clientWidth, h = canvas.clientHeight;
    const bufLen = analyser.frequencyBinCount;
    const data = new Uint8Array(bufLen);
    analyser.getByteFrequencyData(data);
    ctx.clearRect(0, 0, w, h);
    const barCount = 64;
    const barW = w / barCount;
    const step = Math.floor(bufLen / barCount);
    for (let i = 0; i < barCount; i++) {
      const val = data[i * step] / 255;
      const barH = val * h;
      const hue = 190 + val * 30;
      ctx.fillStyle = `hsla(${hue}, 100%, 50%, ${0.3 + val * 0.7})`;
      ctx.fillRect(i * barW, h - barH, barW - 1, barH);
    }
    // VU Meter
    let sum = 0;
    for (let i = 0; i < bufLen; i++) sum += data[i];
    const avg = sum / bufLen / 255 * 100;
    const vuFill = document.getElementById('vu-fill');
    if (vuFill) vuFill.style.height = avg + '%';
  }
  draw();
}
