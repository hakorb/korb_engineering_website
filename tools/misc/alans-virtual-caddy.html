<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=5"/>
<title>Alan's Virtual Caddy — Korb Engineering</title>
<meta name="description" content="Virtual caddy with multiple golf courses. Hole-by-hole guide, club calculator, score tracker, and course tips."/>
<style>
:root{
  --bg:#f6f1e5;--panel:#fffdf6;--text:#14211a;--muted:#5a6b5e;
  --green:#1f5d3f;--green-dark:#16432d;--green-light:#e8f5ee;
  --gold:#c9a84c;--gold-light:#faf3dc;--red:#8f2f2f;--red-light:#fce8e8;
  --blue:#2a5d8f;--blue-light:#e4eef8;
  --border:#d4d0c4;--border-green:#2d4939;
  --shadow:0 4px 16px rgba(0,0,0,.1);--radius:14px;
  --base-font:17px;--button-h:52px;
  --nav-h:60px;
}
body.high-contrast{
  --bg:#0a0c0b;--panel:#111;--text:#f0fff4;--muted:#c8e6d0;
  --green:#2ef08a;--green-dark:#24b46a;--green-light:#1a2e22;
  --gold:#ffd866;--gold-light:#2a2510;--red:#ff6d6d;--red-light:#2e1111;
  --blue:#6db8ff;--blue-light:#112233;
  --border:#555;--border-green:#2ef08a;--shadow:none;
}
body.xl-text{--base-font:22px;--button-h:62px;--nav-h:70px;}
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:"Segoe UI","Helvetica Neue",Arial,sans-serif;font-size:var(--base-font);
  line-height:1.45;color:var(--text);background:var(--bg);
  padding-bottom:calc(var(--nav-h) + 20px);-webkit-tap-highlight-color:transparent;
  min-height:100vh;}
button,select,input{font:inherit;border:none;outline:none;}
input[type=number]{-moz-appearance:textfield;}
input::-webkit-outer-spin-button,input::-webkit-inner-spin-button{-webkit-appearance:none;margin:0;}

/* --- COURSE SELECT SCREEN --- */
.course-select-screen{min-height:100vh;display:flex;flex-direction:column;align-items:center;
  justify-content:flex-start;padding:20px 14px 40px;}
.course-select-header{text-align:center;margin-bottom:24px;}
.course-select-header .eyebrow{font-size:.7em;letter-spacing:2px;text-transform:uppercase;
  color:var(--gold);margin-bottom:4px;}
.course-select-header h1{font-size:clamp(28px,6vw,48px);font-weight:800;color:var(--green);line-height:1.1;}
.course-select-header .sub{font-size:.9em;color:var(--muted);margin-top:6px;}
.course-cards{display:flex;flex-direction:column;gap:16px;width:100%;max-width:560px;}
.course-card{background:var(--panel);border:2px solid var(--border);border-radius:var(--radius);
  padding:20px;cursor:pointer;transition:all .2s;box-shadow:var(--shadow);}
.course-card:hover,.course-card:focus{border-color:var(--green);transform:translateY(-2px);
  box-shadow:0 6px 24px rgba(0,0,0,.15);}
.course-card .cc-name{font-size:1.3em;font-weight:800;color:var(--green);margin-bottom:4px;}
.course-card .cc-loc{font-size:.85em;color:var(--muted);margin-bottom:10px;}
.course-card .cc-desc{font-size:.9em;line-height:1.5;margin-bottom:12px;}
.course-card .cc-stats{display:flex;gap:16px;flex-wrap:wrap;}
.course-card .cc-stat{text-align:center;}
.course-card .cc-stat .val{font-size:1.2em;font-weight:800;color:var(--green);}
.course-card .cc-stat .lbl{font-size:.7em;color:var(--muted);text-transform:uppercase;letter-spacing:.5px;}
.course-select-footer{margin-top:24px;font-size:.75em;color:var(--muted);text-align:center;}
.course-select-footer strong{color:var(--green-dark);}

/* --- HEADER --- */
.header{background:linear-gradient(135deg,var(--green),var(--green-dark));
  color:#fff;padding:16px 18px 14px;text-align:center;position:relative;}
.header .eyebrow{font-size:.7em;letter-spacing:2px;text-transform:uppercase;opacity:.8;margin-bottom:2px;}
.header h1{font-size:clamp(26px,5.5vw,44px);font-weight:800;line-height:1.1;margin:0;}
.header .sub{font-size:.85em;opacity:.9;margin-top:4px;font-weight:400;}
.header-controls{position:absolute;top:10px;right:12px;display:flex;gap:6px;}
.header-controls button{background:rgba(255,255,255,.18);color:#fff;border-radius:8px;
  width:36px;height:36px;font-size:16px;cursor:pointer;display:flex;align-items:center;justify-content:center;}
.header-controls button.active{background:var(--gold);color:#000;}
.change-course-btn{position:absolute;top:10px;left:12px;background:rgba(255,255,255,.18);
  color:#fff;border-radius:8px;padding:6px 10px;font-size:.72em;font-weight:600;
  cursor:pointer;letter-spacing:.3px;}
.change-course-btn:hover{background:rgba(255,255,255,.3);}

/* --- NAV --- */
.bottom-nav{position:fixed;bottom:0;left:0;right:0;height:var(--nav-h);
  background:var(--panel);border-top:2px solid var(--border);
  display:flex;z-index:100;box-shadow:0 -2px 12px rgba(0,0,0,.08);}
.bottom-nav button{flex:1;display:flex;flex-direction:column;align-items:center;
  justify-content:center;gap:2px;background:none;color:var(--muted);
  cursor:pointer;font-size:.65em;font-weight:600;letter-spacing:.3px;
  border-right:1px solid var(--border);transition:color .15s,background .15s;}
.bottom-nav button:last-child{border-right:none;}
.bottom-nav button .icon{font-size:22px;line-height:1;}
.bottom-nav button.active{color:var(--green);background:var(--green-light);}

/* --- TABS --- */
.tab{display:none;padding:14px 12px 24px;max-width:700px;margin:0 auto;width:100%;}
.tab.active{display:block;}

/* --- CARDS --- */
.card{background:var(--panel);border:1.5px solid var(--border);border-radius:var(--radius);
  padding:16px;margin-bottom:14px;box-shadow:var(--shadow);}
.card h2{font-size:1.15em;color:var(--green);margin-bottom:10px;display:flex;align-items:center;gap:8px;}
.card h3{font-size:1em;color:var(--green-dark);margin:12px 0 6px;}

/* --- HOLE NAV --- */
.hole-grid{display:grid;grid-template-columns:repeat(9,1fr);gap:4px;margin-bottom:14px;}
.hole-grid button{background:var(--green-light);color:var(--green);border-radius:8px;
  font-weight:700;font-size:.9em;padding:8px 0;cursor:pointer;transition:all .15s;}
.hole-grid button.active{background:var(--green);color:#fff;}
.hole-grid button.scored{background:var(--gold-light);border:1.5px solid var(--gold);}
.hole-grid button.active.scored{background:var(--green);color:#fff;}
.hole-arrows{display:flex;gap:10px;margin-bottom:14px;}
.hole-arrows button{flex:1;height:var(--button-h);border-radius:10px;font-weight:700;
  cursor:pointer;font-size:1em;background:var(--green);color:#fff;}
.hole-arrows button:disabled{opacity:.35;cursor:default;}

/* --- HOLE DETAIL --- */
.hole-header{display:flex;justify-content:space-between;align-items:baseline;flex-wrap:wrap;gap:6px;}
.hole-header .hole-num{font-size:1.6em;font-weight:900;color:var(--green);}
.hole-header .hole-par{font-size:1.1em;font-weight:700;}
.hole-header .hole-hdcp{font-size:.85em;color:var(--muted);}
.tee-table{width:100%;border-collapse:collapse;margin:10px 0;font-size:.9em;}
.tee-table th,.tee-table td{padding:6px 10px;text-align:center;border-bottom:1px solid var(--border);}
.tee-table th{font-weight:600;color:var(--muted);font-size:.8em;text-transform:uppercase;}
.tee-blue{color:#2a5d8f;font-weight:700;}
.tee-white{color:#555;font-weight:700;}
.tee-red{color:#8f2f2f;font-weight:700;}
.tip-box{padding:10px 12px;border-radius:10px;margin:8px 0;font-size:.92em;line-height:1.45;}
.tip-strategy{background:var(--green-light);border-left:4px solid var(--green);}
.tip-green{background:var(--blue-light);border-left:4px solid var(--blue);}
.tip-hazard{background:var(--red-light);border-left:4px solid var(--red);}
.tip-label{font-weight:700;font-size:.8em;text-transform:uppercase;letter-spacing:.5px;margin-bottom:3px;}

/* --- CLUB CALC --- */
.calc-row{display:flex;gap:8px;align-items:center;margin-bottom:10px;flex-wrap:wrap;}
.calc-row label{min-width:110px;font-weight:600;font-size:.9em;}
.calc-row input,.calc-row select{flex:1;min-width:80px;height:42px;border-radius:8px;
  border:1.5px solid var(--border);padding:0 10px;background:var(--panel);font-size:1em;}
.calc-result{background:var(--green);color:#fff;border-radius:var(--radius);
  padding:18px;text-align:center;margin:16px 0;}
.calc-result .dist{font-size:2em;font-weight:900;}
.calc-result .club{font-size:1.3em;font-weight:700;margin-top:4px;}
.calc-result .detail{font-size:.85em;opacity:.85;margin-top:6px;}

/* --- SCORECARD --- */
.score-input{display:flex;gap:6px;align-items:center;margin:6px 0;}
.score-input label{min-width:80px;font-size:.88em;font-weight:600;}
.score-input .stepper{display:flex;align-items:center;gap:0;}
.stepper button{width:40px;height:40px;border-radius:8px;background:var(--green-light);
  color:var(--green);font-size:1.3em;font-weight:700;cursor:pointer;}
.stepper span{width:44px;text-align:center;font-size:1.1em;font-weight:700;}
.score-summary{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin:12px 0;}
.score-summary .stat{background:var(--green-light);border-radius:10px;padding:10px;text-align:center;}
.score-summary .stat .val{font-size:1.5em;font-weight:900;color:var(--green);}
.score-summary .stat .lbl{font-size:.75em;color:var(--muted);text-transform:uppercase;letter-spacing:.5px;}
.toggle-row{display:flex;align-items:center;gap:10px;margin:6px 0;}
.toggle-row label{font-size:.88em;font-weight:600;min-width:80px;}
.toggle-btn{width:48px;height:28px;border-radius:14px;background:var(--border);
  position:relative;cursor:pointer;transition:background .2s;}
.toggle-btn.on{background:var(--green);}
.toggle-btn::after{content:'';position:absolute;top:3px;left:3px;width:22px;height:22px;
  border-radius:50%;background:#fff;transition:transform .2s;}
.toggle-btn.on::after{transform:translateX(20px);}
.round-history-item{padding:10px;border-bottom:1px solid var(--border);font-size:.9em;}
.round-history-item:last-child{border-bottom:none;}
.round-actions{display:flex;gap:8px;margin:12px 0;}
.round-actions button{flex:1;height:var(--button-h);border-radius:10px;font-weight:700;
  cursor:pointer;font-size:.95em;}
.btn-primary{background:var(--green);color:#fff;}
.btn-secondary{background:var(--green-light);color:var(--green);border:1.5px solid var(--green);}
.btn-danger{background:var(--red-light);color:var(--red);border:1.5px solid var(--red);}

/* --- TIPS --- */
.skill-tabs{display:flex;gap:4px;margin-bottom:12px;flex-wrap:wrap;}
.skill-tabs button{padding:8px 14px;border-radius:20px;font-size:.82em;font-weight:600;
  cursor:pointer;background:var(--green-light);color:var(--green);transition:all .15s;}
.skill-tabs button.active{background:var(--green);color:#fff;}
.tip-card{background:var(--green-light);border-radius:10px;padding:12px;margin-bottom:10px;font-size:.92em;}
.tip-card strong{color:var(--green-dark);}

/* --- HISTORY CAROUSEL --- */
.fact-carousel{position:relative;overflow:hidden;min-height:120px;}
.fact-slide{position:absolute;inset:0;padding:14px;display:flex;align-items:center;
  justify-content:center;text-align:center;font-size:.95em;line-height:1.5;
  opacity:0;transition:opacity .4s;}
.fact-slide.active{opacity:1;position:relative;}
.carousel-dots{display:flex;justify-content:center;gap:6px;margin-top:8px;}
.carousel-dots span{width:10px;height:10px;border-radius:50%;background:var(--border);cursor:pointer;}
.carousel-dots span.active{background:var(--green);}
.carousel-nav{display:flex;justify-content:center;gap:12px;margin-top:8px;}
.carousel-nav button{width:38px;height:38px;border-radius:50%;background:var(--green-light);
  color:var(--green);font-size:1.1em;cursor:pointer;}

/* --- WEATHER --- */
.weather-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px;}
.weather-stat{background:var(--green-light);border-radius:10px;padding:10px;text-align:center;}
.weather-stat .wval{font-size:1.3em;font-weight:800;color:var(--green);}
.weather-stat .wlbl{font-size:.72em;color:var(--muted);text-transform:uppercase;}
.playability{text-align:center;padding:12px;border-radius:10px;margin-top:8px;font-weight:700;}
.play-great{background:#d4edda;color:#155724;}
.play-good{background:#fff3cd;color:#856404;}
.play-poor{background:#f8d7da;color:#721c24;}

/* --- CLUB DISTANCE EDITOR --- */
.club-editor{font-size:.88em;}
.club-editor-row{display:flex;align-items:center;gap:6px;margin:4px 0;}
.club-editor-row label{min-width:90px;font-weight:600;}
.club-editor-row input{width:70px;height:34px;border-radius:6px;border:1.5px solid var(--border);
  padding:0 8px;text-align:center;}

/* --- HIDDEN UTILITY --- */
.hidden{display:none !important;}

@media(min-width:600px){
  .tab{padding:20px 16px 30px;}
  .hole-grid{grid-template-columns:repeat(9,1fr);}
}
@media(max-width:380px){
  .hole-grid{grid-template-columns:repeat(6,1fr);}
}
</style>
</head>
<body>

<!-- COURSE SELECTION SCREEN -->
<div id="courseSelectScreen" class="course-select-screen">
  <div class="course-select-header">
    <div class="eyebrow">Korb Engineering</div>
    <h1>Alan's Virtual Caddy</h1>
    <div class="sub">Select a course to get started</div>
  </div>
  <div class="course-cards" id="courseCards"></div>
  <div class="course-select-footer">Built by <strong>Korb Engineering</strong></div>
</div>

<!-- MAIN APP (hidden until course selected) -->
<div id="mainApp" class="hidden">

<!-- HEADER -->
<div class="header">
  <button class="change-course-btn" onclick="showCourseSelect()">&#9664; Courses</button>
  <div class="eyebrow">Korb Engineering</div>
  <h1>Alan's Virtual Caddy</h1>
  <div class="sub" id="headerSub"></div>
  <div class="header-controls">
    <button onclick="toggleContrast()" title="High contrast" id="btnContrast">&#9681;</button>
    <button onclick="toggleXL()" title="Extra-large text" id="btnXL">A+</button>
  </div>
</div>

<!-- TAB CONTENT -->
<div class="tab active" id="tabHoles"></div>
<div class="tab" id="tabCalc"></div>
<div class="tab" id="tabScore"></div>
<div class="tab" id="tabTips"></div>
<div class="tab" id="tabHistory"></div>

<!-- BOTTOM NAV -->
<nav class="bottom-nav">
  <button class="active" onclick="switchTab('Holes')" id="navHoles"><span class="icon">&#9971;</span>Holes</button>
  <button onclick="switchTab('Calc')" id="navCalc"><span class="icon">&#128207;</span>Club Calc</button>
  <button onclick="switchTab('Score')" id="navScore"><span class="icon">&#128221;</span>Scorecard</button>
  <button onclick="switchTab('Tips')" id="navTips"><span class="icon">&#128161;</span>Tips</button>
  <button onclick="switchTab('History')" id="navHistory"><span class="icon">&#127942;</span>History</button>
</nav>

</div><!-- /mainApp -->

function getCourse(){return COURSES[selectedCourseId];}
function getHoles(){return getCourse().holes;}

function loadState(){
  try{
    const cd = localStorage.getItem('avc_clubs');
    clubDistances = cd ? JSON.parse(cd) : {...DEFAULT_CLUBS};
    const r = localStorage.getItem('avc_rounds');
    rounds = r ? JSON.parse(r) : [];
    const p = localStorage.getItem('avc_prefs');
    if(p){prefs=JSON.parse(p);if(prefs.contrast)document.body.classList.add('high-contrast');if(prefs.xl)document.body.classList.add('xl-text');}
    const sd = localStorage.getItem('avc_current_score');
    if(sd) scoreData = JSON.parse(sd);
    const sc = localStorage.getItem('avc_selected_course');
    if(sc && COURSES[sc]) selectedCourseId = sc;
  }catch(e){clubDistances={...DEFAULT_CLUBS};}
}
function saveClubs(){try{localStorage.setItem('avc_clubs',JSON.stringify(clubDistances));}catch(e){}}

function saveRounds(){try{localStorage.setItem('avc_rounds',JSON.stringify(rounds));}catch(e){}}
function saveCurrentScore(){try{localStorage.setItem('avc_current_score',JSON.stringify(scoreData));}catch(e){}}

// ===================== COURSE SELECTION =====================
function renderCourseSelect(){
  const container = document.getElementById('courseCards');
  let html = '';
  for(const key of Object.keys(COURSES)){
    const c = COURSES[key];
    const holes = c.holes;
    const totalPar = holes.reduce((a,h)=>a+h.par,0);
    const totalBlue = holes.reduce((a,h)=>a+h.blue,0);
    const totalWhite = holes.reduce((a,h)=>a+h.white,0);
    html += `<div class="course-card" onclick="selectCourse('${key}')" tabindex="0" onkeydown="if(event.key==='Enter')selectCourse('${key}')">
      <div class="cc-name">${c.name}</div>
      <div class="cc-loc">${c.location}</div>
      <div class="cc-desc">${c.description}</div>
      <div class="cc-stats">
        <div class="cc-stat"><div class="val">${totalPar}</div><div class="lbl">Par</div></div>
        <div class="cc-stat"><div class="val">${totalBlue.toLocaleString()}</div><div class="lbl">Blue Yds</div></div>
        <div class="cc-stat"><div class="val">${totalWhite.toLocaleString()}</div><div class="lbl">White Yds</div></div>
        <div class="cc-stat"><div class="val">18</div><div class="lbl">Holes</div></div>
      </div>
    </div>`;
  }
  container.innerHTML = html;
}

function selectCourse(courseId){
  selectedCourseId = courseId;
  saveSelectedCourse();
  // Reset score data when switching courses
  const prevCourse = localStorage.getItem('avc_score_course');
  if(prevCourse !== courseId){
    scoreData = new Array(18).fill(null).map(()=>({strokes:0,putts:0,fir:false,gir:false}));
    saveCurrentScore();
    try{localStorage.setItem('avc_score_course',courseId);}catch(e){}
  }
  currentHole = 0;
  factIndex = 0;
  showMainApp();
}

function showMainApp(){
  const c = getCourse();
  document.getElementById('courseSelectScreen').classList.add('hidden');
  document.getElementById('mainApp').classList.remove('hidden');
  document.getElementById('headerSub').textContent = c.name + ' \u00B7 ' + c.location;
  document.body.style.paddingBottom = 'calc(var(--nav-h) + 20px)';
  switchTab('Holes');
}

function showCourseSelect(){
  document.getElementById('mainApp').classList.add('hidden');
  document.getElementById('courseSelectScreen').classList.remove('hidden');
  document.body.style.paddingBottom = '0';
  renderCourseSelect();
}

// ===================== NAV =====================
function switchTab(name){
  currentTab=name;
  document.querySelectorAll('.tab').forEach(t=>t.classList.remove('active'));
  document.querySelectorAll('.bottom-nav button').forEach(b=>b.classList.remove('active'));
  document.getElementById('tab'+name).classList.add('active');
  document.getElementById('nav'+name).classList.add('active');
  if(name==='Holes') renderHoles();
  else if(name==='Calc') renderCalc();
  else if(name==='Score') renderScore();
  else if(name==='Tips') renderTips();
  else if(name==='History') renderHistory();
  window.scrollTo(0,0);
}

function toggleContrast(){
  prefs.contrast=!prefs.contrast;
  document.body.classList.toggle('high-contrast');
  document.getElementById('btnContrast').classList.toggle('active',prefs.contrast);
  savePrefs();
}
function toggleXL(){
  prefs.xl=!prefs.xl;
  document.body.classList.toggle('xl-text');
  document.getElementById('btnXL').classList.toggle('active',prefs.xl);
  savePrefs();
}

  html+=`<div class="hole-arrows">
    <button ${currentHole===0?'disabled':''} onclick="currentHole--;renderHoles();">&#9664; Prev</button>
    <button ${currentHole===17?'disabled':''} onclick="currentHole++;renderHoles();">Next &#9654;</button>
  </div>`;
  html+=`<div class="card">
    <div class="hole-header">
      <span class="hole-num">Hole ${h.num}</span>
      <span class="hole-par">Par ${h.par}</span>
      <span class="hole-hdcp">HDCP ${h.hdcp}</span>
    </div>
    <table class="tee-table">
      <tr><th>Tee</th><th>Yards</th></tr>
      <tr><td class="tee-blue">&#9679; Blue</td><td class="tee-blue">${h.blue}</td></tr>
      <tr><td class="tee-white">&#9675; White</td><td class="tee-white">${h.white}</td></tr>
      <tr><td class="tee-red">&#9679; Red</td><td class="tee-red">${h.red}</td></tr>
    </table>
    <div class="tip-box tip-strategy"><div class="tip-label">&#127919; Strategy</div>${h.strategy}</div>
    <div class="tip-box tip-green"><div class="tip-label">&#127948; Green Notes</div>${h.green}</div>
    <div class="tip-box tip-hazard"><div class="tip-label">&#9888;&#65039; Hazards</div>${h.hazard}</div>
  </div>`;

  // Quick score entry for this hole
  const s = scoreData[currentHole];
  html+=`<div class="card"><h2>&#128221; Quick Score — Hole ${h.num}</h2>`;
  html+=makeStepper('Strokes',s.strokes,'strokes');
  html+=makeStepper('Putts',s.putts,'putts');
  html+=`<div class="toggle-row"><label>FIR</label><div class="toggle-btn ${s.fir?'on':''}" onclick="toggleScoreField(${currentHole},'fir')"></div></div>`;
  if(h.par>3) html+=``;
  html+=`<div class="toggle-row"><label>GIR</label><div class="toggle-btn ${s.gir?'on':''}" onclick="toggleScoreField(${currentHole},'gir')"></div></div>`;
  html+=`</div>`;

  document.getElementById('tabHoles').innerHTML=html;
}

function makeStepper(label,val,field){
  return `<div class="score-input"><label>${label}</label><div class="stepper">
    <button onclick="adjustScore(${currentHole},'${field}',-1)">-</button>
    <span>${val}</span>
    <button onclick="adjustScore(${currentHole},'${field}',1)">+</button>
  </div></div>`;
}

function adjustScore(hole,field,delta){
  scoreData[hole][field]=Math.max(0,scoreData[hole][field]+delta);
  saveCurrentScore();
  if(currentTab==='Holes') renderHoles();
  if(currentTab==='Score') renderScore();
}

function toggleScoreField(hole,field){
  scoreData[hole][field]=!scoreData[hole][field];
  saveCurrentScore();
  if(currentTab==='Holes') renderHoles();
  if(currentTab==='Score') renderScore();
}

// ===================== CLUB CALC =====================
function renderCalc(){
  let html=`<div class="card"><h2>&#128207; Club Recommendation</h2>
    <div class="calc-row"><label>Distance (yds)</label><input type="number" id="calcDist" value="150" min="0" max="600" inputmode="numeric"></div>
    <div class="calc-row"><label>Wind (mph)</label><input type="number" id="calcWind" value="0" min="0" max="50" inputmode="numeric">
      <select id="calcWindDir"><option value="0">None</option><option value="head">Headwind</option><option value="tail">Tailwind</option><option value="cross">Crosswind</option></select></div>
    <div class="calc-row"><label>Elevation</label><select id="calcElev"><option value="0">Level</option><option value="up">Uphill</option><option value="down">Downhill</option></select></div>
    <div class="calc-row"><label>Temp (&deg;F)</label><input type="number" id="calcTemp" value="75" min="20" max="120" inputmode="numeric"></div>
    <button class="btn-primary" style="width:100%;height:var(--button-h);border-radius:10px;font-weight:700;font-size:1em;margin-top:8px;" onclick="calculateClub()">Get Recommendation</button>
    <div id="calcResultArea"></div>
  </div>`;

  // Club distance editor
  html+=`<div class="card"><h2>&#9881;&#65039; Your Club Distances</h2>
    <p style="font-size:.85em;color:var(--muted);margin-bottom:10px;">Customize these to match your game. Distances are saved automatically.</p>
    <div class="club-editor">`;
  const clubNames = Object.keys(clubDistances);
  for(const c of clubNames){
    html+=`<div class="club-editor-row"><label>${c}</label><input type="number" value="${clubDistances[c]}" inputmode="numeric"
      onchange="clubDistances['${c}']=parseInt(this.value)||0;saveClubs();"> yds</div>`;
  }
  html+=`</div>
    <button class="btn-secondary" style="margin-top:10px;width:100%;height:40px;border-radius:8px;font-size:.9em;cursor:pointer;" onclick="clubDistances={...DEFAULT_CLUBS};saveClubs();renderCalc();">Reset to Defaults</button>
  </div>`;
  document.getElementById('tabCalc').innerHTML=html;
}

function calculateClub(){
  const dist = parseInt(document.getElementById('calcDist').value)||150;
  const wind = parseInt(document.getElementById('calcWind').value)||0;
  const windDir = document.getElementById('calcWindDir').value;
  const elev = document.getElementById('calcElev').value;
  const temp = parseInt(document.getElementById('calcTemp').value)||75;

  let adjusted = dist;
  if(windDir==='head') adjusted += wind * 1.0;
  else if(windDir==='tail') adjusted -= wind * 0.7;
  else if(windDir==='cross') adjusted += wind * 0.3;

  if(elev==='up') adjusted *= 1.05;
  else if(elev==='down') adjusted *= 0.93;

  adjusted += (temp - 75) * 0.2;
  adjusted = Math.round(adjusted);

  const clubs = Object.entries(clubDistances).sort((a,b)=>b[1]-a[1]);
  let bestClub = clubs[clubs.length-1][0];
  let bestDist = clubs[clubs.length-1][1];
  for(const [name,d] of clubs){
    if(d >= adjusted){bestClub=name;bestDist=d;}
    else break;
  }

  let detail = `Actual: ${dist} yds`;
  const factors = [];
  if(windDir==='head') factors.push(`+${wind} headwind`);
  if(windDir==='tail') factors.push(`-${Math.round(wind*0.7)} tailwind`);
  if(windDir==='cross') factors.push(`crosswind ${wind} mph`);
  if(elev==='up') factors.push('uphill +5%');
  if(elev==='down') factors.push('downhill -7%');
  if(temp!==75) factors.push(`${temp}&deg;F`);
  if(factors.length) detail += ' &middot; ' + factors.join(', ');

  document.getElementById('calcResultArea').innerHTML=`
    <div class="calc-result">
      <div class="dist">Plays Like ${adjusted} yds</div>
      <div class="club">${bestClub} (${bestDist} yds)</div>
      <div class="detail">${detail}</div>
    </div>`;
}

// ===================== SCORECARD =====================
function renderScore(){
  const HOLES = getHoles();
  let totalStrokes=0,totalPar=0,totalPutts=0,firCount=0,firEligible=0,girCount=0,holesPlayed=0;
  for(let i=0;i<18;i++){
    const s=scoreData[i], h=HOLES[i];
    if(s.strokes>0){
      holesPlayed++;totalStrokes+=s.strokes;totalPar+=h.par;totalPutts+=s.putts;
      if(h.par>=4){firEligible++;if(s.fir)firCount++;}
      if(s.gir)girCount++;
    }
  }
  const vspar = totalStrokes - totalPar;
  const vspStr = vspar===0?'E':(vspar>0?'+'+vspar:''+vspar);

  let html=`<div class="card"><h2>&#128221; Round Summary</h2>
    <div class="score-summary">
      <div class="stat"><div class="val">${totalStrokes||'\u2014'}</div><div class="lbl">Total</div></div>
      <div class="stat"><div class="val">${holesPlayed>0?vspStr:'\u2014'}</div><div class="lbl">vs Par</div></div>
      <div class="stat"><div class="val">${holesPlayed>0?totalPutts:'\u2014'}</div><div class="lbl">Putts</div></div>
      <div class="stat"><div class="val">${firEligible>0?Math.round(firCount/firEligible*100)+'%':'\u2014'}</div><div class="lbl">FIR</div></div>
      <div class="stat"><div class="val">${holesPlayed>0?Math.round(girCount/holesPlayed*100)+'%':'\u2014'}</div><div class="lbl">GIR</div></div>
      <div class="stat"><div class="val">${holesPlayed>0?(totalPutts/holesPlayed).toFixed(1):'\u2014'}</div><div class="lbl">Putts/Hole</div></div>
    </div></div>`;

  html+=`<div class="card"><h2>Hole-by-Hole</h2><table class="tee-table" style="font-size:.85em;">
    <tr><th>Hole</th><th>Par</th><th>Score</th><th>+/-</th><th>Putts</th></tr>`;
  for(let i=0;i<18;i++){
    const h=HOLES[i],s=scoreData[i];
    const diff = s.strokes>0 ? s.strokes-h.par : '';
    const diffStr = diff===''?'\u2014':diff===0?'E':diff>0?'+'+diff:''+diff;
    const diffColor = diff<0?'color:var(--green)':diff>0?'color:var(--red)':'';
    html+=`<tr style="cursor:pointer;" onclick="currentHole=${i};switchTab('Holes');">
      <td><strong>${i+1}</strong></td><td>${h.par}</td>
      <td><strong>${s.strokes||'\u2014'}</strong></td>
      <td style="${diffColor}">${diffStr}</td>
      <td>${s.strokes>0?s.putts:'\u2014'}</td></tr>`;
  }
  html+=`</table></div>`;

  html+=`<div class="round-actions">
    <button class="btn-primary" onclick="saveRound()">Save Round</button>
    <button class="btn-danger" onclick="if(confirm('Clear all scores for this round?')){scoreData=new Array(18).fill(null).map(()=>({strokes:0,putts:0,fir:false,gir:false}));saveCurrentScore();renderScore();}">New Round</button>
  </div>`;

  if(rounds.length>0){
    html+=`<div class="card"><h2>&#128197; Round History</h2>`;
    for(let i=rounds.length-1;i>=0;i--){
      const r=rounds[i];
      const courseLabel = r.course ? (COURSES[r.course] ? COURSES[r.course].name : r.course) : 'Unknown';
      html+=`<div class="round-history-item">
        <strong>${r.date}</strong> &mdash; ${courseLabel}<br>
        Score: ${r.total} (${r.vspar}) &middot; ${r.holesPlayed} holes &middot; ${r.putts} putts
        <br><span style="font-size:.8em;color:var(--muted);">FIR: ${r.fir} &middot; GIR: ${r.gir}</span>
      </div>`;
    }
    html+=`<button class="btn-danger" style="width:100%;height:38px;border-radius:8px;font-size:.85em;margin-top:8px;cursor:pointer;" onclick="if(confirm('Delete all round history?')){rounds=[];saveRounds();renderScore();}">Clear History</button>`;
    html+=`</div>`;
  }

  document.getElementById('tabScore').innerHTML=html;
}

function saveRound(){
  const HOLES = getHoles();
  let totalStrokes=0,totalPar=0,totalPutts=0,firCount=0,firEligible=0,girCount=0,holesPlayed=0;
  for(let i=0;i<18;i++){
    const s=scoreData[i],h=HOLES[i];
    if(s.strokes>0){holesPlayed++;totalStrokes+=s.strokes;totalPar+=h.par;totalPutts+=s.putts;
      if(h.par>=4){firEligible++;if(s.fir)firCount++;}
      if(s.gir)girCount++;}
  }
  if(holesPlayed===0){alert('No scores entered yet.');return;}
  const vspar=totalStrokes-totalPar;
  const vspStr=vspar===0?'E':(vspar>0?'+'+vspar:''+vspar);
  const now=new Date();
  const dateStr=now.toLocaleDateString('en-US',{month:'short',day:'numeric',year:'numeric'});
  rounds.push({
    date:dateStr,total:totalStrokes,vspar:vspStr,holesPlayed:holesPlayed,
    putts:totalPutts,fir:firEligible>0?Math.round(firCount/firEligible*100)+'%':'N/A',
    gir:holesPlayed>0?Math.round(girCount/holesPlayed*100)+'%':'N/A',
    scores:scoreData.map(s=>({...s})),
    course:selectedCourseId
  });
  saveRounds();
  scoreData=new Array(18).fill(null).map(()=>({strokes:0,putts:0,fir:false,gir:false}));
  saveCurrentScore();
  alert('Round saved!');
  renderScore();
}

// ===================== TIPS TAB =====================
function renderTips(){
  const course = getCourse();
  const HOLES = course.holes;
  let html = `<div class="card"><h2>&#128161; Course Tips & Strategy</h2>
    <div class="skill-tabs">
      <button class="${tipsLevel==='all'?'active':''}" onclick="tipsLevel='all';renderTips();">All</button>
      <button class="${tipsLevel==='beg'?'active':''}" onclick="tipsLevel='beg';renderTips();">Beginner</button>
      <button class="${tipsLevel==='int'?'active':''}" onclick="tipsLevel='int';renderTips();">Intermediate</button>
      <button class="${tipsLevel==='adv'?'active':''}" onclick="tipsLevel='adv';renderTips();">Advanced</button>
    </div>`;

  const tips = course.tips;
  const show = tipsLevel==='all' ? [...tips.all,...tips.beg,...tips.int,...tips.adv] : tips[tipsLevel];
  for(const tip of show){
    const badge = tip.level==='beg'?'Beginner':tip.level==='int'?'Intermediate':tip.level==='adv'?'Advanced':'General';
    html+=`<div class="tip-card"><strong>${badge}:</strong> ${tip.t}</div>`;
  }
  html+=`</div>`;

  // Trickiest holes
  html+=`<div class="card"><h2>&#127919; Trickiest Holes</h2>`;
  for(const t of course.trickiest){
    const h = HOLES[t.hole-1];
    html+=`<div class="tip-card"><strong>Hole ${t.hole} (HDCP ${h.hdcp}, Par ${h.par}, ${h.blue} yds):</strong> ${t.text}</div>`;
  }
  html+=`</div>`;

  // Weather
  html+=`<div class="card"><h2>&#127780; Course Conditions</h2>
    <p style="font-size:.85em;color:var(--muted);margin-bottom:10px;">Enter current conditions to factor into club selection.</p>
    <div class="calc-row"><label>Temp (&deg;F)</label><input type="number" id="wxTemp" value="${weatherData.temp}" placeholder="75" inputmode="numeric" onchange="weatherData.temp=this.value;updateWeather();"></div>
    <div class="calc-row"><label>Wind (mph)</label><input type="number" id="wxWind" value="${weatherData.wind}" placeholder="10" inputmode="numeric" onchange="weatherData.wind=this.value;updateWeather();">
      <select id="wxDir" onchange="weatherData.windDir=this.value;updateWeather();">
        <option value="">Dir</option><option value="N" ${weatherData.windDir==='N'?'selected':''}>N</option><option value="NE" ${weatherData.windDir==='NE'?'selected':''}>NE</option>
        <option value="E" ${weatherData.windDir==='E'?'selected':''}>E</option><option value="SE" ${weatherData.windDir==='SE'?'selected':''}>SE</option>
        <option value="S" ${weatherData.windDir==='S'?'selected':''}>S</option><option value="SW" ${weatherData.windDir==='SW'?'selected':''}>SW</option>
        <option value="W" ${weatherData.windDir==='W'?'selected':''}>W</option><option value="NW" ${weatherData.windDir==='NW'?'selected':''}>NW</option>
      </select></div>
    <div class="calc-row"><label>Humidity (%)</label><input type="number" id="wxHum" value="${weatherData.humidity}" placeholder="50" inputmode="numeric" onchange="weatherData.humidity=this.value;updateWeather();"></div>
    <div id="weatherDisplay"></div>
  </div>`;

  document.getElementById('tabTips').innerHTML=html;
  updateWeather();
}

function updateWeather(){
  const t=parseInt(weatherData.temp)||0, w=parseInt(weatherData.wind)||0, h=parseInt(weatherData.humidity)||0;
  if(!t&&!w&&!h){const el=document.getElementById('weatherDisplay');if(el)el.innerHTML='';return;}
  let score=100;
  if(w>20)score-=30; else if(w>10)score-=15; else if(w>5)score-=5;
  if(t<50)score-=20; else if(t<60)score-=10; else if(t>95)score-=15;
  if(h>85)score-=10;
  score=Math.max(0,Math.min(100,score));
  const cls=score>=70?'play-great':score>=40?'play-good':'play-poor';
  const lbl=score>=70?'Great conditions':score>=40?'Moderate conditions':'Tough conditions';

  let html=`<div class="weather-grid" style="margin-top:12px;">`;
  if(t)html+=`<div class="weather-stat"><div class="wval">${t}&deg;F</div><div class="wlbl">Temperature</div></div>`;
  if(w)html+=`<div class="weather-stat"><div class="wval">${w} mph ${weatherData.windDir||''}</div><div class="wlbl">Wind</div></div>`;
  if(h)html+=`<div class="weather-stat"><div class="wval">${h}%</div><div class="wlbl">Humidity</div></div>`;
  html+=`<div class="weather-stat"><div class="wval">${score}</div><div class="wlbl">Play Score</div></div>`;
  html+=`</div><div class="playability ${cls}" style="margin-top:8px;">${lbl} &mdash; Playability: ${score}/100</div>`;
  const el=document.getElementById('weatherDisplay');
  if(el)el.innerHTML=html;
}

// ===================== HISTORY TAB =====================

  let html=`<div class="card"><h2>&#127942; ${course.name}</h2>

    html+=`<div class="fact-slide ${i===factIndex?'active':''}">${FACTS[i]}</div>`;
  }
  html+=`</div>
    <div class="carousel-dots" id="carouselDots">`;

      <tr><td style="font-weight:600;">Back 9</td><td>${HOLES.slice(9).reduce((a,h)=>a+h.blue,0)}</td><td>${HOLES.slice(9).reduce((a,h)=>a+h.white,0)}</td><td>${HOLES.slice(9).reduce((a,h)=>a+h.red,0)}</td></tr>
      <tr style="font-weight:700;"><td>Total</td><td>${HOLES.reduce((a,h)=>a+h.blue,0)}</td><td>${HOLES.reduce((a,h)=>a+h.white,0)}</td><td>${HOLES.reduce((a,h)=>a+h.red,0)}</td></tr>
      <tr><td style="font-weight:600;">Par</td><td colspan="3" style="text-align:center;">${HOLES.reduce((a,h)=>a+h.par,0)}</td></tr>
    </table>
  </div>`;

  document.getElementById('tabHistory').innerHTML=html;

if(selectedCourseId){

setInterval(()=>{if(currentTab==='History' && selectedCourseId){const FACTS=getCourse().facts;factIndex=(factIndex+1)%FACTS.length;renderHistory();}},6000);
