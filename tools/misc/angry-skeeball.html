<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
<meta name="description" content="Angry Skeeball — physics-based slingshot skeeball arcade game with 10 levels, 5 ball types, and neon visuals. Korb Engineering.">
<title>Angry Skeeball // Korb Engineering</title>
<link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&family=Chakra+Petch:wght@400;700&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/matter-js/0.19.0/matter.min.js"></script>
<style>
*{margin:0;padding:0;box-sizing:border-box}
html,body{width:100%;height:100dvh;overflow:hidden;background:#06060f;touch-action:none;user-select:none;-webkit-user-select:none;font-family:'Chakra Petch',sans-serif}
canvas#game{position:absolute;top:0;left:0;width:100%;height:100%}
#ui{position:absolute;top:0;left:0;width:100%;height:100%;pointer-events:none;font-family:'Press Start 2P',monospace;color:#fff}
#ui *{pointer-events:auto}
.screen{position:absolute;inset:0;display:none;flex-direction:column;align-items:center;justify-content:center;z-index:10}
.screen.active{display:flex}
.title-bg{position:absolute;inset:0;background:radial-gradient(ellipse at 50% 60%,rgba(0,229,255,.08) 0%,transparent 70%)}
.title-logo{font-size:clamp(22px,6vw,44px);color:#00e5ff;text-shadow:0 0 30px #00e5ff,0 0 60px #00e5ff,0 0 120px rgba(0,229,255,.3);text-align:center;line-height:1.5;margin-bottom:12px;animation:logoPulse 3s ease-in-out infinite;position:relative;z-index:2}
@keyframes logoPulse{0%,100%{text-shadow:0 0 30px #00e5ff,0 0 60px #00e5ff,0 0 120px rgba(0,229,255,.3);transform:scale(1)}50%{text-shadow:0 0 40px #00e5ff,0 0 80px #00e5ff,0 0 160px rgba(0,229,255,.5);transform:scale(1.02)}}
.title-sub{font-family:'Chakra Petch',sans-serif;font-size:clamp(11px,2.8vw,18px);color:#ff00ff;text-shadow:0 0 15px #ff00ff,0 0 30px rgba(255,0,255,.4);margin-bottom:40px;letter-spacing:4px;position:relative;z-index:2}
.title-ball{position:absolute;width:40px;height:40px;border-radius:50%;background:radial-gradient(circle at 35% 35%,#33f5ff,#00a0b0);box-shadow:0 0 20px #00e5ff,0 0 40px rgba(0,229,255,.3);animation:bounceBall 2s ease-in-out infinite;z-index:1}
@keyframes bounceBall{0%,100%{transform:translateY(0) rotate(0deg)}50%{transform:translateY(-60px) rotate(180deg)}}
.tap-start{font-size:clamp(10px,2.5vw,14px);color:#ffeb3b;animation:blink 1.2s ease-in-out infinite;position:relative;z-index:2}
@keyframes blink{0%,100%{opacity:1;text-shadow:0 0 10px #ffeb3b}50%{opacity:.3;text-shadow:none}}
.best-score{font-size:10px;color:#666;margin-top:24px;position:relative;z-index:2}
.btn{font-family:'Press Start 2P',monospace;font-size:clamp(9px,2vw,12px);padding:12px 24px;border:2px solid #00e5ff;background:rgba(0,229,255,.08);color:#00e5ff;border-radius:6px;cursor:pointer;min-height:44px;min-width:44px;text-align:center;margin:6px;transition:all .2s;text-shadow:0 0 8px currentColor;position:relative;overflow:hidden}
.btn::before{content:'';position:absolute;inset:0;background:linear-gradient(180deg,rgba(255,255,255,.05) 0%,transparent 50%);pointer-events:none}
.btn:active{transform:scale(.93);background:rgba(0,229,255,.2);box-shadow:0 0 20px rgba(0,229,255,.3)}
.btn.orange{border-color:#ff9900;color:#ff9900;background:rgba(255,153,0,.08)}
.btn.magenta{border-color:#ff00ff;color:#ff00ff;background:rgba(255,0,255,.08)}
.btn.green{border-color:#7cff00;color:#7cff00;background:rgba(124,255,0,.08)}
.level-grid{display:grid;grid-template-columns:repeat(5,1fr);gap:10px;padding:20px;max-width:420px;width:100%}
.level-btn{aspect-ratio:1;display:flex;flex-direction:column;align-items:center;justify-content:center;font-family:'Press Start 2P',monospace;font-size:14px;border:2px solid #00e5ff;background:rgba(0,229,255,.05);color:#00e5ff;border-radius:10px;cursor:pointer;min-height:52px;position:relative;transition:all .2s;text-shadow:0 0 6px #00e5ff}
.level-btn:active:not(.locked){transform:scale(.92);box-shadow:0 0 15px rgba(0,229,255,.4)}
.level-btn.locked{border-color:#222;color:#333;cursor:default;text-shadow:none}
.level-btn .stars{font-size:8px;margin-top:4px;color:#ffeb3b;text-shadow:0 0 4px #ffeb3b}
.level-btn.locked .stars{color:#222;text-shadow:none}
.hud{position:absolute;top:0;left:0;right:0;display:flex;justify-content:space-between;align-items:flex-start;padding:8px 12px;pointer-events:none;z-index:5}
.hud>*{pointer-events:auto}
.hud-score{font-size:clamp(14px,3.5vw,22px);color:#00e5ff;text-shadow:0 0 12px #00e5ff}
.hud-combo{font-size:clamp(10px,2vw,13px);color:#ff00ff;text-shadow:0 0 10px #ff00ff;margin-top:4px;transition:transform .15s}
.hud-combo.bump{animation:comboBump .3s ease-out}
@keyframes comboBump{0%{transform:scale(1.6)}100%{transform:scale(1)}}
.hud-level{font-size:10px;color:#555;margin-top:2px}
.hud-right{text-align:right}
.hud-wind{font-family:'Chakra Petch',sans-serif;font-size:11px;color:rgba(255,255,255,.5);margin-bottom:4px}
.hud-powerup{font-size:13px;background:rgba(0,0,0,.6);border:1px solid #ffeb3b;border-radius:6px;padding:4px 10px;margin-bottom:4px;text-shadow:0 0 6px #ffeb3b;animation:powerGlow 1s ease-in-out infinite}
@keyframes powerGlow{0%,100%{box-shadow:0 0 6px rgba(255,235,59,.3)}50%{box-shadow:0 0 16px rgba(255,235,59,.6)}}
.pause-btn{font-size:18px;background:none;border:none;color:#666;cursor:pointer;min-height:44px;min-width:44px;display:flex;align-items:center;justify-content:center}
.ball-queue{position:absolute;bottom:12px;left:12px;display:flex;gap:6px;align-items:center;z-index:5}
.ball-indicator{width:32px;height:32px;border-radius:50%;border:2px solid #444;display:flex;align-items:center;justify-content:center;font-size:11px;cursor:pointer;min-height:44px;min-width:44px;transition:all .2s;position:relative}
.ball-indicator.active{border-color:#00e5ff;box-shadow:0 0 12px #00e5ff;transform:scale(1.1)}
.ball-indicator.used{opacity:.2;pointer-events:none}
.ball-indicator .ball-icon{width:24px;height:24px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:10px}
.results-box{background:rgba(6,6,15,.96);border:2px solid #00e5ff;border-radius:14px;padding:28px;max-width:340px;width:90%;text-align:center;box-shadow:0 0 40px rgba(0,229,255,.15),inset 0 0 30px rgba(0,229,255,.03)}
.results-title{font-size:14px;color:#888;margin-bottom:4px}
.results-score{font-size:28px;color:#00e5ff;text-shadow:0 0 20px #00e5ff;margin:16px 0}
.results-stars{font-size:32px;margin:12px 0;text-shadow:0 0 10px #ffeb3b}
.results-breakdown{font-family:'Chakra Petch',sans-serif;font-size:13px;color:#999;text-align:left;margin:16px 0;line-height:2.2}
.results-breakdown span{float:right;color:#ccc}
.settings-panel{background:rgba(6,6,15,.96);border:2px solid #00e5ff;border-radius:14px;padding:28px;max-width:320px;width:90%;box-shadow:0 0 40px rgba(0,229,255,.15)}
.setting-row{display:flex;justify-content:space-between;align-items:center;margin:14px 0;font-family:'Chakra Petch',sans-serif;font-size:14px;color:#bbb}
.toggle{width:52px;height:28px;border-radius:14px;border:2px solid #00e5ff;background:rgba(0,0,0,.5);cursor:pointer;position:relative;min-height:44px;display:flex;align-items:center;padding:0 4px;transition:all .2s}
.toggle.on{background:rgba(0,229,255,.25);box-shadow:0 0 10px rgba(0,229,255,.3)}
.toggle::after{content:'';width:20px;height:20px;border-radius:50%;background:#00e5ff;transition:transform .2s;box-shadow:0 0 6px #00e5ff}
.toggle.on::after{transform:translateX(22px)}
.float-score{position:absolute;font-family:'Press Start 2P',monospace;pointer-events:none;z-index:100;animation:floatUp .9s ease-out forwards}
@keyframes floatUp{0%{opacity:1;transform:translateY(0) scale(1)}50%{opacity:1;transform:translateY(-30px) scale(1.2)}100%{opacity:0;transform:translateY(-70px) scale(0.8)}}
.screen-shake{animation:shake .15s ease-out}
@keyframes shake{0%,100%{transform:translate(0)}25%{transform:translate(-4px,2px)}50%{transform:translate(3px,-3px)}75%{transform:translate(-2px,1px)}}
.pause-overlay{position:absolute;inset:0;background:rgba(6,6,15,.85);display:none;flex-direction:column;align-items:center;justify-content:center;z-index:20}
.pause-overlay.active{display:flex}
.pause-title{font-size:clamp(16px,4vw,24px);color:#00e5ff;text-shadow:0 0 20px #00e5ff;margin-bottom:30px}
</style>
</head>
<body>
<canvas id="game"></canvas>
<div id="ui">
  <div class="screen active" id="screen-title">
    <div class="title-bg"></div>
    <div class="title-ball" id="title-ball" style="left:calc(50% - 20px);top:38%"></div>
    <div class="title-logo">ANGRY<br>SKEEBALL</div>
    <div class="title-sub">PHYSICS ARCADE</div>
    <div class="tap-start" id="tap-start">TAP TO START</div>
    <div class="best-score" id="best-score"></div>
  </div>
  <div class="screen" id="screen-levels">
    <div style="font-size:clamp(12px,3vw,18px);color:#00e5ff;margin-bottom:16px;text-shadow:0 0 12px #00e5ff">SELECT LEVEL</div>
    <div class="level-grid" id="level-grid"></div>
    <button class="btn" id="btn-back-title" style="margin-top:16px">BACK</button>
  </div>
  <div class="screen" id="screen-game">
    <div class="hud">
      <div>
        <div class="hud-score" id="hud-score">0</div>
        <div class="hud-combo" id="hud-combo"></div>
        <div class="hud-level" id="hud-level"></div>
      </div>
      <div class="hud-right">
        <div class="hud-wind" id="hud-wind"></div>
        <div class="hud-powerup" id="hud-powerup" style="display:none"></div>

  </div>
  <div class="screen" id="screen-results">
    <div class="results-box">
      <div class="results-title">LEVEL COMPLETE</div>
      <div class="results-score" id="results-score">0</div>
      <div class="results-stars" id="results-stars"></div>
      <div class="results-breakdown" id="results-breakdown"></div>
      <div style="display:flex;gap:8px;justify-content:center;flex-wrap:wrap">
        <button class="btn" id="btn-retry">RETRY</button>
        <button class="btn orange" id="btn-next">NEXT</button>

  <div class="screen" id="screen-settings">

      <div style="font-size:12px;color:#00e5ff;text-align:center;margin-bottom:18px;text-shadow:0 0 8px #00e5ff">SETTINGS</div>
      <div class="setting-row">Sound <div class="toggle" id="toggle-sound"></div></div>
      <div class="setting-row">Haptics <div class="toggle" id="toggle-haptics"></div></div>

    <button class="btn magenta" id="btn-pause-quit" style="margin:6px">QUIT</button>

</div>

<script>
(function(){
'use strict';

// ===================== STORAGE =====================
const Store = {
  getProgress(){ try{return JSON.parse(localStorage.getItem('as_level_progress'))||[];}catch{return[];} },
  saveProgress(p){ localStorage.setItem('as_level_progress',JSON.stringify(p)); },
  getSettings(){ try{return JSON.parse(localStorage.getItem('as_settings'))||{muted:false,haptics:true};}catch{return{muted:false,haptics:true};} },
  saveSettings(s){ localStorage.setItem('as_settings',JSON.stringify(s)); },
  getTotal(){ return parseInt(localStorage.getItem('as_total_score'))||0; },
  saveTotal(s){ localStorage.setItem('as_total_score',String(s)); }
};

// ===================== AUDIO ENGINE =====================
const SFX = {
  ctx:null, muted:false, masterGain:null,
  init(){
    if(this.ctx)return;
    this.ctx=new(window.AudioContext||window.webkitAudioContext)();
    this.masterGain=this.ctx.createGain();
    this.masterGain.gain.value=0.6;
    this.masterGain.connect(this.ctx.destination);
    this.muted=Store.getSettings().muted;
  },
  resume(){ if(this.ctx&&this.ctx.state==='suspended')this.ctx.resume(); },
  play(fn){
    if(this.muted||!this.ctx)return;
    try{fn(this.ctx,this.masterGain);}catch(e){}
  },
  stretch(pct){
    this.play((c,m)=>{
      const o=c.createOscillator(),g=c.createGain();
      o.type='sine';o.frequency.value=180+pct*500;
      g.gain.setValueAtTime(0.15,c.currentTime);
      g.gain.exponentialRampToValueAtTime(0.001,c.currentTime+0.06);
      o.connect(g);g.connect(m);
      o.start();o.stop(c.currentTime+0.06);
    });
  },
  launch(){
    this.play((c,m)=>{
      const buf=c.createBuffer(1,c.sampleRate*0.18,c.sampleRate);
      const d=buf.getChannelData(0);
      for(let i=0;i<d.length;i++){
        const t=i/d.length;
        d[i]=(Math.random()*2-1)*Math.pow(1-t,1.5)*0.8+(Math.sin(t*200)*0.3*(1-t));
      }
      const s=c.createBufferSource(),g=c.createGain();
      s.buffer=buf;g.gain.value=0.5;
      s.connect(g);g.connect(m);s.start();
    });
  },
  ringHit(tier){
    this.play((c,m)=>{
      const freqs={10:440,20:554,30:659,50:880,100:1175};
      const base=freqs[tier]||660;
      [base,base*1.25,base*1.5].forEach((f,i)=>{
        const o=c.createOscillator(),g=c.createGain();
        o.type=i===0?'triangle':'sine';
        o.frequency.value=f;
        const t0=c.currentTime+i*0.06;
        g.gain.setValueAtTime(i===0?0.3:0.12,t0);
        g.gain.exponentialRampToValueAtTime(0.001,t0+0.5);
        o.connect(g);g.connect(m);
        o.start(t0);o.stop(t0+0.5);
      });
    });
  },
  gutter(){
    this.play((c,m)=>{
      const o=c.createOscillator(),g=c.createGain();
      o.type='sawtooth';
      o.frequency.setValueAtTime(350,c.currentTime);
      o.frequency.exponentialRampToValueAtTime(80,c.currentTime+0.6);
      g.gain.setValueAtTime(0.18,c.currentTime);
      g.gain.exponentialRampToValueAtTime(0.001,c.currentTime+0.6);
      o.connect(g);g.connect(m);
      o.start();o.stop(c.currentTime+0.6);
    });
  },
  combo(){
    this.play((c,m)=>{
      [523,659,784,1047,1318].forEach((f,i)=>{
        const o=c.createOscillator(),g=c.createGain();
        o.type='square';o.frequency.value=f;
        const t0=c.currentTime+i*0.07;
        g.gain.setValueAtTime(0.12,t0);
        g.gain.exponentialRampToValueAtTime(0.001,t0+0.18);
        o.connect(g);g.connect(m);
        o.start(t0);o.stop(t0+0.18);
      });
    });
  },
  bigScore(){
    this.play((c,m)=>{
      for(let i=0;i<3;i++){
        const o=c.createOscillator(),g=c.createGain();
        o.type='sine';o.frequency.value=880*(1+i*0.5);
        const t0=c.currentTime+i*0.1;
        g.gain.setValueAtTime(0.2,t0);
        g.gain.exponentialRampToValueAtTime(0.001,t0+0.4);
        o.connect(g);g.connect(m);
        o.start(t0);o.stop(t0+0.4);
      }
    });
  },
  click(){
    this.play((c,m)=>{
      const o=c.createOscillator(),g=c.createGain();
      o.type='sine';o.frequency.value=800;
      g.gain.setValueAtTime(0.1,c.currentTime);
      g.gain.exponentialRampToValueAtTime(0.001,c.currentTime+0.05);
      o.connect(g);g.connect(m);
      o.start();o.stop(c.currentTime+0.05);
    });
  }
};

// ===================== LEVELS =====================
const LEVELS=[
  {id:1,balls:6,rampAngle:16,wind:0,obstacles:[],starThresholds:[100,200,350],ballTypes:['standard']},
  {id:2,balls:6,rampAngle:18,wind:0,obstacles:[],starThresholds:[150,300,500],ballTypes:['standard']},
  {id:3,balls:5,rampAngle:20,wind:0,obstacles:[],starThresholds:[180,380,550],ballTypes:['standard','heavy']},
  {id:4,balls:5,rampAngle:20,wind:0.00015,obstacles:[],starThresholds:[200,400,600],ballTypes:['standard','heavy']},
  {id:5,balls:5,rampAngle:22,wind:-0.0002,obstacles:[{type:'bumper',x:0.62,y:0.42}],starThresholds:[250,480,700],ballTypes:['standard','heavy','bouncy']},
  {id:6,balls:4,rampAngle:22,wind:0.00015,obstacles:[{type:'bumper',x:0.56,y:0.38}],starThresholds:[220,420,650],ballTypes:['standard','heavy','bouncy']},
  {id:7,balls:4,rampAngle:24,wind:-0.00025,obstacles:[{type:'bumper',x:0.58,y:0.42},{type:'blocker',x:0.68,y:0.3}],starThresholds:[250,500,750],ballTypes:['standard','heavy','bouncy','curve']},
  {id:8,balls:4,rampAngle:24,wind:0.0002,obstacles:[{type:'blocker',x:0.62,y:0.35}],starThresholds:[280,550,800],ballTypes:['standard','heavy','bouncy','curve']},
  {id:9,balls:3,rampAngle:26,wind:-0.0003,obstacles:[{type:'bumper',x:0.55,y:0.42},{type:'bumper',x:0.65,y:0.32}],starThresholds:[300,600,850],ballTypes:['standard','heavy','bouncy','curve','bomb']},
  {id:10,balls:3,rampAngle:28,wind:0.00025,obstacles:[{type:'blocker',x:0.58,y:0.38},{type:'bumper',x:0.68,y:0.28}],starThresholds:[320,650,950],ballTypes:['standard','heavy','bouncy','curve','bomb']}
];

const BALL_TYPES={
  standard:{label:'STD',emoji:'',color:'#00e5ff',mass:1,restitution:0.35,friction:0.3,desc:'Standard'},
  heavy:{label:'HVY',emoji:'',color:'#ff9900',mass:2.2,restitution:0.12,friction:0.5,desc:'Heavy'},
  bouncy:{label:'BNC',emoji:'',color:'#ff00ff',mass:0.65,restitution:0.88,friction:0.12,desc:'Bouncy'},
  curve:{label:'CRV',emoji:'',color:'#7cff00',mass:1,restitution:0.35,friction:0.3,desc:'Curve (tap!)'},
  bomb:{label:'BMB',emoji:'',color:'#ff3030',mass:1.3,restitution:0.25,friction:0.3,desc:'Bomb (tap!)'}
};

const RING_POINTS=[10,20,30,50,100];
const RING_COLORS=['#00e5ff','#00ff88','#ffeb3b','#ff9900','#ff00ff'];
const RING_GLOW=['rgba(0,229,255,','rgba(0,255,136,','rgba(255,235,59,','rgba(255,153,0,','rgba(255,0,255,'];

// ===================== GAME STATE =====================
let state='TITLE';
let canvas,ctx2d,W,H,dpr;
let engine,world;
let currentLevel=null,levelConfig=null;
let score=0,comboCount=0,levelThrows=0;
let ballsRemaining=[];
let selectedBallIdx=0;
let activeBall=null,ballBody=null;
let launched=false,settleTimer=0;
let rampBodies=[],ringZones=[],ringSensorBodies=[],obstacleBodies=[];
let powerUp=null,powerUpTimer=0,powerUpOrb=null;
let slingAnchor={x:0,y:0};
let pulling=false,pullPos={x:0,y:0};
let floatingScores=[],particles=[],bgStars=[],ballTrail=[];
let windParticles=[];
let settings=Store.getSettings();
let progress=Store.getProgress();
let shakeTimer=0,shakeIntensity=0;
let paused=false;
let frameTime=0;
let rampGeo=null; // cached ramp geometry for rendering

// Lane visual geometry (computed on build)
let laneVis={};

const {Engine,World,Bodies,Body,Events,Composite,Vector,Vertices}=Matter;

// ===================== CANVAS =====================
canvas=document.getElementById('game');
ctx2d=canvas.getContext('2d');

function resize(){
  dpr=Math.min(devicePixelRatio,2);
  W=canvas.width=window.innerWidth*dpr;
  H=canvas.height=window.innerHeight*dpr;
  canvas.style.width=window.innerWidth+'px';
  canvas.style.height=window.innerHeight+'px';
  ctx2d.setTransform(dpr,0,0,dpr,0,0);
  bgStars=[];
  for(let i=0;i<120;i++){
    bgStars.push({x:Math.random()*window.innerWidth,y:Math.random()*window.innerHeight,
      s:Math.random()*1.8+0.3,b:Math.random()*Math.PI*2,speed:Math.random()*0.008+0.003});
  }
}
window.addEventListener('resize',resize);
resize();

// ===================== PHYSICS =====================
function setupPhysics(){
  if(engine)Engine.clear(engine);
  engine=Engine.create({gravity:{x:0,y:0.8}});
  world=engine.world;
  rampBodies=[];ringZones=[];ringSensorBodies=[];obstacleBodies=[];
}

function buildLane(cfg){
  const w=window.innerWidth,h=window.innerHeight;
  const angle=cfg.rampAngle*Math.PI/180;

  // Slingshot position - bottom-left area
  slingAnchor={x:w*0.1,y:h*0.72};

  // Ramp geometry
  const rampStartX=w*0.32;
  const rampStartY=h*0.88;
  const rampLen=Math.min(w*0.62,h*0.8);
  const rampEndX=rampStartX+rampLen*Math.cos(-angle);
  const rampEndY=rampStartY+rampLen*Math.sin(-angle);
  const rampThick=14;
  const wallHeight=35;

  // Store lane visual geometry
  laneVis={
    startX:rampStartX,startY:rampStartY,
    endX:rampEndX,endY:rampEndY,
    len:rampLen,angle:angle,thick:rampThick,wallH:wallHeight,
    // Side wall normals
    nx:Math.sin(-angle),ny:Math.cos(-angle)
  };

  // Floor
  const floor=Bodies.rectangle(w/2,h+30,w*3,60,{isStatic:true,friction:0.9,label:'floor'});
  World.add(world,floor);rampBodies.push(floor);

  // Left wall
  const lw=Bodies.rectangle(-30,h/2,60,h*3,{isStatic:true,label:'wall'});
  World.add(world,lw);rampBodies.push(lw);

  // Right wall
  const rw=Bodies.rectangle(w+30,h/2,60,h*3,{isStatic:true,label:'wall'});
  World.add(world,rw);rampBodies.push(rw);

  // Main ramp surface
  const rampCX=rampStartX+(rampLen/2)*Math.cos(-angle);
  const rampCY=rampStartY+(rampLen/2)*Math.sin(-angle);
  const ramp=Bodies.rectangle(rampCX,rampCY,rampLen,rampThick,{
    isStatic:true,angle:-angle,friction:0.5,label:'ramp'
  });
  World.add(world,ramp);rampBodies.push(ramp);

  // Left side wall (lower side of ramp)
  const lwOffX=-laneVis.nx*wallHeight*0.5;
  const lwOffY=-laneVis.ny*wallHeight*0.5;
  const lWall=Bodies.rectangle(rampCX+lwOffX-laneVis.nx*(rampThick/2+wallHeight/2),
    rampCY+lwOffY-laneVis.ny*(rampThick/2+wallHeight/2),
    rampLen*0.95,8,{isStatic:true,angle:-angle,friction:0.3,label:'sideWall'});
  World.add(world,lWall);rampBodies.push(lWall);

  // Right side wall (upper side)
  const rWall=Bodies.rectangle(rampCX-lwOffX+laneVis.nx*(rampThick/2+wallHeight/2),
    rampCY-lwOffY+laneVis.ny*(rampThick/2+wallHeight/2),
    rampLen*0.95,8,{isStatic:true,angle:-angle,friction:0.3,label:'sideWall'});
  World.add(world,rWall);rampBodies.push(rWall);

  // Lip/backstop at top end
  const lipLen=wallHeight*2+rampThick;
  const lip=Bodies.rectangle(rampEndX+Math.cos(-angle)*15,rampEndY+Math.sin(-angle)*15,
    16,lipLen,{isStatic:true,angle:-angle+Math.PI/2,friction:0.3,restitution:0.5,label:'lip'});
  World.add(world,lip);rampBodies.push(lip);

  // Gutter wall at bottom of ramp
  const gutterWall=Bodies.rectangle(rampStartX-Math.cos(-angle)*10,rampStartY-Math.sin(-angle)*10,
    16,lipLen*0.8,{isStatic:true,angle:-angle+Math.PI/2,friction:0.3,label:'gutter'});
  World.add(world,gutterWall);rampBodies.push(gutterWall);

  // Curved lip bump before scoring zone (gives satisfying hop)
  const bumpT=0.25;
  const bumpX=rampStartX+bumpT*rampLen*Math.cos(-angle);
  const bumpY=rampStartY+bumpT*rampLen*Math.sin(-angle)-rampThick/2-3;
  const bump=Bodies.circle(bumpX,bumpY,6,{isStatic:true,friction:0.1,restitution:0.6,label:'bump'});
  World.add(world,bump);rampBodies.push(bump);

  // Scoring ring zones (sensors) - arranged as concentric arcs at top of ramp
  ringZones=[];ringSensorBodies=[];
  const ringCount=5;
  const scoringStart=0.4; // where scoring zones begin along ramp
  const scoringEnd=0.92;
  const zoneLen=(scoringEnd-scoringStart)*rampLen/ringCount;

  for(let i=0;i<ringCount;i++){
    const t=scoringStart+((i+0.5)/ringCount)*(scoringEnd-scoringStart);
    const zx=rampStartX+t*rampLen*Math.cos(-angle);
    const zy=rampStartY+t*rampLen*Math.sin(-angle);
    const zone=Bodies.rectangle(zx,zy,zoneLen*0.85,wallHeight+rampThick,{
      isStatic:true,isSensor:true,angle:-angle,label:'ring_'+i
    });
    zone.ringIndex=i;
    zone.points=RING_POINTS[i];
    zone.zoneT=t;
    World.add(world,zone);
    ringSensorBodies.push(zone);
    ringZones.push({x:zx,y:zy,idx:i,pts:RING_POINTS[i],t:t,w:zoneLen*0.85});
  }

  // Obstacles
  cfg.obstacles.forEach(obs=>{
    const ox=obs.x*w,oy=obs.y*h;
    let body;
    if(obs.type==='bumper'){
      body=Bodies.circle(ox,oy,20,{isStatic:true,restitution:1.5,label:'bumper'});
    }else{
      body=Bodies.rectangle(ox,oy,10,65,{isStatic:true,angle:Math.PI*0.1,label:'blocker'});
    }
    World.add(world,body);obstacleBodies.push(body);
  });

  // Power-up orb (sits on lane)
  if(Math.random()<0.4){
    const orbT=0.3+Math.random()*0.3;
    const orbX=rampStartX+orbT*rampLen*Math.cos(-angle);
    const orbY=rampStartY+orbT*rampLen*Math.sin(-angle)-rampThick/2-15;
    const types=['precision','hotstreak','tailwind','ghost'];
    powerUpOrb={x:orbX,y:orbY,type:types[Math.floor(Math.random()*types.length)],
      collected:false,pulse:0};
  }else{
    powerUpOrb=null;
  }

  // Collision events
  Events.on(engine,'collisionStart',event=>{
    event.pairs.forEach(pair=>{
      let ring=null,ball=null;
      if(pair.bodyA.label&&pair.bodyA.label.startsWith('ring_')&&pair.bodyB===ballBody){ring=pair.bodyA;ball=pair.bodyB;}
      if(pair.bodyB.label&&pair.bodyB.label.startsWith('ring_')&&pair.bodyA===ballBody){ring=pair.bodyB;ball=pair.bodyA;}
      if(ring&&ball&&!ball._scored){
        ball._scored=true;
        const pts=ring.points;
        let mult=1;
        comboCount++;
        if(comboCount>1){mult=1+comboCount*0.25;SFX.combo();}
        if(pts===100)mult*=2;
        if(pts>=50){SFX.bigScore();shakeTimer=10;shakeIntensity=pts===100?6:3;}

        let earned=Math.round(pts*mult);
        if(powerUp==='hotstreak')earned*=2;

        score+=earned;levelThrows++;
        SFX.ringHit(pts);

        const pos=ring.position;
        floatingScores.push({x:pos.x,y:pos.y-25,text:'+'+earned,t:0,
          color:RING_COLORS[ring.ringIndex],size:pts>=50?18:14});

        // Particles
        const col=RING_COLORS[ring.ringIndex];
        for(let i=0;i<(pts>=50?30:15);i++){
          particles.push({x:pos.x,y:pos.y,
            vx:(Math.random()-0.5)*8,vy:(Math.random()-0.5)*8-3,
            life:1,color:col,size:Math.random()*3+1.5});
        }

        if(settings.haptics&&navigator.vibrate)navigator.vibrate(pts>=50?[20,10,20]:20);
        updateHUD();
      }

      // Bumper bounce
      if((pair.bodyA.label==='bumper'&&pair.bodyB===ballBody)||
         (pair.bodyB.label==='bumper'&&pair.bodyA===ballBody)){
        const bmp=pair.bodyA.label==='bumper'?pair.bodyA:pair.bodyB;
        for(let i=0;i<8;i++){
          particles.push({x:bmp.position.x,y:bmp.position.y,
            vx:(Math.random()-0.5)*6,vy:(Math.random()-0.5)*6,
            life:0.8,color:'#ff00ff',size:2});
        }
      }
    });
  });
}

// ===================== BALL MANAGEMENT =====================
function createBallQueue(cfg){
  ballsRemaining=[];
  for(let i=0;i<cfg.balls;i++){
    ballsRemaining.push(cfg.ballTypes[i%cfg.ballTypes.length]);
  }
  selectedBallIdx=0;
  updateBallQueueUI();
}

function spawnBall(){
  if(ballsRemaining.length===0)return false;
  const type=ballsRemaining[selectedBallIdx]||ballsRemaining[0];
  const bt=BALL_TYPES[type];
  ballBody=Bodies.circle(slingAnchor.x,slingAnchor.y,13,{
    mass:bt.mass,restitution:bt.restitution,friction:bt.friction,
    frictionAir:0.008,label:'ball'
  });
  ballBody._type=type;
  ballBody._scored=false;
  ballBody._curved=false;
  ballBody._exploded=false;
  World.add(world,ballBody);
  launched=false;settleTimer=0;ballTrail=[];
  activeBall=type;
  return true;
}

function launchBall(power,ang){
  if(!ballBody||launched)return;
  const forceMag=power*0.014;
  Body.applyForce(ballBody,ballBody.position,{
    x:Math.cos(ang)*forceMag,
    y:Math.sin(ang)*forceMag
  });
  launched=true;
  ballsRemaining.splice(selectedBallIdx,1);
  if(selectedBallIdx>=ballsRemaining.length)selectedBallIdx=Math.max(0,ballsRemaining.length-1);
  updateBallQueueUI();
  SFX.launch();
  if(settings.haptics&&navigator.vibrate)navigator.vibrate(15);
}

function checkBallSettled(){
  if(!ballBody||!launched)return;
  const v=ballBody.speed;
  const pos=ballBody.position;
  const w=window.innerWidth,h=window.innerHeight;

  // Apply wind
  if(levelConfig&&levelConfig.wind!==0){
    Body.applyForce(ballBody,ballBody.position,{x:levelConfig.wind,y:0});
  }

  // Check power-up orb collision
  if(powerUpOrb&&!powerUpOrb.collected){
    const dx=pos.x-powerUpOrb.x,dy=pos.y-powerUpOrb.y;
    if(Math.sqrt(dx*dx+dy*dy)<25){
      powerUpOrb.collected=true;
      activatePowerUp(powerUpOrb.type);
      for(let i=0;i<20;i++){
        particles.push({x:powerUpOrb.x,y:powerUpOrb.y,
          vx:(Math.random()-0.5)*6,vy:(Math.random()-0.5)*6,
          life:1,color:'#ffeb3b',size:Math.random()*3+1});
      }
    }
  }

  if(pos.x>w+60||pos.y>h+60||pos.x<-60){
    if(!ballBody._scored){SFX.gutter();comboCount=0;}
    removeBall();return;
  }

  if(v<0.25&&launched){
    settleTimer++;
    if(settleTimer>50){
      if(!ballBody._scored){SFX.gutter();comboCount=0;}
      removeBall();
    }
  }else{
    settleTimer=0;
  }
}

function removeBall(){
  if(ballBody){World.remove(world,ballBody);ballBody=null;}
  launched=false;
  setTimeout(()=>{
    if(state!=='PLAYING')return;
    if(ballsRemaining.length>0)spawnBall();
    else endLevel();
  },400);
}

// ===================== POWER-UPS =====================
function activatePowerUp(type){
  const labels={precision:'TARGET',hotstreak:'2X SCORE',tailwind:'TAILWIND',ghost:'GHOST'};
  powerUp=type;powerUpTimer=240;
  const el=document.getElementById('hud-powerup');
  el.textContent=labels[type]||type.toUpperCase();
  el.style.display='block';
  SFX.click();
}

// ===================== INPUT =====================
let inputStart=null;

function getInputPos(e){
  const t=e.touches?e.touches[0]:e;
  return{x:t.clientX,y:t.clientY};
}

function onInputStart(e){
  if(state!=='PLAYING'||!ballBody||launched||paused)return;
  const pos=getInputPos(e);
  const dx=pos.x-slingAnchor.x,dy=pos.y-slingAnchor.y;
  if(Math.sqrt(dx*dx+dy*dy)<70){
    pulling=true;pullPos=pos;
    SFX.init();SFX.resume();
  }
}

function onInputMove(e){
  if(!pulling)return;
  e.preventDefault();
  pullPos=getInputPos(e);

  let dx=slingAnchor.x-pullPos.x,dy=slingAnchor.y-pullPos.y;
  let dist=Math.sqrt(dx*dx+dy*dy);
  const maxPull=130;
  if(dist>maxPull){
    dx=(dx/dist)*maxPull;dy=(dy/dist)*maxPull;
    pullPos={x:slingAnchor.x-dx,y:slingAnchor.y-dy};
    dist=maxPull;
  }

  // Only allow shooting right and upward
  const a=Math.atan2(-dy,dx);
  if(a<-0.1||a>80*Math.PI/180){
    const clamped=Math.max(0,Math.min(80*Math.PI/180,a));
    const d=Math.min(dist,maxPull);
    pullPos={x:slingAnchor.x-Math.cos(clamped)*d,y:slingAnchor.y+Math.sin(clamped)*d};
  }

  SFX.stretch(Math.min(dist,maxPull)/maxPull);

  if(ballBody){
    Body.setPosition(ballBody,{x:pullPos.x,y:pullPos.y});
    Body.setVelocity(ballBody,{x:0,y:0});
  }
}

function onInputEnd(e){
  if(!pulling)return;
  pulling=false;
  const dx=slingAnchor.x-pullPos.x,dy=slingAnchor.y-pullPos.y;
  const dist=Math.sqrt(dx*dx+dy*dy);
  if(dist>18){
    const a=Math.atan2(dy,dx);
    launchBall(dist,a);
  }else{
    if(ballBody){Body.setPosition(ballBody,slingAnchor);Body.setVelocity(ballBody,{x:0,y:0});}
  }
}

function onTap(e){
  if(state!=='PLAYING'||!ballBody||!launched||paused)return;
  if(ballBody._type==='curve'&&!ballBody._curved){
    ballBody._curved=true;
    Body.applyForce(ballBody,ballBody.position,{x:0,y:-0.01});
    for(let i=0;i<10;i++){
      particles.push({x:ballBody.position.x,y:ballBody.position.y,
        vx:(Math.random()-0.5)*4,vy:-Math.random()*3,
        life:0.6,color:'#7cff00',size:2});
    }
  }
  if(ballBody._type==='bomb'&&!ballBody._exploded){
    ballBody._exploded=true;
    const pos=ballBody.position;
    shakeTimer=12;shakeIntensity=5;
    for(let i=0;i<40;i++){
      particles.push({x:pos.x,y:pos.y,
        vx:(Math.random()-0.5)*14,vy:(Math.random()-0.5)*14,
        life:1,color:['#ff3030','#ff9900','#ffeb3b'][Math.floor(Math.random()*3)],
        size:Math.random()*5+2});
    }
    // Force into nearest scoring zone
    let nearest=null,bestD=Infinity;
    ringSensorBodies.forEach(z=>{
      const d=Math.sqrt(Math.pow(pos.x-z.position.x,2)+Math.pow(pos.y-z.position.y,2));
      if(d<bestD){bestD=d;nearest=z;}
    });
    if(nearest&&bestD<200){
      Body.setPosition(ballBody,nearest.position);
    }
    if(settings.haptics&&navigator.vibrate)navigator.vibrate([30,15,30,15,30]);
    SFX.bigScore();
  }
}

canvas.addEventListener('mousedown',onInputStart);
canvas.addEventListener('mousemove',onInputMove);
canvas.addEventListener('mouseup',onInputEnd);
canvas.addEventListener('touchstart',onInputStart,{passive:false});
canvas.addEventListener('touchmove',onInputMove,{passive:false});
canvas.addEventListener('touchend',onInputEnd);
canvas.addEventListener('click',onTap);

// ===================== RENDERING =====================
function drawBackground(c,w,h){
  // Dark gradient
  const bg=c.createLinearGradient(0,0,0,h);
  bg.addColorStop(0,'#080818');bg.addColorStop(1,'#0a0a1a');
  c.fillStyle=bg;c.fillRect(0,0,w,h);

  // Animated stars
  bgStars.forEach(s=>{
    s.b+=s.speed;
    const alpha=0.2+Math.sin(s.b)*0.25;
    c.fillStyle=`rgba(200,220,255,${Math.max(0,alpha)})`;
    c.beginPath();c.arc(s.x,s.y,s.s,0,Math.PI*2);c.fill();
  });

  // Subtle scanlines
  c.fillStyle='rgba(0,0,0,0.06)';
  for(let y=0;y<h;y+=4)c.fillRect(0,y,w,1);
}

function drawLane(c){
  if(!laneVis.len)return;
  const lv=laneVis;
  const cos=Math.cos(-lv.angle),sin=Math.sin(-lv.angle);
  const nx=lv.nx,ny=lv.ny;
  const halfW=lv.wallH*0.5+lv.thick*0.5;

  c.save();

  // Lane shadow
  c.save();
  c.shadowColor='rgba(0,0,0,0.5)';c.shadowBlur=30;c.shadowOffsetY=10;

  // Main lane surface with wood gradient
  c.beginPath();
  // Bottom-left corner
  const blx=lv.startX-nx*halfW-cos*10;
  const bly=lv.startY-ny*halfW-sin*10;
  // Bottom-right
  const brx=lv.startX+nx*halfW-cos*10;
  const bry=lv.startY+ny*halfW-sin*10;
  // Top-right
  const trx=lv.endX+nx*halfW+cos*15;
  const _try=lv.endY+ny*halfW+sin*15;
  // Top-left
  const tlx=lv.endX-nx*halfW+cos*15;
  const tly=lv.endY-ny*halfW+sin*15;

  c.moveTo(blx,bly);c.lineTo(brx,bry);c.lineTo(trx,_try);c.lineTo(tlx,tly);c.closePath();

  // Wood grain gradient
  const wg=c.createLinearGradient(blx,bly,trx,_try);
  wg.addColorStop(0,'#2a1a0a');wg.addColorStop(0.2,'#3d2514');wg.addColorStop(0.4,'#2a1a0a');
  wg.addColorStop(0.6,'#3a2210');wg.addColorStop(0.8,'#2a1a0a');wg.addColorStop(1,'#1e1208');
  c.fillStyle=wg;c.fill();
  c.restore();

  // Lane edge highlight
  c.strokeStyle='#5a3a1a';c.lineWidth=2;
  c.beginPath();c.moveTo(blx,bly);c.lineTo(brx,bry);c.lineTo(trx,_try);c.lineTo(tlx,tly);c.closePath();
  c.stroke();

  // Side rail shadows (3D effect)
  c.strokeStyle='rgba(90,58,26,0.8)';c.lineWidth=4;
  c.beginPath();c.moveTo(blx,bly);c.lineTo(tlx,tly);c.stroke();
  c.beginPath();c.moveTo(brx,bry);c.lineTo(trx,_try);c.stroke();

  // Side rail highlights
  c.strokeStyle='rgba(140,90,40,0.4)';c.lineWidth=1;
  c.beginPath();c.moveTo(blx-1,bly-1);c.lineTo(tlx-1,tly-1);c.stroke();
  c.beginPath();c.moveTo(brx+1,bry+1);c.lineTo(trx+1,_try+1);c.stroke();

  // Wood grain lines
  c.strokeStyle='rgba(80,50,20,0.3)';c.lineWidth=0.5;
  for(let i=0;i<8;i++){
    const frac=(i+1)/9;
    const lx1=blx+(brx-blx)*frac;
    const ly1=bly+(bry-bly)*frac;
    const lx2=tlx+(trx-tlx)*frac;
    const ly2=tly+(_try-tly)*frac;
    c.beginPath();c.moveTo(lx1,ly1);c.lineTo(lx2,ly2);c.stroke();
  }

  // Lip at top (backstop)
  c.fillStyle='#4a2a10';
  const lipW=halfW*2+8;
  c.save();
  c.translate(lv.endX+cos*10,lv.endY+sin*10);
  c.rotate(-lv.angle+Math.PI/2);
  c.fillRect(-lipW/2,-8,lipW,16);
  c.strokeStyle='#6a4020';c.lineWidth=1;
  c.strokeRect(-lipW/2,-8,lipW,16);
  c.restore();

  // Gutter opening indicator
  c.fillStyle='rgba(255,50,50,0.15)';
  c.save();
  c.translate(lv.startX-cos*5,lv.startY-sin*5);
  c.rotate(-lv.angle+Math.PI/2);
  c.fillRect(-halfW,-4,halfW*2,8);
  c.restore();

  // Curved lip bump
  const bumpT=0.25;
  const bumpX=lv.startX+bumpT*lv.len*cos;
  const bumpY=lv.startY+bumpT*lv.len*sin;
  c.beginPath();
  c.arc(bumpX-nx*(lv.thick/2+3),bumpY-ny*(lv.thick/2+3),6,0,Math.PI*2);
  c.fillStyle='#5a3a1a';c.fill();
  c.strokeStyle='#7a5a3a';c.lineWidth=1;c.stroke();

  c.restore();
}

function drawScoringZones(c){
  if(!laneVis.len)return;
  const lv=laneVis;
  const cos=Math.cos(-lv.angle),sin=Math.sin(-lv.angle);
  const nx=lv.nx,ny=lv.ny;
  const halfW=lv.wallH*0.5+lv.thick*0.5;
  const t=Date.now()*0.002;

  ringZones.forEach((zone,i)=>{
    const zx=zone.x,zy=zone.y;
    const glow=0.6+Math.sin(t+i*1.3)*0.4;

    c.save();
    c.translate(zx,zy);
    c.rotate(-lv.angle);

    // Zone background glow
    const grad=c.createRadialGradient(0,0,2,0,0,halfW*0.8);
    grad.addColorStop(0,RING_GLOW[i]+(0.2*glow)+')');
    grad.addColorStop(1,RING_GLOW[i]+'0)');
    c.fillStyle=grad;
    c.fillRect(-zone.w/2,-halfW,zone.w,halfW*2);

    // Hole/ring arc
    const holeR=Math.min(zone.w*0.35,halfW*0.7);
    c.beginPath();c.arc(0,0,holeR,0,Math.PI*2);
    c.fillStyle=RING_GLOW[i]+(0.12*glow)+')';c.fill();
    c.strokeStyle=RING_COLORS[i];c.lineWidth=2.5;
    c.shadowColor=RING_COLORS[i];c.shadowBlur=12*glow;
    c.stroke();

    // Inner ring
    c.beginPath();c.arc(0,0,holeR*0.6,0,Math.PI*2);
    c.strokeStyle=RING_COLORS[i];c.lineWidth=1.5;
    c.globalAlpha=0.5*glow;c.stroke();c.globalAlpha=1;

    // Point label
    c.shadowBlur=8;c.shadowColor=RING_COLORS[i];
    c.fillStyle=RING_COLORS[i];
    c.font='bold '+Math.max(9,Math.round(holeR*0.55))+'px "Press Start 2P"';
    c.textAlign='center';c.textBaseline='middle';
    c.fillText(RING_POINTS[i],0,1);
    c.shadowBlur=0;

    // Separator line
    if(i<ringZones.length-1){
      c.strokeStyle='rgba(255,255,255,0.08)';c.lineWidth=1;
      c.beginPath();c.moveTo(zone.w/2,-halfW);c.lineTo(zone.w/2,halfW);c.stroke();
    }

    c.restore();
  });
}

function drawSlingshot(c){
  const ax=slingAnchor.x,ay=slingAnchor.y;

  c.save();

  // Y-shaped posts
  c.strokeStyle='#666';c.lineWidth=4;c.lineCap='round';
  // Left post
  c.beginPath();c.moveTo(ax-6,ay+40);c.lineTo(ax-12,ay-8);c.stroke();
  // Right post
  c.beginPath();c.moveTo(ax+6,ay+40);c.lineTo(ax+12,ay-8);c.stroke();
  // Center post
  c.beginPath();c.moveTo(ax,ay+40);c.lineTo(ax,ay+10);c.stroke();

  // Post caps
  c.fillStyle='#888';
  c.beginPath();c.arc(ax-12,ay-8,4,0,Math.PI*2);c.fill();
  c.beginPath();c.arc(ax+12,ay-8,4,0,Math.PI*2);c.fill();

  // Post metallic sheen
  c.strokeStyle='rgba(255,255,255,0.15)';c.lineWidth=1;
  c.beginPath();c.moveTo(ax-5,ay+38);c.lineTo(ax-11,ay-6);c.stroke();
  c.beginPath();c.moveTo(ax+7,ay+38);c.lineTo(ax+13,ay-6);c.stroke();

  if(pulling&&ballBody){
    const px=pullPos.x,py=pullPos.y;

    // Rubber band with glow
    c.shadowColor='#ff6600';c.shadowBlur=8;
    c.strokeStyle='#ff8800';c.lineWidth=4;c.lineCap='round';
    // Back band (behind ball)
    c.beginPath();c.moveTo(ax-12,ay-8);c.lineTo(px,py);c.stroke();
    // Front band
    c.beginPath();c.moveTo(ax+12,ay-8);c.lineTo(px,py);c.stroke();

    // Rubber band highlight
    c.shadowBlur=0;
    c.strokeStyle='rgba(255,200,100,0.4)';c.lineWidth=1.5;
    c.beginPath();c.moveTo(ax-12,ay-8);c.lineTo(px,py);c.stroke();
    c.beginPath();c.moveTo(ax+12,ay-8);c.lineTo(px,py);c.stroke();

    // Trajectory preview dots
    const dx=ax-px,dy=ay-py;
    const dist=Math.sqrt(dx*dx+dy*dy);
    const power=dist*0.014;
    const ang=Math.atan2(dy,dx);
    const vx=Math.cos(ang)*power*55;
    const vy=Math.sin(ang)*power*55;

    let ppx=px,ppy=py;
    for(let t=0;t<25;t++){
      ppx+=vx*0.018;
      ppy+=vy*0.018+0.8*55*0.018*t*0.018;
      const alpha=1-(t/25);
      c.fillStyle=`rgba(0,229,255,${alpha*0.6})`;
      c.beginPath();c.arc(ppx,ppy,2.5-t*0.06,0,Math.PI*2);c.fill();
    }
  }else if(!launched&&ballBody){
    // Idle rubber bands (ball resting in cradle)
    c.strokeStyle='#cc6600';c.lineWidth=3;c.lineCap='round';
    c.beginPath();c.moveTo(ax-12,ay-8);c.lineTo(ax,ay);c.stroke();
    c.beginPath();c.moveTo(ax+12,ay-8);c.lineTo(ax,ay);c.stroke();
  }

  c.restore();
}

function drawBall(c){
  if(!ballBody)return;
  const pos=ballBody.position;
  const type=ballBody._type;
  const bt=BALL_TYPES[type];

  // Trail
  if(launched){
    ballTrail.push({x:pos.x,y:pos.y,t:1});
    if(ballTrail.length>25)ballTrail.shift();
    c.save();
    ballTrail.forEach((p,i)=>{
      const alpha=(i/ballTrail.length)*0.35*p.t;
      const r=10*(i/ballTrail.length);
      const grad=c.createRadialGradient(p.x,p.y,0,p.x,p.y,r);
      grad.addColorStop(0,bt.color.replace(')',`,${alpha})`).replace('rgb','rgba').replace('#','')||`rgba(0,229,255,${alpha})`);
      grad.addColorStop(1,'rgba(0,0,0,0)');
      c.fillStyle=`rgba(${hexToRgb(bt.color)},${alpha})`;
      c.beginPath();c.arc(p.x,p.y,r,0,Math.PI*2);c.fill();
    });
    c.restore();
  }

  c.save();
  c.translate(pos.x,pos.y);
  c.rotate(ballBody.angle);

  // Glow
  c.shadowColor=bt.color;c.shadowBlur=15;

  // Ball body
  const grad=c.createRadialGradient(-3,-3,2,2,2,14);
  grad.addColorStop(0,lightenColor(bt.color,40));
  grad.addColorStop(0.5,bt.color);
  grad.addColorStop(1,darkenColor(bt.color,40));
  c.fillStyle=grad;
  c.beginPath();c.arc(0,0,13,0,Math.PI*2);c.fill();

  // Highlight
  c.fillStyle='rgba(255,255,255,0.3)';
  c.beginPath();c.arc(-3,-4,5,0,Math.PI*2);c.fill();

  // Type indicator
  c.shadowBlur=0;
  c.fillStyle='rgba(0,0,0,0.5)';
  c.font='bold 8px "Chakra Petch"';c.textAlign='center';c.textBaseline='middle';
  c.fillText(bt.label.charAt(0),0,1);

  c.restore();
}

function drawObstacles(c){
  obstacleBodies.forEach(body=>{
    c.save();
    c.translate(body.position.x,body.position.y);
    const pulse=0.7+Math.sin(Date.now()*0.004)*0.3;

    if(body.label==='bumper'){
      c.shadowColor='#ff00ff';c.shadowBlur=15*pulse;
      // Outer ring
      c.beginPath();c.arc(0,0,20,0,Math.PI*2);
      c.fillStyle='rgba(255,0,255,0.15)';c.fill();
      c.strokeStyle='#ff00ff';c.lineWidth=2.5;c.stroke();
      // Inner ring
      c.beginPath();c.arc(0,0,10,0,Math.PI*2);
      c.strokeStyle='rgba(255,0,255,0.5)';c.lineWidth=1.5;c.stroke();
      // Center dot
      c.fillStyle='#ff00ff';c.beginPath();c.arc(0,0,3,0,Math.PI*2);c.fill();
    }else{
      c.rotate(body.angle);
      c.shadowColor='#ff9900';c.shadowBlur=10*pulse;
      c.fillStyle='rgba(255,153,0,0.2)';c.strokeStyle='#ff9900';c.lineWidth=2;
      c.fillRect(-5,-32,10,64);c.strokeRect(-5,-32,10,64);
      // Hazard stripes
      c.fillStyle='rgba(255,153,0,0.3)';
      for(let y=-28;y<28;y+=12){
        c.fillRect(-5,y,10,6);
      }
    }
    c.restore();
  });
}

function drawPowerUpOrb(c){
  if(!powerUpOrb||powerUpOrb.collected)return;
  powerUpOrb.pulse+=0.05;
  const px=powerUpOrb.x,py=powerUpOrb.y;
  const glow=0.6+Math.sin(powerUpOrb.pulse)*0.4;
  const labels={precision:'AIM',hotstreak:'2X',tailwind:'WIND',ghost:'GHO'};

  c.save();
  c.shadowColor='#ffeb3b';c.shadowBlur=18*glow;
  c.fillStyle=`rgba(255,235,59,${0.15*glow})`;
  c.beginPath();c.arc(px,py,18,0,Math.PI*2);c.fill();
  c.strokeStyle='#ffeb3b';c.lineWidth=2;c.stroke();

  c.shadowBlur=0;
  c.fillStyle='#ffeb3b';
  c.font='bold 7px "Press Start 2P"';c.textAlign='center';c.textBaseline='middle';
  c.fillText(labels[powerUpOrb.type]||'?',px,py);

  // Floating animation
  const floatY=Math.sin(powerUpOrb.pulse*0.8)*3;
  c.translate(0,floatY);
  c.restore();
}

function drawWindIndicator(c,w,h){
  if(!levelConfig||levelConfig.wind===0)return;
  const windStr=Math.abs(levelConfig.wind);
  const windDir=levelConfig.wind>0?1:-1;
  const t=Date.now()*0.003;

  // Wind particles
  if(Math.random()<0.3){
    windParticles.push({
      x:windDir>0?-10:w+10,
      y:Math.random()*h*0.7,
      speed:windDir*(2+windStr*3000),
      life:1,alpha:0.15+Math.random()*0.1
    });
  }
  windParticles=windParticles.filter(p=>{
    p.x+=p.speed;p.life-=0.008;
    if(p.life<=0||p.x<-20||p.x>w+20)return false;
    c.fillStyle=`rgba(180,200,255,${p.life*p.alpha})`;
    c.fillRect(p.x,p.y,12,1);
    return true;
  });
}

function drawParticles(c){
  particles=particles.filter(p=>{
    p.x+=p.vx;p.y+=p.vy;p.vy+=0.1;p.life-=0.025;
    if(p.life<=0)return false;
    c.fillStyle=p.color;c.globalAlpha=p.life;
    c.beginPath();c.arc(p.x,p.y,p.size*p.life,0,Math.PI*2);c.fill();
    return true;
  });
  c.globalAlpha=1;
}

function drawFloatingScores(c){
  floatingScores=floatingScores.filter(f=>{
    f.t+=0.018;
    if(f.t>=1)return false;
    const y=f.y-f.t*65;
    const alpha=1-f.t;
    const scale=1+f.t*0.3;
    c.save();
    c.translate(f.x,y);c.scale(scale,scale);
    c.font=(f.size||14)+'px "Press Start 2P"';
    c.textAlign='center';c.textBaseline='middle';
    c.fillStyle=f.color||'#ffeb3b';
    c.shadowColor=f.color||'#ffeb3b';c.shadowBlur=10;
    c.globalAlpha=alpha;
    c.fillText(f.text,0,0);
    c.restore();
    return true;
  });
}

// ===================== GAME LOOP =====================
function update(){
  if(state==='PLAYING'&&!paused){
    Engine.update(engine,1000/60);
    checkBallSettled();

    if(powerUp&&powerUpTimer>0){
      powerUpTimer--;
      if(powerUpTimer<=0){
        powerUp=null;
        document.getElementById('hud-powerup').style.display='none';
      }
    }

    if(shakeTimer>0)shakeTimer--;
  }
}

function render(){
  const w=window.innerWidth,h=window.innerHeight;
  const c=ctx2d;

  c.save();

  // Screen shake
  if(shakeTimer>0){
    const sx=(Math.random()-0.5)*shakeIntensity*(shakeTimer/10);
    const sy=(Math.random()-0.5)*shakeIntensity*(shakeTimer/10);
    c.translate(sx,sy);
  }

  drawBackground(c,w,h);

  if(state==='PLAYING'){
    drawWindIndicator(c,w,h);
    drawLane(c);
    drawScoringZones(c);
    drawPowerUpOrb(c);
    drawObstacles(c);
    drawSlingshot(c);
    drawBall(c);
    drawParticles(c);
    drawFloatingScores(c);
  }

  c.restore();
}

function loop(){
  update();
  render();
  requestAnimationFrame(loop);
}

// ===================== HUD =====================
function updateHUD(){
  document.getElementById('hud-score').textContent=score;
  const comboEl=document.getElementById('hud-combo');
  if(comboCount>1){
    comboEl.textContent='COMBO x'+comboCount;
    comboEl.classList.remove('bump');
    void comboEl.offsetWidth; // reflow
    comboEl.classList.add('bump');
  }else{
    comboEl.textContent='';
  }
}

function updateBallQueueUI(){
  const el=document.getElementById('ball-queue');
  el.innerHTML='';
  ballsRemaining.forEach((type,i)=>{
    const bt=BALL_TYPES[type];
    const div=document.createElement('div');
    div.className='ball-indicator'+(i===selectedBallIdx?' active':'');
    div.innerHTML=`<div class="ball-icon" style="background:${bt.color};box-shadow:0 0 6px ${bt.color}"><span style="font-size:7px;color:#000;font-weight:bold">${bt.label.charAt(0)}</span></div>`;
    div.addEventListener('click',()=>{
      if(!launched&&ballBody){
        selectedBallIdx=i;
        // Swap ball type
        World.remove(world,ballBody);
        const newType=ballsRemaining[i];
        const nbt=BALL_TYPES[newType];
        ballBody=Bodies.circle(slingAnchor.x,slingAnchor.y,13,{
          mass:nbt.mass,restitution:nbt.restitution,friction:nbt.friction,
          frictionAir:0.008,label:'ball'
        });
        ballBody._type=newType;ballBody._scored=false;ballBody._curved=false;ballBody._exploded=false;
        World.add(world,ballBody);
        activeBall=newType;
        SFX.click();
        updateBallQueueUI();
      }
    });
    el.appendChild(div);
  });
}

// ===================== SCREENS =====================
function showScreen(id){
  document.querySelectorAll('.screen').forEach(s=>s.classList.remove('active'));
  const el=document.getElementById('screen-'+id);
  if(el)el.classList.add('active');
}

function showTitle(){
  state='TITLE';
  showScreen('title');
  const total=Store.getTotal();
  document.getElementById('best-score').textContent=total>0?'BEST TOTAL: '+total:'';
}

function showLevelSelect(){
  state='LEVEL_SELECT';
  showScreen('levels');
  const grid=document.getElementById('level-grid');
  grid.innerHTML='';
  const prog=Store.getProgress();
  LEVELS.forEach((lv,i)=>{
    const unlocked=i===0||(prog[i-1]&&prog[i-1].stars>0);
    const btn=document.createElement('div');
    btn.className='level-btn'+(unlocked?'':' locked');
    const starCount=prog[i]?prog[i].stars:0;
    const starStr=Array(3).fill(0).map((_,j)=>j<starCount?'\u2605':'\u2606').join('');
    btn.innerHTML=`${lv.id}<div class="stars">${starStr}</div>`;
    if(unlocked){
      btn.addEventListener('click',()=>{
        SFX.init();SFX.resume();SFX.click();
        startLevel(i);
      });
    }
    grid.appendChild(btn);
  });
}

function startLevel(idx){
  currentLevel=idx;
  levelConfig=LEVELS[idx];
  score=0;comboCount=0;levelThrows=0;
  powerUp=null;powerUpTimer=0;
  floatingScores=[];particles=[];ballTrail=[];windParticles=[];
  shakeTimer=0;paused=false;

  setupPhysics();
  buildLane(levelConfig);
  createBallQueue(levelConfig);
  spawnBall();

  state='PLAYING';
  showScreen('game');
  document.getElementById('hud-level').textContent='LEVEL '+levelConfig.id;
  document.getElementById('hud-wind').textContent=levelConfig.wind!==0?
    (levelConfig.wind>0?'WIND \u2192':'WIND \u2190'):'';
  updateHUD();
}

function endLevel(){
  state='RESULTS';
  const prog=Store.getProgress();
  const cfg=levelConfig;
  let starCount=0;
  if(score>=cfg.starThresholds[0])starCount=1;
  if(score>=cfg.starThresholds[1])starCount=2;
  if(score>=cfg.starThresholds[2])starCount=3;

  if(!prog[currentLevel]||prog[currentLevel].stars<starCount){
    prog[currentLevel]={stars:starCount,score:score};
  }
  Store.saveProgress(prog);
  progress=prog;

  let total=Store.getTotal();
  total=Math.max(total,score);
  Store.saveTotal(total);

  showScreen('results');
  document.getElementById('results-score').textContent=score;
  document.getElementById('results-stars').textContent=
    Array(3).fill(0).map((_,i)=>i<starCount?'\u2605':'\u2606').join(' ');
  document.getElementById('results-breakdown').innerHTML=
    `Balls thrown <span>${levelConfig.balls}</span><br>`+
    `Best combo <span>x${comboCount||1}</span><br>`+
    `Star thresholds <span>${cfg.starThresholds.join(' / ')}</span>`;

  if(starCount>=3){
    SFX.bigScore();
    for(let i=0;i<50;i++){
      particles.push({
        x:window.innerWidth/2+(Math.random()-0.5)*200,
        y:window.innerHeight/2+(Math.random()-0.5)*100,
        vx:(Math.random()-0.5)*8,vy:(Math.random()-0.5)*8-3,
        life:1,color:['#ffeb3b','#ff00ff','#00e5ff','#ff9900'][Math.floor(Math.random()*4)],
        size:Math.random()*4+2
      });
    }
  }
}

// ===================== UI EVENTS =====================
document.getElementById('tap-start').addEventListener('click',()=>{
  SFX.init();SFX.resume();SFX.click();
  showLevelSelect();
});
document.getElementById('screen-title').addEventListener('click',(e)=>{
  if(e.target.id!=='tap-start'){
    SFX.init();SFX.resume();SFX.click();
    showLevelSelect();
  }
});

document.getElementById('btn-back-title').addEventListener('click',()=>{SFX.click();showTitle();});
document.getElementById('btn-retry').addEventListener('click',()=>{SFX.click();startLevel(currentLevel);});
document.getElementById('btn-next').addEventListener('click',()=>{
  SFX.click();
  if(currentLevel<LEVELS.length-1)startLevel(currentLevel+1);
  else showLevelSelect();
});
document.getElementById('btn-levels').addEventListener('click',()=>{SFX.click();showLevelSelect();});

// Pause
document.getElementById('btn-pause').addEventListener('click',()=>{
  if(state==='PLAYING'){paused=true;document.getElementById('pause-overlay').classList.add('active');}
});
document.getElementById('btn-resume').addEventListener('click',()=>{
  paused=false;document.getElementById('pause-overlay').classList.remove('active');
});
document.getElementById('btn-pause-restart').addEventListener('click',()=>{
  paused=false;document.getElementById('pause-overlay').classList.remove('active');
  startLevel(currentLevel);
});
document.getElementById('btn-pause-quit').addEventListener('click',()=>{
  paused=false;document.getElementById('pause-overlay').classList.remove('active');
  showLevelSelect();
});

// Settings
document.getElementById('btn-back-settings').addEventListener('click',()=>{SFX.click();showTitle();});

const toggleSound=document.getElementById('toggle-sound');
const toggleHaptics=document.getElementById('toggle-haptics');
if(!settings.muted)toggleSound.classList.add('on');
if(settings.haptics)toggleHaptics.classList.add('on');

toggleSound.addEventListener('click',()=>{
  settings.muted=!settings.muted;
  SFX.muted=settings.muted;
  toggleSound.classList.toggle('on');
  Store.saveSettings(settings);
});
toggleHaptics.addEventListener('click',()=>{
  settings.haptics=!settings.haptics;
  toggleHaptics.classList.toggle('on');
  Store.saveSettings(settings);
});

// ===================== HELPERS =====================
function hexToRgb(hex){
  if(!hex||hex.charAt(0)!=='#')return '0,229,255';
  const r=parseInt(hex.slice(1,3),16);
  const g=parseInt(hex.slice(3,5),16);
  const b=parseInt(hex.slice(5,7),16);
  return r+','+g+','+b;
}

function lightenColor(hex,pct){
  if(!hex||hex.charAt(0)!=='#')return hex;
  let r=parseInt(hex.slice(1,3),16);
  let g=parseInt(hex.slice(3,5),16);
  let b=parseInt(hex.slice(5,7),16);
  r=Math.min(255,r+pct);g=Math.min(255,g+pct);b=Math.min(255,b+pct);
  return `rgb(${r},${g},${b})`;
}

function darkenColor(hex,pct){
  if(!hex||hex.charAt(0)!=='#')return hex;
  let r=parseInt(hex.slice(1,3),16);
  let g=parseInt(hex.slice(3,5),16);
  let b=parseInt(hex.slice(5,7),16);
  r=Math.max(0,r-pct);g=Math.max(0,g-pct);b=Math.max(0,b-pct);
  return `rgb(${r},${g},${b})`;
}

// ===================== START =====================
showTitle();
loop();
