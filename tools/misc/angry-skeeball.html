// ============================================================
// LEVEL SETUP
// ============================================================
function buildLevel(levelIdx) {
  initEngine();
  var def = G.endlessMode ? generateEndlessLayout() : LEVEL_DEFS[levelIdx];
  if(G.endlessMode) G.currentEndlessDef = def;
  G.levelObjects = [];
  G.gravWells = [];
  G.movingPlatforms = [];
  G.windmills = [];
  G.teleporters = [];
  G.conveyors = [];
  G.blackHoles = [];
  G.hitTargets = new Set();
  G.hitCounts = {};
  G.particles = [];
  G.floatScores = [];
  G.callouts = [];
  G.whiteHoles = [];
  G.brokenBodies = [];
  G.holeVortex = {};
  G.holeSuckAnim = null;
  G.levelEnded = false;
  G.wallFlash = {left:0, right:0, top:0, bottom:0};
  G.wallBounces = 0;
  G.ballHasBouncedWall = false;
  G.thisBallHits = 0;

  // Walls with good restitution
  var wallOpts = { isStatic:true, restitution:0.65, friction:0.1, label:'wall', collisionFilter:{category:0x0002,mask:0x0001} };
  var floor = MBodies.rectangle(W/2, H+C.WALL_T/2, W*2, C.WALL_T, { isStatic:true, restitution:0.65, friction:0.1, label:'wall_bottom', collisionFilter:{category:0x0002,mask:0x0001} });
  var ceiling = MBodies.rectangle(W/2, -C.WALL_T/2, W*2, C.WALL_T, { isStatic:true, restitution:0.65, friction:0.1, label:'wall_top', collisionFilter:{category:0x0002,mask:0x0001} });
  var wallL = MBodies.rectangle(-C.WALL_T/2, H/2, C.WALL_T, H*2, { isStatic:true, restitution:0.65, friction:0.1, label:'wall_left', collisionFilter:{category:0x0002,mask:0x0001} });
  var wallR = MBodies.rectangle(W+C.WALL_T/2, H/2, C.WALL_T, H*2, { isStatic:true, restitution:0.65, friction:0.1, label:'wall_right', collisionFilter:{category:0x0002,mask:0x0001} });
  MWorld.add(world, [floor, ceiling, wallL, wallR]);

  // Scoring hole bodies (scattered)
  G.targets = [];
  setHolePositions();
  for(var i=0; i<holePositions.length; i++) {
    var hp = holePositions[i];
    var hr = holeConfigs[i].radius + 4;
    var sensor = MBodies.circle(hp.x, hp.y, hr, {
      isStatic:true, isSensor:true,
      label:'target_'+i,
      collisionFilter:{category:0x0004, mask:0x0001}
    });
    sensor.ringIndex = i;
    MWorld.add(world, sensor);
    G.targets.push(sensor);
  }

  // Build black holes
  if(def.blackHoles) {
    for(var bhi=0; bhi<def.blackHoles.length; bhi++) {
      var bhd = def.blackHoles[bhi];
      var bhx = bhd.fx*W, bhy = bhd.fy*H;
      var bhr = bhd.fr*Math.min(W,H);
      G.blackHoles.push({ x:bhx, y:bhy, r:bhr, idx:bhi });
    }
  }

  // Build obstacles
  for(var oi=0; oi<def.obstacles.length; oi++) {
    buildObstacle(def.obstacles[oi], oi);
  }

  // ===== ROAMING BLACK HOLE OBSTACLE (every level, avoids slingshot) =====
  // One moving black hole drifts around as a hazard to avoid
  var bhR = Math.min(W,H) * 0.045;
  // Start position: pick a random quadrant away from center/slingshot
  var startAngle = Math.random() * Math.PI * 2;
  var startDist = Math.min(W,H) * (0.25 + Math.random() * 0.15);
  var bhX = W*0.5 + Math.cos(startAngle) * startDist;
  var bhY = H*0.5 + Math.sin(startAngle) * startDist;
  G.blackHoles.push({
    x: bhX, y: bhY, r: bhR, idx: G.blackHoles.length,
    roaming: true,
    vx: (Math.random() - 0.5) * 1.2,
    vy: (Math.random() - 0.5) * 1.2
  });

  // ===== ROAMING WHITE HOLE REPULSOR (from level 3+) =====
  // Pushes balls outward — opposite of black hole. Harder to use carefully.
  if(levelIdx >= 2 || G.endlessMode) {
    var whR = Math.min(W,H) * 0.04;
    var whAngle = Math.random() * Math.PI * 2;
    var whDist = Math.min(W,H) * (0.2 + Math.random() * 0.15);
    var whX = W*0.5 + Math.cos(whAngle) * whDist;
    var whY = H*0.5 + Math.sin(whAngle) * whDist;
    G.whiteHoles.push({
      x: whX, y: whY, r: whR,
      vx: (Math.random() - 0.5) * 0.9,
      vy: (Math.random() - 0.5) * 0.9
    });
  }

  // Build power-up sensors
  for(var pi=0; pi<def.powerups.length; pi++) {
    var pd = def.powerups[pi];
    var px = pd.fx*W, py = pd.fy*H;
    var body = MBodies.circle(px, py, 16, {
      isStatic:true, isSensor:true, label:'powerup_'+pi,
      collisionFilter:{category:0x0008, mask:0x0001}
    });
    MWorld.add(world, body);
    G.levelObjects.push({ body:body, type:'powerup', puType:pd.type, collected:false, idx:pi });
  }

  // Wind
  G.wind = def.wind * (Math.random()>0.5?1:-1);

  // Ball queue
  G.ballQueue = def.balls ? def.balls.slice() : ['standard','standard','standard','standard','standard'];
  G.currentBallIdx = 0;
  G.activeBall = null;
  G.launched = false;

  // Collision events
  MEvents.on(engine, 'collisionStart', handleCollision);
}

function rebuildLevel(idx) {
  MEvents.off(engine, 'collisionStart');
  buildLevel(idx);
}

function buildObstacle(od, idx) {
  var x = od.fx*W, y = od.fy*H;

  if(od.type === 'wood' || od.type === 'steel' || od.type === 'glass' || od.type === 'bouncePad') {
    var hw = od.fw*W*0.5, hh = (od.fh||0.025)*H*0.5;
    var body = MBodies.rectangle(x, y, hw*2, hh*2, {
      isStatic: true,
      angle: od.angle||0,
      restitution: od.type==='bouncePad' ? 1.4 : od.type==='glass' ? 0.5 : od.type==='steel' ? 0.6 : 0.3,
      friction: 0.2,
      label: od.type+'_'+idx,
      collisionFilter:{category:0x0002, mask:0x0001}
    });
    MWorld.add(world, body);
    G.levelObjects.push({ body:body, type:od.type, hw:hw, hh:hh, broken:false, idx:idx });
  } else if(od.type === 'bumper') {
    var r = od.fr*Math.min(W,H);
    var body2 = MBodies.circle(x, y, r, {
      isStatic:true,
      restitution:1.6,
      friction:0,
      label:'bumper_'+idx,
      collisionFilter:{category:0x0002, mask:0x0001}
    });
    MWorld.add(world, body2);
    G.levelObjects.push({ body:body2, type:'bumper', fr:r, broken:false, idx:idx });
  } else if(od.type === 'windmill') {
    var len = od.flen*Math.min(W,H);
    var pivot = MBodies.circle(x, y, 6, {
      isStatic:true, isSensor:true, label:'wm_pivot_'+idx,
      collisionFilter:{category:0,mask:0}
    });
    var blade1 = MBodies.rectangle(x+len/2, y, len, 10, {
      isStatic:true, label:'windmill_'+idx,
      restitution:0.5, friction:0.05,
      collisionFilter:{category:0x0002, mask:0x0001}
    });
    MWorld.add(world, [pivot, blade1]);
    G.windmills.push({ body:blade1, pivotX:x, pivotY:y, bladeLen:len, speed:od.speed, angle:0 });
  } else if(od.type === 'mover') {
    var hw2 = od.fw*W*0.5, hh2 = (od.fh||0.025)*H*0.5;
    var body3 = MBodies.rectangle(x, y, hw2*2, hh2*2, {
      isStatic:true, restitution:0.4, friction:0.3, label:'mover_'+idx,
      collisionFilter:{category:0x0002, mask:0x0001}
    });
    MWorld.add(world, body3);
    var range = od.rangeX*W;
    G.movingPlatforms.push({ body:body3, type:'mover', hw:hw2, hh:hh2, startX:x, range:range, speed:od.speed*(W/800), t:0, broken:false, idx:idx });
    G.levelObjects.push({ body:body3, type:'mover', hw:hw2, hh:hh2, broken:false, idx:idx });
  } else if(od.type === 'gravity') {
    var gr = od.fr*Math.min(W,H);
    G.gravWells.push({ x:x, y:y, r:gr, strength:od.strength||0.0005, idx:idx });
  } else if(od.type === 'teleporter') {
    var tr = od.fr*Math.min(W,H);
    var sensorT = MBodies.circle(x, y, tr, {
      isStatic:true, isSensor:true, label:'teleporter_'+idx,
      collisionFilter:{category:0x0002, mask:0x0001}
    });
    MWorld.add(world, sensorT);
    G.teleporters.push({ body:sensorT, x:x, y:y, r:tr, pairId:od.pairId, cooldown:0, idx:idx });
    G.levelObjects.push({ body:sensorT, type:'teleporter', broken:false, idx:idx });
  } else if(od.type === 'conveyor') {
    var chw = od.fw*W*0.5, chh = (od.fh||0.025)*H*0.5;
    var bodyC = MBodies.rectangle(x, y, chw*2, chh*2, {
      isStatic:true, restitution:0.3, friction:0.8, label:'conveyor_'+idx,
      collisionFilter:{category:0x0002, mask:0x0001}
    });
    MWorld.add(world, bodyC);
    G.conveyors.push({ body:bodyC, x:x, y:y, hw:chw, hh:chh, dir:od.dir||1, idx:idx });
    G.levelObjects.push({ body:bodyC, type:'conveyor', hw:chw, hh:chh, broken:false, idx:idx });
  }
}

// ============================================================
// COLLISION HANDLING
// ============================================================
function handleCollision(evt) {
  var pairs = evt.pairs;
  for(var pi=0;pi<pairs.length;pi++) {
    var pair = pairs[pi];
    var bodyA = pair.bodyA, bodyB = pair.bodyB;
    var ball = bodyA.label==='ball' ? bodyA : bodyB.label==='ball' ? bodyB : null;
    var other = ball === bodyA ? bodyB : bodyA;
    if(!ball) continue;

    var lbl = other.label || '';

    // Wall bounce detection
    if(lbl.startsWith('wall_')) {
      G.wallBounces++;
      G.ballHasBouncedWall = true;
      totalWallBounces++;
      sfxWallBounce();
      if(lbl === 'wall_left') G.wallFlash.left = 10;
      else if(lbl === 'wall_right') G.wallFlash.right = 10;
      else if(lbl === 'wall_top') G.wallFlash.top = 10;
      else if(lbl === 'wall_bottom') G.wallFlash.bottom = 10;
      continue;
    }

    // Target rings / scoring holes
    if(lbl.startsWith('target_')) {
      var ri = parseInt(lbl.split('_')[1]);
      if(!G.hitTargets.has(ri)) {
        G.hitTargets.add(ri);
        var rc = holeConfigs[ri];
        var pts = rc.pts;
        G.combo++;
        G.comboTimer = 120;
        var mult = G.powerup==='2x' ? 2 : 1;
        var comboMult = 1 + (G.combo-1)*0.35;
        // Wall-bounce trick-shot multiplier
        var wb = G.wallBounces|0;
        var bounceMult = wb >= 4 ? 3 : wb >= 3 ? 2 : wb >= 2 ? 1.5 : wb >= 1 ? 1.25 : 1;
        // Last-ball bonus: final ball in the queue gets 2x drama
        var lastBallMult = (!G.endlessMode && G.currentBallIdx === G.ballQueue.length - 1) ? 2 : 1;
        // Multi-hit per throw: reward hitting 2+ targets before ball stops
        G.thisBallHits = (G.thisBallHits || 0) + 1;
        var multiHitMult = G.thisBallHits === 2 ? 1.5 : G.thisBallHits === 3 ? 2 : G.thisBallHits === 4 ? 3 : G.thisBallHits >= 5 ? 4 : 1;
        pts = Math.round(pts * mult * comboMult * bounceMult * lastBallMult * multiHitMult);
        G.score += pts;
        sfxHole(pts);
        var hp = holePositions[ri];
        var hx = hp ? hp.x : W*0.5;
        var hy = hp ? hp.y : H*0.5;

        // Vortex animation
        G.holeVortex[ri] = 15;

        // Particle burst in hole's color
        spawnParticles(hx, hy, rc.color, 28, 7);
        spawnParticles(hx, hy, '#ffffff', 10, 4);
        spawnFloatScore(hx, hy - 20, pts, rc.color);
        if(G.combo >= 3) sfxCombo();

        // Screen shake proportional to points
        G.screenShake = Math.min(8 + pts/30, 20);
        updateHUD();
        checkAchievements();

        // Wall bounce achievement + trick-shot callout
        if(G.ballHasBouncedWall) {
          unlockAchievement('wall_bounce');
        }
        if(wb >= 3) {
          spawnCallout(hx, hy - 48, 'TRICK SHOT!', '#ffdd33');
        } else if(wb >= 2) {
          spawnCallout(hx, hy - 48, 'BANK SHOT', '#66e6ff');
        }
        // Multi-hit in single throw
        if(G.thisBallHits === 2){
          spawnCallout(hx, hy - 90, 'DOUBLE! x1.5', '#66ff99');
        } else if(G.thisBallHits === 3){
          spawnCallout(hx, hy - 90, 'TRIPLE! x2', '#ffcc33');
          G.screenShake = Math.max(G.screenShake, 18);
        } else if(G.thisBallHits === 4){
          spawnCallout(hx, hy - 90, 'QUAD! x3', '#ff66aa');
          G.screenShake = Math.max(G.screenShake, 22);
        } else if(G.thisBallHits >= 5){
          spawnCallout(hx, hy - 90, 'INSANE! x4', '#ff00ff');
          G.screenShake = Math.max(G.screenShake, 28);
          unlockAchievement('no_miss');
        }
        if(lastBallMult > 1) {
          spawnCallout(W*0.5, H*0.25, 'FINAL BALL BONUS', '#ff66ee');
        }
        if(G.combo >= 5) {
          spawnCallout(hx, hy - 68, 'ON FIRE! x' + G.combo, '#ff6600');
        }

        // Epic shot for 100+ pt hole
        if(rc.pts >= 100) {
          unlockAchievement('hit_100');
          G.epicSlowMo = 60;
          G.epicTarget = {x:hx, y:hy};
          G.epicFlash = 10;
          G.epicText = 80;
          spawnEpicParticles(hx, hy);
          sfxEpicShot();
        }

        // Check no-miss achievement (all holes hit) + end level
        var def = G.endlessMode ? G.currentEndlessDef : LEVEL_DEFS[G.level];
        if(def && def.holes && G.hitTargets.size === def.holes.length) {
          unlockAchievement('no_miss');
          if(!G.endlessMode && !G.levelEnded) {
            G.levelEnded = true;
            // Clean up active ball so it doesn't linger
            if(G.activeBall && G.activeBall.body){
              try { MWorld.remove(world, G.activeBall.body); } catch(e){}
              G.activeBall = null;
              G.launched = false;
            }
            setTimeout(endLevel, 600);
          }
        }

        // Endless scoring flag
        if(G.endlessMode) G.endlessLastScored = true;
      }
      continue;
    }

    // Wood
    if(lbl.startsWith('wood_')) {
      G.hitCounts[other.id] = (G.hitCounts[other.id]||0)+1;
      sfxHit();
      G.screenShake = 7;
      var obj = G.levelObjects.find(function(o){return o.body===other;});
      if(obj && G.hitCounts[other.id] >= 2) {
        breakObjectWood(obj, other.position.x, other.position.y);
      } else {
        spawnParticles(other.position.x, other.position.y, C.WOOD, 10, 3);
        spawnDebrisRect(other.position.x, other.position.y, '#8B5E3C', 4);
      }
    }

    // Glass
    if(lbl.startsWith('glass_')) {
      var objG = G.levelObjects.find(function(o){return o.body===other;});
      if(objG && G.powerup!=='ghost') {
        G.hitCounts[other.id] = (G.hitCounts[other.id]||0)+1;
        sfxBreak();
        G.screenShake = 6;
        spawnGlassShards(other.position.x, other.position.y);
        if(G.hitCounts[other.id] >= 1) {
          breakObject(objG, other.position.x, other.position.y, 'rgba(150,230,255,0.8)');
        }
      }
    }

    // Steel
    if(lbl.startsWith('steel_')) {
      sfxSteelHit();
      G.screenShake = 5;
      spawnSteelSparks(other.position.x, other.position.y);
    }

    // Bumper
    if(lbl.startsWith('bumper_')) {
      sfxBumper();
      G.screenShake = 6;
      G.bumperFlash[other.id] = 15;
      spawnBumperBurst(other.position.x, other.position.y);
    }

    // Bounce pad
    if(lbl.startsWith('bouncePad')) {
      sfxBounce();
      spawnParticles(other.position.x, other.position.y, C.ORANGE, 10, 4);
    }

    // Power-up collection
    if(lbl.startsWith('powerup_')) {
      var objP = G.levelObjects.find(function(o){return o.body===other&&o.type==='powerup';});
      if(objP && !objP.collected) {
        objP.collected = true;
        activatePowerup(objP.puType);
        spawnParticles(other.position.x, other.position.y, C.YELLOW, 16, 5);
      }
    }

    // Windmill hit
    if(lbl.startsWith('windmill_')) {
      sfxHit();
      G.screenShake = 5;
    }

    // Teleporter collision
    if(lbl.startsWith('teleporter_')) {
      var tpIdx = parseInt(lbl.split('_')[1]);
      var tp = G.teleporters.find(function(t){return t.idx===tpIdx;});
      if(tp && tp.cooldown <= 0) {
        var pair2 = G.teleporters.find(function(t2){return t2.pairId===tp.pairId && t2.idx!==tp.idx;});
        if(pair2) {
          MBody.setPosition(ball, {x:pair2.x, y:pair2.y});
          sfxTeleport();
          spawnParticles(tp.x, tp.y, '#cc88ff', 16, 5);
          spawnParticles(pair2.x, pair2.y, '#cc88ff', 16, 5);
          G.screenShake = 6;
          tp.cooldown = 30;
          pair2.cooldown = 30;
        }
      }
    }
  }
}

function breakObject(obj, bx, by, color) {
  if(obj.broken) return;
  obj.broken = true;
  MWorld.remove(world, obj.body);
  spawnParticles(bx, by, color, 20, 5);
  G.score += 50;
  totalBroken++;
  G.bombBrokenThisDetonation++;
  spawnFloatScore(bx, by, 50, color);
  updateHUD();
}

function activatePowerup(type) {
  G.powerup = type;
  G.powerupTimer = 300;
  var el = document.getElementById('hud-powerup');
  var names = {'2x':'2X SCORE!', precision:'PRECISION!', ghost:'GHOST BALL!'};
  el.textContent = names[type]||type;
  el.style.display = 'block';
  spawnParticles(slingX, slingY, C.YELLOW, 20, 4);
}

// ============================================================
// BALL PHYSICS
// ============================================================
var activeBallTrail = [];

function launchBall() {
  var pull = Math.sqrt(G.pullVec.x*G.pullVec.x+G.pullVec.y*G.pullVec.y);
  if(pull < 10) return;

  var type = G.ballQueue[G.currentBallIdx];
  var bt = BALL_TYPES[type] || BALL_TYPES.standard;

  var body = MBodies.circle(slingX, slingY, C.BALL_RADIUS, {
    restitution: bt.restitution,
    friction: 0.1,
    frictionAir: bt.frictionAir,
    density: bt.mass * 0.004,
    label: 'ball',
    collisionFilter:{category:0x0001, mask:0xFFFF}
  });

  var massScale = 1.0 / Math.sqrt(bt.mass);
  var vx = -(G.pullVec.x / C.MAX_PULL) * C.LAUNCH_FORCE * massScale;
  var vy = -(G.pullVec.y / C.MAX_PULL) * C.LAUNCH_FORCE * massScale;

  MWorld.add(world, body);
  MBody.setVelocity(body, {x:vx, y:vy});

  var spinDir = G.pullVec.x > 0 ? 1 : -1;
  MBody.setAngularVelocity(body, spinDir * (Math.abs(G.pullVec.x) / C.MAX_PULL) * 0.35 + 0.1);

  G.activeBall = { body:body, type:type };
  G.launched = true;
  G.ballsFired++;
  G.settleFrames = 0;
  G.ballHasBouncedWall = false;
  G.thisBallHits = 0;
  activeBallTrail = [];
  lastStretchVol = 0;

  sfxLaunch();
  var arm = C.SLING_ARM;
  var lx = slingX - arm*0.55, ly = slingY - arm*0.35;
  var rx = slingX + arm*0.55, ry = slingY - arm*0.35;
  spawnParticles(lx, ly, C.CYAN, 8, 5);
  spawnParticles(rx, ry, C.CYAN, 8, 5);
  spawnParticles(slingX, slingY, bt.color, 12, 4);

  if(type === 'curve') {
    var hint = document.getElementById('ability-hint');
    hint.textContent = 'TAP FOR BOOST';
    hint.style.display = 'block';
  } else if(type === 'bomb') {
    var hint2 = document.getElementById('ability-hint');
    hint2.textContent = 'TAP TO DETONATE';
    hint2.style.display = 'block';
  }

  if(G.tutorialStep === 1) G.tutorialStep = 2;
}

function updateBallPhysics() {
  if(!G.activeBall) return;
  var b = G.activeBall.body;
  var pos = b.position;

  // Wind
  if(G.wind !== 0) {
    var windForce = G.wind * 0.0006 * b.mass;
    MBody.applyForce(b, pos, {x: windForce, y: 0});
  }

  // Gravity wells
  for(var gi=0;gi<G.gravWells.length;gi++) {
    var gw = G.gravWells[gi];
    var dx = gw.x - pos.x;
    var dy = gw.y - pos.y;
    var dist = Math.sqrt(dx*dx+dy*dy);
    if(dist < gw.r*4 && dist > 5) {
      var force = gw.strength * b.mass / (dist * 0.01 + 0.1);
      MBody.applyForce(b, pos, {
        x: (dx/dist)*force,
        y: (dy/dist)*force
      });
    }
  }

  // White holes (repulsors)
  applyWhiteHoleForces(b, pos);

  // Black holes - stronger gravitational pull + consumption
  for(var bhi=0;bhi<G.blackHoles.length;bhi++) {
    var bh = G.blackHoles[bhi];
    var bdx = bh.x - pos.x;
    var bdy = bh.y - pos.y;
    var bdist = Math.sqrt(bdx*bdx+bdy*bdy);
    if(bdist < bh.r*5 && bdist > 1) {
      // Strong attraction
      var bforce = 0.002 * b.mass / (bdist * 0.005 + 0.05);
      MBody.applyForce(b, pos, {
        x: (bdx/bdist)*bforce,
        y: (bdy/bdist)*bforce
      });
    }
    // Ball consumed by black hole center
    if(bdist < bh.r * 0.4) {
      // Dramatic implosion
      sfxBlackHole();
      spawnBlackHoleImplosion(bh.x, bh.y);
      G.screenShake = 20;
      G.epicFlash = 8;
      unlockAchievement('black_hole_survivor');
      MWorld.remove(world, b);
      G.activeBall = null;
      G.launched = false;
      document.getElementById('ability-hint').style.display = 'none';
      setTimeout(nextBall, 600);
      return;
    }
  }

  // Conveyor belt force
  for(var ci=0;ci<G.conveyors.length;ci++) {
    var cv = G.conveyors[ci];
    var cdx = pos.x - cv.x;
    var cdy = pos.y - cv.y;
    if(Math.abs(cdx) < cv.hw + C.BALL_RADIUS && Math.abs(cdy) < cv.hh + C.BALL_RADIUS + 10) {
      MBody.applyForce(b, pos, {x: cv.dir * 0.0008 * b.mass, y: 0});
    }
  }

  // Curve ball boost
  if(G.activeBall.type === 'curve' && G.curveBoost) {
    MBody.applyForce(b, pos, {x: b.velocity.x * 0.003, y: -0.022 * b.mass});
    G.curveBoost = false;
    document.getElementById('ability-hint').style.display = 'none';
  }

  // Bomb detonation
  if(G.activeBall.type === 'bomb' && G.bombDetonate) {
    G.bombBrokenThisDetonation = 0;
    spawnExplosion(pos.x, pos.y);
    document.getElementById('ability-hint').style.display = 'none';
    var allBodies = MComposite.allBodies(world);
    for(var bi=0;bi<allBodies.length;bi++) {
      var ob = allBodies[bi];
      if(ob === b) continue;
      var dx2 = ob.position.x - pos.x;
      var dy2 = ob.position.y - pos.y;
      var dist2 = Math.sqrt(dx2*dx2+dy2*dy2);
      if(dist2 < 150 && dist2 > 1) {
        var force2 = 0.12/dist2;
        MBody.applyForce(ob, ob.position, {x:(dx2/dist2)*force2, y:(dy2/dist2)*force2});
      }
    }
    for(var li=0;li<G.levelObjects.length;li++) {
      var lo = G.levelObjects[li];
      if(lo.broken || !lo.body) continue;
      if(lo.type === 'wood' || lo.type === 'glass') {
        var ldx = lo.body.position.x - pos.x;
        var ldy = lo.body.position.y - pos.y;
        if(Math.sqrt(ldx*ldx+ldy*ldy) < 120) {
          if(lo.type === 'wood') breakObjectWood(lo, lo.body.position.x, lo.body.position.y);
          else breakObject(lo, lo.body.position.x, lo.body.position.y, 'rgba(150,230,255,0.8)');
        }
      }
    }
    if(G.bombBrokenThisDetonation >= 3) {
      unlockAchievement('bomb_multi');
    }
    G.bombDetonate = false;
    MWorld.remove(world, b);
    G.activeBall = null;
    G.launched = false;
    nextBall();
    return;
  }

  // Trail
  activeBallTrail.unshift({x:pos.x, y:pos.y, angle: b.angle});
  if(activeBallTrail.length > 22) activeBallTrail.pop();

  // Update hole vortex timers
  for(var hv in G.holeVortex) {
    if(G.holeVortex[hv] > 0) G.holeVortex[hv]--;
  }

  // Off-screen (all 4 sides now since sling is in center)
  if(pos.y > H+80 || pos.y < -80 || pos.x < -100 || pos.x > W+100) {
    MWorld.remove(world, b);
    G.activeBall = null;
    G.launched = false;
    document.getElementById('ability-hint').style.display = 'none';
    setTimeout(nextBall, 500);
    return;
  }

  // Settle detection (anywhere on screen, not just bottom)
  var spd = Math.sqrt(b.velocity.x*b.velocity.x+b.velocity.y*b.velocity.y);
  if(spd < 1.0) {
    G.settleFrames++;
    if(G.settleFrames > 60) {
      MWorld.remove(world, b);
      G.activeBall = null;
      G.launched = false;
      document.getElementById('ability-hint').style.display = 'none';
      setTimeout(nextBall, 500);
    }
  } else {
    G.settleFrames = 0;
  }
}

function updateWindmills() {
  for(var i=0;i<G.windmills.length;i++) {
    var wm = G.windmills[i];
    wm.angle = (wm.angle||0) + wm.speed * 0.03;
    MBody.setAngle(wm.body, wm.angle);
    MBody.setAngularVelocity(wm.body, 0);
  }
}

function updateMovers() {
  for(var i=0;i<G.movingPlatforms.length;i++) {
    var mp = G.movingPlatforms[i];
    if(mp.broken) continue;
    mp.t += mp.speed * 0.02;
    var newX = mp.startX + Math.sin(mp.t) * mp.range * 0.5;
    MBody.setPosition(mp.body, {x:newX, y:mp.body.position.y});
    MBody.setVelocity(mp.body, {x:0,y:0});
  }
}

function updateTeleporterCooldowns() {
  for(var i=0;i<G.teleporters.length;i++) {
    if(G.teleporters[i].cooldown > 0) G.teleporters[i].cooldown--;
  }
}

function updateRoamingWhiteHoles() {
  if(!G.whiteHoles) return;
  var margin = 60;
  var slingBuffer = Math.min(W,H) * 0.18;
  for(var i=0;i<G.whiteHoles.length;i++) {
    var wh = G.whiteHoles[i];
    wh.x += wh.vx;
    wh.y += wh.vy;
    if(wh.x < margin){ wh.x = margin; wh.vx = Math.abs(wh.vx); }
    if(wh.x > W - margin){ wh.x = W - margin; wh.vx = -Math.abs(wh.vx); }
    if(wh.y < margin){ wh.y = margin; wh.vy = Math.abs(wh.vy); }
    if(wh.y > H - margin){ wh.y = H - margin; wh.vy = -Math.abs(wh.vy); }
    var sdx = wh.x - slingX, sdy = wh.y - slingY;
    var sd = Math.sqrt(sdx*sdx + sdy*sdy);
    if(sd < slingBuffer && sd > 0.01){
      wh.x = slingX + (sdx/sd) * slingBuffer;
      wh.y = slingY + (sdy/sd) * slingBuffer;
      wh.vx = (sdx/sd) * Math.abs(wh.vx || 1);
      wh.vy = (sdy/sd) * Math.abs(wh.vy || 1);
    }
  }
}

function applyWhiteHoleForces(b, pos) {
  if(!G.whiteHoles) return;
  for(var i=0;i<G.whiteHoles.length;i++) {
    var wh = G.whiteHoles[i];
    var dx = pos.x - wh.x;
    var dy = pos.y - wh.y;
    var dist = Math.sqrt(dx*dx+dy*dy);
    if(dist < wh.r*6 && dist > 1) {
      var force = 0.0015 * b.mass / (dist * 0.005 + 0.05);
      MBody.applyForce(b, pos, {
        x: (dx/dist) * force,
        y: (dy/dist) * force
      });
    }
  }
}

function drawWhiteHoles(t) {
  if(!G.whiteHoles) return;
  for(var i=0;i<G.whiteHoles.length;i++) {
    var wh = G.whiteHoles[i];
    var r = wh.r;
    ctx.save();
    ctx.translate(wh.x, wh.y);
    // Outward shockwave rings
    for(var ring=3; ring>0; ring--) {
      var pulse = (t*2 + ring*0.5) % 1;
      ctx.beginPath();
      ctx.arc(0, 0, r*(0.5 + pulse*1.5), 0, Math.PI*2);
      ctx.strokeStyle = 'rgba(150,230,255,' + (0.25*(1-pulse)) + ')';
      ctx.lineWidth = 2;
      ctx.stroke();
    }
    // Bright core
    var coreGrad = ctx.createRadialGradient(0,0,0,0,0,r);
    coreGrad.addColorStop(0, 'rgba(255,255,255,1)');
    coreGrad.addColorStop(0.4, 'rgba(180,230,255,0.9)');
    coreGrad.addColorStop(1, 'rgba(100,180,255,0.1)');
    ctx.beginPath();
    ctx.arc(0, 0, r, 0, Math.PI*2);
    ctx.fillStyle = coreGrad;
    ctx.shadowColor = '#a0e0ff';
    ctx.shadowBlur = 20;
    ctx.fill();
    ctx.restore();
  }
}

function updateRoamingBlackHoles() {
  var margin = 60;
  var slingBuffer = Math.min(W,H) * 0.18;
  for(var i=0;i<G.blackHoles.length;i++) {
    var bh = G.blackHoles[i];
    if(!bh.roaming) continue;
    bh.x += bh.vx;
    bh.y += bh.vy;
    // Bounce off walls
    if(bh.x < margin){ bh.x = margin; bh.vx = Math.abs(bh.vx); }
    if(bh.x > W - margin){ bh.x = W - margin; bh.vx = -Math.abs(bh.vx); }
    if(bh.y < margin){ bh.y = margin; bh.vy = Math.abs(bh.vy); }
    if(bh.y > H - margin){ bh.y = H - margin; bh.vy = -Math.abs(bh.vy); }
    // Keep black hole away from slingshot so balls can spawn safely
    var sdx = bh.x - slingX, sdy = bh.y - slingY;
    var sd = Math.sqrt(sdx*sdx + sdy*sdy);
    if(sd < slingBuffer && sd > 0.01){
      bh.x = slingX + (sdx/sd) * slingBuffer;
      bh.y = slingY + (sdy/sd) * slingBuffer;
      bh.vx = (sdx/sd) * Math.abs(bh.vx || 1);
      bh.vy = (sdy/sd) * Math.abs(bh.vy || 1);
    }
  }
}

function nextBall() {
  activeBallTrail = [];
  G.settleFrames = 0;
  document.getElementById('ability-hint').style.display = 'none';
  G.currentBallIdx++;

  if(G.endlessMode) {
    if(G.currentBallIdx >= G.ballQueue.length) {
      if(G.endlessLastScored) {
        var allTypes = Object.keys(BALL_TYPES);
        G.ballQueue.push(allTypes[G.endlessThrows % allTypes.length]);
        G.endlessLastScored = false;
      } else {
        endEndless();
        return;
      }
    }
    G.endlessThrows++;
    if(G.score > 0 && G.score % 1000 < 100 && G.endlessBallsLeft < G.ballQueue.length) {
      var allTypes2 = Object.keys(BALL_TYPES);
      G.ballQueue.push(allTypes2[Math.floor(Math.random()*allTypes2.length)]);
    }
    if(G.endlessThrows % 5 === 0) {
      G.endlessDifficulty++;
      G.wind = (Math.random() - 0.5) * Math.min(G.endlessDifficulty * 0.15, 0.8);
      MEvents.off(engine, 'collisionStart');
      buildLevel(G.level);
    }
    G.hitTargets = new Set();
    updateBallQueueUI();
    updateHUD();
    return;
  }

  if(G.currentBallIdx >= G.ballQueue.length) {
    if(!G.levelEnded){ G.levelEnded = true; endLevel(); }
    return;
  }
  updateBallQueueUI();
}

function updateHUD() {
  document.getElementById('hud-score').textContent = G.score.toString().padStart(5,'0');
  var comboEl = document.getElementById('hud-combo');
  if(G.combo >= 2) {
    var size = Math.min(9 + (G.combo-2)*2, 20);
    comboEl.textContent = 'x'+G.combo+' COMBO';
    comboEl.style.fontSize = size + 'px';
    comboEl.classList.remove('bump');
    void comboEl.offsetWidth;
    comboEl.classList.add('bump');
  } else {
    comboEl.textContent = '';
    comboEl.style.fontSize = '';
  }
  if(G.endlessMode) {
    document.getElementById('hud-level').textContent = 'ENDLESS \u2014 THROW '+(G.endlessThrows+1);
  } else {
    document.getElementById('hud-level').textContent = 'LVL '+(G.level+1)+' \u2014 '+(LEVEL_DEFS[G.level]?LEVEL_DEFS[G.level].name:'');
  }
  var windEl = document.getElementById('hud-wind');
  if(G.wind !== 0) {
    windEl.textContent = 'WIND: '+(G.wind>0?'\u25BA':'\u25C4')+' '+Math.abs(G.wind).toFixed(1);
  } else {
    windEl.textContent = '';
    windEl.style.opacity = '';
  }

  var barEl = document.getElementById('combo-bar');
  if(barEl) {
    if(G.combo >= 2 && G.comboTimer > 0) {
      barEl.style.width = (G.comboTimer / 120 * 100) + '%';
      barEl.style.display = 'block';
    } else {
      barEl.style.width = '0%';
    }
  }

  var gameScreen = document.getElementById('screen-game');
  if(G.combo >= 5) {
    gameScreen.style.boxShadow = 'inset 0 0 40px rgba(0,229,255,0.4), inset 0 0 80px rgba(255,0,255,0.2)';
  } else if(G.combo >= 3) {
    gameScreen.style.boxShadow = 'inset 0 0 30px rgba(0,229,255,0.25)';
  } else {
    gameScreen.style.boxShadow = '';
  }
}

function updateBallQueueUI() {
  var q = document.getElementById('ball-queue');
  q.innerHTML = '';
  for(var i=0; i<G.ballQueue.length; i++) {
    var type = G.ballQueue[i];
    var bt = BALL_TYPES[type];
    var div = document.createElement('div');
    div.className = 'ball-indicator' + (i===G.currentBallIdx&&!G.launched?' active-ball':'') + (i<G.currentBallIdx?' used-ball':'');
    var icon = document.createElement('div');
    icon.className = 'ball-icon';
    icon.style.background = bt.color;
    icon.style.boxShadow = '0 0 8px ' + bt.glow;
    div.appendChild(icon);
    if(i === G.currentBallIdx) {
      (function(tp){
        div.addEventListener('click', function(){ onBallAbility(tp); });
        div.addEventListener('touchend', function(e){ e.preventDefault(); onBallAbility(tp); });
      })(type);
    }
    q.appendChild(div);
  }
}

function onBallAbility(type) {
  if(!G.launched) return;
  if(type==='curve') G.curveBoost = true;
  if(type==='bomb')  G.bombDetonate = true;
}

// ============================================================
// LEVEL END
// ============================================================
function endLevel() {
  var def = LEVEL_DEFS[G.level];
  var stars = G.score >= def.stars[2] ? 3
    : G.score >= def.stars[1] ? 2
    : G.score >= def.stars[0] ? 1 : 0;

  var s = progress.stars;
  s[G.level] = Math.max(s[G.level]||0, stars);
  if(stars > 0 && G.level+1 < LEVEL_DEFS.length) {
    progress.unlocked = Math.max(progress.unlocked, G.level+2);
  }
  totalScore += G.score;
  saveProgress();
  checkAchievements();

  if(G.level === 0 && !localStorage.getItem(C.STORE_KEY_TUTORIAL)) {
    localStorage.setItem(C.STORE_KEY_TUTORIAL, 'done');
  }

  setTimeout(function(){showResults(stars);}, 800);
}

function showResults(stars) {
  document.getElementById('res-score').textContent = G.score.toString().padStart(6,'0');

  var thresholds = LEVEL_DEFS[G.level].stars;
  var bd = document.getElementById('res-breakdown');
  bd.innerHTML = 'Score <span>'+G.score+'</span><br>'+
    'Threshold 1\u2605 <span>'+thresholds[0]+'</span><br>'+
    'Threshold 3\u2605 <span>'+thresholds[2]+'</span><br>'+
    'Balls used <span>'+G.ballsFired+'</span>';

  showScreen('results');
  if(stars >= 1) sfxLevelComplete();
  else sfxLevelFail();

  G.confetti = [];
  if(stars === 3) {
    spawnConfetti(60);
  }

  var starsEl = document.getElementById('res-stars');
  starsEl.textContent = '\u2606\u2606\u2606';
  var starChars = ['\u2605\u2606\u2606','\u2605\u2605\u2606','\u2605\u2605\u2605'];
  if(stars === 0) { starsEl.textContent = '\u2606\u2606\u2606'; return; }
  for(var i=0; i<stars; i++) {
    (function(idx){
      setTimeout(function(){
        starsEl.textContent = starChars[idx];
        starsEl.style.transform = 'scale(1.35)';
        starsEl.style.transition = 'transform 0.15s';
        playTone(500 + idx*150, 'sine', 0.3, 0.22);
        spawnParticles(W*0.5, H*0.5, C.YELLOW, 14, 5);
        setTimeout(function(){ starsEl.style.transform = 'scale(1)'; }, 180);
      }, idx*450 + 200);
    })(i);
  }
}

// ============================================================
// ENDLESS MODE
// ============================================================
function generateEndlessLayout() {
  var obstacleTypes = ['wood','steel','glass','bumper','windmill','mover','gravity','bouncePad','teleporter','conveyor'];
  var numObs = 3 + Math.min(G.endlessDifficulty, 5);
  var obstacles = [];
  var powerups = [];

  for(var i=0;i<numObs;i++) {
    var type = obstacleTypes[Math.floor(Math.random()*obstacleTypes.length)];
    var fx = 0.15 + Math.random()*0.70;
    var fy = 0.15 + Math.random()*0.70;
    // Avoid center sling area
    if(fx > 0.38 && fx < 0.62 && fy > 0.38 && fy < 0.62) {
      fy = fy < 0.5 ? 0.20 : 0.80;
    }

    if(type === 'bumper') {
      obstacles.push({type:type, fx:fx, fy:fy, fr:0.03+Math.random()*0.02});
    } else if(type === 'windmill') {
      obstacles.push({type:type, fx:fx, fy:fy, flen:0.08+Math.random()*0.06, speed:(Math.random()-0.5)*4});
    } else if(type === 'gravity') {
      obstacles.push({type:type, fx:fx, fy:fy, fr:0.04+Math.random()*0.03, strength:0.0004+Math.random()*0.0006});
    } else if(type === 'mover') {
      obstacles.push({type:type, fx:fx, fy:fy, fw:0.12+Math.random()*0.10, fh:0.022, rangeX:0.1+Math.random()*0.1, speed:(Math.random()-0.5)*2});
    } else if(type === 'teleporter') {
      obstacles.push({type:'teleporter', fx:fx, fy:fy, fr:0.03, pairId:i});
      obstacles.push({type:'teleporter', fx:0.15+Math.random()*0.70, fy:0.15+Math.random()*0.70, fr:0.03, pairId:i});
    } else if(type === 'conveyor') {
      obstacles.push({type:'conveyor', fx:fx, fy:fy, fw:0.15+Math.random()*0.12, fh:0.022, dir:Math.random()>0.5?1:-1});
    } else {
      obstacles.push({type:type, fx:fx, fy:fy, fw:0.10+Math.random()*0.10, fh:0.022, angle:(Math.random()-0.5)*0.6});
    }
  }

  // Maybe a powerup
  if(Math.random() > 0.5) {
    var puTypes = ['2x','precision','ghost'];
    powerups.push({type:puTypes[Math.floor(Math.random()*puTypes.length)], fx:0.3+Math.random()*0.4, fy:0.15+Math.random()*0.20});
  }

  // Scattered holes for endless
  var holes = [];
  var numHoles = 5 + Math.min(G.endlessDifficulty, 2);
  var holePtsOptions = [10,10,20,20,50,100];
  for(var hi=0; hi<numHoles; hi++) {
    var hfx = 0.06 + Math.random()*0.88;
    var hfy = 0.06 + Math.random()*0.88;
    if(hfx > 0.38 && hfx < 0.62 && hfy > 0.38 && hfy < 0.62) {
      hfy = hfy < 0.5 ? 0.10 : 0.90;
    }
    holes.push({pts:holePtsOptions[hi % holePtsOptions.length], fx:hfx, fy:hfy});
  }

  // Black holes for endless (after difficulty 3)
  var blackHoles = [];
  if(G.endlessDifficulty >= 3) {
    var numBH = Math.min(Math.floor((G.endlessDifficulty - 2) / 2), 3);
    for(var bhi=0; bhi<numBH; bhi++) {
      var bhfx = 0.20 + Math.random()*0.60;
      var bhfy = 0.20 + Math.random()*0.60;
      if(bhfx > 0.38 && bhfx < 0.62 && bhfy > 0.38 && bhfy < 0.62) {
        bhfy = bhfy < 0.5 ? 0.25 : 0.75;
      }
      blackHoles.push({fx:bhfx, fy:bhfy, fr:0.03+Math.random()*0.02});
    }
  }

  // Cycle ball types - 5 balls
  var allTypes = Object.keys(BALL_TYPES);
  var balls = [];
  for(var b=0;b<5;b++) {
    balls.push(allTypes[(G.endlessThrows + b) % allTypes.length]);
  }

  return {
    name: 'ENDLESS',
    stars: [99999,99999,99999],
    balls: balls,
    wind: G.wind || 0,
    obstacles: obstacles,
    powerups: powerups,
    holes: holes,
    blackHoles: blackHoles
  };
}

function drawTutorial(t) {
  if(G.endlessMode) return;
  if(G.level !== 0) return;
  if(localStorage.getItem(C.STORE_KEY_TUTORIAL)) return;

  if(G.tutorialStep === 0) G.tutorialStep = 1;

  var alpha = 0.5 + 0.5*Math.sin(t*4);
  ctx.save();
  ctx.globalAlpha = alpha;

  if(G.tutorialStep === 1 && !G.launched) {
    var ax = slingX, ay = slingY + 60;
    ctx.fillStyle = C.YELLOW;
    ctx.beginPath();
    ctx.moveTo(ax, ay - 25);
    ctx.lineTo(ax - 10, ay - 10);
    ctx.lineTo(ax + 10, ay - 10);
    ctx.closePath();
    ctx.fill();
    ctx.globalAlpha = 0.9;
    ctx.font = "bold 10px 'Press Start 2P', monospace";
    ctx.textAlign = 'center';
    ctx.fillStyle = C.YELLOW;
    ctx.shadowColor = C.YELLOW;
    ctx.shadowBlur = 10;
    ctx.fillText('PULL ANY', ax, ay + 10);
    ctx.fillText('DIRECTION!', ax, ay + 24);
    ctx.shadowBlur = 0;
  } else if(G.tutorialStep === 2 && G.launched) {
    ctx.globalAlpha = 0.9;
    ctx.font = "bold 9px 'Press Start 2P', monospace";
    ctx.textAlign = 'center';
    ctx.fillStyle = C.YELLOW;
    ctx.shadowColor = C.YELLOW;
    ctx.shadowBlur = 10;
    ctx.fillText('AIM FOR', W*0.5, H*0.15);
    ctx.fillText('THE HOLES!', W*0.5, H*0.15+14);
    ctx.shadowBlur = 0;
  }

  ctx.restore();
}

// ============================================================
// EPIC SLOW-MO DRAWING
// ============================================================
function drawEpicEffects(t) {
  if(G.epicFlash > 0) {
    ctx.save();
    ctx.globalAlpha = G.epicFlash / 10 * 0.6;
    ctx.fillStyle = '#ffffff';
    ctx.fillRect(0, 0, W, H);
    ctx.restore();
    G.epicFlash--;
  }

  if(G.epicText > 0) {
    var scale = Math.min(1, (80 - G.epicText) / 15) * 1.5;
    var alpha2 = G.epicText / 80;
    ctx.save();
    ctx.globalAlpha = alpha2;
    ctx.font = "bold " + Math.round(24 * scale) + "px 'Press Start 2P', monospace";
    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';
    ctx.fillStyle = C.MAGENTA;
    ctx.shadowColor = C.MAGENTA;
    ctx.shadowBlur = 30;
    var epicY = G.epicTarget ? G.epicTarget.y + 40 : H*0.35;
    ctx.fillText('EPIC SHOT!', W/2, epicY);
    ctx.shadowBlur = 0;
    ctx.restore();
    G.epicText--;
  }
}

var pointerDown = false;
var pointerId = null;

function getPos(e) {
  if(e.touches) {
    var t = e.changedTouches ? e.changedTouches[0] : e.touches[0];
    return {x:t.clientX, y:t.clientY};
  }
  return {x:e.clientX, y:e.clientY};
}

function isNearSling(p) {
  var dx = p.x - slingX, dy = p.y - slingY;
  return Math.sqrt(dx*dx+dy*dy) < 100;
}

function onPointerDown(e) {
  if(G.screen !== 'game' || G.paused) return;
  var p = getPos(e);

  if(G.launched && G.activeBall) {
    var type = G.ballQueue[G.currentBallIdx];
    onBallAbility(type);
    return;
  }

  if(!G.launched && isNearSling(p)) {
    G.dragging = true;
    pointerDown = true;
    G.dragStart = p;
    G.pullVec = {x:0,y:0};
  }
}

function onPointerMove(e) {
  if(!G.dragging || G.screen !== 'game') return;
  var p = getPos(e);
  var dx = p.x - slingX;
  var dy = p.y - slingY;
  // No restriction on direction - can pull any way
  var dist = Math.sqrt(dx*dx+dy*dy);
  if(dist > C.MAX_PULL) {
    dx = dx/dist*C.MAX_PULL;
    dy = dy/dist*C.MAX_PULL;
  }
  G.pullVec = {x: dx, y: dy};
  playStretchSound(dist / C.MAX_PULL);
}

function onPointerUp(e) {
  if(!G.dragging) return;
  G.dragging = false;
  pointerDown = false;
  if(G.screen === 'game' && !G.launched) {
    launchBall();
    G.pullVec = {x:0,y:0};
  }
}

// HELPER: shade color
// ============================================================
function shadeColor(hex, pct) {
  var n = parseInt(hex.slice(1),16);
  var r = Math.max(0,Math.min(255,((n>>16)&0xff)+pct));
  var g = Math.max(0,Math.min(255,((n>>8)&0xff)+pct));
  var b = Math.max(0,Math.min(255,(n&0xff)+pct));
  return 'rgb('+r+','+g+','+b+')';
}

// ============================================================
// ACTIVE BALL DRAWING
// ============================================================
function drawActiveBall() {
  if(!G.activeBall) return;
  var b = G.activeBall.body;
  var pos = b.position;

  // Rainbow trail at combo x5+
  if(G.combo >= 5 && activeBallTrail.length > 0) {
    for(var i=0; i<activeBallTrail.length; i++) {
      var tp = activeBallTrail[i];
      var hue = (G.frameCount * 8 - i*15) % 360;
      var frac = 1 - i/activeBallTrail.length;
      ctx.beginPath();
      ctx.arc(tp.x, tp.y, C.BALL_RADIUS*(frac*0.7+0.1), 0, Math.PI*2);
      ctx.fillStyle = 'hsla('+hue+',100%,60%,'+(frac*0.35)+')';
      ctx.fill();
    }
  }

  drawBall(pos.x, pos.y, C.BALL_RADIUS, G.activeBall.type, G.combo >= 5 ? [] : activeBallTrail, b.angle);
}

// ============================================================
// MAIN GAME LOOP
// ============================================================
var lastTime = 0;
var gameTime = 0;

function gameLoop(ts) {
  requestAnimationFrame(gameLoop);
  var dt = Math.min(ts - lastTime, 50);
  lastTime = ts;
  gameTime = ts * 0.001;

  var t = gameTime;

  // Shake offset
  var sx = 0, sy = 0;
  if(G.screenShake > 0) {
    sx = (Math.random()-.5)*G.screenShake;
    sy = (Math.random()-.5)*G.screenShake;
    G.screenShake *= 0.8;
    if(G.screenShake < 0.3) G.screenShake = 0;
  }

  ctx.save();
  if(sx || sy) ctx.translate(sx, sy);

  // Epic slow-mo zoom
  if(G.epicSlowMo > 0 && G.epicTarget) {
    var zoomFactor = 1 + 0.05 * (G.epicSlowMo / 60);
    var zx = G.epicTarget.x, zy = G.epicTarget.y;
    ctx.translate(zx, zy);
    ctx.scale(zoomFactor, zoomFactor);
    ctx.translate(-zx, -zy);
  }

  drawBackground(t);

  if(G.screen === 'title') {
    drawTitleAnimation(t);
  } else if(G.screen === 'game' && !G.paused) {
    // Physics step with slow-mo support
    if(G.epicSlowMo > 0) {
      MEngine.update(engine, 16.67 * 0.25);
      G.epicSlowMo--;
    } else {
      MEngine.update(engine, 16.67);
    }
    updateBallPhysics();
    updateWindmills();
    updateMovers();
    updateTeleporterCooldowns();
    updateRoamingBlackHoles();
    updateRoamingWhiteHoles();
    updateParticles();

    // Combo timer
    if(G.comboTimer > 0) {
      G.comboTimer--;
      if(G.comboTimer === 0) {
        G.combo = 0;
        document.getElementById('hud-combo').textContent = '';
        document.getElementById('hud-combo').style.fontSize = '';
        var barEl = document.getElementById('combo-bar');
        if(barEl) barEl.style.width = '0%';
        document.getElementById('screen-game').style.boxShadow = '';
      }
    }

    // Powerup timer
    if(G.powerupTimer > 0) {
      G.powerupTimer--;
      if(G.powerupTimer === 0) {
        G.powerup = null;
        document.getElementById('hud-powerup').style.display = 'none';
      }
    }

    drawHoles(t);
    drawBlackHoles(t);
    drawWhiteHoles(t);
    drawObstacles(t);
    drawPowerups(t);
    drawSlingshot(t);
    drawTrajectory();
    drawIdleBall(t);
    drawActiveBall();
    drawParticles();
    drawEpicEffects(t);
    drawTutorial(t);

    // Wind particles
    if(G.wind !== 0) drawWindParticles(t);

  } else if(G.screen === 'game' && G.paused) {
    drawHoles(t);
    drawBlackHoles(t);
    drawWhiteHoles(t);
    drawObstacles(t);
    drawSlingshot(t);
  } else if(G.screen === 'results' || G.screen === 'endless-results') {
    drawBackground(t);
    updateParticles();
    drawParticles();
  }

  ctx.restore();

  G.frameCount++;
}

var windParts = [];
for(var wpi=0;wpi<50;wpi++){
  windParts.push({x:Math.random(),y:Math.random()*0.85+0.08,life:Math.random(),speed:0.5+Math.random()*1.2,thickness:0.5+Math.random()*2,len:8+Math.random()*28});
}
function drawWindParticles(t) {
  var windDir = Math.sign(G.wind);
  for(var wi=0;wi<windParts.length;wi++) {
    var wp = windParts[wi];
    wp.x += G.wind * 0.004 * wp.speed;
    wp.life += 0.009 + Math.abs(G.wind)*0.006;
    if(wp.x > 1.08) wp.x = -0.08;
    if(wp.x < -0.08) wp.x = 1.08;
    if(wp.life > 1) { wp.life=0; wp.x = windDir < 0 ? 1.0 : 0.0; wp.y=Math.random()*0.85+0.08; }
    var alpha = Math.sin(wp.life*Math.PI)*(0.15 + Math.abs(G.wind)*0.25);
    if(alpha < 0.01) continue;
    ctx.beginPath();
    var sx = wp.x*W, sy = wp.y*H;
    ctx.moveTo(sx, sy);
    ctx.lineTo(sx - G.wind * wp.len, sy + (Math.random()-0.5)*2);
    ctx.strokeStyle = 'rgba(100,200,255,'+alpha+')';
    ctx.lineWidth = wp.thickness;
    ctx.stroke();
  }
  var windEl = document.getElementById('hud-wind');
  if(G.wind !== 0) {
    var arr = G.wind > 0 ? '\u25BA' : '\u25C4';
    var pulse = 0.6 + 0.4*Math.sin(t*4);
    windEl.style.opacity = pulse;
    windEl.textContent = 'WIND: '+arr+arr+' '+Math.abs(G.wind).toFixed(1);
  }
}

// ============================================================
// INIT
// ============================================================
function init() {
  resize();
  initEngine();

  // Title ball animation area
  var tba = document.getElementById('title-ball-anim');
  var btEntries = Object.entries(BALL_TYPES);
  for(var i=0;i<btEntries.length;i++) {
    var type = btEntries[i][0], bt = btEntries[i][1];
    var btn = document.createElement('div');
    btn.className = 'ball-type-btn';
    var dot = document.createElement('div');
    dot.className = 'ball-type-dot';
    dot.style.background = bt.color;
    dot.style.boxShadow = '0 0 8px ' + bt.glow;
    btn.appendChild(dot);
    btn.appendChild(document.createTextNode(bt.label));
    btn.style.color = bt.color;
    btn.style.borderColor = bt.color;
    tba.appendChild(btn);
  }

  requestAnimationFrame(gameLoop);
}

init();
</script>
