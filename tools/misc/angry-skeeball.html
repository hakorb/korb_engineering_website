<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
<meta name="description" content="korb.skeeball — physics-based slingshot arcade with 20 levels, endless mode, achievements, teleporters, conveyors, black holes, and neon visuals. Korb Engineering.">
<title>korb.skeeball // Korb Engineering</title>
<link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&family=Chakra+Petch:wght@400;700&display=swap" rel="stylesheet">
<script src="../../vendor/matter-0.19.0.min.js"></script>
<style>
*{margin:0;padding:0;box-sizing:border-box}
html,body{width:100%;height:100dvh;overflow:hidden;background:#050a0f;touch-action:none;user-select:none;-webkit-user-select:none;font-family:'Chakra Petch',sans-serif}
canvas#game{position:absolute;top:0;left:0;width:100%;height:100%;display:block;touch-action:none;-webkit-touch-callout:none}
#ui{position:absolute;top:0;left:0;width:100%;height:100%;pointer-events:none;font-family:'Press Start 2P',monospace;color:#fff}
#ui *{pointer-events:auto}
.screen{position:absolute;inset:0;display:none;flex-direction:column;align-items:center;justify-content:center;z-index:10}
.screen.active{display:flex}

/* GAME SCREEN - touch passthrough */
#screen-game{pointer-events:none}
#screen-game .hud{pointer-events:none}
#screen-game .hud > *{pointer-events:auto}
#screen-game .ball-queue{pointer-events:auto}
#screen-game .combo-bar-wrap{pointer-events:none}
#screen-game .ability-hint{pointer-events:none}
#screen-game .level-banner{pointer-events:none}

/* TITLE */
.title-bg{position:absolute;inset:0;background:radial-gradient(ellipse at 50% 55%,rgba(0,229,255,.07) 0%,transparent 65%)}
.title-logo{font-size:clamp(24px,7vw,48px);color:#00e5ff;text-shadow:0 0 30px #00e5ff,0 0 70px #00e5ff,0 0 140px rgba(0,229,255,.25);text-align:center;line-height:1.5;margin-bottom:10px;animation:logoPulse 3s ease-in-out infinite;position:relative;z-index:2}
@keyframes logoPulse{0%,100%{text-shadow:0 0 30px #00e5ff,0 0 70px #00e5ff;transform:scale(1)}50%{text-shadow:0 0 50px #00e5ff,0 0 100px #00e5ff,0 0 200px rgba(0,229,255,.4);transform:scale(1.02)}}
.title-sub{font-family:'Chakra Petch',sans-serif;font-size:clamp(11px,2.8vw,17px);color:#ff00ff;text-shadow:0 0 14px #ff00ff;margin-bottom:36px;letter-spacing:5px;position:relative;z-index:2}
.tap-start{font-size:clamp(9px,2.2vw,13px);color:#ffeb3b;animation:blink 1.2s ease-in-out infinite;position:relative;z-index:2}
@keyframes blink{0%,100%{opacity:1;text-shadow:0 0 10px #ffeb3b}50%{opacity:.25;text-shadow:none}}
.best-score-txt{font-size:9px;color:#444;margin-top:20px;position:relative;z-index:2}

/* BUTTONS */
.btn{font-family:'Press Start 2P',monospace;font-size:clamp(8px,1.9vw,11px);padding:11px 22px;border:2px solid #00e5ff;background:rgba(0,229,255,.07);color:#00e5ff;border-radius:6px;cursor:pointer;min-height:44px;min-width:44px;text-align:center;margin:5px;transition:all .15s;text-shadow:0 0 7px currentColor}
.btn:active{transform:scale(.92);background:rgba(0,229,255,.18);box-shadow:0 0 18px rgba(0,229,255,.25)}
.btn.orange{border-color:#ff9900;color:#ff9900;background:rgba(255,153,0,.07)}
.btn.magenta{border-color:#ff00ff;color:#ff00ff;background:rgba(255,0,255,.07)}
.btn.green{border-color:#7cff00;color:#7cff00;background:rgba(124,255,0,.07)}
.btn.red{border-color:#ff3333;color:#ff3333;background:rgba(255,51,51,.07)}

/* LEVEL SELECT */
.level-grid{display:grid;grid-template-columns:repeat(5,1fr);gap:8px;padding:16px;max-width:400px;width:100%}
.combo-bar-wrap{position:absolute;bottom:0;left:0;right:0;height:3px;background:rgba(255,0,255,0.12);overflow:hidden;pointer-events:none}
.combo-bar{height:100%;background:#ff00ff;transition:width 0.1s linear;box-shadow:0 0 6px #ff00ff}
.ability-hint{position:absolute;bottom:60px;left:50%;transform:translateX(-50%);font-family:'Press Start 2P',monospace;font-size:9px;color:#ffeb3b;text-shadow:0 0 10px #ffeb3b;pointer-events:none;animation:abilityPulse 0.7s ease-in-out infinite;white-space:nowrap}
@keyframes abilityPulse{0%,100%{opacity:1;transform:translateX(-50%) scale(1)}50%{opacity:0.4;transform:translateX(-50%) scale(0.95)}}
.level-banner{position:absolute;top:60px;left:50%;transform:translateX(-50%);font-family:'Press Start 2P',monospace;font-size:clamp(9px,2.2vw,13px);color:#00e5ff;text-shadow:0 0 20px #00e5ff;pointer-events:none;text-align:center;white-space:nowrap}
.level-btn{aspect-ratio:1;display:flex;flex-direction:column;align-items:center;justify-content:center;font-family:'Press Start 2P',monospace;font-size:13px;border:2px solid #00e5ff;background:rgba(0,229,255,.05);color:#00e5ff;border-radius:10px;cursor:pointer;min-height:50px;position:relative;transition:all .18s;text-shadow:0 0 6px #00e5ff}
.level-btn:active:not(.locked){transform:scale(.9);box-shadow:0 0 14px rgba(0,229,255,.4)}
.level-btn.locked{border-color:#1a1a2e;color:#2a2a4a;cursor:default;text-shadow:none;background:rgba(0,0,0,.3)}
.level-btn .stars{font-size:7px;margin-top:3px;color:#ffeb3b;text-shadow:0 0 4px #ffeb3b;letter-spacing:-1px}
.level-btn.locked .stars{color:#1a1a2e;text-shadow:none}

/* HUD */
.hud{position:absolute;top:0;left:0;right:0;display:flex;justify-content:space-between;align-items:flex-start;padding:8px 12px;pointer-events:none;z-index:5;background:linear-gradient(180deg,rgba(5,10,15,.8) 0%,transparent 100%)}
.hud>*{pointer-events:auto}
.hud-score{font-size:clamp(14px,3.5vw,22px);color:#00e5ff;text-shadow:0 0 12px #00e5ff}
.hud-combo{font-size:clamp(9px,2vw,12px);color:#ff00ff;text-shadow:0 0 9px #ff00ff;margin-top:3px;min-height:16px;transition:transform .12s}
.hud-combo.bump{animation:comboBump .28s ease-out}
@keyframes comboBump{0%{transform:scale(1.6)}100%{transform:scale(1)}}
.hud-level{font-size:9px;color:#444;margin-top:2px}
.hud-right{text-align:right;display:flex;flex-direction:column;align-items:flex-end;gap:4px}
.hud-wind{font-family:'Chakra Petch',sans-serif;font-size:10px;color:rgba(100,200,255,.6)}
.hud-powerup{font-size:10px;background:rgba(0,0,0,.7);border:1px solid #ffeb3b;border-radius:5px;padding:3px 8px;color:#ffeb3b;animation:powerGlow 1s ease-in-out infinite}
@keyframes powerGlow{0%,100%{box-shadow:0 0 5px rgba(255,235,59,.25)}50%{box-shadow:0 0 14px rgba(255,235,59,.55)}}
.pause-btn{font-size:16px;background:none;border:none;color:#666;cursor:pointer;min-height:44px;min-width:44px;display:flex;align-items:center;justify-content:center;line-height:1}

/* BALL QUEUE */
.ball-queue{position:absolute;bottom:10px;left:10px;display:flex;gap:5px;align-items:center;z-index:5}
.ball-indicator{width:34px;height:34px;border-radius:50%;border:2px solid #333;display:flex;align-items:center;justify-content:center;cursor:pointer;min-height:44px;min-width:44px;transition:all .18s;position:relative;background:rgba(0,0,0,.4)}
.ball-indicator.active-ball{border-color:#00e5ff;box-shadow:0 0 14px #00e5ff;transform:scale(1.15)}
.ball-indicator.used-ball{opacity:.18;pointer-events:none}
.ball-icon{width:22px;height:22px;border-radius:50%}

/* RESULTS */
.results-box{background:rgba(5,10,15,.97);border:2px solid #00e5ff;border-radius:14px;padding:26px;max-width:340px;width:90%;text-align:center;box-shadow:0 0 50px rgba(0,229,255,.12),inset 0 0 30px rgba(0,229,255,.03)}
.results-title{font-size:12px;color:#666;margin-bottom:4px}
.results-score{font-size:28px;color:#00e5ff;text-shadow:0 0 20px #00e5ff;margin:14px 0}
.results-stars{font-size:30px;margin:10px 0}
.results-breakdown{font-family:'Chakra Petch',sans-serif;font-size:12px;color:#777;text-align:left;margin:14px 0;line-height:2.3}
.results-breakdown span{float:right;color:#aaa}

/* PAUSE */
.pause-overlay{position:absolute;inset:0;background:rgba(5,10,15,.88);display:none;flex-direction:column;align-items:center;justify-content:center;z-index:20}
.pause-overlay.active{display:flex}
.pause-title{font-size:clamp(16px,4vw,24px);color:#00e5ff;text-shadow:0 0 20px #00e5ff;margin-bottom:28px}

/* FLOAT SCORES */
.float-score{position:absolute;font-family:'Press Start 2P',monospace;pointer-events:none;z-index:100;animation:floatUp .9s ease-out forwards}
@keyframes floatUp{0%{opacity:1;transform:translateY(0) scale(1)}50%{opacity:1;transform:translateY(-28px) scale(1.25)}100%{opacity:0;transform:translateY(-65px) scale(.8)}}

/* SCANLINES */
#scanlines{position:absolute;inset:0;pointer-events:none;z-index:15;background:repeating-linear-gradient(0deg,transparent,transparent 2px,rgba(0,0,0,.07) 2px,rgba(0,0,0,.07) 4px);animation:scanMove 8s linear infinite}
@keyframes scanMove{0%{background-position:0 0}100%{background-position:0 200px}}

/* BALL TYPE SELECTOR */
.ball-type-row{display:flex;gap:6px;margin-top:8px;position:relative;z-index:2}
.ball-type-btn{width:44px;height:44px;border-radius:50%;border:2px solid #444;background:rgba(0,0,0,.5);cursor:pointer;display:flex;flex-direction:column;align-items:center;justify-content:center;font-family:'Chakra Petch',sans-serif;font-size:7px;color:#888;transition:all .15s;gap:2px}
.ball-type-btn.selected{border-color:#fff;box-shadow:0 0 12px currentColor;color:#fff}
.ball-type-dot{width:18px;height:18px;border-radius:50%}

/* ACHIEVEMENT TOAST */
.achievement-toast{position:absolute;top:-80px;left:50%;transform:translateX(-50%);background:rgba(5,10,15,.96);border:2px solid #ffeb3b;border-radius:10px;padding:10px 18px;font-family:'Press Start 2P',monospace;font-size:8px;color:#ffeb3b;text-shadow:0 0 8px #ffeb3b;z-index:200;pointer-events:none;text-align:center;white-space:nowrap;box-shadow:0 0 30px rgba(255,235,59,.2);transition:top 0.5s cubic-bezier(.34,1.56,.64,1)}
.achievement-toast.show{top:20px}
.achievement-toast .ach-icon{font-size:16px;display:block;margin-bottom:4px}
.achievement-toast .ach-name{color:#fff;font-size:9px;display:block;margin-top:3px}

/* STATS SCREEN */
.stats-box{background:rgba(5,10,15,.97);border:2px solid #00e5ff;border-radius:14px;padding:26px;max-width:340px;width:90%;text-align:left;box-shadow:0 0 50px rgba(0,229,255,.12),inset 0 0 30px rgba(0,229,255,.03)}
.stats-title{font-size:14px;color:#00e5ff;text-shadow:0 0 12px #00e5ff;text-align:center;margin-bottom:18px}
.stats-row{font-family:'Chakra Petch',sans-serif;font-size:13px;color:#888;line-height:2.6;border-bottom:1px solid rgba(0,229,255,.08)}
.stats-row span{float:right;color:#00e5ff;font-family:'Press Start 2P',monospace;font-size:11px}

/* ACHIEVEMENTS DISPLAY on level select */
.ach-bar{display:flex;gap:4px;flex-wrap:wrap;justify-content:center;margin-top:10px;max-width:400px}
.ach-icon-small{width:28px;height:28px;border-radius:50%;border:1px solid #333;background:rgba(0,0,0,.5);display:flex;align-items:center;justify-content:center;font-size:11px;opacity:0.3}
.ach-icon-small.unlocked{border-color:#ffeb3b;opacity:1;box-shadow:0 0 6px rgba(255,235,59,.3)}
</style>
</head>
<body>
<canvas id="game"></canvas>
<div id="scanlines"></div>
<div id="ui">
  <!-- TITLE SCREEN -->
  <div class="screen active" id="screen-title">
    <div class="title-bg"></div>
    <div class="title-logo">korb.<br>skeeball</div>
    <div class="title-sub">PHYSICS ARCADE</div>
    <div class="ball-type-row" id="title-ball-anim" style="margin-bottom:28px"></div>
    <div class="tap-start">TAP TO START</div>
    <div class="best-score-txt" id="best-score-txt"></div>
    <div id="screen-title-btns" style="margin-top:18px;display:flex;gap:8px;flex-wrap:wrap;justify-content:center">
      <button class="btn" id="btn-play">PLAY</button>
      <button class="btn magenta" id="btn-levels">LEVELS</button>
      <button class="btn orange" id="btn-stats">STATS</button>
      <button class="btn red" id="btn-endless">ENDLESS</button>
    </div>
  </div>

  <!-- LEVEL SELECT SCREEN -->
  <div class="screen" id="screen-levels">
    <div style="font-size:clamp(11px,2.8vw,16px);color:#00e5ff;margin-bottom:14px;text-shadow:0 0 12px #00e5ff">SELECT LEVEL</div>
    <div class="level-grid" id="level-grid"></div>
    <div class="ach-bar" id="ach-bar-levels"></div>
    <button class="btn" id="btn-back-title" style="margin-top:14px">BACK</button>
  </div>

  <!-- STATS SCREEN -->
  <div class="screen" id="screen-stats">
    <div class="stats-box">
      <div class="stats-title">STATISTICS</div>
      <div class="stats-row">Total Score <span id="stat-total">0</span></div>
      <div class="stats-row">Stars Earned <span id="stat-stars">0</span></div>
      <div class="stats-row">Levels Completed <span id="stat-levels">0</span></div>
      <div class="stats-row">Best Combo <span id="stat-combo">0</span></div>
      <div class="stats-row">Obstacles Broken <span id="stat-broken">0</span></div>
      <div class="stats-row">Achievements <span id="stat-achs">0</span></div>
      <div class="stats-row">Endless Best <span id="stat-endless">0</span></div>
      <div class="stats-row">Wall Bounces <span id="stat-bounces">0</span></div>
      <div style="text-align:center;margin-top:18px">
        <button class="btn" id="btn-back-stats">BACK</button>
      </div>
    </div>
  </div>

  <!-- GAME SCREEN -->
  <div class="screen" id="screen-game">
    <div class="hud">
      <div>
        <div class="hud-score" id="hud-score">0</div>
        <div class="hud-combo" id="hud-combo"></div>
        <div class="hud-level" id="hud-level"></div>
      </div>
      <div class="hud-right">
        <button class="pause-btn" id="btn-pause">&#x23F8;</button>
        <div class="hud-wind" id="hud-wind"></div>
        <div class="hud-powerup" id="hud-powerup" style="display:none"></div>
      </div>
    </div>
    <div class="combo-bar-wrap"><div class="combo-bar" id="combo-bar" style="width:0%"></div></div>
    <div class="ability-hint" id="ability-hint" style="display:none"></div>
    <div class="level-banner" id="level-banner" style="display:none"></div>
    <div class="ball-queue" id="ball-queue"></div>
  </div>

  <!-- PAUSE OVERLAY -->
  <div class="pause-overlay" id="pause-overlay">
    <div class="pause-title">PAUSED</div>
    <button class="btn" id="btn-resume">RESUME</button>
    <button class="btn orange" id="btn-restart">RESTART</button>
    <button class="btn magenta" id="btn-quit">QUIT</button>
  </div>

  <!-- RESULTS SCREEN -->
  <div class="screen" id="screen-results">
    <div class="results-box">
      <div class="results-title">LEVEL COMPLETE</div>
      <div class="results-score" id="res-score">0</div>
      <div class="results-stars" id="res-stars">&#x2606;&#x2606;&#x2606;</div>
      <div class="results-breakdown" id="res-breakdown"></div>
      <div style="display:flex;gap:8px;justify-content:center;flex-wrap:wrap;margin-top:10px">
        <button class="btn" id="btn-retry">RETRY</button>
        <button class="btn orange" id="btn-next">NEXT</button>
        <button class="btn magenta" id="btn-to-levels">LEVELS</button>
      </div>
    </div>
  </div>

  <!-- ENDLESS RESULTS SCREEN -->
  <div class="screen" id="screen-endless-results">
    <div class="results-box">
      <div class="results-title" id="endless-res-title">GAME OVER</div>
      <div class="results-score" id="endless-res-score">0</div>
      <div class="results-breakdown" id="endless-res-breakdown"></div>
      <div style="display:flex;gap:8px;justify-content:center;flex-wrap:wrap;margin-top:10px">
        <button class="btn red" id="btn-endless-retry">RETRY</button>
        <button class="btn" id="btn-endless-quit">MENU</button>
      </div>
    </div>
  </div>

  <!-- ACHIEVEMENT TOAST (reused) -->
  <div class="achievement-toast" id="achievement-toast">
    <span class="ach-icon" id="ach-toast-icon"></span>
    ACHIEVEMENT UNLOCKED
    <span class="ach-name" id="ach-toast-name"></span>
  </div>
</div>

<script>
// ============================================================
// CONSTANTS & CONFIG
// ============================================================
var C = {
  BG: '#050a0f',
  CYAN: '#00e5ff',
  ORANGE: '#ff9900',
  MAGENTA: '#ff00ff',
  GREEN: '#7cff00',
  YELLOW: '#ffeb3b',
  RED: '#ff3333',
  PURPLE: '#aa00ff',
  STEEL: '#8899aa',
  WOOD: '#8B5E3C',
  GLASS_CLR: 'rgba(150,230,255,0.28)',
  GRAVITY: 0.9,
  MAX_PULL: 120,
  SLING_ARM: 54,
  TRAJ_DOTS: 28,
  TRAJ_STEP: 0.06,
  BALL_RADIUS: 14,
  WALL_T: 60,
  LAUNCH_FORCE: 32,
  STORE_KEY_PROG: 'korb_angryskeeball_progress',
  STORE_KEY_SET: 'korb_angryskeeball_settings',
  STORE_KEY_TOT: 'korb_angryskeeball_total',
  STORE_KEY_ACH: 'korb_angryskeeball_achievements',
  STORE_KEY_BEST_COMBO: 'korb_angryskeeball_bestcombo',
  STORE_KEY_BROKEN: 'korb_angryskeeball_broken',
  STORE_KEY_ENDLESS: 'korb_angryskeeball_endless_best',
  STORE_KEY_TUTORIAL: 'korb_angryskeeball_tutorial_done',
  STORE_KEY_BOUNCES: 'korb_angryskeeball_wallbounces',
};

// Ball type configs
var BALL_TYPES = {
  standard: { color: C.CYAN,    glow: C.CYAN,    mass: 1.0, restitution: 0.45, label: 'STD', frictionAir: 0.010, trailStyle: 'normal'  },
  heavy:    { color: C.ORANGE,  glow: C.ORANGE,  mass: 2.8, restitution: 0.15, label: 'HVY', frictionAir: 0.022, trailStyle: 'heavy'   },
  bouncy:   { color: C.MAGENTA, glow: C.MAGENTA, mass: 0.6, restitution: 0.95, label: 'BNC', frictionAir: 0.006, trailStyle: 'sparkle' },
  curve:    { color: C.GREEN,   glow: C.GREEN,   mass: 0.8, restitution: 0.35, label: 'CRV', frictionAir: 0.009, trailStyle: 'normal'  },
  bomb:     { color: C.RED,     glow: C.RED,     mass: 1.5, restitution: 0.20, label: 'BMB', frictionAir: 0.013, trailStyle: 'smoke'   },
};

// Hole radius based on point value (inverse relationship)
function holeRadiusForPts(pts) {
  if(pts >= 200) return 7;
  if(pts >= 100) return 10;
  if(pts >= 50) return 16;
  if(pts >= 20) return 20;
  return 24;
}

function holeColorForPts(pts) {
  if(pts >= 200) return '#ff3333';
  if(pts >= 100) return '#ff00ff';
  if(pts >= 50) return '#ffeb3b';
  if(pts >= 20) return '#00e5ff';
  return '#6688ff';
}

// ============================================================
// ACHIEVEMENT DEFINITIONS
// ============================================================
var ACHIEVEMENT_DEFS = {
  first_score: { name:'First Blood', desc:'Score your first points', icon:'\u{1F3AF}' },
  hit_100:     { name:'Bullseye', desc:'Hit the 100pt hole', icon:'\u{1F4A5}' },
  combo_3:     { name:'Triple Threat', desc:'Get a x3 combo', icon:'\u{26A1}' },
  combo_5:     { name:'Combo King', desc:'Get a x5 combo', icon:'\u{1F451}' },
  star_3:      { name:'Perfect', desc:'Get 3 stars on any level', icon:'\u{2B50}' },
  all_stars_5: { name:'Halfway Hero', desc:'3-star first 5 levels', icon:'\u{1F31F}' },
  all_stars:   { name:'Grand Master', desc:'3-star ALL levels', icon:'\u{1F3C6}' },
  break_10:    { name:'Demolition', desc:'Break 10 obstacles total', icon:'\u{1F4A3}' },
  total_5000:  { name:'Score Hoarder', desc:'Accumulate 5,000 points', icon:'\u{1F4B0}' },
  total_25000: { name:'Score Legend', desc:'Accumulate 25,000 points', icon:'\u{1F48E}' },
  no_miss:     { name:'Sharpshooter', desc:'Hit all holes in a level', icon:'\u{1F3AF}' },
  bomb_multi:  { name:'Explosive', desc:'Destroy 3+ obstacles with one bomb', icon:'\u{1F525}' },
  black_hole_survivor: { name:'Event Horizon', desc:'Have a ball consumed by a black hole', icon:'\u{1F30C}' },
  wall_bounce: { name:'Bank Shot', desc:'Score after bouncing off a wall', icon:'\u{1F3B1}' },
};

// ============================================================
// LEVEL DEFINITIONS (all 20 levels with holes, blackHoles, 5 balls each)
// ============================================================
var LEVEL_DEFS = [
  // Level 1: Tutorial
  { name:'TUTORIAL', stars:[300,600,900],
    balls:['standard','standard','standard','standard','standard'], wind:0, obstacles:[], powerups:[],
    holes:[
      {pts:10, fx:0.20, fy:0.15},{pts:10, fx:0.80, fy:0.15},
      {pts:20, fx:0.15, fy:0.85},{pts:20, fx:0.85, fy:0.85},
      {pts:50, fx:0.50, fy:0.10},{pts:100, fx:0.50, fy:0.90}
    ],
    blackHoles:[]
  },
  // Level 2: Wooden Planks
  { name:'PLANK WALL', stars:[400,800,1200],
    balls:['standard','standard','standard','standard','heavy'], wind:0,
    obstacles:[
      {type:'wood', fx:0.30, fy:0.35, fw:0.16, fh:0.03, angle:0},
      {type:'wood', fx:0.70, fy:0.65, fw:0.16, fh:0.03, angle:0},

var achToastQueue = [];
var achToastTimer = 0;

function unlockAchievement(id) {
  if(achievements[id]) return;
  if(!ACHIEVEMENT_DEFS[id]) return;
  achievements[id] = true;
  saveProgress();
  achToastQueue.push(id);
  if(achToastTimer <= 0) showNextAchToast();
}

function showNextAchToast() {
  if(achToastQueue.length === 0) { achToastTimer = 0; return; }
  var id = achToastQueue.shift();
  var def = ACHIEVEMENT_DEFS[id];
  var toast = document.getElementById('achievement-toast');
  document.getElementById('ach-toast-icon').textContent = def.icon;
  document.getElementById('ach-toast-name').textContent = def.name;
  toast.classList.add('show');
  sfxAchievement();
  achToastTimer = 1;
  setTimeout(function() {
    toast.classList.remove('show');
    setTimeout(function() {
      achToastTimer = 0;
      if(achToastQueue.length > 0) showNextAchToast();
    }, 500);
  }, 3000);
}

function checkAchievements() {
  if(G.score > 0) unlockAchievement('first_score');
  if(G.combo >= 3) unlockAchievement('combo_3');
  if(G.combo >= 5) unlockAchievement('combo_5');
  if(G.combo > bestCombo) { bestCombo = G.combo; }
  if(totalScore >= 5000) unlockAchievement('total_5000');
  if(totalScore >= 25000) unlockAchievement('total_25000');
  if(totalBroken >= 10) unlockAchievement('break_10');

  // Check star-based achievements
  var allStars = progress.stars || [];
  for(var i = 0; i < allStars.length; i++) {
    if(allStars[i] >= 3) { unlockAchievement('star_3'); break; }
  }
  var first5 = true;
  for(var j = 0; j < 5; j++) {
    if((allStars[j]||0) < 3) { first5 = false; break; }
  }
  if(first5 && allStars.length >= 5) unlockAchievement('all_stars_5');

  var allMax = true;
  for(var k = 0; k < LEVEL_DEFS.length; k++) {
    if((allStars[k]||0) < 3) { allMax = false; break; }
  }
  if(allMax && allStars.length >= LEVEL_DEFS.length) unlockAchievement('all_stars');
}

var audioCtx = null;
function getAudio() {
  if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
  return audioCtx;
}
function playTone(freq, type, dur, vol, detune) {
  vol = vol === undefined ? 0.18 : vol;
  detune = detune || 0;
  if (!settings.sound) return;
  try {
    var a = getAudio();
    var o = a.createOscillator();
    var g = a.createGain();
    o.connect(g); g.connect(a.destination);
    o.type = type; o.frequency.value = freq; o.detune.value = detune;
    g.gain.setValueAtTime(vol, a.currentTime);
    g.gain.exponentialRampToValueAtTime(0.001, a.currentTime + dur);
    o.start(); o.stop(a.currentTime + dur);
  } catch(e){}
}

var lastStretchVol = 0;
function playStretchSound(t) {
  if(!settings.sound) return;
  if(Math.abs(t - lastStretchVol) < 0.06) return;
  lastStretchVol = t;
  try {
    var a = getAudio();
    var o = a.createOscillator();
    var g = a.createGain();
    o.connect(g); g.connect(a.destination);
    o.type = 'sawtooth';
    o.frequency.value = 120 + t * 180;
    g.gain.setValueAtTime(0.04, a.currentTime);
    g.gain.exponentialRampToValueAtTime(0.001, a.currentTime + 0.06);
    o.start(); o.stop(a.currentTime + 0.06);

}

function getThemeColors(level) {
  if(level <= 4) return { bg:'#050a0f', gridColor:'rgba(0,229,255,0.025)', starColor:'rgba(200,240,255,0.7)' };
  if(level <= 9) return { bg:'#060812', gridColor:'rgba(100,80,255,0.025)', starColor:'rgba(200,200,255,0.6)' };
  if(level <= 14) return { bg:'#040a08', gridColor:'rgba(0,180,100,0.025)', starColor:'rgba(180,255,220,0.6)' };
  return { bg:'#0a0408', gridColor:'rgba(255,50,100,0.025)', starColor:'rgba(255,200,220,0.6)' };
}

// ============================================================
// BACKGROUND RENDERING
// ============================================================
var BG_STARS = [];
for(var bsi=0;bsi<120;bsi++){
  BG_STARS.push({x:Math.random(),y:Math.random(),r:Math.random()*1.4+0.3,bright:Math.random(),phase:Math.random()*Math.PI*2,spd:0.4+Math.random()*0.8});
}
var BG_SHAPES = [];
for(var bshi=0;bshi<8;bshi++){
  BG_SHAPES.push({x:Math.random()*800,y:Math.random()*800,r:18+Math.random()*40,sides:Math.floor(Math.random()*3)+3,rot:Math.random()*Math.PI*2,rotSpd:(Math.random()-.5)*0.008,clr:[C.CYAN,C.MAGENTA,C.ORANGE,C.GREEN][Math.floor(Math.random()*4)],alpha:0.04+Math.random()*0.07,vy:(Math.random()-.5)*0.15});
}

function drawBackground(t) {
  var theme = getThemeColors(G.endlessMode ? 15 : G.level);
  ctx.fillStyle = theme.bg;
  ctx.fillRect(0,0,W,H);

  // Grid
  ctx.strokeStyle = theme.gridColor;
  ctx.lineWidth = 1;
  var gs = 50;
  var ox = (t*8)%gs;
  for(var x = -gs+ox; x < W+gs; x+=gs){ ctx.beginPath();ctx.moveTo(x,0);ctx.lineTo(x,H);ctx.stroke(); }
  var oy = (t*5)%gs;
  for(var y = -gs+oy; y < H+gs; y+=gs){ ctx.beginPath();ctx.moveTo(0,y);ctx.lineTo(W,y);ctx.stroke(); }

  // Stars
  for(var si=0;si<BG_STARS.length;si++) {
    var s = BG_STARS[si];
    var bri = 0.4+0.6*Math.sin(s.phase+t*s.spd);
    ctx.beginPath();
    ctx.arc(s.x*W, s.y*H, s.r, 0, Math.PI*2);
    ctx.fillStyle = theme.starColor.replace('0.7', (bri*0.7).toFixed(2)).replace('0.6', (bri*0.6).toFixed(2));
    ctx.fill();
  }

  // Floating shapes
  for(var shi=0;shi<BG_SHAPES.length;shi++) {
    var sh = BG_SHAPES[shi];
    sh.rot += sh.rotSpd;
    sh.y += sh.vy;
    if(sh.y > H+60) sh.y = -60;
    if(sh.y < -60) sh.y = H+60;
    ctx.save();
    ctx.translate(sh.x, sh.y);
    ctx.rotate(sh.rot);
    ctx.beginPath();
    for(var i=0;i<sh.sides;i++){
      var a = (i/sh.sides)*Math.PI*2-Math.PI/2;
      ctx.lineTo(Math.cos(a)*sh.r, Math.sin(a)*sh.r);
    }
    ctx.closePath();
    ctx.strokeStyle = sh.clr;
    ctx.globalAlpha = sh.alpha;
    ctx.lineWidth = 1.5;
    ctx.stroke();
    ctx.globalAlpha = 1;
    ctx.restore();
  }

  // Vignette overlay
  var vg = ctx.createRadialGradient(W/2, H/2, Math.min(W,H)*0.3, W/2, H/2, Math.max(W,H)*0.75);
  vg.addColorStop(0, 'rgba(0,0,0,0)');
  vg.addColorStop(1, 'rgba(0,0,0,0.35)');
  ctx.fillStyle = vg;
  ctx.fillRect(0,0,W,H);

  // Wall flash effects
  drawWallFlash(t);
}

function drawWallFlash(t) {
  var wf = G.wallFlash;
  if(wf.left > 0) {
    ctx.fillStyle = 'rgba(0,229,255,' + (wf.left/10*0.5) + ')';
    ctx.fillRect(0, 0, 4, H);
    wf.left -= 0.5;
  }
  if(wf.right > 0) {
    ctx.fillStyle = 'rgba(0,229,255,' + (wf.right/10*0.5) + ')';
    ctx.fillRect(W-4, 0, 4, H);
    wf.right -= 0.5;
  }
  if(wf.top > 0) {
    ctx.fillStyle = 'rgba(0,229,255,' + (wf.top/10*0.5) + ')';
    ctx.fillRect(0, 0, W, 4);
    wf.top -= 0.5;
  }
  if(wf.bottom > 0) {
    ctx.fillStyle = 'rgba(0,229,255,' + (wf.bottom/10*0.5) + ')';
    ctx.fillRect(0, H-4, W, 4);
    wf.bottom -= 0.5;
  }
}

// ============================================================
// SCORING HOLES (scattered positions from level def)
// ============================================================
var holePositions = [];
var holeConfigs = [];

function setHolePositions() {
  var def = G.endlessMode ? G.currentEndlessDef : LEVEL_DEFS[G.level];
  if(!def || !def.holes) return;
  holePositions = [];
  holeConfigs = [];
  for(var i=0; i<def.holes.length; i++) {
    var h = def.holes[i];
    holePositions.push({
      x: h.fx * W,
      y: h.fy * H,
      ri: i
    });
    holeConfigs.push({
      pts: h.pts,
      color: holeColorForPts(h.pts),
      radius: holeRadiusForPts(h.pts)
    });
  }
}

function drawHoles(t) {
  setHolePositions();

  for(var i=0; i<holePositions.length; i++) {
    var hp = holePositions[i];
    var rc = holeConfigs[i];
    var r = rc.radius;
    var isHit = G.hitTargets && G.hitTargets.has(i);
    var pulse = 1 + 0.05*Math.sin(t*2.5 + i*0.9);

    // Vortex animation if being sucked
    var vortex = G.holeVortex[i];
    if(vortex && vortex > 0) {
      ctx.save();
      ctx.translate(hp.x, hp.y);
      var vortexSpd = (1 - vortex/15) * 12;
      for(var seg=0; seg<4; seg++) {
        var segAngle = t*vortexSpd + seg*(Math.PI/2);
        ctx.beginPath();
        ctx.arc(0, 0, r*1.2*pulse, segAngle, segAngle+0.8);
        ctx.strokeStyle = rc.color;
        ctx.lineWidth = 2;
        ctx.globalAlpha = 0.6;
        ctx.shadowColor = rc.color;
        ctx.shadowBlur = 10;
        ctx.stroke();
        ctx.shadowBlur = 0;
      }
      ctx.globalAlpha = 1;
      ctx.restore();
    }

    // Dark circle (the "hole" opening)
    ctx.beginPath();
    ctx.arc(hp.x, hp.y, r*pulse + 5, 0, Math.PI*2);
    ctx.fillStyle = 'rgba(0,0,0,0.7)';
    ctx.fill();

    // Glowing ring
    ctx.beginPath();
    ctx.arc(hp.x, hp.y, r*pulse, 0, Math.PI*2);
    ctx.strokeStyle = rc.color;
    ctx.lineWidth = isHit ? 2 : 3.5;
    ctx.shadowColor = rc.color;
    ctx.shadowBlur = isHit ? 5 : 20;
    ctx.globalAlpha = isHit ? 0.25 : 1.0;
    ctx.stroke();
    ctx.shadowBlur = 0;

    // Inner dark
    ctx.beginPath();
    ctx.arc(hp.x, hp.y, r*pulse * 0.72, 0, Math.PI*2);
    ctx.fillStyle = isHit ? 'rgba(0,0,0,0.95)' : 'rgba(5,8,15,0.9)';
    ctx.globalAlpha = 1;
    ctx.fill();

    if(!isHit) {
      ctx.beginPath();
      ctx.arc(hp.x, hp.y, r*0.7, 0, Math.PI*2);
      ctx.fillStyle = 'rgba(255,255,255,0.05)';
      ctx.fill();
    }

    // Score label inside
    ctx.globalAlpha = isHit ? 0.2 : 0.9;
    ctx.fillStyle = rc.color;
    var fontSize = r > 20 ? 8 : r > 14 ? 7 : 6;
    ctx.font = 'bold ' + fontSize + "px 'Press Start 2P', monospace";
    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';
    ctx.shadowColor = rc.color;
    ctx.shadowBlur = isHit ? 0 : 8;
    ctx.fillText(rc.pts, hp.x, hp.y);
    ctx.shadowBlur = 0;
    ctx.globalAlpha = 1;
  }
}

// ============================================================
// BLACK HOLE RENDERING
// ============================================================
function drawBlackHoles(t) {
  for(var i=0;i<G.blackHoles.length;i++) {
    var bh = G.blackHoles[i];
    drawBlackHole(bh, t);
  }
}

function drawBlackHole(bh, t) {
  var x = bh.x, y = bh.y, r = bh.r;

  // Outer warping effect
  ctx.save();
  ctx.translate(x, y);

  // Accretion disk rings
  for(var ring=3; ring>0; ring--) {
    ctx.beginPath();
    ctx.arc(0, 0, r*(0.6+ring*0.25), 0, Math.PI*2);
    var ringAlpha = 0.08/ring;
    ctx.strokeStyle = 'rgba(255,60,0,' + ringAlpha + ')';
    ctx.lineWidth = 3;
    ctx.stroke();
  }

  // Spinning accretion disk (red/orange spiral)
  for(var arm=0; arm<3; arm++) {
    ctx.save();
    ctx.rotate(t*2 + arm*(Math.PI*2/3));
    ctx.beginPath();
    for(var sp=0; sp<20; sp++) {
      var angle = sp*0.3;
      var dist = r*0.3 + sp*r*0.06;
      var px = Math.cos(angle)*dist;
      var py = Math.sin(angle)*dist;
      if(sp===0) ctx.moveTo(px,py); else ctx.lineTo(px,py);
    }
    var spiralAlpha = 0.4 + 0.2*Math.sin(t*3);
    ctx.strokeStyle = arm === 0 ? 'rgba(255,100,0,'+spiralAlpha+')' : arm === 1 ? 'rgba(255,50,0,'+(spiralAlpha*0.7)+')' : 'rgba(200,0,0,'+(spiralAlpha*0.5)+')';
    ctx.lineWidth = 2;
    ctx.stroke();
    ctx.restore();
  }

  // Dark void center
  ctx.beginPath();
  ctx.arc(0, 0, r*0.5, 0, Math.PI*2);
  var voidGrad = ctx.createRadialGradient(0,0,0,0,0,r*0.5);
  voidGrad.addColorStop(0, 'rgba(0,0,0,1)');
  voidGrad.addColorStop(0.7, 'rgba(0,0,0,0.95)');
  voidGrad.addColorStop(1, 'rgba(20,0,30,0.6)');
  ctx.fillStyle = voidGrad;
  ctx.fill();

  // Event horizon glow
  ctx.beginPath();
  ctx.arc(0, 0, r*0.55, 0, Math.PI*2);
  ctx.strokeStyle = 'rgba(100,0,150,0.5)';
  ctx.lineWidth = 2;
  ctx.shadowColor = '#6600aa';
  ctx.shadowBlur = 15;
  ctx.stroke();
  ctx.shadowBlur = 0;

  // Ambient particles being drawn in
  if(G.frameCount % 3 === 0) {
    var pAngle = Math.random()*Math.PI*2;
    var pDist = r*1.2;
    G.particles.push({
      x: x + Math.cos(pAngle)*pDist,
      y: y + Math.sin(pAngle)*pDist,
      vx: -Math.cos(pAngle)*1.5,
      vy: -Math.sin(pAngle)*1.5,
      r: 1, life: 0.5, decay: 0.03,
      color: '#ff4400'
    });
  }

  ctx.restore();
}

// ============================================================
// SLINGSHOT DRAWING
// ============================================================
function drawSlingshot(t) {
  var bx = slingX, by = slingY;
  var arm = C.SLING_ARM;

  // Base post
  var grad = ctx.createLinearGradient(bx-6, by, bx+6, by);
  grad.addColorStop(0,'#2a3540');
  grad.addColorStop(0.5,'#4a6070');
  grad.addColorStop(1,'#2a3540');
  ctx.fillStyle = grad;
  ctx.beginPath();
  ctx.roundRect(bx-8, by+arm*0.6, 16, 38, 4);
  ctx.fill();

  // Base platform
  ctx.fillStyle = '#3a5060';
  ctx.beginPath();
  ctx.roundRect(bx-22, by+arm*0.6+34, 44, 8, 3);
  ctx.fill();
  ctx.strokeStyle = C.CYAN;
  ctx.lineWidth = 1;
  ctx.globalAlpha = 0.3;
  ctx.stroke();
  ctx.globalAlpha = 1;

  // Left fork
  ctx.save();
  var lx = bx - arm*0.55, ly = by - arm*0.35;
  var grad2 = ctx.createLinearGradient(bx, by, lx, ly);
  grad2.addColorStop(0,'#3a5060');
  grad2.addColorStop(1,'#2a8090');
  ctx.strokeStyle = grad2;
  ctx.lineWidth = 7;
  ctx.lineCap = 'round';
  ctx.shadowColor = C.CYAN;
  ctx.shadowBlur = 6;
  ctx.beginPath();
  ctx.moveTo(bx, by+arm*0.5);
  ctx.lineTo(lx, ly);
  ctx.stroke();

  // Right fork
  var rx = bx + arm*0.55, ry = by - arm*0.35;
  var grad3 = ctx.createLinearGradient(bx, by, rx, ry);
  grad3.addColorStop(0,'#3a5060');
  grad3.addColorStop(1,'#2a8090');
  ctx.strokeStyle = grad3;
  ctx.beginPath();
  ctx.moveTo(bx, by+arm*0.5);
  ctx.lineTo(rx, ry);
  ctx.stroke();
  ctx.restore();

  // Fork tips with breathing glow when idle
  var tipPulse = !G.launched && !G.dragging ? 0.5 + 0.5*Math.sin(t*3) : 0.5;
  for(var fi=0;fi<2;fi++) {
    var tx = fi===0?lx:rx, ty = fi===0?ly:ry;
    ctx.beginPath();
    ctx.arc(tx, ty, 5, 0, Math.PI*2);
    ctx.fillStyle = '#2abcd0';
    ctx.shadowColor = C.CYAN;
    ctx.shadowBlur = 10 + tipPulse*12;
    ctx.fill();
    ctx.shadowBlur = 0;
  }

  // Cradle cup under idle ball
  if(!G.launched && !G.activeBall) {
    var cy = by - C.BALL_RADIUS + 3;
    ctx.save();
    ctx.strokeStyle = 'rgba(0,229,255,0.4)';
    ctx.lineWidth = 2.5;
    ctx.beginPath();
    ctx.arc(bx, cy + C.BALL_RADIUS*0.6, C.BALL_RADIUS*0.7, Math.PI*0.15, Math.PI*0.85);
    ctx.stroke();
    ctx.restore();
  }
}

function drawRubberBand(ballX, ballY, t) {
  var arm = C.SLING_ARM;
  var lx = slingX - arm*0.55, ly = slingY - arm*0.35;
  var rx = slingX + arm*0.55, ry = slingY - arm*0.35;

  var bandColor = G.dragging
    ? 'hsl(' + (170+G.pullVec.x) + ',80%,60%)'
    : C.CYAN;

  ctx.strokeStyle = bandColor;
  ctx.lineWidth = 3;
  ctx.shadowColor = bandColor;
  ctx.shadowBlur = 8;
  ctx.lineCap = 'round';

  ctx.beginPath();
  ctx.moveTo(lx, ly);
  ctx.quadraticCurveTo(ballX-8, ballY+6, ballX, ballY);
  ctx.stroke();

  ctx.beginPath();
  ctx.moveTo(rx, ry);
  ctx.quadraticCurveTo(ballX+8, ballY+6, ballX, ballY);
  ctx.stroke();

  ctx.shadowBlur = 0;
}

// ============================================================
// TRAJECTORY PREVIEW (works in all directions now)
// ============================================================
function drawTrajectory() {
  if(!G.dragging || !G.pullVec) return;
  var pull = Math.sqrt(G.pullVec.x*G.pullVec.x+G.pullVec.y*G.pullVec.y);
  if(pull < 12) return;

  var bt = BALL_TYPES[G.ballQueue[G.currentBallIdx]] || BALL_TYPES.standard;
  var massScale = 1.0 / Math.sqrt(bt.mass);
  var vx = -(G.pullVec.x / C.MAX_PULL) * C.LAUNCH_FORCE * massScale;
  var vy = -(G.pullVec.y / C.MAX_PULL) * C.LAUNCH_FORCE * massScale;

  var px = slingX, py = slingY;
  var dvx = vx, dvy = vy;
  var grav = C.GRAVITY * 0.5;

  for(var i=0;i<C.TRAJ_DOTS;i++) {
    dvx += G.wind * 0.018;
    dvy += grav;
    dvx *= (1 - bt.frictionAir);
    px += dvx; py += dvy;
    if(py < -20 || py > H+20 || px < -10 || px > W+10) break;

    var alpha = (1-i/C.TRAJ_DOTS)*0.65;
    var r = (1-i/C.TRAJ_DOTS)*4+1.5;
    ctx.beginPath();
    ctx.arc(px, py, r, 0, Math.PI*2);
    ctx.fillStyle = bt.color;
    ctx.globalAlpha = alpha;
    ctx.shadowColor = bt.glow;
    ctx.shadowBlur = i < 4 ? 6 : 0;
    ctx.fill();
    ctx.shadowBlur = 0;
    ctx.globalAlpha = 1;
  }
}

// ============================================================
// BALL DRAWING
// ============================================================
function drawBall(bx, by, r, type, trail, angle) {
  trail = trail || [];
  angle = angle || 0;
  var bt = BALL_TYPES[type] || BALL_TYPES.standard;
  var trailStyle = bt.trailStyle || 'normal';

  for(var i=0; i<trail.length; i++) {
    var tp = trail[i];
    var frac = 1 - i/trail.length;

    if(trailStyle === 'heavy') {
      if(i > 8) continue;
      ctx.beginPath();
      ctx.arc(tp.x, tp.y, r*(frac*0.7+0.1), 0, Math.PI*2);
      ctx.fillStyle = bt.glow;
      ctx.globalAlpha = frac*0.35;
      ctx.fill();
    } else if(trailStyle === 'sparkle') {
      if(i % 2 === 0) {
        ctx.beginPath();
        ctx.arc(tp.x + (Math.random()-0.5)*6, tp.y + (Math.random()-0.5)*6, r*0.2+1, 0, Math.PI*2);
        ctx.fillStyle = bt.color;
        ctx.globalAlpha = frac*0.6;
        ctx.shadowColor = bt.glow;
        ctx.shadowBlur = 4;
        ctx.fill();
        ctx.shadowBlur = 0;
      }
    } else if(trailStyle === 'smoke') {
      ctx.beginPath();
      ctx.arc(tp.x, tp.y, r*(frac*1.1+0.2), 0, Math.PI*2);
      ctx.fillStyle = i < 8 ? '#ff2200' : '#441100';
      ctx.globalAlpha = frac*0.18;
      ctx.fill();
    } else {
      ctx.beginPath();
      ctx.arc(tp.x, tp.y, r*(frac*0.6+0.15), 0, Math.PI*2);
      ctx.fillStyle = bt.glow;
      ctx.globalAlpha = frac*0.28;
      ctx.fill();
    }
  }
  ctx.globalAlpha = 1;
  ctx.shadowBlur = 0;

  if(trail.length > 2) {
    ctx.beginPath();
    ctx.arc(bx, by, r*2.2, 0, Math.PI*2);
    ctx.fillStyle = bt.glow;
    ctx.globalAlpha = 0.08;
    ctx.fill();
    ctx.globalAlpha = 1;
  }

  // Ball body
  ctx.shadowColor = bt.glow;
  ctx.shadowBlur = 22;
  var grad = ctx.createRadialGradient(bx-r*0.3, by-r*0.3, r*0.05, bx, by, r);
  grad.addColorStop(0, 'white');
  grad.addColorStop(0.2, bt.color);
  grad.addColorStop(1, shadeColor(bt.color, -60));
  ctx.beginPath();
  ctx.arc(bx, by, r, 0, Math.PI*2);
  ctx.fillStyle = grad;
  ctx.fill();
  ctx.shadowBlur = 0;

  // Rotation seams
  ctx.save();
  ctx.translate(bx, by);
  ctx.rotate(angle);
  ctx.strokeStyle = 'rgba(0,0,0,0.25)';
  ctx.lineWidth = 1.2;
  ctx.beginPath();
  ctx.arc(0, 0, r*0.85, -0.5, Math.PI+0.5);
  ctx.stroke();
  ctx.beginPath();
  ctx.arc(0, 0, r*0.85, Math.PI-0.5, Math.PI*2+0.5);
  ctx.stroke();
  ctx.restore();

  // Specular highlight
  ctx.beginPath();
  ctx.arc(bx-r*0.28, by-r*0.28, r*0.22, 0, Math.PI*2);
  ctx.fillStyle = 'rgba(255,255,255,0.55)';
  ctx.fill();

  // Bomb ball pulse
  if(type === 'bomb' && trail.length > 0) {
    var pulse = 0.5 + 0.5*Math.sin(G.frameCount * 0.25);
    ctx.beginPath();
    ctx.arc(bx, by, r + 4 + pulse*3, 0, Math.PI*2);
    ctx.strokeStyle = 'rgba(255,50,0,' + (pulse*0.6) + ')';
    ctx.lineWidth = 2;
    ctx.stroke();
  }

  // Curve ball glow
  if(type === 'curve' && trail.length > 0) {
    var pulse2 = 0.5 + 0.5*Math.sin(G.frameCount * 0.2);
    ctx.beginPath();
    ctx.arc(bx, by, r + 3 + pulse2*2, 0, Math.PI*2);
    ctx.strokeStyle = 'rgba(124,255,0,' + (pulse2*0.5) + ')';
    ctx.lineWidth = 1.5;
    ctx.stroke();
  }
}

function drawIdleBall(t) {
  if(G.launched || G.activeBall) return;
  var type = G.ballQueue[G.currentBallIdx];
  if(!type) return;
  var bob = Math.sin(t*2.2)*3;
  if(!G.dragging) {
    drawBall(slingX, slingY-C.BALL_RADIUS+bob, C.BALL_RADIUS, type, [], 0);
    drawRubberBand(slingX, slingY-C.BALL_RADIUS+bob, t);
  } else {
    var pullX = Math.min(Math.max(G.pullVec.x,-C.MAX_PULL),C.MAX_PULL);
    var pullY = Math.min(Math.max(G.pullVec.y,-C.MAX_PULL),C.MAX_PULL);
    var bx = slingX + pullX;
    var by = slingY + pullY;
    var dragAngle = pullX / C.MAX_PULL * 0.4;
    drawBall(bx, by-C.BALL_RADIUS, C.BALL_RADIUS, type, [], dragAngle);
    drawRubberBand(bx, by-C.BALL_RADIUS, t);
    var pullPct = Math.round(Math.sqrt(pullX*pullX+pullY*pullY)/C.MAX_PULL*100);
    ctx.save();
    ctx.font = "bold 10px 'Press Start 2P', monospace";
    ctx.textAlign = 'center';
    ctx.fillStyle = pullPct > 75 ? C.RED : pullPct > 40 ? C.ORANGE : C.YELLOW;
    ctx.shadowColor = ctx.fillStyle;
    ctx.shadowBlur = 8;
    ctx.fillText(pullPct+'%', bx, by + C.BALL_RADIUS + 16);
    ctx.shadowBlur = 0;
    ctx.restore();
  }
}

// ============================================================
// OBSTACLE DRAWING
// ============================================================
function drawObstacles(t) {
  if(!G.levelObjects) return;
  for(var oi=0;oi<G.levelObjects.length;oi++) {
    var obj = G.levelObjects[oi];
    if(!obj.body || obj.broken) continue;
    if(obj.type === 'teleporter' || obj.type === 'conveyor') continue;
    drawObstacle(obj, t);
  }
  for(var mi=0;mi<G.movingPlatforms.length;mi++) {
    var mp = G.movingPlatforms[mi];
    if(mp.broken) continue;
    drawObstacle(mp, t);
  }
  for(var wi=0;wi<G.windmills.length;wi++) {
    drawWindmill(G.windmills[wi], t);
  }
  for(var gi=0;gi<G.gravWells.length;gi++) {
    drawGravityWell(G.gravWells[gi], t);
  }
  for(var ti=0;ti<G.teleporters.length;ti++) {
    drawTeleporter(G.teleporters[ti], t);
  }
  for(var ci=0;ci<G.conveyors.length;ci++) {
    drawConveyor(G.conveyors[ci], t);
  }
}

function drawObstacle(obj, t) {
  var b = obj.body;
  var pos = b.position;
  var angle = b.angle;
  ctx.save();
  ctx.translate(pos.x, pos.y);
  ctx.rotate(angle);
  switch(obj.type) {
    case 'wood': drawWoodPlank(obj, t); break;
    case 'steel': drawSteelBeam(obj, t); break;
    case 'bumper': drawBumper(obj, t); break;
    case 'glass': drawGlass(obj, t); break;
    case 'mover': drawMoverPlatform(obj, t); break;
    case 'bouncePad': drawBouncePad(obj, t); break;
  }
  ctx.restore();
}

function drawWoodPlank(obj, t) {
  var hw = obj.hw, hh = obj.hh;
  var hp = (G.hitCounts[obj.body.id]||0)/2;
  var baseColor = hp > 0 ? '#6b3a20' : '#8B5E3C';
  var grad = ctx.createLinearGradient(-hw, -hh, hw, hh);
  grad.addColorStop(0, '#a8753a');
  grad.addColorStop(0.4, baseColor);
  grad.addColorStop(1, '#4a2a10');
  ctx.fillStyle = grad;
  ctx.strokeStyle = '#c09050';
  ctx.lineWidth = 1.5;
  ctx.beginPath();
  ctx.roundRect(-hw, -hh, hw*2, hh*2, 2);
  ctx.fill();
  ctx.stroke();
  ctx.strokeStyle = 'rgba(0,0,0,0.15)';
  ctx.lineWidth = 1;
  for(var i=-hw+8; i<hw; i+=12) {
    ctx.beginPath(); ctx.moveTo(i,-hh); ctx.lineTo(i,hh); ctx.stroke();
  }
  if(hp > 0) {
    ctx.strokeStyle = 'rgba(0,0,0,0.5)';
    ctx.lineWidth = 1.5;
    ctx.beginPath(); ctx.moveTo(-5,-hh); ctx.lineTo(8,hh); ctx.stroke();
    ctx.beginPath(); ctx.moveTo(5,-hh); ctx.lineTo(-10,hh); ctx.stroke();
  }
}

function drawSteelBeam(obj, t) {
  var hw = obj.hw, hh = obj.hh;
  var shine = 0.6+0.4*Math.sin(t*0.5);
  var grad = ctx.createLinearGradient(-hw, -hh, hw, hh);
  grad.addColorStop(0, '#556677');
  grad.addColorStop(0.35, '#aabbcc');
  grad.addColorStop(0.5, 'rgba(255,255,255,' + (shine*0.3) + ')');
  grad.addColorStop(0.65, '#aabbcc');
  grad.addColorStop(1, '#334455');
  ctx.fillStyle = grad;
  ctx.strokeStyle = '#88aacc';
  ctx.lineWidth = 1.5;
  ctx.shadowColor = '#88aacc';
  ctx.shadowBlur = 4;
  ctx.beginPath();
  ctx.roundRect(-hw, -hh, hw*2, hh*2, 2);
  ctx.fill();
  ctx.stroke();
  ctx.shadowBlur = 0;
  ctx.fillStyle = '#334455';
  for(var ix = -hw+6; ix < hw-4; ix+=14) {
    ctx.beginPath(); ctx.arc(ix, 0, 2, 0, Math.PI*2); ctx.fill();
  }
}

function drawBumper(obj, t) {
  var r = obj.fr;
  var flash = G.bumperFlash[obj.body.id] || 0;
  if(flash > 0) G.bumperFlash[obj.body.id] = flash - 1;
  var flashFrac = flash / 15;
  var pulse = 1 + 0.06*Math.sin(t*3) + flashFrac*0.25;
  var fillAlpha = 0.15 + flashFrac*0.45;
  var strokeClr = flashFrac > 0.1 ? 'rgba(255,255,255,' + flashFrac + ')' : C.MAGENTA;
  var blurAmt = 18 + 8*Math.sin(t*3) + flashFrac*30;

  ctx.beginPath();
  ctx.arc(0, 0, r*pulse, 0, Math.PI*2);
  ctx.fillStyle = flashFrac > 0.1 ? 'rgba(255,200,255,' + fillAlpha + ')' : 'rgba(255,0,255,' + fillAlpha + ')';
  ctx.strokeStyle = strokeClr;
  ctx.lineWidth = 3 + flashFrac*3;
  ctx.shadowColor = flashFrac > 0.1 ? '#ffffff' : C.MAGENTA;
  ctx.shadowBlur = blurAmt;
  ctx.fill();
  ctx.stroke();
  ctx.shadowBlur = 0;
  ctx.beginPath();
  ctx.arc(0, 0, r*0.6, 0, Math.PI*2);
  ctx.strokeStyle = 'rgba(255,0,255,0.6)';
  ctx.lineWidth = 2;
  ctx.stroke();
  ctx.beginPath();
  ctx.arc(0, 0, r*0.18, 0, Math.PI*2);
  ctx.fillStyle = flashFrac > 0.1 ? '#ffffff' : C.MAGENTA;
  ctx.fill();
}

function drawGlass(obj, t) {
  var hw = obj.hw, hh = obj.hh;
  ctx.fillStyle = 'rgba(150,230,255,0.18)';
  ctx.strokeStyle = 'rgba(150,230,255,0.7)';
  ctx.lineWidth = 2;
  ctx.shadowColor = C.CYAN;
  ctx.shadowBlur = 8;
  ctx.beginPath();
  ctx.roundRect(-hw, -hh, hw*2, hh*2, 2);
  ctx.fill();
  ctx.stroke();
  ctx.shadowBlur = 0;
  if((G.hitCounts[obj.body.id]||0) > 0) {
    ctx.strokeStyle = 'rgba(255,255,255,0.5)';
    ctx.lineWidth = 1;
    ctx.beginPath(); ctx.moveTo(-hw*0.5,-hh); ctx.lineTo(hw*0.3,hh); ctx.stroke();
    ctx.beginPath(); ctx.moveTo(hw*0.5,-hh); ctx.lineTo(-hw*0.2,hh); ctx.stroke();
  }
  ctx.fillStyle = 'rgba(255,255,255,0.25)';
  ctx.beginPath();
  ctx.rect(-hw+4,-hh+2, hw*0.4, hh*2-4);
  ctx.fill();
}

function drawMoverPlatform(obj, t) {
  var hw = obj.hw, hh = obj.hh;
  var grad = ctx.createLinearGradient(-hw,-hh,hw,hh);
  grad.addColorStop(0,'#004060');
  grad.addColorStop(0.5,'#00aacc');
  grad.addColorStop(1,'#004060');
  ctx.fillStyle = grad;
  ctx.strokeStyle = C.CYAN;
  ctx.lineWidth = 2;
  ctx.shadowColor = C.CYAN;
  ctx.shadowBlur = 10;
  ctx.beginPath();
  ctx.roundRect(-hw,-hh,hw*2,hh*2,3);
  ctx.fill();
  ctx.stroke();
  ctx.shadowBlur = 0;
  var arrowAlpha = 0.5+0.3*Math.sin(t*2);
  ctx.globalAlpha = arrowAlpha;
  ctx.fillStyle = C.CYAN;
  ctx.font = '10px Chakra Petch';
  ctx.textAlign = 'center';
  ctx.textBaseline = 'middle';
  ctx.fillText('\u25C4\u25BA', 0, 0);
  ctx.globalAlpha = 1;
}

function drawBouncePad(obj, t) {
  var hw = obj.hw, hh = obj.hh;
  var pulse = 0.6+0.4*Math.sin(t*2.5);
  var grad = ctx.createLinearGradient(-hw,-hh,hw,hh);
  grad.addColorStop(0,'#804000');
  grad.addColorStop(0.5,'#ff9900');
  grad.addColorStop(1,'#804000');
  ctx.fillStyle = grad;
  ctx.strokeStyle = C.ORANGE;
  ctx.lineWidth = 2;
  ctx.shadowColor = C.ORANGE;
  ctx.shadowBlur = 10*pulse;
  ctx.beginPath();
  ctx.roundRect(-hw,-hh,hw*2,hh*2,3);
  ctx.fill();
  ctx.stroke();
  ctx.shadowBlur = 0;
  ctx.fillStyle = 'rgba(255,200,0,0.8)';
  ctx.font = '11px Arial';
  ctx.textAlign = 'center';
  ctx.textBaseline = 'middle';
  ctx.fillText('\u25B2', 0, 0);
}

function drawWindmill(wm, t) {
  if(!wm.body) return;
  var pos = wm.body.position;
  ctx.save();
  ctx.translate(pos.x, pos.y);
  ctx.beginPath();
  ctx.arc(0, 0, 7, 0, Math.PI*2);
  ctx.fillStyle = '#1a3a1a';
  ctx.strokeStyle = C.GREEN;
  ctx.lineWidth = 2;
  ctx.shadowColor = C.GREEN;
  ctx.shadowBlur = 8;
  ctx.fill(); ctx.stroke();
  ctx.shadowBlur = 0;
  ctx.rotate(wm.body.angle);
  for(var i=0; i<2; i++) {
    ctx.save();
    ctx.rotate(i*Math.PI);
    ctx.fillStyle = '#1a5a1a';
    ctx.strokeStyle = C.GREEN;
    ctx.lineWidth = 1.5;
    ctx.shadowColor = C.GREEN;
    ctx.shadowBlur = 6;
    ctx.beginPath();
    ctx.roundRect(0, -5, wm.bladeLen, 10, 3);
    ctx.fill();
    ctx.stroke();
    ctx.shadowBlur = 0;
    ctx.restore();
  }
  ctx.restore();
}

function drawGravityWell(gw, t) {
  var pulse = 1+0.08*Math.sin(t*2.5);
  var r = gw.r;
  ctx.save();
  ctx.translate(gw.x, gw.y);
  for(var i=3; i>0; i--) {
    ctx.beginPath();
    ctx.arc(0, 0, r*i*pulse*0.5, 0, Math.PI*2);
    ctx.strokeStyle = 'rgba(170,0,255,' + (0.15/i) + ')';
    ctx.lineWidth = 2;
    ctx.stroke();
  }
  ctx.rotate(t*1.5);
  ctx.beginPath();
  ctx.arc(0, 0, r*0.7, 0, Math.PI*1.5);
  ctx.strokeStyle = C.PURPLE;
  ctx.lineWidth = 2.5;
  ctx.shadowColor = C.PURPLE;
  ctx.shadowBlur = 12;
  ctx.stroke();
  ctx.shadowBlur = 0;
  ctx.restore();

  ctx.save();
  ctx.translate(gw.x, gw.y);
  ctx.beginPath();
  ctx.arc(0, 0, r*0.2*pulse, 0, Math.PI*2);
  ctx.fillStyle = C.PURPLE;
  ctx.shadowColor = C.PURPLE;
  ctx.shadowBlur = 16;
  ctx.fill();
  ctx.shadowBlur = 0;
  ctx.restore();
}

// ============================================================
// TELEPORTER DRAWING
// ============================================================
function drawTeleporter(tp, t) {
  var x = tp.x, y = tp.y, r = tp.r;
  var pulse = 1 + 0.1*Math.sin(t*3 + tp.pairId*2);
  ctx.save();
  ctx.translate(x, y);
  ctx.rotate(t * 2 * (tp.pairId % 2 === 0 ? 1 : -1));
  ctx.beginPath();
  ctx.arc(0, 0, r*pulse, 0, Math.PI*1.6);
  ctx.strokeStyle = '#aa44ff';
  ctx.lineWidth = 3;
  ctx.shadowColor = '#aa44ff';
  ctx.shadowBlur = 16;
  ctx.stroke();
  ctx.shadowBlur = 0;
  ctx.restore();

  ctx.save();
  ctx.translate(x, y);
  ctx.rotate(-t * 3);
  ctx.beginPath();
  ctx.arc(0, 0, r*0.6, 0, Math.PI*1.2);
  ctx.strokeStyle = '#dd88ff';
  ctx.lineWidth = 2;
  ctx.shadowColor = '#dd88ff';
  ctx.shadowBlur = 8;
  ctx.stroke();
  ctx.shadowBlur = 0;
  ctx.restore();

  ctx.beginPath();
  ctx.arc(x, y, r*0.25, 0, Math.PI*2);
  ctx.fillStyle = '#cc66ff';
  ctx.shadowColor = '#cc66ff';
  ctx.shadowBlur = 12;
  ctx.fill();
  ctx.shadowBlur = 0;

  if(G.frameCount % 4 === 0) {
    var angle = Math.random()*Math.PI*2;
    G.particles.push({
      x: x + Math.cos(angle)*r*0.8,
      y: y + Math.sin(angle)*r*0.8,
      vx: -Math.cos(angle)*0.5,
      vy: -Math.sin(angle)*0.5,
      r: 1.5, life: 0.6, decay: 0.04,
      color: '#cc88ff'
    });
  }
}

// ============================================================
// CONVEYOR DRAWING
// ============================================================
function drawConveyor(cv, t) {
  var x = cv.x, y = cv.y, hw = cv.hw, hh = cv.hh, dir = cv.dir;
  ctx.save();
  ctx.translate(x, y);
  var grad = ctx.createLinearGradient(-hw, -hh, -hw, hh);
  grad.addColorStop(0, dir > 0 ? '#cc6600' : '#006688');
  grad.addColorStop(0.5, dir > 0 ? '#ff9900' : '#00aacc');
  grad.addColorStop(1, dir > 0 ? '#cc6600' : '#006688');
  ctx.fillStyle = grad;
  ctx.beginPath();
  ctx.roundRect(-hw, -hh, hw*2, hh*2, 3);
  ctx.fill();
  ctx.save();
  ctx.beginPath();
  ctx.rect(-hw, -hh, hw*2, hh*2);
  ctx.clip();
  var arrowSpacing = 20;
  var offset = ((t * 60 * dir) % arrowSpacing);
  ctx.fillStyle = 'rgba(255,255,255,0.4)';
  ctx.font = '8px Arial';
  ctx.textAlign = 'center';
  ctx.textBaseline = 'middle';
  var arrow = dir > 0 ? '\u25BA' : '\u25C4';
  for(var ax = -hw + offset; ax < hw; ax += arrowSpacing) {
    ctx.fillText(arrow, ax, 0);
  }
  ctx.restore();
  ctx.strokeStyle = dir > 0 ? C.ORANGE : C.CYAN;
  ctx.lineWidth = 2;
  ctx.shadowColor = dir > 0 ? C.ORANGE : C.CYAN;
  ctx.shadowBlur = 8;
  ctx.beginPath();
  ctx.roundRect(-hw, -hh, hw*2, hh*2, 3);
  ctx.stroke();
  ctx.shadowBlur = 0;
  ctx.restore();
}

// ============================================================
// POWER-UP DRAWING
// ============================================================
function drawPowerups(t) {
  for(var pi=0;pi<G.levelObjects.length;pi++) {
    var pu = G.levelObjects[pi];
    if(pu.type !== 'powerup' || pu.collected) continue;
    var pos = pu.body.position;
    var bob = Math.sin(t*2.5+pu.idx)*5;
    ctx.save();
    ctx.translate(pos.x, pos.y+bob);
    var r = 14+2*Math.sin(t*3);
    ctx.beginPath();
    ctx.arc(0,0,r,0,Math.PI*2);
    ctx.fillStyle = 'rgba(255,235,59,0.15)';
    ctx.strokeStyle = C.YELLOW;
    ctx.lineWidth = 2;
    ctx.shadowColor = C.YELLOW;
    ctx.shadowBlur = 14;
    ctx.fill(); ctx.stroke();
    ctx.shadowBlur = 0;
    ctx.fillStyle = C.YELLOW;
    ctx.font = "10px 'Press Start 2P', monospace";
    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';
    var icons = {precision:'AIM','2x':'2X',ghost:'GHO'};
    ctx.fillText(icons[pu.puType]||'?', 0, 1);
    ctx.restore();
  }
}

// ============================================================
// PARTICLES
// ============================================================
function spawnParticles(x, y, color, count, speed) {
  count = count || 12;
  speed = speed || 4;
  for(var i=0;i<count;i++) {
    var angle = (i/count)*Math.PI*2+Math.random()*0.5;
    var spd = speed*(0.5+Math.random());
    G.particles.push({
      x:x, y:y,
      vx: Math.cos(angle)*spd,
      vy: Math.sin(angle)*spd,
      r: 2+Math.random()*3,
      life: 1.0,
      decay: 0.025+Math.random()*0.02,
      color: color
    });
  }
}

function spawnExplosion(x, y) {
  spawnParticles(x, y, C.RED, 28, 9);
  spawnParticles(x, y, C.ORANGE, 18, 6);
  spawnParticles(x, y, '#ffff00', 10, 4);
  G.screenShake = 18;
  sfxBreak();
}

function spawnBlackHoleImplosion(x, y) {
  // Inward-pulling particles
  for(var i=0;i<30;i++) {
    var angle = (i/30)*Math.PI*2;
    var dist = 60+Math.random()*40;
    G.particles.push({
      x: x + Math.cos(angle)*dist,
      y: y + Math.sin(angle)*dist,
      vx: -Math.cos(angle)*4,
      vy: -Math.sin(angle)*4,
      r: 2+Math.random()*3,
      life: 1.0,
      decay: 0.04+Math.random()*0.03,
      color: i%3===0 ? '#ffffff' : i%3===1 ? '#ff4400' : '#aa00ff'
    });
  }
}

function spawnDebrisRect(x, y, color, count) {
  count = count || 4;
  for(var i=0;i<count;i++) {
    var angle = Math.random()*Math.PI*2;
    var spd = 2+Math.random()*4;
    G.particles.push({
      x:x, y:y,
      vx: Math.cos(angle)*spd,
      vy: Math.sin(angle)*spd - 2,
      r: 3+Math.random()*4,
      life: 1.0,
      decay: 0.018+Math.random()*0.015,
      color: color,
      isRect: true,

function breakObjectWood(obj, bx, by) {

  obj.broken = true;

  spawnDebrisRect(bx, by, '#8B5E3C', 8);
  spawnDebrisRect(bx, by, '#c09050', 5);
  spawnParticles(bx, by, C.WOOD, 12, 4);
  G.score += 50;
  totalBroken++;
  G.bombBrokenThisDetonation++;
  spawnFloatScore(bx, by, 50, C.WOOD);
  updateHUD();
}

function updateParticles() {
  for(var i=G.particles.length-1; i>=0; i--) {
    var p = G.particles[i];
    p.x += p.vx; p.y += p.vy;
    p.vy += p.isSpark ? 0.18 : 0.13;
    p.vx *= p.isSpark ? 0.94 : 0.97;
    if(p.rot !== undefined) p.rot += p.rotSpd;
    p.life -= p.decay;
    if(p.life<=0) G.particles.splice(i,1);
  }
  for(var j=G.confetti.length-1; j>=0; j--) {
    var c = G.confetti[j];
    c.x += c.vx; c.y += c.vy;
    c.rot += c.rotSpd;
    c.vx *= 0.99;
    c.life -= c.decay;
    if(c.life<=0 || c.y > H+20) G.confetti.splice(j,1);
  }
}

function drawParticles() {
  for(var pi=0;pi<G.particles.length;pi++) {
    var p = G.particles[pi];
    ctx.globalAlpha = Math.max(0, p.life);
    ctx.fillStyle = p.color;

    if(p.isRect) {
      ctx.save();
      ctx.translate(p.x, p.y);
      ctx.rotate(p.rot||0);
      ctx.fillRect(-p.w/2, -p.h/2, p.w*p.life, p.h);
      ctx.restore();
    } else if(p.isTriangle) {
      ctx.save();
      ctx.translate(p.x, p.y);
      ctx.rotate(p.rot||0);
      var s = p.size * p.life;
      ctx.beginPath();
      ctx.moveTo(0, -s);
      ctx.lineTo(s*0.7, s*0.5);
      ctx.lineTo(-s*0.7, s*0.5);
      ctx.closePath();
      ctx.fillStyle = p.color;
      ctx.shadowColor = '#aaeeff';
      ctx.shadowBlur = 4;
      ctx.fill();
      ctx.shadowBlur = 0;
      ctx.restore();
    } else if(p.isSpark) {
      ctx.save();
      ctx.strokeStyle = p.color;
      ctx.lineWidth = p.r;
      ctx.shadowColor = p.color;
      ctx.shadowBlur = 5;
      ctx.beginPath();
      ctx.moveTo(p.x, p.y);
      ctx.lineTo(p.x - p.vx*2, p.y - p.vy*2);
      ctx.stroke();
      ctx.shadowBlur = 0;
      ctx.restore();
    } else {
      ctx.beginPath();
      ctx.arc(p.x, p.y, Math.max(0.5, p.r*p.life), 0, Math.PI*2);
      ctx.fill();
    }
  }
  ctx.globalAlpha = 1;

  // Confetti
  for(var ci=0;ci<G.confetti.length;ci++) {
    var c = G.confetti[ci];
    ctx.save();
    ctx.translate(c.x, c.y);
    ctx.rotate(c.rot);
    ctx.globalAlpha = c.life;
    ctx.fillStyle = c.color;
    ctx.fillRect(-c.r/2, -c.r/4, c.r, c.r/2);
    ctx.restore();
  }
  ctx.globalAlpha = 1;
}
