<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
<meta name="description" content="Angry Skeeball — physics-based slingshot arcade with 10 levels, obstacles, and neon visuals. Korb Engineering.">
<title>Angry Skeeball // Korb Engineering</title>
<link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&family=Chakra+Petch:wght@400;700&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/matter-js/0.19.0/matter.min.js"></script>
<style>
*{margin:0;padding:0;box-sizing:border-box}
html,body{width:100%;height:100dvh;overflow:hidden;background:#050a0f;touch-action:none;user-select:none;-webkit-user-select:none;font-family:'Chakra Petch',sans-serif}
canvas#game{position:absolute;top:0;left:0;width:100%;height:100%;display:block}
#ui{position:absolute;top:0;left:0;width:100%;height:100%;pointer-events:none;font-family:'Press Start 2P',monospace;color:#fff}
#ui *{pointer-events:auto}
.screen{position:absolute;inset:0;display:none;flex-direction:column;align-items:center;justify-content:center;z-index:10}
.screen.active{display:flex}

/* TITLE */
.title-bg{position:absolute;inset:0;background:radial-gradient(ellipse at 50% 55%,rgba(0,229,255,.07) 0%,transparent 65%)}
.title-logo{font-size:clamp(24px,7vw,48px);color:#00e5ff;text-shadow:0 0 30px #00e5ff,0 0 70px #00e5ff,0 0 140px rgba(0,229,255,.25);text-align:center;line-height:1.5;margin-bottom:10px;animation:logoPulse 3s ease-in-out infinite;position:relative;z-index:2}
@keyframes logoPulse{0%,100%{text-shadow:0 0 30px #00e5ff,0 0 70px #00e5ff;transform:scale(1)}50%{text-shadow:0 0 50px #00e5ff,0 0 100px #00e5ff,0 0 200px rgba(0,229,255,.4);transform:scale(1.02)}}
.title-sub{font-family:'Chakra Petch',sans-serif;font-size:clamp(11px,2.8vw,17px);color:#ff00ff;text-shadow:0 0 14px #ff00ff;margin-bottom:36px;letter-spacing:5px;position:relative;z-index:2}
.tap-start{font-size:clamp(9px,2.2vw,13px);color:#ffeb3b;animation:blink 1.2s ease-in-out infinite;position:relative;z-index:2}
@keyframes blink{0%,100%{opacity:1;text-shadow:0 0 10px #ffeb3b}50%{opacity:.25;text-shadow:none}}
.best-score-txt{font-size:9px;color:#444;margin-top:20px;position:relative;z-index:2}

/* BUTTONS */
.btn{font-family:'Press Start 2P',monospace;font-size:clamp(8px,1.9vw,11px);padding:11px 22px;border:2px solid #00e5ff;background:rgba(0,229,255,.07);color:#00e5ff;border-radius:6px;cursor:pointer;min-height:44px;min-width:44px;text-align:center;margin:5px;transition:all .15s;text-shadow:0 0 7px currentColor}
.btn:active{transform:scale(.92);background:rgba(0,229,255,.18);box-shadow:0 0 18px rgba(0,229,255,.25)}
.btn.orange{border-color:#ff9900;color:#ff9900;background:rgba(255,153,0,.07)}
.btn.magenta{border-color:#ff00ff;color:#ff00ff;background:rgba(255,0,255,.07)}
.btn.green{border-color:#7cff00;color:#7cff00;background:rgba(124,255,0,.07)}
.btn.red{border-color:#ff3333;color:#ff3333;background:rgba(255,51,51,.07)}

/* LEVEL SELECT */
.level-grid{display:grid;grid-template-columns:repeat(5,1fr);gap:8px;padding:16px;max-width:400px;width:100%}
.level-btn{aspect-ratio:1;display:flex;flex-direction:column;align-items:center;justify-content:center;font-family:'Press Start 2P',monospace;font-size:13px;border:2px solid #00e5ff;background:rgba(0,229,255,.05);color:#00e5ff;border-radius:10px;cursor:pointer;min-height:50px;position:relative;transition:all .18s;text-shadow:0 0 6px #00e5ff}
.level-btn:active:not(.locked){transform:scale(.9);box-shadow:0 0 14px rgba(0,229,255,.4)}
.level-btn.locked{border-color:#1a1a2e;color:#2a2a4a;cursor:default;text-shadow:none;background:rgba(0,0,0,.3)}
.level-btn .stars{font-size:7px;margin-top:3px;color:#ffeb3b;text-shadow:0 0 4px #ffeb3b;letter-spacing:-1px}
.level-btn.locked .stars{color:#1a1a2e;text-shadow:none}

/* HUD */
.hud{position:absolute;top:0;left:0;right:0;display:flex;justify-content:space-between;align-items:flex-start;padding:8px 12px;pointer-events:none;z-index:5;background:linear-gradient(180deg,rgba(5,10,15,.8) 0%,transparent 100%)}
.hud>*{pointer-events:auto}
.hud-score{font-size:clamp(14px,3.5vw,22px);color:#00e5ff;text-shadow:0 0 12px #00e5ff}
.hud-combo{font-size:clamp(9px,2vw,12px);color:#ff00ff;text-shadow:0 0 9px #ff00ff;margin-top:3px;min-height:16px;transition:transform .12s}
.hud-combo.bump{animation:comboBump .28s ease-out}
@keyframes comboBump{0%{transform:scale(1.6)}100%{transform:scale(1)}}
.hud-level{font-size:9px;color:#444;margin-top:2px}
.hud-right{text-align:right;display:flex;flex-direction:column;align-items:flex-end;gap:4px}
.hud-wind{font-family:'Chakra Petch',sans-serif;font-size:10px;color:rgba(100,200,255,.6)}
.hud-powerup{font-size:10px;background:rgba(0,0,0,.7);border:1px solid #ffeb3b;border-radius:5px;padding:3px 8px;color:#ffeb3b;animation:powerGlow 1s ease-in-out infinite}
@keyframes powerGlow{0%,100%{box-shadow:0 0 5px rgba(255,235,59,.25)}50%{box-shadow:0 0 14px rgba(255,235,59,.55)}}
.pause-btn{font-size:16px;background:none;border:none;color:#666;cursor:pointer;min-height:44px;min-width:44px;display:flex;align-items:center;justify-content:center;line-height:1}

/* BALL QUEUE */
.ball-queue{position:absolute;bottom:10px;left:10px;display:flex;gap:5px;align-items:center;z-index:5}
.ball-indicator{width:34px;height:34px;border-radius:50%;border:2px solid #333;display:flex;align-items:center;justify-content:center;cursor:pointer;min-height:44px;min-width:44px;transition:all .18s;position:relative;background:rgba(0,0,0,.4)}
.ball-indicator.active-ball{border-color:#00e5ff;box-shadow:0 0 14px #00e5ff;transform:scale(1.15)}
.ball-indicator.used-ball{opacity:.18;pointer-events:none}
.ball-icon{width:22px;height:22px;border-radius:50%}

/* RESULTS */
.results-box{background:rgba(5,10,15,.97);border:2px solid #00e5ff;border-radius:14px;padding:26px;max-width:340px;width:90%;text-align:center;box-shadow:0 0 50px rgba(0,229,255,.12),inset 0 0 30px rgba(0,229,255,.03)}
.results-title{font-size:12px;color:#666;margin-bottom:4px}
.results-score{font-size:28px;color:#00e5ff;text-shadow:0 0 20px #00e5ff;margin:14px 0}
.results-stars{font-size:30px;margin:10px 0}
.results-breakdown{font-family:'Chakra Petch',sans-serif;font-size:12px;color:#777;text-align:left;margin:14px 0;line-height:2.3}
.results-breakdown span{float:right;color:#aaa}

/* PAUSE */
.pause-overlay{position:absolute;inset:0;background:rgba(5,10,15,.88);display:none;flex-direction:column;align-items:center;justify-content:center;z-index:20}
.pause-overlay.active{display:flex}
.pause-title{font-size:clamp(16px,4vw,24px);color:#00e5ff;text-shadow:0 0 20px #00e5ff;margin-bottom:28px}

/* FLOAT SCORES */
.float-score{position:absolute;font-family:'Press Start 2P',monospace;pointer-events:none;z-index:100;animation:floatUp .9s ease-out forwards}
@keyframes floatUp{0%{opacity:1;transform:translateY(0) scale(1)}50%{opacity:1;transform:translateY(-28px) scale(1.25)}100%{opacity:0;transform:translateY(-65px) scale(.8)}}

/* SCANLINES */
#scanlines{position:absolute;inset:0;pointer-events:none;z-index:15;background:repeating-linear-gradient(0deg,transparent,transparent 2px,rgba(0,0,0,.07) 2px,rgba(0,0,0,.07) 4px);animation:scanMove 8s linear infinite}
@keyframes scanMove{0%{background-position:0 0}100%{background-position:0 200px}}

/* BALL TYPE SELECTOR */
.ball-type-row{display:flex;gap:6px;margin-top:8px;position:relative;z-index:2}
.ball-type-btn{width:44px;height:44px;border-radius:50%;border:2px solid #444;background:rgba(0,0,0,.5);cursor:pointer;display:flex;flex-direction:column;align-items:center;justify-content:center;font-family:'Chakra Petch',sans-serif;font-size:7px;color:#888;transition:all .15s;gap:2px}
.ball-type-btn.selected{border-color:#fff;box-shadow:0 0 12px currentColor;color:#fff}
.ball-type-dot{width:18px;height:18px;border-radius:50%}
</style>
</head>
<body>
<canvas id="game"></canvas>
<div id="scanlines"></div>
<div id="ui">
  <!-- TITLE SCREEN -->
  <div class="screen active" id="screen-title">
    <div class="title-bg"></div>
    <div class="title-logo">ANGRY<br>SKEEBALL</div>
    <div class="title-sub">PHYSICS ARCADE</div>
    <div class="ball-type-row" id="title-ball-anim" style="margin-bottom:28px"></div>
    <div class="tap-start">TAP TO START</div>
    <div class="best-score-txt" id="best-score-txt"></div>
    <div id="screen-title-btns" style="margin-top:18px;display:flex;gap:8px">
      <button class="btn" id="btn-play">PLAY</button>
      <button class="btn magenta" id="btn-levels">LEVELS</button>
    </div>
  </div>

  <!-- LEVEL SELECT SCREEN -->
  <div class="screen" id="screen-levels">
    <div style="font-size:clamp(11px,2.8vw,16px);color:#00e5ff;margin-bottom:14px;text-shadow:0 0 12px #00e5ff">SELECT LEVEL</div>
    <div class="level-grid" id="level-grid"></div>
    <button class="btn" id="btn-back-title" style="margin-top:14px">BACK</button>
  </div>

  <!-- GAME SCREEN -->
  <div class="screen" id="screen-game">
    <div class="hud">
      <div>
        <div class="hud-score" id="hud-score">0</div>
        <div class="hud-combo" id="hud-combo"></div>
        <div class="hud-level" id="hud-level"></div>
      </div>
      <div class="hud-right">
        <button class="pause-btn" id="btn-pause">⏸</button>
        <div class="hud-wind" id="hud-wind"></div>
        <div class="hud-powerup" id="hud-powerup" style="display:none"></div>
      </div>
    </div>
    <div class="ball-queue" id="ball-queue"></div>
  </div>

  <!-- PAUSE OVERLAY -->
  <div class="pause-overlay" id="pause-overlay">
    <div class="pause-title">PAUSED</div>
    <button class="btn" id="btn-resume">RESUME</button>
    <button class="btn orange" id="btn-restart">RESTART</button>
    <button class="btn magenta" id="btn-quit">QUIT</button>
  </div>

  <!-- RESULTS SCREEN -->
  <div class="screen" id="screen-results">
    <div class="results-box">
      <div class="results-title">LEVEL COMPLETE</div>
      <div class="results-score" id="res-score">0</div>
      <div class="results-stars" id="res-stars">☆☆☆</div>
      <div class="results-breakdown" id="res-breakdown"></div>
      <div style="display:flex;gap:8px;justify-content:center;flex-wrap:wrap;margin-top:10px">
        <button class="btn" id="btn-retry">RETRY</button>
        <button class="btn orange" id="btn-next">NEXT</button>
        <button class="btn magenta" id="btn-to-levels">LEVELS</button>
      </div>
    </div>
  </div>
</div>

<script>
// ============================================================
// CONSTANTS & CONFIG
// ============================================================
const C = {
  BG: '#050a0f',
  CYAN: '#00e5ff',
  ORANGE: '#ff9900',
  MAGENTA: '#ff00ff',
  GREEN: '#7cff00',
  YELLOW: '#ffeb3b',
  RED: '#ff3333',
  PURPLE: '#aa00ff',
  STEEL: '#8899aa',
  WOOD: '#8B5E3C',
  GLASS_CLR: 'rgba(150,230,255,0.28)',
  GRAVITY: 1.2,
  MAX_PULL: 120,
  SLING_ARM: 54,
  TRAJ_DOTS: 18,
  TRAJ_STEP: 0.06,
  BALL_RADIUS: 14,
  WALL_T: 60,
  STORE_KEY_PROG: 'korb_angryskeeball_progress',
  STORE_KEY_SET: 'korb_angryskeeball_settings',
  STORE_KEY_TOT: 'korb_angryskeeball_total',
};

// Ball type configs
const BALL_TYPES = {
  standard: { color: C.CYAN, glow: C.CYAN, mass: 1, restitution: 0.4, label: 'STD', frictionAir: 0.012 },
  heavy:    { color: C.ORANGE, glow: C.ORANGE, mass: 2.8, restitution: 0.15, label: 'HVY', frictionAir: 0.018 },
  bouncy:   { color: C.MAGENTA, glow: C.MAGENTA, mass: 0.7, restitution: 0.88, label: 'BNC', frictionAir: 0.008 },
  curve:    { color: C.GREEN, glow: C.GREEN, mass: 0.9, restitution: 0.35, label: 'CRV', frictionAir: 0.01 },
  bomb:     { color: C.RED, glow: C.RED, mass: 1.5, restitution: 0.2, label: 'BMB', frictionAir: 0.015 },
};

// ============================================================
// LEVEL DEFINITIONS
// ============================================================
// Each level: { name, balls, ballTypes, wind, obstacles:[], powerups:[] }
// Obstacles: { type, x, y, w, h, angle, ...extras }
// positions are in 0-1 fractions of canvas size, resolved at runtime
const LEVEL_DEFS = [
  // Level 1: Tutorial
  { name:'TUTORIAL', stars:[300,600,900], balls:['standard','standard','standard'], wind:0, obstacles:[], powerups:[] },
  // Level 2: Wooden Planks
  { name:'PLANK WALL', stars:[400,800,1200], balls:['standard','standard','heavy'], wind:0,
    obstacles:[
      {type:'wood', fx:0.38, fy:0.48, fw:0.16, fh:0.03, angle:0},
      {type:'wood', fx:0.60, fy:0.52, fw:0.16, fh:0.03, angle:0},
    ], powerups:[{type:'2x',fx:0.50,fy:0.36}] },
  // Level 3: Steel maze
  { name:'STEEL MAZE', stars:[500,900,1400], balls:['standard','heavy','standard'], wind:0,
    obstacles:[
      {type:'steel', fx:0.28, fy:0.42, fw:0.22, fh:0.025, angle:0},
      {type:'steel', fx:0.62, fy:0.50, fw:0.22, fh:0.025, angle:0},
      {type:'steel', fx:0.44, fy:0.58, fw:0.18, fh:0.025, angle:0.18},
    ], powerups:[] },
  // Level 4: Bumper field
  { name:'BUMPER FIELD', stars:[600,1000,1600], balls:['bouncy','bouncy','standard'], wind:0,
    obstacles:[
      {type:'bumper', fx:0.30, fy:0.44, fr:0.04},
      {type:'bumper', fx:0.55, fy:0.38, fr:0.04},
      {type:'bumper', fx:0.70, fy:0.52, fr:0.035},
      {type:'bumper', fx:0.42, fy:0.58, fr:0.035},
    ], powerups:[{type:'precision',fx:0.50,fy:0.30}] },
  // Level 5: Windmill gauntlet
  { name:'WINDMILL', stars:[700,1100,1700], balls:['standard','curve','standard'], wind:0,
    obstacles:[
      {type:'windmill', fx:0.32, fy:0.42, flen:0.12, speed:1.2},
      {type:'windmill', fx:0.68, fy:0.48, flen:0.10, speed:-1.6},
    ], powerups:[] },
  // Level 6: Glass + bumpers
  { name:'GLASS FIELD', stars:[800,1300,1900], balls:['heavy','standard','bouncy'], wind:0,
    obstacles:[
      {type:'glass', fx:0.36, fy:0.45, fw:0.14, fh:0.025, angle:-0.15},
      {type:'glass', fx:0.62, fy:0.48, fw:0.14, fh:0.025, angle:0.15},
      {type:'bumper', fx:0.50, fy:0.40, fr:0.04},
    ], powerups:[{type:'ghost',fx:0.50,fy:0.55}] },
  // Level 7: Moving platforms
  { name:'MOVING MAZE', stars:[900,1500,2100], balls:['standard','curve','heavy'], wind:0,
    obstacles:[
      {type:'mover', fx:0.30, fy:0.44, fw:0.18, fh:0.025, rangeX:0.18, speed:0.8},
      {type:'mover', fx:0.65, fy:0.55, fw:0.15, fh:0.025, rangeX:0.14, speed:-1.0},
    ], powerups:[{type:'2x',fx:0.50,fy:0.35}] },
  // Level 8: Gravity well + steel
  { name:'GRAVITY WELL', stars:[1000,1700,2400], balls:['standard','standard','curve'], wind:0.3,
    obstacles:[
      {type:'gravity', fx:0.50, fy:0.46, fr:0.06, strength:0.0006},
      {type:'steel', fx:0.28, fy:0.50, fw:0.14, fh:0.025, angle:0.3},
      {type:'steel', fx:0.72, fy:0.50, fw:0.14, fh:0.025, angle:-0.3},
    ], powerups:[] },
  // Level 9: Gauntlet
  { name:'GAUNTLET', stars:[1200,2000,2800], balls:['heavy','bouncy','bomb'], wind:0.2,
    obstacles:[
      {type:'wood', fx:0.32, fy:0.44, fw:0.15, fh:0.025, angle:0},
      {type:'glass', fx:0.62, fy:0.44, fw:0.15, fh:0.025, angle:0},
      {type:'bumper', fx:0.50, fy:0.50, fr:0.04},
      {type:'windmill', fx:0.35, fy:0.60, flen:0.09, speed:1.8},
      {type:'mover', fx:0.68, fy:0.57, fw:0.14, fh:0.025, rangeX:0.12, speed:1.2},
      {type:'bouncePad', fx:0.25, fy:0.52, fw:0.10, fh:0.025, angle:-0.5},
      {type:'bouncePad', fx:0.75, fy:0.52, fw:0.10, fh:0.025, angle:0.5},
    ], powerups:[{type:'2x',fx:0.50,fy:0.33}] },
  // Level 10: Boss
  { name:'BOSS LEVEL', stars:[1500,2500,3500], balls:['bomb','curve','bouncy','heavy'], wind:0.35,
    obstacles:[
      {type:'windmill', fx:0.28, fy:0.40, flen:0.13, speed:2.2},
      {type:'windmill', fx:0.72, fy:0.40, flen:0.13, speed:-1.9},
      {type:'windmill', fx:0.50, fy:0.54, flen:0.10, speed:2.8},
      {type:'gravity', fx:0.50, fy:0.44, fr:0.065, strength:0.0008},
      {type:'mover', fx:0.35, fy:0.62, fw:0.16, fh:0.025, rangeX:0.14, speed:1.4},
      {type:'mover', fx:0.65, fy:0.62, fw:0.16, fh:0.025, rangeX:0.14, speed:-1.4},
      {type:'steel', fx:0.20, fy:0.50, fw:0.10, fh:0.025, angle:0.5},
      {type:'steel', fx:0.80, fy:0.50, fw:0.10, fh:0.025, angle:-0.5},
      {type:'glass', fx:0.38, fy:0.56, fw:0.12, fh:0.025, angle:0},
      {type:'glass', fx:0.62, fy:0.56, fw:0.12, fh:0.025, angle:0},
    ], powerups:[{type:'precision',fx:0.30,fy:0.34},{type:'2x',fx:0.70,fy:0.34}] },
];

// ============================================================
// GAME STATE
// ============================================================
let G = {
  screen: 'title',
  level: 0,
  score: 0,
  combo: 0,
  comboTimer: 0,
  ballQueue: [],
  currentBallIdx: 0,
  activeBall: null,
  launched: false,
  dragging: false,
  dragStart: null,
  pullVec: {x:0,y:0},
  paused: false,
  wind: 0,
  powerup: null,
  powerupTimer: 0,
  frameCount: 0,
  screenShake: 0,
  particles: [],
  floatScores: [],
  levelObjects: [],    // { matterBody, type, meta }
  brokenBodies: [],
  gravWells: [],
  movingPlatforms: [],
  windmills: [],
  bouncePads: [],
  targets: [],         // scoring ring bodies
  hitTargets: new Set(),
  hitCounts: {},       // bodyId -> hit count for wood/glass
  levelStartTime: 0,
  ballsFired: 0,
  totalScore: 0,
};

let progress = JSON.parse(localStorage.getItem(C.STORE_KEY_PROG)||'{"unlocked":1,"stars":[]}');
let settings = JSON.parse(localStorage.getItem(C.STORE_KEY_SET)||'{"sound":true}');
let totalScore = parseInt(localStorage.getItem(C.STORE_KEY_TOT)||'0');

function saveProgress() {
  localStorage.setItem(C.STORE_KEY_PROG, JSON.stringify(progress));
  localStorage.setItem(C.STORE_KEY_TOT, String(totalScore));
}

// ============================================================
// CANVAS & RESIZE
// ============================================================
const canvas = document.getElementById('game');
const ctx = canvas.getContext('2d');
let W = 0, H = 0, DPR = 1;
let slingX = 0, slingY = 0;

function resize() {
  DPR = Math.min(window.devicePixelRatio || 1, 2);
  W = window.innerWidth;
  H = window.innerHeight;
  canvas.width = W * DPR;
  canvas.height = H * DPR;
  canvas.style.width = W + 'px';
  canvas.style.height = H + 'px';
  ctx.scale(DPR, DPR);
  slingX = W * 0.5;
  slingY = H * 0.82;
  if (G.screen === 'game') {
    rebuildLevel(G.level);
  }
}
window.addEventListener('resize', resize);

// ============================================================
// MATTER.JS ENGINE
// ============================================================
const { Engine, Render: MRender, World, Bodies, Body, Events, Runner, Composite, Vector } = Matter;
let engine, world;

function initEngine() {
  if (engine) { Engine.clear(engine); World.clear(world); }
  engine = Engine.create({ gravity: { x: 0, y: C.GRAVITY } });
  world = engine.world;
}

// ============================================================
// AUDIO (Web Audio API)
// ============================================================
let audioCtx = null;
function getAudio() {
  if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
  return audioCtx;
}
function playTone(freq, type, dur, vol=0.18, detune=0) {
  if (!settings.sound) return;
  try {
    const a = getAudio();
    const o = a.createOscillator();
    const g = a.createGain();
    o.connect(g); g.connect(a.destination);
    o.type = type; o.frequency.value = freq; o.detune.value = detune;
    g.gain.setValueAtTime(vol, a.currentTime);
    g.gain.exponentialRampToValueAtTime(0.001, a.currentTime + dur);
    o.start(); o.stop(a.currentTime + dur);
  } catch(e){}
}

// ============================================================
// BACKGROUND RENDERING
// ============================================================
const BG_STARS = Array.from({length:120},()=>({
  x: Math.random(), y: Math.random(),
  r: Math.random()*1.4+0.3,
  bright: Math.random(),
  phase: Math.random()*Math.PI*2,
  spd: 0.4+Math.random()*0.8
}));
const BG_SHAPES = Array.from({length:8},()=>({
  x: Math.random()*W, y: Math.random()*H,
  r: 18+Math.random()*40,
  sides: Math.floor(Math.random()*3)+3,
  rot: Math.random()*Math.PI*2,
  rotSpd: (Math.random()-.5)*0.008,
  clr: [C.CYAN,C.MAGENTA,C.ORANGE,C.GREEN][Math.floor(Math.random()*4)],
  alpha: 0.04+Math.random()*0.07,
  vy: (Math.random()-.5)*0.15,
}));

function drawBackground(t) {
  ctx.fillStyle = C.BG;
  ctx.fillRect(0,0,W,H);

  // Grid
  ctx.strokeStyle = 'rgba(0,229,255,0.025)';
  ctx.lineWidth = 1;
  const gs = 50;
  const ox = (t*8)%gs;
  for(let x = -gs+ox; x < W+gs; x+=gs){ ctx.beginPath();ctx.moveTo(x,0);ctx.lineTo(x,H);ctx.stroke(); }
  const oy = (t*5)%gs;
  for(let y = -gs+oy; y < H+gs; y+=gs){ ctx.beginPath();ctx.moveTo(0,y);ctx.lineTo(W,y);ctx.stroke(); }

  // Stars
  for(const s of BG_STARS) {
    const bri = 0.4+0.6*Math.sin(s.phase+t*s.spd);
    ctx.beginPath();
    ctx.arc(s.x*W, s.y*H, s.r, 0, Math.PI*2);
    ctx.fillStyle = `rgba(200,240,255,${bri*0.7})`;
    ctx.fill();
  }

  // Floating shapes
  for(const sh of BG_SHAPES) {
    sh.rot += sh.rotSpd;
    sh.y += sh.vy;
    if(sh.y > H+60) sh.y = -60;
    if(sh.y < -60) sh.y = H+60;
    ctx.save();
    ctx.translate(sh.x, sh.y);
    ctx.rotate(sh.rot);
    ctx.beginPath();
    for(let i=0;i<sh.sides;i++){
      const a = (i/sh.sides)*Math.PI*2-Math.PI/2;
      ctx.lineTo(Math.cos(a)*sh.r, Math.sin(a)*sh.r);
    }
    ctx.closePath();
    ctx.strokeStyle = sh.clr;
    ctx.globalAlpha = sh.alpha;
    ctx.lineWidth = 1.5;
    ctx.stroke();
    ctx.globalAlpha = 1;
    ctx.restore();
  }
}

// ============================================================
// SCORING RINGS DRAWING
// ============================================================
const RING_CONFIG = [
  { pts:10,  color:'#6688ff', radius:0 },
  { pts:20,  color:'#00e5ff', radius:0 },
  { pts:30,  color:'#7cff00', radius:0 },
  { pts:50,  color:'#ff9900', radius:0 },
  { pts:100, color:'#ff00ff', radius:0 },
];
const RING_RADII = [52, 42, 32, 22, 12];  // outer to inner

let ringCenterX = 0, ringCenterY = 0;

function setRingPositions() {
  ringCenterX = W * 0.5;
  ringCenterY = H * 0.115;
}

function drawRings(t) {
  setRingPositions();
  ctx.save();
  ctx.translate(ringCenterX, ringCenterY);

  for(let i=0;i<RING_RADII.length;i++) {
    const rc = RING_CONFIG[i];
    const r = RING_RADII[i];
    const pulse = 1+0.04*Math.sin(t*2+i*0.7);
    const isHit = G.hitTargets && G.hitTargets.has(i);

    ctx.beginPath();
    ctx.arc(0, 0, r*pulse, 0, Math.PI*2);
    ctx.fillStyle = rc.color;
    ctx.globalAlpha = isHit ? 0.12 : 0.22;
    ctx.fill();

    ctx.strokeStyle = rc.color;
    ctx.lineWidth = isHit ? 1 : 2.5;
    ctx.globalAlpha = isHit ? 0.3 : (0.8+0.2*Math.sin(t*1.8+i));
    ctx.shadowColor = rc.color;
    ctx.shadowBlur = isHit ? 4 : 14;
    ctx.stroke();
    ctx.shadowBlur = 0;

    // Pts label
    if(!isHit && r > 18) {
      ctx.globalAlpha = 0.7;
      ctx.fillStyle = rc.color;
      ctx.font = `7px 'Press Start 2P', monospace`;
      ctx.textAlign = 'center';
      ctx.textBaseline = 'middle';
      ctx.fillText(rc.pts, 0, 0);
    }
  }
  ctx.globalAlpha = 1;
  ctx.restore();
}

// ============================================================
// SLINGSHOT DRAWING
// ============================================================
function drawSlingshot(t) {
  const bx = slingX, by = slingY;
  const arm = C.SLING_ARM;

  // Base post
  const grad = ctx.createLinearGradient(bx-6, by, bx+6, by);
  grad.addColorStop(0,'#2a3540');
  grad.addColorStop(0.5,'#4a6070');
  grad.addColorStop(1,'#2a3540');
  ctx.fillStyle = grad;
  ctx.beginPath();
  ctx.roundRect(bx-8, by+arm*0.6, 16, 38, 4);
  ctx.fill();

  // Base platform
  ctx.fillStyle = '#3a5060';
  ctx.beginPath();
  ctx.roundRect(bx-22, by+arm*0.6+34, 44, 8, 3);
  ctx.fill();
  ctx.strokeStyle = C.CYAN;
  ctx.lineWidth = 1;
  ctx.globalAlpha = 0.3;
  ctx.stroke();
  ctx.globalAlpha = 1;

  // Left fork
  ctx.save();
  const lx = bx - arm*0.55, ly = by - arm*0.35;
  const grad2 = ctx.createLinearGradient(bx, by, lx, ly);
  grad2.addColorStop(0,'#3a5060');
  grad2.addColorStop(1,'#2a8090');
  ctx.strokeStyle = grad2;
  ctx.lineWidth = 7;
  ctx.lineCap = 'round';
  ctx.shadowColor = C.CYAN;
  ctx.shadowBlur = 6;
  ctx.beginPath();
  ctx.moveTo(bx, by+arm*0.5);
  ctx.lineTo(lx, ly);
  ctx.stroke();

  // Right fork
  const rx = bx + arm*0.55, ry = by - arm*0.35;
  const grad3 = ctx.createLinearGradient(bx, by, rx, ry);
  grad3.addColorStop(0,'#3a5060');
  grad3.addColorStop(1,'#2a8090');
  ctx.strokeStyle = grad3;
  ctx.beginPath();
  ctx.moveTo(bx, by+arm*0.5);
  ctx.lineTo(rx, ry);
  ctx.stroke();
  ctx.restore();

  // Fork tips
  for(const [tx,ty] of [[lx,ly],[rx,ry]]) {
    ctx.beginPath();
    ctx.arc(tx, ty, 5, 0, Math.PI*2);
    ctx.fillStyle = '#2abcd0';
    ctx.shadowColor = C.CYAN;
    ctx.shadowBlur = 10;
    ctx.fill();
    ctx.shadowBlur = 0;
  }
}

function drawRubberBand(ballX, ballY, t) {
  const arm = C.SLING_ARM;
  const lx = slingX - arm*0.55, ly = slingY - arm*0.35;
  const rx = slingX + arm*0.55, ry = slingY - arm*0.35;

  const bandColor = G.dragging
    ? `hsl(${170+G.pullVec.x},80%,60%)`
    : C.CYAN;

  ctx.strokeStyle = bandColor;
  ctx.lineWidth = 3;
  ctx.shadowColor = bandColor;
  ctx.shadowBlur = 8;
  ctx.lineCap = 'round';

  ctx.beginPath();
  ctx.moveTo(lx, ly);
  ctx.quadraticCurveTo(ballX-8, ballY+6, ballX, ballY);
  ctx.stroke();

  ctx.beginPath();
  ctx.moveTo(rx, ry);
  ctx.quadraticCurveTo(ballX+8, ballY+6, ballX, ballY);
  ctx.stroke();

  ctx.shadowBlur = 0;
}

// ============================================================
// TRAJECTORY PREVIEW
// ============================================================
function drawTrajectory() {
  if(!G.dragging || !G.pullVec) return;
  const pull = Math.sqrt(G.pullVec.x**2+G.pullVec.y**2);
  if(pull < 12) return;

  const bt = BALL_TYPES[G.ballQueue[G.currentBallIdx]] || BALL_TYPES.standard;
  const force = pull / C.MAX_PULL;
  const vx = -(G.pullVec.x / C.MAX_PULL) * 26;
  const vy = -(G.pullVec.y / C.MAX_PULL) * 26;

  let px = slingX, py = slingY;
  let dvx = vx, dvy = vy;
  const grav = 0.6;

  for(let i=0;i<C.TRAJ_DOTS;i++) {
    dvx += (G.wind*0.04);
    dvy += grav;
    px += dvx; py += dvy;
    if(py < 0 || px < 0 || px > W) break;

    const alpha = (1-i/C.TRAJ_DOTS)*0.7;
    const r = (1-i/C.TRAJ_DOTS)*5+2;
    ctx.beginPath();
    ctx.arc(px, py, r, 0, Math.PI*2);
    ctx.fillStyle = bt.color;
    ctx.globalAlpha = alpha;
    ctx.fill();
    ctx.globalAlpha = 1;
  }
}

// ============================================================
// BALL DRAWING
// ============================================================
function drawBall(bx, by, r, type, trail=[]) {
  const bt = BALL_TYPES[type] || BALL_TYPES.standard;

  // Glow trail
  for(let i=0; i<trail.length; i++) {
    const tp = trail[i];
    const a = (1-i/trail.length)*0.25;
    ctx.beginPath();
    ctx.arc(tp.x, tp.y, r*(1-i/trail.length*0.5), 0, Math.PI*2);
    ctx.fillStyle = bt.glow;
    ctx.globalAlpha = a;
    ctx.fill();
  }
  ctx.globalAlpha = 1;

  // Ball body
  ctx.shadowColor = bt.glow;
  ctx.shadowBlur = 20;
  const grad = ctx.createRadialGradient(bx-r*0.3, by-r*0.3, r*0.05, bx, by, r);
  grad.addColorStop(0, 'white');
  grad.addColorStop(0.2, bt.color);
  grad.addColorStop(1, shadeColor(bt.color, -60));
  ctx.beginPath();
  ctx.arc(bx, by, r, 0, Math.PI*2);
  ctx.fillStyle = grad;
  ctx.fill();
  ctx.shadowBlur = 0;

  // Specular highlight
  ctx.beginPath();
  ctx.arc(bx-r*0.28, by-r*0.28, r*0.22, 0, Math.PI*2);
  ctx.fillStyle = 'rgba(255,255,255,0.55)';
  ctx.fill();
}

// idle ball in slingshot
function drawIdleBall(t) {
  if(G.launched || G.activeBall) return;
  const type = G.ballQueue[G.currentBallIdx];
  if(!type) return;
  const bob = Math.sin(t*2.2)*3;
  if(!G.dragging) {
    drawBall(slingX, slingY-C.BALL_RADIUS+bob, C.BALL_RADIUS, type);
    drawRubberBand(slingX, slingY-C.BALL_RADIUS+bob, t);
  } else {
    const pullX = Math.min(Math.max(G.pullVec.x,-C.MAX_PULL),C.MAX_PULL);
    const pullY = Math.min(Math.max(G.pullVec.y,-C.MAX_PULL),C.MAX_PULL);
    const bx = slingX + pullX;
    const by = slingY + pullY;
    drawBall(bx, by-C.BALL_RADIUS, C.BALL_RADIUS, type);
    drawRubberBand(bx, by-C.BALL_RADIUS, t);
  }
}

// ============================================================
// OBSTACLE DRAWING
// ============================================================
function drawObstacles(t) {
  if(!G.levelObjects) return;
  for(const obj of G.levelObjects) {
    if(!obj.body || obj.broken) continue;
    drawObstacle(obj, t);
  }
  // Moving platforms
  for(const mp of G.movingPlatforms) {
    if(mp.broken) continue;
    drawObstacle(mp, t);
  }
  // Windmills (drawn via their bodies)
  for(const wm of G.windmills) {
    drawWindmill(wm, t);
  }
  // Gravity wells
  for(const gw of G.gravWells) {
    drawGravityWell(gw, t);
  }
}

function drawObstacle(obj, t) {
  const b = obj.body;
  const pos = b.position;
  const angle = b.angle;

  ctx.save();
  ctx.translate(pos.x, pos.y);
  ctx.rotate(angle);

  switch(obj.type) {
    case 'wood': drawWoodPlank(obj, t); break;
    case 'steel': drawSteelBeam(obj, t); break;
    case 'bumper': drawBumper(obj, t); break;
    case 'glass': drawGlass(obj, t); break;
    case 'mover': drawMoverPlatform(obj, t); break;
    case 'bouncePad': drawBouncePad(obj, t); break;
  }

  ctx.restore();
}

function drawWoodPlank(obj, t) {
  const hw = obj.hw, hh = obj.hh;
  const hp = (G.hitCounts[obj.body.id]||0)/2;  // 0 or 0.5 for 1 hit
  const baseColor = hp > 0 ? '#6b3a20' : '#8B5E3C';
  const grad = ctx.createLinearGradient(-hw, -hh, hw, hh);
  grad.addColorStop(0, '#a8753a');
  grad.addColorStop(0.4, baseColor);
  grad.addColorStop(1, '#4a2a10');
  ctx.fillStyle = grad;
  ctx.strokeStyle = '#c09050';
  ctx.lineWidth = 1.5;
  ctx.beginPath();
  ctx.roundRect(-hw, -hh, hw*2, hh*2, 2);
  ctx.fill();
  ctx.stroke();
  // grain lines
  ctx.strokeStyle = 'rgba(0,0,0,0.15)';
  ctx.lineWidth = 1;
  for(let i=-hw+8; i<hw; i+=12) {
    ctx.beginPath(); ctx.moveTo(i,-hh); ctx.lineTo(i,hh); ctx.stroke();
  }
  if(hp > 0) {
    // crack lines
    ctx.strokeStyle = 'rgba(0,0,0,0.5)';
    ctx.lineWidth = 1.5;
    ctx.beginPath(); ctx.moveTo(-5,-hh); ctx.lineTo(8,hh); ctx.stroke();
    ctx.beginPath(); ctx.moveTo(5,-hh); ctx.lineTo(-10,hh); ctx.stroke();
  }
}

function drawSteelBeam(obj, t) {
  const hw = obj.hw, hh = obj.hh;
  const shine = 0.6+0.4*Math.sin(t*0.5);
  const grad = ctx.createLinearGradient(-hw, -hh, hw, hh);
  grad.addColorStop(0, '#556677');
  grad.addColorStop(0.35, '#aabbcc');
  grad.addColorStop(0.5, `rgba(255,255,255,${shine*0.3})`);
  grad.addColorStop(0.65, '#aabbcc');
  grad.addColorStop(1, '#334455');
  ctx.fillStyle = grad;
  ctx.strokeStyle = '#88aacc';
  ctx.lineWidth = 1.5;
  ctx.shadowColor = '#88aacc';
  ctx.shadowBlur = 4;
  ctx.beginPath();
  ctx.roundRect(-hw, -hh, hw*2, hh*2, 2);
  ctx.fill();
  ctx.stroke();
  ctx.shadowBlur = 0;
  // rivet dots
  ctx.fillStyle = '#334455';
  for(let ix = -hw+6; ix < hw-4; ix+=14) {
    ctx.beginPath(); ctx.arc(ix, 0, 2, 0, Math.PI*2); ctx.fill();
  }
}

function drawBumper(obj, t) {
  const r = obj.fr;
  const pulse = 1+0.06*Math.sin(t*3);
  ctx.beginPath();
  ctx.arc(0, 0, r*pulse, 0, Math.PI*2);
  ctx.fillStyle = 'rgba(255,0,255,0.15)';
  ctx.strokeStyle = C.MAGENTA;
  ctx.lineWidth = 3;
  ctx.shadowColor = C.MAGENTA;
  ctx.shadowBlur = 18+8*Math.sin(t*3);
  ctx.fill();
  ctx.stroke();
  ctx.shadowBlur = 0;
  // inner ring
  ctx.beginPath();
  ctx.arc(0, 0, r*0.6, 0, Math.PI*2);
  ctx.strokeStyle = 'rgba(255,0,255,0.6)';
  ctx.lineWidth = 2;
  ctx.stroke();
  // center dot
  ctx.beginPath();
  ctx.arc(0, 0, r*0.18, 0, Math.PI*2);
  ctx.fillStyle = C.MAGENTA;
  ctx.fill();
}

function drawGlass(obj, t) {
  const hw = obj.hw, hh = obj.hh;
  ctx.fillStyle = 'rgba(150,230,255,0.18)';
  ctx.strokeStyle = 'rgba(150,230,255,0.7)';
  ctx.lineWidth = 2;
  ctx.shadowColor = C.CYAN;
  ctx.shadowBlur = 8;
  ctx.beginPath();
  ctx.roundRect(-hw, -hh, hw*2, hh*2, 2);
  ctx.fill();
  ctx.stroke();
  ctx.shadowBlur = 0;
  // shatter marks if hit once
  if((G.hitCounts[obj.body.id]||0) > 0) {
    ctx.strokeStyle = 'rgba(255,255,255,0.5)';
    ctx.lineWidth = 1;
    ctx.beginPath(); ctx.moveTo(-hw*0.5,-hh); ctx.lineTo(hw*0.3,hh); ctx.stroke();
    ctx.beginPath(); ctx.moveTo(hw*0.5,-hh); ctx.lineTo(-hw*0.2,hh); ctx.stroke();
  }
  // shine line
  ctx.fillStyle = 'rgba(255,255,255,0.25)';
  ctx.beginPath();
  ctx.rect(-hw+4,-hh+2, hw*0.4, hh*2-4);
  ctx.fill();
}

function drawMoverPlatform(obj, t) {
  const hw = obj.hw, hh = obj.hh;
  const grad = ctx.createLinearGradient(-hw,-hh,hw,hh);
  grad.addColorStop(0,'#004060');
  grad.addColorStop(0.5,'#00aacc');
  grad.addColorStop(1,'#004060');
  ctx.fillStyle = grad;
  ctx.strokeStyle = C.CYAN;
  ctx.lineWidth = 2;
  ctx.shadowColor = C.CYAN;
  ctx.shadowBlur = 10;
  ctx.beginPath();
  ctx.roundRect(-hw,-hh,hw*2,hh*2,3);
  ctx.fill();
  ctx.stroke();
  ctx.shadowBlur = 0;
  // arrows indicating movement
  const arrowAlpha = 0.5+0.3*Math.sin(t*2);
  ctx.globalAlpha = arrowAlpha;
  ctx.fillStyle = C.CYAN;
  ctx.font = '10px Chakra Petch';
  ctx.textAlign = 'center';
  ctx.textBaseline = 'middle';
  ctx.fillText('◄►', 0, 0);
  ctx.globalAlpha = 1;
}

function drawBouncePad(obj, t) {
  const hw = obj.hw, hh = obj.hh;
  const pulse = 0.6+0.4*Math.sin(t*2.5);
  const grad = ctx.createLinearGradient(-hw,-hh,hw,hh);
  grad.addColorStop(0,'#804000');
  grad.addColorStop(0.5,'#ff9900');
  grad.addColorStop(1,'#804000');
  ctx.fillStyle = grad;
  ctx.strokeStyle = C.ORANGE;
  ctx.lineWidth = 2;
  ctx.shadowColor = C.ORANGE;
  ctx.shadowBlur = 10*pulse;
  ctx.beginPath();
  ctx.roundRect(-hw,-hh,hw*2,hh*2,3);
  ctx.fill();
  ctx.stroke();
  ctx.shadowBlur = 0;
  // arrow up
  ctx.fillStyle = 'rgba(255,200,0,0.8)';
  ctx.font = '11px Arial';
  ctx.textAlign = 'center';
  ctx.textBaseline = 'middle';
  ctx.fillText('▲', 0, 0);
}

function drawWindmill(wm, t) {
  if(!wm.body) return;
  const pos = wm.body.position;
  ctx.save();
  ctx.translate(pos.x, pos.y);

  // Hub
  ctx.beginPath();
  ctx.arc(0, 0, 7, 0, Math.PI*2);
  ctx.fillStyle = '#1a3a1a';
  ctx.strokeStyle = C.GREEN;
  ctx.lineWidth = 2;
  ctx.shadowColor = C.GREEN;
  ctx.shadowBlur = 8;
  ctx.fill(); ctx.stroke();
  ctx.shadowBlur = 0;

  // Blades (2 opposing bars around the hub)
  ctx.rotate(wm.body.angle);
  for(let i=0; i<2; i++) {
    ctx.save();
    ctx.rotate(i*Math.PI);
    ctx.fillStyle = '#1a5a1a';
    ctx.strokeStyle = C.GREEN;
    ctx.lineWidth = 1.5;
    ctx.shadowColor = C.GREEN;
    ctx.shadowBlur = 6;
    ctx.beginPath();
    ctx.roundRect(0, -5, wm.bladeLen, 10, 3);
    ctx.fill();
    ctx.stroke();
    ctx.shadowBlur = 0;
    ctx.restore();
  }
  ctx.restore();
}

function drawGravityWell(gw, t) {
  const pulse = 1+0.08*Math.sin(t*2.5);
  const r = gw.r;
  ctx.save();
  ctx.translate(gw.x, gw.y);

  // Outer glow rings
  for(let i=3; i>0; i--) {
    ctx.beginPath();
    ctx.arc(0, 0, r*i*pulse*0.5, 0, Math.PI*2);
    ctx.strokeStyle = `rgba(170,0,255,${0.15/i})`;
    ctx.lineWidth = 2;
    ctx.stroke();
  }

  // Rotating ring
  ctx.rotate(t*1.5);
  ctx.beginPath();
  ctx.arc(0, 0, r*0.7, 0, Math.PI*1.5);
  ctx.strokeStyle = C.PURPLE;
  ctx.lineWidth = 2.5;
  ctx.shadowColor = C.PURPLE;
  ctx.shadowBlur = 12;
  ctx.stroke();
  ctx.shadowBlur = 0;
  ctx.restore();

  // Center
  ctx.save();
  ctx.translate(gw.x, gw.y);
  ctx.beginPath();
  ctx.arc(0, 0, r*0.2*pulse, 0, Math.PI*2);
  ctx.fillStyle = C.PURPLE;
  ctx.shadowColor = C.PURPLE;
  ctx.shadowBlur = 16;
  ctx.fill();
  ctx.shadowBlur = 0;
  ctx.restore();
}

// ============================================================
// POWER-UP DRAWING
// ============================================================
function drawPowerups(t) {
  for(const pu of G.levelObjects.filter(o=>o.type==='powerup'&&!o.collected)) {
    const pos = pu.body.position;
    const bob = Math.sin(t*2.5+pu.idx)*5;
    ctx.save();
    ctx.translate(pos.x, pos.y+bob);
    const r = 14+2*Math.sin(t*3);
    ctx.beginPath();
    ctx.arc(0,0,r,0,Math.PI*2);
    ctx.fillStyle = 'rgba(255,235,59,0.15)';
    ctx.strokeStyle = C.YELLOW;
    ctx.lineWidth = 2;
    ctx.shadowColor = C.YELLOW;
    ctx.shadowBlur = 14;
    ctx.fill(); ctx.stroke();
    ctx.shadowBlur = 0;
    ctx.fillStyle = C.YELLOW;
    ctx.font = `10px 'Press Start 2P', monospace`;
    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';
    const icons = {precision:'AIM','2x':'2X',ghost:'GHO'};
    ctx.fillText(icons[pu.puType]||'?', 0, 1);
    ctx.restore();
  }
}

// ============================================================
// PARTICLES
// ============================================================
function spawnParticles(x, y, color, count=12, speed=4) {
  for(let i=0;i<count;i++) {
    const angle = (i/count)*Math.PI*2+Math.random()*0.5;
    const spd = speed*(0.5+Math.random());
    G.particles.push({
      x, y,
      vx: Math.cos(angle)*spd,
      vy: Math.sin(angle)*spd,
      r: 2+Math.random()*3,
      life: 1.0,
      decay: 0.025+Math.random()*0.02,
      color
    });
  }
}

function spawnExplosion(x, y) {
  spawnParticles(x, y, C.RED, 22, 7);
  spawnParticles(x, y, C.ORANGE, 14, 5);
  G.screenShake = 14;
  sfxBreak();
}

function updateParticles() {
  for(let i=G.particles.length-1; i>=0; i--) {
    const p = G.particles[i];
    p.x += p.vx; p.y += p.vy;
    p.vy += 0.12;
    p.vx *= 0.97;
    p.life -= p.decay;
    if(p.life<=0) G.particles.splice(i,1);
  }
}

function drawParticles() {
  for(const p of G.particles) {
    ctx.beginPath();
    ctx.arc(p.x, p.y, p.r*p.life, 0, Math.PI*2);
    ctx.fillStyle = p.color;
    ctx.globalAlpha = p.life;
    ctx.fill();
  }
  ctx.globalAlpha = 1;
}

// ============================================================
// FLOAT SCORES
// ============================================================
function spawnFloatScore(x, y, pts, color=C.YELLOW) {
  const el = document.createElement('div');
  el.className = 'float-score';
  el.style.left = (x/W*100)+'%';
  el.style.top = (y/H*100)+'%';
  el.style.color = color;
  el.style.fontSize = pts >= 100 ? '16px' : pts >= 50 ? '13px' : '11px';
  el.textContent = '+'+pts;
  document.getElementById('ui').appendChild(el);
  setTimeout(()=>el.remove(), 950);
}

// ============================================================
// LEVEL SETUP
// ============================================================
function buildLevel(levelIdx) {
  initEngine();
  const def = LEVEL_DEFS[levelIdx];
  G.levelObjects = [];
  G.gravWells = [];
  G.movingPlatforms = [];
  G.windmills = [];
  G.hitTargets = new Set();
  G.hitCounts = {};
  G.particles = [];
  G.floatScores = [];
  G.brokenBodies = [];

  // Walls (invisible)
  const wallOpts = { isStatic:true, restitution:0.3, friction:0.1, collisionFilter:{category:0x0002,mask:0x0001} };
  const floor = Bodies.rectangle(W/2, H+C.WALL_T/2, W*2, C.WALL_T, wallOpts);
  const wallL = Bodies.rectangle(-C.WALL_T/2, H/2, C.WALL_T, H*2, wallOpts);
  const wallR = Bodies.rectangle(W+C.WALL_T/2, H/2, C.WALL_T, H*2, wallOpts);
  World.add(world, [floor, wallL, wallR]);

  // Scoring ring bodies
  G.targets = [];
  setRingPositions();
  for(let i=0; i<RING_RADII.length; i++) {
    const r = RING_RADII[i];
    const sensor = Bodies.circle(ringCenterX, ringCenterY, r, {
      isStatic:true, isSensor:true,
      label:'target_'+i,
      collisionFilter:{category:0x0004, mask:0x0001}
    });
    sensor.ringIndex = i;
    World.add(world, sensor);
    G.targets.push(sensor);
  }

  // Build obstacles
  for(let i=0; i<def.obstacles.length; i++) {
    const od = def.obstacles[i];
    buildObstacle(od, i);
  }

  // Build power-up sensors
  for(let i=0; i<def.powerups.length; i++) {
    const pd = def.powerups[i];
    const px = pd.fx*W, py = pd.fy*H;
    const body = Bodies.circle(px, py, 16, {
      isStatic:true, isSensor:true, label:'powerup_'+i,
      collisionFilter:{category:0x0008, mask:0x0001}
    });
    World.add(world, body);
    G.levelObjects.push({ body, type:'powerup', puType:pd.type, collected:false, idx:i });
  }

  // Wind
  G.wind = def.wind * (Math.random()>0.5?1:-1);

  // Ball queue
  G.ballQueue = [...def.balls];
  G.currentBallIdx = 0;
  G.activeBall = null;
  G.launched = false;

  // Collision events
  Events.on(engine, 'collisionStart', handleCollision);
}

function rebuildLevel(idx) {
  Events.off(engine, 'collisionStart');
  buildLevel(idx);
}

function buildObstacle(od, idx) {
  const x = od.fx*W, y = od.fy*H;

  if(od.type === 'wood' || od.type === 'steel' || od.type === 'glass' || od.type === 'bouncePad') {
    const hw = od.fw*W*0.5, hh = (od.fh||0.025)*H*0.5;
    const body = Bodies.rectangle(x, y, hw*2, hh*2, {
      isStatic: true,
      angle: od.angle||0,
      restitution: od.type==='bouncePad' ? 1.4 : od.type==='glass' ? 0.5 : od.type==='steel' ? 0.6 : 0.3,
      friction: 0.2,
      label: od.type+'_'+idx,
      collisionFilter:{category:0x0002, mask:0x0001}
    });
    World.add(world, body);
    const obj = { body, type:od.type, hw, hh, broken:false, idx };
    G.levelObjects.push(obj);
    if(od.type === 'mover') {
      // shouldn't happen here but guard
    }
  } else if(od.type === 'bumper') {
    const r = od.fr*Math.min(W,H);
    const body = Bodies.circle(x, y, r, {
      isStatic:true,
      restitution:1.6,
      friction:0,
      label:'bumper_'+idx,
      collisionFilter:{category:0x0002, mask:0x0001}
    });
    World.add(world, body);
    G.levelObjects.push({ body, type:'bumper', fr:r, broken:false, idx });
  } else if(od.type === 'windmill') {
    const len = od.flen*Math.min(W,H);
    // Pivot is static sensor, two blades as a single compound body
    const pivot = Bodies.circle(x, y, 6, {
      isStatic:true, isSensor:true, label:'wm_pivot_'+idx,
      collisionFilter:{category:0,mask:0}
    });
    const blade1 = Bodies.rectangle(x+len/2, y, len, 10, {
      isStatic:true, label:'windmill_'+idx,
      restitution:0.5, friction:0.05,
      collisionFilter:{category:0x0002, mask:0x0001}
    });
    World.add(world, [pivot, blade1]);
    G.windmills.push({ body:blade1, pivotX:x, pivotY:y, bladeLen:len, speed:od.speed, angle:0 });
  } else if(od.type === 'mover') {
    const hw = od.fw*W*0.5, hh = (od.fh||0.025)*H*0.5;
    const body = Bodies.rectangle(x, y, hw*2, hh*2, {
      isStatic:true, restitution:0.4, friction:0.3, label:'mover_'+idx,
      collisionFilter:{category:0x0002, mask:0x0001}
    });
    World.add(world, body);
    const range = od.rangeX*W;
    G.movingPlatforms.push({ body, type:'mover', hw, hh, startX:x, range, speed:od.speed*(W/800), t:0, broken:false, idx });
    G.levelObjects.push({ body, type:'mover', hw, hh, broken:false, idx });
  } else if(od.type === 'gravity') {
    const r = od.fr*Math.min(W,H);
    G.gravWells.push({ x, y, r, strength:od.strength||0.0005, idx });
  }
}

// ============================================================
// COLLISION HANDLING
// ============================================================
function handleCollision(evt) {
  const pairs = evt.pairs;
  for(const pair of pairs) {
    const {bodyA, bodyB} = pair;
    const ball = bodyA.label==='ball' ? bodyA : bodyB.label==='ball' ? bodyB : null;
    const other = ball === bodyA ? bodyB : bodyA;
    if(!ball) continue;

    const lbl = other.label || '';

    // Target rings
    if(lbl.startsWith('target_')) {
      const ri = parseInt(lbl.split('_')[1]);
      if(!G.hitTargets.has(ri)) {
        G.hitTargets.add(ri);
        const rc = RING_CONFIG[ri];
        let pts = rc.pts;
        // Only innermost unhit ring scores
        const validScore = ri === findInnermostUnhit();
        if(validScore || true) {  // all rings score, center scores most
          G.combo++;
          G.comboTimer = 90;
          const mult = G.powerup==='2x' ? 2 : 1;
          pts = Math.round(pts * mult * (1 + (G.combo-1)*0.3));
          G.score += pts;
          sfxScore(pts);
          spawnParticles(ringCenterX, ringCenterY, rc.color, 18, 5);
          spawnFloatScore(ringCenterX, ringCenterY-30, pts, rc.color);
          if(G.combo >= 3) sfxCombo();
          updateHUD();
        }
      }
      return;
    }

    // Wood
    if(lbl.startsWith('wood_')) {
      G.hitCounts[other.id] = (G.hitCounts[other.id]||0)+1;
      sfxHit();
      G.screenShake = 6;
      const obj = G.levelObjects.find(o=>o.body===other);
      if(obj && G.hitCounts[other.id] >= 2) {
        breakObject(obj, other.position.x, other.position.y, C.WOOD);
      } else {
        spawnParticles(other.position.x, other.position.y, C.WOOD, 8, 3);
      }
    }

    // Glass
    if(lbl.startsWith('glass_')) {
      const obj = G.levelObjects.find(o=>o.body===other);
      if(obj && G.powerup!=='ghost') {
        G.hitCounts[other.id] = (G.hitCounts[other.id]||0)+1;
        sfxBreak();
        G.screenShake = 5;
        spawnParticles(other.position.x, other.position.y, C.CYAN, 16, 5);
        if(G.hitCounts[other.id] >= 1) {
          breakObject(obj, other.position.x, other.position.y, 'rgba(150,230,255,0.8)');
        }
      }
    }

    // Bumper
    if(lbl.startsWith('bumper_')) {
      sfxBounce();
      G.screenShake = 4;
      spawnParticles(other.position.x, other.position.y, C.MAGENTA, 10, 4);
    }

    // Bounce pad
    if(lbl.startsWith('bouncePad')) {
      sfxBounce();
      spawnParticles(other.position.x, other.position.y, C.ORANGE, 8, 3);
    }

    // Power-up collection
    if(lbl.startsWith('powerup_')) {
      const obj = G.levelObjects.find(o=>o.body===other&&o.type==='powerup');
      if(obj && !obj.collected) {
        obj.collected = true;
        activatePowerup(obj.puType);
        spawnParticles(other.position.x, other.position.y, C.YELLOW, 16, 5);
      }
    }

    // Windmill hit
    if(lbl.startsWith('windmill_')) {
      sfxHit();
      G.screenShake = 5;
    }
  }
}

function findInnermostUnhit() {
  for(let i=RING_RADII.length-1; i>=0; i--) {
    if(!G.hitTargets.has(i)) return i;
  }
  return -1;
}

function breakObject(obj, bx, by, color) {
  if(obj.broken) return;
  obj.broken = true;
  World.remove(world, obj.body);
  spawnParticles(bx, by, color, 20, 5);
  G.score += 50;
  spawnFloatScore(bx, by, 50, color);
  updateHUD();
}

function activatePowerup(type) {
  G.powerup = type;
  G.powerupTimer = 300;
  const el = document.getElementById('hud-powerup');
  const names = {'2x':'2X SCORE!', precision:'PRECISION!', ghost:'GHOST BALL!'};
  el.textContent = names[type]||type;
  el.style.display = 'block';
  spawnParticles(slingX, slingY, C.YELLOW, 20, 4);
}

// ============================================================
// BALL PHYSICS
// ============================================================
let activeBallTrail = [];

function launchBall() {
  const pull = Math.sqrt(G.pullVec.x**2+G.pullVec.y**2);
  if(pull < 10) return;

  const type = G.ballQueue[G.currentBallIdx];
  const bt = BALL_TYPES[type] || BALL_TYPES.standard;

  const body = Bodies.circle(slingX, slingY, C.BALL_RADIUS, {
    restitution: bt.restitution,
    friction: 0.1,
    frictionAir: bt.frictionAir,
    density: bt.mass * 0.004,
    label: 'ball',
    collisionFilter:{category:0x0001, mask:0xFFFF}
  });

  const vx = -(G.pullVec.x / C.MAX_PULL) * 26;
  const vy = -(G.pullVec.y / C.MAX_PULL) * 26;

  World.add(world, body);
  Body.setVelocity(body, {x:vx, y:vy});

  G.activeBall = { body, type };
  G.launched = true;
  G.ballsFired++;
  activeBallTrail = [];

  sfxLaunch();
  spawnParticles(slingX, slingY, bt.color, 10, 3);
}

function updateBallPhysics() {
  if(!G.activeBall) return;
  const b = G.activeBall.body;
  const pos = b.position;

  // Wind force
  if(G.wind !== 0) {
    Body.applyForce(b, pos, {x: G.wind * 0.00008, y: 0});
  }

  // Gravity well pull
  for(const gw of G.gravWells) {
    const dx = gw.x - pos.x;
    const dy = gw.y - pos.y;
    const dist = Math.sqrt(dx*dx+dy*dy);
    if(dist < gw.r*4 && dist > 5) {
      const force = gw.strength / (dist * 0.01 + 0.1);
      Body.applyForce(b, pos, {
        x: (dx/dist)*force,
        y: (dy/dist)*force
      });
    }
  }

  // Curve ball: tap adds upward force mid-flight
  if(G.activeBall.type === 'curve' && G.curveBoost) {
    Body.applyForce(b, pos, {x:0, y:-0.015});
    G.curveBoost = false;
  }

  // Bomb: explosion on tap
  if(G.activeBall.type === 'bomb' && G.bombDetonate) {
    spawnExplosion(pos.x, pos.y);
    // Push all nearby objects
    const allBodies = Composite.allBodies(world);
    for(const ob of allBodies) {
      if(ob === b) continue;
      const dx = ob.position.x - pos.x;
      const dy = ob.position.y - pos.y;
      const dist = Math.sqrt(dx*dx+dy*dy);
      if(dist < 120 && dist > 1) {
        const force = 0.08/dist;
        Body.applyForce(ob, ob.position, {x:(dx/dist)*force, y:(dy/dist)*force});
      }
    }
    G.bombDetonate = false;
    World.remove(world, b);
    G.activeBall = null;
    G.launched = false;
    nextBall();
    return;
  }

  // Trail
  activeBallTrail.unshift({x:pos.x, y:pos.y});
  if(activeBallTrail.length > 14) activeBallTrail.pop();

  // Off-screen or stopped check
  const spd = Math.sqrt(b.velocity.x**2+b.velocity.y**2);
  if(pos.y > H+80 || pos.x < -60 || pos.x > W+60 || (pos.y > H*0.7 && spd < 0.4)) {
    World.remove(world, b);
    G.activeBall = null;
    G.launched = false;
    setTimeout(nextBall, 600);
  }
}

function updateWindmills() {
  for(const wm of G.windmills) {
    wm.angle = (wm.angle||0) + wm.speed * 0.03;
    Body.setAngle(wm.body, wm.angle);
    Body.setAngularVelocity(wm.body, 0);
  }
}

function updateMovers() {
  for(const mp of G.movingPlatforms) {
    if(mp.broken) continue;
    mp.t += mp.speed * 0.02;
    const newX = mp.startX + Math.sin(mp.t) * mp.range * 0.5;
    Body.setPosition(mp.body, {x:newX, y:mp.body.position.y});
    Body.setVelocity(mp.body, {x:0,y:0});
  }
}

function nextBall() {
  activeBallTrail = [];
  G.currentBallIdx++;
  if(G.currentBallIdx >= G.ballQueue.length) {
    endLevel();
    return;
  }
  updateBallQueueUI();
}

// ============================================================
// HUD
// ============================================================
function updateHUD() {
  document.getElementById('hud-score').textContent = G.score.toString().padStart(5,'0');
  const comboEl = document.getElementById('hud-combo');
  if(G.combo >= 2) {
    comboEl.textContent = 'x'+G.combo+' COMBO';
    comboEl.classList.remove('bump');
    void comboEl.offsetWidth;
    comboEl.classList.add('bump');
  } else {
    comboEl.textContent = '';
  }
  document.getElementById('hud-level').textContent = 'LVL '+(G.level+1)+' — '+(LEVEL_DEFS[G.level]?.name||'');
  const windEl = document.getElementById('hud-wind');
  if(G.wind !== 0) {
    windEl.textContent = 'WIND: '+(G.wind>0?'►':'◄')+' '+Math.abs(G.wind).toFixed(1);
  } else {
    windEl.textContent = '';
  }
}

function updateBallQueueUI() {
  const q = document.getElementById('ball-queue');
  q.innerHTML = '';
  for(let i=0; i<G.ballQueue.length; i++) {
    const type = G.ballQueue[i];
    const bt = BALL_TYPES[type];
    const div = document.createElement('div');
    div.className = 'ball-indicator' + (i===G.currentBallIdx&&!G.launched?' active-ball':'') + (i<G.currentBallIdx?' used-ball':'');
    const icon = document.createElement('div');
    icon.className = 'ball-icon';
    icon.style.background = bt.color;
    icon.style.boxShadow = `0 0 8px ${bt.glow}`;
    div.appendChild(icon);
    // Tap to use special ability
    if(i === G.currentBallIdx) {
      div.addEventListener('click', ()=>{ onBallAbility(type); });
      div.addEventListener('touchend', (e)=>{ e.preventDefault(); onBallAbility(type); });
    }
    q.appendChild(div);
  }
}

function onBallAbility(type) {
  if(!G.launched) return;
  if(type==='curve') G.curveBoost = true;
  if(type==='bomb')  G.bombDetonate = true;
}

// ============================================================
// LEVEL END
// ============================================================
function endLevel() {
  // Calculate stars
  const stars = G.score >= LEVEL_DEFS[G.level].stars[2] ? 3
    : G.score >= LEVEL_DEFS[G.level].stars[1] ? 2
    : G.score >= LEVEL_DEFS[G.level].stars[0] ? 1 : 0;

  // Update progress
  const s = progress.stars;
  s[G.level] = Math.max(s[G.level]||0, stars);
  if(stars > 0 && G.level+1 < 10) {
    progress.unlocked = Math.max(progress.unlocked, G.level+2);
  }
  totalScore += G.score;
  saveProgress();

  // Show results after brief delay
  setTimeout(()=>showResults(stars), 800);
}

function showResults(stars) {
  const starStr = ['☆☆☆','★☆☆','★★☆','★★★'][Math.min(stars,3)];
  document.getElementById('res-score').textContent = G.score.toString().padStart(6,'0');
  document.getElementById('res-stars').textContent = starStr;

  const thresholds = LEVEL_DEFS[G.level].stars;
  const bd = document.getElementById('res-breakdown');
  bd.innerHTML = `Score <span>${G.score}</span><br>
    Threshold 1★ <span>${thresholds[0]}</span><br>
    Threshold 3★ <span>${thresholds[2]}</span><br>
    Balls used <span>${G.ballsFired}</span>`;

  showScreen('results');
}

// ============================================================
// SCREEN MANAGEMENT
// ============================================================
function showScreen(name) {
  G.screen = name;
  for(const el of document.querySelectorAll('.screen')) el.classList.remove('active');
  const s = document.getElementById('screen-'+name);
  if(s) s.classList.add('active');

  if(name === 'levels') renderLevelGrid();
  if(name === 'game') {
    updateHUD();
    updateBallQueueUI();
  }
  if(name === 'title') {
    const best = totalScore;
    document.getElementById('best-score-txt').textContent = best > 0 ? 'BEST: '+best : '';
  }
}

function renderLevelGrid() {
  const grid = document.getElementById('level-grid');
  grid.innerHTML = '';
  for(let i=0; i<10; i++) {
    const btn = document.createElement('div');
    const locked = i+1 > progress.unlocked;
    btn.className = 'level-btn' + (locked?' locked':'');
    const stars = progress.stars[i]||0;
    const starStr = '★'.repeat(stars)+'☆'.repeat(3-stars);
    btn.innerHTML = `${i+1}<div class="stars">${starStr}</div>`;
    if(!locked) btn.addEventListener('click', ()=>startLevel(i));
    grid.appendChild(btn);
  }
}

function startLevel(idx) {
  G.level = idx;
  G.score = 0;
  G.combo = 0;
  G.comboTimer = 0;
  G.ballsFired = 0;
  G.wind = 0;
  G.powerup = null;
  G.powerupTimer = 0;
  G.screenShake = 0;
  G.launched = false;
  G.dragging = false;
  G.pullVec = {x:0,y:0};
  G.curveBoost = false;
  G.bombDetonate = false;
  document.getElementById('hud-powerup').style.display = 'none';

  buildLevel(idx);
  showScreen('game');
  updateBallQueueUI();
}

// ============================================================
// INPUT
// ============================================================
let pointerDown = false;
let pointerId = null;

function getPos(e) {
  if(e.touches) {
    const t = e.changedTouches[0];
    return {x:t.clientX, y:t.clientY};
  }
  return {x:e.clientX, y:e.clientY};
}

function isNearSling(p) {
  const dx = p.x - slingX, dy = p.y - slingY;
  return Math.sqrt(dx*dx+dy*dy) < 80;
}

function onPointerDown(e) {
  if(G.screen !== 'game' || G.paused) return;
  const p = getPos(e);

  if(G.launched && G.activeBall) {
    const type = G.ballQueue[G.currentBallIdx];
    onBallAbility(type);
    return;
  }

  if(!G.launched && isNearSling(p)) {
    G.dragging = true;
    pointerDown = true;
    G.dragStart = p;
    G.pullVec = {x:0,y:0};
  }
}

function onPointerMove(e) {
  if(!G.dragging || G.screen !== 'game') return;
  const p = getPos(e);
  let dx = p.x - slingX;
  let dy = p.y - slingY;
  // Clamp pull
  const dist = Math.sqrt(dx*dx+dy*dy);
  if(dist > C.MAX_PULL) {
    dx = dx/dist*C.MAX_PULL;
    dy = dy/dist*C.MAX_PULL;
  }
  // Only allow pulling down-ish (behind the sling)
  G.pullVec = {x: dx, y: Math.max(dy, -C.MAX_PULL)};
}

function onPointerUp(e) {
  if(!G.dragging) return;
  G.dragging = false;
  pointerDown = false;
  if(G.screen === 'game' && !G.launched) {
    launchBall();
    G.pullVec = {x:0,y:0};
  }
}

canvas.addEventListener('mousedown', onPointerDown);
canvas.addEventListener('mousemove', onPointerMove);
canvas.addEventListener('mouseup', onPointerUp);
canvas.addEventListener('touchstart', e=>{e.preventDefault();onPointerDown(e);}, {passive:false});
canvas.addEventListener('touchmove',  e=>{e.preventDefault();onPointerMove(e);},  {passive:false});
canvas.addEventListener('touchend',   e=>{e.preventDefault();onPointerUp(e);},   {passive:false});

// ============================================================
document.getElementById('btn-play').addEventListener('click', ()=>startLevel(G.level||0));
document.getElementById('btn-levels').addEventListener('click', ()=>showScreen('levels'));
document.getElementById('btn-back-title').addEventListener('click', ()=>showScreen('title'));

  document.getElementById('pause-overlay').classList.add('active');
});
document.getElementById('btn-resume').addEventListener('click', ()=>{
  G.paused = false;
  document.getElementById('pause-overlay').classList.remove('active');
});
document.getElementById('btn-restart').addEventListener('click', ()=>{
  G.paused = false;
  document.getElementById('pause-overlay').classList.remove('active');
  startLevel(G.level);
});
document.getElementById('btn-quit').addEventListener('click', ()=>{
  G.paused = false;

  showScreen('title');
});
document.getElementById('btn-retry').addEventListener('click', ()=>startLevel(G.level));
document.getElementById('btn-next').addEventListener('click', ()=>{
  if(G.level+1 < 10 && G.level+1 < progress.unlocked) startLevel(G.level+1);
  else showScreen('levels');
});
document.getElementById('btn-to-levels').addEventListener('click', ()=>showScreen('levels'));

// Title screen tap anywhere to play
document.getElementById('screen-title').addEventListener('click', (e)=>{
  if(e.target.closest('button')) return;
  startLevel(0);
});

// ============================================================
// HELPER: shade color
// ============================================================
function shadeColor(hex, pct) {
  const n = parseInt(hex.slice(1),16);
  const r = Math.max(0,Math.min(255,((n>>16)&0xff)+pct));
  const g = Math.max(0,Math.min(255,((n>>8)&0xff)+pct));
  const b = Math.max(0,Math.min(255,(n&0xff)+pct));
  return `rgb(${r},${g},${b})`;
}

// ============================================================
// ACTIVE BALL DRAWING
// ============================================================
function drawActiveBall() {
  if(!G.activeBall) return;
  const b = G.activeBall.body;
  const pos = b.position;
  drawBall(pos.x, pos.y, C.BALL_RADIUS, G.activeBall.type, activeBallTrail);
}

// ============================================================
// MAIN GAME LOOP
// ============================================================
let lastTime = 0;
let gameTime = 0;

function gameLoop(ts) {
  requestAnimationFrame(gameLoop);
  const dt = Math.min(ts - lastTime, 50);
  lastTime = ts;
  gameTime = ts * 0.001;

  const t = gameTime;

  // Shake offset
  let sx = 0, sy = 0;
  if(G.screenShake > 0) {
    sx = (Math.random()-.5)*G.screenShake;
    sy = (Math.random()-.5)*G.screenShake;
    G.screenShake *= 0.8;
    if(G.screenShake < 0.3) G.screenShake = 0;
  }

  ctx.save();
  if(sx || sy) ctx.translate(sx, sy);

  drawBackground(t);

  if(G.screen === 'title') {
    drawTitleAnimation(t);
  } else if(G.screen === 'game' && !G.paused) {
    // Physics step
    Engine.update(engine, 16.67);
    updateBallPhysics();
    updateWindmills();
    updateMovers();
    updateParticles();

    // Combo timer
    if(G.comboTimer > 0) {
      G.comboTimer--;
      if(G.comboTimer === 0) {
        G.combo = 0;
        document.getElementById('hud-combo').textContent = '';
      }
    }

    // Powerup timer
    if(G.powerupTimer > 0) {
      G.powerupTimer--;
      if(G.powerupTimer === 0) {
        G.powerup = null;
        document.getElementById('hud-powerup').style.display = 'none';
      }
    }

    drawRings(t);
    drawObstacles(t);
    drawPowerups(t);
    drawSlingshot(t);
    drawTrajectory();
    drawIdleBall(t);
    drawActiveBall();
    drawParticles();

    // Wind particles
    if(G.wind !== 0) drawWindParticles(t);

  } else if(G.screen === 'game' && G.paused) {
    // Draw frozen frame
    drawRings(t);
    drawObstacles(t);
    drawSlingshot(t);
  }

  ctx.restore();

  G.frameCount++;
}

// ============================================================
// TITLE ANIMATION
// ============================================================
const TITLE_BALLS = [
  {x:0.3, y:0.65, vx:1.8, vy:-3.5, type:'standard'},
  {x:0.7, y:0.72, vx:-1.4, vy:-4.0, type:'bouncy'},
  {x:0.5, y:0.78, vx:0.8, vy:-3.2, type:'heavy'},
];
function drawTitleAnimation(t) {
  for(const b of TITLE_BALLS) {
    b.x += b.vx*0.001; b.y += b.vy*0.001 + 0.002;
    if(b.x < 0.05 || b.x > 0.95) b.vx *= -1;
    if(b.y < 0.55 || b.y > 0.9) b.vy *= -1;
    drawBall(b.x*W, b.y*H, 16, b.type, []);
  }
}

// ============================================================
// WIND PARTICLES
// ============================================================
const windParts = Array.from({length:30},()=>({
  x:Math.random(), y:Math.random()*0.6+0.1,
  life:Math.random()
}));
function drawWindParticles(t) {
  for(const wp of windParts) {
    wp.x += G.wind * 0.003;
    wp.life += 0.012;
    if(wp.x > 1.05) wp.x = -0.05;
    if(wp.x < -0.05) wp.x = 1.05;
    if(wp.life > 1) { wp.life=0; wp.x=Math.random(); wp.y=Math.random()*0.6+0.1; }
    const alpha = Math.sin(wp.life*Math.PI)*0.25;
    ctx.beginPath();
    ctx.moveTo(wp.x*W, wp.y*H);
    ctx.lineTo(wp.x*W - G.wind*12, wp.y*H);
    ctx.strokeStyle = `rgba(100,200,255,${alpha})`;
    ctx.lineWidth = 1;
    ctx.stroke();
  }
}

// ============================================================
// INIT
// ============================================================
function init() {
  resize();
  initEngine();

  // Title ball animation area
  const tba = document.getElementById('title-ball-anim');
  for(const [type, bt] of Object.entries(BALL_TYPES)) {
    const btn = document.createElement('div');
    btn.className = 'ball-type-btn';
    const dot = document.createElement('div');
    dot.className = 'ball-type-dot';
    dot.style.background = bt.color;
    dot.style.boxShadow = `0 0 8px ${bt.glow}`;
    btn.appendChild(dot);
    btn.appendChild(document.createTextNode(bt.label));
    btn.style.color = bt.color;
    btn.style.borderColor = bt.color;
    tba.appendChild(btn);
  }

  requestAnimationFrame(gameLoop);
}

init();
</script>
