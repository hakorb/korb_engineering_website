<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>¡Aprende! – Learn Spanish</title>
<style>
/* ============================================================
   APRENDE! – Spanish Learning App
   Duolingo-inspired design with custom flair
   ============================================================ */

*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --green:      #58CC02;
  --green-dk:   #45A800;
  --green-lt:   #D7FFB8;
  --blue:       #1CB0F6;
  --blue-dk:    #0090D9;
  --blue-lt:    #DFF4FF;
  --red:        #FF4B4B;
  --red-lt:     #FFE0E0;
  --yellow:     #FFC800;
  --orange:     #FF9600;
  --purple:     #CE82FF;
  --purple-dk:  #9C52D0;
  --teal:       #2AC3A2;
  --navy:       #1F2D3D;
  --text:       #3C3C3C;
  --text-md:    #777777;
  --text-lt:    #AFAFAF;
  --border:     #E5E5E5;
  --border-md:  #CCCCCC;
  --bg:         #F2F2F2;
  --card:       #FFFFFF;
  --shadow:     0 4px 16px rgba(0,0,0,0.10);
  --shadow-sm:  0 2px 8px rgba(0,0,0,0.07);
  --shadow-lg:  0 8px 32px rgba(0,0,0,0.15);
  --r:          16px;
  --r-sm:       10px;
  --r-xs:       6px;
  --ease:       all 0.2s cubic-bezier(0.25, 0.46, 0.45, 0.94);
}

body {
  font-family: 'Trebuchet MS', 'Segoe UI', -apple-system, system-ui, sans-serif;
  background: var(--bg);
  color: var(--text);
  min-height: 100vh;
  -webkit-font-smoothing: antialiased;
  overscroll-behavior: none;
}

/* ===== SCREENS ===== */
.screen { display: none; flex-direction: column; min-height: 100vh; }
.screen.active { display: flex; }

/* ===== ANIMATIONS ===== */
@keyframes fadeUp   { from { opacity:0; transform:translateY(12px); } to { opacity:1; transform:translateY(0); } }
@keyframes fadeIn   { from { opacity:0; } to { opacity:1; } }
@keyframes popIn    { 0%{transform:scale(0.6);opacity:0} 70%{transform:scale(1.05)} 100%{transform:scale(1);opacity:1} }
@keyframes shake    { 0%,100%{transform:translateX(0)} 20%{transform:translateX(-8px)} 40%{transform:translateX(8px)} 60%{transform:translateX(-5px)} 80%{transform:translateX(5px)} }
@keyframes bounce   { 0%,100%{transform:scale(1)} 50%{transform:scale(1.1)} }
@keyframes pulse    { 0%,100%{opacity:1} 50%{opacity:0.5} }
@keyframes slideUp  { from{transform:translateY(100%)} to{transform:translateY(0)} }
@keyframes xpFloat  { 0%{transform:translateY(0) scale(1);opacity:1} 100%{transform:translateY(-60px) scale(0.8);opacity:0} }
@keyframes confetti { 0%{transform:translateY(-20px) rotate(0deg);opacity:1} 100%{transform:translateY(110vh) rotate(720deg);opacity:0} }
@keyframes heartPop { 0%{transform:scale(1)} 30%{transform:scale(1.4)} 60%{transform:scale(0.9)} 100%{transform:scale(1)} }
@keyframes streakFlame { 0%,100%{transform:scale(1) rotate(-3deg)} 50%{transform:scale(1.1) rotate(3deg)} }

.anim-fadeUp   { animation: fadeUp 0.35s ease both; }
.anim-popIn    { animation: popIn 0.4s cubic-bezier(0.34,1.56,0.64,1) both; }
.anim-shake    { animation: shake 0.4s ease; }
.anim-bounce   { animation: bounce 0.3s ease; }

/* ============================================================
   HOME SCREEN
   ============================================================ */
#home {
  background: linear-gradient(160deg, #58CC02 0%, #38B000 55%, #2D8F00 100%);
}

.home-hero {
  padding: 52px 24px 28px;
  text-align: center;
  color: #fff;
}

.home-bird {
  font-size: 56px;
  display: block;
  margin-bottom: 10px;
  filter: drop-shadow(0 4px 8px rgba(0,0,0,0.2));
  animation: streakFlame 3s ease-in-out infinite;
}

.home-logo-text {
  font-size: 34px;
  font-weight: 900;
  letter-spacing: -1px;
  text-shadow: 0 2px 4px rgba(0,0,0,0.15);
  margin-bottom: 4px;
}

.home-tagline {
  font-size: 15px;
  opacity: 0.88;
  font-weight: 500;
}

/* Stats row */
.home-stats {
  display: flex;
  justify-content: center;
  gap: 12px;
  padding: 0 20px 20px;
}

.stat-pill {
  background: rgba(255,255,255,0.22);
  border: 1.5px solid rgba(255,255,255,0.35);
  border-radius: 50px;
  padding: 12px 18px;
  text-align: center;
  color: #fff;
  flex: 1;
  max-width: 110px;
  backdrop-filter: blur(6px);
}

.stat-val  { font-size: 26px; font-weight: 900; line-height: 1; }
.stat-lbl  { font-size: 11px; font-weight: 700; opacity: 0.8; margin-top: 3px; text-transform: uppercase; letter-spacing: 0.5px; }

/* Hearts bar */
.home-hearts {
  display: flex;
  justify-content: center;
  align-items: center;
  gap: 6px;
  padding-bottom: 20px;
  color: #fff;
  font-size: 13px;
  font-weight: 700;
  opacity: 0.9;
}

.heart-icon { font-size: 22px; transition: var(--ease); }
.heart-icon.empty { filter: grayscale(1) opacity(0.35); }

/* Units panel */
.units-panel {
  background: var(--card);
  border-radius: 28px 28px 0 0;
  flex: 1;
  padding: 24px 20px 40px;
  overflow-y: auto;
}

.panel-title {
  font-size: 19px;
  font-weight: 800;
  color: var(--text);
  margin-bottom: 16px;
  display: flex;
  align-items: center;
  gap: 8px;
}

/* Unit Card */
.unit-card {
  background: var(--card);
  border: 2px solid var(--border);
  border-radius: var(--r);
  margin-bottom: 14px;
  overflow: hidden;
  box-shadow: var(--shadow-sm);
  transition: var(--ease);
}

.unit-card:hover { box-shadow: var(--shadow); transform: translateY(-1px); }

.unit-header {
  display: flex;
  align-items: center;
  gap: 14px;
  padding: 16px 18px;
  cursor: pointer;
  user-select: none;
}

.unit-icon {
  width: 52px; height: 52px;
  border-radius: 14px;
  display: flex; align-items: center; justify-content: center;
  font-size: 26px;
  flex-shrink: 0;
}

.unit-meta { flex: 1; }
.unit-name { font-size: 17px; font-weight: 800; margin-bottom: 2px; }
.unit-desc { font-size: 13px; color: var(--text-md); }

.unit-chevron {
  font-size: 12px; color: var(--text-lt);
  transition: transform 0.25s ease;
}
.unit-card.open .unit-chevron { transform: rotate(180deg); }

.unit-ring { width: 44px; height: 44px; flex-shrink: 0; }
.unit-ring svg { transform: rotate(-90deg); }
.ring-pct { font-size: 9px; font-weight: 800; }

/* Lessons */
.unit-lessons { display: none; border-top: 1.5px solid var(--border); padding: 10px 14px 14px; }
.unit-card.open .unit-lessons { display: block; animation: fadeUp 0.25s ease; }

.lesson-row {
  display: flex;
  align-items: center;
  gap: 12px;
  padding: 11px 12px;
  border-radius: var(--r-sm);
  cursor: pointer;
  transition: var(--ease);
  border: none;
  background: transparent;
  width: 100%;
  text-align: left;
  margin-bottom: 3px;
}

.lesson-row:hover { background: var(--bg); }
.lesson-row:disabled { cursor: not-allowed; opacity: 0.4; }

.lesson-dot {
  width: 42px; height: 42px;
  border-radius: 50%;
  background: var(--border);
  display: flex; align-items: center; justify-content: center;
  font-size: 20px;
  flex-shrink: 0;
  transition: var(--ease);
}
.lesson-dot.done   { background: var(--green); }
.lesson-dot.active { background: var(--blue); box-shadow: 0 0 0 3px var(--blue-lt); }

.lesson-label { font-size: 15px; font-weight: 700; color: var(--text); }
.lesson-sublabel { font-size: 12px; color: var(--text-md); margin-top: 1px; }

.tip-badge {
  display: inline-flex; align-items: center; gap: 3px;
  background: var(--purple); color: #fff;
  font-size: 10px; font-weight: 800;
  padding: 2px 7px; border-radius: 20px;
  margin-left: 6px; vertical-align: middle;
}

/* Color themes */
.theme-green .unit-icon { background: #EDFFD7; }
.theme-blue  .unit-icon { background: #E0F4FF; }
.theme-orange .unit-icon { background: #FFF3E0; }
.theme-purple .unit-icon { background: #F5EEFF; }
.theme-red   .unit-icon { background: #FFE8E8; }

/* ============================================================
   LESSON SCREEN
   ============================================================ */
#lesson {
  background: var(--card);
  position: fixed;
  inset: 0;
  z-index: 100;
  overflow-y: auto;
  overflow-x: hidden;
}

.lesson-bar {
  display: flex;
  align-items: center;
  gap: 12px;
  padding: 14px 18px 12px;
  position: sticky;
  top: 0;
  background: var(--card);
  z-index: 10;
  border-bottom: 1.5px solid var(--border);
}

.btn-x {
  background: var(--bg); border: none;
  width: 36px; height: 36px;
  border-radius: 50%;
  font-size: 16px; color: var(--text-md);
  cursor: pointer; display: flex; align-items: center; justify-content: center;
  transition: var(--ease); flex-shrink: 0;
}
.btn-x:hover { background: var(--border); color: var(--text); }

.progress-track {
  flex: 1; height: 16px;
  background: var(--border);
  border-radius: 8px;
  overflow: hidden;
}

.progress-fill {
  height: 100%;
  background: linear-gradient(90deg, var(--green), #7BE000);
  border-radius: 8px;
  transition: width 0.45s cubic-bezier(0.25, 0.46, 0.45, 0.94);
  position: relative;
}

.progress-fill::after {
  content: '';
  position: absolute;
  right: 0; top: 0; bottom: 0;
  width: 8px;
  background: rgba(255,255,255,0.4);
  border-radius: 0 8px 8px 0;
}

.bar-hearts { display: flex; gap: 3px; flex-shrink: 0; }
.bar-hearts .heart-icon { font-size: 19px; }

/* Q counter badge */
.q-counter {
  font-size: 12px; font-weight: 800;
  color: var(--text-md);
  background: var(--bg);
  padding: 4px 10px;
  border-radius: 20px;
  flex-shrink: 0;
}

/* Question area */
.q-area {
  padding: 24px 20px 100px;
  flex: 1;
  max-width: 600px;
  margin: 0 auto;
  width: 100%;
}

.q-type {
  font-size: 12px; font-weight: 800;
  text-transform: uppercase;
  letter-spacing: 0.7px;
  color: var(--text-md);
  margin-bottom: 8px;
}

.q-prompt {
  font-size: 22px; font-weight: 800;
  color: var(--text);
  line-height: 1.3;
  margin-bottom: 6px;
}

.q-sub {
  font-size: 14px; color: var(--text-md);
  margin-bottom: 22px;
  line-height: 1.5;
}

/* Speaker icon for Spanish prompts */
.q-with-speaker {
  display: flex; align-items: flex-start; gap: 12px;
  margin-bottom: 22px;
}

.speaker-btn {
  background: var(--blue-lt); border: 2px solid var(--blue);
  width: 48px; height: 48px; border-radius: 50%;
  font-size: 22px; cursor: default;
  display: flex; align-items: center; justify-content: center;
  flex-shrink: 0; margin-top: 4px;
}

/* Multiple choice */
.mc-grid {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 10px;
  margin-top: 6px;
}

@media (max-width: 360px) { .mc-grid { grid-template-columns: 1fr; } }

.mc-btn {
  background: var(--card);
  border: 2.5px solid var(--border);
  border-bottom: 4px solid #D8D8D8;
  border-radius: var(--r);
  padding: 16px 14px;
  font-size: 16px; font-weight: 700;
  color: var(--text); cursor: pointer;
  transition: var(--ease);
  text-align: center;
  min-height: 74px;
  display: flex; align-items: center; justify-content: center;
  line-height: 1.3;
  font-family: inherit;
}

.mc-btn:hover:not(:disabled) {
  border-color: var(--blue);
  border-bottom-color: var(--blue-dk);
  background: #F0F9FF;
  transform: translateY(-1px);
}

.mc-btn:active:not(:disabled) { transform: translateY(1px); border-bottom-width: 2px; }

.mc-btn.selected   { border-color: var(--blue); background: #E8F5FF; }
.mc-btn.correct    { border-color: var(--green); border-bottom-color: var(--green-dk); background: var(--green-lt); color: var(--green-dk); }
.mc-btn.wrong      { border-color: var(--red); border-bottom-color: #CC0000; background: var(--red-lt); color: var(--red); }
.mc-btn:disabled   { cursor: default; }

/* Translation input */
.translate-wrap {
  background: var(--bg);
  border: 2.5px solid var(--border-md);
  border-radius: var(--r);
  padding: 16px;
  margin-bottom: 16px;
  transition: var(--ease);
}

.translate-wrap:focus-within { border-color: var(--blue); background: #F8FDFF; }
.translate-wrap.correct-wrap { border-color: var(--green); background: var(--green-lt); }
.translate-wrap.wrong-wrap   { border-color: var(--red);   background: var(--red-lt);   }

.translate-input {
  width: 100%; border: none; background: transparent;
  font-size: 19px; font-weight: 700;
  color: var(--text); outline: none;
  resize: none; min-height: 70px;
  font-family: inherit;
}

.translate-hint {
  font-size: 12px; color: var(--text-lt); margin-top: 6px;
}

/* Word bank */
.wb-answer-area {
  min-height: 58px;
  border-bottom: 2.5px solid var(--border-md);
  display: flex; flex-wrap: wrap;
  gap: 8px; padding: 4px 0 14px;
  margin-bottom: 20px;
  align-items: flex-start; align-content: flex-start;
  transition: border-color 0.2s ease;
}

.wb-answer-area.has-words { border-color: var(--navy); }

.word-chip {
  background: var(--card);
  border: 2px solid var(--border-md);
  border-bottom: 3px solid #C0C0C0;
  border-radius: var(--r-sm);
  padding: 9px 14px;
  font-size: 15px; font-weight: 700;
  color: var(--text); cursor: pointer;
  transition: var(--ease);
  user-select: none;
  font-family: inherit;
}

.word-chip:hover  { border-color: var(--blue); border-bottom-color: var(--blue-dk); background: #F0F9FF; transform: translateY(-1px); }
.word-chip.placed { background: #E8F4FF; border-color: var(--blue); border-bottom-color: var(--blue-dk); }
.word-chip.ghost  { opacity: 0; pointer-events: none; }

.wb-pool {
  display: flex; flex-wrap: wrap; gap: 8px; margin-top: 4px;
}

.wb-separator {
  width: 100%; height: 1px;
  background: var(--border);
  margin: 16px 0;
}

/* Fill blank */
.fb-sentence {
  font-size: 22px; font-weight: 700;
  line-height: 1.8;
  margin-bottom: 24px;
  display: flex; flex-wrap: wrap; align-items: center; gap: 6px;
}

.blank-field {
  border: none;
  border-bottom: 3px solid var(--blue);
  background: transparent;
  font-size: 22px; font-weight: 700;
  color: var(--text); outline: none;
  min-width: 100px; text-align: center;
  font-family: inherit; padding: 2px 6px;
  transition: border-color 0.2s ease;
}

.blank-field.correct-field { border-color: var(--green); color: var(--green-dk); }
.blank-field.wrong-field   { border-color: var(--red);   color: var(--red);      }

/* Match pairs */
.match-wrap {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 10px;
}

.match-col { display: flex; flex-direction: column; gap: 8px; }

.match-tile {
  padding: 14px 12px;
  border: 2.5px solid var(--border);
  border-bottom: 4px solid #D8D8D8;
  border-radius: var(--r-sm);
  font-size: 14px; font-weight: 700;
  text-align: center; cursor: pointer;
  transition: var(--ease);
  background: var(--card);
  min-height: 54px;
  display: flex; align-items: center; justify-content: center;
  line-height: 1.3;
  user-select: none;
}

.match-tile:hover:not(.matched):not(:disabled) { border-color: var(--blue); background: #F0F9FF; transform: translateY(-1px); }
.match-tile.sel     { border-color: var(--blue); border-bottom-color: var(--blue-dk); background: #E8F5FF; }
.match-tile.matched { border-color: var(--green); border-bottom-color: var(--green-dk); background: var(--green-lt); color: var(--green-dk); pointer-events: none; cursor: default; }
.match-tile.bad     { border-color: var(--red); background: var(--red-lt); }

/* Check button */
.btn-check {
  display: block; width: 100%;
  padding: 16px;
  border: none;
  border-bottom: 4px solid var(--green-dk);
  border-radius: var(--r);
  font-size: 17px; font-weight: 900;
  letter-spacing: 0.5px;
  background: var(--green); color: #fff;
  cursor: pointer; transition: var(--ease);
  margin-top: 18px;
  font-family: inherit;
}

.btn-check:hover:not(:disabled) { background: #62D500; transform: translateY(-1px); }
.btn-check:active:not(:disabled){ transform: translateY(2px); border-bottom-width: 1px; }
.btn-check:disabled {
  background: var(--border); color: var(--text-lt);
  border-bottom-color: #C8C8C8;
  cursor: not-allowed; transform: none;
}

/* ===== FEEDBACK PANEL ===== */
.feedback {
  position: fixed;
  bottom: 0; left: 0; right: 0;
  padding: 20px 20px 28px;
  background: var(--card);
  border-top: 2px solid var(--border);
  transform: translateY(110%);
  transition: transform 0.3s cubic-bezier(0.25, 0.46, 0.45, 0.94);
  z-index: 50;
}

.feedback.show { transform: translateY(0); }
.feedback.correct-fb { background: var(--green-lt); border-color: var(--green); }
.feedback.wrong-fb   { background: var(--red-lt);   border-color: var(--red);   }

.fb-row { display: flex; align-items: flex-start; gap: 12px; margin-bottom: 12px; }
.fb-icon { font-size: 30px; flex-shrink: 0; }
.fb-head { font-size: 18px; font-weight: 900; margin-bottom: 2px; }
.fb-head.green-head { color: var(--green-dk); }
.fb-head.red-head   { color: var(--red); }
.fb-ans  { font-size: 14px; color: var(--text-md); line-height: 1.5; }

.btn-cont {
  display: block; width: 100%;
  padding: 15px;
  border: none; border-radius: var(--r);
  font-size: 17px; font-weight: 900;
  letter-spacing: 0.4px; cursor: pointer;
  transition: var(--ease);
  font-family: inherit;
}

.btn-cont.green-btn { background: var(--green); color: #fff; border-bottom: 4px solid var(--green-dk); }
.btn-cont.green-btn:hover { background: #62D500; transform: translateY(-1px); }
.btn-cont.red-btn   { background: var(--red);   color: #fff; border-bottom: 4px solid #CC0000; }
.btn-cont.red-btn:hover { background: #FF6060; transform: translateY(-1px); }

/* ============================================================
   GRAMMAR TIP SCREEN
   ============================================================ */
#grammar-tip {
  background: linear-gradient(135deg, #6C5CE7 0%, #A855F7 100%);
  align-items: center;
  justify-content: center;
  padding: 24px;
}

.tip-card {
  background: var(--card);
  border-radius: 24px;
  padding: 32px 26px;
  max-width: 500px;
  width: 100%;
  box-shadow: var(--shadow-lg);
  animation: popIn 0.4s cubic-bezier(0.34, 1.56, 0.64, 1) both;
}

.tip-emoji  { font-size: 52px; text-align: center; margin-bottom: 14px; display: block; }
.tip-title  { font-size: 22px; font-weight: 900; margin-bottom: 10px; color: var(--text); }
.tip-body   { font-size: 15px; color: var(--text-md); line-height: 1.7; margin-bottom: 18px; }

.tip-examples {
  background: var(--bg); border-radius: var(--r-sm);
  padding: 16px; margin-bottom: 22px;
}

.tip-ex { margin-bottom: 12px; }
.tip-ex:last-child { margin-bottom: 0; }
.tip-es { font-weight: 800; color: var(--green-dk); font-size: 15px; margin-bottom: 2px; }
.tip-en { font-size: 13px; color: var(--text-md); }

.btn-got-it {
  display: block; width: 100%;
  padding: 15px; border: none;
  border-bottom: 4px solid var(--purple-dk);
  border-radius: var(--r);
  background: var(--purple); color: #fff;
  font-size: 17px; font-weight: 900;
  cursor: pointer; transition: var(--ease);
  font-family: inherit;
}
.btn-got-it:hover { background: #D996FF; transform: translateY(-1px); }

/* ============================================================
   COMPLETION SCREEN
   ============================================================ */
#complete {
  background: linear-gradient(160deg, #58CC02 0%, #38B000 60%, #2D6A00 100%);
  align-items: center;
  justify-content: center;
  padding: 24px;
}

.complete-card {
  background: var(--card);
  border-radius: 28px;
  padding: 40px 28px 32px;
  max-width: 420px; width: 100%;
  text-align: center;
  box-shadow: var(--shadow-lg);
  animation: popIn 0.5s cubic-bezier(0.34, 1.56, 0.64, 1) both;
}

.trophy         { font-size: 76px; margin-bottom: 12px; display: block; animation: bounce 0.5s ease 0.3s both; }
.complete-title { font-size: 30px; font-weight: 900; color: var(--text); margin-bottom: 6px; }
.complete-sub   { font-size: 15px; color: var(--text-md); margin-bottom: 28px; }

.complete-stats {
  display: grid;
  grid-template-columns: 1fr 1fr 1fr;
  gap: 12px;
  margin-bottom: 28px;
}

.cs { background: var(--bg); border-radius: var(--r-sm); padding: 16px 8px; }
.cs-val { font-size: 24px; font-weight: 900; }
.cs-lbl { font-size: 12px; color: var(--text-md); margin-top: 3px; }
.xp-val  { color: var(--yellow); }
.acc-val { color: var(--green-dk); }
.t-val   { color: var(--blue-dk); }

.btn-finish {
  display: block; width: 100%;
  padding: 16px; border: none;
  border-bottom: 4px solid var(--green-dk);
  border-radius: var(--r);

/* ============================================================
   STATE
   ============================================================ */
let S = {
  xp: 0,
  streak: 0,
  lastDate: null,
  hearts: 3,
  maxHearts: 3,
  done: {}  // { lessonId: true }
};

let SES = {  // current session
  unitIdx:0, lessonIdx:0,
  qs:[], cur:0, correct:0,
  startMs: 0
};

// Match sub-state
let MS = { selL:null, selR:null, matched:new Set(), total:0 };
// Word-bank sub-state
let WBS = { answer:[], pool:[] };
// Pending grammar tip callback
let tipCB = null;

/* ============================================================
   PERSISTENCE
   ============================================================ */
function saveS() {
  try { localStorage.setItem('aprende_v2', JSON.stringify(S)); } catch(e){}
}

function loadS() {
  try {
    const raw = localStorage.getItem('aprende_v2');
    if (raw) Object.assign(S, JSON.parse(raw));
    // Streak check
    if (S.lastDate) {
      const diff = Math.floor((new Date() - new Date(S.lastDate)) / 86400000);
      if (diff > 1) { S.streak = 0; saveS(); }
    }
  } catch(e){}
}

function markToday() {
  const today = new Date().toDateString();
  if (S.lastDate !== today) {
    if (S.lastDate) {
      const diff = Math.floor((new Date() - new Date(S.lastDate)) / 86400000);
      S.streak = diff === 1 ? S.streak + 1 : 1;
    } else {
      S.streak = 1;
    }
    S.lastDate = today;
    saveS();
  }
}

/* ============================================================
   UTILITIES
   ============================================================ */
function shuffle(a) {
  const b = [...a];
  for (let i = b.length-1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i+1));
    [b[i], b[j]] = [b[j], b[i]];
  }
  return b;
}

function norm(s) {
  return String(s).toLowerCase()
    .normalize('NFD').replace(/[\u0300-\u036f]/g, '')
    .replace(/[¡!¿?.,"]/g, '').trim();
}

function show(id) {
  document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
  document.getElementById(id).classList.add('active');
}

function qs(sel, ctx) { return (ctx||document).querySelector(sel); }
function qsa(sel, ctx){ return (ctx||document).querySelectorAll(sel); }

/* ============================================================
   HOME RENDER
   ============================================================ */
function renderHome() {
  qs('#s-streak').textContent = S.streak;
  qs('#s-xp').textContent     = S.xp;
  const totalL = UNITS.reduce((a,u)=>a+u.lessons.length,0);
  const doneL  = Object.keys(S.done).length;
  qs('#s-done').textContent = `${doneL}/${totalL}`;
  renderHeartsHome();
  renderUnits();
}

function renderHeartsHome() {
  for (let i=1; i<=3; i++) {
    const el = document.getElementById('h'+i);
    if (el) el.classList.toggle('empty', i > S.hearts);
  }
}

function renderUnits() {
  const list = qs('#units-list');
  list.innerHTML = '';
  UNITS.forEach((unit, ui) => {
    const doneInUnit = unit.lessons.filter(l => S.done[l.id]).length;
    const pct = Math.round((doneInUnit / unit.lessons.length) * 100);
    const circ = 2 * Math.PI * 17; // r=17 → circumference≈106.8

    const card = document.createElement('div');
    card.className = `unit-card theme-${unit.theme}`;
    card.dataset.ui = ui;
    card.innerHTML = `
      <div class="unit-header">
        <div class="unit-icon">${unit.icon}</div>
        <div class="unit-meta">
          <div class="unit-name">${unit.name}</div>
          <div class="unit-desc">${unit.desc}</div>
        </div>
        <svg class="unit-ring" viewBox="0 0 44 44" xmlns="http://www.w3.org/2000/svg">
          <circle cx="22" cy="22" r="17" fill="none" stroke="#E5E5E5" stroke-width="4"/>
          <circle cx="22" cy="22" r="17" fill="none" stroke="${unit.color}" stroke-width="4"
            stroke-dasharray="${(pct/100*circ).toFixed(1)} ${circ.toFixed(1)}"
            stroke-linecap="round"/>
          <text x="22" y="26" text-anchor="middle" font-size="9" font-weight="800"
            fill="${unit.color}" transform-origin="22 22">${pct}%</text>
        </svg>
        <span class="unit-chevron">▼</span>
      </div>
      <div class="unit-lessons">
        ${unit.lessons.map((lesson, li) => {
          const done   = S.done[lesson.id];
          const locked = li > 0 && !S.done[unit.lessons[li-1].id];
          const dotCls = done ? 'done' : (!locked ? 'active' : '');
          const hasTip = li === 1; // grammar tip before lesson 2
          return `
            <button class="lesson-row" data-ui="${ui}" data-li="${li}" ${locked?'disabled':''}>
              <div class="lesson-dot ${dotCls}">${lesson.icon}</div>
              <div>
                <div class="lesson-label">${lesson.name}${hasTip&&!done?'<span class="tip-badge">💡 Tip</span>':''}${done?' ✅':''}</div>
                <div class="lesson-sublabel">${done?'Completed':locked?'Complete previous lesson':''+lesson.questions.length+' questions'}</div>
              </div>
            </button>`;
        }).join('')}
      </div>`;
    list.appendChild(card);

    // Toggle expand
    card.querySelector('.unit-header').addEventListener('click', () => card.classList.toggle('open'));

    // Lesson buttons
    card.querySelectorAll('.lesson-row:not([disabled])').forEach(btn => {
      btn.addEventListener('click', (e) => {
        e.stopPropagation();
        const ui2 = parseInt(btn.dataset.ui);
        const li2 = parseInt(btn.dataset.li);
        launchLesson(ui2, li2);
      });
    });

    // Auto-open first incomplete unit
    if (doneInUnit < unit.lessons.length && !list.querySelector('.unit-card.open')) {
      card.classList.add('open');
    }
  });
}

/* ============================================================
   LESSON LAUNCH
   ============================================================ */
function launchLesson(ui, li) {
  const unit   = UNITS[ui];
  const lesson = unit.lessons[li];

  // Show grammar tip before lesson index 1
  if (li === 1 && !S.done[unit.id + '_tip']) {
    tipCB = () => {
      S.done[unit.id + '_tip'] = true; // mark tip seen
      saveS();
      beginLesson(ui, li);
    };
    renderTip(unit.grammarTip);
    show('grammar-tip');
    return;
  }

  beginLesson(ui, li);
}

function beginLesson(ui, li) {
  const unit   = UNITS[ui];
  const lesson = unit.lessons[li];

  SES = {
    unitIdx: ui, lessonIdx: li,
    qs: lesson.questions,
    cur: 0, correct: 0,
    startMs: Date.now()
  };

  show('lesson');
  renderQ();
}

/* ============================================================
   QUESTION RENDERER
   ============================================================ */
function renderQ() {
  const q    = SES.qs[SES.cur];
  const pct  = (SES.cur / SES.qs.length) * 100;
  qs('#prog-fill').style.width = pct + '%';
  qs('#q-counter').textContent = `${SES.cur+1}/${SES.qs.length}`;
  renderBarHearts();
  hideFeedback();

  const area = qs('#q-area');
  area.innerHTML = '';

  if      (q.type === 'mc') renderMC(q, area);
  else if (q.type === 'wb') renderWB(q, area);
  else if (q.type === 'fb') renderFB(q, area);
  else if (q.type === 'tr') renderTR(q, area);
  else if (q.type === 'mp') renderMP(q, area);
}

function renderBarHearts() {
  const c = qs('#bar-hearts');
  c.innerHTML = Array.from({length: S.maxHearts}, (_,i) =>
    `<span class="heart-icon ${i<S.hearts?'':'empty'}">❤️</span>`
  ).join('');
}

/* ── Multiple Choice ── */
function renderMC(q, area) {
  area.innerHTML = `
    <div class="q-type">${q.typeLabel}</div>
    <div class="q-prompt">${q.prompt}</div>
    ${q.sub ? `<div class="q-sub">${q.sub}</div>` : ''}
    <div class="mc-grid" id="mc-grid"></div>`;

  const grid = area.querySelector('#mc-grid');
  q.options.forEach(opt => {
    const btn = document.createElement('button');
    btn.className = 'mc-btn';
    btn.textContent = opt;
    btn.addEventListener('click', () => {
      if (btn.disabled) return;
      qsa('.mc-btn', grid).forEach(b => b.disabled = true);
      const correct = opt === q.correct;
      btn.classList.add(correct ? 'correct' : 'wrong');
      if (!correct) {
        qsa('.mc-btn', grid).forEach(b => {
          if (b.textContent === q.correct) b.classList.add('correct');
        });
        btn.classList.add('anim-shake');
        btn.addEventListener('animationend', () => btn.classList.remove('anim-shake'), {once:true});
      } else {
        btn.classList.add('anim-bounce');
      }
      handleAnswer(correct, q.correct);
    });
    grid.appendChild(btn);
  });
}

/* ── Word Bank ── */
function renderWB(q, area) {
  WBS = { answer: [], pool: q.words.map((w,i) => ({w, i, used:false})) };

  area.innerHTML = `
    <div class="q-type">${q.typeLabel}</div>
    <div class="q-prompt">${q.prompt}</div>
    <div class="wb-answer-area" id="wb-ans"></div>
    <div class="wb-separator"></div>
    <div class="wb-pool" id="wb-pool"></div>
    <button class="btn-check" id="btn-check" disabled>CHECK</button>`;

  rebuildWB();
  area.querySelector('#btn-check').addEventListener('click', () => {
    const answer = WBS.answer.map(i=>i.w).join(' ');
    const ok = norm(answer) === norm(q.correct);
    area.querySelector('#btn-check').disabled = true;
    // freeze chips
    qsa('.word-chip', area).forEach(c => c.style.pointerEvents = 'none');
    handleAnswer(ok, q.correct);
  });
}

function rebuildWB() {
  const ansEl  = qs('#wb-ans');
  const poolEl = qs('#wb-pool');
  if (!ansEl || !poolEl) return;

  ansEl.innerHTML  = '';
  poolEl.innerHTML = '';

  ansEl.classList.toggle('has-words', WBS.answer.length > 0);

  WBS.answer.forEach((item, ai) => {
    const chip = document.createElement('div');
    chip.className = 'word-chip placed';
    chip.textContent = item.w;
    chip.addEventListener('click', () => {
      WBS.pool[item.i].used = false;
      WBS.answer.splice(ai, 1);
      rebuildWB();
      const bc = qs('#btn-check');
      if (bc) bc.disabled = WBS.answer.length === 0;
    });
    ansEl.appendChild(chip);
  });

  WBS.pool.forEach((item, pi) => {
    const chip = document.createElement('div');
    chip.className = 'word-chip' + (item.used ? ' ghost' : '');
    chip.textContent = item.w;
    if (!item.used) {
      chip.addEventListener('click', () => {
        WBS.pool[pi].used = true;
        WBS.answer.push(item);
        rebuildWB();
        const bc = qs('#btn-check');
        if (bc) bc.disabled = WBS.answer.length === 0;
      });
    }
    poolEl.appendChild(chip);
  });
}

/* ── Fill Blank ── */
function renderFB(q, area) {
  area.innerHTML = `
    <div class="q-type">${q.typeLabel}</div>
    <div class="fb-sentence">
      ${q.before ? `<span>${q.before}</span>` : ''}
      <input class="blank-field" id="blank-inp" type="text" autocomplete="off"
        autocorrect="off" spellcheck="false"
        placeholder="___" size="${Math.max(q.correct.length+2, 6)}">
      ${q.after ? `<span>${q.after}</span>` : ''}
    </div>
    <button class="btn-check" id="btn-check" disabled>CHECK</button>`;

  const inp = area.querySelector('#blank-inp');
  const bc  = area.querySelector('#btn-check');
  inp.focus();
  inp.addEventListener('input', () => { bc.disabled = !inp.value.trim(); });
  inp.addEventListener('keydown', e => { if (e.key==='Enter' && !bc.disabled) bc.click(); });
  bc.addEventListener('click', () => {
    const ok = norm(inp.value) === norm(q.correct) || q.alts.some(a => norm(inp.value)===norm(a));
    inp.disabled = true; bc.disabled = true;
    inp.classList.add(ok ? 'correct-field' : 'wrong-field');
    if (!ok) {
      const sent = area.querySelector('.fb-sentence');
      sent.classList.add('anim-shake');
      sent.addEventListener('animationend', ()=>sent.classList.remove('anim-shake'), {once:true});
    }
    handleAnswer(ok, q.correct);
  });
}

/* ── Translation (typed) ── */
function renderTR(q, area) {
  area.innerHTML = `
    <div class="q-type">${q.typeLabel}</div>
    <div class="q-prompt">${q.prompt}</div>
    ${q.hint ? `<div class="q-sub">💡 ${q.hint}</div>` : ''}
    <div class="translate-wrap" id="tw">
      <textarea class="translate-input" id="tr-inp" placeholder="Type your answer…" rows="3"></textarea>
      <div class="translate-hint">Press Enter to check</div>
    </div>
    <button class="btn-check" id="btn-check" disabled>CHECK</button>`;

  const inp = area.querySelector('#tr-inp');
  const bc  = area.querySelector('#btn-check');
  inp.focus();
  inp.addEventListener('input', () => { bc.disabled = !inp.value.trim(); });
  inp.addEventListener('keydown', e => {
    if (e.key==='Enter' && !e.shiftKey) { e.preventDefault(); if (!bc.disabled) bc.click(); }
  });
  bc.addEventListener('click', () => {
    const ok = norm(inp.value) === norm(q.correct);
    inp.disabled = true; bc.disabled = true;
    const tw = area.querySelector('#tw');
    tw.classList.add(ok ? 'correct-wrap' : 'wrong-wrap');
    handleAnswer(ok, q.correct);
  });
}

/* ── Match Pairs ── */
function renderMP(q, area) {
  const rightShuffled = shuffle([...q.pairs]);
  MS = { selL:null, selR:null, matched:new Set(), total:q.pairs.length };

  area.innerHTML = `
    <div class="q-type">${q.typeLabel}</div>
    <div class="match-wrap">
      <div class="match-col" id="mcol-l">
        ${q.pairs.map((p,i)=>`<div class="match-tile" id="ml${i}" data-idx="${i}" data-es="${p.es}">${p.es}</div>`).join('')}
      </div>
      <div class="match-col" id="mcol-r">
        ${rightShuffled.map((p,i)=>`<div class="match-tile" id="mr${i}" data-idx="${i}" data-es="${p.es}" data-en="${p.en}">${p.en}</div>`).join('')}
      </div>
    </div>`;

  qsa('#mcol-l .match-tile', area).forEach(tile => {
    tile.addEventListener('click', () => {
      if (tile.classList.contains('matched')) return;
      qsa('#mcol-l .match-tile').forEach(t=>t.classList.remove('sel'));
      MS.selL = { idx: parseInt(tile.dataset.idx), es: tile.dataset.es, el: tile };
      tile.classList.add('sel');
      if (MS.selR) resolveMatch();
    });
  });

  qsa('#mcol-r .match-tile', area).forEach(tile => {
    tile.addEventListener('click', () => {
      if (tile.classList.contains('matched')) return;
      qsa('#mcol-r .match-tile').forEach(t=>t.classList.remove('sel'));
      MS.selR = { idx: parseInt(tile.dataset.idx), es: tile.dataset.es, en: tile.dataset.en, el: tile };
      tile.classList.add('sel');
      if (MS.selL) resolveMatch();
    });
  });
}

function resolveMatch() {
  const L = MS.selL, R = MS.selR;
  const ok = L.es === R.es;

  if (ok) {
    L.el.classList.remove('sel'); L.el.classList.add('matched');
    R.el.classList.remove('sel'); R.el.classList.add('matched');
    MS.matched.add(L.idx);
    if (MS.matched.size === MS.total) {
      setTimeout(() => handleAnswer(true, ''), 300);
    }
  } else {
    L.el.classList.add('bad'); R.el.classList.add('bad');
    setTimeout(() => {
      L.el.classList.remove('bad','sel');
      R.el.classList.remove('bad','sel');
    }, 600);
  }
  MS.selL = null; MS.selR = null;
}

/* ============================================================
   ANSWER HANDLING
   ============================================================ */
function handleAnswer(ok, correct) {
  if (ok) {
    SES.correct++;
    showFeedback(true, '');
    spawnXP();
  } else {
    loseHeart();
    showFeedback(false, correct);
  }
}

function loseHeart() {
  if (S.hearts > 0) {
    S.hearts--;
    saveS();
    renderBarHearts();
    renderHeartsHome();
  }
}

function showFeedback(ok, correct) {
  const fb     = qs('#feedback');
  const icon   = qs('#fb-icon');
  const head   = qs('#fb-head');
  const ans    = qs('#fb-ans');
  const btn    = qs('#btn-cont');

  fb.className = 'feedback show ' + (ok ? 'correct-fb' : 'wrong-fb');

  if (ok) {
    const cheers = ['¡Correcto! 🎉','¡Muy bien! ⭐','¡Excelente! 🌟','¡Perfecto! 🏆','¡Increíble! 🔥','¡Fenomenal! 💫'];
    icon.textContent = '✅';
    head.textContent = cheers[Math.floor(Math.random()*cheers.length)];
    head.className = 'fb-head green-head';
    ans.textContent = '';
    btn.className = 'btn-cont green-btn';
    btn.textContent = 'CONTINUE';
  } else {
    icon.textContent = '❌';
    head.textContent = 'Incorrect';
    head.className = 'fb-head red-head';
    ans.textContent = correct ? `Correct answer: ${correct}` : '';
    btn.className = 'btn-cont red-btn';
    btn.textContent = 'GOT IT';
  }
}

function hideFeedback() {
  qs('#feedback').className = 'feedback';
}

/* ============================================================
   GRAMMAR TIP SCREEN
   ============================================================ */
function renderTip(tip) {
  qs('#tip-emoji').textContent = tip.emoji;
  qs('#tip-title').textContent = tip.title;
  qs('#tip-body').textContent  = tip.body;
  qs('#tip-examples').innerHTML = tip.examples.map(ex =>
    `<div class="tip-ex"><div class="tip-es">${ex.es}</div><div class="tip-en">${ex.en}</div></div>`
  ).join('');
}

/* ============================================================
   COMPLETION
   ============================================================ */
function completeLesson() {
  const elapsed = Math.round((Date.now() - SES.startMs) / 1000);
  const acc     = Math.round((SES.correct / SES.qs.length) * 100);
  const perfect = S.hearts === S.maxHearts;
  const xpBase  = SES.correct * 10;
  const xpBonus = perfect ? 20 : 0;
  const xpTotal = xpBase + xpBonus;

  const lesson = UNITS[SES.unitIdx].lessons[SES.lessonIdx];
  S.done[lesson.id] = true;
  S.xp += xpTotal;
  if (S.hearts < S.maxHearts) S.hearts = Math.min(S.maxHearts, S.hearts + 1);
  markToday();
  saveS();

  const mins = Math.floor(elapsed/60), secs = elapsed%60;
  qs('#c-sub').textContent  = `${lesson.name} complete!`;
  qs('#c-xp').textContent   = `+${xpTotal}`;
  qs('#c-acc').textContent  = `${acc}%`;
  qs('#c-time').textContent = mins>0 ? `${mins}m${secs}s` : `${secs}s`;

  show('complete');
  spawnConfetti();

  if (perfect) {
    const toast = qs('#bonus-toast');
    setTimeout(() => {
      toast.classList.add('show');
      setTimeout(() => toast.classList.remove('show'), 2500);
    }, 500);
  }
}

/* ============================================================
   CONFETTI & XP FLOAT
   ============================================================ */
function spawnConfetti() {
  const layer = qs('#confetti-layer');
  layer.innerHTML = '';
  const colors = ['#58CC02','#FFC800','#1CB0F6','#FF4B4B','#CE82FF','#FF9600','#2AC3A2'];
  for (let i=0; i<70; i++) {
    const p = document.createElement('div');
    p.className = 'cp';
    const size = 7 + Math.random()*10;
    p.style.cssText = `
      left:${Math.random()*100}%;
      width:${size}px; height:${size}px;
      background:${colors[Math.floor(Math.random()*colors.length)]};
      border-radius:${Math.random()>.5?'50%':'3px'};
      animation: confetti ${1.5+Math.random()*2}s linear ${Math.random()*0.5}s forwards;
    `;
    layer.appendChild(p);
  }
  setTimeout(() => layer.innerHTML='', 4500);
}

function spawnXP() {
  const el = document.createElement('div');
  el.className = 'xp-float';
  el.textContent = '+10 XP';
  el.style.cssText = `top:${20+Math.random()*20}%; left:${25+Math.random()*50}%;`;
  document.body.appendChild(el);
  el.addEventListener('animationend', ()=>el.remove(), {once:true});
}

/* ============================================================
   EVENT WIRING
   ============================================================ */
// Exit lesson
qs('#btn-exit').addEventListener('click', () => {
  if (confirm('Exit lesson? Progress will not be saved.')) goHome();
});

// Continue after feedback
qs('#btn-cont').addEventListener('click', () => {
  SES.cur++;
  if (SES.cur >= SES.qs.length) completeLesson();
  else renderQ();
});

// Grammar tip — Got it!
qs('#btn-got-it').addEventListener('click', () => {
  if (tipCB) { const cb=tipCB; tipCB=null; cb(); }
  else goHome();
});

// Completion — back home
qs('#btn-finish').addEventListener('click', goHome);

function goHome() {
  show('home');
  renderHome();
  qs('#confetti-layer').innerHTML = '';
}

/* ============================================================
   HEART REGEN (1 heart per 30 minutes)
   ============================================================ */
setInterval(() => {
  if (S.hearts < S.maxHearts) {
    S.hearts++;
    saveS();
    renderHeartsHome();
  }
}, 30 * 60 * 1000);

/* ============================================================
   INIT
   ============================================================ */
loadS();
renderHome();
show('home');
</script>
</body>
</html>
