<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<meta name="description" content="Korb Language Academy — a free, browser-based productivity tool from Korb Engineering. No signup, no downloads, works on mobile.">
<title>Korb Language Academy</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
/* ============================================================
   KORB LANGUAGE ACADEMY - VFD Dark Theme
   Multi-language learning application
   ============================================================ */
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
--bg:#050a0f;--surface:#0a1018;--surface2:#0e1520;--border:#1a2535;
--cyan:#00d4ff;--orange:#ff6600;--green:#10b981;--red:#ef4444;
--text:#e2e8f0;--text-dim:#8899aa;--text-muted:#556677;
--yellow:#f59e0b;--purple:#a78bfa;
--r:12px;--r-sm:8px;--r-xs:4px;
}
body{
font-family:'JetBrains Mono',monospace;background:var(--bg);color:var(--text);
min-height:100vh;-webkit-font-smoothing:antialiased;overflow-x:hidden;
font-size:14px;line-height:1.5;
}
input,button,select,textarea{font-family:'JetBrains Mono',monospace}
input,textarea{font-size:16px}
button{cursor:pointer;border:none;background:none;color:var(--text);font-size:13px}
a{color:var(--cyan);text-decoration:none}
::-webkit-scrollbar{width:6px}
::-webkit-scrollbar-track{background:var(--bg)}
::-webkit-scrollbar-thumb{background:var(--border);border-radius:3px}

/* ===== ANIMATIONS ===== */
@keyframes fadeUp{from{opacity:0;transform:translateY(12px)}to{opacity:1;transform:translateY(0)}}
@keyframes fadeIn{from{opacity:0}to{opacity:1}}
@keyframes popIn{0%{transform:scale(.6);opacity:0}70%{transform:scale(1.05)}100%{transform:scale(1);opacity:1}}
@keyframes shake{0%,100%{transform:translateX(0)}20%{transform:translateX(-6px)}40%{transform:translateX(6px)}60%{transform:translateX(-3px)}80%{transform:translateX(3px)}}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.5}}
@keyframes slideUp{from{transform:translateY(100%)}to{transform:translateY(0)}}
@keyframes glow{0%,100%{box-shadow:0 0 5px var(--cyan)}50%{box-shadow:0 0 20px var(--cyan)}}
@keyframes spin{to{transform:rotate(360deg)}}
@keyframes confettiDrop{0%{transform:translateY(-20px) rotate(0);opacity:1}100%{transform:translateY(100vh) rotate(720deg);opacity:0}}
.anim-fadeUp{animation:fadeUp .35s ease both}
.anim-popIn{animation:popIn .4s cubic-bezier(.34,1.56,.64,1) both}
.anim-shake{animation:shake .4s ease}

/* ===== LAYOUT ===== */
.screen{display:none;flex-direction:column;min-height:100vh}
.screen.active{display:flex}
.container{max-width:800px;margin:0 auto;padding:0 16px;width:100%}

/* ===== TOP BAR ===== */
.top-bar{
position:sticky;top:0;z-index:100;
background:rgba(5,10,15,.92);backdrop-filter:blur(12px);
border-bottom:1px solid var(--border);padding:10px 16px;
display:flex;align-items:center;gap:10px;
}
.top-bar .back-btn{
width:44px;height:44px;display:flex;align-items:center;justify-content:center;
border-radius:var(--r-sm);border:1px solid var(--border);color:var(--text-dim);
font-size:18px;flex-shrink:0;
}
.top-bar .back-btn:hover{border-color:var(--cyan);color:var(--cyan)}
.top-bar .title{font-size:14px;font-weight:600;color:var(--cyan);flex:1;min-width:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.top-bar .top-stats{display:flex;gap:12px;font-size:11px;color:var(--text-dim);flex-shrink:0}
.top-bar .top-stats span{display:flex;align-items:center;gap:4px}

/* ===== LANGUAGE SELECTOR ===== */
.lang-selector{
display:flex;gap:6px;padding:12px 16px;overflow-x:auto;
background:var(--surface);border-bottom:1px solid var(--border);
-webkit-overflow-scrolling:touch;scrollbar-width:none;
}
.lang-selector::-webkit-scrollbar{display:none}
.lang-btn{
padding:8px 14px;border-radius:var(--r);font-size:12px;font-weight:500;
border:1px solid var(--border);white-space:nowrap;min-height:44px;
display:flex;align-items:center;gap:6px;transition:all .2s;
}
.lang-btn.active{border-color:var(--cyan);background:rgba(0,212,255,.1);color:var(--cyan)}
.lang-btn:hover{border-color:var(--cyan)}
.lang-flag{font-size:16px}

/* ===== DASHBOARD ===== */
.dashboard{padding:16px;display:flex;flex-direction:column;gap:16px}
.dash-header{text-align:center;padding:20px 0}
.dash-header h1{font-size:20px;font-weight:700;color:var(--cyan);margin-bottom:4px}
.dash-header .subtitle{font-size:12px;color:var(--text-dim)}
.stats-row{
display:grid;grid-template-columns:repeat(4,1fr);gap:8px;
}
.stat-card{
background:var(--surface);border:1px solid var(--border);border-radius:var(--r);
padding:12px;text-align:center;
}
.stat-card .stat-val{font-size:20px;font-weight:700;color:var(--cyan)}
.stat-card .stat-label{font-size:10px;color:var(--text-dim);margin-top:2px}
.stat-card.streak .stat-val{color:var(--orange)}
.stat-card.level .stat-val{color:var(--green);font-size:12px}
.stat-card.accuracy .stat-val{color:var(--purple)}

/* Daily Challenge Card */
.daily-card{
background:linear-gradient(135deg,rgba(0,212,255,.08),rgba(255,102,0,.08));
border:1px solid var(--border);border-radius:var(--r);padding:16px;
display:flex;align-items:center;gap:12px;cursor:pointer;min-height:44px;
}
.daily-card:hover{border-color:var(--cyan)}
.daily-card .daily-icon{font-size:28px}
.daily-card .daily-info{flex:1}
.daily-card .daily-title{font-size:13px;font-weight:600}
.daily-card .daily-sub{font-size:11px;color:var(--text-dim)}

/* Section Headers */
.section-header{
font-size:13px;font-weight:600;color:var(--text-dim);
padding:8px 0;border-bottom:1px solid var(--border);margin-bottom:8px;
text-transform:uppercase;letter-spacing:1px;
}

/* Lesson Grid */
.lesson-grid{display:flex;flex-direction:column;gap:8px}
.lesson-item{
background:var(--surface);border:1px solid var(--border);border-radius:var(--r);
padding:14px 16px;display:flex;align-items:center;gap:12px;
cursor:pointer;min-height:56px;transition:all .2s;
}
.lesson-item:hover{border-color:var(--cyan);background:var(--surface2)}
.lesson-item .lesson-icon{font-size:22px;width:36px;text-align:center;flex-shrink:0}
.lesson-item .lesson-info{flex:1;min-width:0}
.lesson-item .lesson-name{font-size:13px;font-weight:600}
.lesson-item .lesson-desc{font-size:11px;color:var(--text-dim);margin-top:2px}
.lesson-item .lesson-progress{
width:80px;height:6px;background:var(--border);border-radius:3px;overflow:hidden;flex-shrink:0;
}
.lesson-item .lesson-progress .fill{height:100%;background:var(--green);border-radius:3px;transition:width .3s}
.lesson-item .lesson-count{font-size:11px;color:var(--text-dim);flex-shrink:0}
.lesson-item.completed{border-color:var(--green)}
.lesson-item.completed .lesson-name{color:var(--green)}

/* Practice Mode Buttons */
.practice-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:8px}
.practice-btn{
background:var(--surface);border:1px solid var(--border);border-radius:var(--r);
padding:16px 12px;text-align:center;min-height:80px;display:flex;flex-direction:column;
align-items:center;justify-content:center;gap:6px;transition:all .2s;
}
.practice-btn:hover{border-color:var(--cyan);background:var(--surface2)}
.practice-btn .p-icon{font-size:24px}
.practice-btn .p-name{font-size:12px;font-weight:600}
.practice-btn .p-desc{font-size:10px;color:var(--text-dim)}

/* ===== FLASHCARD ===== */
.flashcard-area{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:20px}
.flashcard{
width:100%;max-width:400px;min-height:260px;perspective:1000px;cursor:pointer;
}
.flashcard-inner{
position:relative;width:100%;min-height:260px;transition:transform .5s;transform-style:preserve-3d;
}
.flashcard.flipped .flashcard-inner{transform:rotateY(180deg)}
.flashcard-face{
position:absolute;inset:0;backface-visibility:hidden;
background:var(--surface);border:1px solid var(--border);border-radius:var(--r);
padding:24px;display:flex;flex-direction:column;align-items:center;justify-content:center;
text-align:center;
}
.flashcard-back{transform:rotateY(180deg)}
.flashcard-word{font-size:28px;font-weight:700;color:var(--cyan);margin-bottom:8px}
.flashcard-phonetic{font-size:14px;color:var(--text-dim);margin-bottom:12px}
.flashcard-example{font-size:12px;color:var(--text-muted);font-style:italic;margin-top:8px;line-height:1.6}
.flashcard-english{font-size:24px;font-weight:600;color:var(--green);margin-bottom:8px}
.flashcard-hint{font-size:11px;color:var(--text-muted);margin-top:16px}
.flashcard-btns{
display:flex;gap:12px;margin-top:20px;width:100%;max-width:400px;
}
.flashcard-btns button{
flex:1;padding:14px;border-radius:var(--r);font-weight:600;font-size:13px;
min-height:48px;
}
.btn-again{background:rgba(239,68,68,.15);color:var(--red);border:1px solid rgba(239,68,68,.3)}
.btn-again:hover{background:rgba(239,68,68,.25)}
.btn-got-it{background:rgba(16,185,129,.15);color:var(--green);border:1px solid rgba(16,185,129,.3)}
.btn-got-it:hover{background:rgba(16,185,129,.25)}
.btn-star{
position:absolute;top:12px;right:12px;font-size:20px;color:var(--text-muted);
z-index:2;width:44px;height:44px;display:flex;align-items:center;justify-content:center;
}
.btn-star.starred{color:var(--yellow)}
.btn-audio{
background:rgba(0,212,255,.1);border:1px solid rgba(0,212,255,.3);
color:var(--cyan);border-radius:50%;width:44px;height:44px;
display:flex;align-items:center;justify-content:center;font-size:18px;
margin-top:8px;
}
.btn-audio:hover{background:rgba(0,212,255,.2)}
.card-counter{font-size:12px;color:var(--text-dim);margin-bottom:12px}

/* ===== QUIZ MODES ===== */
.quiz-area{flex:1;display:flex;flex-direction:column;padding:16px}
.quiz-progress{
height:4px;background:var(--border);border-radius:2px;margin-bottom:16px;overflow:hidden;
}
.quiz-progress .fill{height:100%;background:var(--cyan);transition:width .3s;border-radius:2px}
.quiz-question{
font-size:16px;font-weight:600;text-align:center;margin-bottom:24px;
padding:20px;color:var(--text);
}
.quiz-prompt-word{font-size:24px;color:var(--cyan);display:block;margin-top:8px}
.quiz-options{display:flex;flex-direction:column;gap:10px;margin-bottom:16px}
.quiz-option{
background:var(--surface);border:1px solid var(--border);border-radius:var(--r);
padding:14px 16px;font-size:14px;text-align:left;min-height:48px;
transition:all .15s;display:flex;align-items:center;gap:10px;
}
.quiz-option:hover{border-color:var(--cyan);background:var(--surface2)}
.quiz-option.correct{border-color:var(--green);background:rgba(16,185,129,.12);color:var(--green)}
.quiz-option.wrong{border-color:var(--red);background:rgba(239,68,68,.12);color:var(--red)}
.quiz-option .opt-letter{
width:28px;height:28px;border-radius:50%;border:1px solid var(--border);
display:flex;align-items:center;justify-content:center;font-size:12px;
font-weight:600;flex-shrink:0;
}
.quiz-option.correct .opt-letter{border-color:var(--green);color:var(--green)}
.quiz-option.wrong .opt-letter{border-color:var(--red);color:var(--red)}

/* Type Input */
.type-input-wrap{
display:flex;flex-direction:column;gap:8px;align-items:center;margin-bottom:16px;
}
.type-input{
width:100%;max-width:400px;padding:14px 16px;
background:var(--surface);border:1px solid var(--border);border-radius:var(--r);
color:var(--text);font-size:16px;outline:none;text-align:center;
}
.type-input:focus{border-color:var(--cyan)}
.type-input.correct{border-color:var(--green);color:var(--green)}
.type-input.wrong{border-color:var(--red);color:var(--red)}

/* Accent Keyboard */
.accent-kb{
display:flex;flex-wrap:wrap;gap:6px;justify-content:center;padding:8px 0;
max-width:400px;margin:0 auto;
}
.accent-key{
min-width:40px;height:40px;background:var(--surface2);border:1px solid var(--border);
border-radius:var(--r-sm);display:flex;align-items:center;justify-content:center;
font-size:16px;color:var(--text);
}
.accent-key:hover{border-color:var(--cyan);color:var(--cyan)}

/* Match Game */
.match-grid{
display:grid;grid-template-columns:repeat(4,1fr);gap:8px;padding:8px;
}
.match-card{
background:var(--surface);border:1px solid var(--border);border-radius:var(--r-sm);
padding:10px 6px;text-align:center;font-size:12px;min-height:56px;
display:flex;align-items:center;justify-content:center;word-break:break-word;
transition:all .15s;
}
.match-card:hover{border-color:var(--cyan)}
.match-card.selected{border-color:var(--cyan);background:rgba(0,212,255,.1)}
.match-card.matched{border-color:var(--green);background:rgba(16,185,129,.1);color:var(--green);pointer-events:none}
.match-card.wrong{border-color:var(--red);background:rgba(239,68,68,.1);animation:shake .3s}
.match-timer{text-align:center;font-size:20px;font-weight:700;color:var(--orange);margin-bottom:12px}

/* Fill in Blank */
.fill-sentence{font-size:16px;text-align:center;margin-bottom:20px;line-height:1.8;padding:16px}
.fill-blank{
display:inline-block;border-bottom:2px solid var(--cyan);min-width:80px;
padding:2px 4px;color:var(--cyan);font-weight:600;
}

/* Conversation Mode */
.convo-area{flex:1;display:flex;flex-direction:column;padding:16px}
.convo-messages{flex:1;display:flex;flex-direction:column;gap:12px;margin-bottom:16px}
.convo-msg{
max-width:80%;padding:12px 16px;border-radius:var(--r);font-size:13px;line-height:1.5;
}
.convo-msg.them{
background:var(--surface);border:1px solid var(--border);align-self:flex-start;
}
.convo-msg.you{
background:rgba(0,212,255,.1);border:1px solid rgba(0,212,255,.3);
align-self:flex-end;color:var(--cyan);
}
.convo-msg .translation{font-size:11px;color:var(--text-dim);margin-top:4px;font-style:italic}

/* Quiz Feedback */
.quiz-feedback{
padding:16px;border-radius:var(--r);margin-bottom:12px;text-align:center;
font-weight:600;font-size:14px;animation:fadeUp .3s ease;
}
.quiz-feedback.correct{background:rgba(16,185,129,.12);color:var(--green);border:1px solid rgba(16,185,129,.3)}
.quiz-feedback.wrong{background:rgba(239,68,68,.12);color:var(--red);border:1px solid rgba(239,68,68,.3)}
.quiz-next-btn{
display:block;margin:8px auto 0;padding:12px 32px;
background:var(--cyan);color:var(--bg);border-radius:var(--r);
font-weight:600;font-size:13px;min-height:44px;
}
.quiz-next-btn:hover{opacity:.9}
.submit-btn{
padding:12px 32px;background:var(--cyan);color:var(--bg);border-radius:var(--r);
font-weight:600;font-size:13px;min-height:44px;margin:0 auto;display:block;
}
.submit-btn:hover{opacity:.9}

/* ===== GRAMMAR REFERENCE ===== */
.grammar-section{padding:16px}
.grammar-card{
background:var(--surface);border:1px solid var(--border);border-radius:var(--r);
margin-bottom:12px;overflow:hidden;
}
.grammar-card-header{
padding:14px 16px;cursor:pointer;display:flex;align-items:center;justify-content:space-between;
font-weight:600;font-size:13px;min-height:48px;
}
.grammar-card-header:hover{background:var(--surface2)}
.grammar-card-body{display:none;padding:16px;border-top:1px solid var(--border);font-size:12px;line-height:1.8}
.grammar-card.open .grammar-card-body{display:block}
.grammar-card.open .grammar-card-header .arrow{transform:rotate(180deg)}
.grammar-table{width:100%;border-collapse:collapse;margin:8px 0}
.grammar-table th,.grammar-table td{
padding:8px 10px;border:1px solid var(--border);text-align:left;font-size:11px;
}
.grammar-table th{background:var(--surface2);color:var(--cyan);font-weight:600}

/* ===== PHRASE BOOK ===== */
.phrase-section{padding:16px}
.phrase-category{
font-size:12px;font-weight:600;color:var(--orange);margin-top:16px;margin-bottom:8px;
text-transform:uppercase;letter-spacing:1px;
}
.phrase-item{
background:var(--surface);border:1px solid var(--border);border-radius:var(--r-sm);
padding:12px 14px;margin-bottom:6px;display:flex;align-items:center;gap:10px;
}
.phrase-text{flex:1;min-width:0}
.phrase-foreign{font-size:13px;font-weight:600;color:var(--cyan)}
.phrase-pron{font-size:11px;color:var(--text-dim)}
.phrase-eng{font-size:12px;color:var(--text-muted)}
.phrase-audio{
width:36px;height:36px;border-radius:50%;background:rgba(0,212,255,.1);
border:1px solid rgba(0,212,255,.3);color:var(--cyan);display:flex;
align-items:center;justify-content:center;font-size:14px;flex-shrink:0;
}

/* ===== PROGRESS / HEATMAP ===== */
.progress-section{padding:16px}
.heatmap{display:flex;flex-wrap:wrap;gap:3px;margin:12px 0}
.heatmap-cell{
width:14px;height:14px;border-radius:2px;background:var(--surface2);border:1px solid var(--border);
}
.heatmap-cell.l1{background:rgba(0,212,255,.2)}
.heatmap-cell.l2{background:rgba(0,212,255,.4)}
.heatmap-cell.l3{background:rgba(0,212,255,.6)}
.heatmap-cell.l4{background:var(--cyan)}
.xp-bar-wrap{margin:12px 0}
.xp-bar{height:12px;background:var(--surface2);border-radius:6px;overflow:hidden;border:1px solid var(--border)}
.xp-bar .fill{height:100%;background:linear-gradient(90deg,var(--cyan),var(--green));border-radius:6px}
.xp-label{display:flex;justify-content:space-between;font-size:11px;color:var(--text-dim);margin-top:4px}

/* ===== SETTINGS ===== */
.settings-section{padding:16px}
.setting-row{
display:flex;align-items:center;justify-content:space-between;
padding:14px 0;border-bottom:1px solid var(--border);
}
.setting-label{font-size:13px;font-weight:500}
.setting-sub{font-size:11px;color:var(--text-dim)}
.toggle{
width:48px;height:28px;background:var(--border);border-radius:14px;
position:relative;cursor:pointer;transition:background .2s;flex-shrink:0;
}
.toggle.on{background:var(--cyan)}
.toggle::after{
content:'';position:absolute;top:3px;left:3px;width:22px;height:22px;
border-radius:50%;background:#fff;transition:transform .2s;
}
.toggle.on::after{transform:translateX(20px)}
select.setting-select{
background:var(--surface);border:1px solid var(--border);border-radius:var(--r-sm);
color:var(--text);padding:8px 12px;font-size:16px;min-height:44px;
}
.export-btn,.import-btn{
padding:10px 20px;border-radius:var(--r-sm);font-weight:600;font-size:12px;
min-height:44px;margin:4px;
}
.export-btn{background:rgba(0,212,255,.15);color:var(--cyan);border:1px solid rgba(0,212,255,.3)}
.import-btn{background:rgba(255,102,0,.15);color:var(--orange);border:1px solid rgba(255,102,0,.3)}

/* ===== RESULTS SCREEN ===== */
.results-area{
flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;
padding:24px;text-align:center;
}
.results-score{font-size:48px;font-weight:700;color:var(--cyan);margin-bottom:8px}
.results-label{font-size:14px;color:var(--text-dim);margin-bottom:4px}
.results-detail{font-size:12px;color:var(--text-muted);margin-bottom:24px}
.results-xp{font-size:18px;color:var(--orange);font-weight:700;margin-bottom:24px}
.results-btns{display:flex;gap:12px;flex-wrap:wrap;justify-content:center}
.results-btns button{
padding:12px 24px;border-radius:var(--r);font-weight:600;font-size:13px;min-height:44px;
}
.btn-primary{background:var(--cyan);color:var(--bg)}
.btn-secondary{background:var(--surface);border:1px solid var(--border);color:var(--text)}

/* ===== BOTTOM NAV ===== */
.bottom-nav{
position:sticky;bottom:0;background:rgba(5,10,15,.95);backdrop-filter:blur(12px);
border-top:1px solid var(--border);display:flex;z-index:100;
}
.nav-btn{
flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;
padding:8px 4px;min-height:56px;gap:3px;transition:color .2s;color:var(--text-muted);
font-size:10px;
}
.nav-btn .nav-icon{font-size:20px}
.nav-btn.active{color:var(--cyan)}
.nav-btn:hover{color:var(--text)}

/* ===== TAB CONTENT ===== */
.tab-content{display:none;flex:1;overflow-y:auto;padding-bottom:60px}
.tab-content.active{display:flex;flex-direction:column}

/* ===== LESSON COMPLETE OVERLAY ===== */
.overlay{
position:fixed;inset:0;background:rgba(5,10,15,.9);z-index:200;
display:none;align-items:center;justify-content:center;padding:20px;
}
.overlay.active{display:flex}

// ===== STATE MANAGEMENT =====
let currentLang = 'es';
let state = {};

const STORAGE_PREFIX = 'korb_lang_';
const LEVELS = ['Novice','Beginner','Intermediate','Advanced','Fluent'];
const XP_PER_LEVEL = [0, 100, 300, 700, 1500];

function defaultLangState() {
  return {
    xp: 0, streak: 0, lastPractice: null, wordsLearned: 0,
    totalCorrect: 0, totalAttempts: 0,
    lessonProgress: {}, wordMastery: {}, favorites: [],
    dailyChallengeDate: null, dailyChallengeCompleted: false,
    practiceDays: {},
  };
}

function loadState() {
  try {
    const raw = localStorage.getItem(STORAGE_PREFIX + 'state');
    if (raw) state = JSON.parse(raw);
    else state = {};
  } catch(e) { state = {}; }
  // Ensure all languages have state
  for (const lang of Object.keys(LANGUAGES)) {
    if (!state[lang]) state[lang] = defaultLangState();
  }
  if (!state.settings) state.settings = { sound: true, voiceSpeed: 1, dailyGoal: 10 };
}

function saveState() {
  try { localStorage.setItem(STORAGE_PREFIX + 'state', JSON.stringify(state)); } catch(e) {}
}

function getLangState() { return state[currentLang]; }

function getLevel(xp) {
  for (let i = XP_PER_LEVEL.length - 1; i >= 0; i--) {
    if (xp >= XP_PER_LEVEL[i]) return i;
  }
  return 0;
}

function getLevelName(xp) { return LEVELS[getLevel(xp)]; }

function getXPToNext(xp) {
  const lv = getLevel(xp);
  if (lv >= LEVELS.length - 1) return 0;
  return XP_PER_LEVEL[lv + 1] - xp;
}

function getXPProgress(xp) {
  const lv = getLevel(xp);
  if (lv >= LEVELS.length - 1) return 100;
  const base = XP_PER_LEVEL[lv];
  const next = XP_PER_LEVEL[lv + 1];
  return Math.round(((xp - base) / (next - base)) * 100);
}

function addXP(amount) {
  const ls = getLangState();
  ls.xp += amount;
  saveState();
  updateTopStats();
}

function recordPractice() {
  const ls = getLangState();
  const today = new Date().toISOString().slice(0, 10);
  if (ls.lastPractice !== today) {
    const yesterday = new Date(Date.now() - 86400000).toISOString().slice(0, 10);
    if (ls.lastPractice === yesterday) ls.streak++;
    else ls.streak = 1;
    ls.lastPractice = today;
  }
  ls.practiceDays[today] = (ls.practiceDays[today] || 0) + 1;
  saveState();
}

function getAccuracy() {
  const ls = getLangState();
  if (ls.totalAttempts === 0) return 100;
  return Math.round((ls.totalCorrect / ls.totalAttempts) * 100);
}

// ===== AUDIO =====
function speak(text, langCode) {
  if (!state.settings.sound) return;
  if (!window.speechSynthesis) return;
  window.speechSynthesis.cancel();
  const u = new SpeechSynthesisUtterance(text);
  u.lang = langCode || LANGUAGES[currentLang].code;
  u.rate = state.settings.voiceSpeed || 1;
  window.speechSynthesis.speak(u);
}

function playSound(type) {
  if (!state.settings.sound) return;
  try {
    const ctx = new (window.AudioContext || window.webkitAudioContext)();
    const osc = ctx.createOscillator();
    const gain = ctx.createGain();
    osc.connect(gain);
    gain.connect(ctx.destination);
    gain.gain.value = 0.15;
    if (type === 'correct') {
      osc.frequency.value = 523;
      osc.start();
      setTimeout(() => { osc.frequency.value = 659; }, 100);
      setTimeout(() => { osc.frequency.value = 784; }, 200);
      setTimeout(() => { osc.stop(); ctx.close(); }, 350);
    } else if (type === 'wrong') {
      osc.frequency.value = 200;
      osc.type = 'sawtooth';
      osc.start();
      setTimeout(() => { osc.stop(); ctx.close(); }, 300);
    } else if (type === 'complete') {
      osc.frequency.value = 523;
      osc.start();
      setTimeout(() => osc.frequency.value = 659, 100);
      setTimeout(() => osc.frequency.value = 784, 200);
      setTimeout(() => osc.frequency.value = 1047, 300);
      setTimeout(() => { osc.stop(); ctx.close(); }, 500);
    }
  } catch(e) {}
}

function importData() {
  const input = document.createElement('input');
  input.type = 'file';
  input.accept = '.json';
  input.onchange = (e) => {
    const file = e.target.files[0];
    if (!file) return;
    const reader = new FileReader();
    reader.onload = (ev) => {
      try {
        const data = JSON.parse(ev.target.result);
        Object.assign(state, data);
        saveState();
        switchLanguage(currentLang);
        alert('Progress imported successfully!');
      } catch(err) { alert('Invalid file format.'); }
    };
    reader.readAsText(file);
  };
  input.click();
}

// ===== HELPERS =====
function getAllWords(lang) {
  const l = lang || currentLang;
  const v = VOCAB[l] || {};
  let all = [];
  for (const cat of Object.values(v)) all = all.concat(cat);
  return all;
}

function getWeakWords() {
  const ls = getLangState();
  const all = getAllWords();
  return all.filter(w => {
    const key = w.w;
    const mastery = ls.wordMastery[key] || 0;
    return mastery > 0 && mastery < 3;
  });
}

function getWordsForLesson(lessonId) {
  return (VOCAB[currentLang] && VOCAB[currentLang][lessonId]) || [];
}

function shuffle(arr) {
  const a = [...arr];
  for (let i = a.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [a[i], a[j]] = [a[j], a[i]];
  }
  return a;
}

function getRandomOptions(correct, allWords, count) {
  const options = [correct];
  const pool = allWords.filter(w => w.e !== correct.e);
  const shuffled = shuffle(pool);
  for (let i = 0; i < Math.min(count - 1, shuffled.length); i++) {
    options.push(shuffled[i]);
  }
  return shuffle(options);
}

// ===== LESSON MODE =====
let lessonState = {};

function startLesson(lessonId) {
  const words = getWordsForLesson(lessonId);
  if (words.length === 0) return;
  const lesson = (LESSONS[currentLang] || []).find(l => l.id === lessonId);
  lessonState = {
    lessonId, words: shuffle(words), index: 0, correct: 0, total: words.length,
    mode: 'flashcard', name: lesson ? lesson.name : lessonId,
  };
  showScreen('lessonScreen');
  document.getElementById('lessonTitle').textContent = lessonState.name;
  recordPractice();
  renderLessonCard();
}

function exitLesson() {
  showScreen('app');
  renderDashboard();
  renderPractice();
  renderProgress();
}

function renderLessonCard() {
  const ls = lessonState;
  if (ls.index >= ls.words.length) {
    showLessonComplete();
    return;
  }
  const w = ls.words[ls.index];
  document.getElementById('lessonScore').textContent = `${ls.index + 1}/${ls.total}`;
  const langState = getLangState();
  const isFav = langState.favorites.includes(w.w);

  const content = document.getElementById('lessonContent');
  content.innerHTML = `
    <div class="quiz-progress"><div class="fill" style="width:${(ls.index / ls.total) * 100}%"></div></div>
    <div class="flashcard-area">
      <div class="card-counter">${ls.index + 1} of ${ls.total}</div>
      <div class="flashcard" id="flashcard" onclick="document.getElementById('flashcard').classList.toggle('flipped')">
        <button class="btn-star ${isFav ? 'starred' : ''}" onclick="event.stopPropagation();toggleFavorite('${w.w.replace(/'/g,"\\'")}',this)">${isFav ? '\u2605' : '\u2606'}</button>
        <div class="flashcard-inner">
          <div class="flashcard-face">
            <div class="flashcard-word">${w.w}</div>
            <div class="flashcard-phonetic">${w.p}</div>
            <button class="btn-audio" onclick="event.stopPropagation();speak('${w.w.replace(/'/g,"\\'")}')">&#x1F50A;</button>
            <div class="flashcard-hint">Tap to reveal</div>
          </div>
          <div class="flashcard-face flashcard-back">
            <div class="flashcard-english">${w.e}</div>
            <div class="flashcard-example">${w.ex}</div>
            <button class="btn-audio" onclick="event.stopPropagation();speak('${w.ex.replace(/'/g,"\\'")}')">&#x1F50A;</button>
          </div>
        </div>
      </div>
      <div class="flashcard-btns">
        <button class="btn-again" onclick="lessonAnswer(false)">Study Again</button>
        <button class="btn-got-it" onclick="lessonAnswer(true)">Got It</button>
      </div>
    </div>
  `;
  speak(w.w);
}

function toggleFavorite(word, btn) {
  const ls = getLangState();
  const idx = ls.favorites.indexOf(word);
  if (idx >= 0) {
    ls.favorites.splice(idx, 1);
    btn.classList.remove('starred');
    btn.textContent = '\u2606';
  } else {
    ls.favorites.push(word);
    btn.classList.add('starred');
    btn.textContent = '\u2605';
  }
  saveState();
}

function lessonAnswer(correct) {
  const w = lessonState.words[lessonState.index];
  const ls = getLangState();
  ls.totalAttempts++;
  if (correct) {
    ls.totalCorrect++;
    lessonState.correct++;
    const mastery = ls.wordMastery[w.w] || 0;
    ls.wordMastery[w.w] = Math.min(mastery + 1, 5);
    addXP(10);
    playSound('correct');
  } else {
    ls.wordMastery[w.w] = Math.max((ls.wordMastery[w.w] || 0) - 1, 0);
    // Re-add to end for spaced repetition
    lessonState.words.push(w);
    lessonState.total = lessonState.words.length;
    playSound('wrong');
  }
  // Update lesson progress
  const learnedInLesson = getWordsForLesson(lessonState.lessonId).filter(
    word => (ls.wordMastery[word.w] || 0) >= 1
  ).length;
  ls.lessonProgress[lessonState.lessonId] = learnedInLesson;
  saveState();
  lessonState.index++;
  renderLessonCard();
}

function showLessonComplete() {
  const ls = lessonState;
  const pct = Math.round((ls.correct / ls.total) * 100);
  const bonusXP = pct >= 80 ? 50 : pct >= 60 ? 25 : 0;
  if (bonusXP) addXP(bonusXP);
  playSound('complete');
  spawnConfetti();

  document.getElementById('lessonContent').innerHTML = `
    <div class="results-area">
      <div class="results-label">Lesson Complete!</div>
      <div class="results-score">${pct}%</div>
      <div class="results-detail">${ls.correct} correct out of ${ls.total} cards</div>
      <div class="results-xp">+${ls.correct * 10 + bonusXP} XP${bonusXP ? ' (includes bonus!)' : ''}</div>
      <div class="results-btns">
        <button class="btn-primary" onclick="exitLesson()">Back to Lessons</button>
        <button class="btn-secondary" onclick="startLesson('${ls.lessonId}')">Practice Again</button>
      </div>
    </div>
  `;
}

// ===== PRACTICE MODES =====
let practiceState = {};

function startPractice(mode, subset) {
  let words;
  if (subset === 'favorites') {
    const ls = getLangState();
    words = getAllWords().filter(w => ls.favorites.includes(w.w));
    if (words.length === 0) { alert('No favorites yet! Star some words first.'); return; }
  } else {
    words = getAllWords();
  }
  if (words.length < 4) { alert('Learn more words first! You need at least 4 words.'); return; }

  if (mode === 'convo') { startConversation(); return; }

  practiceState = {
    mode, words: shuffle(words).slice(0, 15), allWords: words,
    index: 0, correct: 0, total: Math.min(15, words.length),
    answered: false, matchPairs: [], matchSelected: null, matchTime: 0, matchTimer: null,
  };
  showScreen('lessonScreen');
  document.getElementById('lessonTitle').textContent = modeNames[mode] || mode;
  recordPractice();
  renderPracticeQuestion();
}

const modeNames = {
  flashcards:'Flashcards',multiple:'Multiple Choice',typeit:'Type It',
  listening:'Listening',match:'Match Game',fillin:'Fill in Blank',convo:'Conversation',
};

function renderPracticeQuestion() {
  const ps = practiceState;
  if (ps.mode === 'match') { renderMatchGame(); return; }
  if (ps.index >= ps.total) { showPracticeComplete(); return; }
  document.getElementById('lessonScore').textContent = `${ps.index + 1}/${ps.total}`;
  ps.answered = false;
  const w = ps.words[ps.index];
  const content = document.getElementById('lessonContent');

  if (ps.mode === 'flashcards') {
    const ls = getLangState();
    const isFav = ls.favorites.includes(w.w);
    content.innerHTML = `
      <div class="quiz-progress"><div class="fill" style="width:${(ps.index/ps.total)*100}%"></div></div>
      <div class="flashcard-area">
        <div class="card-counter">${ps.index+1} of ${ps.total}</div>
        <div class="flashcard" id="flashcard" onclick="document.getElementById('flashcard').classList.toggle('flipped')">
          <button class="btn-star ${isFav?'starred':''}" onclick="event.stopPropagation();toggleFavorite('${w.w.replace(/'/g,"\\'")}',this)">${isFav?'\u2605':'\u2606'}</button>
          <div class="flashcard-inner">
            <div class="flashcard-face">
              <div class="flashcard-word">${w.w}</div>
              <div class="flashcard-phonetic">${w.p}</div>
              <button class="btn-audio" onclick="event.stopPropagation();speak('${w.w.replace(/'/g,"\\'")}')">&#x1F50A;</button>
              <div class="flashcard-hint">Tap to reveal</div>
            </div>
            <div class="flashcard-face flashcard-back">
              <div class="flashcard-english">${w.e}</div>
              <div class="flashcard-example">${w.ex}</div>
            </div>
          </div>
        </div>
        <div class="flashcard-btns">
          <button class="btn-again" onclick="practiceAnswer(false)">Study Again</button>
          <button class="btn-got-it" onclick="practiceAnswer(true)">Got It</button>
        </div>
      </div>`;
    speak(w.w);
  }
  else if (ps.mode === 'multiple') {
    const options = getRandomOptions(w, ps.allWords, 4);
    content.innerHTML = `
      <div class="quiz-progress"><div class="fill" style="width:${(ps.index/ps.total)*100}%"></div></div>
      <div class="quiz-area">
        <div class="quiz-question">What is the translation of:<span class="quiz-prompt-word">${w.e}</span></div>
        <div class="quiz-options" id="quizOptions">
          ${options.map((o,i) => `
            <button class="quiz-option" data-correct="${o.w===w.w}" onclick="handleMultipleChoice(this,'${w.w.replace(/'/g,"\\'")}')">
              <span class="opt-letter">${String.fromCharCode(65+i)}</span>${o.w}
            </button>`).join('')}
        </div>
        <div id="quizFeedback"></div>
      </div>`;
  }
  else if (ps.mode === 'typeit') {
    const accents = LANGUAGES[currentLang].accents || [];
    content.innerHTML = `
      <div class="quiz-progress"><div class="fill" style="width:${(ps.index/ps.total)*100}%"></div></div>
      <div class="quiz-area">
        <div class="quiz-question">Type the translation:<span class="quiz-prompt-word">${w.e}</span></div>
        <div class="type-input-wrap">
          <input class="type-input" id="typeInput" placeholder="Type here..." autocomplete="off" autocapitalize="off">
          ${accents.length > 0 ? `<div class="accent-kb">${accents.map(a => `<button class="accent-key" onclick="insertAccent('${a}')">${a}</button>`).join('')}</div>` : ''}
          <button class="submit-btn" onclick="handleTypeAnswer('${w.w.replace(/'/g,"\\'")}')">Check</button>
        </div>
        <div id="quizFeedback"></div>
      </div>`;
    setTimeout(() => { const inp = document.getElementById('typeInput'); if(inp) inp.focus(); }, 100);
    document.getElementById('typeInput').addEventListener('keydown', (e) => {
      if (e.key === 'Enter') handleTypeAnswer(w.w);
    });
  }
  else if (ps.mode === 'listening') {
    const options = getRandomOptions(w, ps.allWords, 4);
    content.innerHTML = `
      <div class="quiz-progress"><div class="fill" style="width:${(ps.index/ps.total)*100}%"></div></div>
      <div class="quiz-area">
        <div class="quiz-question">
          Listen and select the correct word:
          <button class="btn-audio" style="margin:12px auto;display:flex" onclick="speak('${w.w.replace(/'/g,"\\'")}')">&#x1F50A; Play Again</button>
        </div>
        <div class="quiz-options" id="quizOptions">
          ${options.map((o,i) => `
            <button class="quiz-option" data-correct="${o.w===w.w}" onclick="handleMultipleChoice(this,'${w.w.replace(/'/g,"\\'")}')">
              <span class="opt-letter">${String.fromCharCode(65+i)}</span>${o.w} <span style="color:var(--text-dim);font-size:11px;margin-left:auto">${o.e}</span>
            </button>`).join('')}
        </div>
        <div id="quizFeedback"></div>
      </div>`;
    speak(w.w);
  }
  else if (ps.mode === 'fillin') {
    // Use the example sentence and blank out the word
    const sentence = w.ex;
    const blanked = sentence.replace(new RegExp(w.w.split(' ')[0], 'i'), '____');
    const options = getRandomOptions(w, ps.allWords, 4);
    content.innerHTML = `
      <div class="quiz-progress"><div class="fill" style="width:${(ps.index/ps.total)*100}%"></div></div>
      <div class="quiz-area">
        <div class="quiz-question">Fill in the blank:<div class="fill-sentence" style="margin-top:12px">${blanked}</div>
        <div style="font-size:12px;color:var(--text-dim)">Hint: ${w.e}</div></div>
        <div class="quiz-options" id="quizOptions">
          ${options.map((o,i) => `
            <button class="quiz-option" data-correct="${o.w===w.w}" onclick="handleMultipleChoice(this,'${w.w.replace(/'/g,"\\'")}')">
              <span class="opt-letter">${String.fromCharCode(65+i)}</span>${o.w}
            </button>`).join('')}
        </div>
        <div id="quizFeedback"></div>
      </div>`;
  }
}

function insertAccent(char) {
  const input = document.getElementById('typeInput');
  if (!input) return;
  const start = input.selectionStart;
  const end = input.selectionEnd;
  input.value = input.value.slice(0, start) + char + input.value.slice(end);
  input.selectionStart = input.selectionEnd = start + char.length;
  input.focus();
}

function handleMultipleChoice(btn, correctWord) {
  if (practiceState.answered) return;
  practiceState.answered = true;
  const isCorrect = btn.dataset.correct === 'true';
  const ls = getLangState();
  ls.totalAttempts++;

  document.querySelectorAll('.quiz-option').forEach(o => {
    if (o.dataset.correct === 'true') o.classList.add('correct');
    else o.classList.add('wrong');
    o.style.pointerEvents = 'none';
  });
  if (!isCorrect) btn.classList.add('wrong');

  if (isCorrect) {
    practiceState.correct++;
    ls.totalCorrect++;
    const w = practiceState.words[practiceState.index];
    ls.wordMastery[w.w] = Math.min((ls.wordMastery[w.w] || 0) + 1, 5);
    addXP(10);
    playSound('correct');
    document.getElementById('quizFeedback').innerHTML = `<div class="quiz-feedback correct">Correct! +10 XP</div>`;
  } else {
    const w = practiceState.words[practiceState.index];
    ls.wordMastery[w.w] = Math.max((ls.wordMastery[w.w] || 0) - 1, 0);
    playSound('wrong');
    document.getElementById('quizFeedback').innerHTML = `<div class="quiz-feedback wrong">The answer was: ${correctWord}</div>`;
  }
  saveState();
  document.getElementById('quizFeedback').innerHTML += `<button class="quiz-next-btn" onclick="practiceState.index++;renderPracticeQuestion()">Continue</button>`;
}

function handleTypeAnswer(correctWord) {
  if (practiceState.answered) return;
  const input = document.getElementById('typeInput');
  const answer = input.value.trim();
  if (!answer) return;
  practiceState.answered = true;
  const ls = getLangState();
  ls.totalAttempts++;

  const normalize = s => s.toLowerCase().replace(/[^a-z\u00e0-\u024f\u3000-\u9fff\uac00-\ud7af]/g, '');
  const isCorrect = normalize(answer) === normalize(correctWord);

  if (isCorrect) {
    practiceState.correct++;
    ls.totalCorrect++;
    const w = practiceState.words[practiceState.index];
    ls.wordMastery[w.w] = Math.min((ls.wordMastery[w.w] || 0) + 1, 5);
    addXP(10);
    playSound('correct');
    input.classList.add('correct');
    document.getElementById('quizFeedback').innerHTML = `<div class="quiz-feedback correct">Correct! +10 XP</div>`;
  } else {
    const w = practiceState.words[practiceState.index];
    ls.wordMastery[w.w] = Math.max((ls.wordMastery[w.w] || 0) - 1, 0);
    playSound('wrong');
    input.classList.add('wrong');
    document.getElementById('quizFeedback').innerHTML = `<div class="quiz-feedback wrong">Correct answer: ${correctWord}</div>`;
  }
  saveState();
  document.getElementById('quizFeedback').innerHTML += `<button class="quiz-next-btn" onclick="practiceState.index++;renderPracticeQuestion()">Continue</button>`;
}

function practiceAnswer(correct) {
  const w = practiceState.words[practiceState.index];
  const ls = getLangState();
  ls.totalAttempts++;
  if (correct) {
    practiceState.correct++;
    ls.totalCorrect++;
    ls.wordMastery[w.w] = Math.min((ls.wordMastery[w.w] || 0) + 1, 5);
    addXP(10);
    playSound('correct');
  } else {
    ls.wordMastery[w.w] = Math.max((ls.wordMastery[w.w] || 0) - 1, 0);
    playSound('wrong');
  }
  saveState();
  practiceState.index++;
  renderPracticeQuestion();
}

// ===== MATCH GAME =====
function renderMatchGame() {
  const ps = practiceState;
  const pairs = ps.words.slice(0, 6);
  const cards = [];
  for (const p of pairs) {
    cards.push({ id: p.w, text: p.w, type: 'foreign', pairId: p.w });
    cards.push({ id: p.w + '_e', text: p.e, type: 'english', pairId: p.w });
  }
  ps.matchPairs = shuffle(cards);
  ps.matchSelected = null;
  ps.matchMatched = 0;
  ps.matchTotal = pairs.length;
  ps.matchTime = 0;
  if (ps.matchTimer) clearInterval(ps.matchTimer);
  ps.matchTimer = setInterval(() => {
    ps.matchTime++;
    const timerEl = document.getElementById('matchTimer');
    if (timerEl) timerEl.textContent = ps.matchTime + 's';
  }, 1000);

  const content = document.getElementById('lessonContent');
  document.getElementById('lessonScore').textContent = `0/${ps.matchTotal}`;
  content.innerHTML = `
    <div style="padding:16px">
      <div class="match-timer" id="matchTimer">0s</div>
      <div class="match-grid" id="matchGrid">
        ${ps.matchPairs.map((c, i) => `
          <button class="match-card" data-idx="${i}" onclick="handleMatchClick(${i})">${c.text}</button>
        `).join('')}
      </div>
    </div>`;
}

function handleMatchClick(idx) {
  const ps = practiceState;
  const card = ps.matchPairs[idx];
  const cardEl = document.querySelectorAll('.match-card')[idx];
  if (cardEl.classList.contains('matched')) return;

  if (ps.matchSelected === null) {
    ps.matchSelected = idx;
    cardEl.classList.add('selected');
  } else if (ps.matchSelected === idx) {
    cardEl.classList.remove('selected');
    ps.matchSelected = null;
  } else {
    const prevCard = ps.matchPairs[ps.matchSelected];
    const prevEl = document.querySelectorAll('.match-card')[ps.matchSelected];

    if (prevCard.pairId === card.pairId && prevCard.type !== card.type) {
      // Match!
      prevEl.classList.remove('selected');
      prevEl.classList.add('matched');
      cardEl.classList.add('matched');
      ps.matchMatched++;
      addXP(10);
      playSound('correct');
      document.getElementById('lessonScore').textContent = `${ps.matchMatched}/${ps.matchTotal}`;

      if (ps.matchMatched >= ps.matchTotal) {
        clearInterval(ps.matchTimer);
        practiceState.correct = ps.matchTotal;
        practiceState.total = ps.matchTotal;
        setTimeout(() => showPracticeComplete(), 500);
      }
    } else {
      // Wrong
      prevEl.classList.remove('selected');
      prevEl.classList.add('wrong');
      cardEl.classList.add('wrong');
      playSound('wrong');
      setTimeout(() => {
        prevEl.classList.remove('wrong');
        cardEl.classList.remove('wrong');
      }, 400);
    }
    ps.matchSelected = null;
  }
}

function showPracticeComplete() {
  if (practiceState.matchTimer) clearInterval(practiceState.matchTimer);
  const ps = practiceState;
  const pct = ps.total > 0 ? Math.round((ps.correct / ps.total) * 100) : 0;
  const bonusXP = pct >= 80 ? 30 : 0;
  if (bonusXP) addXP(bonusXP);
  playSound('complete');
  if (pct >= 80) spawnConfetti();

  const content = document.getElementById('lessonContent');
  content.innerHTML = `
    <div class="results-area">
      <div class="results-label">Practice Complete!</div>
      <div class="results-score">${pct}%</div>
      <div class="results-detail">${ps.correct} correct out of ${ps.total}${ps.mode === 'match' ? ' pairs in ' + (ps.matchTime || 0) + 's' : ''}</div>
      <div class="results-xp">+${ps.correct * 10 + bonusXP} XP${bonusXP ? ' (bonus!)' : ''}</div>
      <div class="results-btns">
        <button class="btn-primary" onclick="exitLesson()">Back to Practice</button>
        <button class="btn-secondary" onclick="startPractice('${ps.mode}')">Try Again</button>
      </div>
    </div>`;
}

// ===== CONVERSATION MODE =====
let convoState = {};

function startConversation() {
  const scenarios = CONVERSATIONS[currentLang] || [];
  if (scenarios.length === 0) { alert('Conversations coming soon for ' + LANGUAGES[currentLang].name + '!'); return; }
  const scenario = scenarios[Math.floor(Math.random() * scenarios.length)];
  convoState = { scenario, msgIndex: 0, correct: 0, total: 0 };
  showScreen('lessonScreen');
  document.getElementById('lessonTitle').textContent = 'Conversation: ' + scenario.title;
  recordPractice();
  renderConversation();
}

function renderConversation() {
  const cs = convoState;
  const content = document.getElementById('lessonContent');
  let html = '<div class="convo-area"><div class="convo-messages" id="convoMessages">';

  for (let i = 0; i <= cs.msgIndex && i < cs.scenario.messages.length; i++) {
    const msg = cs.scenario.messages[i];
    if (msg.who === 'them') {
      html += `<div class="convo-msg them anim-fadeUp">${msg.text}<div class="translation">${msg.tr}</div></div>`;
    } else if (msg.who === 'you' && i < cs.msgIndex) {
      // Already answered
      const chosen = msg._chosen !== undefined ? msg._chosen : msg.correct;
      html += `<div class="convo-msg you anim-fadeUp">${msg.options[chosen]}<div class="translation">${msg.tr[chosen]}</div></div>`;
    }
  }
  html += '</div>';

  // Current prompt
  if (cs.msgIndex < cs.scenario.messages.length) {
    const msg = cs.scenario.messages[cs.msgIndex];
    if (msg.who === 'you' && !msg._answered) {
      html += '<div class="quiz-options" style="padding:0 4px">';
      for (let j = 0; j < msg.options.length; j++) {
        html += `<button class="quiz-option" onclick="handleConvoChoice(${j})">${msg.options[j]}<span style="font-size:10px;color:var(--text-dim);margin-left:auto">${msg.tr[j]}</span></button>`;
      }
      html += '</div>';
    }
  }

  if (cs.msgIndex >= cs.scenario.messages.length) {
    const pct = cs.total > 0 ? Math.round((cs.correct / cs.total) * 100) : 100;
    html += `<div style="text-align:center;padding:16px">
      <div style="font-size:16px;font-weight:700;color:var(--green);margin-bottom:8px">Conversation Complete!</div>
      <div style="font-size:13px;color:var(--text-dim)">Score: ${cs.correct}/${cs.total}</div>
      <button class="btn-primary" style="margin-top:12px" onclick="exitLesson()">Done</button>
    </div>`;
  }

  html += '</div>';
  content.innerHTML = html;
  // Scroll to bottom
  const msgs = document.getElementById('convoMessages');
  if (msgs) msgs.scrollTop = msgs.scrollHeight;
}

function handleConvoChoice(idx) {
  const cs = convoState;
  const msg = cs.scenario.messages[cs.msgIndex];
  msg._chosen = idx;
  msg._answered = true;
  cs.total++;
  if (idx === msg.correct) { cs.correct++; addXP(10); playSound('correct'); }
  else { playSound('wrong'); }
  const ls = getLangState();
  ls.totalAttempts++;
  if (idx === msg.correct) ls.totalCorrect++;
  saveState();
  cs.msgIndex++;
  // Auto-advance past 'them' messages
  while (cs.msgIndex < cs.scenario.messages.length && cs.scenario.messages[cs.msgIndex].who === 'them') {
    cs.msgIndex++;
  }
  // If the next is also 'them', show it first then stop
  // Actually let's just advance to show the them message then the next you choice
  // Re-render will handle showing all messages up to msgIndex
  renderConversation();
}

// ===== DAILY CHALLENGE =====
function startDailyChallenge() {
  const ls = getLangState();
  const today = new Date().toISOString().slice(0, 10);
  if (ls.dailyChallengeDate === today && ls.dailyChallengeCompleted) return;

  const words = getAllWords();
  if (words.length < 4) { alert('Learn more words to unlock the daily challenge!'); return; }

  ls.dailyChallengeDate = today;
  saveState();

  practiceState = {
    mode: 'multiple', words: shuffle(words).slice(0, 10), allWords: words,
    index: 0, correct: 0, total: 10, answered: false, isDaily: true,
  };
  showScreen('lessonScreen');
  document.getElementById('lessonTitle').textContent = 'Daily Challenge';
  recordPractice();
  renderPracticeQuestion();
}

// Override complete for daily
const origShowComplete = showPracticeComplete;
showPracticeComplete = function() {
  if (practiceState.isDaily) {
    const ls = getLangState();
    ls.dailyChallengeCompleted = true;
    const bonusXP = 50;
    addXP(bonusXP);
    saveState();
  }
  if (practiceState.matchTimer) clearInterval(practiceState.matchTimer);
  const ps = practiceState;
  const pct = ps.total > 0 ? Math.round((ps.correct / ps.total) * 100) : 0;
  const bonusXP = ps.isDaily ? 50 : (pct >= 80 ? 30 : 0);
  if (!ps.isDaily && bonusXP) addXP(bonusXP);
  playSound('complete');
  if (pct >= 60) spawnConfetti();

  const content = document.getElementById('lessonContent');
  content.innerHTML = `
    <div class="results-area">
      <div class="results-label">${ps.isDaily ? 'Daily Challenge Complete!' : 'Practice Complete!'}</div>
      <div class="results-score">${pct}%</div>
      <div class="results-detail">${ps.correct} correct out of ${ps.total}${ps.mode === 'match' ? ' pairs in ' + (ps.matchTime || 0) + 's' : ''}</div>
      <div class="results-xp">+${ps.correct * 10 + bonusXP} XP${bonusXP ? (ps.isDaily ? ' (daily bonus!)' : ' (bonus!)') : ''}</div>
      <div class="results-btns">
        <button class="btn-primary" onclick="exitLesson()">Back</button>
        ${!ps.isDaily ? `<button class="btn-secondary" onclick="startPractice('${ps.mode}')">Try Again</button>` : ''}
      </div>
    </div>`;
};

// ===== INITIALIZATION =====
function init() {
  loadState();
  renderLangSelector();
  switchLanguage(currentLang);
}

init();
</script>
