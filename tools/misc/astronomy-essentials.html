<style>
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box}
:root{

  --star1:#fde68a;--star2:#93c5fd;--void:#1e1b4b;--nebula:#c084fc;
}
html,body{height:100%;background:var(--bg);color:var(--text);font-family:'JetBrains Mono',monospace;font-size:14px;overflow:hidden}
button,input,select,textarea{font-family:inherit;font-size:16px}
button{cursor:pointer;border:1px solid var(--border);background:var(--surface2);color:var(--text);padding:8px 14px;border-radius:6px;min-height:40px;transition:border-color .15s,color .15s}
button:hover{border-color:var(--cyan);color:var(--cyan)}
button.primary{background:rgba(0,212,255,.14);border-color:var(--cyan);color:var(--cyan)}
button.success{background:rgba(16,185,129,.14);border-color:var(--green);color:var(--green)}
button.danger{background:rgba(239,68,68,.12);border-color:var(--red);color:var(--red)}
input[type=text]{background:var(--surface);border:1px solid var(--border);color:var(--text);padding:10px 12px;border-radius:6px;width:100%;min-height:42px}
input[type=text]:focus{outline:none;border-color:var(--cyan)}

#app{display:grid;grid-template-rows:auto 1fr;height:100vh;width:100vw}
header{background:var(--surface);border-bottom:1px solid var(--border);padding:10px 14px;display:flex;align-items:center;gap:10px;flex-wrap:wrap}
#back-btn{background:var(--surface2);border:1px solid var(--border);color:var(--text);padding:6px 10px;min-height:36px;font-size:12px;text-decoration:none;border-radius:6px}
#back-btn:hover{border-color:var(--cyan);color:var(--cyan)}
header h1{font-family:'Merriweather',serif;font-size:18px;color:var(--cyan);font-weight:700;flex:1;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}

header .tabs button{font-size:12px;padding:6px 12px;min-height:36px}
header .tabs button.active{background:rgba(0,212,255,.14);border-color:var(--cyan);color:var(--cyan)}
header .search-wrap{flex:0 0 220px;max-width:260px}
@media (max-width:740px){header .search-wrap{flex:1 1 100%;order:5}}

main{display:grid;grid-template-columns:260px 1fr;overflow:hidden}
@media (max-width:900px){main{grid-template-columns:1fr}#toc{display:none}main.toc-open #toc{display:block;position:absolute;z-index:100;top:0;left:0;bottom:0;width:84%;max-width:320px;box-shadow:4px 0 20px rgba(0,0,0,.6)}}

#toc{background:var(--surface);border-right:1px solid var(--border);overflow-y:auto;padding:12px 14px}

#toc .prog-bar{height:100%;background:linear-gradient(90deg,var(--cyan),var(--purple));transition:width .3s}

#toc ol li a::before{content:counter(ch)'. ';color:var(--dim);font-weight:700;margin-right:4px}
#toc ol li a:hover{background:rgba(0,212,255,.06);border-left-color:var(--cyan)}
#toc ol li a.active{background:rgba(0,212,255,.12);border-left-color:var(--cyan);color:var(--cyan)}
#toc ol li a .dot{position:absolute;right:6px;top:10px;width:8px;height:8px;border-radius:50%;background:transparent;border:1px solid var(--dim)}

/* Search dropdown */
#search-results{position:absolute;top:56px;right:14px;max-width:400px;width:calc(100vw - 28px);background:var(--surface);border:1px solid var(--border);border-radius:6px;max-height:60vh;overflow-y:auto;z-index:200;display:none}

.toast.show{opacity:1}

.pane.active{display:block}

<script>
(function(){
'use strict';
const LS='korb_astronomy_essentials_v1';
const $=(id)=>document.getElementById(id);
function toast(m,ms){const t=$('toast');t.textContent=m;t.classList.add('show');clearTimeout(toast._t);toast._t=setTimeout(()=>t.classList.remove('show'),ms||2000);}
function escapeHtml(s){return String(s).replace(/[&<>"']/g,(c)=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));}

// Chapter content is original prose written from general astronomy knowledge.
// Topic organization mirrors the standard intro-astronomy curriculum sequence.
// No text is reproduced from any specific textbook.

const CH = [];

CH.push({
  id:'intro', title:'Introduction to Astronomy', sub:'Scales, Methods, and the Sky',
  html: `
    <p><strong>Astronomy</strong> is the oldest of the natural sciences and, in many ways, the broadest. It takes as its subject everything beyond Earth&rsquo;s atmosphere &mdash; planets, stars, galaxies, and the universe as a whole. It is also a laboratory science in an unusual sense: with rare exceptions, astronomers cannot touch, sample, or experiment on the objects they study. Almost everything we know has been extracted from the light (and other radiation) that reaches our telescopes.</p>
    <h2>The Scientific Method in Astronomy</h2>
    <p>Astronomers observe, propose models, and then test those models against new observations. Because the distances are enormous and the timescales long compared with a human life, a single astronomical &ldquo;experiment&rdquo; often consists of comparing thousands of similar objects, each caught at a different stage. A galaxy we see today may have been photographed a billion years ago &mdash; so the night sky is, quite literally, a time machine.</p>
    <h2>Scales of the Universe</h2>
    <p>The distances in astronomy are so vast that human units fail quickly. A few essential yardsticks:</p>
    <ul>
      <li><strong>Astronomical unit (AU)</strong> &mdash; the average Earth&ndash;Sun distance, about 150 million km. Useful inside the Solar System.</li>
      <li><strong>Light-year (ly)</strong> &mdash; the distance light travels in one year, about 9.46 trillion km. Useful for stars and nearby galaxies.</li>
      <li><strong>Parsec (pc)</strong> &mdash; roughly 3.26 ly; the natural unit of stellar parallax.</li>
      <li><strong>Megaparsec (Mpc)</strong> &mdash; a million parsecs, used for galaxy distances.</li>
    </ul>
    <p>Earth is roughly 12,700 km across. The Sun is about 1.4 million km across, 100 Earths wide. The nearest star beyond the Sun is 4.24 light-years away; the Milky Way is about 100,000 light-years across; and the observable universe is roughly 93 billion light-years in diameter. These jumps of scale are so steep that most beginners find them disorienting, and that is part of the point: astronomy forces us to think in orders of magnitude.</p>
    <h2>The Celestial Sphere</h2>
    <p>For everyday sky observation, astronomers still use the ancient fiction of a <strong>celestial sphere</strong> &mdash; an imaginary dome on which stars appear fixed. Earth&rsquo;s rotation makes this sphere seem to spin once per day; its orbit around the Sun makes the Sun appear to drift eastward through the zodiacal constellations once per year along a path called the <em>ecliptic</em>.</p>
  `,
  terms: [
    ['Astronomy','The scientific study of objects and phenomena beyond Earth&rsquo;s atmosphere.'],
    ['Astronomical unit (AU)','The average Earth&ndash;Sun distance, about 150 million kilometers.'],
    ['Light-year','The distance light travels in one year in a vacuum, about 9.46 trillion km.'],
    ['Parsec','A distance of about 3.26 light-years, defined by stellar parallax geometry.'],
    ['Celestial sphere','An imaginary sphere on which celestial objects appear projected from Earth.'],
    ['Ecliptic','The apparent annual path of the Sun against the background stars.'],
    ['Order of magnitude','A factor of ten used to compare quantities that differ enormously.'],
    ['Observable universe','The region of the universe from which light has had time to reach us since the Big Bang.'],
    ['Scientific method','Iterative cycle of observation, hypothesis, prediction, and testing.']
  ],
  quiz: [
    { q: 'Which unit is most convenient for describing distances between stars in our neighborhood?',
      opts: ['Kilometer','Astronomical unit','Light-year','Meter'], a: 2,
      exp: 'Stellar distances are vast compared with the AU but small compared with galactic distances.' },
    { q: 'One astronomical unit is approximately:',
      opts: ['150,000 km','1.5 million km','150 million km','1.5 billion km'], a: 2,
      exp: 'It is the mean Earth&ndash;Sun distance, about 1.5 &times; 10&#8308; km.' },
    { q: 'Why do astronomers say the night sky is a time machine?',
      opts: ['Stars move backward in time','Light takes time to travel, so distant objects are seen as they were in the past','Telescopes speed time up','The Earth spins'], a: 1,
      exp: 'We always see objects as they were when the light left them.' },
    { q: 'The ecliptic is best described as:',
      opts: ['The Moon&rsquo;s orbit','The apparent path of the Sun through the stars over a year','Earth&rsquo;s equator','A type of eclipse'], a: 1,
      exp: 'It is the projection of Earth&rsquo;s orbital plane onto the celestial sphere.' },
    { q: 'A parsec is roughly how many light-years?',
      opts: ['0.33','1','3.26','10'], a: 2,
      exp: 'One parsec &asymp; 3.26 ly, derived from parallax of one arcsecond over 1 AU.' }
  ]
});

CH.push({
  id:'history', title:'Historical Astronomy', sub:'From Ptolemy to Newton',
  html: `
    <p>Astronomy has the longest written record of any science. Babylonian scribes catalogued eclipses, Greek geometers measured Earth&rsquo;s circumference, and Chinese court astronomers tracked comets long before telescopes existed. Yet the story most often told in an introductory course is the slow replacement of an Earth-centered cosmos with a Sun-centered one.</p>
    <h2>Ptolemy&rsquo;s Geocentric Universe</h2>
    <p>Around 150 CE the Alexandrian scholar <strong>Claudius Ptolemy</strong> compiled a mathematical model in which Earth sat at the center of the cosmos and the Sun, Moon, and planets moved on combinations of circles called <em>deferents</em> and <em>epicycles</em>. It was not philosophical stubbornness that kept this model alive for fourteen centuries; it genuinely predicted planetary positions reasonably well, especially after repeated tinkering.</p>
    <h2>Copernicus and the Heliocentric Model</h2>
    <p><strong>Nicolaus Copernicus</strong> (1473&ndash;1543) argued that the apparent motions of the planets are far simpler to describe if the Sun &mdash; not Earth &mdash; sits at the center and the planets, including Earth, orbit it. His model still used perfect circles, so it was not immediately more accurate than Ptolemy&rsquo;s, but it was fundamentally simpler and put retrograde motion down to a straightforward line-of-sight effect as the faster Earth overtook a slower outer planet.</p>
    <h2>Kepler&rsquo;s Three Laws</h2>
    <p>Using the extraordinary naked-eye observations of <strong>Tycho Brahe</strong>, the German mathematician <strong>Johannes Kepler</strong> finally broke the circle spell. He found that planets move in ellipses (Law 1), sweep out equal areas in equal times (Law 2), and obey a simple relation between their orbital periods and their mean distances from the Sun: <code>P&sup2; = a&sup3;</code> in AU and years (Law 3).</p>
    <h2>Galileo and Newton</h2>
    <p><strong>Galileo Galilei</strong> turned one of the first practical telescopes to the sky in 1609 and found mountains on the Moon, phases of Venus, four moons around Jupiter, and countless stars in the Milky Way &mdash; observations that were hard to square with an Earth-centered cosmos. Finally, <strong>Isaac Newton</strong> (1687) provided the missing physics: a universal law of gravitation and three laws of motion from which Kepler&rsquo;s empirical rules fall out as theorems. After Newton, astronomy and physics were permanently fused.</p>
  `,
  terms: [
    ['Geocentric model','An Earth-centered model of the cosmos such as Ptolemy&rsquo;s.'],
    ['Heliocentric model','A Sun-centered model of the cosmos, proposed in its modern form by Copernicus.'],
    ['Epicycle','A small circle whose center moves along a larger circle, used in Ptolemaic astronomy.'],
    ['Retrograde motion','The apparent temporary westward drift of a planet among the stars.'],
    ['Kepler&rsquo;s first law','Planets orbit the Sun on ellipses with the Sun at one focus.'],
    ['Kepler&rsquo;s second law','A line from the Sun to a planet sweeps out equal areas in equal times.'],
    ['Kepler&rsquo;s third law','The square of a planet&rsquo;s period equals the cube of its semi-major axis in appropriate units.'],
    ['Universal gravitation','Newton&rsquo;s law that every mass attracts every other mass with a force proportional to their product and inverse-square with distance.'],
    ['Tycho Brahe','Danish astronomer whose precise pre-telescope observations underpinned Kepler&rsquo;s work.']
  ],
  quiz: [
    { q: 'Retrograde motion of an outer planet is explained in a heliocentric model by:',
      opts: ['Real looping of the planet','Earth passing the slower outer planet','The planet stopping briefly','Gravity from the Moon'], a: 1,
      exp: 'It is a line-of-sight effect as the faster Earth overtakes a slower outer planet.' },
    { q: 'Kepler&rsquo;s first law states that planetary orbits are:',
      opts: ['Perfect circles','Ellipses with the Sun at one focus','Spirals','Hyperbolas'], a: 1,
      exp: 'This broke the ancient insistence on circular orbits.' },

CH.push({
  id:'light', title:'Light and Telescopes', sub:'How We Actually See the Universe',
  html: `
    <p>Almost everything astronomers know about the universe has come from studying <strong>electromagnetic radiation</strong> &mdash; light in its many wavelengths. Understanding what light is, how it is produced, and how it interacts with matter is therefore a central topic in any intro astronomy course.</p>
    <h2>The Electromagnetic Spectrum</h2>
    <p>Visible light is a narrow band within a much broader spectrum that also contains <em>radio waves</em>, <em>microwaves</em>, <em>infrared</em>, <em>ultraviolet</em>, <em>X-rays</em>, and <em>gamma rays</em>. All travel at the same speed in vacuum &mdash; about 300,000 km/s &mdash; and differ only in wavelength (and therefore energy per photon). Each band tells a different story: cold dust glows in the infrared, hot coronae shine in X-rays, and the afterglow of the Big Bang reaches us as microwaves.</p>
    <h2>Light as Waves and Photons</h2>
    <p>Light behaves as both a wave and a stream of particles called <strong>photons</strong>. A photon&rsquo;s energy is proportional to the frequency: <code>E = h&nu;</code>, where <em>h</em> is Planck&rsquo;s constant. Higher-energy photons (gamma, X-ray) can ionize atoms; lower-energy photons (radio, microwave) pass through most materials unhindered.</p>
    <h2>Spectroscopy</h2>
    <p>When the light from a star or galaxy is dispersed into a spectrum, it reveals a pattern of bright or dark lines at specific wavelengths. These <strong>spectral lines</strong> correspond to electron transitions in specific atoms and molecules, so the spectrum functions like a chemical fingerprint. Spectroscopy lets us read the temperature, composition, pressure, and motion of objects trillions of miles away.</p>
    <h2>Telescopes</h2>
    <p>An astronomical telescope has two jobs: gather as much light as possible and bring it to a sharp focus. <em>Refractors</em> use lenses; <em>reflectors</em> use mirrors. Because large mirrors are easier to build and support than large lenses, nearly every major modern telescope is a reflector. Three key performance measures are <strong>light-gathering power</strong> (proportional to area), <strong>resolving power</strong> (proportional to aperture, inversely to wavelength), and <strong>field of view</strong>.</p>
    <p>Putting telescopes above the atmosphere (Hubble, JWST) sidesteps atmospheric blurring and opens bands like the far-UV and mid-infrared that ground instruments cannot reach.</p>
  `,

CH.push({
  id:'sun', title:'The Sun', sub:'Our Local Star',
  html: `
    <p>The <strong>Sun</strong> is an average, middle-aged star that happens to be close enough to study in magnificent detail. It accounts for more than 99.8% of the mass of the Solar System and supplies essentially all of the energy that drives Earth&rsquo;s climate, weather, and biosphere. Understanding the Sun is therefore also the first step toward understanding all the other stars.</p>
    <h2>Interior Structure</h2>
    <p>From the inside out, the Sun is made of a <strong>core</strong> where temperatures reach about 15 million K and hydrogen fuses into helium; a <strong>radiative zone</strong> in which photons slowly random-walk outward through extremely dense plasma; and a <strong>convective zone</strong>, where hot parcels of gas rise and cool ones sink, producing the granulated surface we see. Above this lies the visible <strong>photosphere</strong>, the thin <strong>chromosphere</strong>, and the vast, tenuous, million-degree <strong>corona</strong> that extends into the Solar System as the <em>solar wind</em>.</p>
    <h2>Nuclear Fusion in the Core</h2>
    <p>The Sun generates energy by the <strong>proton&ndash;proton (pp) chain</strong>, a sequence of reactions that fuses four hydrogen nuclei into one helium nucleus, releasing about 0.7% of the starting mass as energy via Einstein&rsquo;s <code>E = mc&sup2;</code>. Each second the Sun converts roughly 600 million tons of hydrogen into helium and loses about 4 million tons of matter to energy &mdash; an output of 3.8 &times; 10&sup2;&#8310; watts.</p>
    <h2>Solar Activity</h2>
    <p>The Sun is not a quiet furnace. It has a powerful magnetic field that becomes twisted by differential rotation, producing <strong>sunspots</strong>, <strong>solar flares</strong>, and <strong>coronal mass ejections (CMEs)</strong>. These phenomena wax and wane on an approximately 11-year cycle. Large CMEs can disturb Earth&rsquo;s magnetosphere, producing auroras and occasionally damaging power grids and satellites &mdash; a field known as <em>space weather</em>.</p>
    <h2>The Solar Neutrino Problem</h2>
    <p>Nuclear fusion also produces ghostly particles called <strong>neutrinos</strong> that pass right through the Sun and out into space. For decades, detected neutrinos numbered only a third of what theory predicted. The resolution, confirmed in 2001, was that neutrinos <em>oscillate</em> between three flavors on the way to Earth &mdash; a discovery that earned a Nobel Prize and proved neutrinos have mass.</p>
  `,

CH.push({
  id:'terrestrial', title:'Terrestrial Planets', sub:'Mercury, Venus, Earth, and Mars',
  html: `
    <p>The four innermost planets of the Solar System &mdash; <strong>Mercury</strong>, <strong>Venus</strong>, <strong>Earth</strong>, and <strong>Mars</strong> &mdash; are called <strong>terrestrial</strong> (Earth-like) planets. They are small, dense, rocky worlds with metal cores, thin or modest atmospheres, and relatively few moons. They formed in the hot inner region of the proto-planetary disk, where only silicates and metals could condense.</p>
    <h2>Mercury</h2>
    <p>Mercury is the smallest planet and closest to the Sun. It has no atmosphere to speak of, so its surface swings from about 430 &deg;C in daylight to &minus;180 &deg;C at night. Its cratered surface resembles the Moon, but an enormous iron core &mdash; proportionally the largest of any planet &mdash; gives it a surprisingly strong magnetic field for such a small world.</p>
    <h2>Venus</h2>
    <p>Venus is nearly Earth&rsquo;s twin in size and mass, yet the two worlds diverged dramatically. A runaway <strong>greenhouse effect</strong> trapped carbon dioxide in a crushing 92-bar atmosphere, and the surface sizzles at about 465 &deg;C &mdash; hotter than Mercury despite being farther from the Sun. Clouds of sulfuric acid hide a volcanic landscape that appears to have been completely resurfaced several hundred million years ago.</p>
    <h2>Earth</h2>
    <p>Earth is the only planet known to have liquid water on its surface and the only one known to host life. Its active <em>plate tectonics</em> recycle crust, sustain a carbon cycle that stabilizes climate, and produce mountain belts, earthquakes, and volcanoes. A molten outer core generates a global magnetic field that shields the surface from much of the solar wind.</p>
    <h2>Mars</h2>
    <p>Mars is roughly half Earth&rsquo;s diameter and has a thin carbon-dioxide atmosphere about 1% as dense as Earth&rsquo;s. Its surface preserves clear evidence of ancient rivers, lakes, and possibly seas, but liquid water cannot persist there today. Seasonal polar caps made of water and CO&#8322; ice, enormous shield volcanoes like Olympus Mons, and the canyon system Valles Marineris make it one of the most diverse landscapes in the Solar System and a prime target in the search for past life.</p>
  `,

CH.push({
  id:'jovian', title:'Jovian Planets', sub:'Jupiter, Saturn, Uranus, Neptune',
  html: `
    <p>Beyond the asteroid belt lie four giant worlds that dwarf the terrestrial planets in size and mass. Jupiter and Saturn are <strong>gas giants</strong> dominated by hydrogen and helium, while Uranus and Neptune are often called <strong>ice giants</strong> because water, methane, and ammonia ices make up a larger fraction of their interiors. All four have ring systems and extensive systems of moons.</p>
    <h2>Jupiter</h2>
    <p>Jupiter is the largest planet &mdash; more than twice the mass of all other planets combined. Its banded cloud tops show bright <em>zones</em> and dark <em>belts</em> shaped by rapid rotation (a day lasts under 10 hours) and powerful atmospheric jets. The <strong>Great Red Spot</strong> is a storm bigger than Earth that has persisted for at least several centuries. Jupiter has no solid surface; pressure rises continuously until hydrogen transitions into a metallic fluid that drives an immense magnetic field.</p>
    <h2>Saturn</h2>
    <p>Saturn is famous for its spectacular rings, which are made of billions of particles of water ice ranging from dust grains to house-sized chunks. Despite their visual prominence, they are extraordinarily thin &mdash; typically a few tens of meters vertically over a disk more than 270,000 km across. Saturn&rsquo;s density is so low (less than that of water) that it would float in a very big bathtub.</p>
    <h2>Uranus and Neptune</h2>
    <p>Uranus is tipped on its side, rotating almost along its orbital plane &mdash; likely the result of a giant impact long ago. Its pale blue-green color comes from methane absorbing red light. Neptune is smaller but denser and shows the strongest winds in the Solar System, with supersonic jets and transient dark storms.</p>
    <h2>Moons of the Giants</h2>
    <p>The Jovian planets are miniature solar systems. Jupiter&rsquo;s four <strong>Galilean moons</strong> &mdash; Io, Europa, Ganymede, and Callisto &mdash; range from a sulfur volcano world to an ice-covered ocean candidate. Saturn&rsquo;s Titan has a thick nitrogen atmosphere and methane lakes; Enceladus erupts water from cracks at its south pole. Neptune&rsquo;s Triton orbits backwards and may be a captured Kuiper Belt object. These moons are among the most promising places in the Solar System to look for life.</p>
  `,

CH.push({
  id:'small-bodies', title:'Small Bodies of the Solar System', sub:'Asteroids, Comets, Meteoroids, Dwarf Planets',
  html: `
    <p>Beyond the classical planets, the Solar System contains countless smaller objects whose study has become one of the most active frontiers in planetary science. These leftovers from the era of planet formation are chemical time capsules, and a few of them occasionally pose serious hazards.</p>
    <h2>Asteroids</h2>
    <p>Most <strong>asteroids</strong> orbit in the <strong>asteroid belt</strong> between Mars and Jupiter, a region where Jupiter&rsquo;s gravity prevented a planet from forming. They range in size from the dwarf planet Ceres (~940 km across) to pebbles. Spectra reveal three main compositional types: rocky (S-type), carbonaceous (C-type), and metallic (M-type). Some asteroids &mdash; the <em>near-Earth asteroids</em> &mdash; cross Earth&rsquo;s orbit and are tracked carefully for impact hazard.</p>
    <h2>Comets</h2>
    <p><strong>Comets</strong> are icy leftovers from the outer Solar System. When a comet&rsquo;s elliptical orbit brings it close to the Sun, its surface ices sublime, releasing gas and dust that form a bright <em>coma</em> and two <strong>tails</strong>: a straight plasma (ion) tail pushed by the solar wind and a curved dust tail pushed by radiation pressure. Short-period comets come from the <strong>Kuiper Belt</strong> beyond Neptune; long-period comets come from the <strong>Oort Cloud</strong>, a spherical reservoir of icy bodies that may extend a light-year from the Sun.</p>
    <h2>Meteoroids, Meteors, and Meteorites</h2>
    <p>A grain of asteroid or comet dust drifting in space is a <strong>meteoroid</strong>. When it strikes the atmosphere and glows as it burns up, it is a <strong>meteor</strong> (or shooting star). If a piece survives to hit the ground, it is a <strong>meteorite</strong>. Annual meteor showers occur when Earth crosses a trail of debris left by a comet.</p>
    <h2>Dwarf Planets</h2>
    <p>A <strong>dwarf planet</strong> is a body that orbits the Sun, is massive enough to pull itself into a round shape, but has not cleared its orbital neighborhood of other bodies. The canonical examples are <em>Ceres</em> in the asteroid belt and <em>Pluto</em>, <em>Eris</em>, <em>Haumea</em>, and <em>Makemake</em> in the outer Solar System. Pluto&rsquo;s 2006 reclassification was controversial but reflected the discovery that it is one of many similar Kuiper Belt objects.</p>
  `,

CH.push({
  id:'stars-properties', title:'Stars: Properties and Classification', sub:'Reading the Lives of Stars from Their Light',
  html: `
    <p>Looking at the sky with only the naked eye, stars seem to vary in just one way &mdash; some are bright, others dim. Spectra and precise photometry reveal a much richer picture: stars differ dramatically in <strong>temperature</strong>, <strong>luminosity</strong>, <strong>mass</strong>, <strong>radius</strong>, and <strong>composition</strong>, and these properties are not independent.</p>
    <h2>Distance and Parallax</h2>
    <p>The most direct way to measure a star&rsquo;s distance is <strong>stellar parallax</strong>: the tiny annual shift in the star&rsquo;s apparent position caused by Earth&rsquo;s orbital motion. A parallax of one arcsecond corresponds to a distance of one parsec. Parallax works out to several thousand parsecs with spacecraft like Gaia; beyond that, astronomers rely on <em>standard candles</em> whose intrinsic brightness is known.</p>
    <h2>Apparent vs. Absolute Magnitude</h2>
    <p>Brightness in astronomy is usually reported as a <strong>magnitude</strong>. <em>Apparent magnitude</em> describes how bright a star looks from Earth; <em>absolute magnitude</em> is how bright it would look at a standard distance of 10 parsecs. The difference between the two (the <em>distance modulus</em>) gives the distance.</p>
    <h2>Spectral Classification</h2>
    <p>Stellar spectra are grouped into classes <strong>O, B, A, F, G, K, M</strong> &mdash; traditionally memorized as &ldquo;Oh Be A Fine Girl/Guy, Kiss Me&rdquo; &mdash; arranged by decreasing surface temperature. O stars are very hot, blue, and rare; M stars are cool, red, and by far the most common. Each class is subdivided 0&ndash;9, and a luminosity class (I&ndash;V) distinguishes giants from dwarfs.</p>
    <h2>The Hertzsprung&ndash;Russell Diagram</h2>
    <p>Plotting luminosity against temperature (or spectral type) produces the <strong>Hertzsprung&ndash;Russell (H&ndash;R) diagram</strong>, one of the single most powerful tools in astronomy. Most stars lie along a diagonal band called the <strong>main sequence</strong>, where they spend most of their lives fusing hydrogen in their cores. Off the main sequence, giants and supergiants populate the upper right; white dwarfs occupy the lower left.</p>
  `,

CH.push({
  id:'evolution', title:'Stellar Evolution and Death', sub:'How Stars Live and How They End',
  html: `
    <p>A star is in a long battle between two forces: gravity tries to squeeze it into itself, while pressure from hot, radiating gas tries to push it apart. As long as nuclear fusion supplies energy at the right rate, the two are in balance &mdash; a state called <strong>hydrostatic equilibrium</strong>. A star&rsquo;s life is essentially the story of how this balance shifts as it runs out of fuel.</p>
    <h2>Birth from Clouds</h2>
    <p>Stars form when cold, dense clumps in <strong>giant molecular clouds</strong> collapse under their own gravity. As a <em>protostar</em> contracts, its core heats up; when the temperature reaches about 10 million K, hydrogen fusion ignites and the object becomes a true star on the main sequence.</p>
    <h2>Main Sequence and Beyond</h2>
    <p>Stars spend around 90% of their lives on the main sequence. Their lifetimes depend strongly on mass &mdash; a massive O star may live only a few million years, while a red dwarf can last trillions. When the core hydrogen is exhausted, the core contracts and heats the surrounding shell; the outer envelope expands, and the star becomes a <strong>red giant</strong>.</p>
    <h2>Low-Mass Deaths: Planetary Nebulae</h2>
    <p>A Sun-like star eventually fuses helium into carbon and oxygen in its core, then runs out of central fuel. It sheds its outer layers as a beautiful, short-lived <strong>planetary nebula</strong>, leaving behind a dense, Earth-sized <strong>white dwarf</strong> supported by <em>electron degeneracy pressure</em>.</p>
    <h2>High-Mass Deaths: Supernovae</h2>
    <p>Stars above roughly 8 solar masses fuse successively heavier elements in an onion-like structure until an iron core forms. Iron cannot release energy by fusion, so the core collapses in less than a second and rebounds as a <strong>core-collapse supernova</strong>. What remains is either a <strong>neutron star</strong> (a 20-km-wide ball of nuclear matter, often seen as a pulsar) or, for the most massive progenitors, a <strong>black hole</strong>. Supernovae scatter heavy elements into the galaxy, seeding the next generation of stars and planets.</p>

    <p>The hazy band of light called the <strong>Milky Way</strong> is our edge-on view of the galaxy we live in. Modern measurements place the Sun about 26,000 light-years from the center of a <strong>barred spiral galaxy</strong> some 100,000 light-years across, containing a few hundred billion stars.</p>

    <p>Stars in the disk orbit the galactic center, but they do not do so like planets around the Sun. Instead of falling off with distance, orbital velocities stay roughly flat out to huge radii &mdash; a <strong>flat rotation curve</strong>. This is the classical evidence that the visible stars are embedded in a much larger halo of invisible <strong>dark matter</strong> whose gravity dominates the Galaxy&rsquo;s outer regions.</p>

    <p>Until the 1920s many astronomers thought the Milky Way <em>was</em> the entire universe. Then Edwin Hubble&rsquo;s measurements of Cepheid variable stars in what was then called the Andromeda Nebula showed it to be a separate galaxy, far beyond our own. Today we know the observable universe contains hundreds of billions of galaxies, arranged in clusters, superclusters, and filaments.</p>
    <h2>Hubble&rsquo;s Tuning Fork</h2>
    <p>Hubble organized galaxies by their visual appearance into a scheme that still serves as a rough starting point:</p>
    <ul>
      <li><strong>Elliptical</strong> (E0&ndash;E7) &mdash; smooth, featureless ellipsoids dominated by old stars, with little gas and dust and little current star formation.</li>
      <li><strong>Spiral</strong> (Sa&ndash;Sc) &mdash; disk galaxies with a central bulge and spiral arms containing young stars, gas, and dust.</li>
      <li><strong>Barred spiral</strong> (SBa&ndash;SBc) &mdash; spirals with a prominent linear bar across the bulge.</li>
      <li><strong>Lenticular</strong> (S0) &mdash; disk galaxies without obvious spiral arms, intermediate between ellipticals and spirals.</li>

    <h2>Active Galactic Nuclei</h2>

  html: `
    <p><strong>Cosmology</strong> is the study of the universe as a whole &mdash; its origin, evolution, structure, and ultimate fate. For most of history this was a philosophical topic, but in the 20th century it became an empirical science with testable predictions.</p>
    <h2>Hubble&rsquo;s Law</h2>
    <p>In 1929 Edwin Hubble showed that, with few exceptions, distant galaxies are <em>receding</em> from us, and that the recession velocity is roughly proportional to distance: <code>v = H&#8320; &times; d</code>. This is not because we occupy a special place &mdash; from any galaxy, all other galaxies would look similarly receding. The relationship is interpreted as evidence that <strong>space itself is expanding</strong>, carrying galaxies apart. The constant <em>H&#8320;</em> is the <strong>Hubble constant</strong>, currently measured at roughly 67&ndash;73 km/s per megaparsec.</p>
    <h2>The Big Bang</h2>
    <p>Running the expansion backwards leads to the conclusion that the observable universe was once extraordinarily dense and hot, and that it has been expanding and cooling for about 13.8 billion years. This <strong>Big Bang</strong> model makes three central predictions that have all been confirmed: the expansion itself; the abundances of light elements (hydrogen, helium, lithium) produced in the first few minutes of <strong>Big Bang nucleosynthesis</strong>; and a low-temperature microwave glow left over from the era when atoms first formed.</p>
    <h2>The Cosmic Microwave Background</h2>
    <p>That glow is the <strong>cosmic microwave background (CMB)</strong>, discovered in 1965. It fills the entire sky with an almost perfectly uniform 2.7 K thermal radiation. Tiny fluctuations of about one part in 100,000 encode the seeds of all later structure, and their statistical pattern is the single richest source of cosmological information we have.</p>
    <h2>Inflation</h2>
    <p>To explain why the CMB is so smooth and the geometry of space so nearly flat, modern cosmology invokes a brief but enormous burst of expansion called <strong>cosmic inflation</strong> in the first fraction of a second. Inflation stretches initial quantum fluctuations to cosmic sizes, providing the initial conditions for everything later.</p>

    <p>One of the most startling results of modern astronomy is that nearly everything in the universe is invisible. Ordinary atomic matter &mdash; the stuff of stars, planets, and people &mdash; accounts for only about 5% of the total energy content. The remaining 95% is made up of two mysterious ingredients: <strong>dark matter</strong> (about 27%) and <strong>dark energy</strong> (about 68%).</p>
    <h2>Evidence for Dark Matter</h2>
    <p>The case for dark matter rests on multiple independent lines of evidence, all pointing in the same direction:</p>
    <ul>
      <li><strong>Galaxy rotation curves</strong> &mdash; disk galaxies rotate too fast at large radii for their visible mass alone.</li>
      <li><strong>Galaxy cluster dynamics</strong> &mdash; galaxies in clusters move too quickly to be held together by visible mass; Fritz Zwicky noticed this in the 1930s.</li>
      <li><strong>Gravitational lensing</strong> &mdash; the bending of light around clusters maps far more mass than the stars and gas account for.</li>
      <li><strong>CMB acoustic peaks</strong> &mdash; the pattern of fluctuations requires a non-baryonic component.</li>
      <li><strong>Bullet Cluster</strong> &mdash; after a collision between two clusters, gravitational lensing shows mass offset from the hot gas, which is hard to explain without collisionless dark matter.</li>

    <h2>What Is Dark Matter?</h2>
    <p>We still do not know. The leading candidates are <em>weakly interacting massive particles</em> (WIMPs), <em>axions</em>, and other particles beyond the Standard Model. Extensive direct-detection and accelerator experiments have so far failed to catch one, making the mystery only deeper.</p>

    <p>Are we alone? Astronomers have been pursuing this ancient question with increasingly concrete tools. <strong>Astrobiology</strong> is the interdisciplinary science of life in the universe &mdash; its origins, its distribution, and its detectability.</p>
    <h2>Requirements for Life as We Know It</h2>
    <p>Every form of life on Earth shares four essentials: a <strong>liquid solvent</strong> (water), a source of <strong>energy</strong>, certain <strong>chemical building blocks</strong> (especially carbon compounds), and <strong>stability</strong> over a long enough time for complex chemistry to develop. These requirements define the astrobiologist&rsquo;s search targets.</p>
    <h2>The Habitable Zone</h2>
    <p>The <strong>habitable zone</strong> around a star is the range of orbital distances over which a rocky planet could sustain liquid water on its surface given a modest atmosphere. It is sometimes called the &ldquo;Goldilocks zone&rdquo;: not too hot, not too cold. A cooler star has a closer, narrower habitable zone; a hotter star has a wider one, but its shorter lifetime may leave less time for life to evolve.</p>
    <h2>Detecting Exoplanets</h2>
    <p>More than 5,000 <strong>exoplanets</strong> have been confirmed. The two most productive detection methods are:</p>
    <ul>
      <li><strong>Radial velocity</strong> &mdash; the star wobbles slightly toward and away from us as a planet tugs it; Doppler shifts reveal the planet&rsquo;s minimum mass and orbit.</li>
      <li><strong>Transit</strong> &mdash; a planet crossing in front of its star briefly dims the star&rsquo;s light. Missions like Kepler and TESS found thousands of transiting worlds.</li>
    </ul>
    <p>Other techniques include <em>direct imaging</em>, <em>gravitational microlensing</em>, and <em>astrometry</em>. Together they reveal an astonishing diversity of worlds: hot Jupiters, super-Earths, ocean worlds, and Earth-sized planets around red dwarfs.</p>
    <h2>Biosignatures and the Drake Equation</h2>
    <p>An atmospheric <strong>biosignature</strong> is a gas or combination of gases whose presence strongly suggests life &mdash; oxygen together with methane, for instance, are out of chemical equilibrium and hard to maintain without biology. The <strong>Drake equation</strong> is a famous thought-experiment framework that breaks the number of detectable civilizations into factors such as the rate of star formation, the fraction of stars with planets, and the typical lifetime of technological civilizations.</p>

const tocList = $('toc-list');
CH.forEach((c,i)=>{
  const li = document.createElement('li');
  const a = document.createElement('a');
  a.href = '#'+c.id; a.dataset.idx = String(i);
  a.innerHTML = c.title + '<span class="dot"></span>';
  a.addEventListener('click', (e)=>{ e.preventDefault(); openChapter(i); closeTOC(); history.replaceState(null, '', '#'+c.id); });
  li.appendChild(a); tocList.appendChild(li);
});

function loadProgress(){ try{ return JSON.parse(localStorage.getItem(LS)||'{}'); } catch(e){ return {}; } }
function saveProgress(p){ localStorage.setItem(LS, JSON.stringify(p)); }
function markRead(id){ const p = loadProgress(); p.read = p.read || {}; p.read[id] = true; saveProgress(p); updateTOCState(); }
function markQuiz(id, score){ const p = loadProgress(); p.quiz = p.quiz || {}; p.quiz[id] = score; saveProgress(p); updateTOCState(); }

function updateTOCState(){
  const p = loadProgress();
  const anchors = document.querySelectorAll('#toc ol a');
  let done = 0;
  anchors.forEach((a,i)=>{
    const id = CH[i].id;
    a.classList.toggle('done', !!(p.read && p.read[id]));
    a.classList.toggle('quiz-done', !!(p.quiz && p.quiz[id] != null));
    if((p.read && p.read[id]) || (p.quiz && p.quiz[id] != null)) done++;
  });
  $('prog-bar').style.width = Math.round((done/CH.length)*100) + '%';
}

let currentIdx = 0;
function openChapter(i){
  currentIdx = i;
  const c = CH[i];
  document.querySelectorAll('#toc ol a').forEach(a=>a.classList.toggle('active', +a.dataset.idx === i));
  const body = $('chapter-body');
  let termsHtml = '';
  if(c.terms && c.terms.length){
    termsHtml = '<div class="key-terms"><div class="kt-title">Key Terms</div><dl>' +
      c.terms.map(([t,d])=>`<dt>${t}</dt><dd>${d}</dd>`).join('') +
      '</dl></div>';
  }
  const quizHtml = c.quiz && c.quiz.length ? `
    <div class="quiz" id="quiz-${c.id}">
      <h2>Chapter Quiz</h2>
      <div id="quiz-questions-${c.id}"></div>
      <div class="ch-actions">
        <button class="primary" id="quiz-check-${c.id}">Check Answers</button>
        <button id="quiz-reset-${c.id}">Reset</button>
      </div>
    </div>` : '';
  body.innerHTML = `
    <div class="ch-label">Chapter ${i+1}</div>
    <h1>${c.title}</h1>
    <div class="ch-sub">${c.sub||''}</div>
    ${c.html}
    ${termsHtml}
    ${quizHtml}
    <div class="ch-nav">
      <button id="ch-prev" ${i===0?'disabled':''}>&#9664; ${i>0?CH[i-1].title:'Previous'}</button>
      <button id="ch-next" class="primary" ${i===CH.length-1?'disabled':''}>${i<CH.length-1?CH[i+1].title:'Next'} &#9654;</button>
    </div>
  `;
  markRead(c.id);
  $('reader').scrollTo({top:0, behavior:'auto'});
  if($('ch-prev')) $('ch-prev').addEventListener('click', ()=>openChapter(Math.max(0,i-1)));
  if($('ch-next')) $('ch-next').addEventListener('click', ()=>openChapter(Math.min(CH.length-1,i+1)));
  if(c.quiz && c.quiz.length){ wireQuiz(c); }
}

function wireQuiz(c){
  const host = document.getElementById('quiz-questions-'+c.id);
  host.innerHTML = c.quiz.map((q, qi)=>`
    <div class="q" data-qi="${qi}">
      <div class="q-prompt">${qi+1}. ${q.q}</div>
      <div class="q-opts">
        ${q.opts.map((o,oi)=>`<label class="q-opt"><input type="radio" name="q-${c.id}-${qi}" value="${oi}"><span>${o}</span></label>`).join('')}
      </div>
      <div class="q-exp"></div>
    </div>
  `).join('');
  document.getElementById('quiz-check-'+c.id).addEventListener('click', ()=>{
    let score = 0;
    c.quiz.forEach((q, qi)=>{
      const div = host.querySelector('[data-qi="'+qi+'"]');
      const chosen = div.querySelector('input:checked');
      const val = chosen ? +chosen.value : -1;
      div.classList.add('revealed');
      const exp = div.querySelector('.q-exp');
      exp.innerHTML = (val===q.a?'Correct &mdash; ':'Incorrect &mdash; ') + q.exp;
      div.querySelectorAll('.q-opt').forEach((opt, oi)=>{
        opt.classList.remove('correct','incorrect');
        if(oi===q.a) opt.classList.add('correct');
        else if(oi===val) opt.classList.add('incorrect');
      });
      if(val===q.a) score++;
    });
    const pct = Math.round((score/c.quiz.length)*100);
    const scoreHtml = document.createElement('div');
    scoreHtml.className='quiz-score';
    scoreHtml.innerHTML = '<div class="n">'+score+' / '+c.quiz.length+'</div><div>Score: '+pct+'%</div>';
    const existing = host.parentElement.querySelector('.quiz-score');
    if(existing) existing.replaceWith(scoreHtml); else host.parentElement.insertBefore(scoreHtml, host);
    markQuiz(c.id, pct);
    toast('Quiz scored '+pct+'%');
  });
  document.getElementById('quiz-reset-'+c.id).addEventListener('click', ()=>{
    wireQuiz(c);
    const ex = host.parentElement.querySelector('.quiz-score'); if(ex) ex.remove();
  });
}

// Tabs
document.querySelectorAll('header .tabs button').forEach(b=>b.addEventListener('click', ()=>{
  document.querySelectorAll('header .tabs button').forEach(x=>x.classList.remove('active'));
  b.classList.add('active');
  document.querySelectorAll('.pane').forEach(p=>p.classList.remove('active'));
  $('pane-'+b.dataset.view).classList.add('active');
  if(b.dataset.view === 'glossary') renderGlossary();
  if(b.dataset.view === 'flash') initFlash();
}));

// Flashcards
const FC = { deck: [], idx: 0, flipped:false, scope:'all' };
function stripTags(s){ const d=document.createElement('div'); d.innerHTML=s; return d.textContent||d.innerText||''; }
function buildDeck(scope){
  if(scope === 'ch'){ const c = CH[currentIdx]; return (c.terms||[]).map(([t,d])=>({t:stripTags(t),d:stripTags(d),ch:c.title})); }
  return CH.flatMap(c=>(c.terms||[]).map(([t,d])=>({t:stripTags(t),d:stripTags(d),ch:c.title})));
}
function initFlash(){
  if(!FC.deck.length){ FC.deck = buildDeck('all'); FC.scope='all'; }
  showCard();
}
function showCard(){
  if(!FC.deck.length){ $('fc-text').textContent='No terms.'; return; }
  const c = FC.deck[FC.idx];
  $('fc-text').textContent = FC.flipped ? c.d : c.t;
  $('fc-card').classList.toggle('flipped', FC.flipped);
  $('fc-meta').textContent = (FC.idx+1)+' / '+FC.deck.length+' \u00b7 '+c.ch + (FC.flipped?' \u00b7 definition':' \u00b7 term');
}
$('fc-card').addEventListener('click', ()=>{ FC.flipped = !FC.flipped; showCard(); });
$('fc-flip').addEventListener('click', ()=>{ FC.flipped = !FC.flipped; showCard(); });
$('fc-prev').addEventListener('click', ()=>{ FC.idx=(FC.idx-1+FC.deck.length)%FC.deck.length; FC.flipped=false; showCard(); });
$('fc-next').addEventListener('click', ()=>{ FC.idx=(FC.idx+1)%FC.deck.length; FC.flipped=false; showCard(); });
$('fc-scope-all').addEventListener('click', ()=>{ FC.deck=buildDeck('all'); FC.idx=0; FC.flipped=false; FC.scope='all'; showCard(); toast('All terms ('+FC.deck.length+').'); });
$('fc-scope-ch').addEventListener('click', ()=>{ FC.deck=buildDeck('ch'); FC.idx=0; FC.flipped=false; FC.scope='ch'; showCard(); toast('Current chapter ('+FC.deck.length+').'); });
$('fc-shuffle').addEventListener('click', ()=>{ for(let i=FC.deck.length-1;i>0;i--){ const j=Math.floor(Math.random()*(i+1)); [FC.deck[i],FC.deck[j]]=[FC.deck[j],FC.deck[i]]; } FC.idx=0; FC.flipped=false; showCard(); toast('Shuffled.'); });

document.addEventListener('keydown', (e)=>{
  if(!document.getElementById('pane-flash').classList.contains('active')) return;
  if(e.target && (e.target.tagName==='INPUT'||e.target.tagName==='TEXTAREA')) return;
  if(e.key===' '||e.key==='Enter'){ e.preventDefault(); FC.flipped=!FC.flipped; showCard(); }
  else if(e.key==='ArrowLeft'){ FC.idx=(FC.idx-1+FC.deck.length)%FC.deck.length; FC.flipped=false; showCard(); }
  else if(e.key==='ArrowRight'){ FC.idx=(FC.idx+1)%FC.deck.length; FC.flipped=false; showCard(); }
});

// Glossary
function renderGlossary(){
  const q = ($('gl-search').value||'').toLowerCase().trim();
  const host = $('gl-list');
  const all = CH.flatMap(c=>(c.terms||[]).map(([t,d])=>({t:stripTags(t),d:stripTags(d),ch:c.title})));
  all.sort((a,b)=>a.t.localeCompare(b.t));
  const filt = q ? all.filter(e=>e.t.toLowerCase().includes(q) || e.d.toLowerCase().includes(q)) : all;
  host.innerHTML = filt.map(e=>`<div class="gl-entry"><span class="ch-ref">${escapeHtml(e.ch)}</span><span class="term">${escapeHtml(e.t)}</span><div class="def">${escapeHtml(e.d)}</div></div>`).join('') || '<div class="gl-entry">No terms match.</div>';
}
$('gl-search').addEventListener('input', renderGlossary);

// Top search across chapter body text and terms
function buildSearchIndex(){
  return CH.map((c,i)=>{
    const tmp = document.createElement('div'); tmp.innerHTML = c.html;
    const termsText = (c.terms||[]).map(t=>stripTags(t[0])+' '+stripTags(t[1])).join(' ');
    return { i, id:c.id, title:c.title, text: (c.title+' '+c.sub+' '+tmp.textContent+' '+termsText).replace(/\s+/g,' ').trim() };
  });
}
const SIDX = buildSearchIndex();
const search = $('search'), results = $('search-results');
search.addEventListener('input', ()=>{
  const q = search.value.trim().toLowerCase();
  if(q.length < 2){ results.classList.remove('show'); return; }
  const hits = [];
  SIDX.forEach(e=>{
    const t = e.text.toLowerCase();
    const idx = t.indexOf(q);
    if(idx >= 0){
      const lo = Math.max(0, idx-40), hi = Math.min(e.text.length, idx+q.length+80);
      const raw = e.text.slice(lo, hi);
      const re = new RegExp('('+q.replace(/[.*+?^${}()|[\]\\]/g,'\\$&')+')', 'ig');
      const snip = escapeHtml(raw).replace(re, '<mark>$1</mark>');
      hits.push({e, snip});
    }
  });
  if(!hits.length){ results.innerHTML='<div class="hit">No matches.</div>'; results.classList.add('show'); return; }
  results.innerHTML = hits.slice(0,20).map(h=>`<a class="hit" href="#${h.e.id}" data-idx="${h.e.i}"><div class="ch">Chapter ${h.e.i+1} &mdash; ${escapeHtml(h.e.title)}</div><div class="snip">${h.snip}</div></a>`).join('');
  results.classList.add('show');
  results.querySelectorAll('a.hit').forEach(a=>a.addEventListener('click', (e)=>{
    e.preventDefault();
    document.querySelector('header .tabs button[data-view="read"]').click();
    openChapter(+a.dataset.idx);
    results.classList.remove('show'); search.value=''; history.replaceState(null,'', '#'+a.getAttribute('href').slice(1));
  }));
});
document.addEventListener('click', (e)=>{ if(!results.contains(e.target) && e.target !== search) results.classList.remove('show'); });

// TOC mobile
function openTOC(){ document.querySelector('main').classList.add('toc-open'); }
function closeTOC(){ document.querySelector('main').classList.remove('toc-open'); }
$('toc-btn').addEventListener('click', openTOC);
$('scrim').addEventListener('click', closeTOC);

$('btn-reset-progress').addEventListener('click', ()=>{
  if(!confirm('Reset all reading and quiz progress?')) return;
  localStorage.removeItem(LS); updateTOCState(); toast('Progress reset.');
});

window.addEventListener('load', ()=>{
  const hash = (location.hash||'').slice(1);
  const i = Math.max(0, CH.findIndex(c=>c.id===hash));
  openChapter(i>=0?i:0);
  updateTOCState();
});
})();
</script>
