<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="description" content="Audiobook Player — a free, browser-based productivity tool from Korb Engineering. No signup, no downloads, works on mobile.">
<title>Audiobook Player</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --bg: #050a0f;
  --bg-card: #0a1520;
  --bg-card-hover: #0f1d2d;
  --bg-surface: #0d1825;
  --bg-input: #0a1520;
  --cyan: #00d4ff;
  --cyan-dim: #00d4ff44;
  --cyan-glow: #00d4ff33;
  --orange: #ff6600;
  --orange-dim: #ff660044;
  --text: #e0e8f0;
  --text-dim: #6a7a8a;
  --text-mid: #8a9aaa;
  --border: #1a2a3a;
  --danger: #ff3355;
  --success: #00cc88;
  --star: #ffaa00;
  --player-bg: linear-gradient(180deg, #0d1a28 0%, #081018 100%);
  --radius: 8px;
  --radius-lg: 12px;
}

html, body {
  font-family: 'JetBrains Mono', monospace;
  background: var(--bg);
  color: var(--text);
  min-height: 100vh;
  -webkit-font-smoothing: antialiased;
}

body { padding-bottom: 120px; }

/* Scrollbar */
::-webkit-scrollbar { width: 6px; }
::-webkit-scrollbar-track { background: var(--bg); }
::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }

/* Utility */
.hidden { display: none !important; }

button {
  font-family: inherit;
  cursor: pointer;
  border: none;
  background: none;
  color: var(--text);
  min-height: 48px;
  min-width: 48px;
  display: inline-flex;
  align-items: center;
  justify-content: center;
}

input, select, textarea {
  font-family: inherit;
  background: var(--bg-input);
  color: var(--text);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: 10px 14px;
  font-size:16px;
  outline: none;
  transition: border-color 0.2s;
}

input:focus, select:focus, textarea:focus {
  border-color: var(--cyan);
  box-shadow: 0 0 0 2px var(--cyan-dim);
}

textarea { resize: vertical; min-height: 80px; }
select { min-height: 48px; cursor: pointer; }

/* Header */
.header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 16px 20px;
  border-bottom: 1px solid var(--border);
  background: var(--bg-surface);
  position: sticky;
  top: 0;
  z-index: 90;
}

.header h1 {
  font-size: 18px;
  font-weight: 600;
  color: var(--cyan);
  letter-spacing: 1px;
}

.header-actions { display: flex; gap: 8px; }

.btn {
  padding: 8px 16px;
  border-radius: var(--radius);
  font-size: 12px;
  font-weight: 500;
  transition: all 0.2s;
  white-space: nowrap;
}

.btn-primary {
  background: var(--cyan);
  color: var(--bg);
}

.btn-primary:hover { background: #33ddff; box-shadow: 0 0 12px var(--cyan-dim); }

.btn-secondary {
  background: var(--bg-card);
  border: 1px solid var(--border);
}

.btn-secondary:hover { border-color: var(--cyan); }

.btn-danger { background: var(--danger); color: #fff; }
.btn-danger:hover { background: #ff5577; }

.btn-orange { background: var(--orange); color: #fff; }
.btn-orange:hover { background: #ff8833; }

.btn-sm { padding: 6px 12px; font-size: 11px; min-height: 36px; min-width: auto; }
.btn-icon { padding: 8px; border-radius: var(--radius); }
.btn-icon:hover { background: var(--bg-card-hover); }

/* Navigation tabs */
.nav-tabs {
  display: flex;
  gap: 4px;
  padding: 12px 20px;
  background: var(--bg-surface);
  border-bottom: 1px solid var(--border);
  overflow-x: auto;
}

.nav-tab {
  padding: 8px 16px;
  border-radius: var(--radius);
  font-size: 12px;
  color: var(--text-dim);
  transition: all 0.2s;
  white-space: nowrap;
}

.nav-tab:hover { color: var(--text); background: var(--bg-card); }
.nav-tab.active { color: var(--cyan); background: var(--cyan-dim); }

/* Toolbar */
.toolbar {
  display: flex;
  gap: 10px;
  padding: 12px 20px;
  flex-wrap: wrap;
  align-items: center;
}

.search-box {
  flex: 1;
  min-width: 200px;
  position: relative;
}

.search-box input {
  width: 100%;
  padding-left: 36px;
}

.search-box svg {
  position: absolute;
  left: 12px;
  top: 50%;
  transform: translateY(-50%);
  color: var(--text-dim);
  pointer-events: none;
}

.view-toggle { display: flex; gap: 2px; }
.view-toggle button {
  padding: 8px 10px;
  border-radius: var(--radius);
  color: var(--text-dim);
}
.view-toggle button.active { color: var(--cyan); background: var(--cyan-dim); }

/* Category pills */
.categories {
  display: flex;
  gap: 6px;
  padding: 0 20px 12px;
  overflow-x: auto;
  scrollbar-width: none;
}
.categories::-webkit-scrollbar { display: none; }

.cat-pill {
  padding: 6px 14px;
  border-radius: 20px;
  font-size: 11px;
  color: var(--text-dim);
  border: 1px solid var(--border);
  transition: all 0.2s;
  white-space: nowrap;
}

.cat-pill:hover { color: var(--text); border-color: var(--text-mid); }
.cat-pill.active { color: var(--cyan); border-color: var(--cyan); background: var(--cyan-dim); }

/* Library Grid */
.library-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
  gap: 16px;
  padding: 20px;
}

.book-card {
  background: var(--bg-card);
  border: 1px solid var(--border);
  border-radius: var(--radius-lg);
  overflow: hidden;
  cursor: pointer;
  transition: all 0.25s;
}

.book-card:hover {
  border-color: var(--cyan);
  transform: translateY(-2px);
  box-shadow: 0 8px 24px rgba(0,0,0,0.4);
}

.book-cover {
  width: 100%;
  aspect-ratio: 1;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 48px;
  font-weight: 700;
  color: rgba(255,255,255,0.15);
  position: relative;
  overflow: hidden;
}

.book-cover .cover-initial {
  font-size: 64px;
  font-weight: 700;
  opacity: 0.2;
  text-transform: uppercase;
}

.book-cover .progress-overlay {
  position: absolute;
  bottom: 0;
  left: 0;
  right: 0;
  height: 4px;
  background: var(--bg);
}

.book-cover .progress-overlay .progress-fill {
  height: 100%;
  background: var(--cyan);
  transition: width 0.3s;
  box-shadow: 0 0 8px var(--cyan-dim);
}

.book-info {
  padding: 12px;
}

.book-info h3 {
  font-size: 13px;
  font-weight: 600;
  margin-bottom: 4px;
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
}

.book-info .book-author {
  font-size: 11px;
  color: var(--text-dim);
  margin-bottom: 6px;
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
}

.book-info .book-meta {
  display: flex;
  justify-content: space-between;
  font-size: 10px;
  color: var(--text-mid);
}

/* Library List */
.library-list {
  padding: 0 20px 20px;
}

.list-item {
  display: flex;
  align-items: center;
  gap: 14px;
  padding: 12px 16px;
  border-bottom: 1px solid var(--border);
  cursor: pointer;
  transition: background 0.2s;
}

.list-item:hover { background: var(--bg-card); }

.list-cover {
  width: 48px;
  height: 48px;
  border-radius: var(--radius);
  display: flex;
  align-items: center;
  justify-content: center;
  font-weight: 700;
  font-size: 18px;
  color: rgba(255,255,255,0.2);
  flex-shrink: 0;
}

.list-info { flex: 1; min-width: 0; }
.list-info h3 { font-size: 13px; font-weight: 500; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.list-info p { font-size: 11px; color: var(--text-dim); }

.list-meta { text-align: right; font-size: 11px; color: var(--text-mid); flex-shrink: 0; }

/* Detail View */
.detail-view {
  max-width: 900px;
  margin: 0 auto;
  padding: 20px;
}

.detail-header {
  display: flex;
  gap: 24px;
  margin-bottom: 24px;
}

.detail-cover {
  width: 180px;
  height: 180px;
  border-radius: var(--radius-lg);
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 72px;
  font-weight: 700;
  color: rgba(255,255,255,0.15);
  flex-shrink: 0;
}

.detail-info { flex: 1; min-width: 0; }
.detail-info h2 { font-size: 22px; font-weight: 700; margin-bottom: 4px; }
.detail-info .detail-author { font-size: 14px; color: var(--text-mid); margin-bottom: 2px; }
.detail-info .detail-narrator { font-size: 12px; color: var(--text-dim); margin-bottom: 12px; }
.detail-info .detail-tags { display: flex; gap: 6px; flex-wrap: wrap; margin-bottom: 12px; }
.detail-info .tag { padding: 3px 10px; border-radius: 12px; font-size: 10px; background: var(--bg-card); border: 1px solid var(--border); color: var(--text-mid); }

.detail-actions { display: flex; gap: 8px; flex-wrap: wrap; }

.star-rating { display: flex; gap: 4px; margin-bottom: 12px; }
.star-rating button {
  color: var(--border);
  font-size: 20px;
  min-width: 32px;
  min-height: 32px;
  transition: color 0.15s;
}
.star-rating button.filled { color: var(--star); }
.star-rating button:hover { color: var(--star); }

.detail-progress {
  margin-bottom: 24px;
  padding: 16px;
  background: var(--bg-card);
  border-radius: var(--radius-lg);
  border: 1px solid var(--border);
}

.detail-progress-bar {
  height: 8px;
  background: var(--bg);
  border-radius: 4px;
  overflow: hidden;
  margin-bottom: 8px;
}

.detail-progress-bar .fill {
  height: 100%;
  background: linear-gradient(90deg, var(--cyan), var(--orange));
  border-radius: 4px;
  transition: width 0.3s;
}

.detail-progress-text {
  display: flex;
  justify-content: space-between;
  font-size: 11px;
  color: var(--text-dim);
}

/* Tabs in detail */
.detail-tabs {
  display: flex;
  gap: 4px;
  margin-bottom: 16px;
  border-bottom: 1px solid var(--border);
  padding-bottom: 8px;
}

.detail-tab {
  padding: 8px 16px;
  font-size: 12px;
  color: var(--text-dim);
  border-radius: var(--radius) var(--radius) 0 0;
  transition: all 0.2s;
}
.detail-tab:hover { color: var(--text); }
.detail-tab.active { color: var(--cyan); border-bottom: 2px solid var(--cyan); }

/* Chapter list */
.chapter-list { list-style: none; }
.chapter-item {
  display: flex;
  align-items: center;
  gap: 12px;
  padding: 10px 14px;
  border-radius: var(--radius);
  cursor: pointer;
  transition: background 0.2s;
  font-size: 13px;
}
.chapter-item:hover { background: var(--bg-card); }
.chapter-item.active { background: var(--cyan-dim); color: var(--cyan); }
.chapter-item.playing { background: var(--cyan-dim); }
.chapter-num { color: var(--text-dim); font-size: 11px; width: 28px; text-align: right; flex-shrink: 0; }
.chapter-name { flex: 1; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
.chapter-dur { color: var(--text-dim); font-size: 11px; flex-shrink: 0; }

/* Metadata form */
.meta-form { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
.meta-form label { display: flex; flex-direction: column; gap: 4px; font-size: 11px; color: var(--text-dim); }
.meta-form .full-width { grid-column: 1 / -1; }

/* Notes */
.notes-section {}
.note-input-row { display: flex; gap: 8px; margin-bottom: 16px; }
.note-input-row input { flex: 1; }
.note-item {
  display: flex;
  gap: 12px;
  padding: 10px 14px;
  background: var(--bg-card);
  border-radius: var(--radius);
  margin-bottom: 8px;
  align-items: flex-start;
}
.note-time {
  color: var(--cyan);
  font-size: 11px;
  cursor: pointer;
  flex-shrink: 0;
  padding: 2px 8px;
  background: var(--cyan-dim);
  border-radius: 4px;
}
.note-time:hover { background: var(--cyan); color: var(--bg); }
.note-text { font-size: 12px; color: var(--text-mid); flex: 1; }
.note-del { color: var(--text-dim); font-size: 11px; min-width: 32px; min-height: 32px; }
.note-del:hover { color: var(--danger); }

/* Bookmarks */
.bookmark-item {
  display: flex;
  gap: 12px;
  padding: 10px 14px;
  background: var(--bg-card);
  border-radius: var(--radius);
  margin-bottom: 8px;
  align-items: center;
  cursor: pointer;
  transition: background 0.2s;
}
.bookmark-item:hover { background: var(--bg-card-hover); }
.bookmark-chapter { font-size: 11px; color: var(--text-dim); }

/* Stats */
.stats-view {
  max-width: 900px;
  margin: 0 auto;
  padding: 20px;
}

.stats-grid {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
  gap: 16px;
  margin-bottom: 24px;
}

.stat-card {
  background: var(--bg-card);
  border: 1px solid var(--border);
  border-radius: var(--radius-lg);
  padding: 20px;
  text-align: center;
}

.stat-value {
  font-size: 28px;
  font-weight: 700;
  color: var(--cyan);
  margin-bottom: 4px;
}

.stat-label {
  font-size: 11px;
  color: var(--text-dim);
  text-transform: uppercase;
  letter-spacing: 1px;
}

.stat-breakdown {
  background: var(--bg-card);
  border: 1px solid var(--border);
  border-radius: var(--radius-lg);
  padding: 20px;
}

.stat-breakdown h3 {
  font-size: 14px;
  margin-bottom: 16px;
  color: var(--text-mid);
}

.breakdown-row {
  display: flex;
  align-items: center;
  gap: 12px;
  margin-bottom: 10px;
}

.breakdown-label { font-size: 12px; width: 100px; color: var(--text-dim); }
.breakdown-bar { flex: 1; height: 8px; background: var(--bg); border-radius: 4px; overflow: hidden; }
.breakdown-bar .fill { height: 100%; border-radius: 4px; }
.breakdown-val { font-size: 11px; color: var(--text-mid); width: 50px; text-align: right; }

/* Upload Modal */
.modal-overlay {
  position: fixed;
  inset: 0;
  background: rgba(0,0,0,0.7);
  z-index: 200;
  display: flex;
  align-items: center;
  justify-content: center;
  padding: 20px;
  backdrop-filter: blur(4px);
}

.modal {
  background: var(--bg-surface);
  border: 1px solid var(--border);
  border-radius: var(--radius-lg);
  width: 100%;
  max-width: 560px;
  max-height: 80vh;
  overflow-y: auto;
  padding: 24px;
}

.modal h2 {
  font-size: 18px;
  margin-bottom: 20px;
  color: var(--cyan);
}

.modal-actions {
  display: flex;
  gap: 8px;
  justify-content: flex-end;
  margin-top: 20px;
}

.drop-zone {
  border: 2px dashed var(--border);
  border-radius: var(--radius-lg);
  padding: 40px 20px;
  text-align: center;
  cursor: pointer;
  transition: all 0.2s;
  margin-bottom: 16px;
}

.drop-zone:hover, .drop-zone.dragover {
  border-color: var(--cyan);
  background: var(--cyan-dim);
}

.drop-zone p { font-size: 13px; color: var(--text-dim); margin-top: 8px; }
.drop-zone .drop-icon { font-size: 36px; color: var(--cyan); }

.file-list { margin-bottom: 16px; }
.file-item {
  display: flex;
  align-items: center;
  gap: 10px;
  padding: 8px 12px;
  background: var(--bg-card);
  border-radius: var(--radius);
  margin-bottom: 6px;
  font-size: 12px;
}
.file-item .fname { flex: 1; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
.file-item .fsize { color: var(--text-dim); flex-shrink: 0; }
.file-item .fremove { color: var(--text-dim); min-width: 32px; min-height: 32px; font-size: 14px; }
.file-item .fremove:hover { color: var(--danger); }

/* Empty state */
.empty-state {
  text-align: center;
  padding: 60px 20px;
  color: var(--text-dim);
}
.empty-state .empty-icon { font-size: 48px; margin-bottom: 16px; opacity: 0.3; }
.empty-state p { font-size: 14px; margin-bottom: 8px; }
.empty-state .hint { font-size: 12px; }

/* Player Bar */
.player-bar {
  position: fixed;
  bottom: 0;
  left: 0;
  right: 0;
  background: var(--player-bg);
  border-top: 1px solid var(--border);
  z-index: 100;
  transition: transform 0.3s;
}

.player-bar.inactive { transform: translateY(100%); }

.player-progress-container {
  position: relative;
  height: 4px;
  background: #1a2a3a;
  cursor: pointer;
}

.player-progress-fill {
  height: 100%;
  background: linear-gradient(90deg, var(--cyan), #00aaff);
  width: 0%;
  transition: width 0.1s linear;
  box-shadow: 0 0 10px var(--cyan-dim), 0 0 4px var(--cyan-glow);
  position: relative;
}

.player-progress-fill::after {
  content: '';
  position: absolute;
  right: -6px;
  top: -4px;
  width: 12px;
  height: 12px;
  background: var(--cyan);
  border-radius: 50%;
  box-shadow: 0 0 8px var(--cyan);
  opacity: 0;
  transition: opacity 0.2s;
}

.player-progress-container:hover .player-progress-fill::after { opacity: 1; }

.player-content {
  display: flex;
  align-items: center;
  gap: 12px;
  padding: 8px 16px;
  min-height: 72px;
}

.player-cover {
  width: 48px;
  height: 48px;
  border-radius: var(--radius);
  display: flex;
  align-items: center;
  justify-content: center;
  font-weight: 700;
  font-size: 18px;
  color: rgba(255,255,255,0.2);
  flex-shrink: 0;
}

.player-track-info {
  flex: 0 1 180px;
  min-width: 0;
}

.player-track-title {
  font-size: 12px;
  font-weight: 600;
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
}

.player-track-chapter {
  font-size: 10px;
  color: var(--text-dim);
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
}

.player-controls {
  display: flex;
  align-items: center;
  gap: 4px;
  flex-shrink: 0;
}

.player-controls button {
  color: var(--text-mid);
  transition: color 0.15s;
  border-radius: 50%;
}

.player-controls button:hover { color: var(--text); }

.player-controls .play-btn {
  width: 48px;
  height: 48px;
  background: var(--cyan);
  color: var(--bg);
  border-radius: 50%;
  margin: 0 4px;
  box-shadow: 0 0 16px var(--cyan-dim);
  transition: all 0.2s;
}

.player-controls .play-btn:hover {
  background: #33ddff;
  box-shadow: 0 0 24px var(--cyan-glow);
  transform: scale(1.05);
}

.player-time {
  font-size: 10px;
  color: var(--text-dim);
  white-space: nowrap;
  flex-shrink: 0;
  min-width: 90px;
  text-align: center;
}

.player-extras {
  display: flex;
  align-items: center;
  gap: 4px;
  margin-left: auto;
  flex-shrink: 0;
}

.player-extras button {
  font-size: 11px;
  color: var(--text-dim);
  padding: 6px 10px;
  border-radius: var(--radius);
  transition: all 0.15s;
}
.player-extras button:hover { color: var(--text); background: var(--bg-card); }
.player-extras button.active { color: var(--orange); }

.speed-btn { min-width: 48px; }

.volume-wrap {
  display: flex;
  align-items: center;
  gap: 6px;
}

.volume-slider {
  width: 80px;
  height: 4px;
  -webkit-appearance: none;
  appearance: none;
  background: var(--border);
  border-radius: 2px;
  outline: none;
  border: none;
  padding: 0;
  min-height: auto;
}

.volume-slider::-webkit-slider-thumb {
  -webkit-appearance: none;
  width: 14px;
  height: 14px;
  background: var(--cyan);
  border-radius: 50%;
  cursor: pointer;
}

.sleep-menu, .speed-menu {
  position: absolute;
  bottom: 100%;
  right: 0;
  background: var(--bg-surface);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: 4px;
  margin-bottom: 8px;
  min-width: 140px;
  box-shadow: 0 -4px 16px rgba(0,0,0,0.4);
}

.sleep-menu button, .speed-menu button {
  display: block;
  width: 100%;
  text-align: left;
  padding: 8px 12px;
  font-size: 12px;
  border-radius: 4px;
  color: var(--text-mid);
}

.sleep-menu button:hover, .speed-menu button:hover { background: var(--bg-card); color: var(--text); }
.sleep-menu button.active, .speed-menu button.active { color: var(--cyan); }

/* Keyboard shortcut hint */
.shortcuts-hint {
  position: fixed;
  bottom: 100px;
  right: 20px;
  background: var(--bg-surface);
  border: 1px solid var(--border);
  border-radius: var(--radius);

}

/* Confirm dialog */

<script>
// ============================================
// DATA & STATE
// ============================================
const DB_NAME = 'AudiobookPlayerDB';
const DB_VERSION = 1;
const STORE_NAME = 'audioFiles';
const LS_KEY = 'audiobook_library';
const LS_STATS = 'audiobook_stats';

let db = null;
let library = [];
let viewMode = 'grid';
let currentDetailId = null;
let activeCategory = 'All';
let uploadFiles = [];

// Player state
let player = {
  audio: new Audio(),
  nextAudio: null,
  bookId: null,
  chapterIdx: 0,
  isPlaying: false,
  speed: 1,
  sleepTimer: null,
  sleepEndOfChapter: false,
  sleepRemaining: 0,
  saveInterval: null
};

const CATEGORIES = ['All','Fiction','Non-Fiction','Sci-Fi','Fantasy','Mystery','Biography','History','Self-Help','Business','Other'];
const SPEEDS = [0.5, 0.75, 1, 1.25, 1.5, 2];
const SLEEP_OPTIONS = [
  { label: 'Off', mins: 0 },
  { label: '15 min', mins: 15 },
  { label: '30 min', mins: 30 },
  { label: '45 min', mins: 45 },
  { label: '1 hour', mins: 60 },
  { label: 'End of chapter', mins: -1 }
];

// ============================================
// INDEXEDDB
// ============================================
function openDB() {
  return new Promise((resolve, reject) => {
    const req = indexedDB.open(DB_NAME, DB_VERSION);
    req.onupgradeneeded = e => {
      const d = e.target.result;
      if (!d.objectStoreNames.contains(STORE_NAME)) {
        d.createObjectStore(STORE_NAME);
      }
    };
    req.onsuccess = e => { db = e.target.result; resolve(db); };
    req.onerror = e => reject(e.target.error);
  });
}

function dbPut(key, blob) {
  return new Promise((resolve, reject) => {
    const tx = db.transaction(STORE_NAME, 'readwrite');
    tx.objectStore(STORE_NAME).put(blob, key);
    tx.oncomplete = () => resolve();
    tx.onerror = e => reject(e.target.error);
  });
}

function dbGet(key) {
  return new Promise((resolve, reject) => {
    const tx = db.transaction(STORE_NAME, 'readonly');
    const req = tx.objectStore(STORE_NAME).get(key);
    req.onsuccess = () => resolve(req.result);
    req.onerror = e => reject(e.target.error);
  });
}

function dbDelete(key) {
  return new Promise((resolve, reject) => {
    const tx = db.transaction(STORE_NAME, 'readwrite');
    tx.objectStore(STORE_NAME).delete(key);
    tx.oncomplete = () => resolve();
    tx.onerror = e => reject(e.target.error);
  });
}

// ============================================
// LIBRARY PERSISTENCE
// ============================================
function saveLibrary() {
  localStorage.setItem(LS_KEY, JSON.stringify(library));
}

function loadLibrary() {
  try { library = JSON.parse(localStorage.getItem(LS_KEY)) || []; }
  catch { library = []; }
}

function getStats() {
  try { return JSON.parse(localStorage.getItem(LS_STATS)) || { dailyListening: {}, totalTime: 0 }; }
  catch { return { dailyListening: {}, totalTime: 0 }; }
}

function saveStats(s) { localStorage.setItem(LS_STATS, JSON.stringify(s)); }

// ============================================
// UTILITY
// ============================================
function genId() { return Date.now().toString(36) + Math.random().toString(36).slice(2, 8); }

function hashColor(str) {
  let hash = 0;
  for (let i = 0; i < str.length; i++) hash = str.charCodeAt(i) + ((hash << 5) - hash);
  const h = Math.abs(hash) % 360;
  return `hsl(${h}, 60%, 25%)`;
}

function formatTime(s) {
  if (!s || isNaN(s)) return '0:00';
  s = Math.floor(s);
  const h = Math.floor(s / 3600);
  const m = Math.floor((s % 3600) / 60);
  const sec = s % 60;
  if (h > 0) return `${h}:${m.toString().padStart(2,'0')}:${sec.toString().padStart(2,'0')}`;
  return `${m}:${sec.toString().padStart(2,'0')}`;
}

function formatDuration(s) {
  if (!s) return '--';
  const h = Math.floor(s / 3600);
  const m = Math.floor((s % 3600) / 60);
  if (h > 0) return `${h}h ${m}m`;
  return `${m}m`;
}

function formatSize(bytes) {
  if (bytes < 1024) return bytes + ' B';
  if (bytes < 1048576) return (bytes / 1024).toFixed(1) + ' KB';
  return (bytes / 1048576).toFixed(1) + ' MB';
}

function getBookProgress(book) {
  if (!book.chapters || !book.chapters.length) return 0;
  const totalDur = book.chapters.reduce((a, c) => a + (c.duration || 0), 0);
  if (!totalDur) return 0;
  let listened = 0;
  for (let i = 0; i < book.chapters.length; i++) {
    if (i < (book.currentChapter || 0)) {
      listened += book.chapters[i].duration || 0;
    } else if (i === (book.currentChapter || 0)) {
      listened += book.currentTime || 0;
    }
  }
  return Math.min(100, (listened / totalDur) * 100);
}

function getBookStatus(book) {
  const p = getBookProgress(book);
  if (p >= 99) return 'completed';
  if (p > 0) return 'inProgress';
  return 'notStarted';
}

function getTotalDuration(book) {
  return (book.chapters || []).reduce((a, c) => a + (c.duration || 0), 0);
}

// ============================================
// RENDER LIBRARY
// ============================================
function renderCategoryPills() {
  const el = document.getElementById('categoryPills');
  el.innerHTML = CATEGORIES.map(c =>
    `<button class="cat-pill ${c === activeCategory ? 'active' : ''}" onclick="setCategory('${c}')">${c}</button>`
  ).join('');
}

function setCategory(c) {
  activeCategory = c;
  renderCategoryPills();
  renderLibrary();
}

function setViewMode(mode) {
  viewMode = mode;
  document.getElementById('gridViewBtn').classList.toggle('active', mode === 'grid');
  document.getElementById('listViewBtn').classList.toggle('active', mode === 'list');
  renderLibrary();
}

function renderLibrary() {
  const search = document.getElementById('searchInput').value.toLowerCase();
  const sort = document.getElementById('sortSelect').value;
  const status = document.getElementById('statusFilter').value;

  let books = library.filter(b => {
    if (activeCategory !== 'All' && b.category !== activeCategory) return false;
    if (status !== 'all' && getBookStatus(b) !== status) return false;
    if (search) {
      const hay = `${b.title} ${b.author} ${(b.tags||[]).join(' ')}`.toLowerCase();
      if (!hay.includes(search)) return false;
    }
    return true;
  });

  books.sort((a, b) => {
    switch (sort) {
      case 'title': return (a.title || '').localeCompare(b.title || '');
      case 'author': return (a.author || '').localeCompare(b.author || '');
      case 'lastPlayed': return (b.lastPlayed || 0) - (a.lastPlayed || 0);
      case 'progress': return getBookProgress(b) - getBookProgress(a);
      default: return (b.dateAdded || 0) - (a.dateAdded || 0);
    }
  });

  const gridEl = document.getElementById('libraryGrid');
  const listEl = document.getElementById('libraryList');
  const emptyEl = document.getElementById('emptyState');

  if (books.length === 0) {
    gridEl.classList.add('hidden');
    listEl.classList.add('hidden');
    emptyEl.classList.remove('hidden');
    return;
  }

  emptyEl.classList.add('hidden');

  if (viewMode === 'grid') {
    gridEl.classList.remove('hidden');
    listEl.classList.add('hidden');
    gridEl.innerHTML = books.map(b => {
      const progress = getBookProgress(b);
      const color = hashColor(b.title || 'Untitled');
      const initial = (b.title || 'U')[0];
      return `<div class="book-card" onclick="showDetail('${b.id}')">
        <div class="book-cover" style="background:${color}">
          <span class="cover-initial">${initial}</span>
          <div class="progress-overlay"><div class="progress-fill" style="width:${progress}%"></div></div>
        </div>
        <div class="book-info">
          <h3>${esc(b.title || 'Untitled')}</h3>
          <div class="book-author">${esc(b.author || 'Unknown')}</div>
          <div class="book-meta">
            <span>${formatDuration(getTotalDuration(b))}</span>
            <span>${Math.round(progress)}%</span>
          </div>
        </div>
      </div>`;
    }).join('');
  } else {
    listEl.classList.remove('hidden');
    gridEl.classList.add('hidden');
    listEl.innerHTML = books.map(b => {
      const progress = getBookProgress(b);
      const color = hashColor(b.title || 'Untitled');
      const initial = (b.title || 'U')[0];
      return `<div class="list-item" onclick="showDetail('${b.id}')">
        <div class="list-cover" style="background:${color}">${initial}</div>
        <div class="list-info">
          <h3>${esc(b.title || 'Untitled')}</h3>
          <p>${esc(b.author || 'Unknown')} &middot; ${(b.chapters||[]).length} ch</p>
        </div>
        <div class="list-meta">${Math.round(progress)}%<br>${formatDuration(getTotalDuration(b))}</div>
      </div>`;
    }).join('');
  }
}

function esc(s) {
  const d = document.createElement('div');
  d.textContent = s;
  return d.innerHTML;
}

// ============================================
// VIEWS
// ============================================
function showView(view) {
  document.getElementById('libraryView').classList.toggle('hidden', view !== 'library');
  document.getElementById('detailView').classList.toggle('hidden', view !== 'detail');
  document.getElementById('statsView').classList.toggle('hidden', view !== 'stats');

  if (view === 'library') {
    document.getElementById('headerTitle').textContent = 'AUDIOBOOK PLAYER';
    renderLibrary();
  } else if (view === 'stats') {
    renderStats();
  }
}

// ============================================
// DETAIL VIEW
// ============================================
function showDetail(id) {
  const book = library.find(b => b.id === id);
  if (!book) return;
  currentDetailId = id;
  showView('detail');

  const color = hashColor(book.title || 'Untitled');
  const initial = (book.title || 'U')[0];
  document.getElementById('detailCover').style.background = color;
  document.getElementById('detailCover').textContent = initial;
  document.getElementById('detailTitle').textContent = book.title || 'Untitled';
  document.getElementById('detailAuthor').textContent = book.author ? `by ${book.author}` : '';
  document.getElementById('detailNarrator').textContent = book.narrator ? `Narrated by ${book.narrator}` : '';

  // Rating
  renderDetailRating(book);

  // Tags
  const tagsEl = document.getElementById('detailTags');
  const tags = [book.category, ...(book.tags || [])].filter(Boolean);
  tagsEl.innerHTML = tags.map(t => `<span class="tag">${esc(t)}</span>`).join('');

  // Progress
  const progress = getBookProgress(book);
  document.getElementById('detailProgressFill').style.width = progress + '%';
  document.getElementById('detailProgressPct').textContent = Math.round(progress) + '%';
  const total = getTotalDuration(book);
  const listened = total * progress / 100;
  document.getElementById('detailProgressTime').textContent = `${formatDuration(listened)} / ${formatDuration(total)}`;

  showDetailTab('chapters');
}

function renderDetailRating(book) {
  const el = document.getElementById('detailRating');
  el.innerHTML = '';
  for (let i = 1; i <= 5; i++) {
    const btn = document.createElement('button');
    btn.innerHTML = '&#9733;';
    btn.className = i <= (book.rating || 0) ? 'filled' : '';
    btn.onclick = () => {
      book.rating = i;
      saveLibrary();
      renderDetailRating(book);
    };
    el.appendChild(btn);
  }
}

function showDetailTab(tab) {

  document.querySelectorAll('.detail-panel').forEach(p => p.classList.add('hidden'));

    const el = document.getElementById('detailChapters');
    el.classList.remove('hidden');
    el.innerHTML = `<ul class="chapter-list">${(book.chapters || []).map((ch, i) =>
      `<li class="chapter-item ${player.bookId === book.id && player.chapterIdx === i ? 'playing' : ''}"
           onclick="playBook('${book.id}', ${i})">
        <span class="chapter-num">${i + 1}</span>
        <span class="chapter-name">${esc(ch.name || 'Chapter ' + (i+1))}</span>

    el.classList.remove('hidden');

      bmarks.map((bm, i) => `<div class="bookmark-item" onclick="jumpToBookmark('${book.id}',${i})">

        <span class="note-text">${esc(n.text)}</span>

    el.classList.remove('hidden');

      <label>Title<input type="text" id="editTitle" value="${esc(book.title||'')}"></label>
      <label>Author<input type="text" id="editAuthor" value="${esc(book.author||'')}"></label>
      <label>Narrator<input type="text" id="editNarrator" value="${esc(book.narrator||'')}"></label>
      <label>Category<select id="editCategory">${CATEGORIES.filter(c=>c!=='All').map(c=>
        `<option value="${c}" ${c===book.category?'selected':''}>${c}</option>`).join('')}</select></label>
      <label>Year<input type="text" id="editYear" value="${esc(book.year||'')}"></label>
      <label>Tags (comma separated)<input type="text" id="editTags" value="${esc((book.tags||[]).join(', '))}"></label>
      <label class="full-width">Description<textarea id="editDesc">${esc(book.description||'')}</textarea></label>
    </div>

function saveMetadata() {
  const book = library.find(b => b.id === currentDetailId);
  if (!book) return;

function addNoteForDetail() {

  const text = document.getElementById('noteInput')?.value?.trim();
  if (!text) return;
  if (!book.notes) book.notes = [];
  let time = 0;
  if (player.bookId === book.id) time = player.audio.currentTime || 0;
  book.notes.push({ text, time, chapter: player.chapterIdx || 0, date: Date.now() });
  saveLibrary();
  showDetailTab('notes');
}

function deleteNote(bookId, idx) {
  const book = library.find(b => b.id === bookId);
  if (!book || !book.notes) return;
  book.notes.splice(idx, 1);
  saveLibrary();
  showDetailTab('notes');
}

function jumpToNote(bookId, idx) {

  if (!book || !book.notes || !book.notes[idx]) return;
  const n = book.notes[idx];

function addBookmarkForDetail() {

  addBookmarkAtCurrent();

}

function addBookmarkAtCurrent() {
  if (!player.bookId) return;
  const book = library.find(b => b.id === player.bookId);

  if (!book.bookmarks) book.bookmarks = [];

    time: player.audio.currentTime || 0,

    chapterName: ch ? ch.name : '',

    date: Date.now()
  });

  if (currentDetailId === player.bookId) showDetailTab('bookmarks');
}

function deleteBookmark(bookId, idx) {
  const book = library.find(b => b.id === bookId);
  if (!book || !book.bookmarks) return;
  book.bookmarks.splice(idx, 1);
  saveLibrary();
  showDetailTab('bookmarks');
}

function jumpToBookmark(bookId, idx) {
  const book = library.find(b => b.id === bookId);
  if (!book || !book.bookmarks || !book.bookmarks[idx]) return;
  const bm = book.bookmarks[idx];

function openUploadModal() {
  uploadFiles = [];
  document.getElementById('uploadTitle').value = '';
  document.getElementById('uploadAuthor').value = '';
  document.getElementById('uploadNarrator').value = '';
  document.getElementById('uploadCategory').value = 'Other';
  document.getElementById('uploadDesc').value = '';
  document.getElementById('fileList').innerHTML = '';
  document.getElementById('uploadModal').classList.remove('hidden');
}

function closeUploadModal() {
  document.getElementById('uploadModal').classList.add('hidden');
  uploadFiles = [];
}

function renderUploadFiles() {
  const el = document.getElementById('fileList');
  el.innerHTML = uploadFiles.map((f, i) =>
    `<div class="file-item">
      <span class="fname">${esc(f.name)}</span>
      <span class="fsize">${formatSize(f.size)}</span>
      <button class="fremove" onclick="removeUploadFile(${i})">&#x2715;</button>
    </div>`
  ).join('');
}

function removeUploadFile(idx) {
  uploadFiles.splice(idx, 1);
  renderUploadFiles();
}

function handleFiles(files) {
  const validExts = ['.mp3','.m4a','.m4b','.ogg','.wav'];
  for (const f of files) {
    const ext = f.name.substring(f.name.lastIndexOf('.')).toLowerCase();
    if (validExts.includes(ext) || f.type.startsWith('audio/')) {
      uploadFiles.push(f);
    }
  }
  // Sort by name for chapter ordering
  uploadFiles.sort((a, b) => a.name.localeCompare(b.name, undefined, { numeric: true }));
  renderUploadFiles();

  // Auto-fill title from first filename
  if (!document.getElementById('uploadTitle').value && uploadFiles.length) {
    let name = uploadFiles[0].name.replace(/\.[^.]+$/, '');
    // Remove common prefixes like "01 - ", "Chapter 1 - "
    name = name.replace(/^\d+[\s._-]+/, '').replace(/^chapter\s*\d+[\s._-]*/i, '');
    document.getElementById('uploadTitle').value = name;
  }
}

async function getAudioDuration(file) {
  return new Promise(resolve => {
    const a = new Audio();
    a.preload = 'metadata';
    const url = URL.createObjectURL(file);
    a.src = url;
    a.onloadedmetadata = () => {
      const dur = a.duration;
      URL.revokeObjectURL(url);
      resolve(isFinite(dur) ? dur : 0);
    };
    a.onerror = () => { URL.revokeObjectURL(url); resolve(0); };
    // Timeout fallback
    setTimeout(() => resolve(0), 10000);
  });
}

async function saveAudiobook() {
  const title = document.getElementById('uploadTitle').value.trim();
  if (!title) { window.alert('Please enter a title'); return; }
  if (!uploadFiles.length) { window.alert('Please add audio files'); return; }

  const saveBtn = document.getElementById('saveBtn');
  saveBtn.textContent = 'Saving...';
  saveBtn.disabled = true;

  try {
    const bookId = genId();
    const chapters = [];

    for (let i = 0; i < uploadFiles.length; i++) {
      const f = uploadFiles[i];
      const chId = `${bookId}_ch${i}`;
      const dur = await getAudioDuration(f);

      // Store blob in IndexedDB
      const blob = new Blob([await f.arrayBuffer()], { type: f.type });
      await dbPut(chId, blob);

      let chName = f.name.replace(/\.[^.]+$/, '');
      chName = chName.replace(/^\d+[\s._-]+/, '');

      chapters.push({
        id: chId,
        name: chName || `Chapter ${i + 1}`,
        duration: dur,
        fileName: f.name
      });
    }

    const book = {
      id: bookId,
      title,
      author: document.getElementById('uploadAuthor').value.trim(),
      narrator: document.getElementById('uploadNarrator').value.trim(),
      category: document.getElementById('uploadCategory').value,
      description: document.getElementById('uploadDesc').value.trim(),
      chapters,
      dateAdded: Date.now(),
      lastPlayed: 0,
      currentChapter: 0,
      currentTime: 0,
      rating: 0,
      tags: [],
      bookmarks: [],
      notes: [],
      year: ''
    };

    library.push(book);
    saveLibrary();
    closeUploadModal();
    renderLibrary();
  } catch (err) {
    window.alert('Error saving audiobook: ' + err.message);
  } finally {
    saveBtn.textContent = 'Save Audiobook';
    saveBtn.disabled = false;
  }
}

// Drop zone setup
function setupDropZone() {
  const dz = document.getElementById('dropZone');
  const fi = document.getElementById('fileInput');

  dz.addEventListener('click', () => fi.click());

  dz.addEventListener('dragover', e => { e.preventDefault(); dz.classList.add('dragover'); });
  dz.addEventListener('dragleave', () => dz.classList.remove('dragover'));
  dz.addEventListener('drop', e => {
    e.preventDefault();
    dz.classList.remove('dragover');
    handleFiles(e.dataTransfer.files);
  });

  fi.addEventListener('change', () => {
    handleFiles(fi.files);
    fi.value = '';
  });
}

// ============================================
// AUDIO PLAYER
// ============================================
async function playBook(bookId, chapterIdx, seekTo) {
  const book = library.find(b => b.id === bookId);
  if (!book || !book.chapters || !book.chapters[chapterIdx]) return;

  // Resume AudioContext if needed
  if (window.AudioContext || window.webkitAudioContext) {
    try {
      const ctx = new (window.AudioContext || window.webkitAudioContext)();
      if (ctx.state === 'suspended') await ctx.resume();
      ctx.close();
    } catch(e) {}
  }

  const ch = book.chapters[chapterIdx];
  const blob = await dbGet(ch.id);
  if (!blob) { window.alert('Audio file not found in storage'); return; }

  const url = URL.createObjectURL(blob);

  player.audio.pause();
  player.audio.src = url;
  player.audio.playbackRate = player.speed;
  player.bookId = bookId;
  player.chapterIdx = chapterIdx;

  player.audio.onloadedmetadata = () => {
    // Update duration if it was 0
    if (!ch.duration || ch.duration === 0) {
      ch.duration = player.audio.duration;
      saveLibrary();
    }
    if (seekTo !== undefined) {
      player.audio.currentTime = seekTo;
    }
    player.audio.play();
    player.isPlaying = true;
    updatePlayerUI();
    startSaveInterval();
    preloadNextChapter(bookId, chapterIdx);
  };

  player.audio.onended = () => {
    onChapterEnd();
  };

  player.audio.onerror = () => {
    console.error('Audio playback error');
  };

  book.lastPlayed = Date.now();
  book.currentChapter = chapterIdx;
  saveLibrary();

  document.getElementById('playerBar').classList.remove('inactive');
  updatePlayerUI();
}

function resumeBook(bookId) {
  const book = library.find(b => b.id === bookId);
  if (!book) return;
  playBook(bookId, book.currentChapter || 0, book.currentTime || 0);
}

function togglePlay() {
  if (!player.bookId) return;
  if (player.isPlaying) {
    player.audio.pause();
    player.isPlaying = false;
  } else {
    player.audio.play();
    player.isPlaying = true;
  }
  updatePlayIcon();
}

function seekRelative(secs) {
  if (!player.bookId) return;
  player.audio.currentTime = Math.max(0, Math.min(player.audio.duration || 0, player.audio.currentTime + secs));
}

function nextChapter() {
  if (!player.bookId) return;
  const book = library.find(b => b.id === player.bookId);
  if (!book) return;
  if (player.chapterIdx < book.chapters.length - 1) {
    playBook(player.bookId, player.chapterIdx + 1);
  }
}

function prevChapter() {
  if (!player.bookId) return;
  if (player.audio.currentTime > 3) {
    player.audio.currentTime = 0;
  } else if (player.chapterIdx > 0) {
    playBook(player.bookId, player.chapterIdx - 1);
  }
}

function onChapterEnd() {
  const book = library.find(b => b.id === player.bookId);
  if (!book) return;

  // Sleep timer end of chapter
  if (player.sleepEndOfChapter) {
    player.isPlaying = false;
    player.sleepEndOfChapter = false;
    updatePlayIcon();
    updateSleepBtn();
    return;
  }

  // Auto advance
  if (player.chapterIdx < book.chapters.length - 1) {
    playBook(player.bookId, player.chapterIdx + 1);
  } else {
    player.isPlaying = false;
    updatePlayIcon();
    // Mark as completed
    book.currentChapter = book.chapters.length - 1;
    book.currentTime = book.chapters[book.chapters.length - 1].duration || 0;
    saveLibrary();
  }
}

async function preloadNextChapter(bookId, currentIdx) {
  const book = library.find(b => b.id === bookId);
  if (!book || currentIdx >= book.chapters.length - 1) return;
  const nextCh = book.chapters[currentIdx + 1];
  // Pre-fetch blob
  try {
    const blob = await dbGet(nextCh.id);
    if (blob) {
      player.nextAudio = new Audio();
      player.nextAudio.src = URL.createObjectURL(blob);
      player.nextAudio.preload = 'auto';
    }
  } catch(e) {}
}

function startSaveInterval() {
  if (player.saveInterval) clearInterval(player.saveInterval);
  player.saveInterval = setInterval(() => {
    if (!player.bookId || !player.isPlaying) return;
    const book = library.find(b => b.id === player.bookId);
    if (!book) return;
    book.currentChapter = player.chapterIdx;
    book.currentTime = player.audio.currentTime || 0;
    book.lastPlayed = Date.now();
    saveLibrary();

    // Track stats
    const stats = getStats();
    const today = new Date().toISOString().split('T')[0];
    stats.dailyListening[today] = (stats.dailyListening[today] || 0) + 5;
    stats.totalTime = (stats.totalTime || 0) + 5;
    saveStats(stats);
  }, 5000);
}

// Player UI update
function updatePlayerUI() {
  const book = library.find(b => b.id === player.bookId);
  if (!book) return;

  const ch = book.chapters[player.chapterIdx];
  const color = hashColor(book.title || 'Untitled');

  document.getElementById('playerCover').textContent = initial;
  document.getElementById('playerTitle').textContent = book.title || 'Untitled';
  document.getElementById('playerChapter').textContent = ch ? ch.name : '';

  updatePlayIcon();
}

function updatePlayIcon() {
  const btn = document.getElementById('playIcon');
  if (player.isPlaying) {
    btn.innerHTML = '<rect x="6" y="5" width="4" height="14" rx="1"/><rect x="14" y="5" width="4" height="14" rx="1"/>';
  } else {
    btn.innerHTML = '<polygon points="8,5 20,12 8,19"/>';
  }
}

// Progress bar updates
function updateProgressBar() {
  if (!player.bookId || !player.audio.duration) return;
  const pct = (player.audio.currentTime / player.audio.duration) * 100;
  document.getElementById('progressFill').style.width = pct + '%';
  document.getElementById('playerTime').textContent =
    `${formatTime(player.audio.currentTime)} / ${formatTime(player.audio.duration)}`;
}

// Progress bar seeking
function setupProgressBar() {
  const container = document.getElementById('progressContainer');
  let dragging = false;

  function seek(e) {
    const rect = container.getBoundingClientRect();
    const pct = Math.max(0, Math.min(1, (e.clientX - rect.left) / rect.width));
    if (player.audio.duration) {
      player.audio.currentTime = pct * player.audio.duration;
    }
  }

  container.addEventListener('mousedown', e => { dragging = true; seek(e); });
  document.addEventListener('mousemove', e => { if (dragging) seek(e); });
  document.addEventListener('mouseup', () => { dragging = false; });

  container.addEventListener('touchstart', e => { dragging = true; seek(e.touches[0]); }, { passive: true });
  document.addEventListener('touchmove', e => { if (dragging) seek(e.touches[0]); }, { passive: true });
  document.addEventListener('touchend', () => { dragging = false; });
}

function toggleMute() {

// Speed
function toggleSpeedMenu() {
  const menu = document.getElementById('speedMenu');
  menu.classList.toggle('hidden');
  document.getElementById('sleepMenu').classList.add('hidden');

  if (!menu.classList.contains('hidden')) {
    menu.innerHTML = SPEEDS.map(s =>
      `<button class="${s === player.speed ? 'active' : ''}" onclick="setSpeed(${s})">${s}x</button>`
    ).join('');
  }
}

function setSpeed(s) {
  player.speed = s;
  player.audio.playbackRate = s;
  document.getElementById('speedBtn').textContent = s + 'x';
  document.getElementById('speedMenu').classList.add('hidden');
}

// Sleep timer
function toggleSleepMenu() {
  const menu = document.getElementById('sleepMenu');
  menu.classList.toggle('hidden');
  document.getElementById('speedMenu').classList.add('hidden');

  if (!menu.classList.contains('hidden')) {
    const currentMins = player.sleepEndOfChapter ? -1 : (player.sleepRemaining > 0 ? Math.ceil(player.sleepRemaining / 60) : 0);
    menu.innerHTML = SLEEP_OPTIONS.map(o => {
      const isActive = (o.mins === 0 && currentMins === 0 && !player.sleepEndOfChapter) ||
                       (o.mins === -1 && player.sleepEndOfChapter) ||
                       (o.mins > 0 && Math.abs(currentMins - o.mins) < 2);
      return `<button class="${isActive ? 'active' : ''}" onclick="setSleep(${o.mins})">${o.label}</button>`;
    }).join('');
  }
}

function setSleep(mins) {
  document.getElementById('sleepMenu').classList.add('hidden');
  if (player.sleepTimer) { clearInterval(player.sleepTimer); player.sleepTimer = null; }
  player.sleepEndOfChapter = false;
  player.sleepRemaining = 0;

  if (mins === 0) {
    updateSleepBtn();
    return;
  }

  if (mins === -1) {
    player.sleepEndOfChapter = true;
    updateSleepBtn();
    return;
  }

  player.sleepRemaining = mins * 60;
  player.sleepTimer = setInterval(() => {
    player.sleepRemaining--;
    if (player.sleepRemaining <= 0) {
      clearInterval(player.sleepTimer);
      player.sleepTimer = null;
      player.audio.pause();
      player.isPlaying = false;
      updatePlayIcon();
      updateSleepBtn();
    }
  }, 1000);
  updateSleepBtn();
}

function updateSleepBtn() {
  const btn = document.getElementById('sleepBtn');
  btn.classList.toggle('active', player.sleepRemaining > 0 || player.sleepEndOfChapter);
}

// ============================================
// DELETE
// ============================================
function confirmDeleteBook(bookId) {
  const book = library.find(b => b.id === bookId);
  if (!book) return;

  const overlay = document.createElement('div');
  overlay.className = 'confirm-overlay';
  overlay.innerHTML = `<div class="confirm-dialog">
    <p>Delete "${esc(book.title)}"?<br><span style="font-size:12px;color:var(--text-dim)">This will remove all audio data and cannot be undone.</span></p>
    <div class="confirm-actions">
      <button class="btn btn-secondary" onclick="this.closest('.confirm-overlay').remove()">Cancel</button>
      <button class="btn btn-danger" id="confirmDelBtn">Delete</button>
    </div>
  </div>`;
  document.body.appendChild(overlay);

  document.getElementById('confirmDelBtn').onclick = async () => {
    // Stop if playing this book
    if (player.bookId === bookId) {
      player.audio.pause();
      player.bookId = null;
      player.isPlaying = false;
      document.getElementById('playerBar').classList.add('inactive');
    }

    // Delete audio from IndexedDB
    for (const ch of book.chapters) {
      try { await dbDelete(ch.id); } catch(e) {}
    }

    library = library.filter(b => b.id !== bookId);
    saveLibrary();
    overlay.remove();
    showView('library');
  };
}

// ============================================
// STATISTICS
// ============================================
function renderStats() {
  const stats = getStats();
  const today = new Date().toISOString().split('T')[0];

  const totalSecs = stats.totalTime || 0;
  const completed = library.filter(b => getBookProgress(b) >= 99).length;

  // Streak
  let streak = 0;
  const d = new Date();
  for (let i = 0; i < 365; i++) {
    const key = d.toISOString().split('T')[0];
    if (stats.dailyListening[key] && stats.dailyListening[key] > 0) {
      streak++;
    } else if (i > 0) {
      break;
    }
    d.setDate(d.getDate() - 1);
  }

  // Avg per day (last 30 days)
  let sum30 = 0, days30 = 0;
  const d2 = new Date();
  for (let i = 0; i < 30; i++) {
    const key = d2.toISOString().split('T')[0];
    if (stats.dailyListening[key]) { sum30 += stats.dailyListening[key]; days30++; }
    d2.setDate(d2.getDate() - 1);
  }
  const avgPerDay = days30 > 0 ? sum30 / days30 : 0;

  document.getElementById('statsGrid').innerHTML = `
    <div class="stat-card"><div class="stat-value">${formatDuration(totalSecs)}</div><div class="stat-label">Total Listening</div></div>
    <div class="stat-card"><div class="stat-value">${completed}</div><div class="stat-label">Books Completed</div></div>
    <div class="stat-card"><div class="stat-value">${streak}</div><div class="stat-label">Day Streak</div></div>
    <div class="stat-card"><div class="stat-value">${formatDuration(avgPerDay)}</div><div class="stat-label">Avg / Day (30d)</div></div>
    <div class="stat-card"><div class="stat-value">${library.length}</div><div class="stat-label">Total Books</div></div>
  `;

  // Category breakdown
  const catCounts = {};
  library.forEach(b => { catCounts[b.category || 'Other'] = (catCounts[b.category || 'Other'] || 0) + 1; });
  const maxCat = Math.max(1, ...Object.values(catCounts));
  const colors = ['#00d4ff','#ff6600','#00cc88','#ffaa00','#ff3355','#aa66ff','#66ccff','#ff66aa','#88ff66','#ffcc00'];

  document.getElementById('statsBreakdown').innerHTML = `<h3>By Category</h3>` +
    Object.entries(catCounts).sort((a,b) => b[1] - a[1]).map(([cat, count], i) =>
      `<div class="breakdown-row">
        <span class="breakdown-label">${esc(cat)}</span>
        <div class="breakdown-bar"><div class="fill" style="width:${(count/maxCat)*100}%;background:${colors[i%colors.length]}"></div></div>
        <span class="breakdown-val">${count}</span>
      </div>`
    ).join('');
}

// ============================================
// KEYBOARD SHORTCUTS
// ============================================
document.addEventListener('keydown', e => {
  // Don't capture when typing in inputs
  if (e.target.tagName === 'INPUT' || e.target.tagName === 'TEXTAREA' || e.target.tagName === 'SELECT') return;

  switch (e.code) {
    case 'Space':
      e.preventDefault();
      togglePlay();
      break;
    case 'ArrowLeft':
      e.preventDefault();
      seekRelative(-30);
      break;
    case 'ArrowRight':
      e.preventDefault();
      seekRelative(30);
      break;
    case 'ArrowUp':
      e.preventDefault();
      setVolume(Math.min(1, player.audio.volume + 0.1));
      document.getElementById('volumeSlider').value = player.audio.volume;
      break;
    case 'ArrowDown':
      e.preventDefault();
      setVolume(Math.max(0, player.audio.volume - 0.1));
      document.getElementById('volumeSlider').value = player.audio.volume;
      break;
    case 'KeyN':
      nextChapter();
      break;
    case 'KeyP':
      prevChapter();
      break;
  }
});

// Close menus on outside click
document.addEventListener('click', e => {
  if (!e.target.closest('#speedBtn') && !e.target.closest('#speedMenu')) {
    document.getElementById('speedMenu').classList.add('hidden');
  }
  if (!e.target.closest('#sleepBtn') && !e.target.closest('#sleepMenu')) {
    document.getElementById('sleepMenu').classList.add('hidden');
  }
});

// ============================================
// ANIMATION FRAME FOR PROGRESS
// ============================================
function tick() {
  updateProgressBar();
  requestAnimationFrame(tick);
}

// ============================================
// INIT
// ============================================
async function init() {
  await openDB();
  loadLibrary();
  renderCategoryPills();
  renderLibrary();
  setupDropZone();
  setupProgressBar();
  tick();

  // Restore player state if there was a book playing
  const lastBook = library.find(b => b.lastPlayed && b.lastPlayed > Date.now() - 86400000);
  // Don't auto-play, just show UI ready
}

init();
</script>
