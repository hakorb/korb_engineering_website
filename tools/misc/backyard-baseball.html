<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Backyard Baseball - Korb Engineering</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#0a0a1a;display:flex;justify-content:center;align-items:center;min-height:100vh;font-family:'Arial Black','Arial',sans-serif;overflow:hidden;touch-action:manipulation;-webkit-user-select:none;user-select:none}
canvas{display:block;max-width:100vw;max-height:100vh;cursor:crosshair}
#mobileControls{display:none;position:fixed;bottom:10px;left:0;right:0;z-index:100;text-align:center;pointer-events:none}
.mBtn{pointer-events:auto;display:inline-block;margin:0 8px;border:4px solid #fff;color:#fff;font-family:'Arial Black',sans-serif;font-weight:900;text-shadow:2px 2px 4px rgba(0,0,0,.6);cursor:pointer;box-shadow:0 4px 15px rgba(0,0,0,.5);transition:transform .08s}
.mBtn:active{transform:scale(.88)}
#swingBtn{width:120px;height:120px;border-radius:50%;background:radial-gradient(circle at 30% 30%,#ff6b6b,#c0392b);font-size:20px;line-height:120px}
#stealBtn{width:70px;height:70px;border-radius:50%;background:radial-gradient(circle at 30% 30%,#f39c12,#e67e22);font-size:13px;line-height:70px;vertical-align:bottom}
@media(pointer:coarse){#mobileControls{display:block}}
</style>
</head>
<body>
<canvas id="game"></canvas>
<div id="mobileControls">
<div class="mBtn" id="stealBtn">STEAL</div>
<div class="mBtn" id="swingBtn">SWING!</div>
</div>
<script>
(function(){
"use strict";

const C=document.getElementById('game'),X=C.getContext('2d');
const W=900,H=640;
C.width=W;C.height=H;

// ============================================================
//  AUDIO ENGINE (Web Audio API)
// ============================================================
const ACtx=window.AudioContext||window.webkitAudioContext;
let ac=null;
function ensureAudio(){if(!ac)ac=new ACtx();if(ac.state==='suspended')ac.resume()}

function tone(f,d,type,v,dl){
  if(!ac)return;const t=ac.currentTime+(dl||0);
  const o=ac.createOscillator(),g=ac.createGain();
  o.type=type||'sine';o.frequency.setValueAtTime(f,t);
  g.gain.setValueAtTime(v||.15,t);g.gain.exponentialRampToValueAtTime(.001,t+d);
  o.connect(g);g.connect(ac.destination);o.start(t);o.stop(t+d);
}
function noise(d,v,dl){
  if(!ac)return;const t=ac.currentTime+(dl||0);
  const sz=ac.sampleRate*d,buf=ac.createBuffer(1,sz,ac.sampleRate),data=buf.getChannelData(0);
  for(let i=0;i<sz;i++)data[i]=Math.random()*2-1;
  const s=ac.createBufferSource();s.buffer=buf;
  const g=ac.createGain();g.gain.setValueAtTime(v||.1,t);g.gain.exponentialRampToValueAtTime(.001,t+d);
  s.connect(g);g.connect(ac.destination);s.start(t);s.stop(t+d);
}
function filteredNoise(d,v,freq,dl){
  if(!ac)return;const t=ac.currentTime+(dl||0);
  const sz=ac.sampleRate*d,buf=ac.createBuffer(1,sz,ac.sampleRate),data=buf.getChannelData(0);
  for(let i=0;i<sz;i++)data[i]=Math.random()*2-1;
  const s=ac.createBufferSource();s.buffer=buf;
  const filt=ac.createBiquadFilter();filt.type='lowpass';filt.frequency.value=freq||1000;
  const g=ac.createGain();g.gain.setValueAtTime(v||.1,t);g.gain.exponentialRampToValueAtTime(.001,t+d);
  s.connect(filt);filt.connect(g);g.connect(ac.destination);s.start(t);s.stop(t+d);
}

const SND={
  batCrack(){noise(.06,.5);tone(900,.05,'square',.25);tone(500,.08,'square',.18,.02);tone(1200,.03,'square',.1)},
  homeRun(){SND.batCrack();tone(523,.12,'square',.2,.15);tone(659,.12,'square',.2,.3);tone(784,.12,'square',.2,.45);tone(1047,.35,'square',.3,.6);filteredNoise(1.5,.2,800,.3);filteredNoise(2,.15,600,.8)},
  strike(){tone(250,.25,'sawtooth',.12);tone(180,.15,'sawtooth',.08,.1)},
  ball(){tone(350,.15,'sine',.08);tone(280,.15,'sine',.06,.08)},
  out(){tone(350,.12,'square',.15);tone(250,.12,'square',.15,.12);tone(180,.25,'square',.12,.24)},
  hit(){SND.batCrack();tone(700,.08,'sine',.08,.08)},
  foul(){noise(.04,.3);tone(400,.15,'sawtooth',.06,.03)},
  crowdCheer(big){filteredNoise(big?2.5:1.2,big?.3:.15,big?1200:800);if(big){tone(440,.2,'sine',.06,.3);tone(550,.2,'sine',.06,.5);tone(660,.2,'sine',.06,.7)}},
  crowdOoh(){filteredNoise(.8,.12,500);tone(300,.4,'sine',.05,.1);tone(250,.3,'sine',.04,.3)},
  pitchThrow(){tone(350,.1,'sine',.04)},
  safe(){tone(600,.12,'square',.15);tone(800,.2,'square',.18,.12)},
  walkMusic(){tone(440,.1,'square',.08);tone(554,.1,'square',.08,.12);tone(659,.1,'square',.08,.24);tone(880,.15,'square',.1,.36)},
  ambient(){filteredNoise(3,.03,400)},
  swing(){noise(.03,.15);tone(200,.05,'sine',.04)},
};

// ============================================================
//  PLAYER / TEAM DATA
// ============================================================
const PLAYER_NAMES_1=["Pablo","Kenny","Achmed","Mikey","Dante","Vicki","Amir","Pete","Kimmy","Reese"];
const PLAYER_NAMES_2=["Jorge","Luanne","Dmitri","Ashley","Ronnie","Keisha","Gretchen","Ernie","Sid","Maria"];

function makeTeam(names,color1,color2,name){
  return {name,color1,color2,roster:names.map((n,i)=>({
    name:n,power:40+Math.random()*45|0,contact:40+Math.random()*45|0,speed:40+Math.random()*45|0,
    hits:0,hrs:0,rbi:0,ks:0,atBats:0,
    skinTone:['#ffcc80','#e6a95c','#c68642','#8d5524','#ffdbac'][Math.random()*5|0],
    capColor:color1
  }))};
}

let playerTeam, cpuTeam;
let batterIndex=0, cpuBatterIndex=0;
let currentBatter=null;

// ============================================================
//  GAME STATE
// ============================================================
let state='title';
let inning=1, half='bottom', outs=0, strikes=0, balls=0;
let scoreP=0, scoreC=0;
let bases=[null,null,null]; // runner objects or null (1st,2nd,3rd)
let gameLog=[];
let seasonRecord={w:0,l:0};
try{const s=localStorage.getItem('byb_season');if(s)seasonRecord=JSON.parse(s)}catch(e){}
let totalInnings=3;
let popup=null; // {text,color,timer,size,y}
let commentary=null; // {text,timer}
let shakeTimer=0, shakeAmount=0;
let particles=[];
let clouds=[];
let frameCount=0;
let transTimer=0, transText='', transText2='';
let dayTime='day'; // day, sunset, night
let stadiumIndex=0;
const STADIUMS=[
  {name:"Sunny Day Park",sky1:'#4a9eff',sky2:'#87ceeb',grass:'#3da33d',dirt:'#c8a040'},
  {name:"Sunset Field",sky1:'#ff6b35',sky2:'#ffa94d',grass:'#2d8a2d',dirt:'#b89030'},
  {name:"Night Diamond",sky1:'#1a1a3e',sky2:'#2d2d5e',grass:'#1e7a1e',dirt:'#a08030'},
];

// Pitch
let pitchActive=false, pitchX=0, pitchY=0, pitchProgress=0;
let pitchStartX=0, pitchStartY=0, pitchTargetX=0, pitchTargetY=0;
let pitchSpeed=0, pitchType='fastball', pitchCurve=0, pitchInZone=true;
let windupTimer=0, windupPhase=0;
let pitchTrail=[];

// Swing
let swinging=false, swingAngle=0, swingTimer=0;
let stanceY=0; // -1 high, 0 mid, 1 low
let swingResult=null; // null, 'early', 'late', 'perfect'

// Ball flight after hit
let ballFlight=null; // {x,y,z,vx,vy,vz,type,shadow}
let fieldBallX=0, fieldBallY=0;

// Fielders
let fielders=[];
let activeFielder=null;
let fieldAction=null; // {type:'running'|'throwing', timer, ...}
let throwAnim=null;

// Runners
let runnerAnims=[];

// CPU batting (top of inning)
let cpuBatResult=null, cpuBatTimer=0;

// Between-inning
let betweenInningTimer=0;

// MVP tracking
let mvpStats={name:'',val:0};

// Steal
let stealAttempt=false;

const PLATE_X=W/2, PLATE_Y=460;
const MOUND_X=W/2, MOUND_Y=310;
const ZONE_W=120, ZONE_H=100;
const ZONE_L=PLATE_X-ZONE_W/2, ZONE_R=PLATE_X+ZONE_W/2;
const ZONE_T=PLATE_Y-ZONE_H-20, ZONE_B=PLATE_Y-20;

// ============================================================
//  COMMENTARY LINES
// ============================================================
const COMM={
  hr:["AND IT'S OUTTA HERE!","That ball is going, going... GONE!","HOLY COW! HOME RUN!","See ya later! That ball is GONE!","He CRUSHED that one!","That ball isn't coming back!","YARD SALE! What a bomb!","Kiss it goodbye!"],
  triple:["That's deep! Runner rounding second... they're going for THREE!","What a shot! Triple!"],
  double:["Ripped into the gap! That's a double!","Off the wall! Runner heading to second!","Nice poke! Two-bagger!"],
  single:["Base hit!","Nice swing! That's a single!","Blooper into the outfield! Safe!","Just sneaks through!","A clean single!"],
  strikeout:["Strike three! You're OUT!","Whiffed on that one!","Caught looking! Sit down!","Struck 'em out!","K! That's an out!"],
  groundOut:["Scooped up! Throw to first... OUT!","Routine grounder, that's an out.","Nice play by the infield!"],
  flyOut:["Caught! Nice grab in the outfield!","Sky high... and it's caught!","Easy fly ball, that's an out.","Tracked it down! You're out!"],
  foul:["Foul ball!","Just missed it... foul.","Hooked it foul!","Close! But foul."],
  ball:["Ball.","That one missed the zone.","Low and away.","Just missed."],
  strikeSwing:["Swing and a miss!","He swung right through that one!","Nice pitch! Couldn't catch up to it."],
  strikeLook:["Strike! Right down the middle.","Good pitch, called strike.","Paints the corner!"],
  walk:["Ball four! Take your base!","Free pass! Walk!"],
  idle:["What a beautiful day for baseball!","The crowd is loving this!","Let's see what happens next!","The pitcher looks focused.","Big moment here...","You can feel the energy!","This is what baseball's all about!"],
  nearMiss:["Ohhh! Just missed!","So close!","That was almost crushed!"],
};
function rComm(arr){return arr[Math.random()*arr.length|0]}

// ============================================================
//  PARTICLES
// ============================================================
function addParticle(x,y,vx,vy,color,life,size,type){
  particles.push({x,y,vx,vy,color,life,maxLife:life,size:size||3,type:type||'circle'});
}
function addFirework(x,y,count,colors){
  for(let i=0;i<count;i++){
    const a=Math.random()*Math.PI*2,sp=2+Math.random()*5;
    const c=colors[Math.random()*colors.length|0];
    addParticle(x,y,Math.cos(a)*sp,Math.sin(a)*sp-2,c,40+Math.random()*30,2+Math.random()*3,'spark');
  }
}
function addDust(x,y){
  for(let i=0;i<8;i++){
    addParticle(x,y,(Math.random()-.5)*2,-Math.random()*1.5,'#d4a04088',20+Math.random()*15,4+Math.random()*4,'dust');
  }
}

// ============================================================
//  CLOUDS
// ============================================================
function initClouds(){
  clouds=[];
  for(let i=0;i<7;i++){
    clouds.push({x:Math.random()*W,y:20+Math.random()*80,w:60+Math.random()*100,h:20+Math.random()*30,sp:.15+Math.random()*.3});
  }
}
initClouds();

// ============================================================
//  FIELDER POSITIONS (screen coords, bird's eye projected)
// ============================================================
const FIELD_POS={
  P:{x:MOUND_X,y:MOUND_Y},
  C:{x:PLATE_X,y:PLATE_Y+30},
  '1B':{x:PLATE_X+140,y:370},
  '2B':{x:PLATE_X+60,y:300},
  SS:{x:PLATE_X-60,y:300},
  '3B':{x:PLATE_X-140,y:370},
  LF:{x:PLATE_X-200,y:200},
  CF:{x:PLATE_X,y:160},
  RF:{x:PLATE_X+200,y:200},
};
function initFielders(){
  fielders=Object.entries(FIELD_POS).map(([pos,p])=>({pos,x:p.x,y:p.y,homeX:p.x,homeY:p.y,targetX:p.x,targetY:p.y,hasBall:false,throwTarget:null}));
}
initFielders();

// ============================================================
//  INIT GAME
// ============================================================
function newGame(){
  stadiumIndex=Math.random()*STADIUMS.length|0;
  playerTeam=makeTeam(PLAYER_NAMES_1,'#1565c0','#1e88e5','Hornets');
  cpuTeam=makeTeam(PLAYER_NAMES_2,'#c62828','#e53935','Rockets');
  batterIndex=0;cpuBatterIndex=0;
  inning=1;half='top';outs=0;strikes=0;balls=0;
  scoreP=0;scoreC=0;bases=[null,null,null];
  gameLog=[];popup=null;commentary=null;
  particles=[];shakeTimer=0;
  transTimer=0;
  initFielders();
  runnerAnims=[];
  startInningChange();
}

// ============================================================
//  INNING MANAGEMENT
// ============================================================
function startInningChange(){
  state='inning_change';
  transTimer=120;
  if(half==='top'){
    transText='Top of '+inning;
    transText2=cpuTeam.name+' batting';
  }else{
    transText='Bottom of '+inning;
    transText2=playerTeam.name+' batting';
  }
  outs=0;strikes=0;balls=0;
  bases=[null,null,null];
  runnerAnims=[];
  initFielders();
  currentBatter=half==='top'?cpuTeam.roster[cpuBatterIndex%cpuTeam.roster.length]:playerTeam.roster[batterIndex%playerTeam.roster.length];
}

function nextHalfInning(){
  if(half==='top'){
    half='bottom';
    startInningChange();
  }else{
    half='top';
    inning++;
    if(inning>totalInnings){
      if(scoreP===scoreC){
        // extra innings
        startInningChange();
      }else{
        state='game_over';
        transTimer=999;
        if(scoreP>scoreC)seasonRecord.w++;else seasonRecord.l++;
        try{localStorage.setItem('byb_season',JSON.stringify(seasonRecord))}catch(e){}
        calcMVP();
        return;
      }
    }else{
      startInningChange();
    }
  }
}

function calcMVP(){
  let best=null,bestVal=-1;
  playerTeam.roster.concat(cpuTeam.roster).forEach(p=>{
    const v=p.hrs*4+p.rbi*2+p.hits;
    if(v>bestVal){bestVal=v;best=p}
  });
  mvpStats={name:best?best.name:'???',val:bestVal};
}

// ============================================================
//  PITCH SYSTEM
// ============================================================
const PITCH_TYPES=[
  {name:'Fastball',speed:.025,curve:0,prob:.4},
  {name:'Curveball',speed:.016,curve:1,prob:.25},
  {name:'Changeup',speed:.012,curve:0,prob:.2},
  {name:'Slider',speed:.018,curve:.6,prob:.15},
];
function choosePitch(){
  let r=Math.random(),cum=0;
  for(const pt of PITCH_TYPES){cum+=pt.prob;if(r<cum)return pt}
  return PITCH_TYPES[0];
}

function startPitch(){
  const pt=choosePitch();
  pitchType=pt.name;
  pitchSpeed=pt.speed;
  pitchCurve=pt.curve*(Math.random()>.5?1:-1);
  pitchInZone=Math.random()<.6;

  pitchStartX=MOUND_X+(Math.random()-.5)*10;
  pitchStartY=MOUND_Y-20;

  if(pitchInZone){
    pitchTargetX=ZONE_L+20+Math.random()*(ZONE_W-40);
    pitchTargetY=ZONE_T+15+Math.random()*(ZONE_H-30);
  }else{
    const side=Math.random()*4|0;
    if(side===0)pitchTargetX=ZONE_L-20-Math.random()*40, pitchTargetY=ZONE_T+Math.random()*ZONE_H;
    else if(side===1)pitchTargetX=ZONE_R+20+Math.random()*40, pitchTargetY=ZONE_T+Math.random()*ZONE_H;
    else if(side===2)pitchTargetX=ZONE_L+Math.random()*ZONE_W, pitchTargetY=ZONE_T-20-Math.random()*30;
    else pitchTargetX=ZONE_L+Math.random()*ZONE_W, pitchTargetY=ZONE_B+20+Math.random()*30;
  }

  pitchProgress=0;
  pitchActive=true;
  pitchX=pitchStartX;pitchY=pitchStartY;
  pitchTrail=[];
  windupTimer=40;windupPhase=0;
  swinging=false;swingResult=null;stealAttempt=false;
  SND.pitchThrow();
}

function updatePitch(){
  if(windupTimer>0){
    windupTimer--;
    windupPhase=1-windupTimer/40;
    if(windupTimer===0&&stealAttempt&&bases.some(b=>b)){
      // steal attempt during windup
    }
    return;
  }

  pitchProgress+=pitchSpeed;
  const t=pitchProgress;
  pitchX=pitchStartX+(pitchTargetX-pitchStartX)*t+Math.sin(t*Math.PI)*pitchCurve*60;
  pitchY=pitchStartY+(pitchTargetY-pitchStartY)*t;

  pitchTrail.push({x:pitchX,y:pitchY,a:1});
  if(pitchTrail.length>12)pitchTrail.shift();
  pitchTrail.forEach(p=>p.a*=.85);

  if(t>=1){
    pitchActive=false;
    if(!swinging){
      // called pitch
      if(pitchInZone){
        strikes++;
        showPopup('STRIKE!','#ff4444',50,36);
        if(strikes<3)setComm(rComm(COMM.strikeLook));
      }else{
        balls++;
        showPopup('BALL','#4488ff',40,30);
        setComm(rComm(COMM.ball));
        SND.ball();
      }
      checkCount();
    }
  }
}

function checkCount(){
  if(strikes>=3){
    outs++;
    showPopup("STRIKE THREE!",'#ff2222',70,42);
    setComm(rComm(COMM.strikeout));
    SND.out();
    currentBatter.ks++;currentBatter.atBats++;
    resetAtBat();
  }else if(balls>=4){
    showPopup("WALK!",'#44ff44',60,36);
    setComm(rComm(COMM.walk));
    SND.safe();
    advanceRunners(true);
    resetAtBat();
  }else{
    state='between_pitch';
    transTimer=30;
  }
}

function resetAtBat(){
  strikes=0;balls=0;
  if(outs>=3){
    nextHalfInning();
  }else{
    if(half==='bottom'){
      batterIndex++;
      currentBatter=playerTeam.roster[batterIndex%playerTeam.roster.length];
    }else{
      cpuBatterIndex++;
      currentBatter=cpuTeam.roster[cpuBatterIndex%cpuTeam.roster.length];
    }
    state='between_pitch';
    transTimer=40;
  }
}

// ============================================================
//  SWING SYSTEM
// ============================================================
function doSwing(){
  if(state!=='batting'&&state!=='cpu_batting')return;
  if(swinging)return;
  if(!pitchActive||windupTimer>0)return;

  ensureAudio();
  swinging=true;
  swingTimer=0;
  SND.swing();

  const timing=pitchProgress;
  // Sweet spot: .7-.85
  if(timing>=.65&&timing<=.9){
    if(timing>=.72&&timing<=.83)swingResult='perfect';
    else swingResult='good';
  }else if(timing<.65){
    swingResult='early';
  }else{
    swingResult='late';
  }
}

function processSwing(){
  const inZoneX=pitchX>=ZONE_L&&pitchX<=ZONE_R;
  const inZoneY=pitchY>=ZONE_T&&pitchY<=ZONE_B;
  const inZone=inZoneX&&inZoneY;

  // Adjust for stance
  const stanceBonus=(stanceY===0)?1:(Math.abs(stanceY)===1?.85:.7);

  if(swingResult==='early'||swingResult==='late'){
    if(!inZone||Math.random()<.6){
      // miss
      strikes++;
      showPopup(swingResult.toUpperCase()+'!','#ff8844',40,28);
      setComm(rComm(COMM.strikeSwing));
      SND.strike();
      pitchActive=false;
      checkCount();
      return;
    }
    // weak contact - foul or weak grounder
    if(Math.random()<.5){
      foulBall();
    }else{
      weakHit();
    }
    pitchActive=false;
    return;
  }

  if(!inZone){
    if(Math.random()<.7){
      strikes++;
      showPopup('SWING & MISS!','#ff4444',45,30);
      setComm(rComm(COMM.strikeSwing));
      SND.strike();
      pitchActive=false;
      checkCount();
      return;
    }
    foulBall();
    pitchActive=false;
    return;
  }

  // Contact! Quality based on timing + batter stats
  const batter=currentBatter;
  const power=(batter.power/100)*stanceBonus;
  const contact=(batter.contact/100)*stanceBonus;

  SND.batCrack();

  const quality=swingResult==='perfect'?1:.65;
  const roll=Math.random();

  if(quality>.8&&power>.4&&roll<.12+power*.15){
    homeRun();
  }else if(quality>.6&&roll<.15+contact*.2){
    if(Math.random()<.3)tripleHit();
    else doubleHit();
  }else if(roll<.35+contact*.3){
    if(Math.random()<.4)foulBall();
    else singleHit();
  }else if(roll<.55){
    flyOut();
  }else if(roll<.8){
    groundOut();
  }else{
    foulBall();
  }
  pitchActive=false;
}

// ============================================================
//  HIT OUTCOMES
// ============================================================
function homeRun(){
  SND.homeRun();
  const rbi=1+bases.filter(b=>b).length;
  currentBatter.hits++;currentBatter.hrs++;currentBatter.rbi+=rbi;currentBatter.atBats++;

  showPopup("HOME RUN!!!",'#ffd700',100,56);
  setComm(rComm(COMM.hr));
  shakeTimer=30;shakeAmount=12;

  // Fireworks!
  addFirework(W/2,H/3,40,['#ffd700','#ff4444','#44ff44','#4488ff','#ff44ff']);
  addFirework(W/3,H/4,30,['#ffd700','#ff8800','#ffff00']);
  addFirework(2*W/3,H/4,30,['#ff4444','#ff6666','#ffaaaa']);

  // Ball flight
  ballFlight={x:PLATE_X,y:PLATE_Y-10,z:0,vx:(Math.random()-.5)*4,vy:-8,vz:6,type:'hr',timer:0};

  SND.crowdCheer(true);

  if(half==='bottom')scoreP+=rbi;else scoreC+=rbi;
  bases=[null,null,null];

  state='hit_flight';
  transTimer=120;
}

function tripleHit(){
  SND.hit();SND.crowdCheer(false);
  currentBatter.hits++;currentBatter.atBats++;
  const rbi=bases.filter(b=>b).length;
  currentBatter.rbi+=rbi;
  if(half==='bottom')scoreP+=rbi;else scoreC+=rbi;

  showPopup("TRIPLE!",'#44ff44',70,42);
  setComm(rComm(COMM.triple));
  shakeTimer=8;shakeAmount=4;
  addFirework(W/2,H/2,15,['#44ff44','#88ff88']);

  ballFlight={x:PLATE_X,y:PLATE_Y-10,z:0,vx:(Math.random()>.5?1:-1)*(3+Math.random()*2),vy:-5,vz:3,type:'triple',timer:0};
  bases=[null,null,{name:currentBatter.name}];
  state='hit_flight';transTimer=90;
}

function doubleHit(){
  SND.hit();SND.crowdCheer(false);
  currentBatter.hits++;currentBatter.atBats++;
  const rbi=countRunnersScoring(2);
  currentBatter.rbi+=rbi;
  if(half==='bottom')scoreP+=rbi;else scoreC+=rbi;

  showPopup("DOUBLE!",'#44ff44',60,38);
  setComm(rComm(COMM.double));
  shakeTimer=5;shakeAmount=3;

  ballFlight={x:PLATE_X,y:PLATE_Y-10,z:0,vx:(Math.random()>.5?1:-1)*(2+Math.random()*2),vy:-4,vz:2.5,type:'double',timer:0};
  advanceRunnersHit(2);
  state='hit_flight';transTimer=80;
}

function singleHit(){
  SND.hit();
  currentBatter.hits++;currentBatter.atBats++;
  const rbi=countRunnersScoring(1);
  currentBatter.rbi+=rbi;
  if(half==='bottom')scoreP+=rbi;else scoreC+=rbi;

  showPopup("HIT!",'#44ff44',50,34);
  setComm(rComm(COMM.single));

  // CRACK text effect
  addParticle(PLATE_X,PLATE_Y-30,0,-2,'#fff',20,0,'text_crack');

  ballFlight={x:PLATE_X,y:PLATE_Y-10,z:0,vx:(Math.random()-.5)*4,vy:-3,vz:1.5+Math.random(),type:'single',timer:0};
  advanceRunnersHit(1);
  state='hit_flight';transTimer=70;
}

function groundOut(){
  SND.hit();
  currentBatter.atBats++;
  outs++;
  showPopup("OUT!",'#ff4444',60,38);
  setComm(rComm(COMM.groundOut));
  addDust(PLATE_X+50,PLATE_Y);

  ballFlight={x:PLATE_X,y:PLATE_Y-5,z:0,vx:(Math.random()-.5)*3,vy:-2,vz:.5,type:'ground_out',timer:0};
  state='hit_flight';transTimer=70;
}

function flyOut(){
  SND.hit();
  currentBatter.atBats++;
  outs++;
  showPopup("CAUGHT!",'#ff4444',60,36);
  setComm(rComm(COMM.flyOut));

  ballFlight={x:PLATE_X,y:PLATE_Y-10,z:0,vx:(Math.random()-.5)*3,vy:-5,vz:3,type:'fly_out',timer:0};
  state='hit_flight';transTimer=70;
}

function weakHit(){
  // weak grounder = usually out
  if(Math.random()<.7)groundOut();
  else singleHit();
}

function foulBall(){
  if(strikes<2)strikes++;
  showPopup("FOUL!",'#ffaa44',40,30);
  setComm(rComm(COMM.foul));
  SND.foul();
  addParticle(PLATE_X+(Math.random()>.5?80:-80),PLATE_Y-50,(Math.random()-.5)*5,-3,'#fff',30,5);
  state='between_pitch';
  transTimer=35;
}

function countRunnersScoring(advanceBases){
  let runs=0;
  if(advanceBases>=1&&bases[2])runs++;
  if(advanceBases>=2&&bases[1])runs++;
  if(advanceBases>=3&&bases[0])runs++;
  return runs;
}

function advanceRunnersHit(advanceBases){
  let newBases=[null,null,null];
  if(advanceBases===1){
    if(bases[2]){/* scores */}
    if(bases[1])newBases[2]=bases[1];
    if(bases[0])newBases[1]=bases[0];
    newBases[0]={name:currentBatter.name};
  }else if(advanceBases===2){
    if(bases[1]){/* scores */}
    if(bases[0])newBases[2]=bases[0];
    newBases[1]={name:currentBatter.name};
  }else if(advanceBases===3){
    newBases[2]={name:currentBatter.name};
  }
  bases=newBases;
}

function advanceRunners(walk){
  // Walk: force runners
  if(bases[0]){
    if(bases[1]){
      if(bases[2]){
        if(half==='bottom')scoreP++;else scoreC++;
      }
      bases[2]=bases[1];
    }
    bases[1]=bases[0];
  }
  bases[0]={name:currentBatter.name};
}

// ============================================================
//  CPU BATTING (simplified but visual)
// ============================================================
function cpuAtBat(){
  // Simulate a quick at-bat
  const r=Math.random();
  if(r<.08){
    // HR
    currentBatter.hits++;currentBatter.hrs++;
    const rbi=1+bases.filter(b=>b).length;
    currentBatter.rbi+=rbi;currentBatter.atBats++;
    scoreC+=rbi;
    bases=[null,null,null];
    showPopup("HOME RUN!",'#ff4444',70,40);
    setComm(currentBatter.name+" hits a HOME RUN!");
    SND.homeRun();shakeTimer=15;shakeAmount=6;
    addFirework(W/2,H/3,20,['#ff4444','#ff8844']);
  }else if(r<.15){
    currentBatter.hits++;currentBatter.atBats++;
    const rbi=countRunnersScoring(2);currentBatter.rbi+=rbi;scoreC+=rbi;
    advanceRunnersHit(2);
    showPopup("DOUBLE",'#ff8844',50,32);
    setComm(currentBatter.name+" doubles!");SND.hit();
  }else if(r<.3){
    currentBatter.hits++;currentBatter.atBats++;
    const rbi=countRunnersScoring(1);currentBatter.rbi+=rbi;scoreC+=rbi;
    advanceRunnersHit(1);
    showPopup("SINGLE",'#ffaa44',50,30);
    setComm(currentBatter.name+" singles.");SND.hit();
  }else if(r<.45){
    currentBatter.atBats++;outs++;
    showPopup("GROUND OUT",'#aaaaaa',50,28);
    setComm(currentBatter.name+" grounds out.");SND.out();
  }else if(r<.6){
    currentBatter.atBats++;outs++;
    showPopup("FLY OUT",'#aaaaaa',50,28);
    setComm(currentBatter.name+" flies out.");SND.out();
  }else if(r<.8){
    currentBatter.ks++;currentBatter.atBats++;outs++;
    showPopup("STRIKEOUT",'#aaaaaa',50,28);
    setComm(currentBatter.name+" strikes out.");SND.strike();
  }else{
    showPopup("WALK",'#88ff88',40,26);
    setComm(currentBatter.name+" draws a walk.");
    advanceRunners(true);SND.ball();
  }

  cpuBatterIndex++;
  currentBatter=cpuTeam.roster[cpuBatterIndex%cpuTeam.roster.length];

  if(outs>=3){
    state='cpu_bat_end';transTimer=60;
  }else{
    state='cpu_batting';transTimer=80;
  }
}

function drawSky(){
  const st=STADIUMS[stadiumIndex];
  const grad=X.createLinearGradient(0,0,0,H/2);
  grad.addColorStop(0,st.sky1);grad.addColorStop(1,st.sky2);
  X.fillStyle=grad;X.fillRect(0,0,W,H);
}

function drawClouds(){
  clouds.forEach(c=>{
    c.x+=c.sp;if(c.x>W+c.w)c.x=-c.w;
    X.fillStyle='rgba(255,255,255,0.7)';
    X.beginPath();
    X.ellipse(c.x,c.y,c.w/2,c.h/2,0,0,Math.PI*2);
    X.fill();
    X.beginPath();
    X.ellipse(c.x-c.w*.25,c.y+5,c.w*.3,c.h*.4,0,0,Math.PI*2);
    X.fill();
    X.beginPath();
    X.ellipse(c.x+c.w*.2,c.y+3,c.w*.35,c.h*.45,0,0,Math.PI*2);
    X.fill();
  });
}

function drawStadium(){
  const st=STADIUMS[stadiumIndex];

  // Stands (fans!)
  X.fillStyle='#555';
  X.fillRect(0,100,W,80);
  // Fan dots
  for(let i=0;i<80;i++){
    const fx=10+i*(W-20)/80;
    const fy=110+Math.sin(i*1.3+frameCount*.05)*3+(i%3)*18;
    const colors=['#ff4444','#4444ff','#ffff44','#44ff44','#ff44ff','#ffffff','#ff8800'];
    X.fillStyle=colors[i%colors.length];
    X.beginPath();X.arc(fx,fy,4,0,Math.PI*2);X.fill();
    // tiny body
    X.fillRect(fx-2,fy+4,4,6);
  }

  // Outfield wall
  X.fillStyle='#1a5c1a';
  X.fillRect(0,170,W,20);

  // Outfield grass
  X.fillStyle=st.grass;
  X.fillRect(0,185,W,H-185);

  // Grass stripes
  X.fillStyle='rgba(255,255,255,0.04)';
  for(let i=0;i<15;i++){
    if(i%2===0)X.fillRect(0,190+i*20,W,20);
  }

  // Infield dirt diamond
  X.fillStyle=st.dirt;
  X.beginPath();
  X.moveTo(PLATE_X,PLATE_Y);
  X.lineTo(PLATE_X+150,350);
  X.lineTo(PLATE_X,260);
  X.lineTo(PLATE_X-150,350);
  X.closePath();
  X.fill();

  // Infield grass
  X.fillStyle=st.grass;
  X.beginPath();
  X.moveTo(PLATE_X,PLATE_Y-30);
  X.lineTo(PLATE_X+110,360);
  X.lineTo(PLATE_X,290);
  X.lineTo(PLATE_X-110,360);
  X.closePath();
  X.fill();

  // Pitcher's mound
  X.fillStyle=st.dirt;
  X.beginPath();X.ellipse(MOUND_X,MOUND_Y+5,30,12,0,0,Math.PI*2);X.fill();

  // Base paths (white lines)
  X.strokeStyle='rgba(255,255,255,0.4)';X.lineWidth=2;
  X.beginPath();X.moveTo(PLATE_X,PLATE_Y);X.lineTo(PLATE_X+150,350);X.stroke();
  X.beginPath();X.moveTo(PLATE_X,PLATE_Y);X.lineTo(PLATE_X-150,350);X.stroke();

  // Foul lines extending
  X.strokeStyle='rgba(255,255,255,0.3)';X.lineWidth=2;
  X.beginPath();X.moveTo(PLATE_X,PLATE_Y);X.lineTo(W+50,180);X.stroke();
  X.beginPath();X.moveTo(PLATE_X,PLATE_Y);X.lineTo(-50,180);X.stroke();

  // Bases
  drawBase(PLATE_X+150,350,bases[0]!==null);  // 1st
  drawBase(PLATE_X,260,bases[1]!==null);        // 2nd
  drawBase(PLATE_X-150,350,bases[2]!==null);    // 3rd

  // Home plate
  X.fillStyle='#f5f5f5';
  X.beginPath();
  X.moveTo(PLATE_X,PLATE_Y+5);
  X.lineTo(PLATE_X+10,PLATE_Y);
  X.lineTo(PLATE_X+10,PLATE_Y-8);
  X.lineTo(PLATE_X-10,PLATE_Y-8);
  X.lineTo(PLATE_X-10,PLATE_Y);
  X.closePath();
  X.fill();
  X.strokeStyle='#aaa';X.lineWidth=1;X.stroke();
}

function drawBase(x,y,occupied){
  X.save();
  X.translate(x,y);X.rotate(Math.PI/4);
  X.fillStyle=occupied?'#ffd700':'#f5f5f5';
  X.fillRect(-10,-10,20,20);
  X.strokeStyle='#999';X.lineWidth=1;X.strokeRect(-10,-10,20,20);
  if(occupied){
    X.fillStyle='rgba(255,215,0,0.3)';
    X.fillRect(-13,-13,26,26);
  }
  X.restore();

  // Runner on base
  if(occupied){
    drawMiniRunner(x,y-18);
  }
}

function drawMiniRunner(x,y){
  const bob=Math.sin(frameCount*.15)*2;
  // Body
  X.fillStyle='#1565c0';
  X.fillRect(x-5,y-2+bob,10,10);
  // Head
  X.fillStyle='#ffcc80';
  X.beginPath();X.arc(x,y-7+bob,6,0,Math.PI*2);X.fill();
  // Cap
  X.fillStyle='#1565c0';
  X.beginPath();X.arc(x,y-10+bob,6,Math.PI,.02);X.fill();
  X.fillRect(x,y-12+bob,7,3);
}

function drawFielders(){
  fielders.forEach(f=>{
    // Move toward target
    const dx=f.targetX-f.x, dy=f.targetY-f.y;
    const d=Math.sqrt(dx*dx+dy*dy);
    if(d>2){
      const sp=3;
      f.x+=dx/d*sp;f.y+=dy/d*sp;
    }

    drawFielderChar(f.x,f.y,cpuTeam.color1,f.pos==='P');
  });
}

function drawFielderChar(x,y,color,isPitcher){
  const scale=isPitcher?1:.7;
  // Shadow
  X.fillStyle='rgba(0,0,0,0.2)';
  X.beginPath();X.ellipse(x,y+10*scale,8*scale,3*scale,0,0,Math.PI*2);X.fill();
  // Pants
  X.fillStyle='#eee';
  X.fillRect(x-5*scale,y-2*scale,10*scale,12*scale);
  // Jersey
  X.fillStyle=color;
  X.fillRect(x-7*scale,y-12*scale,14*scale,12*scale);
  // Head
  X.fillStyle='#ffcc80';
  X.beginPath();X.arc(x,y-18*scale,7*scale,0,Math.PI*2);X.fill();
  // Cap
  X.fillStyle=color;
  X.beginPath();X.arc(x,y-21*scale,7*scale,Math.PI,.02);X.fill();
  X.fillRect(x,y-24*scale,8*scale,3*scale);
  // Glove
  X.fillStyle='#8B4513';
  X.beginPath();X.arc(x+9*scale,y-5*scale,5*scale,0,Math.PI*2);X.fill();
}

function drawPitcher(){
  const px=MOUND_X, py=MOUND_Y;
  const windupAmt=windupTimer>0?windupPhase:0;

  // Shadow
  X.fillStyle='rgba(0,0,0,0.25)';
  X.beginPath();X.ellipse(px,py+15,12,4,0,0,Math.PI*2);X.fill();

  // Body lean during windup
  const lean=Math.sin(windupAmt*Math.PI)*8;
  const armRaise=Math.sin(windupAmt*Math.PI)*25;

  // Legs
  X.fillStyle='#eee';
  X.fillRect(px-4,py+2,4,14);
  X.fillRect(px+1,py+2,4,14);

  // Body
  X.fillStyle=cpuTeam?cpuTeam.color1:'#c62828';
  X.fillRect(px-8+lean,py-14,16,18);

  // Number on jersey
  X.fillStyle='#fff';X.font='bold 8px Arial';X.textAlign='center';
  X.fillText('1',px+lean,py-2);

  // Pitching arm
  X.strokeStyle='#ffcc80';X.lineWidth=4;
  X.beginPath();
  X.moveTo(px+8+lean,py-8);
  X.lineTo(px+15+lean,py-8-armRaise);
  X.stroke();

  // Ball in hand during windup
  if(windupTimer>0){
    X.fillStyle='#fff';
    X.beginPath();X.arc(px+15+lean,py-10-armRaise,4,0,Math.PI*2);X.fill();
    X.strokeStyle='#cc0000';X.lineWidth=1;
    X.beginPath();X.arc(px+15+lean,py-10-armRaise,3,.5,2);X.stroke();
  }

  // Glove arm
  X.strokeStyle='#ffcc80';X.lineWidth=4;
  X.beginPath();X.moveTo(px-8+lean,py-8);X.lineTo(px-18+lean,py-2);X.stroke();
  X.fillStyle='#8B4513';
  X.beginPath();X.arc(px-18+lean,py-2,5,0,Math.PI*2);X.fill();

  // Head
  X.fillStyle='#ffcc80';
  X.beginPath();X.arc(px+lean,py-22,10,0,Math.PI*2);X.fill();

  // Cap
  X.fillStyle=cpuTeam?cpuTeam.color1:'#c62828';
  X.beginPath();X.arc(px+lean,py-26,10,Math.PI,0);X.fill();
  X.fillRect(px+lean,py-29,10,4);

  // Eyes
  X.fillStyle='#222';
  X.beginPath();X.arc(px-3+lean,py-23,1.5,0,Math.PI*2);X.fill();
  X.beginPath();X.arc(px+3+lean,py-23,1.5,0,Math.PI*2);X.fill();
}

function drawBatter(){
  if(half==='top')return; // Don't draw batter during CPU batting (they use simplified view)

  const bx=PLATE_X-50, by=PLATE_Y;
  const bob=Math.sin(frameCount*.08)*1.5;

  // Batting stance height
  const stanceOff=stanceY*8;

  // Shadow
  X.fillStyle='rgba(0,0,0,0.2)';
  X.beginPath();X.ellipse(bx,by+12,12,4,0,0,Math.PI*2);X.fill();

  // Legs
  X.fillStyle='#eee';
  X.fillRect(bx-5,by+stanceOff+bob,5,14);
  X.fillRect(bx+2,by+stanceOff+bob,5,14);

  // Body
  X.fillStyle=playerTeam?playerTeam.color1:'#1565c0';
  X.fillRect(bx-9,by-14+stanceOff+bob,18,18);

  // Number
  X.fillStyle='#fff';X.font='bold 9px Arial';X.textAlign='center';
  X.fillText(String((batterIndex%9)+1),bx,by-2+stanceOff+bob);

  // Head
  X.fillStyle=currentBatter?currentBatter.skinTone:'#ffcc80';
  X.beginPath();X.arc(bx,by-22+stanceOff+bob,10,0,Math.PI*2);X.fill();

  // Batting helmet
  X.fillStyle=playerTeam?playerTeam.color1:'#1565c0';
  X.beginPath();X.arc(bx,by-26+stanceOff+bob,10,Math.PI,.1);X.fill();
  X.fillRect(bx-12,by-28+stanceOff+bob,6,8); // ear flap

  // Eyes (focused!)
  X.fillStyle='#222';
  X.beginPath();X.arc(bx+3,by-23+stanceOff+bob,2,0,Math.PI*2);X.fill();
  X.beginPath();X.arc(bx+8,by-23+stanceOff+bob,1.5,0,Math.PI*2);X.fill();

  // Bat
  if(swinging){
    const sa=swingTimer/6*Math.PI*.8-Math.PI*.4;
    X.save();
    X.translate(bx+5,by-8+stanceOff+bob);
    X.rotate(sa);
    // Bat handle
    X.fillStyle='#8B4513';
    X.fillRect(0,-2,10,4);
    // Bat barrel
    X.fillStyle='#D2691E';
    X.fillRect(10,-4,30,8);
    X.fillStyle='#DEB887';
    X.fillRect(35,-5,10,10);
    X.restore();
  }else{
    // Bat ready position
    X.save();
    X.translate(bx+5,by-8+stanceOff+bob);
    X.rotate(-Math.PI*.35+Math.sin(frameCount*.04)*.03);
    X.fillStyle='#8B4513';
    X.fillRect(0,-2,10,4);
    X.fillStyle='#D2691E';
    X.fillRect(10,-4,30,8);
    X.fillStyle='#DEB887';
    X.fillRect(35,-5,10,10);
    X.restore();
  }

  // Stance indicator
  if(state==='batting'){
    X.fillStyle='rgba(255,255,255,0.5)';X.font='11px Arial';X.textAlign='center';
    const labels=['HIGH','MID','LOW'];
    X.fillText(labels[stanceY+1],bx,by+30);
  }
}

function drawStrikeZone(){
  if(state!=='batting'||half==='top')return;
  X.strokeStyle='rgba(255,255,255,0.2)';X.lineWidth=1;
  X.setLineDash([4,4]);
  X.strokeRect(ZONE_L,ZONE_T,ZONE_W,ZONE_H);
  X.setLineDash([]);

  // Grid lines
  X.strokeStyle='rgba(255,255,255,0.08)';
  X.beginPath();X.moveTo(ZONE_L+ZONE_W/3,ZONE_T);X.lineTo(ZONE_L+ZONE_W/3,ZONE_B);X.stroke();
  X.beginPath();X.moveTo(ZONE_L+2*ZONE_W/3,ZONE_T);X.lineTo(ZONE_L+2*ZONE_W/3,ZONE_B);X.stroke();
  X.beginPath();X.moveTo(ZONE_L,ZONE_T+ZONE_H/3);X.lineTo(ZONE_R,ZONE_T+ZONE_H/3);X.stroke();
  X.beginPath();X.moveTo(ZONE_L,ZONE_T+2*ZONE_H/3);X.lineTo(ZONE_R,ZONE_T+2*ZONE_H/3);X.stroke();
}

function drawPitch(){
  if(!pitchActive||windupTimer>0)return;

  // Trail
  pitchTrail.forEach((p,i)=>{
    X.fillStyle=`rgba(255,255,255,${p.a*.5})`;
    const sz=3+i*.3;
    X.beginPath();X.arc(p.x,p.y,sz,0,Math.PI*2);X.fill();
  });

  // Ball
  const sz=6+pitchProgress*4; // Ball gets bigger as it approaches
  X.fillStyle='#fff';
  X.beginPath();X.arc(pitchX,pitchY,sz,0,Math.PI*2);X.fill();

  // Seams
  X.strokeStyle='#cc0000';X.lineWidth=1;
  X.beginPath();
  X.arc(pitchX,pitchY,sz*.6,frameCount*.2,frameCount*.2+1.5);
  X.stroke();

  // Speed indicator
  X.fillStyle='rgba(255,255,255,0.4)';X.font='10px Arial';X.textAlign='left';
  if(pitchProgress>.5){
    X.fillText(pitchType,pitchX+12,pitchY-5);
  }
}

function drawBallFlight(){
  if(!ballFlight)return;
  const b=ballFlight;

  // Shadow on ground
  X.fillStyle='rgba(0,0,0,0.3)';
  X.beginPath();X.ellipse(b.x,b.y+10,5+b.z*.5,2+b.z*.2,0,0,Math.PI*2);X.fill();

  // Ball
  const sz=4+b.z*.6;
  X.fillStyle='#fff';
  X.beginPath();X.arc(b.x,b.y-b.z*8,sz,0,Math.PI*2);X.fill();
  X.strokeStyle='#cc0000';X.lineWidth=1;
  X.beginPath();X.arc(b.x,b.y-b.z*8,sz*.5,frameCount*.3,frameCount*.3+1);X.stroke();

  // Trail for HR
  if(b.type==='hr'){
    for(let i=0;i<5;i++){
      X.fillStyle=`rgba(255,215,0,${.3-i*.05})`;
      X.beginPath();X.arc(b.x-b.vx*i*3,b.y-b.z*8+b.vy*i*2,3-i*.4,0,Math.PI*2);X.fill();
    }
  }
}

X.fillStyle='#ffd700';X.font='bold 10px Arial';

  X.fillStyle='#aaa';X.font='9px Arial';
  X.fillText('INN',sbx+130,sby+14);
  X.fillStyle='#fff';X.font='bold 12px Arial';
  X.fillText(inning+'',sbx+160,sby+14);
  X.fillStyle='#aaa';X.font='8px Arial';
  X.fillText(half==='top'?'TOP':'BOT',sbx+172,sby+14);

  X.font='bold 13px Arial';
  X.fillStyle=playerTeam?playerTeam.color2:'#4488ff';
  X.fillText(playerTeam?playerTeam.name:'Hornets',sbx+10,sby+35);
  X.fillStyle='#fff';X.font='bold 16px Arial';
  X.fillText(scoreP+'',sbx+160,sby+35);

  X.font='bold 13px Arial';
  X.fillStyle=cpuTeam?cpuTeam.color2:'#ff4444';
  X.fillText(cpuTeam?cpuTeam.name:'Rockets',sbx+10,sby+52);
  X.fillStyle='#fff';X.font='bold 16px Arial';
  X.fillText(scoreC+'',sbx+160,sby+52);

  // Count
  X.font='bold 11px Arial';X.fillStyle='#fff';
  X.fillText('B:'+balls+'  S:'+strikes+'  O:'+outs,sbx+10,sby+68);

  // Bases indicator
  const bix=sbx+145, biy=sby+60;
  drawMiniBase(bix,biy-10,bases[1]!==null);  // 2nd
  drawMiniBase(bix-10,biy,bases[2]!==null);   // 3rd
  drawMiniBase(bix+10,biy,bases[0]!==null);   // 1st
}

function drawMiniBase(x,y,on){
  X.save();X.translate(x,y);X.rotate(Math.PI/4);
  X.fillStyle=on?'#ffd700':'#555';
  X.fillRect(-4,-4,8,8);
  X.restore();
}

function drawBatterInfo(){
  if(!currentBatter||state==='title'||state==='game_over')return;

  X.fillStyle='rgba(0,0,0,0.6)';
  roundRect(8,H-75,180,67,6,true,false);

  X.fillText(currentBatter.name,16,H-57);

  X.font='10px Arial';X.fillStyle='#aaa';
  X.fillText((half==='bottom'?playerTeam:cpuTeam).name,16,H-43);

  // Stats bars
  const stats=[
    {label:'PWR',val:currentBatter.power,color:'#ff4444'},
    {label:'CON',val:currentBatter.contact,color:'#44ff44'},
    {label:'SPD',val:currentBatter.speed,color:'#4488ff'},
  ];
  stats.forEach((s,i)=>{

function drawCommentary(){
  if(!commentary||commentary.timer<=0)return;

  const a=Math.min(1,commentary.timer/20);
  X.fillStyle=`rgba(0,0,0,${a*.7})`;
  X.font='bold 16px Arial';X.textAlign='center';
  const tw=X.measureText(commentary.text).width+30;
  roundRect(W/2-tw/2,H-105,tw,28,6,true,false);

  X.fillStyle=`rgba(255,255,220,${a})`;
  X.fillText(commentary.text,W/2,H-84);
}

function drawPopup(){
  if(!popup||popup.timer<=0)return;

  const a=Math.min(1,popup.timer/15);
  const scale=popup.timer>popup.maxTimer-8?1+(popup.maxTimer-popup.timer-8)*-.01:1;
  const rise=popup.y;

  X.save();
  X.globalAlpha=a;
  X.font=`bold ${popup.size*scale|0}px Arial`;
  X.textAlign='center';

  // Shadow
  X.fillStyle='rgba(0,0,0,0.5)';
  X.fillText(popup.text,W/2+3,H/2-60-rise+3);

  // Main text
  X.fillStyle=popup.color;
  X.fillText(popup.text,W/2,H/2-60-rise);

  // Outline
  X.strokeStyle='#fff';X.lineWidth=2;
  X.strokeText(popup.text,W/2,H/2-60-rise);

  X.restore();
}

function drawParticles(){
  particles.forEach(p=>{
    const a=p.life/p.maxLife;
    if(p.type==='spark'){
      X.fillStyle=p.color;X.globalAlpha=a;
      X.beginPath();X.arc(p.x,p.y,p.size*a,0,Math.PI*2);X.fill();
      X.globalAlpha=1;
    }else if(p.type==='dust'){
      X.fillStyle=p.color;X.globalAlpha=a*.5;
      X.beginPath();X.arc(p.x,p.y,p.size,0,Math.PI*2);X.fill();
      X.globalAlpha=1;
    }else if(p.type==='text_crack'){
      X.globalAlpha=a;
      X.fillStyle='#fff';X.font='bold 28px Arial';X.textAlign='center';
      X.fillText('CRACK!',p.x,p.y);
      X.strokeStyle='#ffd700';X.lineWidth=1;
      X.strokeText('CRACK!',p.x,p.y);
      X.globalAlpha=1;
    }else{
      X.fillStyle=p.color;X.globalAlpha=a;
      X.beginPath();X.arc(p.x,p.y,p.size,0,Math.PI*2);X.fill();
      X.globalAlpha=1;
    }
  });
}

function roundRect(x,y,w,h,r,fill,stroke){
  X.beginPath();
  X.moveTo(x+r,y);X.lineTo(x+w-r,y);X.quadraticCurveTo(x+w,y,x+w,y+r);
  X.lineTo(x+w,y+h-r);X.quadraticCurveTo(x+w,y+h,x+w-r,y+h);
  X.lineTo(x+r,y+h);X.quadraticCurveTo(x,y+h,x,y+h-r);
  X.lineTo(x,y+r);X.quadraticCurveTo(x,y,x+r,y);
  X.closePath();
  if(fill)X.fill();if(stroke)X.stroke();
}

function drawSwingResult(){
  if(!swingResult||!swinging)return;
  const colors={perfect:'#ffd700',good:'#44ff44',early:'#ff8844',late:'#ff8844'};
  const labels={perfect:'PERFECT!',good:'GOOD!',early:'EARLY',late:'LATE'};
  X.fillStyle=colors[swingResult]||'#fff';
  X.font='bold 20px Arial';X.textAlign='center';
  X.fillText(labels[swingResult],PLATE_X,PLATE_Y+40);
}

// ============================================================
//  UPDATE
// ============================================================
function update(){
  frameCount++;

  // Particles
  particles.forEach(p=>{p.x+=p.vx;p.y+=p.vy;p.vy+=.08;p.life--});
  particles=particles.filter(p=>p.life>0);

  // Popup
  if(popup){popup.timer--;popup.y+=.5;if(popup.timer<=0)popup=null}
  if(commentary){commentary.timer--;if(commentary.timer<=0)commentary=null}

  // Shake
  if(shakeTimer>0)shakeTimer--;

  // Random ambient
  if(frameCount%600===0&&state==='batting'){setComm(rComm(COMM.idle));SND.ambient()}

  switch(state){
    case 'title':break;

    case 'inning_change':
      transTimer--;
      if(transTimer<=0){
        if(half==='top'){
          state='cpu_batting';transTimer=60;
          currentBatter=cpuTeam.roster[cpuBatterIndex%cpuTeam.roster.length];
        }else{
          state='batting';
          currentBatter=playerTeam.roster[batterIndex%playerTeam.roster.length];
          startPitch();
        }
      }
      break;

    case 'cpu_batting':
      transTimer--;
      if(transTimer<=0){cpuAtBat()}
      break;

    case 'cpu_bat_end':
      transTimer--;
      if(transTimer<=0)nextHalfInning();
      break;

    case 'batting':
      if(pitchActive)updatePitch();
      if(swinging){
        swingTimer++;
        if(swingTimer===4)processSwing();
        if(swingTimer>10){swinging=false;swingResult=null}
      }
      break;

    case 'between_pitch':
      transTimer--;
      if(transTimer<=0){
        state=half==='top'?'cpu_batting':'batting';
        if(half==='bottom')startPitch();
        else transTimer=60;
      }
      break;

    case 'hit_flight':
      if(ballFlight){
        ballFlight.timer++;
        ballFlight.x+=ballFlight.vx;
        ballFlight.vy+=.12; // gravity
        ballFlight.y+=ballFlight.vy;
        ballFlight.vz-=.05;
        if(ballFlight.vz<0)ballFlight.vz=0;

        // HR fireworks
        if(ballFlight.type==='hr'&&ballFlight.timer%6===0){
          addParticle(ballFlight.x,ballFlight.y-ballFlight.z*8,(Math.random()-.5)*2,Math.random()*-1,'#ffd700',15,3,'spark');
        }

        // Fielder chasing
        if(ballFlight.timer===10&&ballFlight.type!=='hr'){
          const closest=fielders.reduce((best,f)=>{
            if(f.pos==='P'||f.pos==='C')return best;
            const d=Math.abs(f.homeX-ballFlight.x)+Math.abs(f.homeY-ballFlight.y);
            return d<best.d?{f,d}:best;
          },{f:null,d:Infinity});
          if(closest.f){
            closest.f.targetX=ballFlight.x;
            closest.f.targetY=Math.min(ballFlight.y,closest.f.homeY);
          }
        }
      }
      transTimer--;
      if(transTimer<=0){
        ballFlight=null;
        // Reset fielders
        fielders.forEach(f=>{f.targetX=f.homeX;f.targetY=f.homeY});
        resetAtBat();
      }
      break;

    case 'game_over':break;
  }
}

// ============================================================
//  DRAW
// ============================================================
function draw(){
  X.save();

  // Screen shake
  if(shakeTimer>0){
    const sx=(Math.random()-.5)*shakeAmount*(shakeTimer/30);
    const sy=(Math.random()-.5)*shakeAmount*(shakeTimer/30);
    X.translate(sx,sy);
  }

  if(state==='title'){
    drawTitle();
  }else if(state==='game_over'){
    drawGameOver();
  }else if(state==='inning_change'||state==='cpu_bat_end'){
    drawSky();drawClouds();drawStadium();drawFielders();
    drawTransition();
  }else{
    drawSky();
    drawClouds();
    drawStadium();
    drawFielders();
    drawPitcher();
    drawBatter();
    drawStrikeZone();
    drawPitch();
    drawBallFlight();
    drawSwingResult();
    drawParticles();
    drawScoreboard();
    drawBatterInfo();
    drawCommentary();
    drawPopup();

    // CPU batting overlay
    if(half==='top'&&(state==='cpu_batting'||state==='between_pitch')){
      X.fillStyle='rgba(0,0,30,0.3)';X.fillRect(0,0,W,H);
      X.fillStyle='#fff';X.font='bold 18px Arial';X.textAlign='center';
      X.fillText(cpuTeam.name+' Batting',W/2,H/2-30);
      if(currentBatter){
        X.font='bold 14px Arial';X.fillStyle='#ffd700';
        X.fillText('Now batting: '+currentBatter.name,W/2,H/2);
      }
    }
  }

  X.restore();
}

// ============================================================
//  INPUT HANDLING
// ============================================================
document.addEventListener('keydown',e=>{
  ensureAudio();

  if(state==='title'){
    if(e.code==='Space'||e.code==='Enter'){newGame();e.preventDefault()}
    if(e.code==='Digit1')totalInnings=3;
    if(e.code==='Digit2')totalInnings=5;
    if(e.code==='Digit3')totalInnings=9;
    if(e.code==='Tab'){e.preventDefault();stadiumIndex=(stadiumIndex+1)%STADIUMS.length}
    return;
  }
  if(state==='game_over'){
    if(e.code==='Space'||e.code==='Enter'){state='title';e.preventDefault()}
    return;
  }

  if(e.code==='Space'){
    e.preventDefault();
    doSwing();
  }
  if(e.code==='ArrowUp'){stanceY=Math.max(-1,stanceY-1);e.preventDefault()}
  if(e.code==='ArrowDown'){stanceY=Math.min(1,stanceY+1);e.preventDefault()}
  if(e.code==='KeyS'){
    stealAttempt=true;
    if(bases.some(b=>b)){
      setComm("Steal attempt!");
      // Simple steal logic
      if(Math.random()<.4){
        // Successful steal
        let newBases=[null,null,null];
        if(bases[2]){if(half==='bottom')scoreP++;else scoreC++;showPopup("STOLE HOME!",'#44ff44',40,28)}
        if(bases[1])newBases[2]=bases[1];
        if(bases[0])newBases[1]=bases[0];
        bases=newBases;
        showPopup("SAFE!",'#44ff44',40,30);SND.safe();
      }else{
        // Caught stealing
        outs++;
        // Remove lead runner
        for(let i=2;i>=0;i--){if(bases[i]){bases[i]=null;break}}
        showPopup("CAUGHT STEALING!",'#ff4444',50,28);SND.out();
        if(outs>=3)nextHalfInning();
      }
    }
  }
});

C.addEventListener('click',e=>{
  ensureAudio();
  const rect=C.getBoundingClientRect();
  const mx=(e.clientX-rect.left)*(W/rect.width);
  const my=(e.clientY-rect.top)*(H/rect.height);

  if(state==='title'){
    if(mx>W/2-100&&mx<W/2+100&&my>410&&my<465)newGame();
    return;
  }
  if(state==='game_over'){
    if(mx>W/2-120&&mx<W/2+120&&my>550&&my<600){state='title';return}
  }

  doSwing();
});

// Mobile buttons
document.getElementById('swingBtn').addEventListener('touchstart',e=>{e.preventDefault();ensureAudio();doSwing()});
document.getElementById('stealBtn').addEventListener('touchstart',e=>{
  e.preventDefault();ensureAudio();
  document.dispatchEvent(new KeyboardEvent('keydown',{code:'KeyS'}));
});

// ============================================================
//  GAME LOOP
// ============================================================
function loop(){
  update();
  draw();
  requestAnimationFrame(loop);
}
loop();

})();
</script>
