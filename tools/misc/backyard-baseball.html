// ============================================================
//  AUDIO ENGINE (Web Audio API - all synthesized)

const ACtx=window.AudioContext||window.webkitAudioContext;
let ac=null;
function ensureAudio(){if(!ac)ac=new ACtx();if(ac.state==='suspended')ac.resume()}

function tone(f,d,type,v,dl){
  if(!ac)return;const t=ac.currentTime+(dl||0);
  const o=ac.createOscillator(),g=ac.createGain();
  o.type=type||'sine';o.frequency.setValueAtTime(f,t);
  g.gain.setValueAtTime(v||.15,t);g.gain.exponentialRampToValueAtTime(.001,t+d);
  o.connect(g);g.connect(ac.destination);o.start(t);o.stop(t+d);
}
function noise(d,v,dl){
  if(!ac)return;const t=ac.currentTime+(dl||0);
  const sz=ac.sampleRate*d,buf=ac.createBuffer(1,sz,ac.sampleRate),data=buf.getChannelData(0);
  for(let i=0;i<sz;i++)data[i]=Math.random()*2-1;
  const s=ac.createBufferSource();s.buffer=buf;
  const g=ac.createGain();g.gain.setValueAtTime(v||.1,t);g.gain.exponentialRampToValueAtTime(.001,t+d);
  s.connect(g);g.connect(ac.destination);s.start(t);s.stop(t+d);
}
function filteredNoise(d,v,freq,dl){
  if(!ac)return;const t=ac.currentTime+(dl||0);
  const sz=ac.sampleRate*d,buf=ac.createBuffer(1,sz,ac.sampleRate),data=buf.getChannelData(0);
  for(let i=0;i<sz;i++)data[i]=Math.random()*2-1;
  const s=ac.createBufferSource();s.buffer=buf;
  const filt=ac.createBiquadFilter();filt.type='lowpass';filt.frequency.value=freq||1000;
  const g=ac.createGain();g.gain.setValueAtTime(v||.1,t);g.gain.exponentialRampToValueAtTime(.001,t+d);
  s.connect(filt);filt.connect(g);g.connect(ac.destination);s.start(t);s.stop(t+d);
}

// Organ note for between-innings
function organNote(f,d,v,dl){
  if(!ac)return;const t=ac.currentTime+(dl||0);
  const o1=ac.createOscillator(),o2=ac.createOscillator(),o3=ac.createOscillator();
  const g=ac.createGain();
  o1.type='sine';o1.frequency.setValueAtTime(f,t);
  o2.type='sine';o2.frequency.setValueAtTime(f*2,t);
  o3.type='triangle';o3.frequency.setValueAtTime(f*3,t);
  const g1=ac.createGain();g1.gain.value=v||.06;
  const g2=ac.createGain();g2.gain.value=(v||.06)*.4;
  const g3=ac.createGain();g3.gain.value=(v||.06)*.15;
  g.gain.setValueAtTime(1,t);g.gain.exponentialRampToValueAtTime(.001,t+d);
  o1.connect(g1);o2.connect(g2);o3.connect(g3);
  g1.connect(g);g2.connect(g);g3.connect(g);g.connect(ac.destination);
  o1.start(t);o1.stop(t+d);o2.start(t);o2.stop(t+d);o3.start(t);o3.stop(t+d);
}

const SND={
  batCrack(){noise(.07,.55);tone(900,.06,'square',.28);tone(500,.09,'square',.2,.02);tone(1200,.04,'square',.12);tone(300,.03,'triangle',.15)},
  homeRun(){SND.batCrack();tone(523,.12,'square',.22,.2);tone(659,.12,'square',.22,.35);tone(784,.12,'square',.22,.5);tone(1047,.4,'square',.32,.65);filteredNoise(2,.22,900,.4);filteredNoise(2.5,.18,700,.9)},
  strike(){tone(250,.25,'sawtooth',.13);tone(180,.15,'sawtooth',.09,.1)},
  ball(){tone(350,.15,'sine',.09);tone(280,.15,'sine',.07,.08)},
  out(){tone(350,.12,'square',.16);tone(250,.12,'square',.16,.12);tone(180,.25,'square',.13,.24)},
  hit(){SND.batCrack();tone(700,.08,'sine',.09,.08)},
  foul(){noise(.05,.32);tone(400,.15,'sawtooth',.07,.03)},
  crowdCheer(big){filteredNoise(big?3:1.5,big?.32:.17,big?1200:800);if(big){tone(440,.2,'sine',.07,.3);tone(550,.2,'sine',.07,.5);tone(660,.2,'sine',.07,.7);tone(880,.3,'sine',.08,.9)}},
  crowdOoh(){filteredNoise(.8,.13,500);tone(300,.4,'sine',.06,.1);tone(250,.3,'sine',.05,.3)},
  crowdBoo(){filteredNoise(1.2,.1,300);tone(150,.4,'sawtooth',.04,.1);tone(120,.3,'sawtooth',.03,.3)},
  pitchThrow(){tone(350,.08,'sine',.03)},
  safe(){tone(600,.12,'square',.16);tone(800,.22,'square',.2,.12)},
  walkMusic(){tone(440,.1,'square',.09);tone(554,.1,'square',.09,.12);tone(659,.1,'square',.09,.24);tone(880,.15,'square',.11,.36)},
  ambient(){filteredNoise(3,.025,400)},
  swing(){noise(.04,.17);tone(200,.06,'sine',.05)},
  catchBall(){noise(.03,.2);tone(600,.04,'sine',.08)},
  throwBall(){tone(500,.06,'sine',.04);noise(.02,.08)},
  organCharge(){
    const n=[262,330,392,523,0,392,523];
    const d=[.15,.15,.15,.15,.15,.15,.35];
    let t=0;
    n.forEach((f,i)=>{if(f>0)organNote(f,d[i]+.05,.07,t);t+=d[i]});
  },

  umpireStrike(){tone(800,.06,'square',.2);tone(600,.08,'square',.15,.06);tone(400,.15,'square',.1,.14)},

};

let playerTeam, cpuTeam;
let batterIndex=0, cpuBatterIndex=0;

// ============================================================

// ============================================================
let state='title'; // title, batting, pitching, between_pitch, hit_flight, fielding, cpu_batting, cpu_bat_end, inning_change, game_over
let inning=1, half='top', outs=0, strikes=0, balls=0;
let scoreP=0, scoreC=0;
let inningScores={p:[],c:[]};
let bases=[null,null,null]; // runner objects or null (1st,2nd,3rd)
let gameLog=[];
let seasonRecord={w:0,l:0};
try{const s=localStorage.getItem('byb_season2');if(s)seasonRecord=JSON.parse(s)}catch(e){}

  {name:"Sunny Day Park",sky1:'#4a9eff',sky2:'#87ceeb',grass:'#3da33d',dirt:'#c8a040',wall:'#1a5c1a'},
  {name:"Sunset Field",sky1:'#ff6b35',sky2:'#ffa94d',grass:'#2d8a2d',dirt:'#b89030',wall:'#2a4a2a'},

let pitchActive=false, pitchX=0, pitchY=0, pitchProgress=0;

let pitchSpeed=0, pitchType='Fastball', pitchCurve=0, pitchInZone=true;

function rComm(arr){return arr[Math.random()*arr.length|0]}

// ============================================================
//  PARTICLES
// ============================================================
function addParticle(x,y,vx,vy,color,life,size,type){
  particles.push({x,y,vx,vy,color,life,maxLife:life,size:size||3,type:type||'circle'});
}
function addFirework(x,y,count,colors){
  for(let i=0;i<count;i++){
    const a=Math.random()*Math.PI*2,sp=2+Math.random()*5;
    const c=colors[Math.random()*colors.length|0];
    addParticle(x,y,Math.cos(a)*sp,Math.sin(a)*sp-2,c,40+Math.random()*30,2+Math.random()*3,'spark');
  }
}
function addDust(x,y,amount){
  for(let i=0;i<(amount||8);i++){
    addParticle(x,y,(Math.random()-.5)*2,-Math.random()*1.5,'#d4a04088',20+Math.random()*15,4+Math.random()*4,'dust');
  }
}
function addConfetti(x,y,count,colors){
  for(let i=0;i<count;i++){
    const a=Math.random()*Math.PI*2,sp=1+Math.random()*4;
    const c=colors[Math.random()*colors.length|0];
    addParticle(x,y,Math.cos(a)*sp,Math.sin(a)*sp-3,c,60+Math.random()*40,3+Math.random()*4,'confetti');

}

  clouds=[];
  for(let i=0;i<7;i++){

// Get base position for a base number (0=home,1=1st,2=2nd,3=3rd)
function getBasePos(b){
  if(b===0)return{x:PLATE_X,y:PLATE_Y};
  if(b===1)return{x:PLATE_X+150,y:350};
  if(b===2)return{x:PLATE_X,y:260};
  if(b===3)return{x:PLATE_X-150,y:350};
  return{x:PLATE_X,y:PLATE_Y};

// ============================================================
//  INIT GAME
// ============================================================
function newGame(){
  stadiumIndex=Math.random()*STADIUMS.length|0;
  playerTeam=makeTeam(PLAYER_NAMES_1,'#1565c0','#1e88e5','Hornets');
  cpuTeam=makeTeam(PLAYER_NAMES_2,'#c62828','#e53935','Rockets');
  batterIndex=0;cpuBatterIndex=0;
  inning=1;half='top';outs=0;strikes=0;balls=0;
  scoreP=0;scoreC=0;
  inningScores={p:new Array(totalInnings).fill(0),c:new Array(totalInnings).fill(0)};
  bases=[null,null,null];
  gameLog=[];popup=null;commentary=null;
  particles=[];shakeTimer=0;
  transTimer=0;celebrating=false;
  runners=[];
  initFielders();
  throwAnim=null;fieldingPlay=null;
  startInningChange();
}

// ============================================================
//  INNING MANAGEMENT
// ============================================================
function startInningChange(){
  state='inning_change';
  transTimer=140;
  if(half==='top'){
    transText='Top of '+inning;
    transText2=cpuTeam.name+' batting';
  }else{
    transText='Bottom of '+inning;
    transText2=playerTeam.name+' batting';
  }
  outs=0;strikes=0;balls=0;
  bases=[null,null,null];
  runners=[];
  initFielders();
  throwAnim=null;fieldingPlay=null;
  currentBatter=half==='top'?cpuTeam.roster[cpuBatterIndex%cpuTeam.roster.length]:playerTeam.roster[batterIndex%playerTeam.roster.length];
  // Play organ between innings
  if(inning>1||half==='bottom')SND.organBetween();
}

function nextHalfInning(){
  // Record inning score
  const idx=inning-1;
  if(half==='top'){
    if(idx<inningScores.c.length)inningScores.c[idx]=(inningScores.c[idx]||0);
  }else{
    if(idx<inningScores.p.length)inningScores.p[idx]=(inningScores.p[idx]||0);
  }

  if(half==='top'){
    half='bottom';
    startInningChange();
  }else{
    half='top';
    inning++;
    if(inning>totalInnings){
      if(scoreP===scoreC){
        // Extra innings
        inningScores.p.push(0);
        inningScores.c.push(0);
        startInningChange();
      }else{
        state='game_over';
        transTimer=999;
        if(scoreP>scoreC){seasonRecord.w++;SND.crowdCheer(true)}else{seasonRecord.l++;SND.crowdBoo()}
        try{localStorage.setItem('byb_season2',JSON.stringify(seasonRecord))}catch(e){}
        calcMVP();
        return;
      }
    }else{
      startInningChange();
    }
  }
}

function calcMVP(){
  let best=null,bestVal=-1;
  playerTeam.roster.concat(cpuTeam.roster).forEach(p=>{
    const v=p.hrs*4+p.rbi*3+p.hits*2+p.runs;
    if(v>bestVal){bestVal=v;best=p}
  });
  mvpStats={name:best?best.name:'???',val:bestVal};
}

function recordInningRun(){
  const idx=inning-1;
  if(half==='bottom'){
    if(idx<inningScores.p.length)inningScores.p[idx]++;
    else inningScores.p.push(1);
  }else{
    if(idx<inningScores.c.length)inningScores.c[idx]++;
    else inningScores.c.push(1);
  }
}

// ============================================================
//  PITCH SYSTEM
// ============================================================
function choosePitch(){
  // CPU chooses pitch based on count
  let weights=[...PITCH_TYPES.map(p=>p.prob)];
  // Behind in count? Throw more fastballs
  if(balls>strikes){weights[0]+=.15;weights[2]-=.1}
  // Ahead? More breaking balls
  if(strikes>balls){weights[1]+=.1;weights[3]+=.1;weights[0]-=.1}
  let total=weights.reduce((a,b)=>a+b,0);
  let r=Math.random()*total,cum=0;
  for(let i=0;i<weights.length;i++){cum+=weights[i];if(r<cum)return PITCH_TYPES[i]}
  return PITCH_TYPES[0];
}

function startPitch(typeIdx){
  let pt;
  if(half==='top'&&typeIdx!==undefined){
    // Player pitching
    pt=PITCH_TYPES[typeIdx];
  }else if(half==='top'){
    pt=PITCH_TYPES[pitchTypeIndex];
  }else{
    pt=choosePitch();
  }

  pitchType=pt.name;
  pitchSpeed=pt.speed;
  pitchCurve=pt.curve*(Math.random()>.5?1:-1);

  // Determine if pitch is in the zone
  if(half==='bottom'){
    // CPU pitching: zone probability varies
    pitchInZone=Math.random()<(.55+strikes*.05-balls*.05);
  }else{
    // Player pitching
    pitchInZone=Math.random()<.6;
  }

  pitchStartX=MOUND_X+(Math.random()-.5)*10;
  pitchStartY=MOUND_Y-20;

  if(pitchInZone){
    pitchTargetX=ZONE_L+20+Math.random()*(ZONE_W-40);
    pitchTargetY=ZONE_T+15+Math.random()*(ZONE_H-30);
  }else{
    const side=Math.random()*4|0;
    if(side===0){pitchTargetX=ZONE_L-20-Math.random()*40;pitchTargetY=ZONE_T+Math.random()*ZONE_H}
    else if(side===1){pitchTargetX=ZONE_R+20+Math.random()*40;pitchTargetY=ZONE_T+Math.random()*ZONE_H}
    else if(side===2){pitchTargetX=ZONE_L+Math.random()*ZONE_W;pitchTargetY=ZONE_T-20-Math.random()*30}
    else{pitchTargetX=ZONE_L+Math.random()*ZONE_W;pitchTargetY=ZONE_B+20+Math.random()*30}
  }

  pitchProgress=0;
  pitchActive=true;
  pitchX=pitchStartX;pitchY=pitchStartY;
  pitchTrail=[];
  windupTimer=35;windupPhase=0;
  swinging=false;swingResult=null;stealAttempt=false;
  cpuSwingDecision=false;
  playerPitchSelected=false;
  SND.pitchThrow();
}

function updatePitch(){
  if(windupTimer>0){
    windupTimer--;
    windupPhase=1-windupTimer/35;
    return;
  }

  pitchProgress+=pitchSpeed;
  const t=pitchProgress;

  // Calculate pitch position with curve physics
  const curveAmount=pitchCurve*60;
  const curveProgress=Math.sin(t*Math.PI); // peaks at midpoint
  pitchX=pitchStartX+(pitchTargetX-pitchStartX)*t+curveProgress*curveAmount;
  pitchY=pitchStartY+(pitchTargetY-pitchStartY)*t;

  // Changeup has a slight drop
  if(pitchType==='Changeup'){
    pitchY+=t*t*15;
  }
  // Curveball has bigger vertical break
  if(pitchType==='Curveball'){
    pitchY+=t*t*20-t*10;
  }

  pitchTrail.push({x:pitchX,y:pitchY,a:1});
  if(pitchTrail.length>15)pitchTrail.shift();
  pitchTrail.forEach(p=>p.a*=.82);

  // CPU batting decision
  if(half==='top'&&!cpuSwingDecision&&t>.4&&t<.75){
    cpuBattingDecision();
  }

  if(t>=1){
    pitchActive=false;
    if(!swinging){
      if(pitchInZone){
        strikes++;
        showPopup('STRIKE!','#ff4444',50,36);
        SND.umpireStrike();
        if(strikes<3)setComm(rComm(COMM.strikeLook));
      }else{
        balls++;
        showPopup('BALL','#4488ff',40,30);
        setComm(rComm(COMM.ball));
        SND.ball();
      }
      checkCount();
    }
  }
}

function checkCount(){
  if(strikes>=3){
    outs++;
    showPopup("STRIKE THREE!",'#ff2222',70,42);
    setComm(rComm(COMM.strikeout));
    SND.umpireOut();
    currentBatter.ks++;currentBatter.atBats++;
    resetAtBat();
  }else if(balls>=4){
    showPopup("WALK!",'#44ff44',60,36);
    setComm(rComm(COMM.walk));
    SND.walkMusic();SND.safe();
    advanceRunners(true);
    resetAtBat();
  }else{
    state='between_pitch';
    transTimer=half==='top'?25:30;
  }
}

function resetAtBat(){
  strikes=0;balls=0;
  if(outs>=3){
    nextHalfInning();
  }else{
    if(half==='bottom'){
      batterIndex++;
      currentBatter=playerTeam.roster[batterIndex%playerTeam.roster.length];
    }else{
      cpuBatterIndex++;
      currentBatter=cpuTeam.roster[cpuBatterIndex%cpuTeam.roster.length];
    }
    state='between_pitch';
    transTimer=half==='top'?25:35;
  }
}

// ============================================================
//  CPU BATTING AI (pitch-by-pitch, not instant)
// ============================================================
function cpuBattingDecision(){
  cpuSwingDecision=true;
  const batter=currentBatter;
  const contactSkill=(batter.contact||50)/100;
  const powerSkill=(batter.power||50)/100;

  // CPU decides whether to swing
  let swingProb=.5;
  if(pitchInZone)swingProb=.6+contactSkill*.25;
  else swingProb=.15+(.3-contactSkill*.15);

  // Adjust for count
  if(strikes===2)swingProb+=.2; // protect with 2 strikes
  if(balls===3&&strikes<2)swingProb-=.2; // patient with 3 balls

  if(Math.random()<swingProb){
    // CPU swings
    cpuSwingTiming=.68+Math.random()*.2; // when to swing (progress)
    // Better contact = tighter timing window
    const timingOffset=(Math.random()-.5)*(1-contactSkill)*.3;
    cpuSwingTiming+=timingOffset;
  }
}

// ============================================================
//  SWING SYSTEM
// ============================================================
function doSwing(){
  if(swinging)return;
  if(!pitchActive||windupTimer>0)return;
  if(half==='top')return; // Player doesn't swing when pitching

  ensureAudio();
  swinging=true;
  swingTimer=0;
  SND.swing();

  const timing=pitchProgress;
  // Sweet spot: .7-.85
  if(timing>=.65&&timing<=.9){
    if(timing>=.72&&timing<=.83)swingResult='perfect';
    else swingResult='good';
  }else if(timing<.65){
    swingResult='early';
  }else{
    swingResult='late';
  }
  timingBarPos=timing;
  timingBarActive=true;
  setTimeout(()=>{timingBarActive=false},800);
}

function cpuDoSwing(){
  if(swinging)return;
  swinging=true;
  swingTimer=0;
  SND.swing();

  const timing=pitchProgress;
  if(timing>=.65&&timing<=.9){
    if(timing>=.72&&timing<=.83)swingResult='perfect';
    else swingResult='good';
  }else if(timing<.65){
    swingResult='early';
  }else{
    swingResult='late';
  }
}

function processSwing(){
  const inZoneX=pitchX>=ZONE_L-10&&pitchX<=ZONE_R+10;
  const inZoneY=pitchY>=ZONE_T-10&&pitchY<=ZONE_B+10;
  const inZone=inZoneX&&inZoneY;

  if(swingResult==='early'||swingResult==='late'){
    if(!inZone||Math.random()<.55){
      strikes++;
      showPopup(swingResult.toUpperCase()+'!','#ff8844',40,28);
      setComm(rComm(COMM.strikeSwing));
      SND.strike();
      pitchActive=false;
      checkCount();
      return;
    }
    if(Math.random()<.5){foulBall()}
    else{weakHit()}
    pitchActive=false;
    return;
  }

  if(!inZone){
    if(Math.random()<.65){
      strikes++;
      showPopup('SWING & MISS!','#ff4444',45,30);
      setComm(rComm(COMM.strikeSwing));
      SND.strike();
      pitchActive=false;
      checkCount();
      return;
    }
    foulBall();
    pitchActive=false;
    return;
  }

  // Contact! Quality based on timing + batter stats
  const batter=currentBatter;
  const power=(batter.power||50)/100;
  const contact=(batter.contact||50)/100;

  SND.batCrack();

  const quality=swingResult==='perfect'?1:.65;
  const roll=Math.random();

  // Determine hit angle for ball flight direction
  const hitAngle=(Math.random()-.5)*1.5; // -0.75 to 0.75 radians from center

  if(quality>.8&&power>.35&&roll<.10+power*.18){
    homeRun(hitAngle);
  }else if(quality>.6&&roll<.12+contact*.18){
    if(Math.random()<.25)tripleHit(hitAngle);
    else doubleHit(hitAngle);
  }else if(roll<.3+contact*.3){
    if(Math.random()<.35)foulBall();
    else singleHit(hitAngle);
  }else if(roll<.5){
    flyOut(hitAngle);
  }else if(roll<.78){
    groundOut(hitAngle);
  }else{
    foulBall();
  }
  pitchActive=false;
}

function homeRun(angle){

  currentBatter.hits++;currentBatter.hrs++;currentBatter.rbi+=rbi;currentBatter.atBats++;
  currentBatter.runs++;

  // Score runners
  bases.forEach(b=>{if(b&&b.runner)b.runner.runs++});

  showPopup("HOME RUN!!!",'#ffd700',110,56);
  setComm(rComm(COMM.hr));
  shakeTimer=35;shakeAmount=14;
  celebrating=true;celebrationTimer=100;

  addFirework(W/2,H/3,50,['#ffd700','#ff4444','#44ff44','#4488ff','#ff44ff']);
  addFirework(W/3,H/4,35,['#ffd700','#ff8800','#ffff00']);
  addFirework(2*W/3,H/4,35,['#ff4444','#ff6666','#ffaaaa']);
  addConfetti(W/2,H/2,30,['#ffd700','#ff4444','#44ff44','#ffffff']);

  else{scoreC+=rbi;for(let i=0;i<rbi;i++)recordInningRun()}

}

function tripleHit(angle){

  currentBatter.hits++;currentBatter.atBats++;
  const rbi=bases.filter(b=>b).length;
  currentBatter.rbi+=rbi;
  if(rbi>0)currentBatter.runs++;

  if(half==='bottom'){scoreP+=rbi;for(let i=0;i<rbi;i++)recordInningRun()}
  else{scoreC+=rbi;for(let i=0;i<rbi;i++)recordInningRun()}

  showPopup("TRIPLE!",'#44ff44',75,42);
  setComm(rComm(COMM.triple));
  shakeTimer=10;shakeAmount=5;
  addFirework(W/2,H/2,18,['#44ff44','#88ff88']);

  const vx=(angle>0?1:-1)*(3+Math.random()*2);
  ballFlight={x:PLATE_X,y:PLATE_Y-10,z:0,vx:vx,vy:-5.5,vz:3.5,type:'triple',timer:0,landed:false};
  ballFlightTrail=[];
  bases=[null,null,{name:currentBatter.name,runner:currentBatter}];
  state='hit_flight';transTimer=100;
}

function doubleHit(angle){
  SND.hit();SND.crowdCheer(false);
  currentBatter.hits++;currentBatter.atBats++;
  const rbi=countRunnersScoring(2);
  currentBatter.rbi+=rbi;

  if(half==='bottom'){scoreP+=rbi;for(let i=0;i<rbi;i++)recordInningRun()}
  else{scoreC+=rbi;for(let i=0;i<rbi;i++)recordInningRun()}

  showPopup("DOUBLE!",'#44ff44',65,38);
  setComm(rbi>0?rComm(COMM.rbiSingle):rComm(COMM.double));
  shakeTimer=6;shakeAmount=3;

  const vx=(angle>0?1:-1)*(2.5+Math.random()*2);
  ballFlight={x:PLATE_X,y:PLATE_Y-10,z:0,vx:vx,vy:-4.5,vz:2.8,type:'double',timer:0,landed:false};

  advanceRunnersHit(2);
  state='hit_flight';transTimer=90;
}

function singleHit(angle){
  SND.hit();
  currentBatter.hits++;currentBatter.atBats++;
  const rbi=countRunnersScoring(1);
  currentBatter.rbi+=rbi;

  if(half==='bottom'){scoreP+=rbi;for(let i=0;i<rbi;i++)recordInningRun()}
  else{scoreC+=rbi;for(let i=0;i<rbi;i++)recordInningRun()}

  showPopup("HIT!",'#44ff44',55,34);
  setComm(rbi>0?rComm(COMM.rbiSingle):rComm(COMM.single));

  addParticle(PLATE_X,PLATE_Y-30,0,-2,'#fff',20,0,'text_crack');

  const vx=(angle||0)*3+(Math.random()-.5)*2;
  ballFlight={x:PLATE_X,y:PLATE_Y-10,z:0,vx:vx,vy:-3.5,vz:1.8+Math.random(),type:'single',timer:0,landed:false};
  ballFlightTrail=[];
  advanceRunnersHit(1);
  state='hit_flight';transTimer=80;
}

function groundOut(angle){
  SND.hit();
  currentBatter.atBats++;

  // Check for double play
  if(bases[0]&&outs<2&&Math.random()<.35){
    outs+=2;
    showPopup("DOUBLE PLAY!",'#ff4444',70,40);
    setComm(rComm(COMM.doublePlay));
    SND.umpireOut();
    bases[0]=null;
    addDust(PLATE_X+50,PLATE_Y);
    addDust(PLATE_X+60,350);
  }else{
    outs++;
    showPopup("OUT!",'#ff4444',60,38);
    setComm(rComm(COMM.groundOut));
    SND.umpireOut();
    addDust(PLATE_X+50,PLATE_Y);
  }

  const vx=(angle||0)*2+(Math.random()-.5)*2;
  ballFlight={x:PLATE_X,y:PLATE_Y-5,z:0,vx:vx,vy:-2.2,vz:.6,type:'ground_out',timer:0,landed:false};
  ballFlightTrail=[];

  // Start fielding animation
  startFieldingPlay('ground_out');

  state='hit_flight';transTimer=80;
}

function flyOut(angle){
  SND.hit();
  currentBatter.atBats++;

  // Sac fly check
  if(bases[2]&&outs<2&&Math.random()<.5){
    outs++;
    const rbi=1;
    currentBatter.rbi+=rbi;
    if(half==='bottom'){scoreP+=rbi;recordInningRun()}
    else{scoreC+=rbi;recordInningRun()}
    bases[2]=null;
    showPopup("SAC FLY!",'#ffaa44',60,36);
    setComm(rComm(COMM.sacFly));
    SND.catchBall();
  }else{
    outs++;
    showPopup("CAUGHT!",'#ff4444',60,36);
    setComm(rComm(COMM.flyOut));
    SND.catchBall();
  }

  const vx=(angle||0)*2+(Math.random()-.5)*2;
  ballFlight={x:PLATE_X,y:PLATE_Y-10,z:0,vx:vx,vy:-5.5,vz:3.5,type:'fly_out',timer:0,landed:false};
  ballFlightTrail=[];

  startFieldingPlay('fly_out');

  state='hit_flight';transTimer=80;
}

function weakHit(){
  if(Math.random()<.65)groundOut(Math.random()-.5);
  else singleHit(Math.random()-.5);
}

function foulBall(){
  if(strikes<2)strikes++;
  showPopup("FOUL!",'#ffaa44',40,30);
  setComm(rComm(COMM.foul));
  SND.foul();
  const dir=Math.random()>.5?1:-1;
  addParticle(PLATE_X+dir*80,PLATE_Y-50,dir*3,-3,'#fff',30,5);
  addDust(PLATE_X,PLATE_Y,4);
  state='between_pitch';
  transTimer=35;
}

function countRunnersScoring(advanceBases){
  let runs=0;
  if(advanceBases>=1&&bases[2])runs++;
  if(advanceBases>=2&&bases[1])runs++;
  if(advanceBases>=3&&bases[0])runs++;
  return runs;
}

function advanceRunnersHit(advanceBases){
  let newBases=[null,null,null];
  if(advanceBases===1){
    if(bases[1])newBases[2]=bases[1];
    if(bases[0])newBases[1]=bases[0];
    newBases[0]={name:currentBatter.name,runner:currentBatter};
  }else if(advanceBases===2){
    if(bases[0])newBases[2]=bases[0];
    newBases[1]={name:currentBatter.name,runner:currentBatter};
  }else if(advanceBases===3){
    newBases[2]={name:currentBatter.name,runner:currentBatter};
  }
  bases=newBases;
}

function advanceRunners(walk){
  if(bases[0]){
    if(bases[1]){
      if(bases[2]){
        if(half==='bottom'){scoreP++;recordInningRun()}else{scoreC++;recordInningRun()}
      }
      bases[2]=bases[1];
    }
    bases[1]=bases[0];
  }
  bases[0]={name:currentBatter.name,runner:currentBatter};
}

// ============================================================
//  FIELDING PLAYS
// ============================================================
function startFieldingPlay(type){
  if(!ballFlight)return;
  // Find closest fielder to ball destination
  const destX=ballFlight.x+ballFlight.vx*20;
  const destY=Math.min(ballFlight.y+ballFlight.vy*10,420);

  let closest=null,closestDist=Infinity;
  fielders.forEach(f=>{
    if(f.pos==='C')return;
    const d=Math.hypot(f.homeX-destX,f.homeY-destY);
    if(d<closestDist){closestDist=d;closest=f}
  });

  if(closest){
    closest.targetX=destX;
    closest.targetY=Math.min(destY,closest.homeY+50);
    closest.running=true;
    fieldingPlay={state:'chasing',fielder:closest,type,timer:0};
  }
}

function updateFieldingPlay(){
  if(!fieldingPlay)return;
  fieldingPlay.timer++;

  const f=fieldingPlay.fielder;

  if(fieldingPlay.state==='chasing'){
    // Fielder running to ball
    if(fieldingPlay.timer>30){
      fieldingPlay.state='has_ball';
      f.hasBall=true;
      f.running=false;
      SND.catchBall();
      // Now throw to relevant base
      let targetBase=getBasePos(1); // default throw to first
      if(fieldingPlay.type==='fly_out'){
        // Just caught it, no throw needed
        fieldingPlay.state='done';
      }else{
        fieldingPlay.state='throwing';
        throwAnim={
          fromX:f.x,fromY:f.y,
          toX:targetBase.x,toY:targetBase.y,
          progress:0,speed:.06
        };
        SND.throwBall();
      }
    }
  }else if(fieldingPlay.state==='throwing'){
    if(throwAnim){
      throwAnim.progress+=throwAnim.speed;
      throwBallX=throwAnim.fromX+(throwAnim.toX-throwAnim.fromX)*throwAnim.progress;
      throwBallY=throwAnim.fromY+(throwAnim.toY-throwAnim.fromY)*throwAnim.progress-Math.sin(throwAnim.progress*Math.PI)*30;
      if(throwAnim.progress>=1){
        SND.catchBall();
        throwAnim=null;
        fieldingPlay.state='done';
        f.hasBall=false;
        addDust(getBasePos(1).x,getBasePos(1).y,5);
      }
    }
  }
}

  X.beginPath();X.moveTo(PLATE_X,260);X.lineTo(PLATE_X-150,350);X.stroke();
  X.beginPath();X.moveTo(PLATE_X-150,350);X.lineTo(PLATE_X,PLATE_Y);X.stroke();

  // Foul lines extending to outfield
  X.strokeStyle='rgba(255,255,255,0.25)';X.lineWidth=2;
  X.beginPath();X.moveTo(PLATE_X,PLATE_Y);X.lineTo(W+50,175);X.stroke();
  X.beginPath();X.moveTo(PLATE_X,PLATE_Y);X.lineTo(-50,175);X.stroke();

  X.beginPath();

  X.lineTo(PLATE_X-12,PLATE_Y-10);
  X.lineTo(PLATE_X-12,PLATE_Y);
  X.closePath();
  X.fill();
  X.strokeStyle='#999';X.lineWidth=1;X.stroke();

  // Coach's boxes
  X.strokeStyle='rgba(255,255,255,0.1)';X.lineWidth=1;
  X.strokeRect(PLATE_X+170,395,25,25);
  X.strokeRect(PLATE_X-195,395,25,25);
}

function drawBase(x,y,occupied,label){
  X.save();
  X.translate(x,y);X.rotate(Math.PI/4);
  X.fillStyle=occupied?'#ffd700':'#f5f5f5';
  X.fillRect(-11,-11,22,22);
  X.strokeStyle=occupied?'#daa520':'#aaa';X.lineWidth=1.5;X.strokeRect(-11,-11,22,22);
  if(occupied){
    X.fillStyle='rgba(255,215,0,0.25)';
    X.fillRect(-14,-14,28,28);
  }
  X.restore();

  // Runner on base
  if(occupied){

}

function drawMiniRunner(x,y,team){

function drawFielders(){
  const team=half==='bottom'?cpuTeam:playerTeam;
  fielders.forEach(f=>{
    if(f.pos==='P')return; // pitcher drawn separately
    // Move toward target
    const dx=f.targetX-f.x, dy=f.targetY-f.y;
    const d=Math.sqrt(dx*dx+dy*dy);
    if(d>2){
      const sp=f.running?4:2.5;
      f.x+=dx/d*sp;f.y+=dy/d*sp;
    }
    drawFielderChar(f.x,f.y,team?team.color1:'#c62828',false,f);
  });
}

function drawFielderChar(x,y,color,isPitcher,fielderObj){
  const scale=isPitcher?1.1:.72;
  const bob=fielderObj&&fielderObj.running?Math.sin(frameCount*.3)*2:0;
  // Shadow
  X.fillStyle='rgba(0,0,0,0.18)';
  X.beginPath();X.ellipse(x,y+11*scale,8*scale,3*scale,0,0,Math.PI*2);X.fill();
  // Pants
  X.fillStyle='#eee';
  X.fillRect(x-5*scale,y-1*scale+bob,10*scale,12*scale);
  // Jersey
  X.fillStyle=color;
  X.fillRect(x-7*scale,y-12*scale+bob,14*scale,13*scale);
  // Head
  X.fillStyle='#ffcc80';
  X.beginPath();X.arc(x,y-18*scale+bob,7*scale,0,Math.PI*2);X.fill();
  // Cap
  X.fillStyle=color;
  X.beginPath();X.arc(x,y-21*scale+bob,7*scale,Math.PI,.02);X.fill();
  X.fillRect(x,y-24*scale+bob,8*scale,3*scale);
  // Glove
  X.fillStyle='#8B4513';
  X.beginPath();X.arc(x+9*scale,y-4*scale+bob,5*scale,0,Math.PI*2);X.fill();

  // Position label
  if(!isPitcher&&fielderObj){
    X.fillStyle='rgba(255,255,255,0.4)';X.font='bold 7px Arial';X.textAlign='center';
    X.fillText(fielderObj.pos,x,y+18*scale);
  }
}

function drawPitcher(){
  const px=MOUND_X, py=MOUND_Y;
  const windupAmt=windupTimer>0?windupPhase:0;
  const team=half==='bottom'?cpuTeam:playerTeam;
  const color=team?team.color1:'#c62828';

  // Shadow
  X.fillStyle='rgba(0,0,0,0.22)';
  X.beginPath();X.ellipse(px,py+16,13,4.5,0,0,Math.PI*2);X.fill();

  const lean=Math.sin(windupAmt*Math.PI)*10;
  const armRaise=Math.sin(windupAmt*Math.PI)*28;
  const legKick=Math.sin(windupAmt*Math.PI*.8)*12;

  // Legs
  X.fillStyle='#eee';
  X.fillRect(px-4,py+3,4,14);
  X.fillRect(px+1,py+3-legKick,4,14);

  // Body
  X.fillStyle=color;
  X.fillRect(px-9+lean,py-14,18,19);

  // Number
  X.fillStyle='#fff';X.font='bold 9px Arial';X.textAlign='center';
  X.fillText('1',px+lean,py-1);

  // Throwing arm
  X.strokeStyle='#ffcc80';X.lineWidth=4;
  X.beginPath();
  X.moveTo(px+9+lean,py-8);
  X.lineTo(px+16+lean,py-8-armRaise);
  X.stroke();

  // Ball in hand during windup
  if(windupTimer>0){
    X.fillStyle='#fff';
    X.beginPath();X.arc(px+16+lean,py-10-armRaise,4,0,Math.PI*2);X.fill();
    X.strokeStyle='#cc0000';X.lineWidth=1;
    X.beginPath();X.arc(px+16+lean,py-10-armRaise,3,.5,2);X.stroke();
  }

  // Glove arm
  X.strokeStyle='#ffcc80';X.lineWidth=4;
  X.beginPath();X.moveTo(px-9+lean,py-8);X.lineTo(px-19+lean,py-2+legKick*.3);X.stroke();
  X.fillStyle='#8B4513';
  X.beginPath();X.arc(px-19+lean,py-2+legKick*.3,5.5,0,Math.PI*2);X.fill();

  // Head
  X.fillStyle='#ffcc80';
  X.beginPath();X.arc(px+lean,py-22,10,0,Math.PI*2);X.fill();

  // Cap
  X.fillStyle=color;
  X.beginPath();X.arc(px+lean,py-26,10,Math.PI,0);X.fill();
  X.fillRect(px+lean,py-29,10,4);

  // Eyes
  X.fillStyle='#222';
  X.beginPath();X.arc(px-3+lean,py-23,1.5,0,Math.PI*2);X.fill();
  X.beginPath();X.arc(px+3+lean,py-23,1.5,0,Math.PI*2);X.fill();

  // Determined mouth
  X.strokeStyle='#222';X.lineWidth=1;
  X.beginPath();X.moveTo(px-2+lean,py-18);X.lineTo(px+2+lean,py-18);X.stroke();
}

function drawBatter(){
  const isPlayerBatting=half==='bottom';
  const team=isPlayerBatting?playerTeam:cpuTeam;
  const bx=PLATE_X-50, by=PLATE_Y;
  const bob=Math.sin(frameCount*.08)*1.5;

  // Shadow
  X.fillStyle='rgba(0,0,0,0.18)';
  X.beginPath();X.ellipse(bx,by+13,12,4,0,0,Math.PI*2);X.fill();

  // Legs
  X.fillStyle='#eee';
  X.fillRect(bx-5,by+bob,5,14);
  X.fillRect(bx+2,by+bob,5,14);

  // Body
  X.fillStyle=team?team.color1:'#1565c0';
  X.fillRect(bx-9,by-14+bob,18,18);

  // Number
  const num=half==='bottom'?(batterIndex%10)+1:(cpuBatterIndex%10)+1;
  X.fillStyle='#fff';X.font='bold 9px Arial';X.textAlign='center';
  X.fillText(String(num),bx,by-2+bob);

  // Head
  X.fillStyle=currentBatter?currentBatter.skinTone:'#ffcc80';
  X.beginPath();X.arc(bx,by-22+bob,10,0,Math.PI*2);X.fill();

  // Batting helmet
  X.fillStyle=team?team.color1:'#1565c0';
  X.beginPath();X.arc(bx,by-26+bob,10,Math.PI,.1);X.fill();
  X.fillRect(bx-12,by-28+bob,6,8);

  // Eyes
  X.fillStyle='#222';
  X.beginPath();X.arc(bx+3,by-23+bob,2,0,Math.PI*2);X.fill();
  X.beginPath();X.arc(bx+8,by-23+bob,1.5,0,Math.PI*2);X.fill();

  // Bat
  if(swinging){
    const sa=swingTimer/6*Math.PI*.9-Math.PI*.45;
    X.save();
    X.translate(bx+5,by-8+bob);
    X.rotate(sa);
    X.fillStyle='#8B4513';X.fillRect(0,-2,10,4);
    X.fillStyle='#D2691E';X.fillRect(10,-4,30,8);
    X.fillStyle='#DEB887';X.fillRect(35,-5,10,10);
    // Motion blur effect
    X.globalAlpha=.3;
    X.fillStyle='#D2691E';X.fillRect(10,-8,30,4);
    X.globalAlpha=1;
    X.restore();
  }else{
    X.save();
    X.translate(bx+5,by-8+bob);
    X.rotate(-Math.PI*.35+Math.sin(frameCount*.04)*.03);
    X.fillStyle='#7B3F00';X.fillRect(0,-2,10,4);
    X.fillStyle='#D2691E';X.fillRect(10,-4,30,8);
    X.fillStyle='#DEB887';X.fillRect(35,-5,10,10);
    X.restore();
  }
}

function drawStrikeZone(){
  if(half==='top')return; // only show when player is batting
  if(state!=='batting')return;

  X.strokeStyle='rgba(255,255,255,0.18)';X.lineWidth=1;
  X.setLineDash([4,4]);
  X.strokeRect(ZONE_L,ZONE_T,ZONE_W,ZONE_H);
  X.setLineDash([]);

  // Grid
  X.strokeStyle='rgba(255,255,255,0.06)';
  X.beginPath();X.moveTo(ZONE_L+ZONE_W/3,ZONE_T);X.lineTo(ZONE_L+ZONE_W/3,ZONE_B);X.stroke();

function drawPitchBall(){
  if(!pitchActive||windupTimer>0)return;

  // Trail with pitch-type coloring
  const ptColor=PITCH_TYPES.find(p=>p.name===pitchType);
  pitchTrail.forEach((p,i)=>{
    const a=p.a*.4;
    X.fillStyle=ptColor?ptColor.color.replace(')',`,${a})`).replace('rgb','rgba'):`rgba(255,255,255,${a})`;
    const sz=3+i*.3;
    X.beginPath();X.arc(p.x,p.y,sz,0,Math.PI*2);X.fill();
  });

  // Ball gets bigger as it approaches
  const sz=5+pitchProgress*5;

  // Ball shadow
  X.fillStyle='rgba(0,0,0,0.15)';
  X.beginPath();X.arc(pitchX+2,pitchY+2,sz,0,Math.PI*2);X.fill();

  // Ball
  X.fillStyle='#fff';
  X.beginPath();X.arc(pitchX,pitchY,sz,0,Math.PI*2);X.fill();

  // Seams with spin
  const spinSpeed=pitchType==='Curveball'?.35:pitchType==='Slider'?.25:.15;
  X.strokeStyle='#cc0000';X.lineWidth=1;
  X.beginPath();
  X.arc(pitchX,pitchY,sz*.55,frameCount*spinSpeed,frameCount*spinSpeed+1.5);
  X.stroke();
  X.beginPath();
  X.arc(pitchX,pitchY,sz*.55,frameCount*spinSpeed+Math.PI,frameCount*spinSpeed+Math.PI+1.5);
  X.stroke();

  // Pitch type label
  if(pitchProgress>.45&&pitchProgress<.85){
    X.fillStyle=ptColor?ptColor.color:'#fff';
    X.font='bold 11px Arial';X.textAlign='left';
    X.globalAlpha=.6;
    X.fillText(pitchType,pitchX+14,pitchY-6);
    // Speed
    if(ptColor){
      X.font='9px Arial';
      X.fillText(ptColor.mph+' mph',pitchX+14,pitchY+6);
    }
    X.globalAlpha=1;
  }
}

function drawBallFlight(){
  if(!ballFlight)return;
  const b=ballFlight;

  // Trail
  ballFlightTrail.forEach((t,i)=>{
    const a=(i/ballFlightTrail.length)*.3;
    X.fillStyle=`rgba(255,255,255,${a})`;
    X.beginPath();X.arc(t.x,t.y,3,0,Math.PI*2);X.fill();
  });

  // Shadow on ground
  const shadowScale=Math.max(1,b.z*.5);
  X.fillStyle='rgba(0,0,0,0.25)';
  X.beginPath();X.ellipse(b.x,b.y+12,4+shadowScale,2+shadowScale*.3,0,0,Math.PI*2);X.fill();

  // Ball
  const sz=4+b.z*.7;
  const ballScreenY=b.y-b.z*8;
  X.fillStyle='#fff';
  X.beginPath();X.arc(b.x,ballScreenY,sz,0,Math.PI*2);X.fill();
  X.strokeStyle='#cc0000';X.lineWidth=1;
  X.beginPath();X.arc(b.x,ballScreenY,sz*.5,frameCount*.3,frameCount*.3+1);X.stroke();

  // HR glow trail
  if(b.type==='hr'){
    for(let i=0;i<6;i++){
      const a=.3-i*.05;
      X.fillStyle=`rgba(255,215,0,${a})`;
      X.beginPath();X.arc(b.x-b.vx*i*3,ballScreenY+b.vy*i*2,4-i*.5,0,Math.PI*2);X.fill();
    }
    // Sparkle
    if(frameCount%3===0){
      addParticle(b.x,ballScreenY,(Math.random()-.5)*3,Math.random()*-2,'#ffd700',12,2,'spark');
    }
  }
}

function drawThrowAnim(){
  if(!throwAnim)return;
  const sz=4;
  X.fillStyle='#fff';
  X.beginPath();X.arc(throwBallX,throwBallY,sz,0,Math.PI*2);X.fill();
  X.strokeStyle='#cc0000';X.lineWidth=.8;
  X.beginPath();X.arc(throwBallX,throwBallY,sz*.5,frameCount*.4,frameCount*.4+1);X.stroke();
}

function drawScoreboard(){
  const sbx=W-260, sby=6;
  const sbw=254, sbh=90;

  // Background
  X.fillStyle='rgba(15,15,35,0.9)';
  roundRect(sbx,sby,sbw,sbh,8,true,false);
  X.strokeStyle='#ffd700';X.lineWidth=1.5;
  roundRect(sbx,sby,sbw,sbh,8,false,true);

  // Title
  X.fillStyle='#ffd700';X.font='bold 9px Arial';X.textAlign='left';
  X.fillText('KORB ENGINEERING STADIUM',sbx+8,sby+12);

  // Inning indicator
  X.fillStyle='#aaa';X.font='8px Arial';X.textAlign='right';
  const innText=`${half==='top'?'\u25B2':'\u25BC'} ${inning}`;
  X.fillText(innText,sbx+sbw-8,sby+12);

  // Line score header
  const colW=16;
  const startX=sbx+70;
  const headerY=sby+26;
  X.fillStyle='#666';X.font='bold 7px Arial';X.textAlign='center';
  const maxInn=Math.max(inningScores.p.length,inningScores.c.length,totalInnings);
  const displayInnings=Math.min(maxInn,9);
  for(let i=0;i<displayInnings;i++){
    X.fillText(i+1,startX+i*colW,headerY);
  }
  X.fillText('R',startX+displayInnings*colW+8,headerY);
  X.fillText('H',startX+displayInnings*colW+24,headerY);

  // Team rows
  const teams=[
    {name:cpuTeam?cpuTeam.name:'CPU',scores:inningScores.c,total:scoreC,color:cpuTeam?cpuTeam.color2:'#ff4444',
     hits:cpuTeam?cpuTeam.roster.reduce((a,p)=>a+p.hits,0):0},
    {name:playerTeam?playerTeam.name:'YOU',scores:inningScores.p,total:scoreP,color:playerTeam?playerTeam.color2:'#4488ff',
     hits:playerTeam?playerTeam.roster.reduce((a,p)=>a+p.hits,0):0},
  ];

  teams.forEach((t,row)=>{
    const ry=headerY+12+row*14;
    X.fillStyle=t.color;X.font='bold 9px Arial';X.textAlign='left';
    X.fillText(t.name.substring(0,7),sbx+8,ry);

    X.font='8px Arial';X.textAlign='center';
    for(let i=0;i<displayInnings;i++){
      const s=t.scores[i];
      // Highlight current inning
      if(i===inning-1){
        X.fillStyle='rgba(255,215,0,0.15)';
        X.fillRect(startX+i*colW-7,ry-9,colW,13);
      }
      X.fillStyle=s!==undefined?'#fff':'#444';
      X.fillText(s!==undefined?s:'-',startX+i*colW,ry);
    }
    // Totals
    X.fillStyle='#fff';X.font='bold 10px Arial';
    X.fillText(t.total,startX+displayInnings*colW+8,ry);
    X.fillStyle='#aaa';X.font='9px Arial';
    X.fillText(t.hits,startX+displayInnings*colW+24,ry);
  });

  // Count display
  const cy=sby+sbh-14;
  X.fillStyle='#888';X.font='bold 9px Arial';X.textAlign='left';

  // Balls
  X.fillText('B',sbx+8,cy);
  for(let i=0;i<4;i++){
    X.fillStyle=i<balls?'#44ff44':'#333';
    X.beginPath();X.arc(sbx+24+i*11,cy-3,4,0,Math.PI*2);X.fill();
  }
  // Strikes
  X.fillStyle='#888';X.fillText('S',sbx+72,cy);
  for(let i=0;i<3;i++){
    X.fillStyle=i<strikes?'#ff4444':'#333';
    X.beginPath();X.arc(sbx+86+i*11,cy-3,4,0,Math.PI*2);X.fill();
  }
  // Outs
  X.fillStyle='#888';X.fillText('O',sbx+124,cy);
  for(let i=0;i<3;i++){
    X.fillStyle=i<outs?'#ffaa00':'#333';
    X.beginPath();X.arc(sbx+138+i*11,cy-3,4,0,Math.PI*2);X.fill();
  }

  // Mini bases diamond
  const bdx=sbx+sbw-30, bdy=sby+sbh-20;
  drawMiniBase(bdx,bdy-10,bases[1]!==null);
  drawMiniBase(bdx-10,bdy,bases[2]!==null);
  drawMiniBase(bdx+10,bdy,bases[0]!==null);
  // Home
  X.fillStyle='#555';
  X.beginPath();X.arc(bdx,bdy+9,3,0,Math.PI*2);X.fill();
}

function drawMiniBase(x,y,on){
  X.save();X.translate(x,y);X.rotate(Math.PI/4);
  X.fillStyle=on?'#ffd700':'#444';
  X.fillRect(-4,-4,8,8);

}

function drawBatterInfo(){

  const bx=8, by=H-82;

function drawParticles(){
  particles.forEach(p=>{
    const a=p.life/p.maxLife;
    if(p.type==='spark'){
      X.fillStyle=p.color;X.globalAlpha=a;
      X.beginPath();X.arc(p.x,p.y,p.size*a,0,Math.PI*2);X.fill();
      X.globalAlpha=1;
    }else if(p.type==='dust'){
      X.fillStyle=p.color;X.globalAlpha=a*.5;
      X.beginPath();X.arc(p.x,p.y,p.size,0,Math.PI*2);X.fill();
      X.globalAlpha=1;
    }else if(p.type==='text_crack'){
      X.globalAlpha=a;
      X.fillStyle='#fff';X.font='bold 30px Arial';X.textAlign='center';
      X.fillText('CRACK!',p.x,p.y);
      X.strokeStyle='#ffd700';X.lineWidth=1.5;
      X.strokeText('CRACK!',p.x,p.y);
      X.globalAlpha=1;
    }else if(p.type==='confetti'){
      X.save();
      X.translate(p.x,p.y);
      X.rotate(frameCount*.1+p.size);
      X.fillStyle=p.color;X.globalAlpha=a;
      X.fillRect(-p.size/2,-p.size/4,p.size,p.size/2);
      X.restore();
      X.globalAlpha=1;
    }else{
      X.fillStyle=p.color;X.globalAlpha=a;
      X.beginPath();X.arc(p.x,p.y,p.size,0,Math.PI*2);X.fill();
      X.globalAlpha=1;
    }
  });
}

function roundRect(x,y,w,h,r,fill,stroke){
  X.beginPath();
  X.moveTo(x+r,y);X.lineTo(x+w-r,y);X.quadraticCurveTo(x+w,y,x+w,y+r);
  X.lineTo(x+w,y+h-r);X.quadraticCurveTo(x+w,y+h,x+w-r,y+h);
  X.lineTo(x+r,y+h);X.quadraticCurveTo(x,y+h,x,y+h-r);
  X.lineTo(x,y+r);X.quadraticCurveTo(x,y,x+r,y);
  X.closePath();
  if(fill)X.fill();if(stroke)X.stroke();
}

// ============================================================
//  UPDATE
// ============================================================
function update(){
  frameCount++;

  // Particles
  particles.forEach(p=>{
    p.x+=p.vx;p.y+=p.vy;
    if(p.type==='confetti'){p.vy+=.04;p.vx*=.98}
    else{p.vy+=.08}
    p.life--;
  });
  particles=particles.filter(p=>p.life>0);

  // Popup
  if(popup){popup.timer--;popup.y+=.5;if(popup.timer<=0)popup=null}
  if(commentary){commentary.timer--;if(commentary.timer<=0)commentary=null}

  // Shake
  if(shakeTimer>0)shakeTimer--;

  // Celebration
  if(celebrating){
    celebrationTimer--;
    if(celebrationTimer<=0)celebrating=false;
    // Periodic fireworks during HR celebration
    if(celebrationTimer>50&&celebrationTimer%15===0){
      addFirework(100+Math.random()*(W-200),100+Math.random()*200,12,['#ffd700','#ff4444','#ffffff']);
    }
  }

  // Random ambient
  if(frameCount%700===0&&(state==='batting'||state==='pitching')){
    setComm(rComm(COMM.idle));SND.ambient();
  }

  switch(state){
    case 'title':break;

    case 'inning_change':
      transTimer--;
      if(transTimer<=0){
        if(half==='top'){
          // Player is pitching
          state='pitching';
          currentBatter=cpuTeam.roster[cpuBatterIndex%cpuTeam.roster.length];
        }else{
          // Player is batting
          state='batting';
          currentBatter=playerTeam.roster[batterIndex%playerTeam.roster.length];
          startPitch();
        }
      }
      break;

    case 'pitching':
      // Player selects pitch type, then it's thrown
      // Pitch starts when player presses space
      if(pitchActive){
        updatePitch();
        // CPU swing check
        if(cpuSwingTiming>0&&pitchProgress>=cpuSwingTiming&&!swinging){
          cpuDoSwing();
        }
        if(swinging){
          swingTimer++;
          if(swingTimer===4)processSwing();
          if(swingTimer>10){swinging=false;swingResult=null}
        }
      }
      break;

    case 'batting':
      if(pitchActive)updatePitch();
      if(swinging){
        swingTimer++;
        if(swingTimer===4)processSwing();
        if(swingTimer>10){swinging=false;swingResult=null}
      }
      break;

    case 'between_pitch':
      transTimer--;
      if(transTimer<=0){
        if(half==='top'){
          state='pitching';
        }else{
          state='batting';
          startPitch();
        }
      }
      break;

    case 'hit_flight':
      if(ballFlight){
        ballFlight.timer++;

        // Store trail
        if(ballFlight.timer%2===0){
          ballFlightTrail.push({x:ballFlight.x,y:ballFlight.y-ballFlight.z*8});
          if(ballFlightTrail.length>20)ballFlightTrail.shift();
        }

        ballFlight.x+=ballFlight.vx;
        ballFlight.vy+=.12; // gravity on screen Y
        ballFlight.y+=ballFlight.vy;
        ballFlight.vz-=.06;
        if(ballFlight.vz<0)ballFlight.vz=0;

        // HR fireworks
        if(ballFlight.type==='hr'&&ballFlight.timer%5===0){
          addParticle(ballFlight.x,ballFlight.y-ballFlight.z*8,(Math.random()-.5)*2,Math.random()*-1.5,'#ffd700',15,3,'spark');
        }

        // Fielder chasing
        if(ballFlight.timer===8&&ballFlight.type!=='hr'){
          const closest=fielders.reduce((best,f)=>{
            if(f.pos==='P'||f.pos==='C')return best;
            const d=Math.abs(f.homeX-ballFlight.x)+Math.abs(f.homeY-ballFlight.y);
            return d<best.d?{f,d}:best;
          },{f:null,d:Infinity});
          if(closest.f){
            closest.f.targetX=ballFlight.x+ballFlight.vx*8;
            closest.f.targetY=Math.min(ballFlight.y+ballFlight.vy*5,closest.f.homeY+40);
            closest.f.running=true;
          }
        }

        // Ball landed effect
        if(!ballFlight.landed&&ballFlight.z<=0&&ballFlight.timer>15){
          ballFlight.landed=true;
          if(ballFlight.type!=='hr'){
            addDust(ballFlight.x,ballFlight.y,6);
          }
        }
      }

      updateFieldingPlay();

      transTimer--;
      if(transTimer<=0){
        ballFlight=null;
        ballFlightTrail=[];
        throwAnim=null;
        fieldingPlay=null;
        fielders.forEach(f=>{f.targetX=f.homeX;f.targetY=f.homeY;f.running=false;f.hasBall=false});
        resetAtBat();
      }
      break;

    case 'game_over':break;
  }
}

//  DRAW
// ============================================================
function draw(){
  X.save();

  // Screen shake
  if(shakeTimer>0){
    const intensity=shakeAmount*(shakeTimer/35);
    const sx=(Math.random()-.5)*intensity;
    const sy=(Math.random()-.5)*intensity;
    X.translate(sx,sy);
  }

  if(state==='title'){
    drawTitle();
  }else if(state==='game_over'){
    drawGameOver();
  }else if(state==='inning_change'){
    drawSky();drawClouds();drawStadium();drawFielders();
    drawTransition();
  }else{
    drawSky();
    drawClouds();
    drawStadium();
    drawFielders();
    drawPitcher();
    drawBatter();
    drawCatcher();
    drawUmpire();
    drawStrikeZone();
    drawPitchBall();
    drawBallFlight();
    drawThrowAnim();
    drawParticles();
    drawCelebration();
    drawScoreboard();
    drawBatterInfo();
    drawTimingBar();
    drawCommentary();
    drawPopup();
    drawCPUBattingOverlay();

    // Pitch selection UI when player is pitching
    if(state==='pitching'&&!pitchActive){
      drawPitchSelection();
    }
  }

  X.restore();
}

// ============================================================
//  INPUT HANDLING
// ============================================================
document.addEventListener('keydown',e=>{
  ensureAudio();

  if(state==='title'){
    if(e.code==='Space'||e.code==='Enter'){newGame();e.preventDefault()}
    if(e.code==='Digit1')totalInnings=3;
    if(e.code==='Digit2')totalInnings=5;
    if(e.code==='Digit3')totalInnings=9;
    if(e.code==='Tab'){e.preventDefault();stadiumIndex=(stadiumIndex+1)%STADIUMS.length}
    return;
  }
  if(state==='game_over'){
    if(e.code==='Space'||e.code==='Enter'){state='title';e.preventDefault()}
    return;
  }

  // Pitch selection (when player is pitching)
  if(state==='pitching'&&!pitchActive){
    if(e.code==='Digit1'){pitchTypeIndex=0;e.preventDefault()}
    if(e.code==='Digit2'){pitchTypeIndex=1;e.preventDefault()}
    if(e.code==='Digit3'){pitchTypeIndex=2;e.preventDefault()}
    if(e.code==='Digit4'){pitchTypeIndex=3;e.preventDefault()}
    if(e.code==='Space'){
      startPitch(pitchTypeIndex);
      e.preventDefault();
    }
    return;
  }

  // Batting controls
  if(e.code==='Space'){
    e.preventDefault();
    if(state==='batting'){
      doSwing();
    }
  }

  if(e.code==='KeyS'){
    attemptSteal();
  }
});

function attemptSteal(){
  if(half!=='bottom')return; // only steal when batting
  stealAttempt=true;
  if(bases.some(b=>b)){
    setComm("Steal attempt!");
    const speedBonus=bases.reduce((best,b,i)=>{
      if(!b)return best;
      const runner=b.runner;
      return runner&&runner.speed>best?runner.speed:best;
    },50)/100;

    if(Math.random()<.3+speedBonus*.2){
      let newBases=[null,null,null];
      let scored=false;
      if(bases[2]){
        if(half==='bottom'){scoreP++;recordInningRun()}else{scoreC++;recordInningRun()}
        scored=true;
        showPopup("STOLE HOME!",'#44ff44',50,30);
      }
      if(bases[1])newBases[2]=bases[1];
      if(bases[0])newBases[1]=bases[0];
      bases=newBases;
      if(!scored)showPopup("SAFE!",'#44ff44',45,32);
      SND.safe();
      addDust(getBasePos(scored?0:bases[2]?3:bases[1]?2:1).x,getBasePos(scored?0:bases[2]?3:bases[1]?2:1).y);
    }else{
      outs++;
      for(let i=2;i>=0;i--){if(bases[i]){bases[i]=null;break}}
      showPopup("CAUGHT STEALING!",'#ff4444',55,30);
      SND.umpireOut();
      addDust(getBasePos(2).x,getBasePos(2).y);
      if(outs>=3)nextHalfInning();
    }
  }
}

C.addEventListener('click',e=>{
  ensureAudio();
  const rect=C.getBoundingClientRect();
  const mx=(e.clientX-rect.left)*(W/rect.width);
  const my=(e.clientY-rect.top)*(H/rect.height);

  if(state==='title'){
    if(mx>W/2-110&&mx<W/2+110&&my>395&&my<450)newGame();
    return;
  }
  if(state==='game_over'){
    if(mx>W/2-120&&mx<W/2+120&&my>540&&my<590){state='title';return}
    return;
  }

  if(state==='batting'){
    doSwing();
  }

  // Click to pitch when pitching
  if(state==='pitching'&&!pitchActive){
    startPitch(pitchTypeIndex);
  }
});

// Mobile buttons
document.getElementById('swingBtn').addEventListener('touchstart',e=>{
  e.preventDefault();ensureAudio();
  if(state==='batting')doSwing();
  if(state==='pitching'&&!pitchActive)startPitch(pitchTypeIndex);
});
document.getElementById('stealBtn').addEventListener('touchstart',e=>{
  e.preventDefault();ensureAudio();
  attemptSteal();
});

// Mobile pitch selection
document.querySelectorAll('.pBtn').forEach(btn=>{
  btn.addEventListener('touchstart',e=>{
    e.preventDefault();ensureAudio();
    const idx=parseInt(btn.dataset.pitch);
    if(!isNaN(idx))pitchTypeIndex=idx;
  });
});

// ============================================================
//  GAME LOOP
// ============================================================
function loop(){
  update();
  draw();
  requestAnimationFrame(loop);
}
loop();

})();
</script>
