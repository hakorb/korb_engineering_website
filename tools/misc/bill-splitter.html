<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<meta name="description" content="Bill Splitter — Split restaurant bills per-item with tax, tip, fees, and Venmo/PayPal/Cash App deep links. No signup, no ads. Korb Engineering.">
<title>Bill Splitter // Korb Engineering</title>
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
* { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
:root {
  --bg: #050a0f;
  --panel: #0a1118;
  --panel2: #0c1520;
  --input-bg: #0d1a24;
  --cyan: #00d4ff;
  --orange: #ff6600;
  --green: #00ff88;
  --yellow: #ffc400;
  --red: #ff2244;
  --purple: #c077ff;
  --pink: #ff66aa;
  --text: #c8d8e4;
  --text-dim: #5a7080;
  --text-dimmer: #3a4a55;
  --border: #1a2a35;
  --border-hot: #2a4055;
}
html, body {
  background: var(--bg);
  color: var(--text);
  font-family: 'IBM Plex Mono', monospace;
  min-height: 100vh;
  font-size: 14px;
  overflow-x: hidden;
}
body {
  padding: 12px;
  padding-bottom: 100px;
  max-width: 1000px;
  margin: 0 auto;
  position: relative;
  padding-top: env(safe-area-inset-top, 12px);
}
body::after {
  content: '';
  position: fixed;
  top: 0; left: 0; right: 0; bottom: 0;
  background: repeating-linear-gradient(
    0deg,
    transparent,
    transparent 2px,
    rgba(0,212,255,0.015) 2px,
    rgba(0,212,255,0.015) 4px
  );
  pointer-events: none;
  z-index: 9999;
}
.back-link {
  display: inline-block;
  color: var(--cyan);
  text-decoration: none;
  font-size: 12px;
  letter-spacing: 1px;
  padding: 8px 12px;
  border: 1px solid var(--border);
  border-radius: 4px;
  margin-bottom: 14px;
  background: var(--panel);
  min-height: 44px;
  line-height: 28px;
}
.back-link:hover { background: var(--input-bg); }
header {
  margin-bottom: 16px;
  padding: 14px;
  background: var(--panel);
  border: 1px solid var(--border);
  border-radius: 6px;
}
h1 {
  font-size: 22px;
  color: var(--orange);
  letter-spacing: 1.5px;
  margin-bottom: 4px;
  text-shadow: 0 0 12px rgba(255,102,0,0.3);
}
.subtitle {
  font-size: 11px;
  color: var(--text-dim);
  letter-spacing: 1px;
}
.panel {
  background: var(--panel);
  border: 1px solid var(--border);
  border-radius: 6px;
  padding: 12px;
  margin-bottom: 14px;
}
.panel-title {
  font-size: 12px;
  letter-spacing: 1.5px;
  color: var(--cyan);
  margin-bottom: 10px;
  text-transform: uppercase;
  display: flex;
  justify-content: space-between;
  align-items: center;
  gap: 8px;
  flex-wrap: wrap;
}
.panel-title .count {
  color: var(--text-dim);
  font-size: 10px;
}
.tabs {
  display: flex;
  gap: 4px;
  margin-bottom: 14px;
  background: var(--panel);
  border: 1px solid var(--border);
  border-radius: 6px;
  padding: 4px;
}
.tab {
  flex: 1;
  padding: 10px 8px;
  min-height: 44px;
  background: transparent;
  border: none;
  color: var(--text-dim);
  font-family: inherit;
  font-size: 12px;
  font-weight: 600;
  letter-spacing: 1px;
  cursor: pointer;
  border-radius: 4px;
  text-transform: uppercase;
  transition: all .15s;
}
.tab.active {
  background: var(--input-bg);
  color: var(--cyan);
  box-shadow: inset 0 0 0 1px var(--border-hot);
}
.tab:active { transform: scale(0.97); }
input[type=text], input[type=number], textarea, select {
  background: var(--input-bg);
  color: var(--text);
  border: 1px solid var(--border);
  border-radius: 4px;
  padding: 10px 12px;
  font-family: inherit;
  font-size: 16px;
  width: 100%;
  min-height: 44px;
}
input:focus, textarea:focus, select:focus {
  outline: none;
  border-color: var(--cyan);
  box-shadow: 0 0 0 2px rgba(0,212,255,0.15);
}
label {
  font-size: 11px;
  color: var(--text-dim);
  letter-spacing: 1px;
  text-transform: uppercase;
  display: block;
  margin-bottom: 4px;
}
button {
  background: var(--input-bg);
  color: var(--text);
  border: 1px solid var(--border);
  border-radius: 4px;
  padding: 10px 14px;
  font-family: inherit;
  font-size: 13px;
  cursor: pointer;
  min-height: 44px;
  letter-spacing: 0.5px;
  transition: all .15s;
}
button:hover { border-color: var(--border-hot); background: var(--panel2); }
button:active { transform: scale(0.97); }
button.primary {
  background: var(--cyan);
  color: #000;
  border-color: var(--cyan);
  font-weight: 600;
}
button.primary:hover { background: #33e0ff; }
button.orange {
  background: var(--orange);
  color: #000;
  border-color: var(--orange);
  font-weight: 600;
}
button.danger { color: var(--red); }
button.danger:hover { background: rgba(255,34,68,0.1); border-color: var(--red); }
button.small {
  padding: 6px 10px;
  font-size: 11px;
  min-height: 32px;
}

/* People */
.people-row {
  display: flex;
  flex-wrap: wrap;
  gap: 8px;
  margin-bottom: 10px;
}
.person-chip {
  display: inline-flex;
  align-items: center;
  gap: 6px;
  padding: 8px 12px;
  min-height: 40px;
  border-radius: 20px;
  background: var(--input-bg);
  border: 1px solid var(--border);
  font-size: 13px;
  cursor: pointer;
  user-select: none;
}
.person-chip .emoji { font-size: 16px; }
.person-chip .x {
  color: var(--text-dimmer);
  margin-left: 4px;
  padding: 2px 4px;
  font-size: 14px;
}
.person-chip .x:hover { color: var(--red); }
.add-person-form {
  display: grid;
  grid-template-columns: 1fr 70px auto;
  gap: 6px;
  margin-top: 8px;
}
.color-swatches {
  display: flex;
  gap: 4px;
  flex-wrap: wrap;
  margin-top: 6px;
}
.swatch {
  width: 24px;
  height: 24px;
  border-radius: 50%;
  cursor: pointer;
  border: 2px solid transparent;
}
.swatch.active { border-color: var(--text); }

/* Items */
.item-row {
  background: var(--panel2);
  border: 1px solid var(--border);
  border-radius: 6px;
  padding: 10px;
  margin-bottom: 8px;
}
.item-top {
  display: grid;
  grid-template-columns: 1fr 90px auto;
  gap: 6px;
  align-items: center;
  margin-bottom: 8px;
}
.item-top input { min-height: 40px; }
.item-row .tax-toggle {
  display: flex;
  align-items: center;
  gap: 6px;
  font-size: 11px;
  color: var(--text-dim);
  cursor: pointer;
  user-select: none;
  padding: 4px 0;
}
.item-row .tax-toggle input { width: 18px; height: 18px; min-height: 0; }
.assignees {
  display: flex;
  flex-wrap: wrap;
  gap: 6px;
  margin-top: 8px;
}
.assignee-btn {
  display: inline-flex;
  align-items: center;
  gap: 4px;
  padding: 6px 10px;
  min-height: 36px;
  border-radius: 18px;
  background: var(--input-bg);
  border: 1px solid var(--border);
  font-size: 12px;
  cursor: pointer;
  opacity: 0.5;
  user-select: none;
  transition: all .12s;
}
.assignee-btn.active {
  opacity: 1;
  border-color: var(--cyan);
  box-shadow: 0 0 0 1px rgba(0,212,255,0.3) inset;
}
.item-meta {
  display: flex;
  justify-content: space-between;
  align-items: center;
  margin-top: 6px;
  font-size: 11px;
  color: var(--text-dim);
}
.item-meta .per-person { color: var(--yellow); }

/* Settings grid */
.settings-grid {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 8px;
}
.tip-presets {
  display: grid;
  grid-template-columns: repeat(3, 1fr);
  gap: 6px;
  margin-top: 6px;
}
.tip-presets button {
  padding: 8px 4px;
  font-size: 11px;
}
.tip-presets button.active {
  background: var(--orange);
  color: #000;
  border-color: var(--orange);
  font-weight: 600;
}

/* Summary */
.totals-bar {
  display: grid;
  grid-template-columns: repeat(4, 1fr);
  gap: 6px;
  margin-bottom: 12px;
}
.stat {
  background: var(--panel2);
  border: 1px solid var(--border);
  border-radius: 4px;
  padding: 8px 6px;
  text-align: center;
}
.stat .label {
  font-size: 9px;
  color: var(--text-dim);
  letter-spacing: 1px;
  margin-bottom: 2px;
}
.stat .value {
  font-size: 14px;
  color: var(--cyan);
  font-weight: 600;
}
.stat.total .value { color: var(--orange); font-size: 16px; }
.person-summary {
  background: var(--panel2);
  border: 1px solid var(--border);
  border-radius: 6px;
  padding: 10px;
  margin-bottom: 8px;
}
.person-summary-head {
  display: flex;
  justify-content: space-between;
  align-items: center;
  margin-bottom: 6px;
  gap: 8px;
  flex-wrap: wrap;
}
.person-summary-name {
  font-size: 14px;
  font-weight: 600;
  display: flex;
  align-items: center;
  gap: 6px;
}
.person-summary-total {
  color: var(--orange);
  font-size: 16px;
  font-weight: 700;
}
.person-bar {
  height: 8px;
  background: var(--input-bg);
  border-radius: 4px;
  overflow: hidden;
  margin: 6px 0;
}
.person-bar-fill {
  height: 100%;
  transition: width .3s;
}
.person-breakdown {
  font-size: 11px;
  color: var(--text-dim);
  display: flex;
  flex-wrap: wrap;
  gap: 10px;
}
.person-breakdown b { color: var(--text); font-weight: 500; }
.pay-links {
  display: flex;
  gap: 6px;
  margin-top: 8px;
  flex-wrap: wrap;
}
.pay-link {
  flex: 1;
  min-width: 80px;
  text-align: center;
  text-decoration: none;
  padding: 8px 6px;
  border-radius: 4px;
  font-size: 11px;
  font-weight: 600;
  letter-spacing: 0.5px;
  min-height: 36px;
  display: flex;
  align-items: center;
  justify-content: center;
}
.pay-link.venmo { background: #008CFF; color: #fff; }
.pay-link.paypal { background: #0079C1; color: #fff; }
.pay-link.cashapp { background: #00D632; color: #000; }
.pay-handle-input {
  display: flex;
  gap: 4px;
  margin-top: 6px;
}
.pay-handle-input input {
  font-size: 12px;
  padding: 6px 8px;
  min-height: 36px;
  flex: 1;
}

/* History */
.history-item {
  background: var(--panel2);
  border: 1px solid var(--border);
  border-radius: 4px;
  padding: 10px;
  margin-bottom: 6px;
  display: flex;
  justify-content: space-between;
  align-items: center;
  gap: 8px;
  flex-wrap: wrap;
}
.history-item .info { flex: 1; min-width: 180px; }
.history-item .date { font-size: 10px; color: var(--text-dim); }
.history-item .title { font-size: 13px; }
.history-item .amount { color: var(--orange); font-weight: 600; }

/* Quick split */
.quick-split-result {
  text-align: center;
  padding: 20px;
  background: var(--panel2);
  border: 1px solid var(--border-hot);
  border-radius: 8px;
  margin-top: 12px;
}
.quick-split-result .big {
  font-size: 36px;
  color: var(--orange);
  font-weight: 700;
  text-shadow: 0 0 16px rgba(255,102,0,0.35);
  margin: 6px 0;
}
.quick-split-result .label {
  font-size: 11px;
  color: var(--text-dim);
  letter-spacing: 1.5px;
}

.empty {
  text-align: center;
  padding: 20px;
  color: var(--text-dimmer);
  font-size: 12px;
  font-style: italic;
}
.row-actions {
  display: flex;
  gap: 6px;
  justify-content: flex-end;
  margin-top: 8px;
}
.share-buttons {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 6px;
  margin-top: 10px;
}
textarea.share-output {
  font-size: 12px;
  min-height: 120px;
  resize: vertical;
  margin-top: 8px;
  white-space: pre;
}
.toast {
  position: fixed;
  bottom: 20px;
  left: 50%;
  transform: translateX(-50%);
  background: var(--cyan);
  color: #000;
  padding: 10px 20px;
  border-radius: 20px;
  font-size: 12px;
  font-weight: 600;
  letter-spacing: 1px;
  z-index: 10000;
  opacity: 0;
  pointer-events: none;
  transition: opacity .2s;
}
.toast.show { opacity: 1; }

@media (max-width: 500px) {
  .totals-bar { grid-template-columns: repeat(2, 1fr); }
  .settings-grid { grid-template-columns: 1fr; }
  h1 { font-size: 18px; }
}
</style>
</head>
<body>
<a href="../../index.html#misc" class="back-link">&larr; BACK TO TOOLS</a>
<header>
  <h1>BILL SPLITTER</h1>
  <div class="subtitle">PER-ITEM / TAX / TIP / FEES / VENMO</div>
</header>

<div class="tabs">
  <button class="tab active" data-tab="split">SPLIT</button>
  <button class="tab" data-tab="quick">QUICK</button>
  <button class="tab" data-tab="summary">SUMMARY</button>
  <button class="tab" data-tab="history">HISTORY</button>
</div>

<!-- SPLIT TAB -->
<div class="tab-panel" id="tab-split">
  <div class="panel">
    <div class="panel-title">
      <span>PEOPLE</span>
      <span class="count" id="people-count">0</span>
    </div>
    <div class="people-row" id="people-list"></div>
    <div class="add-person-form">
      <input type="text" id="new-person-name" placeholder="Name" maxlength="20">
      <input type="text" id="new-person-emoji" placeholder="Emoji" maxlength="2">
      <button class="primary" id="add-person-btn">ADD</button>
    </div>
    <div class="color-swatches" id="color-swatches"></div>
  </div>

  <div class="panel">
    <div class="panel-title">
      <span>ITEMS</span>
      <span class="count" id="items-count">0</span>
    </div>
    <div id="items-list"></div>
    <button class="primary" id="add-item-btn" style="width:100%; margin-top:8px;">+ ADD ITEM</button>
  </div>

  <div class="panel">
    <div class="panel-title"><span>TAX / TIP / FEES</span></div>
    <div class="settings-grid">
      <div>
        <label>Tax rate %</label>
        <input type="number" id="tax-rate" value="8.25" step="0.01" min="0">
      </div>
      <div>
        <label>Fee per-person $</label>
        <input type="number" id="fee-per-person" value="0" step="0.01" min="0">
      </div>
    </div>
    <div style="margin-top:10px;">
      <label>Tip</label>
      <div class="tip-presets" id="tip-presets">
        <button data-tip="15">15%</button>
        <button data-tip="18">18%</button>
        <button data-tip="20" class="active">20%</button>
        <button data-tip="25">25%</button>
        <button data-tip="custom">CUSTOM $</button>
        <button data-tip="roundup">ROUND UP</button>
      </div>
      <div id="tip-custom-wrap" style="display:none; margin-top:8px;">
        <input type="number" id="tip-custom" value="0" step="0.01" min="0" placeholder="Tip amount $">
      </div>
    </div>
    <div style="margin-top:10px;">
      <label>Bill name (for history)</label>
      <input type="text" id="bill-name" placeholder="e.g. Dinner at Gilberto's">
    </div>
  </div>

  <div class="panel">
    <div class="row-actions" style="justify-content:space-between;">
      <button class="danger" id="clear-bill-btn">CLEAR</button>
      <button class="orange" id="save-bill-btn">SAVE TO HISTORY</button>
    </div>
  </div>
</div>

<!-- QUICK TAB -->
<div class="tab-panel" id="tab-quick" style="display:none;">
  <div class="panel">
    <div class="panel-title"><span>QUICK SPLIT</span></div>
    <div class="settings-grid">
      <div>
        <label>Subtotal $</label>
        <input type="number" id="qs-subtotal" value="0" step="0.01" min="0">
      </div>
      <div>
        <label>Number of people</label>
        <input type="number" id="qs-people" value="2" step="1" min="1">
      </div>
      <div>
        <label>Tax %</label>
        <input type="number" id="qs-tax" value="8.25" step="0.01" min="0">
      </div>
      <div>
        <label>Tip %</label>
        <input type="number" id="qs-tip" value="20" step="0.5" min="0">
      </div>
    </div>
    <div class="quick-split-result">
      <div class="label">EACH PERSON PAYS</div>
      <div class="big" id="qs-per-person">$0.00</div>
      <div style="color:var(--text-dim); font-size:11px;" id="qs-breakdown"></div>
    </div>
  </div>
</div>

<!-- SUMMARY TAB -->
<div class="tab-panel" id="tab-summary" style="display:none;">
  <div class="panel">
    <div class="panel-title"><span>TOTALS</span></div>
    <div class="totals-bar">
      <div class="stat"><div class="label">SUBTOTAL</div><div class="value" id="sum-subtotal">$0</div></div>
      <div class="stat"><div class="label">TAX</div><div class="value" id="sum-tax">$0</div></div>
      <div class="stat"><div class="label">TIP</div><div class="value" id="sum-tip">$0</div></div>
      <div class="stat total"><div class="label">TOTAL</div><div class="value" id="sum-total">$0</div></div>
    </div>
  </div>

  <div class="panel">
    <div class="panel-title"><span>PER PERSON</span></div>
    <div id="summary-people"></div>
  </div>

  <div class="panel">
    <div class="panel-title"><span>SHARE</span></div>
    <div class="share-buttons">
      <button id="share-text-btn">PLAIN TEXT</button>
      <button id="share-md-btn">MARKDOWN</button>
      <button id="share-sms-btn">SMS</button>
      <button id="copy-share-btn" class="primary">COPY</button>
    </div>
    <textarea class="share-output" id="share-output" readonly></textarea>
  </div>
</div>

<!-- HISTORY TAB -->
<div class="tab-panel" id="tab-history" style="display:none;">
  <div class="panel">
    <div class="panel-title">
      <span>SAVED BILLS</span>
      <button class="small danger" id="clear-history-btn">CLEAR ALL</button>
    </div>
    <div id="history-list"></div>
  </div>
</div>

<div class="toast" id="toast">COPIED</div>

<script>
'use strict';
const LS_PREFIX = 'korb_split_';
const LS_HISTORY = 'korb_split_history';
const LS_STATE = 'korb_split_state';
const LS_HANDLES = 'korb_split_handles';

const PALETTE = ['#00d4ff','#ff6600','#00ff88','#ffc400','#ff2244','#c077ff','#ff66aa','#7aa5ff'];
const EMOJIS_DEFAULT = ['🍕','🌮','🍔','🍟','🥗','🍣','🍜','🍩','🍺','☕','🥑','🌯'];

let state = {
  people: [],
  items: [],
  taxRate: 8.25,
  feePerPerson: 0,
  tipMode: '20',
  tipCustom: 0,
  billName: '',
  selectedColor: PALETTE[0]
};

// ---- Persistence ----
function saveState() {
  try { localStorage.setItem(LS_STATE, JSON.stringify(state)); } catch(e){}
}
function loadState() {
  try {
    const s = localStorage.getItem(LS_STATE);
    if (s) {
      const parsed = JSON.parse(s);
      state = Object.assign(state, parsed);
    }
  } catch(e){}
}
function getHistory() {
  try { return JSON.parse(localStorage.getItem(LS_HISTORY) || '[]'); } catch(e){ return []; }
}
function saveHistory(arr) {
  try { localStorage.setItem(LS_HISTORY, JSON.stringify(arr)); } catch(e){}
}
function getHandles() {
  try { return JSON.parse(localStorage.getItem(LS_HANDLES) || '{}'); } catch(e){ return {}; }
}
function saveHandles(h) {
  try { localStorage.setItem(LS_HANDLES, JSON.stringify(h)); } catch(e){}
}

// ---- Utils ----
const $ = (id) => document.getElementById(id);
const fmt = (n) => (isNaN(n) ? 0 : n).toLocaleString('en-US', {style:'currency', currency:'USD'});
const round2 = (n) => Math.round(n * 100) / 100;
const uid = () => Math.random().toString(36).slice(2, 10);

function toast(msg) {
  const t = $('toast');
  t.textContent = msg;
  t.classList.add('show');
  clearTimeout(toast._t);
  toast._t = setTimeout(() => t.classList.remove('show'), 1500);
}

// ---- Calc engine ----
function calculate() {
  const taxRate = parseFloat(state.taxRate) || 0;
  const feePP = parseFloat(state.feePerPerson) || 0;
  const nPeople = state.people.length;

  // per-person subtotals from items
  const personTotals = {};
  state.people.forEach(p => { personTotals[p.id] = { sub: 0, taxable: 0 }; });

  let subtotal = 0;
  let taxableSub = 0;

  state.items.forEach(item => {
    const price = parseFloat(item.price) || 0;
    subtotal += price;
    if (item.taxable) taxableSub += price;
    const assignees = item.assignees.filter(id => state.people.find(p => p.id === id));
    if (assignees.length > 0) {
      const share = price / assignees.length;
      assignees.forEach(pid => {
        personTotals[pid].sub += share;
        if (item.taxable) personTotals[pid].taxable += share;
      });
    }
  });

  const tax = taxableSub * (taxRate / 100);

  // Tip calculation
  let tip = 0;
  const tipBase = subtotal + tax;
  if (state.tipMode === 'custom') {
    tip = parseFloat(state.tipCustom) || 0;
  } else if (state.tipMode === 'roundup') {
    const roundTo = Math.ceil((tipBase + feePP * nPeople) / 5) * 5;
    tip = Math.max(0, roundTo - (tipBase + feePP * nPeople));
  } else {
    const pct = parseFloat(state.tipMode) || 0;
    tip = subtotal * (pct / 100);
  }

  const totalFees = feePP * nPeople;
  const grandTotal = subtotal + tax + tip + totalFees;

  // Per-person allocations
  const breakdown = state.people.map(p => {
    const pt = personTotals[p.id];
    const personTax = pt.taxable * (taxRate / 100);
    // tip allocated proportionally to subtotal
    const tipShare = subtotal > 0 ? (pt.sub / subtotal) * tip : (nPeople > 0 ? tip / nPeople : 0);
    const fee = feePP;
    const total = pt.sub + personTax + tipShare + fee;
    return {
      person: p,
      items: pt.sub,
      tax: personTax,
      tip: tipShare,
      fee,
      total
    };
  });

  return { subtotal, tax, tip, totalFees, grandTotal, breakdown };
}

// ---- Renderers ----
function renderPeople() {
  const list = $('people-list');
  list.innerHTML = '';
  state.people.forEach(p => {
    const chip = document.createElement('div');
    chip.className = 'person-chip';
    chip.style.borderColor = p.color;
    chip.innerHTML = `<span class="emoji">${p.emoji || '👤'}</span><span>${escapeHtml(p.name)}</span><span class="x" data-id="${p.id}">×</span>`;
    list.appendChild(chip);
  });
  $('people-count').textContent = state.people.length;
  list.querySelectorAll('.x').forEach(x => {
    x.addEventListener('click', (e) => {
      e.stopPropagation();
      const id = x.getAttribute('data-id');
      state.people = state.people.filter(p => p.id !== id);
      state.items.forEach(it => { it.assignees = it.assignees.filter(a => a !== id); });
      saveState();
      renderAll();
    });
  });

  // render swatches
  const sw = $('color-swatches');
  sw.innerHTML = '';
  PALETTE.forEach(c => {
    const d = document.createElement('div');
    d.className = 'swatch' + (c === state.selectedColor ? ' active' : '');
    d.style.background = c;
    d.addEventListener('click', () => {
      state.selectedColor = c;
      renderPeople();
    });
    sw.appendChild(d);
  });
}

function renderItems() {
  const list = $('items-list');
  list.innerHTML = '';
  if (state.items.length === 0) {
    list.innerHTML = '<div class="empty">No items yet. Tap + ADD ITEM below.</div>';
  }
  const calc = calculate();
  state.items.forEach((item, idx) => {
    const row = document.createElement('div');
    row.className = 'item-row';
    const assigneeCount = item.assignees.length;
    const price = parseFloat(item.price) || 0;
    const perPerson = assigneeCount > 0 ? price / assigneeCount : 0;

    row.innerHTML = `
      <div class="item-top">
        <input type="text" class="it-desc" value="${escapeAttr(item.desc)}" placeholder="Description" data-idx="${idx}">
        <input type="number" class="it-price" value="${item.price}" step="0.01" placeholder="0.00" data-idx="${idx}">
        <button class="danger small it-del" data-idx="${idx}">DEL</button>
      </div>
      <label class="tax-toggle">
        <input type="checkbox" class="it-tax" ${item.taxable ? 'checked' : ''} data-idx="${idx}">
        <span>Taxable</span>
      </label>
      <div class="assignees"></div>
      <div class="item-meta">
        <span>${assigneeCount} ${assigneeCount === 1 ? 'person' : 'people'}</span>
        <span class="per-person">${assigneeCount > 0 ? fmt(perPerson) + ' each' : 'unassigned'}</span>
      </div>
    `;
    const as = row.querySelector('.assignees');
    state.people.forEach(p => {
      const b = document.createElement('div');
      b.className = 'assignee-btn' + (item.assignees.includes(p.id) ? ' active' : '');
      b.style.borderColor = item.assignees.includes(p.id) ? p.color : '';
      b.innerHTML = `<span>${p.emoji || '👤'}</span><span>${escapeHtml(p.name)}</span>`;
      b.addEventListener('click', () => {
        if (item.assignees.includes(p.id)) {
          item.assignees = item.assignees.filter(a => a !== p.id);
        } else {
          item.assignees.push(p.id);
        }
        saveState();
        renderItems();
      });
      as.appendChild(b);
    });
    if (state.people.length === 0) {
      as.innerHTML = '<div style="font-size:11px; color:var(--text-dimmer); padding:4px;">Add people first</div>';
    }
    list.appendChild(row);
  });
  $('items-count').textContent = state.items.length;

  // bind edits
  list.querySelectorAll('.it-desc').forEach(el => {
    el.addEventListener('input', (e) => {
      const i = +e.target.getAttribute('data-idx');
      state.items[i].desc = e.target.value;
      saveState();
    });
  });
  list.querySelectorAll('.it-price').forEach(el => {
    el.addEventListener('input', (e) => {
      const i = +e.target.getAttribute('data-idx');
      state.items[i].price = e.target.value;
      saveState();
      // debounced re-render
      clearTimeout(el._t);
      el._t = setTimeout(renderItems, 300);
    });
  });
  list.querySelectorAll('.it-tax').forEach(el => {
    el.addEventListener('change', (e) => {
      const i = +e.target.getAttribute('data-idx');
      state.items[i].taxable = e.target.checked;
      saveState();
      renderItems();
    });
  });
  list.querySelectorAll('.it-del').forEach(el => {
    el.addEventListener('click', (e) => {
      const i = +e.target.getAttribute('data-idx');
      state.items.splice(i, 1);
      saveState();
      renderItems();
    });
  });
}

function renderTipPresets() {
  document.querySelectorAll('#tip-presets button').forEach(b => {
    b.classList.toggle('active', b.getAttribute('data-tip') === state.tipMode);
  });
  $('tip-custom-wrap').style.display = state.tipMode === 'custom' ? 'block' : 'none';
}

function renderSummary() {
  const calc = calculate();
  $('sum-subtotal').textContent = fmt(calc.subtotal);
  $('sum-tax').textContent = fmt(calc.tax);
  $('sum-tip').textContent = fmt(calc.tip);
  $('sum-total').textContent = fmt(calc.grandTotal);

  const maxTotal = Math.max(...calc.breakdown.map(b => b.total), 0.01);
  const wrap = $('summary-people');
  wrap.innerHTML = '';
  if (calc.breakdown.length === 0) {
    wrap.innerHTML = '<div class="empty">Add people on the SPLIT tab to see breakdown.</div>';
    return;
  }
  const handles = getHandles();
  calc.breakdown.forEach(b => {
    const div = document.createElement('div');
    div.className = 'person-summary';
    const pct = (b.total / maxTotal) * 100;
    const h = handles[b.person.id] || {};
    const note = encodeURIComponent((state.billName || 'Bill split') + ' via Korb Bill Splitter');
    const amt = b.total.toFixed(2);
    const venmoHandle = (h.venmo || '').replace(/^@/, '');
    const paypalHandle = (h.paypal || '').replace(/^@/, '');
    const cashHandle = (h.cashapp || '').replace(/^\$/, '');

    const payLinks = b.total > 0 ? `
      <div class="pay-links">
        ${venmoHandle ? `<a class="pay-link venmo" href="venmo://paycharge?txn=pay&recipients=${encodeURIComponent(venmoHandle)}&amount=${amt}&note=${note}">VENMO</a>` : ''}
        ${paypalHandle ? `<a class="pay-link paypal" href="https://paypal.me/${encodeURIComponent(paypalHandle)}/${amt}">PAYPAL</a>` : ''}
        ${cashHandle ? `<a class="pay-link cashapp" href="https://cash.app/$${encodeURIComponent(cashHandle)}/${amt}">CASH APP</a>` : ''}
      </div>
    ` : '';

    div.innerHTML = `
      <div class="person-summary-head">
        <div class="person-summary-name">
          <span>${b.person.emoji || '👤'}</span>
          <span style="color:${b.person.color}">${escapeHtml(b.person.name)}</span>
        </div>
        <div class="person-summary-total">${fmt(b.total)}</div>
      </div>
      <div class="person-bar"><div class="person-bar-fill" style="width:${pct}%; background:${b.person.color}"></div></div>
      <div class="person-breakdown">
        <span>Items <b>${fmt(b.items)}</b></span>
        <span>Tax <b>${fmt(b.tax)}</b></span>
        <span>Tip <b>${fmt(b.tip)}</b></span>
        ${b.fee > 0 ? `<span>Fee <b>${fmt(b.fee)}</b></span>` : ''}
      </div>
      <div class="pay-handle-input">
        <input type="text" placeholder="@venmo" data-pid="${b.person.id}" data-kind="venmo" value="${escapeAttr(h.venmo || '')}">
        <input type="text" placeholder="paypal.me" data-pid="${b.person.id}" data-kind="paypal" value="${escapeAttr(h.paypal || '')}">
        <input type="text" placeholder="$cashtag" data-pid="${b.person.id}" data-kind="cashapp" value="${escapeAttr(h.cashapp || '')}">
      </div>
      ${payLinks}
    `;
    wrap.appendChild(div);
  });

  wrap.querySelectorAll('.pay-handle-input input').forEach(inp => {
    inp.addEventListener('input', (e) => {
      const pid = e.target.getAttribute('data-pid');
      const kind = e.target.getAttribute('data-kind');
      const hs = getHandles();
      if (!hs[pid]) hs[pid] = {};
      hs[pid][kind] = e.target.value.trim();
      saveHandles(hs);
      clearTimeout(inp._t);
      inp._t = setTimeout(renderSummary, 400);
    });
  });
}

function renderHistory() {
  const hist = getHistory();
  const list = $('history-list');
  list.innerHTML = '';
  if (hist.length === 0) {
    list.innerHTML = '<div class="empty">No saved bills yet.</div>';
    return;
  }
  hist.slice().reverse().forEach((h, i) => {
    const realIdx = hist.length - 1 - i;
    const div = document.createElement('div');
    div.className = 'history-item';
    const d = new Date(h.ts);
    div.innerHTML = `
      <div class="info">
        <div class="title">${escapeHtml(h.name || 'Untitled')}</div>
        <div class="date">${d.toLocaleDateString()} · ${h.people.length}p · ${h.items.length} items</div>
      </div>
      <div class="amount">${fmt(h.total || 0)}</div>
      <div class="row-actions">
        <button class="small" data-load="${realIdx}">LOAD</button>
        <button class="small danger" data-del="${realIdx}">DEL</button>
      </div>
    `;
    list.appendChild(div);
  });
  list.querySelectorAll('[data-load]').forEach(b => {
    b.addEventListener('click', () => {
      const idx = +b.getAttribute('data-load');
      const h = getHistory()[idx];
      if (h) {
        state.people = h.people;
        state.items = h.items;
        state.taxRate = h.taxRate;
        state.feePerPerson = h.feePerPerson;
        state.tipMode = h.tipMode;
        state.tipCustom = h.tipCustom || 0;
        state.billName = h.name || '';
        saveState();
        renderAll();
        switchTab('split');
        toast('LOADED');
      }
    });
  });
  list.querySelectorAll('[data-del]').forEach(b => {
    b.addEventListener('click', () => {
      const idx = +b.getAttribute('data-del');
      const hist = getHistory();
      hist.splice(idx, 1);
      saveHistory(hist);
      renderHistory();
    });
  });
}

function renderQuickSplit() {
  const sub = parseFloat($('qs-subtotal').value) || 0;
  const n = Math.max(1, parseInt($('qs-people').value) || 1);
  const tax = (parseFloat($('qs-tax').value) || 0) / 100;
  const tip = (parseFloat($('qs-tip').value) || 0) / 100;
  const taxAmt = sub * tax;
  const tipAmt = sub * tip;
  const total = sub + taxAmt + tipAmt;
  const perP = total / n;
  $('qs-per-person').textContent = fmt(perP);
  $('qs-breakdown').textContent = `Subtotal ${fmt(sub)} · Tax ${fmt(taxAmt)} · Tip ${fmt(tipAmt)} · Total ${fmt(total)}`;
}

function renderAll() {
  renderPeople();
  renderItems();
  renderTipPresets();
  renderSummary();
  renderHistory();
  $('tax-rate').value = state.taxRate;
  $('fee-per-person').value = state.feePerPerson;
  $('tip-custom').value = state.tipCustom;
  $('bill-name').value = state.billName;
}

function escapeHtml(s) {
  return String(s ?? '').replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
}
function escapeAttr(s) { return escapeHtml(s); }

// ---- Tabs ----
function switchTab(name) {
  document.querySelectorAll('.tab').forEach(t => t.classList.toggle('active', t.getAttribute('data-tab') === name));
  document.querySelectorAll('.tab-panel').forEach(p => {
    p.style.display = p.id === 'tab-' + name ? '' : 'none';
  });
  if (name === 'summary') renderSummary();
  if (name === 'history') renderHistory();
  if (name === 'quick') renderQuickSplit();
}

// ---- Share ----
function buildShareText(format) {
  const calc = calculate();
  const lines = [];
  const title = state.billName || 'Bill Split';
  if (format === 'md') {
    lines.push(`## ${title}`);
    lines.push('');
    lines.push(`**Total: ${fmt(calc.grandTotal)}** (Subtotal ${fmt(calc.subtotal)} · Tax ${fmt(calc.tax)} · Tip ${fmt(calc.tip)})`);
    lines.push('');
    lines.push('| Person | Items | Tax | Tip | Fee | Total |');
    lines.push('|---|---|---|---|---|---|');
    calc.breakdown.forEach(b => {
      lines.push(`| ${b.person.emoji || ''} ${b.person.name} | ${fmt(b.items)} | ${fmt(b.tax)} | ${fmt(b.tip)} | ${fmt(b.fee)} | **${fmt(b.total)}** |`);
    });
  } else if (format === 'sms') {
    lines.push(`${title} — total ${fmt(calc.grandTotal)}`);
    calc.breakdown.forEach(b => {
      lines.push(`${b.person.name}: ${fmt(b.total)}`);
    });
  } else {
    lines.push(title);
    lines.push(`Total: ${fmt(calc.grandTotal)}  (Sub ${fmt(calc.subtotal)} / Tax ${fmt(calc.tax)} / Tip ${fmt(calc.tip)})`);
    lines.push('');
    calc.breakdown.forEach(b => {
      lines.push(`${b.person.emoji || ''} ${b.person.name.padEnd(12)} ${fmt(b.total)}`);
    });
  }
  return lines.join('\n');
}

// ---- Event wiring ----
document.addEventListener('DOMContentLoaded', () => {
  loadState();

  // Tabs
  document.querySelectorAll('.tab').forEach(t => {
    t.addEventListener('click', () => switchTab(t.getAttribute('data-tab')));
  });

  // Add person
  $('add-person-btn').addEventListener('click', () => {
    const name = $('new-person-name').value.trim();
    if (!name) { toast('NAME REQUIRED'); return; }
    const emoji = $('new-person-emoji').value.trim() || EMOJIS_DEFAULT[state.people.length % EMOJIS_DEFAULT.length];
    state.people.push({
      id: uid(),
      name,
      emoji,
      color: state.selectedColor
    });
    // rotate color
    const nextIdx = (PALETTE.indexOf(state.selectedColor) + 1) % PALETTE.length;
    state.selectedColor = PALETTE[nextIdx];
    $('new-person-name').value = '';
    $('new-person-emoji').value = '';
    saveState();
    renderPeople();
    renderItems();
  });
  $('new-person-name').addEventListener('keydown', (e) => {
    if (e.key === 'Enter') $('add-person-btn').click();
  });

  // Add item
  $('add-item-btn').addEventListener('click', () => {
    state.items.push({
      id: uid(),
      desc: '',
      price: '',
      taxable: true,
      assignees: state.people.map(p => p.id) // default all
    });
    saveState();
    renderItems();
  });

  // Tax/fee inputs
  $('tax-rate').addEventListener('input', (e) => { state.taxRate = e.target.value; saveState(); });
  $('fee-per-person').addEventListener('input', (e) => { state.feePerPerson = e.target.value; saveState(); });
  $('bill-name').addEventListener('input', (e) => { state.billName = e.target.value; saveState(); });

  // Tip presets
  document.querySelectorAll('#tip-presets button').forEach(b => {
    b.addEventListener('click', () => {
      state.tipMode = b.getAttribute('data-tip');
      saveState();
      renderTipPresets();
    });
  });
  $('tip-custom').addEventListener('input', (e) => { state.tipCustom = e.target.value; saveState(); });

  // Clear
  $('clear-bill-btn').addEventListener('click', () => {
    if (!confirm('Clear current bill? (History is kept.)')) return;
    state.people = [];
    state.items = [];
    state.billName = '';
    saveState();
    renderAll();
  });

  // Save
  $('save-bill-btn').addEventListener('click', () => {
    if (state.people.length === 0 && state.items.length === 0) { toast('NOTHING TO SAVE'); return; }
    const calc = calculate();
    const entry = {
      ts: Date.now(),
      name: state.billName || 'Untitled bill',
      people: state.people,
      items: state.items,
      taxRate: state.taxRate,
      feePerPerson: state.feePerPerson,
      tipMode: state.tipMode,
      tipCustom: state.tipCustom,
      total: calc.grandTotal
    };
    const h = getHistory();
    h.push(entry);
    if (h.length > 50) h.shift();
    saveHistory(h);
    toast('SAVED');
  });

  // Quick split
  ['qs-subtotal','qs-people','qs-tax','qs-tip'].forEach(id => {
    $(id).addEventListener('input', renderQuickSplit);
  });

  // Share
  let currentFormat = 'text';
  function updateShare() {
    $('share-output').value = buildShareText(currentFormat);
  }
  $('share-text-btn').addEventListener('click', () => { currentFormat = 'text'; updateShare(); });
  $('share-md-btn').addEventListener('click', () => { currentFormat = 'md'; updateShare(); });
  $('share-sms-btn').addEventListener('click', () => { currentFormat = 'sms'; updateShare(); });
  $('copy-share-btn').addEventListener('click', async () => {
    updateShare();
    const text = $('share-output').value;
    try {
      await navigator.clipboard.writeText(text);
      toast('COPIED');
    } catch(e) {
      $('share-output').select();
      document.execCommand('copy');
      toast('COPIED');
    }
  });

  // Clear history
  $('clear-history-btn').addEventListener('click', () => {
    if (!confirm('Clear ALL saved bill history?')) return;
    saveHistory([]);
    renderHistory();
    toast('HISTORY CLEARED');
  });

  // Initial render
  renderAll();
  renderQuickSplit();
  // auto-update share when summary opens
  const origSwitch = switchTab;
});

// live share recompute on any state change: re-render summary when summary tab visible
const _origSave = saveState;
saveState = function() {
  _origSave();
  if ($('tab-summary').style.display !== 'none') {
    renderSummary();
    if ($('share-output').value) {
      // keep current format
      $('share-output').value = buildShareText(
        $('share-output').value.startsWith('## ') ? 'md' :
        $('share-output').value.includes(' — total ') ? 'sms' : 'text'
      );
    }
  }
};
</script>
