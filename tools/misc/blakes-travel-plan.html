<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>Blake's Travel Plan — Korb Engineering</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500;600;700&family=IBM+Plex+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#050a0f; --bg2:#0a1420; --bg3:#0e1a2a; --panel:#0c1726;
  --cyan:#00d4ff; --orange:#ff9900; --green:#10b981; --red:#ef4444;
  --purple:#a855f7; --yellow:#facc15; --gray:#64748b;
  --text:#e2e8f0; --muted:#94a3b8; --dim:#64748b;
  --border:#1e293b; --border2:#2a3a50;
  --flight:#38bdf8; --hotel:#a855f7; --meal:#ff9900; --activity:#10b981;
  --transport:#94a3b8; --meeting:#ef4444;
  --mono:'IBM Plex Mono',ui-monospace,'SF Mono',Menlo,monospace;
  --sans:'IBM Plex Sans',-apple-system,BlinkMacSystemFont,system-ui,sans-serif;
}
*{box-sizing:border-box;margin:0;padding:0}
html,body{background:var(--bg);color:var(--text);font-family:var(--mono);min-height:100vh;overflow-x:hidden}
body{padding:env(safe-area-inset-top) env(safe-area-inset-right) env(safe-area-inset-bottom) env(safe-area-inset-left);font-size:15px;line-height:1.5}
a{color:var(--cyan);text-decoration:none}
a:hover{text-decoration:underline}
button{font-family:inherit;font-size:inherit;cursor:pointer;border:none;background:none;color:inherit}
input,textarea,select{font-family:inherit;font-size:16px;color:var(--text);background:var(--bg2);border:1px solid var(--border);padding:10px 12px;border-radius:6px;width:100%;outline:none;transition:border-color .15s}
input:focus,textarea:focus,select:focus{border-color:var(--cyan)}
textarea{resize:vertical;min-height:60px;font-family:var(--mono);line-height:1.5}
::selection{background:rgba(0,212,255,.3);color:#fff}
::placeholder{color:var(--dim)}

/* layout */
.topbar{position:sticky;top:0;z-index:50;background:rgba(5,10,15,.92);backdrop-filter:blur(12px);border-bottom:1px solid var(--border);padding:12px 16px;display:flex;align-items:center;gap:12px;flex-wrap:wrap}
.brand{display:flex;align-items:center;gap:10px;font-weight:700;letter-spacing:.05em}
.brand .dot{width:10px;height:10px;border-radius:50%;background:var(--cyan);box-shadow:0 0 8px var(--cyan);animation:pulse 2s infinite}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.4}}
.back{font-size:12px;color:var(--muted);padding:8px 10px;border:1px solid var(--border);border-radius:6px;min-height:36px;display:inline-flex;align-items:center}
.back:hover{color:var(--cyan);border-color:var(--cyan);text-decoration:none}
.title{font-size:16px;font-weight:700;color:var(--cyan);letter-spacing:.08em;text-transform:uppercase}
.subtitle{font-size:11px;color:var(--muted);letter-spacing:.1em}
.spacer{flex:1}

.container{max-width:1400px;margin:0 auto;padding:16px;display:grid;grid-template-columns:1fr;gap:16px}
@media(min-width:1024px){.container{grid-template-columns:260px 1fr 300px;padding:24px}}

/* sidebar / picker */
.side{display:flex;flex-direction:column;gap:12px}
.panel{background:var(--panel);border:1px solid var(--border);border-radius:10px;padding:16px}
.panel h3{font-size:11px;color:var(--cyan);letter-spacing:.15em;text-transform:uppercase;margin-bottom:12px;display:flex;align-items:center;gap:8px}
.panel h3 .line{flex:1;height:1px;background:var(--border)}
.trip-picker{display:flex;flex-direction:column;gap:6px;max-height:240px;overflow-y:auto}
.trip-item{display:flex;align-items:center;gap:8px;padding:8px 10px;border:1px solid var(--border);border-radius:6px;background:var(--bg2);cursor:pointer;font-size:12px;transition:all .15s;min-height:44px}
.trip-item:hover{border-color:var(--cyan)}
.trip-item.active{border-color:var(--cyan);background:rgba(0,212,255,.08);box-shadow:0 0 0 1px var(--cyan) inset}
.trip-item .name{flex:1;font-weight:600;color:var(--text);overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.trip-item .dates{font-size:10px;color:var(--muted)}
.trip-item .del{opacity:0;color:var(--red);padding:4px;font-size:14px;transition:opacity .15s}
.trip-item:hover .del{opacity:1}

.btn{display:inline-flex;align-items:center;justify-content:center;gap:8px;padding:10px 14px;background:var(--bg2);border:1px solid var(--border);color:var(--text);border-radius:6px;font-size:12px;font-weight:600;letter-spacing:.08em;text-transform:uppercase;min-height:44px;transition:all .15s}
.btn:hover{border-color:var(--cyan);color:var(--cyan);background:rgba(0,212,255,.06)}
.btn.primary{background:linear-gradient(180deg,var(--cyan),#0098c8);color:#001820;border-color:var(--cyan);font-weight:700}
.btn.primary:hover{filter:brightness(1.15);color:#001820}
.btn.ghost{background:transparent}
.btn.warn{color:var(--red);border-color:rgba(239,68,68,.3)}
.btn.warn:hover{background:rgba(239,68,68,.1);border-color:var(--red);color:var(--red)}
.btn.full{width:100%}
.btn.sm{padding:6px 10px;font-size:10px;min-height:32px;letter-spacing:.05em}
.btn.big{padding:14px 20px;font-size:14px}

/* main */
.main{display:flex;flex-direction:column;gap:16px;min-width:0}
.hero{background:linear-gradient(135deg,#0a1a2a 0%,#071220 100%);border:1px solid var(--border2);border-radius:12px;padding:20px;position:relative;overflow:hidden}
.hero::before{content:"";position:absolute;inset:0;background:radial-gradient(circle at 100% 0%,rgba(0,212,255,.1) 0%,transparent 50%);pointer-events:none}
.hero-grid{display:grid;grid-template-columns:1fr;gap:12px}
@media(min-width:700px){.hero-grid{grid-template-columns:1fr 1fr}}
.hero-field label{display:block;font-size:10px;color:var(--muted);letter-spacing:.15em;text-transform:uppercase;margin-bottom:6px}
.hero input{background:rgba(255,255,255,.03);border-color:var(--border2);font-family:var(--mono)}
.hero-title input{font-size:22px;font-weight:700;letter-spacing:.02em;color:var(--cyan);padding:12px 14px}
.hero-row{display:flex;gap:10px;flex-wrap:wrap;margin-top:14px}

.stats{display:grid;grid-template-columns:repeat(4,1fr);gap:8px;margin-top:14px;padding-top:14px;border-top:1px solid var(--border)}
@media(max-width:600px){.stats{grid-template-columns:repeat(2,1fr)}}
.stat{text-align:center;padding:8px}
.stat .n{font-size:22px;font-weight:700;color:var(--cyan);font-family:var(--mono)}
.stat .l{font-size:9px;color:var(--muted);letter-spacing:.15em;text-transform:uppercase;margin-top:2px}

/* days */
.day{background:var(--panel);border:1px solid var(--border);border-radius:12px;overflow:hidden;transition:border-color .15s}
.day.collapsed .day-body{display:none}
.day-head{display:flex;align-items:center;gap:12px;padding:14px 16px;cursor:pointer;background:var(--bg3);border-bottom:1px solid var(--border);user-select:none}
.day.collapsed .day-head{border-bottom:none}
.day-num{width:36px;height:36px;display:flex;align-items:center;justify-content:center;background:rgba(0,212,255,.1);border:1px solid var(--cyan);border-radius:8px;font-weight:700;color:var(--cyan);font-size:14px;flex-shrink:0}
.day-info{flex:1;min-width:0}
.day-title{font-weight:600;font-size:14px;color:var(--text);overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.day-sub{font-size:11px;color:var(--muted);margin-top:2px;font-family:var(--mono)}
.day-actions{display:flex;gap:6px;align-items:center}
.caret{transition:transform .2s;color:var(--muted);font-size:18px}
.day.collapsed .caret{transform:rotate(-90deg)}
.day-body{padding:16px}

.day-meta{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:14px}
@media(max-width:600px){.day-meta{grid-template-columns:1fr}}
.day-meta label{display:block;font-size:10px;color:var(--muted);letter-spacing:.12em;text-transform:uppercase;margin-bottom:4px}

.events{display:flex;flex-direction:column;gap:10px}
.event{background:var(--bg2);border:1px solid var(--border);border-left:3px solid var(--gray);border-radius:8px;overflow:hidden;transition:all .15s}
.event[draggable="true"]{cursor:grab}
.event.dragging{opacity:.4}
.event.drop-target{border-top:2px dashed var(--cyan)}
.event-head{display:flex;align-items:center;gap:10px;padding:10px 12px;background:rgba(255,255,255,.02)}
.event-type{display:inline-flex;align-items:center;gap:4px;padding:3px 8px;border-radius:12px;font-size:10px;font-weight:700;letter-spacing:.08em;text-transform:uppercase}
.type-flight{background:rgba(56,189,248,.15);color:var(--flight);border:1px solid rgba(56,189,248,.4)}
.type-hotel{background:rgba(168,85,247,.15);color:var(--hotel);border:1px solid rgba(168,85,247,.4)}
.type-meal{background:rgba(255,153,0,.15);color:var(--meal);border:1px solid rgba(255,153,0,.4)}
.type-activity{background:rgba(16,185,129,.15);color:var(--activity);border:1px solid rgba(16,185,129,.4)}
.type-transport{background:rgba(148,163,184,.15);color:var(--transport);border:1px solid rgba(148,163,184,.4)}
.type-meeting{background:rgba(239,68,68,.15);color:var(--meeting);border:1px solid rgba(239,68,68,.4)}

.event.event-flight{border-left-color:var(--flight)}
.event.event-hotel{border-left-color:var(--hotel)}
.event.event-meal{border-left-color:var(--meal)}
.event.event-activity{border-left-color:var(--activity)}
.event.event-transport{border-left-color:var(--transport)}
.event.event-meeting{border-left-color:var(--meeting)}

.event-time{font-size:13px;font-weight:700;color:var(--cyan);font-family:var(--mono);min-width:54px}
.event-title-h{flex:1;min-width:0;font-weight:600;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.grip{color:var(--dim);font-size:16px;cursor:grab;padding:0 4px;user-select:none}
.grip:active{cursor:grabbing}
.event-close{color:var(--muted);padding:4px 6px;font-size:14px;border-radius:4px}
.event-close:hover{color:var(--red);background:rgba(239,68,68,.1)}
.event-body{padding:12px;display:grid;grid-template-columns:1fr 1fr;gap:10px}
@media(max-width:600px){.event-body{grid-template-columns:1fr}}
.event-field label{display:block;font-size:9px;color:var(--muted);letter-spacing:.12em;text-transform:uppercase;margin-bottom:4px}
.event-field.full{grid-column:1/-1}
.event-field input,.event-field textarea,.event-field select{font-size:14px;padding:8px 10px}

.travel-badge{font-size:10px;color:var(--orange);background:rgba(255,153,0,.08);border:1px dashed rgba(255,153,0,.3);border-radius:4px;padding:4px 8px;margin:4px 0 4px 52px;display:inline-block;letter-spacing:.05em;font-family:var(--mono)}

.quick-bar{display:flex;gap:6px;flex-wrap:wrap;margin-top:12px;padding-top:12px;border-top:1px dashed var(--border)}

/* side panels */
.side-right{display:flex;flex-direction:column;gap:12px}
.tab-head{display:flex;gap:4px;margin-bottom:10px;border-bottom:1px solid var(--border)}
.tab{padding:8px 10px;font-size:10px;color:var(--muted);letter-spacing:.1em;text-transform:uppercase;border-bottom:2px solid transparent;cursor:pointer;min-height:36px;display:flex;align-items:center}
.tab.active{color:var(--cyan);border-bottom-color:var(--cyan)}
.tab:hover{color:var(--text)}
.tab-pane{display:none;max-height:480px;overflow-y:auto}
.tab-pane.active{display:block}

.contact-row,.doc-row,.pack-row{display:flex;align-items:center;gap:8px;padding:8px;background:var(--bg2);border:1px solid var(--border);border-radius:6px;margin-bottom:6px}
.contact-row input,.doc-row input,.pack-row input{background:transparent;border:none;padding:2px 4px;font-size:12px;flex:1}
.contact-row input:focus,.doc-row input:focus,.pack-row input:focus{border-color:transparent;box-shadow:0 0 0 1px var(--cyan)}
.rm{color:var(--muted);padding:4px;font-size:13px;border-radius:4px;flex-shrink:0}
.rm:hover{color:var(--red);background:rgba(239,68,68,.1)}

.pack-category{margin-bottom:16px}
.pack-category-head{display:flex;align-items:center;gap:8px;font-size:11px;color:var(--orange);letter-spacing:.1em;text-transform:uppercase;margin-bottom:6px;font-weight:700}
.pack-item{display:flex;align-items:center;gap:8px;padding:6px 8px;cursor:pointer;border-radius:4px;transition:background .15s;min-height:36px}
.pack-item:hover{background:rgba(255,255,255,.03)}
.pack-item.done{opacity:.5;text-decoration:line-through}
.pack-item input[type="checkbox"]{width:18px;height:18px;accent-color:var(--cyan);cursor:pointer;margin:0;flex-shrink:0}
.pack-item .txt{flex:1;background:transparent;border:none;font-size:13px;padding:0}
.pack-item .txt:focus{outline:1px solid var(--cyan);border-radius:3px}

/* budget */
.bud-row{display:grid;grid-template-columns:1fr 90px 90px 30px;gap:6px;align-items:center;margin-bottom:6px}
.bud-row input{padding:6px 8px;font-size:12px}
.bud-row .lbl{font-size:11px;color:var(--muted);font-weight:600;padding-left:4px}
.bud-row.head{font-size:9px;color:var(--dim);letter-spacing:.1em;text-transform:uppercase;margin-bottom:8px}
.bud-total{display:flex;justify-content:space-between;align-items:center;padding:10px;background:var(--bg3);border:1px solid var(--border);border-radius:6px;margin-top:10px;font-size:13px}
.bud-total .v{font-weight:700;color:var(--green);font-family:var(--mono)}
.bud-total.over .v{color:var(--red)}

/* scratchpad */
.scratch textarea{min-height:140px;background:var(--bg2)}

/* share + export toolbar */
.action-bar{position:sticky;bottom:16px;display:flex;gap:10px;justify-content:center;padding:10px;background:rgba(5,10,15,.9);backdrop-filter:blur(10px);border:1px solid var(--cyan);border-radius:10px;margin-top:16px;box-shadow:0 0 24px rgba(0,212,255,.15),0 8px 32px rgba(0,0,0,.5);z-index:10;flex-wrap:wrap}

.empty{text-align:center;color:var(--muted);padding:24px;font-size:12px;font-style:italic;border:1px dashed var(--border);border-radius:8px}

/* modal */
.modal-bg{position:fixed;inset:0;background:rgba(0,0,0,.75);backdrop-filter:blur(6px);display:none;align-items:center;justify-content:center;z-index:100;padding:16px}
.modal-bg.open{display:flex}
.modal{background:var(--panel);border:1px solid var(--cyan);border-radius:12px;max-width:600px;width:100%;max-height:90vh;overflow-y:auto;box-shadow:0 0 40px rgba(0,212,255,.2)}
.modal-head{padding:16px 20px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between}
.modal-head h2{font-size:14px;color:var(--cyan);letter-spacing:.1em;text-transform:uppercase}
.modal-body{padding:20px}
.modal-body label{display:block;font-size:11px;color:var(--muted);letter-spacing:.1em;text-transform:uppercase;margin:12px 0 6px}
.modal-body label:first-child{margin-top:0}
.modal-foot{padding:14px 20px;border-top:1px solid var(--border);display:flex;gap:10px;justify-content:flex-end}

/* toast */
.toast{position:fixed;top:80px;left:50%;transform:translateX(-50%) translateY(-20px);background:var(--panel);border:1px solid var(--cyan);color:var(--cyan);padding:12px 20px;border-radius:6px;font-size:12px;letter-spacing:.05em;z-index:200;opacity:0;transition:all .25s;pointer-events:none;font-weight:600;box-shadow:0 8px 24px rgba(0,0,0,.4)}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0)}
.toast.err{border-color:var(--red);color:var(--red)}
.toast.ok{border-color:var(--green);color:var(--green)}

/* scrollbar */
::-webkit-scrollbar{width:6px;height:6px}
::-webkit-scrollbar-track{background:var(--bg2)}
::-webkit-scrollbar-thumb{background:var(--border2);border-radius:3px}
::-webkit-scrollbar-thumb:hover{background:var(--gray)}

/* loading overlay for PDF */
.pdf-loading{position:fixed;inset:0;background:rgba(5,10,15,.9);backdrop-filter:blur(8px);display:none;align-items:center;justify-content:center;z-index:999;flex-direction:column;gap:16px}
.pdf-loading.on{display:flex}
.pdf-loading .spin{width:40px;height:40px;border:3px solid var(--border);border-top-color:var(--cyan);border-radius:50%;animation:spin .8s linear infinite}
.pdf-loading .lbl{color:var(--cyan);letter-spacing:.2em;font-weight:700;font-size:12px}
@keyframes spin{to{transform:rotate(360deg)}}

/* nice responsive */
@media(max-width:1023px){
  .side-right{order:3}
  .side{order:2}
  .main{order:1}
}
</style>
</head>
<body>

<div class="topbar">
  <a href="../../index.html#misc" class="back">&larr; BACK</a>
  <span class="brand"><span class="dot"></span><span class="title">Blake's Travel Plan</span></span>
  <span class="subtitle">v1.0</span>
  <span class="spacer"></span>
  <button class="btn sm" onclick="newTrip()">+ NEW TRIP</button>
</div>

<div class="container">

  <!-- LEFT: Trip picker + saved trips -->
  <aside class="side">
    <div class="panel">
      <h3><span>Trips</span><span class="line"></span></h3>
      <div class="trip-picker" id="tripPicker"></div>
      <button class="btn full sm" style="margin-top:10px" onclick="newTrip()">+ Add New Trip</button>
    </div>

    <div class="panel">
      <h3><span>Contacts</span><span class="line"></span></h3>
      <div id="contactsList"></div>
      <button class="btn full sm" onclick="addContact()">+ Contact</button>
    </div>

    <div class="panel">
      <h3><span>Quick Stats</span><span class="line"></span></h3>
      <div id="quickStats" style="font-size:11px;color:var(--muted);line-height:1.9"></div>
    </div>
  </aside>

  <!-- MAIN -->
  <main class="main">

    <!-- Hero / trip info -->
    <div class="hero">
      <div class="hero-grid">
        <div class="hero-field hero-title" style="grid-column:1/-1">
          <label>Trip Title</label>
          <input type="text" id="tripTitle" placeholder="Summer '26 — Italy Adventure" oninput="updateTrip()">
        </div>
        <div class="hero-field">
          <label>Destination(s)</label>
          <input type="text" id="tripDest" placeholder="Rome, Florence, Venice" oninput="updateTrip()">
        </div>
        <div class="hero-field">
          <label>Travelers</label>
          <input type="text" id="tripTravelers" placeholder="Blake, Alex, Riley" oninput="updateTrip()">
        </div>
        <div class="hero-field">
          <label>Start Date</label>
          <input type="date" id="tripStart" oninput="rebuildDays();updateTrip()">
        </div>
        <div class="hero-field">
          <label>End Date</label>
          <input type="date" id="tripEnd" oninput="rebuildDays();updateTrip()">
        </div>
        <div class="hero-field">
          <label>Budget (optional)</label>
          <input type="number" id="tripBudget" placeholder="$3000" oninput="updateTrip();renderBudget()">
        </div>
        <div class="hero-field">
          <label>Home Base / Notes</label>
          <input type="text" id="tripHome" placeholder="Departing from DFW" oninput="updateTrip()">
        </div>
      </div>
      <div class="stats" id="statsBar"></div>
    </div>

    <!-- Days container -->
    <div id="daysContainer"></div>

    <!-- Scratchpad -->
    <div class="panel scratch">
      <h3><span>Notes Scratchpad</span><span class="line"></span></h3>
      <textarea id="scratch" placeholder="Restaurant reservations to make, things to research, reminders..." oninput="updateTrip()"></textarea>
    </div>

    <!-- Action bar -->
    <div class="action-bar">
      <button class="btn primary big" onclick="exportPDF()">EXPORT PDF</button>
      <button class="btn big" onclick="sharePDF()">SHARE</button>
      <button class="btn big" onclick="downloadJSON()">EXPORT JSON</button>
    </div>
  </main>

  <!-- RIGHT: tabs for packing / documents / budget -->
  <aside class="side-right">
    <div class="panel">
      <div class="tab-head">
        <div class="tab active" data-tab="pack">Packing</div>
        <div class="tab" data-tab="docs">Docs</div>
        <div class="tab" data-tab="budget">Budget</div>
      </div>

      <div class="tab-pane active" id="tab-pack">
        <div id="packList"></div>
        <button class="btn full sm" style="margin-top:8px" onclick="addPackItem()">+ Item</button>
        <button class="btn full sm ghost" style="margin-top:6px" onclick="resetPacking()">Reset Categories</button>
      </div>

      <div class="tab-pane" id="tab-docs">
        <div id="docsList"></div>
        <button class="btn full sm" onclick="addDoc()">+ Document</button>
      </div>

      <div class="tab-pane" id="tab-budget">
        <div class="bud-row head"><span>Category</span><span style="text-align:right">Est.</span><span style="text-align:right">Actual</span><span></span></div>
        <div id="budgetList"></div>
        <button class="btn full sm" onclick="addBudget()">+ Line</button>
        <div id="budgetTotals"></div>
      </div>
    </div>
  </aside>
</div>

<!-- Paste Flight Modal -->
<div class="modal-bg" id="flightModal">
  <div class="modal">
    <div class="modal-head">
      <h2>Paste Flight Details</h2>
      <button class="btn sm ghost" onclick="closeModal('flightModal')">&times;</button>
    </div>
    <div class="modal-body">
      <label>Paste airline confirmation text (we'll try to parse flight #, times, gate)</label>
      <textarea id="flightText" placeholder="e.g. DELTA AIR LINES Flight DL1234&#10;Departs: DFW 08:45 AM — Arrives: LAX 10:15 AM&#10;Gate D22 — Confirmation ABCD12" style="min-height:160px"></textarea>
      <label>Day</label>
      <select id="flightDay"></select>
    </div>
    <div class="modal-foot">
      <button class="btn ghost" onclick="closeModal('flightModal')">Cancel</button>
      <button class="btn primary" onclick="parseFlightText()">Parse & Add</button>
    </div>
  </div>
</div>

<script>
'use strict';

// =====================================================
// STATE
// =====================================================
const DEFAULT_PACK = {
  Clothing: ['Underwear','Socks','T-shirts','Pants / shorts','Light jacket','Sleepwear','Swimsuit','Comfortable shoes'],
  Toiletries: ['Toothbrush','Toothpaste','Deodorant','Shampoo','Soap / body wash','Sunscreen','Razor','Hair brush'],
  Electronics: ['Phone + charger','Laptop + charger','Headphones','Power bank','Adapter plug','Camera'],
  Documents: ['Passport','ID / driver license','Credit cards','Travel insurance','Printed itinerary'],
  Medications: ['Prescriptions','Pain reliever','Band-aids','Allergy meds']
};

const DEFAULT_BUDGET = [
  {cat:'Flights',est:0,act:0},
  {cat:'Lodging',est:0,act:0},
  {cat:'Food',est:0,act:0},
  {cat:'Transport',est:0,act:0},
  {cat:'Activities',est:0,act:0},
  {cat:'Misc',est:0,act:0}
];

const EVENT_TYPES = [
  {v:'flight',l:'Flight',c:'#38bdf8',def:60,travel:30},
  {v:'hotel',l:'Hotel',c:'#a855f7',def:0,travel:20},
  {v:'meal',l:'Meal',c:'#ff9900',def:75,travel:10},
  {v:'activity',l:'Activity',c:'#10b981',def:90,travel:15},
  {v:'transport',l:'Transport',c:'#94a3b8',def:30,travel:5},
  {v:'meeting',l:'Meeting',c:'#ef4444',def:60,travel:10}
];

const INDEX_KEY = 'korb_travel_index';
const TRIP_KEY = s => `korb_travel_${s}`;

let trip = null; // current trip object
let tripIndex = []; // list of {slug,title,start,end}
let dragState = null;

// =====================================================
// INIT
// =====================================================
function boot(){
  loadIndex();
  const urlSlug = new URLSearchParams(location.search).get('t');
  if (urlSlug && tripIndex.find(t=>t.slug===urlSlug)){
    loadTrip(urlSlug);
  } else if (tripIndex.length){
    loadTrip(tripIndex[0].slug);
  } else {
    newTrip();
  }
  renderPicker();
  bindTabs();
}

function bindTabs(){
  document.querySelectorAll('.tab').forEach(t=>{
    t.onclick = ()=>{
      document.querySelectorAll('.tab').forEach(x=>x.classList.remove('active'));
      document.querySelectorAll('.tab-pane').forEach(x=>x.classList.remove('active'));
      t.classList.add('active');
      document.getElementById('tab-'+t.dataset.tab).classList.add('active');
    };
  });
}

// =====================================================
// INDEX + TRIPS
// =====================================================
function loadIndex(){
  try { tripIndex = JSON.parse(localStorage.getItem(INDEX_KEY) || '[]'); }
  catch(e){ tripIndex = []; }
}
function saveIndex(){
  localStorage.setItem(INDEX_KEY, JSON.stringify(tripIndex));
}
function slugify(s){
  return (s||'trip').toLowerCase().replace(/[^a-z0-9]+/g,'-').replace(/^-+|-+$/g,'').slice(0,40) || 'trip';
}

function newTrip(){
  const slug = 'trip-' + Date.now().toString(36);
  trip = {
    slug,
    title: '',
    destination: '',
    travelers: '',
    start: '',
    end: '',
    budget: '',
    home: '',
    days: [],
    contacts: [],
    docs: [],
    packing: JSON.parse(JSON.stringify(DEFAULT_PACK)),
    packingChecked: {},
    budgetLines: JSON.parse(JSON.stringify(DEFAULT_BUDGET)),
    scratch: '',
    created: new Date().toISOString()
  };
  tripIndex.unshift({slug,title:'Untitled Trip',start:'',end:''});
  saveIndex();
  saveTrip();
  renderAll();
  renderPicker();
  toast('New trip created','ok');
}

function loadTrip(slug){
  try {
    const raw = localStorage.getItem(TRIP_KEY(slug));
    if (!raw){ newTrip(); return; }
    trip = JSON.parse(raw);
    // back-compat for missing fields
    if (!trip.packing) trip.packing = JSON.parse(JSON.stringify(DEFAULT_PACK));
    if (!trip.packingChecked) trip.packingChecked = {};
    if (!trip.budgetLines) trip.budgetLines = JSON.parse(JSON.stringify(DEFAULT_BUDGET));
    if (!trip.contacts) trip.contacts = [];
    if (!trip.docs) trip.docs = [];
    if (!trip.days) trip.days = [];
    renderAll();
  } catch(e){ console.error(e); newTrip(); }
}

function saveTrip(){
  if (!trip) return;
  localStorage.setItem(TRIP_KEY(trip.slug), JSON.stringify(trip));
  // update index entry
  const idx = tripIndex.findIndex(t=>t.slug===trip.slug);
  const row = {slug:trip.slug, title:trip.title||'Untitled Trip', start:trip.start||'', end:trip.end||''};
  if (idx>=0) tripIndex[idx] = row;
  else tripIndex.unshift(row);
  saveIndex();
}

function deleteTrip(slug){
  if (!confirm('Delete this trip? This cannot be undone.')) return;
  localStorage.removeItem(TRIP_KEY(slug));
  tripIndex = tripIndex.filter(t=>t.slug!==slug);
  saveIndex();
  if (trip && trip.slug===slug){
    if (tripIndex.length) loadTrip(tripIndex[0].slug);
    else newTrip();
  }
  renderPicker();
  toast('Trip deleted','ok');
}

function updateTrip(){
  if (!trip) return;
  trip.title = document.getElementById('tripTitle').value;
  trip.destination = document.getElementById('tripDest').value;
  trip.travelers = document.getElementById('tripTravelers').value;
  trip.start = document.getElementById('tripStart').value;
  trip.end = document.getElementById('tripEnd').value;
  trip.budget = document.getElementById('tripBudget').value;
  trip.home = document.getElementById('tripHome').value;
  const s = document.getElementById('scratch');
  if (s) trip.scratch = s.value;
  saveTrip();
  renderPicker();
  renderStats();
}

// =====================================================
// RENDER
// =====================================================
function renderAll(){
  if (!trip) return;
  document.getElementById('tripTitle').value = trip.title || '';
  document.getElementById('tripDest').value = trip.destination || '';
  document.getElementById('tripTravelers').value = trip.travelers || '';
  document.getElementById('tripStart').value = trip.start || '';
  document.getElementById('tripEnd').value = trip.end || '';
  document.getElementById('tripBudget').value = trip.budget || '';
  document.getElementById('tripHome').value = trip.home || '';
  document.getElementById('scratch').value = trip.scratch || '';
  renderDays();
  renderContacts();
  renderDocs();
  renderPacking();
  renderBudget();
  renderStats();
  renderPicker();
}

function renderPicker(){
  const p = document.getElementById('tripPicker');
  p.innerHTML = '';
  if (!tripIndex.length){
    p.innerHTML = '<div class="empty" style="padding:12px;font-size:10px">No trips yet</div>';
    return;
  }
  tripIndex.forEach(t=>{
    const div = document.createElement('div');
    div.className = 'trip-item' + (trip && trip.slug===t.slug ? ' active':'');
    const dates = t.start && t.end ? `${fmtShort(t.start)}–${fmtShort(t.end)}` : (t.start ? fmtShort(t.start) : 'No dates');
    div.innerHTML = `
      <div style="flex:1;min-width:0">
        <div class="name">${esc(t.title||'Untitled')}</div>
        <div class="dates">${dates}</div>
      </div>
      <button class="del" title="Delete">&times;</button>
    `;
    div.onclick = (e)=>{
      if (e.target.classList.contains('del')){
        e.stopPropagation();
        deleteTrip(t.slug);
      } else {
        loadTrip(t.slug);
      }
    };
    p.appendChild(div);
  });
}

function renderStats(){
  const s = document.getElementById('statsBar');
  const numDays = trip.days.length;
  const numEvents = trip.days.reduce((a,d)=>a+(d.events?d.events.length:0),0);
  const numContacts = trip.contacts.length;
  const travelers = trip.travelers ? trip.travelers.split(',').filter(x=>x.trim()).length : 0;
  s.innerHTML = `
    <div class="stat"><div class="n">${numDays}</div><div class="l">Days</div></div>
    <div class="stat"><div class="n">${numEvents}</div><div class="l">Events</div></div>
    <div class="stat"><div class="n">${travelers}</div><div class="l">Travelers</div></div>
    <div class="stat"><div class="n">${numContacts}</div><div class="l">Contacts</div></div>
  `;
  // quick stats panel
  const qs = document.getElementById('quickStats');
  if (qs){
    const budget = parseFloat(trip.budget)||0;
    const actual = trip.budgetLines.reduce((a,b)=>a+(parseFloat(b.act)||0),0);
    const est = trip.budgetLines.reduce((a,b)=>a+(parseFloat(b.est)||0),0);
    qs.innerHTML = `
      <div>Days planned: <strong style="color:var(--cyan)">${numDays}</strong></div>
      <div>Events: <strong style="color:var(--cyan)">${numEvents}</strong></div>
      <div>Travelers: <strong style="color:var(--cyan)">${travelers}</strong></div>
      ${budget?`<div>Budget: <strong style="color:var(--green)">$${budget.toLocaleString()}</strong></div>`:''}
      ${est?`<div>Estimated: <strong style="color:var(--orange)">$${est.toLocaleString()}</strong></div>`:''}
      ${actual?`<div>Actual: <strong style="color:${actual>budget&&budget?'var(--red)':'var(--green)'}">$${actual.toLocaleString()}</strong></div>`:''}
    `;
  }
}

// ---- Days ----
function rebuildDays(){
  if (!trip) return;
  if (!trip.start || !trip.end){
    // if only one set, ensure at least a container
    saveTrip(); renderDays(); return;
  }
  const s = new Date(trip.start + 'T00:00');
  const e = new Date(trip.end + 'T00:00');
  if (isNaN(s) || isNaN(e) || e < s){
    saveTrip(); renderDays(); return;
  }
  const out = [];
  const cur = new Date(s);
  while (cur <= e){
    const iso = cur.toISOString().slice(0,10);
    const existing = trip.days.find(d=>d.date===iso);
    if (existing){
      out.push(existing);
    } else {
      out.push({date:iso, title:'', location:'', events:[], collapsed:false});
    }
    cur.setDate(cur.getDate()+1);
  }
  trip.days = out;
  saveTrip();
  renderDays();
}

function renderDays(){
  const c = document.getElementById('daysContainer');
  c.innerHTML = '';
  if (!trip.days.length){
    c.innerHTML = '<div class="empty">Set your trip dates above to generate daily sections.</div>';
    return;
  }
  trip.days.forEach((d,i)=>{
    c.appendChild(dayElement(d,i));
  });
  renderFlightDaySelect();
}

function dayElement(d, idx){
  const div = document.createElement('div');
  div.className = 'day' + (d.collapsed?' collapsed':'');
  const dateLabel = d.date ? fmtLong(d.date) : `Day ${idx+1}`;
  const evCount = d.events.length;
  const header = document.createElement('div');
  header.className = 'day-head';
  header.innerHTML = `
    <div class="day-num">${idx+1}</div>
    <div class="day-info">
      <div class="day-title">${esc(d.title || dateLabel)}</div>
      <div class="day-sub">${d.date?fmtLong(d.date):''} ${d.location?' • '+esc(d.location):''} • ${evCount} ${evCount===1?'event':'events'}</div>
    </div>
    <span class="caret">▾</span>
  `;
  header.onclick = ()=>{
    d.collapsed = !d.collapsed;
    saveTrip();
    div.classList.toggle('collapsed', d.collapsed);
    const caret = header.querySelector('.caret');
  };

  const body = document.createElement('div');
  body.className = 'day-body';

  // day meta
  const meta = document.createElement('div');
  meta.className = 'day-meta';
  meta.innerHTML = `
    <div>
      <label>Day Title (optional)</label>
      <input type="text" placeholder="Arrival in Rome" value="${esc(d.title||'')}" data-field="title">
    </div>
    <div>
      <label>Primary Location</label>
      <input type="text" placeholder="Rome, Italy" value="${esc(d.location||'')}" data-field="location">
    </div>
  `;
  meta.querySelectorAll('input').forEach(inp=>{
    inp.oninput = ()=>{ d[inp.dataset.field] = inp.value; saveTrip(); renderPicker(); };
  });
  body.appendChild(meta);

  // events
  const eventsWrap = document.createElement('div');
  eventsWrap.className = 'events';
  eventsWrap.dataset.day = idx;
  d.events.forEach((ev, ei)=>{
    eventsWrap.appendChild(eventElement(ev, idx, ei));
    // travel badge between events
    if (ei < d.events.length-1){
      const next = d.events[ei+1];
      if (ev.address && next.address){
        const mins = estTravelMin(ev, next);
        if (mins>0){
          const badge = document.createElement('div');
          badge.className = 'travel-badge';
          badge.textContent = `≈ ${mins} min travel →`;
          eventsWrap.appendChild(badge);
        }
      }
    }
  });

  if (!d.events.length){
    const empty = document.createElement('div');
    empty.className = 'empty';
    empty.textContent = 'No events yet — add one below.';
    eventsWrap.appendChild(empty);
  }
  body.appendChild(eventsWrap);

  // quick add bar
  const qbar = document.createElement('div');
  qbar.className = 'quick-bar';
  EVENT_TYPES.forEach(t=>{
    const b = document.createElement('button');
    b.className = 'btn sm';
    b.innerHTML = `+ ${t.l}`;
    b.style.borderColor = t.c + '55';
    b.style.color = t.c;
    b.onclick = (e)=>{ e.stopPropagation(); addEvent(idx, t.v); };
    qbar.appendChild(b);
  });
  const flBtn = document.createElement('button');
  flBtn.className = 'btn sm';
  flBtn.textContent = 'Paste Flight';
  flBtn.onclick = (e)=>{ e.stopPropagation(); openFlightModal(idx); };
  qbar.appendChild(flBtn);

  body.appendChild(qbar);

  div.appendChild(header);
  div.appendChild(body);
  return div;
}

function addEvent(dayIdx, type){
  const d = trip.days[dayIdx];
  if (!d) return;
  const meta = EVENT_TYPES.find(t=>t.v===type) || EVENT_TYPES[0];
  const last = d.events[d.events.length-1];
  // default time: 1 hour after last event end, or 09:00
  let defTime = '09:00';
  if (last && last.time){
    const [h,m] = last.time.split(':').map(Number);
    const dur = parseInt(last.duration)||0;
    const total = h*60+m+dur;
    const nh = Math.min(23, Math.floor(total/60));
    const nm = total%60;
    defTime = `${String(nh).padStart(2,'0')}:${String(nm).padStart(2,'0')}`;
  }
  d.events.push({
    id: 'ev_'+Date.now().toString(36)+Math.random().toString(36).slice(2,5),
    type, time: defTime, duration: String(meta.def),
    title: '', location: '', address: '', conf: '', notes: ''
  });
  saveTrip();
  d.collapsed = false;
  renderDays();
  renderStats();
}

function eventElement(ev, dayIdx, evIdx){
  const meta = EVENT_TYPES.find(t=>t.v===ev.type) || EVENT_TYPES[4];
  const div = document.createElement('div');
  div.className = 'event event-'+ev.type;
  div.draggable = true;
  div.dataset.dayIdx = dayIdx;
  div.dataset.evIdx = evIdx;

  const head = document.createElement('div');
  head.className = 'event-head';
  head.innerHTML = `
    <span class="grip" title="Drag to reorder">⋮⋮</span>
    <span class="event-time">${esc(ev.time||'--:--')}</span>
    <span class="event-type type-${ev.type}">${meta.l}</span>
    <span class="event-title-h">${esc(ev.title||'(untitled)')}</span>
    <button class="event-close" title="Remove">&times;</button>
  `;
  head.querySelector('.event-close').onclick = (e)=>{
    e.stopPropagation();
    if (confirm('Delete this event?')){
      trip.days[dayIdx].events.splice(evIdx,1);
      saveTrip(); renderDays(); renderStats();
    }
  };

  const body = document.createElement('div');
  body.className = 'event-body';
  const typeOptions = EVENT_TYPES.map(t=>`<option value="${t.v}" ${t.v===ev.type?'selected':''}>${t.l}</option>`).join('');
  body.innerHTML = `
    <div class="event-field">
      <label>Type</label>
      <select data-field="type">${typeOptions}</select>
    </div>
    <div class="event-field">
      <label>Time</label>
      <input type="time" data-field="time" value="${esc(ev.time||'')}">
    </div>
    <div class="event-field">
      <label>Duration (min)</label>
      <input type="number" data-field="duration" placeholder="60" value="${esc(ev.duration||'')}">
    </div>
    <div class="event-field">
      <label>Title</label>
      <input type="text" data-field="title" placeholder="Flight DL1234" value="${esc(ev.title||'')}">
    </div>
    <div class="event-field full">
      <label>Location / Venue</label>
      <input type="text" data-field="location" placeholder="Terminal D, Gate 22" value="${esc(ev.location||'')}">
    </div>
    <div class="event-field full">
      <label>Address</label>
      <input type="text" data-field="address" placeholder="2400 Aviation Dr, Dallas TX" value="${esc(ev.address||'')}">
    </div>
    <div class="event-field">
      <label>Confirmation #</label>
      <input type="text" data-field="conf" placeholder="ABC123" value="${esc(ev.conf||'')}">
    </div>
    <div class="event-field">
      <label>Phone</label>
      <input type="text" data-field="phone" placeholder="+1 555-123-4567" value="${esc(ev.phone||'')}">
    </div>
    <div class="event-field full">
      <label>Notes</label>
      <textarea data-field="notes" placeholder="Any notes...">${esc(ev.notes||'')}</textarea>
    </div>
  `;
  body.querySelectorAll('[data-field]').forEach(inp=>{
    inp.oninput = ()=>{
      ev[inp.dataset.field] = inp.value;
      saveTrip();
      // update head labels
      head.querySelector('.event-time').textContent = ev.time||'--:--';
      head.querySelector('.event-title-h').textContent = ev.title||'(untitled)';
      if (inp.dataset.field==='type'){
        const m2 = EVENT_TYPES.find(t=>t.v===ev.type) || EVENT_TYPES[4];
        div.className = 'event event-'+ev.type;
        head.querySelector('.event-type').className = 'event-type type-'+ev.type;
        head.querySelector('.event-type').textContent = m2.l;
      }
    };
  });

  // drag
  div.addEventListener('dragstart', e=>{
    dragState = {dayIdx, evIdx};
    div.classList.add('dragging');
    e.dataTransfer.effectAllowed = 'move';
    try{e.dataTransfer.setData('text/plain','ev');}catch(err){}
  });
  div.addEventListener('dragend', ()=>{
    div.classList.remove('dragging');
    document.querySelectorAll('.event').forEach(x=>x.classList.remove('drop-target'));
    dragState = null;
  });
  div.addEventListener('dragover', e=>{
    if (!dragState) return;
    if (dragState.dayIdx !== dayIdx) return;
    e.preventDefault();
    div.classList.add('drop-target');
  });
  div.addEventListener('dragleave', ()=>div.classList.remove('drop-target'));
  div.addEventListener('drop', e=>{
    if (!dragState) return;
    e.preventDefault();
    div.classList.remove('drop-target');
    if (dragState.dayIdx !== dayIdx) return;
    const from = dragState.evIdx;
    const to = evIdx;
    if (from === to) return;
    const arr = trip.days[dayIdx].events;
    const [it] = arr.splice(from,1);
    arr.splice(to, 0, it);
    saveTrip();
    renderDays();
  });

  div.appendChild(head);
  div.appendChild(body);
  return div;
}

function estTravelMin(a, b){
  // simple estimate based on category defaults + tiny random stable
  const tb = EVENT_TYPES.find(t=>t.v===b.type);
  const ta = EVENT_TYPES.find(t=>t.v===a.type);
  const base = Math.max(ta?ta.travel:10, tb?tb.travel:10);
  // if addresses have different cities, add some
  const sameCity = extractCity(a.address) === extractCity(b.address);
  return sameCity ? base : base + 30;
}
function extractCity(addr){
  if (!addr) return '';
  const parts = addr.split(',').map(s=>s.trim());
  return parts.length>=2 ? parts[parts.length-2].toLowerCase() : addr.toLowerCase();
}

// ---- Flight parse modal ----
function openFlightModal(dayIdx){
  const sel = document.getElementById('flightDay');
  sel.innerHTML = trip.days.map((d,i)=>`<option value="${i}" ${i===dayIdx?'selected':''}>Day ${i+1} — ${d.date?fmtLong(d.date):''}</option>`).join('');
  document.getElementById('flightText').value = '';
  document.getElementById('flightModal').classList.add('open');
}
function closeModal(id){ document.getElementById(id).classList.remove('open'); }
function renderFlightDaySelect(){
  const sel = document.getElementById('flightDay');
  if (!sel) return;
  sel.innerHTML = trip.days.map((d,i)=>`<option value="${i}">Day ${i+1} — ${d.date?fmtLong(d.date):''}</option>`).join('');
}
function parseFlightText(){
  const txt = document.getElementById('flightText').value;
  if (!txt.trim()){ toast('Paste something first','err'); return; }
  const dayIdx = parseInt(document.getElementById('flightDay').value)||0;

  // airline / flight #
  const flightMatch = txt.match(/([A-Z]{2,3})\s*[-#]?\s*(\d{2,5})/);
  let airline = '';
  let flightNum = '';
  if (flightMatch){ airline = flightMatch[1]; flightNum = flightMatch[2]; }
  const airlineWords = txt.match(/(delta|american|united|southwest|jetblue|spirit|frontier|alaska|british airways|air france|lufthansa|emirates|qatar|klm)/i);
  if (airlineWords) airline = airlineWords[0].replace(/\b\w/g,c=>c.toUpperCase());

  // times (HH:MM or H:MMam/pm)
  const times = [...txt.matchAll(/(\d{1,2}):(\d{2})\s*([ap]\.?m\.?)?/gi)];
  let depTime = '', arrTime = '';
  if (times[0]) depTime = to24h(times[0]);
  if (times[1]) arrTime = to24h(times[1]);

  // airports (3-letter codes)
  const airports = [...txt.matchAll(/\b([A-Z]{3})\b/g)].map(m=>m[1]).filter(x=>x!==airline);
  const fromAP = airports[0] || '';
  const toAP = airports[1] || '';

  // gate
  const gateMatch = txt.match(/gate\s*([A-Z]?\d{1,3})/i);
  const gate = gateMatch ? gateMatch[1] : '';

  // confirmation
  const confMatch = txt.match(/(?:conf(?:irmation)?\.?|#|record\s*locator|booking\s*ref)[:\s#]*([A-Z0-9]{4,10})/i)
    || txt.match(/\b([A-Z0-9]{6})\b/);
  const conf = confMatch ? confMatch[1] : '';

  const title = airline ? `${airline} ${flightNum}`.trim() : (flightNum?`Flight ${flightNum}`:'Flight');
  const route = (fromAP && toAP) ? `${fromAP} → ${toAP}` : '';
  const loc = [route, gate?`Gate ${gate}`:''].filter(Boolean).join(' • ');

  const ev = {
    id: 'ev_'+Date.now().toString(36)+Math.random().toString(36).slice(2,5),
    type: 'flight',
    time: depTime || '09:00',
    duration: '',
    title: title,
    location: loc,
    address: '',
    conf: conf,
    phone: '',
    notes: arrTime ? `Arrives ${arrTime}` : ''
  };
  trip.days[dayIdx].events.push(ev);
  saveTrip();
  closeModal('flightModal');
  renderDays();
  renderStats();
  toast('Flight added','ok');
}

function to24h(m){
  let h = parseInt(m[1]), mm = parseInt(m[2]);
  const ampm = (m[3]||'').toLowerCase();
  if (ampm.startsWith('p') && h < 12) h += 12;
  if (ampm.startsWith('a') && h === 12) h = 0;
  return `${String(h).padStart(2,'0')}:${String(mm).padStart(2,'0')}`;
}

// ---- Packing ----
function renderPacking(){
  const c = document.getElementById('packList');
  c.innerHTML = '';
  Object.keys(trip.packing).forEach(cat=>{
    const section = document.createElement('div');
    section.className = 'pack-category';
    const head = document.createElement('div');
    head.className = 'pack-category-head';
    head.innerHTML = `<span>${esc(cat)}</span><span style="color:var(--dim);font-weight:400;font-size:10px">${trip.packing[cat].length}</span>`;
    section.appendChild(head);
    trip.packing[cat].forEach((item,i)=>{
      const key = `${cat}::${i}`;
      const checked = !!trip.packingChecked[key];
      const row = document.createElement('div');
      row.className = 'pack-item' + (checked?' done':'');
      row.innerHTML = `
        <input type="checkbox" ${checked?'checked':''}>
        <input class="txt" value="${esc(item)}">
        <button class="rm">&times;</button>
      `;
      row.querySelector('input[type="checkbox"]').onchange = (e)=>{
        trip.packingChecked[key] = e.target.checked;
        row.classList.toggle('done', e.target.checked);
        saveTrip();
      };
      row.querySelector('.txt').oninput = (e)=>{
        trip.packing[cat][i] = e.target.value;
        saveTrip();
      };
      row.querySelector('.rm').onclick = ()=>{
        trip.packing[cat].splice(i,1);
        delete trip.packingChecked[key];
        saveTrip(); renderPacking();
      };
      section.appendChild(row);
    });
    const addBtn = document.createElement('button');
    addBtn.className = 'btn full sm ghost';
    addBtn.textContent = '+ Add to '+cat;
    addBtn.style.marginTop = '4px';
    addBtn.onclick = ()=>{
      trip.packing[cat].push('');
      saveTrip(); renderPacking();
    };
    section.appendChild(addBtn);
    c.appendChild(section);
  });
}

function esc(s){ return String(s==null?'':s).replace(/[&<>"']/g, c=>({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#39;"}[c])); }
function fmtShort(iso){
  if (!iso) return '';
  try{
    const d = new Date(iso+'T00:00');
    return d.toLocaleDateString('en-US',{month:'short',day:'numeric'});
  }catch(e){return iso;}
}
function fmtLong(iso){
  if (!iso) return '';
  try{
    const d = new Date(iso+'T00:00');
    return d.toLocaleDateString('en-US',{weekday:'short',month:'short',day:'numeric',year:'numeric'});
  }catch(e){return iso;}
}
function fmtLongNoYear(iso){
  if (!iso) return '';
  try{
    const d = new Date(iso+'T00:00');
    return d.toLocaleDateString('en-US',{weekday:'long',month:'long',day:'numeric'});
  }catch(e){return iso;}
}
function fmt12(t){
  if (!t) return '';
  const [h,m] = t.split(':').map(Number);
  const ampm = h>=12 ? 'PM' : 'AM';
  const hh = h%12 || 12;
  return `${hh}:${String(m).padStart(2,'0')} ${ampm}`;
}

function toast(msg, kind){
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.className = 'toast show' + (kind?' '+kind:'');
  clearTimeout(toast._t);
  toast._t = setTimeout(()=>{ t.className = 'toast' + (kind?' '+kind:''); }, 2400);
}

function downloadJSON(){
  const blob = new Blob([JSON.stringify(trip,null,2)], {type:'application/json'});

// PDF EXPORT
// =====================================================
// Colors as arrays [r,g,b]
const PDFC = {
  bg: [255,255,255],
  ink: [28,33,47],
  ink2: [73,82,100],
  muted: [130,140,158],
  accent: [8,83,112],
  accent2: [0,130,180],
  line: [210,216,224],
  softbg: [245,248,251],
  hair: [220,225,232],
  flight:[56,140,200],
  hotel:[140,85,190],
  meal:[220,130,40],
  activity:[30,150,120],
  transport:[120,130,150],
  meeting:[200,70,70]
};

function eventColor(type){
  return PDFC[type] || PDFC.transport;
}

async function buildPDF(){
  const { jsPDF } = window.jspdf;
  const doc = new jsPDF({unit:'pt', format:'letter', orientation:'portrait'});
  const W = doc.internal.pageSize.getWidth();
  const H = doc.internal.pageSize.getHeight();
  const M = 54; // margin

  // ============== COVER ==============
  drawCover(doc, W, H, M);

  // ============== DAYS ==============
  trip.days.forEach((d, idx)=>{
    doc.addPage();
    drawDayPage(doc, W, H, M, d, idx);
  });

  // ============== FINAL PAGE (contacts, packing, docs) ==============
  doc.addPage();
  drawFinalPage(doc, W, H, M);

  // ============== FOOTERS ==============
  const total = doc.internal.getNumberOfPages();
  for (let i=1;i<=total;i++){
    doc.setPage(i);
    drawFooter(doc, W, H, M, i, total);
  }

  return doc;
}

function drawCover(doc, W, H, M){
  // decorative border
  doc.setDrawColor(...PDFC.accent);
  doc.setLineWidth(1.2);
  doc.rect(M-8, M-8, W-2*(M-8), H-2*(M-8));
  doc.setDrawColor(...PDFC.line);
  doc.setLineWidth(0.5);
  doc.rect(M, M, W-2*M, H-2*M);

  // corner ornaments
  ornament(doc, M, M);
  ornament(doc, W-M, M, true, false);
  ornament(doc, M, H-M, false, true);
  ornament(doc, W-M, H-M, true, true);

  // "travel plan" header label
  doc.setFont('helvetica','normal');
  doc.setFontSize(9);
  doc.setTextColor(...PDFC.muted);
  doc.text('TRAVEL PLAN', W/2, M+48, {align:'center', charSpace:3});

  // underline
  doc.setDrawColor(...PDFC.accent);
  doc.setLineWidth(0.8);
  doc.line(W/2-30, M+54, W/2+30, M+54);

  // title (big)
  const title = trip.title || 'Untitled Trip';
  doc.setFont('times','bold');
  doc.setTextColor(...PDFC.ink);
  const titleSize = title.length > 30 ? 28 : (title.length > 18 ? 34 : 42);
  doc.setFontSize(titleSize);
  wrapText(doc, title, W/2, H/2-60, W-2*M-40, titleSize*1.15, {align:'center'});

  // destinations
  if (trip.destination){
    doc.setFont('helvetica','normal');
    doc.setFontSize(14);
    doc.setTextColor(...PDFC.accent);
    wrapText(doc, trip.destination.toUpperCase(), W/2, H/2, W-2*M-40, 18, {align:'center', charSpace:2});
  }

  // dates
  if (trip.start || trip.end){
    doc.setFont('helvetica','bold');
    doc.setFontSize(12);
    doc.setTextColor(...PDFC.ink2);
    const dates = formatDateRange(trip.start, trip.end);
    doc.text(dates, W/2, H/2+60, {align:'center'});
  }

  // a divider
  doc.setDrawColor(...PDFC.accent);
  doc.setLineWidth(0.5);
  doc.line(W/2-40, H/2+80, W/2+40, H/2+80);

  // travelers
  if (trip.travelers){
    doc.setFont('times','italic');
    doc.setFontSize(13);
    doc.setTextColor(...PDFC.ink2);
    doc.text('for', W/2, H/2+110, {align:'center'});

    doc.setFont('times','bold');
    doc.setFontSize(16);
    doc.setTextColor(...PDFC.ink);
    wrapText(doc, trip.travelers, W/2, H/2+135, W-2*M-40, 20, {align:'center'});
  }

  // budget footer bit
  if (trip.budget){
    doc.setFont('helvetica','normal');
    doc.setFontSize(10);
    doc.setTextColor(...PDFC.muted);
    doc.text(`Budget: $${Number(trip.budget).toLocaleString()}`, W/2, H-M-60, {align:'center', charSpace:1});
  }

  // bottom stamp
  doc.setFont('helvetica','normal');
  doc.setFontSize(8);
  doc.setTextColor(...PDFC.muted);
  doc.text('PREPARED BY BLAKE\'S TRAVEL PLAN', W/2, H-M-36, {align:'center', charSpace:3});
  const gen = new Date().toLocaleDateString('en-US',{year:'numeric',month:'long',day:'numeric'});
  doc.text(gen.toUpperCase(), W/2, H-M-22, {align:'center', charSpace:2});
}

function ornament(doc, x, y, flipX, flipY){
  doc.setDrawColor(...PDFC.accent);
  doc.setLineWidth(1.5);
  const sx = flipX ? -1 : 1;
  const sy = flipY ? -1 : 1;
  doc.line(x, y, x + 20*sx, y);
  doc.line(x, y, x, y + 20*sy);
  doc.setLineWidth(0.5);
  doc.line(x+5*sx, y+5*sy, x+18*sx, y+5*sy);
  doc.line(x+5*sx, y+5*sy, x+5*sx, y+18*sy);
}

function drawDayPage(doc, W, H, M, day, idx){
  // Header bar
  const barH = 68;
  doc.setFillColor(...PDFC.accent);
  doc.rect(0, 0, W, barH, 'F');
  doc.setFillColor(...PDFC.accent2);
  doc.rect(0, barH, W, 3, 'F');

  doc.setFont('helvetica','bold');
  doc.setTextColor(255,255,255);
  doc.setFontSize(28);
  doc.text(`DAY ${idx+1}`, M, 42);

  // date + location right side
  doc.setFont('helvetica','normal');
  doc.setFontSize(10);
  const dateStr = day.date ? fmtLongNoYear(day.date).toUpperCase() : '';
  doc.text(dateStr, W-M, 30, {align:'right', charSpace:2});
  doc.setFontSize(12);
  doc.setFont('helvetica','bold');
  if (day.location){
    doc.text(day.location.toUpperCase(), W-M, 52, {align:'right', charSpace:1});
  }

  // day title
  let y = barH + 34;
  if (day.title){
    doc.setFont('times','bold');
    doc.setFontSize(20);
    doc.setTextColor(...PDFC.ink);
    doc.text(day.title, M, y);
    y += 18;
    // subtitle / decorative
    doc.setDrawColor(...PDFC.accent);
    doc.setLineWidth(0.6);
    doc.line(M, y, M+40, y);
    y += 20;
  } else {
    y += 6;
  }

  // timeline setup
  const timelineX = M + 48;
  const contentX = timelineX + 16;
  const contentW = W - M - contentX;

  if (!day.events.length){
    doc.setFont('times','italic');
    doc.setFontSize(12);
    doc.setTextColor(...PDFC.muted);
    doc.text('No events scheduled for this day.', W/2, y+40, {align:'center'});
    return;
  }

  // timeline vertical line
  const timelineStartY = y;

  day.events.forEach((ev, ei)=>{
    // estimate box height
    const boxH = estEventBoxHeight(doc, ev, contentW);
    // page break if needed
    if (y + boxH > H - M - 40){
      // draw timeline to bottom
      doc.setDrawColor(...PDFC.line);
      doc.setLineWidth(1);
      doc.line(timelineX, timelineStartY, timelineX, y);
      doc.addPage();
      drawContinuedHeader(doc, W, H, M, idx+1, day);
      y = M + 60;
    }
    drawEventBox(doc, ev, timelineX, contentX, y, contentW);

    // travel badge below
    if (ei < day.events.length-1){
      const next = day.events[ei+1];
      if (ev.address && next.address){
        const mins = estTravelMin(ev, next);
        if (mins>0){
          y += boxH + 4;
          doc.setFont('helvetica','italic');
          doc.setFontSize(8);
          doc.setTextColor(...PDFC.muted);
          doc.text(`~ ${mins} min travel`, contentX + 8, y+3, {charSpace:1});
          y += 12;
        } else {
          y += boxH + 12;
        }
      } else {
        y += boxH + 12;
      }
    } else {
      y += boxH + 12;
    }
  });

  // timeline line
  doc.setDrawColor(...PDFC.line);
  doc.setLineWidth(1);
  doc.line(timelineX, timelineStartY, timelineX, y);
}

function drawContinuedHeader(doc, W, H, M, dayNum, day){
  doc.setFillColor(...PDFC.accent);
  doc.rect(0, 0, W, 40, 'F');
  doc.setFont('helvetica','bold');
  doc.setTextColor(255,255,255);
  doc.setFontSize(14);
  doc.text(`DAY ${dayNum} (continued)`, M, 26);
  doc.setFont('helvetica','normal');
  doc.setFontSize(9);
  if (day.date) doc.text(fmtLongNoYear(day.date).toUpperCase(), W-M, 26, {align:'right', charSpace:2});
}

function drawEventBox(doc, ev, timelineX, x, y, w){
  const col = eventColor(ev.type);
  const meta = EVENT_TYPES.find(t=>t.v===ev.type) || EVENT_TYPES[4];

  // timeline dot
  doc.setFillColor(...col);
  doc.circle(timelineX, y+14, 5, 'F');
  doc.setDrawColor(255,255,255);
  doc.setLineWidth(1.5);
  doc.circle(timelineX, y+14, 5);

  // box
  const boxH = estEventBoxHeight(doc, ev, w);
  doc.setFillColor(...PDFC.softbg);
  doc.roundedRect(x, y, w, boxH, 4, 4, 'F');
  // left accent bar
  doc.setFillColor(...col);
  doc.roundedRect(x, y, 4, boxH, 2, 2, 'F');

  // time pill
  const timeText = fmt12(ev.time) || ev.time || '—';
  doc.setFont('helvetica','bold');
  doc.setFontSize(9);
  doc.setTextColor(...col);
  doc.text(timeText, x+14, y+16);

  // duration
  if (ev.duration){
    doc.setFont('helvetica','normal');
    doc.setFontSize(8);
    doc.setTextColor(...PDFC.muted);
    const tw = doc.getTextWidth(timeText);
    doc.text(`• ${ev.duration} min`, x+14 + tw + 5, y+16);
  }

  // type pill (right side)
  const typeLabel = meta.l.toUpperCase();
  doc.setFont('helvetica','bold');
  doc.setFontSize(7);
  doc.setTextColor(...col);
  const tw = doc.getTextWidth(typeLabel) + 12;
  doc.setDrawColor(...col);
  doc.setLineWidth(0.6);
  doc.setFillColor(255,255,255);
  doc.roundedRect(x+w-tw-10, y+8, tw, 14, 7, 7, 'FD');
  doc.text(typeLabel, x+w-tw-10+tw/2, y+17, {align:'center', charSpace:1});

  // title
  let yy = y + 34;
  doc.setFont('times','bold');
  doc.setFontSize(13);
  doc.setTextColor(...PDFC.ink);
  const titleLines = doc.splitTextToSize(ev.title || '(untitled)', w-28);
  titleLines.forEach(line=>{
    doc.text(line, x+14, yy);
    yy += 16;
  });

  // location
  if (ev.location){
    doc.setFont('helvetica','normal');
    doc.setFontSize(10);
    doc.setTextColor(...PDFC.ink2);
    const lines = doc.splitTextToSize(ev.location, w-28);
    lines.forEach(ln=>{ doc.text(ln, x+14, yy); yy += 12; });
  }

  // address
  if (ev.address){
    doc.setFont('helvetica','italic');
    doc.setFontSize(9);
    doc.setTextColor(...PDFC.muted);
    const lines = doc.splitTextToSize(ev.address, w-28);
    lines.forEach(ln=>{ doc.text(ln, x+14, yy); yy += 11; });
  }

  // confirmation + phone row
  if (ev.conf || ev.phone){
    doc.setFont('helvetica','normal');
    doc.setFontSize(9);
    doc.setTextColor(...PDFC.accent);
    let row = '';
    if (ev.conf) row += `Conf: ${ev.conf}`;
    if (ev.conf && ev.phone) row += '   ';
    if (ev.phone) row += `Phone: ${ev.phone}`;
    doc.text(row, x+14, yy);
    yy += 13;
  }

  // notes
  if (ev.notes){
    doc.setFont('helvetica','normal');
    doc.setFontSize(9);
    doc.setTextColor(...PDFC.ink2);
    const lines = doc.splitTextToSize(ev.notes, w-28);
    lines.forEach(ln=>{ doc.text(ln, x+14, yy); yy += 11; });
  }
}

function estEventBoxHeight(doc, ev, w){
  let h = 34; // header
  // title
  doc.setFont('times','bold'); doc.setFontSize(13);
  const titleLines = doc.splitTextToSize(ev.title||'(untitled)', w-28);
  h += titleLines.length * 16;
  // location
  if (ev.location){
    doc.setFont('helvetica','normal'); doc.setFontSize(10);
    h += doc.splitTextToSize(ev.location, w-28).length * 12;
  }
  // address
  if (ev.address){
    doc.setFont('helvetica','italic'); doc.setFontSize(9);
    h += doc.splitTextToSize(ev.address, w-28).length * 11;
  }
  // conf/phone
  if (ev.conf || ev.phone) h += 13;
  // notes
  if (ev.notes){
    doc.setFont('helvetica','normal'); doc.setFontSize(9);
    h += doc.splitTextToSize(ev.notes, w-28).length * 11;
  }
  return h + 12;
}

function drawFinalPage(doc, W, H, M){
  // header bar
  doc.setFillColor(...PDFC.accent);
  doc.rect(0, 0, W, 52, 'F');
  doc.setFont('helvetica','bold');
  doc.setTextColor(255,255,255);
  doc.setFontSize(20);
  doc.text('TRIP ESSENTIALS', M, 34, {charSpace:2});

  let y = 80;

  // CONTACTS
  y = drawSectionHeader(doc, 'CONTACTS', M, y, W-2*M);
  if (!trip.contacts.length){
    doc.setFont('times','italic');
    doc.setFontSize(10);
    doc.setTextColor(...PDFC.muted);
    doc.text('No contacts added.', M+10, y+8);
    y += 24;
  } else {
    trip.contacts.forEach(c=>{
      if (y > H-M-40){ doc.addPage(); y = M; }
      doc.setFont('helvetica','bold');
      doc.setFontSize(11);
      doc.setTextColor(...PDFC.ink);
      const role = c.role ? `[${c.role}]` : '';
      doc.text(`${c.name||'(unnamed)'}  ${role}`, M+10, y);
      doc.setFont('helvetica','normal');
      doc.setTextColor(...PDFC.accent);
      if (c.phone) doc.text(c.phone, W-M-10, y, {align:'right'});
      y += 18;
    });
    y += 10;
  }

  // two-column: Packing on left, Docs on right
  if (y > H - 280) { doc.addPage(); y = M; }
  const colW = (W - 2*M - 20) / 2;
  const leftX = M;
  const rightX = M + colW + 20;
  const startY = y + 10;

  // Packing column
  let lyY = drawSectionHeader(doc, 'PACKING CHECKLIST', leftX, startY, colW);
  Object.keys(trip.packing).forEach(cat=>{
    if (lyY > H - M - 60){
      // overflow — leave rest; could add page but keep simple
      return;
    }
    doc.setFont('helvetica','bold');
    doc.setFontSize(10);
    doc.setTextColor(...PDFC.accent);
    doc.text(cat.toUpperCase(), leftX+6, lyY, {charSpace:1});
    lyY += 14;
    trip.packing[cat].forEach((item,i)=>{
      if (!item) return;
      if (lyY > H - M - 40){ return; }
      const key = `${cat}::${i}`;
      const checked = !!trip.packingChecked[key];
      // checkbox
      doc.setDrawColor(...PDFC.ink);
      doc.setLineWidth(0.6);
      doc.setFillColor(255,255,255);
      doc.rect(leftX+8, lyY-8, 9, 9);
      if (checked){
        doc.setDrawColor(...PDFC.accent2);
        doc.setLineWidth(1.4);
        doc.line(leftX+9, lyY-3, leftX+12, lyY-1);
        doc.line(leftX+12, lyY-1, leftX+17, lyY-8);
      }
      doc.setFont('helvetica','normal');
      doc.setFontSize(9);
      doc.setTextColor(...(checked?PDFC.muted:PDFC.ink2));
      const lines = doc.splitTextToSize(item, colW-30);
      lines.forEach((ln,idx)=>{
        doc.text(ln, leftX+22, lyY + idx*10);
      });
      lyY += Math.max(12, lines.length*10);
    });
    lyY += 8;
  });

  // Docs column
  let ryY = drawSectionHeader(doc, 'DOCUMENTS', rightX, startY, colW);
  if (!trip.docs.length){
    doc.setFont('times','italic');
    doc.setFontSize(10);
    doc.setTextColor(...PDFC.muted);
    doc.text('No documents recorded.', rightX+8, ryY+4);
    ryY += 20;
  } else {
    trip.docs.forEach(d=>{
      if (ryY > H - M - 60) return;
      doc.setFont('helvetica','bold');
      doc.setFontSize(10);
      doc.setTextColor(...PDFC.ink);
      const titleLines = doc.splitTextToSize(d.title||'Document', colW-16);
      titleLines.forEach((ln,idx)=>{
        doc.text(ln, rightX+8, ryY + idx*11);
      });
      ryY += titleLines.length * 11;
      if (d.notes){
        doc.setFont('helvetica','normal');
        doc.setFontSize(9);
        doc.setTextColor(...PDFC.accent);
        const nLines = doc.splitTextToSize(d.notes, colW-16);
        nLines.forEach((ln,idx)=>{
          doc.text(ln, rightX+8, ryY + idx*10);
        });
        ryY += nLines.length * 10;
      }
      ryY += 10;
    });
  }

  // Budget summary (if any)
  const hasBudget = trip.budgetLines.some(b=>parseFloat(b.est)||parseFloat(b.act));
  if (hasBudget){
    let by = Math.max(lyY, ryY) + 20;
    if (by > H-180){ doc.addPage(); by = M; }
    by = drawSectionHeader(doc, 'BUDGET', M, by, W-2*M);
    // header row
    doc.setFont('helvetica','bold');
    doc.setFontSize(8);
    doc.setTextColor(...PDFC.muted);
    doc.text('CATEGORY', M+10, by, {charSpace:1});
    doc.text('ESTIMATED', W-M-150, by, {align:'right', charSpace:1});
    doc.text('ACTUAL', W-M-10, by, {align:'right', charSpace:1});
    by += 8;
    doc.setDrawColor(...PDFC.line);
    doc.setLineWidth(0.5);
    doc.line(M+10, by, W-M-10, by);
    by += 10;
    let totE=0, totA=0;
    trip.budgetLines.forEach(b=>{
      if (by > H-M-60) return;
      const est = parseFloat(b.est)||0;
      const act = parseFloat(b.act)||0;
      totE += est; totA += act;
      doc.setFont('helvetica','normal');
      doc.setFontSize(10);
      doc.setTextColor(...PDFC.ink);
      doc.text(b.cat||'—', M+10, by);
      doc.setTextColor(...PDFC.ink2);
      doc.text('$'+est.toLocaleString(undefined,{minimumFractionDigits:2,maximumFractionDigits:2}), W-M-150, by, {align:'right'});
      doc.setTextColor(...PDFC.accent);
      doc.text('$'+act.toLocaleString(undefined,{minimumFractionDigits:2,maximumFractionDigits:2}), W-M-10, by, {align:'right'});
      by += 14;
    });
    // totals
    doc.setDrawColor(...PDFC.line);
    doc.line(M+10, by, W-M-10, by);
    by += 12;
    doc.setFont('helvetica','bold');
    doc.setFontSize(10);
    doc.setTextColor(...PDFC.ink);
    doc.text('TOTAL', M+10, by, {charSpace:1});
    doc.text('$'+totE.toLocaleString(undefined,{minimumFractionDigits:2,maximumFractionDigits:2}), W-M-150, by, {align:'right'});
    doc.setTextColor(...PDFC.accent);
    doc.text('$'+totA.toLocaleString(undefined,{minimumFractionDigits:2,maximumFractionDigits:2}), W-M-10, by, {align:'right'});
  }

  // Scratch notes
  if (trip.scratch && trip.scratch.trim()){
    const hasBudget2 = hasBudget;
    let ny = hasBudget2 ? (H - 180) : Math.max(lyY, ryY) + 20;
    if (ny > H - 150){ doc.addPage(); ny = M; }
    ny = drawSectionHeader(doc, 'NOTES', M, ny, W-2*M);
    doc.setFont('times','normal');
    doc.setFontSize(10);
    doc.setTextColor(...PDFC.ink2);
    const nLines = doc.splitTextToSize(trip.scratch, W-2*M-20);
    nLines.forEach((ln,idx)=>{
      if (ny + idx*12 > H - M - 40) return;
      doc.text(ln, M+10, ny + idx*12);
    });
  }
}

function drawSectionHeader(doc, label, x, y, w){
  doc.setFont('helvetica','bold');
  doc.setFontSize(11);
  doc.setTextColor(...PDFC.accent);
  doc.text(label, x, y, {charSpace:3});
  y += 4;
  doc.setDrawColor(...PDFC.accent);
  doc.setLineWidth(0.8);
  doc.line(x, y, x + w, y);
  return y + 18;
}

function drawFooter(doc, W, H, M, page, total){
  // skip cover
  if (page === 1) return;
  doc.setDrawColor(...PDFC.line);
  doc.setLineWidth(0.5);
  doc.line(M, H-M+10, W-M, H-M+10);
  doc.setFont('helvetica','normal');
  doc.setFontSize(8);
  doc.setTextColor(...PDFC.muted);
  const title = trip.title || 'Travel Plan';
  doc.text(title.toUpperCase(), M, H-M+24, {charSpace:2});
  doc.text(`${page} / ${total}`, W-M, H-M+24, {align:'right'});
}

function formatDateRange(s,e){
  if (!s && !e) return '';
  if (s && !e) return fmtLong(s).toUpperCase();
  if (!s && e) return fmtLong(e).toUpperCase();
  const sd = new Date(s+'T00:00');
  const ed = new Date(e+'T00:00');
  const sameYear = sd.getFullYear() === ed.getFullYear();
  const sameMonth = sameYear && sd.getMonth() === ed.getMonth();
  if (sameMonth){
    return `${sd.toLocaleDateString('en-US',{month:'long',day:'numeric'})} – ${ed.toLocaleDateString('en-US',{day:'numeric',year:'numeric'})}`.toUpperCase();
  }
  if (sameYear){
    return `${sd.toLocaleDateString('en-US',{month:'short',day:'numeric'})} – ${ed.toLocaleDateString('en-US',{month:'short',day:'numeric',year:'numeric'})}`.toUpperCase();
  }
  return `${fmtLong(s)} – ${fmtLong(e)}`.toUpperCase();
}

function wrapText(doc, txt, x, y, maxW, lh, opts){
  const lines = doc.splitTextToSize(txt, maxW);
  lines.forEach((ln,i)=>doc.text(ln, x, y + i*lh, opts));
  return y + lines.length*lh;
}

async function exportPDF(){
  try {
    document.getElementById('pdfLoad').classList.add('on');
    // give UI a tick
    await new Promise(r=>setTimeout(r, 50));
    const doc = await buildPDF();
    const name = `${slugify(trip.title||'trip')}-travel-plan.pdf`;
    doc.save(name);
    toast('PDF downloaded','ok');
  } catch (e) {
    console.error(e);
    toast('PDF export failed: '+(e.message||'unknown'), 'err');
  } finally {
    document.getElementById('pdfLoad').classList.remove('on');
  }
}

async function sharePDF(){
  try {
    document.getElementById('pdfLoad').classList.add('on');
    await new Promise(r=>setTimeout(r, 50));
    const doc = await buildPDF();
    const blob = doc.output('blob');
    const name = `${slugify(trip.title||'trip')}-travel-plan.pdf`;
    const file = new File([blob], name, {type:'application/pdf'});

    if (navigator.canShare && navigator.canShare({files:[file]})){
      try {
        await navigator.share({
          files:[file],
          title: trip.title || 'Travel Plan',
          text: `Travel plan for ${trip.title||'our trip'}`
        });
        toast('Shared','ok');
      } catch (err) {
        if (err.name !== 'AbortError'){
          fallbackDownload(blob, name);
        }
      }
    } else {
      fallbackDownload(blob, name);
    }
  } catch (e) {
    console.error(e);
    toast('Share failed: '+(e.message||'unknown'), 'err');
  } finally {
    document.getElementById('pdfLoad').classList.remove('on');
  }
}

function fallbackDownload(blob, name){
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = name;
  a.click();
  setTimeout(()=>URL.revokeObjectURL(a.href), 1000);
  // also try clipboard-friendly message
  if (navigator.clipboard && navigator.clipboard.writeText){
    navigator.clipboard.writeText(`${trip.title||'Travel Plan'} PDF is ready — check your downloads folder.`).catch(()=>{});
  }
  toast('PDF downloaded — share from your device','ok');
}

// =====================================================
// BOOT
// =====================================================
document.addEventListener('DOMContentLoaded', boot);
</script>
