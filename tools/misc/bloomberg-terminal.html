:root{

}
html,body{height:100%;overflow:hidden;}
body{font-family:'JetBrains Mono',monospace;background:var(--bg-dark);color:var(--text);font-size:12px;line-height:1.4;}

::-webkit-scrollbar-track{background:var(--bg-dark);}
::-webkit-scrollbar-thumb{background:var(--border);border-radius:3px;}
::-webkit-scrollbar-thumb:hover{background:#2a3a4a;}
input,select,button{font-family:'JetBrains Mono',monospace;font-size:11px;}
input,select{background:var(--bg-dark);color:var(--text);border:1px solid var(--border);padding:4px 8px;border-radius:2px;outline:none;}
input:focus,select:focus{border-color:var(--cyan);}
button{background:var(--bg-light);color:var(--cyan);border:1px solid var(--border);padding:4px 10px;cursor:pointer;border-radius:2px;transition:all .15s;}
button:hover{background:var(--border);border-color:var(--cyan);}
button.active{background:var(--cyan);color:var(--bg-dark);font-weight:600;}
.gain{color:var(--green);}
.loss{color:var(--red);}
.neutral{color:var(--text-dim);}

/* Layout */
#app{display:flex;flex-direction:column;height:100vh;}
#header{display:flex;align-items:center;justify-content:space-between;background:var(--bg-mid);border-bottom:1px solid var(--border);padding:6px 12px;flex-shrink:0;}
#header .logo{display:flex;align-items:center;gap:10px;}
#header .logo .ke-box{width:32px;height:32px;border:2px solid var(--orange);display:flex;align-items:center;justify-content:center;font-weight:700;color:var(--orange);font-size:13px;}
#header .logo h1{font-size:16px;font-weight:700;color:var(--cyan);letter-spacing:3px;}
#header .market-clock{text-align:right;font-size:11px;}
#header .market-clock .time{color:var(--cyan);font-size:14px;font-weight:600;}
#header .market-clock .status{font-size:10px;margin-top:2px;}
.status-open{color:var(--green);}
.status-closed{color:var(--red);}

/* Index Bar */
#index-bar{display:flex;gap:0;background:var(--bg-mid);border-bottom:1px solid var(--border);flex-shrink:0;overflow-x:auto;}
.index-item{padding:6px 16px;border-right:1px solid var(--border);min-width:180px;}
.index-item .name{font-size:10px;color:var(--text-dim);font-weight:500;letter-spacing:1px;}
.index-item .price{font-size:14px;font-weight:600;color:var(--text-bright);}
.index-item .change{font-size:11px;font-weight:500;}

/* Tabs */
#tab-bar{display:flex;background:var(--bg-mid);border-bottom:1px solid var(--border);flex-shrink:0;}
.tab{padding:8px 16px;cursor:pointer;color:var(--text-dim);border-bottom:2px solid transparent;font-size:11px;font-weight:500;letter-spacing:1px;transition:all .15s;user-select:none;}
.tab:hover{color:var(--text);}
.tab.active{color:var(--cyan);border-bottom-color:var(--cyan);}
.tab .tab-key{font-size:9px;color:var(--text-dim);margin-left:4px;opacity:.6;}

/* Search */
#search-bar{display:flex;align-items:center;padding:6px 12px;background:var(--bg-mid);border-bottom:1px solid var(--border);flex-shrink:0;gap:8px;}
#search-bar label{color:var(--orange);font-weight:600;font-size:11px;letter-spacing:1px;}
#search-input{flex:1;max-width:400px;padding:5px 10px;font-size:12px;}
#search-results{position:absolute;top:100%;left:0;right:0;max-width:400px;background:var(--bg-dark);border:1px solid var(--border);z-index:100;max-height:300px;overflow-y:auto;display:none;}
#search-bar{position:relative;}
.search-result{padding:6px 10px;cursor:pointer;display:flex;justify-content:space-between;border-bottom:1px solid var(--border);}
.search-result:hover{background:var(--bg-light);}
.search-result .sr-ticker{color:var(--cyan);font-weight:600;}
.search-result .sr-name{color:var(--text-dim);font-size:10px;}

/* Main content */
#content{flex:1;overflow-y:auto;padding:8px;}

/* Dashboard */
.dashboard{display:grid;grid-template-columns:1fr 1fr;grid-template-rows:auto auto;gap:8px;}
.panel{background:var(--bg-mid);border:1px solid var(--border);border-radius:2px;padding:10px;}
.panel-title{font-size:11px;color:var(--orange);font-weight:600;letter-spacing:1px;margin-bottom:8px;padding-bottom:4px;border-bottom:1px solid var(--border);}

/* Heatmap */
.heatmap{display:grid;grid-template-columns:repeat(4,1fr);gap:4px;}
.heatmap-cell{padding:8px 6px;text-align:center;border-radius:2px;cursor:pointer;transition:all .15s;}
.heatmap-cell:hover{opacity:.8;transform:scale(1.02);}
.heatmap-cell .sector-name{font-size:9px;font-weight:600;color:#fff;text-shadow:0 1px 2px rgba(0,0,0,.5);}
.heatmap-cell .sector-pct{font-size:12px;font-weight:700;color:#fff;text-shadow:0 1px 2px rgba(0,0,0,.5);}

/* Movers */
.mover-list{display:flex;flex-direction:column;gap:2px;}
.mover-row{display:flex;justify-content:space-between;align-items:center;padding:4px 6px;border-radius:2px;cursor:pointer;transition:background .15s;}
.mover-row:hover{background:var(--bg-light);}
.mover-ticker{color:var(--cyan);font-weight:600;width:60px;}
.mover-name{color:var(--text-dim);font-size:10px;flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;margin:0 8px;}
.mover-price{width:70px;text-align:right;}
.mover-change{width:80px;text-align:right;font-weight:500;}

/* Watchlist */
.wl-table{width:100%;border-collapse:collapse;}
.wl-table th{text-align:left;padding:6px 8px;color:var(--orange);font-size:10px;font-weight:600;letter-spacing:1px;border-bottom:1px solid var(--border);cursor:pointer;user-select:none;}
.wl-table th:hover{color:var(--cyan);}
.wl-table th.sort-asc::after{content:' \u25B2';font-size:8px;}
.wl-table th.sort-desc::after{content:' \u25BC';font-size:8px;}
.wl-table td{padding:5px 8px;border-bottom:1px solid #0d1520;}
.wl-table tr{cursor:pointer;transition:background .1s;}
.wl-table tr:hover{background:var(--bg-light);}
.wl-remove{color:var(--red);cursor:pointer;font-size:14px;opacity:.5;transition:opacity .15s;}
.wl-remove:hover{opacity:1;}
.wl-add-btn{color:var(--green);cursor:pointer;font-size:12px;opacity:.6;}
.wl-add-btn:hover{opacity:1;}

/* Stock Detail */
#stock-detail{display:none;position:absolute;top:0;left:0;right:0;bottom:0;background:var(--bg-dark);z-index:50;overflow-y:auto;padding:12px;}
#stock-detail .detail-header{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:12px;}
.detail-price-area{display:flex;align-items:baseline;gap:12px;}

.detail-company{font-size:13px;color:var(--text-dim);margin-left:8px;}
.detail-big-price{font-size:32px;font-weight:700;color:var(--text-bright);}
.detail-change{font-size:16px;font-weight:600;}
.detail-close-btn{font-size:20px;color:var(--text-dim);cursor:pointer;padding:4px 8px;}
.detail-close-btn:hover{color:var(--red);}
.detail-grid{display:grid;grid-template-columns:2fr 1fr;gap:10px;}
.chart-container{position:relative;}
.chart-container canvas{width:100%;border:1px solid var(--border);border-radius:2px;cursor:crosshair;}
.timeframe-bar{display:flex;gap:4px;margin-bottom:6px;}
.timeframe-bar button{font-size:10px;padding:3px 8px;}
.detail-info{display:grid;grid-template-columns:1fr 1fr;gap:4px;}
.info-row{display:flex;justify-content:space-between;padding:3px 0;border-bottom:1px solid #0d1520;}
.info-label{color:var(--text-dim);font-size:10px;}
.info-value{color:var(--text-bright);font-size:11px;font-weight:500;}
.news-list{margin-top:8px;}
.news-item{padding:6px 0;border-bottom:1px solid #0d1520;}
.news-time{color:var(--text-dim);font-size:9px;}
.news-headline{color:var(--text);font-size:11px;margin-top:2px;}

.port-stat{background:var(--bg-dark);border:1px solid var(--border);padding:8px 10px;border-radius:2px;}

.port-form input{width:100px;}
.port-charts{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-top:10px;}
.port-charts canvas{width:100%;border:1px solid var(--border);border-radius:2px;}

/* Footer */
#footer-label{position:fixed;bottom:8px;right:12px;font-size:10px;color:var(--text-dim);letter-spacing:2px;opacity:.6;z-index:200;pointer-events:none;}

/* Shortcuts hint */
#shortcuts-hint{position:fixed;bottom:8px;left:12px;font-size:9px;color:var(--text-dim);opacity:.4;z-index:200;}

@media(max-width:900px){
  .dashboard{grid-template-columns:1fr;}
  .detail-grid{grid-template-columns:1fr;}
  .portfolio-summary{grid-template-columns:repeat(2,1fr);}
  .port-charts{grid-template-columns:1fr;}
}
</style>
</head>

// Generate procedural history (trading days)
function generateHistory(currentPrice, days){
  let pts = [];
  let p = currentPrice * (0.5 + Math.random()*0.5);
  let drift = (currentPrice - p) / days * 0.7;
  for(let i=0;i<days;i++){
    let vol = (Math.random()-.5)*currentPrice*0.025;
    p += drift + vol;
    if(p<1) p=1;
    let dayVol = Math.floor(Math.random()*40000000)+5000000;
    let o=p*(1+(Math.random()-.5)*.01);
    let c=p;
    let h=Math.max(o,c)*(1+Math.random()*.008);
    let l=Math.min(o,c)*(1-Math.random()*.008);
    pts.push({o,h,l,c:p,v:dayVol,t:Date.now()-((days-i)*86400000)});
  }
  // Intraday for today (390 minutes)
  let intraday = [];
  let ip = pts[pts.length-1].c;
  let todayStart = new Date();todayStart.setHours(9,30,0,0);
  for(let m=0;m<390;m+=5){
    ip += (Math.random()-.5)*currentPrice*0.001;
    if(ip<1)ip=1;
    intraday.push({p:ip,t:todayStart.getTime()+m*60000,v:Math.floor(Math.random()*500000)});
  }
  pts.intraday = intraday;
  return pts;
}

// Price update engine
function updatePrices(){
  Object.keys(stocks).forEach(t=>{
    let s = stocks[t];
    let volatility = (s.beta||1)*0.0008;
    let change = (Math.random()-.5)*2*volatility*s.price;
    // Small drift
    change += (Math.random()-.5)*s.price*0.0001;
    s.price = Math.max(0.01, s.price + change);
    s.price = parseFloat(s.price.toFixed(2));
    if(s.price > s.high) s.high = s.price;
    if(s.price < s.low) s.low = s.price;
    s.volume += Math.floor(Math.random()*50000);
    // Update intraday
    if(priceHistory[t] && priceHistory[t].intraday){
      priceHistory[t].intraday.push({p:s.price,t:Date.now(),v:Math.floor(Math.random()*500000)});
      if(priceHistory[t].intraday.length>500) priceHistory[t].intraday.shift();
    }
  });
  INDICES.forEach(idx=>{
    let d = indexData[idx.sym];
    let change = (Math.random()-.5)*d.price*0.0004;
    d.price = parseFloat((d.price+change).toFixed(2));
  });
}

// Helpers
function fmt(n,d=2){return n!=null?Number(n).toFixed(d):'--';}
function fmtK(n){if(n>=1e12)return(n/1e12).toFixed(1)+'T';if(n>=1e9)return(n/1e9).toFixed(1)+'B';if(n>=1e6)return(n/1e6).toFixed(1)+'M';if(n>=1e3)return(n/1e3).toFixed(1)+'K';return n!=null?n.toFixed(0):'--';}
function chgClass(v){return v>0?'gain':v<0?'loss':'neutral';}
function chgSign(v){return v>0?'+':'';}
function getChange(s){return s.price-s.prevClose;}
function getPctChange(s){return((s.price-s.prevClose)/s.prevClose*100);}

// Market open check (EST, Mon-Fri 9:30-16:00)
function isMarketOpen(){
  let now=new Date();
  let est=new Date(now.toLocaleString('en-US',{timeZone:'America/New_York'}));
  let day=est.getDay();
  if(day===0||day===6)return false;
  let h=est.getHours(),m=est.getMinutes();
  let mins=h*60+m;
  return mins>=570&&mins<960;
}

      case 'price':return(a.price-b.price)*wlSortDir;
      case 'change':return(getChange(a)-getChange(b))*wlSortDir;
      case 'pct':return(getPctChange(a)-getPctChange(b))*wlSortDir;

function generateNews(s){
  let templates=[
    `${s.name} Reports Strong Quarterly Earnings, Beats Analyst Estimates`,
    `Analysts Upgrade ${s.ticker} Target Price Following ${s.sector} Rally`,
    `${s.name} Announces New Partnership to Expand ${s.industry} Operations`,
    `${s.ticker} Shares React to Federal Reserve Interest Rate Commentary`,
    `Institutional Investors Increase ${s.ticker} Holdings by 12% in Latest Filing`,
    `${s.name} CEO Discusses AI Strategy and Long-Term Growth Vision`,
    `${s.sector} Sector Faces Headwinds Amid Regulatory Concerns: ${s.ticker} Impact Analysis`,
    `${s.name} Expands International Presence with Key Market Entry`,
    `Wall Street Divided on ${s.ticker} Outlook as Volatility Increases`,
    `${s.name} Board Approves ${s.dividendYield>0?'Dividend Increase':'Share Buyback Program'}`
  ];
  let news=[];
  let times=['2m ago','18m ago','1h ago','3h ago','Yesterday','2 days ago'];
  for(let i=0;i<6;i++){
    let idx=(hashStr(s.ticker+i))%templates.length;
    news.push({time:times[i],headline:templates[idx]});
  }
  return news;
}

function hashStr(str){let h=0;for(let i=0;i<str.length;i++){h=((h<<5)-h)+str.charCodeAt(i);h|=0;}return Math.abs(h);}

// ==================== CHART DRAWING ====================
function drawDetailChart(){
  let canvas=document.getElementById('detail-chart');
  if(!canvas)return;
  let ctx=canvas.getContext('2d');
  let dpr=window.devicePixelRatio||1;
  let rect=canvas.parentElement.getBoundingClientRect();
  canvas.width=rect.width*dpr;
  canvas.height=380*dpr;
  canvas.style.width=rect.width+'px';
  canvas.style.height='380px';
  ctx.scale(dpr,dpr);
  let W=rect.width,H=380;
  let s=stocks[currentDetail];
  let hist=priceHistory[currentDetail];
  if(!s||!hist)return;

  // Get data based on timeframe
  let data=[];
  let chartH=H-80;
  let chartY=20;
  let volH=50;
  let chartBottomY=chartY+chartH-volH;

  if(detailTimeframe==='1D'){
    data=hist.intraday||[];
    if(data.length<2)return;
  } else {
    let days={'1W':5,'1M':22,'3M':66,'1Y':252,'5Y':1260}[detailTimeframe]||252;
    data=hist.slice(-days);
  }
  if(data.length<2)return;

  // Determine price range
  let prices=detailTimeframe==='1D'?data.map(d=>d.p):data.map(d=>d.c);
  let volumes=detailTimeframe==='1D'?data.map(d=>d.v):data.map(d=>d.v);
  let minP=Math.min(...prices);
  let maxP=Math.max(...prices);
  let maxV=Math.max(...volumes,1);
  let pad=(maxP-minP)*0.1||maxP*0.01;
  minP-=pad;maxP+=pad;

  // Background
  ctx.fillStyle='#050a0f';ctx.fillRect(0,0,W,H);

  // Grid lines
  ctx.strokeStyle='#0d1a28';ctx.lineWidth=0.5;
  for(let i=0;i<5;i++){
    let y=chartY+(chartBottomY-chartY)*i/4;
    ctx.beginPath();ctx.moveTo(60,y);ctx.lineTo(W-10,y);ctx.stroke();
    let pLabel=maxP-(maxP-minP)*i/4;
    ctx.fillStyle='#3a4a5a';ctx.font='10px JetBrains Mono';ctx.textAlign='right';
    ctx.fillText('$'+fmt(pLabel),55,y+4);
  }

  // Draw chart
  let xStep=(W-70)/(data.length-1);

  // Volume bars
  ctx.globalAlpha=0.3;
  data.forEach((d,i)=>{
    let v=detailTimeframe==='1D'?d.v:d.v;
    let vH=(v/maxV)*volH;
    let x=60+i*xStep;
    let p=detailTimeframe==='1D'?d.p:d.c;
    let prevP=i>0?(detailTimeframe==='1D'?data[i-1].p:data[i-1].c):p;
    ctx.fillStyle=p>=prevP?'#00ff88':'#ff3344';
    ctx.fillRect(x-xStep*0.3,chartBottomY+volH-vH,Math.max(xStep*0.6,1),vH);
  });
  ctx.globalAlpha=1;

  // Price line
  ctx.beginPath();
  ctx.strokeStyle='#00d4ff';ctx.lineWidth=1.5;
  data.forEach((d,i)=>{
    let p=detailTimeframe==='1D'?d.p:d.c;
    let x=60+i*xStep;
    let y=chartY+(1-(p-minP)/(maxP-minP))*(chartBottomY-chartY);
    if(i===0)ctx.moveTo(x,y);else ctx.lineTo(x,y);
  });
  ctx.stroke();

  // Gradient fill
  let lastX=60+(data.length-1)*xStep;
  let grad=ctx.createLinearGradient(0,chartY,0,chartBottomY);
  grad.addColorStop(0,'rgba(0,212,255,0.15)');
  grad.addColorStop(1,'rgba(0,212,255,0)');
  ctx.lineTo(lastX,chartBottomY);ctx.lineTo(60,chartBottomY);ctx.closePath();
  ctx.fillStyle=grad;ctx.fill();

  // Prev close reference line for 1D
  if(detailTimeframe==='1D'){
    let prevY=chartY+(1-(s.prevClose-minP)/(maxP-minP))*(chartBottomY-chartY);
    ctx.setLineDash([4,4]);ctx.strokeStyle='#ff660066';ctx.lineWidth=1;
    ctx.beginPath();ctx.moveTo(60,prevY);ctx.lineTo(W-10,prevY);ctx.stroke();
    ctx.setLineDash([]);
    ctx.fillStyle='#ff6600';ctx.font='9px JetBrains Mono';ctx.textAlign='left';
    ctx.fillText('PREV '+fmt(s.prevClose),W-80,prevY-4);
  }

  // Crosshair handler
  canvas.onmousemove=function(e){
    let r=canvas.getBoundingClientRect();
    let mx=e.clientX-r.left;
    let my=e.clientY-r.top;
    // Redraw
    drawDetailChart.__skipHandler=true;
    drawDetailChart();
    drawDetailChart.__skipHandler=false;
    // Draw crosshair
    let ctx2=canvas.getContext('2d');
    ctx2.save();
    ctx2.setLineDash([2,2]);ctx2.strokeStyle='#3a5a7a';ctx2.lineWidth=0.5;
    ctx2.beginPath();ctx2.moveTo(mx,chartY);ctx2.lineTo(mx,chartBottomY+volH);ctx2.stroke();
    ctx2.beginPath();ctx2.moveTo(60,my);ctx2.lineTo(W-10,my);ctx2.stroke();
    ctx2.setLineDash([]);
    // Price at cursor
    let idx=Math.round((mx-60)/xStep);
    if(idx>=0&&idx<data.length){
      let d=data[idx];
      let p=detailTimeframe==='1D'?d.p:d.c;
      ctx2.fillStyle='#050a0f';ctx2.fillRect(mx+8,my-18,100,16);
      ctx2.fillStyle='#00d4ff';ctx2.font='11px JetBrains Mono';ctx2.textAlign='left';
      ctx2.fillText('$'+fmt(p),mx+12,my-6);
    }
    ctx2.restore();
  };
  canvas.onmouseleave=function(){drawDetailChart();};
}

// ==================== PORTFOLIO ====================
function renderPortfolio(){
  let totalValue=0,totalCost=0,dailyPL=0;
  let positions=portfolio.map(pos=>{
    let s=stocks[pos.ticker];
    if(!s)return null;
    let currVal=s.price*pos.shares;
    let costBasis=pos.buyPrice*pos.shares;
    let gain=currVal-costBasis;
    let gainPct=(gain/costBasis)*100;
    let dayChg=(s.price-s.prevClose)*pos.shares;
    totalValue+=currVal;totalCost+=costBasis;dailyPL+=dayChg;
    return{...pos,s,currVal,costBasis,gain,gainPct,dayChg};
  }).filter(Boolean);
  let totalGain=totalValue-totalCost;
  let totalGainPct=totalCost>0?(totalGain/totalCost*100):0;

  let html=`<div class="portfolio-summary">`;
  html+=`<div class="port-stat"><div class="port-stat-label">PORTFOLIO VALUE</div><div class="port-stat-value">$${fmtK(totalValue)}</div></div>`;
  html+=`<div class="port-stat"><div class="port-stat-label">TOTAL GAIN/LOSS</div><div class="port-stat-value ${chgClass(totalGain)}">${chgSign(totalGain)}$${fmtK(Math.abs(totalGain))} (${chgSign(totalGainPct)}${fmt(totalGainPct)}%)</div></div>`;
  html+=`<div class="port-stat"><div class="port-stat-label">DAILY P&L</div><div class="port-stat-value ${chgClass(dailyPL)}">${chgSign(dailyPL)}$${fmt(Math.abs(dailyPL))}</div></div>`;
  html+=`<div class="port-stat"><div class="port-stat-label">POSITIONS</div><div class="port-stat-value">${portfolio.length}</div></div>`;
  html+=`</div>`;

  // Add position form
  html+=`<div class="panel" style="margin-bottom:10px"><div class="panel-title">ADD POSITION</div><div class="port-form"><div><label>TICKER</label><input type="text" id="port-ticker" placeholder="AAPL" style="width:80px"></div><div><label>SHARES</label><input type="number" id="port-shares" placeholder="100" style="width:80px"></div><div><label>BUY PRICE</label><input type="number" id="port-price" placeholder="150.00" step="0.01" style="width:100px"></div><div><label>BUY DATE</label><input type="date" id="port-date" style="width:130px"></div><div><button onclick="addPosition()">ADD</button></div></div></div>`;

  // Positions table
  if(positions.length>0){
    html+=`<div class="panel" style="margin-bottom:10px"><div class="panel-title">POSITIONS</div><table class="wl-table"><thead><tr><th>TICKER</th><th>SHARES</th><th>AVG COST</th><th>CURRENT</th><th>VALUE</th><th>GAIN/LOSS</th><th>% RETURN</th><th>DAY CHG</th><th></th></tr></thead><tbody>`;
    positions.forEach((pos,i)=>{
      html+=`<tr onclick="openDetail('${pos.ticker}')"><td style="color:var(--cyan);font-weight:600">${pos.ticker}</td><td>${pos.shares}</td><td>$${fmt(pos.buyPrice)}</td><td>$${fmt(pos.s.price)}</td><td>$${fmtK(pos.currVal)}</td><td class="${chgClass(pos.gain)}">${chgSign(pos.gain)}$${fmt(Math.abs(pos.gain))}</td><td class="${chgClass(pos.gainPct)}">${chgSign(pos.gainPct)}${fmt(pos.gainPct)}%</td><td class="${chgClass(pos.dayChg)}">${chgSign(pos.dayChg)}$${fmt(Math.abs(pos.dayChg))}</td><td><span class="wl-remove" onclick="event.stopPropagation();removePosition(${i})">&times;</span></td></tr>`;
    });
    html+=`</tbody></table></div>`;
  }

  // Charts
  html+=`<div class="port-charts"><canvas id="alloc-chart" width="400" height="300"></canvas><canvas id="perf-chart" width="400" height="300"></canvas></div>`;
  return html;
}

function addPosition(){
  let ticker=document.getElementById('port-ticker').value.toUpperCase().trim();
  let shares=parseFloat(document.getElementById('port-shares').value);
  let buyPrice=parseFloat(document.getElementById('port-price').value);
  let buyDate=document.getElementById('port-date').value||new Date().toISOString().split('T')[0];
  if(!ticker||!stocks[ticker]){alert('Invalid ticker');return;}
  if(!shares||shares<=0){alert('Invalid shares');return;}
  if(!buyPrice||buyPrice<=0)buyPrice=stocks[ticker].price;
  portfolio.push({ticker,shares,buyPrice,buyDate});
  localStorage.setItem('kt_portfolio',JSON.stringify(portfolio));
  renderContent();
}

function removePosition(idx){
  portfolio.splice(idx,1);
  localStorage.setItem('kt_portfolio',JSON.stringify(portfolio));
  renderContent();
}

function drawAllocChart(){
  let canvas=document.getElementById('alloc-chart');
  if(!canvas)return;
  let ctx=canvas.getContext('2d');
  let dpr=window.devicePixelRatio||1;
  let W=canvas.parentElement.getBoundingClientRect().width;
  canvas.width=W*dpr;canvas.height=300*dpr;
  canvas.style.width=W+'px';canvas.style.height='300px';
  ctx.scale(dpr,dpr);
  ctx.fillStyle='#050a0f';ctx.fillRect(0,0,W,300);

  let positions=portfolio.map(p=>{let s=stocks[p.ticker];return s?{ticker:p.ticker,val:s.price*p.shares}:null}).filter(Boolean);
  let total=positions.reduce((a,p)=>a+p.val,0);
  if(total===0){ctx.fillStyle='#3a4a5a';ctx.font='12px JetBrains Mono';ctx.textAlign='center';ctx.fillText('No positions',W/2,150);return;}

  let colors=['#00d4ff','#ff6600','#00ff88','#ff3344','#a855f7','#f59e0b','#06b6d4','#ec4899','#84cc16','#8b5cf6'];
  let cx=W/2-60,cy=150,r=100;
  let startAngle=-Math.PI/2;
  positions.forEach((p,i)=>{
    let slice=(p.val/total)*Math.PI*2;
    ctx.beginPath();ctx.moveTo(cx,cy);ctx.arc(cx,cy,r,startAngle,startAngle+slice);ctx.closePath();
    ctx.fillStyle=colors[i%colors.length];ctx.fill();
    startAngle+=slice;
  });
  // Legend
  let lx=W/2+60,ly=40;
  ctx.font='10px JetBrains Mono';ctx.textAlign='left';
  positions.forEach((p,i)=>{
    ctx.fillStyle=colors[i%colors.length];ctx.fillRect(lx,ly-8,10,10);
    ctx.fillStyle='#c8d6e5';ctx.fillText(`${p.ticker} ${fmt(p.val/total*100,1)}%`,lx+14,ly);
    ly+=16;
  });
  ctx.fillStyle='#ff6600';ctx.font='11px JetBrains Mono';ctx.textAlign='center';
  ctx.fillText('ALLOCATION',W/2,20);
}

function drawPerfChart(){
  let canvas=document.getElementById('perf-chart');
  if(!canvas)return;
  let ctx=canvas.getContext('2d');
  let dpr=window.devicePixelRatio||1;
  let W=canvas.parentElement.getBoundingClientRect().width;
  canvas.width=W*dpr;canvas.height=300*dpr;
  canvas.style.width=W+'px';canvas.style.height='300px';
  ctx.scale(dpr,dpr);
  ctx.fillStyle='#050a0f';ctx.fillRect(0,0,W,300);

  if(portfolio.length===0){ctx.fillStyle='#3a4a5a';ctx.font='12px JetBrains Mono';ctx.textAlign='center';ctx.fillText('No positions',W/2,150);return;}

  // Simulate portfolio performance over last 90 days
  let days=90;let pts=[];
  let totalCost=portfolio.reduce((a,p)=>a+p.buyPrice*p.shares,0);
  for(let d=0;d<days;d++){
    let val=0;
    portfolio.forEach(pos=>{
      let hist=priceHistory[pos.ticker];
      if(hist){
        let idx=hist.length-days+d;
        if(idx>=0&&idx<hist.length)val+=hist[idx].c*pos.shares;
        else val+=pos.buyPrice*pos.shares;
      }
    });
    pts.push(val);
  }
  let minV=Math.min(...pts)*0.98;let maxV=Math.max(...pts)*1.02;
  let chartY=30,chartH=240;
  // Grid
  ctx.strokeStyle='#0d1a28';ctx.lineWidth=0.5;
  for(let i=0;i<4;i++){
    let y=chartY+chartH*i/3;
    ctx.beginPath();ctx.moveTo(60,y);ctx.lineTo(W-10,y);ctx.stroke();
    let v=maxV-(maxV-minV)*i/3;
    ctx.fillStyle='#3a4a5a';ctx.font='9px JetBrains Mono';ctx.textAlign='right';
    ctx.fillText('$'+fmtK(v),55,y+3);
  }
  // Cost basis line
  let costY=chartY+(1-(totalCost-minV)/(maxV-minV))*chartH;
  ctx.setLineDash([4,4]);ctx.strokeStyle='#ff660066';ctx.lineWidth=1;
  ctx.beginPath();ctx.moveTo(60,costY);ctx.lineTo(W-10,costY);ctx.stroke();
  ctx.setLineDash([]);
  // Line
  let xStep=(W-70)/(pts.length-1);
  ctx.beginPath();ctx.strokeStyle='#00ff88';ctx.lineWidth=1.5;
  pts.forEach((v,i)=>{
    let x=60+i*xStep;let y=chartY+(1-(v-minV)/(maxV-minV))*chartH;
    if(i===0)ctx.moveTo(x,y);else ctx.lineTo(x,y);
  });
  ctx.stroke();
  ctx.fillStyle='#ff6600';ctx.font='11px JetBrains Mono';ctx.textAlign='center';
  ctx.fillText('PORTFOLIO PERFORMANCE (90D)',W/2,20);
}

let scrFilters={sector:'All',mcMin:'',mcMax:'',peMin:'',peMax:'',dyMin:'',priceMin:'',priceMax:''};

function renderScreener(){
  let html=`<div class="panel"><div class="panel-title">STOCK SCREENER</div><div class="screener-filters">`;
  html+=`<div><label>SECTOR</label><select id="scr-sector" onchange="scrFilters.sector=this.value;renderContent()"><option value="All">All Sectors</option>`;
  SECTORS.forEach(s=>{html+=`<option value="${s}" ${scrFilters.sector===s?'selected':''}>${s}</option>`;});
  html+=`</select></div>`;
  html+=`<div><label>PRICE MIN</label><input type="number" id="scr-pmin" value="${scrFilters.priceMin}" onchange="scrFilters.priceMin=this.value;renderContent()" placeholder="0"></div>`;
  html+=`<div><label>PRICE MAX</label><input type="number" id="scr-pmax" value="${scrFilters.priceMax}" onchange="scrFilters.priceMax=this.value;renderContent()" placeholder="Any"></div>`;
  html+=`<div><label>P/E MIN</label><input type="number" id="scr-pemin" value="${scrFilters.peMin}" onchange="scrFilters.peMin=this.value;renderContent()" placeholder="0"></div>`;
  html+=`<div><label>P/E MAX</label><input type="number" id="scr-pemax" value="${scrFilters.peMax}" onchange="scrFilters.peMax=this.value;renderContent()" placeholder="Any"></div>`;
  html+=`<div><label>DIV YIELD MIN %</label><input type="number" id="scr-dymin" value="${scrFilters.dyMin}" onchange="scrFilters.dyMin=this.value;renderContent()" step="0.1" placeholder="0"></div>`;
  html+=`</div>`;

  // Filter stocks
  let results=Object.values(stocks).filter(s=>{
    if(scrFilters.sector!=='All'&&s.sector!==scrFilters.sector)return false;
    if(scrFilters.priceMin&&s.price<parseFloat(scrFilters.priceMin))return false;
    if(scrFilters.priceMax&&s.price>parseFloat(scrFilters.priceMax))return false;
    if(scrFilters.peMin&&s.pe<parseFloat(scrFilters.peMin))return false;
    if(scrFilters.peMax&&s.pe>parseFloat(scrFilters.peMax))return false;
    if(scrFilters.dyMin&&s.dividendYield<parseFloat(scrFilters.dyMin))return false;
    return true;
  });

  // Sort
  results.sort((a,b)=>{
    let va,vb;
    switch(scrSortCol){
      case 'ticker':return a.ticker.localeCompare(b.ticker)*scrSortDir;
      case 'price':return(a.price-b.price)*scrSortDir;
      case 'pct':return(getPctChange(a)-getPctChange(b))*scrSortDir;
      case 'pe':return(a.pe-b.pe)*scrSortDir;
      case 'dy':return(a.dividendYield-b.dividendYield)*scrSortDir;
      case 'mcap':return(parseMcap(a.marketCap)-parseMcap(b.marketCap))*scrSortDir;
      case 'volume':return(a.volume-b.volume)*scrSortDir;
      default:return 0;
    }
  });

  let sc=(col)=>`onclick="sortScreener('${col}')" class="${scrSortCol===col?(scrSortDir===1?'sort-asc':'sort-desc'):''}"`;
  html+=`<div style="color:var(--text-dim);font-size:10px;margin:6px 0">${results.length} results</div>`;
  html+=`<table class="wl-table"><thead><tr><th></th><th ${sc('ticker')}>TICKER</th><th>NAME</th><th ${sc('price')}>PRICE</th><th ${sc('pct')}>% CHG</th><th>SECTOR</th><th ${sc('mcap')}>MCAP</th><th ${sc('pe')}>P/E</th><th ${sc('dy')}>DIV %</th><th ${sc('volume')}>VOLUME</th></tr></thead><tbody>`;
  results.forEach(s=>{
    let pct=getPctChange(s);
    let inWl=watchlist.includes(s.ticker);
    html+=`<tr onclick="openDetail('${s.ticker}')"><td><span class="${inWl?'wl-remove':'wl-add-btn'}" onclick="event.stopPropagation();${inWl?`removeWatchlist('${s.ticker}')`:`addWatchlist('${s.ticker}')`}">${inWl?'\u2212':'+'}</span></td><td style="color:var(--cyan);font-weight:600">${s.ticker}</td><td style="color:var(--text-dim);font-size:10px">${s.name}</td><td>$${fmt(s.price)}</td><td class="${chgClass(pct)}">${chgSign(pct)}${fmt(pct)}%</td><td style="font-size:10px;color:var(--text-dim)">${s.sector}</td><td>${s.marketCap}</td><td>${fmt(s.pe,1)}</td><td>${s.dividendYield?fmt(s.dividendYield,2)+'%':'--'}</td><td style="color:var(--text-dim)">${fmtK(s.volume)}</td></tr>`;
  });
  html+=`</tbody></table></div>`;
  return html;
}

function parseMcap(mc){
  if(!mc)return 0;
  let n=parseFloat(mc);
  if(mc.includes('T'))return n*1e12;
  if(mc.includes('B'))return n*1e9;
  if(mc.includes('M'))return n*1e6;
  return n;
}

function sortScreener(col){
  if(scrSortCol===col)scrSortDir*=-1;else{scrSortCol=col;scrSortDir=1;}
  renderContent();
}

document.addEventListener('keydown',function(e){
  // Ctrl+F - focus search
  if(e.ctrlKey&&e.key==='f'){e.preventDefault();document.getElementById('search-input').focus();return;}
  // Escape
  if(e.key==='Escape'){
    if(currentDetail){closeDetail();return;}
    document.getElementById('search-results').style.display='none';
    document.getElementById('search-input').blur();
    return;
  }
  // Number keys for tabs (only when not in input)
  if(document.activeElement.tagName!=='INPUT'&&document.activeElement.tagName!=='SELECT'){
    let tabs=['dashboard','watchlist','portfolio','screener','news'];
    let num=parseInt(e.key);
    if(num>=1&&num<=5){switchTab(tabs[num-1]);}
  }
});

function afterRender(){
  if(currentTab==='portfolio'){
    setTimeout(()=>{drawAllocChart();drawPerfChart();},50);
  }
}

// ==================== LIVE UPDATE LOOP ====================
function tick(){
  updatePrices();
  updateClock();
  renderIndexBar();
  // Update current view with live data
  if(currentDetail){
    // Update price in detail view without full re-render
    let s=stocks[currentDetail];
    if(s){
      let el=document.querySelector('.detail-big-price');
      if(el)el.textContent='$'+fmt(s.price);
      let ch=getChange(s);let pct=getPctChange(s);
      let chEl=document.querySelector('.detail-change');
      if(chEl){chEl.className='detail-change '+chgClass(ch);chEl.textContent=`${chgSign(ch)}${fmt(ch)} (${chgSign(pct)}${fmt(pct)}%)`;}
    }
  } else {
    renderContent();
  }
}

// ==================== INIT ====================
initStocks();
updateClock();
renderIndexBar();
setupSearch();
renderContent();

setInterval(tick, 2500);
setInterval(updateClock, 1000);
</script>
</body>
</html>
