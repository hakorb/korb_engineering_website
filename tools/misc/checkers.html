<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<meta name="description" content="Checkers | Korb Engineering — a free, browser-based productivity tool from Korb Engineering. No signup, no downloads, works on mobile.">
<title>Checkers | Korb Engineering</title>
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
  :root {
    --bg: #050a0f;
    --surface: #0a1018;
    --surface-2: #0e1520;
    --border: #1a2535;
    --cyan: #00d4ff;
    --orange: #ff6600;
    --green: #10b981;
    --red: #ef4444;
    --gold: #fbbf24;
    --text: #e2e8f0;
    --muted: #64748b;
  }
  html, body {
    background: var(--bg);
    color: var(--text);
    font-family: 'JetBrains Mono', monospace;
    min-height: 100vh;
    font-size: 14px;
  }
  body {
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 12px;
    gap: 12px;
  }
  header {
    width: 100%;
    max-width: 560px;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 6px;
    padding: 10px 14px;
    display: flex;
    justify-content: space-between;
    align-items: center;
    gap: 10px;
    flex-wrap: wrap;
  }
  h1 {
    font-size: 16px;
    font-weight: 700;
    color: var(--cyan);
    letter-spacing: 1px;
    text-transform: uppercase;
  }
  .sub { font-size: 10px; color: var(--muted); text-transform: uppercase; letter-spacing: 1px; }
  .status-bar {
    width: 100%;
    max-width: 560px;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 6px;
    padding: 10px 14px;
    display: grid;
    grid-template-columns: 1fr 1fr 1fr;
    gap: 8px;
    font-size: 11px;
  }
  .stat { display: flex; flex-direction: column; align-items: center; gap: 2px; }
  .stat-label { color: var(--muted); text-transform: uppercase; font-size: 9px; letter-spacing: 1px; }
  .stat-val { font-size: 14px; font-weight: 700; color: var(--text); }
  .stat-val.cyan { color: var(--cyan); }
  .stat-val.orange { color: var(--orange); }
  .players {
    width: 100%;
    max-width: 560px;
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 8px;
  }
  .player-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 6px;
    padding: 8px 10px;
    display: flex;
    flex-direction: column;
    gap: 4px;
    transition: all 0.2s;
  }
  .player-card.active.p1 { border-color: var(--cyan); box-shadow: 0 0 12px rgba(0,212,255,0.25); }
  .player-card.active.p2 { border-color: var(--orange); box-shadow: 0 0 12px rgba(255,102,0,0.25); }
  .player-name { font-size: 11px; text-transform: uppercase; letter-spacing: 1px; font-weight: 700; }
  .p1 .player-name { color: var(--cyan); }
  .p2 .player-name { color: var(--orange); }
  .captured {
    min-height: 20px;
    display: flex;
    flex-wrap: wrap;
    gap: 3px;
    align-items: center;
  }
  .cap-piece {
    width: 14px;
    height: 14px;
    border-radius: 50%;
    border: 1px solid var(--border);
  }
  .cap-piece.c1 { background: radial-gradient(circle at 35% 35%, #4de5ff, #00d4ff 60%, #006b85); }
  .cap-piece.c2 { background: radial-gradient(circle at 35% 35%, #ff9955, #ff6600 60%, #802f00); }
  #board-wrap {
    width: 100%;
    max-width: 560px;
    aspect-ratio: 1 / 1;
    background: var(--surface);
    border: 2px solid var(--border);
    border-radius: 8px;
    padding: 6px;
    position: relative;
  }
  #board {
    width: 100%;
    height: 100%;
    display: grid;
    grid-template-columns: repeat(8, 1fr);
    grid-template-rows: repeat(8, 1fr);
    border: 1px solid var(--border);
  }
  .sq {
    position: relative;
    display: flex;
    align-items: center;
    justify-content: center;
    user-select: none;
    cursor: pointer;
    min-width: 44px;
    min-height: 44px;
  }
  .sq.light { background: #162133; }
  .sq.dark { background: #0a1018; }
  .sq.last { box-shadow: inset 0 0 0 3px var(--gold); }
  .sq.selected::after {
    content: '';
    position: absolute;
    inset: 4px;
    border: 2px solid var(--cyan);
    border-radius: 4px;
    pointer-events: none;
    box-shadow: 0 0 10px var(--cyan);
  }
  .sq.move-dot::before {
    content: '';
    position: absolute;
    width: 28%;
    height: 28%;
    background: var(--cyan);
    border-radius: 50%;
    opacity: 0.7;
    box-shadow: 0 0 8px var(--cyan);
    pointer-events: none;
  }
  .sq.cap-dot::before {
    content: '';
    position: absolute;
    width: 28%;
    height: 28%;
    background: var(--red);
    border-radius: 50%;
    opacity: 0.8;
    box-shadow: 0 0 10px var(--red);
    pointer-events: none;
  }
  .piece {
    width: 78%;
    height: 78%;
    border-radius: 50%;
    border: 2px solid rgba(0,0,0,0.4);
    box-shadow: 0 3px 6px rgba(0,0,0,0.5), inset 0 -3px 5px rgba(0,0,0,0.4);
    position: relative;
    transition: transform 0.15s;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 18px;
    font-weight: 700;
    color: var(--gold);
    text-shadow: 0 0 4px rgba(0,0,0,0.7);
  }
  .piece.p1 { background: radial-gradient(circle at 35% 30%, #66ebff, #00d4ff 55%, #005266); }
  .piece.p2 { background: radial-gradient(circle at 35% 30%, #ffa066, #ff6600 55%, #802d00); }
  .piece.king { border-color: var(--gold); box-shadow: 0 0 10px rgba(251,191,36,0.6), 0 3px 6px rgba(0,0,0,0.5), inset 0 -3px 5px rgba(0,0,0,0.4); }
  .piece.selected { transform: scale(1.08); }
  .controls {
    width: 100%;
    max-width: 560px;
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(100px, 1fr));
    gap: 6px;
  }
  button {
    background: var(--surface-2);
    color: var(--text);
    border: 1px solid var(--border);
    border-radius: 5px;
    padding: 10px 8px;
    font-family: inherit;
    font-size: 11px;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 1px;
    cursor: pointer;
    min-height: 44px;
    transition: all 0.15s;
  }
  button:hover:not(:disabled) { border-color: var(--cyan); color: var(--cyan); }
  button:active:not(:disabled) { transform: scale(0.97); }
  button:disabled { opacity: 0.4; cursor: not-allowed; }
  button.primary { background: var(--cyan); color: var(--bg); border-color: var(--cyan); }
  button.primary:hover { filter: brightness(1.15); color: var(--bg); }
  .setup {
    width: 100%;
    max-width: 560px;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 6px;
    padding: 10px;
    display: flex;
    flex-direction: column;
    gap: 8px;
  }
  .setup-row {
    display: flex;
    gap: 6px;
    flex-wrap: wrap;
    align-items: center;
  }
  .setup-label {
    font-size: 10px;
    color: var(--muted);
    text-transform: uppercase;
    letter-spacing: 1px;
    min-width: 60px;
  }
  .seg { display: flex; flex: 1; border: 1px solid var(--border); border-radius: 5px; overflow: hidden; }
  .seg button {
    flex: 1;
    border: none;
    border-radius: 0;
    border-right: 1px solid var(--border);
    background: transparent;
    padding: 9px 4px;
    font-size: 10px;
  }
  .seg button:last-child { border-right: none; }
  .seg button.on { background: var(--cyan); color: var(--bg); }
  .seg button.on.orange { background: var(--orange); color: var(--bg); }
  .stats-panel {
    width: 100%;
    max-width: 560px;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 6px;
    padding: 10px 14px;
    font-size: 10px;
    color: var(--muted);
    text-transform: uppercase;
    letter-spacing: 1px;
    display: flex;
    justify-content: space-around;
    gap: 8px;
    flex-wrap: wrap;
  }
  .stats-panel span b { color: var(--green); font-weight: 700; }
  .modal {
    position: fixed;
    inset: 0;
    background: rgba(5,10,15,0.92);
    display: none;
    align-items: center;
    justify-content: center;
    z-index: 100;
    padding: 20px;
  }
  .modal.on { display: flex; }
  .modal-card {
    background: var(--surface);
    border: 2px solid var(--cyan);
    border-radius: 8px;
    padding: 24px;
    text-align: center;
    max-width: 360px;
    box-shadow: 0 0 40px rgba(0,212,255,0.4);
  }
  .modal-card.lose { border-color: var(--red); box-shadow: 0 0 40px rgba(239,68,68,0.4); }
  .modal h2 {
    font-size: 22px;
    color: var(--cyan);
    margin-bottom: 8px;
    text-transform: uppercase;
    letter-spacing: 2px;
  }
  .modal-card.lose h2 { color: var(--red); }
  .modal p { font-size: 12px; color: var(--muted); margin-bottom: 18px; }
  .confetti {
    position: absolute;
    width: 8px;
    height: 8px;
    pointer-events: none;
    animation: fall 2s linear forwards;
  }
  @keyframes fall {
    0% { transform: translateY(-20px) rotate(0); opacity: 1; }
    100% { transform: translateY(100vh) rotate(720deg); opacity: 0; }
  }
  .flipped { transform: rotate(180deg); }
  .flipped .piece { transform: rotate(180deg); }
  .flipped .piece.selected { transform: rotate(180deg) scale(1.08); }
  @media (max-width: 480px) {
    h1 { font-size: 13px; }
    .piece { font-size: 14px; }
  }
</style>
</head>
<body>
<header>
  <div>
    <h1>CHECKERS</h1>
    <div class="sub">Korb Engineering</div>
  </div>
  <div style="display:flex; gap:6px;">
    <button id="btn-sound" style="min-width:44px;padding:8px;">SND</button>
    <button id="btn-flip" style="min-width:44px;padding:8px;">FLIP</button>
  </div>
</header>

<div class="setup">
  <div class="setup-row">
    <div class="setup-label">Mode</div>
    <div class="seg" id="seg-mode">
      <button data-mode="pvp" class="on">2 Player</button>
      <button data-mode="ai">Vs AI</button>
    </div>
  </div>
  <div class="setup-row" id="diff-row" style="display:none;">
    <div class="setup-label">AI</div>
    <div class="seg" id="seg-diff">
      <button data-diff="easy" class="on orange">Easy</button>
      <button data-diff="medium">Medium</button>
      <button data-diff="hard">Hard</button>
    </div>
  </div>
</div>

<div class="status-bar">
  <div class="stat">
    <div class="stat-label">Turn</div>
    <div class="stat-val" id="turn-val">CYAN</div>
  </div>
  <div class="stat">
    <div class="stat-label">Move</div>
    <div class="stat-val" id="move-val">0</div>
  </div>
  <div class="stat">
    <div class="stat-label">Mode</div>
    <div class="stat-val" id="mode-val" style="font-size:11px;">PVP</div>
  </div>
</div>

<div class="players">
  <div class="player-card p1 active" id="pc1">
    <div class="player-name">Player 1 (Cyan)</div>
    <div class="captured" id="cap1"></div>
  </div>
  <div class="player-card p2" id="pc2">
    <div class="player-name">Player 2 (Orange)</div>
    <div class="captured" id="cap2"></div>
  </div>
</div>

<div id="board-wrap">
  <div id="board"></div>
</div>

<div class="controls">
  <button id="btn-new" class="primary">New Game</button>
  <button id="btn-undo">Undo</button>
</div>

<div class="stats-panel" id="stats-panel"></div>

<div class="modal" id="modal">
  <div class="modal-card" id="modal-card">
    <h2 id="modal-title">VICTORY</h2>
    <p id="modal-text">Player 1 wins!</p>
    <button class="primary" id="modal-close">Play Again</button>
  </div>
</div>

<script>
(function(){
  'use strict';

  const STORAGE_KEY = 'korb_checkers_';
  const SIZE = 8;
  const P1 = 1, P2 = 2;
  const K1 = 3, K2 = 4;

  let board = [];
  let turn = P1;
  let selected = null;
  let legalMoves = [];
  let mustJumpFrom = null;
  let moveCount = 0;
  let history = [];
  let captured1 = 0, captured2 = 0;
  let lastMove = null;
  let gameOver = false;
  let mode = 'pvp';
  let difficulty = 'easy';
  let soundOn = true;
  let flipped = false;
  let aiThinking = false;

  // Audio
  let ac = null;
  function ensureAudio(){
    if(!ac){ try { ac = new (window.AudioContext || window.webkitAudioContext)(); } catch(e){} }
  }
  function beep(freq, dur, type, vol){
    if(!soundOn) return;
    ensureAudio();
    if(!ac) return;
    const o = ac.createOscillator();
    const g = ac.createGain();
    o.type = type || 'sine';
    o.frequency.value = freq;
    g.gain.value = vol || 0.1;
    g.gain.setValueAtTime(vol || 0.1, ac.currentTime);
    g.gain.exponentialRampToValueAtTime(0.001, ac.currentTime + dur);
    o.connect(g); g.connect(ac.destination);
    o.start();
    o.stop(ac.currentTime + dur);
  }
  function sndMove(){ beep(440, 0.08, 'square', 0.08); }
  function sndCap(){ beep(220, 0.08, 'sawtooth', 0.12); setTimeout(()=>beep(160,0.12,'sawtooth',0.12),60); }
  function sndKing(){ beep(880, 0.12, 'sine', 0.15); setTimeout(()=>beep(1320,0.18,'sine',0.12),100); }
  function sndWin(){
    const notes = [523, 659, 784, 1047];
    notes.forEach((n,i)=> setTimeout(()=>beep(n, 0.25, 'triangle', 0.15), i*140));
  }
  function sndLose(){ beep(220, 0.3, 'sawtooth', 0.12); setTimeout(()=>beep(165, 0.4, 'sawtooth', 0.12), 200); }

  // Init board
  function newBoard(){
    const b = [];
    for(let r=0;r<SIZE;r++){
      const row = [];
      for(let c=0;c<SIZE;c++){
        if((r+c)%2===1){
          if(r<3) row.push(P2);
          else if(r>4) row.push(P1);
          else row.push(0);
        } else row.push(0);
      }
      b.push(row);
    }
    return b;
  }

  function isP1(v){ return v===P1 || v===K1; }
  function isP2(v){ return v===P2 || v===K2; }
  function isKing(v){ return v===K1 || v===K2; }
  function owner(v){ return isP1(v) ? P1 : (isP2(v) ? P2 : 0); }
  function inBounds(r,c){ return r>=0 && r<SIZE && c>=0 && c<SIZE; }

  function getDirs(v){
    if(v===P1) return [[-1,-1],[-1,1]];
    if(v===P2) return [[1,-1],[1,1]];
    if(isKing(v)) return [[-1,-1],[-1,1],[1,-1],[1,1]];
    return [];
  }

  // Get all moves for player; forced captures override
  function getAllMoves(b, player){
    const simple = [];
    const caps = [];
    for(let r=0;r<SIZE;r++){
      for(let c=0;c<SIZE;c++){
        const v = b[r][c];
        if(owner(v)!==player) continue;
        const pm = getPieceMoves(b, r, c);
        pm.forEach(m=>{
          if(m.captures.length>0) caps.push(m);
          else simple.push(m);
        });
      }
    }
    return caps.length > 0 ? caps : simple;
  }

  // Get moves for a single piece; returns list of move objects {fr,fc,path:[[r,c],...],captures:[[r,c],...]}
  function getPieceMoves(b, r, c){
    const v = b[r][c];
    if(!v) return [];
    const dirs = getDirs(v);
    // Try captures first (multi-jumps)
    const caps = findJumps(b, r, c, v, dirs, [], []);
    if(caps.length > 0){
      return caps.map(path => ({
        fr: r, fc: c,
        path: path.steps,
        captures: path.caps
      }));
    }
    // Simple moves
    const out = [];
    for(const [dr,dc] of dirs){
      const nr = r+dr, nc = c+dc;
      if(inBounds(nr,nc) && b[nr][nc]===0){
        out.push({ fr:r, fc:c, path:[[nr,nc]], captures: [] });
      }
    }
    return out;
  }

  function findJumps(b, r, c, piece, dirs, steps, caps){
    const results = [];
    let any = false;
    for(const [dr,dc] of dirs){
      const mr = r+dr, mc = c+dc;
      const lr = r+2*dr, lc = c+2*dc;
      if(!inBounds(lr,lc)) continue;
      if(b[lr][lc] !== 0) continue;
      const mv = b[mr][mc];
      if(mv===0) continue;
      if(owner(mv) === owner(piece)) continue;
      // Don't re-capture same piece
      if(caps.some(([cr,cc])=>cr===mr && cc===mc)) continue;
      any = true;
      // Simulate jump
      const nb = b.map(row=>row.slice());
      nb[r][c] = 0;
      nb[mr][mc] = 0;
      // Promotion check mid-jump: in American checkers, promotion ends the turn
      let becameKing = false;
      let newPiece = piece;
      if(piece===P1 && lr===0){ newPiece = K1; becameKing = true; }
      else if(piece===P2 && lr===SIZE-1){ newPiece = K2; becameKing = true; }
      nb[lr][lc] = newPiece;
      const newSteps = steps.concat([[lr,lc]]);
      const newCaps = caps.concat([[mr,mc]]);
      if(becameKing){
        results.push({ steps: newSteps, caps: newCaps });
      } else {
        const further = findJumps(nb, lr, lc, newPiece, getDirs(newPiece), newSteps, newCaps);
        if(further.length === 0){
          results.push({ steps: newSteps, caps: newCaps });
        } else {
          results.push(...further);
        }
      }
    }
    return results;
  }

  // Apply a move to a board
  function applyMove(b, mv){
    const piece = b[mv.fr][mv.fc];
    b[mv.fr][mv.fc] = 0;
    const last = mv.path[mv.path.length-1];
    let newPiece = piece;
    if(piece===P1 && last[0]===0) newPiece = K1;
    else if(piece===P2 && last[0]===SIZE-1) newPiece = K2;
    b[last[0]][last[1]] = newPiece;
    for(const [cr,cc] of mv.captures){
      b[cr][cc] = 0;
    }
    return { promoted: newPiece !== piece };
  }

  // Render
  const boardEl = document.getElementById('board');
  function render(){
    boardEl.innerHTML = '';
    for(let r=0;r<SIZE;r++){
      for(let c=0;c<SIZE;c++){
        const sq = document.createElement('div');
        sq.className = 'sq ' + ((r+c)%2===0 ? 'light' : 'dark');
        sq.dataset.r = r;
        sq.dataset.c = c;
        if(lastMove){
          if((lastMove.fr===r && lastMove.fc===c) ||
             (lastMove.path[lastMove.path.length-1][0]===r && lastMove.path[lastMove.path.length-1][1]===c)){
            sq.classList.add('last');
          }
        }
        const v = board[r][c];
        if(v){
          const p = document.createElement('div');
          p.className = 'piece ' + (isP1(v)?'p1':'p2') + (isKing(v)?' king':'');
          if(isKing(v)) p.textContent = 'K';
          if(selected && selected[0]===r && selected[1]===c) p.classList.add('selected');
          sq.appendChild(p);
        }
        if(selected && selected[0]===r && selected[1]===c) sq.classList.add('selected');
        // Move hint
        if(selected){
          for(const mv of legalMoves){
            if(mv.fr===selected[0] && mv.fc===selected[1]){
              const dest = mv.path[0]; // immediate first step to highlight? we highlight the final
              const finalD = mv.path[mv.path.length-1];
              if(finalD[0]===r && finalD[1]===c){
                sq.classList.add(mv.captures.length>0 ? 'cap-dot' : 'move-dot');
              }
            }
          }
        }
        sq.addEventListener('click', onSqClick);
        boardEl.appendChild(sq);
      }
    }
    boardEl.classList.toggle('flipped', flipped);
    document.getElementById('turn-val').textContent = turn===P1?'CYAN':'ORANGE';
    document.getElementById('turn-val').className = 'stat-val ' + (turn===P1?'cyan':'orange');
    document.getElementById('move-val').textContent = moveCount;
    document.getElementById('mode-val').textContent = mode==='pvp' ? 'PVP' : ('AI-'+difficulty.slice(0,3).toUpperCase());
    document.getElementById('pc1').classList.toggle('active', turn===P1);
    document.getElementById('pc2').classList.toggle('active', turn===P2);
    renderCaptured();
    document.getElementById('btn-undo').disabled = history.length===0 || aiThinking;
  }

  function renderCaptured(){
    const c1 = document.getElementById('cap1');
    const c2 = document.getElementById('cap2');
    c1.innerHTML = '';
    c2.innerHTML = '';
    // P1's captured show as orange pieces (P2 pieces it captured)
    for(let i=0;i<captured2;i++){
      const d = document.createElement('div');
      d.className = 'cap-piece c2';
      c1.appendChild(d);
    }
    for(let i=0;i<captured1;i++){
      const d = document.createElement('div');
      d.className = 'cap-piece c1';
      c2.appendChild(d);
    }
  }

  function onSqClick(e){
    if(gameOver || aiThinking) return;
    if(mode==='ai' && turn===P2) return;
    const r = +this.dataset.r;
    const c = +this.dataset.c;
    const v = board[r][c];
    // If we have a selection, check if this is a destination
    if(selected){
      for(const mv of legalMoves){
        if(mv.fr===selected[0] && mv.fc===selected[1]){
          const fin = mv.path[mv.path.length-1];
          if(fin[0]===r && fin[1]===c){
            executeMove(mv);
            return;
          }
        }
      }
      // Else try to select another of our own pieces
      if(owner(v)===turn){
        trySelect(r,c);
        return;
      }
      // Deselect
      selected = null;
      render();
      return;
    }
    // No selection
    if(owner(v)===turn){
      trySelect(r,c);
    }
  }

  function trySelect(r,c){
    // Only pieces with available moves (respecting forced capture)
    const all = getAllMoves(board, turn);
    const pieceMoves = all.filter(m => m.fr===r && m.fc===c);
    if(pieceMoves.length===0) return;
    selected = [r,c];
    render();
  }

  function executeMove(mv){
    // Push to history
    history.push({
      board: board.map(row=>row.slice()),
      turn, moveCount, captured1, captured2, lastMove
    });
    const nb = board.map(row=>row.slice());
    const res = applyMove(nb, mv);
    board = nb;
    if(mv.captures.length > 0){
      if(turn===P1) captured2 += mv.captures.length;
      else captured1 += mv.captures.length;
      sndCap();
    } else {
      sndMove();
    }
    if(res.promoted) sndKing();
    lastMove = mv;
    moveCount++;
    selected = null;
    turn = turn===P1 ? P2 : P1;
    legalMoves = getAllMoves(board, turn);
    render();
    // Check game over
    if(legalMoves.length === 0){
      gameOver = true;
      const winner = turn===P1 ? P2 : P1;
      showWin(winner);
      return;
    }
    // AI turn
    if(mode==='ai' && turn===P2 && !gameOver){
      aiThinking = true;
      render();
      setTimeout(aiMove, 300);
    }
  }

  // AI
  function aiMove(){
    const moves = getAllMoves(board, P2);
    if(moves.length===0){ aiThinking=false; return; }
    let chosen;
    if(difficulty==='easy'){
      chosen = moves[Math.floor(Math.random()*moves.length)];
    } else if(difficulty==='medium'){
      // Greedy: max captures, then toward king row
      let best = -Infinity;
      let bestMoves = [];
      for(const m of moves){
        let s = m.captures.length * 10;
        // Count kings captured as more
        for(const [cr,cc] of m.captures){
          if(isKing(board[cr][cc])) s += 5;
        }
        const fin = m.path[m.path.length-1];
        s += fin[0]; // row 7 good for P2
        if(s>best){ best=s; bestMoves=[m]; }
        else if(s===best) bestMoves.push(m);
      }
      chosen = bestMoves[Math.floor(Math.random()*bestMoves.length)];
    } else {
      // Hard: minimax
      const depth = 5;
      const res = minimax(board, depth, -Infinity, Infinity, true);
      chosen = res.move || moves[0];
    }
    aiThinking = false;
    executeMove(chosen);
  }

  function evaluate(b){
    // + for P2, - for P1
    let s = 0;
    for(let r=0;r<SIZE;r++){
      for(let c=0;c<SIZE;c++){
        const v = b[r][c];
        if(v===P1) s -= 10 + (SIZE-1-r)*0.3;
        else if(v===K1) s -= 18;
        else if(v===P2) s += 10 + r*0.3;
        else if(v===K2) s += 18;
      }
    }
    return s;
  }

  function minimax(b, depth, alpha, beta, maxing){
    const player = maxing ? P2 : P1;
    const moves = getAllMoves(b, player);
    if(depth===0 || moves.length===0){
      let score = evaluate(b);
      if(moves.length===0) score += maxing ? -1000 : 1000;
      return { score };
    }
    let bestMove = null;
    if(maxing){
      let best = -Infinity;
      for(const m of moves){
        const nb = b.map(row=>row.slice());
        applyMove(nb, m);
        const r = minimax(nb, depth-1, alpha, beta, false);
        if(r.score > best){ best = r.score; bestMove = m; }
        alpha = Math.max(alpha, best);
        if(beta <= alpha) break;
      }
      return { score: best, move: bestMove };
    } else {
      let best = Infinity;
      for(const m of moves){
        const nb = b.map(row=>row.slice());
        applyMove(nb, m);
        const r = minimax(nb, depth-1, alpha, beta, true);
        if(r.score < best){ best = r.score; bestMove = m; }
        beta = Math.min(beta, best);
        if(beta <= alpha) break;
      }
      return { score: best, move: bestMove };
    }
  }

  // Win display + stats
  function loadStats(){
    try {
      return JSON.parse(localStorage.getItem(STORAGE_KEY+'stats')) || {
        easy: {w:0,l:0}, medium:{w:0,l:0}, hard:{w:0,l:0}, pvp:{p1:0,p2:0}
      };
    } catch(e){ return { easy:{w:0,l:0}, medium:{w:0,l:0}, hard:{w:0,l:0}, pvp:{p1:0,p2:0} }; }
  }
  function saveStats(s){
    try { localStorage.setItem(STORAGE_KEY+'stats', JSON.stringify(s)); } catch(e){}
  }
  function renderStats(){
    const s = loadStats();
    document.getElementById('stats-panel').innerHTML =
      `<span>PvP: <b>${s.pvp.p1}</b>-<b>${s.pvp.p2}</b></span>` +
      `<span>Easy: <b>${s.easy.w}W</b>/${s.easy.l}L</span>` +
      `<span>Med: <b>${s.medium.w}W</b>/${s.medium.l}L</span>` +
      `<span>Hard: <b>${s.hard.w}W</b>/${s.hard.l}L</span>`;
  }

  function showWin(winner){
    const stats = loadStats();
    let title, text, lose=false;
    if(mode==='pvp'){
      if(winner===P1){ stats.pvp.p1++; title='CYAN WINS'; text='Player 1 takes the board.'; }
      else { stats.pvp.p2++; title='ORANGE WINS'; text='Player 2 takes the board.'; }
    } else {
      if(winner===P1){ stats[difficulty].w++; title='VICTORY'; text='You beat the '+difficulty+' AI!'; }
      else { stats[difficulty].l++; title='DEFEAT'; text='The '+difficulty+' AI wins.'; lose=true; }
    }
    saveStats(stats);
    renderStats();
    document.getElementById('modal-title').textContent = title;
    document.getElementById('modal-text').textContent = text;
    document.getElementById('modal-card').classList.toggle('lose', lose);
    document.getElementById('modal').classList.add('on');
    if(lose) sndLose(); else { sndWin(); confetti(); }
  }

  function confetti(){
    const colors = ['#00d4ff','#ff6600','#fbbf24','#10b981'];
    for(let i=0;i<40;i++){
      const d = document.createElement('div');
      d.className = 'confetti';
      d.style.background = colors[Math.floor(Math.random()*colors.length)];
      d.style.left = Math.random()*100+'%';
      d.style.top = '0';
      d.style.animationDelay = (Math.random()*0.5)+'s';
      document.body.appendChild(d);
      setTimeout(()=>d.remove(), 2500);
    }
  }

  // Controls
  function newGame(){
    board = newBoard();
    turn = P1;
    selected = null;
    moveCount = 0;
    history = [];
    captured1 = 0; captured2 = 0;
    lastMove = null;
    gameOver = false;
    aiThinking = false;
    legalMoves = getAllMoves(board, turn);
    document.getElementById('modal').classList.remove('on');
    render();
  }

  function undo(){
    if(history.length===0) return;
    // Undo one; if AI mode and it's P1's turn now, undo twice (AI move + player's move)
    let steps = 1;
    if(mode==='ai' && turn===P1 && history.length >= 2) steps = 2;
    for(let i=0;i<steps;i++){
      const h = history.pop();
      if(!h) break;
      board = h.board;
      turn = h.turn;
      moveCount = h.moveCount;
      captured1 = h.captured1;
      captured2 = h.captured2;
      lastMove = h.lastMove;
    }
    selected = null;
    gameOver = false;
    legalMoves = getAllMoves(board, turn);
    document.getElementById('modal').classList.remove('on');
    render();
  }

  document.getElementById('btn-new').addEventListener('click', newGame);
  document.getElementById('btn-undo').addEventListener('click', undo);
  document.getElementById('btn-flip').addEventListener('click', ()=>{
    flipped = !flipped;
    render();
  });
  document.getElementById('btn-sound').addEventListener('click', function(){
    soundOn = !soundOn;
    this.style.color = soundOn ? 'var(--cyan)' : 'var(--muted)';
    this.textContent = soundOn ? 'SND' : 'MUTE';
    if(soundOn){ ensureAudio(); beep(660,0.08,'sine',0.08); }
  });
  document.getElementById('modal-close').addEventListener('click', newGame);

  document.querySelectorAll('#seg-mode button').forEach(b=>{
    b.addEventListener('click', ()=>{
      document.querySelectorAll('#seg-mode button').forEach(x=>x.classList.remove('on'));
      b.classList.add('on');
      mode = b.dataset.mode;
      document.getElementById('diff-row').style.display = mode==='ai' ? 'flex' : 'none';
      newGame();
    });
  });
  document.querySelectorAll('#seg-diff button').forEach(b=>{
    b.addEventListener('click', ()=>{
      document.querySelectorAll('#seg-diff button').forEach(x=>x.classList.remove('on','orange'));
      b.classList.add('on','orange');
      difficulty = b.dataset.diff;
      newGame();
    });
  });

  newGame();
  renderStats();
})();
</script>
</body>
</html>
