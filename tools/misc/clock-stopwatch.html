<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="description" content="Clock &amp; Stopwatch | Korb Engineering — a free, browser-based productivity tool from Korb Engineering. No signup, no downloads, works on mobile.">
<title>Clock & Stopwatch | Korb Engineering</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{--bg:#050a0f;--surface:#0a1018;--surface2:#0e1520;--border:#1a2535;--text:#e2e8f0;--cyan:#00d4ff;--orange:#ff6600;--green:#10b981;--red:#ef4444;--font:'JetBrains Mono',monospace}
html{font-size:16px}
body{background:var(--bg);color:var(--text);font-family:var(--font);min-height:100vh;line-height:1.6;transition:background 0.3s,color 0.3s}
body.light{--bg:#f0f2f5;--surface:#ffffff;--surface2:#e8eaed;--border:#d0d4da;--text:#1a1a2e;--cyan:#0088cc;--orange:#cc5500;--green:#059669;--red:#dc2626}

.header{background:var(--surface);border-bottom:1px solid var(--border);padding:1rem 1.5rem;display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:0.5rem}
.header .brand{display:flex;align-items:center;gap:0.75rem}
.header .brand .logo{width:32px;height:32px;border:2px solid var(--cyan);border-radius:4px;display:flex;align-items:center;justify-content:center;font-weight:700;font-size:14px;color:var(--cyan)}
.header .brand h1{font-size:1rem;font-weight:600;color:var(--cyan)}
.header .tool-title{font-size:0.85rem;opacity:0.7}
.header-actions{display:flex;gap:0.5rem;align-items:center}

.container{max-width:1200px;margin:0 auto;padding:1rem}
.tabs{display:flex;gap:0.25rem;border-bottom:1px solid var(--border);margin-bottom:1rem;overflow-x:auto;-webkit-overflow-scrolling:touch}
.tab{padding:0.75rem 1rem;min-height:44px;background:none;border:none;color:var(--text);opacity:0.6;font-family:var(--font);font-size:0.8rem;cursor:pointer;white-space:nowrap;border-bottom:2px solid transparent;transition:all 0.2s}
.tab.active{opacity:1;color:var(--cyan);border-bottom-color:var(--cyan)}
.tab:hover{opacity:0.9}
.tab-content{display:none}
.tab-content.active{display:block}

.card{background:var(--surface);border:1px solid var(--border);border-radius:8px;padding:1.25rem;margin-bottom:1rem}
.card h2{font-size:0.95rem;color:var(--cyan);margin-bottom:1rem;font-weight:600}

.form-group{display:flex;flex-direction:column;gap:0.25rem}
.form-group label{font-size:0.7rem;opacity:0.7;text-transform:uppercase;letter-spacing:0.05em}
input,select{background:var(--surface2);border:1px solid var(--border);border-radius:6px;padding:0.6rem 0.75rem;color:var(--text);font-family:var(--font);font-size:16px;min-height:44px;transition:border-color 0.2s}
input:focus,select:focus{outline:none;border-color:var(--cyan)}

.btn{min-height:44px;padding:0.6rem 1.25rem;border:none;border-radius:6px;font-family:var(--font);font-size:0.8rem;font-weight:600;cursor:pointer;transition:all 0.2s;display:inline-flex;align-items:center;gap:0.5rem}
.btn-primary{background:var(--cyan);color:#050a0f}
.btn-primary:hover{opacity:0.85}
.btn-secondary{background:var(--surface2);color:var(--text);border:1px solid var(--border)}
.btn-secondary:hover{border-color:var(--cyan)}
.btn-danger{background:var(--red);color:#fff}
.btn-danger:hover{opacity:0.85}
.btn-success{background:var(--green);color:#fff}
.btn-success:hover{opacity:0.85}
.btn-orange{background:var(--orange);color:#fff}
.btn-orange:hover{opacity:0.85}
.btn-sm{min-height:36px;padding:0.4rem 0.75rem;font-size:0.7rem}
.btn-row{display:flex;gap:0.5rem;flex-wrap:wrap;margin-top:0.75rem}
.btn-icon{min-height:44px;min-width:44px;padding:0;display:flex;align-items:center;justify-content:center;background:var(--surface2);border:1px solid var(--border);border-radius:6px;color:var(--text);font-family:var(--font);font-size:1.2rem;cursor:pointer}
.btn-icon:hover{border-color:var(--cyan)}

/* Clock */
.clock-display{text-align:center;padding:2rem 0}
.clock-time{font-size:clamp(2.5rem,10vw,5rem);font-weight:700;color:var(--cyan);letter-spacing:0.05em;line-height:1}
.clock-date{font-size:clamp(0.8rem,3vw,1.1rem);opacity:0.6;margin-top:0.5rem}
.clock-seconds{color:var(--orange)}

/* Analog clock */
.analog-wrap{display:flex;justify-content:center;margin:1.5rem 0}
#analog-clock{border-radius:50%;border:2px solid var(--border)}

/* World clocks */
.world-clocks{display:grid;grid-template-columns:repeat(auto-fill,minmax(200px,1fr));gap:0.75rem;margin-top:1rem}
.world-clock-card{background:var(--surface2);border:1px solid var(--border);border-radius:6px;padding:0.75rem;text-align:center;position:relative}
.world-clock-card .wc-time{font-size:1.4rem;font-weight:700;color:var(--cyan)}
.world-clock-card .wc-label{font-size:0.7rem;opacity:0.6;margin-top:0.2rem}
.world-clock-card .wc-date{font-size:0.65rem;opacity:0.4}
.world-clock-card .wc-del{position:absolute;top:4px;right:6px;background:none;border:none;color:var(--red);font-size:0.8rem;cursor:pointer;font-family:var(--font);opacity:0.6}
.world-clock-card .wc-del:hover{opacity:1}

/* Stopwatch */
.stopwatch-display{text-align:center;padding:1.5rem 0}
.stopwatch-time{font-size:clamp(2rem,8vw,4rem);font-weight:700;color:var(--green);font-variant-numeric:tabular-nums}
.stopwatch-ms{color:var(--orange);font-size:0.6em}
.lap-list{max-height:300px;overflow-y:auto;margin-top:1rem}
.lap-item{display:flex;justify-content:space-between;padding:0.4rem 0.5rem;font-size:0.75rem;border-bottom:1px solid var(--border)}
.lap-item:nth-child(odd){background:var(--surface2)}
.lap-best{color:var(--green);font-weight:600}
.lap-worst{color:var(--red);font-weight:600}

/* Timer */
.timer-display{text-align:center;padding:1.5rem 0}
.timer-time{font-size:clamp(2rem,8vw,4rem);font-weight:700;color:var(--orange);font-variant-numeric:tabular-nums}
.timer-presets{display:flex;gap:0.5rem;flex-wrap:wrap;justify-content:center;margin:1rem 0}
.timer-preset{min-height:44px;padding:0.5rem 1rem;background:var(--surface2);border:1px solid var(--border);border-radius:6px;color:var(--text);font-family:var(--font);font-size:0.75rem;cursor:pointer}
.timer-preset:hover{border-color:var(--cyan)}
.timer-input-row{display:flex;gap:0.5rem;justify-content:center;align-items:center;margin:1rem 0;flex-wrap:wrap}
.timer-input-row input{width:70px;text-align:center}
.timer-input-row span{font-size:0.8rem;opacity:0.6}

/* Alarms */
.alarm-list{display:flex;flex-direction:column;gap:0.5rem;margin-top:1rem}
.alarm-item{background:var(--surface2);border:1px solid var(--border);border-radius:6px;padding:0.75rem;display:flex;align-items:center;justify-content:space-between;gap:0.5rem;flex-wrap:wrap}
.alarm-item .alarm-time{font-size:1.1rem;font-weight:700;color:var(--cyan)}
.alarm-item .alarm-label{font-size:0.75rem;opacity:0.7}
.alarm-toggle{width:48px;height:26px;border-radius:13px;border:none;cursor:pointer;position:relative;transition:background 0.2s}
.alarm-toggle.on{background:var(--green)}
.alarm-toggle.off{background:var(--border)}
.alarm-toggle::after{content:'';position:absolute;width:20px;height:20px;border-radius:50%;background:#fff;top:3px;left:3px;transition:left 0.2s}
.alarm-toggle.on::after{left:25px}

/* Fullscreen */
.fullscreen-overlay{display:none;position:fixed;top:0;left:0;width:100%;height:100%;background:var(--bg);z-index:9999;flex-direction:column;align-items:center;justify-content:center}
.fullscreen-overlay.active{display:flex}
.fullscreen-overlay .fs-time{font-size:clamp(4rem,15vw,10rem);font-weight:700;color:var(--cyan);letter-spacing:0.05em}
.fullscreen-overlay .fs-date{font-size:clamp(1rem,4vw,2rem);opacity:0.5;margin-top:0.5rem}
.fullscreen-overlay .fs-close{position:absolute;top:1rem;right:1rem;font-size:2rem;background:none;border:none;color:var(--text);cursor:pointer;min-height:44px;min-width:44px}

@media(max-width:768px){.container{padding:0.75rem}}
</style>
</head>
<body>
<div class="header">
  <div class="brand">
    <div class="logo">KE</div>
    <h1>Korb Engineering</h1>
  </div>
  <div class="tool-title">Clock & Stopwatch</div>
  <div class="header-actions">
    <button class="btn-icon" onclick="toggleTheme()" title="Toggle theme" id="theme-btn">&#9681;</button>
    <button class="btn-icon" onclick="openFullscreen()" title="Fullscreen">&#9974;</button>
  </div>
</div>

<div class="container">
  <div class="tabs">
    <button class="tab active" data-tab="clock">Clock</button>
    <button class="tab" data-tab="stopwatch">Stopwatch</button>
    <button class="tab" data-tab="timer">Timer</button>
    <button class="tab" data-tab="alarms">Alarms</button>
  </div>

  <!-- CLOCK TAB -->
  <div class="tab-content active" id="tab-clock">
    <div class="card">
      <div class="clock-display">
        <div class="clock-time" id="digital-clock"></div>
        <div class="clock-date" id="digital-date"></div>
      </div>
      <div class="analog-wrap">
        <canvas id="analog-clock" width="280" height="280"></canvas>
      </div>
    </div>
    <div class="card">
      <h2>World Clocks</h2>
      <div style="display:flex;gap:0.5rem;flex-wrap:wrap;align-items:flex-end">
        <div class="form-group" style="flex:1;min-width:180px">
          <label>Add Time Zone</label>
          <select id="wc-timezone">
            <option value="America/New_York">New York (ET)</option>
            <option value="America/Chicago">Chicago (CT)</option>
            <option value="America/Denver">Denver (MT)</option>
            <option value="America/Los_Angeles">Los Angeles (PT)</option>
            <option value="America/Anchorage">Anchorage (AK)</option>
            <option value="Pacific/Honolulu">Honolulu (HI)</option>
            <option value="UTC">UTC / Zulu</option>
            <option value="Europe/London">London (GMT/BST)</option>
            <option value="Europe/Paris">Paris (CET)</option>
            <option value="Europe/Berlin">Berlin (CET)</option>
            <option value="Asia/Dubai">Dubai (GST)</option>
            <option value="Asia/Kolkata">Mumbai (IST)</option>
            <option value="Asia/Shanghai">Shanghai (CST)</option>
            <option value="Asia/Tokyo">Tokyo (JST)</option>
            <option value="Australia/Sydney">Sydney (AEST)</option>
          </select>
        </div>
        <div class="form-group" style="min-width:120px">
          <label>Label</label>
          <input type="text" id="wc-label" placeholder="Custom label">
        </div>
        <button class="btn btn-primary btn-sm" onclick="addWorldClock()">Add</button>
      </div>
      <div class="world-clocks" id="world-clocks"></div>
    </div>
  </div>

  <!-- STOPWATCH TAB -->
  <div class="tab-content" id="tab-stopwatch">
    <div class="card">
      <div class="stopwatch-display">
        <div class="stopwatch-time" id="sw-display">00:00:00<span class="stopwatch-ms">.000</span></div>
      </div>
      <div class="btn-row" style="justify-content:center">
        <button class="btn btn-success" id="sw-start" onclick="swStart()">Start</button>
        <button class="btn btn-orange" id="sw-lap" onclick="swLap()" disabled>Lap</button>
        <button class="btn btn-danger" id="sw-reset" onclick="swReset()" disabled>Reset</button>
      </div>
      <div class="lap-list" id="sw-laps"></div>
    </div>
  </div>

  <!-- TIMER TAB -->
  <div class="tab-content" id="tab-timer">
    <div class="card">
      <div class="timer-display">
        <div class="timer-time" id="timer-display">00:00:00</div>
      </div>
      <div class="timer-input-row" id="timer-inputs">
        <input type="number" id="timer-hrs" min="0" max="99" value="0" placeholder="HH"> <span>h</span>
        <input type="number" id="timer-min" min="0" max="59" value="5" placeholder="MM"> <span>m</span>
        <input type="number" id="timer-sec" min="0" max="59" value="0" placeholder="SS"> <span>s</span>
      </div>
      <div class="timer-presets" id="timer-presets">
        <button class="timer-preset" onclick="setTimer(0,1,0)">1 min</button>
        <button class="timer-preset" onclick="setTimer(0,3,0)">3 min</button>
        <button class="timer-preset" onclick="setTimer(0,5,0)">5 min</button>
        <button class="timer-preset" onclick="setTimer(0,10,0)">10 min</button>
        <button class="timer-preset" onclick="setTimer(0,15,0)">15 min</button>
        <button class="timer-preset" onclick="setTimer(0,25,0)">Pomodoro (25m)</button>
        <button class="timer-preset" onclick="setTimer(0,50,0)">Pomodoro (50m)</button>
        <button class="timer-preset" onclick="setTimer(1,0,0)">1 hr</button>
      </div>
      <div class="btn-row" style="justify-content:center">
        <button class="btn btn-success" id="timer-start" onclick="timerStart()">Start</button>
        <button class="btn btn-danger" id="timer-reset" onclick="timerReset()">Reset</button>
      </div>
    </div>
    <div class="card">
      <h2>Custom Timer Presets</h2>
      <div style="display:flex;gap:0.5rem;flex-wrap:wrap;align-items:flex-end">
        <div class="form-group"><label>Label</label><input type="text" id="cp-label" placeholder="My timer" style="width:140px"></div>
        <div class="form-group"><label>Minutes</label><input type="number" id="cp-min" min="1" value="15" style="width:80px"></div>
        <button class="btn btn-primary btn-sm" onclick="addCustomPreset()">Save Preset</button>
      </div>
      <div class="timer-presets" id="custom-presets" style="margin-top:0.75rem"></div>
    </div>
  </div>

  <!-- ALARMS TAB -->
  <div class="tab-content" id="tab-alarms">
    <div class="card">
      <h2>Set Alarm</h2>
      <div style="display:flex;gap:0.5rem;flex-wrap:wrap;align-items:flex-end">
        <div class="form-group"><label>Time</label><input type="time" id="alarm-time"></div>
        <div class="form-group"><label>Label</label><input type="text" id="alarm-label" placeholder="Wake up" style="width:160px"></div>
        <button class="btn btn-primary" onclick="addAlarm()">Add Alarm</button>
      </div>
      <div class="alarm-list" id="alarm-list"></div>
    </div>
  </div>
</div>

<!-- Fullscreen overlay -->
<div class="fullscreen-overlay" id="fullscreen">
  <button class="fs-close" onclick="closeFullscreen()">&#10005;</button>
  <div class="fs-time" id="fs-time"></div>
  <div class="fs-date" id="fs-date"></div>
</div>

<script>/* korb alert shim: replace window.alert with non-blocking VFD toast */
(function(){if(window.__korbAlertShim)return;window.__korbAlertShim=true;window.alert=function(msg){try{var d=document.createElement("div");d.textContent=String(msg==null?"":msg);d.setAttribute("role","status");d.setAttribute("aria-live","polite");d.style.cssText="position:fixed;left:50%;bottom:24px;transform:translateX(-50%);"+"background:#0e1520;color:#e2e8f0;border:1px solid #1a2535;padding:12px 16px;"+"border-radius:8px;font:14px/1.4 'JetBrains Mono',monospace;z-index:2147483647;"+"max-width:90vw;box-shadow:0 10px 30px rgba(0,0,0,0.5);pointer-events:none;"+"white-space:pre-wrap;text-align:center";document.body.appendChild(d);setTimeout(function(){d.style.transition="opacity .3s";d.style.opacity="0";setTimeout(function(){d.remove();},320);},2800);}catch(e){}};})();</script>
<script>
const KEYS = {
  worldClocks: 'korb_clock_worldclocks',
  alarms: 'korb_clock_alarms',
  presets: 'korb_clock_presets',
  theme: 'korb_clock_theme'
};

let worldClocks = [];
let alarms = [];
let customPresets = [];

// Stopwatch state
let swRunning = false, swStartTime = 0, swElapsed = 0, swInterval = null, swLaps = [];
// Timer state
let tmRunning = false, tmRemaining = 0, tmTotal = 0, tmInterval = null;
// Audio context
let audioCtx = null;

function init() {
  worldClocks = JSON.parse(localStorage.getItem(KEYS.worldClocks) || '[]');
  alarms = JSON.parse(localStorage.getItem(KEYS.alarms) || '[]');
  customPresets = JSON.parse(localStorage.getItem(KEYS.presets) || '[]');
  const theme = localStorage.getItem(KEYS.theme);
  if (theme === 'light') document.body.classList.add('light');

  setupTabs();
  updateClock();
  setInterval(updateClock, 100);
  setInterval(checkAlarms, 1000);
  renderWorldClocks();
  renderAlarms();
  renderCustomPresets();
  updateTimerDisplay();
}

function setupTabs() {
  document.querySelectorAll('.tab').forEach(t => {
    t.addEventListener('click', () => {
      document.querySelectorAll('.tab').forEach(x => x.classList.remove('active'));
      document.querySelectorAll('.tab-content').forEach(x => x.classList.remove('active'));
      t.classList.add('active');
      document.getElementById('tab-' + t.dataset.tab).classList.add('active');
    });
  });
}

function save(key, data) { localStorage.setItem(key, JSON.stringify(data)); }

// ========== CLOCK ==========
function updateClock() {
  const now = new Date();
  const h = String(now.getHours()).padStart(2, '0');
  const m = String(now.getMinutes()).padStart(2, '0');
  const s = String(now.getSeconds()).padStart(2, '0');
  const timeStr = `${h}:${m}:<span class="clock-seconds">${s}</span>`;
  document.getElementById('digital-clock').innerHTML = timeStr;

  const opts = { weekday: 'long', year: 'numeric', month: 'long', day: 'numeric' };
  document.getElementById('digital-date').textContent = now.toLocaleDateString('en-US', opts);

  // Fullscreen
  const fs = document.getElementById('fullscreen');
  if (fs.classList.contains('active')) {
    document.getElementById('fs-time').textContent = `${h}:${m}:${s}`;
    document.getElementById('fs-date').textContent = now.toLocaleDateString('en-US', opts);
  }

  drawAnalogClock(now);
  updateWorldClockTimes();
}

function drawAnalogClock(now) {
  const canvas = document.getElementById('analog-clock');
  const ctx = canvas.getContext('2d');
  const size = 280, center = size / 2, r = center - 10;
  ctx.clearRect(0, 0, size, size);

  const isLight = document.body.classList.contains('light');
  const bgColor = isLight ? '#ffffff' : '#0a1018';
  const borderColor = isLight ? '#d0d4da' : '#1a2535';
  const textColor = isLight ? '#1a1a2e' : '#e2e8f0';
  const cyanColor = isLight ? '#0088cc' : '#00d4ff';
  const orangeColor = isLight ? '#cc5500' : '#ff6600';

  // Face
  ctx.beginPath();
  ctx.arc(center, center, r, 0, Math.PI * 2);
  ctx.fillStyle = bgColor;
  ctx.fill();
  ctx.strokeStyle = borderColor;
  ctx.lineWidth = 2;
  ctx.stroke();

  // Hour markers
  for (let i = 0; i < 12; i++) {
    const angle = (i * 30 - 90) * Math.PI / 180;
    const isMajor = i % 3 === 0;
    const innerR = r - (isMajor ? 20 : 12);
    const outerR = r - 4;
    ctx.beginPath();
    ctx.moveTo(center + innerR * Math.cos(angle), center + innerR * Math.sin(angle));
    ctx.lineTo(center + outerR * Math.cos(angle), center + outerR * Math.sin(angle));
    ctx.strokeStyle = isMajor ? cyanColor : textColor;
    ctx.lineWidth = isMajor ? 3 : 1;
    ctx.stroke();
  }

  // Hour numbers
  ctx.fillStyle = textColor;
  ctx.font = '600 14px JetBrains Mono';
  ctx.textAlign = 'center';
  ctx.textBaseline = 'middle';
  for (let i = 1; i <= 12; i++) {
    const angle = (i * 30 - 90) * Math.PI / 180;
    const nr = r - 34;
    ctx.fillText(i.toString(), center + nr * Math.cos(angle), center + nr * Math.sin(angle));
  }

  const hrs = now.getHours() % 12;
  const mins = now.getMinutes();
  const secs = now.getSeconds();

  // Hour hand
  const hAngle = ((hrs + mins / 60) * 30 - 90) * Math.PI / 180;
  ctx.beginPath();
  ctx.moveTo(center, center);
  ctx.lineTo(center + (r * 0.5) * Math.cos(hAngle), center + (r * 0.5) * Math.sin(hAngle));
  ctx.strokeStyle = textColor;
  ctx.lineWidth = 4;
  ctx.lineCap = 'round';
  ctx.stroke();

  // Minute hand
  const mAngle = ((mins + secs / 60) * 6 - 90) * Math.PI / 180;
  ctx.beginPath();
  ctx.moveTo(center, center);
  ctx.lineTo(center + (r * 0.7) * Math.cos(mAngle), center + (r * 0.7) * Math.sin(mAngle));
  ctx.strokeStyle = cyanColor;
  ctx.lineWidth = 3;
  ctx.stroke();

  // Second hand
  const sAngle = (secs * 6 - 90) * Math.PI / 180;
  ctx.beginPath();
  ctx.moveTo(center - 15 * Math.cos(sAngle), center - 15 * Math.sin(sAngle));
  ctx.lineTo(center + (r * 0.8) * Math.cos(sAngle), center + (r * 0.8) * Math.sin(sAngle));
  ctx.strokeStyle = orangeColor;
  ctx.lineWidth = 1.5;
  ctx.stroke();

  // Center dot
  ctx.beginPath();
  ctx.arc(center, center, 4, 0, Math.PI * 2);
  ctx.fillStyle = orangeColor;
  ctx.fill();
}

// ========== WORLD CLOCKS ==========
function addWorldClock() {
  const tz = document.getElementById('wc-timezone').value;
  const label = document.getElementById('wc-label').value.trim() || tz.split('/').pop().replace(/_/g, ' ');
  worldClocks.push({ tz, label, id: Date.now().toString(36) });
  save(KEYS.worldClocks, worldClocks);
  renderWorldClocks();
  document.getElementById('wc-label').value = '';
}

function removeWorldClock(id) {
  worldClocks = worldClocks.filter(w => w.id !== id);
  save(KEYS.worldClocks, worldClocks);
  renderWorldClocks();
}

function renderWorldClocks() {
  const el = document.getElementById('world-clocks');
  el.innerHTML = worldClocks.map(w => `
    <div class="world-clock-card" data-tz="${w.tz}" data-id="${w.id}">
      <button class="wc-del" onclick="removeWorldClock('${w.id}')">&times;</button>
      <div class="wc-time" id="wc-time-${w.id}">--:--:--</div>
      <div class="wc-label">${w.label}</div>
      <div class="wc-date" id="wc-date-${w.id}"></div>
    </div>
  `).join('');
  updateWorldClockTimes();
}

function updateWorldClockTimes() {
  const now = new Date();
  worldClocks.forEach(w => {
    const timeEl = document.getElementById('wc-time-' + w.id);
    const dateEl = document.getElementById('wc-date-' + w.id);
    if (!timeEl) return;
    try {
      timeEl.textContent = now.toLocaleTimeString('en-US', { timeZone: w.tz, hour12: false });
      dateEl.textContent = now.toLocaleDateString('en-US', { timeZone: w.tz, weekday: 'short', month: 'short', day: 'numeric' });
    } catch (e) {
      timeEl.textContent = 'Invalid TZ';
    }
  });
}

// ========== STOPWATCH ==========
function swStart() {
  if (!swRunning) {
    swRunning = true;
    swStartTime = performance.now() - swElapsed;
    swInterval = setInterval(swTick, 10);
    document.getElementById('sw-start').textContent = 'Stop';
    document.getElementById('sw-start').className = 'btn btn-danger';
    document.getElementById('sw-lap').disabled = false;
    document.getElementById('sw-reset').disabled = false;
  } else {
    swRunning = false;
    swElapsed = performance.now() - swStartTime;
    clearInterval(swInterval);
    document.getElementById('sw-start').textContent = 'Resume';
    document.getElementById('sw-start').className = 'btn btn-success';
  }
}

function swTick() {
  swElapsed = performance.now() - swStartTime;
  document.getElementById('sw-display').innerHTML = formatSW(swElapsed);
}

function swLap() {
  if (!swRunning) return;
  const lapTime = swElapsed;
  const prevTotal = swLaps.length ? swLaps[swLaps.length - 1].total : 0;
  const split = lapTime - prevTotal;
  swLaps.push({ total: lapTime, split });
  renderSwLaps();
}

function swReset() {
  swRunning = false;
  clearInterval(swInterval);
  swElapsed = 0;
  swLaps = [];
  document.getElementById('sw-display').innerHTML = '00:00:00<span class="stopwatch-ms">.000</span>';
  document.getElementById('sw-start').textContent = 'Start';
  document.getElementById('sw-start').className = 'btn btn-success';
  document.getElementById('sw-lap').disabled = true;
  document.getElementById('sw-reset').disabled = true;
  document.getElementById('sw-laps').innerHTML = '';
}

function renderSwLaps() {
  const splits = swLaps.map(l => l.split);
  const best = Math.min(...splits);
  const worst = Math.max(...splits);

  document.getElementById('sw-laps').innerHTML = swLaps.map((l, i) => {
    let cls = '';
    if (swLaps.length > 1) {
      if (l.split === best) cls = 'lap-best';
      else if (l.split === worst) cls = 'lap-worst';
    }
    return `<div class="lap-item ${cls}"><span>Lap ${i + 1}</span><span>${formatSWPlain(l.split)}</span><span>${formatSWPlain(l.total)}</span></div>`;
  }).reverse().join('');
}

function formatSW(ms) {
  const totalMs = Math.floor(ms);
  const m = Math.floor(totalMs / 60000);
  const s = Math.floor((totalMs % 60000) / 1000);
  const mil = totalMs % 1000;
  const h = Math.floor(m / 60);
  const rm = m % 60;
  return `${String(h).padStart(2,'0')}:${String(rm).padStart(2,'0')}:${String(s).padStart(2,'0')}<span class="stopwatch-ms">.${String(mil).padStart(3,'0')}</span>`;
}

function formatSWPlain(ms) {
  const totalMs = Math.floor(ms);
  const m = Math.floor(totalMs / 60000);
  const s = Math.floor((totalMs % 60000) / 1000);
  const mil = totalMs % 1000;
  return `${String(m).padStart(2,'0')}:${String(s).padStart(2,'0')}.${String(mil).padStart(3,'0')}`;
}

// ========== TIMER ==========
function setTimer(h, m, s) {
  document.getElementById('timer-hrs').value = h;
  document.getElementById('timer-min').value = m;
  document.getElementById('timer-sec').value = s;
  timerReset();
}

function timerStart() {
  if (!tmRunning) {
    if (tmRemaining <= 0) {
      const h = parseInt(document.getElementById('timer-hrs').value) || 0;
      const m = parseInt(document.getElementById('timer-min').value) || 0;
      const s = parseInt(document.getElementById('timer-sec').value) || 0;
      tmTotal = (h * 3600 + m * 60 + s) * 1000;
      tmRemaining = tmTotal;
    }
    if (tmRemaining <= 0) return;
    tmRunning = true;
    const startTime = performance.now();
    const startRemaining = tmRemaining;
    tmInterval = setInterval(() => {
      tmRemaining = startRemaining - (performance.now() - startTime);
      if (tmRemaining <= 0) {
        tmRemaining = 0;
        clearInterval(tmInterval);
        tmRunning = false;
        document.getElementById('timer-start').textContent = 'Start';
        document.getElementById('timer-start').className = 'btn btn-success';
        playAlarmSound();
        updateTimerDisplay();
        return;
      }
      updateTimerDisplay();
    }, 50);
    document.getElementById('timer-start').textContent = 'Pause';
    document.getElementById('timer-start').className = 'btn btn-orange';
    document.getElementById('timer-inputs').style.opacity = '0.3';
  } else {
    tmRunning = false;
    clearInterval(tmInterval);
    document.getElementById('timer-start').textContent = 'Resume';
    document.getElementById('timer-start').className = 'btn btn-success';
  }
}

function timerReset() {
  tmRunning = false;
  clearInterval(tmInterval);
  tmRemaining = 0;
  document.getElementById('timer-start').textContent = 'Start';
  document.getElementById('timer-start').className = 'btn btn-success';
  document.getElementById('timer-inputs').style.opacity = '1';
  updateTimerDisplay();
}

function updateTimerDisplay() {
  const total = Math.max(0, Math.ceil(tmRemaining / 1000));
  const h = Math.floor(total / 3600);
  const m = Math.floor((total % 3600) / 60);
  const s = total % 60;
  document.getElementById('timer-display').textContent = `${String(h).padStart(2,'0')}:${String(m).padStart(2,'0')}:${String(s).padStart(2,'0')}`;
  document.getElementById('timer-display').style.color = tmRemaining <= 0 && tmTotal > 0 ? 'var(--red)' : 'var(--orange)';
}

function addCustomPreset() {
  const label = document.getElementById('cp-label').value.trim();
  const min = parseInt(document.getElementById('cp-min').value) || 1;
  if (!label) { window.alert('Enter a label.'); return; }
  customPresets.push({ label, minutes: min, id: Date.now().toString(36) });
  save(KEYS.presets, customPresets);
  renderCustomPresets();
  document.getElementById('cp-label').value = '';
}

function deletePreset(id) {
  customPresets = customPresets.filter(p => p.id !== id);
  save(KEYS.presets, customPresets);
  renderCustomPresets();
}

function renderCustomPresets() {
  document.getElementById('custom-presets').innerHTML = customPresets.map(p => `
    <button class="timer-preset" onclick="setTimer(0,${p.minutes},0)" style="position:relative">
      ${p.label} (${p.minutes}m)
      <span onclick="event.stopPropagation();deletePreset('${p.id}')" style="margin-left:8px;color:var(--red);font-weight:700;cursor:pointer">&times;</span>
    </button>
  `).join('');
}

// ========== ALARMS ==========
function addAlarm() {
  const time = document.getElementById('alarm-time').value;
  const label = document.getElementById('alarm-label').value.trim() || 'Alarm';
  if (!time) { window.alert('Set a time.'); return; }
  alarms.push({ id: Date.now().toString(36), time, label, enabled: true, fired: false });
  save(KEYS.alarms, alarms);
  renderAlarms();
}

function toggleAlarm(id) {
  const a = alarms.find(x => x.id === id);
  if (a) { a.enabled = !a.enabled; a.fired = false; save(KEYS.alarms, alarms); renderAlarms(); }
}

function deleteAlarm(id) {
  alarms = alarms.filter(a => a.id !== id);
  save(KEYS.alarms, alarms);
  renderAlarms();
}

function renderAlarms() {
  document.getElementById('alarm-list').innerHTML = alarms.map(a => `
    <div class="alarm-item" style="${a.enabled ? '' : 'opacity:0.4'}">
      <div>
        <div class="alarm-time">${a.time}</div>
        <div class="alarm-label">${a.label}</div>
      </div>
      <div style="display:flex;align-items:center;gap:0.75rem">
        <button class="alarm-toggle ${a.enabled ? 'on' : 'off'}" onclick="toggleAlarm('${a.id}')"></button>
        <button class="btn btn-danger btn-sm" onclick="deleteAlarm('${a.id}')">Del</button>
      </div>
    </div>
  `).join('');
}

function checkAlarms() {
  const now = new Date();
  const current = `${String(now.getHours()).padStart(2,'0')}:${String(now.getMinutes()).padStart(2,'0')}`;
  alarms.forEach(a => {
    if (a.enabled && !a.fired && a.time === current) {
      a.fired = true;
      save(KEYS.alarms, alarms);
      playAlarmSound();
      setTimeout(() => window.alert(`Alarm: ${a.label}`), 100);
    }
    // Reset fired flag when minute passes
    if (a.fired && a.time !== current) {
      a.fired = false;
    }
  });
}

// ========== AUDIO ==========
function playAlarmSound() {
  try {
    if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    const beeps = [
      { freq: 880, start: 0, dur: 0.15 },
      { freq: 880, start: 0.25, dur: 0.15 },
      { freq: 880, start: 0.5, dur: 0.15 },
      { freq: 1100, start: 0.75, dur: 0.3 }
    ];
    beeps.forEach(b => {
      const osc = audioCtx.createOscillator();
      const gain = audioCtx.createGain();
      osc.type = 'sine';
      osc.frequency.value = b.freq;
      gain.gain.setValueAtTime(0.3, audioCtx.currentTime + b.start);
      gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + b.start + b.dur);
      osc.connect(gain);
      gain.connect(audioCtx.destination);
      osc.start(audioCtx.currentTime + b.start);
      osc.stop(audioCtx.currentTime + b.start + b.dur + 0.05);
    });
  } catch (e) { /* audio not available */ }
}

// ========== THEME ==========
function toggleTheme() {
  document.body.classList.toggle('light');
  const theme = document.body.classList.contains('light') ? 'light' : 'dark';
  localStorage.setItem(KEYS.theme, theme);
}

// ========== FULLSCREEN ==========
function openFullscreen() {
  document.getElementById('fullscreen').classList.add('active');
  try { document.documentElement.requestFullscreen(); } catch (e) {}
}
function closeFullscreen() {
  document.getElementById('fullscreen').classList.remove('active');
  try { document.exitFullscreen(); } catch (e) {}
}

init();
</script>
