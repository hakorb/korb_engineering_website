<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Color Palette Generator | Korb Engineering</title>
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
--bg:#050a0f;--surface:#0a1018;--border:#1a2535;
--cyan:#00d4ff;--orange:#ff6600;--green:#10b981;
--text:#e2e8f0;--text-dim:#64748b;--red:#ef4444;
}
html{font-family:'JetBrains Mono',monospace;background:var(--bg);color:var(--text);font-size:14px}
body{min-height:100vh;padding:0 0 60px}
button{font-family:inherit;cursor:pointer;border:none;background:none;color:inherit;font-size:inherit}
input{font-family:inherit;color:inherit;background:transparent;border:none;outline:none}
.header{display:flex;align-items:center;justify-content:space-between;padding:16px 24px;border-bottom:1px solid var(--border);background:var(--surface);position:sticky;top:0;z-index:100}
.logo{display:flex;align-items:center;gap:12px}
.logo svg{width:28px;height:28px}
.logo-text{font-size:13px;font-weight:600;color:var(--cyan);letter-spacing:1px;text-transform:uppercase}
.logo-sub{font-size:10px;color:var(--text-dim);letter-spacing:2px}
.toolbar{display:flex;align-items:center;gap:10px;flex-wrap:wrap}
.btn{padding:8px 16px;border:1px solid var(--border);border-radius:6px;font-size:12px;transition:all .2s;background:var(--surface)}
.btn:hover{border-color:var(--cyan);color:var(--cyan)}
.btn-primary{background:var(--cyan);color:var(--bg);border-color:var(--cyan);font-weight:600}
.btn-primary:hover{background:#00b8e0;border-color:#00b8e0}
.btn-sm{padding:5px 10px;font-size:11px}
select{font-family:inherit;font-size:12px;padding:8px 12px;background:var(--surface);color:var(--text);border:1px solid var(--border);border-radius:6px;cursor:pointer;outline:none}
select:hover{border-color:var(--cyan)}

/* Palette strip */
.palette-container{padding:24px}
.palette-strip{display:flex;gap:12px;flex-wrap:wrap;justify-content:center}
.color-card{
  flex:1;min-width:160px;max-width:280px;
  border:1px solid var(--border);border-radius:10px;overflow:hidden;
  background:var(--surface);transition:transform .2s,box-shadow .2s;
  position:relative;cursor:grab;
}
.color-card:hover{transform:translateY(-4px);box-shadow:0 8px 30px rgba(0,212,255,.1)}
.color-card.dragging{opacity:.5;transform:scale(.95)}
.color-card.drag-over{border-color:var(--cyan);box-shadow:0 0 20px rgba(0,212,255,.3)}
.color-swatch{height:140px;position:relative;display:flex;align-items:center;justify-content:center}
.lock-btn{
  position:absolute;top:8px;right:8px;width:32px;height:32px;
  border-radius:6px;background:rgba(0,0,0,.5);display:flex;align-items:center;justify-content:center;
  transition:all .2s;font-size:16px;
}
.lock-btn:hover{background:rgba(0,0,0,.8)}
.lock-btn.locked{background:var(--orange);color:var(--bg)}
.shade-btn{
  position:absolute;bottom:8px;right:8px;width:28px;height:28px;
  border-radius:6px;background:rgba(0,0,0,.5);display:flex;align-items:center;justify-content:center;
  transition:all .2s;font-size:12px;
}
.shade-btn:hover{background:rgba(0,0,0,.8)}
.contrast-sel{
  position:absolute;top:8px;left:8px;width:28px;height:28px;
  border-radius:6px;background:rgba(0,0,0,.5);display:flex;align-items:center;justify-content:center;
  transition:all .2s;font-size:14px;
}
.contrast-sel:hover{background:rgba(0,0,0,.8)}
.contrast-sel.selected{background:var(--green);color:var(--bg)}
.color-info{padding:12px}
.color-hex{font-size:16px;font-weight:700;letter-spacing:1px;margin-bottom:8px;cursor:pointer;transition:color .2s}
.color-hex:hover{color:var(--cyan)}
.color-val{font-size:11px;color:var(--text-dim);cursor:pointer;padding:2px 0;transition:color .2s;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.color-val:hover{color:var(--cyan)}

/* Editor modal */
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.7);z-index:200;display:none;align-items:center;justify-content:center}
.modal-overlay.active{display:flex}
.modal{background:var(--surface);border:1px solid var(--border);border-radius:12px;padding:24px;width:420px;max-width:95vw;max-height:90vh;overflow-y:auto}
.modal-title{font-size:16px;font-weight:600;color:var(--cyan);margin-bottom:16px;display:flex;align-items:center;justify-content:space-between}
.slider-group{margin-bottom:14px}
.slider-label{display:flex;justify-content:space-between;font-size:11px;color:var(--text-dim);margin-bottom:4px}
input[type="range"]{width:100%;height:6px;-webkit-appearance:none;background:var(--border);border-radius:3px;outline:none}
input[type="range"]::-webkit-slider-thumb{-webkit-appearance:none;width:16px;height:16px;border-radius:50%;background:var(--cyan);cursor:pointer}
.hex-input-row{display:flex;gap:8px;align-items:center;margin-bottom:16px}
.hex-input{width:100%;padding:8px 12px;border:1px solid var(--border);border-radius:6px;font-size:14px;font-weight:600;letter-spacing:1px}
.hex-input:focus{border-color:var(--cyan)}
.modal-preview{width:100%;height:60px;border-radius:8px;margin-bottom:16px}

/* Shade panel */
.shade-panel{display:none;padding:0 24px 24px}
.shade-panel.active{display:block}
.shade-strip{display:flex;gap:4px;border-radius:8px;overflow:hidden}
.shade-chip{flex:1;height:60px;cursor:pointer;position:relative;display:flex;align-items:flex-end;justify-content:center;padding-bottom:4px;font-size:9px;font-weight:600;transition:transform .15s}
.shade-chip:hover{transform:scaleY(1.15);z-index:1}
.shade-title{font-size:13px;color:var(--text-dim);margin-bottom:8px}

/* Contrast checker */
.contrast-panel{display:none;padding:0 24px 24px}
.contrast-panel.active{display:block}
.contrast-box{background:var(--surface);border:1px solid var(--border);border-radius:10px;padding:20px;display:flex;flex-wrap:wrap;gap:20px;align-items:center}
.contrast-preview{width:120px;height:80px;border-radius:8px;display:flex;align-items:center;justify-content:center;font-weight:700;font-size:18px}
.contrast-stats{flex:1;min-width:200px}
.contrast-ratio{font-size:28px;font-weight:700;color:var(--cyan)}
.contrast-badge{display:inline-block;padding:3px 8px;border-radius:4px;font-size:11px;font-weight:600;margin:2px}
.contrast-badge.pass{background:rgba(16,185,129,.2);color:var(--green);border:1px solid var(--green)}
.contrast-badge.fail{background:rgba(239,68,68,.15);color:var(--red);border:1px solid var(--red)}
.contrast-hint{font-size:11px;color:var(--text-dim);margin-top:8px}

/* Image upload */
.upload-zone{border:2px dashed var(--border);border-radius:10px;padding:40px;text-align:center;cursor:pointer;transition:all .2s;margin:0 24px 24px}
.upload-zone:hover,.upload-zone.dragover{border-color:var(--cyan);background:rgba(0,212,255,.03)}
.upload-zone p{color:var(--text-dim);font-size:12px}
.upload-zone input{display:none}

/* Saved palettes */
.saved-section{padding:0 24px 24px}
.saved-title{font-size:14px;font-weight:600;color:var(--orange);margin-bottom:12px;display:flex;align-items:center;gap:8px}
.saved-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));gap:12px}
.saved-card{background:var(--surface);border:1px solid var(--border);border-radius:8px;padding:12px;transition:all .2s}
.saved-card:hover{border-color:var(--cyan)}
.saved-name{font-size:12px;font-weight:600;margin-bottom:8px;display:flex;justify-content:space-between;align-items:center}
.saved-colors{display:flex;height:36px;border-radius:6px;overflow:hidden}
.saved-colors div{flex:1}
.saved-actions{display:flex;gap:6px;margin-top:8px}

/* Export modal */
.export-tabs{display:flex;gap:4px;margin-bottom:12px;flex-wrap:wrap}
.export-tab{padding:6px 12px;border-radius:4px;font-size:11px;background:var(--bg);border:1px solid var(--border)}
.export-tab.active{border-color:var(--cyan);color:var(--cyan)}
.export-code{background:var(--bg);border:1px solid var(--border);border-radius:8px;padding:12px;font-size:11px;white-space:pre-wrap;word-break:break-all;max-height:300px;overflow-y:auto;line-height:1.6}

/* Toast */
.toast{position:fixed;bottom:20px;right:20px;background:var(--cyan);color:var(--bg);padding:10px 20px;border-radius:8px;font-size:12px;font-weight:600;z-index:300;transform:translateY(80px);opacity:0;transition:all .3s}
.toast.show{transform:translateY(0);opacity:1}

/* Sections */
.section-bar{display:flex;align-items:center;justify-content:space-between;padding:0 24px;margin-bottom:12px;flex-wrap:wrap;gap:8px}
.section-label{font-size:11px;color:var(--text-dim);letter-spacing:1px;text-transform:uppercase}
.hint{font-size:11px;color:var(--text-dim);text-align:center;padding:8px;opacity:.6}

/* Canvas hidden */
#imageCanvas{display:none}

/* Responsive */
@media(max-width:768px){
  .header{flex-direction:column;gap:10px}
  .toolbar{justify-content:center}
  .color-card{min-width:140px}
  .palette-strip{gap:8px}
  .modal{width:95vw}
}
@media(max-width:480px){
  .color-card{min-width:100%;max-width:100%}
  .palette-strip{flex-direction:column}
}
</style>
</head>
<body>

<header class="header">
  <div class="logo">
    <svg viewBox="0 0 28 28" fill="none"><rect x="2" y="2" width="24" height="24" rx="4" stroke="var(--cyan)" stroke-width="1.5"/><path d="M8 8h4v12H8zM16 8h4v8h-4z" fill="var(--cyan)" opacity=".7"/></svg>
    <div>
      <div class="logo-text">Korb Engineering</div>
      <div class="logo-sub">Color Palette Generator</div>
    </div>
  </div>
  <div class="toolbar">
    <select id="harmonyMode">
      <option value="random">Random</option>
      <option value="complementary">Complementary</option>
      <option value="analogous">Analogous</option>
      <option value="triadic">Triadic</option>
      <option value="split-complementary">Split-Compl.</option>
      <option value="tetradic">Tetradic</option>
      <option value="monochromatic">Monochromatic</option>
    </select>
    <button class="btn btn-primary" id="generateBtn">Generate (Space)</button>
    <button class="btn" id="contrastBtn">Contrast Check</button>
    <button class="btn" id="imageBtn">From Image</button>
    <button class="btn" id="saveBtn">Save</button>
    <button class="btn" id="exportBtn">Export</button>
  </div>
</header>

<div class="palette-container">
  <div class="palette-strip" id="paletteStrip"></div>
</div>
<p class="hint" id="contrastHint" style="display:none">Click the [C] icon on two colors to check contrast</p>

<div class="shade-panel" id="shadePanel">
  <div class="shade-title" id="shadeTitle">Shades & Tints</div>
  <div class="shade-strip" id="shadeStrip"></div>
</div>

<div class="contrast-panel" id="contrastPanel"></div>

<div class="upload-zone" id="uploadZone" style="display:none">
  <p>Drop an image here or click to upload</p>
  <p style="margin-top:4px;font-size:10px">Dominant colors will be extracted via pixel analysis</p>
  <input type="file" id="imageInput" accept="image/*">
</div>
<canvas id="imageCanvas"></canvas>

<div class="saved-section" id="savedSection">
  <div class="saved-title">Saved Palettes</div>
  <div class="saved-grid" id="savedGrid"></div>
</div>

<!-- Color editor modal -->
<div class="modal-overlay" id="editorModal">
  <div class="modal">
    <div class="modal-title"><span>Edit Color</span><button class="btn btn-sm" onclick="closeEditor()">Close</button></div>
    <div class="modal-preview" id="editorPreview"></div>
    <div class="hex-input-row">
      <span style="color:var(--text-dim)">#</span>
      <input class="hex-input" id="hexInput" maxlength="6" placeholder="FF6600">
    </div>
    <div class="slider-group">
      <div class="slider-label"><span>Hue</span><span id="hueVal">0</span></div>
      <input type="range" id="hueSlider" min="0" max="360" value="0">
    </div>
    <div class="slider-group">
      <div class="slider-label"><span>Saturation</span><span id="satVal">100%</span></div>
      <input type="range" id="satSlider" min="0" max="100" value="100">
    </div>
    <div class="slider-group">
      <div class="slider-label"><span>Lightness</span><span id="lightVal">50%</span></div>
      <input type="range" id="lightSlider" min="0" max="100" value="50">
    </div>
    <button class="btn btn-primary" style="width:100%" onclick="applyEditorColor()">Apply</button>
  </div>
</div>

<!-- Export modal -->
<div class="modal-overlay" id="exportModal">
  <div class="modal">
    <div class="modal-title"><span>Export Palette</span><button class="btn btn-sm" onclick="closeExport()">Close</button></div>
    <div class="export-tabs" id="exportTabs">
      <button class="export-tab active" data-fmt="css">CSS Variables</button>
      <button class="export-tab" data-fmt="tailwind">Tailwind</button>
      <button class="export-tab" data-fmt="json">JSON</button>
      <button class="export-tab" data-fmt="png">PNG Swatch</button>
    </div>
    <div class="export-code" id="exportCode"></div>
    <div style="margin-top:12px;display:flex;gap:8px">
      <button class="btn btn-primary" id="copyExportBtn" style="flex:1">Copy</button>
      <button class="btn" id="downloadExportBtn" style="flex:1">Download</button>
    </div>
  </div>
</div>

<!-- Save modal -->
<div class="modal-overlay" id="saveModal">
  <div class="modal">
    <div class="modal-title"><span>Save Palette</span><button class="btn btn-sm" onclick="closeSave()">Close</button></div>
    <div class="hex-input-row">
      <input class="hex-input" id="paletteNameInput" placeholder="Palette name..." style="letter-spacing:normal">
    </div>
    <button class="btn btn-primary" style="width:100%" onclick="confirmSave()">Save to Collection</button>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
// ---- State ----
let palette = [];
let locks = [false,false,false,false,false];
let contrastMode = false;
let contrastSelections = [];
let editingIndex = -1;
let currentExportFmt = 'css';
let dragSrcIndex = null;

// ---- Color Utilities ----
function hslToRgb(h,s,l){
  s/=100;l/=100;
  const k=n=>(n+h/30)%12;
  const a=s*Math.min(l,1-l);
  const f=n=>l-a*Math.max(-1,Math.min(k(n)-3,Math.min(9-k(n),1)));
  return [Math.round(f(0)*255),Math.round(f(8)*255),Math.round(f(4)*255)];
}
function rgbToHsl(r,g,b){
  r/=255;g/=255;b/=255;
  const max=Math.max(r,g,b),min=Math.min(r,g,b);
  let h,s,l=(max+min)/2;
  if(max===min){h=s=0}else{
    const d=max-min;
    s=l>.5?d/(2-max-min):d/(max+min);
    switch(max){
      case r:h=((g-b)/d+(g<b?6:0))/6;break;
      case g:h=((b-r)/d+2)/6;break;
      case b:h=((r-g)/d+4)/6;break;
    }
  }
  return [Math.round(h*360),Math.round(s*100),Math.round(l*100)];
}
function hexToRgb(hex){
  hex=hex.replace('#','');
  if(hex.length===3)hex=hex[0]+hex[0]+hex[1]+hex[1]+hex[2]+hex[2];
  return [parseInt(hex.substr(0,2),16),parseInt(hex.substr(2,2),16),parseInt(hex.substr(4,2),16)];
}
function rgbToHex(r,g,b){return '#'+[r,g,b].map(x=>x.toString(16).padStart(2,'0')).join('')}
function hslToHex(h,s,l){return rgbToHex(...hslToRgb(h,s,l))}
function hexToHsl(hex){return rgbToHsl(...hexToRgb(hex))}
function randomHue(){return Math.floor(Math.random()*360)}
function randomSat(){return 50+Math.floor(Math.random()*50)}
function randomLight(){return 35+Math.floor(Math.random()*40)}
function luminance(r,g,b){
  const a=[r,g,b].map(v=>{v/=255;return v<=.03928?v/12.92:Math.pow((v+.055)/1.055,2.4)});
  return .2126*a[0]+.7152*a[1]+.0722*a[2];
}
function contrastRatio(hex1,hex2){
  const l1=luminance(...hexToRgb(hex1));
  const l2=luminance(...hexToRgb(hex2));
  const lighter=Math.max(l1,l2),darker=Math.min(l1,l2);
  return (lighter+.05)/(darker+.05);
}
function textColor(hex){
  const [r,g,b]=hexToRgb(hex);
  return luminance(r,g,b)>.35?'#000000':'#ffffff';
}

// ---- Harmony Generators ----
function generateHarmony(mode){
  const base=randomHue();
  const s=randomSat();
  const l=randomLight();
  let hues=[];
  switch(mode){
    case 'complementary':
      hues=[base,(base+180)%360,(base+30)%360,(base+210)%360,(base+150)%360];break;
    case 'analogous':
      hues=[base,(base+30)%360,(base+60)%360,(base-30+360)%360,(base-60+360)%360];break;
    case 'triadic':
      hues=[base,(base+120)%360,(base+240)%360,(base+60)%360,(base+180)%360];break;
    case 'split-complementary':
      hues=[base,(base+150)%360,(base+210)%360,(base+30)%360,(base+330)%360];break;
    case 'tetradic':
      hues=[base,(base+90)%360,(base+180)%360,(base+270)%360,(base+45)%360];break;
    case 'monochromatic':
      hues=[base,base,base,base,base];break;
    default:
      hues=[randomHue(),randomHue(),randomHue(),randomHue(),randomHue()];
  }
  return hues.map((h,i)=>{
    if(mode==='monochromatic'){
      return hslToHex(h,s,20+i*15);
    }
    return hslToHex(h,40+Math.floor(Math.random()*50),30+Math.floor(Math.random()*40));
  });
}

function generate(){
  const mode=document.getElementById('harmonyMode').value;
  const newColors=generateHarmony(mode);
  palette=palette.map((c,i)=>locks[i]?c:newColors[i]);
  if(palette.length===0)palette=newColors;
  renderPalette();
}

// ---- Render Palette ----
function renderPalette(){
  const strip=document.getElementById('paletteStrip');
  strip.innerHTML='';
  palette.forEach((hex,i)=>{
    const [r,g,b]=hexToRgb(hex);
    const [h,s,l]=hexToHsl(hex);
    const tc=textColor(hex);
    const card=document.createElement('div');
    card.className='color-card';
    card.draggable=true;
    card.dataset.index=i;
    card.innerHTML=`
      <div class="color-swatch" style="background:${hex}">
        <button class="contrast-sel ${contrastSelections.includes(i)?'selected':''}" data-i="${i}" title="Select for contrast" style="display:${contrastMode?'flex':'none'}">C</button>
        <button class="lock-btn ${locks[i]?'locked':''}" data-i="${i}" title="Lock color">${locks[i]?'&#x1f512;':'&#x1f513;'}</button>
        <button class="shade-btn" data-i="${i}" title="Shades & tints">&#9783;</button>
      </div>
      <div class="color-info">
        <div class="color-hex" data-copy="${hex}" title="Click to copy">${hex.toUpperCase()}</div>
        <div class="color-val" data-copy="rgb(${r}, ${g}, ${b})" title="Click to copy">RGB: ${r}, ${g}, ${b}</div>
        <div class="color-val" data-copy="hsl(${h}, ${s}%, ${l}%)" title="Click to copy">HSL: ${h}, ${s}%, ${l}%</div>
      </div>
    `;
    // Events
    card.querySelector('.lock-btn').addEventListener('click',e=>{e.stopPropagation();locks[i]=!locks[i];renderPalette()});
    card.querySelector('.shade-btn').addEventListener('click',e=>{e.stopPropagation();showShades(i)});
    card.querySelector('.contrast-sel').addEventListener('click',e=>{e.stopPropagation();toggleContrastSel(i)});
    card.querySelector('.color-hex').addEventListener('click',e=>{e.stopPropagation();copyText(e.target.dataset.copy)});
    card.querySelectorAll('.color-val').forEach(el=>el.addEventListener('click',e=>{e.stopPropagation();copyText(e.target.dataset.copy)}));
    card.querySelector('.color-swatch').addEventListener('dblclick',e=>{
      if(e.target.closest('.lock-btn')||e.target.closest('.shade-btn')||e.target.closest('.contrast-sel'))return;
      openEditor(i);
    });
    // Drag
    card.addEventListener('dragstart',e=>{dragSrcIndex=i;card.classList.add('dragging');e.dataTransfer.effectAllowed='move'});
    card.addEventListener('dragend',()=>{card.classList.remove('dragging');dragSrcIndex=null;document.querySelectorAll('.drag-over').forEach(c=>c.classList.remove('drag-over'))});
    card.addEventListener('dragover',e=>{e.preventDefault();e.dataTransfer.dropEffect='move';card.classList.add('drag-over')});
    card.addEventListener('dragleave',()=>card.classList.remove('drag-over'));
    card.addEventListener('drop',e=>{
      e.preventDefault();card.classList.remove('drag-over');
      if(dragSrcIndex!==null&&dragSrcIndex!==i){
        const temp=palette[dragSrcIndex];palette[dragSrcIndex]=palette[i];palette[i]=temp;
        const tl=locks[dragSrcIndex];locks[dragSrcIndex]=locks[i];locks[i]=tl;
        renderPalette();
      }
    });
    strip.appendChild(card);
  });
}

// ---- Shades ----
function showShades(i){
  const panel=document.getElementById('shadePanel');
  const strip=document.getElementById('shadeStrip');
  const title=document.getElementById('shadeTitle');
  const [h,s]=hexToHsl(palette[i]);
  panel.classList.add('active');
  title.textContent=`Shades & Tints of ${palette[i].toUpperCase()}`;
  strip.innerHTML='';
  for(let step=0;step<9;step++){
    const light=10+step*10;
    const hex=hslToHex(h,s,light);
    const tc=textColor(hex);
    const chip=document.createElement('div');
    chip.className='shade-chip';
    chip.style.background=hex;
    chip.style.color=tc;
    chip.textContent=hex.toUpperCase();
    chip.title='Click to copy';
    chip.addEventListener('click',()=>copyText(hex));
    strip.appendChild(chip);
  }
}

// ---- Contrast ----
function toggleContrastSel(i){
  const idx=contrastSelections.indexOf(i);
  if(idx>-1)contrastSelections.splice(idx,1);
  else{
    if(contrastSelections.length>=2)contrastSelections.shift();
    contrastSelections.push(i);
  }
  renderPalette();
  if(contrastSelections.length===2)showContrast();
  else document.getElementById('contrastPanel').classList.remove('active');
}
function showContrast(){
  const panel=document.getElementById('contrastPanel');
  const [a,b]=contrastSelections;
  const ratio=contrastRatio(palette[a],palette[b]);
  const r=ratio.toFixed(2);
  const aaLarge=ratio>=3;
  const aaNormal=ratio>=4.5;
  const aaaLarge=ratio>=4.5;
  const aaaNormal=ratio>=7;
  panel.classList.add('active');
  panel.innerHTML=`
    <div class="contrast-box">
      <div class="contrast-preview" style="background:${palette[a]};color:${palette[b]};border:1px solid var(--border)">Aa</div>
      <div class="contrast-preview" style="background:${palette[b]};color:${palette[a]};border:1px solid var(--border)">Aa</div>
      <div class="contrast-stats">
        <div class="contrast-ratio">${r}:1</div>
        <div>
          <span class="contrast-badge ${aaNormal?'pass':'fail'}">AA Normal ${aaNormal?'PASS':'FAIL'}</span>
          <span class="contrast-badge ${aaLarge?'pass':'fail'}">AA Large ${aaLarge?'PASS':'FAIL'}</span>
        </div>
        <div>
          <span class="contrast-badge ${aaaNormal?'pass':'fail'}">AAA Normal ${aaaNormal?'PASS':'FAIL'}</span>
          <span class="contrast-badge ${aaaLarge?'pass':'fail'}">AAA Large ${aaaLarge?'PASS':'FAIL'}</span>
        </div>
        <div class="contrast-hint">${palette[a].toUpperCase()} vs ${palette[b].toUpperCase()}</div>
      </div>
    </div>
  `;
}

document.getElementById('contrastBtn').addEventListener('click',()=>{
  contrastMode=!contrastMode;
  const hint=document.getElementById('contrastHint');
  hint.style.display=contrastMode?'block':'none';
  document.getElementById('contrastBtn').style.borderColor=contrastMode?'var(--green)':'';
  document.getElementById('contrastBtn').style.color=contrastMode?'var(--green)':'';
  if(!contrastMode){contrastSelections=[];document.getElementById('contrastPanel').classList.remove('active')}
  renderPalette();
});

// ---- Editor ----
function openEditor(i){
  editingIndex=i;
  const [h,s,l]=hexToHsl(palette[i]);
  document.getElementById('hueSlider').value=h;
  document.getElementById('satSlider').value=s;
  document.getElementById('lightSlider').value=l;
  document.getElementById('hexInput').value=palette[i].replace('#','').toUpperCase();
  updateEditorPreview();
  document.getElementById('editorModal').classList.add('active');
}
function closeEditor(){document.getElementById('editorModal').classList.remove('active');editingIndex=-1}
function updateEditorPreview(){
  const h=+document.getElementById('hueSlider').value;
  const s=+document.getElementById('satSlider').value;
  const l=+document.getElementById('lightSlider').value;
  document.getElementById('hueVal').textContent=h;
  document.getElementById('satVal').textContent=s+'%';
  document.getElementById('lightVal').textContent=l+'%';
  const hex=hslToHex(h,s,l);
  document.getElementById('editorPreview').style.background=hex;
  document.getElementById('hexInput').value=hex.replace('#','').toUpperCase();
}
['hueSlider','satSlider','lightSlider'].forEach(id=>{
  document.getElementById(id).addEventListener('input',updateEditorPreview);
});
document.getElementById('hexInput').addEventListener('input',e=>{
  let v=e.target.value.replace(/[^0-9a-fA-F]/g,'');
  if(v.length===6){
    const [h,s,l]=hexToHsl('#'+v);
    document.getElementById('hueSlider').value=h;
    document.getElementById('satSlider').value=s;
    document.getElementById('lightSlider').value=l;
    updateEditorPreview();
  }
});
function applyEditorColor(){
  if(editingIndex<0)return;
  const h=+document.getElementById('hueSlider').value;
  const s=+document.getElementById('satSlider').value;
  const l=+document.getElementById('lightSlider').value;
  palette[editingIndex]=hslToHex(h,s,l);
  renderPalette();
  closeEditor();
}

// ---- Image extraction ----
document.getElementById('imageBtn').addEventListener('click',()=>{
  const zone=document.getElementById('uploadZone');
  zone.style.display=zone.style.display==='none'?'block':'none';
});
const uploadZone=document.getElementById('uploadZone');
const imageInput=document.getElementById('imageInput');
uploadZone.addEventListener('click',()=>imageInput.click());
uploadZone.addEventListener('dragover',e=>{e.preventDefault();uploadZone.classList.add('dragover')});
uploadZone.addEventListener('dragleave',()=>uploadZone.classList.remove('dragover'));
uploadZone.addEventListener('drop',e=>{e.preventDefault();uploadZone.classList.remove('dragover');if(e.dataTransfer.files[0])processImage(e.dataTransfer.files[0])});
imageInput.addEventListener('change',e=>{if(e.target.files[0])processImage(e.target.files[0])});

function processImage(file){
  const img=new Image();
  const reader=new FileReader();
  reader.onload=e=>{img.src=e.target.result};
  img.onload=()=>{
    const canvas=document.getElementById('imageCanvas');
    const ctx=canvas.getContext('2d');
    const scale=Math.min(200/img.width,200/img.height,1);
    canvas.width=Math.floor(img.width*scale);
    canvas.height=Math.floor(img.height*scale);
    ctx.drawImage(img,0,0,canvas.width,canvas.height);
    const data=ctx.getImageData(0,0,canvas.width,canvas.height).data;
    const pixels=[];
    for(let i=0;i<data.length;i+=4){
      pixels.push([data[i],data[i+1],data[i+2]]);
    }
    const colors=kMeansClustering(pixels,5,20);
    // Sort by luminance
    colors.sort((a,b)=>luminance(...a)-luminance(...b));
    palette=colors.map(c=>rgbToHex(c[0],c[1],c[2]));
    locks=[false,false,false,false,false];
    renderPalette();
    document.getElementById('uploadZone').style.display='none';
    toast('Palette extracted from image');
  };
  reader.readAsDataURL(file);
}

function kMeansClustering(pixels,k,maxIter){
  // Init centroids from spread of pixels
  let centroids=[];
  const step=Math.floor(pixels.length/k);
  for(let i=0;i<k;i++)centroids.push([...pixels[i*step]]);
  for(let iter=0;iter<maxIter;iter++){
    const clusters=Array.from({length:k},()=>[]);
    // Assign - sample for speed
    const sampleRate=Math.max(1,Math.floor(pixels.length/5000));
    for(let i=0;i<pixels.length;i+=sampleRate){
      let minD=Infinity,minC=0;
      for(let c=0;c<k;c++){
        const d=(pixels[i][0]-centroids[c][0])**2+(pixels[i][1]-centroids[c][1])**2+(pixels[i][2]-centroids[c][2])**2;
        if(d<minD){minD=d;minC=c}
      }
      clusters[minC].push(pixels[i]);
    }
    // Update
    let moved=false;
    for(let c=0;c<k;c++){
      if(clusters[c].length===0)continue;
      const avg=[0,0,0];
      clusters[c].forEach(p=>{avg[0]+=p[0];avg[1]+=p[1];avg[2]+=p[2]});
      const n=clusters[c].length;
      const newC=[Math.round(avg[0]/n),Math.round(avg[1]/n),Math.round(avg[2]/n)];
      if(newC[0]!==centroids[c][0]||newC[1]!==centroids[c][1]||newC[2]!==centroids[c][2])moved=true;
      centroids[c]=newC;
    }
    if(!moved)break;
  }
  return centroids;
}

// ---- Save / Load ----
function getSaved(){try{return JSON.parse(localStorage.getItem('korb_palettes')||'[]')}catch{return[]}}
function setSaved(arr){localStorage.setItem('korb_palettes',JSON.stringify(arr))}

document.getElementById('saveBtn').addEventListener('click',()=>{
  document.getElementById('paletteNameInput').value='';
  document.getElementById('saveModal').classList.add('active');
  setTimeout(()=>document.getElementById('paletteNameInput').focus(),100);
});
function closeSave(){document.getElementById('saveModal').classList.remove('active')}
function confirmSave(){
  const name=document.getElementById('paletteNameInput').value.trim()||('Palette '+new Date().toLocaleDateString());
  const saved=getSaved();
  saved.unshift({name,colors:[...palette],date:Date.now()});
  setSaved(saved);
  closeSave();
  renderSaved();
  toast('Palette saved');
}

function renderSaved(){
  const grid=document.getElementById('savedGrid');
  const saved=getSaved();
  grid.innerHTML='';
  if(saved.length===0){grid.innerHTML='<p style="color:var(--text-dim);font-size:12px">No saved palettes yet</p>';return}
  saved.forEach((p,i)=>{
    const card=document.createElement('div');
    card.className='saved-card';
    card.innerHTML=`
      <div class="saved-name"><span>${p.name}</span><span style="font-size:10px;color:var(--text-dim)">${new Date(p.date).toLocaleDateString()}</span></div>
      <div class="saved-colors">${p.colors.map(c=>`<div style="background:${c}" title="${c.toUpperCase()}"></div>`).join('')}</div>
      <div class="saved-actions">
        <button class="btn btn-sm" data-load="${i}">Load</button>
        <button class="btn btn-sm" data-del="${i}" style="color:var(--red)">Delete</button>
      </div>
    `;
    card.querySelector('[data-load]').addEventListener('click',()=>{
      palette=[...p.colors];locks=[false,false,false,false,false];renderPalette();toast('Palette loaded');
    });
    card.querySelector('[data-del]').addEventListener('click',()=>{
      const s=getSaved();s.splice(i,1);setSaved(s);renderSaved();toast('Palette deleted');
    });
    grid.appendChild(card);
  });
}

// ---- Export ----
document.getElementById('exportBtn').addEventListener('click',()=>{
  currentExportFmt='css';
  renderExport();
  document.getElementById('exportModal').classList.add('active');
  document.querySelectorAll('.export-tab').forEach(t=>t.classList.toggle('active',t.dataset.fmt==='css'));
});
function closeExport(){document.getElementById('exportModal').classList.remove('active')}
document.getElementById('exportTabs').addEventListener('click',e=>{
  const tab=e.target.closest('.export-tab');
  if(!tab)return;
  currentExportFmt=tab.dataset.fmt;
  document.querySelectorAll('.export-tab').forEach(t=>t.classList.toggle('active',t.dataset.fmt===currentExportFmt));
  renderExport();
});

function renderExport(){
  const code=document.getElementById('exportCode');
  const dlBtn=document.getElementById('downloadExportBtn');
  dlBtn.style.display=currentExportFmt==='png'?'block':'block';
  if(currentExportFmt==='css'){
    code.textContent=`:root {\n${palette.map((c,i)=>`  --color-${i+1}: ${c};`).join('\n')}\n}`;
  }else if(currentExportFmt==='tailwind'){
    code.textContent=`module.exports = {\n  theme: {\n    extend: {\n      colors: {\n        palette: {\n${palette.map((c,i)=>`          '${i+1}': '${c}',`).join('\n')}\n        }\n      }\n    }\n  }\n}`;
  }else if(currentExportFmt==='json'){
    code.textContent=JSON.stringify({palette:palette.map((hex,i)=>{
      const [r,g,b]=hexToRgb(hex);const [h,s,l]=hexToHsl(hex);
      return{hex,rgb:`rgb(${r},${g},${b})`,hsl:`hsl(${h},${s}%,${l}%)`};
    })},null,2);
  }else if(currentExportFmt==='png'){
    code.textContent='Click Download to save a PNG swatch image.';
  }
}

document.getElementById('copyExportBtn').addEventListener('click',()=>{
  const text=document.getElementById('exportCode').textContent;
  copyText(text);
});
document.getElementById('downloadExportBtn').addEventListener('click',()=>{
  if(currentExportFmt==='png'){downloadPNG();return}
  const text=document.getElementById('exportCode').textContent;
  const ext={css:'css',tailwind:'js',json:'json'}[currentExportFmt]||'txt';
  const blob=new Blob([text],{type:'text/plain'});
  const a=document.createElement('a');a.href=URL.createObjectURL(blob);a.download=`palette.${ext}`;a.click();
});

function downloadPNG(){
  const c=document.createElement('canvas');
  c.width=500;c.height=120;
  const ctx=c.getContext('2d');
  palette.forEach((hex,i)=>{
    ctx.fillStyle=hex;
    ctx.fillRect(i*100,0,100,100);
    ctx.fillStyle=textColor(hex);
    ctx.font='bold 11px JetBrains Mono, monospace';
    ctx.textAlign='center';
    ctx.fillText(hex.toUpperCase(),i*100+50,55);
  });
  ctx.fillStyle='#0a1018';ctx.fillRect(0,100,500,20);
  ctx.fillStyle='#64748b';ctx.font='10px JetBrains Mono, monospace';ctx.textAlign='center';
  ctx.fillText('Korb Engineering Color Palette',250,114);
  const a=document.createElement('a');a.href=c.toDataURL('image/png');a.download='palette.png';a.click();
  toast('PNG downloaded');
}

// ---- Toast & Copy ----
function toast(msg){
  const t=document.getElementById('toast');
  t.textContent=msg;t.classList.add('show');
  setTimeout(()=>t.classList.remove('show'),2000);
}
function copyText(text){
  navigator.clipboard.writeText(text).then(()=>toast('Copied: '+text.substring(0,30))).catch(()=>{
    // fallback
    const ta=document.createElement('textarea');ta.value=text;document.body.appendChild(ta);ta.select();document.execCommand('copy');ta.remove();
    toast('Copied');
  });
}

// ---- Keyboard ----
document.addEventListener('keydown',e=>{
  if(e.target.tagName==='INPUT'||e.target.tagName==='TEXTAREA')return;
  if(e.code==='Space'){e.preventDefault();generate()}
});

// ---- Init ----
generate();
renderSaved();
</script>
