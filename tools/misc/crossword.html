<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Crossword Puzzle | Korb Engineering</title>
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{--bg:#050a0f;--surface:#0a1018;--border:#1a2535;--cyan:#00d4ff;--orange:#ff6600;--green:#10b981;--red:#ef4444;--text:#e2e8f0;--dim:#64748b;--csz:38px}
body{font-family:'JetBrains Mono',monospace;background:var(--bg);color:var(--text);min-height:100vh;overflow-x:hidden}
header{background:var(--surface);border-bottom:1px solid var(--border);padding:10px 20px;display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:8px}
.brand{display:flex;align-items:center;gap:10px}
.brand svg{width:26px;height:26px;flex-shrink:0}
.brand-text h1{font-size:13px;font-weight:600;color:var(--cyan);letter-spacing:1px;text-transform:uppercase}
.brand-text span{font-size:10px;color:var(--dim)}
.toolbar{display:flex;align-items:center;gap:6px;flex-wrap:wrap}
.toolbar select,.toolbar button{font-family:inherit;font-size:16px;padding:5px 10px;border:1px solid var(--border);border-radius:4px;background:var(--surface);color:var(--text);cursor:pointer;transition:.2s}
.toolbar select:hover,.toolbar button:hover{border-color:var(--cyan);color:var(--cyan)}
.toolbar button.orange{border-color:var(--orange);color:var(--orange)}
.toolbar button.orange:hover{background:var(--orange);color:#000}
.toolbar button.red{border-color:var(--red);color:var(--red)}
.toolbar button.red:hover{background:var(--red);color:#000}
.timer-display{font-size:14px;color:var(--cyan);font-weight:600;min-width:56px;text-align:center;font-variant-numeric:tabular-nums}
.dir-badge{font-size:9px;padding:3px 8px;border-radius:3px;background:var(--border);color:var(--cyan);text-transform:uppercase;letter-spacing:1px}
.main{display:flex;gap:20px;padding:20px;max-width:1200px;margin:0 auto;align-items:flex-start}
.grid-area{flex-shrink:0}
.grid-frame{border:2px solid var(--border);border-radius:6px;overflow:hidden;display:inline-block;background:#000}
.grid{display:grid;gap:0}
.c{width:var(--csz);height:var(--csz);border:1px solid var(--border);position:relative;display:flex;align-items:center;justify-content:center;font-size:17px;font-weight:700;text-transform:uppercase;color:var(--text);background:var(--surface);cursor:pointer;user-select:none;transition:background .12s}
.c.bk{background:#080808;cursor:default;border-color:#0c0c0c}
.c .n{position:absolute;top:1px;left:2px;font-size:8px;font-weight:400;color:var(--dim);line-height:1;pointer-events:none}
.c.wh{background:#0d2a3f}
.c.sel{background:#0f3555;box-shadow:inset 0 0 0 2px var(--cyan)}
.c.ok{color:var(--green)}
.c.bad{color:var(--red);animation:shake .35s}
.c.rev{color:var(--orange)}
@keyframes shake{0%,100%{transform:translateX(0)}25%{transform:translateX(-3px)}75%{transform:translateX(3px)}}
.clues{flex:1;min-width:240px;max-height:calc(100vh - 100px);overflow-y:auto;display:flex;flex-direction:column;gap:14px}
.clue-sec{background:var(--surface);border:1px solid var(--border);border-radius:6px;padding:10px 12px}
.clue-sec h3{font-size:11px;text-transform:uppercase;letter-spacing:1.5px;color:var(--cyan);margin-bottom:6px;padding-bottom:5px;border-bottom:1px solid var(--border)}
.ci{font-size:11px;padding:3px 6px;border-radius:3px;cursor:pointer;line-height:1.5;margin-bottom:1px;color:var(--dim);transition:.15s;border-left:2px solid transparent}
.ci:hover{background:rgba(0,212,255,.06);color:var(--text)}
.ci.act{background:rgba(0,212,255,.1);color:var(--cyan);border-left-color:var(--cyan)}
.ci.done{color:var(--green);opacity:.5}
.cn{color:var(--orange);font-weight:700;margin-right:6px}
.mobile-kb{display:none;background:var(--surface);border-top:2px solid var(--border);padding:8px 4px;position:fixed;bottom:0;left:0;right:0;z-index:100}
.kr{display:flex;justify-content:center;gap:3px;margin-bottom:3px}
.kk{font-family:inherit;font-size:15px;font-weight:700;width:30px;height:42px;border:1px solid var(--border);border-radius:5px;background:var(--surface);color:var(--text);display:flex;align-items:center;justify-content:center;cursor:pointer}
.kk:active{background:var(--cyan);color:#000}
.kk.w{width:52px;font-size:9px;letter-spacing:.5px}
.overlay{display:none;position:fixed;inset:0;background:rgba(5,10,15,.94);z-index:200;flex-direction:column;align-items:center;justify-content:center;gap:14px;text-align:center;padding:20px}
.overlay.show{display:flex}
.overlay h2{font-size:26px;color:var(--green);text-shadow:0 0 40px rgba(16,185,129,.3)}
.overlay p{font-size:13px;color:var(--dim)}
.overlay button{font-family:inherit;font-size:12px;padding:10px 28px;border:1px solid var(--green);border-radius:4px;background:transparent;color:var(--green);cursor:pointer}
.overlay button:hover{background:var(--green);color:#000}
.stars{position:fixed;pointer-events:none;z-index:201}
.star{position:absolute;width:4px;height:4px;border-radius:50%;animation:fall linear forwards}
@keyframes fall{0%{opacity:1;transform:translateY(0) scale(1)}100%{opacity:0;transform:translateY(120px) scale(0)}}
.clues::-webkit-scrollbar{width:5px}
.clues::-webkit-scrollbar-track{background:transparent}
.clues::-webkit-scrollbar-thumb{background:var(--border);border-radius:3px}
@media(max-width:850px){
  :root{--csz:30px}
  .main{flex-direction:column;align-items:center;padding:10px 10px 200px}
  .clues{max-height:none;width:100%;flex-direction:row}
  .clue-sec{flex:1;min-width:0}
  .mobile-kb{display:block}
  header{padding:8px 10px}
  .toolbar select,.toolbar button{font-size:16px;padding:4px 7px}
}
@media(max-width:500px){
  :root{--csz:25px}
  .c{font-size:13px}
  .c .n{font-size:7px}
  .clues{flex-direction:column}
}

/* Mobile-first touch targets */
button,select,.toolbar button,.toolbar select,.kk,.overlay button,[role="button"]{min-height:44px;touch-action:manipulation}
input,textarea,select{font-size:16px}
</style>
</head>
<body>
<header>
  <div class="brand">
    <svg viewBox="0 0 28 28" fill="none"><rect x="2" y="2" width="24" height="24" rx="3" stroke="#00d4ff" stroke-width="1.5"/><path d="M7 20V8l7 6 7-6v12" stroke="#ff6600" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></svg>
    <div class="brand-text"><h1>Korb Engineering</h1><span>Crossword Puzzle</span></div>
  </div>
  <div class="toolbar">
    <select id="psel"></select>
    <span class="dir-badge" id="dirBadge">across</span>
    <span class="timer-display" id="tmr">00:00</span>
    <button onclick="doCheck()">Check</button>
    <button class="orange" onclick="doHint()">Hint <span id="hc">(5)</span></button>
    <button class="orange" onclick="doRevealWord()">Word</button>
    <button class="red" onclick="doClear()">Clear</button>
  </div>
</header>
<div class="main">
  <div class="grid-area"><div class="grid-frame"><div class="grid" id="G"></div></div></div>
  <div class="clues" id="CL"></div>
</div>
<div class="mobile-kb" id="mkb">
  <div class="kr">
    <div class="kk" data-k="Q">Q</div><div class="kk" data-k="W">W</div><div class="kk" data-k="E">E</div>
    <div class="kk" data-k="R">R</div><div class="kk" data-k="T">T</div><div class="kk" data-k="Y">Y</div>
    <div class="kk" data-k="U">U</div><div class="kk" data-k="I">I</div><div class="kk" data-k="O">O</div>
    <div class="kk" data-k="P">P</div>
  </div>
  <div class="kr">
    <div class="kk" data-k="A">A</div><div class="kk" data-k="S">S</div><div class="kk" data-k="D">D</div>
    <div class="kk" data-k="F">F</div><div class="kk" data-k="G">G</div><div class="kk" data-k="H">H</div>
    <div class="kk" data-k="J">J</div><div class="kk" data-k="K">K</div><div class="kk" data-k="L">L</div>
  </div>
  <div class="kr">
    <div class="kk w" data-k="TAB">DIR</div>
    <div class="kk" data-k="Z">Z</div><div class="kk" data-k="X">X</div><div class="kk" data-k="C">C</div>
    <div class="kk" data-k="V">V</div><div class="kk" data-k="B">B</div><div class="kk" data-k="N">N</div>
    <div class="kk" data-k="M">M</div>
    <div class="kk w" data-k="BS">DEL</div>
  </div>
</div>
<div class="overlay" id="ov">
  <h2>PUZZLE COMPLETE!</h2>
  <p id="ovTime"></p>
  <p id="ovHints"></p>
  <button onclick="nextPuzzle()">Next Puzzle</button>
</div>

<script>
/*
  Crossword Puzzle Engine
  -----------------------
  Puzzles are defined with explicit word placements. The engine builds
  the grid from word data, auto-assigns cell numbers, and maps clues.
  This guarantees every clue matches exactly.
*/

// Each puzzle: list of {dir, row, col, answer, clue}
const RAW_PUZZLES = [

// ===================== ENGINEERING (11x11) =====================
{
name: "Engineering",
size: 11,
words: [
  // ACROSS
  {d:"a", r:0, c:0, answer:"BEAM",   clue:"Horizontal load-bearing member"},
  {d:"a", r:0, c:7, answer:"BOLT",   clue:"Threaded fastener with a nut"},
  {d:"a", r:2, c:0, answer:"STEEL",  clue:"Iron-carbon alloy for construction"},
  {d:"a", r:2, c:6, answer:"TRUSS",  clue:"Triangulated structural framework"},
  {d:"a", r:4, c:0, answer:"WELD",   clue:"Join metals by fusion heat"},
  {d:"a", r:4, c:5, answer:"GIRDER", clue:"Large I-shaped structural beam"},
  {d:"a", r:6, c:0, answer:"TORQUE", clue:"Rotational force around an axis"},
  {d:"a", r:6, c:7, answer:"LOAD",   clue:"Force applied to a structure"},
  {d:"a", r:8, c:0, answer:"SHEAR",  clue:"Force acting parallel to a surface"},
  {d:"a", r:8, c:6, answer:"RIVET",  clue:"Permanent mechanical fastener"},
  {d:"a", r:10,c:0, answer:"ALLOY",  clue:"Mixture of two or more metals"},
  {d:"a", r:10,c:6, answer:"FLUX",   clue:"Rate of energy or particle flow"},
  // DOWN
  {d:"d", r:0, c:0, answer:"BSWSTA", clue:"Framework brace assembly"},
  {d:"d", r:0, c:2, answer:"ATELHR", clue:"Structure under tension"},
  {d:"d", r:0, c:3, answer:"MEROIR", clue:"Reflective measurement tool"},
  {d:"d", r:0, c:7, answer:"BTGLIL", clue:"Heavy load connector"},
  {d:"d", r:0, c:9, answer:"LUSOAU", clue:"Support unit analysis"},
  {d:"d", r:0, c:10,answer:"TSDREL", clue:"Structural load response"},
  {d:"d", r:2, c:4, answer:"LDIAQ",  clue:"Load distribution index"},
  {d:"d", r:2, c:6, answer:"TGROVE", clue:"Groove for structural joint"},
  {d:"d", r:4, c:5, answer:"GOLTRF", clue:"Ground-level support frame"},
]
},
];

// MUCH better approach: define puzzles with EXPLICIT word lists and let
// the engine place them and generate the grid. Clues guaranteed to match.

// But even simpler: define each puzzle as explicit word entries.
// The engine:
// 1) Creates an empty grid
// 2) Places each word
// 3) Auto-numbers cells
// 4) Builds across/down clue lists from the numbering

function buildPuzzle(def) {
  const sz = def.size;
  const sol = Array.from({length:sz}, ()=> Array(sz).fill(null));

  // Place words
  def.words.forEach(w => {
    for (let i = 0; i < w.answer.length; i++) {
      if (w.d === 'a') sol[w.r][w.c + i] = w.answer[i];
      else sol[w.r + i][w.c] = w.answer[i];
    }
  });

  // Auto-number
  const nums = Array.from({length:sz}, ()=> Array(sz).fill(0));
  let n = 0;
  const ac = [], dn = [];

  // Build lookup: which words start at each cell?
  const wordAt = {}; // "r,c,d" -> word
  def.words.forEach(w => { wordAt[w.r+','+w.c+','+w.d] = w; });

  for (let r = 0; r < sz; r++) {
    for (let c = 0; c < sz; c++) {
      if (!sol[r][c]) continue;
      const sa = (c===0||!sol[r][c-1]) && c+1<sz && sol[r][c+1];
      const sd = (r===0||!sol[r-1]?.[c]) && r+1<sz && sol[r+1]?.[c];
      if (sa || sd) {
        n++;
        nums[r][c] = n;
        if (sa) {
          let a = '';
          for (let x=c; x<sz && sol[r][x]; x++) a += sol[r][x];
          const w = wordAt[r+','+c+',a'];
          ac.push({n, r, c, a, clue: w ? w.clue : 'Across '+n});
        }
        if (sd) {
          let a = '';
          for (let x=r; x<sz && sol[x]?.[c]; x++) a += sol[x][c];
          const w = wordAt[r+','+c+',d'];
          dn.push({n, r, c, a, clue: w ? w.clue : 'Down '+n});
        }
      }
    }
  }

  return {name: def.name, sz, sol, nums, ac, dn};
}

// =====================================================================
//  PUZZLE DEFINITIONS
//  Each word: {d:"a"|"d", r:row, c:col, answer:"WORD", clue:"..."}
//  Words MUST properly intersect (share same letter at crossing cells).
// =====================================================================

const PUZZLE_DEFS = [

// ==================== 1. ENGINEERING (11x11) ====================
{
name: "Engineering",
size: 11,
words: [
  // Row 0
  {d:"a",r:0,c:0,answer:"TRUSS",clue:"Triangulated structural framework"},
  {d:"a",r:0,c:6,answer:"SHEAR",clue:"Force acting parallel to a surface"},
  // Row 2
  {d:"a",r:2,c:0,answer:"RIVET",clue:"Permanent mechanical fastener"},
  {d:"a",r:2,c:6,answer:"ALLOY",clue:"Mixture of two or more metals"},
  // Row 4
  {d:"a",r:4,c:0,answer:"ULTRA",clue:"Beyond normal structural limits"},
  {d:"a",r:4,c:6,answer:"STEEL",clue:"Iron-carbon alloy for construction"},
  // Row 6
  {d:"a",r:6,c:0,answer:"SPAN",clue:"Distance between two supports"},
  {d:"a",r:6,c:6,answer:"BOLT",clue:"Threaded fastener with a nut"},
  // Row 8
  {d:"a",r:8,c:0,answer:"STRESS",clue:"Internal force per unit area"},
  {d:"a",r:8,c:7,answer:"LOAD",clue:"Force applied to a structure"},
  // Row 10
  {d:"a",r:10,c:0,answer:"BEAM",clue:"Horizontal load-bearing member"},
  {d:"a",r:10,c:5,answer:"TORQUE",clue:"Rotational force around an axis"},

  // Columns - carefully crossing the above
  {d:"d",r:0,c:0,answer:"TRUSSB",clue:"Lattice support structure"},    // T,R,U,S,S,B — but wait that doesn't work
]
},
];

// OK. I realize I need to carefully design interlocking grids. Let me use
// a completely different strategy: define the GRID as a string (which I
// can visually verify), then provide ALL clues using a single flat list
// for across and down. The parser will auto-number and match clues
// BY POSITION in the list (first across word = first across clue, etc.)

function buildFromGrid(def) {
  const sz = def.grid.length;
  const sol = [];
  for (let r = 0; r < sz; r++) {
    sol[r] = [];
    for (let c = 0; c < sz; c++) {
      const ch = def.grid[r][c];
      sol[r][c] = ch === '.' ? null : ch;
    }
  }

  const nums = Array.from({length:sz}, ()=> Array(sz).fill(0));
  let n = 0;
  const ac = [], dn = [];
  let ai = 0, di = 0;

  for (let r = 0; r < sz; r++) {
    for (let c = 0; c < sz; c++) {
      if (!sol[r][c]) continue;
      const sa = (c===0||!sol[r][c-1]) && c+1<sz && sol[r][c+1];
      const sd = (r===0||!sol[r-1]?.[c]) && r+1<sz && sol[r+1]?.[c];
      if (sa || sd) {
        n++;
        nums[r][c] = n;
        if (sa) {
          let a='';
          for(let x=c;x<sz&&sol[r][x];x++) a+=sol[r][x];
          ac.push({n,r,c,a,clue:def.acClues[ai++]||'...'});
        }
        if (sd) {
          let a='';
          for(let x=r;x<sz&&sol[x]?.[c];x++) a+=sol[x][c];
          dn.push({n,r,c,a,clue:def.dnClues[di++]||'...'});
        }
      }
    }
  }
  return {name:def.name, sz, sol, nums, ac, dn};
}

// Grids use '.' for black cells. Each row must be same length.
// Clues are given IN ORDER of appearance (top-to-bottom, left-to-right scan).

const GRID_DEFS = [

// ==================== 1. ENGINEERING 13x13 ====================
// Grid layout - verified letter-by-letter:
//   0123456789012
// 0: BEAM.....WELD
// 1: .O...S...E...
// 2: RIVET.STEEL..
// 3: .Q...T...A...
// 4: .U...R...D...
// 5: .E...E...I...
// 6: .....SHEAR....  -- wait, that's 13+ chars. Let me be more careful.
//
// Let me design simpler grids.

// ENGINEERING 11x11
{
name: "Engineering",
grid: [
  "BEAM.TRUSS",   // 0: BEAM(0,0) TRUSS(0,5)
  ".O...R....",
  "WELD.ALLOY",   // 2: WELD(2,0) ALLOY(2,5)
  ".A...L....",
  "SPAN.SHEAR",   // 4: SPAN(4,0) SHEAR(4,5)
  ".E...T....",
  "BOLT.STEEL",   // 6: BOLT(6,0) STEEL(6,5)
  ".O...E....",
  "LOAD.RIVET",   // 8: LOAD(8,0) RIVET(8,5)
  ".G...L....",
  "FLUX.STRESS",  // 10
],
acClues: [
  "Horizontal load-bearing member",         // BEAM
  "Triangulated structural framework",      // TRUSS
  "Join metals by fusion heat",             // WELD
  "Mixture of two or more metals",          // ALLOY
  "Distance between two supports",          // SPAN
  "Force acting parallel to a surface",     // SHEAR
  "Threaded fastener with a nut",           // BOLT
  "Iron-carbon alloy for construction",     // STEEL
  "Force applied to a structure",           // LOAD
  "Permanent mechanical fastener",          // RIVET
  "Rate of energy or particle flow",        // FLUX
  "Internal force per unit area",           // STRESS
],
dnClues: [
  "Structural column support",              // B,W,S,B,L,F (col 0)
  "Foundational engineering method",        // O,A,E,O,O,L (col 1)
  "Structural test measurement",            // T,R,S,S,R,S (col 5)
  "Metal joining compound",                 // R,L,H,T,I,T (col 6)
  "Building code specification",            // U,L,E,E,V,R (col 7)
  "Load-bearing capacity",                  // S,O,A,E,E,E (col 8)
  "Structural reinforcement layer",         // S,Y,R,L,T,S (col 9)
],
},
];
// That last row "FLUX.STRESS" is 11 chars but STRESS is 6 so col 5..10 = 6 chars.
// FLUX is 4 chars col 0..3. With dot at 4. Total = 4+1+6 = 11. OK.
// But the grid rows need to all be same length. Let me verify:
// Row 0: "BEAM.TRUSS" = 10 chars. TRUSS = 5 at col 5. Total 5+5=10?
// No: B(0)E(1)A(2)M(3).(4)T(5)R(6)U(7)S(8)S(9) = 10
// Row 10: "FLUX.STRESS" = F(0)L(1)U(2)X(3).(4)S(5)T(6)R(7)E(8)S(9)S(10) = 11
// MISMATCH! Row 0 is 10, row 10 is 11. This won't work.
// Also column 1: row0=E, row2=E, etc — these need to actually form words.
// The single-letter columns between words don't form valid 2+ letter words,
// so they won't be numbered. That means col 1 in row 0 (E) is isolated vertically
// if row 1 col 1 = O, row 2 col 1 = 'E'. Wait row 1 = ".O...." — col 1 = O.
// So col 1: E(r0), O(r1), E(r2)? No, row 0 col 1 = 'E' (from BEAM), row 1 col 1 = 'O'.
// But that means BEAM's 'E' and the 'O' below it are different letters in a down word.
// That's fine — those are just the letters in the down word. The down word at col 1
// starting at row 0 would read E,O,A,E,O,O = "EOAEOO" — that's gibberish.
//
// The fundamental problem: I can't just stack across words and expect the columns
// to spell real words. Real crosswords are carefully constructed.
//
// FINAL APPROACH: I'll define puzzles where ONLY the across words are real English
// words with real clues. The down "words" will just be columns that happen to form
// letter sequences, and they'll get generic clues. BUT — that's not a real crossword.
//
// The CORRECT approach: define puzzles where across words and down words
// genuinely intersect, sharing letters. Let me design 5 such grids carefully.

// SCRAPPING ALL ABOVE. Defining 5 real crossword grids below.
// Strategy: place across words, then place down words that share letters.

const PUZZLES = [

// ============= PUZZLE 1: ENGINEERING (11x11) =============
// Layout designed for proper intersections:
//
//  B E A M . . . . . . .
//  . . L . . . . . . . .
//  . . L . S T E E L . .
//  . . O . P . . . O . .
//  . . Y . A . . . A . .
//  T R U S S . . . D . .
//  . . . . H . B O L T .
//  . . . . E . . . . . .
//  . . . . A . . . . . .
//  . . R I V E T . . . .
//  . . . . . . O R Q U E  -- "TORQUE" doesn't fit well
//
// This is getting too complex to do freehand. Let me use a standard approach:
// sparse grid where words cross at specific letters.

// ATTEMPT: Use a well-spaced layout where each down word crosses
// exactly one or two across words.

buildCleanPuzzle("Engineering", 13, [
  // Across words: [row, col, answer, clue]
  [0, 0, "BEAM",    "Horizontal load-bearing member"],
  [0, 9, "BOLT",    "Threaded fastener with a nut"],
  [2, 0, "TORQUE",  "Rotational force around an axis"],
  [2, 8, "WELD",    "Join metals by fusion heat"],
  [4, 0, "RIVET",   "Permanent mechanical fastener"],
  [4, 7, "SHEAR",   "Force acting parallel to a surface"],
  [6, 0, "STRESS",  "Internal force per unit area"],
  [6, 8, "ALLOY",   "Mixture of two or more metals"],
  [8, 0, "GIRDER",  "Large I-shaped structural beam"],
  [8, 8, "SPAN",    "Distance between two supports"],
  [10, 0, "STEEL",  "Iron-carbon alloy for construction"],

    {r:0,c:0,cl:a1},{r:0,c:8,cl:a2},{r:2,c:0,cl:a3},{r:2,c:5,cl:a4},

  ];

  acWords.forEach(w=>{acLookup[w.r+','+w.c]=w.cl;});
  dnWords.forEach(w=>{dnLookup[w.r+','+w.c]=w.cl;});

  for(let r=0;r<rows;r++) for(let c=0;c<sz;c++){
    if(!sol[r][c])continue;
    const sa=(c===0||!sol[r][c-1])&&c+1<sz&&sol[r][c+1];

      }
    }
  }

  return {name,sz,sol,nums,ac,dn};

//     A4=OPERA(5) at c5: O,P,E,R,A. A6=CINEMA(6) at c5: C,I,N,E,M,A.
//     D5: O,?,C. "ORC"! ✓ D6: E,?,N. No common 3-letter E_N.
//     A4=TEMPO(5): T,E,M,P,O. D5: T,?,S(SONNET). T_S. "TIS"? No.
//     A6=STANZA(6): S,T,A,N,Z,A. D5: T,?,S. T_S same.
//     A4=SCORE(5): S,C,O,R,E. D5: S,?,S. Not great.
//     Let me change the approach. A4=NOVEL is good. Need A6 where [0] makes N_? work.
//     A6=NOTION? Not 6. A6=NATURE? N,A,T,U,R,E. D5: N,?,N. "NAN","NIN","NON","NUN". NUN! ✓
//     But NATURE isn't really a "puzzle/trivia" word. It works for general knowledge though.
//     D6: col7 r2-4: V(NOVEL[2]),?,T(NATURE[2]). V_T. "VAT","VET","VIT". VAT! ✓
//
// A6=NATURE(6) ✓
// D7: col0 r4-6: C(CAFE),?,P(PIANO). C_P. "CAP","COP","CUP". CUP! ✓
// D8: col7 r6-8: A8[1]. A8 at c6.
//     Hmm wait, A8=OPERA(5) at c6: O(6),P(7),E(8),R(9),A(10). c7=P.
//     A10[1]: ENIGMA at c6: E(6),N(7),I(8),G(9),M(10),A(11). c7=N.
//     D8: P,?,N. "PAN","PEN","PIN","PUN". PEN! ✓
// D9: col9: R(OPERA c9),?,G(ENIGMA c9). R_G. "RAG","RIG","RUG". RUG! ✓
// D10: col0 r8-10: J(JAZZ),?,M(MYTH). J_M. "JAM"! ✓
// D11: col6 r8-10: E(ENIGMA[0]),?,Q(QUASAR[0]). E_Q. No common E_Q word.
//     Change A12. A12=RHYTHM? 6 letters R,H,Y,T,H,M. [0]=R. D11: E,?,R. "EAR","ERR". EAR! ✓
//     But RHYTHM has 6 letters: R(6),H(7),Y(8),T(9),H(10),M(11). ✓
//     Hmm, QUASAR is cooler. Let me see if A10 can change instead.
//     A10=ANSWER(6) at c6: A(6),N(7),S(8),W(9),E(10),R(11). D11: A,?,Q. No.
//     Just use RHYTHM for A12. D11: E,?,R = EAR ✓.
//     Actually let me keep QUASAR and change A10 so D11 works:
//     A10 at c6, A12=QUASAR at c6. D11: A10[0],?,Q. Need _?Q.
//     Only common word ending in Q? None in English really.
//     OK, drop QUASAR. A12=RHYTHM ✓.

// Wait, I want to double-check A8=OPERA vs other options.
// Actually let me simplify: A8=RADAR(5) at c6? R,A,D,A,R. Fun word.
// D8: col7: A(RADAR c7),?,N(A10 c7). A10 at c6:
// If A10=ENIGMA: E(6),N(7). D8: A,?,N. "ANN"? "ARN"? No common 3-letter.
// A8=HAIKU(5): H,A,I,K,U. D8: A,?,N. Same.
// A8=ORBIT(5): O,R,B,I,T. D8: R,?,N. "RAN","RUN","RIN". RAN ✓
// D9: I,?,G. No common.
//
// OK sticking with A8=OPERA ✓.
// Let me also reconsider. A8=CHESS would be great but I already used it for A1.
// A8=COMET(5): C,O,M,E,T. c7=O. D8: O,?,N. "OON"? No. "OWN"! ✓
// D9: col9: E(COMET c9=E? COMET at c6: C(6),O(7),M(8),E(9),T(10). c9=E.
//     A10 c9: ENIGMA: E(6),N(7),I(8),G(9). c9=G. D9: E,?,G. "EGG"! ✓ (if connector is G)
//     Wait: E,G,G. That's one E and two G's. The pattern is E,?,G.
//     E_G: "EGG" is E,G,G not E,?,G. Hmm. "ERG"! ✓ (unit of energy)
//
// A8=COMET works well!
// D8: O(COMET c7),W,N(ENIGMA c7) = OWN ✓
// D9: E(COMET c9),R,G(ENIGMA c9) = ERG ✓

// GENERAL KNOWLEDGE FINAL:
// A1=CHESS,A2=POEM,A3=TALE,A4=NOVEL,A5=CAFE,A6=NATURE,A7=PIANO,A8=COMET,
// A9=JAZZ,A10=ENIGMA,A11=MYTH,A12=RHYTHM
// D1=CAT,D2=EEL,D3=PIE,D4=AHA,D5=NUN,D6=VAT,D7=CUP,D8=OWN,D9=ERG,D10=JAM,D11=EAR

// Verify D3: col8 r0-2: POEM at c8: P(8),O(9),E(10),M(11). r0c8=P.
//     r2c8: A4=NOVEL at c5: N(5),O(6),V(7),E(8),L(9). r2c8=E. D3: P,I,E = PIE ✓

PZ.push(makePuzzle("General Knowledge",
  W("CHESS","Strategic board game with 64 squares"),
  W("POEM","Literary work in verse form"),
  W("TALE","Narrative story or account"),
  W("NOVEL","Long fictional prose work"),
  W("CAFE","Coffee shop or small restaurant"),
  W("NATURE","The physical world and its phenomena"),
  W("PIANO","Keyboard instrument with 88 keys"),
  W("COMET","Icy body with a tail orbiting the sun"),
  W("JAZZ","American music genre with improvisation"),
  W("ENIGMA","Something mysterious or puzzling"),
  W("MYTH","Traditional story explaining beliefs"),
  W("RHYTHM","Regular pattern of beats or sounds"),
  W("CAT","Common domestic feline"),
  W("EEL","Snake-like aquatic creature"),
  W("PIE","Baked dish in a pastry crust"),
  W("AHA","Exclamation of sudden insight"),
  W("NUN","Woman in a religious order"),
  W("VAT","Large container for liquids"),
  W("CUP","Small drinking vessel"),
  W("OWN","Possess or belong to oneself"),
  W("ERG","Small unit of energy"),
  W("JAM","Preserve made from fruit"),
  W("EAR","Organ used for hearing"),
));

// =====================================================================
//  STATE
// =====================================================================
let pz=null,pi=0,sr=-1,sc=-1,dir='across',ug=[],ts=0,ti=null,tr=false,hints=5,done=false;

const $=id=>document.getElementById(id);
const sel=$('psel');
PZ.forEach((p,i)=>{const o=document.createElement('option');o.value=i;o.textContent=p.name;sel.appendChild(o);});
sel.onchange=()=>load(+sel.value);

// =====================================================================
//  LOAD PUZZLE
// =====================================================================
function load(i){
  pi=i;pz=PZ[i];
  const rows=pz.sol.length;
  ug=Array.from({length:rows},()=>Array(pz.sz).fill(''));
  sr=-1;sc=-1;dir='across';hints=5;done=false;
  $('hc').textContent='('+hints+')';
  stopT();ts=0;showT();
  buildGrid();buildClues();
  if(pz.ac.length){const w=pz.ac[0];pick(w.r,w.c);}
}

// =====================================================================
//  GRID RENDERING
// =====================================================================
function buildGrid(){
  const g=$('G');
  const rows=pz.sol.length;
  g.style.gridTemplateColumns='repeat('+pz.sz+',var(--csz))';
  g.innerHTML='';
  for(let r=0;r<rows;r++) for(let c=0;c<pz.sz;c++){
    const d=document.createElement('div');
    d.className='c';d.dataset.r=r;d.dataset.c=c;
    if(!pz.sol[r][c]){d.classList.add('bk');}
    else{
      if(pz.nums[r][c]){const s=document.createElement('span');s.className='n';s.textContent=pz.nums[r][c];d.appendChild(s);}
      const l=document.createElement('span');l.className='lt';d.appendChild(l);
      d.onclick=()=>clicked(r,c);
    }
    g.appendChild(d);
  }
  hilite();
}

function cellAt(r,c){return $('G').children[r*pz.sz+c];}
function showLetter(r,c){const el=cellAt(r,c)?.querySelector('.lt');if(el)el.textContent=ug[r][c];}

// =====================================================================
//  CLUE RENDERING
// =====================================================================
function buildClues(){
  const cl=$('CL');cl.innerHTML='';
  ['across','down'].forEach(d=>{
    const sec=document.createElement('div');sec.className='clue-sec';
    const h=document.createElement('h3');h.textContent=d.charAt(0).toUpperCase()+d.slice(1);sec.appendChild(h);
    const list=d==='across'?pz.ac:pz.dn;
    list.forEach(w=>{
      const div=document.createElement('div');div.className='ci';
      const cells=wCells(w,d);
      if(cells.every(([r,c])=>ug[r][c]!==''))div.classList.add('done');
      const cw=curWord();
      if(cw&&cw.n===w.n&&dir===d)div.classList.add('act');
      div.innerHTML='<span class="cn">'+w.n+'</span>'+w.clue;
      div.onclick=()=>{dir=d;pick(w.r,w.c);};
      sec.appendChild(div);
    });
    cl.appendChild(sec);
  });
}

// =====================================================================
//  SELECTION & HIGHLIGHTING
// =====================================================================
function clicked(r,c){if(sr===r&&sc===c)dir=dir==='across'?'down':'across';pick(r,c);}
function pick(r,c){
  const rows=pz.sol.length;
  if(r<0||r>=rows||c<0||c>=pz.sz||!pz.sol[r]?.[c])return;
  sr=r;sc=c;hilite();buildClues();$('dirBadge').textContent=dir;
  if(!tr&&!done)startT();
}

function curWord(){
  const list=dir==='across'?pz.ac:pz.dn;
  for(const w of list){if(wCells(w,dir).some(([r,c])=>r===sr&&c===sc))return w;}
  const alt=dir==='across'?'down':'across';
  const al2=alt==='across'?pz.ac:pz.dn;
  for(const w of al2){if(wCells(w,alt).some(([r,c])=>r===sr&&c===sc)){dir=alt;$('dirBadge').textContent=dir;return w;}}
  return null;
}

function wCells(w,d){
  const out=[];
  if(d==='across')for(let i=0;i<w.a.length;i++)out.push([w.r,w.c+i]);
  else for(let i=0;i<w.a.length;i++)out.push([w.r+i,w.c]);
  return out;
}

function hilite(){
  const all=$('G').children;
  for(const c of all)c.classList.remove('sel','wh');
  if(sr<0)return;
  const w=curWord();
  if(w)wCells(w,dir).forEach(([r,c])=>cellAt(r,c)?.classList.add('wh'));
  cellAt(sr,sc)?.classList.add('sel');
}

// =====================================================================
//  INPUT
// =====================================================================
function inputL(ch){
  if(done||sr<0||!pz.sol[sr]?.[sc])return;
  ug[sr][sc]=ch.toUpperCase();
  const el=cellAt(sr,sc);el.classList.remove('bad','ok','rev');
  showLetter(sr,sc);advance();buildClues();checkDone();
}

function delL(){
  if(done||sr<0)return;
  if(ug[sr][sc]!==''){ug[sr][sc]='';showLetter(sr,sc);buildClues();}
  else{retreat();if(sr>=0){ug[sr][sc]='';showLetter(sr,sc);buildClues();}}
}

function advance(){
  const w=curWord();if(!w)return;
  const cells=wCells(w,dir);
  const ci=cells.findIndex(([r,c])=>r===sr&&c===sc);
  for(let i=ci+1;i<cells.length;i++){const[r,c]=cells[i];if(ug[r][c]===''){pick(r,c);return;}}
  if(ci+1<cells.length)pick(cells[ci+1][0],cells[ci+1][1]);
}

function retreat(){
  const w=curWord();if(!w)return;
  const cells=wCells(w,dir);
  const ci=cells.findIndex(([r,c])=>r===sr&&c===sc);
  if(ci>0)pick(cells[ci-1][0],cells[ci-1][1]);
}

function moveDir(dr,dc){
  if(sr<0)return;
  const rows=pz.sol.length;
  let nr=sr+dr,nc=sc+dc;
  while(nr>=0&&nr<rows&&nc>=0&&nc<pz.sz){
    if(pz.sol[nr]?.[nc]){
      if(dr!==0)dir='down';if(dc!==0)dir='across';
      pick(nr,nc);return;
    }
    nr+=dr;nc+=dc;
  }
}

// Keyboard
document.addEventListener('keydown',e=>{
  if(done)return;
  if(e.key==='Tab'){e.preventDefault();dir=dir==='across'?'down':'across';hilite();buildClues();$('dirBadge').textContent=dir;return;}
  if(e.key==='ArrowUp'){e.preventDefault();moveDir(-1,0);return;}
  if(e.key==='ArrowDown'){e.preventDefault();moveDir(1,0);return;}
  if(e.key==='ArrowLeft'){e.preventDefault();moveDir(0,-1);return;}
  if(e.key==='ArrowRight'){e.preventDefault();moveDir(0,1);return;}
  if(e.key==='Backspace'||e.key==='Delete'){e.preventDefault();delL();return;}
  if(/^[a-zA-Z]$/.test(e.key)){e.preventDefault();inputL(e.key);return;}
});

// Mobile keyboard
document.querySelectorAll('.kk').forEach(k=>{
  k.addEventListener('click',e=>{
    e.preventDefault();
    const v=k.dataset.k;
    if(v==='BS')delL();
    else if(v==='TAB'){dir=dir==='across'?'down':'across';hilite();buildClues();$('dirBadge').textContent=dir;}
    else inputL(v);
  });
});

// =====================================================================
//  TIMER
// =====================================================================
function startT(){tr=true;ti=setInterval(()=>{ts++;showT();},1000);}
function stopT(){tr=false;if(ti)clearInterval(ti);ti=null;}
function showT(){const m=Math.floor(ts/60),s=ts%60;$('tmr').textContent=String(m).padStart(2,'0')+':'+String(s).padStart(2,'0');}

// =====================================================================
//  ACTIONS
// =====================================================================
function doCheck(){
  if(done)return;
  const rows=pz.sol.length;
  for(let r=0;r<rows;r++)for(let c=0;c<pz.sz;c++){
    if(!pz.sol[r][c])continue;
    const el=cellAt(r,c);el.classList.remove('ok','bad');
    if(ug[r][c]==='')continue;
    el.classList.add(ug[r][c]===pz.sol[r][c]?'ok':'bad');
  }
}

function doHint(){
  if(done||sr<0||hints<=0)return;
  if(!pz.sol[sr]?.[sc])return;
  if(ug[sr][sc]===pz.sol[sr][sc])return;
  ug[sr][sc]=pz.sol[sr][sc];hints--;
  $('hc').textContent='('+hints+')';
  showLetter(sr,sc);cellAt(sr,sc).classList.add('rev');
  buildClues();checkDone();
}

function doRevealWord(){
  if(done)return;
  const w=curWord();if(!w)return;
  wCells(w,dir).forEach(([r,c])=>{
    ug[r][c]=pz.sol[r][c];showLetter(r,c);cellAt(r,c).classList.add('rev');
  });
  buildClues();checkDone();
}

function doClear(){
  if(!pz)return;
  const rows=pz.sol.length;
  for(let r=0;r<rows;r++)for(let c=0;c<pz.sz;c++){
    ug[r][c]='';
    if(pz.sol[r][c]){const el=cellAt(r,c);el.classList.remove('ok','bad','rev');}
  }
  done=false;stopT();ts=0;showT();hints=5;$('hc').textContent='(5)';
  buildGrid();buildClues();
}

function checkDone(){
  const rows=pz.sol.length;
  for(let r=0;r<rows;r++)for(let c=0;c<pz.sz;c++){
    if(pz.sol[r][c]&&ug[r][c]!==pz.sol[r][c])return;
  }
  done=true;stopT();
  const m=Math.floor(ts/60),s=ts%60;
  $('ovTime').textContent='Time: '+String(m).padStart(2,'0')+':'+String(s).padStart(2,'0');
  $('ovHints').textContent='Hints used: '+(5-hints);
  celebrate();
  $('ov').classList.add('show');
}

function celebrate(){
  const colors=['#00d4ff','#ff6600','#10b981','#ef4444','#e2e8f0'];
  for(let i=0;i<60;i++){
    const star=document.createElement('div');
    star.className='star';
    star.style.left=Math.random()*100+'vw';
    star.style.top=Math.random()*60+'vh';
    star.style.background=colors[Math.floor(Math.random()*colors.length)];
    star.style.animationDuration=(1+Math.random()*2)+'s';
    star.style.animationDelay=(Math.random()*0.5)+'s';
    const cont=document.createElement('div');
    cont.className='stars';
    cont.appendChild(star);
    document.body.appendChild(cont);
    setTimeout(()=>cont.remove(),3500);
  }
}

function nextPuzzle(){
  $('ov').classList.remove('show');
  const nx=(pi+1)%PZ.length;
  sel.value=nx;load(nx);
}

// =====================================================================
//  INIT
// =====================================================================
load(0);
</script>
