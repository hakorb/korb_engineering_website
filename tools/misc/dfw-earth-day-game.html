<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>DFW Earth-Day Game | Korb Engineering</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#050a0f;--surface:#0a1018;--surface2:#0e1520;--border:#1a2535;
  --green:#10b981;--cyan:#00d4ff;--bright-green:#22c55e;--orange:#ff6600;--red:#ef4444;
  --text:#e0e8f0;--text-dim:#7a8a9a;--text-bright:#ffffff;
}
html{font-size:16px}
body{
  font-family:'JetBrains Mono',monospace;background:var(--bg);color:var(--text);
  min-height:100dvh;overflow-x:hidden;position:relative;
}
button{font-family:inherit;cursor:pointer;border:none;outline:none;-webkit-tap-highlight-color:transparent}
.screen{display:none;flex-direction:column;align-items:center;justify-content:center;min-height:100dvh;padding:20px;position:relative;z-index:2}
.screen.active{display:flex}

/* Rain canvas */
#rain-canvas{position:fixed;top:0;left:0;width:100%;height:100%;z-index:0;pointer-events:none;opacity:0.3}
#confetti-canvas{position:fixed;top:0;left:0;width:100%;height:100%;z-index:10;pointer-events:none}

/* Floating Earth */
.earth{font-size:80px;animation:float 6s ease-in-out infinite;user-select:none;line-height:1}
@keyframes float{0%,100%{transform:translateY(0) rotate(0deg)}50%{transform:translateY(-15px) rotate(5deg)}}

/* Start Screen */
.start-title{
  font-size:clamp(1.6rem,5vw,2.8rem);font-weight:700;
  background:linear-gradient(135deg,var(--green),var(--cyan));
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;
  background-clip:text;text-align:center;margin:16px 0 8px;
}
.start-subtitle{font-size:clamp(0.8rem,2.5vw,1rem);color:var(--text-dim);text-align:center;max-width:500px;line-height:1.6;margin-bottom:24px}
.btn-start{
  font-size:1.1rem;font-weight:600;padding:16px 48px;border-radius:12px;
  background:linear-gradient(135deg,var(--green),#059669);color:var(--bg);
  transition:transform 0.2s,box-shadow 0.2s;min-height:54px;
  box-shadow:0 0 30px rgba(16,185,129,0.3);
}
.btn-start:hover{transform:scale(1.05);box-shadow:0 0 40px rgba(16,185,129,0.5)}
.btn-start:active{transform:scale(0.97)}
.stats-box{
  margin-top:24px;padding:16px 24px;border-radius:10px;
  background:var(--surface);border:1px solid var(--border);
  display:flex;gap:24px;flex-wrap:wrap;justify-content:center;
}
.stat{text-align:center}
.stat-val{font-size:1.3rem;font-weight:700;color:var(--cyan)}
.stat-label{font-size:0.7rem;color:var(--text-dim);margin-top:2px}
.sound-toggle{
  position:fixed;top:16px;right:16px;z-index:20;
  background:var(--surface);border:1px solid var(--border);border-radius:8px;
  padding:8px 12px;color:var(--text-dim);font-size:0.75rem;
  display:flex;align-items:center;gap:6px;
}

/* Question Screen */
.progress-bar-wrap{
  width:100%;max-width:600px;display:flex;gap:6px;margin-bottom:16px;justify-content:center;flex-wrap:wrap;
}
.progress-dot{
  width:28px;height:6px;border-radius:3px;background:var(--border);transition:background 0.3s;
}
.progress-dot.correct{background:var(--green)}
.progress-dot.wrong{background:var(--red)}
.progress-dot.current{background:var(--cyan);animation:pulse-dot 1s ease-in-out infinite}
@keyframes pulse-dot{0%,100%{opacity:1}50%{opacity:0.5}}

.q-header{
  display:flex;justify-content:space-between;align-items:center;
  width:100%;max-width:600px;margin-bottom:12px;
}
.q-number{font-size:0.85rem;color:var(--cyan);font-weight:600}
.q-timer{
  font-size:1.1rem;font-weight:700;color:var(--green);
  min-width:50px;text-align:right;transition:color 0.3s;
}
.q-timer.warning{color:var(--orange);animation:pulse-timer 0.5s ease-in-out infinite}
@keyframes pulse-timer{0%,100%{opacity:1}50%{opacity:0.6}}

.timer-bar{
  width:100%;max-width:600px;height:4px;border-radius:2px;
  background:var(--border);margin-bottom:20px;overflow:hidden;
}
.timer-bar-fill{
  height:100%;border-radius:2px;background:linear-gradient(90deg,var(--green),var(--cyan));
  transition:width 0.25s linear;
}
.timer-bar-fill.warning{background:linear-gradient(90deg,var(--orange),var(--red))}

.q-text{
  font-size:clamp(0.95rem,2.8vw,1.15rem);font-weight:500;text-align:center;
  max-width:600px;line-height:1.7;margin-bottom:24px;color:var(--text-bright);
  animation:slideIn 0.4s ease-out;
}
@keyframes slideIn{from{opacity:0;transform:translateY(20px)}to{opacity:1;transform:translateY(0)}}

.choices{display:flex;flex-direction:column;gap:10px;width:100%;max-width:600px}
.choice-btn{
  display:flex;align-items:flex-start;gap:12px;padding:14px 18px;
  border-radius:10px;background:var(--surface);border:2px solid var(--border);
  color:var(--text);font-size:clamp(0.82rem,2.2vw,0.92rem);text-align:left;
  min-height:52px;transition:border-color 0.2s,background 0.2s,transform 0.15s;
  line-height:1.5;animation:slideIn 0.4s ease-out;
  animation-delay:calc(var(--i) * 0.08s);animation-fill-mode:backwards;
}
.choice-btn:hover:not(:disabled){border-color:var(--cyan);background:var(--surface2);transform:translateX(4px)}
.choice-btn:active:not(:disabled){transform:scale(0.98)}
.choice-btn:disabled{cursor:default}
.choice-letter{
  font-weight:700;color:var(--cyan);min-width:24px;flex-shrink:0;
}
.choice-btn.correct-answer{border-color:var(--green);background:rgba(16,185,129,0.15);color:var(--green)}
.choice-btn.wrong-answer{border-color:var(--red);background:rgba(239,68,68,0.12);color:var(--red)}

.score-display{
  position:fixed;top:16px;left:16px;z-index:20;
  font-size:0.85rem;font-weight:600;color:var(--green);
}
.streak-display{
  font-size:0.7rem;color:var(--cyan);margin-top:2px;
}
.multiplier{
  display:inline-block;background:var(--cyan);color:var(--bg);
  padding:1px 6px;border-radius:4px;font-weight:700;font-size:0.65rem;
  margin-left:4px;
}

/* Fun Fact */
.fun-fact{
  max-width:600px;width:100%;margin-top:20px;padding:18px 20px;
  border-radius:10px;background:var(--surface);border:1px solid var(--green);
  animation:slideIn 0.5s ease-out;display:none;
}
.fun-fact.show{display:block}
.fun-fact-header{font-size:0.8rem;font-weight:700;color:var(--green);margin-bottom:8px}
.fun-fact-text{font-size:0.82rem;line-height:1.7;color:var(--text-dim)}
.btn-next{
  margin-top:16px;padding:12px 32px;border-radius:8px;
  background:var(--green);color:var(--bg);font-weight:600;font-size:0.9rem;
  min-height:48px;
}

/* Flash overlay */
.flash{
  position:fixed;top:0;left:0;width:100%;height:100%;z-index:5;
  pointer-events:none;opacity:0;transition:opacity 0.15s;
}
.flash.green{background:rgba(16,185,129,0.15)}
.flash.red{background:rgba(239,68,68,0.15)}
.flash.show{opacity:1}

/* Results Screen */
.results-card{
  max-width:500px;width:100%;padding:32px 24px;border-radius:16px;
  background:var(--surface);border:1px solid var(--border);text-align:center;
}
.results-grade{
  font-size:3rem;font-weight:700;
  background:linear-gradient(135deg,var(--green),var(--cyan));
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;
}
.results-score{font-size:1.4rem;font-weight:600;color:var(--text-bright);margin:8px 0}
.results-bar-wrap{
  width:100%;height:10px;border-radius:5px;background:var(--border);
  margin:16px 0;overflow:hidden;
}
.results-bar-fill{height:100%;border-radius:5px;background:linear-gradient(90deg,var(--green),var(--cyan));transition:width 1.5s ease-out}
.results-stats{display:flex;justify-content:center;gap:20px;flex-wrap:wrap;margin:16px 0}
.results-stat{text-align:center}
.results-stat-val{font-size:1.1rem;font-weight:700;color:var(--cyan)}
.results-stat-label{font-size:0.65rem;color:var(--text-dim);margin-top:2px}
.share-box{
  margin:16px 0;padding:12px;border-radius:8px;background:var(--surface2);
  border:1px solid var(--border);font-size:0.75rem;color:var(--text-dim);
  cursor:pointer;transition:border-color 0.2s;word-break:break-word;
}
.share-box:hover{border-color:var(--cyan)}
.share-copied{font-size:0.7rem;color:var(--green);margin-top:4px;opacity:0;transition:opacity 0.3s}
.share-copied.show{opacity:1}
.env-tip{
  margin-top:16px;padding:12px 16px;border-radius:8px;border-left:3px solid var(--green);
  background:rgba(16,185,129,0.05);text-align:left;
}
.env-tip-header{font-size:0.7rem;font-weight:700;color:var(--green);margin-bottom:4px}
.env-tip-text{font-size:0.75rem;color:var(--text-dim);line-height:1.6}
.btn-again{
  margin-top:20px;padding:14px 40px;border-radius:10px;
  background:linear-gradient(135deg,var(--green),#059669);color:var(--bg);
  font-weight:600;font-size:1rem;min-height:52px;
  box-shadow:0 0 20px rgba(16,185,129,0.3);
}

/* Score pop animation */
.score-pop{
  position:fixed;z-index:15;font-weight:700;pointer-events:none;
  animation:scorePop 1s ease-out forwards;
}
@keyframes scorePop{
  0%{opacity:1;transform:translateY(0) scale(1)}
  100%{opacity:0;transform:translateY(-60px) scale(1.3)}
}

@media(max-width:480px){
  .screen{padding:16px 12px}
  .stats-box{gap:16px;padding:12px 16px}
  .choice-btn{padding:12px 14px}
}
</style>
</head>
<body>

<canvas id="rain-canvas"></canvas>
<canvas id="confetti-canvas"></canvas>

<div class="flash green" id="flash-green"></div>
<div class="flash red" id="flash-red"></div>

<button class="sound-toggle" id="sound-toggle" aria-label="Toggle sound">
  <span id="sound-icon">&#x1F50A;</span> <span id="sound-label">Sound ON</span>
</button>

<!-- START SCREEN -->
<div class="screen active" id="screen-start">
  <div class="earth" aria-hidden="true">&#x1F30D;</div>
  <h1 class="start-title">DFW Earth-Day Game</h1>
  <p class="start-subtitle">How well do you know DFW Airport's stormwater &amp; environmental systems?</p>
  <button class="btn-start" id="btn-start">Start Game</button>
  <div class="stats-box" id="start-stats">
    <div class="stat"><div class="stat-val" id="stat-high">0</div><div class="stat-label">High Score</div></div>
    <div class="stat"><div class="stat-val" id="stat-streak">0</div><div class="stat-label">Best Streak</div></div>
    <div class="stat"><div class="stat-val" id="stat-games">0</div><div class="stat-label">Games Played</div></div>
  </div>
</div>

<!-- QUESTION SCREEN -->
<div class="screen" id="screen-question">
  <div class="score-display" id="score-display">
    Score: <span id="live-score">0</span>
    <div class="streak-display" id="streak-display"></div>
  </div>
  <div class="progress-bar-wrap" id="progress-dots"></div>
  <div class="q-header">
    <span class="q-number" id="q-number">Question 1 of 10</span>
    <span class="q-timer" id="q-timer">30</span>
  </div>
  <div class="timer-bar"><div class="timer-bar-fill" id="timer-bar-fill"></div></div>
  <div class="q-text" id="q-text"></div>
  <div class="choices" id="choices"></div>
  <div class="fun-fact" id="fun-fact">
    <div class="fun-fact-header">&#x1F4A1; Did you know?</div>
    <div class="fun-fact-text" id="fun-fact-text"></div>
    <button class="btn-next" id="btn-next">Next &#x2192;</button>
  </div>
</div>

<!-- RESULTS SCREEN -->
<div class="screen" id="screen-results">
  <div class="results-card">
    <div class="earth" style="font-size:50px" aria-hidden="true">&#x1F30E;</div>
    <div class="results-grade" id="results-grade">A+</div>
    <div class="results-score" id="results-score">1500 points</div>
    <div class="results-bar-wrap"><div class="results-bar-fill" id="results-bar-fill"></div></div>
    <div class="results-stats">
      <div class="results-stat"><div class="results-stat-val" id="res-correct">0/10</div><div class="results-stat-label">Correct</div></div>
      <div class="results-stat"><div class="results-stat-val" id="res-streak">0</div><div class="results-stat-label">Best Streak</div></div>
      <div class="results-stat"><div class="results-stat-val" id="res-time">0s</div><div class="results-stat-label">Total Time</div></div>
    </div>
    <div class="share-box" id="share-box" title="Click to copy"></div>
    <div class="share-copied" id="share-copied">Copied to clipboard!</div>
    <div class="env-tip">
      <div class="env-tip-header">&#x1F331; Environmental Tip of the Day</div>
      <div class="env-tip-text" id="env-tip-text"></div>
    </div>
    <button class="btn-again btn-start" id="btn-again">Play Again</button>
  </div>
</div>

<script>
// ===== QUESTIONS =====
const QUESTIONS = [
  {
    q: "How many watersheds do we have at the airport?",
    choices: ["7","8","9","10"],
    answer: 2,
    fact: "DFW Airport spans over 17,000 acres and its 9 distinct watersheds each drain into different receiving waterways."
  },
  {
    q: "What is the volume of Trigg Lake in acre-feet (ac-ft)? (One ac-ft equals 1 acre covered in 1 foot of water)",
    choices: ["131 ac-ft","229 ac-ft","270 ac-ft","604 ac-ft"],
    answer: 2,
    fact: "Trigg Lake holds 270 acre-feet of water \u2014 that\u2019s about 88 million gallons, enough to fill over 133 Olympic swimming pools!"
  },
  {
    q: "How many feet / miles of stormwater system pipes collect rainwater safely and effectively move the precipitation away at the airport?",
    choices: [
      "1,473,159 linear feet \u2014 or 279 miles of piping",
      "854,672 linear feet \u2014 or 162 miles of piping",
      "515,901 linear feet \u2014 or 98 miles of piping",
      "233,067 linear feet \u2014 or 44 miles of piping"
    ],
    answer: 0,
    fact: "That\u2019s enough pipe to stretch from DFW to El Paso and halfway back! The airport\u2019s stormwater system is one of the largest private systems in Texas."
  },
  {
    q: "What is the criteria for first flush?",
    choices: ["0.10 inches","0.25 inches","0.50 inches","1 inch"],
    answer: 1,
    fact: "The first flush is the initial runoff from a rainfall event, typically the most polluted. The first 0.25 inches washes the majority of surface pollutants into the stormwater system."
  },
  {
    q: 'What is the definition of a "100-year storm"?',
    choices: [
      "100 years worth of rain at once",
      "Happens only once in 100 years",
      "Has a 100% chance of occurring every year",
      "Has a 1% chance of occurring in a given year"
    ],
    answer: 3,
    fact: "A common misconception! A \u2018100-year storm\u2019 doesn\u2019t mean it happens once every 100 years. It means there\u2019s a 1% probability of that amount of rainfall in any given year. You could have two \u2018100-year storms\u2019 in the same month!"
  },
  {
    q: "Which is NOT a defined area of a FEMA derived floodplain?",
    choices: [
      "Zone A \u2014 Areas with a 1% annual chance of flooding",
      "Zone AE \u2014 High-risk areas with calculated base flood elevations",
      "Zone HG \u2014 Area outside of calculated flood risk area",
      "Zone X \u2014 Moderate risk area above the 100 Year and below the 500 year flood"
    ],
    answer: 2,
    fact: "FEMA flood zones are designated by letters. Zone HG doesn\u2019t exist \u2014 it was made up! The real zones include A, AE, AO, AH, V, VE, X, and D."
  },
  {
    q: "How many inches of fast-moving water does it take to carry away a mid-size car?",
    choices: ["6 inches","1 foot","1.5 feet","3 feet"],
    answer: 1,
    fact: "Just 12 inches of fast-moving flood water can carry away a mid-size car. Only 6 inches can knock an adult off their feet. Remember: Turn Around, Don\u2019t Drown!"
  },
  {
    q: "What is a rip-rap?",
    choices: [
      "A protective layer of large rocks to slow velocity and prevent erosion",
      "A pattern of water movement at the surface that erodes a bank",
      "A complicated dance move",
      "An area to temporarily store extreme floodwaters to be released slowly after a storm event"
    ],
    answer: 0,
    fact: "Rip-rap is one of the most common erosion control measures used at airports. The large angular stones interlock to armor the bank or channel against the force of flowing water."
  },
  {
    q: "What is the precipitation amount in inches for the 100-year event over 24 hours?",
    choices: ["5.87 inches","7.14 inches","8.15 inches","9.21 inches"],
    answer: 3,
    fact: "That\u2019s over 9 inches of rain in 24 hours! For perspective, the DFW area averages about 37 inches of rain per year. A 100-year storm dumps nearly a quarter of that in a single day."
  },
  {
    q: "What percentage of Texas land lies within the 100-year floodplain?",
    choices: ["7%","14%","21%","28%"],
    answer: 2,
    fact: "Over one-fifth of the entire state of Texas is within flood-prone areas. Texas experiences more flooding events than any other state in the U.S."
  }
];

const ENV_TIPS = [
  "Never pour chemicals, oil, or paint down storm drains \u2014 they flow directly to local waterways without treatment.",
  "Pick up pet waste! It contains bacteria and nutrients that contaminate stormwater runoff.",
  "Use permeable surfaces like gravel or pavers for driveways and walkways to reduce runoff.",
  "Rain barrels can capture rooftop runoff for garden use \u2014 saving water and reducing stormwater volume.",
  "Native plants require less water and fertilizer, and their root systems help filter stormwater naturally.",
  "Report any unusual discharges or spills near storm drains to help protect local waterways.",
  "Reduce impervious surfaces around your home to allow more rainwater to soak into the ground.",
  "Compost yard waste instead of blowing it into the street where it can clog storm drains."
];

const LETTERS = ['A','B','C','D'];

// ===== STATE =====
let gameState = {
  questions: [],
  currentQ: 0,
  score: 0,
  correct: 0,
  streak: 0,
  bestStreak: 0,
  results: [],       // 'correct'|'wrong'|null per question
  timer: 30,
  timerInterval: null,
  autoAdvanceTimeout: null,
  startTime: 0,
  answered: false,
  soundOn: true,
};

// ===== LOCAL STORAGE =====
const LS_PREFIX = 'korb_earthday_';
function lsGet(k, def) { try { const v = localStorage.getItem(LS_PREFIX + k); return v !== null ? JSON.parse(v) : def; } catch { return def; } }
function lsSet(k, v) { try { localStorage.setItem(LS_PREFIX + k, JSON.stringify(v)); } catch {} }

// ===== AUDIO (Web Audio API) =====
let audioCtx = null;
function getAudioCtx() {
  if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
  return audioCtx;
}

function playTone(freq, dur, type='sine', vol=0.15) {
  if (!gameState.soundOn) return;
  const ctx = getAudioCtx();
  const osc = ctx.createOscillator();
  const gain = ctx.createGain();
  osc.type = type;
  osc.frequency.value = freq;
  gain.gain.value = vol;
  gain.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + dur);
  osc.connect(gain);
  gain.connect(ctx.destination);
  osc.start();
  osc.stop(ctx.currentTime + dur);
}

function playCorrect() {
  if (!gameState.soundOn) return;
  playTone(523.25, 0.15, 'sine', 0.12);
  setTimeout(() => playTone(659.25, 0.15, 'sine', 0.12), 100);
  setTimeout(() => playTone(783.99, 0.25, 'sine', 0.12), 200);
}

function playWrong() {
  if (!gameState.soundOn) return;
  playTone(311, 0.25, 'sawtooth', 0.08);
  setTimeout(() => playTone(277, 0.35, 'sawtooth', 0.08), 150);
}

function playTick() {
  if (!gameState.soundOn) return;
  playTone(800, 0.05, 'square', 0.04);
}

function playFanfare() {
  if (!gameState.soundOn) return;
  const notes = [523, 659, 784, 1047];
  notes.forEach((f, i) => setTimeout(() => playTone(f, 0.3, 'sine', 0.1), i * 150));
  setTimeout(() => {
    playTone(1047, 0.6, 'sine', 0.12);
    playTone(784, 0.6, 'sine', 0.08);
    playTone(523, 0.6, 'sine', 0.06);
  }, 650);
}

// Rain ambience
let rainNodes = null;
function startRain() {
  if (!gameState.soundOn || rainNodes) return;
  const ctx = getAudioCtx();
  const bufferSize = 2 * ctx.sampleRate;
  const buffer = ctx.createBuffer(1, bufferSize, ctx.sampleRate);
  const data = buffer.getChannelData(0);
  for (let i = 0; i < bufferSize; i++) data[i] = Math.random() * 2 - 1;
  const src = ctx.createBufferSource();
  src.buffer = buffer;
  src.loop = true;
  const filter = ctx.createBiquadFilter();
  filter.type = 'lowpass';
  filter.frequency.value = 400;
  const gain = ctx.createGain();
  gain.gain.value = 0.03;
  src.connect(filter);
  filter.connect(gain);
  gain.connect(ctx.destination);
  src.start();
  rainNodes = { src, gain, filter };
}
function stopRain() {
  if (rainNodes) {
    try { rainNodes.src.stop(); } catch {}
    rainNodes = null;
  }
}

// ===== RAIN CANVAS =====
const rainCanvas = document.getElementById('rain-canvas');
const rainCtxC = rainCanvas.getContext('2d');
let drops = [];
function initRain() {
  rainCanvas.width = window.innerWidth;
  rainCanvas.height = window.innerHeight;
  drops = [];
  const count = Math.floor(window.innerWidth / 8);
  for (let i = 0; i < count; i++) {
    drops.push({
      x: Math.random() * rainCanvas.width,
      y: Math.random() * rainCanvas.height,
      len: 10 + Math.random() * 20,
      speed: 4 + Math.random() * 6,
      opacity: 0.1 + Math.random() * 0.2,
    });
  }
}
function drawRain() {
  rainCtxC.clearRect(0, 0, rainCanvas.width, rainCanvas.height);
  for (const d of drops) {
    rainCtxC.strokeStyle = `rgba(0,212,255,${d.opacity})`;
    rainCtxC.lineWidth = 1;
    rainCtxC.beginPath();
    rainCtxC.moveTo(d.x, d.y);
    rainCtxC.lineTo(d.x + 1, d.y + d.len);
    rainCtxC.stroke();
    d.y += d.speed;
    if (d.y > rainCanvas.height) { d.y = -d.len; d.x = Math.random() * rainCanvas.width; }
  }
  requestAnimationFrame(drawRain);
}
window.addEventListener('resize', () => {
  rainCanvas.width = window.innerWidth;
  rainCanvas.height = window.innerHeight;
});
initRain();
drawRain();

// ===== CONFETTI =====
const confettiCanvas = document.getElementById('confetti-canvas');
const confettiCtx = confettiCanvas.getContext('2d');
let confettiParts = [];
let confettiRunning = false;
function resizeConfetti() {
  confettiCanvas.width = window.innerWidth;
  confettiCanvas.height = window.innerHeight;
}
resizeConfetti();
window.addEventListener('resize', resizeConfetti);

function spawnConfetti(count = 60) {
  const cx = window.innerWidth / 2, cy = window.innerHeight / 2;
  const colors = ['#10b981','#00d4ff','#22c55e','#ff6600','#fbbf24','#a78bfa','#f472b6'];
  for (let i = 0; i < count; i++) {
    const angle = Math.random() * Math.PI * 2;
    const speed = 3 + Math.random() * 8;
    confettiParts.push({
      x: cx, y: cy,
      vx: Math.cos(angle) * speed,
      vy: Math.sin(angle) * speed - 4,
      size: 4 + Math.random() * 6,
      color: colors[Math.floor(Math.random() * colors.length)],
      rotation: Math.random() * 360,
      rotSpeed: (Math.random() - 0.5) * 10,
      life: 1,
    });
  }
  if (!confettiRunning) { confettiRunning = true; animateConfetti(); }
}

function animateConfetti() {
  confettiCtx.clearRect(0, 0, confettiCanvas.width, confettiCanvas.height);
  confettiParts = confettiParts.filter(p => p.life > 0);
  for (const p of confettiParts) {
    p.x += p.vx;
    p.y += p.vy;
    p.vy += 0.15;
    p.vx *= 0.99;
    p.rotation += p.rotSpeed;
    p.life -= 0.012;
    confettiCtx.save();
    confettiCtx.translate(p.x, p.y);
    confettiCtx.rotate(p.rotation * Math.PI / 180);
    confettiCtx.globalAlpha = Math.max(0, p.life);
    confettiCtx.fillStyle = p.color;
    confettiCtx.fillRect(-p.size / 2, -p.size / 4, p.size, p.size / 2);
    confettiCtx.restore();
  }
  if (confettiParts.length > 0) requestAnimationFrame(animateConfetti);
  else confettiRunning = false;
}

// ===== FLASH =====
function flash(color) {
  const el = document.getElementById(color === 'green' ? 'flash-green' : 'flash-red');
  el.classList.add('show');
  setTimeout(() => el.classList.remove('show'), 300);
}

// ===== SCORE POP =====
function showScorePop(text, color, x, y) {
  const el = document.createElement('div');
  el.className = 'score-pop';
  el.style.left = x + 'px';
  el.style.top = y + 'px';
  el.style.color = color;
  el.style.fontSize = '1.3rem';
  el.textContent = text;
  document.body.appendChild(el);
  setTimeout(() => el.remove(), 1000);
}

// ===== SCREENS =====
function showScreen(id) {
  document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
  document.getElementById(id).classList.add('active');
}

// ===== SHUFFLE =====
function shuffle(arr) {
  const a = [...arr];
  for (let i = a.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [a[i], a[j]] = [a[j], a[i]];
  }
  return a;
}

// ===== INIT STATS =====
function updateStartStats() {
  document.getElementById('stat-high').textContent = lsGet('highscore', 0);
  document.getElementById('stat-streak').textContent = lsGet('beststreak', 0);
  document.getElementById('stat-games').textContent = lsGet('games', 0);
}
updateStartStats();

// ===== START GAME =====
function startGame() {
  // Prepare shuffled questions with shuffled choices
  gameState.questions = shuffle(QUESTIONS).map(q => {
    const indexed = q.choices.map((c, i) => ({ text: c, origIdx: i }));
    const shuffled = shuffle(indexed);
    const newAnswer = shuffled.findIndex(s => s.origIdx === q.answer);
    return { ...q, shuffledChoices: shuffled, shuffledAnswer: newAnswer };
  });
  gameState.currentQ = 0;
  gameState.score = 0;
  gameState.correct = 0;
  gameState.streak = 0;
  gameState.bestStreak = 0;
  gameState.results = new Array(10).fill(null);
  gameState.startTime = Date.now();
  gameState.answered = false;

  showScreen('screen-question');
  startRain();
  showQuestion();
}

// ===== SHOW QUESTION =====
function showQuestion() {
  const idx = gameState.currentQ;
  const q = gameState.questions[idx];
  gameState.answered = false;
  gameState.timer = 30;

  // Progress dots
  const dotsHtml = gameState.results.map((r, i) => {
    let cls = 'progress-dot';
    if (r === 'correct') cls += ' correct';
    else if (r === 'wrong') cls += ' wrong';
    if (i === idx) cls += ' current';
    return `<div class="${cls}"></div>`;
  }).join('');
  document.getElementById('progress-dots').innerHTML = dotsHtml;

  document.getElementById('q-number').textContent = `Question ${idx + 1} of 10`;
  document.getElementById('q-text').textContent = q.q;
  document.getElementById('q-timer').textContent = '30';
  document.getElementById('q-timer').classList.remove('warning');
  document.getElementById('timer-bar-fill').style.width = '100%';
  document.getElementById('timer-bar-fill').classList.remove('warning');
  document.getElementById('fun-fact').classList.remove('show');
  document.getElementById('live-score').textContent = gameState.score;

  // Streak display
  updateStreakDisplay();

  // Choices
  const choicesEl = document.getElementById('choices');
  choicesEl.innerHTML = q.shuffledChoices.map((c, i) => {
    return `<button class="choice-btn" style="--i:${i}" data-idx="${i}" aria-label="${LETTERS[i]}: ${c.text}">
      <span class="choice-letter">${LETTERS[i]}</span>
      <span>${c.text}</span>
    </button>`;
  }).join('');

  choicesEl.querySelectorAll('.choice-btn').forEach(btn => {
    btn.addEventListener('click', () => handleAnswer(parseInt(btn.dataset.idx)));
  });

  // Timer
  clearInterval(gameState.timerInterval);
  gameState.timerInterval = setInterval(() => {
    gameState.timer--;
    const t = Math.max(0, gameState.timer);
    document.getElementById('q-timer').textContent = t;
    document.getElementById('timer-bar-fill').style.width = (t / 30 * 100) + '%';
    if (t <= 10) {
      document.getElementById('q-timer').classList.add('warning');
      document.getElementById('timer-bar-fill').classList.add('warning');
      playTick();
    }
    if (t <= 0) {
      clearInterval(gameState.timerInterval);
      handleAnswer(-1); // timeout = wrong
    }
  }, 1000);
}

function updateStreakDisplay() {
  const el = document.getElementById('streak-display');
  const mult = getMultiplier();
  if (gameState.streak >= 2) {
    el.innerHTML = `Streak: ${gameState.streak}${mult > 1 ? `<span class="multiplier">${mult}x</span>` : ''}`;
  } else {
    el.textContent = '';
  }
}

function getMultiplier() {
  if (gameState.streak >= 5) return 3;
  if (gameState.streak >= 3) return 2;
  return 1;
}

// ===== HANDLE ANSWER =====
function handleAnswer(chosenIdx) {
  if (gameState.answered) return;
  gameState.answered = true;
  clearInterval(gameState.timerInterval);
  clearTimeout(gameState.autoAdvanceTimeout);

  const q = gameState.questions[gameState.currentQ];
  const isCorrect = chosenIdx === q.shuffledAnswer;
  const btns = document.querySelectorAll('.choice-btn');

  // Disable all buttons
  btns.forEach(b => b.disabled = true);

  // Highlight correct
  btns[q.shuffledAnswer].classList.add('correct-answer');
  if (!isCorrect && chosenIdx >= 0) {
    btns[chosenIdx].classList.add('wrong-answer');
  }

  if (isCorrect) {
    flash('green');
    playCorrect();
    spawnConfetti(50);

    const basePoints = 100;
    const speedBonus = Math.round((gameState.timer / 30) * 50);
    const mult = getMultiplier();
    const earned = (basePoints + speedBonus) * mult;
    gameState.score += earned;
    gameState.correct++;
    gameState.streak++;
    if (gameState.streak > gameState.bestStreak) gameState.bestStreak = gameState.streak;
    gameState.results[gameState.currentQ] = 'correct';

    // Score pop
    const rect = btns[q.shuffledAnswer].getBoundingClientRect();
    showScorePop(`+${earned}`, '#10b981', rect.right - 40, rect.top - 10);
  } else {
    flash('red');
    playWrong();
    gameState.streak = 0;
    gameState.results[gameState.currentQ] = 'wrong';
  }

  document.getElementById('live-score').textContent = gameState.score;
  updateStreakDisplay();

  // Update progress dots
  const dots = document.querySelectorAll('.progress-dot');
  dots[gameState.currentQ].classList.remove('current');
  dots[gameState.currentQ].classList.add(isCorrect ? 'correct' : 'wrong');

  // Show fun fact
  document.getElementById('fun-fact-text').textContent = q.fact;
  document.getElementById('fun-fact').classList.add('show');

  // Auto-advance after 5 seconds
  gameState.autoAdvanceTimeout = setTimeout(advanceQuestion, 5000);
}

document.getElementById('btn-next').addEventListener('click', () => {
  clearTimeout(gameState.autoAdvanceTimeout);
  advanceQuestion();
});

function advanceQuestion() {
  clearTimeout(gameState.autoAdvanceTimeout);
  gameState.currentQ++;
  if (gameState.currentQ >= 10) {
    showResults();
  } else {
    showQuestion();
  }
}

// ===== RESULTS =====
function showResults() {
  clearInterval(gameState.timerInterval);
  stopRain();

  // Perfect game bonus
  if (gameState.correct === 10) {
    gameState.score += 500;
    setTimeout(playFanfare, 300);
    setTimeout(() => spawnConfetti(150), 200);
  }

  const elapsed = Math.round((Date.now() - gameState.startTime) / 1000);
  const pct = gameState.correct / 10;

  // Grade
  let grade;
  if (pct === 1) grade = 'A+';
  else if (pct >= 0.9) grade = 'A';
  else if (pct >= 0.8) grade = 'B';
  else if (pct >= 0.7) grade = 'C';
  else if (pct >= 0.6) grade = 'D';
  else grade = 'F';

  document.getElementById('results-grade').textContent = grade;
  document.getElementById('results-score').textContent = gameState.score + ' points';
  document.getElementById('res-correct').textContent = gameState.correct + '/10';
  document.getElementById('res-streak').textContent = gameState.bestStreak;
  document.getElementById('res-time').textContent = elapsed + 's';

  setTimeout(() => {
    document.getElementById('results-bar-fill').style.width = (pct * 100) + '%';
  }, 200);

  // Share text
  const shareText = `I scored ${gameState.score} points (${gameState.correct}/10) on the DFW Earth-Day Game! Grade: ${grade} | Best streak: ${gameState.bestStreak} \uD83C\uDF0D\u2665\uFE0F`;
  document.getElementById('share-box').textContent = shareText;

  // Env tip
  document.getElementById('env-tip-text').textContent = ENV_TIPS[Math.floor(Math.random() * ENV_TIPS.length)];

  // Save stats
  const prevHigh = lsGet('highscore', 0);
  if (gameState.score > prevHigh) lsSet('highscore', gameState.score);
  const prevStreak = lsGet('beststreak', 0);
  if (gameState.bestStreak > prevStreak) lsSet('beststreak', gameState.bestStreak);
  lsSet('games', lsGet('games', 0) + 1);

  showScreen('screen-results');
}

// Share copy
document.getElementById('share-box').addEventListener('click', () => {
  const text = document.getElementById('share-box').textContent;
  navigator.clipboard.writeText(text).then(() => {
    document.getElementById('share-copied').classList.add('show');
    setTimeout(() => document.getElementById('share-copied').classList.remove('show'), 2000);
  });
});

// ===== EVENT LISTENERS =====
document.getElementById('btn-start').addEventListener('click', startGame);
document.getElementById('btn-again').addEventListener('click', () => {
  updateStartStats();
  startGame();
});

// Sound toggle
document.getElementById('sound-toggle').addEventListener('click', () => {
  gameState.soundOn = !gameState.soundOn;
  document.getElementById('sound-icon').textContent = gameState.soundOn ? '\uD83D\uDD0A' : '\uD83D\uDD07';
  document.getElementById('sound-label').textContent = gameState.soundOn ? 'Sound ON' : 'Sound OFF';
  if (gameState.soundOn) startRain(); else stopRain();
});

// Keyboard navigation (1-4 for answers)
document.addEventListener('keydown', (e) => {
  if (gameState.answered) {
    if (e.key === 'Enter' || e.key === ' ') {
      clearTimeout(gameState.autoAdvanceTimeout);
      advanceQuestion();
    }
    return;
  }
  const num = parseInt(e.key);
  if (num >= 1 && num <= 4) {
    const btns = document.querySelectorAll('.choice-btn');
    if (btns[num - 1] && !btns[num - 1].disabled) {
      handleAnswer(num - 1);
    }
  }
});
</script>
