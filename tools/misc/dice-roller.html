<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<title>Dice Roller | Korb Engineering</title>
<style>
  :root {
    --bg: #050a0f;
    --surface: #0a1018;
    --surface2: #0e1520;
    --border: #1a2535;
    --cyan: #00d4ff;
    --orange: #ff6600;
    --green: #10b981;
    --red: #ef4444;
    --gold: #fbbf24;
    --text: #e2e8f0;
    --muted: #64748b;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
  html, body {
    background: var(--bg);
    color: var(--text);
    font-family: 'JetBrains Mono', monospace;
    font-size: 14px;
    min-height: 100vh;
    overflow-x: hidden;
  }
  body { padding: 12px; padding-bottom: 80px; }
  h1, h2, h3 { font-family: 'JetBrains Mono', monospace; font-weight: 700; }
  button, input, select {
    font-family: 'JetBrains Mono', monospace;
    font-size: 16px;
    color: var(--text);
  }

  .header {
    border: 1px solid var(--border);
    background: var(--surface);
    padding: 12px;
    margin-bottom: 12px;
    display: flex;
    justify-content: space-between;
    align-items: center;
    gap: 8px;
  }
  .header h1 {
    font-size: 16px;
    color: var(--cyan);
    letter-spacing: 1px;
  }
  .header h1::before { content: '> '; color: var(--orange); }

  .toggle-btn {
    background: var(--surface2);
    color: var(--cyan);
    border: 1px solid var(--border);
    padding: 8px 12px;
    min-height: 44px;
    cursor: pointer;
    font-size: 12px;
  }
  .toggle-btn.on { border-color: var(--green); color: var(--green); }
  .toggle-btn:hover { border-color: var(--cyan); }

  .section {
    background: var(--surface);
    border: 1px solid var(--border);
    padding: 12px;
    margin-bottom: 12px;
  }
  .section-title {
    font-size: 11px;
    color: var(--orange);
    letter-spacing: 2px;
    text-transform: uppercase;
    margin-bottom: 10px;
    padding-bottom: 6px;
    border-bottom: 1px solid var(--border);
  }

  .dice-grid {
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    gap: 8px;
  }
  @media (min-width: 520px) {
    .dice-grid { grid-template-columns: repeat(7, 1fr); }
  }
  .die-btn {
    background: var(--surface2);
    border: 1px solid var(--border);
    padding: 8px 4px;
    min-height: 72px;
    cursor: pointer;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 4px;
    transition: all 0.15s;
  }
  .die-btn:active { transform: scale(0.95); }
  .die-btn:hover { border-color: var(--cyan); background: #121a28; }
  .die-btn svg { width: 36px; height: 36px; }
  .die-btn .die-label {
    font-size: 11px;
    color: var(--cyan);
    font-weight: 700;
  }

  .pool {
    display: flex;
    flex-wrap: wrap;
    gap: 8px;
    min-height: 48px;
    align-items: center;
  }
  .pool-empty {
    color: var(--muted);
    font-size: 12px;
    padding: 12px;
  }
  .pool-item {
    background: var(--surface2);
    border: 1px solid var(--cyan);
    padding: 4px 8px;
    display: flex;
    align-items: center;
    gap: 6px;
    min-height: 44px;
  }
  .pool-item .count {
    background: transparent;
    border: none;
    color: var(--gold);
    width: 30px;
    text-align: center;
    font-size: 16px;
    font-weight: 700;
    outline: none;
  }
  .pool-item .label { color: var(--cyan); font-size: 13px; }
  .pool-item .rm {
    background: transparent;
    border: 1px solid var(--red);
    color: var(--red);
    width: 24px;
    height: 24px;
    cursor: pointer;
    font-size: 12px;
    padding: 0;
  }

  .mod-row {
    display: flex;
    align-items: center;
    gap: 8px;
    margin-top: 10px;
    flex-wrap: wrap;
  }
  .mod-row label { color: var(--muted); font-size: 11px; letter-spacing: 1px; }
  .mod-btn {
    background: var(--surface2);
    border: 1px solid var(--border);
    color: var(--cyan);
    width: 36px;
    height: 36px;
    cursor: pointer;
    font-size: 16px;
    font-weight: 700;
  }
  .mod-row input {
    background: var(--surface2);
    border: 1px solid var(--border);
    color: var(--gold);
    width: 60px;
    text-align: center;
    padding: 6px;
    min-height: 36px;
    font-weight: 700;
  }
  .clear-btn {
    background: var(--surface2);
    border: 1px solid var(--red);
    color: var(--red);
    padding: 8px 12px;
    min-height: 36px;
    cursor: pointer;
    font-size: 11px;
    margin-left: auto;
  }

  .roll-btn {
    width: 100%;
    background: linear-gradient(180deg, var(--orange), #c24d00);
    border: 2px solid var(--gold);
    color: #000;
    font-size: 22px;
    font-weight: 700;
    padding: 18px;
    margin: 12px 0;
    cursor: pointer;
    letter-spacing: 3px;
    min-height: 64px;
    font-family: 'JetBrains Mono', monospace;
  }
  .roll-btn:active { transform: scale(0.98); }
  .roll-btn:disabled { opacity: 0.6; cursor: not-allowed; }

  .result-box {
    background: var(--surface2);
    border: 2px solid var(--border);
    padding: 16px;
    text-align: center;
    margin-bottom: 12px;
    min-height: 120px;
    transition: all 0.3s;
  }
  .result-box.crit { border-color: var(--gold); box-shadow: 0 0 30px rgba(251,191,36,0.4); }
  .result-box.fail { border-color: var(--red); box-shadow: 0 0 30px rgba(239,68,68,0.4); }
  .result-total {
    font-size: 48px;
    font-weight: 700;
    color: var(--cyan);
    line-height: 1;
  }
  .result-box.crit .result-total { color: var(--gold); }
  .result-box.fail .result-total { color: var(--red); }
  .result-formula {
    font-size: 12px;
    color: var(--muted);
    margin-top: 8px;
    word-wrap: break-word;
  }
  .result-dice {
    display: flex;
    flex-wrap: wrap;
    gap: 4px;
    justify-content: center;
    margin-top: 10px;
  }
  .result-die {
    background: var(--bg);
    border: 1px solid var(--border);
    padding: 4px 8px;
    font-size: 12px;
    color: var(--gold);
    min-width: 28px;
  }
  .result-die.max { border-color: var(--gold); color: var(--gold); }
  .result-die.min { border-color: var(--red); color: var(--red); }
  .result-die.dropped { opacity: 0.3; text-decoration: line-through; }

  .rolling { animation: spin 0.5s linear; }
  @keyframes spin {
    0% { transform: rotate(0deg) scale(1); }
    50% { transform: rotate(180deg) scale(1.1); }
    100% { transform: rotate(360deg) scale(1); }
  }
  .shake { animation: shake 0.5s; }
  @keyframes shake {
    0%, 100% { transform: translateX(0); }
    10%, 30%, 50%, 70%, 90% { transform: translateX(-8px); }
    20%, 40%, 60%, 80% { transform: translateX(8px); }
  }

  .quick-grid {
    display: grid;
    grid-template-columns: repeat(2, 1fr);
    gap: 8px;
  }
  @media (min-width: 520px) {
    .quick-grid { grid-template-columns: repeat(5, 1fr); }
  }
  .quick-btn {
    background: var(--surface2);
    border: 1px solid var(--border);
    color: var(--cyan);
    padding: 10px 8px;
    min-height: 48px;
    cursor: pointer;
    font-size: 12px;
    font-weight: 700;
    letter-spacing: 0.5px;
  }
  .quick-btn:hover { border-color: var(--cyan); }
  .quick-btn:active { transform: scale(0.96); }

  .notation-row {
    display: flex;
    gap: 8px;
  }
  .notation-row input {
    flex: 1;
    background: var(--surface2);
    border: 1px solid var(--border);
    padding: 10px;
    min-height: 44px;
    color: var(--gold);
    font-size: 16px;
    outline: none;
  }
  .notation-row input:focus { border-color: var(--cyan); }
  .notation-row button {
    background: var(--surface2);
    border: 1px solid var(--cyan);
    color: var(--cyan);
    padding: 10px 16px;
    min-height: 44px;
    cursor: pointer;
    font-weight: 700;
  }

  .macros-row {
    display: flex;
    flex-wrap: wrap;
    gap: 6px;
    margin-top: 10px;
  }
  .macro-chip {
    background: var(--surface2);
    border: 1px solid var(--border);
    padding: 6px 10px;
    min-height: 36px;
    display: flex;
    align-items: center;
    gap: 6px;
  }
  .macro-chip button {
    background: transparent;
    border: none;
    color: var(--cyan);
    cursor: pointer;
    font-family: inherit;
    font-size: 11px;
  }
  .macro-chip .del {
    color: var(--red);
    border: 1px solid var(--red);
    padding: 0 4px;
    line-height: 1;
  }

  .history {
    max-height: 240px;
    overflow-y: auto;
    border: 1px solid var(--border);
    background: var(--bg);
  }
  .history-item {
    padding: 8px 10px;
    border-bottom: 1px solid var(--border);
    display: flex;
    justify-content: space-between;
    align-items: center;
    gap: 8px;
    font-size: 12px;
  }
  .history-item:last-child { border-bottom: none; }
  .history-item .formula { color: var(--muted); flex: 1; word-break: break-all; }
  .history-item .total { color: var(--gold); font-weight: 700; font-size: 14px; }
  .history-item .total.crit { color: var(--gold); text-shadow: 0 0 6px var(--gold); }
  .history-item .total.fail { color: var(--red); }
  .history-empty { padding: 12px; color: var(--muted); text-align: center; font-size: 12px; }

  .damage-dialog {
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.85);
    display: none;
    align-items: center;
    justify-content: center;
    padding: 16px;
    z-index: 100;
  }
  .damage-dialog.on { display: flex; }
  .damage-dialog .box {
    background: var(--surface);
    border: 1px solid var(--cyan);
    padding: 16px;
    max-width: 320px;
    width: 100%;
  }
  .damage-dialog input {
    width: 100%;
    background: var(--surface2);
    border: 1px solid var(--border);
    padding: 10px;
    color: var(--gold);
    margin: 10px 0;
    min-height: 44px;
  }
  .damage-dialog .actions { display: flex; gap: 8px; }
  .damage-dialog .actions button {
    flex: 1;
    padding: 10px;
    min-height: 44px;
    cursor: pointer;
    border: 1px solid var(--border);
    background: var(--surface2);
    color: var(--cyan);
    font-family: inherit;
  }
  .damage-dialog .actions .ok { border-color: var(--green); color: var(--green); }
</style>
</head>
<body>

<div class="header">
  <h1>DICE ROLLER</h1>
  <button class="toggle-btn on" id="soundToggle">SOUND: ON</button>
</div>

<div class="section">
  <div class="section-title">[ Select Dice ]</div>
  <div class="dice-grid" id="diceGrid"></div>
</div>

<div class="section">
  <div class="section-title">[ Pool ]</div>
  <div class="pool" id="pool"></div>
  <div class="mod-row">
    <label>MOD</label>
    <button class="mod-btn" id="modMinus">-</button>
    <input type="number" id="modifier" value="0">
    <button class="mod-btn" id="modPlus">+</button>
    <button class="clear-btn" id="clearPool">CLEAR</button>
  </div>
</div>

<button class="roll-btn" id="rollBtn">ROLL DICE</button>

<div class="result-box" id="resultBox">
  <div class="result-total" id="resultTotal">--</div>
  <div class="result-formula" id="resultFormula">Select dice and roll</div>
  <div class="result-dice" id="resultDice"></div>
</div>

<div class="section">
  <div class="section-title">[ Quick Rolls ]</div>
  <div class="quick-grid">
    <button class="quick-btn" data-quick="attack">ATTACK<br>d20+MOD</button>
    <button class="quick-btn" data-quick="damage">DAMAGE<br>CUSTOM</button>
    <button class="quick-btn" data-quick="adv">ADV<br>2d20 HI</button>
    <button class="quick-btn" data-quick="dis">DIS<br>2d20 LO</button>
    <button class="quick-btn" data-quick="stats">STATS<br>4d6 DROP</button>
  </div>
</div>

<div class="section">
  <div class="section-title">[ Notation / Macros ]</div>
  <div class="notation-row">
    <input type="text" id="notation" placeholder="3d6+2" autocomplete="off">
    <button id="notationRoll">ROLL</button>
    <button id="saveMacro">SAVE</button>
  </div>
  <div class="macros-row" id="macrosRow"></div>
</div>

<div class="section">
  <div class="section-title">[ History (Last 20) ]</div>
  <div class="history" id="history"><div class="history-empty">No rolls yet</div></div>
</div>

<div class="damage-dialog" id="damageDialog">
  <div class="box">
    <div class="section-title">Damage Roll</div>
    <input type="text" id="damageInput" placeholder="2d6+3" autocomplete="off">
    <div class="actions">
      <button id="damageCancel">CANCEL</button>
      <button class="ok" id="damageOk">ROLL</button>
    </div>
  </div>
</div>

<script>
(function(){
  const STORAGE_KEY = 'korb_dice_roller_';
  const DICE_TYPES = [4, 6, 8, 10, 12, 20, 100];
  let pool = {};
  let history = [];
  let macros = [];
  let soundOn = true;
  let audioCtx = null;

  // SVG generators for each die
  function dieSVG(sides) {
    const s = 40, c = 20;
    const cyan = '#00d4ff', orange = '#ff6600', gold = '#fbbf24';
    if (sides === 4) {
      return `<svg viewBox="0 0 40 40"><polygon points="20,4 36,32 4,32" fill="#0e1520" stroke="${cyan}" stroke-width="2"/><polygon points="20,4 20,32 4,32" fill="#121a28" opacity="0.5"/><text x="20" y="26" text-anchor="middle" fill="${gold}" font-size="12" font-family="JetBrains Mono" font-weight="700">4</text></svg>`;
    }
    if (sides === 6) {
      return `<svg viewBox="0 0 40 40"><rect x="5" y="5" width="30" height="30" fill="#0e1520" stroke="${cyan}" stroke-width="2"/><polygon points="5,5 35,5 30,10 10,10" fill="${cyan}" opacity="0.2"/><polygon points="35,5 35,35 30,30 30,10" fill="${cyan}" opacity="0.1"/><text x="20" y="25" text-anchor="middle" fill="${gold}" font-size="12" font-family="JetBrains Mono" font-weight="700">6</text></svg>`;
    }
    if (sides === 8) {
      return `<svg viewBox="0 0 40 40"><polygon points="20,3 37,20 20,37 3,20" fill="#0e1520" stroke="${cyan}" stroke-width="2"/><polygon points="20,3 20,37 3,20" fill="#121a28" opacity="0.4"/><text x="20" y="25" text-anchor="middle" fill="${gold}" font-size="12" font-family="JetBrains Mono" font-weight="700">8</text></svg>`;
    }
    if (sides === 10) {
      return `<svg viewBox="0 0 40 40"><polygon points="20,3 35,15 32,32 8,32 5,15" fill="#0e1520" stroke="${cyan}" stroke-width="2"/><polygon points="20,3 20,32 5,15" fill="#121a28" opacity="0.4"/><text x="20" y="25" text-anchor="middle" fill="${gold}" font-size="10" font-family="JetBrains Mono" font-weight="700">10</text></svg>`;
    }
    if (sides === 12) {
      return `<svg viewBox="0 0 40 40"><polygon points="20,3 33,10 36,24 28,35 12,35 4,24 7,10" fill="#0e1520" stroke="${cyan}" stroke-width="2"/><text x="20" y="25" text-anchor="middle" fill="${gold}" font-size="10" font-family="JetBrains Mono" font-weight="700">12</text></svg>`;
    }
    if (sides === 20) {
      return `<svg viewBox="0 0 40 40"><polygon points="20,2 36,12 36,28 20,38 4,28 4,12" fill="#0e1520" stroke="${orange}" stroke-width="2"/><line x1="20" y1="2" x2="20" y2="38" stroke="${orange}" stroke-width="1" opacity="0.5"/><line x1="4" y1="12" x2="36" y2="28" stroke="${orange}" stroke-width="1" opacity="0.3"/><line x1="36" y1="12" x2="4" y2="28" stroke="${orange}" stroke-width="1" opacity="0.3"/><text x="20" y="25" text-anchor="middle" fill="${gold}" font-size="10" font-family="JetBrains Mono" font-weight="700">20</text></svg>`;
    }
    if (sides === 100) {
      return `<svg viewBox="0 0 40 40"><circle cx="20" cy="20" r="16" fill="#0e1520" stroke="${cyan}" stroke-width="2"/><circle cx="20" cy="20" r="10" fill="none" stroke="${cyan}" stroke-width="1" opacity="0.4"/><text x="20" y="24" text-anchor="middle" fill="${gold}" font-size="9" font-family="JetBrains Mono" font-weight="700">100</text></svg>`;
    }
  }

  // Audio
  function ensureAudio() {
    if (!audioCtx) {
      try { audioCtx = new (window.AudioContext || window.webkitAudioContext)(); }
      catch(e) { audioCtx = null; }
    }
    return audioCtx;
  }
  function playRattle() {
    if (!soundOn) return;
    const ctx = ensureAudio(); if (!ctx) return;
    const dur = 0.5;
    const bufSize = ctx.sampleRate * dur;
    const buf = ctx.createBuffer(1, bufSize, ctx.sampleRate);
    const data = buf.getChannelData(0);
    for (let i = 0; i < bufSize; i++) {
      const t = i / bufSize;
      const env = Math.pow(1 - t, 2);
      data[i] = (Math.random() * 2 - 1) * env * (Math.random() > 0.85 ? 1 : 0.3);
    }
    const src = ctx.createBufferSource();
    src.buffer = buf;
    const filter = ctx.createBiquadFilter();
    filter.type = 'highpass';
    filter.frequency.value = 1500;
    const gain = ctx.createGain();
    gain.gain.value = 0.3;
    src.connect(filter); filter.connect(gain); gain.connect(ctx.destination);
    src.start();
  }
  function playChime(crit) {
    if (!soundOn) return;
    const ctx = ensureAudio(); if (!ctx) return;
    const freqs = crit === 'crit' ? [523, 659, 784, 1047] : crit === 'fail' ? [220, 196, 165] : [523, 784];
    freqs.forEach((f, i) => {
      const osc = ctx.createOscillator();
      const gain = ctx.createGain();
      osc.frequency.value = f;
      osc.type = 'triangle';
      gain.gain.setValueAtTime(0, ctx.currentTime + i * 0.1);
      gain.gain.linearRampToValueAtTime(0.2, ctx.currentTime + i * 0.1 + 0.02);
      gain.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + i * 0.1 + 0.4);
      osc.connect(gain); gain.connect(ctx.destination);
      osc.start(ctx.currentTime + i * 0.1);
      osc.stop(ctx.currentTime + i * 0.1 + 0.4);
    });
  }

  // Storage
  function save() {
    try {
      localStorage.setItem(STORAGE_KEY + 'history', JSON.stringify(history));
      localStorage.setItem(STORAGE_KEY + 'macros', JSON.stringify(macros));
      localStorage.setItem(STORAGE_KEY + 'sound', soundOn ? '1' : '0');
    } catch(e) {}
  }
  function load() {
    try {
      const h = localStorage.getItem(STORAGE_KEY + 'history');
      if (h) history = JSON.parse(h);
      const m = localStorage.getItem(STORAGE_KEY + 'macros');
      if (m) macros = JSON.parse(m);
      const s = localStorage.getItem(STORAGE_KEY + 'sound');
      if (s !== null) soundOn = s === '1';
    } catch(e) {}
  }

  // Render
  function renderDiceGrid() {
    const grid = document.getElementById('diceGrid');
    grid.innerHTML = DICE_TYPES.map(s => `
      <button class="die-btn" data-sides="${s}">
        ${dieSVG(s)}
        <div class="die-label">d${s}</div>
      </button>
    `).join('');
    grid.querySelectorAll('.die-btn').forEach(btn => {
      btn.addEventListener('click', () => {
        const s = parseInt(btn.dataset.sides);
        pool[s] = (pool[s] || 0) + 1;
        renderPool();
        playRattle();
      });
    });
  }
  function renderPool() {
    const el = document.getElementById('pool');
    const keys = Object.keys(pool).filter(k => pool[k] > 0).map(Number).sort((a,b) => a-b);
    if (keys.length === 0) {
      el.innerHTML = '<div class="pool-empty">Tap dice above to add to pool</div>';
      return;
    }
    el.innerHTML = keys.map(s => `
      <div class="pool-item">
        <input type="number" class="count" value="${pool[s]}" min="1" max="99" data-sides="${s}">
        <span class="label">d${s}</span>
        <button class="rm" data-sides="${s}">X</button>
      </div>
    `).join('');
    el.querySelectorAll('.count').forEach(inp => {
      inp.addEventListener('change', e => {
        const s = parseInt(inp.dataset.sides);
        const v = Math.max(0, parseInt(inp.value) || 0);
        pool[s] = v;
        if (v === 0) delete pool[s];
        renderPool();
      });
    });
    el.querySelectorAll('.rm').forEach(btn => {
      btn.addEventListener('click', () => {
        delete pool[parseInt(btn.dataset.sides)];
        renderPool();
      });
    });
  }
  function renderMacros() {
    const el = document.getElementById('macrosRow');
    if (macros.length === 0) {
      el.innerHTML = '<span style="color:var(--muted);font-size:11px">No saved macros</span>';
      return;
    }
    el.innerHTML = macros.map((m, i) => `
      <div class="macro-chip">
        <button data-idx="${i}" class="use">${m.name}: ${m.formula}</button>
        <button class="del" data-del="${i}">X</button>
      </div>
    `).join('');
    el.querySelectorAll('.use').forEach(b => {
      b.addEventListener('click', () => {
        rollNotation(macros[parseInt(b.dataset.idx)].formula);
      });
    });
    el.querySelectorAll('.del').forEach(b => {
      b.addEventListener('click', () => {
        macros.splice(parseInt(b.dataset.del), 1);
        save(); renderMacros();
      });
    });
  }
  function renderHistory() {
    const el = document.getElementById('history');
    if (history.length === 0) {
      el.innerHTML = '<div class="history-empty">No rolls yet</div>';
      return;
    }
    el.innerHTML = history.map(h => `
      <div class="history-item">
        <span class="formula">${h.formula}</span>
        <span class="total ${h.critClass}">${h.total}</span>
      </div>
    `).join('');
  }

  // Rolling
  function rollDie(sides) { return Math.floor(Math.random() * sides) + 1; }

  function rollPool() {
    const mod = parseInt(document.getElementById('modifier').value) || 0;
    const keys = Object.keys(pool).filter(k => pool[k] > 0).map(Number).sort((a,b) => a-b);
    if (keys.length === 0) return;
    const rolls = [];
    let total = 0;
    const parts = [];
    keys.forEach(s => {
      const count = pool[s];
      const vals = [];
      for (let i = 0; i < count; i++) {
        const v = rollDie(s);
        vals.push(v);
        total += v;
      }
      rolls.push({ sides: s, vals });
      parts.push(`${count}d${s}`);
    });
    total += mod;
    const formula = parts.join('+') + (mod !== 0 ? (mod > 0 ? '+' : '') + mod : '');
    displayResult(total, formula, rolls, mod);
  }

  function displayResult(total, formula, rolls, mod, options) {
    options = options || {};
    const box = document.getElementById('resultBox');
    const totalEl = document.getElementById('resultTotal');
    const formulaEl = document.getElementById('resultFormula');
    const diceEl = document.getElementById('resultDice');

    box.classList.remove('crit', 'fail', 'rolling');
    document.body.classList.remove('shake');
    void box.offsetWidth;
    box.classList.add('rolling');

    playRattle();
    totalEl.textContent = '...';
    formulaEl.textContent = formula;
    diceEl.innerHTML = '';

    setTimeout(() => {
      box.classList.remove('rolling');
      totalEl.textContent = total;

      // Build dice display
      const dieHtml = [];
      let critClass = '';
      rolls.forEach(r => {
        r.vals.forEach((v, i) => {
          const isMax = v === r.sides;
          const isMin = v === 1;
          const isDropped = options.droppedIdx && options.droppedIdx.some(d => d.sides === r.sides && d.idx === i);
          let cls = '';
          if (isMax) cls += ' max';
          if (isMin) cls += ' min';
          if (isDropped) cls += ' dropped';
          dieHtml.push(`<span class="result-die${cls}">${v}</span>`);

          // Crit detection for d20
          if (r.sides === 20 && !isDropped) {
            if (v === 20) critClass = 'crit';
            else if (v === 1 && critClass !== 'crit') critClass = 'fail';
          }
        });
      });
      diceEl.innerHTML = dieHtml.join('');

      if (critClass === 'crit') {
        box.classList.add('crit');
        playChime('crit');
      } else if (critClass === 'fail') {
        box.classList.add('fail');
        document.body.classList.add('shake');
        playChime('fail');
      } else {
        playChime();
      }

      // History
      history.unshift({ formula: formula + ' = ' + total, total, critClass });
      if (history.length > 20) history.pop();
      save();
      renderHistory();
    }, 500);
  }

  // Notation parser: e.g. "3d6+2", "1d20-1", "2d8", "4d6kh3" (keep highest 3), "4d6kl3"
  function parseNotation(str) {
    str = str.replace(/\s/g, '').toLowerCase();
    const re = /([+-]?\d*d\d+(?:k[hl]\d+)?|[+-]\d+)/g;
    const tokens = str.match(re);
    if (!tokens) return null;
    const terms = [];
    let constant = 0;
    for (const t of tokens) {
      const dm = t.match(/^([+-]?)(\d*)d(\d+)(?:k([hl])(\d+))?$/);
      if (dm) {
        const sign = dm[1] === '-' ? -1 : 1;
        const count = parseInt(dm[2] || '1');
        const sides = parseInt(dm[3]);
        const keepType = dm[4] || null;
        const keepNum = dm[5] ? parseInt(dm[5]) : null;
        if (count <= 0 || count > 100 || sides <= 1 || sides > 1000) return null;
        terms.push({ sign, count, sides, keepType, keepNum });
      } else {
        const cm = t.match(/^([+-])(\d+)$/);
        if (cm) constant += (cm[1] === '-' ? -1 : 1) * parseInt(cm[2]);
        else return null;
      }
    }
    return { terms, constant };
  }

  function rollNotation(str) {
    const parsed = parseNotation(str);
    if (!parsed) {
      alert('Invalid notation. Try: 3d6+2, 1d20, 4d6kh3');
      return;
    }
    let total = 0;
    const rolls = [];
    const droppedIdx = [];
    const parts = [];
    parsed.terms.forEach(term => {
      const vals = [];
      for (let i = 0; i < term.count; i++) vals.push(rollDie(term.sides));
      const indexed = vals.map((v, i) => ({ v, i }));
      if (term.keepType) {
        indexed.sort((a, b) => term.keepType === 'h' ? b.v - a.v : a.v - b.v);
        const dropped = indexed.slice(term.keepNum);
        dropped.forEach(d => droppedIdx.push({ sides: term.sides, idx: d.i }));
        const kept = indexed.slice(0, term.keepNum);
        const sum = kept.reduce((s, x) => s + x.v, 0);
        total += term.sign * sum;
      } else {
        total += term.sign * vals.reduce((a, b) => a + b, 0);
      }
      rolls.push({ sides: term.sides, vals });
      parts.push((term.sign < 0 ? '-' : (parts.length ? '+' : '')) + `${term.count}d${term.sides}${term.keepType ? 'k' + term.keepType + term.keepNum : ''}`);
    });
    total += parsed.constant;
    const formula = parts.join('') + (parsed.constant !== 0 ? (parsed.constant > 0 ? '+' : '') + parsed.constant : '');
    displayResult(total, formula, rolls, 0, { droppedIdx });
  }

  function statBlock() {
    const stats = [];
    const rolls = [];
    let total = 0;
    const droppedIdx = [];
    for (let i = 0; i < 6; i++) {
      const vals = [rollDie(6), rollDie(6), rollDie(6), rollDie(6)];
      const minV = Math.min(...vals);
      const minI = vals.indexOf(minV);
      droppedIdx.push({ sides: 6, idx: i * 4 + minI });
      const sum = vals.reduce((a,b)=>a+b,0) - minV;
      stats.push(sum);
      total += sum;
    }
    const allVals = [];
    for (let i = 0; i < 6; i++) {
      // re-roll into single rolls array
    }
    // For display: just show stats
    const box = document.getElementById('resultBox');
    const totalEl = document.getElementById('resultTotal');
    const formulaEl = document.getElementById('resultFormula');
    const diceEl = document.getElementById('resultDice');
    box.classList.remove('crit','fail','rolling');
    void box.offsetWidth;
    box.classList.add('rolling');
    playRattle();
    totalEl.textContent = '...';
    formulaEl.textContent = '4d6 drop lowest x6';
    diceEl.innerHTML = '';
    setTimeout(() => {
      box.classList.remove('rolling');
      totalEl.textContent = total;
      diceEl.innerHTML = stats.map(s => `<span class="result-die max">${s}</span>`).join('');
      history.unshift({ formula: 'STATS: ' + stats.join(', ') + ' = ' + total, total, critClass: '' });
      if (history.length > 20) history.pop();
      save();
      renderHistory();
      playChime();
    }, 500);
  }

  // Event wiring
  document.getElementById('rollBtn').addEventListener('click', rollPool);
  document.getElementById('clearPool').addEventListener('click', () => {
    pool = {};
    document.getElementById('modifier').value = 0;
    renderPool();
  });
  document.getElementById('modPlus').addEventListener('click', () => {
    const i = document.getElementById('modifier');
    i.value = (parseInt(i.value) || 0) + 1;
  });
  document.getElementById('modMinus').addEventListener('click', () => {
    const i = document.getElementById('modifier');
    i.value = (parseInt(i.value) || 0) - 1;
  });

  document.getElementById('soundToggle').addEventListener('click', () => {
    soundOn = !soundOn;
    const b = document.getElementById('soundToggle');
    b.textContent = 'SOUND: ' + (soundOn ? 'ON' : 'OFF');
    b.classList.toggle('on', soundOn);
    save();
    if (soundOn) ensureAudio();
  });

  document.querySelectorAll('.quick-btn').forEach(b => {
    b.addEventListener('click', () => {
      const q = b.dataset.quick;
      const mod = parseInt(document.getElementById('modifier').value) || 0;
      if (q === 'attack') rollNotation('1d20' + (mod >= 0 ? '+' : '') + mod);
      else if (q === 'adv') rollNotation('2d20kh1' + (mod !== 0 ? (mod > 0 ? '+' : '') + mod : ''));
      else if (q === 'dis') rollNotation('2d20kl1' + (mod !== 0 ? (mod > 0 ? '+' : '') + mod : ''));
      else if (q === 'stats') statBlock();
      else if (q === 'damage') {
        document.getElementById('damageDialog').classList.add('on');
        document.getElementById('damageInput').focus();
      }
    });
  });

  document.getElementById('notationRoll').addEventListener('click', () => {
    const v = document.getElementById('notation').value.trim();
    if (v) rollNotation(v);
  });
  document.getElementById('notation').addEventListener('keydown', e => {
    if (e.key === 'Enter') document.getElementById('notationRoll').click();
  });
  document.getElementById('saveMacro').addEventListener('click', () => {
    const v = document.getElementById('notation').value.trim();
    if (!v) return;
    const name = prompt('Macro name:', v);
    if (!name) return;
    macros.push({ name, formula: v });
    save();
    renderMacros();
  });

  document.getElementById('damageCancel').addEventListener('click', () => {
    document.getElementById('damageDialog').classList.remove('on');
  });
  document.getElementById('damageOk').addEventListener('click', () => {
    const v = document.getElementById('damageInput').value.trim();
    document.getElementById('damageDialog').classList.remove('on');
    if (v) rollNotation(v);
  });
  document.getElementById('damageInput').addEventListener('keydown', e => {
    if (e.key === 'Enter') document.getElementById('damageOk').click();
  });

  // Init
  load();
  renderDiceGrid();
  renderPool();
  renderMacros();
  renderHistory();
  const sb = document.getElementById('soundToggle');
  sb.textContent = 'SOUND: ' + (soundOn ? 'ON' : 'OFF');
  sb.classList.toggle('on', soundOn);
})();
</script>
