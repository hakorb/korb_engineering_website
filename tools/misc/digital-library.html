<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Korb Digital Lending Library | Korb Engineering</title>
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{--bg:#050a0f;--bg1:#0a1018;--bg2:#0f1620;--border:#1a2535;--cyan:#00d4ff;--green:#10b981;--gold:#f0a500;--red:#ef4444;--text:#e2e8f0;--dim:rgba(226,232,240,0.4);--font:'JetBrains Mono',monospace}
body{background:var(--bg);color:var(--text);font-family:var(--font);min-height:100vh;display:flex;flex-direction:column}
@keyframes fadeIn{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}

.header{background:var(--bg1);border-bottom:1px solid var(--border);padding:14px 20px;display:flex;align-items:center;gap:14px;flex-wrap:wrap;flex-shrink:0}
.brand{color:var(--cyan);font-weight:700;font-size:11px;letter-spacing:2px;text-transform:uppercase}
.title{color:var(--text);font-size:18px;font-weight:600}
.nav-tab{background:transparent;color:var(--dim);border:none;border-radius:6px;padding:6px 14px;cursor:pointer;font-size:12px;font-family:var(--font);transition:all 0.15s}
.nav-tab.active{background:rgba(0,212,255,0.12);color:var(--cyan);font-weight:600}
.nav-tab:hover{color:var(--cyan)}

.body{flex:1;overflow:auto;padding:20px}
.btn{background:var(--bg2);border:1px solid var(--border);color:var(--text);border-radius:6px;padding:8px 16px;cursor:pointer;font-size:12px;font-family:var(--font);transition:all 0.15s;user-select:none}
.btn:hover{border-color:var(--cyan);color:var(--cyan)}
.btn-green{background:var(--green);color:#fff;border:none}
.btn-green:hover{opacity:0.9;color:#fff}
.btn-danger{background:var(--red);color:#fff;border:none}
.btn-danger:hover{opacity:0.9;color:#fff}

.input{background:var(--bg2);border:1px solid var(--border);border-radius:6px;padding:8px 12px;color:var(--text);font-size:16px;font-family:var(--font);outline:none;width:100%}
.input:focus{border-color:var(--cyan)}
.select{background:var(--bg2);border:1px solid var(--border);border-radius:6px;padding:8px 12px;color:var(--text);font-size:16px;font-family:var(--font);cursor:pointer;outline:none}
.label{display:block;font-size:10px;color:var(--dim);margin-bottom:3px;text-transform:uppercase;letter-spacing:0.5px}

.drop-zone{border:2px dashed var(--border);border-radius:10px;padding:40px 20px;text-align:center;background:var(--bg2);cursor:pointer;transition:all 0.2s}
.drop-zone.active{border-color:var(--green);background:rgba(16,185,129,0.05)}
.drop-zone:hover{border-color:var(--cyan)}

.card{background:var(--bg1);border:1px solid var(--border);border-radius:10px;overflow:hidden;cursor:pointer;transition:border-color 0.15s,transform 0.15s}
.card:hover{border-color:var(--cyan);transform:translateY(-2px)}
.grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(200px,1fr));gap:16px}
.list-item{display:flex;align-items:center;gap:14px;padding:12px 16px;background:var(--bg1);border:1px solid var(--border);border-radius:8px;cursor:pointer;transition:border-color 0.15s;margin-bottom:8px}
.list-item:hover{border-color:var(--cyan)}

.tag{background:rgba(0,212,255,0.12);color:var(--cyan);border-radius:12px;padding:2px 10px;font-size:10px;font-weight:500}
.status-dot{width:8px;height:8px;border-radius:50%;display:inline-block;margin-right:4px}
.book-cover{width:100%;height:180px;display:flex;align-items:center;justify-content:center;font-size:28px;font-weight:700;color:rgba(255,255,255,0.3)}
.book-title{padding:12px;font-size:13px;font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.book-meta{padding:0 12px 12px;font-size:11px;color:var(--dim)}

.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,0.7);display:flex;align-items:center;justify-content:center;z-index:200;padding:20px}
.modal{background:var(--bg1);border:1px solid var(--border);border-radius:10px;padding:24px;max-width:500px;width:100%;max-height:90vh;overflow:auto}

.toolbar{display:flex;gap:8px;align-items:center;flex-wrap:wrap;margin-bottom:20px}
.stats-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(200px,1fr));gap:16px}
.stat-card{background:var(--bg1);border:1px solid var(--border);border-radius:10px;padding:20px;text-align:center}
.stat-value{font-size:28px;font-weight:700;color:var(--cyan)}
.stat-label{font-size:11px;color:var(--dim);margin-top:4px;text-transform:uppercase;letter-spacing:1px}
.progress-bar{width:100%;height:6px;background:var(--bg);border-radius:3px;overflow:hidden;margin-top:4px}
.progress-fill{height:100%;border-radius:3px;transition:width 0.3s}

/* Reader */
.reader-container{position:fixed;inset:0;z-index:100;background:var(--bg);display:flex;flex-direction:column}
.reader-top-bar{background:var(--bg1);border-bottom:1px solid var(--border);padding:10px 16px;display:flex;align-items:center;gap:12px;flex-shrink:0;min-height:52px}
.reader-top-bar .reader-title{font-size:14px;font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;flex:1;min-width:0}
.reader-canvas-wrap{flex:1;overflow:auto;display:flex;justify-content:center;align-items:flex-start;background:#0d1319;position:relative;scroll-behavior:smooth;-webkit-overflow-scrolling:touch;touch-action:pan-x pan-y pinch-zoom}
.reader-canvas-wrap canvas{display:block;margin:24px auto;box-shadow:0 6px 32px rgba(0,0,0,0.6);border-radius:2px}
.reader-bottom-bar{background:var(--bg1);border-top:1px solid var(--border);padding:10px 16px;display:flex;align-items:center;justify-content:center;gap:14px;flex-shrink:0;min-height:56px}
.reader-btn{background:var(--bg2);border:1px solid var(--border);color:var(--text);border-radius:8px;width:48px;height:48px;display:inline-flex;align-items:center;justify-content:center;cursor:pointer;font-size:20px;font-family:var(--font);transition:all 0.15s;user-select:none;flex-shrink:0;-webkit-tap-highlight-color:transparent}
.reader-btn:hover{border-color:var(--cyan);color:var(--cyan);background:rgba(0,212,255,0.08)}
.reader-btn:active{background:rgba(0,212,255,0.15);transform:scale(0.95)}
.reader-btn:disabled{opacity:0.3;cursor:default;border-color:var(--border);color:var(--dim);background:var(--bg2);transform:none}
.reader-page-info{font-size:13px;color:var(--dim);min-width:80px;text-align:center;white-space:nowrap}
.reader-page-input{background:var(--bg2);border:1px solid var(--border);border-radius:6px;color:var(--cyan);font-size:16px;font-family:var(--font);width:56px;text-align:center;padding:6px;outline:none;min-height:44px}
.reader-page-input:focus{border-color:var(--cyan);box-shadow:0 0 0 2px rgba(0,212,255,0.2)}
.reader-zoom-label{font-size:13px;color:var(--text);min-width:50px;text-align:center;font-weight:500}
.reader-divider{width:1px;height:28px;background:var(--border);flex-shrink:0}

/* Reading mode - hide chrome for distraction-free reading */
.reader-container.reading-mode .reader-top-bar{opacity:0;pointer-events:none;transition:opacity 0.3s}
.reader-container.reading-mode .reader-bottom-bar{opacity:0;pointer-events:none;transition:opacity 0.3s}
.reader-container.reading-mode .reader-side-nav{opacity:0.3}
.reader-container.reading-mode:hover .reader-top-bar,
.reader-container.reading-mode:hover .reader-bottom-bar{opacity:1;pointer-events:auto}
.reader-container.reading-mode:hover .reader-side-nav{opacity:1}
.reader-container.reading-mode .reader-canvas-wrap{background:#080e14}

/* Side nav arrows for mouse */
.reader-side-nav{position:absolute;top:50%;transform:translateY(-50%);width:56px;height:96px;display:flex;align-items:center;justify-content:center;background:rgba(10,16,24,0.8);border:1px solid var(--border);border-radius:10px;cursor:pointer;color:var(--dim);font-size:24px;transition:all 0.2s;z-index:10;user-select:none;-webkit-tap-highlight-color:transparent}
.reader-side-nav:hover{color:var(--cyan);border-color:var(--cyan);background:rgba(10,16,24,0.95)}
.reader-side-nav:active{transform:translateY(-50%) scale(0.95);background:rgba(0,212,255,0.12)}
.reader-side-nav.left{left:16px}
.reader-side-nav.right{right:16px}

/* Mobile-first touch targets */
.btn,.nav-tab,.select,.reader-btn{min-height:44px;touch-action:manipulation}
.input{min-height:44px;font-size:16px}
.card{touch-action:manipulation}
.list-item{min-height:56px;touch-action:manipulation}

@media(max-width:600px){
  .grid{grid-template-columns:repeat(auto-fill,minmax(140px,1fr));gap:10px}
  .header{padding:10px 14px;gap:6px}
  .header .title{font-size:14px}
  .header .brand{font-size:10px}
  .toolbar{flex-direction:column;align-items:stretch}
  .toolbar .input{max-width:100%!important}
  .toolbar .select{width:100%}
  .body{padding:10px}
  .modal{padding:16px;margin:10px;max-height:85vh}
  .modal .input,.modal .select{font-size:16px}
  .stats-grid{grid-template-columns:repeat(2,1fr);gap:10px}
  .stat-value{font-size:22px}
  .reader-top-bar{padding:8px 10px;gap:8px}
  .reader-bottom-bar{padding:10px 10px;gap:8px;flex-wrap:wrap;justify-content:center}
  .reader-side-nav{display:none}
  .reader-canvas-wrap canvas{margin:12px auto}
  .reader-canvas-wrap{touch-action:pan-x pan-y pinch-zoom}
  .reader-btn{width:48px;height:48px;font-size:20px}
  .reader-zoom-label{font-size:12px}
  .reader-page-info{font-size:12px}
  .reader-divider{height:24px}
  /* Detail view: single column on mobile */
  .detail-grid{grid-template-columns:1fr!important}
  .book-cover-detail{height:180px!important}
  .drop-zone{padding:24px 16px}
}
</style>
</head>
<body>

<div class="header" id="mainHeader">
  <span class="brand">Korb Engineering</span>
  <span class="title">Korb Digital Lending Library</span>
  <div style="flex:1"></div>
  <button class="nav-tab active" data-view="library" onclick="switchView('library')">Library</button>
  <button class="nav-tab" data-view="stats" onclick="switchView('stats')">Stats</button>
</div>

<div class="body" id="mainBody"></div>

<!-- Reader overlay -->
<div class="reader-container" id="readerContainer" style="display:none">
  <div class="reader-top-bar">
    <button class="btn" onclick="closeReader()" style="flex-shrink:0;min-height:44px" title="Back to library (Esc)">&#9664; Back</button>
    <span class="reader-title" id="readerTitle"></span>
    <button class="btn" onclick="toggleReadingMode()" id="btnReadingMode" style="flex-shrink:0;min-height:44px" title="Toggle reading mode">Reading Mode</button>
    <button class="btn" onclick="toggleFullscreen()" style="flex-shrink:0;min-height:44px" title="Toggle fullscreen">Fullscreen</button>
  </div>
  <div class="reader-canvas-wrap" id="readerCanvasWrap">
    <div class="reader-side-nav left" onclick="readerPrevPage()">&#9664;</div>
    <canvas id="readerCanvas"></canvas>
    <div class="reader-side-nav right" onclick="readerNextPage()">&#9654;</div>
  </div>
  <div class="reader-bottom-bar">
    <button class="reader-btn" id="btnPrev" onclick="readerPrevPage()" title="Previous page (Left arrow)">&#9664;</button>
    <input class="reader-page-input" id="pageInput" type="text" inputmode="numeric" title="Go to page" onkeydown="if(event.key==='Enter')goToPage(parseInt(this.value))">
    <span class="reader-page-info" id="pageInfo">0 / 0</span>
    <button class="reader-btn" id="btnNext" onclick="readerNextPage()" title="Next page (Right arrow)">&#9654;</button>
    <span class="reader-divider"></span>
    <button class="reader-btn" onclick="readerZoom(-0.2)" title="Zoom out (Ctrl+-)" style="font-weight:700">&#8722;</button>
    <span class="reader-zoom-label" id="zoomLabel">100%</span>
    <button class="reader-btn" onclick="readerZoom(0.2)" title="Zoom in (Ctrl+=)" style="font-weight:700">+</button>
    <button class="reader-btn" onclick="readerFitWidth()" title="Fit to width (Ctrl+0)" style="font-size:12px;width:auto;padding:0 14px;min-width:48px;font-weight:600">FIT</button>
  </div>
</div>

<!-- Korb Engineering Badge -->
<div style="position:fixed;bottom:10px;right:10px;font-size:10px;color:#00d4ff;opacity:0.5;font-family:'JetBrains Mono',monospace;pointer-events:none;z-index:9999">Korb Engineering</div>

<script>
// PDF.js worker
pdfjsLib.GlobalWorkerOptions.workerSrc = 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js';

const META_KEY = 'korb_library_meta';
const CATEGORIES = ['All','Engineering','Aviation','Technical Manuals','Fiction','Non-Fiction','Reference','Personal','Other'];
const STATUS_COLORS = {Unread:'#6b7280', Reading:'#00d4ff', Completed:'#10b981'};
const PLACEHOLDER_COLORS = ['#0d1f3c','#1f0d3c','#0d3c2a','#3c2a0d','#0d2a3c','#2a0d0d','#0d2a0d','#2a2a0d'];
const MAX_FILE_SIZE = 50 * 1024 * 1024;

let books = [], view = 'library', search = '', catFilter = 'All', sortBy = 'dateAdded', viewMode = 'grid';
let showUploadPanel = false, selectedBook = null, editMeta = null;

// Reader state
let pdfDoc = null, currentPage = 1, totalPages = 0, currentScale = 1.0, rendering = false, pendingPage = null;
let currentBookId = null;

// IndexedDB — with timeout & abort handling for Safari Private Browsing
let _dbWarned = false;
function openDB() {
  return new Promise((res, rej) => {
    try {
      const r = indexedDB.open('korb_library_db', 1);
      r.onupgradeneeded = () => { if (!r.result.objectStoreNames.contains('pdfs')) r.result.createObjectStore('pdfs', {keyPath:'id'}); };
      r.onsuccess = () => res(r.result);
      r.onerror = () => rej(r.error || new Error('IndexedDB open failed'));
      // Safari Private Browsing may block IndexedDB entirely
      setTimeout(() => rej(new Error('IndexedDB open timed out — private browsing may block storage.')), 5000);
    } catch(e) { rej(new Error('IndexedDB unavailable: ' + e.message)); }
  });
}
function _idbWithTimeout(promiseFn, ms) {
  return Promise.race([
    promiseFn(),
    new Promise((_, rej) => setTimeout(() => rej(new Error(
      'Storage operation timed out. If you are in Private/Incognito mode, please switch to a normal browser window — private browsing blocks file storage.'
    )), ms || 8000))
  ]);
}
async function savePDF(id, blob) {
  return _idbWithTimeout(async () => {
    const db = await openDB();
    return new Promise((res, rej) => {
      const tx = db.transaction('pdfs','readwrite');
      tx.objectStore('pdfs').put({id, blob, addedAt:Date.now()});
      tx.oncomplete = () => res();
      tx.onerror = () => rej(tx.error || new Error('Save transaction failed'));
      tx.onabort = () => rej(new Error('Save transaction aborted — storage may be restricted in private browsing.'));
    });
  });
}
async function getPDF(id) {
  return _idbWithTimeout(async () => {
    const db = await openDB();
    return new Promise((res, rej) => {
      const tx = db.transaction('pdfs','readonly');
      const r = tx.objectStore('pdfs').get(id);
      r.onsuccess = () => res(r.result?.blob ?? null);
      r.onerror = () => rej(r.error || new Error('Read transaction failed'));
      tx.onabort = () => rej(new Error('Read transaction aborted.'));
    });
  });
}
async function deletePDFFromDB(id) {
  return _idbWithTimeout(async () => {
    const db = await openDB();
    return new Promise((res, rej) => {
      const tx = db.transaction('pdfs','readwrite');
      tx.objectStore('pdfs').delete(id);
      tx.oncomplete = () => res();
      tx.onerror = () => rej(tx.error || new Error('Delete transaction failed'));
      tx.onabort = () => rej(new Error('Delete transaction aborted.'));
    });
  });
}

function loadMeta() { try { return JSON.parse(localStorage.getItem(META_KEY)) || []; } catch { return []; } }
function saveMeta() { localStorage.setItem(META_KEY, JSON.stringify(books)); }
function uid() { return Date.now().toString(36) + Math.random().toString(36).slice(2,8); }
function formatBytes(b) { if(!b)return'0 B'; const k=1024,s=['B','KB','MB','GB']; const i=Math.floor(Math.log(b)/Math.log(k)); return (b/Math.pow(k,i)).toFixed(1)+' '+s[i]; }
function initials(t) { return (t||'U').split(/\s+/).slice(0,2).map(w=>(w[0]||'').toUpperCase()).join(''); }
function plColor(id) { let h=0; for(let i=0;i<(id||'').length;i++) h=(h*31+id.charCodeAt(i))|0; return PLACEHOLDER_COLORS[Math.abs(h)%PLACEHOLDER_COLORS.length]; }
function formatDate(d) { if(!d)return'-'; return new Date(d).toLocaleDateString('en-US',{year:'numeric',month:'short',day:'numeric'}); }

books = loadMeta();

// Request persistent storage so browser won't evict IndexedDB data
async function requestPersistence() {
  if (navigator.storage && navigator.storage.persist) {
    const granted = await navigator.storage.persist();
    if (!granted) console.warn('Persistent storage not granted — uploads may be evicted by the browser.');
  }
}

// Verify IndexedDB blobs exist for all metadata entries; remove orphaned metadata
async function verifyIntegrity() {
  if (books.length === 0) return;
  try {
    const db = await openDB();
    const tx = db.transaction('pdfs', 'readonly');
    const store = tx.objectStore('pdfs');
    const allKeys = await new Promise((res, rej) => {
      const r = store.getAllKeys();
      r.onsuccess = () => res(r.result);
      r.onerror = () => rej(r.error);
    });
    const keySet = new Set(allKeys);
    const before = books.length;
    books = books.filter(b => keySet.has(b.id));
    if (books.length < before) {
      saveMeta();
      console.warn(`Removed ${before - books.length} orphaned library entries (missing blobs).`);
    }
  } catch(e) { console.error('Integrity check failed:', e); }
}

requestPersistence();
verifyIntegrity().then(() => render());

function switchView(v) {
  view = v; selectedBook = null; editMeta = null;
  document.querySelectorAll('.nav-tab').forEach(t => t.classList.toggle('active', t.dataset.view === v));
  render();
}

function getFiltered() {
  let list = [...books];
  if (catFilter !== 'All') list = list.filter(b => b.category === catFilter);
  if (search.trim()) {
    const q = search.toLowerCase();
    list = list.filter(b => b.title.toLowerCase().includes(q) || (b.author||'').toLowerCase().includes(q) || (b.tags||[]).some(t => t.toLowerCase().includes(q)));
  }
  list.sort((a,b) => {
    if (sortBy === 'title') return (a.title||'').localeCompare(b.title||'');
    if (sortBy === 'author') return (a.author||'').localeCompare(b.author||'');
    if (sortBy === 'lastRead') return (b.lastRead||'').localeCompare(a.lastRead||'');
    return (b.dateAdded||'').localeCompare(a.dateAdded||'');
  });
  return list;
}

function render() {
  const body = document.getElementById('mainBody');
  if (view === 'library') renderLibrary(body);
  else if (view === 'detail') renderDetail(body);
  else if (view === 'stats') renderStats(body);
}

function renderLibrary(el) {
  const filtered = getFiltered();
  el.innerHTML = `
    <div class="toolbar">
      <button class="btn" onclick="toggleUpload()" id="uploadToggle">${showUploadPanel ? 'Hide Upload' : 'Upload PDF'}</button>
      <input class="input" style="max-width:250px" placeholder="Search..." value="${search}" oninput="search=this.value;render()">
      <select class="select" onchange="catFilter=this.value;render()">
        ${CATEGORIES.map(c => `<option value="${c}" ${catFilter===c?'selected':''}>${c}</option>`).join('')}
      </select>
      <select class="select" onchange="sortBy=this.value;render()">
        <option value="dateAdded" ${sortBy==='dateAdded'?'selected':''}>Date Added</option>
        <option value="title" ${sortBy==='title'?'selected':''}>Title</option>
        <option value="author" ${sortBy==='author'?'selected':''}>Author</option>
        <option value="lastRead" ${sortBy==='lastRead'?'selected':''}>Last Read</option>
      </select>
      <button class="btn" onclick="viewMode=viewMode==='grid'?'list':'grid';render()">${viewMode==='grid'?'List':'Grid'}</button>
      <span style="color:var(--dim);font-size:11px;margin-left:auto">${filtered.length} book${filtered.length!==1?'s':''}</span>
    </div>
    ${showUploadPanel ? renderUploadPanel() : ''}
    ${filtered.length === 0 ? '<div style="text-align:center;padding:60px 20px;color:var(--dim)"><div style="font-size:40px;margin-bottom:12px">&#128218;</div><p>No books yet. Upload a PDF to get started.</p></div>' : ''}
    ${viewMode === 'grid' ? `<div class="grid">${filtered.map(b => renderBookCard(b)).join('')}</div>` : filtered.map(b => renderBookList(b)).join('')}
  `;
  const dz = document.getElementById('dropZone');
  if (dz) {
    dz.addEventListener('dragover', e => { e.preventDefault(); dz.classList.add('active'); });
    dz.addEventListener('dragleave', () => dz.classList.remove('active'));
    dz.addEventListener('drop', e => { e.preventDefault(); dz.classList.remove('active'); const f = e.dataTransfer.files[0]; if(f) startUpload(f); });
  }
}

function renderUploadPanel() {
  return `<div style="background:var(--bg1);border:1px solid var(--border);border-radius:10px;padding:20px;margin-bottom:20px">
    <div class="drop-zone" id="dropZone" onclick="document.getElementById('fileInput').click()">
      <div style="font-size:32px;margin-bottom:8px">&#128196;</div>
      <div style="color:var(--dim);font-size:12px">Drop a PDF or EPUB here or click to browse</div>
      <div style="color:var(--dim);font-size:10px;margin-top:4px">Max ${formatBytes(MAX_FILE_SIZE)}</div>
      <input type="file" id="fileInput" accept=".pdf,.epub" style="display:none" onchange="startUpload(this.files[0])">
    </div>
  </div>`;
}

function renderBookCard(b) {
  const sc = STATUS_COLORS[b.readingStatus] || '#6b7280';
  return `<div class="card" onclick="openDetail('${b.id}')">
    <div class="book-cover" style="background:${plColor(b.id)}">${initials(b.title)}</div>
    <div style="padding:12px">
      <div style="display:flex;align-items:center;gap:4px;margin-bottom:4px"><span class="status-dot" style="background:${sc}"></span><span style="font-size:10px;color:${sc}">${b.readingStatus}</span></div>
      <div style="font-size:12px;font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis">${b.title}</div>
      <div style="font-size:10px;color:var(--dim);margin-top:2px">${b.author||'Unknown'}</div>
      <div style="display:flex;gap:4px;margin-top:6px;flex-wrap:wrap">
        <span class="tag">${b.category}</span>
        <span class="tag" style="background:rgba(240,165,0,0.12);color:var(--gold)">${(b.fileType||'pdf').toUpperCase()}</span>
        <span style="font-size:10px;color:var(--dim)">${formatBytes(b.fileSize)}</span>
      </div>
    </div>
  </div>`;
}

function renderBookList(b) {
  const sc = STATUS_COLORS[b.readingStatus] || '#6b7280';
  return `<div class="list-item" onclick="openDetail('${b.id}')">
    <div style="width:40px;height:50px;border-radius:4px;background:${plColor(b.id)};display:flex;align-items:center;justify-content:center;font-size:14px;font-weight:700;color:rgba(255,255,255,0.3);flex-shrink:0">${initials(b.title)}</div>
    <div style="flex:1;min-width:0">
      <div style="font-size:12px;font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis">${b.title}</div>
      <div style="font-size:10px;color:var(--dim)">${b.author||'Unknown'} | ${b.category} | ${formatBytes(b.fileSize)}</div>
    </div>
    <span class="status-dot" style="background:${sc}"></span>
    <span style="font-size:10px;color:${sc}">${b.readingStatus}</span>
  </div>`;
}

function renderDetail(el) {

  if (!b) { switchView('library'); return; }
  const sc = STATUS_COLORS[b.readingStatus] || '#6b7280';
  el.innerHTML = `
    <button class="btn" onclick="saveDetailAndBack()" style="margin-bottom:16px">Back to Library</button>
    <div class="detail-grid" style="display:grid;grid-template-columns:1fr 1fr;gap:20px;max-width:800px">
      <div>
        <div class="book-cover-detail" style="width:100%;height:240px;border-radius:10px;background:${plColor(b.id)};display:flex;align-items:center;justify-content:center;font-size:48px;font-weight:700;color:rgba(255,255,255,0.2);margin-bottom:16px">${initials(b.title)}</div>
        <div style="display:flex;gap:8px;flex-wrap:wrap">
          <button class="btn btn-green" onclick="openReaderForBook('${b.id}')">${b.fileType === 'epub' ? 'Open EPUB' : 'Read'}</button>
          <button class="btn" onclick="downloadBook('${b.id}')">Download</button>
          <button class="btn btn-danger" onclick="confirmDelete('${b.id}')">Delete</button>
        </div>
      </div>
      <div>
        <div style="margin-bottom:12px"><label class="label">Title</label><input class="input" value="${(b.title||'').replace(/"/g,'&quot;')}" onchange="updateEdit('title',this.value)"></div>
        <div style="margin-bottom:12px"><label class="label">Author</label><input class="input" value="${(b.author||'').replace(/"/g,'&quot;')}" onchange="updateEdit('author',this.value)"></div>
        <div style="margin-bottom:12px"><label class="label">Category</label><select class="select" style="width:100%" onchange="updateEdit('category',this.value)">
          ${CATEGORIES.slice(1).map(c => `<option ${b.category===c?'selected':''}>${c}</option>`).join('')}
        </select></div>
        <div style="margin-bottom:12px"><label class="label">Reading Status</label><select class="select" style="width:100%" onchange="updateEdit('readingStatus',this.value)">
          <option ${b.readingStatus==='Unread'?'selected':''}>Unread</option>
          <option ${b.readingStatus==='Reading'?'selected':''}>Reading</option>
          <option ${b.readingStatus==='Completed'?'selected':''}>Completed</option>
        </select></div>
        <div style="margin-bottom:12px"><label class="label">Tags (comma-separated)</label><input class="input" value="${(b.tags||[]).join(', ')}" onchange="updateEdit('tags',this.value.split(',').map(t=>t.trim()).filter(Boolean))"></div>
        <div style="font-size:11px;color:var(--dim);margin-top:12px">
          <div>Added: ${formatDate(b.dateAdded)}</div>
          <div>Last Read: ${formatDate(b.lastRead)}</div>
          <div>Size: ${formatBytes(b.fileSize)}</div>
        </div>
      </div>
    </div>
    <div style="margin-top:24px;max-width:800px">
      <h3 style="font-size:14px;color:var(--cyan);margin-bottom:12px">Notes</h3>
      ${(b.notes||[]).map((n,i) => `<div style="background:var(--bg2);border:1px solid var(--border);border-radius:8px;padding:12px;margin-bottom:8px">
        <div style="font-size:12px">${n.text}</div>
        <div style="font-size:10px;color:var(--dim);margin-top:4px">${formatDate(n.date)}${n.page ? ' | Page '+n.page : ''}</div>
      </div>`).join('')}
      <div style="display:flex;gap:8px;margin-top:8px">
        <input class="input" id="noteText" placeholder="Add a note...">
        <input class="input" id="notePage" placeholder="Page" style="width:70px">
        <button class="btn btn-green" onclick="addNote()">Add</button>
      </div>
    </div>
    <button class="btn btn-green" onclick="saveDetailEdits()" style="margin-top:16px">Save Changes</button>
  `;
}

function renderStats(el) {
  const totalSize = books.reduce((s,b) => s + (b.fileSize||0), 0);
  const byStatus = {Unread:0, Reading:0, Completed:0};
  const byCat = {};
  books.forEach(b => { byStatus[b.readingStatus] = (byStatus[b.readingStatus]||0)+1; byCat[b.category] = (byCat[b.category]||0)+1; });
  el.innerHTML = `
    <h2 style="font-size:18px;color:var(--cyan);margin-bottom:20px">Library Statistics</h2>
    <div class="stats-grid">
      <div class="stat-card"><div class="stat-value">${books.length}</div><div class="stat-label">Total Books</div></div>
      <div class="stat-card"><div class="stat-value">${formatBytes(totalSize)}</div><div class="stat-label">Total Size</div></div>
      <div class="stat-card"><div class="stat-value" style="color:#10b981">${byStatus.Completed}</div><div class="stat-label">Completed</div></div>
      <div class="stat-card"><div class="stat-value" style="color:#00d4ff">${byStatus.Reading}</div><div class="stat-label">Reading</div></div>
      <div class="stat-card"><div class="stat-value" style="color:#6b7280">${byStatus.Unread}</div><div class="stat-label">Unread</div></div>
    </div>
    <h3 style="font-size:14px;color:var(--cyan);margin:24px 0 12px">By Category</h3>
    ${Object.entries(byCat).map(([cat,count]) => {
      const pct = books.length > 0 ? Math.round(count/books.length*100) : 0;
      return `<div style="margin-bottom:10px">
        <div style="display:flex;justify-content:space-between;font-size:12px;margin-bottom:3px"><span>${cat}</span><span style="color:var(--dim)">${count} (${pct}%)</span></div>
        <div class="progress-bar"><div class="progress-fill" style="width:${pct}%;background:var(--cyan)"></div></div>
      </div>`;
    }).join('')}
    <h3 style="font-size:14px;color:var(--cyan);margin:24px 0 12px">Reading Progress</h3>
    ${Object.entries(byStatus).map(([st,count]) => {
      const pct = books.length > 0 ? Math.round(count/books.length*100) : 0;
      return `<div style="margin-bottom:10px">
        <div style="display:flex;justify-content:space-between;font-size:12px;margin-bottom:3px"><span>${st}</span><span style="color:var(--dim)">${count} (${pct}%)</span></div>
        <div class="progress-bar"><div class="progress-fill" style="width:${pct}%;background:${STATUS_COLORS[st]}"></div></div>

function toggleUpload() { showUploadPanel = !showUploadPanel; render(); }

async function startUpload(file) {
  if (!file) return;
  const ext = file.name.toLowerCase().split('.').pop();
  if (!['pdf','epub'].includes(ext)) { alert('Only PDF and EPUB files are supported.'); return; }
  if (file.size > MAX_FILE_SIZE) alert(`File is ${formatBytes(file.size)}. May exceed browser storage.`);

  const title = file.name.replace(/\.pdf$/i,'').replace(/[-_]/g,' ');
  const modal = document.createElement('div');
  modal.className = 'modal-overlay';
  modal.innerHTML = `<div class="modal">
    <h3 style="font-size:16px;color:var(--cyan);margin-bottom:16px">Upload PDF</h3>
    <div style="margin-bottom:12px"><label class="label">Title</label><input class="input" id="upTitle" value="${title.replace(/"/g,'&quot;')}"></div>
    <div style="margin-bottom:12px"><label class="label">Author</label><input class="input" id="upAuthor" placeholder="Author name"></div>
    <div style="margin-bottom:12px"><label class="label">Category</label><select class="select" style="width:100%" id="upCat">
      ${CATEGORIES.slice(1).map(c => `<option>${c}</option>`).join('')}
    </select></div>
    <div style="margin-bottom:12px"><label class="label">Tags (comma-separated)</label><input class="input" id="upTags" placeholder="e.g. FAA, design"></div>
    <div style="margin-bottom:16px"><label class="label">Notes</label><input class="input" id="upNotes" placeholder="Optional notes"></div>
    <div id="upProgress" style="display:none;margin-bottom:12px"><div class="progress-bar"><div class="progress-fill" id="upBar" style="width:0%;background:var(--green)"></div></div><div style="font-size:10px;color:var(--dim);text-align:center;margin-top:4px" id="upPct">0%</div></div>
    <div style="display:flex;gap:8px;justify-content:flex-end">
      <button class="btn" onclick="this.closest('.modal-overlay').remove()">Cancel</button>
      <button class="btn btn-green" id="upSubmit" onclick="submitUpload()">Upload</button>
    </div>
  </div>`;
  document.body.appendChild(modal);
  modal._file = file;
}

async function submitUpload() {
  const modal = document.querySelector('.modal-overlay');
  const file = modal._file;
  const id = uid();
  const prog = document.getElementById('upProgress'); prog.style.display = '';
  const bar = document.getElementById('upBar'); const pct = document.getElementById('upPct');

  const reader = new FileReader();
  reader.onprogress = e => { if(e.lengthComputable) { const p = Math.round(e.loaded/e.total*80); bar.style.width=p+'%'; pct.textContent=p+'%'; }};
  reader.onload = async () => {
    bar.style.width='85%'; pct.textContent='85%';
    const mimeType = file.name.toLowerCase().endsWith('.epub') ? 'application/epub+zip' : 'application/pdf';
    const fileType = file.name.toLowerCase().endsWith('.epub') ? 'epub' : 'pdf';
    const blob = new Blob([reader.result], {type: mimeType});
    try {
      await savePDF(id, blob);
      // Verify the blob was actually persisted
      const verify = await getPDF(id);
      if (!verify) { alert('Storage verification failed — the file was not saved. Your browser may be blocking persistent storage. Try allowing site data in browser settings.'); prog.style.display='none'; return; }
      bar.style.width='95%'; pct.textContent='95%';
      const meta = {
        id, title: document.getElementById('upTitle').value || file.name,
        author: document.getElementById('upAuthor').value || 'Unknown',
        category: document.getElementById('upCat').value,
        tags: document.getElementById('upTags').value.split(',').map(t=>t.trim()).filter(Boolean),
        notes: document.getElementById('upNotes').value ? [{text:document.getElementById('upNotes').value, page:null, date:new Date().toISOString()}] : [],
        fileSize: file.size, fileType: fileType, dateAdded: new Date().toISOString(),
        lastRead: null, readingStatus: 'Unread', currentPage: 0, favorite: false
      };
      books.unshift(meta); saveMeta();
      bar.style.width='100%'; pct.textContent='100%';
      setTimeout(() => { modal.remove(); showUploadPanel = false; render(); }, 400);
    } catch(err) { alert('Failed to save: ' + (err.message || 'Storage may be full.')); prog.style.display='none'; }
  };
  reader.onerror = () => { alert('Failed to read file.'); prog.style.display='none'; };
  reader.readAsArrayBuffer(file);
}

function openDetail(id) {
  selectedBook = books.find(b => b.id === id);
  editMeta = {...selectedBook, tags:[...(selectedBook.tags||[])], notes:[...(selectedBook.notes||[])]};
  view = 'detail'; render();
}

function updateEdit(field, value) { if(editMeta) editMeta[field] = value; }

function saveDetailEdits() {
  if (!editMeta) return;
  books = books.map(b => b.id === editMeta.id ? {...editMeta} : b);
  selectedBook = editMeta;
  saveMeta(); render();
}

function saveDetailAndBack() { saveDetailEdits(); switchView('library'); }

function addNote() {
  const text = document.getElementById('noteText').value.trim();
  const page = document.getElementById('notePage').value.trim();
  if (!text || !editMeta) return;
  editMeta.notes = [...(editMeta.notes||[]), {text, page: page||null, date: new Date().toISOString()}];
  render();
}

// ---- PDF.js Reader ----

async function downloadBook(id) {
  const book = books.find(b => b.id === id);
  if (!book) return;
  const blob = await getPDF(id);
  if (!blob) { alert('File data not found in storage.'); return; }
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  a.download = book.title + (book.fileType === 'epub' ? '.epub' : '.pdf');
  a.click();
  URL.revokeObjectURL(url);
}

async function openReaderForBook(id) {
  const book = books.find(b => b.id === id);
  if (!book) return;
  // EPUB files: download since in-browser EPUB rendering requires heavy libraries
  if (book.fileType === 'epub') {
    books = books.map(b => b.id === id ? {...b, lastRead: new Date().toISOString(), readingStatus: b.readingStatus === 'Unread' ? 'Reading' : b.readingStatus} : b);
    saveMeta();
    await downloadBook(id);
    render();
    return;
  }
  try {
    const blob = await getPDF(id);
    if (!blob) { alert('PDF data not found. The file may have been cleared by your browser.'); return; }

    currentBookId = id;
    document.getElementById('readerTitle').textContent = book.title;
    document.getElementById('readerContainer').style.display = 'flex';

    // Update book metadata
    books = books.map(b => b.id === id ? {...b, lastRead: new Date().toISOString(), readingStatus: b.readingStatus === 'Unread' ? 'Reading' : b.readingStatus} : b);
    saveMeta();

    // Load PDF with pdf.js
    const arrayBuffer = await blob.arrayBuffer();
    const loadingTask = pdfjsLib.getDocument({data: arrayBuffer});
    pdfDoc = await loadingTask.promise;
    totalPages = pdfDoc.numPages;

    // Restore saved page position
    const savedPage = book.currentPage || 1;
    currentPage = Math.max(1, Math.min(savedPage, totalPages));
    currentScale = 0; // 0 signals fit-to-width on first render

    renderPage(currentPage);
  } catch(err) {
    console.error(err);
    alert('Failed to load PDF: ' + (err.message || err));
  }
}

async function renderPage(num) {
  if (!pdfDoc || rendering) { pendingPage = num; return; }
  rendering = true;

  try {
    const page = await pdfDoc.getPage(num);
    const canvas = document.getElementById('readerCanvas');
    const ctx = canvas.getContext('2d');
    const wrap = document.getElementById('readerCanvasWrap');

    // Fit-to-width if scale is 0
    if (currentScale === 0) {
      const baseViewport = page.getViewport({scale: 1.0});
      const availWidth = wrap.clientWidth - 48; // 24px margin each side
      currentScale = availWidth / baseViewport.width;
      // Ensure a comfortable minimum reading size (at least 1.0x on desktop, 0.5x on mobile)
      const minScale = window.innerWidth < 600 ? 0.5 : 0.8;
      if (currentScale < minScale) currentScale = minScale;
      if (currentScale > 4) currentScale = 4;
    }

    const viewport = page.getViewport({scale: currentScale * (window.devicePixelRatio || 1)});
    const displayViewport = page.getViewport({scale: currentScale});

    canvas.width = viewport.width;
    canvas.height = viewport.height;
    canvas.style.width = displayViewport.width + 'px';
    canvas.style.height = displayViewport.height + 'px';

    await page.render({canvasContext: ctx, viewport: viewport}).promise;

    // Update UI
    currentPage = num;
    document.getElementById('pageInfo').textContent = currentPage + ' / ' + totalPages;
    document.getElementById('pageInput').value = currentPage;
    document.getElementById('zoomLabel').textContent = Math.round(currentScale * 100) + '%';
    document.getElementById('btnPrev').disabled = currentPage <= 1;
    document.getElementById('btnNext').disabled = currentPage >= totalPages;

    // Save position
    if (currentBookId) {
      books = books.map(b => b.id === currentBookId ? {...b, currentPage: currentPage} : b);
      saveMeta();
    }

    // Scroll to top of page smoothly
    wrap.scrollTo({top: 0, behavior: 'smooth'});
  } catch(err) {
    console.error('Render error:', err);
  }

  rendering = false;
  if (pendingPage !== null) {
    const p = pendingPage;
    pendingPage = null;
    renderPage(p);
  }
}

function readerPrevPage() {
  if (currentPage <= 1) return;
  renderPage(currentPage - 1);
}

function readerNextPage() {
  if (currentPage >= totalPages) return;
  renderPage(currentPage + 1);
}

function goToPage(num) {
  num = parseInt(num);
  if (isNaN(num) || num < 1) num = 1;
  if (num > totalPages) num = totalPages;
  renderPage(num);
}

function readerZoom(delta) {
  const newScale = Math.max(0.3, Math.min(5, currentScale + delta));
  if (Math.abs(newScale - currentScale) < 0.01) return;
  currentScale = newScale;
  renderPage(currentPage);
}

function readerFitWidth() {
  currentScale = 0; // triggers fit-to-width calculation
  renderPage(currentPage);
}

function closeReader() {
  document.getElementById('readerContainer').style.display = 'none';
  pdfDoc = null;
  currentBookId = null;
  totalPages = 0;
  currentPage = 1;
  const canvas = document.getElementById('readerCanvas');
  const ctx = canvas.getContext('2d');
  ctx.clearRect(0, 0, canvas.width, canvas.height);
  canvas.width = 0;
  canvas.height = 0;
  render();
}

function toggleFullscreen() {
  const el = document.getElementById('readerContainer');
  if (!document.fullscreenElement) el.requestFullscreen?.();
  else document.exitFullscreen?.();
}

function toggleReadingMode() {
  const container = document.getElementById('readerContainer');
  container.classList.toggle('reading-mode');
  const btn = document.getElementById('btnReadingMode');
  if (container.classList.contains('reading-mode')) {
    btn.style.background = 'rgba(0,212,255,0.15)';
    btn.style.color = 'var(--cyan)';
    btn.style.borderColor = 'var(--cyan)';
  } else {
    btn.style.background = '';
    btn.style.color = '';
    btn.style.borderColor = '';
  }
}

async function confirmDelete(id) {
  if (!confirm('Delete this book permanently?')) return;
  await deletePDFFromDB(id);
  books = books.filter(b => b.id !== id);
  saveMeta(); switchView('library');
}

// Keyboard navigation
document.addEventListener('keydown', e => {
  if (document.getElementById('readerContainer').style.display !== 'flex') return;
  // Ignore if user is typing in the page input
  if (document.activeElement && document.activeElement.id === 'pageInput') return;

  switch(e.key) {
    case 'ArrowLeft':
    case 'ArrowUp':
      e.preventDefault();
      readerPrevPage();
      break;
    case 'ArrowRight':
    case 'ArrowDown':
      e.preventDefault();
      readerNextPage();
      break;
    case 'Home':
      e.preventDefault();
      goToPage(1);
      break;
    case 'End':
      e.preventDefault();
      goToPage(totalPages);
      break;
    case 'Escape':
      e.preventDefault();
      closeReader();
      break;
    case 'r':
      if (!e.ctrlKey && !e.metaKey) { e.preventDefault(); toggleReadingMode(); }
      break;
    case 'f':
      if (!e.ctrlKey && !e.metaKey) { e.preventDefault(); readerFitWidth(); }
      break;
    case '+':
    case '=':
      if (e.ctrlKey || e.metaKey) { e.preventDefault(); readerZoom(0.2); }
      break;
    case '-':
      if (e.ctrlKey || e.metaKey) { e.preventDefault(); readerZoom(-0.2); }
      break;
    case '0':
      if (e.ctrlKey || e.metaKey) { e.preventDefault(); readerFitWidth(); }
      break;
  }
});

// Touch swipe navigation + pinch-to-zoom
(function() {
  let touchStartX = 0, touchStartY = 0, touchStartTime = 0;
  let initialPinchDist = 0, pinchScale = 0;
  const wrap = document.getElementById('readerCanvasWrap');

  wrap.addEventListener('touchstart', e => {
    if (e.touches.length === 2) {
      // Pinch-to-zoom start
      const dx = e.touches[0].clientX - e.touches[1].clientX;
      const dy = e.touches[0].clientY - e.touches[1].clientY;
      initialPinchDist = Math.hypot(dx, dy);
      pinchScale = currentScale;
      return;
    }
    if (e.touches.length !== 1) return;
    touchStartX = e.touches[0].clientX;
    touchStartY = e.touches[0].clientY;
    touchStartTime = Date.now();
  }, {passive: true});

  wrap.addEventListener('touchmove', e => {
    if (e.touches.length === 2 && initialPinchDist > 0) {
      const dx = e.touches[0].clientX - e.touches[1].clientX;
      const dy = e.touches[0].clientY - e.touches[1].clientY;
      const dist = Math.hypot(dx, dy);
      const scale = pinchScale * (dist / initialPinchDist);
      currentScale = Math.max(0.3, Math.min(5, scale));
      // Debounced render during pinch
      if (!rendering) renderPage(currentPage);
    }
  }, {passive: true});

  wrap.addEventListener('touchend', e => {
    if (initialPinchDist > 0 && e.touches.length < 2) {
      initialPinchDist = 0;
      renderPage(currentPage);
      return;
    }
    if (document.getElementById('readerContainer').style.display !== 'flex') return;
    const touch = e.changedTouches[0];
    const dx = touch.clientX - touchStartX;
    const dy = touch.clientY - touchStartY;
    const dt = Date.now() - touchStartTime;

    // Must be a quick horizontal swipe
    if (dt > 500) return;
    if (Math.abs(dx) < 50) return;
    if (Math.abs(dy) > Math.abs(dx)) return; // vertical scroll, ignore

    if (dx < 0) readerNextPage();   // swipe left = next
    else readerPrevPage();           // swipe right = prev
  }, {passive: true});
})();

// Refit on window resize
window.addEventListener('resize', () => {
  if (document.getElementById('readerContainer').style.display === 'flex' && pdfDoc) {
    // Only refit if we're at a natural fit-width scale (don't override manual zoom)
    // We'll just re-render at the current scale
    renderPage(currentPage);
  }
});

render();
</script>
