<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<title>Drawing Challenge</title>
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #050a0f;
    --surface: #0a1018;
    --surface2: #0e1520;
    --border: #1a2535;
    --cyan: #00d4ff;
    --orange: #ff6600;
    --green: #10b981;
    --red: #ef4444;
    --gold: #fbbf24;
    --text: #e2e8f0;
    --muted: #64748b;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
  html, body {
    background: var(--bg);
    color: var(--text);
    font-family: 'JetBrains Mono', monospace;
    min-height: 100vh;
    overflow-x: hidden;
    touch-action: manipulation;
  }
  body { padding: 12px; }
  .container { max-width: 860px; margin: 0 auto; }
  h1 {
    font-size: 22px;
    color: var(--cyan);
    text-align: center;
    letter-spacing: 2px;
    margin-bottom: 4px;
    text-shadow: 0 0 12px rgba(0,212,255,0.4);
  }
  .subtitle {
    text-align: center;
    color: var(--muted);
    font-size: 11px;
    margin-bottom: 16px;
    letter-spacing: 1px;
  }
  .card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 14px;
    margin-bottom: 12px;
  }
  .card h2 {
    font-size: 12px;
    color: var(--orange);
    letter-spacing: 1.5px;
    margin-bottom: 10px;
    text-transform: uppercase;
  }
  .btn {
    font-family: inherit;
    background: var(--surface2);
    color: var(--text);
    border: 1px solid var(--border);
    border-radius: 6px;
    padding: 12px 16px;
    font-size: 14px;
    cursor: pointer;
    min-height: 44px;
    transition: all 0.15s;
    touch-action: manipulation;
    font-weight: 500;
  }
  .btn:hover, .btn:active { border-color: var(--cyan); color: var(--cyan); }
  .btn.primary { background: var(--cyan); color: #000; border-color: var(--cyan); font-weight: 600; }
  .btn.primary:hover { background: #5be4ff; }
  .btn.orange { background: var(--orange); color: #000; border-color: var(--orange); font-weight: 600; }
  .btn.orange:hover { background: #ff8533; }
  .btn.ghost { background: transparent; }
  .btn.active { border-color: var(--cyan); color: var(--cyan); background: rgba(0,212,255,0.08); }
  .btn.small { padding: 8px 12px; font-size: 12px; min-height: 40px; }
  .row { display: flex; gap: 8px; flex-wrap: wrap; }
  .grid-2 { display: grid; grid-template-columns: repeat(2, 1fr); gap: 8px; }
  .grid-3 { display: grid; grid-template-columns: repeat(3, 1fr); gap: 8px; }
  .grid-4 { display: grid; grid-template-columns: repeat(4, 1fr); gap: 8px; }
  @media (max-width: 520px) { .grid-4 { grid-template-columns: repeat(2, 1fr); } }

  /* HOME */
  #home .mode-btn {
    display: flex;
    flex-direction: column;
    align-items: flex-start;
    padding: 14px;
    text-align: left;
    gap: 4px;
  }
  .mode-btn .mode-name { color: var(--cyan); font-size: 14px; font-weight: 600; letter-spacing: 1px; }
  .mode-btn .mode-desc { color: var(--muted); font-size: 11px; }
  .stat-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 8px; }
  .stat {
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 6px;
    padding: 10px;
    text-align: center;
  }
  .stat-val { font-size: 20px; color: var(--gold); font-weight: 700; }
  .stat-lbl { font-size: 10px; color: var(--muted); letter-spacing: 1px; text-transform: uppercase; margin-top: 2px; }

  /* GAME */
  .hud {
    display: flex;
    justify-content: space-between;
    align-items: center;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 10px 14px;
    margin-bottom: 10px;
  }
  .prompt-label { font-size: 11px; color: var(--muted); letter-spacing: 1px; }
  .prompt-name { font-size: 16px; color: var(--cyan); font-weight: 600; letter-spacing: 1px; text-transform: uppercase; }
  .timer {
    font-size: 24px;
    color: var(--green);
    font-weight: 700;
    font-variant-numeric: tabular-nums;
  }
  .timer.warn { color: var(--orange); }
  .timer.danger { color: var(--red); animation: flash 0.5s infinite; }
  @keyframes flash { 0%, 100% { opacity: 1; } 50% { opacity: 0.4; } }

  .canvas-wrap {
    position: relative;
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 8px;
    overflow: hidden;
    aspect-ratio: 1 / 1;
    width: 100%;
    max-width: 600px;
    margin: 0 auto 10px;
    touch-action: none;
  }
  canvas { position: absolute; top: 0; left: 0; width: 100%; height: 100%; display: block; }
  #refCanvas { opacity: 0.9; pointer-events: none; transition: opacity 0.5s; }
  #refCanvas.hidden { opacity: 0; }
  #refCanvas.faint { opacity: 0.18; }
  #drawCanvas { cursor: crosshair; }

  .tools {
    display: flex;
    gap: 6px;
    align-items: center;
    justify-content: space-between;
    flex-wrap: wrap;
  }
  .stroke-picker { display: flex; gap: 6px; align-items: center; }
  .stroke-btn {
    width: 44px;
    height: 44px;
    border-radius: 6px;
    background: var(--surface2);
    border: 1px solid var(--border);
    display: flex;
    align-items: center;
    justify-content: center;
    cursor: pointer;
  }
  .stroke-btn.active { border-color: var(--cyan); }
  .stroke-dot { background: var(--text); border-radius: 50%; }

  /* RESULTS */
  .result-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 10px;
    margin-bottom: 12px;
  }
  .result-cell {
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 8px;
    aspect-ratio: 1/1;
    position: relative;
    overflow: hidden;
  }
  .result-cell canvas { width: 100%; height: 100%; }
  .result-cell .lbl {
    position: absolute;
    top: 6px;
    left: 8px;
    font-size: 10px;
    color: var(--muted);
    letter-spacing: 1px;
    text-transform: uppercase;
    z-index: 2;
  }
  .score-big {
    font-size: 48px;
    color: var(--gold);
    font-weight: 700;
    text-align: center;
    font-variant-numeric: tabular-nums;
    text-shadow: 0 0 20px rgba(251,191,36,0.4);
  }
  .stars { text-align: center; font-size: 28px; color: var(--gold); letter-spacing: 6px; margin: 6px 0; }
  .stars .empty { color: #2a3545; }
  .commentary { text-align: center; font-size: 14px; color: var(--cyan); margin-bottom: 12px; letter-spacing: 1px; }
  .breakdown {
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 6px;
    padding: 10px;
    margin-bottom: 12px;
  }
  .breakdown-row {
    display: flex;
    justify-content: space-between;
    font-size: 12px;
    padding: 4px 0;
    color: var(--muted);
  }
  .breakdown-row span:last-child { color: var(--text); font-weight: 600; }

  #confettiCanvas {
    position: fixed; inset: 0; pointer-events: none; z-index: 9999;
  }
  .hidden { display: none !important; }
  .memory-badge {
    background: rgba(255,102,0,0.12);
    border: 1px solid var(--orange);
    color: var(--orange);
    padding: 6px 10px;
    border-radius: 4px;
    font-size: 10px;
    letter-spacing: 1px;
    text-align: center;
    margin-bottom: 10px;
    text-transform: uppercase;
  }
</style>
</head>
<body>
<div class="container">
  <h1>DRAWING CHALLENGE</h1>
  <div class="subtitle">// KORB ENGINEERING VFD SKETCH SYSTEM //</div>

  <!-- HOME SCREEN -->
  <div id="home">

      </div>
    </div>
    <button class="btn primary" id="startBtn" style="width:100%;font-size:16px;padding:16px;">START DRAWING</button>
  </div>

    <div class="hud">

      </div>

    <div id="memoryBadge" class="memory-badge hidden">Memorize! Target hiding in <span id="memCount">5</span>s</div>
    <div class="canvas-wrap" id="canvasWrap">
      <canvas id="refCanvas"></canvas>
      <canvas id="drawCanvas"></canvas>
    </div>
    <div class="tools">
      <div class="stroke-picker">
        <div class="stroke-btn" data-w="3"><div class="stroke-dot" style="width:6px;height:6px;"></div></div>
        <div class="stroke-btn active" data-w="6"><div class="stroke-dot" style="width:12px;height:12px;"></div></div>
        <div class="stroke-btn" data-w="10"><div class="stroke-dot" style="width:18px;height:18px;"></div></div>
      </div>
      <div class="row">
        <button class="btn small" id="undoBtn">UNDO</button>
        <button class="btn small" id="clearBtn">CLEAR</button>
        <button class="btn small orange" id="submitBtn">SUBMIT</button>
      </div>
    </div>
    <div style="text-align:center;margin-top:8px;">
      <button class="btn ghost small" id="quitBtn">QUIT TO HOME</button>
    </div>
  </div>

  <!-- RESULTS SCREEN -->
  <div id="results" class="hidden">
    <div class="card">
      <div class="score-big" id="finalScore">0</div>
      <div class="stars" id="stars"></div>
      <div class="commentary" id="commentary"></div>
      <div class="result-grid">
        <div class="result-cell"><div class="lbl">TARGET</div><canvas id="resTarget"></canvas></div>
        <div class="result-cell"><div class="lbl">YOUR DRAWING</div><canvas id="resUser"></canvas></div>
      </div>
      <div class="result-cell" style="aspect-ratio:2/1;margin-bottom:12px;">
        <div class="lbl">OVERLAY</div><canvas id="resOverlay"></canvas>
      </div>
      <div class="breakdown">
        <div class="breakdown-row"><span>Coverage</span><span id="bdCov">0%</span></div>
        <div class="breakdown-row"><span>Precision</span><span id="bdPrec">0%</span></div>
        <div class="breakdown-row"><span>Shape IoU</span><span id="bdIoU">0%</span></div>
        <div class="breakdown-row"><span>Accuracy</span><span id="bdAcc">0%</span></div>
        <div class="breakdown-row"><span>Speed Bonus</span><span id="bdSpd">0%</span></div>
        <div class="breakdown-row"><span>Personal Best</span><span id="bdBest">--</span></div>
      </div>
      <div class="grid-3">
        <button class="btn" id="againBtn">TRY AGAIN</button>
        <button class="btn primary" id="nextBtn">NEXT</button>
        <button class="btn ghost" id="homeBtn">HOME</button>
      </div>
    </div>
    <div id="speedRunProgress" class="card hidden">
      <h2>Speed Run Progress</h2>
      <div id="speedRunList"></div>
    </div>
  </div>
</div>
<canvas id="confettiCanvas"></canvas>

/* ============ STATE ============ */
const STORE_PREFIX = 'korb_drawing_challenge_';
const store = {
  get(k, d) { try { const v = localStorage.getItem(STORE_PREFIX + k); return v == null ? d : JSON.parse(v); } catch { return d; } },
  set(k, v) { try { localStorage.setItem(STORE_PREFIX + k, JSON.stringify(v)); } catch {} }

const state = {
  mode: 'normal',
  category: 'all',
  currentPrompt: null,
  strokes: [],
  currentStroke: null,
  strokeWidth: 6,

const CATS = [

/* ============ AUDIO ============ */
let audioCtx = null;
function ensureAudio() {
  if (!audioCtx) {
    try { audioCtx = new (window.AudioContext || window.webkitAudioContext)(); } catch {}
  }
  if (audioCtx && audioCtx.state === 'suspended') audioCtx.resume();
}
function beep(freq, dur, type = 'sine', vol = 0.1) {
  if (!audioCtx) return;
  const o = audioCtx.createOscillator();
  const g = audioCtx.createGain();
  o.type = type; o.frequency.value = freq;
  g.gain.setValueAtTime(0, audioCtx.currentTime);
  g.gain.linearRampToValueAtTime(vol, audioCtx.currentTime + 0.01);
  g.gain.exponentialRampToValueAtTime(0.0001, audioCtx.currentTime + dur);
  o.connect(g); g.connect(audioCtx.destination);
  o.start(); o.stop(audioCtx.currentTime + dur);
}
let scratchNode = null;
function startScratch() {
  if (!audioCtx) return;
  stopScratch();
  const bufferSize = audioCtx.sampleRate * 0.5;
  const buffer = audioCtx.createBuffer(1, bufferSize, audioCtx.sampleRate);
  const data = buffer.getChannelData(0);
  for (let i = 0; i < bufferSize; i++) data[i] = (Math.random() * 2 - 1) * 0.3;
  const src = audioCtx.createBufferSource();
  src.buffer = buffer; src.loop = true;
  const filter = audioCtx.createBiquadFilter();
  filter.type = 'bandpass'; filter.frequency.value = 2500; filter.Q.value = 0.8;
  const gain = audioCtx.createGain();
  gain.gain.value = 0.025;
  src.connect(filter); filter.connect(gain); gain.connect(audioCtx.destination);
  src.start();
  scratchNode = { src, gain };
}
function stopScratch() {
  if (scratchNode) {
    try { scratchNode.gain.gain.exponentialRampToValueAtTime(0.0001, audioCtx.currentTime + 0.05); scratchNode.src.stop(audioCtx.currentTime + 0.1); } catch {}
    scratchNode = null;
  }
}
function playSuccess() { beep(660, 0.1, 'sine', 0.12); setTimeout(() => beep(880, 0.1, 'sine', 0.12), 90); setTimeout(() => beep(1320, 0.2, 'sine', 0.12), 180); }
function playFail() { beep(200, 0.3, 'sawtooth', 0.08); }
function playTick() { beep(800, 0.04, 'square', 0.05); }
function haptic(ms = 30) { if (navigator.vibrate) navigator.vibrate(ms); }

/* ============ HOME RENDER ============ */
function renderHome() {
  const modeGrid = document.getElementById('modeGrid');
  modeGrid.innerHTML = '';
  Object.entries(MODES).forEach(([k, m]) => {
    const b = document.createElement('button');
    b.className = 'btn mode-btn' + (state.mode === k ? ' active' : '');
    b.innerHTML = `<span class="mode-name">${m.name}</span><span class="mode-desc">${m.desc}</span>`;
    b.onclick = () => { state.mode = k; renderHome(); ensureAudio(); };
    modeGrid.appendChild(b);
  });
  const catGrid = document.getElementById('catGrid');
  catGrid.innerHTML = '';
  CATS.forEach(c => {
    const b = document.createElement('button');
    b.className = 'btn' + (state.category === c.id ? ' active' : '');
    b.textContent = c.name;
    b.onclick = () => { state.category = c.id; renderHome(); };
    catGrid.appendChild(b);
  });
  const stats = store.get('stats', { played: 0, totalScore: 0, streak: 0, lastDay: null });
  document.getElementById('statPlayed').textContent = stats.played;
  document.getElementById('statAvg').textContent = stats.played ? Math.round(stats.totalScore / stats.played) : '--';
  document.getElementById('statStreak').textContent = stats.streak || 0;
}

function pickPrompt() {
  const pool = state.category === 'all' ? PROMPTS : PROMPTS.filter(p => p.cat === state.category);
  const list = pool.length ? pool : PROMPTS;
  return list[Math.floor(Math.random() * list.length)];
}

/* ============ GAME ============ */
function startGame(isContinuation = false) {
  ensureAudio();
  if (state.mode === 'speed' && !isContinuation) {
    state.speedRun = { prompts: [pickPrompt(), pickPrompt(), pickPrompt()], idx: 0, totalTime: 0, scores: [] };
  }
  if (state.speedRun) {
    state.currentPrompt = state.speedRun.prompts[state.speedRun.idx];
  } else {
    state.currentPrompt = pickPrompt();
  }
  state.strokes = [];
  state.currentStroke = null;
  document.getElementById('home').classList.add('hidden');
  document.getElementById('results').classList.add('hidden');
  document.getElementById('game').classList.remove('hidden');
  document.getElementById('promptName').textContent = state.currentPrompt.name;
  setupCanvas();
  drawReference();
  state.timeLimit = MODES[state.mode].limit;
  state.startTime = performance.now();

  const refEl = document.getElementById('refCanvas');
  const memBadge = document.getElementById('memoryBadge');
  memBadge.classList.add('hidden');
  refEl.classList.remove('hidden');
  refEl.classList.remove('faint');

  if (state.mode === 'easy') {
    // keep reference visible, faint behind
    refEl.classList.add('faint');
    startTimer(true);
  } else {
    const memDur = state.mode === 'hard' ? 3 : 5;
    memBadge.classList.remove('hidden');
    let remaining = memDur;
    document.getElementById('memCount').textContent = remaining;
    state.memoryTimerId = setInterval(() => {
      remaining--;
      document.getElementById('memCount').textContent = remaining;
      playTick();
      if (remaining <= 0) {
        clearInterval(state.memoryTimerId);
        refEl.classList.add('hidden');
        memBadge.classList.add('hidden');
      }
    }, 1000);
    startTimer(false);
  }
}

function startTimer(countUp) {
  const el = document.getElementById('timer');
  function tick() {
    const elapsed = (performance.now() - state.startTime) / 1000;
    let display, remaining;
    if (countUp) {
      display = elapsed;
      el.textContent = formatTime(display);
      el.className = 'timer';
    } else {
      remaining = Math.max(0, state.timeLimit - elapsed);
      el.textContent = formatTime(remaining);
      el.className = 'timer';
      if (remaining <= 5) el.classList.add('danger');
      else if (remaining <= 10) el.classList.add('warn');
      if (remaining <= 0) {
        clearInterval(state.timerId);
        submitDrawing();
      }
    }
  }
  tick();
  state.timerId = setInterval(tick, 100);
}

function formatTime(s) {
  const m = Math.floor(s / 60);
  const sec = Math.floor(s % 60);
  return String(m).padStart(2, '0') + ':' + String(sec).padStart(2, '0');
}

/* ============ CANVAS ============ */
const REF_SIZE = 400;
let drawCtx, refCtx;

function setupCanvas() {
  const wrap = document.getElementById('canvasWrap');
  const rect = wrap.getBoundingClientRect();
  const dpr = window.devicePixelRatio || 1;
  const size = Math.min(rect.width, rect.height);
  ['refCanvas', 'drawCanvas'].forEach(id => {
    const c = document.getElementById(id);
    c.width = size * dpr;
    c.height = size * dpr;
    c.style.width = size + 'px';
    c.style.height = size + 'px';
  });
  drawCtx = document.getElementById('drawCanvas').getContext('2d');
  refCtx = document.getElementById('refCanvas').getContext('2d');
  drawCtx.setTransform(dpr, 0, 0, dpr, 0, 0);
  refCtx.setTransform(dpr, 0, 0, dpr, 0, 0);
  drawCtx.lineCap = 'round';
  drawCtx.lineJoin = 'round';
  drawGrid();
}

function drawGrid() {
  const c = document.getElementById('drawCanvas');
  const w = parseFloat(c.style.width);
  const h = parseFloat(c.style.height);
  drawCtx.clearRect(0, 0, w, h);
  drawCtx.save();
  drawCtx.strokeStyle = 'rgba(0, 212, 255, 0.04)';
  drawCtx.lineWidth = 1;
  const step = w / 20;
  for (let i = 1; i < 20; i++) {
    drawCtx.beginPath(); drawCtx.moveTo(i * step, 0); drawCtx.lineTo(i * step, h); drawCtx.stroke();
    drawCtx.beginPath(); drawCtx.moveTo(0, i * step); drawCtx.lineTo(w, i * step); drawCtx.stroke();
  }
  drawCtx.restore();
  redrawStrokes();
}

function drawReference() {
  const c = document.getElementById('refCanvas');
  const w = parseFloat(c.style.width);
  const h = parseFloat(c.style.height);
  refCtx.clearRect(0, 0, w, h);
  refCtx.save();
  refCtx.strokeStyle = '#ff6600';
  refCtx.lineWidth = 4;
  refCtx.lineCap = 'round';
  refCtx.lineJoin = 'round';
  const p = new Path2D(state.currentPrompt.d);
  refCtx.scale(w / REF_SIZE, h / REF_SIZE);
  refCtx.stroke(p);
  refCtx.restore();
}

function redrawStrokes() {
  const c = document.getElementById('drawCanvas');
  const w = parseFloat(c.style.width);
  drawCtx.save();
  drawCtx.strokeStyle = '#00d4ff';
  drawCtx.shadowColor = 'rgba(0, 212, 255, 0.5)';
  drawCtx.shadowBlur = 6;
  state.strokes.forEach(s => {
    if (s.points.length < 2) return;
    drawCtx.lineWidth = s.width;
    drawCtx.beginPath();
    drawCtx.moveTo(s.points[0].x, s.points[0].y);
    for (let i = 1; i < s.points.length - 1; i++) {
      const mid = { x: (s.points[i].x + s.points[i + 1].x) / 2, y: (s.points[i].y + s.points[i + 1].y) / 2 };
      drawCtx.quadraticCurveTo(s.points[i].x, s.points[i].y, mid.x, mid.y);
    }
    const last = s.points[s.points.length - 1];
    drawCtx.lineTo(last.x, last.y);
    drawCtx.stroke();
  });
  drawCtx.restore();
}

/* ============ POINTER ============ */
function canvasPos(e) {
  const c = document.getElementById('drawCanvas');
  const r = c.getBoundingClientRect();
  return { x: e.clientX - r.left, y: e.clientY - r.top };
}
function pointerDown(e) {
  e.preventDefault();
  ensureAudio();
  state.currentStroke = { width: state.strokeWidth, points: [canvasPos(e)] };
  state.strokes.push(state.currentStroke);
  startScratch();
}
function pointerMove(e) {
  if (!state.currentStroke) return;
  e.preventDefault();
  const p = canvasPos(e);
  const pts = state.currentStroke.points;
  const last = pts[pts.length - 1];
  if (Math.hypot(p.x - last.x, p.y - last.y) < 1.5) return;
  pts.push(p);
  drawGrid();
}
function pointerUp(e) {
  if (!state.currentStroke) return;
  state.currentStroke = null;
  stopScratch();
  drawGrid();
}

function bindCanvas() {
  const c = document.getElementById('drawCanvas');
  c.addEventListener('pointerdown', pointerDown);
  c.addEventListener('pointermove', pointerMove);
  window.addEventListener('pointerup', pointerUp);
  window.addEventListener('pointercancel', pointerUp);
}

/* ============ SCORING ============
   1. Rasterize target path and user strokes to NxN grids (SCORE_SIZE).
   2. Center both by center-of-mass (translation invariant).
   3. Scale user drawing to match target bounding box (size invariant).
   4. Compute coverage, precision, IoU; then combined accuracy + speed.
*/
const SCORE_SIZE = 128;

function rasterizeToGrid(drawFn) {
  const off = document.createElement('canvas');
  off.width = SCORE_SIZE; off.height = SCORE_SIZE;
  const ctx = off.getContext('2d');
  ctx.fillStyle = '#000'; ctx.fillRect(0, 0, SCORE_SIZE, SCORE_SIZE);
  ctx.strokeStyle = '#fff';
  ctx.lineCap = 'round';
  ctx.lineJoin = 'round';
  drawFn(ctx);
  const img = ctx.getImageData(0, 0, SCORE_SIZE, SCORE_SIZE).data;
  const grid = new Uint8Array(SCORE_SIZE * SCORE_SIZE);
  for (let i = 0, j = 0; i < img.length; i += 4, j++) {
    grid[j] = img[i] > 64 ? 1 : 0;
  }
  return grid;
}

function rasterTarget() {
  return rasterizeToGrid(ctx => {
    ctx.save();
    ctx.scale(SCORE_SIZE / REF_SIZE, SCORE_SIZE / REF_SIZE);
    ctx.lineWidth = 10;
    const p = new Path2D(state.currentPrompt.d);
    ctx.stroke(p);
    ctx.restore();
  });
}

function rasterUser() {
  const c = document.getElementById('drawCanvas');
  const w = parseFloat(c.style.width);
  return rasterizeToGrid(ctx => {
    ctx.save();
    ctx.scale(SCORE_SIZE / w, SCORE_SIZE / w);
    state.strokes.forEach(s => {
      if (s.points.length < 2) return;
      ctx.lineWidth = Math.max(6, s.width * 1.5);
      ctx.beginPath();
      ctx.moveTo(s.points[0].x, s.points[0].y);
      for (let i = 1; i < s.points.length; i++) ctx.lineTo(s.points[i].x, s.points[i].y);
      ctx.stroke();
    });
    ctx.restore();
  });
}

// Bounding box and center of mass of an NxN binary grid
function gridStats(grid) {
  let minX = SCORE_SIZE, minY = SCORE_SIZE, maxX = -1, maxY = -1;
  let sumX = 0, sumY = 0, count = 0;
  for (let y = 0; y < SCORE_SIZE; y++) {
    for (let x = 0; x < SCORE_SIZE; x++) {
      if (grid[y * SCORE_SIZE + x]) {
        if (x < minX) minX = x;
        if (y < minY) minY = y;
        if (x > maxX) maxX = x;
        if (y > maxY) maxY = y;
        sumX += x; sumY += y; count++;
      }
    }
  }
  if (count === 0) return null;
  return {
    minX, minY, maxX, maxY,
    cx: sumX / count, cy: sumY / count,
    w: maxX - minX + 1, h: maxY - minY + 1,
    count,
  };
}

// Resample grid onto a new grid aligned so its bbox fits the target's bbox
function normalizeGrid(grid, srcStats, dstStats) {
  const out = new Uint8Array(SCORE_SIZE * SCORE_SIZE);
  if (!srcStats || !dstStats) return out;
  // Uniform scale preserving aspect: use max dim so shape isn't distorted
  const scale = Math.min(dstStats.w / srcStats.w, dstStats.h / srcStats.h);
  // Translate source center-of-mass to destination center-of-mass after scaling
  for (let y = 0; y < SCORE_SIZE; y++) {
    for (let x = 0; x < SCORE_SIZE; x++) {
      // inverse map out -> src
      const sx = (x - dstStats.cx) / scale + srcStats.cx;
      const sy = (y - dstStats.cy) / scale + srcStats.cy;
      const ix = Math.round(sx), iy = Math.round(sy);
      if (ix >= 0 && iy >= 0 && ix < SCORE_SIZE && iy < SCORE_SIZE) {
        if (grid[iy * SCORE_SIZE + ix]) out[y * SCORE_SIZE + x] = 1;
      }
    }
  }
  return out;
}

// Chamfer-ish distance transform (approximation): dilate binary grid K times
function dilate(grid, iterations) {
  let cur = grid;
  for (let k = 0; k < iterations; k++) {
    const next = new Uint8Array(SCORE_SIZE * SCORE_SIZE);
    for (let y = 0; y < SCORE_SIZE; y++) {
      for (let x = 0; x < SCORE_SIZE; x++) {
        const idx = y * SCORE_SIZE + x;
        if (cur[idx]) { next[idx] = 1; continue; }
        if (x > 0 && cur[idx - 1]) { next[idx] = 1; continue; }
        if (x < SCORE_SIZE - 1 && cur[idx + 1]) { next[idx] = 1; continue; }
        if (y > 0 && cur[idx - SCORE_SIZE]) { next[idx] = 1; continue; }
        if (y < SCORE_SIZE - 1 && cur[idx + SCORE_SIZE]) { next[idx] = 1; continue; }
      }
    }
    cur = next;
  }
  return cur;
}

function countAnd(a, b) {
  let n = 0;
  for (let i = 0; i < a.length; i++) if (a[i] && b[i]) n++;
  return n;
}
function countOr(a, b) {
  let n = 0;
  for (let i = 0; i < a.length; i++) if (a[i] || b[i]) n++;
  return n;
}
function count(a) {
  let n = 0;
  for (let i = 0; i < a.length; i++) if (a[i]) n++;
  return n;
}

function computeScore(timeTaken) {
  const target = rasterTarget();
  const userRaw = rasterUser();

  const tStats = gridStats(target);
  const uStats = gridStats(userRaw);

  if (!uStats || uStats.count < 20) {
    return { coverage: 0, precision: 0, iou: 0, accuracy: 0, speedBonus: 0, final: 0 };
  }

  // Normalize user drawing to target bbox (translation + scale invariant)
  const user = normalizeGrid(userRaw, uStats, tStats);

  const targetDilated = dilate(target, 4);
  const userDilated = dilate(user, 4);

  const targetN = count(target);
  const userN = count(user);

  // Coverage: fraction of target pixels covered by dilated user
  const coverage = targetN > 0 ? countAnd(target, userDilated) / targetN : 0;
  // Precision: fraction of user pixels inside dilated target
  const precision = userN > 0 ? countAnd(user, targetDilated) / userN : 0;
  // IoU at the dilated level for a softer shape similarity measure
  const inter = countAnd(targetDilated, userDilated);
  const uni = countOr(targetDilated, userDilated);
  const iou = uni > 0 ? inter / uni : 0;

  const accuracy = 0.4 * coverage + 0.3 * precision + 0.3 * iou;

  let speedBonus = 0;
  if (state.timeLimit > 0) {
    speedBonus = Math.max(0, (state.timeLimit - timeTaken) / state.timeLimit);
  } else {
    // Easy mode: soft bonus if under 30s, zero after 90s
    speedBonus = Math.max(0, Math.min(1, (90 - timeTaken) / 60));
  }

  const final = Math.round((accuracy * 0.75 + speedBonus * 0.25) * 100);
  return { coverage, precision, iou, accuracy, speedBonus, final };
}

/* ============ SUBMIT / RESULTS ============ */
function submitDrawing() {
  if (state.timerId) { clearInterval(state.timerId); state.timerId = null; }
  if (state.memoryTimerId) { clearInterval(state.memoryTimerId); state.memoryTimerId = null; }
  stopScratch();
  state.endTime = performance.now();
  const timeTaken = (state.endTime - state.startTime) / 1000;

  const result = computeScore(timeTaken);
  result.timeTaken = timeTaken;

  showResults(result);
  updateStats(result);

  if (state.speedRun) {
    state.speedRun.scores.push(result);
    state.speedRun.totalTime += timeTaken;
    state.speedRun.idx++;
  }
}

function showResults(result) {
  document.getElementById('game').classList.add('hidden');
  document.getElementById('results').classList.remove('hidden');

  // Animated score counter
  const el = document.getElementById('finalScore');
  let n = 0;
  const target = result.final;
  const step = Math.max(1, Math.ceil(target / 30));
  const iv = setInterval(() => {
    n += step;
    if (n >= target) { n = target; clearInterval(iv); }
    el.textContent = n;
  }, 25);

  // Stars
  const starCount = result.final >= 90 ? 5 : result.final >= 75 ? 4 : result.final >= 60 ? 3 : result.final >= 40 ? 2 : 1;
  const starEl = document.getElementById('stars');
  starEl.innerHTML = '';
  for (let i = 0; i < 5; i++) {
    const s = document.createElement('span');
    s.textContent = '★';
    if (i >= starCount) s.className = 'empty';
    starEl.appendChild(s);
  }
  const comments = {
    5: 'PERFECT! MASTERPIECE',
    4: 'NICE WORK, ARTIST',
    3: 'CLOSE ENOUGH',
    2: 'NEEDS PRACTICE',
    1: 'KEEP SKETCHING',
  };
  document.getElementById('commentary').textContent = comments[starCount];

  document.getElementById('bdCov').textContent = Math.round(result.coverage * 100) + '%';
  document.getElementById('bdPrec').textContent = Math.round(result.precision * 100) + '%';
  document.getElementById('bdIoU').textContent = Math.round(result.iou * 100) + '%';
  document.getElementById('bdAcc').textContent = Math.round(result.accuracy * 100) + '%';
  document.getElementById('bdSpd').textContent = Math.round(result.speedBonus * 100) + '%';

  // Personal best
  const bestKey = 'best_' + state.currentPrompt.name;
  const prevBest = store.get(bestKey, 0);
  if (result.final > prevBest) store.set(bestKey, result.final);
  const newBest = store.get(bestKey, 0);
  document.getElementById('bdBest').textContent = newBest + (result.final >= newBest && result.final > prevBest ? ' (NEW!)' : '');

  // Result canvases
  drawResultCanvas('resTarget', ctx => {
    ctx.strokeStyle = '#ff6600'; ctx.lineWidth = 4;
    ctx.scale(200 / REF_SIZE, 200 / REF_SIZE);
    ctx.lineCap = 'round'; ctx.lineJoin = 'round';
    ctx.stroke(new Path2D(state.currentPrompt.d));
  }, 200, 200);

  const dc = document.getElementById('drawCanvas');
  const dcW = parseFloat(dc.style.width);
  drawResultCanvas('resUser', ctx => {
    ctx.strokeStyle = '#00d4ff'; ctx.lineCap = 'round'; ctx.lineJoin = 'round';
    ctx.scale(200 / dcW, 200 / dcW);
    state.strokes.forEach(s => {
      if (s.points.length < 2) return;
      ctx.lineWidth = s.width;
      ctx.beginPath();
      ctx.moveTo(s.points[0].x, s.points[0].y);
      for (let i = 1; i < s.points.length; i++) ctx.lineTo(s.points[i].x, s.points[i].y);
      ctx.stroke();
    });
  }, 200, 200);

  drawResultCanvas('resOverlay', ctx => {
    // target faint
    ctx.save();
    ctx.globalAlpha = 0.3;
    ctx.strokeStyle = '#ff6600'; ctx.lineWidth = 5;
    ctx.lineCap = 'round'; ctx.lineJoin = 'round';
    const sx = 400 / REF_SIZE, sy = 200 / REF_SIZE;
    ctx.setTransform(sx, 0, 0, sy, 0, 0);
    ctx.stroke(new Path2D(state.currentPrompt.d));
    ctx.restore();
    // user
    ctx.save();
    ctx.strokeStyle = '#00d4ff'; ctx.lineCap = 'round'; ctx.lineJoin = 'round';
    const sx2 = 400 / dcW, sy2 = 200 / dcW;
    ctx.setTransform(sx2, 0, 0, sy2, 0, 0);
    state.strokes.forEach(s => {
      if (s.points.length < 2) return;
      ctx.lineWidth = s.width;
      ctx.beginPath();
      ctx.moveTo(s.points[0].x, s.points[0].y);
      for (let i = 1; i < s.points.length; i++) ctx.lineTo(s.points[i].x, s.points[i].y);
      ctx.stroke();
    });
    ctx.restore();
  }, 400, 200);

  // Speed run progress
  const spEl = document.getElementById('speedRunProgress');
  if (state.speedRun) {
    spEl.classList.remove('hidden');
    const list = document.getElementById('speedRunList');
    list.innerHTML = '';
    state.speedRun.prompts.forEach((p, i) => {
      const row = document.createElement('div');
      row.className = 'breakdown-row';
      const sc = state.speedRun.scores[i];
      row.innerHTML = `<span>${i + 1}. ${p.name}</span><span>${sc ? sc.final : '--'}</span>`;
      list.appendChild(row);
    });
    const nextBtn = document.getElementById('nextBtn');
    if (state.speedRun.idx >= state.speedRun.prompts.length) {
      nextBtn.textContent = 'FINISH';
    } else {
      nextBtn.textContent = 'NEXT PROMPT';
    }
  } else {
    spEl.classList.add('hidden');
    document.getElementById('nextBtn').textContent = 'NEXT';
  }

  if (starCount >= 5) {
    playSuccess();
    haptic([30, 40, 30, 40, 100]);
    confetti();
  } else if (starCount >= 3) {
    playSuccess();
    haptic(60);
  } else {
    playFail();
    haptic(20);
  }
}

function drawResultCanvas(id, drawFn, w = 200, h = 200) {
  const c = document.getElementById(id);
  const dpr = window.devicePixelRatio || 1;
  c.width = w * dpr;
  c.height = h * dpr;
  c.style.width = '100%';
  c.style.height = '100%';
  const ctx = c.getContext('2d');
  ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
  ctx.clearRect(0, 0, w, h);
  drawFn(ctx);
}

function updateStats(result) {
  const s = store.get('stats', { played: 0, totalScore: 0, streak: 0, lastDay: null });
  s.played++;
  s.totalScore += result.final;
  const today = new Date().toISOString().slice(0, 10);
  if (s.lastDay === today) {
    // same day, no streak change
  } else {
    const y = new Date(Date.now() - 86400000).toISOString().slice(0, 10);
    if (s.lastDay === y) s.streak = (s.streak || 0) + 1;
    else s.streak = 1;
    s.lastDay = today;
  }
  store.set('stats', s);
}

/* ============ CONFETTI ============ */
function confetti() {
  const c = document.getElementById('confettiCanvas');
  c.width = window.innerWidth; c.height = window.innerHeight;
  const ctx = c.getContext('2d');
  const colors = ['#00d4ff', '#ff6600', '#10b981', '#fbbf24', '#ef4444'];
  const particles = [];
  for (let i = 0; i < 120; i++) {
    particles.push({
      x: c.width / 2, y: c.height / 3,
      vx: (Math.random() - 0.5) * 14,
      vy: (Math.random() - 1) * 14,
      size: 4 + Math.random() * 6,
      color: colors[Math.floor(Math.random() * colors.length)],
      rot: Math.random() * Math.PI,
      vr: (Math.random() - 0.5) * 0.3,
      life: 1,
    });
  }
  let frame = 0;
  function loop() {
    frame++;
    ctx.clearRect(0, 0, c.width, c.height);
    particles.forEach(p => {
      p.x += p.vx; p.y += p.vy; p.vy += 0.35; p.rot += p.vr; p.life -= 0.008;
      if (p.life <= 0) return;
      ctx.save();
      ctx.globalAlpha = Math.max(0, p.life);
      ctx.translate(p.x, p.y); ctx.rotate(p.rot);
      ctx.fillStyle = p.color;
      ctx.fillRect(-p.size / 2, -p.size / 2, p.size, p.size);
      ctx.restore();
    });
    if (frame < 200) requestAnimationFrame(loop);
    else ctx.clearRect(0, 0, c.width, c.height);
  }
  loop();
}

/* ============ NAV / BUTTONS ============ */
function goHome() {
  if (state.timerId) clearInterval(state.timerId);
  if (state.memoryTimerId) clearInterval(state.memoryTimerId);
  stopScratch();
  state.speedRun = null;
  document.getElementById('game').classList.add('hidden');
  document.getElementById('results').classList.add('hidden');
  document.getElementById('home').classList.remove('hidden');
  renderHome();
}

document.getElementById('startBtn').onclick = () => startGame(false);
document.getElementById('submitBtn').onclick = submitDrawing;
document.getElementById('undoBtn').onclick = () => { state.strokes.pop(); drawGrid(); };
document.getElementById('clearBtn').onclick = () => { state.strokes = []; drawGrid(); };
document.getElementById('quitBtn').onclick = goHome;
document.getElementById('homeBtn').onclick = goHome;
document.getElementById('againBtn').onclick = () => {
  // Replay same prompt; speed runs not affected
  if (state.speedRun) state.speedRun.idx = Math.max(0, state.speedRun.idx - 1);
  startGame(true);
};
document.getElementById('nextBtn').onclick = () => {
  if (state.speedRun && state.speedRun.idx >= state.speedRun.prompts.length) {
    // Show totals briefly, then home
    goHome();
    return;
  }
  startGame(true);
};

document.querySelectorAll('.stroke-btn').forEach(b => {
  b.onclick = () => {
    document.querySelectorAll('.stroke-btn').forEach(x => x.classList.remove('active'));
    b.classList.add('active');
    state.strokeWidth = parseInt(b.dataset.w, 10);
  };
});

window.addEventListener('resize', () => {
  if (!document.getElementById('game').classList.contains('hidden')) {
    setupCanvas();
    drawReference();
    drawGrid();
  }
});

bindCanvas();
renderHome();
</script>
</body>
</html>
