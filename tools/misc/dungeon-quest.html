<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="description" content="Dungeon Quest — a free, browser-based productivity tool from Korb Engineering. No signup, no downloads, works on mobile.">
<title>Dungeon Quest - Korb Engineering</title>
<script src="../../vendor/peerjs-1.5.4.min.js"></script>
<style>
@import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@300;400;500;700&family=Cinzel:wght@400;700;900&family=Cinzel+Decorative:wght@400;700;900&display=swap');

*{margin:0;padding:0;box-sizing:border-box}
:root{
--bg:#050a0f;--bg2:#0a1118;--bg3:#0f1922;--bg4:#142230;
--cyan:#00d4ff;--cyan2:#00a8cc;--cyan-dim:rgba(0,212,255,.15);
--fire:#ff6600;--fire2:#ff4400;--heal:#10b981;--heal2:#059669;
--gold:#ffd700;--purple:#a855f7;--red:#ef4444;--white:#e8f0f8;
--text:#b0c4d8;--text-dim:#607080;
--font-ui:'JetBrains Mono',monospace;--font-title:'Cinzel Decorative',serif;--font-heading:'Cinzel',serif;
}
html,body{height:100%;overflow:hidden;background:var(--bg);color:var(--text);font-family:var(--font-ui);font-size:14px}
::-webkit-scrollbar{width:6px}::-webkit-scrollbar-track{background:var(--bg2)}::-webkit-scrollbar-thumb{background:var(--bg4);border-radius:3px}::-webkit-scrollbar-thumb:hover{background:var(--cyan2)}
button{font-family:var(--font-ui);cursor:pointer;border:1px solid var(--cyan2);background:var(--bg3);color:var(--cyan);padding:8px 16px;border-radius:4px;transition:all .2s;font-size:16px;min-height:44px}
button:hover{background:var(--cyan-dim);box-shadow:0 0 10px rgba(0,212,255,.2)}
button:disabled{opacity:.4;cursor:not-allowed}
button.primary{background:rgba(0,212,255,.15);border-color:var(--cyan)}
button.danger{border-color:var(--red);color:var(--red)}button.danger:hover{background:rgba(239,68,68,.15)}
input,select{font-family:var(--font-ui);background:var(--bg2);border:1px solid var(--bg4);color:var(--white);padding:8px 12px;border-radius:4px;font-size:16px;outline:none}
input:focus,select:focus{border-color:var(--cyan);box-shadow:0 0 8px rgba(0,212,255,.2)}
select option{background:var(--bg2);color:var(--white)}

.screen{display:none;position:absolute;inset:0;overflow:hidden}
.screen.active{display:flex}

/* TITLE SCREEN */
#title-screen{flex-direction:column;align-items:center;justify-content:center;gap:30px;background:radial-gradient(ellipse at 50% 30%,rgba(0,212,255,.06) 0%,var(--bg) 70%)}
#title-screen h1{font-family:var(--font-title);font-size:clamp(2rem,5vw,4rem);color:var(--cyan);text-shadow:0 0 30px rgba(0,212,255,.5),0 0 60px rgba(0,212,255,.2);animation:titleGlow 3s ease-in-out infinite alternate;letter-spacing:4px}
@keyframes titleGlow{0%{text-shadow:0 0 20px rgba(0,212,255,.4),0 0 40px rgba(0,212,255,.15)}100%{text-shadow:0 0 40px rgba(0,212,255,.7),0 0 80px rgba(0,212,255,.3),0 0 120px rgba(0,212,255,.1)}}
#title-screen .subtitle{font-family:var(--font-heading);color:var(--text-dim);font-size:14px;letter-spacing:6px;text-transform:uppercase}
.title-menu{display:flex;flex-direction:column;gap:12px;width:300px}
.title-menu button{padding:14px 20px;font-size:15px;font-family:var(--font-heading);letter-spacing:2px}
.title-branding{position:absolute;bottom:20px;color:var(--text-dim);font-size:11px;letter-spacing:2px;opacity:.5}

/* CHARACTER CREATION */
#char-screen{flex-direction:column;align-items:center;padding:40px 20px;overflow-y:auto}
.char-form{max-width:700px;width:100%;display:flex;flex-direction:column;gap:20px}
.char-form h2{font-family:var(--font-heading);color:var(--cyan);text-align:center;font-size:24px;margin-bottom:10px}
.form-row{display:flex;gap:16px;flex-wrap:wrap}
.form-group{flex:1;min-width:200px;display:flex;flex-direction:column;gap:6px}
.form-group label{color:var(--text-dim);font-size:16px;text-transform:uppercase;letter-spacing:1px}
.stats-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:12px}
.stat-box{background:var(--bg2);border:1px solid var(--bg4);border-radius:6px;padding:12px;text-align:center}
.stat-box .stat-name{font-size:11px;color:var(--text-dim);letter-spacing:1px}
.stat-box .stat-val{font-size:28px;font-weight:700;color:var(--cyan);font-family:var(--font-heading)}
.stat-box .stat-mod{font-size:12px;color:var(--gold)}
.portrait-canvas{width:120px;height:120px;border:2px solid var(--bg4);border-radius:8px;background:var(--bg);margin:0 auto;display:block;image-rendering:pixelated}
.equipment-preview{background:var(--bg2);border:1px solid var(--bg4);border-radius:6px;padding:16px}
.equipment-preview h4{color:var(--gold);margin-bottom:8px;font-family:var(--font-heading);font-size:13px}
.equipment-preview li{color:var(--text);font-size:12px;padding:2px 0;list-style:none}
.equipment-preview li::before{content:"- ";color:var(--text-dim)}

/* ADVENTURE SELECT */
#adventure-screen{flex-direction:column;align-items:center;padding:40px 20px;overflow-y:auto;gap:20px}
#adventure-screen h2{font-family:var(--font-heading);color:var(--cyan);font-size:24px}
.adventure-cards{display:flex;gap:20px;flex-wrap:wrap;justify-content:center;max-width:900px}
.adventure-card{background:var(--bg2);border:1px solid var(--bg4);border-radius:8px;padding:24px;width:270px;cursor:pointer;transition:all .3s}
.adventure-card:hover{border-color:var(--cyan);transform:translateY(-4px);box-shadow:0 8px 30px rgba(0,212,255,.1)}
.adventure-card h3{font-family:var(--font-heading);color:var(--gold);font-size:16px;margin-bottom:8px}
.adventure-card p{font-size:12px;color:var(--text-dim);line-height:1.6;margin-bottom:12px}
.adventure-card .meta{display:flex;justify-content:space-between;font-size:11px}
.adventure-card .meta span{color:var(--text-dim)}
.difficulty-easy{color:var(--heal) !important}.difficulty-medium{color:var(--gold) !important}.difficulty-hard{color:var(--fire) !important}

/* GAME SCREEN */
#game-screen{flex-direction:row}
.game-sidebar{width:260px;background:var(--bg2);border-right:1px solid var(--bg4);display:flex;flex-direction:column;flex-shrink:0;overflow:hidden}
.sidebar-section{border-bottom:1px solid var(--bg4);padding:12px}
.sidebar-section h3{font-family:var(--font-heading);color:var(--cyan);font-size:12px;letter-spacing:1px;margin-bottom:8px;text-transform:uppercase}
.player-entry{display:flex;align-items:center;gap:8px;padding:4px 0;font-size:12px}
.player-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0}
.player-hp-bar{height:4px;background:var(--bg4);border-radius:2px;flex:1;overflow:hidden}
.player-hp-fill{height:100%;border-radius:2px;transition:width .3s}
.char-summary{padding:12px}
.char-summary .char-name{font-family:var(--font-heading);color:var(--gold);font-size:14px}
.char-summary .char-desc{color:var(--text-dim);font-size:11px}
.mini-stats{display:grid;grid-template-columns:repeat(3,1fr);gap:4px;margin-top:8px}
.mini-stat{background:var(--bg);padding:4px;border-radius:3px;text-align:center;font-size:10px}
.mini-stat .label{color:var(--text-dim)}
.mini-stat .val{color:var(--cyan);font-weight:700}
.hp-display{margin-top:8px;display:flex;align-items:center;gap:8px}
.hp-bar-big{height:16px;background:var(--bg);border-radius:8px;flex:1;overflow:hidden;border:1px solid var(--bg4)}
.hp-fill-big{height:100%;border-radius:8px;transition:width .5s}
.hp-text{font-size:11px;color:var(--white);min-width:60px;text-align:right}
.xp-bar{height:6px;background:var(--bg);border-radius:3px;overflow:hidden;margin-top:4px;border:1px solid var(--bg4)}
.xp-fill{height:100%;background:var(--purple);border-radius:3px;transition:width .5s}
.inventory-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:4px}
.inv-slot{width:100%;aspect-ratio:1;background:var(--bg);border:1px solid var(--bg4);border-radius:4px;display:flex;align-items:center;justify-content:center;font-size:16px;cursor:pointer;position:relative}
.inv-slot:hover{border-color:var(--cyan)}
.inv-slot .inv-tooltip{display:none;position:absolute;bottom:110%;left:50%;transform:translateX(-50%);background:var(--bg3);border:1px solid var(--cyan2);padding:6px 10px;border-radius:4px;font-size:11px;white-space:nowrap;z-index:100;color:var(--white)}
.inv-slot:hover .inv-tooltip{display:block}

.game-main{flex:1;display:flex;flex-direction:column;overflow:hidden}
.game-header{padding:10px 16px;background:var(--bg2);border-bottom:1px solid var(--bg4);display:flex;justify-content:space-between;align-items:center}
.game-header .location{font-family:var(--font-heading);color:var(--gold);font-size:14px}
.game-header .room-code{font-size:12px;color:var(--cyan);cursor:pointer}
.game-header .room-code:hover{text-decoration:underline}

.narrative-area{flex:1;overflow-y:auto;padding:24px 32px}
.narrative-text{font-size:15px;line-height:1.8;color:var(--text);max-width:700px}
.narrative-text p{margin-bottom:16px}
.narrative-text .highlight{color:var(--cyan)}
.narrative-text .damage{color:var(--fire)}
.narrative-text .heal-text{color:var(--heal)}
.narrative-text .gold-text{color:var(--gold)}
.narrative-text .roll-result{display:inline-block;background:var(--bg2);border:1px solid var(--bg4);padding:2px 8px;border-radius:4px;color:var(--cyan);font-weight:700;margin:0 4px}

.choices-area{padding:16px 32px;border-top:1px solid var(--bg4);background:var(--bg2)}
.choices-area h4{color:var(--text-dim);font-size:11px;text-transform:uppercase;letter-spacing:1px;margin-bottom:8px}
.choices-list{display:flex;flex-direction:column;gap:8px}
.choice-btn{text-align:left;padding:12px 16px;font-size:13px;line-height:1.4;position:relative}
.choice-btn .req{color:var(--gold);font-size:11px;margin-top:4px;display:block}
.choice-btn .votes{position:absolute;right:12px;top:50%;transform:translateY(-50%);font-size:11px;color:var(--text-dim)}

/* COMBAT */
.combat-area{padding:20px;display:flex;flex-direction:column;gap:12px}
.combat-header{text-align:center;font-family:var(--font-heading);color:var(--fire);font-size:18px;letter-spacing:2px}
.combatants{display:flex;justify-content:space-around;align-items:center;padding:16px 0}
.combatant{text-align:center;padding:16px;background:var(--bg2);border:1px solid var(--bg4);border-radius:8px;min-width:150px}
.combatant.active{border-color:var(--cyan);box-shadow:0 0 15px rgba(0,212,255,.2)}
.combatant .c-name{font-family:var(--font-heading);color:var(--white);font-size:14px;margin-bottom:4px}
.combatant .c-hp{font-size:12px;color:var(--text-dim);margin-bottom:4px}
.combatant .c-hp-bar{height:8px;background:var(--bg);border-radius:4px;overflow:hidden}
.combatant .c-hp-fill{height:100%;border-radius:4px;transition:width .3s}
.vs-text{font-family:var(--font-heading);color:var(--fire);font-size:24px;text-shadow:0 0 10px rgba(255,102,0,.5)}
.combat-actions{display:flex;gap:8px;flex-wrap:wrap;justify-content:center}
.combat-actions button{min-width:120px}
.combat-log{max-height:150px;overflow-y:auto;background:var(--bg);border:1px solid var(--bg4);border-radius:6px;padding:10px;font-size:12px}
.combat-log p{padding:2px 0;border-bottom:1px solid rgba(255,255,255,.03)}
.log-damage{color:var(--fire)}.log-heal{color:var(--heal)}.log-info{color:var(--cyan)}.log-miss{color:var(--text-dim)}.log-crit{color:var(--gold);font-weight:700}

/* DICE */
.dice-overlay{position:fixed;inset:0;background:rgba(0,0,0,.7);display:none;align-items:center;justify-content:center;z-index:1000;flex-direction:column;gap:16px}
.dice-overlay.show{display:flex}
.dice-d20{width:100px;height:100px;background:var(--bg3);border:3px solid var(--cyan);display:flex;align-items:center;justify-content:center;font-size:36px;font-weight:900;color:var(--cyan);font-family:var(--font-heading);clip-path:polygon(50% 0%,100% 38%,82% 100%,18% 100%,0% 38%);transition:transform .1s}
.dice-d20.rolling{animation:diceRoll .1s infinite}
.dice-d20.crit{color:var(--gold);border-color:var(--gold);text-shadow:0 0 20px rgba(255,215,0,.8)}
.dice-d20.fail{color:var(--red);border-color:var(--red)}
.dice-label{font-family:var(--font-heading);color:var(--white);font-size:16px}
@keyframes diceRoll{0%{transform:rotate(0deg) scale(1)}25%{transform:rotate(90deg) scale(1.1)}50%{transform:rotate(180deg) scale(1)}75%{transform:rotate(270deg) scale(1.1)}100%{transform:rotate(360deg) scale(1)}}

/* MINIMAP */
.minimap{padding:12px}
.minimap-canvas{width:100%;height:100px;background:var(--bg);border:1px solid var(--bg4);border-radius:4px}

/* CHAT */
.chat-panel{border-top:1px solid var(--bg4);display:flex;flex-direction:column;height:180px}
.chat-messages{flex:1;overflow-y:auto;padding:8px;font-size:12px}
.chat-messages p{padding:2px 0}
.chat-messages .chat-name{font-weight:700}
.chat-input-row{display:flex;border-top:1px solid var(--bg4)}
.chat-input-row input{flex:1;border:none;border-radius:0;padding:8px}
.chat-input-row button{border:none;border-radius:0;border-left:1px solid var(--bg4);padding:8px 16px}

.game-right{width:240px;background:var(--bg2);border-left:1px solid var(--bg4);display:flex;flex-direction:column;flex-shrink:0;overflow-y:auto}

/* SCREEN SHAKE */
@keyframes shake{0%,100%{transform:translate(0)}10%{transform:translate(-4px,-2px)}20%{transform:translate(4px,2px)}30%{transform:translate(-3px,3px)}40%{transform:translate(3px,-3px)}50%{transform:translate(-2px,2px)}60%{transform:translate(2px,-2px)}70%{transform:translate(-1px,1px)}80%{transform:translate(1px,-1px)}90%{transform:translate(0)}}
.shake{animation:shake .4s ease-in-out}

/* SAVE/LOAD MODAL */
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.8);display:none;align-items:center;justify-content:center;z-index:999}
.modal-overlay.show{display:flex}
.modal{background:var(--bg2);border:1px solid var(--bg4);border-radius:8px;padding:24px;min-width:400px;max-width:500px}
.modal h3{font-family:var(--font-heading);color:var(--cyan);margin-bottom:16px}
.modal .save-slot{background:var(--bg);border:1px solid var(--bg4);padding:12px;border-radius:6px;margin-bottom:8px;cursor:pointer;display:flex;justify-content:space-between;align-items:center}
.modal .save-slot:hover{border-color:var(--cyan)}
.modal .save-slot .slot-info{font-size:12px;color:var(--text-dim)}
.modal-actions{display:flex;gap:8px;margin-top:16px;justify-content:flex-end}

/* LEVEL UP */
.level-up-overlay{position:fixed;inset:0;background:rgba(0,0,0,.8);display:none;align-items:center;justify-content:center;z-index:1001;flex-direction:column;gap:16px}
.level-up-overlay.show{display:flex}
.level-up-text{font-family:var(--font-title);font-size:36px;color:var(--gold);text-shadow:0 0 30px rgba(255,215,0,.5);animation:levelPulse 1s ease-in-out infinite alternate}
@keyframes levelPulse{0%{transform:scale(1)}100%{transform:scale(1.1)}}

/* JOIN SCREEN */
#join-screen{flex-direction:column;align-items:center;justify-content:center;gap:20px}
#join-screen h2{font-family:var(--font-heading);color:var(--cyan);font-size:24px}
.join-form{display:flex;flex-direction:column;gap:12px;width:300px}

/* RESPONSIVE */
@media(max-width:900px){.game-sidebar,.game-right{display:none}.game-main{width:100%}}

.typewriter{overflow:hidden}
.fade-in{animation:fadeIn .5s ease-in}
@keyframes fadeIn{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}
</style>
</head>
<body>

<!-- DICE OVERLAY -->
<div class="dice-overlay" id="dice-overlay">
<div class="dice-label" id="dice-label">Rolling...</div>
<div class="dice-d20" id="dice-d20">20</div>
<div class="dice-result-text" id="dice-result-text" style="color:var(--white);font-family:var(--font-heading);font-size:14px"></div>
</div>

<!-- LEVEL UP OVERLAY -->
<div class="level-up-overlay" id="levelup-overlay">
<div class="level-up-text">LEVEL UP!</div>
<div style="color:var(--white);font-family:var(--font-heading);font-size:18px" id="levelup-info"></div>
<button class="primary" onclick="closeLevelUp()">Continue</button>
</div>

<!-- SAVE/LOAD MODAL -->
<div class="modal-overlay" id="save-modal">
<div class="modal">
<h3 id="modal-title">Save Game</h3>
<div id="save-slots"></div>
<div class="modal-actions">
<button onclick="exportSave()">Export JSON</button>
<button onclick="document.getElementById('import-input').click()">Import JSON</button>
<input type="file" id="import-input" accept=".json" style="display:none" onchange="importSave(event)">
<button class="danger" onclick="closeSaveModal()">Close</button>
</div>
</div>
</div>

<!-- TITLE SCREEN -->
<div class="screen active" id="title-screen">
<h1>Dungeon Quest</h1>
<div class="subtitle">A Multiplayer Text Adventure</div>
<div class="title-menu">
<button class="primary" onclick="startNewGame()">New Adventure</button>
<button onclick="continueGame()">Continue</button>
<button onclick="showJoinScreen()">Join Game</button>
<button onclick="startMultiplayer()">Create Multiplayer Game</button>
</div>
<div class="title-branding">KORB ENGINEERING</div>
</div>

<!-- JOIN SCREEN -->
<div class="screen" id="join-screen">
<h2>Join Game</h2>
<div class="join-form">
<div class="form-group">
<label>Room Code</label>
<input type="text" id="join-code" placeholder="KORB-XXXXXX" maxlength="11" style="text-transform:uppercase;font-size:18px;text-align:center;letter-spacing:3px">
</div>
<div class="form-group">
<label>Join As</label>
<select id="join-mode">
<option value="player">Player</option>
<option value="spectator">Spectator</option>
</select>
</div>
<button class="primary" onclick="joinGame()">Join</button>
<button onclick="showScreen('title-screen')">Back</button>
</div>
</div>

<!-- CHARACTER CREATION -->
<div class="screen" id="char-screen">
<div class="char-form">
<h2>Forge Your Hero</h2>
<canvas class="portrait-canvas" id="portrait-canvas" width="120" height="120"></canvas>
<div class="form-row">
<div class="form-group">
<label>Name</label>
<input type="text" id="char-name" placeholder="Enter your name..." maxlength="20">
</div>
</div>
<div class="form-row">
<div class="form-group">
<label>Race</label>
<select id="char-race" onchange="updateCharPreview()">
<option value="human">Human</option><option value="elf">Elf</option><option value="dwarf">Dwarf</option>
<option value="halfling">Halfling</option><option value="orc">Orc</option><option value="tiefling">Tiefling</option>
</select>
</div>
<div class="form-group">
<label>Class</label>
<select id="char-class" onchange="updateCharPreview()">
<option value="warrior">Warrior</option><option value="mage">Mage</option><option value="rogue">Rogue</option>
<option value="cleric">Cleric</option><option value="ranger">Ranger</option><option value="bard">Bard</option>
</select>
</div>
</div>
<div class="stats-grid" id="stats-grid"></div>
<div style="text-align:center"><button onclick="rollAllStats()">Re-Roll Stats</button></div>
<div class="equipment-preview" id="equip-preview"></div>
<div style="display:flex;gap:12px;justify-content:center;margin-top:10px">
<button class="primary" onclick="confirmCharacter()" style="padding:14px 40px;font-size:15px">Begin Adventure</button>
<button onclick="showScreen('title-screen')">Back</button>
</div>
</div>
</div>

<!-- ADVENTURE SELECT -->
<div class="screen" id="adventure-screen">
<h2>Choose Your Adventure</h2>
<div class="adventure-cards" id="adventure-cards"></div>
<button onclick="showScreen('char-screen')" style="margin-top:10px">Back</button>
</div>

<!-- GAME SCREEN -->
<div class="screen" id="game-screen">
<div class="game-sidebar">
<div class="char-summary" id="char-panel"></div>
<div class="sidebar-section" id="players-panel" style="display:none">
<h3>Party</h3>
<div id="players-list"></div>
</div>
<div class="sidebar-section">
<h3>Inventory</h3>
<div class="inventory-grid" id="inventory-grid"></div>
</div>
<div class="sidebar-section">
<h3>Gold: <span id="gold-display">0</span></h3>
</div>
<div class="minimap">
<h3 style="font-family:var(--font-heading);color:var(--cyan);font-size:12px;letter-spacing:1px;text-transform:uppercase;margin-bottom:8px">Map</h3>
<canvas class="minimap-canvas" id="minimap-canvas" width="230" height="100"></canvas>
</div>
</div>

<div class="game-main">
<div class="game-header">
<div class="location" id="location-name">Unknown</div>
<div style="display:flex;gap:12px;align-items:center">
<span class="room-code" id="room-code-display" style="display:none" onclick="copyRoomCode()" title="Click to copy"></span>
<button onclick="openSaveModal('save')" style="font-size:11px;padding:4px 10px">Save</button>
<button onclick="openSaveModal('load')" style="font-size:11px;padding:4px 10px">Load</button>
<button onclick="toggleSound()" id="sound-btn" style="font-size:11px;padding:4px 10px">Sound: ON</button>
</div>
</div>
<div class="narrative-area" id="narrative-area">
<div class="narrative-text" id="narrative-text"></div>
</div>
<div class="choices-area" id="choices-area" style="display:none">
<h4>What do you do?</h4>

// ==================== AUDIO ENGINE ====================
const AudioEngine = {
  ctx: null,
  enabled: true,
  init() {
    if (this.ctx) return;
    this.ctx = new (window.AudioContext || window.webkitAudioContext)();
  },
  play(type) {
    if (!this.enabled || !this.ctx) return;
    try { this[type](); } catch(e) {}
  },
  note(freq, dur, type='square', vol=0.1, delay=0) {
    const c = this.ctx, o = c.createOscillator(), g = c.createGain();
    o.type = type; o.frequency.value = freq;
    g.gain.setValueAtTime(vol, c.currentTime + delay);
    g.gain.exponentialRampToValueAtTime(0.001, c.currentTime + delay + dur);
    o.connect(g); g.connect(c.destination);
    o.start(c.currentTime + delay); o.stop(c.currentTime + delay + dur);
  },
  noise(dur, vol=0.05) {
    const c = this.ctx, buf = c.createBuffer(1, c.sampleRate * dur, c.sampleRate);
    const data = buf.getChannelData(0);
    for (let i = 0; i < data.length; i++) data[i] = (Math.random() * 2 - 1) * vol;
    const src = c.createBufferSource(), g = c.createGain();
    src.buffer = buf; g.gain.setValueAtTime(vol, c.currentTime);
    g.gain.exponentialRampToValueAtTime(0.001, c.currentTime + dur);
    src.connect(g); g.connect(c.destination); src.start();
  },
  diceRoll() { for(let i=0;i<8;i++) this.noise(0.03+Math.random()*0.02, 0.08); this.note(800+Math.random()*400,0.05,'square',0.05,0.15); },
  swordSwing() { this.noise(0.15,0.1); this.note(200,0.1,'sawtooth',0.08); },
  magicCast() { for(let i=0;i<5;i++) this.note(400+i*100,0.3,'sine',0.06,i*0.05); },
  arrowLoose() { this.noise(0.1,0.06); this.note(600,0.15,'sine',0.04,0.05); },
  monsterGrowl() { this.note(80,0.5,'sawtooth',0.1); this.note(60,0.3,'sawtooth',0.08,0.1); },
  deathSound() { for(let i=0;i<4;i++) this.note(300-i*50,0.3,'sawtooth',0.06,i*0.15); },
  levelUp() { [523,659,784,1047].forEach((f,i) => this.note(f,0.3,'square',0.08,i*0.15)); },
  victory() { [523,659,784,1047,784,1047].forEach((f,i) => this.note(f,0.25,'square',0.07,i*0.12)); },
  defeat() { [400,350,300,250].forEach((f,i) => this.note(f,0.4,'sawtooth',0.08,i*0.3)); },
  doorOpen() { this.note(200,0.2,'square',0.05); this.note(300,0.2,'square',0.05,0.1); },
  chestOpen() { this.note(500,0.1,'square',0.06); this.note(700,0.1,'square',0.06,0.08); this.note(900,0.15,'square',0.06,0.16); },
  coinPickup() { this.note(1200,0.1,'square',0.05); this.note(1600,0.15,'square',0.05,0.08); },
  hit() { this.noise(0.08,0.12); this.note(150,0.1,'sawtooth',0.1); },
  heal() { this.note(523,0.2,'sine',0.06); this.note(659,0.2,'sine',0.06,0.1); this.note(784,0.3,'sine',0.06,0.2); },
  critHit() { this.noise(0.1,0.15); this.note(100,0.15,'sawtooth',0.12); this.note(800,0.2,'square',0.08,0.1); },
  miss() { this.noise(0.05,0.03); },
};

// ==================== MULTIPLAYER ====================
let peer = null;
let connections = {};
let broadcastChannel = null;

function generateRoomCode() {
  const chars = 'ABCDEFGHJKLMNPQRSTUVWXYZ23456789';
  let code = 'KORB-';
  for (let i = 0; i < 6; i++) code += chars[Math.floor(Math.random() * chars.length)];
  return code;
}

function initMultiplayer(isHost) {
  G.isMultiplayer = true;
  G.isHost = isHost;
  if (isHost) {
    G.roomCode = generateRoomCode();
    G.playerId = 'host';
  }
  const peerId = G.roomCode.replace('-','') + (isHost ? 'HOST' : G.playerId);
  try {
    peer = new Peer(peerId);
    peer.on('open', id => {
      console.log('Peer connected:', id);
      if (isHost) {
        peer.on('connection', conn => handleNewConnection(conn));
      }
    });
    peer.on('error', err => {
      console.warn('PeerJS error:', err);
      addChatMessage('System', 'Connection error: ' + err.type, '#ff6600');
    });
  } catch(e) {
    console.warn('PeerJS unavailable, using BroadcastChannel only');
  }
  broadcastChannel = new BroadcastChannel('dungeon-quest-' + G.roomCode);
  broadcastChannel.onmessage = e => handleMessage(e.data);
}

function handleNewConnection(conn) {
  conn.on('open', () => {
    connections[conn.peer] = conn;
    conn.on('data', data => handleMessage(data));
    conn.on('close', () => {
      delete connections[conn.peer];
      G.peers = G.peers.filter(p => p.peerId !== conn.peer);
      updatePlayersPanel();
    });
    conn.send({ type:'state_sync', state: getShareableState() });
  });
}

function joinGame() {
  const code = document.getElementById('join-code').value.toUpperCase().trim();
  const mode = document.getElementById('join-mode').value;
  if (!code || code.length < 10) { window.alert('Enter a valid room code'); return; }
  G.roomCode = code;
  G.playerId = 'P' + Math.random().toString(36).substr(2, 5);
  G.isMultiplayer = true;
  G.isHost = false;

  broadcastChannel = new BroadcastChannel('dungeon-quest-' + G.roomCode);
  broadcastChannel.onmessage = e => handleMessage(e.data);

  const hostPeerId = code.replace('-','') + 'HOST';
  try {
    peer = new Peer(code.replace('-','') + G.playerId);
    peer.on('open', () => {
      const conn = peer.connect(hostPeerId);
      conn.on('open', () => {
        connections['host'] = conn;
        conn.on('data', data => handleMessage(data));
        conn.send({ type:'player_join', player: { id:G.playerId, mode, name:'Adventurer' }});
      });
    });
  } catch(e) {
    broadcastChannel.postMessage({ type:'player_join', player:{ id:G.playerId, mode, name:'Adventurer' }});
  }

  if (mode === 'spectator') {
    showScreen('game-screen');
    addChatMessage('System', 'Joined as spectator. Waiting for host...', 'var(--cyan)');
  } else {
    showScreen('char-screen');
  }
}

function broadcast(msg) {
  if (broadcastChannel) broadcastChannel.postMessage(msg);
  Object.values(connections).forEach(c => { try { c.send(msg); } catch(e) {} });
}

function handleMessage(data) {
  if (!data || !data.type) return;
  switch(data.type) {
    case 'state_sync':
      if (!G.isHost && data.state) {
        if (data.state.currentNode) G.currentNode = data.state.currentNode;
        if (data.state.narrativeHTML) document.getElementById('narrative-text').innerHTML = data.state.narrativeHTML;
      }
      break;
    case 'player_join':
      if (G.isHost) {
        G.peers.push(data.player);
        updatePlayersPanel();
        addChatMessage('System', data.player.name + ' joined the game', 'var(--cyan)');
        broadcast({ type:'players_update', players:G.peers });
      }
      break;
    case 'players_update':
      if (!G.isHost) { G.peers = data.players; updatePlayersPanel(); }
      break;
    case 'chat':
      addChatMessage(data.name, data.text, data.color);
      break;
    case 'vote':
      if (G.isHost) {
        G.votes[data.playerId] = data.choice;
        checkVotes();
      }
      break;
    case 'narrative_update':
      if (!G.isHost) {
        document.getElementById('narrative-text').innerHTML = data.html;
        document.getElementById('location-name').textContent = data.location || '';
      }
      break;
    case 'combat_update':
      if (!G.isHost && data.html) {
        document.getElementById('combat-area').innerHTML = data.html;
        document.getElementById('combat-area').style.display = data.show ? '' : 'none';
      }
      break;
  }
}

function sendChat() {
  const input = document.getElementById('chat-input');
  const text = input.value.trim();
  if (!text) return;
  input.value = '';
  const name = G.player ? G.player.name : 'Anonymous';
  const color = G.player ? getClassColor(G.player.class) : 'var(--text)';
  addChatMessage(name, text, color);
  broadcast({ type:'chat', name, text, color });
}

function addChatMessage(name, text, color='var(--text)') {
  const div = document.getElementById('chat-messages');
  const p = document.createElement('p');
  p.innerHTML = `<span class="chat-name" style="color:${color}">${name}:</span> ${text}`;
  div.appendChild(p);
  div.scrollTop = div.scrollHeight;
}

function getClassColor(cls) {
  const colors = { warrior:'#ff6600', mage:'#a855f7', rogue:'#10b981', cleric:'#ffd700', ranger:'#22c55e', bard:'#ec4899' };
  return colors[cls] || 'var(--cyan)';
}

function getShareableState() {
  return { currentNode:G.currentNode, narrativeHTML: document.getElementById('narrative-text').innerHTML };
}

function checkVotes() {
  // Simple majority voting
  const counts = {};
  Object.values(G.votes).forEach(v => { counts[v] = (counts[v]||0) + 1; });
  // Need majority of connected players
  const needed = Math.ceil((G.peers.length + 1) / 2);
  for (const [choice, count] of Object.entries(counts)) {
    if (count >= needed) {
      G.votes = {};
      // Execute the majority choice
      const idx = parseInt(choice);
      if (!isNaN(idx)) executeChoice(idx);
      return;
    }
  }
}

function updatePlayersPanel() {
  const panel = document.getElementById('players-panel');
  const list = document.getElementById('players-list');
  const specPanel = document.getElementById('spectators-panel');
  const specList = document.getElementById('spectators-list');
  if (!G.isMultiplayer) { panel.style.display = 'none'; specPanel.style.display = 'none'; return; }
  panel.style.display = '';
  const players = G.peers.filter(p => p.mode !== 'spectator');
  const specs = G.peers.filter(p => p.mode === 'spectator');
  list.innerHTML = players.map(p => `
    <div class="player-entry">
      <div class="player-dot" style="background:${getClassColor(p.class||'warrior')}"></div>
      <span style="color:var(--white)">${p.name||'Unknown'}</span>
      <span style="color:var(--text-dim);font-size:10px">Lv${p.level||1}</span>
    </div>
  `).join('');
  if (specs.length > 0) {
    specPanel.style.display = '';
    specList.innerHTML = specs.map(s => `<div class="player-entry"><div class="player-dot" style="background:var(--text-dim)"></div><span>${s.name}</span></div>`).join('');
  }
}

// ==================== UTILITY ====================
function roll(sides) { return Math.floor(Math.random() * sides) + 1; }
function rollDice(str) {
  // parse "2d6+2" format
  const m = str.match(/(\d+)d(\d+)(?:\+(\d+))?/);
  if (!m) return parseInt(str)||0;
  let total = 0;
  for (let i = 0; i < parseInt(m[1]); i++) total += roll(parseInt(m[2]));
  if (m[3]) total += parseInt(m[3]);
  return total;
}
function mod(stat) { return Math.floor((stat - 10) / 2); }
function statMod(statName) { return G.player ? mod(G.player.stats[statName]) : 0; }
function clamp(v, min, max) { return Math.max(min, Math.min(max, v)); }

function showScreen(id) {
  document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
  document.getElementById(id).classList.add('active');
}

// ==================== CHARACTER CREATION ====================
let charStats = {};

function rollStat() { const rolls = [roll(6),roll(6),roll(6),roll(6)].sort((a,b)=>b-a); return rolls[0]+rolls[1]+rolls[2]; }

function rollAllStats() {
  AudioEngine.init(); AudioEngine.play('diceRoll');
  const stats = ['STR','DEX','CON','INT','WIS','CHA'];
  const race = document.getElementById('char-race').value;
  const bonus = RACES[race].bonus;
  charStats = {};
  stats.forEach(s => {
    charStats[s] = rollStat() + (bonus[s]||0);
  });
  renderStats();
  updateCharPreview();
}

function renderStats() {

  grid.innerHTML = '';
  ['STR','DEX','CON','INT','WIS','CHA'].forEach(s => {

    const m = mod(v);

    div.className = 'stat-box';
    div.innerHTML = `<div class="stat-name">${s}</div><div class="stat-val">${v}</div><div class="stat-mod">${m>=0?'+':''}${m}</div>`;
    grid.appendChild(div);
  });
}

function updateCharPreview() {
  const cls = document.getElementById('char-class').value;
  const race = document.getElementById('char-race').value;

  drawPortrait(race, cls);
}

function drawPortrait(race, cls) {
  const c = document.getElementById('portrait-canvas');
  const ctx = c.getContext('2d');
  ctx.imageSmoothingEnabled = false;
  const W = 120, H = 120;
  ctx.clearRect(0,0,W,H);

  // Background
  ctx.fillStyle = '#1a1a2e';
  ctx.fillRect(0,0,W,H);

  const skin = RACES[race].color;
  const classColors = { warrior:'#cc4444', mage:'#6644cc', rogue:'#44aa44', cleric:'#cccc44', ranger:'#44cc44', bard:'#cc44aa' };
  const clothColor = classColors[cls] || '#666';

  // Body
  ctx.fillStyle = clothColor;
  ctx.fillRect(40,65,40,35);

  // Head
  ctx.fillStyle = skin;
  const headW = race === 'orc' ? 36 : race === 'halfling' ? 24 : 30;
  const headH = race === 'dwarf' ? 26 : race === 'elf' ? 32 : 28;
  ctx.fillRect(60-headW/2, 30, headW, headH);

  // Eyes
  ctx.fillStyle = race === 'tiefling' ? '#ff4444' : '#fff';
  ctx.fillRect(50,40,6,4);
  ctx.fillRect(64,40,6,4);
  ctx.fillStyle = '#000';
  ctx.fillRect(52,41,3,2);
  ctx.fillRect(66,41,3,2);

  // Race features
  if (race === 'elf') {
    ctx.fillStyle = skin;
    ctx.beginPath(); ctx.moveTo(44,36); ctx.lineTo(38,30); ctx.lineTo(44,40); ctx.fill();
    ctx.beginPath(); ctx.moveTo(76,36); ctx.lineTo(82,30); ctx.lineTo(76,40); ctx.fill();
  } else if (race === 'dwarf') {
    ctx.fillStyle = '#8B4513';
    ctx.fillRect(46,48,28,12); // beard
  } else if (race === 'tiefling') {
    ctx.fillStyle = '#880000';
    ctx.beginPath(); ctx.moveTo(50,30); ctx.lineTo(46,18); ctx.lineTo(54,28); ctx.fill();
    ctx.beginPath(); ctx.moveTo(70,30); ctx.lineTo(74,18); ctx.lineTo(66,28); ctx.fill();
  } else if (race === 'orc') {
    ctx.fillStyle = '#fff';
    ctx.fillRect(52,50,4,4); ctx.fillRect(64,50,4,4); // tusks
  }

  // Class features
  if (cls === 'warrior') {
    ctx.fillStyle = '#aaa';
    ctx.fillRect(82,55,6,40); // sword
    ctx.fillRect(78,52,14,6); // hilt
  } else if (cls === 'mage') {
    ctx.fillStyle = '#8844ff';
    ctx.fillRect(84,40,4,50); // staff
    ctx.fillStyle = '#ff88ff';
    ctx.beginPath(); ctx.arc(86,38,6,0,Math.PI*2); ctx.fill(); // orb
  } else if (cls === 'rogue') {
    ctx.fillStyle = '#888';
    ctx.fillRect(80,60,3,20); ctx.fillRect(84,60,3,20); // daggers
  } else if (cls === 'cleric') {
    ctx.fillStyle = '#ffdd44';
    ctx.fillRect(84,45,4,20); ctx.fillRect(80,50,12,4); // cross
  } else if (cls === 'ranger') {
    ctx.fillStyle = '#8B4513';
    ctx.beginPath(); ctx.moveTo(86,40); ctx.lineTo(82,70); ctx.lineTo(86,55); ctx.lineTo(90,70); ctx.closePath(); ctx.fill(); // bow
  } else if (cls === 'bard') {
    ctx.fillStyle = '#8B4513';
    ctx.fillRect(82,50,8,15); // lute body
    ctx.fillRect(85,35,2,15); // lute neck
  }

  // Frame
  ctx.strokeStyle = '#00d4ff33';
  ctx.lineWidth = 2;
  ctx.strokeRect(1,1,W-2,H-2);
}

function confirmCharacter() {
  const name = document.getElementById('char-name').value.trim() || 'Adventurer';
  const race = document.getElementById('char-race').value;
  const cls = document.getElementById('char-class').value;
  if (!charStats.STR) rollAllStats();

  const classData = CLASSES[cls];
  const hp = charStats.CON + classData.hpBonus;

  G.player = {
    name, race, class: cls,
    stats: {...charStats},
    hp, maxHp: hp,
    level: 1, xp: 0, xpNext: 100,
    gold: 0,
    inventory: [],
    equipment: [...classData.equipment],
    abilities: [...classData.abilities],
    abilityCooldowns: {},
    buffs: [],
    weaponDie: classData.weaponDie,
    ac: 10 + mod(charStats.DEX) + (cls==='warrior'?4:cls==='cleric'?3:cls==='ranger'?2:cls==='rogue'?1:0),
    primaryStat: classData.primaryStat,
  };

  // Parse starting equipment into inventory
  classData.equipment.forEach(e => {
    const match = e.match(/(.+) x(\d+)/);
    if (match) { for(let i=0;i<parseInt(match[2]);i++) G.player.inventory.push(match[1]); }
    else G.player.inventory.push(e);
  });

  // Notify multiplayer
  if (G.isMultiplayer) {
    broadcast({ type:'player_info', player:{ id:G.playerId, name, race, class:cls, level:1, hp, maxHp:hp }});
  }

  showScreen('adventure-screen');
  renderAdventureCards();
}

// ==================== ADVENTURE ENGINE ====================
function selectAdventure(id) {
  G.adventure = ADVENTURES.find(a => a.id === id);
  G.currentNode = 'start';
  G.visitedNodes = [];
  showScreen('game-screen');
  updateCharPanel();
  updateInventoryGrid();
  if (G.isMultiplayer && G.roomCode) {
    const rc = document.getElementById('room-code-display');
    rc.style.display = '';
    rc.textContent = 'Room: ' + G.roomCode;
  }
  processNode('start');
}

function processNode(nodeId) {
  if (nodeId === '_title') { showScreen('title-screen'); return; }
  const node = G.adventure.nodes[nodeId];
  if (!node) { console.error('Node not found:', nodeId); return; }

  G.currentNode = nodeId;
  if (!G.visitedNodes.includes(nodeId)) G.visitedNodes.push(nodeId);

  document.getElementById('location-name').textContent = node.location || 'Unknown';
  document.getElementById('combat-area').style.display = 'none';
  document.getElementById('choices-area').style.display = 'none';

  // Apply immediate effects
  if (node.effect) applyEffect(node.effect);

  // Handle skill checks
  if (node.check && node.success) {
    performSkillCheck(node);
    return;
  }

  // Handle combat nodes
  if (node.combat) {
    typewriteText(node.text, () => {
      setTimeout(() => startCombat(node.combat.enemies, node.combat.boss, node.afterCombat), 1500);
    });
    return;
  }

  // Regular narrative node
  typewriteText(node.text, () => {
    if (node.choices && node.choices.length > 0 && !node.ending) {
      showChoices(node.choices);
    }
    // Random encounter chance (15%)
    if (!node.ending && !node.combat && Math.random() < 0.15 && G.visitedNodes.length > 2) {
      triggerRandomEncounter();
    }
  });

  updateMinimap();
  if (G.isMultiplayer && G.isHost) {
    broadcast({ type:'narrative_update', html:node.text, location:node.location });
  }
}

function performSkillCheck(node) {
  const stat = node.check.stat;
  const dc = node.check.dc;
  const bonus = statMod(stat);
  const rollVal = roll(20);
  const total = rollVal + bonus;
  const success = total >= dc;

  showDiceRoll(rollVal, `${stat} Check (DC ${dc}): ${rollVal} + ${bonus} = ${total}`, success, () => {
    let text = node.text;
    const resultText = success ? node.success : (node.failure || 'You fail.');
    text = text.replace('{result}', resultText);

    if (success && node.successEffect) applyEffect(node.successEffect);
    if (!success && node.failureEffect) {
      applyEffect(node.failureEffect);
      if (node.failureEffect.combat) {
        typewriteText(text, () => {
          setTimeout(() => startCombat(node.failureEffect.combat.enemies, node.failureEffect.combat.boss, node.afterCombat), 1000);
        });
        return;
      }
    }
    if (success && node.successEffect && node.successEffect.combat) {
      typewriteText(text, () => {
        setTimeout(() => startCombat(node.successEffect.combat.enemies, node.successEffect.combat.boss, node.afterCombat), 1000);
      });
      return;
    }

    typewriteText(text, () => {
      if (node.choices && node.choices.length > 0) showChoices(node.choices);
    });
  });
}

function applyEffect(effect) {
  if (!effect || !G.player) return;
  if (effect.gold) { G.player.gold += effect.gold; document.getElementById('gold-display').textContent = G.player.gold; }
  if (effect.xp) gainXP(effect.xp);
  if (effect.items) effect.items.forEach(item => { if(G.player.inventory.length<12) G.player.inventory.push(item); });
  if (effect.healHalf) { const missing = G.player.maxHp - G.player.hp; G.player.hp += Math.floor(missing/2); }
  if (effect.damage) G.player.hp = Math.max(1, G.player.hp - effect.damage);
  if (effect.buff) G.player.buffs.push(effect.buff);
  updateCharPanel();
  updateInventoryGrid();
}

function typewriteText(html, callback) {
  const el = document.getElementById('narrative-text');
  el.innerHTML = '';
  // Parse and display instantly for simplicity, with fade
  const div = document.createElement('div');
  div.className = 'fade-in';
  div.innerHTML = html;
  el.appendChild(div);
  const area = document.getElementById('narrative-area');
  area.scrollTop = area.scrollHeight;
  if (callback) setTimeout(callback, 600);
}

function showChoices(choices) {
  const area = document.getElementById('choices-area');
  const list = document.getElementById('choices-list');
  area.style.display = '';
  list.innerHTML = '';

  choices.forEach((choice, idx) => {
    const btn = document.createElement('button');
    btn.className = 'choice-btn';
    let canChoose = true;
    let reqText = '';

    if (choice.requires && !G.player.inventory.includes(choice.requires) && !G.player.buffs.includes(choice.requires)) {
      canChoose = false;
      reqText = `Requires: ${choice.requires}`;
    }
    if (choice.requires_gold && G.player.gold < choice.requires_gold) {
      canChoose = false;
      reqText = `Requires: ${choice.requires_gold} gold`;
    }
    if (choice.check) {
      reqText = `[${choice.check.stat} DC ${choice.check.dc}]`;
    }

    btn.innerHTML = `${choice.text}${reqText ? `<span class="req">${reqText}</span>` : ''}`;
    btn.disabled = !canChoose;

    if (canChoose) {
      btn.onclick = () => {
        if (G.isMultiplayer && !G.isHost) {
          broadcast({ type:'vote', playerId:G.playerId, choice:idx });
          btn.style.borderColor = 'var(--gold)';
          btn.innerHTML += '<span class="votes">Voted!</span>';
          return;
        }
        executeChoice(idx);
      };
    }
    list.appendChild(btn);
  });
}

function executeChoice(idx) {
  const node = G.adventure.nodes[G.currentNode];
  if (!node || !node.choices || !node.choices[idx]) return;
  const choice = node.choices[idx];
  document.getElementById('choices-area').style.display = 'none';

  if (choice.requires_gold) {
    G.player.gold -= choice.requires_gold;
    document.getElementById('gold-display').textContent = G.player.gold;
  }

  const nextNode = G.adventure.nodes[choice.next];
  if (nextNode && nextNode.check && !choice.check) {
    processNode(choice.next);
  } else if (choice.check) {
    // Skill check on the choice itself
    const stat = choice.check.stat;
    const dc = choice.check.dc;
    const bonus = statMod(stat);
    const rollVal = roll(20);
    const total = rollVal + bonus;
    const success = total >= dc;
    showDiceRoll(rollVal, `${stat} Check (DC ${dc}): ${rollVal} + ${bonus} = ${total}`, success, () => {
      processNode(choice.next);
    });
  } else {
    processNode(choice.next);
  }
}

function triggerRandomEncounter() {
  if (G.combatState) return;
  if (Math.random() > 0.5) return; // 50% of the 15% = ~7.5% actual chance
  const enc = RANDOM_ENCOUNTERS[Math.floor(Math.random() * RANDOM_ENCOUNTERS.length)];
  const currentNode = G.currentNode;
  appendNarrative(`<p class="damage" style="margin-top:16px;font-weight:700">${enc.text}</p>`);
  setTimeout(() => startCombat(enc.enemies, false, currentNode), 1500);
}

function appendNarrative(html) {
  const el = document.getElementById('narrative-text');
  const div = document.createElement('div');
  div.className = 'fade-in';
  div.innerHTML = html;
  el.appendChild(div);
  document.getElementById('narrative-area').scrollTop = document.getElementById('narrative-area').scrollHeight;
}

// ==================== COMBAT SYSTEM ====================
function startCombat(enemyIds, isBoss, afterNode) {
  AudioEngine.init();
  AudioEngine.play('monsterGrowl');

  const enemies = enemyIds.map((id, idx) => {
    const template = MONSTERS[id];
    if (!template) return null;
    const levelScale = 1 + (G.player.level - 1) * 0.15;
    return {
      id: id + '_' + idx,
      ...template,
      hp: Math.floor(template.hp * levelScale),
      maxHp: Math.floor(template.hp * levelScale),
      currentHp: Math.floor(template.hp * levelScale),
      atk: Math.floor(template.atk * levelScale),
      buffs: [],
      poisonTurns: 0,
      stunned: false,
    };
  }).filter(Boolean);

  // Initiative
  const playerInit = roll(20) + mod(G.player.stats.DEX);
  const enemyInit = roll(20) + (enemies[0]?.atk || 0);

  G.combatState = {
    enemies,
    playerTurn: playerInit >= enemyInit,
    turn: 1,
    log: [],
    afterNode: afterNode,
    isBoss: isBoss,
    playerBuffs: [],
    fled: false,
  };

  document.getElementById('choices-area').style.display = 'none';
  document.getElementById('combat-area').style.display = '';
  renderCombat();

  addCombatLog(`Combat begins! ${playerInit >= enemyInit ? 'You act first!' : 'Enemies act first!'}`, 'log-info');

  if (!G.combatState.playerTurn) {
    setTimeout(enemyTurn, 1000);
  }
}

function renderCombat() {
  const cs = G.combatState;
  if (!cs) return;
  const area = document.getElementById('combat-area');
  const p = G.player;
  const alive = cs.enemies.filter(e => e.currentHp > 0);

  let html = `<div class="combat-header">COMBAT - Turn ${cs.turn}</div>`;
  html += '<div class="combatants">';
  html += `<div class="combatant ${cs.playerTurn?'active':''}">
    <div class="c-name" style="color:${getClassColor(p.class)}">${p.name}</div>
    <div class="c-hp">HP: ${p.hp}/${p.maxHp}</div>
    <div class="c-hp-bar"><div class="c-hp-fill" style="width:${(p.hp/p.maxHp)*100}%;background:${hpColor(p.hp/p.maxHp)}"></div></div>
  </div>`;
  html += '<div class="vs-text">VS</div>';
  alive.forEach(e => {
    html += `<div class="combatant ${!cs.playerTurn?'active':''}">
      <div class="c-name">${e.emoji} ${e.name}</div>
      <div class="c-hp">HP: ${e.currentHp}/${e.maxHp}</div>
      <div class="c-hp-bar"><div class="c-hp-fill" style="width:${(e.currentHp/e.maxHp)*100}%;background:${hpColor(e.currentHp/e.maxHp)}"></div></div>
      ${e.stunned ? '<div style="color:var(--gold);font-size:10px">STUNNED</div>' : ''}
    </div>`;
  });
  html += '</div>';

  if (cs.playerTurn) {
    html += '<div class="combat-actions">';
    html += '<button onclick="combatAttack()">Attack</button>';
    html += '<button onclick="combatDefend()">Defend</button>';
    p.abilities.forEach(a => {
      const cd = p.abilityCooldowns[a] || 0;
      html += `<button onclick="combatAbility('${a}')" ${cd>0?'disabled':''}>${a}${cd>0?' ('+cd+')':''}</button>`;
    });
    html += '<button onclick="combatUseItem()">Use Item</button>';
    html += '<button onclick="combatFlee()">Flee</button>';
    html += '</div>';
  } else {
    html += '<div style="text-align:center;color:var(--text-dim);padding:8px">Enemy turn...</div>';
  }

  html += '<div class="combat-log" id="combat-log">';
  cs.log.slice(-10).forEach(l => { html += `<p class="${l.cls}">${l.text}</p>`; });
  html += '</div>';

  area.innerHTML = html;
}

function addCombatLog(text, cls='') {
  if (!G.combatState) return;
  G.combatState.log.push({ text, cls });
  renderCombat();
}

function hpColor(pct) {
  if (pct > 0.6) return 'var(--heal)';
  if (pct > 0.3) return 'var(--gold)';
  return 'var(--red)';
}

function getTarget() {
  const alive = G.combatState.enemies.filter(e => e.currentHp > 0);
  return alive.length > 0 ? alive[0] : null;
}

function combatAttack() {
  if (!G.combatState || !G.combatState.playerTurn) return;
  const target = getTarget();
  if (!target) return;

  const atkRoll = roll(20);
  const primaryMod = statMod(G.player.primaryStat);
  const total = atkRoll + primaryMod;
  const isCrit = atkRoll === 20;
  const isMiss = atkRoll === 1;

  showDiceRoll(atkRoll, `Attack Roll: ${atkRoll} + ${primaryMod}`, total >= target.ac || isCrit, () => {
    if (isMiss) {
      AudioEngine.play('miss');
      addCombatLog(`Critical miss! You fumble your attack!`, 'log-miss');
    } else if (isCrit || total >= target.ac) {
      let dmg = rollDice('1d' + G.player.weaponDie) + primaryMod;
      if (isCrit) { dmg *= 2; AudioEngine.play('critHit'); shakeScreen(); }
      else AudioEngine.play('swordSwing');
      // Check for guaranteed crit buff
      const critBuff = G.combatState.playerBuffs.find(b => b.crit);
      if (critBuff) { dmg *= 2; G.combatState.playerBuffs = G.combatState.playerBuffs.filter(b => !b.crit); }
      dmg = Math.max(1, dmg);
      target.currentHp -= dmg;
      AudioEngine.play('hit');
      addCombatLog(`${isCrit?'CRITICAL HIT! ':''}You deal ${dmg} damage to ${target.name}!`, isCrit?'log-crit':'log-damage');
    } else {
      AudioEngine.play('miss');
      addCombatLog(`Miss! (${total} vs AC ${target.ac})`, 'log-miss');
    }
    endPlayerTurn();
  });
}

function combatDefend() {
  if (!G.combatState || !G.combatState.playerTurn) return;
  G.combatState.playerBuffs.push({ ac:4, dur:1 });
  addCombatLog('You take a defensive stance. (+4 AC this turn)', 'log-info');
  AudioEngine.play('miss');
  endPlayerTurn();
}

function combatAbility(name) {
  if (!G.combatState || !G.combatState.playerTurn) return;
  const info = ABILITY_INFO[name];
  if (!info) return;
  const target = getTarget();

  // Set cooldown
  G.player.abilityCooldowns[name] = 3;

  AudioEngine.play(info.sound || 'magicCast');

  if (info.type === 'buff' || info.type === 'debuff') {
    if (info.buff) G.combatState.playerBuffs.push({...info.buff});
    if (info.stun && target) {
      target.stunned = true;
      addCombatLog(`${name}! ${target.name} is stunned!`, 'log-info');
    } else {
      addCombatLog(`${name}! ${info.desc}`, 'log-info');
    }
    endPlayerTurn();
    return;
  }

  if (info.type === 'heal') {
    const healAmt = rollDice('2d6') + Math.abs(statMod(G.player.primaryStat));
    G.player.hp = Math.min(G.player.maxHp, G.player.hp + healAmt);
    AudioEngine.play('heal');
    addCombatLog(`${name}! You heal for ${healAmt} HP!`, 'log-heal');
    updateCharPanel();
    endPlayerTurn();
    return;
  }

  if (!target) { endPlayerTurn(); return; }

  if (info.autoHit) {
    const dmg = rollDice('1d' + G.player.weaponDie) + info.dmgMod;
    target.currentHp -= Math.max(1, dmg);
    addCombatLog(`${name}! Auto-hit for ${dmg} damage!`, 'log-damage');
    if (info.poison) target.poisonTurns = info.poison.dur;
    endPlayerTurn();
    return;
  }

  const atkRoll = roll(20);
  const primaryMod = statMod(G.player.primaryStat);
  const total = atkRoll + primaryMod + 2; // ability bonus
  const isCrit = atkRoll === 20;

  showDiceRoll(atkRoll, `${name}: ${atkRoll} + ${primaryMod+2}`, total >= target.ac || isCrit, () => {
    if (atkRoll === 1) {
      addCombatLog(`${name} fizzles! Critical fail!`, 'log-miss');
    } else if (isCrit || total >= target.ac) {
      let dmg = rollDice('1d' + G.player.weaponDie) + info.dmgMod + primaryMod;
      if (isCrit) { dmg *= 2; shakeScreen(); }
      target.currentHp -= Math.max(1, dmg);
      addCombatLog(`${isCrit?'CRITICAL! ':''}${name} deals ${dmg} damage!`, isCrit?'log-crit':'log-damage');
      if (info.stun) { target.stunned = true; addCombatLog(`${target.name} is stunned!`, 'log-info'); }
      if (info.poison) { target.poisonTurns = info.poison.dur; addCombatLog(`${target.name} is poisoned!`, 'log-damage'); }
    } else {
      addCombatLog(`${name} misses! (${total} vs AC ${target.ac})`, 'log-miss');
    }
    endPlayerTurn();
  });
}

function combatUseItem() {
  if (!G.combatState || !G.combatState.playerTurn) return;
  const potionIdx = G.player.inventory.findIndex(i => i === 'Health Potion' || i === 'Mana Potion' || i === 'Healing Herb');
  if (potionIdx === -1) { addCombatLog('No usable items!', 'log-miss'); return; }

  const item = G.player.inventory[potionIdx];
  const itemData = ITEMS[item];
  G.player.inventory.splice(potionIdx, 1);

  if (itemData && itemData.effect === 'heal') {
    G.player.hp = Math.min(G.player.maxHp, G.player.hp + (itemData.value || 10));
    AudioEngine.play('heal');
    addCombatLog(`Used ${item}! Restored ${itemData.value} HP!`, 'log-heal');
  }
  updateCharPanel();
  updateInventoryGrid();
  endPlayerTurn();
}

function combatFlee() {
  if (!G.combatState || !G.combatState.playerTurn) return;
  const smokeIdx = G.player.inventory.findIndex(i => i === 'Smoke Bomb');
  const fleeRoll = roll(20) + mod(G.player.stats.DEX);

  if (smokeIdx !== -1) {
    G.player.inventory.splice(smokeIdx, 1);
    updateInventoryGrid();
    addCombatLog('Used Smoke Bomb! Escaped successfully!', 'log-info');
    endCombat(false, true);
    return;
  }

  if (fleeRoll >= 12) {
    addCombatLog(`Fled successfully! (rolled ${fleeRoll})`, 'log-info');
    endCombat(false, true);
  } else {
    addCombatLog(`Failed to flee! (rolled ${fleeRoll}, needed 12)`, 'log-miss');
    endPlayerTurn();
  }
}

function endPlayerTurn() {
  if (!G.combatState) return;

  // Check enemy deaths
  G.combatState.enemies.forEach(e => {
    if (e.currentHp <= 0 && !e.dead) {
      e.dead = true;
      AudioEngine.play('deathSound');
      addCombatLog(`${e.name} has been slain!`, 'log-info');
      // Loot
      if (e.loot) {
        e.loot.forEach(l => {
          if (l.startsWith('Gold:')) {
            const range = l.replace('Gold:','').split('-');
            const gold = Math.floor(Math.random()*(parseInt(range[1])-parseInt(range[0])+1))+parseInt(range[0]);
            G.player.gold += gold;
            addCombatLog(`Found ${gold} gold!`, 'log-info');
          } else if (G.player.inventory.length < 12 && Math.random() < 0.4) {
            G.player.inventory.push(l);
            addCombatLog(`Found ${l}!`, 'log-info');
            AudioEngine.play('chestOpen');
          }
        });
      }
      gainXP(e.xp);
    }
  });

  // Reduce cooldowns
  Object.keys(G.player.abilityCooldowns).forEach(k => {
    if (G.player.abilityCooldowns[k] > 0) G.player.abilityCooldowns[k]--;
  });

  // Reduce player buff durations
  G.combatState.playerBuffs = G.combatState.playerBuffs.filter(b => {
    if (b.dur !== undefined) { b.dur--; return b.dur > 0; }
    return true;
  });

  // Check win
  if (G.combatState.enemies.every(e => e.currentHp <= 0)) {
    endCombat(true);
    return;
  }

  G.combatState.playerTurn = false;
  G.combatState.turn++;
  renderCombat();
  setTimeout(enemyTurn, 1000);
}

function enemyTurn() {
  if (!G.combatState) return;
  const alive = G.combatState.enemies.filter(e => e.currentHp > 0);
  if (alive.length === 0) { endCombat(true); return; }

  alive.forEach(enemy => {
    if (enemy.stunned) {
      addCombatLog(`${enemy.name} is stunned and can't act!`, 'log-info');
      enemy.stunned = false;
      return;
    }

    // Poison tick
    if (enemy.poisonTurns > 0) {
      enemy.currentHp -= 3;
      enemy.poisonTurns--;
      addCombatLog(`${enemy.name} takes 3 poison damage!`, 'log-damage');
    }

    // Enemy special abilities
    if (enemy.special === 'regen' && enemy.currentHp > 0) {
      const regen = Math.min(5, enemy.maxHp - enemy.currentHp);
      enemy.currentHp += regen;
      if (regen > 0) addCombatLog(`${enemy.name} regenerates ${regen} HP!`, 'log-heal');
    }

    if (enemy.currentHp <= 0) return;

    // AI behavior
    const atkRoll = roll(20);
    const playerAC = G.player.ac + G.combatState.playerBuffs.reduce((sum,b) => sum + (b.ac||0), 0);
    const total = atkRoll + enemy.atk;
    const isCrit = atkRoll === 20;

    if (atkRoll === 1) {
      addCombatLog(`${enemy.name} fumbles its attack!`, 'log-miss');
    } else if (isCrit || total >= playerAC) {
      let dmg = rollDice(enemy.dmg || '1d6');
      if (isCrit) { dmg *= 2; shakeScreen(); }

      // Check divine shield
      const shieldBuff = G.combatState.playerBuffs.find(b => b.shield);
      if (shieldBuff) {
        const absorbed = Math.min(shieldBuff.shield, dmg);
        shieldBuff.shield -= absorbed;
        dmg -= absorbed;
        if (shieldBuff.shield <= 0) G.combatState.playerBuffs = G.combatState.playerBuffs.filter(b => !b.shield);
        if (absorbed > 0) addCombatLog(`Divine Shield absorbs ${absorbed} damage!`, 'log-info');
      }

      // Check fire resistance
      if (enemy.special === 'breath' && G.player.buffs.includes('fire_resist')) {
        dmg = Math.floor(dmg / 2);
        addCombatLog('Fire resistance halves the damage!', 'log-info');
      }

      dmg = Math.max(0, dmg);
      G.player.hp -= dmg;
      AudioEngine.play('hit');
      addCombatLog(`${isCrit?'CRITICAL! ':''}${enemy.name} deals ${dmg} damage to you!`, isCrit?'log-crit':'log-damage');
    } else {
      AudioEngine.play('miss');
      addCombatLog(`${enemy.name} misses! (${total} vs AC ${playerAC})`, 'log-miss');
    }
  });

  // Check player death
  if (G.player.hp <= 0) {
    G.player.hp = 0;
    updateCharPanel();
    addCombatLog('You have fallen!', 'log-damage');
    AudioEngine.play('defeat');
    endCombat(false, false);
    return;
  }

  updateCharPanel();
  G.combatState.playerTurn = true;
  renderCombat();
}

function endCombat(victory, fled=false) {
  if (!G.combatState) return;
  const afterNode = G.combatState.afterNode;

  setTimeout(() => {
    document.getElementById('combat-area').style.display = 'none';
    G.combatState = null;

    if (victory) {
      AudioEngine.play('victory');
      appendNarrative('<p class="heal-text" style="font-weight:700">Victory! All enemies defeated.</p>');
      updateCharPanel();
      updateInventoryGrid();
      if (afterNode) setTimeout(() => processNode(afterNode), 1500);
    } else if (fled) {
      appendNarrative('<p style="color:var(--text-dim)">You flee from combat!</p>');
      if (afterNode) {
        // Go back to same node for choices
        const node = G.adventure.nodes[afterNode];
        if (node && node.choices) setTimeout(() => showChoices(node.choices), 500);
      }
    } else {
      // Death
      appendNarrative('<p class="damage" style="font-size:18px;font-family:var(--font-heading);text-align:center">YOU HAVE DIED</p><p style="text-align:center;color:var(--text-dim)">Your adventure ends here...</p>');
      setTimeout(() => {
        const area = document.getElementById('choices-area');
        const list = document.getElementById('choices-list');
        area.style.display = '';
        list.innerHTML = '<button class="primary" onclick="respawnPlayer()">Respawn (lose half gold)</button><button onclick="showScreen(\'title-screen\')">Return to Title</button>';
      }, 2000);
    }
  }, 1000);
}

function respawnPlayer() {
  G.player.hp = Math.floor(G.player.maxHp / 2);
  G.player.gold = Math.floor(G.player.gold / 2);
  updateCharPanel();
  document.getElementById('choices-area').style.display = 'none';
  // Go back to last safe node
  const safeNode = G.visitedNodes.filter(n => !G.adventure.nodes[n]?.combat).pop() || 'start';
  processNode(safeNode);
}

// ==================== XP & LEVELING ====================
function gainXP(amount) {
  if (!G.player) return;
  G.player.xp += amount;
  addChatMessage('System', `+${amount} XP`, 'var(--purple)');

  while (G.player.xp >= G.player.xpNext && G.player.level < 10) {
    G.player.xp -= G.player.xpNext;
    G.player.level++;
    G.player.xpNext = Math.floor(G.player.xpNext * 1.5);

    // Level up bonuses
    const hpGain = roll(CLASSES[G.player.class].hpBonus) + mod(G.player.stats.CON);
    G.player.maxHp += hpGain;
    G.player.hp = G.player.maxHp;

    // Stat boost
    const primary = CLASSES[G.player.class].primaryStat;
    G.player.stats[primary] += 1;

    AudioEngine.play('levelUp');
    showLevelUp(hpGain);
  }
  updateCharPanel();
}

function showLevelUp(hpGain) {
  const overlay = document.getElementById('levelup-overlay');
  document.getElementById('levelup-info').textContent = `Level ${G.player.level}! +${hpGain} HP!`;
  overlay.classList.add('show');
}

function closeLevelUp() {
  document.getElementById('levelup-overlay').classList.remove('show');
}

// ==================== DICE ANIMATION ====================
function showDiceRoll(result, label, success, callback) {
  AudioEngine.init();
  AudioEngine.play('diceRoll');
  const overlay = document.getElementById('dice-overlay');
  const die = document.getElementById('dice-d20');
  const lbl = document.getElementById('dice-label');
  const res = document.getElementById('dice-result-text');

  overlay.classList.add('show');
  die.classList.add('rolling');
  die.classList.remove('crit','fail');
  lbl.textContent = 'Rolling...';
  res.textContent = '';

  let ticks = 0;
  const interval = setInterval(() => {
    die.textContent = roll(20);
    ticks++;
    if (ticks > 15) {
      clearInterval(interval);
      die.classList.remove('rolling');
      die.textContent = result;
      if (result === 20) die.classList.add('crit');
      else if (result === 1) die.classList.add('fail');
      lbl.textContent = label;
      res.textContent = success ? 'SUCCESS!' : 'FAILURE!';
      res.style.color = success ? 'var(--heal)' : 'var(--red)';

      setTimeout(() => {
        overlay.classList.remove('show');
        if (callback) callback();
      }, 1200);
    }
  }, 60);
}

function shakeScreen() {
  document.getElementById('game-screen').classList.add('shake');
  setTimeout(() => document.getElementById('game-screen').classList.remove('shake'), 400);
}

// ==================== UI UPDATES ====================
function updateCharPanel() {
  if (!G.player) return;
  const p = G.player;
  const panel = document.getElementById('char-panel');
  panel.innerHTML = `
    <div class="char-name">${p.name}</div>
    <div class="char-desc">Lv${p.level} ${RACES[p.race].name} ${CLASSES[p.class].name}</div>
    <div class="mini-stats">
      ${['STR','DEX','CON','INT','WIS','CHA'].map(s => `<div class="mini-stat"><div class="label">${s}</div><div class="val">${p.stats[s]}</div></div>`).join('')}
    </div>
    <div class="hp-display">
      <span style="font-size:11px;color:var(--red)">HP</span>
      <div class="hp-bar-big"><div class="hp-fill-big" style="width:${(p.hp/p.maxHp)*100}%;background:${hpColor(p.hp/p.maxHp)}"></div></div>
      <span class="hp-text">${p.hp}/${p.maxHp}</span>
    </div>
    <div class="xp-bar"><div class="xp-fill" style="width:${(p.xp/p.xpNext)*100}%"></div></div>
    <div style="font-size:10px;color:var(--text-dim);margin-top:2px">XP: ${p.xp}/${p.xpNext}</div>
  `;
  document.getElementById('gold-display').textContent = p.gold;
}

function updateInventoryGrid() {
  if (!G.player) return;
  const grid = document.getElementById('inventory-grid');
  grid.innerHTML = '';
  for (let i = 0; i < 12; i++) {
    const slot = document.createElement('div');
    slot.className = 'inv-slot';
    if (G.player.inventory[i]) {
      const itemName = G.player.inventory[i];
      const itemData = ITEMS[itemName];
      slot.textContent = itemData ? itemData.emoji : '?';
      slot.innerHTML += `<div class="inv-tooltip">${itemName}${itemData?' - '+itemData.desc:''}</div>`;
      slot.onclick = () => useInventoryItem(i);
    }
    grid.appendChild(slot);
  }
}

function useInventoryItem(idx) {
  if (!G.player || !G.player.inventory[idx]) return;
  const item = G.player.inventory[idx];
  const data = ITEMS[item];
  if (!data) return;

  if (data.type === 'consumable' && !G.combatState) {
    if (data.effect === 'heal') {
      G.player.hp = Math.min(G.player.maxHp, G.player.hp + (data.value||10));
      AudioEngine.play('heal');
      addChatMessage('System', `Used ${item}. Restored ${data.value} HP!`, 'var(--heal)');
    }
    G.player.inventory.splice(idx, 1);
    updateCharPanel();
    updateInventoryGrid();
  } else if (data.type === 'junk' || data.type === 'material') {
    G.player.gold += (data.value || 0);
    addChatMessage('System', `Sold ${item} for ${data.value} gold.`, 'var(--gold)');
    AudioEngine.play('coinPickup');
    G.player.inventory.splice(idx, 1);
    updateCharPanel();
    updateInventoryGrid();
  }
}

function updateMinimap() {
  const canvas = document.getElementById('minimap-canvas');
  if (!canvas || !G.adventure) return;
  const ctx = canvas.getContext('2d');
  const W = canvas.width, H = canvas.height;
  ctx.clearRect(0,0,W,H);
  ctx.fillStyle = '#0a1118';
  ctx.fillRect(0,0,W,H);

  const nodes = Object.keys(G.adventure.nodes);
  const cols = Math.ceil(Math.sqrt(nodes.length));
  const rows = Math.ceil(nodes.length / cols);
  const cellW = W / cols, cellH = H / rows;

  nodes.forEach((key, i) => {
    const col = i % cols, row = Math.floor(i / cols);
    const x = col * cellW + cellW/2, y = row * cellH + cellH/2;
    const visited = G.visitedNodes.includes(key);
    const current = G.currentNode === key;

    ctx.beginPath();
    ctx.arc(x, y, current ? 6 : 4, 0, Math.PI*2);
    ctx.fillStyle = current ? '#00d4ff' : visited ? '#10b981' : '#1f2937';
    ctx.fill();
    if (current) {
      ctx.strokeStyle = '#00d4ff';
      ctx.lineWidth = 2;
      ctx.stroke();
    }

    // Draw connections
    const node = G.adventure.nodes[key];
    if (node.choices) {
      node.choices.forEach(c => {
        const targetIdx = nodes.indexOf(c.next);
        if (targetIdx >= 0) {
          const tx = (targetIdx % cols) * cellW + cellW/2;
          const ty = Math.floor(targetIdx / cols) * cellH + cellH/2;
          ctx.beginPath();
          ctx.moveTo(x,y);
          ctx.lineTo(tx,ty);
          ctx.strokeStyle = visited ? '#10b98133' : '#1f293722';
          ctx.lineWidth = 1;
          ctx.stroke();
        }
      });
    }
  });
}

// ==================== SAVE SYSTEM ====================
function autoSave() {
  if (!G.player || !G.adventure) return;
  const save = {
    player: G.player,
    adventureId: G.adventure.id,
    currentNode: G.currentNode,
    visitedNodes: G.visitedNodes,
    timestamp: Date.now(),
  };
  localStorage.setItem('korb_dq_autosave', JSON.stringify(save));
}

function openSaveModal(mode) {
  const modal = document.getElementById('save-modal');
  const title = document.getElementById('modal-title');
  const slots = document.getElementById('save-slots');
  title.textContent = mode === 'save' ? 'Save Game' : 'Load Game';
  modal.classList.add('show');

  slots.innerHTML = '';
  for (let i = 0; i < 3; i++) {
    const data = localStorage.getItem('korb_dq_save_' + i);
    const info = data ? JSON.parse(data) : null;
    const div = document.createElement('div');
    div.className = 'save-slot';
    div.innerHTML = `<div>
      <strong>Slot ${i+1}</strong>
      <div class="slot-info">${info ? `${info.player.name} - Lv${info.player.level} ${CLASSES[info.player.class]?.name||''} - ${new Date(info.timestamp).toLocaleString()}` : 'Empty'}</div>
    </div>`;
    div.onclick = () => {
      if (mode === 'save') {
        saveToSlot(i);
        closeSaveModal();
      } else if (info) {
        loadFromSlot(i);
        closeSaveModal();
      }
    };
    slots.appendChild(div);
  }

  // Autosave slot
  const auto = localStorage.getItem('korb_dq_autosave');
  if (auto && mode === 'load') {
    const info = JSON.parse(auto);
    const div = document.createElement('div');
    div.className = 'save-slot';
    div.innerHTML = `<div><strong>Autosave</strong><div class="slot-info">${info.player.name} - Lv${info.player.level} - ${new Date(info.timestamp).toLocaleString()}</div></div>`;
    div.onclick = () => { loadSaveData(info); closeSaveModal(); };
    slots.appendChild(div);
  }
}

function closeSaveModal() { document.getElementById('save-modal').classList.remove('show'); }

function saveToSlot(idx) {
  if (!G.player) return;
  const save = {
    player: G.player,
    adventureId: G.adventure?.id,
    currentNode: G.currentNode,
    visitedNodes: G.visitedNodes,
    timestamp: Date.now(),
  };
  localStorage.setItem('korb_dq_save_' + idx, JSON.stringify(save));
  addChatMessage('System', `Game saved to slot ${idx+1}!`, 'var(--cyan)');
}

function loadFromSlot(idx) {
  const data = localStorage.getItem('korb_dq_save_' + idx);
  if (!data) return;
  loadSaveData(JSON.parse(data));
}

function loadSaveData(save) {
  G.player = save.player;
  G.adventure = ADVENTURES.find(a => a.id === save.adventureId);
  G.currentNode = save.currentNode;
  G.visitedNodes = save.visitedNodes || [];
  if (!G.adventure) { window.alert('Adventure data not found'); return; }
  showScreen('game-screen');
  updateCharPanel();
  updateInventoryGrid();
  processNode(G.currentNode);
}

function exportSave() {
  if (!G.player) return;
  const save = {
    player: G.player,
    adventureId: G.adventure?.id,
    currentNode: G.currentNode,
    visitedNodes: G.visitedNodes,
    timestamp: Date.now(),
  };
  const blob = new Blob([JSON.stringify(save, null, 2)], { type:'application/json' });
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = `dungeon-quest-${G.player.name}-${Date.now()}.json`;
  a.click();
}

function importSave(event) {
  const file = event.target.files[0];
  if (!file) return;
  const reader = new FileReader();
  reader.onload = e => {
    try {
      const save = JSON.parse(e.target.result);
      loadSaveData(save);
      closeSaveModal();
    } catch(err) { window.alert('Invalid save file'); }
  };
  reader.readAsText(file);
}

// ==================== MAIN FLOW ====================
function startNewGame() {
  AudioEngine.init();
  AudioEngine.play('doorOpen');
  showScreen('char-screen');
  rollAllStats();
  updateCharPreview();
}

function continueGame() {
  const auto = localStorage.getItem('korb_dq_autosave');
  if (auto) {
    loadSaveData(JSON.parse(auto));
  } else {
    openSaveModal('load');
  }
}

function showJoinScreen() {
  showScreen('join-screen');
}

function startMultiplayer() {
  initMultiplayer(true);
  startNewGame();
}

function copyRoomCode() {
  if (G.roomCode) {
    navigator.clipboard.writeText(G.roomCode).then(() => {
      addChatMessage('System', 'Room code copied!', 'var(--cyan)');
    });
  }
}

function toggleSound() {
  G.soundEnabled = !G.soundEnabled;
  AudioEngine.enabled = G.soundEnabled;
  document.getElementById('sound-btn').textContent = 'Sound: ' + (G.soundEnabled ? 'ON' : 'OFF');
}

// Auto-save every 30 seconds
setInterval(autoSave, 30000);

// Init
rollAllStats();
updateCharPreview();

// Keyboard shortcuts
document.addEventListener('keydown', e => {
  if (e.key === 'Escape') {
    closeSaveModal();
    closeLevelUp();
  }
});
