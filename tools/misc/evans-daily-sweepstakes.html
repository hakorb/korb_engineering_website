<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=5,user-scalable=yes,viewport-fit=cover"/>
<title>Evan's Daily Sweepstakes</title>
<meta name="description" content="Comprehensive sweepstakes finder, entry tracker, and win logger. Fortune favors the persistent."/>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@300;400;500;600;700&display=swap" rel="stylesheet"/>
<style>
:root{
  --bg:#050a0f;--panel:#0a1520;--panel2:#0d1a28;--text:#d0e8f0;--muted:#6a8a9a;
  --cyan:#00d4ff;--orange:#ff9900;--gold:#ffd700;--green:#00e676;--red:#ff4444;
  --border:#1a2a3a;--border-light:#2a3a4a;
  --shadow:0 4px 20px rgba(0,0,0,.4);--radius:10px;
  --font:'JetBrains Mono',monospace;
  --nav-h:60px;
}
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:var(--font);font-size:15px;line-height:1.5;color:var(--text);background:var(--bg);
  min-height:100vh;-webkit-tap-highlight-color:transparent;overscroll-behavior:none;
  padding-bottom:calc(var(--nav-h) + 20px);}
button,select,input,textarea{font-family:var(--font);border:none;outline:none;font-size:16px;}
button{cursor:pointer;-webkit-touch-callout:none;user-select:none;}
a{color:var(--cyan);text-decoration:none;}
a:hover{text-decoration:underline;}
::-webkit-scrollbar{width:6px;height:6px;}
::-webkit-scrollbar-track{background:var(--bg);}
::-webkit-scrollbar-thumb{background:var(--border-light);border-radius:3px;}

/* HEADER */
.app-header{text-align:center;padding:20px 16px 10px;background:linear-gradient(180deg,#0a1520 0%,var(--bg) 100%);}
.app-header h1{font-size:clamp(22px,5vw,32px);font-weight:700;
  background:linear-gradient(135deg,var(--cyan),var(--gold));-webkit-background-clip:text;
  -webkit-text-fill-color:transparent;background-clip:text;}
.app-header .subtitle{font-size:13px;color:var(--gold);font-style:italic;margin-top:2px;letter-spacing:0.5px;}
.app-header .streak-bar{display:inline-flex;align-items:center;gap:6px;margin-top:8px;
  background:var(--panel);border:1px solid var(--border);border-radius:20px;padding:4px 14px;font-size:12px;color:var(--muted);}
.app-header .streak-bar .fire{font-size:16px;}
.app-header .streak-bar .streak-num{color:var(--orange);font-weight:600;}

/* NAV */
.nav{position:fixed;bottom:0;left:0;right:0;height:var(--nav-h);background:var(--panel);
  border-top:1px solid var(--border);display:flex;z-index:100;
  padding-bottom:env(safe-area-inset-bottom,0);}
.nav button{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;
  background:none;color:var(--muted);font-size:10px;gap:2px;transition:color .15s;padding:0;}
.nav button.active{color:var(--cyan);}
.nav button .nav-icon{font-size:20px;}

/* TABS */
.tab{display:none;padding:12px 14px 20px;max-width:800px;margin:0 auto;}
.tab.active{display:block;}

/* COMMON */
.card{background:var(--panel);border:1px solid var(--border);border-radius:var(--radius);
  padding:14px;margin-bottom:12px;box-shadow:var(--shadow);}
.card-title{font-size:14px;font-weight:600;color:var(--cyan);margin-bottom:8px;text-transform:uppercase;letter-spacing:1px;}
.btn{display:inline-flex;align-items:center;justify-content:center;gap:6px;padding:10px 18px;
  border-radius:8px;font-weight:600;font-size:14px;transition:all .15s;min-height:44px;}
.btn-cyan{background:var(--cyan);color:#050a0f;}
.btn-cyan:hover{background:#33ddff;}
.btn-orange{background:var(--orange);color:#050a0f;}
.btn-orange:hover{background:#ffaa33;}
.btn-gold{background:var(--gold);color:#050a0f;}
.btn-gold:hover{background:#ffe033;}
.btn-outline{background:none;border:1px solid var(--border-light);color:var(--text);}
.btn-outline:hover{border-color:var(--cyan);color:var(--cyan);}
.btn-sm{padding:6px 12px;font-size:12px;min-height:32px;}
.btn-danger{background:var(--red);color:#fff;}
.badge{display:inline-block;padding:2px 8px;border-radius:10px;font-size:11px;font-weight:600;}
.badge-cyan{background:rgba(0,212,255,.15);color:var(--cyan);}
.badge-orange{background:rgba(255,153,0,.15);color:var(--orange);}
.badge-gold{background:rgba(255,215,0,.15);color:var(--gold);}
.badge-green{background:rgba(0,230,118,.15);color:var(--green);}
.badge-red{background:rgba(255,68,68,.15);color:var(--red);}

.form-group{margin-bottom:12px;}
.form-group label{display:block;font-size:12px;color:var(--muted);margin-bottom:4px;text-transform:uppercase;letter-spacing:.5px;}
.form-group input,.form-group select,.form-group textarea{width:100%;padding:10px 12px;
  background:var(--panel2);border:1px solid var(--border);border-radius:6px;color:var(--text);font-size:16px;}
.form-group input:focus,.form-group select:focus,.form-group textarea:focus{border-color:var(--cyan);}
.form-row{display:flex;gap:10px;}
.form-row .form-group{flex:1;}

.stat-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:10px;}
.stat-box{background:var(--panel2);border:1px solid var(--border);border-radius:8px;padding:12px;text-align:center;}
.stat-box .stat-val{font-size:24px;font-weight:700;color:var(--cyan);}
.stat-box .stat-label{font-size:11px;color:var(--muted);text-transform:uppercase;letter-spacing:.5px;margin-top:2px;}
.stat-box.gold .stat-val{color:var(--gold);}
.stat-box.green .stat-val{color:var(--green);}
.stat-box.orange .stat-val{color:var(--orange);}

.empty-state{text-align:center;padding:40px 20px;color:var(--muted);}
.empty-state .empty-icon{font-size:48px;margin-bottom:12px;}
.empty-state p{font-size:13px;max-width:300px;margin:0 auto;}

/* LINKS GRID */
.links-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(160px,1fr));gap:10px;}
.link-card{background:var(--panel2);border:1px solid var(--border);border-radius:8px;padding:12px;
  text-align:center;transition:border-color .15s;cursor:pointer;text-decoration:none;display:block;}
.link-card:hover{border-color:var(--cyan);text-decoration:none;}
.link-card .lc-icon{font-size:24px;margin-bottom:6px;}
.link-card .lc-name{font-size:13px;font-weight:600;color:var(--text);margin-bottom:4px;}
.link-card .lc-desc{font-size:10px;color:var(--muted);line-height:1.3;}

/* CATEGORY FILTERS */
.filter-row{display:flex;flex-wrap:wrap;gap:6px;margin-bottom:12px;}
.filter-btn{padding:5px 12px;border-radius:20px;font-size:11px;font-weight:500;
  background:var(--panel2);border:1px solid var(--border);color:var(--muted);cursor:pointer;transition:all .15s;}
.filter-btn.active{background:rgba(0,212,255,.15);border-color:var(--cyan);color:var(--cyan);}

/* ENTRY LIST */
.entry-item{background:var(--panel2);border:1px solid var(--border);border-radius:8px;
  padding:12px;margin-bottom:8px;transition:border-color .15s;}
.entry-item:hover{border-color:var(--border-light);}
.entry-item .ei-top{display:flex;justify-content:space-between;align-items:flex-start;gap:8px;}
.entry-item .ei-name{font-weight:600;font-size:14px;color:var(--text);flex:1;}
.entry-item .ei-meta{display:flex;flex-wrap:wrap;gap:6px;margin-top:6px;font-size:11px;color:var(--muted);}
.entry-item .ei-prize{color:var(--gold);font-size:12px;margin-top:4px;}
.entry-item .ei-actions{display:flex;gap:6px;margin-top:8px;}
.entry-item.expired{opacity:.5;border-color:var(--red);}
.entry-item.won{border-color:var(--gold);background:rgba(255,215,0,.03);}

/* CHECKLIST */
.check-item{display:flex;align-items:center;gap:10px;padding:12px;background:var(--panel2);
  border:1px solid var(--border);border-radius:8px;margin-bottom:6px;cursor:pointer;transition:all .15s;}
.check-item:hover{border-color:var(--cyan);}
.check-item.done{opacity:.4;text-decoration:line-through;}
.check-item .ci-check{width:24px;height:24px;border-radius:50%;border:2px solid var(--border-light);
  display:flex;align-items:center;justify-content:center;flex-shrink:0;font-size:14px;transition:all .15s;}
.check-item.done .ci-check{background:var(--green);border-color:var(--green);color:#050a0f;}
.check-item .ci-info{flex:1;min-width:0;}
.check-item .ci-name{font-size:13px;font-weight:500;}
.check-item .ci-deadline{font-size:11px;color:var(--muted);}
.check-item .ci-urgent{color:var(--red);}

/* CALENDAR */
.cal-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:12px;}
.cal-header h3{font-size:16px;color:var(--text);}
.cal-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:2px;margin-bottom:16px;}
.cal-day-label{text-align:center;font-size:10px;color:var(--muted);padding:4px 0;text-transform:uppercase;}
.cal-day{aspect-ratio:1;display:flex;flex-direction:column;align-items:center;justify-content:center;
  background:var(--panel2);border-radius:4px;font-size:12px;color:var(--muted);position:relative;cursor:default;}
.cal-day.today{border:1px solid var(--cyan);color:var(--cyan);font-weight:700;}
.cal-day.has-events{color:var(--text);}
.cal-day .cal-dot{width:5px;height:5px;border-radius:50%;background:var(--orange);position:absolute;bottom:3px;}
.cal-day.empty{background:transparent;}

/* TIPS */
.tip-section{margin-bottom:16px;}
.tip-section h3{font-size:14px;font-weight:600;color:var(--orange);margin-bottom:8px;
  display:flex;align-items:center;gap:6px;}
.tip-list{list-style:none;padding:0;}
.tip-list li{padding:8px 0 8px 20px;border-bottom:1px solid var(--border);font-size:13px;
  color:var(--text);position:relative;line-height:1.5;}
.tip-list li::before{content:">";position:absolute;left:0;color:var(--cyan);font-weight:700;}
.tip-list li:last-child{border-bottom:none;}

/* CHART */
.chart-container{position:relative;height:200px;margin-top:12px;}
.chart-bar-wrap{display:flex;align-items:flex-end;justify-content:space-around;height:170px;
  border-bottom:1px solid var(--border);padding:0 4px;}
.chart-bar{display:flex;flex-direction:column;align-items:center;gap:4px;flex:1;max-width:40px;}
.chart-bar .bar{width:100%;background:linear-gradient(180deg,var(--gold),var(--orange));border-radius:3px 3px 0 0;
  min-height:2px;transition:height .3s;}
.chart-bar .bar-label{font-size:9px;color:var(--muted);writing-mode:horizontal-tb;}
.chart-bar .bar-val{font-size:9px;color:var(--gold);font-weight:600;}
.chart-labels{display:flex;justify-content:space-around;padding:4px;font-size:9px;color:var(--muted);}

/* CONFETTI */
.confetti-container{position:fixed;top:0;left:0;right:0;bottom:0;pointer-events:none;z-index:9999;overflow:hidden;}
.confetti-piece{position:absolute;width:10px;height:10px;top:-10px;animation:confetti-fall 3s ease-out forwards;}
@keyframes confetti-fall{
  0%{transform:translateY(0) rotate(0deg);opacity:1;}
  100%{transform:translateY(100vh) rotate(720deg);opacity:0;}
}

/* MODAL */
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.7);z-index:200;display:flex;
  align-items:center;justify-content:center;padding:16px;}
.modal{background:var(--panel);border:1px solid var(--border);border-radius:var(--radius);
  padding:20px;width:100%;max-width:480px;max-height:85vh;overflow-y:auto;box-shadow:var(--shadow);}
.modal h3{font-size:16px;color:var(--cyan);margin-bottom:14px;}
.modal-actions{display:flex;gap:8px;margin-top:16px;justify-content:flex-end;}

/* RESPONSIVE */
@media(min-width:600px){
  .stat-grid{grid-template-columns:repeat(4,1fr);}
  .form-row{flex-direction:row;}
  .links-grid{grid-template-columns:repeat(auto-fill,minmax(180px,1fr));}
}
@media(max-width:599px){
  .form-row{flex-direction:column;}
}
</style>
</head>

<script>
/* ===== DATA LAYER ===== */
const LS_PREFIX = 'korb_sweeps_';
const LS = {
  get(k, fallback) { try { const v = localStorage.getItem(LS_PREFIX + k); return v ? JSON.parse(v) : fallback; } catch { return fallback; } },
  set(k, v) { localStorage.setItem(LS_PREFIX + k, JSON.stringify(v)); },
  remove(k) { localStorage.removeItem(LS_PREFIX + k); }
};

function genId() { return Date.now().toString(36) + Math.random().toString(36).slice(2, 7); }
function today() { return new Date().toISOString().slice(0, 10); }
function daysBetween(a, b) { return Math.ceil((new Date(b) - new Date(a)) / 86400000); }

/* ===== STATE ===== */
let entries = LS.get('entries', []);
let wins = LS.get('wins', []);
let dailyChecked = LS.get('daily_' + today(), {});
let streak = LS.get('streak', { count: 0, lastDate: '' });
let entryLog = LS.get('entry_log', {});

function saveEntries() { LS.set('entries', entries); }
function saveWins() { LS.set('wins', wins); }
function saveDailyChecked() { LS.set('daily_' + today(), dailyChecked); }
function saveStreak() { LS.set('streak', streak); }
function saveEntryLog() { LS.set('entry_log', entryLog); }

function logEntryToday() {
  const d = today();
  if (!entryLog[d]) entryLog[d] = 0;
  entryLog[d]++;
  saveEntryLog();
  updateStreak();
}

function updateStreak() {
  const d = today();
  if (streak.lastDate === d) return;
  const yesterday = new Date();
  yesterday.setDate(yesterday.getDate() - 1);
  const yStr = yesterday.toISOString().slice(0, 10);
  if (streak.lastDate === yStr) {
    streak.count++;
  } else if (streak.lastDate !== d) {
    streak.count = 1;
  }
  streak.lastDate = d;
  saveStreak();
  document.getElementById('streakCount').textContent = streak.count;
}

function autoExpireEntries() {
  const d = today();
  let changed = false;
  entries.forEach(e => {
    if (e.status === 'active' && e.endDate && e.endDate < d) {
      e.status = 'expired';
      changed = true;
    }
  });
  if (changed) saveEntries();
}

/* ===== AGGREGATOR SITES ===== */
const AGGREGATORS = [

  { name: "SweepstakesBible", url: "https://sweepstakesbible.com", desc: "Tips, news, and listings", cat: "general", icon: "&#x1F4D6;" },
  { name: "PrizeGrab", url: "https://prizegrab.com", desc: "Daily instant-win games", cat: "instant", icon: "&#x1F3AF;" },
  { name: "Instant Win Hub", url: "https://sweetiessweeps.com/category/instant-win", desc: "Instant win games collection", cat: "instant", icon: "&#x26A1;" },
  { name: "PCH", url: "https://pch.com", desc: "Publishers Clearing House daily entries", cat: "instant", icon: "&#x1F4B0;" },

/* ===== TAB NAVIGATION ===== */
const navBtns = document.querySelectorAll('.nav button');
const tabs = document.querySelectorAll('.tab');
navBtns.forEach(btn => {
  btn.addEventListener('click', () => {
    navBtns.forEach(b => b.classList.remove('active'));
    tabs.forEach(t => t.classList.remove('active'));
    btn.classList.add('active');
    document.getElementById(btn.dataset.tab).classList.add('active');
  });
});

/* ===== RENDER FUNCTIONS ===== */

function renderFeed() {
  let catFilter = 'all';
  const el = document.getElementById('tabFeed');
  function build() {
    const aggCats = [
      { id: 'all', label: 'All Sites' },
      { id: 'general', label: 'General' },
      { id: 'instant', label: 'Instant Win' },
      { id: 'social', label: 'Social Media' },
      { id: 'brand', label: 'Brand Promos' },
    ];
    const filtered = catFilter === 'all' ? AGGREGATORS : AGGREGATORS.filter(a => a.cat === catFilter);
    el.innerHTML = `
      <div class="card">
        <div class="card-title">&#x1F3B0; Sweepstakes Feed</div>
        <p style="font-size:12px;color:var(--muted);margin-bottom:12px;">
          Browse top sweepstakes aggregators. Each link opens in a new tab so you can find and enter sweepstakes.
        </p>
        <div class="filter-row">

function renderChecklist() {
  const el = document.getElementById('tabChecklist');
  const dailyEntries = entries.filter(e => e.status === 'active' && e.frequency === 'daily');
  dailyEntries.sort((a, b) => {
    if (!a.endDate) return 1;
    if (!b.endDate) return -1;
    return a.endDate.localeCompare(b.endDate);
  });

  if (dailyEntries.length === 0) {
    el.innerHTML = `
      <div class="card">
        <div class="card-title">&#x2705; Daily Checklist</div>
        <div class="empty-state">
          <div class="empty-icon">&#x1F4DD;</div>
          <p>No daily-entry sweepstakes tracked yet. Add some in the Track tab with "Daily" frequency and they'll appear here!</p>
        </div>
      </div>
    `;
    return;
  }

  const checkedCount = dailyEntries.filter(e => dailyChecked[e.id]).length;
  const totalCount = dailyEntries.length;
  const pct = totalCount > 0 ? Math.round((checkedCount / totalCount) * 100) : 0;

  el.innerHTML = `
    <div class="card">
      <div class="card-title">&#x2705; Daily Checklist &mdash; ${today()}</div>
      <div style="margin-bottom:12px;">
        <div style="display:flex;justify-content:space-between;font-size:12px;color:var(--muted);margin-bottom:4px;">
          <span>${checkedCount}/${totalCount} completed</span>
          <span>${pct}%</span>
        </div>
        <div style="height:6px;background:var(--border);border-radius:3px;overflow:hidden;">
          <div style="height:100%;width:${pct}%;background:${pct===100?'var(--green)':'var(--cyan)'};border-radius:3px;transition:width .3s;"></div>
        </div>
      </div>
      ${dailyEntries.map(e => {
        const done = dailyChecked[e.id];
        const daysLeft = e.endDate ? daysBetween(today(), e.endDate) : null;
        const urgent = daysLeft !== null && daysLeft <= 3;
        return `
          <div class="check-item ${done ? 'done' : ''}" data-id="${e.id}">
            <div class="ci-check">${done ? '&#x2714;' : ''}</div>
            <div class="ci-info">
              <div class="ci-name">${esc(e.name)}</div>
              <div class="ci-deadline ${urgent ? 'ci-urgent' : ''}">
                ${daysLeft !== null ? (daysLeft <= 0 ? 'Ends today!' : daysLeft + ' day' + (daysLeft !== 1 ? 's' : '') + ' left') : 'No end date'}
                ${e.url ? ' &middot; <a href="' + esc(e.url) + '" target="_blank" style="color:var(--cyan);">Enter &rarr;</a>' : ''}
              </div>
            </div>
          </div>
        `;
      }).join('')}
      ${pct === 100 ? '<div style="text-align:center;margin-top:12px;color:var(--green);font-weight:600;">&#x1F389; All done for today! Great job!</div>' : ''}
    </div>
  `;

  el.querySelectorAll('.check-item').forEach(item => {
    item.addEventListener('click', (ev) => {
      if (ev.target.tagName === 'A') return;
      const id = item.dataset.id;
      dailyChecked[id] = !dailyChecked[id];
      saveDailyChecked();
      if (dailyChecked[id]) logEntryToday();
      renderChecklist();
      renderStats();
    });
  });
}

function renderTracker() {
  const el = document.getElementById('tabTracker');
  let statusFilter = 'active';

  function build() {
    const filtered = statusFilter === 'all' ? entries : entries.filter(e => e.status === statusFilter);
    filtered.sort((a, b) => {
      if (a.status === 'active' && b.status !== 'active') return -1;
      if (b.status === 'active' && a.status !== 'active') return 1;
      return (b.entryDate || '').localeCompare(a.entryDate || '');
    });

    el.innerHTML = `
      <div class="card">
        <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:12px;">
          <div class="card-title" style="margin-bottom:0;">&#x1F4CB; Entry Tracker</div>
          <button class="btn btn-cyan btn-sm" id="btnAddEntry">+ Add</button>
        </div>
        <div class="filter-row">
          ${['all','active','expired','won','lost'].map(s =>
            `<button class="filter-btn ${statusFilter === s ? 'active' : ''}" data-status="${s}">${s.charAt(0).toUpperCase()+s.slice(1)} ${s==='all'?'('+entries.length+')':s==='active'?'('+entries.filter(e=>e.status==='active').length+')':''}</button>`
          ).join('')}
        </div>
        ${filtered.length === 0 ? `
          <div class="empty-state">
            <div class="empty-icon">&#x1F4CB;</div>
            <p>No entries${statusFilter !== 'all' ? ' with status "' + statusFilter + '"' : ''}. Tap + Add to log a sweepstakes entry!</p>
          </div>
        ` : filtered.map(e => {
          const daysLeft = e.endDate ? daysBetween(today(), e.endDate) : null;
          return `
            <div class="entry-item ${e.status === 'expired' ? 'expired' : ''} ${e.status === 'won' ? 'won' : ''}">
              <div class="ei-top">
                <div class="ei-name">${esc(e.name)}</div>
                <span class="badge ${e.status==='active'?'badge-cyan':e.status==='won'?'badge-gold':e.status==='expired'?'badge-red':'badge-orange'}">${e.status}</span>
              </div>
              ${e.prize ? `<div class="ei-prize">&#x1F3C6; ${esc(e.prize)}${e.value ? ' (~$' + Number(e.value).toLocaleString() + ')' : ''}</div>` : ''}
              <div class="ei-meta">
                ${e.frequency ? `<span class="badge badge-cyan">${e.frequency}</span>` : ''}
                ${e.category ? `<span class="badge badge-orange">${e.category}</span>` : ''}
                ${e.prizeType ? `<span class="badge badge-gold">${e.prizeType}</span>` : ''}
                ${e.entryDate ? `<span>Entered: ${e.entryDate}</span>` : ''}
                ${e.endDate ? `<span>Ends: ${e.endDate}${daysLeft !== null && daysLeft >= 0 ? ' (' + daysLeft + 'd)' : ''}</span>` : ''}
              </div>
              <div class="ei-actions">
                ${e.url ? `<a href="${esc(e.url)}" target="_blank" class="btn btn-outline btn-sm">Enter &rarr;</a>` : ''}
                <button class="btn btn-outline btn-sm" data-edit="${e.id}">Edit</button>
                <button class="btn btn-outline btn-sm" data-delete="${e.id}" style="color:var(--red);border-color:var(--red);">&#x2716;</button>
                ${e.status === 'active' ? `<button class="btn btn-gold btn-sm" data-win="${e.id}">&#x1F3C6; Won!</button>` : ''}
              </div>
            </div>
          `;
        }).join('')}
      </div>
    `;

    el.querySelector('#btnAddEntry').addEventListener('click', () => showEntryModal());
    el.querySelectorAll('.filter-btn').forEach(btn => {
      btn.addEventListener('click', () => { statusFilter = btn.dataset.status; build(); });
    });
    el.querySelectorAll('[data-edit]').forEach(btn => {
      btn.addEventListener('click', () => showEntryModal(btn.dataset.edit));
    });
    el.querySelectorAll('[data-delete]').forEach(btn => {
      btn.addEventListener('click', () => {
        if (confirm('Delete this entry?')) {
          entries = entries.filter(e => e.id !== btn.dataset.delete);
          saveEntries();
          build();
          renderChecklist();
          renderCalendar();
          renderStats();
        }
      });
    });
    el.querySelectorAll('[data-win]').forEach(btn => {
      btn.addEventListener('click', () => {
        const entry = entries.find(e => e.id === btn.dataset.win);
        if (entry) showWinModal(entry);
      });
    });
  }
  build();
}

function renderCalendar() {
  const el = document.getElementById('tabCalendar');
  let viewDate = new Date();

  function build() {
    const year = viewDate.getFullYear();
    const month = viewDate.getMonth();
    const firstDay = new Date(year, month, 1).getDay();
    const daysInMonth = new Date(year, month + 1, 0).getDate();
    const monthName = viewDate.toLocaleString('default', { month: 'long', year: 'numeric' });
    const todayStr = today();

    // Find entries ending this month
    const endDates = {};
    entries.forEach(e => {
      if (e.endDate && e.status === 'active') {
        const d = e.endDate;
        if (d.slice(0, 7) === `${year}-${String(month + 1).padStart(2, '0')}`) {
          const day = parseInt(d.slice(8, 10));
          if (!endDates[day]) endDates[day] = [];
          endDates[day].push(e);
        }
      }
    });

    const dayLabels = ['Su','Mo','Tu','We','Th','Fr','Sa'];
    let cells = dayLabels.map(d => `<div class="cal-day-label">${d}</div>`).join('');
    for (let i = 0; i < firstDay; i++) cells += '<div class="cal-day empty"></div>';
    for (let d = 1; d <= daysInMonth; d++) {
      const dateStr = `${year}-${String(month+1).padStart(2,'0')}-${String(d).padStart(2,'0')}`;
      const isToday = dateStr === todayStr;
      const hasEvents = endDates[d];
      cells += `<div class="cal-day ${isToday ? 'today' : ''} ${hasEvents ? 'has-events' : ''}" data-day="${d}">
        ${d}${hasEvents ? '<div class="cal-dot"></div>' : ''}
      </div>`;
    }

    // Build deadline list for selected month
    const deadlines = entries
      .filter(e => e.endDate && e.status === 'active' && e.endDate.slice(0, 7) === `${year}-${String(month + 1).padStart(2, '0')}`)
      .sort((a, b) => a.endDate.localeCompare(b.endDate));

    el.innerHTML = `
      <div class="card">
        <div class="cal-header">
          <button class="btn btn-outline btn-sm" id="calPrev">&larr;</button>
          <h3>${monthName}</h3>
          <button class="btn btn-outline btn-sm" id="calNext">&rarr;</button>
        </div>
        <div class="cal-grid">${cells}</div>
      </div>
      <div class="card">
        <div class="card-title">&#x23F0; Deadlines This Month</div>
        ${deadlines.length === 0 ? '<p style="font-size:12px;color:var(--muted);">No tracked deadlines this month.</p>' :
          deadlines.map(e => {
            const dl = daysBetween(todayStr, e.endDate);
            return `<div style="display:flex;justify-content:space-between;padding:8px 0;border-bottom:1px solid var(--border);font-size:13px;">
              <span>${esc(e.name)}</span>
              <span style="color:${dl<=3?'var(--red)':dl<=7?'var(--orange)':'var(--muted)'};white-space:nowrap;">${e.endDate.slice(5)} (${dl}d)</span>
            </div>`;
          }).join('')
        }
      </div>
    `;

    el.querySelector('#calPrev').addEventListener('click', () => {
      viewDate.setMonth(viewDate.getMonth() - 1);
      build();
    });
    el.querySelector('#calNext').addEventListener('click', () => {
      viewDate.setMonth(viewDate.getMonth() + 1);
      build();
    });
  }
  build();
}

function renderStats() {
  const el = document.getElementById('tabStats');
  const d = today();
  const totalEntries = entries.length;
  const activeEntries = entries.filter(e => e.status === 'active').length;
  const totalWins = wins.length;
  const winRate = totalEntries > 0 ? ((totalWins / totalEntries) * 100).toFixed(1) : '0.0';
  const totalWinValue = wins.reduce((s, w) => s + (w.value || 0), 0);

  // Entries this week
  const weekAgo = new Date(); weekAgo.setDate(weekAgo.getDate() - 7);
  const weekStr = weekAgo.toISOString().slice(0, 10);
  const entriesThisWeek = Object.entries(entryLog).filter(([k]) => k >= weekStr).reduce((s, [, v]) => s + v, 0);

  // Entries this month
  const monthStr = d.slice(0, 7);
  const entriesThisMonth = Object.entries(entryLog).filter(([k]) => k.startsWith(monthStr)).reduce((s, [, v]) => s + v, 0);

  // All-time entries
  const allTimeEntries = Object.values(entryLog).reduce((s, v) => s + v, 0);

  // Est time (2 min per entry)
  const estMinutes = allTimeEntries * 2;
  const estHours = (estMinutes / 60).toFixed(1);

  // Chart: wins by month (last 6 months)
  const months = [];
  for (let i = 5; i >= 0; i--) {
    const dt = new Date(); dt.setMonth(dt.getMonth() - i);
    months.push(dt.toISOString().slice(0, 7));
  }
  const winsByMonth = months.map(m => {
    return wins.filter(w => (w.date || '').startsWith(m)).reduce((s, w) => s + (w.value || 0), 0);
  });
  const maxWin = Math.max(...winsByMonth, 1);

  el.innerHTML = `
    <div class="card">
      <div class="card-title">&#x1F4CA; Stats Dashboard</div>
      <div class="stat-grid">
        <div class="stat-box">
          <div class="stat-val">${totalEntries}</div>
          <div class="stat-label">Total Tracked</div>
        </div>
        <div class="stat-box green">
          <div class="stat-val">${activeEntries}</div>
          <div class="stat-label">Active</div>
        </div>
        <div class="stat-box gold">
          <div class="stat-val">${totalWins}</div>
          <div class="stat-label">Wins</div>
        </div>
        <div class="stat-box orange">
          <div class="stat-val">${winRate}%</div>
          <div class="stat-label">Win Rate</div>
        </div>
      </div>
    </div>
    <div class="card">
      <div class="card-title">&#x1F4C8; Activity</div>
      <div class="stat-grid">
        <div class="stat-box">
          <div class="stat-val">${entriesThisWeek}</div>
          <div class="stat-label">This Week</div>
        </div>
        <div class="stat-box">
          <div class="stat-val">${entriesThisMonth}</div>
          <div class="stat-label">This Month</div>
        </div>
        <div class="stat-box">
          <div class="stat-val">${allTimeEntries}</div>
          <div class="stat-label">All-Time Entries</div>
        </div>
        <div class="stat-box">
          <div class="stat-val">${estHours}h</div>
          <div class="stat-label">Est. Time Spent</div>
        </div>
      </div>
    </div>
    <div class="card">
      <div class="card-title">&#x1F525; Streaks</div>
      <div class="stat-grid">
        <div class="stat-box orange">
          <div class="stat-val">${streak.count}</div>
          <div class="stat-label">Current Streak</div>
        </div>
        <div class="stat-box gold">
          <div class="stat-val">$${totalWinValue.toLocaleString()}</div>
          <div class="stat-label">Total Won</div>
        </div>
      </div>
    </div>
    <div class="card">
      <div class="card-title">&#x1F4B0; Win Value by Month</div>
      <div class="chart-container">
        <div class="chart-bar-wrap">
          ${months.map((m, i) => `
            <div class="chart-bar">
              <div class="bar-val">${winsByMonth[i] > 0 ? '$' + winsByMonth[i].toLocaleString() : ''}</div>
              <div class="bar" style="height:${Math.max((winsByMonth[i] / maxWin) * 140, 2)}px;"></div>
            </div>
          `).join('')}
        </div>
        <div class="chart-labels">
          ${months.map(m => `<span>${m.slice(5)}</span>`).join('')}
        </div>
      </div>
    </div>
    <div class="card">
      <div style="display:flex;justify-content:space-between;align-items:center;">
        <div class="card-title" style="margin-bottom:0;">&#x1F5D1; Data Management</div>
      </div>
      <p style="font-size:11px;color:var(--muted);margin:8px 0;">All data is stored locally in your browser.</p>
      <div style="display:flex;gap:8px;flex-wrap:wrap;">
        <button class="btn btn-outline btn-sm" id="btnExport">Export Data</button>
        <button class="btn btn-outline btn-sm" id="btnImport">Import Data</button>
        <button class="btn btn-sm" id="btnClearAll" style="background:var(--red);color:#fff;">Clear All Data</button>
      </div>
      <input type="file" id="importFile" accept=".json" style="display:none;"/>
    </div>
  `;

  el.querySelector('#btnExport').addEventListener('click', () => {
    const data = { entries, wins, entryLog, streak, exportDate: today() };
    const blob = new Blob([JSON.stringify(data, null, 2)], { type: 'application/json' });
    const a = document.createElement('a');
    a.href = URL.createObjectURL(blob);
    a.download = 'evans-sweepstakes-backup-' + today() + '.json';
    a.click();
  });

  el.querySelector('#btnImport').addEventListener('click', () => {
    el.querySelector('#importFile').click();
  });
  el.querySelector('#importFile').addEventListener('change', (ev) => {
    const file = ev.target.files[0];
    if (!file) return;
    const reader = new FileReader();
    reader.onload = (e) => {
      try {
        const data = JSON.parse(e.target.result);
        if (data.entries) { entries = data.entries; saveEntries(); }
        if (data.wins) { wins = data.wins; saveWins(); }
        if (data.entryLog) { entryLog = data.entryLog; saveEntryLog(); }
        if (data.streak) { streak = data.streak; saveStreak(); }
        alert('Data imported successfully!');
        renderAll();
      } catch { alert('Invalid file format.'); }
    };
    reader.readAsText(file);
  });

  el.querySelector('#btnClearAll').addEventListener('click', () => {
    if (confirm('This will delete ALL sweepstakes data. Are you sure?')) {
      if (confirm('Really? This cannot be undone.')) {
        entries = []; wins = []; entryLog = {}; streak = { count: 0, lastDate: '' }; dailyChecked = {};
        saveEntries(); saveWins(); saveEntryLog(); saveStreak(); saveDailyChecked();
        renderAll();
      }
    }
  });
}

/* ===== CONFETTI ===== */
function fireConfetti() {
  const container = document.createElement('div');
  container.className = 'confetti-container';
  document.body.appendChild(container);
  const colors = ['#ffd700', '#ff9900', '#00d4ff', '#00e676', '#ff4444', '#ff69b4', '#9b59b6'];
  for (let i = 0; i < 80; i++) {
    const piece = document.createElement('div');
    piece.className = 'confetti-piece';
    piece.style.left = Math.random() * 100 + '%';
    piece.style.background = colors[Math.floor(Math.random() * colors.length)];
    piece.style.animationDelay = Math.random() * 1.5 + 's';
    piece.style.animationDuration = (2 + Math.random() * 2) + 's';
    piece.style.width = (6 + Math.random() * 8) + 'px';
    piece.style.height = (6 + Math.random() * 8) + 'px';
    piece.style.borderRadius = Math.random() > 0.5 ? '50%' : '0';
    piece.style.transform = `rotate(${Math.random() * 360}deg)`;
    container.appendChild(piece);
  }
  setTimeout(() => container.remove(), 4000);
}
