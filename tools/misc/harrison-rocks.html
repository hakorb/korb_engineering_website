<style>
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box}

}
html,body{height:100%;background:var(--bg);color:var(--text);font-family:'JetBrains Mono',monospace;font-size:14px;overflow:hidden}
button,input,select,textarea{font-family:inherit;font-size:16px}
button{cursor:pointer;border:1px solid var(--border);background:var(--surface2);color:var(--text);padding:8px 14px;border-radius:6px;min-height:40px;transition:border-color .15s,color .15s}
button:hover{border-color:var(--cyan);color:var(--cyan)}
button.primary{background:rgba(0,212,255,.14);border-color:var(--cyan);color:var(--cyan)}

#back-btn:hover{border-color:var(--cyan);color:var(--cyan)}
header h1{font-family:'Merriweather',serif;font-size:18px;color:var(--cyan);font-weight:700;flex:1;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}

header .tabs button.active{background:rgba(0,212,255,.14);border-color:var(--cyan);color:var(--cyan)}
header .search-wrap{flex:0 0 220px;max-width:260px}
@media (max-width:740px){header .search-wrap{flex:1 1 100%;order:5}}

main{display:grid;grid-template-columns:260px 1fr;overflow:hidden}
@media (max-width:900px){main{grid-template-columns:1fr}#toc{display:none}main.toc-open #toc{display:block;position:absolute;z-index:100;top:0;left:0;bottom:0;width:84%;max-width:320px;box-shadow:4px 0 20px rgba(0,0,0,.6)}}

main.toc-open .scrim{display:block}

#toc{background:var(--surface);border-right:1px solid var(--border);overflow-y:auto;padding:12px 14px}
#toc .toc-head{color:var(--cyan);text-transform:uppercase;letter-spacing:.15em;font-size:10px;margin-bottom:10px;padding-bottom:6px;border-bottom:1px solid var(--border)}
#toc .prog{height:4px;background:var(--surface2);border:1px solid var(--border);border-radius:2px;overflow:hidden;margin-bottom:12px}
#toc .prog-bar{height:100%;background:linear-gradient(90deg,var(--cyan),var(--purple));transition:width .3s}
#toc ol{list-style:none;counter-reset:ch}
#toc ol li{counter-increment:ch}
#toc ol li a{display:block;color:var(--text);text-decoration:none;padding:7px 10px;border-radius:4px;font-size:12px;border-left:3px solid transparent;line-height:1.4;position:relative}
#toc ol li a::before{content:counter(ch)'. ';color:var(--dim);font-weight:700;margin-right:4px}
#toc ol li a:hover{background:rgba(0,212,255,.06);border-left-color:var(--cyan)}
#toc ol li a.active{background:rgba(0,212,255,.12);border-left-color:var(--cyan);color:var(--cyan)}
#toc ol li a .dot{position:absolute;right:6px;top:10px;width:8px;height:8px;border-radius:50%;background:transparent;border:1px solid var(--dim)}
#toc ol li a.done .dot{background:var(--green);border-color:var(--green)}

.chapter h3{font-family:'Merriweather',serif;font-size:16px;color:var(--text);margin:16px 0 6px;font-style:italic}

.key-terms{background:var(--surface2);border:1px solid var(--border);border-radius:8px;padding:12px 16px;margin:18px 0}
.key-terms .kt-title{color:var(--cyan);font-family:'JetBrains Mono',monospace;text-transform:uppercase;letter-spacing:.12em;font-size:11px;margin-bottom:8px}

.fc-card:hover{border-color:var(--amber)}

/* Glossary */

.glossary .gl-search{margin-bottom:14px}

.glossary .gl-entry .ch-ref{float:right;color:var(--dim);font-size:10px;text-transform:uppercase;letter-spacing:.1em}
.glossary .gl-entry .def{font-family:'Merriweather',serif;font-size:14px;line-height:1.55;color:#d8dde5;margin-top:4px}

/* Search dropdown */
#search-results{position:absolute;top:56px;right:14px;max-width:400px;width:calc(100vw - 28px);background:var(--surface);border:1px solid var(--border);border-radius:6px;max-height:60vh;overflow-y:auto;z-index:200;display:none}

.toast{position:fixed;left:50%;bottom:60px;transform:translateX(-50%);background:var(--surface);border:1px solid var(--cyan);color:var(--cyan);padding:10px 16px;border-radius:6px;font-size:13px;z-index:10000;opacity:0;transition:opacity .2s;pointer-events:none;max-width:90vw;text-align:center}
.toast.show{opacity:1}

.pane.active{display:block}
</style>

<script>
(function(){
'use strict';
const LS='korb_geology_essentials_v1';
const $=(id)=>document.getElementById(id);
function toast(m,ms){const t=$('toast');t.textContent=m;t.classList.add('show');clearTimeout(toast._t);toast._t=setTimeout(()=>t.classList.remove('show'),ms||2000);}
function escapeHtml(s){return String(s).replace(/[&<>"']/g,(c)=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));}

// Chapter content is original prose written from general physical geology knowledge.
// Topic organization mirrors the standard intro-geology curriculum sequence.
// No text is reproduced from any specific textbook.

const CH = [];

CH.push({
  id:'intro', title:'Introduction to Geology', sub:'How Earth Became a Science',
  html: `
    <p><strong>Geology</strong> is the science of the Earth — its materials, its structure, and the processes that have shaped it over roughly 4.54 billion years. Geologists work across a staggering range of scales: from atoms inside a mineral grain to entire tectonic plates that span thousands of kilometers.</p>
    <p>The field is conventionally divided into two broad branches. <em>Physical geology</em> studies the materials of Earth and the processes that act on and within the planet today. <em>Historical geology</em> reconstructs the sequence of events in Earth's past — when they happened, in what order, and why.</p>
    <h2>Uniformitarianism</h2>
    <p>In the late 1700s, James Hutton proposed that "the present is the key to the past" — the same processes that shape rocks and landscapes today (erosion, volcanism, sedimentation) operated in the past, albeit sometimes at different rates. This principle, called <strong>uniformitarianism</strong>, is the foundation on which modern geology is built. It replaced the older doctrine of <em>catastrophism</em>, which held that Earth's features were mostly produced by sudden, worldwide events.</p>
    <h2>The Rock Cycle</h2>
    <p>One of the most useful big-picture diagrams in geology is the <strong>rock cycle</strong>, which shows how the three rock types — igneous, sedimentary, and metamorphic — can transform into one another given time, heat, pressure, and surface processes.</p>
  `,
  terms: [
    ['Geology', 'The scientific study of Earth, its materials, and the processes that shape them.'],
    ['Physical geology', 'The branch focused on Earth materials and processes acting on the planet.'],
    ['Historical geology', 'The branch focused on Earth\u2019s past and the sequence of events that produced its present state.'],
    ['Uniformitarianism', 'The principle that the same geologic processes operating today also operated in the past.'],
    ['Catastrophism', 'An older idea holding that Earth\u2019s features formed mostly through sudden, large-scale events.'],
    ['Rock cycle', 'The conceptual model showing how rocks can be converted among igneous, sedimentary, and metamorphic types.']
  ],
  quiz: [
    { q: 'What is the principle of uniformitarianism?',
      opts: [
        'Earth was mostly formed by sudden global catastrophes.',
        'The same geologic processes operating today also operated in the past.',
        'All rocks form at the same rate everywhere.',
        'Earth is only a few thousand years old.'
      ], a: 1,
      exp: 'Hutton introduced the idea that present-day processes, extended over long time, explain past geologic features.' },
    { q: 'Which statement best describes the rock cycle?',
      opts: [
        'A set of unidirectional steps from magma to sediment only.',
        'A cycle showing how igneous, sedimentary, and metamorphic rocks can transform into each other.',
        'The yearly cycle of erosion on a beach.',
        'The order in which mountains form.'
      ], a: 1, exp: 'All three major rock classes can be converted into the others given appropriate conditions.' },
    { q: 'Physical geology primarily studies:',
      opts: ['Earth materials and present-day processes.','Fossil succession.','Stellar formation.','Only earthquakes.'],
      a: 0, exp: 'Physical geology covers minerals, rocks, and surface/internal processes.' }
  ]
});

CH.push({
  id:'minerals', title:'Matter &amp; Minerals', sub:'The Building Blocks of Rocks',
  html: `
    <p>A <strong>mineral</strong> is a naturally occurring, inorganic solid with a definite chemical composition and an orderly internal (crystalline) structure. Nearly 5,000 minerals have been described, but a few dozen — the <em>rock-forming minerals</em> — account for most of Earth's crust.</p>
    <h2>Atoms, Elements, and Bonds</h2>
    <p>Minerals are built from atoms that share or transfer electrons. The most important bonds in minerals are <strong>ionic</strong> (electrons transferred, as in halite NaCl), <strong>covalent</strong> (electrons shared, as in diamond), and <strong>metallic</strong> (a "sea" of shared electrons, as in native copper).</p>
    <h2>The Silicates</h2>
    <p>More than 90% of the crust is made of silicate minerals. Their fundamental building block is the <strong>silica tetrahedron</strong>: one silicon atom surrounded by four oxygen atoms. These tetrahedra can exist as isolated units, rings, single chains, double chains, sheets, or fully connected 3-D frameworks. The linking pattern controls the mineral's hardness, cleavage, and density.</p>
    <div class="diagram">
      <svg viewBox="0 0 300 180" xmlns="http://www.w3.org/2000/svg" aria-label="Silica tetrahedron diagram">
        <polygon points="150,30 60,150 240,150" fill="none" stroke="#00d4ff" stroke-width="2"/>
        <line x1="150" y1="30" x2="150" y2="110" stroke="#00d4ff" stroke-width="1"/>
        <line x1="60" y1="150" x2="150" y2="110" stroke="#00d4ff" stroke-width="1"/>
        <line x1="240" y1="150" x2="150" y2="110" stroke="#00d4ff" stroke-width="1"/>
        <circle cx="150" cy="30" r="12" fill="#ff9900"/>
        <circle cx="60" cy="150" r="12" fill="#ff9900"/>
        <circle cx="240" cy="150" r="12" fill="#ff9900"/>
        <circle cx="150" cy="110" r="10" fill="#00d4ff"/>
        <text x="150" y="170" text-anchor="middle" fill="#8892a4" font-family="JetBrains Mono" font-size="10">Si (cyan) · O (orange)</text>
      </svg>
      <div class="caption">The silica tetrahedron — one Si surrounded by four O atoms.</div>
    </div>
    <h2>Physical Properties</h2>
    <ul>
      <li><strong>Color</strong> — often misleading; the same mineral can come in many colors.</li>
      <li><strong>Streak</strong> — the color of a mineral's powder, rubbed on a porcelain plate; more reliable than surface color.</li>
      <li><strong>Hardness</strong> — measured against Mohs's 1–10 scale (talc=1, diamond=10).</li>
      <li><strong>Luster</strong> — how the surface reflects light (metallic, vitreous/glassy, pearly, dull, earthy).</li>
      <li><strong>Cleavage</strong> — the tendency to break along flat, parallel planes determined by internal bonding.</li>
      <li><strong>Fracture</strong> — breakage that does <em>not</em> follow a cleavage plane (conchoidal, splintery, etc.).</li>
      <li><strong>Density and specific gravity</strong> — mass per volume, revealing compositional differences.</li>
    </ul>
  `,
  terms: [
    ['Mineral','A naturally occurring, inorganic, crystalline solid with a definite chemical formula.'],
    ['Silica tetrahedron','The Si-O building block of all silicate minerals: one Si atom bonded to four O atoms.'],
    ['Mohs scale','A 1–10 relative hardness scale from talc (1) to diamond (10).'],
    ['Cleavage','Tendency of a mineral to break along smooth, parallel planes set by its bonding.'],
    ['Streak','Color of a mineral\u2019s powder, tested on an unglazed porcelain plate.'],
    ['Luster','How a mineral\u2019s surface reflects light: metallic, glassy, pearly, dull, earthy.']
  ],
  quiz: [
    { q: 'Which property is generally the most reliable for mineral identification?',
      opts: ['Color','Streak','Size of the specimen','Location where it was found'], a: 1,
      exp: 'Streak (the powder color) is less variable than surface color.' },
    { q: 'The silica tetrahedron consists of:',
      opts: ['4 Si + 1 O','1 Si + 4 O','2 Si + 2 O','1 Si + 1 O'], a: 1,
      exp: 'One silicon atom bonded to four oxygen atoms in a tetrahedral geometry.' },
    { q: 'Diamond\u2019s hardness on the Mohs scale is:',
      opts: ['5','7','10','20'], a: 2, exp: 'Diamond sits at the top of the scale at 10.' },
    { q: 'A mineral must be:',
      opts: ['Organic','Amorphous','Naturally occurring, inorganic, and crystalline','Always rare'], a: 2,
      exp: 'All four criteria (naturally occurring, inorganic, solid, definite composition, orderly internal structure) must be met.' }
  ]
});

CH.push({
  id:'igneous', title:'Igneous Rocks', sub:'Fire-Formed Rocks',
  html: `
    <p><strong>Igneous rocks</strong> form from the cooling and solidification of molten rock. If the melt cools underground, the rock is <em>intrusive</em> (or <em>plutonic</em>); if it erupts and cools at the surface, it is <em>extrusive</em> (or <em>volcanic</em>).</p>
    <h2>Cooling Rate and Texture</h2>
    <p>How quickly a melt cools controls its <strong>texture</strong>. Slow cooling at depth allows large interlocking crystals to grow (coarse, or <em>phaneritic</em>, texture — e.g., granite). Rapid cooling at the surface traps crystals before they can grow (fine, or <em>aphanitic</em>, texture — e.g., basalt). Extremely fast quenching can produce glass (obsidian). Frothy eruptions preserve bubbles as vesicles (pumice, scoria).</p>
    <h2>Composition</h2>
    <p>The four compositional groups, from silica-rich (felsic) to silica-poor (mafic/ultramafic):</p>
    <ul>
      <li><strong>Felsic</strong> — high silica, light-colored (granite, rhyolite). Rich in quartz, K-feldspar, Na-plagioclase.</li>
      <li><strong>Intermediate</strong> — medium silica (diorite, andesite). Common at subduction-zone volcanoes.</li>
      <li><strong>Mafic</strong> — low silica, dark-colored (gabbro, basalt). Rich in pyroxene and Ca-plagioclase; dominant in oceanic crust.</li>
      <li><strong>Ultramafic</strong> — very low silica (peridotite). Dominant in the upper mantle.</li>
    </ul>
    <h2>Bowen's Reaction Series</h2>
    <p>The Canadian petrologist N.L. Bowen showed experimentally that minerals crystallize from a cooling mafic magma in a predictable order: olivine first (at highest temperature), then pyroxene, amphibole, biotite, and finally K-feldspar and quartz at the lowest temperatures. This sequence, known as <strong>Bowen's reaction series</strong>, explains why certain minerals are almost never found together in the same rock.</p>
  `,
  terms: [
    ['Igneous rock','A rock formed from the cooling and solidification of magma or lava.'],
    ['Intrusive / plutonic','Igneous rock that solidified below Earth\u2019s surface, typically with coarse crystals.'],
    ['Extrusive / volcanic','Igneous rock that solidified at the surface, typically with fine crystals or glass.'],

CH.push({
  id:'sedimentary', title:'Sedimentary Rocks', sub:'Pages of Earth\u2019s Diary',
  html: `
    <p><strong>Sedimentary rocks</strong> form at or near Earth's surface from the <em>products</em> of weathering. They are the rocks geologists read to reconstruct ancient environments, because the size, shape, and composition of their particles record the conditions under which they were deposited.</p>
    <h2>Formation</h2>
    <p>Sedimentary rocks go through five overlapping processes: weathering of the source rock, erosion and transport of the debris, deposition in a low-energy setting, burial and compaction, and cementation by minerals precipitated from pore fluids. The final two steps — compaction and cementation — are together called <strong>lithification</strong>.</p>
    <h2>Classification</h2>
    <ul>
      <li><strong>Detrital (clastic)</strong> — made of particles eroded from older rocks. Classified by grain size: <em>conglomerate</em> (rounded gravel), <em>breccia</em> (angular gravel), <em>sandstone</em>, <em>siltstone</em>, <em>shale/mudstone</em>.</li>
      <li><strong>Chemical</strong> — precipitated from water. <em>Limestone</em> (CaCO₃), <em>rock salt</em>, <em>rock gypsum</em>, <em>chert</em>.</li>
      <li><strong>Biochemical</strong> — from the remains of organisms. Fossiliferous limestone, coquina, coal.</li>
    </ul>
    <h2>Sedimentary Structures</h2>
    <p>As sediment is deposited, it records its environment in the geometry of the bed itself. <strong>Bedding</strong> is the fundamental layering. <strong>Cross-bedding</strong> records dunes or ripples advancing in a current. <strong>Graded bedding</strong> (coarse at the base grading to fine at the top) is the fingerprint of a turbidity current. <strong>Mud cracks</strong> and <strong>ripple marks</strong> preserve surface conditions literally in the rock.</p>
    <h2>Why Sedimentary Rocks Matter</h2>
    <p>Sedimentary rocks cover about 75% of the continents (though only about 5% of the crust by volume). They host almost all of Earth's fossil record, virtually all oil and gas, and the majority of economic deposits of coal, iron, and salt.</p>
  `,
  terms: [
    ['Sedimentary rock','Rock formed from accumulated and lithified products of weathering.'],
    ['Lithification','The set of processes (compaction + cementation) that turn sediment into rock.'],
    ['Detrital / clastic','Sedimentary rocks made of pieces of older rocks, classified by grain size.'],
    ['Chemical sedimentary rock','Rock precipitated from ions in solution (e.g. limestone, rock salt).'],
    ['Cross-bedding','Inclined internal laminations recording dune or ripple migration.'],
    ['Graded bedding','A bed that grades from coarse at the base to fine at the top, typical of turbidity currents.']
  ],
  quiz: [
    { q: 'Which sedimentary rock consists of rounded gravel?',
      opts: ['Breccia','Conglomerate','Shale','Limestone'], a: 1,
      exp: 'Conglomerate = rounded clasts; breccia = angular clasts.' },

      opts: ['Melting of sediment','Compaction and cementation of sediment','Erosion of bedrock','Biological activity only'], a: 1,
      exp: 'These are the processes that convert loose sediment into rock.' },
    { q: 'A graded bed most likely records:',
      opts: ['A dune','A turbidity current','A mud crack','A volcanic ashfall'], a: 1,
      exp: 'Coarse-to-fine grading is the classic fingerprint of a turbidity current event.' }
  ]
});

CH.push({
  id:'metamorphic', title:'Metamorphic Rocks', sub:'Rocks Changed Without Melting',
  html: `
    <p><strong>Metamorphism</strong> is the change in a pre-existing rock — igneous, sedimentary, or even another metamorphic rock — caused by heat, pressure, directed stress, and/or chemically active fluids, <em>without</em> the rock actually melting. If it melts, you're back to igneous processes.</p>
    <h2>Agents of Metamorphism</h2>
    <ul>
      <li><strong>Heat</strong> — from deep burial or from nearby magma. Drives recrystallization: small crystals grow larger and new stable minerals form.</li>
      <li><strong>Pressure</strong> — confining pressure from burial, and <em>differential stress</em> from tectonic squeezing, which produces foliation.</li>
      <li><strong>Chemically active fluids</strong> — typically hot water carrying dissolved ions; can add, remove, or swap atoms in minerals (metasomatism).</li>
    </ul>
    <h2>Types</h2>
    <ul>
      <li><strong>Contact (thermal) metamorphism</strong> — heat-driven, localized next to a magma body. Produces non-foliated rocks like hornfels.</li>
      <li><strong>Regional metamorphism</strong> — large-scale, tied to mountain building. Produces foliated sequences that grade from slate → phyllite → schist → gneiss as conditions intensify.</li>
      <li><strong>Fault / dynamic metamorphism</strong> — grinding and shearing along fault zones. Produces mylonite.</li>
      <li><strong>Burial metamorphism</strong> — low-grade changes in deeply buried sedimentary piles.</li>
    </ul>
    <h2>Foliated vs. Non-Foliated</h2>
    <p><strong>Foliation</strong> is planar fabric produced when minerals grow or rotate under directed stress. Slate, schist, and gneiss are foliated. Marble (from limestone) and quartzite (from sandstone) are non-foliated because their main mineral (calcite or quartz) doesn't develop a sheet-like habit under stress.</p>
  `,
  terms: [
    ['Metamorphism','Change in an existing rock from heat, pressure, or fluids, without melting.'],
    ['Foliation','Planar fabric in metamorphic rocks produced by directed stress.'],
    ['Contact metamorphism','Heat-driven metamorphism adjacent to a magma intrusion.'],
    ['Regional metamorphism','Large-scale metamorphism tied to mountain-building stress and heat.'],
    ['Schist','A medium- to coarse-grained foliated metamorphic rock with visible platy minerals.'],
    ['Gneiss','A high-grade foliated rock with alternating light and dark mineral bands.']
  ],
  quiz: [
    { q: 'Metamorphism always involves:',
      opts: ['Complete melting','Changes without melting','Erosion','Fossilization'], a: 1,
      exp: 'By definition, metamorphism stops short of melting.' },
    { q: 'Which of these is foliated?',
      opts: ['Marble','Quartzite','Gneiss','Hornfels'], a: 2, exp: 'Gneiss shows banded foliation.' },
    { q: 'Contact metamorphism is driven mainly by:',
      opts: ['Directed pressure','Heat from a nearby intrusion','Weathering','Sea water only'], a: 1,
      exp: 'Localized heat from magma produces thermal (contact) metamorphism.' }
  ]

CH.push({
  id:'tectonics', title:'Plate Tectonics', sub:'The Unifying Theory of Geology',
  html: `
    <p>Plate tectonics is to geology what the periodic table is to chemistry — a unifying framework that ties together phenomena which once seemed unrelated: mountain building, earthquakes, volcanism, the shapes of coastlines, and the distribution of fossils across continents.</p>
    <p>The theory holds that Earth's outer shell — the <strong>lithosphere</strong> — is broken into roughly a dozen rigid <em>plates</em> that move over the hot, ductile <strong>asthenosphere</strong> below. Interactions at plate boundaries produce nearly all of Earth's earthquakes, most volcanoes, and the world's great mountain belts.</p>
    <h2>Three Boundary Types</h2>
    <ul>
      <li><strong>Divergent</strong> — plates move apart. New oceanic lithosphere forms at <em>mid-ocean ridges</em> by seafloor spreading. Examples: Mid-Atlantic Ridge, East African Rift.</li>
      <li><strong>Convergent</strong> — plates move toward each other. A dense oceanic plate <em>subducts</em> beneath a less-dense plate, producing deep trenches, explosive volcanoes, and strong earthquakes. When two continents collide, neither subducts easily and you get mountain belts like the Himalayas.</li>
      <li><strong>Transform</strong> — plates slide past each other horizontally. Most transform faults connect segments of mid-ocean ridge, but the famous San Andreas Fault cuts right through California.</li>
    </ul>
    <h2>Evidence</h2>
    <p>Plate tectonics became the scientific consensus in the 1960s after several independent lines of evidence converged:</p>
    <ol>
      <li><strong>Continental fit</strong> — the puzzle-piece match of South America and Africa.</li>
      <li><strong>Matching fossils and rock belts</strong> across oceans that are now thousands of miles wide.</li>
      <li><strong>Paleomagnetism</strong> — the "fossil" magnetism locked in iron-bearing rocks records changes in Earth's magnetic field and shows that continents have wandered.</li>
      <li><strong>Seafloor spreading and magnetic stripes</strong> — symmetric bands of normal and reversed polarity rock on either side of mid-ocean ridges, like a tape recorder of Earth's magnetic history.</li>
      <li><strong>Earthquake and volcano distribution</strong> — concentrated along plate boundaries, not randomly.</li>
    </ol>
    <h2>Driving Mechanism</h2>
    <p>Plates move because of forces acting at their edges and bases: <em>ridge push</em> (gravitational sliding away from the elevated mid-ocean ridge), <em>slab pull</em> (the subducting plate's own weight dragging the rest of the plate after it — the strongest driver), and <em>basal drag</em> from convecting mantle beneath.</p>
  `,
  terms: [
    ['Lithosphere','The rigid outer shell of Earth, consisting of crust plus uppermost mantle, broken into plates.'],
    ['Asthenosphere','The weak, ductile layer of the upper mantle on which plates slide.'],
    ['Divergent boundary','Plate boundary where new crust forms as plates move apart.'],
    ['Convergent boundary','Plate boundary where plates collide; one may subduct beneath the other.'],
    ['Transform boundary','Plate boundary where plates slide past each other horizontally.'],
    ['Seafloor spreading','The process by which new oceanic lithosphere is generated at mid-ocean ridges.'],
    ['Slab pull','The force generated as a subducting plate\u2019s weight drags the rest of the plate along.']
  ],
  quiz: [
    { q: 'New oceanic lithosphere is created at:',
      opts: ['Convergent boundaries','Divergent boundaries','Transform boundaries','Hotspots only'], a: 1,
      exp: 'At divergent boundaries (mid-ocean ridges), seafloor spreading produces new oceanic crust.' },
    { q: 'The San Andreas Fault is an example of a:',
      opts: ['Convergent boundary','Divergent boundary','Transform boundary','Hotspot'], a: 2,
      exp: 'It\u2019s a continental transform where the Pacific Plate slides past the North American Plate.' },
    { q: 'The strongest driver of plate motion is generally considered to be:',
      opts: ['Earth\u2019s rotation','Ridge push','Slab pull','Tidal force'], a: 2,
      exp: 'Slab pull — the weight of the descending subducting slab — dominates the force balance.' },
    { q: 'Symmetric magnetic stripes on either side of a mid-ocean ridge are evidence for:',
      opts: ['A hollow Earth','Continental collision','Seafloor spreading','Asteroid impacts'], a: 2,
      exp: 'They record alternating magnetic polarity as new ocean crust forms and spreads.' }
  ]
});

CH.push({
  id:'earthquakes', title:'Earthquakes &amp; Earth\u2019s Interior', sub:'How Seismology Sees Inside the Planet',
  html: `
    <p>An <strong>earthquake</strong> is the release of stored elastic energy when rocks on either side of a fault slip past each other. The point at depth where the slip begins is the <em>focus</em> (or <em>hypocenter</em>); the point directly above it on the surface is the <em>epicenter</em>.</p>
    <h2>Elastic Rebound</h2>
    <p>Rocks on opposite sides of a locked fault deform as tectonic stress builds, storing elastic strain energy like a bent spring. When friction is finally overcome, the rocks snap back toward their unstressed shape — <strong>elastic rebound</strong> — releasing the stored energy as seismic waves.</p>
    <h2>Seismic Waves</h2>
    <ul>
      <li><strong>Body waves</strong> travel through Earth's interior:
        <ul>
          <li><strong>P-waves</strong> (primary) — push-pull compressional waves, the fastest. They pass through solids and liquids.</li>
          <li><strong>S-waves</strong> (secondary) — side-to-side shear waves, slower than P. They only pass through solids.</li>
        </ul>
      </li>
      <li><strong>Surface waves</strong> travel along Earth's surface, arrive after body waves, and are typically the largest and most destructive. Two types: <em>Love waves</em> (horizontal shear) and <em>Rayleigh waves</em> (rolling motion).</li>
    </ul>
    <h2>Locating an Earthquake</h2>
    <p>Because P-waves travel faster than S-waves, the time gap between their arrivals at a single seismograph station gives the distance to the source. With three or more stations, a technique called <strong>triangulation</strong> pinpoints the epicenter where the three circles of equal distance meet.</p>
    <h2>Magnitude vs. Intensity</h2>
    <ul>
      <li><strong>Magnitude</strong> measures the energy released at the source — a single number for the earthquake as a whole. The <em>moment magnitude</em> scale is now the standard; each whole number step represents ~32× the energy.</li>
      <li><strong>Intensity</strong> measures shaking severity at a particular place, using the Modified Mercalli scale (I to XII) based on observed effects on people, structures, and landscape.</li>
    </ul>
    <h2>Earth's Layered Interior</h2>
    <p>Seismic waves refract and reflect at boundaries between layers of different density and composition, letting seismologists map the inside of a planet they can't drill into. From outside in: <strong>crust</strong> (thin, brittle), <strong>mantle</strong> (solid but slowly flowing), <strong>outer core</strong> (liquid iron-nickel — it stops S-waves and creates the S-wave shadow zone), and <strong>inner core</strong> (solid iron-nickel under immense pressure). The presence of a liquid outer core is one of the most elegant deductions in the history of geophysics.</p>
  `,
  terms: [
    ['Focus (hypocenter)','The point at depth where an earthquake\u2019s fault slip begins.'],
    ['Epicenter','The point on the surface directly above the focus.'],
    ['Elastic rebound','The release of stored strain energy as rocks snap back after a fault slips.'],
    ['P-wave','Fast compressional body wave; passes through solids and liquids.'],
    ['S-wave','Shear body wave; passes through solids only, used to detect the liquid outer core.'],
    ['Moment magnitude','Energy-based earthquake magnitude scale, now standard.'],
    ['Modified Mercalli intensity','A 12-level scale of local shaking severity based on observed effects.'],
    ['Shadow zone','Region on Earth\u2019s surface where S-waves are absent because of the liquid outer core.']
  ],
  quiz: [
    { q: 'Which waves are blocked by Earth\u2019s liquid outer core?',
      opts: ['P-waves','S-waves','Surface waves','Sound waves'], a: 1,
      exp: 'Shear waves cannot propagate through a liquid, creating an S-wave shadow zone.' },
    { q: 'The epicenter is:',
      opts: ['The point at depth where slip begins','The point on the surface above the focus','The edge of the fault zone','A type of wave'], a: 1,
      exp: 'Focus = depth point; epicenter = surface point above it.' },
    { q: 'Moment magnitude measures:',
      opts: ['Shaking at a location','Energy released by the earthquake as a whole','Number of buildings damaged','Fault length only'], a: 1,
      exp: 'Moment magnitude is a single energy-based value for the whole event.' },
    { q: 'Elastic rebound explains:',
      opts: ['Why sediment compacts','Why rocks deform then suddenly slip on faults','How magma erupts','How glaciers flow'], a: 1,
      exp: 'Stored strain is released as seismic waves when friction is overcome.' }
  ]
});

CH.push({
  id:'volcanoes', title:'Volcanoes &amp; Volcanism', sub:'Magma at the Surface',
  html: `
    <p>Volcanoes are the Earth's pressure-release valves — places where molten rock, dissolved gases, and solid debris from the interior make it all the way to the surface. The <strong>style</strong> of an eruption (quiet vs. explosive) and the <strong>shape</strong> of the resulting edifice are both controlled primarily by the magma's <em>viscosity</em>, which is in turn controlled by its silica content and temperature.</p>
    <h2>Magma Properties</h2>
    <ul>
      <li><strong>Mafic (basaltic) magmas</strong> — low silica, low viscosity, erupt at high temperatures (~1100–1200°C). Gases escape easily; eruptions are typically effusive and non-explosive. Produces broad <em>shield volcanoes</em> and extensive lava flows (Hawaii, Iceland).</li>
      <li><strong>Intermediate (andesitic)</strong> — medium silica and viscosity, cooler. Trapped gases produce explosive eruptions. Builds <em>composite (strato-) volcanoes</em> with alternating lava and pyroclastic layers (Mt. Fuji, Mt. St. Helens).</li>
      <li><strong>Felsic (rhyolitic)</strong> — high silica, very high viscosity, coolest. Gas cannot escape easily; eruptions can be catastrophically explosive. Forms <em>lava domes</em>, <em>calderas</em>, and pyroclastic flows.</li>
    </ul>
    <h2>Eruptive Products</h2>
    <ul>
      <li><strong>Lava flows</strong> — pahoehoe (smooth, ropy) and aa (blocky, rubbly) at basaltic volcanoes.</li>
      <li><strong>Pyroclastic material (tephra)</strong> — fragmented rock ejected into the air: ash, lapilli, blocks and bombs.</li>
      <li><strong>Pyroclastic flows</strong> — dense, fast-moving clouds of hot gas and ash. Among the deadliest volcanic hazards. Temperature 200–700°C, speed >100 km/h.</li>
      <li><strong>Lahars</strong> — volcanic mudflows triggered by rain, glacier melt, or crater-lake breach.</li>
      <li><strong>Gases</strong> — mainly water vapor, CO₂, SO₂, and minor amounts of H₂S, HCl, HF.</li>
    </ul>
    <h2>Why Volcanoes Occur Where They Do</h2>
    <p>More than 90% of the world's volcanoes lie along plate boundaries:</p>
    <ul>
      <li><strong>Divergent (mid-ocean ridges and rifts)</strong> — decompression melting of the rising mantle produces basaltic magma.</li>
      <li><strong>Convergent (subduction zones)</strong> — water from the descending plate lowers the melting temperature of the overlying mantle, producing intermediate magmas and explosive volcanoes in arcs (the Pacific "Ring of Fire").</li>
      <li><strong>Hotspots</strong> — fixed plumes of unusually hot mantle melt beneath moving plates, leaving trails of extinct volcanoes (Hawaii, Yellowstone, Iceland).</li>
    </ul>
  `,
  terms: [

    ['Caldera','A large, basin-like depression formed by collapse after a massive eruption.'],
    ['Lahar','A volcanic mudflow or debris flow.'],
    ['Hotspot','A region of volcanism from a mantle plume, often unrelated to plate boundaries.']
  ],
  quiz: [
    { q: 'Which magma type produces the most explosive eruptions?',
      opts: ['Basaltic','Andesitic','Rhyolitic','None are explosive'], a: 2,
      exp: 'High silica → high viscosity → trapped gases → explosive eruptions.' },
    { q: 'Shield volcanoes are built primarily of:',
      opts: ['Silica-rich lava','Basaltic lava','Pyroclastic material','Granite'], a: 1,
      exp: 'Fluid basaltic flows create broad, low-angle shields.' },
    { q: 'A lahar is:',
      opts: ['A pyroclastic flow','A volcanic mudflow','A mafic intrusion','A hotspot'], a: 1,
      exp: 'Lahars are volcanic debris flows, often triggered by rain or glacier melt.' },
    { q: 'The Pacific Ring of Fire is dominated by:',

      exp: 'Subduction around the Pacific Basin produces most of the Ring\u2019s volcanoes.' }

CH.push({
  id:'weathering', title:'Weathering &amp; Soil', sub:'Breaking Rock Down Where It Stands',
  html: `
    <p><strong>Weathering</strong> is the decomposition and disintegration of rock <em>in place</em>, as distinct from <em>erosion</em>, which also moves the debris. Weathering prepares the materials the rest of the surface processes act upon. It has two complementary modes: mechanical and chemical.</p>
    <h2>Mechanical Weathering</h2>
    <p>Physical breakup of rock without changing its composition. Key processes:</p>
    <ul>
      <li><strong>Frost wedging</strong> — water freezes in cracks, expanding about 9%, prying the rock apart. Dominant in high latitudes and mountains.</li>
      <li><strong>Exfoliation / unloading</strong> — removal of overlying rock reduces pressure, letting the bedrock expand outward in curved sheets. Yosemite's domes.</li>
      <li><strong>Thermal expansion</strong> — daily heating and cooling expands and contracts outer layers, eventually causing surface flaking.</li>
      <li><strong>Biological activity</strong> — plant roots wedge into cracks; burrowing animals mix and fragment soil; lichens slowly etch rock surfaces.</li>
    </ul>
    <h2>Chemical Weathering</h2>
    <p>Alteration of a rock's minerals by reactions with water, oxygen, and acids. Three main reactions:</p>
    <ul>
      <li><strong>Dissolution</strong> — rainwater slightly acidic from dissolved CO₂ eats away limestone and rock salt. Responsible for caves, sinkholes, karst.</li>
      <li><strong>Oxidation</strong> — iron-bearing minerals react with oxygen to form iron oxides (rust). Turns rocks red-brown.</li>
      <li><strong>Hydrolysis</strong> — silicates react with water to form clays. Feldspar → kaolinite is the great example. This is how the bulk of the clay in soils is created.</li>
    </ul>
    <p>Chemical weathering is fastest in warm, wet climates and slowest in cold or dry ones. Surface area matters enormously: a fractured or finely divided rock weathers far faster than a solid boulder of the same mass.</p>
    <h2>Soil</h2>
    <p>Soil is the product of weathering combined with organic matter. A mature soil develops distinct horizons:</p>
    <ul>
      <li><strong>O horizon</strong> — organic debris, mostly plant material.</li>
      <li><strong>A horizon (topsoil)</strong> — mineral matter mixed with decomposed organic material (humus); this is where most root growth happens.</li>
      <li><strong>E horizon</strong> — leached zone, lighter colored, from which minerals have been washed downward.</li>
      <li><strong>B horizon (subsoil)</strong> — accumulation zone where clay, iron oxides, and soluble minerals collect after leaching from above.</li>
      <li><strong>C horizon</strong> — weathered parent material, transitional to bedrock.</li>
    </ul>
  `,
  terms: [
    ['Weathering','Disintegration and decomposition of rock in place.'],
    ['Mechanical weathering','Physical breakup of rock without changing its chemistry.'],
    ['Chemical weathering','Alteration of rock minerals by water, oxygen, and acids.'],
    ['Frost wedging','Mechanical weathering by freezing water in cracks.'],
    ['Hydrolysis','Chemical reaction of silicates with water, producing clays.'],
    ['Soil horizon','A distinct layer in a mature soil profile, labeled O, A, E, B, and C.']
  ],

      opts: ['Cold, dry climates','Warm, wet climates','Polar deserts','Underground'], a: 1,
      exp: 'Heat and water dramatically accelerate chemical reactions.' },
    { q: 'The B horizon is typically:',

CH.push({
  id:'runningwater', title:'Running Water &amp; Streams', sub:'The Most Important Erosional Agent on Land',
  html: `
    <p>Rivers and streams move more sediment than any other surface process, and they carve most of the landscape on every continent. The physics is deceptively simple: gravity pulls water downhill; the water picks up, carries, and drops material along the way.</p>
    <h2>The Hydrologic Cycle</h2>
    <p>Water on Earth moves continuously among ocean, atmosphere, land, and living things. The <strong>hydrologic cycle</strong> balances evaporation (mostly from oceans), precipitation, infiltration, runoff, and transpiration. Only a tiny fraction of all water is in streams at any moment, but that fraction does a disproportionate share of the geologic work.</p>
    <h2>Stream Basics</h2>
    <ul>
      <li><strong>Discharge</strong> — the volume of water passing a point per unit time (m³/s). Discharge equals cross-sectional area × average velocity.</li>
      <li><strong>Gradient</strong> — the slope of the stream: meters of drop per kilometer. Steeper near headwaters, gentler near the mouth.</li>
      <li><strong>Competence</strong> — the largest particle size a stream can move at a given velocity.</li>
      <li><strong>Capacity</strong> — the total amount of sediment a stream can carry.</li>
    </ul>
    <h2>How Streams Erode and Deposit</h2>
    <p>Streams erode by lifting loose particles, abrading the channel floor, and dissolving soluble rock. The load is carried three ways: in <strong>solution</strong> (dissolved ions), in <strong>suspension</strong> (clay and silt held in the moving water column — usually the biggest fraction by mass), and as <strong>bed load</strong> (sand and gravel bouncing and rolling along the bottom).</p>
    <p>When velocity drops, sediment is deposited — coarsest first. That sorting produces recognizable features: <em>alluvial fans</em> where a steep canyon opens onto a gentler valley, <em>deltas</em> where the river meets standing water, and <em>floodplains</em> and <em>natural levees</em> along meandering reaches.</p>
    <h2>Channel Patterns</h2>
    <ul>
      <li><strong>Straight</strong> — rare and short-lived in nature.</li>
      <li><strong>Meandering</strong> — single sinuous channel on a low gradient. Cuts outside banks, deposits point bars inside bends, and periodically cuts off loops to form oxbow lakes.</li>
      <li><strong>Braided</strong> — multiple shifting channels separated by gravel bars; typical of high-sediment, variable-discharge rivers fed by glaciers or eroding mountains.</li>
    </ul>
    <h2>Drainage Basins</h2>
    <p>A <strong>drainage basin</strong> is all the land that drains to a single stream system. The boundary is called a <em>divide</em>. The pattern of tributaries — dendritic, radial, rectangular, trellis — reflects the underlying geology.</p>
  `,
  terms: [
    ['Discharge','Volume of water passing a point per unit time in a stream.'],
    ['Gradient','A stream\u2019s slope (drop per unit distance).'],
    ['Bed load','Sediment rolled and bounced along the channel floor.'],
    ['Meander','A single, sinuous bend in a low-gradient stream.'],
    ['Floodplain','The flat valley area adjacent to a channel that is covered by floodwater.'],
    ['Drainage basin','The area that drains to a given stream system.']
  ],

      exp: 'Braided channels form when sediment supply overwhelms the stream\u2019s carrying capacity.' },
    { q: 'Point bars are deposited:',

  ]

CH.push({
  id:'groundwater', title:'Groundwater', sub:'The Hidden Reservoir',
  html: `
    <p>Of all the fresh liquid water on Earth, more than 98% is underground, stored in the pore spaces and fractures of rocks and sediment. <strong>Groundwater</strong> is simultaneously a vital resource, a sculptor of landscapes, and a frequent target of pollution.</p>
    <h2>Porosity and Permeability</h2>
    <ul>
      <li><strong>Porosity</strong> is the percentage of a rock or sediment that is open space (as a decimal or percent).</li>
      <li><strong>Permeability</strong> is the ability of that open space to transmit fluids — a function of how <em>connected</em> and how <em>large</em> the pores are.</li>
    </ul>
    <p>Loose gravel can be both highly porous and highly permeable. Clay is porous but nearly impermeable because its individual pores are microscopic. Fractured granite is low-porosity but can be surprisingly permeable along its cracks.</p>
    <h2>The Water Table</h2>
    <p>Below the surface, the upper boundary between the unsaturated <em>zone of aeration</em> (air and water in the pores) and the fully saturated <em>zone of saturation</em> (all pores filled with water) is called the <strong>water table</strong>. The water table is not flat — it is a subdued copy of the surface topography, rising under hills and falling under valleys.</p>
    <h2>Aquifers</h2>
    <p>A body of rock or sediment that holds and transmits usable amounts of groundwater is an <strong>aquifer</strong>. An <em>unconfined aquifer</em> has the water table as its upper boundary. A <em>confined aquifer</em> is sandwiched between two impermeable <em>aquitards</em>; if the confining pressure is high, wells drilled into it can flow at the surface without pumping — an <em>artesian well</em>.</p>
    <h2>Groundwater and Landscapes</h2>
    <p>Slightly acidic groundwater is relentless on limestone. Dissolution along joints and bedding planes over tens of thousands of years creates <strong>caves</strong>, and when a cave roof collapses it forms a <strong>sinkhole</strong>. Landscapes dominated by these features are called <em>karst</em>. Stalactites grow down from cave roofs and stalagmites grow up from cave floors as dripping water deposits CaCO₃.</p>
    <h2>Groundwater Problems</h2>
    <ul>
      <li><strong>Overpumping</strong> — pumping faster than natural recharge lowers the water table, can cause wells to go dry, and may allow saltwater intrusion in coastal aquifers.</li>
      <li><strong>Subsidence</strong> — large-scale overpumping causes the ground itself to sink as the dewatered sediments compact. Parts of California\u2019s Central Valley have subsided by tens of feet.</li>
      <li><strong>Contamination</strong> — once a plume of contaminant enters an aquifer, it is slow, expensive, and sometimes impossible to remove.</li>
    </ul>
  `,
  terms: [

    ['Permeability','Ability of connected pore space to transmit fluids.'],
    ['Water table','The upper surface of the saturated zone of groundwater.'],
    ['Aquifer','A permeable body of rock that stores and transmits usable groundwater.'],
    ['Artesian well','A well in a confined aquifer whose pressure drives water to the surface without pumping.'],
    ['Karst','Landscape produced by dissolution of carbonate rock — caves, sinkholes, and springs.']
  ],
  quiz: [

      exp: 'Clay\u2019s tiny pores don\u2019t transmit water effectively even though they store a lot of it.' },
    { q: 'An artesian well:',
      opts: ['Always dries up in summer','Flows at the surface without pumping','Taps an unconfined aquifer','Must be drilled into igneous rock'], a: 1,
      exp: 'An artesian well is drilled into a confined aquifer whose pressure is sufficient to lift water to the surface.' },
    { q: 'Karst landscapes are associated with:',

CH.push({

  html: `
    <p>Glaciers and wind are both powerful shapers of landscapes even though they affect only a fraction of the Earth's surface at any given moment. In the recent geological past, ice and wind have both been far more influential than they are today.</p>
    <h2>Glaciers</h2>
    <p>A <strong>glacier</strong> is a thick mass of ice that forms on land and flows under its own weight. Two broad types: <em>alpine (valley) glaciers</em> in mountains, and vast <em>continental ice sheets</em> like those still covering Antarctica and Greenland.</p>
    <h3>How Ice Flows</h3>
    <p>Ice appears solid but behaves as a plastic under its own weight. A glacier moves by two mechanisms: <em>internal flow</em> (deformation of ice crystals), and <em>basal slip</em> (sliding on a thin film of meltwater at the base, where pressure is high enough to lower the melting point).</p>
    <h3>Erosion and Deposition</h3>
    <ul>
      <li><strong>Plucking</strong> — ice freezes to bedrock and tears pieces loose as it moves.</li>
      <li><strong>Abrasion</strong> — embedded rock fragments grind the underlying surface, leaving striations and producing fine <em>rock flour</em>.</li>
      <li><strong>Glacial landforms</strong> — U-shaped valleys (vs. V-shaped river valleys), cirques, arêtes, horns, hanging valleys, fjords, moraines, drumlins, eskers, kettles, erratics.</li>
    </ul>
    <h3>Ice Ages</h3>
    <p>During the Pleistocene (~2.6 million to ~11,700 years ago), ice sheets repeatedly advanced and retreated across the high and mid-latitudes. Their fingerprints are everywhere in North America and Europe, from the Great Lakes and Cape Cod to the scoured granite of the Canadian Shield. Ice ages are driven by subtle variations in Earth's orbit (<strong>Milankovitch cycles</strong>) amplified by feedbacks involving ice cover and greenhouse gases.</p>
    <h2>Deserts and Wind</h2>
    <p>Deserts form where evaporation exceeds precipitation. Most of the world's deserts sit near 30° N and 30° S latitude, where dry air from the Hadley cells descends. Others form in the <em>rain shadow</em> of mountain ranges, in continental interiors far from moist air, or along cold ocean currents.</p>
    <h3>Wind as a Geologic Agent</h3>
    <ul>
      <li><strong>Deflation</strong> — wind lifts loose material, leaving coarser lag behind and forming shallow basins (deflation hollows).</li>
      <li><strong>Abrasion</strong> — wind-blown sand sandblasts exposed rock, producing <em>ventifacts</em>.</li>
      <li><strong>Dunes</strong> — wind deposits sand into distinctive forms: barchan, transverse, longitudinal, parabolic, and star dunes, each reflecting wind regime and sand supply.</li>
      <li><strong>Loess</strong> — fine, wind-blown silt that can form vast, fertile blankets hundreds of feet thick (China's Loess Plateau).</li>
    </ul>
  `,
  terms: [
    ['Glacier','A thick mass of ice formed on land that flows under its own weight.'],

    ['Milankovitch cycles','Periodic variations in Earth\u2019s orbit and axial tilt that pace ice ages.'],
    ['Rain shadow','A dry area on the leeward side of a mountain range.'],
    ['Loess','Wind-deposited silt, often forming fertile, well-drained soils.']
  ],
  quiz: [
    { q: 'A U-shaped valley is most characteristic of:',
      opts: ['River erosion','Wind erosion','Glacial erosion','Wave erosion'], a: 2,
      exp: 'Alpine glaciers broaden and steepen valleys into their characteristic U-cross-section.' },
    { q: 'Rain shadows form:',
      opts: ['Over oceans','On the leeward side of mountains','Only in deserts along the equator','At mid-ocean ridges'], a: 1,
      exp: 'Air loses moisture climbing the windward side, so the leeward side is dry.' },
    { q: 'Milankovitch cycles control:',
      opts: ['Daily tides','Long-term pacing of ice ages','Volcanic eruptions','Plate velocities'], a: 1,
      exp: 'Variations in Earth\u2019s orbit/tilt pace glacial-interglacial cycles.' }
  ]
});

CH.push({
  id:'time', title:'Geologic Time', sub:'Deep Time and How We Read It',
  html: `
    <p>If the whole of Earth history were compressed into a single 24-hour day, the oldest known rocks would form at about 3:00 a.m., multicellular life would appear around 8:00 p.m., dinosaurs would go extinct at 11:39 p.m., and all of recorded human history would occupy the last quarter of the final second. Grasping <strong>deep time</strong> is the essential move that separates geology from other sciences.</p>
    <h2>Relative Time</h2>
    <p>Relative dating places events in order without assigning specific ages. Its rules are almost trivially obvious but extraordinarily powerful:</p>
    <ul>
      <li><strong>Original horizontality</strong> — sediment layers are deposited nearly flat. Tilted or folded layers were deformed after deposition.</li>
      <li><strong>Superposition</strong> — in an undeformed sequence, older layers are below younger ones.</li>
      <li><strong>Lateral continuity</strong> — sediment layers originally extended continuously until something cut or eroded them.</li>
      <li><strong>Cross-cutting relationships</strong> — a feature (fault, dike, erosion surface) that cuts across another is younger than what it cuts.</li>
      <li><strong>Inclusions</strong> — a rock containing fragments of another rock is younger than the fragments it contains.</li>
      <li><strong>Faunal succession</strong> — fossil species follow a consistent, global order through time, allowing strata on different continents to be correlated.</li>
    </ul>
    <h2>Unconformities</h2>
    <p>An <strong>unconformity</strong> is a gap in the rock record — time that is missing because sediment was not deposited, or was deposited and then eroded away. Three kinds: <em>disconformities</em> (parallel layers with erosion between), <em>angular unconformities</em> (tilted layers truncated beneath younger flat ones — Hutton's great discovery at Siccar Point), and <em>nonconformities</em> (sedimentary rock resting directly on igneous or metamorphic basement).</p>
    <h2>Absolute (Radiometric) Dating</h2>
    <p><strong>Radiometric dating</strong> exploits the fact that radioactive isotopes decay at a known, constant rate. Given a starting amount of parent isotope P and its decay product D, and the <strong>half-life</strong> (the time for half the parent to decay), the age of the sample is calculated from the P/D ratio. Commonly used systems include U-Pb (very old rocks, zircons), K-Ar and Ar-Ar (volcanic rocks and ashes), Rb-Sr (whole-rock and mineral), and C-14 (organic remains younger than ~50,000 years).</p>
    <p>The decay constants themselves are measured in the laboratory and calibrated against independent records. Modern radiometric ages are reproducible to better than a percent for many systems.</p>
    <h2>The Geologic Time Scale</h2>
    <p>The rocks and fossils of the world have been organized into a globally agreed timeline, built first by 19th-century geologists using relative methods and later calibrated with radiometric ages. The major divisions, from largest to smallest, are <strong>eon → era → period → epoch</strong>. Earth history is divided into four eons: <em>Hadean</em>, <em>Archean</em>, <em>Proterozoic</em>, and <em>Phanerozoic</em>. The Phanerozoic — "visible life" — is further divided into the Paleozoic, Mesozoic, and Cenozoic eras.</p>
  `,
  terms: [
    ['Superposition','In an undeformed sequence, older rock layers lie below younger ones.'],
    ['Cross-cutting relationships','A feature that cuts across another is younger than the feature it cuts.'],
    ['Unconformity','A gap in the rock record representing missing time.'],
    ['Half-life','The time required for half of the radioactive parent atoms to decay.'],
    ['Radiometric dating','Determining a rock\u2019s age from the ratio of parent to daughter isotopes.'],
    ['Geologic time scale','The globally adopted chronological framework of Earth history.']
  ],
  quiz: [
    { q: 'The principle of superposition states that:',
      opts: ['Older layers are on top','Younger layers are on top in an undeformed sequence','Layers must all be the same age','Faults cut older rocks only'], a: 1,
      exp: 'Unless strata have been overturned, younger beds lie above older ones.' },
    { q: 'An angular unconformity represents:',
      opts: ['A simple gap in deposition','Tilted older rocks truncated by erosion and overlain by younger flat layers','Metamorphism','A hotspot track'], a: 1,
      exp: 'Tilting, erosion, and resumed deposition leave an angular discordance in the rock record.' },
    { q: 'Carbon-14 is most useful for dating:',
      opts: ['The age of the Earth','Rocks older than 1 billion years','Organic remains up to about 50,000 years','Meteorites'], a: 2,
      exp: 'C-14\u2019s short half-life (~5,730 years) limits its practical range to the last ~50 kyr.' },
    { q: 'Which is the correct order from largest to smallest time division?',
      opts: ['Period → Era → Eon → Epoch','Eon → Era → Period → Epoch','Era → Period → Eon → Epoch','Epoch → Period → Era → Eon'], a: 1,
      exp: 'Eon > Era > Period > Epoch.' }
  ]

CH.push({
  id:'mountains', title:'Mountain Building &amp; Crustal Deformation', sub:'How Rocks Bend and Break',
  html: `
    <p>Rocks subjected to stress respond in three ways: <em>elastically</em> (deform and spring back when the stress is removed), <em>plastically</em> (deform permanently by flowing without breaking), or <em>brittly</em> (deform up to a limit and then snap). Which one dominates depends on the rock type, temperature, pressure, rate of stress, and the presence of fluids. Deep and hot favors ductile (plastic) deformation; shallow and cool favors brittle behavior.</p>
    <h2>Folds</h2>
    <ul>
      <li><strong>Anticline</strong> — an upfolded arch with the oldest rocks in its core.</li>
      <li><strong>Syncline</strong> — a downfolded trough with the youngest rocks in its core.</li>
      <li><strong>Monocline</strong> — a one-limbed flexure, a stair-step in otherwise flat layers.</li>
      <li><strong>Dome</strong> and <strong>basin</strong> — circular uplifts and depressions (three-dimensional anticlines and synclines).</li>
    </ul>
    <h2>Faults</h2>
    <p>A <strong>fault</strong> is a fracture along which slip has occurred. Three end-members:</p>
    <ul>
      <li><strong>Normal fault</strong> — the hanging wall slips <em>down</em> relative to the footwall. Result of <em>extensional</em> (pulling-apart) stress. Produces rifts, basin-and-range topography, and horsts and grabens.</li>
      <li><strong>Reverse fault</strong> — the hanging wall slips <em>up</em>. Result of <em>compressional</em> stress. A reverse fault with a shallow dip is a <em>thrust fault</em>, the workhorse of mountain belts.</li>
      <li><strong>Strike-slip fault</strong> — the two sides slide horizontally past each other. Result of <em>shear</em> stress. San Andreas is the textbook example.</li>
    </ul>
    <h2>Mountain Building (Orogenesis)</h2>
    <p>Mountain belts are the most dramatic expression of plate-tectonic stress. Three common mechanisms:</p>
    <ul>
      <li><strong>Subduction-zone (volcanic-arc) orogeny</strong> — an oceanic plate dives beneath a continent; compression, thickening, folding, thrusting, and arc volcanism build a linear mountain belt like the Andes.</li>
      <li><strong>Continent-continent collision</strong> — neither plate subducts easily, so the crust crumples and thickens enormously, producing vast belts like the Himalayas and Alps. Old oceanic material can be scraped up and stranded (ophiolites).</li>
      <li><strong>Accretionary (terrane) orogeny</strong> — small continental fragments, island arcs, and oceanic plateaus are swept into a trench and "welded" onto a continent piece by piece. Much of western North America was built this way.</li>
    </ul>
    <h2>Isostasy</h2>
    <p><strong>Isostasy</strong> is the buoyant balance between the low-density crust and the higher-density mantle. Thick crust floats high (mountain belt); thin crust floats low (ocean basin). As a mountain belt is eroded, its crustal root progressively rises — so the peaks can keep approximately the same elevation for a long time, like an iceberg that keeps rising as it melts.</p>
  `,

    ['Reverse / thrust fault','A dip-slip fault produced by compression, hanging wall up.'],
    ['Orogenesis','The process of mountain building.'],
    ['Isostasy','The buoyant equilibrium between the crust and underlying mantle.']
  ],
  quiz: [
    { q: 'Which fault forms in a tensional (extensional) regime?',
      opts: ['Normal','Reverse','Thrust','Strike-slip'], a: 0,
      exp: 'Extension drops the hanging wall relative to the footwall.' },
    { q: 'An anticline\u2019s core contains:',
      opts: ['The youngest rocks','The oldest rocks','No rocks','Always igneous rocks'], a: 1,
      exp: 'Upfolding brings older rocks to the center of an anticline.' },
    { q: 'The Himalayas are primarily the product of:',
      opts: ['A hotspot','Subduction of oceanic plate beneath a continent','A continent-continent collision','A normal fault'], a: 2,
      exp: 'The India-Eurasia collision is the classic continent-continent orogeny.' },
    { q: 'Isostasy explains why:',

const tocList = $('toc-list');
CH.forEach((c,i)=>{
  const li = document.createElement('li');
  const a = document.createElement('a');
  a.href = '#'+c.id; a.dataset.idx = String(i);
  a.innerHTML = escapeHtml(c.title) + '<span class="dot"></span>';

function loadProgress(){ try{ return JSON.parse(localStorage.getItem(LS)||'{}'); } catch(e){ return {}; } }
function saveProgress(p){ localStorage.setItem(LS, JSON.stringify(p)); }
function markRead(id){ const p = loadProgress(); p.read = p.read || {}; p.read[id] = true; saveProgress(p); updateTOCState(); }
function markQuiz(id, score){ const p = loadProgress(); p.quiz = p.quiz || {}; p.quiz[id] = score; saveProgress(p); updateTOCState(); }

function updateTOCState(){
  const p = loadProgress();
  const anchors = document.querySelectorAll('#toc ol a');
  let done = 0;
  anchors.forEach((a,i)=>{
    const id = CH[i].id;
    a.classList.toggle('done', !!(p.read && p.read[id]));
    a.classList.toggle('quiz-done', !!(p.quiz && p.quiz[id] != null));
    if((p.read && p.read[id]) || (p.quiz && p.quiz[id] != null)) done++;
  });
  $('prog-bar').style.width = Math.round((done/CH.length)*100) + '%';
}

let currentIdx = 0;
function openChapter(i){
  currentIdx = i;
  const c = CH[i];
  document.querySelectorAll('#toc ol a').forEach(a=>a.classList.toggle('active', +a.dataset.idx === i));
  const body = $('chapter-body');
  let termsHtml = '';
  if(c.terms && c.terms.length){
    termsHtml = '<div class="key-terms"><div class="kt-title">Key Terms</div><dl>' +
      c.terms.map(([t,d])=>`<dt>${escapeHtml(t)}</dt><dd>${escapeHtml(d)}</dd>`).join('') +
      '</dl></div>';
  }
  const quizHtml = c.quiz && c.quiz.length ? `
    <div class="quiz" id="quiz-${c.id}">
      <h2>Chapter Quiz</h2>
      <div id="quiz-questions-${c.id}"></div>
      <div class="ch-actions">
        <button class="primary" id="quiz-check-${c.id}">Check Answers</button>
        <button id="quiz-reset-${c.id}">Reset</button>
      </div>
    </div>` : '';
  body.innerHTML = `
    <div class="ch-label">Chapter ${i+1}</div>
    <h1>${c.title}</h1>
    <div class="ch-sub">${c.sub||''}</div>
    ${c.html}
    ${termsHtml}
    ${quizHtml}
    <div class="ch-nav">
      <button id="ch-prev" ${i===0?'disabled':''}>◀ ${i>0?escapeHtml(CH[i-1].title):'Previous'}</button>
      <button id="ch-next" class="primary" ${i===CH.length-1?'disabled':''}>${i<CH.length-1?escapeHtml(CH[i+1].title):'Next'} ▶</button>
    </div>
  `;
  markRead(c.id);
  $('reader').scrollTo({top:0, behavior:'auto'});
  if($('ch-prev')) $('ch-prev').addEventListener('click', ()=>openChapter(Math.max(0,i-1)));
  if($('ch-next')) $('ch-next').addEventListener('click', ()=>openChapter(Math.min(CH.length-1,i+1)));
  if(c.quiz && c.quiz.length){ wireQuiz(c); }
}

function wireQuiz(c){
  const host = document.getElementById('quiz-questions-'+c.id);
  host.innerHTML = c.quiz.map((q, qi)=>`
    <div class="q" data-qi="${qi}">
      <div class="q-prompt">${qi+1}. ${q.q}</div>
      <div class="q-opts">
        ${q.opts.map((o,oi)=>`<label class="q-opt"><input type="radio" name="q-${c.id}-${qi}" value="${oi}"><span>${escapeHtml(o)}</span></label>`).join('')}
      </div>
      <div class="q-exp"></div>
    </div>
  `).join('');
  document.getElementById('quiz-check-'+c.id).addEventListener('click', ()=>{
    let score = 0;
    c.quiz.forEach((q, qi)=>{
      const div = host.querySelector('[data-qi="'+qi+'"]');
      const chosen = div.querySelector('input:checked');
      const val = chosen ? +chosen.value : -1;
      div.classList.add('revealed');
      const exp = div.querySelector('.q-exp');
      exp.textContent = (val===q.a?'Correct — ':'Incorrect — ') + q.exp;
      div.querySelectorAll('.q-opt').forEach((opt, oi)=>{
        opt.classList.remove('correct','incorrect');
        if(oi===q.a) opt.classList.add('correct');
        else if(oi===val) opt.classList.add('incorrect');
      });
      if(val===q.a) score++;
    });
    const pct = Math.round((score/c.quiz.length)*100);
    const scoreHtml = document.createElement('div');
    scoreHtml.className='quiz-score';
    scoreHtml.innerHTML = '<div class="n">'+score+' / '+c.quiz.length+'</div><div>Score: '+pct+'%</div>';
    const existing = host.parentElement.querySelector('.quiz-score');
    if(existing) existing.replaceWith(scoreHtml); else host.parentElement.insertBefore(scoreHtml, host);
    markQuiz(c.id, pct);
    toast('Quiz scored '+pct+'%');
  });
  document.getElementById('quiz-reset-'+c.id).addEventListener('click', ()=>{
    wireQuiz(c);
    const ex = host.parentElement.querySelector('.quiz-score'); if(ex) ex.remove();
  });
}

// Tabs
document.querySelectorAll('header .tabs button').forEach(b=>b.addEventListener('click', ()=>{
  document.querySelectorAll('header .tabs button').forEach(x=>x.classList.remove('active'));
  b.classList.add('active');
  document.querySelectorAll('.pane').forEach(p=>p.classList.remove('active'));
  $('pane-'+b.dataset.view).classList.add('active');
  if(b.dataset.view === 'glossary') renderGlossary();
  if(b.dataset.view === 'flash') initFlash();
}));

// Flashcards
const FC = { deck: [], idx: 0, flipped:false, scope:'all' };
function buildDeck(scope){
  if(scope === 'ch'){ const c = CH[currentIdx]; return (c.terms||[]).map(([t,d])=>({t,d,ch:c.title})); }
  return CH.flatMap(c=>(c.terms||[]).map(([t,d])=>({t,d,ch:c.title})));
}
function initFlash(){
  if(!FC.deck.length){ FC.deck = buildDeck('all'); FC.scope='all'; }
  showCard();
}
function showCard(){
  if(!FC.deck.length){ $('fc-text').textContent='No terms.'; return; }
  const c = FC.deck[FC.idx];
  $('fc-text').textContent = FC.flipped ? c.d : c.t;
  $('fc-card').classList.toggle('flipped', FC.flipped);
  $('fc-meta').textContent = (FC.idx+1)+' / '+FC.deck.length+' · '+c.ch + (FC.flipped?' · definition':' · term');
}
$('fc-card').addEventListener('click', ()=>{ FC.flipped = !FC.flipped; showCard(); });
$('fc-flip').addEventListener('click', ()=>{ FC.flipped = !FC.flipped; showCard(); });
$('fc-prev').addEventListener('click', ()=>{ FC.idx=(FC.idx-1+FC.deck.length)%FC.deck.length; FC.flipped=false; showCard(); });
$('fc-next').addEventListener('click', ()=>{ FC.idx=(FC.idx+1)%FC.deck.length; FC.flipped=false; showCard(); });
$('fc-scope-all').addEventListener('click', ()=>{ FC.deck=buildDeck('all'); FC.idx=0; FC.flipped=false; FC.scope='all'; showCard(); toast('All terms ('+FC.deck.length+').'); });
$('fc-scope-ch').addEventListener('click', ()=>{ FC.deck=buildDeck('ch'); FC.idx=0; FC.flipped=false; FC.scope='ch'; showCard(); toast('Current chapter ('+FC.deck.length+').'); });
$('fc-shuffle').addEventListener('click', ()=>{ for(let i=FC.deck.length-1;i>0;i--){ const j=Math.floor(Math.random()*(i+1)); [FC.deck[i],FC.deck[j]]=[FC.deck[j],FC.deck[i]]; } FC.idx=0; FC.flipped=false; showCard(); toast('Shuffled.'); });

document.addEventListener('keydown', (e)=>{
  if(!document.getElementById('pane-flash').classList.contains('active')) return;
  if(e.target && (e.target.tagName==='INPUT'||e.target.tagName==='TEXTAREA')) return;
  if(e.key===' '||e.key==='Enter'){ e.preventDefault(); FC.flipped=!FC.flipped; showCard(); }
  else if(e.key==='ArrowLeft'){ FC.idx=(FC.idx-1+FC.deck.length)%FC.deck.length; FC.flipped=false; showCard(); }
  else if(e.key==='ArrowRight'){ FC.idx=(FC.idx+1)%FC.deck.length; FC.flipped=false; showCard(); }
});

// Glossary
function renderGlossary(){
  const q = ($('gl-search').value||'').toLowerCase().trim();
  const host = $('gl-list');
  const all = CH.flatMap(c=>(c.terms||[]).map(([t,d])=>({t,d,ch:c.title})));
  all.sort((a,b)=>a.t.localeCompare(b.t));
  const filt = q ? all.filter(e=>e.t.toLowerCase().includes(q) || e.d.toLowerCase().includes(q)) : all;
  host.innerHTML = filt.map(e=>`<div class="gl-entry"><span class="ch-ref">${escapeHtml(e.ch)}</span><span class="term">${escapeHtml(e.t)}</span><div class="def">${escapeHtml(e.d)}</div></div>`).join('') || '<div class="gl-entry">No terms match.</div>';
}
$('gl-search').addEventListener('input', renderGlossary);

// Top search across chapter body text and terms
function buildSearchIndex(){
  return CH.map((c,i)=>{
    const tmp = document.createElement('div'); tmp.innerHTML = c.html;
    return { i, id:c.id, title:c.title, text: (c.title+' '+c.sub+' '+tmp.textContent+' '+(c.terms||[]).map(t=>t.join(' ')).join(' ')).replace(/\s+/g,' ').trim() };
  });
}
const SIDX = buildSearchIndex();
const search = $('search'), results = $('search-results');
search.addEventListener('input', ()=>{
  const q = search.value.trim().toLowerCase();
  if(q.length < 2){ results.classList.remove('show'); return; }
  const hits = [];
  SIDX.forEach(e=>{
    const t = e.text.toLowerCase();
    const idx = t.indexOf(q);
    if(idx >= 0){
      const lo = Math.max(0, idx-40), hi = Math.min(e.text.length, idx+q.length+80);
      const raw = e.text.slice(lo, hi);
      const re = new RegExp('('+q.replace(/[.*+?^${}()|[\]\\]/g,'\\$&')+')', 'ig');
      const snip = escapeHtml(raw).replace(re, '<mark>$1</mark>');
      hits.push({e, snip});
    }
  });
  if(!hits.length){ results.innerHTML='<div class="hit">No matches.</div>'; results.classList.add('show'); return; }
  results.innerHTML = hits.slice(0,20).map(h=>`<a class="hit" href="#${h.e.id}" data-idx="${h.e.i}"><div class="ch">Chapter ${h.e.i+1} — ${escapeHtml(h.e.title)}</div><div class="snip">${h.snip}</div></a>`).join('');
  results.classList.add('show');
  results.querySelectorAll('a.hit').forEach(a=>a.addEventListener('click', (e)=>{
    e.preventDefault();
    document.querySelector('header .tabs button[data-view="read"]').click();
    openChapter(+a.dataset.idx);
    results.classList.remove('show'); search.value=''; history.replaceState(null,'', '#'+a.getAttribute('href').slice(1));
  }));
});
document.addEventListener('click', (e)=>{ if(!results.contains(e.target) && e.target !== search) results.classList.remove('show'); });

// TOC mobile
function openTOC(){ document.querySelector('main').classList.add('toc-open'); }
function closeTOC(){ document.querySelector('main').classList.remove('toc-open'); }
$('toc-btn').addEventListener('click', openTOC);
$('scrim').addEventListener('click', closeTOC);

$('btn-reset-progress').addEventListener('click', ()=>{
  if(!confirm('Reset all reading and quiz progress?')) return;
  localStorage.removeItem(LS); updateTOCState(); toast('Progress reset.');
});

window.addEventListener('load', ()=>{
  const hash = (location.hash||'').slice(1);
  const i = Math.max(0, CH.findIndex(c=>c.id===hash));
  openChapter(i>=0?i:0);
  updateTOCState();
});
})();
</script>
