<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="description" content="Harrison's Blog — a free, browser-based productivity tool from Korb Engineering. No signup, no downloads, works on mobile.">
<title>Harrison's Blog</title>
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --bg: #050a0f;
  --surface: #0a1018;
  --border: #1a2535;
  --cyan: #00d4ff;
  --orange: #ff6600;
  --green: #10b981;
  --red: #ef4444;
  --text: #e2e8f0;
  --text-dim: #94a3b8;
  --content-bg: #0c1219;
  --mono: 'JetBrains Mono', monospace;
  --serif: Georgia, 'Times New Roman', serif;
}

html { font-size: 16px; }
body {
  background: var(--bg);
  color: var(--text);
  font-family: var(--mono);
  min-height: 100vh;
  touch-action: manipulation;
  -webkit-tap-highlight-color: transparent;
}

/* ---- HEADER ---- */
.app-header {
  background: var(--surface);
  border-bottom: 1px solid var(--border);
  padding: 12px 16px;
  display: flex;
  align-items: center;
  justify-content: space-between;
  flex-wrap: wrap;
  gap: 8px;
}
.app-header h1 {
  font-size: 1.1rem;
  font-weight: 700;
  color: var(--cyan);
  white-space: nowrap;
}
.app-header h1 span { color: var(--text-dim); font-weight: 400; }

/* ---- TABS ---- */
.tabs {
  display: flex;
  gap: 4px;
  flex-wrap: wrap;
}
.tab-btn {
  background: transparent;
  border: 1px solid var(--border);
  color: var(--text-dim);
  font-family: var(--mono);
  font-size: 0.75rem;
  padding: 8px 14px;
  min-height: 44px;
  cursor: pointer;
  border-radius: 4px;
  transition: all 0.15s;
}
.tab-btn:hover { border-color: var(--cyan); color: var(--text); }
.tab-btn.active { background: var(--cyan); color: var(--bg); border-color: var(--cyan); font-weight: 600; }

/* ---- VIEWS ---- */
.view { display: none; padding: 16px; max-width: 960px; margin: 0 auto; }
.view.active { display: block; }
.view-reader { max-width: 720px; }

/* ---- BUTTONS ---- */
.btn {
  font-family: var(--mono);
  font-size: 0.8rem;
  padding: 8px 16px;
  min-height: 44px;
  border: 1px solid var(--border);
  border-radius: 4px;
  cursor: pointer;
  background: var(--surface);
  color: var(--text);
  transition: all 0.15s;
}
.btn:hover { border-color: var(--cyan); }
.btn-primary { background: var(--cyan); color: var(--bg); border-color: var(--cyan); font-weight: 600; }
.btn-primary:hover { background: #00b8d9; }
.btn-danger { border-color: var(--red); color: var(--red); }
.btn-danger:hover { background: var(--red); color: #fff; }
.btn-green { border-color: var(--green); color: var(--green); }
.btn-green:hover { background: var(--green); color: var(--bg); }
.btn-orange { border-color: var(--orange); color: var(--orange); }
.btn-orange:hover { background: var(--orange); color: var(--bg); }
.btn-sm { font-size: 0.7rem; padding: 4px 10px; min-height: 36px; }

/* ---- INPUTS ---- */
input, textarea, select {
  font-family: var(--mono);
  font-size: 16px;
  background: var(--bg);
  color: var(--text);
  border: 1px solid var(--border);
  border-radius: 4px;
  padding: 10px 12px;
  width: 100%;
  min-height: 44px;
  outline: none;
  transition: border-color 0.15s;
}
input:focus, textarea:focus, select:focus { border-color: var(--cyan); }
textarea { resize: vertical; line-height: 1.6; }

/* ---- FEED VIEW ---- */
.feed-controls {
  display: flex;
  gap: 8px;
  margin-bottom: 20px;
  flex-wrap: wrap;
}
.feed-controls input { flex: 1; min-width: 200px; }
.feed-controls select { width: auto; min-width: 140px; flex-shrink: 0; }

.post-card {
  background: var(--content-bg);
  border: 1px solid var(--border);
  border-radius: 6px;
  padding: 20px 24px;
  margin-bottom: 16px;
  cursor: pointer;
  transition: border-color 0.15s;
}
.post-card:hover { border-color: var(--cyan); }
.post-card-img {
  width: 100%;
  height: 180px;
  object-fit: cover;
  border-radius: 4px;
  margin-bottom: 12px;
}
.post-card-meta {
  display: flex;
  align-items: center;
  gap: 12px;
  margin-bottom: 8px;
  font-size: 0.75rem;
  color: var(--text-dim);
  flex-wrap: wrap;
}
.post-card-category {
  background: var(--cyan);
  color: var(--bg);
  padding: 2px 8px;
  border-radius: 3px;
  font-size: 0.65rem;
  font-weight: 600;
  text-transform: uppercase;
}
.post-card h2 {
  font-family: var(--serif);
  font-size: 1.4rem;
  color: var(--text);
  margin-bottom: 8px;
  line-height: 1.3;
}
.post-card-excerpt {
  font-family: var(--serif);
  font-size: 0.95rem;
  color: var(--text-dim);
  line-height: 1.6;
}
.empty-feed {
  text-align: center;
  padding: 60px 20px;
  color: var(--text-dim);
}

/* ---- READER VIEW ---- */
.reader-nav {
  display: flex;
  justify-content: space-between;
  align-items: center;
  margin-bottom: 24px;
  flex-wrap: wrap;
  gap: 8px;
}
.reader-header {
  margin-bottom: 32px;
  padding-bottom: 24px;
  border-bottom: 1px solid var(--border);
}
.reader-header h1 {
  font-family: var(--serif);
  font-size: 2rem;
  color: var(--text);
  line-height: 1.2;
  margin-bottom: 12px;
}
.reader-meta {
  display: flex;
  align-items: center;
  gap: 16px;
  font-size: 0.8rem;
  color: var(--text-dim);
  flex-wrap: wrap;
}
.reader-img {
  width: 100%;
  max-height: 400px;
  object-fit: cover;
  border-radius: 6px;
  margin-bottom: 24px;
}
.reader-content {
  font-family: var(--serif);
  font-size: 18px;
  line-height: 1.8;
  color: var(--text);
}
.reader-content h2 {
  font-size: 1.5rem;
  color: var(--cyan);
  margin: 32px 0 12px;
  line-height: 1.3;
}
.reader-content h3 {
  font-size: 1.2rem;
  color: var(--cyan);
  margin: 24px 0 8px;
  line-height: 1.3;
}
.reader-content p { margin-bottom: 16px; }
.reader-content a { color: var(--cyan); text-decoration: underline; }
.reader-content ul, .reader-content ol {
  margin: 0 0 16px 24px;
}
.reader-content li { margin-bottom: 6px; }
.reader-content blockquote {
  border-left: 3px solid var(--cyan);
  padding: 12px 16px;
  margin: 16px 0;
  background: var(--surface);
  border-radius: 0 4px 4px 0;
  color: var(--text-dim);
  font-style: italic;
}
.reader-content code {
  font-family: var(--mono);
  font-size: 0.85em;
  background: var(--surface);
  color: var(--cyan);
  padding: 2px 6px;
  border-radius: 3px;
}
.reader-content pre {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 4px;
  padding: 16px;
  overflow-x: auto;
  margin: 16px 0;
}
.reader-content pre code {
  background: none;
  padding: 0;
  font-size: 0.85rem;
  line-height: 1.5;
}
.reader-content hr {
  border: none;
  border-top: 1px solid var(--border);
  margin: 24px 0;
}
.reader-footer {
  margin-top: 40px;
  padding-top: 20px;
  border-top: 1px solid var(--border);
  display: flex;
  justify-content: space-between;
  flex-wrap: wrap;
  gap: 8px;
}
.reader-tags {
  display: flex;
  gap: 6px;
  flex-wrap: wrap;
  margin-top: 16px;
}
.reader-tag {
  font-family: var(--mono);
  font-size: 0.65rem;
  padding: 2px 8px;
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 3px;
  color: var(--text-dim);
}

/* ---- EDITOR ---- */
.editor-form { display: flex; flex-direction: column; gap: 12px; }
.editor-row {
  display: flex;
  gap: 12px;
  flex-wrap: wrap;
}
.editor-row > * { flex: 1; min-width: 200px; }
.editor-toolbar {
  display: flex;
  gap: 4px;
  flex-wrap: wrap;
  padding: 8px;
  background: var(--surface);
  border: 1px solid var(--border);
  border-bottom: none;
  border-radius: 4px 4px 0 0;
}
.toolbar-btn {
  font-family: var(--mono);
  font-size: 0.75rem;
  min-height: 36px;
  padding: 4px 10px;
  background: var(--bg);
  border: 1px solid var(--border);
  color: var(--text-dim);
  border-radius: 3px;
  cursor: pointer;
  transition: all 0.15s;
}
.toolbar-btn:hover { border-color: var(--cyan); color: var(--text); }

.editor-body {
  display: flex;
  gap: 0;
  min-height: 400px;
}
.editor-body textarea {
  flex: 1;
  min-height: 400px;
  border-radius: 0 0 0 4px;
  font-family: var(--mono);
  font-size:16px;
  line-height: 1.6;
  padding: 16px;
}
.editor-preview {
  flex: 1;
  background: var(--content-bg);
  border: 1px solid var(--border);
  border-left: none;
  border-radius: 0 0 4px 0;
  padding: 16px;
  overflow-y: auto;
  max-height: 600px;
  font-family: var(--serif);
  font-size: 18px;
  line-height: 1.8;
  color: var(--text);
}
.editor-preview h2 { font-size: 1.5rem; color: var(--cyan); margin: 24px 0 8px; }
.editor-preview h3 { font-size: 1.2rem; color: var(--cyan); margin: 16px 0 6px; }
.editor-preview p { margin-bottom: 12px; }
.editor-preview a { color: var(--cyan); }
.editor-preview ul, .editor-preview ol { margin: 0 0 12px 24px; }
.editor-preview li { margin-bottom: 4px; }
.editor-preview blockquote {
  border-left: 3px solid var(--cyan);
  padding: 8px 12px;
  margin: 12px 0;
  background: var(--surface);
  border-radius: 0 4px 4px 0;
  color: var(--text-dim);
  font-style: italic;
}
.editor-preview code {
  font-family: var(--mono);
  font-size: 0.85em;
  background: var(--surface);
  color: var(--cyan);
  padding: 2px 6px;
  border-radius: 3px;
}
.editor-preview pre {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 4px;
  padding: 12px;
  overflow-x: auto;
  margin: 12px 0;
}
.editor-preview pre code { background: none; padding: 0; font-size: 0.85rem; }
.editor-preview hr { border: none; border-top: 1px solid var(--border); margin: 16px 0; }

.editor-footer {
  display: flex;
  justify-content: space-between;
  align-items: center;
  flex-wrap: wrap;
  gap: 8px;
}
.editor-stats {
  font-size: 0.75rem;
  color: var(--text-dim);
}
.editor-actions {
  display: flex;
  gap: 8px;
  flex-wrap: wrap;
}
.autosave-indicator {
  font-size: 0.7rem;
  color: var(--green);
  opacity: 0;
  transition: opacity 0.3s;
}
.autosave-indicator.show { opacity: 1; }

.status-toggle {
  display: flex;
  align-items: center;
  gap: 8px;
  font-size: 0.8rem;
}
.status-toggle label { color: var(--text-dim); cursor: pointer; }
.status-toggle input[type="checkbox"] {
  width: 44px;
  height: 24px;
  min-height: unset;
  appearance: none;
  -webkit-appearance: none;
  background: var(--border);
  border-radius: 12px;
  position: relative;
  cursor: pointer;
  border: none;
  padding: 0;
}
.status-toggle input[type="checkbox"]::after {
  content: '';
  position: absolute;
  width: 18px;
  height: 18px;
  border-radius: 50%;
  background: var(--text-dim);
  top: 3px;
  left: 3px;
  transition: all 0.2s;
}
.status-toggle input[type="checkbox"]:checked {
  background: var(--green);
}
.status-toggle input[type="checkbox"]:checked::after {
  left: 23px;
  background: #fff;
}

/* ---- DASHBOARD ---- */
.dash-stats {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(130px, 1fr));
  gap: 12px;
  margin-bottom: 24px;
}
.stat-card {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 6px;
  padding: 16px;
  text-align: center;
}
.stat-card .stat-val {
  font-size: 1.6rem;
  font-weight: 700;
  color: var(--cyan);
}
.stat-card .stat-label {
  font-size: 0.7rem;
  color: var(--text-dim);
  margin-top: 4px;
}
.dash-actions {
  display: flex;
  gap: 8px;
  margin-bottom: 16px;
  flex-wrap: wrap;
}
.dash-table {
  width: 100%;
  border-collapse: collapse;
  font-size: 0.8rem;
}
.dash-table th {
  text-align: left;
  padding: 10px 12px;
  border-bottom: 2px solid var(--border);
  color: var(--text-dim);
  font-weight: 600;
  font-size: 0.7rem;
  text-transform: uppercase;
}
.dash-table td {
  padding: 10px 12px;
  border-bottom: 1px solid var(--border);
  vertical-align: middle;
}
.dash-table tr:hover td { background: var(--surface); }
.status-badge {
  font-size: 0.65rem;
  padding: 2px 8px;
  border-radius: 3px;
  font-weight: 600;
  text-transform: uppercase;
}
.status-badge.published { background: var(--green); color: var(--bg); }
.status-badge.draft { background: var(--orange); color: var(--bg); }
.dash-cell-actions {
  display: flex;
  gap: 4px;
  flex-wrap: wrap;
}

/* ---- MOBILE PREVIEW TOGGLE ---- */
.preview-toggle {
  display: none;
}

/* ---- RESPONSIVE ---- */
@media (max-width: 768px) {
  .view { padding: 12px; }
  .post-card h2 { font-size: 1.2rem; }
  .reader-header h1 { font-size: 1.5rem; }
  .editor-body { flex-direction: column; }
  .editor-body textarea { border-radius: 0; min-height: 300px; }
  .editor-preview { border-left: 1px solid var(--border); border-radius: 0 0 4px 4px; max-height: 300px; }
  .preview-toggle { display: inline-flex; }
  .editor-preview.hidden-mobile { display: none; }
  .dash-table { font-size: 0.7rem; }
  .dash-table th, .dash-table td { padding: 8px 6px; }
  .dash-table .hide-mobile { display: none; }
}
</style>
</head>
<body>

<!-- HEADER -->
<header class="app-header">
  <h1>Harrison's Blog <span>// korb.engineering</span></h1>
  <nav class="tabs">
    <button class="tab-btn active" data-view="feed">Feed</button>
    <button class="tab-btn" data-view="editor">Write</button>
    <button class="tab-btn" data-view="dashboard">Dashboard</button>
  </nav>
</header>

<!-- FEED VIEW -->
<div id="view-feed" class="view active">
  <div class="feed-controls">
    <input type="text" id="feed-search" placeholder="Search posts...">
    <select id="feed-category">
      <option value="">All Categories</option>
    </select>
  </div>
  <div id="feed-list"></div>
</div>

<!-- READER VIEW -->
<div id="view-reader" class="view view-reader">
  <div class="reader-nav">
    <button class="btn btn-sm" id="reader-back">&larr; Back to Feed</button>
    <div style="display:flex;gap:6px;">
      <button class="btn btn-sm" id="reader-prev">&larr; Prev</button>
      <button class="btn btn-sm" id="reader-next">Next &rarr;</button>
      <button class="btn btn-sm" id="reader-share" title="Copy link">Share</button>
    </div>
  </div>
  <div id="reader-featured"></div>
  <div class="reader-header">
    <h1 id="reader-title"></h1>
    <div class="reader-meta">
      <span id="reader-date"></span>
      <span id="reader-category" class="post-card-category"></span>
      <span id="reader-readtime"></span>
    </div>
  </div>
  <div class="reader-content" id="reader-content"></div>
  <div id="reader-tags-wrap" class="reader-tags"></div>
  <div class="reader-footer">
    <button class="btn btn-sm" id="reader-back2">&larr; Back to Feed</button>
    <div style="display:flex;gap:6px;">
      <button class="btn btn-sm" id="reader-prev2">&larr; Prev</button>
      <button class="btn btn-sm" id="reader-next2">Next &rarr;</button>
    </div>
  </div>
</div>

<!-- EDITOR VIEW -->
<div id="view-editor" class="view">
  <div class="editor-form">
    <input type="text" id="ed-title" placeholder="Post title...">
    <div class="editor-row">
      <select id="ed-category">
        <option value="Engineering">Engineering</option>
        <option value="Aviation">Aviation</option>
        <option value="Personal">Personal</option>
        <option value="Tech">Tech</option>
        <option value="Travel">Travel</option>
        <option value="Thoughts">Thoughts</option>
      </select>
      <input type="text" id="ed-tags" placeholder="Tags (comma-separated)">
    </div>
    <input type="text" id="ed-image" placeholder="Featured image URL (optional)">

    <div class="editor-toolbar" id="ed-toolbar">
      <button class="toolbar-btn" data-md="**" title="Bold"><b>B</b></button>
      <button class="toolbar-btn" data-md="*" title="Italic"><i>I</i></button>
      <button class="toolbar-btn" data-md="## " data-line="1" title="Heading 2">H2</button>
      <button class="toolbar-btn" data-md="### " data-line="1" title="Heading 3">H3</button>
      <button class="toolbar-btn" data-md="- " data-line="1" title="Bullet list">&#8226; List</button>
      <button class="toolbar-btn" data-md="1. " data-line="1" title="Numbered list">1. List</button>
      <button class="toolbar-btn" data-md="> " data-line="1" title="Quote">" Quote</button>
      <button class="toolbar-btn" data-md="`" title="Inline code">&lt;/&gt;</button>
      <button class="toolbar-btn" data-md="```\n" data-block="1" title="Code block">Code</button>
      <button class="toolbar-btn" data-md="---" data-line="1" title="Horizontal rule">&mdash;</button>
      <button class="toolbar-btn" data-md="[](url)" data-link="1" title="Link">Link</button>
      <button class="toolbar-btn preview-toggle" id="ed-toggle-preview">Preview</button>

    <div class="editor-body">
      <textarea id="ed-content" placeholder="Write your post in Markdown..."></textarea>
      <div class="editor-preview" id="ed-preview"></div>
    </div>

    <div class="editor-footer">
      <div class="editor-stats">
        <span id="ed-wordcount">0 words</span> &middot;
        <span id="ed-readtime">0 min read</span>
        <span class="autosave-indicator" id="ed-autosave">Auto-saved</span>
      </div>
      <div class="editor-actions">
        <div class="status-toggle">
          <label>Draft</label>
          <input type="checkbox" id="ed-status">
          <label>Publish</label>
        </div>
        <button class="btn" id="ed-cancel">Cancel</button>
        <button class="btn btn-primary" id="ed-save">Save Post</button>
      </div>
    </div>
  </div>
</div>

<!-- DASHBOARD VIEW -->
<div id="view-dashboard" class="view">
  <div class="dash-stats" id="dash-stats"></div>
  <div class="dash-actions">
    <button class="btn btn-primary" id="dash-new">+ New Post</button>
    <button class="btn btn-green" id="dash-export">Export JSON</button>
    <button class="btn btn-orange" id="dash-import">Import JSON</button>
    <input type="file" id="dash-import-file" accept=".json" style="display:none;">
  </div>
  <table class="dash-table">
    <thead>
      <tr>
        <th>Title</th>
        <th class="hide-mobile">Date</th>
        <th>Status</th>
        <th class="hide-mobile">Category</th>
        <th class="hide-mobile">Words</th>
        <th>Actions</th>
      </tr>
    </thead>
    <tbody id="dash-tbody"></tbody>
  </table>
</div>

<script>
// ============================================
// DATA LAYER
// ============================================
const STORAGE_KEY = 'harrisonsBlog_posts';
const AUTOSAVE_KEY = 'harrisonsBlog_autosave';

function uid() {
  return Date.now().toString(36) + Math.random().toString(36).slice(2, 8);
}

function loadPosts() {
  try {
    const d = localStorage.getItem(STORAGE_KEY);
    return d ? JSON.parse(d) : [];
  } catch { return []; }
}

function savePosts(posts) {
  localStorage.setItem(STORAGE_KEY, JSON.stringify(posts));
}

function getPost(id) {
  return loadPosts().find(p => p.id === id);
}

function upsertPost(post) {
  const posts = loadPosts();
  const idx = posts.findIndex(p => p.id === post.id);
  if (idx >= 0) posts[idx] = post;
  else posts.push(post);
  savePosts(posts);
  return post;
}

function deletePost(id) {
  savePosts(loadPosts().filter(p => p.id !== id));
}

function countWords(text) {
  const s = text.replace(/[#*>`\-\[\]\(\)]/g, ' ').trim();
  return s ? s.split(/\s+/).length : 0;
}

function readTime(wc) {
  return Math.max(1, Math.ceil(wc / 200));
}

function formatDate(iso) {
  const d = new Date(iso);
  return d.toLocaleDateString('en-US', { year: 'numeric', month: 'long', day: 'numeric' });
}

// ============================================
// MARKDOWN PARSER (lightweight)
// ============================================
function mdToHtml(md) {
  let html = md;

  // Code blocks (``` ... ```)
  html = html.replace(/```([\s\S]*?)```/g, (_, code) => {
    return '<pre><code>' + escHtml(code.trim()) + '</code></pre>';
  });

  // Inline code
  html = html.replace(/`([^`]+)`/g, '<code>$1</code>');

  // Headings
  html = html.replace(/^### (.+)$/gm, '<h3>$1</h3>');
  html = html.replace(/^## (.+)$/gm, '<h2>$1</h2>');

  // Horizontal rule
  html = html.replace(/^---$/gm, '<hr>');

  // Bold & italic
  html = html.replace(/\*\*(.+?)\*\*/g, '<strong>$1</strong>');
  html = html.replace(/\*(.+?)\*/g, '<em>$1</em>');

  // Links
  html = html.replace(/\[([^\]]+)\]\(([^)]+)\)/g, '<a href="$2" target="_blank" rel="noopener">$1</a>');

  // Blockquotes
  html = html.replace(/^> (.+)$/gm, '<blockquote>$1</blockquote>');
  // Merge adjacent blockquotes
  html = html.replace(/<\/blockquote>\n<blockquote>/g, '<br>');

  // Unordered lists
  html = html.replace(/(^- .+$\n?)+/gm, (match) => {
    const items = match.trim().split('\n').map(l => '<li>' + l.replace(/^- /, '') + '</li>').join('');
    return '<ul>' + items + '</ul>';
  });

  // Ordered lists
  html = html.replace(/(^\d+\. .+$\n?)+/gm, (match) => {
    const items = match.trim().split('\n').map(l => '<li>' + l.replace(/^\d+\. /, '') + '</li>').join('');
    return '<ol>' + items + '</ol>';
  });

  // Paragraphs: split by double newline
  const blocks = html.split(/\n\n+/);
  html = blocks.map(b => {
    b = b.trim();
    if (!b) return '';
    if (/^<(h[23]|ul|ol|blockquote|pre|hr)/.test(b)) return b;
    // Wrap remaining text in <p>, convert single newlines to <br>
    return '<p>' + b.replace(/\n/g, '<br>') + '</p>';
  }).join('\n');

  return html;
}

function escHtml(s) {
  return s.replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;');
}

// ============================================
// VIEW MANAGEMENT
// ============================================
const views = ['feed', 'reader', 'editor', 'dashboard'];
let currentView = 'feed';
let editingPostId = null;
let currentReaderId = null;
let autosaveInterval = null;

function showView(name) {
  currentView = name;
  views.forEach(v => {
    const el = document.getElementById('view-' + v);
    if (el) el.classList.toggle('active', v === name);
  });
  document.querySelectorAll('.tab-btn').forEach(b => {
    b.classList.toggle('active', b.dataset.view === name);
  });
  if (name === 'feed') renderFeed();
  if (name === 'dashboard') renderDashboard();
}

document.querySelectorAll('.tab-btn').forEach(b => {
  b.addEventListener('click', () => showView(b.dataset.view));
});

// ============================================
// FEED
// ============================================
function getPublishedPosts() {
  return loadPosts().filter(p => p.status === 'published')
    .sort((a, b) => new Date(b.createdAt) - new Date(a.createdAt));
}

function getCategories() {
  const cats = new Set();
  loadPosts().forEach(p => { if (p.category) cats.add(p.category); });
  return [...cats].sort();
}

function renderFeed() {
  const search = document.getElementById('feed-search').value.toLowerCase();
  const catFilter = document.getElementById('feed-category').value;

  // Update category dropdown
  const catSelect = document.getElementById('feed-category');
  const curVal = catSelect.value;
  const cats = getCategories();
  catSelect.innerHTML = '<option value="">All Categories</option>' +
    cats.map(c => `<option value="${c}" ${c === curVal ? 'selected' : ''}>${c}</option>`).join('');

  let posts = getPublishedPosts();
  if (search) {
    posts = posts.filter(p =>
      p.title.toLowerCase().includes(search) ||
      p.content.toLowerCase().includes(search) ||
      (p.tags || []).some(t => t.toLowerCase().includes(search))
    );
  }
  if (catFilter) {
    posts = posts.filter(p => p.category === catFilter);
  }

  const list = document.getElementById('feed-list');
  if (posts.length === 0) {
    list.innerHTML = '<div class="empty-feed">No posts found.</div>';
    return;
  }

  list.innerHTML = posts.map(p => {
    const excerpt = p.content.replace(/[#*>`\-\[\]\(\)\n]/g, ' ').trim().slice(0, 200);
    const img = p.featuredImage ? `<img class="post-card-img" src="${escHtml(p.featuredImage)}" alt="" loading="lazy">` : '';
    return `<article class="post-card" data-id="${p.id}">
      ${img}
      <div class="post-card-meta">
        <span class="post-card-category">${escHtml(p.category)}</span>
        <span>${formatDate(p.createdAt)}</span>
        <span>${readTime(p.wordCount)} min read</span>
      </div>
      <h2>${escHtml(p.title)}</h2>
      <p class="post-card-excerpt">${escHtml(excerpt)}${excerpt.length >= 200 ? '...' : ''}</p>
    </article>`;
  }).join('');

  list.querySelectorAll('.post-card').forEach(card => {
    card.addEventListener('click', () => openReader(card.dataset.id));
  });
}

document.getElementById('feed-search').addEventListener('input', renderFeed);
document.getElementById('feed-category').addEventListener('change', renderFeed);

// ============================================
// READER
// ============================================
function openReader(id) {
  const post = getPost(id);
  if (!post) return;
  currentReaderId = id;

  document.getElementById('reader-title').textContent = post.title;
  document.getElementById('reader-date').textContent = formatDate(post.createdAt);
  document.getElementById('reader-category').textContent = post.category;
  document.getElementById('reader-readtime').textContent = readTime(post.wordCount) + ' min read';
  document.getElementById('reader-content').innerHTML = mdToHtml(post.content);

  const featDiv = document.getElementById('reader-featured');
  featDiv.innerHTML = post.featuredImage
    ? `<img class="reader-img" src="${escHtml(post.featuredImage)}" alt="">`
    : '';

  const tagsWrap = document.getElementById('reader-tags-wrap');
  tagsWrap.innerHTML = (post.tags || []).map(t =>
    `<span class="reader-tag">${escHtml(t)}</span>`
  ).join('');

  updateReaderNav();
  showView('reader');
  window.scrollTo(0, 0);
}

function updateReaderNav() {
  const posts = getPublishedPosts();
  const idx = posts.findIndex(p => p.id === currentReaderId);
  const hasPrev = idx < posts.length - 1;
  const hasNext = idx > 0;

  ['reader-prev', 'reader-prev2'].forEach(id => {
    document.getElementById(id).disabled = !hasPrev;
    document.getElementById(id).onclick = hasPrev ? () => openReader(posts[idx + 1].id) : null;
  });
  ['reader-next', 'reader-next2'].forEach(id => {
    document.getElementById(id).disabled = !hasNext;
    document.getElementById(id).onclick = hasNext ? () => openReader(posts[idx - 1].id) : null;
  });
}

document.getElementById('reader-back').addEventListener('click', () => showView('feed'));
document.getElementById('reader-back2').addEventListener('click', () => showView('feed'));
document.getElementById('reader-share').addEventListener('click', () => {
  const url = window.location.href.split('#')[0] + '#post-' + currentReaderId;
  navigator.clipboard.writeText(url).then(() => {
    const btn = document.getElementById('reader-share');
    btn.textContent = 'Copied!';
    setTimeout(() => btn.textContent = 'Share', 1500);
  });
});

// ============================================
// EDITOR
// ============================================
function openEditor(postId) {
  editingPostId = postId || null;
  const post = postId ? getPost(postId) : null;

  document.getElementById('ed-title').value = post ? post.title : '';
  document.getElementById('ed-category').value = post ? post.category : 'Engineering';
  document.getElementById('ed-tags').value = post ? (post.tags || []).join(', ') : '';
  document.getElementById('ed-image').value = post ? (post.featuredImage || '') : '';
  document.getElementById('ed-content').value = post ? post.content : '';
  document.getElementById('ed-status').checked = post ? post.status === 'published' : false;

  updateEditorStats();
  updatePreview();
  showView('editor');
  startAutosave();
}

function updateEditorStats() {
  const content = document.getElementById('ed-content').value;
  const wc = countWords(content);
  document.getElementById('ed-wordcount').textContent = wc + ' word' + (wc !== 1 ? 's' : '');
  document.getElementById('ed-readtime').textContent = readTime(wc) + ' min read';
}

function updatePreview() {
  const md = document.getElementById('ed-content').value;
  document.getElementById('ed-preview').innerHTML = mdToHtml(md);
}

document.getElementById('ed-content').addEventListener('input', () => {
  updateEditorStats();
  updatePreview();
});

// Toolbar
document.getElementById('ed-toolbar').addEventListener('click', (e) => {
  const btn = e.target.closest('.toolbar-btn');
  if (!btn || btn.id === 'ed-toggle-preview') return;

  const ta = document.getElementById('ed-content');
  const start = ta.selectionStart;
  const end = ta.selectionEnd;
  const selected = ta.value.slice(start, end);
  const md = btn.dataset.md;

  let insert;
  if (btn.dataset.link) {
    insert = `[${selected || 'text'}](url)`;
  } else if (btn.dataset.block) {
    insert = '```\n' + (selected || 'code') + '\n```';
  } else if (btn.dataset.line) {
    insert = md + selected;
  } else {
    insert = md + (selected || '') + md;
  }

  ta.value = ta.value.slice(0, start) + insert + ta.value.slice(end);
  ta.focus();
  const cursor = start + insert.length;
  ta.setSelectionRange(cursor, cursor);
  updateEditorStats();
  updatePreview();
});

// Preview toggle (mobile)
document.getElementById('ed-toggle-preview').addEventListener('click', () => {
  document.getElementById('ed-preview').classList.toggle('hidden-mobile');
});

// Save
document.getElementById('ed-save').addEventListener('click', () => {
  const title = document.getElementById('ed-title').value.trim();
  if (!title) { alert('Please enter a title.'); return; }

  const content = document.getElementById('ed-content').value;
  const now = new Date().toISOString();
  const post = {
    id: editingPostId || uid(),
    title,
    content,
    category: document.getElementById('ed-category').value,
    tags: document.getElementById('ed-tags').value.split(',').map(t => t.trim()).filter(Boolean),
    featuredImage: document.getElementById('ed-image').value.trim(),
    status: document.getElementById('ed-status').checked ? 'published' : 'draft',
    createdAt: editingPostId ? getPost(editingPostId).createdAt : now,
    updatedAt: now,
    wordCount: countWords(content)
  };

  upsertPost(post);
  stopAutosave();
  localStorage.removeItem(AUTOSAVE_KEY);
  showView('dashboard');
});

document.getElementById('ed-cancel').addEventListener('click', () => {
  stopAutosave();
  localStorage.removeItem(AUTOSAVE_KEY);
  showView(editingPostId ? 'dashboard' : 'feed');
});

// Autosave
function startAutosave() {
  stopAutosave();
  autosaveInterval = setInterval(() => {
    const data = {
      id: editingPostId,
      title: document.getElementById('ed-title').value,
      content: document.getElementById('ed-content').value,
      category: document.getElementById('ed-category').value,
      tags: document.getElementById('ed-tags').value,
      image: document.getElementById('ed-image').value,
      status: document.getElementById('ed-status').checked
    };
    localStorage.setItem(AUTOSAVE_KEY, JSON.stringify(data));
    const ind = document.getElementById('ed-autosave');
    ind.classList.add('show');
    setTimeout(() => ind.classList.remove('show'), 2000);
  }, 30000);
}

function stopAutosave() {
  if (autosaveInterval) { clearInterval(autosaveInterval); autosaveInterval = null; }
}

// ============================================
// DASHBOARD
// ============================================
function renderDashboard() {
  const posts = loadPosts().sort((a, b) => new Date(b.updatedAt) - new Date(a.updatedAt));
  const published = posts.filter(p => p.status === 'published');
  const drafts = posts.filter(p => p.status === 'draft');
  const totalWords = posts.reduce((s, p) => s + (p.wordCount || 0), 0);

  document.getElementById('dash-stats').innerHTML = `
    <div class="stat-card"><div class="stat-val">${posts.length}</div><div class="stat-label">Total Posts</div></div>
    <div class="stat-card"><div class="stat-val">${published.length}</div><div class="stat-label">Published</div></div>
    <div class="stat-card"><div class="stat-val">${drafts.length}</div><div class="stat-label">Drafts</div></div>
    <div class="stat-card"><div class="stat-val">${totalWords.toLocaleString()}</div><div class="stat-label">Total Words</div></div>
  `;

  const tbody = document.getElementById('dash-tbody');
  if (posts.length === 0) {
    tbody.innerHTML = '<tr><td colspan="6" style="text-align:center;padding:32px;color:var(--text-dim);">No posts yet. Click "+ New Post" to start writing.</td></tr>';
    return;
  }

  tbody.innerHTML = posts.map(p => `<tr>
    <td style="max-width:200px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;">${escHtml(p.title)}</td>
    <td class="hide-mobile">${formatDate(p.updatedAt)}</td>
    <td><span class="status-badge ${p.status}">${p.status}</span></td>
    <td class="hide-mobile">${escHtml(p.category)}</td>
    <td class="hide-mobile">${(p.wordCount || 0).toLocaleString()}</td>
    <td>
      <div class="dash-cell-actions">
        <button class="btn btn-sm" onclick="openEditor('${p.id}')">Edit</button>
        <button class="btn btn-sm btn-orange" onclick="duplicatePost('${p.id}')">Dup</button>
        <button class="btn btn-sm btn-green" onclick="toggleStatus('${p.id}')">${p.status === 'published' ? 'Unpub' : 'Pub'}</button>
        <button class="btn btn-sm btn-danger" onclick="confirmDelete('${p.id}')">Del</button>
      </div>
    </td>
  </tr>`).join('');
}

function duplicatePost(id) {
  const post = getPost(id);
  if (!post) return;
  const now = new Date().toISOString();
  const dup = {
    ...post,
    id: uid(),
    title: post.title + ' (copy)',
    status: 'draft',
    createdAt: now,
    updatedAt: now
  };
  upsertPost(dup);
  renderDashboard();
}

function toggleStatus(id) {
  const post = getPost(id);
  if (!post) return;
  post.status = post.status === 'published' ? 'draft' : 'published';
  post.updatedAt = new Date().toISOString();
  upsertPost(post);
  renderDashboard();
}

function confirmDelete(id) {
  const post = getPost(id);
  if (!post) return;
  if (confirm(`Delete "${post.title}"? This cannot be undone.`)) {
    deletePost(id);
    renderDashboard();
  }
}

// Dashboard actions
document.getElementById('dash-new').addEventListener('click', () => openEditor(null));

document.getElementById('dash-export').addEventListener('click', () => {
  const posts = loadPosts();
  const blob = new Blob([JSON.stringify(posts, null, 2)], { type: 'application/json' });
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = 'harrisons-blog-export.json';
  a.click();
  URL.revokeObjectURL(a.href);
});

document.getElementById('dash-import').addEventListener('click', () => {
  document.getElementById('dash-import-file').click();
});

document.getElementById('dash-import-file').addEventListener('change', (e) => {
  const file = e.target.files[0];
  if (!file) return;
  const reader = new FileReader();
  reader.onload = () => {
    try {
      const imported = JSON.parse(reader.result);
      if (!Array.isArray(imported)) throw new Error('Not an array');
      const existing = loadPosts();
      const existingIds = new Set(existing.map(p => p.id));
      let added = 0;
      imported.forEach(p => {
        if (!existingIds.has(p.id)) {
          existing.push(p);
          added++;
        }
      });
      savePosts(existing);
      alert(`Imported ${added} new post(s). ${imported.length - added} duplicate(s) skipped.`);
      renderDashboard();
    } catch (err) {
      alert('Invalid JSON file: ' + err.message);
    }
  };
  reader.readAsText(file);
  e.target.value = '';
});

// ============================================
// INIT
// ============================================
seedPosts();
renderFeed();
</script>
