<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
<meta name="description" content="Harrison's Highschool iPod — a free, browser-based Korb family tool from Korb Engineering. No signup, no downloads, works on mobile.">
<title>Harrison's Highschool iPod</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=VT323&family=Silkscreen&display=swap');

* { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

body {
  background: #000;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  min-height: 100vh;
  font-family: 'VT323', 'Courier New', monospace;
  overflow: hidden;
  user-select: none;
  -webkit-user-select: none;
}

/* Boot screen */
#boot-screen {
  position: fixed; inset: 0; z-index: 9999;
  background: #000;
  display: flex; align-items: center; justify-content: center;
  transition: opacity 0.8s ease;
}
#boot-screen.fade-out { opacity: 0; pointer-events: none; }
#boot-screen .boot-icon {
  font-size: 80px; color: #ccc;
  animation: bootPulse 1.5s ease-in-out infinite;
}
@keyframes bootPulse {
  0%, 100% { opacity: 0.3; transform: scale(0.95); }
  50% { opacity: 1; transform: scale(1.05); }
}

/* iPod body */
#ipod {
  width: 280px;
  height: 500px;
  background: linear-gradient(180deg, #f5f5f7 0%, #e8e8ea 30%, #d2d2d4 100%);
  border-radius: 28px;
  box-shadow:
    0 0 0 1px rgba(0,0,0,0.15),
    0 8px 30px rgba(0,0,0,0.5),
    inset 0 1px 0 rgba(255,255,255,0.8),
    inset 0 -1px 0 rgba(0,0,0,0.05);
  display: flex;
  flex-direction: column;
  align-items: center;
  padding: 18px 18px 14px;
  position: relative;
}

/* Chrome bezel around screen */
#screen-bezel {
  width: 100%;
  height: 200px;
  background: #1a1a1a;
  border-radius: 8px;
  padding: 6px;
  box-shadow: inset 0 2px 6px rgba(0,0,0,0.6);
}

/* LCD screen */
#screen {
  width: 100%;
  height: 100%;
  background: linear-gradient(180deg, #b8c8b0 0%, #a8b8a0 50%, #98a890 100%);
  border-radius: 4px;
  overflow: hidden;
  position: relative;
  image-rendering: pixelated;
}

/* LCD backlight overlay */
#screen::before {
  content: '';
  position: absolute; inset: 0;
  background: linear-gradient(180deg,
    rgba(140,180,140,0.15) 0%,
    rgba(100,140,100,0.05) 100%);
  pointer-events: none;
  z-index: 1;
}

/* Scanline effect */
#screen::after {
  content: '';
  position: absolute; inset: 0;
  background: repeating-linear-gradient(
    0deg,
    transparent,
    transparent 2px,
    rgba(0,0,0,0.03) 2px,
    rgba(0,0,0,0.03) 4px
  );
  pointer-events: none;
  z-index: 2;
}

/* Screen content area */
#screen-content {
  width: 100%; height: 100%;
  position: relative; z-index: 1;
  display: flex; flex-direction: column;
  color: #1a2a10;
  font-size: 16px;
  line-height: 1.3;
}

/* Title bar */
.title-bar {
  display: flex; justify-content: space-between; align-items: center;
  padding: 4px 8px 2px;
  font-size: 13px;
  border-bottom: 1.5px solid rgba(30,50,20,0.3);
  flex-shrink: 0;
  font-weight: bold;
}
.title-bar .battery {
  display: flex; align-items: center; gap: 2px;
  font-size: 11px;
}
.battery-icon {
  width: 18px; height: 10px;
  border: 1.5px solid #1a2a10;
  border-radius: 2px;
  position: relative;
  display: inline-block;
}
.battery-icon::after {
  content: ''; position: absolute;
  right: -4px; top: 2px;
  width: 3px; height: 4px;
  background: #1a2a10;
  border-radius: 0 1px 1px 0;
}
.battery-fill {
  position: absolute; left: 1px; top: 1px; bottom: 1px;
  width: 70%; background: #1a2a10;
  border-radius: 1px;
}

/* Menu list */
.menu-list {
  flex: 1; overflow: hidden;
  padding: 2px 0;
}
.menu-item {
  padding: 3px 10px;
  font-size: 15px;
  display: flex; justify-content: space-between; align-items: center;
  cursor: pointer;
  transition: background 0.05s;
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
}
.menu-item.selected {
  background: #1a2a10;
  color: #b8c8b0;
}
.menu-item .arrow { font-size: 14px; }

/* Now Playing screen */
.now-playing {
  display: flex; flex-direction: column; align-items: center;
  padding: 6px 10px;
  flex: 1;
  position: relative;
  overflow: hidden;
}
.album-art {
  width: 80px; height: 80px;
  background: rgba(30,50,20,0.1);
  border: 1.5px solid rgba(30,50,20,0.3);
  border-radius: 4px;
  display: flex; align-items: center; justify-content: center;
  font-size: 40px;
  margin: 4px 0;
  flex-shrink: 0;
}
.np-title {
  font-size: 14px; font-weight: bold;
  text-align: center;
  max-width: 100%;
  overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
}
.np-artist {
  font-size: 12px;
  text-align: center;
  max-width: 100%;
  overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
  opacity: 0.7;
}
.progress-container {
  width: 100%; margin-top: auto;
  padding-top: 4px;
}
.progress-bar-bg {
  width: 100%; height: 5px;
  background: rgba(30,50,20,0.15);
  border-radius: 3px;
  overflow: hidden;
}
.progress-bar-fill {
  height: 100%; width: 0%;
  background: #1a2a10;
  border-radius: 3px;
  transition: width 0.3s linear;
}
.progress-times {
  display: flex; justify-content: space-between;
  font-size: 10px; opacity: 0.6;
  margin-top: 1px;
}

/* EQ visualizer */
.eq-visualizer {
  display: flex; align-items: flex-end; justify-content: center;
  gap: 2px; height: 30px;
  position: absolute; bottom: 40px; left: 10px; right: 10px;
  opacity: 0.3;
}
.eq-bar {
  width: 4px; background: #1a2a10;
  border-radius: 1px 1px 0 0;
  transition: height 0.05s linear;
}

/* Volume display */
.volume-display {
  width: 100%;
  padding: 2px 0;
  display: flex; align-items: center; gap: 4px;
  font-size: 10px;
}
.volume-bar-bg {
  flex: 1; height: 4px;
  background: rgba(30,50,20,0.15);
  border-radius: 2px; overflow: hidden;
}
.volume-bar-fill {
  height: 100%; background: #1a2a10;
  border-radius: 2px;
}

/* Scroll indicator */
.scroll-indicator {
  position: absolute; right: 3px; top: 26px; bottom: 4px;
  width: 4px; background: rgba(30,50,20,0.1);
  border-radius: 2px;
}
.scroll-thumb {
  width: 100%; background: rgba(30,50,20,0.4);
  border-radius: 2px;
  position: absolute;
  min-height: 8px;
}

/* About screen */
.about-screen {
  flex: 1; display: flex; flex-direction: column;
  align-items: center; justify-content: center;
  padding: 10px; text-align: center;
  font-size: 13px; line-height: 1.6;
}
.about-screen .logo { font-size: 36px; margin-bottom: 8px; }

/* Settings items */
.setting-value { font-size: 13px; opacity: 0.7; }

/* Click wheel area */
#wheel-area {
  flex: 1;
  display: flex; align-items: center; justify-content: center;
  width: 100%;
  margin-top: 14px;
}

#click-wheel {
  width: 190px; height: 190px;
  border-radius: 50%;
  background: linear-gradient(145deg, #e0e0e2, #c8c8ca);
  box-shadow:
    0 2px 8px rgba(0,0,0,0.15),
    inset 0 1px 0 rgba(255,255,255,0.5);
  position: relative;
  cursor: pointer;
  touch-action: none;
}

/* Center button */
#center-btn {
  position: absolute;
  width: 68px; height: 68px;
  border-radius: 50%;
  background: linear-gradient(145deg, #f0f0f2, #d8d8da);
  box-shadow:
    0 1px 4px rgba(0,0,0,0.12),
    inset 0 1px 0 rgba(255,255,255,0.6);
  top: 50%; left: 50%;
  transform: translate(-50%, -50%);
  z-index: 5;
  display: flex; align-items: center; justify-content: center;
  transition: background 0.1s;
}
#center-btn:active, #center-btn.pressed {
  background: linear-gradient(145deg, #d8d8da, #c4c4c6);
}

/* Wheel labels */
.wheel-label {
  position: absolute;
  font-family: 'Silkscreen', 'VT323', monospace;
  font-size: 11px;
  color: #666;
  pointer-events: none;
  z-index: 3;
}
.wheel-label.top { top: 16px; left: 50%; transform: translateX(-50%); font-size: 12px; letter-spacing: 1px; }
.wheel-label.right { right: 18px; top: 50%; transform: translateY(-50%); font-size: 16px; }
.wheel-label.bottom { bottom: 16px; left: 50%; transform: translateX(-50%); font-size: 16px; }
.wheel-label.left { left: 18px; top: 50%; transform: translateY(-50%); font-size: 16px; }

/* Wheel button highlights */
.wheel-btn-zone {
  position: absolute; z-index: 2;
  border-radius: 50%;
  transition: background 0.1s;
}
.wheel-btn-zone.active { background: rgba(0,0,0,0.06); }
.wheel-top { top: 0; left: 30%; width: 40%; height: 30%; border-radius: 40% 40% 0 0; }
.wheel-right { right: 0; top: 30%; width: 30%; height: 40%; border-radius: 0 40% 40% 0; }
.wheel-bottom { bottom: 0; left: 30%; width: 40%; height: 30%; border-radius: 0 0 40% 40%; }
.wheel-left { left: 0; top: 30%; width: 30%; height: 40%; border-radius: 40% 0 0 40%; }

/* Korb branding */
#branding {
  color: #333;
  font-family: 'Silkscreen', 'VT323', monospace;
  font-size: 10px;
  letter-spacing: 2px;
  margin-top: 16px;
  opacity: 0.4;
  text-transform: uppercase;
}

/* Playlist naming modal */
.modal-input {
  background: #222; border: 1px solid #555;
  color: #fff; font-family: 'VT323', monospace;
  font-size: 18px; padding: 8px 12px;
  border-radius: 6px; width: 100%;
  margin: 10px 0; text-align: center;
}

/* Sync status toast */
.sync-toast {
  position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%);
  background: rgba(26,26,26,0.95); color: #b8c8b0;
  font-family: 'VT323', monospace; font-size: 14px;
  padding: 10px 20px; border-radius: 10px;
  border: 1px solid #444; z-index: 200;
  opacity: 0; transition: opacity 0.4s;
  pointer-events: none;
}
.sync-toast.visible { opacity: 1; }

/* Animations */
@keyframes slideIn {
  from { transform: translateX(100%); }
  to { transform: translateX(0); }
}
@keyframes slideOut {
  from { transform: translateX(0); }
  to { transform: translateX(-100%); }
}
.screen-transition {
  animation: slideIn 0.15s ease-out;
}

/* Responsive */
@media (max-height: 600px) {
  #ipod { width: 250px; height: 440px; padding: 14px 14px 10px; }
  #screen-bezel { height: 170px; }
  #click-wheel { width: 165px; height: 165px; }
  #center-btn { width: 58px; height: 58px; }
}
@media (min-width: 400px) {
  #ipod { width: 300px; height: 530px; }
  #screen-bezel { height: 210px; }
  #click-wheel { width: 200px; height: 200px; }
  #center-btn { width: 72px; height: 72px; }
}
</style>
</head>
<body>

<!-- Boot Screen -->
<div id="boot-screen">
  <div class="boot-icon">&#9835;</div>
</div>

<!-- iPod Body -->
<div id="ipod">
  <div id="screen-bezel">
    <div id="screen">
      <div id="screen-content"></div>
    </div>
  </div>
  <div id="wheel-area">
    <div id="click-wheel">
      <div class="wheel-btn-zone wheel-top" data-btn="menu"></div>
      <div class="wheel-btn-zone wheel-right" data-btn="forward"></div>
      <div class="wheel-btn-zone wheel-bottom" data-btn="playpause"></div>
      <div class="wheel-btn-zone wheel-left" data-btn="back"></div>
      <div class="wheel-label top">MENU</div>
      <div class="wheel-label right">&#9654;&#9654;&#124;</div>
      <div class="wheel-label bottom">&#9654;&#10073;&#10073;</div>
      <div class="wheel-label left">&#124;&#9664;&#9664;</div>
      <div id="center-btn"></div>
    </div>
  </div>
</div>

<div id="branding">Korb Engineering</div>

<!-- Sync status toast -->
<div id="sync-toast" class="sync-toast"></div>

<script>/* korb_ storage migration (additive, runs once per load) */
(function(){try{var M=[["ipod_shuffle","korb_ipod_shuffle"],["ipod_repeat","korb_ipod_repeat"],["ipod_eq","korb_ipod_eq"],["ipod_volume","korb_ipod_volume"]];for(var i=0;i<M.length;i++){var o=M[i][0],n=M[i][1];try{var ks=Object.keys(localStorage);for(var j=0;j<ks.length;j++){var k=ks[j];if(k.indexOf(o)===0&&k.indexOf("korb_")!==0){var nk=n+k.slice(o.length);if(localStorage.getItem(nk)===null){localStorage.setItem(nk,localStorage.getItem(k));}localStorage.removeItem(k);}}}catch(e){}}}catch(e){}})();</script>
<script>
// ===================== DATABASE =====================
const DB_NAME = 'HarrisonsIPod';
const DB_VERSION = 2;
let db = null;

function openDB() {
  return new Promise((resolve, reject) => {
    const req = indexedDB.open(DB_NAME, DB_VERSION);
    req.onupgradeneeded = (e) => {
      const d = e.target.result;
      if (!d.objectStoreNames.contains('songs')) {
        d.createObjectStore('songs', { keyPath: 'id', autoIncrement: true });
      }
      if (!d.objectStoreNames.contains('playlists')) {
        d.createObjectStore('playlists', { keyPath: 'id', autoIncrement: true });
      }
    };
    req.onsuccess = (e) => { db = e.target.result; resolve(db); };
    req.onerror = (e) => reject(e);
  });
}

function dbGetAll(store) {
  return new Promise((resolve, reject) => {
    const tx = db.transaction(store, 'readonly');
    const s = tx.objectStore(store);
    const req = s.getAll();
    req.onsuccess = () => resolve(req.result);
    req.onerror = (e) => reject(e);
  });
}

function dbAdd(store, data) {
  return new Promise((resolve, reject) => {
    const tx = db.transaction(store, 'readwrite');
    const s = tx.objectStore(store);
    const req = s.add(data);
    req.onsuccess = () => resolve(req.result);
    req.onerror = (e) => reject(e);
  });
}

function dbPut(store, data) {
  return new Promise((resolve, reject) => {
    const tx = db.transaction(store, 'readwrite');
    const s = tx.objectStore(store);
    const req = s.put(data);
    req.onsuccess = () => resolve(req.result);
    req.onerror = (e) => reject(e);
  });
}

function dbDelete(store, id) {
  return new Promise((resolve, reject) => {
    const tx = db.transaction(store, 'readwrite');
    const s = tx.objectStore(store);
    const req = s.delete(id);
    req.onsuccess = () => resolve();
    req.onerror = (e) => reject(e);
  });
}

function dbGet(store, id) {
  return new Promise((resolve, reject) => {
    const tx = db.transaction(store, 'readonly');
    const s = tx.objectStore(store);
    const req = s.get(id);
    req.onsuccess = () => resolve(req.result);
    req.onerror = (e) => reject(e);
  });
}

// ===================== STATE =====================
let songs = [];
let playlists = [];
let currentSongIndex = -1;
let isPlaying = false;
let shuffle = false;
let repeatMode = 'off'; // off, one, all
let eqEnabled = true;
let volume = 0.8;
let audio = new Audio();
let audioCtx = null;
let analyser = null;
let sourceNode = null;
let shuffleOrder = [];
let playQueue = []; // current play queue (song ids)

// Navigation state
let screenStack = []; // stack of {screen, data}
let currentScreen = null;
let selectedIndex = 0;
let menuItems = [];

// Wheel rotation tracking
let wheelTracking = false;
let wheelLastAngle = null;
let wheelAccum = 0;
const WHEEL_THRESHOLD = 15; // degrees per scroll step

// ===================== AUDIO =====================
audio.volume = volume;
audio.addEventListener('ended', () => {
  if (repeatMode === 'one') {
    audio.currentTime = 0;
    audio.play();
  } else {
    nextTrack();
  }
});
audio.addEventListener('timeupdate', updateProgress);

function initAudioContext() {
  if (audioCtx) return;
  audioCtx = new (window.AudioContext || window.webkitAudioContext)();
  analyser = audioCtx.createAnalyser();
  analyser.fftSize = 64;
  sourceNode = audioCtx.createMediaElementSource(audio);
  sourceNode.connect(analyser);
  analyser.connect(audioCtx.destination);
}

async function playSong(songId) {
  const song = songs.find(s => s.id === songId);
  if (!song) return;
  currentSongIndex = playQueue.indexOf(songId);
  if (currentSongIndex === -1) {
    playQueue = songs.map(s => s.id);
    currentSongIndex = playQueue.indexOf(songId);
  }
  try { initAudioContext(); } catch(e) {}
  const url = URL.createObjectURL(song.blob);
  audio.src = url;
  await audio.play();
  isPlaying = true;
  if (currentScreen === 'nowplaying') renderScreen();
}

function togglePlay() {
  if (!audio.src) {
    if (playQueue.length > 0) {
      playSong(playQueue[0]);
    }
    return;
  }
  if (isPlaying) {
    audio.pause();
    isPlaying = false;
  } else {
    try { initAudioContext(); if (audioCtx.state === 'suspended') audioCtx.resume(); } catch(e) {}
    audio.play();
    isPlaying = true;
  }
  if (currentScreen === 'nowplaying') renderScreen();
}

function nextTrack() {
  if (playQueue.length === 0) return;
  if (shuffle) {
    if (shuffleOrder.length === 0) {
      shuffleOrder = [...playQueue].sort(() => Math.random() - 0.5);
    }
    const curIdx = shuffleOrder.indexOf(playQueue[currentSongIndex]);
    const next = (curIdx + 1) % shuffleOrder.length;
    if (next === 0 && repeatMode === 'off') { isPlaying = false; audio.pause(); return; }
    playSong(shuffleOrder[next]);
  } else {
    let next = currentSongIndex + 1;
    if (next >= playQueue.length) {
      if (repeatMode === 'all') next = 0;
      else { isPlaying = false; audio.pause(); return; }
    }
    playSong(playQueue[next]);
  }
}

function prevTrack() {
  if (audio.currentTime > 3) { audio.currentTime = 0; return; }
  if (playQueue.length === 0) return;
  let prev = currentSongIndex - 1;
  if (prev < 0) prev = playQueue.length - 1;
  playSong(playQueue[prev]);
}

function updateProgress() {
  if (currentScreen !== 'nowplaying') return;
  const fill = document.querySelector('.progress-bar-fill');
  const elapsed = document.querySelector('.time-elapsed');
  const total = document.querySelector('.time-total');
  if (!fill) return;
  const pct = audio.duration ? (audio.currentTime / audio.duration * 100) : 0;
  fill.style.width = pct + '%';
  if (elapsed) elapsed.textContent = formatTime(audio.currentTime);
  if (total) total.textContent = formatTime(audio.duration || 0);
}

function formatTime(s) {
  if (!s || isNaN(s)) return '0:00';
  const m = Math.floor(s / 60);
  const sec = Math.floor(s % 60);
  return m + ':' + (sec < 10 ? '0' : '') + sec;
}

// ===================== SCREEN RENDERING =====================
const screenEl = document.getElementById('screen-content');

function navigate(screen, data) {
  if (currentScreen) {
    screenStack.push({ screen: currentScreen, data: currentScreen._data, selectedIndex });
  }
  currentScreen = screen;
  currentScreen._data = data;
  selectedIndex = 0;
  renderScreen();
}

function goBack() {
  if (screenStack.length === 0) return;
  const prev = screenStack.pop();
  currentScreen = prev.screen;
  currentScreen._data = prev.data;
  selectedIndex = prev.selectedIndex;
  renderScreen();
}

function renderScreen() {
  const s = currentScreen;
  if (typeof s === 'function') { s(); return; }
  if (typeof screens[s] === 'function') { screens[s](); return; }
}

function getCurrentSong() {
  if (currentSongIndex < 0 || currentSongIndex >= playQueue.length) return null;
  return songs.find(s => s.id === playQueue[currentSongIndex]);
}

// Title bar HTML
function titleBarHTML(title) {
  const song = getCurrentSong();
  const playIcon = isPlaying ? '&#9654;' : '&#10073;&#10073;';
  return `<div class="title-bar">
    <span>${isPlaying || song ? playIcon + ' ' : ''}${title}</span>
    <span class="battery"><span class="battery-icon"><span class="battery-fill"></span></span></span>
  </div>`;
}

// Screen definitions
const screens = {
  main() {
    const items = [
      { label: 'Music', icon: '&#9835;', action: () => navigate('music') },
      { label: 'Now Playing', icon: '&#9654;', action: () => navigate('nowplaying') },
      { label: 'Playlists', icon: '&#9776;', action: () => navigate('playlists') },
      { label: 'Settings', icon: '&#9881;', action: () => navigate('settings') },
      { label: 'About', icon: '&#9432;', action: () => navigate('about') }
    ];
    menuItems = items;
    if (selectedIndex >= items.length) selectedIndex = items.length - 1;
    screenEl.innerHTML = titleBarHTML('iPod') + renderMenuList(items);
  },

  music() {
    const items = [
      { label: 'All Songs', action: () => navigate('allsongs') },
      { label: 'Artists', action: () => navigate('artists') },
      { label: 'Albums', action: () => navigate('albums') }
    ];
    menuItems = items;
    if (selectedIndex >= items.length) selectedIndex = items.length - 1;
    screenEl.innerHTML = titleBarHTML('Music') + renderMenuList(items);
  },

  allsongs() {
    const sorted = [...songs].sort((a, b) => a.title.localeCompare(b.title));
    const items = sorted.map(s => ({
      label: s.title,
      sub: s.artist,
      action: () => {
        playQueue = sorted.map(x => x.id);
        shuffleOrder = [];
        playSong(s.id);
        navigate('nowplaying');
      }
    }));
    if (items.length === 0) {
      items.push({ label: 'No songs yet', sub: 'Syncing library...', action: () => {} });
    }
    menuItems = items;
    if (selectedIndex >= items.length) selectedIndex = items.length - 1;
    screenEl.innerHTML = titleBarHTML('All Songs') + renderMenuList(items, true);
  },

  artists() {
    const artistMap = {};
    songs.forEach(s => {
      const a = s.artist || 'Unknown Artist';
      if (!artistMap[a]) artistMap[a] = [];
      artistMap[a].push(s);
    });
    const artists = Object.keys(artistMap).sort();
    const items = artists.map(a => ({
      label: a,
      sub: artistMap[a].length + ' song' + (artistMap[a].length !== 1 ? 's' : ''),
      arrow: true,
      action: () => navigate('artistsongs', { artist: a, songs: artistMap[a] })
    }));
    if (items.length === 0) items.push({ label: 'No artists', action: () => {} });
    menuItems = items;
    if (selectedIndex >= items.length) selectedIndex = items.length - 1;
    screenEl.innerHTML = titleBarHTML('Artists') + renderMenuList(items, true);
  },

  artistsongs() {
    const data = currentScreen._data || {};
    const sorted = (data.songs || []).sort((a, b) => a.title.localeCompare(b.title));
    const items = sorted.map(s => ({
      label: s.title,
      action: () => {
        playQueue = sorted.map(x => x.id);
        shuffleOrder = [];
        playSong(s.id);
        navigate('nowplaying');
      }
    }));
    menuItems = items;
    if (selectedIndex >= items.length) selectedIndex = items.length - 1;
    screenEl.innerHTML = titleBarHTML(data.artist || 'Artist') + renderMenuList(items, true);
  },

  albums() {
    const albumMap = {};
    songs.forEach(s => {
      const a = s.album || 'Unknown Album';
      if (!albumMap[a]) albumMap[a] = [];
      albumMap[a].push(s);
    });
    const albums = Object.keys(albumMap).sort();
    const items = albums.map(a => ({
      label: a,
      sub: albumMap[a].length + ' song' + (albumMap[a].length !== 1 ? 's' : ''),
      arrow: true,
      action: () => navigate('albumsongs', { album: a, songs: albumMap[a] })
    }));
    if (items.length === 0) items.push({ label: 'No albums', action: () => {} });
    menuItems = items;
    if (selectedIndex >= items.length) selectedIndex = items.length - 1;
    screenEl.innerHTML = titleBarHTML('Albums') + renderMenuList(items, true);
  },

  albumsongs() {
    const data = currentScreen._data || {};
    const sorted = (data.songs || []).sort((a, b) => a.title.localeCompare(b.title));
    const items = sorted.map(s => ({
      label: s.title,
      sub: s.artist,
      action: () => {
        playQueue = sorted.map(x => x.id);
        shuffleOrder = [];
        playSong(s.id);
        navigate('nowplaying');
      }
    }));
    menuItems = items;
    if (selectedIndex >= items.length) selectedIndex = items.length - 1;
    screenEl.innerHTML = titleBarHTML(data.album || 'Album') + renderMenuList(items, true);
  },

  nowplaying() {
    const song = getCurrentSong();
    const pct = audio.duration ? (audio.currentTime / audio.duration * 100) : 0;
    const eqHTML = eqEnabled ? `<div class="eq-visualizer" id="eq-viz">${Array(16).fill(0).map(() => '<div class="eq-bar" style="height:2px;"></div>').join('')}</div>` : '';
    screenEl.innerHTML = titleBarHTML('Now Playing') +
      `<div class="now-playing">
        <div class="album-art">&#9835;</div>
        <div class="np-title">${song ? escHTML(song.title) : 'No Track'}</div>
        <div class="np-artist">${song ? escHTML(song.artist || 'Unknown') : ''}</div>
        ${eqHTML}
        <div class="progress-container">
          <div class="progress-bar-bg"><div class="progress-bar-fill" style="width:${pct}%"></div></div>
          <div class="progress-times">
            <span class="time-elapsed">${formatTime(audio.currentTime)}</span>
            <span class="time-total">${formatTime(audio.duration || 0)}</span>
          </div>
          <div class="volume-display">
            <span>&#128264;</span>
            <div class="volume-bar-bg"><div class="volume-bar-fill" style="width:${volume*100}%"></div></div>
            <span>&#128266;</span>
          </div>
        </div>
      </div>`;
    if (eqEnabled && isPlaying) startEQ();
  },

  playlists() {
    const items = [
      { label: 'New Playlist...', action: createPlaylist }
    ];
    playlists.forEach(p => {
      items.push({
        label: p.name,
        sub: (p.songIds || []).length + ' songs',
        arrow: true,
        action: () => navigate('playlistview', { playlist: p })
      });
    });
    menuItems = items;
    if (selectedIndex >= items.length) selectedIndex = items.length - 1;
    screenEl.innerHTML = titleBarHTML('Playlists') + renderMenuList(items, true);
  },

  playlistview() {
    const data = currentScreen._data || {};
    const pl = data.playlist;
    if (!pl) { goBack(); return; }
    const plSongs = (pl.songIds || []).map(id => songs.find(s => s.id === id)).filter(Boolean);
    const items = [
      { label: 'Play All', action: () => {
        if (plSongs.length === 0) return;
        playQueue = plSongs.map(s => s.id);
        shuffleOrder = [];
        playSong(playQueue[0]);
        navigate('nowplaying');
      }},
      { label: 'Add Songs...', action: () => navigate('playlistaddsongs', { playlist: pl }) },
      { label: 'Delete Playlist', action: async () => {
        await dbDelete('playlists', pl.id);
        playlists = playlists.filter(p => p.id !== pl.id);
        goBack();
      }}
    ];
    plSongs.forEach(s => {
      items.push({ label: s.title, sub: s.artist });
    });
    menuItems = items;
    if (selectedIndex >= items.length) selectedIndex = items.length - 1;
    screenEl.innerHTML = titleBarHTML(pl.name) + renderMenuList(items, true);
  },

  playlistaddsongs() {
    const data = currentScreen._data || {};
    const pl = data.playlist;
    const existing = new Set(pl.songIds || []);
    const available = songs.filter(s => !existing.has(s.id)).sort((a,b) => a.title.localeCompare(b.title));
    const items = available.map(s => ({
      label: s.title,
      sub: s.artist,
      action: async () => {
        pl.songIds = pl.songIds || [];
        pl.songIds.push(s.id);
        await dbPut('playlists', pl);
        const idx = playlists.findIndex(p => p.id === pl.id);
        if (idx >= 0) playlists[idx] = pl;
        goBack();
      }
    }));
    if (items.length === 0) items.push({ label: 'No songs to add', action: () => {} });
    menuItems = items;
    if (selectedIndex >= items.length) selectedIndex = items.length - 1;
    screenEl.innerHTML = titleBarHTML('Add to ' + pl.name) + renderMenuList(items, true);
  },

  settings() {
    const items = [
      { label: 'Shuffle', value: shuffle ? 'On' : 'Off', action: () => {
        shuffle = !shuffle; shuffleOrder = [];
        localStorage.setItem('korb_ipod_shuffle', shuffle);
        renderScreen();
      }},
      { label: 'Repeat', value: repeatMode === 'off' ? 'Off' : repeatMode === 'one' ? 'One' : 'All', action: () => {
        if (repeatMode === 'off') repeatMode = 'one';
        else if (repeatMode === 'one') repeatMode = 'all';
        else repeatMode = 'off';
        localStorage.setItem('korb_ipod_repeat', repeatMode);
        renderScreen();
      }},
      { label: 'EQ Visualizer', value: eqEnabled ? 'On' : 'Off', action: () => {
        eqEnabled = !eqEnabled;
        localStorage.setItem('korb_ipod_eq', eqEnabled);
        renderScreen();
      }},
      { label: 'Clear Library', value: '', action: async () => {
        if (!confirm('Delete all songs?')) return;
        const tx = db.transaction('songs', 'readwrite');
        tx.objectStore('songs').clear();
        songs = [];
        playQueue = [];
        currentSongIndex = -1;
        audio.pause(); audio.src = ''; isPlaying = false;
        renderScreen();
      }}
    ];
    menuItems = items;
    if (selectedIndex >= items.length) selectedIndex = items.length - 1;
    screenEl.innerHTML = titleBarHTML('Settings') + renderMenuList(items, false, true);
  },

  about() {
    menuItems = [];
    screenEl.innerHTML = titleBarHTML('About') +
      `<div class="about-screen">
        <div class="logo">&#9835;</div>
        <div>Harrison's Highschool iPod</div>
        <div style="font-size:11px;opacity:0.6;margin-top:6px;">Korb Engineering</div>
        <div style="font-size:11px;opacity:0.5;margin-top:4px;">Built with nostalgia</div>
        <div style="font-size:10px;opacity:0.4;margin-top:8px;">${songs.length} song${songs.length!==1?'s':''} in library</div>
      </div>`;
  }
};

function renderMenuList(items, hasScroll, isSettings) {
  const visibleCount = 7;
  let startIdx = Math.max(0, selectedIndex - visibleCount + 1);
  if (startIdx > selectedIndex) startIdx = selectedIndex;
  const visible = items.slice(startIdx, startIdx + visibleCount);

  let html = '<div class="menu-list">';
  visible.forEach((item, i) => {
    const realIdx = startIdx + i;
    const sel = realIdx === selectedIndex ? ' selected' : '';
    const valueHTML = isSettings && item.value !== undefined
      ? `<span class="setting-value">${item.value}</span>`
      : (item.arrow ? '<span class="arrow">&#9654;</span>' : (item.sub ? `<span class="setting-value">${escHTML(item.sub)}</span>` : ''));
    html += `<div class="menu-item${sel}" data-idx="${realIdx}">${item.icon ? item.icon + ' ' : ''}${escHTML(item.label)}${valueHTML}</div>`;
  });
  html += '</div>';

  if (hasScroll && items.length > visibleCount) {
    const thumbH = Math.max(10, (visibleCount / items.length) * 100);
    const thumbTop = (startIdx / items.length) * 100;
    html += `<div class="scroll-indicator"><div class="scroll-thumb" style="height:${thumbH}%;top:${thumbTop}%;"></div></div>`;
  }
  return html;
}

function escHTML(s) {
  if (!s) return '';
  return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

// ===================== EQ VISUALIZER =====================
let eqAnimFrame = null;

function startEQ() {
  if (eqAnimFrame) cancelAnimationFrame(eqAnimFrame);
  if (!analyser || !eqEnabled || !isPlaying) return;
  const bars = document.querySelectorAll('#eq-viz .eq-bar');
  if (bars.length === 0) return;
  const bufLen = analyser.frequencyBinCount;
  const dataArr = new Uint8Array(bufLen);

  function draw() {
    if (!isPlaying || currentScreen !== 'nowplaying' || !eqEnabled) return;
    analyser.getByteFrequencyData(dataArr);
    const step = Math.floor(bufLen / bars.length);
    bars.forEach((bar, i) => {
      const val = dataArr[i * step] || 0;
      const h = Math.max(2, (val / 255) * 28);
      bar.style.height = h + 'px';
    });
    eqAnimFrame = requestAnimationFrame(draw);
  }
  draw();
}

// ===================== REPO LIBRARY AUTO-SYNC =====================
// On load, fetches content/harrisons-ipod/manifest.json and auto-imports
// any new tracks into IndexedDB. No manual add-music UI needed.

function parseFilename(name) {
  const clean = name.replace(/\.(mp3|m4a|m4b|wav|ogg|flac)$/i, '').replace(/_/g, ' ');
  const parts = clean.split(' - ');
  if (parts.length >= 2) {
    return { artist: parts[0].trim(), title: parts.slice(1).join(' - ').trim() };
  }
  return { artist: 'Unknown Artist', title: clean.trim() };
}

const REPO_SYNC_MAX_BYTES = 200 * 1024 * 1024;
const REPO_SYNC_ITEM_MAX  = 50  * 1024 * 1024;
const REPO_SYNC_ALLOWED_EXT = /\.(mp3|m4a|m4b|wav|ogg|flac)$/i;

function showToast(msg, duration) {
  const t = document.getElementById('sync-toast');
  t.textContent = msg;
  t.classList.add('visible');
  clearTimeout(t._tid);
  t._tid = setTimeout(() => t.classList.remove('visible'), duration || 3000);
}

async function autoSyncLibrary() {
  try {
    const r = await fetch('../../content/harrisons-ipod/manifest.json', { cache: 'no-cache' });
    if (!r.ok) return;
    const m = await r.json();
    if (!m || !Array.isArray(m.items) || m.items.length === 0) return;

    const have = new Set(songs.map(s => (s.filename || '').toLowerCase()));
    let added = 0, totalBytes = 0;

    for (const item of m.items) {
      if (!item || typeof item.file !== 'string') continue;
      if (item.file.indexOf('..') !== -1 || item.file.charAt(0) === '/') continue;
      if (/^[a-z][a-z0-9+.-]*:/i.test(item.file)) continue;
      if (!REPO_SYNC_ALLOWED_EXT.test(item.file)) continue;

      const filename = item.file.split('/').pop();
      if (have.has(filename.toLowerCase())) continue;
      if (totalBytes >= REPO_SYNC_MAX_BYTES) break;

      try {
        const resp = await fetch('../../content/harrisons-ipod/' + item.file, { cache: 'no-cache' });
        if (!resp.ok) continue;
        const cl = parseInt(resp.headers.get('content-length') || '0', 10);
        if (cl && cl > REPO_SYNC_ITEM_MAX) continue;
        const blob = await resp.blob();
        if (blob.size > REPO_SYNC_ITEM_MAX) continue;
        totalBytes += blob.size;

        const parsed = (item.title && item.artist)
          ? { title: item.title, artist: item.artist }
          : parseFilename(filename);
        const entry = {
          title: item.title || parsed.title,
          artist: item.artist || parsed.artist,
          album: item.album || 'Unknown Album',
          filename: filename,
          blob: blob,
          dateAdded: Date.now()
        };
        const id = await dbAdd('songs', entry);
        entry.id = id;
        songs.push(entry);
        playQueue.push(id);
        added++;
      } catch (err) { /* skip failed tracks */ }
    }

    if (added > 0) {
      showToast('Synced ' + added + ' new song' + (added !== 1 ? 's' : ''), 2500);
      renderScreen();
    }
  } catch (e) { /* manifest not found or offline — silent */ }
}

// ===================== PLAYLIST CREATION =====================
function createPlaylist() {
  const name = prompt('Playlist name:');
  if (!name || !name.trim()) return;
  const pl = { name: name.trim(), songIds: [] };
  dbAdd('playlists', pl).then(id => {
    pl.id = id;
    playlists.push(pl);
    renderScreen();
  });
}

// ===================== CLICK WHEEL =====================
const wheel = document.getElementById('click-wheel');
const centerBtn = document.getElementById('center-btn');
const wheelZones = document.querySelectorAll('.wheel-btn-zone');

function getWheelAngle(e, rect) {
  const cx = rect.left + rect.width / 2;
  const cy = rect.top + rect.height / 2;
  const clientX = e.touches ? e.touches[0].clientX : e.clientX;
  const clientY = e.touches ? e.touches[0].clientY : e.clientY;
  return Math.atan2(clientY - cy, clientX - cx) * 180 / Math.PI;
}

function isInCenter(e, rect) {
  const cx = rect.left + rect.width / 2;
  const cy = rect.top + rect.height / 2;
  const clientX = e.touches ? e.touches[0].clientX : e.clientX;
  const clientY = e.touches ? e.touches[0].clientY : e.clientY;
  const dist = Math.sqrt((clientX - cx) ** 2 + (clientY - cy) ** 2);
  return dist < rect.width * 0.18;
}

function getWheelZone(e, rect) {
  const cx = rect.left + rect.width / 2;
  const cy = rect.top + rect.height / 2;
  const clientX = e.touches ? e.touches[0].clientX : e.clientX;
  const clientY = e.touches ? e.touches[0].clientY : e.clientY;
  const dx = clientX - cx;
  const dy = clientY - cy;
  const angle = Math.atan2(dy, dx) * 180 / Math.PI;
  if (angle > -45 && angle <= 45) return 'forward';
  if (angle > 45 && angle <= 135) return 'playpause';
  if (angle > -135 && angle <= -45) return 'menu';
  return 'back';
}

// Wheel rotation tracking
wheel.addEventListener('mousedown', wheelStart);
wheel.addEventListener('touchstart', wheelStart, { passive: false });
document.addEventListener('mousemove', wheelMove);
document.addEventListener('touchmove', wheelMove, { passive: false });
document.addEventListener('mouseup', wheelEnd);
document.addEventListener('touchend', wheelEnd);

let wheelStartTime = 0;
let wheelMoved = false;

function wheelStart(e) {
  const rect = wheel.getBoundingClientRect();
  if (isInCenter(e, rect)) return; // center button handled separately
  e.preventDefault();
  wheelTracking = true;
  wheelLastAngle = getWheelAngle(e, rect);
  wheelAccum = 0;
  wheelStartTime = Date.now();
  wheelMoved = false;
}

function wheelMove(e) {
  if (!wheelTracking) return;
  e.preventDefault();
  const rect = wheel.getBoundingClientRect();
  const angle = getWheelAngle(e, rect);
  let delta = angle - wheelLastAngle;
  // Handle wrap-around
  if (delta > 180) delta -= 360;
  if (delta < -180) delta += 360;
  wheelAccum += delta;
  wheelLastAngle = angle;

  if (Math.abs(wheelAccum) >= WHEEL_THRESHOLD) {
    wheelMoved = true;
    const direction = wheelAccum > 0 ? 1 : -1;
    if (currentScreen === 'nowplaying') {
      // Volume control on now playing
      volume = Math.max(0, Math.min(1, volume + direction * 0.05));
      audio.volume = volume;
      localStorage.setItem('korb_ipod_volume', volume);
      const fill = document.querySelector('.volume-bar-fill');
      if (fill) fill.style.width = (volume * 100) + '%';
    } else {
      // Scroll in menus
      scrollMenu(direction);
    }
    wheelAccum = 0;
  }
}

function wheelEnd(e) {
  if (!wheelTracking) return;
  wheelTracking = false;
  const elapsed = Date.now() - wheelStartTime;
  // If it was a quick tap (no rotation), treat as button press
  if (!wheelMoved && elapsed < 300) {
    const rect = wheel.getBoundingClientRect();
    const zone = getWheelZone(e.changedTouches ? e.changedTouches[0] : e, rect);
    handleWheelButton(zone);
  }
}

// Center button
centerBtn.addEventListener('click', (e) => {
  e.stopPropagation();
  centerBtn.classList.add('pressed');
  setTimeout(() => centerBtn.classList.remove('pressed'), 100);
  handleSelect();
});
centerBtn.addEventListener('touchstart', (e) => {
  e.stopPropagation();
  e.preventDefault();
  centerBtn.classList.add('pressed');
});
centerBtn.addEventListener('touchend', (e) => {
  e.stopPropagation();
  e.preventDefault();
  centerBtn.classList.remove('pressed');
  handleSelect();
});

// Also handle clicks on wheel button zones for desktop
wheelZones.forEach(zone => {
  zone.addEventListener('click', (e) => {
    if (wheelMoved) return;
    e.stopPropagation();
    const btn = zone.dataset.btn;
    zone.classList.add('active');
    setTimeout(() => zone.classList.remove('active'), 150);
    handleWheelButton(btn);
  });
});

function handleWheelButton(btn) {
  switch (btn) {
    case 'menu': goBack(); break;
    case 'forward': nextTrack(); break;
    case 'back': prevTrack(); break;
    case 'playpause': togglePlay(); break;
  }
}

function handleSelect() {
  if (menuItems.length > 0 && selectedIndex < menuItems.length) {
    const item = menuItems[selectedIndex];
    if (item.action) item.action();
  }
}

function scrollMenu(direction) {
  if (menuItems.length === 0) return;
  selectedIndex += direction;
  if (selectedIndex < 0) selectedIndex = 0;
  if (selectedIndex >= menuItems.length) selectedIndex = menuItems.length - 1;
  renderScreen();
}

// ===================== KEYBOARD SUPPORT =====================
document.addEventListener('keydown', (e) => {
  switch (e.key) {
    case 'ArrowUp': scrollMenu(-1); e.preventDefault(); break;
    case 'ArrowDown': scrollMenu(1); e.preventDefault(); break;
    case 'ArrowRight': nextTrack(); e.preventDefault(); break;
    case 'ArrowLeft': prevTrack(); e.preventDefault(); break;
    case 'Enter': case ' ': handleSelect(); e.preventDefault(); break;
    case 'Escape': case 'Backspace': goBack(); e.preventDefault(); break;
    case 'p': togglePlay(); break;
  }
});

// ===================== INIT =====================
async function init() {
  // Load settings
  shuffle = localStorage.getItem('korb_ipod_shuffle') === 'true';
  repeatMode = localStorage.getItem('korb_ipod_repeat') || 'off';
  eqEnabled = localStorage.getItem('korb_ipod_eq') !== 'false';
  const savedVol = localStorage.getItem('korb_ipod_volume');
  if (savedVol) { volume = parseFloat(savedVol); audio.volume = volume; }

  await openDB();
  songs = await dbGetAll('songs');
  playlists = await dbGetAll('playlists');
  playQueue = songs.map(s => s.id);

  // Boot animation
  setTimeout(() => {
    document.getElementById('boot-screen').classList.add('fade-out');
    setTimeout(() => {
      document.getElementById('boot-screen').style.display = 'none';
    }, 800);
  }, 1800);

  // Show main menu
  currentScreen = 'main';
  renderScreen();

  // Auto-sync from repo library after boot
  autoSyncLibrary();
}

init();
</script>
