<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="description" content="International Radio // Korb Engineering — Listen to live radio stations from around the world organized by country and genre.">
<title>International Radio // Korb Engineering</title>
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box;}
:root{
--bg:#050a0f;--bg-mid:#0a1018;--bg-card:#0f1822;
--cyan:#00d4ff;--orange:#ff9900;--green:#00ff88;--red:#ff3344;
--yellow:#ffd700;--purple:#a855f7;
--border:#1a2a3a;--text:#c8d6e5;--text-dim:#5a6a7a;--text-bright:#e8f0f8;
}
html,body{height:100%;overflow:hidden;}
body{font-family:'JetBrains Mono',monospace;background:var(--bg);color:var(--text);font-size:13px;line-height:1.5;}
::-webkit-scrollbar{width:6px;height:6px;}
::-webkit-scrollbar-track{background:var(--bg);}
::-webkit-scrollbar-thumb{background:var(--border);border-radius:3px;}
::-webkit-scrollbar-thumb:hover{background:#2a3a4a;}
input,select,button,textarea{font-family:'JetBrains Mono',monospace;font-size:16px;}
button{cursor:pointer;border:none;background:none;color:var(--text);}

/* Layout */
#app{display:flex;flex-direction:column;height:100vh;height:100dvh;}
#header{display:flex;align-items:center;justify-content:space-between;background:var(--bg-mid);border-bottom:1px solid var(--border);padding:8px 16px;flex-shrink:0;gap:12px;min-height:52px;}
.logo{display:flex;align-items:center;gap:10px;flex-shrink:0;}
.logo .icon{font-size:22px;}
.logo h1{font-size:14px;font-weight:700;color:var(--cyan);letter-spacing:2px;white-space:nowrap;}
.logo h1 span{color:var(--orange);}
.header-actions{display:flex;align-items:center;gap:8px;}
.header-btn{width:44px;height:44px;display:flex;align-items:center;justify-content:center;border-radius:6px;font-size:18px;transition:all .2s;border:1px solid transparent;}
.header-btn:hover,.header-btn.active{background:var(--bg-card);border-color:var(--border);}
.header-btn.active{color:var(--cyan);}

/* Tabs */
#tabs{display:flex;background:var(--bg-mid);border-bottom:1px solid var(--border);flex-shrink:0;overflow-x:auto;}
.tab{padding:10px 18px;font-size:12px;font-weight:500;color:var(--text-dim);border-bottom:2px solid transparent;transition:all .2s;white-space:nowrap;min-height:44px;display:flex;align-items:center;}
.tab:hover{color:var(--text);}
.tab.active{color:var(--cyan);border-bottom-color:var(--cyan);}

/* Search & Filters */
#filter-bar{display:flex;gap:8px;padding:10px 16px;background:var(--bg);border-bottom:1px solid var(--border);flex-shrink:0;flex-wrap:wrap;align-items:center;}
#search-input{flex:1;min-width:180px;background:var(--bg-card);color:var(--text);border:1px solid var(--border);border-radius:6px;padding:10px 14px;font-size:16px;outline:none;transition:border-color .2s;}
#search-input:focus{border-color:var(--cyan);}
#search-input::placeholder{color:var(--text-dim);}
.filter-select{background:var(--bg-card);color:var(--text);border:1px solid var(--border);border-radius:6px;padding:10px 12px;font-size:16px;outline:none;min-height:44px;}
.filter-select:focus{border-color:var(--cyan);}

/* Genre pills */
#genre-bar{display:flex;gap:6px;padding:8px 16px;background:var(--bg);border-bottom:1px solid var(--border);flex-shrink:0;overflow-x:auto;-webkit-overflow-scrolling:touch;}
.genre-pill{padding:6px 14px;border-radius:20px;font-size:11px;font-weight:600;border:1px solid var(--border);color:var(--text-dim);white-space:nowrap;min-height:36px;display:flex;align-items:center;transition:all .2s;letter-spacing:0.5px;}
.genre-pill:hover{border-color:var(--text-dim);color:var(--text);}
.genre-pill.active{background:var(--cyan);color:var(--bg);border-color:var(--cyan);}

/* Station Grid */
#content{flex:1;overflow-y:auto;padding:12px 16px;display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));gap:10px;align-content:start;}
#content.list-view{grid-template-columns:1fr;}

.station-card{background:var(--bg-card);border:1px solid var(--border);border-radius:8px;padding:14px;cursor:pointer;transition:all .2s;display:flex;flex-direction:column;gap:6px;position:relative;min-height:80px;}
.station-card:hover{border-color:var(--cyan);background:#0d1520;}
.station-card.playing{border-color:var(--cyan);box-shadow:0 0 20px rgba(0,212,255,0.15);}
.station-card .top-row{display:flex;justify-content:space-between;align-items:flex-start;}
.station-card .station-name{font-weight:600;color:var(--text-bright);font-size:13px;}
.station-card .station-meta{font-size:11px;color:var(--text-dim);display:flex;gap:8px;align-items:center;flex-wrap:wrap;}
.station-card .station-genre{font-size:10px;padding:2px 8px;border-radius:10px;background:rgba(0,212,255,0.1);color:var(--cyan);font-weight:500;}
.station-card .station-desc{font-size:11px;color:var(--text-dim);line-height:1.4;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden;}
.fav-btn{font-size:18px;padding:4px;color:var(--text-dim);transition:all .2s;flex-shrink:0;width:36px;height:36px;display:flex;align-items:center;justify-content:center;border-radius:4px;}
.fav-btn:hover{color:var(--yellow);}
.fav-btn.faved{color:var(--yellow);}
.playing-indicator{display:none;width:20px;height:16px;gap:2px;align-items:flex-end;margin-right:4px;}
.station-card.playing .playing-indicator{display:flex;}
.playing-indicator span{width:3px;background:var(--cyan);border-radius:1px;animation:eqBar 0.8s ease-in-out infinite alternate;}
.playing-indicator span:nth-child(2){animation-delay:0.2s;}
.playing-indicator span:nth-child(3){animation-delay:0.4s;}
@keyframes eqBar{0%{height:4px}100%{height:14px}}

/* List view cards */
.list-view .station-card{flex-direction:row;align-items:center;gap:16px;min-height:56px;padding:10px 14px;}
.list-view .station-card .top-row{flex:1;align-items:center;}
.list-view .station-card .station-desc{display:none;}

/* Player Bar */
#player{background:var(--bg-mid);border-top:1px solid var(--border);padding:10px 16px;flex-shrink:0;display:flex;align-items:center;gap:14px;min-height:72px;}
#player.hidden{display:none;}
.player-play{width:48px;height:48px;border-radius:50%;background:var(--cyan);color:var(--bg);display:flex;align-items:center;justify-content:center;font-size:20px;flex-shrink:0;transition:all .2s;}
.player-play:hover{transform:scale(1.05);background:#33ddff;}
.player-play.paused{background:var(--orange);}
.player-info{flex:1;min-width:0;}
.player-station{font-weight:600;color:var(--text-bright);font-size:13px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.player-meta{font-size:11px;color:var(--text-dim);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.player-controls{display:flex;align-items:center;gap:12px;flex-shrink:0;}
#volume-slider{width:80px;accent-color:var(--cyan);height:4px;}
#visualizer-canvas{width:120px;height:36px;border-radius:4px;flex-shrink:0;}
.sleep-btn{font-size:11px;color:var(--text-dim);border:1px solid var(--border);border-radius:4px;padding:4px 10px;min-height:36px;transition:all .2s;}
.sleep-btn:hover{color:var(--text);border-color:var(--text-dim);}
.sleep-btn.active{color:var(--orange);border-color:var(--orange);}

/* Map View */
#map-view{display:none;flex:1;overflow:auto;padding:16px;position:relative;}
#map-view.active{display:block;}
#map-svg{width:100%;max-width:900px;margin:0 auto;display:block;}
.map-dot{cursor:pointer;transition:all .2s;}
.map-dot:hover{r:6;fill:var(--cyan);}

/* Toast */
#toast{position:fixed;top:20px;right:20px;background:var(--bg-card);border:1px solid var(--cyan);border-radius:8px;padding:12px 20px;z-index:999;transform:translateX(120%);transition:transform .3s ease;box-shadow:0 4px 24px rgba(0,0,0,0.5);}
#toast.show{transform:translateX(0);}
#toast .toast-station{color:var(--cyan);font-weight:600;font-size:13px;}
#toast .toast-label{color:var(--text-dim);font-size:10px;margin-bottom:2px;}

/* Sleep Timer Modal */
.modal-overlay{position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,0.7);z-index:998;display:none;align-items:center;justify-content:center;padding:20px;}
.modal-overlay.show{display:flex;}
.modal{background:var(--bg-card);border:1px solid var(--border);border-radius:12px;padding:24px;max-width:320px;width:100%;}
.modal h3{color:var(--cyan);font-size:14px;margin-bottom:16px;}
.modal-btn{width:100%;padding:12px;margin-bottom:8px;background:var(--bg-mid);border:1px solid var(--border);color:var(--text);border-radius:6px;font-size:14px;text-align:center;min-height:48px;transition:all .2s;}
.modal-btn:hover{border-color:var(--cyan);color:var(--cyan);}
.modal-btn.cancel{color:var(--red);border-color:var(--red);background:transparent;margin-top:8px;}

/* Empty state */
.empty-state{grid-column:1/-1;text-align:center;padding:60px 20px;color:var(--text-dim);}
.empty-state .icon{font-size:48px;margin-bottom:12px;}
.empty-state p{font-size:13px;}

/* Loading spinner */
.loading-spinner{display:inline-block;width:16px;height:16px;border:2px solid var(--border);border-top-color:var(--cyan);border-radius:50%;animation:spin 0.8s linear infinite;}
@keyframes spin{to{transform:rotate(360deg)}}

/* Mobile */
@media(max-width:640px){
  .logo h1{font-size:12px;letter-spacing:1px;}
  #filter-bar{padding:8px 10px;}
  #content{padding:8px 10px;grid-template-columns:1fr;}
  #player{padding:8px 10px;gap:10px;}
  #visualizer-canvas{display:none;}
  #volume-slider{width:60px;}
  .player-controls{gap:8px;}
  .station-card{padding:12px;}
}
</style>
</head>

<div id="app">

  </div>

  <div id="tabs">

  </div>

  <div id="filter-bar">

      <option value="Europe">Europe</option>
      <option value="Americas">Americas</option>
      <option value="Asia">Asia</option>
      <option value="Africa">Africa</option>
      <option value="Middle East">Middle East</option>
      <option value="Oceania">Oceania</option>
    </select>
  </div>

  <div id="genre-bar">
    <button class="genre-pill active" data-genre="">All</button>
    <button class="genre-pill" data-genre="News">News</button>
    <button class="genre-pill" data-genre="Jazz">Jazz</button>
    <button class="genre-pill" data-genre="Classical">Classical</button>
    <button class="genre-pill" data-genre="Pop">Pop</button>
    <button class="genre-pill" data-genre="Rock">Rock</button>
    <button class="genre-pill" data-genre="Electronic">Electronic</button>
    <button class="genre-pill" data-genre="World">World</button>
    <button class="genre-pill" data-genre="Talk">Talk</button>

    <button class="genre-pill" data-genre="Lo-Fi">Lo-Fi</button>

  </div>

  <div id="content"></div>

  <div id="map-view">
    <svg id="map-svg" viewBox="0 0 900 450" xmlns="http://www.w3.org/2000/svg"></svg>
  </div>

  <div id="player" class="hidden">
    <button class="player-play" id="play-btn">&#9654;</button>
    <div class="player-info">
      <div class="player-station" id="player-station">---</div>
      <div class="player-meta" id="player-meta">Select a station to begin</div>
    </div>
    <canvas id="visualizer-canvas" width="240" height="72"></canvas>
    <div class="player-controls">
      <input type="range" id="volume-slider" min="0" max="100" value="75" title="Volume">
      <button class="sleep-btn" id="sleep-btn" title="Sleep timer">💤</button>
    </div>
  </div>
</div>

<div id="toast">
  <div class="toast-label">NOW PLAYING</div>
  <div class="toast-station" id="toast-station"></div>
</div>

<div class="modal-overlay" id="sleep-modal">
  <div class="modal">
    <h3>Sleep Timer</h3>
    <button class="modal-btn" data-mins="15">15 minutes</button>
    <button class="modal-btn" data-mins="30">30 minutes</button>
    <button class="modal-btn" data-mins="60">60 minutes</button>
    <button class="modal-btn" data-mins="90">90 minutes</button>
    <button class="modal-btn" data-mins="0">Off</button>
    <button class="modal-btn cancel" id="sleep-cancel">Cancel</button>
  </div>
</div>

<audio id="audio" crossorigin="anonymous" preload="none"></audio>

// ─── State ───
const LS_PREFIX = 'korb_radio_';
let favorites = JSON.parse(localStorage.getItem(LS_PREFIX+'favorites')||'[]');
let recentlyPlayed = JSON.parse(localStorage.getItem(LS_PREFIX+'recent')||'[]');
let currentStation = null;
let isPlaying = false;
let currentTab = 'browse';
let selectedGenre = '';
let selectedRegion = '';
let searchQuery = '';
let listView = false;
let mapActive = false;
let sleepTimer = null;
let sleepEndTime = null;
let audioCtx = null;
let analyser = null;
let animFrame = null;

const audio = document.getElementById('audio');
const contentEl = document.getElementById('content');
const playerEl = document.getElementById('player');
const playBtn = document.getElementById('play-btn');
const volumeSlider = document.getElementById('volume-slider');
const canvas = document.getElementById('visualizer-canvas');
const ctx = canvas.getContext('2d');

// ─── Init ───
audio.volume = 0.75;

function saveFavorites(){ localStorage.setItem(LS_PREFIX+'favorites', JSON.stringify(favorites)); }
function saveRecent(){ localStorage.setItem(LS_PREFIX+'recent', JSON.stringify(recentlyPlayed)); }

function isFavorite(name){ return favorites.includes(name); }
function toggleFavorite(name, e){
  if(e) e.stopPropagation();
  const i = favorites.indexOf(name);
  if(i>=0) favorites.splice(i,1); else favorites.push(name);
  saveFavorites();
  render();
}

// ─── Filtering ───
function getFilteredStations(){
  let list = STATIONS;
  if(currentTab==='favorites') list = STATIONS.filter(s=>favorites.includes(s.name));
  if(currentTab==='recent') list = recentlyPlayed.map(n=>STATIONS.find(s=>s.name===n)).filter(Boolean);
  if(selectedGenre) list = list.filter(s=>s.genre===selectedGenre);
  if(selectedRegion) list = list.filter(s=>s.region===selectedRegion);
  if(searchQuery){
    const q = searchQuery.toLowerCase();
    list = list.filter(s=>s.name.toLowerCase().includes(q)||s.country.toLowerCase().includes(q)||s.genre.toLowerCase().includes(q)||s.desc.toLowerCase().includes(q));
  }
  return list;
}

// ─── Render ───
function render(){
  const stations = getFilteredStations();
  if(stations.length===0){
    let msg = 'No stations found.';
    if(currentTab==='favorites') msg = 'No favorites yet. Star a station to add it here.';
    if(currentTab==='recent') msg = 'No recently played stations yet.';
    contentEl.innerHTML = `<div class="empty-state"><div class="icon">📻</div><p>${msg}</p></div>`;
    return;
  }
  contentEl.innerHTML = stations.map(s=>{
    const playing = currentStation && currentStation.name === s.name;
    const faved = isFavorite(s.name);
    return `<div class="station-card ${playing?'playing':''}" onclick="playStation('${s.name.replace(/'/g,"\\'")}')">
      <div class="top-row">
        <div>
          <div class="station-name">
            <div class="playing-indicator"><span></span><span></span><span></span></div>
            ${s.flag} ${s.name}
          </div>
          <div class="station-meta">
            <span>${s.country}</span>
            <span class="station-genre">${s.genre}</span>
          </div>
        </div>
        <button class="fav-btn ${faved?'faved':''}" onclick="toggleFavorite('${s.name.replace(/'/g,"\\'")}',event)" title="${faved?'Remove from favorites':'Add to favorites'}">${faved?'★':'☆'}</button>
      </div>
      <div class="station-desc">${s.desc}</div>
    </div>`;
  }).join('');
}

// ─── Play Station ───
function playStation(name){
  const station = STATIONS.find(s=>s.name===name);
  if(!station) return;

  if(currentStation && currentStation.name === name){
    togglePlay();
    return;
  }

  currentStation = station;
  audio.src = station.url;
  audio.play().catch(()=>{});
  isPlaying = true;

  // Update recent
  recentlyPlayed = recentlyPlayed.filter(n=>n!==name);
  recentlyPlayed.unshift(name);
  if(recentlyPlayed.length>20) recentlyPlayed = recentlyPlayed.slice(0,20);
  saveRecent();

  updatePlayer();
  render();
  showToast(station);
  initVisualizer();
}

function togglePlay(){
  if(!currentStation) return;
  if(isPlaying){
    audio.pause();
    isPlaying = false;
  } else {
    audio.play().catch(()=>{});
    isPlaying = true;
  }
  updatePlayer();
}

function updatePlayer(){
  playerEl.classList.remove('hidden');
  if(!currentStation) return;
  document.getElementById('player-station').textContent = `${currentStation.flag} ${currentStation.name}`;
  document.getElementById('player-meta').textContent = `${currentStation.country} | ${currentStation.genre} | ${currentStation.desc}`;
  playBtn.innerHTML = isPlaying ? '&#9646;&#9646;' : '&#9654;';
  playBtn.classList.toggle('paused', !isPlaying);
}

// ─── Toast ───
function showToast(station){
  const toast = document.getElementById('toast');
  document.getElementById('toast-station').textContent = `${station.flag} ${station.name}`;
  toast.classList.add('show');
  setTimeout(()=>toast.classList.remove('show'), 3000);
}

// ─── Visualizer ───
function initVisualizer(){
  if(!audioCtx){
    try {
      audioCtx = new (window.AudioContext||window.webkitAudioContext)();
      const source = audioCtx.createMediaElementSource(audio);
      analyser = audioCtx.createAnalyser();
      analyser.fftSize = 64;
      source.connect(analyser);
      analyser.connect(audioCtx.destination);
    } catch(e){ return; }
  }
  if(audioCtx.state==='suspended') audioCtx.resume();
  if(animFrame) cancelAnimationFrame(animFrame);
  drawVisualizer();
}

function drawVisualizer(){
  animFrame = requestAnimationFrame(drawVisualizer);
  if(!analyser) return;
  const bufferLength = analyser.frequencyBinCount;
  const data = new Uint8Array(bufferLength);
  analyser.getByteFrequencyData(data);

  const w = canvas.width;
  const h = canvas.height;
  ctx.clearRect(0,0,w,h);

  const barW = (w/bufferLength)*1.5;
  let x = 0;
  for(let i=0; i<bufferLength; i++){
    const barH = (data[i]/255)*h;
    const hue = 190 + (i/bufferLength)*30;
    ctx.fillStyle = `hsl(${hue},100%,${50+data[i]/5}%)`;
    ctx.fillRect(x, h-barH, barW-1, barH);
    x += barW;
  }
}

// ─── Sleep Timer ───
const sleepModal = document.getElementById('sleep-modal');
const sleepBtn = document.getElementById('sleep-btn');

sleepBtn.addEventListener('click', ()=>{ sleepModal.classList.add('show'); });
document.getElementById('sleep-cancel').addEventListener('click', ()=>{ sleepModal.classList.remove('show'); });

sleepModal.querySelectorAll('.modal-btn[data-mins]').forEach(btn=>{
  btn.addEventListener('click', ()=>{
    const mins = parseInt(btn.dataset.mins);
    if(sleepTimer) clearTimeout(sleepTimer);
    sleepTimer = null;
    sleepEndTime = null;

    if(mins > 0){
      sleepEndTime = Date.now() + mins*60*1000;
      sleepTimer = setTimeout(()=>{
        audio.pause();
        isPlaying = false;
        updatePlayer();
        sleepBtn.classList.remove('active');
        sleepBtn.textContent = '💤';
        sleepTimer = null;
        sleepEndTime = null;
      }, mins*60*1000);
      sleepBtn.classList.add('active');
      sleepBtn.textContent = `${mins}m`;
    } else {
      sleepBtn.classList.remove('active');
      sleepBtn.textContent = '💤';
    }
    sleepModal.classList.remove('show');
  });
});

// Update sleep timer display
setInterval(()=>{
  if(sleepEndTime){
    const remaining = Math.max(0, Math.ceil((sleepEndTime - Date.now())/60000));
    if(remaining>0) sleepBtn.textContent = `${remaining}m`;
  }
}, 10000);

volumeSlider.addEventListener('input', ()=>{ audio.volume = volumeSlider.value/100; });

// ─── Play button ───
playBtn.addEventListener('click', togglePlay);

document.querySelectorAll('.tab').forEach(tab=>{

  listView = !listView;

  document.getElementById('view-toggle-btn').textContent = listView ? '⊞' : '☰';
});

// ─── Map View ───
document.getElementById('map-toggle-btn').addEventListener('click', ()=>{
  mapActive = !mapActive;
  const mv = document.getElementById('map-view');
  if(mapActive){
    mv.classList.add('active');
    contentEl.style.display = 'none';
    document.getElementById('map-toggle-btn').classList.add('active');
    renderMap();
  } else {
    mv.classList.remove('active');
    contentEl.style.display = '';
    document.getElementById('map-toggle-btn').classList.remove('active');
  }
});

function renderMap(){
  const svg = document.getElementById('map-svg');
  // Simple equirectangular projection
  const w = 900, h = 450;
  function project(lat, lon){
    const x = (lon + 180) / 360 * w;
    const y = (90 - lat) / 180 * h;
    return {x, y};
  }

  // Draw simplified continent outlines as background
  let html = `<rect width="${w}" height="${h}" fill="var(--bg)" rx="8"/>`;

  // Simple continent shapes (very simplified polygons)
  const continents = [
    // North America
    'M80,80 L200,60 L240,90 L250,130 L230,170 L200,200 L170,210 L140,200 L100,180 L80,140Z',
    // South America
    'M180,220 L210,210 L240,230 L250,280 L240,340 L220,370 L200,380 L180,360 L170,310 L175,260Z',
    // Europe
    'M400,60 L460,50 L500,70 L510,100 L490,130 L460,140 L430,130 L410,110 L400,80Z',
    // Africa
    'M400,150 L460,140 L490,160 L500,200 L490,260 L470,310 L440,330 L420,310 L410,260 L400,200Z',
    // Asia
    'M500,40 L700,30 L760,70 L770,120 L740,160 L700,180 L650,170 L600,160 L550,140 L520,110 L500,70Z',
    // Oceania/Australia
    'M680,260 L740,250 L770,270 L770,310 L740,330 L700,320 L680,290Z',
  ];

  continents.forEach(d=>{
    html += `<path d="${d}" fill="var(--bg-card)" stroke="var(--border)" stroke-width="1" opacity="0.5"/>`;
  });

  // Plot unique country positions
  const seen = new Set();
  STATIONS.forEach(s=>{
    const key = `${s.lat},${s.lon}`;
    if(seen.has(key)) return;
    seen.add(key);
    const {x, y} = project(s.lat, s.lon);
    const playing = currentStation && currentStation.lat===s.lat && currentStation.lon===s.lon;
    const color = playing ? 'var(--cyan)' : 'var(--orange)';
    const r = playing ? 6 : 4;
    html += `<circle class="map-dot" cx="${x}" cy="${y}" r="${r}" fill="${color}" stroke="${color}" stroke-opacity="0.3" stroke-width="${playing?4:2}" onclick="playFromMap(${s.lat},${s.lon})">
      <title>${s.flag} ${s.country}</title>
    </circle>`;
    if(playing){
      html += `<circle cx="${x}" cy="${y}" r="10" fill="none" stroke="var(--cyan)" stroke-width="1" opacity="0.5"><animate attributeName="r" values="8;16" dur="1.5s" repeatCount="indefinite"/><animate attributeName="opacity" values="0.6;0" dur="1.5s" repeatCount="indefinite"/></circle>`;
    }
  });

  // Labels for key cities
  const labels = [
    {lat:48.86,lon:2.35,label:'Paris'},{lat:51.51,lon:-0.13,label:'London'},
    {lat:40.71,lon:-74,label:'New York'},{lat:35.68,lon:139.69,label:'Tokyo'},
    {lat:-33.87,lon:151.21,label:'Sydney'},{lat:-34.6,lon:-58.38,label:'Buenos Aires'},
  ];
  labels.forEach(l=>{
    const {x,y} = project(l.lat, l.lon);
    html += `<text x="${x}" y="${y-10}" fill="var(--text-dim)" font-size="9" text-anchor="middle" font-family="JetBrains Mono">${l.label}</text>`;
  });

  svg.innerHTML = html;
}

window.playFromMap = function(lat, lon){
  const station = STATIONS.find(s=>s.lat===lat && s.lon===lon);
  if(station) playStation(station.name);
};

// ─── Audio events ───
audio.addEventListener('error', ()=>{
  // Try Radio Browser API as fallback
  if(currentStation){
    tryRadioBrowserFallback(currentStation);
  }
});

audio.addEventListener('playing', ()=>{
  isPlaying = true;
  updatePlayer();
  render();
});

audio.addEventListener('pause', ()=>{
  isPlaying = false;
  updatePlayer();
  render();
});

async function tryRadioBrowserFallback(station){
  try {
    const resp = await fetch(`https://de1.api.radio-browser.info/json/stations/byname/${encodeURIComponent(station.name)}?limit=3`);
    const data = await resp.json();
    if(data.length > 0){
      const fallbackUrl = data[0].url_resolved || data[0].url;
      if(fallbackUrl && fallbackUrl !== station.url){
        audio.src = fallbackUrl;
        audio.play().catch(()=>{});
      }
    }
  } catch(e){}
}

// ─── Keyboard shortcuts ───
document.addEventListener('keydown', e=>{
  if(e.target.tagName==='INPUT'||e.target.tagName==='TEXTAREA') return;
  if(e.code==='Space'){ e.preventDefault(); togglePlay(); }
});

// ─── Initial render ───
render();

// Make playStation global
window.playStation = playStation;
window.toggleFavorite = toggleFavorite;
</script>
</body>
</html>
