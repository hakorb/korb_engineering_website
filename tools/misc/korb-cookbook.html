<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>KORB COOKBOOK</title>
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{--bg:#050a0f;--bg2:#0a1018;--bg3:#0d1520;--bg4:#111d2b;--cyan:#00d4ff;--orange:#ff6600;--border:#1a2a3a;--text:#e2e8f0;--text2:#94a3b8;--text3:#64748b;--green:#22c55e;--red:#ef4444;--yellow:#eab308}
body{font-family:'JetBrains Mono',monospace;background:var(--bg);color:var(--text);min-height:100vh;overflow-x:hidden}
input,textarea,select,button{font-family:inherit;font-size:inherit}
a{color:var(--cyan);text-decoration:none}
::-webkit-scrollbar{width:6px}::-webkit-scrollbar-track{background:var(--bg2)}::-webkit-scrollbar-thumb{background:var(--border);border-radius:3px}

/* Header */
.header{background:var(--bg2);border-bottom:1px solid var(--border);padding:12px 20px;display:flex;align-items:center;gap:16px;position:sticky;top:0;z-index:100}
.ke-logo{width:40px;height:40px;border:2px solid var(--cyan);display:flex;align-items:center;justify-content:center;font-weight:700;font-size:14px;color:var(--cyan);flex-shrink:0}
.header h1{font-size:20px;font-weight:700;color:var(--cyan);letter-spacing:3px}
.header-nav{margin-left:auto;display:flex;gap:8px}
.header-nav button{background:none;border:1px solid var(--border);color:var(--text2);padding:6px 14px;cursor:pointer;font-size:12px;transition:all .2s;border-radius:2px}
.header-nav button:hover,.header-nav button.active{border-color:var(--cyan);color:var(--cyan)}

/* Fixed label */
.ke-label{position:fixed;bottom:12px;right:16px;font-size:10px;color:var(--text3);letter-spacing:2px;z-index:200;background:var(--bg);padding:4px 8px;border:1px solid var(--border)}

/* Main layout */
.app{display:flex;flex-direction:column;min-height:calc(100vh - 65px)}
.view{display:none;padding:20px;flex:1}.view.active{display:block}

/* Filters */
.filters{display:flex;flex-wrap:wrap;gap:10px;margin-bottom:20px;align-items:center}
.filters input[type="text"]{background:var(--bg3);border:1px solid var(--border);color:var(--text);padding:8px 12px;flex:1;min-width:200px;border-radius:2px}
.filters select{background:var(--bg3);border:1px solid var(--border);color:var(--text);padding:8px 10px;border-radius:2px}
.filters input:focus,.filters select:focus{outline:none;border-color:var(--cyan)}
.filters label{display:flex;align-items:center;gap:6px;color:var(--text2);font-size:16px;cursor:pointer}
.btn{background:none;border:1px solid var(--cyan);color:var(--cyan);padding:8px 16px;cursor:pointer;font-size:12px;transition:all .2s;border-radius:2px}
.btn:hover{background:var(--cyan);color:var(--bg)}
.btn-orange{border-color:var(--orange);color:var(--orange)}.btn-orange:hover{background:var(--orange);color:var(--bg)}
.btn-green{border-color:var(--green);color:var(--green)}.btn-green:hover{background:var(--green);color:var(--bg)}
.btn-red{border-color:var(--red);color:var(--red)}.btn-red:hover{background:var(--red);color:var(--bg)}
.btn-sm{padding:4px 10px;font-size:11px}

/* Recipe Grid */
.recipe-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));gap:16px}
.recipe-card{background:var(--bg2);border:1px solid var(--border);cursor:pointer;transition:all .2s;overflow:hidden;border-radius:2px}
.recipe-card:hover{border-color:var(--cyan);transform:translateY(-2px)}
.recipe-card-img{width:100%;height:180px;background:var(--bg3);display:flex;align-items:center;justify-content:center;color:var(--text3);font-size:40px;overflow:hidden}
.recipe-card-img img{width:100%;height:100%;object-fit:cover}
.recipe-card-body{padding:14px}
.recipe-card-body h3{font-size:14px;margin-bottom:6px;color:var(--text)}
.recipe-card-meta{font-size:11px;color:var(--text3);display:flex;flex-wrap:wrap;gap:6px;margin-bottom:6px}
.recipe-card-tags{display:flex;flex-wrap:wrap;gap:4px}
.tag{font-size:10px;padding:2px 8px;border:1px solid var(--border);color:var(--text2);border-radius:2px}
.tag-cat{border-color:var(--cyan);color:var(--cyan)}.tag-cuisine{border-color:var(--orange);color:var(--orange)}
.stars{color:var(--yellow);letter-spacing:2px;font-size:13px}
.star-btn{cursor:pointer;background:none;border:none;color:var(--text3);font-size:18px;padding:0 2px;transition:color .15s}
.star-btn.filled{color:var(--yellow)}
.fav-star{position:absolute;top:8px;right:8px;background:rgba(5,10,15,.7);border:none;color:var(--text3);font-size:20px;cursor:pointer;padding:4px;border-radius:2px}
.fav-star.favorited{color:var(--yellow)}
.recipe-card{position:relative}

/* Detail View */
.detail-header{display:flex;gap:24px;margin-bottom:24px;flex-wrap:wrap}
.detail-photo{width:360px;height:260px;background:var(--bg3);border:1px solid var(--border);display:flex;align-items:center;justify-content:center;color:var(--text3);font-size:48px;flex-shrink:0;overflow:hidden;border-radius:2px}
.detail-photo img{width:100%;height:100%;object-fit:cover}
.detail-info{flex:1;min-width:280px}
.detail-info h2{font-size:24px;color:var(--cyan);margin-bottom:8px}
.detail-attribution{color:var(--text2);font-size:13px;margin-bottom:10px;font-style:italic}
.detail-times{display:flex;gap:20px;margin:12px 0;font-size:12px;color:var(--text2)}
.detail-times span{display:flex;flex-direction:column;gap:2px}.detail-times strong{color:var(--text);font-size:14px}
.servings-control{display:flex;align-items:center;gap:10px;margin:12px 0}
.servings-control button{width:30px;height:30px;background:var(--bg3);border:1px solid var(--border);color:var(--cyan);cursor:pointer;font-size:16px;display:flex;align-items:center;justify-content:center;border-radius:2px}
.servings-control button:hover{border-color:var(--cyan)}
.servings-control .count{font-size:18px;font-weight:600;color:var(--text);min-width:30px;text-align:center}
.detail-tags{display:flex;flex-wrap:wrap;gap:6px;margin:12px 0}

/* Ingredients & Steps */
.section-title{font-size:16px;color:var(--cyan);margin:24px 0 12px;letter-spacing:2px;border-bottom:1px solid var(--border);padding-bottom:6px}
.ingredient-list{list-style:none}
.ingredient-list li{padding:8px 0;border-bottom:1px solid rgba(26,42,58,.4);display:flex;align-items:center;gap:10px;font-size:13px}
.ingredient-list li.checked{color:var(--text3);text-decoration:line-through}
.ingredient-list input[type="checkbox"]{accent-color:var(--cyan);width:16px;height:16px;cursor:pointer}
.step-list{list-style:none;counter-reset:step}
.step-list li{padding:12px 0;border-bottom:1px solid rgba(26,42,58,.4);display:flex;gap:12px;font-size:13px;cursor:pointer;transition:opacity .2s}
.step-list li.done{opacity:.4;text-decoration:line-through}
.step-num{background:var(--bg3);border:1px solid var(--border);width:28px;height:28px;display:flex;align-items:center;justify-content:center;font-size:12px;color:var(--cyan);flex-shrink:0;border-radius:2px}
.step-list li.done .step-num{background:var(--green);border-color:var(--green);color:var(--bg)}
.step-time{color:var(--orange);font-size:11px;margin-top:4px}
.notes-box{background:var(--bg3);border:1px solid var(--border);padding:16px;margin-top:16px;font-size:13px;color:var(--text2);line-height:1.6;border-radius:2px;white-space:pre-wrap}
.detail-actions{display:flex;gap:10px;margin-top:20px;flex-wrap:wrap}

/* Form */
.form-grid{display:grid;grid-template-columns:1fr 1fr;gap:16px}
.form-group{display:flex;flex-direction:column;gap:4px}
.form-group.full{grid-column:1/-1}
.form-group label{font-size:16px;color:var(--text2);text-transform:uppercase;letter-spacing:1px}
.form-group input,.form-group select,.form-group textarea{background:var(--bg3);border:1px solid var(--border);color:var(--text);padding:8px 12px;border-radius:2px}
.form-group input:focus,.form-group select:focus,.form-group textarea:focus{outline:none;border-color:var(--cyan)}
.form-group textarea{min-height:80px;resize:vertical}
.dyn-row{display:flex;gap:8px;align-items:center;margin-bottom:8px;flex-wrap:wrap}
.dyn-row input,.dyn-row select{background:var(--bg3);border:1px solid var(--border);color:var(--text);padding:6px 8px;border-radius:2px}
.dyn-row input:focus,.dyn-row select:focus{outline:none;border-color:var(--cyan)}
.dyn-row .remove-btn{background:none;border:1px solid var(--red);color:var(--red);width:28px;height:28px;cursor:pointer;font-size:14px;display:flex;align-items:center;justify-content:center;flex-shrink:0;border-radius:2px}
.dyn-row .remove-btn:hover{background:var(--red);color:var(--bg)}
.photo-upload{width:200px;height:150px;background:var(--bg3);border:2px dashed var(--border);display:flex;align-items:center;justify-content:center;cursor:pointer;color:var(--text3);font-size:12px;text-align:center;overflow:hidden;border-radius:2px}
.photo-upload img{width:100%;height:100%;object-fit:cover}
.photo-upload:hover{border-color:var(--cyan)}
.form-actions{display:flex;gap:10px;margin-top:20px}

/* Meal Planner */
.planner-week{display:grid;grid-template-columns:repeat(7,1fr);gap:8px;margin-bottom:20px}
.planner-day{background:var(--bg2);border:1px solid var(--border);padding:10px;min-height:200px;border-radius:2px}
.planner-day h4{font-size:11px;color:var(--cyan);text-transform:uppercase;letter-spacing:1px;margin-bottom:8px;text-align:center;border-bottom:1px solid var(--border);padding-bottom:6px}
.meal-slot{margin-bottom:8px}
.meal-slot-label{font-size:10px;color:var(--orange);text-transform:uppercase;margin-bottom:4px}
.meal-slot-item{font-size:11px;color:var(--text);background:var(--bg3);padding:4px 8px;border-radius:2px;display:flex;justify-content:space-between;align-items:center;margin-bottom:2px}
.meal-slot-item .remove-meal{background:none;border:none;color:var(--red);cursor:pointer;font-size:12px}
.add-meal-btn{font-size:10px;color:var(--text3);background:none;border:1px dashed var(--border);padding:3px 6px;cursor:pointer;width:100%;text-align:center;border-radius:2px}
.add-meal-btn:hover{border-color:var(--cyan);color:var(--cyan)}

/* Shopping List */
.shopping-section{margin-bottom:16px}
.shopping-section h4{font-size:12px;color:var(--orange);margin-bottom:8px;text-transform:uppercase;letter-spacing:1px}
.shopping-item{display:flex;align-items:center;gap:8px;padding:6px 0;font-size:12px;border-bottom:1px solid rgba(26,42,58,.3)}
.shopping-item input[type="checkbox"]{accent-color:var(--green)}
.shopping-item.checked{color:var(--text3);text-decoration:line-through}

/* Modal */
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.7);z-index:300;display:flex;align-items:center;justify-content:center}
.modal{background:var(--bg2);border:1px solid var(--border);padding:20px;max-width:400px;width:90%;max-height:80vh;overflow-y:auto;border-radius:2px}
.modal h3{color:var(--cyan);margin-bottom:12px;font-size:14px}
.modal-recipe-list{list-style:none}
.modal-recipe-list li{padding:8px;cursor:pointer;border-bottom:1px solid var(--border);font-size:12px;color:var(--text)}
.modal-recipe-list li:hover{background:var(--bg3);color:var(--cyan)}

/* Print */
@media print{
  .header,.ke-label,.filters,.header-nav,.detail-actions,.no-print{display:none!important}
  body{background:#fff;color:#000}
  .detail-photo{border-color:#ccc}
  .tag{border-color:#ccc;color:#333}
  .section-title{color:#000;border-color:#ccc}
  .ingredient-list li,.step-list li{border-color:#eee}
  .step-num{background:#eee;border-color:#ccc;color:#000}
  .notes-box{background:#f5f5f5;border-color:#ccc;color:#333}
}

/* Mobile */
@media(max-width:768px){
  .header{flex-wrap:wrap}.header-nav{width:100%;justify-content:center}
  .detail-header{flex-direction:column}.detail-photo{width:100%;height:200px}
  .form-grid{grid-template-columns:1fr}
  .planner-week{grid-template-columns:1fr}
  .recipe-grid{grid-template-columns:1fr}
  .filters{flex-direction:column}.filters input[type="text"]{min-width:unset;width:100%}
}
</style>
</head>
<body>

<div class="header">
  <div class="ke-logo">KE</div>
  <h1>KORB COOKBOOK</h1>
  <nav class="header-nav">
    <button class="active" onclick="showView('browse')">Browse</button>
    <button onclick="showView('add')">+ Recipe</button>
    <button onclick="showView('planner')">Meal Planner</button>
    <button onclick="showView('io')">Import/Export</button>
  </nav>
</div>

<div class="app">
  <!-- BROWSE VIEW -->
  <div id="view-browse" class="view active">
    <div class="filters">
      <input type="text" id="search-input" placeholder="Search recipes..." oninput="renderBrowse()">
      <select id="filter-category" onchange="renderBrowse()">
        <option value="">All Categories</option>
        <option>Breakfast</option><option>Lunch</option><option>Dinner</option><option>Appetizer</option><option>Side</option><option>Dessert</option><option>Snack</option><option>Drink</option><option>Sauce/Dressing</option>
      </select>
      <select id="filter-cuisine" onchange="renderBrowse()">
        <option value="">All Cuisines</option>
        <option>American</option><option>Italian</option><option>Mexican</option><option>Asian</option><option>Southern</option><option>Mediterranean</option><option>BBQ/Grilling</option><option>Seafood</option><option>Other</option>
      </select>
      <select id="filter-difficulty" onchange="renderBrowse()">
        <option value="">All Difficulty</option>
        <option>Easy</option><option>Medium</option><option>Hard</option>
      </select>
      <select id="sort-by" onchange="renderBrowse()">
        <option value="dateDesc">Newest First</option>
        <option value="dateAsc">Oldest First</option>
        <option value="nameAsc">Name A-Z</option>
        <option value="nameDesc">Name Z-A</option>
        <option value="ratingDesc">Highest Rated</option>
        <option value="prepAsc">Quickest Prep</option>
      </select>
      <label><input type="checkbox" id="filter-fav" onchange="renderBrowse()"> Favorites</label>
    </div>
    <div id="recipe-grid" class="recipe-grid"></div>
  </div>

  <!-- DETAIL VIEW -->
  <div id="view-detail" class="view"></div>

  <!-- ADD/EDIT VIEW -->
  <div id="view-add" class="view">
    <h2 style="color:var(--cyan);margin-bottom:16px;font-size:18px" id="form-title">ADD NEW RECIPE</h2>
    <input type="hidden" id="edit-id">
    <div class="form-grid">
      <div class="form-group full">
        <label>Recipe Name</label>
        <input type="text" id="f-name" placeholder="e.g. Grandma's Famous Cornbread">
      </div>
      <div class="form-group">
        <label>Attribution</label>
        <input type="text" id="f-attribution" placeholder="e.g. Grandma Korb's kitchen">
      </div>
      <div class="form-group">
        <label>Category</label>
        <select id="f-category"><option value="">Select...</option><option>Breakfast</option><option>Lunch</option><option>Dinner</option><option>Appetizer</option><option>Side</option><option>Dessert</option><option>Snack</option><option>Drink</option><option>Sauce/Dressing</option></select>
      </div>
      <div class="form-group">
        <label>Cuisine</label>
        <select id="f-cuisine"><option value="">Select...</option><option>American</option><option>Italian</option><option>Mexican</option><option>Asian</option><option>Southern</option><option>Mediterranean</option><option>BBQ/Grilling</option><option>Seafood</option><option>Other</option></select>
      </div>
      <div class="form-group">
        <label>Difficulty</label>
        <select id="f-difficulty"><option value="">Select...</option><option>Easy</option><option>Medium</option><option>Hard</option></select>
      </div>
      <div class="form-group">
        <label>Prep Time (min)</label>
        <input type="number" id="f-prep" min="0" placeholder="15">
      </div>
      <div class="form-group">
        <label>Cook Time (min)</label>
        <input type="number" id="f-cook" min="0" placeholder="30">
      </div>
      <div class="form-group">
        <label>Servings</label>
        <input type="number" id="f-servings" min="1" placeholder="4">
      </div>
      <div class="form-group">
        <label>Who Loves This</label>
        <input type="text" id="f-whoLoves" placeholder="e.g. The whole family">
      </div>
      <div class="form-group">
        <label>Best Served With</label>
        <input type="text" id="f-servedWith" placeholder="e.g. Cold sweet tea">
      </div>
      <div class="form-group full">
        <label>Photo</label>
        <div class="photo-upload" id="photo-upload" onclick="document.getElementById('photo-file').click()">Click to upload photo</div>
        <input type="file" id="photo-file" accept="image/*" style="display:none" onchange="handlePhotoSelect(event)">
      </div>
      <div class="form-group full">
        <label>Ingredients</label>
        <div id="ingredients-form"></div>
        <button class="btn btn-sm" onclick="addIngredientRow()">+ Add Ingredient</button>
      </div>
      <div class="form-group full">
        <label>Instructions</label>
        <div id="steps-form"></div>
        <button class="btn btn-sm" onclick="addStepRow()">+ Add Step</button>
      </div>
      <div class="form-group full">
        <label>Notes / Tips / Variations</label>
        <textarea id="f-notes" placeholder="Any tips, memories, or variations..."></textarea>
      </div>
    </div>
    <div class="form-actions">
      <button class="btn btn-green" onclick="saveRecipe(false)">Save Recipe</button>
      <button class="btn" onclick="saveRecipe(true)">Save as Draft</button>
      <button class="btn btn-red" onclick="showView('browse')">Cancel</button>
    </div>
  </div>

  <!-- MEAL PLANNER VIEW -->
  <div id="view-planner" class="view">
    <div style="display:flex;align-items:center;gap:16px;margin-bottom:16px;flex-wrap:wrap">
      <h2 style="color:var(--cyan);font-size:18px">MEAL PLANNER</h2>
      <button class="btn btn-sm" onclick="prevWeek()">&lt; Prev</button>
      <span id="week-label" style="font-size:13px;color:var(--text2)"></span>
      <button class="btn btn-sm" onclick="nextWeek()">Next &gt;</button>
      <button class="btn btn-sm btn-orange" onclick="generateShoppingList()">Generate Shopping List</button>
    </div>
    <div id="planner-grid" class="planner-week"></div>
    <div id="shopping-list" style="margin-top:20px"></div>
  </div>

  <!-- IMPORT/EXPORT VIEW -->
  <div id="view-io" class="view">
    <h2 style="color:var(--cyan);font-size:18px;margin-bottom:16px">IMPORT / EXPORT</h2>
    <div style="display:flex;flex-direction:column;gap:16px;max-width:500px">
      <button class="btn" onclick="exportRecipes()">Export All Recipes (JSON)</button>
      <div class="form-group">
        <label>Import Recipes from JSON</label>
        <input type="file" id="import-file" accept=".json" style="background:var(--bg3);border:1px solid var(--border);color:var(--text);padding:8px" onchange="importRecipes(event)">
      </div>
      <p style="font-size:11px;color:var(--text3)">Import will merge with existing recipes. Duplicates (same name) will be skipped.</p>
    </div>
  </div>
</div>

<div class="ke-label">KORB ENGINEERING</div>

<!-- MODAL -->
<div id="modal-overlay" class="modal-overlay" style="display:none" onclick="if(event.target===this)closeModal()">
  <div class="modal" id="modal-content"></div>
</div>

<script>
// ========== DATA LAYER ==========
const STORAGE_KEY = 'korb_cookbook_recipes';
const PLANNER_KEY = 'korb_cookbook_planner';
const DB_NAME = 'KorbCookbookDB';
const STORE_NAME = 'photos';
let db = null;
let plannerWeekOffset = 0;

const UNITS = ['tsp','tbsp','cup','oz','lb','fl oz','pint','quart','gallon','each','pinch','dash','to taste','clove','slice','can'];
const CATEGORIES = ['Breakfast','Lunch','Dinner','Appetizer','Side','Dessert','Snack','Drink','Sauce/Dressing'];
const SHOPPING_CATS = {
  'Produce':['lettuce','tomato','onion','garlic','potato','corn','pepper','jalapeño','lime','lemon','cilantro','parsley','basil','thyme','rosemary','scallion','green onion','avocado','mushroom','carrot','celery','ginger','spinach','kale','cucumber','bell pepper','shallot','chive'],
  'Meat':['chicken','beef','pork','steak','ribeye','shrimp','salmon','sausage','bacon','ground beef','ground turkey','ham','turkey'],
  'Dairy':['milk','butter','cheese','cream','egg','sour cream','yogurt','cream cheese','heavy cream','cheddar','parmesan','mozzarella'],
  'Pantry':['flour','sugar','salt','pepper','oil','olive oil','vegetable oil','vinegar','soy sauce','honey','vanilla','baking powder','baking soda','cornmeal','rice','pasta','breadcrumb','broth','stock','cocoa','chocolate chip','brown sugar','powdered sugar','worcestershire','hot sauce','ketchup','mustard','mayo','paprika','cumin','chili powder','cayenne','oregano','cinnamon','nutmeg','cornstarch','grits','old bay'],
  'Frozen':['frozen','ice cream','ice'],
  'Other':[]
};

function getRecipes(){try{return JSON.parse(localStorage.getItem(STORAGE_KEY))||[];}catch(e){return[];}}
function saveRecipes(r){localStorage.setItem(STORAGE_KEY,JSON.stringify(r));}
function getPlanner(){try{return JSON.parse(localStorage.getItem(PLANNER_KEY))||{};}catch(e){return {};}}
function savePlanner(p){localStorage.setItem(PLANNER_KEY,JSON.stringify(p));}

function initDB(){return new Promise((resolve,reject)=>{const req=indexedDB.open(DB_NAME,1);req.onupgradeneeded=e=>{e.target.result.createObjectStore(STORE_NAME)};req.onsuccess=e=>{db=e.target.result;resolve()};req.onerror=e=>reject(e);})}
function savePhoto(id,blob){return new Promise((res,rej)=>{const tx=db.transaction(STORE_NAME,'readwrite');tx.objectStore(STORE_NAME).put(blob,id);tx.oncomplete=()=>res();tx.onerror=e=>rej(e);})}
function getPhoto(id){return new Promise((res,rej)=>{const tx=db.transaction(STORE_NAME,'readonly');const req=tx.objectStore(STORE_NAME).get(id);req.onsuccess=()=>res(req.result);req.onerror=e=>rej(e);})}
function deletePhoto(id){return new Promise((res,rej)=>{const tx=db.transaction(STORE_NAME,'readwrite');tx.objectStore(STORE_NAME).delete(id);tx.oncomplete=()=>res();tx.onerror=e=>rej(e);})}

// ========== VIEWS ==========
function showView(name){
  document.querySelectorAll('.view').forEach(v=>v.classList.remove('active'));
  document.querySelectorAll('.header-nav button').forEach(b=>b.classList.remove('active'));
  const btns=document.querySelectorAll('.header-nav button');
  const map={browse:0,add:1,planner:2,io:3,detail:-1};
  if(map[name]>=0)btns[map[name]].classList.add('active');
  if(name==='add'){resetForm();document.getElementById('view-add').classList.add('active');}
  else if(name==='browse'){document.getElementById('view-browse').classList.add('active');renderBrowse();}
  else if(name==='planner'){document.getElementById('view-planner').classList.add('active');renderPlanner();}
  else if(name==='io'){document.getElementById('view-io').classList.add('active');}
  else if(name==='detail'){document.getElementById('view-detail').classList.add('active');}
}

// ========== BROWSE ==========
async function renderBrowse(){
  let recipes=getRecipes();
  const q=document.getElementById('search-input').value.toLowerCase();
  const cat=document.getElementById('filter-category').value;
  const cui=document.getElementById('filter-cuisine').value;
  const dif=document.getElementById('filter-difficulty').value;
  const fav=document.getElementById('filter-fav').checked;
  const sort=document.getElementById('sort-by').value;

  recipes=recipes.filter(r=>{
    if(r.draft)return false;
    if(q){const s=(r.name+' '+r.ingredients.map(i=>i.name).join(' ')+(r.tags||[]).join(' ')).toLowerCase();if(!s.includes(q))return false;}
    if(cat&&r.category!==cat)return false;
    if(cui&&r.cuisine!==cui)return false;
    if(dif&&r.difficulty!==dif)return false;
    if(fav&&!r.favorite)return false;
    return true;
  });

  recipes.sort((a,b)=>{
    switch(sort){
      case 'nameAsc':return a.name.localeCompare(b.name);
      case 'nameDesc':return b.name.localeCompare(a.name);
      case 'ratingDesc':return(b.rating||0)-(a.rating||0);
      case 'prepAsc':return(a.prepTime||999)-(b.prepTime||999);
      case 'dateAsc':return(a.dateAdded||0)-(b.dateAdded||0);
      default:return(b.dateAdded||0)-(a.dateAdded||0);
    }
  });

  const grid=document.getElementById('recipe-grid');
  grid.innerHTML='';
  for(const r of recipes){
    const card=document.createElement('div');
    card.className='recipe-card';
    let imgHtml='<div class="recipe-card-img">&#127860;</div>';
    if(r.photoId){
      try{
        const blob=await getPhoto(r.photoId);
        if(blob){const url=URL.createObjectURL(blob);imgHtml=`<div class="recipe-card-img"><img src="${url}"></div>`;}
      }catch(e){}
    }
    const starsHtml=renderStars(r.rating||0);
    card.innerHTML=`
      ${imgHtml}
      <button class="fav-star ${r.favorite?'favorited':''}" onclick="event.stopPropagation();toggleFav('${r.id}')">${r.favorite?'&#9733;':'&#9734;'}</button>
      <div class="recipe-card-body">
        <h3>${esc(r.name)}</h3>
        <div class="recipe-card-meta">
          <span class="stars">${starsHtml}</span>
          ${r.prepTime?`<span>${r.prepTime+r.cookTime}min</span>`:''}
          ${r.difficulty?`<span>${r.difficulty}</span>`:''}
        </div>
        <div class="recipe-card-tags">
          ${r.category?`<span class="tag tag-cat">${r.category}</span>`:''}
          ${r.cuisine?`<span class="tag tag-cuisine">${r.cuisine}</span>`:''}
        </div>
      </div>`;
    card.onclick=()=>showDetail(r.id);
    grid.appendChild(card);
  }
  if(!recipes.length)grid.innerHTML='<p style="color:var(--text3);grid-column:1/-1;text-align:center;padding:40px">No recipes found. Add your first recipe!</p>';
}

function renderStars(n){let s='';for(let i=1;i<=5;i++)s+=i<=n?'&#9733;':'&#9734;';return s;}
function toggleFav(id){const r=getRecipes();const i=r.findIndex(x=>x.id===id);if(i>=0){r[i].favorite=!r[i].favorite;saveRecipes(r);renderBrowse();}}

async function showDetail(id){
  const recipes=getRecipes();
  const r=recipes.find(x=>x.id===id);
  if(!r)return;
  showView('detail');
  const container=document.getElementById('view-detail');
  const baseServings=r.servings||1;
  let currentServings=baseServings;

  async function render(){
    const scale=currentServings/baseServings;
    let photoHtml='<div class="detail-photo">&#127860;</div>';
    if(r.photoId){try{const blob=await getPhoto(r.photoId);if(blob){const url=URL.createObjectURL(blob);photoHtml=`<div class="detail-photo"><img src="${url}"></div>`;}}catch(e){}}

    const totalTime=(r.prepTime||0)+(r.cookTime||0);
    container.innerHTML=`
      <button class="btn btn-sm no-print" onclick="showView('browse')" style="margin-bottom:16px">&larr; Back</button>
      <div class="detail-header">
        ${photoHtml}
        <div class="detail-info">
          <h2>${esc(r.name)}</h2>
          ${r.attribution?`<div class="detail-attribution">From ${esc(r.attribution)}</div>`:''}
          <div style="margin:8px 0">${renderClickableStars(r.id,r.rating||0)}</div>
          <div class="detail-times">
            ${r.prepTime?`<span><small>Prep</small><strong>${r.prepTime} min</strong></span>`:''}
            ${r.cookTime?`<span><small>Cook</small><strong>${r.cookTime} min</strong></span>`:''}
            ${totalTime?`<span><small>Total</small><strong>${totalTime} min</strong></span>`:''}
          </div>
          <div class="servings-control">
            <span style="font-size:12px;color:var(--text2)">Servings:</span>
            <button onclick="adjustServings(-1)">-</button>
            <span class="count" id="serving-count">${currentServings}</span>
            <button onclick="adjustServings(1)">+</button>
            ${currentServings!==baseServings?`<span style="font-size:11px;color:var(--orange)">(scaled from ${baseServings})</span>`:''}
          </div>
          <div class="detail-tags">
            ${r.category?`<span class="tag tag-cat">${r.category}</span>`:''}
            ${r.cuisine?`<span class="tag tag-cuisine">${r.cuisine}</span>`:''}
            ${r.difficulty?`<span class="tag">${r.difficulty}</span>`:''}
          </div>
        </div>
      </div>

      <div class="section-title">INGREDIENTS</div>
      <ul class="ingredient-list">
        ${(r.ingredients||[]).map((ing,i)=>{
          let qty=ing.qty?scaleQty(parseFloat(ing.qty),scale):'';
          return `<li id="ing-${i}"><input type="checkbox" onchange="this.parentElement.classList.toggle('checked')"><span>${qty} ${esc(ing.unit||'')} ${esc(ing.name)}</span></li>`;
        }).join('')}
      </ul>

      <div class="section-title">INSTRUCTIONS</div>
      <ol class="step-list">
        ${(r.steps||[]).map((s,i)=>`
          <li onclick="this.classList.toggle('done')">
            <span class="step-num">${i+1}</span>
            <div><div>${esc(s.text)}</div>${s.time?`<div class="step-time">&#9202; ${esc(s.time)}</div>`:''}</div>
          </li>`).join('')}
      </ol>

      ${r.notes?`<div class="section-title">NOTES</div><div class="notes-box">${esc(r.notes)}</div>`:''}
      ${r.whoLoves?`<div style="margin-top:12px;font-size:12px;color:var(--text2)"><strong style="color:var(--cyan)">Who loves this:</strong> ${esc(r.whoLoves)}</div>`:''}
      ${r.servedWith?`<div style="margin-top:6px;font-size:12px;color:var(--text2)"><strong style="color:var(--orange)">Best served with:</strong> ${esc(r.servedWith)}</div>`:''}

      <div class="detail-actions no-print">
        <button class="btn" onclick="editRecipe('${r.id}')">Edit</button>
        <button class="btn btn-orange" onclick="window.print()">Print</button>
        <button class="btn btn-red" onclick="deleteRecipe('${r.id}')">Delete</button>
      </div>`;

    window.adjustServings=function(d){currentServings=Math.max(1,currentServings+d);render();};
  }
  await render();
}

function scaleQty(base,scale){
  const val=base*scale;
  if(val===Math.floor(val))return val.toString();
  const fracs=[[.125,'1/8'],[.25,'1/4'],[.333,'1/3'],[.375,'3/8'],[.5,'1/2'],[.625,'5/8'],[.667,'2/3'],[.75,'3/4'],[.875,'7/8']];
  const whole=Math.floor(val);
  const frac=val-whole;
  if(frac<.06)return whole.toString();
  for(const[f,s]of fracs){if(Math.abs(frac-f)<.06)return whole?`${whole} ${s}`:s;}
  return val.toFixed(1);
}

function renderClickableStars(id,rating){
  let h='';for(let i=1;i<=5;i++){
    h+=`<button class="star-btn ${i<=rating?'filled':''}" onclick="setRating('${id}',${i})">${i<=rating?'&#9733;':'&#9734;'}</button>`;
  }return h;
}
function setRating(id,n){const r=getRecipes();const i=r.findIndex(x=>x.id===id);if(i>=0){r[i].rating=n;saveRecipes(r);showDetail(id);}}

function deleteRecipe(id){
  if(!confirm('Delete this recipe?'))return;
  let r=getRecipes();const recipe=r.find(x=>x.id===id);
  if(recipe&&recipe.photoId)deletePhoto(recipe.photoId).catch(()=>{});
  r=r.filter(x=>x.id!==id);saveRecipes(r);showView('browse');
}

async function saveRecipe(draft){
  const name=document.getElementById('f-name').value.trim();
  if(!name){alert('Recipe name is required.');return;}
  const editId=document.getElementById('edit-id').value;
  const recipes=getRecipes();
  const id=editId||'r_'+Date.now()+'_'+Math.random().toString(36).substr(2,6);

  let photoId=null;
  if(editId){const existing=recipes.find(x=>x.id===editId);if(existing)photoId=existing.photoId;}
  if(pendingPhotoBlob){
    photoId='photo_'+id;
    await savePhoto(photoId,pendingPhotoBlob);
  }

  const ingredients=[];
  document.querySelectorAll('#ingredients-form .dyn-row').forEach(row=>{
    const inputs=row.querySelectorAll('input');
    const sel=row.querySelector('select');
    const n=inputs[1].value.trim();
    if(n)ingredients.push({qty:inputs[0].value,unit:sel.value,name:n});
  });

  const steps=[];
  document.querySelectorAll('#steps-form .dyn-row').forEach(row=>{
    const inputs=row.querySelectorAll('input');
    const t=inputs[0].value.trim();
    if(t)steps.push({text:t,time:inputs[1].value.trim()});
  });

  const recipe={
    id,name,
    attribution:document.getElementById('f-attribution').value.trim(),
    category:document.getElementById('f-category').value,
    cuisine:document.getElementById('f-cuisine').value,
    difficulty:document.getElementById('f-difficulty').value,
    prepTime:parseInt(document.getElementById('f-prep').value)||0,
    cookTime:parseInt(document.getElementById('f-cook').value)||0,
    servings:parseInt(document.getElementById('f-servings').value)||4,
    whoLoves:document.getElementById('f-whoLoves').value.trim(),
    servedWith:document.getElementById('f-servedWith').value.trim(),
    notes:document.getElementById('f-notes').value.trim(),
    ingredients,steps,photoId,draft:!!draft,
    dateAdded:editId?(recipes.find(x=>x.id===editId)?.dateAdded||Date.now()):Date.now(),
    rating:editId?(recipes.find(x=>x.id===editId)?.rating||0):0,
    favorite:editId?(recipes.find(x=>x.id===editId)?.favorite||false):false
  };

  const idx=recipes.findIndex(x=>x.id===editId);
  if(idx>=0)recipes[idx]=recipe;else recipes.push(recipe);
  saveRecipes(recipes);
  pendingPhotoBlob=null;
  showView('browse');
}

function editRecipe(id){
  const r=getRecipes().find(x=>x.id===id);if(!r)return;
  showView('add');
  document.getElementById('form-title').textContent='EDIT RECIPE';
  document.getElementById('edit-id').value=r.id;
  document.getElementById('f-name').value=r.name;
  document.getElementById('f-attribution').value=r.attribution||'';
  document.getElementById('f-category').value=r.category||'';
  document.getElementById('f-cuisine').value=r.cuisine||'';
  document.getElementById('f-difficulty').value=r.difficulty||'';
  document.getElementById('f-prep').value=r.prepTime||'';
  document.getElementById('f-cook').value=r.cookTime||'';
  document.getElementById('f-servings').value=r.servings||'';
  document.getElementById('f-whoLoves').value=r.whoLoves||'';
  document.getElementById('f-servedWith').value=r.servedWith||'';
  document.getElementById('f-notes').value=r.notes||'';
  document.getElementById('ingredients-form').innerHTML='';
  (r.ingredients||[]).forEach(i=>addIngredientRow(i));
  if(!r.ingredients||!r.ingredients.length)addIngredientRow();
  document.getElementById('steps-form').innerHTML='';
  (r.steps||[]).forEach(s=>addStepRow(s));

    getPhoto(r.photoId).then(blob=>{
      if(blob){const url=URL.createObjectURL(blob);document.getElementById('photo-upload').innerHTML=`<img src="${url}">`;}
    }).catch(()=>{});
  }
}

// ========== MEAL PLANNER ==========
function getWeekDates(){
  const now=new Date();const day=now.getDay();const diff=now.getDate()-day+(day===0?-6:1);
  const mon=new Date(now.setDate(diff+plannerWeekOffset*7));
  const dates=[];for(let i=0;i<7;i++){const d=new Date(mon);d.setDate(mon.getDate()+i);dates.push(d);}
  return dates;
}
function fmtDate(d){return d.toISOString().split('T')[0];}
function prevWeek(){plannerWeekOffset--;renderPlanner();}
function nextWeek(){plannerWeekOffset++;renderPlanner();}

function renderPlanner(){
  const dates=getWeekDates();
  const days=['Mon','Tue','Wed','Thu','Fri','Sat','Sun'];
  const meals=['Breakfast','Lunch','Dinner'];
  const planner=getPlanner();
  document.getElementById('week-label').textContent=`${dates[0].toLocaleDateString('en-US',{month:'short',day:'numeric'})} - ${dates[6].toLocaleDateString('en-US',{month:'short',day:'numeric',year:'numeric'})}`;
  const grid=document.getElementById('planner-grid');
  grid.innerHTML='';
  dates.forEach((date,di)=>{
    const key=fmtDate(date);
    const col=document.createElement('div');col.className='planner-day';
    let html=`<h4>${days[di]}<br><span style="font-weight:300;font-size:10px">${date.getMonth()+1}/${date.getDate()}</span></h4>`;
    meals.forEach(meal=>{
      const mk=`${key}_${meal}`;
      const items=planner[mk]||[];
      html+=`<div class="meal-slot"><div class="meal-slot-label">${meal}</div>`;
      items.forEach((rId,ii)=>{
        const r=getRecipes().find(x=>x.id===rId);
        if(r)html+=`<div class="meal-slot-item">${esc(r.name)}<button class="remove-meal" onclick="removeMeal('${mk}',${ii})">&#215;</button></div>`;
      });
      html+=`<button class="add-meal-btn" onclick="openMealPicker('${mk}')">+ Add</button></div>`;
    });
    col.innerHTML=html;grid.appendChild(col);
  });
}

function openMealPicker(mk){
  const recipes=getRecipes().filter(r=>!r.draft);
  const modal=document.getElementById('modal-content');
  modal.innerHTML=`<h3>Select Recipe</h3><ul class="modal-recipe-list">${recipes.map(r=>`<li onclick="assignMeal('${mk}','${r.id}')">${esc(r.name)}</li>`).join('')}</ul>${!recipes.length?'<p style="color:var(--text3);font-size:12px">No recipes available.</p>':''}`;
  document.getElementById('modal-overlay').style.display='flex';
}
function closeModal(){document.getElementById('modal-overlay').style.display='none';}
function assignMeal(mk,rId){
  const p=getPlanner();if(!p[mk])p[mk]=[];p[mk].push(rId);savePlanner(p);closeModal();renderPlanner();
}
function removeMeal(mk,idx){
  const p=getPlanner();if(p[mk])p[mk].splice(idx,1);savePlanner(p);renderPlanner();
}

function generateShoppingList(){
  const dates=getWeekDates();
  const planner=getPlanner();
  const recipes=getRecipes();
  const allIngredients={};

  dates.forEach(date=>{
    const key=fmtDate(date);
    ['Breakfast','Lunch','Dinner'].forEach(meal=>{
      const mk=`${key}_${meal}`;
      (planner[mk]||[]).forEach(rId=>{
        const r=recipes.find(x=>x.id===rId);
        if(!r)return;
        (r.ingredients||[]).forEach(ing=>{
          const name=ing.name.toLowerCase().trim();
          if(!name)return;
          const k=name+'_'+ing.unit;
          if(allIngredients[k]){allIngredients[k].qty+=parseFloat(ing.qty)||0;}
          else{allIngredients[k]={name:ing.name,unit:ing.unit,qty:parseFloat(ing.qty)||0};}
        });
      });
    });
  });

  const categorized={};
  Object.keys(SHOPPING_CATS).forEach(c=>categorized[c]=[]);
  Object.values(allIngredients).forEach(ing=>{
    const nl=ing.name.toLowerCase();
    let placed=false;
    for(const[cat,keywords]of Object.entries(SHOPPING_CATS)){
      if(cat==='Other')continue;
      if(keywords.some(kw=>nl.includes(kw))){categorized[cat].push(ing);placed=true;break;}
    }
    if(!placed)categorized['Other'].push(ing);
  });

  const container=document.getElementById('shopping-list');
  if(!Object.values(allIngredients).length){container.innerHTML='<p style="color:var(--text3);font-size:12px">No meals planned this week. Add recipes to generate a shopping list.</p>';return;}

  let html='<div class="section-title">SHOPPING LIST</div>';
  for(const[cat,items]of Object.entries(categorized)){
    if(!items.length)continue;
    items.sort((a,b)=>a.name.localeCompare(b.name));
    html+=`<div class="shopping-section"><h4>${cat}</h4>`;
    items.forEach(ing=>{
      const qty=ing.qty?scaleQty(ing.qty,1):'';
      html+=`<div class="shopping-item"><input type="checkbox" onchange="this.parentElement.classList.toggle('checked')"><span>${qty} ${esc(ing.unit||'')} ${esc(ing.name)}</span></div>`;
    });
    html+='</div>';
  }
  container.innerHTML=html;
}

// ========== IMPORT/EXPORT ==========
function exportRecipes(){
  const recipes=getRecipes();
  const blob=new Blob([JSON.stringify(recipes,null,2)],{type:'application/json'});
  const a=document.createElement('a');a.href=URL.createObjectURL(blob);a.download='korb_cookbook_recipes.json';a.click();
}
function importRecipes(e){
  const file=e.target.files[0];if(!file)return;
  const reader=new FileReader();
  reader.onload=ev=>{
    try{
      const imported=JSON.parse(ev.target.result);
      if(!Array.isArray(imported)){alert('Invalid format.');return;}
      const existing=getRecipes();
      const names=new Set(existing.map(r=>r.name.toLowerCase()));
      let added=0;
      imported.forEach(r=>{
        if(!names.has(r.name.toLowerCase())){
          r.id='r_'+Date.now()+'_'+Math.random().toString(36).substr(2,6);
          r.dateAdded=Date.now();
          existing.push(r);names.add(r.name.toLowerCase());added++;
        }
      });
      saveRecipes(existing);
      alert(`Imported ${added} recipe(s). ${imported.length-added} skipped as duplicates.`);
      e.target.value='';
    }catch(err){alert('Failed to parse JSON.');}
  };
  reader.readAsText(file);
}
