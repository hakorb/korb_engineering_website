function esc(s) {
  if (s == null) return '';
  return String(s)
    .replace(/&/g, '&amp;')
    .replace(/</g, '&lt;')
    .replace(/>/g, '&gt;')
    .replace(/"/g, '&quot;')
    .replace(/'/g, '&#39;');
}

function shuffle(arr) {
  const a = arr.slice();
  for (let i = a.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [a[i], a[j]] = [a[j], a[i]];
  }
  return a;
}

function pick(arr) { return arr[Math.floor(Math.random() * arr.length)]; }
function pickN(arr, n) { return shuffle(arr).slice(0, n); }

const PLAYER_COLORS = [
  '#00d4ff', '#ff9900', '#00ff88', '#ff3366',
  '#ff00aa', '#9944ff', '#ffdd00', '#44ddff'

// ---------- persistence ----------
const SAVE_KEY = 'korb_party_pack_v1';

function loadState() {
  try {
    const raw = localStorage.getItem(SAVE_KEY);
    if (!raw) return null;
    return JSON.parse(raw);
  } catch (e) { return null; }
}

function saveState() {
  try {
    localStorage.setItem(SAVE_KEY, JSON.stringify({
      settings: state.settings,
      highScores: state.highScores,
      lastPlayers: state.players.map(p => ({ name: p.name, color: p.color }))
    }));
  } catch (e) {}
}

// ---------- audio ----------
let audioCtx = null;
function beep(freq, dur, type) {
  if (!state.settings.sound) return;
  try {
    if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    const o = audioCtx.createOscillator();
    const g = audioCtx.createGain();
    o.type = type || 'sine';
    o.frequency.value = freq;
    g.gain.value = 0.001;
    o.connect(g); g.connect(audioCtx.destination);
    const t = audioCtx.currentTime;
    g.gain.setValueAtTime(0.001, t);
    g.gain.exponentialRampToValueAtTime(0.2, t + 0.02);
    g.gain.exponentialRampToValueAtTime(0.001, t + dur);
    o.start(t); o.stop(t + dur + 0.05);
  } catch (e) {}
}
const sfx = {
  ding: () => { beep(880, 0.15, 'triangle'); setTimeout(() => beep(1320, 0.2, 'triangle'), 80); },
  buzz: () => { beep(180, 0.3, 'sawtooth'); },
  tick: () => { beep(1200, 0.04, 'square'); },
  pop:  () => { beep(600, 0.08, 'sine'); },
  fanfare: () => {

  }
};

// ---------- screen router ----------
function render() {
  root.innerHTML = '';
  if (state.screen === 'lobby') return renderLobby();
  if (state.screen === 'gameSelect') return renderGameSelect();
  if (state.screen === 'settings') return renderSettings();
  if (state.screen === 'game') return renderGame();
  if (state.screen === 'leaderboard') return renderLeaderboard();
}

// ---------- lobby ----------
function renderLobby() {
  const panel = document.createElement('div');
  panel.className = 'panel';
  panel.innerHTML =
    '<h2>LOBBY</h2>' +
    '<p class="muted">Single device. Pass it around. No servers, no codes, no nonsense.</p>' +
    '<h3>Players (3–8)</h3>' +
    '<div id="playerList"></div>' +
    '<div class="row" style="margin-top:10px"><button id="addPlayer" class="small">+ ADD PLAYER</button><button id="shuffleOrder" class="small warn">SHUFFLE ORDER</button></div>' +
    '<button class="primary" id="goGames" style="margin-top:16px">CHOOSE A GAME &rarr;</button>' +
    '<button id="goSettings" class="small" style="margin-top:10px">SETTINGS</button>';
  root.appendChild(panel);

  function drawPlayers() {
    const list = panel.querySelector('#playerList');
    list.innerHTML = '';
    state.players.forEach((p, idx) => {
      const row = document.createElement('div');
      row.className = 'player-chip';
      row.innerHTML =
        '<div class="dot" style="background:' + esc(p.color) + ';color:' + esc(p.color) + '"></div>' +
        '<input type="text" maxlength="14" value="' + esc(p.name) + '" data-idx="' + idx + '" placeholder="Name">' +
        '<button data-del="' + idx + '" class="danger">X</button>';
      list.appendChild(row);
    });
    list.querySelectorAll('input').forEach(inp => {
      inp.addEventListener('input', e => {
        const i = parseInt(e.target.dataset.idx, 10);
        state.players[i].name = e.target.value.slice(0, 14);
      });
    });
    list.querySelectorAll('button[data-del]').forEach(btn => {
      btn.addEventListener('click', e => {
        if (state.players.length <= 1) return;
        const i = parseInt(e.currentTarget.dataset.del, 10);
        state.players.splice(i, 1);
        drawPlayers();
      });
    });
  }
  drawPlayers();

  panel.querySelector('#addPlayer').addEventListener('click', () => {
    if (state.players.length >= 8) return;
    const used = new Set(state.players.map(p => p.color));
    const avail = PLAYER_COLORS.find(c => !used.has(c)) || pick(PLAYER_COLORS);
    state.players.push({
      id: Date.now(),
      name: 'Player ' + (state.players.length + 1),
      color: avail,
      score: 0
    });
    drawPlayers();
  });

  panel.querySelector('#shuffleOrder').addEventListener('click', () => {
    state.players = shuffle(state.players);
    drawPlayers();
    sfx.pop();
  });

  panel.querySelector('#goGames').addEventListener('click', () => {
    const validNames = state.players.filter(p => p.name.trim().length);
    if (validNames.length < 3) {
      alert('Need at least 3 players with names.');
      return;
    }
    state.players = validNames;
    state.players.forEach(p => p.score = 0);
    saveState();
    state.screen = 'gameSelect';
    render();
  });

  panel.querySelector('#goSettings').addEventListener('click', () => {
    state.screen = 'settings';
    render();
  });
}

// ---------- pass-the-device overlay ----------
function showOverlay(opts, onReady) {
  const o = document.getElementById('overlay');
  document.getElementById('overlayBig').textContent = opts.big || 'HIDE';
  document.getElementById('overlayBig').style.color = opts.color || 'var(--orange)';
  document.getElementById('overlaySub').innerHTML = esc(opts.sub || 'Pass the device to the next player');
  document.getElementById('overlayCountdown').textContent = '';
  const btn = document.getElementById('overlayBtn');
  btn.textContent = opts.btn || "I'M READY";
  o.classList.remove('hidden');
  const handler = () => {
    btn.removeEventListener('click', handler);
    o.classList.add('hidden');
    sfx.pop();
    if (onReady) onReady();
  };
  btn.addEventListener('click', handler);
}

function passToPlayer(player, onReady) {
  showOverlay({
    big: 'HIDE',
    sub: 'Hand the device to<br><b style="color:' + esc(player.color) + '">' + esc(player.name) + '</b>',
    color: player.color,
    btn: "I'M " + (player.name.toUpperCase() || 'READY')
  }, onReady);
}

// ---------- game framework ----------
function startGame(id) {
  state.currentGame = id;
  state.players.forEach(p => p.score = 0);
  if (id === 'korbquiblers') startQuiblers();
  else if (id === 'fibber') startFibber();
  else if (id === 'doodle') startDoodle();
  else if (id === 'hottake') startHotTake();
  else if (id === 'korbspiracy') startKorbspiracy();
  state.screen = 'game';
  render();
}

function renderGame() {
  const panel = document.createElement('div');
  panel.className = 'panel';
  panel.id = 'gamePanel';
  root.appendChild(panel);
  const gs = state.gameState;
  if (!gs) return;
  gs.renderPhase(panel);
}

// ---------- KORBQUIBLERS ----------
function startQuiblers() {
  const rounds = [];
  for (let i = 0; i < state.settings.rounds; i++) {
    rounds.push({
      prompt: pick(PROMPTS_QUIB),
      answers: [],    // {playerId, text, votes: [playerIds]}
      done: false
    });
  }
  state.gameState = {
    type: 'korbquiblers',
    rounds: rounds,
    roundIdx: 0,
    phase: 'pass-input',     // pass-input -> input -> pass-vote -> vote -> reveal -> next
    inputPlayerIdx: 0,
    votePlayerIdx: 0,
    renderPhase: renderQuiblersPhase
  };
}

function renderQuiblersPhase(panel) {
  const gs = state.gameState;
  const round = gs.rounds[gs.roundIdx];

  if (gs.phase === 'pass-input') {
    const player = state.players[gs.inputPlayerIdx];
    passToPlayer(player, () => {
      gs.phase = 'input';
      render();
    });
    panel.innerHTML = '<h2>KORBQUIBLERS — ROUND ' + (gs.roundIdx + 1) + '/' + gs.rounds.length + '</h2><p class="muted">Passing device to ' + esc(player.name) + '...</p>';
    return;
  }

  if (gs.phase === 'input') {
    const player = state.players[gs.inputPlayerIdx];
    panel.innerHTML =
      '<h2>KORBQUIBLERS — R' + (gs.roundIdx + 1) + '</h2>' +
      '<div class="turn-tag" style="background:' + esc(player.color) + '">' + esc(player.name) + '</div>' +
      '<div class="prompt-box">' + esc(round.prompt) + '</div>' +
      '<label>YOUR ANSWER (keep it snappy!)' +
      '<textarea id="q_answer" maxlength="120" placeholder="Type something ridiculous..."></textarea></label>' +
      '<button class="primary" id="q_submit">SUBMIT &amp; PASS</button>';
    const ta = panel.querySelector('#q_answer');
    setTimeout(() => ta.focus(), 100);
    startTimer(panel);
    panel.querySelector('#q_submit').addEventListener('click', () => {
      const txt = ta.value.trim().slice(0, 120);
      if (!txt) { sfx.buzz(); return; }
      round.answers.push({ playerId: player.id, text: txt, votes: [] });
      stopTimer();
      sfx.ding();
      gs.inputPlayerIdx++;
      if (gs.inputPlayerIdx >= state.players.length) {
        gs.inputPlayerIdx = 0;
        gs.phase = 'pass-vote';
        gs.votePlayerIdx = 0;
      } else {
        gs.phase = 'pass-input';
      }
      render();
    });
    return;
  }

  if (gs.phase === 'pass-vote') {
    const player = state.players[gs.votePlayerIdx];
    passToPlayer(player, () => {
      gs.phase = 'vote';
      render();
    });
    panel.innerHTML = '<h2>KORBQUIBLERS — VOTE TIME</h2><p class="muted">Everyone votes for their favorite...</p>';
    return;
  }

  if (gs.phase === 'vote') {
    const player = state.players[gs.votePlayerIdx];
    panel.innerHTML =
      '<h2>VOTE — R' + (gs.roundIdx + 1) + '</h2>' +
      '<div class="turn-tag" style="background:' + esc(player.color) + '">' + esc(player.name) + ' picks a fave</div>' +
      '<div class="prompt-box">' + esc(round.prompt) + '</div>' +
      '<p class="tiny">TAP YOUR FAVORITE — NOT YOUR OWN!</p>' +
      '<div id="voteList"></div>';
    const list = panel.querySelector('#voteList');
    const shuffled = round.answers.map((a, i) => ({ ...a, origIdx: i }));
    shuffled.sort((a, b) => a.text.localeCompare(b.text));
    shuffled.forEach(a => {
      const div = document.createElement('div');
      div.className = 'answer-option' + (a.playerId === player.id ? ' disabled' : '');
      div.textContent = a.text;
      div.addEventListener('click', () => {
        if (a.playerId === player.id) { sfx.buzz(); return; }
        round.answers[a.origIdx].votes.push(player.id);
        sfx.pop();
        gs.votePlayerIdx++;
        if (gs.votePlayerIdx >= state.players.length) {
          gs.phase = 'reveal';
        } else {
          gs.phase = 'pass-vote';
        }
        render();
      });
      list.appendChild(div);
    });
    return;
  }

  if (gs.phase === 'reveal') {
    // award points: each vote = 100
    round.answers.forEach(a => {
      const pl = state.players.find(p => p.id === a.playerId);
      if (pl) pl.score += a.votes.length * 100;
    });
    const sorted = round.answers.slice().sort((a, b) => b.votes.length - a.votes.length);
    panel.innerHTML =
      '<h2>ROUND ' + (gs.roundIdx + 1) + ' RESULTS</h2>' +
      '<div class="prompt-box">' + esc(round.prompt) + '</div>';
    const list = document.createElement('div');
    sorted.forEach((a, i) => {
      const player = state.players.find(p => p.id === a.playerId);
      const div = document.createElement('div');
      div.className = 'answer-option revealed';
      div.innerHTML = '<div>' + (i === 0 ? '[WINNER] ' : '') + esc(a.text) + '</div>' +
        '<div class="author" style="color:' + esc(player.color) + '">by ' + esc(player.name) + ' — +' + (a.votes.length * 100) + ' pts</div>';
      list.appendChild(div);
    });
    panel.appendChild(list);

    const btn = document.createElement('button');
    btn.className = 'primary';
    gs.roundIdx++;
    if (gs.roundIdx >= gs.rounds.length) {
      btn.textContent = 'SEE FINAL SCORES';
      btn.addEventListener('click', finishGame);
    } else {
      btn.textContent = 'NEXT ROUND';
      btn.addEventListener('click', () => {
        gs.phase = 'pass-input';
        gs.inputPlayerIdx = 0;
        render();
      });
    }
    panel.appendChild(btn);
    sfx.fanfare();
    return;
  }
}

// ---------- FIBBER McGOO ----------
function startFibber() {
  const used = new Set();
  const rounds = [];
  for (let i = 0; i < state.settings.rounds; i++) {
    let q;
    do { q = pick(FIBBER_FACTS); } while (used.has(q.q) && used.size < FIBBER_FACTS.length);
    used.add(q.q);
    rounds.push({
      q: q.q, realAnswer: q.a,
      fakes: [],  // {playerId, text, votes: [playerIds], foolCount:0, isReal:false}
      votedReal: [], // player ids who picked real
      done: false
    });
  }
  state.gameState = {
    type: 'fibber', rounds, roundIdx: 0,
    phase: 'pass-input', inputPlayerIdx: 0, votePlayerIdx: 0,
    renderPhase: renderFibberPhase
  };
}

function renderFibberPhase(panel) {
  const gs = state.gameState;
  const round = gs.rounds[gs.roundIdx];

  if (gs.phase === 'pass-input') {
    const player = state.players[gs.inputPlayerIdx];
    passToPlayer(player, () => { gs.phase = 'input'; render(); });
    panel.innerHTML = '<h2>FIBBER McGOO — R' + (gs.roundIdx + 1) + '</h2>';
    return;
  }

  if (gs.phase === 'input') {
    const player = state.players[gs.inputPlayerIdx];
    panel.innerHTML =
      '<h2>FIBBER — WRITE A FAKE</h2>' +
      '<div class="turn-tag" style="background:' + esc(player.color) + '">' + esc(player.name) + '</div>' +
      '<div class="prompt-box">' + esc(round.q) + '</div>' +
      '<p class="tiny">WRITE A BELIEVABLE LIE</p>' +
      '<textarea id="f_answer" maxlength="120" placeholder="Make it plausible..."></textarea>' +
      '<button class="primary" id="f_submit">SUBMIT &amp; PASS</button>';
    const ta = panel.querySelector('#f_answer');
    setTimeout(() => ta.focus(), 100);
    startTimer(panel);
    panel.querySelector('#f_submit').addEventListener('click', () => {
      const txt = ta.value.trim();
      if (!txt) { sfx.buzz(); return; }
      // reject exact match to real answer
      if (txt.toLowerCase() === round.realAnswer.toLowerCase()) {
        alert("That's... actually the real answer. Try a different fake!");
        return;
      }
      round.fakes.push({ playerId: player.id, text: txt, votes: [], isReal: false });
      stopTimer(); sfx.ding();
      gs.inputPlayerIdx++;
      if (gs.inputPlayerIdx >= state.players.length) {
        gs.phase = 'pass-vote'; gs.votePlayerIdx = 0;
        // inject real answer as a special entry
        round.fakes.push({ playerId: -1, text: round.realAnswer, votes: [], isReal: true });
      } else {
        gs.phase = 'pass-input';
      }
      render();
    });
    return;
  }

  if (gs.phase === 'pass-vote') {
    const player = state.players[gs.votePlayerIdx];
    passToPlayer(player, () => { gs.phase = 'vote'; render(); });
    panel.innerHTML = '<h2>FIBBER — PICK THE REAL ONE</h2>';
    return;
  }

  if (gs.phase === 'vote') {
    const player = state.players[gs.votePlayerIdx];
    panel.innerHTML =
      '<h2>FIBBER — PICK REAL</h2>' +
      '<div class="turn-tag" style="background:' + esc(player.color) + '">' + esc(player.name) + '</div>' +
      '<div class="prompt-box">' + esc(round.q) + '</div>' +
      '<p class="tiny">WHICH ONE IS THE TRUTH?</p>' +
      '<div id="voteList"></div>';
    const list = panel.querySelector('#voteList');
    const shuffled = round.fakes.map((a, i) => ({ ...a, origIdx: i }));
    shuffled.sort((a, b) => a.text.localeCompare(b.text));
    shuffled.forEach(a => {
      const div = document.createElement('div');
      div.className = 'answer-option' + (a.playerId === player.id ? ' disabled' : '');
      div.textContent = a.text;
      div.addEventListener('click', () => {
        if (a.playerId === player.id) { sfx.buzz(); return; }
        round.fakes[a.origIdx].votes.push(player.id);
        if (round.fakes[a.origIdx].isReal) round.votedReal.push(player.id);
        sfx.pop();
        gs.votePlayerIdx++;
        if (gs.votePlayerIdx >= state.players.length) {
          gs.phase = 'reveal';
        } else {
          gs.phase = 'pass-vote';
        }
        render();
      });
      list.appendChild(div);
    });
    return;
  }

  if (gs.phase === 'reveal') {
    // scoring: +500 for picking real, +300 per person fooled by your lie
    state.players.forEach(p => {
      if (round.votedReal.includes(p.id)) p.score += 500;
    });
    round.fakes.forEach(a => {
      if (!a.isReal) {
        const pl = state.players.find(p => p.id === a.playerId);
        if (pl) pl.score += a.votes.length * 300;
      }
    });
    panel.innerHTML = '<h2>FIBBER — REVEAL</h2><div class="prompt-box">' + esc(round.q) + '</div>';
    const list = document.createElement('div');
    round.fakes.forEach(a => {
      const div = document.createElement('div');
      div.className = 'answer-option ' + (a.isReal ? 'real' : 'revealed');
      const author = a.isReal ? 'TRUE ANSWER' : 'by ' + esc(state.players.find(p => p.id === a.playerId).name);
      const pts = a.isReal ? '' : (' — fooled ' + a.votes.length + ' (+' + (a.votes.length * 300) + ')');
      div.innerHTML = '<div>' + (a.isReal ? '[REAL] ' : '') + esc(a.text) + '</div>' +
        '<div class="author">' + author + pts + '</div>';
      list.appendChild(div);
    });
    panel.appendChild(list);
    const btn = document.createElement('button');
    btn.className = 'primary';
    gs.roundIdx++;
    if (gs.roundIdx >= gs.rounds.length) {
      btn.textContent = 'SEE FINAL SCORES';
      btn.addEventListener('click', finishGame);
    } else {
      btn.textContent = 'NEXT ROUND';
      btn.addEventListener('click', () => {
        gs.phase = 'pass-input'; gs.inputPlayerIdx = 0;
        render();
      });
    }
    panel.appendChild(btn);
    sfx.fanfare();
    return;
  }
}

// ---------- DOODLEGANGER ----------
function startDoodle() {
  const rounds = [];
  for (let i = 0; i < state.settings.rounds; i++) {
    rounds.push({
      drawerIdx: i % state.players.length,
      word: pick(DOODLE_WORDS),
      guesses: {}, // playerId -> text
      correctness: {},
      imgData: null
    });
  }
  state.gameState = {
    type: 'doodle', rounds, roundIdx: 0,
    phase: 'pass-draw',  // pass-draw -> draw -> pass-guess -> guess -> reveal
    guessPlayerIdx: 0,
    renderPhase: renderDoodlePhase
  };
}

function renderDoodlePhase(panel) {
  const gs = state.gameState;
  const round = gs.rounds[gs.roundIdx];
  const drawer = state.players[round.drawerIdx];

  if (gs.phase === 'pass-draw') {
    passToPlayer(drawer, () => { gs.phase = 'draw'; render(); });
    panel.innerHTML = '<h2>DOODLEGANGER — R' + (gs.roundIdx + 1) + '</h2><p class="muted">Passing to the artist...</p>';
    return;
  }

  if (gs.phase === 'draw') {
    panel.innerHTML =
      '<h2>DOODLEGANGER — DRAW</h2>' +
      '<div class="turn-tag" style="background:' + esc(drawer.color) + '">' + esc(drawer.name) + ' is drawing</div>' +
      '<p class="muted" style="margin-top:10px">Draw this word. No talking, no letters, no symbols!</p>' +
      '<div class="prompt-box" style="font-size:22px">' + esc(round.word) + '</div>' +
      '<div class="color-swatches" id="swatches"></div>' +
      '<canvas class="draw-canvas" id="doodleCanvas"></canvas>' +
      '<div class="row" style="margin-top:8px"><button class="small warn" id="d_clear">CLEAR</button><button class="small" id="d_undo">UNDO</button></div>' +
      '<button class="primary" id="d_done" style="margin-top:14px">DONE DRAWING</button>';

    // set up canvas
    const canvas = panel.querySelector('#doodleCanvas');
    const width = Math.min(panel.clientWidth - 36, 480);
    canvas.width = width * 2;
    canvas.height = Math.floor(width * 0.8) * 2;
    canvas.style.height = Math.floor(width * 0.8) + 'px';
    const ctx = canvas.getContext('2d');
    ctx.scale(2, 2);
    ctx.lineCap = 'round';
    ctx.lineJoin = 'round';
    ctx.lineWidth = 3;
    ctx.fillStyle = '#0a1520';
    ctx.fillRect(0, 0, canvas.width, canvas.height);

    const strokes = [];
    let currentStroke = null;
    let drawColor = '#00d4ff';

    function redraw() {
      ctx.fillStyle = '#0a1520';
      ctx.fillRect(0, 0, canvas.width, canvas.height);
      strokes.forEach(s => {
        ctx.strokeStyle = s.color;
        ctx.beginPath();
        s.pts.forEach((p, i) => {
          if (i === 0) ctx.moveTo(p.x, p.y);
          else ctx.lineTo(p.x, p.y);
        });
        ctx.stroke();
      });
    }

    function getPos(e) {
      const rect = canvas.getBoundingClientRect();
      const t = e.touches ? e.touches[0] : e;
      return { x: t.clientX - rect.left, y: t.clientY - rect.top };
    }

    function down(e) {
      e.preventDefault();
      currentStroke = { color: drawColor, pts: [getPos(e)] };
      strokes.push(currentStroke);
      redraw();
    }
    function move(e) {
      if (!currentStroke) return;
      e.preventDefault();
      currentStroke.pts.push(getPos(e));
      redraw();
    }
    function up() { currentStroke = null; }

    canvas.addEventListener('mousedown', down);
    canvas.addEventListener('mousemove', move);
    canvas.addEventListener('mouseup', up);
    canvas.addEventListener('mouseleave', up);
    canvas.addEventListener('touchstart', down, { passive: false });
    canvas.addEventListener('touchmove', move, { passive: false });
    canvas.addEventListener('touchend', up);

    // swatches
    const sw = panel.querySelector('#swatches');
    ['#00d4ff','#ff9900','#00ff88','#ff3366','#ff00aa','#ffdd00','#ffffff','#6a8aaa'].forEach((c, i) => {
      const s = document.createElement('div');
      s.className = 'swatch' + (i === 0 ? ' active' : '');
      s.style.background = c;
      s.addEventListener('click', () => {
        drawColor = c;
        sw.querySelectorAll('.swatch').forEach(x => x.classList.remove('active'));
        s.classList.add('active');
      });
      sw.appendChild(s);
    });

    panel.querySelector('#d_clear').addEventListener('click', () => {
      strokes.length = 0; redraw();
    });
    panel.querySelector('#d_undo').addEventListener('click', () => {
      strokes.pop(); redraw();
    });

    panel.querySelector('#d_done').addEventListener('click', () => {
      round.imgData = canvas.toDataURL('image/png');
      sfx.ding();
      gs.phase = 'pass-guess';
      gs.guessPlayerIdx = 0;
      // skip drawer in guess order
      while (gs.guessPlayerIdx < state.players.length && gs.guessPlayerIdx === round.drawerIdx) {
        gs.guessPlayerIdx++;
      }
      render();
    });
    return;
  }

  if (gs.phase === 'pass-guess') {
    // skip drawer
    if (gs.guessPlayerIdx === round.drawerIdx) gs.guessPlayerIdx++;
    if (gs.guessPlayerIdx >= state.players.length) { gs.phase = 'reveal'; render(); return; }
    const player = state.players[gs.guessPlayerIdx];
    passToPlayer(player, () => { gs.phase = 'guess'; render(); });
    panel.innerHTML = '<h2>DOODLE — GUESS TIME</h2>';
    return;
  }

  if (gs.phase === 'guess') {
    const player = state.players[gs.guessPlayerIdx];
    panel.innerHTML =
      '<h2>WHAT IS IT?</h2>' +
      '<div class="turn-tag" style="background:' + esc(player.color) + '">' + esc(player.name) + '</div>' +
      '<p class="muted" style="margin-top:10px">Look at the doodle and type your best guess.</p>' +
      '<img src="' + round.imgData + '" style="width:100%;border:2px solid var(--cyan);border-radius:8px;margin-top:8px">' +
      '<textarea id="g_ans" maxlength="60" placeholder="Your guess..."></textarea>' +
      '<button class="primary" id="g_submit">SUBMIT GUESS</button>';
    const ta = panel.querySelector('#g_ans');
    setTimeout(() => ta.focus(), 100);
    panel.querySelector('#g_submit').addEventListener('click', () => {
      const txt = ta.value.trim();
      if (!txt) { sfx.buzz(); return; }
      round.guesses[player.id] = txt;
      // loose matching: both words appear, or exact
      const target = round.word.toLowerCase();
      const guess = txt.toLowerCase();
      const targetWords = target.split(/\s+/).filter(w => w.length > 2);
      const matches = targetWords.filter(w => guess.includes(w));
      const correct = guess === target ||
                      matches.length === targetWords.length ||
                      (targetWords.length > 1 && matches.length >= Math.ceil(targetWords.length / 2));
      round.correctness[player.id] = correct;
      if (correct) sfx.ding(); else sfx.pop();
      gs.guessPlayerIdx++;
      while (gs.guessPlayerIdx < state.players.length && gs.guessPlayerIdx === round.drawerIdx) {
        gs.guessPlayerIdx++;
      }
      if (gs.guessPlayerIdx >= state.players.length) {
        gs.phase = 'reveal';
      } else {
        gs.phase = 'pass-guess';
      }
      render();
    });
    return;
  }

  if (gs.phase === 'reveal') {
    let correctCount = 0;
    Object.keys(round.correctness).forEach(pid => {
      if (round.correctness[pid]) {
        correctCount++;
        const pl = state.players.find(p => String(p.id) === pid);
        if (pl) pl.score += 400;
      }
    });
    // drawer bonus: 200 per correct guesser (not too easy, not too hard)
    drawer.score += correctCount * 200;

    panel.innerHTML =
      '<h2>REVEAL — R' + (gs.roundIdx + 1) + '</h2>' +
      '<div class="prompt-box">THE WORD WAS<br><b style="color:var(--cyan)">' + esc(round.word) + '</b></div>' +
      '<img src="' + round.imgData + '" style="width:100%;border:2px solid var(--orange);border-radius:8px;margin-top:8px">' +
      '<p class="muted" style="margin-top:10px">Drawn by <b style="color:' + esc(drawer.color) + '">' + esc(drawer.name) + '</b> — +' + (correctCount * 200) + ' bonus pts</p>';
    const list = document.createElement('div');
    state.players.forEach(p => {
      if (p.id === drawer.id) return;
      const div = document.createElement('div');
      const correct = round.correctness[p.id];
      div.className = 'answer-option ' + (correct ? 'real' : 'revealed');
      div.innerHTML = '<div>' + (correct ? '[✓] ' : '[✗] ') + esc(round.guesses[p.id] || '(no guess)') + '</div>' +
        '<div class="author" style="color:' + esc(p.color) + '">' + esc(p.name) + (correct ? ' — +400' : ' — 0') + '</div>';
      list.appendChild(div);
    });
    panel.appendChild(list);

    const btn = document.createElement('button');
    btn.className = 'primary';
    gs.roundIdx++;
    if (gs.roundIdx >= gs.rounds.length) {
      btn.textContent = 'SEE FINAL SCORES';
      btn.addEventListener('click', finishGame);
    } else {
      btn.textContent = 'NEXT ROUND';
      btn.addEventListener('click', () => { gs.phase = 'pass-draw'; render(); });
    }
    panel.appendChild(btn);
    sfx.fanfare();
    return;
  }
}

// ---------- HOT TAKE HANDOFF ----------
function startHotTake() {
  const used = new Set();
  const rounds = [];
  for (let i = 0; i < state.settings.rounds; i++) {
    let p;
    do { p = pick(HOT_TAKES); } while (used.has(p) && used.size < HOT_TAKES.length);
    used.add(p);
    rounds.push({ prompt: p, answers: [] });
  }
  state.gameState = {
    type: 'hottake', rounds, roundIdx: 0,
    phase: 'pass-input', inputPlayerIdx: 0, votePlayerIdx: 0,
    renderPhase: renderHotTakePhase
  };
}

function renderHotTakePhase(panel) {
  const gs = state.gameState;
  const round = gs.rounds[gs.roundIdx];

  if (gs.phase === 'pass-input') {
    const player = state.players[gs.inputPlayerIdx];
    passToPlayer(player, () => { gs.phase = 'input'; render(); });
    panel.innerHTML = '<h2>HOT TAKE HANDOFF — R' + (gs.roundIdx + 1) + '</h2>';
    return;
  }

  if (gs.phase === 'input') {
    const player = state.players[gs.inputPlayerIdx];
    panel.innerHTML =
      '<h2>HOT TAKE — SERVE IT UP</h2>' +
      '<div class="turn-tag" style="background:' + esc(player.color) + '">' + esc(player.name) + '</div>' +
      '<div class="prompt-box">' + esc(round.prompt) + '</div>' +
      '<p class="tiny">SPICY BUT SILLY — NO HEDGING!</p>' +
      '<textarea id="h_ans" maxlength="160" placeholder="Write your hot take..."></textarea>' +
      '<button class="primary" id="h_submit">SUBMIT &amp; PASS</button>';
    const ta = panel.querySelector('#h_ans');
    setTimeout(() => ta.focus(), 100);
    startTimer(panel);
    panel.querySelector('#h_submit').addEventListener('click', () => {
      const txt = ta.value.trim();
      if (!txt) { sfx.buzz(); return; }
      round.answers.push({ playerId: player.id, text: txt, votes: [] });
      stopTimer(); sfx.ding();
      gs.inputPlayerIdx++;
      if (gs.inputPlayerIdx >= state.players.length) {
        gs.phase = 'pass-vote'; gs.votePlayerIdx = 0;
      } else {
        gs.phase = 'pass-input';
      }
      render();
    });
    return;
  }

  if (gs.phase === 'pass-vote') {
    const player = state.players[gs.votePlayerIdx];
    passToPlayer(player, () => { gs.phase = 'vote'; render(); });
    panel.innerHTML = '<h2>HOT TAKE — VOTE</h2>';
    return;
  }

  if (gs.phase === 'vote') {
    const player = state.players[gs.votePlayerIdx];
    panel.innerHTML =
      '<h2>HOT TAKE — VOTE</h2>' +
      '<div class="turn-tag" style="background:' + esc(player.color) + '">' + esc(player.name) + '</div>' +
      '<div class="prompt-box">' + esc(round.prompt) + '</div>' +
      '<p class="tiny">TAP THE SPICIEST TAKE</p>' +
      '<div id="voteList"></div>';
    const list = panel.querySelector('#voteList');
    const shuffled = round.answers.map((a, i) => ({ ...a, origIdx: i }));
    shuffled.sort(() => Math.random() - 0.5);
    shuffled.forEach(a => {
      const div = document.createElement('div');
      div.className = 'answer-option' + (a.playerId === player.id ? ' disabled' : '');
      div.textContent = a.text;
      div.addEventListener('click', () => {
        if (a.playerId === player.id) { sfx.buzz(); return; }
        round.answers[a.origIdx].votes.push(player.id);
        sfx.pop();
        gs.votePlayerIdx++;
        if (gs.votePlayerIdx >= state.players.length) gs.phase = 'reveal';
        else gs.phase = 'pass-vote';
        render();
      });
      list.appendChild(div);
    });
    return;
  }

  if (gs.phase === 'reveal') {
    round.answers.forEach(a => {
      const pl = state.players.find(p => p.id === a.playerId);
      if (pl) pl.score += a.votes.length * 150;
    });
    const sorted = round.answers.slice().sort((a, b) => b.votes.length - a.votes.length);
    panel.innerHTML = '<h2>HOT TAKE — REVEAL</h2><div class="prompt-box">' + esc(round.prompt) + '</div>';
    const list = document.createElement('div');
    sorted.forEach((a, i) => {
      const pl = state.players.find(p => p.id === a.playerId);
      const div = document.createElement('div');
      div.className = 'answer-option revealed';
      div.innerHTML = '<div>' + (i === 0 ? '[SPICIEST] ' : '') + esc(a.text) + '</div>' +
        '<div class="author" style="color:' + esc(pl.color) + '">' + esc(pl.name) + ' — ' + a.votes.length + ' votes (+' + (a.votes.length * 150) + ')</div>';
      list.appendChild(div);
    });
    panel.appendChild(list);
    const btn = document.createElement('button');
    btn.className = 'primary';
    gs.roundIdx++;
    if (gs.roundIdx >= gs.rounds.length) {
      btn.textContent = 'SEE FINAL SCORES';
      btn.addEventListener('click', finishGame);
    } else {
      btn.textContent = 'NEXT ROUND';
      btn.addEventListener('click', () => { gs.phase = 'pass-input'; gs.inputPlayerIdx = 0; render(); });
    }
    panel.appendChild(btn);
    sfx.fanfare();
    return;
  }
}

// ---------- KORBSPIRACY ----------
function startKorbspiracy() {
  state.gameState = {
    type: 'korbspiracy',
    roundIdx: 0,
    phase: 'setup',
    pair: null,
    impostorIdx: -1,
    revealIdx: 0,
    votes: {}, // voterId -> targetId
    voteIdx: 0,
    renderPhase: renderKorbspiracyPhase
  };
  prepareKorbspiracyRound();
}

function prepareKorbspiracyRound() {
  const gs = state.gameState;
  gs.pair = pick(KORBSPIRACY_PAIRS);
  gs.impostorIdx = Math.floor(Math.random() * state.players.length);
  gs.phase = 'pass-reveal';
  gs.revealIdx = 0;
  gs.votes = {};
  gs.voteIdx = 0;
}

function renderKorbspiracyPhase(panel) {
  const gs = state.gameState;

  if (gs.phase === 'pass-reveal') {
    if (gs.revealIdx >= state.players.length) {
      gs.phase = 'discuss';
      render();
      return;
    }
    const player = state.players[gs.revealIdx];
    passToPlayer(player, () => { gs.phase = 'reveal-word'; render(); });
    panel.innerHTML = '<h2>KORBSPIRACY — R' + (gs.roundIdx + 1) + '</h2><p class="muted">Each player secretly gets a word...</p>';
    return;
  }

  if (gs.phase === 'reveal-word') {
    const player = state.players[gs.revealIdx];
    const isImpostor = gs.revealIdx === gs.impostorIdx;
    const word = isImpostor ? gs.pair[1] : gs.pair[0];
    panel.innerHTML =
      '<h2>YOUR SECRET WORD</h2>' +
      '<div class="turn-tag" style="background:' + esc(player.color) + '">' + esc(player.name) + '</div>' +
      '<div class="prompt-box" id="k_hide" style="min-height:120px;font-size:24px;color:var(--cyan)">TAP TO REVEAL</div>' +
      '<p class="tiny">Don\'t let anyone else see!</p>' +
      '<button class="primary hidden" id="k_next">I\'VE SEEN IT — PASS</button>';
    const box = panel.querySelector('#k_hide');
    let revealed = false;
    box.addEventListener('click', () => {
      if (revealed) return;
      revealed = true;
      box.innerHTML = '<b style="color:var(--orange)">' + esc(word) + '</b>';
      panel.querySelector('#k_next').classList.remove('hidden');
      sfx.pop();
    });
    panel.querySelector('#k_next').addEventListener('click', () => {
      gs.revealIdx++;
      gs.phase = 'pass-reveal';
      render();
    });
    return;
  }

  if (gs.phase === 'discuss') {
    panel.innerHTML =
      '<h2>DISCUSSION</h2>' +
      '<div class="prompt-box">Everyone describes their word<br>WITHOUT saying it directly!</div>' +
      '<p class="muted">Take turns describing. Someone has a DIFFERENT word. Find the impostor.</p>' +
      '<div style="margin-top:10px">';
    state.players.forEach(p => {
      panel.innerHTML += '<div class="player-chip"><div class="dot" style="background:' + esc(p.color) + ';color:' + esc(p.color) + '"></div><div style="flex:1">' + esc(p.name) + '</div></div>';
    });
    panel.innerHTML += '</div>';

    const btn = document.createElement('button');
    btn.className = 'primary';
    btn.textContent = 'READY TO VOTE';
    btn.addEventListener('click', () => { gs.phase = 'pass-vote'; gs.voteIdx = 0; render(); });
    panel.appendChild(btn);
    return;
  }

  if (gs.phase === 'pass-vote') {
    if (gs.voteIdx >= state.players.length) { gs.phase = 'reveal'; render(); return; }
    const player = state.players[gs.voteIdx];
    passToPlayer(player, () => { gs.phase = 'vote'; render(); });
    panel.innerHTML = '<h2>KORBSPIRACY — VOTE</h2>';
    return;
  }

  if (gs.phase === 'vote') {
    const player = state.players[gs.voteIdx];
    panel.innerHTML =
      '<h2>WHO\'S THE IMPOSTOR?</h2>' +
      '<div class="turn-tag" style="background:' + esc(player.color) + '">' + esc(player.name) + '</div>' +
      '<p class="muted" style="margin-top:10px">Pick who you think had the different word.</p>' +
      '<div id="voteList"></div>';
    const list = panel.querySelector('#voteList');
    state.players.forEach((p, idx) => {
      if (p.id === player.id) return;
      const div = document.createElement('div');
      div.className = 'answer-option';
      div.innerHTML = '<div style="display:flex;align-items:center;gap:8px"><span style="display:inline-block;width:10px;height:10px;border-radius:50%;background:' + esc(p.color) + '"></span> ' + esc(p.name) + '</div>';
      div.addEventListener('click', () => {
        gs.votes[player.id] = idx;
        sfx.pop();
        gs.voteIdx++;
        gs.phase = 'pass-vote';
        render();
      });
      list.appendChild(div);
    });
    return;
  }

  if (gs.phase === 'reveal') {
    // Count votes per player
    const tally = {};
    state.players.forEach((_, i) => tally[i] = 0);
    Object.values(gs.votes).forEach(targetIdx => { tally[targetIdx] = (tally[targetIdx] || 0) + 1; });
    let max = -1, suspect = -1;
    Object.keys(tally).forEach(k => { if (tally[k] > max) { max = tally[k]; suspect = parseInt(k, 10); } });
    const impostor = state.players[gs.impostorIdx];
    const caught = suspect === gs.impostorIdx;

    // scoring: impostor gets 500 if not caught; everyone else gets 300 if caught impostor
    if (caught) {
      state.players.forEach((p, i) => {
        if (i !== gs.impostorIdx && gs.votes[p.id] === gs.impostorIdx) p.score += 300;
      });
    } else {
      impostor.score += 500;
    }

    panel.innerHTML =
      '<h2>REVEAL</h2>' +
      '<div class="prompt-box">Most players had: <b style="color:var(--cyan)">' + esc(gs.pair[0]) + '</b><br>' +
      'Impostor had: <b style="color:var(--orange)">' + esc(gs.pair[1]) + '</b></div>' +
      '<div class="winner-box" style="margin-top:12px">' +
      '<div class="crown">' + (caught ? '[CAUGHT!]' : '[ESCAPED!]') + '</div>' +
      '<div class="name" style="color:' + esc(impostor.color) + '">' + esc(impostor.name) + '</div>' +
      '<div class="score">WAS THE IMPOSTOR</div></div>';
    const btn = document.createElement('button');
    btn.className = 'primary';
    gs.roundIdx++;
    if (gs.roundIdx >= state.settings.rounds) {
      btn.textContent = 'SEE FINAL SCORES';
      btn.addEventListener('click', finishGame);
    } else {
      btn.textContent = 'NEXT ROUND';
      btn.addEventListener('click', () => { prepareKorbspiracyRound(); render(); });
    }
    panel.appendChild(btn);
    sfx.fanfare();
    return;
  }
}

// ---------- timer ----------
let timerHandle = null;
let timerEl = null;
function startTimer(panel) {
  stopTimer();
  const total = state.settings.timer;
  let remaining = total;
  const bar = document.createElement('div');
  bar.className = 'timer-bar';
  bar.innerHTML = '<div style="width:100%"></div>';
  panel.appendChild(bar);
  timerEl = bar.firstElementChild;
  timerHandle = setInterval(() => {
    remaining--;
    if (timerEl) timerEl.style.width = (100 * remaining / total) + '%';
    if (remaining <= 5 && remaining > 0) sfx.tick();
    if (remaining <= 0) { stopTimer(); sfx.buzz(); }
  }, 1000);
}
function stopTimer() {
  if (timerHandle) clearInterval(timerHandle);
  timerHandle = null;
  timerEl = null;
}

// ---------- end / leaderboard ----------
function finishGame() {
  stopTimer();
  const gameName = (GAMES.find(g => g.id === state.currentGame) || {}).name || state.currentGame;
  const sorted = state.players.slice().sort((a, b) => b.score - a.score);
  const top = sorted[0];
  // high score
  const cur = state.highScores[gameName];
  if (!cur || top.score > cur.score) {
    state.highScores[gameName] = { name: top.name, score: top.score };
  }
  saveState();
  state.screen = 'leaderboard';
  render();
  launchConfetti();
}

function renderLeaderboard() {
  const gameName = (GAMES.find(g => g.id === state.currentGame) || {}).name || 'GAME';
  const sorted = state.players.slice().sort((a, b) => b.score - a.score);
  const winner = sorted[0];

  const panel = document.createElement('div');
  panel.className = 'panel';
  panel.innerHTML =
    '<h2>' + esc(gameName) + ' — FINAL</h2>' +
    '<div class="winner-box">' +
    '<div class="crown">[CHAMPION]</div>' +
    '<div class="name" style="color:' + esc(winner.color) + '">' + esc(winner.name) + '</div>' +
    '<div class="score">' + winner.score + ' PTS</div>' +
    '</div>';
  const list = document.createElement('ul');
  list.className = 'scoreboard';
  list.style.marginTop = '16px';
  sorted.forEach((p, i) => {
    const li = document.createElement('li');
    li.innerHTML =
      '<span class="rank">#' + (i + 1) + '</span>' +
      '<span class="dot" style="background:' + esc(p.color) + ';color:' + esc(p.color) + '"></span>' +
      '<span class="name">' + esc(p.name) + '</span>' +
      '<span class="score">' + p.score + '</span>';
    li.style.transitionDelay = (i * 60) + 'ms';
    list.appendChild(li);
  });
  panel.appendChild(list);

  const btn1 = document.createElement('button');
  btn1.className = 'primary';
  btn1.textContent = 'PLAY ANOTHER GAME';
  btn1.style.marginTop = '16px';
  btn1.addEventListener('click', () => {
    state.players.forEach(p => p.score = 0);
    state.screen = 'gameSelect';
    render();
  });
  panel.appendChild(btn1);

  const btn2 = document.createElement('button');
  btn2.textContent = 'BACK TO LOBBY';
  btn2.addEventListener('click', () => {
    state.players.forEach(p => p.score = 0);
    state.screen = 'lobby';
    render();
  });
  panel.appendChild(btn2);

  root.appendChild(panel);
}

function launchConfetti() {
  const c = document.getElementById('confetti');
  c.innerHTML = '';
  c.classList.remove('hidden');
  const colors = PLAYER_COLORS;
  for (let i = 0; i < 80; i++) {
    const s = document.createElement('span');
    s.style.left = (Math.random() * 100) + '%';
    s.style.background = colors[Math.floor(Math.random() * colors.length)];
    s.style.animationDuration = (2 + Math.random() * 2.5) + 's';
    s.style.animationDelay = (Math.random() * 0.8) + 's';
    s.style.transform = 'rotate(' + Math.floor(Math.random() * 360) + 'deg)';
    c.appendChild(s);
  }
  setTimeout(() => c.classList.add('hidden'), 5000);
}

// ---------- go ----------
render();
</script>
</body>
</html>
