<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="description" content="Korb World Factbook | Korb Engineering — interactive world reference with country profiles, compare mode, regional browsers, and stats leaderboards. Data from REST Countries public API.">
<title>Korb World Factbook | Korb Engineering</title>
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box;}
:root{
  --bg-dark:#050a0f;
  --bg-mid:#0a1018;
  --bg-light:#0f1822;
  --bg-panel:#0c141d;
  --cyan:#00d4ff;
  --orange:#ff9900;
  --green:#00ff88;
  --red:#ff3344;
  --yellow:#ffd700;
  --purple:#a855f7;
  --border:#1a2a3a;
  --border-bright:#2a3a4a;
  --text:#c8d6e5;
  --text-dim:#5a6a7a;
  --text-bright:#e8f0f8;
}
html,body{min-height:100%;}
body{
  font-family:'JetBrains Mono','Courier New',monospace;
  background:var(--bg-dark);
  color:var(--text);
  font-size:13px;
  line-height:1.5;
  -webkit-font-smoothing:antialiased;
}
::-webkit-scrollbar{width:8px;height:8px;}
::-webkit-scrollbar-track{background:var(--bg-dark);}
::-webkit-scrollbar-thumb{background:var(--border);border-radius:3px;}
::-webkit-scrollbar-thumb:hover{background:var(--border-bright);}

input,select,button,textarea{font-family:'JetBrains Mono',monospace;font-size:16px;}
input[type=text],input[type=search],select{
  background:var(--bg-dark);
  color:var(--text-bright);
  border:1px solid var(--border);
  padding:8px 12px;
  border-radius:3px;
  outline:none;
  width:100%;
}
input[type=text]:focus,input[type=search]:focus,select:focus{border-color:var(--cyan);}
button{
  background:var(--bg-light);
  color:var(--cyan);
  border:1px solid var(--border);
  padding:8px 14px;
  cursor:pointer;
  border-radius:3px;
  transition:all .15s;
  font-weight:500;
}
button:hover{background:var(--border);border-color:var(--cyan);}
button.primary{background:var(--cyan);color:var(--bg-dark);font-weight:600;}
button.primary:hover{background:#33ddff;}
button.ghost{background:transparent;}
button.accent{border-color:var(--orange);color:var(--orange);}
button.accent:hover{background:rgba(255,153,0,0.1);}

a{color:var(--cyan);text-decoration:none;}
a:hover{text-decoration:underline;}

/* Header */
#site-header{
  background:var(--bg-mid);
  border-bottom:1px solid var(--border);
  padding:10px 16px;
  display:flex;
  align-items:center;
  justify-content:space-between;
  gap:12px;
  flex-wrap:wrap;
}
#site-header .brand{display:flex;align-items:center;gap:12px;}
#site-header .ke-box{
  width:36px;height:36px;
  border:2px solid var(--orange);
  display:flex;align-items:center;justify-content:center;
  font-weight:700;color:var(--orange);font-size:13px;
  flex-shrink:0;
}
#site-header h1{
  font-size:17px;
  font-weight:700;
  color:var(--cyan);
  letter-spacing:2px;
  text-transform:uppercase;
}
#site-header .tagline{
  font-size:11px;
  color:var(--text-dim);
  margin-top:2px;
  letter-spacing:0.5px;
}
#site-header .back-link{
  font-size:12px;
  color:var(--text-dim);
  padding:6px 10px;
  border:1px solid var(--border);
  border-radius:3px;
}
#site-header .back-link:hover{color:var(--cyan);border-color:var(--cyan);text-decoration:none;}

/* Layout */
#app{display:flex;flex-direction:column;min-height:100vh;}
#main-layout{
  display:grid;
  grid-template-columns:300px 1fr;
  gap:0;
  flex:1;
}
@media (max-width:820px){
  #main-layout{grid-template-columns:1fr;}
  #sidebar{
    border-right:none;
    border-bottom:1px solid var(--border);
    max-height:50vh;
  }
  #sidebar.collapsed{max-height:56px;overflow:hidden;}
  .sidebar-toggle{display:flex !important;}
}

#sidebar{
  background:var(--bg-panel);
  border-right:1px solid var(--border);
  padding:14px;
  overflow-y:auto;
  max-height:calc(100vh - 80px);
  position:sticky;
  top:0;
}
.sidebar-toggle{
  display:none;
  width:100%;
  margin-bottom:10px;
  justify-content:space-between;
  align-items:center;
  background:var(--bg-light);
  color:var(--cyan);
  padding:10px 12px;
  border:1px solid var(--border);
  border-radius:3px;
  cursor:pointer;
}
.sidebar-section{margin-bottom:16px;}
.sidebar-label{
  font-size:10px;
  color:var(--text-dim);
  text-transform:uppercase;
  letter-spacing:1.5px;
  margin-bottom:6px;
  font-weight:600;
}
#search-input{margin-bottom:8px;}
#region-filter{margin-bottom:8px;}
.quick-btns{display:grid;grid-template-columns:1fr 1fr;gap:6px;margin-bottom:12px;}
.quick-btns button{padding:6px 8px;font-size:11px;}

#country-list{
  list-style:none;
  max-height:380px;
  overflow-y:auto;
  border:1px solid var(--border);
  border-radius:3px;
  background:var(--bg-dark);
}
#country-list li{
  padding:7px 10px;
  border-bottom:1px solid #0d1520;
  cursor:pointer;
  display:flex;
  align-items:center;
  gap:8px;
  font-size:12px;
  transition:background .1s;
}
#country-list li:hover{background:var(--bg-light);}
#country-list li.active{background:rgba(0,212,255,0.12);color:var(--cyan);}
#country-list li .flag{font-size:16px;flex-shrink:0;}
#country-list li .code{color:var(--text-dim);font-size:10px;margin-left:auto;}
#country-list li .fav{color:var(--yellow);}

#content{
  padding:20px 24px;
  overflow-y:auto;
  max-width:100%;
}
@media (max-width:600px){
  #content{padding:14px;}
}

/* Home view */
.home-hero{
  background:linear-gradient(135deg,var(--bg-panel),var(--bg-mid));
  border:1px solid var(--border);
  border-radius:4px;
  padding:22px;
  margin-bottom:18px;
}
.home-hero h2{
  color:var(--orange);
  font-size:20px;
  letter-spacing:2px;
  text-transform:uppercase;
  margin-bottom:8px;
}
.home-hero p{color:var(--text);font-size:13px;max-width:720px;}
.home-hero .stat-row{
  display:flex;
  gap:18px;
  margin-top:14px;
  flex-wrap:wrap;
}
.home-hero .stat{
  background:var(--bg-dark);
  border:1px solid var(--border);
  padding:8px 14px;
  border-radius:3px;
}
.home-hero .stat .n{color:var(--cyan);font-size:18px;font-weight:700;}
.home-hero .stat .l{color:var(--text-dim);font-size:10px;text-transform:uppercase;letter-spacing:1px;}

.section-title{
  color:var(--orange);
  font-size:13px;
  text-transform:uppercase;
  letter-spacing:2px;
  font-weight:600;
  margin:20px 0 10px;
  padding-bottom:6px;
  border-bottom:1px solid var(--border);
  display:flex;
  align-items:center;
  justify-content:space-between;
}

.region-grid{
  display:grid;
  grid-template-columns:repeat(auto-fill,minmax(180px,1fr));
  gap:10px;
}
.region-tile{
  background:var(--bg-panel);
  border:1px solid var(--border);
  border-radius:3px;
  padding:14px;
  cursor:pointer;
  transition:all .15s;
}
.region-tile:hover{border-color:var(--cyan);background:var(--bg-light);}
.region-tile .rn{color:var(--cyan);font-size:14px;font-weight:600;margin-bottom:4px;}
.region-tile .rc{color:var(--text-dim);font-size:11px;}

.leaderboard-grid{
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(260px,1fr));
  gap:12px;
}
.leaderboard{
  background:var(--bg-panel);
  border:1px solid var(--border);
  border-radius:3px;
  padding:12px;
}
.leaderboard h4{
  color:var(--cyan);
  font-size:12px;
  text-transform:uppercase;
  letter-spacing:1px;
  margin-bottom:8px;
  padding-bottom:6px;
  border-bottom:1px solid var(--border);
}
.leaderboard ol{list-style:none;counter-reset:lb;}
.leaderboard li{
  counter-increment:lb;
  padding:5px 0;
  font-size:12px;
  display:flex;
  justify-content:space-between;
  gap:10px;
  cursor:pointer;
  border-bottom:1px dotted #0d1520;
}
.leaderboard li:hover{color:var(--cyan);}
.leaderboard li::before{
  content:counter(lb)".";
  color:var(--text-dim);
  margin-right:6px;
  min-width:22px;
  display:inline-block;
}
.leaderboard li .nm{flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
.leaderboard li .vl{color:var(--orange);font-weight:500;}

/* Country profile */
.profile-header{
  display:flex;
  gap:18px;
  align-items:flex-start;
  background:var(--bg-panel);
  border:1px solid var(--border);
  border-radius:4px;
  padding:18px;
  margin-bottom:16px;
  flex-wrap:wrap;
}
.profile-header .flag-big{font-size:80px;line-height:1;flex-shrink:0;}
.profile-header .ph-info{flex:1;min-width:240px;}
.profile-header .ph-info h2{
  color:var(--cyan);
  font-size:24px;
  margin-bottom:4px;
  letter-spacing:1px;
}
.profile-header .ph-info .off{
  color:var(--text-dim);
  font-size:12px;
  margin-bottom:4px;
  font-style:italic;
}
.profile-header .ph-info .codes{
  color:var(--orange);
  font-size:11px;
  letter-spacing:1px;
}
.profile-header .ph-actions{
  display:flex;
  gap:6px;
  flex-wrap:wrap;
  margin-top:10px;
}
.profile-header .ph-actions button{padding:6px 10px;font-size:11px;}

.mini-cards{
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(160px,1fr));
  gap:10px;
  margin-bottom:16px;
}
.mini-card{
  background:var(--bg-panel);
  border:1px solid var(--border);
  border-left:3px solid var(--cyan);
  border-radius:3px;
  padding:10px 12px;
}
.mini-card.o{border-left-color:var(--orange);}
.mini-card.g{border-left-color:var(--green);}
.mini-card.y{border-left-color:var(--yellow);}
.mini-card .l{color:var(--text-dim);font-size:9px;text-transform:uppercase;letter-spacing:1.2px;}
.mini-card .v{color:var(--text-bright);font-size:16px;font-weight:600;margin-top:4px;}
.mini-card .s{color:var(--text-dim);font-size:10px;margin-top:2px;}

.profile-grid{
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(300px,1fr));
  gap:14px;
}
.info-block{
  background:var(--bg-panel);
  border:1px solid var(--border);
  border-radius:3px;
  padding:14px;
}
.info-block h3{
  color:var(--orange);
  font-size:12px;
  text-transform:uppercase;
  letter-spacing:1.5px;
  margin-bottom:10px;
  padding-bottom:6px;
  border-bottom:1px solid var(--border);
}
.info-row{
  display:flex;
  justify-content:space-between;
  padding:5px 0;
  font-size:12px;
  gap:12px;
  border-bottom:1px dotted #0d1520;
}
.info-row:last-child{border-bottom:none;}
.info-row .k{color:var(--text-dim);flex-shrink:0;}
.info-row .v{color:var(--text-bright);text-align:right;word-break:break-word;}

.neighbor-chip{
  display:inline-block;
  background:var(--bg-dark);
  border:1px solid var(--border);
  color:var(--cyan);
  padding:3px 8px;
  margin:2px 3px 2px 0;
  font-size:11px;
  cursor:pointer;
  border-radius:2px;
}
.neighbor-chip:hover{border-color:var(--cyan);background:var(--bg-light);}

/* Mini map */
.mini-map-wrap{
  background:var(--bg-panel);
  border:1px solid var(--border);
  border-radius:3px;
  padding:12px;
  margin-bottom:16px;
  text-align:center;
}
.mini-map-wrap h3{
  color:var(--orange);
  font-size:12px;
  text-transform:uppercase;
  letter-spacing:1.5px;
  margin-bottom:10px;
}
.mini-map-wrap svg{
  max-width:100%;
  height:auto;
  background:var(--bg-dark);
  border:1px solid var(--border);
  border-radius:3px;
}

/* Compare */
#compare-view{display:none;}
#compare-view.on{display:block;}
.compare-pick{
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:12px;
  margin-bottom:16px;
}
@media (max-width:600px){.compare-pick{grid-template-columns:1fr;}}
.compare-pick select{
  padding:10px 12px;
  background:var(--bg-dark);
  border:1px solid var(--border);
  color:var(--text-bright);
  border-radius:3px;
}
.compare-grid{
  display:grid;
  grid-template-columns:1.2fr auto 1.2fr;
  gap:10px;
  background:var(--bg-panel);
  border:1px solid var(--border);
  border-radius:3px;
  padding:14px;
}
@media (max-width:600px){
  .compare-grid{grid-template-columns:1fr auto 1fr;font-size:11px;}
}
.compare-grid .cmp-label{
  color:var(--text-dim);
  text-align:center;
  font-size:11px;
  padding:6px 4px;
  text-transform:uppercase;
  letter-spacing:1px;
  border-bottom:1px solid #0d1520;
}
.compare-grid .cmp-val{
  padding:6px 4px;
  font-size:12px;
  color:var(--text-bright);
  border-bottom:1px solid #0d1520;
}
.compare-grid .cmp-val.left{text-align:right;}
.compare-grid .cmp-val.right{text-align:left;}
.compare-grid .bigger{color:var(--green);font-weight:600;}
.compare-grid .smaller{color:var(--text-dim);}
.compare-head{
  font-size:14px;
  color:var(--cyan);
  font-weight:600;
  padding:8px 4px;
  border-bottom:1px solid var(--border);
}

/* Loading + error */
.loading,.error-box{
  background:var(--bg-panel);
  border:1px solid var(--border);
  border-radius:3px;
  padding:30px;
  text-align:center;
  margin:30px 0;
}
.error-box{border-color:var(--red);}
.error-box .t{color:var(--red);font-size:14px;margin-bottom:8px;text-transform:uppercase;letter-spacing:1px;}
.error-box .m{color:var(--text);font-size:12px;margin-bottom:14px;}
.spinner{
  display:inline-block;
  width:24px;height:24px;
  border:2px solid var(--border);
  border-top-color:var(--cyan);
  border-radius:50%;
  animation:spin 0.8s linear infinite;
}
@keyframes spin{to{transform:rotate(360deg);}}

/* Print */
@media print{
  body{background:#fff;color:#000;}
  #sidebar,#site-header .back-link,.profile-header .ph-actions,.sidebar-toggle{display:none !important;}
  #main-layout{grid-template-columns:1fr;}
  .info-block,.mini-card,.profile-header,.mini-map-wrap{
    background:#fff;color:#000;border-color:#999;
  }
  .info-row .k,.info-row .v,.mini-card .l,.mini-card .v{color:#000;}
  a{color:#000;}
}

.footer{
  padding:16px;
  text-align:center;
  font-size:10px;
  color:var(--text-dim);
  border-top:1px solid var(--border);
  background:var(--bg-mid);
}
.footer .src{color:var(--cyan);}
</style>
</head>
<body>
<div id="app">
  <header id="site-header">
    <div class="brand">
      <div class="ke-box">KE</div>
      <div>
        <h1>Korb World Factbook</h1>
        <div class="tagline">World country reference &mdash; data via REST Countries</div>
      </div>
    </div>
    <a href="../../index.html#misc" class="back-link">&larr; Back to Korb</a>
  </header>

  <div id="main-layout">
    <aside id="sidebar">
      <button class="sidebar-toggle" id="sidebar-toggle-btn" aria-label="Toggle country list">
        <span>Country Index</span>
        <span id="sidebar-chev">&#9660;</span>
      </button>
      <div class="sidebar-section">
        <div class="sidebar-label">Search</div>
        <input type="search" id="search-input" placeholder="Find a country..." autocomplete="off">
      </div>
      <div class="sidebar-section">
        <div class="sidebar-label">Filter by region</div>
        <select id="region-filter">
          <option value="">All regions</option>
        </select>
      </div>
      <div class="sidebar-section">
        <div class="quick-btns">
          <button id="btn-home" class="ghost">Home</button>
          <button id="btn-random" class="accent">Random</button>
          <button id="btn-compare" class="ghost">Compare</button>
          <button id="btn-favs" class="ghost">Favorites</button>
        </div>
      </div>
      <div class="sidebar-section">
        <div class="sidebar-label">Countries <span id="list-count" style="color:var(--text-dim);">&nbsp;</span></div>
        <ul id="country-list"></ul>
      </div>
    </aside>

    <main id="content">
      <div id="view-root">
        <div class="loading">
          <div class="spinner"></div>
          <div style="margin-top:12px;color:var(--text-dim);font-size:11px;letter-spacing:1px;">FETCHING WORLD DATA...</div>
        </div>
      </div>
    </main>
  </div>

  <footer class="footer">
    Korb World Factbook &middot; Data sourced at runtime from <span class="src">restcountries.com</span> &middot; Cached locally for 7 days &middot; &copy; Korb Engineering
  </footer>
</div>

<script>
/* ==========================================================
   KORB WORLD FACTBOOK
   Single-file reference tool. No external libs.
   ========================================================== */
(function(){
'use strict';

var LS_PREFIX = 'korb_';
var CACHE_KEY = LS_PREFIX + 'world_factbook_cache_v1';
var FAVS_KEY  = LS_PREFIX + 'world_factbook_favs_v1';
var CACHE_TTL_MS = 7 * 24 * 60 * 60 * 1000; // 7 days
var API_URL = 'https://restcountries.com/v3.1/all?fields=name,cca2,cca3,capital,region,subregion,population,area,languages,currencies,flag,latlng,borders,timezones,continents,demonyms,independent,landlocked,car,idd,tld';

var state = {
  countries: [],
  byCode: {},
  view: 'home',      // 'home' | 'country' | 'compare' | 'favs' | 'region'
  currentCode: null,
  filterRegion: '',
  search: '',
  favs: loadFavs(),
  compareA: null,
  compareB: null,
  loading: true,
  error: null
};

/* ---------- utilities ---------- */
function esc(s){
  if (s == null) return '';
  return String(s)
    .replace(/&/g,'&amp;')
    .replace(/</g,'&lt;')
    .replace(/>/g,'&gt;')
    .replace(/"/g,'&quot;')
    .replace(/'/g,'&#39;');
}
function fmtNum(n){
  if (n == null || isNaN(n)) return '&mdash;';
  return Number(n).toLocaleString('en-US');
}
function fmtArea(km2){
  if (km2 == null || isNaN(km2)) return '&mdash;';
  var mi2 = km2 * 0.386102;
  return fmtNum(Math.round(km2)) + ' km&sup2; <span style="color:var(--text-dim);">(' + fmtNum(Math.round(mi2)) + ' mi&sup2;)</span>';
}
function areaKm2Only(km2){
  if (km2 == null || isNaN(km2)) return '&mdash;';
  return fmtNum(Math.round(km2)) + ' km&sup2;';
}
function joinList(arr){
  if (!arr || !arr.length) return '&mdash;';
  return arr.map(function(x){return esc(x);}).join(', ');
}
function loadFavs(){
  try{
    var raw = localStorage.getItem(FAVS_KEY);
    return raw ? JSON.parse(raw) : {};
  }catch(e){return {};}
}
function saveFavs(){
  try{ localStorage.setItem(FAVS_KEY, JSON.stringify(state.favs)); }catch(e){}
}
function toggleFav(code){
  if (state.favs[code]) delete state.favs[code];
  else state.favs[code] = 1;
  saveFavs();
}

/* ---------- data loading ---------- */
function loadData(forceRefresh){
  state.loading = true;
  state.error = null;
  render();

  if (!forceRefresh){
    try{
      var raw = localStorage.getItem(CACHE_KEY);
      if (raw){
        var parsed = JSON.parse(raw);
        if (parsed && parsed.ts && parsed.data && (Date.now() - parsed.ts) < CACHE_TTL_MS){
          ingest(parsed.data);
          return;
        }
      }
    }catch(e){}
  }

  fetch(API_URL)
    .then(function(r){
      if (!r.ok) throw new Error('API returned ' + r.status);
      return r.json();
    })
    .then(function(data){
      try{
        localStorage.setItem(CACHE_KEY, JSON.stringify({ts:Date.now(), data:data}));
      }catch(e){}
      ingest(data);
    })
    .catch(function(err){
      state.loading = false;
      state.error = err && err.message ? err.message : 'Unknown network error';
      render();
    });
}

function ingest(raw){
  if (!Array.isArray(raw)){
    state.error = 'Unexpected data format from API';
    state.loading = false;
    render();
    return;
  }
  state.countries = raw.slice().sort(function(a,b){
    var an = (a.name && a.name.common) || '';
    var bn = (b.name && b.name.common) || '';
    return an.localeCompare(bn);
  });
  state.byCode = {};
  state.countries.forEach(function(c){
    if (c.cca3) state.byCode[c.cca3] = c;
    if (c.cca2) state.byCode[c.cca2] = c;
  });
  state.loading = false;
  populateRegionFilter();
  render();
}

/* ---------- DOM refs ---------- */
var el = {
  searchInput: document.getElementById('search-input'),
  regionFilter: document.getElementById('region-filter'),
  countryList: document.getElementById('country-list'),
  listCount: document.getElementById('list-count'),
  viewRoot: document.getElementById('view-root'),
  btnHome: document.getElementById('btn-home'),
  btnRandom: document.getElementById('btn-random'),
  btnCompare: document.getElementById('btn-compare'),
  btnFavs: document.getElementById('btn-favs'),
  sidebar: document.getElementById('sidebar'),
  sidebarToggle: document.getElementById('sidebar-toggle-btn'),
  sidebarChev: document.getElementById('sidebar-chev')
};

/* ---------- sidebar ---------- */
function populateRegionFilter(){
  var regions = {};
  state.countries.forEach(function(c){ if (c.region) regions[c.region] = true; });
  var keys = Object.keys(regions).sort();
  el.regionFilter.innerHTML = '<option value="">All regions</option>' +
    keys.map(function(r){ return '<option value="'+esc(r)+'">'+esc(r)+'</option>'; }).join('');
}

function filteredCountries(){
  var q = state.search.trim().toLowerCase();
  var region = state.filterRegion;
  return state.countries.filter(function(c){
    if (region && c.region !== region) return false;
    if (!q) return true;
    var name = (c.name && c.name.common || '').toLowerCase();
    var off  = (c.name && c.name.official || '').toLowerCase();
    var cap  = (c.capital && c.capital[0] || '').toLowerCase();
    var code = (c.cca3 || '').toLowerCase();
    return name.indexOf(q) !== -1 || off.indexOf(q) !== -1 || cap.indexOf(q) !== -1 || code.indexOf(q) !== -1;
  });
}

function renderCountryList(){
  var list = filteredCountries();
  el.listCount.textContent = '(' + list.length + ')';
  var html = list.map(function(c){
    var code = c.cca3 || c.cca2 || '';
    var isActive = state.currentCode === code ? ' active' : '';
    var star = state.favs[code] ? '<span class="fav">&#9733;</span>' : '';
    return '<li data-code="'+esc(code)+'" class="'+isActive.trim()+'">' +
             '<span class="flag">'+esc(c.flag || '')+'</span>' +
             '<span>'+esc(c.name && c.name.common || 'Unknown')+'</span>' +
             star +
             '<span class="code">'+esc(code)+'</span>' +
           '</li>';
  }).join('');
  el.countryList.innerHTML = html || '<li style="color:var(--text-dim);cursor:default;">No matches</li>';
}

/* ---------- SVG mini map ---------- */
function buildMiniMap(lat, lng){
  // Equirectangular projection onto 400x200 SVG.
  // We draw a simplified landmass approximation using a known dataset? Instead,
  // draw a graticule + a highlighted dot to show relative position.
  var w = 400, h = 200;
  if (lat == null || lng == null || isNaN(lat) || isNaN(lng)){
    return '<svg viewBox="0 0 '+w+' '+h+'" width="'+w+'" height="'+h+'" role="img" aria-label="No location data"><rect width="'+w+'" height="'+h+'" fill="#050a0f"/><text x="'+(w/2)+'" y="'+(h/2)+'" fill="#5a6a7a" font-size="12" text-anchor="middle" font-family="monospace">NO COORDINATES</text></svg>';
  }
  var x = ((lng + 180) / 360) * w;
  var y = ((90 - lat) / 180) * h;

  // Simple continent silhouettes (very rough polygons, drawn from hand-picked points).
  var continents = [
    // N. America rough
    'M40,30 L120,25 L150,45 L140,80 L100,110 L70,120 L40,100 Z',
    // S. America rough
    'M110,115 L145,110 L160,150 L140,185 L115,190 L100,160 Z',
    // Europe rough
    'M180,35 L230,30 L240,60 L210,80 L185,70 Z',
    // Africa rough
    'M195,85 L240,85 L255,130 L230,180 L205,175 L190,130 Z',
    // Asia rough
    'M240,25 L360,30 L370,80 L320,100 L265,95 L245,60 Z',
    // Australia rough
    'M320,140 L370,135 L375,165 L340,170 Z',
    // Antarctica rough
    'M30,190 L370,190 L370,200 L30,200 Z'
  ];
  var paths = continents.map(function(p){
    return '<path d="'+p+'" fill="#0f1822" stroke="#1a2a3a" stroke-width="0.5"/>';
  }).join('');

  var graticule = '';
  for (var i=0;i<=8;i++){
    var gx = (i/8)*w;
    graticule += '<line x1="'+gx+'" y1="0" x2="'+gx+'" y2="'+h+'" stroke="#0d1520" stroke-width="0.5"/>';
  }
  for (var j=0;j<=4;j++){
    var gy = (j/4)*h;
    graticule += '<line x1="0" y1="'+gy+'" x2="'+w+'" y2="'+gy+'" stroke="#0d1520" stroke-width="0.5"/>';
  }
  // Equator
  graticule += '<line x1="0" y1="'+(h/2)+'" x2="'+w+'" y2="'+(h/2)+'" stroke="#1a2a3a" stroke-width="0.8" stroke-dasharray="3,3"/>';

  var dot = '<circle cx="'+x.toFixed(1)+'" cy="'+y.toFixed(1)+'" r="5" fill="#ff9900" stroke="#ffd700" stroke-width="1.5"><animate attributeName="r" values="4;8;4" dur="2s" repeatCount="indefinite"/></circle>' +
            '<circle cx="'+x.toFixed(1)+'" cy="'+y.toFixed(1)+'" r="2" fill="#ffd700"/>';

  return '<svg viewBox="0 0 '+w+' '+h+'" width="'+w+'" height="'+h+'" role="img" aria-label="World map with country highlighted">' +
         '<rect width="'+w+'" height="'+h+'" fill="#050a0f"/>' +
         graticule +
         paths +
         dot +
         '<text x="6" y="14" fill="#5a6a7a" font-size="9" font-family="monospace">LAT '+lat.toFixed(2)+'  LNG '+lng.toFixed(2)+'</text>' +
         '</svg>';
}

/* ---------- render: views ---------- */
function render(){
  if (state.loading){
    el.viewRoot.innerHTML =
      '<div class="loading">' +
        '<div class="spinner"></div>' +
        '<div style="margin-top:12px;color:var(--text-dim);font-size:11px;letter-spacing:1px;">FETCHING WORLD DATA...</div>' +
      '</div>';
    renderCountryList();
    return;
  }
  if (state.error){
    el.viewRoot.innerHTML =
      '<div class="error-box">' +
        '<div class="t">Data Unavailable</div>' +
        '<div class="m">Could not load country data: ' + esc(state.error) + '</div>' +
        '<button class="primary" id="retry-btn">Retry</button>' +
      '</div>';
    var rb = document.getElementById('retry-btn');
    if (rb) rb.addEventListener('click', function(){ loadData(true); });
    renderCountryList();
    return;
  }

  renderCountryList();

  switch(state.view){
    case 'country': renderCountry(); break;
    case 'compare': renderCompare(); break;
    case 'favs':    renderFavs(); break;
    default:        renderHome();
  }
}

/* ---------- home view ---------- */
function renderHome(){
  var total = state.countries.length;
  var totalPop = 0, totalArea = 0;
  state.countries.forEach(function(c){
    totalPop += (c.population || 0);
    totalArea += (c.area || 0);
  });

  // region grouping
  var regions = {};
  state.countries.forEach(function(c){
    var r = c.region || 'Other';
    regions[r] = (regions[r] || 0) + 1;
  });
  var regionTiles = Object.keys(regions).sort().map(function(r){
    return '<div class="region-tile" data-region="'+esc(r)+'">' +
             '<div class="rn">'+esc(r)+'</div>' +
             '<div class="rc">'+regions[r]+' countries</div>' +
           '</div>';
  }).join('');

  // leaderboards
  function top(sortFn, valFn){
    return state.countries.slice().sort(sortFn).slice(0,10).map(function(c){
      return '<li data-code="'+esc(c.cca3||'')+'"><span class="nm">'+esc(c.flag||'')+' '+esc(c.name && c.name.common || '')+'</span><span class="vl">'+valFn(c)+'</span></li>';
    }).join('');
  }
  var topPop   = top(function(a,b){return (b.population||0)-(a.population||0);}, function(c){return fmtNum(c.population);});
  var topArea  = top(function(a,b){return (b.area||0)-(a.area||0);}, function(c){return fmtNum(Math.round(c.area||0))+' km&sup2;';});
  var topDens  = top(function(a,b){
    var da = (a.area > 0) ? (a.population||0)/a.area : 0;
    var db = (b.area > 0) ? (b.population||0)/b.area : 0;
    return db - da;
  }, function(c){
    if (!c.area) return '&mdash;';
    return (Math.round(((c.population||0)/c.area)*10)/10).toLocaleString('en-US') + '/km&sup2;';
  });

  el.viewRoot.innerHTML =
    '<div class="home-hero">' +
      '<h2>World Reference</h2>' +
      '<p>A compact, browser-based almanac of the world\'s nations. Search the full list, browse by region, compare two countries head-to-head, or star favorites. All data is fetched once from a public API and cached in your browser for a week.</p>' +
      '<div class="stat-row">' +
        '<div class="stat"><div class="n">'+total+'</div><div class="l">Countries</div></div>' +
        '<div class="stat"><div class="n">'+fmtNum(totalPop)+'</div><div class="l">People</div></div>' +
        '<div class="stat"><div class="n">'+fmtNum(Math.round(totalArea))+' km&sup2;</div><div class="l">Land + water</div></div>' +
      '</div>' +
    '</div>' +

    '<div class="section-title">Browse by Region</div>' +
    '<div class="region-grid">' + regionTiles + '</div>' +

    '<div class="section-title">Stats Leaderboards</div>' +
    '<div class="leaderboard-grid">' +
      '<div class="leaderboard"><h4>Most Populous</h4><ol>'+topPop+'</ol></div>' +
      '<div class="leaderboard"><h4>Largest by Area</h4><ol>'+topArea+'</ol></div>' +
      '<div class="leaderboard"><h4>Densest</h4><ol>'+topDens+'</ol></div>' +
    '</div>' +

    '<div class="section-title">Getting Started</div>' +
    '<div class="info-block">' +
      '<div style="font-size:12px;line-height:1.7;">Pick a country from the index on the left, or hit <strong style="color:var(--orange);">Random</strong> to jump to a surprise. Use <strong style="color:var(--cyan);">Compare</strong> to stack two nations side by side. Star any country to add it to your favorites for quick recall.</div>' +
    '</div>';

  // tile handlers
  document.querySelectorAll('.region-tile').forEach(function(t){
    t.addEventListener('click', function(){
      var r = t.getAttribute('data-region');
      state.filterRegion = r;
      el.regionFilter.value = r;
      renderCountryList();
      window.scrollTo(0,0);
    });
  });
  document.querySelectorAll('.leaderboard li[data-code]').forEach(function(li){
    li.addEventListener('click', function(){
      var code = li.getAttribute('data-code');
      if (code) showCountry(code);
    });
  });
}

/* ---------- country profile ---------- */
function showCountry(code){
  if (!state.byCode[code]) return;
  state.currentCode = code;
  state.view = 'country';
  render();
  window.scrollTo(0,0);
}

function renderCountry(){
  var c = state.byCode[state.currentCode];
  if (!c){ state.view = 'home'; renderHome(); return; }

  var common = (c.name && c.name.common) || 'Unknown';
  var official = (c.name && c.name.official) || '';
  var nativeNames = [];
  if (c.name && c.name.nativeName){
    Object.keys(c.name.nativeName).forEach(function(k){
      var n = c.name.nativeName[k];
      if (n && n.official) nativeNames.push(n.official);
    });
  }
  var capital = (c.capital && c.capital[0]) || '';
  var languages = c.languages ? Object.keys(c.languages).map(function(k){return c.languages[k];}) : [];
  var currencies = [];
  if (c.currencies){
    Object.keys(c.currencies).forEach(function(k){
      var cur = c.currencies[k];
      currencies.push((cur.name || k) + (cur.symbol ? ' ('+cur.symbol+')' : '') + ' [' + k + ']');
    });
  }
  var demonym = '';
  if (c.demonyms && c.demonyms.eng) demonym = c.demonyms.eng.m || c.demonyms.eng.f || '';

  var lat = (c.latlng && c.latlng[0] != null) ? c.latlng[0] : null;
  var lng = (c.latlng && c.latlng[1] != null) ? c.latlng[1] : null;

  var density = (c.area > 0) ? ((c.population || 0) / c.area) : null;
  var densityStr = density != null ? (Math.round(density*10)/10).toLocaleString('en-US') + ' /km&sup2;' : '&mdash;';

  var idd = '';
  if (c.idd && c.idd.root){
    var suffixes = (c.idd.suffixes && c.idd.suffixes.length) ? c.idd.suffixes.slice(0,3).join(', ') : '';
    idd = c.idd.root + (suffixes ? ' ('+suffixes+')' : '');
  }
  var tld = (c.tld && c.tld.length) ? c.tld.join(', ') : '';
  var driving = (c.car && c.car.side) ? c.car.side : '';

  var neighbors = (c.borders || []).map(function(code3){
    var n = state.byCode[code3];
    var label = n ? (n.flag + ' ' + (n.name && n.name.common || code3)) : code3;
    return '<span class="neighbor-chip" data-code="'+esc(code3)+'">'+esc(label)+'</span>';
  }).join('');

  var isFav = !!state.favs[state.currentCode];

  var html =
    '<div class="profile-header">' +
      '<div class="flag-big">'+esc(c.flag || '')+'</div>' +
      '<div class="ph-info">' +
        '<h2>'+esc(common)+'</h2>' +
        (official ? '<div class="off">'+esc(official)+'</div>' : '') +
        '<div class="codes">'+esc(c.cca2 || '')+' &middot; '+esc(c.cca3 || '')+(capital ? ' &middot; Capital '+esc(capital) : '')+'</div>' +
        '<div class="ph-actions">' +
          '<button id="fav-btn" class="accent">'+(isFav ? '&#9733; Favorited' : '&#9734; Favorite')+'</button>' +
          '<button id="print-btn" class="ghost">Print</button>' +
          '<button id="export-btn" class="ghost">Export JSON</button>' +
          '<button id="compare-this-btn" class="ghost">Compare</button>' +
        '</div>' +
      '</div>' +
    '</div>' +

    '<div class="mini-cards">' +
      '<div class="mini-card"><div class="l">Continent</div><div class="v">'+esc((c.continents && c.continents[0]) || '&mdash;')+'</div></div>' +
      '<div class="mini-card o"><div class="l">Population Density</div><div class="v">'+densityStr+'</div></div>' +
      '<div class="mini-card g"><div class="l">Independent</div><div class="v">'+(c.independent ? 'Yes' : (c.independent === false ? 'No' : '&mdash;'))+'</div></div>' +
      '<div class="mini-card y"><div class="l">Landlocked</div><div class="v">'+(c.landlocked ? 'Yes' : 'No')+'</div></div>' +
    '</div>' +

    '<div class="mini-map-wrap">' +
      '<h3>Approximate Location</h3>' +
      buildMiniMap(lat, lng) +
    '</div>' +

    '<div class="profile-grid">' +

      '<div class="info-block">' +
        '<h3>Geography</h3>' +
        '<div class="info-row"><span class="k">Region</span><span class="v">'+esc(c.region || '&mdash;')+'</span></div>' +
        '<div class="info-row"><span class="k">Subregion</span><span class="v">'+esc(c.subregion || '&mdash;')+'</span></div>' +
        '<div class="info-row"><span class="k">Continent</span><span class="v">'+joinList(c.continents)+'</span></div>' +
        '<div class="info-row"><span class="k">Area</span><span class="v">'+fmtArea(c.area)+'</span></div>' +
        '<div class="info-row"><span class="k">Coordinates</span><span class="v">'+(lat!=null?lat.toFixed(2)+', '+lng.toFixed(2):'&mdash;')+'</span></div>' +
        '<div class="info-row"><span class="k">Landlocked</span><span class="v">'+(c.landlocked ? 'Yes' : 'No')+'</span></div>' +
        '<div class="info-row"><span class="k">Time zones</span><span class="v">'+joinList(c.timezones)+'</span></div>' +
      '</div>' +

      '<div class="info-block">' +
        '<h3>People &amp; Society</h3>' +
        '<div class="info-row"><span class="k">Population</span><span class="v">'+fmtNum(c.population)+'</span></div>' +
        '<div class="info-row"><span class="k">Density</span><span class="v">'+densityStr+'</span></div>' +
        '<div class="info-row"><span class="k">Demonym</span><span class="v">'+esc(demonym || '&mdash;')+'</span></div>' +
        '<div class="info-row"><span class="k">Languages</span><span class="v">'+joinList(languages)+'</span></div>' +
      '</div>' +

      '<div class="info-block">' +
        '<h3>Government &amp; Names</h3>' +
        '<div class="info-row"><span class="k">Common name</span><span class="v">'+esc(common)+'</span></div>' +
        '<div class="info-row"><span class="k">Official name</span><span class="v">'+esc(official || '&mdash;')+'</span></div>' +
        '<div class="info-row"><span class="k">Native names</span><span class="v">'+(nativeNames.length ? esc(nativeNames.join(' / ')) : '&mdash;')+'</span></div>' +
        '<div class="info-row"><span class="k">Capital</span><span class="v">'+esc(capital || '&mdash;')+'</span></div>' +
        '<div class="info-row"><span class="k">Independent</span><span class="v">'+(c.independent ? 'Yes' : (c.independent === false ? 'No' : '&mdash;'))+'</span></div>' +
        '<div class="info-row" style="font-size:10px;color:var(--text-dim);margin-top:6px;">Note: this dataset does not include full government structure details.</div>' +
      '</div>' +

      '<div class="info-block">' +
        '<h3>Economy Stub</h3>' +
        '<div class="info-row"><span class="k">Currencies</span><span class="v">'+(currencies.length ? esc(currencies.join(' / ')) : '&mdash;')+'</span></div>' +
        '<div class="info-row" style="font-size:10px;color:var(--text-dim);margin-top:6px;">GDP, trade, and sector data are not provided by this source. Consult a dedicated economic dataset for deeper figures.</div>' +
      '</div>' +

      '<div class="info-block">' +
        '<h3>Communications &amp; Transport</h3>' +
        '<div class="info-row"><span class="k">Calling code</span><span class="v">'+esc(idd || '&mdash;')+'</span></div>' +
        '<div class="info-row"><span class="k">Top-level domain</span><span class="v">'+esc(tld || '&mdash;')+'</span></div>' +
        '<div class="info-row"><span class="k">Driving side</span><span class="v">'+esc(driving || '&mdash;')+'</span></div>' +
      '</div>' +

      '<div class="info-block">' +
        '<h3>Neighbors</h3>' +
        (neighbors || '<div style="color:var(--text-dim);font-size:12px;">No land borders.</div>') +
      '</div>' +

    '</div>';

  el.viewRoot.innerHTML = html;

  document.getElementById('fav-btn').addEventListener('click', function(){
    toggleFav(state.currentCode);
    render();
  });
  document.getElementById('print-btn').addEventListener('click', function(){ window.print(); });
  document.getElementById('export-btn').addEventListener('click', function(){
    try{
      var blob = new Blob([JSON.stringify(c, null, 2)], {type:'application/json'});
      var url = URL.createObjectURL(blob);
      var a = document.createElement('a');
      a.href = url;
      a.download = 'korb-factbook-' + (c.cca3 || 'country') + '.json';
      document.body.appendChild(a); a.click(); document.body.removeChild(a);
      setTimeout(function(){URL.revokeObjectURL(url);}, 2000);
    }catch(e){ alert('Export failed: ' + e.message); }
  });
  document.getElementById('compare-this-btn').addEventListener('click', function(){
    state.compareA = state.currentCode;
    state.view = 'compare';
    render();
  });
  document.querySelectorAll('.neighbor-chip').forEach(function(chip){
    chip.addEventListener('click', function(){
      var code = chip.getAttribute('data-code');
      if (code && state.byCode[code]) showCountry(code);
    });
  });
}

/* ---------- favorites view ---------- */
function renderFavs(){
  var codes = Object.keys(state.favs);
  var items = codes
    .map(function(code){ return state.byCode[code]; })
    .filter(function(c){ return !!c; })
    .sort(function(a,b){
      return (a.name && a.name.common || '').localeCompare(b.name && b.name.common || '');
    });

  var body;
  if (!items.length){
    body = '<div class="info-block" style="text-align:center;padding:30px;color:var(--text-dim);">No favorites yet. Open any country profile and tap the star.</div>';
  } else {
    body = '<div class="region-grid">' + items.map(function(c){
      return '<div class="region-tile" data-code="'+esc(c.cca3||'')+'">' +
               '<div class="rn">'+esc(c.flag||'')+' '+esc(c.name && c.name.common || '')+'</div>' +
               '<div class="rc">'+esc(c.region||'')+' &middot; '+fmtNum(c.population)+'</div>' +
             '</div>';
    }).join('') + '</div>';
  }

  el.viewRoot.innerHTML =
    '<div class="section-title">Favorites</div>' + body;

  document.querySelectorAll('.region-tile[data-code]').forEach(function(t){
    t.addEventListener('click', function(){
      showCountry(t.getAttribute('data-code'));
    });
  });
}

/* ---------- compare view ---------- */
function renderCompare(){
  var opts = '<option value="">-- select --</option>' + state.countries.map(function(c){
    return '<option value="'+esc(c.cca3||'')+'">'+esc((c.flag||'')+' '+(c.name && c.name.common || ''))+'</option>';
  }).join('');

  var a = state.compareA ? state.byCode[state.compareA] : null;
  var b = state.compareB ? state.byCode[state.compareB] : null;

  var body = '';
  if (a && b){
    var rows = [
      ['Population', a.population || 0, b.population || 0, function(v){return fmtNum(v);}, 'bigger'],
      ['Area (km²)', a.area || 0, b.area || 0, function(v){return fmtNum(Math.round(v));}, 'bigger'],
      ['Density (/km²)',
         (a.area ? (a.population||0)/a.area : 0),
         (b.area ? (b.population||0)/b.area : 0),
         function(v){return v ? (Math.round(v*10)/10).toLocaleString('en-US') : '&mdash;';}, 'bigger'],
      ['Languages', (a.languages ? Object.keys(a.languages).length : 0), (b.languages ? Object.keys(b.languages).length : 0), function(v){return v;}, 'bigger'],
      ['Neighbors', (a.borders||[]).length, (b.borders||[]).length, function(v){return v;}, 'bigger'],
      ['Time zones', (a.timezones||[]).length, (b.timezones||[]).length, function(v){return v;}, 'bigger']
    ];

    var rowsHtml = rows.map(function(r){
      var label=r[0], av=r[1], bv=r[2], fmt=r[3];
      var aCls='', bCls='';
      if (av > bv){ aCls='bigger'; bCls='smaller'; }
      else if (bv > av){ bCls='bigger'; aCls='smaller'; }
      return '<div class="cmp-val left '+aCls+'">'+fmt(av)+'</div>' +
             '<div class="cmp-label">'+esc(label)+'</div>' +
             '<div class="cmp-val right '+bCls+'">'+fmt(bv)+'</div>';
    }).join('');

    body =
      '<div class="compare-grid">' +
        '<div class="compare-head" style="text-align:right;">'+esc((a.flag||'')+' '+(a.name && a.name.common || ''))+'</div>' +
        '<div class="compare-head" style="text-align:center;color:var(--text-dim);">VS</div>' +
        '<div class="compare-head" style="text-align:left;">'+esc((b.flag||'')+' '+(b.name && b.name.common || ''))+'</div>' +
        rowsHtml +
      '</div>';
  } else {
    body = '<div class="info-block" style="text-align:center;color:var(--text-dim);">Pick two countries above to compare.</div>';
  }

  el.viewRoot.innerHTML =
    '<div class="section-title">Compare Countries</div>' +
    '<div class="compare-pick">' +
      '<select id="cmp-a">'+opts+'</select>' +
      '<select id="cmp-b">'+opts+'</select>' +
    '</div>' + body;

  var selA = document.getElementById('cmp-a');
  var selB = document.getElementById('cmp-b');
  if (state.compareA) selA.value = state.compareA;
  if (state.compareB) selB.value = state.compareB;
  selA.addEventListener('change', function(){ state.compareA = selA.value || null; render(); });
  selB.addEventListener('change', function(){ state.compareB = selB.value || null; render(); });
}

/* ---------- event wiring ---------- */
el.searchInput.addEventListener('input', function(){
  state.search = el.searchInput.value || '';
  renderCountryList();
});
el.regionFilter.addEventListener('change', function(){
  state.filterRegion = el.regionFilter.value || '';
  renderCountryList();
});
el.countryList.addEventListener('click', function(e){
  var li = e.target.closest && e.target.closest('li');
  if (!li) return;
  var code = li.getAttribute('data-code');
  if (code) showCountry(code);
});
el.btnHome.addEventListener('click', function(){
  state.view = 'home'; state.currentCode = null; render();
});
el.btnRandom.addEventListener('click', function(){
  if (!state.countries.length) return;
  var r = state.countries[Math.floor(Math.random() * state.countries.length)];
  showCountry(r.cca3 || r.cca2);
});
el.btnCompare.addEventListener('click', function(){
  state.view = 'compare'; render();
});
el.btnFavs.addEventListener('click', function(){
  state.view = 'favs'; render();
});
el.sidebarToggle.addEventListener('click', function(){
  el.sidebar.classList.toggle('collapsed');
  el.sidebarChev.innerHTML = el.sidebar.classList.contains('collapsed') ? '&#9654;' : '&#9660;';
});

// Start collapsed on mobile
if (window.matchMedia && window.matchMedia('(max-width: 820px)').matches){
  el.sidebar.classList.add('collapsed');
  el.sidebarChev.innerHTML = '&#9654;';
}

/* ---------- boot ---------- */
loadData(false);

})();
</script>
</body>
</html>
