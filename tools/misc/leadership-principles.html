<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0,user-scalable=no, viewport-fit=cover">
<meta name="description" content="Leadership Forge — Covey × Carnegie | Korb Engineering — a free, browser-based productivity tool from Korb Engineering. No signup, no downloads, works on mobile.">
<title>Leadership Forge — Covey × Carnegie | Korb Engineering</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
/* ============================================
   Leadership Forge — VFD Dark Theme
   ============================================ */
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#050a0f;--surface:#0a1018;--surface2:#0f1620;--border:#1a2535;
  --cyan:#00d4ff;--orange:#ff6600;--green:#10b981;--red:#ef4444;
  --text:#e2e8f0;--dim:rgba(226,232,240,0.4);--dim2:rgba(226,232,240,0.2);
  --font:'JetBrains Mono',monospace;
  --radius:6px;--radius-lg:10px;
}
html{font-size:14px;-webkit-text-size-adjust:100%}
body{
  font-family:var(--font);background:var(--bg);color:var(--text);
  min-height:100vh;line-height:1.6;-webkit-font-smoothing:antialiased;
  overflow-x:hidden;
}
a{color:var(--cyan);text-decoration:none}
button,input,textarea,select{font-family:var(--font);font-size:inherit;color:var(--text);background:transparent;border:none;outline:none}
button{cursor:pointer;touch-action:manipulation}
::-webkit-scrollbar{width:6px;height:6px}
::-webkit-scrollbar-track{background:var(--surface)}
::-webkit-scrollbar-thumb{background:var(--border);border-radius:3px}
::selection{background:var(--cyan);color:var(--bg)}
input::placeholder,textarea::placeholder{color:var(--dim)}

/* --- Header --- */
.app-header{
  position:sticky;top:0;z-index:100;
  background:rgba(5,10,15,0.92);backdrop-filter:blur(12px);
  border-bottom:1px solid var(--border);padding:12px 16px;
}
.header-inner{max-width:960px;margin:0 auto;display:flex;align-items:center;gap:12px}
.header-title{font-size:0.85rem;font-weight:600;color:var(--cyan);letter-spacing:0.06em;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.header-sub{font-size:0.65rem;color:var(--dim);letter-spacing:0.08em;margin-left:auto;white-space:nowrap}
.header-icon{width:20px;height:20px;color:var(--orange);flex-shrink:0}

/* --- Tab Navigation --- */
.tab-bar{
  position:sticky;top:49px;z-index:90;
  background:rgba(10,16,24,0.95);backdrop-filter:blur(8px);
  border-bottom:1px solid var(--border);
  overflow-x:auto;-webkit-overflow-scrolling:touch;
  scrollbar-width:none;
}
.tab-bar::-webkit-scrollbar{display:none}
.tab-list{display:flex;min-width:max-content;padding:0 8px}
.tab-btn{
  padding:10px 14px;font-size:0.7rem;font-weight:500;
  color:var(--dim);letter-spacing:0.04em;white-space:nowrap;
  border-bottom:2px solid transparent;transition:all 0.2s;
  min-height:48px;display:flex;align-items:center;touch-action:manipulation;
}
.tab-btn:hover{color:var(--text)}
.tab-btn.active{color:var(--cyan);border-bottom-color:var(--cyan)}

/* --- Main Content --- */
.main{max-width:960px;margin:0 auto;padding:16px}
.tab-panel{display:none;animation:fadeIn 0.25s ease}
.tab-panel.active{display:block}
@keyframes fadeIn{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:translateY(0)}}

/* --- Cards --- */
.card{
  background:var(--surface);border:1px solid var(--border);
  border-radius:var(--radius-lg);padding:16px;margin-bottom:12px;
  transition:border-color 0.2s;
}
.card:hover{border-color:rgba(0,212,255,0.3)}
.card-header{
  display:flex;align-items:center;gap:10px;cursor:pointer;
  min-height:48px;touch-action:manipulation;
}
.card-num{
  width:28px;height:28px;border-radius:50%;
  background:rgba(0,212,255,0.1);color:var(--cyan);
  display:flex;align-items:center;justify-content:center;
  font-size:0.75rem;font-weight:700;flex-shrink:0;
}
.card-title{font-size:0.85rem;font-weight:600;flex:1}
.card-chevron{
  color:var(--dim);transition:transform 0.25s;font-size:1rem;flex-shrink:0;
}
.card.open .card-chevron{transform:rotate(180deg)}
.card-body{
  max-height:0;overflow:hidden;transition:max-height 0.35s ease;
}
.card.open .card-body{max-height:5000px}
.card-content{padding:12px 0 4px;font-size:0.8rem;line-height:1.7;color:rgba(226,232,240,0.85)}

/* --- Section headers --- */
.section-title{
  font-size:0.95rem;font-weight:700;color:var(--cyan);
  margin:20px 0 12px;padding-bottom:8px;
  border-bottom:1px solid var(--border);letter-spacing:0.04em;
}
.section-subtitle{
  font-size:0.75rem;color:var(--orange);font-weight:600;
  margin:16px 0 8px;letter-spacing:0.06em;text-transform:uppercase;
}

/* --- Buttons --- */
.btn{
  display:inline-flex;align-items:center;justify-content:center;gap:6px;
  padding:10px 18px;border-radius:var(--radius);font-size:0.75rem;
  font-weight:600;letter-spacing:0.04em;min-height:48px;
  touch-action:manipulation;transition:all 0.2s;
}
.btn-cyan{background:rgba(0,212,255,0.12);color:var(--cyan);border:1px solid rgba(0,212,255,0.25)}
.btn-cyan:hover{background:rgba(0,212,255,0.2)}
.btn-orange{background:rgba(255,102,0,0.12);color:var(--orange);border:1px solid rgba(255,102,0,0.25)}
.btn-orange:hover{background:rgba(255,102,0,0.2)}
.btn-green{background:rgba(16,185,129,0.12);color:var(--green);border:1px solid rgba(16,185,129,0.25)}
.btn-green:hover{background:rgba(16,185,129,0.2)}
.btn-red{background:rgba(239,68,68,0.12);color:var(--red);border:1px solid rgba(239,68,68,0.25)}
.btn-red:hover{background:rgba(239,68,68,0.2)}
.btn-sm{padding:6px 12px;min-height:36px;font-size:0.7rem}
.btn-group{display:flex;flex-wrap:wrap;gap:8px;margin:12px 0}

/* --- Form elements --- */
.form-group{margin-bottom:14px}
.form-label{display:block;font-size:0.7rem;color:var(--dim);margin-bottom:6px;letter-spacing:0.06em;text-transform:uppercase;font-weight:600}
.form-input,.form-textarea,.form-select{
  width:100%;padding:10px 12px;background:var(--surface2);
  border:1px solid var(--border);border-radius:var(--radius);
  font-size:0.8rem;min-height:48px;transition:border-color 0.2s;
}
.form-input:focus,.form-textarea:focus,.form-select:focus{border-color:var(--cyan)}
.form-textarea{min-height:100px;resize:vertical;line-height:1.6}
select.form-select{appearance:none;cursor:pointer}

/* --- Tags/Chips --- */
.chip{
  display:inline-flex;align-items:center;padding:4px 10px;
  border-radius:20px;font-size:0.65rem;font-weight:600;
  letter-spacing:0.04em;cursor:pointer;transition:all 0.2s;
  min-height:32px;touch-action:manipulation;
}
.chip-cyan{background:rgba(0,212,255,0.1);color:var(--cyan);border:1px solid rgba(0,212,255,0.2)}
.chip-cyan.selected{background:rgba(0,212,255,0.25);border-color:var(--cyan)}
.chip-orange{background:rgba(255,102,0,0.1);color:var(--orange);border:1px solid rgba(255,102,0,0.2)}
.chip-orange.selected{background:rgba(255,102,0,0.25);border-color:var(--orange)}
.chip-green{background:rgba(16,185,129,0.1);color:var(--green);border:1px solid rgba(16,185,129,0.2)}

/* --- Rating stars --- */
.rating{display:flex;gap:4px;margin:8px 0}
.rating-star{
  width:36px;height:36px;display:flex;align-items:center;justify-content:center;
  font-size:1.2rem;cursor:pointer;border-radius:var(--radius);
  transition:all 0.15s;touch-action:manipulation;color:var(--dim);
}
.rating-star:hover,.rating-star.active{color:var(--orange)}
.rating-10{display:flex;gap:2px;flex-wrap:wrap;margin:8px 0}
.rating-10 .r10-btn{
  width:32px;height:32px;border-radius:var(--radius);
  border:1px solid var(--border);display:flex;align-items:center;
  justify-content:center;font-size:0.7rem;cursor:pointer;
  transition:all 0.15s;touch-action:manipulation;
}
.rating-10 .r10-btn.active{background:var(--cyan);color:var(--bg);border-color:var(--cyan)}

/* --- Priority Matrix --- */
.matrix-grid{
  display:grid;grid-template-columns:1fr 1fr;gap:8px;margin:12px 0;
}
.matrix-quad{
  border-radius:var(--radius-lg);padding:12px;min-height:180px;
  border:1px solid var(--border);position:relative;
}
.matrix-quad.q1{background:rgba(239,68,68,0.06);border-color:rgba(239,68,68,0.2)}
.matrix-quad.q2{background:rgba(16,185,129,0.06);border-color:rgba(16,185,129,0.2)}
.matrix-quad.q3{background:rgba(255,102,0,0.06);border-color:rgba(255,102,0,0.2)}
.matrix-quad.q4{background:rgba(226,232,240,0.03);border-color:var(--border)}
.quad-label{font-size:0.65rem;font-weight:700;letter-spacing:0.08em;text-transform:uppercase;margin-bottom:8px}
.q1 .quad-label{color:var(--red)}
.q2 .quad-label{color:var(--green)}
.q3 .quad-label{color:var(--orange)}
.q4 .quad-label{color:var(--dim)}
.quad-desc{font-size:0.6rem;color:var(--dim);margin-bottom:8px}
.quad-tasks{list-style:none}
.quad-task{
  display:flex;align-items:center;gap:6px;padding:4px 0;
  font-size:0.75rem;border-bottom:1px solid rgba(226,232,240,0.05);
}
.quad-task input[type="checkbox"]{width:16px;height:16px;accent-color:var(--cyan)}
.quad-task-text{flex:1}
.quad-task-del{color:var(--dim);cursor:pointer;font-size:0.65rem;padding:4px;touch-action:manipulation}
.quad-task-del:hover{color:var(--red)}
.quad-add{
  display:flex;gap:6px;margin-top:8px;
}
.quad-add input{
  flex:1;padding:6px 8px;background:rgba(226,232,240,0.05);
  border:1px solid var(--border);border-radius:var(--radius);font-size:0.7rem;
  min-height:36px;
}
.quad-add button{
  min-width:36px;min-height:36px;border-radius:var(--radius);
  background:rgba(0,212,255,0.1);color:var(--cyan);font-weight:700;
  border:1px solid rgba(0,212,255,0.2);
}
.quad-pct{
  position:absolute;top:8px;right:10px;font-size:0.6rem;
  font-weight:700;color:var(--dim);
}

/* --- Streak / Calendar --- */
.streak-display{
  display:flex;align-items:center;gap:10px;
  padding:12px 16px;background:var(--surface);
  border:1px solid var(--border);border-radius:var(--radius-lg);margin:12px 0;
}
.streak-num{font-size:1.8rem;font-weight:700;color:var(--orange)}
.streak-label{font-size:0.7rem;color:var(--dim)}
.streak-fire{font-size:1.4rem}
.mini-cal{display:grid;grid-template-columns:repeat(7,1fr);gap:3px;margin:12px 0}
.mini-cal-day{
  width:100%;aspect-ratio:1;border-radius:3px;
  background:rgba(226,232,240,0.04);position:relative;
}
.mini-cal-day.done{background:rgba(16,185,129,0.3)}
.mini-cal-day.today{border:1px solid var(--cyan)}

/* --- Radar Chart (canvas) --- */
.radar-wrap{
  display:flex;justify-content:center;padding:16px 0;
}
.radar-wrap canvas{max-width:320px;width:100%;height:auto}

/* --- Quick Reference Cards --- */
.qr-cards{display:flex;gap:12px;overflow-x:auto;padding:8px 0;-webkit-overflow-scrolling:touch;scroll-snap-type:x mandatory}
.qr-cards::-webkit-scrollbar{display:none}
.qr-card{
  min-width:280px;max-width:320px;flex-shrink:0;
  background:var(--surface);border:1px solid var(--border);
  border-radius:var(--radius-lg);padding:16px;scroll-snap-align:start;
}
.qr-card-title{font-size:0.8rem;font-weight:700;color:var(--orange);margin-bottom:10px}
.qr-card ul{list-style:none;padding:0}
.qr-card li{
  font-size:0.73rem;padding:5px 0;border-bottom:1px solid rgba(226,232,240,0.05);
  line-height:1.5;color:rgba(226,232,240,0.85);
}
.qr-card li::before{content:'>';color:var(--cyan);margin-right:8px;font-weight:700}

/* --- Journal --- */
.journal-entry{
  background:var(--surface);border:1px solid var(--border);
  border-radius:var(--radius-lg);padding:14px;margin-bottom:10px;
}
.journal-meta{display:flex;align-items:center;gap:8px;margin-bottom:8px;flex-wrap:wrap}
.journal-date{font-size:0.65rem;color:var(--dim);letter-spacing:0.06em}
.journal-type{font-size:0.6rem;padding:2px 8px;border-radius:10px;font-weight:600}
.journal-type.win{background:rgba(16,185,129,0.15);color:var(--green)}
.journal-type.lesson{background:rgba(255,102,0,0.15);color:var(--orange)}
.journal-text{font-size:0.78rem;line-height:1.6;color:rgba(226,232,240,0.85)}
.journal-tags{display:flex;flex-wrap:wrap;gap:4px;margin-top:8px}

/* --- Mission Builder --- */
.wizard-step{display:none}
.wizard-step.active{display:block;animation:fadeIn 0.25s ease}
.wizard-progress{
  display:flex;gap:4px;margin:16px 0;
}
.wizard-dot{
  height:4px;flex:1;border-radius:2px;background:var(--border);
  transition:background 0.3s;
}
.wizard-dot.done{background:var(--cyan)}
.wizard-dot.current{background:var(--orange)}
.value-grid{display:flex;flex-wrap:wrap;gap:6px;margin:10px 0}
.value-chip{
  padding:6px 12px;border-radius:20px;font-size:0.7rem;
  background:var(--surface2);border:1px solid var(--border);
  cursor:pointer;transition:all 0.15s;touch-action:manipulation;
}
.value-chip.selected{background:rgba(0,212,255,0.15);border-color:var(--cyan);color:var(--cyan)}

/* --- Conversation Prep --- */
.conv-template{
  background:var(--surface2);border:1px solid var(--border);
  border-radius:var(--radius-lg);padding:14px;margin:10px 0;
}
.conv-field{margin-bottom:12px}
.conv-field-label{font-size:0.7rem;color:var(--cyan);font-weight:600;margin-bottom:4px}

/* --- Trust Bank --- */
.trust-cols{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin:12px 0}
@media(max-width:500px){.trust-cols{grid-template-columns:1fr}}
.trust-col{padding:14px;border-radius:var(--radius-lg);border:1px solid var(--border)}
.trust-col.deposits{background:rgba(16,185,129,0.04);border-color:rgba(16,185,129,0.2)}
.trust-col.withdrawals{background:rgba(239,68,68,0.04);border-color:rgba(239,68,68,0.2)}
.trust-col h4{font-size:0.75rem;font-weight:700;margin-bottom:8px}
.trust-col.deposits h4{color:var(--green)}
.trust-col.withdrawals h4{color:var(--red)}
.trust-col li{font-size:0.73rem;padding:4px 0;line-height:1.5;color:rgba(226,232,240,0.8)}

/* --- Data Management Bar --- */
.data-bar{
  display:flex;flex-wrap:wrap;gap:8px;padding:16px;margin:20px 0;
  background:var(--surface);border:1px solid var(--border);border-radius:var(--radius-lg);
}

/* --- Notices --- */
.notice{
  font-size:0.65rem;color:var(--dim);text-align:center;
  padding:20px 16px;line-height:1.6;letter-spacing:0.04em;
}
.notice a{color:var(--cyan)}

/* --- Modal --- */
.modal-overlay{
  position:fixed;inset:0;background:rgba(5,10,15,0.85);
  z-index:200;display:none;align-items:center;justify-content:center;padding:16px;
}
.modal-overlay.open{display:flex}
.modal{
  background:var(--surface);border:1px solid var(--border);
  border-radius:var(--radius-lg);padding:20px;max-width:480px;width:100%;
  max-height:80vh;overflow-y:auto;
}
.modal-title{font-size:0.9rem;font-weight:700;color:var(--cyan);margin-bottom:12px}
.modal-actions{display:flex;gap:8px;justify-content:flex-end;margin-top:16px}

/* --- Celebration --- */
.celebration{
  position:fixed;top:50%;left:50%;transform:translate(-50%,-50%);
  background:var(--surface);border:2px solid var(--orange);
  border-radius:var(--radius-lg);padding:24px;text-align:center;
  z-index:300;animation:popIn 0.3s ease;
}
@keyframes popIn{from{transform:translate(-50%,-50%) scale(0.8);opacity:0}to{transform:translate(-50%,-50%) scale(1);opacity:1}}
.celebration h3{font-size:1rem;color:var(--orange);margin-bottom:8px}
.celebration p{font-size:0.8rem;color:var(--text)}

/* --- Responsive --- */
@media(max-width:640px){
  .matrix-grid{grid-template-columns:1fr}
  .trust-cols{grid-template-columns:1fr}
  .header-sub{display:none}
}
/* --- Tooltip for principle in practice --- */
.tip-box{
  background:rgba(0,212,255,0.06);border-left:3px solid var(--cyan);
  padding:10px 14px;margin:8px 0;border-radius:0 var(--radius) var(--radius) 0;
  font-size:0.75rem;line-height:1.6;
}
.warn-box{
  background:rgba(239,68,68,0.06);border-left:3px solid var(--red);
  padding:10px 14px;margin:8px 0;border-radius:0 var(--radius) var(--radius) 0;
  font-size:0.75rem;line-height:1.6;
}
.challenge-box{
  background:rgba(255,102,0,0.06);border-left:3px solid var(--orange);
  padding:10px 14px;margin:8px 0;border-radius:0 var(--radius) var(--radius) 0;
  font-size:0.75rem;line-height:1.6;
}
.practice-list{list-style:none;padding:0}
.practice-list li{padding:5px 0;font-size:0.75rem;line-height:1.6;border-bottom:1px solid rgba(226,232,240,0.05)}
.practice-list li::before{content:'>';color:var(--green);margin-right:8px;font-weight:700}
.notes-area{
  width:100%;min-height:60px;padding:8px 10px;margin-top:8px;
  background:var(--surface2);border:1px solid var(--border);
  border-radius:var(--radius);font-size:0.75rem;resize:vertical;
}
.saved-indicator{font-size:0.6rem;color:var(--green);margin-left:8px;opacity:0;transition:opacity 0.3s}
.saved-indicator.show{opacity:1}
</style>
</head>
<body>

<!-- Header -->
<header class="app-header">
  <div class="header-inner">
    <svg class="header-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
      <path d="M12 2L2 7l10 5 10-5-10-5z"/><path d="M2 17l10 5 10-5"/><path d="M2 12l10 5 10-5"/>
    </svg>
    <span class="header-title">Leadership Forge</span>
    <span class="header-sub">Covey x Carnegie</span>
  </div>
</header>

<!-- Tab Navigation -->
<nav class="tab-bar" id="tabBar">
  <div class="tab-list" id="tabList">
    <button class="tab-btn active" data-tab="dashboard">Dashboard</button>
    <button class="tab-btn" data-tab="covey">7 Habits</button>
    <button class="tab-btn" data-tab="carnegie">Carnegie</button>
    <button class="tab-btn" data-tab="matrix">Priority Matrix</button>
    <button class="tab-btn" data-tab="mission">Mission Builder</button>
    <button class="tab-btn" data-tab="conversations">Conversations</button>
    <button class="tab-btn" data-tab="journal">Journal</button>
    <button class="tab-btn" data-tab="team">Team Dev</button>
    <button class="tab-btn" data-tab="quickref">Quick Ref</button>
    <button class="tab-btn" data-tab="progress">Progress</button>
  </div>
</nav>

<!-- Main Content -->
<div class="main" id="mainContent"></div>

<!-- Modal -->
<div class="modal-overlay" id="modalOverlay">
  <div class="modal" id="modalContent"></div>
</div>

<!-- Attribution -->
<footer class="notice">
  Based on Stephen R. Covey's "The 7 Habits of Highly Effective People" and Dale Carnegie's "How to Win Friends and Influence People"<br>
  All explanations are original practical summaries — no copyrighted text reproduced.<br><br>
  <span style="color:var(--cyan)">Korb Engineering</span> &middot; Leadership Forge v1.0
</footer>

<script>
/* ============================================
   Leadership Forge — Application Logic
   ============================================ */

// ---- Data Store ----
const STORE_KEY = 'leadership_forge_data';
function loadData() {
  try { return JSON.parse(localStorage.getItem(STORE_KEY)) || getDefaultData(); }
  catch(e) { return getDefaultData(); }
}
function saveData(d) { localStorage.setItem(STORE_KEY, JSON.stringify(d)); }
function getDefaultData() {
  return {
    dailyIntents: {},       // { 'YYYY-MM-DD': { text, principles:[], rating:0, reflection:'', completed:false } }
    habitRatings: {},       // { habitId: number 1-10 }
    carnegieNotes: {},      // { principleId: string }
    matrixTasks: { q1:[], q2:[], q3:[], q4:[] },
    missionVersions: [],    // [{ date, values:[], roles:[], statement }]
    missionDraft: { values:[], roles:[], goals:{}, statement:'' },
    conversations: [],      // [{ id, date, scenario, situation, perspective, winwin, opening, points, close }]
    journalEntries: [],     // [{ id, date, type:'win'|'lesson', text, tags:[] }]
    assessmentHistory: [],  // [{ date, ratings:{} }]
    streakDays: [],         // ['YYYY-MM-DD', ...]
  };
}
let DATA = loadData();

// ---- Combined Principles for Daily Rotation ----
const ALL_PRINCIPLES = [

// ---- Today's date key ----
function todayKey() {
  const d = new Date(); return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;
}
function dayOfYear() {
  const now = new Date(); const start = new Date(now.getFullYear(),0,0);
  return Math.floor((now - start) / 86400000);
}
function getTodayPrinciple() { return ALL_PRINCIPLES[dayOfYear() % ALL_PRINCIPLES.length]; }

// ---- Streak Calculator ----
function calcStreak() {
  if (!DATA.streakDays || DATA.streakDays.length === 0) return 0;
  const sorted = [...DATA.streakDays].sort().reverse();
  const today = todayKey();
  let streak = 0;
  let checkDate = new Date();
  // If today isn't done yet, start checking from yesterday
  if (sorted[0] !== today) {
    checkDate.setDate(checkDate.getDate() - 1);
  }
  for (let i = 0; i < 365; i++) {
    const key = `${checkDate.getFullYear()}-${String(checkDate.getMonth()+1).padStart(2,'0')}-${String(checkDate.getDate()).padStart(2,'0')}`;
    if (sorted.includes(key)) { streak++; checkDate.setDate(checkDate.getDate() - 1); }
    else break;
  }
  return streak;
}

  panel.className = 'tab-panel active';
  panel.innerHTML = (renderers[activeTab] || renderers.dashboard)();

  if (hooks[activeTab]) hooks[activeTab]();

    <div class="card">

      <div class="form-group">

function initDashboard() {
  const today = todayKey();
  // Principle chips
  document.querySelectorAll('#dashPrincipleChips .chip').forEach(chip => {
    chip.addEventListener('click', () => chip.classList.toggle('selected'));
  });
  // Save intent
  document.getElementById('dashSaveIntent').addEventListener('click', () => {
    const intent = DATA.dailyIntents[today] || {};
    intent.text = document.getElementById('dashIntent').value;
    intent.principles = [...document.querySelectorAll('#dashPrincipleChips .chip.selected')].map(c => c.dataset.pid);
    DATA.dailyIntents[today] = intent;
    saveData(DATA);
    showToast('Morning intent saved');
  });
  // Rating
  document.querySelectorAll('#dashRating .rating-star').forEach(star => {
    star.addEventListener('click', () => {
      const val = parseInt(star.dataset.val);
      document.querySelectorAll('#dashRating .rating-star').forEach((s,i) => {
        s.classList.toggle('active', i < val);
      });
      const intent = DATA.dailyIntents[today] || {};
      intent.rating = val;
      DATA.dailyIntents[today] = intent;
      saveData(DATA);
    });
  });
  // Save reflection
  document.getElementById('dashSaveReflection').addEventListener('click', () => {
    const intent = DATA.dailyIntents[today] || {};
    intent.reflection = document.getElementById('dashReflection').value;
    intent.completed = true;
    DATA.dailyIntents[today] = intent;
    if (!DATA.streakDays.includes(today)) DATA.streakDays.push(today);
    saveData(DATA);
    showToast('Reflection saved');
    checkMilestones();
  });
  // Data management
  document.getElementById('exportBtn').addEventListener('click', exportData);
  document.getElementById('importBtn').addEventListener('click', () => document.getElementById('importFile').click());
  document.getElementById('importFile').addEventListener('change', importData);
  document.getElementById('clearBtn').addEventListener('click', clearData);
}

function renderCarnegie() {
  let html = `<div class="section-title">Dale Carnegie's Human Relations Principles</div>
  <p style="font-size:0.75rem;color:var(--dim);margin-bottom:16px">Based on Dale Carnegie's "How to Win Friends and Influence People." These principles are not tricks — they are a genuine approach to building trust and influence through respect.</p>`;

  CARNEGIE_SECTIONS.forEach(section => {
    html += `<div class="section-subtitle" style="font-size:0.8rem;margin-top:24px">${section.title}</div>`;
    section.principles.forEach(p => {
      const notes = DATA.carnegieNotes[p.id] || '';
      html += `
      <div class="card" id="carn-${p.id}">
        <div class="card-header" data-toggle="carn-${p.id}">
          <span class="card-title" style="font-size:0.8rem">${p.name}</span>
          <span class="card-chevron">&#9662;</span>
        </div>
        <div class="card-body">
          <div class="card-content">
            <p style="margin-bottom:10px">${p.explanation}</p>
            <div class="tip-box"><strong style="color:var(--cyan)">Try This:</strong> ${p.tryThis}</div>
            <div class="challenge-box"><strong style="color:var(--orange)">In the Field:</strong> ${p.inTheField}</div>
            <div style="margin-top:12px">
              <label class="form-label">Personal Notes <span class="saved-indicator" id="saved-${p.id}">Saved</span></label>
              <textarea class="notes-area" data-note-id="${p.id}" placeholder="Your notes on applying this principle...">${notes}</textarea>
            </div>
          </div>
        </div>
      </div>`;
    });
  });

  return html;
}

function initCarnegie() {
  document.querySelectorAll('[data-toggle]').forEach(header => {
    header.addEventListener('click', () => header.closest('.card').classList.toggle('open'));
  });
  document.querySelectorAll('.notes-area[data-note-id]').forEach(area => {
    let timer;
    area.addEventListener('input', () => {
      clearTimeout(timer);
      timer = setTimeout(() => {
        DATA.carnegieNotes[area.dataset.noteId] = area.value;
        saveData(DATA);
        const indicator = document.getElementById('saved-' + area.dataset.noteId);
        if (indicator) { indicator.classList.add('show'); setTimeout(() => indicator.classList.remove('show'), 1500); }
      }, 500);
    });
  });
}

function renderMatrix() {
  const tasks = DATA.matrixTasks;
  const total = tasks.q1.length + tasks.q2.length + tasks.q3.length + tasks.q4.length;

  function pct(q) { return total > 0 ? Math.round((tasks[q].length / total) * 100) + '%' : '0%'; }

  function renderQuadTasks(q) {
    return tasks[q].map((t, i) => `
      <div class="quad-task">
        <input type="checkbox" ${t.done ? 'checked' : ''} data-q="${q}" data-i="${i}" class="matrix-check">
        <span class="quad-task-text" style="${t.done ? 'text-decoration:line-through;opacity:0.5' : ''}">${escHtml(t.text)}</span>
        <span class="quad-task-del" data-q="${q}" data-i="${i}" title="Remove">&#10005;</span>
      </div>
    `).join('');
  }

  return `
    <div class="section-title">Priority Matrix — Time Management Quadrants</div>
    <div class="tip-box" style="margin-bottom:16px"><strong style="color:var(--green)">The goal is to live in Q2.</strong> Quadrant 2 is where planning, prevention, relationship-building, and professional development happen. It is the quadrant of effectiveness.</div>

    <div class="matrix-grid">
      <div class="matrix-quad q1">
        <div class="quad-label">Q1: Urgent + Important</div>
        <div class="quad-desc">Crises, deadlines, emergencies — handle these, but work to prevent them</div>
        <span class="quad-pct">${pct('q1')}</span>
        <div class="quad-tasks">${renderQuadTasks('q1')}</div>
        <div class="quad-add">
          <input type="text" placeholder="Add task..." id="addQ1" class="form-input" style="min-height:36px;padding:6px 8px">
          <button onclick="addMatrixTask('q1')" class="btn btn-sm btn-red">+</button>
        </div>
      </div>
      <div class="matrix-quad q2">
        <div class="quad-label">Q2: Not Urgent + Important</div>
        <div class="quad-desc">Planning, growth, prevention — this is where you want to spend your time</div>
        <span class="quad-pct">${pct('q2')}</span>
        <div class="quad-tasks">${renderQuadTasks('q2')}</div>
        <div class="quad-add">
          <input type="text" placeholder="Add task..." id="addQ2" class="form-input" style="min-height:36px;padding:6px 8px">
          <button onclick="addMatrixTask('q2')" class="btn btn-sm btn-green">+</button>
        </div>
      </div>
      <div class="matrix-quad q3">
        <div class="quad-label">Q3: Urgent + Not Important</div>
        <div class="quad-desc">Interruptions, some meetings — delegate or decline these</div>
        <span class="quad-pct">${pct('q3')}</span>
        <div class="quad-tasks">${renderQuadTasks('q3')}</div>
        <div class="quad-add">
          <input type="text" placeholder="Add task..." id="addQ3" class="form-input" style="min-height:36px;padding:6px 8px">
          <button onclick="addMatrixTask('q3')" class="btn btn-sm btn-orange">+</button>
        </div>
      </div>
      <div class="matrix-quad q4">
        <div class="quad-label">Q4: Not Urgent + Not Important</div>
        <div class="quad-desc">Time wasters — minimize or eliminate these</div>
        <span class="quad-pct">${pct('q4')}</span>
        <div class="quad-tasks">${renderQuadTasks('q4')}</div>
        <div class="quad-add">
          <input type="text" placeholder="Add task..." id="addQ4" class="form-input" style="min-height:36px;padding:6px 8px">
          <button onclick="addMatrixTask('q4')" class="btn btn-sm btn-cyan">+</button>
        </div>
      </div>
    </div>

    <div class="btn-group">
      <button class="btn btn-sm btn-orange" onclick="archiveCompleted()">Archive Completed</button>
      <button class="btn btn-sm btn-red" onclick="clearMatrix()">Clear All</button>
    </div>

    <div class="card" style="margin-top:16px">
      <div class="card-header" style="cursor:default">
        <span class="card-title">Weekly Review Prompt</span>
      </div>
      <div class="card-content" style="padding:8px 0">
        <ul class="practice-list">
          <li>How much of my week was spent in Q2 vs Q1?</li>
          <li>What Q1 crises could have been prevented with Q2 planning?</li>
          <li>What Q3 activities can I delegate or decline next week?</li>
          <li>What Q4 time-wasters am I tolerating?</li>
          <li>What is my single most important Q2 activity for next week?</li>
        </ul>
      </div>
    </div>
  `;
}

function addMatrixTask(q) {
  const input = document.getElementById('add' + q.toUpperCase());
  if (!input || !input.value.trim()) return;
  DATA.matrixTasks[q].push({ text: input.value.trim(), done: false });
  saveData(DATA);
  renderTab();
}

function initMatrix() {
  // Enter key on inputs
  ['q1','q2','q3','q4'].forEach(q => {
    const input = document.getElementById('add' + q.toUpperCase());
    if (input) input.addEventListener('keydown', e => { if (e.key === 'Enter') addMatrixTask(q); });
  });
  // Checkboxes
  document.querySelectorAll('.matrix-check').forEach(cb => {
    cb.addEventListener('change', () => {
      const q = cb.dataset.q, i = parseInt(cb.dataset.i);
      DATA.matrixTasks[q][i].done = cb.checked;
      saveData(DATA);
      renderTab();
    });
  });
  // Delete buttons
  document.querySelectorAll('.quad-task-del').forEach(btn => {
    btn.addEventListener('click', () => {
      const q = btn.dataset.q, i = parseInt(btn.dataset.i);
      DATA.matrixTasks[q].splice(i, 1);
      saveData(DATA);
      renderTab();
    });
  });
}

window.addMatrixTask = addMatrixTask;
window.archiveCompleted = function() {
  ['q1','q2','q3','q4'].forEach(q => {
    DATA.matrixTasks[q] = DATA.matrixTasks[q].filter(t => !t.done);
  });
  saveData(DATA);
  renderTab();
};
window.clearMatrix = function() {
  if (!confirm('Clear all matrix tasks?')) return;
  DATA.matrixTasks = { q1:[], q2:[], q3:[], q4:[] };
  saveData(DATA);
  renderTab();
};

function initMission() {
  const draft = DATA.missionDraft;

  // Value chips
  document.querySelectorAll('.value-chip').forEach(chip => {
    chip.addEventListener('click', () => {
      chip.classList.toggle('selected');
      draft.values = [...document.querySelectorAll('.value-chip.selected')].map(c => c.dataset.val);
      DATA.missionDraft = draft;
      saveData(DATA);
    });
  });

  // Custom value
  const addCustomBtn = document.getElementById('addCustomValue');
  if (addCustomBtn) addCustomBtn.addEventListener('click', () => {
    const input = document.getElementById('customValue');
    if (input && input.value.trim()) {
      if (!draft.values) draft.values = [];
      draft.values.push(input.value.trim());
      DATA.missionDraft = draft;
      saveData(DATA);
      renderTab();
    }
  });

  // Add role
  const addRoleBtn = document.getElementById('addRole');
  if (addRoleBtn) addRoleBtn.addEventListener('click', () => {
    if (!draft.roles) draft.roles = [];
    draft.roles.push('');
    DATA.missionDraft = draft;
    saveData(DATA);
    renderTab();
  });

  // Role inputs
  document.querySelectorAll('.role-input').forEach(input => {
    input.addEventListener('change', () => {
      draft.roles[parseInt(input.dataset.ri)] = input.value;
      DATA.missionDraft = draft;
      saveData(DATA);
    });
  });
  document.querySelectorAll('.role-del').forEach(btn => {
    btn.addEventListener('click', () => {
      draft.roles.splice(parseInt(btn.dataset.ri), 1);
      DATA.missionDraft = draft;
      saveData(DATA);
      renderTab();
    });
  });

  // Goal inputs
  document.querySelectorAll('.goal-input').forEach(input => {
    input.addEventListener('change', () => {
      if (!draft.goals) draft.goals = {};
      draft.goals[input.dataset.role] = input.value;
      DATA.missionDraft = draft;
      saveData(DATA);
    });
  });

  // Mission draft textarea
  const missionTA = document.getElementById('missionDraft');
  if (missionTA) missionTA.addEventListener('input', () => {
    draft.statement = missionTA.value;
    DATA.missionDraft = draft;
    saveData(DATA);
  });

  // Save mission
  const saveBtn = document.getElementById('saveMission');
  if (saveBtn) saveBtn.addEventListener('click', () => {
    if (!draft.statement) { showToast('Write a statement first'); return; }
    if (!DATA.missionVersions) DATA.missionVersions = [];
    DATA.missionVersions.unshift({
      date: new Date().toLocaleDateString('en-US', { year:'numeric', month:'long', day:'numeric', hour:'2-digit', minute:'2-digit' }),
      values: [...(draft.values||[])],
      roles: [...(draft.roles||[])],
      statement: draft.statement
    });
    saveData(DATA);
    showToast('Mission statement saved');
    renderTab();
  });

  // Navigation
  for (let i = 0; i < 5; i++) {
    const nextBtn = document.getElementById('wizNext' + i);
    const prevBtn = document.getElementById('wizPrev' + i);
    if (nextBtn) nextBtn.addEventListener('click', () => { missionStep = i + 1; renderTab(); });
    if (prevBtn) prevBtn.addEventListener('click', () => { missionStep = i - 1; renderTab(); });
  }
}

const CONV_SCENARIOS = [
  { id:'s1', name:'Giving Constructive Feedback', framework:[
    'Start with genuine appreciation for something specific they do well (Carnegie: Begin with praise)',
    'Describe the behavior you observed — not a judgment of the person (Carnegie: Call attention indirectly)',
    'Share your own experience with a similar challenge (Carnegie: Talk about your own mistakes)',
    'Ask questions to understand their perspective (Covey: Seek first to understand)',
    'Collaboratively identify the desired outcome (Covey: Think Win-Win)',
    'Express confidence in their ability to improve (Carnegie: Use encouragement)',
    'Close by reinforcing the positive relationship (Carnegie: Make them happy about the outcome)'
  ]},
  { id:'s2', name:'Disagreeing with a Boss or Client', framework:[
    'Acknowledge their position and the reasoning behind it (Covey: Seek to understand)',
    'Find points of agreement first (Carnegie: Get them saying yes)',
    'Ask questions that surface the potential issues you see (Carnegie: Ask questions, not orders)',
    'Frame your concern in terms of their goals (Carnegie: Talk in terms of their interests)',
    'Present your alternative as a "what if" rather than a contradiction (Carnegie: Let them feel the idea is theirs)',
    'Offer to own the research or analysis needed (Covey: Be proactive)',
    'Accept the final decision gracefully — you expressed your view professionally (Covey: Circle of influence)'
  ]},
  { id:'s3', name:'Handling Conflict Between Team Members', framework:[
    'Meet each person privately first — listen without judgment (Covey: Seek to understand)',
    'Identify the underlying needs, not just the stated positions (Covey: Empathic listening)',
    'Bring them together and establish the shared goal (Covey: Think Win-Win)',
    'Let each person share their perspective fully (Carnegie: Let them talk)',
    'Find common ground and acknowledge each person\'s valid points (Carnegie: Show respect for opinions)',
    'Guide them toward a solution they build together (Carnegie: Let them feel the idea is theirs)',
    'Follow up to ensure the resolution holds (Covey: Begin with the end in mind)'
  ]},
  { id:'s4', name:'Motivating an Underperformer', framework:[
    'Begin with genuine recognition of their strengths and past contributions (Carnegie: Begin with praise)',
    'Share a similar struggle you have experienced (Carnegie: Talk about your own mistakes)',
    'Ask open-ended questions about what is going on (Covey: Seek to understand)',
    'Listen — there may be factors you are not aware of (Carnegie: Be a good listener)',
    'Together, define what success looks like (Covey: Begin with the end in mind)',
    'Give them a reputation to live up to (Carnegie: Give a fine reputation)',
    'Make the improvement path seem achievable (Carnegie: Use encouragement)',
    'Check in regularly and praise every improvement (Carnegie: Praise every improvement)'
  ]},
  { id:'s5', name:'Delivering Bad News', framework:[
    'Prepare thoroughly — know the facts and the plan forward (Covey: Be proactive)',
    'Deliver the news directly and honestly — do not bury it (Covey: Integrity)',
    'Acknowledge the impact on the other person (Carnegie: Be sympathetic)',
    'Take responsibility for your part, if any (Carnegie: Admit mistakes)',
    'Present the path forward and next steps (Covey: Begin with the end in mind)',
    'Ask what support they need (Covey: Seek to understand)',
    'Follow through on every commitment you make in this conversation (Covey: Emotional bank account)'
  ]},
  { id:'s6', name:'Negotiating Terms or Scope', framework:[
    'Start by understanding what the other party truly needs (Covey: Seek to understand)',
    'Establish shared objectives (Carnegie: Get them saying yes)',
    'Present your constraints transparently (Carnegie: Admit limitations honestly)',
    'Frame proposals in terms of their benefit (Carnegie: Talk in terms of their interests)',
    'Look for creative options that expand the pie (Covey: Synergize)',
    'If you cannot find Win-Win, be willing to walk away respectfully (Covey: Win-Win or No Deal)',
    'Document agreements clearly (Covey: Begin with the end in mind)'
  ]},
  { id:'s7', name:'Saying No to a Request', framework:[
    'Acknowledge the request and the person\'s need (Carnegie: Be sympathetic)',
    'Explain your current commitments and priorities (Covey: Put first things first)',
    'Be direct but kind — do not make excuses or over-apologize (Covey: Be proactive)',
    'Offer an alternative if possible (Covey: Think Win-Win)',
    'Reaffirm the relationship (Carnegie: Make them feel important)',
    'Follow through on what you did commit to (Covey: Emotional bank account)'
  ]}
];

function renderJournalEntries(entries) {
  if (entries.length === 0) return '<p style="font-size:0.75rem;color:var(--dim);text-align:center;padding:20px">No journal entries yet. Start recording your leadership journey.</p>';
  return entries.map((e, i) => `
    <div class="journal-entry">
      <div class="journal-meta">
        <span class="journal-date">${e.date}</span>
        <span class="journal-type ${e.type}">${e.type === 'win' ? 'Win' : 'Lesson'}</span>
        <button style="margin-left:auto;color:var(--dim);font-size:0.65rem;padding:4px" onclick="deleteJournal(${i})">&#10005;</button>
      </div>
      <div class="journal-text">${escHtml(e.text)}</div>
      ${(e.tags||[]).length > 0 ? `<div class="journal-tags">${e.tags.map(t => {
        const p = ALL_PRINCIPLES.find(pr => pr.id === t);
        return p ? `<span class="chip ${p.source==='Covey'?'chip-cyan':'chip-orange'}" style="font-size:0.55rem">${p.name}</span>` : '';
      }).join('')}</div>` : ''}
    </div>
  `).join('');
}

function initJournal() {
  let journalType = 'win';
  const winBtn = document.getElementById('typeWin');
  const lessonBtn = document.getElementById('typeLesson');
  winBtn.addEventListener('click', () => { journalType = 'win'; winBtn.style.opacity='1'; lessonBtn.style.opacity='0.5'; });
  lessonBtn.addEventListener('click', () => { journalType = 'lesson'; lessonBtn.style.opacity='1'; winBtn.style.opacity='0.5'; });

  // Tag chips
  document.querySelectorAll('#journalTags .chip').forEach(chip => {
    chip.addEventListener('click', () => chip.classList.toggle('selected'));
  });

  // Save
  document.getElementById('saveJournal').addEventListener('click', () => {
    const text = document.getElementById('journalText').value.trim();
    if (!text) { showToast('Write something first'); return; }
    const tags = [...document.querySelectorAll('#journalTags .chip.selected')].map(c => c.dataset.tag);
    if (!DATA.journalEntries) DATA.journalEntries = [];
    DATA.journalEntries.unshift({
      id: Date.now(),
      date: new Date().toLocaleDateString('en-US', { weekday:'short', month:'short', day:'numeric', year:'numeric', hour:'2-digit', minute:'2-digit' }),
      type: journalType,
      text,
      tags
    });
    saveData(DATA);
    showToast('Journal entry saved');
    renderTab();
  });

  // Search
  const searchInput = document.getElementById('journalSearch');
  if (searchInput) searchInput.addEventListener('input', () => filterJournal());

  // Filter
  document.querySelectorAll('.journal-filter').forEach(btn => {
    btn.addEventListener('click', () => {
      document.querySelectorAll('.journal-filter').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      filterJournal();
    });
  });

  // Export
  document.getElementById('exportJournal').addEventListener('click', () => {
    const entries = DATA.journalEntries || [];
    let text = 'Leadership Journal Export\n' + '='.repeat(40) + '\n\n';
    entries.forEach(e => {
      text += `[${e.type.toUpperCase()}] ${e.date}\n${e.text}\n`;
      if (e.tags && e.tags.length) {
        text += `Tags: ${e.tags.map(t => { const p = ALL_PRINCIPLES.find(pr=>pr.id===t); return p?p.name:t; }).join(', ')}\n`;
      }
      text += '\n---\n\n';
    });
    downloadText('leadership-journal.txt', text);
  });
}

function filterJournal() {
  const query = (document.getElementById('journalSearch')?.value || '').toLowerCase();
  const filterType = document.querySelector('.journal-filter.active')?.dataset.filter || 'all';
  let entries = DATA.journalEntries || [];
  if (filterType !== 'all') entries = entries.filter(e => e.type === filterType);
  if (query) entries = entries.filter(e => e.text.toLowerCase().includes(query));
  document.getElementById('journalList').innerHTML = renderJournalEntries(entries);
}

window.deleteJournal = function(i) {
  if (!confirm('Delete this entry?')) return;
  DATA.journalEntries.splice(i, 1);
  saveData(DATA);
  renderTab();
};

      <div class="trust-col deposits">
        <h4>Deposits (Build Trust)</h4>
        <ul style="list-style:none;padding:0">
          <li><strong style="color:var(--green)">Keep promises.</strong> Even small ones. Especially small ones. If you say you will follow up by Friday, follow up by Friday.</li>
          <li><strong style="color:var(--green)">Show kindness.</strong> Small courtesies and acts of consideration. Remember what matters to people.</li>
          <li><strong style="color:var(--green)">Clarify expectations.</strong> Ambiguity breeds disappointment. Be explicit about what you need and when.</li>
          <li><strong style="color:var(--green)">Show loyalty.</strong> Defend people when they are not in the room. Never talk about team members behind their backs.</li>
          <li><strong style="color:var(--green)">Apologize sincerely.</strong> When you are wrong, say so without qualifiers. "I was wrong, and I am sorry" is complete.</li>
          <li><strong style="color:var(--green)">Give feedback with respect.</strong> Correct privately. Praise publicly. Always preserve dignity.</li>
        </ul>
      </div>
      <div class="trust-col withdrawals">
        <h4>Withdrawals (Erode Trust)</h4>
        <ul style="list-style:none;padding:0">
          <li><strong style="color:var(--red)">Break promises.</strong> Every missed commitment — no matter how small — is a withdrawal.</li>
          <li><strong style="color:var(--red)">Be disrespectful.</strong> Interrupting, dismissing, or talking down to people empties the account fast.</li>
          <li><strong style="color:var(--red)">Leave expectations unclear.</strong> Then blame people for not meeting them.</li>
          <li><strong style="color:var(--red)">Talk behind backs.</strong> If you gossip about others, everyone assumes you gossip about them too.</li>
          <li><strong style="color:var(--red)">Be prideful.</strong> Refusing to admit mistakes or take responsibility.</li>
          <li><strong style="color:var(--red)">Be harsh in corrections.</strong> Public criticism, sarcasm, or anger in feedback.</li>
        </ul>
      </div>
    </div>

    <div class="section-subtitle">Coaching with Carnegie</div>
    <div class="card">
      <div class="card-content" style="max-height:none;padding:12px 0">
        <ul class="practice-list">
          <li><strong style="color:var(--orange)">Give genuine praise for specific behaviors.</strong> Not "great job" — but "The way you organized the pre-construction meeting kept us on track. Your preparation showed." Specific praise reinforces specific behaviors.</li>
          <li><strong style="color:var(--orange)">Make corrections indirectly and with empathy.</strong> "I noticed something in the report that I wanted to discuss" is better than "You made an error." Questions are better than statements: "What would happen if we adjusted this value?"</li>
          <li><strong style="color:var(--orange)">Ask questions to guide thinking.</strong> Instead of giving answers, help people discover them: "What options do you see?" "What would you recommend?" "What are the risks of each approach?" This builds capability, not dependency.</li>
          <li><strong style="color:var(--orange)">Set people up to succeed.</strong> Give them a reputation to live up to: "You are the best person for this because..." Then provide the support they need. When they succeed, they own it. When they struggle, you are there.</li>
        </ul>
      </div>
    </div>

    <div class="section-subtitle">Meeting Facilitation Tips</div>
    <div class="card">
      <div class="card-content" style="max-height:none;padding:12px 0">
        <ul class="practice-list">
          <li><strong>Begin with the end in mind (Covey):</strong> Open every meeting with: "By the end of this meeting, we need to..." If you cannot finish that sentence, cancel the meeting.</li>
          <li><strong>Start with appreciation (Carnegie):</strong> Begin by recognizing progress or effort. Sets a collaborative tone.</li>
          <li><strong>Seek to understand first (Covey):</strong> Before proposing solutions, ensure everyone\'s perspective is heard. Go around the room.</li>
          <li><strong>Let people talk (Carnegie):</strong> The leader should talk least. Ask questions, facilitate, summarize. Do not dominate.</li>
          <li><strong>Think Win-Win (Covey):</strong> When there is disagreement, frame it as: "How do we find a solution that addresses everyone\'s concerns?"</li>
          <li><strong>End with clear actions (Covey):</strong> Who is doing what by when? Write it down. Send it out. Follow up.</li>
        </ul>
      </div>
    </div>

    <div class="section-subtitle">One-on-One Conversation Template</div>
    <div class="card">
      <div class="card-content" style="max-height:none;padding:12px 0">
        <ol style="padding-left:18px">
          <li style="padding:4px 0;font-size:0.75rem;line-height:1.6"><strong style="color:var(--cyan)">Check in (2 min):</strong> "How are you doing? Anything on your mind?" — genuine interest, not a formality.</li>
          <li style="padding:4px 0;font-size:0.75rem;line-height:1.6"><strong style="color:var(--cyan)">Their agenda (10 min):</strong> "What would you like to discuss?" — let them lead. This is their meeting.</li>
          <li style="padding:4px 0;font-size:0.75rem;line-height:1.6"><strong style="color:var(--cyan)">Recognition (3 min):</strong> Share one specific thing they did well since your last meeting. Be genuine and detailed.</li>
          <li style="padding:4px 0;font-size:0.75rem;line-height:1.6"><strong style="color:var(--cyan)">Growth (5 min):</strong> "What is one area you would like to develop?" Offer support, resources, or opportunities.</li>
          <li style="padding:4px 0;font-size:0.75rem;line-height:1.6"><strong style="color:var(--cyan)">Your agenda (5 min):</strong> Share updates, alignment items, or feedback — framed as questions when possible.</li>
          <li style="padding:4px 0;font-size:0.75rem;line-height:1.6"><strong style="color:var(--cyan)">Close (2 min):</strong> Summarize action items. Ask: "Is there anything else you need from me?" Mean it.</li>
        </ol>
      </div>
    </div>
  `;
}

// 10. PROGRESS & GROWTH TRACKER
// ============================================
function renderProgress() {
  const streak = calcStreak();
  const ratings = DATA.habitRatings || {};
  const history = DATA.assessmentHistory || [];

  // Carnegie practice frequency from journal
  const journalEntries = DATA.journalEntries || [];
  const tagCounts = {};
  ALL_PRINCIPLES.forEach(p => tagCounts[p.id] = 0);
  journalEntries.forEach(e => (e.tags||[]).forEach(t => { if (tagCounts[t] !== undefined) tagCounts[t]++; }));

  // Most/least practiced
  const coveyTags = ALL_PRINCIPLES.filter(p => p.source === 'Covey');
  const carnegieTags = ALL_PRINCIPLES.filter(p => p.source === 'Carnegie');
  const sortedCarnegie = [...carnegieTags].sort((a,b) => tagCounts[b.id] - tagCounts[a.id]);
  const mostPracticed = sortedCarnegie.filter(p => tagCounts[p.id] > 0).slice(0, 3);
  const leastPracticed = sortedCarnegie.filter(p => tagCounts[p.id] === 0).slice(0, 3);

  // Areas for growth (lowest habit ratings)
  const ratedHabits = HABITS.filter(h => ratings[h.id]).sort((a,b) => ratings[a.id] - ratings[b.id]);
  const growthAreas = ratedHabits.slice(0, 3);

  // Streak calendar (last 28 days)
  let calHtml = '';
  for (let i = 27; i >= 0; i--) {
    const d = new Date(); d.setDate(d.getDate() - i);
    const key = `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;
    const done = (DATA.streakDays || []).includes(key);
    const isToday = key === todayKey();
    calHtml += `<div class="mini-cal-day ${done?'done':''} ${isToday?'today':''}" title="${key}"></div>`;
  }

  let html = `<div class="section-title">Progress & Growth Tracker</div>

  <div class="streak-display">
    <span class="streak-num">${streak}</span>
    <div>
      <div style="font-size:0.8rem;font-weight:600">Day Streak</div>
      <div class="streak-label">Consecutive reflection days</div>
    </div>
  </div>

  <div style="margin:12px 0">
    <div style="font-size:0.7rem;color:var(--dim);margin-bottom:6px;font-weight:600;letter-spacing:0.06em">LAST 28 DAYS</div>
    <div class="mini-cal">${calHtml}</div>
  </div>

  <div class="section-subtitle">7 Habits Self-Assessment</div>
  <div class="radar-wrap"><canvas id="radarCanvas" width="320" height="320"></canvas></div>
  <div class="card">
    ${HABITS.map(h => {
      const r = ratings[h.id] || 0;
      return `<div style="display:flex;align-items:center;gap:8px;padding:6px 0;border-bottom:1px solid rgba(226,232,240,0.05)">
        <span style="font-size:0.7rem;color:var(--dim);width:24px;text-align:center">${h.num}</span>
        <span style="font-size:0.75rem;flex:1">${h.name}</span>
        <div style="width:100px;height:6px;background:var(--border);border-radius:3px;overflow:hidden"><div style="width:${r*10}%;height:100%;background:var(--cyan);border-radius:3px;transition:width 0.3s"></div></div>
        <span style="font-size:0.7rem;color:var(--cyan);width:24px;text-align:right">${r||'-'}</span>
      </div>`;
    }).join('')}
  </div>

  <div class="btn-group">
    <button class="btn btn-sm btn-green" id="saveAssessment">Save Monthly Assessment</button>
  </div>

  ${history.length > 0 ? `
    <div class="section-subtitle">Assessment History</div>
    ${history.slice(0,6).map(h => `
      <div class="card" style="margin-bottom:6px">
        <div style="font-size:0.65rem;color:var(--dim);margin-bottom:4px">${h.date}</div>
        <div style="display:flex;gap:8px;flex-wrap:wrap">
          ${HABITS.map(hab => `<span style="font-size:0.65rem;color:${(h.ratings[hab.id]||0)>=7?'var(--green)':(h.ratings[hab.id]||0)>=4?'var(--orange)':'var(--red)'}">${hab.num}:${h.ratings[hab.id]||'-'}</span>`).join('')}
        </div>
      </div>
    `).join('')}
  ` : ''}

  ${mostPracticed.length > 0 ? `
    <div class="section-subtitle">Most Practiced Carnegie Principles</div>
    <div class="card">
      ${mostPracticed.map(p => `<div style="font-size:0.75rem;padding:4px 0;border-bottom:1px solid rgba(226,232,240,0.05)"><span style="color:var(--green)">${tagCounts[p.id]}x</span> ${p.name}</div>`).join('')}

  ${leastPracticed.length > 0 ? `
    <div class="section-subtitle">Principles to Practice More</div>
    <div class="card">
      ${leastPracticed.map(p => `<div style="font-size:0.75rem;padding:4px 0;border-bottom:1px solid rgba(226,232,240,0.05);color:var(--dim)">${p.name}</div>`).join('')}
    </div>
  ` : ''}

  ${growthAreas.length > 0 ? `
    <div class="section-subtitle">Areas for Growth</div>
    <div class="card">
      ${growthAreas.map(h => `<div style="font-size:0.75rem;padding:4px 0;border-bottom:1px solid rgba(226,232,240,0.05)">Habit ${h.num}: ${h.name} <span style="color:var(--orange)">(rated ${ratings[h.id]}/10)</span></div>`).join('')}
    </div>
  ` : ''}

  ${streak >= 7 ? `<div class="tip-box"><strong style="color:var(--green)">Milestone:</strong> ${streak >= 30 ? 'Incredible! 30+ day streak. You are building lasting habits.' : '7+ day streak! Consistency builds character. Keep going.'}</div>` : ''}
  `;

  return html;
}

function initProgress() {
  // Draw radar chart
  drawRadar();

  // Save assessment
  const saveBtn = document.getElementById('saveAssessment');
  if (saveBtn) saveBtn.addEventListener('click', () => {
    if (!DATA.assessmentHistory) DATA.assessmentHistory = [];
    DATA.assessmentHistory.unshift({
      date: new Date().toLocaleDateString('en-US', { year:'numeric', month:'long', day:'numeric' }),
      ratings: { ...DATA.habitRatings }
    });
    saveData(DATA);
    showToast('Assessment saved');
    renderTab();
  });
}

function drawRadar() {
  const canvas = document.getElementById('radarCanvas');
  if (!canvas) return;
  const ctx = canvas.getContext('2d');
  const w = canvas.width, h = canvas.height;
  const cx = w/2, cy = h/2, r = 120;
  const ratings = DATA.habitRatings || {};
  const n = 7;

  ctx.clearRect(0, 0, w, h);

  // Draw grid
  for (let ring = 1; ring <= 5; ring++) {
    const rr = (ring / 5) * r;
    ctx.beginPath();
    for (let i = 0; i <= n; i++) {
      const angle = (Math.PI * 2 * i / n) - Math.PI / 2;
      const x = cx + rr * Math.cos(angle);
      const y = cy + rr * Math.sin(angle);
      i === 0 ? ctx.moveTo(x, y) : ctx.lineTo(x, y);
    }
    ctx.closePath();
    ctx.strokeStyle = 'rgba(26,37,53,0.8)';
    ctx.lineWidth = 1;
    ctx.stroke();
  }

  // Draw axes and labels
  HABITS.forEach((h, i) => {
    const angle = (Math.PI * 2 * i / n) - Math.PI / 2;
    const x = cx + r * Math.cos(angle);
    const y = cy + r * Math.sin(angle);
    ctx.beginPath();
    ctx.moveTo(cx, cy);
    ctx.lineTo(x, y);
    ctx.strokeStyle = 'rgba(26,37,53,0.5)';
    ctx.stroke();

    // Labels
    const lx = cx + (r + 20) * Math.cos(angle);
    const ly = cy + (r + 20) * Math.sin(angle);
    ctx.font = '10px JetBrains Mono';
    ctx.fillStyle = 'rgba(226,232,240,0.5)';
    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';
    ctx.fillText('H' + h.num, lx, ly);
  });

  // Draw data
  ctx.beginPath();
  HABITS.forEach((h, i) => {
    const val = (ratings[h.id] || 0) / 10;
    const angle = (Math.PI * 2 * i / n) - Math.PI / 2;
    const x = cx + r * val * Math.cos(angle);
    const y = cy + r * val * Math.sin(angle);
    i === 0 ? ctx.moveTo(x, y) : ctx.lineTo(x, y);
  });
  ctx.closePath();
  ctx.fillStyle = 'rgba(0,212,255,0.15)';
  ctx.fill();
  ctx.strokeStyle = '#00d4ff';
  ctx.lineWidth = 2;
  ctx.stroke();

  // Draw data points
  HABITS.forEach((h, i) => {
    const val = (ratings[h.id] || 0) / 10;
    const angle = (Math.PI * 2 * i / n) - Math.PI / 2;
    const x = cx + r * val * Math.cos(angle);
    const y = cy + r * val * Math.sin(angle);
    ctx.beginPath();
    ctx.arc(x, y, 4, 0, Math.PI * 2);
    ctx.fillStyle = '#00d4ff';
    ctx.fill();
  });
}

// ============================================
// UTILITY FUNCTIONS
// ============================================
function escHtml(str) {
  if (!str) return '';
  return str.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

function showToast(msg) {
  const existing = document.querySelector('.toast-msg');
  if (existing) existing.remove();
  const toast = document.createElement('div');
  toast.className = 'toast-msg';
  toast.textContent = msg;
  toast.style.cssText = `position:fixed;bottom:20px;left:50%;transform:translateX(-50%);background:var(--surface);border:1px solid var(--cyan);color:var(--cyan);padding:10px 20px;border-radius:var(--radius);font-size:0.75rem;z-index:500;animation:fadeIn 0.2s ease;font-family:var(--font)`;
  document.body.appendChild(toast);
  setTimeout(() => toast.remove(), 2000);
}

function checkMilestones() {
  const streak = calcStreak();
  const milestones = [7, 14, 30, 60, 90, 100, 365];
  if (milestones.includes(streak)) {
    const msgs = {
      7: 'One week of daily reflection. Consistency is the foundation of growth.',
      14: 'Two weeks strong. You are building a leadership habit.',
      30: '30 days. This is no longer a streak — it is who you are.',
      60: '60 days of intentional leadership. You are in rare company.',
      90: 'A full quarter of daily leadership practice. Exceptional commitment.',
      100: '100 days. Triple digits. Your discipline is remarkable.',
      365: 'One full year. You have transformed how you lead.'
    };
    const cel = document.createElement('div');
    cel.className = 'celebration';
    cel.innerHTML = `<h3>${streak}-Day Milestone</h3><p>${msgs[streak]}</p><button class="btn btn-sm btn-orange" style="margin-top:12px" onclick="this.closest('.celebration').remove()">Continue</button>`;
    document.body.appendChild(cel);
    setTimeout(() => { if (cel.parentNode) cel.remove(); }, 8000);
  }
}

function exportData() {
  const json = JSON.stringify(DATA, null, 2);
  const blob = new Blob([json], { type: 'application/json' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  a.download = 'leadership-forge-backup-' + todayKey() + '.json';
  a.click();
  URL.revokeObjectURL(url);
  showToast('Data exported');
}

function importData(e) {
  const file = e.target.files[0];
  if (!file) return;
  const reader = new FileReader();
  reader.onload = function(ev) {
    try {
      const imported = JSON.parse(ev.target.result);
      DATA = { ...getDefaultData(), ...imported };
      saveData(DATA);
      showToast('Data imported successfully');
      renderTab();
    } catch(err) {
      showToast('Invalid JSON file');
    }
  };
  reader.readAsText(file);
}

function clearData() {
  if (!confirm('Are you sure you want to clear ALL data? This cannot be undone.')) return;
  if (!confirm('Really? All journal entries, assessments, and progress will be lost.')) return;
  DATA = getDefaultData();
  saveData(DATA);
  showToast('All data cleared');
  renderTab();
}

function downloadText(filename, text) {
  const blob = new Blob([text], { type: 'text/plain' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  a.download = filename;
  a.click();
  URL.revokeObjectURL(url);
}

function openModal(html) {
  document.getElementById('modalContent').innerHTML = html;
  document.getElementById('modalOverlay').classList.add('open');
}
function closeModal() {
  document.getElementById('modalOverlay').classList.remove('open');
}
document.getElementById('modalOverlay').addEventListener('click', (e) => {
  if (e.target === document.getElementById('modalOverlay')) closeModal();
});

// ---- Initialize ----
renderTab();
