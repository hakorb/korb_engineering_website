<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
<title>Legends of the Hidden Temple // Korb Engineering</title>
<meta name="description" content="Navigate Olmec's temple. Choose a team, answer steps of knowledge, race through the temple rooms before time runs out, and retrieve the artifact.">
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;700&family=Press+Start+2P&family=Bebas+Neue&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #0a1410;
  --jungle: #1a3226;
  --stone: #4a3a28;
  --stone-dark: #2a1f15;
  --torch: #ff7a1a;
  --gold: #ffc83d;
  --cyan: #00d4ff;
  --red: #e03030;
  --green: #2ab872;
  --silver: #cfd6dc;
  --text: #f5e8c8;
  --dim: #8a8472;
}
* { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
html, body {
  background: var(--bg); color: var(--text);
  min-height: 100dvh;
  font-family: 'IBM Plex Mono', monospace; font-size: 14px; line-height: 1.5;
  overflow-x: hidden;
}
body {
  background:
    radial-gradient(ellipse at top, rgba(255,122,26,0.12), transparent 40%),
    radial-gradient(ellipse at bottom, rgba(26,50,38,0.4), var(--bg));
  padding: 12px 12px 40px;
  max-width: 1080px; margin: 0 auto;
  position: relative;
}
body::before {
  content: ''; position: fixed; inset: 0; pointer-events: none;
  background: repeating-linear-gradient(0deg, transparent, transparent 3px, rgba(0,0,0,0.08) 3px, rgba(0,0,0,0.08) 4px);
  z-index: 999;
}
a { color: var(--torch); text-decoration: none; }
.back {
  display: inline-block; color: var(--torch);
  font-size: 11px; letter-spacing: 2px; padding: 6px 10px;
  border: 1px solid rgba(255,122,26,0.3); border-radius: 3px;
  margin-bottom: 10px;
}
.back:hover { background: rgba(255,122,26,0.08); }

header { text-align: center; padding: 8px 0 18px; }
h1 {
  font-family: 'Bebas Neue', 'Press Start 2P', sans-serif;
  font-size: clamp(32px, 8vw, 58px); letter-spacing: 3px;
  color: var(--gold);
  text-shadow:
    0 0 12px rgba(255,200,61,0.7),
    0 0 28px rgba(255,122,26,0.5),
    3px 3px 0 var(--stone-dark);
  line-height: 1; margin-bottom: 4px;
}
h1 .sub {
  display: block; font-size: 0.35em; letter-spacing: 6px;
  color: var(--torch); text-shadow: 0 0 10px var(--torch);
  margin-top: 4px;
}

/* ---- Screens ---- */
.screen { display: none; }
.screen.active { display: block; }

/* ---- Team picker ---- */
.teams-intro { text-align: center; color: var(--dim); margin-bottom: 14px; letter-spacing: 1px; font-size: 12px; }
.teams-grid {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(160px, 1fr));
  gap: 10px; margin-bottom: 18px;
}
.team-card {
  background: linear-gradient(135deg, var(--stone) 0%, var(--stone-dark) 100%);
  border: 2px solid rgba(255,200,61,0.15); border-radius: 6px;
  padding: 18px 12px; text-align: center; cursor: pointer;
  transition: all 0.2s; position: relative; overflow: hidden;
  touch-action: manipulation; min-height: 110px;
  display: flex; flex-direction: column; align-items: center; gap: 6px;
}
.team-card:hover, .team-card.selected {
  border-color: var(--gold);
  box-shadow: 0 0 18px rgba(255,200,61,0.4);
  transform: translateY(-2px);
}
.team-card.selected::after {
  content: '✓'; position: absolute; top: 6px; right: 8px;
  font-weight: 900; color: var(--gold); font-size: 16px;
  text-shadow: 0 0 10px var(--gold);
}
.team-emblem {
  width: 56px; height: 56px; border-radius: 50%;
  display: flex; align-items: center; justify-content: center;
  font-size: 30px; font-weight: 900;
  box-shadow: 0 0 0 2px rgba(0,0,0,0.3) inset, 0 0 12px rgba(0,0,0,0.3);
}
.team-name {
  font-family: 'Bebas Neue', sans-serif; letter-spacing: 2px; font-size: 16px;
}

/* ---- Olmec speech ---- */
.olmec {
  background: linear-gradient(180deg, #2b3a2e 0%, #1a2a22 100%);
  border: 2px solid var(--stone); border-radius: 8px;
  padding: 14px 16px; margin: 12px 0;
  position: relative;
}
.olmec::before {
  content: 'OLMEC SPEAKS'; position: absolute; top: -10px; left: 16px;
  background: var(--bg); color: var(--torch); padding: 0 8px;
  font-family: 'Press Start 2P', monospace; font-size: 9px; letter-spacing: 3px;
}
.olmec-body {
  font-family: 'IBM Plex Mono', monospace; font-size: 14px;
  color: var(--text); letter-spacing: 0.5px;
  min-height: 52px; padding: 6px 0;
}
.olmec-body.typing::after { content: '▋'; animation: blink 0.6s infinite; color: var(--torch); }
@keyframes blink { 0%,50% { opacity: 1; } 51%,100% { opacity: 0; } }

/* ---- Buttons / forms ---- */
.btn {
  background: linear-gradient(180deg, var(--torch) 0%, #cc5a10 100%);
  color: #000; border: 2px solid #8a3a00;
  padding: 12px 22px; cursor: pointer;
  font-family: 'Bebas Neue', sans-serif; letter-spacing: 3px; font-size: 18px;
  border-radius: 4px; touch-action: manipulation; min-height: 48px;
  text-shadow: 0 1px 0 rgba(255,255,255,0.3);
  box-shadow: 0 3px 0 #6a2800, 0 0 14px rgba(255,122,26,0.4);
  transition: transform 0.05s;
}
.btn:active { transform: translateY(1px); box-shadow: 0 2px 0 #6a2800, 0 0 14px rgba(255,122,26,0.4); }
.btn:disabled { opacity: 0.4; cursor: not-allowed; }
.btn.gold { background: linear-gradient(180deg, var(--gold) 0%, #c89b20 100%); border-color: #7a5f10; box-shadow: 0 3px 0 #5a4400; }
.btn.silver { background: linear-gradient(180deg, var(--silver) 0%, #7a858a 100%); border-color: #3a4348; box-shadow: 0 3px 0 #2a3338; }
.btn.full { width: 100%; }

.center { text-align: center; }

/* ---- Moat cards ---- */
.moat-choice {
  display: grid; grid-template-columns: 1fr 1fr; gap: 10px;
  margin-top: 12px;
}
.moat-card {
  background: var(--stone); color: var(--text);
  border: 2px solid var(--stone-dark);
  padding: 14px 10px; border-radius: 5px; cursor: pointer;
  transition: all 0.15s; min-height: 58px;
  font-family: 'IBM Plex Mono', monospace; font-size: 13px;
  display: flex; align-items: center; justify-content: center;
  text-align: center; line-height: 1.3;
}
.moat-card:hover { border-color: var(--torch); background: #5a4a38; }
.moat-card.correct { background: var(--green); border-color: #1a7040; }
.moat-card.wrong { background: var(--red); border-color: #7a1818; }

/* ---- Steps of Knowledge ---- */
.steps {
  display: flex; flex-direction: column-reverse;
  background: linear-gradient(180deg, #2a1f15 0%, #1a1008 100%);
  border-radius: 8px; overflow: hidden;
  margin: 10px 0;
}
.step {
  padding: 10px 16px;
  border-top: 2px solid rgba(0,0,0,0.4);
  display: flex; align-items: center; gap: 12px;
  font-family: 'IBM Plex Mono', monospace; font-size: 13px;
  transition: background 0.3s;
}
.step .num {
  width: 26px; height: 26px; border-radius: 50%;
  display: flex; align-items: center; justify-content: center;
  background: var(--stone-dark); color: var(--gold); font-weight: 700;
  flex-shrink: 0; font-size: 12px;
}
.step .marker { font-size: 20px; margin-left: auto; }
.step.done { background: rgba(42,184,114,0.2); }
.step.active { background: rgba(255,200,61,0.12); }

.q-panel {
  background: var(--stone-dark); border: 2px solid var(--stone);
  border-radius: 6px; padding: 14px; margin: 10px 0;
}
.q-text {
  font-family: 'IBM Plex Mono', monospace; font-size: 15px;
  margin-bottom: 10px; line-height: 1.5;
}
.q-opts { display: grid; grid-template-columns: 1fr; gap: 6px; }
.q-opt {
  background: var(--stone); border: 2px solid rgba(0,0,0,0.3);
  color: var(--text); padding: 12px 14px; border-radius: 4px; cursor: pointer;
  font-family: 'IBM Plex Mono', monospace; font-size: 13px;
  text-align: left; line-height: 1.4; min-height: 44px;
}
.q-opt:hover { border-color: var(--torch); }
.q-opt.correct { background: var(--green); }
.q-opt.wrong { background: var(--red); }

/* ---- Pendants ---- */
.pendants {
  display: flex; justify-content: center; gap: 14px;
  margin: 10px 0;
}
.pendant {
  width: 46px; height: 46px; border-radius: 50%;
  background: radial-gradient(circle at 35% 30%, #fff2a0 0%, #ffc83d 45%, #8a6500 100%);
  display: flex; align-items: center; justify-content: center;
  font-weight: 900; color: #4a3100;
  box-shadow: 0 0 0 2px #5a4100 inset, 0 0 14px rgba(255,200,61,0.5);
  font-family: 'Bebas Neue', sans-serif; font-size: 18px; letter-spacing: 1px;
  transition: all 0.4s;
}
.pendant.empty { background: rgba(0,0,0,0.4); box-shadow: 0 0 0 2px var(--stone-dark) inset; color: #3a3528; }
.pendant.half { background: radial-gradient(circle at 35% 30%, #fff2a0 0%, #ffc83d 45%, #8a6500 100%); }
.pendant.half::after { content: ''; position: absolute; }

/* ---- Temple grid ---- */
.temple-view { margin-top: 10px; }
.hud {
  display: grid; grid-template-columns: 1fr auto 1fr; gap: 10px; align-items: center;
  background: rgba(0,0,0,0.5); border: 1px solid var(--stone);
  border-radius: 4px; padding: 8px 12px; margin-bottom: 8px;
  font-family: 'Bebas Neue', sans-serif; letter-spacing: 2px;
}
.hud .timer {
  font-size: 28px; color: var(--red); text-align: center;
  text-shadow: 0 0 10px rgba(224,48,48,0.6);
  font-family: 'Press Start 2P', monospace;
}
.hud .timer.warn { color: var(--torch); animation: pulse 0.6s infinite; }
.hud .timer.danger { color: var(--red); animation: pulse 0.3s infinite; }
@keyframes pulse { 0%,100% { opacity: 1; } 50% { opacity: 0.4; } }
.hud .label { font-size: 10px; color: var(--dim); letter-spacing: 3px; }
.hud .val { font-size: 22px; color: var(--gold); text-shadow: 0 0 8px rgba(255,200,61,0.5); }

.temple {
  display: grid;
  grid-template-columns: repeat(3, 1fr);
  grid-auto-rows: minmax(60px, auto);
  gap: 4px;
  background: var(--stone-dark);
  padding: 6px; border-radius: 6px;
  border: 2px solid var(--stone);
}
.room {
  position: relative;
  background: linear-gradient(135deg, #2a2015 0%, #1a1208 100%);
  border: 1px solid rgba(0,0,0,0.5);
  border-radius: 3px; padding: 8px 6px; min-height: 64px;
  display: flex; flex-direction: column; align-items: center; justify-content: center;
  gap: 2px; cursor: pointer; transition: all 0.15s;
  text-align: center; font-size: 10px;
  font-family: 'IBM Plex Mono', monospace; color: var(--text);
}
.room.explored { background: linear-gradient(135deg, #3a3020 0%, #2a2015 100%); }
.room.locked { opacity: 0.5; cursor: not-allowed; }
.room.current {
  background: linear-gradient(135deg, var(--torch) 0%, #cc5a10 100%) !important;
  color: #fff; box-shadow: 0 0 14px var(--torch);
  animation: pulse 1s infinite;
}
.room.artifact { background: linear-gradient(135deg, var(--gold) 0%, #c89b20 100%); color: #000; }
.room.artifact .room-icon { color: #000; }
.room.adjacent { border-color: var(--torch); box-shadow: 0 0 8px rgba(255,122,26,0.5); }
.room-icon { font-size: 22px; }
.room-name { letter-spacing: 1px; line-height: 1.1; font-size: 9px; }
.room-obst {
  position: absolute; top: 2px; right: 2px; font-size: 10px;
  color: var(--red); font-weight: 700;
}

.log {
  background: rgba(0,0,0,0.6); border: 1px solid var(--stone);
  border-radius: 4px; padding: 10px 14px; margin-top: 10px;
  font-family: 'IBM Plex Mono', monospace; font-size: 12px;
  max-height: 140px; overflow-y: auto; line-height: 1.5;
}
.log-line { color: var(--text); margin-bottom: 2px; }
.log-line .ts { color: var(--dim); font-size: 10px; margin-right: 6px; }
.log-line.win { color: var(--gold); }
.log-line.lose { color: var(--red); }
.log-line.info { color: var(--cyan); }

/* ---- Result screen ---- */
.result {
  text-align: center; padding: 20px 14px;
}
.result-title {
  font-family: 'Bebas Neue', sans-serif; font-size: clamp(28px, 7vw, 52px);
  letter-spacing: 4px; margin-bottom: 10px;
}
.result-title.win { color: var(--gold); text-shadow: 0 0 20px var(--gold); }
.result-title.lose { color: var(--red); text-shadow: 0 0 14px var(--red); }
.result-summary {
  background: var(--stone); padding: 14px; border-radius: 5px;
  margin: 14px auto; max-width: 400px;
  font-size: 13px; line-height: 1.7;
}
</style>
</head>

<!-- ========================================= -->

    <div class="q-text" id="pend-q">Loading...</div>

    <div class="pendant empty">P1</div>

      <div class="val" id="t-team">&mdash;</div>
    </div>

    <div class="result-summary" id="result-summary"></div>
    <button class="btn gold full" id="btn-replay" style="max-width:380px;margin:0 auto;display:block">PLAY AGAIN</button>
  </div>
</section>

<script>
(function(){
'use strict';

// ========== TEAMS (from the original show) ==========
var TEAMS = [
  { name: 'Red Jaguars',    emoji: '🐆', color: '#c83030' },
  { name: 'Blue Barracudas', emoji: '🐟', color: '#2060c0' },
  { name: 'Green Monkeys',   emoji: '🐒', color: '#2ab872' },
  { name: 'Orange Iguanas',  emoji: '🦎', color: '#ff7a1a' },
  { name: 'Purple Parrots',  emoji: '🦜', color: '#9030c8' },
  { name: 'Silver Snakes',   emoji: '🐍', color: '#b8c0c8' },
];

// ========== QUESTIONS ==========
var MOAT_QUESTIONS = [
  { q: 'Which mythical creature guards the gates of the temple?', a: ['Sphinx', 'Minotaur', 'Hydra', 'Cyclops'], correct: 0 },
  { q: 'In Greek myth, who flew too close to the sun on wax wings?', a: ['Icarus', 'Apollo', 'Hermes', 'Perseus'], correct: 0 },
  { q: 'The Olmec civilization flourished in which modern country?', a: ['Peru', 'Mexico', 'Guatemala', 'Brazil'], correct: 1 },
  { q: 'Which wonder of the ancient world was a lighthouse?', a: ['Colossus of Rhodes', 'Pharos of Alexandria', 'Mausoleum', 'Temple of Artemis'], correct: 1 },
  { q: 'Who was the Greek goddess of wisdom?', a: ['Hera', 'Artemis', 'Athena', 'Demeter'], correct: 2 },
  { q: 'The Rosetta Stone helped decode which language?', a: ['Latin', 'Sumerian', 'Egyptian hieroglyphs', 'Sanskrit'], correct: 2 },
  { q: 'Which pharaoh built the largest pyramid at Giza?', a: ['Tutankhamun', 'Ramses II', 'Cleopatra', 'Khufu'], correct: 3 },
  { q: 'Machu Picchu was built by which ancient civilization?', a: ['Aztec', 'Maya', 'Olmec', 'Inca'], correct: 3 },
];

var STEPS_QUESTIONS = [
  { q: 'Olmec: "Which pharaoh\'s treasure was discovered in 1922 by Howard Carter?"',
    a: ['Cleopatra','Tutankhamun','Ramses II','Khufu'], correct: 1 },
  { q: 'Olmec: "The legend says, her amulet protected warriors in battle. Which goddess was she?"',
    a: ['Isis','Bastet','Hathor','Sekhmet'], correct: 3 },
  { q: 'Olmec: "Which ancient city was lost beneath volcanic ash in 79 AD?"',
    a: ['Troy','Pompeii','Petra','Carthage'], correct: 1 },
  { q: 'Olmec: "The temple holds a relic from the Silk Road. The Silk Road connected Europe to where?"',
    a: ['North Africa','The Americas','East Asia','Arabia'], correct: 2 },
  { q: 'Olmec: "In Norse legend, what weapon does Thor wield?"',
    a: ['Mjölnir (hammer)','Gungnir (spear)','Ragnarok (sword)','Gram (axe)'], correct: 0 },
  { q: 'Olmec: "The Trojan Horse was left outside which city?"',
    a: ['Sparta','Athens','Troy','Mycenae'], correct: 2 },
  { q: 'Olmec: "Who is the ferryman who carries souls across the river Styx?"',
    a: ['Hades','Charon','Hermes','Orpheus'], correct: 1 },
  { q: 'Olmec: "The Great Wall of China was built to defend against which invaders?"',
    a: ['Mongols','Japanese','Russians','Persians'], correct: 0 },
  { q: 'Olmec: "What did King Midas have the power to turn into gold?"',
    a: ['Water','Anything he touched','Stones','Food'], correct: 1 },
  { q: 'Olmec: "The Minotaur lived in a labyrinth on which island?"',
    a: ['Sicily','Cyprus','Crete','Rhodes'], correct: 2 },
];

var PEND_QUESTIONS = [
  { q: 'The temple guards hide among the rooms. Which artifact do you seek?',
    a: ['The Jade Jaguar','The Olmec\'s Missing Nose','The Silver Snake','The Golden Chalice'], correct: 1 },
  { q: 'Which piece of the temple is traditionally held by the Blue Barracudas?',
    a: ['The Wall','The Shrine','The Pit','None — teams don\'t own pieces'], correct: 3 },
  { q: 'If you enter a room and see three doors, what\'s the smart move?',
    a: ['Pick the middle','Pick the leftmost','Listen carefully and choose','Run out of the room'], correct: 2 },
];

// ========== ROOMS / TEMPLE LAYOUT ==========
// 3×4 grid of rooms, bottom-left is entrance, top-right is artifact
var ROOM_DEFS = [
  // Row 0 (top)
  { id:'shrine',     name:'Shrine of Silver Monkey', icon:'🐒', hasObstacle: true },
  { id:'vault',      name:'Pit of Despair',          icon:'🕳️', hasObstacle: true },
  { id:'artifact',   name:'ARTIFACT CHAMBER',        icon:'⭐', hasArtifact: true },
  // Row 1
  { id:'observatory',name:'Observatory',             icon:'🔭', hasObstacle: true },
  { id:'crypt',      name:'King Tut\'s Crypt',       icon:'⚰️', hasObstacle: true },
  { id:'laser',      name:'Laser Light Room',        icon:'💡', hasObstacle: true },
  // Row 2
  { id:'pharaohs',   name:'Pharaohs\' Secret',       icon:'👑', hasObstacle: true },
  { id:'jester',     name:'Jester\'s Court',         icon:'🃏', hasObstacle: true },
  { id:'snake',      name:'Room of the Snake',       icon:'🐍', hasObstacle: true },
  // Row 3 (bottom / start)
  { id:'mines',      name:'Dark Forest',             icon:'🌲', hasObstacle: true },
  { id:'pit',        name:'Crevasse',                icon:'⚒️', hasObstacle: true },
  { id:'gate',       name:'TEMPLE GATE',             icon:'🚪', isStart: true },
];

// Adjacency graph — indexes into ROOM_DEFS
// Rooms connect up/down/left/right; rows of 3
function neighbors(idx){
  var row = Math.floor(idx / 3), col = idx % 3;
  var out = [];
  if(row > 0)   out.push((row-1)*3 + col);
  if(row < 3)   out.push((row+1)*3 + col);
  if(col > 0)   out.push(row*3 + (col-1));
  if(col < 2)   out.push(row*3 + (col+1));
  return out;
}

// ========== STATE ==========
var S = {
  team: null,
  moatCorrect: 0,
  steps: 6,
  stepsWon: 0,
  pendants: 0,
  currentRoom: 11, // gate
  explored: {11: true},
  obstaclesCleared: {},
  timer: 180,
  timerInt: null,
  gameOver: false,
};

// ========== HELPERS ==========
function $(id){ return document.getElementById(id); }
function screen(id){
  document.querySelectorAll('.screen').forEach(function(s){ s.classList.remove('active'); });
  $('screen-' + id).classList.add('active');
  window.scrollTo({top:0,behavior:'smooth'});
}
function typeOlmec(elId, text, cb){
  var el = $(elId); var i = 0;
  el.textContent = ''; el.classList.add('typing');
  var t = setInterval(function(){
    el.textContent += text.charAt(i++);
    if(i >= text.length){ clearInterval(t); el.classList.remove('typing'); if(cb) cb(); }
  }, 20);
}
function shuffle(arr){ arr = arr.slice(); for(var i=arr.length-1;i>0;i--){ var j=Math.floor(Math.random()*(i+1)); var t=arr[i]; arr[i]=arr[j]; arr[j]=t; } return arr; }
function log(msg, cls){
  var el = $('log');
  var d = new Date();
  var stamp = d.toTimeString().slice(3,8);
  var line = document.createElement('div');
  line.className = 'log-line' + (cls ? ' ' + cls : '');
  line.innerHTML = '<span class="ts">'+stamp+'</span>' + msg;
  el.insertBefore(line, el.firstChild);
  while(el.children.length > 30) el.removeChild(el.lastChild);
}

// ========== SCREEN 1: TEAM PICKER ==========
function initTeams(){
  var grid = $('teams');
  grid.innerHTML = TEAMS.map(function(t, i){
    return '<div class="team-card" data-idx="' + i + '">' +
      '<div class="team-emblem" style="background:' + t.color + '">' + t.emoji + '</div>' +
      '<div class="team-name">' + t.name.toUpperCase() + '</div>' +
      '</div>';
  }).join('');
  grid.querySelectorAll('.team-card').forEach(function(c){
    c.addEventListener('click', function(){
      grid.querySelectorAll('.team-card').forEach(function(x){ x.classList.remove('selected'); });
      c.classList.add('selected');
      S.team = TEAMS[parseInt(c.dataset.idx, 10)];
      $('btn-start').disabled = false;
    });
  });
}
$('btn-start').addEventListener('click', function(){ startMoat(); });

// ========== SCREEN 2: MOAT ==========
var moatQ, moatPool;
function startMoat(){
  moatPool = shuffle(MOAT_QUESTIONS);
  S.moatCorrect = 0;
  screen('moat');
  typeOlmec('olmec-moat', 'TO CROSS MY MOAT, ' + S.team.name.toUpperCase() + ', YOU MUST ANSWER ONE QUESTION...');
  setTimeout(askMoat, 1400);
}
function askMoat(){
  moatQ = moatPool.shift();
  $('moat-q').textContent = moatQ.q;
  $('moat-opts').innerHTML = moatQ.a.map(function(opt, i){
    return '<button class="q-opt" data-idx="' + i + '">' + opt + '</button>';
  }).join('');
  $('moat-opts').querySelectorAll('.q-opt').forEach(function(b){
    b.addEventListener('click', function(){ moatAnswer(parseInt(b.dataset.idx, 10), b); });
  });
}
function moatAnswer(idx, btn){
  var opts = $('moat-opts').querySelectorAll('.q-opt');
  opts.forEach(function(o){ o.disabled = true; });
  if(idx === moatQ.correct){
    btn.classList.add('correct');
    typeOlmec('olmec-moat', 'CORRECT. YOU HAVE CROSSED THE MOAT.');
    setTimeout(startSteps, 1500);
  } else {
    btn.classList.add('wrong');
    opts[moatQ.correct].classList.add('correct');
    S.moatCorrect++;
    typeOlmec('olmec-moat', 'WRONG! BUT I AM MERCIFUL. TRY ONCE MORE.');
    setTimeout(askMoat, 1800);
  }
}

// ========== SCREEN 3: STEPS OF KNOWLEDGE ==========
var stepsPool, currentStep;
function startSteps(){
  stepsPool = shuffle(STEPS_QUESTIONS);
  currentStep = 0;
  screen('steps');
  renderSteps();
  typeOlmec('olmec-steps', 'NOW CLIMB THE STEPS OF KNOWLEDGE. ANSWER FOUR OF SIX AND THE TEMPLE IS YOURS.', function(){
    setTimeout(askStep, 500);
  });
}
function renderSteps(){
  var html = '';
  for(var i=S.steps-1; i>=0; i--){
    var cls = '';
    if(i < S.stepsWon) cls = ' done';
    if(i === S.stepsWon && !S.done) cls = ' active';
    var marker = i < S.stepsWon ? '✓' : i === S.stepsWon ? '▶' : '&middot;';
    html += '<div class="step' + cls + '">' +
      '<div class="num">' + (i+1) + '</div>' +
      '<div>Step ' + (i+1) + '</div>' +
      '<div class="marker">' + marker + '</div>' +
      '</div>';
  }
  $('steps').innerHTML = html;
}
var stepQ;
function askStep(){
  if(S.stepsWon >= 4 || currentStep >= S.steps){
    $('steps-q-panel').style.display = 'none';
    if(S.stepsWon >= 4){
      typeOlmec('olmec-steps', 'YOU HAVE EARNED YOUR PENDANT OF LIFE. PREPARE TO ENTER THE TEMPLE.', function(){
        setTimeout(function(){
          S.pendants = 1;
          goPendants();
        }, 1400);
      });
    } else {
      endGame(false, 'You failed the Steps of Knowledge. Olmec does not forgive.');
    }
    return;
  }
  $('steps-q-panel').style.display = 'block';
  stepQ = stepsPool.shift();
  $('steps-q').textContent = stepQ.q;
  $('steps-opts').innerHTML = stepQ.a.map(function(opt, i){
    return '<button class="q-opt" data-idx="' + i + '">' + opt + '</button>';
  }).join('');
  $('steps-opts').querySelectorAll('.q-opt').forEach(function(b){
    b.addEventListener('click', function(){ stepAnswer(parseInt(b.dataset.idx, 10), b); });
  });
}
function stepAnswer(idx, btn){
  var opts = $('steps-opts').querySelectorAll('.q-opt');
  opts.forEach(function(o){ o.disabled = true; });
  currentStep++;
  if(idx === stepQ.correct){
    btn.classList.add('correct');
    S.stepsWon++;
    typeOlmec('olmec-steps', 'CORRECT.');
  } else {
    btn.classList.add('wrong');
    opts[stepQ.correct].classList.add('correct');
    typeOlmec('olmec-steps', 'WRONG. THE STEP REMAINS.');
  }
  renderSteps();
  setTimeout(askStep, 1400);
}

// ========== SCREEN 4: PENDANTS ROUND ==========
function goPendants(){
  screen('pendants');
  typeOlmec('olmec-pendants', 'ONE MORE PENDANT MAY AID YOU IN THE TEMPLE. ANSWER QUICKLY FOR A SECOND HALF...', function(){
    setTimeout(askPendant, 600);
  });
}
var pendQ;
function askPendant(){
  pendQ = shuffle(PEND_QUESTIONS)[0];
  $('pend-q').textContent = pendQ.q;
  $('pend-opts').innerHTML = pendQ.a.map(function(opt, i){
    return '<button class="q-opt" data-idx="' + i + '">' + opt + '</button>';
  }).join('');
  $('pend-opts').querySelectorAll('.q-opt').forEach(function(b){
    b.addEventListener('click', function(){ pendAnswer(parseInt(b.dataset.idx, 10), b); });
  });
}
function pendAnswer(idx, btn){
  var opts = $('pend-opts').querySelectorAll('.q-opt');
  opts.forEach(function(o){ o.disabled = true; });
  if(idx === pendQ.correct){
    btn.classList.add('correct');
    S.pendants = 2;
    $('pendants').innerHTML = '<div class="pendant">P1</div><div class="pendant">P2</div>';
    typeOlmec('olmec-pendants', 'BOTH HALVES ARE YOURS! ENTER WITH CONFIDENCE.');
  } else {
    btn.classList.add('wrong');
    opts[pendQ.correct].classList.add('correct');
    $('pendants').innerHTML = '<div class="pendant">P1</div><div class="pendant empty">P2</div>';
    typeOlmec('olmec-pendants', 'ONLY ONE PENDANT. CHOOSE YOUR STEPS WISELY.');
  }
  setTimeout(enterTemple, 2200);
}

// ========== SCREEN 5: TEMPLE RUN ==========
function enterTemple(){
  screen('temple');
  $('t-team').textContent = S.team.name;
  $('t-team').style.color = S.team.color;
  $('t-pendants').textContent = S.pendants;
  S.timer = 180;
  S.gameOver = false;
  updateTimer();
  renderTemple();
  log('Temple entered. You have 3 minutes.', 'info');
  typeOlmec('olmec-temple', 'THREE MINUTES. FIND THE ARTIFACT AND ESCAPE.');
  if(S.timerInt) clearInterval(S.timerInt);
  S.timerInt = setInterval(tickTimer, 1000);
}
function updateTimer(){
  var m = Math.floor(S.timer / 60);
  var s = S.timer % 60;
  var el = $('t-timer');
  el.textContent = m + ':' + s.toString().padStart(2,'0');
  el.classList.toggle('warn', S.timer <= 60 && S.timer > 30);
  el.classList.toggle('danger', S.timer <= 30);
}
function tickTimer(){
  S.timer--;
  updateTimer();
  if(S.timer <= 0){
    clearInterval(S.timerInt);
    if(!S.gameOver) endGame(false, 'Time ran out! The temple guards found you.');
  }
}
function renderTemple(){
  var html = '';
  var adjIdx = neighbors(S.currentRoom);
  ROOM_DEFS.forEach(function(r, i){
    var classes = ['room'];
    if(i === S.currentRoom) classes.push('current');
    else if(S.explored[i]) classes.push('explored');
    if(adjIdx.indexOf(i) >= 0 && !S.explored[i]) classes.push('adjacent');
    if(r.hasArtifact && !S.explored[i]) classes.push('artifact');
    var hasObst = r.hasObstacle && !S.obstaclesCleared[i] && i !== S.currentRoom;
    html += '<div class="' + classes.join(' ') + '" data-idx="' + i + '">' +
      (hasObst && adjIdx.indexOf(i) >= 0 ? '<div class="room-obst">⚠</div>' : '') +
      '<div class="room-icon">' + r.icon + '</div>' +
      '<div class="room-name">' + r.name + '</div>' +
      '</div>';
  });
  $('temple').innerHTML = html;
  $('temple').querySelectorAll('.room').forEach(function(el){
    el.addEventListener('click', function(){ moveToRoom(parseInt(el.dataset.idx, 10)); });
  });
}
function moveToRoom(idx){
  if(S.gameOver) return;
  var adj = neighbors(S.currentRoom);
  if(adj.indexOf(idx) < 0){ return; }
  var def = ROOM_DEFS[idx];
  // If room has an obstacle and not yet cleared, attempt it
  if(def.hasObstacle && !S.obstaclesCleared[idx]){
    var passed = attemptObstacle(def);
    if(!passed){
      // Guard encounter — lose a pendant
      if(S.pendants > 0){
        S.pendants--;
        $('t-pendants').textContent = S.pendants;
        log('🗝️ ' + def.name + ': TEMPLE GUARD! You used a pendant to escape. Pendants left: ' + S.pendants, 'info');
        S.obstaclesCleared[idx] = true;
      } else {
        log('💀 ' + def.name + ': Temple guard caught you!', 'lose');
        endGame(false, 'A temple guard carried you off — you were out of pendants.');
        return;
      }
    } else {
      S.obstaclesCleared[idx] = true;
      log('✓ ' + def.name + ': obstacle cleared.', 'info');
    }
  }
  S.currentRoom = idx;
  S.explored[idx] = true;
  if(def.hasArtifact){
    log('🏆 ARTIFACT RECOVERED!', 'win');
    S.timer += 15; // bonus time
    updateTimer();
    setTimeout(function(){ endGame(true, 'You retrieved the artifact and escaped!'); }, 800);
    return;
  }
  renderTemple();
}
function attemptObstacle(def){
  // 72% base chance, +3% per second remaining (capped), -5% if no pendants
  var chance = 0.55;
  chance += Math.min(0.25, S.timer / 180 * 0.25);
  if(S.pendants === 0) chance -= 0.10;
  // Specific rooms harder
  if(def.name.indexOf('Pit') >= 0 || def.name.indexOf('Laser') >= 0) chance -= 0.12;
  if(def.name.indexOf('Shrine') >= 0) chance -= 0.20; // Silver Monkey is always hard
  return Math.random() < chance;
}

$('btn-bail').addEventListener('click', function(){
  if(confirm('Give up your temple run?')){
    endGame(false, 'You gave up. The artifact remains lost.');
  }
});

// ========== SCREEN 6: RESULT ==========
function endGame(won, reason){
  S.gameOver = true;
  if(S.timerInt) clearInterval(S.timerInt);
  screen('result');
  $('result-title').textContent = won ? 'VICTORY!' : 'THE TEMPLE WINS';
  $('result-title').className = 'result-title ' + (won ? 'win' : 'lose');
  typeOlmec('olmec-result', won
    ? 'YOU HAVE PROVEN YOURSELF WORTHY, ' + S.team.name.toUpperCase() + '.'
    : 'PERHAPS ANOTHER DAY, ' + S.team.name.toUpperCase() + '.');
  var rooms = Object.keys(S.explored).length;
  $('result-summary').innerHTML =
    '<div><b>Team:</b> <span style="color:' + S.team.color + '">' + S.team.name + '</span></div>' +
    '<div><b>Outcome:</b> ' + (won ? '🏆 Artifact recovered' : '💀 ' + reason) + '</div>' +
    '<div><b>Rooms explored:</b> ' + rooms + '</div>' +
    '<div><b>Pendants remaining:</b> ' + S.pendants + '</div>' +
    '<div><b>Steps of Knowledge:</b> ' + S.stepsWon + ' / 4</div>' +
    (won ? '<div><b>Time remaining:</b> ' + Math.floor(S.timer/60) + ':' + (S.timer%60).toString().padStart(2,'0') + '</div>' : '');
}
$('btn-replay').addEventListener('click', function(){
  // Full reset
  S = { team:null, moatCorrect:0, steps:6, stepsWon:0, pendants:0, currentRoom:11, explored:{11:true}, obstaclesCleared:{}, timer:180, timerInt:null, gameOver:false };
  initTeams();
  screen('team');
  typeOlmec('olmec-1', 'CHOOSE YOUR TEAM. THEN CROSS THE MOAT AND CLIMB THE STEPS OF KNOWLEDGE.');
  $('btn-start').disabled = true;
});

// ========== INIT ==========
initTeams();
setTimeout(function(){
  typeOlmec('olmec-1', 'THE LEGENDS ARE TRUE. HIDDEN IN THIS TEMPLE LIE ARTIFACTS OF MYTH. CHOOSE YOUR TEAM.');
}, 300);

})();
</script>
