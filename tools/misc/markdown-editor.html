<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>Markdown Editor | Korb Engineering</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

:root {
  --bg: #050a0f;
  --surface: #0a1018;
  --border: #1a2535;
  --cyan: #00d4ff;
  --orange: #ff6600;
  --text: #e2e8f0;
  --text-dim: #8899aa;
  --text-muted: #556677;
  --danger: #ff4444;
  --success: #00cc66;
}

html, body {
  height: 100%;
  background: var(--bg);
  color: var(--text);
  font-family: 'JetBrains Mono', monospace;
  overflow: hidden;
}

/* ── Header ── */
.header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  height: 48px;
  padding: 0 16px;
  background: var(--surface);
  border-bottom: 1px solid var(--border);
  gap: 12px;
  flex-shrink: 0;
}

.brand {
  display: flex;
  align-items: center;
  gap: 10px;
  white-space: nowrap;
}

.brand-icon {
  width: 28px; height: 28px;
  border: 2px solid var(--cyan);
  border-radius: 4px;
  display: flex; align-items: center; justify-content: center;
  font-weight: 700; font-size: 14px; color: var(--cyan);
}

.brand-name {
  font-size: 13px;
  font-weight: 600;
  color: var(--text-dim);
  letter-spacing: 1px;
  text-transform: uppercase;
}

.brand-sep {
  color: var(--border);
  font-size: 18px;
  font-weight: 300;
}

.brand-title {
  font-size: 14px;
  font-weight: 600;
  color: var(--cyan);
}

.header-actions {
  display: flex;
  align-items: center;
  gap: 6px;
}

/* ── Buttons ── */
button {
  font-family: inherit;
  cursor: pointer;
  border: none;
  background: none;
  color: var(--text);
}

.btn {
  display: inline-flex;
  align-items: center;
  gap: 6px;
  padding: 6px 12px;
  border-radius: 4px;
  font-size: 12px;
  font-weight: 500;
  background: var(--surface);
  border: 1px solid var(--border);
  color: var(--text-dim);
  transition: all 0.15s;
  white-space: nowrap;
}

.btn:hover {
  border-color: var(--cyan);
  color: var(--cyan);
  background: rgba(0, 212, 255, 0.05);
}

.btn.active {
  border-color: var(--cyan);
  color: var(--cyan);
  background: rgba(0, 212, 255, 0.1);
}

.btn-orange:hover, .btn-orange.active {
  border-color: var(--orange);
  color: var(--orange);
  background: rgba(255, 102, 0, 0.05);
}

.btn-danger:hover {
  border-color: var(--danger);
  color: var(--danger);
  background: rgba(255, 68, 68, 0.05);
}

/* ── Document Tabs ── */
.doc-bar {
  display: flex;
  align-items: center;
  height: 36px;
  padding: 0 8px;
  background: var(--bg);
  border-bottom: 1px solid var(--border);
  gap: 2px;
  overflow-x: auto;
  flex-shrink: 0;
}

.doc-bar::-webkit-scrollbar { height: 2px; }
.doc-bar::-webkit-scrollbar-thumb { background: var(--border); }

.doc-tab {
  display: flex;
  align-items: center;
  gap: 6px;
  padding: 4px 12px;
  border-radius: 4px 4px 0 0;
  font-size: 11px;
  color: var(--text-muted);
  cursor: pointer;
  border: 1px solid transparent;
  border-bottom: none;
  transition: all 0.15s;
  white-space: nowrap;
  position: relative;
}

.doc-tab:hover { color: var(--text-dim); background: var(--surface); }

.doc-tab.active {
  color: var(--cyan);
  background: var(--surface);
  border-color: var(--border);
}

.doc-tab .close-tab {
  font-size: 14px;
  line-height: 1;
  opacity: 0;
  transition: opacity 0.15s;
  color: var(--text-muted);
  padding: 0 2px;
}

.doc-tab:hover .close-tab, .doc-tab.active .close-tab { opacity: 1; }
.doc-tab .close-tab:hover { color: var(--danger); }

.new-doc-btn {
  padding: 4px 10px;
  font-size: 16px;
  color: var(--text-muted);
  cursor: pointer;
  border-radius: 4px;
}

.new-doc-btn:hover { color: var(--cyan); background: var(--surface); }

/* ── Toolbar ── */
.toolbar {
  display: flex;
  align-items: center;
  height: 40px;
  padding: 0 8px;
  background: var(--surface);
  border-bottom: 1px solid var(--border);
  gap: 2px;
  flex-shrink: 0;
  flex-wrap: nowrap;
  overflow-x: auto;
}

.toolbar::-webkit-scrollbar { height: 0; }

.tool-btn {
  display: inline-flex;
  align-items: center;
  justify-content: center;
  min-width: 32px;
  height: 28px;
  padding: 0 8px;
  border-radius: 4px;
  font-size: 12px;
  font-weight: 600;
  color: var(--text-dim);
  cursor: pointer;
  transition: all 0.15s;
  white-space: nowrap;
}

.tool-btn:hover {
  background: rgba(0, 212, 255, 0.1);
  color: var(--cyan);
}

.tool-sep {
  width: 1px;
  height: 20px;
  background: var(--border);
  margin: 0 4px;
  flex-shrink: 0;
}

.tool-btn .shortcut {
  font-size: 9px;
  color: var(--text-muted);
  margin-left: 4px;
}

/* ── Main Layout ── */
.main {
  display: flex;
  flex: 1;
  overflow: hidden;
  height: calc(100vh - 48px - 36px - 40px - 28px);
}

.pane {
  flex: 1;
  display: flex;
  flex-direction: column;
  overflow: hidden;
  min-width: 0;
}

.pane-header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  height: 28px;
  padding: 0 12px;
  background: var(--surface);
  border-bottom: 1px solid var(--border);
  font-size: 10px;
  font-weight: 600;
  text-transform: uppercase;
  letter-spacing: 1.5px;
  color: var(--text-muted);
  flex-shrink: 0;
}

.divider {
  width: 3px;
  background: var(--border);
  cursor: col-resize;
  transition: background 0.15s;
  flex-shrink: 0;
}

.divider:hover, .divider.dragging {
  background: var(--cyan);
}

/* ── Editor ── */
.editor-wrap {
  flex: 1;
  position: relative;
  overflow: hidden;
}

.editor-container {
  position: absolute;
  inset: 0;
  overflow: auto;
}

.editor-container::-webkit-scrollbar { width: 8px; }
.editor-container::-webkit-scrollbar-track { background: var(--bg); }
.editor-container::-webkit-scrollbar-thumb { background: var(--border); border-radius: 4px; }
.editor-container::-webkit-scrollbar-thumb:hover { background: var(--text-muted); }

#editor {
  width: 100%;
  min-height: 100%;
  padding: 16px;
  background: var(--bg);
  color: var(--text);
  font-family: 'JetBrains Mono', monospace;
  font-size: 14px;
  line-height: 1.7;
  border: none;
  outline: none;
  resize: none;
  tab-size: 2;
  white-space: pre-wrap;
  word-wrap: break-word;
}

/* ── Syntax Highlighting Overlay ── */
.editor-highlight {
  position: absolute;
  inset: 0;
  padding: 16px;
  font-family: 'JetBrains Mono', monospace;
  font-size: 14px;
  line-height: 1.7;
  white-space: pre-wrap;
  word-wrap: break-word;
  pointer-events: none;
  color: transparent;
  overflow: hidden;
}

.editor-highlight .h { color: var(--orange); font-weight: 700; }
.editor-highlight .b { color: var(--cyan); font-weight: 700; }
.editor-highlight .i { color: #bb88ff; font-style: italic; }
.editor-highlight .c { color: var(--success); background: rgba(0, 204, 102, 0.08); border-radius: 3px; padding: 1px 2px; }
.editor-highlight .cb { color: var(--success); }
.editor-highlight .bq { color: var(--text-muted); font-style: italic; }
.editor-highlight .lnk { color: #4488ff; }
.editor-highlight .s { color: var(--text-muted); text-decoration: line-through; }

/* ── Preview ── */
.preview-wrap {
  flex: 1;
  overflow: auto;
  background: var(--bg);
}

.preview-wrap::-webkit-scrollbar { width: 8px; }
.preview-wrap::-webkit-scrollbar-track { background: var(--bg); }
.preview-wrap::-webkit-scrollbar-thumb { background: var(--border); border-radius: 4px; }

#preview {
  padding: 24px;
  font-family: 'JetBrains Mono', monospace;
  font-size: 14px;
  line-height: 1.7;
  color: var(--text);
}

#preview h1, #preview h2, #preview h3, #preview h4, #preview h5, #preview h6 {
  color: var(--orange);
  margin: 1.2em 0 0.6em;
  line-height: 1.3;
}

#preview h1 { font-size: 2em; border-bottom: 2px solid var(--border); padding-bottom: 0.3em; }
#preview h2 { font-size: 1.6em; border-bottom: 1px solid var(--border); padding-bottom: 0.2em; }
#preview h3 { font-size: 1.3em; }
#preview h4 { font-size: 1.1em; }
#preview h5 { font-size: 1em; }
#preview h6 { font-size: 0.9em; color: var(--text-dim); }

#preview p { margin: 0.8em 0; }

#preview strong { color: var(--cyan); font-weight: 700; }
#preview em { color: #bb88ff; }
#preview del { color: var(--text-muted); }

#preview code {
  background: rgba(0, 204, 102, 0.08);
  color: var(--success);
  padding: 2px 6px;
  border-radius: 4px;
  font-size: 0.9em;
}

#preview pre {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 6px;
  padding: 16px;
  overflow-x: auto;
  margin: 1em 0;
}

#preview pre code {
  background: none;
  padding: 0;
  color: var(--text);
  font-size: 13px;
}

#preview blockquote {
  border-left: 3px solid var(--cyan);
  padding: 0.5em 1em;
  margin: 1em 0;
  color: var(--text-dim);
  background: rgba(0, 212, 255, 0.03);
  border-radius: 0 4px 4px 0;
}

#preview blockquote p { margin: 0.3em 0; }

#preview ul, #preview ol {
  padding-left: 2em;
  margin: 0.8em 0;
}

#preview li { margin: 0.3em 0; }

#preview a {
  color: var(--cyan);
  text-decoration: none;
  border-bottom: 1px solid rgba(0, 212, 255, 0.3);
}

#preview a:hover { border-bottom-color: var(--cyan); }

#preview img {
  max-width: 100%;
  border-radius: 6px;
  border: 1px solid var(--border);
  margin: 0.5em 0;
}

#preview hr {
  border: none;
  height: 1px;
  background: var(--border);
  margin: 2em 0;
}

#preview table {
  width: 100%;
  border-collapse: collapse;
  margin: 1em 0;
}

#preview th, #preview td {
  border: 1px solid var(--border);
  padding: 8px 12px;
  text-align: left;
  font-size: 13px;
}

#preview th {
  background: var(--surface);
  color: var(--cyan);
  font-weight: 600;
}

#preview td { background: rgba(10, 16, 24, 0.5); }

/* ── Status Bar ── */
.status-bar {
  display: flex;
  align-items: center;
  justify-content: space-between;
  height: 28px;
  padding: 0 12px;
  background: var(--surface);
  border-top: 1px solid var(--border);
  font-size: 11px;
  color: var(--text-muted);
  flex-shrink: 0;
}

.status-left, .status-right {
  display: flex;
  align-items: center;
  gap: 16px;
}

.status-indicator {
  display: inline-block;
  width: 6px; height: 6px;
  border-radius: 50%;
  background: var(--success);
  margin-right: 4px;
}

/* ── Rename Input ── */
.rename-input {
  background: var(--bg);
  border: 1px solid var(--cyan);
  color: var(--text);
  font-family: inherit;
  font-size:16px;
  padding: 2px 6px;
  border-radius: 3px;
  outline: none;
  width: 120px;
}

/* ── Dropdown Menu ── */
.dropdown {
  position: relative;
  display: inline-block;
}

.dropdown-menu {
  display: none;
  position: absolute;
  top: 100%;
  right: 0;
  min-width: 180px;
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 6px;
  padding: 4px;
  z-index: 100;
  box-shadow: 0 8px 24px rgba(0,0,0,0.5);
  margin-top: 4px;
}

.dropdown-menu.show { display: block; }

.dropdown-item {
  display: flex;
  align-items: center;
  gap: 8px;
  padding: 8px 12px;
  font-size: 12px;
  color: var(--text-dim);
  border-radius: 4px;
  cursor: pointer;
  width: 100%;
  text-align: left;
}

.dropdown-item:hover {
  background: rgba(0, 212, 255, 0.08);
  color: var(--cyan);
}

/* ── View Modes ── */
.main.editor-only .pane.preview-pane,
.main.editor-only .divider { display: none; }
.main.preview-only .pane.editor-pane,
.main.preview-only .divider { display: none; }

/* ── Mobile ── */
@media (max-width: 768px) {
  .main { flex-direction: column; }
  .divider {
    width: auto;
    height: 3px;
    cursor: row-resize;
  }
  .brand-name, .brand-sep { display: none; }
  .tool-btn .shortcut { display: none; }
  .header-actions .btn span.label { display: none; }
}

/* ── Toast ── */
.toast {
  position: fixed;
  bottom: 40px;
  left: 50%;
  transform: translateX(-50%) translateY(20px);
  background: var(--surface);
  border: 1px solid var(--cyan);
  color: var(--cyan);
  padding: 8px 20px;
  border-radius: 6px;
  font-size: 12px;
  opacity: 0;
  transition: all 0.3s;
  z-index: 200;
  pointer-events: none;
}

.toast.show {
  opacity: 1;
  transform: translateX(-50%) translateY(0);
}

/* Mobile-first touch targets */
button,select,.btn,.tool-btn,.doc-tab,.new-doc-btn,[role="button"]{min-height:44px;touch-action:manipulation}
input,textarea,select{font-size:16px}
</style>
</head>
<body>

<!-- Header -->
<div class="header">
  <div class="brand">
    <div class="brand-icon">KE</div>
    <span class="brand-name">Korb Engineering</span>
    <span class="brand-sep">|</span>
    <span class="brand-title">Markdown Editor</span>
  </div>
  <div class="header-actions">
    <button class="btn" id="viewSplit" title="Split View">Split</button>
    <button class="btn" id="viewEditor" title="Editor Only">Editor</button>
    <button class="btn" id="viewPreview" title="Preview Only">Preview</button>
    <div class="tool-sep"></div>
    <div class="dropdown">
      <button class="btn btn-orange" id="fileMenuBtn">File</button>
      <div class="dropdown-menu" id="fileMenu">
        <button class="dropdown-item" onclick="importMd()">Import .md</button>
        <button class="dropdown-item" onclick="exportMd()">Export as .md</button>
        <button class="dropdown-item" onclick="exportHtml()">Export as .html</button>
      </div>
    </div>
  </div>
</div>

<!-- Document Tabs -->
<div class="doc-bar" id="docBar">
  <button class="new-doc-btn" id="newDocBtn" title="New Document">+</button>
</div>

<!-- Toolbar -->
<div class="toolbar" id="toolbar">
  <button class="tool-btn" data-action="bold" title="Bold"><b>B</b><span class="shortcut">^B</span></button>
  <button class="tool-btn" data-action="italic" title="Italic"><i>I</i><span class="shortcut">^I</span></button>
  <button class="tool-btn" data-action="strikethrough" title="Strikethrough"><s>S</s></button>
  <div class="tool-sep"></div>
  <button class="tool-btn" data-action="h1" title="Heading 1">H1</button>
  <button class="tool-btn" data-action="h2" title="Heading 2">H2</button>
  <button class="tool-btn" data-action="h3" title="Heading 3">H3</button>
  <div class="tool-sep"></div>
  <button class="tool-btn" data-action="link" title="Link">Link</button>
  <button class="tool-btn" data-action="image" title="Image">Img</button>
  <button class="tool-btn" data-action="code" title="Inline Code">Code</button>
  <button class="tool-btn" data-action="codeblock" title="Code Block">{ }</button>
  <div class="tool-sep"></div>
  <button class="tool-btn" data-action="ul" title="Unordered List">- List</button>
  <button class="tool-btn" data-action="ol" title="Ordered List">1. List</button>
  <button class="tool-btn" data-action="quote" title="Blockquote">> Quote</button>
  <button class="tool-btn" data-action="table" title="Table">Table</button>
  <button class="tool-btn" data-action="hr" title="Horizontal Rule">--- HR</button>
</div>

<!-- Main Editor Area -->
<div class="main" id="mainArea">
  <div class="pane editor-pane">
    <div class="pane-header"><span>EDITOR</span><span id="editorCursor"></span></div>
    <div class="editor-wrap">
      <div class="editor-container">
        <textarea id="editor" spellcheck="false" placeholder="Start writing markdown..."></textarea>
      </div>
    </div>
  </div>
  <div class="divider" id="divider"></div>
  <div class="pane preview-pane">
    <div class="pane-header"><span>PREVIEW</span></div>
    <div class="preview-wrap">
      <div id="preview"></div>
    </div>
  </div>
</div>

<!-- Status Bar -->
<div class="status-bar">
  <div class="status-left">
    <span><span class="status-indicator" id="saveIndicator"></span><span id="saveStatus">Saved</span></span>
    <span id="wordCount">0 words</span>
    <span id="charCount">0 chars</span>
  </div>
  <div class="status-right">
    <span id="lineInfo">Ln 1, Col 1</span>
    <span>Markdown</span>
  </div>
</div>

<!-- Toast -->
<div class="toast" id="toast"></div>

<!-- Hidden file input -->
<input type="file" id="fileInput" accept=".md,.markdown,.txt" style="display:none">

<script>
// ── State ──
let docs = [];
let activeDocId = null;
let autoSaveTimer = null;
let dirty = false;

const editor = document.getElementById('editor');
const preview = document.getElementById('preview');
const docBar = document.getElementById('docBar');
const mainArea = document.getElementById('mainArea');
const toast = document.getElementById('toast');
const fileInput = document.getElementById('fileInput');

// ── Initialize ──
function init() {
  loadDocs();
  if (docs.length === 0) {
    createDoc('Untitled', '# Welcome to Korb Engineering Markdown Editor\n\nStart writing your markdown here. This editor supports:\n\n- **Bold** and *italic* text\n- ~~Strikethrough~~\n- `Inline code` and code blocks\n- [Links](https://example.com)\n- Lists, tables, blockquotes, and more\n\n> Built for engineers who value precision.\n\n```\nconst greeting = "Hello, Korb Engineering!";\nconsole.log(greeting);\n```\n\n| Feature | Status |\n| --- | --- |\n| Live Preview | Ready |\n| Auto-save | Active |\n| Export | Enabled |\n\n---\n\n*Happy writing!*\n');
  }
  renderTabs();
  switchDoc(activeDocId || docs[0].id);
  startAutoSave();
  setViewMode('split');
}

// ── Documents ──
function genId() { return Date.now().toString(36) + Math.random().toString(36).slice(2, 7); }

function createDoc(name, content) {
  const doc = { id: genId(), name: name || 'Untitled', content: content || '', created: Date.now() };
  docs.push(doc);
  activeDocId = doc.id;
  saveDocs();
  renderTabs();
  switchDoc(doc.id);
  return doc;
}

function deleteDoc(id) {
  if (docs.length <= 1) { showToast('Cannot delete the last document'); return; }
  if (!confirm('Delete this document?')) return;
  docs = docs.filter(d => d.id !== id);
  if (activeDocId === id) {
    activeDocId = docs[0].id;
    switchDoc(activeDocId);
  }
  saveDocs();
  renderTabs();
}

function switchDoc(id) {
  const prev = docs.find(d => d.id === activeDocId);
  if (prev) prev.content = editor.value;
  activeDocId = id;
  const doc = docs.find(d => d.id === id);
  if (doc) {
    editor.value = doc.content;
    updatePreview();
    updateCounts();
  }
  renderTabs();
}

function renameDoc(id) {
  const doc = docs.find(d => d.id === id);
  if (!doc) return;
  const tab = document.querySelector(`[data-doc-id="${id}"] .tab-name`);
  if (!tab) return;
  const input = document.createElement('input');
  input.className = 'rename-input';
  input.value = doc.name;
  tab.replaceWith(input);
  input.focus();
  input.select();
  const finish = () => {
    doc.name = input.value.trim() || 'Untitled';
    saveDocs();
    renderTabs();
  };
  input.addEventListener('blur', finish);
  input.addEventListener('keydown', e => { if (e.key === 'Enter') { e.preventDefault(); input.blur(); } if (e.key === 'Escape') { input.blur(); } });
}

function renderTabs() {
  const tabs = docBar.querySelectorAll('.doc-tab');
  tabs.forEach(t => t.remove());
  const btn = document.getElementById('newDocBtn');
  docs.forEach(doc => {
    const tab = document.createElement('div');
    tab.className = 'doc-tab' + (doc.id === activeDocId ? ' active' : '');
    tab.dataset.docId = doc.id;
    tab.innerHTML = `<span class="tab-name">${escHtml(doc.name)}</span><span class="close-tab" title="Close">&times;</span>`;
    tab.querySelector('.tab-name').addEventListener('click', () => switchDoc(doc.id));
    tab.querySelector('.tab-name').addEventListener('dblclick', (e) => { e.stopPropagation(); renameDoc(doc.id); });
    tab.querySelector('.close-tab').addEventListener('click', (e) => { e.stopPropagation(); deleteDoc(doc.id); });
    docBar.insertBefore(tab, btn);
  });
}

// ── Storage ──
const STORAGE_KEY = 'korb_md_editor_docs';
const ACTIVE_KEY = 'korb_md_editor_active';

function saveDocs() {
  const cur = docs.find(d => d.id === activeDocId);
  if (cur) cur.content = editor.value;
  try {
    localStorage.setItem(STORAGE_KEY, JSON.stringify(docs));
    localStorage.setItem(ACTIVE_KEY, activeDocId);
  } catch(e) {}
  dirty = false;
  document.getElementById('saveIndicator').style.background = 'var(--success)';
  document.getElementById('saveStatus').textContent = 'Saved';
}

function loadDocs() {
  try {
    const d = JSON.parse(localStorage.getItem(STORAGE_KEY));
    if (Array.isArray(d) && d.length) docs = d;
    activeDocId = localStorage.getItem(ACTIVE_KEY) || (docs[0] && docs[0].id);
  } catch(e) {}
}

function startAutoSave() {
  setInterval(() => {
    if (dirty) saveDocs();
  }, 2000);
}

function markDirty() {
  dirty = true;
  document.getElementById('saveIndicator').style.background = 'var(--orange)';
  document.getElementById('saveStatus').textContent = 'Unsaved';
}

// ── Markdown Parser ──
function parseMd(src) {
  // Escape HTML
  function esc(s) { return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }

  // Process inline markdown
  function inline(s) {
    s = esc(s);
    // Images before links
    s = s.replace(/!\[([^\]]*)\]\(([^)]+)\)/g, '<img src="$2" alt="$1" />');
    // Links
    s = s.replace(/\[([^\]]+)\]\(([^)]+)\)/g, '<a href="$2" target="_blank" rel="noopener">$1</a>');
    // Bold + italic
    s = s.replace(/\*\*\*(.+?)\*\*\*/g, '<strong><em>$1</em></strong>');
    s = s.replace(/___(.+?)___/g, '<strong><em>$1</em></strong>');
    // Bold
    s = s.replace(/\*\*(.+?)\*\*/g, '<strong>$1</strong>');
    s = s.replace(/__(.+?)__/g, '<strong>$1</strong>');
    // Italic
    s = s.replace(/\*(.+?)\*/g, '<em>$1</em>');
    s = s.replace(/_(.+?)_/g, '<em>$1</em>');
    // Strikethrough
    s = s.replace(/~~(.+?)~~/g, '<del>$1</del>');
    // Inline code
    s = s.replace(/`([^`]+)`/g, '<code>$1</code>');
    return s;
  }

  const lines = src.split('\n');
  let html = '';
  let i = 0;

  while (i < lines.length) {
    const line = lines[i];

    // Blank line
    if (line.trim() === '') { i++; continue; }

    // Code block
    if (line.trimStart().startsWith('```')) {
      const lang = line.trim().slice(3).trim();
      let code = '';
      i++;
      while (i < lines.length && !lines[i].trimStart().startsWith('```')) {
        code += esc(lines[i]) + '\n';
        i++;
      }
      i++; // skip closing ```
      html += `<pre><code>${code}</code></pre>`;
      continue;
    }

    // Headings
    const hMatch = line.match(/^(#{1,6})\s+(.+)/);
    if (hMatch) {
      const level = hMatch[1].length;
      html += `<h${level}>${inline(hMatch[2])}</h${level}>`;
      i++;
      continue;
    }

    // Horizontal rule
    if (/^(\*{3,}|-{3,}|_{3,})\s*$/.test(line.trim())) {
      html += '<hr>';
      i++;
      continue;
    }

    // Table
    if (i + 1 < lines.length && /^\|.*\|/.test(line) && /^\|[\s\-:|]+\|/.test(lines[i+1])) {
      let tableHtml = '<table><thead><tr>';
      const headers = line.split('|').filter((c, idx, arr) => idx > 0 && idx < arr.length - 1);
      headers.forEach(h => { tableHtml += `<th>${inline(h.trim())}</th>`; });
      tableHtml += '</tr></thead><tbody>';
      i += 2; // skip header + separator
      while (i < lines.length && /^\|.*\|/.test(lines[i])) {
        const cells = lines[i].split('|').filter((c, idx, arr) => idx > 0 && idx < arr.length - 1);
        tableHtml += '<tr>';
        cells.forEach(c => { tableHtml += `<td>${inline(c.trim())}</td>`; });
        tableHtml += '</tr>';
        i++;
      }
      tableHtml += '</tbody></table>';
      html += tableHtml;
      continue;
    }

    // Blockquote
    if (line.trimStart().startsWith('>')) {
      let bqLines = [];
      while (i < lines.length && (lines[i].trimStart().startsWith('>') || (lines[i].trim() !== '' && bqLines.length > 0 && !lines[i].match(/^#{1,6}\s/) && !lines[i].match(/^(\*{3,}|-{3,}|_{3,})\s*$/)))) {
        if (lines[i].trimStart().startsWith('>')) {
          bqLines.push(lines[i].trimStart().replace(/^>\s?/, ''));
        } else {
          break;
        }
        i++;
      }
      html += `<blockquote>${bqLines.map(l => `<p>${inline(l)}</p>`).join('')}</blockquote>`;
      continue;
    }

    // Unordered list
    if (/^\s*[-*+]\s+/.test(line)) {
      html += '<ul>';
      while (i < lines.length && /^\s*[-*+]\s+/.test(lines[i])) {
        html += `<li>${inline(lines[i].replace(/^\s*[-*+]\s+/, ''))}</li>`;
        i++;
      }
      html += '</ul>';
      continue;
    }

    // Ordered list
    if (/^\s*\d+\.\s+/.test(line)) {
      html += '<ol>';
      while (i < lines.length && /^\s*\d+\.\s+/.test(lines[i])) {
        html += `<li>${inline(lines[i].replace(/^\s*\d+\.\s+/, ''))}</li>`;
        i++;
      }
      html += '</ol>';
      continue;
    }

    // Paragraph
    let para = [];
    while (i < lines.length && lines[i].trim() !== '' && !lines[i].match(/^#{1,6}\s/) && !lines[i].trimStart().startsWith('```') && !lines[i].trimStart().startsWith('>') && !/^\s*[-*+]\s+/.test(lines[i]) && !/^\s*\d+\.\s+/.test(lines[i]) && !/^(\*{3,}|-{3,}|_{3,})\s*$/.test(lines[i].trim()) && !/^\|.*\|/.test(lines[i])) {
      para.push(lines[i]);
      i++;
    }
    if (para.length) {
      html += `<p>${inline(para.join(' '))}</p>`;
    }
  }

  return html;
}

function escHtml(s) { return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }

// ── Preview ──
function updatePreview() {
  preview.innerHTML = parseMd(editor.value);
}

// ── Counts ──
function updateCounts() {
  const text = editor.value;
  const words = text.trim() === '' ? 0 : text.trim().split(/\s+/).length;
  const chars = text.length;
  document.getElementById('wordCount').textContent = words + ' word' + (words !== 1 ? 's' : '');
  document.getElementById('charCount').textContent = chars + ' char' + (chars !== 1 ? 's' : '');
}

function updateCursorPos() {
  const val = editor.value;
  const pos = editor.selectionStart;
  const before = val.substring(0, pos);
  const line = before.split('\n').length;
  const col = pos - before.lastIndexOf('\n');
  document.getElementById('lineInfo').textContent = `Ln ${line}, Col ${col}`;
}

// ── Editor Events ──
editor.addEventListener('input', () => {
  markDirty();
  updatePreview();
  updateCounts();
});

editor.addEventListener('keyup', updateCursorPos);
editor.addEventListener('click', updateCursorPos);

// ── Toolbar Actions ──
function insertAtCursor(before, after, placeholder) {
  editor.focus();
  const start = editor.selectionStart;
  const end = editor.selectionEnd;
  const selected = editor.value.substring(start, end);
  const text = selected || placeholder || '';
  const newText = before + text + (after || '');
  editor.setRangeText(newText, start, end, 'select');
  // Select the placeholder
  if (!selected && placeholder) {
    editor.selectionStart = start + before.length;
    editor.selectionEnd = start + before.length + placeholder.length;
  } else {
    editor.selectionStart = start + newText.length;
    editor.selectionEnd = start + newText.length;
  }
  editor.dispatchEvent(new Event('input'));
}

function insertAtLineStart(prefix) {
  editor.focus();
  const start = editor.selectionStart;
  const val = editor.value;
  const lineStart = val.lastIndexOf('\n', start - 1) + 1;
  editor.setRangeText(prefix, lineStart, lineStart, 'end');
  editor.dispatchEvent(new Event('input'));
}

const toolbarActions = {
  bold: () => insertAtCursor('**', '**', 'bold text'),
  italic: () => insertAtCursor('*', '*', 'italic text'),
  strikethrough: () => insertAtCursor('~~', '~~', 'strikethrough'),
  h1: () => insertAtLineStart('# '),
  h2: () => insertAtLineStart('## '),
  h3: () => insertAtLineStart('### '),
  link: () => insertAtCursor('[', '](https://url)', 'link text'),
  image: () => insertAtCursor('![', '](https://image-url)', 'alt text'),
  code: () => insertAtCursor('`', '`', 'code'),
  codeblock: () => insertAtCursor('```\n', '\n```', 'code here'),
  ul: () => insertAtLineStart('- '),
  ol: () => insertAtLineStart('1. '),
  quote: () => insertAtLineStart('> '),
  table: () => {
    const tbl = '\n| Header 1 | Header 2 | Header 3 |\n| --- | --- | --- |\n| Cell 1 | Cell 2 | Cell 3 |\n| Cell 4 | Cell 5 | Cell 6 |\n';
    insertAtCursor(tbl, '', '');
  },
  hr: () => insertAtCursor('\n---\n', '', ''),
};

document.getElementById('toolbar').addEventListener('click', e => {
  const btn = e.target.closest('.tool-btn');
  if (!btn) return;
  const action = btn.dataset.action;
  if (toolbarActions[action]) toolbarActions[action]();
});

// ── Keyboard Shortcuts ──
document.addEventListener('keydown', e => {
  const mod = e.ctrlKey || e.metaKey;
  if (mod && e.key === 'b') { e.preventDefault(); toolbarActions.bold(); }
  if (mod && e.key === 'i') { e.preventDefault(); toolbarActions.italic(); }
  if (mod && e.key === 's') { e.preventDefault(); exportMd(); showToast('Exported as .md'); }
});

// Tab key in editor
editor.addEventListener('keydown', e => {
  if (e.key === 'Tab') {
    e.preventDefault();
    insertAtCursor('  ', '', '');
  }
});

// ── View Modes ──
function setViewMode(mode) {
  mainArea.classList.remove('editor-only', 'preview-only');
  document.querySelectorAll('#viewSplit,#viewEditor,#viewPreview').forEach(b => b.classList.remove('active'));
  if (mode === 'editor') { mainArea.classList.add('editor-only'); document.getElementById('viewEditor').classList.add('active'); }
  else if (mode === 'preview') { mainArea.classList.add('preview-only'); document.getElementById('viewPreview').classList.add('active'); }
  else { document.getElementById('viewSplit').classList.add('active'); }
}

document.getElementById('viewSplit').addEventListener('click', () => setViewMode('split'));
document.getElementById('viewEditor').addEventListener('click', () => setViewMode('editor'));
document.getElementById('viewPreview').addEventListener('click', () => setViewMode('preview'));

// ── Divider Drag ──
(function() {
  const divider = document.getElementById('divider');
  let dragging = false;
  divider.addEventListener('mousedown', e => {
    dragging = true;
    divider.classList.add('dragging');
    document.body.style.cursor = 'col-resize';
    document.body.style.userSelect = 'none';
    e.preventDefault();
  });
  document.addEventListener('mousemove', e => {
    if (!dragging) return;
    const rect = mainArea.getBoundingClientRect();
    const pct = ((e.clientX - rect.left) / rect.width) * 100;
    const editorPane = mainArea.querySelector('.editor-pane');
    const previewPane = mainArea.querySelector('.preview-pane');
    if (pct > 20 && pct < 80) {
      editorPane.style.flex = 'none';
      editorPane.style.width = pct + '%';
      previewPane.style.flex = '1';
    }
  });
  document.addEventListener('mouseup', () => {
    if (dragging) {
      dragging = false;
      divider.classList.remove('dragging');
      document.body.style.cursor = '';
      document.body.style.userSelect = '';
    }
  });
})();

// ── File Import/Export ──
function importMd() {
  fileInput.click();
}

fileInput.addEventListener('change', e => {
  const file = e.target.files[0];
  if (!file) return;
  const reader = new FileReader();
  reader.onload = ev => {
    const name = file.name.replace(/\.(md|markdown|txt)$/i, '');
    createDoc(name, ev.target.result);
    showToast('Imported: ' + file.name);
  };
  reader.readAsText(file);
  fileInput.value = '';
});

function exportMd() {
  const doc = docs.find(d => d.id === activeDocId);
  if (!doc) return;
  doc.content = editor.value;
  downloadFile(doc.name + '.md', editor.value, 'text/markdown');
  showToast('Exported as ' + doc.name + '.md');
}

function exportHtml() {
  const doc = docs.find(d => d.id === activeDocId);
  if (!doc) return;
  doc.content = editor.value;
  const htmlContent = `<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>${escHtml(doc.name)}</title>
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;600;700&display=swap" rel="stylesheet">
<style>
body { max-width: 800px; margin: 40px auto; padding: 0 20px; background: #050a0f; color: #e2e8f0; font-family: 'JetBrains Mono', monospace; font-size: 14px; line-height: 1.7; }
h1,h2,h3,h4,h5,h6 { color: #ff6600; margin: 1.2em 0 0.6em; }
h1 { border-bottom: 2px solid #1a2535; padding-bottom: 0.3em; }
h2 { border-bottom: 1px solid #1a2535; padding-bottom: 0.2em; }
strong { color: #00d4ff; }
em { color: #bb88ff; }
code { background: rgba(0,204,102,0.08); color: #00cc66; padding: 2px 6px; border-radius: 4px; }
pre { background: #0a1018; border: 1px solid #1a2535; border-radius: 6px; padding: 16px; overflow-x: auto; }
pre code { background: none; color: #e2e8f0; padding: 0; }
blockquote { border-left: 3px solid #00d4ff; padding: 0.5em 1em; margin: 1em 0; color: #8899aa; }
a { color: #00d4ff; }
table { border-collapse: collapse; width: 100%; margin: 1em 0; }
th, td { border: 1px solid #1a2535; padding: 8px 12px; text-align: left; }
th { background: #0a1018; color: #00d4ff; }
hr { border: none; height: 1px; background: #1a2535; margin: 2em 0; }
img { max-width: 100%; border-radius: 6px; }
ul, ol { padding-left: 2em; }
</style>
</head>
<body>
${parseMd(editor.value)}
</body>
</html>`;
  downloadFile(doc.name + '.html', htmlContent, 'text/html');
  showToast('Exported as ' + doc.name + '.html');
}

function downloadFile(name, content, type) {
  const blob = new Blob([content], { type: type + ';charset=utf-8' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  a.download = name;
  document.body.appendChild(a);
  a.click();
  document.body.removeChild(a);
  URL.revokeObjectURL(url);
}

// ── Dropdown ──
document.getElementById('fileMenuBtn').addEventListener('click', e => {
  e.stopPropagation();
  document.getElementById('fileMenu').classList.toggle('show');
});

document.addEventListener('click', () => {
  document.getElementById('fileMenu').classList.remove('show');
});

// ── New Doc ──
document.getElementById('newDocBtn').addEventListener('click', () => {
  createDoc('Untitled');
});

// ── Toast ──
function showToast(msg) {
  toast.textContent = msg;
  toast.classList.add('show');
  setTimeout(() => toast.classList.remove('show'), 2000);
}

// ── Init ──
init();
</script>
</body>
</html>
