<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mary Kay's Recipes</title>
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
--bg:#050a0f;--surface:#0a1018;--surface2:#0e1520;--border:#1a2535;
--cyan:#00d4ff;--orange:#ff6600;--green:#10b981;--red:#ef4444;
--text:#e2e8f0;--text-dim:#64748b;--text-bright:#f8fafc;
--yellow:#fbbf24;
}
html{font-size:16px;scroll-behavior:smooth}
body{font-family:'JetBrains Mono',monospace;background:var(--bg);color:var(--text);min-height:100vh;line-height:1.6}
input,select,textarea,button{font-family:'JetBrains Mono',monospace;font-size:16px}
input,select,textarea{background:var(--surface);color:var(--text);border:1px solid var(--border);border-radius:6px;padding:10px 12px;width:100%;outline:none;transition:border-color .2s}
input:focus,select:focus,textarea:focus{border-color:var(--cyan)}
textarea{resize:vertical;min-height:80px}
button{cursor:pointer;border:none;border-radius:6px;padding:10px 16px;font-weight:500;transition:all .2s;min-height:44px;min-width:44px}
.btn-primary{background:var(--cyan);color:var(--bg);font-weight:600}
.btn-primary:hover{background:#33ddff;transform:translateY(-1px)}
.btn-orange{background:var(--orange);color:#fff;font-weight:600}
.btn-orange:hover{background:#ff8533}
.btn-green{background:var(--green);color:#fff;font-weight:600}
.btn-green:hover{background:#34d399}
.btn-red{background:var(--red);color:#fff;font-weight:600}
.btn-red:hover{background:#f87171}
.btn-ghost{background:transparent;color:var(--text-dim);border:1px solid var(--border)}
.btn-ghost:hover{border-color:var(--cyan);color:var(--cyan)}
.btn-ghost.active{border-color:var(--cyan);color:var(--cyan);background:rgba(0,212,255,.08)}

header{background:var(--surface);border-bottom:1px solid var(--border);padding:16px 20px;position:sticky;top:0;z-index:100}
.header-inner{max-width:1200px;margin:0 auto;display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:12px}
.header-title{font-size:1.4rem;font-weight:700;color:var(--orange)}
.header-title span{color:var(--text-dim);font-size:.8rem;font-weight:400;margin-left:8px}
.header-actions{display:flex;gap:8px;flex-wrap:wrap}

nav{background:var(--surface2);border-bottom:1px solid var(--border);padding:8px 20px;position:sticky;top:60px;z-index:99;overflow-x:auto}
.nav-inner{max-width:1200px;margin:0 auto;display:flex;gap:4px}
.nav-btn{padding:8px 14px;border-radius:6px;background:transparent;color:var(--text-dim);font-size:.8rem;font-weight:500;white-space:nowrap;min-height:44px;border:none}
.nav-btn:hover{color:var(--text)}
.nav-btn.active{color:var(--cyan);background:rgba(0,212,255,.08)}

main{max-width:1200px;margin:0 auto;padding:20px}
.view{display:none}
.view.active{display:block}

label{display:block;font-size:.75rem;color:var(--text-dim);margin-bottom:4px;text-transform:uppercase;letter-spacing:.5px;font-weight:500}
.form-row{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:12px}
.form-group{margin-bottom:12px}
.form-row-3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:12px;margin-bottom:12px}

.card{background:var(--surface);border:1px solid var(--border);border-radius:10px;overflow:hidden;transition:all .2s}
.card:hover{border-color:var(--cyan);transform:translateY(-2px)}
.card-img{width:100%;height:180px;object-fit:cover;background:var(--surface2);display:flex;align-items:center;justify-content:center;color:var(--text-dim);font-size:2.5rem}
.card-body{padding:14px}
.card-title{font-weight:600;font-size:.95rem;margin-bottom:6px;color:var(--text-bright)}
.card-meta{font-size:.7rem;color:var(--text-dim);display:flex;gap:10px;flex-wrap:wrap;margin-bottom:6px}
.card-badges{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:6px}
.badge{font-size:.65rem;padding:2px 8px;border-radius:10px;font-weight:600}
.badge-fav{background:rgba(251,191,36,.15);color:var(--yellow);border:1px solid rgba(251,191,36,.3)}
.badge-holiday{background:rgba(239,68,68,.15);color:var(--red);border:1px solid rgba(239,68,68,.3)}
.badge-cat{background:rgba(0,212,255,.1);color:var(--cyan);border:1px solid rgba(0,212,255,.2)}
.stars{color:var(--yellow);letter-spacing:2px;font-size:.85rem}
.stars-input{cursor:pointer;font-size:1.3rem}
.stars-input span{opacity:.3;transition:opacity .2s}
.stars-input span.active{opacity:1}

.grid-view{display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));gap:16px}
.list-view .card{display:flex;flex-direction:row;margin-bottom:8px}
.list-view .card-img{width:120px;height:100px;min-width:120px}
.list-view .card-body{display:flex;align-items:center;gap:16px;flex:1;flex-wrap:wrap}

.filter-bar{display:flex;gap:10px;margin-bottom:20px;flex-wrap:wrap;align-items:center}
.filter-bar input,.filter-bar select{max-width:220px}
.quick-filters{display:flex;gap:6px;flex-wrap:wrap}

.detail-hero{position:relative;width:100%;max-height:400px;overflow:hidden;border-radius:10px;margin-bottom:20px;background:var(--surface)}
.detail-hero img{width:100%;max-height:400px;object-fit:cover}
.detail-hero .placeholder{height:200px;display:flex;align-items:center;justify-content:center;font-size:4rem;color:var(--text-dim)}
.time-bar{display:flex;gap:20px;background:var(--surface);border:1px solid var(--border);border-radius:8px;padding:14px 20px;margin-bottom:20px;flex-wrap:wrap}
.time-item{text-align:center}
.time-item .val{font-size:1.2rem;font-weight:700;color:var(--cyan)}
.time-item .lbl{font-size:.65rem;color:var(--text-dim);text-transform:uppercase}
.multiplier-bar{display:flex;align-items:center;gap:10px;margin-bottom:16px;flex-wrap:wrap}
.multiplier-bar button{min-width:48px}
.ingredient-check{display:flex;align-items:flex-start;gap:10px;padding:6px 0;font-size:.85rem}
.ingredient-check input[type=checkbox]{min-width:20px;min-height:20px;margin-top:2px;accent-color:var(--cyan)}
.ingredient-check.checked{text-decoration:line-through;color:var(--text-dim)}
.step-item{display:flex;gap:12px;margin-bottom:14px}
.step-num{min-width:32px;height:32px;border-radius:50%;background:var(--cyan);color:var(--bg);display:flex;align-items:center;justify-content:center;font-weight:700;font-size:.8rem;flex-shrink:0}
.step-text{font-size:.85rem;padding-top:5px}
.detail-actions{display:flex;gap:8px;margin-bottom:20px;flex-wrap:wrap}

.section-title{font-size:1rem;font-weight:600;color:var(--cyan);margin:20px 0 12px;padding-bottom:6px;border-bottom:1px solid var(--border)}

.ing-row{display:grid;grid-template-columns:80px 80px 1fr 40px;gap:8px;margin-bottom:6px;align-items:center}
.ing-row.section-header-row{grid-template-columns:1fr 40px}
.ing-section-input{font-weight:600;color:var(--orange)}
.remove-btn{min-width:40px;min-height:40px;background:var(--red);color:#fff;border-radius:6px;display:flex;align-items:center;justify-content:center;font-size:1.1rem;border:none;cursor:pointer}
.add-btn-row{display:flex;gap:8px;margin-top:8px}

.planner-grid{display:grid;grid-template-columns:80px repeat(7,1fr);gap:2px;font-size:.7rem;overflow-x:auto}
.planner-header{background:var(--surface2);padding:8px 4px;text-align:center;font-weight:600;color:var(--cyan);border-radius:4px}
.planner-label{background:var(--surface2);padding:8px 4px;display:flex;align-items:center;justify-content:center;font-weight:500;color:var(--orange);border-radius:4px}
.planner-cell{background:var(--surface);border:1px solid var(--border);border-radius:4px;padding:4px;min-height:60px;cursor:pointer;transition:border-color .2s}
.planner-cell:hover{border-color:var(--cyan)}
.planner-cell .meal-chip{background:rgba(0,212,255,.1);color:var(--cyan);padding:2px 4px;border-radius:3px;margin:2px 0;font-size:.6rem;display:flex;align-items:center;gap:2px}
.planner-cell .meal-chip .remove-meal{cursor:pointer;color:var(--red);font-weight:700}

.shopping-section{margin-bottom:16px}
.shopping-section h3{font-size:.85rem;color:var(--orange);margin-bottom:8px;padding:6px 10px;background:var(--surface2);border-radius:6px}
.shopping-item{display:flex;align-items:center;gap:10px;padding:6px 10px;font-size:.8rem}
.shopping-item input[type=checkbox]{min-width:20px;min-height:20px;accent-color:var(--green)}
.shopping-item.checked{text-decoration:line-through;color:var(--text-dim)}

.checkbox-row{display:flex;align-items:center;gap:10px;margin-bottom:8px}
.checkbox-row input[type=checkbox]{min-width:22px;min-height:22px;accent-color:var(--cyan)}
.tag-input-wrap{display:flex;gap:8px;align-items:center;flex-wrap:wrap}
.tag{display:inline-flex;align-items:center;gap:4px;background:rgba(0,212,255,.1);color:var(--cyan);padding:4px 10px;border-radius:12px;font-size:.7rem;margin:2px}
.tag .remove-tag{cursor:pointer;font-weight:700}
.photo-preview{max-width:200px;max-height:200px;border-radius:8px;margin-top:8px}

.modal-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.7);z-index:200;align-items:center;justify-content:center;padding:20px}
.modal-overlay.show{display:flex}
.modal{background:var(--surface);border:1px solid var(--border);border-radius:12px;padding:24px;max-width:500px;width:100%;max-height:90vh;overflow-y:auto}
.modal h2{font-size:1rem;color:var(--cyan);margin-bottom:16px}
.modal-actions{display:flex;gap:8px;justify-content:flex-end;margin-top:16px}

.recipe-select-list{max-height:300px;overflow-y:auto}
.recipe-select-item{display:flex;align-items:center;gap:10px;padding:8px;border-bottom:1px solid var(--border);font-size:.8rem}
.recipe-select-item input{min-width:20px;min-height:20px;accent-color:var(--cyan)}

.random-result{text-align:center;padding:30px;background:var(--surface);border:2px solid var(--orange);border-radius:12px;margin:20px 0}
.random-result h2{color:var(--orange);font-size:1.3rem;margin-bottom:8px}
.random-result p{color:var(--text-dim);font-size:.85rem}

.empty-state{text-align:center;padding:60px 20px;color:var(--text-dim)}
.empty-state .icon{font-size:3rem;margin-bottom:12px}
.empty-state p{margin-bottom:16px}

@media(max-width:640px){
.form-row,.form-row-3{grid-template-columns:1fr}
.header-inner{flex-direction:column;align-items:flex-start}
.grid-view{grid-template-columns:1fr}
.planner-grid{font-size:.6rem}
.planner-grid{grid-template-columns:60px repeat(7,minmax(70px,1fr))}
.time-bar{gap:12px}
.ing-row{grid-template-columns:60px 60px 1fr 36px}
}

@media print{
body{background:#fff;color:#000}
header,nav,.detail-actions,.filter-bar,.header-actions,button{display:none!important}
.card,.time-bar{border-color:#ccc}
.view{display:block!important}
}
</style>
</head>
<body>

<header>
<div class="header-inner">
<div class="header-title">Mary Kay's Recipes <span id="recipeCount">0 recipes</span></div>
<div class="header-actions">
<button class="btn-orange" onclick="randomRecipe()">What should I make?</button>
<button class="btn-ghost" onclick="showView('import-export')">Import/Export</button>
</div>
</div>
</header>

<nav>
<div class="nav-inner">
<button class="nav-btn active" data-view="library" onclick="showView('library')">Library</button>
<button class="nav-btn" data-view="add-recipe" onclick="showView('add-recipe')">+ Add Recipe</button>
<button class="nav-btn" data-view="shopping" onclick="showView('shopping')">Shopping List</button>
<button class="nav-btn" data-view="planner" onclick="showView('planner')">Meal Planner</button>
<button class="nav-btn" data-view="import-export" onclick="showView('import-export')">Import/Export</button>
</div>
</nav>

<main>

<!-- LIBRARY VIEW -->
<div id="view-library" class="view active">
<div class="filter-bar">
<input type="text" id="searchInput" placeholder="Search recipes or ingredients..." oninput="renderLibrary()" style="max-width:280px">
<select id="filterCategory" onchange="renderLibrary()"><option value="">All Categories</option></select>
<select id="filterDifficulty" onchange="renderLibrary()">
<option value="">All Difficulties</option>
<option>Easy</option><option>Medium</option><option>Hard</option>
</select>
<select id="sortBy" onchange="renderLibrary()">
<option value="date-desc">Newest First</option>
<option value="date-asc">Oldest First</option>
<option value="name-asc">Name A-Z</option>
<option value="name-desc">Name Z-A</option>
<option value="rating-desc">Highest Rated</option>
</select>
</div>
<div class="quick-filters">
<button class="btn-ghost" id="qfAll" onclick="quickFilter('all')">All</button>
<button class="btn-ghost" id="qfFav" onclick="quickFilter('fav')">Family Favorites</button>
<button class="btn-ghost" id="qfHoliday" onclick="quickFilter('holiday')">Holiday Must-Makes</button>
<button class="btn-ghost" id="toggleView" onclick="toggleGridList()" title="Toggle grid/list">Grid</button>
</div>
<div id="recipeGrid" class="grid-view" style="margin-top:16px"></div>
</div>

<!-- ADD/EDIT RECIPE VIEW -->
<div id="view-add-recipe" class="view">
<h2 style="color:var(--cyan);margin-bottom:16px" id="formTitle">Add New Recipe</h2>
<input type="hidden" id="editId" value="">

<div class="form-group">
<label>Recipe Name *</label>
<input type="text" id="recipeName" placeholder="e.g., Grandma's Apple Pie">
</div>

<div class="form-row">
<div class="form-group">
<label>Category *</label>
<select id="recipeCategory"></select>
</div>
<div class="form-group">
<label>Difficulty</label>
<select id="recipeDifficulty">
<option>Easy</option><option>Medium</option><option>Hard</option>
</select>
</div>
</div>

<div class="form-row-3">
<div class="form-group"><label>Prep Time</label><input type="text" id="recipePrepTime" placeholder="15 min"></div>
<div class="form-group"><label>Cook Time</label><input type="text" id="recipeCookTime" placeholder="30 min"></div>
<div class="form-group"><label>Servings</label><input type="number" id="recipeServings" placeholder="4" min="1"></div>
</div>

<div class="form-group">
<label>Source</label>
<input type="text" id="recipeSource" placeholder="Family recipe, cookbook name, URL...">
</div>

<div class="form-row">
<div class="checkbox-row">
<input type="checkbox" id="recipeFavorite"><label style="margin:0;font-size:.85rem;color:var(--yellow)">Family Favorite</label>
</div>
<div class="checkbox-row">
<input type="checkbox" id="recipeHoliday"><label style="margin:0;font-size:.85rem;color:var(--red)">Holiday Must-Make</label>
</div>
</div>

<div class="form-group">
<label>Rating</label>
<div class="stars-input" id="ratingInput">
<span onclick="setRating(1)">&#9733;</span>
<span onclick="setRating(2)">&#9733;</span>
<span onclick="setRating(3)">&#9733;</span>
<span onclick="setRating(4)">&#9733;</span>
<span onclick="setRating(5)">&#9733;</span>
</div>
</div>

<div class="section-title">Ingredients</div>
<div id="ingredientsList"></div>
<div class="add-btn-row">
<button class="btn-ghost" onclick="addIngredientRow()">+ Ingredient</button>
<button class="btn-ghost" onclick="addSectionHeader()">+ Section Header</button>
</div>

<div class="section-title">Directions</div>
<div id="directionsList"></div>
<button class="btn-ghost" onclick="addDirectionRow()" style="margin-top:8px">+ Step</button>

<div class="form-group" style="margin-top:16px">
<label>Notes / Tips</label>
<textarea id="recipeNotes" placeholder="Any extra tips, variations, or notes..."></textarea>
</div>

<div class="form-group">
<label>Tags (press Enter to add)</label>
<div class="tag-input-wrap" id="tagsWrap">
<input type="text" id="tagInput" placeholder="Add a tag..." style="max-width:200px" onkeydown="if(event.key==='Enter'){event.preventDefault();addTag()}">
<button class="btn-ghost" onclick="addTag()" style="font-size:.75rem">Add</button>
</div>
<div id="tagsList" style="margin-top:6px"></div>
</div>

<div class="form-group">
<label>Photo</label>
<input type="file" id="recipePhoto" accept="image/*" onchange="previewPhoto(this)" style="padding:8px">
<img id="photoPreview" class="photo-preview" style="display:none">
</div>

<div style="display:flex;gap:10px;margin-top:20px">
<button class="btn-primary" onclick="saveRecipe()">Save Recipe</button>
<button class="btn-ghost" onclick="resetForm();showView('library')">Cancel</button>
</div>
</div>

<!-- DETAIL VIEW -->
<div id="view-detail" class="view">
<div id="detailContent"></div>
</div>

<!-- SHOPPING LIST VIEW -->
<div id="view-shopping" class="view">
<h2 style="color:var(--cyan);margin-bottom:16px">Shopping List</h2>
<p style="font-size:.8rem;color:var(--text-dim);margin-bottom:12px">Select recipes to build your combined shopping list.</p>
<button class="btn-primary" onclick="openRecipeSelector()" style="margin-bottom:16px">Select Recipes</button>
<button class="btn-ghost" onclick="clearShoppingChecks()" style="margin-bottom:16px">Uncheck All</button>
<button class="btn-ghost" onclick="copyShoppingList()" style="margin-bottom:16px">Copy List</button>
<button class="btn-ghost" onclick="printShoppingList()" style="margin-bottom:16px">Print</button>
<div id="shoppingContent"></div>
</div>

<!-- MEAL PLANNER VIEW -->
<div id="view-planner" class="view">
<h2 style="color:var(--cyan);margin-bottom:16px">Weekly Meal Planner</h2>
<div style="display:flex;gap:8px;margin-bottom:16px;flex-wrap:wrap">
<button class="btn-ghost" onclick="clearPlanner()">Clear Week</button>
<button class="btn-green" onclick="generatePlannerShoppingList()">Generate Shopping List</button>
</div>
<div class="planner-grid" id="plannerGrid"></div>
</div>

<!-- IMPORT/EXPORT VIEW -->
<div id="view-import-export" class="view">
<h2 style="color:var(--cyan);margin-bottom:16px">Import / Export</h2>
<div style="display:grid;grid-template-columns:1fr 1fr;gap:16px;max-width:600px">
<div>
<h3 style="color:var(--orange);font-size:.85rem;margin-bottom:10px">Export</h3>
<button class="btn-primary" onclick="exportJSON()" style="width:100%;margin-bottom:8px">Export JSON Backup</button>
<button class="btn-ghost" onclick="exportText()" style="width:100%;margin-bottom:8px">Export as Text</button>
<button class="btn-ghost" onclick="printRecipeBook()" style="width:100%">Print Recipe Book</button>
</div>
<div>
<h3 style="color:var(--orange);font-size:.85rem;margin-bottom:10px">Import</h3>
<input type="file" id="importFile" accept=".json" onchange="importJSON(this)" style="padding:8px;width:100%">
<p style="font-size:.7rem;color:var(--text-dim);margin-top:8px">Import a previously exported JSON backup file.</p>
</div>
</div>
</div>

</main>

<!-- Recipe Selector Modal -->
<div class="modal-overlay" id="recipeSelectorModal">
<div class="modal">
<h2>Select Recipes</h2>
<div class="recipe-select-list" id="recipeSelectorList"></div>
<div class="modal-actions">
<button class="btn-ghost" onclick="closeModal('recipeSelectorModal')">Cancel</button>
<button class="btn-primary" onclick="buildShoppingList()">Build List</button>
</div>
</div>
</div>

<!-- Meal Picker Modal -->
<div class="modal-overlay" id="mealPickerModal">
<div class="modal">
<h2>Pick a Recipe</h2>
<input type="text" id="mealPickerSearch" placeholder="Search..." oninput="renderMealPicker()" style="margin-bottom:12px">
<div class="recipe-select-list" id="mealPickerList"></div>
<div class="modal-actions">
<button class="btn-ghost" onclick="closeModal('mealPickerModal')">Cancel</button>
</div>
</div>
</div>

<!-- Random Recipe Modal -->
<div class="modal-overlay" id="randomModal">
<div class="modal" style="text-align:center">
<div class="random-result" id="randomResult"></div>
<div class="modal-actions" style="justify-content:center">
<button class="btn-orange" onclick="randomRecipe()">Pick Another</button>
<button class="btn-primary" id="randomGoBtn" onclick="closeModal('randomModal')" style="display:none">View Recipe</button>
<button class="btn-ghost" onclick="closeModal('randomModal')">Close</button>
</div>
</div>
</div>

<script>
const CATEGORIES = ['Appetizers','Soups','Salads','Main Dishes','Side Dishes','Breads','Breakfast','Desserts','Beverages','Sauces','Holiday','Casseroles','Slow Cooker','Snacks'];
const GROCERY_SECTIONS = {
'Produce':['lettuce','romaine','tomato','onion','garlic','potato','carrot','celery','banana','lemon','parsley','cilantro','ginger','mushroom','pepper','apple','avocado','lime','spinach','kale','broccoli','corn','pea','green bean','zucchini','squash','cucumber','jalape'],
'Meat & Seafood':['chicken','beef','pork','turkey','salmon','shrimp','bacon','sausage','steak','ground','chuck','thigh','breast','lamb'],
'Dairy & Eggs':['milk','butter','cream','egg','cheese','yogurt','sour cream','cream cheese','parmesan','mozzarella','cheddar','whipping cream','half-and-half','buttermilk'],
'Bakery & Bread':['bread','tortilla','roll','bun','pita','croissant','baguette','crouton'],
'Frozen':['frozen','ice cream'],
'Canned & Jarred':['canned','broth','stock','tomato sauce','tomato paste','diced tomatoes','salsa','coconut milk','beans'],
'Pantry & Dry Goods':['flour','sugar','rice','pasta','noodle','oat','cereal','baking soda','baking powder','vanilla','chocolate chip','cocoa','cornstarch','breadcrumb','panko','walnut','pecan','almond','oil','olive oil','vegetable oil','vinegar','soy sauce','worcestershire','honey','maple syrup','brown sugar','powdered sugar','yeast','salt','pepper','cinnamon','nutmeg','paprika','cumin','oregano','thyme','basil','chili powder','garlic powder','onion powder','bay leaf','cayenne','mustard','ketchup','mayonnaise','ranch']
};
const LS_PREFIX = 'korb_marykay_';
const DB_NAME = 'korb_marykay_recipes';

let recipes = [];
let currentRating = 0;
let currentTags = [];
let currentPhotoData = null;
let editingId = null;
let isListView = false;
let activeQuickFilter = 'all';
let mealPlan = {};
let selectedShoppingRecipes = [];

// IndexedDB
function openDB() {
  return new Promise((resolve, reject) => {
    const req = indexedDB.open(DB_NAME, 1);
    req.onupgradeneeded = e => { e.target.result.createObjectStore('photos', {keyPath:'id'}); };
    req.onsuccess = e => resolve(e.target.result);
    req.onerror = e => reject(e.target.error);
  });
}
async function savePhoto(id, data) {
  if (!data) return;
  const db = await openDB();
  const tx = db.transaction('photos','readwrite');
  tx.objectStore('photos').put({id, data});
}
async function getPhoto(id) {
  const db = await openDB();
  return new Promise(resolve => {
    const tx = db.transaction('photos','readonly');
    const req = tx.objectStore('photos').get(id);
    req.onsuccess = () => resolve(req.result ? req.result.data : null);
    req.onerror = () => resolve(null);
  });
}
async function deletePhoto(id) {
  const db = await openDB();
  const tx = db.transaction('photos','readwrite');
  tx.objectStore('photos').delete(id);
}
async function getAllPhotos() {
  const db = await openDB();
  return new Promise(resolve => {
    const tx = db.transaction('photos','readonly');
    const req = tx.objectStore('photos').getAll();
    req.onsuccess = () => resolve(req.result || []);
    req.onerror = () => resolve([]);
  });
}

// Save Recipe
async function saveRecipe() {
  const name = document.getElementById('recipeName').value.trim();
  const category = document.getElementById('recipeCategory').value;
  if (!name || !category) { alert('Recipe name and category are required.'); return; }

  const ingredients = [];
  document.querySelectorAll('#ingredientsList .ing-row').forEach(row => {
    if (row.dataset.type === 'section') {
      ingredients.push({type:'section', title: row.querySelector('input').value.trim()});
    } else {
      const inputs = row.querySelectorAll('input');
      if (inputs[2].value.trim()) {
        ingredients.push({type:'ingredient', qty:inputs[0].value.trim(), unit:inputs[1].value.trim(), name:inputs[2].value.trim()});
      }
    }
  });

  const directions = [];
  document.querySelectorAll('#directionsList .form-group textarea').forEach(ta => {
    if (ta.value.trim()) directions.push(ta.value.trim());
  });

  const id = editingId || Date.now().toString(36) + Math.random().toString(36).slice(2,6);
  const recipe = {
    id,
    name,
    category,
    difficulty: document.getElementById('recipeDifficulty').value,
    prepTime: document.getElementById('recipePrepTime').value.trim(),
    cookTime: document.getElementById('recipeCookTime').value.trim(),
    servings: parseInt(document.getElementById('recipeServings').value) || 4,
    source: document.getElementById('recipeSource').value.trim(),
    favorite: document.getElementById('recipeFavorite').checked,
    holiday: document.getElementById('recipeHoliday').checked,
    rating: currentRating,
    ingredients,
    directions,
    notes: document.getElementById('recipeNotes').value.trim(),
    tags: [...currentTags],
    hasPhoto: !!currentPhotoData || (editingId && recipes.find(r=>r.id===editingId)?.hasPhoto && !currentPhotoData ? true : false),
    created: editingId ? (recipes.find(r=>r.id===editingId)?.created || new Date().toISOString()) : new Date().toISOString(),
    updated: new Date().toISOString()
  };

  if (currentPhotoData) {
    await savePhoto(id, currentPhotoData);
    recipe.hasPhoto = true;
  }

  if (editingId) {
    const idx = recipes.findIndex(r => r.id === editingId);
    if (idx >= 0) recipes[idx] = recipe;
  } else {
    recipes.push(recipe);
  }

  saveRecipes();
  resetForm();
  showView('library');
}

  editingId = null;
  document.getElementById('editId').value = '';
  document.getElementById('formTitle').textContent = 'Add New Recipe';
  document.getElementById('recipeName').value = '';
  document.getElementById('recipeCategory').selectedIndex = 0;
  document.getElementById('recipeDifficulty').selectedIndex = 0;
  document.getElementById('recipePrepTime').value = '';
  document.getElementById('recipeCookTime').value = '';
  document.getElementById('recipeServings').value = '';
  document.getElementById('recipeSource').value = '';
  document.getElementById('recipeFavorite').checked = false;
  document.getElementById('recipeHoliday').checked = false;
  document.getElementById('recipeNotes').value = '';
  document.getElementById('recipePhoto').value = '';
  document.getElementById('photoPreview').style.display = 'none';
  currentRating = 0;
  currentTags = [];

// Edit
async function editRecipe(id) {
  const r = recipes.find(x => x.id === id);
  if (!r) return;
  editingId = id;
  document.getElementById('formTitle').textContent = 'Edit Recipe';
  document.getElementById('recipeName').value = r.name;
  document.getElementById('recipeCategory').value = r.category;
  document.getElementById('recipeDifficulty').value = r.difficulty || 'Easy';
  document.getElementById('recipePrepTime').value = r.prepTime || '';
  document.getElementById('recipeCookTime').value = r.cookTime || '';
  document.getElementById('recipeServings').value = r.servings || '';
  document.getElementById('recipeSource').value = r.source || '';
  document.getElementById('recipeFavorite').checked = r.favorite;
  document.getElementById('recipeHoliday').checked = r.holiday;
  document.getElementById('recipeNotes').value = r.notes || '';
  currentRating = r.rating || 0;
  setRating(currentRating);
  currentTags = [...(r.tags || [])];
  renderTags();

  document.getElementById('ingredientsList').innerHTML = '';
  (r.ingredients || []).forEach(ing => {
    if (ing.type === 'section') addSectionHeader(ing.title);
    else addIngredientRow(ing.qty, ing.unit, ing.name);
  });
  if (!r.ingredients?.length) addIngredientRow();

  document.getElementById('directionsList').innerHTML = '';
  (r.directions || []).forEach(d => addDirectionRow(d));
  if (!r.directions?.length) addDirectionRow();

  currentPhotoData = null;
  if (r.hasPhoto) {
    const photo = await getPhoto(id);
    if (photo) {
      document.getElementById('photoPreview').src = photo;
      document.getElementById('photoPreview').style.display = 'block';
    }
  } else {
    document.getElementById('photoPreview').style.display = 'none';
  }

  showView('add-recipe');
}

// Delete
async function deleteRecipe(id) {
  if (!confirm('Delete this recipe?')) return;
  recipes = recipes.filter(r => r.id !== id);
  await deletePhoto(id);
  saveRecipes();
  showView('library');
}

// Library rendering
function getFilteredRecipes() {
  let list = [...recipes];
  const search = document.getElementById('searchInput').value.toLowerCase().trim();
  const cat = document.getElementById('filterCategory').value;
  const diff = document.getElementById('filterDifficulty').value;
  const sort = document.getElementById('sortBy').value;

  if (search) {
    list = list.filter(r =>
      r.name.toLowerCase().includes(search) ||
      (r.ingredients||[]).some(i => i.type==='ingredient' && i.name.toLowerCase().includes(search)) ||
      (r.tags||[]).some(t => t.toLowerCase().includes(search))
    );
  }
  if (cat) list = list.filter(r => r.category === cat);
  if (diff) list = list.filter(r => r.difficulty === diff);
  if (activeQuickFilter === 'fav') list = list.filter(r => r.favorite);
  if (activeQuickFilter === 'holiday') list = list.filter(r => r.holiday);

  list.sort((a,b) => {
    switch(sort) {
      case 'name-asc': return a.name.localeCompare(b.name);
      case 'name-desc': return b.name.localeCompare(a.name);
      case 'rating-desc': return (b.rating||0) - (a.rating||0);
      case 'date-asc': return new Date(a.created) - new Date(b.created);
      default: return new Date(b.created) - new Date(a.created);
    }
  });
  return list;
}

async function renderLibrary() {
  const list = getFilteredRecipes();
  const grid = document.getElementById('recipeGrid');
  if (!list.length) {
    grid.innerHTML = '<div class="empty-state"><div class="icon">&#127859;</div><p>No recipes found.</p><button class="btn-primary" onclick="resetForm();showView(\'add-recipe\')">Add Your First Recipe</button></div>';
    return;
  }

  const photoMap = {};
  const photosNeeded = list.filter(r => r.hasPhoto);
  for (const r of photosNeeded) {
    photoMap[r.id] = await getPhoto(r.id);
  }

  grid.innerHTML = list.map(r => {
    const photo = photoMap[r.id];
    const imgHtml = photo
      ? `<img class="card-img" src="${photo}" alt="${escH(r.name)}" loading="lazy">`
      : `<div class="card-img">&#127858;</div>`;
    const starsHtml = r.rating ? '<span class="stars">' + '&#9733;'.repeat(r.rating) + '&#9734;'.repeat(5-r.rating) + '</span>' : '';
    const badges = [];
    if (r.favorite) badges.push('<span class="badge badge-fav">Family Favorite</span>');
    if (r.holiday) badges.push('<span class="badge badge-holiday">Holiday Must-Make</span>');
    badges.push(`<span class="badge badge-cat">${escH(r.category)}</span>`);
    return `<div class="card" onclick="showDetail('${r.id}')" style="cursor:pointer">
      ${imgHtml}
      <div class="card-body">
        <div class="card-title">${escH(r.name)}</div>
        <div class="card-badges">${badges.join('')}</div>
        <div class="card-meta">
          ${r.prepTime ? '<span>Prep: '+escH(r.prepTime)+'</span>':''}
          ${r.cookTime ? '<span>Cook: '+escH(r.cookTime)+'</span>':''}
          ${r.difficulty ? '<span>'+escH(r.difficulty)+'</span>':''}
        </div>
        ${starsHtml}
      </div>
    </div>`;
  }).join('');
}

function applyMultiplier(mult, baseServings, btn) {
  document.querySelectorAll('.multiplier-bar button').forEach(b => b.classList.remove('active'));
  if (btn) btn.classList.add('active');
  document.getElementById('servingsDisplay').textContent = Math.round(baseServings * mult * 10) / 10;

  document.querySelectorAll('#ingredientDisplay .ing-qty').forEach(el => {
    const base = el.dataset.base;
    const num = parseFraction(base);
    if (num !== null) {
      const result = num * mult;
      el.textContent = formatQty(result);
    }
  });
}

function parseFraction(s) {
  if (!s) return null;
  s = s.trim();
  // handle mixed like "1 1/2"
  const mixed = s.match(/^(\d+)\s+(\d+)\/(\d+)$/);
  if (mixed) return parseInt(mixed[1]) + parseInt(mixed[2])/parseInt(mixed[3]);
  const frac = s.match(/^(\d+)\/(\d+)$/);
  if (frac) return parseInt(frac[1])/parseInt(frac[2]);
  const num = parseFloat(s);
  return isNaN(num) ? null : num;
}

function formatQty(n) {
  if (n === 0) return '0';
  const fracs = [[1/4,'1/4'],[1/3,'1/3'],[1/2,'1/2'],[2/3,'2/3'],[3/4,'3/4']];
  const whole = Math.floor(n);
  const rem = n - whole;
  if (Math.abs(rem) < 0.05) return whole.toString();
  for (const [val, str] of fracs) {
    if (Math.abs(rem - val) < 0.05) return whole ? whole + ' ' + str : str;
  }
  return (Math.round(n * 100) / 100).toString();
}

function printDetail() { window.print(); }

function shareRecipe(id) {
  const r = recipes.find(x => x.id === id);
  if (!r) return;
  let text = r.name + '\n';
  if (r.category) text += 'Category: ' + r.category + '\n';
  if (r.prepTime) text += 'Prep: ' + r.prepTime + '\n';
  if (r.cookTime) text += 'Cook: ' + r.cookTime + '\n';
  if (r.servings) text += 'Servings: ' + r.servings + '\n';
  text += '\nIngredients:\n';
  (r.ingredients||[]).forEach(i => {
    if (i.type === 'section') text += '\n--- ' + i.title + ' ---\n';
    else text += '- ' + (i.qty?i.qty+' ':'') + (i.unit?i.unit+' ':'') + i.name + '\n';
  });
  text += '\nDirections:\n';
  (r.directions||[]).forEach((d,i) => text += (i+1) + '. ' + d + '\n');
  if (r.notes) text += '\nNotes: ' + r.notes + '\n';
  navigator.clipboard.writeText(text).then(() => alert('Recipe copied to clipboard!'));
}

  selectedShoppingRecipes = [];
  document.querySelectorAll('#recipeSelectorList input:checked').forEach(cb => selectedShoppingRecipes.push(cb.value));
  closeModal('recipeSelectorModal');
  renderShoppingList();
}

function renderShoppingList() {
  const cont = document.getElementById('shoppingContent');
  if (!selectedShoppingRecipes.length) {
    cont.innerHTML = '<div class="empty-state"><div class="icon">&#128722;</div><p>Select recipes to build your shopping list.</p></div>';
    return;
  }

  // Combine ingredients
  const combined = {};
  selectedShoppingRecipes.forEach(id => {
    const r = recipes.find(x => x.id === id);
    if (!r) return;
    (r.ingredients||[]).forEach(ing => {
      if (ing.type !== 'ingredient') return;
      const key = ing.name.toLowerCase();
      if (!combined[key]) combined[key] = {name:ing.name, entries:[]};
      combined[key].entries.push({qty:ing.qty, unit:ing.unit});
    });
  });

  // Organize by grocery section
  const sections = {};
  Object.values(combined).forEach(item => {
    let section = 'Other';
    const lower = item.name.toLowerCase();
    for (const [sec, keywords] of Object.entries(GROCERY_SECTIONS)) {
      if (keywords.some(k => lower.includes(k))) { section = sec; break; }
    }
    if (!sections[section]) sections[section] = [];
    const qtyStr = item.entries.map(e => (e.qty?e.qty:'')+(e.unit?' '+e.unit:'')).filter(Boolean).join(' + ');
    sections[section].push({name: item.name, qty: qtyStr});
  });

  const order = ['Produce','Meat & Seafood','Dairy & Eggs','Bakery & Bread','Frozen','Canned & Jarred','Pantry & Dry Goods','Other'];
  cont.innerHTML = order.filter(s => sections[s]).map(sec =>
    `<div class="shopping-section"><h3>${sec}</h3>${sections[sec].map(item =>
      `<div class="shopping-item" onclick="this.classList.toggle('checked');this.querySelector('input').checked=!this.querySelector('input').checked">
        <input type="checkbox" onclick="event.stopPropagation()">
        <span>${item.qty ? escH(item.qty)+' ' : ''}${escH(item.name)}</span>
      </div>`
    ).join('')}</div>`
  ).join('');
}

function clearShoppingChecks() {
  document.querySelectorAll('#shoppingContent .shopping-item').forEach(el => {
    el.classList.remove('checked');
    el.querySelector('input').checked = false;
  });
}

function copyShoppingList() {
  let text = 'Shopping List\n=============\n';
  document.querySelectorAll('#shoppingContent .shopping-section').forEach(sec => {
    text += '\n' + sec.querySelector('h3').textContent + '\n';
    sec.querySelectorAll('.shopping-item span').forEach(s => text += '[ ] ' + s.textContent.trim() + '\n');
  });
  navigator.clipboard.writeText(text).then(() => alert('Shopping list copied!'));
}

function printShoppingList() { window.print(); }

// Meal Planner
const DAYS = ['Mon','Tue','Wed','Thu','Fri','Sat','Sun'];
const MEALS = ['Breakfast','Lunch','Dinner'];

function renderPlanner() {
  const grid = document.getElementById('plannerGrid');
  let html = '<div class="planner-header"></div>';
  DAYS.forEach(d => html += `<div class="planner-header">${d}</div>`);

  MEALS.forEach(meal => {
    html += `<div class="planner-label">${meal}</div>`;
    DAYS.forEach(day => {
      const key = day + '_' + meal;
      const items = mealPlan[key] || [];
      const chips = items.map((id, idx) => {
        const r = recipes.find(x => x.id === id);
        return r ? `<div class="meal-chip">${escH(r.name.slice(0,18))} <span class="remove-meal" onclick="event.stopPropagation();removeMeal('${key}',${idx})">x</span></div>` : '';
      }).join('');
      html += `<div class="planner-cell" onclick="openMealPicker('${key}')">${chips}</div>`;
    });
  });
  grid.innerHTML = html;
}

function openMealPicker(key) {
  plannerTarget = key;
  document.getElementById('mealPickerSearch').value = '';
  renderMealPicker();
  document.getElementById('mealPickerModal').classList.add('show');
}

function renderMealPicker() {
  const search = document.getElementById('mealPickerSearch').value.toLowerCase();
  const list = recipes.filter(r => !search || r.name.toLowerCase().includes(search));
  document.getElementById('mealPickerList').innerHTML = list.map(r =>
    `<div class="recipe-select-item" style="cursor:pointer" onclick="pickMeal('${r.id}')"><span>${escH(r.name)}</span></div>`
  ).join('');
}

function pickMeal(recipeId) {
  if (!mealPlan[plannerTarget]) mealPlan[plannerTarget] = [];
  mealPlan[plannerTarget].push(recipeId);
  saveMealPlan();
  closeModal('mealPickerModal');
  renderPlanner();
}

function removeMeal(key, idx) {
  if (mealPlan[key]) {
    mealPlan[key].splice(idx, 1);
    if (!mealPlan[key].length) delete mealPlan[key];
    saveMealPlan();
    renderPlanner();
  }
}

function clearPlanner() {
  if (!confirm('Clear the entire weekly plan?')) return;
  mealPlan = {};
  saveMealPlan();
  renderPlanner();
}

function generatePlannerShoppingList() {
  selectedShoppingRecipes = [];
  const seen = new Set();
  Object.values(mealPlan).forEach(ids => ids.forEach(id => { if (!seen.has(id)) { seen.add(id); selectedShoppingRecipes.push(id); }}));
  if (!selectedShoppingRecipes.length) { alert('No meals planned yet.'); return; }
  renderShoppingList();
  showView('shopping');
}

// Import/Export
async function exportJSON() {
  const photos = await getAllPhotos();
  const data = { recipes, mealPlan, photos, exportDate: new Date().toISOString() };
  const blob = new Blob([JSON.stringify(data, null, 2)], {type:'application/json'});
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url; a.download = 'mary-kays-recipes-backup.json'; a.click();
  URL.revokeObjectURL(url);
}

function exportText() {
  let text = "Mary Kay's Recipe Collection\n" + '='.repeat(30) + '\n\n';
  recipes.forEach(r => {
    text += r.name + '\n' + '-'.repeat(r.name.length) + '\n';
    text += 'Category: ' + r.category + '\n';
    if (r.prepTime) text += 'Prep: ' + r.prepTime + '\n';
    if (r.cookTime) text += 'Cook: ' + r.cookTime + '\n';
    if (r.servings) text += 'Servings: ' + r.servings + '\n';
    if (r.rating) text += 'Rating: ' + '★'.repeat(r.rating) + '\n';
    text += '\nIngredients:\n';
    (r.ingredients||[]).forEach(i => {
      if (i.type === 'section') text += '\n' + i.title + ':\n';
      else text += '  ' + (i.qty?i.qty+' ':'') + (i.unit?i.unit+' ':'') + i.name + '\n';
    });
    text += '\nDirections:\n';
    (r.directions||[]).forEach((d,i) => text += '  ' + (i+1) + '. ' + d + '\n');
    if (r.notes) text += '\nNotes: ' + r.notes + '\n';
    text += '\n' + '~'.repeat(40) + '\n\n';
  });
  const blob = new Blob([text], {type:'text/plain'});
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url; a.download = 'mary-kays-recipes.txt'; a.click();
  URL.revokeObjectURL(url);
}

async function importJSON(input) {
  const file = input.files[0];
  if (!file) return;
  try {
    const text = await file.text();
    const data = JSON.parse(text);
    if (!data.recipes || !Array.isArray(data.recipes)) { alert('Invalid backup file.'); return; }
    if (!confirm(`Import ${data.recipes.length} recipes? This will ADD to your existing collection.`)) return;
    const existingIds = new Set(recipes.map(r => r.id));
    data.recipes.forEach(r => {
      if (!existingIds.has(r.id)) recipes.push(r);
    });
    if (data.photos) {
      for (const p of data.photos) { await savePhoto(p.id, p.data); }
    }
    if (data.mealPlan) Object.assign(mealPlan, data.mealPlan);
    saveRecipes();
    saveMealPlan();
    renderLibrary();
    alert('Import complete!');
  } catch(e) { alert('Error importing: ' + e.message); }
  input.value = '';
}
