<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Memory Match | Korb Engineering</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #050a0f;
    --surface: #0a1018;
    --surface-2: #0e1520;
    --border: #1a2535;
    --cyan: #00d4ff;
    --orange: #ff6600;
    --green: #10b981;
    --red: #ef4444;
    --gold: #fbbf24;
    --text: #e2e8f0;
    --dim: #64748b;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
  html, body {
    background: var(--bg);
    color: var(--text);
    font-family: 'JetBrains Mono', monospace;
    min-height: 100vh;
    overflow-x: hidden;
  }
  body {
    padding: 12px;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 12px;
  }
  header {
    width: 100%;
    max-width: 900px;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 6px;
    padding: 12px 16px;
  }
  .title {
    color: var(--cyan);
    font-size: 20px;
    font-weight: 700;
    letter-spacing: 1px;
    text-transform: uppercase;
  }
  .subtitle {
    color: var(--dim);
    font-size: 11px;
    margin-top: 4px;
  }
  .controls {
    width: 100%;
    max-width: 900px;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 6px;
    padding: 12px;
    display: flex;
    flex-wrap: wrap;
    gap: 10px;
    align-items: center;
  }
  .group {
    display: flex;
    flex-direction: column;
    gap: 4px;
    flex: 1 1 140px;
  }
  label {
    font-size: 10px;
    color: var(--dim);
    text-transform: uppercase;
    letter-spacing: 1px;
  }
  select, button {
    background: var(--surface-2);
    border: 1px solid var(--border);
    color: var(--text);
    font-family: inherit;
    font-size: 13px;
    padding: 10px 12px;
    border-radius: 4px;
    min-height: 44px;
    cursor: pointer;
    transition: all .15s;
  }
  select:focus, button:focus { outline: 2px solid var(--cyan); outline-offset: 1px; }
  button:hover { border-color: var(--cyan); color: var(--cyan); }
  button.primary {
    background: var(--cyan);
    color: var(--bg);
    border-color: var(--cyan);
    font-weight: 700;
  }
  button.primary:hover { background: #33e0ff; color: var(--bg); }
  button.danger:hover { border-color: var(--red); color: var(--red); }
  .stats {
    width: 100%;
    max-width: 900px;
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    gap: 8px;
  }
  .stat {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 6px;
    padding: 10px;
    text-align: center;
  }
  .stat-label {
    font-size: 9px;
    color: var(--dim);
    text-transform: uppercase;
    letter-spacing: 1px;
  }
  .stat-value {
    font-size: 18px;
    font-weight: 700;
    color: var(--cyan);
    margin-top: 4px;
    font-variant-numeric: tabular-nums;
  }
  .stat.best .stat-value { color: var(--gold); }
  .stat.moves .stat-value { color: var(--orange); }
  .stat.matches .stat-value { color: var(--green); }

  .board-wrap {
    width: 100%;
    max-width: 900px;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 6px;
    padding: 12px;
    display: flex;
    justify-content: center;
  }
  .board {
    display: grid;
    gap: 8px;
    width: 100%;
    max-width: 100%;
    perspective: 1000px;
  }
  .card {
    aspect-ratio: 1;
    position: relative;
    cursor: pointer;
    transform-style: preserve-3d;
    transition: transform .5s cubic-bezier(.2,.8,.2,1);
    min-width: 44px;
    min-height: 44px;
  }
  .card.flipped { transform: rotateY(180deg); }
  .card.matched .card-front {
    box-shadow: 0 0 16px var(--cyan), inset 0 0 12px rgba(0,212,255,.3);
    border-color: var(--cyan);
    animation: matchPulse .6s ease-out;
  }
  @keyframes matchPulse {
    0% { transform: scale(1); }
    50% { transform: scale(1.08); }
    100% { transform: scale(1); }
  }
  .card-face {
    position: absolute;
    inset: 0;
    backface-visibility: hidden;
    -webkit-backface-visibility: hidden;
    border-radius: 6px;
    display: flex;
    align-items: center;
    justify-content: center;
    border: 1px solid var(--border);
    overflow: hidden;
  }
  .card-back {
    background: linear-gradient(135deg, #0e1520 0%, #0a1018 100%);
    background-image:
      linear-gradient(135deg, #0e1520 0%, #0a1018 100%),
      repeating-linear-gradient(45deg, rgba(0,212,255,.05) 0 2px, transparent 2px 8px);
    background-blend-mode: overlay;
    border-color: var(--border);
    position: relative;
  }
  .card-back::before {
    content: 'KE';
    color: var(--cyan);
    font-weight: 700;
    font-size: clamp(10px, 3vw, 18px);
    letter-spacing: 1px;
    opacity: .6;
  }
  .card-back::after {
    content: '';
    position: absolute;
    inset: 4px;
    border: 1px dashed rgba(0,212,255,.25);
    border-radius: 4px;
  }
  .card-front {
    background: var(--surface-2);
    transform: rotateY(180deg);
    color: var(--cyan);
    font-size: clamp(20px, 6vw, 40px);
    border-color: var(--border);
  }
  .card-front svg { width: 60%; height: 60%; }
  .card-front .emoji { font-size: clamp(22px, 7vw, 44px); line-height: 1; }

  /* Grid sizes handled via inline style for columns */

  .overlay {
    position: fixed;
    inset: 0;
    background: rgba(5,10,15,.92);
    display: none;
    align-items: center;
    justify-content: center;
    z-index: 100;
    padding: 20px;
  }
  .overlay.active { display: flex; }
  .modal {
    background: var(--surface);
    border: 1px solid var(--cyan);
    border-radius: 8px;
    padding: 24px;
    max-width: 400px;
    width: 100%;
    box-shadow: 0 0 40px rgba(0,212,255,.3);
    text-align: center;
  }
  .modal h2 {
    color: var(--cyan);
    font-size: 22px;
    margin-bottom: 8px;
    letter-spacing: 1px;
  }
  .modal .sub {
    color: var(--dim);
    font-size: 11px;
    margin-bottom: 16px;
    text-transform: uppercase;
    letter-spacing: 1px;
  }
  .stars {
    font-size: 32px;
    color: var(--gold);
    margin: 16px 0;
    letter-spacing: 4px;
  }
  .stars .dim { color: var(--border); }
  .win-stats {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 8px;
    margin: 16px 0;
  }
  .win-stats .stat { padding: 8px; }
  .modal-actions {
    display: flex;
    gap: 8px;
    margin-top: 16px;
  }
  .modal-actions button { flex: 1; }
  .new-best {
    color: var(--gold);
    font-size: 12px;
    font-weight: 700;
    letter-spacing: 2px;
    animation: blink 1s infinite;
    margin-top: 8px;
  }
  @keyframes blink { 50% { opacity: .3; } }

  canvas.confetti {
    position: fixed;
    inset: 0;
    pointer-events: none;
    z-index: 99;
  }

  footer {
    width: 100%;
    max-width: 900px;
    text-align: center;
    color: var(--dim);
    font-size: 10px;
    padding: 8px;
  }
  footer span { color: var(--cyan); }

  @media (max-width: 600px) {
    .stats { grid-template-columns: repeat(2, 1fr); }
    .title { font-size: 16px; }
    .board { gap: 5px; }
  }
</style>
</head>
<body>
  <header>
    <div class="title">&gt; MEMORY_MATCH.EXE</div>
    <div class="subtitle">// concentration card matching // korb engineering</div>
  </header>

  <div class="controls">
    <div class="group">
      <label for="difficulty">Difficulty</label>
      <select id="difficulty">
        <option value="4x4">Easy — 4x4</option>
        <option value="6x4" selected>Medium — 6x4</option>
        <option value="6x6">Hard — 6x6</option>
        <option value="8x6">Expert — 8x6</option>
      </select>
    </div>
    <div class="group">
      <label for="theme">Theme</label>
      <select id="theme">
        <option value="animals">Animals</option>
        <option value="shapes">Shapes</option>
        <option value="emojis" selected>Emojis</option>
        <option value="engineering">Engineering</option>
        <option value="trains">Trains</option>
      </select>
    </div>
    <div class="group">
      <label>&nbsp;</label>
      <button id="newGameBtn" class="primary">NEW GAME</button>
    </div>
    <div class="group">
      <label>&nbsp;</label>
      <button id="resetStatsBtn" class="danger">RESET STATS</button>
    </div>
  </div>

  <div class="stats">
    <div class="stat"><div class="stat-label">Time</div><div class="stat-value" id="timeVal">00:00</div></div>
    <div class="stat moves"><div class="stat-label">Moves</div><div class="stat-value" id="movesVal">0</div></div>
    <div class="stat matches"><div class="stat-label">Matches</div><div class="stat-value" id="matchesVal">0/0</div></div>
    <div class="stat best"><div class="stat-label">Best Time</div><div class="stat-value" id="bestVal">—</div></div>
  </div>

  <div class="board-wrap">
    <div class="board" id="board"></div>
  </div>

  <footer>
    &gt; <span>korb.engineering</span> // memory_match v1.0 // click cards to flip
  </footer>

  <div class="overlay" id="overlay">
    <div class="modal">
      <h2 id="modalTitle">VICTORY</h2>
      <div class="sub" id="modalSub">// all pairs matched</div>
      <div class="stars" id="stars"></div>
      <div class="win-stats">
        <div class="stat"><div class="stat-label">Time</div><div class="stat-value" id="winTime">—</div></div>
        <div class="stat moves"><div class="stat-label">Moves</div><div class="stat-value" id="winMoves">—</div></div>
      </div>
      <div class="new-best" id="newBest" style="display:none;">&gt; NEW RECORD</div>
      <div class="modal-actions">
        <button id="playAgainBtn" class="primary">PLAY AGAIN</button>
        <button id="closeModalBtn">CLOSE</button>
      </div>
    </div>
  </div>

  <canvas class="confetti" id="confettiCanvas"></canvas>

      SVG('<circle cx="12" cy="7" r="3"/><path d="M6 10 L18 10 L17 12 L7 12 Z M8 12 L8 21 L16 21 L16 12"/>'),
      // rails curving
      SVG('<path d="M3 21 Q12 15 21 3 M5 21 Q14 15 22 5 M3 19 L5 21 M7 15 L9 17 M11 11 L13 13 M15 7 L17 9 M19 3 L21 5"/>')
    ]
  };

  // ============ STATE ============
  const DIFFS = {
    '4x4': { cols: 4, rows: 4 },
    '6x4': { cols: 6, rows: 4 },
    '6x6': { cols: 6, rows: 6 },
    '8x6': { cols: 8, rows: 6 }
  };

  let state = {
    difficulty: '6x4',
    theme: 'emojis',
    cards: [],
    flipped: [],
    matches: 0,
    moves: 0,
    totalPairs: 0,
    startTime: null,
    timerId: null,
    elapsed: 0,
    locked: false,
    gameActive: false
  };

  const STORAGE_KEY = 'korb_memory_match_';

  // ============ AUDIO ============
  let audioCtx = null;
  function getCtx() {
    if (!audioCtx) {
      try { audioCtx = new (window.AudioContext || window.webkitAudioContext)(); }
      catch(e) { return null; }
    }
    if (audioCtx.state === 'suspended') audioCtx.resume();
    return audioCtx;
  }
  function tone(freq, dur, type='sine', vol=0.15, delay=0) {
    const ctx = getCtx(); if (!ctx) return;
    const t0 = ctx.currentTime + delay;
    const osc = ctx.createOscillator();
    const gain = ctx.createGain();
    osc.type = type;
    osc.frequency.setValueAtTime(freq, t0);
    gain.gain.setValueAtTime(0, t0);
    gain.gain.linearRampToValueAtTime(vol, t0 + 0.01);
    gain.gain.exponentialRampToValueAtTime(0.001, t0 + dur);
    osc.connect(gain); gain.connect(ctx.destination);
    osc.start(t0); osc.stop(t0 + dur + 0.05);
  }
  const SFX = {
    flip: () => tone(440, 0.08, 'square', 0.08),
    match: () => { tone(660, 0.12, 'sine', 0.12); tone(880, 0.18, 'sine', 0.12, 0.08); },
    mismatch: () => { tone(200, 0.15, 'sawtooth', 0.1); tone(150, 0.2, 'sawtooth', 0.1, 0.05); },
    win: () => {
      const notes = [523, 659, 784, 1046, 784, 1046];
      notes.forEach((n, i) => tone(n, 0.25, 'triangle', 0.12, i * 0.12));
    }
  };

  // ============ STORAGE ============
  function storageKey(diff, theme) { return STORAGE_KEY + diff + '_' + theme; }
  function getBest(diff, theme) {
    try {
      const raw = localStorage.getItem(storageKey(diff, theme));
      return raw ? JSON.parse(raw) : null;
    } catch(e) { return null; }
  }
  function setBest(diff, theme, data) {
    try { localStorage.setItem(storageKey(diff, theme), JSON.stringify(data)); } catch(e) {}
  }
  function resetAllStats() {
    try {
      Object.keys(localStorage).forEach(k => {
        if (k.startsWith(STORAGE_KEY)) localStorage.removeItem(k);
      });
    } catch(e) {}
  }

  // ============ GAME ============
  function buildCardContent(value) {
    if (state.theme === 'animals' || state.theme === 'emojis') {
      return `<span class="emoji">${value}</span>`;
    }
    return value;
  }

  function shuffle(arr) {
    for (let i = arr.length - 1; i > 0; i--) {
      const j = Math.floor(Math.random() * (i + 1));
      [arr[i], arr[j]] = [arr[j], arr[i]];
    }
    return arr;
  }

  function newGame() {
    stopTimer();
    state.difficulty = document.getElementById('difficulty').value;
    state.theme = document.getElementById('theme').value;
    const { cols, rows } = DIFFS[state.difficulty];
    const total = cols * rows;
    const pairs = total / 2;
    state.totalPairs = pairs;
    state.matches = 0;
    state.moves = 0;
    state.flipped = [];
    state.elapsed = 0;
    state.locked = false;
    state.gameActive = false;
    state.startTime = null;

    const pool = [...THEMES[state.theme]];
    if (pool.length < pairs) {
      while (pool.length < pairs) pool.push(...THEMES[state.theme]);
    }
    const chosen = shuffle(pool.slice()).slice(0, pairs);
    const deck = shuffle([...chosen, ...chosen].map((v, i) => ({
      id: i, value: v, matched: false, flipped: false
    })));
    state.cards = deck;

    renderBoard(cols);
    updateStats();
    closeModal();
  }

  function renderBoard(cols) {
    const board = document.getElementById('board');
    board.innerHTML = '';
    board.style.gridTemplateColumns = `repeat(${cols}, 1fr)`;
    state.cards.forEach((card, idx) => {
      const el = document.createElement('div');
      el.className = 'card';
      el.dataset.idx = idx;
      el.innerHTML = `
        <div class="card-face card-back"></div>
        <div class="card-face card-front">${buildCardContent(card.value)}</div>
      `;
      el.addEventListener('click', () => handleFlip(idx));
      board.appendChild(el);
    });
  }

  function handleFlip(idx) {
    if (state.locked) return;
    const card = state.cards[idx];
    if (card.matched || card.flipped) return;
    if (state.flipped.length >= 2) return;

    if (!state.gameActive) {
      state.gameActive = true;
      startTimer();
    }

    card.flipped = true;
    state.flipped.push(idx);
    const el = document.querySelector(`.card[data-idx="${idx}"]`);
    el.classList.add('flipped');
    SFX.flip();

    if (state.flipped.length === 2) {
      state.moves++;
      updateStats();
      const [a, b] = state.flipped;
      if (state.cards[a].value === state.cards[b].value) {
        state.cards[a].matched = true;
        state.cards[b].matched = true;
        setTimeout(() => {
          document.querySelector(`.card[data-idx="${a}"]`).classList.add('matched');
          document.querySelector(`.card[data-idx="${b}"]`).classList.add('matched');
          SFX.match();
          state.matches++;
          state.flipped = [];
          updateStats();
          if (state.matches === state.totalPairs) win();
        }, 300);
      } else {
        state.locked = true;
        setTimeout(() => {
          SFX.mismatch();
          state.cards[a].flipped = false;
          state.cards[b].flipped = false;
          document.querySelector(`.card[data-idx="${a}"]`).classList.remove('flipped');
          document.querySelector(`.card[data-idx="${b}"]`).classList.remove('flipped');
          state.flipped = [];
          state.locked = false;
        }, 800);
      }
    }
  }

  function startTimer() {
    state.startTime = Date.now() - state.elapsed * 1000;
    state.timerId = setInterval(() => {
      state.elapsed = Math.floor((Date.now() - state.startTime) / 1000);
      updateStats();
    }, 250);
  }
  function stopTimer() {
    if (state.timerId) { clearInterval(state.timerId); state.timerId = null; }
  }

  function fmtTime(sec) {
    const m = Math.floor(sec / 60).toString().padStart(2, '0');
    const s = (sec % 60).toString().padStart(2, '0');
    return `${m}:${s}`;
  }

  function updateStats() {
    document.getElementById('timeVal').textContent = fmtTime(state.elapsed);
    document.getElementById('movesVal').textContent = state.moves;
    document.getElementById('matchesVal').textContent = `${state.matches}/${state.totalPairs}`;
    const best = getBest(state.difficulty, state.theme);
    document.getElementById('bestVal').textContent = best ? fmtTime(best.time) : '—';
  }

  function calcStars(moves, pairs) {
    const perfect = pairs;
    const ratio = perfect / moves;
    if (ratio >= 0.75) return 3;
    if (ratio >= 0.55) return 2;
    return 1;
  }

  function win() {
    stopTimer();
    SFX.win();
    const best = getBest(state.difficulty, state.theme);
    let isNewBest = false;
    if (!best || state.elapsed < best.time || (state.elapsed === best.time && state.moves < best.moves)) {
      setBest(state.difficulty, state.theme, { time: state.elapsed, moves: state.moves });
      isNewBest = true;
    }
    const stars = calcStars(state.moves, state.totalPairs);
    showWinModal(stars, isNewBest);
    launchConfetti();
    updateStats();
  }

  function showWinModal(stars, isNewBest) {
    document.getElementById('winTime').textContent = fmtTime(state.elapsed);
    document.getElementById('winMoves').textContent = state.moves;
    const starStr = '★'.repeat(stars) + `<span class="dim">${'★'.repeat(3 - stars)}</span>`;
    document.getElementById('stars').innerHTML = starStr;
    document.getElementById('newBest').style.display = isNewBest ? 'block' : 'none';
    document.getElementById('overlay').classList.add('active');
  }

  function closeModal() {
    document.getElementById('overlay').classList.remove('active');
  }

  // ============ CONFETTI ============
  const canvas = document.getElementById('confettiCanvas');
  const cctx = canvas.getContext('2d');
  let confettiPieces = [];
  let confettiRunning = false;

  function resizeCanvas() {
    canvas.width = window.innerWidth;
    canvas.height = window.innerHeight;
  }
  window.addEventListener('resize', resizeCanvas);
  resizeCanvas();

  function launchConfetti() {
    const colors = ['#00d4ff', '#ff6600', '#10b981', '#fbbf24', '#ef4444'];
    confettiPieces = [];
    for (let i = 0; i < 150; i++) {
      confettiPieces.push({
        x: Math.random() * canvas.width,
        y: -20 - Math.random() * canvas.height * 0.5,
        vx: (Math.random() - 0.5) * 6,
        vy: Math.random() * 3 + 2,
        rot: Math.random() * Math.PI * 2,
        vr: (Math.random() - 0.5) * 0.3,
        size: Math.random() * 8 + 4,
        color: colors[Math.floor(Math.random() * colors.length)],
        life: 1
      });
    }
    if (!confettiRunning) { confettiRunning = true; animateConfetti(); }
  }

  function animateConfetti() {
    cctx.clearRect(0, 0, canvas.width, canvas.height);
    confettiPieces.forEach(p => {
      p.x += p.vx;
      p.y += p.vy;
      p.vy += 0.12;
      p.rot += p.vr;
      if (p.y > canvas.height) p.life = 0;
      if (p.life > 0) {
        cctx.save();
        cctx.translate(p.x, p.y);
        cctx.rotate(p.rot);
        cctx.fillStyle = p.color;
        cctx.fillRect(-p.size / 2, -p.size / 4, p.size, p.size / 2);
        cctx.restore();
      }
    });
    confettiPieces = confettiPieces.filter(p => p.life > 0);
    if (confettiPieces.length > 0) {
      requestAnimationFrame(animateConfetti);
    } else {
      confettiRunning = false;
      cctx.clearRect(0, 0, canvas.width, canvas.height);
    }
  }

  // ============ WIRING ============
  document.getElementById('newGameBtn').addEventListener('click', () => { getCtx(); newGame(); });
  document.getElementById('playAgainBtn').addEventListener('click', () => { getCtx(); newGame(); });
  document.getElementById('closeModalBtn').addEventListener('click', closeModal);
  document.getElementById('difficulty').addEventListener('change', newGame);
  document.getElementById('theme').addEventListener('change', newGame);
  document.getElementById('resetStatsBtn').addEventListener('click', () => {
    if (confirm('Reset all best times and move records?')) {
      resetAllStats();
      updateStats();
    }
  });

  // init
  newGame();
})();
</script>
</body>
</html>
