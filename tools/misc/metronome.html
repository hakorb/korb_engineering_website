<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="description" content="Metronome | Korb Engineering — a free, browser-based productivity tool from Korb Engineering. No signup, no downloads, works on mobile.">
<title>Metronome | Korb Engineering</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --bg: #050a0f;
  --surface: #0a1018;
  --border: #1a2535;
  --cyan: #00d4ff;
  --orange: #ff6600;
  --green: #10b981;
  --text: #e2e8f0;
  --text-dim: #64748b;
  --red: #ef4444;
}

body {
  font-family: 'JetBrains Mono', monospace;
  background: var(--bg);
  color: var(--text);
  min-height: 100vh;
  overflow-x: hidden;
  -webkit-font-smoothing: antialiased;
}

.container {
  max-width: 640px;
  margin: 0 auto;
  padding: 20px 16px 40px;
}

/* Header */
.header {
  text-align: center;
  margin-bottom: 24px;
  padding-bottom: 16px;
  border-bottom: 1px solid var(--border);
}

.header h1 {
  font-size: 1.5rem;
  font-weight: 700;
  color: var(--cyan);
  letter-spacing: 2px;
  text-transform: uppercase;
  margin-bottom: 4px;
}

.brand {
  font-size: 0.65rem;
  color: var(--text-dim);
  letter-spacing: 3px;
  text-transform: uppercase;
}

/* Tempo Marking */
.tempo-marking {
  text-align: center;
  font-size: 0.8rem;
  color: var(--orange);
  margin-bottom: 4px;
  height: 1.2em;
}

/* BPM Display */
.bpm-display {
  text-align: center;
  margin-bottom: 8px;
  position: relative;
}

.bpm-value {
  font-size: 5rem;
  font-weight: 700;
  color: var(--text);
  line-height: 1;
  cursor: default;
  transition: color 0.1s;
}

.bpm-value.flash { color: var(--cyan); }
.bpm-value.flash-accent { color: var(--orange); }

.bpm-label {
  font-size: 0.85rem;
  color: var(--text-dim);
  letter-spacing: 2px;
}

/* Pendulum */
.pendulum-container {
  width: 100%;
  height: 120px;
  margin-bottom: 16px;
  position: relative;
  overflow: hidden;
}

canvas#pendulum {
  display: block;
  width: 100%;
  height: 100%;
}

/* Beat Indicators */
.beat-section {
  margin-bottom: 20px;
}

.beat-dots {
  display: flex;
  justify-content: center;
  gap: 12px;
  flex-wrap: wrap;
}

.beat-dot {
  width: 36px;
  height: 36px;
  border-radius: 50%;
  border: 2px solid var(--border);
  background: var(--surface);
  cursor: pointer;
  transition: all 0.08s;
  position: relative;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 0.6rem;
  color: var(--text-dim);
}

.beat-dot.accented {
  border-color: var(--orange);
  color: var(--orange);
}

.beat-dot.accented::after {
  content: '';
  position: absolute;
  top: 2px; left: 2px; right: 2px; bottom: 2px;
  border-radius: 50%;
  border: 1px solid rgba(255, 102, 0, 0.3);
}

.beat-dot.active {
  background: var(--cyan);
  border-color: var(--cyan);
  color: var(--bg);
  box-shadow: 0 0 16px rgba(0, 212, 255, 0.6), 0 0 32px rgba(0, 212, 255, 0.3);
  transform: scale(1.15);
}

.beat-dot.active.accented {
  background: var(--orange);
  border-color: var(--orange);
  box-shadow: 0 0 16px rgba(255, 102, 0, 0.6), 0 0 32px rgba(255, 102, 0, 0.3);
}

/* Controls Panel */
.panel {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 8px;
  padding: 16px;
  margin-bottom: 12px;
}

.panel-label {
  font-size: 0.65rem;
  color: var(--text-dim);
  letter-spacing: 2px;
  text-transform: uppercase;
  margin-bottom: 10px;
}

/* BPM Slider Row */
.bpm-controls {
  display: flex;
  align-items: center;
  gap: 8px;
}

.bpm-controls button {
  width: 36px;
  height: 36px;
  border-radius: 6px;
  border: 1px solid var(--border);
  background: var(--surface);
  color: var(--cyan);
  font-family: inherit;
  font-size: 1.1rem;
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: center;
  flex-shrink: 0;
  transition: background 0.15s, border-color 0.15s;
}

.bpm-controls button:hover { border-color: var(--cyan); background: rgba(0,212,255,0.08); }
.bpm-controls button:active { background: rgba(0,212,255,0.15); }

input[type="range"] {
  flex: 1;
  -webkit-appearance: none;
  appearance: none;
  height: 6px;
  background: var(--border);
  border-radius: 3px;
  outline: none;
}

input[type="range"]::-webkit-slider-thumb {
  -webkit-appearance: none;
  width: 18px;
  height: 18px;
  border-radius: 50%;
  background: var(--cyan);
  cursor: pointer;
  border: 2px solid var(--bg);
  box-shadow: 0 0 6px rgba(0,212,255,0.4);
}

input[type="range"]::-moz-range-thumb {
  width: 18px;
  height: 18px;
  border-radius: 50%;
  background: var(--cyan);
  cursor: pointer;
  border: 2px solid var(--bg);
}

input[type="number"] {
  width: 60px;
  height: 36px;
  background: var(--bg);
  border: 1px solid var(--border);
  border-radius: 6px;
  color: var(--text);
  font-family: inherit;
  font-size: 0.85rem;
  text-align: center;
  outline: none;
  flex-shrink: 0;
}

input[type="number"]:focus { border-color: var(--cyan); }

/* Buttons row */
.btn-row {
  display: flex;
  gap: 8px;
  margin-bottom: 12px;
}

.btn {
  flex: 1;
  height: 48px;
  border-radius: 8px;
  border: 1px solid var(--border);
  background: var(--surface);
  color: var(--text);
  font-family: inherit;
  font-size: 0.8rem;
  font-weight: 500;
  cursor: pointer;
  letter-spacing: 1px;
  text-transform: uppercase;
  transition: all 0.15s;
}

.btn:hover { border-color: var(--cyan); }

.btn-primary {
  background: var(--cyan);
  color: var(--bg);
  border-color: var(--cyan);
  font-weight: 700;
}

.btn-primary:hover { background: #00b8e0; border-color: #00b8e0; }

.btn-primary.active {
  background: var(--red);
  border-color: var(--red);
}

.btn-primary.active:hover { background: #dc2626; border-color: #dc2626; }

.btn-tap { border-color: var(--orange); color: var(--orange); }
.btn-tap:hover { background: rgba(255,102,0,0.1); }
.btn-tap:active { background: rgba(255,102,0,0.2); }

/* Select-like button groups */
.option-group {
  display: flex;
  flex-wrap: wrap;
  gap: 6px;
}

.option-btn {
  padding: 6px 10px;
  border-radius: 4px;
  border: 1px solid var(--border);
  background: var(--surface);
  color: var(--text-dim);
  font-family: inherit;
  font-size: 0.7rem;
  cursor: pointer;
  transition: all 0.15s;
}

.option-btn:hover { border-color: var(--cyan); color: var(--text); }

.option-btn.active {
  border-color: var(--cyan);
  color: var(--cyan);
  background: rgba(0,212,255,0.08);
}

/* Volume */
.volume-row {
  display: flex;
  align-items: center;
  gap: 10px;
}

.volume-row label {
  font-size: 0.7rem;
  color: var(--text-dim);
  flex-shrink: 0;
  width: 50px;
}

.volume-row input[type="range"] { flex: 1; }

.volume-val {
  font-size: 0.7rem;
  color: var(--text-dim);
  width: 30px;
  text-align: right;
  flex-shrink: 0;
}

/* Practice Mode */
.practice-grid {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 8px;
}

.practice-field label {
  display: block;
  font-size: 0.6rem;
  color: var(--text-dim);
  margin-bottom: 4px;
  text-transform: uppercase;
  letter-spacing: 1px;
}

.practice-field input {
  width: 100%;
  height: 32px;
  background: var(--bg);
  border: 1px solid var(--border);
  border-radius: 4px;
  color: var(--text);
  font-family: inherit;
  font-size: 0.8rem;
  text-align: center;
  outline: none;
}

.practice-field input:focus { border-color: var(--cyan); }

.practice-status {
  margin-top: 8px;
  font-size: 0.7rem;
  color: var(--text-dim);
  text-align: center;
  min-height: 1.2em;
}

.practice-status.running { color: var(--green); }

/* Keyboard shortcuts */
.shortcuts {
  display: flex;
  justify-content: center;
  gap: 16px;
  flex-wrap: wrap;
  margin-top: 8px;
}

.shortcut {
  font-size: 0.6rem;
  color: var(--text-dim);
}

.shortcut kbd {
  display: inline-block;
  padding: 2px 6px;
  border: 1px solid var(--border);
  border-radius: 3px;
  background: var(--surface);
  font-family: inherit;
  font-size: 0.6rem;
  color: var(--text);
  margin-right: 3px;
}

/* Responsive */
@media (max-width: 480px) {
  .bpm-value { font-size: 3.5rem; }
  .beat-dot { width: 30px; height: 30px; font-size: 0.55rem; }
  .pendulum-container { height: 90px; }
  .practice-grid { grid-template-columns: 1fr 1fr; gap: 6px; }
}

/* Mobile-first touch targets */
button,select,.btn,.beat-dot,.bpm-controls button,[role="button"]{min-height:44px;touch-action:manipulation}
input,textarea,select{font-size:16px}
</style>
</head>
<body>

<div class="container">
  <div class="header">
    <h1>Metronome</h1>
    <div class="brand">Korb Engineering</div>
  </div>

  <div class="tempo-marking" id="tempoMarking">Moderato</div>

  <div class="bpm-display">
    <div class="bpm-value" id="bpmValue">120</div>
    <div class="bpm-label">BPM</div>
  </div>

  <div class="pendulum-container">
    <canvas id="pendulum"></canvas>
  </div>

  <div class="beat-section">
    <div class="beat-dots" id="beatDots"></div>
  </div>

  <div class="btn-row">
    <button class="btn btn-primary" id="btnPlay">START</button>
    <button class="btn btn-tap" id="btnTap">TAP</button>
  </div>

  <div class="panel">
    <div class="panel-label">Tempo</div>
    <div class="bpm-controls">
      <button id="btnMinus">-</button>
      <input type="range" id="bpmSlider" min="20" max="300" value="120">
      <input type="number" id="bpmInput" min="20" max="300" value="120">
      <button id="btnPlus">+</button>
    </div>
  </div>

  <div class="panel">
    <div class="panel-label">Time Signature</div>
    <div class="option-group" id="timeSigGroup">
      <button class="option-btn" data-sig="2/4">2/4</button>
      <button class="option-btn" data-sig="3/4">3/4</button>
      <button class="option-btn active" data-sig="4/4">4/4</button>
      <button class="option-btn" data-sig="5/4">5/4</button>
      <button class="option-btn" data-sig="6/8">6/8</button>
      <button class="option-btn" data-sig="7/8">7/8</button>
    </div>
  </div>

  <div class="panel">
    <div class="panel-label">Subdivision</div>
    <div class="option-group" id="subdivGroup">
      <button class="option-btn active" data-subdiv="1">Quarter</button>
      <button class="option-btn" data-subdiv="2">Eighth</button>
      <button class="option-btn" data-subdiv="3">Triplet</button>
      <button class="option-btn" data-subdiv="4">Sixteenth</button>
    </div>
  </div>

  <div class="panel">
    <div class="panel-label">Sound</div>
    <div class="option-group" id="soundGroup">
      <button class="option-btn active" data-sound="click">Click</button>
      <button class="option-btn" data-sound="woodblock">Woodblock</button>
      <button class="option-btn" data-sound="cowbell">Cowbell</button>
      <button class="option-btn" data-sound="hihat">Hi-Hat</button>
    </div>
  </div>

  <div class="panel">
    <div class="panel-label">Volume</div>
    <div class="volume-row">
      <label>Main</label>
      <input type="range" id="volumeSlider" min="0" max="100" value="80">
      <span class="volume-val" id="volumeVal">80</span>
    </div>
  </div>

  <div class="panel">
    <div class="panel-label">Practice Mode</div>
    <div class="practice-grid">
      <div class="practice-field">
        <label>Start BPM</label>
        <input type="number" id="practiceStart" value="80" min="20" max="300">
      </div>
      <div class="practice-field">
        <label>End BPM</label>
        <input type="number" id="practiceEnd" value="160" min="20" max="300">
      </div>
      <div class="practice-field">
        <label>Increment</label>
        <input type="number" id="practiceInc" value="5" min="1" max="50">
      </div>
      <div class="practice-field">
        <label>Bars per step</label>
        <input type="number" id="practiceBars" value="4" min="1" max="32">
      </div>
    </div>
    <div style="margin-top:10px;">
      <button class="btn" id="btnPractice" style="width:100%;height:36px;font-size:0.7rem;">Start Practice</button>
    </div>
    <div class="practice-status" id="practiceStatus"></div>
  </div>

  <div class="shortcuts">
    <span class="shortcut"><kbd>Space</kbd> Play/Stop</span>
    <span class="shortcut"><kbd>&uarr;</kbd><kbd>&darr;</kbd> BPM</span>
    <span class="shortcut"><kbd>T</kbd> Tap</span>
  </div>
</div>

<script>
(function() {
  'use strict';

  // --- State ---
  let bpm = 120;
  let playing = false;
  let beatsPerMeasure = 4;
  let beatUnit = 4; // denominator
  let subdivision = 1;
  let soundType = 'click';
  let volume = 0.8;
  let accents = [true, false, false, false];
  let currentBeat = -1;
  let tapTimes = [];
  let practiceMode = false;
  let practiceTarget = 160;
  let practiceInc = 5;
  let practiceBars = 4;
  let practiceBarCount = 0;

  // --- Audio ---
  let audioCtx = null;
  let masterGain = null;
  let nextNoteTime = 0;
  let currentSubBeat = 0;
  let schedulerTimer = null;
  const scheduleAheadTime = 0.1; // seconds
  const lookahead = 25; // ms

  function initAudio() {
    if (audioCtx) return;
    audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    masterGain = audioCtx.createGain();
    masterGain.gain.value = volume;
    masterGain.connect(audioCtx.destination);
  }

  function synthClick(time, accent, isSub) {
    const g = audioCtx.createGain();
    const o = audioCtx.createOscillator();
    const baseVol = isSub ? 0.3 : (accent ? 1.0 : 0.6);
    g.gain.setValueAtTime(baseVol, time);
    g.gain.exponentialRampToValueAtTime(0.001, time + 0.03);
    o.frequency.value = accent ? 1500 : (isSub ? 800 : 1000);
    o.type = 'sine';
    o.connect(g);
    g.connect(masterGain);
    o.start(time);
    o.stop(time + 0.03);
  }

  function synthWoodblock(time, accent, isSub) {
    const g = audioCtx.createGain();
    const o = audioCtx.createOscillator();
    const baseVol = isSub ? 0.25 : (accent ? 1.0 : 0.55);
    g.gain.setValueAtTime(baseVol, time);
    g.gain.exponentialRampToValueAtTime(0.001, time + 0.06);
    const freq = accent ? 900 : (isSub ? 600 : 750);
    o.frequency.setValueAtTime(freq, time);
    o.frequency.exponentialRampToValueAtTime(freq * 0.5, time + 0.06);
    o.type = 'triangle';
    o.connect(g);
    g.connect(masterGain);
    o.start(time);
    o.stop(time + 0.06);
  }

  function synthCowbell(time, accent, isSub) {
    const g = audioCtx.createGain();
    const baseVol = isSub ? 0.2 : (accent ? 0.8 : 0.45);
    g.gain.setValueAtTime(baseVol, time);
    g.gain.exponentialRampToValueAtTime(0.001, time + 0.12);

    const o1 = audioCtx.createOscillator();
    const o2 = audioCtx.createOscillator();
    o1.type = 'square';
    o2.type = 'square';
    const base = accent ? 587 : (isSub ? 480 : 540);
    o1.frequency.value = base;
    o2.frequency.value = base * 1.5;

    const bp = audioCtx.createBiquadFilter();
    bp.type = 'bandpass';
    bp.frequency.value = base * 2;
    bp.Q.value = 3;

    o1.connect(bp);
    o2.connect(bp);
    bp.connect(g);
    g.connect(masterGain);
    o1.start(time);
    o2.start(time);
    o1.stop(time + 0.12);
    o2.stop(time + 0.12);
  }

  function synthHihat(time, accent, isSub) {
    const g = audioCtx.createGain();
    const baseVol = isSub ? 0.2 : (accent ? 0.7 : 0.4);
    g.gain.setValueAtTime(baseVol, time);
    g.gain.exponentialRampToValueAtTime(0.001, time + 0.05);

    const bufferSize = audioCtx.sampleRate * 0.05;
    const buffer = audioCtx.createBuffer(1, bufferSize, audioCtx.sampleRate);
    const data = buffer.getChannelData(0);
    for (let i = 0; i < bufferSize; i++) data[i] = Math.random() * 2 - 1;

    const src = audioCtx.createBufferSource();
    src.buffer = buffer;

    const hp = audioCtx.createBiquadFilter();
    hp.type = 'highpass';
    hp.frequency.value = accent ? 8000 : (isSub ? 10000 : 9000);

    src.connect(hp);
    hp.connect(g);
    g.connect(masterGain);
    src.start(time);
    src.stop(time + 0.05);
  }

  function playSound(time, accent, isSub) {
    switch (soundType) {
      case 'click': synthClick(time, accent, isSub); break;
      case 'woodblock': synthWoodblock(time, accent, isSub); break;
      case 'cowbell': synthCowbell(time, accent, isSub); break;
      case 'hihat': synthHihat(time, accent, isSub); break;
    }
  }

  // --- Scheduling ---
  function getSecondsPerBeat() {
    return 60.0 / bpm;
  }

  function scheduler() {
    while (nextNoteTime < audioCtx.currentTime + scheduleAheadTime) {
      const beatIndex = Math.floor(currentSubBeat / subdivision);
      const subIndex = currentSubBeat % subdivision;
      const isMainBeat = subIndex === 0;
      const isAccent = isMainBeat && accents[beatIndex];

      playSound(nextNoteTime, isAccent, !isMainBeat);

      if (isMainBeat) {
        const b = beatIndex;
        const t = nextNoteTime;
        const delay = Math.max(0, (t - audioCtx.currentTime) * 1000);
        setTimeout(() => highlightBeat(b), delay);
      }

      const subDuration = getSecondsPerBeat() / subdivision;
      nextNoteTime += subDuration;
      currentSubBeat++;

      if (currentSubBeat >= beatsPerMeasure * subdivision) {
        currentSubBeat = 0;
        // Practice mode bar counting
        if (practiceMode) {
          practiceBarCount++;
          if (practiceBarCount >= practiceBars) {
            practiceBarCount = 0;
            const newBpm = bpm + practiceInc;
            if (newBpm <= practiceTarget) {
              setBpm(newBpm);
              updatePracticeStatus();
            } else {
              practiceMode = false;
              updatePracticeStatus();
            }
          }
        }
      }
    }
  }

  function startScheduler() {
    initAudio();
    if (audioCtx.state === 'suspended') audioCtx.resume();
    currentSubBeat = 0;
    nextNoteTime = audioCtx.currentTime + 0.05;
    schedulerTimer = setInterval(scheduler, lookahead);
  }

  function stopScheduler() {
    clearInterval(schedulerTimer);
    schedulerTimer = null;
    currentBeat = -1;
    clearBeatHighlights();
  }

  // --- UI ---
  const bpmValueEl = document.getElementById('bpmValue');
  const bpmSlider = document.getElementById('bpmSlider');
  const bpmInput = document.getElementById('bpmInput');
  const btnPlay = document.getElementById('btnPlay');
  const btnTap = document.getElementById('btnTap');
  const btnMinus = document.getElementById('btnMinus');
  const btnPlus = document.getElementById('btnPlus');
  const beatDotsEl = document.getElementById('beatDots');
  const tempoMarkingEl = document.getElementById('tempoMarking');
  const volumeSlider = document.getElementById('volumeSlider');
  const volumeValEl = document.getElementById('volumeVal');
  const btnPractice = document.getElementById('btnPractice');
  const practiceStatusEl = document.getElementById('practiceStatus');

  function setBpm(val) {
    bpm = Math.min(300, Math.max(20, Math.round(val)));
    bpmValueEl.textContent = bpm;
    bpmSlider.value = bpm;
    bpmInput.value = bpm;
    updateTempoMarking();
    updatePendulumSpeed();
  }

  function getTempoMarking(b) {
    if (b < 40) return 'Grave';
    if (b < 55) return 'Largo';
    if (b < 65) return 'Larghetto';
    if (b < 73) return 'Adagio';
    if (b < 85) return 'Andante';
    if (b < 98) return 'Andantino';
    if (b < 109) return 'Moderato';
    if (b < 132) return 'Allegro';
    if (b < 140) return 'Vivace';
    if (b < 178) return 'Presto';
    return 'Prestissimo';
  }

  function updateTempoMarking() {
    tempoMarkingEl.textContent = getTempoMarking(bpm);
  }

  function buildBeatDots() {
    beatDotsEl.innerHTML = '';
    for (let i = 0; i < beatsPerMeasure; i++) {
      const dot = document.createElement('div');
      dot.className = 'beat-dot' + (accents[i] ? ' accented' : '');
      dot.textContent = i + 1;
      dot.dataset.beat = i;
      dot.addEventListener('click', () => {
        accents[i] = !accents[i];
        dot.classList.toggle('accented');
      });
      beatDotsEl.appendChild(dot);
    }
  }

  function highlightBeat(index) {
    currentBeat = index;
    const dots = beatDotsEl.children;
    for (let i = 0; i < dots.length; i++) {
      dots[i].classList.toggle('active', i === index);
    }
    // Flash BPM
    bpmValueEl.classList.remove('flash', 'flash-accent');
    void bpmValueEl.offsetWidth; // reflow
    bpmValueEl.classList.add(accents[index] ? 'flash-accent' : 'flash');
    setTimeout(() => bpmValueEl.classList.remove('flash', 'flash-accent'), 80);
  }

  function clearBeatHighlights() {
    const dots = beatDotsEl.children;
    for (let i = 0; i < dots.length; i++) dots[i].classList.remove('active');
  }

  function togglePlay() {
    initAudio();
    playing = !playing;
    if (playing) {
      btnPlay.textContent = 'STOP';
      btnPlay.classList.add('active');
      startScheduler();
    } else {
      btnPlay.textContent = 'START';
      btnPlay.classList.remove('active');
      stopScheduler();
      if (practiceMode) {
        practiceMode = false;
        updatePracticeStatus();
      }
    }
  }

  // Time signature
  function setTimeSig(sig) {
    const parts = sig.split('/');
    beatsPerMeasure = parseInt(parts[0]);
    beatUnit = parseInt(parts[1]);
    accents = new Array(beatsPerMeasure).fill(false);
    accents[0] = true;
    buildBeatDots();
    // Reset scheduling
    if (playing) {
      currentSubBeat = 0;
    }
  }

  document.getElementById('timeSigGroup').addEventListener('click', (e) => {
    if (!e.target.dataset.sig) return;
    document.querySelectorAll('#timeSigGroup .option-btn').forEach(b => b.classList.remove('active'));
    e.target.classList.add('active');
    setTimeSig(e.target.dataset.sig);
  });

  // Subdivision
  document.getElementById('subdivGroup').addEventListener('click', (e) => {
    if (!e.target.dataset.subdiv) return;
    document.querySelectorAll('#subdivGroup .option-btn').forEach(b => b.classList.remove('active'));
    e.target.classList.add('active');
    subdivision = parseInt(e.target.dataset.subdiv);
  });

  // Sound
  document.getElementById('soundGroup').addEventListener('click', (e) => {
    if (!e.target.dataset.sound) return;
    document.querySelectorAll('#soundGroup .option-btn').forEach(b => b.classList.remove('active'));
    e.target.classList.add('active');
    soundType = e.target.dataset.sound;
  });

  // BPM controls
  bpmSlider.addEventListener('input', () => setBpm(parseInt(bpmSlider.value)));
  bpmInput.addEventListener('change', () => setBpm(parseInt(bpmInput.value)));
  btnMinus.addEventListener('click', () => setBpm(bpm - 1));
  btnPlus.addEventListener('click', () => setBpm(bpm + 1));
  btnPlay.addEventListener('click', togglePlay);

  // Volume
  volumeSlider.addEventListener('input', () => {
    volume = parseInt(volumeSlider.value) / 100;
    volumeValEl.textContent = volumeSlider.value;
    if (masterGain) masterGain.gain.value = volume;
  });

  // Tap tempo
  btnTap.addEventListener('click', handleTap);

  function handleTap() {
    const now = performance.now();
    tapTimes.push(now);
    if (tapTimes.length > 5) tapTimes.shift();
    // Clear old taps (> 2 seconds gap)
    if (tapTimes.length >= 2 && (now - tapTimes[tapTimes.length - 2]) > 2000) {
      tapTimes = [now];
      return;
    }
    if (tapTimes.length >= 2) {
      const intervals = [];
      const count = Math.min(tapTimes.length, 5);
      for (let i = 1; i < count; i++) {
        intervals.push(tapTimes[tapTimes.length - count + i] - tapTimes[tapTimes.length - count + i - 1]);
      }
      const avg = intervals.reduce((a, b) => a + b, 0) / intervals.length;
      setBpm(Math.round(60000 / avg));
    }
  }

  // Practice mode
  btnPractice.addEventListener('click', () => {
    if (practiceMode) {
      practiceMode = false;
      updatePracticeStatus();
      return;
    }
    const startBpm = parseInt(document.getElementById('practiceStart').value) || 80;
    practiceTarget = parseInt(document.getElementById('practiceEnd').value) || 160;
    practiceInc = parseInt(document.getElementById('practiceInc').value) || 5;
    practiceBars = parseInt(document.getElementById('practiceBars').value) || 4;
    practiceBarCount = 0;
    practiceMode = true;
    setBpm(startBpm);
    if (!playing) togglePlay();
    updatePracticeStatus();
  });

  function updatePracticeStatus() {
    if (practiceMode) {
      practiceStatusEl.textContent = `Practice: ${bpm} / ${practiceTarget} BPM`;
      practiceStatusEl.className = 'practice-status running';
      btnPractice.textContent = 'Stop Practice';
      btnPractice.style.borderColor = 'var(--green)';
      btnPractice.style.color = 'var(--green)';
    } else {
      practiceStatusEl.textContent = '';
      practiceStatusEl.className = 'practice-status';
      btnPractice.textContent = 'Start Practice';
      btnPractice.style.borderColor = '';
      btnPractice.style.color = '';
    }
  }

  // Keyboard
  document.addEventListener('keydown', (e) => {
    if (e.target.tagName === 'INPUT') return;
    switch (e.code) {
      case 'Space':
        e.preventDefault();
        togglePlay();
        break;
      case 'ArrowUp':
        e.preventDefault();
        setBpm(bpm + 1);
        break;
      case 'ArrowDown':
        e.preventDefault();
        setBpm(bpm - 1);
        break;
      case 'KeyT':
        e.preventDefault();
        handleTap();
        break;
    }
  });

  // --- Pendulum ---
  const canvas = document.getElementById('pendulum');
  const ctx = canvas.getContext('2d');
  let pendulumAngle = 0;
  let pendulumDir = 1;
  let pendulumSpeed = 1;
  let lastPendulumTime = 0;

  function updatePendulumSpeed() {
    // One full swing (left to right) = one beat
    pendulumSpeed = bpm / 60;
  }

  function resizeCanvas() {
    const rect = canvas.parentElement.getBoundingClientRect();
    canvas.width = rect.width * window.devicePixelRatio;
    canvas.height = rect.height * window.devicePixelRatio;
    ctx.scale(window.devicePixelRatio, window.devicePixelRatio);
  }

  function drawPendulum(timestamp) {
    if (!lastPendulumTime) lastPendulumTime = timestamp;
    const dt = (timestamp - lastPendulumTime) / 1000;
    lastPendulumTime = timestamp;

    const w = canvas.width / window.devicePixelRatio;
    const h = canvas.height / window.devicePixelRatio;

    ctx.clearRect(0, 0, w, h);

    if (playing) {
      // Sinusoidal motion: angle = sin(2*PI*freq*t)
      // freq = bpm/60 * 0.5 (half cycle per beat)
      pendulumAngle += dt * pendulumSpeed * Math.PI;
      const swing = Math.sin(pendulumAngle);
      const maxAngle = 0.5; // radians

      const pivotX = w / 2;
      const pivotY = 4;
      const length = h - 16;
      const angle = swing * maxAngle;

      const bobX = pivotX + Math.sin(angle) * length;
      const bobY = pivotY + Math.cos(angle) * length;

      // Rod
      ctx.beginPath();
      ctx.moveTo(pivotX, pivotY);
      ctx.lineTo(bobX, bobY);
      ctx.strokeStyle = '#1a2535';
      ctx.lineWidth = 2;
      ctx.stroke();

      // Bob
      const grd = ctx.createRadialGradient(bobX, bobY, 2, bobX, bobY, 10);
      grd.addColorStop(0, '#00d4ff');
      grd.addColorStop(1, 'rgba(0,212,255,0.1)');
      ctx.beginPath();
      ctx.arc(bobX, bobY, 8, 0, Math.PI * 2);
      ctx.fillStyle = grd;
      ctx.fill();

      // Glow
      ctx.beginPath();
      ctx.arc(bobX, bobY, 14, 0, Math.PI * 2);
      ctx.fillStyle = 'rgba(0,212,255,0.08)';
      ctx.fill();

      // Pivot
      ctx.beginPath();
      ctx.arc(pivotX, pivotY, 3, 0, Math.PI * 2);
      ctx.fillStyle = '#1a2535';
      ctx.fill();
    } else {
      // Static center
      const pivotX = w / 2;
      const pivotY = 4;
      const length = h - 16;

      ctx.beginPath();
      ctx.moveTo(pivotX, pivotY);
      ctx.lineTo(pivotX, pivotY + length);
      ctx.strokeStyle = '#1a2535';
      ctx.lineWidth = 2;
      ctx.stroke();

      ctx.beginPath();
      ctx.arc(pivotX, pivotY + length, 8, 0, Math.PI * 2);
      ctx.fillStyle = 'rgba(0,212,255,0.3)';
      ctx.fill();

      ctx.beginPath();
      ctx.arc(pivotX, pivotY, 3, 0, Math.PI * 2);
      ctx.fillStyle = '#1a2535';
      ctx.fill();

      pendulumAngle = 0;
    }

    requestAnimationFrame(drawPendulum);
  }

  // Init
  window.addEventListener('resize', resizeCanvas);
  resizeCanvas();
  buildBeatDots();
  updateTempoMarking();
  updatePendulumSpeed();
  requestAnimationFrame(drawPendulum);

})();
</script>
</body>
</html>
