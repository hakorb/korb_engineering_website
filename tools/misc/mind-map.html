<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<title>Mind Map | Korb Engineering</title>
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
  html, body {
    height: 100%;
    background: #050a0f;
    color: #e2e8f0;
    font-family: 'JetBrains Mono', monospace;
    overflow: hidden;
    font-size: 14px;
  }
  body { display: flex; flex-direction: column; }
  header {
    background: #0a1018;
    border-bottom: 1px solid #1a2535;
    padding: 10px 14px;
    display: flex;
    align-items: center;
    gap: 10px;
    flex-wrap: wrap;
  }
  header h1 {
    color: #00d4ff;
    font-size: 16px;
    font-weight: 700;
    letter-spacing: 1px;
    text-transform: uppercase;
    margin-right: auto;
  }
  header h1::before { content: "> "; color: #ff6600; }
  .toolbar {
    background: #0e1520;
    border-bottom: 1px solid #1a2535;
    padding: 8px 10px;
    display: flex;
    gap: 6px;
    flex-wrap: wrap;
    align-items: center;
  }
  button, select, input[type="text"] {
    background: #0a1018;
    color: #e2e8f0;
    border: 1px solid #1a2535;
    border-radius: 4px;
    padding: 8px 10px;
    font-family: 'JetBrains Mono', monospace;
    font-size: 16px;
    cursor: pointer;
    transition: all 0.15s;
    min-height: 36px;
  }
  button:hover, select:hover { border-color: #00d4ff; color: #00d4ff; }
  button:active { transform: translateY(1px); }
  button.primary { background: #00d4ff; color: #050a0f; border-color: #00d4ff; font-weight: 700; }
  button.primary:hover { background: #0a1018; color: #00d4ff; }
  button.danger { border-color: #ef4444; color: #ef4444; }
  button.danger:hover { background: #ef4444; color: #050a0f; }
  button.accent { border-color: #ff6600; color: #ff6600; }
  button.accent:hover { background: #ff6600; color: #050a0f; }
  input[type="text"] { flex: 1; min-width: 120px; }
  .separator { width: 1px; height: 24px; background: #1a2535; margin: 0 4px; }
  .canvas-wrap {
    flex: 1;
    position: relative;
    background: #050a0f;
    overflow: hidden;
    touch-action: none;
  }
  canvas {
    position: absolute;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    display: block;
    cursor: grab;
  }
  canvas.grabbing { cursor: grabbing; }
  .node-editor {
    position: absolute;
    background: #0e1520;
    border: 1px solid #00d4ff;
    border-radius: 6px;
    padding: 10px;
    z-index: 100;
    box-shadow: 0 4px 20px rgba(0, 212, 255, 0.3);
    display: none;
    max-width: 320px;
  }
  .node-editor.visible { display: block; }
  .node-editor textarea {
    width: 260px;
    min-height: 60px;
    background: #050a0f;
    color: #e2e8f0;
    border: 1px solid #1a2535;
    border-radius: 4px;
    padding: 6px;
    font-family: 'JetBrains Mono', monospace;
    font-size: 16px;
    resize: vertical;
    margin-bottom: 8px;
  }
  .node-editor textarea:focus { outline: none; border-color: #00d4ff; }
  .palette { display: flex; gap: 5px; margin-bottom: 8px; flex-wrap: wrap; }
  .swatch {
    width: 26px;
    height: 26px;
    border-radius: 4px;
    border: 2px solid #1a2535;
    cursor: pointer;
  }
  .swatch.selected { border-color: #fff; }
  .shapes { display: flex; gap: 5px; margin-bottom: 8px; }
  .shape-btn {
    flex: 1;
    font-size: 11px;
    padding: 6px;
    min-height: 30px;
  }
  .shape-btn.selected { background: #00d4ff; color: #050a0f; border-color: #00d4ff; }
  .editor-actions { display: flex; gap: 5px; }
  .editor-actions button { flex: 1; font-size: 12px; padding: 6px; min-height: 32px; }
  .status-bar {
    background: #0a1018;
    border-top: 1px solid #1a2535;
    padding: 6px 12px;
    font-size: 11px;
    color: #64748b;
    display: flex;
    justify-content: space-between;
    gap: 10px;
    flex-wrap: wrap;
  }
  .status-bar span { color: #10b981; }
  .modal-overlay {
    position: fixed;
    inset: 0;
    background: rgba(5, 10, 15, 0.85);
    display: none;
    align-items: center;
    justify-content: center;
    z-index: 1000;
    padding: 20px;
  }
  .modal-overlay.visible { display: flex; }
  .modal {
    background: #0e1520;
    border: 1px solid #1a2535;
    border-radius: 8px;
    padding: 20px;
    max-width: 500px;
    width: 100%;
    max-height: 80vh;
    overflow-y: auto;
  }
  .modal h2 {
    color: #00d4ff;
    font-size: 14px;
    margin-bottom: 12px;
    text-transform: uppercase;
    letter-spacing: 1px;
  }
  .modal label { display: block; font-size: 12px; color: #94a3b8; margin-bottom: 4px; }
  .modal input[type="text"], .modal textarea {
    width: 100%;
    background: #050a0f;
    color: #e2e8f0;
    border: 1px solid #1a2535;
    border-radius: 4px;
    padding: 8px;
    font-family: 'JetBrains Mono', monospace;
    font-size: 16px;
    margin-bottom: 10px;
  }
  .modal textarea { min-height: 120px; resize: vertical; }
  .modal-actions { display: flex; gap: 8px; justify-content: flex-end; flex-wrap: wrap; }
  .saved-list {
    list-style: none;
    max-height: 300px;
    overflow-y: auto;
    border: 1px solid #1a2535;
    border-radius: 4px;
    margin-bottom: 10px;
  }
  .saved-list li {
    padding: 10px;
    border-bottom: 1px solid #1a2535;
    display: flex;
    justify-content: space-between;
    align-items: center;
    gap: 8px;
  }
  .saved-list li:last-child { border-bottom: none; }
  .saved-list li:hover { background: #050a0f; }
  .saved-list .name { color: #e2e8f0; flex: 1; cursor: pointer; font-size: 13px; }
  .saved-list .name:hover { color: #00d4ff; }
  .saved-list button { padding: 4px 8px; font-size: 11px; min-height: 28px; }
  .hint {
    position: absolute;
    bottom: 10px;
    left: 10px;
    background: rgba(10, 16, 24, 0.9);
    border: 1px solid #1a2535;
    border-radius: 4px;
    padding: 6px 10px;
    font-size: 10px;
    color: #64748b;
    pointer-events: none;
    max-width: 260px;
    line-height: 1.5;
  }
  .hint kbd {
    background: #050a0f;
    border: 1px solid #1a2535;
    padding: 1px 4px;
    border-radius: 3px;
    color: #00d4ff;
    font-family: inherit;
    font-size: 9px;
  }
  @media (max-width: 600px) {
    header h1 { font-size: 13px; }
    .toolbar { padding: 6px; gap: 4px; }
    button, select { padding: 6px 8px; font-size: 13px; }
    .hint { display: none; }
  }
</style>
</head>
<body>
<header>
  <h1>MIND MAP</h1>
  <button id="btnFullscreen" title="Fullscreen">[ ]</button>
</header>
<div class="toolbar">
  <button id="btnAddChild" class="primary" title="Add Child (Tab)">+ CHILD</button>
  <button id="btnAddSibling" title="Add Sibling (Enter)">+ SIBLING</button>
  <button id="btnDelete" class="danger" title="Delete (Del)">DEL</button>
  <div class="separator"></div>
  <select id="layoutSelect" title="Auto Layout">
    <option value="radial">RADIAL</option>
    <option value="fan">FAN</option>
    <option value="tree">TREE</option>
  </select>
  <button id="btnLayout" class="accent">ARRANGE</button>
  <button id="btnReset" title="Reset View">RESET</button>
  <div class="separator"></div>
  <button id="btnUndo" title="Undo">UNDO</button>
  <button id="btnRedo" title="Redo">REDO</button>
  <div class="separator"></div>
  <input type="text" id="searchInput" placeholder="search...">
  <div class="separator"></div>
  <button id="btnSave">SAVE</button>
  <button id="btnLoad">LOAD</button>
  <button id="btnNew">NEW</button>
  <div class="separator"></div>
  <button id="btnExportPNG">PNG</button>
  <button id="btnExportJSON">JSON</button>
  <button id="btnExportMD">MD</button>
  <button id="btnImport">IMPORT</button>
</div>
<div class="canvas-wrap" id="canvasWrap">
  <canvas id="canvas"></canvas>
  <div class="node-editor" id="nodeEditor">
    <textarea id="editorText" placeholder="node text..."></textarea>
    <div class="palette" id="palette"></div>
    <div class="shapes">
      <button class="shape-btn selected" data-shape="rect">RECT</button>
      <button class="shape-btn" data-shape="ellipse">ELLIPSE</button>
      <button class="shape-btn" data-shape="hex">HEX</button>
    </div>
    <div class="editor-actions">
      <button id="editorOk" class="primary">OK</button>
      <button id="editorCancel">CANCEL</button>
    </div>
  </div>
  <div class="hint">
    <kbd>Tab</kbd> child <kbd>Enter</kbd> sibling <kbd>Del</kbd> remove<br>
    dbl-click: edit/add | drag empty: pan | scroll: zoom
  </div>
</div>
<div class="status-bar">
  <span id="statusMap">untitled</span>
  <span id="statusNodes">0 nodes</span>
  <span id="statusZoom">100%</span>
</div>

<div class="modal-overlay" id="modalOverlay">
  <div class="modal" id="modalContent"></div>
</div>
<input type="file" id="fileInput" accept=".json" style="display:none">

<script>
(function() {
  'use strict';

  const COLORS = ['#00d4ff', '#ff6600', '#10b981', '#ef4444', '#fbbf24', '#a855f7', '#ec4899', '#64748b'];
  const SHAPES = ['rect', 'ellipse', 'hex'];

  const canvas = document.getElementById('canvas');
  const ctx = canvas.getContext('2d');
  const wrap = document.getElementById('canvasWrap');

  let state = {
    nodes: {},
    rootId: null,
    mapName: 'untitled',
  };
  let view = { x: 0, y: 0, zoom: 1 };
  let selectedId = null;
  let history = [];
  let historyIndex = -1;
  let searchQuery = '';
  let dragState = null;
  let pinchState = null;

  function uid() { return 'n' + Math.random().toString(36).slice(2, 10); }

  function createNode(parentId, text) {
    const id = uid();
    const parent = parentId ? state.nodes[parentId] : null;
    const node = {
      id,
      parentId,
      text: text || 'New Node',
      x: parent ? parent.x + 180 : 0,
      y: parent ? parent.y + (Math.random() * 100 - 50) : 0,
      color: parent ? parent.color : COLORS[0],
      shape: 'rect',
      children: [],
    };
    state.nodes[id] = node;
    if (parent) parent.children.push(id);
    return node;
  }

  function deleteSubtree(id) {
    const node = state.nodes[id];
    if (!node) return;
    [...node.children].forEach(deleteSubtree);
    if (node.parentId) {
      const parent = state.nodes[node.parentId];
      if (parent) parent.children = parent.children.filter(c => c !== id);
    }
    delete state.nodes[id];
  }

  function snapshot() {
    const data = JSON.stringify(state);
    if (historyIndex < history.length - 1) history = history.slice(0, historyIndex + 1);
    history.push(data);
    if (history.length > 100) history.shift();
    historyIndex = history.length - 1;
  }

  function restore(data) {
    state = JSON.parse(data);
    if (!state.nodes[selectedId]) selectedId = state.rootId;
    draw();
    updateStatus();
  }

  function undo() {
    if (historyIndex > 0) { historyIndex--; restore(history[historyIndex]); }
  }
  function redo() {
    if (historyIndex < history.length - 1) { historyIndex++; restore(history[historyIndex]); }
  }

  function initNew() {
    state = { nodes: {}, rootId: null, mapName: 'untitled' };
    const root = createNode(null, 'Central Idea');
    root.x = 0; root.y = 0;
    root.color = '#00d4ff';
    state.rootId = root.id;
    selectedId = root.id;
    view = { x: 0, y: 0, zoom: 1 };
    history = [];
    historyIndex = -1;
    snapshot();
    resizeCanvas();
    centerView();
    draw();
    updateStatus();
  }

  function centerView() {
    view.x = canvas.width / 2 / (window.devicePixelRatio || 1);
    view.y = canvas.height / 2 / (window.devicePixelRatio || 1);
    view.zoom = 1;
  }

  function resizeCanvas() {
    const dpr = window.devicePixelRatio || 1;
    const rect = wrap.getBoundingClientRect();
    canvas.width = rect.width * dpr;
    canvas.height = rect.height * dpr;
    canvas.style.width = rect.width + 'px';
    canvas.style.height = rect.height + 'px';
    ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
  }

  function worldToScreen(x, y) {
    return { x: x * view.zoom + view.x, y: y * view.zoom + view.y };
  }
  function screenToWorld(x, y) {
    return { x: (x - view.x) / view.zoom, y: (y - view.y) / view.zoom };
  }

  function measureNode(node) {
    const lines = node.text.split('\n');
    ctx.font = '600 14px JetBrains Mono, monospace';
    let maxW = 0;
    lines.forEach(l => { const w = ctx.measureText(l).width; if (w > maxW) maxW = w; });
    const w = Math.max(80, maxW + 24);
    const h = Math.max(36, lines.length * 18 + 16);
    return { w, h };
  }

  function drawNodeShape(x, y, w, h, shape, color, filled, lineWidth) {
    ctx.lineWidth = lineWidth || 2;
    ctx.strokeStyle = color;
    ctx.fillStyle = filled ? color + '22' : '#0a1018';
    ctx.beginPath();
    if (shape === 'ellipse') {
      ctx.ellipse(x, y, w / 2, h / 2, 0, 0, Math.PI * 2);
    } else if (shape === 'hex') {
      const hw = w / 2, hh = h / 2;
      const cut = Math.min(hh, hw * 0.4);
      ctx.moveTo(x - hw + cut, y - hh);
      ctx.lineTo(x + hw - cut, y - hh);
      ctx.lineTo(x + hw, y);
      ctx.lineTo(x + hw - cut, y + hh);
      ctx.lineTo(x - hw + cut, y + hh);
      ctx.lineTo(x - hw, y);
      ctx.closePath();
    } else {
      const r = 10;
      ctx.moveTo(x - w/2 + r, y - h/2);
      ctx.arcTo(x + w/2, y - h/2, x + w/2, y + h/2, r);
      ctx.arcTo(x + w/2, y + h/2, x - w/2, y + h/2, r);
      ctx.arcTo(x - w/2, y + h/2, x - w/2, y - h/2, r);
      ctx.arcTo(x - w/2, y - h/2, x + w/2, y - h/2, r);
      ctx.closePath();
    }
    ctx.fill();
    ctx.stroke();
  }

  function pointInNode(node, wx, wy) {
    const { w, h } = measureNode(node);
    return Math.abs(wx - node.x) < w / 2 && Math.abs(wy - node.y) < h / 2;
  }

  function drawGrid() {
    const dpr = window.devicePixelRatio || 1;
    const W = canvas.width / dpr;
    const H = canvas.height / dpr;
    ctx.fillStyle = '#050a0f';
    ctx.fillRect(0, 0, W, H);
    const gridSize = 40 * view.zoom;
    if (gridSize < 15) return;
    ctx.strokeStyle = '#0e1520';
    ctx.lineWidth = 1;
    const startX = view.x % gridSize;
    const startY = view.y % gridSize;
    ctx.beginPath();
    for (let x = startX; x < W; x += gridSize) {
      ctx.moveTo(x, 0); ctx.lineTo(x, H);
    }
    for (let y = startY; y < H; y += gridSize) {
      ctx.moveTo(0, y); ctx.lineTo(W, y);
    }
    ctx.stroke();
  }

  function drawConnector(parent, child) {
    const p = worldToScreen(parent.x, parent.y);
    const c = worldToScreen(child.x, child.y);
    const dx = c.x - p.x;
    ctx.strokeStyle = child.color;
    ctx.lineWidth = 2 * Math.min(view.zoom, 1.5);
    ctx.beginPath();
    ctx.moveTo(p.x, p.y);
    ctx.bezierCurveTo(p.x + dx * 0.5, p.y, c.x - dx * 0.5, c.y, c.x, c.y);
    ctx.stroke();
  }

  function draw() {
    drawGrid();
    // connectors first
    Object.values(state.nodes).forEach(n => {
      if (n.parentId) {
        const p = state.nodes[n.parentId];
        if (p) drawConnector(p, n);
      }
    });
    // nodes
    Object.values(state.nodes).forEach(n => {
      const { w, h } = measureNode(n);
      const s = worldToScreen(n.x, n.y);
      const sw = w * view.zoom;
      const sh = h * view.zoom;
      const isSelected = n.id === selectedId;
      const matchesSearch = searchQuery && n.text.toLowerCase().includes(searchQuery.toLowerCase());
      let lineW = isSelected ? 3 : 2;
      let color = n.color;
      if (matchesSearch) { color = '#fbbf24'; lineW = 3; }
      drawNodeShape(s.x, s.y, sw, sh, n.shape, color, true, lineW);
      // text
      ctx.fillStyle = '#e2e8f0';
      ctx.font = `600 ${14 * view.zoom}px JetBrains Mono, monospace`;
      ctx.textAlign = 'center';
      ctx.textBaseline = 'middle';
      const lines = n.text.split('\n');
      const lineH = 18 * view.zoom;
      const startY = s.y - (lines.length - 1) * lineH / 2;
      lines.forEach((l, i) => ctx.fillText(l, s.x, startY + i * lineH));
      if (isSelected) {
        ctx.strokeStyle = '#00d4ff';
        ctx.setLineDash([4, 4]);
        ctx.lineWidth = 1;
        ctx.strokeRect(s.x - sw/2 - 6, s.y - sh/2 - 6, sw + 12, sh + 12);
        ctx.setLineDash([]);
      }
    });
  }

  function hitTest(sx, sy) {
    const w = screenToWorld(sx, sy);
    const nodes = Object.values(state.nodes);
    for (let i = nodes.length - 1; i >= 0; i--) {
      if (pointInNode(nodes[i], w.x, w.y)) return nodes[i];
    }
    return null;
  }

  function getSubtreeIds(id) {
    const result = [id];
    const node = state.nodes[id];
    if (node) node.children.forEach(c => result.push(...getSubtreeIds(c)));
    return result;
  }

  function moveSubtree(id, dx, dy) {
    getSubtreeIds(id).forEach(nid => {
      const n = state.nodes[nid];
      if (n) { n.x += dx; n.y += dy; }
    });
  }

  // Layouts
  function layoutRadial() {
    if (!state.rootId) return;
    const root = state.nodes[state.rootId];
    root.x = 0; root.y = 0;
    const place = (nodeId, startAngle, endAngle, radius, depth) => {
      const node = state.nodes[nodeId];
      if (!node.children.length) return;
      const n = node.children.length;
      const span = endAngle - startAngle;
      node.children.forEach((cid, i) => {
        const child = state.nodes[cid];
        const angle = startAngle + span * (i + 0.5) / n;
        child.x = Math.cos(angle) * radius;
        child.y = Math.sin(angle) * radius;
        place(cid, angle - span / n / 2, angle + span / n / 2, radius + 200, depth + 1);
      });
    };
    place(state.rootId, 0, Math.PI * 2, 220, 0);
  }

  function layoutFan() {
    if (!state.rootId) return;
    const root = state.nodes[state.rootId];
    root.x = 0; root.y = 0;
    // distribute children horizontally across levels
    const levels = {};
    const assign = (id, depth) => {
      if (!levels[depth]) levels[depth] = [];
      levels[depth].push(id);
      state.nodes[id].children.forEach(c => assign(c, depth + 1));
    };
    assign(state.rootId, 0);
    Object.keys(levels).forEach(d => {
      const ids = levels[d];
      const depth = parseInt(d);
      ids.forEach((id, i) => {
        const n = state.nodes[id];
        n.x = depth * 240;
        n.y = (i - (ids.length - 1) / 2) * 90;
      });
    });
  }

  function layoutTree() {
    if (!state.rootId) return;
    let yCursor = 0;
    const assign = (id, depth) => {
      const node = state.nodes[id];
      node.x = depth * 240;
      if (!node.children.length) {
        node.y = yCursor * 70;
        yCursor++;
        return node.y;
      }
      const childYs = node.children.map(c => assign(c, depth + 1));
      node.y = (childYs[0] + childYs[childYs.length - 1]) / 2;
      return node.y;
    };
    assign(state.rootId, 0);
    // center vertically
    const root = state.nodes[state.rootId];
    const rootY = root.y;
    Object.values(state.nodes).forEach(n => n.y -= rootY);
    const rootX = root.x;
    Object.values(state.nodes).forEach(n => n.x -= rootX);
  }

  // Node editor
  const editor = document.getElementById('nodeEditor');
  const editorText = document.getElementById('editorText');
  const palette = document.getElementById('palette');
  let editingId = null;

  COLORS.forEach(c => {
    const s = document.createElement('div');
    s.className = 'swatch';
    s.style.background = c;
    s.dataset.color = c;
    s.addEventListener('click', () => {
      palette.querySelectorAll('.swatch').forEach(x => x.classList.remove('selected'));
      s.classList.add('selected');
    });
    palette.appendChild(s);
  });

  document.querySelectorAll('.shape-btn').forEach(b => {
    b.addEventListener('click', () => {
      document.querySelectorAll('.shape-btn').forEach(x => x.classList.remove('selected'));
      b.classList.add('selected');
    });
  });

  function openEditor(nodeId) {
    const node = state.nodes[nodeId];
    if (!node) return;
    editingId = nodeId;
    editorText.value = node.text;
    palette.querySelectorAll('.swatch').forEach(s => {
      s.classList.toggle('selected', s.dataset.color === node.color);
    });
    document.querySelectorAll('.shape-btn').forEach(b => {
      b.classList.toggle('selected', b.dataset.shape === node.shape);
    });
    // position
    const s = worldToScreen(node.x, node.y);
    const rect = wrap.getBoundingClientRect();
    let ex = s.x + 20;
    let ey = s.y;
    if (ex + 300 > rect.width) ex = s.x - 320;
    if (ex < 10) ex = 10;
    if (ey + 260 > rect.height) ey = rect.height - 270;
    if (ey < 10) ey = 10;
    editor.style.left = ex + 'px';
    editor.style.top = ey + 'px';
    editor.classList.add('visible');
    setTimeout(() => editorText.focus(), 10);
  }

  function closeEditor() {
    editor.classList.remove('visible');
    editingId = null;
  }

  function applyEditor() {
    if (!editingId) return;
    const node = state.nodes[editingId];
    if (!node) return;
    node.text = editorText.value.trim() || 'Node';
    const selC = palette.querySelector('.swatch.selected');
    if (selC) node.color = selC.dataset.color;
    const selS = document.querySelector('.shape-btn.selected');
    if (selS) node.shape = selS.dataset.shape;
    snapshot();
    closeEditor();
    draw();
    updateStatus();
  }

  document.getElementById('editorOk').addEventListener('click', applyEditor);
  document.getElementById('editorCancel').addEventListener('click', closeEditor);

  // Input events
  let lastTap = 0;
  canvas.addEventListener('pointerdown', (e) => {
    e.preventDefault();
    canvas.setPointerCapture(e.pointerId);
    const rect = canvas.getBoundingClientRect();
    const sx = e.clientX - rect.left;
    const sy = e.clientY - rect.top;
    const node = hitTest(sx, sy);
    const now = Date.now();
    const isDoubleTap = now - lastTap < 300;
    lastTap = now;

    if (node) {
      selectedId = node.id;
      if (isDoubleTap) {
        openEditor(node.id);
        draw();
        return;
      }
      dragState = {
        type: 'node',
        id: node.id,
        startX: sx,
        startY: sy,
        origX: node.x,
        origY: node.y,
        moved: false,
      };
    } else {
      if (isDoubleTap) {
        // add a root-sibling child? If no node, add new root or child of root
        if (state.rootId) {
          const w = screenToWorld(sx, sy);
          const newNode = createNode(state.rootId);
          newNode.x = w.x; newNode.y = w.y;
          selectedId = newNode.id;
          snapshot();
          draw();
          updateStatus();
          openEditor(newNode.id);
        }
        return;
      }
      dragState = { type: 'pan', startX: sx, startY: sy, origX: view.x, origY: view.y };
      canvas.classList.add('grabbing');
    }
    draw();
  });

  canvas.addEventListener('pointermove', (e) => {
    if (!dragState) return;
    const rect = canvas.getBoundingClientRect();
    const sx = e.clientX - rect.left;
    const sy = e.clientY - rect.top;
    const dx = sx - dragState.startX;
    const dy = sy - dragState.startY;
    if (dragState.type === 'pan') {
      view.x = dragState.origX + dx;
      view.y = dragState.origY + dy;
      draw();
    } else if (dragState.type === 'node') {
      if (Math.abs(dx) > 3 || Math.abs(dy) > 3) dragState.moved = true;
      const node = state.nodes[dragState.id];
      const wdx = (node.x + dx / view.zoom) - node.x - (dragState.origX - node.x);
      // Simpler: compute new target
      const targetX = dragState.origX + dx / view.zoom;
      const targetY = dragState.origY + dy / view.zoom;
      const moveDx = targetX - node.x;
      const moveDy = targetY - node.y;
      moveSubtree(dragState.id, moveDx, moveDy);
      draw();
    }
  });

  canvas.addEventListener('pointerup', (e) => {
    if (dragState) {
      if (dragState.type === 'node' && dragState.moved) snapshot();
      if (dragState.type === 'pan') canvas.classList.remove('grabbing');
    }
    dragState = null;
  });
  canvas.addEventListener('pointercancel', () => { dragState = null; canvas.classList.remove('grabbing'); });

  canvas.addEventListener('wheel', (e) => {
    e.preventDefault();
    const rect = canvas.getBoundingClientRect();
    const sx = e.clientX - rect.left;
    const sy = e.clientY - rect.top;
    const before = screenToWorld(sx, sy);
    const factor = e.deltaY > 0 ? 0.9 : 1.1;
    view.zoom = Math.max(0.2, Math.min(3, view.zoom * factor));
    const after = screenToWorld(sx, sy);
    view.x += (after.x - before.x) * view.zoom;
    view.y += (after.y - before.y) * view.zoom;
    draw();
    updateStatus();
  }, { passive: false });

  // Pinch zoom
  const activePointers = new Map();
  canvas.addEventListener('pointerdown', (e) => activePointers.set(e.pointerId, e));
  canvas.addEventListener('pointermove', (e) => {
    if (activePointers.has(e.pointerId)) activePointers.set(e.pointerId, e);
    if (activePointers.size === 2) {
      const pts = [...activePointers.values()];
      const dist = Math.hypot(pts[0].clientX - pts[1].clientX, pts[0].clientY - pts[1].clientY);
      if (pinchState) {
        const factor = dist / pinchState.dist;
        view.zoom = Math.max(0.2, Math.min(3, pinchState.zoom * factor));
        draw();
        updateStatus();
      } else {
        pinchState = { dist, zoom: view.zoom };
        dragState = null;
      }
    }
  });
  canvas.addEventListener('pointerup', (e) => { activePointers.delete(e.pointerId); if (activePointers.size < 2) pinchState = null; });
  canvas.addEventListener('pointercancel', (e) => { activePointers.delete(e.pointerId); pinchState = null; });

  // Keyboard
  document.addEventListener('keydown', (e) => {
    if (document.activeElement === editorText || document.activeElement.tagName === 'INPUT' || document.activeElement.tagName === 'TEXTAREA') {
      if (e.key === 'Escape') { closeEditor(); }
      return;
    }
    if (e.key === 'Tab') {
      e.preventDefault();
      addChild();
    } else if (e.key === 'Enter') {
      e.preventDefault();
      addSibling();
    } else if (e.key === 'Delete' || e.key === 'Backspace') {
      e.preventDefault();
      deleteSelected();
    } else if (e.key === 'z' && (e.ctrlKey || e.metaKey)) {
      e.preventDefault();
      if (e.shiftKey) redo(); else undo();
    }
  });

  function addChild() {
    if (!selectedId) selectedId = state.rootId;
    const parent = state.nodes[selectedId];
    if (!parent) return;
    const newNode = createNode(selectedId);
    // position offset
    const siblings = parent.children.length;
    newNode.x = parent.x + 200;
    newNode.y = parent.y + (siblings - 1) * 80;
    selectedId = newNode.id;
    snapshot();
    draw();
    updateStatus();
    openEditor(newNode.id);
  }

  function addSibling() {
    if (!selectedId) return;
    const node = state.nodes[selectedId];
    if (!node || !node.parentId) { addChild(); return; }
    const parent = state.nodes[node.parentId];
    const newNode = createNode(node.parentId);
    newNode.x = node.x;
    newNode.y = node.y + 80;
    selectedId = newNode.id;
    snapshot();
    draw();
    updateStatus();
    openEditor(newNode.id);
  }

  function deleteSelected() {
    if (!selectedId || selectedId === state.rootId) return;
    const node = state.nodes[selectedId];
    if (!node) return;
    const newSel = node.parentId;
    deleteSubtree(selectedId);
    selectedId = newSel;
    snapshot();
    draw();
    updateStatus();
  }

  // Toolbar buttons
  document.getElementById('btnAddChild').addEventListener('click', addChild);
  document.getElementById('btnAddSibling').addEventListener('click', addSibling);
  document.getElementById('btnDelete').addEventListener('click', deleteSelected);
  document.getElementById('btnUndo').addEventListener('click', undo);
  document.getElementById('btnRedo').addEventListener('click', redo);
  document.getElementById('btnReset').addEventListener('click', () => {
    centerView();
    draw();
    updateStatus();
  });
  document.getElementById('btnLayout').addEventListener('click', () => {
    const type = document.getElementById('layoutSelect').value;
    if (type === 'radial') layoutRadial();
    else if (type === 'fan') layoutFan();
    else if (type === 'tree') layoutTree();
    snapshot();
    draw();
  });
  document.getElementById('btnNew').addEventListener('click', () => {
    if (confirm('Discard current map and start new?')) initNew();
  });
  document.getElementById('searchInput').addEventListener('input', (e) => {
    searchQuery = e.target.value;
    draw();
  });
  document.getElementById('btnFullscreen').addEventListener('click', () => {
    if (!document.fullscreenElement) document.documentElement.requestFullscreen();
    else document.exitFullscreen();
  });

  // Modal helpers
  const modalOverlay = document.getElementById('modalOverlay');
  const modalContent = document.getElementById('modalContent');
  function showModal(html) {
    modalContent.innerHTML = html;
    modalOverlay.classList.add('visible');
  }
  function closeModal() { modalOverlay.classList.remove('visible'); }
  modalOverlay.addEventListener('click', (e) => { if (e.target === modalOverlay) closeModal(); });

  // Save/load
  const STORAGE_PREFIX = 'korb_mind_map_';

  document.getElementById('btnSave').addEventListener('click', () => {
    showModal(`
      <h2>SAVE MAP</h2>
      <label>Map Name</label>
      <input type="text" id="saveName" value="${state.mapName.replace(/"/g, '&quot;')}">
      <div class="modal-actions">
        <button id="saveCancel">CANCEL</button>
        <button id="saveConfirm" class="primary">SAVE</button>
      </div>
    `);
    document.getElementById('saveCancel').onclick = closeModal;
    document.getElementById('saveConfirm').onclick = () => {
      const name = document.getElementById('saveName').value.trim();
      if (!name) return;
      state.mapName = name;
      localStorage.setItem(STORAGE_PREFIX + name, JSON.stringify(state));
      closeModal();
      updateStatus();
    };
  });

  document.getElementById('btnLoad').addEventListener('click', () => {
    const maps = [];
    for (let i = 0; i < localStorage.length; i++) {
      const k = localStorage.key(i);
      if (k.startsWith(STORAGE_PREFIX)) maps.push(k.slice(STORAGE_PREFIX.length));
    }
    maps.sort();
    let html = '<h2>LOAD MAP</h2>';
    if (!maps.length) {
      html += '<p style="color:#64748b;font-size:12px;margin-bottom:12px">no saved maps</p>';
    } else {
      html += '<ul class="saved-list">';
      maps.forEach(m => {
        html += `<li><span class="name" data-name="${m.replace(/"/g, '&quot;')}">${m}</span><button class="danger" data-del="${m.replace(/"/g, '&quot;')}">DEL</button></li>`;
      });
      html += '</ul>';
    }
    html += '<div class="modal-actions"><button id="loadClose">CLOSE</button></div>';
    showModal(html);
    document.getElementById('loadClose').onclick = closeModal;
    modalContent.querySelectorAll('.name').forEach(el => {
      el.onclick = () => {
        const name = el.dataset.name;
        const data = localStorage.getItem(STORAGE_PREFIX + name);
        if (data) {
          state = JSON.parse(data);
          selectedId = state.rootId;
          history = [];
          historyIndex = -1;
          snapshot();
          centerView();
          draw();
          updateStatus();
          closeModal();
        }
      };
    });
    modalContent.querySelectorAll('[data-del]').forEach(el => {
      el.onclick = () => {
        if (confirm('Delete "' + el.dataset.del + '"?')) {
          localStorage.removeItem(STORAGE_PREFIX + el.dataset.del);
          document.getElementById('btnLoad').click();
        }
      };
    });
  });

  // Export
  document.getElementById('btnExportPNG').addEventListener('click', () => {
    // compute bounds
    const nodes = Object.values(state.nodes);
    if (!nodes.length) return;
    let minX = Infinity, minY = Infinity, maxX = -Infinity, maxY = -Infinity;
    nodes.forEach(n => {
      const { w, h } = measureNode(n);
      minX = Math.min(minX, n.x - w/2);
      maxX = Math.max(maxX, n.x + w/2);
      minY = Math.min(minY, n.y - h/2);
      maxY = Math.max(maxY, n.y + h/2);
    });
    const pad = 40;
    const W = maxX - minX + pad * 2;
    const H = maxY - minY + pad * 2;
    const off = document.createElement('canvas');
    off.width = W;
    off.height = H;
    const octx = off.getContext('2d');
    octx.fillStyle = '#050a0f';
    octx.fillRect(0, 0, W, H);
    // save view and draw to offscreen
    const oldView = { ...view };
    const oldCanvas = canvas;
    // Temporarily swap
    const origDraw = draw;
    // easier: directly render
    const tx = pad - minX;
    const ty = pad - minY;
    // connectors
    octx.lineWidth = 2;
    nodes.forEach(n => {
      if (!n.parentId) return;
      const p = state.nodes[n.parentId];
      octx.strokeStyle = n.color;
      const dx = n.x - p.x;
      octx.beginPath();
      octx.moveTo(p.x + tx, p.y + ty);
      octx.bezierCurveTo(p.x + dx * 0.5 + tx, p.y + ty, n.x - dx * 0.5 + tx, n.y + ty, n.x + tx, n.y + ty);
      octx.stroke();
    });
    nodes.forEach(n => {
      const { w, h } = measureNode(n);
      octx.save();
      octx.translate(tx, ty);
      octx.lineWidth = 2;
      octx.strokeStyle = n.color;
      octx.fillStyle = n.color + '22';
      octx.beginPath();
      if (n.shape === 'ellipse') {
        octx.ellipse(n.x, n.y, w/2, h/2, 0, 0, Math.PI * 2);
      } else if (n.shape === 'hex') {
        const hw = w/2, hh = h/2, cut = Math.min(hh, hw * 0.4);
        octx.moveTo(n.x - hw + cut, n.y - hh);
        octx.lineTo(n.x + hw - cut, n.y - hh);
        octx.lineTo(n.x + hw, n.y);
        octx.lineTo(n.x + hw - cut, n.y + hh);
        octx.lineTo(n.x - hw + cut, n.y + hh);
        octx.lineTo(n.x - hw, n.y);
        octx.closePath();
      } else {
        const r = 10;
        octx.moveTo(n.x - w/2 + r, n.y - h/2);
        octx.arcTo(n.x + w/2, n.y - h/2, n.x + w/2, n.y + h/2, r);
        octx.arcTo(n.x + w/2, n.y + h/2, n.x - w/2, n.y + h/2, r);
        octx.arcTo(n.x - w/2, n.y + h/2, n.x - w/2, n.y - h/2, r);
        octx.arcTo(n.x - w/2, n.y - h/2, n.x + w/2, n.y - h/2, r);
        octx.closePath();
      }
      octx.fill();
      octx.stroke();
      octx.fillStyle = '#e2e8f0';
      octx.font = '600 14px JetBrains Mono, monospace';
      octx.textAlign = 'center';
      octx.textBaseline = 'middle';
      const lines = n.text.split('\n');
      lines.forEach((l, i) => octx.fillText(l, n.x, n.y + (i - (lines.length - 1) / 2) * 18));
      octx.restore();
    });
    const link = document.createElement('a');
    link.download = state.mapName + '.png';
    link.href = off.toDataURL('image/png');
    link.click();
  });

  document.getElementById('btnExportJSON').addEventListener('click', () => {
    const blob = new Blob([JSON.stringify(state, null, 2)], { type: 'application/json' });
    const link = document.createElement('a');
    link.download = state.mapName + '.json';
    link.href = URL.createObjectURL(blob);
    link.click();
  });

  document.getElementById('btnExportMD').addEventListener('click', () => {
    if (!state.rootId) return;
    const lines = [];
    const walk = (id, depth) => {
      const n = state.nodes[id];
      if (!n) return;
      const indent = '  '.repeat(depth);
      if (depth === 0) lines.push('# ' + n.text.replace(/\n/g, ' '));
      else lines.push(indent + '- ' + n.text.replace(/\n/g, ' '));
      n.children.forEach(c => walk(c, depth + 1));
    };
    walk(state.rootId, 0);
    const blob = new Blob([lines.join('\n')], { type: 'text/markdown' });
    const link = document.createElement('a');
    link.download = state.mapName + '.md';
    link.href = URL.createObjectURL(blob);
    link.click();
  });

  document.getElementById('btnImport').addEventListener('click', () => {
    document.getElementById('fileInput').click();
  });
  document.getElementById('fileInput').addEventListener('change', (e) => {
    const file = e.target.files[0];
    if (!file) return;
    const reader = new FileReader();
    reader.onload = (ev) => {
      try {
        const data = JSON.parse(ev.target.result);
        if (!data.nodes || !data.rootId) throw new Error('invalid');
        state = data;
        if (!state.mapName) state.mapName = 'imported';
        selectedId = state.rootId;
        history = [];
        historyIndex = -1;
        snapshot();
        centerView();
        draw();
        updateStatus();
      } catch (err) {
        alert('Invalid JSON file');
      }
    };
    reader.readAsText(file);
    e.target.value = '';
  });

  function updateStatus() {
    document.getElementById('statusMap').textContent = state.mapName;
    document.getElementById('statusNodes').textContent = Object.keys(state.nodes).length + ' nodes';
    document.getElementById('statusZoom').textContent = Math.round(view.zoom * 100) + '%';
  }

  window.addEventListener('resize', () => { resizeCanvas(); draw(); });

  initNew();
})();
</script>
</body>
</html>
