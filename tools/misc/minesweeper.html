<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Minesweeper | Korb Engineering</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --bg: #050a0f;
  --surface: #0a1018;
  --border: #1a2535;
  --cyan: #00d4ff;
  --orange: #ff6600;
  --green: #10b981;
  --red: #ef4444;
  --text: #e2e8f0;
  --purple: #a855f7;
  --teal: #14b8a6;
  --cell-size: 32px;
}

body {
  font-family: 'JetBrains Mono', monospace;
  background: var(--bg);
  color: var(--text);
  min-height: 100vh;
  display: flex;
  flex-direction: column;
  align-items: center;
  padding: 16px;
  user-select: none;
  -webkit-user-select: none;
}

header {
  text-align: center;
  margin-bottom: 16px;
}

header h1 {
  font-size: 1.4rem;
  font-weight: 700;
  color: var(--cyan);
  letter-spacing: 2px;
  text-transform: uppercase;
  text-shadow: 0 0 20px rgba(0, 212, 255, 0.3);
}

header .brand {
  font-size: 0.65rem;
  color: #4a5568;
  letter-spacing: 3px;
  text-transform: uppercase;
  margin-top: 4px;
}

.controls {
  display: flex;
  flex-wrap: wrap;
  gap: 8px;
  justify-content: center;
  margin-bottom: 16px;
  max-width: 600px;
}

.controls button, .controls select {
  font-family: 'JetBrains Mono', monospace;
  font-size: 0.75rem;
  background: var(--surface);
  color: var(--text);
  border: 1px solid var(--border);
  padding: 6px 14px;
  cursor: pointer;
  transition: all 0.15s;
  border-radius: 4px;
}

.controls button:hover, .controls select:hover {
  border-color: var(--cyan);
  color: var(--cyan);
}

.controls button.active {
  border-color: var(--cyan);
  color: var(--cyan);
  background: rgba(0, 212, 255, 0.08);
}

.custom-inputs {
  display: none;
  flex-wrap: wrap;
  gap: 8px;
  justify-content: center;
  margin-bottom: 12px;
  max-width: 500px;
}

.custom-inputs.visible { display: flex; }

.custom-inputs label {
  font-size: 0.7rem;
  color: #94a3b8;
  display: flex;
  align-items: center;
  gap: 6px;
}

.custom-inputs input {
  font-family: 'JetBrains Mono', monospace;
  font-size: 0.75rem;
  background: var(--surface);
  color: var(--cyan);
  border: 1px solid var(--border);
  padding: 4px 8px;
  width: 60px;
  text-align: center;
  border-radius: 4px;
}

.custom-inputs input:focus { outline: none; border-color: var(--cyan); }

.custom-inputs button {
  font-family: 'JetBrains Mono', monospace;
  font-size: 0.7rem;
  background: var(--surface);
  color: var(--cyan);
  border: 1px solid var(--cyan);
  padding: 4px 12px;
  cursor: pointer;
  border-radius: 4px;
}

.status-bar {
  display: flex;
  align-items: center;
  justify-content: space-between;
  gap: 12px;
  margin-bottom: 8px;
  padding: 8px 16px;
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 6px;
  min-width: 280px;
  max-width: 100%;
}

.counter {
  font-size: 1.2rem;
  font-weight: 700;
  color: var(--red);
  min-width: 50px;
  text-align: center;
  font-variant-numeric: tabular-nums;
}

.smiley-btn {
  font-size: 1.5rem;
  background: none;
  border: 2px solid var(--border);
  border-radius: 6px;
  cursor: pointer;
  padding: 2px 8px;
  line-height: 1;
  transition: border-color 0.15s;
}

.smiley-btn:hover { border-color: var(--cyan); }

.timer {
  font-size: 1.2rem;
  font-weight: 700;
  color: var(--cyan);
  min-width: 50px;
  text-align: center;
  font-variant-numeric: tabular-nums;
}

.board-container {
  overflow: auto;
  max-width: 95vw;
  max-height: 65vh;
  border: 2px solid var(--border);
  border-radius: 6px;
  background: var(--surface);
  padding: 4px;
}

.board {
  display: grid;
  gap: 1px;
  background: #0d1520;
}

.cell {
  width: var(--cell-size);
  height: var(--cell-size);
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: calc(var(--cell-size) * 0.5);
  font-weight: 700;
  cursor: pointer;
  border: 1px solid transparent;
  transition: transform 0.1s, background 0.1s;
  position: relative;
  background: #111b28;
  border-radius: 2px;
}

.cell.hidden {
  background: #162030;
  border: 1px solid #1e2e42;
}

.cell.hidden:hover {
  background: #1c2a3e;
  border-color: #2a3e56;
}

.cell.hidden:active {
  transform: scale(0.92);
}

.cell.revealed {
  background: #0a1219;
  animation: cellPop 0.15s ease-out;
}

@keyframes cellPop {
  0% { transform: scale(0.85); opacity: 0.6; }
  60% { transform: scale(1.05); }
  100% { transform: scale(1); opacity: 1; }
}

.cell.flagged::after {
  content: '\1F6A9';
  font-size: calc(var(--cell-size) * 0.5);
}

.cell.mine-hit {
  background: rgba(239, 68, 68, 0.3) !important;
}

.cell.wrong-flag {
  background: rgba(239, 68, 68, 0.15) !important;
}

.cell.wrong-flag::before {
  content: '\2716';
  position: absolute;
  font-size: calc(var(--cell-size) * 0.6);
  color: var(--red);
  z-index: 1;
}

.cell .mine { font-size: calc(var(--cell-size) * 0.55); }

.cell .num-1 { color: var(--cyan); }
.cell .num-2 { color: var(--green); }
.cell .num-3 { color: var(--orange); }
.cell .num-4 { color: var(--purple); }
.cell .num-5 { color: var(--red); }
.cell .num-6 { color: var(--teal); }
.cell .num-7 { color: #e2e8f0; }
.cell .num-8 { color: #64748b; }

.stats-panel {
  margin-top: 16px;
  padding: 12px 20px;
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 6px;
  font-size: 0.7rem;
  color: #94a3b8;
  max-width: 500px;
  width: 100%;
}

.stats-panel h3 {
  color: var(--cyan);
  font-size: 0.75rem;
  margin-bottom: 8px;
  letter-spacing: 1px;
}

.stats-grid {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 4px 16px;
}

.stats-grid .label { color: #64748b; }
.stats-grid .value { color: var(--text); text-align: right; }

footer {
  margin-top: 20px;
  font-size: 0.6rem;
  color: #2d3748;
  letter-spacing: 1px;
}

@media (max-width: 600px) {
  :root { --cell-size: 36px; }
  header h1 { font-size: 1.1rem; }
  .controls button, .controls select { font-size: 0.65rem; padding: 6px 10px; }
  .status-bar { min-width: 240px; padding: 6px 12px; }
  .counter, .timer { font-size: 1rem; }
  .board-container { max-height: 55vh; }
}

@media (max-width: 400px) {
  :root { --cell-size: 32px; }
}
</style>
</head>
<body>

<header>
  <h1>Minesweeper</h1>
  <div class="brand">Korb Engineering</div>
</header>

<div class="controls">
  <button class="diff-btn active" data-diff="beginner">Beginner</button>
  <button class="diff-btn" data-diff="intermediate">Intermediate</button>
  <button class="diff-btn" data-diff="expert">Expert</button>
  <button class="diff-btn" data-diff="custom">Custom</button>
  <button id="stats-toggle">Stats</button>
</div>

<div class="custom-inputs" id="custom-inputs">
  <label>Rows <input type="number" id="custom-rows" value="10" min="5" max="50"></label>
  <label>Cols <input type="number" id="custom-cols" value="10" min="5" max="50"></label>
  <label>Mines <input type="number" id="custom-mines" value="15" min="1" max="500"></label>
  <button id="custom-start">Start</button>
</div>

<div class="status-bar" id="status-bar">
  <div class="counter" id="mine-counter">010</div>
  <button class="smiley-btn" id="smiley" title="New Game">&#x1F642;</button>
  <div class="timer" id="timer">000</div>
</div>

<div class="board-container" id="board-container">
  <div class="board" id="board"></div>
</div>

<div class="stats-panel" id="stats-panel" style="display:none;">
  <h3>Statistics</h3>
  <div class="stats-grid" id="stats-grid"></div>
</div>

<footer>KORB ENGINEERING</footer>

<script>
(function() {
  const PRESETS = {
    beginner:     { rows: 9,  cols: 9,  mines: 10 },
    intermediate: { rows: 16, cols: 16, mines: 40 },
    expert:       { rows: 16, cols: 30, mines: 99 }
  };

  const FACES = { normal: '\u{1F642}', surprised: '\u{1F62E}', dead: '\u{1F635}', cool: '\u{1F60E}' };

  let rows, cols, totalMines, board, revealed, flagged, mineLocations;
  let gameOver, gameWon, firstClick, flagCount, timerVal, timerInterval;
  let currentDifficulty = 'beginner';
  let longPressTimer = null;
  let longPressTriggered = false;

  const boardEl = document.getElementById('board');
  const mineCounterEl = document.getElementById('mine-counter');
  const timerEl = document.getElementById('timer');
  const smileyEl = document.getElementById('smiley');
  const boardContainer = document.getElementById('board-container');
  const customInputs = document.getElementById('custom-inputs');
  const statsPanel = document.getElementById('stats-panel');
  const statsGrid = document.getElementById('stats-grid');

  // Difficulty buttons
  document.querySelectorAll('.diff-btn').forEach(btn => {
    btn.addEventListener('click', () => {
      document.querySelectorAll('.diff-btn').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      const diff = btn.dataset.diff;
      currentDifficulty = diff;
      if (diff === 'custom') {
        customInputs.classList.add('visible');
      } else {
        customInputs.classList.remove('visible');
        startGame(PRESETS[diff].rows, PRESETS[diff].cols, PRESETS[diff].mines);
      }
    });
  });

  document.getElementById('custom-start').addEventListener('click', () => {
    const r = clamp(parseInt(document.getElementById('custom-rows').value) || 10, 5, 50);
    const c = clamp(parseInt(document.getElementById('custom-cols').value) || 10, 5, 50);
    const maxM = r * c - 9;
    const m = clamp(parseInt(document.getElementById('custom-mines').value) || 15, 1, maxM);
    document.getElementById('custom-rows').value = r;
    document.getElementById('custom-cols').value = c;
    document.getElementById('custom-mines').value = m;
    startGame(r, c, m);
  });

  smileyEl.addEventListener('click', () => startGame(rows, cols, totalMines));

  document.getElementById('stats-toggle').addEventListener('click', () => {
    statsPanel.style.display = statsPanel.style.display === 'none' ? 'block' : 'none';
    if (statsPanel.style.display === 'block') renderStats();
  });

  // Prevent context menu on board
  boardEl.addEventListener('contextmenu', e => e.preventDefault());

  function clamp(v, lo, hi) { return Math.max(lo, Math.min(hi, v)); }

  function pad3(n) { return String(Math.max(0, Math.min(999, n))).padStart(3, '0'); }

  function startGame(r, c, m) {
    rows = r; cols = c; totalMines = m;
    board = Array.from({ length: rows }, () => Array(cols).fill(0));
    revealed = Array.from({ length: rows }, () => Array(cols).fill(false));
    flagged = Array.from({ length: rows }, () => Array(cols).fill(false));
    mineLocations = new Set();
    gameOver = false;
    gameWon = false;
    firstClick = true;
    flagCount = 0;
    timerVal = 0;
    clearInterval(timerInterval);
    timerInterval = null;

    smileyEl.textContent = FACES.normal;
    mineCounterEl.textContent = pad3(totalMines);
    timerEl.textContent = '000';

    // Scale cells
    scaleCells();

    boardEl.style.gridTemplateColumns = `repeat(${cols}, var(--cell-size))`;
    boardEl.style.gridTemplateRows = `repeat(${rows}, var(--cell-size))`;
    boardEl.innerHTML = '';

    for (let r = 0; r < rows; r++) {
      for (let c = 0; c < cols; c++) {
        const cell = document.createElement('div');
        cell.className = 'cell hidden';
        cell.dataset.row = r;
        cell.dataset.col = c;

        cell.addEventListener('mousedown', e => {
          if (gameOver || gameWon) return;
          if (e.button === 0) smileyEl.textContent = FACES.surprised;
        });
        cell.addEventListener('mouseup', e => {
          if (gameOver || gameWon) return;
          if (e.button === 0) {
            smileyEl.textContent = FACES.normal;
            handleLeftClick(r, c);
          } else if (e.button === 2) {
            handleRightClick(r, c);
          }
        });
        cell.addEventListener('mouseleave', () => {
          if (!gameOver && !gameWon) smileyEl.textContent = FACES.normal;
        });

        // Touch support
        cell.addEventListener('touchstart', e => {
          if (gameOver || gameWon) return;
          longPressTriggered = false;
          smileyEl.textContent = FACES.surprised;
          longPressTimer = setTimeout(() => {
            longPressTriggered = true;
            handleRightClick(r, c);
            smileyEl.textContent = FACES.normal;
          }, 400);
        }, { passive: true });

        cell.addEventListener('touchend', e => {
          e.preventDefault();
          if (gameOver || gameWon) return;
          clearTimeout(longPressTimer);
          smileyEl.textContent = FACES.normal;
          if (!longPressTriggered) {
            handleLeftClick(r, c);
          }
        });

        cell.addEventListener('touchmove', () => {
          clearTimeout(longPressTimer);
          longPressTriggered = true;
        }, { passive: true });

        boardEl.appendChild(cell);
      }
    }
  }

  function scaleCells() {
    const maxW = window.innerWidth * 0.92 - 12;
    const maxH = window.innerHeight * 0.58 - 12;
    let size = Math.floor(Math.min(maxW / cols, maxH / rows));
    size = clamp(size, 20, 40);
    // On mobile ensure minimum touch target
    if ('ontouchstart' in window) size = Math.max(size, 28);
    document.documentElement.style.setProperty('--cell-size', size + 'px');
  }

  function placeMines(safeR, safeC) {
    const safe = new Set();
    for (let dr = -1; dr <= 1; dr++) {
      for (let dc = -1; dc <= 1; dc++) {
        const nr = safeR + dr, nc = safeC + dc;
        if (nr >= 0 && nr < rows && nc >= 0 && nc < cols) {
          safe.add(nr * cols + nc);
        }
      }
    }

    while (mineLocations.size < totalMines) {
      const idx = Math.floor(Math.random() * rows * cols);
      if (!safe.has(idx) && !mineLocations.has(idx)) {
        mineLocations.add(idx);
        board[Math.floor(idx / cols)][idx % cols] = -1;
      }
    }

    // Compute numbers
    for (let r = 0; r < rows; r++) {
      for (let c = 0; c < cols; c++) {
        if (board[r][c] === -1) continue;
        let count = 0;
        forNeighbors(r, c, (nr, nc) => { if (board[nr][nc] === -1) count++; });
        board[r][c] = count;
      }
    }
  }

  function forNeighbors(r, c, fn) {
    for (let dr = -1; dr <= 1; dr++) {
      for (let dc = -1; dc <= 1; dc++) {
        if (dr === 0 && dc === 0) continue;
        const nr = r + dr, nc = c + dc;
        if (nr >= 0 && nr < rows && nc >= 0 && nc < cols) fn(nr, nc);
      }
    }
  }

  function getCell(r, c) {
    return boardEl.children[r * cols + c];
  }

  function handleLeftClick(r, c) {
    if (gameOver || gameWon) return;
    if (flagged[r][c]) return;

    if (firstClick) {
      firstClick = false;
      placeMines(r, c);
      startTimer();
    }

    // Chord: if already revealed number, auto-reveal neighbors
    if (revealed[r][c]) {
      if (board[r][c] > 0) chord(r, c);
      return;
    }

    reveal(r, c);
  }

  function handleRightClick(r, c) {
    if (gameOver || gameWon) return;
    if (revealed[r][c]) return;

    if (flagged[r][c]) {
      flagged[r][c] = false;
      flagCount--;
      getCell(r, c).classList.remove('flagged');
    } else {
      flagged[r][c] = true;
      flagCount++;
      getCell(r, c).classList.add('flagged');
    }
    mineCounterEl.textContent = pad3(totalMines - flagCount);
  }

  function reveal(r, c) {
    if (revealed[r][c] || flagged[r][c]) return;
    revealed[r][c] = true;

    const cell = getCell(r, c);
    cell.classList.remove('hidden');
    cell.classList.add('revealed');

    if (board[r][c] === -1) {
      cell.innerHTML = '<span class="mine">\u{1F4A3}</span>';
      cell.classList.add('mine-hit');
      endGame(false);
      return;
    }

    if (board[r][c] > 0) {
      cell.innerHTML = `<span class="num-${board[r][c]}">${board[r][c]}</span>`;
    }

    if (board[r][c] === 0) {
      forNeighbors(r, c, (nr, nc) => reveal(nr, nc));
    }

    checkWin();
  }

  function chord(r, c) {
    let adjFlags = 0;
    forNeighbors(r, c, (nr, nc) => { if (flagged[nr][nc]) adjFlags++; });
    if (adjFlags !== board[r][c]) return;
    forNeighbors(r, c, (nr, nc) => {
      if (!revealed[nr][nc] && !flagged[nr][nc]) reveal(nr, nc);
    });
  }

  function checkWin() {
    if (gameOver) return;
    let unrevealedSafe = 0;
    for (let r = 0; r < rows; r++) {
      for (let c = 0; c < cols; c++) {
        if (board[r][c] !== -1 && !revealed[r][c]) unrevealedSafe++;
      }
    }
    if (unrevealedSafe === 0) endGame(true);
  }

  function endGame(won) {
    gameOver = true;
    gameWon = won;
    clearInterval(timerInterval);

    if (won) {
      smileyEl.textContent = FACES.cool;
      // Auto-flag remaining mines
      mineLocations.forEach(idx => {
        const mr = Math.floor(idx / cols), mc = idx % cols;
        if (!flagged[mr][mc]) {
          flagged[mr][mc] = true;
          flagCount++;
          getCell(mr, mc).classList.add('flagged');
        }
      });
      mineCounterEl.textContent = '000';
      saveStat(true);
    } else {
      smileyEl.textContent = FACES.dead;
      // Reveal all mines, mark wrong flags
      for (let r = 0; r < rows; r++) {
        for (let c = 0; c < cols; c++) {
          const cell = getCell(r, c);
          if (board[r][c] === -1 && !revealed[r][c] && !flagged[r][c]) {
            cell.classList.remove('hidden');
            cell.classList.add('revealed');
            cell.innerHTML = '<span class="mine">\u{1F4A3}</span>';
          }
          if (flagged[r][c] && board[r][c] !== -1) {
            cell.classList.remove('flagged');
            cell.classList.add('wrong-flag');
            cell.innerHTML = '<span class="mine">\u{1F6A9}</span>';
          }
        }
      }
      saveStat(false);
    }
  }

  function startTimer() {
    timerInterval = setInterval(() => {
      timerVal++;
      timerEl.textContent = pad3(timerVal);
      if (timerVal >= 999) clearInterval(timerInterval);
    }, 1000);
  }

  // Stats / localStorage
  function getStats() {
    try { return JSON.parse(localStorage.getItem('minesweeper_stats') || '{}'); }
    catch { return {}; }
  }

  function saveStat(won) {
    const stats = getStats();
    const key = currentDifficulty;
    if (!stats[key]) stats[key] = { played: 0, won: 0, bestTime: null };
    stats[key].played++;
    if (won) {
      stats[key].won++;
      if (stats[key].bestTime === null || timerVal < stats[key].bestTime) {
        stats[key].bestTime = timerVal;
      }
    }
    localStorage.setItem('minesweeper_stats', JSON.stringify(stats));
    if (statsPanel.style.display === 'block') renderStats();
  }

  function renderStats() {
    const stats = getStats();
    const diffs = ['beginner', 'intermediate', 'expert', 'custom'];
    let html = '';
    diffs.forEach(d => {
      const s = stats[d];
      if (!s) return;
      const winRate = s.played > 0 ? Math.round(s.won / s.played * 100) : 0;
      const best = s.bestTime !== null ? s.bestTime + 's' : '--';
      html += `<div class="label" style="grid-column:1/-1;color:var(--cyan);margin-top:6px;">${d.toUpperCase()}</div>`;
      html += `<div class="label">Played</div><div class="value">${s.played}</div>`;
      html += `<div class="label">Won</div><div class="value">${s.won}</div>`;
      html += `<div class="label">Win Rate</div><div class="value">${winRate}%</div>`;
      html += `<div class="label">Best Time</div><div class="value">${best}</div>`;
    });
    if (!html) html = '<div class="label">No games played yet.</div>';
    statsGrid.innerHTML = html;
  }

  // Resize handler
  window.addEventListener('resize', () => {
    if (rows && cols) scaleCells();
  });

  // Init
  startGame(PRESETS.beginner.rows, PRESETS.beginner.cols, PRESETS.beginner.mines);
})();
</script>
</body>
</html>
