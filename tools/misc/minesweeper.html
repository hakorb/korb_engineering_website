<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
<meta name="description" content="Minesweeper | Korb Engineering — a free, browser-based productivity tool from Korb Engineering. No signup, no downloads, works on mobile.">
<title>Minesweeper | Korb Engineering</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --bg: #050a0f;
  --surface: #0a1018;
  --surface-alt: #0f1620;
  --border: #1a2535;
  --cyan: #00d4ff;
  --orange: #ff6600;
  --green: #10b981;
  --red: #ef4444;
  --text: #e2e8f0;
  --purple: #a855f7;
  --teal: #14b8a6;
  --cell-size: 32px;
}

body {
  font-family: 'JetBrains Mono', monospace;
  background: var(--bg);
  color: var(--text);
  min-height: 100vh;
  min-height: 100dvh;
  display: flex;
  flex-direction: column;
  align-items: center;
  padding: 12px;
  user-select: none;
  -webkit-user-select: none;
  touch-action: manipulation;
  overflow-x: hidden;
}

header {
  text-align: center;
  margin-bottom: 12px;
}

header h1 {
  font-size: 1.4rem;
  font-weight: 700;
  color: var(--cyan);
  letter-spacing: 2px;
  text-transform: uppercase;
  text-shadow: 0 0 20px rgba(0, 212, 255, 0.3);
}

.brand {
  display: inline-block;
  font-size: 0.55rem;
  color: #4a5568;
  letter-spacing: 3px;
  text-transform: uppercase;
  margin-top: 4px;
  padding: 3px 10px;
  border: 1px solid #1a2535;
  border-radius: 3px;
  background: var(--surface);
}

.controls {
  display: flex;
  flex-wrap: wrap;
  gap: 8px;
  justify-content: center;
  margin-bottom: 12px;
}

.controls button {
  font-family: 'JetBrains Mono', monospace;
  font-size: 0.75rem;
  font-weight: 500;
  background: var(--surface);
  color: var(--text);
  border: 1px solid var(--border);
  padding: 8px 16px;
  min-height: 48px;
  min-width: 48px;
  cursor: pointer;
  transition: all 0.15s;
  border-radius: 4px;
  touch-action: manipulation;
}

.controls button:hover {
  border-color: var(--cyan);
  color: var(--cyan);
}

.controls button.active {
  border-color: var(--cyan);
  color: var(--cyan);
  background: rgba(0, 212, 255, 0.08);
}

.status-bar {
  display: flex;
  align-items: center;
  justify-content: space-between;
  gap: 12px;
  margin-bottom: 8px;
  padding: 8px 16px;
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 6px;
  min-width: 280px;
  max-width: 100%;
}

.counter {
  font-size: 1.3rem;
  font-weight: 700;
  color: var(--red);
  min-width: 55px;
  text-align: center;
  font-variant-numeric: tabular-nums;
  text-shadow: 0 0 8px rgba(239, 68, 68, 0.4);
}

.face-btn {
  font-size: 1.5rem;
  background: var(--surface-alt);
  border: 2px solid var(--border);
  border-radius: 6px;
  cursor: pointer;
  padding: 4px 10px;
  min-height: 48px;
  min-width: 48px;
  line-height: 1;
  transition: border-color 0.15s;
  touch-action: manipulation;
  display: flex;
  align-items: center;
  justify-content: center;
}

.face-btn:hover { border-color: var(--cyan); }

.timer {
  font-size: 1.3rem;
  font-weight: 700;
  color: var(--cyan);
  min-width: 55px;
  text-align: center;
  font-variant-numeric: tabular-nums;
  text-shadow: 0 0 8px rgba(0, 212, 255, 0.4);
}

.board-wrap {
  overflow: auto;
  max-width: 96vw;
  max-height: calc(100dvh - 260px);
  border: 2px solid var(--border);
  border-radius: 6px;
  background: var(--surface);
  padding: 3px;
  -webkit-overflow-scrolling: touch;
}

.board {
  display: grid;
  gap: 1px;
  background: #0d1520;
  touch-action: manipulation;
}

.cell {
  width: var(--cell-size);
  height: var(--cell-size);
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: calc(var(--cell-size) * 0.5);
  font-weight: 700;
  cursor: pointer;
  border: none;
  position: relative;
  background: #162030;
  border-radius: 2px;
  touch-action: manipulation;
  transition: background 0.1s;
}

.cell.hidden {
  background: #162030;
  border: 1px solid #1e2e42;
}

.cell.hidden:hover {
  background: #1c2a3e;
  border-color: #2a3e56;
}

.cell.hidden:active {
  transform: scale(0.92);
}

.cell.revealed {
  background: #0a1219;
  border: 1px solid #0d161f;
}

.cell.reveal-anim {
  animation: cellPop 0.15s ease-out;
}

@keyframes cellPop {
  0% { transform: scale(0.8); opacity: 0.5; }
  60% { transform: scale(1.06); }
  100% { transform: scale(1); opacity: 1; }
}

.cell.flagged {
  background: #162030;
  border: 1px solid #1e2e42;
}

.cell .flag-icon {
  font-size: calc(var(--cell-size) * 0.5);
  pointer-events: none;
}

.cell.mine-hit {
  background: rgba(239, 68, 68, 0.3) !important;
  border-color: rgba(239, 68, 68, 0.5) !important;
}

.cell .mine-icon {
  font-size: calc(var(--cell-size) * 0.55);
  pointer-events: none;
}

.cell.wrong-flag {
  background: rgba(239, 68, 68, 0.15) !important;
}

.cell .wrong-x {
  position: absolute;
  font-size: calc(var(--cell-size) * 0.7);
  color: var(--red);
  font-weight: 700;
  line-height: 1;
  pointer-events: none;
}

.num-1 { color: var(--cyan); }
.num-2 { color: var(--green); }
.num-3 { color: var(--orange); }
.num-4 { color: var(--purple); }
.num-5 { color: var(--red); }
.num-6 { color: var(--teal); }
.num-7 { color: #e2e8f0; }
.num-8 { color: #64748b; }

.stats-panel {
  margin-top: 12px;
  padding: 14px 20px;
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 6px;
  font-size: 0.7rem;
  color: #94a3b8;
  max-width: 500px;
  width: 100%;
}

.stats-panel h3 {
  color: var(--cyan);
  font-size: 0.75rem;
  margin-bottom: 10px;
  letter-spacing: 1px;
  text-transform: uppercase;
}

.stats-grid {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 4px 16px;
}

.stats-grid .stat-label { color: #64748b; }
.stats-grid .stat-value { color: var(--text); text-align: right; }
.stats-grid .stat-heading {
  grid-column: 1 / -1;
  color: var(--cyan);
  margin-top: 8px;
  padding-bottom: 2px;
  border-bottom: 1px solid var(--border);
  font-weight: 600;
}
.stats-grid .stat-heading:first-child { margin-top: 0; }

.stats-reset {
  font-family: 'JetBrains Mono', monospace;
  font-size: 0.65rem;
  margin-top: 10px;
  background: none;
  border: 1px solid var(--border);
  color: #64748b;
  padding: 4px 12px;
  cursor: pointer;
  border-radius: 3px;
  transition: all 0.15s;
}
.stats-reset:hover {
  border-color: var(--red);
  color: var(--red);
}

.game-msg {
  margin-top: 8px;
  font-size: 0.8rem;
  font-weight: 600;
  letter-spacing: 1px;
  min-height: 1.2em;
  text-align: center;
}

.game-msg.win { color: var(--green); text-shadow: 0 0 12px rgba(16, 185, 129, 0.4); }
.game-msg.lose { color: var(--red); text-shadow: 0 0 12px rgba(239, 68, 68, 0.4); }

footer {
  margin-top: auto;
  padding-top: 16px;
  font-size: 0.55rem;
  color: #1a2535;
  letter-spacing: 2px;
  text-transform: uppercase;
}

@media (max-width: 600px) {
  body { padding: 8px; }
  header h1 { font-size: 1.1rem; }
  .controls button { font-size: 0.65rem; padding: 8px 10px; }
  .status-bar { min-width: 220px; padding: 6px 10px; gap: 8px; }
  .counter, .timer { font-size: 1.1rem; min-width: 45px; }
}
</style>
</head>
<body>

<header>
  <h1>Minesweeper</h1>
  <div class="brand">Korb Engineering</div>
</header>

<div class="controls" id="controls"></div>

<div class="status-bar">
  <div class="counter" id="mine-counter">010</div>
  <button class="face-btn" id="face-btn" title="New Game">&#x1F642;</button>
  <div class="timer" id="timer">000</div>
</div>

<div class="board-wrap" id="board-wrap">
  <div class="board" id="board"></div>
</div>

<div class="game-msg" id="game-msg"></div>

<div class="stats-panel" id="stats-panel" style="display:none;">
  <h3>Statistics</h3>
  <div class="stats-grid" id="stats-grid"></div>
  <button class="stats-reset" id="stats-reset">Reset Stats</button>
</div>

<footer>KORB ENGINEERING</footer>

<script>
(function() {
  'use strict';

  /* ── constants ─────────────────────────────────────────────── */
  const DIFFICULTIES = {
    beginner:     { rows: 9,  cols: 9,  mines: 10,  label: 'Beginner' },
    intermediate: { rows: 16, cols: 16, mines: 40,  label: 'Intermediate' },
    expert:       { rows: 16, cols: 30, mines: 99,  label: 'Expert' }
  };

  const FACE = {
    normal:    '\u{1F642}',
    surprised: '\u{1F62E}',
    dead:      '\u{1F635}',
    cool:      '\u{1F60E}'
  };

  const MINE_CH  = '\u{1F4A3}';
  const FLAG_CH  = '\u{1F6A9}';

  /* ── DOM refs ──────────────────────────────────────────────── */
  const controlsEl   = document.getElementById('controls');
  const boardEl      = document.getElementById('board');
  const boardWrap    = document.getElementById('board-wrap');
  const counterEl    = document.getElementById('mine-counter');
  const timerEl      = document.getElementById('timer');
  const faceBtn      = document.getElementById('face-btn');
  const gameMsgEl    = document.getElementById('game-msg');
  const statsPanel   = document.getElementById('stats-panel');
  const statsGrid    = document.getElementById('stats-grid');
  const statsResetEl = document.getElementById('stats-reset');

  /* ── game state ────────────────────────────────────────────── */
  let rows, cols, totalMines;
  let grid;           // 2D: -1 = mine, 0-8 = number
  let revealed;       // 2D bool
  let flagged;        // 2D bool
  let mineSet;        // Set of index (r*cols+c)
  let gameOver, gameWon, firstClick;
  let flagCount, timerVal, timerInterval;
  let currentDiff = 'beginner';

  /* ── touch state ───────────────────────────────────────────── */
  let longPressTimer   = null;
  let longPressFired   = false;
  let touchMoved       = false;
  const LONG_PRESS_MS  = 500;

  /* ── build controls ────────────────────────────────────────── */
  (function buildControls() {
    Object.keys(DIFFICULTIES).forEach(key => {
      const btn = document.createElement('button');
      btn.textContent = DIFFICULTIES[key].label;
      btn.dataset.diff = key;
      if (key === currentDiff) btn.classList.add('active');
      btn.addEventListener('click', () => selectDifficulty(key));
      controlsEl.appendChild(btn);
    });
    const statsBtn = document.createElement('button');
    statsBtn.textContent = 'Stats';
    statsBtn.addEventListener('click', toggleStats);
    controlsEl.appendChild(statsBtn);
  })();

  function selectDifficulty(key) {
    currentDiff = key;
    controlsEl.querySelectorAll('button[data-diff]').forEach(b => {
      b.classList.toggle('active', b.dataset.diff === key);
    });
    const d = DIFFICULTIES[key];
    newGame(d.rows, d.cols, d.mines);
  }

  faceBtn.addEventListener('click', () => newGame(rows, cols, totalMines));

  /* prevent context menu on board */
  boardEl.addEventListener('contextmenu', e => e.preventDefault());

  /* ── helpers ────────────────────────────────────────────────── */
  function pad3(n) {
    const v = Math.max(-99, Math.min(999, n));
    return v < 0 ? '-' + String(Math.abs(v)).padStart(2, '0') : String(v).padStart(3, '0');
  }

  function idx(r, c) { return r * cols + c; }

  function neighbors(r, c, fn) {
    for (let dr = -1; dr <= 1; dr++) {
      for (let dc = -1; dc <= 1; dc++) {
        if (dr === 0 && dc === 0) continue;
        const nr = r + dr, nc = c + dc;
        if (nr >= 0 && nr < rows && nc >= 0 && nc < cols) fn(nr, nc);
      }
    }
  }

  function cellEl(r, c) { return boardEl.children[idx(r, c)]; }

  /* ── sizing ────────────────────────────────────────────────── */
  function computeCellSize() {
    const pad = 10;
    const maxW = window.innerWidth * 0.95 - pad;
    const maxH = (window.innerHeight - 260) - pad;
    let size = Math.floor(Math.min(maxW / cols, maxH / rows));
    /* enforce 48px on touch devices, 20px absolute min */
    const isTouchDevice = 'ontouchstart' in window || navigator.maxTouchPoints > 0;
    const minSize = isTouchDevice ? 32 : 20;
    size = Math.max(minSize, Math.min(size, 48));
    document.documentElement.style.setProperty('--cell-size', size + 'px');
  }

  window.addEventListener('resize', () => { if (rows) computeCellSize(); });

  /* ── mine placement (after first click) ────────────────────── */
  function placeMines(safeR, safeC) {
    const safeZone = new Set();
    for (let dr = -1; dr <= 1; dr++) {
      for (let dc = -1; dc <= 1; dc++) {
        const nr = safeR + dr, nc = safeC + dc;
        if (nr >= 0 && nr < rows && nc >= 0 && nc < cols) {
          safeZone.add(idx(nr, nc));
        }
      }
    }

    const available = [];
    for (let i = 0; i < rows * cols; i++) {
      if (!safeZone.has(i)) available.push(i);
    }

    /* Fisher-Yates partial shuffle */
    for (let i = available.length - 1; i > 0 && mineSet.size < totalMines; i--) {
      const j = Math.floor(Math.random() * (i + 1));
      [available[i], available[j]] = [available[j], available[i]];
      mineSet.add(available[i]);
    }

    /* place mines in grid */
    mineSet.forEach(i => {
      grid[Math.floor(i / cols)][i % cols] = -1;
    });

    /* compute numbers */
    for (let r = 0; r < rows; r++) {
      for (let c = 0; c < cols; c++) {
        if (grid[r][c] === -1) continue;
        let cnt = 0;
        neighbors(r, c, (nr, nc) => { if (grid[nr][nc] === -1) cnt++; });
        grid[r][c] = cnt;
      }
    }
  }

  /* ── new game ──────────────────────────────────────────────── */
  function newGame(r, c, m) {
    rows = r;
    cols = c;
    totalMines = Math.min(m, r * c - 9);
    grid     = Array.from({ length: rows }, () => Array(cols).fill(0));
    revealed = Array.from({ length: rows }, () => Array(cols).fill(false));
    flagged  = Array.from({ length: rows }, () => Array(cols).fill(false));
    mineSet  = new Set();
    gameOver = false;
    gameWon  = false;
    firstClick = true;
    flagCount  = 0;
    timerVal   = 0;
    clearInterval(timerInterval);
    timerInterval = null;

    faceBtn.textContent   = FACE.normal;
    counterEl.textContent = pad3(totalMines);
    timerEl.textContent   = '000';
    gameMsgEl.textContent = '';
    gameMsgEl.className   = 'game-msg';

    computeCellSize();

    boardEl.style.gridTemplateColumns = `repeat(${cols}, var(--cell-size))`;
    boardEl.style.gridTemplateRows    = `repeat(${rows}, var(--cell-size))`;
    boardEl.innerHTML = '';

    for (let ri = 0; ri < rows; ri++) {
      for (let ci = 0; ci < cols; ci++) {
        const cell = document.createElement('div');
        cell.className = 'cell hidden';
        cell.dataset.r = ri;
        cell.dataset.c = ci;
        boardEl.appendChild(cell);
      }
    }

    /* event delegation instead of per-cell listeners */
    boardEl.onmousedown = onMouseDown;
    boardEl.onmouseup   = onMouseUp;
    boardEl.onmouseleave = () => { if (!gameOver && !gameWon) faceBtn.textContent = FACE.normal; };
    boardEl.ontouchstart = onTouchStart;
    boardEl.ontouchend   = onTouchEnd;
    boardEl.ontouchmove  = onTouchMove;
  }

  /* ── input: mouse ──────────────────────────────────────────── */
  function getCellRC(e) {
    const t = e.target.closest('.cell');
    if (!t) return null;
    return [parseInt(t.dataset.r), parseInt(t.dataset.c)];
  }

  function onMouseDown(e) {
    if (gameOver || gameWon) return;
    if (e.button === 0) faceBtn.textContent = FACE.surprised;
  }

  function onMouseUp(e) {
    if (gameOver || gameWon) return;
    faceBtn.textContent = FACE.normal;
    const rc = getCellRC(e);
    if (!rc) return;
    const [r, c] = rc;
    if (e.button === 0) handleReveal(r, c);
    else if (e.button === 2) handleFlag(r, c);
  }

  /* ── input: touch ──────────────────────────────────────────── */
  function onTouchStart(e) {
    if (gameOver || gameWon) return;
    const rc = getCellRC(e);
    if (!rc) return;

    touchMoved = false;
    longPressFired = false;
    faceBtn.textContent = FACE.surprised;

    const [r, c] = rc;
    longPressTimer = setTimeout(() => {
      longPressFired = true;
      handleFlag(r, c);
      faceBtn.textContent = FACE.normal;
      /* haptic feedback if available */
      if (navigator.vibrate) navigator.vibrate(30);
    }, LONG_PRESS_MS);
  }

  function onTouchEnd(e) {
    e.preventDefault();
    if (gameOver || gameWon) { clearTimeout(longPressTimer); return; }
    clearTimeout(longPressTimer);
    faceBtn.textContent = FACE.normal;
    if (touchMoved || longPressFired) return;

    const rc = getCellRC(e);
    if (!rc) return;
    handleReveal(rc[0], rc[1]);
  }

  function onTouchMove() {
    touchMoved = true;
    clearTimeout(longPressTimer);
  }

  /* ── game logic: reveal ────────────────────────────────────── */
  function handleReveal(r, c) {
    if (gameOver || gameWon) return;
    if (flagged[r][c]) return;

    if (firstClick) {
      firstClick = false;
      placeMines(r, c);
      startTimer();
    }

    /* chord: if already revealed number, try chord */
    if (revealed[r][c]) {
      if (grid[r][c] > 0) chord(r, c);
      return;
    }

    revealCell(r, c);
  }

  /* iterative flood-fill reveal (no stack overflow) */
  function revealCell(startR, startC) {
    const queue = [[startR, startC]];
    let step = 0;

    while (queue.length > 0) {
      const [r, c] = queue.shift();
      if (r < 0 || r >= rows || c < 0 || c >= cols) continue;
      if (revealed[r][c] || flagged[r][c]) continue;

      revealed[r][c] = true;
      const cell = cellEl(r, c);
      cell.classList.remove('hidden');
      cell.classList.add('revealed');

      /* stagger animation */
      const delay = Math.min(step * 8, 300);
      cell.style.animationDelay = delay + 'ms';
      cell.classList.add('reveal-anim');
      step++;

      if (grid[r][c] === -1) {
        cell.innerHTML = '<span class="mine-icon">' + MINE_CH + '</span>';
        cell.classList.add('mine-hit');
        endGame(false);
        return;
      }

      if (grid[r][c] > 0) {
        cell.innerHTML = '<span class="num-' + grid[r][c] + '">' + grid[r][c] + '</span>';
      }

      /* flood fill for zeros */
      if (grid[r][c] === 0) {
        neighbors(r, c, (nr, nc) => {
          if (!revealed[nr][nc] && !flagged[nr][nc]) {
            queue.push([nr, nc]);
          }
        });
      }
    }

    checkWin();
  }

  /* ── game logic: flag ──────────────────────────────────────── */
  function handleFlag(r, c) {
    if (gameOver || gameWon) return;
    if (revealed[r][c]) return;

    const cell = cellEl(r, c);
    if (flagged[r][c]) {
      flagged[r][c] = false;
      flagCount--;
      cell.classList.remove('flagged');
      cell.innerHTML = '';
    } else {
      flagged[r][c] = true;
      flagCount++;
      cell.classList.add('flagged');
      cell.innerHTML = '<span class="flag-icon">' + FLAG_CH + '</span>';
    }
    counterEl.textContent = pad3(totalMines - flagCount);
  }

  /* ── game logic: chord ─────────────────────────────────────── */
  function chord(r, c) {
    let adjFlags = 0;
    neighbors(r, c, (nr, nc) => { if (flagged[nr][nc]) adjFlags++; });
    if (adjFlags !== grid[r][c]) return;

    neighbors(r, c, (nr, nc) => {
      if (!revealed[nr][nc] && !flagged[nr][nc]) {
        revealCell(nr, nc);
      }
    });
  }

  /* ── win / lose ────────────────────────────────────────────── */
  function checkWin() {
    if (gameOver || gameWon) return;
    let unrevealed = 0;
    for (let r = 0; r < rows; r++) {
      for (let c = 0; c < cols; c++) {
        if (grid[r][c] !== -1 && !revealed[r][c]) unrevealed++;
      }
    }
    if (unrevealed === 0) endGame(true);
  }

  function endGame(won) {
    gameOver = true;
    gameWon = won;
    clearInterval(timerInterval);

    if (won) {
      faceBtn.textContent = FACE.cool;
      gameMsgEl.textContent = 'YOU WIN!';
      gameMsgEl.className = 'game-msg win';
      /* auto-flag remaining mines */
      mineSet.forEach(i => {
        const mr = Math.floor(i / cols), mc = i % cols;
        if (!flagged[mr][mc]) {
          flagged[mr][mc] = true;
          flagCount++;
          const cell = cellEl(mr, mc);
          cell.classList.add('flagged');
          cell.innerHTML = '<span class="flag-icon">' + FLAG_CH + '</span>';
        }
      });
      counterEl.textContent = '000';
    } else {
      faceBtn.textContent = FACE.dead;
      gameMsgEl.textContent = 'GAME OVER';
      gameMsgEl.className = 'game-msg lose';
      /* reveal all mines, mark wrong flags */
      for (let r = 0; r < rows; r++) {
        for (let c = 0; c < cols; c++) {
          const cell = cellEl(r, c);
          if (grid[r][c] === -1 && !revealed[r][c] && !flagged[r][c]) {
            cell.classList.remove('hidden');
            cell.classList.add('revealed');
            cell.innerHTML = '<span class="mine-icon">' + MINE_CH + '</span>';
          }
          if (flagged[r][c] && grid[r][c] !== -1) {
            cell.classList.remove('flagged', 'hidden');
            cell.classList.add('revealed', 'wrong-flag');
            cell.innerHTML = '<span class="flag-icon">' + FLAG_CH + '</span><span class="wrong-x">\u2716</span>';
          }
        }
      }
    }

    saveStat(won);
  }

  /* ── timer ─────────────────────────────────────────────────── */
  function startTimer() {
    timerInterval = setInterval(() => {
      timerVal++;
      timerEl.textContent = pad3(timerVal);
      if (timerVal >= 999) clearInterval(timerInterval);
    }, 1000);
  }

  /* ── stats ─────────────────────────────────────────────────── */
  function getStats() {
    try { return JSON.parse(localStorage.getItem('minesweeper_stats') || '{}'); }
    catch(e) { return {}; }
  }

  function saveStat(won) {
    const stats = getStats();
    const key = currentDiff;
    if (!stats[key]) stats[key] = { played: 0, won: 0, bestTime: null };
    stats[key].played++;
    if (won) {
      stats[key].won++;
      if (stats[key].bestTime === null || timerVal < stats[key].bestTime) {
        stats[key].bestTime = timerVal;
      }
    }
    try { localStorage.setItem('minesweeper_stats', JSON.stringify(stats)); } catch(e) {}
    if (statsPanel.style.display !== 'none') renderStats();
  }

  function renderStats() {
    const stats = getStats();
    let html = '';
    ['beginner', 'intermediate', 'expert'].forEach(key => {
      const s = stats[key];
      if (!s) return;
      const pct = s.played > 0 ? Math.round(s.won / s.played * 100) : 0;
      const best = s.bestTime !== null ? s.bestTime + 's' : '--';
      html += '<div class="stat-heading">' + DIFFICULTIES[key].label + '</div>';
      html += '<div class="stat-label">Played</div><div class="stat-value">' + s.played + '</div>';
      html += '<div class="stat-label">Won</div><div class="stat-value">' + s.won + '</div>';
      html += '<div class="stat-label">Win Rate</div><div class="stat-value">' + pct + '%</div>';
      html += '<div class="stat-label">Best Time</div><div class="stat-value">' + best + '</div>';
    });
    if (!html) html = '<div class="stat-label" style="grid-column:1/-1">No games played yet.</div>';
    statsGrid.innerHTML = html;
  }

  function toggleStats() {
    const show = statsPanel.style.display === 'none';
    statsPanel.style.display = show ? 'block' : 'none';
    if (show) renderStats();
  }

  statsResetEl.addEventListener('click', () => {
    if (confirm('Reset all Minesweeper statistics?')) {
      try { localStorage.removeItem('minesweeper_stats'); } catch(e) {}
      renderStats();
    }
  });

  /* ── init ──────────────────────────────────────────────────── */
  const d = DIFFICULTIES[currentDiff];
  newGame(d.rows, d.cols, d.mines);

})();
</script>
</body>
</html>
