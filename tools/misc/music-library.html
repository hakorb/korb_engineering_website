<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Music Library</title>
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
html{font-size:16px;}
body{
  background:#050a0f;color:#e2e8f0;font-family:'JetBrains Mono','Courier New',monospace;
  min-height:100vh;touch-action:manipulation;
}
::-webkit-scrollbar{width:6px;}
::-webkit-scrollbar-track{background:#0a1018;}
::-webkit-scrollbar-thumb{background:#1a2535;border-radius:3px;}
button,input,select,textarea{font-family:inherit;font-size:16px;touch-action:manipulation;}
button{cursor:pointer;min-height:44px;border:1px solid #1a2535;background:#0a1018;color:#e2e8f0;border-radius:6px;padding:8px 16px;transition:all .15s;}
button:hover{border-color:#00d4ff;color:#00d4ff;}
button:active{transform:scale(0.97);}
button.primary{background:#00d4ff22;border-color:#00d4ff;color:#00d4ff;}
button.danger{border-color:#ef4444;color:#ef4444;}
button.danger:hover{background:#ef444422;}
input,select,textarea{background:#0a1018;border:1px solid #1a2535;color:#e2e8f0;border-radius:6px;padding:10px 12px;min-height:44px;outline:none;width:100%;}
input:focus,select:focus,textarea:focus{border-color:#00d4ff;}

/* Layout */
.app{max-width:1200px;margin:0 auto;padding:12px;}
header{display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:10px;padding:12px 0;border-bottom:1px solid #1a2535;margin-bottom:12px;}
header h1{font-size:1.3rem;color:#00d4ff;display:flex;align-items:center;gap:8px;}
header h1 span{font-size:1.4rem;}
.header-actions{display:flex;gap:8px;flex-wrap:wrap;}
.storage-bar{font-size:.75rem;color:#e2e8f088;margin-top:4px;}
.storage-bar span{color:#10b981;}

/* Tabs */
.tabs{display:flex;gap:4px;margin-bottom:12px;overflow-x:auto;-webkit-overflow-scrolling:touch;}
.tab{min-height:44px;padding:8px 16px;border:1px solid #1a2535;background:#0a1018;color:#e2e8f0aa;border-radius:6px 6px 0 0;white-space:nowrap;font-size:.85rem;}
.tab.active{border-color:#00d4ff;color:#00d4ff;background:#00d4ff11;border-bottom-color:transparent;}

/* Upload area */
.upload-zone{
  border:2px dashed #1a2535;border-radius:8px;padding:40px 20px;text-align:center;
  transition:all .2s;cursor:pointer;margin-bottom:16px;
}
.upload-zone.dragover{border-color:#00d4ff;background:#00d4ff08;}
.upload-zone .icon{font-size:2.5rem;margin-bottom:8px;}
.upload-zone p{color:#e2e8f088;margin:4px 0;font-size:.85rem;}
.upload-zone .browse-link{color:#00d4ff;text-decoration:underline;cursor:pointer;}

/* Progress */
.upload-progress{margin-bottom:16px;}
.upload-item{display:flex;align-items:center;gap:10px;padding:8px 12px;background:#0a1018;border:1px solid #1a2535;border-radius:6px;margin-bottom:4px;font-size:.8rem;}
.upload-item .name{flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
.upload-item .bar{width:120px;height:6px;background:#1a2535;border-radius:3px;overflow:hidden;}
.upload-item .bar-fill{height:100%;background:#10b981;transition:width .3s;border-radius:3px;}
.upload-item .status{min-width:24px;text-align:right;}
.upload-item .status.done{color:#10b981;}
.upload-item .status.error{color:#ef4444;}

/* Search & filter bar */
.toolbar{display:flex;gap:8px;margin-bottom:12px;flex-wrap:wrap;align-items:center;}
.toolbar input{flex:1;min-width:150px;}
.toolbar select{max-width:200px;}
.toolbar .count{font-size:.75rem;color:#e2e8f088;white-space:nowrap;}

/* Song grid/list */
.view-toggle{display:flex;gap:4px;margin-bottom:8px;}
.view-toggle button{min-height:36px;padding:4px 10px;font-size:.85rem;}
.view-toggle button.active{border-color:#00d4ff;color:#00d4ff;}

.song-list{display:flex;flex-direction:column;gap:4px;}
.song-item{
  display:grid;grid-template-columns:1fr auto auto auto;align-items:center;gap:8px;
  padding:10px 12px;background:#0a1018;border:1px solid #1a2535;border-radius:6px;
  cursor:pointer;transition:all .15s;font-size:.8rem;min-height:44px;
}
.song-item:hover{border-color:#00d4ff44;}
.song-item.selected{border-color:#ff6600;background:#ff660011;}
.song-item .title{font-weight:600;color:#e2e8f0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
.song-item .artist{color:#e2e8f088;font-size:.75rem;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
.song-item .meta{color:#e2e8f066;font-size:.7rem;white-space:nowrap;}
.song-item .actions{display:flex;gap:4px;}
.song-item .actions button{min-height:32px;padding:2px 8px;font-size:.75rem;}

.song-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(180px,1fr));gap:8px;}
.song-card{
  background:#0a1018;border:1px solid #1a2535;border-radius:8px;padding:16px 12px;
  cursor:pointer;transition:all .15s;text-align:center;
}
.song-card:hover{border-color:#00d4ff44;}
.song-card.selected{border-color:#ff6600;background:#ff660011;}
.song-card .card-icon{font-size:2rem;margin-bottom:8px;color:#00d4ff44;}
.song-card .title{font-weight:600;font-size:.8rem;margin-bottom:4px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
.song-card .artist{color:#e2e8f088;font-size:.7rem;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
.song-card .meta{color:#e2e8f066;font-size:.65rem;margin-top:4px;}

/* Bulk bar */
.bulk-bar{
  position:fixed;bottom:0;left:0;right:0;background:#0a1018;border-top:1px solid #1a2535;
  padding:10px 16px;display:flex;align-items:center;justify-content:space-between;gap:8px;
  z-index:100;transform:translateY(100%);transition:transform .2s;
}
.bulk-bar.visible{transform:translateY(0);}
.bulk-bar .info{font-size:.8rem;color:#ff6600;}

/* Modal */
.modal-overlay{
  position:fixed;inset:0;background:#050a0fcc;z-index:200;display:flex;align-items:center;
  justify-content:center;padding:16px;opacity:0;pointer-events:none;transition:opacity .2s;
}
.modal-overlay.visible{opacity:1;pointer-events:auto;}
.modal{background:#0a1018;border:1px solid #1a2535;border-radius:10px;padding:20px;width:100%;max-width:420px;max-height:80vh;overflow-y:auto;}
.modal h2{font-size:1rem;color:#00d4ff;margin-bottom:16px;}
.modal .field{margin-bottom:12px;}
.modal .field label{display:block;font-size:.75rem;color:#e2e8f088;margin-bottom:4px;}
.modal .modal-actions{display:flex;gap:8px;justify-content:flex-end;margin-top:16px;}

/* Folders/playlists sidebar */
.content-area{display:flex;gap:12px;}
.sidebar{width:200px;flex-shrink:0;display:flex;flex-direction:column;gap:4px;}
.sidebar-title{font-size:.75rem;color:#e2e8f066;text-transform:uppercase;letter-spacing:.05em;padding:8px 4px 4px;display:flex;justify-content:space-between;align-items:center;}
.sidebar-title button{min-height:28px;padding:2px 8px;font-size:.7rem;}
.folder-item{
  padding:8px 12px;background:#0a1018;border:1px solid transparent;border-radius:6px;
  cursor:pointer;font-size:.8rem;min-height:44px;display:flex;align-items:center;gap:8px;
  transition:all .15s;
}
.folder-item:hover{border-color:#1a2535;}
.folder-item.active{border-color:#00d4ff;color:#00d4ff;background:#00d4ff08;}
.folder-item .folder-icon{font-size:1rem;}
.folder-item .folder-name{flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
.folder-item .folder-count{font-size:.7rem;color:#e2e8f066;}
.main-content{flex:1;min-width:0;}

/* Empty state */
.empty{text-align:center;padding:60px 20px;color:#e2e8f044;}
.empty .icon{font-size:3rem;margin-bottom:12px;}
.empty p{font-size:.85rem;}

/* Responsive */
@media(max-width:768px){
  .sidebar{display:none;}
  .sidebar.mobile-visible{
    position:fixed;inset:0;z-index:150;background:#050a0f;width:100%;padding:16px;
    display:flex;overflow-y:auto;
  }
  .mobile-sidebar-toggle{display:inline-flex !important;}
  .song-item{grid-template-columns:1fr auto;}
  .song-item .meta:not(.size){display:none;}
  .header-actions{width:100%;}
  .header-actions button{flex:1;}
}
@media(min-width:769px){
  .mobile-sidebar-toggle{display:none !important;}
}
</style>
</head>
<body>
<div class="app">
  <header>
    <div>
      <h1><span>&#9835;</span> Music Library</h1>
      <div class="storage-bar" id="storageInfo">Calculating storage...</div>
    </div>
    <div class="header-actions">
      <button class="mobile-sidebar-toggle" onclick="toggleMobileSidebar()">&#128193; Folders</button>
      <button onclick="showTab('upload')">&#8679; Upload</button>
      <button onclick="exportLibrary()">&#8615; Export ZIP</button>
      <button onclick="document.getElementById('importZip').click()">&#8613; Import ZIP</button>
      <input type="file" id="importZip" accept=".zip" style="display:none" onchange="importLibrary(event)">
    </div>
  </header>

  <div class="tabs">
    <button class="tab active" data-tab="library" onclick="showTab('library')">Library</button>
    <button class="tab" data-tab="upload" onclick="showTab('upload')">Upload</button>
    <button class="tab" data-tab="folders" onclick="showTab('folders')">Folders / Playlists</button>
  </div>

  <!-- UPLOAD TAB -->
  <div id="tab-upload" class="tab-content" style="display:none">
    <div class="upload-zone" id="uploadZone">
      <div class="icon">&#128190;</div>
      <p>Drag & drop audio files here</p>
      <p>or <span class="browse-link" id="browseLink">browse files</span></p>
      <p style="margin-top:8px;font-size:.7rem;color:#e2e8f044;">.mp3, .m4a, .wav, .ogg</p>
    </div>
    <input type="file" id="fileInput" multiple accept=".mp3,.m4a,.wav,.ogg,audio/*" style="display:none">
    <div class="upload-progress" id="uploadProgress"></div>
  </div>

  <!-- LIBRARY TAB -->
  <div id="tab-library" class="tab-content">
    <div class="toolbar">
      <input type="text" id="searchInput" placeholder="Search title or artist..." oninput="renderLibrary()">
      <select id="folderFilter" onchange="renderLibrary()">
        <option value="">All Songs</option>
      </select>
      <div class="view-toggle">
        <button class="active" id="listViewBtn" onclick="setView('list')">&#9776;</button>
        <button id="gridViewBtn" onclick="setView('grid')">&#9638;</button>
      </div>
      <span class="count" id="songCount"></span>
    </div>
    <div class="content-area">
      <div class="sidebar" id="sidebar">
        <div class="sidebar-title">Folders / Playlists</div>
        <div class="folder-item active" onclick="filterFolder('')"><span class="folder-icon">&#127925;</span><span class="folder-name">All Songs</span><span class="folder-count" id="allCount">0</span></div>
        <div id="folderList"></div>
        <button style="margin-top:8px;font-size:.75rem;" onclick="createFolder()">+ New Folder</button>
      </div>
      <div class="main-content">
        <div id="libraryView"></div>
      </div>
    </div>
  </div>

  <!-- FOLDERS TAB (mobile-friendly) -->
  <div id="tab-folders" class="tab-content" style="display:none">
    <div style="margin-bottom:12px;">
      <button class="primary" onclick="createFolder()">+ New Folder / Playlist</button>
    </div>
    <div id="foldersTabList"></div>
  </div>
</div>

<!-- Bulk action bar -->
<div class="bulk-bar" id="bulkBar">
  <span class="info" id="bulkInfo">0 selected</span>
  <div style="display:flex;gap:8px;">
    <button onclick="bulkMoveTo()">Move to Folder</button>
    <button class="danger" onclick="bulkDelete()">Delete</button>
    <button onclick="clearSelection()">Cancel</button>
  </div>
</div>

<!-- Edit modal -->
<div class="modal-overlay" id="editModal">
  <div class="modal">
    <h2>Edit Metadata</h2>
    <div class="field"><label>Title</label><input id="editTitle"></div>
    <div class="field"><label>Artist</label><input id="editArtist"></div>
    <div class="field"><label>Album</label><input id="editAlbum"></div>
    <div class="field"><label>Genre</label><input id="editGenre"></div>
    <div class="field"><label>Folder / Playlist</label>
      <select id="editFolder"><option value="">None</option></select>
    </div>
    <div class="modal-actions">
      <button class="danger" onclick="deleteSong(editingSongId)">Delete</button>
      <button onclick="closeEditModal()">Cancel</button>
      <button class="primary" onclick="saveEdit()">Save</button>
    </div>
  </div>
</div>

<!-- Folder create modal -->
<div class="modal-overlay" id="folderModal">
  <div class="modal">
    <h2 id="folderModalTitle">New Folder / Playlist</h2>
    <div class="field"><label>Name</label><input id="folderName"></div>
    <div class="modal-actions">
      <button onclick="closeFolderModal()">Cancel</button>
      <button class="primary" onclick="saveFolder()">Save</button>
    </div>
  </div>
</div>

<!-- Move-to modal -->
<div class="modal-overlay" id="moveModal">
  <div class="modal">
    <h2>Move to Folder</h2>
    <div id="moveFolderList"></div>
    <div class="modal-actions" style="margin-top:12px;">
      <button onclick="closeMoveModal()">Cancel</button>
    </div>
  </div>
</div>

<script>
// ===================== DATABASE (same as Harrison's iPod) =====================
const DB_NAME = 'HarrisonsIPod';
const DB_VERSION = 2;
let db = null;

function openDB() {
  return new Promise((resolve, reject) => {
    const req = indexedDB.open(DB_NAME, DB_VERSION);
    req.onupgradeneeded = (e) => {
      const d = e.target.result;
      if (!d.objectStoreNames.contains('songs')) {
        d.createObjectStore('songs', { keyPath: 'id', autoIncrement: true });
      }
      if (!d.objectStoreNames.contains('playlists')) {
        d.createObjectStore('playlists', { keyPath: 'id', autoIncrement: true });
      }
    };
    req.onsuccess = (e) => { db = e.target.result; resolve(db); };
    req.onerror = (e) => reject(e.target.error);
  });
}

function dbGetAll(store) {
  return new Promise((resolve, reject) => {
    const tx = db.transaction(store, 'readonly');
    const s = tx.objectStore(store);
    const req = s.getAll();
    req.onsuccess = () => resolve(req.result);
    req.onerror = (e) => reject(e);
  });
}
function dbAdd(store, data) {
  return new Promise((resolve, reject) => {
    const tx = db.transaction(store, 'readwrite');
    const s = tx.objectStore(store);
    const req = s.add(data);
    req.onsuccess = () => resolve(req.result);
    req.onerror = (e) => reject(e);
  });
}
function dbPut(store, data) {
  return new Promise((resolve, reject) => {
    const tx = db.transaction(store, 'readwrite');
    const s = tx.objectStore(store);
    const req = s.put(data);
    req.onsuccess = () => resolve(req.result);
    req.onerror = (e) => reject(e);
  });
}
function dbDelete(store, id) {
  return new Promise((resolve, reject) => {
    const tx = db.transaction(store, 'readwrite');
    const s = tx.objectStore(store);
    const req = s.delete(id);
    req.onsuccess = () => resolve();
    req.onerror = (e) => reject(e);
  });
}
function dbGet(store, id) {
  return new Promise((resolve, reject) => {
    const tx = db.transaction(store, 'readonly');
    const s = tx.objectStore(store);
    const req = s.get(id);
    req.onsuccess = () => resolve(req.result);
    req.onerror = (e) => reject(e);
  });
}

// ===================== STATE =====================
let songs = [];
let folders = []; // stored in localStorage since iPod DB has no folder store
let selectedIds = new Set();
let viewMode = 'list';
let editingSongId = null;
let editingFolderId = null;
let activeFolder = '';

const FOLDERS_KEY = 'musicLibrary_folders';

function loadFolders() {
  try { folders = JSON.parse(localStorage.getItem(FOLDERS_KEY) || '[]'); } catch(e) { folders = []; }
}
function saveFolders() {
  localStorage.setItem(FOLDERS_KEY, JSON.stringify(folders));
}

// ===================== INIT =====================
(async function init() {
  await openDB();
  songs = await dbGetAll('songs');
  loadFolders();
  updateStorageInfo();
  renderLibrary();
  renderFolderSidebar();
  renderFolderFilter();
  renderFoldersTab();
})();

// ===================== TABS =====================
function showTab(name) {
  document.querySelectorAll('.tab-content').forEach(el => el.style.display = 'none');
  document.querySelectorAll('.tab').forEach(el => el.classList.toggle('active', el.dataset.tab === name));
  const el = document.getElementById('tab-' + name);
  if (el) el.style.display = '';
  if (name === 'library') renderLibrary();
  if (name === 'folders') renderFoldersTab();
}

// ===================== UPLOAD =====================
const uploadZone = document.getElementById('uploadZone');
const fileInput = document.getElementById('fileInput');
const browseLink = document.getElementById('browseLink');

uploadZone.addEventListener('dragover', (e) => { e.preventDefault(); uploadZone.classList.add('dragover'); });
uploadZone.addEventListener('dragleave', () => uploadZone.classList.remove('dragover'));
uploadZone.addEventListener('drop', (e) => { e.preventDefault(); uploadZone.classList.remove('dragover'); handleFiles(e.dataTransfer.files); });
uploadZone.addEventListener('click', () => fileInput.click());
browseLink.addEventListener('click', (e) => { e.stopPropagation(); fileInput.click(); });
fileInput.addEventListener('change', (e) => { if (e.target.files.length) handleFiles(e.target.files); fileInput.value = ''; });

function parseFilename(name) {
  const base = name.replace(/\.[^.]+$/, '');
  const parts = base.split(/\s*[-\u2013\u2014]\s*/);
  if (parts.length >= 2) return { artist: parts[0].trim(), title: parts.slice(1).join(' - ').trim() };
  return { artist: 'Unknown Artist', title: base.trim() };
}

async function handleFiles(fileList) {
  const files = Array.from(fileList).filter(f => /\.(mp3|m4a|wav|ogg)$/i.test(f.name));
  if (!files.length) return;
  const progressEl = document.getElementById('uploadProgress');
  progressEl.innerHTML = '';

  for (const file of files) {
    const itemEl = document.createElement('div');
    itemEl.className = 'upload-item';
    itemEl.innerHTML = `<span class="name">${escHTML(file.name)}</span><div class="bar"><div class="bar-fill" style="width:0%"></div></div><span class="status">...</span>`;
    progressEl.appendChild(itemEl);
  }

  for (let i = 0; i < files.length; i++) {
    const file = files[i];
    const itemEl = progressEl.children[i];
    const barFill = itemEl.querySelector('.bar-fill');
    const statusEl = itemEl.querySelector('.status');
    try {
      barFill.style.width = '50%';
      const parsed = parseFilename(file.name);
      const entry = {
        title: parsed.title,
        artist: parsed.artist,
        album: 'Unknown Album',
        filename: file.name,
        blob: file,
        dateAdded: Date.now()
      };
      const id = await dbAdd('songs', entry);
      entry.id = id;
      songs.push(entry);
      barFill.style.width = '100%';
      statusEl.textContent = '\u2713';
      statusEl.className = 'status done';
    } catch(err) {
      barFill.style.width = '100%';
      barFill.style.background = '#ef4444';
      statusEl.textContent = '\u2717';
      statusEl.className = 'status error';
    }
  }
  updateStorageInfo();
  renderLibrary();
  renderFolderSidebar();
}

// ===================== LIBRARY VIEW =====================
function setView(mode) {
  viewMode = mode;
  document.getElementById('listViewBtn').classList.toggle('active', mode === 'list');
  document.getElementById('gridViewBtn').classList.toggle('active', mode === 'grid');
  renderLibrary();
}

function getFilteredSongs() {
  let list = [...songs];
  const query = (document.getElementById('searchInput')?.value || '').toLowerCase().trim();
  const folder = document.getElementById('folderFilter')?.value || activeFolder;
  if (query) {
    list = list.filter(s => (s.title || '').toLowerCase().includes(query) || (s.artist || '').toLowerCase().includes(query));
  }
  if (folder) {
    const f = folders.find(fo => fo.id === folder);
    if (f) list = list.filter(s => f.songIds && f.songIds.includes(s.id));
  }
  return list.sort((a, b) => (a.title || '').localeCompare(b.title || ''));
}

function formatSize(bytes) {
  if (!bytes) return '?';
  if (bytes < 1024) return bytes + ' B';
  if (bytes < 1048576) return (bytes / 1024).toFixed(1) + ' KB';
  return (bytes / 1048576).toFixed(1) + ' MB';
}

function formatDuration(sec) {
  if (!sec || isNaN(sec)) return '--:--';
  const m = Math.floor(sec / 60);
  const s = Math.floor(sec % 60);
  return m + ':' + String(s).padStart(2, '0');
}

function escHTML(s) {
  const d = document.createElement('div');
  d.textContent = s || '';
  return d.innerHTML;
}

function renderLibrary() {
  const filtered = getFilteredSongs();
  document.getElementById('songCount').textContent = filtered.length + ' song' + (filtered.length !== 1 ? 's' : '');
  document.getElementById('allCount').textContent = songs.length;
  const container = document.getElementById('libraryView');

  if (!filtered.length) {
    container.innerHTML = '<div class="empty"><div class="icon">&#127925;</div><p>No songs yet. Upload some music!</p></div>';
    return;
  }

  if (viewMode === 'grid') {
    container.innerHTML = '<div class="song-grid">' + filtered.map(s => `
      <div class="song-card ${selectedIds.has(s.id) ? 'selected' : ''}" onclick="handleSongClick(event,${s.id})" oncontextmenu="handleSongContext(event,${s.id})">
        <div class="card-icon">&#9835;</div>
        <div class="title">${escHTML(s.title)}</div>
        <div class="artist">${escHTML(s.artist || 'Unknown')}</div>
        <div class="meta">${formatSize(s.blob?.size || s.size)}</div>
      </div>`).join('') + '</div>';
  } else {
    container.innerHTML = '<div class="song-list">' + filtered.map(s => `
      <div class="song-item ${selectedIds.has(s.id) ? 'selected' : ''}" onclick="handleSongClick(event,${s.id})" oncontextmenu="handleSongContext(event,${s.id})">
        <div><div class="title">${escHTML(s.title)}</div><div class="artist">${escHTML(s.artist || 'Unknown')}${s.album && s.album !== 'Unknown Album' ? ' \u2022 ' + escHTML(s.album) : ''}</div></div>
        <div class="meta">${escHTML(s.genre || '')}</div>
        <div class="meta size">${formatSize(s.blob?.size || s.size)}</div>
        <div class="actions"><button onclick="event.stopPropagation();openEditModal(${s.id})">Edit</button></div>
      </div>`).join('') + '</div>';
  }
  updateBulkBar();
}

function handleSongClick(e, id) {
  if (e.shiftKey || e.ctrlKey || e.metaKey) {
    if (selectedIds.has(id)) selectedIds.delete(id); else selectedIds.add(id);
    renderLibrary();
  } else if (selectedIds.size > 0) {
    if (selectedIds.has(id)) selectedIds.delete(id); else selectedIds.add(id);
    renderLibrary();
  } else {
    openEditModal(id);
  }
}

function handleSongContext(e, id) {
  e.preventDefault();
  if (selectedIds.has(id)) selectedIds.delete(id); else selectedIds.add(id);
  renderLibrary();
}

function clearSelection() {
  selectedIds.clear();
  renderLibrary();
}

function updateBulkBar() {
  const bar = document.getElementById('bulkBar');
  bar.classList.toggle('visible', selectedIds.size > 0);
  document.getElementById('bulkInfo').textContent = selectedIds.size + ' selected';
}

// ===================== EDIT MODAL =====================
function openEditModal(id) {
  editingSongId = id;
  const song = songs.find(s => s.id === id);
  if (!song) return;
  document.getElementById('editTitle').value = song.title || '';
  document.getElementById('editArtist').value = song.artist || '';
  document.getElementById('editAlbum').value = song.album || '';
  document.getElementById('editGenre').value = song.genre || '';
  const sel = document.getElementById('editFolder');
  sel.innerHTML = '<option value="">None</option>' + folders.map(f => {
    const inFolder = f.songIds && f.songIds.includes(id);
    return `<option value="${f.id}" ${inFolder ? 'selected' : ''}>${escHTML(f.name)}</option>`;
  }).join('');
  document.getElementById('editModal').classList.add('visible');
}

function closeEditModal() {
  document.getElementById('editModal').classList.remove('visible');
  editingSongId = null;
}

async function saveEdit() {
  if (!editingSongId) return;
  const song = songs.find(s => s.id === editingSongId);
  if (!song) return;
  song.title = document.getElementById('editTitle').value.trim() || song.title;
  song.artist = document.getElementById('editArtist').value.trim();
  song.album = document.getElementById('editAlbum').value.trim();
  song.genre = document.getElementById('editGenre').value.trim();
  await dbPut('songs', song);

  // Update folder membership
  const folderId = document.getElementById('editFolder').value;
  folders.forEach(f => {
    if (!f.songIds) f.songIds = [];
    f.songIds = f.songIds.filter(sid => sid !== editingSongId);
    if (f.id === folderId) f.songIds.push(editingSongId);
  });
  saveFolders();

  closeEditModal();
  renderLibrary();
  renderFolderSidebar();
  renderFoldersTab();
}

async function deleteSong(id) {
  if (!confirm('Delete this song?')) return;
  await dbDelete('songs', id);
  songs = songs.filter(s => s.id !== id);
  selectedIds.delete(id);
  folders.forEach(f => { if (f.songIds) f.songIds = f.songIds.filter(sid => sid !== id); });
  saveFolders();
  closeEditModal();
  updateStorageInfo();
  renderLibrary();
  renderFolderSidebar();
  renderFoldersTab();
}

async function bulkDelete() {
  if (!selectedIds.size) return;
  if (!confirm('Delete ' + selectedIds.size + ' song(s)?')) return;
  for (const id of selectedIds) {
    await dbDelete('songs', id);
    songs = songs.filter(s => s.id !== id);
    folders.forEach(f => { if (f.songIds) f.songIds = f.songIds.filter(sid => sid !== id); });
  }
  saveFolders();
  selectedIds.clear();
  updateStorageInfo();
  renderLibrary();
  renderFolderSidebar();
  renderFoldersTab();
}

// ===================== FOLDERS =====================
function renderFolderSidebar() {
  const list = document.getElementById('folderList');
  list.innerHTML = folders.map(f => `
    <div class="folder-item ${activeFolder === f.id ? 'active' : ''}" onclick="filterFolder('${f.id}')">
      <span class="folder-icon">&#128193;</span>
      <span class="folder-name">${escHTML(f.name)}</span>
      <span class="folder-count">${(f.songIds || []).length}</span>
    </div>`).join('');
}

function renderFolderFilter() {
  const sel = document.getElementById('folderFilter');
  sel.innerHTML = '<option value="">All Songs</option>' + folders.map(f =>
    `<option value="${f.id}">${escHTML(f.name)}</option>`).join('');
}

function filterFolder(id) {
  activeFolder = id;
  document.getElementById('folderFilter').value = id;
  document.querySelectorAll('.folder-item').forEach(el => el.classList.remove('active'));
  const items = document.querySelectorAll('.folder-item');
  if (!id) { if (items[0]) items[0].classList.add('active'); }
  else {
    items.forEach(el => { if (el.onclick && el.onclick.toString().includes("'" + id + "'")) el.classList.add('active'); });
  }
  renderLibrary();
}

function createFolder() {
  editingFolderId = null;
  document.getElementById('folderModalTitle').textContent = 'New Folder / Playlist';
  document.getElementById('folderName').value = '';
  document.getElementById('folderModal').classList.add('visible');
  document.getElementById('folderName').focus();
}

function editFolder(id) {
  const f = folders.find(fo => fo.id === id);
  if (!f) return;
  editingFolderId = id;
  document.getElementById('folderModalTitle').textContent = 'Edit Folder';
  document.getElementById('folderName').value = f.name;
  document.getElementById('folderModal').classList.add('visible');
  document.getElementById('folderName').focus();
}

function closeFolderModal() {
  document.getElementById('folderModal').classList.remove('visible');
}

function saveFolder() {
  const name = document.getElementById('folderName').value.trim();
  if (!name) return;
  if (editingFolderId) {
    const f = folders.find(fo => fo.id === editingFolderId);
    if (f) f.name = name;
  } else {
    folders.push({ id: 'folder_' + Date.now(), name, songIds: [] });
  }
  saveFolders();
  closeFolderModal();
  renderFolderSidebar();
  renderFolderFilter();
  renderFoldersTab();
}

function deleteFolder(id) {
  if (!confirm('Delete this folder?')) return;
  folders = folders.filter(f => f.id !== id);
  if (activeFolder === id) activeFolder = '';
  saveFolders();
  renderFolderSidebar();
  renderFolderFilter();
  renderFoldersTab();
  renderLibrary();
}

function renderFoldersTab() {
  const el = document.getElementById('foldersTabList');
  if (!folders.length) {
    el.innerHTML = '<div class="empty"><div class="icon">&#128193;</div><p>No folders yet</p></div>';
    return;
  }
  el.innerHTML = folders.map(f => `
    <div style="display:flex;align-items:center;gap:8px;padding:10px 12px;background:#0a1018;border:1px solid #1a2535;border-radius:6px;margin-bottom:4px;min-height:44px;">
      <span style="font-size:1.2rem;">&#128193;</span>
      <span style="flex:1;font-size:.85rem;">${escHTML(f.name)}</span>
      <span style="font-size:.7rem;color:#e2e8f066;">${(f.songIds || []).length} songs</span>
      <button style="min-height:36px;padding:4px 10px;font-size:.75rem;" onclick="editFolder('${f.id}')">Edit</button>
      <button class="danger" style="min-height:36px;padding:4px 10px;font-size:.75rem;" onclick="deleteFolder('${f.id}')">Del</button>
    </div>`).join('');
}

// ===================== BULK MOVE =====================
function bulkMoveTo() {
  if (!selectedIds.size) return;
  const list = document.getElementById('moveFolderList');
  list.innerHTML = '<div class="folder-item" onclick="doMove(\'\')"><span class="folder-icon">&#10060;</span><span class="folder-name">Remove from all folders</span></div>' +
    folders.map(f => `<div class="folder-item" onclick="doMove('${f.id}')"><span class="folder-icon">&#128193;</span><span class="folder-name">${escHTML(f.name)}</span></div>`).join('');
  document.getElementById('moveModal').classList.add('visible');
}

function closeMoveModal() {
  document.getElementById('moveModal').classList.remove('visible');
}

function doMove(folderId) {
  folders.forEach(f => {
    if (!f.songIds) f.songIds = [];
    f.songIds = f.songIds.filter(id => !selectedIds.has(id));
    if (f.id === folderId) {
      selectedIds.forEach(id => { if (!f.songIds.includes(id)) f.songIds.push(id); });
    }
  });
  saveFolders();
  selectedIds.clear();
  closeMoveModal();
  renderLibrary();
  renderFolderSidebar();
  renderFoldersTab();
}

function toggleMobileSidebar() {
  const sb = document.getElementById('sidebar');
  sb.classList.toggle('mobile-visible');
}

// ===================== STORAGE INFO =====================
async function updateStorageInfo() {
  const el = document.getElementById('storageInfo');
  if (navigator.storage && navigator.storage.estimate) {
    try {
      const est = await navigator.storage.estimate();
      const used = formatSize(est.usage || 0);
      const quota = formatSize(est.quota || 0);
      el.innerHTML = 'Storage: <span>' + used + '</span> / ' + quota;
    } catch(e) {
      el.textContent = 'Storage info unavailable';
    }
  } else {
    el.textContent = songs.length + ' songs in library';
  }
}

// ===================== EXPORT / IMPORT ZIP =====================
async function exportLibrary() {
  if (!songs.length) { alert('No songs to export.'); return; }
  // Dynamically load JSZip
  if (typeof JSZip === 'undefined') {
    await loadScript('https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js');
  }
  const zip = new JSZip();
  const meta = [];
  for (const s of songs) {
    const fname = s.filename || (s.title + '.mp3');
    if (s.blob) zip.file(fname, s.blob);
    meta.push({ id: s.id, title: s.title, artist: s.artist, album: s.album, genre: s.genre, filename: fname, dateAdded: s.dateAdded });
  }
  zip.file('_library_meta.json', JSON.stringify({ songs: meta, folders }, null, 2));
  const blob = await zip.generateAsync({ type: 'blob' }, (m) => {
    document.title = 'Exporting... ' + Math.round(m.percent) + '%';
  });
  document.title = 'Music Library';
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = 'music-library-export.zip';
  a.click();
  URL.revokeObjectURL(a.href);
}

async function importLibrary(e) {
  const file = e.target.files[0];
  if (!file) return;
  if (typeof JSZip === 'undefined') {
    await loadScript('https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js');
  }
  try {
    const zip = await JSZip.loadAsync(file);
    const metaFile = zip.file('_library_meta.json');
    let meta = null;
    if (metaFile) meta = JSON.parse(await metaFile.async('string'));

    const audioFiles = [];
    zip.forEach((path, entry) => {
      if (!entry.dir && path !== '_library_meta.json' && /\.(mp3|m4a|wav|ogg)$/i.test(path)) {
        audioFiles.push({ path, entry });
      }
    });

    for (const af of audioFiles) {
      const blob = await af.entry.async('blob');
      const songMeta = meta?.songs?.find(s => s.filename === af.path) || {};
      const parsed = parseFilename(af.path.split('/').pop());
      const entry = {
        title: songMeta.title || parsed.title,
        artist: songMeta.artist || parsed.artist,
        album: songMeta.album || 'Unknown Album',
        genre: songMeta.genre || '',
        filename: af.path.split('/').pop(),
        blob: blob,
        dateAdded: songMeta.dateAdded || Date.now()
      };
      const id = await dbAdd('songs', entry);
      entry.id = id;
      songs.push(entry);
    }

    if (meta?.folders) {
      meta.folders.forEach(f => {
        if (!folders.find(ef => ef.id === f.id)) folders.push(f);
      });
      saveFolders();
    }

    updateStorageInfo();
    renderLibrary();
    renderFolderSidebar();
    renderFolderFilter();
    renderFoldersTab();
    alert('Imported ' + audioFiles.length + ' song(s).');
  } catch(err) {
    alert('Import failed: ' + err.message);
  }
  e.target.value = '';
}

function loadScript(src) {
  return new Promise((resolve, reject) => {
    const s = document.createElement('script');
    s.src = src;
    s.onload = resolve;
    s.onerror = reject;
    document.head.appendChild(s);
  });
}

// Close modals on overlay click
document.querySelectorAll('.modal-overlay').forEach(el => {
  el.addEventListener('click', (e) => {
    if (e.target === el) {
      el.classList.remove('visible');
    }
  });
});

// Keyboard: Escape closes modals
document.addEventListener('keydown', (e) => {
  if (e.key === 'Escape') {
    document.querySelectorAll('.modal-overlay.visible').forEach(el => el.classList.remove('visible'));
  }
});
