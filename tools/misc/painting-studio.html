<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Painting Studio - Korb Engineering</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@300;400;500;600&display=swap');
*{margin:0;padding:0;box-sizing:border-box}
:root{
  --bg:#050a0f;--surface:#0a1018;--border:#1a2535;--cyan:#00d4ff;--cyan-dim:#0090b0;
  --orange:#ff6600;--green:#10b981;--text:#e2e8f0;--text-dim:#6a8aaa;
  --canvas-bg:#faf8f5;--panel-w:220px;
}
body{background:var(--bg);color:var(--text);font-family:'JetBrains Mono',monospace;overflow:hidden;height:100vh;width:100vw;touch-action:none;user-select:none;-webkit-user-select:none}

/* Top bar */
.topbar{display:flex;align-items:center;gap:8px;padding:6px 12px;background:var(--surface);border-bottom:1px solid var(--border);height:40px;z-index:10;flex-shrink:0}
.topbar h1{font-size:.7rem;color:var(--cyan);letter-spacing:2px;font-weight:300;white-space:nowrap}
.topbar .sep{width:1px;height:18px;background:var(--border);margin:0 4px}
.tb-btn{background:none;border:1px solid var(--border);color:var(--text-dim);font-family:inherit;font-size:.6rem;padding:4px 10px;border-radius:4px;cursor:pointer;transition:all .2s;white-space:nowrap}
.tb-btn:hover{border-color:var(--cyan);color:var(--cyan)}
.tb-btn.active{border-color:var(--cyan);color:var(--cyan);background:rgba(0,212,255,.08)}
.tb-group{display:flex;gap:4px;align-items:center}
.topbar .spacer{flex:1}

/* Layout */
.app-layout{display:flex;height:calc(100vh - 40px)}

/* Left panel - tools */
.left-panel{width:52px;background:var(--surface);border-right:1px solid var(--border);display:flex;flex-direction:column;gap:2px;padding:6px 4px;overflow-y:auto;flex-shrink:0}
.tool-btn{width:44px;height:44px;display:flex;align-items:center;justify-content:center;background:none;border:1px solid transparent;border-radius:6px;cursor:pointer;color:var(--text-dim);transition:all .15s;font-size:1.1rem}
.tool-btn:hover{background:rgba(0,212,255,.06);color:var(--cyan)}
.tool-btn.active{border-color:var(--cyan);color:var(--cyan);background:rgba(0,212,255,.1);box-shadow:0 0 8px rgba(0,212,255,.15)}
.tool-btn svg{width:22px;height:22px}
.tool-sep{height:1px;background:var(--border);margin:4px 2px}

/* Canvas area */
.canvas-area{flex:1;position:relative;overflow:hidden;background:#111820;display:flex;align-items:center;justify-content:center}
#drawCanvas{background:var(--canvas-bg);cursor:crosshair;touch-action:none;image-rendering:auto;box-shadow:0 4px 40px rgba(0,0,0,.5)}

/* Right panel */
.right-panel{width:var(--panel-w);background:var(--surface);border-left:1px solid var(--border);display:flex;flex-direction:column;overflow-y:auto;flex-shrink:0}
.panel-section{padding:10px;border-bottom:1px solid var(--border)}
.panel-section h3{font-size:.6rem;color:var(--cyan);letter-spacing:1.5px;text-transform:uppercase;margin-bottom:8px;font-weight:500}
.panel-section.collapsed .panel-body{display:none}
.panel-header{display:flex;justify-content:space-between;align-items:center;cursor:pointer}
.panel-toggle{background:none;border:none;color:var(--text-dim);font-size:.7rem;cursor:pointer}

/* Brush options */
.brush-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:3px}
.brush-opt{padding:4px;text-align:center;font-size:.55rem;color:var(--text-dim);border:1px solid var(--border);border-radius:4px;cursor:pointer;transition:all .15s;background:none}
.brush-opt:hover{border-color:var(--cyan-dim);color:var(--text)}
.brush-opt.active{border-color:var(--cyan);color:var(--cyan);background:rgba(0,212,255,.08)}

/* Sliders */
.slider-row{display:flex;align-items:center;gap:6px;margin-bottom:6px}
.slider-row label{font-size:.55rem;color:var(--text-dim);min-width:40px;letter-spacing:.5px}
.slider-row input[type=range]{flex:1;accent-color:var(--cyan);height:3px}
.slider-row .val{font-size:.55rem;color:var(--cyan);min-width:28px;text-align:right}

/* Color picker */
.color-main{display:flex;gap:8px;align-items:flex-start;margin-bottom:8px}
.color-preview{width:44px;height:44px;border-radius:6px;border:2px solid var(--border);cursor:pointer;position:relative;flex-shrink:0}
.color-preview input[type=color]{position:absolute;inset:0;opacity:0;cursor:pointer;width:100%;height:100%}
.color-hex{display:flex;align-items:center;gap:4px}
.color-hex label{font-size:.55rem;color:var(--text-dim)}
.color-hex input{background:var(--bg);border:1px solid var(--border);color:var(--text);font-family:inherit;font-size:.65rem;padding:4px 6px;border-radius:3px;width:72px}
.color-swatches{display:flex;flex-wrap:wrap;gap:3px;margin-top:6px}
.swatch{width:18px;height:18px;border-radius:3px;cursor:pointer;border:1px solid rgba(255,255,255,.1);transition:transform .1s}
.swatch:hover{transform:scale(1.2)}
.swatch.active{border-color:var(--cyan);box-shadow:0 0 6px rgba(0,212,255,.3)}
.palette-tabs{display:flex;gap:2px;margin-bottom:6px;flex-wrap:wrap}
.palette-tab{font-size:.5rem;padding:2px 6px;background:none;border:1px solid var(--border);color:var(--text-dim);border-radius:3px;cursor:pointer;transition:all .15s}
.palette-tab:hover{border-color:var(--cyan-dim)}
.palette-tab.active{border-color:var(--cyan);color:var(--cyan)}
.recent-colors{display:flex;gap:3px;margin-top:6px}
.recent-label{font-size:.5rem;color:var(--text-dim);margin-top:6px;margin-bottom:3px}

/* Layers */
.layer-list{display:flex;flex-direction:column;gap:2px;max-height:200px;overflow-y:auto}
.layer-item{display:flex;align-items:center;gap:4px;padding:5px 6px;border:1px solid var(--border);border-radius:4px;font-size:.6rem;cursor:pointer;transition:all .15s}
.layer-item:hover{background:rgba(0,212,255,.04)}
.layer-item.active{border-color:var(--cyan);background:rgba(0,212,255,.08)}
.layer-item .vis-btn{background:none;border:none;color:var(--text-dim);cursor:pointer;font-size:.7rem;padding:2px}
.layer-item .vis-btn:hover{color:var(--cyan)}
.layer-item .layer-name{flex:1;color:var(--text);overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.layer-item .layer-opacity{font-size:.5rem;color:var(--text-dim)}
.layer-actions{display:flex;gap:3px;margin-top:6px}
.layer-actions .tb-btn{font-size:.55rem;padding:3px 8px}

/* Bottom bar */
.bottombar{display:flex;align-items:center;gap:10px;padding:4px 12px;background:var(--surface);border-top:1px solid var(--border);height:36px;flex-shrink:0}
.bottombar label{font-size:.55rem;color:var(--text-dim)}
.bottombar input[type=range]{width:100px;accent-color:var(--cyan);height:3px}
.bottombar .val{font-size:.55rem;color:var(--cyan);min-width:20px}
.bottombar .sep{width:1px;height:16px;background:var(--border)}
.bottombar .info{font-size:.55rem;color:var(--text-dim);margin-left:auto}

/* Responsive */
@media(max-width:768px){
  .right-panel{width:180px}
  .topbar h1{display:none}
}
@media(max-width:600px){
  .right-panel{display:none}
  .right-panel.show{display:flex;position:absolute;right:0;top:40px;bottom:36px;z-index:20;width:240px}
  .left-panel{width:44px;padding:4px 2px}
  .tool-btn{width:38px;height:38px}
}
</style>
</head>
<body>

<!-- Top Bar -->
<div class="topbar">
  <h1>PAINTING STUDIO</h1>
  <div class="sep"></div>
  <div class="tb-group">
    <button class="tb-btn" id="btnNew">New</button>
    <button class="tb-btn" id="btnSave">Save PNG</button>
    <button class="tb-btn" id="btnLoad">Load</button>
  </div>
  <div class="sep"></div>
  <div class="tb-group">

<div class="app-layout">
  <!-- Left Tools -->
  <div class="left-panel" id="leftPanel">
    <button class="tool-btn active" data-tool="pen" title="Pen (B)">✒</button>
    <button class="tool-btn" data-tool="pencil" title="Pencil (P)">✏</button>
    <button class="tool-btn" data-tool="marker" title="Marker (M)">🖊</button>
    <button class="tool-btn" data-tool="watercolor" title="Watercolor (W)">💧</button>
    <button class="tool-btn" data-tool="airbrush" title="Airbrush (A)">🌫</button>
    <button class="tool-btn" data-tool="calligraphy" title="Calligraphy (C)">🖋</button>
    <div class="tool-sep"></div>
    <button class="tool-btn" data-tool="eraser" title="Eraser (E)">🧹</button>
    <button class="tool-btn" data-tool="line" title="Line (L)">📏</button>
    <button class="tool-btn" data-tool="rect" title="Rectangle (R)">▭</button>
    <button class="tool-btn" data-tool="ellipse" title="Ellipse (O)">⬭</button>
    <button class="tool-btn" data-tool="fill" title="Fill (G)">🪣</button>

  </div>

  <!-- Canvas -->
  <div class="canvas-area" id="canvasArea">
    <canvas id="drawCanvas" width="1600" height="1200"></canvas>
  </div>

  <!-- Right Panel -->
  <div class="right-panel" id="rightPanel">
    <div class="panel-section">
      <h3>Brush</h3>
      <div class="panel-body">
        <div class="brush-grid" id="brushGrid">
          <div class="brush-opt active" data-brush="pen">Pen</div>
          <div class="brush-opt" data-brush="pencil">Pencil</div>
          <div class="brush-opt" data-brush="marker">Marker</div>
          <div class="brush-opt" data-brush="water">Water</div>
          <div class="brush-opt" data-brush="air">Air</div>
          <div class="brush-opt" data-brush="calli">Calli</div>
          <div class="brush-opt" data-brush="eraser">Erase</div>
          <div class="brush-opt" data-brush="fill">Fill</div>
        </div>
        <div style="margin-top:8px">
          <div class="slider-row"><label>Size</label><input type="range" id="sizeSlider" min="1" max="100" value="8"><span class="val" id="sizeVal">8</span></div>
          <div class="slider-row"><label>Opacity</label><input type="range" id="opacitySlider" min="1" max="100" value="100"><span class="val" id="opacityVal">100</span></div>
          <div class="slider-row"><label>Smooth</label><input type="range" id="smoothSlider" min="0" max="100" value="50"><span class="val" id="smoothVal">50</span></div>
        </div>
      </div>
    </div>

    <div class="panel-section">
      <h3>Color</h3>
      <div class="panel-body">
        <div class="color-main">
          <div class="color-preview" id="colorPreview" style="background:#000000">
            <input type="color" id="colorPicker" value="#000000">
          </div>
          <div>
            <div class="color-hex"><label>#</label><input type="text" id="hexInput" value="000000" maxlength="6"></div>
          </div>
        </div>
        <div class="palette-tabs" id="paletteTabs">
          <button class="palette-tab active" data-palette="basic">Basic</button>
          <button class="palette-tab" data-palette="pastel">Pastel</button>
          <button class="palette-tab" data-palette="earth">Earth</button>
          <button class="palette-tab" data-palette="neon">Neon</button>
          <button class="palette-tab" data-palette="skin">Skin</button>
        </div>
        <div class="color-swatches" id="swatches"></div>
        <div class="recent-label">Recent</div>
        <div class="recent-colors" id="recentColors"></div>
      </div>
    </div>

    <div class="panel-section">
      <h3>Layers</h3>
      <div class="panel-body">
        <div class="layer-list" id="layerList"></div>
        <div class="layer-actions">
          <button class="tb-btn" id="btnAddLayer">+ Add</button>
          <button class="tb-btn" id="btnDelLayer">Delete</button>
          <button class="tb-btn" id="btnMergeDown">Merge ↓</button>
        </div>
      </div>
    </div>
  </div>
</div>

<!-- Bottom Bar -->
<div class="bottombar">
  <label>Size</label><input type="range" id="bottomSize" min="1" max="100" value="8"><span class="val" id="bottomSizeVal">8</span>
  <div class="sep"></div>
  <label>Opacity</label><input type="range" id="bottomOpacity" min="1" max="100" value="100"><span class="val" id="bottomOpacityVal">100</span>
  <span class="info" id="canvasInfo">1600 × 1200</span>
</div>

<script type="module">
// ==================== Perfect Freehand (inline minimal implementation) ====================
// Based on perfect-freehand by Steve Ruiz (MIT License)
// Generates variable-width stroke outlines from pressure-sensitive input points

function lerp(a,b,t){return a+(b-a)*t}
function dist(a,b){return Math.hypot(a[0]-b[0],a[1]-b[1])}
function med(a,b){return[(a[0]+b[0])/2,(a[1]+b[1])/2]}
function prj(a,b,d){const l=dist(a,b);if(l===0)return a;const t=d/l;return[a[0]+(b[0]-a[0])*t,a[1]+(b[1]-a[1])*t]}
function rotAround(c,a,r){const s=Math.sin(r),co=Math.cos(r),dx=a[0]-c[0],dy=a[1]-c[1];return[c[0]+dx*co-dy*s,c[1]+dx*s+dy*co]}

function getStrokePoints(inputPoints,options={}){
  const{streamline=0.5,size=8}=options;
  if(inputPoints.length===0)return[];
  const pts=inputPoints.map(p=>({point:[p[0],p[1]],pressure:p[2]??0.5,runningLength:0}));
  const t=0.15+(1-streamline)*0.85;
  for(let i=1;i<pts.length;i++){
    const prev=pts[i-1];
    pts[i].point=[lerp(prev.point[0],pts[i].point[0],t),lerp(prev.point[1],pts[i].point[1],t)];
    pts[i].runningLength=prev.runningLength+dist(prev.point,pts[i].point);
  }
  return pts;
}

function getStrokeOutlinePoints(pts,options={}){
  const{size=8,thinning=0.5,smoothing=0.5,simulatePressure=false,last=false}=options;
  if(pts.length===0)return[];
  const totalLen=pts[pts.length-1].runningLength;
  const minDist=size*smoothing;
  const leftPts=[],rightPts=[];
  let prevPressure=pts[0].pressure;
  let prevPoint=pts[0].point;

  for(let i=0;i<pts.length;i++){
    const{point,pressure,runningLength}=pts[i];
    if(i>0&&dist(point,prevPoint)<minDist*0.5&&i<pts.length-1)continue;

    let sp=simulatePressure?Math.min(1,runningLength/size):pressure;
    sp=lerp(prevPressure,sp,0.3);
    prevPressure=sp;

    const radius=size/2*lerp(1,1-thinning,sp);
    let angle;
    if(i===0&&pts.length>1){angle=Math.atan2(pts[1].point[1]-point[1],pts[1].point[0]-point[0])}
    else if(i===pts.length-1&&pts.length>1){angle=Math.atan2(point[1]-pts[i-1].point[1],point[0]-pts[i-1].point[0])}
    else if(i>0){angle=Math.atan2(point[1]-pts[i-1].point[1],point[0]-pts[i-1].point[0])}
    else{angle=0}

    const perpAngle=angle+Math.PI/2;
    leftPts.push([point[0]+Math.cos(perpAngle)*radius,point[1]+Math.sin(perpAngle)*radius]);
    rightPts.push([point[0]-Math.cos(perpAngle)*radius,point[1]-Math.sin(perpAngle)*radius]);
    prevPoint=point;
  }

  // Build outline path
  const outline=[...leftPts,...rightPts.reverse()];
  return outline;
}

function getSvgPathFromStroke(stroke){
  if(!stroke.length)return'';
  const d=['M',stroke[0][0].toFixed(1),stroke[0][1].toFixed(1)];
  for(let i=1;i<stroke.length;i++){
    const[x,y]=stroke[i];
    const[px,py]=stroke[i-1];
    const mx=((px+x)/2).toFixed(1);
    const my=((py+y)/2).toFixed(1);
    d.push('Q',px.toFixed(1),py.toFixed(1),mx,my);
  }
  d.push('Z');
  return d.join(' ');
}

// ==================== State ====================
const PALETTES={
  basic:['#000000','#ffffff','#ff0000','#00ff00','#0000ff','#ffff00','#ff00ff','#00ffff','#ff8800','#8800ff','#008800','#880000','#888888','#444444','#cccccc','#ff4444'],
  pastel:['#FFB3BA','#FFDFBA','#FFFFBA','#BAFFC9','#BAE1FF','#E8BAFF','#FFB3DE','#B3FFE8','#D4BAFF','#FFC9BA','#BAFFD4','#BAC9FF','#FFE8BA','#BAFFFF','#FFBAFF','#C9FFB3'],
  earth:['#8B4513','#A0522D','#D2691E','#CD853F','#DEB887','#F5DEB3','#D2B48C','#BC8F8F','#2F4F4F','#556B2F','#6B8E23','#808000','#8B8682','#696969','#A9A9A9','#2E2E1F'],
  neon:['#FF0080','#FF00FF','#8000FF','#0000FF','#0080FF','#00FFFF','#00FF80','#00FF00','#80FF00','#FFFF00','#FF8000','#FF0000','#FF0040','#FF00BF','#4000FF','#00BFFF'],
  skin:['#FFF5E1','#FFE0BD','#FFCD94','#F5C48C','#EAB577','#D99B64','#C68642','#AE6B3E','#8D5524','#6B3A1F','#4A2511','#3B1A0B','#F8D5C2','#E0A899','#C08070','#A0685A']
};

let currentTool='pen';
let brushSize=8;
let brushOpacity=100;
let brushSmoothing=50;
let currentColor='#000000';
let recentColors=['#000000','#ff0000','#0000ff','#00aa00','#ff8800','#8800ff'];
let currentPalette='basic';

// Canvas & layers
const canvasW=1600,canvasH=1200;
let layers=[];
let activeLayerIdx=0;
let isDrawing=false;
let currentPoints=[];
let undoStack=[];
let redoStack=[];
const MAX_UNDO=40;

// Zoom/pan
let zoom=1;
let panX=0,panY=0;
let isPanning=false;
let lastPanPos=null;

// Shape drawing
let shapeStart=null;
let shapePreviewCtx=null;

// ==================== Canvas Setup ====================
const mainCanvas=document.getElementById('drawCanvas');
const canvasArea=document.getElementById('canvasArea');
mainCanvas.width=canvasW;
mainCanvas.height=canvasH;

function createLayer(name){
  const c=document.createElement('canvas');
  c.width=canvasW;c.height=canvasH;
  return{name,canvas:c,ctx:c.getContext('2d'),visible:true,opacity:100};
}

function initLayers(){
  layers=[createLayer('Background'),createLayer('Layer 1')];
  // Fill background with white
  layers[0].ctx.fillStyle='#ffffff';
  layers[0].ctx.fillRect(0,0,canvasW,canvasH);
  activeLayerIdx=1;
  renderLayers();
  renderLayerList();
}

function renderLayers(){
  const ctx=mainCanvas.getContext('2d');
  ctx.clearRect(0,0,canvasW,canvasH);
  for(const layer of layers){
    if(!layer.visible)continue;
    ctx.globalAlpha=layer.opacity/100;
    ctx.drawImage(layer.canvas,0,0);
  }
  ctx.globalAlpha=1;
}

function activeLayer(){return layers[activeLayerIdx]}

// ==================== Undo/Redo ====================
function saveState(){
  const state=layers.map(l=>{
    const c=document.createElement('canvas');
    c.width=canvasW;c.height=canvasH;
    c.getContext('2d').drawImage(l.canvas,0,0);
    return{name:l.name,canvas:c,visible:l.visible,opacity:l.opacity};
  });
  undoStack.push({layers:state,activeIdx:activeLayerIdx});
  if(undoStack.length>MAX_UNDO)undoStack.shift();
  redoStack=[];
}

function restoreState(state){
  layers=state.layers.map(s=>{
    const c=document.createElement('canvas');
    c.width=canvasW;c.height=canvasH;
    c.getContext('2d').drawImage(s.canvas,0,0);
    return{name:s.name,canvas:c,ctx:c.getContext('2d'),visible:s.visible,opacity:s.opacity};
  });
  activeLayerIdx=state.activeIdx;
  renderLayers();
  renderLayerList();
}

function undo(){
  if(!undoStack.length)return;
  const cur=layers.map(l=>{
    const c=document.createElement('canvas');c.width=canvasW;c.height=canvasH;
    c.getContext('2d').drawImage(l.canvas,0,0);
    return{name:l.name,canvas:c,visible:l.visible,opacity:l.opacity};
  });
  redoStack.push({layers:cur,activeIdx:activeLayerIdx});
  restoreState(undoStack.pop());
}

function redo(){
  if(!redoStack.length)return;
  const cur=layers.map(l=>{
    const c=document.createElement('canvas');c.width=canvasW;c.height=canvasH;
    c.getContext('2d').drawImage(l.canvas,0,0);
    return{name:l.name,canvas:c,visible:l.visible,opacity:l.opacity};
  });
  undoStack.push({layers:cur,activeIdx:activeLayerIdx});
  restoreState(redoStack.pop());
}

// ==================== Drawing ====================
function getCanvasPos(e){
  const rect=mainCanvas.getBoundingClientRect();
  const scaleX=canvasW/rect.width;
  const scaleY=canvasH/rect.height;
  return[(e.clientX-rect.left)*scaleX,(e.clientY-rect.top)*scaleY,e.pressure||0.5];
}

function getBrushOptions(){
  const base={size:brushSize,smoothing:brushSmoothing/100*0.7,simulatePressure:false};
  switch(currentTool){
    case'pen':return{...base,thinning:0.5,streamline:0.5};
    case'pencil':return{...base,thinning:0.3,streamline:0.3,size:brushSize*0.7};
    case'marker':return{...base,thinning:0.1,streamline:0.6,size:brushSize*1.5};
    case'watercolor':return{...base,thinning:0.6,streamline:0.7};
    case'calligraphy':return{...base,thinning:0.8,streamline:0.4};
    case'airbrush':return{...base,thinning:0.2,streamline:0.5};
    case'eraser':return{...base,thinning:0.2,streamline:0.5};
    default:return base;
  }
}

function drawStroke(ctx,points,options){
  if(points.length<2)return;
  const strokePts=getStrokePoints(points,{streamline:options.streamline||0.5,size:options.size||8});
  const outline=getStrokeOutlinePoints(strokePts,options);
  if(!outline.length)return;
  const path=getSvgPathFromStroke(outline);

  ctx.save();
  if(currentTool==='eraser'){
    ctx.globalCompositeOperation='destination-out';
    ctx.fillStyle='rgba(0,0,0,1)';
  }else if(currentTool==='watercolor'){
    ctx.globalAlpha=(brushOpacity/100)*0.15;
    ctx.fillStyle=currentColor;
    ctx.globalCompositeOperation='multiply';
  }else if(currentTool==='pencil'){
    ctx.globalAlpha=(brushOpacity/100)*0.6;
    ctx.fillStyle=currentColor;
  }else{
    ctx.globalAlpha=brushOpacity/100;
    ctx.fillStyle=currentColor;
  }

  const p2d=new Path2D(path);
  ctx.fill(p2d);
  ctx.restore();
}

function drawAirbrush(ctx,x,y,pressure){
  ctx.save();
  ctx.globalAlpha=(brushOpacity/100)*0.03;
  const radius=brushSize*(0.5+pressure*1.5);
  const gradient=ctx.createRadialGradient(x,y,0,x,y,radius);
  gradient.addColorStop(0,currentColor);
  gradient.addColorStop(1,'transparent');
  ctx.fillStyle=gradient;
  ctx.fillRect(x-radius,y-radius,radius*2,radius*2);
  ctx.restore();
}

function onPointerDown(e){
  if(e.pointerType==='touch'){
    // Touch = pan
    isPanning=true;
    lastPanPos={x:e.clientX,y:e.clientY};
    return;
  }

  const toolsWithStroke=['pen','pencil','marker','watercolor','calligraphy','airbrush','eraser'];
  const pos=getCanvasPos(e);

  if(currentTool==='eyedropper'){
    pickColor(pos[0],pos[1]);
    return;
  }

  if(currentTool==='fill'){
    saveState();
    floodFill(Math.round(pos[0]),Math.round(pos[1]));
    renderLayers();
    return;
  }

  if(['line','rect','ellipse'].includes(currentTool)){
    saveState();
    shapeStart={x:pos[0],y:pos[1]};
    return;
  }

  if(toolsWithStroke.includes(currentTool)){
    saveState();
    isDrawing=true;
    currentPoints=[pos];
    mainCanvas.setPointerCapture(e.pointerId);
  }
}

function onPointerMove(e){
  if(isPanning&&lastPanPos){
    // Not implementing full pan/zoom for simplicity — just track
    lastPanPos={x:e.clientX,y:e.clientY};
    return;
  }

  if(!isDrawing&&!shapeStart)return;
  const pos=getCanvasPos(e);

  if(shapeStart){
    // Preview shape on main canvas (we'll composite later)
    renderLayers();
    const ctx=mainCanvas.getContext('2d');
    ctx.save();
    ctx.strokeStyle=currentColor;
    ctx.lineWidth=brushSize;
    ctx.globalAlpha=brushOpacity/100;
    const x1=shapeStart.x,y1=shapeStart.y,x2=pos[0],y2=pos[1];
    ctx.beginPath();
    if(currentTool==='line'){ctx.moveTo(x1,y1);ctx.lineTo(x2,y2)}
    else if(currentTool==='rect'){ctx.rect(Math.min(x1,x2),Math.min(y1,y2),Math.abs(x2-x1),Math.abs(y2-y1))}
    else if(currentTool==='ellipse'){
      const cx=(x1+x2)/2,cy=(y1+y2)/2,rx=Math.abs(x2-x1)/2,ry=Math.abs(y2-y1)/2;
      ctx.ellipse(cx,cy,rx,ry,0,0,Math.PI*2);
    }
    ctx.stroke();
    ctx.restore();
    return;
  }

  currentPoints.push(pos);

  if(currentTool==='airbrush'){
    drawAirbrush(activeLayer().ctx,pos[0],pos[1],pos[2]);
    renderLayers();
    return;
  }

  // Draw current stroke preview on active layer
  const opts=getBrushOptions();
  // Clear and redraw? No — draw incrementally for performance
  // Draw the last segment
  if(currentPoints.length>=2){
    drawStroke(activeLayer().ctx,currentPoints,opts);
    renderLayers();
  }
}

function onPointerUp(e){
  if(isPanning){
    isPanning=false;
    lastPanPos=null;
    return;
  }

  if(shapeStart){
    const pos=getCanvasPos(e);
    const ctx=activeLayer().ctx;
    ctx.save();
    ctx.strokeStyle=currentColor;
    ctx.lineWidth=brushSize;
    ctx.globalAlpha=brushOpacity/100;
    const x1=shapeStart.x,y1=shapeStart.y,x2=pos[0],y2=pos[1];
    ctx.beginPath();
    if(currentTool==='line'){ctx.moveTo(x1,y1);ctx.lineTo(x2,y2)}
    else if(currentTool==='rect'){ctx.rect(Math.min(x1,x2),Math.min(y1,y2),Math.abs(x2-x1),Math.abs(y2-y1))}
    else if(currentTool==='ellipse'){
      const cx=(x1+x2)/2,cy=(y1+y2)/2,rx=Math.abs(x2-x1)/2,ry=Math.abs(y2-y1)/2;
      ctx.ellipse(cx,cy,Math.max(1,rx),Math.max(1,ry),0,0,Math.PI*2);
    }
    ctx.stroke();
    ctx.restore();
    shapeStart=null;
    renderLayers();
    return;
  }

  if(!isDrawing)return;
  isDrawing=false;

  // Final stroke render
  if(currentPoints.length>=2){
    const opts=getBrushOptions();
    drawStroke(activeLayer().ctx,currentPoints,opts);
    renderLayers();
  }
  currentPoints=[];
}

mainCanvas.addEventListener('pointerdown',onPointerDown);
mainCanvas.addEventListener('pointermove',onPointerMove);
mainCanvas.addEventListener('pointerup',onPointerUp);
mainCanvas.addEventListener('pointerleave',onPointerUp);
// Prevent context menu on long press
mainCanvas.addEventListener('contextmenu',e=>e.preventDefault());

// ==================== Flood Fill ====================
function floodFill(sx,sy){
  const ctx=activeLayer().ctx;
  const imgData=ctx.getImageData(0,0,canvasW,canvasH);
  const data=imgData.data;
  const idx=(sy*canvasW+sx)*4;
  const tr=data[idx],tg=data[idx+1],tb=data[idx+2],ta=data[idx+3];

  // Parse fill color
  const tc=document.createElement('canvas').getContext('2d');
  tc.fillStyle=currentColor;
  tc.fillRect(0,0,1,1);
  const fc=tc.getImageData(0,0,1,1).data;
  const fr=fc[0],fg=fc[1],fb=fc[2],fa=Math.round(brushOpacity/100*255);

  if(tr===fr&&tg===fg&&tb===fb&&ta===fa)return;

  const stack=[[sx,sy]];
  const visited=new Uint8Array(canvasW*canvasH);
  const tolerance=30;

  function match(i){
    return Math.abs(data[i]-tr)<=tolerance&&Math.abs(data[i+1]-tg)<=tolerance&&
           Math.abs(data[i+2]-tb)<=tolerance&&Math.abs(data[i+3]-ta)<=tolerance;
  }

  while(stack.length){
    const[x,y]=stack.pop();
    if(x<0||x>=canvasW||y<0||y>=canvasH)continue;
    const pi=y*canvasW+x;
    if(visited[pi])continue;
    const i=pi*4;
    if(!match(i))continue;
    visited[pi]=1;
    data[i]=fr;data[i+1]=fg;data[i+2]=fb;data[i+3]=fa;
    stack.push([x+1,y],[x-1,y],[x,y+1],[x,y-1]);
  }
  ctx.putImageData(imgData,0,0);
}

// ==================== Eyedropper ====================
function pickColor(x,y){
  const ctx=mainCanvas.getContext('2d');
  const px=ctx.getImageData(Math.round(x),Math.round(y),1,1).data;
  const hex='#'+[px[0],px[1],px[2]].map(v=>v.toString(16).padStart(2,'0')).join('');
  setColor(hex);
}

// ==================== Color ====================
function setColor(hex){
  currentColor=hex;
  document.getElementById('colorPreview').style.background=hex;
  document.getElementById('colorPicker').value=hex;
  document.getElementById('hexInput').value=hex.replace('#','');
  // Add to recent
  recentColors=recentColors.filter(c=>c!==hex);
  recentColors.unshift(hex);
  if(recentColors.length>12)recentColors.pop();
  renderRecentColors();
  renderSwatches();
}

function renderSwatches(){
  const container=document.getElementById('swatches');
  const colors=PALETTES[currentPalette]||PALETTES.basic;
  container.innerHTML=colors.map(c=>
    `<div class="swatch${c===currentColor?' active':''}" style="background:${c}" data-color="${c}"></div>`
  ).join('');
  container.querySelectorAll('.swatch').forEach(s=>{
    s.addEventListener('click',()=>setColor(s.dataset.color));
  });
}

function renderRecentColors(){
  const container=document.getElementById('recentColors');
  container.innerHTML=recentColors.map(c=>
    `<div class="swatch" style="background:${c};width:16px;height:16px" data-color="${c}"></div>`
  ).join('');
  container.querySelectorAll('.swatch').forEach(s=>{
    s.addEventListener('click',()=>setColor(s.dataset.color));
  });
}

document.getElementById('colorPicker').addEventListener('input',e=>setColor(e.target.value));
document.getElementById('hexInput').addEventListener('change',e=>{
  let v=e.target.value.replace('#','');
  if(/^[0-9a-fA-F]{6}$/.test(v))setColor('#'+v);
});
document.getElementById('paletteTabs').addEventListener('click',e=>{
  const tab=e.target.closest('.palette-tab');
  if(!tab)return;
  currentPalette=tab.dataset.palette;
  document.querySelectorAll('.palette-tab').forEach(t=>t.classList.remove('active'));
  tab.classList.add('active');
  renderSwatches();
});

// ==================== Layers UI ====================
function renderLayerList(){
  const list=document.getElementById('layerList');
  list.innerHTML=layers.map((l,i)=>`
    <div class="layer-item${i===activeLayerIdx?' active':''}" data-idx="${i}">
      <button class="vis-btn">${l.visible?'👁':'🚫'}</button>
      <span class="layer-name">${l.name}</span>
      <span class="layer-opacity">${l.opacity}%</span>
    </div>
  `).reverse().join('');

  list.querySelectorAll('.layer-item').forEach(el=>{
    el.addEventListener('click',e=>{
      if(e.target.closest('.vis-btn'))return;
      activeLayerIdx=parseInt(el.dataset.idx);
      renderLayerList();
    });
    el.querySelector('.vis-btn').addEventListener('click',()=>{
      const idx=parseInt(el.dataset.idx);
      layers[idx].visible=!layers[idx].visible;
      renderLayers();
      renderLayerList();
    });
  });
}

document.getElementById('btnAddLayer').addEventListener('click',()=>{
  if(layers.length>=8)return;
  saveState();
  const name='Layer '+(layers.length);
  layers.push(createLayer(name));
  activeLayerIdx=layers.length-1;
  renderLayers();
  renderLayerList();
});

document.getElementById('btnDelLayer').addEventListener('click',()=>{
  if(layers.length<=1)return;
  saveState();
  layers.splice(activeLayerIdx,1);
  activeLayerIdx=Math.min(activeLayerIdx,layers.length-1);
  renderLayers();
  renderLayerList();
});

document.getElementById('btnMergeDown').addEventListener('click',()=>{
  if(activeLayerIdx<=0)return;
  saveState();
  const below=layers[activeLayerIdx-1];
  below.ctx.globalAlpha=layers[activeLayerIdx].opacity/100;
  below.ctx.drawImage(layers[activeLayerIdx].canvas,0,0);
  below.ctx.globalAlpha=1;
  layers.splice(activeLayerIdx,1);
  activeLayerIdx--;
  renderLayers();
  renderLayerList();
});

// ==================== Sliders ====================
function syncSliders(size,opacity,smooth){
  document.getElementById('sizeSlider').value=size;
  document.getElementById('sizeVal').textContent=size;
  document.getElementById('bottomSize').value=size;
  document.getElementById('bottomSizeVal').textContent=size;
  document.getElementById('opacitySlider').value=opacity;
  document.getElementById('opacityVal').textContent=opacity;
  document.getElementById('bottomOpacity').value=opacity;
  document.getElementById('bottomOpacityVal').textContent=opacity;
  document.getElementById('smoothSlider').value=smooth;
  document.getElementById('smoothVal').textContent=smooth;
}

['sizeSlider','bottomSize'].forEach(id=>{
  document.getElementById(id).addEventListener('input',e=>{
    brushSize=parseInt(e.target.value);
    syncSliders(brushSize,brushOpacity,brushSmoothing);
  });
});
['opacitySlider','bottomOpacity'].forEach(id=>{
  document.getElementById(id).addEventListener('input',e=>{
    brushOpacity=parseInt(e.target.value);
    syncSliders(brushSize,brushOpacity,brushSmoothing);
  });
});
document.getElementById('smoothSlider').addEventListener('input',e=>{
  brushSmoothing=parseInt(e.target.value);
  syncSliders(brushSize,brushOpacity,brushSmoothing);
});

// ==================== Tool Selection ====================
function selectTool(tool){
  currentTool=tool;
  document.querySelectorAll('.tool-btn').forEach(b=>b.classList.toggle('active',b.dataset.tool===tool));
  // Sync brush grid
  const brushMap={pen:'pen',pencil:'pencil',marker:'marker',watercolor:'water',calligraphy:'calli',airbrush:'air',eraser:'eraser',fill:'fill'};
  document.querySelectorAll('.brush-opt').forEach(b=>b.classList.toggle('active',b.dataset.brush===brushMap[tool]));
  // Update cursor
  mainCanvas.style.cursor=tool==='eyedropper'?'crosshair':tool==='fill'?'crosshair':'crosshair';
}

document.querySelectorAll('.tool-btn[data-tool]').forEach(btn=>{
  btn.addEventListener('click',()=>selectTool(btn.dataset.tool));
});
document.querySelectorAll('.brush-opt[data-brush]').forEach(btn=>{
  const map={pen:'pen',pencil:'pencil',marker:'marker',water:'watercolor',calli:'calligraphy',air:'airbrush',eraser:'eraser',fill:'fill'};
  btn.addEventListener('click',()=>selectTool(map[btn.dataset.brush]||'pen'));
});

// ==================== Top Bar Actions ====================
document.getElementById('btnUndo').addEventListener('click',undo);
document.getElementById('btnRedo').addEventListener('click',redo);

document.getElementById('btnNew').addEventListener('click',()=>{
  if(!confirm('Start a new canvas? Unsaved work will be lost.'))return;
  undoStack=[];redoStack=[];
  initLayers();
});

document.getElementById('btnSave').addEventListener('click',()=>{
  // Flatten and download
  const c=document.createElement('canvas');
  c.width=canvasW;c.height=canvasH;
  const ctx=c.getContext('2d');
  for(const layer of layers){
    if(!layer.visible)continue;
    ctx.globalAlpha=layer.opacity/100;
    ctx.drawImage(layer.canvas,0,0);
  }
  ctx.globalAlpha=1;
  const link=document.createElement('a');
  link.download='painting.png';
  link.href=c.toDataURL('image/png');
  link.click();
});

document.getElementById('btnLoad').addEventListener('click',()=>{
  document.getElementById('fileLoad').click();
});

document.getElementById('fileLoad').addEventListener('change',e=>{
  const file=e.target.files[0];
  if(!file)return;
  const img=new Image();
  img.onload=()=>{
    saveState();
    const ctx=activeLayer().ctx;
    ctx.drawImage(img,0,0,canvasW,canvasH);
    renderLayers();
  };
  img.src=URL.createObjectURL(file);
  e.target.value='';
});

document.getElementById('btnClearLayer').addEventListener('click',()=>{
  saveState();
  activeLayer().ctx.clearRect(0,0,canvasW,canvasH);
  renderLayers();
});

// Mobile panel toggle
const toggleBtn=document.getElementById('btnTogglePanel');
if(window.innerWidth<=600)toggleBtn.style.display='inline-flex';
toggleBtn.addEventListener('click',()=>{
  document.getElementById('rightPanel').classList.toggle('show');
});

// ==================== Keyboard Shortcuts ====================
document.addEventListener('keydown',e=>{
  if(e.target.tagName==='INPUT')return;
  const mod=e.metaKey||e.ctrlKey;
  if(mod&&e.key==='z'&&!e.shiftKey){e.preventDefault();undo()}
  else if(mod&&e.key==='z'&&e.shiftKey){e.preventDefault();redo()}
  else if(mod&&e.key==='s'){e.preventDefault();document.getElementById('btnSave').click()}
  else if(e.key==='b')selectTool('pen');
  else if(e.key==='p')selectTool('pencil');
  else if(e.key==='m')selectTool('marker');
  else if(e.key==='w')selectTool('watercolor');
  else if(e.key==='a')selectTool('airbrush');
  else if(e.key==='c')selectTool('calligraphy');
  else if(e.key==='e')selectTool('eraser');
  else if(e.key==='l')selectTool('line');
  else if(e.key==='r')selectTool('rect');
  else if(e.key==='o')selectTool('ellipse');
  else if(e.key==='g')selectTool('fill');
  else if(e.key==='i')selectTool('eyedropper');
  else if(e.key==='['){brushSize=Math.max(1,brushSize-2);syncSliders(brushSize,brushOpacity,brushSmoothing)}
  else if(e.key===']'){brushSize=Math.min(100,brushSize+2);syncSliders(brushSize,brushOpacity,brushSmoothing)}
});

// ==================== Resize Canvas Display ====================
function fitCanvas(){
  const area=canvasArea;
  const aw=area.clientWidth-20;
  const ah=area.clientHeight-20;
  const scale=Math.min(aw/canvasW,ah/canvasH,1);
  mainCanvas.style.width=(canvasW*scale)+'px';
  mainCanvas.style.height=(canvasH*scale)+'px';
}

window.addEventListener('resize',fitCanvas);

// ==================== Init ====================
initLayers();
renderSwatches();
renderRecentColors();
fitCanvas();
syncSliders(brushSize,brushOpacity,brushSmoothing);
document.getElementById('canvasInfo').textContent=`${canvasW} × ${canvasH}`;

</script>
</body>
