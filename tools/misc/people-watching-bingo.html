<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="description" content="People Watching Bingo | Korb Engineering — a playful 5x5 bingo card for spotting classic people-watching moments. Customize your own pool, share cards, track streaks.">
<meta name="theme-color" content="#050a0f">
<title>People Watching Bingo | Korb Engineering</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@300;400;500;600&family=JetBrains+Mono:wght@400;500;600;700&family=Orbitron:wght@600;800&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --bg: #050a0f;
  --panel: #0a1018;
  --panel-2: #0d1a24;
  --border: #1a2535;
  --cyan: #00d4ff;
  --orange: #ff9900;
  --green: #10b981;
  --red: #ef4444;
  --gold: #ffb800;
  --text: #e2e8f0;
  --dim: #64748b;
  --font-body: 'IBM Plex Mono', monospace;
  --font-mono: 'JetBrains Mono', monospace;
  --font-display: 'Orbitron', sans-serif;
}

html, body { background: var(--bg); color: var(--text); }
body {
  font-family: var(--font-body);
  min-height: 100vh;
  padding: 56px 12px 40px;
  overflow-x: hidden;
  -webkit-font-smoothing: antialiased;
  background:
    radial-gradient(1200px 600px at 50% -200px, rgba(0,212,255,0.06), transparent 60%),
    radial-gradient(800px 400px at 80% 90%, rgba(255,184,0,0.04), transparent 60%),
    var(--bg);
}

a.back {
  position: fixed;
  top: 10px; left: 10px;
  display: inline-block;
  color: var(--cyan);
  text-decoration: none;
  font-family: var(--font-mono);
  font-size: 11px; letter-spacing: 2px;
  padding: 6px 10px;
  border: 1px solid var(--border);
  border-radius: 3px;
  background: rgba(10,16,24,0.85);
  backdrop-filter: blur(6px);
  z-index: 50;
}
a.back:hover { background: rgba(0,212,255,0.08); border-color: var(--cyan); }

.wrap { max-width: 900px; margin: 0 auto; }

header {
  text-align: center;
  padding: 18px 8px 14px;
  border-bottom: 1px solid var(--border);
  margin-bottom: 18px;
}
h1 {
  font-family: var(--font-display);
  font-weight: 800;
  font-size: clamp(22px, 5.5vw, 38px);
  letter-spacing: 3px;
  color: var(--gold);
  text-shadow: 0 0 18px rgba(255,184,0,0.35), 0 0 3px rgba(255,184,0,0.6);
}
.tagline {
  margin-top: 6px;
  font-size: 11px;
  letter-spacing: 3px;
  color: var(--dim);
  text-transform: uppercase;
}

.toolbar {
  display: flex; flex-wrap: wrap;
  gap: 8px;
  justify-content: center;
  margin-bottom: 14px;
}
.btn {
  background: var(--panel);
  color: var(--text);
  border: 1px solid var(--border);
  font-family: var(--font-mono);
  font-size: 12px;
  letter-spacing: 1.5px;
  text-transform: uppercase;
  padding: 10px 14px;
  min-height: 44px;
  border-radius: 4px;
  cursor: pointer;
  transition: all 0.15s ease;
  user-select: none;
}
.btn:hover { border-color: var(--cyan); color: var(--cyan); background: rgba(0,212,255,0.06); }
.btn.primary { border-color: var(--cyan); color: var(--cyan); }
.btn.primary:hover { background: rgba(0,212,255,0.1); }
.btn.warn { border-color: var(--orange); color: var(--orange); }
.btn.warn:hover { background: rgba(255,153,0,0.08); }
.btn.danger { border-color: var(--red); color: var(--red); }
.btn.danger:hover { background: rgba(239,68,68,0.08); }
.btn.good { border-color: var(--green); color: var(--green); }
.btn.good:hover { background: rgba(16,185,129,0.08); }

.tabs {
  display: flex; gap: 4px;
  justify-content: center;
  margin-bottom: 14px;
  flex-wrap: wrap;
}
.tab {
  background: var(--panel);
  border: 1px solid var(--border);
  color: var(--dim);
  font-family: var(--font-mono);
  font-size: 11px;
  letter-spacing: 1.5px;
  padding: 8px 12px;
  min-height: 40px;
  min-width: 80px;
  border-radius: 4px;
  cursor: pointer;
  transition: all 0.15s;
  display: flex; align-items: center; justify-content: center;
  gap: 6px;
}
.tab.active { border-color: var(--cyan); color: var(--cyan); background: rgba(0,212,255,0.06); }
.tab .x {
  font-size: 14px; color: var(--dim); line-height: 1;
  padding: 0 2px;
}
.tab .x:hover { color: var(--red); }
.tab-add {
  background: transparent;
  border: 1px dashed var(--border);
  color: var(--dim);
}
.tab-add:hover { border-color: var(--green); color: var(--green); }

/* Bingo grid */
.board {
  background: var(--panel);
  border: 1px solid var(--border);
  border-radius: 8px;
  padding: 10px;
  box-shadow: 0 0 0 1px rgba(0,212,255,0.03) inset, 0 10px 30px rgba(0,0,0,0.35);
}

.grid {
  display: grid;
  grid-template-columns: repeat(5, 1fr);
  gap: 6px;
  aspect-ratio: 1 / 1;
  max-width: 100%;
}

.cell {
  position: relative;
  background: var(--panel-2);
  border: 1px solid var(--border);
  border-radius: 6px;
  color: var(--text);
  font-family: var(--font-mono);
  font-size: 10px;
  line-height: 1.2;
  font-weight: 500;
  display: flex; align-items: center; justify-content: center;
  text-align: center;
  padding: 4px;
  cursor: pointer;
  overflow: hidden;
  -webkit-tap-highlight-color: transparent;
  transition: transform 0.08s ease, border-color 0.15s ease, background 0.15s ease;
  word-break: break-word;
  hyphens: auto;
}
.cell:active { transform: scale(0.96); }
.cell.marked {
  border-color: var(--green);
  background: rgba(16,185,129,0.08);
  color: var(--green);
}
.cell.free {
  border-color: var(--gold);
  background: rgba(255,184,0,0.08);
  color: var(--gold);
  font-family: var(--font-display);
  letter-spacing: 2px;
  font-weight: 800;
  font-size: 11px;
}
.cell.win {
  border-color: var(--gold) !important;
  background: rgba(255,184,0,0.18) !important;
  color: var(--gold) !important;
  animation: winPulse 1.2s ease-in-out infinite;
}

@keyframes winPulse {
  0%, 100% { box-shadow: 0 0 0 0 rgba(255,184,0,0.5); }
  50% { box-shadow: 0 0 14px 3px rgba(255,184,0,0.35); }
}

/* Stamp animation */
.stamp {
  position: absolute; inset: 0;
  display: flex; align-items: center; justify-content: center;
  pointer-events: none;
  opacity: 0;
}
.cell.marked .stamp {
  animation: stampDrop 0.38s cubic-bezier(0.2,1.3,0.4,1) forwards;
}
.stamp svg { width: 60%; height: 60%; opacity: 0.85; }
@keyframes stampDrop {
  0% { opacity: 0; transform: scale(2.2) rotate(-18deg); }
  60% { opacity: 1; transform: scale(0.92) rotate(-6deg); }
  100% { opacity: 1; transform: scale(1) rotate(-8deg); }
}

/* Stats */
.stats {
  display: grid;
  grid-template-columns: repeat(3, 1fr);
  gap: 8px;
  margin: 14px 0;
}
.stat {
  background: var(--panel);
  border: 1px solid var(--border);
  border-radius: 6px;
  padding: 10px 8px;
  text-align: center;
}
.stat .num {
  font-family: var(--font-mono);
  font-size: 22px;
  color: var(--cyan);
  font-weight: 700;
  line-height: 1;
}
.stat .lbl {
  font-size: 9px;
  letter-spacing: 1.8px;
  color: var(--dim);
  text-transform: uppercase;
  margin-top: 4px;
}

/* Pool editor */
.editor {
  background: var(--panel);
  border: 1px solid var(--border);
  border-radius: 8px;
  padding: 14px;
  margin-top: 16px;
  display: none;
}
.editor.open { display: block; }
.editor h2 {
  font-family: var(--font-display);
  font-size: 15px;
  letter-spacing: 2px;
  color: var(--cyan);
  margin-bottom: 8px;
}
.editor .meta {
  font-size: 11px;
  color: var(--dim);
  margin-bottom: 10px;
  font-family: var(--font-mono);
}
.editor textarea {
  width: 100%;
  min-height: 240px;
  background: var(--panel-2);
  border: 1px solid var(--border);
  color: var(--text);
  font-family: var(--font-mono);
  font-size: 12px;
  line-height: 1.5;
  padding: 10px;
  border-radius: 4px;
  resize: vertical;
  outline: none;
}
.editor textarea:focus { border-color: var(--cyan); }
.editor .hint {
  font-size: 10px;
  color: var(--dim);
  margin-top: 6px;
  font-family: var(--font-mono);
}
.editor .actions {
  margin-top: 10px;
  display: flex; gap: 8px; flex-wrap: wrap;
}

/* Toast / overlay */
#overlay {
  position: fixed; inset: 0;
  display: none;
  align-items: center; justify-content: center;
  background: rgba(5,10,15,0.72);
  z-index: 100;
  pointer-events: none;
}
#overlay.on { display: flex; pointer-events: auto; }
.banner {
  background: linear-gradient(180deg, rgba(255,184,0,0.18), rgba(255,153,0,0.06));
  border: 2px solid var(--gold);
  border-radius: 12px;
  padding: 22px 30px;
  text-align: center;
  box-shadow: 0 0 40px rgba(255,184,0,0.35);
  animation: bannerIn 0.4s cubic-bezier(0.2,1.3,0.4,1);
}
.banner h2 {
  font-family: var(--font-display);
  font-weight: 800;
  font-size: clamp(40px, 12vw, 82px);
  letter-spacing: 8px;
  color: var(--gold);
  text-shadow: 0 0 24px rgba(255,184,0,0.7);
}
.banner p { color: var(--text); font-size: 13px; margin-top: 6px; letter-spacing: 2px; }
.banner .btn { margin-top: 14px; }
@keyframes bannerIn {
  0% { opacity: 0; transform: scale(0.7); }
  100% { opacity: 1; transform: scale(1); }
}

#confetti {
  position: fixed; inset: 0;
  pointer-events: none;
  z-index: 99;
}

/* Toast */
.toast {
  position: fixed;
  bottom: 16px; left: 50%;
  transform: translateX(-50%) translateY(80px);
  background: var(--panel);
  border: 1px solid var(--cyan);
  color: var(--cyan);
  font-family: var(--font-mono);
  font-size: 12px;
  letter-spacing: 1.5px;
  padding: 10px 16px;
  border-radius: 4px;
  z-index: 200;
  transition: transform 0.3s ease;
  text-transform: uppercase;
}
.toast.show { transform: translateX(-50%) translateY(0); }

footer {
  margin-top: 24px;
  text-align: center;
  color: var(--dim);
  font-size: 10px;
  letter-spacing: 2px;
  font-family: var(--font-mono);
}

/* Responsive tweaks */
@media (min-width: 600px) {
  .cell { font-size: 12px; padding: 6px; }
  .cell.free { font-size: 14px; }
}
@media (min-width: 800px) {
  .cell { font-size: 13px; }
}
@media (max-width: 380px) {
  .cell { font-size: 9px; padding: 2px; }
  .cell.free { font-size: 10px; }
  h1 { font-size: 20px; letter-spacing: 2px; }
}
</style>
</head>
<body>

<a href="../../index.html#misc" class="back" target="_parent">&larr; BACK</a>

<div class="wrap">
  <header>
    <h1>PEOPLE WATCHING BINGO</h1>
    <div class="tagline">spot &middot; stamp &middot; shout bingo</div>
  </header>

  <div class="toolbar">
    <button class="btn primary" id="newCardBtn">New Card</button>
    <button class="btn" id="shareBtn">Share Card</button>
    <button class="btn warn" id="editBtn">Edit Pool</button>
    <button class="btn" id="resetStatsBtn">Reset Stats</button>
  </div>

  <div class="tabs" id="tabs"></div>

  <div class="stats">
    <div class="stat"><div class="num" id="statGames">0</div><div class="lbl">Games</div></div>
    <div class="stat"><div class="num" id="statBingos">0</div><div class="lbl">Bingos</div></div>
    <div class="stat"><div class="num" id="statStreak">0</div><div class="lbl">Streak</div></div>
  </div>

  <div class="board">
    <div class="grid" id="grid"></div>
  </div>

  <div class="editor" id="editor">
    <h2>EDIT POOL</h2>
    <div class="meta" id="poolMeta">0 events in pool</div>
    <textarea id="poolText" spellcheck="false" placeholder="One event per line..."></textarea>
    <div class="hint">One event per line. Blank lines ignored. Minimum 24 events to generate a card.</div>
    <div class="actions">
      <button class="btn good" id="savePoolBtn">Save Pool</button>
      <button class="btn" id="resetPoolBtn">Reset to Defaults</button>
      <button class="btn danger" id="closeEditorBtn">Close</button>
    </div>
  </div>

  <footer>KORB ENGINEERING &middot; TOOLS &middot; MISC</footer>
</div>

<div id="overlay"><div class="banner" id="banner">
  <h2>BINGO!</h2>
  <p id="bannerSub">A masterful display of observation.</p>
  <button class="btn primary" id="closeBannerBtn">Continue</button>
</div></div>
<canvas id="confetti"></canvas>
<div class="toast" id="toast">Saved</div>

<script>
(function(){
  'use strict';

  // ---------- Defaults ----------
  const DEFAULT_POOL = [
    "Person on phone ignoring their date",
    "Yoga pants but no yoga",
    "Lost airpod",
    "Pigeon steals a french fry",
    "Loud phone caller on speaker",
    "Someone actually reading a physical book",
    "Stroller traffic jam",
    "Identical twin outfits (accidentally)",
    "Dog wearing a sweater",
    "Influencer photoshoot with ring light",
    "Matching Patagonia fleeces",
    "Guy with unnecessarily large water bottle",
    "Person doing 'gym' routine in public",
    "Sunglasses indoors",
    "Mom yelling 'TIMMY GET OVER HERE'",
    "Someone talking to themselves",
    "Person typing furiously on laptop",
    "Dog tries to eat something off sidewalk",
    "Street musician playing Wonderwall",
    "Ice cream casualty",
    "Cargo shorts with dress shoes",
    "Socks with sandals",
    "Someone on a scooter going way too fast",
    "Serious family argument in public",
    "Person vaping a cloud the size of a building",
    "Group photo with at least 3 retakes",
    "'Is this seat taken?'",
    "Toddler having a full meltdown",
    "'Sir, this is a Wendy's' energy",
    "Pigeon staging a coup",
    "Couple with matching phones",
    "Abandoned shopping cart",
    "Rogue balloon",
    "Someone narrating a video to themselves",
    "Lost tourist asking for directions",
    "Person jaywalking with confidence",
    "Someone overdressed for the occasion",
    "Someone underdressed for the occasion",
    "Person sitting on a pile of luggage",
    "Bluetooth-shouting a business call",
    "Drop-your-phone moment",
    "Coffee spill",
    "Dad chasing a runaway kid",
    "Two dogs barking at each other",
    "Delivery rider dodging traffic",
    "Sneezing into an elbow aggressively",
    "Someone feeding pigeons on purpose",
    "Very dramatic yawn"
  ];

  const K = {
    pool:  'korb_pwbingo_pool',
    state: 'korb_pwbingo_state',
    stats: 'korb_pwbingo_stats',
    activeTab: 'korb_pwbingo_activetab'
  };

  // ---------- Storage helpers ----------
  function loadJSON(key, fallback){
    try { const v = localStorage.getItem(key); return v ? JSON.parse(v) : fallback; }
    catch(e){ return fallback; }
  }
  function saveJSON(key, val){
    try { localStorage.setItem(key, JSON.stringify(val)); } catch(e){}
  }

  // ---------- State ----------
  let pool = loadJSON(K.pool, null) || DEFAULT_POOL.slice();
  let stats = loadJSON(K.stats, { games: 0, bingos: 0, streak: 0, lastWas: null });
  let cards = loadJSON(K.state, null); // [{ seed, cells:[24], marked:[bool*25], won:bool }]
  let activeTab = loadJSON(K.activeTab, 0) || 0;
  const MAX_CARDS = 4;

  if (!cards || !Array.isArray(cards) || cards.length === 0) {
    cards = [ makeCard() ];
    activeTab = 0;
    persistAll();
  }
  if (activeTab >= cards.length) activeTab = 0;

  // ---------- Seeded RNG (mulberry32) ----------
  function mulberry32(seed){
    return function(){
      seed |= 0; seed = seed + 0x6D2B79F5 | 0;
      let t = seed;
      t = Math.imul(t ^ t >>> 15, t | 1);
      t ^= t + Math.imul(t ^ t >>> 7, t | 61);
      return ((t ^ t >>> 14) >>> 0) / 4294967296;
    };
  }
  function seededShuffle(arr, seed){
    const rnd = mulberry32(seed);
    const a = arr.slice();
    for (let i = a.length - 1; i > 0; i--) {
      const j = Math.floor(rnd() * (i + 1));
      [a[i], a[j]] = [a[j], a[i]];
    }
    return a;
  }

  function makeCard(seed){
    if (seed === undefined) seed = (Math.random() * 0xFFFFFFFF) >>> 0;
    const localPool = pool.length >= 24 ? pool : pool.concat(DEFAULT_POOL).slice(0, Math.max(24, pool.length));
    const shuffled = seededShuffle(localPool, seed).slice(0, 24);
    const marked = new Array(25).fill(false);
    marked[12] = true; // free center
    return { seed: seed, cells: shuffled, marked: marked, won: false };
  }

  function persistAll(){
    saveJSON(K.state, cards);
    saveJSON(K.stats, stats);
    saveJSON(K.activeTab, activeTab);
  }

  // ---------- Render ----------
  const $grid = document.getElementById('grid');
  const $tabs = document.getElementById('tabs');
  const $statGames = document.getElementById('statGames');
  const $statBingos = document.getElementById('statBingos');
  const $statStreak = document.getElementById('statStreak');

  function currentCard(){ return cards[activeTab]; }

  function renderStats(){
    $statGames.textContent = stats.games;
    $statBingos.textContent = stats.bingos;
    $statStreak.textContent = stats.streak;
  }

  function renderTabs(){
    $tabs.innerHTML = '';
    cards.forEach((c, i) => {
      const t = document.createElement('button');
      t.className = 'tab' + (i === activeTab ? ' active' : '');
      t.dataset.idx = i;
      const label = document.createElement('span');
      label.textContent = 'Card ' + (i+1) + (c.won ? ' *' : '');
      t.appendChild(label);
      if (cards.length > 1) {
        const x = document.createElement('span');
        x.className = 'x';
        x.textContent = '\u00D7';
        x.title = 'Close card';
        x.addEventListener('click', (e) => {
          e.stopPropagation();
          closeCard(i);
        });
        t.appendChild(x);
      }
      t.addEventListener('click', () => {
        activeTab = i;
        persistAll();
        renderTabs();
        renderBoard();
      });
      $tabs.appendChild(t);
    });
    if (cards.length < MAX_CARDS) {
      const add = document.createElement('button');
      add.className = 'tab tab-add';
      add.textContent = '+ Add Card';
      add.addEventListener('click', () => {
        cards.push(makeCard());
        activeTab = cards.length - 1;
        stats.games++;
        persistAll();
        renderTabs();
        renderBoard();
        renderStats();
      });
      $tabs.appendChild(add);
    }
  }

  function closeCard(i){
    if (cards.length <= 1) return;
    cards.splice(i, 1);
    if (activeTab >= cards.length) activeTab = cards.length - 1;
    persistAll();
    renderTabs();
    renderBoard();
  }

  const STAMP_SVG = '<svg viewBox="0 0 64 64" xmlns="http://www.w3.org/2000/svg"><g transform="rotate(-8 32 32)" fill="none" stroke="#10b981" stroke-width="5" stroke-linecap="round" stroke-linejoin="round"><rect x="8" y="8" width="48" height="48" rx="4" opacity="0.6"/><path d="M16 32 L28 44 L48 20"/></g></svg>';

  function renderBoard(){
    const c = currentCard();
    $grid.innerHTML = '';
    const winLine = c.won ? detectWinLine(c.marked) : null;
    const winSet = new Set(winLine || []);
    for (let i = 0; i < 25; i++) {
      const cell = document.createElement('div');
      cell.className = 'cell';
      if (i === 12) cell.classList.add('free');
      if (c.marked[i]) cell.classList.add('marked');
      if (winSet.has(i)) cell.classList.add('win');
      cell.dataset.idx = i;
      if (i === 12) {
        cell.textContent = 'FREE';
      } else {
        const cellIdx = i < 12 ? i : i - 1;
        cell.textContent = c.cells[cellIdx] || '';
      }
      const stamp = document.createElement('div');
      stamp.className = 'stamp';
      stamp.innerHTML = STAMP_SVG;
      cell.appendChild(stamp);
      cell.addEventListener('click', onCellClick);
      $grid.appendChild(cell);
    }
  }

  function onCellClick(e){
    const i = parseInt(e.currentTarget.dataset.idx, 10);
    if (i === 12) return; // free
    const c = currentCard();
    c.marked[i] = !c.marked[i];
    e.currentTarget.classList.toggle('marked', c.marked[i]);
    if (c.marked[i]) playStamp();
    persistAll();
    checkBingo();
  }

  // ---------- Bingo detection ----------
  const LINES = (function(){
    const lines = [];
    for (let r = 0; r < 5; r++) {
      lines.push([r*5, r*5+1, r*5+2, r*5+3, r*5+4]);
    }
    for (let col = 0; col < 5; col++) {
      lines.push([col, col+5, col+10, col+15, col+20]);
    }
    lines.push([0,6,12,18,24]);
    lines.push([4,8,12,16,20]);
    return lines;
  })();

  function detectWinLine(marked){
    for (const line of LINES) {
      if (line.every(i => marked[i])) return line;
    }
    return null;
  }

  function checkBingo(){
    const c = currentCard();
    const line = detectWinLine(c.marked);
    if (line && !c.won) {
      c.won = true;
      stats.bingos++;
      stats.streak = (stats.lastWas === 'win' ? stats.streak + 1 : 1);
      stats.lastWas = 'win';
      persistAll();
      renderStats();
      renderTabs();
      renderBoard();
      celebrate();
    } else if (!line && c.won) {
      // user un-marked; clear won flag silently
      c.won = false;
      persistAll();
      renderTabs();
      renderBoard();
    }
  }

  // ---------- Audio beep ----------
  let audioCtx = null;
  function beep(freq, dur, type){
    try {
      if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
      const o = audioCtx.createOscillator();
      const g = audioCtx.createGain();
      o.type = type || 'sine';
      o.frequency.value = freq;
      g.gain.value = 0.0001;
      o.connect(g); g.connect(audioCtx.destination);
      const t = audioCtx.currentTime;
      g.gain.exponentialRampToValueAtTime(0.12, t + 0.01);
      g.gain.exponentialRampToValueAtTime(0.0001, t + dur);
      o.start(t); o.stop(t + dur + 0.02);
    } catch(e){}
  }
  function playStamp(){ beep(660, 0.08, 'square'); }
  function playBingo(){
    beep(523, 0.12, 'triangle');
    setTimeout(()=>beep(659, 0.12, 'triangle'), 110);
    setTimeout(()=>beep(784, 0.12, 'triangle'), 220);
    setTimeout(()=>beep(1046, 0.25, 'triangle'), 330);
  }

  // ---------- Confetti ----------
  const $confetti = document.getElementById('confetti');
  const cctx = $confetti.getContext('2d');
  function resizeConfetti(){ $confetti.width = innerWidth; $confetti.height = innerHeight; }
  addEventListener('resize', resizeConfetti);
  resizeConfetti();

  let particles = [];
  const COLORS = ['#ffb800','#ff9900','#00d4ff','#10b981','#e2e8f0'];
  function burstConfetti(n){
    for (let i = 0; i < n; i++) {
      particles.push({
        x: innerWidth / 2 + (Math.random() - 0.5) * 200,
        y: innerHeight / 2 + (Math.random() - 0.5) * 40,
        vx: (Math.random() - 0.5) * 10,
        vy: Math.random() * -12 - 4,
        g: 0.35 + Math.random() * 0.25,
        size: 4 + Math.random() * 6,
        color: COLORS[Math.floor(Math.random() * COLORS.length)],
        rot: Math.random() * Math.PI * 2,
        vrot: (Math.random() - 0.5) * 0.3,
        life: 180
      });
    }
  }
  let rafId = null;
  function tick(){
    cctx.clearRect(0, 0, $confetti.width, $confetti.height);
    particles = particles.filter(p => p.life > 0 && p.y < innerHeight + 40);
    for (const p of particles) {
      p.vy += p.g;
      p.x += p.vx; p.y += p.vy;
      p.rot += p.vrot;
      p.life--;
      cctx.save();
      cctx.translate(p.x, p.y);
      cctx.rotate(p.rot);
      cctx.fillStyle = p.color;
      cctx.fillRect(-p.size/2, -p.size/2, p.size, p.size * 0.55);
      cctx.restore();
    }
    if (particles.length > 0) rafId = requestAnimationFrame(tick);
    else { cctx.clearRect(0,0,$confetti.width,$confetti.height); rafId = null; }
  }

  function celebrate(){
    const $overlay = document.getElementById('overlay');
    $overlay.classList.add('on');
    playBingo();
    burstConfetti(120);
    if (!rafId) rafId = requestAnimationFrame(tick);
    // keep raining
    let extra = 0;
    const iv = setInterval(() => {
      burstConfetti(30);
      extra++;
      if (extra > 4) clearInterval(iv);
    }, 350);
  }

  document.getElementById('closeBannerBtn').addEventListener('click', () => {
    document.getElementById('overlay').classList.remove('on');
  });

  // ---------- Toast ----------
  const $toast = document.getElementById('toast');
  let toastT = null;
  function toast(msg){
    $toast.textContent = msg;
    $toast.classList.add('show');
    clearTimeout(toastT);
    toastT = setTimeout(() => $toast.classList.remove('show'), 1800);
  }

  // ---------- Buttons ----------
  document.getElementById('newCardBtn').addEventListener('click', () => {
    if (pool.length < 24) { toast('Need 24+ events in pool'); return; }
    cards[activeTab] = makeCard();
    stats.games++;
    if (stats.lastWas === 'loss') { /* keep streak logic simple */ }
    stats.lastWas = stats.lastWas === 'win' ? stats.lastWas : 'loss';
    // if previous card wasn't won, reset streak
    // simpler: streak resets if new card started without a win on the previous one
    persistAll();
    renderTabs(); renderBoard(); renderStats();
    toast('New card dealt');
  });

  document.getElementById('resetStatsBtn').addEventListener('click', () => {
    if (!confirm('Reset all stats?')) return;
    stats = { games: 0, bingos: 0, streak: 0, lastWas: null };
    persistAll();
    renderStats();
    toast('Stats reset');
  });

  document.getElementById('shareBtn').addEventListener('click', async () => {
    const c = currentCard();
    const url = location.origin + location.pathname + '?seed=' + c.seed;
    try {
      await navigator.clipboard.writeText(url);
      toast('Link copied');
    } catch(e) {
      prompt('Share this link:', url);
    }
  });

  // ---------- Editor ----------
  const $editor = document.getElementById('editor');
  const $poolText = document.getElementById('poolText');
  const $poolMeta = document.getElementById('poolMeta');

  function refreshPoolMeta(){
    const lines = $poolText.value.split('\n').map(s=>s.trim()).filter(Boolean);
    $poolMeta.textContent = lines.length + ' events in pool' + (lines.length < 24 ? ' (need 24+)' : '');
  }

  document.getElementById('editBtn').addEventListener('click', () => {
    $editor.classList.toggle('open');
    if ($editor.classList.contains('open')) {
      $poolText.value = pool.join('\n');
      refreshPoolMeta();
      $editor.scrollIntoView({ behavior: 'smooth', block: 'start' });
    }
  });
  $poolText.addEventListener('input', refreshPoolMeta);

  document.getElementById('savePoolBtn').addEventListener('click', () => {
    const lines = $poolText.value.split('\n').map(s=>s.trim()).filter(Boolean);
    const unique = [];
    const seen = new Set();
    for (const l of lines) {
      const k = l.toLowerCase();
      if (!seen.has(k)) { seen.add(k); unique.push(l); }
    }
    if (unique.length < 24) { toast('Need at least 24 events'); return; }
    pool = unique;
    saveJSON(K.pool, pool);
    toast('Pool saved (' + pool.length + ')');
    refreshPoolMeta();
  });

  document.getElementById('resetPoolBtn').addEventListener('click', () => {
    if (!confirm('Reset pool to defaults? Your custom events will be lost.')) return;
    pool = DEFAULT_POOL.slice();
    saveJSON(K.pool, pool);
    $poolText.value = pool.join('\n');
    refreshPoolMeta();
    toast('Pool reset');
  });

  document.getElementById('closeEditorBtn').addEventListener('click', () => {
    $editor.classList.remove('open');
  });

  // ---------- Share seed URL ----------
  (function handleSeedParam(){
    const params = new URLSearchParams(location.search);
    const seedRaw = params.get('seed');
    if (seedRaw) {
      const seed = parseInt(seedRaw, 10) >>> 0;
      if (!Number.isNaN(seed)) {
        // Insert as a new tab if we have room
        if (cards.length < MAX_CARDS) {
          cards.push(makeCard(seed));
          activeTab = cards.length - 1;
        } else {
          cards[activeTab] = makeCard(seed);
        }
        persistAll();
        // Clear the query param from the URL to avoid re-adding on refresh
        history.replaceState(null, '', location.pathname);
        setTimeout(() => toast('Shared card loaded'), 300);
      }
    }
  })();

  // ---------- Initial render ----------
  renderStats();
  renderTabs();
  renderBoard();

})();
</script>

</body>
</html>
