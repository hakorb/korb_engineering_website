<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Photo Forge — Korb Engineering</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #050a0f;
    --surface: #0a1018;
    --surface-2: #0e1520;
    --border: #1a2535;
    --cyan: #00d4ff;
    --orange: #ff6600;
    --green: #10b981;
    --red: #ef4444;
    --gold: #fbbf24;
    --text: #e2e8f0;
    --text-dim: #7a8a9a;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  html, body {
    background: var(--bg);
    color: var(--text);
    font-family: 'JetBrains Mono', monospace;
    font-size: 13px;
    height: 100%;
    overflow: hidden;
    -webkit-user-select: none;
    user-select: none;
    touch-action: manipulation;
  }
  input, select, textarea, button {
    font-family: 'JetBrains Mono', monospace;
    font-size: 16px;
    color: var(--text);
  }
  button {
    background: var(--surface-2);
    border: 1px solid var(--border);
    color: var(--text);
    padding: 6px 10px;
    cursor: pointer;
    min-height: 32px;
    transition: all 0.15s;
    font-size: 12px;
  }
  button:hover { border-color: var(--cyan); color: var(--cyan); }
  button.active { background: var(--cyan); color: var(--bg); border-color: var(--cyan); }
  input[type="range"], select {
    background: var(--bg);
    border: 1px solid var(--border);
    color: var(--text);
    padding: 4px 6px;
    font-size: 12px;
    min-height: 28px;
  }
  /* Text-entry fields use 16px+ so iOS does not zoom on focus */
  input[type="number"], input[type="text"] {
    background: var(--bg);
    border: 1px solid var(--border);
    color: var(--text);
    padding: 4px 6px;
    font-size: 16px;
    min-height: 28px;
  }
  input[type="color"] {
    background: var(--bg);
    border: 1px solid var(--border);
    width: 36px;
    height: 28px;
    cursor: pointer;
  }
  input[type="range"] { padding: 0; height: 22px; }
  label { font-size: 11px; color: var(--text-dim); text-transform: uppercase; letter-spacing: 0.5px; }
  .app {
    display: grid;
    grid-template-rows: 32px 36px 1fr 24px;
    grid-template-columns: 52px 1fr 240px;
    grid-template-areas:
      "menu menu menu"
      "options options options"
      "tools canvas right"
      "status status status";
    height: 100vh;
    width: 100vw;
    overflow: hidden;
  }
  /* MENU BAR */
  .menubar {
    grid-area: menu;
    background: var(--surface);
    border-bottom: 1px solid var(--border);
    display: flex;
    align-items: center;
    padding: 0 8px;
    gap: 2px;
    overflow-x: auto;
  }
  .menubar .brand {
    color: var(--cyan);
    font-weight: 700;
    font-size: 12px;
    margin-right: 12px;
    letter-spacing: 1px;
    white-space: nowrap;
  }
  .menu-item {
    position: relative;
    padding: 6px 10px;
    font-size: 12px;
    cursor: pointer;
    border-radius: 2px;
    white-space: nowrap;
  }
  .menu-item:hover { background: var(--surface-2); color: var(--cyan); }
  .menu-item.open { background: var(--surface-2); color: var(--cyan); }
  .menu-dropdown {
    position: absolute;
    top: 100%;
    left: 0;
    background: var(--surface);
    border: 1px solid var(--border);
    min-width: 220px;
    z-index: 1000;
    display: none;
    box-shadow: 0 8px 24px rgba(0,0,0,0.8);
  }
  .menu-item.open .menu-dropdown { display: block; }
  .menu-dropdown button {
    display: block;
    width: 100%;
    text-align: left;
    background: none;
    border: none;
    padding: 8px 12px;
    font-size: 12px;
    border-bottom: 1px solid var(--border);
    min-height: 36px;
  }
  .menu-dropdown button:hover { background: var(--surface-2); color: var(--cyan); }
  .menu-dropdown button:last-child { border-bottom: none; }
  .menu-dropdown .shortcut { float: right; color: var(--text-dim); font-size: 10px; }
  .menu-dropdown .sep { height: 1px; background: var(--border); margin: 4px 0; }

  /* OPTIONS BAR */
  .optionsbar {
    grid-area: options;
    background: var(--surface-2);
    border-bottom: 1px solid var(--border);
    display: flex;
    align-items: center;
    padding: 0 10px;
    gap: 10px;
    overflow-x: auto;
    white-space: nowrap;
  }
  .optionsbar .tool-title { color: var(--orange); font-weight: 600; font-size: 11px; text-transform: uppercase; min-width: 90px; }
  .optionsbar .opt-group { display: flex; align-items: center; gap: 6px; }
  .optionsbar .opt-group label { font-size: 10px; }
  .optionsbar input[type="number"] { width: 56px; }
  .optionsbar input[type="range"] { width: 100px; }

  /* TOOL PALETTE */
  .tools {
    grid-area: tools;
    background: var(--surface);
    border-right: 1px solid var(--border);
    display: flex;
    flex-direction: column;
    padding: 4px;
    gap: 2px;
    overflow-y: auto;
  }
  .tool-btn {
    width: 44px;
    height: 44px;
    min-height: 44px;
    background: var(--surface-2);
    border: 1px solid var(--border);
    color: var(--text);
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 14px;
    position: relative;
  }
  .tool-btn:hover { border-color: var(--cyan); color: var(--cyan); }
  .tool-btn.active { background: var(--cyan); color: var(--bg); border-color: var(--cyan); box-shadow: 0 0 8px rgba(0, 212, 255, 0.5); }
  .tool-btn .tip {
    position: absolute;
    left: 52px;
    top: 50%;
    transform: translateY(-50%);
    background: var(--surface);
    border: 1px solid var(--cyan);
    color: var(--cyan);
    padding: 4px 8px;
    font-size: 10px;
    white-space: nowrap;
    pointer-events: none;
    opacity: 0;
    transition: opacity 0.15s;
    z-index: 500;
  }
  .tool-btn:hover .tip { opacity: 1; }
  .color-swatches {
    margin-top: 6px;
    display: flex;
    flex-direction: column;
    gap: 4px;
    align-items: center;
  }
  .swatch-stack {
    position: relative;
    width: 40px;
    height: 40px;
  }
  .swatch {
    position: absolute;
    width: 24px;
    height: 24px;
    border: 2px solid var(--border);
    cursor: pointer;
  }
  .swatch.fg { top: 0; left: 0; z-index: 2; }
  .swatch.bg { bottom: 0; right: 0; z-index: 1; }

  /* CANVAS AREA */
  .canvas-area {
    grid-area: canvas;
    position: relative;
    background:
      linear-gradient(45deg, #0a0e14 25%, transparent 25%),
      linear-gradient(-45deg, #0a0e14 25%, transparent 25%),
      linear-gradient(45deg, transparent 75%, #0a0e14 75%),
      linear-gradient(-45deg, transparent 75%, #0a0e14 75%);
    background-size: 20px 20px;
    background-position: 0 0, 0 10px, 10px -10px, -10px 0;
    background-color: #060a10;
    overflow: hidden;
  }
  .canvas-wrap {
    position: absolute;
    top: 50%;
    left: 50%;
    transform-origin: center center;
    box-shadow: 0 0 0 1px var(--border), 0 0 40px rgba(0, 212, 255, 0.08);
    background: #000;
  }
  .canvas-wrap canvas {
    display: block;
    position: absolute;
    top: 0;
    left: 0;
    image-rendering: pixelated;
  }
  #interactionCanvas { pointer-events: auto; cursor: crosshair; z-index: 9999; }
  .drop-hint {
    position: absolute;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
    color: var(--text-dim);
    font-size: 14px;
    text-align: center;
    pointer-events: none;
    letter-spacing: 1px;
  }
  .drop-hint .big { color: var(--cyan); font-size: 24px; font-weight: 700; margin-bottom: 10px; display: block; }
  .drop-hint .hint-line { margin: 4px 0; }

  /* RIGHT PANELS */
  .right-panel {
    grid-area: right;
    background: var(--surface);
    border-left: 1px solid var(--border);
    display: flex;
    flex-direction: column;
    overflow: hidden;
  }
  .panel {
    border-bottom: 1px solid var(--border);
    display: flex;
    flex-direction: column;
    min-height: 0;
  }
  .panel-header {
    background: var(--surface-2);
    padding: 6px 10px;
    font-size: 10px;
    color: var(--cyan);
    text-transform: uppercase;
    letter-spacing: 1px;
    border-bottom: 1px solid var(--border);
    display: flex;
    justify-content: space-between;
    align-items: center;
    cursor: pointer;
  }
  .panel-header .toggle { color: var(--text-dim); font-size: 9px; }
  .panel-body {
    padding: 6px;
    overflow-y: auto;
    max-height: 260px;
    font-size: 11px;
  }
  .panel.collapsed .panel-body { display: none; }
  .layer-controls, .history-controls {
    display: flex;
    gap: 4px;
    padding: 4px 6px;
    border-bottom: 1px solid var(--border);
    background: var(--surface-2);
  }
  .layer-controls button, .history-controls button { padding: 3px 6px; min-height: 26px; font-size: 10px; }
  .layer-item, .history-item {
    display: flex;
    align-items: center;
    padding: 4px 6px;
    border: 1px solid transparent;
    cursor: pointer;
    gap: 6px;
    font-size: 11px;
  }
  .layer-item:hover, .history-item:hover { background: var(--surface-2); }
  .layer-item.active { border-color: var(--cyan); background: rgba(0, 212, 255, 0.08); }
  .layer-thumb {
    width: 32px;
    height: 32px;
    border: 1px solid var(--border);
    background: #000;
    flex-shrink: 0;
    background-image:
      linear-gradient(45deg, #222 25%, transparent 25%),
      linear-gradient(-45deg, #222 25%, transparent 25%),
      linear-gradient(45deg, transparent 75%, #222 75%),
      linear-gradient(-45deg, transparent 75%, #222 75%);
    background-size: 8px 8px;
    background-position: 0 0, 0 4px, 4px -4px, -4px 0;
  }
  .layer-name { flex: 1; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
  .layer-vis { cursor: pointer; color: var(--text-dim); width: 16px; text-align: center; }
  .layer-vis.on { color: var(--cyan); }
  .history-item { font-size: 10px; color: var(--text-dim); }
  .history-item.current { color: var(--cyan); font-weight: 600; }

  .blend-row { display: flex; gap: 4px; padding: 4px 6px; align-items: center; }
  .blend-row select { flex: 1; }
  .opacity-row { padding: 4px 6px; display: flex; align-items: center; gap: 6px; }
  .opacity-row input[type="range"] { flex: 1; }
  .opacity-row span { width: 32px; text-align: right; font-size: 10px; color: var(--cyan); }

  /* STATUS BAR */
  .statusbar {
    grid-area: status;
    background: var(--surface);
    border-top: 1px solid var(--border);
    display: flex;
    align-items: center;
    padding: 0 10px;
    gap: 14px;
    font-size: 10px;
    color: var(--text-dim);
  }
  .statusbar .st-cyan { color: var(--cyan); }
  .statusbar .st-orange { color: var(--orange); }
  .statusbar .st-green { color: var(--green); }
  .statusbar .sep { color: var(--border); }

  /* MODAL */
  .modal-backdrop {
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.85);
    display: none;
    align-items: center;
    justify-content: center;
    z-index: 5000;
  }
  .modal-backdrop.show { display: flex; }
  .modal {
    background: var(--surface);
    border: 1px solid var(--cyan);
    padding: 20px;
    min-width: 320px;
    max-width: 90vw;
    max-height: 90vh;
    overflow-y: auto;
    box-shadow: 0 0 40px rgba(0, 212, 255, 0.3);
  }
  .modal h3 {
    color: var(--cyan);
    font-size: 14px;
    margin-bottom: 14px;
    text-transform: uppercase;
    letter-spacing: 1px;
  }
  .modal .row { margin-bottom: 12px; display: flex; align-items: center; gap: 10px; }
  .modal .row label { flex: 0 0 110px; }
  .modal .row input, .modal .row select { flex: 1; }
  .modal .actions { display: flex; gap: 8px; justify-content: flex-end; margin-top: 16px; }
  .modal .actions button { min-width: 80px; }
  .modal .actions button.primary { background: var(--cyan); color: var(--bg); border-color: var(--cyan); font-weight: 700; }
  .modal canvas.curveCanvas {
    width: 100%;
    height: 200px;
    background: #000;
    border: 1px solid var(--border);
    cursor: crosshair;
  }

  /* BRUSH CURSOR */
  .brush-cursor {
    position: absolute;
    border: 1px solid var(--cyan);
    border-radius: 50%;
    pointer-events: none;
    mix-blend-mode: difference;
    z-index: 10000;
    transform: translate(-50%, -50%);
    box-shadow: 0 0 0 1px rgba(0,0,0,0.5);
  }

  /* COLOR PICKER */
  .cp-saturation {
    position: relative;
    width: 100%;
    height: 140px;
    background: linear-gradient(to top, #000, transparent), linear-gradient(to right, #fff, hsl(0,100%,50%));
    cursor: crosshair;
    margin-bottom: 8px;
  }
  .cp-hue {
    position: relative;
    width: 100%;
    height: 20px;
    background: linear-gradient(to right, #f00, #ff0, #0f0, #0ff, #00f, #f0f, #f00);
    cursor: crosshair;
    margin-bottom: 8px;
  }
  .cp-dot {
    position: absolute;
    width: 12px;
    height: 12px;
    border: 2px solid #fff;
    border-radius: 50%;
    transform: translate(-50%, -50%);
    pointer-events: none;
    box-shadow: 0 0 0 1px #000;
  }
  .cp-hue-dot {
    position: absolute;
    width: 4px;
    height: 100%;
    background: transparent;
    border: 2px solid #fff;
    transform: translateX(-50%);
    pointer-events: none;
    box-shadow: 0 0 0 1px #000;
  }
  .cp-preview { width: 40px; height: 40px; border: 1px solid var(--border); }
  .cp-swatches { display: grid; grid-template-columns: repeat(8, 1fr); gap: 3px; margin-top: 10px; }
  .cp-swatches div {
    aspect-ratio: 1;
    border: 1px solid var(--border);
    cursor: pointer;
  }

  /* MOBILE */
  @media (max-width: 900px) {
    .app {
      grid-template-columns: 44px 1fr 0;
      grid-template-areas:
        "menu menu menu"
        "options options options"
        "tools canvas canvas"
        "status status status";
    }
    .right-panel { display: none; }
    .tool-btn { width: 38px; height: 38px; min-height: 38px; }
    .menu-dropdown { min-width: 180px; }
  }

  ::-webkit-scrollbar { width: 8px; height: 8px; }
  ::-webkit-scrollbar-track { background: var(--bg); }
  ::-webkit-scrollbar-thumb { background: var(--border); }
  ::-webkit-scrollbar-thumb:hover { background: var(--cyan); }
</style>
</head>
<body>
<div class="app" id="app">
  <!-- MENU BAR -->
  <div class="menubar" id="menubar">
    <div class="brand">◆ PHOTO FORGE</div>
    <div class="menu-item" data-menu="file">File
      <div class="menu-dropdown">
        <button data-act="new">New… <span class="shortcut">Ctrl+N</span></button>
        <button data-act="open">Open… <span class="shortcut">Ctrl+O</span></button>
        <button data-act="paste">Paste From Clipboard <span class="shortcut">Ctrl+V</span></button>
        <div class="sep"></div>
        <button data-act="save-png">Save as PNG <span class="shortcut">Ctrl+S</span></button>
        <button data-act="save-jpg">Save as JPG</button>
        <button data-act="save-webp">Save as WebP</button>
        <div class="sep"></div>
        <button data-act="export-layers">Export Layers</button>
        <button data-act="save-project">Save Project (IndexedDB)</button>
        <button data-act="load-project">Load Project</button>
      </div>
    </div>
    <div class="menu-item" data-menu="edit">Edit
      <div class="menu-dropdown">
        <button data-act="undo">Undo <span class="shortcut">Ctrl+Z</span></button>
        <button data-act="redo">Redo <span class="shortcut">Ctrl+Y</span></button>
        <div class="sep"></div>
        <button data-act="cut">Cut</button>
        <button data-act="copy">Copy</button>
        <button data-act="pasteInside">Paste</button>
        <div class="sep"></div>
        <button data-act="fill-fg">Fill w/ Foreground</button>
        <button data-act="fill-bg">Fill w/ Background</button>
      </div>
    </div>
    <div class="menu-item" data-menu="image">Image
      <div class="menu-dropdown">
        <button data-act="resize">Resize Image…</button>
        <button data-act="canvas-size">Canvas Size…</button>
        <div class="sep"></div>
        <button data-act="flip-h">Flip Horizontal</button>
        <button data-act="flip-v">Flip Vertical</button>
        <button data-act="rotate-90">Rotate 90° CW</button>
        <button data-act="rotate-180">Rotate 180°</button>
        <button data-act="rotate-270">Rotate 90° CCW</button>
      </div>
    </div>
    <div class="menu-item" data-menu="layer">Layer
      <div class="menu-dropdown">
        <button data-act="layer-new">New Layer</button>
        <button data-act="layer-duplicate">Duplicate Layer</button>
        <button data-act="layer-delete">Delete Layer</button>
        <div class="sep"></div>
        <button data-act="layer-up">Bring Forward</button>
        <button data-act="layer-down">Send Backward</button>
        <div class="sep"></div>
        <button data-act="layer-merge-down">Merge Down</button>
        <button data-act="layer-flatten">Flatten Image</button>
      </div>
    </div>
    <div class="menu-item" data-menu="select">Select
      <div class="menu-dropdown">
        <button data-act="sel-all">Select All <span class="shortcut">Ctrl+A</span></button>
        <button data-act="sel-none">Deselect <span class="shortcut">Ctrl+D</span></button>
        <button data-act="sel-inverse">Inverse</button>
        <button data-act="sel-feather">Feather…</button>
      </div>
    </div>
    <div class="menu-item" data-menu="adjust">Adjust
      <div class="menu-dropdown">
        <button data-act="adj-bc">Brightness/Contrast…</button>
        <button data-act="adj-hsl">Hue/Saturation…</button>
        <button data-act="adj-levels">Levels…</button>
        <button data-act="adj-curves">Curves…</button>
        <button data-act="adj-balance">Color Balance…</button>
        <div class="sep"></div>
        <button data-act="adj-invert">Invert</button>
        <button data-act="adj-gray">Grayscale</button>
        <button data-act="adj-sepia">Sepia</button>
        <button data-act="adj-threshold">Threshold…</button>
        <button data-act="adj-posterize">Posterize…</button>
      </div>
    </div>
    <div class="menu-item" data-menu="filter">Filter
      <div class="menu-dropdown">
        <button data-act="fil-gblur">Gaussian Blur…</button>
        <button data-act="fil-bblur">Box Blur…</button>
        <button data-act="fil-sharpen">Sharpen</button>
        <button data-act="fil-edge">Edge Detect (Sobel)</button>
        <button data-act="fil-emboss">Emboss</button>
        <button data-act="fil-pixelate">Pixelate…</button>
        <button data-act="fil-noise">Noise…</button>
        <button data-act="fil-vignette">Vignette…</button>
        <button data-act="fil-glow">Glow</button>
        <button data-act="fil-oil">Oil Painting</button>
      </div>
    </div>
    <div class="menu-item" data-menu="view">View
      <div class="menu-dropdown">
        <button data-act="zoom-in">Zoom In <span class="shortcut">+</span></button>
        <button data-act="zoom-out">Zoom Out <span class="shortcut">-</span></button>
        <button data-act="zoom-fit">Fit to Screen</button>
        <button data-act="zoom-100">Actual Pixels (100%)</button>
        <button data-act="fullscreen">Fullscreen</button>
      </div>
    </div>
  </div>

  <!-- OPTIONS BAR -->
  <div class="optionsbar" id="optionsbar">
    <div class="tool-title" id="toolTitle">MOVE</div>
    <div id="toolOptions"></div>
  </div>

  <!-- TOOL PALETTE -->
  <div class="tools" id="toolPalette">
    <button class="tool-btn active" data-tool="move" title="Move (V)">✣<span class="tip">Move (V)</span></button>
    <button class="tool-btn" data-tool="marquee" title="Rectangular Marquee (M)">▢<span class="tip">Marquee (M)</span></button>
    <button class="tool-btn" data-tool="lasso" title="Lasso">◌<span class="tip">Lasso (L)</span></button>
    <button class="tool-btn" data-tool="wand" title="Magic Wand">✦<span class="tip">Magic Wand (W)</span></button>
    <button class="tool-btn" data-tool="crop" title="Crop">⌐<span class="tip">Crop (C)</span></button>
    <button class="tool-btn" data-tool="eyedrop" title="Eyedropper">⊙<span class="tip">Eyedropper (I)</span></button>
    <button class="tool-btn" data-tool="brush" title="Brush (B)">✎<span class="tip">Brush (B)</span></button>
    <button class="tool-btn" data-tool="eraser" title="Eraser (E)">▬<span class="tip">Eraser (E)</span></button>
    <button class="tool-btn" data-tool="bucket" title="Paint Bucket">◉<span class="tip">Paint Bucket (G)</span></button>
    <button class="tool-btn" data-tool="text" title="Text (T)">T<span class="tip">Text (T)</span></button>
    <button class="tool-btn" data-tool="shape" title="Shape">◆<span class="tip">Shape (U)</span></button>
    <button class="tool-btn" data-tool="clone" title="Clone Stamp">✚<span class="tip">Clone Stamp (S)</span></button>
    <button class="tool-btn" data-tool="blur" title="Blur">◎<span class="tip">Blur</span></button>
    <button class="tool-btn" data-tool="sharpen" title="Sharpen">△<span class="tip">Sharpen</span></button>
    <button class="tool-btn" data-tool="smudge" title="Smudge">∽<span class="tip">Smudge</span></button>
    <button class="tool-btn" data-tool="dodge" title="Dodge">◐<span class="tip">Dodge (O)</span></button>
    <button class="tool-btn" data-tool="burn" title="Burn">●<span class="tip">Burn</span></button>

    <div class="color-swatches">

        <div class="swatch bg" id="swatchBg" style="background:#050a0f" title="Background"></div>

  <!-- CANVAS AREA -->

        <button data-act="adj-curves" style="width:100%;margin-bottom:3px">Curves</button>

  <!-- STATUS BAR -->

    <span class="st-cyan" id="stDoc">— × —</span>

    <span class="sep">│</span>
    <span>Pos: <span id="stPos">0, 0</span></span>
    <span class="sep">│</span>

    <span id="stMsg">Ready</span>

<!-- Hidden file input -->
<input type="file" id="fileInput" accept="image/*" style="display:none">

<!-- MODAL -->
<div class="modal-backdrop" id="modalBackdrop">
  <div class="modal" id="modalBox"></div>
</div>

<script>
/* =====================================================================
   PHOTO FORGE — browser raster editor
   Korb Engineering • VFD dark theme
===================================================================== */
(() => {
'use strict';

//////////////////////////////////////////////////////////////////////
// STATE
//////////////////////////////////////////////////////////////////////
const State = {
  doc: { w: 0, h: 0 },
  layers: [],          // { id, name, canvas, ctx, visible, locked, opacity, blend }
  activeLayerIdx: -1,
  history: [],         // snapshot list
  historyIdx: -1,
  historyLimit: 50,
  tool: 'move',
  zoom: 1,
  panX: 0,
  panY: 0,
  fg: '#00d4ff',
  bg: '#050a0f',
  selection: null,     // { mask: ImageData (L channel 0/255), bbox: {x,y,w,h} }
  brush: { size: 20, hardness: 0.8, opacity: 1.0 },
  text: { size: 48, font: 'JetBrains Mono' },
  shape: { kind: 'rect', stroke: 2, fill: true },
  wand: { tolerance: 32 },
  clone: { source: null }, // {lx, ly}
  clipboard: null,
  nextLayerId: 1,
  dirty: false,
};

const DB_NAME = 'korb_photo_forge_db';
const STORE_PROJECTS = 'projects';
const LS_PREFIX = 'korb_photo_forge_';

//////////////////////////////////////////////////////////////////////
// DOM REFS
//////////////////////////////////////////////////////////////////////
const $ = id => document.getElementById(id);
const canvasArea = $('canvasArea');
const canvasWrap = $('canvasWrap');
const bgCanvas = $('bgCanvas');
const bgCtx = bgCanvas.getContext('2d');
const interactionCanvas = $('interactionCanvas');
const iCtx = interactionCanvas.getContext('2d');
const dropHint = $('dropHint');
const modalBackdrop = $('modalBackdrop');
const modalBox = $('modalBox');
const toolPalette = $('toolPalette');
const fileInput = $('fileInput');

//////////////////////////////////////////////////////////////////////
// UTILITY
//////////////////////////////////////////////////////////////////////
function setMsg(m) { $('stMsg').textContent = m; }
function setTool(t) {
  State.tool = t;
  document.querySelectorAll('.tool-btn').forEach(b => b.classList.toggle('active', b.dataset.tool === t));
  const titles = {
    move: 'MOVE', marquee: 'MARQUEE', lasso: 'LASSO', wand: 'MAGIC WAND',
    crop: 'CROP', eyedrop: 'EYEDROPPER', brush: 'BRUSH', eraser: 'ERASER',
    bucket: 'PAINT BUCKET', text: 'TEXT', shape: 'SHAPE', clone: 'CLONE STAMP',
    blur: 'BLUR', sharpen: 'SHARPEN', smudge: 'SMUDGE', dodge: 'DODGE',
    burn: 'BURN', zoom: 'ZOOM'
  };
  $('toolTitle').textContent = titles[t] || t.toUpperCase();
  $('stTool').textContent = titles[t] || t;
  renderToolOptions();
  updateCursor();
}
function updateCursor() {
  const t = State.tool;
  if (['brush','eraser','clone','blur','sharpen','smudge','dodge','burn'].includes(t)) {
    interactionCanvas.style.cursor = 'none';
  } else if (t === 'move') {
    interactionCanvas.style.cursor = 'move';
  } else if (t === 'zoom') {
    interactionCanvas.style.cursor = 'zoom-in';
  } else if (t === 'text') {
    interactionCanvas.style.cursor = 'text';
  } else if (t === 'eyedrop') {
    interactionCanvas.style.cursor = 'cell';
  } else {
    interactionCanvas.style.cursor = 'crosshair';
  }
}
function renderToolOptions() {
  const c = $('toolOptions');
  c.innerHTML = '';
  const mk = (html) => { c.innerHTML += html; };
  const t = State.tool;
  if (['brush','eraser','clone','blur','sharpen','smudge','dodge','burn'].includes(t)) {
    mk(`
      <div class="opt-group"><label>Size</label><input type="number" id="optSize" min="1" max="500" value="${State.brush.size}" step="1"><input type="range" id="optSizeR" min="1" max="300" value="${State.brush.size}"></div>
      <div class="opt-group"><label>Hardness</label><input type="range" id="optHard" min="0" max="100" value="${State.brush.hardness*100}"></div>
      <div class="opt-group"><label>Opacity</label><input type="range" id="optOp" min="1" max="100" value="${State.brush.opacity*100}"></div>
    `);
    setTimeout(()=>{
      $('optSize').oninput = e => { State.brush.size = +e.target.value; $('optSizeR').value = Math.min(300,e.target.value); };
      $('optSizeR').oninput = e => { State.brush.size = +e.target.value; $('optSize').value = e.target.value; };
      $('optHard').oninput = e => { State.brush.hardness = e.target.value/100; };
      $('optOp').oninput = e => { State.brush.opacity = e.target.value/100; };
    },0);
  } else if (t === 'wand') {
    mk(`<div class="opt-group"><label>Tolerance</label><input type="range" id="optTol" min="0" max="150" value="${State.wand.tolerance}"><span id="tolVal">${State.wand.tolerance}</span></div>`);
    setTimeout(()=>{
      $('optTol').oninput = e => { State.wand.tolerance = +e.target.value; $('tolVal').textContent = e.target.value; };
    },0);
  } else if (t === 'text') {
    mk(`
      <div class="opt-group"><label>Size</label><input type="number" id="optTxtSz" min="8" max="400" value="${State.text.size}"></div>
      <div class="opt-group"><label>Font</label>
        <select id="optTxtFont">
          <option>JetBrains Mono</option>
          <option>monospace</option>
          <option>sans-serif</option>
          <option>serif</option>
        </select>
      </div>
    `);
    setTimeout(()=>{
      $('optTxtSz').oninput = e => State.text.size = +e.target.value;
      $('optTxtFont').oninput = e => State.text.font = e.target.value;
    },0);
  } else if (t === 'shape') {
    mk(`
      <div class="opt-group"><label>Kind</label>
        <select id="optShapeK">
          <option value="rect">Rectangle</option>
          <option value="ellipse">Ellipse</option>
          <option value="line">Line</option>
        </select>
      </div>
      <div class="opt-group"><label>Stroke</label><input type="number" id="optShapeS" min="0" max="100" value="${State.shape.stroke}"></div>
      <div class="opt-group"><label>Fill</label><input type="checkbox" id="optShapeF" ${State.shape.fill?'checked':''}></div>
    `);
    setTimeout(()=>{
      $('optShapeK').value = State.shape.kind;
      $('optShapeK').oninput = e => State.shape.kind = e.target.value;
      $('optShapeS').oninput = e => State.shape.stroke = +e.target.value;
      $('optShapeF').oninput = e => State.shape.fill = e.target.checked;
    },0);
  } else {
    mk(`<span style="color:var(--text-dim);font-size:10px">Tool ready. Click canvas.</span>`);
  }
}
function clamp(v,a,b){return v<a?a:v>b?b:v;}
function rgbToHex(r,g,b){return '#'+[r,g,b].map(x=>x.toString(16).padStart(2,'0')).join('');}
function hexToRgb(h){
  h=h.replace('#','');
  return {r:parseInt(h.slice(0,2),16),g:parseInt(h.slice(2,4),16),b:parseInt(h.slice(4,6),16)};
}

//////////////////////////////////////////////////////////////////////
// DOCUMENT / LAYERS
//////////////////////////////////////////////////////////////////////
function createLayer(w, h, name='Layer') {
  const cv = document.createElement('canvas');
  cv.width = w; cv.height = h;
  const lx = {
    id: State.nextLayerId++,
    name, canvas: cv, ctx: cv.getContext('2d'),
    visible: true, locked: false, opacity: 1.0, blend: 'source-over'
  };
  return lx;
}
function newDocument(w, h, fillColor=null) {
  State.doc.w = w; State.doc.h = h;
  State.layers = [];
  const bg = createLayer(w, h, 'Background');
  if (fillColor) { bg.ctx.fillStyle = fillColor; bg.ctx.fillRect(0,0,w,h); }
  State.layers.push(bg);
  State.activeLayerIdx = 0;
  State.history = [];
  State.historyIdx = -1;
  State.selection = null;
  dropHint.style.display = 'none';
  canvasWrap.style.display = 'block';
  resizeDocCanvas();
  fitToScreen();
  snapshot('New Document');
  renderAll();
  $('stDoc').textContent = `${w} × ${h}`;
  setMsg('New document created');
}
function newDocumentFromImage(img, name='Image') {
  const w = img.naturalWidth || img.width;
  const h = img.naturalHeight || img.height;
  newDocument(w, h, null);
  const L = State.layers[0];
  L.name = name;
  L.ctx.drawImage(img, 0, 0);
  snapshot('Open ' + name);
  renderAll();
}
function resizeDocCanvas() {
  bgCanvas.width = State.doc.w;
  bgCanvas.height = State.doc.h;
  interactionCanvas.width = State.doc.w;
  interactionCanvas.height = State.doc.h;
  canvasWrap.style.width = State.doc.w + 'px';
  canvasWrap.style.height = State.doc.h + 'px';
}
function activeLayer() {
  return State.layers[State.activeLayerIdx] || null;
}
function renderComposite() {
  if (!State.doc.w) return;
  bgCtx.save();
  bgCtx.globalCompositeOperation = 'source-over';
  bgCtx.clearRect(0,0,State.doc.w,State.doc.h);
  for (const L of State.layers) {
    if (!L.visible) continue;
    bgCtx.globalAlpha = L.opacity;
    bgCtx.globalCompositeOperation = L.blend || 'source-over';
    bgCtx.drawImage(L.canvas, 0, 0);
  }
  bgCtx.restore();
  if (State.selection) drawSelectionOverlay();
  else clearInteraction();
}
function clearInteraction() {
  iCtx.clearRect(0,0,interactionCanvas.width, interactionCanvas.height);
}
function drawSelectionOverlay() {
  clearInteraction();
  if (!State.selection) return;
  const b = State.selection.bbox;
  iCtx.save();
  iCtx.strokeStyle = '#00d4ff';
  iCtx.lineWidth = 1 / State.zoom;
  iCtx.setLineDash([6/State.zoom, 4/State.zoom]);
  iCtx.strokeRect(b.x+0.5, b.y+0.5, b.w-1, b.h-1);
  iCtx.restore();
}
function renderLayers() {
  const body = $('layersBody');
  body.innerHTML = '';
  // reverse order (top layer first)
  for (let i = State.layers.length - 1; i >= 0; i--) {
    const L = State.layers[i];
    const el = document.createElement('div');
    el.className = 'layer-item' + (i === State.activeLayerIdx ? ' active' : '');
    el.innerHTML = `
      <span class="layer-vis ${L.visible?'on':''}" data-idx="${i}" data-toggle="vis">${L.visible?'◉':'○'}</span>
      <canvas class="layer-thumb" width="32" height="32"></canvas>
      <span class="layer-name" data-idx="${i}" title="${L.name}">${L.name}</span>
    `;
    const thumb = el.querySelector('canvas');
    thumb.getContext('2d').drawImage(L.canvas, 0, 0, 32, 32);
    el.querySelector('.layer-vis').onclick = (e) => {
      e.stopPropagation();
      L.visible = !L.visible;
      renderAll();
    };
    el.querySelector('.layer-name').ondblclick = () => {
      const n = prompt('Layer name:', L.name);
      if (n) { L.name = n; renderLayers(); }
    };
    el.onclick = () => {
      State.activeLayerIdx = i;
      $('blendMode').value = L.blend;
      $('layerOpacity').value = L.opacity * 100;
      $('layerOpacityVal').textContent = Math.round(L.opacity * 100);
      renderLayers();
    };
    body.appendChild(el);
  }
}
function renderHistory() {
  const body = $('historyBody');
  body.innerHTML = '';
  State.history.forEach((h, i) => {
    const el = document.createElement('div');
    el.className = 'history-item' + (i === State.historyIdx ? ' current' : '');
    el.textContent = `${i+1}. ${h.label}`;
    el.onclick = () => {
      restoreHistory(i);
    };
    body.appendChild(el);
  });
  body.scrollTop = body.scrollHeight;
}
function renderAll() {
  renderComposite();
  renderLayers();
  renderHistory();
}

//////////////////////////////////////////////////////////////////////
// HISTORY
//////////////////////////////////////////////////////////////////////
function snapshot(label='Edit') {
  // Snapshot each layer's ImageData — compact enough for 50 steps on mid-size docs.
  const entry = {
    label,
    layers: State.layers.map(L => ({
      id: L.id, name: L.name, visible: L.visible, locked: L.locked,
      opacity: L.opacity, blend: L.blend,
      w: L.canvas.width, h: L.canvas.height,
      data: L.ctx.getImageData(0, 0, L.canvas.width, L.canvas.height)
    })),
    activeLayerIdx: State.activeLayerIdx,
    docW: State.doc.w, docH: State.doc.h
  };
  // discard forward
  State.history = State.history.slice(0, State.historyIdx + 1);
  State.history.push(entry);
  if (State.history.length > State.historyLimit) State.history.shift();
  State.historyIdx = State.history.length - 1;
  renderHistory();
}
function restoreHistory(idx) {
  if (idx < 0 || idx >= State.history.length) return;
  const e = State.history[idx];
  State.doc.w = e.docW; State.doc.h = e.docH;
  resizeDocCanvas();
  State.layers = e.layers.map(sL => {
    const cv = document.createElement('canvas');
    cv.width = sL.w; cv.height = sL.h;
    const ctx = cv.getContext('2d');
    ctx.putImageData(sL.data, 0, 0);
    return {
      id: sL.id, name: sL.name, visible: sL.visible, locked: sL.locked,
      opacity: sL.opacity, blend: sL.blend, canvas: cv, ctx
    };
  });
  State.activeLayerIdx = Math.min(e.activeLayerIdx, State.layers.length - 1);
  State.historyIdx = idx;
  renderAll();
}
function undo() { if (State.historyIdx > 0) restoreHistory(State.historyIdx - 1); }
function redo() { if (State.historyIdx < State.history.length - 1) restoreHistory(State.historyIdx + 1); }

//////////////////////////////////////////////////////////////////////
// ZOOM / PAN
//////////////////////////////////////////////////////////////////////
function applyTransform() {
  canvasWrap.style.transform = `translate(-50%, -50%) translate(${State.panX}px, ${State.panY}px) scale(${State.zoom})`;
  $('stZoom').textContent = Math.round(State.zoom * 100) + '%';
}
function fitToScreen() {
  if (!State.doc.w) return;
  const r = canvasArea.getBoundingClientRect();
  const pad = 40;
  const z = Math.min((r.width - pad) / State.doc.w, (r.height - pad) / State.doc.h, 4);
  State.zoom = Math.max(z, 0.05);
  State.panX = 0; State.panY = 0;
  applyTransform();
}
function zoomBy(f, cx, cy) {
  const nz = clamp(State.zoom * f, 0.05, 32);
  if (cx !== undefined) {
    // pivot around cursor
    const r = canvasArea.getBoundingClientRect();
    const dx = cx - r.left - r.width/2 - State.panX;
    const dy = cy - r.top - r.height/2 - State.panY;
    State.panX -= dx * (nz/State.zoom - 1);
    State.panY -= dy * (nz/State.zoom - 1);
  }
  State.zoom = nz;
  applyTransform();
}

//////////////////////////////////////////////////////////////////////
// COORD CONVERSION
//////////////////////////////////////////////////////////////////////
function eventToCanvas(e) {
  const pt = e.touches ? e.touches[0] : e;
  const rect = interactionCanvas.getBoundingClientRect();
  const x = (pt.clientX - rect.left) * (interactionCanvas.width / rect.width);
  const y = (pt.clientY - rect.top) * (interactionCanvas.height / rect.height);
  return { x, y };
}

//////////////////////////////////////////////////////////////////////
// DRAWING — BRUSH
//////////////////////////////////////////////////////////////////////
function drawBrushDab(ctx, x, y, opts) {
  const r = opts.size / 2;
  const grad = ctx.createRadialGradient(x, y, r * opts.hardness, x, y, r);
  const c = hexToRgb(opts.color);
  grad.addColorStop(0, `rgba(${c.r},${c.g},${c.b},${opts.opacity})`);
  grad.addColorStop(1, `rgba(${c.r},${c.g},${c.b},0)`);
  ctx.fillStyle = grad;
  ctx.beginPath();
  ctx.arc(x, y, r, 0, Math.PI * 2);
  ctx.fill();
}
function strokeLine(ctx, x0, y0, x1, y1, opts) {
  const dx = x1 - x0, dy = y1 - y0;
  const dist = Math.hypot(dx, dy);
  const step = Math.max(1, opts.size / 6);
  const n = Math.max(1, Math.ceil(dist / step));
  for (let i = 0; i <= n; i++) {
    const t = i / n;
    drawBrushDab(ctx, x0 + dx * t, y0 + dy * t, opts);
  }
}

//////////////////////////////////////////////////////////////////////
// SELECTION helpers
//////////////////////////////////////////////////////////////////////
function setRectSelection(x, y, w, h) {
  if (w <= 0 || h <= 0) { State.selection = null; return; }
  x = clamp(Math.round(x), 0, State.doc.w);
  y = clamp(Math.round(y), 0, State.doc.h);
  w = clamp(Math.round(w), 0, State.doc.w - x);
  h = clamp(Math.round(h), 0, State.doc.h - y);
  const mask = new ImageData(State.doc.w, State.doc.h);
  for (let py = y; py < y+h; py++) {
    for (let px = x; px < x+w; px++) {
      const i = (py * State.doc.w + px) * 4;
      mask.data[i] = mask.data[i+1] = mask.data[i+2] = 255;
      mask.data[i+3] = 255;
    }
  }
  State.selection = { mask, bbox: { x, y, w, h } };
}
function clipCtxToSelection(ctx) {
  if (!State.selection) return;
  ctx.beginPath();
  const b = State.selection.bbox;
  ctx.rect(b.x, b.y, b.w, b.h);
  ctx.clip();
}

//////////////////////////////////////////////////////////////////////
// INTERACTION HANDLERS
//////////////////////////////////////////////////////////////////////
let drag = null;
let brushCursor = null;

function createBrushCursor() {
  if (brushCursor) return;
  brushCursor = document.createElement('div');
  brushCursor.className = 'brush-cursor';
  document.body.appendChild(brushCursor);
}
function updateBrushCursor(clientX, clientY) {
  if (!brushCursor) createBrushCursor();
  const size = State.brush.size * State.zoom;
  brushCursor.style.width = size + 'px';
  brushCursor.style.height = size + 'px';
  brushCursor.style.left = clientX + 'px';
  brushCursor.style.top = clientY + 'px';
  brushCursor.style.display = 'block';
}
function hideBrushCursor() { if (brushCursor) brushCursor.style.display = 'none'; }

interactionCanvas.addEventListener('pointerdown', onPointerDown);
interactionCanvas.addEventListener('pointermove', onPointerMove);
window.addEventListener('pointerup', onPointerUp);
interactionCanvas.addEventListener('pointerleave', () => hideBrushCursor());

function onPointerDown(e) {
  e.preventDefault();
  interactionCanvas.setPointerCapture(e.pointerId);
  const p = eventToCanvas(e);
  const t = State.tool;
  const L = activeLayer();
  if (!L && t !== 'zoom') return;

  if (t === 'brush' || t === 'eraser') {
    drag = { tool: t, prev: p, ctx: L.ctx, opts: {...State.brush, color: State.fg} };
    L.ctx.save();
    clipCtxToSelection(L.ctx);
    if (t === 'eraser') L.ctx.globalCompositeOperation = 'destination-out';
    drawBrushDab(L.ctx, p.x, p.y, drag.opts);
    renderComposite();
  } else if (t === 'bucket') {
    floodFillCanvas(L, Math.round(p.x), Math.round(p.y), State.fg, State.wand.tolerance);

//////////////////////////////////////////////////////////////////////
// SHAPES
//////////////////////////////////////////////////////////////////////
function drawShapePreview(ctx, s, e) {
  ctx.save();
  ctx.strokeStyle = State.fg;
  ctx.lineWidth = State.shape.stroke / State.zoom;
  if (State.shape.kind === 'rect') {
    ctx.strokeRect(Math.min(s.x,e.x), Math.min(s.y,e.y), Math.abs(e.x-s.x), Math.abs(e.y-s.y));
  } else if (State.shape.kind === 'ellipse') {
    const cx = (s.x+e.x)/2, cy = (s.y+e.y)/2;
    const rx = Math.abs(e.x-s.x)/2, ry = Math.abs(e.y-s.y)/2;
    ctx.beginPath();
    ctx.ellipse(cx,cy,rx,ry,0,0,Math.PI*2);
    ctx.stroke();
  } else if (State.shape.kind === 'line') {
    ctx.beginPath();
    ctx.moveTo(s.x,s.y); ctx.lineTo(e.x,e.y);
    ctx.stroke();
  }
  ctx.restore();
}
function drawShapeFinal(ctx, s, e) {
  ctx.fillStyle = State.fg;
  ctx.strokeStyle = State.fg;
  ctx.lineWidth = State.shape.stroke;
  if (State.shape.kind === 'rect') {
    const x = Math.min(s.x,e.x), y = Math.min(s.y,e.y);
    const w = Math.abs(e.x-s.x), h = Math.abs(e.y-s.y);
    if (State.shape.fill) ctx.fillRect(x,y,w,h);
    if (State.shape.stroke > 0) ctx.strokeRect(x,y,w,h);
  } else if (State.shape.kind === 'ellipse') {
    const cx = (s.x+e.x)/2, cy = (s.y+e.y)/2;
    const rx = Math.abs(e.x-s.x)/2, ry = Math.abs(e.y-s.y)/2;
    ctx.beginPath();
    ctx.ellipse(cx,cy,rx,ry,0,0,Math.PI*2);
    if (State.shape.fill) ctx.fill();
    if (State.shape.stroke > 0) ctx.stroke();
  } else if (State.shape.kind === 'line') {
    ctx.beginPath();
    ctx.moveTo(s.x,s.y); ctx.lineTo(e.x,e.y);
    ctx.stroke();
  }
}

//////////////////////////////////////////////////////////////////////
// FLOOD FILL & MAGIC WAND
//////////////////////////////////////////////////////////////////////
function floodFillCanvas(L, x, y, hex, tol) {

  const d = img.data;
  const w = img.width, h = img.height;
  const idx0 = (y*w+x)*4;

    const [cx,cy] = stack.pop();
    if (cx<0||cy<0||cx>=w||cy>=h) continue;
    const p = cy*w+cx;

    const dr=d[i]-tr, dg=d[i+1]-tg, db=d[i+2]-tb, da=d[i+3]-ta;
    if (dr*dr+dg*dg+db*db+da*da > tol*tol*4) continue;
    visited[p] = 1;

  const idx0 = (y*w+x)*4;

  const mask = new ImageData(State.doc.w, State.doc.h);

  let minX=x,minY=y,maxX=x,maxY=y;

    const [cx,cy] = stack.pop();

    if (mask.data[p*4+3]) continue;
    const i = p*4;

    if (cx<minX) minX=cx; if (cx>maxX) maxX=cx;
    if (cy<minY) minY=cy; if (cy>maxY) maxY=cy;
    stack.push([cx+1,cy],[cx-1,cy],[cx,cy+1],[cx,cy-1]);
  }

    if (img.data[(y*cv.width+x)*4+3]) {

      if (y<minY)minY=y; if (y>maxY)maxY=y;

//////////////////////////////////////////////////////////////////////
// CROP
//////////////////////////////////////////////////////////////////////
function cropDocument(x, y, w, h) {
  for (const L of State.layers) {
    const nc = document.createElement('canvas');
    nc.width = w; nc.height = h;
    nc.getContext('2d').drawImage(L.canvas, -x, -y);
    L.canvas = nc; L.ctx = nc.getContext('2d');
  }
  State.doc.w = w; State.doc.h = h;
  State.selection = null;
  resizeDocCanvas();
  snapshot('Crop');
  fitToScreen();
  renderAll();
  $('stDoc').textContent = `${w} × ${h}`;
}

//////////////////////////////////////////////////////////////////////
// CLONE
//////////////////////////////////////////////////////////////////////
function cloneDab(L, p) {
  const src = State.clone.source;
  if (!src) return;
  L.ctx.save();
  clipCtxToSelection(L.ctx);
  L.ctx.globalAlpha = State.brush.opacity;
  const r = State.brush.size/2;
  L.ctx.beginPath();
  L.ctx.arc(p.x, p.y, r, 0, Math.PI*2);
  L.ctx.clip();
  L.ctx.drawImage(bgCanvas, src.x - p.x, src.y - p.y);

function cloneLineDab(L, p0, p1, src) {
  const dist = Math.hypot(p1.x-p0.x, p1.y-p0.y);
  const step = Math.max(1, State.brush.size/6);
  const n = Math.max(1, Math.ceil(dist/step));
  for (let i=1;i<=n;i++) {
    const t = i/n;
    const px = p0.x + (p1.x-p0.x)*t;
    const py = p0.y + (p1.y-p0.y)*t;
    const sx = src.x - (p1.x - px);
    const sy = src.y - (p1.y - py);
    cloneDab(L, {x:px, y:py}, {x:sx, y:sy});
  }

//////////////////////////////////////////////////////////////////////
// BLUR / SHARPEN / SMUDGE / DODGE / BURN brushes
//////////////////////////////////////////////////////////////////////
function applyToolAt(L, p, tool) {

  if (x+w<0||y+h<0||x>L.canvas.width||y>L.canvas.height) return;
  const sx = clamp(x,0,L.canvas.width), sy = clamp(y,0,L.canvas.height);
  const sw = clamp(x+w,0,L.canvas.width)-sx, sh = clamp(y+h,0,L.canvas.height)-sy;
  if (sw<=0||sh<=0) return;

  else if (tool === 'smudge') smudgeInPlace(img);
  else if (tool === 'dodge') dodgeBurnInPlace(img, 1, State.brush.opacity);

  const mask = document.createElement('canvas');
  mask.width = sw; mask.height = sh;
  const mctx = mask.getContext('2d');
  mctx.putImageData(img, 0, 0);

  out.width = sw; out.height = sh;

  for (let i=1;i<=n;i++) {
    const t = i/n;

      h = (h + dh/360 + 1) % 1;
      s = clamp(s + ds/100, 0, 1);
      l = clamp(l + dl/100, 0, 1);
      const [r,g,b] = hslToRgb(h,s,l);
      d[i]=r; d[i+1]=g; d[i+2]=b;
    }
  }, 'Hue/Saturation');
}
function adjLevels(blk, wht, gamma) {
  withLayerData(img => {
    const d = img.data;
    const range = wht - blk || 1;
    const lut = new Uint8ClampedArray(256);
    for (let i=0;i<256;i++) {
      let v = (i - blk) / range;
      v = clamp(v, 0, 1);
      v = Math.pow(v, 1/gamma);
      lut[i] = clamp(v*255, 0, 255);
    }
    for (let i=0;i<d.length;i+=4) {
      d[i]=lut[d[i]]; d[i+1]=lut[d[i+1]]; d[i+2]=lut[d[i+2]];
    }
  }, 'Levels');
}
function adjCurvesLUT(lut) {
  withLayerData(img => {
    const d = img.data;
    for (let i=0;i<d.length;i+=4) {
      d[i]=lut[d[i]]; d[i+1]=lut[d[i+1]]; d[i+2]=lut[d[i+2]];
    }
  }, 'Curves');
}
function adjInvert() {
  withLayerData(img => {
    const d = img.data;
    for (let i=0;i<d.length;i+=4) { d[i]=255-d[i]; d[i+1]=255-d[i+1]; d[i+2]=255-d[i+2]; }
  }, 'Invert');
}
function adjGrayscale() {
  withLayerData(img => {
    const d = img.data;
    for (let i=0;i<d.length;i+=4) {
      const v = d[i]*0.299+d[i+1]*0.587+d[i+2]*0.114;
      d[i]=d[i+1]=d[i+2]=v;
    }
  }, 'Grayscale');
}
function adjSepia() {
  withLayerData(img => {
    const d = img.data;
    for (let i=0;i<d.length;i+=4) {
      const r=d[i],g=d[i+1],b=d[i+2];
      d[i]=clamp(r*.393+g*.769+b*.189,0,255);
      d[i+1]=clamp(r*.349+g*.686+b*.168,0,255);
      d[i+2]=clamp(r*.272+g*.534+b*.131,0,255);
    }
  }, 'Sepia');
}
function adjThreshold(t) {
  withLayerData(img => {
    const d = img.data;
    for (let i=0;i<d.length;i+=4) {
      const v = d[i]*0.299+d[i+1]*0.587+d[i+2]*0.114;
      const bw = v > t ? 255 : 0;
      d[i]=d[i+1]=d[i+2]=bw;
    }
  }, 'Threshold');
}
function adjPosterize(levels) {
  withLayerData(img => {
    const d = img.data;
    const step = 255/(levels-1);
    for (let i=0;i<d.length;i+=4) {
      d[i]=Math.round(d[i]/step)*step;
      d[i+1]=Math.round(d[i+1]/step)*step;
      d[i+2]=Math.round(d[i+2]/step)*step;
    }
  }, 'Posterize');
}
function adjBalance(rr, gg, bb) {
  withLayerData(img => {
    const d = img.data;
    for (let i=0;i<d.length;i+=4) {
      d[i]=clamp(d[i]+rr,0,255);
      d[i+1]=clamp(d[i+1]+gg,0,255);
      d[i+2]=clamp(d[i+2]+bb,0,255);
    }
  }, 'Color Balance');
}
function gaussianBlur(r) {
  // separable gaussian approx via multiple box blurs
  withLayerData(img => {
    for (let i=0;i<3;i++) boxBlurInPlace(img, Math.max(1,Math.round(r/2)));
  }, 'Gaussian Blur');
}
function filBoxBlur(r) { withLayerData(img => boxBlurInPlace(img,r), 'Box Blur'); }
function filSharpen() { withLayerData(img => convolveInPlace(img, [0,-1,0,-1,5,-1,0,-1,0]), 'Sharpen'); }
function filEdge() {
  withLayerData(img => {
    const w=img.width,h=img.height;
    // grayscale first
    const g = new Float32Array(w*h);
    for (let i=0;i<w*h;i++) {
      const p=i*4;
      g[i]=img.data[p]*.299+img.data[p+1]*.587+img.data[p+2]*.114;
    }
    const out = new Uint8ClampedArray(img.data.length);
    for (let y=1;y<h-1;y++) for (let x=1;x<w-1;x++) {
      const gx = -g[(y-1)*w+x-1] -2*g[y*w+x-1] -g[(y+1)*w+x-1]
                 + g[(y-1)*w+x+1] +2*g[y*w+x+1] +g[(y+1)*w+x+1];
      const gy = -g[(y-1)*w+x-1] -2*g[(y-1)*w+x] -g[(y-1)*w+x+1]
                 + g[(y+1)*w+x-1] +2*g[(y+1)*w+x] +g[(y+1)*w+x+1];
      const m = clamp(Math.hypot(gx,gy),0,255);
      const oi = (y*w+x)*4;
      out[oi]=out[oi+1]=out[oi+2]=m; out[oi+3]=255;
    }
    img.data.set(out);
  }, 'Edge Detect');
}
function filEmboss() { withLayerData(img => convolveInPlace(img, [-2,-1,0,-1,1,1,0,1,2]), 'Emboss'); }
function filPixelate(size) {
  withLayerData(img => {
    const d = img.data, w = img.width, h = img.height;
    for (let y=0;y<h;y+=size) for (let x=0;x<w;x+=size) {
      let r=0,g=0,b=0,a=0,c=0;
      for (let dy=0;dy<size&&y+dy<h;dy++) for (let dx=0;dx<size&&x+dx<w;dx++) {
        const i=((y+dy)*w+x+dx)*4;
        r+=d[i]; g+=d[i+1]; b+=d[i+2]; a+=d[i+3]; c++;
      }
      r/=c; g/=c; b/=c; a/=c;
      for (let dy=0;dy<size&&y+dy<h;dy++) for (let dx=0;dx<size&&x+dx<w;dx++) {
        const i=((y+dy)*w+x+dx)*4;
        d[i]=r; d[i+1]=g; d[i+2]=b; d[i+3]=a;
      }
    }
  }, 'Pixelate');
}
function filNoise(amt) {
  withLayerData(img => {
    const d = img.data;
    for (let i=0;i<d.length;i+=4) {
      const n = (Math.random()-0.5)*amt*2;
      d[i]=clamp(d[i]+n,0,255);
      d[i+1]=clamp(d[i+1]+n,0,255);
      d[i+2]=clamp(d[i+2]+n,0,255);
    }
  }, 'Noise');
}
function filVignette(strength) {
  withLayerData(img => {
    const d = img.data, w = img.width, h = img.height;
    const cx = w/2, cy = h/2;
    const maxD = Math.hypot(cx, cy);
    for (let y=0;y<h;y++) for (let x=0;x<w;x++) {
      const dist = Math.hypot(x-cx, y-cy)/maxD;
      const f = 1 - Math.pow(dist, 2) * strength;
      const i=(y*w+x)*4;
      d[i]*=f; d[i+1]*=f; d[i+2]*=f;
    }
  }, 'Vignette');
}
function filGlow() {
  // blur then screen-blend with original
  withLayerData(img => {
    const copy = new ImageData(new Uint8ClampedArray(img.data), img.width, img.height);
    boxBlurInPlace(copy, 4);
    const d = img.data, s = copy.data;
    for (let i=0;i<d.length;i+=4) {
      d[i] = clamp(255 - ((255-d[i])*(255-s[i])/255),0,255);
      d[i+1] = clamp(255 - ((255-d[i+1])*(255-s[i+1])/255),0,255);
      d[i+2] = clamp(255 - ((255-d[i+2])*(255-s[i+2])/255),0,255);
    }
  }, 'Glow');
}
function filOil() {
  // Kuwahara approximation: sample 4 quadrants, pick lowest variance.
  withLayerData(img => {
    const w=img.width,h=img.height,src=new Uint8ClampedArray(img.data);
    const d=img.data;
    const r=3;
    const mean = (x,y,rx,ry) => {
      let sr=0,sg=0,sb=0,s2=0,n=0;
      for (let yy=y;yy<y+ry;yy++) for (let xx=x;xx<x+rx;xx++) {
        if (xx<0||yy<0||xx>=w||yy>=h) continue;
        const i=(yy*w+xx)*4;
        sr+=src[i]; sg+=src[i+1]; sb+=src[i+2];
        const l=src[i]*.299+src[i+1]*.587+src[i+2]*.114;
        s2+=l*l; n++;
      }
      if (!n) return null;
      const mr=sr/n, mg=sg/n, mb=sb/n;
      const ml=mr*.299+mg*.587+mb*.114;
      const vr = s2/n - ml*ml;
      return {r:mr,g:mg,b:mb,v:vr};
    };
    for (let y=0;y<h;y++) for (let x=0;x<w;x++) {
      const quads = [
        mean(x-r,y-r,r+1,r+1),
        mean(x,  y-r,r+1,r+1),
        mean(x-r,y,  r+1,r+1),
        mean(x,  y,  r+1,r+1)
      ].filter(Boolean);
      quads.sort((a,b)=>a.v-b.v);
      const m = quads[0];
      const i=(y*w+x)*4;
      d[i]=m.r; d[i+1]=m.g; d[i+2]=m.b;
    }
  }, 'Oil Painting');
}

//////////////////////////////////////////////////////////////////////
// TRANSFORMS
//////////////////////////////////////////////////////////////////////
function flipH() {
  for (const L of State.layers) {
    const nc = document.createElement('canvas');
    nc.width=L.canvas.width; nc.height=L.canvas.height;
    const ctx = nc.getContext('2d');
    ctx.translate(nc.width,0); ctx.scale(-1,1);
    ctx.drawImage(L.canvas,0,0);
    L.canvas=nc; L.ctx=nc.getContext('2d');
  }
  snapshot('Flip Horizontal');
  renderAll();
}
function flipV() {
  for (const L of State.layers) {
    const nc = document.createElement('canvas');
    nc.width=L.canvas.width; nc.height=L.canvas.height;
    const ctx = nc.getContext('2d');
    ctx.translate(0,nc.height); ctx.scale(1,-1);
    ctx.drawImage(L.canvas,0,0);
    L.canvas=nc; L.ctx=nc.getContext('2d');
  }
  snapshot('Flip Vertical');
  renderAll();
}
function rotate(deg) {
  const rad = deg*Math.PI/180;
  const nw = deg===90||deg===270 ? State.doc.h : State.doc.w;
  const nh = deg===90||deg===270 ? State.doc.w : State.doc.h;
  for (const L of State.layers) {
    const nc = document.createElement('canvas');
    nc.width=nw; nc.height=nh;
    const ctx = nc.getContext('2d');
    ctx.translate(nw/2, nh/2);
    ctx.rotate(rad);
    ctx.drawImage(L.canvas, -L.canvas.width/2, -L.canvas.height/2);
    L.canvas=nc; L.ctx=nc.getContext('2d');
  }
  State.doc.w = nw; State.doc.h = nh;
  resizeDocCanvas();
  snapshot('Rotate ' + deg + '°');
  fitToScreen();
  renderAll();
  $('stDoc').textContent = `${nw} × ${nh}`;
}
function resizeImage(w, h) {
  for (const L of State.layers) {
    const nc = document.createElement('canvas');
    nc.width=w; nc.height=h;
    nc.getContext('2d').drawImage(L.canvas, 0, 0, w, h);
    L.canvas=nc; L.ctx=nc.getContext('2d');
  }
  State.doc.w = w; State.doc.h = h;
  resizeDocCanvas();
  snapshot('Resize Image');
  fitToScreen();
  renderAll();
  $('stDoc').textContent = `${w} × ${h}`;
}
function canvasSize(w, h) {
  for (const L of State.layers) {
    const nc = document.createElement('canvas');
    nc.width=w; nc.height=h;
    nc.getContext('2d').drawImage(L.canvas, 0, 0);
    L.canvas=nc; L.ctx=nc.getContext('2d');
  }
  State.doc.w = w; State.doc.h = h;
  resizeDocCanvas();
  snapshot('Canvas Size');
  fitToScreen();
  renderAll();
  $('stDoc').textContent = `${w} × ${h}`;
}

function saveAs(type) {
  if (!State.doc.w) { setMsg('Nothing to save'); return; }
  const mime = type === 'png' ? 'image/png' : type === 'webp' ? 'image/webp' : 'image/jpeg';
  bgCanvas.toBlob(blob => {
    const a = document.createElement('a');
    a.href = URL.createObjectURL(blob);
    a.download = 'photo-forge.' + type;
    a.click();
    URL.revokeObjectURL(a.href);
    setMsg('Saved as ' + type.toUpperCase());
  }, mime, 0.92);
}
function exportLayers() {
  State.layers.forEach((L, i) => {
    L.canvas.toBlob(blob => {
      const a = document.createElement('a');
      a.href = URL.createObjectURL(blob);
      a.download = `layer-${i+1}-${L.name.replace(/\s+/g,'_')}.png`;
      a.click();
      URL.revokeObjectURL(a.href);
    });
  });
  setMsg('Exported ' + State.layers.length + ' layers');
}
function openFile(file) {
  const reader = new FileReader();
  reader.onload = ev => {
    const img = new Image();
    img.onload = () => newDocumentFromImage(img, file.name);
    img.src = ev.target.result;
  };
  reader.readAsDataURL(file);
}

//////////////////////////////////////////////////////////////////////
// INDEXEDDB PROJECT STORE
//////////////////////////////////////////////////////////////////////
function openDB() {
  return new Promise((res, rej) => {
    const req = indexedDB.open(DB_NAME, 1);
    req.onupgradeneeded = () => {
      const db = req.result;
      if (!db.objectStoreNames.contains(STORE_PROJECTS))
        db.createObjectStore(STORE_PROJECTS, { keyPath: 'name' });
    };
    req.onsuccess = () => res(req.result);
    req.onerror = () => rej(req.error);
  });
}
async function saveProject() {
  if (!State.doc.w) return;
  const name = prompt('Project name:', 'untitled');
  if (!name) return;
  const blob = await new Promise(r => bgCanvas.toBlob(r, 'image/png'));
  const db = await openDB();
  const tx = db.transaction(STORE_PROJECTS, 'readwrite');
  tx.objectStore(STORE_PROJECTS).put({ name, blob, w: State.doc.w, h: State.doc.h, saved: Date.now() });
  tx.oncomplete = () => {
    setMsg('Project saved to IndexedDB');
    const recents = JSON.parse(localStorage.getItem(LS_PREFIX + 'recents') || '[]');
    if (!recents.includes(name)) recents.unshift(name);
    localStorage.setItem(LS_PREFIX + 'recents', JSON.stringify(recents.slice(0, 10)));
  };
}
async function loadProject() {
  const db = await openDB();
  const tx = db.transaction(STORE_PROJECTS, 'readonly');
  const req = tx.objectStore(STORE_PROJECTS).getAll();
  req.onsuccess = () => {
    const projects = req.result;
    if (!projects.length) { setMsg('No saved projects'); return; }
    const list = projects.map((p,i) => `${i+1}. ${p.name} (${p.w}×${p.h})`).join('\n');
    const idx = prompt('Select project number:\n' + list);
    if (!idx) return;
    const p = projects[+idx - 1];
    if (!p) return;
    const img = new Image();
    img.onload = () => newDocumentFromImage(img, p.name);
    img.src = URL.createObjectURL(p.blob);
  };
}

let curvePoints = [];
function initCurves() {
  const c = $('curveC');
  const ctx = c.getContext('2d');
  curvePoints = [[0,255],[255,0]];
  function draw() {
    ctx.fillStyle = '#000'; ctx.fillRect(0,0,256,256);
    ctx.strokeStyle = '#1a2535'; ctx.lineWidth = 1;
    for (let i=0;i<=4;i++) {
      ctx.beginPath(); ctx.moveTo(i*64,0); ctx.lineTo(i*64,256); ctx.stroke();
      ctx.beginPath(); ctx.moveTo(0,i*64); ctx.lineTo(256,i*64); ctx.stroke();
    }
    ctx.strokeStyle = '#00d4ff'; ctx.lineWidth = 2;
    ctx.beginPath();
    ctx.moveTo(curvePoints[0][0], curvePoints[0][1]);
    for (const p of curvePoints) ctx.lineTo(p[0],p[1]);
    ctx.stroke();
    for (const p of curvePoints) {
      ctx.fillStyle = '#ff6600';
      ctx.beginPath(); ctx.arc(p[0],p[1],4,0,Math.PI*2); ctx.fill();
    }
  }
  draw();
  let dragging = -1;
  c.onmousedown = e => {
    const r = c.getBoundingClientRect();
    const x = (e.clientX-r.left)*(256/r.width);
    const y = (e.clientY-r.top)*(256/r.height);
    for (let i=0;i<curvePoints.length;i++) {
      if (Math.hypot(curvePoints[i][0]-x,curvePoints[i][1]-y) < 10) { dragging = i; return; }
    }
    curvePoints.push([x,y]);
    curvePoints.sort((a,b)=>a[0]-b[0]);
    dragging = curvePoints.findIndex(p=>p[0]===x&&p[1]===y);
    draw();
  };
  c.onmousemove = e => {
    if (dragging<0) return;
    const r = c.getBoundingClientRect();
    const x = clamp((e.clientX-r.left)*(256/r.width),0,255);
    const y = clamp((e.clientY-r.top)*(256/r.height),0,255);
    curvePoints[dragging] = [x,y];
    curvePoints.sort((a,b)=>a[0]-b[0]);
    dragging = curvePoints.findIndex(p=>p[0]===x&&p[1]===y);
    draw();
  };
  c.onmouseup = c.onmouseleave = () => { dragging = -1; };
  c.ondblclick = () => { curvePoints = [[0,255],[255,0]]; draw(); };
}
function buildCurveLUT(pts) {
  const lut = new Uint8ClampedArray(256);
  for (let x=0;x<256;x++) {
    // find segment
    let p0 = pts[0], p1 = pts[pts.length-1];
    for (let i=0;i<pts.length-1;i++) {
      if (x >= pts[i][0] && x <= pts[i+1][0]) { p0 = pts[i]; p1 = pts[i+1]; break; }
    }
    const t = (p1[0]-p0[0]) ? (x-p0[0])/(p1[0]-p0[0]) : 0;
    const y = p0[1] + (p1[1]-p0[1])*t;
    lut[x] = clamp(255 - y, 0, 255);
  }
  return lut;
}

//////////////////////////////////////////////////////////////////////
// MENU / ACTIONS
//////////////////////////////////////////////////////////////////////
const actions = {
  'new': dlgNew,
  'open': () => fileInput.click(),
  'paste': async () => {
    try {
      const items = await navigator.clipboard.read();
      for (const it of items) {
        for (const type of it.types) {
          if (type.startsWith('image/')) {
            const blob = await it.getType(type);
            const img = new Image();
            img.onload = () => newDocumentFromImage(img, 'Clipboard');
            img.src = URL.createObjectURL(blob);
            return;
          }
        }
      }
      setMsg('No image in clipboard');
    } catch (e) { setMsg('Clipboard permission denied'); }
  },
  'save-png': () => saveAs('png'),
  'save-jpg': () => saveAs('jpg'),
  'save-webp': () => saveAs('webp'),
  'export-layers': exportLayers,
  'save-project': saveProject,
  'load-project': loadProject,
  'undo': undo,
  'redo': redo,
  'cut': () => {
    const L = activeLayer();
    if (!L || !State.selection) return;
    const b = State.selection.bbox;
    State.clipboard = L.ctx.getImageData(b.x,b.y,b.w,b.h);
    L.ctx.clearRect(b.x,b.y,b.w,b.h);
    snapshot('Cut');
    renderAll();
  },
  'copy': () => {
    const L = activeLayer();
    if (!L) return;
    const b = State.selection ? State.selection.bbox : {x:0,y:0,w:L.canvas.width,h:L.canvas.height};
    State.clipboard = L.ctx.getImageData(b.x,b.y,b.w,b.h);
    setMsg('Copied');
  },
  'pasteInside': () => {
    if (!State.clipboard) return;
    const L = createLayer(State.doc.w, State.doc.h, 'Pasted');
    L.ctx.putImageData(State.clipboard, 0, 0);
    State.layers.push(L);
    State.activeLayerIdx = State.layers.length - 1;
    snapshot('Paste');
    renderAll();
  },
  'fill-fg': () => {
    const L = activeLayer(); if (!L) return;
    L.ctx.save();
    clipCtxToSelection(L.ctx);
    L.ctx.fillStyle = State.fg;
    L.ctx.fillRect(0,0,L.canvas.width,L.canvas.height);
    L.ctx.restore();
    snapshot('Fill FG');
    renderAll();
  },
  'fill-bg': () => {
    const L = activeLayer(); if (!L) return;
    L.ctx.save();
    clipCtxToSelection(L.ctx);
    L.ctx.fillStyle = State.bg;
    L.ctx.fillRect(0,0,L.canvas.width,L.canvas.height);
    L.ctx.restore();
    snapshot('Fill BG');
    renderAll();
  },
  'resize': dlgResize,
  'canvas-size': dlgCanvasSize,
  'flip-h': flipH,
  'flip-v': flipV,
  'rotate-90': () => rotate(90),
  'rotate-180': () => rotate(180),
  'rotate-270': () => rotate(270),
  'layer-new': () => {
    if (!State.doc.w) return;
    const L = createLayer(State.doc.w, State.doc.h, 'Layer ' + State.nextLayerId);
    State.layers.push(L);
    State.activeLayerIdx = State.layers.length - 1;
    snapshot('New Layer');
    renderAll();
  },
  'layer-duplicate': () => {
    const L = activeLayer(); if (!L) return;
    const nl = createLayer(L.canvas.width, L.canvas.height, L.name + ' copy');
    nl.ctx.drawImage(L.canvas, 0, 0);
    nl.opacity = L.opacity; nl.blend = L.blend;
    State.layers.splice(State.activeLayerIdx+1, 0, nl);
    State.activeLayerIdx++;
    snapshot('Duplicate Layer');
    renderAll();
  },
  'layer-delete': () => {
    if (State.layers.length <= 1) return;
    State.layers.splice(State.activeLayerIdx, 1);
    State.activeLayerIdx = Math.min(State.activeLayerIdx, State.layers.length - 1);
    snapshot('Delete Layer');
    renderAll();
  },
  'layer-up': () => {
    if (State.activeLayerIdx < State.layers.length - 1) {
      const i = State.activeLayerIdx;
      [State.layers[i], State.layers[i+1]] = [State.layers[i+1], State.layers[i]];
      State.activeLayerIdx++;
      snapshot('Bring Forward');
      renderAll();
    }
  },
  'layer-down': () => {
    if (State.activeLayerIdx > 0) {
      const i = State.activeLayerIdx;
      [State.layers[i], State.layers[i-1]] = [State.layers[i-1], State.layers[i]];
      State.activeLayerIdx--;
      snapshot('Send Backward');
      renderAll();
    }
  },
  'layer-merge-down': () => {
    if (State.activeLayerIdx <= 0) return;
    const up = State.layers[State.activeLayerIdx];
    const dn = State.layers[State.activeLayerIdx - 1];
    dn.ctx.globalAlpha = up.opacity;
    dn.ctx.globalCompositeOperation = up.blend;
    dn.ctx.drawImage(up.canvas, 0, 0);
    dn.ctx.globalAlpha = 1; dn.ctx.globalCompositeOperation = 'source-over';
    State.layers.splice(State.activeLayerIdx, 1);
    State.activeLayerIdx--;
    snapshot('Merge Down');
    renderAll();
  },
  'layer-flatten': () => {
    if (State.layers.length <= 1) return;
    const flat = createLayer(State.doc.w, State.doc.h, 'Background');
    flat.ctx.drawImage(bgCanvas, 0, 0);
    State.layers = [flat];
    State.activeLayerIdx = 0;
    snapshot('Flatten');
    renderAll();
  },
  'sel-all': () => { setRectSelection(0,0,State.doc.w,State.doc.h); renderComposite(); },
  'sel-none': () => { State.selection = null; renderComposite(); },
  'sel-inverse': () => {
    if (!State.selection) { setRectSelection(0,0,State.doc.w,State.doc.h); renderComposite(); return; }
    // scaffold: only inverts bbox with full doc – keeps simple axis-aligned semantics
    const b = State.selection.bbox;
    setRectSelection(0, 0, State.doc.w, State.doc.h);
    renderComposite();
    setMsg('Inverse (scaffold: full doc)');
  },
  'sel-feather': dlgFeather,
  'adj-bc': dlgBC,
  'adj-hsl': dlgHSL,
  'adj-levels': dlgLevels,
  'adj-curves': dlgCurves,
  'adj-balance': dlgBalance,
  'adj-invert': adjInvert,
  'adj-gray': adjGrayscale,
  'adj-sepia': adjSepia,
  'adj-threshold': dlgThreshold,
  'adj-posterize': dlgPosterize,
  'fil-gblur': dlgGBlur,
  'fil-bblur': dlgBBlur,
  'fil-sharpen': filSharpen,
  'fil-edge': filEdge,
  'fil-emboss': filEmboss,
  'fil-pixelate': dlgPixelate,
  'fil-noise': dlgNoise,
  'fil-vignette': dlgVignette,
  'fil-glow': filGlow,
  'fil-oil': filOil,
  'zoom-in': () => zoomBy(1.25),
  'zoom-out': () => zoomBy(0.8),
  'zoom-fit': fitToScreen,
  'zoom-100': () => { State.zoom = 1; State.panX=0; State.panY=0; applyTransform(); },
  'fullscreen': () => {
    if (!document.fullscreenElement) document.documentElement.requestFullscreen();
    else document.exitFullscreen();
  },
  'history-clear': () => {
    State.history = [State.history[State.historyIdx]];
    State.historyIdx = 0;
    renderHistory();
  }
};
function runAction(a) {
  if (actions[a]) actions[a]();
}

//////////////////////////////////////////////////////////////////////
// SWATCHES / COLOR PICKER
//////////////////////////////////////////////////////////////////////
function showColorPicker(which) {
  const startColor = which === 'fg' ? State.fg : State.bg;
  const presets = ['#000000','#ffffff','#ef4444','#ff6600','#fbbf24','#10b981','#00d4ff','#a78bfa',
                   '#050a0f','#333333','#7a8a9a','#e2e8f0','#ff0066','#ffff00','#00ff88','#0066ff'];
  showModal('Color Picker', `
    <div class="row" style="gap:12px">
      <div style="flex:1">
        <div class="cp-saturation" id="cpSat"><div class="cp-dot" id="cpSatDot"></div></div>
        <div class="cp-hue" id="cpHue"><div class="cp-hue-dot" id="cpHueDot"></div></div>
        <div style="display:flex;align-items:center;gap:10px">
          <div class="cp-preview" id="cpPrev" style="background:${startColor}"></div>
          <div style="flex:1">
            <div style="font-size:10px;color:var(--text-dim)">HEX</div>
            <input type="text" id="cpHex" value="${startColor}" style="width:100%">
          </div>
        </div>
      </div>
    </div>
    <div style="font-size:10px;color:var(--text-dim);margin-top:10px">Swatches</div>
    <div class="cp-swatches" id="cpSwatches">${presets.map(c=>`<div style="background:${c}" data-c="${c}"></div>`).join('')}</div>
  `, () => {
    const hex = $('cpHex').value;
    if (which === 'fg') { State.fg = hex; $('swatchFg').style.background = hex; }
    else { State.bg = hex; $('swatchBg').style.background = hex; }
  });
  setTimeout(() => {
    let h = 0, s = 1, v = 1;
    const sat = $('cpSat'), hue = $('cpHue'), sd = $('cpSatDot'), hd = $('cpHueDot');
    const prev = $('cpPrev'), hex = $('cpHex');
    function hsvToRgb(h,s,v){
      const i=Math.floor(h*6),f=h*6-i,p=v*(1-s),q=v*(1-f*s),t=v*(1-(1-f)*s);
      let r,g,b;
      switch(i%6){case 0:r=v;g=t;b=p;break;case 1:r=q;g=v;b=p;break;case 2:r=p;g=v;b=t;break;case 3:r=p;g=q;b=v;break;case 4:r=t;g=p;b=v;break;case 5:r=v;g=p;b=q;break;}
      return [Math.round(r*255),Math.round(g*255),Math.round(b*255)];
    }
    function update() {
      const [r,g,b] = hsvToRgb(h,s,v);
      const col = rgbToHex(r,g,b);
      hex.value = col; prev.style.background = col;
      sat.style.background = `linear-gradient(to top, #000, transparent), linear-gradient(to right, #fff, hsl(${h*360},100%,50%))`;
      sd.style.left = (s*100)+'%'; sd.style.top = ((1-v)*100)+'%';
      hd.style.left = (h*100)+'%';
    }
    sat.addEventListener('pointerdown', function (e) {
      const mv = ev => {
        const r = sat.getBoundingClientRect();
        s = clamp((ev.clientX-r.left)/r.width,0,1);
        v = clamp(1-(ev.clientY-r.top)/r.height,0,1);
        update();
      };
      mv(e);
      const up = () => { document.removeEventListener('pointermove',mv); document.removeEventListener('pointerup',up); };
      document.addEventListener('pointermove',mv); document.addEventListener('pointerup',up);
    });
    hue.addEventListener('pointerdown', function (e) {
      const mv = ev => {
        const r = hue.getBoundingClientRect();
        h = clamp((ev.clientX-r.left)/r.width,0,1);
        update();
      };
      mv(e);
      const up = () => { document.removeEventListener('pointermove',mv); document.removeEventListener('pointerup',up); };
      document.addEventListener('pointermove',mv); document.addEventListener('pointerup',up);
    });
    hex.oninput = e => { prev.style.background = e.target.value; };
    $('cpSwatches').querySelectorAll('div').forEach(el => {
      el.onclick = () => { hex.value = el.dataset.c; prev.style.background = el.dataset.c; };
    });
    update();
  }, 0);
}
$('swatchFg').onclick = () => showColorPicker('fg');
$('swatchBg').onclick = () => showColorPicker('bg');
$('swapColors').onclick = () => {
  [State.fg, State.bg] = [State.bg, State.fg];
  $('swatchFg').style.background = State.fg;
  $('swatchBg').style.background = State.bg;

//////////////////////////////////////////////////////////////////////
// DRAG DROP / FILE INPUT
//////////////////////////////////////////////////////////////////////
canvasArea.addEventListener('dragover', e => { e.preventDefault(); });
canvasArea.addEventListener('drop', e => {
  e.preventDefault();
  const f = e.dataTransfer.files[0];
  if (f && f.type.startsWith('image/')) openFile(f);
});
fileInput.onchange = e => {
  const f = e.target.files[0];
  if (f) openFile(f);
};
document.addEventListener('paste', e => {
  const items = e.clipboardData && e.clipboardData.items;
  if (!items) return;
  for (const it of items) {
    if (it.type.startsWith('image/')) {
      const f = it.getAsFile();
      openFile(f);
      return;
    }
  }
});

//////////////////////////////////////////////////////////////////////
// ZOOM — wheel/pinch/pan
//////////////////////////////////////////////////////////////////////
canvasArea.addEventListener('wheel', e => {
  e.preventDefault();
  if (e.ctrlKey || e.metaKey || !State.doc.w) {
    zoomBy(e.deltaY < 0 ? 1.1 : 0.9, e.clientX, e.clientY);
  } else {
    State.panX -= e.deltaX;
    State.panY -= e.deltaY;
    applyTransform();
  }
}, { passive: false });

// Space-drag pan
let spaceDown = false, panDrag = null;
window.addEventListener('keydown', e => { if (e.code === 'Space') spaceDown = true; });
window.addEventListener('keyup', e => { if (e.code === 'Space') spaceDown = false; });
canvasArea.addEventListener('pointerdown', e => {
  if (spaceDown || e.button === 1) { panDrag = { x: e.clientX, y: e.clientY, px: State.panX, py: State.panY }; e.preventDefault(); }
});
window.addEventListener('pointermove', e => {
  if (panDrag) {
    State.panX = panDrag.px + (e.clientX - panDrag.x);
    State.panY = panDrag.py + (e.clientY - panDrag.y);
    applyTransform();
  }
});
window.addEventListener('pointerup', () => { panDrag = null; });

// Pinch zoom
let pinch = null;
canvasArea.addEventListener('touchstart', e => {
  if (e.touches.length === 2) {
    const d = Math.hypot(e.touches[0].clientX-e.touches[1].clientX, e.touches[0].clientY-e.touches[1].clientY);
    pinch = { d, z: State.zoom };
  }
}, { passive: true });
canvasArea.addEventListener('touchmove', e => {
  if (e.touches.length === 2 && pinch) {
    const d = Math.hypot(e.touches[0].clientX-e.touches[1].clientX, e.touches[0].clientY-e.touches[1].clientY);
    State.zoom = clamp(pinch.z * (d/pinch.d), 0.05, 32);
    applyTransform();
  }
}, { passive: true });
canvasArea.addEventListener('touchend', () => { pinch = null; });

//////////////////////////////////////////////////////////////////////
// KEYBOARD
//////////////////////////////////////////////////////////////////////
window.addEventListener('keydown', e => {
  if (e.target.tagName === 'INPUT' || e.target.tagName === 'TEXTAREA') return;
  const mod = e.ctrlKey || e.metaKey;
  if (mod && e.key === 'z') { e.preventDefault(); undo(); return; }
  if (mod && (e.key === 'y' || (e.shiftKey && e.key === 'Z'))) { e.preventDefault(); redo(); return; }
  if (mod && e.key === 's') { e.preventDefault(); saveAs('png'); return; }
  if (mod && e.key === 'n') { e.preventDefault(); dlgNew(); return; }
  if (mod && e.key === 'o') { e.preventDefault(); fileInput.click(); return; }
  if (mod && e.key === 'a') { e.preventDefault(); runAction('sel-all'); return; }
  if (mod && e.key === 'd') { e.preventDefault(); runAction('sel-none'); return; }
  if (mod && e.key === 'c') { e.preventDefault(); runAction('copy'); return; }
  if (mod && e.key === 'x') { e.preventDefault(); runAction('cut'); return; }
  if (mod && e.key === 'v') { e.preventDefault(); runAction('pasteInside'); return; }
  const k = e.key.toLowerCase();
  const tools = { v:'move', m:'marquee', l:'lasso', w:'wand', c:'crop', i:'eyedrop',
                  b:'brush', e:'eraser', g:'bucket', t:'text', u:'shape', s:'clone',
                  o:'dodge', z:'zoom' };
  if (tools[k]) { setTool(tools[k]); return; }
  if (k === 'x') {
    [State.fg, State.bg] = [State.bg, State.fg];
    $('swatchFg').style.background = State.fg;
    $('swatchBg').style.background = State.bg;
  }
  if (k === '[') { State.brush.size = Math.max(1, State.brush.size - 2); renderToolOptions(); }
  if (k === ']') { State.brush.size = Math.min(500, State.brush.size + 2); renderToolOptions(); }
  if (k === '+' || k === '=') zoomBy(1.25);
  if (k === '-') zoomBy(0.8);
});

//////////////////////////////////////////////////////////////////////
// INIT
//////////////////////////////////////////////////////////////////////
function init() {
  setTool('move');
  applyTransform();
  // Initial state — empty doc, show hint
  window.addEventListener('resize', () => {
    if (State.doc.w) fitToScreen();
  });
  // Autosave reference
  const last = localStorage.getItem(LS_PREFIX + 'last-session');
  if (last) setMsg('Ready — previous session: ' + last);
}
init();

})();
