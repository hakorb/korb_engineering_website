<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
<title>Groove Street Pinball // Korb Engineering</title>
<meta name="description" content="1970s-themed pinball — avocado, harvest gold, and burnt orange. Left/right flippers, pop bumpers, drop targets, jackpot multiball.">
<link href="https://fonts.googleapis.com/css2?family=Bungee+Shade&family=Fredoka:wght@600;700&family=VT323&family=IBM+Plex+Mono:wght@400;500;700&display=swap" rel="stylesheet">
<style>
:root {
  --avocado: #4e6b2a;
  --avocado-dark: #2e4418;
  --harvest: #d99938;
  --harvest-dark: #8a5e1a;
  --burnt: #c44f1e;
  --burnt-dark: #7a2c0e;
  --brown: #5a3820;
  --brown-dark: #3a2010;
  --cream: #f0e3c4;
  --red: #c8202a;
  --pink: #e85d90;
  --teal: #2a8a90;
  --text: #f0e3c4;
}
* { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
html, body {
  background: var(--brown-dark); color: var(--text); min-height: 100dvh;
  font-family: 'IBM Plex Mono', monospace; font-size: 14px;
  overscroll-behavior: none;
}
body {
  padding: 8px; max-width: 720px; margin: 0 auto;
  background:
    repeating-linear-gradient(45deg, var(--brown-dark), var(--brown-dark) 30px, #2a1808 30px, #2a1808 60px);
  min-height: 100dvh;
}
a { color: var(--harvest); text-decoration: none; }
.back {
  display: inline-block; color: var(--harvest);
  font-size: 11px; letter-spacing: 2px; padding: 6px 10px;
  border: 1px solid var(--harvest-dark); border-radius: 3px; margin-bottom: 8px;
}
h1 {
  font-family: 'Bungee Shade', 'Fredoka', sans-serif;
  font-size: clamp(26px, 6vw, 38px); letter-spacing: 3px;
  text-align: center; margin-bottom: 0;
  background: linear-gradient(90deg, var(--harvest), var(--burnt), var(--pink), var(--harvest));
  -webkit-background-clip: text; background-clip: text; color: transparent;
  filter: drop-shadow(2px 2px 0 var(--brown-dark));
}
.sub {
  text-align: center; font-family: 'Fredoka', sans-serif;
  font-size: 10px; letter-spacing: 4px; color: var(--harvest);
  margin-bottom: 8px;
}

/* Cabinet */
.cabinet {
  background:
    linear-gradient(180deg, #a07540 0%, #6a4520 45%, #4a2a10 100%);
  border: 4px solid var(--brown-dark);
  border-radius: 14px;
  padding: 10px;
  box-shadow: 0 8px 30px rgba(0,0,0,0.6),
    inset 0 2px 4px rgba(255,220,160,0.3),
    inset 0 -4px 8px rgba(0,0,0,0.3);
}

/* Scoreboard */
.score-board {
  background: #000;
  border: 3px solid var(--harvest-dark);
  border-radius: 8px;
  padding: 10px 14px;
  margin-bottom: 10px;
  box-shadow: inset 0 0 20px rgba(255,100,0,0.3),
    0 2px 6px rgba(0,0,0,0.6);
  display: grid; grid-template-columns: 1fr auto; gap: 10px; align-items: center;
}
.score-digits {
  font-family: 'VT323', monospace;
  color: #ff7800; text-shadow: 0 0 10px #ff7800, 0 0 20px #ff4400;
  font-size: clamp(32px, 8vw, 48px); letter-spacing: 4px;
  font-variant-numeric: tabular-nums;
  background: #1a0800;
  padding: 4px 10px;
  border-radius: 3px;
  box-shadow: inset 0 0 14px #000;
}
.score-meta {
  font-family: 'Fredoka', sans-serif; font-size: 11px;
  display: flex; flex-direction: column; gap: 4px;
  color: var(--cream); letter-spacing: 2px;
}
.score-meta .balls {
  display: flex; gap: 3px; align-items: center;
}
.ball-indicator {
  width: 10px; height: 10px; border-radius: 50%;
  background: radial-gradient(circle at 30% 30%, #fff 0%, #bbb 50%, #444 100%);
  box-shadow: 0 0 6px #fff;
}
.ball-indicator.used { background: #333; box-shadow: none; }
.score-meta .jackpot {
  color: var(--pink); text-shadow: 0 0 8px var(--pink);
  font-weight: 700;
}

/* Playfield canvas */
#play {
  display: block; width: 100%; height: auto;
  background: linear-gradient(135deg, var(--avocado) 0%, var(--avocado-dark) 100%);
  border: 3px solid var(--brown-dark);
  border-radius: 6px;
  touch-action: none;
  user-select: none;
}

/* Controls */
.ctrls {
  display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 6px;
  margin-top: 8px;
}
.flipper-btn, .launch-btn {
  background: linear-gradient(180deg, var(--harvest), var(--harvest-dark));
  color: var(--brown-dark); border: 2px solid var(--brown-dark);
  padding: 14px; border-radius: 6px; cursor: pointer;
  font-family: 'Fredoka', sans-serif; font-weight: 700; font-size: 13px;
  letter-spacing: 2px; min-height: 48px;
  box-shadow: 0 3px 0 var(--brown-dark), 0 4px 6px rgba(0,0,0,0.3);
  touch-action: manipulation; user-select: none;
}
.flipper-btn:active, .launch-btn:active {
  transform: translateY(2px);
  box-shadow: 0 1px 0 var(--brown-dark), 0 2px 4px rgba(0,0,0,0.3);
}
.launch-btn { background: linear-gradient(180deg, var(--burnt), var(--burnt-dark)); color: var(--cream); }

.hint {
  text-align: center; color: var(--cream); font-size: 10px;
  letter-spacing: 2px; margin-top: 6px; opacity: 0.7;
}

/* Game over overlay */
.overlay {
  position: fixed; inset: 0; background: rgba(0,0,0,0.82); z-index: 100;
  display: flex; align-items: center; justify-content: center; padding: 20px;
}
.overlay .box {
  background: linear-gradient(135deg, var(--harvest), var(--burnt));
  border: 3px solid var(--brown-dark); border-radius: 12px;
  padding: 24px; max-width: 360px; text-align: center;
  box-shadow: 0 10px 30px rgba(0,0,0,0.8);
}
.overlay h2 {
  font-family: 'Bungee Shade', sans-serif; font-size: 32px;
  color: var(--brown-dark); letter-spacing: 3px; margin-bottom: 10px;
}
.overlay .score-final {
  font-family: 'VT323', monospace; font-size: 38px;
  color: var(--brown-dark); margin: 10px 0;
  letter-spacing: 3px;
}
.btn {
  background: var(--brown-dark); color: var(--cream); border: none;
  padding: 12px 20px; border-radius: 4px; cursor: pointer;
  font-family: 'Fredoka', sans-serif; font-size: 13px; letter-spacing: 2px;
  font-weight: 700; min-height: 44px; touch-action: manipulation; width: 100%;
}
.btn:hover { background: #2a1808; }
</style>
</head>
<body>

<a href="../../index.html#misc" class="back" target="_parent">&larr; BACK</a>
<h1>GROOVE STREET</h1>
<div class="sub">&bull; PINBALL &bull; 1978 &bull;</div>

<div class="cabinet">
  <div class="score-board">
    <div class="score-digits" id="score">0000000</div>
    <div class="score-meta">
      <div>BALL <span id="ball-num">1</span>/5</div>
      <div class="balls" id="balls-indicator"></div>
      <div class="jackpot" id="jackpot">JACKPOT 50,000</div>
    </div>
  </div>

  <canvas id="play" width="400" height="640"></canvas>

  <div class="ctrls">
    <button class="flipper-btn" id="flip-l">◀ FLIP</button>
    <button class="launch-btn" id="launch">LAUNCH</button>
    <button class="flipper-btn" id="flip-r">FLIP ▶</button>
  </div>
  <div class="hint">Desktop: ←/Z &bull; →/M &bull; SPACE to launch &bull; N to nudge</div>
</div>

<div id="overlay-root"></div>

<script>
(function(){
'use strict';

// ============================================================
// PLAYFIELD DIMENSIONS
// ============================================================
var W = 400, H = 640;
var canvas = document.getElementById('play');
var ctx = canvas.getContext('2d');

function resize(){
  var r = canvas.getBoundingClientRect();
  var dpr = Math.min(window.devicePixelRatio || 1, 2);
  canvas.width = W * dpr;
  canvas.height = H * dpr;
  canvas.style.width = r.width + 'px';
  canvas.style.height = (r.width * H / W) + 'px';
  ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
}
window.addEventListener('resize', resize);
resize();

// ============================================================
// GAME STATE
// ============================================================
var G = {
  score: 0,
  balls: 5,
  ballsUsed: 0,
  jackpot: 50000,
  multiballActive: false,
  state: 'ready', // ready, playing, drained, gameover
  ball: null,
  extraBalls: [], // for multiball
  flipL: false,
  flipR: false,
  flipLPos: 0, // 0 = rest, 1 = full
  flipRPos: 0,
  launchCharge: 0, // 0..1
  launching: false,
  nudgeTimer: 0,
  tiltCount: 0,
  lastFrame: 0,
  scoreFlash: 0,
};

// ============================================================
// PLAYFIELD ELEMENTS
// ============================================================
// Pop bumpers — circular, lots of bounce
var BUMPERS = [
  { x: 130, y: 200, r: 22, score: 500, flash: 0 },
  { x: 270, y: 200, r: 22, score: 500, flash: 0 },
  { x: 200, y: 140, r: 24, score: 1000, flash: 0 },
];

// Slingshots — triangular bumpers above flippers
var SLINGS = [
  { x1: 70, y1: 490, x2: 70, y2: 540, x3: 110, y3: 520, flash: 0, score: 250 },
  { x1: 330, y1: 490, x2: 330, y2: 540, x3: 290, y3: 520, flash: 0, score: 250 },
];

// Drop targets — hit them all for a jackpot round
var DROPS = [
  { x: 100, y: 320, w: 32, h: 14, down: false, flash: 0 },
  { x: 140, y: 320, w: 32, h: 14, down: false, flash: 0 },
  { x: 180, y: 320, w: 32, h: 14, down: false, flash: 0 },
  { x: 220, y: 320, w: 32, h: 14, down: false, flash: 0 },
  { x: 260, y: 320, w: 32, h: 14, down: false, flash: 0 },
];
var dropResetTimer = 0;

// Spinner — scores points when hit, spins
var SPINNER = { x: 200, y: 260, r: 10, rot: 0, spin: 0 };

// Top "rollover" lanes — hit them for multiplier
var ROLLOVERS = [
  { x: 80, y: 60, lit: false },
  { x: 160, y: 60, lit: false },
  { x: 240, y: 60, lit: false },
  { x: 320, y: 60, lit: false },
];
var multiplier = 1;

// Flippers — pivot points and lengths
var FLIPPER = {
  L: { px: 150, py: 580, len: 56, angleRest: 30, angleFlip: -40, angle: 30 },
  R: { px: 250, py: 580, len: 56, angleRest: 150, angleFlip: 220, angle: 150 },
};
// Note: angleRest for R is 150° so it points down-right; flipped becomes 220° (up-right)

// Outlane / inlane rails - simplified with walls
// Side walls + funnel at bottom

// Launch lane: a right-side channel
var LAUNCH_LANE_X = 375;

// ============================================================
// BALL
// ============================================================
function makeBall(x, y){
  return { x: x, y: y, vx: 0, vy: 0, r: 8 };
}

function spawnBallAtPlunger(){
  G.ball = makeBall(LAUNCH_LANE_X, H - 60);
  G.ball.vx = 0; G.ball.vy = 0;
  G.launchCharge = 0;
}

// ============================================================
// DRAW
// ============================================================
function draw(){
  // Playfield background — groovy radial
  var grd = ctx.createRadialGradient(W/2, 300, 50, W/2, 300, 400);
  grd.addColorStop(0, '#5e7d30');
  grd.addColorStop(0.6, '#3e5720');
  grd.addColorStop(1, '#2a3e15');
  ctx.fillStyle = grd;
  ctx.fillRect(0, 0, W, H);

  // Decorative starburst rays
  ctx.save();
  ctx.translate(W/2, 110);
  ctx.globalAlpha = 0.06;
  for(var r=0;r<12;r++){
    ctx.rotate(Math.PI / 6);
    ctx.beginPath();
    ctx.moveTo(0,0);
    ctx.lineTo(240, 0);
    ctx.lineTo(220, 18);
    ctx.closePath();
    ctx.fillStyle = '#ffd800';
    ctx.fill();
  }
  ctx.restore();

  // Outer walls
  drawOuterWalls();

  // Rollovers (top lanes)
  ROLLOVERS.forEach(function(ro){
    ctx.fillStyle = ro.lit ? '#ffe14b' : '#6a5a30';
    ctx.shadowColor = ro.lit ? '#ffd83d' : 'transparent';
    ctx.shadowBlur = ro.lit ? 14 : 0;
    ctx.beginPath();
    ctx.arc(ro.x, ro.y, 8, 0, Math.PI * 2);
    ctx.fill();
    ctx.shadowBlur = 0;
    ctx.strokeStyle = '#3a2810'; ctx.lineWidth = 2;
    ctx.stroke();
  });

  // Spinner
  SPINNER.rot += SPINNER.spin;
  SPINNER.spin *= 0.95;
  ctx.save();
  ctx.translate(SPINNER.x, SPINNER.y);
  ctx.rotate(SPINNER.rot);
  ctx.fillStyle = '#e85d90';
  ctx.fillRect(-SPINNER.r, -2, SPINNER.r * 2, 4);
  ctx.strokeStyle = '#3a2810'; ctx.lineWidth = 1;
  ctx.strokeRect(-SPINNER.r, -2, SPINNER.r * 2, 4);
  ctx.restore();

  // Bumpers (pop bumpers)
  BUMPERS.forEach(function(b){
    if(b.flash > 0) b.flash--;
    var flashing = b.flash > 0;
    // Outer ring
    ctx.beginPath();
    ctx.arc(b.x, b.y, b.r + 4, 0, Math.PI * 2);
    ctx.fillStyle = flashing ? '#fff' : '#c44f1e';
    ctx.shadowColor = flashing ? '#fff' : '#c44f1e';
    ctx.shadowBlur = flashing ? 20 : 10;
    ctx.fill();
    ctx.shadowBlur = 0;
    // Inner circle
    ctx.beginPath();
    ctx.arc(b.x, b.y, b.r, 0, Math.PI * 2);
    ctx.fillStyle = flashing ? '#ffe14b' : '#d99938';
    ctx.fill();
    ctx.strokeStyle = '#3a2810'; ctx.lineWidth = 2;
    ctx.stroke();
    // Center cap
    ctx.beginPath();
    ctx.arc(b.x, b.y, 6, 0, Math.PI * 2);
    ctx.fillStyle = flashing ? '#fff' : '#c44f1e';
    ctx.fill();
  });

  // Slingshots (triangles)
  SLINGS.forEach(function(sl){
    if(sl.flash > 0) sl.flash--;
    var flashing = sl.flash > 0;
    ctx.beginPath();
    ctx.moveTo(sl.x1, sl.y1);
    ctx.lineTo(sl.x2, sl.y2);
    ctx.lineTo(sl.x3, sl.y3);
    ctx.closePath();
    ctx.fillStyle = flashing ? '#ffe14b' : '#e85d90';
    ctx.shadowColor = flashing ? '#fff' : '#e85d90';
    ctx.shadowBlur = flashing ? 14 : 6;
    ctx.fill();
    ctx.shadowBlur = 0;
    ctx.strokeStyle = '#3a2810'; ctx.lineWidth = 2;
    ctx.stroke();
  });

  // Drop targets
  DROPS.forEach(function(d){
    if(d.flash > 0) d.flash--;
    if(d.down){
      ctx.fillStyle = '#4a2810';
      ctx.fillRect(d.x, d.y + 8, d.w, 4);
    } else {
      ctx.fillStyle = d.flash > 0 ? '#ffe14b' : '#2a8a90';
      ctx.fillRect(d.x, d.y, d.w, d.h);
      ctx.strokeStyle = '#0a2a2c'; ctx.lineWidth = 2;
      ctx.strokeRect(d.x, d.y, d.w, d.h);
      ctx.fillStyle = '#fff';
      ctx.font = 'bold 9px "Fredoka", sans-serif';
      ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
      ctx.fillText((DROPS.indexOf(d) + 1).toString(), d.x + d.w/2, d.y + d.h/2);
    }
  });

  // Flippers
  drawFlipper('L');
  drawFlipper('R');

  // Launch plunger area
  ctx.fillStyle = '#4a2810';
  ctx.fillRect(LAUNCH_LANE_X - 8, H - 60 - 20 - 30, 16, 30);
  var plungerHeight = 30 - G.launchCharge * 20;
  ctx.fillStyle = G.launching ? '#ffe14b' : '#c44f1e';
  ctx.fillRect(LAUNCH_LANE_X - 6, H - 60 - 20 - 30 + (30 - plungerHeight), 12, plungerHeight);

  // Ball
  if(G.ball){
    drawBall(G.ball);
  }
  G.extraBalls.forEach(drawBall);

  // Multiplier indicator
  ctx.fillStyle = '#ffe14b';
  ctx.font = 'bold 14px "Fredoka", sans-serif';
  ctx.textAlign = 'center';
  ctx.fillText(multiplier + 'X', W/2, 28);

  // Drain indicator lines
  ctx.strokeStyle = '#3a2810';
  ctx.lineWidth = 2;
  ctx.beginPath();
  // Outlane left
  ctx.moveTo(30, 540); ctx.lineTo(100, 560); ctx.lineTo(130, H + 20);
  // Inlane divider
  ctx.moveTo(100, 560); ctx.lineTo(150, 580);
  // Right inlane/outlane
  ctx.moveTo(300, 560); ctx.lineTo(250, 580);
  ctx.moveTo(370, 540); ctx.lineTo(300, 560); ctx.lineTo(270, H + 20);
  ctx.stroke();
}

function drawOuterWalls(){
  ctx.strokeStyle = '#5a3820';
  ctx.lineWidth = 6;
  ctx.beginPath();
  // Top-left arc
  ctx.moveTo(15, 120);
  ctx.lineTo(15, H - 100);
  ctx.stroke();
  // Top-right arc
  ctx.beginPath();
  ctx.moveTo(385, 120);
  ctx.lineTo(385, H - 100);
  ctx.stroke();
  // Top curve (apex)
  ctx.beginPath();
  ctx.moveTo(15, 120);
  ctx.quadraticCurveTo(200, 10, 385, 120);
  ctx.stroke();
  // Launch lane divider (right side inside wall)
  ctx.beginPath();
  ctx.moveTo(360, 90);
  ctx.lineTo(360, H - 100);
  ctx.stroke();
}

function drawFlipper(which){
  var f = FLIPPER[which];
  ctx.save();
  ctx.translate(f.px, f.py);
  ctx.rotate(f.angle * Math.PI / 180);
  ctx.fillStyle = '#d99938';
  ctx.strokeStyle = '#3a2810';
  ctx.lineWidth = 2;
  ctx.beginPath();
  ctx.moveTo(0, 0);
  ctx.lineTo(f.len, -6);
  ctx.lineTo(f.len, 6);
  ctx.closePath();
  ctx.fill();
  ctx.stroke();
  // Pivot cap
  ctx.beginPath();
  ctx.arc(0, 0, 5, 0, Math.PI * 2);
  ctx.fillStyle = '#3a2810';
  ctx.fill();
  ctx.restore();
}

function drawBall(b){
  var grd = ctx.createRadialGradient(b.x - 3, b.y - 3, 1, b.x, b.y, b.r);
  grd.addColorStop(0, '#fff');
  grd.addColorStop(0.4, '#ccc');
  grd.addColorStop(1, '#444');
  ctx.fillStyle = grd;
  ctx.beginPath();
  ctx.arc(b.x, b.y, b.r, 0, Math.PI * 2);
  ctx.fill();
  ctx.strokeStyle = '#222'; ctx.lineWidth = 0.5;
  ctx.stroke();
}

// ============================================================
// PHYSICS
// ============================================================
function tick(dt){
  // Update flipper angles
  var speed = 600 * dt;
  if(G.flipL && FLIPPER.L.angle > FLIPPER.L.angleFlip){
    FLIPPER.L.angle -= speed;
    if(FLIPPER.L.angle < FLIPPER.L.angleFlip) FLIPPER.L.angle = FLIPPER.L.angleFlip;
  } else if(!G.flipL && FLIPPER.L.angle < FLIPPER.L.angleRest){
    FLIPPER.L.angle += 300 * dt;
    if(FLIPPER.L.angle > FLIPPER.L.angleRest) FLIPPER.L.angle = FLIPPER.L.angleRest;
  }
  if(G.flipR && FLIPPER.R.angle < FLIPPER.R.angleFlip){
    FLIPPER.R.angle += speed;
    if(FLIPPER.R.angle > FLIPPER.R.angleFlip) FLIPPER.R.angle = FLIPPER.R.angleFlip;
  } else if(!G.flipR && FLIPPER.R.angle > FLIPPER.R.angleRest){
    FLIPPER.R.angle -= 300 * dt;
    if(FLIPPER.R.angle < FLIPPER.R.angleRest) FLIPPER.R.angle = FLIPPER.R.angleRest;
  }

  // Launch plunger
  if(G.launching){
    G.launchCharge = Math.min(1, G.launchCharge + dt * 1.5);
  }

  // Ball physics
  if(G.ball) updateBall(G.ball, dt);
  G.extraBalls.forEach(function(b){ updateBall(b, dt); });
  G.extraBalls = G.extraBalls.filter(function(b){ return b.y < H + 40; });

  // Drop target reset when all down
  if(dropResetTimer > 0){
    dropResetTimer -= dt;
    if(dropResetTimer <= 0){
      DROPS.forEach(function(d){ d.down = false; });
    }
  }
  var allDown = DROPS.every(function(d){ return d.down; });
  if(allDown && dropResetTimer <= 0){
    dropResetTimer = 2.5;
    scorePoints(10000);
    // Trigger multiball
    if(!G.multiballActive){
      G.multiballActive = true;
      G.extraBalls.push(makeBall(200, 100));
      G.extraBalls[G.extraBalls.length - 1].vy = 100;
      G.extraBalls[G.extraBalls.length - 1].vx = -60;
      G.extraBalls.push(makeBall(200, 100));
      G.extraBalls[G.extraBalls.length - 1].vy = 100;
      G.extraBalls[G.extraBalls.length - 1].vx = 60;
      flashScore();
    }
  }

  // Rollover completion — if all lit, bump multiplier
  if(ROLLOVERS.every(function(r){ return r.lit; })){
    ROLLOVERS.forEach(function(r){ r.lit = false; });
    multiplier = Math.min(multiplier + 1, 5);
    scorePoints(2000);
  }

  // Nudge decay
  if(G.nudgeTimer > 0) G.nudgeTimer -= dt;
  if(G.tiltCount > 0) G.tiltCount = Math.max(0, G.tiltCount - dt * 0.5);
}

function updateBall(b, dt){
  if(!b) return;
  // Gravity (down the table)
  b.vy += 800 * dt;
  // Air friction
  b.vx *= 0.998; b.vy *= 0.998;
  // Tilted table — slight curvature toward center
  // (skip for simplicity)

  // Nudge impulse
  if(G.nudgeTimer > 0){
    b.vx += Math.sin(Date.now() * 0.05) * 4;
  }

  b.x += b.vx * dt;
  b.y += b.vy * dt;

  // Walls — top curve approximated as rectangle top
  if(b.x < 20 + b.r) { b.x = 20 + b.r; b.vx = Math.abs(b.vx) * 0.85; }
  if(b.x > 380 - b.r && b.x < LAUNCH_LANE_X - 12) { b.x = 380 - b.r; b.vx = -Math.abs(b.vx) * 0.85; }
  // Launch lane wall
  if(b.x > LAUNCH_LANE_X - b.r - 12 && b.x < LAUNCH_LANE_X + 12){
    // Inside launch lane
    if(b.x > 388 - b.r) { b.x = 388 - b.r; b.vx = -Math.abs(b.vx) * 0.8; }
  }
  // Top wall
  if(b.y < 20 + b.r && b.x > 20 && b.x < 380) { b.y = 20 + b.r; b.vy = Math.abs(b.vy) * 0.85; }
  // Top curve — if in upper area and outside inner rectangle, clip
  if(b.y < 120){
    var dx = b.x - 200, dy = b.y - 120;
    var dist = Math.sqrt(dx*dx + dy*dy);
    var maxD = 200 - b.r;
    if(dist > maxD && dy < 0){
      var nx = dx/dist, ny = dy/dist;
      b.x = 200 + nx * maxD;
      b.y = 120 + ny * maxD;
      var vn = b.vx * nx + b.vy * ny;
      if(vn > 0){ b.vx -= 1.75 * vn * nx; b.vy -= 1.75 * vn * ny; }
    }
  }

  // Bumpers
  BUMPERS.forEach(function(bu){
    var dx = b.x - bu.x, dy = b.y - bu.y;
    var d = Math.sqrt(dx*dx + dy*dy);
    if(d < bu.r + b.r){
      var nx = dx/d, ny = dy/d;
      b.x = bu.x + nx * (bu.r + b.r);
      b.y = bu.y + ny * (bu.r + b.r);
      var vn = b.vx * nx + b.vy * ny;
      if(vn < 0){
        b.vx -= 2 * vn * nx;
        b.vy -= 2 * vn * ny;
        // Pop bumper adds extra kick
        b.vx *= 1.15; b.vy *= 1.15;
        bu.flash = 10;
        scorePoints(bu.score);
      }
    }
  });

  // Slingshots (triangles) — treat as 3 line segments
  SLINGS.forEach(function(sl){
    var hit = collideTriangle(b, sl);
    if(hit){
      sl.flash = 8;
      scorePoints(sl.score);
      b.vx *= 1.4; b.vy *= 1.4;
    }
  });

  // Drop targets
  DROPS.forEach(function(d){
    if(d.down) return;
    if(b.x > d.x - b.r && b.x < d.x + d.w + b.r && b.y > d.y - b.r && b.y < d.y + d.h + b.r){
      // Bounce off bottom/top
      b.vy = -Math.abs(b.vy) * 0.8;
      b.y = d.y - b.r;
      d.down = true; d.flash = 6;
      scorePoints(1500);
    }
  });

  // Spinner
  var sdx = b.x - SPINNER.x, sdy = b.y - SPINNER.y;
  var sd = Math.sqrt(sdx*sdx + sdy*sdy);
  if(sd < SPINNER.r + b.r + 2 && !SPINNER._justHit){
    SPINNER.spin = Math.sign(b.vx) * 0.4 + 0.2;
    SPINNER._justHit = true;
    scorePoints(300);
    setTimeout(function(){ SPINNER._justHit = false; }, 150);
  }

  // Rollovers
  ROLLOVERS.forEach(function(ro){
    var dx = b.x - ro.x, dy = b.y - ro.y;
    if(Math.sqrt(dx*dx + dy*dy) < 12 && !ro.lit){
      ro.lit = true;
      scorePoints(500);
    }
  });

  // Flippers — collision with line + bat end
  flipperCollision(b, 'L');
  flipperCollision(b, 'R');

  // Walls/rails at bottom inlanes
  // Left outer rail: approximate line from (30, 540) to (130, H+20)
  collideLineSeg(b, 30, 540, 100, 560);
  collideLineSeg(b, 100, 560, 130, H + 20);
  // Inlane divider left
  collideLineSeg(b, 100, 560, 150, 580);
  // Inlane divider right
  collideLineSeg(b, 300, 560, 250, 580);
  // Right outer rail
  collideLineSeg(b, 370, 540, 300, 560);
  collideLineSeg(b, 300, 560, 270, H + 20);

  // Drain
  if(b.y > H + 20){
    if(b === G.ball){
      onDrain();
    }
    // Extra balls drop silently from multiball
  }
}

function collideLineSeg(b, x1, y1, x2, y2){
  var dx = x2 - x1, dy = y2 - y1;
  var lenSq = dx*dx + dy*dy;
  if(lenSq === 0) return;
  var t = ((b.x - x1) * dx + (b.y - y1) * dy) / lenSq;
  t = Math.max(0, Math.min(1, t));
  var cx = x1 + t * dx, cy = y1 + t * dy;
  var nx = b.x - cx, ny = b.y - cy;
  var dist = Math.sqrt(nx*nx + ny*ny);
  if(dist < b.r && dist > 0){
    nx /= dist; ny /= dist;
    b.x = cx + nx * b.r;
    b.y = cy + ny * b.r;
    var vn = b.vx * nx + b.vy * ny;
    if(vn < 0){
      b.vx -= 1.75 * vn * nx;
      b.vy -= 1.75 * vn * ny;
    }
  }
}

function collideTriangle(b, tri){
  var hit = false;
  [[tri.x1,tri.y1,tri.x2,tri.y2],[tri.x2,tri.y2,tri.x3,tri.y3],[tri.x3,tri.y3,tri.x1,tri.y1]].forEach(function(e){
    var before = { x: b.x, y: b.y, vx: b.vx, vy: b.vy };
    collideLineSeg(b, e[0], e[1], e[2], e[3]);
    if(before.vx !== b.vx || before.vy !== b.vy) hit = true;
  });
  return hit;
}

function flipperCollision(b, which){
  var f = FLIPPER[which];
  var ang = f.angle * Math.PI / 180;
  var x2 = f.px + Math.cos(ang) * f.len;
  var y2 = f.py + Math.sin(ang) * f.len;
  // Collide with line segment
  var beforeVx = b.vx, beforeVy = b.vy;
  collideLineSeg(b, f.px, f.py, x2, y2);
  // Collide with pivot and tip as small circles
  var pdx = b.x - f.px, pdy = b.y - f.py;
  var pd = Math.sqrt(pdx*pdx + pdy*pdy);
  if(pd < 5 + b.r){
    var nx = pdx/pd, ny = pdy/pd;
    b.x = f.px + nx * (5 + b.r); b.y = f.py + ny * (5 + b.r);
    var vn = b.vx * nx + b.vy * ny;
    if(vn < 0){ b.vx -= 2 * vn * nx; b.vy -= 2 * vn * ny; }
  }
  // If flipper is actively flipping and ball in contact, add impulse
  var activeFlip = (which === 'L' && G.flipL && f.angle > f.angleFlip + 2) || (which === 'R' && G.flipR && f.angle < f.angleFlip - 2);
  if(activeFlip){
    // Project ball onto flipper line
    var dx = x2 - f.px, dy = y2 - f.py;
    var lenSq = dx*dx + dy*dy;
    var t = ((b.x - f.px) * dx + (b.y - f.py) * dy) / lenSq;
    if(t >= 0 && t <= 1){
      var cx = f.px + t*dx, cy = f.py + t*dy;
      var distSq = (b.x-cx)*(b.x-cx) + (b.y-cy)*(b.y-cy);
      if(distSq < (b.r + 4) * (b.r + 4)){
        // Apply tangential impulse scaled by distance from pivot
        var tangDir = which === 'L' ? 1 : -1;
        var boost = 280 * t;
        b.vx += Math.cos(ang + Math.PI/2 * tangDir) * boost * 0.02;
        b.vy += Math.sin(ang + Math.PI/2 * tangDir) * boost * 0.02;
        b.vy -= 250; // Upward kick
      }
    }
  }
}

// ============================================================
// SCORING / EVENTS
// ============================================================
function scorePoints(n){
  G.score += n * multiplier * (G.multiballActive ? 2 : 1);
  updateScore();
  flashScore();
}
function flashScore(){ G.scoreFlash = 10; }
function updateScore(){
  document.getElementById('score').textContent = G.score.toString().padStart(7, '0');
}
function updateBalls(){
  var el = document.getElementById('balls-indicator');
  el.innerHTML = '';
  for(var i=0;i<5;i++){
    var d = document.createElement('div');
    d.className = 'ball-indicator' + (i < G.ballsUsed ? ' used' : '');
    el.appendChild(d);
  }
  document.getElementById('ball-num').textContent = Math.min(5, G.ballsUsed + 1);
}
function onDrain(){
  if(G.multiballActive && G.extraBalls.length > 0){
    // During multiball, just remove the main ball — continue with extras
    G.ball = G.extraBalls.shift();
    return;
  }
  G.multiballActive = false;
  G.ballsUsed++;
  updateBalls();
  G.ball = null;
  if(G.ballsUsed >= G.balls){
    // Game over
    setTimeout(showGameOver, 400);
    G.state = 'gameover';
  } else {
    G.state = 'ready';
    multiplier = 1;
    spawnBallAtPlunger();
  }
}

function showGameOver(){
  var high = parseInt(localStorage.getItem('korb_pinball_high') || '0', 10);
  if(G.score > high){
    localStorage.setItem('korb_pinball_high', G.score);
    high = G.score;
  }
  document.getElementById('overlay-root').innerHTML =
    '<div class="overlay"><div class="box">' +
      '<h2>GAME OVER</h2>' +
      '<div class="score-final">' + G.score.toLocaleString() + '</div>' +
      '<div style="color:var(--brown-dark);font-size:13px;letter-spacing:2px;font-weight:700">HIGH SCORE: ' + high.toLocaleString() + '</div>' +
      '<button class="btn" id="over-restart" style="margin-top:14px">PLAY AGAIN</button>' +
    '</div></div>';
  document.getElementById('over-restart').addEventListener('click', function(){
    document.getElementById('overlay-root').innerHTML = '';
    restart();
  });
}

function restart(){
  G.score = 0;
  G.balls = 5;
  G.ballsUsed = 0;
  G.state = 'ready';
  G.multiballActive = false;
  G.extraBalls = [];
  DROPS.forEach(function(d){ d.down = false; });
  ROLLOVERS.forEach(function(r){ r.lit = false; });
  multiplier = 1;
  updateScore(); updateBalls();
  spawnBallAtPlunger();
}

// ============================================================
// INPUT
// ============================================================
function setFlipL(v){ G.flipL = v; }
function setFlipR(v){ G.flipR = v; }

window.addEventListener('keydown', function(e){
  if(e.key === 'ArrowLeft' || e.key === 'z' || e.key === 'Z') setFlipL(true);
  if(e.key === 'ArrowRight' || e.key === 'm' || e.key === 'M') setFlipR(true);
  if(e.key === ' '){ G.launching = true; e.preventDefault(); }
  if(e.key === 'n' || e.key === 'N'){ G.nudgeTimer = 0.2; G.tiltCount += 1; }
});
window.addEventListener('keyup', function(e){
  if(e.key === 'ArrowLeft' || e.key === 'z' || e.key === 'Z') setFlipL(false);
  if(e.key === 'ArrowRight' || e.key === 'm' || e.key === 'M') setFlipR(false);
  if(e.key === ' '){ releaseLaunch(); }
});

document.getElementById('flip-l').addEventListener('pointerdown', function(e){ e.preventDefault(); setFlipL(true); });
document.getElementById('flip-l').addEventListener('pointerup', function(){ setFlipL(false); });
document.getElementById('flip-l').addEventListener('pointercancel', function(){ setFlipL(false); });
document.getElementById('flip-r').addEventListener('pointerdown', function(e){ e.preventDefault(); setFlipR(true); });
document.getElementById('flip-r').addEventListener('pointerup', function(){ setFlipR(false); });
document.getElementById('flip-r').addEventListener('pointercancel', function(){ setFlipR(false); });
document.getElementById('launch').addEventListener('pointerdown', function(e){ e.preventDefault(); G.launching = true; });
document.getElementById('launch').addEventListener('pointerup', releaseLaunch);
document.getElementById('launch').addEventListener('pointercancel', releaseLaunch);

function releaseLaunch(){
  if(G.launching && G.ball && G.state === 'ready'){
    G.ball.vy = -400 - G.launchCharge * 600;
    G.state = 'playing';
  }
  G.launching = false;
  G.launchCharge = 0;
}

// ============================================================
// LOOP
// ============================================================
function loop(ts){
  if(!G.lastFrame) G.lastFrame = ts;
  var dt = Math.min(0.033, (ts - G.lastFrame) / 1000);
  G.lastFrame = ts;
  tick(dt);
  draw();
  requestAnimationFrame(loop);
}

// Init
updateScore(); updateBalls();
spawnBallAtPlunger();
requestAnimationFrame(loop);

})();
</script>
