<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
<meta name="description" content="Korb Engineering Studios — a free, browser-based productivity tool from Korb Engineering. No signup, no downloads, works on mobile.">
  <title>Korb Engineering Studios</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:       #1a1a1a;
      --surface:  #242424;
      --surface2: #2e2e2e;
      --border:   #383838;
      --text:     #f0f0f0;
      --muted:    #888;
      --accent:   #CC0000;
      --accent-h: #e60000;
      --viz-h:    64px;
      --player-h: 80px;
    }

    html, body {
      height: 100%;
      background: var(--bg);
      color: var(--text);
      font-family: 'Inter', system-ui, sans-serif;
      font-size: 15px;
      line-height: 1.5;
    }

    #app {
      max-width: 780px;
      margin: 0 auto;
      padding: 40px 20px 40px;
      transition: padding-bottom 0.2s;
    }
    #app.player-open     { padding-bottom: calc(var(--player-h) + 40px); }
    #app.visualizer-open { padding-bottom: calc(var(--viz-h) + var(--player-h) + 40px); }

    /* -- Header -- */
    header { margin-bottom: 36px; }

    header h1 {
      font-size: 1.8rem;
      font-weight: 700;
      letter-spacing: -0.02em;
    }
    header h1 span { color: var(--accent); }

    header .tagline {
      color: var(--muted);
      margin-top: 5px;
      font-size: 0.88rem;
      font-style: italic;
    }

    /* -- Episode Manager Toggle -- */
    #manager-toggle {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 16px;
    }
    #manager-toggle button {
      background: var(--surface);
      color: var(--text);
      border: 1px solid var(--border);
      border-radius: 6px;
      padding: 8px 16px;
      font-size: 0.85rem;
      font-weight: 600;
      font-family: inherit;
      cursor: pointer;
      transition: background 0.15s, border-color 0.15s;
      display: flex;
      align-items: center;
      gap: 8px;
    }
    #manager-toggle button:hover {
      background: var(--surface2);
      border-color: #555;
    }
    #manager-toggle button.active {
      border-color: var(--accent);
      background: #2a1010;
    }
    #manager-toggle button svg {
      width: 16px;
      height: 16px;
      fill: currentColor;
    }

    /* -- Episode Manager Panel -- */
    #episode-manager {
      display: none;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 20px;
      margin-bottom: 20px;
    }
    #episode-manager.visible { display: block; }

    #episode-manager h2 {
      font-size: 1rem;
      font-weight: 600;
      margin-bottom: 16px;
      color: var(--accent);
    }

    .mgr-form { display: flex; flex-direction: column; gap: 12px; }

    .mgr-row {
      display: flex;
      gap: 12px;
      flex-wrap: wrap;
    }

    .mgr-field {
      display: flex;
      flex-direction: column;
      gap: 4px;
      flex: 1;
      min-width: 180px;
    }
    .mgr-field label {
      font-size: 0.75rem;
      font-weight: 600;
      color: var(--muted);
      text-transform: uppercase;
      letter-spacing: 0.06em;
    }
    .mgr-field input[type="text"],
    .mgr-field input[type="date"],
    .mgr-field textarea {
      background: var(--bg);
      color: var(--text);
      border: 1px solid var(--border);
      border-radius: 4px;
      padding: 8px 10px;
      font-size: 0.88rem;
      font-family: inherit;
      outline: none;
      transition: border-color 0.15s;
    }
    .mgr-field input:focus,
    .mgr-field textarea:focus {
      border-color: var(--accent);
    }
    .mgr-field textarea {
      resize: vertical;
      min-height: 60px;
    }

    .mgr-file-area {
      display: flex;
      flex-direction: column;
      gap: 6px;
    }
    .mgr-file-label {
      font-size: 0.75rem;
      font-weight: 600;
      color: var(--muted);
      text-transform: uppercase;
      letter-spacing: 0.06em;
    }
    .mgr-file-drop {
      background: var(--bg);
      border: 2px dashed var(--border);
      border-radius: 6px;
      padding: 16px;
      text-align: center;
      cursor: pointer;
      transition: border-color 0.15s, background 0.15s;
      font-size: 0.83rem;
      color: var(--muted);
    }
    .mgr-file-drop:hover,
    .mgr-file-drop.dragover {
      border-color: var(--accent);
      background: #2a1010;
    }
    .mgr-file-drop input[type="file"] { display: none; }
    .mgr-file-name {
      font-size: 0.8rem;
      color: var(--text);
      margin-top: 4px;
    }

    .mgr-actions {
      display: flex;
      gap: 10px;
      margin-top: 4px;
    }
    .mgr-btn {
      background: var(--accent);
      color: #fff;
      border: none;
      border-radius: 5px;
      padding: 8px 18px;
      font-size: 0.85rem;
      font-weight: 600;
      font-family: inherit;
      cursor: pointer;
      transition: background 0.15s;
    }
    .mgr-btn:hover { background: var(--accent-h); }
    .mgr-btn:disabled {
      opacity: 0.4;
      cursor: not-allowed;
    }
    .mgr-btn.secondary {
      background: var(--surface2);
      color: var(--text);
      border: 1px solid var(--border);
    }
    .mgr-btn.secondary:hover {
      background: var(--border);
    }

    .mgr-status {
      font-size: 0.8rem;
      color: var(--muted);
      min-height: 1.2em;
    }
    .mgr-status.success { color: #4caf50; }
    .mgr-status.error { color: var(--accent); }

    /* -- Episode list -- */
    #episode-list { display: flex; flex-direction: column; gap: 12px; }

    .ep-card {
      display: flex;
      align-items: flex-start;
      gap: 16px;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 18px;
      cursor: pointer;
      transition: border-color 0.15s, background 0.15s;
      position: relative;
    }
    .ep-card:hover  { background: var(--surface2); border-color: #555; }
    .ep-card.active { border-color: var(--accent); background: #2a1010; }

    .ep-thumb {
      flex-shrink: 0;
      width: 64px; height: 64px;
      border-radius: 6px;
      background: var(--surface2);
      overflow: hidden;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 1.6rem;
    }
    .ep-thumb img { width: 100%; height: 100%; object-fit: cover; }

    .ep-info { flex: 1; min-width: 0; }

    .ep-meta {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 5px;
      flex-wrap: wrap;
    }
    .ep-num {
      font-size: 0.68rem;
      font-weight: 700;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: var(--accent);
      background: #3a0a0a;
      padding: 2px 7px;
      border-radius: 3px;
    }
    .ep-date { font-size: 0.78rem; color: var(--muted); }
    .ep-dur  { font-size: 0.78rem; color: var(--muted); margin-left: auto; }

    .ep-title {
      font-size: 1rem;
      font-weight: 600;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      margin-bottom: 4px;
    }
    .ep-desc {
      font-size: 0.83rem;
      color: var(--muted);
      display: -webkit-box;
      -webkit-line-clamp: 2;
      -webkit-box-orient: vertical;
      overflow: hidden;
    }

    .ep-play-btn {
      flex-shrink: 0;
      align-self: center;
      width: 36px; height: 36px;
      border-radius: 50%;
      background: var(--accent);
      border: none;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: background 0.15s, transform 0.1s;
    }
    .ep-play-btn:hover { background: var(--accent-h); transform: scale(1.08); }
    .ep-play-btn svg { fill: #fff; width: 14px; height: 14px; }

    /* -- Episode card action buttons (edit/delete) -- */
    .ep-actions {
      position: absolute;
      top: 8px;
      right: 8px;
      display: none;
      gap: 4px;
      z-index: 5;
    }
    .ep-card:hover .ep-actions,
    .ep-card .ep-actions.force-show { display: flex; }

    .ep-action-btn {
      width: 28px; height: 28px;
      border-radius: 4px;
      border: none;
      background: var(--surface2);
      color: var(--muted);
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: background 0.12s, color 0.12s;
    }
    .ep-action-btn:hover {
      background: var(--border);
      color: var(--text);
    }
    .ep-action-btn.delete:hover {
      background: #4a1515;
      color: var(--accent);
    }
    .ep-action-btn svg { width: 14px; height: 14px; fill: currentColor; }

    /* -- Visualizer strip -- */
    #viz-bar {
      position: fixed;
      bottom: var(--player-h);
      left: 0; right: 0;
      height: var(--viz-h);
      background: #0a0a0a;
      border-top: 1px solid #222;
      display: none;
      z-index: 99;
    }
    #viz-bar.visible { display: block; }
    #viz-canvas { width: 100%; height: 100%; display: block; }

    /* -- Player bar -- */
    #player-bar {
      position: fixed;
      bottom: 0; left: 0; right: 0;
      height: var(--player-h);
      background: #111;
      border-top: 1px solid var(--border);
      display: none;
      align-items: center;
      padding: 0 20px;
      gap: 16px;
      z-index: 100;
    }
    #player-bar.visible { display: flex; }

    #player-info {
      display: flex;
      align-items: center;
      gap: 10px;
      flex: 1 1 180px;
      max-width: 260px;
      min-width: 0;
    }
    #player-thumb {
      flex-shrink: 0;
      width: 44px; height: 44px;
      border-radius: 4px;
      background: var(--surface2);
      overflow: hidden;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 1.2rem;
    }
    #player-thumb img { width: 100%; height: 100%; object-fit: cover; }

    #player-title-wrap { min-width: 0; }
    #player-ep-num {
      font-size: 0.64rem;
      font-weight: 700;
      color: var(--accent);
      text-transform: uppercase;
      letter-spacing: 0.07em;
    }
    #player-title {
      font-size: 0.85rem;
      font-weight: 600;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      max-width: 190px;
    }

    #player-controls {
      display: flex;
      align-items: center;
      gap: 8px;
      flex-shrink: 0;
    }

    .ctrl-btn {
      background: none;
      border: none;
      cursor: pointer;
      color: var(--text);
      display: flex;
      align-items: center;
      justify-content: center;
      border-radius: 50%;
      width: 34px; height: 34px;
      transition: background 0.12s;
      padding: 0;
    }
    .ctrl-btn:hover { background: var(--surface2); }

    #btn-play-pause {
      width: 44px; height: 44px;
      background: var(--accent);
      color: #fff;
      position: relative;
    }
    #btn-play-pause:hover { background: var(--accent-h); }

    #player-seek-area {
      flex: 1 1 200px;
      min-width: 100px;
    }
    #seek-row {
      display: flex;
      align-items: center;
      gap: 8px;
    }
    .time-label {
      font-size: 0.7rem;
      color: var(--muted);
      white-space: nowrap;
      font-variant-numeric: tabular-nums;
    }

    input[type=range] {
      -webkit-appearance: none;
      appearance: none;
      height: 4px;
      border-radius: 2px;
      background: var(--surface2);
      background-image: linear-gradient(var(--accent), var(--accent));
      background-size: 0% 100%;
      background-repeat: no-repeat;
      outline: none;
      cursor: pointer;
      flex: 1;
    }
    input[type=range]::-webkit-slider-thumb {
      -webkit-appearance: none;
      width: 12px; height: 12px;
      border-radius: 50%;
      background: var(--accent);
      cursor: pointer;
      transition: transform 0.1s;
    }
    input[type=range]::-webkit-slider-thumb:hover { transform: scale(1.35); }
    input[type=range]::-moz-range-thumb {
      width: 12px; height: 12px;
      border-radius: 50%;
      background: var(--accent);
      border: none;
      cursor: pointer;
    }

    #player-extras {
      display: flex;
      align-items: center;
      gap: 10px;
      flex-shrink: 0;
    }
    #vol-group { display: flex; align-items: center; gap: 6px; }
    #vol-bar { width: 72px; }

    #speed-select {
      background: var(--surface2);
      color: var(--text);
      border: 1px solid var(--border);
      border-radius: 4px;
      padding: 3px 6px;
      font-size: 0.78rem;
      cursor: pointer;
      font-family: inherit;
    }
    #speed-select:focus { outline: 1px solid var(--accent); }

    #loading-indicator {
      position: absolute;
      inset: 0;
      display: none;
      align-items: center;
      justify-content: center;
      border-radius: 50%;
      background: var(--accent);
    }
    .spinner {
      width: 18px; height: 18px;
      border: 2px solid rgba(255,255,255,0.3);
      border-top-color: #fff;
      border-radius: 50%;
      animation: spin 0.7s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* -- Confirm dialog overlay -- */
    .confirm-overlay {
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.6);
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 200;
    }
    .confirm-box {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 24px;
      max-width: 380px;
      width: 90%;
      text-align: center;
    }
    .confirm-box p {
      margin-bottom: 18px;
      font-size: 0.92rem;
    }
    .confirm-box .confirm-actions {
      display: flex;
      gap: 10px;
      justify-content: center;
    }

    /* -- Korb Engineering badge -- */
    #ke-badge {
      position: fixed;
      bottom: 12px;
      right: 12px;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 6px;
      padding: 6px 12px;
      font-size: 0.7rem;
      font-weight: 600;
      color: var(--muted);
      z-index: 150;
      text-decoration: none;
      transition: border-color 0.15s, color 0.15s;
      letter-spacing: 0.03em;
    }
    #ke-badge:hover {
      border-color: var(--accent);
      color: var(--text);
    }
    #ke-badge span { color: var(--accent); }

    /* Shift badge up when player is visible */
    #player-bar.visible ~ #ke-badge {
      bottom: calc(var(--player-h) + 12px);
    }

    /* -- Responsive -- */
    @media (max-width: 600px) {
      #player-info  { max-width: 130px; flex: 0 1 130px; }
      #player-title { max-width: 110px; }
      #player-extras { display: none; }
      #player-bar { gap: 8px; padding: 0 12px; }
      .ep-dur { display: none; }
      .mgr-row { flex-direction: column; }
      .mgr-field { min-width: 0; }
    }
    @media (max-width: 420px) { #player-info { display: none; } }
  </style>
</head>
<body>

<div id="app">
  <header>
    <h1>Korb <span>Engineering</span> Studios</h1>
    <p class="tagline">A podcast made for my big sister Blake &lt;3</p>
  </header>

  <!-- Episode Manager Toggle -->
  <div id="manager-toggle">
    <button id="btn-toggle-manager" aria-label="Toggle episode manager">
      <svg viewBox="0 0 24 24"><path d="M19.14 12.94c.04-.31.06-.63.06-.94 0-.31-.02-.63-.06-.94l2.03-1.58a.49.49 0 00.12-.61l-1.92-3.32a.49.49 0 00-.59-.22l-2.39.96c-.5-.38-1.03-.7-1.62-.94l-.36-2.54a.484.484 0 00-.48-.41h-3.84c-.24 0-.43.17-.47.41l-.36 2.54c-.59.24-1.13.57-1.62.94l-2.39-.96a.49.49 0 00-.59.22L2.74 8.87c-.12.21-.08.47.12.61l2.03 1.58c-.04.31-.06.63-.06.94s.02.63.06.94l-2.03 1.58a.49.49 0 00-.12.61l1.92 3.32c.12.22.37.29.59.22l2.39-.96c.5.38 1.03.7 1.62.94l.36 2.54c.05.24.24.41.48.41h3.84c.24 0 .44-.17.47-.41l.36-2.54c.59-.24 1.13-.56 1.62-.94l2.39.96c.22.08.47 0 .59-.22l1.92-3.32c.12-.22.07-.47-.12-.61l-2.01-1.58zM12 15.6A3.6 3.6 0 1112 8.4a3.6 3.6 0 010 7.2z"/></svg>
      Episode Manager
    </button>
  </div>

  <!-- Episode Manager Panel -->
  <div id="episode-manager">
    <h2>Add / Edit Episode</h2>
    <div class="mgr-form">
      <div class="mgr-row">
        <div class="mgr-field">
          <label for="mgr-title">Title</label>
          <input type="text" id="mgr-title" placeholder="Episode title..." />
        </div>
        <div class="mgr-field" style="max-width:180px;">
          <label for="mgr-date">Date</label>
          <input type="date" id="mgr-date" />
        </div>
      </div>
      <div class="mgr-field">
        <label for="mgr-desc">Description</label>
        <textarea id="mgr-desc" placeholder="Brief episode description..."></textarea>
      </div>
      <div class="mgr-file-area">
        <span class="mgr-file-label">Audio File (.mp3)</span>
        <div class="mgr-file-drop" id="mgr-file-drop">
          Click or drag an .mp3 file here
          <input type="file" id="mgr-file-input" accept=".mp3,audio/mpeg" />
        </div>
        <div class="mgr-file-name" id="mgr-file-name"></div>
      </div>
      <div class="mgr-actions">
        <button class="mgr-btn" id="mgr-save-btn" disabled>Save Episode</button>
        <button class="mgr-btn secondary" id="mgr-cancel-btn" style="display:none;">Cancel Edit</button>
      </div>
      <div class="mgr-status" id="mgr-status"></div>
    </div>
  </div>

  <div id="episode-list"></div>
</div>

<!-- Visualizer strip -->
<div id="viz-bar">
  <canvas id="viz-canvas"></canvas>
</div>

<!-- Player bar -->
<div id="player-bar" role="region" aria-label="Audio player">

  <div id="player-info">
    <div id="player-thumb">🎙</div>
    <div id="player-title-wrap">
      <div id="player-ep-num"></div>
      <div id="player-title">No episode selected</div>
    </div>
  </div>

  <div id="player-controls">
    <button class="ctrl-btn" id="btn-prev" title="Previous" aria-label="Previous episode">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="currentColor"><path d="M6 6h2v12H6zm3.5 6 8.5 6V6z"/></svg>
    </button>

    <button class="ctrl-btn" id="btn-play-pause" title="Play / Pause" aria-label="Play or pause">
      <svg id="icon-play" width="20" height="20" viewBox="0 0 24 24" fill="currentColor"><path d="M8 5v14l11-7z"/></svg>
      <svg id="icon-pause" width="20" height="20" viewBox="0 0 24 24" fill="currentColor" style="display:none"><path d="M6 19h4V5H6zm8-14v14h4V5z"/></svg>
      <div id="loading-indicator"><div class="spinner"></div></div>
    </button>

    <button class="ctrl-btn" id="btn-next" title="Next" aria-label="Next episode">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="currentColor"><path d="M6 18l8.5-6L6 6v12zm2-8.14L11.03 12 8 14.14V9.86zM16 6h2v12h-2z"/></svg>
    </button>
  </div>

  <div id="player-seek-area">
    <div id="seek-row">
      <span class="time-label" id="time-current">0:00</span>
      <input type="range" id="seek-bar" min="0" max="100" value="0" step="0.1" aria-label="Seek" />
      <span class="time-label" id="time-total">0:00</span>
    </div>
  </div>

  <div id="player-extras">
    <div id="vol-group">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="currentColor" style="color:var(--muted);flex-shrink:0">
        <path d="M3 9v6h4l5 5V4L7 9H3zm13.5 3c0-1.77-1.02-3.29-2.5-4.03v8.05c1.48-.73 2.5-2.25 2.5-4.02z"/>
      </svg>
      <input type="range" id="vol-bar" min="0" max="1" step="0.01" value="1" aria-label="Volume" />
    </div>
    <select id="speed-select" aria-label="Playback speed">
      <option value="0.75">0.75x</option>
      <option value="1" selected>1x</option>
      <option value="1.25">1.25x</option>
      <option value="1.5">1.5x</option>
      <option value="2">2x</option>
    </select>
  </div>

</div>

<!-- Korb Engineering badge -->
<a id="ke-badge" href="../../index.html">Korb <span>Engineering</span></a>

<!-- No crossorigin attr -- avoids CORS failures on CDN audio sources -->
<audio id="audio-el" preload="metadata"></audio>

<script>
(function () {
  'use strict';

  // ================================================================
  // DEFAULT EPISODES (SoundHelix demos)
  // ================================================================
  const DEFAULT_EPISODES = [
    {
      id: 'default-1',
      title: "Getting Started with Distributed Systems",
      date: "2026-03-01",
      duration: "38:47",
      description: "We explore the fundamentals of distributed systems, covering CAP theorem, consistency models, and why building reliable software at scale is harder than it looks.",
      audioUrl: "https://www.soundhelix.com/examples/mp3/SoundHelix-Song-1.mp3",
      thumbnail: "",
      isDefault: true
    },
    {

  const DB_NAME = 'KESPodcastDB';
  const DB_VERSION = 1;
  const STORE_NAME = 'audioBlobs';
  const META_KEY = 'kes_episode_meta';

  // ================================================================
  // IndexedDB helpers
  // ================================================================
  function openDB() {
    return new Promise((resolve, reject) => {
      const req = indexedDB.open(DB_NAME, DB_VERSION);
      req.onupgradeneeded = () => {
        const db = req.result;
        if (!db.objectStoreNames.contains(STORE_NAME)) {
          db.createObjectStore(STORE_NAME);
        }
      };
      req.onsuccess = () => resolve(req.result);
      req.onerror = () => reject(req.error);
    });
  }

  function dbPut(key, value) {
    return openDB().then(db => new Promise((resolve, reject) => {
      const tx = db.transaction(STORE_NAME, 'readwrite');
      tx.objectStore(STORE_NAME).put(value, key);
      tx.oncomplete = () => { db.close(); resolve(); };
      tx.onerror = () => { db.close(); reject(tx.error); };
    }));
  }

  function dbGet(key) {
    return openDB().then(db => new Promise((resolve, reject) => {
      const tx = db.transaction(STORE_NAME, 'readonly');
      const req = tx.objectStore(STORE_NAME).get(key);
      req.onsuccess = () => { db.close(); resolve(req.result); };
      req.onerror = () => { db.close(); reject(req.error); };
    }));
  }

  function dbDelete(key) {
    return openDB().then(db => new Promise((resolve, reject) => {
      const tx = db.transaction(STORE_NAME, 'readwrite');
      tx.objectStore(STORE_NAME).delete(key);
      tx.oncomplete = () => { db.close(); resolve(); };
      tx.onerror = () => { db.close(); reject(tx.error); };
    }));
  }

  // ================================================================
  // Episode metadata persistence (localStorage)
  // ================================================================
  function loadEpisodeMeta() {
    try {
      const raw = localStorage.getItem(META_KEY);
      if (raw) return JSON.parse(raw);
    } catch (_) {}
    return null;
  }

  function saveEpisodeMeta(list) {
    try {
      localStorage.setItem(META_KEY, JSON.stringify(list));
    } catch (_) {}
  }

      episodes = saved;
    } else {

      saveEpisodeMeta(episodes);
    }
  }

  // ================================================================
  // Helpers
  // ================================================================
  function fmt(secs) {
    if (!secs || isNaN(secs)) return '0:00';
    const s  = Math.floor(secs);
    const m  = Math.floor(s / 60);
    const h  = Math.floor(m / 60);
    const ss = String(s % 60).padStart(2, '0');
    const mm = h ? String(m % 60).padStart(2, '0') : m;
    return h ? `${h}:${mm}:${ss}` : `${mm}:${ss}`;
  }

  function storageKey(id) { return `kes_pos_${id}`; }
  function savePos(ep, t) { try { localStorage.setItem(storageKey(ep.id), t); } catch (_) {} }
  function loadPos(ep)    { try { return parseFloat(localStorage.getItem(storageKey(ep.id))) || 0; } catch (_) { return 0; } }

  function setFill(input) {
    const pct = ((parseFloat(input.value) - parseFloat(input.min || 0)) /
                 (parseFloat(input.max || 100) - parseFloat(input.min || 0))) * 100;
    input.style.backgroundSize = `${Math.max(0, Math.min(100, pct))}% 100%`;
  }

  function esc(s) {
    return String(s)
      .replace(/&/g, '&amp;').replace(/</g, '&lt;')
      .replace(/>/g, '&gt;').replace(/"/g, '&quot;');
  }

  function fmtDate(str) {
    if (!str) return '';
    return new Date(str + 'T00:00:00').toLocaleDateString(undefined, {
      year: 'numeric', month: 'short', day: 'numeric'
    });
  }

  function generateId() {
    return 'ep-' + Date.now() + '-' + Math.random().toString(36).substr(2, 6);
  }

  function todayStr() {
    const d = new Date();
    return d.getFullYear() + '-' + String(d.getMonth()+1).padStart(2,'0') + '-' + String(d.getDate()).padStart(2,'0');
  }

  // ================================================================
  // Visualizer
  // ================================================================
  let audioCtx = null;
  let analyser  = null;
  let rafId     = null;
  const peaks   = [];

  function initAudioGraph() {
    if (state.vizReady || !(window.AudioContext || window.webkitAudioContext)) return;
    try {
      audioCtx = new (window.AudioContext || window.webkitAudioContext)();
      analyser  = audioCtx.createAnalyser();
      analyser.fftSize = 256;
      analyser.smoothingTimeConstant = 0.82;
      const src = audioCtx.createMediaElementSource(audio);
      src.connect(analyser);
      analyser.connect(audioCtx.destination);
      state.vizReady = true;
    } catch (e) {
      analyser = null;
      if (audioCtx) { audioCtx.close(); audioCtx = null; }
    }
  }

  const ctx2d = vizCanvas.getContext('2d');

  function resizeCanvas() {
    const dpr = devicePixelRatio || 1;
    vizCanvas.width  = vizBar.offsetWidth  * dpr;
    vizCanvas.height = vizBar.offsetHeight * dpr;
    ctx2d.setTransform(dpr, 0, 0, dpr, 0, 0);
  }

  function drawFrame() {
    rafId = requestAnimationFrame(drawFrame);

    const W = vizBar.offsetWidth;
    const H = vizBar.offsetHeight;
    if (!W || !H) return;
    if (vizCanvas.width !== W * (devicePixelRatio || 1)) resizeCanvas();

    ctx2d.clearRect(0, 0, W, H);

    const NUM_BARS = 64;
    const gap      = 2;
    const barW     = (W - gap * (NUM_BARS - 1)) / NUM_BARS;

    if (analyser && state.playing) {
      const bufLen = analyser.frequencyBinCount;
      const data   = new Uint8Array(bufLen);
      analyser.getByteFrequencyData(data);

      const binStep = Math.max(1, Math.floor(bufLen * 0.7 / NUM_BARS));
      while (peaks.length < NUM_BARS) peaks.push(0);

      for (let i = 0; i < NUM_BARS; i++) {
        let sum = 0;
        for (let b = 0; b < binStep; b++) sum += (data[i * binStep + b] || 0);
        const norm = (sum / binStep) / 255;
        const barH = Math.max(2, norm * H * 0.92);
        const x    = i * (barW + gap);

        peaks[i] = barH > peaks[i] ? barH : Math.max(2, peaks[i] - 0.9);

        const grad = ctx2d.createLinearGradient(0, H, 0, 0);
        grad.addColorStop(0,    '#00ff41');
        grad.addColorStop(0.55, '#00dd30');
        grad.addColorStop(0.75, '#ffe000');
        grad.addColorStop(1,    '#ff2200');

        ctx2d.shadowBlur  = norm > 0.55 ? 10 : 5;
        ctx2d.shadowColor = '#00ff4199';
        ctx2d.fillStyle   = grad;
        ctx2d.fillRect(x, H - barH, barW, barH);

        ctx2d.shadowBlur  = 14;
        ctx2d.shadowColor = '#00ff41';
        ctx2d.fillStyle   = '#fff';
        ctx2d.fillRect(x, H - peaks[i] - 2, barW, 2);

        ctx2d.shadowBlur = 0;
      }
    } else {
      const t = Date.now() / 1000;
      for (let i = 0; i < NUM_BARS; i++) {
        const wave = Math.sin(t * 1.4 + i * 0.28) * 0.5 + 0.5;
        const barH = 2 + wave * 5;
        const x    = i * (barW + gap);
        ctx2d.shadowBlur  = 4;
        ctx2d.shadowColor = '#00ff4155';
        ctx2d.fillStyle   = `rgba(0,255,65,${0.12 + wave * 0.18})`;
        ctx2d.fillRect(x, H - barH, barW, barH);
        ctx2d.shadowBlur  = 0;
      }
    }

    ctx2d.fillStyle = 'rgba(0,0,0,0.07)';
    for (let y = 0; y < H; y += 2) ctx2d.fillRect(0, y, W, 1);
  }

  function startViz() {
    vizBar.classList.add('visible');
    appEl.classList.add('visualizer-open');
    if (!rafId) { resizeCanvas(); drawFrame(); }
  }

  window.addEventListener('resize', () => {
    if (vizBar.classList.contains('visible')) resizeCanvas();
  });

  // ================================================================
  // Episode Manager
  // ================================================================
  mgrDate.value = todayStr();

  btnToggleMgr.addEventListener('click', () => {
    const showing = managerPanel.classList.toggle('visible');
    btnToggleMgr.classList.toggle('active', showing);
  });

  // File drop zone
  mgrFileDrop.addEventListener('click', () => mgrFileInput.click());
  mgrFileDrop.addEventListener('dragover', (e) => { e.preventDefault(); mgrFileDrop.classList.add('dragover'); });
  mgrFileDrop.addEventListener('dragleave', () => mgrFileDrop.classList.remove('dragover'));
  mgrFileDrop.addEventListener('drop', (e) => {
    e.preventDefault();
    mgrFileDrop.classList.remove('dragover');
    const file = e.dataTransfer.files[0];
    if (file && (file.type === 'audio/mpeg' || file.name.endsWith('.mp3'))) {
      setPendingFile(file);
    } else {
      setStatus('Please drop an .mp3 file', 'error');
    }
  });
  mgrFileInput.addEventListener('change', () => {
    if (mgrFileInput.files[0]) setPendingFile(mgrFileInput.files[0]);
  });

  function setPendingFile(file) {
    pendingFile = file;
    mgrFileName.textContent = file.name + ' (' + (file.size / (1024*1024)).toFixed(1) + ' MB)';
    validateForm();
  }

  function validateForm() {
    const hasTitle = mgrTitle.value.trim().length > 0;
    const hasAudio = pendingFile !== null || state.editingId !== null;
    mgrSaveBtn.disabled = !(hasTitle && hasAudio);
  }

  mgrTitle.addEventListener('input', validateForm);

  function setStatus(msg, type) {
    mgrStatus.textContent = msg;
    mgrStatus.className = 'mgr-status' + (type ? ' ' + type : '');
  }

  function resetForm() {
    mgrTitle.value = '';
    mgrDesc.value = '';
    mgrDate.value = todayStr();
    mgrFileInput.value = '';
    mgrFileName.textContent = '';
    pendingFile = null;
    state.editingId = null;
    mgrSaveBtn.textContent = 'Save Episode';
    mgrSaveBtn.disabled = true;
    mgrCancelBtn.style.display = 'none';
    mgrFileDrop.innerHTML = 'Click or drag an .mp3 file here<input type="file" id="mgr-file-input" accept=".mp3,audio/mpeg" style="display:none" />';
    // Re-bind the new file input
    const newInput = mgrFileDrop.querySelector('input[type="file"]');
    newInput.addEventListener('change', () => {
      if (newInput.files[0]) setPendingFile(newInput.files[0]);
    });
  }

  mgrCancelBtn.addEventListener('click', () => {
    resetForm();
    setStatus('');
  });

  // Save (add or update)
  mgrSaveBtn.addEventListener('click', async () => {
    const title = mgrTitle.value.trim();
    const desc = mgrDesc.value.trim();
    const date = mgrDate.value || todayStr();

    if (!title) return;

    mgrSaveBtn.disabled = true;
    setStatus('Saving...', '');

    try {
      if (state.editingId !== null) {
        // Update existing episode
        const ep = episodes.find(e => e.id === state.editingId);
        if (!ep) { setStatus('Episode not found', 'error'); return; }

        ep.title = title;
        ep.description = desc;
        ep.date = date;

        if (pendingFile) {
          // Read file and compute duration
          const blob = pendingFile;
          const duration = await getAudioDuration(blob);
          ep.duration = fmt(duration);

          if (ep.isDefault) {
            // Converting from default to user-uploaded
            ep.isDefault = false;
            ep.audioUrl = null;
          }
          await dbPut(ep.id, blob);
        }

        saveEpisodeMeta(episodes);
        setStatus('Episode updated!', 'success');
      } else {
        // Add new episode
        if (!pendingFile) { setStatus('Please select an audio file', 'error'); return; }

        const id = generateId();
        const blob = pendingFile;
        const duration = await getAudioDuration(blob);

        const ep = {
          id: id,
          title: title,
          date: date,
          duration: fmt(duration),
          description: desc,
          audioUrl: null,
          thumbnail: '',
          isDefault: false
        };

        await dbPut(id, blob);
        episodes.push(ep);
        saveEpisodeMeta(episodes);
        setStatus('Episode added!', 'success');
      }

      resetForm();
      renderList();
    } catch (err) {
      console.error('Save error:', err);
      setStatus('Error saving episode: ' + err.message, 'error');
      mgrSaveBtn.disabled = false;
    }
  });

  function getAudioDuration(blob) {
    return new Promise((resolve) => {
      const url = URL.createObjectURL(blob);
      const tmpAudio = new Audio();
      tmpAudio.preload = 'metadata';
      tmpAudio.src = url;
      tmpAudio.addEventListener('loadedmetadata', () => {
        const dur = tmpAudio.duration;
        URL.revokeObjectURL(url);
        resolve(isFinite(dur) ? dur : 0);
      });
      tmpAudio.addEventListener('error', () => {
        URL.revokeObjectURL(url);
        resolve(0);
      });
    });
  }

  // Edit episode
  function editEpisode(id) {
    const ep = episodes.find(e => e.id === id);
    if (!ep) return;

    state.editingId = id;
    mgrTitle.value = ep.title;
    mgrDesc.value = ep.description || '';
    mgrDate.value = ep.date || todayStr();
    pendingFile = null;
    mgrFileName.textContent = '';
    mgrFileInput.value = '';
    mgrFileDrop.innerHTML = 'Click or drag to replace audio (optional)<input type="file" accept=".mp3,audio/mpeg" style="display:none" />';
    const newInput = mgrFileDrop.querySelector('input[type="file"]');
    newInput.addEventListener('change', () => {
      if (newInput.files[0]) setPendingFile(newInput.files[0]);
    });

    mgrSaveBtn.textContent = 'Update Episode';
    mgrSaveBtn.disabled = false;
    mgrCancelBtn.style.display = '';

    // Show manager if hidden
    if (!managerPanel.classList.contains('visible')) {
      managerPanel.classList.add('visible');
      btnToggleMgr.classList.add('active');
    }

    mgrTitle.focus();
    setStatus('Editing: ' + ep.title, '');
  }

  // Delete episode (with confirmation)
  function deleteEpisode(id) {
    const ep = episodes.find(e => e.id === id);
    if (!ep) return;

    showConfirm(`Delete "${ep.title}"?`, async () => {
      // If currently playing this episode, stop
      const idx = episodes.indexOf(ep);
      if (state.currentIndex === idx) {
        audio.pause();
        audio.src = '';
        state.currentIndex = null;
        state.playing = false;
        playerBar.classList.remove('visible');
        vizBar.classList.remove('visible');
        appEl.classList.remove('player-open', 'visualizer-open');
        showPlayIcon();
      } else if (state.currentIndex !== null && idx < state.currentIndex) {
        state.currentIndex--;
      }

      // Remove from list
      episodes.splice(idx, 1);
      saveEpisodeMeta(episodes);

      // Remove audio blob if user-uploaded
      if (!ep.isDefault) {
        try { await dbDelete(ep.id); } catch (_) {}
      }

      // Remove saved position
      try { localStorage.removeItem(storageKey(ep.id)); } catch (_) {}

      // If editing this one, cancel
      if (state.editingId === id) resetForm();

      renderList();
    });
  }

  // Confirm dialog
  function showConfirm(message, onYes) {
    const overlay = document.createElement('div');
    overlay.className = 'confirm-overlay';
    overlay.innerHTML = `
      <div class="confirm-box">
        <p>${esc(message)}</p>
        <div class="confirm-actions">
          <button class="mgr-btn" id="confirm-yes">Delete</button>
          <button class="mgr-btn secondary" id="confirm-no">Cancel</button>
        </div>
      </div>
    `;
    document.body.appendChild(overlay);

    overlay.querySelector('#confirm-yes').addEventListener('click', () => {
      document.body.removeChild(overlay);
      onYes();
    });
    overlay.querySelector('#confirm-no').addEventListener('click', () => {
      document.body.removeChild(overlay);
    });
    overlay.addEventListener('click', (e) => {
      if (e.target === overlay) document.body.removeChild(overlay);
    });
  }

  // ================================================================
  // Render episode list
  // ================================================================
  function renderList() {
    listEl.innerHTML = '';
    episodes.forEach((ep, idx) => {
      const card = document.createElement('div');
      card.className = 'ep-card';
      if (state.currentIndex === idx) card.classList.add('active');
      card.setAttribute('role', 'button');
      card.setAttribute('tabindex', '0');
      card.setAttribute('aria-label', `Play episode: ${ep.title}`);

      const epNum = idx + 1;

      card.innerHTML = `
        <div class="ep-actions">
          <button class="ep-action-btn edit" title="Edit episode" aria-label="Edit episode">
            <svg viewBox="0 0 24 24"><path d="M3 17.25V21h3.75L17.81 9.94l-3.75-3.75L3 17.25zM20.71 7.04a1.003 1.003 0 000-1.42l-2.34-2.34a1.003 1.003 0 00-1.42 0l-1.83 1.83 3.75 3.75 1.84-1.82z"/></svg>
          </button>
          <button class="ep-action-btn delete" title="Delete episode" aria-label="Delete episode">
            <svg viewBox="0 0 24 24"><path d="M6 19c0 1.1.9 2 2 2h8c1.1 0 2-.9 2-2V7H6v12zM19 4h-3.5l-1-1h-5l-1 1H5v2h14V4z"/></svg>
          </button>
        </div>
        <div class="ep-thumb">${ep.thumbnail ? `<img src="${esc(ep.thumbnail)}" alt="">` : '🎙'}</div>
        <div class="ep-info">
          <div class="ep-meta">
            <span class="ep-num">EP ${epNum}</span>
            <span class="ep-date">${fmtDate(ep.date)}</span>
            <span class="ep-dur">${esc(ep.duration)}</span>
          </div>
          <div class="ep-title">${esc(ep.title)}</div>
          <div class="ep-desc">${esc(ep.description)}</div>
        </div>
        <button class="ep-play-btn" tabindex="-1" aria-hidden="true">
          <svg viewBox="0 0 24 24"><path d="M8 5v14l11-7z"/></svg>
        </button>
      `;

      // Edit button
      card.querySelector('.ep-action-btn.edit').addEventListener('click', (e) => {
        e.stopPropagation();
        editEpisode(ep.id);
      });

      // Delete button
      card.querySelector('.ep-action-btn.delete').addEventListener('click', (e) => {
        e.stopPropagation();
        deleteEpisode(ep.id);
      });

      card.addEventListener('click', () => selectEpisode(idx));
      card.addEventListener('keydown', e => {
        if (e.key === 'Enter' || e.key === ' ') { e.preventDefault(); selectEpisode(idx); }
      });
      listEl.appendChild(card);
    });
  }

  function highlightCard(idx) {
    document.querySelectorAll('.ep-card').forEach((c, i) => c.classList.toggle('active', i === idx));
  }

  // ================================================================
  // Select & play episode
  // ================================================================
  async function getEpisodeAudioUrl(ep) {
    if (ep.isDefault && ep.audioUrl) {
      return ep.audioUrl;
    }
    // User-uploaded: retrieve blob from IndexedDB
    try {
      const blob = await dbGet(ep.id);
      if (blob) return URL.createObjectURL(blob);
    } catch (err) {
      console.warn('Failed to load audio from IndexedDB:', err);
    }
    // Fallback for default episodes that may have audioUrl
    if (ep.audioUrl) return ep.audioUrl;
    return null;
  }

  async function selectEpisode(idx) {
    if (idx < 0 || idx >= episodes.length) return;

    // Save position of whatever was playing
    if (state.currentIndex !== null && !audio.paused) {
      savePos(episodes[state.currentIndex], audio.currentTime);
    }

    // Same episode clicked again -- toggle play/pause
    if (idx === state.currentIndex) {
      audio.paused ? resumePlay() : audio.pause();
      return;
    }

    state.currentIndex = idx;
    const ep = episodes[idx];
    const epNum = idx + 1;

    // Update player UI
    playerBar.classList.add('visible');
    appEl.classList.add('player-open');
    playerEpNum.textContent = `EP ${epNum}`;
    playerTitle.textContent = ep.title;
    playerThumb.innerHTML   = ep.thumbnail ? `<img src="${esc(ep.thumbnail)}" alt="">` : '🎙';

    seekBar.value = 0;
    setFill(seekBar);
    timeCurrent.textContent = '0:00';
    timeTotal.textContent   = ep.duration;

    highlightCard(idx);
    showSpinner();
    startViz();

    initAudioGraph();
    if (audioCtx && audioCtx.state === 'suspended') audioCtx.resume();

    const url = await getEpisodeAudioUrl(ep);
    if (!url) {
      showPlayIcon();
      console.warn('No audio URL for episode:', ep.title);
      return;
    }

    audio.src = url;
    audio.load();

    const saved = loadPos(ep);
    audio.addEventListener('canplay', function onCanPlay() {
      audio.removeEventListener('canplay', onCanPlay);
      if (saved > 1) audio.currentTime = saved;
      audio.playbackRate = parseFloat(speedSel.value);
      audio.play().catch(err => {
        console.warn('Playback failed:', err);
        showPlayIcon();
      });
    }, { once: true });
  }

  function resumePlay() {
    initAudioGraph();
    if (audioCtx && audioCtx.state === 'suspended') audioCtx.resume();
    audio.play().catch(err => {
      console.warn('Playback failed:', err);
      showPlayIcon();
    });
  }

  // ================================================================
  // Player bar controls
  // ================================================================
  btnPlay.addEventListener('click', () => {
    if (state.currentIndex === null) return;
    audio.paused ? resumePlay() : audio.pause();
  });

  btnPrev.addEventListener('click', () => {
    if (state.currentIndex === null) return;
    if (audio.currentTime > 3) {
      audio.currentTime = 0;
    } else {
      selectEpisode(state.currentIndex - 1);
    }
  });

  btnNext.addEventListener('click', () => {
    if (state.currentIndex !== null) selectEpisode(state.currentIndex + 1);
  });

  // Seek
  seekBar.addEventListener('mousedown',  () => { state.seeking = true; });
  seekBar.addEventListener('touchstart', () => { state.seeking = true; }, { passive: true });
  seekBar.addEventListener('input', () => {
    setFill(seekBar);
    if (!isNaN(audio.duration)) timeCurrent.textContent = fmt(audio.duration * seekBar.value / 100);
  });
  seekBar.addEventListener('change', () => {
    state.seeking = false;
    if (!isNaN(audio.duration)) audio.currentTime = audio.duration * seekBar.value / 100;
  });

  // Volume
  volBar.addEventListener('input', () => { audio.volume = volBar.value; setFill(volBar); });
  setFill(volBar);

  // Speed
  speedSel.addEventListener('change', () => { audio.playbackRate = parseFloat(speedSel.value); });

  // Icon helpers
  function showPlayIcon()  { iconPlay.style.display = 'block';  iconPause.style.display = 'none';  loadingInd.style.display = 'none'; }
  function showPauseIcon() { iconPlay.style.display = 'none';   iconPause.style.display = 'block'; loadingInd.style.display = 'none'; }
  function showSpinner()   { iconPlay.style.display = 'none';   iconPause.style.display = 'none';  loadingInd.style.display = 'flex'; }

  // Audio events
  audio.addEventListener('play',    () => { state.playing = true;  showPauseIcon(); });
  audio.addEventListener('pause',   () => {
    state.playing = false;
    showPlayIcon();
    if (state.currentIndex !== null) savePos(episodes[state.currentIndex], audio.currentTime);
  });
  audio.addEventListener('waiting', showSpinner);
  audio.addEventListener('playing', showPauseIcon);

  audio.addEventListener('loadedmetadata', () => { timeTotal.textContent = fmt(audio.duration); });

  audio.addEventListener('timeupdate', () => {
    if (state.seeking || isNaN(audio.duration) || !audio.duration) return;
    const pct = (audio.currentTime / audio.duration) * 100;
    seekBar.value = pct;
    setFill(seekBar);
    timeCurrent.textContent = fmt(audio.currentTime);
    if (state.currentIndex !== null && Math.round(audio.currentTime) % 5 === 0) {
      savePos(episodes[state.currentIndex], audio.currentTime);
    }
  });

  audio.addEventListener('ended', () => {
    if (state.currentIndex !== null) {
      try { localStorage.removeItem(storageKey(episodes[state.currentIndex].id)); } catch (_) {}
    }
    const next = state.currentIndex + 1;
    if (next < episodes.length) {
      selectEpisode(next);
    } else {
      state.playing = false;
      showPlayIcon();
    }
  });

  audio.addEventListener('error', () => {
    showPlayIcon();
    console.warn('Audio load error:', audio.error);
  });

  // ================================================================
  // Init
  // ================================================================
  renderList();

})();
</script>
<script src="../_shared/repo-library.js"></script>
<script>
KorbRepoLibrary.attach({
  slug: "podcast-player",
  fileInputId: "mgr-file-input",
  button: { label: "Sync Repo Library" }
});
</script>
