<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="description" content="Pomodoro Timer | Korb Engineering — a free, browser-based productivity tool from Korb Engineering. No signup, no downloads, works on mobile.">
<title>Pomodoro Timer | Korb Engineering</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --bg: #050a0f;
  --bg-panel: #0a1218;
  --bg-card: #0d1a24;
  --cyan: #00d4ff;
  --cyan-dim: #00d4ff33;
  --orange: #ff6600;
  --orange-dim: #ff660033;
  --text: #c8dce6;
  --text-dim: #5a7a8a;
  --accent: var(--cyan);
  --accent-dim: var(--cyan-dim);
  --ring-size: 300px;
  --font: 'JetBrains Mono', monospace;
}

body {
  font-family: var(--font);
  background: var(--bg);
  color: var(--text);
  min-height: 100vh;
  display: flex;
  flex-direction: column;
  align-items: center;
  overflow-x: hidden;
}

body.break-mode {
  --accent: var(--orange);
  --accent-dim: var(--orange-dim);
}

header {
  width: 100%;
  padding: 20px 24px;
  display: flex;
  justify-content: space-between;
  align-items: center;
  max-width: 800px;
}

.brand {
  font-size: 11px;
  font-weight: 600;
  letter-spacing: 3px;
  text-transform: uppercase;
  color: var(--text-dim);
}

.brand span { color: var(--accent); }

.settings-toggle {
  background: none;
  border: 1px solid var(--text-dim);
  color: var(--text-dim);
  font-family: var(--font);
  font-size: 11px;
  padding: 6px 12px;
  border-radius: 4px;
  cursor: pointer;
  letter-spacing: 1px;
  transition: all 0.2s;
}

.settings-toggle:hover {
  border-color: var(--accent);
  color: var(--accent);
}

main {
  flex: 1;
  display: flex;
  flex-direction: column;
  align-items: center;
  width: 100%;
  max-width: 800px;
  padding: 0 24px 40px;
}

/* Mode Tabs */
.mode-tabs {
  display: flex;
  gap: 4px;
  margin-bottom: 32px;
  background: var(--bg-panel);
  border-radius: 8px;
  padding: 4px;
}

.mode-tab {
  background: none;
  border: none;
  color: var(--text-dim);
  font-family: var(--font);
  font-size: 12px;
  font-weight: 500;
  padding: 8px 16px;
  border-radius: 6px;
  cursor: pointer;
  transition: all 0.2s;
  letter-spacing: 0.5px;
}

.mode-tab.active {
  background: var(--accent-dim);
  color: var(--accent);
}

.mode-tab:hover:not(.active) { color: var(--text); }

/* Task Label */
.task-input-wrap {
  margin-bottom: 24px;
  width: 100%;
  max-width: 360px;
}

.task-input {
  width: 100%;
  background: var(--bg-panel);
  border: 1px solid transparent;
  border-bottom: 1px solid var(--text-dim);
  color: var(--text);
  font-family: var(--font);
  font-size:16px;
  padding: 10px 12px;
  border-radius: 4px 4px 0 0;
  text-align: center;
  outline: none;
  transition: border-color 0.2s;
}

.task-input::placeholder { color: var(--text-dim); }
.task-input:focus { border-bottom-color: var(--accent); }

/* Timer Ring */
.timer-container {
  position: relative;
  width: var(--ring-size);
  height: var(--ring-size);
  margin-bottom: 32px;
}

.timer-svg {
  width: 100%;
  height: 100%;
  transform: rotate(-90deg);
}

.ring-bg {
  fill: none;
  stroke: var(--bg-panel);
  stroke-width: 6;
}

.ring-progress {
  fill: none;
  stroke: var(--accent);
  stroke-width: 6;
  stroke-linecap: round;
  transition: stroke-dashoffset 0.5s linear, stroke 0.3s;
  filter: drop-shadow(0 0 8px var(--accent));
}

.timer-display {
  position: absolute;
  top: 50%;
  left: 50%;
  transform: translate(-50%, -50%);
  text-align: center;
}

.timer-time {
  font-size: 56px;
  font-weight: 300;
  letter-spacing: 2px;
  color: #fff;
  line-height: 1;
}

.timer-label {
  font-size: 11px;
  color: var(--accent);
  letter-spacing: 2px;
  text-transform: uppercase;
  margin-top: 8px;
}

/* Controls */
.controls {
  display: flex;
  gap: 12px;
  margin-bottom: 32px;
  align-items: center;
}

.btn {
  background: none;
  border: 1px solid var(--text-dim);
  color: var(--text);
  font-family: var(--font);
  font-size: 12px;
  font-weight: 500;
  padding: 10px 24px;
  border-radius: 6px;
  cursor: pointer;
  transition: all 0.2s;
  letter-spacing: 1px;
}

.btn:hover {
  border-color: var(--accent);
  color: var(--accent);
}

.btn-primary {
  background: var(--accent);
  border-color: var(--accent);
  color: var(--bg);
  font-weight: 600;
  min-width: 120px;
}

.btn-primary:hover {
  filter: brightness(1.15);
  color: var(--bg);
}

.btn-small {
  padding: 8px 14px;
  font-size: 11px;
}

.shortcuts-hint {
  font-size: 10px;
  color: var(--text-dim);
  margin-bottom: 32px;
  letter-spacing: 0.5px;
}

.shortcuts-hint kbd {
  background: var(--bg-panel);
  padding: 2px 6px;
  border-radius: 3px;
  border: 1px solid #1a2a35;
  font-family: var(--font);
  font-size: 10px;
  margin: 0 2px;
}

/* Session Counter */
.session-counter {
  display: flex;
  gap: 8px;
  margin-bottom: 32px;
  align-items: center;
}

.pomodoro-dot {
  width: 12px;
  height: 12px;
  border-radius: 50%;
  border: 2px solid var(--text-dim);
  transition: all 0.3s;
}

.pomodoro-dot.filled {
  background: var(--cyan);
  border-color: var(--cyan);
  box-shadow: 0 0 8px var(--cyan-dim);
}

.session-text {
  font-size: 11px;
  color: var(--text-dim);
  margin-left: 8px;
  letter-spacing: 0.5px;
}

/* Stats */
.stats-section {
  width: 100%;
  margin-top: 8px;
}

.stats-header {
  display: flex;
  justify-content: space-between;
  align-items: center;
  margin-bottom: 16px;
}

.stats-title {
  font-size: 12px;
  font-weight: 600;
  color: var(--text-dim);
  letter-spacing: 2px;
  text-transform: uppercase;
}

.stats-cards {
  display: grid;
  grid-template-columns: repeat(3, 1fr);
  gap: 12px;
  margin-bottom: 24px;
}

.stat-card {
  background: var(--bg-panel);
  border-radius: 8px;
  padding: 16px;
  text-align: center;
  border: 1px solid #111e28;
}

.stat-value {
  font-size: 24px;
  font-weight: 600;
  color: #fff;
}

.stat-label {
  font-size: 10px;
  color: var(--text-dim);
  margin-top: 4px;
  letter-spacing: 1px;
  text-transform: uppercase;
}

/* Weekly Chart */
.weekly-chart {
  background: var(--bg-panel);
  border-radius: 8px;
  padding: 20px;
  border: 1px solid #111e28;
}

.chart-title {
  font-size: 11px;
  color: var(--text-dim);
  letter-spacing: 1px;
  margin-bottom: 16px;
  text-transform: uppercase;
}

.chart-bars {
  display: flex;
  justify-content: space-between;
  align-items: flex-end;
  height: 100px;
  gap: 8px;
}

.chart-bar-wrap {
  flex: 1;
  display: flex;
  flex-direction: column;
  align-items: center;
  height: 100%;
}

.chart-bar-track {
  flex: 1;
  width: 100%;
  max-width: 36px;
  display: flex;
  align-items: flex-end;
  position: relative;
}

.chart-bar {
  width: 100%;
  background: var(--cyan);
  border-radius: 3px 3px 0 0;
  min-height: 2px;
  transition: height 0.5s;
  opacity: 0.7;
}

.chart-bar.today {
  opacity: 1;
  box-shadow: 0 0 8px var(--cyan-dim);
}

.chart-day {
  font-size: 10px;
  color: var(--text-dim);
  margin-top: 6px;
  letter-spacing: 0.5px;
}

.chart-bar-value {
  font-size: 9px;
  color: var(--text-dim);
  margin-bottom: 4px;
  text-align: center;
}

/* Settings Panel */
.settings-overlay {
  position: fixed;
  top: 0;
  left: 0;
  right: 0;
  bottom: 0;
  background: rgba(5, 10, 15, 0.85);
  display: none;
  justify-content: center;
  align-items: center;
  z-index: 100;
  backdrop-filter: blur(4px);
}

.settings-overlay.open { display: flex; }

.settings-panel {
  background: var(--bg-card);
  border: 1px solid #1a2a35;
  border-radius: 12px;
  padding: 32px;
  width: 90%;
  max-width: 420px;
  max-height: 80vh;
  overflow-y: auto;
}

.settings-panel h2 {
  font-size: 14px;
  font-weight: 600;
  letter-spacing: 2px;
  text-transform: uppercase;
  margin-bottom: 24px;
  color: var(--text);
}

.setting-group {
  margin-bottom: 20px;
}

.setting-group label {
  display: block;
  font-size: 11px;
  color: var(--text-dim);
  letter-spacing: 1px;
  margin-bottom: 6px;
  text-transform: uppercase;
}

.setting-group input[type="number"] {
  width: 100%;
  background: var(--bg);
  border: 1px solid #1a2a35;
  color: var(--text);
  font-family: var(--font);
  font-size:16px;
  padding: 10px 12px;
  border-radius: 6px;
  outline: none;
}

.setting-group input[type="number"]:focus {
  border-color: var(--cyan);
}

.setting-toggle {
  display: flex;
  justify-content: space-between;
  align-items: center;
  padding: 10px 0;
  border-bottom: 1px solid #111e28;
}

.setting-toggle span {
  font-size: 12px;
  color: var(--text);
}

.toggle-switch {
  position: relative;
  width: 40px;
  height: 22px;
  cursor: pointer;
}

.toggle-switch input {
  opacity: 0;
  width: 0;
  height: 0;
}

.toggle-slider {
  position: absolute;
  inset: 0;
  background: #1a2a35;
  border-radius: 11px;
  transition: background 0.2s;
}

.toggle-slider::before {
  content: '';
  position: absolute;
  width: 16px;
  height: 16px;
  left: 3px;
  top: 3px;
  background: var(--text-dim);
  border-radius: 50%;
  transition: all 0.2s;
}

.toggle-switch input:checked + .toggle-slider {
  background: var(--cyan);
}

.toggle-switch input:checked + .toggle-slider::before {
  transform: translateX(18px);
  background: var(--bg);
}

.settings-close {
  width: 100%;
  margin-top: 16px;
}

/* Responsive */
@media (max-width: 480px) {
  :root { --ring-size: 240px; }
  .timer-time { font-size: 42px; }
  .stats-cards { grid-template-columns: 1fr; }
  .settings-panel { padding: 24px 20px; }
  header { padding: 16px; }
  main { padding: 0 16px 32px; }
}

/* Mobile-first touch targets */
button,select,.btn,.mode-tab,.settings-toggle,.toggle-switch,[role="button"]{min-height:44px;touch-action:manipulation}
input,textarea,select{font-size:16px}
</style>
</head>
<body>
<header>
  <div class="brand">Korb <span>Engineering</span></div>
  <button class="settings-toggle" onclick="toggleSettings()">Settings</button>
</header>

<main>
  <div class="mode-tabs">
    <button class="mode-tab active" data-mode="work" onclick="switchMode('work')">Work</button>
    <button class="mode-tab" data-mode="shortBreak" onclick="switchMode('shortBreak')">Short Break</button>
    <button class="mode-tab" data-mode="longBreak" onclick="switchMode('longBreak')">Long Break</button>
  </div>

  <div class="task-input-wrap">
    <input type="text" class="task-input" id="taskInput" placeholder="What are you working on?" maxlength="80">
  </div>

  <div class="timer-container">
    <svg class="timer-svg" viewBox="0 0 200 200">
      <circle class="ring-bg" cx="100" cy="100" r="90" />
      <circle class="ring-progress" id="progressRing" cx="100" cy="100" r="90" />
    </svg>
    <div class="timer-display">
      <div class="timer-time" id="timerTime">25:00</div>
      <div class="timer-label" id="timerLabel">Focus</div>
    </div>
  </div>

  <div class="controls">
    <button class="btn btn-small" onclick="resetTimer()">Reset</button>
    <button class="btn btn-primary" id="startBtn" onclick="toggleTimer()">Start</button>
    <button class="btn btn-small" onclick="skipSession()">Skip</button>
  </div>

  <div class="shortcuts-hint">
    <kbd>Space</kbd> start/pause &nbsp; <kbd>R</kbd> reset &nbsp; <kbd>S</kbd> skip
  </div>

  <div class="session-counter" id="sessionDots"></div>

  <div class="stats-section">
    <div class="stats-header">
      <div class="stats-title">Today's Stats</div>
    </div>
    <div class="stats-cards">
      <div class="stat-card">
        <div class="stat-value" id="statSessions">0</div>
        <div class="stat-label">Sessions</div>
      </div>
      <div class="stat-card">
        <div class="stat-value" id="statFocusTime">0m</div>
        <div class="stat-label">Focus Time</div>
      </div>
      <div class="stat-card">
        <div class="stat-value" id="statStreak">0</div>
        <div class="stat-label">Day Streak</div>
      </div>
    </div>

    <div class="weekly-chart">
      <div class="chart-title">This Week</div>
      <div class="chart-bars" id="weeklyChart"></div>
    </div>
  </div>
</main>

<!-- Settings Overlay -->
<div class="settings-overlay" id="settingsOverlay" onclick="if(event.target===this)toggleSettings()">
  <div class="settings-panel">
    <h2>Settings</h2>
    <div class="setting-group">
      <label>Work Duration (min)</label>
      <input type="number" id="setWork" min="1" max="120" value="25">
    </div>
    <div class="setting-group">
      <label>Short Break (min)</label>
      <input type="number" id="setShortBreak" min="1" max="60" value="5">
    </div>
    <div class="setting-group">
      <label>Long Break (min)</label>
      <input type="number" id="setLongBreak" min="1" max="60" value="15">
    </div>
    <div class="setting-toggle">
      <span>Sounds</span>
      <label class="toggle-switch">
        <input type="checkbox" id="setSounds" checked>
        <span class="toggle-slider"></span>
      </label>
    </div>
    <div class="setting-toggle">
      <span>Auto-start Next Session</span>
      <label class="toggle-switch">
        <input type="checkbox" id="setAutoStart">
        <span class="toggle-slider"></span>
      </label>
    </div>
    <div class="setting-toggle">
      <span>Notifications</span>
      <label class="toggle-switch">
        <input type="checkbox" id="setNotifications" checked>
        <span class="toggle-slider"></span>
      </label>
    </div>
    <button class="btn settings-close" onclick="saveSettings()">Save & Close</button>
  </div>
</div>

<script>/* korb_ storage migration (additive, runs once per load) */
(function(){try{var M=[["pomodoro_stats","korb_pomodoro_stats"],["pomodoro_settings","korb_pomodoro_settings"]];for(var i=0;i<M.length;i++){var o=M[i][0],n=M[i][1];try{var ks=Object.keys(localStorage);for(var j=0;j<ks.length;j++){var k=ks[j];if(k.indexOf(o)===0&&k.indexOf("korb_")!==0){var nk=n+k.slice(o.length);if(localStorage.getItem(nk)===null){localStorage.setItem(nk,localStorage.getItem(k));}localStorage.removeItem(k);}}}catch(e){}}}catch(e){}})();</script>
<script>
// --- State ---
const CIRCUMFERENCE = 2 * Math.PI * 90;
let settings = {
  workMin: 25, shortBreakMin: 5, longBreakMin: 15,
  sounds: true, autoStart: false, notifications: true
};
let mode = 'work'; // 'work' | 'shortBreak' | 'longBreak'
let totalSeconds = settings.workMin * 60;
let remainingSeconds = totalSeconds;
let running = false;
let intervalId = null;
let cycleCount = 0; // work sessions completed in current cycle (0-3)
let audioCtx = null;

// --- Init ---
document.addEventListener('DOMContentLoaded', () => {
  loadSettings();
  loadStats();
  resetTimerDisplay();
  renderSessionDots();
  renderWeeklyChart();
  updateStats();
  requestNotificationPermission();

  const ring = document.getElementById('progressRing');
  ring.style.strokeDasharray = CIRCUMFERENCE;
  ring.style.strokeDashoffset = 0;
});

// --- Audio ---
function getAudioCtx() {
  if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
  return audioCtx;
}

function playTick() {
  if (!settings.sounds) return;
  const ctx = getAudioCtx();
  const osc = ctx.createOscillator();
  const gain = ctx.createGain();
  osc.type = 'sine';
  osc.frequency.value = 880;
  gain.gain.setValueAtTime(0.08, ctx.currentTime);
  gain.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + 0.08);
  osc.connect(gain);
  gain.connect(ctx.destination);
  osc.start(ctx.currentTime);
  osc.stop(ctx.currentTime + 0.08);
}

function playBell() {
  if (!settings.sounds) return;
  const ctx = getAudioCtx();
  const freqs = [523.25, 659.25, 783.99];
  freqs.forEach((f, i) => {
    const osc = ctx.createOscillator();
    const gain = ctx.createGain();
    osc.type = 'sine';
    osc.frequency.value = f;
    gain.gain.setValueAtTime(0.15, ctx.currentTime + i * 0.15);
    gain.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + i * 0.15 + 0.8);
    osc.connect(gain);
    gain.connect(ctx.destination);
    osc.start(ctx.currentTime + i * 0.15);
    osc.stop(ctx.currentTime + i * 0.15 + 0.8);
  });
}

// --- Timer Logic ---
function toggleTimer() {
  if (running) {
    pauseTimer();
  } else {
    startTimer();
  }
}

function startTimer() {
  if (running) return;
  running = true;
  document.getElementById('startBtn').textContent = 'Pause';
  intervalId = setInterval(tick, 1000);
}

function pauseTimer() {
  running = false;
  document.getElementById('startBtn').textContent = 'Start';
  clearInterval(intervalId);
  intervalId = null;
}

function resetTimer() {
  pauseTimer();
  remainingSeconds = totalSeconds;
  updateTimerDisplay();
  updateProgressRing();
}

function skipSession() {
  pauseTimer();
  onSessionEnd();
}

function tick() {
  remainingSeconds--;
  if (remainingSeconds <= 5 && remainingSeconds > 0) playTick();
  if (remainingSeconds <= 0) {
    remainingSeconds = 0;
    updateTimerDisplay();
    updateProgressRing();
    pauseTimer();
    playBell();
    onSessionEnd();
    return;
  }
  updateTimerDisplay();
  updateProgressRing();
}

function onSessionEnd() {
  if (mode === 'work') {
    // Record completed session
    recordSession();
    cycleCount++;
    renderSessionDots();
    updateStats();
    renderWeeklyChart();

    const taskLabel = document.getElementById('taskInput').value || 'Focus session';
    sendNotification('Pomodoro Complete', `${taskLabel} - Time for a break!`);

    if (cycleCount >= 4) {
      cycleCount = 0;
      switchMode('longBreak');
    } else {
      switchMode('shortBreak');
    }
  } else {
    sendNotification('Break Over', 'Time to focus!');
    switchMode('work');
  }

  if (settings.autoStart) {
    setTimeout(() => startTimer(), 500);
  }
}

// --- Display ---
function updateTimerDisplay() {
  const min = Math.floor(remainingSeconds / 60);
  const sec = remainingSeconds % 60;
  document.getElementById('timerTime').textContent =
    String(min).padStart(2, '0') + ':' + String(sec).padStart(2, '0');
}

function updateProgressRing() {
  const progress = 1 - (remainingSeconds / totalSeconds);
  const offset = CIRCUMFERENCE * (1 - progress);
  document.getElementById('progressRing').style.strokeDashoffset = offset;
}

function resetTimerDisplay() {
  const durations = { work: settings.workMin, shortBreak: settings.shortBreakMin, longBreak: settings.longBreakMin };
  totalSeconds = durations[mode] * 60;
  remainingSeconds = totalSeconds;
  updateTimerDisplay();
  updateProgressRing();

  const labels = { work: 'Focus', shortBreak: 'Short Break', longBreak: 'Long Break' };
  document.getElementById('timerLabel').textContent = labels[mode];

  document.body.classList.toggle('break-mode', mode !== 'work');
}

function switchMode(newMode) {
  if (running) pauseTimer();
  mode = newMode;
  document.querySelectorAll('.mode-tab').forEach(t => {
    t.classList.toggle('active', t.dataset.mode === mode);
  });
  resetTimerDisplay();
}

function renderSessionDots() {
  const container = document.getElementById('sessionDots');
  const todayData = getTodayStats();
  const totalToday = todayData.sessions;
  const inCycle = cycleCount;

  let html = '';
  for (let i = 0; i < 4; i++) {
    html += `<div class="pomodoro-dot ${i < inCycle ? 'filled' : ''}"></div>`;
  }
  html += `<span class="session-text">${totalToday} session${totalToday !== 1 ? 's' : ''} today</span>`;
  container.innerHTML = html;
}

// --- Stats / localStorage ---
function getDateKey(d) {
  const date = d || new Date();
  return date.getFullYear() + '-' +
    String(date.getMonth() + 1).padStart(2, '0') + '-' +
    String(date.getDate()).padStart(2, '0');
}

function getAllStats() {
  try {
    return JSON.parse(localStorage.getItem('korb_pomodoro_stats') || '{}');
  } catch { return {}; }
}

function getTodayStats() {
  const all = getAllStats();
  return all[getDateKey()] || { sessions: 0, focusMinutes: 0 };
}

function recordSession() {
  const all = getAllStats();
  const key = getDateKey();
  if (!all[key]) all[key] = { sessions: 0, focusMinutes: 0 };
  all[key].sessions++;
  all[key].focusMinutes += settings.workMin;
  localStorage.setItem('korb_pomodoro_stats', JSON.stringify(all));
}

function updateStats() {
  const today = getTodayStats();
  document.getElementById('statSessions').textContent = today.sessions;
  const mins = today.focusMinutes;
  document.getElementById('statFocusTime').textContent =
    mins >= 60 ? Math.floor(mins / 60) + 'h ' + (mins % 60) + 'm' : mins + 'm';

  // Streak
  const all = getAllStats();
  let streak = 0;
  const d = new Date();
  while (true) {
    const key = getDateKey(d);
    if (all[key] && all[key].sessions > 0) {
      streak++;
      d.setDate(d.getDate() - 1);
    } else {
      break;
    }
  }
  document.getElementById('statStreak').textContent = streak;
}

function renderWeeklyChart() {
  const container = document.getElementById('weeklyChart');
  const all = getAllStats();
  const days = ['Sun', 'Mon', 'Tue', 'Wed', 'Thu', 'Fri', 'Sat'];
  const today = new Date();
  const dayOfWeek = today.getDay();

  let weekData = [];
  let maxMin = 1;

  for (let i = 0; i < 7; i++) {
    const d = new Date(today);
    d.setDate(today.getDate() - dayOfWeek + i);
    const key = getDateKey(d);
    const mins = (all[key] && all[key].focusMinutes) || 0;
    if (mins > maxMin) maxMin = mins;
    weekData.push({ day: days[d.getDay()], mins, isToday: i === dayOfWeek });
  }

  container.innerHTML = weekData.map(w => {
    const pct = Math.max((w.mins / maxMin) * 100, 2);
    const label = w.mins >= 60 ? Math.floor(w.mins / 60) + 'h' : w.mins + 'm';
    return `
      <div class="chart-bar-wrap">
        <div class="chart-bar-value">${w.mins > 0 ? label : ''}</div>
        <div class="chart-bar-track">
          <div class="chart-bar ${w.isToday ? 'today' : ''}" style="height:${pct}%"></div>
        </div>
        <div class="chart-day">${w.day}</div>
      </div>`;
  }).join('');
}

function loadStats() {
  // Stats are loaded on demand from localStorage
}

// --- Settings ---
function toggleSettings() {
  document.getElementById('settingsOverlay').classList.toggle('open');
}

function loadSettings() {
  try {
    const saved = JSON.parse(localStorage.getItem('korb_pomodoro_settings'));
    if (saved) {
      Object.assign(settings, saved);
      document.getElementById('setWork').value = settings.workMin;
      document.getElementById('setShortBreak').value = settings.shortBreakMin;
      document.getElementById('setLongBreak').value = settings.longBreakMin;
      document.getElementById('setSounds').checked = settings.sounds;
      document.getElementById('setAutoStart').checked = settings.autoStart;
      document.getElementById('setNotifications').checked = settings.notifications;
    }
  } catch {}
}

function saveSettings() {
  settings.workMin = Math.max(1, Math.min(120, parseInt(document.getElementById('setWork').value) || 25));
  settings.shortBreakMin = Math.max(1, Math.min(60, parseInt(document.getElementById('setShortBreak').value) || 5));
  settings.longBreakMin = Math.max(1, Math.min(60, parseInt(document.getElementById('setLongBreak').value) || 15));
  settings.sounds = document.getElementById('setSounds').checked;
  settings.autoStart = document.getElementById('setAutoStart').checked;
  settings.notifications = document.getElementById('setNotifications').checked;

  localStorage.setItem('korb_pomodoro_settings', JSON.stringify(settings));

  if (!running) resetTimerDisplay();
  toggleSettings();

  if (settings.notifications) requestNotificationPermission();
}

// --- Notifications ---
function requestNotificationPermission() {
  if (settings.notifications && 'Notification' in window && Notification.permission === 'default') {
    Notification.requestPermission();
  }
}

function sendNotification(title, body) {
  if (!settings.notifications) return;
  if ('Notification' in window && Notification.permission === 'granted') {
    new Notification(title, { body, icon: '', badge: '' });
  }
}

// --- Keyboard Shortcuts ---
document.addEventListener('keydown', (e) => {
  if (e.target.tagName === 'INPUT') return;
  switch (e.code) {
    case 'Space':
      e.preventDefault();
      toggleTimer();
      break;
    case 'KeyR':
      resetTimer();
      break;
    case 'KeyS':
      skipSession();
      break;
  }
});
</script>
