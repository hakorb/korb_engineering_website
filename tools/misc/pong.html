<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
<title>PONG - Korb Engineering</title>
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box}
:root{
--bg:#050a0f;--surface:#0a1018;--surface2:#0e1520;--border:#1a2535;
--cyan:#00d4ff;--orange:#ff6600;--green:#10b981;--red:#ef4444;--text:#e2e8f0;
--text-dim:#64748b;--white:#ffffff;
}
html,body{height:100%;overflow:hidden;background:var(--bg);color:var(--text);font-family:'JetBrains Mono',monospace}
body{display:flex;flex-direction:column;align-items:center;justify-content:center;-webkit-user-select:none;user-select:none}

/* Scanline overlay */
body::after{
content:'';position:fixed;top:0;left:0;width:100%;height:100%;
background:repeating-linear-gradient(0deg,transparent,transparent 2px,rgba(0,0,0,0.08) 2px,rgba(0,0,0,0.08) 4px);
pointer-events:none;z-index:1000
}

#gameContainer{position:relative;width:100%;max-width:900px;display:flex;flex-direction:column;align-items:center;padding:8px}

/* Score display */
#scoreBoard{
display:flex;justify-content:center;align-items:center;gap:40px;
margin-bottom:8px;width:100%;padding:8px 0;
}
.score-side{display:flex;flex-direction:column;align-items:center;gap:2px}
.score-label{font-size:11px;font-weight:500;letter-spacing:2px;text-transform:uppercase}
.score-label.p1{color:var(--cyan)}
.score-label.p2{color:var(--orange)}
.score-value{
font-size:56px;font-weight:700;line-height:1;
font-variant-numeric:tabular-nums;
}
.score-value.p1{color:var(--cyan);text-shadow:0 0 20px rgba(0,212,255,0.5),0 0 40px rgba(0,212,255,0.2)}
.score-value.p2{color:var(--orange);text-shadow:0 0 20px rgba(255,102,0,0.5),0 0 40px rgba(255,102,0,0.2)}
#scoreDivider{font-size:40px;color:var(--border);font-weight:300}
#rallyCount{font-size:11px;color:var(--text-dim);letter-spacing:1px}

/* Canvas */
#gameCanvas{
border:1px solid var(--border);border-radius:4px;
background:var(--bg);display:block;
box-shadow:0 0 30px rgba(0,212,255,0.05),inset 0 0 60px rgba(0,0,0,0.5);
cursor:none;
}

/* Menu overlay */
#menuOverlay{
position:absolute;top:0;left:0;width:100%;height:100%;
display:flex;flex-direction:column;align-items:center;justify-content:center;
background:rgba(5,10,15,0.92);z-index:10;border-radius:4px;
}
#menuOverlay.hidden{display:none}

.menu-title{
font-size:48px;font-weight:700;color:var(--cyan);
text-shadow:0 0 30px rgba(0,212,255,0.4);
letter-spacing:6px;margin-bottom:4px;
}
.menu-subtitle{font-size:12px;color:var(--text-dim);letter-spacing:3px;margin-bottom:32px}

.menu-section{margin-bottom:20px;text-align:center}
.menu-section-title{font-size:11px;color:var(--text-dim);letter-spacing:2px;margin-bottom:8px;text-transform:uppercase}

.menu-btn{
display:inline-block;min-width:140px;padding:12px 20px;margin:4px;
background:var(--surface2);border:1px solid var(--border);border-radius:4px;
color:var(--text);font-family:'JetBrains Mono',monospace;font-size:13px;font-weight:500;
cursor:pointer;transition:all 0.15s;letter-spacing:1px;
min-height:44px;
}
.menu-btn:hover,.menu-btn:active{background:var(--border);border-color:var(--cyan);color:var(--cyan)}
.menu-btn.active{background:rgba(0,212,255,0.1);border-color:var(--cyan);color:var(--cyan)}
.menu-btn.small{min-width:60px;padding:8px 12px;font-size:12px;min-height:44px}
.menu-btn.start{
background:rgba(0,212,255,0.15);border-color:var(--cyan);color:var(--cyan);
font-size:16px;font-weight:600;letter-spacing:3px;padding:14px 40px;margin-top:16px;
}
.menu-btn.start:hover{background:rgba(0,212,255,0.25)}

/* Pause overlay */
#pauseOverlay{
position:absolute;top:0;left:0;width:100%;height:100%;
display:flex;flex-direction:column;align-items:center;justify-content:center;
background:rgba(5,10,15,0.85);z-index:10;border-radius:4px;
}
#pauseOverlay.hidden{display:none}
.pause-text{font-size:32px;font-weight:700;color:var(--cyan);letter-spacing:6px;text-shadow:0 0 20px rgba(0,212,255,0.4)}
.pause-hint{font-size:12px;color:var(--text-dim);margin-top:12px;letter-spacing:1px}

/* Game over overlay */
#gameOverOverlay{
position:absolute;top:0;left:0;width:100%;height:100%;
display:flex;flex-direction:column;align-items:center;justify-content:center;
background:rgba(5,10,15,0.9);z-index:10;border-radius:4px;
}
#gameOverOverlay.hidden{display:none}
.gameover-winner{font-size:28px;font-weight:700;letter-spacing:4px;margin-bottom:8px}
.gameover-score{font-size:16px;color:var(--text-dim);margin-bottom:4px}
.gameover-rally{font-size:12px;color:var(--text-dim);margin-bottom:24px}

/* Stats bar */
#statsBar{
display:flex;justify-content:center;gap:20px;margin-top:8px;
font-size:11px;color:var(--text-dim);letter-spacing:1px;
}
.stat-item span{color:var(--text)}

/* Settings gear */
#settingsBtn{
position:absolute;top:12px;right:12px;z-index:5;
background:none;border:none;color:var(--text-dim);font-size:20px;
cursor:pointer;min-width:44px;min-height:44px;display:flex;align-items:center;justify-content:center;
}
#settingsBtn:hover{color:var(--cyan)}

/* Settings panel */
#settingsPanel{
position:absolute;top:0;left:0;width:100%;height:100%;
display:flex;flex-direction:column;align-items:center;justify-content:center;
background:rgba(5,10,15,0.95);z-index:20;border-radius:4px;
}
#settingsPanel.hidden{display:none}
.settings-title{font-size:20px;font-weight:700;color:var(--cyan);letter-spacing:3px;margin-bottom:24px}
.settings-row{
display:flex;align-items:center;justify-content:space-between;
width:300px;max-width:90%;padding:8px 0;border-bottom:1px solid var(--border);
}
.settings-label{font-size:12px;color:var(--text-dim)}
.settings-options{display:flex;gap:4px}

/* Controls hint */
#controlsHint{
font-size:10px;color:var(--text-dim);margin-top:6px;letter-spacing:1px;text-align:center;line-height:1.6;
}

@media(max-width:600px){
.score-value{font-size:40px}
.menu-title{font-size:32px;letter-spacing:4px}
.menu-btn{min-width:100px;font-size:12px;padding:10px 14px}
#scoreBoard{gap:24px}
}
</style>
</head>
<body>
<div id="gameContainer">
<div id="scoreBoard">
<div class="score-side">
<div class="score-label p1">P1</div>
<div class="score-value p1" id="score1">0</div>
</div>
<div id="scoreDivider">:</div>
<div class="score-side">
<div class="score-label p2" id="p2Label">AI</div>
<div class="score-value p2" id="score2">0</div>
</div>
</div>
<div id="rallyCount">RALLY: 0</div>

<div style="position:relative;display:inline-block">
<canvas id="gameCanvas"></canvas>

<button id="settingsBtn" title="Settings">&#9881;</button>

<div id="menuOverlay">
<div class="menu-title">PONG</div>
<div class="menu-subtitle">KORB ENGINEERING</div>

<div class="menu-section">
<div class="menu-section-title">Game Mode</div>
<div>
<button class="menu-btn active" data-mode="pvai" onclick="setMode('pvai')">vs AI</button>
<button class="menu-btn" data-mode="pvp" onclick="setMode('pvp')">vs Player</button>
</div>
</div>

<div class="menu-section" id="difficultySection">
<div class="menu-section-title">AI Difficulty</div>
<div>
<button class="menu-btn small" data-diff="easy" onclick="setDifficulty('easy')">Easy</button>
<button class="menu-btn small active" data-diff="medium" onclick="setDifficulty('medium')">Med</button>
<button class="menu-btn small" data-diff="hard" onclick="setDifficulty('hard')">Hard</button>
<button class="menu-btn small" data-diff="impossible" onclick="setDifficulty('impossible')">!!!!</button>
</div>
</div>

<div class="menu-section">
<div class="menu-section-title">Points to Win</div>
<div>
<button class="menu-btn small active" data-pts="7" onclick="setPoints(7)">7</button>
<button class="menu-btn small" data-pts="11" onclick="setPoints(11)">11</button>
<button class="menu-btn small" data-pts="21" onclick="setPoints(21)">21</button>
</div>
</div>

<div class="menu-section">
<div class="menu-section-title">Power-Ups</div>
<div>
<button class="menu-btn small" data-pu="on" onclick="setPowerUps(true)">On</button>
<button class="menu-btn small active" data-pu="off" onclick="setPowerUps(false)">Off</button>
</div>
</div>

<button class="menu-btn start" onclick="startGame()">START</button>
</div>

<div id="pauseOverlay" class="hidden">
<div class="pause-text">PAUSED</div>
<div class="pause-hint">Space or tap to resume</div>
<div style="margin-top:20px">
<button class="menu-btn" onclick="returnToMenu()">Menu</button>
</div>
</div>

<div id="gameOverOverlay" class="hidden">
<div class="gameover-winner" id="winnerText">PLAYER 1 WINS</div>
<div class="gameover-score" id="finalScore">7 - 3</div>
<div class="gameover-rally" id="finalRally">Longest Rally: 12</div>
<div>
<button class="menu-btn" onclick="returnToMenu()">Menu</button>
<button class="menu-btn start" onclick="rematch()">Rematch</button>
</div>
</div>

<div id="settingsPanel" class="hidden">
<div class="settings-title">SETTINGS</div>
<div class="settings-row">
<span class="settings-label">Ball Speed</span>
<div class="settings-options">
<button class="menu-btn small" data-bs="slow" onclick="setBallSpeed('slow')">Slow</button>
<button class="menu-btn small active" data-bs="normal" onclick="setBallSpeed('normal')">Norm</button>
<button class="menu-btn small" data-bs="fast" onclick="setBallSpeed('fast')">Fast</button>
</div>
</div>
<div class="settings-row">
<span class="settings-label">Paddle Size</span>
<div class="settings-options">
<button class="menu-btn small" data-ps="small" onclick="setPaddleSize('small')">Sm</button>
<button class="menu-btn small active" data-ps="normal" onclick="setPaddleSize('normal')">Norm</button>
<button class="menu-btn small" data-ps="large" onclick="setPaddleSize('large')">Lg</button>
</div>
</div>
<div class="settings-row">
<span class="settings-label">Sound</span>
<div class="settings-options">
<button class="menu-btn small active" data-snd="on" onclick="setSound(true)">On</button>
<button class="menu-btn small" data-snd="off" onclick="setSound(false)">Off</button>
</div>
</div>
<div style="margin-top:20px">
<button class="menu-btn" onclick="closeSettings()">Close</button>
</div>
</div>
</div>

<div id="statsBar">
<span class="stat-item">W: <span id="statWins">0</span></span>
<span class="stat-item">L: <span id="statLosses">0</span></span>
<span class="stat-item">Rally: <span id="statRally">0</span></span>
<span class="stat-item">Games: <span id="statGames">0</span></span>
</div>
<div id="controlsHint">P1: W/S or Mouse &nbsp;|&nbsp; P2: Arrow Keys &nbsp;|&nbsp; Space: Pause &nbsp;|&nbsp; Mobile: Touch</div>
</div>

<script>
// === CONSTANTS & STATE ===
const canvas = document.getElementById('gameCanvas');
const ctx = canvas.getContext('2d');
const COLORS = {bg:'#050a0f',surface:'#0a1018',border:'#1a2535',cyan:'#00d4ff',orange:'#ff6600',green:'#10b981',red:'#ef4444',white:'#ffffff',text:'#e2e8f0',dim:'#64748b'};

let W, H;
const PADDLE_W = 12;
const BASE_PADDLE_H = 80;
const BALL_R = 7;
const PADDLE_MARGIN = 20;
const BASE_BALL_SPEED = 5;
const BALL_ACCEL = 0.15;
const MAX_BALL_SPEED = 14;
const SERVE_DELAY = 800;

// Settings
let config = {
  mode: 'pvai',
  difficulty: 'medium',
  pointsToWin: 7,
  powerUps: false,
  ballSpeed: 'normal',
  paddleSize: 'normal',
  sound: true
};

// Game state
let state = 'menu'; // menu, playing, paused, gameover, serving
let score1 = 0, score2 = 0;
let currentRally = 0, longestRally = 0, gameLongestRally = 0;
let serveSide = 1; // 1=left, 2=right
let serveTimer = 0;
let screenFlash = 0;

// Stats (localStorage)
let stats = { wins:0, losses:0, longestRally:0, games:0 };

// Ball
let ball = { x:0, y:0, vx:0, vy:0, speed:0, trail:[] };

// Paddles
let p1 = { x:0, y:0, h:BASE_PADDLE_H, vy:0, score:0 };
let p2 = { x:0, y:0, h:BASE_PADDLE_H, vy:0, score:0 };

// Input
let keys = {};
let mouseY = null;
let touchP1 = null, touchP2 = null;

// Particles
let particles = [];

// Power-ups
let powerUpItems = [];
let activePowerUps = { p1:[], p2:[] };
let powerUpTimer = 0;
const POWERUP_TYPES = ['multiball','bigpaddle','smallopponent','speedboost','curveball'];
const POWERUP_COLORS = {multiball:'#00d4ff',bigpaddle:'#10b981',smallopponent:'#ef4444',speedboost:'#ff6600',curveball:'#a855f7'};
const POWERUP_LABELS = {multiball:'2x',bigpaddle:'BIG',smallopponent:'SML',speedboost:'SPD',curveball:'CRV'};
let extraBalls = [];

// AI
let aiTargetY = 0;
let aiReactionTimer = 0;
let aiError = 0;

// Center line animation
let centerLineOffset = 0;

// Audio context
let audioCtx = null;
function ensureAudio(){ if(!audioCtx) audioCtx = new (window.AudioContext||window.webkitAudioContext)(); return audioCtx; }

function playTone(freq, dur, type, vol, detune){
  if(!config.sound) return;
  try{
    const a = ensureAudio();
    const o = a.createOscillator();
    const g = a.createGain();
    o.type = type || 'square';
    o.frequency.value = freq;
    if(detune) o.detune.value = detune;
    g.gain.setValueAtTime(vol||0.08, a.currentTime);
    g.gain.exponentialRampToValueAtTime(0.001, a.currentTime + dur);
    o.connect(g); g.connect(a.destination);
    o.start(); o.stop(a.currentTime + dur);
  }catch(e){}
}
function sndPaddleHit(){ playTone(660, 0.06, 'square', 0.1); }
function sndWallBounce(){ playTone(440, 0.05, 'square', 0.06); }
function sndScore(winner){
  if(!config.sound) return;
  try{
    const a = ensureAudio();
    [400,300,200].forEach((f,i)=>{
      const o=a.createOscillator(), g=a.createGain();
      o.type='square'; o.frequency.value=f;
      g.gain.setValueAtTime(0.08,a.currentTime+i*0.1);
      g.gain.exponentialRampToValueAtTime(0.001,a.currentTime+i*0.1+0.15);
      o.connect(g); g.connect(a.destination);
      o.start(a.currentTime+i*0.1); o.stop(a.currentTime+i*0.1+0.15);
    });
  }catch(e){}
}
function sndGamePoint(){
  if(!config.sound) return;
  try{
    const a = ensureAudio();
    [523,659,784,1047].forEach((f,i)=>{
      const o=a.createOscillator(), g=a.createGain();
      o.type='square'; o.frequency.value=f;
      g.gain.setValueAtTime(0.1,a.currentTime+i*0.08);
      g.gain.exponentialRampToValueAtTime(0.001,a.currentTime+i*0.08+0.2);
      o.connect(g); g.connect(a.destination);
      o.start(a.currentTime+i*0.08); o.stop(a.currentTime+i*0.08+0.2);
    });
  }catch(e){}
}

// === SIZING ===
function resize(){
  const container = document.getElementById('gameContainer');
  const maxW = Math.min(container.clientWidth - 16, 860);
  const ratio = 9/16;
  W = maxW;
  H = Math.floor(W * ratio);
  // Clamp height
  const maxH = window.innerHeight - 260;
  if(H > maxH){ H = maxH; W = Math.floor(H / ratio); }
  canvas.width = W;
  canvas.height = H;
  // Reset paddle positions
  p1.x = PADDLE_MARGIN;
  p2.x = W - PADDLE_MARGIN - PADDLE_W;
  if(state==='menu'){
    p1.y = H/2 - p1.h/2;
    p2.y = H/2 - p2.h/2;
  }
}
window.addEventListener('resize', resize);

// === STATS ===
function loadStats(){
  try{
    const s = localStorage.getItem('korb_pong_stats');
    if(s) stats = JSON.parse(s);
  }catch(e){}
  updateStatsUI();
}
function saveStats(){
  try{ localStorage.setItem('korb_pong_stats', JSON.stringify(stats)); }catch(e){}
}
function updateStatsUI(){
  document.getElementById('statWins').textContent = stats.wins;
  document.getElementById('statLosses').textContent = stats.losses;
  document.getElementById('statRally').textContent = stats.longestRally;
  document.getElementById('statGames').textContent = stats.games;
}

// === MENU LOGIC ===
function setActive(selector, val, attr){
  document.querySelectorAll(`[${attr}]`).forEach(b=>{
    b.classList.toggle('active', b.getAttribute(attr)===String(val));
  });
}
function setMode(m){
  config.mode = m;
  setActive('button','','data-mode'); // clear
  document.querySelectorAll('[data-mode]').forEach(b=>b.classList.toggle('active',b.dataset.mode===m));
  document.getElementById('difficultySection').style.display = m==='pvai'?'':'none';
  document.getElementById('p2Label').textContent = m==='pvai'?'AI':'P2';
}
function setDifficulty(d){ config.difficulty=d; document.querySelectorAll('[data-diff]').forEach(b=>b.classList.toggle('active',b.dataset.diff===d)); }
function setPoints(p){ config.pointsToWin=p; document.querySelectorAll('[data-pts]').forEach(b=>b.classList.toggle('active',parseInt(b.dataset.pts)===p)); }
function setPowerUps(v){ config.powerUps=v; document.querySelectorAll('[data-pu]').forEach(b=>b.classList.toggle('active',(b.dataset.pu==='on')===v)); }
function setBallSpeed(v){ config.ballSpeed=v; document.querySelectorAll('[data-bs]').forEach(b=>b.classList.toggle('active',b.dataset.bs===v)); }
function setPaddleSize(v){ config.paddleSize=v; document.querySelectorAll('[data-ps]').forEach(b=>b.classList.toggle('active',b.dataset.ps===v)); }
function setSound(v){ config.sound=v; document.querySelectorAll('[data-snd]').forEach(b=>b.classList.toggle('active',(b.dataset.snd==='on')===v)); }
function closeSettings(){ document.getElementById('settingsPanel').classList.add('hidden'); }
document.getElementById('settingsBtn').addEventListener('click', ()=>{
  document.getElementById('settingsPanel').classList.toggle('hidden');
});

// === GAME INIT ===
function getBallSpeedMult(){
  return config.ballSpeed==='slow'?0.75:config.ballSpeed==='fast'?1.3:1;
}
function getPaddleH(){
  const base = config.paddleSize==='small'?60:config.paddleSize==='large'?110:BASE_PADDLE_H;
  return base;
}

function resetBall(serving){
  const spd = BASE_BALL_SPEED * getBallSpeedMult();
  ball.x = W/2;
  ball.y = H/2;
  ball.speed = spd;
  ball.trail = [];
  if(serving){
    ball.vx = 0; ball.vy = 0;
  } else {
    const angle = (Math.random()*0.8 - 0.4);
    const dir = serveSide===1 ? 1 : -1;
    ball.vx = Math.cos(angle) * spd * dir;
    ball.vy = Math.sin(angle) * spd;
  }
  extraBalls = [];
}

function initGame(){
  score1 = 0; score2 = 0;
  currentRally = 0; gameLongestRally = 0;
  const ph = getPaddleH();
  p1.h = ph; p2.h = ph;
  p1.y = H/2 - ph/2; p2.y = H/2 - ph/2;
  p1.vy = 0; p2.vy = 0;
  particles = [];
  powerUpItems = [];
  activePowerUps = {p1:[],p2:[]};
  powerUpTimer = 0;
  serveSide = Math.random()<0.5?1:2;
  updateScoreUI();
}

function startGame(){
  document.getElementById('menuOverlay').classList.add('hidden');
  initGame();
  state = 'serving';
  serveTimer = Date.now();
  resetBall(true);
}

function rematch(){
  document.getElementById('gameOverOverlay').classList.add('hidden');
  initGame();
  state = 'serving';
  serveTimer = Date.now();
  resetBall(true);
}

function returnToMenu(){
  state = 'menu';
  document.getElementById('pauseOverlay').classList.add('hidden');
  document.getElementById('gameOverOverlay').classList.add('hidden');
  document.getElementById('menuOverlay').classList.remove('hidden');
  resetBall(true);
  p1.y = H/2 - p1.h/2; p2.y = H/2 - p2.h/2;
}

function updateScoreUI(){
  document.getElementById('score1').textContent = score1;
  document.getElementById('score2').textContent = score2;
  document.getElementById('rallyCount').textContent = 'RALLY: ' + currentRally;
}

// === INPUT ===
document.addEventListener('keydown', e=>{
  keys[e.code] = true;
  if(e.code==='Space'){
    e.preventDefault();
    if(state==='playing'){
      state='paused';
      document.getElementById('pauseOverlay').classList.remove('hidden');
    } else if(state==='paused'){
      state='playing';
      document.getElementById('pauseOverlay').classList.add('hidden');
    }
  }
});
document.addEventListener('keyup', e=>{ keys[e.code]=false; });

canvas.addEventListener('mousemove', e=>{
  const rect = canvas.getBoundingClientRect();
  mouseY = (e.clientY - rect.top) * (H / rect.height);
});
canvas.addEventListener('mouseleave', ()=>{ mouseY=null; });

// Touch
canvas.addEventListener('touchstart', handleTouch, {passive:false});
canvas.addEventListener('touchmove', handleTouch, {passive:false});
canvas.addEventListener('touchend', e=>{
  e.preventDefault();
  // Check remaining touches
  const rect = canvas.getBoundingClientRect();
  touchP1 = null; touchP2 = null;
  for(let t of e.touches){
    const tx = (t.clientX - rect.left) * (W / rect.width);
    const ty = (t.clientY - rect.top) * (H / rect.height);
    if(tx < W/2) touchP1 = ty; else touchP2 = ty;
  }
});

function handleTouch(e){
  e.preventDefault();
  const rect = canvas.getBoundingClientRect();
  touchP1 = null; touchP2 = null;
  let tappedCenter = false;
  for(let t of e.touches){
    const tx = (t.clientX - rect.left) * (W / rect.width);
    const ty = (t.clientY - rect.top) * (H / rect.height);
    if(Math.abs(tx - W/2) < 40 && e.type === 'touchstart'){
      tappedCenter = true;
    }
    if(tx < W/2) touchP1 = ty; else touchP2 = ty;
  }
  if(tappedCenter && e.type === 'touchstart'){
    if(state==='playing'){
      state='paused';
      document.getElementById('pauseOverlay').classList.remove('hidden');
    } else if(state==='paused'){
      state='playing';
      document.getElementById('pauseOverlay').classList.add('hidden');
    }
  }
}

// === AI ===
function updateAI(dt){
  const diff = config.difficulty;
  let reactionTime, errorRange, speed, predicts;
  switch(diff){
    case 'easy':    reactionTime=0.3; errorRange=60; speed=3; predicts=false; break;
    case 'medium':  reactionTime=0.15; errorRange=30; speed=5; predicts=false; break;
    case 'hard':    reactionTime=0.05; errorRange=10; speed=7; predicts=true; break;
    case 'impossible': reactionTime=0.03; errorRange=3; speed=9; predicts=true; break;
    default:        reactionTime=0.15; errorRange=30; speed=5; predicts=false;
  }

  aiReactionTimer -= dt;
  if(aiReactionTimer <= 0){
    aiReactionTimer = reactionTime;
    if(predicts && ball.vx > 0){
      // Predict where ball will be when it reaches paddle
      let bx=ball.x, by=ball.y, bvx=ball.vx, bvy=ball.vy;
      let steps=0;
      while(bx < p2.x && steps<500){
        bx+=bvx; by+=bvy;
        if(by<=BALL_R||by>=H-BALL_R) bvy=-bvy;
        steps++;
      }
      aiTargetY = by + (Math.random()-0.5)*errorRange;
    } else {
      aiTargetY = ball.y + (Math.random()-0.5)*errorRange;
    }
    // If ball going away, drift toward center
    if(ball.vx < 0){
      aiTargetY = H/2 + (Math.random()-0.5)*errorRange*2;
    }
  }

  const paddleCenter = p2.y + p2.h/2;
  const diff2 = aiTargetY - paddleCenter;
  const moveSpeed = speed * getBallSpeedMult();
  if(Math.abs(diff2) > 4){
    p2.y += Math.sign(diff2) * Math.min(Math.abs(diff2), moveSpeed);
  }
  p2.y = Math.max(0, Math.min(H - p2.h, p2.y));
}

// === PARTICLES ===
function spawnParticles(x, y, color, count){
  for(let i=0;i<count;i++){
    const angle = Math.random()*Math.PI*2;
    const speed = 1 + Math.random()*3;
    particles.push({
      x, y,
      vx: Math.cos(angle)*speed,
      vy: Math.sin(angle)*speed,
      life: 0.4 + Math.random()*0.3,
      maxLife: 0.4 + Math.random()*0.3,
      color,
      size: 1.5 + Math.random()*2.5
    });
  }
}

// === POWER-UPS ===
function spawnPowerUp(){
  if(!config.powerUps) return;
  const type = POWERUP_TYPES[Math.floor(Math.random()*POWERUP_TYPES.length)];
  powerUpItems.push({
    x: W*0.25 + Math.random()*W*0.5,
    y: 30 + Math.random()*(H-60),
    type,
    radius: 14,
    life: 10,
    pulse: 0
  });
}

function applyPowerUp(type, player){
  const side = player===1?'p1':'p2';
  const opp = player===1?'p2':'p1';
  const paddle = player===1?p1:p2;
  const oppPaddle = player===1?p2:p1;

  switch(type){
    case 'multiball':
      extraBalls.push({
        x:ball.x, y:ball.y,
        vx:ball.vx, vy:-ball.vy,
        speed:ball.speed, trail:[]
      });
      break;
    case 'bigpaddle':
      activePowerUps[side].push({type,timer:8});
      paddle.h = getPaddleH() * 1.5;
      break;
    case 'smallopponent':
      activePowerUps[opp].push({type:'shrunk',timer:8});
      oppPaddle.h = getPaddleH() * 0.6;
      break;
    case 'speedboost':
      ball.speed = Math.min(ball.speed * 1.4, MAX_BALL_SPEED);
      const mag = Math.sqrt(ball.vx*ball.vx+ball.vy*ball.vy);
      if(mag>0){ ball.vx = (ball.vx/mag)*ball.speed; ball.vy = (ball.vy/mag)*ball.speed; }
      break;
    case 'curveball':
      activePowerUps[side].push({type,timer:6});
      break;
  }
  playTone(880, 0.1, 'sine', 0.12);
}

function updatePowerUps(dt){
  if(!config.powerUps) return;
  powerUpTimer -= dt;
  if(powerUpTimer <= 0 && powerUpItems.length < 3){
    spawnPowerUp();
    powerUpTimer = 4 + Math.random()*6;
  }

  // Animate
  powerUpItems.forEach(p=>{ p.life-=dt; p.pulse+=dt*4; });
  powerUpItems = powerUpItems.filter(p=>p.life>0);

  // Check collision with ball(s)
  const allBalls = [ball, ...extraBalls];
  for(let i=powerUpItems.length-1; i>=0; i--){
    const pu = powerUpItems[i];
    for(const b of allBalls){
      const dx=b.x-pu.x, dy=b.y-pu.y;
      if(Math.sqrt(dx*dx+dy*dy) < pu.radius+BALL_R){
        // Determine which player's side ball came from
        const player = b.vx > 0 ? 1 : 2;
        applyPowerUp(pu.type, player);
        spawnParticles(pu.x, pu.y, POWERUP_COLORS[pu.type], 12);
        powerUpItems.splice(i, 1);
        break;
      }
    }
  }

  // Update active power-up timers
  ['p1','p2'].forEach(side=>{
    const paddle = side==='p1'?p1:p2;
    for(let i=activePowerUps[side].length-1;i>=0;i--){
      activePowerUps[side][i].timer -= dt;
      if(activePowerUps[side][i].timer <= 0){
        const t = activePowerUps[side][i].type;
        if(t==='bigpaddle'||t==='shrunk'){
          paddle.h = getPaddleH();
        }
        activePowerUps[side].splice(i, 1);
      }
    }
  });
}

// === MAIN UPDATE ===
function updateBallPhysics(b, dt){
  // Wall bounce
  if(b.y - BALL_R <= 0){
    b.y = BALL_R;
    b.vy = Math.abs(b.vy);
    sndWallBounce();
    spawnParticles(b.x, b.y, COLORS.dim, 4);
  }
  if(b.y + BALL_R >= H){
    b.y = H - BALL_R;
    b.vy = -Math.abs(b.vy);
    sndWallBounce();
    spawnParticles(b.x, b.y, COLORS.dim, 4);
  }

  // Curve ball effect
  const hasCurve1 = activePowerUps.p1.some(p=>p.type==='curveball');
  const hasCurve2 = activePowerUps.p2.some(p=>p.type==='curveball');
  if(hasCurve1 && b.vx > 0) b.vy += 0.08 * (b.vy > 0 ? 1 : -1);
  if(hasCurve2 && b.vx < 0) b.vy += 0.08 * (b.vy > 0 ? 1 : -1);

  // Paddle collision - P1
  if(b.vx < 0 && b.x - BALL_R <= p1.x + PADDLE_W && b.x + BALL_R >= p1.x){
    if(b.y >= p1.y && b.y <= p1.y + p1.h){
      b.x = p1.x + PADDLE_W + BALL_R;
      const relHit = (b.y - p1.y) / p1.h; // 0-1
      const angle = (relHit - 0.5) * (Math.PI * 0.7); // -63 to +63 deg
      b.speed = Math.min(b.speed + BALL_ACCEL, MAX_BALL_SPEED);
      b.vx = Math.cos(angle) * b.speed;
      b.vy = Math.sin(angle) * b.speed;
      currentRally++;
      sndPaddleHit();
      spawnParticles(b.x, b.y, COLORS.cyan, 8);
      return 'hit';
    }
  }

  // Paddle collision - P2
  if(b.vx > 0 && b.x + BALL_R >= p2.x && b.x - BALL_R <= p2.x + PADDLE_W){
    if(b.y >= p2.y && b.y <= p2.y + p2.h){
      b.x = p2.x - BALL_R;
      const relHit = (b.y - p2.y) / p2.h;
      const angle = Math.PI - (relHit - 0.5) * (Math.PI * 0.7);
      b.speed = Math.min(b.speed + BALL_ACCEL, MAX_BALL_SPEED);
      b.vx = Math.cos(angle) * b.speed;
      b.vy = Math.sin(angle) * b.speed;
      currentRally++;
      sndPaddleHit();
      spawnParticles(b.x, b.y, COLORS.orange, 8);
      return 'hit';
    }
  }

  return null;
}

function update(dt){
  if(state === 'serving'){
    if(Date.now() - serveTimer > SERVE_DELAY){
      state = 'playing';
      resetBall(false);
    }
    return;
  }
  if(state !== 'playing') return;

  // === Move paddles ===
  const paddleSpeed = 6;

  // P1
  if(touchP1 !== null){
    const target = touchP1 - p1.h/2;
    p1.y += (target - p1.y) * 0.3;
  } else if(mouseY !== null){
    const target = mouseY - p1.h/2;
    p1.y += (target - p1.y) * 0.3;
  } else {
    if(keys['KeyW'] || (keys['ArrowUp'] && config.mode==='pvai')) p1.y -= paddleSpeed;
    if(keys['KeyS'] || (keys['ArrowDown'] && config.mode==='pvai')) p1.y += paddleSpeed;
  }
  p1.y = Math.max(0, Math.min(H - p1.h, p1.y));

  // P2
  if(config.mode === 'pvai'){
    updateAI(dt);
  } else {
    if(touchP2 !== null){
      const target = touchP2 - p2.h/2;
      p2.y += (target - p2.y) * 0.3;
    } else {
      if(keys['ArrowUp']) p2.y -= paddleSpeed;
      if(keys['ArrowDown']) p2.y += paddleSpeed;
    }
    p2.y = Math.max(0, Math.min(H - p2.h, p2.y));
  }

  // === Move ball ===
  ball.trail.unshift({x:ball.x, y:ball.y});
  if(ball.trail.length > 12) ball.trail.pop();

  ball.x += ball.vx;
  ball.y += ball.vy;
  updateBallPhysics(ball, dt);

  // Extra balls
  for(let i=extraBalls.length-1; i>=0; i--){
    const eb = extraBalls[i];
    eb.trail.unshift({x:eb.x, y:eb.y});
    if(eb.trail.length > 8) eb.trail.pop();
    eb.x += eb.vx; eb.y += eb.vy;
    updateBallPhysics(eb, dt);
    if(eb.x < -20 || eb.x > W+20){
      extraBalls.splice(i, 1);
    }
  }

  // === Score check ===
  if(ball.x < -BALL_R*2){
    scorePoint(2);
  } else if(ball.x > W + BALL_R*2){
    scorePoint(1);
  }

  // Update rally display
  document.getElementById('rallyCount').textContent = 'RALLY: ' + currentRally;

  // Particles
  particles.forEach(p=>{
    p.x += p.vx; p.y += p.vy;
    p.life -= dt;
    p.vx *= 0.96; p.vy *= 0.96;
  });
  particles = particles.filter(p=>p.life > 0);

  // Power-ups
  updatePowerUps(dt);

  // Center line animation
  centerLineOffset = (centerLineOffset + dt * 20) % 20;

  // Screen flash decay
  if(screenFlash > 0) screenFlash -= dt * 4;
}

function scorePoint(winner){
  if(winner === 1){ score1++; serveSide = 2; }
  else { score2++; serveSide = 1; }

  if(currentRally > gameLongestRally) gameLongestRally = currentRally;
  if(currentRally > stats.longestRally){ stats.longestRally = currentRally; saveStats(); }
  currentRally = 0;

  screenFlash = 1;
  sndScore(winner);
  updateScoreUI();

  // Clear power-ups on score
  powerUpItems = [];
  activePowerUps = {p1:[],p2:[]};
  p1.h = getPaddleH(); p2.h = getPaddleH();

  // Check game over
  if(score1 >= config.pointsToWin || score2 >= config.pointsToWin){
    gameOver(score1 >= config.pointsToWin ? 1 : 2);
    return;
  }

  // Check game point
  if(score1 === config.pointsToWin-1 || score2 === config.pointsToWin-1){
    sndGamePoint();
  }

  state = 'serving';
  serveTimer = Date.now();
  resetBall(true);
}

function gameOver(winner){
  state = 'gameover';
  stats.games++;
  if(config.mode==='pvai'){
    if(winner===1) stats.wins++; else stats.losses++;
  }
  saveStats();
  updateStatsUI();

  const winnerName = winner===1 ? 'PLAYER 1' : (config.mode==='pvai'?'AI':'PLAYER 2');
  const winColor = winner===1 ? COLORS.cyan : COLORS.orange;
  document.getElementById('winnerText').textContent = winnerName + ' WINS';
  document.getElementById('winnerText').style.color = winColor;
  document.getElementById('winnerText').style.textShadow = `0 0 20px ${winColor}60`;
  document.getElementById('finalScore').textContent = score1 + ' - ' + score2;
  document.getElementById('finalRally').textContent = 'Longest Rally: ' + gameLongestRally;
  document.getElementById('gameOverOverlay').classList.remove('hidden');

  sndGamePoint();
}

// === DRAW ===
function draw(){
  ctx.fillStyle = COLORS.bg;
  ctx.fillRect(0, 0, W, H);

  // Screen flash
  if(screenFlash > 0){
    ctx.fillStyle = `rgba(255,255,255,${screenFlash * 0.08})`;
    ctx.fillRect(0, 0, W, H);
  }

  // Center dashed line
  ctx.strokeStyle = COLORS.border;
  ctx.lineWidth = 2;
  ctx.setLineDash([10, 10]);
  ctx.lineDashOffset = -centerLineOffset;
  ctx.beginPath();
  ctx.moveTo(W/2, 0);
  ctx.lineTo(W/2, H);
  ctx.stroke();
  ctx.setLineDash([]);

  // Center circle
  ctx.strokeStyle = COLORS.border;
  ctx.lineWidth = 1;
  ctx.beginPath();
  ctx.arc(W/2, H/2, 40, 0, Math.PI*2);
  ctx.stroke();

  // Power-ups
  powerUpItems.forEach(pu=>{
    const alpha = Math.min(1, pu.life/2);
    const r = pu.radius + Math.sin(pu.pulse)*3;
    ctx.save();
    ctx.globalAlpha = alpha * 0.3;
    ctx.fillStyle = POWERUP_COLORS[pu.type];
    ctx.beginPath();
    ctx.arc(pu.x, pu.y, r+6, 0, Math.PI*2);
    ctx.fill();
    ctx.globalAlpha = alpha;
    ctx.fillStyle = POWERUP_COLORS[pu.type];
    ctx.beginPath();
    ctx.arc(pu.x, pu.y, r, 0, Math.PI*2);
    ctx.fill();
    ctx.fillStyle = '#000';
    ctx.font = 'bold 9px "JetBrains Mono"';
    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';
    ctx.fillText(POWERUP_LABELS[pu.type], pu.x, pu.y);
    ctx.restore();
  });

  // Ball trail
  function drawTrail(b, color){
    b.trail.forEach((t,i)=>{
      const alpha = (1 - i/b.trail.length) * 0.3;
      const r = BALL_R * (1 - i/b.trail.length * 0.5);
      ctx.fillStyle = color;
      ctx.globalAlpha = alpha;
      ctx.beginPath();
      ctx.arc(t.x, t.y, r, 0, Math.PI*2);
      ctx.fill();
    });
    ctx.globalAlpha = 1;
  }
  drawTrail(ball, COLORS.white);
  extraBalls.forEach(eb=>drawTrail(eb, 'rgba(0,212,255,0.8)'));

  // Ball glow
  function drawBall(b){
    ctx.save();
    ctx.shadowColor = COLORS.white;
    ctx.shadowBlur = 15;
    ctx.fillStyle = COLORS.white;
    ctx.beginPath();
    ctx.arc(b.x, b.y, BALL_R, 0, Math.PI*2);
    ctx.fill();
    ctx.restore();
  }
  if(state !== 'serving') drawBall(ball);
  else {
    // Pulsing ball during serve
    const t = (Date.now() - serveTimer) / SERVE_DELAY;
    ctx.globalAlpha = 0.3 + Math.sin(t * Math.PI * 4) * 0.3;
    drawBall(ball);
    ctx.globalAlpha = 1;
  }
  extraBalls.forEach(drawBall);

  // Paddles
  function drawPaddle(paddle, color){
    ctx.save();
    ctx.shadowColor = color;
    ctx.shadowBlur = 12;
    ctx.fillStyle = color;
    // Rounded rect
    const r = 3;
    const x=paddle.x, y=paddle.y, w=PADDLE_W, h=paddle.h;
    ctx.beginPath();
    ctx.moveTo(x+r, y);
    ctx.lineTo(x+w-r, y);
    ctx.quadraticCurveTo(x+w, y, x+w, y+r);
    ctx.lineTo(x+w, y+h-r);
    ctx.quadraticCurveTo(x+w, y+h, x+w-r, y+h);
    ctx.lineTo(x+r, y+h);
    ctx.quadraticCurveTo(x, y+h, x, y+h-r);
    ctx.lineTo(x, y+r);
    ctx.quadraticCurveTo(x, y, x+r, y);
    ctx.fill();
    ctx.restore();
  }
  drawPaddle(p1, COLORS.cyan);
  drawPaddle(p2, COLORS.orange);

  // Active power-up indicators on paddles
  function drawPaddlePU(paddle, side, xAnchor){
    const pus = activePowerUps[side];
    pus.forEach((pu, i)=>{
      const y = paddle.y + 4 + i*14;
      ctx.fillStyle = POWERUP_COLORS[pu.type] || COLORS.green;
      ctx.globalAlpha = 0.7;
      ctx.font = '8px "JetBrains Mono"';
      ctx.textAlign = side==='p1'?'left':'right';
      ctx.fillText(pu.type.substring(0,3).toUpperCase(), xAnchor, y);
    });
    ctx.globalAlpha = 1;
  }
  drawPaddlePU(p1, 'p1', p1.x + PADDLE_W + 6);
  drawPaddlePU(p2, 'p2', p2.x - 6);

  // Particles
  particles.forEach(p=>{
    ctx.globalAlpha = p.life / p.maxLife;
    ctx.fillStyle = p.color;
    ctx.fillRect(p.x - p.size/2, p.y - p.size/2, p.size, p.size);
  });
  ctx.globalAlpha = 1;

  // Serve indicator
  if(state === 'serving'){
    const arrowX = serveSide===1 ? W/2 + 20 : W/2 - 20;
    const dir = serveSide===1 ? 1 : -1;
    ctx.fillStyle = COLORS.text;
    ctx.globalAlpha = 0.5 + Math.sin(Date.now()/150)*0.3;
    ctx.beginPath();
    ctx.moveTo(arrowX, H/2 - 8);
    ctx.lineTo(arrowX + 12*dir, H/2);
    ctx.lineTo(arrowX, H/2 + 8);
    ctx.fill();
    ctx.globalAlpha = 1;
  }

  // Scanline subtle effect (extra layer)
  ctx.fillStyle = 'rgba(0,0,0,0.03)';
  for(let y=0; y<H; y+=4){
    ctx.fillRect(0, y, W, 1);
  }

  // Vignette
  const vg = ctx.createRadialGradient(W/2, H/2, H*0.4, W/2, H/2, H*0.9);
  vg.addColorStop(0, 'transparent');
  vg.addColorStop(1, 'rgba(0,0,0,0.3)');
  ctx.fillStyle = vg;
  ctx.fillRect(0, 0, W, H);
}

// === GAME LOOP ===
let lastTime = 0;
function gameLoop(timestamp){
  const dt = Math.min((timestamp - lastTime) / 1000, 0.05);
  lastTime = timestamp;

  update(dt);
  draw();
  requestAnimationFrame(gameLoop);
}

// === INIT ===
resize();
loadStats();
requestAnimationFrame(gameLoop);
</script>
