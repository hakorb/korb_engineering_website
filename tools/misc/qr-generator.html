<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>QR Code Studio - Korb Engineering</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<script src="../../vendor/qrcodejs-1.0.0.min.js"></script>
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --bg: #050a0f;
  --surface: #0a1018;
  --surface2: #0e1520;
  --border: #1a2535;
  --text: #e2e8f0;
  --text-muted: #64748b;
  --cyan: #00d4ff;
  --orange: #ff6600;
  --green: #10b981;
  --red: #ef4444;
  --radius: 8px;
  --radius-sm: 6px;
}

body {
  font-family: 'JetBrains Mono', monospace;
  background: var(--bg);
  color: var(--text);
  min-height: 100vh;
  font-size: 13px;
  line-height: 1.5;
}

/* Header */
header {
  background: var(--surface);
  border-bottom: 1px solid var(--border);
  padding: 16px 28px;
  display: flex;
  align-items: center;
  gap: 16px;
}

.brand {
  font-size: 11px;
  font-weight: 600;
  letter-spacing: 0.12em;
  text-transform: uppercase;
  color: var(--cyan);
}

header h1 {
  font-size: 18px;
  font-weight: 300;
  color: var(--text);
  letter-spacing: -0.3px;
}

.header-sep {
  width: 1px;
  height: 20px;
  background: var(--border);
}

/* Layout */
.layout {
  display: grid;
  grid-template-columns: 420px 1fr;
  min-height: calc(100vh - 57px);
}

/* Left Panel */
.controls {
  background: var(--surface);
  border-right: 1px solid var(--border);
  overflow-y: auto;
  max-height: calc(100vh - 57px);
}

.controls::-webkit-scrollbar { width: 6px; }
.controls::-webkit-scrollbar-track { background: transparent; }
.controls::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }
.controls::-webkit-scrollbar-thumb:hover { background: #2a3545; }

.panel-section {
  padding: 20px 24px;
  border-bottom: 1px solid var(--border);
}

.section-label {
  font-size: 10px;
  text-transform: uppercase;
  letter-spacing: 0.14em;
  color: var(--text-muted);
  margin-bottom: 14px;
  display: flex;
  align-items: center;
  gap: 8px;
}

.section-label::after {
  content: '';
  flex: 1;
  height: 1px;
  background: var(--border);
}

/* Tabs */
.tab-bar {
  display: flex;
  flex-wrap: wrap;
  gap: 4px;
  margin-bottom: 16px;
}

.tab-btn {
  font-family: 'JetBrains Mono', monospace;
  font-size: 11px;
  font-weight: 500;
  padding: 7px 12px;
  border: 1px solid var(--border);
  border-radius: var(--radius-sm);
  background: transparent;
  color: var(--text-muted);
  cursor: pointer;
  transition: all 0.15s;
  white-space: nowrap;
}

.tab-btn:hover {
  border-color: var(--cyan);
  color: var(--text);
}

.tab-btn.active {
  background: rgba(0, 212, 255, 0.1);
  border-color: var(--cyan);
  color: var(--cyan);
}

.tab-content { display: none; }
.tab-content.active { display: block; }

/* Fields */
.field { display: flex; flex-direction: column; gap: 6px; margin-bottom: 12px; }
.field:last-child { margin-bottom: 0; }
.field label {
  font-size:16px;
  color: var(--text-muted);
  letter-spacing: 0.04em;
  font-weight: 400;
}

input[type="text"],
input[type="url"],
input[type="email"],
input[type="tel"],
input[type="number"],
select,
textarea {
  font-family: 'JetBrains Mono', monospace;
  font-size:16px;
  background: var(--bg);
  border: 1px solid var(--border);
  border-radius: var(--radius-sm);
  padding: 10px 12px;
  color: var(--text);
  transition: border-color 0.15s;
  width: 100%;
  outline: none;
}

input:focus, select:focus, textarea:focus {
  border-color: var(--cyan);
}

textarea { resize: vertical; min-height: 80px; }

input::placeholder, textarea::placeholder {
  color: var(--text-muted);
  opacity: 0.6;
}

select {
  cursor: pointer;
  appearance: none;
  background-image: url("data:image/svg+xml,%3Csvg width='10' height='6' viewBox='0 0 10 6' xmlns='http://www.w3.org/2000/svg'%3E%3Cpath d='M1 1l4 4 4-4' stroke='%2364748b' stroke-width='1.5' fill='none'/%3E%3C/svg%3E");
  background-repeat: no-repeat;
  background-position: right 12px center;
  padding-right: 32px;
}

.row { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
.row .field { margin-bottom: 0; }

/* Color Fields */
.color-field {
  display: flex;
  align-items: center;
  gap: 10px;
  background: var(--bg);
  border: 1px solid var(--border);
  border-radius: var(--radius-sm);
  padding: 6px 12px;
  cursor: pointer;
  transition: border-color 0.15s;
}

.color-field:focus-within { border-color: var(--cyan); }

input[type="color"] {
  width: 28px;
  height: 28px;
  border: 1px solid var(--border);
  border-radius: 4px;
  cursor: pointer;
  padding: 0;
  background: none;
  -webkit-appearance: none;
}

input[type="color"]::-webkit-color-swatch-wrapper { padding: 2px; }
input[type="color"]::-webkit-color-swatch { border: none; border-radius: 2px; }

.color-hex {
  font-size: 12px;
  color: var(--text-muted);
}

/* Checkbox / Toggle */
.toggle-row {
  display: flex;
  align-items: center;
  gap: 10px;
  margin-bottom: 12px;
}

.toggle-row label {
  font-size: 11px;
  color: var(--text-muted);
  cursor: pointer;
}

.toggle {
  position: relative;
  width: 36px;
  height: 20px;
  background: var(--border);
  border-radius: 10px;
  cursor: pointer;
  transition: background 0.2s;
  flex-shrink: 0;
}

.toggle.on { background: var(--cyan); }

.toggle::after {
  content: '';
  position: absolute;
  top: 2px;
  left: 2px;
  width: 16px;
  height: 16px;
  background: var(--text);
  border-radius: 50%;
  transition: transform 0.2s;
}

.toggle.on::after { transform: translateX(16px); }

/* Range */
.slider-wrap { margin-bottom: 12px; }
.slider-row { display: flex; align-items: center; gap: 10px; }

input[type="range"] {
  flex: 1;
  accent-color: var(--cyan);
  cursor: pointer;
  height: 4px;
  -webkit-appearance: none;
  background: var(--border);
  border-radius: 2px;
  outline: none;
}

input[type="range"]::-webkit-slider-thumb {
  -webkit-appearance: none;
  width: 14px;
  height: 14px;
  border-radius: 50%;
  background: var(--cyan);
  cursor: pointer;
}

.slider-val {
  font-size: 11px;
  color: var(--text-muted);
  min-width: 36px;
  text-align: right;
  font-weight: 500;
}

/* Buttons */
.btn {
  font-family: 'JetBrains Mono', monospace;
  font-size: 12px;
  font-weight: 500;
  border: none;
  border-radius: var(--radius-sm);
  padding: 10px 16px;
  cursor: pointer;
  transition: all 0.15s;
  display: inline-flex;
  align-items: center;
  justify-content: center;
  gap: 7px;
  letter-spacing: 0.02em;
}

.btn-primary {
  background: var(--cyan);
  color: var(--bg);
}
.btn-primary:hover { background: #00bde6; }

.btn-orange {
  background: var(--orange);
  color: #fff;
}
.btn-orange:hover { background: #e65c00; }

.btn-outline {
  background: transparent;
  color: var(--text);
  border: 1px solid var(--border);
}
.btn-outline:hover { border-color: var(--text-muted); background: var(--surface2); }

.btn-ghost {
  background: transparent;
  color: var(--text-muted);
  border: none;
  padding: 6px 10px;
}
.btn-ghost:hover { color: var(--text); background: var(--surface2); }

.btn-danger {
  background: transparent;
  color: var(--red);
  border: 1px solid rgba(239, 68, 68, 0.3);
}
.btn-danger:hover { background: rgba(239, 68, 68, 0.1); border-color: var(--red); }

.btn-row { display: flex; gap: 8px; flex-wrap: wrap; }

/* Upload */
.upload-area {
  border: 1.5px dashed var(--border);
  border-radius: var(--radius-sm);
  padding: 14px;
  cursor: pointer;
  background: var(--bg);
  transition: border-color 0.15s, background 0.15s;
  font-size: 12px;
  color: var(--text-muted);
  display: flex;
  align-items: center;
  gap: 10px;
}

.upload-area:hover { border-color: var(--cyan); color: var(--cyan); }

.logo-preview-row {
  display: flex;
  align-items: center;
  gap: 10px;
  margin-top: 10px;
}

#logo-thumb {
  width: 40px;
  height: 40px;
  object-fit: contain;
  border: 1px solid var(--border);
  border-radius: 4px;
  background: var(--bg);
  display: none;
}

.clear-logo {
  font-family: 'JetBrains Mono', monospace;
  font-size: 11px;
  color: var(--red);
  background: none;
  border: none;
  cursor: pointer;
  padding: 4px 8px;
  display: none;
  border-radius: 4px;
  transition: background 0.15s;
}
.clear-logo:hover { background: rgba(239, 68, 68, 0.1); }

/* Warnings */
.warn {
  background: rgba(255, 102, 0, 0.08);
  border: 1px solid rgba(255, 102, 0, 0.3);
  border-radius: var(--radius-sm);
  padding: 10px 14px;
  font-size: 11px;
  color: var(--orange);
  display: none;
  margin-top: 10px;
}

/* Preview Pane */
.preview-pane {
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  padding: 40px;
  gap: 20px;
  background: var(--bg);
  min-height: calc(100vh - 57px);
}

.preview-label {
  font-size: 10px;
  color: var(--text-muted);
  text-transform: uppercase;
  letter-spacing: 0.14em;
}

.qr-container {
  position: relative;
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: 20px;
  box-shadow: 0 4px 24px rgba(0, 0, 0, 0.3), 0 0 0 1px rgba(0, 212, 255, 0.05);
  display: inline-block;
}

#final-canvas {
  display: block;
  max-width: 400px;
  height: auto;
  border-radius: 4px;
}

#qr-hidden { display: none; }

.size-display {
  font-size: 11px;
  color: var(--text-muted);
}

.export-bar {
  display: flex;
  gap: 8px;
  flex-wrap: wrap;
  justify-content: center;
}

/* History */
.history-list {
  display: flex;
  flex-direction: column;
  gap: 6px;
  max-height: 300px;
  overflow-y: auto;
}

.history-item {
  display: flex;
  align-items: center;
  gap: 10px;
  padding: 8px 12px;
  background: var(--bg);
  border: 1px solid var(--border);
  border-radius: var(--radius-sm);
  cursor: pointer;
  transition: border-color 0.15s;
  font-size: 11px;
}

.history-item:hover { border-color: var(--cyan); }

.history-item .h-mode {
  font-size: 9px;
  text-transform: uppercase;
  letter-spacing: 0.1em;
  color: var(--cyan);
  background: rgba(0, 212, 255, 0.08);
  padding: 2px 6px;
  border-radius: 3px;
  white-space: nowrap;
  flex-shrink: 0;
}

.history-item .h-text {
  flex: 1;
  overflow: hidden;
  text-overflow: ellipsis;
  white-space: nowrap;
  color: var(--text-muted);
}

.history-empty {
  font-size: 11px;
  color: var(--text-muted);
  font-style: italic;
  padding: 8px 0;
}

/* Mobile */
@media (max-width: 860px) {
  .layout { grid-template-columns: 1fr; }
  .controls {
    border-right: none;
    border-bottom: 1px solid var(--border);
    max-height: none;
  }
  .preview-pane { min-height: auto; padding: 28px 20px; }
  header { padding: 14px 20px; }
  .row { grid-template-columns: 1fr; }
  #final-canvas { max-width: 300px; }
  .tab-btn { font-size: 10px; padding: 6px 9px; }
}

button, select, .btn, .upload-area, .clear-logo, [role="button"] {
  min-height: 40px;
  touch-action: manipulation;
}
</style>
</head>
<body>

<header>
  <span class="brand">Korb Engineering</span>
  <div class="header-sep"></div>
  <h1>QR Code Studio</h1>
</header>

<div class="layout">
  <div class="controls">

    <!-- Input Mode Tabs -->
    <div class="panel-section">
      <div class="section-label">Input Mode</div>
      <div class="tab-bar" id="tab-bar">
        <button class="tab-btn active" data-tab="url">URL</button>
        <button class="tab-btn" data-tab="text">Text</button>
        <button class="tab-btn" data-tab="vcard">vCard</button>
        <button class="tab-btn" data-tab="wifi">WiFi</button>
        <button class="tab-btn" data-tab="email">Email</button>
        <button class="tab-btn" data-tab="phone">Phone</button>
        <button class="tab-btn" data-tab="sms">SMS</button>
        <button class="tab-btn" data-tab="location">Location</button>
      </div>

      <!-- URL -->
      <div class="tab-content active" id="tab-url">
        <div class="field">
          <label>URL</label>
          <input type="url" id="in-url" placeholder="https://example.com">
        </div>
      </div>

      <!-- Text -->
      <div class="tab-content" id="tab-text">
        <div class="field">
          <label>Text Content</label>
          <textarea id="in-text" placeholder="Enter any text..." rows="4"></textarea>
        </div>
      </div>

      <!-- vCard -->
      <div class="tab-content" id="tab-vcard">
        <div class="row" style="margin-bottom:12px;">
          <div class="field"><label>First Name</label><input type="text" id="vc-fname" placeholder="John"></div>
          <div class="field"><label>Last Name</label><input type="text" id="vc-lname" placeholder="Doe"></div>
        </div>
        <div class="field"><label>Organization</label><input type="text" id="vc-org" placeholder="Korb Engineering"></div>
        <div class="field"><label>Phone</label><input type="tel" id="vc-phone" placeholder="+1 555-0100"></div>
        <div class="field"><label>Email</label><input type="email" id="vc-email" placeholder="john@example.com"></div>
        <div class="field"><label>Address</label><input type="text" id="vc-addr" placeholder="123 Main St, City, State"></div>
      </div>

      <!-- WiFi -->
      <div class="tab-content" id="tab-wifi">
        <div class="field"><label>SSID (Network Name)</label><input type="text" id="wifi-ssid" placeholder="MyNetwork"></div>
        <div class="field"><label>Password</label><input type="text" id="wifi-pass" placeholder="password123"></div>
        <div class="row" style="margin-bottom:12px;">
          <div class="field">
            <label>Encryption</label>
            <select id="wifi-enc">
              <option value="WPA">WPA/WPA2</option>
              <option value="WEP">WEP</option>
              <option value="nopass">None</option>
            </select>
          </div>
          <div class="field" style="justify-content:flex-end;">
            <div class="toggle-row">
              <div class="toggle" id="wifi-hidden" onclick="this.classList.toggle('on'); debounceGenerate()"></div>
              <label onclick="document.getElementById('wifi-hidden').click()">Hidden Network</label>
            </div>
          </div>
        </div>
      </div>

      <!-- Email -->
      <div class="tab-content" id="tab-email">
        <div class="field"><label>To</label><input type="email" id="em-to" placeholder="recipient@example.com"></div>
        <div class="field"><label>Subject</label><input type="text" id="em-subj" placeholder="Subject line"></div>
        <div class="field"><label>Body</label><textarea id="em-body" placeholder="Email body..." rows="3"></textarea></div>
      </div>

      <!-- Phone -->
      <div class="tab-content" id="tab-phone">
        <div class="field"><label>Phone Number</label><input type="tel" id="in-phone" placeholder="+1 555-0100"></div>
      </div>

      <!-- SMS -->
      <div class="tab-content" id="tab-sms">
        <div class="field"><label>Phone Number</label><input type="tel" id="sms-phone" placeholder="+1 555-0100"></div>
        <div class="field"><label>Message</label><textarea id="sms-msg" placeholder="Your message..." rows="3"></textarea></div>
      </div>

      <!-- Location -->
      <div class="tab-content" id="tab-location">
        <div class="row">
          <div class="field"><label>Latitude</label><input type="number" id="loc-lat" placeholder="40.7128" step="any"></div>
          <div class="field"><label>Longitude</label><input type="number" id="loc-lng" placeholder="-74.0060" step="any"></div>
        </div>
      </div>
    </div>

    <!-- Customization -->
    <div class="panel-section">
      <div class="section-label">Customization</div>

      <div class="row" style="margin-bottom:12px;">
        <div class="field">
          <label>Foreground</label>
          <div class="color-field">
            <input type="color" id="fg-color" value="#e2e8f0">
            <span class="color-hex" id="fg-hex">#e2e8f0</span>
          </div>
        </div>
        <div class="field">
          <label>Background</label>
          <div class="color-field">
            <input type="color" id="bg-color" value="#050a0f">
            <span class="color-hex" id="bg-hex">#050a0f</span>
          </div>
        </div>
      </div>

      <div class="toggle-row" style="margin-bottom:14px;">
        <div class="toggle" id="bg-transparent" onclick="this.classList.toggle('on'); debounceGenerate()"></div>
        <label onclick="document.getElementById('bg-transparent').click()">Transparent Background</label>
      </div>

      <div class="row" style="margin-bottom:12px;">
        <div class="field">
          <label>Error Correction</label>
          <select id="qr-ec">
            <option value="L">L - Low (7%)</option>
            <option value="M">M - Medium (15%)</option>
            <option value="Q">Q - Quartile (25%)</option>
            <option value="H" selected>H - High (30%)</option>
          </select>
        </div>
        <div class="field">
          <label>Output Size</label>
          <select id="qr-size">
            <option value="256">Small (256px)</option>
            <option value="512">Medium (512px)</option>
            <option value="1024" selected>Large (1024px)</option>
            <option value="2048">XL (2048px)</option>
          </select>
        </div>
      </div>

      <div class="slider-wrap">
        <div class="field" style="margin-bottom:4px;"><label>Quiet Zone (Margin)</label></div>
        <div class="slider-row">
          <input type="range" id="qr-margin" min="1" max="4" value="2" step="1">
          <span class="slider-val" id="margin-val">2</span>
        </div>
      </div>

      <div class="toggle-row" style="margin-top:8px;">
        <div class="toggle" id="qr-rounded" onclick="this.classList.toggle('on'); debounceGenerate()"></div>
        <label onclick="document.getElementById('qr-rounded').click()">Rounded Dots</label>
      </div>
    </div>

    <!-- Logo Overlay -->
    <div class="panel-section">
      <div class="section-label">Logo Overlay</div>
      <input type="file" id="logo-input" accept="image/png,image/jpeg,image/svg+xml" style="display:none">
      <div class="upload-area" onclick="document.getElementById('logo-input').click()">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="17 8 12 3 7 8"/><line x1="12" y1="3" x2="12" y2="15"/></svg>
        Upload Logo (PNG / JPG / SVG)
      </div>
      <div class="logo-preview-row">
        <img id="logo-thumb" alt="logo preview">
        <button class="clear-logo" id="clear-logo">Remove</button>
      </div>
      <div class="slider-wrap" style="margin-top:12px;">
        <div class="field" style="margin-bottom:4px;"><label>Logo Size</label></div>
        <div class="slider-row">
          <input type="range" id="logo-size" min="10" max="30" value="20" step="1">
          <span class="slider-val" id="logo-size-val">20%</span>
        </div>
      </div>
      <div class="warn" id="ec-warn">Logo overlay works best with Error Correction set to H. Lower levels may produce unreadable QR codes.</div>
    </div>

    <!-- History -->
    <div class="panel-section">
      <div class="section-label">History</div>
      <div class="history-list" id="history-list">
        <div class="history-empty" id="history-empty">No history yet.</div>
      </div>
      <div style="margin-top:10px;">
        <button class="btn btn-danger" id="clear-history" style="font-size:11px;padding:6px 12px;">Clear History</button>
      </div>
    </div>

  </div>

  <!-- Preview -->
  <div class="preview-pane">
    <span class="preview-label">Live Preview</span>
    <div class="qr-container">
      <canvas id="final-canvas"></canvas>
    </div>
    <div id="qr-hidden"></div>
    <span class="size-display" id="size-display">1024 x 1024 px</span>
    <div class="export-bar">
      <button class="btn btn-primary" onclick="downloadPNG()">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>
        PNG
      </button>
      <button class="btn btn-orange" onclick="downloadSVG()">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/></svg>
        SVG
      </button>
      <button class="btn btn-outline" onclick="copyToClipboard()">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><rect x="9" y="9" width="13" height="13" rx="2" ry="2"/><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"/></svg>
        Copy
      </button>
      <button class="btn btn-outline" onclick="printQR()">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><polyline points="6 9 6 2 18 2 18 9"/><path d="M6 18H4a2 2 0 0 1-2-2v-5a2 2 0 0 1 2-2h16a2 2 0 0 1 2 2v5a2 2 0 0 1-2 2h-2"/><rect x="6" y="14" width="12" height="8"/></svg>
        Print
      </button>
    </div>
  </div>
</div>

<script>
// ---- State ----
let logoImage = null;
let debounceTimer = null;
let activeTab = 'url';

// ---- Elements ----
const finalCanvas = document.getElementById('final-canvas');
const qrHidden = document.getElementById('qr-hidden');
const fgColor = document.getElementById('fg-color');
const bgColor = document.getElementById('bg-color');
const fgHex = document.getElementById('fg-hex');
const bgHex = document.getElementById('bg-hex');
const qrEC = document.getElementById('qr-ec');
const qrSize = document.getElementById('qr-size');
const qrMargin = document.getElementById('qr-margin');
const marginVal = document.getElementById('margin-val');
const logoInput = document.getElementById('logo-input');
const logoSizeSlider = document.getElementById('logo-size');
const logoThumb = document.getElementById('logo-thumb');
const clearLogoBtn = document.getElementById('clear-logo');
const ecWarn = document.getElementById('ec-warn');
const sizeDisplay = document.getElementById('size-display');
const logoSizeVal = document.getElementById('logo-size-val');

// ---- Tab System ----
document.querySelectorAll('.tab-btn').forEach(btn => {
  btn.addEventListener('click', () => {
    document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
    document.querySelectorAll('.tab-content').forEach(c => c.classList.remove('active'));
    btn.classList.add('active');
    activeTab = btn.dataset.tab;
    document.getElementById('tab-' + activeTab).classList.add('active');
    debounceGenerate();
  });
});

// ---- Input Listeners ----
document.querySelectorAll('input[type="text"],input[type="url"],input[type="email"],input[type="tel"],input[type="number"],textarea,select').forEach(el => {
  el.addEventListener('input', debounceGenerate);
});

fgColor.addEventListener('input', () => { fgHex.textContent = fgColor.value; debounceGenerate(); });
bgColor.addEventListener('input', () => { bgHex.textContent = bgColor.value; debounceGenerate(); });
qrSize.addEventListener('change', generate);
qrEC.addEventListener('change', () => { checkECWarning(); generate(); });
qrMargin.addEventListener('input', () => { marginVal.textContent = qrMargin.value; debounceGenerate(); });
logoSizeSlider.addEventListener('input', () => { logoSizeVal.textContent = logoSizeSlider.value + '%'; debounceGenerate(); });

// ---- Logo ----
logoInput.addEventListener('change', (e) => {
  const file = e.target.files[0];
  if (!file) return;
  const reader = new FileReader();
  reader.onload = (ev) => {
    const img = new Image();
    img.onload = () => {
      logoImage = img;
      logoThumb.src = ev.target.result;
      logoThumb.style.display = 'block';
      clearLogoBtn.style.display = 'inline';
      checkECWarning();
      generate();
    };
    img.src = ev.target.result;
  };
  reader.readAsDataURL(file);
  e.target.value = '';
});

clearLogoBtn.addEventListener('click', () => {
  logoImage = null;
  logoThumb.style.display = 'none';
  logoThumb.src = '';
  clearLogoBtn.style.display = 'none';
  ecWarn.style.display = 'none';
  generate();
});

function checkECWarning() {
  ecWarn.style.display = (logoImage && qrEC.value !== 'H') ? 'block' : 'none';
}

// ---- Build QR Data String ----
function getQRData() {
  switch (activeTab) {
    case 'url':
      return document.getElementById('in-url').value.trim();
    case 'text':
      return document.getElementById('in-text').value.trim();
    case 'vcard': {
      const fn = document.getElementById('vc-fname').value.trim();
      const ln = document.getElementById('vc-lname').value.trim();
      const org = document.getElementById('vc-org').value.trim();
      const ph = document.getElementById('vc-phone').value.trim();
      const em = document.getElementById('vc-email').value.trim();
      const ad = document.getElementById('vc-addr').value.trim();
      if (!fn && !ln) return '';
      let v = 'BEGIN:VCARD\nVERSION:3.0\n';
      v += `N:${ln};${fn};;;\n`;
      v += `FN:${fn} ${ln}\n`;
      if (org) v += `ORG:${org}\n`;
      if (ph) v += `TEL:${ph}\n`;
      if (em) v += `EMAIL:${em}\n`;
      if (ad) v += `ADR:;;${ad};;;;\n`;
      v += 'END:VCARD';
      return v;
    }
    case 'wifi': {
      const ssid = document.getElementById('wifi-ssid').value.trim();
      if (!ssid) return '';
      const pass = document.getElementById('wifi-pass').value.trim();
      const enc = document.getElementById('wifi-enc').value;
      const hidden = document.getElementById('wifi-hidden').classList.contains('on');
      return `WIFI:T:${enc};S:${ssid};P:${pass};H:${hidden ? 'true' : 'false'};;`;
    }
    case 'email': {
      const to = document.getElementById('em-to').value.trim();
      if (!to) return '';
      const subj = document.getElementById('em-subj').value.trim();
      const body = document.getElementById('em-body').value.trim();
      let mailto = `mailto:${to}`;
      const params = [];
      if (subj) params.push('subject=' + encodeURIComponent(subj));
      if (body) params.push('body=' + encodeURIComponent(body));
      if (params.length) mailto += '?' + params.join('&');
      return mailto;
    }
    case 'phone': {
      const ph = document.getElementById('in-phone').value.trim();
      return ph ? `tel:${ph}` : '';
    }
    case 'sms': {
      const ph = document.getElementById('sms-phone').value.trim();
      const msg = document.getElementById('sms-msg').value.trim();
      if (!ph) return '';
      return msg ? `SMSTO:${ph}:${msg}` : `SMSTO:${ph}`;
    }
    case 'location': {
      const lat = document.getElementById('loc-lat').value.trim();
      const lng = document.getElementById('loc-lng').value.trim();
      if (!lat || !lng) return '';
      return `geo:${lat},${lng}`;
    }
    default:
      return '';
  }
}

// ---- Generate ----
function debounceGenerate() {
  clearTimeout(debounceTimer);
  debounceTimer = setTimeout(generate, 180);
}

function generate() {
  const text = getQRData();
  const size = parseInt(qrSize.value);
  sizeDisplay.textContent = `${size} x ${size} px`;

  if (!text) {
    drawPlaceholder(size);
    return;
  }

  qrHidden.innerHTML = '';

  try {
    const qr = new QRCode(qrHidden, {
      text: text,
      width: size,
      height: size,
      colorDark: fgColor.value,
      colorLight: document.getElementById('bg-transparent').classList.contains('on') ? 'rgba(0,0,0,0)' : bgColor.value,
      correctLevel: QRCode.CorrectLevel[qrEC.value]
    });

    setTimeout(() => {
      const qrCanvas = qrHidden.querySelector('canvas');
      const qrImg = qrHidden.querySelector('img');

      if (qrCanvas) {
        processQR(qrCanvas, size, text);
      } else if (qrImg) {
        const tempImg = new Image();
        tempImg.onload = () => {
          const tc = document.createElement('canvas');
          tc.width = size;
          tc.height = size;
          tc.getContext('2d').drawImage(tempImg, 0, 0, size, size);
          processQR(tc, size, text);
        };
        tempImg.src = qrImg.src;
      }
    }, 60);
  } catch (e) {
    drawPlaceholder(size, 'Error generating QR code');
  }
}

function processQR(sourceCanvas, size, text) {
  const isRounded = document.getElementById('qr-rounded').classList.contains('on');
  const isTransparent = document.getElementById('bg-transparent').classList.contains('on');
  const bgColorVal = isTransparent ? null : bgColor.value;

  if (isRounded) {
    drawRoundedQR(sourceCanvas, size, fgColor.value, bgColorVal, isTransparent);
  } else {
    compositeCanvas(sourceCanvas, size, isTransparent);
  }

  // Save to history
  saveToHistory(text);
}

function drawRoundedQR(sourceCanvas, size, fgCol, bgCol, isTransparent) {
  // Extract QR module data by sampling the source canvas
  const srcCtx = sourceCanvas.getContext('2d');
  const imgData = srcCtx.getImageData(0, 0, sourceCanvas.width, sourceCanvas.height);
  const margin = parseInt(qrMargin.value);

  // Find the QR code boundaries (skip quiet zone from library)
  let minX = sourceCanvas.width, maxX = 0, minY = sourceCanvas.height, maxY = 0;
  for (let y = 0; y < sourceCanvas.height; y++) {
    for (let x = 0; x < sourceCanvas.width; x++) {
      const idx = (y * sourceCanvas.width + x) * 4;
      const r = imgData.data[idx], g = imgData.data[idx + 1], b = imgData.data[idx + 2];
      // Check if this pixel is dark (foreground)
      if (r + g + b < 384) {
        if (x < minX) minX = x;
        if (x > maxX) maxX = x;
        if (y < minY) minY = y;
        if (y > maxY) maxY = y;
      }
    }
  }

  if (maxX <= minX || maxY <= minY) {
    compositeCanvas(sourceCanvas, size, isTransparent);
    return;
  }

  // Estimate module count
  const qrRegionW = maxX - minX;
  // Sample a row in the middle to find module size
  const midY = Math.floor((minY + maxY) / 2);
  let runs = [];
  let currentDark = false;
  let runStart = minX;
  for (let x = minX; x <= maxX; x++) {
    const idx = (midY * sourceCanvas.width + x) * 4;
    const dark = (imgData.data[idx] + imgData.data[idx + 1] + imgData.data[idx + 2]) < 384;
    if (x === minX) { currentDark = dark; runStart = x; continue; }
    if (dark !== currentDark) {
      runs.push(x - runStart);
      runStart = x;
      currentDark = dark;
    }
  }
  runs.push(maxX - runStart + 1);

  // The smallest run is likely one module
  const minRun = Math.min(...runs.filter(r => r > 0));
  const moduleSize = Math.max(1, minRun);
  const moduleCount = Math.round(qrRegionW / moduleSize);

  // Build module grid
  const grid = [];
  for (let row = 0; row < moduleCount; row++) {
    grid[row] = [];
    for (let col = 0; col < moduleCount; col++) {
      const sx = Math.floor(minX + (col + 0.5) * moduleSize);
      const sy = Math.floor(minY + (row + 0.5) * moduleSize);
      const csx = Math.min(Math.max(sx, 0), sourceCanvas.width - 1);
      const csy = Math.min(Math.max(sy, 0), sourceCanvas.height - 1);
      const idx = (csy * sourceCanvas.width + csx) * 4;
      grid[row][col] = (imgData.data[idx] + imgData.data[idx + 1] + imgData.data[idx + 2]) < 384;
    }
  }

  // Draw rounded
  const totalModules = moduleCount + margin * 2;
  const dotSize = size / totalModules;
  const radius = dotSize * 0.4;

  finalCanvas.width = size;
  finalCanvas.height = size;
  const ctx = finalCanvas.getContext('2d');

  if (isTransparent) {
    ctx.clearRect(0, 0, size, size);
  } else {
    ctx.fillStyle = bgCol;
    ctx.fillRect(0, 0, size, size);
  }

  ctx.fillStyle = fgCol;
  for (let row = 0; row < moduleCount; row++) {
    for (let col = 0; col < moduleCount; col++) {
      if (grid[row][col]) {
        const x = (col + margin) * dotSize;
        const y = (row + margin) * dotSize;
        ctx.beginPath();
        ctx.roundRect(x, y, dotSize, dotSize, radius);
        ctx.fill();
      }
    }
  }

  // Overlay logo
  overlayLogo(ctx, size);
}

function compositeCanvas(sourceCanvas, size, isTransparent) {
  finalCanvas.width = size;
  finalCanvas.height = size;
  const ctx = finalCanvas.getContext('2d');

  if (isTransparent) {
    ctx.clearRect(0, 0, size, size);
    // Draw only the dark modules from source
    ctx.drawImage(sourceCanvas, 0, 0, size, size);
  } else {
    ctx.drawImage(sourceCanvas, 0, 0, size, size);
  }

  overlayLogo(ctx, size);
}

function overlayLogo(ctx, size) {
  if (!logoImage) return;
  const pct = parseInt(logoSizeSlider.value) / 100;
  const logoW = Math.round(size * pct);
  const logoH = Math.round(logoW * (logoImage.naturalHeight / logoImage.naturalWidth));
  const cx = Math.round((size - logoW) / 2);
  const cy = Math.round((size - logoH) / 2);
  const pad = Math.round(size * 0.018);
  const bgCol = document.getElementById('bg-transparent').classList.contains('on') ? '#ffffff' : bgColor.value;

  // Background box with rounded corners
  const boxR = Math.round(size * 0.012);
  ctx.fillStyle = bgCol;
  ctx.beginPath();
  ctx.roundRect(cx - pad, cy - pad, logoW + pad * 2, logoH + pad * 2, boxR);
  ctx.fill();

  // Draw logo with high quality
  ctx.imageSmoothingEnabled = true;
  ctx.imageSmoothingQuality = 'high';
  ctx.drawImage(logoImage, cx, cy, logoW, logoH);
}

function drawPlaceholder(size, msg) {
  const displaySize = Math.min(size, 1024);
  finalCanvas.width = displaySize;
  finalCanvas.height = displaySize;
  const ctx = finalCanvas.getContext('2d');
  ctx.fillStyle = '#0a1018';
  ctx.fillRect(0, 0, displaySize, displaySize);
  ctx.fillStyle = '#1a2535';
  ctx.font = `${displaySize * 0.028}px JetBrains Mono, monospace`;
  ctx.textAlign = 'center';
  ctx.textBaseline = 'middle';
  ctx.fillText(msg || 'Enter content to generate QR code', displaySize / 2, displaySize / 2);
}

// ---- Export Functions ----
function downloadPNG() {
  if (!finalCanvas.width || !getQRData()) return;
  const link = document.createElement('a');
  link.download = 'korb-qr-' + Date.now() + '.png';
  link.href = finalCanvas.toDataURL('image/png');
  link.click();
}

function downloadSVG() {
  // Export high-res PNG at 2x as true SVG from canvas is complex
  if (!finalCanvas.width || !getQRData()) return;
  const size = parseInt(qrSize.value);

  // Create a temporary high-res canvas
  const tmpCanvas = document.createElement('canvas');
  const scale = 2;
  tmpCanvas.width = size * scale;
  tmpCanvas.height = size * scale;
  const tmpCtx = tmpCanvas.getContext('2d');
  tmpCtx.imageSmoothingEnabled = false;
  tmpCtx.drawImage(finalCanvas, 0, 0, size * scale, size * scale);

  const link = document.createElement('a');
  link.download = 'korb-qr-' + Date.now() + '-2x.png';
  link.href = tmpCanvas.toDataURL('image/png');
  link.click();
}

async function copyToClipboard() {
  if (!finalCanvas.width || !getQRData()) return;
  try {
    const blob = await new Promise(resolve => finalCanvas.toBlob(resolve, 'image/png'));
    await navigator.clipboard.write([new ClipboardItem({ 'image/png': blob })]);
    showToast('Copied to clipboard');
  } catch (e) {
    showToast('Copy failed - try downloading instead');
  }
}

function printQR() {
  if (!finalCanvas.width || !getQRData()) return;
  const dataUrl = finalCanvas.toDataURL('image/png');
  const win = window.open('', '_blank');
  win.document.write(`<!DOCTYPE html><html><head><title>Print QR Code</title><style>body{display:flex;justify-content:center;align-items:center;min-height:100vh;margin:0;background:#fff;}img{max-width:90vmin;max-height:90vmin;}@media print{body{background:none;}}</style></head><body><img src="${dataUrl}" onload="window.print();setTimeout(()=>window.close(),500)"></body></html>`);
  win.document.close();
}

// ---- Toast ----
function showToast(msg) {
  let toast = document.getElementById('toast');
  if (!toast) {
    toast = document.createElement('div');
    toast.id = 'toast';
    toast.style.cssText = 'position:fixed;bottom:24px;left:50%;transform:translateX(-50%) translateY(20px);background:#0e1520;border:1px solid #00d4ff;color:#00d4ff;padding:10px 20px;border-radius:6px;font-family:JetBrains Mono,monospace;font-size:12px;opacity:0;transition:all 0.3s;z-index:9999;pointer-events:none;';
    document.body.appendChild(toast);
  }
  toast.textContent = msg;
  toast.style.opacity = '1';
  toast.style.transform = 'translateX(-50%) translateY(0)';
  setTimeout(() => {
    toast.style.opacity = '0';
    toast.style.transform = 'translateX(-50%) translateY(20px)';
  }, 2000);
}

// ---- History ----
const HISTORY_KEY = 'korb_qr_history';

function loadHistory() {
  try {
    return JSON.parse(localStorage.getItem(HISTORY_KEY)) || [];
  } catch { return []; }
}

function saveToHistory(text) {
  if (!text) return;
  let history = loadHistory();
  const entry = {
    mode: activeTab,
    text: text,
    fg: fgColor.value,
    bg: bgColor.value,
    ec: qrEC.value,
    size: qrSize.value,
    ts: Date.now()
  };
  // Remove duplicate
  history = history.filter(h => h.text !== text || h.mode !== activeTab);
  history.unshift(entry);
  if (history.length > 10) history = history.slice(0, 10);
  localStorage.setItem(HISTORY_KEY, JSON.stringify(history));
  renderHistory();
}

function renderHistory() {
  const list = document.getElementById('history-list');
  const empty = document.getElementById('history-empty');
  const history = loadHistory();

  // Remove all history items (keep empty msg)
  list.querySelectorAll('.history-item').forEach(el => el.remove());

  if (history.length === 0) {
    empty.style.display = 'block';
    return;
  }

  empty.style.display = 'none';
  history.forEach((entry, i) => {
    const item = document.createElement('div');
    item.className = 'history-item';
    item.innerHTML = `<span class="h-mode">${entry.mode}</span><span class="h-text">${escapeHtml(entry.text.substring(0, 80))}</span>`;
    item.addEventListener('click', () => restoreHistory(entry));
    list.appendChild(item);
  });
}

function restoreHistory(entry) {
  // Switch tab
  document.querySelectorAll('.tab-btn').forEach(b => {
    if (b.dataset.tab === entry.mode) b.click();
  });

  // Set colors/settings
  fgColor.value = entry.fg || '#e2e8f0';
  bgColor.value = entry.bg || '#050a0f';
  fgHex.textContent = fgColor.value;
  bgHex.textContent = bgColor.value;
  qrEC.value = entry.ec || 'H';
  qrSize.value = entry.size || '1024';

  // Set the text in the appropriate field based on mode
  // For simplicity, we regenerate from the stored text
  // by putting it in the right field
  switch (entry.mode) {
    case 'url': document.getElementById('in-url').value = entry.text; break;
    case 'text': document.getElementById('in-text').value = entry.text; break;
    case 'phone': document.getElementById('in-phone').value = entry.text.replace('tel:', ''); break;
    default: break;
  }
  generate();
}

document.getElementById('clear-history').addEventListener('click', () => {
  localStorage.removeItem(HISTORY_KEY);
  renderHistory();
});

function escapeHtml(str) {
  const d = document.createElement('div');
  d.textContent = str;
  return d.innerHTML;
}

// ---- Init ----
renderHistory();
generate();
</script>
