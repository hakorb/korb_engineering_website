<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #050a0f;
    --surface: #0a1018;
    --surface2: #0e1520;
    --border: #1a2535;
    --cyan: #00d4ff;
    --orange: #ff6600;
    --green: #10b981;
    --text: #e2e8f0;
    --text-dim: #94a3b8;
    --text-muted: #64748b;
  }

  html { font-size: 16px; }

  body {
    font-family: 'JetBrains Mono', monospace;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    line-height: 1.6;
    -webkit-font-smoothing: antialiased;
  }

  .container {
    max-width: 960px;
    margin: 0 auto;
    padding: 24px 16px 64px;
  }

  /* ---- Header ---- */
  .header {
    text-align: center;
    padding: 48px 0 32px;
    border-bottom: 1px solid var(--border);
    margin-bottom: 32px;
  }

  .header h1 {
    font-size: 1.5rem;
    font-weight: 600;
    color: var(--cyan);
    letter-spacing: 0.5px;
    margin-bottom: 8px;
  }

  .header .subtitle {
    font-size: 0.8rem;
    font-weight: 300;
    color: var(--text-dim);
  }

  .header .tool-count-badge {
    display: inline-block;
    margin-top: 12px;
    padding: 4px 14px;
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 20px;
    font-size: 0.7rem;
    font-weight: 500;
    color: var(--orange);
  }

  /* ---- Stats bar ---- */
  .stats-bar {
    display: flex;
    gap: 12px;
    justify-content: center;
    flex-wrap: wrap;
    margin-bottom: 28px;
  }

  .stat-chip {
    padding: 6px 16px;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 8px;
    font-size: 0.7rem;
    font-weight: 400;
    color: var(--text-dim);
  }

  .stat-chip .stat-num {
    color: var(--green);
    font-weight: 600;
  }

  /* ---- Search ---- */
  .search-wrap {
    position: sticky;
    top: 0;
    z-index: 100;
    background: var(--bg);
    padding: 12px 0 16px;
    margin-bottom: 24px;
  }

  .search-input {
    width: 100%;
    padding: 14px 18px 14px 48px;
    min-height: 44px;
    font-size: 16px;
    font-family: 'JetBrains Mono', monospace;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 10px;
    color: var(--text);
    outline: none;
    transition: border-color 0.2s;
  }

  .search-input::placeholder { color: var(--text-muted); }
  .search-input:focus { border-color: var(--cyan); }

  .search-icon {
    position: absolute;
    left: 16px;
    top: 50%;
    transform: translateY(-50%);
    color: var(--text-muted);
    pointer-events: none;
  }

  .search-wrap-inner {
    position: relative;
  }

  .search-count {
    text-align: center;
    font-size: 0.7rem;
    color: var(--text-muted);
    margin-top: 8px;
    min-height: 18px;
  }

  /* ---- Sections ---- */
  .section {
    margin-bottom: 36px;
  }

  .section-header {
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 12px 16px;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 10px 10px 0 0;
    cursor: pointer;
    user-select: none;
    min-height: 44px;
  }

  .section-header:hover { background: var(--surface2); }

  .section-title {
    font-size: 0.85rem;
    font-weight: 600;
    color: var(--cyan);
    flex: 1;
  }

  .section-count {
    font-size: 0.7rem;
    color: var(--text-muted);
    font-weight: 400;
  }

  .section-chevron {
    color: var(--text-muted);
    transition: transform 0.2s;
    font-size: 0.75rem;
  }

  .section.collapsed .section-chevron { transform: rotate(-90deg); }
  .section.collapsed .tool-list { display: none; }

  /* ---- Tool list ---- */
  .tool-list {
    border: 1px solid var(--border);
    border-top: none;
    border-radius: 0 0 10px 10px;
    overflow: hidden;
  }

  .tool-entry {
    display: flex;
    align-items: flex-start;
    gap: 12px;
    padding: 14px 16px;
    border-bottom: 1px solid var(--border);
    transition: background 0.15s;
    text-decoration: none;
    color: inherit;
    min-height: 44px;
  }

  .tool-entry:last-child { border-bottom: none; }
  .tool-entry:hover { background: var(--surface2); }

  .tool-index {
    font-size: 0.65rem;
    color: var(--text-muted);
    min-width: 24px;
    padding-top: 2px;
    text-align: right;
    flex-shrink: 0;
  }

  .tool-info { flex: 1; min-width: 0; }

  .tool-name {
    font-size: 0.8rem;
    font-weight: 600;
    color: var(--orange);
    margin-bottom: 2px;
    word-break: break-word;
  }

  .tool-desc {
    font-size: 0.72rem;
    font-weight: 300;
    color: var(--text-dim);
    line-height: 1.5;
  }

  .tool-arrow {
    color: var(--text-muted);
    flex-shrink: 0;
    padding-top: 2px;
    font-size: 0.7rem;
    opacity: 0;
    transition: opacity 0.15s;
  }

  .tool-entry:hover .tool-arrow { opacity: 1; }

  .tool-entry.hidden { display: none; }

  /* ---- No results ---- */
  .no-results {
    text-align: center;
    padding: 40px 16px;
    color: var(--text-muted);
    font-size: 0.8rem;
    font-weight: 300;
    display: none;
  }

  /* ---- Footer ---- */
  .footer {
    text-align: center;
    padding: 32px 0 16px;
    border-top: 1px solid var(--border);
    margin-top: 48px;
    font-size: 0.65rem;
    color: var(--text-muted);
    font-weight: 300;
  }

  /* ---- Print ---- */
  @media print {
    body { background: #fff; color: #111; }
    .search-wrap { display: none; }
    .header { padding: 16px 0; }
    .header h1 { color: #111; }
    .header .subtitle, .header .tool-count-badge { color: #555; }
    .stat-chip { border-color: #ccc; color: #555; }
    .stat-chip .stat-num { color: #111; }
    .section-header { background: #f5f5f5; border-color: #ccc; }
    .section-title { color: #111; }
    .tool-list { border-color: #ccc; }
    .tool-entry { border-color: #eee; }
    .tool-name { color: #333; }
    .tool-desc { color: #555; }
    .tool-arrow { display: none; }
    .section.collapsed .tool-list { display: block !important; }
    .footer { color: #888; border-color: #ccc; }
    a { text-decoration: none; color: inherit; }
  }
</style>
</head>

// Compute stats
const sectionKeys = Object.keys(TOOLS_DATA);
const sectionCounts = {};
let totalTools = 0;
sectionKeys.forEach(key => {
  sectionCounts[key] = TOOLS_DATA[key].tools.length;
  totalTools += TOOLS_DATA[key].tools.length;
});

// Render badge
document.getElementById('totalBadge').textContent = totalTools + ' TOOLS';

// Render stats bar
const statsBar = document.getElementById('statsBar');
sectionKeys.forEach(key => {
  const chip = document.createElement('div');
  chip.className = 'stat-chip';
  chip.innerHTML = TOOLS_DATA[key].label + ': <span class="stat-num">' + sectionCounts[key] + '</span>';
  statsBar.appendChild(chip);
});

// Render sections
const container = document.getElementById('sectionsContainer');

sectionKeys.forEach(sectionKey => {
  const data = TOOLS_DATA[sectionKey];
  const section = document.createElement('div');
  section.className = 'section';
  section.dataset.section = sectionKey;

  const header = document.createElement('div');
  header.className = 'section-header';
  header.innerHTML =
    '<span class="section-title">' + data.label + '</span>' +
    '<span class="section-count">' + data.tools.length + ' tools</span>' +
    '<span class="section-chevron">&#9660;</span>';
  header.addEventListener('click', function() {
    section.classList.toggle('collapsed');
  });

  const list = document.createElement('div');
  list.className = 'tool-list';

  data.tools.forEach(function(tool, i) {
    const a = document.createElement('a');
    a.className = 'tool-entry';
    a.href = '#' + sectionKey + '/' + tool.slug;
    a.dataset.name = tool.name.toLowerCase();
    a.dataset.desc = tool.desc.toLowerCase();
    a.innerHTML =
      '<span class="tool-index">' + (i + 1) + '</span>' +
      '<div class="tool-info">' +
        '<div class="tool-name">' + tool.name + '</div>' +
        '<div class="tool-desc">' + tool.desc + '</div>' +
      '</div>' +
      '<span class="tool-arrow">&#8594;</span>';
    list.appendChild(a);
  });

  section.appendChild(header);
  section.appendChild(list);
  container.appendChild(section);
});

// Search
const searchInput = document.getElementById('searchInput');
const searchCount = document.getElementById('searchCount');
const noResults = document.getElementById('noResults');

searchInput.addEventListener('input', function() {
  const q = this.value.toLowerCase().trim();
  const entries = document.querySelectorAll('.tool-entry');
  let visible = 0;

  entries.forEach(function(entry) {
    const match = !q || entry.dataset.name.indexOf(q) !== -1 || entry.dataset.desc.indexOf(q) !== -1;
    entry.classList.toggle('hidden', !match);
    if (match) visible++;
  });

  // Show/hide sections that have no visible tools
  document.querySelectorAll('.section').forEach(function(sec) {
    const hasVisible = sec.querySelector('.tool-entry:not(.hidden)');
    sec.style.display = hasVisible ? '' : 'none';
    // Expand sections when searching
    if (q) sec.classList.remove('collapsed');
  });

  if (q) {
    searchCount.textContent = visible + ' of ' + totalTools + ' tools match';
  } else {
    searchCount.textContent = '';
  }
  noResults.style.display = (q && visible === 0) ? 'block' : 'none';
});
