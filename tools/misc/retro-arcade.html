<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
<title>Arcade Vault // Korb Engineering</title>
<meta name="description" content="Nostalgic-modern arcade hub — a gallery of classic and modern cabinets inspired by a real Orlando venue. NERF Arcade, Wicked Tuna, Golden Tee, Pac-Man, Defender, Asteroids, StepManiaX and more.">
<link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&family=Outfit:wght@300;400;600;700;900&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #0d0c0f;
  --surface: #1a1820;
  --blue: #1ed4ff;
  --orange: #ff7c1e;
  --yellow: #ffe133;
  --pink: #ff3da0;
  --green: #39ff14;
  --text: #f0eef8;
  --muted: #8888a0;
}
* { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
html, body {
  background: var(--bg); color: var(--text); min-height: 100dvh;
  font-family: 'Outfit', sans-serif; overscroll-behavior-y: contain;
}
body {
  background:
    radial-gradient(circle at 10% 10%, rgba(255,124,30,0.06), transparent 40%),
    radial-gradient(circle at 90% 90%, rgba(30,212,255,0.06), transparent 40%),
    var(--bg);
  min-height: 100dvh;
}
body::before {
  content: ''; position: fixed; inset: 0; pointer-events: none;
  background: repeating-linear-gradient(0deg, transparent 0, transparent 2px, rgba(255,255,255,0.015) 2px, rgba(255,255,255,0.015) 3px);
  z-index: 999; mix-blend-mode: overlay;
}
a { color: var(--yellow); text-decoration: none; }
.back {
  display: inline-block; color: var(--blue);
  font-size: 11px; letter-spacing: 2px; padding: 6px 10px;
  border: 1px solid rgba(30,212,255,0.3); border-radius: 3px;
  margin: 14px 0 8px 14px;
}
.marquee {
  position: relative;
  border-bottom: 2px solid var(--orange);
  background: linear-gradient(180deg, #000 0%, #110a04 100%);
  padding: 14px 0 10px;
  box-shadow: 0 0 24px rgba(255,124,30,0.3);
  overflow: hidden;
}
.marquee-title {
  font-family: 'Press Start 2P', monospace;
  font-size: clamp(18px, 4.5vw, 32px); letter-spacing: 4px; text-align: center;
  background: linear-gradient(90deg, var(--orange), var(--yellow), var(--pink), var(--blue));
  -webkit-background-clip: text; background-clip: text; color: transparent;
  filter: drop-shadow(0 0 12px rgba(255,225,51,0.5));
  margin-bottom: 6px;
}
.ticker-wrap { overflow: hidden; white-space: nowrap; border-top: 1px solid rgba(255,124,30,0.3); padding-top: 8px; margin-top: 4px; }
.ticker {
  display: inline-block; animation: tickerScroll 40s linear infinite;
  font-family: 'Press Start 2P', monospace; font-size: 10px; letter-spacing: 3px;
  color: var(--green); text-shadow: 0 0 4px var(--green);
}
@keyframes tickerScroll { 0% { transform: translateX(0); } 100% { transform: translateX(-50%); } }
.coin-hud {
  position: absolute; top: 12px; right: 16px;
  font-family: 'Press Start 2P', monospace; font-size: 11px; color: var(--yellow);
  text-shadow: 0 0 4px var(--yellow); display: flex; align-items: center; gap: 6px;
}
.coin { animation: coinSpin 1.6s infinite linear; display: inline-block; }
@keyframes coinSpin { 0% { transform: rotateY(0); } 100% { transform: rotateY(360deg); } }
.hero { max-width: 1100px; margin: 0 auto; padding: 30px 20px 20px; text-align: center; }
.hero h2 {
  font-family: 'Press Start 2P', monospace; font-size: clamp(14px, 3vw, 20px);
  color: var(--blue); letter-spacing: 3px; margin-bottom: 12px;
  text-shadow: 0 0 12px var(--blue);
}
.hero p { color: var(--muted); max-width: 520px; margin: 0 auto; font-size: 14px; line-height: 1.6; }
.insert-coin {
  display: inline-block; margin-top: 14px;
  font-family: 'Press Start 2P', monospace; font-size: 12px;
  color: var(--yellow); letter-spacing: 3px; animation: blink 1.1s infinite;
}
@keyframes blink { 0%, 50% { opacity: 1; } 51%, 100% { opacity: 0.2; } }
.toggle-row { display: flex; justify-content: center; gap: 10px; flex-wrap: wrap; max-width: 1100px; margin: 10px auto; padding: 0 20px; }
.filter-btn, .retro-toggle {
  background: transparent; border: 1px solid var(--surface); color: var(--muted);
  padding: 8px 14px; border-radius: 20px; cursor: pointer;
  font: 600 11px 'Outfit', sans-serif; letter-spacing: 2px;
  touch-action: manipulation; min-height: 36px;
}
.filter-btn.active, .filter-btn:hover { border-color: var(--blue); color: var(--blue); background: rgba(30,212,255,0.08); }
.retro-toggle.on, .retro-toggle:hover { border-color: var(--orange); color: var(--orange); background: rgba(255,124,30,0.08); }
.gallery {
  max-width: 1100px; margin: 0 auto; padding: 14px 20px 40px;
  display: grid; grid-template-columns: repeat(auto-fill, minmax(260px, 1fr));
  gap: 16px;
}
.game-card {
  background: var(--surface); border-radius: 12px; overflow: hidden;
  cursor: pointer; transition: transform 0.2s, box-shadow 0.2s;
  content-visibility: auto; contain-intrinsic-size: 260px 360px;
  position: relative; border: 1px solid #2a2836;
}
.game-card[data-color="blue"]   { box-shadow: 0 0 22px rgba(30,212,255,0.15); }
.game-card[data-color="orange"] { box-shadow: 0 0 22px rgba(255,124,30,0.18); }
.game-card[data-color="pink"]   { box-shadow: 0 0 22px rgba(255,61,160,0.15); }
.game-card[data-color="yellow"] { box-shadow: 0 0 22px rgba(255,225,51,0.12); }
.game-card[data-color="green"]  { box-shadow: 0 0 22px rgba(57,255,20,0.12); }
.game-card:hover { transform: translateY(-2px) scale(1.01); }
.game-card:hover[data-color="blue"]   { box-shadow: 0 0 34px rgba(30,212,255,0.45); }
.game-card:hover[data-color="orange"] { box-shadow: 0 0 34px rgba(255,124,30,0.5); }
.game-card:hover[data-color="pink"]   { box-shadow: 0 0 34px rgba(255,61,160,0.45); }
.game-card:hover[data-color="yellow"] { box-shadow: 0 0 34px rgba(255,225,51,0.4); }
.game-card:hover[data-color="green"]  { box-shadow: 0 0 34px rgba(57,255,20,0.4); }
.card-preview {
  height: 140px; position: relative; overflow: hidden;
  display: flex; align-items: center; justify-content: center;
}
.card-preview::before {
  content: ''; position: absolute; inset: 0;
  background: linear-gradient(135deg, var(--gradA, #1e3a5a), var(--gradB, #0a1a2a));
}
.card-preview::after {
  content: ''; position: absolute; inset: 0;
  background: repeating-linear-gradient(0deg, rgba(0,0,0,0.15) 0, rgba(0,0,0,0.15) 2px, transparent 2px, transparent 4px);
  opacity: 0.5; pointer-events: none;
}
.card-icon { position: relative; z-index: 1; filter: drop-shadow(0 0 14px rgba(255,255,255,0.5)); font-size: 48px; }
.card-body { padding: 12px 14px 14px; }
.card-tag { font-family: 'Press Start 2P', monospace; font-size: 8px; color: var(--muted); letter-spacing: 2px; margin-bottom: 6px; }
.card-title { font-family: 'Press Start 2P', monospace; font-size: 11px; letter-spacing: 1px; line-height: 1.4; color: var(--text); margin-bottom: 8px; }
.card-blurb { color: var(--muted); font-size: 12px; line-height: 1.5; display: -webkit-box; -webkit-line-clamp: 3; -webkit-box-orient: vertical; overflow: hidden; }
.card-chip { display: inline-block; font-size: 9px; padding: 3px 8px; border-radius: 10px; margin-top: 8px; letter-spacing: 1px; text-transform: uppercase; }
.chip-play { background: var(--green); color: #000; font-weight: 700; }
.chip-info { background: rgba(255,255,255,0.08); color: var(--muted); }
.modal-backdrop {
  position: fixed; inset: 0; background: rgba(0,0,0,0.85);
  display: flex; align-items: center; justify-content: center;
  padding: 14px; z-index: 100; animation: fadeIn 0.15s;
}
@keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
.modal {
  background: var(--surface); border: 2px solid var(--blue);
  border-radius: 14px; max-width: 540px; width: 100%;
  max-height: 92dvh; overflow-y: auto; position: relative;
}
.modal-hero {
  height: 140px; display: flex; align-items: center; justify-content: center;
  position: relative; overflow: hidden;
}
.modal-hero::before {
  content: ''; position: absolute; inset: 0;
  background: linear-gradient(135deg, var(--gradA, #1e3a5a), var(--gradB, #0a1a2a));
}
.modal-hero::after {
  content: ''; position: absolute; inset: 0;
  background: repeating-linear-gradient(0deg, rgba(0,0,0,0.2) 0, rgba(0,0,0,0.2) 2px, transparent 2px, transparent 4px);
}
.modal-hero .icon { position: relative; z-index: 1; font-size: 64px; filter: drop-shadow(0 0 20px rgba(255,255,255,0.4)); }
.modal-close {
  position: absolute; top: 10px; right: 10px; z-index: 10;
  background: rgba(0,0,0,0.6); color: var(--text); border: none;
  width: 36px; height: 36px; border-radius: 50%; cursor: pointer; font-size: 20px; font-weight: 900;
  touch-action: manipulation;
}
.modal-body { padding: 18px 20px 22px; }
.modal-title { font-family: 'Press Start 2P', monospace; font-size: 16px; color: var(--yellow); letter-spacing: 2px; line-height: 1.3; margin-bottom: 6px; text-shadow: 0 0 8px rgba(255,225,51,0.3); }
.modal-subtitle { color: var(--muted); font-size: 11px; letter-spacing: 3px; margin-bottom: 14px; }
.modal-section { margin-bottom: 14px; }
.modal-section h3 { font-family: 'Press Start 2P', monospace; font-size: 10px; letter-spacing: 2px; color: var(--orange); margin-bottom: 6px; }
.modal-section p, .modal-section ul { color: var(--text); font-size: 13px; line-height: 1.6; }
.modal-section ul { padding-left: 16px; }
.modal-play-btn {
  display: inline-block; margin-top: 10px;
  background: var(--green); color: #000;
  padding: 12px 22px; border-radius: 26px; cursor: pointer;
  font: 700 12px 'Press Start 2P', monospace; letter-spacing: 2px;
  text-decoration: none; touch-action: manipulation;
  box-shadow: 0 0 18px rgba(57,255,20,0.4);
}
.modal-play-btn:hover { filter: brightness(1.15); }
.leaderboard {
  background: #000; border: 1px solid var(--green); border-radius: 6px; padding: 10px;
  font-family: 'Press Start 2P', monospace; font-size: 10px; color: var(--green); line-height: 1.9;
}
.leaderboard .lb-row { display: grid; grid-template-columns: 28px 1fr auto; gap: 8px; }
.leaderboard .lb-rank { color: var(--yellow); }
body.retro-mode .card-blurb { font-family: 'Press Start 2P', monospace; font-size: 10px; line-height: 1.8; }
body.retro-mode::after {
  content: ''; position: fixed; inset: 0; pointer-events: none; z-index: 998;
  background: repeating-linear-gradient(0deg, rgba(0,0,0,0.3) 0, rgba(0,0,0,0.3) 2px, transparent 2px, transparent 4px);
}
.footer {
  text-align: center; padding: 30px 20px; color: var(--muted);
  font-family: 'Press Start 2P', monospace; font-size: 10px;
  letter-spacing: 3px; border-top: 1px solid #2a2836;
}
.footer .coin-big { font-size: 24px; animation: coinSpin 1.6s infinite linear; display: inline-block; margin-right: 10px; }
</style>
</head>
<body>

<a href="../../index.html#misc" class="back">&larr; BACK</a>

<div class="marquee">
  <div class="coin-hud"><span class="coin">◉</span><span id="coin-count">0</span></div>
  <div class="marquee-title">ARCADE VAULT</div>
  <div class="ticker-wrap"><div class="ticker" id="ticker"></div></div>
</div>

<div class="hero">
  <h2>INSERT COIN &bull; SELECT GAME</h2>
  <p>Nostalgic-modern arcade hub inspired by a real venue in Orlando, FL. Modern ticket-spitters next to classic cabinets next to dance pads. Click any cabinet for the story.</p>
  <div class="insert-coin">&gt; PRESS START &lt;</div>
</div>

<div class="toggle-row" role="tablist">
  <button class="filter-btn active" data-cat="all">ALL</button>
  <button class="filter-btn" data-cat="action">🎯 MODERN</button>
  <button class="filter-btn" data-cat="rhythm">💃 RHYTHM</button>
  <button class="filter-btn" data-cat="retro">👾 RETRO</button>
  <button class="filter-btn" data-cat="ticket">🎫 TICKETS</button>
  <button class="retro-toggle" id="retro-toggle">RETRO MODE</button>
</div>

<div class="gallery" id="gallery"></div>

<div class="footer">
  <span class="coin-big">◉</span>
  INSERT COIN TO CONTINUE
</div>

<div id="modal-root"></div>

<script>
(function(){
'use strict';

var GAMES = [
  { id:'nerf', title:'NERF Arcade', category:'action', tag:'🎯 Shooting',
    year:2019, dev:'Raw Thrills', icon:'🎯', color:'orange',
    gradA:'#ff7c1e', gradB:'#4a1a00',
    blurb:'Large-screen target-shooter with two-player card-swipe play. Hit 100–5000 point targets in an obstacle-course arena. Bright orange and blue — the NERF look.',
    howTo:'Aim, tap, blast. Bigger targets = fewer points. Tiny gold targets = jackpot. Watch out for penalty targets.',
    fun:['Licensed by Hasbro from the actual NERF brand','High score shown prominently on the marquee','Simultaneous two-player without taking turns'],
    tickets:'100–5,000 per hit', playUrl:'./nerf-arcade.html' },
  { id:'tuna', title:'Wicked Tuna', category:'ticket', tag:'🎣 Fishing',
    year:2020, dev:'Adrenaline Amusements', icon:'🐟', color:'pink',
    gradA:'#ff3da0', gradB:'#1a0a2a',
    blurb:'Based on the NatGeo TV show. Glowing cyan/magenta reel controllers. 90-second rounds. Reel in tuna for tickets.',
    howTo:'Cast the line. When a fish bites, crank the reel. Keep tension in the green/yellow zone or the line snaps.',
    fun:['Licensed from NatGeo\'s Gloucester-based fishing show','Deep-ocean cutscenes between catches','Trophy Bluefin pays out the biggest tickets'],
    tickets:'Varies by catch', playUrl:'./wicked-tuna.html' },
  { id:'goldentee', title:'Golden Tee PGA Tour', category:'action', tag:'⛳ Golf',
    year:2021, dev:'Incredible Technologies', icon:'⛳', color:'yellow',
    gradA:'#4a9a20', gradB:'#0a3a10',
    blurb:'Trackball golf with PGA-licensed courses and online leaderboards. 3-hole quickplay or full 18 with fly-by previews.',
    howTo:'Pick a club. Roll the trackball: draw-back for backswing, forward for power. Curve your stroke to shape the shot.',
    fun:['The trackball is holy ground — don\'t put a beer on it','Incredible Tech has shipped Golden Tee yearly since 1989','Online leaderboards make every bar a small tournament'],
    tickets:'Non-redemption', playUrl:null },
  { id:'stepmaniax', title:'StepManiaX', category:'rhythm', tag:'💃 Rhythm',
    year:2017, dev:'Step Revolution', icon:'💃', color:'blue',
    gradA:'#1ed4ff', gradB:'#0a1a4a',
    blurb:'Four-panel dance pad with side-by-side stations. Perfects / Perfects+1 / Early / Late / Miss scoring. Calorie counter included.',
    howTo:'Step on the glowing panels as arrows hit the target line. Stay centered. Sweat.',
    fun:['Spiritual successor to Dance Dance Revolution','Pads use pressure sensors, not optical','Popular songs include Fade Out and various EDM tracks'],
    tickets:'Non-redemption', playUrl:null },
  { id:'mspacgalaga', title:'Ms. Pac-Man / Galaga', category:'retro', tag:'🟡 Maze + Shooter',
    year:1981, dev:'Namco / Midway', icon:'👾', color:'yellow',
    gradA:'#ffe133', gradB:'#4a3400',
    blurb:'"Class of 1981" combo cabinet. Flip between ghost-chasing Ms. Pac-Man and capture-beam shooter Galaga.',
    howTo:'Pac-Man: eat dots, dodge ghosts, grab fruit. Galaga: shoot bees, sometimes let one capture your ship so you can rescue it for double firepower.',
    fun:['Ms. Pac-Man was originally a Pac-Man hack called Crazy Otto','Galaga\'s capture-and-rescue mechanic is one of the most elegant in arcade history','Both machines played "attract mode" demos to lure coins'],
    tickets:'Non-redemption', playUrl:null },
  { id:'pixelbash', title:"Pac-Man's Pixel Bash", category:'retro', tag:'🟡 Multi-cabinet',
    year:2019, dev:'Bandai Namco', icon:'🕹️', color:'yellow',
    gradA:'#ffc83d', gradB:'#1a0a2a',
    blurb:'30+ classic Namco titles under one upright — Pac-Man, Galaga, Dig Dug, Mappy, Sky Kid, Splatterhouse, Xevious, Bosconian, Rally-X.',
    howTo:'Pick a game from the menu. One coin covers the whole library for the session.',
    fun:['Celebrates Namco catalog from ~1979–1992','Mappy is the most underrated game in the bundle','Splatterhouse was the first arcade game with a content warning'],
    tickets:'Non-redemption', playUrl:null },
  { id:'defender', title:'Defender / Defender II', category:'retro', tag:'👾 Side-scroller',
    year:1980, dev:'Williams / Team Play', icon:'🚀', color:'green',
    gradA:'#39ff14', gradB:'#0a1a0a',
    blurb:'Cocktail-style cabinet. Side-scrolling defense of humanoid settlers from alien abductors. Famously unforgiving: 5 buttons + stick.',
    howTo:'Thrust forward, fire lasers, smart-bomb when surrounded, hyperspace as a last resort. Rescue falling humans before they become mutants.',
    fun:['Eugene Jarvis designed it to be intentionally brutal','The scanner radar at the top is the unsung hero','Defender II (Stargate) added inverter and stargates'],
    tickets:'Non-redemption', playUrl:null },
  { id:'asteroids', title:'Asteroids Recharged', category:'retro', tag:'👾 Vector Shooter',
    year:2021, dev:'Atari / Alan-1', icon:'💠', color:'blue',
    gradA:'#1ed4ff', gradB:'#000033',
    blurb:'Modernized Asteroids with 256 waves, 46 galaxies, QR leaderboards, and tournament mode. Honors the 1979 original.',
    howTo:'Rotate, thrust, fire. Small asteroids split into smaller ones. The saucer\'s aim gets scary accurate at high scores.',
    fun:['The original 1979 Asteroids used vector graphics on a CRT','First arcade game to let players enter 3 initials on the high-score list','Recharged adds modern power-ups while keeping original physics'],
    tickets:'Non-redemption', playUrl:null },
  { id:'spaceinvaders', title:'Space Invaders / Qix', category:'retro', tag:'👾 Classic Combo',
    year:2003, dev:'Taito (Silver Anniversary)', icon:'👽', color:'green',
    gradA:'#39ff14', gradB:'#1a0a00',
    blurb:'Dual-game cabinet combining the game that started arcade culture (1978) with Qix\'s hypnotic territory-claiming puzzler.',
    howTo:'Invaders: shoot descending aliens before they reach you. Qix: draw boxes to claim areas while dodging the sparx and the Qix itself.',
    fun:['Space Invaders caused a coin shortage in Japan in 1978','Qix was one of the first arcade games to use abstract vector art','This cabinet commemorated 25 years of Space Invaders'],
    tickets:'Non-redemption', playUrl:null },
];

var CAT_LABELS = {
  action: 'MODERN ACTION',
  rhythm: 'RHYTHM',
  retro: 'RETRO CLASSIC',
  ticket: 'TICKET REDEMPTION',
};

var currentCat = 'all';
var coinCount = 0;

function renderGallery(){
  var g = document.getElementById('gallery');
  var visible = GAMES.filter(function(game){ return currentCat === 'all' || game.category === currentCat; });
  g.innerHTML = visible.map(function(game){
    return '<div class="game-card" data-color="' + game.color + '" data-id="' + game.id + '" tabindex="0" role="button" aria-label="' + game.title + '">' +
      '<div class="card-preview" style="--gradA:' + game.gradA + ';--gradB:' + game.gradB + '">' +
        '<div class="card-icon">' + game.icon + '</div>' +
      '</div>' +
      '<div class="card-body">' +
        '<div class="card-tag">' + game.tag + ' · ' + game.year + '</div>' +
        '<div class="card-title">' + game.title + '</div>' +
        '<div class="card-blurb">' + game.blurb + '</div>' +
        (game.playUrl ? '<span class="card-chip chip-play">▶ PLAY</span>' : '<span class="card-chip chip-info">INFO</span>') +
      '</div>' +
    '</div>';
  }).join('');
  g.querySelectorAll('.game-card').forEach(function(card){
    card.addEventListener('click', function(){ openModal(card.dataset.id); });
    card.addEventListener('keydown', function(e){
      if(e.key === 'Enter' || e.key === ' '){ e.preventDefault(); openModal(card.dataset.id); }
    });
  });
}

function renderTicker(){
  var titles = GAMES.map(function(g){ return g.title.toUpperCase(); }).join(' ★ ');
  document.getElementById('ticker').textContent = (titles + ' ★ ').repeat(4);
}

function openModal(id){
  var game = GAMES.find(function(g){ return g.id === id; });
  if(!game) return;
  coinCount++;
  document.getElementById('coin-count').textContent = coinCount;
  var lb = fakeLeaderboard();
  var html = '<div class="modal-backdrop" id="modal-bg">' +
    '<div class="modal" role="dialog" aria-modal="true">' +
      '<button class="modal-close" aria-label="Close" id="modal-close">×</button>' +
      '<div class="modal-hero" style="--gradA:' + game.gradA + ';--gradB:' + game.gradB + '">' +
        '<div class="icon">' + game.icon + '</div>' +
      '</div>' +
      '<div class="modal-body">' +
        '<div class="modal-title">' + game.title + '</div>' +
        '<div class="modal-subtitle">' + CAT_LABELS[game.category] + ' &middot; ' + game.year + ' &middot; ' + game.dev + '</div>' +
        '<div class="modal-section"><h3>ABOUT</h3><p>' + game.blurb + '</p></div>' +
        '<div class="modal-section"><h3>HOW TO PLAY</h3><p>' + game.howTo + '</p></div>' +
        '<div class="modal-section"><h3>FUN FACTS</h3><ul>' + game.fun.map(function(f){ return '<li>' + f + '</li>'; }).join('') + '</ul></div>' +
        '<div class="modal-section"><h3>TICKETS</h3><p>' + game.tickets + '</p></div>' +
        '<div class="modal-section"><h3>TOP SCORES</h3><div class="leaderboard">' +
          lb.map(function(r, i){ return '<div class="lb-row"><span class="lb-rank">' + (i + 1).toString().padStart(2, '0') + '.</span><span>' + r.ini + '</span><span>' + r.score.toLocaleString() + '</span></div>'; }).join('') +
        '</div></div>' +
        (game.playUrl ? '<a class="modal-play-btn" href="' + game.playUrl + '">▶ PLAY NOW</a>' : '') +
      '</div>' +
    '</div>' +
  '</div>';
  document.getElementById('modal-root').innerHTML = html;
  document.getElementById('modal-bg').addEventListener('click', function(e){
    if(e.target.id === 'modal-bg') closeModal();
  });
  document.getElementById('modal-close').addEventListener('click', closeModal);
}
function closeModal(){ document.getElementById('modal-root').innerHTML = ''; }

function fakeLeaderboard(){
  var initials = ['HAK','MWK','AJK','BLK','EVN','KLS','OLV','HNR','ALX','MON'];
  var out = [];
  for(var i=0;i<8;i++){
    var ini = initials[Math.floor(Math.random() * initials.length)];
    var score = Math.floor(Math.random() * 900000) + 100000 - i * 30000;
    out.push({ ini: ini, score: score });
  }
  out.sort(function(a,b){ return b.score - a.score; });
  return out;
}

document.querySelectorAll('.filter-btn').forEach(function(btn){
  btn.addEventListener('click', function(){
    document.querySelectorAll('.filter-btn').forEach(function(b){ b.classList.remove('active'); });
    btn.classList.add('active');
    currentCat = btn.dataset.cat;
    renderGallery();
  });
});

var retroMode = localStorage.getItem('korb_arcade_retro') === '1';
function applyRetro(){
  document.body.classList.toggle('retro-mode', retroMode);
  document.getElementById('retro-toggle').classList.toggle('on', retroMode);
}
document.getElementById('retro-toggle').addEventListener('click', function(){
  retroMode = !retroMode;
  localStorage.setItem('korb_arcade_retro', retroMode ? '1' : '0');
  applyRetro();
});
document.addEventListener('keydown', function(e){ if(e.key === 'Escape') closeModal(); });

renderTicker(); renderGallery(); applyRetro();
})();
</script>

</body>
</html>
