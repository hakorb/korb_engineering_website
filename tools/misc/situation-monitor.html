<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<meta name="description" content="SITUATION MONITOR // KORB ENGINEERING — a free, browser-based productivity tool from Korb Engineering. No signup, no downloads, works on mobile.">
<title>SITUATION MONITOR // KORB ENGINEERING</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
--bg:#050a0f;--surface:#0a1018;--surface2:#0e1520;--border:#1a2535;
--cyan:#00d4ff;--orange:#ff6600;--green:#10b981;--red:#ef4444;
--text:#e2e8f0;--text-dim:#64748b;--text-muted:#334155;
--glow-cyan:rgba(0,212,255,.15);--glow-orange:rgba(255,102,0,.15);
--glow-green:rgba(16,185,129,.12);--glow-red:rgba(239,68,68,.12);
}
html,body{height:100%;overflow:hidden;background:var(--bg);color:var(--text);
font-family:'JetBrains Mono',monospace;font-size:12px;line-height:1.5;-webkit-font-smoothing:antialiased}
::-webkit-scrollbar{width:5px;height:5px}
::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb{background:var(--border);border-radius:3px}
::-webkit-scrollbar-thumb:hover{background:#2a3a50}

/* SCANLINE OVERLAY */
#scanlines{position:fixed;top:0;left:0;width:100%;height:100%;pointer-events:none;z-index:9999;
background:repeating-linear-gradient(0deg,transparent,transparent 2px,rgba(0,0,0,.06) 2px,rgba(0,0,0,.06) 4px);
}
#scanlines::after{content:'';position:absolute;top:0;left:0;width:100%;height:100%;
background:linear-gradient(transparent 50%,rgba(0,0,0,.03) 50%);background-size:100% 4px;
animation:scanmove 8s linear infinite;opacity:.3}
@keyframes scanmove{0%{transform:translateY(0)}100%{transform:translateY(4px)}}

/* FLICKER */
@keyframes flicker{0%,100%{opacity:1}92%{opacity:1}93%{opacity:.8}94%{opacity:1}96%{opacity:.9}97%{opacity:1}}
body{animation:flicker 12s infinite}

/* LAYOUT */
#app{display:flex;flex-direction:column;height:100vh;overflow:hidden}

/* HEADER */
#header{display:flex;align-items:center;justify-content:space-between;padding:0 16px;height:48px;
background:var(--surface);border-bottom:1px solid var(--border);flex-shrink:0;z-index:100;
border-top:2px solid var(--cyan)}
.hdr-left{display:flex;align-items:center;gap:12px}
.hdr-logo{display:flex;align-items:center;gap:8px}
.hdr-logo .dot{width:8px;height:8px;border-radius:50%;background:var(--green);box-shadow:0 0 6px var(--green);
animation:pulse-dot 2s infinite}
@keyframes pulse-dot{0%,100%{opacity:1}50%{opacity:.5}}
.hdr-title{font-size:14px;font-weight:700;letter-spacing:3px;text-transform:uppercase;color:var(--cyan)}
.hdr-sub{font-size:9px;letter-spacing:2px;color:var(--text-dim);text-transform:uppercase}
.hdr-center{display:flex;align-items:center;gap:16px}
.hdr-clock{font-size:18px;font-weight:600;color:var(--cyan);letter-spacing:2px}
.hdr-date{font-size:10px;color:var(--text-dim);letter-spacing:1px}
.hdr-right{display:flex;align-items:center;gap:8px}
.hdr-btn{background:transparent;border:1px solid var(--border);color:var(--text-dim);
padding:6px 10px;border-radius:4px;cursor:pointer;font-family:inherit;font-size:10px;
letter-spacing:1px;text-transform:uppercase;min-height:44px;min-width:44px;
display:flex;align-items:center;justify-content:center;gap:4px;transition:all .2s}
.hdr-btn:hover{border-color:var(--cyan);color:var(--cyan)}
.hdr-btn.active{border-color:var(--cyan);color:var(--cyan);background:var(--glow-cyan)}
.hdr-btn .ico{font-size:14px}

/* GRID */
#grid{flex:1;display:grid;grid-template-columns:1fr 1fr 1fr 1fr;grid-template-rows:1fr 1fr 1fr;
gap:2px;padding:2px;overflow:hidden;background:var(--bg)}
.panel{background:var(--surface);border:1px solid var(--border);display:flex;flex-direction:column;
overflow:hidden;position:relative;transition:all .3s;min-height:0}
.panel:hover{border-color:#2a3a50}
.panel.expanded{position:fixed!important;top:0;left:0;width:100vw!important;height:100vh!important;
z-index:1000;grid-column:auto!important;grid-row:auto!important;border:2px solid var(--cyan)}
.panel-hdr{display:flex;align-items:center;justify-content:space-between;padding:6px 10px;
background:var(--surface2);border-bottom:1px solid var(--border);flex-shrink:0;cursor:pointer;min-height:32px}
.panel-hdr:hover{background:#121c28}
.panel-title{display:flex;align-items:center;gap:6px;font-size:10px;font-weight:600;
letter-spacing:1.5px;text-transform:uppercase;color:var(--text-dim)}
.panel-title .status-dot{width:6px;height:6px;border-radius:50%;background:var(--green);flex-shrink:0;
box-shadow:0 0 4px var(--green)}
.panel-title .status-dot.warn{background:var(--orange);box-shadow:0 0 4px var(--orange)}
.panel-title .status-dot.err{background:var(--red);box-shadow:0 0 4px var(--red)}
.panel-actions{display:flex;gap:4px}
.panel-btn{background:transparent;border:none;color:var(--text-muted);cursor:pointer;padding:4px;
font-size:12px;font-family:inherit;min-height:28px;min-width:28px;display:flex;align-items:center;justify-content:center}
.panel-btn:hover{color:var(--cyan)}
.panel-body{flex:1;overflow-y:auto;overflow-x:hidden;padding:8px;min-height:0}

/* WORLD CLOCK */
.clock-grid{display:grid;grid-template-columns:1fr 1fr;gap:6px;height:100%}
.clock-item{background:var(--surface2);border:1px solid var(--border);border-radius:4px;padding:8px;
text-align:center;display:flex;flex-direction:column;justify-content:center}
.clock-item.highlight{border-color:var(--cyan);background:rgba(0,212,255,.05)}
.clock-zone{font-size:9px;letter-spacing:1.5px;color:var(--text-dim);text-transform:uppercase;margin-bottom:2px}
.clock-time{font-size:18px;font-weight:600;color:var(--cyan);letter-spacing:1px}
.clock-date{font-size:9px;color:var(--text-muted);margin-top:2px}
.clock-item.highlight .clock-time{color:#fff;text-shadow:0 0 10px var(--cyan)}

/* WEATHER */
.weather-main{display:flex;align-items:center;justify-content:center;gap:16px;padding:12px 0}
.weather-temp{font-size:36px;font-weight:300;color:var(--cyan)}
.weather-icon{font-size:32px}
.weather-desc{font-size:11px;color:var(--text-dim);text-transform:uppercase;letter-spacing:1px}
.weather-details{display:grid;grid-template-columns:1fr 1fr;gap:6px;margin-top:8px}
.weather-detail{background:var(--surface2);border:1px solid var(--border);border-radius:4px;padding:6px 8px;text-align:center}
.weather-detail .label{font-size:8px;color:var(--text-muted);text-transform:uppercase;letter-spacing:1px}
.weather-detail .value{font-size:14px;color:var(--text);margin-top:2px}
.weather-forecast{display:flex;gap:4px;margin-top:8px}
.forecast-item{flex:1;background:var(--surface2);border:1px solid var(--border);border-radius:4px;padding:4px;text-align:center}
.forecast-item .day{font-size:8px;color:var(--text-dim);text-transform:uppercase}
.forecast-item .ftemp{font-size:12px;color:var(--text);margin-top:2px}

/* NEWS */
.news-tabs{display:flex;gap:2px;margin-bottom:6px;flex-wrap:wrap}
.news-tab{background:var(--surface2);border:1px solid var(--border);color:var(--text-dim);
padding:4px 8px;border-radius:3px;cursor:pointer;font-family:inherit;font-size:9px;
letter-spacing:1px;text-transform:uppercase;min-height:30px}
.news-tab.active{border-color:var(--cyan);color:var(--cyan);background:var(--glow-cyan)}
.news-list{display:flex;flex-direction:column;gap:4px}
.news-item{background:var(--surface2);border:1px solid var(--border);border-radius:3px;padding:6px 8px;
cursor:pointer;transition:all .15s}
.news-item:hover{border-color:var(--cyan);background:rgba(0,212,255,.03)}
.news-item .news-src{font-size:8px;color:var(--orange);text-transform:uppercase;letter-spacing:1px}
.news-item .news-title{font-size:11px;color:var(--text);margin-top:2px;line-height:1.3}
.news-item .news-time{font-size:8px;color:var(--text-muted);margin-top:3px}

/* SYSTEM STATUS */
.sys-grid{display:flex;flex-direction:column;gap:6px}
.sys-row{display:flex;justify-content:space-between;align-items:center;padding:4px 8px;
background:var(--surface2);border:1px solid var(--border);border-radius:3px}
.sys-label{font-size:9px;color:var(--text-dim);text-transform:uppercase;letter-spacing:1px}
.sys-value{font-size:11px;color:var(--cyan);text-align:right}
.sys-bar{height:4px;background:var(--border);border-radius:2px;margin-top:4px;overflow:hidden}
.sys-bar-fill{height:100%;border-radius:2px;transition:width .5s}

/* TOPIC TRACKER */
.topic-input-wrap{display:flex;gap:4px;margin-bottom:8px}
.topic-input{flex:1;background:var(--surface2);border:1px solid var(--border);color:var(--text);
padding:8px;border-radius:4px;font-family:inherit;font-size:16px;outline:none;min-height:44px}
.topic-input:focus{border-color:var(--cyan)}
.topic-input::placeholder{color:var(--text-muted)}
.topic-add-btn{background:var(--glow-cyan);border:1px solid var(--cyan);color:var(--cyan);
padding:8px 12px;border-radius:4px;cursor:pointer;font-family:inherit;font-size:11px;
font-weight:600;min-height:44px;min-width:44px}
.topic-tags{display:flex;flex-wrap:wrap;gap:4px;margin-bottom:8px}
.topic-tag{display:flex;align-items:center;gap:4px;padding:4px 8px;border-radius:3px;
font-size:9px;letter-spacing:1px;text-transform:uppercase;cursor:pointer;border:1px solid}
.topic-tag.critical{border-color:var(--red);color:var(--red);background:var(--glow-red)}
.topic-tag.warning{border-color:var(--orange);color:var(--orange);background:var(--glow-orange)}
.topic-tag.info{border-color:var(--cyan);color:var(--cyan);background:var(--glow-cyan)}
.topic-tag .tag-x{margin-left:4px;opacity:.6;cursor:pointer}
.topic-tag .tag-x:hover{opacity:1}
.topic-results{display:flex;flex-direction:column;gap:3px}
.topic-result{padding:5px 8px;background:var(--surface2);border:1px solid var(--border);border-radius:3px;
font-size:10px;cursor:pointer;transition:all .15s}
.topic-result:hover{border-color:var(--cyan)}
.topic-result .tr-topic{font-size:8px;letter-spacing:1px;text-transform:uppercase;margin-bottom:2px}
.topic-result .tr-topic.critical{color:var(--red)}
.topic-result .tr-topic.warning{color:var(--orange)}
.topic-result .tr-topic.info{color:var(--cyan)}

/* MAP */
.map-canvas-wrap{width:100%;height:100%;position:relative}
.map-canvas-wrap canvas{width:100%;height:100%}

/* ACTIVITY LOG */
.log-filters{display:flex;gap:2px;margin-bottom:6px;flex-wrap:wrap}
.log-filter{background:var(--surface2);border:1px solid var(--border);color:var(--text-dim);
padding:3px 6px;border-radius:3px;cursor:pointer;font-family:inherit;font-size:16px;
letter-spacing:1px;text-transform:uppercase;min-height:28px}
.log-filter.active{border-color:var(--cyan);color:var(--cyan)}
.log-entries{display:flex;flex-direction:column;gap:2px}
.log-entry{display:flex;gap:8px;padding:3px 6px;font-size:10px;border-radius:2px;
background:var(--surface2);border-left:2px solid var(--border)}
.log-entry.info{border-left-color:var(--cyan)}
.log-entry.success{border-left-color:var(--green)}
.log-entry.warn{border-left-color:var(--orange)}
.log-entry.error{border-left-color:var(--red)}
.log-ts{color:var(--text-muted);flex-shrink:0;font-size:9px}
.log-src{color:var(--text-dim);flex-shrink:0;width:60px;text-transform:uppercase;font-size:9px;letter-spacing:.5px}
.log-msg{color:var(--text);flex:1}

/* METRICS */
.metrics-canvas-wrap{width:100%;height:100%;position:relative}
.metrics-canvas-wrap canvas{width:100%;height:100%}
.metrics-legend{display:flex;gap:8px;margin-top:4px;justify-content:center}
.metrics-legend-item{display:flex;align-items:center;gap:4px;font-size:9px;color:var(--text-dim)}
.metrics-legend-item .ml-dot{width:6px;height:6px;border-radius:50%}

/* STATUS BAR */
#statusbar{display:flex;align-items:center;justify-content:space-between;padding:0 12px;height:28px;
background:var(--surface);border-top:1px solid var(--border);flex-shrink:0;font-size:9px;color:var(--text-muted)}
.sb-left,.sb-right{display:flex;align-items:center;gap:12px}
.sb-item{display:flex;align-items:center;gap:4px}
.sb-dot{width:5px;height:5px;border-radius:50%}
.sb-dot.green{background:var(--green)}
.sb-dot.orange{background:var(--orange)}
.sb-dot.red{background:var(--red)}

/* ALERT FLASH */
@keyframes alert-flash{0%,100%{box-shadow:none}50%{box-shadow:inset 0 0 30px rgba(239,68,68,.1)}}
.panel.alert-active{animation:alert-flash 1s ease 3}

/* PRIORITY SELECT */
.priority-select{background:var(--surface2);border:1px solid var(--border);color:var(--text-dim);
padding:4px;border-radius:3px;font-family:inherit;font-size:16px;outline:none;min-height:36px}

/* RESPONSIVE */
@media(max-width:1200px){#grid{grid-template-columns:1fr 1fr;grid-template-rows:repeat(4,1fr)}}
@media(max-width:768px){
#grid{grid-template-columns:1fr;grid-template-rows:auto;overflow-y:auto}
.panel{min-height:280px}
.hdr-center,.hdr-sub{display:none}
.clock-grid{grid-template-columns:1fr 1fr 1fr}
}
</style>
</head>
<body>
<div id="scanlines"></div>
<div id="app">

<!-- HEADER -->
<div id="header">
  <div class="hdr-left">
    <div class="hdr-logo">
      <span class="dot"></span>
      <span class="hdr-title">SITUATION MONITOR</span>
    </div>
    <span class="hdr-sub">KORB ENGINEERING // COMMAND</span>
  </div>
  <div class="hdr-center">
    <span class="hdr-date" id="hdr-date"></span>
    <span class="hdr-clock" id="hdr-clock">00:00:00</span>
    <span style="font-size:9px;color:var(--text-muted);letter-spacing:1px">UTC</span>
  </div>
  <div class="hdr-right">
    <button class="hdr-btn" id="btn-audio" title="Toggle Ambience">
      <span class="ico">&#9835;</span>
    </button>
    <button class="hdr-btn" id="btn-alert-sound" title="Toggle Alert Sounds">
      <span class="ico">&#128276;</span>
    </button>
    <button class="hdr-btn" id="btn-keyboard" title="Keyboard Shortcuts">
      <span class="ico">?</span>
    </button>
  </div>
</div>

<!-- GRID -->
<div id="grid">

  <!-- 1: WORLD CLOCK -->
  <div class="panel" id="panel-clock" data-panel="clock" style="grid-column:1;grid-row:1">
    <div class="panel-hdr" onclick="toggleExpand('panel-clock')">
      <div class="panel-title"><span class="status-dot"></span>WORLD CLOCK</div>
      <div class="panel-actions"><button class="panel-btn" onclick="event.stopPropagation();toggleExpand('panel-clock')">[+]</button></div>
    </div>
    <div class="panel-body"><div class="clock-grid" id="clock-grid"></div></div>
  </div>

  <!-- 2: WEATHER -->
  <div class="panel" id="panel-weather" data-panel="weather" style="grid-column:2;grid-row:1">
    <div class="panel-hdr" onclick="toggleExpand('panel-weather')">
      <div class="panel-title"><span class="status-dot"></span>WEATHER INTEL</div>
      <div class="panel-actions"><button class="panel-btn" onclick="event.stopPropagation();toggleExpand('panel-weather')">[+]</button></div>
    </div>
    <div class="panel-body" id="weather-body">
      <div style="text-align:center;padding:20px;color:var(--text-dim)">ACQUIRING LOCATION DATA...</div>
    </div>
  </div>

  <!-- 3: NEWS -->
  <div class="panel" id="panel-news" data-panel="news" style="grid-column:3/5;grid-row:1">
    <div class="panel-hdr" onclick="toggleExpand('panel-news')">
      <div class="panel-title"><span class="status-dot"></span>SIGNAL INTELLIGENCE</div>
      <div class="panel-actions"><button class="panel-btn" onclick="event.stopPropagation();toggleExpand('panel-news')">[+]</button></div>
    </div>
    <div class="panel-body" id="news-body">
      <div class="news-tabs" id="news-tabs"></div>
      <div class="news-list" id="news-list"><div style="color:var(--text-dim);padding:12px;text-align:center">SCANNING FEEDS...</div></div>
    </div>
  </div>

  <!-- 4: SYSTEM STATUS -->
  <div class="panel" id="panel-system" data-panel="system" style="grid-column:1;grid-row:2">
    <div class="panel-hdr" onclick="toggleExpand('panel-system')">
      <div class="panel-title"><span class="status-dot"></span>SYSTEM STATUS</div>
      <div class="panel-actions"><button class="panel-btn" onclick="event.stopPropagation();toggleExpand('panel-system')">[+]</button></div>
    </div>
    <div class="panel-body" id="system-body"></div>
  </div>

  <!-- 5: TOPIC TRACKER -->
  <div class="panel" id="panel-topics" data-panel="topics" style="grid-column:2/4;grid-row:2">
    <div class="panel-hdr" onclick="toggleExpand('panel-topics')">
      <div class="panel-title"><span class="status-dot"></span>TOPIC TRACKER</div>
      <div class="panel-actions"><button class="panel-btn" onclick="event.stopPropagation();toggleExpand('panel-topics')">[+]</button></div>
    </div>
    <div class="panel-body" id="topics-body">
      <div class="topic-input-wrap">
        <input class="topic-input" id="topic-input" placeholder="ENTER TRACKING TOPIC..." onkeydown="if(event.key==='Enter')addTopic()">
        <select class="priority-select" id="topic-priority">
          <option value="info">INFO</option>
          <option value="warning">WARN</option>
          <option value="critical">CRIT</option>
        </select>
        <button class="topic-add-btn" onclick="addTopic()">+ADD</button>
      </div>
      <div class="topic-tags" id="topic-tags"></div>
      <div class="topic-results" id="topic-results"></div>
    </div>
  </div>

  <!-- 6: MAP -->
  <div class="panel" id="panel-map" data-panel="map" style="grid-column:4;grid-row:2">
    <div class="panel-hdr" onclick="toggleExpand('panel-map')">
      <div class="panel-title"><span class="status-dot"></span>GLOBAL OVERVIEW</div>
      <div class="panel-actions"><button class="panel-btn" onclick="event.stopPropagation();toggleExpand('panel-map')">[+]</button></div>
    </div>
    <div class="panel-body" style="padding:0"><div class="map-canvas-wrap"><canvas id="map-canvas"></canvas></div></div>
  </div>

  <!-- 7: ACTIVITY LOG -->
  <div class="panel" id="panel-log" data-panel="log" style="grid-column:1/3;grid-row:3">
    <div class="panel-hdr" onclick="toggleExpand('panel-log')">
      <div class="panel-title"><span class="status-dot"></span>ACTIVITY LOG</div>
      <div class="panel-actions"><button class="panel-btn" onclick="event.stopPropagation();toggleExpand('panel-log')">[+]</button></div>
    </div>
    <div class="panel-body" id="log-body">
      <div class="log-filters" id="log-filters">
        <button class="log-filter active" data-filter="all" onclick="setLogFilter('all',this)">ALL</button>
        <button class="log-filter" data-filter="info" onclick="setLogFilter('info',this)">INFO</button>
        <button class="log-filter" data-filter="success" onclick="setLogFilter('success',this)">SUCCESS</button>
        <button class="log-filter" data-filter="warn" onclick="setLogFilter('warn',this)">WARN</button>
        <button class="log-filter" data-filter="error" onclick="setLogFilter('error',this)">ERROR</button>
      </div>
      <div class="log-entries" id="log-entries"></div>
    </div>
  </div>

  <!-- 8: METRICS -->
  <div class="panel" id="panel-metrics" data-panel="metrics" style="grid-column:3/5;grid-row:3">
    <div class="panel-hdr" onclick="toggleExpand('panel-metrics')">
      <div class="panel-title"><span class="status-dot"></span>METRICS</div>
      <div class="panel-actions"><button class="panel-btn" onclick="event.stopPropagation();toggleExpand('panel-metrics')">[+]</button></div>
    </div>
    <div class="panel-body" style="padding:4px;display:flex;flex-direction:column">
      <div class="metrics-canvas-wrap" style="flex:1;min-height:0"><canvas id="metrics-canvas"></canvas></div>
      <div class="metrics-legend" id="metrics-legend"></div>
    </div>
  </div>

</div>

<!-- STATUS BAR -->
<div id="statusbar">
  <div class="sb-left">
    <span class="sb-item"><span class="sb-dot green"></span> ONLINE</span>
    <span class="sb-item" id="sb-uptime">UPTIME: 00:00:00</span>
    <span class="sb-item" id="sb-events">EVENTS: 0</span>
    <span class="sb-item" id="sb-topics">TOPICS: 0</span>
  </div>
  <div class="sb-right">
    <span class="sb-item" id="sb-network"><span class="sb-dot green"></span> NET OK</span>
    <span class="sb-item" id="sb-battery"></span>
    <span class="sb-item" id="sb-memory"></span>
    <span class="sb-item">KB: 1-8 PANELS / ESC CLOSE</span>
  </div>
</div>

</div>

<script>
// ========== STATE ==========
const LS_PREFIX = 'korb_situation_';
const startTime = Date.now();
let logEntries = [];
let logFilter = 'all';
let eventCount = 0;
let audioCtx = null;
let ambientOn = false;
let ambientOsc = null;
let ambientGain = null;
let alertSoundOn = load('alert_sound') !== false;
let topics = load('topics') || [];
let newsFeeds = {
  tech: 'https://api.rss2json.com/v1/api.json?rss_url=https%3A%2F%2Frss.nytimes.com%2Fservices%2Fxml%2Frss%2Fnyt%2FTechnology.xml',
  world: 'https://api.rss2json.com/v1/api.json?rss_url=https%3A%2F%2Frss.nytimes.com%2Fservices%2Fxml%2Frss%2Fnyt%2FWorld.xml',

// ========== LOGGING ==========
function addLog(type, src, msg) {
  const now = new Date();
  const ts = now.toTimeString().slice(0,8);
  const entry = {type,src,msg,ts,time:now.getTime()};
  logEntries.unshift(entry);
  if(logEntries.length > 200) logEntries.pop();
  eventCount++;
  renderLog();
  updateStatusBar();
  // check topic matches
  checkTopicMatch(msg);
}

function renderLog() {
  const el = document.getElementById('log-entries');
  const filtered = logFilter === 'all' ? logEntries : logEntries.filter(e => e.type === logFilter);
  el.innerHTML = filtered.slice(0,80).map(e =>
    `<div class="log-entry ${e.type}"><span class="log-ts">${e.ts}</span><span class="log-src">${e.src}</span><span class="log-msg">${e.msg}</span></div>`
  ).join('');
}

function setLogFilter(f, btn) {
  logFilter = f;
  document.querySelectorAll('.log-filter').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');

// ========== WEATHER ==========
let weatherData = null;
function fetchWeather() {
  if(!navigator.geolocation) { renderWeatherDemo(); return; }
  navigator.geolocation.getCurrentPosition(pos => {
    const {latitude:lat,longitude:lon} = pos.coords;
    // Using open-meteo (no API key needed)
    fetch(`https://api.open-meteo.com/v1/forecast?latitude=${lat}&longitude=${lon}&current=temperature_2m,relative_humidity_2m,wind_speed_10m,weather_code&daily=temperature_2m_max,temperature_2m_min,weather_code&temperature_unit=fahrenheit&wind_speed_unit=mph&timezone=auto&forecast_days=5`)
      .then(r=>r.json()).then(data=>{
        weatherData = data;
        renderWeather(data);
        addLog('success','WEATHER','Weather data acquired for coordinates '+lat.toFixed(2)+', '+lon.toFixed(2));
      }).catch(()=>renderWeatherDemo());
  }, ()=>renderWeatherDemo());
}

function weatherCodeToDesc(code) {
  const codes = {0:'Clear',1:'Mostly Clear',2:'Partly Cloudy',3:'Overcast',
    45:'Foggy',48:'Rime Fog',51:'Light Drizzle',53:'Drizzle',55:'Heavy Drizzle',
    61:'Light Rain',63:'Rain',65:'Heavy Rain',71:'Light Snow',73:'Snow',75:'Heavy Snow',
    80:'Light Showers',81:'Showers',82:'Heavy Showers',95:'Thunderstorm',96:'Hail Storm',99:'Severe Hail'};
  return codes[code]||'Unknown';
}

function weatherCodeToIcon(code) {
  if(code<=1) return '\u2600';
  if(code<=3) return '\u26C5';
  if(code<=48) return '\uD83C\uDF2B';
  if(code<=55) return '\uD83C\uDF27';
  if(code<=65) return '\uD83C\uDF27';
  if(code<=75) return '\u2744';
  if(code<=82) return '\u26C8';
  return '\u26A1';
}

function renderWeather(data) {
  const c = data.current;
  const body = document.getElementById('weather-body');
  const desc = weatherCodeToDesc(c.weather_code);
  const icon = weatherCodeToIcon(c.weather_code);
  let html = `<div class="weather-main">
    <span class="weather-icon">${icon}</span>
    <div><div class="weather-temp">${Math.round(c.temperature_2m)}\u00B0F</div>
    <div class="weather-desc">${desc}</div></div>
  </div>
  <div class="weather-details">
    <div class="weather-detail"><div class="label">HUMIDITY</div><div class="value">${c.relative_humidity_2m}%</div></div>
    <div class="weather-detail"><div class="label">WIND</div><div class="value">${Math.round(c.wind_speed_10m)} MPH</div></div>
  </div>`;
  if(data.daily) {
    html += '<div class="weather-forecast">';
    const days = ['SUN','MON','TUE','WED','THU','FRI','SAT'];
    for(let i=1;i<Math.min(5,data.daily.time.length);i++){
      const d = new Date(data.daily.time[i]);
      const hi = Math.round(data.daily.temperature_2m_max[i]);
      const lo = Math.round(data.daily.temperature_2m_min[i]);
      const ic = weatherCodeToIcon(data.daily.weather_code[i]);
      html += `<div class="forecast-item"><div class="day">${days[d.getDay()]}</div><div>${ic}</div><div class="ftemp">${hi}/${lo}</div></div>`;
    }
    html += '</div>';
  }
  body.innerHTML = html;
}

// ========== NEWS ==========
function initNewsTabs() {
  const tabs = document.getElementById('news-tabs');
  tabs.innerHTML = Object.keys(newsFeeds).map(k =>
    `<button class="news-tab${k===currentFeed?' active':''}" onclick="switchFeed('${k}',this)">${k.toUpperCase()}</button>`
  ).join('');
}

function switchFeed(feed, btn) {
  currentFeed = feed;
  document.querySelectorAll('.news-tab').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  renderNews();
  if(!newsCache[feed]) fetchFeed(feed);
}

function fetchFeed(feed) {
  fetch(newsFeeds[feed]).then(r=>r.json()).then(data=>{
    if(data.items) {
      newsCache[feed] = data.items.slice(0,15);
      if(feed === currentFeed) renderNews();
      addLog('info','SIGINT','Feed updated: '+feed.toUpperCase()+' ('+data.items.length+' items)');
      metricsData.feed_updates.push(data.items.length);
      metricsData.feed_updates.shift();
    }
  }).catch(e => {
    addLog('error','SIGINT','Feed fetch failed: '+feed.toUpperCase());
  });
}

function fetchAllFeeds() {
  Object.keys(newsFeeds).forEach(k => fetchFeed(k));
}

function renderNews() {
  const list = document.getElementById('news-list');
  const items = newsCache[currentFeed];
  if(!items || items.length === 0) {
    list.innerHTML = '<div style="color:var(--text-dim);padding:12px;text-align:center">SCANNING FEEDS...</div>';
    return;
  }
  list.innerHTML = items.map(item => {
    const time = item.pubDate ? timeAgo(new Date(item.pubDate)) : '';
    const title = item.title || 'NO TITLE';
    return `<div class="news-item" onclick="window.open('${item.link}','_blank')">
      <div class="news-src">${currentFeed.toUpperCase()} // ${(item.author||'').toUpperCase().slice(0,30)}</div>
      <div class="news-title">${escHtml(title)}</div>
      <div class="news-time">${time}</div>
    </div>`;
  }).join('');
}

function timeAgo(date) {
  const s = Math.floor((Date.now()-date.getTime())/1000);
  if(s<60) return s+'S AGO';
  if(s<3600) return Math.floor(s/60)+'M AGO';
  if(s<86400) return Math.floor(s/3600)+'H AGO';
  return Math.floor(s/86400)+'D AGO';
}

function escHtml(s){return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;')}

// ========== SYSTEM STATUS ==========
function renderSystemStatus() {
  const body = document.getElementById('system-body');
  const ua = navigator.userAgent;
  let browser = 'Unknown';
  if(ua.includes('Firefox')) browser='Firefox';
  else if(ua.includes('Chrome')) browser='Chrome';
  else if(ua.includes('Safari')) browser='Safari';
  else if(ua.includes('Edge')) browser='Edge';

  const conn = navigator.connection;
  const net = conn ? (conn.effectiveType||'').toUpperCase() : 'UNKNOWN';
  const downlink = conn ? (conn.downlink||'?')+' Mbps' : 'N/A';

  const elapsed = Date.now() - startTime;
  const upH = Math.floor(elapsed/3600000);
  const upM = Math.floor((elapsed%3600000)/60000);
  const upS = Math.floor((elapsed%60000)/1000);
  const uptime = pad(upH)+':'+pad(upM)+':'+pad(upS);

  let memUsed = 'N/A', memTotal = 'N/A', memPct = 0;
  if(performance.memory) {
    memUsed = (performance.memory.usedJSHeapSize/1048576).toFixed(1)+'MB';
    memTotal = (performance.memory.jsHeapSizeLimit/1048576).toFixed(0)+'MB';
    memPct = Math.round(performance.memory.usedJSHeapSize/performance.memory.jsHeapSizeLimit*100);
  }

  const rows = [
    {l:'BROWSER',v:browser+' / '+navigator.platform},
    {l:'RESOLUTION',v:screen.width+'x'+screen.height+' @ '+window.devicePixelRatio+'x'},
    {l:'CONNECTION',v:navigator.onLine?'ONLINE // '+net:'OFFLINE',color:navigator.onLine?'var(--green)':'var(--red)'},
    {l:'DOWNLINK',v:downlink},
    {l:'UPTIME',v:uptime,color:'var(--cyan)'},
    {l:'EVENTS LOGGED',v:eventCount.toString(),color:'var(--cyan)'},
    {l:'JS HEAP',v:memUsed+' / '+memTotal,bar:memPct},
    {l:'LANGUAGE',v:navigator.language.toUpperCase()},
    {l:'CORES',v:(navigator.hardwareConcurrency||'?').toString()},
  ];

  body.innerHTML = '<div class="sys-grid">' + rows.map(r => {
    let extra = '';
    if(r.bar !== undefined) {
      const barColor = r.bar > 80 ? 'var(--red)' : r.bar > 60 ? 'var(--orange)' : 'var(--green)';
      extra = `<div class="sys-bar"><div class="sys-bar-fill" style="width:${r.bar}%;background:${barColor}"></div></div>`;
    }
    const color = r.color || 'var(--cyan)';
    return `<div class="sys-row"><span class="sys-label">${r.l}</span><span class="sys-value" style="color:${color}">${r.v}</span></div>${extra}`;
  }).join('') + '</div>';
}

// ========== TOPIC TRACKER ==========
function addTopic() {
  const input = document.getElementById('topic-input');
  const priority = document.getElementById('topic-priority').value;
  const text = input.value.trim();
  if(!text) return;
  if(topics.find(t => t.text.toLowerCase() === text.toLowerCase())) return;
  topics.push({text, priority, added: Date.now()});
  save('topics', topics);
  input.value = '';
  renderTopics();
  searchTopicFeeds(text, priority);
  addLog('info','TOPICS','Now tracking: '+text.toUpperCase()+' ['+priority.toUpperCase()+']');
  updateStatusBar();
}

function removeTopic(idx) {
  const removed = topics.splice(idx,1)[0];
  save('topics', topics);
  renderTopics();
  addLog('info','TOPICS','Stopped tracking: '+removed.text.toUpperCase());
  updateStatusBar();
}

function renderTopics() {
  const tags = document.getElementById('topic-tags');
  tags.innerHTML = topics.map((t,i) =>
    `<span class="topic-tag ${t.priority}" onclick="filterTopicResults('${t.text}')">${t.text}<span class="tag-x" onclick="event.stopPropagation();removeTopic(${i})">&#10005;</span></span>`
  ).join('');
}

function searchTopicFeeds(topic, priority) {
  const feedUrl = `https://api.rss2json.com/v1/api.json?rss_url=https%3A%2F%2Fnews.google.com%2Frss%2Fsearch%3Fq%3D${encodeURIComponent(topic)}%26hl%3Den-US%26gl%3DUS%26ceid%3DUS%3Aen`;
  fetch(feedUrl).then(r=>r.json()).then(data=>{
    if(data.items && data.items.length > 0) {
      const results = document.getElementById('topic-results');
      const existing = results.innerHTML;
      const newItems = data.items.slice(0,5).map(item =>
        `<div class="topic-result" onclick="window.open('${item.link}','_blank')">
          <div class="tr-topic ${priority}">${escHtml(topic.toUpperCase())}</div>
          <div style="color:var(--text);font-size:10px">${escHtml(item.title||'')}</div>
          <div style="color:var(--text-muted);font-size:8px;margin-top:2px">${item.pubDate?timeAgo(new Date(item.pubDate)):''}</div>
        </div>`
      ).join('');
      results.innerHTML = newItems + existing;
      metricsData.topic_hits.push(data.items.length);
      metricsData.topic_hits.shift();
      addLog('success','TOPICS','Found '+data.items.length+' results for: '+topic.toUpperCase());
    }
  }).catch(e=>{
    addLog('warn','TOPICS','Search failed for: '+topic.toUpperCase());
  });
}

function filterTopicResults(topic) {
  // Re-search for this topic
  const t = topics.find(x=>x.text===topic);
  if(t) searchTopicFeeds(t.text, t.priority);
}

function checkTopicMatch(msg) {
  const lower = msg.toLowerCase();
  topics.forEach(t => {
    if(lower.includes(t.text.toLowerCase())) {
      const panel = document.getElementById('panel-topics');
      panel.classList.add('alert-active');
      setTimeout(() => panel.classList.remove('alert-active'), 3000);
      if(alertSoundOn) playAlertSound();
      metricsData.topic_hits.push(1);
      metricsData.topic_hits.shift();
    }
  });
}

// ========== MAP ==========
function renderMap() {
  const canvas = document.getElementById('map-canvas');
  const wrap = canvas.parentElement;
  const dpr = window.devicePixelRatio || 1;
  const w = wrap.clientWidth;
  const h = wrap.clientHeight;
  if(w === 0 || h === 0) return;
  canvas.width = w * dpr;
  canvas.height = h * dpr;
  const ctx = canvas.getContext('2d');
  ctx.scale(dpr, dpr);

  // Background
  ctx.fillStyle = '#050a0f';
  ctx.fillRect(0,0,w,h);

  // Grid lines
  ctx.strokeStyle = '#0d1a2a';
  ctx.lineWidth = 0.5;
  for(let i=0;i<w;i+=30){ctx.beginPath();ctx.moveTo(i,0);ctx.lineTo(i,h);ctx.stroke()}
  for(let i=0;i<h;i+=30){ctx.beginPath();ctx.moveTo(0,i);ctx.lineTo(w,i);ctx.stroke()}

  // Simple world map outline (simplified continent paths)
  ctx.strokeStyle = '#1a3550';
  ctx.lineWidth = 1;
  ctx.fillStyle = '#0e1a28';
  drawSimpleMap(ctx, w, h);

  // Timezone lines
  ctx.strokeStyle = 'rgba(0,212,255,0.08)';
  ctx.lineWidth = 0.5;
  for(let tz=-12;tz<=12;tz++){
    const x = ((tz+12)/24)*w;
    ctx.beginPath();ctx.moveTo(x,0);ctx.lineTo(x,h);ctx.stroke();
  }

  // Equator
  ctx.strokeStyle = 'rgba(255,102,0,0.1)';
  ctx.lineWidth = 0.5;
  ctx.beginPath();ctx.moveTo(0,h/2);ctx.lineTo(w,h/2);ctx.stroke();

  // Locations
  mapLocations.forEach(loc => {
    const x = ((loc.lon + 180)/360)*w;
    const y = ((90 - loc.lat)/180)*h;
    // Ping animation
    const now = Date.now();
    const phase = (now % 2000) / 2000;
    const r = 4 + phase * 12;
    const alpha = 1 - phase;
    ctx.beginPath();ctx.arc(x,y,r,0,Math.PI*2);
    ctx.strokeStyle = `rgba(0,212,255,${alpha*0.5})`;ctx.lineWidth=1;ctx.stroke();
    // Dot
    ctx.beginPath();ctx.arc(x,y,3,0,Math.PI*2);
    ctx.fillStyle = '#00d4ff';ctx.fill();
    // Label
    ctx.fillStyle = '#00d4ff';
    ctx.font = '8px JetBrains Mono';
    ctx.fillText(loc.name, x+6, y+3);
  });

  // Crosshairs at center
  const cx = w/2, cy = h/2;
  ctx.strokeStyle = 'rgba(0,212,255,0.15)';ctx.lineWidth = 0.5;
  ctx.setLineDash([4,4]);
  ctx.beginPath();ctx.moveTo(cx,0);ctx.lineTo(cx,h);ctx.stroke();
  ctx.beginPath();ctx.moveTo(0,cy);ctx.lineTo(w,cy);ctx.stroke();
  ctx.setLineDash([]);
}

function drawSimpleMap(ctx, w, h) {
  // Simplified continent outlines as lat/lon point groups
  function toXY(lon,lat){return[((lon+180)/360)*w,((90-lat)/180)*h]}
  function drawPoly(points){
    ctx.beginPath();
    const [x0,y0]=toXY(points[0][0],points[0][1]);
    ctx.moveTo(x0,y0);
    for(let i=1;i<points.length;i++){const[x,y]=toXY(points[i][0],points[i][1]);ctx.lineTo(x,y)}
    ctx.closePath();ctx.fill();ctx.stroke();
  }
  // North America
  drawPoly([[-130,55],[-125,50],[-120,35],[-105,30],[-100,25],[-80,25],[-75,30],[-65,45],[-55,50],[-65,60],[-80,65],[-95,70],[-130,70]]);
  // South America
  drawPoly([[-80,10],[-70,10],[-60,5],[-50,0],[-35,-5],[-35,-15],[-40,-22],[-50,-30],[-55,-35],[-65,-50],[-70,-45],[-75,-35],[-80,-5]]);
  // Europe
  drawPoly([[-10,36],[0,38],[5,44],[10,45],[15,47],[20,45],[30,42],[40,42],[30,55],[25,58],[15,60],[10,55],[5,50],[0,48],[-5,44],[-10,40]]);
  // Africa
  drawPoly([[-15,15],[-5,5],[5,5],[10,0],[20,5],[35,10],[40,12],[45,10],[50,0],[50,-10],[42,-20],[35,-30],[25,-35],[20,-30],[15,-25],[10,-5],[5,5],[0,5],[-5,5],[-15,10]]);
  // Asia
  drawPoly([[30,42],[40,42],[50,40],[55,45],[60,40],[65,35],[70,25],[75,20],[80,10],[85,15],[90,22],[95,18],[100,15],[105,20],[110,22],[115,30],[120,35],[125,40],[130,45],[135,40],[140,38],[145,45],[140,55],[130,60],[120,55],[100,50],[90,45],[80,42],[70,42],[60,55],[55,60],[50,55],[40,48]]);
  // Australia
  drawPoly([[115,-15],[120,-15],[130,-12],[140,-15],[148,-20],[150,-25],[148,-35],[140,-38],[135,-35],[130,-32],[120,-30],[115,-25],[113,-22]]);
}

// ========== METRICS CHART ==========
function renderMetrics() {
  const canvas = document.getElementById('metrics-canvas');
  const wrap = canvas.parentElement;
  const dpr = window.devicePixelRatio || 1;
  const w = wrap.clientWidth;
  const h = wrap.clientHeight;
  if(w === 0 || h === 0) return;
  canvas.width = w * dpr;
  canvas.height = h * dpr;
  const ctx = canvas.getContext('2d');
  ctx.scale(dpr, dpr);

  const pad = {t:10,r:10,b:20,l:35};
  const cw = w-pad.l-pad.r;
  const ch = h-pad.t-pad.b;

  // Background
  ctx.fillStyle = '#050a0f';
  ctx.fillRect(0,0,w,h);

  // Grid
  ctx.strokeStyle = '#0d1a2a';
  ctx.lineWidth = 0.5;
  for(let i=0;i<=5;i++){
    const y = pad.t + (ch/5)*i;
    ctx.beginPath();ctx.moveTo(pad.l,y);ctx.lineTo(w-pad.r,y);ctx.stroke();
    ctx.fillStyle = '#334155';ctx.font = '8px JetBrains Mono';
    ctx.textAlign = 'right';
    ctx.fillText(Math.round(20-i*4).toString(), pad.l-4, y+3);
  }

  // Data series
  const series = [
    {data:metricsData.feed_updates,color:'#00d4ff',label:'FEED ITEMS'},
    {data:metricsData.topic_hits,color:'#ff6600',label:'TOPIC HITS'},
    {data:metricsData.events_per_min,color:'#10b981',label:'EVENTS/MIN'}
  ];

  const maxVal = 20;
  series.forEach(s => {
    ctx.beginPath();
    ctx.strokeStyle = s.color;
    ctx.lineWidth = 1.5;
    for(let i=0;i<s.data.length;i++){
      const x = pad.l + (cw/(s.data.length-1))*i;
      const y = pad.t + ch - (Math.min(s.data[i],maxVal)/maxVal)*ch;
      if(i===0) ctx.moveTo(x,y); else ctx.lineTo(x,y);
    }
    ctx.stroke();
    // Glow
    ctx.shadowColor = s.color;ctx.shadowBlur = 4;ctx.stroke();
    ctx.shadowBlur = 0;
  });

  // Time labels
  ctx.fillStyle = '#334155';ctx.font = '8px JetBrains Mono';ctx.textAlign = 'center';
  ctx.fillText('-60s', pad.l, h-4);
  ctx.fillText('-30s', pad.l+cw/2, h-4);
  ctx.fillText('NOW', w-pad.r, h-4);

  // Legend
  const legend = document.getElementById('metrics-legend');
  legend.innerHTML = series.map(s =>
    `<span class="metrics-legend-item"><span class="ml-dot" style="background:${s.color}"></span>${s.label}</span>`
  ).join('');
}

// ========== AUDIO ==========
function initAudio() {
  if(audioCtx) return;
  audioCtx = new (window.AudioContext || window.webkitAudioContext)();
}

function toggleAmbient() {
  initAudio();
  if(ambientOn) {
    if(ambientOsc) { ambientOsc.stop(); ambientOsc = null; }
    if(ambientGain) { ambientGain.disconnect(); ambientGain = null; }
    ambientOn = false;
    document.getElementById('btn-audio').classList.remove('active');
    addLog('info','AUDIO','Ambient audio disabled');
  } else {
    // Create ambient hum
    ambientGain = audioCtx.createGain();
    ambientGain.gain.value = 0.015;
    ambientGain.connect(audioCtx.destination);

    ambientOsc = audioCtx.createOscillator();
    ambientOsc.type = 'sine';
    ambientOsc.frequency.value = 60;
    ambientOsc.connect(ambientGain);
    ambientOsc.start();

    // Add a second harmonic
    const osc2 = audioCtx.createOscillator();
    osc2.type = 'sine';
    osc2.frequency.value = 120;
    const g2 = audioCtx.createGain();
    g2.gain.value = 0.008;
    osc2.connect(g2);
    g2.connect(audioCtx.destination);
    osc2.start();

    ambientOn = true;
    document.getElementById('btn-audio').classList.add('active');
    addLog('info','AUDIO','Ambient audio enabled');
  }
}

function toggleAlertSound() {
  alertSoundOn = !alertSoundOn;
  save('alert_sound', alertSoundOn);
  document.getElementById('btn-alert-sound').classList.toggle('active', alertSoundOn);
  addLog('info','AUDIO','Alert sounds '+(alertSoundOn?'enabled':'disabled'));
}

function playAlertSound() {
  initAudio();
  const o = audioCtx.createOscillator();
  const g = audioCtx.createGain();
  o.type = 'square';
  o.frequency.value = 880;
  g.gain.value = 0.05;
  o.connect(g);g.connect(audioCtx.destination);
  o.start();
  g.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + 0.3);
  o.stop(audioCtx.currentTime + 0.3);
}

function playBootSound() {
  try {
    initAudio();
    const now = audioCtx.currentTime;
    [440,554,659,880].forEach((f,i) => {
      const o = audioCtx.createOscillator();
      const g = audioCtx.createGain();
      o.type = 'sine';o.frequency.value = f;
      g.gain.value = 0;
      o.connect(g);g.connect(audioCtx.destination);
      o.start(now+i*0.12);
      g.gain.setValueAtTime(0.03, now+i*0.12);
      g.gain.exponentialRampToValueAtTime(0.001, now+i*0.12+0.3);
      o.stop(now+i*0.12+0.3);
    });
  } catch(e){}
}

// ========== PANEL EXPAND ==========
function toggleExpand(id) {
  const panel = document.getElementById(id);
  panel.classList.toggle('expanded');
  // Re-render canvases after transition
  setTimeout(() => { renderMap(); renderMetrics(); }, 350);
}

// ========== KEYBOARD SHORTCUTS ==========
document.addEventListener('keydown', e => {
  if(e.target.tagName === 'INPUT' || e.target.tagName === 'SELECT') return;
  const panelIds = ['panel-clock','panel-weather','panel-news','panel-system','panel-topics','panel-map','panel-log','panel-metrics'];
  if(e.key >= '1' && e.key <= '8') {
    e.preventDefault();
    const idx = parseInt(e.key) - 1;
    if(panelIds[idx]) toggleExpand(panelIds[idx]);
  }
  if(e.key === 'Escape') {
    document.querySelectorAll('.panel.expanded').forEach(p => p.classList.remove('expanded'));
    setTimeout(() => { renderMap(); renderMetrics(); }, 350);
  }
  if(e.key === 'a' || e.key === 'A') toggleAmbient();
  if(e.key === 's' || e.key === 'S') toggleAlertSound();
});

// ========== STATUS BAR ==========
function updateStatusBar() {
  const elapsed = Date.now() - startTime;
  const h = Math.floor(elapsed/3600000);
  const m = Math.floor((elapsed%3600000)/60000);
  const s = Math.floor((elapsed%60000)/1000);
  document.getElementById('sb-uptime').textContent = 'UPTIME: '+pad(h)+':'+pad(m)+':'+pad(s);
  document.getElementById('sb-events').textContent = 'EVENTS: '+eventCount;
  document.getElementById('sb-topics').textContent = 'TOPICS: '+topics.length;

  // Network
  const netEl = document.getElementById('sb-network');
  if(navigator.onLine) {
    netEl.innerHTML = '<span class="sb-dot green"></span> NET OK';
  } else {
    netEl.innerHTML = '<span class="sb-dot red"></span> OFFLINE';
  }

  // Battery
  if(navigator.getBattery) {
    navigator.getBattery().then(b => {
      const pct = Math.round(b.level*100);
      const dot = b.charging ? 'green' : (pct < 20 ? 'red' : pct < 50 ? 'orange' : 'green');
      document.getElementById('sb-battery').innerHTML = `<span class="sb-dot ${dot}"></span> BAT ${pct}%${b.charging?' CHG':''}`;
    });
  }

  // Memory
  if(performance.memory) {
    const mb = (performance.memory.usedJSHeapSize/1048576).toFixed(0);
    document.getElementById('sb-memory').textContent = 'MEM '+mb+'MB';
  }
}

function pad(n){return n.toString().padStart(2,'0')}

// ========== METRICS UPDATER ==========
let eventsLastMinute = 0;
setInterval(() => {
  metricsData.events_per_min.push(eventCount - eventsLastMinute);
  metricsData.events_per_min.shift();
  eventsLastMinute = eventCount;
}, 1000);

// ========== BOOT SEQUENCE ==========
function boot() {
  addLog('info','SYSTEM','Situation Monitor initializing...');
  addLog('info','SYSTEM','Platform: '+navigator.platform+' // '+navigator.language.toUpperCase());
  addLog('info','SYSTEM','Viewport: '+window.innerWidth+'x'+window.innerHeight);

  // Init
  renderClocks();
  initNewsTabs();
  fetchAllFeeds();
  fetchWeather();
  renderTopics();
  renderSystemStatus();
  updateStatusBar();
  document.getElementById('btn-alert-sound').classList.toggle('active', alertSoundOn);

  // Delayed renders for canvas sizing
  setTimeout(() => { renderMap(); renderMetrics(); }, 100);

  // Refresh topics on load
  topics.forEach(t => {
    setTimeout(() => searchTopicFeeds(t.text, t.priority), 1000 + Math.random()*2000);
  });

  addLog('success','SYSTEM','All subsystems nominal. Monitor active.');

  // Boot sound on first click
  let booted = false;
  document.addEventListener('click', () => {
    if(!booted) { playBootSound(); booted = true; }
  }, {once: true});

  // Intervals
  setInterval(renderClocks, 1000);
  setInterval(updateHeaderClock, 1000);
  setInterval(renderSystemStatus, 2000);
  setInterval(updateStatusBar, 1000);
  setInterval(renderMap, 1000);
  setInterval(renderMetrics, 1000);
  setInterval(fetchAllFeeds, 300000); // 5 min
  setInterval(fetchWeather, 600000); // 10 min

  // Periodic topic re-scan
  setInterval(() => {
    topics.forEach(t => searchTopicFeeds(t.text, t.priority));
  }, 300000);

  updateHeaderClock();
}

boot();
</script>
