<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Situation Monitor - Korb Engineering</title>
  <meta name="description" content="Korb Engineering Situation Monitor - Global News Dashboard powered by RSS feeds from AP, BBC, NPR, Reuters, Google News, and Al Jazeera.">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #000000;
      --surface: #020304;
      --surface-2: #060a0e;
      --surface-3: #0c1218;
      --border: #0e1a24;
      --border-hover: #153040;
      --cyan: #00d4ff;
      --cyan-bright: #40e8ff;
      --cyan-dim: #006880;
      --cyan-ghost: #002a35;
      --text: #c8d6e0;
      --text-dim: #5a7080;
      --text-muted: #3a4a55;
      --white: #e8f0f4;
      --red: #ff4060;
      --red-glow: rgba(255, 64, 96, 0.15);
      --orange: #ff8a40;
      --green: #40ff90;
      --yellow: #ffd040;
      --purple: #a080ff;
      --blue: #4090ff;
      --teal: #40d0c0;
      --font: 'JetBrains Mono', 'Courier New', monospace;
      --radius: 3px;
      --transition: 150ms cubic-bezier(0.16, 1, 0.3, 1);
    }

    html {
      -webkit-font-smoothing: antialiased;
      -moz-osx-font-smoothing: grayscale;
      text-rendering: optimizeLegibility;
      scroll-behavior: smooth;
    }

    body {
      font-family: var(--font);
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      line-height: 1.5;
    }

    a { color: var(--cyan); text-decoration: none; }
    a:hover { color: var(--cyan-bright); }

    /* --- Header --- */
    .header {
      border-bottom: 1px solid var(--border);
      padding: 1.25rem 1.5rem;
      position: sticky;
      top: 0;
      z-index: 100;
      background: rgba(0, 0, 0, 0.95);
      backdrop-filter: blur(16px);
      -webkit-backdrop-filter: blur(16px);
    }

    .header-inner {
      max-width: 1400px;
      margin: 0 auto;
      display: flex;
      align-items: flex-end;
      justify-content: space-between;
      flex-wrap: wrap;
      gap: 0.5rem;
    }

    .header-left {}

    .eyebrow {
      font-size: 0.6rem;
      font-weight: 600;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      color: var(--cyan-dim);
      margin-bottom: 0.2rem;
    }

    .title-row {
      display: flex;
      align-items: baseline;
      gap: 1rem;
      flex-wrap: wrap;
    }

    .title {
      font-size: clamp(1.1rem, 1rem + 1vw, 1.6rem);
      font-weight: 600;
      color: var(--white);
      letter-spacing: -0.01em;
    }

    .title .dot { color: var(--cyan); }

    .header-right {
      display: flex;
      align-items: center;
      gap: 0.75rem;
      flex-wrap: wrap;
    }

    .header-stats {
      font-size: 0.65rem;
      color: var(--text-muted);
      display: flex;
      align-items: center;
      gap: 0.5rem;
    }

    .story-count-display {
      color: var(--cyan-dim);
      font-weight: 500;
    }

    .refresh-info {
      display: flex;
      align-items: center;
      gap: 0.5rem;
    }

    .countdown {
      color: var(--cyan-dim);
      font-variant-numeric: tabular-nums;
      font-size: 0.65rem;
    }

    .auto-toggle {
      font-family: var(--font);
      font-size: 0.6rem;
      padding: 0.2rem 0.45rem;
      border: 1px solid var(--border);
      border-radius: var(--radius);
      background: transparent;
      color: var(--text-dim);
      cursor: pointer;
      transition: all var(--transition);
    }

    .auto-toggle.active {
      border-color: var(--green);
      color: var(--green);
      background: rgba(64, 255, 144, 0.06);
    }

    .refresh-btn {
      font-family: var(--font);
      font-size: 0.6rem;
      padding: 0.2rem 0.45rem;
      border: 1px solid var(--cyan-dim);
      border-radius: var(--radius);
      background: var(--cyan-ghost);
      color: var(--cyan);
      cursor: pointer;
      transition: all var(--transition);
    }

    .refresh-btn:hover {
      background: rgba(0, 212, 255, 0.12);
      border-color: var(--cyan);
    }

    .refresh-btn:disabled {
      opacity: 0.4;
      cursor: not-allowed;
    }

    /* --- News Ticker --- */
    .ticker-wrap {
      border-bottom: 1px solid var(--border);
      background: var(--surface);
      overflow: hidden;
      position: relative;
      height: 32px;
    }

    .ticker-label {
      position: absolute;
      left: 0;
      top: 0;
      height: 100%;
      display: flex;
      align-items: center;
      padding: 0 0.75rem;
      background: var(--red);
      color: #fff;
      font-size: 0.6rem;
      font-weight: 700;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      z-index: 2;
      white-space: nowrap;
    }

    .ticker-label::after {
      content: '';
      position: absolute;
      right: -12px;
      top: 0;
      border-left: 12px solid var(--red);
      border-top: 16px solid transparent;
      border-bottom: 16px solid transparent;
    }

    .ticker-track {
      display: flex;
      align-items: center;
      height: 100%;
      padding-left: 100px;
      animation: tickerScroll var(--ticker-duration, 60s) linear infinite;
      white-space: nowrap;
    }

    .ticker-track:hover {
      animation-play-state: paused;
    }

    .ticker-item {
      display: inline-flex;
      align-items: center;
      gap: 0.5rem;
      padding: 0 1.5rem;
      font-size: 0.68rem;
      color: var(--text);
      white-space: nowrap;
      flex-shrink: 0;
    }

    .ticker-item a {
      color: var(--text);
      transition: color var(--transition);
    }

    .ticker-item a:hover {
      color: var(--cyan-bright);
    }

    .ticker-source {
      font-size: 0.55rem;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.06em;
      padding: 0.1rem 0.3rem;
      border-radius: 2px;
      flex-shrink: 0;
    }

    .ticker-sep {
      color: var(--text-muted);
      padding: 0 0.25rem;
      flex-shrink: 0;
    }

    @keyframes tickerScroll {
      0% { transform: translateX(0); }
      100% { transform: translateX(-50%); }
    }

    /* --- Controls Bar --- */
    .controls {
      border-bottom: 1px solid var(--border);
      padding: 0.6rem 1.5rem;
      background: var(--surface);
    }

    .controls-inner {
      max-width: 1400px;
      margin: 0 auto;
      display: flex;
      align-items: center;
      gap: 0.5rem;
      flex-wrap: wrap;
    }

    .filter-btn {
      font-family: var(--font);
      font-size: 0.65rem;
      font-weight: 400;
      padding: 0.25rem 0.55rem;
      border: 1px solid var(--border);
      border-radius: var(--radius);
      background: transparent;
      color: var(--text-dim);
      cursor: pointer;
      transition: all var(--transition);
      letter-spacing: 0.03em;
      display: flex;
      align-items: center;
      gap: 0.35rem;
    }

    .filter-btn:hover {
      border-color: var(--border-hover);
      color: var(--text);
    }

    .filter-btn.active {
      border-color: var(--cyan-dim);
      color: var(--cyan);
      background: var(--cyan-ghost);
    }

    .filter-badge {
      font-size: 0.55rem;
      font-weight: 600;
      min-width: 16px;
      text-align: center;
      padding: 0 0.2rem;
      border-radius: 2px;
      line-height: 1.4;
    }

    .badge-ap { background: rgba(255, 64, 96, 0.2); color: var(--red); }
    .badge-bbc { background: rgba(255, 138, 64, 0.2); color: var(--orange); }
    .badge-npr { background: rgba(160, 128, 255, 0.2); color: var(--purple); }
    .badge-reuters { background: rgba(255, 208, 64, 0.2); color: var(--yellow); }
    .badge-google { background: rgba(64, 144, 255, 0.2); color: var(--blue); }
    .badge-aljazeera { background: rgba(64, 208, 192, 0.2); color: var(--teal); }
    .badge-all { background: rgba(0, 212, 255, 0.15); color: var(--cyan); }

    .search-box {
      font-family: var(--font);
      font-size: 0.65rem;
      padding: 0.25rem 0.55rem;
      border: 1px solid var(--border);
      border-radius: var(--radius);
      background: var(--surface-2);
      color: var(--text);
      outline: none;
      transition: border-color var(--transition);
      width: 160px;
    }

    .search-box:focus {
      border-color: var(--cyan-dim);
    }

    .search-box::placeholder {
      color: var(--text-muted);
    }

    .sort-select {
      font-family: var(--font);
      font-size: 0.65rem;
      padding: 0.25rem 0.4rem;
      border: 1px solid var(--border);
      border-radius: var(--radius);
      background: var(--surface-2);
      color: var(--text-dim);
      outline: none;
      cursor: pointer;
    }

    .controls-right {
      margin-left: auto;
      display: flex;
      align-items: center;
      gap: 0.5rem;
    }

    /* --- Feed Health --- */
    .feed-health {
      display: flex;
      align-items: center;
      gap: 0.4rem;
      flex-wrap: wrap;
    }

    .health-dot {
      display: inline-flex;
      align-items: center;
      gap: 0.2rem;
      font-size: 0.55rem;
      color: var(--text-muted);
    }

    .health-dot .dot {
      width: 5px;
      height: 5px;
      border-radius: 50%;
      display: inline-block;
    }

    .health-dot .dot.ok { background: var(--green); box-shadow: 0 0 4px rgba(64, 255, 144, 0.4); }
    .health-dot .dot.err { background: var(--red); box-shadow: 0 0 4px rgba(255, 64, 96, 0.4); }
    .health-dot .dot.pending { background: var(--text-muted); }

    /* --- Main Content --- */
    .main {
      max-width: 1400px;
      margin: 0 auto;
      padding: 1rem 1.5rem 3rem;
    }

    .info-bar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 0.75rem;
      flex-wrap: wrap;
      gap: 0.5rem;
    }

    .story-count {
      font-size: 0.65rem;
      color: var(--text-muted);
    }

    /* --- Story Grid --- */
    .story-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(340px, 1fr));
      gap: 0.75rem;
    }

    /* --- Story Card --- */
    .story-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 1rem 1.1rem;
      transition: border-color var(--transition), transform var(--transition);
      opacity: 0;
      transform: translateY(8px);
      animation: fadeSlideIn 0.5s ease-out forwards;
      display: flex;
      flex-direction: column;
      gap: 0.5rem;
    }

    .story-card:hover {
      border-color: var(--border-hover);
    }

    .story-card.breaking {
      border-color: rgba(255, 64, 96, 0.3);
      background: linear-gradient(135deg, var(--surface) 0%, rgba(255, 64, 96, 0.03) 100%);
      box-shadow: 0 0 20px rgba(255, 64, 96, 0.05);
    }

    .breaking-tag {
      font-size: 0.55rem;
      font-weight: 700;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: var(--red);
      animation: breakingPulse 2s ease-in-out infinite;
    }

    @keyframes breakingPulse {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.5; }
    }

    @keyframes fadeSlideIn {
      to { opacity: 1; transform: translateY(0); }
    }

    .card-meta {
      display: flex;
      align-items: center;
      gap: 0.5rem;
      flex-wrap: wrap;
    }

    .source-badge {
      font-size: 0.58rem;
      font-weight: 600;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      padding: 0.12rem 0.4rem;
      border-radius: 2px;
      line-height: 1;
    }

    .source-ap { background: rgba(255, 64, 96, 0.12); color: var(--red); border: 1px solid rgba(255, 64, 96, 0.2); }
    .source-bbc { background: rgba(255, 138, 64, 0.12); color: var(--orange); border: 1px solid rgba(255, 138, 64, 0.2); }
    .source-npr { background: rgba(160, 128, 255, 0.12); color: var(--purple); border: 1px solid rgba(160, 128, 255, 0.2); }
    .source-reuters { background: rgba(255, 208, 64, 0.12); color: var(--yellow); border: 1px solid rgba(255, 208, 64, 0.2); }
    .source-google { background: rgba(64, 144, 255, 0.12); color: var(--blue); border: 1px solid rgba(64, 144, 255, 0.2); }
    .source-aljazeera { background: rgba(64, 208, 192, 0.12); color: var(--teal); border: 1px solid rgba(64, 208, 192, 0.2); }

    .time-ago {
      font-size: 0.58rem;
      color: var(--text-muted);
      font-variant-numeric: tabular-nums;
    }

    .card-headline {
      font-size: 0.82rem;
      font-weight: 500;
      color: var(--white);
      line-height: 1.4;
      transition: color var(--transition);
    }

    .card-headline:hover { color: var(--cyan-bright); }

    .card-description {
      font-size: 0.72rem;
      color: var(--text-dim);
      line-height: 1.45;
      display: -webkit-box;
      -webkit-line-clamp: 3;
      -webkit-box-orient: vertical;
      overflow: hidden;
    }

    .card-category {
      display: inline-block;
      font-size: 0.55rem;
      color: var(--text-muted);
      border: 1px solid var(--border);
      border-radius: 2px;
      padding: 0.08rem 0.3rem;
      letter-spacing: 0.04em;
      align-self: flex-start;
    }

    /* --- Skeleton --- */
    .skeleton-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(340px, 1fr));
      gap: 0.75rem;
    }

    .skeleton-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 1rem 1.1rem;
      display: flex;
      flex-direction: column;
      gap: 0.6rem;
    }

    .skeleton-line {
      height: 0.65rem;
      background: linear-gradient(90deg, var(--surface-2) 25%, var(--surface-3) 50%, var(--surface-2) 75%);
      background-size: 200% 100%;
      border-radius: 2px;
      animation: shimmer 1.5s ease-in-out infinite;
    }

    .skeleton-line.w30 { width: 30%; }
    .skeleton-line.w60 { width: 60%; }
    .skeleton-line.w90 { width: 90%; }
    .skeleton-line.w80 { width: 80%; }
    .skeleton-line.w50 { width: 50%; }

    @keyframes shimmer {
      0% { background-position: 200% 0; }
      100% { background-position: -200% 0; }
    }

    /* --- States --- */
    .error-container {
      text-align: center;
      padding: 3rem 1rem;
    }

    .error-container p {
      font-size: 0.78rem;
      color: var(--text-dim);
      margin-bottom: 1rem;
    }

    /* --- Footer --- */
    .footer {
      text-align: center;
      padding: 2rem 1rem;
      font-size: 0.58rem;
      color: var(--text-muted);
      border-top: 1px solid var(--border);
      max-width: 1400px;
      margin: 0 auto;
    }

    /* --- Responsive --- */
    @media (max-width: 768px) {
      .header { padding: 0.85rem 1rem; }
      .header-inner { flex-direction: column; align-items: flex-start; }
      .controls { padding: 0.5rem 1rem; }
      .controls-inner { gap: 0.4rem; }
      .search-box { width: 120px; }
      .main { padding: 0.75rem 1rem 2rem; }
      .story-grid, .skeleton-grid { grid-template-columns: 1fr; }
      .controls-right { margin-left: 0; width: 100%; justify-content: flex-start; margin-top: 0.3rem; }
      .ticker-label { padding: 0 0.5rem; font-size: 0.5rem; }
      .ticker-track { padding-left: 75px; }
    }

    @media (max-width: 480px) {
      .header-right { width: 100%; justify-content: flex-start; }
      .filter-btn { font-size: 0.6rem; padding: 0.2rem 0.4rem; }
    }
  </style>
</head>
<body>

  <!-- Header -->
  <header class="header">
    <div class="header-inner">
      <div class="header-left">
        <div class="eyebrow">Korb Engineering</div>
        <div class="title-row">
          <h1 class="title">Situation Monitor</h1>
        </div>
      </div>
      <div class="header-right">
        <div class="header-stats">
          <span class="story-count-display" id="storyCountHeader">--</span>
          <span id="lastUpdated">--</span>
        </div>
        <div class="refresh-info">
          <span class="countdown" id="countdown"></span>
          <button class="auto-toggle active" id="autoToggle" title="Toggle auto-refresh">Auto 3m</button>
          <button class="refresh-btn" id="refreshBtn">Refresh</button>
        </div>
      </div>
    </div>
  </header>

  <!-- News Ticker -->
  <div class="ticker-wrap" id="tickerWrap">
    <div class="ticker-label">LATEST</div>
    <div class="ticker-track" id="tickerTrack"></div>
  </div>

  <!-- Controls -->
  <div class="controls">
    <div class="controls-inner">
      <button class="filter-btn active" data-source="all">All <span class="filter-badge badge-all" id="countAll">0</span></button>
      <button class="filter-btn" data-source="ap">AP <span class="filter-badge badge-ap" id="countAp">0</span></button>
      <button class="filter-btn" data-source="reuters">Reuters <span class="filter-badge badge-reuters" id="countReuters">0</span></button>
      <button class="filter-btn" data-source="bbc">BBC <span class="filter-badge badge-bbc" id="countBbc">0</span></button>
      <button class="filter-btn" data-source="npr">NPR <span class="filter-badge badge-npr" id="countNpr">0</span></button>
      <button class="filter-btn" data-source="google">Google <span class="filter-badge badge-google" id="countGoogle">0</span></button>
      <button class="filter-btn" data-source="aljazeera">Al Jazeera <span class="filter-badge badge-aljazeera" id="countAljazeera">0</span></button>

      <div class="controls-right">
        <input type="text" class="search-box" id="searchBox" placeholder="Search stories...">
        <select class="sort-select" id="sortSelect">
          <option value="newest">Newest first</option>
          <option value="source">By source</option>
        </select>
      </div>
    </div>
  </div>

  <!-- Feed Health -->
  <div class="controls" style="padding: 0.35rem 1.5rem; border-bottom: 1px solid var(--border);">
    <div class="controls-inner">
      <div class="feed-health" id="feedHealth"></div>
    </div>
  </div>

  <!-- Main -->
  <main class="main">
    <div id="content"></div>
  </main>

  <!-- Footer -->
  <div class="footer">
    Korb Engineering &middot; Situation Monitor &middot; RSS feeds via rss2json.com &middot; AP &middot; Reuters &middot; BBC &middot; NPR &middot; Google News &middot; Al Jazeera
  </div>

<script>
(function() {
  'use strict';

  // --- Configuration ---
  const RSS2JSON = 'https://api.rss2json.com/v1/api.json?rss_url=';
  const REFRESH_INTERVAL = 3 * 60 * 1000; // 3 minutes

  const FEEDS = [
    {
      name: 'AP',
      key: 'ap',
      urls: [
        'https://rsshub.app/apnews/topics/apf-topnews',
        'https://rsshub.app/apnews/topics/apf-usnews',
        'https://rsshub.app/apnews/topics/apf-WorldNews'
      ],
      color: 'ap'
    },
    {
      name: 'Reuters',
      key: 'reuters',
      urls: [
        'https://rsshub.app/reuters/world',
        'https://rsshub.app/reuters/business',
        'https://rsshub.app/reuters/markets'
      ],
      color: 'reuters'
    },
    {
      name: 'BBC',
      key: 'bbc',
      urls: [
        'http://feeds.bbci.co.uk/news/world/rss.xml',
        'http://feeds.bbci.co.uk/news/rss.xml'
      ],
      color: 'bbc'
    },
    {
      name: 'NPR',
      key: 'npr',
      urls: [
        'https://feeds.npr.org/1001/rss.xml'
      ],
      color: 'npr'
    },
    {
      name: 'Google News',
      key: 'google',
      urls: [
        'https://news.google.com/rss?hl=en-US&gl=US&ceid=US:en'
      ],
      color: 'google'
    },
    {
      name: 'Al Jazeera',
      key: 'aljazeera',
      urls: [
        'https://www.aljazeera.com/xml/rss/all.xml'
      ],
      color: 'aljazeera'
    }
  ];

  // --- State ---
  let allStories = [];
  let activeFilter = 'all';
  let searchQuery = '';
  let sortMode = 'newest';
  let autoRefresh = true;
  let refreshTimer = null;
  let countdownTimer = null;
  let nextRefreshAt = 0;
  let isLoading = false;
  let feedStatus = {};

  // --- DOM ---
  const contentEl = document.getElementById('content');
  const storyCountHeader = document.getElementById('storyCountHeader');
  const lastUpdatedEl = document.getElementById('lastUpdated');
  const countdownEl = document.getElementById('countdown');
  const refreshBtn = document.getElementById('refreshBtn');
  const autoToggle = document.getElementById('autoToggle');
  const filterBtns = document.querySelectorAll('.filter-btn');
  const searchBox = document.getElementById('searchBox');
  const sortSelect = document.getElementById('sortSelect');
  const feedHealthEl = document.getElementById('feedHealth');
  const tickerTrack = document.getElementById('tickerTrack');

  // --- Utilities ---
  function timeAgo(dateStr) {
    const now = Date.now();
    const then = new Date(dateStr).getTime();
    if (isNaN(then)) return '';
    const diff = now - then;
    const mins = Math.floor(diff / 60000);
    if (mins < 1) return 'just now';
    if (mins < 60) return mins + 'm ago';
    const hrs = Math.floor(mins / 60);
    if (hrs < 24) return hrs + 'h ago';
    const days = Math.floor(hrs / 24);
    if (days === 1) return '1d ago';
    return days + 'd ago';
  }

  function isBreaking(dateStr) {
    const then = new Date(dateStr).getTime();
    if (isNaN(then)) return false;
    return (Date.now() - then) < 60 * 60 * 1000; // < 1 hour
  }

  function escapeHtml(str) {
    if (!str) return '';
    const div = document.createElement('div');
    div.textContent = str;
    return div.innerHTML;
  }

  function stripHtml(str) {
    if (!str) return '';
    const div = document.createElement('div');
    div.innerHTML = str;
    return (div.textContent || div.innerText || '').trim();
  }

  function formatTime(date) {
    return date.toLocaleTimeString([], { hour: '2-digit', minute: '2-digit', second: '2-digit' });
  }

  function normalizeTitle(title) {
    return title.toLowerCase().replace(/[^a-z0-9]/g, '').substring(0, 60);
  }

  // --- Skeleton Loader ---
  function showSkeleton() {
    let html = '<div class="skeleton-grid">';
    for (let i = 0; i < 12; i++) {
      html += '<div class="skeleton-card" style="animation-delay: ' + (i * 0.08) + 's">' +
        '<div class="skeleton-line w30"></div>' +
        '<div class="skeleton-line w90"></div>' +
        '<div class="skeleton-line w60"></div>' +
        '<div class="skeleton-line w80"></div>' +
        '<div class="skeleton-line w50"></div>' +
        '</div>';
    }
    html += '</div>';
    contentEl.innerHTML = html;
  }

  // --- Ticker ---
  function updateTicker(stories) {
    const top = stories.slice(0, 25);
    if (top.length === 0) {
      tickerTrack.innerHTML = '';
      return;
    }

    // Duplicate for seamless loop
    let items = '';
    const buildItems = function(list) {
      let s = '';
      list.forEach(function(story) {
        s += '<span class="ticker-item">' +
          '<span class="ticker-source source-badge source-' + story.sourceColor + '">' + escapeHtml(story.source) + '</span>' +
          '<a href="' + escapeHtml(story.link) + '" target="_blank" rel="noopener">' + escapeHtml(story.title) + '</a>' +
          '</span>' +
          '<span class="ticker-sep">|</span>';
      });
      return s;
    };

    items = buildItems(top) + buildItems(top);
    tickerTrack.innerHTML = items;

    // Adjust speed based on content width
    const duration = Math.max(30, top.length * 4);
    tickerTrack.style.setProperty('--ticker-duration', duration + 's');
    tickerTrack.parentElement.style.setProperty('--ticker-duration', duration + 's');
    tickerTrack.style.animationDuration = duration + 's';
  }

  // --- Feed Health ---
  function renderFeedHealth() {
    let html = '';
    FEEDS.forEach(function(feed) {
      const status = feedStatus[feed.key];
      let dotClass = 'pending';
      if (status === true) dotClass = 'ok';
      else if (status === false) dotClass = 'err';
      html += '<span class="health-dot"><span class="dot ' + dotClass + '"></span> ' + feed.name + '</span>';
    });
    feedHealthEl.innerHTML = html;
  }

  // --- Fetch Feeds ---
  async function fetchSingleUrl(url) {
    const resp = await fetch(RSS2JSON + encodeURIComponent(url));
    if (!resp.ok) throw new Error('HTTP ' + resp.status);
    const data = await resp.json();
    if (data.status !== 'ok' || !data.items) throw new Error('Feed error');
    return data.items;
  }

  async function fetchFeed(feed) {
    // Try each URL in order, collect items from first success
    for (let i = 0; i < feed.urls.length; i++) {
      try {
        const items = await fetchSingleUrl(feed.urls[i]);
        feedStatus[feed.key] = true;
        renderFeedHealth();

        return items.map(function(item) {
          const desc = stripHtml(item.description || item.content || '');
          return {
            source: feed.name,
            sourceKey: feed.key,
            sourceColor: feed.color,
            title: stripHtml(item.title || ''),
            link: item.link || '#',
            pubDate: item.pubDate || '',
            description: desc.length > 280 ? desc.substring(0, 280) + '...' : desc,
            categories: item.categories || []
          };
        });
      } catch (e) {
        console.warn('Feed URL failed:', feed.name, feed.urls[i], e.message);
        // Try next URL
      }
    }

    // All URLs failed - try to get items from alternative URLs (collect from all that work)
    feedStatus[feed.key] = false;
    renderFeedHealth();
    return [];
  }

  async function fetchAllFeeds() {
    if (isLoading) return;
    isLoading = true;
    refreshBtn.disabled = true;
    refreshBtn.textContent = '...';

    if (allStories.length === 0) {
      showSkeleton();
    }

    feedStatus = {};
    FEEDS.forEach(function(f) { feedStatus[f.key] = null; });
    renderFeedHealth();

    const results = await Promise.allSettled(FEEDS.map(fetchFeed));
    const stories = [];

    results.forEach(function(r) {
      if (r.status === 'fulfilled' && r.value) {
        stories.push.apply(stories, r.value);
      }
    });

    // Deduplicate by normalized title
    const seen = new Set();
    allStories = stories.filter(function(s) {
      const key = normalizeTitle(s.title);
      if (!key || seen.has(key)) return false;
      seen.add(key);
      return true;
    });

    // Sort by date descending
    allStories.sort(function(a, b) {
      return new Date(b.pubDate).getTime() - new Date(a.pubDate).getTime();
    });

    isLoading = false;
    refreshBtn.disabled = false;
    refreshBtn.textContent = 'Refresh';
    lastUpdatedEl.textContent = 'Updated ' + formatTime(new Date());

    updateTicker(allStories);
    updateFilterCounts();
    renderStories();
    scheduleRefresh();
  }

  // --- Filter counts ---
  function updateFilterCounts() {
    const counts = { all: allStories.length };
    FEEDS.forEach(function(f) { counts[f.key] = 0; });
    allStories.forEach(function(s) {
      if (counts[s.sourceKey] !== undefined) counts[s.sourceKey]++;
    });

    document.getElementById('countAll').textContent = counts.all;
    document.getElementById('countAp').textContent = counts.ap || 0;
    document.getElementById('countReuters').textContent = counts.reuters || 0;
    document.getElementById('countBbc').textContent = counts.bbc || 0;
    document.getElementById('countNpr').textContent = counts.npr || 0;
    document.getElementById('countGoogle').textContent = counts.google || 0;
    document.getElementById('countAljazeera').textContent = counts.aljazeera || 0;
  }

  // --- Render ---
  function getFilteredStories() {
    let filtered = activeFilter === 'all'
      ? allStories
      : allStories.filter(function(s) { return s.sourceKey === activeFilter; });

    if (searchQuery) {
      const q = searchQuery.toLowerCase();
      filtered = filtered.filter(function(s) {
        return s.title.toLowerCase().includes(q) ||
               s.description.toLowerCase().includes(q) ||
               s.source.toLowerCase().includes(q);
      });
    }

    if (sortMode === 'source') {
      filtered = filtered.slice().sort(function(a, b) {
        const cmp = a.source.localeCompare(b.source);
        if (cmp !== 0) return cmp;
        return new Date(b.pubDate).getTime() - new Date(a.pubDate).getTime();
      });
    }

    return filtered;
  }

  function renderStories() {
    const filtered = getFilteredStories();

    storyCountHeader.textContent = filtered.length + ' stories';

    if (filtered.length === 0 && !isLoading) {
      const activeSources = Object.values(feedStatus).filter(function(v) { return v === true; }).length;
      let msg = 'No stories match your criteria.';
      if (activeSources === 0 && allStories.length === 0) {
        msg = 'All feeds failed to load. This may be due to CORS or rate limiting.';
      }
      contentEl.innerHTML = '<div class="error-container"><p>' + msg + '</p>' +
        '<button class="refresh-btn" onclick="window.__refresh()">Retry</button></div>';
      return;
    }

    let html = '<div class="story-grid">';
    filtered.forEach(function(story, i) {
      const ta = timeAgo(story.pubDate);
      const breaking = isBreaking(story.pubDate);
      const cat = story.categories && story.categories.length > 0 && story.categories[0]
        ? '<span class="card-category">' + escapeHtml(story.categories[0]) + '</span>'
        : '';

      html += '<div class="story-card' + (breaking ? ' breaking' : '') + '" style="animation-delay: ' + Math.min(i * 0.03, 0.6) + 's">';
      html += '<div class="card-meta">';
      html += '<span class="source-badge source-' + story.sourceColor + '">' + escapeHtml(story.source) + '</span>';
      if (breaking) html += '<span class="breaking-tag">BREAKING</span>';
      if (ta) html += '<span class="time-ago">' + ta + '</span>';
      html += '</div>';
      html += '<a class="card-headline" href="' + escapeHtml(story.link) + '" target="_blank" rel="noopener">' + escapeHtml(story.title) + '</a>';
      if (story.description) {
        html += '<div class="card-description">' + escapeHtml(story.description) + '</div>';
      }
      if (cat) html += cat;
      html += '</div>';
    });
    html += '</div>';

    contentEl.innerHTML = html;
  }

  // --- Auto Refresh ---
  function scheduleRefresh() {
    clearTimeout(refreshTimer);
    clearInterval(countdownTimer);

    if (!autoRefresh) {
      countdownEl.textContent = '';
      return;
    }

    nextRefreshAt = Date.now() + REFRESH_INTERVAL;

    countdownTimer = setInterval(function() {
      const remaining = Math.max(0, nextRefreshAt - Date.now());
      const mins = Math.floor(remaining / 60000);
      const secs = Math.floor((remaining % 60000) / 1000);
      countdownEl.textContent = mins + ':' + (secs < 10 ? '0' : '') + secs;
      if (remaining <= 0) clearInterval(countdownTimer);
    }, 1000);

    refreshTimer = setTimeout(function() {
      fetchAllFeeds();
    }, REFRESH_INTERVAL);
  }

  // --- Events ---
  filterBtns.forEach(function(btn) {
    btn.addEventListener('click', function() {
      filterBtns.forEach(function(b) { b.classList.remove('active'); });
      btn.classList.add('active');
      activeFilter = btn.dataset.source;
      renderStories();
    });
  });

  refreshBtn.addEventListener('click', function() {
    fetchAllFeeds();
  });

  autoToggle.addEventListener('click', function() {
    autoRefresh = !autoRefresh;
    autoToggle.classList.toggle('active', autoRefresh);
    autoToggle.textContent = autoRefresh ? 'Auto 3m' : 'Auto Off';
    if (autoRefresh) {
      scheduleRefresh();
    } else {
      clearTimeout(refreshTimer);
      clearInterval(countdownTimer);
      countdownEl.textContent = '';
    }
  });

  let searchDebounce;
  searchBox.addEventListener('input', function() {
    clearTimeout(searchDebounce);
    searchDebounce = setTimeout(function() {
      searchQuery = searchBox.value.trim();
      renderStories();
    }, 200);
  });

  sortSelect.addEventListener('change', function() {
    sortMode = sortSelect.value;
    renderStories();
  });

  // Expose for retry button
  window.__refresh = fetchAllFeeds;

  // --- Init ---
  renderFeedHealth();
  fetchAllFeeds();

})();
</script>

</body>
