<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
<title>Snake | Korb Engineering</title>
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #050a0f;
    --surface: #0a1018;
    --surface-2: #0e1520;
    --border: #1a2535;
    --cyan: #00d4ff;
    --orange: #ff6600;
    --green: #10b981;
    --red: #ef4444;
    --gold: #fbbf24;
    --text: #e2e8f0;
    --muted: #64748b;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
  html, body {
    background: var(--bg);
    color: var(--text);
    font-family: 'JetBrains Mono', monospace;
    min-height: 100vh;
    overflow-x: hidden;
    touch-action: manipulation;
  }
  body {
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 12px;
    gap: 12px;
  }
  header {
    width: 100%;
    max-width: 600px;
    text-align: center;
    padding: 8px 0;
    border-bottom: 1px solid var(--border);
  }
  h1 {
    font-size: 1.4rem;
    letter-spacing: 0.2em;
    color: var(--cyan);
    text-shadow: 0 0 12px rgba(0, 212, 255, 0.5);
    text-transform: uppercase;
  }
  .subtitle {
    font-size: 0.65rem;
    color: var(--muted);
    letter-spacing: 0.15em;
    margin-top: 4px;
  }
  .stats-bar {
    width: 100%;
    max-width: 600px;
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    gap: 6px;
    background: var(--surface);
    border: 1px solid var(--border);
    padding: 10px;
    border-radius: 4px;
  }
  .stat {
    text-align: center;
  }
  .stat-label {
    font-size: 0.55rem;
    color: var(--muted);
    text-transform: uppercase;
    letter-spacing: 0.1em;
    margin-bottom: 2px;
  }
  .stat-value {
    font-size: 1rem;
    font-weight: 700;
    color: var(--cyan);
  }
  .stat-value.gold { color: var(--gold); }
  .stat-value.green { color: var(--green); }
  .stat-value.orange { color: var(--orange); }

  .game-wrap {
    position: relative;
    width: 100%;
    max-width: 560px;
    aspect-ratio: 1;
    background: var(--surface);
    border: 2px solid var(--border);
    border-radius: 6px;
    overflow: hidden;
    box-shadow: 0 0 30px rgba(0, 212, 255, 0.15), inset 0 0 40px rgba(0, 0, 0, 0.4);
  }
  canvas {
    display: block;
    width: 100%;
    height: 100%;
    image-rendering: pixelated;
  }

  .overlay {
    position: absolute;
    inset: 0;
    background: rgba(5, 10, 15, 0.92);
    backdrop-filter: blur(6px);
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 20px;
    text-align: center;
    z-index: 10;
  }
  .overlay.hidden { display: none; }
  .overlay h2 {
    font-size: 1.3rem;
    color: var(--cyan);
    text-shadow: 0 0 16px rgba(0, 212, 255, 0.7);
    letter-spacing: 0.15em;
    margin-bottom: 14px;
    text-transform: uppercase;
  }
  .overlay h2.game-over {
    color: var(--red);
    text-shadow: 0 0 16px rgba(239, 68, 68, 0.7);
  }
  .overlay-stats {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 10px 20px;
    margin: 10px 0 16px;
    font-size: 0.75rem;
  }
  .overlay-stats div {
    color: var(--muted);
  }
  .overlay-stats span {
    color: var(--cyan);
    font-weight: 700;
  }

  .option-group {
    width: 100%;
    max-width: 340px;
    margin-bottom: 10px;
  }
  .option-label {
    font-size: 0.6rem;
    color: var(--muted);
    text-transform: uppercase;
    letter-spacing: 0.15em;
    margin-bottom: 4px;
    text-align: left;
  }
  .option-row {
    display: grid;
    gap: 4px;
  }
  .opt-modes { grid-template-columns: 1fr 1fr; }
  .opt-speeds { grid-template-columns: repeat(4, 1fr); }
  .opt-sizes { grid-template-columns: repeat(2, 1fr); }

  .opt-btn {
    background: var(--surface-2);
    border: 1px solid var(--border);
    color: var(--text);
    padding: 7px 6px;
    font-family: inherit;
    font-size: 0.65rem;
    letter-spacing: 0.08em;
    cursor: pointer;
    text-transform: uppercase;
    transition: all 0.15s;
    border-radius: 3px;
  }
  .opt-btn:hover { border-color: var(--cyan); }
  .opt-btn.active {
    background: rgba(0, 212, 255, 0.15);
    border-color: var(--cyan);
    color: var(--cyan);
    box-shadow: 0 0 10px rgba(0, 212, 255, 0.3);
  }

  .btn {
    background: var(--surface-2);
    border: 1px solid var(--cyan);
    color: var(--cyan);
    padding: 12px 24px;
    font-family: inherit;
    font-size: 0.8rem;
    letter-spacing: 0.15em;
    cursor: pointer;
    text-transform: uppercase;
    font-weight: 700;
    border-radius: 4px;
    margin-top: 8px;
    transition: all 0.2s;
    box-shadow: 0 0 14px rgba(0, 212, 255, 0.3);
  }
  .btn:hover {
    background: rgba(0, 212, 255, 0.15);
    box-shadow: 0 0 20px rgba(0, 212, 255, 0.5);
  }
  .btn.secondary {
    border-color: var(--muted);
    color: var(--muted);
    box-shadow: none;
  }

  .controls-bar {
    width: 100%;
    max-width: 600px;
    display: flex;
    justify-content: center;
    gap: 8px;
  }
  .ctrl-btn {
    background: var(--surface-2);
    border: 1px solid var(--border);
    color: var(--text);
    padding: 8px 16px;
    font-family: inherit;
    font-size: 0.7rem;
    cursor: pointer;
    text-transform: uppercase;
    letter-spacing: 0.1em;
    border-radius: 3px;
  }
  .ctrl-btn:hover { border-color: var(--cyan); color: var(--cyan); }

  .dpad {
    display: grid;
    grid-template-columns: repeat(3, 60px);
    grid-template-rows: repeat(3, 60px);
    gap: 6px;
    margin-top: 4px;
  }
  .dpad button {
    background: var(--surface-2);
    border: 1px solid var(--border);
    color: var(--cyan);
    font-family: inherit;
    font-size: 1.3rem;
    cursor: pointer;
    border-radius: 4px;
    user-select: none;
    transition: all 0.1s;
  }
  .dpad button:active {
    background: rgba(0, 212, 255, 0.2);
    border-color: var(--cyan);
    box-shadow: 0 0 10px rgba(0, 212, 255, 0.4);
  }
  .dpad .up { grid-column: 2; grid-row: 1; }
  .dpad .left { grid-column: 1; grid-row: 2; }
  .dpad .down { grid-column: 2; grid-row: 3; }
  .dpad .right { grid-column: 3; grid-row: 2; }
  .dpad .center {
    grid-column: 2; grid-row: 2;
    background: var(--surface);
    border: 1px dashed var(--border);
    cursor: default;
    color: var(--muted);
    font-size: 0.55rem;
  }

  .legend {
    width: 100%;
    max-width: 600px;
    background: var(--surface);
    border: 1px solid var(--border);
    padding: 10px;
    border-radius: 4px;
    font-size: 0.6rem;
    color: var(--muted);
    display: grid;
    grid-template-columns: repeat(2, 1fr);
    gap: 6px;
  }
  .legend strong { color: var(--text); text-transform: uppercase; letter-spacing: 0.1em; }
  .legend .chip { display: inline-block; width: 10px; height: 10px; border-radius: 2px; margin-right: 6px; vertical-align: middle; }
  .chip-cyan { background: var(--cyan); box-shadow: 0 0 6px var(--cyan); }
  .chip-orange { background: var(--orange); box-shadow: 0 0 6px var(--orange); }
  .chip-green { background: var(--green); box-shadow: 0 0 6px var(--green); }
  .chip-gold { background: var(--gold); box-shadow: 0 0 6px var(--gold); }

  @media (max-width: 480px) {
    h1 { font-size: 1.1rem; }
    .dpad { grid-template-columns: repeat(3, 52px); grid-template-rows: repeat(3, 52px); }
    .stat-value { font-size: 0.85rem; }
    .overlay h2 { font-size: 1.05rem; }
  }
</style>
</head>
<body>

<header>
  <h1>SNAKE</h1>
  <div class="subtitle">KORB ENGINEERING // VFD TERMINAL</div>
</header>

<div class="stats-bar">
  <div class="stat"><div class="stat-label">Score</div><div class="stat-value" id="scoreEl">0</div></div>
  <div class="stat"><div class="stat-label">High</div><div class="stat-value gold" id="highEl">0</div></div>
  <div class="stat"><div class="stat-label">Length</div><div class="stat-value green" id="lenEl">3</div></div>
  <div class="stat"><div class="stat-label">Games</div><div class="stat-value orange" id="gamesEl">0</div></div>
</div>

<div class="game-wrap">
  <canvas id="game"></canvas>

  <div class="overlay" id="startOverlay">
    <h2>READY PLAYER ONE</h2>
    <div class="option-group">
      <div class="option-label">Mode</div>
      <div class="option-row opt-modes">
        <button class="opt-btn active" data-mode="classic">Classic</button>
        <button class="opt-btn" data-mode="walls">Walls Off</button>
        <button class="opt-btn" data-mode="obstacles">Obstacles</button>
        <button class="opt-btn" data-mode="endless">Endless</button>
      </div>
    </div>
    <div class="option-group">
      <div class="option-label">Speed</div>
      <div class="option-row opt-speeds">
        <button class="opt-btn" data-speed="slow">Slow</button>
        <button class="opt-btn active" data-speed="normal">Normal</button>
        <button class="opt-btn" data-speed="fast">Fast</button>
        <button class="opt-btn" data-speed="insane">Insane</button>
      </div>
    </div>
    <div class="option-group">
      <div class="option-label">Grid Size</div>
      <div class="option-row opt-sizes">
        <button class="opt-btn active" data-size="20">20 x 20</button>
        <button class="opt-btn" data-size="25">25 x 25</button>
      </div>
    </div>
    <button class="btn" id="startBtn">START GAME</button>
  </div>

  <div class="overlay hidden" id="pauseOverlay">
    <h2>PAUSED</h2>
    <button class="btn" id="resumeBtn">RESUME</button>
    <button class="btn secondary" id="quitBtn">MAIN MENU</button>
  </div>

  <div class="overlay hidden" id="gameOverOverlay">
    <h2 class="game-over">GAME OVER</h2>
    <div class="overlay-stats">
      <div>Score: <span id="goScore">0</span></div>
      <div>Length: <span id="goLen">0</span></div>
      <div>High: <span id="goHigh">0</span></div>
      <div>Apples: <span id="goApples">0</span></div>
    </div>
    <button class="btn" id="retryBtn">RETRY</button>
    <button class="btn secondary" id="menuBtn">MAIN MENU</button>
  </div>
</div>

<div class="controls-bar">
  <button class="ctrl-btn" id="pauseBtn">Pause</button>
  <button class="ctrl-btn" id="muteBtn">Sound: On</button>
</div>

<div class="dpad" id="dpad">
  <button class="up" data-dir="up">&#9650;</button>
  <button class="left" data-dir="left">&#9664;</button>
  <button class="center">D-PAD</button>
  <button class="right" data-dir="right">&#9654;</button>
  <button class="down" data-dir="down">&#9660;</button>
</div>

<div class="legend">
  <div><span class="chip chip-cyan"></span><strong>Snake</strong></div>
  <div><span class="chip chip-orange"></span><strong>Food</strong> +1</div>
  <div><span class="chip chip-green"></span><strong>Power-Up</strong></div>
  <div><span class="chip chip-gold"></span><strong>Gold</strong> x2</div>
</div>

<script>
(() => {
  'use strict';

  const canvas = document.getElementById('game');
  const ctx = canvas.getContext('2d');

  // Display sizing
  function resizeCanvas() {
    const rect = canvas.getBoundingClientRect();
    const dpr = window.devicePixelRatio || 1;
    canvas.width = rect.width * dpr;
    canvas.height = rect.height * dpr;
    ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
  }
  window.addEventListener('resize', resizeCanvas);

  // Storage
  const LS_HIGH = 'korb_snake_high';
  const LS_GAMES = 'korb_snake_games';
  const LS_MUTE = 'korb_snake_mute';

  // State
  const state = {
    gridSize: 20,
    mode: 'classic',
    speedKey: 'normal',
    baseTick: 130,
    tickMs: 130,
    snake: [],
    dir: { x: 1, y: 0 },
    pendingDir: null,
    dirQueue: [],
    food: null,
    powerUp: null,
    obstacles: [],
    score: 0,
    apples: 0,
    particles: [],
    lastTick: 0,
    interp: 0,
    running: false,
    paused: false,
    gameOver: false,
    muted: localStorage.getItem(LS_MUTE) === '1',
    activeEffect: null, // {type, until}
    high: parseInt(localStorage.getItem(LS_HIGH) || '0', 10),
    games: parseInt(localStorage.getItem(LS_GAMES) || '0', 10),
  };

  const SPEEDS = { slow: 180, normal: 130, fast: 90, insane: 55 };

  // Audio
  let audioCtx = null;
  function ensureAudio() {
    if (!audioCtx) {
      try { audioCtx = new (window.AudioContext || window.webkitAudioContext)(); }
      catch (e) { audioCtx = null; }
    }
    if (audioCtx && audioCtx.state === 'suspended') audioCtx.resume();
  }
  function beep(freq, dur, type = 'square', vol = 0.08) {
    if (state.muted || !audioCtx) return;
    const o = audioCtx.createOscillator();
    const g = audioCtx.createGain();
    o.type = type;
    o.frequency.value = freq;
    g.gain.setValueAtTime(vol, audioCtx.currentTime);
    g.gain.exponentialRampToValueAtTime(0.0001, audioCtx.currentTime + dur);
    o.connect(g).connect(audioCtx.destination);
    o.start();
    o.stop(audioCtx.currentTime + dur);
  }
  function sfxEat() { beep(620, 0.08, 'square', 0.09); setTimeout(() => beep(880, 0.07, 'square', 0.07), 40); }
  function sfxPower() { beep(440, 0.08, 'triangle', 0.1); setTimeout(() => beep(660, 0.08, 'triangle', 0.1), 60); setTimeout(() => beep(880, 0.12, 'triangle', 0.1), 120); }
  function sfxOver() { beep(220, 0.15, 'sawtooth', 0.12); setTimeout(() => beep(140, 0.25, 'sawtooth', 0.12), 140); }

  // DOM refs
  const scoreEl = document.getElementById('scoreEl');
  const highEl = document.getElementById('highEl');
  const lenEl = document.getElementById('lenEl');
  const gamesEl = document.getElementById('gamesEl');
  const startOverlay = document.getElementById('startOverlay');
  const pauseOverlay = document.getElementById('pauseOverlay');
  const gameOverOverlay = document.getElementById('gameOverOverlay');
  const muteBtn = document.getElementById('muteBtn');
  const pauseBtn = document.getElementById('pauseBtn');

  highEl.textContent = state.high;
  gamesEl.textContent = state.games;
  muteBtn.textContent = 'Sound: ' + (state.muted ? 'Off' : 'On');

  // Option buttons
  document.querySelectorAll('[data-mode]').forEach(b => b.addEventListener('click', () => {
    document.querySelectorAll('[data-mode]').forEach(x => x.classList.remove('active'));
    b.classList.add('active');
    state.mode = b.dataset.mode;
  }));
  document.querySelectorAll('[data-speed]').forEach(b => b.addEventListener('click', () => {
    document.querySelectorAll('[data-speed]').forEach(x => x.classList.remove('active'));
    b.classList.add('active');
    state.speedKey = b.dataset.speed;
  }));
  document.querySelectorAll('[data-size]').forEach(b => b.addEventListener('click', () => {
    document.querySelectorAll('[data-size]').forEach(x => x.classList.remove('active'));
    b.classList.add('active');
    state.gridSize = parseInt(b.dataset.size, 10);
  }));

  // Helpers
  function rand(n) { return Math.floor(Math.random() * n); }
  function cellEq(a, b) { return a.x === b.x && a.y === b.y; }
  function occupied(pos) {
    if (state.snake.some(s => cellEq(s, pos))) return true;
    if (state.obstacles.some(o => cellEq(o, pos))) return true;
    if (state.food && cellEq(state.food, pos)) return true;
    if (state.powerUp && cellEq(state.powerUp, pos)) return true;
    return false;
  }
  function randomEmptyCell() {
    let tries = 0;
    while (tries < 500) {
      const p = { x: rand(state.gridSize), y: rand(state.gridSize) };
      if (!occupied(p)) return p;
      tries++;
    }
    return null;
  }

  function spawnFood() {
    state.food = randomEmptyCell();
    if (Math.random() < 0.1) {
      state.powerUp = randomEmptyCell();
      const types = ['speed', 'slow', 'shrink', 'gold'];
      state.powerUp.type = types[rand(types.length)];
    }
  }

  function spawnObstacles() {
    state.obstacles = [];
    if (state.mode !== 'obstacles') return;
    const count = Math.floor(state.gridSize * 0.8);
    for (let i = 0; i < count; i++) {
      const p = randomEmptyCell();
      if (p) state.obstacles.push(p);
    }
  }

  function resetGame() {
    state.snake = [
      { x: Math.floor(state.gridSize / 2) - 1, y: Math.floor(state.gridSize / 2) },
      { x: Math.floor(state.gridSize / 2) - 2, y: Math.floor(state.gridSize / 2) },
      { x: Math.floor(state.gridSize / 2) - 3, y: Math.floor(state.gridSize / 2) },
    ];
    state.dir = { x: 1, y: 0 };
    state.pendingDir = null;
    state.dirQueue = [];
    state.score = 0;
    state.apples = 0;
    state.particles = [];
    state.activeEffect = null;
    state.gameOver = false;
    state.paused = false;
    state.baseTick = SPEEDS[state.speedKey];
    state.tickMs = state.baseTick;
    state.food = null;
    state.powerUp = null;
    spawnObstacles();
    spawnFood();
  }

  function startGame() {
    ensureAudio();
    resetGame();
    state.running = true;
    startOverlay.classList.add('hidden');
    gameOverOverlay.classList.add('hidden');
    pauseOverlay.classList.add('hidden');
    state.lastTick = performance.now();
    updateHud();
  }

  function endGame() {
    state.running = false;
    state.gameOver = true;
    sfxOver();
    state.games++;
    localStorage.setItem(LS_GAMES, state.games);
    if (state.score > state.high) {
      state.high = state.score;
      localStorage.setItem(LS_HIGH, state.high);
    }
    document.getElementById('goScore').textContent = state.score;
    document.getElementById('goLen').textContent = state.snake.length;
    document.getElementById('goHigh').textContent = state.high;
    document.getElementById('goApples').textContent = state.apples;
    gameOverOverlay.classList.remove('hidden');
    updateHud();
  }

  function updateHud() {
    scoreEl.textContent = state.score;
    highEl.textContent = state.high;
    lenEl.textContent = state.snake.length;
    gamesEl.textContent = state.games;
  }

  // Direction handling
  function tryTurn(nx, ny) {
    const last = state.dirQueue.length ? state.dirQueue[state.dirQueue.length - 1] : state.dir;
    if (nx === -last.x && ny === -last.y) return;
    if (nx === last.x && ny === last.y) return;
    state.dirQueue.push({ x: nx, y: ny });
    if (state.dirQueue.length > 2) state.dirQueue.shift();
  }

  // Particles
  function burstParticles(cell, color) {
    for (let i = 0; i < 14; i++) {
      const a = Math.random() * Math.PI * 2;
      const s = 0.5 + Math.random() * 2;
      state.particles.push({
        x: cell.x + 0.5,
        y: cell.y + 0.5,
        vx: Math.cos(a) * s,
        vy: Math.sin(a) * s,
        life: 1,
        color,
      });
    }
  }

  // Tick/step
  function step() {
    if (state.dirQueue.length) state.dir = state.dirQueue.shift();

    const head = state.snake[0];
    let nx = head.x + state.dir.x;
    let ny = head.y + state.dir.y;

    // Wall collision / wrap
    if (nx < 0 || ny < 0 || nx >= state.gridSize || ny >= state.gridSize) {
      if (state.mode === 'walls') {
        nx = (nx + state.gridSize) % state.gridSize;
        ny = (ny + state.gridSize) % state.gridSize;
      } else {
        return endGame();
      }
    }

    // Self collision
    for (let i = 0; i < state.snake.length - 1; i++) {
      if (state.snake[i].x === nx && state.snake[i].y === ny) return endGame();
    }
    // Obstacle collision
    if (state.obstacles.some(o => o.x === nx && o.y === ny)) return endGame();

    const newHead = { x: nx, y: ny };
    state.snake.unshift(newHead);

    let ate = false;
    let goldEat = false;
    if (state.food && cellEq(newHead, state.food)) {
      ate = true;
      state.apples++;
      state.score += 1;
      burstParticles(state.food, '#ff6600');
      sfxEat();
      state.food = null;
      if (state.mode === 'endless' && state.apples % 5 === 0 && state.gridSize < 40) {
        state.gridSize += 1;
      }
      spawnFood();
    } else if (state.powerUp && cellEq(newHead, state.powerUp)) {
      const type = state.powerUp.type;
      burstParticles(state.powerUp, type === 'gold' ? '#fbbf24' : '#10b981');
      sfxPower();
      if (type === 'speed') {
        state.tickMs = Math.max(30, state.baseTick * 0.55);
        state.activeEffect = { type, until: performance.now() + 5000 };
      } else if (type === 'slow') {
        state.tickMs = state.baseTick * 1.6;
        state.activeEffect = { type, until: performance.now() + 5000 };
      } else if (type === 'shrink') {
        const remove = Math.min(3, state.snake.length - 3);
        for (let i = 0; i < remove; i++) state.snake.pop();
      } else if (type === 'gold') {
        state.score += 2;
        goldEat = true;
        ate = true;
      }
      state.powerUp = null;
    }

    if (!ate) {
      state.snake.pop();
    } else if (goldEat) {
      // gold counts as food eaten (already added head, don't pop)
    }

    updateHud();
  }

  function updateEffects(now) {
    if (state.activeEffect && now >= state.activeEffect.until) {
      state.activeEffect = null;
      state.tickMs = state.baseTick;
    }
  }

  // Drawing
  function draw(now) {
    const w = canvas.clientWidth;
    const h = canvas.clientHeight;
    const cell = w / state.gridSize;

    // Background
    ctx.fillStyle = '#0a1018';
    ctx.fillRect(0, 0, w, h);

    // Grid
    ctx.strokeStyle = 'rgba(26, 37, 53, 0.6)';
    ctx.lineWidth = 1;
    for (let i = 1; i < state.gridSize; i++) {
      ctx.beginPath();
      ctx.moveTo(i * cell, 0); ctx.lineTo(i * cell, h);
      ctx.stroke();
      ctx.beginPath();
      ctx.moveTo(0, i * cell); ctx.lineTo(w, i * cell);
      ctx.stroke();
    }

    // Obstacles
    ctx.fillStyle = '#1a2535';
    ctx.strokeStyle = '#64748b';
    state.obstacles.forEach(o => {
      ctx.fillRect(o.x * cell + 1, o.y * cell + 1, cell - 2, cell - 2);
      ctx.strokeRect(o.x * cell + 1, o.y * cell + 1, cell - 2, cell - 2);
    });

    // Food
    if (state.food) {
      const cx = state.food.x * cell + cell / 2;
      const cy = state.food.y * cell + cell / 2;
      const pulse = 0.85 + Math.sin(now / 200) * 0.15;
      ctx.shadowColor = '#ff6600';
      ctx.shadowBlur = 14;
      ctx.fillStyle = '#ff6600';
      ctx.beginPath();
      ctx.arc(cx, cy, (cell / 2 - 2) * pulse, 0, Math.PI * 2);
      ctx.fill();
      ctx.shadowBlur = 0;
    }

    // Power-up
    if (state.powerUp) {
      const cx = state.powerUp.x * cell + cell / 2;
      const cy = state.powerUp.y * cell + cell / 2;
      const color = state.powerUp.type === 'gold' ? '#fbbf24' : '#10b981';
      ctx.shadowColor = color;
      ctx.shadowBlur = 16;
      ctx.fillStyle = color;
      const rot = now / 300;
      ctx.save();
      ctx.translate(cx, cy);
      ctx.rotate(rot);
      const s = cell / 2 - 2;
      ctx.beginPath();
      ctx.moveTo(0, -s);
      ctx.lineTo(s, 0);
      ctx.lineTo(0, s);
      ctx.lineTo(-s, 0);
      ctx.closePath();
      ctx.fill();
      ctx.restore();
      ctx.shadowBlur = 0;
      // Label
      ctx.fillStyle = '#050a0f';
      ctx.font = `bold ${Math.floor(cell * 0.45)}px 'JetBrains Mono', monospace`;
      ctx.textAlign = 'center';
      ctx.textBaseline = 'middle';
      const label = state.powerUp.type === 'gold' ? '$' : state.powerUp.type === 'speed' ? '>' : state.powerUp.type === 'slow' ? '<' : '-';
      ctx.fillText(label, cx, cy + 1);
    }

    // Snake trail
    const snake = state.snake;
    for (let i = snake.length - 1; i >= 0; i--) {
      const s = snake[i];
      const isHead = i === 0;
      const t = 1 - i / Math.max(snake.length, 1);
      const alpha = 0.35 + t * 0.65;
      if (isHead) {
        ctx.shadowColor = '#00d4ff';
        ctx.shadowBlur = 18;
        ctx.fillStyle = '#00d4ff';
      } else {
        ctx.shadowBlur = 6;
        ctx.shadowColor = 'rgba(0, 212, 255, 0.6)';
        ctx.fillStyle = `rgba(0, 212, 255, ${alpha})`;
      }
      const pad = isHead ? 1 : 2;
      ctx.fillRect(s.x * cell + pad, s.y * cell + pad, cell - pad * 2, cell - pad * 2);

      if (isHead) {
        // Eyes
        ctx.shadowBlur = 0;
        ctx.fillStyle = '#050a0f';
        const ex = s.x * cell + cell / 2;
        const ey = s.y * cell + cell / 2;
        const off = cell * 0.18;
        const eyeR = Math.max(1.5, cell * 0.08);
        let e1x = ex, e1y = ey, e2x = ex, e2y = ey;
        if (state.dir.x === 1) { e1x = ex + off; e2x = ex + off; e1y = ey - off; e2y = ey + off; }
        else if (state.dir.x === -1) { e1x = ex - off; e2x = ex - off; e1y = ey - off; e2y = ey + off; }
        else if (state.dir.y === 1) { e1y = ey + off; e2y = ey + off; e1x = ex - off; e2x = ex + off; }
        else { e1y = ey - off; e2y = ey - off; e1x = ex - off; e2x = ex + off; }
        ctx.beginPath(); ctx.arc(e1x, e1y, eyeR, 0, Math.PI * 2); ctx.fill();
        ctx.beginPath(); ctx.arc(e2x, e2y, eyeR, 0, Math.PI * 2); ctx.fill();
      }
    }
    ctx.shadowBlur = 0;

    // Particles
    state.particles = state.particles.filter(p => {
      p.x += p.vx * 0.1;
      p.y += p.vy * 0.1;
      p.life -= 0.04;
      if (p.life <= 0) return false;
      ctx.fillStyle = p.color;
      ctx.globalAlpha = p.life;
      ctx.fillRect(p.x * cell - 2, p.y * cell - 2, 4, 4);
      ctx.globalAlpha = 1;
      return true;
    });

    // Effect indicator
    if (state.activeEffect) {
      const remain = Math.max(0, state.activeEffect.until - now) / 5000;
      ctx.fillStyle = 'rgba(16, 185, 129, 0.8)';
      ctx.fillRect(4, h - 8, (w - 8) * remain, 4);
    }
  }

  // Main loop
  function loop(now) {
    if (state.running && !state.paused) {
      if (!state.lastTick) state.lastTick = now;
      updateEffects(now);
      while (now - state.lastTick >= state.tickMs) {
        state.lastTick += state.tickMs;
        step();
        if (!state.running) break;
      }
    }
    draw(now);
    requestAnimationFrame(loop);
  }

  // Input
  window.addEventListener('keydown', (e) => {
    const k = e.key.toLowerCase();
    if (k === 'arrowup' || k === 'w') { tryTurn(0, -1); e.preventDefault(); }
    else if (k === 'arrowdown' || k === 's') { tryTurn(0, 1); e.preventDefault(); }
    else if (k === 'arrowleft' || k === 'a') { tryTurn(-1, 0); e.preventDefault(); }
    else if (k === 'arrowright' || k === 'd') { tryTurn(1, 0); e.preventDefault(); }
    else if (k === ' ' || k === 'p') { togglePause(); e.preventDefault(); }
    else if (k === 'enter' && !state.running) { startGame(); }
  });

  // Touch swipe
  let touchStart = null;
  canvas.addEventListener('touchstart', (e) => {
    const t = e.touches[0];
    touchStart = { x: t.clientX, y: t.clientY };
  }, { passive: true });
  canvas.addEventListener('touchend', (e) => {
    if (!touchStart) return;
    const t = e.changedTouches[0];
    const dx = t.clientX - touchStart.x;
    const dy = t.clientY - touchStart.y;
    if (Math.abs(dx) < 20 && Math.abs(dy) < 20) return;
    if (Math.abs(dx) > Math.abs(dy)) tryTurn(dx > 0 ? 1 : -1, 0);
    else tryTurn(0, dy > 0 ? 1 : -1);
    touchStart = null;
  });

  // D-pad
  document.querySelectorAll('#dpad [data-dir]').forEach(b => {
    b.addEventListener('click', () => {
      const d = b.dataset.dir;
      if (d === 'up') tryTurn(0, -1);
      else if (d === 'down') tryTurn(0, 1);
      else if (d === 'left') tryTurn(-1, 0);
      else if (d === 'right') tryTurn(1, 0);
    });
  });

  // Buttons
  document.getElementById('startBtn').addEventListener('click', startGame);
  document.getElementById('retryBtn').addEventListener('click', startGame);
  document.getElementById('menuBtn').addEventListener('click', () => {
    gameOverOverlay.classList.add('hidden');
    startOverlay.classList.remove('hidden');
  });
  document.getElementById('resumeBtn').addEventListener('click', togglePause);
  document.getElementById('quitBtn').addEventListener('click', () => {
    state.running = false;
    state.paused = false;
    pauseOverlay.classList.add('hidden');
    startOverlay.classList.remove('hidden');
  });

  function togglePause() {
    if (!state.running) return;
    state.paused = !state.paused;
    if (state.paused) {
      pauseOverlay.classList.remove('hidden');
    } else {
      pauseOverlay.classList.add('hidden');
      state.lastTick = performance.now();
    }
  }
  pauseBtn.addEventListener('click', togglePause);
  muteBtn.addEventListener('click', () => {
    state.muted = !state.muted;
    localStorage.setItem(LS_MUTE, state.muted ? '1' : '0');
    muteBtn.textContent = 'Sound: ' + (state.muted ? 'Off' : 'On');
    if (!state.muted) ensureAudio();
  });

  // Prevent scroll on arrow keys
  window.addEventListener('keydown', (e) => {
    if (['ArrowUp', 'ArrowDown', 'ArrowLeft', 'ArrowRight', ' '].includes(e.key)) e.preventDefault();
  }, { passive: false });

  // Init
  resizeCanvas();
  requestAnimationFrame(loop);
})();
</script>
</body>
</html>
