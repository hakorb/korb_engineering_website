<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="description" content="SOP Creator | Korb Engineering — a free, browser-based Standard Operating Procedure creation tool. Upload screenshots, annotate with arrows and markups, export as PDF. No signup, no downloads.">
<meta name="theme-color" content="#050a0f">
<title>SOP Creator | Korb Engineering</title>
<style>
  /* ============================================================
     SOP Creator — VFD Dark Theme
     Korb Engineering — Self-contained, mobile-first
     ============================================================ */
  :root {
    --bg: #050a0f;
    --bg-2: #0a1218;
    --bg-3: #0f1a24;
    --panel: #0c151d;
    --border: #1a2936;
    --border-2: #243445;
    --cyan: #00d4ff;
    --orange: #ff9900;
    --green: #10b981;
    --red: #ef4444;
    --gold: #fbbf24;
    --text: #e2e8f0;
    --text-dim: #94a3b8;
    --text-faint: #64748b;
    --mono: 'JetBrains Mono', ui-monospace, monospace;
    --safe-top: env(safe-area-inset-top, 0px);
    --safe-bottom: env(safe-area-inset-bottom, 0px);
    --safe-left: env(safe-area-inset-left, 0px);
    --safe-right: env(safe-area-inset-right, 0px);
  }

  @font-face {
    font-family: 'JetBrains Mono';
    font-style: normal;
    font-weight: 400;
    src: local('JetBrains Mono'), local('JetBrainsMono-Regular');
  }

  * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

  html, body {
    margin: 0; padding: 0;
    font-family: var(--mono);
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    font-size: 16px;
    line-height: 1.5;
  }

  /* ---- Layout ---- */
  .app-header {
    background: var(--bg-2);
    border-bottom: 1px solid var(--border);
    padding: 12px 16px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    flex-wrap: wrap;
    gap: 8px;
    position: sticky;
    top: 0;
    z-index: 100;
  }
  .app-header h1 {
    margin: 0; font-size: 18px; color: var(--cyan);
    display: flex; align-items: center; gap: 8px;
  }
  .app-header h1 .icon { font-size: 22px; }

  .header-actions {
    display: flex; gap: 6px; flex-wrap: wrap;
  }

  .container {
    max-width: 1100px;
    margin: 0 auto;
    padding: 16px;
    padding-bottom: calc(16px + var(--safe-bottom));
  }

  /* ---- Buttons ---- */
  .btn {
    font-family: var(--mono);
    font-size: 13px;
    padding: 8px 14px;
    border: 1px solid var(--border-2);
    border-radius: 6px;
    background: var(--bg-3);
    color: var(--text);
    cursor: pointer;
    transition: all 0.15s;
    white-space: nowrap;
  }
  .btn:hover { border-color: var(--cyan); color: var(--cyan); }
  .btn-cyan { background: var(--cyan); color: #000; border-color: var(--cyan); font-weight: 700; }
  .btn-cyan:hover { background: #33ddff; color: #000; }
  .btn-orange { background: var(--orange); color: #000; border-color: var(--orange); font-weight: 700; }
  .btn-orange:hover { background: #ffaa33; color: #000; }
  .btn-red { background: var(--red); color: #fff; border-color: var(--red); }
  .btn-red:hover { background: #f87171; }
  .btn-sm { padding: 5px 10px; font-size: 12px; }
  .btn-icon { padding: 6px 10px; font-size: 16px; }

  /* ---- Inputs ---- */
  input, textarea, select {
    font-family: var(--mono);
    font-size: 16px;
    background: var(--bg);
    color: var(--text);
    border: 1px solid var(--border-2);
    border-radius: 6px;
    padding: 10px 12px;
    width: 100%;
    outline: none;
    transition: border-color 0.15s;
  }
  input:focus, textarea:focus, select:focus { border-color: var(--cyan); }
  textarea { resize: vertical; min-height: 80px; }
  select { cursor: pointer; }

  label {
    display: block;
    font-size: 12px;
    color: var(--text-dim);
    margin-bottom: 4px;
    text-transform: uppercase;
    letter-spacing: 0.5px;
  }

  .field { margin-bottom: 14px; }

  /* ---- Panels ---- */
  .panel {
    background: var(--panel);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 16px;
    margin-bottom: 16px;
  }
  .panel-header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 12px;
    flex-wrap: wrap;
    gap: 8px;
  }
  .panel-title {
    font-size: 14px;
    font-weight: 700;
    color: var(--cyan);
    text-transform: uppercase;
    letter-spacing: 1px;
  }

  /* ---- Metadata Grid ---- */
  .meta-grid {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
    gap: 12px;
  }

  /* ---- Tabs ---- */
  .tabs {
    display: flex;
    gap: 4px;
    margin-bottom: 16px;
    border-bottom: 1px solid var(--border);
    padding-bottom: 8px;
    flex-wrap: wrap;
  }
  .tab {
    font-family: var(--mono);
    font-size: 13px;
    padding: 8px 16px;
    border: 1px solid transparent;
    border-radius: 6px 6px 0 0;
    background: none;
    color: var(--text-dim);
    cursor: pointer;
    transition: all 0.15s;
  }
  .tab:hover { color: var(--text); }
  .tab.active { color: var(--cyan); border-color: var(--border-2); background: var(--bg-3); }

  /* ---- Step Card ---- */
  .step-card {
    background: var(--bg-2);
    border: 1px solid var(--border);
    border-radius: 8px;
    margin-bottom: 12px;
    overflow: hidden;
    transition: border-color 0.15s;
  }
  .step-card.dragging { opacity: 0.5; border-color: var(--cyan); }
  .step-card.drag-over { border-color: var(--orange); border-style: dashed; }

  .step-header {
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 12px 16px;
    background: var(--bg-3);
    cursor: grab;
    user-select: none;
  }
  .step-header:active { cursor: grabbing; }
  .step-number {
    background: var(--cyan);
    color: #000;
    font-weight: 700;
    font-size: 14px;
    width: 32px; height: 32px;
    display: flex; align-items: center; justify-content: center;
    border-radius: 50%;
    flex-shrink: 0;
  }
  .step-title-display {
    flex: 1;
    font-size: 14px;
    font-weight: 600;
    color: var(--text);
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
  }
  .step-toggle-body {
    font-size: 18px;
    cursor: pointer;
    color: var(--text-dim);
    background: none; border: none;
    padding: 4px 8px;
    transition: transform 0.2s;
  }
  .step-toggle-body.collapsed { transform: rotate(-90deg); }

  .step-body { padding: 16px; }
  .step-body.hidden { display: none; }

  .step-actions {
    display: flex; gap: 6px; flex-wrap: wrap;
  }

  /* ---- Screenshot Area ---- */
  .screenshot-area {
    position: relative;
    background: var(--bg);
    border: 2px dashed var(--border-2);
    border-radius: 8px;
    min-height: 200px;
    display: flex;
    align-items: center;
    justify-content: center;
    overflow: hidden;
    cursor: crosshair;
  }
  .screenshot-area.empty { cursor: pointer; }
  .screenshot-placeholder {
    text-align: center;
    color: var(--text-faint);
    font-size: 14px;
    padding: 20px;
    pointer-events: none;
  }
  .screenshot-placeholder div { font-size: 32px; margin-bottom: 8px; }

  .screenshot-img {
    max-width: 100%;
    display: block;
    user-select: none;
    pointer-events: none;
  }
  .annotation-canvas {
    position: absolute;
    top: 0; left: 0;
    width: 100%; height: 100%;
    pointer-events: auto;
  }

  /* ---- Markup Toolbar ---- */
  .markup-toolbar {
    display: flex;
    gap: 4px;
    padding: 8px;
    background: var(--bg-3);
    border-radius: 6px;
    margin-top: 8px;
    flex-wrap: wrap;
    align-items: center;
  }
  .markup-btn {
    font-family: var(--mono);
    font-size: 13px;
    padding: 6px 12px;
    border: 1px solid var(--border-2);
    border-radius: 4px;
    background: var(--bg);
    color: var(--text-dim);
    cursor: pointer;
    transition: all 0.15s;
  }
  .markup-btn:hover { color: var(--text); border-color: var(--text-dim); }
  .markup-btn.active { color: var(--red); border-color: var(--red); background: rgba(239,68,68,0.1); }
  .markup-sep { width: 1px; height: 24px; background: var(--border-2); margin: 0 4px; }

  /* ---- Templates Modal ---- */
  .modal-overlay {
    position: fixed;
    top: 0; left: 0; right: 0; bottom: 0;
    background: rgba(0,0,0,0.7);
    z-index: 200;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 16px;
  }
  .modal-overlay.hidden { display: none; }
  .modal {
    background: var(--panel);
    border: 1px solid var(--border);
    border-radius: 12px;
    max-width: 600px;
    width: 100%;
    max-height: 80vh;
    overflow-y: auto;
    padding: 24px;
  }
  .modal h2 { margin: 0 0 16px; color: var(--cyan); font-size: 16px; }
  .template-card {
    background: var(--bg-2);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 14px;
    margin-bottom: 10px;
    cursor: pointer;
    transition: border-color 0.15s;
  }
  .template-card:hover { border-color: var(--cyan); }
  .template-card h3 { margin: 0 0 4px; font-size: 14px; color: var(--orange); }
  .template-card p { margin: 0; font-size: 12px; color: var(--text-dim); }

  /* ---- Saved SOPs List ---- */
  .saved-item {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 10px 14px;
    background: var(--bg-2);
    border: 1px solid var(--border);
    border-radius: 6px;
    margin-bottom: 8px;
    gap: 8px;
  }
  .saved-item-info { flex: 1; min-width: 0; }
  .saved-item-title { font-size: 13px; color: var(--text); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .saved-item-date { font-size: 11px; color: var(--text-faint); }
  .saved-item-actions { display: flex; gap: 4px; flex-shrink: 0; }

  /* ---- Preview Mode ---- */
  .preview-container {
    background: #fff;
    color: #111;
    border-radius: 8px;
    padding: 40px 32px;
    max-width: 900px;
    margin: 0 auto;
    font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
    line-height: 1.6;
  }
  .preview-container h1 { font-size: 24px; margin: 0 0 4px; color: #111; border-bottom: 3px solid #111; padding-bottom: 8px; }
  .preview-meta { display: grid; grid-template-columns: repeat(auto-fit, minmax(180px,1fr)); gap: 4px 24px; font-size: 12px; color: #555; margin: 12px 0 24px; border-bottom: 1px solid #ccc; padding-bottom: 12px; }
  .preview-meta span b { color: #111; }
  .preview-step { margin-bottom: 28px; page-break-inside: avoid; }
  .preview-step-header { display: flex; align-items: center; gap: 10px; margin-bottom: 8px; }
  .preview-step-num { background: #111; color: #fff; font-weight: 700; width: 28px; height: 28px; display: flex; align-items: center; justify-content: center; border-radius: 50%; font-size: 14px; flex-shrink: 0; }
  .preview-step-title { font-size: 16px; font-weight: 700; }
  .preview-step-desc { font-size: 14px; color: #333; margin-bottom: 10px; white-space: pre-wrap; }
  .preview-step-img { max-width: 100%; border: 1px solid #ddd; border-radius: 4px; }
  .preview-revision { margin-top: 24px; border-top: 1px solid #ccc; padding-top: 12px; }
  .preview-revision h3 { font-size: 14px; margin: 0 0 8px; }
  .preview-revision table { width: 100%; border-collapse: collapse; font-size: 12px; }
  .preview-revision th, .preview-revision td { border: 1px solid #ccc; padding: 6px 10px; text-align: left; }
  .preview-revision th { background: #f0f0f0; }

  /* ---- Notification ---- */
  .toast {
    position: fixed;
    bottom: 24px;
    right: 24px;
    background: var(--bg-3);
    border: 1px solid var(--cyan);
    color: var(--cyan);
    padding: 12px 20px;
    border-radius: 8px;
    font-size: 13px;
    font-family: var(--mono);
    z-index: 300;
    transform: translateY(80px);
    opacity: 0;
    transition: all 0.3s;
  }
  .toast.show { transform: translateY(0); opacity: 1; }

  /* ---- Print Styles ---- */
  @media print {
    body { background: #fff !important; }
    .app-header, .tabs, .step-card, #editor-view, .header-actions,
    .panel:not(.preview-container), .toast, .modal-overlay { display: none !important; }
    .preview-container {
      padding: 0 !important;
      max-width: 100% !important;
      border-radius: 0 !important;
    }
    .preview-step { page-break-inside: avoid; }
    .preview-step-img { max-width: 100%; }
    @page { margin: 1.5cm; }
  }

  /* ---- Responsive ---- */
  @media (max-width: 600px) {
    .app-header h1 { font-size: 15px; }
    .container { padding: 10px; }
    .meta-grid { grid-template-columns: 1fr; }
    .panel { padding: 12px; }
    .step-body { padding: 12px; }
    .preview-container { padding: 20px 16px; }
  }
</style>
</head>
<body>

<!-- ===== HEADER ===== -->
<div class="app-header">
  <h1><span class="icon">&#128203;</span> SOP Creator</h1>
  <div class="header-actions">
    <button class="btn btn-sm" onclick="showTemplates()">Templates</button>
    <button class="btn btn-sm" onclick="showSaved()">Saved</button>
    <button class="btn btn-sm" onclick="saveSOP()">Save</button>
    <button class="btn btn-sm btn-orange" onclick="exportPDF()">Export PDF</button>
  </div>
</div>

<!-- ===== TABS ===== -->
<div class="container">
  <div class="tabs">
    <button class="tab active" data-tab="editor" onclick="switchTab('editor')">Editor</button>
    <button class="tab" data-tab="preview" onclick="switchTab('preview')">Preview</button>
  </div>

  <!-- ===== EDITOR VIEW ===== -->
  <div id="editor-view">
    <!-- Metadata Panel -->
    <div class="panel">
      <div class="panel-header">
        <span class="panel-title">SOP Metadata</span>
        <button class="btn btn-sm" onclick="toggleMeta()" id="meta-toggle">Hide</button>
      </div>
      <div id="meta-body">
        <div class="meta-grid">
          <div class="field">
            <label>SOP Title</label>
            <input type="text" id="sop-title" placeholder="e.g. Server Deployment Procedure" oninput="markDirty()">
          </div>
          <div class="field">
            <label>Document Number</label>
            <input type="text" id="sop-docnum" placeholder="e.g. SOP-IT-001" oninput="markDirty()">
          </div>
          <div class="field">
            <label>Version</label>
            <input type="text" id="sop-version" value="1.0" oninput="markDirty()">
          </div>
          <div class="field">
            <label>Author</label>
            <input type="text" id="sop-author" placeholder="Your name" oninput="markDirty()">
          </div>
          <div class="field">
            <label>Department</label>
            <input type="text" id="sop-dept" placeholder="e.g. Information Technology" oninput="markDirty()">
          </div>
          <div class="field">
            <label>Effective Date</label>
            <input type="date" id="sop-date" oninput="markDirty()">
          </div>
        </div>
        <div class="field" style="margin-top:8px;">
          <label>Purpose / Scope</label>
          <textarea id="sop-purpose" rows="2" placeholder="Brief description of this SOP's purpose and scope" oninput="markDirty()"></textarea>
        </div>
      </div>
    </div>

    <!-- Steps -->
    <div class="panel">
      <div class="panel-header">
        <span class="panel-title">Procedure Steps</span>
        <button class="btn btn-sm btn-cyan" onclick="addStep()">+ Add Step</button>
      </div>
      <div id="steps-container"></div>
    </div>

    <!-- Revision History -->
    <div class="panel">
      <div class="panel-header">
        <span class="panel-title">Revision History</span>
        <button class="btn btn-sm" onclick="addRevision()">+ Add Entry</button>
      </div>
      <div id="revisions-container"></div>
    </div>
  </div>

  <!-- ===== PREVIEW VIEW ===== -->
  <div id="preview-view" style="display:none;"></div>
</div>

<!-- ===== TEMPLATES MODAL ===== -->
<div class="modal-overlay hidden" id="templates-modal">
  <div class="modal">
    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:16px;">
      <h2 style="margin:0;">SOP Templates</h2>
      <button class="btn btn-sm" onclick="closeModal('templates-modal')">Close</button>
    </div>
    <div id="templates-list"></div>
  </div>
</div>

<!-- ===== SAVED MODAL ===== -->
<div class="modal-overlay hidden" id="saved-modal">
  <div class="modal">
    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:16px;">
      <h2 style="margin:0;">Saved SOPs</h2>
      <button class="btn btn-sm" onclick="closeModal('saved-modal')">Close</button>
    </div>
    <div id="saved-list"></div>
  </div>
</div>

<!-- ===== TOAST ===== -->
<div class="toast" id="toast"></div>

<script>
/* ============================================================
   SOP Creator — Core Logic
   ============================================================ */

const LS_PREFIX = 'korb_sop_';
let steps = [];
let revisions = [];
let dirty = false;
let activeAnnotation = null; // { stepIdx, tool }
let drawState = null;

// ---- Init ----
function init() {
  document.getElementById('sop-date').value = new Date().toISOString().slice(0, 10);
  addStep();

  // Clipboard paste handler
  document.addEventListener('paste', handlePaste);
}

function markDirty() { dirty = true; }

// ---- Toast ----
function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2500);
}

// ---- Tabs ----
function switchTab(tab) {
  document.querySelectorAll('.tab').forEach(t => t.classList.toggle('active', t.dataset.tab === tab));
  document.getElementById('editor-view').style.display = tab === 'editor' ? '' : 'none';
  document.getElementById('preview-view').style.display = tab === 'preview' ? '' : 'none';
  if (tab === 'preview') renderPreview();
}

// ---- Toggle Meta ----
function toggleMeta() {
  const body = document.getElementById('meta-body');
  const btn = document.getElementById('meta-toggle');
  if (body.style.display === 'none') {
    body.style.display = '';
    btn.textContent = 'Hide';
  } else {
    body.style.display = 'none';
    btn.textContent = 'Show';
  }
}

// ---- Steps Management ----
function addStep(data) {
  const step = {
    title: data?.title || '',
    description: data?.description || '',
    imageData: data?.imageData || null,
    annotations: data?.annotations || [],
    collapsed: false,
    undoStack: [],
    redoStack: []
  };
  steps.push(step);
  renderSteps();
  markDirty();
}

function removeStep(idx) {
  if (steps.length <= 1 && !confirm('Remove the only step?')) return;
  steps.splice(idx, 1);
  renderSteps();
  markDirty();
}

function duplicateStep(idx) {
  const src = steps[idx];
  const copy = JSON.parse(JSON.stringify(src));
  copy.title = src.title + ' (copy)';
  copy.undoStack = [];
  copy.redoStack = [];
  steps.splice(idx + 1, 0, copy);
  renderSteps();
  markDirty();
}

function moveStep(from, to) {
  if (to < 0 || to >= steps.length) return;
  const [item] = steps.splice(from, 1);
  steps.splice(to, 0, item);
  renderSteps();
  markDirty();
}

function toggleStep(idx) {
  steps[idx].collapsed = !steps[idx].collapsed;
  renderSteps();
}

function renderSteps() {
  const c = document.getElementById('steps-container');
  c.innerHTML = '';
  steps.forEach((step, i) => {
    const card = document.createElement('div');
    card.className = 'step-card';
    card.draggable = true;
    card.dataset.idx = i;

    // Drag events
    card.addEventListener('dragstart', e => {
      e.dataTransfer.setData('text/plain', i);
      card.classList.add('dragging');
    });
    card.addEventListener('dragend', () => card.classList.remove('dragging'));
    card.addEventListener('dragover', e => { e.preventDefault(); card.classList.add('drag-over'); });
    card.addEventListener('dragleave', () => card.classList.remove('drag-over'));
    card.addEventListener('drop', e => {
      e.preventDefault();
      card.classList.remove('drag-over');
      const from = parseInt(e.dataTransfer.getData('text/plain'));
      moveStep(from, i);
    });

    card.innerHTML = `
      <div class="step-header" title="Drag to reorder">
        <span class="step-number">${i + 1}</span>
        <span class="step-title-display">${escHtml(step.title) || 'Untitled Step'}</span>
        <div class="step-actions">
          <button class="btn btn-sm btn-icon" onclick="moveStep(${i},${i-1})" title="Move up">&#9650;</button>
          <button class="btn btn-sm btn-icon" onclick="moveStep(${i},${i+1})" title="Move down">&#9660;</button>
          <button class="btn btn-sm" onclick="duplicateStep(${i})" title="Duplicate">Dup</button>
          <button class="btn btn-sm btn-red" onclick="removeStep(${i})" title="Delete">&#10005;</button>
        </div>
        <button class="step-toggle-body ${step.collapsed ? 'collapsed' : ''}" onclick="toggleStep(${i})">&#9660;</button>
      </div>
      <div class="step-body ${step.collapsed ? 'hidden' : ''}" id="step-body-${i}">
        <div class="field">
          <label>Step Title</label>
          <input type="text" value="${escAttr(step.title)}" onchange="steps[${i}].title=this.value;updateStepTitle(${i},this.value);markDirty();" placeholder="e.g. Open the admin console">
        </div>
        <div class="field">
          <label>Instructions</label>
          <textarea rows="3" onchange="steps[${i}].description=this.value;markDirty();" placeholder="Detailed instructions for this step...">${escHtml(step.description)}</textarea>
        </div>
        <div class="field">
          <label>Screenshot</label>
          <div class="screenshot-area ${step.imageData ? '' : 'empty'}" id="ss-area-${i}"
               onclick="if(!steps[${i}].imageData) document.getElementById('file-${i}').click();">
            ${step.imageData
              ? `<img class="screenshot-img" id="ss-img-${i}" src="${step.imageData}" alt="Step ${i+1} screenshot">
                 <canvas class="annotation-canvas" id="ss-canvas-${i}"></canvas>`
              : `<div class="screenshot-placeholder">
                   <div>&#128247;</div>
                   Click to upload or paste from clipboard
                 </div>`}
          </div>
          <input type="file" id="file-${i}" accept="image/*" style="display:none" onchange="handleFileUpload(${i},event)">
          ${step.imageData ? buildMarkupToolbar(i) : `
          <div style="margin-top:8px;">
            <button class="btn btn-sm" onclick="document.getElementById('file-${i}').click()">Upload Image</button>
          </div>`}
        </div>
      </div>
    `;
    c.appendChild(card);

    // If has image, set up canvas after DOM insertion
    if (step.imageData && !step.collapsed) {
      requestAnimationFrame(() => setupCanvas(i));
    }
  });
}

function updateStepTitle(idx, val) {
  const card = document.querySelectorAll('.step-card')[idx];
  if (card) card.querySelector('.step-title-display').textContent = val || 'Untitled Step';
}

function buildMarkupToolbar(i) {
  return `
    <div class="markup-toolbar" id="toolbar-${i}">
      <button class="markup-btn" data-tool="arrow" onclick="setTool(${i},'arrow',this)" title="Arrow">&#8599; Arrow</button>
      <button class="markup-btn" data-tool="oval" onclick="setTool(${i},'oval',this)" title="Oval">&#9711; Oval</button>
      <button class="markup-btn" data-tool="rect" onclick="setTool(${i},'rect',this)" title="Rectangle">&#9633; Rect</button>
      <button class="markup-btn" data-tool="text" onclick="setTool(${i},'text',this)" title="Text Label">T Text</button>

      <button class="markup-btn" onclick="clearAnnotations(${i})" title="Clear All">&#10060; Clear</button>

// ---- File Upload ----
function handleFileUpload(idx, e) {
  const file = e.target.files[0];
  if (!file) return;
  const reader = new FileReader();
  reader.onload = () => {
    steps[idx].imageData = reader.result;
    steps[idx].annotations = [];
    steps[idx].undoStack = [];
    steps[idx].redoStack = [];
    renderSteps();
    markDirty();
  };
  reader.readAsDataURL(file);
}

function removeImage(idx) {
  steps[idx].imageData = null;
  steps[idx].annotations = [];
  steps[idx].undoStack = [];
  steps[idx].redoStack = [];
  renderSteps();
  markDirty();
}

// ---- Clipboard Paste ----
function handlePaste(e) {
  const items = e.clipboardData?.items;
  if (!items) return;
  for (const item of items) {
    if (item.type.startsWith('image/')) {
      e.preventDefault();
      const blob = item.getAsFile();
      const reader = new FileReader();
      reader.onload = () => {
        // Find first step without an image, or last step
        let targetIdx = steps.findIndex(s => !s.imageData);
        if (targetIdx === -1) targetIdx = steps.length - 1;
        steps[targetIdx].imageData = reader.result;
        steps[targetIdx].annotations = [];
        steps[targetIdx].undoStack = [];
        steps[targetIdx].redoStack = [];
        renderSteps();
        showToast(`Image pasted into Step ${targetIdx + 1}`);
        markDirty();
      };
      reader.readAsDataURL(blob);
      break;
    }
  }
}

// ---- Canvas / Annotation System ----
function setupCanvas(idx) {
  const img = document.getElementById(`ss-img-${idx}`);
  const canvas = document.getElementById(`ss-canvas-${idx}`);
  if (!img || !canvas) return;

  const area = document.getElementById(`ss-area-${idx}`);

  function sizeCanvas() {
    canvas.width = img.offsetWidth;
    canvas.height = img.offsetHeight;
    area.style.minHeight = img.offsetHeight + 'px';
    redrawAnnotations(idx);
  }

  if (img.complete) {
    sizeCanvas();
  } else {
    img.onload = sizeCanvas;
  }

  // Mouse/touch events
  canvas.onmousedown = e => canvasDown(idx, e);
  canvas.onmousemove = e => canvasMove(idx, e);
  canvas.onmouseup = e => canvasUp(idx, e);
  canvas.ontouchstart = e => { e.preventDefault(); canvasDown(idx, touchToMouse(e)); };
  canvas.ontouchmove = e => { e.preventDefault(); canvasMove(idx, touchToMouse(e)); };
  canvas.ontouchend = e => { e.preventDefault(); canvasUp(idx, touchToMouse(e)); };
}

function touchToMouse(e) {
  const t = e.touches[0] || e.changedTouches[0];
  return { offsetX: t.clientX - e.target.getBoundingClientRect().left, offsetY: t.clientY - e.target.getBoundingClientRect().top };
}

function getCanvasPos(idx, e) {
  return { x: e.offsetX, y: e.offsetY };
}

function setTool(idx, tool, btn) {
  const toolbar = document.getElementById(`toolbar-${idx}`);
  toolbar.querySelectorAll('.markup-btn[data-tool]').forEach(b => b.classList.remove('active'));

  if (activeAnnotation && activeAnnotation.stepIdx === idx && activeAnnotation.tool === tool) {
    activeAnnotation = null;
    return;
  }
  btn.classList.add('active');
  activeAnnotation = { stepIdx: idx, tool };
  drawState = null;
}

function canvasDown(idx, e) {
  if (!activeAnnotation || activeAnnotation.stepIdx !== idx) return;
  const pos = getCanvasPos(idx, e);
  const tool = activeAnnotation.tool;

  if (tool === 'text') {
    const text = prompt('Enter label text:');
    if (text) {
      pushAnnotation(idx, { type: 'text', x: pos.x, y: pos.y, text });
    }
    return;
  }

  drawState = { startX: pos.x, startY: pos.y, points: [pos] };

  if (tool === 'pen') {
    drawState.penPoints = [{ x: pos.x, y: pos.y }];
  }
}

function canvasMove(idx, e) {
  if (!drawState || !activeAnnotation || activeAnnotation.stepIdx !== idx) return;
  const pos = getCanvasPos(idx, e);
  const tool = activeAnnotation.tool;

  if (tool === 'pen') {
    drawState.penPoints.push({ x: pos.x, y: pos.y });
  }

  drawState.curX = pos.x;
  drawState.curY = pos.y;

  // Live preview
  redrawAnnotations(idx);
  const canvas = document.getElementById(`ss-canvas-${idx}`);
  const ctx = canvas.getContext('2d');
  drawAnnotationShape(ctx, tool, drawState);
}

function canvasUp(idx, e) {
  if (!drawState || !activeAnnotation || activeAnnotation.stepIdx !== idx) return;
  const pos = getCanvasPos(idx, e);
  const tool = activeAnnotation.tool;

  if (tool === 'arrow') {
    pushAnnotation(idx, { type: 'arrow', x1: drawState.startX, y1: drawState.startY, x2: pos.x, y2: pos.y });
  } else if (tool === 'oval') {
    pushAnnotation(idx, { type: 'oval', x1: drawState.startX, y1: drawState.startY, x2: pos.x, y2: pos.y });
  } else if (tool === 'rect') {
    pushAnnotation(idx, { type: 'rect', x1: drawState.startX, y1: drawState.startY, x2: pos.x, y2: pos.y });
  } else if (tool === 'pen') {
    drawState.penPoints.push({ x: pos.x, y: pos.y });
    pushAnnotation(idx, { type: 'pen', points: drawState.penPoints });
  }

  drawState = null;
  redrawAnnotations(idx);
}

function pushAnnotation(idx, ann) {
  steps[idx].annotations.push(ann);
  steps[idx].undoStack.push(JSON.stringify(ann));
  steps[idx].redoStack = [];
  markDirty();
}

function undoAnnotation(idx) {
  if (steps[idx].annotations.length === 0) return;
  const removed = steps[idx].annotations.pop();
  steps[idx].undoStack.pop();
  steps[idx].redoStack.push(JSON.stringify(removed));
  redrawAnnotations(idx);
  markDirty();
}

function redoAnnotation(idx) {
  if (steps[idx].redoStack.length === 0) return;
  const ann = JSON.parse(steps[idx].redoStack.pop());
  steps[idx].annotations.push(ann);
  steps[idx].undoStack.push(JSON.stringify(ann));
  redrawAnnotations(idx);
  markDirty();
}

function clearAnnotations(idx) {
  if (steps[idx].annotations.length === 0) return;
  if (!confirm('Clear all markups on this step?')) return;
  steps[idx].annotations = [];
  steps[idx].undoStack = [];
  steps[idx].redoStack = [];
  redrawAnnotations(idx);
  markDirty();
}

function redrawAnnotations(idx) {
  const canvas = document.getElementById(`ss-canvas-${idx}`);
  if (!canvas) return;
  const ctx = canvas.getContext('2d');
  ctx.clearRect(0, 0, canvas.width, canvas.height);

  steps[idx].annotations.forEach(ann => {
    drawAnnotationShape(ctx, ann.type, ann);
  });
}

function drawAnnotationShape(ctx, type, data) {
  ctx.strokeStyle = '#ef4444';
  ctx.fillStyle = '#ef4444';
  ctx.lineWidth = 3;
  ctx.lineCap = 'round';
  ctx.lineJoin = 'round';

  if (type === 'arrow') {
    const x1 = data.x1 ?? data.startX;
    const y1 = data.y1 ?? data.startY;
    const x2 = data.x2 ?? data.curX;
    const y2 = data.y2 ?? data.curY;
    if (x2 == null) return;

    ctx.beginPath();
    ctx.moveTo(x1, y1);
    ctx.lineTo(x2, y2);
    ctx.stroke();

    // Arrowhead
    const angle = Math.atan2(y2 - y1, x2 - x1);
    const headLen = 16;
    ctx.beginPath();
    ctx.moveTo(x2, y2);
    ctx.lineTo(x2 - headLen * Math.cos(angle - 0.4), y2 - headLen * Math.sin(angle - 0.4));
    ctx.lineTo(x2 - headLen * Math.cos(angle + 0.4), y2 - headLen * Math.sin(angle + 0.4));
    ctx.closePath();
    ctx.fill();
  } else if (type === 'oval') {
    const x1 = data.x1 ?? data.startX;
    const y1 = data.y1 ?? data.startY;
    const x2 = data.x2 ?? data.curX;
    const y2 = data.y2 ?? data.curY;
    if (x2 == null) return;
    const cx = (x1 + x2) / 2, cy = (y1 + y2) / 2;
    const rx = Math.abs(x2 - x1) / 2, ry = Math.abs(y2 - y1) / 2;
    ctx.beginPath();
    ctx.ellipse(cx, cy, rx || 1, ry || 1, 0, 0, Math.PI * 2);
    ctx.stroke();
  } else if (type === 'rect') {
    const x1 = data.x1 ?? data.startX;
    const y1 = data.y1 ?? data.startY;
    const x2 = data.x2 ?? data.curX;
    const y2 = data.y2 ?? data.curY;
    if (x2 == null) return;
    ctx.strokeRect(Math.min(x1, x2), Math.min(y1, y2), Math.abs(x2 - x1), Math.abs(y2 - y1));
  } else if (type === 'text') {
    ctx.font = 'bold 16px sans-serif';
    ctx.fillStyle = '#ef4444';
    // Background
    const metrics = ctx.measureText(data.text);
    const pad = 4;
    ctx.fillStyle = 'rgba(0,0,0,0.6)';
    ctx.fillRect(data.x - pad, data.y - 16, metrics.width + pad * 2, 22);
    ctx.fillStyle = '#ef4444';
    ctx.fillText(data.text, data.x, data.y);
  } else if (type === 'pen') {
    const pts = data.points || data.penPoints;
    if (!pts || pts.length < 2) return;
    ctx.beginPath();
    ctx.moveTo(pts[0].x, pts[0].y);
    for (let i = 1; i < pts.length; i++) {
      ctx.lineTo(pts[i].x, pts[i].y);
    }
    ctx.stroke();
  }
}

// ---- Generate annotated image for preview/export ----
function getAnnotatedImage(idx) {
  return new Promise((resolve) => {
    const step = steps[idx];
    if (!step.imageData) { resolve(null); return; }

    const img = new Image();
    img.onload = () => {
      const canvas = document.createElement('canvas');
      canvas.width = img.naturalWidth;
      canvas.height = img.naturalHeight;
      const ctx = canvas.getContext('2d');
      ctx.drawImage(img, 0, 0);

      // Scale annotations from display size to natural size
      const displayImg = document.getElementById(`ss-img-${idx}`);
      const scaleX = displayImg ? img.naturalWidth / displayImg.offsetWidth : 1;
      const scaleY = displayImg ? img.naturalHeight / displayImg.offsetHeight : 1;

      ctx.save();
      ctx.scale(scaleX, scaleY);
      ctx.strokeStyle = '#ef4444';
      ctx.fillStyle = '#ef4444';
      ctx.lineWidth = 3;
      ctx.lineCap = 'round';
      ctx.lineJoin = 'round';

      step.annotations.forEach(ann => {
        drawAnnotationShape(ctx, ann.type, ann);
      });
      ctx.restore();

      resolve(canvas.toDataURL('image/png'));
    };
    img.src = step.imageData;
  });
}

// ---- Revisions ----
function addRevision(data) {
  revisions.push({
    version: data?.version || '',
    date: data?.date || new Date().toISOString().slice(0, 10),
    author: data?.author || '',
    changes: data?.changes || ''
  });
  renderRevisions();
  markDirty();
}

function removeRevision(idx) {
  revisions.splice(idx, 1);
  renderRevisions();
  markDirty();
}

function renderRevisions() {
  const c = document.getElementById('revisions-container');
  c.innerHTML = revisions.map((r, i) => `
    <div style="display:flex;gap:8px;margin-bottom:8px;flex-wrap:wrap;align-items:flex-end;">

// ---- Preview ----
async function renderPreview() {
  const container = document.getElementById('preview-view');
  const title = document.getElementById('sop-title').value || 'Untitled SOP';
  const docnum = document.getElementById('sop-docnum').value;
  const version = document.getElementById('sop-version').value;
  const author = document.getElementById('sop-author').value;
  const dept = document.getElementById('sop-dept').value;
  const date = document.getElementById('sop-date').value;
  const purpose = document.getElementById('sop-purpose').value;

  // Generate annotated images
  const images = [];
  for (let i = 0; i < steps.length; i++) {
    images.push(await getAnnotatedImage(i));
  }

  let html = `<div class="preview-container">`;
  html += `<h1>${escHtml(title)}</h1>`;
  html += `<div class="preview-meta">`;
  if (docnum) html += `<span><b>Doc #:</b> ${escHtml(docnum)}</span>`;
  if (version) html += `<span><b>Version:</b> ${escHtml(version)}</span>`;
  if (author) html += `<span><b>Author:</b> ${escHtml(author)}</span>`;
  if (dept) html += `<span><b>Department:</b> ${escHtml(dept)}</span>`;
  if (date) html += `<span><b>Effective Date:</b> ${escHtml(date)}</span>`;
  html += `</div>`;

  if (purpose) {
    html += `<div style="margin-bottom:24px;"><b>Purpose / Scope:</b><br><span style="white-space:pre-wrap;">${escHtml(purpose)}</span></div>`;
  }

  steps.forEach((step, i) => {
    html += `<div class="preview-step">`;
    html += `<div class="preview-step-header">
      <span class="preview-step-num">${i + 1}</span>
      <span class="preview-step-title">${escHtml(step.title) || 'Step ' + (i + 1)}</span>
    </div>`;
    if (step.description) {
      html += `<div class="preview-step-desc">${escHtml(step.description)}</div>`;
    }
    if (images[i]) {
      html += `<img class="preview-step-img" src="${images[i]}" alt="Step ${i+1}">`;
    }
    html += `</div>`;
  });

  if (revisions.length > 0) {
    html += `<div class="preview-revision"><h3>Revision History</h3><table>
      <tr><th>Version</th><th>Date</th><th>Author</th><th>Changes</th></tr>`;
    revisions.forEach(r => {
      html += `<tr><td>${escHtml(r.version)}</td><td>${escHtml(r.date)}</td><td>${escHtml(r.author)}</td><td>${escHtml(r.changes)}</td></tr>`;
    });
    html += `</table></div>`;
  }

  html += `<div style="margin-top:32px;text-align:center;font-size:11px;color:#999;">Generated with SOP Creator &mdash; Korb Engineering</div>`;
  html += `</div>`;

  container.innerHTML = html;
}

// ---- PDF Export ----
async function exportPDF() {
  await switchTab('preview');
  await renderPreview();
  // Small delay to ensure images render
  setTimeout(() => {
    window.print();
  }, 300);
}

// ---- Save / Load ----
function saveSOP() {
  const title = document.getElementById('sop-title').value || 'Untitled SOP';
  const key = LS_PREFIX + 'doc_' + slugify(title) + '_' + Date.now();

  const data = {
    meta: {
      title,
      docnum: document.getElementById('sop-docnum').value,
      version: document.getElementById('sop-version').value,
      author: document.getElementById('sop-author').value,
      dept: document.getElementById('sop-dept').value,
      date: document.getElementById('sop-date').value,
      purpose: document.getElementById('sop-purpose').value
    },
    steps: steps.map(s => ({
      title: s.title,
      description: s.description,
      imageData: s.imageData,
      annotations: s.annotations
    })),
    revisions,
    savedAt: new Date().toISOString()
  };

  try {
    localStorage.setItem(key, JSON.stringify(data));
    // Keep index of saved SOPs
    const index = JSON.parse(localStorage.getItem(LS_PREFIX + 'index') || '[]');
    index.push({ key, title, savedAt: data.savedAt });
    localStorage.setItem(LS_PREFIX + 'index', JSON.stringify(index));
    dirty = false;
    showToast('SOP saved successfully');
  } catch (e) {
    if (e.name === 'QuotaExceededError') {
      showToast('Storage full - try removing old SOPs or reducing image sizes');
    } else {
      showToast('Error saving: ' + e.message);
    }
  }
}

function loadSOP(key) {
  try {
    const raw = localStorage.getItem(key);
    if (!raw) { showToast('SOP not found'); return; }
    const data = JSON.parse(raw);

    document.getElementById('sop-title').value = data.meta.title || '';
    document.getElementById('sop-docnum').value = data.meta.docnum || '';
    document.getElementById('sop-version').value = data.meta.version || '';
    document.getElementById('sop-author').value = data.meta.author || '';
    document.getElementById('sop-dept').value = data.meta.dept || '';
    document.getElementById('sop-date').value = data.meta.date || '';
    document.getElementById('sop-purpose').value = data.meta.purpose || '';

    steps = data.steps.map(s => ({
      ...s,
      collapsed: false,
      undoStack: [],
      redoStack: []
    }));
    revisions = data.revisions || [];

    renderSteps();
    renderRevisions();
    closeModal('saved-modal');
    switchTab('editor');
    showToast('SOP loaded');
    dirty = false;
  } catch (e) {
    showToast('Error loading SOP');
  }
}

function deleteSavedSOP(key) {
  if (!confirm('Delete this saved SOP?')) return;
  localStorage.removeItem(key);
  const index = JSON.parse(localStorage.getItem(LS_PREFIX + 'index') || '[]');
  const filtered = index.filter(i => i.key !== key);
  localStorage.setItem(LS_PREFIX + 'index', JSON.stringify(filtered));
  showSaved();
  showToast('SOP deleted');
}

function showSaved() {
  const list = document.getElementById('saved-list');
  const index = JSON.parse(localStorage.getItem(LS_PREFIX + 'index') || '[]').reverse();

  if (index.length === 0) {
    list.innerHTML = '<div style="color:var(--text-faint);font-size:13px;">No saved SOPs yet. Create one and click Save.</div>';
  } else {
    list.innerHTML = index.map(item => `
      <div class="saved-item">
        <div class="saved-item-info">
          <div class="saved-item-title">${escHtml(item.title)}</div>
          <div class="saved-item-date">${new Date(item.savedAt).toLocaleString()}</div>
        </div>
        <div class="saved-item-actions">
          <button class="btn btn-sm btn-cyan" onclick="loadSOP('${escAttr(item.key)}')">Load</button>
          <button class="btn btn-sm btn-red" onclick="deleteSavedSOP('${escAttr(item.key)}')">&#10005;</button>
        </div>
      </div>
    `).join('');
  }

  document.getElementById('saved-modal').classList.remove('hidden');
}

function showTemplates() {
  const list = document.getElementById('templates-list');
  list.innerHTML = TEMPLATES.map((t, i) => `
    <div class="template-card" onclick="applyTemplate(${i})">
      <h3>${escHtml(t.name)}</h3>
      <p>${escHtml(t.desc)}</p>
    </div>
  `).join('');
  document.getElementById('templates-modal').classList.remove('hidden');
}

function applyTemplate(idx) {
  if (dirty && !confirm('Unsaved changes will be lost. Continue?')) return;
  const t = TEMPLATES[idx];

  document.getElementById('sop-title').value = t.meta.title || '';
  document.getElementById('sop-docnum').value = t.meta.docnum || '';
  document.getElementById('sop-version').value = '1.0';
  document.getElementById('sop-author').value = t.meta.author || '';
  document.getElementById('sop-dept').value = t.meta.dept || '';
  document.getElementById('sop-date').value = new Date().toISOString().slice(0, 10);
  document.getElementById('sop-purpose').value = t.meta.purpose || '';

  steps = t.steps.map(s => ({
    title: s.title,
    description: s.description,
    imageData: null,
    annotations: [],
    collapsed: false,
    undoStack: [],
    redoStack: []
  }));
  revisions = (t.revisions || []).map(r => ({ ...r }));

  renderSteps();
  renderRevisions();
  closeModal('templates-modal');
  switchTab('editor');
  showToast(`Template "${t.name}" applied`);
  dirty = false;
}

function closeModal(id) {
  document.getElementById(id).classList.add('hidden');
}

// Close modals on overlay click
document.addEventListener('click', e => {
  if (e.target.classList.contains('modal-overlay')) {
    e.target.classList.add('hidden');
  }
});

// ---- Utilities ----
function escHtml(s) {
  if (!s) return '';
  return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}
function escAttr(s) {
  if (!s) return '';
  return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;').replace(/'/g,'&#39;');
}
function slugify(s) {
  return s.toLowerCase().replace(/[^a-z0-9]+/g, '-').replace(/^-|-$/g, '').slice(0, 40);
}

// ---- Keyboard Shortcuts ----
document.addEventListener('keydown', e => {
  // Ctrl+S to save
  if ((e.ctrlKey || e.metaKey) && e.key === 's') {
    e.preventDefault();
    saveSOP();
  }
  // Ctrl+P to export
  if ((e.ctrlKey || e.metaKey) && e.key === 'p') {
    e.preventDefault();
    exportPDF();
  }
  // Ctrl+Z undo on active annotation step
  if ((e.ctrlKey || e.metaKey) && e.key === 'z' && activeAnnotation) {
    e.preventDefault();
    if (e.shiftKey) {
      redoAnnotation(activeAnnotation.stepIdx);
    } else {
      undoAnnotation(activeAnnotation.stepIdx);
    }
  }
});

// ---- Start ----
init();
</script>
