<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>Soundboard | KORB ENGINEERING</title>
<style>
  *{margin:0;padding:0;box-sizing:border-box}
  body{background:#0a0e14;color:#e0e0e0;font-family:'Segoe UI',system-ui,-apple-system,sans-serif;min-height:100vh;overflow-x:hidden}
  .header{text-align:center;padding:2rem 1rem 1rem}
  .eyebrow{font-size:.75rem;letter-spacing:.35em;text-transform:uppercase;color:#00e5ff;margin-bottom:.25rem;font-weight:600}
  h1{font-size:2.5rem;font-weight:800;background:linear-gradient(135deg,#00e5ff,#76ff03);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
  .sub{font-size:.75rem;color:#556;margin-top:.25rem;letter-spacing:.1em}
  .controls{display:flex;flex-wrap:wrap;justify-content:center;align-items:center;gap:.6rem;padding:1rem 1.5rem;max-width:1200px;margin:0 auto}
  .filter-btn{padding:.45rem 1rem;border:1px solid rgba(0,229,255,.3);border-radius:2rem;background:transparent;color:#aaa;cursor:pointer;font-size:.8rem;transition:all .2s;-webkit-tap-highlight-color:transparent}
  .filter-btn:hover,.filter-btn.active{background:rgba(0,229,255,.15);color:#00e5ff;border-color:#00e5ff}
  .volume-wrap{display:flex;align-items:center;gap:.5rem;margin-left:auto}
  .volume-wrap label{font-size:.8rem;color:#888}
  .volume-wrap input[type=range]{-webkit-appearance:none;width:100px;height:4px;background:#1e2633;border-radius:2px;outline:none}
  .volume-wrap input[type=range]::-webkit-slider-thumb{-webkit-appearance:none;width:14px;height:14px;background:#00e5ff;border-radius:50%;cursor:pointer}
  .stop-btn{padding:.45rem 1rem;border:1px solid #ff1744;border-radius:2rem;background:rgba(255,23,68,.1);color:#ff1744;cursor:pointer;font-size:.8rem;transition:all .2s;-webkit-tap-highlight-color:transparent}
  .stop-btn:hover{background:rgba(255,23,68,.25)}
  .grid{display:grid;grid-template-columns:repeat(5,1fr);gap:.85rem;padding:1.5rem;max-width:1300px;margin:0 auto}
  @media(max-width:1024px){.grid{grid-template-columns:repeat(4,1fr)}}
  @media(max-width:768px){.grid{grid-template-columns:repeat(3,1fr);gap:.6rem;padding:1rem}h1{font-size:1.8rem}.controls{gap:.4rem}}
  @media(max-width:480px){.grid{grid-template-columns:repeat(2,1fr)}}
  .btn{position:relative;border:none;border-radius:1rem;padding:1.2rem .6rem;cursor:pointer;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:.3rem;transition:transform .1s,box-shadow .15s;overflow:hidden;min-height:100px;-webkit-user-select:none;user-select:none;-webkit-tap-highlight-color:transparent;touch-action:manipulation}
  .btn:active,.btn.playing{transform:scale(.9)}
  .btn .emoji{font-size:1.8rem;line-height:1;filter:drop-shadow(0 2px 4px rgba(0,0,0,.3))}
  .btn .label{font-size:.7rem;font-weight:700;color:rgba(0,0,0,.8);text-align:center;line-height:1.15}
  .btn::after{content:'';position:absolute;inset:0;background:radial-gradient(circle at center,rgba(255,255,255,.3) 0%,transparent 70%);opacity:0;transition:opacity .2s}
  .btn.playing::after{opacity:1}
  .btn.hidden{display:none}
  .credit{text-align:center;padding:2rem 1rem;font-size:.65rem;color:#334;line-height:1.6}
  .credit a{color:#00e5ff;text-decoration:none}
</style>
</head>
<body>

<div class="header">
  <div class="eyebrow">KORB ENGINEERING</div>
  <h1>Soundboard</h1>
  <div class="sub">57 REAL AUDIO SOUNDS + SYNTHESIZED CLASSICS</div>
</div>

<div class="controls">
  <button class="filter-btn active" data-cat="all">All</button>
  <button class="filter-btn" data-cat="comedy">Comedy</button>
  <button class="filter-btn" data-cat="alerts">Alerts</button>
  <button class="filter-btn" data-cat="impacts">Impacts</button>
  <button class="filter-btn" data-cat="musical">Musical</button>
  <button class="filter-btn" data-cat="ui">UI / Tech</button>
  <button class="filter-btn" data-cat="nature">Nature</button>
  <div class="volume-wrap">
    <label>Vol</label>
    <input type="range" id="vol" min="0" max="1" step="0.01" value="0.7">
  </div>
  <button class="stop-btn" id="stopAll">⬛ Stop All</button>
</div>

<div class="grid" id="grid"></div>

<div class="credit">
  Audio samples from <a href="https://github.com/rse/soundfx" target="_blank">rse/soundfx</a> (CC0 / CC-BY-3.0)
  &bull; Synthesized sounds via Web Audio API
</div>

<script>
// ======== AUDIO ENGINE ========
const AC = new (window.AudioContext || window.webkitAudioContext)();
const masterGain = AC.createGain();
masterGain.gain.value = 0.7;
masterGain.connect(AC.destination);

const activeNodes = [];
const activeAudio = [];
const audioCache = {};

function vol(){ return parseFloat(document.getElementById('vol').value) }
document.getElementById('vol').addEventListener('input', e => {
  masterGain.gain.value = parseFloat(e.target.value);
  activeAudio.forEach(a => { a.volume = parseFloat(e.target.value); });
});
document.getElementById('stopAll').addEventListener('click', () => {
  activeNodes.forEach(n => { try { n.stop() } catch(e){} });
  activeNodes.length = 0;
  activeAudio.forEach(a => { a.pause(); a.currentTime = 0; });
  activeAudio.length = 0;
  document.querySelectorAll('.btn.playing').forEach(b => b.classList.remove('playing'));
});

function track(node){
  activeNodes.push(node);
  node.onended = () => { const i = activeNodes.indexOf(node); if(i > -1) activeNodes.splice(i, 1); };
}

// Play an MP3 file from the sounds/ directory
function playFile(filename, btn){
  const path = 'sounds/' + filename;
  // Use HTML5 Audio for simplicity and broad compatibility
  const audio = new Audio(path);
  audio.volume = vol();
  activeAudio.push(audio);
  audio.onended = () => {
    const i = activeAudio.indexOf(audio);
    if(i > -1) activeAudio.splice(i, 1);
    if(btn) btn.classList.remove('playing');
  };
  audio.play().catch(e => console.warn('Audio play failed:', e));
}

// ======== SYNTHESIS HELPERS ========
function osc(type, freq, dur, gain=0.3){
  const o = AC.createOscillator(), g = AC.createGain();
  o.type = type; o.frequency.value = freq; g.gain.value = gain;
  o.connect(g); g.connect(masterGain);
  o.start(AC.currentTime); o.stop(AC.currentTime + dur);
  track(o); return {o, g};
}

function noise(dur, gain=0.3){
  const buf = AC.createBuffer(1, AC.sampleRate*dur, AC.sampleRate);
  const d = buf.getChannelData(0);
  for(let i = 0; i < d.length; i++) d[i] = Math.random()*2 - 1;
  const src = AC.createBufferSource(); src.buffer = buf;
  const g = AC.createGain(); g.gain.value = gain;
  src.connect(g); g.connect(masterGain);
  src.start(AC.currentTime); track(src); return {src, g};
}

// ======== SYNTHESIZED SOUNDS ========
const synth = {
  rimshot(){
    const t = AC.currentTime;
    const k = AC.createOscillator(), kg = AC.createGain();
    k.type='sine'; k.frequency.setValueAtTime(150,t); k.frequency.exponentialRampToValueAtTime(40,t+0.1);
    kg.gain.setValueAtTime(0.6,t); kg.gain.exponentialRampToValueAtTime(0.01,t+0.15);
    k.connect(kg); kg.connect(masterGain); k.start(t); k.stop(t+0.15); track(k);
    const n = AC.createBuffer(1, AC.sampleRate*0.15, AC.sampleRate);
    const nd = n.getChannelData(0); for(let i=0;i<nd.length;i++) nd[i]=Math.random()*2-1;
    const ns = AC.createBufferSource(); ns.buffer = n;
    const ng = AC.createGain(); ng.gain.setValueAtTime(0.5,t+0.2); ng.gain.exponentialRampToValueAtTime(0.01,t+0.35);
    const f = AC.createBiquadFilter(); f.type='highpass'; f.frequency.value=1000;
    ns.connect(f); f.connect(ng); ng.connect(masterGain); ns.start(t+0.2); track(ns);
    const h = AC.createBuffer(1, AC.sampleRate*0.08, AC.sampleRate);
    const hd = h.getChannelData(0); for(let i=0;i<hd.length;i++) hd[i]=Math.random()*2-1;
    const hs = AC.createBufferSource(); hs.buffer = h;
    const hg = AC.createGain(); hg.gain.setValueAtTime(0.4,t+0.35); hg.gain.exponentialRampToValueAtTime(0.01,t+0.5);
    const hf = AC.createBiquadFilter(); hf.type='highpass'; hf.frequency.value=7000;
    hs.connect(hf); hf.connect(hg); hg.connect(masterGain); hs.start(t+0.35); track(hs);
  },

  sadTrombone(){
    const freqs = [293.66, 261.63, 246.94, 220];
    const t = AC.currentTime;
    freqs.forEach((fr, i) => {
      const o = AC.createOscillator(), g = AC.createGain();
      o.type='sawtooth'; o.frequency.setValueAtTime(fr, t+i*0.45);
      const vib = AC.createOscillator(), vg = AC.createGain();
      vib.frequency.value=5; vg.gain.value=3; vib.connect(vg); vg.connect(o.frequency);
      vib.start(t+i*0.45); vib.stop(t+i*0.45+0.4);
      g.gain.setValueAtTime(0.25, t+i*0.45); g.gain.setValueAtTime(0.25, t+i*0.45+0.3);
      g.gain.exponentialRampToValueAtTime(0.01, t+i*0.45+(i===3?0.8:0.4));
      o.connect(g); g.connect(masterGain);
      o.start(t+i*0.45); o.stop(t+i*0.45+(i===3?0.8:0.4));
      track(o); track(vib);
    });
  },

  airhorn(){
    const t = AC.currentTime;
    [540, 720, 810].forEach(fr => {
      const o = AC.createOscillator(), g = AC.createGain();
      o.type='sawtooth'; o.frequency.value=fr;
      g.gain.setValueAtTime(0.01,t); g.gain.linearRampToValueAtTime(0.2,t+0.05);
      g.gain.setValueAtTime(0.2,t+0.6); g.gain.exponentialRampToValueAtTime(0.01,t+0.8);
      const flt = AC.createBiquadFilter(); flt.type='lowpass'; flt.frequency.value=2000;
      o.connect(flt); flt.connect(g); g.connect(masterGain);
      o.start(t); o.stop(t+0.8); track(o);
    });
  },

  recordScratch(){
    const t = AC.currentTime;
    const buf = AC.createBuffer(1, AC.sampleRate*0.4, AC.sampleRate);
    const d = buf.getChannelData(0); for(let i=0;i<d.length;i++) d[i]=Math.random()*2-1;
    const src = AC.createBufferSource(); src.buffer = buf;
    const flt = AC.createBiquadFilter(); flt.type='bandpass'; flt.Q.value=5;
    flt.frequency.setValueAtTime(8000,t); flt.frequency.exponentialRampToValueAtTime(200,t+0.3);
    const g = AC.createGain(); g.gain.setValueAtTime(0.5,t); g.gain.exponentialRampToValueAtTime(0.01,t+0.4);
    src.connect(flt); flt.connect(g); g.connect(masterGain); src.start(t); track(src);
  },

  crickets(){
    const t = AC.currentTime;
    for(let c=0; c<12; c++){
      const start = t + c*0.2 + Math.random()*0.08;
      const o = AC.createOscillator(), g = AC.createGain();
      o.type='sine'; o.frequency.value = 4500 + Math.random()*1500;
      g.gain.setValueAtTime(0, start); g.gain.linearRampToValueAtTime(0.06, start+0.015);
      g.gain.linearRampToValueAtTime(0, start+0.05);
      o.connect(g); g.connect(masterGain); o.start(start); o.stop(start+0.05); track(o);
    }
  },

  boing(){
    const t = AC.currentTime;
    const o = AC.createOscillator(), g = AC.createGain();
    o.type='sine';
    o.frequency.setValueAtTime(200,t); o.frequency.exponentialRampToValueAtTime(1200,t+0.15);
    o.frequency.exponentialRampToValueAtTime(300,t+0.5);
    g.gain.setValueAtTime(0.35,t); g.gain.exponentialRampToValueAtTime(0.01,t+0.5);
    o.connect(g); g.connect(masterGain); o.start(t); o.stop(t+0.5); track(o);
  },

  fartShort(){
    const t = AC.currentTime;
    const buf = AC.createBuffer(1, AC.sampleRate*0.3, AC.sampleRate);
    const d = buf.getChannelData(0); for(let i=0;i<d.length;i++) d[i]=Math.random()*2-1;
    const src = AC.createBufferSource(); src.buffer = buf;
    const flt = AC.createBiquadFilter(); flt.type='lowpass'; flt.frequency.value=150; flt.Q.value=10;
    const g = AC.createGain(); g.gain.setValueAtTime(0.5,t); g.gain.exponentialRampToValueAtTime(0.01,t+0.25);
    src.connect(flt); flt.connect(g); g.connect(masterGain); src.start(t); track(src);
  },

  fartLong(){
    const t = AC.currentTime;
    const buf = AC.createBuffer(1, AC.sampleRate*1.2, AC.sampleRate);
    const d = buf.getChannelData(0); for(let i=0;i<d.length;i++) d[i]=Math.random()*2-1;
    const src = AC.createBufferSource(); src.buffer = buf;
    const flt = AC.createBiquadFilter(); flt.type='lowpass';
    flt.frequency.setValueAtTime(120,t); flt.frequency.linearRampToValueAtTime(80,t+1);
    flt.Q.value=12;
    const g = AC.createGain(); g.gain.setValueAtTime(0.45,t); g.gain.setValueAtTime(0.45,t+0.8); g.gain.exponentialRampToValueAtTime(0.01,t+1.1);
    src.connect(flt); flt.connect(g); g.connect(masterGain); src.start(t); track(src);
  },

  fartSqueaky(){
    const t = AC.currentTime;
    const buf = AC.createBuffer(1, AC.sampleRate*0.4, AC.sampleRate);
    const d = buf.getChannelData(0); for(let i=0;i<d.length;i++) d[i]=Math.random()*2-1;
    const src = AC.createBufferSource(); src.buffer = buf;
    const flt = AC.createBiquadFilter(); flt.type='bandpass';
    flt.frequency.setValueAtTime(400,t); flt.frequency.linearRampToValueAtTime(800,t+0.3);
    flt.Q.value=15;
    const g = AC.createGain(); g.gain.setValueAtTime(0.4,t); g.gain.exponentialRampToValueAtTime(0.01,t+0.35);
    src.connect(flt); flt.connect(g); g.connect(masterGain); src.start(t); track(src);
  },

  duckQuack(){
    const t = AC.currentTime;
    const o = AC.createOscillator(), g = AC.createGain();
    o.type='sawtooth';
    o.frequency.setValueAtTime(800,t); o.frequency.exponentialRampToValueAtTime(300,t+0.12);
    const flt = AC.createBiquadFilter(); flt.type='bandpass'; flt.frequency.value=1200; flt.Q.value=5;
    g.gain.setValueAtTime(0.3,t); g.gain.exponentialRampToValueAtTime(0.01,t+0.15);
    o.connect(flt); flt.connect(g); g.connect(masterGain); o.start(t); o.stop(t+0.15); track(o);
  },

  cartoonRun(){
    const t = AC.currentTime;
    const notes = [523, 587, 659, 698, 784, 880, 988, 1047, 1175, 1319];
    notes.forEach((fr, i) => {
      const o = AC.createOscillator(), g = AC.createGain();
      o.type='sine'; o.frequency.value=fr;
      g.gain.setValueAtTime(0.2, t+i*0.06); g.gain.exponentialRampToValueAtTime(0.01, t+i*0.06+0.05);
      o.connect(g); g.connect(masterGain); o.start(t+i*0.06); o.stop(t+i*0.06+0.05); track(o);
    });
  },

  gulp(){
    const t = AC.currentTime;
    const o = AC.createOscillator(), g = AC.createGain();
    o.type='sine'; o.frequency.setValueAtTime(600,t); o.frequency.exponentialRampToValueAtTime(150,t+0.12);
    g.gain.setValueAtTime(0.3,t); g.gain.exponentialRampToValueAtTime(0.01,t+0.15);
    o.connect(g); g.connect(masterGain); o.start(t); o.stop(t+0.15); track(o);
  },

  wolfWhistle(){
    const t = AC.currentTime;
    const o = AC.createOscillator(), g = AC.createGain();
    o.type='sine';
    o.frequency.setValueAtTime(600,t); o.frequency.exponentialRampToValueAtTime(1200,t+0.3);
    o.frequency.setValueAtTime(1200,t+0.35); o.frequency.exponentialRampToValueAtTime(1600,t+0.55);
    o.frequency.exponentialRampToValueAtTime(800,t+0.8);
    g.gain.setValueAtTime(0.25,t); g.gain.setValueAtTime(0.25,t+0.7); g.gain.exponentialRampToValueAtTime(0.01,t+0.8);
    o.connect(g); g.connect(masterGain); o.start(t); o.stop(t+0.8); track(o);
  },

  sadViolin(){
    const t = AC.currentTime;
    const o = AC.createOscillator(), g = AC.createGain();
    o.type='sawtooth';
    o.frequency.setValueAtTime(660,t); o.frequency.linearRampToValueAtTime(620,t+1); o.frequency.linearRampToValueAtTime(587,t+2);
    const vib = AC.createOscillator(), vg = AC.createGain();
    vib.frequency.value=6; vg.gain.value=8; vib.connect(vg); vg.connect(o.frequency);
    const flt = AC.createBiquadFilter(); flt.type='lowpass'; flt.frequency.value=3000;
    g.gain.setValueAtTime(0.01,t); g.gain.linearRampToValueAtTime(0.15,t+0.2);
    g.gain.setValueAtTime(0.15,t+1.6); g.gain.exponentialRampToValueAtTime(0.01,t+2);
    o.connect(flt); flt.connect(g); g.connect(masterGain);
    o.start(t); o.stop(t+2); vib.start(t); vib.stop(t+2); track(o); track(vib);
  },

  suspense(){
    const t = AC.currentTime;
    const o = AC.createOscillator(), o2 = AC.createOscillator(), g = AC.createGain();
    o.type='sawtooth'; o.frequency.value=55;
    o2.type='sawtooth'; o2.frequency.value=56.5;
    const flt = AC.createBiquadFilter(); flt.type='lowpass';
    flt.frequency.setValueAtTime(200,t); flt.frequency.linearRampToValueAtTime(1500,t+2);
    g.gain.setValueAtTime(0.01,t); g.gain.linearRampToValueAtTime(0.25,t+1.8); g.gain.exponentialRampToValueAtTime(0.01,t+2);
    o.connect(flt); o2.connect(flt); flt.connect(g); g.connect(masterGain);
    o.start(t); o.stop(t+2); o2.start(t); o2.stop(t+2); track(o); track(o2);
  },

  dramatic(){
    const t = AC.currentTime;
    const chords = [[220,277,330],[261,330,392],[330,415,494],[392,494,587]];
    chords.forEach((ch, ci) => {
      ch.forEach(fr => {
        const o = AC.createOscillator(), g = AC.createGain();
        o.type='sawtooth'; o.frequency.value=fr;
        const flt = AC.createBiquadFilter(); flt.type='lowpass'; flt.frequency.value=1500;
        g.gain.setValueAtTime(0.01, t+ci*0.4); g.gain.linearRampToValueAtTime(0.12, t+ci*0.4+0.1);
        g.gain.setValueAtTime(0.12, t+ci*0.4+0.35); g.gain.exponentialRampToValueAtTime(0.01, t+ci*0.4+0.39);
        o.connect(flt); flt.connect(g); g.connect(masterGain);
        o.start(t+ci*0.4); o.stop(t+ci*0.4+0.4); track(o);
      });
    });
  },

  applause(){
    const t = AC.currentTime;
    const dur = 2;
    const buf = AC.createBuffer(1, AC.sampleRate*dur, AC.sampleRate);
    const d = buf.getChannelData(0);
    for(let i=0; i<d.length; i++){
      const env = Math.sin(Math.PI * i / d.length);
      d[i] = (Math.random()*2-1) * env * (Math.random()>0.5 ? 1 : 0.3);
    }
    const src = AC.createBufferSource(); src.buffer = buf;
    const flt = AC.createBiquadFilter(); flt.type='bandpass'; flt.frequency.value=3000; flt.Q.value=0.5;
    const g = AC.createGain(); g.gain.value=0.35;
    src.connect(flt); flt.connect(g); g.connect(masterGain); src.start(t); track(src);
  },

  clockTick(){
    const t = AC.currentTime;
    for(let i=0; i<8; i++){
      const o = AC.createOscillator(), g = AC.createGain();
      o.type='sine'; o.frequency.value = i%2===0 ? 1800 : 1200;
      g.gain.setValueAtTime(0.2, t+i*0.4); g.gain.exponentialRampToValueAtTime(0.01, t+i*0.4+0.03);
      o.connect(g); g.connect(masterGain); o.start(t+i*0.4); o.stop(t+i*0.4+0.03); track(o);
    }
  },

  sirenWail(){
    const t = AC.currentTime;
    const o = AC.createOscillator(), g = AC.createGain();
    o.type='sine'; g.gain.value=0.25;
    o.frequency.setValueAtTime(600,t);
    o.frequency.linearRampToValueAtTime(1200,t+0.5);
    o.frequency.linearRampToValueAtTime(600,t+1);
    o.frequency.linearRampToValueAtTime(1200,t+1.5);
    o.frequency.linearRampToValueAtTime(600,t+2);
    g.gain.setValueAtTime(0.25,t+1.8); g.gain.exponentialRampToValueAtTime(0.01,t+2);
    o.connect(g); g.connect(masterGain); o.start(t); o.stop(t+2); track(o);
  },

  laserZap(){
    const t = AC.currentTime;
    const o = AC.createOscillator(), g = AC.createGain();
    o.type='sawtooth';
    o.frequency.setValueAtTime(1500,t); o.frequency.exponentialRampToValueAtTime(100,t+0.3);
    g.gain.setValueAtTime(0.3,t); g.gain.exponentialRampToValueAtTime(0.01,t+0.3);
    o.connect(g); g.connect(masterGain); o.start(t); o.stop(t+0.3); track(o);
  },

  powerUp(){
    const t = AC.currentTime;
    const o = AC.createOscillator(), g = AC.createGain();
    o.type='square';
    o.frequency.setValueAtTime(200,t); o.frequency.exponentialRampToValueAtTime(1600,t+0.6);
    g.gain.setValueAtTime(0.2,t); g.gain.setValueAtTime(0.2,t+0.5); g.gain.exponentialRampToValueAtTime(0.01,t+0.6);
    o.connect(g); g.connect(masterGain); o.start(t); o.stop(t+0.6); track(o);
  },

  powerDown(){
    const t = AC.currentTime;
    const o = AC.createOscillator(), g = AC.createGain();
    o.type='square';
    o.frequency.setValueAtTime(1600,t); o.frequency.exponentialRampToValueAtTime(100,t+0.8);
    g.gain.setValueAtTime(0.2,t); g.gain.setValueAtTime(0.2,t+0.7); g.gain.exponentialRampToValueAtTime(0.01,t+0.8);
    o.connect(g); g.connect(masterGain); o.start(t); o.stop(t+0.8); track(o);
  },

  coinCollect(){
    const t = AC.currentTime;
    const o1 = AC.createOscillator(), g1 = AC.createGain();
    o1.type='square'; o1.frequency.value=988;
    g1.gain.setValueAtTime(0.2,t); g1.gain.exponentialRampToValueAtTime(0.01,t+0.1);
    o1.connect(g1); g1.connect(masterGain); o1.start(t); o1.stop(t+0.1); track(o1);
    const o2 = AC.createOscillator(), g2 = AC.createGain();
    o2.type='square'; o2.frequency.value=1319;
    g2.gain.setValueAtTime(0.2,t+0.1); g2.gain.exponentialRampToValueAtTime(0.01,t+0.3);
    o2.connect(g2); g2.connect(masterGain); o2.start(t+0.1); o2.stop(t+0.3); track(o2);
  },

  gameOver(){
    const t = AC.currentTime;
    const notes = [392, 330, 262, 196];
    notes.forEach((fr, i) => {
      const o = AC.createOscillator(), g = AC.createGain();
      o.type='square'; o.frequency.value=fr;
      g.gain.setValueAtTime(0.2, t+i*0.3); g.gain.exponentialRampToValueAtTime(0.01, t+i*0.3+0.25);
      o.connect(g); g.connect(masterGain); o.start(t+i*0.3); o.stop(t+i*0.3+0.25); track(o);
    });
  },

  thunder(){
    const t = AC.currentTime;
    const buf = AC.createBuffer(1, AC.sampleRate*2, AC.sampleRate);
    const d = buf.getChannelData(0);
    for(let i=0; i<d.length; i++) d[i] = Math.random()*2-1;
    const src = AC.createBufferSource(); src.buffer = buf;
    const flt = AC.createBiquadFilter(); flt.type='lowpass';
    flt.frequency.setValueAtTime(400,t); flt.frequency.exponentialRampToValueAtTime(80,t+2);
    const g = AC.createGain();
    g.gain.setValueAtTime(0.01,t); g.gain.linearRampToValueAtTime(0.5,t+0.05);
    g.gain.exponentialRampToValueAtTime(0.15,t+0.5); g.gain.exponentialRampToValueAtTime(0.01,t+2);
    src.connect(flt); flt.connect(g); g.connect(masterGain); src.start(t); track(src);
  },

  wind(){
    const t = AC.currentTime;
    const buf = AC.createBuffer(1, AC.sampleRate*3, AC.sampleRate);
    const d = buf.getChannelData(0);
    for(let i=0; i<d.length; i++) d[i] = Math.random()*2-1;
    const src = AC.createBufferSource(); src.buffer = buf;
    const flt = AC.createBiquadFilter(); flt.type='bandpass'; flt.Q.value=0.5;
    flt.frequency.setValueAtTime(400,t); flt.frequency.linearRampToValueAtTime(800,t+1.5);
    flt.frequency.linearRampToValueAtTime(300,t+3);
    const g = AC.createGain();
    g.gain.setValueAtTime(0.01,t); g.gain.linearRampToValueAtTime(0.2,t+0.5);
    g.gain.setValueAtTime(0.2,t+2.5); g.gain.exponentialRampToValueAtTime(0.01,t+3);
    src.connect(flt); flt.connect(g); g.connect(masterGain); src.start(t); track(src);
  },

  rain(){
    const t = AC.currentTime;
    const buf = AC.createBuffer(1, AC.sampleRate*3, AC.sampleRate);
    const d = buf.getChannelData(0);
    for(let i=0; i<d.length; i++) d[i] = Math.random()*2-1;
    const src = AC.createBufferSource(); src.buffer = buf;
    const flt = AC.createBiquadFilter(); flt.type='highpass'; flt.frequency.value=4000;
    const flt2 = AC.createBiquadFilter(); flt2.type='lowpass'; flt2.frequency.value=8000;
    const g = AC.createGain();
    g.gain.setValueAtTime(0.01,t); g.gain.linearRampToValueAtTime(0.15,t+0.3);
    g.gain.setValueAtTime(0.15,t+2.5); g.gain.exponentialRampToValueAtTime(0.01,t+3);
    src.connect(flt); flt.connect(flt2); flt2.connect(g); g.connect(masterGain); src.start(t); track(src);
  },

  helicopter(){
    const t = AC.currentTime;
    const buf = AC.createBuffer(1, AC.sampleRate*2, AC.sampleRate);
    const d = buf.getChannelData(0);
    for(let i=0; i<d.length; i++){
      const phase = (i / AC.sampleRate) * 8 * Math.PI;
      d[i] = (Math.random()*2-1) * (Math.sin(phase) > 0 ? 1 : 0.1);
    }
    const src = AC.createBufferSource(); src.buffer = buf;
    const flt = AC.createBiquadFilter(); flt.type='lowpass'; flt.frequency.value=600;
    const g = AC.createGain(); g.gain.setValueAtTime(0.01,t); g.gain.linearRampToValueAtTime(0.3,t+0.3);
    g.gain.setValueAtTime(0.3,t+1.7); g.gain.exponentialRampToValueAtTime(0.01,t+2);
    src.connect(flt); flt.connect(g); g.connect(masterGain); src.start(t); track(src);
  },

  doorbell(){
    const t = AC.currentTime;
    const o1 = AC.createOscillator(), g1 = AC.createGain();
    o1.type='sine'; o1.frequency.value=880;
    g1.gain.setValueAtTime(0.3,t); g1.gain.exponentialRampToValueAtTime(0.01,t+0.4);
    o1.connect(g1); g1.connect(masterGain); o1.start(t); o1.stop(t+0.4); track(o1);
    const o2 = AC.createOscillator(), g2 = AC.createGain();
    o2.type='sine'; o2.frequency.value=659;
    g2.gain.setValueAtTime(0.3,t+0.4); g2.gain.exponentialRampToValueAtTime(0.01,t+0.8);
    o2.connect(g2); g2.connect(masterGain); o2.start(t+0.4); o2.stop(t+0.8); track(o2);
  },

  phoneRing(){
    const t = AC.currentTime;
    for(let r=0; r<3; r++){
      const start = t + r*0.6;
      const o = AC.createOscillator(), o2 = AC.createOscillator(), g = AC.createGain();
      o.type='sine'; o.frequency.value=440;
      o2.type='sine'; o2.frequency.value=480;
      g.gain.setValueAtTime(0.15, start); g.gain.setValueAtTime(0.15, start+0.25);
      g.gain.setValueAtTime(0, start+0.25);
      o.connect(g); o2.connect(g); g.connect(masterGain);
      o.start(start); o.stop(start+0.25); o2.start(start); o2.stop(start+0.25);
      track(o); track(o2);
    }
  },

  typewriter(){
    const t = AC.currentTime;
    for(let i=0; i<12; i++){
      const start = t + i*0.12 + Math.random()*0.04;
      const buf = AC.createBuffer(1, AC.sampleRate*0.03, AC.sampleRate);
      const d = buf.getChannelData(0); for(let j=0;j<d.length;j++) d[j]=Math.random()*2-1;
      const src = AC.createBufferSource(); src.buffer = buf;
      const flt = AC.createBiquadFilter(); flt.type='highpass'; flt.frequency.value=3000+Math.random()*2000;
      const g = AC.createGain(); g.gain.setValueAtTime(0.15, start); g.gain.exponentialRampToValueAtTime(0.01, start+0.03);
      src.connect(flt); flt.connect(g); g.connect(masterGain); src.start(start); track(src);
    }
    // carriage return ding
    const ding = AC.createOscillator(), dg = AC.createGain();
    ding.type='sine'; ding.frequency.value=3500;
    dg.gain.setValueAtTime(0.25, t+1.5); dg.gain.exponentialRampToValueAtTime(0.01, t+1.9);
    ding.connect(dg); dg.connect(masterGain); ding.start(t+1.5); ding.stop(t+1.9); track(ding);
  }
};

// ======== BUILD GRID ========
const grid = document.getElementById('grid');
buttons.forEach(b => {
  const el = document.createElement('button');
  el.className = 'btn';
  el.dataset.cat = b.cat;
  el.style.background = b.color;
  el.innerHTML = `<span class="emoji">${b.emoji}</span><span class="label">${b.label}</span>`;
  el.addEventListener('click', () => {
    if(AC.state === 'suspended') AC.resume();
    el.classList.add('playing');
    setTimeout(() => el.classList.remove('playing'), 400);

    if(b.type === 'file'){
      playFile(b.file, el);
    } else {
      const fn = b.synthId || b.id;
      if(synth[fn]) synth[fn]();
    }
  });
  el.addEventListener('touchstart', e => { e.preventDefault(); el.click(); }, {passive: false});
  grid.appendChild(el);
});

document.querySelectorAll('.filter-btn').forEach(fb => {
  fb.addEventListener('click', () => {
    document.querySelectorAll('.filter-btn').forEach(x => x.classList.remove('active'));
    fb.classList.add('active');
    const cat = fb.dataset.cat;
    document.querySelectorAll('.btn').forEach(b => {
      b.classList.toggle('hidden', cat !== 'all' && b.dataset.cat !== cat);
    });
  });
});
