<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover, user-scalable=no">
<title>Speak & Spell | Korb Engineering</title>
<meta name="description" content="Type-to-speech communication aid with quick phrases for anyone who can't speak. Free, offline, browser-based.">
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #050a0f;
  --s1: #0a1018;
  --s2: #0e1520;
  --s3: #141c2b;
  --bd: #1a2535;
  --bd2: #243349;
  --cyan: #00d4ff;
  --cyan-d: #0096b3;
  --orange: #ff6600;
  --green: #10b981;
  --red: #ef4444;
  --gold: #fbbf24;
  --text: #e2e8f0;
  --text-dim: #94a3b8;
  --text-dim2: #64748b;
  --font: 'JetBrains Mono', ui-monospace, Menlo, monospace;
}
* { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
html, body {
  height: 100%;
  font-family: var(--font);
  background: var(--bg);
  color: var(--text);
  overflow: hidden;
  -webkit-font-smoothing: antialiased;
}
body {
  display: flex;
  flex-direction: column;
  padding: env(safe-area-inset-top) env(safe-area-inset-right) env(safe-area-inset-bottom) env(safe-area-inset-left);
}
.app { display: flex; flex-direction: column; height: 100%; min-height: 0; }

.header {
  background: var(--s1);
  border-bottom: 1px solid var(--bd);
  padding: 10px 14px;
  display: flex;
  align-items: center;
  justify-content: space-between;
  gap: 10px;
  flex-shrink: 0;
}
.logo {
  font-size: 14px;
  font-weight: 700;
  color: var(--cyan);
  letter-spacing: 0.08em;
  display: flex;
  align-items: center;
  gap: 8px;
}
.logo-dot {
  width: 10px;
  height: 10px;
  border-radius: 50%;
  background: var(--cyan);
  box-shadow: 0 0 10px var(--cyan);
  animation: pulse 2s ease-in-out infinite;
}
.logo-dot.speaking {
  background: var(--orange);
  box-shadow: 0 0 14px var(--orange);
  animation: pulse-fast 0.6s ease-in-out infinite;
}
@keyframes pulse { 0%,100% { opacity: 1; } 50% { opacity: 0.4; } }
@keyframes pulse-fast { 0%,100% { transform: scale(1); } 50% { transform: scale(1.4); } }
.header-actions { display: flex; gap: 8px; }
.icon-btn {
  min-width: 44px;
  min-height: 44px;
  background: var(--s2);
  border: 1px solid var(--bd);
  color: var(--cyan);
  border-radius: 8px;
  font-family: var(--font);
  font-size: 18px;
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: center;
  transition: all .15s;
}
.icon-btn:hover, .icon-btn:focus-visible { border-color: var(--cyan); background: var(--s3); outline: none; }
.icon-btn:active { transform: scale(0.96); }

.main {
  flex: 1;
  min-height: 0;
  display: grid;
  grid-template-rows: auto auto 1fr;
  gap: 12px;
  padding: 14px;
  overflow: hidden;
}
@media (min-width: 860px) {
  .main {
    grid-template-columns: 1.1fr 1fr;
    grid-template-rows: auto 1fr;
    gap: 16px;
    padding: 18px;
  }
  .compose-wrap { grid-column: 1; grid-row: 1 / span 2; display: flex; flex-direction: column; min-height: 0; }
  .phrases-wrap { grid-column: 2; grid-row: 1 / span 2; display: flex; flex-direction: column; min-height: 0; }
}

.compose-wrap { display: flex; flex-direction: column; gap: 12px; min-height: 0; }
.text-area-wrap {
  position: relative;
  background: var(--s1);
  border: 1.5px solid var(--bd);
  border-radius: 12px;
  padding: 16px;
  min-height: 140px;
  display: flex;
  flex-direction: column;
  transition: border-color .15s, box-shadow .15s;
}
.text-area-wrap:focus-within {
  border-color: var(--cyan);
  box-shadow: 0 0 0 3px rgba(0, 212, 255, 0.15);
}
.text-input {
  width: 100%;
  flex: 1;
  min-height: 100px;
  background: transparent;
  border: none;
  color: var(--text);
  font-family: var(--font);
  font-size: 22px;
  line-height: 1.5;
  resize: none;
  outline: none;
  letter-spacing: 0.01em;
}
.text-input::placeholder {
  color: var(--text-dim2);
  font-size: 18px;
}
.text-meta {
  display: flex;
  justify-content: space-between;
  align-items: center;
  margin-top: 10px;
  padding-top: 10px;
  border-top: 1px solid var(--bd);
  font-size: 12px;
  color: var(--text-dim);
}
.text-meta .hint { font-size: 11px; }
.text-meta .hint kbd {
  display: inline-block;
  padding: 2px 6px;
  background: var(--s3);
  border: 1px solid var(--bd2);
  border-radius: 4px;
  font-family: var(--font);
  font-size: 10px;
  color: var(--cyan);
}
.char-count.warn { color: var(--gold); }
.char-count.over { color: var(--red); }

.action-row {
  display: grid;
  grid-template-columns: 1fr auto auto;
  gap: 10px;
}
.speak-btn {
  background: linear-gradient(180deg, var(--cyan) 0%, var(--cyan-d) 100%);
  color: #00161f;
  border: none;
  border-radius: 12px;
  padding: 0 20px;
  min-height: 64px;
  font-family: var(--font);
  font-size: 18px;
  font-weight: 700;
  letter-spacing: 0.08em;
  text-transform: uppercase;
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 10px;
  box-shadow: 0 0 18px rgba(0, 212, 255, 0.25), inset 0 1px 0 rgba(255,255,255,0.3);
  transition: all .15s;
}
.speak-btn:hover { box-shadow: 0 0 26px rgba(0, 212, 255, 0.45), inset 0 1px 0 rgba(255,255,255,0.4); }
.speak-btn:active { transform: scale(0.98); }
.speak-btn:disabled {
  background: var(--s2);
  color: var(--text-dim2);
  box-shadow: none;
  cursor: not-allowed;
}
.speak-btn.speaking {
  background: linear-gradient(180deg, var(--orange) 0%, #b34600 100%);
  color: #1a0800;
  box-shadow: 0 0 26px rgba(255, 102, 0, 0.5), inset 0 1px 0 rgba(255,255,255,0.3);
}
.secondary-btn {
  min-width: 64px;
  min-height: 64px;
  background: var(--s2);
  border: 1.5px solid var(--bd);
  color: var(--text);
  border-radius: 12px;
  font-family: var(--font);
  font-size: 13px;
  font-weight: 600;
  cursor: pointer;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  gap: 2px;
  transition: all .15s;
  padding: 0 10px;
}
.secondary-btn:hover, .secondary-btn:focus-visible {
  border-color: var(--cyan);
  color: var(--cyan);
  outline: none;
}
.secondary-btn:active { transform: scale(0.96); }
.secondary-btn svg { width: 22px; height: 22px; flex-shrink: 0; }
.secondary-btn .label { font-size: 10px; letter-spacing: 0.05em; text-transform: uppercase; }

.phrases-wrap {
  background: var(--s1);
  border: 1px solid var(--bd);
  border-radius: 12px;
  padding: 14px;
  display: flex;
  flex-direction: column;
  gap: 10px;
  min-height: 0;
  overflow: hidden;
}
.panel-head {
  display: flex;
  align-items: center;
  justify-content: space-between;
  gap: 10px;
  flex-shrink: 0;
}
.panel-title {
  font-size: 12px;
  color: var(--cyan);
  letter-spacing: 0.08em;
  text-transform: uppercase;
  font-weight: 600;
}
.add-custom-btn {
  padding: 6px 10px;
  min-height: 32px;
  background: var(--s2);
  border: 1px solid var(--bd);
  color: var(--gold);
  border-radius: 6px;
  font-family: var(--font);
  font-size: 11px;
  cursor: pointer;
  letter-spacing: 0.05em;
}
.add-custom-btn:hover { border-color: var(--gold); }

.cat-tabs {
  display: flex;
  gap: 6px;
  overflow-x: auto;
  padding-bottom: 4px;
  flex-shrink: 0;
  scrollbar-width: thin;
  scrollbar-color: var(--bd2) transparent;
}
.cat-tabs::-webkit-scrollbar { height: 4px; }
.cat-tabs::-webkit-scrollbar-thumb { background: var(--bd2); border-radius: 2px; }
.cat-tab {
  padding: 8px 14px;
  min-height: 40px;
  background: var(--s2);
  border: 1px solid var(--bd);
  color: var(--text-dim);
  border-radius: 20px;
  font-family: var(--font);
  font-size: 12px;
  font-weight: 600;
  white-space: nowrap;
  cursor: pointer;
  transition: all .15s;
  letter-spacing: 0.04em;
  flex-shrink: 0;
}
.cat-tab:hover { border-color: var(--cyan); color: var(--text); }
.cat-tab.active {
  background: var(--s3);
  color: var(--cyan);
  border-color: var(--cyan);
  box-shadow: 0 0 10px rgba(0, 212, 255, 0.2);
}

.phrase-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(140px, 1fr));
  gap: 8px;
  overflow-y: auto;
  padding-right: 4px;
  flex: 1;
  min-height: 0;
  align-content: start;
  scrollbar-width: thin;
  scrollbar-color: var(--bd2) transparent;
}
.phrase-grid::-webkit-scrollbar { width: 6px; }
.phrase-grid::-webkit-scrollbar-thumb { background: var(--bd2); border-radius: 3px; }

.phrase-btn {
  position: relative;
  min-height: 64px;
  background: var(--s2);
  border: 1.5px solid var(--bd);
  color: var(--text);
  border-radius: 10px;
  font-family: var(--font);
  font-size: 13px;
  font-weight: 500;
  cursor: pointer;
  padding: 10px 12px;
  text-align: left;
  line-height: 1.35;
  transition: all .15s;
  display: flex;
  align-items: center;
  word-break: break-word;
  letter-spacing: 0.01em;
}
.phrase-btn:hover, .phrase-btn:focus-visible {
  border-color: var(--cyan);
  background: var(--s3);
  color: var(--cyan);
  outline: none;
  transform: translateY(-1px);
}
.phrase-btn:active { transform: scale(0.97); }
.phrase-btn.custom { border-color: rgba(251, 191, 36, 0.4); }
.phrase-btn.custom:hover { border-color: var(--gold); color: var(--gold); }
.phrase-btn.emergency { border-color: rgba(239, 68, 68, 0.5); }
.phrase-btn.emergency:hover { border-color: var(--red); color: var(--red); background: rgba(239, 68, 68, 0.08); }
.phrase-delete {
  position: absolute;
  top: 4px;
  right: 4px;
  width: 22px;
  height: 22px;
  background: var(--s1);
  border: 1px solid var(--bd2);
  color: var(--red);
  border-radius: 50%;
  font-size: 14px;
  line-height: 1;
  display: none;
  align-items: center;
  justify-content: center;
  cursor: pointer;
  padding: 0;
}
.phrase-btn.custom:hover .phrase-delete { display: flex; }

.empty-state {
  padding: 20px;
  text-align: center;
  color: var(--text-dim2);
  font-size: 12px;
  grid-column: 1 / -1;
}

.modal-overlay {
  position: fixed;
  inset: 0;
  background: rgba(5, 10, 15, 0.85);
  backdrop-filter: blur(4px);
  display: none;
  align-items: center;
  justify-content: center;
  z-index: 100;
  padding: 20px;
}
.modal-overlay.show { display: flex; }
.modal {
  background: var(--s1);
  border: 1px solid var(--bd);
  border-radius: 14px;
  padding: 22px;
  max-width: 480px;
  width: 100%;
  max-height: calc(100vh - 80px);
  overflow-y: auto;
  box-shadow: 0 20px 60px rgba(0, 0, 0, 0.5);
}
.modal h2 {
  font-size: 14px;
  color: var(--cyan);
  letter-spacing: 0.08em;
  text-transform: uppercase;
  margin-bottom: 18px;
  font-weight: 700;
}
.modal-row { margin-bottom: 16px; }
.modal-row label {
  display: block;
  font-size: 11px;
  color: var(--text-dim);
  letter-spacing: 0.06em;
  text-transform: uppercase;
  margin-bottom: 6px;
}
.modal-row select,
.modal-row input[type=text] {
  width: 100%;
  min-height: 44px;
  padding: 10px 12px;
  background: var(--s2);
  border: 1px solid var(--bd);
  color: var(--text);
  border-radius: 8px;
  font-family: var(--font);
  font-size: 16px;
  outline: none;
}
.modal-row select:focus, .modal-row input[type=text]:focus { border-color: var(--cyan); }
.slider-row {
  display: grid;
  grid-template-columns: 1fr auto;
  gap: 10px;
  align-items: center;
}
.slider-row input[type=range] {
  width: 100%;
  height: 30px;
  -webkit-appearance: none;
  appearance: none;
  background: transparent;
}
.slider-row input[type=range]::-webkit-slider-runnable-track {
  height: 4px; background: var(--bd2); border-radius: 2px;
}
.slider-row input[type=range]::-moz-range-track {
  height: 4px; background: var(--bd2); border-radius: 2px;
}
.slider-row input[type=range]::-webkit-slider-thumb {
  -webkit-appearance: none;
  width: 22px; height: 22px;
  background: var(--cyan);
  border-radius: 50%;
  margin-top: -9px;
  box-shadow: 0 0 8px rgba(0, 212, 255, 0.5);
  cursor: pointer;
}
.slider-row input[type=range]::-moz-range-thumb {
  width: 22px; height: 22px;
  background: var(--cyan);
  border: none;
  border-radius: 50%;
  box-shadow: 0 0 8px rgba(0, 212, 255, 0.5);
  cursor: pointer;
}
.slider-val {
  font-size: 13px;
  color: var(--cyan);
  min-width: 42px;
  text-align: right;
  font-variant-numeric: tabular-nums;
}
.modal-actions {
  display: flex;
  gap: 10px;
  margin-top: 20px;
  justify-content: flex-end;
}
.modal-btn {
  min-height: 44px;
  padding: 10px 18px;
  background: var(--s2);
  border: 1px solid var(--bd);
  color: var(--text);
  border-radius: 8px;
  font-family: var(--font);
  font-size: 13px;
  cursor: pointer;
  font-weight: 600;
  letter-spacing: 0.05em;
}
.modal-btn:hover { border-color: var(--cyan); color: var(--cyan); }
.modal-btn.primary {
  background: var(--cyan);
  color: #00161f;
  border-color: var(--cyan);
}
.modal-btn.primary:hover { box-shadow: 0 0 14px rgba(0, 212, 255, 0.4); color: #00161f; }

.big-overlay {
  position: fixed;
  inset: 0;
  background: rgba(5, 10, 15, 0.96);
  backdrop-filter: blur(6px);
  display: none;
  align-items: center;
  justify-content: center;
  padding: 30px;
  z-index: 200;
  cursor: pointer;
}
.big-overlay.show { display: flex; }
.big-text {
  font-size: clamp(32px, 7vw, 72px);
  font-weight: 700;
  color: var(--cyan);
  text-align: center;
  max-width: 100%;
  word-break: break-word;
  line-height: 1.2;
  text-shadow: 0 0 30px rgba(0, 212, 255, 0.4);
  letter-spacing: 0.01em;
}
.big-hint {
  position: absolute;
  bottom: 30px;
  left: 0;
  right: 0;
  text-align: center;
  color: var(--text-dim);
  font-size: 12px;
  letter-spacing: 0.08em;
  text-transform: uppercase;
}

@media (max-width: 520px) {
  .header { padding: 8px 12px; }
  .logo { font-size: 12px; }
  .main { padding: 10px; gap: 10px; }
  .text-input { font-size: 20px; }
  .text-input::placeholder { font-size: 16px; }
  .speak-btn { font-size: 16px; min-height: 60px; }
  .secondary-btn { min-width: 60px; min-height: 60px; }
  .phrase-grid { grid-template-columns: repeat(auto-fill, minmax(120px, 1fr)); }
  .phrases-wrap { padding: 12px; }
}
</style>
</head>
<body>
<div class="app">

<header class="header">
  <div class="logo">
    <span class="logo-dot" id="statusDot"></span>
    <span>SPEAK &amp; SPELL</span>
  </div>
  <div class="header-actions">
    <button class="icon-btn" id="bigBtn" title="Big text mode" aria-label="Big text mode">&#x26F6;</button>
    <button class="icon-btn" id="settingsBtn" title="Settings" aria-label="Settings">&#x2699;</button>
  </div>
</header>

<main class="main">

  <div class="compose-wrap">
    <div class="text-area-wrap">
      <textarea id="textInput" class="text-input"
        placeholder="Type what you want to say, then press Speak (or Enter)."
        autocomplete="off"
        autocapitalize="sentences"
        autocorrect="on"
        spellcheck="true"
        rows="4"></textarea>
      <div class="text-meta">
        <span class="char-count" id="charCount">0</span>
        <span class="hint"><kbd>Enter</kbd> speak &middot; <kbd>Shift+Enter</kbd> newline</span>
      </div>
    </div>

    <div class="action-row">
      <button class="speak-btn" id="speakBtn" type="button">
        <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round"><path d="M11 5L6 9H2v6h4l5 4V5z"/><path d="M15.5 8.5a5 5 0 010 7"/><path d="M19 5a9 9 0 010 14"/></svg>
        <span>Speak</span>
      </button>
      <button class="secondary-btn" id="repeatBtn" type="button" title="Repeat last phrase">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><path d="M17 2l4 4-4 4"/><path d="M3 11v-1a4 4 0 014-4h14"/><path d="M7 22l-4-4 4-4"/><path d="M21 13v1a4 4 0 01-4 4H3"/></svg>
        <span class="label">Repeat</span>
      </button>
      <button class="secondary-btn" id="clearBtn" type="button" title="Clear text">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 6h18"/><path d="M8 6V4a2 2 0 012-2h4a2 2 0 012 2v2"/><path d="M6 6l1 14a2 2 0 002 2h6a2 2 0 002-2l1-14"/></svg>
        <span class="label">Clear</span>
      </button>
    </div>
  </div>

  <div class="phrases-wrap">
    <div class="panel-head">
      <span class="panel-title">Quick Phrases</span>
      <button class="add-custom-btn" id="addCustomBtn">+ Add phrase</button>
    </div>
    <div class="cat-tabs" id="catTabs"></div>
    <div class="phrase-grid" id="phraseGrid"></div>
  </div>

</main>

</div>

<div class="modal-overlay" id="settingsOverlay">
  <div class="modal" role="dialog" aria-modal="true">
    <h2>Voice &amp; Settings</h2>
    <div class="modal-row">
      <label for="voiceSel">Voice</label>
      <select id="voiceSel"></select>
    </div>
    <div class="modal-row">
      <label>Speed</label>
      <div class="slider-row">
        <input type="range" id="rateSlider" min="0.5" max="2" step="0.05" value="1">
        <span class="slider-val" id="rateVal">1.00x</span>
      </div>
    </div>
    <div class="modal-row">
      <label>Pitch</label>
      <div class="slider-row">
        <input type="range" id="pitchSlider" min="0" max="2" step="0.05" value="1">
        <span class="slider-val" id="pitchVal">1.00</span>
      </div>
    </div>
    <div class="modal-row">
      <label>Volume</label>
      <div class="slider-row">
        <input type="range" id="volSlider" min="0" max="1" step="0.05" value="1">
        <span class="slider-val" id="volVal">100%</span>
      </div>
    </div>
    <div class="modal-row">
      <label for="testInput">Test phrase</label>
      <input type="text" id="testInput" value="Hello, this is how I sound." autocomplete="off">
    </div>
    <div class="modal-actions">
      <button class="modal-btn" id="testBtn" type="button">Test voice</button>
      <button class="modal-btn primary" id="closeSettings" type="button">Done</button>
    </div>
  </div>
</div>

<div class="modal-overlay" id="addOverlay">
  <div class="modal" role="dialog" aria-modal="true">
    <h2>Add a custom phrase</h2>
    <div class="modal-row">
      <label for="newPhrase">Phrase</label>
      <input type="text" id="newPhrase" placeholder="e.g. Can you raise the bed?" autocomplete="off">
    </div>
    <div class="modal-row">
      <label for="newCat">Save to category</label>
      <select id="newCat"></select>
    </div>
    <div class="modal-actions">
      <button class="modal-btn" id="cancelAdd" type="button">Cancel</button>
      <button class="modal-btn primary" id="saveAdd" type="button">Save phrase</button>
    </div>
  </div>
</div>

<div class="big-overlay" id="bigOverlay" aria-live="assertive">
  <div class="big-text" id="bigText"></div>
  <div class="big-hint">Tap anywhere to dismiss</div>
</div>

<script>
(function () {
  'use strict';

  const DEFAULT_PHRASES = {
    essentials: {
      label: 'Essentials',
      phrases: [
        'Yes.', 'No.', 'Please.', 'Thank you.',
        'I don\u2019t know.', 'Maybe.', 'Wait a moment.',
        'Can you say that again?', 'I don\u2019t understand.',
        'Hello.', 'Goodbye.', 'Excuse me.',
        'Sorry.', 'You\u2019re welcome.', 'I agree.', 'I disagree.'
      ]
    },
    needs: {
      label: 'Needs',
      phrases: [
        'I need help.', 'I need water.', 'I\u2019m hungry.', 'I\u2019m thirsty.',
        'I need to use the bathroom.', 'I\u2019m cold.', 'I\u2019m hot.',
        'I need a blanket.', 'I need to sit down.', 'I need to lie down.',
        'I need my glasses.', 'I need my phone.', 'Please come closer.',
        'Please speak louder.', 'Please speak slower.', 'I need a break.'
      ]
    },
    medical: {
      label: 'Medical',
      phrases: [
        'I\u2019m in pain.', 'I need my medication.', 'Please call a nurse.',
        'Please call my doctor.', 'I don\u2019t feel well.', 'I feel dizzy.',
        'I feel nauseous.', 'It hurts here.', 'Can you adjust my pillow?',
        'Can you raise the bed?', 'Can you lower the bed?',
        'I\u2019m having trouble breathing.', 'My mouth is dry.',
        'I need water for my mouth.', 'I\u2019m tired.', 'I can\u2019t sleep.'
      ]
    },
    emergency: {
      label: 'Emergency',
      phrases: [
        'I need help right now!', 'Please call 911.', 'This is an emergency.',
        'I can\u2019t breathe.', 'I\u2019m in severe pain.',
        'Please get a doctor now.', 'Something is wrong.', 'I feel very sick.'
      ],
      emergency: true
    },
    feelings: {
      label: 'Feelings',
      phrases: [
        'I\u2019m okay.', 'I\u2019m not okay.', 'I\u2019m happy.', 'I\u2019m sad.',
        'I\u2019m scared.', 'I\u2019m frustrated.', 'I\u2019m tired.',
        'I\u2019m feeling better.', 'I\u2019m feeling worse.', 'I love you.',
        'I miss you.', 'Thank you for being here.', 'I appreciate you.',
        'I\u2019m bored.', 'I\u2019m lonely.', 'I\u2019m comfortable.'
      ]
    },
    people: {
      label: 'People',
      phrases: [
        'This is my family.', 'Please call my family.', 'Please call my spouse.',
        'Please call my mother.', 'Please call my father.', 'Please call my son.',
        'Please call my daughter.', 'I want to see my friend.',
        'Please tell them I said hi.', 'Tell them I\u2019m okay.',
        'Tell them I love them.'
      ]
    },
    social: {
      label: 'Social',
      phrases: [
        'How are you?', 'It\u2019s nice to see you.', 'Can we talk?',
        'Can you stay with me?', 'Please sit down.', 'Let\u2019s watch something.',
        'Can you read to me?', 'Can you put on music?',
        'Turn on the TV, please.', 'Turn off the lights, please.',
        'Open the window, please.', 'Close the window, please.'
      ]
    },
    questions: {
      label: 'Questions',
      phrases: [
        'What time is it?', 'What day is it?', 'Where am I?', 'Who is here?',
        'What happened?', 'Where is my family?', 'When will the doctor come?',
        'How long will this take?', 'Is it safe?', 'Is this normal?',
        'What should I do?'
      ]
    }
  };

  const PFX = 'korb_speakspell_';
  const SETTINGS_KEY = PFX + 'settings';
  const CUSTOM_KEY = PFX + 'custom';

  const state = {
    voices: [],
    voiceURI: null,
    rate: 1,
    pitch: 1,
    volume: 1,
    bigMode: false,
    activeCat: 'essentials',
    custom: { essentials: [], needs: [], medical: [], emergency: [], feelings: [], people: [], social: [], questions: [], mine: [] },
    lastSpoken: ''
  };

  const $ = (id) => document.getElementById(id);
  const textInput = $('textInput');
  const charCount = $('charCount');
  const speakBtn = $('speakBtn');
  const repeatBtn = $('repeatBtn');
  const clearBtn = $('clearBtn');
  const catTabs = $('catTabs');
  const phraseGrid = $('phraseGrid');
  const statusDot = $('statusDot');
  const settingsBtn = $('settingsBtn');
  const settingsOverlay = $('settingsOverlay');
  const closeSettings = $('closeSettings');
  const voiceSel = $('voiceSel');
  const rateSlider = $('rateSlider');
  const rateVal = $('rateVal');
  const pitchSlider = $('pitchSlider');
  const pitchVal = $('pitchVal');
  const volSlider = $('volSlider');
  const volVal = $('volVal');
  const testBtn = $('testBtn');
  const testInput = $('testInput');
  const bigBtn = $('bigBtn');
  const bigOverlay = $('bigOverlay');
  const bigText = $('bigText');
  const addCustomBtn = $('addCustomBtn');
  const addOverlay = $('addOverlay');
  const newPhrase = $('newPhrase');
  const newCat = $('newCat');
  const cancelAdd = $('cancelAdd');
  const saveAdd = $('saveAdd');

  function loadSettings() {
    try {
      const raw = localStorage.getItem(SETTINGS_KEY);
      if (raw) {
        const s = JSON.parse(raw);
        if (typeof s.rate === 'number') state.rate = s.rate;
        if (typeof s.pitch === 'number') state.pitch = s.pitch;
        if (typeof s.volume === 'number') state.volume = s.volume;
        if (typeof s.voiceURI === 'string') state.voiceURI = s.voiceURI;
        if (typeof s.bigMode === 'boolean') state.bigMode = s.bigMode;
        if (typeof s.activeCat === 'string') state.activeCat = s.activeCat;
      }
    } catch (e) {}
    try {
      const raw = localStorage.getItem(CUSTOM_KEY);
      if (raw) {
        const c = JSON.parse(raw);
        if (c && typeof c === 'object') {
          for (const k in state.custom) if (Array.isArray(c[k])) state.custom[k] = c[k];
          if (Array.isArray(c.mine)) state.custom.mine = c.mine;
        }
      }
    } catch (e) {}
  }

  function saveSettings() {
    try {
      localStorage.setItem(SETTINGS_KEY, JSON.stringify({
        rate: state.rate, pitch: state.pitch, volume: state.volume,
        voiceURI: state.voiceURI, bigMode: state.bigMode, activeCat: state.activeCat
      }));
    } catch (e) {}
  }

  function saveCustom() {
    try { localStorage.setItem(CUSTOM_KEY, JSON.stringify(state.custom)); } catch (e) {}
  }

  const synth = window.speechSynthesis;

  function loadVoices() {
    if (!synth) return;
    state.voices = synth.getVoices() || [];
    renderVoiceOptions();
  }

  function renderVoiceOptions() {
    if (!voiceSel) return;
    voiceSel.innerHTML = '';
    if (!state.voices.length) {
      const opt = document.createElement('option');
      opt.textContent = 'Default voice';
      voiceSel.appendChild(opt);
      return;
    }
    const sorted = state.voices.slice().sort((a, b) => {
      const ae = a.lang && a.lang.toLowerCase().startsWith('en') ? 0 : 1;
      const be = b.lang && b.lang.toLowerCase().startsWith('en') ? 0 : 1;
      if (ae !== be) return ae - be;
      return (a.name || '').localeCompare(b.name || '');
    });
    sorted.forEach((v) => {
      const opt = document.createElement('option');
      opt.value = v.voiceURI;
      opt.textContent = v.name + ' (' + v.lang + ')' + (v.default ? ' \u2605' : '');
      voiceSel.appendChild(opt);
    });
    if (state.voiceURI && sorted.some((v) => v.voiceURI === state.voiceURI)) {
      voiceSel.value = state.voiceURI;
    } else {
      const pref = sorted.find((v) => v.default && v.lang && v.lang.toLowerCase().startsWith('en'))
                || sorted.find((v) => v.lang && v.lang.toLowerCase().startsWith('en'))
                || sorted[0];
      if (pref) { state.voiceURI = pref.voiceURI; voiceSel.value = pref.voiceURI; }
    }
  }

  function getSelectedVoice() {
    if (!state.voices.length) return null;
    return state.voices.find((v) => v.voiceURI === state.voiceURI) || null;
  }

  function speak(text, opts) {
    if (!synth) {
      alert('Your browser does not support speech synthesis. Try Chrome, Edge, or Safari.');
      return;
    }
    const clean = (text || '').trim();
    if (!clean) return;
    try { synth.cancel(); } catch (e) {}
    const u = new SpeechSynthesisUtterance(clean);
    const v = getSelectedVoice();
    if (v) u.voice = v;
    u.rate = state.rate;
    u.pitch = state.pitch;
    u.volume = state.volume;
    u.onstart = () => {
      statusDot.classList.add('speaking');
      speakBtn.classList.add('speaking');
      speakBtn.querySelector('span').textContent = 'Speaking';
      if (state.bigMode) {
        bigText.textContent = clean;
        bigOverlay.classList.add('show');
      }
    };
    u.onend = u.onerror = () => {
      statusDot.classList.remove('speaking');
      speakBtn.classList.remove('speaking');
      speakBtn.querySelector('span').textContent = 'Speak';
      bigOverlay.classList.remove('show');
    };
    state.lastSpoken = clean;
    synth.speak(u);
    if (!opts || opts.clear !== false) {
      textInput.value = '';
      updateCharCount();
    }
  }

  function updateCharCount() {
    const n = textInput.value.length;
    charCount.textContent = n + ' char' + (n === 1 ? '' : 's');
    charCount.classList.toggle('warn', n > 200 && n <= 500);
    charCount.classList.toggle('over', n > 500);
    speakBtn.disabled = !textInput.value.trim();
  }

  function handleSpeakClick() {
    const txt = textInput.value.trim();
    if (!txt) { textInput.focus(); return; }
    speak(txt);
  }

  function handleRepeat() {
    if (!state.lastSpoken) { textInput.focus(); return; }
    speak(state.lastSpoken, { clear: false });
  }

  function handleClear() {
    textInput.value = '';
    updateCharCount();
    textInput.focus();
  }

  function allCategories() {
    const cats = [];
    for (const key in DEFAULT_PHRASES) cats.push({ key, label: DEFAULT_PHRASES[key].label, emergency: !!DEFAULT_PHRASES[key].emergency });
    cats.push({ key: 'mine', label: 'My Phrases' });
    return cats;
  }

  function renderCatTabs() {
    catTabs.innerHTML = '';
    allCategories().forEach((c) => {
      const b = document.createElement('button');
      b.type = 'button';
      b.className = 'cat-tab' + (c.key === state.activeCat ? ' active' : '');
      b.textContent = c.label;
      b.addEventListener('click', () => {
        state.activeCat = c.key;
        saveSettings();
        renderCatTabs();
        renderPhrases();
      });
      catTabs.appendChild(b);
    });
  }

  function phrasesForActive() {
    const key = state.activeCat;
    const base = DEFAULT_PHRASES[key] ? DEFAULT_PHRASES[key].phrases.slice() : [];
    const custom = (state.custom[key] || []).slice();
    return { base, custom, emergency: !!(DEFAULT_PHRASES[key] && DEFAULT_PHRASES[key].emergency) };
  }

  function renderPhrases() {
    phraseGrid.innerHTML = '';
    const { base, custom, emergency } = phrasesForActive();

    if (!base.length && !custom.length) {
      const empty = document.createElement('div');
      empty.className = 'empty-state';
      empty.textContent = state.activeCat === 'mine'
        ? 'No custom phrases yet. Tap "Add phrase" to create one.'
        : 'No phrases in this category.';
      phraseGrid.appendChild(empty);
      return;
    }

    base.forEach((p) => {
      const btn = document.createElement('button');
      btn.type = 'button';
      btn.className = 'phrase-btn' + (emergency ? ' emergency' : '');
      btn.textContent = p;
      btn.addEventListener('click', () => speak(p, { clear: false }));
      phraseGrid.appendChild(btn);
    });

    custom.forEach((p, i) => {
      const btn = document.createElement('button');
      btn.type = 'button';
      btn.className = 'phrase-btn custom';
      btn.textContent = p;
      btn.addEventListener('click', () => speak(p, { clear: false }));
      const del = document.createElement('span');
      del.className = 'phrase-delete';
      del.textContent = '\u00D7';
      del.setAttribute('role', 'button');
      del.setAttribute('aria-label', 'Delete phrase');
      del.addEventListener('click', (e) => {
        e.stopPropagation();
        if (confirm('Delete this phrase?\n\n"' + p + '"')) {
          state.custom[state.activeCat].splice(i, 1);
          saveCustom();
          renderPhrases();
        }
      });
      btn.appendChild(del);
      phraseGrid.appendChild(btn);
    });
  }

  function openSettings() {
    rateSlider.value = state.rate;
    pitchSlider.value = state.pitch;
    volSlider.value = state.volume;
    rateVal.textContent = Number(state.rate).toFixed(2) + 'x';
    pitchVal.textContent = Number(state.pitch).toFixed(2);
    volVal.textContent = Math.round(state.volume * 100) + '%';
    if (state.voiceURI) voiceSel.value = state.voiceURI;
    settingsOverlay.classList.add('show');
  }

  function openAddModal() {
    newPhrase.value = '';
    newCat.innerHTML = '';
    allCategories().forEach((c) => {
      const opt = document.createElement('option');
      opt.value = c.key;
      opt.textContent = c.label;
      newCat.appendChild(opt);
    });
    newCat.value = state.activeCat || 'mine';
    addOverlay.classList.add('show');
    setTimeout(() => newPhrase.focus(), 50);
  }

  textInput.addEventListener('input', updateCharCount);
  textInput.addEventListener('keydown', (e) => {
    if (e.key === 'Enter' && !e.shiftKey) {
      e.preventDefault();
      handleSpeakClick();
    }
  });

  speakBtn.addEventListener('click', handleSpeakClick);
  repeatBtn.addEventListener('click', handleRepeat);
  clearBtn.addEventListener('click', handleClear);

  settingsBtn.addEventListener('click', openSettings);
  closeSettings.addEventListener('click', () => {
    state.voiceURI = voiceSel.value;
    saveSettings();
    settingsOverlay.classList.remove('show');
  });
  settingsOverlay.addEventListener('click', (e) => {
    if (e.target === settingsOverlay) {
      state.voiceURI = voiceSel.value;
      saveSettings();
      settingsOverlay.classList.remove('show');
    }
  });

  voiceSel.addEventListener('change', () => {
    state.voiceURI = voiceSel.value;
    saveSettings();
  });
  rateSlider.addEventListener('input', () => {
    state.rate = parseFloat(rateSlider.value);
    rateVal.textContent = state.rate.toFixed(2) + 'x';
    saveSettings();
  });
  pitchSlider.addEventListener('input', () => {
    state.pitch = parseFloat(pitchSlider.value);
    pitchVal.textContent = state.pitch.toFixed(2);
    saveSettings();
  });
  volSlider.addEventListener('input', () => {
    state.volume = parseFloat(volSlider.value);
    volVal.textContent = Math.round(state.volume * 100) + '%';
    saveSettings();
  });
  testBtn.addEventListener('click', () => {
    const t = (testInput.value || '').trim() || 'Test.';
    speak(t, { clear: false });
  });

  bigBtn.addEventListener('click', () => {
    state.bigMode = !state.bigMode;
    bigBtn.style.color = state.bigMode ? 'var(--orange)' : 'var(--cyan)';
    bigBtn.style.borderColor = state.bigMode ? 'var(--orange)' : 'var(--bd)';
    bigBtn.title = 'Big text while speaking: ' + (state.bigMode ? 'ON' : 'OFF');
    saveSettings();
  });
  bigOverlay.addEventListener('click', () => bigOverlay.classList.remove('show'));

  addCustomBtn.addEventListener('click', openAddModal);
  cancelAdd.addEventListener('click', () => addOverlay.classList.remove('show'));
  addOverlay.addEventListener('click', (e) => {
    if (e.target === addOverlay) addOverlay.classList.remove('show');
  });
  saveAdd.addEventListener('click', () => {
    const txt = (newPhrase.value || '').trim();
    if (!txt) { newPhrase.focus(); return; }
    const cat = newCat.value || 'mine';
    if (!state.custom[cat]) state.custom[cat] = [];
    state.custom[cat].push(txt);
    saveCustom();
    addOverlay.classList.remove('show');
    state.activeCat = cat;
    saveSettings();
    renderCatTabs();
    renderPhrases();
  });
  newPhrase.addEventListener('keydown', (e) => {
    if (e.key === 'Enter') { e.preventDefault(); saveAdd.click(); }
  });

  document.addEventListener('keydown', (e) => {
    if (e.key === 'Escape') {
      settingsOverlay.classList.remove('show');
      addOverlay.classList.remove('show');
      bigOverlay.classList.remove('show');
    }
  });

  loadSettings();
  renderCatTabs();
  renderPhrases();
  updateCharCount();
  bigBtn.style.color = state.bigMode ? 'var(--orange)' : 'var(--cyan)';
  bigBtn.style.borderColor = state.bigMode ? 'var(--orange)' : 'var(--bd)';

  if (synth) {
    loadVoices();
    if (typeof synth.onvoiceschanged !== 'undefined') synth.onvoiceschanged = loadVoices;
  }

  if (!('ontouchstart' in window)) setTimeout(() => textInput.focus(), 100);
})();
</script>
</body>
</html>
