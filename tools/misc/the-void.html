<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
<meta name="description" content="The Void — a free, browser-based productivity tool from Korb Engineering. No signup, no downloads, works on mobile.">
<title>The Void</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<script src="../../vendor/peerjs-1.5.4.min.js"></script>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #050a0f;
    --surface: #0a1018;
    --surface2: #0e1520;
    --border: #1a2535;
    --cyan: #00d4ff;
    --orange: #ff6600;
    --green: #10b981;
    --red: #ef4444;
    --text: #e2e8f0;
    --text-dim: #64748b;
    --text-bright: #f8fafc;
    --cyan-glow: rgba(0, 212, 255, 0.15);
    --orange-glow: rgba(255, 102, 0, 0.15);
  }

  html, body {
    height: 100%;
    overflow: hidden;
    background: var(--bg);
    color: var(--text);
    font-family: 'JetBrains Mono', monospace;
    font-size: 16px;
    touch-action: manipulation;
    -webkit-tap-highlight-color: transparent;
    user-select: none;
  }

  /* Starfield background */
  .starfield {
    position: fixed;
    inset: 0;
    pointer-events: none;
    z-index: 0;
    overflow: hidden;
  }
  .star {
    position: absolute;
    border-radius: 50%;
    animation: twinkle ease-in-out infinite alternate;
  }
  @keyframes twinkle {
    0% { opacity: 0.1; }
    100% { opacity: 0.8; }
  }

  /* Floating particles */
  .particles {
    position: fixed;
    inset: 0;
    pointer-events: none;
    z-index: 1;
  }
  .particle {
    position: absolute;
    border-radius: 50%;
    opacity: 0;
    animation: drift linear infinite;
  }
  @keyframes drift {
    0% { opacity: 0; transform: translateY(0) translateX(0) scale(0.5); }
    10% { opacity: 0.5; }
    50% { transform: translateY(-50vh) translateX(30px) scale(1); }
    90% { opacity: 0.3; }
    100% { opacity: 0; transform: translateY(-100vh) translateX(-20px) scale(0.3); }
  }

  /* Nebula effect */
  .nebula {
    position: fixed;
    inset: 0;
    pointer-events: none;
    z-index: 0;
    background:
      radial-gradient(ellipse at 20% 80%, rgba(0,212,255,0.03) 0%, transparent 50%),
      radial-gradient(ellipse at 80% 20%, rgba(255,102,0,0.02) 0%, transparent 50%),
      radial-gradient(ellipse at 50% 50%, rgba(0,212,255,0.01) 0%, transparent 70%);
    animation: nebula-shift 30s ease-in-out infinite alternate;
  }
  @keyframes nebula-shift {
    0% { filter: hue-rotate(0deg); opacity: 0.8; }
    100% { filter: hue-rotate(20deg); opacity: 1; }
  }

  /* Screens */
  .screen { display: none; flex-direction: column; align-items: center; justify-content: center; height: 100%; width: 100%; position: relative; z-index: 2; }
  .screen.active { display: flex; }

  /* Join screen */
  #join-screen {
    gap: 20px;
    padding: 24px;
  }
  .void-title {
    font-size: 2.5rem;
    font-weight: 300;
    color: var(--cyan);
    letter-spacing: 0.3em;
    text-transform: uppercase;
    text-shadow: 0 0 40px rgba(0,212,255,0.3), 0 0 80px rgba(0,212,255,0.1);
    animation: title-pulse 4s ease-in-out infinite;
  }
  @keyframes title-pulse {
    0%, 100% { text-shadow: 0 0 40px rgba(0,212,255,0.3), 0 0 80px rgba(0,212,255,0.1); }
    50% { text-shadow: 0 0 60px rgba(0,212,255,0.5), 0 0 120px rgba(0,212,255,0.2); }
  }
  .void-subtitle {
    font-size: 0.75rem;
    font-weight: 300;
    color: var(--text-dim);
    letter-spacing: 0.15em;
    text-transform: uppercase;
    max-width: 340px;
    text-align: center;
    line-height: 1.8;
  }
  .btn-enter {
    background: linear-gradient(135deg, var(--cyan), #0099cc);
    color: var(--bg);
    border: none;
    font-family: inherit;
    font-size: 0.9rem;
    font-weight: 600;
    padding: 16px 48px;
    border-radius: 40px;
    cursor: pointer;
    letter-spacing: 0.15em;
    text-transform: uppercase;
    min-height: 52px;
    min-width: 200px;
    transition: transform 0.2s, box-shadow 0.3s;
  }
  .btn-enter:hover { transform: scale(1.05); box-shadow: 0 0 40px rgba(0,212,255,0.3); }
  .btn-enter:active { transform: scale(0.98); }
  .btn-enter:disabled { opacity: 0.3; cursor: not-allowed; transform: none; box-shadow: none; }

  .error-banner {
    background: rgba(239,68,68,0.1);
    border: 1px solid rgba(239,68,68,0.3);
    color: var(--red);
    padding: 12px 20px;
    border-radius: 8px;
    font-size: 0.75rem;
    max-width: 340px;
    text-align: center;
    display: none;
  }
  .error-banner.visible { display: block; }

  /* Void screen */
  #void-screen { padding: 0; justify-content: space-between; }

  .void-header {
    width: 100%;
    padding: 12px 16px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    font-size: 0.7rem;
    z-index: 10;
    background: linear-gradient(to bottom, var(--bg) 60%, transparent);
    flex-shrink: 0;
  }
  .header-left { display: flex; align-items: center; gap: 10px; }
  .header-right { display: flex; align-items: center; gap: 14px; }

  .conn-indicator {
    display: flex; align-items: center; gap: 6px;
  }
  .conn-dot {
    width: 7px; height: 7px; border-radius: 50%;
    background: var(--green);
    box-shadow: 0 0 6px var(--green);
    transition: background 0.3s, box-shadow 0.3s;
  }
  .conn-dot.warning { background: var(--orange); box-shadow: 0 0 6px var(--orange); }
  .conn-dot.error { background: var(--red); box-shadow: 0 0 6px var(--red); animation: blink 1s infinite; }
  @keyframes blink { 0%, 100% { opacity: 1; } 50% { opacity: 0.3; } }

  .conn-label { color: var(--text-dim); font-weight: 400; }
  .soul-count { color: var(--cyan); font-weight: 500; }

  /* Main void area */
  .void-main {
    flex: 1;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    width: 100%;
    position: relative;
    overflow: hidden;
    min-height: 0;
  }

  /* The void orb */
  .void-orb-container {
    position: relative;
    width: 220px;
    height: 220px;
    flex-shrink: 0;
  }
  .void-orb {
    width: 100%;
    height: 100%;
    border-radius: 50%;
    background: radial-gradient(circle at 40% 40%, var(--surface2) 0%, var(--surface) 40%, var(--bg) 70%, transparent 100%);
    box-shadow: 0 0 60px rgba(0,212,255,0.08), inset 0 0 40px rgba(0,212,255,0.03);
    position: relative;
    transition: box-shadow 0.3s;
    cursor: pointer;
  }
  .void-orb.active {
    box-shadow: 0 0 80px rgba(0,212,255,0.25), 0 0 140px rgba(0,212,255,0.08), inset 0 0 60px rgba(0,212,255,0.06);
  }
  .void-orb.resonating {
    box-shadow: 0 0 100px rgba(255,102,0,0.2), 0 0 160px rgba(0,212,255,0.15), inset 0 0 80px rgba(255,102,0,0.05);
  }
  .void-orb::before {
    content: '';
    position: absolute;
    inset: -2px;
    border-radius: 50%;
    border: 1px solid rgba(0,212,255,0.08);
    animation: pulse-ring 4s ease-in-out infinite;
  }
  .void-orb::after {
    content: '';
    position: absolute;
    inset: -8px;
    border-radius: 50%;
    border: 1px solid rgba(0,212,255,0.04);
    animation: pulse-ring 4s ease-in-out infinite 1s;
  }
  @keyframes pulse-ring {
    0%, 100% { transform: scale(1); opacity: 0.3; }
    50% { transform: scale(1.06); opacity: 0.7; }
  }

  /* Depth rings around orb */
  .depth-ring {
    position: absolute;
    border-radius: 50%;
    border: 1px solid;
    pointer-events: none;
    opacity: 0;
    transition: opacity 0.5s, border-color 0.5s;
  }

  /* Peers ring */
  .peers-ring {
    position: absolute;
    width: 340px;
    height: 340px;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
    pointer-events: none;
  }
  .peer-orb {
    position: absolute;
    width: 44px;
    height: 44px;
    border-radius: 50%;
    background: var(--surface);
    border: 1px solid var(--border);
    display: flex;
    align-items: center;
    justify-content: center;
    transition: box-shadow 0.3s, border-color 0.3s, transform 0.3s;
    pointer-events: auto;
  }
  .peer-orb.speaking {
    border-color: var(--cyan);
    box-shadow: 0 0 20px rgba(0,212,255,0.3);
    transform: scale(1.1);
  }
  .peer-orb .peer-label {
    position: absolute;
    bottom: -20px;
    font-size: 0.55rem;
    font-weight: 400;
    color: var(--text-dim);
    white-space: nowrap;
    text-align: center;
    max-width: 80px;
    overflow: hidden;
    text-overflow: ellipsis;
  }
  .peer-orb .peer-dot {
    width: 10px;
    height: 10px;
    border-radius: 50%;
    background: var(--cyan);
    opacity: 0.4;
    transition: opacity 0.2s, background 0.2s;
  }
  .peer-orb.speaking .peer-dot { opacity: 1; background: var(--cyan); box-shadow: 0 0 8px var(--cyan); }

  /* Whisper trail */
  .whisper-trail {
    position: absolute;
    pointer-events: none;
    width: 4px;
    height: 4px;
    border-radius: 50%;
    background: var(--cyan);
    opacity: 0;
    animation: whisper-float 3s ease-out forwards;
  }
  @keyframes whisper-float {
    0% { opacity: 0.6; transform: scale(1); }
    100% { opacity: 0; transform: scale(0.2) translateY(-60px); }
  }

  /* Void status */
  .void-status {
    margin-top: 24px;
    font-size: 0.75rem;
    font-weight: 300;
    color: var(--text-dim);
    text-align: center;
    min-height: 20px;
    transition: opacity 0.5s;
  }

  /* Controls */
  .controls {
    width: 100%;
    padding: 12px 16px 24px;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 10px;
    z-index: 10;
    background: linear-gradient(to top, var(--bg) 70%, transparent);
    flex-shrink: 0;
  }

  .ptt-btn {
    width: 80px;
    height: 80px;
    border-radius: 50%;
    border: 2px solid var(--cyan);
    background: rgba(0,212,255,0.05);
    color: var(--cyan);
    font-family: inherit;
    font-size: 0.55rem;
    font-weight: 500;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    cursor: pointer;
    transition: background 0.15s, box-shadow 0.15s, transform 0.1s;
    display: flex;
    align-items: center;
    justify-content: center;
    flex-direction: column;
    gap: 3px;
    -webkit-user-select: none;
    touch-action: manipulation;
    min-width: 80px;
    min-height: 80px;
  }
  .ptt-btn svg { width: 22px; height: 22px; fill: currentColor; }
  .ptt-btn:active, .ptt-btn.active {
    background: rgba(0,212,255,0.2);
    box-shadow: 0 0 40px rgba(0,212,255,0.3);
    transform: scale(0.95);
  }
  .ptt-btn.open-mic {
    border-color: var(--orange);
    color: var(--orange);
    background: rgba(255,102,0,0.05);
  }
  .ptt-btn.open-mic.active {
    background: rgba(255,102,0,0.2);
    box-shadow: 0 0 40px rgba(255,102,0,0.3);
  }
  .ptt-btn.muted {
    border-color: var(--border);
    color: #334155;
    background: transparent;
  }

  .ctrl-row {
    display: flex;
    gap: 8px;
    align-items: center;
    flex-wrap: wrap;
    justify-content: center;
  }

  .ctrl-btn {
    min-height: 44px;
    padding: 8px 16px;
    border-radius: 22px;
    border: 1px solid var(--border);
    background: var(--surface);
    color: var(--text-dim);
    font-family: inherit;
    font-size: 0.65rem;
    font-weight: 500;
    cursor: pointer;
    letter-spacing: 0.05em;
    transition: border-color 0.2s, color 0.2s, background 0.2s;
    white-space: nowrap;
    text-transform: uppercase;
  }
  .ctrl-btn:hover { border-color: var(--cyan); color: var(--text); }
  .ctrl-btn.active { border-color: var(--cyan); color: var(--cyan); background: rgba(0,212,255,0.05); }
  .ctrl-btn.danger { border-color: rgba(239,68,68,0.3); color: var(--red); }
  .ctrl-btn.danger:hover { background: rgba(239,68,68,0.05); border-color: var(--red); }
  .ctrl-btn.orange { border-color: rgba(255,102,0,0.3); color: var(--orange); }
  .ctrl-btn.orange:hover { background: rgba(255,102,0,0.05); }
  .ctrl-btn.orange.active { border-color: var(--orange); color: var(--orange); background: rgba(255,102,0,0.08); }

  .volume-control {
    display: flex;
    align-items: center;
    gap: 6px;
    font-size: 0.65rem;
    color: var(--text-dim);
  }
  .volume-control input[type="range"] {
    width: 70px;
    accent-color: var(--cyan);
    height: 4px;
  }

  /* Toast messages */
  .toast-container {
    position: fixed;
    top: 50px;
    left: 50%;
    transform: translateX(-50%);
    z-index: 100;
    display: flex;
    flex-direction: column;
    gap: 6px;
    pointer-events: none;
    max-width: 90vw;
  }
  .toast {
    background: var(--surface2);
    border: 1px solid var(--border);
    padding: 10px 20px;
    border-radius: 8px;
    font-size: 0.7rem;
    font-weight: 400;
    color: var(--text-dim);
    animation: toast-in 0.3s ease, toast-out 0.3s ease 3s forwards;
    white-space: nowrap;
    text-align: center;
  }
  @keyframes toast-in { from { opacity: 0; transform: translateY(-10px); } to { opacity: 1; transform: none; } }
  @keyframes toast-out { from { opacity: 1; } to { opacity: 0; transform: translateY(-10px); } }

  /* Spinner */
  .spinner {
    width: 24px;
    height: 24px;
    border: 2px solid transparent;
    border-top-color: var(--cyan);
    border-radius: 50%;
    animation: spin 0.8s linear infinite;
    display: none;
  }
  .spinner.active { display: block; }
  @keyframes spin { to { transform: rotate(360deg); } }

  /* Scrollbar */
  ::-webkit-scrollbar { width: 4px; }
  ::-webkit-scrollbar-track { background: transparent; }
  ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }

  /* Responsive */
  @media (max-width: 400px) {
    .void-title { font-size: 1.8rem; }
    .void-orb-container { width: 160px; height: 160px; }
    .peers-ring { width: 270px; height: 270px; }
  }
  @media (min-width: 768px) {
    .void-orb-container { width: 280px; height: 280px; }
    .peers-ring { width: 440px; height: 440px; }
  }
</style>
</head>
<body>

<div class="starfield" id="starfield"></div>
<div class="nebula"></div>
<div class="particles" id="particles"></div>
<div class="toast-container" id="toasts"></div>

<!-- JOIN SCREEN -->
<div class="screen active" id="join-screen">
  <div class="void-title">The Void</div>
  <div class="void-subtitle">A communal audio space. No accounts. No hosts. Just voices in darkness. Anyone can join and speak.</div>
  <div class="error-banner" id="join-error"></div>
  <button class="btn-enter" id="enter-btn">Enter The Void</button>
  <div class="spinner" id="join-spinner"></div>
</div>

<!-- VOID SCREEN -->
<div class="screen" id="void-screen">
  <div class="void-header">
    <div class="header-left">
      <div class="conn-indicator">
        <div class="conn-dot" id="conn-dot"></div>
        <span class="conn-label" id="conn-label">Connected</span>
      </div>
    </div>
    <div class="header-right">
      <span class="soul-count" id="soul-count">1 soul</span>
    </div>
  </div>

  <div class="void-main" id="void-main">
    <div class="peers-ring" id="peers-ring"></div>
    <div class="void-orb-container" id="void-orb-container">
      <div class="void-orb" id="void-orb"></div>
    </div>
    <div class="void-status" id="void-status">You are alone in the void.</div>
  </div>

  <div class="controls">
    <button class="ptt-btn" id="ptt-btn">
      <svg viewBox="0 0 24 24"><path d="M12 14c1.66 0 3-1.34 3-3V5c0-1.66-1.34-3-3-3S9 3.34 9 5v6c0 1.66 1.34 3 3 3zm-1-9c0-.55.45-1 1-1s1 .45 1 1v6c0 .55-.45 1-1 1s-1-.45-1-1V5z"/><path d="M17 11c0 2.76-2.24 5-5 5s-5-2.24-5-5H5c0 3.53 2.61 6.43 6 6.92V21h2v-3.08c3.39-.49 6-3.39 6-6.92h-2z"/></svg>
      <span>Hold</span>
    </button>
    <div class="ctrl-row">
      <button class="ctrl-btn" id="mute-btn">Mute</button>
      <button class="ctrl-btn" id="mode-btn">PTT Mode</button>
      <button class="ctrl-btn orange" id="audio-btn">Ambient</button>
      <div class="volume-control">
        <span>Vol</span>
        <input type="range" id="volume-slider" min="0" max="100" value="80">
      </div>
    </div>
    <div class="ctrl-row">
      <button class="ctrl-btn danger" id="leave-btn">Exit Void</button>
    </div>
  </div>
</div>

<script>
(function() {
  'use strict';

  // ========================================
  // PERSISTENCE LAYER
  // ========================================
  const STORE_PREFIX = 'korb_void_';

  function store(key, value) {
    try { localStorage.setItem(STORE_PREFIX + key, JSON.stringify(value)); } catch (e) {}
  }
  function load(key, fallback) {
    try {
      const v = localStorage.getItem(STORE_PREFIX + key);
      return v !== null ? JSON.parse(v) : fallback;
    } catch (e) { return fallback; }
  }

  // Persistent state (audio preferences only)
  const persistence = {
    audioPrefs: load('audioPrefs', { volume: 80, openMic: true, ambient: false }),
  };

  function saveAll() {
    store('audioPrefs', persistence.audioPrefs);
  }

  // Auto-save interval
  let autoSaveInterval = null;
  function startAutoSave() {
    if (autoSaveInterval) clearInterval(autoSaveInterval);
    autoSaveInterval = setInterval(saveAll, 30000);
  }

  // ========================================
  // BROWSER COMPAT CHECK
  // ========================================
  if (!navigator.mediaDevices || !navigator.mediaDevices.getUserMedia) {
    document.getElementById('join-error').textContent = 'Browser does not support audio. Use a modern browser.';
    document.getElementById('join-error').classList.add('visible');
    document.getElementById('enter-btn').disabled = true;
    return;
  }

  // ========================================
  // CONSTANTS
  // ========================================
  const LOBBY_ID = 'korb-void-lobby-v3';
  const ID_PREFIX = 'kv3-';
  const MAX_PEERS = 20;
  const HEARTBEAT_MS = 8000;
  const STALE_PEER_MS = 90000;     // 90s — very generous for mobile/network hiccups
  const IDLE_TIMEOUT_MS = 2 * 60 * 60 * 1000;  // 2 hours
  const IDLE_WARN_MS = 115 * 60 * 1000;         // warn at 1h55m
  const CONN_TIMEOUT_MS = 20000;
  const NOISE_GATE = 0.012;
  const RECONNECT_MAX_MS = 30000;
  const PEER_RECONNECT_DELAY = 3000;
  const PEER_RECONNECT_MAX = 8;    // more retries before giving up
  const LOBBY_RECHECK_MS = 20000;  // re-check lobby health every 20s
  const STREAM_HEALTH_MS = 15000;  // check mic/audio stream health
  const ICE_RESTART_TIMEOUT = 10000; // wait before ICE restart

  // ========================================
  // STATE
  // ========================================
  let myPeer = null;
  let myId = '';
  let myName = '';
  let isLobbyHost = false;
  let localStream = null;
  let audioCtx = null;
  let localAnalyser = null;
  let isMuted = false;
  let isOpenMic = persistence.audioPrefs.openMic !== false;
  let isPTTActive = false;
  let masterVolume = persistence.audioPrefs.volume / 100;
  let ambientOn = persistence.audioPrefs.ambient;
  let sessionStartTime = 0;
  let idleTimer = null;
  let idleWarnTimer = null;
  let heartbeatInterval = null;
  let animFrameId = null;
  let reconnectAttempts = 0;
  let isReconnecting = false;
  let destroyed = false;
  let ambientNodes = {};

  // Peers: { peerId: { conn, call, audioEl, name, analyser, gainNode, lastHeartbeat, reconnectAttempts, reconnecting, iceState } }
  const peers = {};
  let peerRegistry = {};
  let lobbyHealthTimer = null;
  let streamHealthTimer = null;
  let connectionQuality = 'good'; // 'good', 'degraded', 'poor'

  // ========================================
  // DOM REFS
  // ========================================
  const $ = id => document.getElementById(id);
  const joinScreen = $('join-screen');
  const voidScreen = $('void-screen');
  const enterBtn = $('enter-btn');
  const joinError = $('join-error');
  const joinSpinner = $('join-spinner');
  const connDot = $('conn-dot');
  const connLabel = $('conn-label');
  const soulCount = $('soul-count');
  const peersRing = $('peers-ring');
  const voidOrb = $('void-orb');
  const voidOrbContainer = $('void-orb-container');
  const voidMain = $('void-main');
  const voidStatus = $('void-status');
  const pttBtn = $('ptt-btn');
  const muteBtn = $('mute-btn');
  const modeBtn = $('mode-btn');
  const audioBtn = $('audio-btn');
  const volumeSlider = $('volume-slider');
  const leaveBtn = $('leave-btn');

  // ========================================
  // STARFIELD + PARTICLES
  // ========================================
  (function initStarfield() {
    const sf = $('starfield');
    for (let i = 0; i < 80; i++) {
      const s = document.createElement('div');
      s.className = 'star';
      const size = 1 + Math.random() * 2;

  // ========================================
  // AMBIENT AUDIO (Web Audio API)
  // ========================================
  function createAmbient() {
    if (!audioCtx) return;
    try {
      // Deep drone
      const droneGain = audioCtx.createGain();
      droneGain.gain.value = 0;
      droneGain.connect(audioCtx.destination);

      const osc1 = audioCtx.createOscillator();
      osc1.type = 'sine';
      osc1.frequency.value = 55;
      const osc1Gain = audioCtx.createGain();
      osc1Gain.gain.value = 0.08;
      osc1.connect(osc1Gain);
      osc1Gain.connect(droneGain);
      osc1.start();

      const osc2 = audioCtx.createOscillator();
      osc2.type = 'sine';
      osc2.frequency.value = 82.5;
      const osc2Gain = audioCtx.createGain();
      osc2Gain.gain.value = 0.04;
      osc2.connect(osc2Gain);
      osc2Gain.connect(droneGain);
      osc2.start();

      // Sub bass rumble
      const osc3 = audioCtx.createOscillator();
      osc3.type = 'sine';
      osc3.frequency.value = 33;
      const osc3Gain = audioCtx.createGain();
      osc3Gain.gain.value = 0.05;
      osc3.connect(osc3Gain);
      osc3Gain.connect(droneGain);
      osc3.start();

      // Shimmer - filtered noise
      const bufferSize = audioCtx.sampleRate * 2;
      const noiseBuffer = audioCtx.createBuffer(1, bufferSize, audioCtx.sampleRate);
      const noiseData = noiseBuffer.getChannelData(0);
      for (let i = 0; i < bufferSize; i++) noiseData[i] = (Math.random() * 2 - 1) * 0.5;

      const noiseSource = audioCtx.createBufferSource();
      noiseSource.buffer = noiseBuffer;
      noiseSource.loop = true;

      const noiseFilter = audioCtx.createBiquadFilter();
      noiseFilter.type = 'bandpass';
      noiseFilter.frequency.value = 800;
      noiseFilter.Q.value = 0.5;

      const noiseGain = audioCtx.createGain();
      noiseGain.gain.value = 0.012;

      noiseSource.connect(noiseFilter);
      noiseFilter.connect(noiseGain);
      noiseGain.connect(droneGain);
      noiseSource.start();

      // Slow LFO on filter frequency for movement
      const lfo = audioCtx.createOscillator();
      lfo.type = 'sine';
      lfo.frequency.value = 0.05;
      const lfoGain = audioCtx.createGain();
      lfoGain.gain.value = 400;
      lfo.connect(lfoGain);
      lfoGain.connect(noiseFilter.frequency);
      lfo.start();

      // Slow frequency drift on drones
      const droneLfo = audioCtx.createOscillator();
      droneLfo.type = 'sine';
      droneLfo.frequency.value = 0.02;
      const droneLfoGain = audioCtx.createGain();
      droneLfoGain.gain.value = 0.5;
      droneLfo.connect(droneLfoGain);
      droneLfoGain.connect(osc1.frequency);
      droneLfo.start();

      ambientNodes = { droneGain, osc1, osc2, osc3, noiseSource, lfo, droneLfo };

      if (ambientOn) fadeAmbient(true);
    } catch (e) {
      console.warn('Ambient audio error:', e);
    }
  }

  function fadeAmbient(on) {
    if (!ambientNodes.droneGain || !audioCtx) return;
    try {
      const now = audioCtx.currentTime;
      ambientNodes.droneGain.gain.cancelScheduledValues(now);
      ambientNodes.droneGain.gain.setValueAtTime(ambientNodes.droneGain.gain.value, now);
      ambientNodes.droneGain.gain.linearRampToValueAtTime(on ? masterVolume * 0.5 : 0, now + 2);
    } catch (e) {}
  }

  function cleanupAmbient() {
    try {
      if (ambientNodes.osc1) ambientNodes.osc1.stop();
      if (ambientNodes.osc2) ambientNodes.osc2.stop();
      if (ambientNodes.osc3) ambientNodes.osc3.stop();
      if (ambientNodes.noiseSource) ambientNodes.noiseSource.stop();
      if (ambientNodes.lfo) ambientNodes.lfo.stop();
      if (ambientNodes.droneLfo) ambientNodes.droneLfo.stop();
    } catch (e) {}
    ambientNodes = {};
  }

  // Occasional resonance chime
  function playResonance() {
    if (!audioCtx || !ambientOn) return;
    try {
      const freq = [220, 330, 440, 550, 660][Math.floor(Math.random() * 5)];
      const osc = audioCtx.createOscillator();
      osc.type = 'sine';
      osc.frequency.value = freq;

      const gain = audioCtx.createGain();
      gain.gain.value = 0;

      const now = audioCtx.currentTime;
      gain.gain.setValueAtTime(0, now);
      gain.gain.linearRampToValueAtTime(masterVolume * 0.06, now + 0.5);
      gain.gain.exponentialRampToValueAtTime(0.001, now + 4);

      osc.connect(gain);
      gain.connect(audioCtx.destination);
      osc.start(now);
      osc.stop(now + 4);
    } catch (e) {}
  }

  // Schedule random resonance chimes
  let resonanceTimer = null;
  function scheduleResonance() {
    if (resonanceTimer) clearTimeout(resonanceTimer);
    const delay = 15000 + Math.random() * 30000;
    resonanceTimer = setTimeout(() => {
      playResonance();
      scheduleResonance();
    }, delay);
  }

  // ========================================
  // AUDIO SETUP
  // ========================================
  async function setupAudio() {
    try {
      localStream = await navigator.mediaDevices.getUserMedia({
        audio: {
          echoCancellation: true,
          noiseSuppression: true,
          autoGainControl: true,
          sampleRate: 48000,       // consistent quality
          channelCount: 1          // mono is fine for voice
        }
      });
      localStream.getAudioTracks().forEach(t => {
        t.enabled = false;
        // Monitor track ending (OS kills mic, BT disconnects, etc.)
        t.onended = () => {
          console.warn('Mic track ended unexpectedly, attempting recovery');
          toast('Microphone disconnected. Recovering...');
          recoverMicrophone();
        };
        t.onmute = () => {
          console.warn('Mic track muted by system');
        };
        t.onunmute = () => {
          console.log('Mic track unmuted by system');
        };
      });

      audioCtx = new (window.AudioContext || window.webkitAudioContext)();
      if (audioCtx.state === 'suspended') await audioCtx.resume();

      const src = audioCtx.createMediaStreamSource(localStream);
      localAnalyser = audioCtx.createAnalyser();
      localAnalyser.fftSize = 256;
      src.connect(localAnalyser);

      // Monitor AudioContext state changes
      audioCtx.onstatechange = () => {
        if (audioCtx.state === 'suspended' && !document.hidden) {
          audioCtx.resume().catch(() => {});
        }
      };

      return true;
    } catch (e) {
      console.error('Mic error:', e);
      // Fall back to no-mic mode
      if (e.name === 'NotAllowedError' || e.name === 'NotFoundError') {
        toast('No microphone - entering listen-only mode');
        audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        if (audioCtx.state === 'suspended') await audioCtx.resume();
        return true; // allow entry without mic
      }
      showError('Audio setup failed. Check microphone permissions.');
      return false;
    }
  }

  // Recover from microphone loss (BT disconnect, OS kill, device change)
  async function recoverMicrophone() {
    try {
      const newStream = await navigator.mediaDevices.getUserMedia({
        audio: { echoCancellation: true, noiseSuppression: true, autoGainControl: true }
      });

      // Preserve mute state
      newStream.getAudioTracks().forEach(t => {
        t.enabled = !isMuted && (isOpenMic || isPTTActive);
        t.onended = () => { recoverMicrophone(); };
      });

      const oldStream = localStream;
      localStream = newStream;

      // Rebuild analyser
      if (audioCtx) {
        try {
          const src = audioCtx.createMediaStreamSource(newStream);
          localAnalyser = audioCtx.createAnalyser();
          localAnalyser.fftSize = 256;
          src.connect(localAnalyser);
        } catch(e) {}
      }

      // Replace stream in all active calls
      for (const pid in peers) {
        const p = peers[pid];
        if (p.call && p.call.open) {
          try {
            // PeerJS doesn't support replaceTrack, so re-call
            p.call.close();
            const call = myPeer.call(pid, localStream);
            if (call) {
              p.call = call;
              call.on('stream', (rs) => { try { setupRemoteAudio(pid, rs); } catch(e) {} });
              call.on('close', () => attemptPeerReconnect(pid));
              call.on('error', () => attemptPeerReconnect(pid));
            }
          } catch(e) {}
        }
      }

      // Stop old tracks
      if (oldStream) {
        try { oldStream.getTracks().forEach(t => t.stop()); } catch(e) {}
      }

      toast('Microphone recovered.');
    } catch(e) {
      console.warn('Mic recovery failed:', e);
      toast('Mic recovery failed. You are in listen-only mode.');
      localStream = null;
    }
  }

  // Periodic stream health monitoring
  function startStreamHealthCheck() {
    if (streamHealthTimer) clearInterval(streamHealthTimer);
    streamHealthTimer = setInterval(() => {
      if (destroyed) { clearInterval(streamHealthTimer); return; }

      // Check mic stream is alive
      if (localStream) {
        const tracks = localStream.getAudioTracks();
        if (tracks.length === 0 || tracks.every(t => t.readyState === 'ended')) {
          console.warn('All mic tracks ended, recovering');
          recoverMicrophone();
        }
      }

      // Check AudioContext health
      if (audioCtx && audioCtx.state === 'suspended') {
        audioCtx.resume().catch(() => {});
      }
      if (audioCtx && audioCtx.state === 'closed') {
        console.warn('AudioContext closed, recreating');
        try {
          audioCtx = new (window.AudioContext || window.webkitAudioContext)();
          audioCtx.resume().catch(() => {});
          if (localStream) {
            const src = audioCtx.createMediaStreamSource(localStream);
            localAnalyser = audioCtx.createAnalyser();
            localAnalyser.fftSize = 256;
            src.connect(localAnalyser);
          }
          if (ambientOn) { createAmbient(); fadeAmbient(true); }
        } catch(e) {}
      }

      // Check remote audio elements are playing
      for (const pid in peers) {
        const p = peers[pid];
        if (p.audioEl && p.audioEl.paused && p.audioEl.srcObject) {
          p.audioEl.play().catch(() => {});
        }
      }

      // Update connection quality indicator
      updateConnectionQuality();
    }, STREAM_HEALTH_MS);
  }

  function updateConnectionQuality() {
    const total = peerCount();
    if (total === 0) { connectionQuality = 'good'; return; }

    let healthy = 0;
    for (const pid in peers) {
      const p = peers[pid];
      const hasData = p.conn && p.conn.open;
      const hasAudio = p.call && p.call.open;
      const fresh = (Date.now() - (p.lastHeartbeat || 0)) < HEARTBEAT_MS * 4;
      if (hasData && hasAudio && fresh) healthy++;
      else if (hasData || fresh) healthy += 0.5;
    }

    const ratio = healthy / total;
    if (ratio >= 0.8) connectionQuality = 'good';
    else if (ratio >= 0.5) connectionQuality = 'degraded';
    else connectionQuality = 'poor';

    // Update visual indicator
    connDot.classList.remove('warning');
    if (connectionQuality === 'degraded') connDot.classList.add('warning');
    else if (connectionQuality === 'poor') { connDot.className = 'conn-dot error'; }
  }

  // ========================================
  // ICE CONNECTION STATE MONITORING
  // ========================================
  function monitorICE(peerId, call) {
    if (!call || !call.peerConnection) return;
    const pc = call.peerConnection;

    pc.oniceconnectionstatechange = () => {
      if (!peers[peerId]) return;
      const state = pc.iceConnectionState;
      peers[peerId].iceState = state;
      console.log('ICE state for', peerId, ':', state);

      switch (state) {
        case 'connected':
        case 'completed':
          // Connection healthy — reset reconnect counter
          peers[peerId].reconnectAttempts = 0;
          peers[peerId].lastHeartbeat = Date.now();
          break;

        case 'disconnected':
          // Temporary — wait and see if it recovers before acting
          console.warn('ICE disconnected for', peerId, '— waiting for recovery');
          setTimeout(() => {
            if (!peers[peerId]) return;
            // If still disconnected after timeout, try ICE restart
            if (pc.iceConnectionState === 'disconnected') {
              console.log('ICE still disconnected, attempting restart for', peerId);
              try {
                // Create a new offer with iceRestart to force new candidates
                pc.createOffer({ iceRestart: true }).then(offer => {
                  return pc.setLocalDescription(offer);
                }).catch(e => {
                  console.warn('ICE restart failed for', peerId, e);
                  attemptPeerReconnect(peerId);
                });
              } catch(e) {
                attemptPeerReconnect(peerId);
              }
            }
          }, ICE_RESTART_TIMEOUT);
          break;

        case 'failed':
          // ICE failed — full reconnect needed
          console.warn('ICE failed for', peerId, '— triggering reconnect');
          attemptPeerReconnect(peerId);
          break;

        case 'closed':
          // Connection closed — reconnect
          attemptPeerReconnect(peerId);
          break;
      }
    };

    // Also monitor connection state (more reliable on some browsers)
    if (pc.onconnectionstatechange !== undefined) {
      pc.onconnectionstatechange = () => {
        if (!peers[peerId]) return;
        const state = pc.connectionState;
        console.log('Connection state for', peerId, ':', state);

        if (state === 'failed') {
          attemptPeerReconnect(peerId);
        } else if (state === 'connected') {
          peers[peerId].reconnectAttempts = 0;
          peers[peerId].lastHeartbeat = Date.now();
        }
      };
    }
  }

  // ========================================
  // AUDIO LEVEL DETECTION
  // ========================================
  function getLevel(analyser) {
    if (!analyser) return 0;
    try {
      const data = new Uint8Array(analyser.frequencyBinCount);
      analyser.getByteTimeDomainData(data);
      let sum = 0;
      for (let i = 0; i < data.length; i++) {
        const v = (data[i] - 128) / 128;
        sum += v * v;
      }
      return Math.sqrt(sum / data.length);
    } catch (e) { return 0; }
  }

  function setTransmitting(on) {
    if (!localStream) return;
    const send = on && !isMuted;
    try { localStream.getAudioTracks().forEach(t => t.enabled = send); } catch (e) {}
  }

  function updateTransmitState() {
    if (isOpenMic && !isMuted) setTransmitting(true);
    else if (isPTTActive && !isMuted) setTransmitting(true);
    else setTransmitting(false);
  }

  // ========================================

  function renderPeers() {

  // ========================================
  // ANIMATION LOOP
  // ========================================
  function animLoop() {
    if (destroyed) return;

    // Orb pulse from local audio
    const level = getLevel(localAnalyser);
    const active = level > NOISE_GATE && !isMuted && (isOpenMic || isPTTActive);
    voidOrb.classList.toggle('active', active);

    // Peer speaking indicators
    for (const id in peers) {
      const p = peers[id];
      if (p.analyser) {
        const pl = getLevel(p.analyser);
        const orbEl = document.getElementById('peer-' + id.replace(/[^a-zA-Z0-9-]/g, ''));
        if (orbEl) orbEl.classList.toggle('speaking', pl > NOISE_GATE);
      }
    }

    animFrameId = requestAnimationFrame(animLoop);
  }

  // ========================================
  // PEERJS - RESILIENT CONNECTION
  // ========================================
  function initPeer() {
    return new Promise((resolve, reject) => {
      myId = genId();
      try {
        myPeer = new Peer(myId, {
          debug: 0,
          config: {
            iceServers: [
              { urls: 'stun:stun.l.google.com:19302' },
              { urls: 'stun:stun1.l.google.com:19302' },
              { urls: 'stun:stun2.l.google.com:19302' },
              { urls: 'stun:stun3.l.google.com:19302' },
              { urls: 'stun:stun4.l.google.com:19302' },
              // Free TURN servers for NAT traversal (symmetric NAT, mobile carriers)
              { urls: 'turn:openrelay.metered.ca:80', username: 'openrelayproject', credential: 'openrelayproject' },
              { urls: 'turn:openrelay.metered.ca:443', username: 'openrelayproject', credential: 'openrelayproject' },
              { urls: 'turn:openrelay.metered.ca:443?transport=tcp', username: 'openrelayproject', credential: 'openrelayproject' }
            ],
            iceCandidatePoolSize: 10
          }
        });
      } catch (e) {
        reject(new Error('PeerJS init failed'));
        return;
      }

      const timeout = setTimeout(() => reject(new Error('Connection timeout')), CONN_TIMEOUT_MS);

      myPeer.on('open', () => {
        clearTimeout(timeout);
        reconnectAttempts = 0;
        isReconnecting = false;
        resolve(myId);
      });

      myPeer.on('error', (err) => {
        console.warn('Peer error:', err.type, err.message);
        if (err.type === 'unavailable-id') {
          clearTimeout(timeout);
          resolve(myId);
        } else if (err.type === 'peer-unavailable') {
          // Normal - peer went away
        } else if (err.type === 'network' || err.type === 'server-error' || err.type === 'socket-error') {
          if (!isReconnecting) attemptReconnect();
        } else {
          // Unknown error - don't crash
          console.warn('Unhandled peer error type:', err.type);
        }
      });

      myPeer.on('disconnected', () => {
        if (destroyed) return;
        setConnStatus('reconnecting');
        logDiscovery('Connection lost, reconnecting...');
        attemptReconnect();
      });

      myPeer.on('close', () => {
        if (destroyed) return;
        setConnStatus('disconnected');
      });

      myPeer.on('connection', (conn) => {
        try { handleDataConn(conn); } catch (e) { console.warn('Incoming conn error:', e); }
      });

      myPeer.on('call', (call) => {
        try {
          if (localStream) call.answer(localStream);
          else call.answer(); // answer without stream (listen-only)
          handleIncomingCall(call);
        } catch (e) { console.warn('Incoming call error:', e); }
      });
    });
  }

  function attemptReconnect() {
    if (destroyed || isReconnecting) return;
    isReconnecting = true;
    setConnStatus('reconnecting');

    const delay = Math.min(1000 * Math.pow(2, reconnectAttempts), RECONNECT_MAX_MS);
    reconnectAttempts++;

    setTimeout(async () => {
      if (destroyed) { isReconnecting = false; return; }
      try {
        if (myPeer && !myPeer.destroyed && myPeer.disconnected) {
          myPeer.reconnect();
          // Wait a moment for reconnect to take effect
          await new Promise(r => setTimeout(r, 2000));
          if (myPeer && !myPeer.disconnected) {
            reconnectAttempts = 0;
            setConnStatus('connected');
            toast('Reconnected.');
            tryJoinLobby();
          }
        } else if (!myPeer || myPeer.destroyed) {
          await fullReconnect();
        }
      } catch (e) {
        console.warn('Reconnect error:', e);
        if (reconnectAttempts < 15) {
          isReconnecting = false;
          attemptReconnect();
          return;
        } else {
          setConnStatus('single');
          toast('Running in solo mode. Will keep trying...');
          // Keep trying in background at longer intervals
          setTimeout(() => { isReconnecting = false; attemptReconnect(); }, 60000);
          return;
        }
      }
      isReconnecting = false;
    }, delay);
  }

  async function fullReconnect() {
    try {
      if (myPeer) { try { myPeer.destroy(); } catch(e) {} }
      await initPeer();
      reconnectAttempts = 0;
      setConnStatus('connected');
      toast('Reconnected.');
      tryJoinLobby();
    } catch (e) {
      console.warn('Full reconnect failed:', e);
      throw e; // propagate so attemptReconnect can retry
    }
  }

  // ========================================
  // DATA CONNECTION HANDLING
  // ========================================
  function handleDataConn(conn) {
    if (!conn) return;

    conn.on('open', () => {
      conn.on('data', (data) => {
        try { processMessage(conn, data); } catch (e) { console.warn('Message handling error:', e); }
      });
      conn.on('error', (e) => { console.warn('Data conn error:', e); });
    });

    conn.on('error', (e) => { console.warn('Data conn setup error:', e); });
  }

  function processMessage(conn, data) {
    if (!data || !data.type) return;

    switch (data.type) {
      case 'register':
        if (isLobbyHost) {
          if (Object.keys(peerRegistry).length >= MAX_PEERS) {
            try { conn.send({ type: 'full' }); } catch(e) {}
            return;
          }
          peerRegistry[data.peerId] = 'Soul';
          try {
            conn.send({ type: 'peer-list', peers: { ...peerRegistry }, lobbyHost: myId });
          } catch (e) {}
          broadcastNewPeer(data.peerId, 'Soul');
          logDiscovery('A soul registered.');
        }
        break;

      case 'peer-list':
        peerRegistry = data.peers || {};
        connectToAllPeers();
        break;

      case 'full':
        toast('The void is full. Try again later.');
        logDiscovery('Void was full.');
        break;

      case 'heartbeat':
        try { conn.send({ type: 'heartbeat-ack' }); } catch(e) {}
        break;

      case 'heartbeat-ack':
        // Mark peer alive
        for (const pid in peers) {
          if (peers[pid].conn === conn) { peers[pid].lastHeartbeat = Date.now(); break; }
        }
        break;

      case 'lobby-transfer':
        becomeLobbyHost(data.peerRegistry || {});
        toast('You are now the void anchor.');
        logDiscovery('Promoted to lobby host.');
        break;

      case 'new-peer':
        if (data.peerId && data.peerId !== myId && !peers[data.peerId]) {
          connectToPeer(data.peerId, data.name);
        }
        break;

      case 'peer-left':
        removePeer(data.peerId, true);
        break;

      case 'presence':
        // Periodic presence update from peer
        if (data.peerId && peers[data.peerId]) {
          peers[data.peerId].lastHeartbeat = Date.now();
        }
        break;
    }
  }

  function broadcastNewPeer(newId, name) {
    for (const pid in peers) {
      if (pid === newId) continue;
      const p = peers[pid];
      if (p.conn && p.conn.open) {
        try { p.conn.send({ type: 'new-peer', peerId: newId, name: name }); } catch(e) {}
      }
    }
  }

  function broadcastPeerLeft(leftId) {
    for (const pid in peers) {
      const p = peers[pid];
      if (p.conn && p.conn.open) {
        try { p.conn.send({ type: 'peer-left', peerId: leftId }); } catch(e) {}
      }
    }
  }

  // ========================================
  // PEER CONNECTION
  // ========================================
  function connectToPeer(peerId, name) {
    if (peers[peerId] || peerId === myId || !myPeer || myPeer.destroyed) return;

    peers[peerId] = {
      name: 'Soul',
      conn: null, call: null, audioEl: null, analyser: null, gainNode: null,
      lastHeartbeat: Date.now()
    };

    // Data
    try {
      const conn = myPeer.connect(peerId, { reliable: true });
      peers[peerId].conn = conn;
      handleDataConn(conn);
      conn.on('close', () => {
        if (peers[peerId] && !peers[peerId].reconnecting) {
          setTimeout(() => reconnectDataConn(peerId), PEER_RECONNECT_DELAY);
        }
      });
      conn.on('error', () => {});
    } catch (e) {
      console.warn('Data connect error to', peerId, e);
    }

    // Audio
    try {
      if (localStream) {
        const call = myPeer.call(peerId, localStream);
        if (call) {
          peers[peerId].call = call;
          call.on('stream', (remoteStream) => {
            try { setupRemoteAudio(peerId, remoteStream); } catch(e) {}
          });
          call.on('close', () => attemptPeerReconnect(peerId));
          call.on('error', (e) => {
            console.warn('Call error with', peerId, e);
          });
          // Monitor ICE connection state for this call
          monitorICE(peerId, call);
        }
      }
    } catch (e) {
      console.warn('Call setup error to', peerId, e);
    }

    toast('A presence drifts near.');
    renderPeers();
    updateSoulCount();
  }

  function handleIncomingCall(call) {
    if (!call) return;
    const peerId = call.peer;

    if (!peers[peerId]) {
      peers[peerId] = {
        name: 'Soul',
        conn: null, call: null, audioEl: null, analyser: null, gainNode: null,
        lastHeartbeat: Date.now()
      };
    }
    peers[peerId].call = call;

    call.on('stream', (remoteStream) => {
      try { setupRemoteAudio(peerId, remoteStream); } catch(e) {}
    });
    call.on('close', () => attemptPeerReconnect(peerId));
    call.on('error', (e) => { console.warn('Incoming call error:', e); });
    monitorICE(peerId, call);

    renderPeers();
    updateSoulCount();
  }

  function setupRemoteAudio(peerId, stream) {
    if (!peers[peerId]) return;

    // Clean existing
    if (peers[peerId].audioEl) {
      try { peers[peerId].audioEl.srcObject = null; peers[peerId].audioEl.remove(); } catch(e) {}
    }

    const audio = document.createElement('audio');
    audio.srcObject = stream;
    audio.volume = masterVolume;
    audio.autoplay = true;
    audio.playsInline = true;
    // Prevent iOS from killing audio
    audio.setAttribute('playsinline', '');
    audio.setAttribute('webkit-playsinline', '');
    document.body.appendChild(audio);

    // Robust play with retry
    const tryPlay = (attempt) => {
      audio.play().catch((e) => {
        if (attempt < 3) {
          setTimeout(() => tryPlay(attempt + 1), 500 * (attempt + 1));
        }
      });
    };
    tryPlay(0);

    // Handle audio element errors
    audio.onerror = () => {
      console.warn('Audio element error for peer', peerId);
      if (peers[peerId]) {
        setTimeout(() => {
          if (peers[peerId] && audio.srcObject) {
            audio.load();
            tryPlay(0);
          }
        }, 1000);
      }
    };

    // Monitor remote stream tracks ending
    stream.getAudioTracks().forEach(t => {
      t.onended = () => {
        console.warn('Remote audio track ended for', peerId);
        // Don't remove — the peer reconnect system will handle getting a new stream
      };
    });

    peers[peerId].audioEl = audio;

    // Analyser for speaking detection
    try {
      if (audioCtx && audioCtx.state !== 'closed') {
        const src = audioCtx.createMediaStreamSource(stream);
        const analyser = audioCtx.createAnalyser();
        analyser.fftSize = 256;
        src.connect(analyser);
        peers[peerId].analyser = analyser;
      }
    } catch (e) {}

    renderPeers();
  }

  function removePeer(peerId, silent) {
    if (!peers[peerId]) return;
    const p = peers[peerId];

    try { if (p.call) p.call.close(); } catch(e) {}
    try { if (p.conn) p.conn.close(); } catch(e) {}
    try { if (p.audioEl) { p.audioEl.srcObject = null; p.audioEl.remove(); } } catch(e) {}

    delete peers[peerId];
    delete peerRegistry[peerId];

    if (!silent) {
      toast('A soul has faded away.');
      logDiscovery('A soul departed the void.');
    }
    renderPeers();
    updateSoulCount();

    if (isLobbyHost) broadcastPeerLeft(peerId);
  }

  // ========================================
  // PEER RECONNECTION (instead of instant removal)
  // ========================================
  function attemptPeerReconnect(peerId) {
    if (destroyed || !peers[peerId]) return;
    const p = peers[peerId];

    // Track reconnect attempts per peer
    p.reconnectAttempts = (p.reconnectAttempts || 0) + 1;
    if (p.reconnecting) return; // already trying

    if (p.reconnectAttempts > PEER_RECONNECT_MAX) {
      console.log('Max reconnect attempts for peer:', peerId);
      removePeer(peerId);
      return;
    }

    p.reconnecting = true;
    console.log('Attempting to reconnect to peer:', peerId, 'attempt', p.reconnectAttempts);

    setTimeout(() => {
      if (destroyed || !peers[peerId]) return;
      p.reconnecting = false;

      // Re-establish audio call
      try {
        if (localStream && myPeer && !myPeer.destroyed) {
          // Close old call cleanly
          try { if (p.call) p.call.close(); } catch(e) {}

          const call = myPeer.call(peerId, localStream);
          if (call) {
            p.call = call;
            call.on('stream', (remoteStream) => {
              try {
                setupRemoteAudio(peerId, remoteStream);
                p.reconnectAttempts = 0; // success — reset counter
                p.lastHeartbeat = Date.now();
                console.log('Reconnected audio to peer:', peerId);
              } catch(e) {}
            });
            call.on('close', () => attemptPeerReconnect(peerId));
            call.on('error', () => attemptPeerReconnect(peerId));
            monitorICE(peerId, call);
          }
        }
      } catch (e) {
        console.warn('Peer reconnect error:', peerId, e);
        attemptPeerReconnect(peerId);
      }
    }, PEER_RECONNECT_DELAY + Math.random() * 2000);
  }

  // Re-establish data connection to a peer
  function reconnectDataConn(peerId) {
    if (destroyed || !peers[peerId] || !myPeer || myPeer.destroyed) return;
    const p = peers[peerId];

    try { if (p.conn) p.conn.close(); } catch(e) {}

    try {
      const conn = myPeer.connect(peerId, { reliable: true });
      p.conn = conn;
      handleDataConn(conn);
      conn.on('close', () => {
        // Data conn closed — try reconnect after delay
        setTimeout(() => reconnectDataConn(peerId), PEER_RECONNECT_DELAY);
      });
      conn.on('error', () => {});
    } catch(e) {
      console.warn('Data reconnect error:', peerId, e);
    }
  }

  function connectToAllPeers() {
    for (const pid in peerRegistry) {
      if (pid !== myId && !peers[pid]) {
        connectToPeer(pid, peerRegistry[pid]);
      }
    }
  }

  // ========================================
  // LOBBY HOST LOGIC
  // ========================================
  async function tryClaimLobby() {
    return new Promise((resolve) => {
      let lobbyPeer;
      try {
        lobbyPeer = new Peer(LOBBY_ID, {
          debug: 0,
          config: {
            iceServers: [
              { urls: 'stun:stun.l.google.com:19302' },
              { urls: 'stun:stun1.l.google.com:19302' },
              { urls: 'turn:openrelay.metered.ca:80', username: 'openrelayproject', credential: 'openrelayproject' },
              { urls: 'turn:openrelay.metered.ca:443?transport=tcp', username: 'openrelayproject', credential: 'openrelayproject' }
            ]
          }
        });
      } catch (e) {
        resolve(false);
        return;
      }

      const timeout = setTimeout(() => {
        try { lobbyPeer.destroy(); } catch(e) {}
        resolve(false);
      }, 5000);

      lobbyPeer.on('open', () => {
        clearTimeout(timeout);
        // We got the lobby ID - we are the host!
        // Keep this peer alive as the lobby beacon
        lobbyPeer.on('connection', (conn) => {
          try { handleDataConn(conn); } catch(e) {}
        });
        lobbyPeer.on('call', (call) => {
          try {
            if (localStream) call.answer(localStream);
            else call.answer();
            handleIncomingCall(call);
          } catch(e) {}
        });
        lobbyPeer.on('error', (err) => {
          if (err.type !== 'peer-unavailable') console.warn('Lobby peer error:', err);
        });
        lobbyPeer.on('disconnected', () => {
          console.log('Lobby peer disconnected, reconnecting...');
          try { lobbyPeer.reconnect(); } catch(e) {}
          // Retry if reconnect fails
          setTimeout(() => {
            if (lobbyPeer && lobbyPeer.disconnected) {
              try { lobbyPeer.reconnect(); } catch(e) {}
            }
          }, 3000);
          setTimeout(() => {
            if (lobbyPeer && lobbyPeer.disconnected) {
              try { lobbyPeer.reconnect(); } catch(e) {}
            }
          }, 10000);
        });
        lobbyPeer.on('close', () => {
          // Lobby peer was destroyed — try to reclaim
          console.warn('Lobby peer closed unexpectedly');
          if (!destroyed) {
            setTimeout(() => {
              tryClaimLobby().then(got => {
                if (got) becomeLobbyHost(peerRegistry);
              });
            }, 2000);
          }
        });

        // Store as secondary peer reference
        window._lobbyPeer = lobbyPeer;
        resolve(true);
      });

      lobbyPeer.on('error', (err) => {
        clearTimeout(timeout);
        try { lobbyPeer.destroy(); } catch(e) {}
        resolve(false);
      });
    });
  }

  function becomeLobbyHost(registry) {
    isLobbyHost = true;
    if (registry) peerRegistry = { ...registry };
    peerRegistry[myId] = 'Soul';
    setConnStatus('connected');
  }

  function tryJoinLobby() {
    if (!myPeer || myPeer.destroyed) return;
    try {
      const conn = myPeer.connect(LOBBY_ID, { reliable: true });

      const joinTimeout = setTimeout(() => {
        // Connection didn't open in time — lobby might be dead
        tryClaimLobby().then(got => {
          if (got) becomeLobbyHost({});
          else startLobbyHealthCheck(); // keep checking
        });
      }, 8000);

      conn.on('open', () => {
        clearTimeout(joinTimeout);
        try {
          conn.send({ type: 'register', peerId: myId });
        } catch(e) {}
        conn.on('data', (data) => {
          try { processMessage(conn, data); } catch(e) {}
        });
        // Monitor lobby connection health
        conn.on('close', () => {
          // Lobby host disconnected — try to take over
          console.log('Lobby connection closed, attempting takeover');
          tryClaimLobby().then(got => {
            if (got) {
              becomeLobbyHost(peerRegistry);
              toast('You are now the void anchor.');
            } else {
              // Someone else got it — rejoin
              setTimeout(() => tryJoinLobby(), 2000 + Math.random() * 3000);
            }
          });
        });
        startLobbyHealthCheck();
      });
      conn.on('error', () => {
        clearTimeout(joinTimeout);
        // Lobby gone - try to become host
        tryClaimLobby().then(got => {
          if (got) becomeLobbyHost({});
          else {
            // Neither host nor joined — retry after delay
            setTimeout(() => tryJoinLobby(), 5000 + Math.random() * 5000);
          }
        });
      });
    } catch (e) {
      console.warn('Join lobby error:', e);
    }
  }

  // Periodic lobby health check — ensures we're still connected
  function startLobbyHealthCheck() {
    if (lobbyHealthTimer) clearInterval(lobbyHealthTimer);
    lobbyHealthTimer = setInterval(() => {
      if (destroyed) { clearInterval(lobbyHealthTimer); return; }
      if (isLobbyHost) return; // hosts don't need to check

      // Verify we still have peers or can reach the lobby
      if (peerCount() === 0 && !isReconnecting) {
        console.log('No peers and not host — re-checking lobby');
        tryJoinLobby();
      }
    }, LOBBY_RECHECK_MS);
  }

  // ========================================
  // STALE PEER CLEANUP
  // ========================================
  function cleanStalePeers() {
    const now = Date.now();
    for (const pid in peers) {
      const p = peers[pid];
      const elapsed = now - (p.lastHeartbeat || 0);

      // Check if data connection is dead and needs reconnecting
      if (p.conn && !p.conn.open && !p.reconnecting) {
        reconnectDataConn(pid);
      }

      // Only remove truly stale peers (no heartbeat for full STALE_PEER_MS)
      if (elapsed > STALE_PEER_MS) {
        // Try one final reconnect before giving up
        if (!p.reconnecting && (p.reconnectAttempts || 0) < PEER_RECONNECT_MAX) {
          console.log('Peer stale, attempting reconnect:', pid);
          attemptPeerReconnect(pid);
          reconnectDataConn(pid);
        } else if ((p.reconnectAttempts || 0) >= PEER_RECONNECT_MAX) {
          console.log('Removing stale peer after max reconnect attempts:', pid);
          removePeer(pid);
        }
      }
    }
  }

  // ========================================
  // HEARTBEAT
  // ========================================
  function startHeartbeat() {
    if (heartbeatInterval) clearInterval(heartbeatInterval);
    heartbeatInterval = setInterval(() => {
      // Send heartbeats + presence to all peers
      for (const pid in peers) {
        const p = peers[pid];
        if (p.conn && p.conn.open) {
          try {
            p.conn.send({ type: 'heartbeat' });
            // Also broadcast presence so peers know we're alive
            p.conn.send({ type: 'presence', peerId: myId });
          } catch(e) {
            // Send failed — connection may be dead
            reconnectDataConn(pid);
          }
        } else if (p.conn && !p.conn.open && !p.reconnecting) {
          reconnectDataConn(pid);
        }
      }

      // If speaking, reset idle timer (voice activity = not idle)
      if (isOpenMic && !isMuted && localAnalyser) {
        const level = getLevel(localAnalyser);
        if (level > NOISE_GATE) resetIdleTimer();
      }

      cleanStalePeers();
    }, HEARTBEAT_MS);
  }

  // ========================================
  // IDLE TIMER
  // ========================================
  function startIdleTimer() {
    if (idleWarnTimer) clearTimeout(idleWarnTimer);
    if (idleTimer) clearTimeout(idleTimer);

    idleWarnTimer = setTimeout(() => {
      toast('You will be disconnected in 5 minutes due to inactivity.');
    }, IDLE_WARN_MS);

    idleTimer = setTimeout(() => {
      toast('Disconnected due to inactivity.');
      logDiscovery('Disconnected for inactivity.');
      leaveVoid();
    }, IDLE_TIMEOUT_MS);
  }

  function resetIdleTimer() {
    startIdleTimer();
  }

  // ========================================
  // JOIN / LEAVE
  // ========================================
  async function joinVoid() {
    if (destroyed) return;
    enterBtn.disabled = true;
    joinSpinner.classList.add('active');
    joinError.classList.remove('visible');

    myName = '';
    sessionStartTime = Date.now();

    // Audio
    const audioOk = await setupAudio();
    if (!audioOk) {
      enterBtn.disabled = false;
      joinSpinner.classList.remove('active');
      return;
    }

    // Try to claim lobby
    const gotLobby = await tryClaimLobby();

    // Init our own peer
    try {
      await initPeer();
    } catch (e) {
      showError('Could not connect. Check your network.');
      enterBtn.disabled = false;
      joinSpinner.classList.remove('active');
      return;
    }

    reconnectAttempts = 0;

    if (gotLobby) {
      becomeLobbyHost({});
      logDiscovery('Entered the void.');
    } else {
      // Join existing lobby
      tryJoinLobby();
      setConnStatus('connected');
      logDiscovery('Entered the void.');
    }

    toast('You have entered the void.');

    // Switch screen
    setScreen('void');
    updateSoulCount();

    // Start loops
    animLoop();
    startHeartbeat();
    startIdleTimer();
    startAutoSave();
    startStreamHealthCheck();

    // Ambient audio
    createAmbient();
    if (ambientOn) {
      audioBtn.classList.add('active');
      fadeAmbient(true);
    }
    scheduleResonance();

    // Restore prefs
    volumeSlider.value = persistence.audioPrefs.volume;
    masterVolume = persistence.audioPrefs.volume / 100;

    if (isOpenMic) {
      modeBtn.textContent = 'PTT Mode';
      modeBtn.classList.add('active');
      pttBtn.classList.add('open-mic');
      pttBtn.querySelector('span').textContent = 'Open';
      isPTTActive = true;
      pttBtn.classList.add('active');
    }

    // Start unmuted so people can talk immediately
    isMuted = false;
    muteBtn.textContent = 'Mute';
    muteBtn.classList.add('active');
    pttBtn.classList.remove('muted');
    updateTransmitState();

  }

  function leaveVoid() {
    destroyed = true;

    saveAll();

    // Transfer lobby if host — try all peers, not just the first
    if (isLobbyHost) {
      const pids = Object.keys(peers);
      let transferred = false;
      for (const pid of pids) {
        if (transferred) break;
        const p = peers[pid];
        if (p.conn && p.conn.open) {
          try {
            p.conn.send({ type: 'lobby-transfer', peerRegistry });
            transferred = true;
          } catch(e) { /* try next */ }
        }
      }
    }

    // Clean peers
    for (const id in peers) {
      try { if (peers[id].call) peers[id].call.close(); } catch(e) {}
      try { if (peers[id].conn) peers[id].conn.close(); } catch(e) {}
      try { if (peers[id].audioEl) { peers[id].audioEl.srcObject = null; peers[id].audioEl.remove(); } } catch(e) {}
      delete peers[id];
    }

    // Clean local
    try { if (localStream) { localStream.getTracks().forEach(t => t.stop()); localStream = null; } } catch(e) {}
    cleanupAmbient();
    try { if (audioCtx) { audioCtx.close(); audioCtx = null; } } catch(e) {}
    try { if (myPeer) { myPeer.destroy(); myPeer = null; } } catch(e) {}
    try { if (window._lobbyPeer) { window._lobbyPeer.destroy(); window._lobbyPeer = null; } } catch(e) {}
    if (animFrameId) cancelAnimationFrame(animFrameId);
    if (heartbeatInterval) clearInterval(heartbeatInterval);
    if (idleTimer) clearTimeout(idleTimer);
    if (idleWarnTimer) clearTimeout(idleWarnTimer);
    if (autoSaveInterval) clearInterval(autoSaveInterval);
    if (resonanceTimer) clearTimeout(resonanceTimer);
    if (lobbyHealthTimer) clearInterval(lobbyHealthTimer);
    if (streamHealthTimer) clearInterval(streamHealthTimer);

    isLobbyHost = false;
    isMuted = true;
    isOpenMic = false;
    isPTTActive = false;
    localAnalyser = null;
    sessionStartTime = 0;

    setScreen('join');
    enterBtn.disabled = false;
    joinSpinner.classList.remove('active');
    destroyed = false;
  }

  // ========================================
  // CONTROLS
  // ========================================

  // PTT
  function pttDown() {
    if (isOpenMic) return;
    isPTTActive = true;
    pttBtn.classList.add('active');
    updateTransmitState();
    resetIdleTimer();
  }
  function pttUp() {
    if (isOpenMic) return;
    isPTTActive = false;
    pttBtn.classList.remove('active');
    updateTransmitState();
  }

  pttBtn.addEventListener('mousedown', (e) => { e.preventDefault(); pttDown(); });
  pttBtn.addEventListener('mouseup', pttUp);
  pttBtn.addEventListener('mouseleave', pttUp);
  pttBtn.addEventListener('touchstart', (e) => { e.preventDefault(); pttDown(); }, { passive: false });
  pttBtn.addEventListener('touchend', (e) => { e.preventDefault(); pttUp(); }, { passive: false });
  pttBtn.addEventListener('touchcancel', pttUp);

  // Spacebar PTT
  document.addEventListener('keydown', (e) => {
    if (e.code === 'Space' && !e.repeat && voidScreen.classList.contains('active')) {
      e.preventDefault();
      pttDown();
    }
  });
  document.addEventListener('keyup', (e) => {
    if (e.code === 'Space' && voidScreen.classList.contains('active')) {
      e.preventDefault();
      pttUp();
    }
  });

  // Mute
  muteBtn.addEventListener('click', () => {
    isMuted = !isMuted;
    muteBtn.textContent = isMuted ? 'Unmute' : 'Mute';
    muteBtn.classList.toggle('active', !isMuted);
    pttBtn.classList.toggle('muted', isMuted);
    updateTransmitState();
    resetIdleTimer();
  });

  // Open mic
  modeBtn.addEventListener('click', () => {
    isOpenMic = !isOpenMic;
    persistence.audioPrefs.openMic = isOpenMic;
    if (isOpenMic) {
      modeBtn.textContent = 'PTT Mode';
      modeBtn.classList.add('active');
      pttBtn.classList.add('open-mic');
      pttBtn.querySelector('span').textContent = 'Open';
      isPTTActive = true;
      pttBtn.classList.add('active');
    } else {
      modeBtn.textContent = 'Open Mic';
      modeBtn.classList.remove('active');
      pttBtn.classList.remove('open-mic');
      pttBtn.querySelector('span').textContent = 'Hold';
      isPTTActive = false;
      pttBtn.classList.remove('active');
    }
    updateTransmitState();
    saveAll();
  });

  // Ambient toggle
  audioBtn.addEventListener('click', () => {
    ambientOn = !ambientOn;
    audioBtn.classList.toggle('active', ambientOn);
    persistence.audioPrefs.ambient = ambientOn;
    fadeAmbient(ambientOn);
    saveAll();
  });

  // Volume
  volumeSlider.addEventListener('input', () => {
    masterVolume = volumeSlider.value / 100;
    persistence.audioPrefs.volume = parseInt(volumeSlider.value);
    for (const id in peers) {
      if (peers[id].audioEl) peers[id].audioEl.volume = masterVolume;
    }
    if (ambientOn) fadeAmbient(true);
  });

  // Void orb interaction - whisper trails
  voidOrb.addEventListener('click', (e) => {
    const rect = voidMain.getBoundingClientRect();
    spawnWhisperTrail(e.clientX - rect.left, e.clientY - rect.top);
    resetIdleTimer();
  });
  voidOrb.addEventListener('touchstart', (e) => {
    const touch = e.touches[0];
    const rect = voidMain.getBoundingClientRect();
    spawnWhisperTrail(touch.clientX - rect.left, touch.clientY - rect.top);
    resetIdleTimer();
  }, { passive: true });

  // Leave
  leaveBtn.addEventListener('click', leaveVoid);

  // Enter
  enterBtn.addEventListener('click', joinVoid);

  // Page unload - save audio preferences
  window.addEventListener('beforeunload', () => {
    saveAll();
  });

  // Network change — reconnect when coming back online
  window.addEventListener('online', () => {
    if (!destroyed && voidScreen.classList.contains('active')) {
      toast('Network restored. Reconnecting...');
      if (myPeer && myPeer.disconnected && !isReconnecting) {
        attemptReconnect();
      }
      // Refresh peer connections
      for (const pid in peers) {
        const p = peers[pid];
        if (p.conn && !p.conn.open) reconnectDataConn(pid);
        if (p.call && !p.call.open) attemptPeerReconnect(pid);
      }
    }
  });
  window.addEventListener('offline', () => {
    if (!destroyed && voidScreen.classList.contains('active')) {
      setConnStatus('reconnecting');
      toast('Network lost. Waiting for reconnection...');
    }
  });

  // Visibility change — full health check on return from background
  let hiddenTimestamp = 0;
  document.addEventListener('visibilitychange', () => {
    if (document.hidden) {
      hiddenTimestamp = Date.now();
      if (!isOpenMic) setTransmitting(false);
      return;
    }

    // Coming back from background
    const hiddenDuration = Date.now() - hiddenTimestamp;
    console.log('Returning from background after', Math.round(hiddenDuration/1000), 's');

    // Resume AudioContext (iOS/Safari aggressively suspends)
    if (audioCtx) {
      if (audioCtx.state === 'suspended') audioCtx.resume().catch(() => {});
      if (audioCtx.state === 'closed') {
        // AudioContext died — recreate
        try {
          audioCtx = new (window.AudioContext || window.webkitAudioContext)();
          audioCtx.resume().catch(() => {});
          if (localStream && localStream.getAudioTracks().some(t => t.readyState === 'live')) {
            const src = audioCtx.createMediaStreamSource(localStream);
            localAnalyser = audioCtx.createAnalyser();
            localAnalyser.fftSize = 256;
            src.connect(localAnalyser);
          }
        } catch(e) {}
      }
    }

    // Check microphone health
    if (localStream) {
      const tracks = localStream.getAudioTracks();
      if (tracks.length === 0 || tracks.every(t => t.readyState === 'ended')) {
        recoverMicrophone();
      }
    }

    // Check PeerJS signaling connection
    if (myPeer && myPeer.disconnected && !isReconnecting) {
      attemptReconnect();
    }

    // If we were hidden for a long time (>30s), do a full peer health sweep
    if (hiddenDuration > 30000) {
      console.log('Long background period — full peer health check');
      for (const pid in peers) {
        const p = peers[pid];
        // Extend heartbeat grace after returning from background
        p.lastHeartbeat = Math.max(p.lastHeartbeat || 0, Date.now() - HEARTBEAT_MS * 2);

        if (p.conn && !p.conn.open && !p.reconnecting) reconnectDataConn(pid);
        if (p.call && !p.call.open && !p.reconnecting) attemptPeerReconnect(pid);
      }
      // Re-verify lobby
      if (!isLobbyHost && peerCount() === 0) {
        tryJoinLobby();
      }
    } else {
      // Short background — just check dead connections
      for (const pid in peers) {
        const p = peers[pid];
        if (p.conn && !p.conn.open && !p.reconnecting) reconnectDataConn(pid);
        if (p.call && !p.call.open && !p.reconnecting) attemptPeerReconnect(pid);
      }
    }

    // Restart audio playback for all peers (iOS pauses media in background)
    for (const pid in peers) {
      if (peers[pid].audioEl && peers[pid].audioEl.paused) {
        peers[pid].audioEl.play().catch(() => {});
      }
    }

    // Re-enable transmitting
    updateTransmitState();
  });

})();
</script>
</body>
</html>
