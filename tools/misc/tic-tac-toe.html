<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>Tic Tac Toe - Korb Engineering</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

:root {
  --bg: #050a0f;
  --surface: #0a1018;
  --surface2: #0e1520;
  --border: #1a2535;
  --cyan: #00d4ff;
  --orange: #ff6600;
  --green: #10b981;
  --red: #ef4444;
  --text: #e2e8f0;
  --text-dim: #64748b;
}

html, body {
  height: 100%;
  font-family: 'JetBrains Mono', monospace;
  background: var(--bg);
  color: var(--text);
  overflow-x: hidden;
}

body {
  display: flex;
  flex-direction: column;
  align-items: center;
  padding: 16px;
  min-height: 100vh;
}

h1 {
  font-size: 1.4rem;
  font-weight: 700;
  letter-spacing: 2px;
  text-transform: uppercase;
  color: var(--cyan);
  text-shadow: 0 0 20px rgba(0, 212, 255, 0.3);
  margin-bottom: 4px;
  text-align: center;
}

.subtitle {
  font-size: 0.65rem;
  font-weight: 300;
  color: var(--text-dim);
  letter-spacing: 3px;
  text-transform: uppercase;
  margin-bottom: 16px;
  text-align: center;
}

/* Mode selector */
.mode-selector {
  display: flex;
  flex-wrap: wrap;
  gap: 8px;
  justify-content: center;
  margin-bottom: 16px;
  max-width: 400px;
}

.mode-btn {
  font-family: 'JetBrains Mono', monospace;
  font-size: 0.7rem;
  font-weight: 500;
  padding: 10px 14px;
  min-height: 44px;
  min-width: 44px;
  border: 1px solid var(--border);
  border-radius: 6px;
  background: var(--surface);
  color: var(--text-dim);
  cursor: pointer;
  transition: all 0.2s;
  display: flex;
  align-items: center;
  justify-content: center;
}

.mode-btn:hover {
  border-color: var(--cyan);
  color: var(--text);
}

.mode-btn.active {
  border-color: var(--cyan);
  color: var(--cyan);
  background: var(--surface2);
  box-shadow: 0 0 10px rgba(0, 212, 255, 0.15);
}

/* Score display */
.scoreboard {
  display: flex;
  gap: 24px;
  margin-bottom: 16px;
  padding: 12px 20px;
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 8px;
}

.score-item {
  text-align: center;
}

.score-label {
  font-size: 0.6rem;
  font-weight: 300;
  letter-spacing: 2px;
  text-transform: uppercase;
  margin-bottom: 4px;
}

.score-label.x { color: var(--cyan); }
.score-label.o { color: var(--orange); }
.score-label.d { color: var(--text-dim); }

.score-value {
  font-size: 1.4rem;
  font-weight: 700;
}

.score-value.x { color: var(--cyan); }
.score-value.o { color: var(--orange); }
.score-value.d { color: var(--text-dim); }

/* Turn indicator */
.turn-indicator {
  font-size: 0.8rem;
  font-weight: 500;
  margin-bottom: 12px;
  height: 24px;
  display: flex;
  align-items: center;
  gap: 6px;
  transition: color 0.2s;
}

.turn-indicator.x { color: var(--cyan); }
.turn-indicator.o { color: var(--orange); }
.turn-indicator.win { color: var(--green); }
.turn-indicator.draw { color: var(--text-dim); }

/* Grid */
.grid-container {
  position: relative;
  margin-bottom: 16px;
}

.grid {
  display: grid;
  grid-template-columns: repeat(3, 1fr);
  gap: 4px;
  width: min(80vw, 320px);
  height: min(80vw, 320px);
  background: var(--border);
  border: 2px solid var(--border);
  border-radius: 10px;
  padding: 4px;
  box-shadow: 0 0 30px rgba(0, 212, 255, 0.05), inset 0 0 20px rgba(0, 0, 0, 0.3);
}

.cell {
  background: var(--surface);
  border-radius: 6px;
  display: flex;
  align-items: center;
  justify-content: center;
  cursor: pointer;
  font-size: min(14vw, 56px);
  font-weight: 700;
  transition: background 0.15s;
  user-select: none;
  -webkit-user-select: none;
  position: relative;
  min-height: 44px;
  min-width: 44px;
}

.cell:hover:not(.taken) {
  background: var(--surface2);
}

.cell.taken {
  cursor: default;
}

.cell .piece {
  animation: placePiece 0.25s ease-out;
}

.cell .piece.x { color: var(--cyan); text-shadow: 0 0 15px rgba(0, 212, 255, 0.4); }
.cell .piece.o { color: var(--orange); text-shadow: 0 0 15px rgba(255, 102, 0, 0.4); }

@keyframes placePiece {
  0% { opacity: 0; transform: scale(0.5); }
  100% { opacity: 1; transform: scale(1); }
}

.cell.win-cell {
  animation: winGlow 0.8s ease-in-out infinite alternate;
}

.cell.win-cell .piece.x {
  text-shadow: 0 0 25px rgba(0, 212, 255, 0.8);
}

.cell.win-cell .piece.o {
  text-shadow: 0 0 25px rgba(255, 102, 0, 0.8);
}

@keyframes winGlow {
  0% { background: var(--surface); }
  100% { background: rgba(16, 185, 129, 0.1); border-color: var(--green); }
}

.cell.draw-cell {
  animation: drawFade 0.6s ease-in-out;
}

@keyframes drawFade {
  0% { background: var(--surface); }
  50% { background: rgba(100, 116, 139, 0.15); }
  100% { background: var(--surface); }
}

/* Win line overlay */
.win-line {
  position: absolute;
  background: var(--green);
  border-radius: 4px;
  opacity: 0.7;
  z-index: 10;
  pointer-events: none;
  box-shadow: 0 0 15px rgba(16, 185, 129, 0.6);
  animation: lineAppear 0.4s ease-out;
}

@keyframes lineAppear {
  0% { opacity: 0; transform: scaleX(0); }
  100% { opacity: 0.7; transform: scaleX(1); }
}

/* Buttons */
.btn-row {
  display: flex;
  gap: 10px;
  margin-bottom: 16px;
  flex-wrap: wrap;
  justify-content: center;
}

.btn {
  font-family: 'JetBrains Mono', monospace;
  font-size: 0.7rem;
  font-weight: 500;
  padding: 10px 18px;
  min-height: 44px;
  border: 1px solid var(--border);
  border-radius: 6px;
  background: var(--surface);
  color: var(--text);
  cursor: pointer;
  transition: all 0.2s;
}

.btn:hover { border-color: var(--cyan); color: var(--cyan); }
.btn.danger:hover { border-color: var(--red); color: var(--red); }

/* History */
.history {
  width: min(90vw, 380px);
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 8px;
  padding: 12px;
  max-height: 200px;
  overflow-y: auto;
}

.history-title {
  font-size: 0.65rem;
  font-weight: 600;
  letter-spacing: 2px;
  text-transform: uppercase;
  color: var(--text-dim);
  margin-bottom: 8px;
}

.history-entry {
  font-size: 0.65rem;
  font-weight: 400;
  color: var(--text-dim);
  padding: 4px 0;
  border-bottom: 1px solid rgba(26, 37, 53, 0.5);
}

.history-entry:last-child { border-bottom: none; }
.history-entry .win-x { color: var(--cyan); }
.history-entry .win-o { color: var(--orange); }
.history-entry .draw-text { color: var(--text-dim); }

.history::-webkit-scrollbar { width: 4px; }
.history::-webkit-scrollbar-track { background: var(--surface); }
.history::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }

.empty-history {
  font-size: 0.6rem;
  color: var(--text-dim);
  font-style: italic;
}

/* Focus styles for keyboard */
.cell:focus-visible {
  outline: 2px solid var(--cyan);
  outline-offset: -2px;
}

@media (max-width: 380px) {
  h1 { font-size: 1.1rem; }
  .scoreboard { gap: 16px; padding: 10px 14px; }
  .score-value { font-size: 1.1rem; }
}
</style>
</head>
<body>

<h1>Tic Tac Toe</h1>
<div class="subtitle">Korb Engineering</div>

<div class="mode-selector">
  <button class="mode-btn active" data-mode="pvp">PvP</button>
  <button class="mode-btn" data-mode="easy">AI Easy</button>
  <button class="mode-btn" data-mode="medium">AI Med</button>
  <button class="mode-btn" data-mode="hard">AI Hard</button>
</div>

<div class="scoreboard">
  <div class="score-item">
    <div class="score-label x">X Wins</div>
    <div class="score-value x" id="scoreX">0</div>
  </div>
  <div class="score-item">
    <div class="score-label d">Draws</div>
    <div class="score-value d" id="scoreD">0</div>
  </div>
  <div class="score-item">
    <div class="score-label o">O Wins</div>
    <div class="score-value o" id="scoreO">0</div>
  </div>
</div>

<div class="turn-indicator x" id="turnIndicator">X's turn</div>

<div class="grid-container">
  <div class="grid" id="grid"></div>
</div>

<div class="btn-row">
  <button class="btn" id="newGameBtn">New Game</button>
  <button class="btn danger" id="resetBtn">Reset Scores</button>
</div>

<div class="history" id="historyPanel">
  <div class="history-title">Game History</div>
  <div id="historyList"><div class="empty-history">No games played yet</div></div>
</div>

<script>
(function() {
  'use strict';

  // ---- Audio Engine (Web Audio API) ----
  let audioCtx = null;
  function getAudioCtx() {
    if (!audioCtx) {
      audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    }
    return audioCtx;
  }

  function playTone(freq, duration, type, vol) {
    try {
      const ctx = getAudioCtx();
      const osc = ctx.createOscillator();
      const gain = ctx.createGain();
      osc.type = type || 'sine';
      osc.frequency.setValueAtTime(freq, ctx.currentTime);
      gain.gain.setValueAtTime(vol || 0.08, ctx.currentTime);
      gain.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + duration);
      osc.connect(gain);
      gain.connect(ctx.destination);
      osc.start(ctx.currentTime);
      osc.stop(ctx.currentTime + duration);
    } catch(e) {}
  }

  function soundPlace() {
    playTone(600, 0.08, 'square', 0.06);
    playTone(900, 0.06, 'sine', 0.04);
  }

  function soundWin() {
    const ctx = getAudioCtx();
    const notes = [523, 659, 784, 1047];
    notes.forEach((f, i) => {
      setTimeout(() => playTone(f, 0.2, 'sine', 0.07), i * 100);
    });
  }

  function soundDraw() {
    playTone(300, 0.25, 'triangle', 0.06);
    setTimeout(() => playTone(250, 0.3, 'triangle', 0.05), 150);
  }

  // ---- State ----
  const STORAGE_PREFIX = 'korb_ttt_';
  const WIN_LINES = [
    [0,1,2],[3,4,5],[6,7,8],
    [0,3,6],[1,4,7],[2,5,8],
    [0,4,8],[2,4,6]
  ];

  let board = Array(9).fill(null);
  let currentPlayer = 'X';
  let gameOver = false;
  let mode = 'pvp'; // pvp, easy, medium, hard
  let scores = { X: 0, O: 0, D: 0 };
  let history = [];

  // ---- Load from localStorage ----
  function loadState() {
    try {
      const s = localStorage.getItem(STORAGE_PREFIX + 'scores');
      if (s) scores = JSON.parse(s);
      const h = localStorage.getItem(STORAGE_PREFIX + 'history');
      if (h) history = JSON.parse(h);
      const m = localStorage.getItem(STORAGE_PREFIX + 'mode');
      if (m) mode = m;
    } catch(e) {}
  }

  function saveState() {
    try {
      localStorage.setItem(STORAGE_PREFIX + 'scores', JSON.stringify(scores));
      localStorage.setItem(STORAGE_PREFIX + 'history', JSON.stringify(history));
      localStorage.setItem(STORAGE_PREFIX + 'mode', mode);
    } catch(e) {}
  }

  // ---- DOM refs ----
  const grid = document.getElementById('grid');
  const turnIndicator = document.getElementById('turnIndicator');
  const scoreX = document.getElementById('scoreX');
  const scoreO = document.getElementById('scoreO');
  const scoreD = document.getElementById('scoreD');
  const historyList = document.getElementById('historyList');
  const newGameBtn = document.getElementById('newGameBtn');
  const resetBtn = document.getElementById('resetBtn');
  const modeBtns = document.querySelectorAll('.mode-btn');

  // ---- Build grid ----
  function buildGrid() {
    grid.innerHTML = '';
    for (let i = 0; i < 9; i++) {
      const cell = document.createElement('div');
      cell.className = 'cell';
      cell.dataset.index = i;
      cell.tabIndex = 0;
      cell.setAttribute('role', 'button');
      cell.setAttribute('aria-label', 'Cell ' + (i + 1));
      cell.addEventListener('click', () => handleCellClick(i));
      grid.appendChild(cell);
    }
  }

  // ---- Render ----
  function render() {
    const cells = grid.querySelectorAll('.cell');
    cells.forEach((cell, i) => {
      const val = board[i];
      if (val) {
        cell.innerHTML = '<span class="piece ' + val.toLowerCase() + '">' + val + '</span>';
        cell.classList.add('taken');
      } else {
        cell.innerHTML = '';
        cell.classList.remove('taken');
      }
      cell.classList.remove('win-cell', 'draw-cell');
    });

    scoreX.textContent = scores.X;
    scoreO.textContent = scores.O;
    scoreD.textContent = scores.D;

    if (!gameOver) {
      turnIndicator.textContent = currentPlayer + "'s turn";
      turnIndicator.className = 'turn-indicator ' + currentPlayer.toLowerCase();
    }

    renderHistory();

    // Mode buttons
    modeBtns.forEach(btn => {
      btn.classList.toggle('active', btn.dataset.mode === mode);
    });
  }

  function renderHistory() {
    if (history.length === 0) {
      historyList.innerHTML = '<div class="empty-history">No games played yet</div>';
      return;
    }
    historyList.innerHTML = history.slice().reverse().map(entry => {
      if (entry.winner === 'D') {
        return '<div class="history-entry"><span class="draw-text">Draw</span> - ' + entry.mode + ' - ' + entry.date + '</div>';
      }
      const cls = entry.winner === 'X' ? 'win-x' : 'win-o';
      return '<div class="history-entry"><span class="' + cls + '">' + entry.winner + ' wins</span> - ' + entry.mode + ' - ' + entry.date + '</div>';
    }).join('');
  }

  // ---- Game Logic ----
  function checkWin(b, player) {
    for (const line of WIN_LINES) {
      if (line.every(i => b[i] === player)) return line;
    }
    return null;
  }

  function isBoardFull(b) {
    return b.every(c => c !== null);
  }

  function getEmpty(b) {
    return b.map((v, i) => v === null ? i : -1).filter(i => i >= 0);
  }

  function handleCellClick(index) {
    if (gameOver || board[index] !== null) return;
    if (mode !== 'pvp' && currentPlayer === 'O') return; // AI's turn

    makeMove(index);
  }

  function makeMove(index) {
    if (board[index] !== null || gameOver) return;

    board[index] = currentPlayer;
    soundPlace();
    render();

    const winLine = checkWin(board, currentPlayer);
    if (winLine) {
      endGame(currentPlayer, winLine);
      return;
    }

    if (isBoardFull(board)) {
      endGame('D', null);
      return;
    }

    currentPlayer = currentPlayer === 'X' ? 'O' : 'X';
    render();

    // AI move
    if (mode !== 'pvp' && currentPlayer === 'O' && !gameOver) {
      setTimeout(aiMove, 300);
    }
  }

  function endGame(winner, winLine) {
    gameOver = true;

    if (winner === 'D') {
      turnIndicator.textContent = "It's a draw!";
      turnIndicator.className = 'turn-indicator draw';
      soundDraw();
      const cells = grid.querySelectorAll('.cell');
      cells.forEach(c => c.classList.add('draw-cell'));
      scores.D++;
    } else {
      turnIndicator.textContent = winner + ' wins!';
      turnIndicator.className = 'turn-indicator win';
      soundWin();
      if (winLine) {
        const cells = grid.querySelectorAll('.cell');
        winLine.forEach(i => cells[i].classList.add('win-cell'));
      }
      scores[winner]++;
    }

    const modeNames = { pvp: 'PvP', easy: 'Easy AI', medium: 'Med AI', hard: 'Hard AI' };
    const now = new Date();
    const dateStr = now.toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
    history.push({ winner: winner, mode: modeNames[mode], date: dateStr });
    if (history.length > 10) history.shift();

    saveState();
    render();
  }

  function newGame() {
    board = Array(9).fill(null);
    currentPlayer = 'X';
    gameOver = false;
    render();
  }

  function resetScores() {
    scores = { X: 0, O: 0, D: 0 };
    history = [];
    saveState();
    newGame();
  }

  // ---- AI ----
  function aiMove() {
    if (gameOver) return;
    let move;
    if (mode === 'easy') {
      move = aiEasy();
    } else if (mode === 'medium') {
      move = Math.random() < 0.7 ? aiBest() : aiEasy();
    } else {
      move = aiBest();
    }
    if (move !== undefined && move >= 0) {
      makeMove(move);
    }
  }

  function aiEasy() {
    const empty = getEmpty(board);
    return empty[Math.floor(Math.random() * empty.length)];
  }

  function aiBest() {
    const result = minimax(board.slice(), 'O', -Infinity, Infinity);
    return result.move;
  }

  function minimax(b, player, alpha, beta) {
    const oWin = checkWin(b, 'O');
    if (oWin) return { score: 10 - depthPenalty(b) };
    const xWin = checkWin(b, 'X');
    if (xWin) return { score: -10 + depthPenalty(b) };
    const empty = getEmpty(b);
    if (empty.length === 0) return { score: 0 };

    let best = { score: player === 'O' ? -Infinity : Infinity, move: -1 };

    for (const i of empty) {
      b[i] = player;
      const result = minimax(b, player === 'O' ? 'X' : 'O', alpha, beta);
      b[i] = null;

      if (player === 'O') {
        if (result.score > best.score) {
          best = { score: result.score, move: i };
        }
        alpha = Math.max(alpha, result.score);
      } else {
        if (result.score < best.score) {
          best = { score: result.score, move: i };
        }
        beta = Math.min(beta, result.score);
      }
      if (beta <= alpha) break;
    }

    return best;
  }

  function depthPenalty(b) {
    return b.filter(c => c !== null).length * 0.1;
  }

  // ---- Events ----
  modeBtns.forEach(btn => {
    btn.addEventListener('click', () => {
      mode = btn.dataset.mode;
      saveState();
      newGame();
    });
  });

  newGameBtn.addEventListener('click', newGame);
  resetBtn.addEventListener('click', resetScores);

  // Keyboard: numpad 1-9 and number row 1-9
  // Numpad layout maps to grid:
  // 7 8 9   ->  0 1 2
  // 4 5 6   ->  3 4 5
  // 1 2 3   ->  6 7 8
  const numpadMap = { '7': 0, '8': 1, '9': 2, '4': 3, '5': 4, '6': 5, '1': 6, '2': 7, '3': 8 };
  const numberMap = { '1': 0, '2': 1, '3': 2, '4': 3, '5': 4, '6': 5, '7': 6, '8': 7, '9': 8 };

  document.addEventListener('keydown', (e) => {
    // Use numpad layout if it's from numpad, otherwise standard number row
    let cellIndex;
    if (e.code && e.code.startsWith('Numpad')) {
      cellIndex = numpadMap[e.key];
    } else {
      cellIndex = numberMap[e.key];
    }

    if (cellIndex !== undefined) {
      e.preventDefault();
      handleCellClick(cellIndex);
    }

    // Space/Enter to start new game when game is over
    if (gameOver && (e.key === ' ' || e.key === 'Enter')) {
      e.preventDefault();
      newGame();
    }
  });

  // ---- Init ----
  loadState();
  buildGrid();
  render();

})();
</script>
</body>
</html>
