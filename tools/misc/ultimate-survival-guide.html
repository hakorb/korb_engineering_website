<script>
(function(){
'use strict';
const LS = 'korb_survival_guide_v1';
const $ = (id)=>document.getElementById(id);

// -------- Content --------
// Each chapter has title, subtitle, and an HTML body built via template strings.
// All prose is original. No copyrighted material is reproduced.
const CH = [];

CH.push({
  id:'priorities', title:'Priorities of Survival', sub:'The Rule of Threes and the STOP Protocol',
  body: `
    <p class="dropcap">In any wilderness emergency, the single most useful thing you can do before you move a muscle is <em>prioritize</em>. Panic, heroism, and wasted effort all stem from doing the wrong task first. Survival is a ladder, not a sprint, and you climb it in the order the body's physiology demands, not the order the fear in your head suggests.</p>
    <div class="rule-of-3">
      <strong>THE RULE OF 3s</strong> — rough upper limits a healthy adult can tolerate:<br>
      • 3 minutes without <strong>breathable air</strong><br>
      • 3 hours without <strong>shelter</strong> in a hostile environment<br>
      • 3 days without <strong>water</strong><br>
      • 3 weeks without <strong>food</strong>
    </div>
    <p>The rule is a shortcut, not a stopwatch. In 40°F rain you do not have three hours — you have about one. In a 110°F desert you do not have three days of water — you have about one. But the ordering never changes: air, bleeding, warmth, water, food. Solve them in that order and you buy yourself time to be rescued or to self-rescue.</p>
    <h2>The STOP Protocol</h2>
    <p>Before you start "doing something," run four letters:</p>
    <ul>
      <li><strong>S — Stop.</strong> Sit down. Put the pack on the ground. Do not take another step in the wrong direction.</li>
      <li><strong>T — Think.</strong> What do I have? Who knows I'm out here? When was my last known position? How long until dark?</li>
      <li><strong>O — Observe.</strong> Wind, slope, water, sun, noise. What resources are within 100 paces? What hazards?</li>
      <li><strong>P — Plan.</strong> Make a plan that survives contact with the first hour. Plan in priorities: stabilize, shelter, signal, sustain.</li>
    </ul>
    <p>Most wilderness deaths are not caused by what the environment did to the victim — they are caused by decisions the victim made in the first twenty minutes. Sit down. Eat a snack. Let the adrenaline drain. Then work.</p>
    <div class="panel">
      <div class="panel-title">The Will to Live</div>
      After physiology, the strongest predictor of surviving is the mental commitment to survive. People with a reason to come home — a family, a job, a dog, a grudge — statistically outlast people with superior gear and no reason. Give yourself a reason out loud. Say their names.
    </div>
  `
});

CH.push({
  id:'shelter', title:'Shelter', sub:'The Second Priority After Air',
  body: `
    <p class="dropcap">Shelter's only job is to put a thermal layer between you and the thing that is trying to take heat away from you — wind, rain, snow, or the cold ground. Everything else about shelter is decoration.</p>
    <h2>Site Selection</h2>
    <ul>
      <li><strong>High and dry.</strong> Cold air and water both flow downhill; both are your enemies at night.</li>
      <li><strong>Out of the wind.</strong> A ridge is dramatic but brutal. Tuck into the lee side, 10–30 m below the crest.</li>
      <li><strong>Away from dead trees and loose rock.</strong> "Widow-makers" kill sleeping campers.</li>
      <li><strong>Away from standing water.</strong> Insects, cold air pooling, flash-flood risk.</li>
      <li><strong>Near fuel and water,</strong> but not so near that wildlife paths run through your door.</li>
    </ul>
    <h2>Primary Structures</h2>
    <h3>Debris Hut</h3>
    <p>The classic "do-nothing-but-pile-leaves" shelter and the warmest expedient structure you can build with your bare hands. Build a ridgepole with one end on a stump or fork at hip height, the other on the ground. Lean sticks on both sides to form an A-frame ribcage barely wider than your shoulders. Pile leaves, needles, or grass three feet deep over the ribs — you want so much insulation that you feel foolish. Stuff the inside with more debris. You crawl in like a burrowing animal and your body heats the space.</p>
    <h3>Lean-To</h3>
    <p>Two uprights, a horizontal ridgepole lashed between them, poles leaned against the pole at about 45°, then thatching. Quick to build, comfortable with a fire reflector wall opposite the opening, but cold in wind because one full side is open. Good day shelter, marginal night shelter without a fire.</p>
    <h3>A-Frame Tarp</h3>
    <p>If you have a tarp or poncho, a ridge line between two trees plus stakes makes a taut A-frame in about five minutes. Low profile for wind, high profile for view. Angle one side steeper to shed the prevailing wind.</p>
    <h3>Snow Shelters</h3>
    <p>Snow is an astonishingly good insulator. A <em>quinzhee</em> is a pile of snow you shovel out after the snow has "sintered" (about 90 minutes). A <em>snow trench</em> is a body-length slot with branches and snow over the top. A <em>snow cave</em> is dug into a drift. In all cases: <strong>ventilation holes are not optional.</strong> Poke at least two with a stick and keep them clear. People have suffocated in cozy snow caves.</p>
    <div class="warn">Cold ground will suck more heat out of you than cold air. Always insulate underneath: six inches of dry leaves, pine boughs, a pack, anything. If you only insulate above you, you will shiver all night and wonder why.</div>
    <h3>The Bivy Burrow</h3>
    <p>In deep snow with no tools: kick out a body-length trench in a snow drift, line the bottom with boughs or your pack, roll in, and cover the top with more boughs and loose snow. A backpack can become a sleeping bag if you cut leg-holes and climb into it upside down.</p>
    <h2>Thermal Layering Inside the Shelter</h2>
    <p>Think of yourself as a sandwich. From the ground up: ground → insulation layer (boughs, leaves, closed-cell foam) → vapor barrier (plastic bag) → you → loft layer (debris, sleeping bag, spare clothing) → wind barrier (tarp, roof). Miss any layer and the stack fails.</p>
    <div class="panel">
      <div class="panel-title">Shelter Checklist</div>
      <ul class="checklist" data-ck="shelter">
        <li><input type="checkbox"> High, dry, out of drainage path</li>
        <li><input type="checkbox"> Wind break on upwind side</li>
        <li><input type="checkbox"> No widow-makers overhead</li>
        <li><input type="checkbox"> Ground insulated to at least 4&quot; depth</li>
        <li><input type="checkbox"> Roof waterproof before dark</li>
        <li><input type="checkbox"> Ventilation holes if enclosed / snow</li>
        <li><input type="checkbox"> Fire site 3 paces from entrance, downwind</li>
      </ul>
    </div>
  `
});

CH.push({
  id:'fire', title:'Fire', sub:'Warmth, Signal, Water, Food, Morale',
  body: `
    <p class="dropcap">A fire is five things at once: it warms you, it dries you, it signals rescuers, it sterilizes your water, it cooks your food, and — more important than all of those — it gives your brain something to do besides panic. Learning to light one reliably is the single highest-return skill in survival.</p>
    <h2>The Fire Triangle</h2>
    <p>Fuel, heat, oxygen. Lose any one and the fire dies. Beginners fail because they stack too much fuel (smothers oxygen), use wet fuel (the heat goes into boiling water instead of igniting), or skip the tinder (there is no starting heat).</p>
    <h2>Fuel Stages</h2>
    <ol>
      <li><strong>Tinder</strong> — anything that catches from a spark: birch bark, fatwood shavings, dry grass, cattail fluff, inner bark of cedar or juniper, char cloth, lint, cotton ball with petroleum jelly. Process it until it looks like a bird's nest.</li>
      <li><strong>Kindling</strong> — pencil-lead to pencil-thick dry twigs. Squaw wood (dead branches still attached to the tree, off the ground) is usually dry even after rain.</li>
      <li><strong>Small fuel</strong> — finger-thick.</li>
      <li><strong>Main fuel</strong> — wrist-thick and larger, split to expose dry inner wood if needed.</li>
    </ol>
    <p>Collect <em>three times</em> what you think you need before you strike a spark. Running out of kindling while the tinder burns is how almost every first attempt dies.</p>
    <h2>Ignition Methods</h2>
    <h3>Ferrocerium Rod</h3>
    <p>The most reliable modern fire-starter. Scrape a pile of rod shavings onto the tinder first (that's the pre-charge), then strike the rod firmly onto the tinder. Sparks are about 3000°F but live for a fraction of a second — your tinder has to be loose, fluffy, and dead dry.</p>
    <h3>Bow Drill</h3>
    <p>The classic friction technique. You need a fireboard (softwood, e.g. cedar, willow, cottonwood), a spindle (slightly harder wood), a bearing block (stone, hardwood, bone), a bow (green sapling with cordage), and a tinder bundle. Cut a notch in the fireboard, place the spindle in the divot, pin it from above with the bearing block, run the bow. Start slow for smoke, then speed up until the notch is packed with black dust and a coal glows at the bottom. Tip the coal into the tinder bundle and blow steadily. Expect to spend hours learning this; don't expect it to save you the first week you try.</p>
    <h3>Battery + Steel Wool</h3>
    <p>A 9V battery touched to fine (0000) steel wool will ignite it instantly. A headlamp battery and a gum wrapper (foil side) pinched thin in the middle will also work. Great in the dark, wet, or cold.</p>
    <h3>Magnifying Lens</h3>
    <p>Strong sun + a lens (reading glasses, binocular objective, camera lens, even a clear water-filled bag) focused to the smallest possible point on char cloth or black punk wood. Silent, slow, free.</p>
    <h2>Fire Lays</h2>
    <ul>
      <li><strong>Teepee</strong> — classic beginner lay. Great for quick warmth; burns fast.</li>
      <li><strong>Log cabin</strong> — stable, long-burning, good for cooking.</li>
      <li><strong>Upside-down / top-down</strong> — biggest logs at the bottom, kindling at top. You light the top and it burns downward. Lasts the night without tending, counterintuitive but brilliant.</li>
      <li><strong>Dakota fire hole</strong> — two connected pits, fire in one, air intake the other. Hides the flame, burns efficiently, concealed from wind and from eyes.</li>
      <li><strong>Long log / nighttime</strong> — two or three long logs laid parallel and burning along their length. Scoot closer as they burn down.</li>
    </ul>
    <div class="warn">In dry country, clear a 5-foot diameter of all combustibles down to mineral soil, and have water or dirt ready to smother. The difference between a lifesaver and a wildfire is carelessness, not bad luck.</div>
    <div class="panel">
      <div class="panel-title">Wet-Weather Fire Secrets</div>
      <ul>
        <li>Split wood; the inside is dry even in a monsoon.</li>
        <li>Look for fatwood — resin-soaked heartwood at the base of old pine stumps.</li>
        <li>Birch bark lights wet. It's the wilderness equivalent of a road flare.</li>
        <li>Build a platform of sticks to keep the fire off soaked ground.</li>
        <li>Build a reflector wall of green logs behind the fire to throw heat back into you.</li>
      </ul>
    </div>
  `
});

CH.push({
  id:'water', title:'Water', sub:'Finding It, Making It Safe, Not Running Out',
  body: `
    <p class="dropcap">Dehydration is the second-fastest killer in the wilderness, and by the time you feel thirsty you are already around two percent dehydrated — a measurable hit to your judgment. Treat water like fuel: you ration it before you run out, never after.</p>
    <h2>Finding Water</h2>
    <ul>
      <li><strong>Follow gravity.</strong> Valleys, creek beds, the base of cliffs.</li>
      <li><strong>Watch animals and insects.</strong> Bees rarely nest more than 3–4 miles from water. Grazing animals go to water at dawn and dusk. Flocking birds heading low and straight at dusk are flying <em>to</em> water.</li>
      <li><strong>Dig in a dry creek bend.</strong> Pick the outside of the last bend where water flowed; dig a 1-foot seep hole and wait for it to fill.</li>
      <li><strong>Collect dew.</strong> Drag a cotton T-shirt through dew-soaked grass at sunrise, wring it into a container. A quart per hour is not unreasonable.</li>
      <li><strong>Transpiration bag.</strong> Seal a clear plastic bag over a leafy, non-toxic tree branch in full sun. Water will condense out of the leaves. A couple of ounces per bag per day.</li>
      <li><strong>Solar still.</strong> Dig a bowl-shaped pit, place a container at the bottom, put green vegetation around it, cover with clear plastic weighted in the center over the container. Condensation drips into the container. Low yield, but real.</li>
      <li><strong>Snow &amp; ice.</strong> Never eat snow raw — it drops your core temperature and costs more water to rewarm than it gives. Melt it first. Ice gives about twice as much water per melt-energy as snow.</li>
    </ul>
    <h2>Making It Safe</h2>
    <p>All surface water is suspect, even a "pristine" alpine stream. The pathogens that can ruin your week are:</p>
    <ul>
      <li><strong>Protozoa</strong> — <em>Giardia</em>, <em>Cryptosporidium</em>. Cysts. Tough shells.</li>
      <li><strong>Bacteria</strong> — <em>E. coli</em>, <em>Salmonella</em>, <em>Shigella</em>, <em>Campylobacter</em>.</li>
      <li><strong>Viruses</strong> — Hep A, Norovirus, Rotavirus. Tiny; filters alone don't always catch them.</li>
    </ul>
    <h3>Boiling</h3>
    <p>The gold standard. Bring clear water to a rolling boil for one minute at sea level; add an extra minute for each 1000 m of elevation. Kills everything on the list. Requires fire and a fire-safe container.</p>
    <h3>Filtration</h3>
    <p>A 0.1-micron or better pump/straw filter removes protozoa and bacteria; most outdoor filters do not remove viruses (in North American wilderness that's usually fine, but in the developing world pair filtration with chemical or UV treatment).</p>
    <h3>Chemical</h3>
    <p>Iodine tablets, chlorine dioxide tablets, or drops per the label (usually 30 min for clear water, longer and double-dosed for cold or cloudy water). Effective, light, slow. Chlorine dioxide is a better choice for <em>Cryptosporidium</em>.</p>
    <h3>UV</h3>
    <p>A battery-powered UV pen scrambles the DNA of everything in clear water in about 90 seconds per liter. Needs batteries and clear water to work; pre-filter murky water through a bandana first.</p>
    <h3>Improvised Charcoal Filter</h3>
    <p>A tube (sock, bottle with the bottom cut off, hollow log) packed bottom-to-top with cloth → charcoal from a cold fire (crushed fine) → sand → gravel. Pour murky water in the top, catch clearer water out the bottom. This is pre-treatment, <em>not</em> sterilization. Still boil or chemically treat the output.</p>
    <div class="warn">Never drink seawater, urine, or alcohol in a survival situation. They all dehydrate you faster than they hydrate you. A solar still or distillation is the only way to turn seawater into drinking water.</div>
  `
});

CH.push({
  id:'food', title:'Food & Foraging', sub:'Calories, Not Cuisine',
  body: `
    <p class="dropcap">A healthy adult can last three weeks without food. In a short-term survival situation — the kind that ends with rescue or self-rescue in days, not months — food is almost never the critical problem. Still, calories keep you warm, sharp, and sane, and after the first week they start to matter physically.</p>
    <h2>Priority Order for Calories</h2>
    <ol>
      <li><strong>What you brought.</strong> Ration it on day one, not day four.</li>
      <li><strong>Insects.</strong> Highest return on effort. Grasshoppers, crickets, grubs, ant larvae, earthworms. Avoid brightly colored, hairy, or smelly bugs (aposematic coloration means "don't eat me"). Cook anything you find before eating to kill parasites.</li>
      <li><strong>Fish.</strong> Easiest to catch with a line, but even a sharpened stick and a quiet pool works. Gut immediately; eat the liver only if you're certain of the species.</li>
      <li><strong>Traps.</strong> Traps hunt for you 24 hours a day while you do other work. See Chapter IX.</li>
      <li><strong>Plants.</strong> Lowest return unless you already know the species. Forage what you already know, not what you're guessing about.</li>
      <li><strong>Large game.</strong> Last resort. Expensive in calories, hard without firearms, and risky.</li>
    </ol>
    <h2>The Universal Edibility Test</h2>
    <p>If you absolutely must try an unknown plant, this staged test spreads risk over 24 hours. Do it on one plant part at a time (leaves, stems, roots, flowers, fruit — they're different chemically):</p>
    <ol>
      <li>Fast for 8 hours beforehand.</li>
      <li>Inspect for worms, parasites, strong almond smells (cyanide), milky sap, or umbrella-shaped flowers with lacy leaves (Apiaceae family — water hemlock and friends kill you).</li>
      <li>Rub a piece on the inside of your wrist. Wait 15 minutes for rash, burn, or itch.</li>
      <li>Touch the plant to your lips for 3 minutes. Wait 15 minutes for reaction.</li>
      <li>Hold it on your tongue for 15 minutes without chewing.</li>
      <li>Chew but don't swallow for 15 minutes.</li>
      <li>Swallow a small piece. Wait 8 hours. No symptoms? Eat a handful. Wait another 8 hours.</li>
      <li>If still fine, treat this plant part as food.</li>
    </ol>
    <div class="warn">The test is a risk-management protocol, not a safety guarantee. It will not catch slow-acting poisons (mushrooms are infamous — some kill you three days after the meal). <strong>Never eat a mushroom you haven't identified with certainty.</strong></div>
    <h2>Safer Foraging Rules of Thumb</h2>
    <ul>
      <li>Avoid anything with white or yellow berries (a strong majority are toxic).</li>
      <li>Avoid plants with a milky or discolored sap.</li>
      <li>Avoid any plant that smells of bitter almonds.</li>
      <li>Avoid "umbellifers" — lacy-leaved plants with umbrella-shaped flower heads — unless you are <em>absolutely</em> sure (the family contains carrots and poison hemlock side by side).</li>
      <li>Avoid shiny leaves in threes.</li>
      <li>Acorns are edible but bitter; leach them in multiple changes of water before eating.</li>
      <li>Pine inner bark, cambium layer, is edible raw or boiled into a starchy food. In a real pinch, it has kept people alive for weeks.</li>
    </ul>
    <div class="panel">
      <div class="panel-title">Energy vs. Effort</div>
      Don't spend 800 calories chasing a 400-calorie squirrel. Stay still, set traps, fish passively, and collect grasshoppers in the cool morning when they can't fly well. A survival hunter is a patient opportunist, not an action-movie protagonist.
    </div>
  `
});

CH.push({
  id:'firstaid', title:'First Aid', sub:'Stopping the Bleeding, Saving the Warmth',
  body: `
    <p class="dropcap">Wilderness first aid is not the same as urban first aid. In a city you stabilize for 8 minutes until EMS arrives. In the wilderness you might stabilize for 8 hours, 8 days, or the duration of a self-rescue. Your goals change: preserve life, prevent the injury from getting worse, and keep the patient traveling if possible.</p>
    <h2>The Primary Survey: MARCH</h2>
    <ol>
      <li><strong>M — Massive hemorrhage.</strong> Stop bleeding that will kill them in minutes.</li>
      <li><strong>A — Airway.</strong> Open and protect it.</li>
      <li><strong>R — Respiration.</strong> Breathing adequate? Chest rising, both sides?</li>
      <li><strong>C — Circulation.</strong> Pulse present? Skin warm, pink, dry?</li>
      <li><strong>H — Hypothermia / head injury.</strong> Prevent further heat loss. Assess mental status.</li>
    </ol>
    <h2>Bleeding Control</h2>
    <p>Direct pressure, hard, with a clean cloth, for at least 10 minutes without peeking. Most bleeding stops with pressure alone. If an extremity bleed will not stop with pressure and the patient will die otherwise, a tourniquet is correct — apply it high on the limb, tighten until the bleeding stops, and write the time on their forehead or the tourniquet. A tourniquet is uncomfortable but not a death sentence; modern medicine saves tourniquet'd limbs routinely.</p>
    <h2>Shock</h2>
    <p>Pale, cool, clammy, rapid weak pulse, anxious or "out of it." Lay the patient flat, elevate the legs 8–12 inches (unless leg or spine injury), keep them warm, keep them off the cold ground, reassure them, give small sips of water if fully conscious and no abdominal wound.</p>
    <h2>Hypothermia</h2>
    <p>The killer. Stages:</p>
    <ul>
      <li><strong>Mild</strong> — shivering, clumsy, grumpy ("the umbles": stumbles, mumbles, fumbles, grumbles). Treat with dry clothes, shelter, food, warm sugary drink.</li>
      <li><strong>Moderate</strong> — shivering stops, confusion, slurred speech. Medical emergency. Handle gently; rough handling can trigger cardiac arrhythmia. Insulate from ground, add heat to core (armpits, groin, neck), <em>do not</em> rub limbs.</li>
      <li><strong>Severe</strong> — unconscious, rigid, no pulse you can find. Begin very long, very gentle rewarming. "Not dead until warm and dead" — patients have recovered from core temperatures below 60°F.</li>
    </ul>
    <h2>Hyperthermia</h2>
    <ul>
      <li><strong>Heat cramps</strong> — salty muscle spasms. Rest, water, electrolytes.</li>
      <li><strong>Heat exhaustion</strong> — pale, sweating heavily, nauseous, weak. Shade, rest, hydrate, cool compresses.</li>
      <li><strong>Heatstroke</strong> — hot red skin, confused, may have stopped sweating. True emergency. Aggressive cooling: shade, soak clothing, fan, cold water on neck/armpits/groin, evacuate.</li>
    </ul>
    <h2>Fractures and Sprains</h2>
    <p>If in doubt, splint it. Use any stiff object padded to the limb, immobilize the joint above and the joint below the injury. Check circulation (pulse, capillary refill, sensation) before and after splinting and every 30 minutes. A dressed wound that turns a limb blue or numb is tied too tight.</p>
    <h2>Burns</h2>
    <p>Cool running water for 20 minutes. Remove jewelry before swelling starts. Cover with a clean non-stick dressing. Do not apply butter, ice, toothpaste, or urban myth. For large burns, the patient needs fluids and evacuation; burns over 10% of the body surface in a wilderness setting is a serious emergency.</p>
    <div class="warn">Unconscious but breathing? Recovery position: on their side, top leg bent, head tilted to keep the airway open. Log-roll, don't twist, if you suspect spine injury.</div>
  `
});

CH.push({
  id:'navigation', title:'Navigation & Finding Your Way', sub:'Without GPS, With the Sun and the Stars',
  body: `
    <p class="dropcap">Most people don't die lost — they die <em>while</em> lost, from exposure or dehydration. A lost person who sits down often survives. A lost person who keeps walking in a straight line for 48 hours almost never does. The first rule of navigation is the same as the first rule of survival: STOP.</p>
    <h2>If You Are Lost</h2>
    <ol>
      <li>Sit down. Mark your location with something obvious (a pile of rocks, your pack on a stump).</li>
      <li>Listen for 60 seconds without moving. Traffic, river, chainsaw, livestock, aircraft.</li>
      <li>Recall the last place you were certain. How long ago? Which direction?</li>
      <li>Look at a map (mental or physical) and locate the largest linear feature downhill — a road, a river, a power line. These are called <em>catch features</em> and they find you if you walk to them.</li>
      <li>Unless rescue is unlikely, <strong>stay put</strong>. Searchers assume you did. Build shelter, signal, preserve water.</li>
    </ol>
    <h2>Direction From the Sun</h2>
    <p>In the Northern Hemisphere, the sun rises in the east, passes through the southern sky, and sets in the west. In the Southern Hemisphere, it passes through the northern sky. At solar noon (not always 12:00), it's due south or due north depending on your hemisphere.</p>
    <h3>Shadow Stick Method</h3>
    <p>Push a straight stick vertically into flat ground. Mark the tip of its shadow with a pebble. Wait 15–30 minutes. Mark the new tip. The line from the first pebble to the second runs roughly west-to-east (regardless of hemisphere). A line perpendicular to it is north-south.</p>
    <h3>Analog Watch Method</h3>
    <p>Northern Hemisphere: point the hour hand at the sun; the line halfway between the hour hand and the 12 o'clock position points south. Southern Hemisphere: point the 12 at the sun; halfway to the hour hand is north. Less accurate near the equator or near the poles.</p>
    <h2>Direction From the Stars</h2>
    <h3>Polaris (North Star)</h3>
    <p>Northern Hemisphere only. Find the Big Dipper, trace the two stars at the end of the "cup," follow the line roughly 5× their own distance, and you'll find Polaris — it doesn't move while everything else circles it. Face Polaris; you are facing true north.</p>
    <h3>Southern Cross</h3>
    <p>Southern Hemisphere only. Find the four bright stars of Crux. Extend the long axis 4.5× its own length toward the empty sky. That point is roughly due south; drop a line to the horizon and you have south.</p>
    <h2>Map &amp; Compass Fundamentals</h2>
    <ul>
      <li>Orient the map so its north edge faces magnetic north (after accounting for declination).</li>
      <li>Terrain association: match contour lines to what you actually see. Ridges, saddles, drainages, benches.</li>
      <li><strong>Aim off.</strong> Heading to a cabin on a creek? Aim deliberately 200 m upstream or downstream so when you hit the creek you know which way to turn.</li>
      <li>Always use a <strong>handrail</strong> — a linear feature (creek, ridge, road) that you follow without second-guessing.</li>
      <li>Always know your <strong>back-bearing</strong> — the direction to retreat if the plan goes wrong.</li>
    </ul>
    <div class="panel">
      <div class="panel-title">Declination</div>
      The difference between magnetic north (where the compass points) and true north (where the map's grid goes). It varies by location and slowly by time. Get it wrong and a mile of travel turns into a mile-and-a-half error. Look it up on the map margin and add/subtract it every time you convert between map and compass.
    </div>
  `
});

CH.push({
  id:'signaling', title:'Signaling & Rescue', sub:'Making Yourself Impossible to Miss',
  body: `
    <p class="dropcap">If anyone is looking for you, signaling is your single highest-leverage action. A rescuer flies over your camp once. You have about thirty seconds to look unmistakably artificial from the air, or they pass.</p>
    <h2>The Rule of Three</h2>
    <p>Three of anything — three fires in a triangle, three gunshots, three whistle blasts, three flashes of a mirror — is the universal distress signal. Groups of three do not occur often in nature; a rescuer's eye snaps to them.</p>
    <h2>Visual Signals (Daytime)</h2>
    <ul>
      <li><strong>Signal mirror.</strong> The most effective day-signal ever invented. On a sunny day a mirror flash can be seen from a commercial airliner. Sight through the aiming hole, put the reflected bright spot on your hand, then slide the spot onto the target aircraft.</li>
      <li><strong>Smoke.</strong> Damp leaves, green wood, or pine boughs on a hot fire produce white smoke; rubber, plastic, or oil produce black smoke. Contrast with background: white smoke against dark forest, black smoke against snow or sand.</li>
      <li><strong>Ground-to-air symbols.</strong> Stamped in snow, dug in sand, laid out in branches, at least 10 ft tall. Universal codes: <strong>V</strong> = require assistance; <strong>X</strong> = require medical assistance; <strong>→</strong> = proceeding this direction; <strong>F</strong> = need food and water; <strong>Y</strong> = yes; <strong>N</strong> = no.</li>
      <li><strong>High-visibility color.</strong> Orange, red, yellow. A space blanket pegged flat is visible for miles.</li>
    </ul>
    <h2>Visual Signals (Nighttime)</h2>
    <ul>
      <li><strong>Three fires in a triangle.</strong> Build them during the day, light them only when you hear an aircraft.</li>
      <li><strong>Headlamp SOS.</strong> ··· ––– ··· is three short, three long, three short. Repeat.</li>
      <li><strong>Single bright fire</strong> with a reflector wall of rocks or a stack of boughs behind it to amplify visibility.</li>
    </ul>
    <h2>Audio Signals</h2>
    <ul>
      <li><strong>Whistle.</strong> Three long blasts, repeated every minute. A whistle carries farther than shouting and costs you far less energy. Pea-less whistles don't freeze.</li>
      <li><strong>Banging.</strong> A rock on a metal pot. Not dignified. Still works.</li>
    </ul>
    <h2>Electronic</h2>
    <ul>
      <li><strong>PLB / Satellite messenger.</strong> If you carried one, turn it on. This is why you carried it.</li>
      <li><strong>Cell phone.</strong> Climb to the highest point you can reach safely. A text message will sometimes squeeze through a signal too weak for a voice call. If you have no signal at all, turn the phone off to save the battery for the top of the next ridge.</li>
      <li><strong>Aircraft-band radio.</strong> 121.5 MHz is the international emergency frequency, monitored by most overflying aircraft.</li>
    </ul>
    <div class="warn">Smoke and signal mirrors are useless if you don't prepare them <em>before</em> you hear the aircraft. By the time you see the plane you have about 45 seconds. Lay out the fire stack, bundle the tinder, hang the mirror on your belt. Then wait.</div>
  `
});

CH.push({
  id:'traps', title:'Traps, Snares & Improvised Fishing', sub:'Letting the Wilderness Hunt For You',
  body: `
    <p class="dropcap">Active hunting is calorically expensive and frequently unsuccessful. Traps work while you sleep. A survivor who learns two or three reliable snare patterns and sets ten of them covers more ground, more effectively, than a survivor with a slingshot and a grudge.</p>
    <div class="warn">Trapping and snaring are illegal in almost every non-emergency context. The techniques below are shared for educational and emergency use only. Know your local laws, and do not practice on wildlife unless you are actually in a life-threatening situation.</div>
    <h2>Site Selection</h2>
    <p>Traps work on <em>transitions</em> and <em>funnels</em>. Look for game trails at the edges of meadows, crossings over fallen logs, narrow passages through brush, or near water. Don't set traps in the open. A good trapper sets many traps in many places and checks them in a circuit.</p>
    <h2>Simple Snare (loop)</h2>
    <p>A loop of wire (braided picture wire or 24-ga copper), cordage, or paracord inner strand, hung across a game trail at the height of the target's head. The loop tightens as the animal walks through. Anchor to a strong stake or a flexible sapling as a spring pole. For rabbits and squirrels, loop diameter 3–4 inches, set 2–4 inches off the ground.</p>
    <h2>Figure-4 Deadfall</h2>
    <p>Three carved sticks — upright, diagonal, trigger — in an interlocking "4" shape, holding up a heavy flat rock. When the animal takes the bait on the trigger stick, the trigger slips, the rock falls. Requires careful carving and a steady hand, but it's a clean trap with no running cord.</p>
    <h2>Paiute Deadfall</h2>
    <p>A refinement of the figure-4 that uses a short toggle and a length of cord, far more sensitive and more reliable. Learn it in good weather before you need it in bad.</p>
    <h2>Fish Traps</h2>
    <ul>
      <li><strong>Funnel weir.</strong> A V of stones in shallow water narrowing into a pool, with a bottleneck the fish can enter but not easily exit.</li>
      <li><strong>Bottle trap.</strong> Cut the top off a plastic bottle, invert it into the base, bait with bread or bugs, anchor in a pool. Tiny fish and crayfish swim in and can't find the exit.</li>
      <li><strong>Gorge hook.</strong> A sharp toothpick of bone or hard wood tied at the middle to a line, baited so the fish swallows it; the gorge turns sideways in the throat and holds.</li>
    </ul>
    <h2>Processing Small Game</h2>
    <ol>
      <li>Bleed it: nick the jugular, hang head-down.</li>
      <li>Gut it: shallow cut from sternum to pelvis, careful not to puncture bladder or intestines, lift the gut sack out whole.</li>
      <li>Skin it: for rabbits, slit along the back between the shoulder blades and pull the skin apart like a sweater.</li>
      <li>Cook it thoroughly. Rabbits especially — <em>rabbit starvation</em> is a real condition where a diet of too much lean rabbit meat and not enough fat leads to protein poisoning.</li>
    </ol>
  `
});

CH.push({
  id:'knots', title:'Knots Every Survivor Should Know', sub:'Six Knots, One Lifetime',
  body: `
    <p class="dropcap">Most survivors need perhaps six knots. Learn them cold — in the dark, with gloves, behind your back — and you will outperform somebody with a mental library of fifty knots they can half-remember.</p>
    <h2>The Six</h2>
    <h3>1. Bowline — "The King of Knots"</h3>
    <p>Creates a fixed loop in the end of a line that will not slip under load and unties easily afterwards. Uses: rescue loop around a person, attaching a line to a tree, almost any time you need a loop. Mnemonic: <em>the rabbit comes out of the hole, around the tree, and back down the hole</em>.</p>
    <h3>2. Clove Hitch</h3>
    <p>Ties a line to a pole or tree quickly. Easy to tie, easy to adjust, easy to untie, but it can slip under variable load — good for temporary use, questionable for life support.</p>
    <h3>3. Taut-Line Hitch</h3>
    <p>An adjustable loop knot — you can slide it along the standing line to tighten or loosen, and it holds where you leave it. Uses: guy lines on a tarp, tying down a load that might settle overnight.</p>
    <h3>4. Square Knot (Reef Knot)</h3>
    <p>Joins two lines of equal diameter for non-critical loads — lashings, bandage ties, bundling sticks. <em>Do not</em> use it to join ropes that will take heavy load; use a sheet bend or a double fisherman's for that.</p>
    <h3>5. Figure-8 (and Figure-8 on a Bight)</h3>
    <p>A stopper knot that keeps a line from running through a hole, and the foundation of climbing knots. The <em>on a bight</em> variation makes a fixed loop that is stronger than a bowline and even more reliable — the standard tie-in for climbers.</p>
    <h3>6. Trucker's Hitch</h3>
    <p>A mechanical-advantage knot that lets you crank down a line to roughly 2× or 3× the force you apply. Uses: tying down a tarp, securing a load on a sled, tensioning a ridgeline. A fixed loop in the middle of the line, run the tail through the anchor and back up through the loop, pull, cinch off with two half-hitches.</p>
    <div class="panel">
      <div class="panel-title">Practice Drill</div>
      Pick one knot a week. Tie it 50 times on Monday. Tie it in the dark on Tuesday. Tie it with one hand on Wednesday. Tie it while talking about something else on Thursday. By Friday you will never lose it again.
    </div>
  `
});

CH.push({
  id:'environments', title:'Environment-Specific Survival', sub:'Desert, Arctic, Jungle, Maritime, Mountain',
  body: `
    <p class="dropcap">The core priorities (air, shelter, water, food) never change, but every environment weaponizes them differently. What saves your life in the desert will kill you in the arctic.</p>
    <h2>Desert</h2>
    <ul>
      <li><strong>Move at night.</strong> Daytime temperatures kill; nighttime temperatures only inconvenience you. Rest in shade from 10:00 to 16:00.</li>
      <li><strong>Stay covered.</strong> Loose, light-colored clothing reflects sun, slows sweat evaporation, and keeps moisture against the skin. Stripping down in the desert kills rookies.</li>
      <li><strong>Water is the only problem.</strong> Drink all of what you have — don't ration water to the point of heat-stroke. You need it <em>now</em>, not later. Find more by digging in dry creek beds and collecting dew at dawn.</li>
      <li><strong>Watch for flash floods.</strong> A thunderstorm 20 miles away can wall-of-water your dry wash in minutes. Don't camp in the bottom of an arroyo.</li>
    </ul>
    <h2>Arctic &amp; Cold Weather</h2>
    <ul>
      <li><strong>Dry is more important than warm.</strong> Sweat is a killer. Ventilate when you work; re-layer when you stop.</li>
      <li><strong>Cotton kills.</strong> It loses insulation when wet and dries slowly. Wool and synthetic only.</li>
      <li><strong>Don't eat snow.</strong> Melt it first. Eating snow costs you core heat and causes more dehydration than it solves.</li>
      <li><strong>Shelter off the snow.</strong> Insulate beneath you with boughs, packs, or a foam pad. The ground sucks heat.</li>
      <li><strong>Frostbite</strong> — pale, waxy, numb skin. Rewarm against another person's belly or armpit, not by rubbing. Do not rewarm if you might refreeze.</li>
    </ul>
    <h2>Jungle / Tropical</h2>
    <ul>
      <li><strong>Water is everywhere and usually contaminated.</strong> Treat it. Especially near human settlements.</li>
      <li><strong>Watch your feet.</strong> Trench foot, fungus, leeches, cuts that won't heal in humid heat. Dry your feet and rotate socks every day, religiously.</li>
      <li><strong>Follow water downstream.</strong> Streams lead to rivers, rivers lead to villages. Slow but reliable.</li>
      <li><strong>Canopy hides you from rescue.</strong> If you want to be found, get to a clearing, a riverbank, or a ridge.</li>
      <li><strong>Insects and disease</strong> — cover up, tuck pants into socks, don't walk barefoot, burn damp wood at camp for repellent smoke.</li>
    </ul>
    <h2>Maritime / Open Water</h2>
    <ul>
      <li><strong>Stay with the vessel</strong> as long as it floats. A bigger target is easier to find than a swimmer.</li>
      <li><strong>Sun, salt, and dehydration</strong> are the killers. Rig a canopy, collect rainwater, never drink seawater.</li>
      <li><strong>Signal preparation</strong> — flares, mirror, dye marker, strobe. Have them ready.</li>
    </ul>
    <h2>Mountain</h2>
    <ul>
      <li><strong>Weather changes in minutes.</strong> What was a sunny ridge is a lightning storm in twenty. Plan to be off high points by early afternoon.</li>
      <li><strong>Altitude illness</strong> — headache, nausea, shortness of breath, poor judgment. Only cure is descent. Do not "push through" AMS.</li>
      <li><strong>Avalanche terrain</strong> — slopes of 30–45° with recent snow are the danger zone. If you have no training, stay off them and out of their runout zones.</li>
    </ul>
  `
});

CH.push({
  id:'kit', title:'The Kit', sub:'What to Carry, Sized For Your Pack',
  body: `
    <p class="dropcap">Gear is not a substitute for skill, but it is a massive force multiplier of skill. A strong survivor with a pocketful of gear outperforms a strong survivor with nothing in the same way that a lever outperforms bare hands. Build kits in concentric rings: what's always on your body, what's always in your pack, what's in the vehicle.</p>
    <h2>Tier 0 — Always On Your Person</h2>
    <div class="panel">
      <div class="panel-title">Everyday Carry (pocket-sized)</div>
      <ul class="checklist" data-ck="edc">
        <li><input type="checkbox"> Fixed or locking folding knife</li>
        <li><input type="checkbox"> Ferrocerium rod + striker</li>
        <li><input type="checkbox"> Mini Bic lighter in a waterproof bag</li>
        <li><input type="checkbox"> Button compass</li>
        <li><input type="checkbox"> Signal whistle (pea-less)</li>
        <li><input type="checkbox"> Signal mirror (credit-card sized)</li>
        <li><input type="checkbox"> 10 ft of strong cordage</li>
        <li><input type="checkbox"> Single AAA headlamp</li>
        <li><input type="checkbox"> 2 ft of aluminum foil (cup, reflector, signal)</li>
        <li><input type="checkbox"> Tinder packet (waxed cotton)</li>
      </ul>
    </div>
    <h2>Tier 1 — Day Pack</h2>
    <div class="panel">
      <div class="panel-title">Day Pack Essentials</div>
      <ul class="checklist" data-ck="daypack">
        <li><input type="checkbox"> Water: 2 L capacity minimum + purification</li>
        <li><input type="checkbox"> Extra food, 1000+ kcal beyond what you plan to eat</li>
        <li><input type="checkbox"> Insulation layer: warm hat + puffy + rain shell</li>
        <li><input type="checkbox"> Navigation: map, compass, altimeter or GPS</li>
        <li><input type="checkbox"> Headlamp + spare batteries</li>
        <li><input type="checkbox"> First-aid kit (trauma + meds)</li>
        <li><input type="checkbox"> Fire kit: lighter, ferro rod, tinder</li>
        <li><input type="checkbox"> Repair kit: tape, multitool, safety pins, needle &amp; thread</li>
        <li><input type="checkbox"> Shelter: emergency bivy or space blanket</li>
        <li><input type="checkbox"> Sun protection: hat, sunglasses, sunscreen</li>
        <li><input type="checkbox"> Emergency signal: whistle, mirror, maybe PLB</li>
      </ul>
    </div>
    <h2>Tier 2 — The Big Ten C's</h2>
    <p>A common mnemonic for the big items that are essentially impossible to improvise from nothing:</p>
    <ol>
      <li><strong>Cutting tool</strong> (knife)</li>
      <li><strong>Combustion device</strong> (ferro rod, lighter, matches)</li>
      <li><strong>Cover</strong> (tarp, space blanket, poncho)</li>
      <li><strong>Container</strong> (single-walled metal bottle — can boil water)</li>
      <li><strong>Cordage</strong> (bank line, paracord)</li>
      <li><strong>Cotton bandana</strong> (filter, bandage, sling, tinder, etc.)</li>
      <li><strong>Compass</strong></li>
      <li><strong>Candle or headlamp</strong></li>
      <li><strong>Canvas needle</strong> (sewing, hook, splinter tool)</li>
      <li><strong>Cargo tape</strong> (duct tape)</li>
    </ol>
    <p>These ten, carried as an Altoids tin or small pouch, cover shelter, fire, water, cutting, cordage, and basic repair — enough to survive most unplanned nights out.</p>
    <h2>The Vehicle Kit</h2>
    <p>Your car can carry things your back cannot. Add: sleeping bag rated to the worst night of the year, wool blanket, 5 L water, 3 days of food, folding shovel, jumper cables, tow strap, winter traction aids, paper road atlas, full first-aid kit, extra boots and socks, and a small cook stove.</p>
  `
});

CH.push({
  id:'mindset', title:'Mindset & The Will to Live', sub:'The Decisive Variable',
  body: `
    <p class="dropcap">After air, the most important thing a survivor carries is their own mind. Studies of real-world survival outcomes converge on a frustrating and inspiring conclusion: gear matters, skill matters, fitness matters, but the single greatest predictor of who lives is who <em>decides</em> to live.</p>
    <h2>Positive Mental Attitude (PMA)</h2>
    <p>PMA is not denial. It is not forced cheerfulness. It is a deliberate, disciplined refusal to catastrophize. It is the practice of replacing "I'm going to die out here" with "what's the next <em>useful</em> thing I can do in the next fifteen minutes?" — and then doing that thing.</p>
    <h2>The Enemies of Survival Psychology</h2>
    <ul>
      <li><strong>Panic.</strong> Wastes energy, makes bad decisions, causes injury. Antidote: STOP, breathe, make a list.</li>
      <li><strong>Despair.</strong> Physically depletes you almost as fast as dehydration. Antidote: short-horizon goals. Do not think about "will I be rescued?" Think about "where is my next handful of kindling?"</li>
      <li><strong>Loneliness.</strong> Keep a mental roster of people who are waiting for you. Say their names out loud. Make plans for what you'll tell them.</li>
      <li><strong>Boredom.</strong> A dangerous one — leads to carelessness. Structure your day: morning water run, noon signal check, afternoon shelter improvement, evening firewood, night rest.</li>
    </ul>
    <h2>Micro-Goals</h2>
    <p>Break the day into 15-minute tasks. Collect ten sticks. Improve the roof. Check the snares. Dig the fire pit deeper. Boil a cup of water. Each completed task is a small win, and small wins compound into a day survived. Days compound into weeks. Weeks get rescued.</p>
    <div class="panel">
      <div class="panel-title">The Three Reasons</div>
      Write or recite three reasons you want to come home. People. Projects. Promises. Keep them in the front of your mind. Decades of survival psychology suggest that people with concrete reasons outlast people without.
    </div>
    <h2>After the Rescue</h2>
    <p>Everybody who survives a serious wilderness emergency needs a real conversation with a real mental-health professional afterward. There is no shame in this, and ignoring it does not make you tougher. Post-traumatic stress is a normal response to an abnormal event, and it responds to treatment. Make the appointment.</p>
  `
});

// Build index + TOC
const tocList = $('toc-list');
CH.forEach((c, i)=>{
  const li = document.createElement('li');
  const a = document.createElement('a');
  a.href = '#' + c.id; a.textContent = c.title;
  a.dataset.idx = String(i);
  a.addEventListener('click', (e)=>{ e.preventDefault(); openChapter(i); closeTOC(); history.replaceState(null, '', '#'+c.id); });
  li.appendChild(a); tocList.appendChild(li);
});

function openChapter(i){
  const c = CH[i];
  document.querySelectorAll('#toc a').forEach(a=>a.classList.toggle('active', +a.dataset.idx === i));
  const pg = $('page');
  pg.innerHTML = `
    <div class="chapter-label">Chapter ${romanize(i+1)}</div>
    <h1 class="chapter-title">${escapeHtml(c.title)}</h1>
    <div class="chapter-sub">${escapeHtml(c.sub||'')}</div>
    <div class="rule">✦ ✦ ✦</div>
    ${c.body}
    <div class="page-num">— page ${i+1} of ${CH.length} —</div>
  `;
  // Wire checklists
  pg.querySelectorAll('.checklist').forEach(ul=>{
    const key = ul.dataset.ck;
    const saved = loadChecks(key);
    ul.querySelectorAll('input[type=checkbox]').forEach((cb, idx)=>{
      cb.checked = !!saved[idx];
      cb.addEventListener('change', ()=>{
        const arr = loadChecks(key);
        arr[idx] = cb.checked;
        saveChecks(key, arr);
      });
    });
  });
  $('reader').scrollTo({top:0, behavior:'auto'});
}
function romanize(n){
  const m=['','I','II','III','IV','V','VI','VII','VIII','IX','X','XI','XII','XIII','XIV','XV'];
  return m[n] || String(n);
}
function escapeHtml(s){ return String(s).replace(/[&<>"']/g, (c)=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c])); }
function loadChecks(key){ try { return (JSON.parse(localStorage.getItem(LS)||'{}')[key]) || []; } catch(e){ return []; } }
function saveChecks(key, arr){ let o={}; try{ o=JSON.parse(localStorage.getItem(LS)||'{}'); }catch(e){} o[key]=arr; localStorage.setItem(LS, JSON.stringify(o)); }

$('btn-reset-checks').addEventListener('click', ()=>{
  if(!confirm('Reset all checklists?')) return;
  localStorage.removeItem(LS);
  // Refresh current page
  const active = document.querySelector('#toc a.active');
  if(active) openChapter(+active.dataset.idx);
});
$('btn-print').addEventListener('click', ()=>window.print());

// Search across chapters
function buildIndex(){
  return CH.map((c,i)=>{
    const tmp = document.createElement('div'); tmp.innerHTML = c.body;
    return { i, id:c.id, title:c.title, sub:c.sub||'', text: (tmp.textContent||'').replace(/\s+/g,' ').trim() };
  });
}
const INDEX = buildIndex();
const search = $('search');
const results = $('search-results');
search.addEventListener('input', ()=>{
  const q = search.value.trim().toLowerCase();
  if(q.length < 2){ results.classList.remove('show'); return; }
  const hits = [];
  INDEX.forEach(e=>{
    const t = (e.title+' '+e.sub+' '+e.text).toLowerCase();
    const idx = t.indexOf(q);
    if(idx >= 0){
      const lo = Math.max(0, idx-40), hi = Math.min(e.text.length, idx+q.length+80);
      const raw = e.text.slice(lo, hi);
      const re = new RegExp('('+q.replace(/[.*+?^${}()|[\]\\]/g,'\\$&')+')', 'ig');
      const snip = escapeHtml(raw).replace(re, '<mark>$1</mark>');
      hits.push({e, snip});
    }
  });
  if(!hits.length){ results.innerHTML = '<div class="hit">No matches.</div>'; results.classList.add('show'); return; }
  results.innerHTML = hits.slice(0,20).map(h=>`<a class="hit" href="#${h.e.id}" data-idx="${h.e.i}"><div class="ch">Chapter ${romanize(h.e.i+1)} — ${escapeHtml(h.e.title)}</div><div class="snip">${h.snip}</div></a>`).join('');
  results.classList.add('show');
  results.querySelectorAll('a.hit').forEach(a=>a.addEventListener('click', (e)=>{
    e.preventDefault(); openChapter(+a.dataset.idx); results.classList.remove('show'); search.value=''; history.replaceState(null,'', '#'+a.getAttribute('href').slice(1));
  }));
});
document.addEventListener('click', (e)=>{
  if(!results.contains(e.target) && e.target !== search){ results.classList.remove('show'); }
});

// TOC mobile toggle
function openTOC(){ document.querySelector('main').classList.add('toc-open'); }
function closeTOC(){ document.querySelector('main').classList.remove('toc-open'); }
$('toc-btn').addEventListener('click', openTOC);
$('scrim').addEventListener('click', closeTOC);

// Init — open chapter from hash if present, else chapter 0
window.addEventListener('load', ()=>{
  const hash = (location.hash||'').slice(1);
  const idx = Math.max(0, CH.findIndex(c=>c.id===hash));
  openChapter(idx>=0 ? idx : 0);
});
})();
</script>
