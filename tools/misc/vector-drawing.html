<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<title>Vector Drawing | Korb Engineering</title>
<style>
  :root{
    --bg:#050a0f; --surface:#0a1018; --surface2:#0e1520; --border:#1a2535;
    --cyan:#00d4ff; --orange:#ff6600; --green:#10b981; --red:#ef4444;
    --gold:#fbbf24; --text:#e2e8f0; --muted:#64748b;
  }
  *{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
  html,body{height:100%;overflow:hidden;font-family:'JetBrains Mono',monospace;background:var(--bg);color:var(--text);font-size:12px;-webkit-user-select:none;user-select:none}
  button,input,select{font-family:inherit;font-size:inherit;color:var(--text)}
  button{background:var(--surface2);border:1px solid var(--border);padding:8px 10px;min-height:36px;min-width:36px;cursor:pointer;border-radius:3px;transition:all .15s}
  button:hover{border-color:var(--cyan);color:var(--cyan)}
  button.active{background:var(--cyan);color:var(--bg);border-color:var(--cyan)}
  button.danger:hover{border-color:var(--red);color:var(--red)}
  input[type=text],input[type=number],input[type=color],select{background:var(--bg);border:1px solid var(--border);padding:6px 8px;border-radius:3px;min-height:32px;width:100%}
  input[type=range]{width:100%;accent-color:var(--cyan)}
  input[type=color]{padding:2px;height:32px;cursor:pointer}
  .app{display:grid;grid-template-columns:56px 1fr 240px;grid-template-rows:44px 1fr;height:100vh;width:100vw}
  .topbar{grid-column:1/4;background:var(--surface);border-bottom:1px solid var(--border);display:flex;align-items:center;gap:6px;padding:0 8px;overflow-x:auto}
  .topbar .title{color:var(--cyan);font-weight:bold;letter-spacing:1px;padding-right:8px;border-right:1px solid var(--border);margin-right:4px;white-space:nowrap}
  .topbar button{min-height:32px;padding:4px 8px;font-size:11px}
  .toolbar{background:var(--surface);border-right:1px solid var(--border);display:flex;flex-direction:column;gap:4px;padding:6px;overflow-y:auto}
  .toolbar button{width:44px;height:44px;padding:0;font-size:14px;display:flex;align-items:center;justify-content:center}
  .canvas-wrap{position:relative;overflow:hidden;background:#030609;touch-action:none}
  #svg{display:block;width:100%;height:100%;cursor:crosshair}
  .side{background:var(--surface);border-left:1px solid var(--border);display:flex;flex-direction:column;overflow:hidden}
  .side-tabs{display:flex;border-bottom:1px solid var(--border)}
  .side-tabs button{flex:1;border:none;border-radius:0;border-bottom:2px solid transparent;background:transparent;min-height:36px;font-size:10px}
  .side-tabs button.active{border-bottom-color:var(--cyan);color:var(--cyan);background:var(--surface2)}
  .side-panel{flex:1;overflow-y:auto;padding:10px;display:none}
  .side-panel.active{display:block}
  .section{margin-bottom:14px}
  .section h4{color:var(--orange);font-size:10px;text-transform:uppercase;letter-spacing:1px;margin-bottom:6px;border-bottom:1px solid var(--border);padding-bottom:3px}
  .row{display:flex;gap:4px;align-items:center;margin-bottom:6px}
  .row label{font-size:10px;color:var(--muted);min-width:54px}
  .swatches{display:grid;grid-template-columns:repeat(6,1fr);gap:4px;margin-bottom:6px}
  .swatch{aspect-ratio:1;border:1px solid var(--border);cursor:pointer;border-radius:2px}
  .swatch.none{background:linear-gradient(45deg,transparent 45%,var(--red) 45%,var(--red) 55%,transparent 55%)}
  .layer{display:flex;align-items:center;gap:4px;padding:6px;border:1px solid var(--border);background:var(--surface2);margin-bottom:4px;border-radius:3px;cursor:pointer;font-size:10px}
  .layer.selected{border-color:var(--cyan);background:#0a1b2a}
  .layer .name{flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
  .layer button{padding:2px 4px;min-width:22px;min-height:22px;font-size:10px}
  .status{position:absolute;bottom:6px;left:6px;background:rgba(10,16,24,.85);border:1px solid var(--border);padding:4px 8px;border-radius:3px;font-size:10px;color:var(--muted);pointer-events:none}
  .zoom-ctrl{position:absolute;bottom:6px;right:6px;display:flex;gap:4px;background:rgba(10,16,24,.85);border:1px solid var(--border);border-radius:3px;padding:2px}
  .zoom-ctrl button{min-height:28px;min-width:28px;padding:0;font-size:12px}
  .modal{position:fixed;inset:0;background:rgba(0,0,0,.8);display:none;align-items:center;justify-content:center;z-index:100}
  .modal.open{display:flex}
  .modal-body{background:var(--surface);border:1px solid var(--cyan);padding:16px;min-width:280px;max-width:90vw;max-height:80vh;overflow-y:auto;border-radius:4px}
  .modal-body h3{color:var(--cyan);margin-bottom:10px;font-size:13px}
  .file-list{max-height:240px;overflow-y:auto;margin:8px 0}
  .file-item{display:flex;gap:4px;align-items:center;padding:6px;border:1px solid var(--border);margin-bottom:4px;background:var(--surface2);border-radius:3px}
  .file-item .n{flex:1;font-size:11px;overflow:hidden;text-overflow:ellipsis}
  .modal-actions{display:flex;gap:6px;justify-content:flex-end;margin-top:10px}
  .handle{fill:var(--cyan);stroke:var(--bg);stroke-width:1;cursor:nwse-resize}
  .handle.rot{fill:var(--gold);cursor:grab}
  .selbox{fill:none;stroke:var(--cyan);stroke-width:1;stroke-dasharray:4,3;pointer-events:none}
  .grid-line{stroke:#0e1a28;stroke-width:.5}
  @media (max-width:768px){
    .app{grid-template-columns:48px 1fr;grid-template-rows:40px 1fr 200px}
    .topbar{grid-column:1/3}
    .side{grid-column:1/3;border-left:none;border-top:1px solid var(--border);max-height:200px}
    .toolbar button{width:40px;height:40px}
  }
</style>
</head>
<body>
<div class="app">
  <div class="topbar">
    <div class="title">VECTOR.DRAW</div>
    <button id="btnNew" title="New">NEW</button>
    <button id="btnSave" title="Save">SAVE</button>
    <button id="btnLoad" title="Load">LOAD</button>
    <button id="btnUndo" title="Undo (Ctrl+Z)">UNDO</button>
    <button id="btnRedo" title="Redo (Ctrl+Y)">REDO</button>
    <button id="btnDup" title="Duplicate (Ctrl+D)">DUP</button>
    <button id="btnDel" title="Delete" class="danger">DEL</button>
    <button id="btnGroup" title="Group (Ctrl+G)">GRP</button>
    <button id="btnUngroup" title="Ungroup">UNG</button>
    <button id="btnAlignL" title="Align Left">⇤</button>
    <button id="btnAlignCH" title="Align Center H">⇔</button>
    <button id="btnAlignR" title="Align Right">⇥</button>
    <button id="btnAlignT" title="Align Top">⇞</button>
    <button id="btnAlignCV" title="Align Middle V">⇕</button>
    <button id="btnAlignB" title="Align Bottom">⇟</button>
    <button id="btnDistH" title="Distribute H">|‖|</button>
    <button id="btnDistV" title="Distribute V">≡</button>
    <button id="btnSnap" title="Snap to Grid">SNAP</button>
    <button id="btnExpSvg" title="Export SVG">SVG</button>
    <button id="btnExpPng" title="Export PNG">PNG</button>
    <button id="btnCopy" title="Copy SVG">COPY</button>
  </div>
  <div class="toolbar" id="toolbar">
    <button data-tool="select" class="active" title="Select (V)">▶</button>
    <button data-tool="rect" title="Rectangle (R)">▭</button>
    <button data-tool="ellipse" title="Ellipse (O)">◯</button>
    <button data-tool="line" title="Line (L)">╱</button>
    <button data-tool="polygon" title="Polygon">⬠</button>
    <button data-tool="pen" title="Pen (P)">✎</button>
    <button data-tool="freehand" title="Freehand">≈</button>
    <button data-tool="text" title="Text (T)">T</button>
  </div>
  <div class="canvas-wrap" id="canvasWrap">
    <svg id="svg" xmlns="http://www.w3.org/2000/svg">
      <defs>
        <pattern id="gridPattern" width="20" height="20" patternUnits="userSpaceOnUse">
          <path d="M 20 0 L 0 0 0 20" class="grid-line" fill="none"/>
        </pattern>
      </defs>
      <rect id="gridBg" width="100%" height="100%" fill="url(#gridPattern)"/>
      <g id="world">
        <g id="shapes"></g>
        <g id="overlay"></g>
      </g>
    </svg>
    <div class="status" id="status">Tool: Select | Shapes: 0</div>
    <div class="zoom-ctrl">
      <button id="zoomOut">-</button>
      <button id="zoomReset">1x</button>
      <button id="zoomIn">+</button>
    </div>
  </div>
  <div class="side">
    <div class="side-tabs">
      <button data-tab="props" class="active">PROPS</button>
      <button data-tab="layers">LAYERS</button>
    </div>
    <div class="side-panel active" data-panel="props">
      <div class="section">
        <h4>Fill</h4>
        <div class="swatches" id="fillSwatches"></div>
        <div class="row"><label>Hex</label><input type="color" id="fillColor" value="#00d4ff"></div>
      </div>
      <div class="section">
        <h4>Stroke</h4>
        <div class="swatches" id="strokeSwatches"></div>
        <div class="row"><label>Hex</label><input type="color" id="strokeColor" value="#e2e8f0"></div>
        <div class="row"><label>Width</label><input type="range" id="strokeWidth" min="0" max="30" value="2"><span id="swVal" style="min-width:24px;text-align:right;color:var(--cyan)">2</span></div>
      </div>
      <div class="section">
        <h4>Shape</h4>
        <div class="row"><label>Opacity</label><input type="range" id="opacity" min="0" max="1" step="0.05" value="1"><span id="opVal" style="min-width:28px;text-align:right;color:var(--cyan)">1</span></div>
        <div class="row"><label>Radius</label><input type="range" id="radius" min="0" max="100" value="0"><span id="rdVal" style="min-width:24px;text-align:right;color:var(--cyan)">0</span></div>
        <div class="row"><label>Rotate</label><input type="range" id="rotate" min="0" max="360" value="0"><span id="rtVal" style="min-width:28px;text-align:right;color:var(--cyan)">0°</span></div>
      </div>
      <div class="section">
        <h4>Text</h4>
        <div class="row"><input type="text" id="textInput" placeholder="Text content"></div>
        <div class="row"><label>Size</label><input type="number" id="fontSize" value="24" min="6" max="200"></div>
      </div>
    </div>
    <div class="side-panel" data-panel="layers">
      <div class="section">
        <h4>Layers (top → bottom)</h4>
        <div id="layerList"></div>
      </div>
    </div>
  </div>
</div>

<div class="modal" id="modal">
  <div class="modal-body">
    <h3 id="modalTitle">Dialog</h3>
    <div id="modalContent"></div>
    <div class="modal-actions">
      <button id="modalCancel">CANCEL</button>
      <button id="modalOk" style="border-color:var(--cyan);color:var(--cyan)">OK</button>
    </div>
  </div>
</div>

<script>
(() => {
  const SVG_NS = 'http://www.w3.org/2000/svg';
  const svg = document.getElementById('svg');
  const shapesG = document.getElementById('shapes');
  const overlayG = document.getElementById('overlay');
  const worldG = document.getElementById('world');
  const canvasWrap = document.getElementById('canvasWrap');
  const status = document.getElementById('status');
  const PALETTE = ['#00d4ff','#ff6600','#10b981','#ef4444','#fbbf24','#e2e8f0','#050a0f','#0a1018','#64748b','#a855f7','#ec4899','none'];

  let state = {
    tool:'select',
    shapes:[], // {id,type,attrs,children?,locked,hidden,name}
    selected:[],
    fill:'#00d4ff',
    stroke:'#e2e8f0',
    strokeWidth:2,
    opacity:1,
    radius:0,
    rotate:0,
    fontSize:24,
    zoom:1,
    panX:0,
    panY:0,
    snap:false,
    gridSize:20,
    history:[],
    hIdx:-1,
    idCounter:1,
    penPoints:[],
    freehandPoints:[],
  };

  // ---------- utility ----------
  const uid = () => 's'+(state.idCounter++);
  const clamp=(v,a,b)=>Math.max(a,Math.min(b,v));
  const snap = v => state.snap ? Math.round(v/state.gridSize)*state.gridSize : v;

  function screenToWorld(x,y){
    const r = svg.getBoundingClientRect();
    const sx = x-r.left, sy = y-r.top;
    return {x:(sx-state.panX)/state.zoom, y:(sy-state.panY)/state.zoom};
  }
  function updateWorldTransform(){
    worldG.setAttribute('transform',`translate(${state.panX},${state.panY}) scale(${state.zoom})`);
    document.getElementById('gridBg').setAttribute('transform',`translate(${state.panX%(20*state.zoom)},${state.panY%(20*state.zoom)}) scale(${state.zoom})`);
    const p = document.getElementById('gridPattern');
    p.setAttribute('width',20); p.setAttribute('height',20);
  }

  // ---------- shape rendering ----------
  function createEl(shape){
    let el;
    switch(shape.type){
      case 'rect': el = document.createElementNS(SVG_NS,'rect'); break;
      case 'ellipse': el = document.createElementNS(SVG_NS,'ellipse'); break;
      case 'line': el = document.createElementNS(SVG_NS,'line'); break;
      case 'polygon': el = document.createElementNS(SVG_NS,'polygon'); break;
      case 'path': el = document.createElementNS(SVG_NS,'path'); break;
      case 'text': el = document.createElementNS(SVG_NS,'text'); break;
      case 'group': el = document.createElementNS(SVG_NS,'g'); break;
    }
    el.dataset.id = shape.id;
    return el;
  }
  function applyAttrs(el, shape){
    for(const k in shape.attrs) el.setAttribute(k, shape.attrs[k]);
    if(shape.type==='text') el.textContent = shape.attrs._text||'';
    if(shape.hidden) el.style.display='none'; else el.style.display='';
    if(shape.locked) el.style.pointerEvents='none'; else el.style.pointerEvents='';
  }
  function render(){
    shapesG.innerHTML='';
    for(const sh of state.shapes){
      if(sh.type==='group'){
        const g = createEl(sh);
        applyAttrs(g, sh);
        for(const c of sh.children){
          const ce = createEl(c);
          applyAttrs(ce, c);
          g.appendChild(ce);
        }
        shapesG.appendChild(g);
      } else {
        const el = createEl(sh);
        applyAttrs(el, sh);
        shapesG.appendChild(el);
      }
    }
    renderSelection();
    renderLayers();
    status.textContent = `Tool: ${state.tool} | Shapes: ${state.shapes.length} | Zoom: ${(state.zoom*100).toFixed(0)}%${state.snap?' | SNAP':''}`;
  }

  // ---------- bounding box ----------
  function bbox(sh){
    if(sh.type==='rect'){
      return {x:+sh.attrs.x,y:+sh.attrs.y,w:+sh.attrs.width,h:+sh.attrs.height};
    }
    if(sh.type==='ellipse'){
      const cx=+sh.attrs.cx,cy=+sh.attrs.cy,rx=+sh.attrs.rx,ry=+sh.attrs.ry;
      return {x:cx-rx,y:cy-ry,w:rx*2,h:ry*2};
    }
    if(sh.type==='line'){
      const x1=+sh.attrs.x1,y1=+sh.attrs.y1,x2=+sh.attrs.x2,y2=+sh.attrs.y2;
      return {x:Math.min(x1,x2),y:Math.min(y1,y2),w:Math.abs(x2-x1),h:Math.abs(y2-y1)};
    }
    if(sh.type==='polygon'||sh.type==='path'||sh.type==='text'||sh.type==='group'){
      // measure from rendered DOM
      const el = shapesG.querySelector(`[data-id="${sh.id}"]`);
      if(el && el.getBBox){
        try{ const b = el.getBBox(); return {x:b.x,y:b.y,w:b.width,h:b.height}; }catch(e){}
      }
      return {x:0,y:0,w:0,h:0};
    }
    return {x:0,y:0,w:0,h:0};
  }

  function translateShape(sh,dx,dy){
    if(sh.type==='rect'){ sh.attrs.x=+sh.attrs.x+dx; sh.attrs.y=+sh.attrs.y+dy; }
    else if(sh.type==='ellipse'){ sh.attrs.cx=+sh.attrs.cx+dx; sh.attrs.cy=+sh.attrs.cy+dy; }
    else if(sh.type==='line'){ sh.attrs.x1=+sh.attrs.x1+dx; sh.attrs.y1=+sh.attrs.y1+dy; sh.attrs.x2=+sh.attrs.x2+dx; sh.attrs.y2=+sh.attrs.y2+dy; }
    else if(sh.type==='polygon'){
      sh.attrs.points = sh.attrs.points.split(' ').map(p=>{const[a,b]=p.split(',').map(Number);return (a+dx)+','+(b+dy);}).join(' ');
    }
    else if(sh.type==='path'){
      // translate via transform compose
      const t = sh.attrs.transform||'';
      const m = t.match(/translate\(([-\d.]+),([-\d.]+)\)/);
      if(m){ sh.attrs.transform = t.replace(/translate\([-\d.,]+\)/,`translate(${+m[1]+dx},${+m[2]+dy})`); }
      else { sh.attrs.transform = `translate(${dx},${dy}) `+t; }
    }
    else if(sh.type==='text'){ sh.attrs.x=+sh.attrs.x+dx; sh.attrs.y=+sh.attrs.y+dy; }
    else if(sh.type==='group'){ for(const c of sh.children) translateShape(c,dx,dy); }
  }

  // ---------- selection / overlay ----------
  function renderSelection(){
    overlayG.innerHTML='';
    if(!state.selected.length) return;
    for(const id of state.selected){
      const sh = findShape(id);
      if(!sh) continue;
      const b = bbox(sh);
      const r = document.createElementNS(SVG_NS,'rect');
      r.setAttribute('x',b.x-2); r.setAttribute('y',b.y-2);
      r.setAttribute('width',b.w+4); r.setAttribute('height',b.h+4);
      r.setAttribute('class','selbox');
      overlayG.appendChild(r);
      // handles only for single selection
      if(state.selected.length===1){
        const corners=[[b.x,b.y,'nw'],[b.x+b.w,b.y,'ne'],[b.x,b.y+b.h,'sw'],[b.x+b.w,b.y+b.h,'se']];
        for(const[cx,cy,dir] of corners){
          const h = document.createElementNS(SVG_NS,'rect');
          h.setAttribute('x',cx-5); h.setAttribute('y',cy-5);
          h.setAttribute('width',10); h.setAttribute('height',10);
          h.setAttribute('class','handle');
          h.dataset.handle=dir;
          overlayG.appendChild(h);
        }
        const rot = document.createElementNS(SVG_NS,'circle');
        rot.setAttribute('cx',b.x+b.w/2); rot.setAttribute('cy',b.y-24);
        rot.setAttribute('r',6); rot.setAttribute('class','handle rot');
        rot.dataset.handle='rot';
        overlayG.appendChild(rot);
        const line = document.createElementNS(SVG_NS,'line');
        line.setAttribute('x1',b.x+b.w/2); line.setAttribute('y1',b.y-18);
        line.setAttribute('x2',b.x+b.w/2); line.setAttribute('y2',b.y-2);
        line.setAttribute('stroke','var(--gold)'); line.setAttribute('stroke-width','1');
        overlayG.appendChild(line);
      }
    }
  }
  function findShape(id){
    for(const s of state.shapes){
      if(s.id===id) return s;
      if(s.type==='group') for(const c of s.children) if(c.id===id) return c;
    }
    return null;
  }
  function findTopLevel(id){
    for(const s of state.shapes){
      if(s.id===id) return s;
      if(s.type==='group' && s.children.some(c=>c.id===id)) return s;
    }
    return null;
  }

  // ---------- history ----------
  function snapshot(){
    state.history = state.history.slice(0,state.hIdx+1);
    state.history.push(JSON.stringify({shapes:state.shapes,idCounter:state.idCounter}));
    if(state.history.length>50) state.history.shift();
    state.hIdx = state.history.length-1;
  }
  function undo(){
    if(state.hIdx>0){ state.hIdx--; restore(state.history[state.hIdx]); }
  }
  function redo(){
    if(state.hIdx<state.history.length-1){ state.hIdx++; restore(state.history[state.hIdx]); }
  }
  function restore(s){
    const d = JSON.parse(s);
    state.shapes = d.shapes;
    state.idCounter = d.idCounter;
    state.selected = [];
    render();
  }

  // ---------- tool interactions ----------
  let drag = null;

  svg.addEventListener('pointerdown', e=>{
    if(e.target.closest('.zoom-ctrl')) return;
    svg.setPointerCapture(e.pointerId);
    const pt = screenToWorld(e.clientX,e.clientY);
    pt.x = snap(pt.x); pt.y = snap(pt.y);

    // pan
    if(e.button===1 || e.shiftKey && state.tool==='select' || e.spaceDown){
      drag = {mode:'pan',sx:e.clientX,sy:e.clientY,ox:state.panX,oy:state.panY};
      return;
    }
    if(spaceHeld){
      drag = {mode:'pan',sx:e.clientX,sy:e.clientY,ox:state.panX,oy:state.panY};
      return;
    }

    if(state.tool==='select'){
      // handle?
      if(e.target.classList.contains('handle')){
        const dir = e.target.dataset.handle;
        const sh = findShape(state.selected[0]);
        if(!sh) return;
        const b = bbox(sh);
        drag = {mode: dir==='rot'?'rotate':'scale', dir, startPt:pt, bbox:b, sh, origAttrs:JSON.parse(JSON.stringify(sh.attrs))};
        return;
      }
      // click on shape?
      const id = e.target.dataset.id;
      if(id){
        const topId = findTopLevel(id)?.id;
        if(!e.ctrlKey && !e.metaKey && !state.selected.includes(topId)){
          state.selected = [topId];
        } else if(e.ctrlKey || e.metaKey){
          if(state.selected.includes(topId)) state.selected = state.selected.filter(i=>i!==topId);
          else state.selected.push(topId);
        }
        renderSelection();
        drag = {mode:'move',sx:pt.x,sy:pt.y,lx:pt.x,ly:pt.y};
      } else {
        state.selected = [];
        renderSelection();
        drag = {mode:'marquee',sx:pt.x,sy:pt.y};
      }
      updatePropsUI();
      return;
    }

    if(state.tool==='rect'){
      const sh = {id:uid(),type:'rect',name:'Rect',attrs:{x:pt.x,y:pt.y,width:1,height:1,fill:state.fill,stroke:state.stroke,'stroke-width':state.strokeWidth,opacity:state.opacity,rx:state.radius,ry:state.radius}};
      state.shapes.push(sh); drag={mode:'draw',sh,startPt:pt};
      render();
    }
    else if(state.tool==='ellipse'){
      const sh = {id:uid(),type:'ellipse',name:'Ellipse',attrs:{cx:pt.x,cy:pt.y,rx:1,ry:1,fill:state.fill,stroke:state.stroke,'stroke-width':state.strokeWidth,opacity:state.opacity}};
      state.shapes.push(sh); drag={mode:'draw',sh,startPt:pt};
      render();
    }
    else if(state.tool==='line'){
      const sh = {id:uid(),type:'line',name:'Line',attrs:{x1:pt.x,y1:pt.y,x2:pt.x,y2:pt.y,stroke:state.stroke,'stroke-width':state.strokeWidth,opacity:state.opacity}};
      state.shapes.push(sh); drag={mode:'draw',sh,startPt:pt};
      render();
    }
    else if(state.tool==='polygon'){
      // regular polygon: center->radius
      const sides = 5;
      const sh = {id:uid(),type:'polygon',name:'Polygon',attrs:{points:`${pt.x},${pt.y}`,fill:state.fill,stroke:state.stroke,'stroke-width':state.strokeWidth,opacity:state.opacity,_sides:sides}};
      state.shapes.push(sh); drag={mode:'polydraw',sh,center:pt};
      render();
    }
    else if(state.tool==='pen'){
      state.penPoints.push(pt);
      if(state.penPoints.length===1){
        const sh = {id:uid(),type:'path',name:'Path',attrs:{d:`M ${pt.x} ${pt.y}`,fill:'none',stroke:state.stroke,'stroke-width':state.strokeWidth,opacity:state.opacity}};
        state.shapes.push(sh);
        state.currentPen = sh;
      } else {
        const d = state.penPoints.map((p,i)=>i===0?`M ${p.x} ${p.y}`:`L ${p.x} ${p.y}`).join(' ');
        state.currentPen.attrs.d = d;
      }
      render();
    }
    else if(state.tool==='freehand'){
      state.freehandPoints = [pt];
      const sh = {id:uid(),type:'path',name:'Freehand',attrs:{d:`M ${pt.x} ${pt.y}`,fill:'none',stroke:state.stroke,'stroke-width':state.strokeWidth,opacity:state.opacity}};
      state.shapes.push(sh); drag={mode:'freehand',sh};
      render();
    }
    else if(state.tool==='text'){
      const txt = document.getElementById('textInput').value || 'Text';
      const sh = {id:uid(),type:'text',name:'Text',attrs:{x:pt.x,y:pt.y,fill:state.fill,stroke:'none','font-size':state.fontSize,'font-family':"'JetBrains Mono',monospace",opacity:state.opacity,_text:txt}};
      state.shapes.push(sh);
      state.selected=[sh.id];
      snapshot();
      render();
    }
  });

  svg.addEventListener('pointermove', e=>{
    const pt = screenToWorld(e.clientX,e.clientY);
    pt.x = snap(pt.x); pt.y = snap(pt.y);

    if(!drag) return;
    if(drag.mode==='pan'){
      state.panX = drag.ox + (e.clientX-drag.sx);
      state.panY = drag.oy + (e.clientY-drag.sy);
      updateWorldTransform();
      return;
    }
    if(drag.mode==='draw'){
      const sh = drag.sh;
      const s = drag.startPt;
      if(sh.type==='rect'){
        sh.attrs.x = Math.min(s.x,pt.x);
        sh.attrs.y = Math.min(s.y,pt.y);
        sh.attrs.width = Math.abs(pt.x-s.x);
        sh.attrs.height = Math.abs(pt.y-s.y);
      } else if(sh.type==='ellipse'){
        sh.attrs.cx = (s.x+pt.x)/2;
        sh.attrs.cy = (s.y+pt.y)/2;
        sh.attrs.rx = Math.abs(pt.x-s.x)/2;
        sh.attrs.ry = Math.abs(pt.y-s.y)/2;
      } else if(sh.type==='line'){
        sh.attrs.x2 = pt.x; sh.attrs.y2 = pt.y;
      }
      render();
    }
    else if(drag.mode==='polydraw'){
      const sh = drag.sh;
      const c = drag.center;
      const r = Math.hypot(pt.x-c.x,pt.y-c.y);
      const n = sh.attrs._sides;
      const pts=[];
      for(let i=0;i<n;i++){
        const a = -Math.PI/2 + i*2*Math.PI/n;
        pts.push(`${(c.x+Math.cos(a)*r).toFixed(2)},${(c.y+Math.sin(a)*r).toFixed(2)}`);
      }
      sh.attrs.points = pts.join(' ');
      render();
    }
    else if(drag.mode==='freehand'){
      state.freehandPoints.push(pt);
      drag.sh.attrs.d = state.freehandPoints.map((p,i)=>i===0?`M ${p.x} ${p.y}`:`L ${p.x} ${p.y}`).join(' ');
      render();
    }
    else if(drag.mode==='move'){
      const dx = pt.x-drag.lx, dy = pt.y-drag.ly;
      for(const id of state.selected){
        const sh = findShape(id);
        if(sh && !sh.locked) translateShape(sh,dx,dy);
      }
      drag.lx = pt.x; drag.ly = pt.y;
      render();
    }
    else if(drag.mode==='scale'){
      const sh = drag.sh;
      const b = drag.bbox;
      let nx=b.x,ny=b.y,nw=b.w,nh=b.h;
      if(drag.dir.includes('e')) nw = Math.max(1,pt.x-b.x);
      if(drag.dir.includes('s')) nh = Math.max(1,pt.y-b.y);
      if(drag.dir.includes('w')){ nx = pt.x; nw = Math.max(1,b.x+b.w-pt.x); }
      if(drag.dir.includes('n')){ ny = pt.y; nh = Math.max(1,b.y+b.h-pt.y); }
      // rescale shape
      scaleShapeTo(sh, drag.origAttrs, b, {x:nx,y:ny,w:nw,h:nh});
      render();
    }
    else if(drag.mode==='rotate'){
      const sh = drag.sh;
      const b = drag.bbox;
      const cx = b.x+b.w/2, cy = b.y+b.h/2;
      const a = Math.atan2(pt.y-cy,pt.x-cx)*180/Math.PI + 90;
      const existing = (sh.attrs.transform||'').replace(/rotate\([^)]*\)/,'').trim();
      sh.attrs.transform = `rotate(${a.toFixed(1)} ${cx} ${cy}) ${existing}`.trim();
      render();
    }
    else if(drag.mode==='marquee'){
      // simple visual marquee
      overlayG.innerHTML='';
      const r = document.createElementNS(SVG_NS,'rect');
      r.setAttribute('x',Math.min(drag.sx,pt.x));
      r.setAttribute('y',Math.min(drag.sy,pt.y));
      r.setAttribute('width',Math.abs(pt.x-drag.sx));
      r.setAttribute('height',Math.abs(pt.y-drag.sy));
      r.setAttribute('class','selbox');
      overlayG.appendChild(r);
      drag.ex = pt.x; drag.ey = pt.y;
    }
  });

  svg.addEventListener('pointerup', e=>{
    if(!drag) return;
    if(drag.mode==='draw' || drag.mode==='polydraw' || drag.mode==='freehand'){
      state.selected=[drag.sh.id];
      snapshot();
      render();
    }
    else if(drag.mode==='move' || drag.mode==='scale' || drag.mode==='rotate'){
      snapshot();
    }
    else if(drag.mode==='marquee'){
      const x1 = Math.min(drag.sx,drag.ex||drag.sx);
      const y1 = Math.min(drag.sy,drag.ey||drag.sy);
      const x2 = Math.max(drag.sx,drag.ex||drag.sx);
      const y2 = Math.max(drag.sy,drag.ey||drag.sy);
      state.selected = state.shapes.filter(s=>{
        const b = bbox(s);
        return b.x>=x1 && b.y>=y1 && b.x+b.w<=x2 && b.y+b.h<=y2;
      }).map(s=>s.id);
      render();
      updatePropsUI();
    }
    drag=null;
  });

  function scaleShapeTo(sh, orig, origB, nb){
    const sx = nb.w/origB.w, sy = nb.h/origB.h;
    if(sh.type==='rect'){
      sh.attrs.x = nb.x; sh.attrs.y = nb.y;
      sh.attrs.width = nb.w; sh.attrs.height = nb.h;
    } else if(sh.type==='ellipse'){
      sh.attrs.cx = nb.x+nb.w/2; sh.attrs.cy = nb.y+nb.h/2;
      sh.attrs.rx = nb.w/2; sh.attrs.ry = nb.h/2;
    } else if(sh.type==='line'){
      const lx1=(+orig.x1-origB.x)/origB.w, ly1=(+orig.y1-origB.y)/origB.h;
      const lx2=(+orig.x2-origB.x)/origB.w, ly2=(+orig.y2-origB.y)/origB.h;
      sh.attrs.x1 = nb.x+lx1*nb.w; sh.attrs.y1 = nb.y+ly1*nb.h;
      sh.attrs.x2 = nb.x+lx2*nb.w; sh.attrs.y2 = nb.y+ly2*nb.h;
    } else if(sh.type==='polygon'){
      const pts = orig.points.split(' ').map(p=>p.split(',').map(Number));
      sh.attrs.points = pts.map(([x,y])=>{
        const nx = nb.x + ((x-origB.x)/origB.w)*nb.w;
        const ny = nb.y + ((y-origB.y)/origB.h)*nb.h;
        return nx+','+ny;
      }).join(' ');
    } else if(sh.type==='text'){
      sh.attrs.x = nb.x; sh.attrs.y = nb.y+nb.h;
      sh.attrs['font-size'] = Math.max(4,(+orig['font-size'])*sy);
    } else if(sh.type==='path'){
      // use transform
      sh.attrs.transform = `translate(${nb.x},${nb.y}) scale(${sx},${sy}) translate(${-origB.x},${-origB.y}) ${orig.transform||''}`;
    }
  }

  // ---------- keyboard ----------
  let spaceHeld=false;
  document.addEventListener('keydown', e=>{
    if(e.target.tagName==='INPUT' || e.target.tagName==='TEXTAREA') return;
    if(e.code==='Space'){ spaceHeld=true; svg.style.cursor='grab'; return; }
    if(e.ctrlKey||e.metaKey){
      if(e.key==='z'){ e.preventDefault(); undo(); return; }
      if(e.key==='y'){ e.preventDefault(); redo(); return; }
      if(e.key==='d'){ e.preventDefault(); duplicateSelected(); return; }
      if(e.key==='g'){ e.preventDefault(); groupSelected(); return; }
    }
    const k = e.key.toLowerCase();
    if(k==='v') setTool('select');
    else if(k==='r') setTool('rect');
    else if(k==='o') setTool('ellipse');
    else if(k==='l') setTool('line');
    else if(k==='p') setTool('pen');
    else if(k==='t') setTool('text');
    else if(k==='escape'){ state.selected=[]; state.penPoints=[]; render(); }
    else if(e.key==='Delete' || e.key==='Backspace'){ deleteSelected(); }
  });
  document.addEventListener('keyup', e=>{
    if(e.code==='Space'){ spaceHeld=false; svg.style.cursor=''; }
  });

  // pen double-click to finish
  svg.addEventListener('dblclick', ()=>{
    if(state.tool==='pen' && state.penPoints.length){ state.penPoints=[]; snapshot(); }
  });

  // ---------- zoom/pan ----------
  canvasWrap.addEventListener('wheel', e=>{
    e.preventDefault();
    const pt = screenToWorld(e.clientX,e.clientY);
    const factor = e.deltaY<0?1.1:0.9;
    const newZ = clamp(state.zoom*factor,0.1,8);
    state.panX = e.clientX - svg.getBoundingClientRect().left - pt.x*newZ;
    state.panY = e.clientY - svg.getBoundingClientRect().top - pt.y*newZ;
    state.zoom = newZ;
    updateWorldTransform(); render();
  },{passive:false});

  document.getElementById('zoomIn').onclick = ()=>{ state.zoom=clamp(state.zoom*1.2,0.1,8); updateWorldTransform(); render(); };
  document.getElementById('zoomOut').onclick = ()=>{ state.zoom=clamp(state.zoom/1.2,0.1,8); updateWorldTransform(); render(); };
  document.getElementById('zoomReset').onclick = ()=>{ state.zoom=1; state.panX=0; state.panY=0; updateWorldTransform(); render(); };

  // pinch
  let pinch=null;
  canvasWrap.addEventListener('touchstart', e=>{
    if(e.touches.length===2){ pinch={d:dist(e.touches),z:state.zoom}; }
  });
  canvasWrap.addEventListener('touchmove', e=>{
    if(pinch && e.touches.length===2){
      e.preventDefault();
      state.zoom = clamp(pinch.z*(dist(e.touches)/pinch.d),0.1,8);
      updateWorldTransform(); render();
    }
  },{passive:false});
  canvasWrap.addEventListener('touchend',()=>{pinch=null;});
  function dist(t){return Math.hypot(t[0].clientX-t[1].clientX,t[0].clientY-t[1].clientY);}

  // ---------- toolbar ----------
  document.getElementById('toolbar').addEventListener('click', e=>{
    const b = e.target.closest('button[data-tool]');
    if(!b) return;
    setTool(b.dataset.tool);
  });
  function setTool(t){
    state.tool=t;
    state.penPoints=[];
    document.querySelectorAll('#toolbar button').forEach(b=>b.classList.toggle('active',b.dataset.tool===t));
    svg.style.cursor = t==='select'?'default':'crosshair';
    render();
  }

  // ---------- side tabs ----------
  document.querySelectorAll('.side-tabs button').forEach(b=>{
    b.onclick = ()=>{
      document.querySelectorAll('.side-tabs button').forEach(x=>x.classList.remove('active'));
      document.querySelectorAll('.side-panel').forEach(x=>x.classList.remove('active'));
      b.classList.add('active');
      document.querySelector(`.side-panel[data-panel="${b.dataset.tab}"]`).classList.add('active');
    };
  });

  // ---------- swatches ----------
  function buildSwatches(containerId,prop){
    const c = document.getElementById(containerId);
    c.innerHTML='';
    PALETTE.forEach(col=>{
      const d = document.createElement('div');
      d.className='swatch'+(col==='none'?' none':'');
      if(col!=='none') d.style.background=col;
      d.onclick = ()=>{
        state[prop] = col;
        if(prop==='fill') document.getElementById('fillColor').value = col==='none'?'#000000':col;
        if(prop==='stroke') document.getElementById('strokeColor').value = col==='none'?'#000000':col;
        applyToSelected();
      };
      c.appendChild(d);
    });
  }
  buildSwatches('fillSwatches','fill');
  buildSwatches('strokeSwatches','stroke');

  document.getElementById('fillColor').oninput = e=>{state.fill=e.target.value; applyToSelected();};
  document.getElementById('strokeColor').oninput = e=>{state.stroke=e.target.value; applyToSelected();};
  const swEl = document.getElementById('strokeWidth');
  swEl.oninput = e=>{state.strokeWidth=+e.target.value; document.getElementById('swVal').textContent=e.target.value; applyToSelected();};
  const opEl = document.getElementById('opacity');
  opEl.oninput = e=>{state.opacity=+e.target.value; document.getElementById('opVal').textContent=e.target.value; applyToSelected();};
  const rdEl = document.getElementById('radius');
  rdEl.oninput = e=>{state.radius=+e.target.value; document.getElementById('rdVal').textContent=e.target.value; applyToSelected();};
  const rtEl = document.getElementById('rotate');
  rtEl.oninput = e=>{
    state.rotate=+e.target.value; document.getElementById('rtVal').textContent=e.target.value+'°';
    for(const id of state.selected){
      const sh = findShape(id);
      if(!sh) continue;
      const b = bbox(sh);
      const cx=b.x+b.w/2,cy=b.y+b.h/2;
      const existing = (sh.attrs.transform||'').replace(/rotate\([^)]*\)/,'').trim();
      sh.attrs.transform = `rotate(${state.rotate} ${cx} ${cy}) ${existing}`.trim();
    }
    render();
  };
  document.getElementById('fontSize').oninput = e=>{state.fontSize=+e.target.value;applyToSelected();};
  document.getElementById('textInput').oninput = e=>{
    for(const id of state.selected){
      const sh = findShape(id);
      if(sh && sh.type==='text'){ sh.attrs._text = e.target.value; }
    }
    render();
  };

  function applyToSelected(){
    for(const id of state.selected){
      const sh = findShape(id);
      if(!sh) continue;
      if(sh.type==='line'){
        sh.attrs.stroke = state.stroke;
      } else {
        sh.attrs.fill = state.fill;
        sh.attrs.stroke = state.stroke;
      }
      sh.attrs['stroke-width'] = state.strokeWidth;
      sh.attrs.opacity = state.opacity;
      if(sh.type==='rect'){ sh.attrs.rx = state.radius; sh.attrs.ry = state.radius; }
      if(sh.type==='text'){ sh.attrs['font-size'] = state.fontSize; }
    }
    render();
  }

  function updatePropsUI(){
    if(state.selected.length===1){
      const sh = findShape(state.selected[0]);
      if(!sh) return;
      if(sh.attrs.fill && sh.attrs.fill!=='none'){ document.getElementById('fillColor').value = sh.attrs.fill.startsWith('#')?sh.attrs.fill:'#00d4ff'; state.fill = sh.attrs.fill;}
      if(sh.attrs.stroke){ document.getElementById('strokeColor').value = sh.attrs.stroke.startsWith('#')?sh.attrs.stroke:'#e2e8f0'; state.stroke = sh.attrs.stroke;}
      if(sh.attrs['stroke-width']!=null){ swEl.value = sh.attrs['stroke-width']; document.getElementById('swVal').textContent = sh.attrs['stroke-width'];}
      if(sh.attrs.opacity!=null){ opEl.value = sh.attrs.opacity; document.getElementById('opVal').textContent = sh.attrs.opacity;}
      if(sh.attrs.rx!=null){ rdEl.value = sh.attrs.rx; document.getElementById('rdVal').textContent = sh.attrs.rx;}
      if(sh.type==='text'){
        document.getElementById('textInput').value = sh.attrs._text||'';
        document.getElementById('fontSize').value = sh.attrs['font-size']||24;
      }
    }
  }

  // ---------- layers panel ----------
  function renderLayers(){
    const list = document.getElementById('layerList');
    list.innerHTML='';
    // top of list = last drawn (topmost)
    for(let i=state.shapes.length-1;i>=0;i--){
      const sh = state.shapes[i];
      const row = document.createElement('div');
      row.className='layer'+(state.selected.includes(sh.id)?' selected':'');
      row.innerHTML = `
        <button data-a="vis">${sh.hidden?'○':'●'}</button>
        <button data-a="lock">${sh.locked?'⚿':'⚷'}</button>
        <span class="name" contenteditable="true">${sh.name||sh.type}</span>
        <button data-a="up" title="raise">▲</button>
        <button data-a="down" title="lower">▼</button>
        <button data-a="del" class="danger">✕</button>
      `;
      row.onclick = ev=>{
        if(ev.target.tagName==='BUTTON') return;
        state.selected=[sh.id]; render(); updatePropsUI();
      };
      row.querySelector('.name').onblur = ev=>{ sh.name=ev.target.textContent; };
      row.querySelectorAll('button').forEach(b=>{
        b.onclick = ev=>{
          ev.stopPropagation();
          const a = b.dataset.a;
          if(a==='vis') sh.hidden = !sh.hidden;
          else if(a==='lock') sh.locked = !sh.locked;
          else if(a==='up' && i<state.shapes.length-1){ [state.shapes[i],state.shapes[i+1]]=[state.shapes[i+1],state.shapes[i]]; }
          else if(a==='down' && i>0){ [state.shapes[i],state.shapes[i-1]]=[state.shapes[i-1],state.shapes[i]]; }
          else if(a==='del'){ state.shapes.splice(i,1); state.selected=state.selected.filter(x=>x!==sh.id); }
          snapshot(); render();
        };
      });
      list.appendChild(row);
    }
  }

  // ---------- actions ----------
  function deleteSelected(){
    state.shapes = state.shapes.filter(s=>!state.selected.includes(s.id));
    state.selected=[]; snapshot(); render();
  }
  function duplicateSelected(){
    const copies=[];
    for(const id of state.selected){
      const sh = findTopLevel(id);
      if(!sh) continue;
      const c = JSON.parse(JSON.stringify(sh));
      const reId = (n)=>{ n.id=uid(); if(n.children) n.children.forEach(reId); };
      reId(c);
      translateShape(c,20,20);
      copies.push(c);
    }
    state.shapes.push(...copies);
    state.selected = copies.map(c=>c.id);
    snapshot(); render();
  }
  function groupSelected(){
    if(state.selected.length<2) return;
    const kids = state.shapes.filter(s=>state.selected.includes(s.id));
    state.shapes = state.shapes.filter(s=>!state.selected.includes(s.id));
    const g = {id:uid(),type:'group',name:'Group',attrs:{},children:kids};
    state.shapes.push(g);
    state.selected=[g.id];
    snapshot(); render();
  }
  function ungroupSelected(){
    const next=[];
    for(const s of state.shapes){
      if(s.type==='group' && state.selected.includes(s.id)){
        next.push(...s.children);
      } else next.push(s);
    }
    state.shapes = next;
    snapshot(); render();
  }

  function alignSelected(type){
    if(state.selected.length<2) return;
    const boxes = state.selected.map(id=>({id,sh:findShape(id),b:bbox(findShape(id))}));
    const minX=Math.min(...boxes.map(o=>o.b.x));
    const maxX=Math.max(...boxes.map(o=>o.b.x+o.b.w));
    const minY=Math.min(...boxes.map(o=>o.b.y));
    const maxY=Math.max(...boxes.map(o=>o.b.y+o.b.h));
    const cx=(minX+maxX)/2, cy=(minY+maxY)/2;
    for(const o of boxes){
      let dx=0,dy=0;
      if(type==='l') dx = minX-o.b.x;
      else if(type==='r') dx = maxX-(o.b.x+o.b.w);
      else if(type==='ch') dx = cx-(o.b.x+o.b.w/2);
      else if(type==='t') dy = minY-o.b.y;
      else if(type==='b') dy = maxY-(o.b.y+o.b.h);
      else if(type==='cv') dy = cy-(o.b.y+o.b.h/2);
      if(dx||dy) translateShape(o.sh,dx,dy);
    }
    snapshot(); render();
  }
  function distribute(axis){
    if(state.selected.length<3) return;
    const boxes = state.selected.map(id=>({id,sh:findShape(id),b:bbox(findShape(id))}));
    if(axis==='h') boxes.sort((a,b)=>a.b.x-b.b.x);
    else boxes.sort((a,b)=>a.b.y-b.b.y);
    const first=boxes[0], last=boxes[boxes.length-1];
    const range = axis==='h' ? (last.b.x+last.b.w/2)-(first.b.x+first.b.w/2) : (last.b.y+last.b.h/2)-(first.b.y+first.b.h/2);
    const step = range/(boxes.length-1);
    for(let i=1;i<boxes.length-1;i++){
      const target = axis==='h' ? (first.b.x+first.b.w/2)+step*i : (first.b.y+first.b.h/2)+step*i;
      const cur = axis==='h' ? boxes[i].b.x+boxes[i].b.w/2 : boxes[i].b.y+boxes[i].b.h/2;
      if(axis==='h') translateShape(boxes[i].sh,target-cur,0);
      else translateShape(boxes[i].sh,0,target-cur);
    }
    snapshot(); render();
  }

  document.getElementById('btnUndo').onclick=undo;
  document.getElementById('btnRedo').onclick=redo;
  document.getElementById('btnDel').onclick=deleteSelected;
  document.getElementById('btnDup').onclick=duplicateSelected;
  document.getElementById('btnGroup').onclick=groupSelected;
  document.getElementById('btnUngroup').onclick=ungroupSelected;
  document.getElementById('btnAlignL').onclick=()=>alignSelected('l');
  document.getElementById('btnAlignR').onclick=()=>alignSelected('r');
  document.getElementById('btnAlignCH').onclick=()=>alignSelected('ch');
  document.getElementById('btnAlignT').onclick=()=>alignSelected('t');
  document.getElementById('btnAlignB').onclick=()=>alignSelected('b');
  document.getElementById('btnAlignCV').onclick=()=>alignSelected('cv');
  document.getElementById('btnDistH').onclick=()=>distribute('h');
  document.getElementById('btnDistV').onclick=()=>distribute('v');
  document.getElementById('btnSnap').onclick=e=>{
    state.snap=!state.snap;
    e.target.classList.toggle('active',state.snap);
    render();
  };
  document.getElementById('btnNew').onclick=()=>{
    if(state.shapes.length && !confirm('Discard current drawing?')) return;
    state.shapes=[]; state.selected=[]; snapshot(); render();
  };

  // ---------- export ----------
  function getExportSvg(){
    // compute bbox of all
    if(!state.shapes.length) return '<svg xmlns="http://www.w3.org/2000/svg" width="400" height="300"></svg>';
    const bs = state.shapes.map(bbox);
    const minX=Math.min(...bs.map(b=>b.x))-10;
    const minY=Math.min(...bs.map(b=>b.y))-10;
    const maxX=Math.max(...bs.map(b=>b.x+b.w))+10;
    const maxY=Math.max(...bs.map(b=>b.y+b.h))+10;
    const w=maxX-minX, h=maxY-minY;
    const clone = shapesG.cloneNode(true);
    return `<svg xmlns="http://www.w3.org/2000/svg" width="${w}" height="${h}" viewBox="${minX} ${minY} ${w} ${h}">${clone.innerHTML}</svg>`;
  }
  document.getElementById('btnExpSvg').onclick=()=>{
    const svgStr = getExportSvg();
    const blob = new Blob([svgStr],{type:'image/svg+xml'});
    const a = document.createElement('a');
    a.href = URL.createObjectURL(blob);
    a.download = 'vector-drawing.svg';
    a.click();
  };
  document.getElementById('btnExpPng').onclick=()=>{
    const svgStr = getExportSvg();
    const img = new Image();
    const blob = new Blob([svgStr],{type:'image/svg+xml'});
    const url = URL.createObjectURL(blob);
    img.onload = ()=>{
      const c = document.createElement('canvas');
      c.width = img.width*2; c.height = img.height*2;
      const ctx = c.getContext('2d');
      ctx.fillStyle='#050a0f'; ctx.fillRect(0,0,c.width,c.height);
      ctx.drawImage(img,0,0,c.width,c.height);
      c.toBlob(b=>{
        const a = document.createElement('a');
        a.href = URL.createObjectURL(b);
        a.download='vector-drawing.png';
        a.click();
      });
      URL.revokeObjectURL(url);
    };
    img.src = url;
  };
  document.getElementById('btnCopy').onclick=async()=>{
    try{
      await navigator.clipboard.writeText(getExportSvg());
      flash('SVG copied');
    }catch(e){ flash('Copy failed'); }
  };
  function flash(msg){
    status.textContent = msg;
    setTimeout(render,1500);
  }

  // ---------- save/load ----------
  const STORAGE_PREFIX='korb_vector_drawing_';
  document.getElementById('btnSave').onclick=()=>{
    openModal('Save Project', `<input type="text" id="svName" placeholder="project name" style="width:100%">`, ()=>{
      const n = document.getElementById('svName').value.trim();
      if(!n) return;
      localStorage.setItem(STORAGE_PREFIX+n, JSON.stringify({shapes:state.shapes,idCounter:state.idCounter,saved:Date.now()}));
      flash('Saved: '+n);
    });
  };
  document.getElementById('btnLoad').onclick=()=>{
    const keys = Object.keys(localStorage).filter(k=>k.startsWith(STORAGE_PREFIX));
    let html = '<div class="file-list">';
    if(!keys.length) html += '<div style="color:var(--muted);padding:10px">No saved projects</div>';
    keys.forEach(k=>{
      const name = k.replace(STORAGE_PREFIX,'');
      html += `<div class="file-item"><div class="n">${name}</div><button data-load="${k}">OPEN</button><button data-del="${k}" class="danger">✕</button></div>`;
    });
    html += '</div>';
    openModal('Load Project', html, null, true);
    document.getElementById('modalContent').querySelectorAll('[data-load]').forEach(b=>{
      b.onclick=()=>{
        const d = JSON.parse(localStorage.getItem(b.dataset.load));
        state.shapes = d.shapes; state.idCounter = d.idCounter||1;
        snapshot(); render(); closeModal();
      };
    });
    document.getElementById('modalContent').querySelectorAll('[data-del]').forEach(b=>{
      b.onclick=()=>{ localStorage.removeItem(b.dataset.del); document.getElementById('btnLoad').click(); };
    });
  };

  const modal = document.getElementById('modal');
  let modalCb = null;
  function openModal(title,content,cb,noOk){
    document.getElementById('modalTitle').textContent = title;
    document.getElementById('modalContent').innerHTML = content;
    modalCb = cb;
    document.getElementById('modalOk').style.display = noOk?'none':'';
    modal.classList.add('open');
  }
  function closeModal(){ modal.classList.remove('open'); }
  document.getElementById('modalCancel').onclick=closeModal;
  document.getElementById('modalOk').onclick=()=>{ if(modalCb) modalCb(); closeModal(); };

  // ---------- init ----------
  snapshot();
  render();
  updateWorldTransform();

  // prevent context menu on canvas
  svg.addEventListener('contextmenu',e=>e.preventDefault());
})();
</script>
</body>
</html>
