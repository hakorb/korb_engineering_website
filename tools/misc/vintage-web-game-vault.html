<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=no">
<meta name="theme-color" content="#050a0f">
<title>Vintage Web Game Vault</title>
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #050a0f;
    --surface-1: #0a1018;
    --surface-2: #0e1520;
    --border: #1a2535;
    --cyan: #00d4ff;
    --orange: #ff6600;
    --green: #10b981;
    --red: #ef4444;
    --gold: #fbbf24;
    --text: #e2e8f0;
    --text-dim: #94a3b8;
  }

  * {
    box-sizing: border-box;
    margin: 0;
    padding: 0;
    -webkit-tap-highlight-color: transparent;
  }

  html, body {
    background: var(--bg);
    color: var(--text);
    font-family: 'JetBrains Mono', ui-monospace, Menlo, monospace;
    font-size: 16px;
    line-height: 1.45;
    min-height: 100vh;
    overflow-x: hidden;
  }

  body {
    padding-top: env(safe-area-inset-top);
    padding-right: env(safe-area-inset-right);
    padding-bottom: env(safe-area-inset-bottom);
    padding-left: env(safe-area-inset-left);
    background:
      radial-gradient(ellipse at top, rgba(0, 212, 255, 0.06), transparent 60%),
      radial-gradient(ellipse at bottom, rgba(255, 102, 0, 0.04), transparent 60%),
      var(--bg);
  }

  .app {
    max-width: 1200px;
    margin: 0 auto;
    padding: 16px;
  }

  header.vault-header {
    border: 1px solid var(--border);
    background: linear-gradient(180deg, var(--surface-2), var(--surface-1));
    border-radius: 8px;
    padding: 18px 16px;
    margin-bottom: 16px;
    position: relative;
    overflow: hidden;
  }

  header.vault-header::before {
    content: "";
    position: absolute;
    inset: 0;
    background: repeating-linear-gradient(90deg, transparent 0 2px, rgba(0,212,255,0.03) 2px 4px);
    pointer-events: none;
  }

  .title-row {
    display: flex;
    align-items: center;
    gap: 12px;
    flex-wrap: wrap;
    position: relative;
  }

  .logo-box {
    width: 48px;
    height: 48px;
    border: 2px solid var(--cyan);
    border-radius: 6px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 22px;
    font-weight: 700;
    color: var(--cyan);
    background: var(--surface-1);
    box-shadow: 0 0 16px rgba(0,212,255,0.25) inset;
    flex-shrink: 0;
  }

  h1 {
    font-size: 18px;
    font-weight: 700;
    color: var(--cyan);
    letter-spacing: 0.5px;
    text-transform: uppercase;
  }

  .subtitle {
    font-size: 11px;
    color: var(--text-dim);
    margin-top: 2px;
    letter-spacing: 0.5px;
  }

  .stats-row {
    display: flex;
    gap: 10px;
    flex-wrap: wrap;
    margin-top: 12px;
    font-size: 11px;
    position: relative;
  }

  .stat {
    background: var(--surface-1);
    border: 1px solid var(--border);
    padding: 6px 10px;
    border-radius: 4px;
    color: var(--text-dim);
  }

  .stat span {
    color: var(--gold);
    font-weight: 600;
  }

  .controls {
    display: flex;
    flex-direction: column;
    gap: 10px;
    margin-bottom: 16px;
  }

  .search-wrap {
    position: relative;
  }

  .search-input {
    width: 100%;
    background: var(--surface-2);
    border: 1px solid var(--border);
    color: var(--text);
    padding: 12px 14px 12px 38px;
    font-family: inherit;
    font-size: 16px;
    border-radius: 6px;
    min-height: 48px;
    touch-action: manipulation;
  }

  .search-input:focus {
    outline: none;
    border-color: var(--cyan);
    box-shadow: 0 0 0 2px rgba(0,212,255,0.15);
  }

  .search-icon {
    position: absolute;
    left: 12px;
    top: 50%;
    transform: translateY(-50%);
    color: var(--cyan);
    font-size: 16px;
    pointer-events: none;
  }

  .category-tabs {
    display: flex;
    gap: 6px;
    overflow-x: auto;
    padding-bottom: 6px;
    scrollbar-width: thin;
    scrollbar-color: var(--border) transparent;
  }

  .category-tabs::-webkit-scrollbar {
    height: 4px;
  }
  .category-tabs::-webkit-scrollbar-thumb {
    background: var(--border);
  }

  .cat-btn {
    background: var(--surface-1);
    border: 1px solid var(--border);
    color: var(--text-dim);
    padding: 10px 14px;
    font-family: inherit;
    font-size: 12px;
    font-weight: 500;
    border-radius: 4px;
    white-space: nowrap;
    cursor: pointer;
    min-height: 44px;
    touch-action: manipulation;
    text-transform: uppercase;
    letter-spacing: 0.5px;
  }

  .cat-btn.active {
    border-color: var(--cyan);
    color: var(--cyan);
    background: rgba(0,212,255,0.08);
  }

  .cat-btn:hover {
    color: var(--text);
  }

  .games-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(160px, 1fr));
    gap: 12px;
    margin-bottom: 16px;
  }

  .game-card {
    background: var(--surface-1);
    border: 1px solid var(--border);
    border-radius: 6px;
    overflow: hidden;
    cursor: pointer;
    touch-action: manipulation;
    position: relative;
    transition: border-color 0.15s, transform 0.15s;
  }

  .game-card:hover, .game-card:active {
    border-color: var(--cyan);
    transform: translateY(-2px);
  }

  .thumb {
    width: 100%;
    aspect-ratio: 4/3;
    background: var(--bg);
    display: block;
    border-bottom: 1px solid var(--border);
  }

  .card-body {
    padding: 10px;
  }

  .card-title {
    font-size: 12px;
    font-weight: 600;
    color: var(--text);
    margin-bottom: 4px;
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
  }

  .card-meta {
    display: flex;
    justify-content: space-between;
    align-items: center;
    font-size: 10px;
    color: var(--text-dim);
  }

  .card-category {
    color: var(--orange);
    text-transform: uppercase;
  }

  .card-rating {
    color: var(--gold);
  }

  .fav-btn {
    position: absolute;
    top: 6px;
    right: 6px;
    width: 32px;
    height: 32px;
    border: 1px solid var(--border);
    background: rgba(5,10,15,0.8);
    color: var(--text-dim);
    border-radius: 4px;
    cursor: pointer;
    font-size: 16px;
    touch-action: manipulation;
    display: flex;
    align-items: center;
    justify-content: center;
  }

  .fav-btn.active {
    color: var(--gold);
    border-color: var(--gold);
  }

  /* Modal player */
  .modal {
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.85);
    backdrop-filter: blur(4px);
    display: none;
    align-items: flex-start;
    justify-content: center;
    z-index: 100;
    overflow-y: auto;
    padding: env(safe-area-inset-top) env(safe-area-inset-right) env(safe-area-inset-bottom) env(safe-area-inset-left);
  }

  .modal.open {
    display: flex;
  }

  .player-panel {
    background: var(--surface-1);
    border: 1px solid var(--cyan);
    border-radius: 8px;
    width: 100%;
    max-width: 640px;
    margin: 12px;
    box-shadow: 0 0 40px rgba(0,212,255,0.2);
    display: flex;
    flex-direction: column;
  }

  .player-header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 12px 14px;
    border-bottom: 1px solid var(--border);
    gap: 10px;
  }

  .player-title {
    font-size: 14px;
    font-weight: 700;
    color: var(--cyan);
    flex: 1;
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
  }

  .close-btn {
    width: 44px;
    height: 44px;
    border: 1px solid var(--border);
    background: var(--surface-2);
    color: var(--red);
    border-radius: 4px;
    font-size: 18px;
    cursor: pointer;
    touch-action: manipulation;
    font-family: inherit;
    font-weight: 700;
  }

  .game-stage {
    background: #000;
    border-bottom: 1px solid var(--border);
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 10px;
    min-height: 280px;
  }

  #game-canvas {
    background: #000;
    display: block;
    max-width: 100%;
    height: auto;
    image-rendering: pixelated;
    touch-action: none;
  }

  .game-footer {
    padding: 10px 14px;
    display: flex;
    flex-direction: column;
    gap: 8px;
  }

  .game-info {
    font-size: 11px;
    color: var(--text-dim);
    line-height: 1.5;
  }

  .game-info strong {
    color: var(--text);
  }

  .rating-row {
    display: flex;
    align-items: center;
    gap: 8px;
    font-size: 11px;
    color: var(--text-dim);
  }

  .stars {
    display: flex;
    gap: 2px;
  }

  .star {
    width: 28px;
    height: 28px;
    border: none;
    background: transparent;
    color: var(--border);
    font-size: 18px;
    cursor: pointer;
    touch-action: manipulation;
    padding: 0;
  }

  .star.on {
    color: var(--gold);
  }

  .player-actions {
    display: flex;
    gap: 8px;
    flex-wrap: wrap;
  }

  .btn {
    background: var(--surface-2);
    border: 1px solid var(--border);
    color: var(--text);
    font-family: inherit;
    font-size: 12px;
    font-weight: 600;
    padding: 10px 14px;
    border-radius: 4px;
    cursor: pointer;
    min-height: 44px;
    touch-action: manipulation;
    text-transform: uppercase;
    letter-spacing: 0.5px;
    flex: 1;
    min-width: 90px;
  }

  .btn:hover {
    border-color: var(--cyan);
    color: var(--cyan);
  }

  .btn.primary {
    border-color: var(--green);
    color: var(--green);
  }

  .btn.danger {
    border-color: var(--red);
    color: var(--red);
  }

  .touch-pad {
    display: grid;
    grid-template-columns: repeat(3, 56px);
    grid-template-rows: repeat(3, 56px);
    gap: 4px;
    justify-content: center;
    padding: 8px;
  }

  .touch-pad button {
    background: var(--surface-2);
    border: 1px solid var(--border);
    color: var(--cyan);
    font-family: inherit;
    font-size: 20px;
    font-weight: 700;
    border-radius: 6px;
    cursor: pointer;
    touch-action: manipulation;
    user-select: none;
  }

  .touch-pad button:active {
    background: rgba(0,212,255,0.15);
    border-color: var(--cyan);
  }

  .touch-pad .tp-up { grid-column: 2; grid-row: 1; }
  .touch-pad .tp-left { grid-column: 1; grid-row: 2; }
  .touch-pad .tp-act { grid-column: 2; grid-row: 2; color: var(--orange); }
  .touch-pad .tp-right { grid-column: 3; grid-row: 2; }
  .touch-pad .tp-down { grid-column: 2; grid-row: 3; }

  .empty {
    text-align: center;
    padding: 40px 20px;
    color: var(--text-dim);
    font-size: 13px;
  }

  .empty-icon {
    font-size: 32px;
    color: var(--border);
    margin-bottom: 10px;
  }

  .footer-info {
    margin-top: 20px;
    padding: 14px;
    border-top: 1px solid var(--border);
    text-align: center;
    font-size: 10px;
    color: var(--text-dim);
    letter-spacing: 0.5px;
  }

  .footer-info strong {
    color: var(--cyan);
  }

  @media (min-width: 640px) {
    h1 { font-size: 22px; }
    .subtitle { font-size: 12px; }
    .games-grid {
      grid-template-columns: repeat(auto-fill, minmax(180px, 1fr));
      gap: 14px;
    }
    .player-panel { max-width: 720px; }
  }

  @media (min-width: 960px) {
    .controls {
      flex-direction: row;
      align-items: center;
    }
    .search-wrap { flex: 1; max-width: 360px; }
  }
</style>
</head>
<body>
<div class="app">
  <header class="vault-header">
    <div class="title-row">
      <div class="logo-box">VG</div>
      <div>
        <h1>Vintage Web Game Vault</h1>
        <div class="subtitle">Curated archive of original retro-style browser games</div>
      </div>
    </div>
    <div class="stats-row">
      <div class="stat">TOTAL <span id="stat-total">0</span></div>
      <div class="stat">FAVS <span id="stat-favs">0</span></div>
      <div class="stat">PLAYED <span id="stat-played">0</span></div>
      <div class="stat">CATEGORIES <span id="stat-cats">0</span></div>
    </div>
  </header>

  <div class="controls">
    <div class="search-wrap">
      <span class="search-icon">&gt;</span>
      <input id="search" class="search-input" type="search" placeholder="Search vault..." autocomplete="off">
    </div>
    <div class="category-tabs" id="category-tabs"></div>
  </div>

  <div id="games-grid" class="games-grid"></div>

  <div class="footer-info">
    <strong>KORB ENGINEERING</strong> / ALL GAMES ORIGINAL WORKS / NO EXTERNAL ASSETS / CANVAS 2D / LOCALSTORAGE PERSISTENCE
  </div>
</div>

<div id="modal" class="modal" role="dialog" aria-modal="true">
  <div class="player-panel">
    <div class="player-header">
      <div class="player-title" id="player-title">Game Title</div>
      <button id="close-btn" class="close-btn" aria-label="Close">X</button>
    </div>
    <div class="game-stage">
      <canvas id="game-canvas" width="480" height="360"></canvas>
    </div>
    <div class="touch-pad" id="touch-pad">
      <button class="tp-up" data-key="up">^</button>
      <button class="tp-left" data-key="left">&lt;</button>
      <button class="tp-act" data-key="action">O</button>
      <button class="tp-right" data-key="right">&gt;</button>
      <button class="tp-down" data-key="down">v</button>
    </div>
    <div class="game-footer">
      <div class="game-info" id="game-info"></div>
      <div class="rating-row">
        <span>RATE:</span>
        <div class="stars" id="stars"></div>
      </div>
      <div class="player-actions">
        <button class="btn primary" id="restart-btn">Restart</button>
        <button class="btn" id="fav-btn-modal">Fav</button>
        <button class="btn danger" id="exit-btn">Exit</button>
      </div>
    </div>
  </div>
</div>

<script>
/* ============================================================
   VINTAGE WEB GAME VAULT
   Korb Engineering - original retro HTML5 mini-games
   ============================================================ */

const STORAGE = {
  favs: 'korb_vintage_vault_favs',
  plays: 'korb_vintage_vault_plays',
  ratings: 'korb_vintage_vault_ratings',
  history: 'korb_vintage_vault_history'
};

function lsGet(k, d) {
  try { return JSON.parse(localStorage.getItem(k)) || d; } catch (e) { return d; }
}
function lsSet(k, v) {
  try { localStorage.setItem(k, JSON.stringify(v)); } catch (e) {}
}

let favs = lsGet(STORAGE.favs, []);
let plays = lsGet(STORAGE.plays, {});
let ratings = lsGet(STORAGE.ratings, {});
let history = lsGet(STORAGE.history, []);

/* ============================================================
   GAME CATALOG
   ============================================================ */
const CATEGORIES = ['All', 'Favorites', 'Action', 'Arcade', 'Puzzle', 'Shooter', 'Retro', 'Casual'];

const GAMES = [
  {
    id: 'stickrunner',
    title: 'Stick Runner',
    category: 'Action',
    year: 2003,
    desc: 'Endless stick-figure runner. Tap/Up to jump over pits and obstacles. How far can you go?',
    controls: 'UP / ACTION to jump',
    init: initStickRunner
  },
  {
    id: 'tankduel',
    title: 'Tank Duel',
    category: 'Action',
    year: 2001,
    desc: 'Artillery-style turn-based tank duel. Aim, set power, destroy the enemy tank across the battlefield.',
    controls: 'LEFT/RIGHT angle, UP/DOWN power, ACTION fire',
    init: initTankDuel
  },
  {
    id: 'helicave',
    title: 'Copter Cave',
    category: 'Arcade',
    year: 2004,
    desc: 'Hold to fly up, release to drop. Navigate the scrolling cave without crashing.',
    controls: 'Hold ACTION to ascend',
    init: initHeliCave
  },
  {
    id: 'bubbleshoot',
    title: 'Bubble Pop',
    category: 'Puzzle',
    year: 2002,
    desc: 'Aim your bubble cannon and match 3+ bubbles to pop them. Clear the board!',
    controls: 'LEFT/RIGHT aim, ACTION fire',
    init: initBubblePop
  },
  {
    id: 'breakout',
    title: 'Brick Breaker',
    category: 'Arcade',
    year: 1999,
    desc: 'Bounce the ball with your paddle and destroy every brick. A classic for the ages.',
    controls: 'LEFT/RIGHT to move paddle',
    init: initBreakout
  },
  {
    id: 'snake',
    title: 'Pixel Snake',
    category: 'Retro',
    year: 2000,
    desc: 'Eat pixels. Grow longer. Avoid your own tail. Timeless.',
    controls: 'Arrow keys / touch pad',
    init: initSnake
  },
  {
    id: 'asteroids',
    title: 'Rock Blaster',
    category: 'Shooter',
    year: 2001,
    desc: 'Rotate your ship, thrust, and blast the drifting rocks into smithereens.',
    controls: 'LEFT/RIGHT rotate, UP thrust, ACTION fire',
    init: initAsteroids
  },
  {
    id: 'frogger',
    title: 'Street Hopper',
    category: 'Arcade',
    year: 2000,
    desc: 'Hop across the busy road and river without getting squashed or drowned.',
    controls: 'Arrow keys to hop',
    init: initFrogger
  },
  {
    id: 'pong',
    title: 'Pong Reloaded',
    category: 'Retro',
    year: 1998,
    desc: 'The original tennis game. Beat the CPU to 7 points.',
    controls: 'UP/DOWN to move paddle',
    init: initPong
  },
  {
    id: 'invaders',
    title: 'Space Raiders',
    category: 'Shooter',
    year: 2002,
    desc: 'Defend Earth from descending alien hordes. Dodge bombs, blast invaders.',
    controls: 'LEFT/RIGHT move, ACTION fire',
    init: initInvaders
  },
  {
    id: 'missile',
    title: 'Missile Defense',
    category: 'Shooter',
    year: 2001,
    desc: 'Tap/click to launch defensive missiles and intercept incoming warheads before they level your cities.',
    controls: 'Tap/click target zones',
    init: initMissile
  },
  {
    id: 'platform',
    title: 'Jump Quest',
    category: 'Action',
    year: 2003,
    desc: 'A tiny platformer. Jump across moving platforms, collect coins, reach the flag.',
    controls: 'LEFT/RIGHT move, UP jump',
    init: initPlatformer
  },
  {
    id: 'towerdef',
    title: 'Turret Defense',
    category: 'Casual',
    year: 2005,
    desc: 'Tap to place turrets. Stop the waves of creeps before they reach your base.',
    controls: 'Tap grid to place turrets',
    init: initTowerDefense
  },
  {
    id: 'whackmole',
    title: 'Whack-A-Glitch',
    category: 'Casual',
    year: 2002,
    desc: 'Glitchy moles pop up from holes in the grid. Whack them before they vanish.',
    controls: 'Tap/click moles',
    init: initWhackMole
  },
  {
    id: 'dressup',
    title: 'Retro Paper Doll',
    category: 'Casual',
    year: 2001,
    desc: 'Dress up the pixel doll with a selection of retro outfits and accessories.',
    controls: 'Tap/click items to equip',
    init: initPaperDoll
  },
  {
    id: 'memory',
    title: 'Memory Grid',
    category: 'Puzzle',
    year: 2000,
    desc: 'Classic card matching memory game. Find all the pairs in the fewest moves.',
    controls: 'Tap cards to flip',
    init: initMemory
  }
];

/* ============================================================
   UI RENDERING
   ============================================================ */
const grid = document.getElementById('games-grid');
const catTabs = document.getElementById('category-tabs');
const searchInput = document.getElementById('search');
const modal = document.getElementById('modal');
const canvas = document.getElementById('game-canvas');
const ctx = canvas.getContext('2d');
const playerTitle = document.getElementById('player-title');
const gameInfo = document.getElementById('game-info');
const starsEl = document.getElementById('stars');
const touchPad = document.getElementById('touch-pad');

let activeCategory = 'All';
let activeGame = null;
let gameLoopId = null;
let gameCleanup = null;

function generateThumb(game) {
  const c = document.createElement('canvas');
  c.width = 240;
  c.height = 180;
  const x = c.getContext('2d');
  // Base gradient
  const grd = x.createLinearGradient(0, 0, 0, 180);
  grd.addColorStop(0, '#0a1018');
  grd.addColorStop(1, '#050a0f');
  x.fillStyle = grd;
  x.fillRect(0, 0, 240, 180);
  // Scanlines
  x.fillStyle = 'rgba(0,212,255,0.04)';
  for (let i = 0; i < 180; i += 3) x.fillRect(0, i, 240, 1);
  // Game-specific art
  x.save();
  thumbArt[game.id] && thumbArt[game.id](x);
  x.restore();
  // Border frame
  x.strokeStyle = '#1a2535';
  x.lineWidth = 2;
  x.strokeRect(1, 1, 238, 178);
  // Corner marker
  x.fillStyle = '#00d4ff';
  x.font = '9px JetBrains Mono, monospace';
  x.fillText(String(game.year), 6, 172);
  x.fillStyle = '#ff6600';
  x.textAlign = 'right';
  x.fillText(game.category.toUpperCase(), 234, 172);
  return c.toDataURL();
}

const thumbArt = {
  stickrunner: (x) => {
    x.fillStyle = '#1a2535'; x.fillRect(0, 130, 240, 50);
    x.strokeStyle = '#00d4ff'; x.lineWidth = 2;
    // stick figure
    x.beginPath(); x.arc(80, 100, 6, 0, Math.PI*2); x.stroke();
    x.beginPath(); x.moveTo(80, 106); x.lineTo(80, 125);
    x.moveTo(80, 112); x.lineTo(70, 120);
    x.moveTo(80, 112); x.lineTo(90, 120);
    x.moveTo(80, 125); x.lineTo(72, 135);
    x.moveTo(80, 125); x.lineTo(88, 132); x.stroke();
    x.fillStyle = '#ff6600'; x.fillRect(140, 115, 15, 15);
    x.fillRect(180, 105, 15, 25);
  },
  tankduel: (x) => {
