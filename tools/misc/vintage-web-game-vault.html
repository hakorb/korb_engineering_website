function renderCategoryTabs() {
  catTabs.innerHTML = '';
  CATEGORIES.forEach(cat => {
    const btn = document.createElement('button');
    btn.className = 'cat-btn' + (cat === activeCategory ? ' active' : '');
    btn.textContent = cat;
    btn.addEventListener('click', () => {
      activeCategory = cat;
      renderCategoryTabs();
      renderGrid();
    });
    catTabs.appendChild(btn);
  });
}

function renderGrid() {
  const q = searchInput.value.trim().toLowerCase();
  let filtered = GAMES.slice();
  if (activeCategory === 'Favorites') {
    filtered = filtered.filter(g => favs.includes(g.id));
  } else if (activeCategory !== 'All') {
    filtered = filtered.filter(g => g.category === activeCategory);
  }
  if (q) {
    filtered = filtered.filter(g =>
      g.title.toLowerCase().includes(q) ||
      g.category.toLowerCase().includes(q) ||
      g.desc.toLowerCase().includes(q)
    );
  }
  grid.innerHTML = '';
  if (filtered.length === 0) {
    grid.innerHTML = '<div class="empty" style="grid-column:1/-1"><div class="empty-icon">[ ]</div>No games match your filter.</div>';
  } else {
    filtered.forEach(g => {
      const card = document.createElement('div');
      card.className = 'game-card';
      const rating = ratings[g.id] || 0;
      const ratingStr = rating ? '*'.repeat(rating) : '--';
      card.innerHTML = `
        <img class="thumb" src="${generateThumb(g)}" alt="${g.title}">
        <div class="card-body">
          <div class="card-title">${g.title}</div>
          <div class="card-meta">
            <span class="card-category">${g.category}</span>
            <span class="card-rating">${ratingStr}</span>
          </div>
        </div>
        <button class="fav-btn ${favs.includes(g.id) ? 'active' : ''}" data-fav="${g.id}" aria-label="Favorite">*</button>
      `;
      card.addEventListener('click', (e) => {
        if (e.target.matches('[data-fav]')) return;
        openGame(g);
      });
      card.querySelector('[data-fav]').addEventListener('click', (e) => {
        e.stopPropagation();
        toggleFav(g.id);
      });
      grid.appendChild(card);
    });
  }
  updateStats();
}

function toggleFav(id) {
  const idx = favs.indexOf(id);
  if (idx >= 0) favs.splice(idx, 1); else favs.push(id);
  lsSet(STORAGE.favs, favs);
  renderGrid();
  if (activeGame && activeGame.id === id) renderFavBtnModal();
}

function updateStats() {
  document.getElementById('stat-total').textContent = GAMES.length;
  document.getElementById('stat-favs').textContent = favs.length;
  document.getElementById('stat-played').textContent = Object.keys(plays).length;
  document.getElementById('stat-cats').textContent = CATEGORIES.length - 2;
}

/* ============================================================
   MODAL / PLAYER
   ============================================================ */
function openGame(game) {
  activeGame = game;
  playerTitle.textContent = game.title;
  gameInfo.innerHTML = `<strong>${game.title}</strong> (${game.year}) &middot; ${game.category}<br>${game.desc}<br><span style="color:var(--cyan)">CONTROLS:</span> ${game.controls}`;
  modal.classList.add('open');
  plays[game.id] = (plays[game.id] || 0) + 1;
  lsSet(STORAGE.plays, plays);
  history.unshift({ id: game.id, t: Date.now() });
  history = history.slice(0, 50);
  lsSet(STORAGE.history, history);
  renderStars();
  renderFavBtnModal();
  startGame();
  updateStats();
}

function closeGame() {
  modal.classList.remove('open');
  stopGame();
  activeGame = null;
}

function startGame() {
  stopGame();
  ctx.fillStyle = '#000';
  ctx.fillRect(0, 0, canvas.width, canvas.height);
  if (activeGame && activeGame.init) {
    gameCleanup = activeGame.init(ctx, canvas);
  }
}

function stopGame() {
  if (gameLoopId) {
    cancelAnimationFrame(gameLoopId);
    gameLoopId = null;
  }
  if (gameCleanup) {
    try { gameCleanup(); } catch (e) {}
    gameCleanup = null;
  }
}

function renderStars() {
  starsEl.innerHTML = '';
  const cur = ratings[activeGame.id] || 0;
  for (let i = 1; i <= 5; i++) {
    const b = document.createElement('button');
    b.className = 'star' + (i <= cur ? ' on' : '');
    b.textContent = '*';
    b.addEventListener('click', () => {
      ratings[activeGame.id] = i;
      lsSet(STORAGE.ratings, ratings);
      renderStars();
      renderGrid();
    });
    starsEl.appendChild(b);
  }
}

function renderFavBtnModal() {
  const btn = document.getElementById('fav-btn-modal');
  if (favs.includes(activeGame.id)) {
    btn.textContent = 'Unfav';
    btn.style.color = 'var(--gold)';
  } else {
    btn.textContent = 'Fav';
    btn.style.color = '';
  }
}

document.getElementById('close-btn').addEventListener('click', closeGame);
document.getElementById('exit-btn').addEventListener('click', closeGame);
document.getElementById('restart-btn').addEventListener('click', startGame);
document.getElementById('fav-btn-modal').addEventListener('click', () => {
  if (activeGame) toggleFav(activeGame.id);
});
searchInput.addEventListener('input', renderGrid);
modal.addEventListener('click', (e) => { if (e.target === modal) closeGame(); });
document.addEventListener('keydown', (e) => {
  if (e.key === 'Escape' && modal.classList.contains('open')) closeGame();
});

/* ============================================================
   INPUT SYSTEM - unified keyboard + touchpad
   ============================================================ */
const input = {
  left: false, right: false, up: false, down: false, action: false,
  _pressListeners: [],
  onPress(fn) { this._pressListeners.push(fn); },
  _press(key) { this._pressListeners.forEach(f => f(key)); }
};

function setKey(k, v) {
  if (!(k in input)) return;
  const was = input[k];
  input[k] = v;
  if (v && !was) input._press(k);
}

document.addEventListener('keydown', (e) => {
  if (!modal.classList.contains('open')) return;
  const map = { ArrowLeft:'left', ArrowRight:'right', ArrowUp:'up', ArrowDown:'down', ' ':'action', Enter:'action', a:'left', d:'right', w:'up', s:'down' };
  const k = map[e.key];
  if (k) { setKey(k, true); e.preventDefault(); }
});
document.addEventListener('keyup', (e) => {
  const map = { ArrowLeft:'left', ArrowRight:'right', ArrowUp:'up', ArrowDown:'down', ' ':'action', Enter:'action', a:'left', d:'right', w:'up', s:'down' };
  const k = map[e.key];
  if (k) setKey(k, false);
});

touchPad.querySelectorAll('button').forEach(b => {
  const key = b.dataset.key;
  const down = (e) => { e.preventDefault(); setKey(key, true); };
  const up = (e) => { e.preventDefault(); setKey(key, false); };
  b.addEventListener('touchstart', down, { passive: false });
  b.addEventListener('touchend', up, { passive: false });
  b.addEventListener('touchcancel', up, { passive: false });
  b.addEventListener('mousedown', down);
  b.addEventListener('mouseup', up);
  b.addEventListener('mouseleave', up);
});

/* Canvas tap coordinates */
function canvasPoint(e) {
  const rect = canvas.getBoundingClientRect();
  const sx = canvas.width / rect.width;
  const sy = canvas.height / rect.height;
  const pt = e.touches ? e.touches[0] : e;
  return { x: (pt.clientX - rect.left) * sx, y: (pt.clientY - rect.top) * sy };
}

/* ============================================================
   GAME LOOP HELPER
   ============================================================ */
function loop(update) {
  let last = performance.now();
  function frame(now) {
    const dt = Math.min(50, now - last) / 1000;
    last = now;
    update(dt);
    gameLoopId = requestAnimationFrame(frame);
  }
  gameLoopId = requestAnimationFrame(frame);
}

function drawHud(ctx, text, color) {
  ctx.fillStyle = color || '#00d4ff';
  ctx.font = '14px JetBrains Mono, monospace';
  ctx.textAlign = 'left';
  ctx.fillText(text, 8, 18);
}

function drawGameOver(ctx, canvas, msg, sub) {
  ctx.fillStyle = 'rgba(0,0,0,0.75)';
  ctx.fillRect(0, 0, canvas.width, canvas.height);
  ctx.fillStyle = '#ef4444';
  ctx.font = 'bold 24px JetBrains Mono, monospace';
  ctx.textAlign = 'center';
  ctx.fillText(msg || 'GAME OVER', canvas.width/2, canvas.height/2 - 10);
  if (sub) {
    ctx.fillStyle = '#00d4ff';
    ctx.font = '12px JetBrains Mono, monospace';
    ctx.fillText(sub, canvas.width/2, canvas.height/2 + 14);
  }
  ctx.fillStyle = '#94a3b8';
  ctx.font = '10px JetBrains Mono, monospace';
  ctx.fillText('Press Restart to play again', canvas.width/2, canvas.height/2 + 32);
}

/* ============================================================
   GAME 1: STICK RUNNER
   ============================================================ */
function initStickRunner(ctx, canvas) {
  const W = canvas.width, H = canvas.height;
  const state = {
    x: 60, y: H - 60, vy: 0, onGround: true,
    speed: 180, obstacles: [], spawn: 1.5, score: 0, alive: true,
    bgOffset: 0
  };
  function spawnObstacle() {
    const types = [{ w: 18, h: 30 }, { w: 12, h: 45 }, { w: 28, h: 20 }];
    const t = types[Math.floor(Math.random() * types.length)];
    state.obstacles.push({ x: W + 20, w: t.w, h: t.h });
  }
  function update(dt) {
    if (!state.alive) return;
    // Jump
    if ((input.up || input.action) && state.onGround) {
      state.vy = -320; state.onGround = false;
    }
    state.vy += 800 * dt;
    state.y += state.vy * dt;
    if (state.y >= H - 60) { state.y = H - 60; state.vy = 0; state.onGround = true; }
    state.bgOffset = (state.bgOffset + state.speed * dt) % 40;
    state.speed += dt * 4;
    state.spawn -= dt;
    if (state.spawn <= 0) { spawnObstacle(); state.spawn = 0.9 + Math.random()*0.8 - Math.min(0.5, state.score/500); }
    state.obstacles.forEach(o => o.x -= state.speed * dt);
    state.obstacles = state.obstacles.filter(o => o.x + o.w > -20);
    // Collision
    for (const o of state.obstacles) {
      if (state.x + 12 > o.x && state.x - 12 < o.x + o.w && state.y + 10 > H - 30 - o.h) {
        state.alive = false; break;
      }
    }
    state.score += dt * 10;
    draw();
  }
  function draw() {
    ctx.fillStyle = '#050a0f'; ctx.fillRect(0,0,W,H);
    // Stars
    ctx.fillStyle = '#1a2535';
    for (let i = 0; i < 30; i++) ctx.fillRect((i*37 - state.bgOffset*0.3) % W, (i*17)%120, 2, 2);
    // Ground
    ctx.fillStyle = '#0e1520'; ctx.fillRect(0, H-30, W, 30);
    ctx.strokeStyle = '#00d4ff'; ctx.beginPath(); ctx.moveTo(0, H-30); ctx.lineTo(W, H-30); ctx.stroke();
    ctx.strokeStyle = '#1a2535';
    for (let i = 0; i < 20; i++) {
      ctx.beginPath();
      const gx = (i*40 - state.bgOffset) % (W+40);
      ctx.moveTo(gx, H-30); ctx.lineTo(gx, H); ctx.stroke();
    }
    // Obstacles
    state.obstacles.forEach(o => {
      ctx.fillStyle = '#ff6600';
      ctx.fillRect(o.x, H - 30 - o.h, o.w, o.h);
    });
    // Stick figure
    ctx.strokeStyle = '#00d4ff'; ctx.lineWidth = 2;
    ctx.beginPath(); ctx.arc(state.x, state.y - 20, 8, 0, Math.PI*2); ctx.stroke();
    ctx.beginPath(); ctx.moveTo(state.x, state.y - 12); ctx.lineTo(state.x, state.y + 10);
    ctx.moveTo(state.x, state.y - 5); ctx.lineTo(state.x - 10, state.y + 3);
    ctx.moveTo(state.x, state.y - 5); ctx.lineTo(state.x + 10, state.y + 3);
    ctx.moveTo(state.x, state.y + 10); ctx.lineTo(state.x - 8, state.y + 22);
    ctx.moveTo(state.x, state.y + 10); ctx.lineTo(state.x + 8, state.y + 22);
    ctx.stroke();
    drawHud(ctx, `SCORE: ${Math.floor(state.score)}`);
    if (!state.alive) drawGameOver(ctx, canvas, 'CRASHED', `Distance: ${Math.floor(state.score)}m`);
  }
  loop(update);
  draw();
}

/* ============================================================
   GAME 2: TANK DUEL
   ============================================================ */
function initTankDuel(ctx, canvas) {
  const W = canvas.width, H = canvas.height;
  // Generate terrain
  const terrain = [];
  {
    let h = H - 100;
    for (let i = 0; i <= W; i++) {
      h += (Math.random()-0.5)*4;
      h = Math.max(H-180, Math.min(H-60, h));
      terrain.push(h);
    }
  }
  const state = {
    player: { x: 60, angle: -60, power: 60, hp: 3 },
    enemy: { x: W - 80, angle: -120, power: 60, hp: 3 },
    projectile: null,
    turn: 'player',
    msg: 'YOUR TURN',
    gameOver: false
  };
  state.player.y = terrain[60] - 14;
  state.enemy.y = terrain[W-80] - 14;
  input.onPress((k) => {
    if (state.gameOver || state.turn !== 'player' || state.projectile) return;
    if (k === 'action') fire(state.player, 1);
  });
  function fire(tank, dir) {
    const rad = tank.angle * Math.PI / 180;
    state.projectile = {
      x: tank.x + Math.cos(rad)*20,
      y: tank.y - 5 + Math.sin(rad)*20,
      vx: Math.cos(rad) * tank.power * 2,
      vy: Math.sin(rad) * tank.power * 2,
      owner: tank === state.player ? 'player' : 'enemy'
    };
  }
  function update(dt) {
    if (state.gameOver) return;
    if (state.turn === 'player' && !state.projectile) {
      if (input.left) state.player.angle -= 40*dt;
      if (input.right) state.player.angle += 40*dt;
      if (input.up) state.player.power = Math.min(120, state.player.power + 30*dt);
      if (input.down) state.player.power = Math.max(20, state.player.power - 30*dt);
      state.player.angle = Math.max(-170, Math.min(-10, state.player.angle));
    }
    if (state.projectile) {
      const p = state.projectile;
      p.vy += 120 * dt;
      p.x += p.vx * dt;
      p.y += p.vy * dt;
      // Terrain collision
      const tx = Math.floor(p.x);
      if (tx >= 0 && tx < terrain.length && p.y >= terrain[tx]) {
        hitAt(p.x, p.y);
        state.projectile = null;
        nextTurn();
      } else if (p.x < 0 || p.x > W || p.y > H) {
        state.projectile = null;
        nextTurn();
      } else {
        const target = p.owner === 'player' ? state.enemy : state.player;
        if (Math.hypot(p.x - target.x, p.y - target.y) < 18) {
          target.hp--;
          hitAt(p.x, p.y);
          state.projectile = null;
          if (target.hp <= 0) {
            state.gameOver = true;
            state.msg = p.owner === 'player' ? 'VICTORY' : 'DEFEATED';
          } else nextTurn();
        }
      }
    }
    draw();
  }
  function hitAt(x, y) {
    const cx = Math.floor(x);
    for (let i = Math.max(0, cx-10); i < Math.min(W, cx+10); i++) {
      terrain[i] = Math.min(H-20, terrain[i] + (10 - Math.abs(i-cx)) * 0.8);
    }
    state.player.y = terrain[Math.floor(state.player.x)] - 14;
    state.enemy.y = terrain[Math.floor(state.enemy.x)] - 14;
  }
  function nextTurn() {
    if (state.gameOver) return;
    state.turn = state.turn === 'player' ? 'enemy' : 'player';
    state.msg = state.turn === 'player' ? 'YOUR TURN' : 'ENEMY TURN';
    if (state.turn === 'enemy') setTimeout(enemyAI, 700);
  }
  function enemyAI() {
    if (state.gameOver) return;
    state.enemy.angle = -100 - Math.random()*50;
    state.enemy.power = 55 + Math.random()*30;
    fire(state.enemy, -1);
  }
  function draw() {
    ctx.fillStyle = '#0a1018'; ctx.fillRect(0,0,W,H);
    // Stars
    ctx.fillStyle = '#1a2535';
    for (let i = 0; i < 20; i++) ctx.fillRect((i*29)%W, (i*13)%80, 2, 2);
    // Terrain
    ctx.fillStyle = '#0e3b1f';
    ctx.beginPath();
    ctx.moveTo(0, H);
    for (let i = 0; i <= W; i++) ctx.lineTo(i, terrain[i]);
    ctx.lineTo(W, H); ctx.closePath(); ctx.fill();
    ctx.strokeStyle = '#10b981'; ctx.lineWidth = 1;
    ctx.beginPath();
    for (let i = 0; i <= W; i++) {
      if (i === 0) ctx.moveTo(i, terrain[i]); else ctx.lineTo(i, terrain[i]);
    }
    ctx.stroke();
    // Tanks
    drawTank(state.player, '#00d4ff');
    drawTank(state.enemy, '#ff6600');
    // Projectile
    if (state.projectile) {
      ctx.fillStyle = '#fbbf24';
      ctx.beginPath(); ctx.arc(state.projectile.x, state.projectile.y, 3, 0, Math.PI*2); ctx.fill();
    }
    // HUD
    drawHud(ctx, `P:${state.player.hp} E:${state.enemy.hp}  ${state.msg}`);
    if (state.turn === 'player' && !state.projectile && !state.gameOver) {
      ctx.fillStyle = '#00d4ff';
      ctx.font = '10px JetBrains Mono';
      ctx.textAlign = 'left';
      ctx.fillText(`ANG:${Math.floor(state.player.angle)}  PWR:${Math.floor(state.player.power)}`, 8, H-8);
    }
    if (state.gameOver) drawGameOver(ctx, canvas, state.msg, '');
  }
  function drawTank(t, color) {
    ctx.fillStyle = color;
    ctx.fillRect(t.x - 14, t.y, 28, 10);
    ctx.fillRect(t.x - 8, t.y - 6, 16, 6);
    const rad = t.angle * Math.PI/180;
    ctx.strokeStyle = color; ctx.lineWidth = 3;
    ctx.beginPath();
    ctx.moveTo(t.x, t.y - 3);
    ctx.lineTo(t.x + Math.cos(rad)*18, t.y - 3 + Math.sin(rad)*18);
    ctx.stroke();
  }
  loop(update);
  draw();
}

/* ============================================================
   GAME 3: COPTER CAVE
   ============================================================ */
function initHeliCave(ctx, canvas) {
  const W = canvas.width, H = canvas.height;
  const state = {
    y: H/2, vy: 0, x: 80,
    topWall: [], botWall: [],
    offset: 0, speed: 120, alive: true, score: 0, gap: 160
  };
  for (let i = 0; i < W + 40; i += 10) {
    state.topWall.push(40 + Math.sin(i*0.02)*20);
    state.botWall.push(H - 40 - Math.cos(i*0.015)*20);
  }
  function update(dt) {
    if (!state.alive) return;
    state.vy += (input.action || input.up) ? -400*dt : 500*dt;
    state.vy = Math.max(-250, Math.min(300, state.vy));
    state.y += state.vy * dt;
    state.offset += state.speed * dt;
    state.speed += dt * 3;
    while (state.offset > 10) {
      state.offset -= 10;
      state.topWall.shift();
      state.botWall.shift();
      const last = state.topWall[state.topWall.length-1];
      const lastB = state.botWall[state.botWall.length-1];
      const nt = Math.max(10, Math.min(H - state.gap - 20, last + (Math.random()-0.5)*20));
      state.topWall.push(nt);
      state.botWall.push(Math.min(H-10, Math.max(nt + state.gap, lastB + (Math.random()-0.5)*20)));
      state.gap = Math.max(90, state.gap - 0.2);
    }
    // Collision at copter x
    const idx = Math.floor(state.x / 10);
    const top = state.topWall[idx] || 0;
    const bot = state.botWall[idx] || H;
    if (state.y - 6 < top || state.y + 6 > bot) {
      state.alive = false;
    }
    state.score += dt * 15;
    draw();
  }
  function draw() {
    ctx.fillStyle = '#050a0f'; ctx.fillRect(0,0,W,H);
    // Walls
    ctx.fillStyle = '#0e1520';
    ctx.beginPath(); ctx.moveTo(0, 0);
    for (let i = 0; i < state.topWall.length; i++) ctx.lineTo(i*10 - state.offset, state.topWall[i]);
    ctx.lineTo(W, 0); ctx.closePath(); ctx.fill();
    ctx.beginPath(); ctx.moveTo(0, H);
    for (let i = 0; i < state.botWall.length; i++) ctx.lineTo(i*10 - state.offset, state.botWall[i]);
    ctx.lineTo(W, H); ctx.closePath(); ctx.fill();
    ctx.strokeStyle = '#00d4ff';
    ctx.beginPath();
    for (let i = 0; i < state.topWall.length; i++) {
      const x = i*10 - state.offset;
      if (i === 0) ctx.moveTo(x, state.topWall[i]); else ctx.lineTo(x, state.topWall[i]);
    }
    ctx.stroke();
    ctx.beginPath();
    for (let i = 0; i < state.botWall.length; i++) {
      const x = i*10 - state.offset;
      if (i === 0) ctx.moveTo(x, state.botWall[i]); else ctx.lineTo(x, state.botWall[i]);
    }
    ctx.stroke();
    // Copter
    ctx.fillStyle = '#ff6600';
    ctx.fillRect(state.x-12, state.y-5, 20, 10);
    ctx.fillRect(state.x+6, state.y-2, 6, 4);
    ctx.strokeStyle = '#fbbf24';
    ctx.beginPath(); ctx.moveTo(state.x-14, state.y-8); ctx.lineTo(state.x+8, state.y-8); ctx.stroke();
    drawHud(ctx, `SCORE: ${Math.floor(state.score)}`);
    if (!state.alive) drawGameOver(ctx, canvas, 'CRASH', `Score: ${Math.floor(state.score)}`);
  }
  loop(update);
  draw();
}

/* ============================================================
   GAME 4: BUBBLE POP
   ============================================================ */
function initBubblePop(ctx, canvas) {
  const W = canvas.width, H = canvas.height;
  const COLORS = ['#00d4ff','#ff6600','#10b981','#fbbf24','#ef4444'];
  const R = 14, COLS = 15;
  const state = {
    grid: [],
    angle: -Math.PI/2,
    shooter: { x: W/2, y: H-30, color: 0 },
    next: 1,
    proj: null,
    won: false, lost: false, score: 0
  };
  for (let r = 0; r < 6; r++) {
    const row = [];
    for (let c = 0; c < COLS; c++) {
      row.push(Math.floor(Math.random()*COLORS.length));
    }
    state.grid.push(row);
  }
  function cellPos(r, c) {
    const off = r % 2 === 0 ? 0 : R;
    return { x: R + c*R*2 + off, y: R + 10 + r * R*1.7 };
  }
  input.onPress((k) => {
    if (state.won || state.lost) return;
    if (k === 'action' && !state.proj) {
      state.proj = {
        x: state.shooter.x, y: state.shooter.y,
        vx: Math.cos(state.angle)*300, vy: Math.sin(state.angle)*300,
        color: state.shooter.color
      };
      state.shooter.color = state.next;
      state.next = Math.floor(Math.random()*COLORS.length);
    }
  });
  function update(dt) {
    if (state.won || state.lost) return;
    if (input.left) state.angle -= 1.5*dt;
    if (input.right) state.angle += 1.5*dt;
    state.angle = Math.max(-Math.PI + 0.3, Math.min(-0.3, state.angle));
    if (state.proj) {
      state.proj.x += state.proj.vx * dt;
      state.proj.y += state.proj.vy * dt;
      if (state.proj.x < R) { state.proj.x = R; state.proj.vx *= -1; }
      if (state.proj.x > W - R) { state.proj.x = W - R; state.proj.vx *= -1; }
      // Collide with grid
      let hit = false;
      for (let r = 0; r < state.grid.length && !hit; r++) {
        for (let c = 0; c < state.grid[r].length && !hit; c++) {
          if (state.grid[r][c] == null) continue;
          const p = cellPos(r, c);
          if (Math.hypot(state.proj.x - p.x, state.proj.y - p.y) < R*2 - 2) {
            snapProj(); hit = true;
          }
        }
      }
      if (!hit && state.proj && state.proj.y < R + 10) snapProj();
      if (state.proj && state.proj.y > H) state.proj = null;
    }
    draw();
  }
  function snapProj() {
    if (!state.proj) return;
    // Find nearest empty cell
    let best = null, bd = 1e9;
    for (let r = 0; r < 12; r++) {
      for (let c = 0; c < COLS; c++) {
        if (state.grid[r] && state.grid[r][c] != null) continue;
        const p = cellPos(r, c);
        const d = Math.hypot(state.proj.x - p.x, state.proj.y - p.y);
        if (d < bd) { bd = d; best = { r, c }; }
      }
    }
    if (best) {
      while (state.grid.length <= best.r) state.grid.push(new Array(COLS).fill(null));
      state.grid[best.r][best.c] = state.proj.color;
      popMatches(best.r, best.c);
    }
    state.proj = null;
    // Check loss
    for (let c = 0; c < COLS; c++) {
      if (state.grid[10] && state.grid[10][c] != null) { state.lost = true; break; }
    }
    // Check win
    let any = false;
    state.grid.forEach(row => row.forEach(v => { if (v != null) any = true; }));
    if (!any) state.won = true;
  }
  function neighbors(r, c) {
    const odd = r % 2;
    return [[r,c-1],[r,c+1],[r-1,c-1+odd],[r-1,c+odd],[r+1,c-1+odd],[r+1,c+odd]]
      .filter(([rr,cc]) => rr>=0 && cc>=0 && cc<COLS && state.grid[rr] && state.grid[rr][cc] != null);
  }
  function popMatches(r, c) {
    const color = state.grid[r][c];
    const visited = new Set();
    const queue = [[r,c]];
    const found = [];
    while (queue.length) {
      const [rr,cc] = queue.shift();
      const key = rr+','+cc;
      if (visited.has(key)) continue;
      visited.add(key);
      if (state.grid[rr][cc] !== color) continue;
      found.push([rr,cc]);
      neighbors(rr,cc).forEach(n => queue.push(n));
    }
    if (found.length >= 3) {
      found.forEach(([rr,cc]) => state.grid[rr][cc] = null);
      state.score += found.length * 10;
    }
  }
  function draw() {
    ctx.fillStyle = '#050a0f'; ctx.fillRect(0,0,W,H);
    state.grid.forEach((row, r) => row.forEach((v, c) => {
      if (v == null) return;
      const p = cellPos(r, c);
      ctx.fillStyle = COLORS[v];
      ctx.beginPath(); ctx.arc(p.x, p.y, R-1, 0, Math.PI*2); ctx.fill();
      ctx.strokeStyle = 'rgba(0,0,0,0.3)'; ctx.stroke();
    }));
    // Aim line
    ctx.strokeStyle = 'rgba(0,212,255,0.5)';
    ctx.setLineDash([4,4]);
    ctx.beginPath(); ctx.moveTo(state.shooter.x, state.shooter.y);
    ctx.lineTo(state.shooter.x + Math.cos(state.angle)*80, state.shooter.y + Math.sin(state.angle)*80);
    ctx.stroke(); ctx.setLineDash([]);
    // Shooter
    ctx.fillStyle = COLORS[state.shooter.color];
    ctx.beginPath(); ctx.arc(state.shooter.x, state.shooter.y, R, 0, Math.PI*2); ctx.fill();
    // Next
    ctx.fillStyle = COLORS[state.next];
    ctx.beginPath(); ctx.arc(W-30, H-30, R-4, 0, Math.PI*2); ctx.fill();
    ctx.fillStyle = '#94a3b8'; ctx.font = '9px JetBrains Mono'; ctx.textAlign = 'center';
    ctx.fillText('NEXT', W-30, H-48);
    // Projectile
    if (state.proj) {
      ctx.fillStyle = COLORS[state.proj.color];
      ctx.beginPath(); ctx.arc(state.proj.x, state.proj.y, R-1, 0, Math.PI*2); ctx.fill();
    }
    drawHud(ctx, `SCORE: ${state.score}`);
    if (state.won) drawGameOver(ctx, canvas, 'CLEARED!', `Score: ${state.score}`);
    if (state.lost) drawGameOver(ctx, canvas, 'GAME OVER', `Score: ${state.score}`);
  }
  loop(update);
  draw();
}

/* ============================================================
   GAME 5: BREAKOUT
   ============================================================ */
function initBreakout(ctx, canvas) {
  const W = canvas.width, H = canvas.height;
  const state = {
    paddle: { x: W/2 - 40, w: 80, h: 10 },
    ball: { x: W/2, y: H/2, vx: 180, vy: -220, r: 6 },
    bricks: [],
    score: 0, lives: 3, won: false, lost: false
  };
  const COLS = 10, ROWS = 5, BW = (W - 20) / COLS, BH = 14;
  const COLORS = ['#ef4444','#ff6600','#fbbf24','#10b981','#00d4ff'];
  for (let r = 0; r < ROWS; r++)
    for (let c = 0; c < COLS; c++)
      state.bricks.push({ x: 10 + c*BW, y: 40 + r*BH, w: BW-2, h: BH-2, color: COLORS[r], alive: true });
  function update(dt) {
    if (state.won || state.lost) return;
    if (input.left) state.paddle.x -= 280*dt;
    if (input.right) state.paddle.x += 280*dt;
    state.paddle.x = Math.max(0, Math.min(W - state.paddle.w, state.paddle.x));
    state.ball.x += state.ball.vx * dt;
    state.ball.y += state.ball.vy * dt;
    if (state.ball.x < state.ball.r) { state.ball.x = state.ball.r; state.ball.vx *= -1; }
    if (state.ball.x > W - state.ball.r) { state.ball.x = W - state.ball.r; state.ball.vx *= -1; }
    if (state.ball.y < state.ball.r) { state.ball.y = state.ball.r; state.ball.vy *= -1; }
    // Paddle collision
    if (state.ball.y + state.ball.r > H - 20 && state.ball.y < H - 10 &&
        state.ball.x > state.paddle.x && state.ball.x < state.paddle.x + state.paddle.w) {
      state.ball.vy = -Math.abs(state.ball.vy);
      state.ball.vx += ((state.ball.x - (state.paddle.x + state.paddle.w/2)) / (state.paddle.w/2)) * 80;
    }
    if (state.ball.y > H) {
      state.lives--;
      if (state.lives <= 0) state.lost = true;
      else { state.ball.x = W/2; state.ball.y = H/2; state.ball.vx = 180; state.ball.vy = -220; }
    }
    // Brick collision
    for (const b of state.bricks) {
      if (!b.alive) continue;
      if (state.ball.x > b.x && state.ball.x < b.x + b.w && state.ball.y > b.y && state.ball.y < b.y + b.h) {
        b.alive = false;
        state.ball.vy *= -1;
        state.score += 10;
      }
    }
    if (state.bricks.every(b => !b.alive)) state.won = true;
    draw();
  }
  function draw() {
    ctx.fillStyle = '#050a0f'; ctx.fillRect(0,0,W,H);
    state.bricks.forEach(b => {
      if (!b.alive) return;
      ctx.fillStyle = b.color;
      ctx.fillRect(b.x, b.y, b.w, b.h);
      ctx.strokeStyle = 'rgba(0,0,0,0.4)';
      ctx.strokeRect(b.x, b.y, b.w, b.h);
    });
    ctx.fillStyle = '#00d4ff';
    ctx.fillRect(state.paddle.x, H - 20, state.paddle.w, state.paddle.h);
    ctx.beginPath(); ctx.arc(state.ball.x, state.ball.y, state.ball.r, 0, Math.PI*2); ctx.fill();
    drawHud(ctx, `SCORE: ${state.score}  LIVES: ${state.lives}`);
    if (state.won) drawGameOver(ctx, canvas, 'CLEARED!', `Score: ${state.score}`);
    if (state.lost) drawGameOver(ctx, canvas, 'GAME OVER', `Score: ${state.score}`);
  }
  loop(update);
  draw();
}

/* ============================================================
   GAME 6: SNAKE
   ============================================================ */
function initSnake(ctx, canvas) {
  const W = canvas.width, H = canvas.height;
  const GS = 16;
  const COLS = Math.floor(W/GS), ROWS = Math.floor(H/GS);
  const state = {
    snake: [{x:5,y:5},{x:4,y:5},{x:3,y:5}],
    dir: {x:1,y:0}, nextDir: {x:1,y:0},
    food: {x:10, y:10},
    score: 0, alive: true,
    tickAcc: 0, tickRate: 0.12
  };
  input.onPress((k) => {
    if (k === 'left' && state.dir.x === 0) state.nextDir = {x:-1,y:0};
    if (k === 'right' && state.dir.x === 0) state.nextDir = {x:1,y:0};
    if (k === 'up' && state.dir.y === 0) state.nextDir = {x:0,y:-1};
    if (k === 'down' && state.dir.y === 0) state.nextDir = {x:0,y:1};
  });
  function placeFood() {
    while (true) {
      const f = { x: Math.floor(Math.random()*COLS), y: Math.floor(Math.random()*ROWS) };
      if (!state.snake.some(s => s.x === f.x && s.y === f.y)) { state.food = f; return; }
    }
  }
  function update(dt) {
    if (!state.alive) return;
    state.tickAcc += dt;
    if (state.tickAcc < state.tickRate) { draw(); return; }
    state.tickAcc = 0;
    state.dir = state.nextDir;
    const head = { x: state.snake[0].x + state.dir.x, y: state.snake[0].y + state.dir.y };
    if (head.x < 0 || head.x >= COLS || head.y < 0 || head.y >= ROWS) { state.alive = false; draw(); return; }
    if (state.snake.some(s => s.x === head.x && s.y === head.y)) { state.alive = false; draw(); return; }
    state.snake.unshift(head);
    if (head.x === state.food.x && head.y === state.food.y) {
      state.score += 10;
      placeFood();
      state.tickRate = Math.max(0.05, state.tickRate - 0.003);
    } else {
      state.snake.pop();
    }
    draw();
  }
  function draw() {
    ctx.fillStyle = '#050a0f'; ctx.fillRect(0,0,W,H);
    ctx.strokeStyle = '#0e1520';
    for (let i = 0; i < COLS; i++) { ctx.beginPath(); ctx.moveTo(i*GS, 0); ctx.lineTo(i*GS, H); ctx.stroke(); }
    for (let i = 0; i < ROWS; i++) { ctx.beginPath(); ctx.moveTo(0, i*GS); ctx.lineTo(W, i*GS); ctx.stroke(); }
    state.snake.forEach((s, i) => {
      ctx.fillStyle = i === 0 ? '#00d4ff' : '#10b981';
      ctx.fillRect(s.x*GS+1, s.y*GS+1, GS-2, GS-2);
    });
    ctx.fillStyle = '#ef4444';
    ctx.fillRect(state.food.x*GS+2, state.food.y*GS+2, GS-4, GS-4);
    drawHud(ctx, `SCORE: ${state.score}`);
    if (!state.alive) drawGameOver(ctx, canvas, 'GAME OVER', `Length: ${state.snake.length}`);
  }
  loop(update);
  draw();
}

/* ============================================================
   GAME 7: ASTEROIDS
   ============================================================ */
function initAsteroids(ctx, canvas) {
  const W = canvas.width, H = canvas.height;
  const state = {
    ship: { x: W/2, y: H/2, a: 0, vx: 0, vy: 0 },
    bullets: [],
    rocks: [],
    score: 0, lives: 3, over: false
  };
  for (let i = 0; i < 5; i++) state.rocks.push(newRock(20 + Math.random()*(W-40), 20 + Math.random()*(H-40), 30));
  function newRock(x, y, size) {
    return { x, y, size, vx: (Math.random()-0.5)*80, vy: (Math.random()-0.5)*80, rot: Math.random()*Math.PI*2 };
  }
  input.onPress((k) => {
    if (state.over) return;
    if (k === 'action') {
      state.bullets.push({
        x: state.ship.x + Math.cos(state.ship.a)*15,
        y: state.ship.y + Math.sin(state.ship.a)*15,
        vx: Math.cos(state.ship.a)*300 + state.ship.vx,
        vy: Math.sin(state.ship.a)*300 + state.ship.vy,
        life: 1.2
      });
    }
  });
  function wrap(o) {
    if (o.x < 0) o.x += W; if (o.x > W) o.x -= W;
    if (o.y < 0) o.y += H; if (o.y > H) o.y -= H;
  }
  function update(dt) {
    if (state.over) return;
    if (input.left) state.ship.a -= 3*dt;
    if (input.right) state.ship.a += 3*dt;
    if (input.up) {
      state.ship.vx += Math.cos(state.ship.a)*200*dt;
      state.ship.vy += Math.sin(state.ship.a)*200*dt;
    }
    state.ship.vx *= 0.99;
    state.ship.vy *= 0.99;
    state.ship.x += state.ship.vx * dt;
    state.ship.y += state.ship.vy * dt;
    wrap(state.ship);
    state.bullets.forEach(b => { b.x += b.vx*dt; b.y += b.vy*dt; b.life -= dt; wrap(b); });
    state.bullets = state.bullets.filter(b => b.life > 0);
    state.rocks.forEach(r => { r.x += r.vx*dt; r.y += r.vy*dt; wrap(r); });
    // Bullet-rock collisions
    for (let i = state.rocks.length-1; i >= 0; i--) {
      const r = state.rocks[i];
      for (let j = state.bullets.length-1; j >= 0; j--) {
        const b = state.bullets[j];
        if (Math.hypot(r.x - b.x, r.y - b.y) < r.size) {
          state.bullets.splice(j, 1);
          state.rocks.splice(i, 1);
          state.score += Math.floor(100 / r.size * 10);
          if (r.size > 12) {
            state.rocks.push(newRock(r.x, r.y, r.size/2));
            state.rocks.push(newRock(r.x, r.y, r.size/2));
          }
          break;
        }
      }
    }
    // Ship-rock
    for (const r of state.rocks) {
      if (Math.hypot(r.x - state.ship.x, r.y - state.ship.y) < r.size + 8) {
        state.lives--;
        state.ship.x = W/2; state.ship.y = H/2; state.ship.vx = 0; state.ship.vy = 0;
        if (state.lives <= 0) state.over = true;
        break;
      }
    }
    if (state.rocks.length === 0) {
      for (let i = 0; i < 6; i++) state.rocks.push(newRock(20 + Math.random()*(W-40), 20 + Math.random()*(H-40), 30));
    }
    draw();
  }
  function draw() {
    ctx.fillStyle = '#050a0f'; ctx.fillRect(0,0,W,H);
    ctx.fillStyle = '#1a2535';
    for (let i = 0; i < 30; i++) ctx.fillRect((i*43)%W, (i*67)%H, 2, 2);
    // Ship
    ctx.save();
    ctx.translate(state.ship.x, state.ship.y);
    ctx.rotate(state.ship.a);
    ctx.strokeStyle = '#00d4ff'; ctx.lineWidth = 2;
    ctx.beginPath();
    ctx.moveTo(15, 0); ctx.lineTo(-10, -8); ctx.lineTo(-5, 0); ctx.lineTo(-10, 8); ctx.closePath();
    ctx.stroke();
    if (input.up) {
      ctx.strokeStyle = '#ff6600';
      ctx.beginPath(); ctx.moveTo(-5, 0); ctx.lineTo(-15, 0); ctx.stroke();
    }
    ctx.restore();
    // Bullets
    ctx.fillStyle = '#fbbf24';
    state.bullets.forEach(b => { ctx.fillRect(b.x-2, b.y-2, 4, 4); });
    // Rocks
    ctx.strokeStyle = '#94a3b8';
    state.rocks.forEach(r => {
      ctx.beginPath();
      for (let i = 0; i < 8; i++) {
        const a = (i/8)*Math.PI*2 + r.rot;
        const rad = r.size + Math.sin(i*2.3)*3;
        const x = r.x + Math.cos(a)*rad;
        const y = r.y + Math.sin(a)*rad;
        if (i === 0) ctx.moveTo(x, y); else ctx.lineTo(x, y);
      }
      ctx.closePath(); ctx.stroke();
    });
    drawHud(ctx, `SCORE: ${state.score}  LIVES: ${state.lives}`);
    if (state.over) drawGameOver(ctx, canvas, 'GAME OVER', `Score: ${state.score}`);
  }
  loop(update);
  draw();
}

/* ============================================================
   GAME 8: FROGGER / STREET HOPPER
   ============================================================ */
function initFrogger(ctx, canvas) {
  const W = canvas.width, H = canvas.height;
  const GS = 30;
  const state = {
    frog: { x: Math.floor(W/2/GS)*GS, y: H - GS },
    lanes: [],
    score: 0, lives: 3, over: false, won: false
  };
  // Build lanes
  for (let r = 1; r < 11; r++) {
    const y = r * GS;
    if (r <= 3 || (r >= 6 && r <= 9)) {
      const isWater = r >= 6 && r <= 9;
      const speed = (r % 2 === 0 ? 1 : -1) * (40 + r*8);
      const cars = [];
      for (let i = 0; i < 3; i++) cars.push({ x: i * 160 + Math.random()*40, w: isWater ? 80 : 50 });
      state.lanes.push({ y, speed, cars, water: isWater });
    }
  }
  input.onPress((k) => {
    if (state.over || state.won) return;
    if (k === 'up') state.frog.y -= GS;
    if (k === 'down') state.frog.y += GS;
    if (k === 'left') state.frog.x -= GS;
    if (k === 'right') state.frog.x += GS;
    state.frog.x = Math.max(0, Math.min(W-GS, state.frog.x));
    state.frog.y = Math.max(0, Math.min(H-GS, state.frog.y));
    if (state.frog.y <= 0) { state.won = true; state.score += 100; }
  });
  function update(dt) {
    if (state.over || state.won) return;
    state.lanes.forEach(l => {
      l.cars.forEach(c => {
        c.x += l.speed * dt;
        if (c.x > W + 20) c.x = -l.cars[0].w - 20;
        if (c.x < -l.cars[0].w - 20) c.x = W + 20;
      });
    });
    // Collision
    let onLog = false, inWater = false, hit = false;
    state.lanes.forEach(l => {
      if (state.frog.y === l.y) {
        if (l.water) inWater = true;
        l.cars.forEach(c => {
          if (state.frog.x + GS > c.x && state.frog.x < c.x + c.w) {
            if (l.water) {
              onLog = true;
              state.frog.x += l.speed * dt;
            } else hit = true;
          }
        });
      }
    });
    if (inWater && !onLog) hit = true;
    if (hit) {
      state.lives--;
      if (state.lives <= 0) state.over = true;
      else { state.frog.x = Math.floor(W/2/GS)*GS; state.frog.y = H - GS; }
    }
    state.frog.x = Math.max(0, Math.min(W-GS, state.frog.x));
    draw();
  }
  function draw() {
    ctx.fillStyle = '#050a0f'; ctx.fillRect(0,0,W,H);
    // Goal zone
    ctx.fillStyle = '#0e3b1f'; ctx.fillRect(0, 0, W, GS);
    // Street
    ctx.fillStyle = '#1a2535'; ctx.fillRect(0, GS, W, GS*3);
    // Median
    ctx.fillStyle = '#0e3b1f'; ctx.fillRect(0, 4*GS, W, GS);
    // Water
    ctx.fillStyle = '#053040'; ctx.fillRect(0, 5*GS, W, GS*4);
    // Safe bottom
    ctx.fillStyle = '#0e3b1f'; ctx.fillRect(0, 9*GS, W, H-9*GS);
    state.lanes.forEach(l => {
      l.cars.forEach(c => {
        ctx.fillStyle = l.water ? '#8b4513' : '#ff6600';
        ctx.fillRect(c.x, l.y + 4, c.w, GS - 8);
      });
    });
    // Frog
    ctx.fillStyle = '#10b981';
    ctx.fillRect(state.frog.x + 4, state.frog.y + 4, GS-8, GS-8);
    ctx.fillStyle = '#00d4ff';
    ctx.fillRect(state.frog.x + 7, state.frog.y + 8, 4, 4);
    ctx.fillRect(state.frog.x + 19, state.frog.y + 8, 4, 4);
    drawHud(ctx, `SCORE: ${state.score}  LIVES: ${state.lives}`);
    if (state.over) drawGameOver(ctx, canvas, 'GAME OVER', `Score: ${state.score}`);
    if (state.won) drawGameOver(ctx, canvas, 'YOU MADE IT!', `Score: ${state.score}`);
  }
  loop(update);
  draw();
}

/* ============================================================
   GAME 9: PONG
   ============================================================ */
function initPong(ctx, canvas) {
  const W = canvas.width, H = canvas.height;
  const state = {
    player: { y: H/2 - 30 },
    cpu: { y: H/2 - 30 },
    ball: { x: W/2, y: H/2, vx: 220, vy: 120 },
    pScore: 0, cScore: 0, over: false, msg: ''
  };
  function update(dt) {
    if (state.over) return;
    if (input.up) state.player.y -= 300*dt;
    if (input.down) state.player.y += 300*dt;
    state.player.y = Math.max(0, Math.min(H-60, state.player.y));
    // CPU
    const target = state.ball.y - 30;
    state.cpu.y += Math.sign(target - state.cpu.y) * Math.min(Math.abs(target - state.cpu.y), 180*dt);
    state.cpu.y = Math.max(0, Math.min(H-60, state.cpu.y));
    state.ball.x += state.ball.vx * dt;
    state.ball.y += state.ball.vy * dt;
    if (state.ball.y < 4) { state.ball.y = 4; state.ball.vy *= -1; }
    if (state.ball.y > H-4) { state.ball.y = H-4; state.ball.vy *= -1; }
    if (state.ball.x < 20 && state.ball.y > state.player.y && state.ball.y < state.player.y + 60) {
      state.ball.vx = Math.abs(state.ball.vx) * 1.05;
      state.ball.vy += (state.ball.y - (state.player.y + 30)) * 4;
    }
    if (state.ball.x > W-20 && state.ball.y > state.cpu.y && state.ball.y < state.cpu.y + 60) {
      state.ball.vx = -Math.abs(state.ball.vx) * 1.05;
      state.ball.vy += (state.ball.y - (state.cpu.y + 30)) * 4;
    }
    if (state.ball.x < 0) { state.cScore++; resetBall(-1); }
    if (state.ball.x > W) { state.pScore++; resetBall(1); }
    if (state.pScore >= 7) { state.over = true; state.msg = 'YOU WIN'; }
    if (state.cScore >= 7) { state.over = true; state.msg = 'CPU WINS'; }
    draw();
  }
  function resetBall(dir) {
    state.ball.x = W/2; state.ball.y = H/2;
    state.ball.vx = 220 * dir; state.ball.vy = (Math.random()-0.5)*200;
  }
  function draw() {
    ctx.fillStyle = '#050a0f'; ctx.fillRect(0,0,W,H);
    ctx.strokeStyle = '#1a2535'; ctx.setLineDash([6,6]);
    ctx.beginPath(); ctx.moveTo(W/2, 0); ctx.lineTo(W/2, H); ctx.stroke(); ctx.setLineDash([]);
    ctx.fillStyle = '#e2e8f0';
    ctx.fillRect(10, state.player.y, 8, 60);
    ctx.fillRect(W-18, state.cpu.y, 8, 60);
    ctx.fillRect(state.ball.x-4, state.ball.y-4, 8, 8);
    ctx.font = 'bold 28px JetBrains Mono';
    ctx.textAlign = 'center';
    ctx.fillStyle = '#00d4ff';
    ctx.fillText(state.pScore, W/2 - 40, 40);
    ctx.fillStyle = '#ff6600';
    ctx.fillText(state.cScore, W/2 + 40, 40);
    if (state.over) drawGameOver(ctx, canvas, state.msg, `${state.pScore} - ${state.cScore}`);
  }
  loop(update);
  draw();
}

/* ============================================================
   GAME 10: SPACE INVADERS
   ============================================================ */
function initInvaders(ctx, canvas) {
  const W = canvas.width, H = canvas.height;
  const state = {
    player: { x: W/2 - 15 },
    bullets: [],
    bombs: [],
    invaders: [],
    dir: 1, step: 0, stepRate: 0.6,
    score: 0, lives: 3, over: false, won: false
  };
  for (let r = 0; r < 4; r++)
    for (let c = 0; c < 8; c++)
      state.invaders.push({ x: 40 + c*40, y: 50 + r*30, alive: true, row: r });
  input.onPress((k) => {
    if (state.over || state.won) return;
    if (k === 'action' && state.bullets.length < 3) {
      state.bullets.push({ x: state.player.x + 15, y: H - 40, vy: -350 });
    }
  });
  function update(dt) {
    if (state.over || state.won) return;
    if (input.left) state.player.x -= 220*dt;
    if (input.right) state.player.x += 220*dt;
    state.player.x = Math.max(0, Math.min(W-30, state.player.x));
    state.bullets.forEach(b => b.y += b.vy*dt);
    state.bullets = state.bullets.filter(b => b.y > -10);
    state.step += dt;
    if (state.step >= state.stepRate) {
      state.step = 0;
      let edge = false;
      state.invaders.forEach(inv => {
        if (!inv.alive) return;
        inv.x += state.dir * 10;
        if (inv.x < 10 || inv.x > W-30) edge = true;
      });
      if (edge) {
        state.dir *= -1;
        state.invaders.forEach(inv => { if (inv.alive) inv.y += 16; });
      }
      // Random bomb
      const alive = state.invaders.filter(i => i.alive);
      if (alive.length && Math.random() < 0.6) {
        const shooter = alive[Math.floor(Math.random()*alive.length)];
        state.bombs.push({ x: shooter.x+10, y: shooter.y+10, vy: 140 });
      }
    }
    state.bombs.forEach(b => b.y += b.vy*dt);
    state.bombs = state.bombs.filter(b => b.y < H);
    // Bullet-invader
    state.bullets.forEach(b => {
      state.invaders.forEach(inv => {
        if (inv.alive && b.x > inv.x && b.x < inv.x+24 && b.y > inv.y && b.y < inv.y+16) {
          inv.alive = false;
          b.y = -100;
          state.score += (4 - inv.row) * 10;
          state.stepRate = Math.max(0.1, state.stepRate - 0.008);
        }
      });
    });
    // Bomb-player
    state.bombs.forEach(b => {
      if (b.x > state.player.x && b.x < state.player.x+30 && b.y > H-30 && b.y < H-10) {
        state.lives--;
        b.y = H + 100;
        if (state.lives <= 0) state.over = true;
      }
    });
    // Invader reaches player
    state.invaders.forEach(inv => { if (inv.alive && inv.y > H-40) state.over = true; });
    if (state.invaders.every(i => !i.alive)) state.won = true;
    draw();
  }
  function draw() {
    ctx.fillStyle = '#050a0f'; ctx.fillRect(0,0,W,H);
    ctx.fillStyle = '#1a2535';
    for (let i = 0; i < 20; i++) ctx.fillRect((i*37)%W, (i*23)%H, 2, 2);
    ctx.fillStyle = '#10b981';
    state.invaders.forEach(inv => {
      if (!inv.alive) return;
      ctx.fillRect(inv.x, inv.y, 24, 16);
      ctx.fillStyle = '#050a0f';
      ctx.fillRect(inv.x+4, inv.y+4, 4, 4); ctx.fillRect(inv.x+16, inv.y+4, 4, 4);
      ctx.fillStyle = '#10b981';
    });
    ctx.fillStyle = '#00d4ff';
    ctx.fillRect(state.player.x, H-30, 30, 12);
    ctx.fillRect(state.player.x+12, H-38, 6, 8);
    ctx.fillStyle = '#fbbf24';
    state.bullets.forEach(b => ctx.fillRect(b.x-1, b.y-4, 2, 8));
    ctx.fillStyle = '#ef4444';
    state.bombs.forEach(b => ctx.fillRect(b.x-2, b.y-4, 4, 8));
    drawHud(ctx, `SCORE: ${state.score}  LIVES: ${state.lives}`);
    if (state.over) drawGameOver(ctx, canvas, 'GAME OVER', `Score: ${state.score}`);
    if (state.won) drawGameOver(ctx, canvas, 'VICTORY', `Score: ${state.score}`);
  }
  loop(update);
  draw();
}

/* ============================================================
   GAME 11: MISSILE DEFENSE
   ============================================================ */
function initMissile(ctx, canvas) {
  const W = canvas.width, H = canvas.height;
  const state = {
    cities: [], incoming: [], defenders: [], explosions: [],
    score: 0, wave: 1, spawn: 2, over: false
  };
  for (let i = 0; i < 6; i++) state.cities.push({ x: 30 + i*70, alive: true });
  function spawnIncoming() {
    const tx = state.cities[Math.floor(Math.random()*state.cities.length)].x;
    state.incoming.push({
      x: Math.random()*W, y: 0,
      tx, ty: H - 30,
      speed: 40 + state.wave*6
    });
  }
  function onCanvas(e) {
    if (state.over) return;
    const p = canvasPoint(e);
    state.defenders.push({ x: W/2, y: H-20, tx: p.x, ty: p.y, speed: 220 });
  }
  canvas.addEventListener('mousedown', onCanvas);
  canvas.addEventListener('touchstart', onCanvas, { passive: false });
  function update(dt) {
    if (state.over) return;
    state.spawn -= dt;
    if (state.spawn <= 0) {
      spawnIncoming();
      state.spawn = Math.max(0.5, 2 - state.wave*0.1);
    }
    state.incoming.forEach(m => {
      const dx = m.tx - m.x, dy = m.ty - m.y;
      const d = Math.hypot(dx, dy);
      m.x += dx/d * m.speed * dt;
      m.y += dy/d * m.speed * dt;
    });
    state.defenders.forEach(d => {
      const dx = d.tx - d.x, dy = d.ty - d.y;
      const dist = Math.hypot(dx, dy);
      if (dist < 4) { state.explosions.push({ x: d.x, y: d.y, r: 0, max: 40 }); d.done = true; }
      else { d.x += dx/dist * d.speed * dt; d.y += dy/dist * d.speed * dt; }
    });
    state.defenders = state.defenders.filter(d => !d.done);
    state.explosions.forEach(e => { e.r += 40*dt; });
    state.explosions = state.explosions.filter(e => e.r < e.max);
    // Explosion hits incoming
    state.explosions.forEach(e => {
      state.incoming.forEach(m => {
        if (Math.hypot(e.x - m.x, e.y - m.y) < e.r) { m.dead = true; state.score += 25; }
      });
    });
    state.incoming = state.incoming.filter(m => {
      if (m.dead) return false;
      if (m.y >= m.ty) {
        const city = state.cities.find(c => Math.abs(c.x - m.x) < 20 && c.alive);
        if (city) city.alive = false;
        state.explosions.push({ x: m.x, y: m.y, r: 0, max: 30 });
        return false;
      }
      return true;
    });
    if (state.cities.every(c => !c.alive)) state.over = true;
    if (state.score > state.wave * 200) state.wave++;
    draw();
  }
  function draw() {
    ctx.fillStyle = '#050a0f'; ctx.fillRect(0,0,W,H);
    ctx.fillStyle = '#1a2535'; ctx.fillRect(0, H-20, W, 20);
    state.cities.forEach(c => {
      if (!c.alive) return;
      ctx.fillStyle = '#00d4ff';
      ctx.fillRect(c.x - 18, H-30, 36, 10);
      ctx.fillRect(c.x - 12, H-40, 8, 10);
      ctx.fillRect(c.x + 4, H-38, 8, 8);
    });
    // Battery
    ctx.fillStyle = '#10b981';
    ctx.fillRect(W/2 - 12, H-30, 24, 10);
    ctx.fillRect(W/2 - 3, H-40, 6, 10);
    // Incoming
    state.incoming.forEach(m => {
      ctx.strokeStyle = '#ef4444'; ctx.lineWidth = 1;
      ctx.beginPath(); ctx.moveTo(m.tx, 0); ctx.lineTo(m.x, m.y); ctx.stroke();
      ctx.fillStyle = '#ef4444';
      ctx.fillRect(m.x-2, m.y-2, 4, 4);
    });
    // Defenders
    state.defenders.forEach(d => {
      ctx.strokeStyle = '#00d4ff';
      ctx.beginPath(); ctx.moveTo(W/2, H-20); ctx.lineTo(d.x, d.y); ctx.stroke();
    });
    // Explosions
    state.explosions.forEach(e => {
      ctx.fillStyle = 'rgba(251,191,36,' + (1 - e.r/e.max) + ')';
      ctx.beginPath(); ctx.arc(e.x, e.y, e.r, 0, Math.PI*2); ctx.fill();
    });
    drawHud(ctx, `SCORE: ${state.score}  WAVE: ${state.wave}  TAP TO FIRE`);
    if (state.over) drawGameOver(ctx, canvas, 'CITIES LOST', `Score: ${state.score}`);
  }
  loop(update);
  draw();
  return () => {
    canvas.removeEventListener('mousedown', onCanvas);
    canvas.removeEventListener('touchstart', onCanvas);
  };
}

/* ============================================================
   GAME 12: PLATFORMER - JUMP QUEST
   ============================================================ */
function initPlatformer(ctx, canvas) {
  const W = canvas.width, H = canvas.height;
  const state = {
    player: { x: 40, y: 200, vx: 0, vy: 0, onGround: false },
    platforms: [
      { x: 0, y: H-20, w: W, h: 20 },
      { x: 100, y: 280, w: 80, h: 10 },
      { x: 220, y: 230, w: 80, h: 10 },
      { x: 340, y: 180, w: 60, h: 10 },
      { x: 60, y: 150, w: 60, h: 10 },
      { x: 180, y: 110, w: 80, h: 10 },
      { x: 320, y: 80, w: 80, h: 10 }
    ],
    coins: [
      { x: 130, y: 250 }, { x: 250, y: 200 }, { x: 360, y: 150 },
      { x: 80, y: 120 }, { x: 200, y: 80 }, { x: 340, y: 50 }
    ],
    flag: { x: 420, y: 50 },
    collected: 0, over: false, won: false, score: 0
  };
  function update(dt) {
    if (state.over || state.won) return;
    if (input.left) state.player.vx = -140;
    else if (input.right) state.player.vx = 140;
    else state.player.vx = 0;
    if ((input.up || input.action) && state.player.onGround) {
      state.player.vy = -320; state.player.onGround = false;
    }
    state.player.vy += 700 * dt;
    state.player.x += state.player.vx * dt;
    state.player.y += state.player.vy * dt;
    state.player.onGround = false;
    // Platform collision
    state.platforms.forEach(p => {
      if (state.player.x + 10 > p.x && state.player.x - 10 < p.x + p.w &&
          state.player.y + 14 > p.y && state.player.y + 14 < p.y + p.h + 15 && state.player.vy > 0) {
        state.player.y = p.y - 14; state.player.vy = 0; state.player.onGround = true;
      }
    });
    if (state.player.x < 10) state.player.x = 10;
    if (state.player.x > W-10) state.player.x = W-10;
    if (state.player.y > H) { state.over = true; }
    // Coin collection
    state.coins = state.coins.filter(c => {
      if (Math.hypot(c.x - state.player.x, c.y - state.player.y) < 15) {
        state.collected++; state.score += 50; return false;
      }
      return true;
    });
    // Flag
    if (Math.hypot(state.flag.x - state.player.x, state.flag.y - state.player.y) < 20) state.won = true;
    draw();
  }
  function draw() {
    ctx.fillStyle = '#050a0f'; ctx.fillRect(0,0,W,H);
    // stars
    ctx.fillStyle = '#1a2535';
    for (let i = 0; i < 20; i++) ctx.fillRect((i*31)%W, (i*17)%H, 2, 2);
    // Platforms
    ctx.fillStyle = '#1a2535';
    state.platforms.forEach(p => { ctx.fillRect(p.x, p.y, p.w, p.h); });
    ctx.strokeStyle = '#00d4ff';
    state.platforms.forEach(p => { ctx.strokeRect(p.x, p.y, p.w, p.h); });
    // Coins
    ctx.fillStyle = '#fbbf24';
    state.coins.forEach(c => { ctx.beginPath(); ctx.arc(c.x, c.y, 5, 0, Math.PI*2); ctx.fill(); });
    // Flag
    ctx.fillStyle = '#10b981';
    ctx.fillRect(state.flag.x, state.flag.y, 3, 30);
    ctx.fillRect(state.flag.x+3, state.flag.y, 14, 8);
    // Player
    ctx.fillStyle = '#ff6600';
    ctx.fillRect(state.player.x-10, state.player.y-14, 20, 28);
    ctx.fillStyle = '#fbbf24';
    ctx.fillRect(state.player.x-6, state.player.y-12, 3, 3);
    ctx.fillRect(state.player.x+3, state.player.y-12, 3, 3);
    drawHud(ctx, `COINS: ${state.collected}/6  SCORE: ${state.score}`);
    if (state.over) drawGameOver(ctx, canvas, 'FELL OFF', `Score: ${state.score}`);
    if (state.won) drawGameOver(ctx, canvas, 'FLAG REACHED!', `Score: ${state.score + 200}`);
  }
  loop(update);
  draw();
}

/* ============================================================
   GAME 13: TOWER DEFENSE LITE
   ============================================================ */
function initTowerDefense(ctx, canvas) {
  const W = canvas.width, H = canvas.height;
  const CS = 40;
  // Path waypoints
  const path = [
    {x: 0, y: 80}, {x: 160, y: 80}, {x: 160, y: 200}, {x: 320, y: 200}, {x: 320, y: 120}, {x: W, y: 120}
  ];
  const state = {
    gold: 50, lives: 10, wave: 1, spawned: 0, waveSize: 8,
    towers: [], enemies: [], bullets: [],
    spawn: 1, msg: '', over: false
  };
  function onCanvas(e) {
    if (state.over) return;
    if (state.gold < 20) return;
    const p = canvasPoint(e);
    // Keep off path
    for (let i = 0; i < path.length - 1; i++) {
      const a = path[i], b = path[i+1];
      const dx = b.x - a.x, dy = b.y - a.y;
      const len = Math.hypot(dx, dy);
      const t = Math.max(0, Math.min(1, ((p.x - a.x)*dx + (p.y - a.y)*dy) / (len*len)));
      const px = a.x + dx*t, py = a.y + dy*t;
      if (Math.hypot(p.x - px, p.y - py) < 25) return;
    }
    // Not overlapping tower
    for (const t of state.towers) if (Math.hypot(t.x - p.x, t.y - p.y) < 30) return;
    state.towers.push({ x: p.x, y: p.y, cd: 0, range: 90 });
    state.gold -= 20;
  }
  canvas.addEventListener('mousedown', onCanvas);
  canvas.addEventListener('touchstart', onCanvas, { passive: false });
  function spawnEnemy() {
    state.enemies.push({
      x: path[0].x, y: path[0].y, seg: 0, hp: 3 + Math.floor(state.wave*0.8),
      maxHp: 3 + Math.floor(state.wave*0.8), speed: 40 + state.wave*2
    });
  }
  function update(dt) {
    if (state.over) return;
    state.spawn -= dt;
    if (state.spawn <= 0 && state.spawned < state.waveSize) {
      spawnEnemy(); state.spawned++; state.spawn = 1;
    }
    if (state.spawned >= state.waveSize && state.enemies.length === 0) {
      state.wave++; state.spawned = 0; state.waveSize += 2; state.gold += 25;
    }
    state.enemies.forEach(e => {
      const target = path[e.seg+1];
      if (!target) return;
      const dx = target.x - e.x, dy = target.y - e.y;
      const d = Math.hypot(dx, dy);
      if (d < 2) { e.seg++; }
      else { e.x += dx/d * e.speed * dt; e.y += dy/d * e.speed * dt; }
    });
    state.enemies = state.enemies.filter(e => {
      if (e.seg >= path.length - 1) { state.lives--; return false; }
      if (e.hp <= 0) { state.gold += 5; return false; }
      return true;
    });
    // Towers
    state.towers.forEach(t => {
      t.cd -= dt;
      if (t.cd <= 0) {
        const target = state.enemies.find(e => Math.hypot(e.x - t.x, e.y - t.y) < t.range);
        if (target) {
          state.bullets.push({ x: t.x, y: t.y, tx: target.x, ty: target.y, target });
          t.cd = 0.6;
        }
      }
    });
    state.bullets.forEach(b => {
      if (b.target) {
        const dx = b.target.x - b.x, dy = b.target.y - b.y;
        const d = Math.hypot(dx, dy);
        if (d < 6) { b.target.hp--; b.done = true; }
        else { b.x += dx/d * 300 * dt; b.y += dy/d * 300 * dt; }
      }
    });
    state.bullets = state.bullets.filter(b => !b.done);
    if (state.lives <= 0) state.over = true;
    draw();
  }
  function draw() {
    ctx.fillStyle = '#050a0f'; ctx.fillRect(0,0,W,H);
    ctx.strokeStyle = '#0e1520';
    for (let i = 0; i < W; i += CS) { ctx.beginPath(); ctx.moveTo(i, 0); ctx.lineTo(i, H); ctx.stroke(); }
    for (let i = 0; i < H; i += CS) { ctx.beginPath(); ctx.moveTo(0, i); ctx.lineTo(W, i); ctx.stroke(); }
    // Path
    ctx.strokeStyle = '#1a2535'; ctx.lineWidth = 30;
    ctx.beginPath(); ctx.moveTo(path[0].x, path[0].y);
    path.forEach(p => ctx.lineTo(p.x, p.y));
    ctx.stroke();
    ctx.strokeStyle = '#ff6600'; ctx.lineWidth = 2;
    ctx.beginPath(); ctx.moveTo(path[0].x, path[0].y);
    path.forEach(p => ctx.lineTo(p.x, p.y));
    ctx.stroke();
    // Towers
    state.towers.forEach(t => {
      ctx.fillStyle = '#00d4ff';
      ctx.fillRect(t.x-8, t.y-8, 16, 16);
      ctx.strokeStyle = 'rgba(0,212,255,0.2)';
      ctx.beginPath(); ctx.arc(t.x, t.y, t.range, 0, Math.PI*2); ctx.stroke();
    });
    // Enemies
    state.enemies.forEach(e => {
      ctx.fillStyle = '#ef4444';
      ctx.fillRect(e.x-8, e.y-8, 16, 16);
      ctx.fillStyle = '#1a2535';
      ctx.fillRect(e.x-10, e.y-14, 20, 3);
      ctx.fillStyle = '#10b981';
      ctx.fillRect(e.x-10, e.y-14, 20*(e.hp/e.maxHp), 3);
    });
    // Bullets
    ctx.fillStyle = '#fbbf24';
    state.bullets.forEach(b => { ctx.beginPath(); ctx.arc(b.x, b.y, 3, 0, Math.PI*2); ctx.fill(); });
    drawHud(ctx, `GOLD:${state.gold}  LIVES:${state.lives}  WAVE:${state.wave}  TAP=TOWER(20G)`);
    if (state.over) drawGameOver(ctx, canvas, 'BASE FALLEN', `Wave reached: ${state.wave}`);
  }
  loop(update);
  draw();
  return () => {
    canvas.removeEventListener('mousedown', onCanvas);
    canvas.removeEventListener('touchstart', onCanvas);
  };
}

/* ============================================================
   GAME 14: WHACK-A-GLITCH
   ============================================================ */
function initWhackMole(ctx, canvas) {
  const W = canvas.width, H = canvas.height;
  const COLS = 4, ROWS = 3;
  const holes = [];
  for (let r = 0; r < ROWS; r++)
    for (let c = 0; c < COLS; c++)
      holes.push({ x: 60 + c*110, y: 100 + r*90, active: 0, hit: false });
  const state = { score: 0, time: 30, over: false, msg: '' };
  let spawnT = 1;
  function onCanvas(e) {
    if (state.over) return;
    const p = canvasPoint(e);
    holes.forEach(h => {
      if (h.active > 0 && !h.hit && Math.hypot(p.x - h.x, p.y - h.y) < 30) {
        h.hit = true;
        state.score += 10;
      }
    });
  }
  canvas.addEventListener('mousedown', onCanvas);
  canvas.addEventListener('touchstart', onCanvas, { passive: false });
  function update(dt) {
    if (state.over) return;
    state.time -= dt;
    if (state.time <= 0) { state.over = true; state.msg = 'TIME UP'; }
    spawnT -= dt;
    if (spawnT <= 0) {
      spawnT = 0.6 + Math.random()*0.4;
      const idle = holes.filter(h => h.active <= 0);
      if (idle.length) {
        const pick = idle[Math.floor(Math.random()*idle.length)];
        pick.active = 1 + Math.random()*0.6;
        pick.hit = false;
      }
    }
    holes.forEach(h => { if (h.active > 0) h.active -= dt; });
    draw();
  }
  function draw() {
    ctx.fillStyle = '#050a0f'; ctx.fillRect(0,0,W,H);
    ctx.fillStyle = '#0e3b1f'; ctx.fillRect(0, 60, W, H-60);
    holes.forEach(h => {
      ctx.fillStyle = '#050a0f';
      ctx.beginPath(); ctx.ellipse(h.x, h.y + 20, 34, 12, 0, 0, Math.PI*2); ctx.fill();
      if (h.active > 0 && !h.hit) {
        ctx.fillStyle = '#ff6600';
        ctx.beginPath(); ctx.arc(h.x, h.y, 22, 0, Math.PI*2); ctx.fill();
        ctx.fillStyle = '#050a0f';
        ctx.fillRect(h.x-10, h.y-6, 4, 4); ctx.fillRect(h.x+6, h.y-6, 4, 4);
        ctx.fillRect(h.x-6, h.y+5, 12, 2);
      } else if (h.hit) {
        ctx.fillStyle = '#fbbf24';
        ctx.font = '18px JetBrains Mono';
        ctx.textAlign = 'center';
        ctx.fillText('+10', h.x, h.y);
      }
    });
    drawHud(ctx, `SCORE: ${state.score}  TIME: ${Math.ceil(state.time)}`);
    if (state.over) drawGameOver(ctx, canvas, state.msg, `Final: ${state.score}`);
  }
  loop(update);
  draw();
  return () => {
    canvas.removeEventListener('mousedown', onCanvas);
    canvas.removeEventListener('touchstart', onCanvas);
  };
}

/* ============================================================
   GAME 15: PAPER DOLL DRESS-UP
   ============================================================ */
function initPaperDoll(ctx, canvas) {
  const W = canvas.width, H = canvas.height;
  const items = {
    hats: [
      { name: 'None', color: null },
      { name: 'Cap', color: '#ef4444' },
      { name: 'Top', color: '#fbbf24' },
      { name: 'Beret', color: '#10b981' }
    ],
    shirts: [
      { name: 'Cyan', color: '#00d4ff' },
      { name: 'Orange', color: '#ff6600' },
      { name: 'Green', color: '#10b981' },
      { name: 'Gold', color: '#fbbf24' }
    ],
    pants: [
      { name: 'Navy', color: '#1a2535' },
      { name: 'Red', color: '#ef4444' },
      { name: 'Green', color: '#0e3b1f' }
    ],
    accessories: [
      { name: 'None', type: null },
      { name: 'Glasses', type: 'glasses' },
      { name: 'Bow', type: 'bow' }
    ]
  };
  const state = { hat: 0, shirt: 0, pants: 0, accessory: 0 };
  // Layout: doll on left, buttons on right
  const btns = [];
  let row = 0;
  Object.entries(items).forEach(([cat, arr]) => {
    arr.forEach((item, i) => {
      btns.push({
        cat, idx: i, label: (cat[0].toUpperCase() + ':' + item.name).slice(0, 10),
        x: 260, y: 20 + row * 28, w: 110, h: 24, color: item.color || '#1a2535'
      });
      row++;
    });
    row++;
  });
  function onCanvas(e) {
    const p = canvasPoint(e);
    btns.forEach(b => {
      if (p.x >= b.x && p.x <= b.x + b.w && p.y >= b.y && p.y <= b.y + b.h) {
        state[b.cat === 'hats' ? 'hat' : b.cat === 'shirts' ? 'shirt' : b.cat === 'pants' ? 'pants' : 'accessory'] = b.idx;
        draw();
      }
    });
  }
  canvas.addEventListener('mousedown', onCanvas);
  canvas.addEventListener('touchstart', onCanvas, { passive: false });
  function draw() {
    ctx.fillStyle = '#050a0f'; ctx.fillRect(0,0,W,H);
    // Panel
    ctx.fillStyle = '#0e1520'; ctx.fillRect(240, 10, 220, H-20);
    ctx.strokeStyle = '#1a2535'; ctx.strokeRect(240, 10, 220, H-20);
    // Doll body
    const cx = 130;
    // Head
    ctx.fillStyle = '#fbbf24';
    ctx.beginPath(); ctx.arc(cx, 100, 30, 0, Math.PI*2); ctx.fill();
    ctx.strokeStyle = '#0e1520'; ctx.stroke();
    // Eyes
    ctx.fillStyle = '#050a0f';
    ctx.fillRect(cx-10, 95, 4, 4); ctx.fillRect(cx+6, 95, 4, 4);
    // Mouth
    ctx.fillRect(cx-6, 110, 12, 2);
    // Hat
    const hat = items.hats[state.hat];
    if (hat.color) {
      ctx.fillStyle = hat.color;
      if (hat.name === 'Top') {
        ctx.fillRect(cx-18, 50, 36, 22);
        ctx.fillRect(cx-24, 72, 48, 4);
      } else if (hat.name === 'Cap') {
        ctx.beginPath(); ctx.arc(cx, 72, 20, Math.PI, 0); ctx.fill();
        ctx.fillRect(cx-22, 72, 30, 4);
      } else if (hat.name === 'Beret') {
        ctx.beginPath(); ctx.ellipse(cx, 68, 24, 10, 0, 0, Math.PI*2); ctx.fill();
      }
    }
    // Accessory
    const acc = items.accessories[state.accessory];
    if (acc.type === 'glasses') {
      ctx.strokeStyle = '#050a0f'; ctx.lineWidth = 2;
      ctx.strokeRect(cx-14, 93, 10, 8);
      ctx.strokeRect(cx+4, 93, 10, 8);
      ctx.beginPath(); ctx.moveTo(cx-4, 97); ctx.lineTo(cx+4, 97); ctx.stroke();
    } else if (acc.type === 'bow') {
      ctx.fillStyle = '#ef4444';
      ctx.beginPath(); ctx.moveTo(cx-20, 85); ctx.lineTo(cx-8, 80); ctx.lineTo(cx-8, 92); ctx.closePath(); ctx.fill();
      ctx.beginPath(); ctx.moveTo(cx+20, 85); ctx.lineTo(cx+8, 80); ctx.lineTo(cx+8, 92); ctx.closePath(); ctx.fill();
    }
    // Shirt (torso)
    ctx.fillStyle = items.shirts[state.shirt].color;
    ctx.fillRect(cx-30, 130, 60, 60);
    // Arms
    ctx.fillRect(cx-42, 135, 12, 50);
    ctx.fillRect(cx+30, 135, 12, 50);
    // Pants
    ctx.fillStyle = items.pants[state.pants].color;
    ctx.fillRect(cx-28, 190, 26, 60);
    ctx.fillRect(cx+2, 190, 26, 60);
    // Shoes
    ctx.fillStyle = '#050a0f';
    ctx.fillRect(cx-32, 250, 30, 8);
    ctx.fillRect(cx+2, 250, 30, 8);
    // Buttons panel
    btns.forEach(b => {
      const sel =
        (b.cat === 'hats' && b.idx === state.hat) ||
        (b.cat === 'shirts' && b.idx === state.shirt) ||
        (b.cat === 'pants' && b.idx === state.pants) ||
        (b.cat === 'accessories' && b.idx === state.accessory);
      ctx.fillStyle = sel ? '#00d4ff' : '#0e1520';
      ctx.fillRect(b.x, b.y, b.w, b.h);
      ctx.strokeStyle = b.color || '#1a2535';
      ctx.strokeRect(b.x, b.y, b.w, b.h);
      ctx.fillStyle = sel ? '#050a0f' : '#e2e8f0';
      ctx.font = '10px JetBrains Mono';
      ctx.textAlign = 'left';
      ctx.fillText(b.label, b.x + 6, b.y + 16);
    });
    ctx.fillStyle = '#00d4ff';
    ctx.font = '11px JetBrains Mono';
    ctx.textAlign = 'left';
    ctx.fillText('DRESS-UP', 20, 22);
  }
  draw();
  return () => {
    canvas.removeEventListener('mousedown', onCanvas);
    canvas.removeEventListener('touchstart', onCanvas);
  };
}

/* ============================================================
   GAME 16: MEMORY GRID
   ============================================================ */
function initMemory(ctx, canvas) {
  const W = canvas.width, H = canvas.height;
  const COLS = 4, ROWS = 4;
  const symbols = ['A','B','C','D','E','F','G','H'];
  const colors = ['#00d4ff','#ff6600','#10b981','#fbbf24','#ef4444','#e2e8f0','#8b5cf6','#ec4899'];
  const deck = [];
  symbols.forEach((s, i) => { deck.push({ s, c: colors[i] }); deck.push({ s, c: colors[i] }); });
  // Shuffle
  for (let i = deck.length-1; i > 0; i--) {
    const j = Math.floor(Math.random()*(i+1));
    [deck[i], deck[j]] = [deck[j], deck[i]];
  }
  const CW = 80, CH = 70, OX = (W - COLS*CW)/2, OY = 30;
  const cards = deck.map((d, i) => ({
    x: OX + (i%COLS)*CW + 4,
    y: OY + Math.floor(i/COLS)*CH + 4,
    w: CW-8, h: CH-8,
    s: d.s, c: d.c, flipped: false, matched: false
  }));
  const state = { first: null, second: null, lockT: 0, moves: 0, won: false };
  function onCanvas(e) {
    if (state.lockT > 0 || state.won) return;
    const p = canvasPoint(e);
    const card = cards.find(c => p.x >= c.x && p.x <= c.x+c.w && p.y >= c.y && p.y <= c.y+c.h && !c.flipped && !c.matched);
    if (!card) return;
    card.flipped = true;
    if (!state.first) state.first = card;
    else if (!state.second) {
      state.second = card;
      state.moves++;
      if (state.first.s === state.second.s) {
        state.first.matched = true; state.second.matched = true;
        state.first = null; state.second = null;
        if (cards.every(c => c.matched)) state.won = true;
      } else {
        state.lockT = 0.8;
      }
    }
    draw();
  }
  canvas.addEventListener('mousedown', onCanvas);
  canvas.addEventListener('touchstart', onCanvas, { passive: false });
  function update(dt) {
    if (state.lockT > 0) {
      state.lockT -= dt;
      if (state.lockT <= 0) {
        state.first.flipped = false;
        state.second.flipped = false;
        state.first = null; state.second = null;
        draw();
      }
    }
  }
  function draw() {
    ctx.fillStyle = '#050a0f'; ctx.fillRect(0,0,W,H);
    cards.forEach(c => {
      if (c.matched) {
        ctx.fillStyle = '#0e3b1f';
        ctx.fillRect(c.x, c.y, c.w, c.h);
      } else if (c.flipped) {
        ctx.fillStyle = c.c;
        ctx.fillRect(c.x, c.y, c.w, c.h);
        ctx.fillStyle = '#050a0f';
        ctx.font = 'bold 28px JetBrains Mono';
        ctx.textAlign = 'center';
        ctx.fillText(c.s, c.x + c.w/2, c.y + c.h/2 + 10);
      } else {
        ctx.fillStyle = '#0e1520';
        ctx.fillRect(c.x, c.y, c.w, c.h);
        ctx.strokeStyle = '#1a2535';
        ctx.strokeRect(c.x, c.y, c.w, c.h);
        ctx.fillStyle = '#00d4ff';
        ctx.font = '18px JetBrains Mono';
        ctx.textAlign = 'center';
        ctx.fillText('?', c.x + c.w/2, c.y + c.h/2 + 6);
      }
    });
    drawHud(ctx, `MOVES: ${state.moves}`);
    if (state.won) drawGameOver(ctx, canvas, 'MATCHED!', `Moves: ${state.moves}`);
  }
  loop(update);
  draw();
  return () => {
    canvas.removeEventListener('mousedown', onCanvas);
    canvas.removeEventListener('touchstart', onCanvas);
  };
}
