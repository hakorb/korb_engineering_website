<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="description" content="World Cup 2026 | Korb Engineering — daily companion for the 2026 FIFA World Cup (USA/Canada/Mexico): full schedule, 48-team group stage, live standings, bracket, team profiles, FIFA rankings, venue guide, odds, predictions, and personal watch log.">
<title>World Cup 2026 | Korb Engineering</title>

<style>
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box}
:root{
  --bg:#050a0f;--surface:#0a1018;--surface2:#0e1520;--border:#1a2535;
  --cyan:#00d4ff;--orange:#ff9900;--green:#10b981;--red:#ef4444;--amber:#fbbf24;--purple:#a78bfa;--pink:#f472b6;
  --text:#e2e8f0;--dim:#8892a4;--bright:#f8fafc;
  --pitch:#0f3b20;--pitch2:#134a28;
}
html,body{height:100%;background:var(--bg);color:var(--text);font-family:'JetBrains Mono',monospace;font-size:13px;overflow:hidden}
button,input,select,textarea{font-family:inherit;font-size:16px;color:inherit}
button{cursor:pointer;border:1px solid var(--border);background:var(--surface2);color:var(--text);padding:7px 12px;border-radius:6px;min-height:36px;transition:all .15s}
button:hover{border-color:var(--cyan);color:var(--cyan)}
button.primary{background:rgba(0,212,255,.14);border-color:var(--cyan);color:var(--cyan)}
button.green{background:rgba(16,185,129,.14);border-color:var(--green);color:var(--green)}
button.amber{background:rgba(251,191,36,.14);border-color:var(--amber);color:var(--amber)}
button.sm{min-height:28px;padding:4px 9px;font-size:11px}
input,select,textarea{background:var(--surface);border:1px solid var(--border);padding:9px 11px;border-radius:6px;min-height:38px;width:100%;color:var(--text)}
input:focus,select:focus,textarea:focus{outline:none;border-color:var(--cyan)}
textarea{min-height:100px;resize:vertical;font-family:inherit;line-height:1.6}
label{display:block;font-size:10px;color:var(--dim);text-transform:uppercase;letter-spacing:.1em;margin-bottom:4px;font-weight:700}

#app{display:grid;grid-template-rows:auto auto 1fr;height:100vh;width:100vw}
header{background:linear-gradient(90deg,var(--surface),var(--pitch));border-bottom:1px solid var(--border);padding:10px 14px;display:flex;align-items:center;gap:12px;flex-wrap:wrap}
#back-btn{background:var(--surface2);border:1px solid var(--border);color:var(--text);padding:6px 12px;min-height:36px;font-size:11px;text-decoration:none;border-radius:6px}
#back-btn:hover{border-color:var(--cyan);color:var(--cyan)}
header h1{font-family:'Merriweather',serif;font-size:17px;color:var(--cyan);font-weight:700;flex:1;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
header h1 .trophy{font-size:18px;margin-right:4px}
#countdown{background:var(--surface2);border:1px solid var(--amber);color:var(--amber);padding:6px 12px;border-radius:6px;font-size:11px;font-weight:700;letter-spacing:.08em}

nav.tabs{background:var(--surface);border-bottom:1px solid var(--border);padding:6px 10px;display:flex;gap:3px;overflow-x:auto;scrollbar-width:thin}
nav.tabs::-webkit-scrollbar{height:5px}
nav.tabs::-webkit-scrollbar-thumb{background:var(--border);border-radius:3px}
nav.tabs button{font-size:11px;padding:7px 11px;min-height:32px;white-space:nowrap;background:transparent;border:1px solid transparent;color:var(--dim)}
nav.tabs button:hover{color:var(--text);background:var(--surface2)}
nav.tabs button.active{background:rgba(0,212,255,.12);border-color:var(--cyan);color:var(--cyan)}

main{overflow-y:auto;padding:18px;background:
  radial-gradient(ellipse at top,rgba(16,185,129,.04),transparent 60%),
  var(--bg)}
.tab-pane{max-width:1200px;margin:0 auto;display:none}
.tab-pane.active{display:block}
.tab-pane h2{font-family:'Merriweather',serif;color:var(--cyan);font-size:22px;margin-bottom:4px}
.tab-pane .subtitle{color:var(--dim);font-size:12px;margin-bottom:18px;line-height:1.6}

.grid{display:grid;gap:12px}
.grid-2{grid-template-columns:repeat(auto-fit,minmax(280px,1fr))}
.grid-3{grid-template-columns:repeat(auto-fit,minmax(220px,1fr))}
.grid-4{grid-template-columns:repeat(auto-fit,minmax(170px,1fr))}
.card{background:var(--surface);border:1px solid var(--border);border-radius:8px;padding:14px}
.card h3{color:var(--cyan);font-size:12px;text-transform:uppercase;letter-spacing:.1em;margin-bottom:8px;font-weight:700}
.card h3 .sub{color:var(--dim);font-weight:400;text-transform:none;letter-spacing:0;margin-left:6px;font-size:10px}

.flag{font-size:20px;vertical-align:-2px;margin-right:4px}
.flag-sm{font-size:15px;vertical-align:-1px;margin-right:3px}
.pill{display:inline-block;padding:2px 8px;border-radius:999px;font-size:10px;background:var(--surface2);border:1px solid var(--border);color:var(--dim)}
.pill.cyan{color:var(--cyan);border-color:var(--cyan)}
.pill.green{color:var(--green);border-color:var(--green)}
.pill.amber{color:var(--amber);border-color:var(--amber)}
.pill.red{color:var(--red);border-color:var(--red)}
.pill.purple{color:var(--purple);border-color:var(--purple)}
.pill.pink{color:var(--pink);border-color:var(--pink)}

/* Home */
.hero{background:linear-gradient(135deg,rgba(16,185,129,.14),rgba(251,191,36,.08));border:1px solid var(--green);border-radius:12px;padding:20px;margin-bottom:18px}
.hero h1{font-family:'Merriweather',serif;font-size:26px;color:var(--bright);margin-bottom:4px}
.hero p{color:var(--dim);font-size:12px;line-height:1.6}
.hero .stats{display:grid;grid-template-columns:repeat(auto-fit,minmax(110px,1fr));gap:8px;margin-top:14px}
.hero .stat{background:rgba(5,10,15,.6);border:1px solid var(--border);border-radius:6px;padding:10px;text-align:center}
.hero .stat .v{font-size:22px;color:var(--cyan);font-weight:700}
.hero .stat .l{font-size:9px;color:var(--dim);text-transform:uppercase;letter-spacing:.1em;margin-top:2px}

/* Group table */
table{width:100%;border-collapse:collapse;font-size:12px}
table th,table td{border:1px solid var(--border);padding:6px 8px;text-align:left}
table th{background:var(--surface2);color:var(--cyan);font-size:10px;text-transform:uppercase;letter-spacing:.08em;font-weight:700}
table td.num{text-align:center;font-variant-numeric:tabular-nums}
table tr.qualified{background:rgba(16,185,129,.06)}
table tr.thirdplace{background:rgba(251,191,36,.05)}
table tr.eliminated{opacity:.6}

/* Matches */
.match{background:var(--surface);border:1px solid var(--border);border-radius:8px;padding:10px 12px;margin-bottom:8px;display:flex;align-items:center;gap:10px;flex-wrap:wrap}
.match:hover{border-color:var(--cyan)}
.match .m-date{color:var(--dim);font-size:10px;min-width:80px;text-transform:uppercase;letter-spacing:.05em}
.match .m-teams{flex:1;display:flex;align-items:center;gap:6px;flex-wrap:wrap}
.match .m-team{display:flex;align-items:center;gap:4px;font-size:13px;font-weight:500}
.match .m-score{font-family:'JetBrains Mono',monospace;font-weight:700;color:var(--amber);font-size:15px;min-width:50px;text-align:center;background:var(--surface2);padding:4px 8px;border-radius:4px;border:1px solid var(--border)}
.match .m-score.played{color:var(--green);border-color:var(--green)}
.match .m-venue{color:var(--dim);font-size:10px}
.match .m-tag{background:var(--surface2);padding:2px 8px;border-radius:10px;font-size:9px;color:var(--dim);border:1px solid var(--border)}

/* Bracket */
.bracket{display:grid;grid-template-columns:repeat(6,minmax(140px,1fr));gap:8px;overflow-x:auto;padding-bottom:8px}
.br-col{display:flex;flex-direction:column;gap:8px;justify-content:space-around;min-height:100%}
.br-col h4{font-size:10px;color:var(--cyan);text-align:center;text-transform:uppercase;letter-spacing:.08em;margin-bottom:4px}
.br-match{background:var(--surface);border:1px solid var(--border);border-radius:6px;padding:6px 8px;font-size:11px}
.br-match .t{display:flex;justify-content:space-between;padding:2px 0}
.br-match .t.win{color:var(--green);font-weight:700}
.br-match .t .s{font-family:'JetBrains Mono',monospace;color:var(--amber)}

/* Team card */
.team-card{background:var(--surface);border:1px solid var(--border);border-radius:8px;padding:14px;cursor:pointer;transition:all .15s}
.team-card:hover{border-color:var(--cyan);transform:translateY(-1px)}
.team-card .tc-head{display:flex;align-items:center;gap:10px;margin-bottom:8px}
.team-card .tc-flag{font-size:32px}
.team-card .tc-name{font-size:14px;font-weight:700;color:var(--bright)}
.team-card .tc-sub{font-size:10px;color:var(--dim)}
.team-card .tc-body{font-size:11px;color:var(--dim);line-height:1.5}

/* Modal */
.modal-backdrop{position:fixed;inset:0;background:rgba(0,0,0,.75);display:none;align-items:center;justify-content:center;z-index:100;padding:14px}
.modal-backdrop.open{display:flex}
.modal{background:var(--surface);border:1px solid var(--cyan);border-radius:12px;max-width:620px;width:100%;max-height:90vh;overflow-y:auto;padding:22px}
.modal h3{font-family:'Merriweather',serif;font-size:22px;color:var(--bright);margin-bottom:6px;display:flex;align-items:center;gap:10px}
.modal .close{float:right;background:transparent;border:none;color:var(--dim);font-size:22px;cursor:pointer}
.modal .close:hover{color:var(--red)}
.modal .section{margin-top:14px;padding-top:14px;border-top:1px solid var(--border)}
.modal .section h5{color:var(--amber);font-size:10px;text-transform:uppercase;letter-spacing:.1em;margin-bottom:6px}
.modal .section p{font-size:12px;line-height:1.7;color:var(--text)}

/* Picks */
.pick-row{background:var(--surface);border:1px solid var(--border);border-radius:6px;padding:8px 12px;margin-bottom:6px;display:flex;align-items:center;gap:10px}
.pick-row label{margin:0;flex:1}
.pick-row select{min-height:32px;font-size:12px;flex:0 0 auto;width:auto;min-width:160px}

/* Odds */
.odd-row{display:grid;grid-template-columns:36px 1fr auto auto;gap:10px;align-items:center;padding:8px 10px;background:var(--surface);border:1px solid var(--border);border-radius:6px;margin-bottom:4px;font-size:12px}
.odd-row .rank{color:var(--dim);font-weight:700;text-align:center}
.odd-row .odds{color:var(--amber);font-weight:700;font-variant-numeric:tabular-nums}
.odd-row .implied{color:var(--dim);font-size:10px;font-variant-numeric:tabular-nums;min-width:50px;text-align:right}

/* Mobile */
@media (max-width:600px){
  main{padding:12px}
  .bracket{grid-template-columns:repeat(6,180px)}
  .hero h1{font-size:20px}
  .hero .stat .v{font-size:18px}
  .match{font-size:11px}
  .match .m-date{min-width:70px}
  header h1{font-size:14px}
}
</style>
</head>

// ========= SCHEDULE GENERATION =========
// Group stage: June 11 - June 27. Knockouts start June 28. Final July 19.
// For each group, 6 matches across 3 rounds: (1v2, 3v4), (1v3, 2v4), (1v4, 2v3 same day).
const KICKOFF = new Date('2026-06-11T16:00:00-06:00'); // Mexico City opener
const FINAL_DATE = new Date('2026-07-19T15:00:00-04:00');

function buildGroupSchedule(){
  // Distribute 72 group matches across June 11–27 (17 days)
  // Each day has ~4 matches. Assign venues round-robin.
  const matches = [];
  const letters = Object.keys(GROUPS_DEFAULT);
  const start = new Date('2026-06-11T12:00:00-06:00');
  let dayOffset = 0, venueIdx = 0, slot = 0;
  const times = [12, 15, 18, 21]; // kickoff hours local
  const allPairs = [];
  letters.forEach((L, li)=>{
    const g = GROUPS_DEFAULT[L];
    // round 1 (day offsets 0-3 staggered by group index)
    allPairs.push({L, round:1, d: li<6 ? 0 : 1, a:g[0], b:g[1]});
    allPairs.push({L, round:1, d: li<6 ? 1 : 2, a:g[2], b:g[3]});
    allPairs.push({L, round:2, d: 6+(li%6), a:g[0], b:g[2]});
    allPairs.push({L, round:2, d: 7+(li%6), a:g[1], b:g[3]});
    allPairs.push({L, round:3, d: 13+Math.floor(li/4), a:g[0], b:g[3]});
    allPairs.push({L, round:3, d: 13+Math.floor(li/4), a:g[1], b:g[2]});
  });
  // Sort by day + group
  allPairs.sort((x,y)=>x.d-y.d || x.L.localeCompare(y.L));
  let perDay = {}, perDayCount = {};
  allPairs.forEach((p,i)=>{
    const dc = perDayCount[p.d] || 0;
    perDayCount[p.d] = dc+1;
    const date = new Date(start.getTime() + p.d*86400000);
    date.setHours(times[dc % 4]);
    const v = VENUES[venueIdx % VENUES.length]; venueIdx++;
    matches.push({
      id:'G'+p.L+'-'+p.round+'-'+(i%2?'B':'A')+'-'+i,
      round:'Group '+p.L,
      stage:'group',
      groupLetter:p.L,
      date:date.toISOString(),
      venue:v.city,
      home:p.a, away:p.b
    });
  });
  return matches;
}

function buildKnockoutSchedule(){
  // R32 (16 matches) June 28 - July 3
  // R16 (8 matches)  July 4 - 7
  // QF  (4 matches)  July 9-11
  // SF  (2 matches)  July 14-15
  // 3P  (1 match)    July 18
  // F   (1 match)    July 19
  const kos = [];
  const r32Start = new Date('2026-06-28T15:00:00-04:00');
  for (let i=0;i<16;i++){
    const d = new Date(r32Start.getTime() + Math.floor(i/3)*86400000);
    d.setHours(12 + (i%3)*4);
    kos.push({ id:'R32-'+(i+1), round:'Round of 32', stage:'r32', date:d.toISOString(), venue:VENUES[i%VENUES.length].city, home:null, away:null, slot:i+1 });
  }
  const r16Start = new Date('2026-07-04T15:00:00-04:00');
  for (let i=0;i<8;i++){
    const d = new Date(r16Start.getTime() + Math.floor(i/2)*86400000);
    d.setHours(14 + (i%2)*4);
    kos.push({ id:'R16-'+(i+1), round:'Round of 16', stage:'r16', date:d.toISOString(), venue:VENUES[i%VENUES.length].city, home:null, away:null, slot:i+1 });
  }
  const qfStart = new Date('2026-07-09T15:00:00-04:00');
  for (let i=0;i<4;i++){
    const d = new Date(qfStart.getTime() + Math.floor(i/2)*86400000);
    d.setHours(15 + (i%2)*4);
    kos.push({ id:'QF-'+(i+1), round:'Quarterfinal', stage:'qf', date:d.toISOString(), venue:VENUES[i*3%VENUES.length].city, home:null, away:null, slot:i+1 });
  }
  kos.push({ id:'SF-1', round:'Semifinal 1', stage:'sf', date:'2026-07-14T15:00:00-04:00', venue:'Dallas/Arlington, TX', home:null, away:null, slot:1 });
  kos.push({ id:'SF-2', round:'Semifinal 2', stage:'sf', date:'2026-07-15T15:00:00-04:00', venue:'Atlanta, GA', home:null, away:null, slot:2 });
  kos.push({ id:'3P',   round:'Third Place Playoff', stage:'3p', date:'2026-07-18T15:00:00-04:00', venue:'Miami, FL', home:null, away:null, slot:1 });
  kos.push({ id:'F',    round:'FINAL', stage:'final', date:'2026-07-19T15:00:00-04:00', venue:'New York/NJ', home:null, away:null, slot:1 });
  return kos;
}

// ========= STANDINGS =========
function calcStandings(letter){
  const teamCodes = state.groups[letter];
  const rows = teamCodes.map(code => ({ code, p:0, w:0, d:0, l:0, gf:0, ga:0, gd:0, pts:0 }));
  const byCode = Object.fromEntries(rows.map(r=>[r.code,r]));
  SCHEDULE_GROUP.filter(m=>m.groupLetter===letter).forEach(m=>{
    const res = state.results[m.id];
    if (!res) return;
    const h = byCode[m.home], a = byCode[m.away];
    if (!h || !a) return;
    h.p++; a.p++;
    h.gf += res.hs; h.ga += res.as;
    a.gf += res.as; a.ga += res.hs;
    if (res.hs > res.as){ h.w++; a.l++; h.pts += 3; }
    else if (res.hs < res.as){ a.w++; h.l++; a.pts += 3; }
    else { h.d++; a.d++; h.pts++; a.pts++; }
  });
  rows.forEach(r=>r.gd = r.gf-r.ga);
  rows.sort((x,y)=> y.pts-x.pts || y.gd-x.gd || y.gf-x.gf || x.code.localeCompare(y.code));
  return rows;
}

// ========= FORMAT =========
function fmtDate(iso){
  const d = new Date(iso);
  return d.toLocaleDateString('en-US',{weekday:'short',month:'short',day:'numeric'}) + ' · ' +
         d.toLocaleTimeString('en-US',{hour:'numeric',minute:'2-digit'});
}
function fmtDay(iso){
  return new Date(iso).toLocaleDateString('en-US',{weekday:'long',month:'long',day:'numeric'});
}
function teamTag(code, size){
  const t = T[code];
  if (!t) return '<span class="pill">TBD</span>';
  const cls = size==='sm'?'flag-sm':'flag';
  return `<span class="${cls}">${t.f}</span>${t.n}`;
}
function esc(s){return String(s||'').replace(/[&<>"]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'})[c])}

// ========= COUNTDOWN =========
function updateCountdown(){
  const el = document.getElementById('countdown');
  const now = Date.now();
  const diff = KICKOFF.getTime() - now;
  if (diff > 0){
    const d = Math.floor(diff/86400000);
    const h = Math.floor((diff%86400000)/3600000);
    el.textContent = d>0 ? `${d}D ${h}H TO KICKOFF` : `${h}H TO KICKOFF`;
  } else if (now < FINAL_DATE.getTime()){
    el.textContent = '⚽ TOURNAMENT LIVE';
    el.style.borderColor = 'var(--green)'; el.style.color='var(--green)';
  } else {
    el.textContent = 'TOURNAMENT OVER';
  }
}

  el.querySelector('#champ-pick').addEventListener('change', e=>{
    state.champion = e.target.value;
    persist();
  });
  // stats
  const groupPicks = Object.keys(state.picks).filter(id=>id.startsWith('G')).length;
  const koPicks = Object.keys(state.picks).filter(id=>!id.startsWith('G')).length;
  let correct=0, graded=0;
  Object.entries(state.picks).forEach(([id,p])=>{
    const res = state.results[id];
    if (res){
      graded++;
      const pickOutcome = p.winner;
      const match = ALL_MATCHES.find(m=>m.id===id);
      if (!match) return;
      const actual = res.hs>res.as?match.home:(res.as>res.hs?match.away:'draw');
      if (pickOutcome===actual) correct++;
    }
  });
  el.querySelector('#pickstat-group').textContent = `${groupPicks} / 72`;
  el.querySelector('#pickstat-ko').textContent = `${koPicks} / 32`;
  el.querySelector('#pickstat-acc').textContent = graded ? `${correct}/${graded} (${Math.round(correct/graded*100)}%)` : '—';
  // show existing picks
  const pl = el.querySelector('#picks-list');
  const ids = Object.keys(state.picks);
  if (ids.length === 0){
    pl.innerHTML = '<p class="subtitle">No picks saved yet.</p>';
  } else {
    pl.innerHTML = ids.map(id=>{
      const m = ALL_MATCHES.find(x=>x.id===id);
      if (!m) return '';
      const p = state.picks[id];
      const winnerName = p.winner==='draw'?'DRAW':T[p.winner]?.n;
      return `<div class="match" data-match="${id}" style="cursor:pointer"><div class="m-date">${fmtDate(m.date)}</div><div class="m-teams">${teamTag(m.home,'sm')} <span style="color:var(--dim)">vs</span> ${teamTag(m.away,'sm')}</div><div class="m-tag" style="color:var(--pink);border-color:var(--pink)">→ ${esc(winnerName||'')}</div></div>`;
    }).join('');
    pl.querySelectorAll('[data-match]').forEach(d=>d.addEventListener('click', ()=>openMatchModal(d.dataset.match)));
  }
}

function openMatchModal(id){
  const m = ALL_MATCHES.find(x=>x.id===id);

  const res = state.results[id] || {hs:'',as:''};
  const pick = state.picks[id] || {winner:''};
  const watched = !!state.watched[id];
  const homeOpt = m.home ? `<option value="${m.home}" ${pick.winner===m.home?'selected':''}>${T[m.home].n} win</option>` : '';
  const awayOpt = m.away ? `<option value="${m.away}" ${pick.winner===m.away?'selected':''}>${T[m.away].n} win</option>` : '';
  const drawOpt = `<option value="draw" ${pick.winner==='draw'?'selected':''}>Draw</option>`;
  const body = document.getElementById('modal-body');
  body.innerHTML = `
    <h3>${m.round}</h3>
    <p style="color:var(--dim);font-size:12px">${fmtDate(m.date)} · ${esc(m.venue)}</p>
    <div class="section">
      <div style="display:flex;justify-content:space-between;align-items:center;gap:12px;font-size:18px;font-weight:700">
        <div>${m.home?T[m.home].f:''} ${m.home?T[m.home].n:'TBD'}</div>
        <div style="color:var(--dim);font-size:12px">vs</div>
        <div>${m.away?T[m.away].n:'TBD'} ${m.away?T[m.away].f:''}</div>
      </div>
    </div>
    ${m.home && m.away ? `
    <div class="section">
      <h5>Log final score</h5>
      <div style="display:flex;gap:10px;align-items:center">
        <input type="number" id="hs" value="${res.hs}" min="0" max="20" style="flex:1;text-align:center;font-size:22px;font-weight:700">
        <div style="color:var(--dim)">–</div>
        <input type="number" id="as" value="${res.as}" min="0" max="20" style="flex:1;text-align:center;font-size:22px;font-weight:700">
      </div>
      <div style="display:flex;gap:8px;margin-top:10px">
        <button class="green" id="save-score" style="flex:1">💾 Save Score</button>
        <button id="clear-score">Clear</button>
      </div>
    </div>
    <div class="section">
      <h5>Your pick</h5>
      <select id="pick-sel"><option value="">— no pick —</option>${homeOpt}${drawOpt}${awayOpt}</select>
      <button style="margin-top:8px;width:100%" id="save-pick">Save pick</button>
    </div>
    <div class="section">
      <h5>Watch log</h5>
      <label style="display:flex;gap:8px;align-items:center;cursor:pointer;font-size:13px"><input type="checkbox" id="watched-chk" ${watched?'checked':''} style="width:18px;height:18px;min-height:auto"> I watched this match</label>
    </div>
    ` : '<p style="color:var(--dim);font-size:12px;margin-top:10px">Teams TBD — complete earlier rounds first.</p>'}
  `;
  if (m.home && m.away){
    body.querySelector('#save-score').addEventListener('click', ()=>{
      const hs = parseInt(body.querySelector('#hs').value||0);
      const as = parseInt(body.querySelector('#as').value||0);
      state.results[id] = {hs, as};
      advanceKnockouts();
      persist();
      closeModal();
      showTab(state.currentTab);
    });
    body.querySelector('#clear-score').addEventListener('click', ()=>{
      delete state.results[id];
      persist();
      closeModal();
      showTab(state.currentTab);
    });
    body.querySelector('#save-pick').addEventListener('click', ()=>{
      const v = body.querySelector('#pick-sel').value;
      if (v) state.picks[id] = {winner:v}; else delete state.picks[id];
      persist();
      closeModal();
      showTab(state.currentTab);
    });
    body.querySelector('#watched-chk').addEventListener('change', e=>{
      if (e.target.checked) state.watched[id] = true;
      else delete state.watched[id];
      persist();
    });
  }
  document.getElementById('modal-backdrop').classList.add('open');
}

      <span class="pill green">Group ${grpL||'?'}</span>
      <span class="pill amber">${t.odds}/1</span>
      ${t.titles?`<span class="pill purple">${t.titles}× champion</span>`:''}
    </div>
    <div class="section"><h5>Nickname</h5><p>${esc(t.nn)}</p></div>
    <div class="section"><h5>Head coach</h5><p>${esc(t.coach)}</p></div>
    <div class="section"><h5>Star player</h5><p>⭐ ${esc(t.star)}</p></div>
    <div class="section"><h5>Style & Outlook</h5><p>${esc(t.style)}</p></div>
    <div class="section"><h5>Last World Cup</h5><p>${esc(t.last)}</p></div>
    <div class="section"><h5>Group matches</h5>${grpMatches.map(m=>`<div style="padding:6px 0;border-bottom:1px solid var(--border);font-size:12px">${fmtDate(m.date)} · vs ${T[m.home===code?m.away:m.home].f} ${T[m.home===code?m.away:m.home].n} · ${esc(m.venue)}</div>`).join('')}</div>
  `;
  document.getElementById('modal-backdrop').classList.add('open');
}

function closeModal(){ document.getElementById('modal-backdrop').classList.remove('open'); }
window.closeModal = closeModal;
document.getElementById('modal-backdrop').addEventListener('click', e=>{
  if (e.target.id === 'modal-backdrop') closeModal();
});

// ========= KNOCKOUT ADVANCEMENT =========
// When group stage fully logged, fill R32. When R32 logged, fill R16. Etc.
function advanceKnockouts(){
  // Determine group top-2 for each group if all 6 matches logged
  const letters = Object.keys(state.groups);
  const groupComplete = letters.every(L=>SCHEDULE_GROUP.filter(m=>m.groupLetter===L).every(m=>state.results[m.id]));
  if (!groupComplete) return;
  const firsts = [], seconds = [], thirds = [];
  letters.forEach(L=>{
    const s = calcStandings(L);
    firsts.push({code:s[0].code, L, stats:s[0]});
    seconds.push({code:s[1].code, L, stats:s[1]});
    thirds.push({code:s[2].code, L, stats:s[2]});
  });
  thirds.sort((a,b)=>b.stats.pts-a.stats.pts || b.stats.gd-a.stats.gd || b.stats.gf-a.stats.gf);
  const top8Thirds = thirds.slice(0,8);
  // Simple R32 pairing — 16 matches, 32 teams (12 firsts + 12 seconds + 8 thirds)
  // Pair 1st vs 3rd, 2nd vs 2nd, etc. (simplified, not FIFA-official)
  const pool = [...firsts, ...seconds, ...top8Thirds];
  const r32 = SCHEDULE_KO.filter(m=>m.stage==='r32');
  for (let i=0;i<r32.length;i++){
    if (!r32[i].home) r32[i].home = pool[i*2]?.code;
    if (!r32[i].away) r32[i].away = pool[i*2+1]?.code;
  }
  // Advance R32 winners to R16
  const advance = (fromStage, toStage) => {
    const from = SCHEDULE_KO.filter(m=>m.stage===fromStage);
    const to = SCHEDULE_KO.filter(m=>m.stage===toStage);
    for (let i=0;i<to.length;i++){
      const m1 = from[i*2], m2 = from[i*2+1];
      if (!m1 || !m2) continue;
      const r1 = state.results[m1.id], r2 = state.results[m2.id];
      if (r1 && m1.home && m1.away) to[i].home = r1.hs>r1.as?m1.home:m1.away;
      if (r2 && m2.home && m2.away) to[i].away = r2.hs>r2.as?m2.home:m2.away;
    }
  };
  advance('r32','r16');
  advance('r16','qf');
  advance('qf','sf');
  advance('sf','final');
}

// ========= INIT =========
function init(){
  showTab(state.currentTab || 'home');
  updateCountdown();
  setInterval(updateCountdown, 60000);
  document.getElementById('back-btn').addEventListener('click', e=>{
    e.preventDefault();
    if (window.parent !== window) window.parent.postMessage({type:'navigate',hash:'#'}, '*');
    else window.location.href = '../../index.html';
  });
  advanceKnockouts();
}
init();

})();
</script>
