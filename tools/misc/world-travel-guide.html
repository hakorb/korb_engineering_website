<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<meta name="description" content="World Travel Guide — Rick Steves-inspired country-by-country travel tips, customs, food, phrases, and packing lists. A free tool from Korb Engineering.">
<title>World Travel Guide // Korb Engineering</title>
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#050a0f;--surface:#0a1018;--surface2:#0e1520;--border:#1a2535;
  --cyan:#00d4ff;--orange:#ff9900;--green:#10b981;--red:#ef4444;
  --gold:#fbbf24;--text:#e2e8f0;--dim:#64748b;
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
html,body{height:100%;overflow-x:hidden}
body{
  background:var(--bg);color:var(--text);
  font-family:'JetBrains Mono','Courier New',monospace;
  font-size:14px;line-height:1.6;
  background-image:
    radial-gradient(ellipse at top,rgba(0,212,255,.05),transparent 60%),
    radial-gradient(ellipse at bottom,rgba(255,153,0,.04),transparent 60%);
  min-height:100vh;
}
.app{max-width:960px;margin:0 auto;padding:12px;min-height:100vh;display:flex;flex-direction:column}
header{
  border:1px solid var(--border);background:var(--surface);
  padding:12px 14px;margin-bottom:12px;
  display:flex;align-items:center;justify-content:space-between;gap:10px;flex-wrap:wrap;
}
header h1{font-size:15px;color:var(--cyan);letter-spacing:.5px;text-transform:uppercase;font-weight:700}
header h1 .sep{color:var(--orange)}
.hdr-right{display:flex;gap:6px;align-items:center}
.sub{font-size:10px;color:var(--dim);margin-top:2px}
button,.btn{
  font-family:inherit;cursor:pointer;border:1px solid var(--border);
  background:var(--surface2);color:var(--text);font-size:13px;
  padding:8px 12px;min-height:44px;min-width:44px;
  display:inline-flex;align-items:center;justify-content:center;gap:6px;
  transition:all .15s;
}
button:hover,.btn:hover{border-color:var(--cyan);color:var(--cyan)}
button.active{border-color:var(--cyan);color:var(--cyan);background:rgba(0,212,255,.08)}
.icn-btn{width:44px;height:44px;padding:0;font-size:18px}
input,select{
  font-family:inherit;font-size:16px;background:var(--surface2);
  border:1px solid var(--border);color:var(--text);padding:10px 12px;
  min-height:44px;width:100%;outline:none;
}
input:focus,select:focus{border-color:var(--cyan)}
input::placeholder{color:var(--dim)}
.card{background:var(--surface);border:1px solid var(--border);padding:14px;margin-bottom:10px}
.card h2{
  font-size:12px;color:var(--cyan);text-transform:uppercase;letter-spacing:1px;
  margin-bottom:10px;border-bottom:1px solid var(--border);padding-bottom:6px;
}
.card h3{font-size:13px;color:var(--orange);margin:10px 0 6px;text-transform:uppercase;letter-spacing:.5px}
.screen{display:none;flex-direction:column;gap:10px;flex:1}
.screen.active{display:flex}
.region-tabs{display:flex;flex-wrap:wrap;gap:6px;margin-bottom:10px}
.region-tabs button{font-size:12px;padding:6px 10px;text-transform:uppercase;letter-spacing:.5px}
.country-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(160px,1fr));gap:8px}
.country-card{
  background:var(--surface2);border:1px solid var(--border);padding:12px;
  cursor:pointer;transition:all .15s;display:flex;align-items:center;gap:10px;
  min-height:52px;
}
.country-card:hover{border-color:var(--cyan);color:var(--cyan)}
.country-card .flag{font-size:24px;flex-shrink:0}
.country-card .cname{font-size:12px;font-weight:600;line-height:1.3}
.country-card .star-btn{
  margin-left:auto;font-size:16px;cursor:pointer;color:var(--dim);
  background:none;border:none;min-width:30px;min-height:30px;padding:0;
}
.country-card .star-btn.fav{color:var(--gold)}
.tab-bar{display:flex;flex-wrap:wrap;gap:4px;margin-bottom:10px;border-bottom:1px solid var(--border);padding-bottom:8px}
.tab-bar button{font-size:11px;padding:6px 8px;text-transform:uppercase;letter-spacing:.3px;min-height:38px}
.info-row{display:flex;gap:10px;flex-wrap:wrap;margin-bottom:6px}
.info-chip{
  background:var(--surface2);border:1px solid var(--border);padding:6px 10px;
  font-size:11px;display:flex;gap:6px;align-items:center;
}
.info-chip .label{color:var(--dim)}
.info-chip .val{color:var(--cyan);font-weight:600}
.tip-item{
  background:var(--surface2);border-left:3px solid var(--orange);
  padding:10px 12px;margin-bottom:8px;font-size:13px;line-height:1.5;
}
.tip-item .tip-title{color:var(--orange);font-weight:600;margin-bottom:4px;font-size:12px;text-transform:uppercase}
.food-item{
  background:var(--surface2);border:1px solid var(--border);padding:10px 12px;margin-bottom:8px;
}
.food-item .fname{color:var(--cyan);font-weight:700;font-size:13px;margin-bottom:4px}
.food-item .fdesc{font-size:12px;color:var(--dim);line-height:1.5}
.phrase-row{
  display:grid;grid-template-columns:1fr 1fr 1fr;gap:6px;
  padding:8px 0;border-bottom:1px solid var(--border);font-size:12px;
}
.phrase-row:last-child{border-bottom:none}
.phrase-row .en{color:var(--dim)}
.phrase-row .local{color:var(--cyan);font-weight:600}
.phrase-row .pron{color:var(--orange);font-style:italic}
.safety-badge{
  display:inline-block;padding:4px 10px;font-size:12px;font-weight:700;
  border:1px solid;margin-bottom:8px;
}
.safety-green{color:var(--green);border-color:var(--green)}
.safety-yellow{color:var(--gold);border-color:var(--gold)}
.safety-orange{color:var(--orange);border-color:var(--orange)}
.budget-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-top:8px}
.budget-card{
  background:var(--surface2);border:1px solid var(--border);padding:10px;text-align:center;
}
.budget-card .btier{color:var(--dim);font-size:11px;text-transform:uppercase;letter-spacing:.5px;margin-bottom:4px}
.budget-card .bamt{color:var(--cyan);font-size:18px;font-weight:700}
.budget-card .bper{color:var(--dim);font-size:10px}
.pack-check{
  display:flex;align-items:center;gap:10px;padding:8px 0;
  border-bottom:1px solid var(--border);font-size:13px;cursor:pointer;
}
.pack-check input[type=checkbox]{width:20px;height:20px;accent-color:var(--cyan)}
.packing-gen{margin-top:14px}
.packing-gen .sel-countries{display:flex;flex-wrap:wrap;gap:6px;margin-bottom:10px}
.packing-gen .sel-tag{
  background:var(--surface2);border:1px solid var(--border);padding:4px 8px;
  font-size:11px;display:flex;align-items:center;gap:6px;
}
.packing-gen .sel-tag .remove{cursor:pointer;color:var(--red);font-size:14px;background:none;border:none;padding:0;min-width:20px;min-height:20px}
.transport-item{
  background:var(--surface2);border:1px solid var(--border);padding:10px 12px;margin-bottom:8px;
}
.transport-item .tname{color:var(--cyan);font-weight:700;font-size:12px;text-transform:uppercase;margin-bottom:4px}
.transport-item .tdesc{font-size:12px;color:var(--dim);line-height:1.5}
.back-btn{margin-bottom:10px;width:auto;align-self:flex-start}
.search-box{position:relative;margin-bottom:10px}
.search-box input{padding-left:36px}
.search-box .search-icon{position:absolute;left:10px;top:50%;transform:translateY(-50%);color:var(--dim);font-size:16px}
.no-results{text-align:center;color:var(--dim);padding:40px 20px;font-size:13px}
.fav-section{margin-bottom:14px}
.fav-section h3{font-size:12px;color:var(--gold);text-transform:uppercase;letter-spacing:1px;margin-bottom:8px}
@media(max-width:600px){
  .phrase-row{grid-template-columns:1fr;gap:2px}
  .budget-grid{grid-template-columns:1fr}
  .country-grid{grid-template-columns:1fr 1fr}
  .info-row{flex-direction:column}
  header h1{font-size:13px}
}
</style>
</head>
<body>
<div class="app">
  <header>
    <div>
      <h1>World Travel Guide <span class="sep">//</span> Korb Engineering</h1>
      <div class="sub">Rick Steves-style tips for 30+ countries</div>
    </div>
    <div class="hdr-right">
      <button class="icn-btn" onclick="showScreen('packing')" title="Packing List Generator">&#x1F9F3;</button>
      <button class="icn-btn" onclick="showScreen('home')" title="Home">&#x1F3E0;</button>
    </div>
  </header>

  <div id="home-screen" class="screen active">
    <div class="search-box">
      <span class="search-icon">&#x1F50D;</span>
      <input type="text" id="search-input" placeholder="Search countries, tips, food..." oninput="handleSearch(this.value)">
    </div>
    <div id="favorites-container"></div>
    <div class="region-tabs" id="region-tabs"></div>
    <div class="country-grid" id="country-grid"></div>
    <div id="search-results" class="no-results" style="display:none">No results found</div>
  </div>

  <div id="country-screen" class="screen">
    <button class="btn back-btn" onclick="showScreen('home')">&#8592; Back to Countries</button>
    <div id="country-header" class="card"></div>
    <div class="tab-bar" id="country-tabs"></div>
    <div id="country-content"></div>
  </div>

  <div id="packing-screen" class="screen">
    <button class="btn back-btn" onclick="showScreen('home')">&#8592; Back to Countries</button>
    <div class="card">
      <h2>Packing List Generator</h2>
      <p style="font-size:12px;color:var(--dim);margin-bottom:10px">Select countries you plan to visit, then generate a combined packing list.</p>
      <div class="search-box">
        <span class="search-icon">&#x1F50D;</span>
        <input type="text" id="packing-search" placeholder="Search countries to add..." oninput="filterPackingCountries(this.value)">
      </div>
      <div id="packing-country-list" class="country-grid" style="margin-bottom:14px"></div>
      <div class="packing-gen">
        <h3 style="color:var(--cyan);font-size:12px;text-transform:uppercase;margin-bottom:8px">Selected Countries</h3>
        <div class="sel-countries" id="selected-countries-tags"></div>
        <button class="btn" onclick="generatePackingList()" style="width:100%;margin-top:10px;background:rgba(0,212,255,.08);border-color:var(--cyan);color:var(--cyan)">Generate Combined Packing List</button>
      </div>
      <div id="generated-packing" style="margin-top:14px"></div>
    </div>
  </div>
</div>

const LS_PREFIX='korb_travel_';
const REGIONS=['Europe','Asia','Americas','Africa','Middle East','Oceania'];

function lsGet(k){try{return JSON.parse(localStorage.getItem(LS_PREFIX+k))}catch{return null}}
function lsSet(k,v){localStorage.setItem(LS_PREFIX+k,JSON.stringify(v))}
function getFavs(){return lsGet('favorites')||[]}
function setFavs(f){lsSet('favorites',f)}
function toggleFav(id){const f=getFavs();const i=f.indexOf(id);if(i>-1)f.splice(i,1);else f.push(id);setFavs(f);renderHome()}

{n:'Buses',d:'ALSA and FlixBus for intercity. Often cheaper than trains. Comfortable for long distances.'},
{n:'Walking',d:'Spanish cities are very walkable. Evening paseo is the best way to explore.'}
]},

{id:'germany',name:'Germany',flag:'\u{1F1E9}\u{1F1EA}',region:'Europe',capital:'Berlin',currency:'Euro (\u20AC)',language:'German',timezone:'CET (UTC+1)',bestTime:'May\u2013Sep',
tips:[
{t:'Cash Culture',d:'Germany is surprisingly cash-heavy. Many restaurants, bakeries, and small shops don\'t take cards. Always carry cash. ATMs ("Geldautomat") are everywhere.'},
{t:'Recycling',d:'Pfand system: bottles have deposits (8\u201325 cents). Return to machines at supermarkets. Don\'t throw away bottles!'},
{t:'Sundays',d:'Almost everything is closed. No grocery shopping. Stock up Saturday. Gas stations and train station shops stay open.'},
{t:'Tipping',d:'Say the total amount you want to pay. 5\u201310% is standard. Say "Stimmt so" (keep the change) or state the total. Don\'t leave tip on table.'},
{t:'Trains',d:'DB Navigator app is essential. Sparpreis (advance) tickets are much cheaper. 49\u20AC Deutschland-Ticket covers all local/regional transport.'},
{t:'Beer',d:'Prost! Beer is cheaper than water in many restaurants. Each region has its style. Try local breweries.'},
{t:'Jaywalking',d:'Don\'t do it, especially near children. Germans take traffic rules seriously even for pedestrians.'}
],
customs:[
{t:'Punctuality',d:'Being on time means being 5 minutes early. Germans value punctuality deeply. Don\'t be late.'},
{t:'Quiet Hours',d:'Ruhezeit: no noise 10pm\u20136am and all day Sunday. No mowing, drilling, or loud music. Take it seriously.'},
{t:'Directness',d:'Germans are direct communicators. It\'s not rude \u2014 it\'s efficient. Small talk is minimal.'},
{t:'Formality',d:'Use "Sie" (formal you) with strangers. Wait to be offered "du." First names only when invited.'}
],
food:[
{n:'Bratwurst',d:'Grilled sausage, best from a street stand with mustard and a Br\u00f6tchen (roll). N\u00fcrnberger are small and famous.'},
{n:'Schnitzel',d:'Breaded and fried veal or pork cutlet. With fries or potato salad. J\u00e4gerschnitzel has mushroom sauce.'},
{n:'Pretzel (Brezel)',d:'Soft, salted, perfect. Best in Bavaria. Available at every bakery. Great with Obatzda (cheese spread).'},
{n:'Currywurst',d:'Berlin\'s iconic sliced sausage with curry ketchup and fries. Best from street stands.'},
{n:'D\u00f6ner Kebab',d:'Germany\'s most popular fast food. Turkish-German creation. Berlin has the best. Meat, salad, sauce in bread.'},
{n:'Black Forest Cake',d:'Layers of chocolate cake, cherries, and cream. Authentic versions use Kirsch (cherry liqueur).'}
],

{n:'Autobahn',d:'Some sections have no speed limit. Rental cars are manual transmission by default. Book automatic early.'}

{id:'uk',name:'United Kingdom',flag:'\u{1F1EC}\u{1F1E7}',region:'Europe',capital:'London',currency:'Pound Sterling (\u00A3)',language:'English',timezone:'GMT (UTC+0)',bestTime:'May\u2013Sep',
tips:[
{t:'Oyster Card',d:'Get an Oyster card or use contactless payment for London transport. Daily caps save you money. Never buy single paper tickets.'},
{t:'Tipping',d:'10\u201315% in restaurants if service charge isn\'t included. Round up for taxis. Buy bartenders a drink instead of tipping.'},
{t:'Pubs',d:'Order at the bar, not at your table. No tipping bartenders with cash. Kitchen closes earlier than the bar.'},
{t:'Queuing',d:'The British queue is sacred. Never cut in line. Ever. You will be judged silently and harshly.'},
{t:'Weather',d:'Always carry a light rain jacket. Weather changes hourly. Layers are essential. Umbrellas are less useful than waterproofs.'},
{t:'Free Museums',d:'National museums in London are FREE (British Museum, Tate, Natural History, V&A, etc.). Donations appreciated.'},
{t:'Driving',d:'They drive on the left. Look right first when crossing streets. "LOOK RIGHT" is painted on crosswalks for tourists.'}
],

{t:'Politeness',d:'"Please," "thank you," and "sorry" are used constantly. The British apologize even when you bump into them.'},
{t:'Small Talk',d:'Weather is the universal conversation starter. Never skip "How are you?" even if you don\'t want an answer.'},
{t:'Pub Culture',d:'Buying rounds is a social contract. If someone buys you a drink, you\'re expected to buy the next round.'},
{t:'Personal Space',d:'The British value personal space. Don\'t stand too close. Don\'t be overly familiar with strangers.'}
],

{n:'Fish and Chips',d:'Battered cod or haddock with thick chips. Eat from a proper chippy, not a tourist trap. Mushy peas and vinegar required.'},
{n:'Sunday Roast',d:'Roast beef/lamb/chicken with Yorkshire pudding, roast potatoes, gravy, and vegetables. Book ahead at good pubs.'},
{n:'Cornish Pasty',d:'Meat and vegetable pastry. Must be from Cornwall for authenticity. Perfect portable lunch.'},
{n:'Afternoon Tea',d:'Sandwiches, scones with clotted cream and jam, and cakes with tea. Book at a proper hotel for the experience.'},
{n:'Tikka Masala',d:'Britain\'s adopted national dish. Creamy tomato curry. Try in any curry house in Birmingham or Manchester.'}

{n:'Black Cabs',d:'Iconic but expensive. Uber is cheaper. Black cab drivers know every street \u2014 amazing navigation.'}

{id:'greece',name:'Greece',flag:'\u{1F1EC}\u{1F1F7}',region:'Europe',capital:'Athens',currency:'Euro (\u20AC)',language:'Greek',timezone:'EET (UTC+2)',bestTime:'Apr\u2013Jun, Sep\u2013Oct',
tips:[
{t:'Island Hopping',d:'Book ferries on Ferryhopper app. Blue Star Ferries is reliable. Fast ferries cost more but save hours. Book ahead in July/August.'},
{t:'Cash',d:'Many tavernas and small islands are cash-only. ATMs on small islands may run out in peak season. Carry backup cash.'},
{t:'Tipping',d:'Not expected but appreciated. Round up at tavernas or leave 5\u201310%. Leave coins at cafes.'},
{t:'Afternoon Rest',d:'3\u20135pm is quiet time. Don\'t be noisy. Many shops close. Embrace the afternoon nap culture.'},
{t:'Water',d:'Tap water is safe in Athens. Some islands have salty or non-potable tap water. Ask locals.'},
{t:'Pace',d:'Greek time runs slower. Relax into it. Meals are long and social. Service isn\'t slow \u2014 they\'re giving you space.'},
{t:'Parthenon',d:'Visit at opening (8am) to avoid crowds and heat. Book online. The Acropolis Museum is a must.'}
],
customs:[
{t:'Greek Hospitality',d:'Filoxenia (friend to stranger) is deep cultural value. Don\'t refuse offered food/drink. Compliment the cook.'},
{t:'Gestures',d:'Open palm facing someone ("moutza") is very offensive. Don\'t do a "talk to the hand" gesture.'},
{t:'Name Days',d:'More important than birthdays. Greeks celebrate their saint\'s name day with open house and treats.'},
{t:'Dress',d:'Cover shoulders and knees at monasteries and churches. Bring a light wrap.'}
],
food:[
{n:'Moussaka',d:'Layered eggplant, ground meat, and b\u00e9chamel. Hearty, comforting, and found at every taverna.'},
{n:'Souvlaki',d:'Grilled meat skewers or gyro in pita with tzatziki, tomato, onion. The ultimate Greek street food.'},
{n:'Greek Salad',d:'Tomatoes, cucumber, onion, olives, feta, olive oil. Never lettuce. Called "horiatiki" (village salad).'},
{n:'Baklava',d:'Layered phyllo, nuts, and honey syrup. Every region claims the best version. Try them all.'},
{n:'Fresh Seafood',d:'Grilled octopus, fried calamari, whole grilled fish by weight. Best at seaside tavernas.'},
{n:'Ouzo',d:'Anise-flavored spirit. Always with meze (snacks). Add water \u2014 it turns milky. Never drink on empty stomach.'}
],

{n:'Buses (KTEL)',d:'Intercity buses are reliable and cheap. Cover most of mainland Greece well.'},
{n:'Scooter/ATV',d:'Popular on islands. International license required technically. Roads can be treacherous. Wear helmet.'}

{id:'portugal',name:'Portugal',flag:'\u{1F1F5}\u{1F1F9}',region:'Europe',capital:'Lisbon',currency:'Euro (\u20AC)',language:'Portuguese',timezone:'WET (UTC+0)',bestTime:'Apr\u2013Jun, Sep\u2013Oct',
tips:[
{t:'Value',d:'One of Western Europe\'s best-value destinations. Great food and wine for half the price of Paris.'},
{t:'Tipping',d:'Not expected but appreciated. Round up at restaurants. Leave 5\u201310% for great service. Cafes: leave small change.'},
{t:'Coffee',d:'Ask for "um caf\u00e9" for espresso. "Meia de leite" for latte. "Galao" for larger milky coffee. Coffee is 60 cents\u20131\u20AC at the bar.'},
{t:'Hills',d:'Lisbon is HILLY. Wear comfortable shoes. Take Tram 28 or the funiculars. Don\'t try to walk everything.'},
{t:'Fado',d:'Traditional melancholic music. Best in Lisbon\'s Alfama district. Go to a "casa de fado" for authentic experience.'},
{t:'Beaches',d:'Algarve has stunning beaches. Atlantic water is COLD even in summer (17\u201320\u00b0C). Wetsuits common for surfers.'},
{t:'Pastry Shops',d:'Pastelarias are everywhere. Affordable coffee and pastries. Great for breakfast or afternoon snack.'}
],
customs:[
{t:'Language',d:'Don\'t speak Spanish to Portuguese people. They understand it but find it disrespectful. Learn a few Portuguese words.'},
{t:'Meal Times',d:'Similar to Spain but slightly earlier. Lunch 12:30\u20132pm, dinner 7:30\u20139:30pm.'},
{t:'Formality',d:'Use "Senhor/Senhora" with older people. Handshake for men, cheek kisses between women and mixed.'},
{t:'Saudade',d:'Untranslatable feeling of longing/nostalgia. Central to Portuguese culture. Fado music embodies it.'}
],
food:[
{n:'Past\u00e9is de Nata',d:'Custard tarts with flaky pastry. The best are from Past\u00e9is de Bel\u00e9m in Lisbon. Dust with cinnamon.'},
{n:'Bacalhau',d:'Salt cod prepared 365+ ways. National obsession. Try "Bacalhau \u00e0 Br\u00e1s" (shredded with eggs and potatoes).'},
{n:'Francesinha',d:'Porto\'s iconic cheese-covered meat sandwich doused in spicy beer sauce. Heart-stoppingly good.'},
{n:'Grilled Sardines',d:'Peak in June during Santos Populares festival. Eaten whole on bread. Simple and perfect.'},
{n:'Caldo Verde',d:'Kale and potato soup with chorizo. Comfort food classic. Found everywhere.'},
{n:'Port Wine',d:'Sweet fortified wine from Douro Valley. Taste at lodges in Vila Nova de Gaia (across from Porto).'}
],

{n:'Lisbon Metro',d:'4 lines, cheap and efficient. Viva Viagem card works on metro, buses, and trams.'},
{n:'Tram 28',d:'Iconic but touristy and pickpocket-heavy. Go early morning or take alternative Tram 12.'},
{n:'Uber/Bolt',d:'Very cheap compared to Western Europe. Often easier than public transport for short trips.'}

{id:'netherlands',name:'Netherlands',flag:'\u{1F1F3}\u{1F1F1}',region:'Europe',capital:'Amsterdam',currency:'Euro (\u20AC)',language:'Dutch',timezone:'CET (UTC+1)',bestTime:'Apr\u2013Sep',
tips:[
{t:'Cycling',d:'Bikes are king. Rent one immediately. Stay in bike lanes (red asphalt). Never walk in bike lanes \u2014 cyclists WILL hit you.'},
{t:'Card Only',d:'Netherlands is nearly cashless. Cards accepted almost everywhere. Some places don\'t take cash at all.'},
{t:'Coffeeshops vs Cafes',d:'Coffeeshop = cannabis. Caf\u00e9 or koffiehuis = coffee. Know the difference. Only buy from licensed coffeeshops.'},
{t:'Tipping',d:'Not expected. Round up or add 5\u201310% for good restaurant service.'},
{t:'Canal Houses',d:'Steep, narrow stairs in old buildings. Hotels in canal houses may not have elevators. Pack light.'},
{t:'Beyond Amsterdam',d:'Visit Utrecht, Haarlem, Leiden, Delft, and The Hague. All 20\u201340 min by train. Less crowded, equally charming.'},
{t:'Tulips',d:'Keukenhof open mid-March to mid-May only. Book online. Best blooms in mid-April.'}
],
customs:[
{t:'Directness',d:'The Dutch are famously direct. It\'s not rude, it\'s honest. Don\'t take bluntness personally.'},
{t:'Birthday Circle',d:'At Dutch birthday parties, you congratulate EVERYONE, including the birthday person\'s relatives.'},
{t:'Go Dutch',d:'Splitting the bill is the norm. Don\'t expect someone to pick up the tab.'},
{t:'Shoes Off',d:'Take shoes off when entering someone\'s home. Always.'}
],
food:[
{n:'Stroopwafel',d:'Two thin waffles with caramel syrup filling. Best fresh and warm from a market stand. Place on hot coffee to soften.'},
{n:'Bitterballen',d:'Deep-fried crispy meatball ragout balls. Essential bar snack. Dip in mustard.'},
{n:'Herring (Haring)',d:'Raw herring with onions and pickles. Eaten by tilting head back. An acquired taste but beloved.'},
{n:'Poffertjes',d:'Mini fluffy pancakes with butter and powdered sugar. Found at markets and stands.'},
{n:'Frikandel',d:'Deep-fried minced meat sausage. Fast food staple from any snackbar. Get it "speciaal" with mayo, ketchup, onions.'},
{n:'Gouda Cheese',d:'Try aged ("oud") Gouda at markets. Visit Gouda or Alkmaar cheese markets for the experience.'}
],

{n:'Cycling',d:'Rent from OV-fiets at train stations (3.85\u20AC/day). MacBike for tourists. Always lock to a fixed object.'},
{n:'Trams',d:'Amsterdam has extensive tram network. Same OV-chipkaart works. Very efficient.'},
{n:'Canal Boats',d:'Rent a small electric boat to explore Amsterdam canals yourself. No license needed for small boats.'}
]},

{id:'japan',name:'Japan',flag:'\u{1F1EF}\u{1F1F5}',region:'Asia',capital:'Tokyo',currency:'Japanese Yen (\u00A5)',language:'Japanese',timezone:'JST (UTC+9)',bestTime:'Mar\u2013May (cherry blossoms), Oct\u2013Nov (autumn foliage)',
tips:[
{t:'IC Cards',d:'Get Suica or Pasmo card at any station. Works on all trains, buses, convenience stores, and vending machines nationwide.'},
{t:'Cash',d:'Japan is still cash-heavy outside Tokyo. 7-Eleven ATMs accept foreign cards reliably. Carry \u00A510,000\u2013\u00A520,000 daily.'},
{t:'Japan Rail Pass',d:'Worth it for 7+ days of travel between cities. Must buy before arrival (changing \u2014 check current rules). Covers Shinkansen.'},
{t:'Convenience Stores',d:'Konbini (7-Eleven, Lawson, FamilyMart) are amazing. Fresh onigiri, sandwiches, ATMs, wifi, package pickup, bill payment.'},
{t:'Tipping',d:'NEVER tip in Japan. It\'s considered rude and confusing. Service is always impeccable without it.'},
{t:'Trash',d:'No public trash cans. Carry your trash. Dispose at convenience stores or your hotel. Everything is sorted.'},
{t:'Quiet',d:'No talking on phones in trains. Speak softly on public transport. Set phone to silent ("manner mode").'}
],
customs:[
{t:'Bowing',d:'Bow when greeting, thanking, apologizing. Depth indicates formality. A slight nod is fine for tourists.'},
{t:'Shoes',d:'Remove shoes when entering homes, temples, some restaurants. Look for shoe shelves and slippers.'},
{t:'Chopstick Rules',d:'Never stick chopsticks upright in rice (funeral ritual). Never pass food chopstick-to-chopstick. Use the serving end to share.'},
{t:'Onsen (Hot Springs)',d:'Bathe naked, wash thoroughly before entering. Tattoos often prohibited \u2014 check policy. Towel stays out of water.'},
{t:'Gift Giving',d:'Give and receive with both hands. Don\'t open gifts in front of the giver. Wrapping matters.'}
],
food:[
{n:'Ramen',d:'Regional styles: Tokyo (soy), Hakata (tonkotsu/pork), Sapporo (miso). Slurping is polite \u2014 it shows you enjoy it.'},
{n:'Sushi',d:'Eat at conveyor belt (kaiten) for affordable, or splurge at omakase. Dip fish-side in soy sauce, not rice-side.'},
{n:'Tempura',d:'Lightly battered and fried vegetables and seafood. Best eaten immediately. Dip in tentsuyu sauce.'},
{n:'Wagyu Beef',d:'Intensely marbled beef. A5 grade is the best. Try at a teppanyaki restaurant. Life-changing.'},
{n:'Onigiri',d:'Rice balls from konbini. 100\u2013200\u00A5 each. Dozens of fillings. Perfect cheap meal or snack.'},
{n:'Matcha Everything',d:'Green tea in ice cream, Kit-Kats, lattes, mochi. Embrace it. Uji (near Kyoto) is matcha capital.'}
],

{n:'Buses',d:'Essential in Kyoto. Enter rear, pay front. IC card works. Day passes available.'},
{n:'Taxis',d:'Clean and honest but expensive. Doors open automatically. Don\'t touch the door. Base fare ~\u00A5410.'}
]},

{id:'thailand',name:'Thailand',flag:'\u{1F1F9}\u{1F1ED}',region:'Asia',capital:'Bangkok',currency:'Thai Baht (\u0E3F)',language:'Thai',timezone:'ICT (UTC+7)',bestTime:'Nov\u2013Feb (cool season)',
tips:[
{t:'Temples',d:'Dress modestly: cover shoulders and knees. Remove shoes. Don\'t point feet at Buddha images. Don\'t touch monks (women especially).'},
{t:'Tipping',d:'Not traditional but increasingly expected in tourist areas. 20\u201350 baht for restaurant meals. Round up for taxis.'},
{t:'Bargaining',d:'Expected at markets and street vendors. Start at 50\u201360% of asking price. Be friendly about it. Don\'t haggle in malls or 7-Eleven.'},
{t:'Street Food',d:'Some of the best food in the world is from street carts. Follow the crowds. If it\'s busy, it\'s safe and good.'},
{t:'Scams',d:'Tuk-tuk drivers offering "cheap tours" will take you to gem shops. "Temple is closed" scam is classic. Grand Palace is never randomly closed.'},
{t:'SIM Cards',d:'AIS or DTAC tourist SIM at the airport. Cheap data plans. Get at arrival hall counter.'},
{t:'Respect the King',d:'L\u00e8se-majest\u00e9 laws are strict. Never disrespect the royal family in any way. Stand during the royal anthem.'}
],
customs:[

{t:'Motorbike',d:'Rent only if experienced. Traffic is terrifying. Many tourists get injured. Grab bike is safer for getting around.'},

{t:'Tipping',d:'Not expected or customary. Australians are paid proper wages. Rounding up is fine for exceptional service.'},
{t:'Costs',d:'Australia is expensive. Budget $100\u2013150/day minimum. Groceries from Woolworths/Coles save money.'},
{t:'Water',d:'Tap water is safe everywhere. Carry a reusable bottle \u2014 it\'s hot and you\'ll dehydrate fast.'},
{t:'Slang',d:'Arvo (afternoon), brekkie (breakfast), barbie (BBQ), servo (gas station), bottle-o (liquor store), avo (avocado).'}

{t:'Shouting Rounds',d:'At pubs, you "shout" (buy) a round of drinks. Then the next person shouts. Participate or explain.'},

],

{n:'Barramundi',d:'Firm white fish, often grilled or beer-battered. Iconic Aussie seafood.'},

{id:'new-zealand',name:'New Zealand',flag:'\u{1F1F3}\u{1F1FF}',region:'Oceania',capital:'Wellington',currency:'New Zealand Dollar (NZ$)',language:'English, M\u0101ori',timezone:'NZST (UTC+12)',bestTime:'Dec\u2013Feb (summer)',

{id:'mexico',name:'Mexico',flag:'\u{1F1F2}\u{1F1FD}',region:'Americas',capital:'Mexico City',currency:'Mexican Peso (MXN)',language:'Spanish',timezone:'CST/MST/PST (UTC-6 to -8)',bestTime:'Nov\u2013Apr (dry season)',
tips:[
{t:'Street Food',d:'The best food in Mexico comes from street stalls and markets. If a taco stand has a line of locals, get in it. Lime and salsa are your friends.'},
{t:'Water',d:'Don\'t drink tap water. Use bottled or filtered water. Ice in restaurants is usually purified (ask "Es agua purificada?").'},
{t:'Tipping',d:'10\u201315% at restaurants. Propinas (tips) are important \u2014 workers often depend on them. Tip gas station attendants, bag packers at grocery stores.'},
{t:'Bargaining',d:'Expected at markets and with taxis (without meter). Not in restaurants or shops with fixed prices.'},
{t:'Safety Apps',d:'Use Uber/Didi instead of street taxis. Safer and metered. Available in all major cities.'},
{t:'Money',d:'ATMs at banks (Citibanamex, HSBC) give best rates. Avoid standalone ATMs. Card skimming exists \u2014 cover PIN.'},
{t:'Altitude',d:'Mexico City is at 2,240m. Take it easy the first day. Drink water. You may feel breathless.'}
],
customs:[
{t:'Greetings',d:'Cheek kiss (right) for women meeting anyone. Handshake for men. Hug for closer acquaintances.'},
{t:'Time',d:'"Mexican time" is real. Social events start 30\u201360 min late. Business is more punctual.'},
{t:'Politeness',d:'Always greet with "Buenos d\u00edas/tardes/noches." Use "usted" (formal you) with elders and strangers.'},
{t:'Family',d:'Family is central to Mexican culture. Showing interest in someone\'s family is warmly received.'}
],
food:[

{n:'Mole',d:'Complex sauce with 20+ ingredients including chocolate and chilies. Oaxaca is the mole capital.'},
{n:'Elote',d:'Grilled corn on the cob with mayo, cheese, chili, and lime. Street food perfection.'},
{n:'Chilaquiles',d:'Fried tortilla chips in salsa with cream, cheese, and eggs. The ultimate Mexican breakfast.'},
{n:'Pozole',d:'Hominy corn soup with pork or chicken. Festive dish. Garnish with lettuce, radish, oregano.'},
{n:'Churros',d:'Fried dough sticks with cinnamon sugar. Dipped in chocolate or cajeta (caramel). Fresh from a stand.'}

customs:[
{t:'Ticos',d:'Costa Ricans call themselves Ticos (men) and Ticas (women). Friendly, educated, and environmentally conscious.'},
{t:'Greetings',d:'Cheek kiss for women meeting anyone. Handshake for men. "Pura Vida" works as hello and goodbye.'},
{t:'Time',d:'"Tico time" is relaxed. Don\'t stress if things run late.'},
{t:'Environment',d:'Costa Rica is an eco-tourism pioneer. Respect nature. No single-use plastics in many areas.'}
],

// --- STATE ---
let currentRegion='All';
let currentCountry=null;
let currentTab='overview';
let selectedPackingCountries=[];
let searchTerm='';

// --- RENDER ---
function showScreen(name){
  document.querySelectorAll('.screen').forEach(s=>s.classList.remove('active'));
  document.getElementById(name+'-screen').classList.add('active');
  if(name==='home'){currentCountry=null;renderHome()}
  if(name==='packing'){renderPackingScreen()}
  window.scrollTo(0,0);
}

function renderHome(){
  renderFavorites();
  renderRegionTabs();
  renderCountryGrid();
}

function renderFavorites(){
  const c=document.getElementById('favorites-container');
  const favs=getFavs();
  if(!favs.length){c.innerHTML='';return}
  const favCountries=COUNTRIES.filter(x=>favs.includes(x.id));
  if(!favCountries.length){c.innerHTML='';return}
  c.innerHTML=`<div class="fav-section"><h3>\u2605 Favorites</h3><div class="country-grid">${favCountries.map(cc=>countryCardHTML(cc)).join('')}</div></div>`;
  bindCountryCards(c);
}

function renderRegionTabs(){
  const c=document.getElementById('region-tabs');
  const tabs=['All',...REGIONS];
  c.innerHTML=tabs.map(r=>`<button class="${r===currentRegion?'active':''}" onclick="setRegion('${r}')">${r}</button>`).join('');
}

function setRegion(r){currentRegion=r;renderRegionTabs();renderCountryGrid()}

function renderCountryGrid(){
  const grid=document.getElementById('country-grid');
  const sr=document.getElementById('search-results');
  let filtered=COUNTRIES;
  if(currentRegion!=='All') filtered=filtered.filter(c=>c.region===currentRegion);
  if(searchTerm){
    const t=searchTerm.toLowerCase();
    filtered=COUNTRIES.filter(c=>{
      if(c.name.toLowerCase().includes(t))return true;
      if(c.region.toLowerCase().includes(t))return true;
      if(c.capital.toLowerCase().includes(t))return true;
      if(c.food.some(f=>f.n.toLowerCase().includes(t)||f.d.toLowerCase().includes(t)))return true;
      if(c.tips.some(tip=>tip.t.toLowerCase().includes(t)||tip.d.toLowerCase().includes(t)))return true;
      if(c.phrases.some(p=>p[0].toLowerCase().includes(t)||p[1].toLowerCase().includes(t)))return true;
      return false;
    });
  }
  if(!filtered.length){grid.innerHTML='';sr.style.display='block';return}
  sr.style.display='none';
  grid.innerHTML=filtered.map(c=>countryCardHTML(c)).join('');
  bindCountryCards(grid);
}

function countryCardHTML(c){
  const favs=getFavs();
  const isFav=favs.includes(c.id);
  return`<div class="country-card" data-id="${c.id}"><span class="flag">${c.flag}</span><span class="cname">${c.name}</span><button class="star-btn ${isFav?'fav':''}" data-fav="${c.id}" title="Toggle favorite">${isFav?'\u2605':'\u2606'}</button></div>`;
}

function bindCountryCards(container){
  container.querySelectorAll('.country-card').forEach(card=>{
    card.addEventListener('click',e=>{
      if(e.target.closest('.star-btn'))return;
      openCountry(card.dataset.id);
    });
  });
  container.querySelectorAll('.star-btn').forEach(btn=>{
    btn.addEventListener('click',e=>{
      e.stopPropagation();
      toggleFav(btn.dataset.fav);
    });
  });
}

function handleSearch(val){
  searchTerm=val.trim();
  if(searchTerm){currentRegion='All';renderRegionTabs()}
  renderCountryGrid();
}

// --- COUNTRY VIEW ---
function openCountry(id){
  currentCountry=COUNTRIES.find(c=>c.id===id);
  if(!currentCountry)return;
  currentTab='overview';
  showScreen('country');
  renderCountryView();
}

function renderCountryView(){
  const c=currentCountry;
  const hdr=document.getElementById('country-header');
  const favs=getFavs();
  const isFav=favs.includes(c.id);
  hdr.innerHTML=`<div style="display:flex;align-items:center;gap:12px;flex-wrap:wrap"><span style="font-size:36px">${c.flag}</span><div><h2 style="color:var(--cyan);font-size:18px;margin:0;border:none;padding:0">${c.name}</h2><div style="font-size:11px;color:var(--dim)">${c.region}</div></div><button class="star-btn ${isFav?'fav':''}" style="margin-left:auto;font-size:24px;min-width:44px;min-height:44px" onclick="toggleFav('${c.id}');renderCountryView()">${isFav?'\u2605':'\u2606'}</button></div>`;

  const tabs=['overview','tips','customs','food','phrases','packing','safety','budget','transport'];
  const tabLabels=['Overview','Tips & Tricks','Customs','Must-Try Food','Key Phrases','Packing','Safety','Budget','Getting Around'];
  const tabBar=document.getElementById('country-tabs');
  tabBar.innerHTML=tabs.map((t,i)=>`<button class="${t===currentTab?'active':''}" onclick="switchTab('${t}')">${tabLabels[i]}</button>`).join('');

  renderTabContent();
}

function switchTab(t){currentTab=t;renderCountryView()}

function renderTabContent(){
  const c=currentCountry;
  const el=document.getElementById('country-content');
  switch(currentTab){
    case'overview':el.innerHTML=renderOverview(c);break;
    case'tips':el.innerHTML=renderTips(c);break;
    case'customs':el.innerHTML=renderCustoms(c);break;
    case'food':el.innerHTML=renderFood(c);break;
    case'phrases':el.innerHTML=renderPhrases(c);break;
    case'packing':el.innerHTML=renderPacking(c);break;
    case'safety':el.innerHTML=renderSafety(c);break;
    case'budget':el.innerHTML=renderBudget(c);break;
    case'transport':el.innerHTML=renderTransport(c);break;
  }
}

function renderOverview(c){
  return`<div class="card"><h2>Overview</h2>
    <div class="info-row">
      <div class="info-chip"><span class="label">Capital</span><span class="val">${c.capital}</span></div>
      <div class="info-chip"><span class="label">Currency</span><span class="val">${c.currency}</span></div>
      <div class="info-chip"><span class="label">Language</span><span class="val">${c.language}</span></div>
    </div>
    <div class="info-row">
      <div class="info-chip"><span class="label">Timezone</span><span class="val">${c.timezone}</span></div>
      <div class="info-chip"><span class="label">Best Time</span><span class="val">${c.bestTime}</span></div>
      <div class="info-chip"><span class="label">Region</span><span class="val">${c.region}</span></div>
    </div>
    <div style="margin-top:14px">
      <h3>Quick Tips Preview</h3>
      ${c.tips.slice(0,3).map(t=>`<div class="tip-item"><div class="tip-title">${t.t}</div>${t.d}</div>`).join('')}
      <p style="font-size:11px;color:var(--dim);margin-top:8px;cursor:pointer" onclick="switchTab('tips')">See all ${c.tips.length} tips \u2192</p>
    </div>
    <div style="margin-top:14px">
      <h3>Top Foods</h3>
      ${c.food.slice(0,3).map(f=>`<div class="food-item"><div class="fname">${f.n}</div><div class="fdesc">${f.d}</div></div>`).join('')}
      <p style="font-size:11px;color:var(--dim);margin-top:8px;cursor:pointer" onclick="switchTab('food')">See all ${c.food.length} foods \u2192</p>
    </div>
  </div>`;
}

function renderTips(c){
  return`<div class="card"><h2>Tips & Tricks</h2>${c.tips.map(t=>`<div class="tip-item"><div class="tip-title">${t.t}</div>${t.d}</div>`).join('')}</div>`;
}

function renderCustoms(c){
  return`<div class="card"><h2>Cultural Customs</h2>${c.customs.map(t=>`<div class="tip-item"><div class="tip-title">${t.t}</div>${t.d}</div>`).join('')}</div>`;
}

function renderFood(c){
  return`<div class="card"><h2>Must-Try Food</h2>${c.food.map(f=>`<div class="food-item"><div class="fname">${f.n}</div><div class="fdesc">${f.d}</div></div>`).join('')}</div>`;
}

function renderPhrases(c){
  return`<div class="card"><h2>Key Phrases</h2>
    <div class="phrase-row" style="font-weight:700;color:var(--dim);border-bottom:2px solid var(--border)"><span>English</span><span>Local</span><span>Pronunciation</span></div>
    ${c.phrases.map(p=>`<div class="phrase-row"><span class="en">${p[0]}</span><span class="local">${p[1]}</span><span class="pron">${p[2]}</span></div>`).join('')}
  </div>`;
}

function renderPacking(c){
  return`<div class="card"><h2>Packing Tips for ${c.name}</h2>${c.packing.map(p=>`<div class="pack-check"><input type="checkbox"><span>${p}</span></div>`).join('')}</div>`;
}

function renderSafety(c){
  const s=c.safety;
  return`<div class="card"><h2>Safety Information</h2>
    <div class="safety-badge ${s.cls}">${s.rating}</div>
    <p style="margin-bottom:10px;font-size:13px;line-height:1.6">${s.notes}</p>
    <div class="info-chip"><span class="label">Emergency</span><span class="val">${s.emergency}</span></div>
  </div>`;
}

function renderBudget(c){
  const b=c.budget;
  return`<div class="card"><h2>Daily Budget Estimates</h2>
    <p style="font-size:11px;color:var(--dim);margin-bottom:6px">Per person, per day in ${b.currency}</p>
    <div class="budget-grid">
      <div class="budget-card"><div class="btier">Budget</div><div class="bamt">${b.low}</div><div class="bper">per day</div></div>
      <div class="budget-card"><div class="btier">Mid-Range</div><div class="bamt">${b.mid}</div><div class="bper">per day</div></div>
      <div class="budget-card"><div class="btier">Luxury</div><div class="bamt">${b.high}</div><div class="bper">per day</div></div>
    </div>
  </div>`;
}

function renderTransport(c){
  return`<div class="card"><h2>Getting Around</h2>${c.transport.map(t=>`<div class="transport-item"><div class="tname">${t.n}</div><div class="tdesc">${t.d}</div></div>`).join('')}</div>`;
}

// --- PACKING LIST GENERATOR ---
function renderPackingScreen(){
  const list=document.getElementById('packing-country-list');
  list.innerHTML=COUNTRIES.map(c=>{
    const sel=selectedPackingCountries.includes(c.id);
    return`<div class="country-card ${sel?'':''}}" data-pack-id="${c.id}" style="${sel?'border-color:var(--cyan);background:rgba(0,212,255,.06)':''}"><span class="flag">${c.flag}</span><span class="cname">${c.name}</span></div>`;
  }).join('');
  list.querySelectorAll('.country-card').forEach(card=>{
    card.addEventListener('click',()=>togglePackingCountry(card.dataset.packId));
  });
  renderSelectedTags();
}

function filterPackingCountries(val){
  const list=document.getElementById('packing-country-list');
  const t=val.toLowerCase();
  list.innerHTML=COUNTRIES.filter(c=>c.name.toLowerCase().includes(t)).map(c=>{
    const sel=selectedPackingCountries.includes(c.id);
    return`<div class="country-card" data-pack-id="${c.id}" style="${sel?'border-color:var(--cyan);background:rgba(0,212,255,.06)':''}"><span class="flag">${c.flag}</span><span class="cname">${c.name}</span></div>`;
  }).join('');
  list.querySelectorAll('.country-card').forEach(card=>{
    card.addEventListener('click',()=>togglePackingCountry(card.dataset.packId));
  });
}

function togglePackingCountry(id){
  const i=selectedPackingCountries.indexOf(id);
  if(i>-1)selectedPackingCountries.splice(i,1);else selectedPackingCountries.push(id);
  renderPackingScreen();
}

function renderSelectedTags(){
  const el=document.getElementById('selected-countries-tags');
  if(!selectedPackingCountries.length){el.innerHTML='<span style="color:var(--dim);font-size:12px">No countries selected</span>';return}
  el.innerHTML=selectedPackingCountries.map(id=>{
    const c=COUNTRIES.find(x=>x.id===id);
    return`<div class="sel-tag">${c.flag} ${c.name}<button class="remove" onclick="togglePackingCountry('${id}')">\u00d7</button></div>`;
  }).join('');
}

function generatePackingList(){
  const el=document.getElementById('generated-packing');
  if(!selectedPackingCountries.length){el.innerHTML='<p style="color:var(--red);font-size:13px">Select at least one country first.</p>';return}
  const allItems=new Set();
  const universal=['Passport and copies','Travel insurance documents','Phone charger and portable battery','Medications and prescriptions','Toiletries','Comfortable underwear and socks','Day bag or small backpack'];
  universal.forEach(i=>allItems.add(i));
  selectedPackingCountries.forEach(id=>{
    const c=COUNTRIES.find(x=>x.id===id);
    c.packing.forEach(p=>allItems.add(p));
  });
  const countries=selectedPackingCountries.map(id=>COUNTRIES.find(x=>x.id===id));
  el.innerHTML=`<div class="card"><h2>Combined Packing List</h2>
    <p style="font-size:11px;color:var(--dim);margin-bottom:10px">For: ${countries.map(c=>c.flag+' '+c.name).join(', ')}</p>
    <h3>Universal Essentials</h3>
    ${universal.map(i=>`<div class="pack-check"><input type="checkbox"><span>${i}</span></div>`).join('')}
    <h3 style="margin-top:14px">Country-Specific Items</h3>
    ${[...allItems].filter(i=>!universal.includes(i)).map(i=>`<div class="pack-check"><input type="checkbox"><span>${i}</span></div>`).join('')}
  </div>`;
}

// --- INIT ---
renderHome();
