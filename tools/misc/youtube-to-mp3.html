<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>YT2MP3 | KORB ENGINEERING</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
@font-face {
  font-family: 'DSEG14 Classic';
  src: url('https://cdn.jsdelivr.net/npm/dseg@0.46.0/fonts/DSEG14-Classic/DSEG14Classic-Bold.woff2') format('woff2'),
       url('https://cdn.jsdelivr.net/npm/dseg@0.46.0/fonts/DSEG14-Classic/DSEG14Classic-Bold.woff') format('woff');
  font-weight: bold;
  font-style: normal;
  font-display: swap;
}

:root {
  --bg-primary: #050a0f;
  --bg-secondary: #0a1018;
  --bg-tertiary: #0f1822;
  --cyan: #00d4ff;
  --cyan-dim: #00d4ff66;
  --cyan-glow: #00d4ff40;
  --orange: #ff6600;
  --orange-dim: #ff660066;
  --green: #00ff88;
  --red: #ff3355;
  --text-primary: #e0e8f0;
  --text-secondary: #8899aa;
  --text-dim: #445566;
  --border: #1a2a3a;
  --font-display: 'DSEG14 Classic', monospace;
  --font-mono: 'IBM Plex Mono', 'JetBrains Mono', monospace;
  --font-body: 'JetBrains Mono', 'IBM Plex Mono', monospace;
}

*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

html { font-size: 16px; }

body {
  font-family: var(--font-body);
  background: var(--bg-primary);
  color: var(--text-primary);
  min-height: 100vh;
  overflow-x: hidden;
  position: relative;
}

/* Scanline overlay */
body::after {
  content: '';
  position: fixed;
  inset: 0;
  background: repeating-linear-gradient(
    0deg,
    transparent,
    transparent 2px,
    rgba(0, 0, 0, 0.08) 2px,
    rgba(0, 0, 0, 0.08) 4px
  );
  pointer-events: none;
  z-index: 9999;
}

/* Toast container */
#toast-container {
  position: fixed;
  top: 20px;
  right: 20px;
  z-index: 10000;
  display: flex;
  flex-direction: column;
  gap: 8px;
}

.toast {
  background: var(--bg-tertiary);
  border: 1px solid var(--border);
  border-left: 3px solid var(--cyan);
  padding: 12px 20px;
  border-radius: 4px;
  font-family: var(--font-mono);
  font-size: 0.8rem;
  color: var(--text-primary);
  animation: toast-in 0.3s ease-out, toast-out 0.3s ease-in 2.7s forwards;
  max-width: 360px;
  box-shadow: 0 4px 20px rgba(0, 0, 0, 0.5);
}

.toast.error { border-left-color: var(--red); }
.toast.success { border-left-color: var(--green); }

@keyframes toast-in { from { opacity: 0; transform: translateX(40px); } to { opacity: 1; transform: translateX(0); } }
@keyframes toast-out { from { opacity: 1; } to { opacity: 0; transform: translateY(-10px); } }

/* Main layout */
.container {
  max-width: 700px;
  margin: 0 auto;
  padding: 40px 20px 120px;
}

/* Header */
.header {
  text-align: center;
  margin-bottom: 40px;
}

.header-title {
  font-family: var(--font-display);
  font-size: 2.4rem;
  color: var(--cyan);
  text-shadow: 0 0 20px var(--cyan-glow), 0 0 60px rgba(0, 212, 255, 0.15);
  letter-spacing: 4px;
  margin-bottom: 8px;
}

.header-sub {
  font-family: var(--font-mono);
  font-size: 0.75rem;
  color: var(--text-dim);
  letter-spacing: 3px;
  text-transform: uppercase;
}

/* Input section */
.input-section {
  margin-bottom: 24px;
}

.input-label {
  font-family: var(--font-mono);
  font-size: 0.7rem;
  color: var(--text-secondary);
  text-transform: uppercase;
  letter-spacing: 2px;
  margin-bottom: 8px;
  display: block;
}

.input-wrapper {
  display: flex;
  gap: 8px;
  align-items: stretch;
}

.url-input {
  flex: 1;
  background: var(--bg-secondary);
  border: 1px solid var(--border);
  border-radius: 4px;
  padding: 14px 16px;
  font-family: var(--font-mono);
  font-size: 0.9rem;
  color: var(--text-primary);
  outline: none;
  transition: border-color 0.2s, box-shadow 0.2s;
}

.url-input:focus {
  border-color: var(--cyan);
  box-shadow: 0 0 12px var(--cyan-glow);
}

.url-input.valid { border-color: var(--green); }
.url-input.invalid { border-color: var(--red); }

.url-input::placeholder { color: var(--text-dim); }

.input-btn {
  background: var(--bg-tertiary);
  border: 1px solid var(--border);
  border-radius: 4px;
  color: var(--text-secondary);
  font-family: var(--font-mono);
  font-size: 0.75rem;
  padding: 0 14px;
  cursor: pointer;
  transition: all 0.2s;
  white-space: nowrap;
}

.input-btn:hover {
  border-color: var(--cyan);
  color: var(--cyan);
}

/* Preview */
.preview-section {
  margin-bottom: 24px;
  display: none;
}

.preview-section.visible { display: block; }

.preview-card {
  background: var(--bg-secondary);
  border: 1px solid var(--border);
  border-radius: 4px;
  overflow: hidden;
  display: flex;
  gap: 0;
}

.preview-thumb {
  width: 200px;
  min-height: 112px;
  background-size: cover;
  background-position: center;
  background-color: var(--bg-tertiary);
  flex-shrink: 0;
}

.preview-info {
  padding: 14px 16px;
  display: flex;
  flex-direction: column;
  justify-content: center;
  gap: 6px;
  min-width: 0;
}

.preview-id {
  font-family: var(--font-mono);
  font-size: 0.7rem;
  color: var(--text-dim);
  text-transform: uppercase;
  letter-spacing: 1px;
}

.preview-url {
  font-family: var(--font-mono);
  font-size: 0.75rem;
  color: var(--text-secondary);
  overflow: hidden;
  text-overflow: ellipsis;
  white-space: nowrap;
}

/* Quality selector */
.quality-section {
  margin-bottom: 24px;
}

.quality-buttons {
  display: flex;
  gap: 0;
  border: 1px solid var(--border);
  border-radius: 4px;
  overflow: hidden;
}

.quality-btn {
  flex: 1;
  background: var(--bg-secondary);
  border: none;
  border-right: 1px solid var(--border);
  padding: 10px 8px;
  font-family: var(--font-mono);
  font-size: 0.75rem;
  color: var(--text-secondary);
  cursor: pointer;
  transition: all 0.2s;
  text-align: center;
}

.quality-btn:last-child { border-right: none; }

.quality-btn:hover { background: var(--bg-tertiary); color: var(--text-primary); }

.quality-btn.active {
  background: var(--cyan);
  color: var(--bg-primary);
  font-weight: 600;
  text-shadow: none;
}

/* Convert button */
.convert-section {
  margin-bottom: 24px;
}

.convert-btn {
  width: 100%;
  padding: 16px;
  background: linear-gradient(135deg, var(--cyan), #0099cc);
  border: none;
  border-radius: 4px;
  font-family: var(--font-display);
  font-size: 1.4rem;
  color: var(--bg-primary);
  cursor: pointer;
  transition: all 0.2s;
  letter-spacing: 4px;
  text-shadow: 0 1px 2px rgba(0, 0, 0, 0.3);
  box-shadow: 0 4px 20px var(--cyan-glow);
}

.convert-btn:hover:not(:disabled) {
  transform: translateY(-1px);
  box-shadow: 0 6px 30px var(--cyan-glow);
}

.convert-btn:active:not(:disabled) {
  transform: translateY(0);
}

.convert-btn:disabled {
  opacity: 0.4;
  cursor: not-allowed;
}

/* Progress section */
.progress-section {
  margin-bottom: 24px;
  display: none;
}

.progress-section.visible { display: block; }

.progress-container {
  background: var(--bg-secondary);
  border: 1px solid var(--border);
  border-radius: 4px;
  padding: 20px;
}

.progress-status {
  font-family: var(--font-mono);
  font-size: 0.8rem;
  color: var(--cyan);
  margin-bottom: 12px;
  display: flex;
  align-items: center;
  gap: 8px;
}

.progress-spinner {
  width: 14px;
  height: 14px;
  border: 2px solid var(--cyan-dim);
  border-top-color: var(--cyan);
  border-radius: 50%;
  animation: spin 0.8s linear infinite;
  flex-shrink: 0;
}

@keyframes spin { to { transform: rotate(360deg); } }

.progress-bar-track {
  width: 100%;
  height: 4px;
  background: var(--bg-tertiary);
  border-radius: 2px;
  overflow: hidden;
}

.progress-bar-fill {
  height: 100%;
  background: linear-gradient(90deg, var(--cyan), var(--orange));
  border-radius: 2px;
  width: 0%;
  transition: width 0.4s ease;
}

.progress-bar-fill.indeterminate {
  width: 30%;
  animation: indeterminate 1.5s ease-in-out infinite;
}

@keyframes indeterminate {
  0% { transform: translateX(-100%); }
  100% { transform: translateX(400%); }
}

/* Result section */
.result-section {
  margin-bottom: 24px;
  display: none;
}

.result-section.visible { display: block; }

.result-success {
  background: var(--bg-secondary);
  border: 1px solid rgba(0, 255, 136, 0.3);
  border-radius: 4px;
  padding: 16px 20px;
  color: var(--green);
  font-family: var(--font-mono);
  font-size: 0.85rem;
}

.result-error {
  background: var(--bg-secondary);
  border: 1px solid rgba(255, 51, 85, 0.3);
  border-radius: 4px;
  padding: 16px 20px;
}

.result-error-msg {
  color: var(--red);
  font-family: var(--font-mono);
  font-size: 0.85rem;
  margin-bottom: 12px;
}

.retry-btn {
  background: transparent;
  border: 1px solid var(--orange);
  border-radius: 4px;
  color: var(--orange);
  font-family: var(--font-mono);
  font-size: 0.75rem;
  padding: 8px 20px;
  cursor: pointer;
  transition: all 0.2s;
  margin-right: 8px;
}

.retry-btn:hover {
  background: var(--orange);
  color: var(--bg-primary);
}

/* Fallback section */
.fallback-section {
  margin-top: 12px;
}

.fallback-toggle {
  background: none;
  border: none;
  color: var(--text-dim);
  font-family: var(--font-mono);
  font-size: 0.7rem;
  cursor: pointer;
  padding: 4px 0;
  text-decoration: underline;
  transition: color 0.2s;
}

.fallback-toggle:hover { color: var(--text-secondary); }

.fallback-content {
  display: none;
  margin-top: 8px;
  background: var(--bg-tertiary);
  border: 1px solid var(--border);
  border-radius: 4px;
  padding: 12px;
}

.fallback-content.visible { display: block; }

.fallback-content p {
  font-size: 0.7rem;
  color: var(--text-dim);
  margin-bottom: 8px;
}

.fallback-cmd {
  background: var(--bg-primary);
  border: 1px solid var(--border);
  border-radius: 3px;
  padding: 8px 10px;
  font-family: var(--font-mono);
  font-size: 0.72rem;
  color: var(--orange);
  word-break: break-all;
  user-select: all;
}

/* History */
.history-section {
  margin-bottom: 40px;
}

.history-header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  margin-bottom: 12px;
}

.history-title {
  font-family: var(--font-mono);
  font-size: 0.7rem;
  color: var(--text-dim);
  text-transform: uppercase;
  letter-spacing: 2px;
}

.history-clear-btn {
  background: none;
  border: 1px solid var(--border);
  border-radius: 3px;
  color: var(--text-dim);
  font-family: var(--font-mono);
  font-size: 0.65rem;
  padding: 4px 10px;
  cursor: pointer;
  transition: all 0.2s;
}

.history-clear-btn:hover {
  border-color: var(--red);
  color: var(--red);
}

.history-list {
  display: flex;
  flex-direction: column;
  gap: 6px;
}

.history-empty {
  text-align: center;
  color: var(--text-dim);
  font-size: 0.75rem;
  padding: 20px;
  border: 1px dashed var(--border);
  border-radius: 4px;
}

.history-item {
  display: flex;
  align-items: center;
  gap: 12px;
  background: var(--bg-secondary);
  border: 1px solid var(--border);
  border-radius: 4px;
  padding: 10px 12px;
  cursor: pointer;
  transition: all 0.2s;
}

.history-item:hover {
  border-color: var(--cyan-dim);
  background: var(--bg-tertiary);
}

.history-item-thumb {
  width: 64px;
  height: 36px;
  background-size: cover;
  background-position: center;
  background-color: var(--bg-tertiary);
  border-radius: 3px;
  flex-shrink: 0;
}

.history-item-info {
  flex: 1;
  min-width: 0;
}

.history-item-url {
  font-family: var(--font-mono);
  font-size: 0.72rem;
  color: var(--text-secondary);
  overflow: hidden;
  text-overflow: ellipsis;
  white-space: nowrap;
}

.history-item-time {
  font-family: var(--font-mono);
  font-size: 0.6rem;
  color: var(--text-dim);
  margin-top: 2px;
}

.history-item-delete {
  background: none;
  border: none;
  color: var(--text-dim);
  font-size: 1rem;
  cursor: pointer;
  padding: 4px 6px;
  transition: color 0.2s;
  flex-shrink: 0;
}

.history-item-delete:hover { color: var(--red); }

/* Footer */
.footer {
  text-align: center;
  padding: 20px;
  border-top: 1px solid var(--border);
  margin-top: 20px;
}

.footer-text {
  font-family: var(--font-mono);
  font-size: 0.65rem;
  color: var(--text-dim);
  line-height: 1.6;
}

/* Fixed badge */
.korb-badge {
  position: fixed;
  bottom: 16px;
  right: 16px;
  background: var(--bg-secondary);
  border: 1px solid var(--border);
  border-radius: 4px;
  padding: 8px 14px;
  font-family: var(--font-display);
  font-size: 0.6rem;
  color: var(--cyan);
  text-shadow: 0 0 8px var(--cyan-glow);
  letter-spacing: 2px;
  z-index: 9998;
  user-select: none;
}

/* Responsive */
@media (max-width: 600px) {
  .header-title { font-size: 1.6rem; letter-spacing: 2px; }
  .container { padding: 24px 14px 120px; }
  .preview-card { flex-direction: column; }
  .preview-thumb { width: 100%; height: 160px; }
  .quality-btn { font-size: 0.65rem; padding: 8px 4px; }
  .convert-btn { font-size: 1.1rem; }
  .input-wrapper { flex-direction: column; }
  .input-btn { padding: 10px 14px; }
  .korb-badge { font-size: 0.5rem; padding: 6px 10px; }
}
</style>
</head>
<body>

<div id="toast-container"></div>

<div class="container">
  <!-- Header -->
  <div class="header">
    <div class="header-title">KORB &middot; YT2MP3</div>
    <div class="header-sub">YouTube Audio Converter</div>
  </div>

  <!-- URL Input -->
  <div class="input-section">
    <label class="input-label">YouTube URL</label>
    <div class="input-wrapper">
      <input type="text" id="url-input" class="url-input" placeholder="Paste YouTube URL here..." autocomplete="off" spellcheck="false">
      <button class="input-btn" id="paste-btn" title="Paste from clipboard">PASTE</button>
      <button class="input-btn" id="clear-btn" title="Clear input">CLEAR</button>
    </div>
  </div>

  <!-- Preview -->
  <div class="preview-section" id="preview-section">
    <div class="preview-card">
      <div class="preview-thumb" id="preview-thumb"></div>
      <div class="preview-info">
        <div class="preview-id" id="preview-id">VIDEO ID</div>
        <div class="preview-url" id="preview-url"></div>
      </div>
    </div>
  </div>

  <!-- Quality -->
  <div class="quality-section">
    <label class="input-label">Audio Quality</label>
    <div class="quality-buttons" id="quality-buttons">
      <button class="quality-btn" data-bitrate="128">128 kbps</button>
      <button class="quality-btn" data-bitrate="256">256 kbps</button>
      <button class="quality-btn" data-bitrate="320">320 kbps</button>
      <button class="quality-btn active" data-bitrate="0">BEST</button>
    </div>
  </div>

  <!-- Convert -->
  <div class="convert-section">
    <button class="convert-btn" id="convert-btn" disabled>CONVERT</button>
  </div>

  <!-- Progress -->
  <div class="progress-section" id="progress-section">
    <div class="progress-container">
      <div class="progress-status">
        <div class="progress-spinner"></div>
        <span id="progress-text">Initializing...</span>
      </div>
      <div class="progress-bar-track">
        <div class="progress-bar-fill indeterminate" id="progress-bar"></div>
      </div>
    </div>
  </div>

  <!-- Result -->
  <div class="result-section" id="result-section"></div>

  <!-- History -->
  <div class="history-section">
    <div class="history-header">
      <div class="history-title">Conversion History</div>
      <button class="history-clear-btn" id="history-clear-btn">Clear All</button>
    </div>
    <div class="history-list" id="history-list">
      <div class="history-empty">No conversions yet</div>
    </div>
  </div>

  <!-- Footer -->
  <div class="footer">
    <div class="footer-text">
      This tool connects to third-party audio extraction services.<br>
      No files are stored on Korb Engineering servers.<br>
      For personal use only. Respect copyright.
    </div>
  </div>
</div>

<div class="korb-badge">KORB ENGINEERING</div>

<script>
(function() {
  'use strict';

  // --- DOM refs ---
  const urlInput = document.getElementById('url-input');
  const pasteBtn = document.getElementById('paste-btn');
  const clearBtn = document.getElementById('clear-btn');
  const previewSection = document.getElementById('preview-section');
  const previewThumb = document.getElementById('preview-thumb');
  const previewId = document.getElementById('preview-id');
  const previewUrl = document.getElementById('preview-url');
  const qualityButtons = document.getElementById('quality-buttons');
  const convertBtn = document.getElementById('convert-btn');
  const progressSection = document.getElementById('progress-section');
  const progressText = document.getElementById('progress-text');
  const progressBar = document.getElementById('progress-bar');
  const resultSection = document.getElementById('result-section');
  const historyList = document.getElementById('history-list');
  const historyClearBtn = document.getElementById('history-clear-btn');
  const toastContainer = document.getElementById('toast-container');

  // --- State ---
  let currentVideoId = null;
  let currentUrl = '';
  let selectedBitrate = 0; // 0 = best
  let isConverting = false;

  // --- YouTube URL parsing ---
  const YT_REGEX = /(?:https?:\/\/)?(?:www\.|m\.)?(?:youtube\.com\/(?:watch\?.*v=|shorts\/|embed\/|v\/)|youtu\.be\/)([a-zA-Z0-9_-]{11})/;

  function extractVideoId(url) {
    const m = url.match(YT_REGEX);
    return m ? m[1] : null;
  }

  function validateUrl(url) {
    return YT_REGEX.test(url.trim());
  }

  // --- Toast ---
  function showToast(msg, type) {
    const t = document.createElement('div');
    t.className = 'toast' + (type ? ' ' + type : '');
    t.textContent = msg;
    toastContainer.appendChild(t);
    setTimeout(() => { if (t.parentNode) t.remove(); }, 3200);
  }

  // --- Thumbnail loading with fallback ---
  function loadThumbnail(videoId, el) {
    const maxres = `https://img.youtube.com/vi/${videoId}/maxresdefault.jpg`;
    const hq = `https://img.youtube.com/vi/${videoId}/hqdefault.jpg`;
    const img = new Image();
    img.onload = function() {
      // maxresdefault returns a tiny grey placeholder (120x90) if not available
      if (img.naturalWidth > 200) {
        el.style.backgroundImage = `url(${maxres})`;
      } else {
        el.style.backgroundImage = `url(${hq})`;
      }
    };
    img.onerror = function() {
      el.style.backgroundImage = `url(${hq})`;
    };
    img.src = maxres;
  }

  // --- URL input handling ---
  function handleUrlChange() {
    const val = urlInput.value.trim();
    if (!val) {
      urlInput.classList.remove('valid', 'invalid');
      previewSection.classList.remove('visible');
      convertBtn.disabled = true;
      currentVideoId = null;
      currentUrl = '';
      return;
    }
    const vid = extractVideoId(val);
    if (vid) {
      urlInput.classList.remove('invalid');
      urlInput.classList.add('valid');
      currentVideoId = vid;
      currentUrl = val;
      // Show preview
      previewSection.classList.add('visible');
      loadThumbnail(vid, previewThumb);
      previewId.textContent = 'ID: ' + vid;
      previewUrl.textContent = val;
      convertBtn.disabled = false;
    } else {
      urlInput.classList.remove('valid');
      urlInput.classList.add('invalid');
      previewSection.classList.remove('visible');
      convertBtn.disabled = true;
      currentVideoId = null;
      currentUrl = '';
    }
  }

  urlInput.addEventListener('input', handleUrlChange);

  pasteBtn.addEventListener('click', async () => {
    try {
      const text = await navigator.clipboard.readText();
      urlInput.value = text;
      handleUrlChange();
      showToast('Pasted from clipboard', 'success');
    } catch(e) {
      showToast('Clipboard access denied', 'error');
    }
  });

  clearBtn.addEventListener('click', () => {
    urlInput.value = '';
    handleUrlChange();
  });

  // Global paste detection
  document.addEventListener('paste', (e) => {
    if (document.activeElement === urlInput) return; // let native paste handle it
    const text = (e.clipboardData || window.clipboardData).getData('text');
    if (text && validateUrl(text)) {
      urlInput.value = text;
      handleUrlChange();
      showToast('URL detected and pasted', 'success');
    }
  });

  // --- Quality buttons ---
  qualityButtons.addEventListener('click', (e) => {
    const btn = e.target.closest('.quality-btn');
    if (!btn) return;
    qualityButtons.querySelectorAll('.quality-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    selectedBitrate = parseInt(btn.dataset.bitrate, 10);
  });

  // --- Conversion logic ---
  async function convertVideo(youtubeUrl, format) {
    const videoId = extractVideoId(youtubeUrl);
    const bitrateParam = selectedBitrate > 0 ? selectedBitrate.toString() : undefined;

    const endpoints = [
      // Method 1: cobalt community instances (no JWT required)
      async () => {
        updateProgress('Connecting to conversion service...', 15);
        const instances = [
          'https://cobalt-api.kwiatekmiki.com',
          'https://cobalt.api.timelessnesses.me',
          'https://cobalt-api.ayo.tf'
        ];
        for (const base of instances) {
          try {
            const bodyObj = { url: youtubeUrl, downloadMode: 'audio', audioFormat: 'mp3' };
            if (bitrateParam) bodyObj.audioBitrate = bitrateParam;
            const resp = await fetch(base, {
              method: 'POST',
              headers: { 'Accept': 'application/json', 'Content-Type': 'application/json' },
              body: JSON.stringify(bodyObj),
              signal: AbortSignal.timeout(15000)
            });
            if (!resp.ok) continue;
            const data = await resp.json();
            if (data.url) return data.url;
            if (data.audio) return data.audio;
          } catch(e) { continue; }
        }
        throw new Error('All cobalt instances failed');
      },

      // Method 2: Use CORS proxies to reach cobalt official API
      async () => {
        updateProgress('Trying alternative service...', 40);
        const proxies = [
          url => `https://api.codetabs.com/v1/proxy?quest=${encodeURIComponent(url)}`,
          url => `https://corsproxy.io/?${encodeURIComponent(url)}`
        ];
        for (const proxyFn of proxies) {
          try {
            const targetUrl = 'https://api.cobalt.tools/';
            const bodyObj = { url: youtubeUrl, downloadMode: 'audio', audioFormat: 'mp3' };
            if (bitrateParam) bodyObj.audioBitrate = bitrateParam;
            const resp = await fetch(proxyFn(targetUrl), {
              method: 'POST',
              headers: { 'Accept': 'application/json', 'Content-Type': 'application/json' },
              body: JSON.stringify(bodyObj),
              signal: AbortSignal.timeout(15000)
            });
            if (!resp.ok) continue;
            const data = await resp.json();
            if (data.url) return data.url;
          } catch(e) { continue; }
        }
        throw new Error('Proxy methods failed');
      },

      // Method 3: Use piped.video API (alternative YouTube frontend with API)
      async () => {
        updateProgress('Trying audio stream extraction...', 65);
        if (!videoId) throw new Error('No video ID');
        const pipedInstances = [
          'https://pipedapi.kavin.rocks',
          'https://pipedapi.adminforge.de'
        ];
        for (const base of pipedInstances) {
          try {
            const resp = await fetch(`${base}/streams/${videoId}`, {
              signal: AbortSignal.timeout(10000)
            });
            if (!resp.ok) continue;
            const data = await resp.json();
            if (data.audioStreams && data.audioStreams.length > 0) {
              const sorted = data.audioStreams
                .filter(s => s.mimeType && s.mimeType.includes('audio'))
                .sort((a, b) => (b.bitrate || 0) - (a.bitrate || 0));
              if (sorted.length > 0) return sorted[0].url;
            }
          } catch(e) { continue; }
        }
        throw new Error('Piped instances failed');
      }
    ];

    // Try each method in sequence
    const errors = [];
    for (const method of endpoints) {
      try {
        const downloadUrl = await method();
        if (downloadUrl) return downloadUrl;
      } catch(e) {
        errors.push(e.message);
      }
    }
    throw new Error('All conversion methods failed: ' + errors.join('; '));
  }

  function updateProgress(text, pct) {
    progressText.textContent = text;
    if (pct !== undefined) {
      progressBar.classList.remove('indeterminate');
      progressBar.style.width = pct + '%';
    }
  }

  function triggerDownload(url, filename) {
    const a = document.createElement('a');
    a.href = url;
    a.download = filename || 'audio.mp3';
    a.target = '_blank';
    a.rel = 'noopener';
    document.body.appendChild(a);
    a.click();
    document.body.removeChild(a);
  }

  // --- Convert button handler ---
  async function startConversion() {
    if (!currentUrl || !currentVideoId || isConverting) return;

    isConverting = true;
    convertBtn.disabled = true;
    resultSection.classList.remove('visible');
    resultSection.innerHTML = '';
    progressSection.classList.add('visible');
    progressBar.classList.add('indeterminate');
    progressBar.style.width = '30%';
    updateProgress('Connecting to conversion service...', undefined);

    try {
      const downloadUrl = await convertVideo(currentUrl);
      updateProgress('Preparing download...', 90);

      // Brief pause for UX
      await new Promise(r => setTimeout(r, 500));
      updateProgress('Download starting...', 100);

      const filename = `yt-${currentVideoId}.mp3`;
      triggerDownload(downloadUrl, filename);

      // Show success
      progressSection.classList.remove('visible');
      resultSection.innerHTML = `<div class="result-success">Audio downloaded successfully (best available format). Check your downloads folder.</div>`;
      resultSection.classList.add('visible');
      showToast('Download started', 'success');

      // Add to history
      addToHistory(currentUrl, currentVideoId);

    } catch(err) {
      progressSection.classList.remove('visible');
      resultSection.innerHTML = `
        <div class="result-error">
          <div class="result-error-msg">All conversion services are currently unavailable. Try again in a moment.</div>
          <button class="retry-btn" id="retry-btn">RETRY</button>
          <div class="fallback-section">
            <button class="fallback-toggle" id="fallback-toggle">Alternative: use yt-dlp locally</button>
            <div class="fallback-content" id="fallback-content">
              <p>Install yt-dlp and run this in your terminal:</p>
              <div class="fallback-cmd">yt-dlp -x --audio-format mp3 "${currentUrl}"</div>
            </div>
          </div>
        </div>
      `;
      resultSection.classList.add('visible');
      showToast('Conversion failed', 'error');

      // Wire up retry and fallback
      document.getElementById('retry-btn').addEventListener('click', () => { startConversion(); });
      document.getElementById('fallback-toggle').addEventListener('click', () => {
        document.getElementById('fallback-content').classList.toggle('visible');
      });
    } finally {
      isConverting = false;
      convertBtn.disabled = !currentVideoId;
    }
  }

  convertBtn.addEventListener('click', startConversion);

  // --- History ---
  const HISTORY_KEY = 'korb_yt2mp3_history';
  const MAX_HISTORY = 20;

  function getHistory() {
    try {
      return JSON.parse(localStorage.getItem(HISTORY_KEY)) || [];
    } catch { return []; }
  }

  function saveHistory(h) {
    localStorage.setItem(HISTORY_KEY, JSON.stringify(h));
  }

  function addToHistory(url, videoId) {
    let h = getHistory();
    // Remove duplicate if exists
    h = h.filter(item => item.videoId !== videoId);
    h.unshift({ url, videoId, timestamp: Date.now() });
    if (h.length > MAX_HISTORY) h = h.slice(0, MAX_HISTORY);
    saveHistory(h);
    renderHistory();
  }

  function removeFromHistory(videoId) {
    let h = getHistory().filter(item => item.videoId !== videoId);
    saveHistory(h);
    renderHistory();
  }

  function clearHistory() {
    localStorage.removeItem(HISTORY_KEY);
    renderHistory();
  }

  function renderHistory() {
    const h = getHistory();
    if (h.length === 0) {
      historyList.innerHTML = '<div class="history-empty">No conversions yet</div>';
      return;
    }
    historyList.innerHTML = h.map(item => {
      const thumbUrl = `https://img.youtube.com/vi/${item.videoId}/default.jpg`;
      const date = new Date(item.timestamp);
      const timeStr = date.toLocaleDateString() + ' ' + date.toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
      return `
        <div class="history-item" data-url="${item.url}" data-vid="${item.videoId}">
          <div class="history-item-thumb" style="background-image:url(${thumbUrl})"></div>
          <div class="history-item-info">
            <div class="history-item-url">${item.url}</div>
            <div class="history-item-time">${timeStr}</div>
          </div>
          <button class="history-item-delete" data-delete="${item.videoId}" title="Remove">&times;</button>
        </div>
      `;
    }).join('');
  }

  historyList.addEventListener('click', (e) => {
    const delBtn = e.target.closest('.history-item-delete');
    if (delBtn) {
      e.stopPropagation();
      removeFromHistory(delBtn.dataset.delete);
      showToast('Removed from history');
      return;
    }
    const item = e.target.closest('.history-item');
    if (item) {
      urlInput.value = item.dataset.url;
      handleUrlChange();
      window.scrollTo({ top: 0, behavior: 'smooth' });
    }
  });

  historyClearBtn.addEventListener('click', () => {
    clearHistory();
    showToast('History cleared');
  });

  // Initial render
  renderHistory();

})();
</script>
</body>
