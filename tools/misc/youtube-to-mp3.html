<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>YT2MP3 | KORB ENGINEERING</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
@font-face {
  font-family: 'DSEG14 Classic';
  src: url('https://cdn.jsdelivr.net/npm/dseg@0.46.0/fonts/DSEG14-Classic/DSEG14Classic-Bold.woff2') format('woff2'),
       url('https://cdn.jsdelivr.net/npm/dseg@0.46.0/fonts/DSEG14-Classic/DSEG14Classic-Bold.woff') format('woff');
  font-weight: bold;
  font-style: normal;
  font-display: swap;
}

:root {
  --bg-deep: #050a0f;
  --bg-panel: #0a1018;
  --bg-card: #0d1520;
  --bg-input: #0b1219;
  --cyan: #00d4ff;
  --cyan-dim: rgba(0, 212, 255, 0.15);
  --cyan-glow: rgba(0, 212, 255, 0.5);
  --orange: #ff6600;
  --orange-dim: rgba(255, 102, 0, 0.15);
  --orange-glow: rgba(255, 102, 0, 0.5);
  --red: #ff2244;
  --green: #00ff88;
  --text: #c8d8e8;
  --text-dim: #5a7080;
  --border: rgba(0, 212, 255, 0.12);
  --font-vfd: 'DSEG14 Classic', 'Courier New', monospace;
  --font-mono: 'IBM Plex Mono', 'JetBrains Mono', 'Courier New', monospace;
}

* { margin: 0; padding: 0; box-sizing: border-box; }

html { scroll-behavior: smooth; }

body {
  background: var(--bg-deep);
  color: var(--text);
  font-family: var(--font-mono);
  min-height: 100vh;
  overflow-x: hidden;
  position: relative;
}

/* Scanline overlay */
body::after {
  content: '';
  position: fixed;
  inset: 0;
  pointer-events: none;
  z-index: 9999;
  background: repeating-linear-gradient(
    0deg,
    transparent,
    transparent 2px,
    rgba(0, 0, 0, 0.08) 2px,
    rgba(0, 0, 0, 0.08) 4px
  );
}

/* Subtle vignette */
body::before {
  content: '';
  position: fixed;
  inset: 0;
  pointer-events: none;
  z-index: 9998;
  background: radial-gradient(ellipse at center, transparent 50%, rgba(0, 0, 0, 0.5) 100%);
}

.container {
  max-width: 680px;
  margin: 0 auto;
  padding: 1.5rem 1rem 3rem;
  position: relative;
  z-index: 1;
}

/* Header */
.header {
  text-align: center;
  padding: 2rem 0 1.5rem;
}

.header-eyebrow {
  font-family: var(--font-mono);
  font-size: 0.7rem;
  letter-spacing: 0.4em;
  text-transform: uppercase;
  color: var(--orange);
  margin-bottom: 0.5rem;
  text-shadow: 0 0 8px var(--orange-glow);
}

.header-title {
  font-family: var(--font-vfd);
  font-size: clamp(2rem, 6vw, 3.2rem);
  color: var(--cyan);
  text-shadow:
    0 0 8px var(--cyan-glow),
    0 0 20px rgba(0, 212, 255, 0.3),
    0 0 40px rgba(0, 212, 255, 0.1);
  line-height: 1.2;
  letter-spacing: 0.05em;
}

.header-sub {
  font-family: var(--font-mono);
  font-size: 0.8rem;
  color: var(--text-dim);
  margin-top: 0.4rem;
  letter-spacing: 0.15em;
}

/* Divider line */
.divider {
  height: 1px;
  background: linear-gradient(90deg, transparent, var(--cyan-dim), var(--border), var(--cyan-dim), transparent);
  margin: 1rem 0;
}

/* Input Section */
.input-section {
  margin: 1.5rem 0;
}

.input-label {
  font-size: 0.7rem;
  letter-spacing: 0.2em;
  text-transform: uppercase;
  color: var(--text-dim);
  margin-bottom: 0.5rem;
  display: block;
}

.input-wrap {
  display: flex;
  gap: 0;
  border: 1px solid var(--border);
  border-radius: 6px;
  overflow: hidden;
  background: var(--bg-input);
  transition: border-color 0.3s;
}

.input-wrap:focus-within {
  border-color: var(--cyan);
  box-shadow: 0 0 12px rgba(0, 212, 255, 0.15);
}

.input-wrap.error {
  border-color: var(--red);
  box-shadow: 0 0 12px rgba(255, 34, 68, 0.15);
}

.input-wrap.valid {
  border-color: var(--green);
  box-shadow: 0 0 12px rgba(0, 255, 136, 0.15);
}

#url-input {
  flex: 1;
  background: transparent;
  border: none;
  outline: none;
  color: var(--cyan);
  font-family: var(--font-mono);
  font-size: 0.95rem;
  padding: 0.9rem 1rem;
  text-shadow: 0 0 4px var(--cyan-glow);
}

#url-input::placeholder {
  color: var(--text-dim);
  text-shadow: none;
}

.input-btn {
  background: transparent;
  border: none;
  border-left: 1px solid var(--border);
  color: var(--text-dim);
  cursor: pointer;
  padding: 0 0.8rem;
  font-family: var(--font-mono);
  font-size: 0.8rem;
  transition: all 0.2s;
  display: flex;
  align-items: center;
  gap: 0.3rem;
}

.input-btn:hover {
  background: var(--cyan-dim);
  color: var(--cyan);
}

.input-btn.clear-btn:hover {
  background: rgba(255, 34, 68, 0.1);
  color: var(--red);
}

/* Preview Card */
.preview-card {
  margin: 1.5rem 0;
  border: 1px solid var(--border);
  border-radius: 6px;
  background: var(--bg-card);
  overflow: hidden;
  display: none;
  animation: fadeSlideIn 0.3s ease-out;
}

.preview-card.visible { display: block; }

@keyframes fadeSlideIn {
  from { opacity: 0; transform: translateY(8px); }
  to   { opacity: 1; transform: translateY(0); }
}

.preview-thumb-wrap {
  position: relative;
  width: 100%;
  aspect-ratio: 16 / 9;
  background: var(--bg-deep);
  overflow: hidden;
}

.preview-thumb-wrap img {
  width: 100%;
  height: 100%;
  object-fit: cover;
  display: block;
}

.preview-thumb-wrap .thumb-overlay {
  position: absolute;
  inset: 0;
  background: linear-gradient(0deg, rgba(5, 10, 15, 0.7) 0%, transparent 40%);
  pointer-events: none;
}

.preview-id {
  position: absolute;
  bottom: 0.5rem;
  left: 0.6rem;
  font-size: 0.65rem;
  color: var(--cyan);
  text-shadow: 0 0 6px var(--cyan-glow);
  font-family: var(--font-mono);
  letter-spacing: 0.1em;
}

/* Quality Selector */
.quality-section {
  margin: 1.5rem 0;
}

.quality-label {
  font-size: 0.7rem;
  letter-spacing: 0.2em;
  text-transform: uppercase;
  color: var(--text-dim);
  margin-bottom: 0.6rem;
  display: block;
}

.quality-btns {
  display: flex;
  gap: 0;
  border: 1px solid var(--border);
  border-radius: 6px;
  overflow: hidden;
}

.quality-btn {
  flex: 1;
  background: var(--bg-input);
  border: none;
  border-right: 1px solid var(--border);
  color: var(--text-dim);
  font-family: var(--font-mono);
  font-size: 0.75rem;
  padding: 0.7rem 0.4rem;
  cursor: pointer;
  transition: all 0.2s;
  text-align: center;
}

.quality-btn:last-child { border-right: none; }

.quality-btn:hover {
  background: var(--cyan-dim);
  color: var(--text);
}

.quality-btn.active {
  background: rgba(0, 212, 255, 0.12);
  color: var(--cyan);
  text-shadow: 0 0 6px var(--cyan-glow);
  font-weight: 600;
}

.quality-info {
  font-size: 0.65rem;
  color: var(--text-dim);
  margin-top: 0.4rem;
  text-align: right;
}

/* Convert Button */
.convert-wrap {
  margin: 1.5rem 0;
}

#convert-btn {
  width: 100%;
  padding: 1rem;
  border: 1px solid var(--cyan);
  border-radius: 6px;
  background: rgba(0, 212, 255, 0.08);
  color: var(--cyan);
  font-family: var(--font-vfd);
  font-size: 1.3rem;
  letter-spacing: 0.15em;
  cursor: pointer;
  transition: all 0.3s;
  text-shadow: 0 0 8px var(--cyan-glow);
  position: relative;
  overflow: hidden;
}

#convert-btn:hover:not(:disabled) {
  background: rgba(0, 212, 255, 0.15);
  box-shadow: 0 0 20px rgba(0, 212, 255, 0.2), inset 0 0 20px rgba(0, 212, 255, 0.05);
}

#convert-btn:active:not(:disabled) {
  transform: scale(0.98);
}

#convert-btn:disabled {
  opacity: 0.3;
  cursor: not-allowed;
}

#convert-btn.loading {
  color: transparent;
  pointer-events: none;
}

#convert-btn.loading::after {
  content: '';
  position: absolute;
  top: 0;
  left: -100%;
  width: 100%;
  height: 100%;
  background: linear-gradient(90deg, transparent, rgba(0, 212, 255, 0.15), transparent);
  animation: shimmer 1.5s infinite;
}

@keyframes shimmer {
  to { left: 100%; }
}

.loading-text {
  position: absolute;
  inset: 0;
  display: none;
  align-items: center;
  justify-content: center;
  font-family: var(--font-mono);
  font-size: 0.85rem;
  color: var(--cyan);
  text-shadow: 0 0 8px var(--cyan-glow);
  letter-spacing: 0.1em;
}

#convert-btn.loading .loading-text {
  display: flex;
}

.loading-text .dot {
  animation: blink 1.2s infinite;
}
.loading-text .dot:nth-child(2) { animation-delay: 0.2s; }
.loading-text .dot:nth-child(3) { animation-delay: 0.4s; }

@keyframes blink {
  0%, 100% { opacity: 0.2; }
  50%      { opacity: 1; }
}

/* Status / Error Messages */
.status-box {
  margin: 1rem 0;
  padding: 0.8rem 1rem;
  border-radius: 6px;
  font-size: 0.8rem;
  line-height: 1.6;
  display: none;
  animation: fadeSlideIn 0.3s ease-out;
}

.status-box.visible { display: block; }

.status-box.error {
  border: 1px solid rgba(255, 34, 68, 0.3);
  background: rgba(255, 34, 68, 0.06);
  color: #ff8899;
}

.status-box.success {
  border: 1px solid rgba(0, 255, 136, 0.3);
  background: rgba(0, 255, 136, 0.06);
  color: var(--green);
}

.status-box.info {
  border: 1px solid var(--border);
  background: var(--bg-card);
  color: var(--text);
}

.status-box a {
  color: var(--cyan);
  text-decoration: underline;
  text-underline-offset: 2px;
}

.status-box a:hover {
  text-shadow: 0 0 6px var(--cyan-glow);
}

.status-box code {
  display: block;
  background: var(--bg-deep);
  border: 1px solid var(--border);
  border-radius: 4px;
  padding: 0.5rem 0.7rem;
  margin: 0.5rem 0;
  font-family: var(--font-mono);
  font-size: 0.75rem;
  color: var(--orange);
  word-break: break-all;
  cursor: pointer;
  transition: border-color 0.2s;
}

.status-box code:hover {
  border-color: var(--orange);
}

.status-box .fallback-options {
  margin-top: 0.6rem;
}

.status-box .fallback-options li {
  margin: 0.4rem 0;
  list-style: none;
  padding-left: 1.2rem;
  position: relative;
}

.status-box .fallback-options li::before {
  content: '>';
  position: absolute;
  left: 0;
  color: var(--cyan);
}

.copy-toast {
  display: inline-block;
  font-size: 0.65rem;
  color: var(--green);
  margin-left: 0.4rem;
  opacity: 0;
  transition: opacity 0.3s;
}

.copy-toast.show { opacity: 1; }

/* History Section */
.history-section {
  margin: 2rem 0 1rem;
}

.history-header {
  display: flex;
  justify-content: space-between;
  align-items: center;
  margin-bottom: 0.6rem;
}

.history-title {
  font-size: 0.7rem;
  letter-spacing: 0.2em;
  text-transform: uppercase;
  color: var(--text-dim);
}

.history-clear {
  font-family: var(--font-mono);
  font-size: 0.65rem;
  color: var(--text-dim);
  background: none;
  border: 1px solid var(--border);
  border-radius: 4px;
  padding: 0.2rem 0.5rem;
  cursor: pointer;
  transition: all 0.2s;
}

.history-clear:hover {
  color: var(--red);
  border-color: rgba(255, 34, 68, 0.3);
}

.history-list {
  list-style: none;
}

.history-item {
  display: flex;
  align-items: center;
  gap: 0.6rem;
  padding: 0.6rem 0.7rem;
  border: 1px solid var(--border);
  border-radius: 5px;
  margin-bottom: 0.4rem;
  background: var(--bg-card);
  cursor: pointer;
  transition: all 0.2s;
}

.history-item:hover {
  border-color: rgba(0, 212, 255, 0.3);
  background: rgba(0, 212, 255, 0.03);
}

.history-thumb {
  width: 48px;
  height: 36px;
  border-radius: 3px;
  object-fit: cover;
  flex-shrink: 0;
  background: var(--bg-deep);
}

.history-info {
  flex: 1;
  min-width: 0;
}

.history-url {
  font-size: 0.72rem;
  color: var(--cyan);
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
  text-shadow: 0 0 4px var(--cyan-glow);
}

.history-time {
  font-size: 0.6rem;
  color: var(--text-dim);
  margin-top: 0.15rem;
}

.history-del {
  background: none;
  border: none;
  color: var(--text-dim);
  cursor: pointer;
  font-size: 0.8rem;
  padding: 0.2rem;
  transition: color 0.2s;
  flex-shrink: 0;
}

.history-del:hover { color: var(--red); }

.history-empty {
  font-size: 0.75rem;
  color: var(--text-dim);
  text-align: center;
  padding: 1.5rem;
  border: 1px dashed var(--border);
  border-radius: 5px;
}

/* Footer */
.footer {
  text-align: center;
  padding: 2rem 1rem 1rem;
  font-size: 0.65rem;
  color: var(--text-dim);
  line-height: 1.7;
}

.footer .disclaimer {
  color: var(--orange);
  text-shadow: 0 0 4px var(--orange-glow);
}

/* Toast Notifications */
.toast-container {
  position: fixed;
  top: 1rem;
  right: 1rem;
  z-index: 10000;
  display: flex;
  flex-direction: column;
  gap: 0.5rem;
}

.toast {
  font-family: var(--font-mono);
  font-size: 0.75rem;
  padding: 0.6rem 1rem;
  border-radius: 5px;
  border: 1px solid;
  animation: toastIn 0.3s ease-out, toastOut 0.3s 3s ease-in forwards;
  max-width: 320px;
}

.toast.toast-error {
  background: rgba(255, 34, 68, 0.1);
  border-color: rgba(255, 34, 68, 0.3);
  color: #ff8899;
}

.toast.toast-success {
  background: rgba(0, 255, 136, 0.1);
  border-color: rgba(0, 255, 136, 0.3);
  color: var(--green);
}

.toast.toast-info {
  background: rgba(0, 212, 255, 0.1);
  border-color: rgba(0, 212, 255, 0.3);
  color: var(--cyan);
}

@keyframes toastIn {
  from { opacity: 0; transform: translateX(20px); }
  to   { opacity: 1; transform: translateX(0); }
}

@keyframes toastOut {
  from { opacity: 1; }
  to   { opacity: 0; transform: translateY(-10px); }
}

/* Responsive */
@media (max-width: 500px) {
  .container { padding: 1rem 0.7rem 2rem; }
  .header-title { font-size: 1.8rem; }
  #url-input { font-size: 0.85rem; padding: 0.75rem 0.7rem; }
  .quality-btn { font-size: 0.68rem; padding: 0.6rem 0.2rem; }
  #convert-btn { font-size: 1.1rem; }
  .history-item { padding: 0.5rem; }
}
</style>
</head>
<body>

<div class="toast-container" id="toast-container"></div>

<div class="container">

  <!-- Header -->
  <div class="header">
    <div class="header-eyebrow">KORB ENGINEERING</div>
    <div class="header-title">KORB &middot; YT2MP3</div>
    <div class="header-sub">YouTube Audio Extractor</div>
  </div>

  <div class="divider"></div>

  <!-- URL Input -->
  <div class="input-section">
    <label class="input-label" for="url-input">Paste YouTube URL</label>
    <div class="input-wrap" id="input-wrap">
      <input type="text" id="url-input" placeholder="https://www.youtube.com/watch?v=..." autocomplete="off" spellcheck="false">
      <button class="input-btn paste-btn" id="paste-btn" title="Paste from clipboard">PASTE</button>
      <button class="input-btn clear-btn" id="clear-btn" title="Clear input">&times;</button>
    </div>
  </div>

  <!-- Preview Card -->
  <div class="preview-card" id="preview-card">
    <div class="preview-thumb-wrap">
      <img id="preview-img" src="" alt="Video thumbnail">
      <div class="thumb-overlay"></div>
      <span class="preview-id" id="preview-id"></span>
    </div>
  </div>

  <!-- Quality Selector -->
  <div class="quality-section">
    <span class="quality-label">Audio Quality</span>
    <div class="quality-btns" id="quality-btns">
      <button class="quality-btn" data-quality="128">128 kbps</button>
      <button class="quality-btn active" data-quality="256">256 kbps</button>
      <button class="quality-btn" data-quality="320">320 kbps</button>
      <button class="quality-btn" data-quality="best">BEST</button>
    </div>
    <div class="quality-info" id="quality-info">MP3 &middot; 256 kbps</div>
  </div>

  <!-- Convert Button -->
  <div class="convert-wrap">
    <button id="convert-btn" disabled>
      CONVERT
      <span class="loading-text">EXTRACTING<span class="dot">.</span><span class="dot">.</span><span class="dot">.</span></span>
    </button>
  </div>

  <!-- Status -->
  <div class="status-box" id="status-box"></div>

  <div class="divider"></div>

  <!-- History -->
  <div class="history-section">
    <div class="history-header">
      <span class="history-title">Recent Conversions</span>
      <button class="history-clear" id="history-clear">CLEAR ALL</button>
    </div>
    <ul class="history-list" id="history-list"></ul>
  </div>

  <!-- Footer -->
  <div class="footer">
    <div class="disclaimer">For personal use only. Respect content creators.</div>
    <div style="margin-top:0.3rem;">KORB ENGINEERING &middot; Static Tool &middot; No data collected</div>
  </div>

</div>

<script>
(function() {
  'use strict';

  // --- DOM refs ---
  const urlInput    = document.getElementById('url-input');
  const inputWrap   = document.getElementById('input-wrap');
  const pasteBtn    = document.getElementById('paste-btn');
  const clearBtn    = document.getElementById('clear-btn');
  const previewCard = document.getElementById('preview-card');
  const previewImg  = document.getElementById('preview-img');
  const previewId   = document.getElementById('preview-id');
  const qualityBtns = document.getElementById('quality-btns');
  const qualityInfo = document.getElementById('quality-info');
  const convertBtn  = document.getElementById('convert-btn');
  const statusBox   = document.getElementById('status-box');
  const historyList = document.getElementById('history-list');
  const historyClear= document.getElementById('history-clear');
  const toastContainer = document.getElementById('toast-container');

  let selectedQuality = '256';
  let currentVideoId  = null;
  let isConverting     = false;

  // --- YouTube URL parser ---
  const YT_REGEX = /(?:https?:\/\/)?(?:www\.|m\.)?(?:youtube\.com\/(?:watch\?(?:.*&)?v=|shorts\/|embed\/|v\/)|youtu\.be\/)([a-zA-Z0-9_-]{11})/;

  function extractVideoId(url) {
    const m = url.match(YT_REGEX);
    return m ? m[1] : null;
  }

  function isValidYouTubeUrl(url) {
    return !!extractVideoId(url);
  }

  // --- Thumbnail loader ---
  function loadThumbnail(videoId) {
    currentVideoId = videoId;
    previewId.textContent = 'ID: ' + videoId;

    const maxres = `https://img.youtube.com/vi/${videoId}/maxresdefault.jpg`;
    const hq     = `https://img.youtube.com/vi/${videoId}/hqdefault.jpg`;

    const img = new Image();
    img.onload = function() {
      // maxresdefault returns a 120x90 gray placeholder if unavailable
      if (img.naturalWidth > 200) {
        previewImg.src = maxres;
      } else {
        previewImg.src = hq;
      }
      previewCard.classList.add('visible');
    };
    img.onerror = function() {
      previewImg.src = hq;
      previewCard.classList.add('visible');
    };
    img.src = maxres;
  }

  // --- URL input handling ---
  function handleUrlChange(value) {
    const trimmed = value.trim();
    const vid = extractVideoId(trimmed);

    if (!trimmed) {
      inputWrap.classList.remove('valid', 'error');
      previewCard.classList.remove('visible');
      convertBtn.disabled = true;
      currentVideoId = null;
      hideStatus();
      return;
    }

    if (vid) {
      inputWrap.classList.remove('error');
      inputWrap.classList.add('valid');
      loadThumbnail(vid);
      convertBtn.disabled = false;
    } else {
      inputWrap.classList.remove('valid');
      inputWrap.classList.add('error');
      previewCard.classList.remove('visible');
      convertBtn.disabled = true;
      currentVideoId = null;
    }
  }

  urlInput.addEventListener('input', () => handleUrlChange(urlInput.value));

  // Paste button
  pasteBtn.addEventListener('click', async () => {
    try {
      const text = await navigator.clipboard.readText();
      urlInput.value = text;
      handleUrlChange(text);
      toast('Pasted from clipboard', 'info');
    } catch (e) {
      toast('Clipboard access denied', 'error');
    }
  });

  // Clear button
  clearBtn.addEventListener('click', () => {
    urlInput.value = '';
    handleUrlChange('');
    urlInput.focus();
  });

  // Global paste detection
  document.addEventListener('paste', (e) => {
    if (document.activeElement === urlInput) return; // let default handle it
    const text = (e.clipboardData || window.clipboardData).getData('text');
    if (text && isValidYouTubeUrl(text)) {
      urlInput.value = text;
      handleUrlChange(text);
      toast('YouTube URL detected and loaded', 'success');
    }
  });

  // --- Quality selector ---
  qualityBtns.addEventListener('click', (e) => {
    const btn = e.target.closest('.quality-btn');
    if (!btn) return;
    qualityBtns.querySelectorAll('.quality-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    selectedQuality = btn.dataset.quality;
    qualityInfo.textContent = selectedQuality === 'best'
      ? 'MP3 \u00B7 Best available quality'
      : `MP3 \u00B7 ${selectedQuality} kbps`;
  });

  // --- Status box ---
  function showStatus(html, type) {
    statusBox.className = 'status-box visible ' + type;
    statusBox.innerHTML = html;
  }

  function hideStatus() {
    statusBox.className = 'status-box';
    statusBox.innerHTML = '';
  }

  // --- Toast notifications ---
  function toast(msg, type = 'info') {
    const el = document.createElement('div');
    el.className = 'toast toast-' + type;
    el.textContent = msg;
    toastContainer.appendChild(el);
    setTimeout(() => { if (el.parentNode) el.remove(); }, 3500);
  }

  // --- Convert / Download ---
  convertBtn.addEventListener('click', startConversion);

  async function startConversion() {
    if (isConverting || !currentVideoId) return;
    isConverting = true;

    const url = urlInput.value.trim();
    const ytdlpCmd = `yt-dlp -x --audio-format mp3 "${url}"`;
    convertBtn.classList.add('loading');
    hideStatus();

    // Add to history
    addToHistory(url, currentVideoId);

    // Show conversion options
    showStatus(`
      <strong style="color:var(--cyan);font-size:15px;">Choose your download method:</strong>
      <ul class="fallback-options" style="margin-top:12px;">
        <li style="margin-bottom:16px;">
          <strong style="color:var(--green);">Option 1 — Web Converter</strong><br>
          <span style="color:var(--text-dim);font-size:12px;">Opens cobalt.tools — paste your URL and download as MP3</span><br>
          <a href="https://cobalt.tools/" target="_blank" rel="noopener" style="display:inline-block;margin-top:8px;padding:8px 20px;background:rgba(0,212,255,0.15);border:1px solid var(--cyan);border-radius:4px;color:var(--cyan);text-decoration:none;font-weight:600;letter-spacing:0.05em;transition:all 0.2s;" onmouseover="this.style.background='rgba(0,212,255,0.25)'" onmouseout="this.style.background='rgba(0,212,255,0.15)'">OPEN COBALT.TOOLS &rarr;</a>
          <br><span style="color:var(--text-dim);font-size:11px;margin-top:6px;display:inline-block;">URL copied to clipboard — just paste it there</span>
        </li>
        <li style="margin-bottom:16px;">
          <strong style="color:var(--orange);">Option 2 — Terminal (best quality)</strong><br>
          <span style="color:var(--text-dim);font-size:12px;">Run this command locally for highest quality MP3:</span><br>
          <code onclick="copyText(this)" title="Click to copy" style="margin-top:8px;display:block;">${escapeHtml(ytdlpCmd)}</code>
          <span class="copy-toast">Copied!</span>
        </li>
        <li>
          <span style="color:var(--text-dim);font-size:11px;">Don't have yt-dlp? Install it:</span><br>
          <code onclick="copyText(this)" title="Click to copy" style="font-size:12px;">brew install yt-dlp ffmpeg</code>
          <span class="copy-toast">Copied!</span>
        </li>
      </ul>
    `, 'success');

    // Copy URL to clipboard for easy pasting into cobalt
    try {
      await navigator.clipboard.writeText(url);
      toast('URL copied to clipboard!', 'success');
    } catch(e) {
      // clipboard may not be available
    }

    isConverting = false;
    convertBtn.classList.remove('loading');
  }

  // --- Copy helper (exposed globally for inline onclick) ---
  window.copyText = function(el) {
    navigator.clipboard.writeText(el.textContent).then(() => {
      const toastEl = el.nextElementSibling;
      if (toastEl && toastEl.classList.contains('copy-toast')) {
        toastEl.classList.add('show');
        setTimeout(() => toastEl.classList.remove('show'), 1500);
      }
      toast('Copied to clipboard', 'info');
    });
  };

  function escapeHtml(str) {
    const d = document.createElement('div');
    d.textContent = str;
    return d.innerHTML;
  }

  // --- History (localStorage) ---
  const HISTORY_KEY = 'korb_yt2mp3_history';
  const MAX_HISTORY = 20;

  function getHistory() {
    try {
      return JSON.parse(localStorage.getItem(HISTORY_KEY)) || [];
    } catch { return []; }
  }

  function saveHistory(list) {
    localStorage.setItem(HISTORY_KEY, JSON.stringify(list));
  }

  function addToHistory(url, videoId) {
    let list = getHistory();
    // Remove duplicate
    list = list.filter(item => item.url !== url);
    list.unshift({
      url: url,
      videoId: videoId,
      timestamp: Date.now()
    });
    if (list.length > MAX_HISTORY) list = list.slice(0, MAX_HISTORY);
    saveHistory(list);
    renderHistory();
  }

  function removeFromHistory(index) {
    const list = getHistory();
    list.splice(index, 1);
    saveHistory(list);
    renderHistory();
  }

  function renderHistory() {
    const list = getHistory();
    if (list.length === 0) {
      historyList.innerHTML = '<div class="history-empty">No conversions yet</div>';
      return;
    }

    historyList.innerHTML = list.map((item, i) => {
      const thumb = `https://img.youtube.com/vi/${escapeHtml(item.videoId)}/default.jpg`;
      const timeStr = formatTimestamp(item.timestamp);
      return `
        <li class="history-item" data-url="${escapeHtml(item.url)}">
          <img class="history-thumb" src="${thumb}" alt="" loading="lazy">
          <div class="history-info">
            <div class="history-url">${escapeHtml(item.url)}</div>
            <div class="history-time">${timeStr}</div>
          </div>
          <button class="history-del" data-index="${i}" title="Remove">&times;</button>
        </li>
      `;
    }).join('');
  }

  function formatTimestamp(ts) {
    const d = new Date(ts);
    const now = new Date();
    const diffMs = now - d;
    const diffMin = Math.floor(diffMs / 60000);
    if (diffMin < 1) return 'Just now';
    if (diffMin < 60) return diffMin + 'm ago';
    const diffHr = Math.floor(diffMin / 60);
    if (diffHr < 24) return diffHr + 'h ago';
    const diffDay = Math.floor(diffHr / 24);
    if (diffDay < 7) return diffDay + 'd ago';
    return d.toLocaleDateString();
  }

  // History click handlers
  historyList.addEventListener('click', (e) => {
    const delBtn = e.target.closest('.history-del');
    if (delBtn) {
      e.stopPropagation();
      removeFromHistory(parseInt(delBtn.dataset.index));
      return;
    }
    const item = e.target.closest('.history-item');
    if (item) {
      urlInput.value = item.dataset.url;
      handleUrlChange(item.dataset.url);
      window.scrollTo({ top: 0, behavior: 'smooth' });
      toast('URL loaded from history', 'info');
    }
  });

  historyClear.addEventListener('click', () => {
    if (getHistory().length === 0) return;
    saveHistory([]);
    renderHistory();
    toast('History cleared', 'info');
  });

  // --- Keyboard shortcuts ---
  document.addEventListener('keydown', (e) => {
    // Enter to convert when input focused
    if (e.key === 'Enter' && !convertBtn.disabled && !isConverting) {
      startConversion();
    }
    // Ctrl+V / Cmd+V global (handled by paste event above)
  });

  // --- Init ---
  renderHistory();

  // Auto-detect URL in input on page load (in case browser auto-filled)
  if (urlInput.value) {
    handleUrlChange(urlInput.value);
  }

})();
</script>
</body>
</html>
